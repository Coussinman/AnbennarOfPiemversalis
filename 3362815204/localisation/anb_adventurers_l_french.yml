 adventurer.1.a:0 "Un capitaine aventurier aguerri"
 adventurer.1.b:0 "Un puissant seigneur des marches"
 adventurer.1.c:0 "Un pionnier charismatique"
 adventurer.1.dd:0 "Un fin chercheur de fortune"
 adventurer.1.e:0 "Un vétéran des Guerres Lilas"
 adventurer.1.f:0 "Un noble de notre patrie"
 adventurer.1.g:0 "Un Escannien de souche"
 adventurer.1.h:0 "Un puissant mage"
 adventurer.2.t:0 "Des vétérans s'installent"
 adventurer.2.d:0 "Notre nation, jadis une bande disparate d'aventuriers, s'est considérablement développée. Les vieux soldats de notre compagnie commencent à prendre leur retraite du combat pour s'établir sur les terres que nous avons conquises. Cependant, les plus valides peuvent toujours être rappelés au service, contre une somme raisonnable."
 adventurer.2.a:0 "Bien."
 settled_veteran_adventurers_tt:0 "Des §Yaventuriers vétérans§! deviendront disponibles à l'embauche."
 adventurer.4.t:0 "Une compagnie d'aventuriers s'empare de notre terre tribale !"
 adventurer.4.d:0 "Des aventuriers voisins ont renoncé à leurs racines nomades et ont commencé à établir des colonies permanentes sur leurs terres. Ils ont aussi revendiqué notre terre tribale voisine comme la leur, y installant de petits avant-postes et campements destinés sans nul doute à une future colonisation !"
 adventurer.4.a:0 "Scandaleux !"

 adventurer.5.t:0 "Aventuriers sans cause"
 adventurer.5.d:0 "En tant que compagnie d'aventuriers, nous sommes censés combattre la Marée Verte et contribuer à la reconquête de l'Escann. L'insistance de [Root.Monarch.GetName] à déclarer qu'il n'y a aucun motif à nos guerres a commencé à désagréger notre compagnie, nombre de ses membres se demandant quel est encore notre but. Il nous faudra de longues années pour nous en remettre."
 adventurer.5.a:0 "Quelle est notre cause ?"
 adventurer.5_6.tooltip: "§gIl est interdit aux aventuriers de déclarer la guerre sans casus belli. Si vous pensez que cet événement est survenu par erreur, veuillez le signaler sur le forum #bugs-and-critters de notre Discord.§g"

 adventurer.6.t:0 "Les tensions implosent au sein de [cheeky_no_cb_adventurers.GetName]"
 adventurer.6.d:0 "Des excités de [cheeky_no_cb_adventurers.GetName] ont tenté d'entraîner toute leur compagnie d'aventuriers dans une guerre injuste contre nous. Fort heureusement, leur [cheeky_no_cb_adventurers.Monarch.GetTitle], [cheeky_no_cb_adventurers.Monarch.GetName], a insisté sur l'absence de motif à leurs guerres, sapant la confiance de toute la compagnie, nombre de ses membres se demandant quel était encore leur but."
 adventurer.6.a:0 "Bien fait pour eux."

 promote_adventurer_unity:0 "Promouvoir l'unité des aventuriers"
 promote_adventurer_unity_desc:0 "Les aventuriers s'organisent généralement en petits groupes soudés pour accomplir des quêtes dépassant de loin les capacités d'un seul individu. De même, ces groupes sont souvent affiliés à une guilde, et les guildes répondent souvent à des compagnies d'aventuriers. Dans le sillage de la Marée Verte, des dizaines de grandes compagnies d'aventuriers répondirent à l'appel aux armes et défendirent Cannor contre la horde de Korgus, renversant finalement le cours des choses à Rottenstep et poursuivant leur avancée pour chasser les orques de l'Escann une fois pour toutes. Cependant, les aventuriers sont individualistes par nature, et en l'absence de menace existentielle, ils sont inconstants et rarement enclins à coopérer entre eux. En ces temps périlleux, l'unité est un luxe que nous ne saurions tenir pour acquis."
 adventurer_unity:0 "Unité des aventuriers"
 ability_anb_adventurer_unity:0 "Unité des aventuriers"

