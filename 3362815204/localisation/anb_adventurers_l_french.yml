 adventuring.1.t:0 "Des aventuriers trouvent un trésor !"
 adventuring.1.d:0 "Réjouissons-nous ! Un groupe d'aventuriers est revenu avec un butin considérable et un récit des plus palpitants ! Ils ont remis les prises conformément au règlement de la compagnie, mais que ferons-nous de la récompense ?"
 adventuring.1.a:0 "Cela profitera à toute la compagnie !"
 adventuring.1.b:0 "Donner une part à l'équipe qui l'a trouvé !"
 adventuring.1.c:0 "Leur donner une prime ! Cela encouragera d'autres à partir à l'aventure !"
 adventuring.2.t:0 "La compagnie a besoin d'un nouvel équipement"
 adventuring.2.d:0 "Notre séjour en ces terres a rouillé et rongé notre équipement. Nos membres ont tenté de récupérer et de rationner, mais cela n'a pas suffi, et ils demandent à présent que la compagnie commande un nouvel équipement standard pour ses membres."
 adventuring.2.a:0 "Envoyer une caravane en acheter en Occident."
 adventuring.2.b:0 "Nous n'en avons pas les moyens pour l'instant..."
 adventuring.3.t:0 "Cartes d'exploration"
 adventuring.3.d:0 "On nous propose des cartes fraîchement mises à jour pour nos groupes d'aventuriers, susceptibles de révéler de nouveaux trésors et opportunités. Acceptons-nous d'y jeter un œil ?"
 adventuring.3.a:0 "Acheter les cartes."
 adventuring.3.b:0 "Peut-être pouvons-nous tirer parti de notre renommée ?"
 adventuring.3.c:0 "Nous n'avons que faire de vos cartes !"
 adventuring.4.t:0 "Capitaines aventuriers ventripotents"
 adventuring.4.d:0 "La rumeur court que quelques-uns de nos capitaines les plus éminents se seraient octroyé bien plus que leur juste part du butin, et pire, un représentant des mécontents nous a présenté des preuves en la matière. Que faire ?"
 adventuring.4.a:0 "Confisquer tout leur or et le redistribuer à la compagnie !"
 adventuring.4.b:0 "Confisquer une partie de leur or !"
 adventuring.4.c:0 "Et alors ?"
 adventuring.5.t:0 "Aventuriers déloyaux"
 adventuring.5.d:0 "Un groupe de nos aventuriers les plus talentueux refuse de partager son butin ou les informations sur ses entreprises."
 adventuring.5.a:0 "Peut-être qu'un peu d'or pourrait regagner leur loyauté ?"
 adventuring.5.b:0 "Les réprimander."
 adventuring.5.c:0 "Les expulser de la compagnie !"
 adventuring.6.t:0 "Un groupe d'aventuriers est décimé"
 adventuring.6.d:0 "Nous avons appris qu'un groupe d'aventuriers opérant sous notre bannière a échoué de manière catastrophique dans ses entreprises..."
 adventuring.6.a:0 "Sacré Leeroy !"
 adventuring.7.t:0 "Un nouveau [From.Monarch.GetTitle] se lève"
 adventuring.7.d:0 "Avec la mort de notre précédent [From.Monarch.GetTitle], $COUNTRY$ est désormais sous le commandement de $MONARCH$. Mais de laquelle des trois factions d'aventuriers notre nouveau [From.Monarch.GetTitle] est-il issu ?"
 adventuring.7.a:0 "Les marcheurs"
 adventuring.7.b:0 "Les pionniers"
 adventuring.7.c:0 "Les chercheurs de fortune"
 adventuring.8.t:0 "Bâtir [rebuild_province.GetName]"
 adventuring.8.d:0 "Nous avons peut-être arraché le contrôle de [rebuild_province.GetName] à ses anciens maîtres, mais une grande partie de notre compagnie suggère d'investir dans le développement des infrastructures locales. D'autres estiment cependant que c'est une perte de temps et que nous devrions simplement utiliser la province comme base pour les quêtes et aventures aux alentours."
 adventuring.8.a:0 "Bonne idée, les fondations sont essentielles !"
 adventuring.8.b:0 "Non seulement rebâtir, mais améliorer !"
 adventuring.8.c:0 "Nous sommes ici pour combattre et partir à l'aventure, pas pour bâtir !"
 adventuring.9.t:0 "Des aventuriers déposent les armes"
 adventuring.9.d:0 "Avec le développement de notre jeune royaume, certains aventuriers ont décidé de s'établir et de suivre d'autres vocations. Au fond, certains aventuriers combattent pour avoir la chance d'une vie nouvelle."
 adventuring.9.a:0 "C'est leur choix, après tout."
 adventuring.10.t:0 "Des aventuriers quittent notre compagnie"
 adventuring.10.d:0 "Les aventuriers sont gens inconstants, animés au fond d'une âme nomade. Un groupe éminent d'aventuriers a décidé de partir ailleurs en quête de nouvelles aventures et de récits de bravoure et de merveilles."
 adventuring.10.a:0 "Adieu."

 adventurers_privilege_slots:0 "Privilèges max. des [Country.GetAdventurersName]"