 marcher.1.tt3:0 "Un nouvel héritier légitime avec une revendication §GForte§! apparaît à l'âge de §Y50§! ans, avec un minimum garanti de §Y3§! £mil£."
 marcher.1.tt4:0 "Un nouvel héritier légitime avec une revendication §GForte§! apparaît à l'âge de §Y60§! ans, avec un minimum garanti de §Y3§! £mil£."
