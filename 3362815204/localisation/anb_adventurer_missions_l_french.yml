l_french:

   opinion_adv_ally:0 "Serment d'aventurier"
   adv_forcelimit_modifier:0 "Aventuriers organisés"
   desc_adv_forcelimit_modifier:0 "Nous avons constitué un groupe d'élite d'aventuriers formant le fer de lance de nos entreprises militaires."
   adv_colonist_modifier:0 "Maintien des frontières"
   desc_adv_colonist_modifier:0 "Grâce à notre protection continue, nous recevons un afflux de pionniers et de réfugiés regagnant leurs foyers."
   adv_war_ork_modifier:0 "Repousser la Marée Verte"
   desc_adv_war_ork_modifier:0 "Notre guerre contre la Marée Verte a galvanisé les aventuriers servant notre compagnie."
   adv_colon_modifier:0 "Expansion territoriale"
   desc_adv_colon_modifier:0 "Nous redirigeons les colons et aventuriers nouvellement arrivés vers nos frontières pour encourager l'expansion."
   adv_grain_production:0 "Terres agricoles revitalisées"
   desc_adv_grain_production:0 "D'importants efforts sont déployés pour repeupler et reconquérir les terres agricoles de cette province."
   adv_big_forge:0 "Forge d'aventurier"
   desc_adv_big_forge:0 "Une grande forge a été bâtie ici ; ses forgerons travaillent sans relâche à la production de nouvelles armes."
   adv_dev:0 "Aventuriers au labeur"
   desc_adv_dev:0 "Les aventuriers participent aux projets de remise en valeur des terres et de reconstruction."
   adv_guild_integrated:0 "Bureau central des impôts"
   desc_adv_guild_integrated:0 "Les aventuriers ont établi un bureau fiscal pour mieux administrer leurs terres."
   adv_gems:0 "Essor industriel"
   desc_adv_gems:0 "Des artisans cannoriens se sont installés dans cette province, taillant les gemmes extraites des mines locales."
   adv_bank:0 "Établissement d'un atelier monétaire"
   desc_adv_bank:0 "Une nouvelle monnaie y est frappée afin de réduire notre dépendance envers les couronnes cannoriennes."
   adv_build_modifier:0 "Rebâtir l'Escann"
   desc_adv_build_modifier:0 "Nous recentrons nos efforts sur la reconstruction des villages et des infrastructures dévastés par la Marée Verte."
   adv_home_trade:0 "Contrôle du commerce local"
   desc_adv_home_trade:0 "Notre contrôle du commerce local a renforcé notre capacité à sécuriser les ressources pour nos aventuriers."
   adv_trade_powerhouse:0 "Sécurisation des routes commerciales"
   desc_adv_trade_powerhouse:0 "De nouvelles routes commerciales sont sécurisées en utilisant cette province comme base."
   adv_fame:0 "Aventures glorieuses"
   desc_adv_fame:0 "Nos succès en Escann sont sur toutes les lèvres !"
   adv_standing_army:0 "Armée permanente"
   desc_adv_standing_army:0 "Nous avons formé les colons en soldats aptes à servir dans une armée."
   adv_administration:0 "Essor des affaires"
   desc_adv_administration:0 "Jadis, cette province n'était qu'un quartier général d'aventuriers en terre étrangère. Aujourd'hui, c'est une capitale florissante bouillonnante de commerce."
   organized_adventurer_administration:0 "Administration organisée des aventuriers"
   desc_organized_adventurer_administration:0 "Notre prévoyance dans l'établissement d'un bureau fiscal central et d'un corps bureaucratique dédié a résolu la plupart des difficultés inhérentes à la création d'un nouvel État-nation."
   adv_guild_integrated_tooltip:0 "§CCela annulera les malus d'efficacité administrative liés à l'§YHéritage des Aventuriers§! lors de la formation de notre propre pays.§!"

   #If you can get [Root.getName] working here ideally this reads "Is tribal land of [Root.getName]" but I could not
   #tribal_land_of_tt:0 "Is our §Ytribal land§!"
   tribal_land_of_tt:0 "Est une terre tribale de §Y[Root.GetName]§!"

   ADV_growing_population_title:0 "Coloniser l'Escann"
   ADV_growing_population_desc:0 "Alors que nous commençons à reconquérir et repeupler ces terres arrachées aux orques, notre capitale attire des gens de partout vers ce bastion sûr face à la Marée Verte."
   ADV_jewel_title:0 "Inviter des artisans"
   ADV_jewel_desc:0 "Pour bâtir une économie solide, nous devons exporter davantage que du bétail, du grain et des esclaves orques. L'Escann recèle quelques gisements de gemmes et, si nous parvenons à en trouver un, nous pourrons commencer à inviter des artisans de Cannor pour exploiter ces mines."
   ADV_monetary_system_title:0 "Nos propres couronnes"
   ADV_monetary_system_desc:0 "Si les couronnes d'or frappées à Cannor ont longtemps suffi à notre économie, nous ne pouvons repeupler convenablement ces terres en restant dépendants de l'ancienne monnaie. Il est temps de trouver une source d'or en Escann et de battre notre propre monnaie."
   ADV_farm_of_country_title:0 "Restaurer les terres agricoles"
   ADV_farm_of_country_desc:0 "Une armée ne marche pas le ventre vide ; des aventuriers ne reconquièrent pas de terres affamés ; une population ne croît pas sous la famine. Pour reconquérir ces terres comme il se doit, nous devons repeupler les exploitations agricoles et faire de la production alimentaire stable notre première priorité."
   ADV_great_forge_title:0 "Forger nos épées"
   ADV_great_forge_desc:0 "Si l'acier cannorien est solide et robuste, nous ne pouvons nous permettre d'importer nos armes si nous devons combattre les orques jour après jour. Il est temps de trouver une bonne source de fer stable et de forger nos propres lames !"

   ADV_node_power_title:0 "Contrôler le commerce local"
   ADV_node_power_desc:0 "Si nous parvenons à contrôler le commerce local, nous disposerons à la fois d'une source de revenus modeste mais stable, et d'un réseau garantissant la libre circulation de nos ressources."
   ADV_trade_power_title:0 "Économie marchande"
   ADV_trade_power_desc:0 "Les premiers jours de la Marée Verte sont révolus, et alors que nous commençons à véritablement coloniser ces terres, il est devenu essentiel de sécuriser un réseau plus complexe de routes commerciales vers l'ouest et d'exploiter convenablement le surplus de marchandises que produit l'Escann."
   ADV_adventurer_in_workforce_title:0 "Les aventuriers au labeur"
   ADV_adventurer_in_workforce_desc:0 "À mesure que nous attirons de plus en plus d'aventuriers, nous devons commencer à exiger davantage de ces braves hommes et femmes de Cannor. Il est temps de leur demander de s'armer non seulement d'épées, mais aussi de charrues !"

   ADV_forcelimit_title:0 "Armée d'aventuriers"
   ADV_forcelimit_desc:0 "Bien que nous dépendions fortement de l'aventurier ordinaire pour le repeuplement des terres, nous avons encore besoin d'un groupe d'aventuriers de confiance, toujours prêts à défendre nos frontières et à repousser les orques."
   ADV_2_prov_title:0 "Consolider nos acquis"
   ADV_2_prov_desc:0 "Nos victoires et aventures en Escann ont valu à nombre de nos membres richesses, honneurs et récits à conter. Cependant, le véritable travail commence maintenant. Si nous voulons un avenir ici, il nous faut rassembler tout le monde et les rallier à la bannière de notre compagnie. Qu'ils dépensent leur or et leurs trésors selon leurs besoins et désirs, mais rappelons-leur aussi que réinvestir dans la compagnie peut assurer leur avenir."
   ADV_3_prov_title:0 "Pionniers du convoi de ravitaillement"
   ADV_3_prov_desc:0 "Alors que nous continuons à sécuriser de nouveaux territoires en Escann, de plus en plus de gens ont rejoint le convoi de ravitaillement de notre compagnie, offrant biens et services, des chasseurs vendant de la viande aux prostituées vendant leurs corps. Ces gens, qu'ils soient venus de Cannor pour une vie meilleure ou soient d'anciens réfugiés escanniens de retour chez eux, sont sans nul doute la colonne vertébrale de nos entreprises ici. Ils sont sous notre protection, et nous devrions les traiter comme un pays doit traiter ses citoyens."
   ADV_capital_region_title:0 "Notre foyer"
   ADV_capital_region_desc:0 "Bien que nous ne venions pas tous du même endroit, c'est en Escann que chacun de nous a trouvé un foyer naissant. C'est pourquoi nous devons absolument sécuriser les environs de notre capitale, pour établir un noyau capable d'attirer anciens et nouveaux Escanniens sur nos terres."
   ADV_build_frenzy_title:0 "Rebâtir les villages"
   ADV_build_frenzy_desc:0 "Si reconquérir les terres sur les orques demeure notre objectif premier, nous devons néanmoins rebâtir les anciens villages et établir des infrastructures fonctionnelles. Mettons ces nouveaux colons à bon usage !"
   ADV_guild_integration_title:0 "Établir un bureau fiscal"
   ADV_guild_integration_desc:0 "À mesure que nos terres se développent et que nos villages sont rebâtis, il est temps d'instaurer un système fiscal plus organisé. Grâce à cela, nous accroîtrons les revenus de l'État tout en disposant d'un corps de bureaucrates compétents, prêts à intégrer les terres nouvellement conquises à notre administration."

   ADV_prestigious_adventurer_title:0 "Aventures couronnées de succès"
   ADV_prestigious_adventurer_desc:0 "Notre succès en Escann fait parler de nous parmi les autres aventuriers, et comme chacun sait, pour les aventuriers, ce n'est pas qui l'on est qui compte, mais ce que l'on a accompli."
   ADV_war_ork_title:0 "La menace verte"
   ADV_war_ork_desc:0 "Nous ne devons jamais oublier ni pardonner aux orques ce qu'ils ont fait. Il est temps d'achever ce que Corin a commencé et de contre-attaquer pour reconquérir l'Escann sur les Peaux-Vertes, ou périr en essayant !"
   ADV_standing_army_title:0 "Armée permanente"
   ADV_standing_army_desc:0 "Depuis la Marée Verte, la menace orque, organisée ou non, est omniprésente en Escann. Si nombre de nos membres sont des combattants et aventuriers aguerris, nous devons désormais entraîner et compter sur notre contingent de colons pour véritablement combattre en armée, comme au temps de Corin et de Korgus Jour-Fatal."
   ADV_one_colon_title:0 "Besoin de terres colonisées"
   ADV_one_colon_desc:0 "Notre noyau sécurisé, nous disposons à présent de plus de ressources pour soutenir l'expansion. Avec de nouveaux aventuriers et colons arrivant chaque jour dans notre capitale, nous savons que notre peuple est prêt pour cette tâche."

   ADV_ally_title:0 "Nous ne sommes pas seuls"
   ADV_ally_desc:0 "Nous ne sommes pas les seuls à combattre les orques ici en Escann et, puisque nous partageons une menace commune et que les terres libres abondent, nous avons une raison évidente de coopérer."
   ADV_ally_cooperation_title:0 "Coopération"
   ADV_ally_cooperation_desc:0 "Différents problèmes requièrent différentes personnes ; différentes ressources exigent différents artisans qualifiés. Aussi pouvons-nous aider nos voisins avec leurs difficultés, et eux avec les nôtres."
   ADV_organize_capital_title:0 "Urbaniser [Root.Capital.GetCapitalName]"
   ADV_organize_capital_desc:0 "Une capitale est le reflet de l'État qu'elle dirige. Tout comme Lorentaine incarne la splendeur de Lorent, notre capitale doit montrer la prospérité que nous offrons. Il nous faut donc en faire plus qu'un simple bastion ; il nous faut en faire une véritable cité !"