l_french:
 anb_colonial.1.t:0 "Le Retour des Réfugiés Escannis"
 anb_colonial.1.d:0 "Les peuples escannis qui autrefois habitaient ces contrées sont revenus au pays natal après avoir appris nos tentatives pour éradiquer la menace peau-verte. Ils s'offrent à rejoindre nos rangs si nous les autorisons à rebâtir leurs foyers ancestraux."
 anb_colonial.1.a:0 "Soyez les bienvenus chez vous !"
 anb_colonial.1.b:0 "Je ne crois pas, non... Ces terres sont désormais nôtres !"
 anb_colonial.2.t:0 "Une Compagnie d'Aventuriers Dissoute Sollicite son Admission"
 anb_colonial.2.d:0 "La vie d'aventurier est rude, et nombreux sont ceux qui tentent de réaliser leurs rêves d'indépendance pour finalement échouer. L'une de ces entreprises, une compagnie d'aventuriers récemment dissoute, a déposé une requête pour nous rejoindre et participer à nos initiatives coloniales."
 anb_colonial.2.a:0 "Aidez-nous à coloniser ces nouvelles terres !"
 anb_colonial.2.b:0 "Certains d'entre vous sont-ils encore capables de se battre ?"
 anb_colonial.2.c:0 "N'acceptons que ceux qui possèdent l'esprit d'aventure"
 anb_colonial.3.t:0 "Des Colons Arrivent de la Métropole"
 anb_colonial.3.d:0 "Nos récentes réussites dans l'établissement d'une position solide sur ces terres nouvelles ont inspiré nombre de nos compatriotes restés au pays. Si certains nous ont déjà rejoints par leurs propres moyens, plusieurs entreprises d'envergure se sont manifestées pour rejoindre notre compagnie... Mais quel genre de personnes souhaitons-nous accueillir ?"
 anb_colonial.3.a:0 "Très bien alors, nous n'avons pas besoin d'aventuriers mais de colons."
 anb_colonial.3.b:0 "Ce n'est pas encore assez sûr, nous avons besoin de combattants !"
 anb_colonial.4.t:0 "Une Bande Hostile Massacre Notre Colonie"
 anb_colonial.4.d:0 "Nous avons reçu de terribles nouvelles. Une bande hostile s'est abattue sur notre colonie pendant la nuit et a massacré chaque homme, chaque femme et chaque enfant qui s'y trouvaient."
 anb_colonial.4.a:0 "Ordonnez immédiatement une contre-attaque !"
 anb_colonial.4.b:0 "Cieux cendrés !"
 anb_colonial.5.t:0 "Raid Orque sur Notre Colonie !"
 anb_colonial.5.d:0 "Un groupe de pillards orques a attaqué l'une de nos colonies, tuant quelques-uns de nos colons avant de s'enfuir dans la nuit sans laisser de trace."
 anb_colonial.5.a:0 "Ils ont réussi à piller le trésor avant de partir"
 anb_colonial.5.b:0 "Nous les avons repoussés... Au prix de lourdes pertes."
 anb_colonial.6.t:0 "Des Aventuriers Prennent leur Retraite dans Nos Colonies"
 anb_colonial.6.d:0 "La vie d'aventurier est difficile. Il n'existe que trois issues possibles : mourir, atteindre un âge vénérable en ayant eu son compte, ou faire fortune et prendre une retraite précoce. Un groupe de vétérans chanceux et expérimentés a décidé de ranger l'épée et de s'établir sur nos terres pour y couler des jours paisibles."
 anb_colonial.6.a:0 "Vous l'avez bien mérité !"
 anb_colonial.6.b:0 "Pouvons-nous vous payer pour former la nouvelle génération d'aventuriers ?"
 anb_colonial.7.t:0 "Initiative de Colonisation"
 anb_colonial.7.d:0 "L'aventure attire souvent de nombreuses personnes qui rejoignent le train de ravitaillement, et lorsqu'une compagnie d'aventuriers devient suffisamment puissante, ces gens iront même jusqu'à coloniser les terres pour vous ! Un groupe de colons sous notre bannière a décidé de s'installer dans une province voisine."
 anb_colonial.7.a:0 "Bonne chance à eux !"
 anb_colonial.7.b:0 "Dirigez-les vers une colonie existante."
 anb_colonial.8.t:0 "Esprit Pionnier"
 anb_colonial.8.d:0 "La domination de la faction des Pionniers au sein de nos rangs a conduit à un afflux massif de colons dans l'une de nos colonies naissantes !"
 anb_colonial.8.a:0 "Soyez tous les bienvenus !"
 anb_colonial.9.t:0 "Les Marcheurs Sécurisent la Colonie"
 anb_colonial.9.d:0 "La domination de la faction des Marcheurs au sein de nos rangs a permis l'établissement d'une colonie bien protégée et solidement implantée. Malheur à l'insensé qui se mettrait en travers de notre progression !"
 anb_colonial.9.a:0 "Un pas de plus vers la victoire !"
 anb_colonial.10.t:0 "La Fortune Favorise les Audacieux"
 anb_colonial.10.d:0 "La domination de la faction des Chercheurs-de-Fortune au sein de nos rangs a conduit à une initiative précipitée mais bien intentionnée visant à rendre l'une de nos colonies opérationnelle et profitable aussi vite que possible !"
 anb_colonial.10.a:0 "Commençons, voulez-vous ?"
 anb_colonial.11.t:0 "Décourager les Attaques"
 anb_colonial.11.d:0 "Nos progrès dans la colonisation de l'une de nos possessions ont conduit à la pacification de ceux qui l'habitaient auparavant. Peut-être réfléchiront-ils à deux fois avant de nous attaquer à l'avenir."
 anb_colonial.11.a:0 "Parfait."


 anb_colonial_monstrous_frontier.1.t:0 "Démonstration de Puissance"
 anb_colonial_monstrous_frontier.1.d:0 "Parfois, il suffit de démontrer sa force pour faire rentrer les gens dans le rang. La simple taille de nos forces suffit à elle seule à maintenir la racaille de [Root.GetName] sous contrôle."
 anb_colonial_monstrous_frontier.1.a:0 "Ralliez-vous, ou périssez !"
 anb_colonial_monstrous_frontier.2.t:0 "La Puissance de $COUNTRY$ Attire Tous les Regards !"
 anb_colonial_monstrous_frontier.2.d:0 "Notre redoutable réputation et notre prestige ont attiré plusieurs membres de notre race à s'installer et prendre le contrôle de la province de [Root.GetName]."
 anb_colonial_monstrous_frontier.2.a:0 "Notre gloire peut aussi devenir la vôtre !"
 anb_colonial_monstrous_frontier.2.b:0 "La gloire se trouve plutôt dans notre armée."
 anb_colonial_monstrous_frontier.3.t:0 "Un Clan Mineur Nous Rejoint !"
 anb_colonial_monstrous_frontier.3.d:0 "Un clan autrefois puissant de notre royaume est tombé dans la déchéance et s'est soumis au contrôle de $MONARCHTITLE$ $MONARCH$. Notre conseil suggère que nous pouvons les envoyer sur nos frontières lointaines comme vitrine de notre pouvoir. Alternativement, nous pourrions également les incorporer de force dans nos armées."
 anb_colonial_monstrous_frontier.3.a:0 "Envoyez-les à [Root.GetName]"
 anb_colonial_monstrous_frontier.3.b:0 "Vous allez combattre pour nous désormais !"
 anb_colonial_monstrous_frontier.4.t:0 "Une Bande de Guerre Fortunée Refuse de Partager !"
 anb_colonial_monstrous_frontier.4.d:0 "Un groupe éminent de pillards et de razziateurs au sein de $COUNTRY$ a été surpris en train d'essayer de garder plus que sa part légitime de butin ! Nous avons exécuté leur chef pour sa traîtrise, et les restes de leur groupe sont tombés sous notre contrôle. Le second du vieux chef, qui nous avait d'ailleurs révélé la trahison en premier lieu, nous supplie de les laisser vivre et d'utiliser leur butin pour aider à établir le contrôle sur l'une de nos provinces frontalières."
 anb_colonial_monstrous_frontier.4.a:0 "Qu'ils colonisent la frontière"
 anb_colonial_monstrous_frontier.4.b:0 "Incorporez-les... Et saisissez leur butin"
 anb_colonial_monstrous_frontier.5.t:0 "Raid d'Aventuriers !"
 anb_colonial_monstrous_frontier.5.d:0 "« Groupe Recherché : La Menace [Root.Culture.GetName] à [Root.GetName] ! »\n\nUn groupe d'aventuriers en quête d'or et de gloire est arrivé à [Root.GetName], causant sans aucun doute des problèmes à notre peuple."
 anb_colonial_monstrous_frontier.5.a:0 "Leur quête les a menés à piller notre donjon"
 anb_colonial_monstrous_frontier.5.b:0 "C'était une quête d'extermination..."
 anb_colonial_monstrous_frontier.6.t:0 "Explosion Démographique"
 anb_colonial_monstrous_frontier.6.d:0 "Une période de paix et de stabilité au sein de notre royaume a conduit à une forte croissance de notre province frontalière."
 anb_colonial_monstrous_frontier.6.a:0 "Excellent !"
 anb_colonial_monstrous_frontier.7.t:0 "[Root.GetName] Refuse de se Soumettre !"
 anb_colonial_monstrous_frontier.7.d:0 "Les habitants de [Root.GetName] se sont regroupés et ont refusé de se soumettre à notre autorité, attaquant nos forces présentes sur place !"
 anb_colonial_monstrous_frontier.7.a:0 "Nous disposions d'assez de guerriers pour les repousser."
 anb_colonial_monstrous_frontier.7.b:0 "Nous ne faisions pas le poids face à eux."
 anb_colonial_monstrous_frontier.8.t:0 "Des Colons Frontaliers Quittent Nos Terres"
 anb_colonial_monstrous_frontier.8.d:0 "Un grand nombre de ceux qui se sont établis et ont apporté le contrôle à [Root.GetName] en notre nom ont décidé de chercher de nouvelles opportunités ailleurs."
 anb_colonial_monstrous_frontier.8.a:0 "Bon voyage"
 anb_colonial_monstrous_frontier.8.b:0 "Heureusement, nous nous sommes préparés à cette éventualité !"
 anb_colonial_monstrous_frontier.9.t:0 "Des Aventuriers Rôdent à Nos Frontières"
 anb_colonial_monstrous_frontier.9.d:0 "De dangereux aventuriers rôdent près de nos frontières, et un membre de notre conseil a suggéré d'envoyer des guerriers là-bas par précaution."
 anb_colonial_monstrous_frontier.9.a:0 "Envoyez nos guerriers"
 anb_colonial_monstrous_frontier.9.b:0 "Ils s'en sortiront très bien"

 # Event Modifiers

