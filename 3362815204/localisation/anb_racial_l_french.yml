 racial_modifiers.5.t:0 "Changement d'administration raciale"
 racial_modifiers.5.d:0 "Suite au changement de notre culture principale, notre administration sera désormais dominée par une nouvelle race, et nos inclinations et priorités naturelles en seront influencées. Toutefois, une période de transition sera nécessaire avant que notre nouvelle administration ne fonctionne à plein régime."
 racial_modifiers.5.a:0 "Pour ma part, j'accueille nos nouveaux maîtres !"


 racial_modifiers_majority_unrest5.tt:0 "Chaque province possédant le modificateur §YMajorité raciale§! de cette race subira §R5§! d'agitation."
 racial_modifiers_majority_unrest10.tt:0 "Chaque province possédant le modificateur §YMajorité raciale§! de cette race subira §R10§! d'agitation."

 racial_modifiers.3.t:0 "Retour du militaire racial"
 racial_modifiers.3.d:0 "L'oppression de la race actuellement dominante dans notre armée a provoqué des désertions massives et même des menaces de révolte ! Un noyau dur composé de notre race principale s'est soulevé pour reprendre sa place de soldats dominants de notre pays."
 racial_modifiers.3.a:0 "Nous aurions dû mieux les traiter..."


