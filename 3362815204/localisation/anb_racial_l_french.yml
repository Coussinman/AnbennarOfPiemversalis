 ruler_race_icon_tt:0 "[Root.GetRacialRulerTooltip]"
 GetRacialRulerTooltip1:0 "Ce souverain est un §YElfe§!.\n\nLes elfes sont célèbres pour leur beauté et leur affinité avec la magie. Originaires d'Aelantir, leur civilisation s'est effondrée lors d'un événement connu sous le nom de Jour-des-Cieux-Cendrés, provoquant une diaspora de leur race.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y300 ans§!, bien que de nombreux anciens vivent bien plus longtemps."
 GetRacialRulerTooltip1_2:0 "Ce souverain est un §YElfe Sylvestre§!.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y200 ans§!, bien que de nombreux anciens vivent bien plus longtemps."
 GetRacialRulerTooltip2:0 "Ce souverain est un §YHalfelin§!.\n\nLes halfelins sont une petite race originaire du Petit-Pays à Cannor et de Fahvanosy à Sarhal, connus pour leur esprit vif, leur optimisme et leur goût de l'aventure, en plus d'une expertise agricole et culinaire exemplaire."
 GetRacialRulerTooltip3:0 "Ce souverain est un §YNain§!.\n\nLes nains sont une race §ySouterraine§! petite et robuste, connue pour leurs grandes barbes, leur entêtement et leur habileté dans le travail du métal et de la pierre. Bâtisseurs originels des forteresses souterraines de l'Échine-du-Serpent, de nombreux nains au fil des millénaires ont établi leurs foyers à la surface.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y150 ans§!, bien qu'on dise qu'un siècle passé à boire permet à un nain de vivre un siècle de plus."
 GetRacialRulerTooltip4:0 "Ce souverain est un §YGnome§!.\n\nLes gnomes sont un peuple ingénieux connu pour sa subtilité tactile et sa brillance intellectuelle. Leur prouesse magique égale celle des elfes, mais de nombreux gnomes préfèrent contrôler la magie par la technologie.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y200 ans§!, bien que de nombreux gnomes soient connus pour vivre bien, bien plus longtemps."
 GetRacialRulerTooltip5:0 "Ce souverain est un §YOrque§!.\n\nLes orques sont une race forte et très résistante qui valorise grandement les prouesses martiales individuelles. Ils viennent de l'Échine-du-Serpent où ils ont détruit de nombreuses forteresses naines, et ils ont envahi l'Escann lors de ce qu'on appelle la Marée Verte."
 GetRacialRulerTooltip6:0 "Ce souverain est un §YKobold§!.\n\nLes kobolds sont une race §ySouterraine§! qui ressemble à de petits dragons humanoïdes sans ailes, et on pense donc qu'ils sont apparentés aux dragons, voire créés par eux.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y70 ans§!, bien que les kobolds moins exposés au danger puissent vivre jusqu'à §Y120 ans§!."
 GetRacialRulerTooltip7:0 "Ce souverain est un §YDemi-orque§!.\n\n"
 GetRacialRulerTooltip8:0 "Ce souverain est un §YHumain§!.\n\nLes humains sont la race la plus répandue dans la majeure partie de Halann, à l'exception d'Aelantir. Groupe inhabituellement diversifié, les humains sont connus pour leur ambition et leur désir exceptionnel d'aller plus loin que quiconque avant eux."
 GetRacialRulerTooltip9:0 "Ce souverain est un §YGnoll§!.\n\nLes gnolls sont une race bestiale carnivore qui ressemble à des hyènes humanoïdes. Ils sont connus pour vénérer les démons et leurs sociétés tendent à être caractérisées par les luttes intestines et le fratricide."
 GetRacialRulerTooltip10:0 "Ce souverain est un §YElfe Né-des-Ruines§!.\n\nLes Nés-des-Ruines sont les elfes qui sont restés en Aelantir après le Jour-des-Cieux-Cendrés. Né-des-Ruines ne désigne pas une seule sous-race d'elfes mais est plutôt un terme général pour tous les elfes d'Aelantir."
 GetRacialRulerTooltip11:0 "Ce souverain est un §YGobelin§!.\n\nLes gobelins sont une race §ySouterraine§! petite et nombreuse originaire des cavernes de l'Échine-du-Serpent. Ils sont exceptionnellement rusés et utilisent leurs complots et stratagèmes contre leurs esclavagistes orques et contre les nains, leurs ennemis ancestraux."
 GetRacialRulerTooltip12:0 "Ce souverain est une §YHarpie§!.\n\nLes harpies sont une race aviaire mono-genrée exclusivement féminine qui habite le Bulwar, Sarhal et Haless. Leur caractéristique physique la plus distinctive est leurs ailes, qui leur confèrent la capacité naturelle unique de voler."
 GetRacialRulerTooltip13:0 "Ce souverain est un §YTroll§!.\n\nLes trolls sont un type vorace de parents des géants connus pour leurs capacités de régénération, leurs grands nez hideux et, pour les mâles, leurs grandes gueules pourvues de défenses. L'espèce est très adaptable à de nombreux environnements, et par conséquent, de nombreuses régions ont leur propre groupe ethnique de trolls, même si la plupart des trolls sont solitaires ou vivent en petits groupes."
 GetRacialRulerTooltip14:0 "Ce souverain est un §YDemi-elfe§!.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y100 ans§!."
 GetRacialRulerTooltip15:0 "Ce souverain est un §YHarimari§!.\n\nLes harimari sont une race bipède semblable aux tigres, originaire du sud-ouest du Rahen, apparue dans des circonstances mystérieuses lors du cataclysmique Jour-des-Cieux-Cendrés. Bien qu'ils soient craints pour leur incroyable force, leur vitesse et leurs armes naturelles, ils sont également connus comme des penseurs et philosophes très cultivés.\n\nC'est une race à §Ylongue vie§!, avec une espérance de vie moyenne d'environ §Y70 ans§!, bien que certains anciens puissent vivre jusqu'à §Y120 ans§!."
 GetRacialRulerTooltip16:0 "Ce souverain est un §YHobgobelin§!.\n\nLes hobgobelins sont un peuple gobelinoïde profondément militariste originaire des hautes terres du nord du Rahen. Plus grands et plus forts que les gobelins, ils favorisent l'ordre et la discipline par-dessus tout et se méfient profondément de la magie."
 GetRacialRulerTooltip17:0 "Ce souverain est un §YCentaure§!.\n\nLes centaures sont un peuple guerrier et nomade. Ils habitent les Plaines-Interdites depuis leur exode d'Escann il y a plus de deux mille ans. Leur apparence de la taille vers le haut est extrêmement similaire à celle d'un humain normal ; de la taille vers le bas, ils ont le torse et les jambes d'un cheval."
 GetRacialRulerTooltip18:0 "Ce souverain est un §YOgre§!.\n\nLes ogres sont des humanoïdes de trois mètres de haut que l'on trouve principalement dans les contreforts de l'Échine-du-Serpent. On pourrait les confondre avec des humains sans leur taille et leur corpulence. Bien que leur force soit célèbre, les ogres sont surtout connus, et craints, pour leurs appétits voraces et leur volonté de manger n'importe quoi et n'importe qui, y compris les leurs."
 GetRacialRulerTooltip19:0 "Ce souverain est un §YHomme-lézard§!.\n\nLes hommes-lézards sont une race fière et industrieuse des jungles de Sarhal. Ils sont quelque peu isolés du reste de Halann, se méfiant à la fois des autres races et les uns des autres. Leur apparence varie grandement, allant de svelte et agile à massif et crocodilien."
 GetRacialRulerTooltip20:0 "Ce souverain est un §YMechanim§!.\n\nÀ FAIRE : Trucs de robots."
 GetRacialRulerTooltipLich:0 "Ce souverain est §RMort-vivant§!.\n\nPar des machinations d'un grand mal, ce souverain a renoncé à [Root.Monarch.GetHerHis] enveloppe mortelle et a atteint l'immortalité sous la forme d'une §RLiche§!."
 GetRacialRulerTooltipVampire:0 "Ce souverain est §RMort-vivant§!.\n\nSouvent considéré comme un mythe ou une légende, ce souverain s'est révélé être un véritable §RVampire§!. Ces effroyables créatures de la nuit se nourrissent de sang humain pour obtenir l'immortalité."

 gnoll_reform_tech_group_title:0 "Réformer le militaire de meute"
 gnoll_reform_tech_group_desc:0 "La guerre gnolle a toujours été synonyme de la sauvagerie primitive d'une époque révolue, et bien que cela facilite certainement le travail du Xhazobkult, la survie du [Root.GovernmentName] dépend de la modernisation."
 gnoll_reform_tech_group_tt:0 "§GNous obtiendrons un nouvel ensemble d'unités.§!"

 #Changing Ways localisation
 changing_ways_title:0 "Changer de voie"
 changing_ways_desc:0 "Notre nation s'est renforcée grâce à notre héritage, enraciné dans le mariage de deux mondes. Mais alors que nous nous étendons, certains se demandent si l'humanité seule est l'avenir. Ont-ils raison ?"
 #Left this as normal colours for now.
 changing_ways_explanation_tt:0 "Les empires demi-orques et demi-elfiques peuvent passer à une administration et une culture principale humaines si cette culture est la culture dominante et appartient à leur groupe culturel."

