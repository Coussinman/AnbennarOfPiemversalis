l_french:
 ### Country and Province modifiers for Wescann
 escanni_refugee_settlement_small:0 "Petit Centre de Réfugiés Escaniens"
 desc_escanni_refugee_settlement_small:0 "Des réfugiés déplacés par la Marée Verte se sont installés dans cette zone, leur population actuelle est §YPetite§!"
 escanni_refugee_settlement_large:0 "Grand Centre de Réfugiés Escaniens"
 desc_escanni_refugee_settlement_large:0 "Des réfugiés déplacés par la Marée Verte se sont installés dans cette zone, leur population actuelle est §YGrande§!"
 escanni_refugee_settlement_massive:0 "Centre de Réfugiés Escaniens Massif"
 desc_escanni_refugee_settlement_massive:0 "Des réfugiés déplacés par la Marée Verte se sont installés dans cette zone, leur population actuelle est §YMassive§!"
 escanni_jousting_ground:0 "Terrain de Joute Escanien"
 desc_escanni_jousting_ground:0 "Ici les chevaliers escaniens supervisent des compétitions entre cavaliers des nations environnantes."
 escanni_center_of_learning:0 "Centre d'Érudition Escanien"
 desc_escanni_center_of_learning:0 "Des érudits et artistes talentueux se rassemblent ici pour apprendre les méthodes et le style escaniens. Il fonctionne à la fois comme centre d'apprentissage et de recherche."
 escanni_refugee_integration:0 "Intégration des Réfugiés Escaniens"
 desc_escanni_refugee_integration:0 "Une politique d'intégration active est menée, le choc culturel, entre autres, met notre nation sous pression."
 escanni_refugee_tolerance:0 "Tolérance des Réfugiés Escaniens"
 desc_escanni_refugee_tolerance:0 "Les réfugiés dans nos terres sont accueillis, mais on ne les encourage pas à s'installer ici, cependant ils peuvent rester aussi longtemps qu'ils en ont besoin."
 escanni_refugee_repatriation:0 "Rapatriement des Réfugiés Escaniens"
 desc_escanni_refugee_repatriation:0 "Le seul « foyer » que les réfugiés désirent vraiment se trouve en Escann, ainsi nous devons les aider à partir, pour leur bien et le nôtre."
 escanni_end_of_greentide:0 "Escann Tient Bon"
 desc_escanni_end_of_greentide:0 "À l'est un nouvel état surgit et apporta nouvelle de leur succès en Escann. L'ère de la Marée Verte est terminée."
 escanni_soothed_the_masses:0 "Apaisé les Masses"
 descescanni_soothed_the_masses:0 "Des décisions récentes ont apaisé l'esprit de nos citoyens."
 escanni_upset_the_masses:0 "Contrarié les Masses"
 desc_escanni_upset_the_masses:0 "Des décisions récentes ont agité les habitants de [Root.GetName]."
 escanni_unrestp_prodp_statecostn_mod:0 "Guildes d'Artisans Inclusives"
 desc_escanni_unrestp_prodp_statecostn_mod:0 "Les guildes d'artisans locales ont été poussées à être plus inclusives envers les étrangers. Une décision profitable mais quelque peu impopulaire."
 escanni_unrestn_tradep_mod:0 "Guildes d'Artisans Exclusives"
 desc_escanni_unrestn_tradep_mod:0 "Les guildes d'artisans de [Root.GetName] ont banni les étrangers de rejoindre leurs rangs."
 escanni_prodp_mod:0 "Production Stimulée"
 desc_escanni_prodp_mod:0 "Les guildes d'artisans locales ont vu leur production stimulée par nos décisions récentes."
 escanni_traddecayn_unrestp_mod:0 "Militaire Renforcé"
 desc_escanni_traddecayn_unrestp_mod:0 "Le militaire a reçu de nouveaux investissements par crainte de ce qui pourrait arriver à notre nation si nous n'étions pas prêts."
 escanni_ideacostn_mod:0 "Ouverture d'Esprit"
 desc_escanni_ideacostn_mod:0 "Au désarroi de certains dans notre nation, notre [Root.Monarch.GetTitle] a jugé qu'être plus ouvert d'esprit serait bon pour la nation."
 escanni_globaltradepowerp_mod:0 "Commerce Sans Frontières"
 desc_escanni_globaltradepowerp_mod:0 "Un récent décret a diminué la quantité de régulations sur le commerce, ouvrant de nouvelles opportunités pour commerçants et marchands dans notre pays."
 escanni_prestigedecayn_mod:0 "Hall de Style Escanien"
 desc_escanni_prestigedecayn_mod:0 "La grande salle de [Root.GetCapitalName] a été redécorée dans un style escanien conformément aux artistes employés par l'état après avoir fui la Marée Verte."
 escanni_taxloss_mod:0 "Famine Escanienne"
 desc_escanni_taxloss_mod:0 "La pression mise sur nos stocks alimentaires a échappé à tout contrôle, une famine ravage maintenant notre ville et les camps de réfugiés ne s'en sortent guère mieux."
 escanni_stabnsmall_mod:0 "Règne Stabilisé"
 desc_escanni_stabnsmall_mod:0 "L'ordre est protégé dans notre nation, le peuple se sent plus en sécurité et moins enclin à causer des problèmes."
 escanni_diprepn_mod:0 "Règne Impopulaire"
 desc_escanni_diprepn_mod:0 "Une décision dure a été prise, elle était peut-être nécessaire, mais elle ne sera pas ignorée par nos voisins."
 escanni_diprepp_mod:0 "Règne Populaire"
 desc_escanni_diprepp_mod:0 "Nos décisions sont respectées même au-delà de nos frontières, cette popularité peut être utilisée pour faire pencher des accords en notre faveur."
 escanni_techcostn_mod:0 "Enseignements Escaniens"
 desc_escanni_techcostn_mod:0 "Des érudits, artistes et philosophes de différentes parties d'Escann ont partagé leur savoir avec nous."
 escanni_tolheresyp_mod:0 "Une Cour Tolérante"
 desc_escanni_tolheresyp_mod:0 "Même avec des différences religieuses tentant de nous déchirer, nous tiendrons ferme et ouvrirons nos bras à nos frères qui auraient pu s'égarer."
 escanni_tolownp_tolheresyn_mod:0 "Une Cour Vertueuse"
 desc_escanni_tolownp_tolheresyn_mod:0 "La foi n'est pas quelque chose qui faiblira dans nos terres, nous sommes de vrais fidèles et ne laisserons pas les nôtres être égarés par d'autres."
 escanni_diprepn_tolheresyp_mod:0 "Une Cour Zélée"
 desc_escanni_diprepn_tolheresyp_mod:0 "Aucun hérétique ne restera dans nos terres, tel est notre vœu. D'autres pourraient ne pas apprécier cela mais notre détermination est pure et inébranlable."
 escanni_tolownn_tolheresyp_mod:0 "Une Cour Ouverte"
 desc_escanni_tolownn_tolheresyp_mod:0 "Ceux que certains appellent « hérétiques » ne sont pas très différents de nous, et ce fait est vrai que notre peuple y croie ou non. C'est simplement un fait."
 escanni_icap_mod:0 "Détermination Féroce"
 desc_escanni_icap_mod:0 "Les réfugiés qui nous ont atteints ont apporté avec eux des techniques étrangères, celles-ci nous donneront un avantage sur nos voisins pendant un temps."
 escanni_manpowerp_legitimacyp_mod:0 "L'Héritage de Jon"
 desc_escanni_manpowerp_legitimacyp_mod:0 "Le Prince Jon Gerwick, père du roi Welyam III, était un ami des Escaniens. Il les abrita, en retour ils servent maintenant son royaume avec ferveur."
 escanni_legitimacyn_ideacostn_unrestp_mod:0 "L'Héritage de Damérie"
 desc_escanni_legitimacyn_ideacostn_unrestp_mod:0 "Nos cœurs pleurent car la Damérie est partie."
 escanni_ideacostp_unrestn_mod:0 "Damérie N'Est Plus"
 desc_escanni_ideacostp_unrestn_mod:0 "La Damérie est partie, mais son ombre persiste et aidera les Escaniens dans leur quête."
 escanni_prestigep_legitimacyp_unrestp_mod:0 "La Folie de Damérie"
 desc_escanni_prestigep_legitimacyp_unrestp_mod:0 "Damérie Sinus Destroito."
 escanni_ideacostn_unrestn_mod:0 "Souvenir de la Lune et du Dragon"
 desc_escanni_ideacostn_unrestn_mod:0 "La Damérie et l'Escann sont partis, mais leur mémoire persiste. Et leur perte guidera nos mains."
 escanni_stabp_mod:0 "Défendre les Réfugiés"
 desc_escanni_stabp_mod:0 "Alors que la décision de défendre les réfugiés aurait pu être juste, les placer au-dessus de la loi est mal perçu."
 escanni_tolownp_tolhereticsn_unrestn_mod:0 "Inquisition Anti-Infernale"
 desc_escanni_tolownp_tolhereticsn_unrestn_mod:0 "Peu importe si c'était vrai ou non, le risque d'héberger des cultistes infernaux est trop grand. Notre peuple comprend sûrement que nous devons être unis."
 escanni_vamp_loyp_infp_mod:0 "Aucun Vampire en Vue"
 desc_escanni_vamp_loyp_infp_mod:0 "Aucun vampire n'existe dans ces terres, ou du moins c'est ce que dit le dirigeant. S'il y en avait cependant, c'est une grande opportunité."
 escanni_vamp_hunt_mod:0 "Chasses aux Vampires"
 desc_escanni_vamp_hunt_mod:0 "Des chasses aux vampires sont activement organisées, les vampires sont chassés à travers la nation et tués à vue."
 escanni_ruler_tol_heretics:0 "Dirigeant Tolérant"
 desc_escanni_ruler_tol_heretics:0 "Le dirigeant a décidé d'être magnanime et d'accorder aux hérétiques nouvellement arrivés sa protection."
 escanni_ruler_missionary:0 "Dirigeant Zélé"
 desc_escanni_ruler_missionary:0 "Les hérétiques doivent disparaître de ces terres selon les souhaits de leur dirigeant, ils renonceront à leur foi ou mourront."
 escanni_elikhand_worship_no_freedom:0 "Religion d'État Imposée"
 desc_escanni_elikhand_worship_no_freedom:0 "L'appel des réfugiés pour la liberté religieuse n'a pas abouti, ils devront se conformer ou être chassés."
 escanni_elikhand_ban_refugees:0 "Réfugiés Bannis d'Entrer"
 desc_escanni_elikhand_ban_refugees:0 "Les réfugiés ont récemment été bannis d'entrer, ils doivent à la place contourner nos frontières vers des pâturages plus verts."
 escanni_elikhand_worship_freedom:0 "Liberté de Culte"
 desc_escanni_elikhand_worship_freedom:0 "Les réfugiés ont reçu la liberté religieuse, un choix décisif de notre chef qui aidera à les intégrer."
 upset_escanni_refugees:0 "Réfugiés Escaniens Contrariés"
 desc_upset_escanni_refugees:0 "Des décisions récentes ont irrité les réfugiés vivant dans ces terres."
 appeased_escanni_refugees:0 "Réfugiés Escaniens Apaisés"
 desc_appeased_escanni_refugees:0 "Des décisions récentes ont apaisé les réfugiés vivant dans ces terres."
 escanni_refugee_discriminate_escann:0 "Réfugiés Escaniens Furieux"
 desc_escanni_refugee_discriminate_escann:0 "Des événements récents ont aigri les relations avec les réfugiés, ils sont furieux."
 exploited_escanni_refugees:0 "Réfugiés Escaniens Exploités"
 desc_exploited_escanni_refugees:0 "Les réfugiés ici sont exploités pour leur travail. Une entreprise lucrative, mais moins qu'humaine."
 mobilized_escanni_refugees:0 "Réfugiés Escaniens Mobilisés"
 desc_mobilized_escanni_refugees:0 "Les réfugiés ici ont été enhardis, cherchant à combattre pour leur nation hôte."
 drafted_escanni_refugees:0 "Réfugiés Escaniens Enrôlés"
 desc_drafted_escanni_refugees:0 "Les réfugiés ici ont été enrôlés dans l'armée, il est peu probable qu'ils rentrent même chez eux."
 escanni_strain_on_prod:0 "Production Sous Tension"
 desc_escanni_strain_on_prod:0 "La production locale a été arrêtée par les circonstances actuelles. Elle finira par se rétablir, mais l'économie locale souffrira pendant un temps."
 loyal_escanni_refugees:0 "Réfugiés Loyaux"
 desc_loyal_escanni_refugees:0 "Les réfugiés ici ont été satisfaits par des décisions récentes, ils sont plus loyaux à notre nation que la plupart ne s'y attendraient."
 inspired_escanni_refugees:0 "Réfugiés Escaniens Inspirés"
 desc_inspired_escanni_refugees:0 "Les réfugiés ici ont été inspirés par nos efforts, ils sont susceptibles de rejoindre notre cause !"
 autonomous_escanni_refugees:0 "Enclave Escanienne Autonome"
 desc_autonomous_escanni_refugees:0 "Une enclave autonome a été établie ici pour les réfugiés escaniens, ils jouissent d'un grand degré de liberté, et ce pour un temps."
 escanni_merc_settle_down:0 "Concessions de Terres aux Mercenaires"
 desc_escanni_merc_settle_down:0 "Des terres locales ont été concédées aux mercenaires et aventuriers, une entreprise plus profitable que combattre dans des terres lointaines."
 escanni_changing_production:0 "Introduction de Nouvelle Production"
 desc_escanni_changing_production:0 "Un investissement récent a changé la production majeure de cette province, il faudra du temps pour s'adapter à ces nouvelles méthodes et exigences."
 banned_refugees:0 "Réfugiés Bannis"

 ### Country and Province modifiers for Escann
 escanni_refugee_assimilate_escann:0 "Assimilation des Réfugiés Escaniens"
 desc_escanni_refugee_assimilate_escann:0 "Les Escaniens sont revenus sur leurs terres, et les reconquièrent en nature. Les assimiler dans la population locale prendra du temps, mais c'est une entreprise digne."
 escanni_refugee_homecoming_escann:0 "Foyer des Escaniens"
 desc_escanni_refugee_homecoming_escann:0 "Les Escaniens sont rentrés chez eux, leur foyer et le nôtre aussi. L'assimilation dans notre société est plutôt douce car nous partageons beaucoup de choses."
 progressive_nation_refugee_escann:0 "Monstres Progressistes"
 desc_progressive_nation_refugee_escann:0 "Même si nous sommes des « monstres » pour les réfugiés, nous ne sommes pas assez monstrueux pour rabrouer ceux qui ont déjà tout perdu."
 nice_people_with_refugee_escann:0 "Gentils Monstres ?"
 desc_nice_people_with_refugee_escann:0 "Les réfugiés furent très surpris quand nous fûmes quelque peu gentils avec eux, peut-être qu'il y a une voie vers la paix à atteindre dans le futur lointain."
 mean_people_with_refugee_escann:0 "Monstres Monstrueux"
 desc_mean_people_with_refugee_escann:0 "Ils nous haïssent, alors nous les haïssons. Un cycle simple et efficace, et ce n'est pas comme si nous nous soucions de leur opinion de toute façon."









 ### Event loc

 #The final flight of the Escanni
 escanni_refugees_settlement.100.t:0 "La Dernière Fuite des Escaniens"
 escanni_refugees_settlement.100.d:0 "Il y a vingt ans, l'une des grandes catastrophes de l'Histoire s'abattit sur l'Escann, une marée de vert apparemment sans fin se déversant hors de l'Échine-du-Serpent pour dévaster les royaumes en surface. Un à un les royaumes d'Escann tombèrent, et dans la confusion et le chaos d'innombrables habitants perdirent la vie. Beaucoup fuirent vers l'ouest pour chercher un havre sûr, se dispersant à travers le continent vers des refuges de Bayvic à Nathalaire, mais seuls les quelques chanceux y parvinrent.\nPendant vingt ans, vague après vague de réfugiés sont arrivés aux frontières de nos royaumes, une famille déchirée à la fois.\nMais aujourd'hui, enfin, le dernier groupe de réfugiés nous a atteints. Aujourd'hui la fuite des Escaniens prend fin.\n\nMaintenant est venu le temps de regarder vers l'avant et construire un avenir aux côtés de nos nouveaux habitants. Le chemin sera peut-être rocailleux, comme nous l'avons déjà vu dans le passé, mais la seule voie maintenant est vers l'avant."
 escanni_refugees_settlement.100.d2:0 "Durant la Marée Verte, nombre d'habitants d'Escann fuirent vers l'ouest. Par les efforts combinés de Gawed, Arbaran et Damescrown, ces réfugiés furent accueillis à travers le Cannor occidental et distribués autour de la Tête-de-Dame. Cette crise des réfugiés apporta avec elle une vague de nouvelles idées, car parmi ceux qui fuirent l'Escann se trouvaient nobles, érudits et chevaliers. Mais elle mit aussi sous pression des nations occupées à combattre dans la quatrième Guerre Lilas, conduisant certaines nations à refuser les réfugiés.\nNotre royaume n'a pas été capable ou disposé à participer à l'effort d'aide aux réfugiés jusqu'à récemment ; certains réfugiés cherchent maintenant abri dans nos terres, et c'est à nous de les accommoder jusqu'à ce qu'ils s'installent ou espérons-le reconquièrent l'Escann."
 escanni_refugees_settlement.100.a:0 "Seul le temps dira si c'est une aubaine ou non."
 escanni_refugees_settlement.100.b:0 "Nous essaierons de les aider à s'installer."
 escanni_refugees_settlement.100.c:0 "Parfait, plus de dépendants, ils devront prendre soin d'eux-mêmes."
 escanni_refugees_settlement.100.e:0 "Aidons-les à retourner rapidement en Escann."
 escanni_refugees_settlement_100_tt:0 "À l'avenir nous devrons gérer les réfugiés dans nos terres.\n"

 #Escann Stands
 escanni_refugees_settlement.101.t:0 "Escann Tient Bon"
 escanni_refugees_settlement.101.d:0 "« Escann Tient Bon »\nCes mots sont sur les lèvres des crieurs publics et marchands, à l'exclusion de tout le reste. Même depuis la fenêtre de la salle de réunion à [This.Capital.GetCapitalName], nombre de gens du commun et réfugiés peuvent être vus se rassemblant autour d'un tel crieur et écoutant leurs récits, captivés.\nÀ l'intérieur de la salle de réunion une scène différente se joue, mais la question en jeu est la même. Un émissaire du [From.GovernmentName] de [From.GetName] se tient face à [This.Monarch.GetTitle] [This.Monarch.GetName]. Sa charge est simple ; il porte avec lui le message suivant :\n« Escann Tient Bon, la Marée Verte est terminée et tous ceux qui souhaitent aller au [From.GovernmentName] de [From.GetName] sont bienvenus ! »."
 escanni_refugees_settlement.101.a:0 "L'ère de la Marée Verte pourrait être proche de sa fin."

 #The call of Home
 escanni_refugees_settlement.102.t:0 "L'Appel du Foyer"
 escanni_refugees_settlement.102.d:0 "« Foyer ». Pour les réfugiés escaniens ce mot a une connotation différente que pour notre peuple. Pour eux « Foyer » est quelque chose de perdu, quelque chose qui fut détruit et arraché d'eux. Ainsi lorsque les Escaniens disent qu'« ils rentrent chez eux », ils ne le disent pas à la légère.\nLa reconquête d'Escann a maintenant commencé pour de bon, des états naissants s'établissant dans les ruines fumantes d'Escann. Même si la plupart sont d'anciennes bandes d'aventuriers qui ont saisi l'opportunité de réclamer les richesses d'une terre abandonnée, ils cherchent maintenant à rappeler chez eux les anciens habitants d'Escann.\nLa plupart de ces nouvelles nations ont maintenant dépêché des messagers à travers le Cannor occidental, répandant le mot que les Escaniens ont maintenant une patrie où revenir. Et nombre de réfugiés écoutent cet appel, partant un groupe à la fois vers l'Est.\n\nNous ne pouvons les arrêter par la force, mais nous pouvons choisir d'aider leur entreprise ; après tout, l'Escann est toujours un endroit dangereux. Que dites-vous mon [This.Monarch.GetTitle] ?"
 escanni_refugees_settlement.102.a:0 "Ils peuvent appeler cette terre « Foyer » aussi s'ils le veulent."
 escanni_refugees_settlement.102.b:0 "Bon débarras."
 escanni_refugees_settlement_102_b_tt:0 "Ils n'atteignent pas l'Escann."
 escanni_refugees_settlement.102.c:0 "Nous fournirons une escorte, pour protéger leur convoi."
 escanni_refugees_settlement_102_c_tt:0 "Ils atteignent l'Escann."
 escanni_refugees_settlement.102.e:0 "CTD évité, signalez le bogue."
 escanni_not_migrating_tt:0 "Les réfugiés resteront sous nos soins."
 escanni_migrating_tt:0 "Les réfugiés partiront pour l'Escann."
 escorted_refugees_back:0 "Réfugiés escortés de retour"
 didnot_support_refugees:0 "N'a pas soutenu les réfugiés"

 #Result of our refugee policy
 escanni_refugees_settlement.103.t:0 "Résultat de notre Politique de Réfugiés"
 escanni_refugees_settlement.103.d:0 "C'est une petite chose, d'entendre des enfants rire ensemble en jouant, mais c'est une paix retrouvée pour les Escaniens. Les parents dans les foyers escaniens racontent des histoires où le folklore local est réinterprété de leur point de vue, et des plats de base escaniens réimaginés avec viandes et légumineuses locales sont servis à leurs enfants. Il n'y a plus de division entre eux et nous. Nous nous voyons maintenant comme nous sommes vraiment. Nous partageons tous ces terres, et ils sont bienvenus ici."
 escanni_refugees_settlement.103.d2:0 "Indifférence et fatigue : voilà comment la plupart de nos citoyens décriraient leurs sentiments concernant les réfugiés dans nos terres. Ce n'est pas nécessairement en pire ; nous nous tolérons mutuellement, et c'est un minimum si nous désirons vivre sur les mêmes terres.\nCes dernières années la situation dans les communautés de réfugiés a évolué conformément à cette politique. Bien que nous puissions toujours essayer d'influencer le déroulement et les résultats de cette évolution, cela pourrait se révéler coûteux.\n\nQuelle sera notre direction ?"
 escanni_refugees_settlement.103.d3:0 "Notre relation avec les réfugiés s'est grandement aigrie ces dernières années. Certaines politiques que nous avons mises en place les ont grandement contrariés, et maintenant les répercussions peuvent être ressenties dans toute implantation de réfugiés. Ils ne sont pas hostiles envers nous, mais ils ont clairement serré les rangs et ne désirent pas rester ici.\nIls accueillent très favorablement notre soutien pour leur retour en Escann, et nous remercient de leur permettre de rentrer « Chez Eux ». Pourtant, ils ne connaissent pas les dangers qui rôdent encore en Escann ; devrions-nous les avertir ou fournir une escorte ? Ils pourraient ne pas y arriver si nous restons inactifs."
 escanni_refugees_settlement.103.a:0 "Nous les escorterons en sécurité vers leur nouveau foyer."
 escanni_refugees_settlement.103.b:0 "Ils sont libres de partir, mais nous ne les aiderons pas."
 escanni_refugees_settlement.103.c:0 "Essayons d'améliorer leur situation."
 escanni_refugees_settlement.103.e:0 "Nous accueillons nos nouveaux citoyens à bras ouverts."

 #Escanni event manager WEscann side
 escanni_refugees_settlement.300.t:0 "Gestionnaire d'événement Escanien côté Escann"
 escanni_refugees_settlement.300.d:0 "Vous n'êtes pas censé voir ceci !"
 escanni_refugees_settlement.300.a:0 "DebugA"
 escanni_refugees_settlement.300.b:0 "DebugB"
 escanni_refugees_settlement.300.c:0 "DebugC"
 escanni_refugees_settlement.300.e:0 "DebugE"

 #Infamous robbers
 escanni_refugees_settlement.301.t:0 "Des Voleurs Infâmes se Révèlent être des Réfugiés Escaniens"
 escanni_refugees_settlement.301.d:0 "Les vols ont monté en flèche à travers [This.GetName] ces dernières années ; après enquête, il s'est révélé qu'un groupe de réfugiés devenus voleurs étaient les coupables. La bande a volé des gens de tous horizons, pillant tout de la nourriture aux objets précieux, mais ils n'ont jamais eu recours à la violence pure.\nIls ont été amenés à [This.Capital.GetCapitalName] pour être jugés. Notre peuple exige que justice leur soit rendue au fil de l'épée. Il n'y a aucun doute qu'ils soient coupables ; des preuves accablantes ont été procurées.\nPourtant les voleurs prétendent qu'ils n'avaient pas le choix que de se tourner vers le banditisme à cause de leurs conditions de vie. Comme ils jugent leur cause juste, ils exigent un procès par combat comme leurs traditions le dictent.\n\nDevrions-nous céder à leur ridicule requête ou les traiter comme nous le ferions pour n'importe quels autres voleurs ?"
 escanni_refugees_settlement.301.a:0 "La loi s'occupera de cela en conséquence."
 escanni_refugees_settlement.301.b:0 "Peut-être que notre traitement des réfugiés est mauvais, nous sommes à blâmer."
 escanni_refugees_settlement.301.c:0 "Laissons-les avoir un procès par chevalerie comme leur tradition le dicte."
 escanni_refugees_settlement.301.e:0 "Ils ne sont que des voleurs de toute façon, saisissons leurs biens et bannissons-les."

 #Artisans complain
 escanni_refugees_settlement.302.t:0 "Des Artisans se Plaignent de la Concurrence Non Régulée"
 escanni_refugees_settlement.302.d:0 "Un nouveau bien populaire s'est répandu dans [This.GetName] : de petits bibelots sculptés dans le bois et façonnés avec de la paille, représentant des cavaliers et chevaliers étrangers. Bien que cela ne soit pas quelque chose de complètement nouveau en soi, l'origine de ces bibelots l'est. Ils sont manufacturés par des réfugiés escaniens comme moyen de gagner de l'argent, ces symboles d'une culture étrangère très populaires parmi nos nobles et concurrençant maintenant même directement certains fabricants de jouets locaux.\nEn soi ce n'est pas un problème, pour nous en tout cas. Mais les artisans locaux se plaignent que les réfugiés opèrent en dehors de toute guilde, présentant ainsi une concurrence déloyale. Ainsi les guildes se sont avancées et nous ont demandé d'intervenir, car elles ne veulent porter aucune responsabilité à ce sujet.\n\nQuelle devrait être notre approche ?"
 escanni_refugees_settlement.302.a:0 "Faisons en sorte que la guilde engage ces artisans escaniens, eux aussi doivent opérer sous nos régulations."
 escanni_refugees_settlement.302.b:0 "Nous ne pouvons avoir nos artisans surpassés par des réfugiés et vagabonds."
 escanni_refugees_settlement.302.c:0 "Rien n'est aussi doux que le travail gratuit."
 escanni_refugees_settlement.302.e:0 "Les bons artisans sont toujours bienvenus en Esmarie."

 #Stories of the Greentide rouse our people
 escanni_refugees_settlement.303.t:0 "Les Récits de la Marée Verte Éveillent notre Peuple"
 escanni_refugees_settlement.303.d:0 "Les réfugiés dans nos terres ont fui la Marée Verte et le chaos de la guerre apportée par les hordes orques, et ils ont été témoins de nombreuses horreurs en Escann : du soldat qui survécut aux lignes de front, voyant ses frères d'armes déchiquetés tandis que leurs entrailles éclaboussaient sur lui, au père incapable de sauver sa femme et son fils de l'horreur de la famine durant leur exode.\nDe tels récits et contes éprouvants sont souvent partagés avec les habitants des villes et villages qui vivent près de leurs implantations, les agitant et troublant les masses.\nPeur et colère se répandent au sein de notre population, toutes dirigées vers les orques et gobelins de la Marée Verte pour les horreurs qu'ils ont causées. La panique pourrait se répandre si laissée sans contrôle ; cela pourrait être un problème, mais pourrait aussi être exploité à notre bénéfice.\n\nQuelle sera notre ligne de conduite ?"
 escanni_refugees_settlement.303.a:0 "J'ai moi aussi entendu les récits, et leur colère est justifiée."
 escanni_refugees_settlement.303.b:0 "Apaisons les masses, notre peuple n'a pas besoin d'être ainsi agité."
 escanni_refugees_settlement.303.c:0 "Ils menacent la paix dans nos terres, sévissons contre les conteurs."
 escanni_refugees_settlement.303.e:0 "Ils devraient essayer d'être plus ouverts d'esprit."
 escanni_refugees_settlement.303.f:0 "Ils seront vengés, je le jure."

 #Distinguished refugees wish to join our court
 escanni_refugees_settlement.304.t:0 "Des Réfugiés Distingués Souhaitent Rejoindre notre Cour"
 escanni_refugees_settlement.304.d:0 "Ceux qui fuirent l'Escann n'étaient pas tous des paysans ou artisans ; certains étaient plus distingués. Des commerçants qualifiés, nobles et même des commandants renommés fuirent quand leurs royaumes tombèrent aux mains des Orques.\nDe telles figures ont trouvé leur chemin vers nos terres et sont maintenant venues solliciter à rejoindre nos rangs - pour une récompense appropriée, bien sûr.\nEngager de tels individus talentueux serait sage et pourrait nous fournir des atouts précieux dans notre cour, mais tous n'apprécieront pas leur présence. Nos propres nobles et érudits pourraient se sentir offensés par notre décision, et ainsi nous devons exercer la prudence.\n\nMon [This.Monarch.GetTitle], quelle est votre sagesse ?"
 escanni_refugees_settlement.304.a:0 "Le commerce ne connaît pas de frontières."
 escanni_refugees_settlement.304.b:0 "Recrutons le commandant, qu'il nous enseigne la voie escanienne de l'épée."
 escanni_refugees_settlement.304.c:0 "Nous avions besoin de rénover la décoration de nos halls, c'est une bonne opportunité."
 escanni_refugees_settlement.304.e:0 "Ce sont des réfugiés, pas des migrants. Ils resteront comme tels."
 escanni_refugees_settlement.304.f:0 "Tous ceux qui souhaitent nous rejoindre le pourront, engageons-les tous."

 #Exiled soldiers wish to join the reclamation of Escann
 escanni_refugees_settlement.305.t:0 "Des Soldats Exilés Souhaitent Rejoindre la Reconquête d'Escann"
 escanni_refugees_settlement.305.d:0 "Les rumeurs du succès bourgeonnant que les compagnies d'aventuriers accomplissent en Escann se sont répandues dans les communautés de réfugiés et certains semblent désirer rejoindre les aventuriers pour combattre pour leurs terres. La première requête officielle d'être entraînés au combat puis guidés de retour en Escann nous a été délivrée ce matin.\nCes hommes et femmes semblent assez robustes, mais la plupart d'entre eux n'ont pas encore vu le combat ; les envoyer directement en Escann serait probablement les envoyer à leur mort. Nous pourrions respecter leurs souhaits et les entraîner avant qu'ils ne rejoignent la reconquête d'Escann.\nL'autre option est d'utiliser leur désir de bataille à nos propres fins, car nous avons toujours besoin de plus d'hommes pour nos armées.\n\nQue ferons-nous d'eux ?"
 escanni_refugees_settlement.305.a:0 "Enrôlons-les dans notre armée, ils seront utiles."
 escanni_refugees_settlement.305.b:0 "Ils ont le droit de combattre pour leurs terres ; dirigeons-les vers des compagnies d'aventuriers."
 escanni_refugees_settlement.305.c:0 "Ils ne devraient pas gaspiller leurs vies sur des désirs malavisés."

 #Food supplies strained by overpopulation
 escanni_refugees_settlement.306.t:0 "Provisions Alimentaires Sous Tension par la Surpopulation"
 escanni_refugees_settlement.306.d:0 "Ce que nous craignions s'est réalisé, les greniers dans de multiples villes sont presque vides. Il y a simplement trop de bouches à nourrir, les provisions et infrastructures de notre nation incapables de gérer à la fois la population de réfugiés et nos citoyens. Quelque chose doit être fait et nous devrons peut-être choisir qui nourrir. La famine est à l'horizon si nous n'agissons pas ; même pas les souris ne peuvent trouver subsistance, les corbeaux et les corneilles ont commencé à fuir vers d'autres régions et sont chassés comme volaille de subsistance.\nJusqu'à présent notre planification et rationnement se sont révélés inefficaces et après un hiver rude et un été sec nous n'avons presque plus rien. Certains de nos alliés pourraient être capables d'aider, si notre bourse ne fait pas l'affaire bien sûr.\nMais si nous ne voulons pas que notre peuple ait faim nous devons prendre une décision, une qui pourrait être dure ; personne ne devrait mourir de faim, mais valorisons-nous les vies des réfugiés autant que celles de notre propre peuple ?\n\nQue ferons-nous ?"
 escanni_refugees_settlement.306.a:0 "Importons tout ce dont nous avons besoin, personne ne mourra de faim dans nos terres."
 escanni_refugees_settlement.306.b:0 "Mettons en place le rationnement des provisions que nous avons, espérons que cela suffise."
 escanni_refugees_settlement.306.c:0 "Nos mains sont liées, préparons-nous au pire."
 escanni_refugees_settlement.306.e:0 "Nos alliés nous soutiennent, nous leur demanderons une faveur."
 escanni_refugees_settlement.306.f:0 "Détournons nos exportations pour aider les réfugiés."

 #Escanni Hedge-Mages run rampant!
 escanni_refugees_settlement.307.t:0 "Des Mages-de-Haie Escaniens Sévissent !"
 escanni_refugees_settlement.307.d:0 "Des sorciers et sorcières escaniens ont voyagé et se sont installés dans nos terres avec les réfugiés. Avec le chaos de la Marée Verte, beaucoup se sont retournés contre le dogme du Magisterium et opèrent sans licence. Ils sont appelés « Sorciers-de-Haie » ou « Mages-de-Haie », et en pratiquant leur magie illégalement, ils posent une menace à notre règne et à l'emprise du Magisterium sur la sorcellerie.\nAucun incident ne s'est produit encore mais le risque grandit avec le temps. Il y a de multiples solutions que nous pourrions employer : sur le papier c'est le devoir du Magisterium de gérer cela, mais qu'ils en soient à la hauteur ou non est une autre question. Nous pourrions aussi faire intervenir nos propres sorciers, car ils sont plus qu'impatients de le faire. Ou, comme aucun problème ne s'est encore posé, nous pourrions laisser les Mages-de-Haie faire leur truc, ils pourraient être inoffensifs.\nQue ferons-nous concernant ces Mages-de-Haie ?"
 escanni_refugees_settlement.307.a:0 "Envoyons nos propres sorciers, ils feront le travail."
 escanni_refugees_settlement.307.b:0 "Le Magisterium sait comment mieux gérer cela."
 escanni_refugees_settlement.307.c:0 "Peu importe, le Magisterium devrait rester hors de nos affaires."
 escanni_refugees_settlement.307.e:0 "Le Magisterium ne fait clairement pas correctement son travail, recrutons ces mages sauvages."
 escanni_refugees_settlement.307.f:0 "Ils sont assez audacieux pour essayer cela ici."
 escanni_refugees_settlement.307.g:0 "Je m'occuperai de cela moi-même."
 escanni_warwizard_tt:0 "Un sorcier de guerre escanien (2/8/1/4) sera disponible pour servir."

 #Escanni scholars seek refuge
 escanni_refugees_settlement.308.t:0 "Des Érudits Escaniens Cherchent Refuge"
 escanni_refugees_settlement.308.d:0 "Nombre d'érudits et artistes ont fui l'Escann et se sont dispersés à travers le Cannor. Ils cherchent refuge dans notre cour, et disent qu'ils partageront avec nous ce qu'ils ont réussi à sauver d'Escann. Ils ont apporté avec eux quelques-uns des grands arts des cours escaniennes et quelques secrets cachés dans les bibliothèques castellyriennes.\nSi nous devions les accommoder, cela apporterait sûrement un renouveau culturel, possiblement même une renaissance d'idéaux chevaleresques dans notre société, spécialement si nous devions leur donner des fonds pour répandre leurs voies.\nCertains parmi la cour pensent qu'une telle pensée escanienne est inutile pour nous et pourraient préférer que nous nous passions de ces érudits.\n\nFinancerons-nous cette entreprise ou garderons-nous pour nous ?"
 escanni_refugees_settlement.308.a:0 "Ils auront argent et reconnaissance !"
 escanni_refugees_settlement.308.b:0 "Nous pouvons répandre leurs idées, mais nous n'avons pas les fonds pour les engager."
 escanni_refugees_settlement.308.c:0 "La pensée escanienne est une chose du passé, nous n'avons pas besoin de fossiles dans notre cour."

 #Sickness strikes the refugee camps
 escanni_refugees_settlement.309.t:0 "La Maladie Frappe les Camps de Réfugiés"
 escanni_refugees_settlement.309.d:0 "Tout a commencé dans une ruelle tordue entre deux baraques de fortune, une toux mineure. Une chose si simple vraiment, peut-être même juste une maladie commune apportée de l'étranger. Mais avec les conditions de vie dans les implantations de réfugiés étant ce qu'elles sont, cette maladie s'est répandue comme un feu de forêt dans leurs communautés. Maintenant les camps de réfugiés sont criblés de maladie. La seule chose se répandant plus vite que l'affliction est la peur et toutes sortes de rumeurs circulent ; certains disent même que cela pourrait être le second avènement de la Peste Blanche, une affirmation sans fondement.\n\nMaintenant la maladie menace de se répandre aux villages et implantations voisins de nos propres habitants. Si nous ne mettons pas cela sous contrôle bientôt, tout notre territoire pourrait être englouti par cette maladie. Nos officiels suggèrent de mettre les réfugiés en quarantaine et de leur envoyer de l'aide ; cela serait coûteux, mais si nous n'aidons pas les réfugiés, leur destin est probablement scellé. Nous pouvons aussi prioriser la sécurité de notre propre peuple, au coût du bien-être des réfugiés.\n\nNous devons agir vite et décisivement, quelle sera notre ligne de conduite ?"
 escanni_refugees_settlement.309.a:0 "Mettons l'implantation en quarantaine et envoyons des équipes de médecins à l'intérieur pour aider."
 escanni_refugees_settlement.309.b:0 "Envoyons des biens aux réfugiés, mais personne n'entre ou ne quitte cet endroit."
 escanni_refugees_settlement.309.c:0 "Qu'est-ce qu'une petite maladie va faire ? Nous avons affronté pire avant."
 escanni_refugees_settlement.309.e:0 "Coupons le camp de l'extérieur, nous ne prendrons aucun risque."

 #Refugees spread Corinite ideas
 escanni_refugees_settlement.310.t:0 "Les Réfugiés Répandent les Idées Corinites"
 escanni_refugees_settlement.310.d:0 "Quand Corin rejoignit la Cour Régente en 1445, nombre de réfugiés escaniens se dévouèrent à elle, voyant Corin comme leur héroïne et celle qui mit fin à la Marée Verte. Des décennies plus tard avec la Proclamation Corinite, une majorité de réfugiés restant dans le Cannor Occidental se convertirent et certains de notre peuple semblent être influencés par eux.\nSi nous n'agissons pas, ils pourraient convaincre certains de nos propres gens de se tourner vers le Corinisme. Ce n'est pas nécessairement un souci, mais garder les choses sous contrôle tant que nous le pouvons encore pourrait être préférable, car ces croyances hérétiques pourraient se répandre encore plus loin.\n\nNous pouvons les laisser tranquilles, mais une telle autonomie pourrait être une menace pour nous à long terme. Devrions-nous les réprimer ?"
 escanni_refugees_settlement.310.a:0 "Laissons-les tranquilles, leur foi est leur choix."
 escanni_refugees_settlement.310.b:0 "Sévissons contre l'hérésie et essayons de les reconvertir ?"
 escanni_refugees_settlement.310.c:0 "Nous ne tolérerons pas d'hérétiques parmi nous, renvoyons-les."
 escanni_refugees_settlement.310.e:0 "Corin fait aussi partie de la cour."
 escanni_refugees_settlement.310.f:0 "Ils ont fait un choix sage."

 #City of Exiles - Bayvic
 escanni_refugees_settlement.311.t:0 "La Cité des Exilés"
 escanni_refugees_settlement.311.d:0 "Robyn aimait se tenir près des docks après le travail, et regarder les eaux du Bluebroddr rencontrer les vagues de la Mer de la Tombe du Géant. C'était apaisant, après une longue journée d'être garçon boucher, bien qu'il considérât même alors sa chance ; l'un de ses frères était apprenti tanneur.\n\nIls avaient parcouru un long chemin depuis leur foyer près de la forteresse en ruines de Bal Mire. Le voyage à travers les Grandsbois avait été long et dur, et Robyn avait connu nombre de voisins arrachés par les monstres dans ces bois sombres. Ils avaient allumé des feux et murmuré des prières à Agrados, ne serait-ce que pour la volonté de persister. C'était seulement avec grande chance qu'ils avaient réussi à atteindre Bayvic. Et à Bayvic, ils avaient trouvé une étrange sorte de parenté, non avec les Réachéens Bleus mais avec les autres réfugiés. Les Réachéens Blancs, et les Tariques et Cagodiques du Passage Septentrional. Ils étaient tous parents, d'une étrange et désolée manière.\n\nPeut-être que son peuple et les autres réfugiés venus en ce lieu étaient comme la rivière qu'il contemplait chaque jour. Ils coulaient loin, et quand ils atteignaient leur nouveau foyer, ils ne mouraient pas, mais devenaient plutôt quelque chose de nouveau."
 escanni_refugees_settlement.311.a:0 "Tous sont bienvenus dans la Baie."

 #Eastern bodyguards - Nathalaire
 escanni_refugees_settlement.312.t:0 "Les Gardes du Corps de l'Est"
 escanni_refugees_settlement.312.d:0 "Pendant vingt ans, Sire Yorric avait été un homme d'honneur et de dignité. Il avait été chevalier, comme son père et sa lignée avant lui, servant les Marchesdelame, avec son Roi choisi parmi ceux dignes de manier la lame étincelante.\n\nEt puis les orques vinrent, et le brave sire Yorric se retrouva sur un bateau, fuyant en descendant le Dostanesck avec sa famille et le peu qu'ils pouvaient porter. Tout au long du voyage, il affronta gnolls et bandits et pire, murmures dans le marais, choses qui le hantent maintenant autant que la Marée Verte elle-même.\n\nEn une semaine, Yorric manqua d'argent, et face à sa famille dormant dans les rues, il conclut un pacte avec un démon. Pour son nouvel employeur il était un poing d'acier, forçant les débiteurs à cracher des couronnes et servant d'avertissement silencieux lorsqu'il se tenait aux côtés du misérable dans des réunions avec ses compagnons seigneurs-vagabonds.\n\nSa femme lui disait qu'il était un héros, qu'il était la raison pour laquelle elle et leurs deux enfants pouvaient manger chaud et dormir dans des lits chauds, et chaque fois qu'il rentrait chez lui sain et sauf, il la croyait. Mais quand il quittait son foyer, il n'était pas un héros, pas un honorable chevalier du royaume ; il était une brute, battant les hommes pour le peu qu'ils avaient."
 escanni_refugees_settlement.312.a:0 "Telle est la volonté de la cité."

 #Memory of Prince Jon - Gawed
 escanni_refugees_settlement.313.t:0 "En Mémoire du Prince Jon"
 escanni_refugees_settlement.313.d:0 "Marile se souvenait de quand le Roi Welyam vint à Ferrham. Elle se souvenait de la lumière de fin de matinée qui scintillait sur les heaumes et lances des cavaliers. Elle se souvenait du Roi, un garçon seulement à peine plus âgé qu'elle, les débuts d'une barbe et des yeux bleus comme rivières, sombres et aigus.\n\nIl descendit de cheval et, chose assez étrange, offrit à chacun d'eux du pain et du sel, ce qui son père dit était une coutume Gawédienne entre hôtes et leurs invités. Pour les plusieurs nuits suivantes, il y eut festoiement et célébration, bien que le Roi semblât mal à l'aise, son regard dardant autour de la salle et sursautant presque hors de son siège quand elle lui servit de la bière. Il était silencieux, et la plupart de ses paroles étaient avec les anciens, s'assurant qu'ils étaient bien traités par leur seigneur et autres implantations.\n\nLe dernier jour, il donna un discours au crépuscule. Il parla du peuple de Marile et leur rude voyage depuis l'est, échappant à la Marée Verte dans l'Étendue Alénique. Et il parla de son père, qui les avait escortés et leur avait permis de s'installer dans le royaume septentrional, et s'était rallié avec de vieux ennemis pour arrêter les orques à Rottenstep, donnant sa vie pour eux. Il termina son discours avec un serment, de faire pour eux comme son père l'avait fait, qu'ils restent ou partent.\n\nAvant que le matin ne vienne, il était parti, chevauchant vers l'ouest, et bien que Marile ne le reverrait jamais, elle verrait souvent ses soldats patrouiller à proximité."
 escanni_refugees_settlement.313.a:0 "L'héritage du Prince Jon est porté par nous maintenant."

 #The Valiant Charge of Varil Silcalas - Arbaran
 escanni_refugees_settlement.314.t:0 "La Vaillante Charge de Varil Silcalas"
 escanni_refugees_settlement.314.d:0 "Varil Silcalas naquit à Rottenstep. Il se souvenait de la bataille au sein du marais, dans l'ombre imposante d'une forteresse en ruines ; ils tinrent la ligne contre la Marée Verte, contre Korgus Dookanson. Il se souvenait de la ligne craquant, se fissurant, se brisant comme bois contre le ciseau. Ce fut le Prince Gawédien Jon qui donna l'ordre : En selle, chevauchez à travers la horde, poussez au centre, tuez Dookanson.\n\nEt ainsi il advint que Varil et ses Chevaliers Magnifiques chevauchèrent avec les Lorentais, Bennoniens, et les Gawédiens. La lance de Varil frappa maints orques tandis que la charge de cavalerie improvisée percuta l'opposition, comme une lame à travers l'eau. Beaucoup périrent ce jour, beaucoup de ses frères, et beaucoup qu'il avait considérés grands et honorables. Mais à la fin, ils avaient repoussé la Marée Verte, ils se trouvèrent un nouveau héros autour duquel se rallier, et Varil se trouva un nouveau dieu à adorer.\n\nVaril Silcalas naquit à Rottenstep. Bien sûr, avant cela il avait été élevé, entraîné, et s'était trouvé des frères jurés au sein des nombreuses bannières colorées des Chevaliers Magnifiques. Mais à Rottenstep ? Varil Silcalas avait montré sa valeur."
 escanni_refugees_settlement.314.a:0 "Du bord de la défaite, à la victoire retentissante."

 #The Legacy of Dameria
 escanni_refugees_settlement.315.t:0 "L'Héritage de Damérie"
 escanni_refugees_settlement.315.d:0 "« Tu sais... peut-être que nous ne sommes pas si différents, toi et moi », murmura le mercenaire grisonnant.\nDevant lui, un groupe de réfugiés blottis sous un arbre, leur tente de fortune offrant peu contre le froid de la nuit. Ils n'avaient pas encore trouvé de maison à appeler leur.\n« Comment cela ? » demanda un jeune garçon, ses yeux curieux fixés sur le vétéran. C'était la première fois qu'il avait eu le courage de parler à l'homme, dont le visage était orné de cicatrices mal guéries.\n« Jadis, tu avais un royaume à appeler tien. Et jadis, moi aussi. Mais nous sommes tous deux maintenant des gens sans foyer, jetés à la dérive par des destins cruels. »\nIl marqua une pause, son regard distant.\n« Tu dors dans une tente parce que ta maison fut détruite par la Marée Verte. Un terrible destin – j'en suis désolé. Ma perte... Certains disent que la lune de Damérie ne fut jamais brisée, seulement cachée derrière les nuages d'orage tissés par des traîtres – usurpateurs d'un héritage qui ne fut jamais le leur à revendiquer. »\n« Damérie fut trahie ? » Le garçon escanien regardait intensément, impatient de montrer qu'il suivait.\n« Oui, mon garçon », soupira le mercenaire. « Tu as fui des terres prises par des envahisseurs étrangers. Les miennes tombèrent face à un pire genre d'ennemi – Le sien propre. »\nUn silence s'étira entre eux, épais de chagrin. Puis, après un moment, le garçon parla une fois encore.\n« Monsieur... pourriez-vous me dire comment cela s'est produit ? »"
 escanni_refugees_settlement.315.a:0 "« Oui... mais je t'en prie, ne m'appelle pas 'monsieur'. Dans ce destin, nous sommes camarades de perte. »"
 escanni_refugees_settlement.315.b:0 "« J'en ai assez dit. Certaines blessures sont trop vives pour être rouvertes, et celle-ci saigne encore. »"
 escanni_refugees_settlement.315.c:0 "« Je peux... Écoute bien, que cette histoire guide ta main de retour en Escann. »"
 escanni_refugees_settlement.315.e:0 "Tandis que le mercenaire ouvrait la bouche pour parler, des gardes arrivèrent, son histoire ne devait jamais être racontée."
 escanni_refugees_settlement.315.f:0 "« Nos cœurs pleurent pour Damérie... et pour Escann, rien de plus que fantômes de ce qui fut jadis. »"

 #A Party on the River
 escanni_refugees_settlement.316.t:0 "Une Fête sur la Rivière"
 escanni_refugees_settlement.316.d:0 "« Allez ! Vis un peu ! » cria la femme esmarie, sa voix lumineuse de rire.\nElle était vêtue d'un corsage de cuir serré, contraste frappant avec la réfugiée escanienne face à elle – une demi-elfe dans une robe simple de tons terreux. Autour d'elles, les restes dispersés de l'ancien Royaume de Farranéan avaient trouvé refuge en Esmarie, s'accrochant à l'espoir que des racines partagées pourraient suppléer les racines perdues du Scogtrín.\n\n« C'est ainsi que nos fêtes fluviales paraissaient chez nous, sur les rives du Cogaulúis. » Le sourire de la femme Farrani est calme, peut-être un peu tendu. « Je suppose que nos barges étaient plus ornées que celles-ci, mais... cela suffit. Nous avons de la musique, les marchands ont leurs marchandises aux étals... Nous avons de la nourriture aussi. »\nLa femme esmarie tourna son regard vers les deux barges dérivant paresseusement sur l'étroit cours d'eau. Son expression oscilla entre amusement et incrédulité.\n« Où sont les couleurs ? Où est la musique sauvage et palpitante ? Où est l'extase du son, de la boisson, des corps perdus dans la danse ? »\nPourtant tandis qu'elle regardait, un sentiment s'installa sur elle – un sentiment étrange et peu familier. Un désir, non pour la réjouissance qu'elle connaissait, mais pour quelque chose de plus calme. Quelque chose qu'elle n'avait jamais vécu, mais qui lui manquait d'une certaine manière tout de même."
 escanni_refugees_settlement.316.a:0 "« Eh bien... Je suppose que je peux te faire confiance pour gérer ce rassemblement par toi-même ? »"
 escanni_refugees_settlement.316.b:0 "« Ah, quel spectacle calme et sombre ! Viens – laisse-nous te montrer à quoi ressemble une véritable célébration ! »"
 escanni_refugees_settlement.316.c:0 "« Vous autres Escaniens ne cessez de nous surprendre. Il y a une beauté dans cette joie tranquille... »"

 #Infernal cultists
 escanni_refugees_settlement.317.t:0 "Des Cultistes de la Cour Infernale ont Infiltré le Royaume"
 escanni_refugees_settlement.317.d:0 "Il semble que certains des réfugiés dans nos terres ne sont pas ce qu'ils semblent. Un autel à Kazraeil maculé de sang d'origine inconnue a été découvert dans une implantation de réfugiés - preuve incontestable de pratique active de Culte Infernal. Des gardes ont été postés à proximité et les réfugiés sont surveillés attentivement pour l'instant.\nUn groupe vocal de nobles appelle à un jugement rapide, arguant que les infernalistes sont trop dangereux pour être laissés seuls ; ils nous pressent de punir les accusés, et vite.\nDans des circonstances normales ce serait le cas, mais l'autel à Kazraeil semble suspect et notre enquête n'est pas concluante quant à savoir si ce sang était réel ou non, de plus les quelques réfugiés arrêtés à proximité de l'autel affirment sincèrement - et semblent être - innocents.\n\nTout cela pourrait être une farce troublante qui est allée trop loin, une tentative de piéger les réfugiés, ou un signe de quelque chose de bien plus sinistre.\nQue ferons-nous, mon [Root.Monarch.GetTitle] ?"
 escanni_refugees_settlement.317.a:0 "Ce sont des accusations sans fondement ; c'est clairement une tentative de piéger les réfugiés."
 escanni_refugees_settlement.317.b:0 "Nous n'avons ni le temps ni les ressources pour gérer cela."
 escanni_refugees_settlement.317.c:0 "Refaisons l'enquête minutieusement : le coupable, réfugié ou non, sera banni."
 escanni_refugees_settlement.317.e:0 "Tout le lot est pourri. Adorateurs de démons ! Tous ! Bannissons-les tous !"
 escanni_refugees_settlement.317.f:0 "Plus de frères pour la cour."

 #Whispers in the Night
 escanni_refugees_settlement.318.t:0 "Murmures dans la Nuit"
 escanni_refugees_settlement.318.d:0 "Erel parcourait le col élevé, regardant vers son camp en contrebas. Encore deux morts, et un autre encore disparu ; quelque chose les chassait. Il avait parlé avec son peuple, et tous rapportaient le même coupable : quelque chose de grand et pâle, avec des yeux comme poignards et des cheveux comme plumes de corbeau. Vampire, sa grand-mère l'avait appelé, quand cela lui fut décrit. Erel n'était pas un homme superstitieux, mais il était difficile de ne pas croire les histoires, parcourant des bois sombres par une nuit sombre.\n\nIl ne savait pas ce que c'était, ni ses compagnons, mais ce n'était pas aussi humain que cela semblait. Il espérait que, quand ils atteindraient la prochaine implantation, ils pourraient alerter le seigneur local, qui espérons-le ferait quelque chose à ce sujet, ou au moins ferait quelque chose qui effraierait la bête et laisserait son peuple tranquille.\n\nMais jusque-là, il devrait prier pour le mieux, et espérer que ceux qu'il aimait atteindraient la sécurité."
 escanni_refugees_settlement.318.a:0 "Ce sont des accusations sans fondement ; c'est clairement une tentative de piéger les réfugiés."
 escanni_refugees_settlement.318.b:0 "Nous n'avons ni le temps ni les ressources pour gérer cela."
 escanni_refugees_settlement.318.c:0 "Refaisons l'enquête minutieusement : le coupable, réfugié ou non, sera banni."
 escanni_refugees_settlement.318.e:0 "Oh non... de toute façon."

 #Reclaiming Escann Ourselves
 escanni_refugees_settlement.319.t:0 "Reconquérir l'Escann Nous-Mêmes"
 escanni_refugees_settlement.319.d:0 "Un certain nombre de rapports nous sont parvenus de réfugiés escaniens emballant tout ce qu'ils ont et partant vers l'est pour réinstaller nos territoires nouvellement conquis en Escann. Les réfugiés semblent penser que nous reconquérons l'Escann dans leur intérêt et souhaitent vivre dans ces terres une fois encore.\nIls ont même étendu leurs remerciements à vous personnellement, mon [Root.Monarch.GetTitle] - il y a clairement un malentendu en jeu ici. Nous pourrions jouer le jeu ou clarifier la situation.\nAprès tout, bien que pour l'instant cela semble clairement bénéfique pour nous, ces réinstalleurs pourraient exiger à la fois autorité et droits fonciers une fois qu'ils se seront rétablis.\n\nDevrions-nous les laisser faire comme ils le souhaitent ?"
 escanni_refugees_settlement.319.a:0 "C'est une bonne idée, laissons-les installer les terres et travailler avec nous pour reconstruire l'Escann."
 escanni_refugees_settlement.319.b:0 "Ils peuvent partir, mais c'est nous qui contrôlons, ils n'auront pas libre cours."
 escanni_refugees_settlement.319.c:0 "Ils se sont mépris sur nos intentions, empêchons-les de partir."

 #Escanni event manager Escann side
 escanni_refugees_settlement.400.t:0 "Gestionnaire d'événement Escanien côté Escann"
 escanni_refugees_settlement.400.d:0 "Vous n'êtes pas censé voir ceci !"
 escanni_refugees_settlement.400.a:0 "Debug"

 #Former inhabitants return home
 escanni_refugees_settlement.401.t:0 "Les Anciens Habitants Rentrent chez Eux"
 escanni_refugees_settlement.401.d:0 "Un groupe de migrants a été repéré à nos frontières. Ils cherchent à venir dans nos terres et s'installer dans ce qu'ils appellent « Foyer ». Ce sont les anciens habitants de ces terres ; la plupart sont contents de ce que nous avons accompli, mais certains exigent que nous leur rendions certaines de leurs terres et maisons, citant d'anciens actes de propriété quasi-invérifiables.\nNous sommes ceux en position de pouvoir et que nous rendions leurs terres ou non, ils n'auront pas de motifs de protester. Mais pour sécuriser notre emprise sur les terres dépeuplées que nous reconquérons, plus de gens sont plus que bienvenus, et le prix de leur présence est d'accommoder ces gens qui vivaient ici auparavant. Nos courtisans argumentent que c'est un petit prix à payer pour la stabilité et légitimité qu'ils nous donnent.\n\nQue ferons-nous, mon [This.Monarch.GetTitle] ?"
 escanni_refugees_settlement.401.a:0 "Reconnaissons ces anciens actes fonciers, même si certains pourraient être frauduleux."
 escanni_refugees_settlement.401.b:0 "Rejetons les actes, ils peuvent chercher refuge ailleurs."
 escanni_refugees_settlement.401.c:0 "Ce sont leurs terres, et les nôtres"

 #Human settlers approach our borders
 escanni_refugees_settlement.402.t:0 "Des Colons Humains Approchent de nos Frontières"
 escanni_refugees_settlement.402.d:0 "[This.Monarch.GetTitle] ! Des colons humains ont été repérés près d'une de nos villes récemment conquises. Ils semblaient ne pas connaître le récent changement de propriétaire. Nous les avons capturés juste au cas où, afin qu'ils ne causent pas de problèmes.\nDevrions-nous les chasser de nos terres ? Il y a déjà assez d'humains ici.\nCeux-ci en particulier nous regardent avec des yeux mauvais ; s'ils devaient trouver des armes ils n'hésiteraient pas à les utiliser, je pense.\nQue faisons-nous ensuite [This.Monarch.GetTitle] ?"
 escanni_refugees_settlement.402.a:0 "Ce sont ceux déplacés par Korgus, montrons-leur pitié, permettons-leur de s'installer."
 escanni_refugees_settlement.402.b:0 "Renvoyons-les en sécurité, nous ne tuons pas à vue."
 escanni_refugees_settlement.402.c:0 "Ils peuvent rester, mais tout ce qu'ils ont apporté est nôtre maintenant."
 escanni_refugees_settlement.402.e:0 "Ils ne peuvent rester, faisons-les partir."

 #The Lost Sons of Escann
 escanni_refugees_settlement.403.t:0 "Les Fils Perdus d'Escann"
 escanni_refugees_settlement.403.d1:0 "Le jeune chef de la garde fait irruption dans la salle du conseil, tous les regards se tournant vers lui interrogativement. Avant que quiconque ne puisse le réprimander, il s'exclame :\n« Mon suzerain, il y a des gens à la porte du château, des centaines d'entre eux. »\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] prend un moment. [Root.Monarch.GetSheHe] hausse un sourcil.\n« Et en quoi cela justifie-t-il de faire ainsi irruption si soudainement ? Ce n'est pas la première fois que des aventuriers se sont ainsi présentés. Ils se disperseront avec le temps. »\n« Non mon [Root.Monarch.GetTitle], ce ne sont pas des aventuriers. Ce sont ceux qui fuirent vers l'ouest durant la Marée Verte, revenant vers ces terres - des familles de descendance castellyrienne qui souhaitent nous rejoindre, les héritiers légitimes du Castellyr d'antan. »\n\nAprès un moment de silence, [Root.Monarch.GetTitle] [Root.Monarch.GetName] se lève de [Root.Monarch.GetHerHis] siège et proclame :"
 escanni_refugees_settlement.403.d2:0 "Quand la Marée Verte vainquit nos armées, brisa les rangs de nos soldats, nous nous retirâmes vers les collines et montagnes du Marrvale. Nous appuyant sur le terrain difficile et les fortifications s'y trouvant, nous repoussâmes toute incursion supplémentaire. La plupart de nos frères escaniens n'eurent pas cette chance ; beaucoup moururent, et le reste fut exilé vers le Cannor Occidental.\n\nC'est un jour calme tandis que [Root.Monarch.GetTitle] [Root.Monarch.GetName] patrouille les fortifications de la Porte du Griffon, contemplant l'horizon tout en méditant sur les prochaines étapes pour reconquérir l'Escann et restaurer Marrhold à sa gloire passée. Arpentant les remparts, [Root.Monarch.GetSheHe] repère un grand groupe de gens se dirigeant vers les fortifications.\nL'alarme est sonnée tandis que la garnison se prépare au conflit. Mais tandis que le groupe se rapproche des murs, il est clair que les gens ne sont pas des aventuriers, pas des bandits et encore moins des orques. Ce sont des humains, la plupart en vêtements en lambeaux et quelques-uns légèrement armés.\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] les rencontre à la porte et apprend la raison de leur présence. Ce sont des réfugiés, ceux qui fuirent vers l'ouest ; ils sont revenus ici pour nous rejoindre et vivre en Escann une fois encore.\n\nQuelques jours plus tard [Root.Monarch.GetTitle] [Root.Monarch.GetName] proclame :"
 escanni_refugees_settlement.403.a:0 "« Que ce jour soit un symbole de ce que nous avons accompli ! »"
 escanni_refugees_settlement.403.b:0 "« Utilisons cette main-d'œuvre fraîche pour reconquérir les provinces voisines. »"
 escanni_refugees_settlement.403.c:0 "« Offrons-leur tous une place dans notre forteresse. »"

 #Refugee Dispute our Claim
 escanni_refugees_settlement.404.t:0 "Les Réfugiés Contestent notre Revendication"
 escanni_refugees_settlement.404.d:0 "L'afflux de réfugiés dans notre pays a été une aubaine jusqu'à présent, renforçant notre effort pour reconquérir et reconstruire l'Escann. Mais tandis que nombre de réfugiés sont reconnaissants pour ce que nous avons accompli ici, certains sentent qu'Escann appartient aux Escaniens et non à nous - ils ne pensent pas que nous ayons une revendication appropriée sur ces terres. Il est grotesque de penser qu'ils oseraient s'opposer à leurs sauveurs, mais leur mécontentement ne peut être ignoré.\n\nQue ferons-nous d'eux ?"
 escanni_refugees_settlement.404.a:0 "Ce n'est pas comme s'ils avaient le choix."
 escanni_refugees_settlement.404.b:0 "Peut-être devrions-nous repenser notre position."
 escanni_refugees_settlement.404.c:0 "Ils peuvent établir une enclave s'ils le souhaitent."

 #A Difference in Perspective
 escanni_refugees_settlement.405.t:0 "Une Différence de Perspective"
 escanni_refugees_settlement.405.d1:0 "L'administration que nous avons mise en place est fortement inspirée d'où nous venons. Même si une certaine influence des anciens royaumes escaniens peut être ressentie, notre règne est assez différent de ce qu'Escann connaissait jadis. L'Escann chevaleresque a disparu depuis longtemps, et ce que nous avons construit est destiné à remplacer, pas simplement émuler et reconstruire.\n\nAinsi, les réfugiés qui s'attendaient à un retour à ce que leurs parents ou grands-parents connaissaient et leur enseignaient se sentent un peu partagés.\n\nDevrions-nous apaiser leur malaise ?"
 escanni_refugees_settlement.405.d2:0 "Tandis que nous avons reconstruit notre administration, nous nous sommes tenus étroitement au modèle escanien - ou plutôt, au peu qui restait dans les livres de comment Escann fonctionnait jadis. Nous essayons d'émuler les royaumes d'antan et restaurer leur héritage.\n\nAinsi, les réfugiés qui s'attendaient à un retour à ce que leurs parents et grands-parents connaissaient ont été agréablement surpris, appréciant grandement le respect que nous montrons à leurs traditions et histoire. Il semble que notre imitation leur soit satisfaisante.\n\nLeur intégration dans notre royaume a été grandement facilitée par cela !"
 escanni_refugees_settlement.405.a:0 "Apaisons leurs inquiétudes."
 escanni_refugees_settlement.405.b:0 "Les contes d'antan sont exagérés, ils devraient passer à autre chose."
 escanni_refugees_settlement.405.c:0 "[Root.GetName] est en effet un royaume escanien"

 #Influx of Sellswords
 escanni_refugees_settlement.406.t:0 "Afflux de Mercenaires et Aventuriers"
 escanni_refugees_settlement.406.d:0 "Tous ceux qui viennent en Escann ne sont pas d'anciens habitants d'Escann ou leurs descendants - il y a aussi ceux qui souhaitent gagner gloire, renommée et richesses. Bien qu'ils soient un peu tard et que la phase principale de la Reconquête d'Escann soit terminée, nous pouvons toujours les utiliser sur les champs de bataille.\n\nNous pouvons aussi essayer de les convaincre de s'installer à la place, mais nous devrons leur donner des incitations substantielles pour abandonner leur mode de vie péripatétique.\n\nQuelle sera notre position, mon [Root.Monarch.GetTitle] ?"
 escanni_refugees_settlement.406.a:0 "Plus d'hommes pour l'armée !"
 escanni_refugees_settlement.406.b:0 "Nous avons besoin de reconstruire plus que de conquérir."
 escanni_refugees_settlement.406.c:0 "Nous pouvons leur offrir des terres dans un territoire nouvellement conquis."

 #The Refugees' Beliefs
 escanni_refugees_settlement.407.t:0 "Les Croyances des Réfugiés"
 escanni_refugees_settlement.407.d1:0 "Quand Corin rejoignit la Cour Régente, nombre de réfugiés commencèrent à l'adorer plutôt que Castellos, la révérant comme l'héroïne qui tua Dookanson et les vengea. Nombre d'aventuriers suivirent, et pas mal d'adorateurs de Corin vivent dans notre nation.\nAinsi, les réfugiés se sentent plutôt bienvenus dans nos terres et cela facilite leur intégration. Certains disent même que Corin n'est seconde qu'à Castellos dans la Cour... celles-ci pourraient être des pensées dangereuses.\n\nDevrions-nous encourager le culte de Corin encore plus, mon [Root.Monarch.GetTitle] ?"
 escanni_refugees_settlement.407.d2:0 "Mon [Root.Monarch.GetTitle], plus de réfugiés sont à nouveau venus dans nos terres, parlant de divinités et idoles fourvoyées. Ils cherchent réconfort dans leur héros devenu Dieu et souhaitent l'adorer même ici dans nos terres.\n\nLes tolérer rendrait leur intégration une tâche moins intimidante, mais cela pourrait nous nuire à long terme. Imposer nos propres dogmes, d'autre part, mènera à une transition rude pour eux mais un temps plus simple pour nous.\n\nDevrions-nous accepter leur hérésie et idolâtrie ou imposer nos propres dogmes ?"
 escanni_refugees_settlement.407.d3:0 "De nouveaux réfugiés sont revenus sur les terres que nous tenons, apportant avec eux bibelots et idoles des divinités qu'ils adorent. Ce sont des disciples de la Cour des Dieux Superficiels, et ils parlent de Corin comme Agrados racheté. Mais ils manquent du savoir que l'ombre d'Agrados persiste en Kazraiel, le Prince Courroucé.\n\nNous pourrions tourner leur croyance en l'avatar d'Agrados pour leur faire voir la lumière de Kazraiel, après tout, Kazraiel n'était-il pas une partie d'Agrados ?\n\nDevrions-nous faire cela, mon [Root.Monarch.GetTitle] ?"
 escanni_refugees_settlement.407.a:0 "Ils sont libres d'adorer qui ils veulent."
 escanni_refugees_settlement.407.b:0 "Une telle hérésie ne peut être tolérée, faisons-leur voir la lumière."
 escanni_refugees_settlement.407.c:0 "De nouveaux frères rejoignent notre royaume."
 escanni_refugees_settlement.407.e:0 "Utilisons l'idée d'Agrados le Racheté pour les attirer vers la Cour."

 #The Scars of the Past
 escanni_refugees_settlement.408.t:0 "Les Cicatrices du Passé"
 escanni_refugees_settlement.408.d:0 "Mon [Root.Monarch.GetTitle], nous avons reçu une missive de multiples parties du royaume dans lesquelles des réfugiés se sont récemment installés. Ils semblent être partis en panique après avoir découvert des orques et gobelins dans la zone près de leur implantation. Ils ont ensuite contacté la ville la plus proche pour les avertir que la Marée Verte était revenue.\n\nBien que cette confusion soit plutôt inoffensive, elle démontre clairement que les réfugiés ne sont pas disposés à accepter leurs anciens ennemis comme voisins."
 escanni_refugees_settlement.408.a:0 "Ils doivent comprendre que nous devons partager ces terres maintenant."
 escanni_refugees_settlement.408.b:0 "Accélérons le rapatriement en nature."
 escanni_refugees_settlement.408.c:0 "Ce sont aussi leurs terres."
 escanni_refugees_settlement.408.e:0 "Nous nous en occupons."

 #A Grand Chivalric Tournament
 escanni_refugees_settlement.409.t:0 "Un Grand Tournoi Chevaleresque"
 escanni_refugees_settlement.409.d:0 "Mon suzerain, nombre des plus récents réfugiés à nous rejoindre ont proposé de célébrer notre succès et leur retour en Escann. Ils racontent des récits de grandes joutes organisées au temps de leurs grands-parents ou arrière-grands-parents, et souhaitent assister et prendre part à une telle qu'elle se faisait dans l'Escann chevaleresque d'antan.\n\nSi nous voulons reproduire une authentique « joute escanienne », ce sera à grande dépense, mais ce sera sûrement une entreprise fructueuse ! Bien sûr, nous pourrions demander aux réfugiés de simplement financer leur propre proposition, mais cela pourrait ne pas être populaire."
 escanni_refugees_settlement.409.a:0 "Une merveilleuse idée ! Elle sera grandiose en effet."
 escanni_refugees_settlement.409.b:0 "Frivole, s'ils y contribuent alors nous pouvons l'organiser."
 escanni_refugees_settlement.409.c:0 "C'est une perte de temps."
 escanni_refugees_settlement.409.e:0 "Une ancienne tradition que nous honorerons."

 #Refugees Bring Back Manufcatoring Knowledge from the West
 escanni_refugees_settlement.410.t:0 "Les Réfugiés Rapportent le Savoir Manufacturier de l'Ouest"
 escanni_refugees_settlement.410.d:0 "Les dommages causés par la Marée Verte peuvent être mesurés de nombreuses façons. Il y eut évidemment un lourd tribut en vies pour le peuple escanien, mais ils perdirent aussi beaucoup de leur savoir et méthodes dans l'exode et le conflit.\n\nMais toute cette science ne fut pas perdue, et bien que la plupart des réfugiés retournant soient des paysans et soldats, certains sont artisans et érudits qui portent avec eux ce dont nous avons besoin pour reconstruire ce qui fut perdu. En investissant dans les entreprises de ces nouveaux citoyens, nous pourrions rallumer l'artisanat escanien.\n\nQue ferons-nous, mon [Root.Monarch.GetTitle] ?"
 escanni_refugees_settlement.410.a:0 "Donnons-leur une allocation afin qu'ils puissent mettre en place leur production."
 escanni_refugees_settlement.410.b:0 "C'est trop cher, laissons-les s'installer et rien d'autre."

 #Foreigners in a Familiar Land
 escanni_refugees_settlement.411.t:0 "Des Étrangers en Terre Familière"
 escanni_refugees_settlement.411.d:0 "Des douzaines de missives de multiples villes et cités à travers le royaume s'accumulent dans les archives. Toutes rapportent la même chose : les anciens habitants de ces terres ont commencé à revenir en masse. Ces réinstalleurs sont généralement plutôt confus et concernés par notre présence ici, mais ils ont reconnu nos accomplissements néanmoins et désirent rejoindre notre royaume ; ils demandent seulement que nous les laissions adorer leurs propres dieux.\n\nLeur aide nous aiderait à contrôler ces terres et nous étendre plus facilement, mais cela pourrait être au coût de la stabilité du royaume. Sinon, nous pourrions toujours les bannir et interdire leur entrée dans notre royaume, mais les autres royaumes escaniens pourraient ne pas apprécier cette décision.\n\nGrand [Root.Monarch.GetTitle], que conseille votre sagesse ?"
 escanni_refugees_settlement.411.a:0 "Laissons-les installer ces terres, mais nous ne les laisserons pas adorer de faux dieux, pas ouvertement."
 escanni_refugees_settlement.411.b:0 "Accordons-leur autonomie et liberté de culte."
 escanni_refugees_settlement.411.c:0 "Nous avons déjà assez de problèmes, interdisons leur entrée."
 escanni_refugees_settlement.411.e:0 "Ils ont perdu ces terres une fois déjà, elles sont nôtres maintenant."

