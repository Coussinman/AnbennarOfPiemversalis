###Holy Sites

 noukahi_pantehon:0 "Panthéon Noukahi"
 noukahi_pantheon_religion_desc:0 "Le Panthéon Noukahi constitue un ensemble de récits peu structurés relatant les exploits de figures héroïques vénérées par les peuples Vurebindu et Irsukuba de Horashesh. Cette religion emprunte abondamment aux mythes voisins de la Fangaula, du Nakavy Avo et du Khétisme, ce qui explique l'absence de thèmes véritablement unificateurs. Chaque conte véhicule des enseignements et des significations distincts, variant souvent selon le conteur qui les transmet."
