#pilgrimage endings

noukahi_pantheon.2.t:0 "Le Goût de l'Échec"
noukahi_pantheon.2.d:0 "Il est dans la nature de l'homme de trébucher deux fois sur la même pierre. Nous échouons et péchons, nous nous adonnons aux vices et aux crimes, et ce malgré l'absence de tout acte sans juste châtiment en son temps. Rompre ce cycle de dépravation, poursuivre la vertu et imiter les parangons moraux qui nous précédèrent : voilà ce qu'enseignent les Griots, voilà la pierre angulaire sur laquelle le Panthéon Noukahi fut bâti.\n\nEt pourtant, il semble que ces enseignements n'aient trouvé chez vous que des oreilles sourdes. Lorsque vous avez entrepris ce pèlerinage, pensiez-vous que les actes odieux que vous commettriez, profanant un voyage si sacré, seraient sans conséquence ? Croyiez-vous encore qu'une récompense vous attendrait au terme de votre chemin ? Espériez-vous que les Dieux fermeraient les yeux sur vos voies perverses ? Vous aviez tort et fûtes insensé, et vous avez gaspillé votre temps.\n\nIl ne sert à rien désormais de pleurer et de se lamenter. La honte a été apportée à votre maison par votre échec et vos vices, il vous incombe de vous relever et de réparer vos torts. Peut-être, tandis que la morsure de la honte tourmente impitoyablement votre cœur, cette douleur vous poussera-t-elle au changement et à l'amélioration, ou peut-être resterez-vous sans vergogne dans votre ignominie, à jamais enfoncé dans les ténèbres. À vous seul appartient le pouvoir de choisir si les chants des Griots se souviendront de vous avec mépris et dédain manifeste, ou si vous gagnerez une place plus favorable dans la mémoire de votre peuple.\n\nSi tel est votre but, regardez maintenant en vous-même et réfléchissez, car reconnaître la maladie est le premier pas pour l'extirper. Quels défauts vous ont mené à l'échec ? Comment réparerez-vous vos torts ?"
noukahi_pantheon.2.a:0 "Je n'ai rien fait de mal ! L'infortune me frappe sans que j'y sois pour rien !"
noukahi_pantheon.2.b:0 "Je ne puis continuer à laisser ma soif d'or me détourner de mon devoir."
noukahi_pantheon.2.c:0 "Ma langue m'a trahi, je dois mieux contrôler mes paroles."
noukahi_pantheon.2.e:0 "J'ai laissé le vice gouverner ma vie, jamais plus je ne boirai une goutte."
noukahi_pantheon.2.f:0 "Dans ma quête de perfection, j'ai oublié le véritable sens du voyage."
noukahi_pantheon.2.g:0 "Comment un couard tel que moi pourrait-il être un bon souverain ? Je dois affronter mes peurs."
noukahi_pantheon.2.h:0 "Mes actes ont insulté les Dieux, je dois confesser mes nombreux péchés et me repentir !"
noukahi_pantheon.2.i:0 "Je suis devenu un monstre, j'ai besoin d'être une personne plus bienveillante."
noukahi_pantheon.2.j:0 "Je crois que je suis simplement vraiment stupide."
noukahi_failure_stupid_tooltip:0 "Les gens étant désormais plus conscients de votre simplicité d'esprit, vous serez tenu à des exigences moins strictes lors de votre prochain pèlerinage."

noukahi_pantheon.3.t:0 "Gamyi, Enfin !"
noukahi_pantheon.3.d:0 "Alors que [Root.Monarch.GetName] gravit une dernière colline, une scène vivante se déploie devant [Root.Monarch.GetHerHim] : au sud, le lac Kuiziva s'étend jusqu'à l'horizon, sa surface placide dansant sous la lumière du soleil couchant ; au nord, les collines ondulantes de la campagne Kuiika s'élèvent doucement depuis les plaines côtières, scintillant d'or dans la brise légère ; et droit devant, l'objet du long pèlerinage de [Root.Monarch.GetName] se dresse, d'une hauteur impossible, pilier étincelant de lumière contre le mauve qui s'approfondit de la nuit naissante : le Kuiika Gamyi.\n\nAvec le soleil couchant derrière [Root.Monarch.GetHerHis], [Root.Monarch.GetName] poursuit vers la flèche. De chaque côté de la route côtière, une profusion de tombes et de mémoriaux se dressent, certains récents, d'autres érodés au point d'être méconnaissables, rappels solennels des innombrables batailles livrées ici au fil des millénaires. Devant, une cité respectable s'accroche à la base de la grande structure, semblable à un jouet en comparaison. Des foules de pèlerins emplissent les rues ; des marchands vantent leurs marchandises. [Root.Monarch.GetName] n'y prête nulle attention, captivé par la tour qui se profile. L'estomac noué de vertige, il presse le pas à travers la foule.\n\nEnfin, il se tient devant le Gamyi et, avec précaution, pose une paume sur sa surface lisse. D'abord, rien : un pincement de peur. Puis, tout à la fois : le cosmos coulant dans ses veines, un kaléidoscope d'âges passés. Électrisant. Terrifiant. Puis, la paix. Une révélation acquise. Un don accordé. Empli d'un sentiment de plénitude, [Root.Monarch.GetName] se retourne, prêt pour le long voyage de retour."
noukahi_pantheon.3.a:0 "Mes légions combattront comme celles du grand Kui !"

noukahi_pantheon.4.t:0 "Lelanán, Enfin !"
noukahi_pantheon.4.d:0 "[Root.Monarch.GetName] débarque sous une cacophonie de mouettes criardes, avant de s'enfoncer dans la cité portuaire animée de Lelanán. Les vues et les sons sont accablants par leur variété et leur intensité, et il faut toute la concentration de [Root.Monarch.GetName] simplement pour maintenir le cap vers l'attraction éponyme de la cité, suivant la Route des Pèlerins qui serpente comme une rivière à travers cette cité chaotique, colorée et organique.\n\nLes gongs de midi résonnent tandis que [Root.Monarch.GetName] se tient enfin devant le Temple de Lel. Il est étonnamment humble pour sa renommée, et très proche de l'architecture de sa cité : murs blanchis à la chaux, toit en gradins surmonté d'un dôme en bulbe, bas-reliefs représentant la vie marine ceinturant l'extérieur. Sur l'injonction d'une prêtresse halfeline de rang modeste, [Root.Monarch.GetName] est introduit.\n\nL'air est frais à l'intérieur, teinté d'un soupçon revigorant d'ozone. Des mosaïques représentant hippocampes, ondins, araizary et autres créatures marines ornent les murs. [Root.Monarch.GetName] est conduit au cœur du temple, une salle circulaire avec en son centre un bassin parfaitement hémisphérique d'eau cristalline. S'avançant, [Root.Monarch.GetSheHe] pose délicatement un pied sur le bassin : la tension superficielle ne cède pas. Avec prudence, [Root.Monarch.GetName] adopte une posture méditative et tente de calmer [Root.Monarch.GetHerHis] esprit. Imperceptiblement, un sentiment de paix descend. Les minutes passent, les heures, jusqu'à ce que le temps perde son sens. Quand [Root.Monarch.GetName] s'éveille, la nuit est tombée. Baigné dans la sérénité de Lel, la nuit ne recèle nulle menace. [Root.Monarch.GetName] soupire de contentement et entame le voyage de retour."
noukahi_pantheon.4.a:0 "Paix et réconfort pour tous ceux qui souffrent."

noukahi_pantheon.5.t:0 "Jununsuar, Enfin !"
noukahi_pantheon.5.d:0 "Tandis que [Root.Monarch.GetName] emprunte le sentier bordé d'arbres de bois-de-fer menant à la montagne, [Root.Monarch.GetSheHe] ne peut s'empêcher de se sentir minuscule. Même les grands arbres métalliques sont éclipsés par la taille majestueuse de la demeure de Mojobaa. Le grand volcan de Junansuar, sur les pentes duquel se dresse ce qui fut jadis un palais de génies, aujourd'hui un grand monastère et la destination de [Root.Monarch.GetName]. Au bout du sentier, un long et escarpé escalier s'élève vers les portes du monastère. [Root.Monarch.GetName] est à bout de souffle en atteignant le sommet, et prend un moment de repos avant de pénétrer par les immenses portes de fer, grandes ouvertes pour accueillir tous les pèlerins.\n\nLa première chose qu'[Root.Monarch.GetSheHe] remarque, avant même d'entrer, c'est la chaleur, plus intense qu'en plein midi dans le désert. Puis vient le bruit : métal heurtant le métal, le bois-de-fer des arbres étranges du Dao Nako martelé en armes parfaites. Tandis que [Root.Monarch.GetName] poursuit sa route, suivant le flot des pèlerins, le soleil cesse finalement de pénétrer dans les immenses halls, la lueur orangée des forges devenant l'unique source de lumière. La chaleur, le bruit, l'air chargé : [Root.Monarch.GetName] sent [Root.Monarch.GetHerHis] esprit submergé, perdu en lui-même. Pourtant [Root.Monarch.GetSheHe] continue, marchant presque inconsciemment, comme poussé par une force invisible.\n\nPuis [Root.Monarch.GetSheHe] le voit : une colonne de lumière claire. Le monastère s'ouvre sur l'air libre, un large cercle verdoyant au milieu du complexe. En y pénétrant, la chaleur, le bruit et l'air cessent d'être une préoccupation, et un sentiment de réconfort l'enveloppe. C'est ici qu'[Root.Monarch.GetSheHe] devait être. Au centre du jardin se dresse un solitaire arbre de bois-de-fer, le plus grand qu'[Root.Monarch.GetSheHe] ait jamais vu. [Root.Monarch.GetName] pose une main sur son écorce, s'attendant à sentir la froideur dure du fer. Au lieu de cela, elle est chaude, comme l'étreinte d'une mère."
noukahi_pantheon.5.a:0 "Veillons à prendre des notes pour nos forgerons au pays."

noukahi_pantheon.6.t:0 "Nazhni, Enfin !"
noukahi_pantheon.6.d:0 "Pendant des siècles, hommes-lézards et humains se sont livré une guerre acharnée, un conflit qui ne laissa à aucun camp le loisir d'apprécier l'architecture de l'autre, si ce n'est quelques minutes avant qu'elle ne fût livrée aux flammes. Contemplant les grandes merveilles de la cité portuaire de Nazhni, désormais ouverte aux fidèles du Noukahi, [Root.Monarch.GetName] ne peut que déplorer que la guerre, aussi juste fût-elle, se soit interposée entre l'humanité et cette beauté.\n\nNazhni fut toujours une cité d'artistes, de plaisir et de confort, et elle le demeure. De grands édifices colorés ornent chaque rue, la fonctionnalité reléguée au second plan, la beauté érigée en priorité. Des temples aux grandes demeures, des villégiatures pour les fortunés aux humbles logis des travailleurs de la cité, toute la ville chante en harmonie avec une myriade de couleurs.\n\n[Root.Monarch.GetName] traverse le marché grouillant, évitant les hordes de marchands lui proposant des marchandises des quatre coins d'Halann. La place centrale de la grande cité est emplie d'étals de bazar, aussi colorés que le reste. En son centre, un cercle de flèches s'élève : des répliques des grands Zatsarya qui parsèment Sarhal. [Root.Monarch.GetName] fait courir [Root.Monarch.GetHerHis] main sur leurs surfaces délicatement sculptées, sur lesquelles les étoiles d'innombrables ciels nocturnes sont gravées.\n\nCertains Griots chantent que lorsque Nyokyora, il y a des siècles, fit raser la cité et abattre jusqu'à la dernière brique, il le fit parce que ses guerriers étaient devenus si envoûtés par sa beauté qu'ils ne l'auraient autrement jamais quittée. [Root.Monarch.GetName] comprend pourquoi. La cité est plus addictive que le Nazhyn vendu sur ses marchés ; elle pénètre l'esprit et le conquiert par une symphonie de teintes. [Root.Monarch.GetSheHe] doit partir maintenant, et [Root.Monarch.GetHerHis] âme souffre de le savoir. Pourtant, d'une certaine manière, [Root.Monarch.GetSheHe] ne partira jamais. On ne quitte jamais vraiment Nazhni, car une fois qu'on y entre, le cœur est à jamais teinté des millions de couleurs de la cité."
noukahi_pantheon.6.a:0 "Une grande source d'inspiration pour nos architectes !"

noukahi_pantheon.7.t:0 "Ardim Qarast, Enfin !"
noukahi_pantheon.7.d:0 "Le désert d'Ardimya est dur et implacable, et des démons des plus infâmes peuplent les dunes infinies. Les tribus Guryadagga qui habitent ces terres murmurent qu'il n'en fut pas toujours ainsi, qu'autrefois la péninsule brillait de verdure et de fertilité, des cours d'eau débordants traversant ce qui n'est plus que terres maudites. Un paradis perdu dont les dernières ruines gisent désormais entre les sables toujours mouvants et le soleil brûlant. [Root.Monarch.GetName] contemple maintenant la plus grande de ces ruines, jadis une grande cité de toits en dôme et d'aqueducs élancés, aujourd'hui un lieu où la pierre se dissout lentement dans le sable, les dômes depuis longtemps effondrés, les aqueducs à sec.\n\nBien des contes de Griots traitent de la folie de s'accrocher à l'éternité, car c'est un privilège réservé aux seuls Dieux, et même les plus grandes œuvres des plus grands rois succombent aux ravages du temps. Pourtant le sage peut beaucoup apprendre du passé, et les souvenirs bien conservés sont aussi incorruptibles que le divin. Tandis que [Root.Monarch.GetName] traverse les ruines jadis désertes, désormais emplies de pèlerins, [Root.Monarch.GetSheHe] voit cela avec une clarté particulière. Ce qui fut, est encore, aussi vivant aujourd'hui dans les esprits des fidèles et les textes des érudits qu'il le fut jadis dans le monde matériel. Des précieuses reliques arrachées aux sables aux gravures usées méticuleusement reproduites sur papier, le site est la source d'innombrables matériaux qui fourniront aux plus sages de [Root.GetName] matière à des jours et des jours de débat.\n\nPourtant ce n'est pas pour pratiquer l'archéologie que [Root.Monarch.GetName] est venu en ces terres lointaines. Chaque pas à travers l'antique cité rapproche des héros du passé. D'Ardim, élue de Zuvanofa pour délivrer l'humanité de la tyrannie des génies, et qui accomplit précisément cela malgré, si l'on en croit les récits Guryadagga, le fait qu'elle fût elle-même une Djinn. Le vent soulève le sable en motifs étranges, et dans ses mouvements hypnotiques, [Root.Monarch.GetName] peut voir le futur et le passé, ce qui fut et ce qui sera. En marchant à travers Ardim Qarast, on marche à travers les sables du temps lui-même."
noukahi_pantheon.7.a:0 "La sagesse des âges nous est révélée en ces lieux !"

noukahi_pantheon.8.t:0 "Kunolo, Enfin !"
noukahi_pantheon.8.d:0 "Les pèlerinages ne sont pas censés être particulièrement amusants. Certains Griots particulièrement stricts vous diraient même que tout plaisir et jouissance est une distraction du devoir sacré de réflexion qu'ont tous les pèlerins. Et malgré cela, [Root.Monarch.GetName] passe le meilleur moment de [Root.Monarch.GetHerHis] vie à Kunolo : discutant avec les marchands du bazar de Kekwiw, qui viennent de tous les horizons et de toutes les cultures de Sarhal et d'au-delà ; goûtant les délices étranges et exotiques proposés sur leurs étals, et faisant descendre les repas avec du jus revigorant de noix de kola. Pour un observateur extérieur, il semblerait qu'[Root.Monarch.GetSheHe] ignore complètement [Root.Monarch.GetHerHis] devoir de pèlerin, mais la vérité est qu'[Root.Monarch.GetSheHe] est immergé précisément dans la nature du divin, tel que Kunolo la perçoit.\n\nLes innombrables sanctuaires du bazar de Kekwiw emplissent le lieu d'une énergie divine harmonieuse ; ils imposent calme, bonheur et allégresse à tous ceux qui visitent. Même ceux qui entrent dans les temples de guérison en suivant des prêtresses Kiumbanda à l'allure royale semblent joyeux. [Root.Monarch.GetName] a entendu dire que le processus de modelage de chair que pratiquent ces saints sorciers est extrêmement douloureux, et pourtant ceux qui cherchent un remède à leurs maux, ou à modeler leur corps d'une façon qui correspond mieux à leur âme, endurent joyeusement la douleur pour obtenir une telle récompense. Même les Griots les plus conservateurs, qui seraient normalement outrés par de telles pratiques, n'osent pas remettre en question l'art des Kiumbanda, béni qu'il est par le dieu Kunolo.\n\n[Root.Monarch.GetName] saute de sanctuaire en sanctuaire, et d'étal en étal, explorant le bazar. La nuit enveloppe la cité avant qu'[Root.Monarch.GetSheHe] n'ait eu la chance d'en visiter ne serait-ce que la moitié. Demain [Root.Monarch.GetSheHe] quittera Kunolo le cœur serré de chagrin, mais le souvenir demeurera, un souvenir d'harmonie et de subtilité, dans une cité qui accueille tous."
noukahi_pantheon.8.a:0 "Une excellente occasion pour nos diplomates d'apprendre les coutumes étrangères."

noukahi_pantheon.9.t:0 "Niramit, Enfin !"
noukahi_pantheon.9.d:0 "On l'appelle la Cité des Larmes. Les eaux du Chagrin dérivent doucement vers l'horizon, quittant le lac sacré qui voit naître la rivière. [Root.Monarch.GetName] contemple en silence le fleuve qui s'écoule, méditant sur l'origine de cette merveille fluviale. Les larmes de Niramhat, ou peut-être Nirakhet, mère de tous, la Reine-Absolue. Pleure-t-elle vraiment pour tous ? Même pour les méchants et les corrompus ? Même pour les égarés et les perdus ? [Root.Monarch.GetName] a presque du mal à le croire. Les Dieux sont bons, mais ils sont rarement compatissants, leurs volontés divines appliquées sans considération ni doute. C'est ce que les Griots ont toujours enseigné.\n\nUn Khet prend un bain de soleil près du lac, mâchant paresseusement les raisins qu'un serviteur à l'air misérable lui donne. Ces créatures capricieuses sont-elles aussi les cibles de la miséricorde de la Reine-Absolue ? Et leurs adorateurs, qui tourmentèrent tant Horashesh pendant des générations, cherchant à l'asservir et à effacer les cultures de ses peuples dans leur quête aveugle de richesse et de pouvoir ? Comment quiconque pourrait-il jamais pardonner cela ? Comment quiconque pourrait-il pleurer pour des hommes aux cœurs si sombres et froids ? [Root.Monarch.GetName] a du mal à concevoir une telle chose.\n\nIl est vrai, néanmoins, que de nombreux contes chantent la vertu de tendre la main à l'ennemi vaincu, de s'élever au-dessus des malfaisants en leur montrant la miséricorde qu'ils n'offrirent pas à leurs victimes.\n\n[Root.Monarch.GetName] met de côté ses doutes et ses questions un instant tandis qu'[Root.Monarch.GetSheHe] pénètre dans les eaux placides du lac. Un sentiment de calme et de soulagement l'envahit, au-delà de tout ce qu'[Root.Monarch.GetSheHe] a ressenti depuis des lustres. Les larmes de la mère apportent réconfort et paix à ses enfants. Peut-être qu'en suivant son exemple, on peut apprendre à pardonner."
noukahi_pantheon.9.a:0 "Puisse cette expérience nous mener vers plus de paix et de compréhension."

noukahi_pantheon.10.t:0 "Sprigi Twani, Enfin !"
noukahi_pantheon.10.d:0 "Aux temps anciens, un voyage à travers le Marais des Ombres n'était entrepris que par les insensés, les fous ou les suicidaires. Bien que tous les dangers de la région n'aient pas encore été complètement bannis, le fait que [Root.Monarch.GetName] puisse, comme tant d'autres fidèles, accomplir en sécurité un pèlerinage vers le grand arbre de Sprigi Twani est la preuve que la lumière est enfin en passe de triompher dans son éternelle bataille contre les ténèbres.\n\n[Root.Monarch.GetName] admire la nature étrange du Marais tandis qu'[Root.Monarch.GetSheHe] emprunte le chemin pavé qui mène désormais à son épicentre. De grands pins Lotunga montent la garde, à moitié étranglés par des enroulements d'Hattiatia. Des Fleurs-de-Nuit guettent, leur couleur d'un noir pur bien plus distincte dans un Marais qui brille désormais de vert plutôt que de son ancien gris infâme. Depuis un étang voisin, un grand crocodilien fixe [Root.Monarch.GetName], son dos servant de refuge à une ruche bourdonnante de mouches de sang, bien moins agressives désormais, bien que toujours une nuisance courante.\n\nEnfin, la Matriarche est en vue. Haute comme les plus hautes montagnes, ses racines et ses branches se tordant en motifs impossibles, son écorce marquée par des années de torture. Pourtant elle fleurit et porte des fruits désormais. Ses plaies, qui jadis s'infectaient et répandaient pourriture et bile à travers la terre, montrent maintenant des signes de guérison. [Root.Monarch.GetName] atteint le pied de l'Arbre-Monde, chose autrefois impossible sans se faire mettre en pièces par la végétation morte-vivante qu'il conjurait en désespérées défenses. [Root.Monarch.GetSheHe] pose une main sur son écorce et sent le tremblement subtil de l'énergie insondable à l'intérieur. Elle bat, comme un cœur colossal, un cœur qui jadis pourrissait et maintenant s'épanouit. Et des profondeurs de l'arbre, [Root.Monarch.GetName] peut presque entendre la voix de Lama Kerac, l'ancienne reine souffrante qui peut maintenant reposer plus sereinement, la malédiction engendrée par sa folie bientôt complètement défaite grâce au combat implacable de l'humanité contre les ténèbres et le mal des guenaudes. Et elle dit merci."
noukahi_pantheon.10.a:0 "Combattre les ténèbres sous toutes leurs formes, voilà notre devoir !"

noukahi_pantheon.11.t:0 "Kheterat, Enfin !"
noukahi_pantheon.11.d:0 "Les pèlerinages des indigènes Noukahi ont toujours semblé être une pratique primitive et barbare aux yeux de [Root.Monarch.GetName], une expédition insensée et dispendieuse pleine de risques et d'épreuves absurdes, simplement pour voir les huttes qui abritent leurs fausses idoles. Cependant, aussi longtemps que dura le Compromis, un semblant de respect, même immérité, devait être feint, aussi exaspérant que cela fût. Mais jamais le Medaka ne s'abaisserait à feindre de croire aux dieux répugnants du Panthéon Noukahi. Au lieu de cela, [Root.Monarch.GetSheHe] choisit de visiter un site véritablement saint, la grande Kheterat, cœur du premier et plus glorieux empire d'Halann, lieu de repos du divin Elikhet et siège de l'Intendance.\n\n[Root.Monarch.GetSheHe] se sentait presque comme un enfant dans l'atelier d'un fabricant de jouets, gloussant pratiquement d'excitation en traversant les rues de la grande cité. Quel délice, de quitter ces plaines arriérées et non civilisées pour visiter le seul et unique cœur de la civilisation en Halann. De voir les eaux du Chagrin de la Mère, passant calmement à travers la cité, et les divins Khet, profitant d'un repos bien mérité sur la rive du fleuve qu'ils entretenaient et préservaient avec tant d'amour, tandis que quelques chanceux serviteurs répondaient à leurs moindres besoins. Au loin, on pouvait voir la colossale pyramide qui servait de lieu de repos au Grand Elikhet. [Root.Monarch.GetName] pourrait passer la journée entière à simplement contempler sa magnificence.\n\nMais d'abord, quelques affaires. La véritable raison de ce voyage attendait. Parler avec [Root.Monarch.GetHerHis] contacts, s'assurer des bourses, des épées et des plumes qui pourraient accompagner [Root.Monarch.GetHerHim] et sa suite de retour à Horashesh. S'assurer la réélection n'était jamais facile, jamais garanti. Mais avec cela, ce serait plus facile. Avec cela, peut-être, il faudrait moins de temps pour que Horashesh abandonne sa barbarie et son ignominie, pour quitter le Noukahi, pour se débarrasser des Efergezmu et des fausses idoles, pour s'élever vers quelque chose de plus proche de cette cité divine qu'[Root.Monarch.GetSheHe] aimait tant."
noukahi_pantheon.11.a:0 "Horashesh sera Khétiste !"

noukahi_pantheon.12.t:0 "Jezarpizu, Enfin !"
noukahi_pantheon.12.d:0 "Les visages des anciens rois du passé fixent [Root.Monarch.GetName] tandis qu'[Root.Monarch.GetSheHe] gravit les hauteurs de l'Emot Nepas Sedar. Une harpie particulièrement éméchée au pied de la montagne lui propose de [Root.Monarch.GetHerHis] faire monter en vol, bien que cela ressemble moins à une offre de transport qu'à une proposition indécente. Quoi qu'il en soit, [Root.Monarch.GetSheHe] décline poliment, car le défi de l'ascension fait autant partie du pèlerinage que le voyage lui-même.\n\nEn montant, [Root.Monarch.GetSheHe] passe devant de plus en plus de visages, d'abord ceux des Mezhi d'Irkan Eparta, du chef mineur le plus oubliable aux plus grands rois de la contrée. Puis, à une altitude où l'air se raréfie et où la cité de Jezarpizu ressemble à une fourmilière vue d'en haut, les visages prennent de nouveaux traits. Ce sont les visages des matriarches harpies de la volée Naléni. D'une certaine façon, [Root.Monarch.GetName] parcourt l'histoire sculptée de Telekenid. Monter encore un peu, et [Root.Monarch.GetSheHe] se retrouverait dans les perchoirs des harpies, mais ce n'est pas [Root.Monarch.GetHerHis] destination.\n\nUn balcon naturel se détache du chemin, un petit sanctuaire s'y dresse. Comme le chantent les Griots, c'est ici que Nzeri sauva son époux des griffes de la harpie ravisseuse Nalayni. C'est un sanctuaire dédié à l'amour indéfectible, mais aussi à l'honneur, à la fierté et à la détermination. Debout sur la falaise, à quelques pouces du ciel, [Root.Monarch.GetName] crie aux cieux et proclame [Root.Monarch.GetHerHis] amour, brûlant et éternel. L'amour pour celui ou celle qui l'attend au pays ? Pour [Root.Monarch.GetHerHis] royaume ? Pour quelque chose, ou quelqu'un d'autre ? Cela reste un secret entre [Root.Monarch.GetSheHe] et les Dieux, tandis que la proclamation se dissipe dans le ciel. Mais il y a une chose que tous savent. Les liens d'amour proclamés au-dessus de ces montagnes ne peuvent être brisés, ils sont aussi éternels et durables que les visages qui ornent les flancs des falaises."
noukahi_pantheon.12.a:0 "Tant que l'amour nous anime, nous ne connaîtrons jamais la défaite."

#random events

noukahi_pantheon.100.t:0 "Quelque Chose ne va pas avec les Puits"
noukahi_pantheon.100.d:0 "Tandis que [Root.Monarch.GetName] voyage en pèlerinage avec [Root.Monarch.GetHerHis] suite, ils traversent une étendue de terre désolée, les champs arides et secs, les carcasses pourrissantes de bétail jonchant les prairies. Le village le plus proche n'a pas meilleure mine, ses habitants presque squelettiques se précipitant vers le [Root.Monarch.GetTitle] à son entrée dans le bourg. « De grâce, bons pèlerins, montrez de la pitié à ces pécheurs : pourriez-vous épargner un peu de votre eau afin que nous puissions étancher notre soif ? » Interrogés, les suppliants désespérés révèlent bientôt la raison de leur état pitoyable. Il y a des mois, les villageois refusèrent avidement de l'eau à un Griot assoiffé de passage, qui leur promit que leur cruauté leur serait rendue au centuple. Et en effet, tous leurs puits cessèrent bientôt de produire de l'eau propre, se remplissant d'une vase fétide qui tuait les plantes et rendait malades ceux qui en buvaient.\n\nUn Griot de la suite fait remarquer que la punition est juste, et que les villageois devraient se résigner à prier, offrir des sacrifices et demander pardon jusqu'à ce que les Dieux l'accordent. Les villageois acquiescent humblement, mais implorent qu'on leur donne un peu d'eau pour étancher leur soif et rendre leur pénitence plus supportable, car ils craignent de ne pas vivre assez longtemps pour jamais recevoir le pardon. [Root.Monarch.GetName] vérifie les réserves d'eau. Il y en a assez pour accéder à la requête des pénitents, mais cela nécessiterait d'en acheter davantage à la prochaine étape, une dépense imprévue."
noukahi_pantheon.100.a:0 "Je vous donnerai la charité que vous avez refusée aux autres."
noukahi_pantheon.100.b:0 "Je n'ose pas défier la volonté des dieux."
noukahi_pantheon.100.c:0 "L'eau se vend à bon prix ces temps-ci…"
noukahi_pantheon.100.d1:0 "Si nous prions ensemble, votre châtiment sera bientôt levé."

noukahi_pantheon.101.t:0 "Le Serpopard et le Guerrier"
noukahi_pantheon.101.d:0 "Peu de bêtes sont aussi redoutées à travers les terres de Noukahi que le mortel Serpopard, un félin serpentin animé d'une haine sans égale pour toute vie, dont on dit qu'il devient toujours plus puissant avec chaque héros et guerrier qu'il tue. Terrasser une telle bête est un exploit dont on peut se vanter, mais un aventurier mal préparé a de grandes chances de finir par nourrir la créature plutôt que de l'achever. Ainsi, lorsque la suite de [Root.Monarch.GetName] rencontre un jeune guerrier enthousiaste sur la route, cela suscite l'inquiétude parmi les pèlerins les plus aguerris. Le garçon cherche à prouver sa valeur en terrassant un Serpopard juvénile récemment apparu, avant qu'il ne puisse grandir en puissance et menacer les villages alentour. Cependant, étant manifestement inexpérimenté et mal préparé, il pourrait fort bien finir par être la cause de cette menace qu'il redoute.\n\n[Root.Monarch.GetName] considère [Root.Monarch.GetHerHis] options. [Root.Monarch.GetSheHe] pourrait simplement laisser le guerrier tenter de faire ses preuves seul, mais envoyer des épées supplémentaires pour s'assurer sans l'ombre d'un doute que la menace soit anéantie serait grandement vertueux, et le jeune homme serait assurément reconnaissant de ce soutien. D'un autre côté, le garçon montre un grand potentiel, et peut-être pourrait-il être convaincu d'abandonner sa cause altruiste et de chercher une position confortable dans les armées de [Root.GetName]. Les dieux, cependant, ne verraient pas d'un bon œil quelqu'un qui détourne un jeune guerrier de son chemin vers la gloire."
noukahi_pantheon.101.a:0 "Mes meilleurs hommes se joindront à vous dans votre quête."
noukahi_pantheon.101.b:0 "Je prierai pour votre succès."
noukahi_pantheon.101.c:0 "Oublie cette chose et rejoins plutôt ma suite."
noukahi_pantheon.101.d1:0 "Nous détruirons ce monstre ensemble !"
noukahi_pilgrimage_injury_ruler_modifier:0 "Blessure"
noukahi_pilgrimage_injury_ruler_modifier_desc:0 "Ce souverain a subi de graves blessures en combattant un vil monstre lors d'un pèlerinage."

noukahi_pantheon.102.t:0 "Une Mémoire Usée"
noukahi_pantheon.102.d:0 "« C'est alors que le guerrier, le... non, attendez, ce n'était pas un guerrier, la demoiselle... ou était-ce un poète ? »\n\nLes ravages du temps n'épargnent personne, pas même les plus sages. Le vieux Griot et compagnon de pèlerinage avec qui [Root.Monarch.GetName] partage le dîner en est la triste preuve. Le conte qu'il récite est fort populaire, [Root.Monarch.GetName] a dû l'entendre un million de fois depuis [Root.Monarch.GetHerHis] enfance, et [Root.Monarch.GetSheHe] pourrait en réciter chaque virgule. Le Griot, cependant, peine grandement à en faire autant, une grande tragédie pour un homme dont la mémoire est l'outil de travail. Certains dans la suite échangent des sourires moqueurs, et même quelques rires mal dissimulés se font entendre. L'embarras et la tristesse sur le visage du conteur ne font que croître, et vous vous demandez si c'est là une occasion envoyée par les dieux, pour prouver votre vertu en aidant un vieil homme à préserver son honneur."
noukahi_pantheon.102.a:0 "Distraire l'auditoire en racontant une histoire embarrassante sur vous-même."
noukahi_pantheon.102.b:0 "Garder le silence."
noukahi_pantheon.102.c:0 "Faire taire le vieil homme et raconter l'histoire vous-même."
noukahi_pantheon.102.d1:0 "J'ai adoré votre histoire, aimeriez-vous rejoindre notre cour ?"
noukahi_pantheon.102.e:0 "Le guider subtilement vers les détails qu'il oublie."
noukahi_pilgrimage_legitimacy:0 "Une histoire embarrassante."
noukahi_pilgrimage_legitimacy_desc:0 "Ce souverain a récemment raconté une histoire embarrassante sur lui-même, remettant en question [Root.Monarch.GetHerHis] droit de régner."

noukahi_pantheon.103.t:0 "Médiateur Neutre ?"
noukahi_pantheon.103.d:0 "[Root.Monarch.GetName] tombe sur deux hommes qui bloquent le chemin, se disputant avec irritation au sujet d'une controverse religieuse. Le plus âgé des deux soutient que les dieux sont justes et équitables, mais qu'ils ne montrent aucune pitié aux indignes, et que ceux qui pèchent dans cette vie seront punis éternellement dans la prochaine. Son contradicteur plus jeune argue qu'aucun acte temporel ne justifie un châtiment éternel, et qu'ainsi tout tourment dans l'au-delà ne peut être que temporaire, une pénitence à traverser avant de passer à une existence éternelle agréable.\n\nCertains de la suite se joignent au débat, soutenant l'une ou l'autre position ou proposant la leur. Finalement, un accord entre les disputants semblant impossible, on demande au [Root.Monarch.GetTitle] de trancher le différend. [Root.Monarch.GetSheHe] décide qu'il est sage de réfléchir à la question avant de rendre son verdict, et ordonne donc aux hommes d'établir le camp dans la zone, invitant les deux débatteurs à être [Root.Monarch.GetHerHis] hôtes pour la nuit.\n\n[Root.Monarch.GetName] vient à peine de s'allonger quand le plus âgé des hommes fait irruption dans la tente. Il révèle que lui et son jeune adversaire ont parié une somme non négligeable sur le fait que le [Root.Monarch.GetTitle] soutiendrait leur propre camp dans l'argument. Il a cependant des doutes quant à savoir si son pari sera gagnant, et a donc décidé d'offrir à [Root.Monarch.GetName] la moitié de la somme pour soutenir son camp. Le problème est que [Root.Monarch.GetName] avait déjà décidé de le soutenir de toute façon, et se trouve maintenant dans un dilemme moral. [Root.Monarch.GetSheHe] ne peut en bonne foi soutenir un homme malhonnête, mais il serait également malhonnête de mentir sur [Root.Monarch.GetHerHis] véritable opinion. D'un autre côté, être incapable d'offrir une réponse refléterait mal sur [Root.Monarch.GetHerHis] position de souverain. Que faire ?"
noukahi_pantheon.103.a:0 "Je ne puis répondre avec ma neutralité compromise."
noukahi_pantheon.103.b:0 "Refuser le pot-de-vin, choisir l'une des réponses et passer à autre chose."
noukahi_pantheon.103.c:0 "Eh bien, si vous insistez pour me payer…"

noukahi_pantheon.104.t:0 "Attaque de Phoques"
noukahi_pantheon.104.d:0 "Il est bien connu à travers toute la contrée que les phoques sont des bêtes féroces et assoiffées de sang, des êtres de pure malveillance et de méchanceté. Ainsi, lorsque [Root.Monarch.GetName], qui s'est éloigné de [Root.Monarch.GetHerHis] groupe de pèlerins pour admirer les paysages d'une rivière voisine, entend les jappements et aboiements proches d'une meute de phoques de rivière, [Root.Monarch.GetHerHis] cœur fait un bond. Épiant depuis des buissons, [Root.Monarch.GetSheHe] voit les démoniaques pinnipèdes malmener férocement un malheureux pêcheur, cherchant manifestement à s'emparer de ses poissons, et possiblement de son âme. Les mammifères aquatiques ronds et visqueux ne montrent aucune pitié tandis qu'ils harcèlent leur proie, mordant, giflant de leurs nageoires et rampant même sur son corps. Quel dieu cruel a créé de si monstrueuses créatures ?\n\n[Root.Monarch.GetName] sait qu'[Root.Monarch.GetSheHe] devrait intervenir et tenter de secourir leur pauvre victime, mais la peur d'être totalement détruit par ces boules de graisse mangeuses de poissons est difficile à surmonter. Le temps presse, et [Root.Monarch.GetSheHe] doit prendre une décision avant que le sort du pêcheur ne soit scellé."
noukahi_pantheon.104.a:0 "Laissez cet homme tranquille, démoniaques pinnipèdes !"
noukahi_pantheon.104.b:0 "Appeler quelqu'un pour s'occuper de ces phoques !"
noukahi_pantheon.104.c:0 "Son sort est scellé."
noukahi_pantheon.104.d1:0 "Attendez une seconde, nous n'avons pas de phoques de rivière à Sarhal."
noukahi_seal_attack_1:0 "Les phoques respectent votre bravoure, et après un bref mais intense combat de phoques, ils relâchent leur proie."
noukahi_seal_attack_2:0 "Personne n'est venu, mais au moins vous avez essayé. Les phoques repartent triomphalement en se dandinant."
noukahi_seal_attack_3:0 "Votre silence est récompensé par une part du butin de poissons."
noukahi_seal_attack_4:0 "Leur couverture grillée, les phoques se dispersent rapidement."
noukahi_pilgrimage_sealious_injury_ruler_modifier:0 "Blessure Phoquiale"
noukahi_pilgrimage_sealious_injury_ruler_modifier_desc:0 "Les morsures de phoque sont une chose désagréable, et ce souverain l'a appris à ses dépens."

noukahi_pantheon.105.t:0 "Un Verre de Trop"
noukahi_pantheon.105.d:0 "[Root.Monarch.GetName] n'avait pas prévu de boire lorsque le groupe de pèlerins s'arrêta dans une taverne locale pour passer la nuit, mais un compagnon de pèlerinage offrit une tournée à la suite, et ne voulant pas paraître ingrat, [Root.Monarch.GetSheHe] décida de rendre la pareille. Cette dynamique se poursuivit pendant quelques, ou quelques douzaines, de tournées jusqu'à ce que le [Root.Monarch.GetTitle] finisse ivre comme un halfelin dans un tonneau de bière. Les souvenirs de la nuit sont flous, mais certains membres de la suite lui racontèrent, peinant à contenir leurs rires, une sorte d'incident impliquant un âne et une trompette. [Root.Monarch.GetName] décida qu'il valait mieux ne pas demander de détails. L'un des Griots qui voyagent avec le groupe, cependant, ne semblait pas trouver la situation le moins du monde amusante.\n\n« Un [Root.Monarch.GetTitle] devrait montrer l'exemple, être un parangon de modération ! Quand vous vous adonnez à de vils vices et perdez le contrôle de votre esprit et de votre corps, vous insultez les dieux et vous couvrez de honte ainsi que votre nation. De longs contes ont été écrits sur les dangers de l'excès et les vertus de la modération. Je vois que vous avez manifestement besoin d'en entendre un ou deux en ce moment même ! »\n\nLa gueule de bois de [Root.Monarch.GetName] est pratiquement en train de le tuer, et le sermon ne fait qu'aggraver les choses, mais peut-être que le Griot a raison. Après tout, un saint pèlerinage comme celui-ci devrait être le meilleur endroit pour entamer un voyage intérieur d'amélioration personnelle."
noukahi_pantheon.105.a:0 "Endurer le conte et promettre de changer vos habitudes."
noukahi_pantheon.105.b:0 "S'excuser rapidement et prendre congé."
noukahi_pantheon.105.c:0 "Le faire taire et noyer la gueule de bois avec une autre bouteille."
noukahi_drinking_buddy:0 "Vous rencontrez un intéressant compagnon de beuverie."

noukahi_pantheon.106.t:0 "Un Modeste Sanctuaire"
noukahi_pantheon.106.d:0 "Tandis que le groupe de pèlerins traverse un sentier forestier, [Root.Monarch.GetName] remarque un sanctuaire délabré dressé au bord de la route. Curieux, [Root.Monarch.GetSheHe] interroge l'un des Griots de la suite sur sa nature. Le Griot s'approche du sanctuaire pour enquêter, et revient bientôt l'air abattu. « Je connais le héros auquel ce sanctuaire est dédié, et cela m'attriste grandement de le voir dans un si piteux état. C'était un paladin des plus vertueux, un véritable parangon dont les exploits devraient être chantés partout. »\n\nSon expression change alors soudainement, s'emplissant d'excitation. « Oh, mais je vois maintenant comment nous pouvons remédier à cette impiété. Mon [Root.Monarch.GetTitle], je vous sais être de vraie piété et de vraie dévotion. Lorsque nous rentrerons en [Root.GetName], accordez-moi les fonds pour créer le plus grand sanctuaire que notre pays ait jamais vu, et dédiez-le à ce saint guerrier. J'ai déjà des plans pour un tel temple. Laissez-moi vous les expliquer. »\n\nLe Griot poursuit encore et encore sur ses plans et ses rêves. À la façon dont il parle, [Root.Monarch.GetName] est certain que ce serait un sanctuaire très, très coûteux."
noukahi_pantheon.106.a:0 "Aucun coût ne serait trop grand pour honorer ce grand homme !"
noukahi_pantheon.106.b:0 "Nous avons déjà beaucoup de sanctuaires en [Root.GetName]."

noukahi_pantheon.107.t:0 "La Lance d'un Héros ?"
noukahi_pantheon.107.d:0 "« Contemplez sa magnificence, mon [Root.Monarch.GetTitle], émerveillez-vous de sa perfection ! Jamais vous ne tomberez sur une arme pareille, c'en est une entre un million ! Oh, comme il m'en coûte de m'en séparer, mais je vois dans vos yeux que vous êtes vraiment digne d'une telle arme, d'une façon qu'un humble marchand tel que moi ne pourrait jamais l'être. Tout ce que je demande en échange, quelques miettes de pain, une somme infime d'or pour nourrir ma pauvre famille affamée. Assurément un grand [Root.Monarch.GetTitle] tel que vous n'aurait aucune difficulté à épargner ces quelques pièces en échange de la lance d'un véritable héros ? »\n\nLe marchand ambulant que [Root.Monarch.GetName] a rencontré pendant [Root.Monarch.GetHerHis] pèlerinage l'abreuve de discours similaires depuis des heures déjà. Il jure ses grands dieux que la vieille lance usée qu'il propose est l'arme magique du grand héros Pokelgato, une figure dont personne dans la suite n'a jamais entendu parler, mais qui aurait apparemment accompli d'innombrables exploits avec cette arme même. Le prix qu'il demande est plutôt exorbitant, mais s'il s'agit vraiment de la lance d'un tel héros, alors elle en vaudrait sûrement la peine ?"
noukahi_pantheon.107.a:0 "Tout cela me semble bien suspect."
noukahi_pantheon.107.b:0 "Il me faut absolument cette arme prodigieuse."
noukahi_pantheon.107.c:0 "Gardes ! Saisissez cette grande relique !"
noukahi_bought_spear:0 "Si l'arme s'avère être authentique, peut-être vous transformera-t-elle aussi en un grand héros."
noukahi_stole_spear:0 "Le vol n'est guère héroïque, mais cela ne vous empêchera pas de saisir aussi le reste du stock d'armes du marchand."

noukahi_pantheon.108.t:0 "Un Festin de Vautours"
noukahi_pantheon.108.d:0 "Les vautours qui tournoient et obscurcissent les cieux attirent l'attention de [Root.Monarch.GetName] et de sa suite, qui s'approchent pour enquêter. Au sol, des dizaines de charognards festoient déjà sur les morts abondants, au moins vingt hommes ainsi qu'une demi-douzaine de chevaux. Selon un guide local engagé par le groupe, les hommes étaient des bandits, et le carnage est probablement le résultat d'un différend entre eux, que ce soit pour du butin ou pour quelque autre raison que seuls les morts connaissent désormais. Il est clair que celui qui a survécu à l'incident se souciait peu d'enterrer ses anciens compagnons, bien qu'il les ait soigneusement dépouillés de tous leurs objets de valeur avant de les abandonner à pourrir.\n\n[Root.Monarch.GetName] suggère d'enterrer les corps, un acte de piété approprié pour le pèlerinage et que les dieux verraient assurément d'un bon œil. Le guide, cependant, crache au sol. « Ces bâtards n'étaient bons qu'à voler et tuer de leur vivant, au moins dans la mort ils servent de nourriture aux vautours. J'ai plus de pitié pour les chevaux que pour ces excuses pitoyables d'êtres humains. » La plupart de la suite du pèlerinage semble être d'accord. [Root.Monarch.GetName] sait ce qu'enseignent les Griots, que même le plus vil des misérables mérite une sépulture convenable, afin que son âme puisse atteindre l'au-delà et être correctement jugée. [Root.Monarch.GetSheHe] craint, cependant, qu'une telle action puisse être interprétée comme une faiblesse sentimentale, répandant des rumeurs qui causeraient certainement des ennuis une fois de retour au pays."
noukahi_pantheon.108.a:0 "Même les plus vils des scélérats méritent un dernier repos convenable."
noukahi_pantheon.108.b:0 "Les vautours ont besoin de manger aussi, je suppose."

noukahi_pantheon.109.t:0 "Les Malheurs d'une Paysanne"
noukahi_pantheon.109.d:0 "Les sanglots d'une jeune femme, assise pleurant sur le seuil d'une humble maison, poussent [Root.Monarch.GetName] à se séparer du groupe de pèlerins. Désireux de trouver une tâche pour prouver [Root.Monarch.GetHerHis] valeur, [Root.Monarch.GetSheHe] s'approche et l'interroge sur la source de ses malheurs.\n\n« Je pleure pour ma pauvre famille, qui fait maintenant face à la ruine et à la famine. La récolte de cette saison était déjà bien mauvaise, mais voilà que notre cruel seigneur a augmenté le tribut exigé, et il ne nous reste presque plus rien. Je crains que nous ne survivions même pas à cet hiver. » Sans hésiter, [Root.Monarch.GetName] cherche [Root.Monarch.GetHerHis] bourse pour donner à la femme quelque aumône et gagner du crédit aux yeux des dieux. Cependant, elle lève immédiatement la main pour l'arrêter.\n\n« Gardez votre charité, [Root.Monarch.GetTitle], car je ne suis pas votre responsabilité. Mais les nombreux qui vivent sous votre règne le sont, et je me demande si vous leur étendez cette même charité que vous m'offrez maintenant, ou si vos actes ne sont motivés que par un désir de sauver les apparences devant les hommes et le ciel. Si vous êtes vraiment navré de mon état, lorsque vous rentrerez dans vos terres vous réduirez les impôts, protégerez les droits des paysans, distribuerez du pain aux nécessiteux, et ne laisserez aucune famille de vos domaines souffrir comme la mienne. Si vous ne voulez pas faire cela, trouvez quelqu'un d'autre à qui jeter votre menue monnaie. »"
noukahi_pantheon.109.a:0 "Vous avez raison, je serai un souverain bienveillant."
noukahi_pantheon.109.b:0 "Je vais juste laisser l'argent ici et faire comme si je n'avais pas entendu la dernière partie."
noukahi_pantheon.109.c:0 "Souris impertinente ! Vous avez de la chance que je ne vous fasse pas décapiter."
noukahi_pantheon.109.d1:0 "Gardes ! Décapitez-la !"
noukahi_pilgrimage_increased_peasants_rights:0 "Droits Paysans Accrus"
noukahi_pilgrimage_increased_peasants_rights_desc:0 "Après une rencontre fatidique lors d'un pèlerinage, ce souverain a décidé d'introduire plusieurs réformes augmentant les droits des paysans."
noukahi_pilgrimage_scourge_of_the_peasants:0 "Fléau des Paysans"
noukahi_pilgrimage_scourge_of_the_peasants_desc:0 "Ce souverain est connu pour pressurer les paysans avec des impôts, et pour exécuter quiconque ose se plaindre."

noukahi_pantheon.110.t:0 "Auberge Bondée"
noukahi_pantheon.110.d:0 "Le groupe de [Root.Monarch.GetName] s'arrête dans une auberge de bord de route très fréquentée, elle est remplie d'hommes de nombreux pays, et le groupe devra partager une table avec certains. [Root.Monarch.GetName] entend un jeune noble se vanter de ses talents au combat auprès de ses compagnons de chasse, tandis qu'un combattant plus âgé, plus aguerri mais vêtu de bure grossière sirote sa boisson dans un coin avec quelques amis, marmonnant entre leurs dents et lançant des regards noirs aux plus jeunes. Les deux groupes commencent à se crier dessus, et le reste de la salle est tendu, se demandant quand cela éclatera en bagarre."
noukahi_pantheon.110.a:0 "[Root.Monarch.GetName] s'assoit près du noble vantard et lui offre une position dans votre suite."
noukahi_pantheon.110.b:0 "[Root.Monarch.GetName] s'assoit près du vétéran et lui demande conseil pour améliorer vos compétences."
noukahi_pantheon.110.c:0 "[Root.Monarch.GetName] ordonne à l'aubergiste d'expulser l'un des groupes."
noukahi_pantheon.110.d1:0 "[Root.Monarch.GetName] attend que les deux groupes aient fini de manger."

noukahi_pantheon.111.t:0 "La Lame du Mendiant"
noukahi_pantheon.111.d:0 "Durant une longue nuit dans les terres sauvages, un mendiant s'approche du camp de [Root.Monarch.GetName], c'est un être misérable, vêtu de haillons en lambeaux qui enveloppent sa frêle silhouette et une humble épée à la hanche. Ses yeux sont perçants, conservant encore quelque ultime vestige de dignité d'une gloire depuis longtemps révolue. Il tire sa lame de son fourreau et tombe à genoux, la levant au-dessus de sa tête en direction de [Root.Monarch.GetName]. Des mains calleuses tiennent la lame ; elles semblent avoir eu beaucoup de familiarité avec quelque chose de tranchant. Le mendiant croasse : « J'implore humblement refuge pour cette seule nuit, pour cela j'offrirai mon épée, de quelque manière que vous la preniez. »"
noukahi_pantheon.111.a:0 "[Root.Monarch.GetName] lui offre une place dans [Root.Monarch.GetHerHis] garde."
noukahi_pantheon.111.b:0 "[Root.Monarch.GetName] lui permet de se reposer en une place d'honneur dans la tente."
noukahi_pantheon.111.c:0 "[Root.Monarch.GetName] le laisse passer la nuit à l'écart du camp et vend l'épée à la prochaine ville."
noukahi_pantheon.111.d1:0 "[Root.Monarch.GetName] le laisse passer la nuit à l'écart du camp et garde l'épée."
noukahi_pantheon.111.e:0 "[Root.Monarch.GetName] prend l'épée et chasse le mendiant sans défense."

noukahi_pantheon.112.t:0 "Un Lieu de Service en Besoin de Service"
noukahi_pantheon.112.d:0 "Un jour, tandis que [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] groupe cheminent le long d'une route, ils tombent sur un bâtiment qui s'ouvre directement sur la terre battue. C'est une petite chose, mais lorsque [Root.Monarch.GetName] y pénètre pour enquêter, [Root.Monarch.GetSheHe] découvre un hôpital, dont chaque recoin est décoré d'hippocampes, nageant, jouant, mangeant. Dans chaque coin et devant la plupart des murs se trouvent également de belles œuvres d'art. Une Prêtresse-Infirmière de l'hôpital repère enfin le pèlerin. [Root.Monarch.GetName] se présente et la Prêtresse-Infirmière répond avec les courtoisies d'usage ; après quoi elle fait visiter les lieux en détail, expliquant à [Root.Monarch.GetName] qu'elle et ses sœurs prêtresses-infirmières manquent des bandages dont elles ont besoin pour assurer leur service. Tandis qu'elle parle, tous deux arrivent au cœur du complexe, au centre duquel trône une gracieuse fontaine. Elle est à sec, incapable de servir les nombreux pèlerins qui visitent l'Hôpital."
noukahi_pantheon.112.a:0 "[Root.Monarch.GetName] leur fournit bandages et médicaments."
noukahi_pantheon.112.b:0 "[Root.Monarch.GetName] prend un seau et aide à remplir la fontaine."
noukahi_pantheon.112.c:0 "[Root.Monarch.GetName] offre un petit don."
noukahi_pantheon.112.e:0 "[Root.Monarch.GetName] prend l'une des œuvres d'art, réclamant une « taxe »."

noukahi_pantheon.113.t:0 "La Tentation de la Bouteille"
noukahi_pantheon.113.d:0 "Il était et il n'était pas ; il y a très longtemps et hier encore, un pêcheur trouva une bouteille dans son filet, et la sortant, il se demanda ce qu'elle pouvait contenir, bouchée qu'elle était avec de la cire scellée et parsemée d'éclats de pierre stellaire d'un bleu étincelant. La bouteille lui murmura : « Libère-moi et je ferai de toi un roi ! » Et le pêcheur, désirant une vie meilleure pour sa femme et ses enfants, accepta. Mais dans la bouteille se trouvait un génie, et bien qu'il donnât à l'homme et à sa famille un château au bord même de la mer sur une haute falaise avec un grand trésor rempli d'or, la nuit de la pleine lune, quand le regard de Lelanán se tourna vers l'horizon du pêcheur, le château disparut, car le pouvoir du génie faillit sous son regard. Et ainsi le pêcheur et sa famille tombèrent dans la mer et se noyèrent. Ainsi, mes enfants, souvenez-vous, tout pouvoir qui vous est donné, plutôt que gagné par votre propre talent est facilement repris. » Tandis que [Root.Monarch.GetName] marche le long des rives sablonneuses d'un lac, le pied de [Root.Monarch.GetName] heurte une bouteille de verre à moitié enfouie dans le sable. Un motif d'hippocampe est imprimé dans le sceau de cire fermant la bouteille. En la ramassant, [Root.Monarch.GetName] sent une chaleur venant de l'intérieur, et ressent l'étrange envie de l'ouvrir. Une voix murmure que s'[Root.Monarch.GetSheHe] ouvre la bouteille, elle lui accordera un vœu."
noukahi_pantheon.113.a:0 "[Root.Monarch.GetName] l'ouvre avec empressement."
noukahi_pantheon.113.b:0 "[Root.Monarch.GetName] la garde fermée mais l'emporte avec [Root.Monarch.GetHerHim]."
noukahi_pantheon.113.c:0 "[Root.Monarch.GetName] la garde fermée et l'apporte au temple le plus proche."


noukahi_pantheon.114.t:0 "Moine-Forgeron"
noukahi_pantheon.114.d:0 "Tandis que [Root.Monarch.GetName] traverse le marché d'une ville qu'[Root.Monarch.GetSheHe] avait décidé de visiter, [Root.Monarch.GetHerHis] regard est attiré par le travail d'un moine-forgeron, un dévot de Mojobaa, dieu de tels arts, martelant des clous dans un rythme d'une perfection hypnotisante. Le forgeron achève son ouvrage et passe à la réparation de pots ; cela permet à [Root.Monarch.GetName] de repérer une lame étincelante montée sur le mur du fond de l'étal du moine… elle est en flammes. Pourtant le feu léchant ne se propage pas au-delà de la lame. Tel est l'exquis savoir-faire de cette chose, elle est imprégnée de l'essence même du feu. Ce serait un complément des plus raffinés pour toute armure, même une aussi prestigieuse que celle d'un roi…"
noukahi_pantheon.114.a:0 "[Root.Monarch.GetName] charme le forgeron pour obtenir la merveilleuse lame."
noukahi_pantheon.114.b:0 "[Root.Monarch.GetName] propose d'acheter la redoutable arme."
noukahi_pantheon.114.c:0 "[Root.Monarch.GetName] menace le forgeron et prend la chose par la force."
noukahi_drinking_buddy:0 "Vous rencontrez un intéressant compagnon de beuverie."

noukahi_pantheon.115.d:0 "Alors que [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] entourage approchent d'un carrefour, ils aperçoivent ce qui est indubitablement un prêtre de Mojobaa marchant sur un chemin dans leur direction. L'armure étincelante qu'il porte cliquète tandis qu'il avance d'un pas assuré, une poignée d'épée dépasse de son dos, et ceint autour de sa taille se trouve un fier marteau de forgeron, accompagné de ses nombreux autres outils. Lorsque le prêtre repère le groupe de [Root.Monarch.GetName], il leur fait signe. Quand tous sont assez proches pour parler, il fait un geste rapide de respect, après quoi il formule une requête : lui permettre de les accompagner jusqu'à la prochaine ville, puisqu'ils semblent tous se diriger dans la même direction. L'ensemble du groupe de [Root.Monarch.GetName] se tourne vers [Root.Monarch.GetHerHim], attendant [Root.Monarch.GetHerHis] décision."
noukahi_pantheon.115.a:0 "[Root.Monarch.GetName] invite le prêtre à rejoindre sa cour une fois le pèlerinage terminé."
noukahi_pantheon.115.b:0 "[Root.Monarch.GetName] lui offre une place dans son groupe pour un temps et demande à apprendre de lui."
noukahi_pantheon.115.c:0 "[Root.Monarch.GetName] l'accompagne jusqu'à la prochaine ville où ils se séparent."
noukahi_pantheon.115.d1:0 "[Root.Monarch.GetName] lui extorque de l'argent pour sa protection."


noukahi_pantheon.116.t:0 "Un Challenger Approche"
noukahi_pantheon.105.d:0 "La monotonie de la route est brisée pour [Root.Monarch.GetName] lorsque, droit devant sur le chemin que [Root.Monarch.GetHerHis] groupe emprunte, se tient un homme-lézard. Il se dresse fièrement et serre une arme dans sa main. Il rugit : « JE SUIS UN GUERRIER QUI CHERCHE DES GUERRIERS. QUE L'UN D'ENTRE VOUS S'AVANCE ET ME MONTRE SON TALENT, SA PUISSANCE, SA GRANDEUR AU COMBAT ! » Son dernier mot résonne avec un fort accent."
noukahi_pantheon.116.a:0 "[Root.Monarch.GetName] se bat loyalement et avec brio grâce à son entraînement régulier."
noukahi_pantheon.116.b:0 "[Root.Monarch.GetName] se bat loyalement, bien que son manque de pratique fréquente inquiète sa suite."
noukahi_pantheon.116.c:0 "[Root.Monarch.GetName] choisit l'un de ses suivants pour combattre en tant que champion."
noukahi_pantheon.116.d1:0 "[Root.Monarch.GetName] triche pour gagner."


noukahi_pantheon.117.t:0 "Cité Portuaire"
noukahi_pantheon.117.d:0 "Tandis que le voyage de [Root.Monarch.GetName] se poursuit, [Root.Monarch.GetSheHe] se retrouve dans une cité portuaire grouillante d'activité. De loin, [Root.Monarch.GetSheHe] repère une ménagerie de peuples, des étrangers reconnaissables à leurs traits particuliers : la stature minuscule des gnomes qui surpassait même les Vyzemby ; la peau pâle des humains du grand nord, les oreilles pointues et l'assortiment arc-en-ciel de chevelures des elfes ; tous ressortaient comme des tchoken dans le Marais des Ombres. Des marchands vantent ce qui a sûrement dû venir avec ces étrangers. Ils exposent des marchandises de luxe, des animaux exotiques, et des livres de savoir rédigés par des érudits de contrées lointaines. Tout autant sinon plus d'étals proposent des marchandises plus familières. [Root.Monarch.GetName] hume des effluves de nourriture aux senteurs enivrantes et aperçoit d'abondantes œuvres d'art colorées."
noukahi_pantheon.117.a:0 "[Root.Monarch.GetName] invite quelques marchands à rentrer au pays avec lui."
noukahi_pantheon.117.b:0 "[Root.Monarch.GetName] s'intéresse aux marchands vendant du savoir étranger."
noukahi_pantheon.117.c:0 "[Root.Monarch.GetName] s'en tient à ce qu'il connaît."
noukahi_pantheon.117.d1:0 "[Root.Monarch.GetName] est furieux et blâme le marché de laisser des étrangers s'installer."


# noukahi_pantheon.118.t:0 "Two Philosophers"
# noukahi_pantheon.118.d:0 "[Root.Monarch.GetName] is stopped by two philosophers who are debating the history and place of humans in the Sarhal. One argues that Ardim's journey means that one should be kind to all those in these lands, for we are guests in their house. The other argues that Ardim's journey shows that we are the true inheritors of the Sarhal, rather than the Khet or Lizards."
# noukahi_pantheon.118.a:0 "[Root.Monarch.GetName] creates a compromise that respects both views."
# noukahi_pantheon.118.b:0 "[Root.Monarch.GetName] agrees that one should be generous with their neighbors."
# noukahi_pantheon.118.c:0 "[Root.Monarch.GetName] agrees that Ardim's legacy is one of conquest."
# noukahi_pantheon.118.d1:0 "[Root.Monarch.GetName] listens and nods, but claims to have no insight into the truth of the matter."
# noukahi_pantheon.118.e:0 "[Root.Monarch.GetName] argues that both are wrong and that wealth and power are inherent to leaders."

# noukahi_pantheon.119.t:0 "Bridge"
# noukahi_pantheon.119.d:0 "[Root.Monarch.GetName] comes to a bridge that has been swept away by a recent flood. While repairs are starting, there is a dispute between a young engineer and the town's mayor. The engineer has a plan for a design from his studies in the far north for a suspended design that is less likely to be swept out by a flood. But the Mayor is insistent that a traditional design must be chosen."
# noukahi_pantheon.119.a:0 "[Root.Monarch.GetName] suggest their own idea that incorporates the traditional aesthetics into the engineer's design."
# noukahi_pantheon.119.b:0 "[Root.Monarch.GetName] supports the engineer in constructing the new design."
# noukahi_pantheon.119.c:0 "[Root.Monarch.GetName] sits both sides down to resolve their concerns."
# noukahi_pantheon.119.d1:0 "[Root.Monarch.GetName] says, "Move aside, I got this.""
# noukahi_pantheon.119.e:0 "[Root.Monarch.GetName] orders them to ferry your party across regardless of the danger."

# noukahi_pantheon.120.t:0 "Kunolo Priest"
# noukahi_pantheon.120.d:0 "In the marketplace of the town [Root.Monarch.GetName] entered, [Root.Monarch.GetName] sees a priest from Kunolo giving a sermon on respecting changes and aligning with your true self. He notices [Root.Monarch.GetName] and calls out, asking [Root.Monarch.GetName] to reflect on what they would seek to change in their life to become more themself."
# noukahi_pantheon.120.a:0 "[Root.Monarch.GetName] reflects on large changes they could make in their life."
# noukahi_pantheon.120.b:0 "[Root.Monarch.GetName] reflects on small changes they can make to improve."
# noukahi_pantheon.120.c:0 "[Root.Monarch.GetName] tries to meditate."
# noukahi_pantheon.120.d1:0 "[Root.Monarch.GetName] scorns him."

# noukahi_pantheon.121.t:0 "Trial"
# noukahi_pantheon.121.d:0 "[Root.Monarch.GetName] comes to a town that is holding a meeting. Listening in, [Root.Monarch.GetName] surmises that a trial between a merchant and one of the villagers is happening. The merchant is emphatic that he sold his wares in good faith, and did not know about a rotting rat carcass the villager found in the jewelry box they purchased. The merchant is one of the few that comes through this town and the villager paid a significant sum, as the box would be the centerpiece of her daughter's dowry. The villager says the merchant tried to cheat her, as the rat had ruined the velvet lining and made the box near useless for holding the embroidery her daughter was making. The chief notices [Root.Monarch.GetName]'s group and realizes that a monarch is traveling through on pilgrimage. He begs [Root.Monarch.GetName]'s aid in resolving the dispute."
# noukahi_pantheon.121.a:0 "[Root.Monarch.GetName] says, "It will be an elementary deduction.""
# noukahi_pantheon.121.b:0 "[Root.Monarch.GetName] listens to all parties and makes a careful judgement on the evidence provided."
# noukahi_pantheon.121.c:0 "[Root.Monarch.GetName] requests their retainer handle the matter so they can sleep."
# noukahi_pantheon.121.d1:0 "[Root.Monarch.GetName] extorts the merchant for coin to rule in his favor."

# noukahi_pantheon.122.t:0 "Bandited Woman"
# noukahi_pantheon.122.d:0 "As [Root.Monarch.GetName] walks down a forest path, [Root.Monarch.GetName] hears a woman calling for aid. [Root.Monarch.GetName] turns to look at her, and sees an older woman, regal in bearing, wearing good quality but faded clothing, her feet are bare and marked by hard labor. She tells [Root.Monarch.GetName] that bandits have taken over her home, leaving her destitute."
# noukahi_pantheon.122.a:0 "[Root.Monarch.GetName] resolves to drive the bandits out."
# noukahi_pantheon.122.b:0 "[Root.Monarch.GetName] tosses her some coins so she can move."
# noukahi_pantheon.122.c:0 "[Root.Monarch.GetName] offers to escort her to the nearest town."
# noukahi_pantheon.122.d1:0 "[Root.Monarch.GetName] ignores her, and rides past."

# noukahi_pantheon.123.t:0 "Poor Inn"
# noukahi_pantheon.123.d:0 "One night as [Root.Monarch.GetName] gets to an inn, they hear a mother singing a lullaby. As the party approaches, they see a woman sitting on a bench near the stable, a baby cradled in her arms bundled in thick blankets. The woman's clothing is worn from hard use, and there is a bit of soot on the end where it touches the ground. She stands saying, "Greetings, your majesty, welcome to my inn. It's not much, but there is a large room that should fit you all."
# noukahi_pantheon.123.a:0 "[Root.Monarch.GetName] thanks her and offers her a generous fee."
# noukahi_pantheon.123.b:0 "[Root.Monarch.GetName] requests space to set up their tents outside, and orders a meal for now and morning."
# noukahi_pantheon.123.c:0 "[Root.Monarch.GetName] sighs and lets their retainers deal with it."
# noukahi_pantheon.123.d1:0 "[Root.Monarch.GetName] scowls and orders her to apologize for such crass behavior and demands recompense."

noukahi_pantheon.124.t:0 "Un Pacte dans les Ténèbres"
noukahi_pantheon.124.d:0 "[Root.Monarch.GetName] est près du feu au centre de [Root.Monarch.GetHerHis] camp. Le crépuscule s'était depuis longtemps installé et la somnolence l'avait gagné. [Root.Monarch.GetSheHe] se dirige vers [Root.Monarch.GetHerHis] tente pour dormir, mais juste avant d'y pénétrer, [Root.Monarch.GetSheHe] aperçoit une silhouette du coin de l'œil. [Root.Monarch.GetSheHe] tourne vivement la tête vers l'apparition pour ne rien trouver. [Root.Monarch.GetSheHe] regarde autour un moment avant de se retourner vers [Root.Monarch.GetHerHis] tente. C'est à ce moment qu'[Root.Monarch.GetSheHe] remarque une vieille femme ridée se tenant exactement à l'opposé de la direction où [Root.Monarch.GetSheHe] pensait avoir vu cette silhouette. Son apparition soudaine fait sursauter [Root.Monarch.GetName]. C'est une vision étrange, couverte de plantes et de champignons indubitablement issus du marais. Avant que vous puissiez placer un mot, elle parle : « Celui qui l'a fait n'en voulait pas. Celui qui l'a acheté n'en avait pas besoin. Celui qui l'a eu ne le savait pas. »\n\n[Root.Monarch.GetName] connaît cette énigme, rapidement [Root.Monarch.GetSheHe] répond : « Un cercueil. »\n\nElle sourit et hoche la tête. Elle offre richesses, fortune au-delà de [Root.Monarch.GetHerHis] rêves les plus grandioses… pour un prix : répondre correctement à deux autres énigmes, et rapporter un gage du pacte conclu, la première chose que [Root.Monarch.GetName] verra en rentrant chez [Root.Monarch.GetHerHim]. Faites cela, dit-elle, et [Root.Monarch.GetSheHe] sera amplement récompensé."
noukahi_pantheon.124.a:0 "« Arrière, créature infâme, je ne veux rien de vos marchés ou de vos jeux ! »"
noukahi_pantheon.124.b:0 "« Je n'accepterai pas votre pacte, mais je vous vaincrai à ce jeu d'énigmes. »"
noukahi_pantheon.124.c:0 "« La première chose que je verrai, dites-vous… »"

noukahi_pantheon.125.t:0 "Sanctuaire Délabré"
noukahi_pantheon.125.d:0 "Tandis que [Root.Monarch.GetName] s'enfonce profondément dans les bois, [Root.Monarch.GetSheHe] tombe sur un sanctuaire délabré, mousse et champignons en train de recouvrir la chose, sa structure de bois usée et grisâtre, et une statue en son sein, dont les couleurs s'effacent depuis longtemps tandis que sa peinture s'écaille. Nichée dans la poitrine de la statue se trouve une gemme qui luit et scintille sous la lumière éparse qui filtre à travers les feuilles. Cette chose d'un pourpre sombre attire le regard de [Root.Monarch.GetName], [Root.Monarch.GetHerHis] mains frémissent d'un désir irrépressible de s'en emparer."
noukahi_pantheon.125.a:0 "[Root.Monarch.GetName] reconstruit le sanctuaire pour resceller le pouvoir maléfique emprisonné dans cette gemme."
noukahi_pantheon.125.b:0 "[Root.Monarch.GetName] fait appel aux prêtres de Mojobaa pour reconstruire le sanctuaire défraîchi et contenir les maux qui persistent en ce lieu."
noukahi_pantheon.125.c:0 "[Root.Monarch.GetName] est perturbé par un sentiment de malaise, [Root.Monarch.GetSheHe] s'en va sur-le-champ."


