 HOLY_SITE_5863_DESC:0 "La flèche brisée du lac Kuiziva est si manifestement d'un autre monde que de nombreux récits mythifiant ses véritables origines ont vu le jour. Pour les peuples de la Fangaula, elle représentait le point le plus éloigné de leur empire jadis puissant, et l'on dit qu'elle constitue un pont vers la lune ainsi que le lieu de repos final des esprits. Pour les peuples de Horashesh, c'est là que le seigneur de guerre Kui proclama sa divinité. La légende raconte que la flèche se mit à scintiller de la lumière des étoiles tandis qu'il parlait, prouvant ainsi son statut d'élu des dieux."
 HOLY_SITE_6599_DESC:0 "Pour défendre le peuple Vurebindu, le créateur Zuvanofa terrassa le roi des génies au combat. Cependant, il fut blessé dans l'affrontement. Sa consorte, Noromhanda, le conduisit au Temple de Lel pour le soigner, invoquant des hippocampes pour l'aider à panser ses plaies. Comme pour bon nombre de récits du Panthéon Noukahi, il existe vraisemblablement une part de vérité derrière des siècles de mythes, car des variantes de cette histoire existent également dans la religion du Nakavy Avo. Le Temple de Lel, lui, est bien réel. Il se dresse encore aujourd'hui au cœur de Lelanán, ses murs ornés de mosaïques représentant des hippocampes."
 HOLY_SITE_5808_DESC:0 "Le volcan Junansuar abrite un ancien palais d'Éfrit transformé en monastère dédié au four divin Mojobaa. Au plus profond du volcan, les légendes racontent que Mojobaa forge armes et outils dans un atelier divin pour combattre les ennemis des Dieux et de la création. Des moines réputés pour leurs compétences exceptionnelles en forge entretiennent le site sacré, façonnant de puissantes armes d'acier de bois-de-fer imprégnées de magie élémentaire."
 HOLY_SITE_5941_DESC:0 "Les hommes-lézards sont l'ennemi ancestral des peuples de Horashesh. Présents avant que Zuvanofa ne créât le monde, ils sont considérés comme une menace éternelle pour l'humanité. Cela ne signifie pas pour autant qu'il n'existe aucun respect pour leur culture et leur civilisation. Lorsque le seigneur de guerre Ikilshebe Nyokyora s'enfonça profondément dans la jungle des hommes-lézards, ses compagnons d'armes en revinrent parlant avec émerveillement des cités qu'ils avaient découvertes. Au centre de la grande cité de Nahzni se dressait un cercle de flèches, chacune presque aussi imposante que le Kuiika Gamyi, comme si elles avaient été taillées dans les étoiles elles-mêmes."
 HOLY_SITE_6063_DESC:0 "Les premiers humains à traverser le Salahad vers Noukahi furent guidés par Ardim, l'héroïne élue de Zuvanofa. Elle les mena en une grande procession à travers désert, montagne, marécage et mer, jusqu'à ce qu'ils accostent à Ardim Qarast. Là, elle fonda une grande civilisation qui perdura des millénaires, jusqu'à ce qu'elle fût ensevelie par le sable et la mer. Des variantes de ce récit se retrouvent dans tout Sarhal, bien que la plupart des historiens rejettent avec mépris l'idée qu'il puisse être véridique. Découvrir cette cité mythique bouleverserait notre compréhension de l'histoire."
 HOLY_SITE_5481_DESC:0 "Des siècles de domination khétératane laissent leur empreinte sur la foi d'un peuple. Certaines figures transcendent les religions lorsque leurs histoires sont suffisamment captivantes, car rien ne plaît davantage aux adeptes du Panthéon Noukahi qu'un bon récit. C'est ainsi que naquit Niramhat. Dans le Khétisme, elle est Nirakhet, mère d'Elikhet, dont les larmes se rassemblèrent au lac Nirakhet pour devenir la rivière enchantée du Chagrin. Dans le Panthéon Noukahi, elle est Niramhat, la Reine-Absolue et épouse de Zuvanofa. Mais le récit de ses larmes créant le Chagrin est conté dans les deux fois, faisant du lac Nirakhet un lieu sacré pour les deux religions."
 HOLY_SITE_6690_DESC:0 "Les Echenka sont des frères depuis longtemps perdus du peuple Irsukuba, qui ne migrèrent jamais vers Horashesh. Ils vécurent plutôt dans les Hautes-Terres de Rakkazi, aux confins de ce qui fut jadis leur patrie verdoyante et luxuriante : le Marais des Ombres. La légende parmi les Irsukuba raconte que la grande guenaude Hireet Tisseuse-de-Ténèbres offrit à la reine des Echenka, Lama Kerac, la capacité de ressusciter son époux récemment décédé. Le sortilège fonctionna, mais en rendant ses couleurs à son époux, le corps de la Reine fut maudit. Partout où elle se tenait, les couleurs se drainaient de la terre elle-même. Pour tenter de contenir la propagation des ténèbres, elle se cloua elle-même à la Matriarche des Racines-d'Ombre où elle résiderait encore. Bien que ce récit revête de nombreuses significations pour les Irsukuba, le message principal est fort simple : ne jamais conclure de pacte avec les guenaudes."

