 curtail_estate_noble_title:0 "Réduire la noblesse"
 curtail_estate_noble_desc:0 "Notre gouvernement est dirigé par et pour l'aristocratie. Pour adopter une administration plus centralisée, nous devrons réduire son pouvoir et ses privilèges."
 curtail_estate_church_title:0 "Réduire le clergé"
 curtail_estate_church_desc:0 "Notre église d'État exerce une grande influence sur les affaires séculières de l'État. Pour limiter son influence sur les affaires de l'État, nous devrons réduire son pouvoir et ses privilèges."
 curtail_estate_brahmins_title:0 "Réduire les brahmanes"
 curtail_estate_brahmins_desc:0 "Les brahmanes exercent une grande influence sur les affaires séculières de l'État. Pour limiter leur influence sur les affaires de l'État, nous devrons réduire leur pouvoir et leurs privilèges."
 curtail_estate_burghers_title:0 "Réduire la bourgeoisie"
 curtail_estate_burghers_desc:0 "Par la corruption et les pots-de-vin, la bourgeoisie a une mainmise sur notre gouvernement. Pour reprendre le contrôle de ces marchands, nous devrons réduire leur pouvoir et leurs privilèges."
 curtail_estate_vaisyas_title:1 "Réduire les Vaishyas"
 curtail_estate_vaisyas_desc:0 "Par la corruption et les pots-de-vin, les Vaishyas ont une mainmise sur notre gouvernement. Pour reprendre le contrôle de ces marchands, nous devrons réduire leur pouvoir et leurs privilèges."
 curtail_estate_nomadic_tribes_title:0 "Réduire les tribus"
 curtail_estate_nomadic_tribes_desc:0 "Les tribus ont fait du Khan leur marionnette, imposant des lois et traditions non désirées. Pour leur reprendre le pouvoir, nous devrons réduire leur pouvoir et leurs privilèges."
 curtail_estate_dhimmi_title:0 "Réduire les Dhimmi"
 curtail_estate_dhimmi_desc:0 "Les Dhimmi ont une mainmise sur notre gouvernement. Pour leur reprendre le contrôle, nous devrons réduire leur pouvoir et leurs privilèges."
 curtail_estate_jains_title:0 "Réduire les Jaïns"
 curtail_estate_jains_desc:0 "Les Jaïns ont une mainmise sur notre gouvernement. Pour leur reprendre le contrôle, nous devrons réduire leur pouvoir et leurs privilèges."
 gain_access_to_estate_dhimmi_title:0 "Établir l'État des Dhimmi"
 gain_access_to_estate_dhimmi_desc:0 "Avec notre expansion, le nombre de païens non gérés croît dans notre [Root.GovernmentName]. Nous devrions établir une entité politique interne dont le but est de traiter avec les païens."
