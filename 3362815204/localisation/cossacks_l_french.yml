 only_noble_officers:0 "Officiers de naissance noble"
 desc_only_noble_officers:0 "À moins qu'un homme ne soit né avec le privilège, il ne sera pas autorisé à accéder aux positions supérieures dans nos armées et nous nous efforçons de maintenir un corps d'officiers entièrement composé de personnes de naissance noble. Certains diraient que cela limite notre commandement mais pour nous c'est un moyen de s'assurer que notre pays est dirigé par les mêmes familles qui l'ont toujours mené à la grandeur."
 heathen_taxes_abolished:0 "Taxes discriminatoires abolies"
 desc_heathen_taxes_abolished:0 "Nous avons cédé aux demandes de nos sujets non-musulmans et aboli de nombreuses taxes visant spécifiquement eux et leurs pèlerinages."
 repression_of_influential_dhimmi:0 "Païens éminents châtiés"
 desc_repression_of_influential_dhimmi:0 "Afin de restaurer l'ordre des choses dans cette région, nous avons empêché les propriétaires terriens infidèles locaux de dépenser somptueusement pour des constructions en l'honneur de leur divinité. Cela a apaisé certaines factions dans notre pays mais la population ici est très mécontente et évite activement de payer des impôts et de contribuer à l'État."
 overzealous_qazi:0 "Soutien au fanatique religieux"
 desc_overzealous_qazi:0 "Notre soutien à ceux de l'établissement religieux qui saperaient activement les droits des Dhimmi a résulté en une animosité entre nous et nos sujets non-musulmans, nuisant ironiquement gravement à notre capacité à les convertir."
 elaborate_court_ceremonies:0 "Vie de cour élaborée"
 desc_elaborate_court_ceremonies:0 "Nous avons décidé de transformer la vie de cour de notre pays en la formalité la plus élaborée imaginable. Comme tous ceux qui comptent sont censés assister notre dirigeant dans la capitale, cela limite considérablement la capacité de la noblesse à comploter, mais cela a un coût élevé."
 disloyal_noble_officers:0 "Officiers déloyaux"
 desc_disloyal_noble_officers:0 "Ayant aliéné la noblesse, nous nous retrouvons avec très peu de partisans parmi les chefs de nos armées. Leurs priorités ne sont clairement pas de gagner nos guerres et certains peuvent même être soupçonnés de travailler activement contre nous."
 noble_minister:0 "Conseiller noble"
 desc_noble_minister:0 "Notre conseil est dominé par un membre de l'une des plus belles familles nobles de notre pays. Son vaste réseau de contacts assure que nous pouvons impressionner les nobles chez nous comme à l'étranger."
 burgher_minister:0 "Conseiller marchand"
 desc_burgher_minister:0 "L'un des membres les plus talentueux de notre conseil est un marchand prospère. Ayant fait sa propre fortune, il n'a pas perdu de temps à augmenter l'efficacité de notre économie. Son réseau de contacts parmi les communautés marchandes assure également que notre État est en phase avec la bourgeoisie."
 church_minister:0 "Conseiller du clergé"
 desc_church_minister:0 "L'un des ministres les plus talentueux de notre conseil a été recruté parmi le clergé. Bien que ce soit loin d'être inhabituel, cela signifie qu'il peut compter sur leur soutien et que les clercs locaux dans notre administration lui sont encore plus loyaux, augmentant notre contrôle même sur les coins les plus reculés de notre royaume."
 dhimmi_minister:0 "Conseiller dhimmi"
 desc_dhimmi_minister:0 "Un membre très talentueux de notre conseil a des origines parmi les Dhimmi. Ce n'est pas exactement populaire auprès de tous dans notre État mais le soutien de son propre état est un avantage pour notre pays."
 nobility_sumptuary_restrictions:0 "Restrictions somptuaires sévères"
 desc_nobility_sumptuary_restrictions:0 "Nous avons mis en place une série de restrictions sévères sur qui peut et ne peut pas acheter certains articles de luxe. Des vêtements et bijoux au parfum et à la hauteur exacte ou au nombre de fenêtres d'une maison, tout doit refléter le statut social approprié du propriétaire. En plus de cimenter les frontières sociales, cela a entraîné une forte baisse des prix pour la plupart des biens qui ont quelque chose à voir avec les restrictions."
 burgher_unfavorable_trade_laws:0 "Politiques commerciales défavorables"
 desc_burgher_unfavorable_trade_laws:0 "Nos marchands perdent de l'argent à cause de nos décisions politiques concernant les politiques commerciales et les tarifs."
 burgher_favorable_trade_laws:0 "Marchands favorisés"
 desc_burgher_favorable_trade_laws:0 "Nos marchands se sont vu accorder divers droits pour compenser leur perte de revenus due aux politiques commerciales initiées par le gouvernement et aux péages et tarifs politiquement motivés."
 new_men:0 "Hommes nouveaux"
 desc_new_men:0 "Un nombre croissant de personnes sans liens avec le clergé ou la noblesse tentent actuellement de faire carrière dans l'administration de notre État."
 conflict_within_city:0 "Conflit au sein de la cité"
 desc_conflict_within_city:0 "Il y a discorde entre les groupes résidant dans la ville capitale de cette province. L'utilisation du système de sous-traitance par certains de ses résidents a sapé les règles des guildes en matière de prix et de méthodes."
 thankful_guilds:0 "Privilèges des guildes défendus"
 desc_thankful_guilds:0 "En défendant les droits des guildes dans la ville capitale de cette province, nous avons renforcé les relations avec la bourgeoisie ici. Pour le moment, ils sont plus engagés à maintenir notre paix et la ville a mystérieusement commencé à rapporter plus d'impôts."
 held_back_commoners:0 "Hommes nouveaux déloyaux"
 desc_held_back_commoners:0 "Nous avons agi pour protéger les classes établies contre l'ambition de la classe montante des « Hommes nouveaux » qui visent à les remplacer dans de nombreuses positions de pouvoir supérieures au sein de l'État, de l'armée à l'appareil administratif ou même aux tribunaux. Les classes marchandes dont sont originaires les hommes nouveaux voient nos actions comme déloyales et ingrates."
 social_mobility:0 "Mobilité sociale"
 desc_social_mobility:0 "Nous avons encouragé la bourgeoisie à concurrencer les nobles et le clergé pour les positions dans notre administration, armée et marine. Au grand désarroi des états anciennement privilégiés."
 unsanitary_suburbs:0 "Faubourgs insalubres"
 desc_unsanitary_suburbs:0 "La ville capitale de cette région a grandi trop vite pour faire face au grand nombre de nouveaux habitants. Des faubourgs se sont développés où la maladie prospère et le crime est endémique."
 religious_court_life:0 "Domination cléricale"
 desc_religious_court_life:0 "Notre cour est dominée par la caste sacerdotale et les règles de leurs écritures. Ces règles strictes sont nécessaires pour garder la faveur de notre puissant clergé mais beaucoup de nos sujets, hauts et bas, se sentent aliénés par ce mode de vie archaïque."
 dhimmi_administrators:0 "Administrateurs dhimmi"
 desc_dhimmi_administrators:0 "Malgré les protestations des Oulémas, nous employons un grand nombre de non-musulmans dans notre appareil gouvernemental."
 missionary_syncretism:0 "Syncrétisme missionnaire"
 desc_missionary_syncretism:0 "Un mélange d'anciennes croyances mystiques et d'idées plus orthodoxes a aidé à rendre notre religion d'État plus acceptable pour les païens."
 campaign_against_syncretism:0 "Campagne contre le syncrétisme"
 desc_campaign_against_syncretism:0 "Notre soutien au clergé dans ses tentatives d'éradiquer le syncrétisme inculte chez nous et à l'étranger parmi les convertis récents unifie les membres de la vraie foi dans nos terres."
 cossacks_supplied_centrally:0 "Orachav approvisionnés centralement"
 desc_cossacks_supplied_centrally:0 "Nous approvisionnons les Orachav des steppes depuis nos propres coffres pour les lier plus étroitement à nous et les rendre plus résistants contre les Tartares, le temps et le vent."
 cossack_settlers:0 "Colons orachav"
 desc_cossack_settlers:0 "Nos sujets orachav sont habitués à vivre en frontière, loin des frontières bien définies et proches des raids tartares et d'un climat parfois rude. Cette expérience s'est avérée inestimable dans des terres similaires que nous colonisons, comme en Asie centrale ou en Sibérie."
 new_world_company:0 "Compagnies du Nouveau Monde"
 desc_new_world_company:0 "Nous avons cédé des droits étendus à la colonisation du Nouveau Monde pour encourager nos principales familles marchandes à y investir."
 new_world_missions:0 "Missions du Nouveau Monde"
 desc_new_world_missions:0 "Nous avons encouragé l'activité missionnaire dans nos colonies, travaillant étroitement avec le clergé de notre pays."
 dhimmi_nobles:0 "Nobles dhimmi"
 desc_dhimmi_nobles:0 "Au grand dam de nos Oulémas et de l'aristocratie existante, nous avons activement cherché à anoblir et intégrer un certain nombre de nobles dhimmi éminents dans notre propre groupe de nobles."
 religious_intolerance_enforced:0 "Intolérance religieuse imposée"
 desc_religious_intolerance_enforced:0 "Des zélotes religieux nous ont forcés à adopter un certain nombre de lois et de restrictions basées sur leur interprétation de ce que devrait être l'État religieusement idéal."
 no_tribal_leaders:0 "Nombre réduit de généraux"
 desc_no_tribal_leaders:0 "Nous avons accepté que les tribus les plus puissantes ne soient pas obligées de laisser leurs chefs servir comme généraux dans nos armées."
