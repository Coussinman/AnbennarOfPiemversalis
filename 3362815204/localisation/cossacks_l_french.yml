 PREPARE_WAR_CANNOT_NOT_ALLY:0 "§RVous devez être allié avec §Y$COUNTRY$§! pour leur demander de se préparer à la guerre.§!"
 PREPARE_WAR_DESC:1 "Dépensez §Y$COST$§! faveurs pour demander à §Y$COUNTRY$§! de se préparer à la guerre. Ils éviteront de déclencher des guerres de leur propre chef pendant $MONTHS|Y$ mois et gagneront §Y20§! de raison pour rejoindre votre guerre."
 HOSTILE_ATTITUDE_DESC:0 "Définir votre attitude comme §YHostile§! montre que vous considérez §Y$COUNTRY$§! comme un ennemi à conquérir. Ils refuseront presque toutes les propositions diplomatiques de votre part, vos alliés considéreront cela comme un signe que vous êtes disposé à rejoindre des guerres contre eux, et vos sujets fabriqueront des revendications sur leurs provinces."
 NEUTRAL_ATTITUDE_DESC:0 "Définir votre attitude comme §YNeutre§! montre que vous ne considérez pas §Y$COUNTRY$§! comme pertinent pour vos intérêts. Ils éviteront généralement d'interagir diplomatiquement avec vous, et vos alliés verront cela comme un signe que vous êtes indifférent à leur égard."
 FRIENDLY_ATTITUDE_DESC:0 "Définir votre attitude comme §YAmicale§! montre que vous souhaitez vous allier avec §Y$COUNTRY$§!. Vos alliés verront cela comme un signe que vous n'êtes pas disposé à les attaquer."
 FRIENDLY_ATTITUDE_CANNOT_SET_OPINION:0 "§RVous ne pouvez pas définir votre attitude comme §YAmicale§! parce que §Y$COUNTRY$§! n'a pas au moins §Y$OPINION$§! d'opinion envers §Y$PLAYER$§!.§!"
 THREATENED_ATTITUDE_CANNOT_SET_POWER:1 "§R$COUNTRY|Y$ n'est pas au moins §Y33%§! plus puissant que $PLAYER|Y$.§!"
 THREATENED_ATTITUDE_CANNOT_SET_DISTANCE:0 "§RVous ne pouvez pas définir votre attitude comme §YMenacée§! parce que §Y$COUNTRY$§! n'est pas en position de menacer §Y$PLAYER$§!.§!"
 THREATENED_ATTITUDE_DESC:0 "Définir votre attitude comme §YMenacée§! montre que vous craignez §Y$COUNTRY$§!. Ils verront cela comme un signe que vous êtes disposé à vous allier avec eux pour votre sécurité, mais aussi que vous cherchez d'autres alliés puissants pour vous protéger contre eux."
 TRUST_DESC:1 "La §YConfiance§! est une mesure de la force de toute alliance que nous avons avec §Y$COUNTRY$§!. Elle diminue si nous rompons des promesses ou agissons de manière déshonorante envers eux. Elle peut être augmentée en dépensant des faveurs. La confiance augmentera également avec le temps tant que vous êtes alliés ou que l'un est le sujet de l'autre."
 FAVORS_INSTANT:1 "§Y$COUNTRY$§! nous doit §Y$NUM|2$§! faveur(s)."
 FAVORS_GAIN_TOOLTIP:1 "Nous gagnons $VAL|+=2$ faveur(s) chaque mois en raison de :\n$WHY$"
 FAVOR_ALLIANCE_TT:0 "Alliés : Force relative : $VAL|+=2$"
 FAVOR_ALLIANCE_BLOCKED_TT:0 "Guerres offensives refusées : $VAL|+=2$"
 FAVOR_CURRY_FAVORS_REP_TT:1 "Réputation diplomatique : $VAL|+=2$"
 FAVOR_CURRY_FAVORS_OPINION_TT:1 "Opinion : $VAL|+=2$"
 FAVOR_LACK_OF_ALLIANCE_TT:0 "Absence d'alliance : $VAL|+=2$"
 FAVORS_DESC:0 "Les §YFaveurs§! sont une mesure de ce que §Y$COUNTRY$§! nous doit pour les bonnes actions que nous leur avons rendues par le passé, comme les aider dans leurs guerres et leur donner des terres qu'ils veulent dans nos propres guerres. Elles peuvent être dépensées pour augmenter leur confiance envers nous, leur demander de se préparer à la guerre contre un autre pays, ou pour les appeler dans une guerre où nous ne leur promettons aucun gain territorial."
 TRUST_HIT_FROM_NO_LAND:0 "§Y$WHO$§! reçoit moins de provinces qu'ils n'en attendent de leur §Y$CONT$%§! de contribution de guerre, réduisant leur confiance de §R$AMT$§!."
 EXPECTS_BIGGER_DEAL:0 "\n\n$WHO|Y$ croit que nous pouvons leur arracher un meilleur accord."
 AI_WANTS_PROVINCES:0 "\n\n$WHO|Y$ est intéressé par les provinces suivantes : $LIST$."
 FAVORS_GAIN_FROM_LAND:0 "§Y$WHO$§! reçoit plus de provinces qu'ils n'en attendent de leur §Y$CONT$%§! de contribution de guerre, et vous devra §G$AMT$§! faveurs."
 TRUST_HIT_FROM_SEPARATE_PEACE:0 "Signer une paix séparée réduira la confiance de §Y$WHO$§! de §R$AMT$§!."
 PROMISE_LAND:0 "On a promis à §Y$COUNTRY$§! des gains territoriaux de cette guerre. Si vous gagnez la guerre et ne leur donnez pas leur juste part du traité de paix, ils seront très mécontents."
 PROMISE_LAND_NOT:0 "On n'a pas promis à §Y$COUNTRY$§! de gains territoriaux de cette guerre. Vous devrez dépenser des faveurs pour les convaincre de rejoindre."
 PROMISE_LAND_CHECKBOX_DISABLED:0 "§Y$COUNTRY$§! n'est intéressé par aucune terre §Y$ADJ$§!."
 PROMISE_LAND_DESC:0 "§GCliquez pour changer si oui ou non vous promettez à ce pays des gains territoriaux dans la guerre.§!"
 VICTORY_CARD_DESC:0 "Contrôle de §Y$AREA$§! : $COLOR$$SCORE$§!\n"
 VICTORY_CARD_DESC2:0 "$COUNTRY$ doit posséder, contrôler et avoir légitimisé les $NUM$ provinces de $AREA|Y$ pour gagner et conserver des points. En possède actuellement $CURRENT$.\n"
 FE_USE_VICTORY_CARDS:0 "Utiliser les cartes de victoire"
 FE_USE_VICTORY_CARDS_DESC:0 "Active ou désactive les cartes de victoire dans le jeu."
 FE_USE_AGE_SCORING:0 "Utiliser le score par âge"
 FE_USE_AGE_SCORING_DESC:0 "Réinitialise le score et les cartes de victoire entre les âges."
 FE_BLOCK_NATION_RUINING:0 "Empêcher la ruine de nation"
 FE_BLOCK_NATION_RUINING_DESC:0 "Bloque certaines actions destructrices par les joueurs qui ont perdu une guerre tant que les trêves après cette guerre sont en vigueur."
 NO_VICTORY_CARD_HERE:0 "Pas de carte de victoire ici !"
 VICTORY_CARD_EXPLANATION_TITLE:0 "Jouer avec les cartes de victoire"
 VICTORY_CARD_EXPLANATION_DESC:0 "Cette partie a les cartes de victoire activées par l'hôte. À partir de $START_YEAR|Y$, vous pouvez obtenir une carte de victoire pour conquérir une zone spécifique, et des cartes supplémentaires tous les $INTERVAL|Y$ ans. Les cartes ne sont obtenues qu'au-dessus de $MIN_DEV|Y$ de développement.\n\nConquérir toutes les provinces de la zone spécifiée par une carte fournit un bonus progressif à votre score qui met $SCORE_INCREASE|Y$ mois pour atteindre un maximum de $MAX_SCORE|Y$-$MAX_SCORE2|Y$. Si vous perdez une province de la zone, le score de la carte descend à zéro en $SCORE_DECREASE|Y$ mois."
 PROVVIEW_IS_IN_AREA:0 "§Y$NAME$§! est située dans la zone §Y$AREA$§!."
 PROVVIEW_IS_IN_REGION:0 "§Y$NAME$§! est située dans la région §Y$REGION$§!."
 DESIRE_PROV_VITAL:0 "§Y$COUNTRY$§! considère §Y$PROV$§! comme une province d'intérêt vital."
 DESIRE_PROV_VITAL_SUBJECT:0 ", et comme une province d'intérêt vital."
 DESIRE_PROV_VITAL_DESC:0 "Les provinces d'intérêt vital sont considérées comme faisant partie des frontières naturelles d'un pays. Ils sont susceptibles d'attaquer tout pays la détenant, et peu susceptibles de s'allier avec un autre pays qui la revendique."
 DESIRE_PROV_INTERESTING:0 "§Y$COUNTRY$§! considère §Y$PROV$§! comme une province d'utilité stratégique."
 DESIRE_PROV_INTERESTING_SUBJECT:0 ", et comme une province d'utilité stratégique."
 DESIRE_PROV_INTERESTING_DESC:0 "Les provinces d'utilité stratégique sont considérées comme utiles pour un pays à acquérir. Ils sont susceptibles de la prendre dans une guerre si l'occasion se présente, mais ne se soucieront pas des autres pays la revendiquant."
 DESIRE_PROV_OWNED_VASSAL:0 "§Y$COUNTRY$§! considère §Y$PROV$§! comme faisant partie de leur empire"
 DESIRE_PROV_OWNED:0 "§Y$COUNTRY$§! considère §Y$PROV$§! comme faisant partie de leur nation."
 DESIRE_PROV_NONE:0 "§Y$COUNTRY$§! n'a aucun intérêt pour §Y$PROV$§!."
 DESIRE_PROV_NONE_SUBJECT:0 ", mais n'a aucun intérêt pour elle."
 DESIRE_PROV_NONE_DESC:0 "Les provinces sans intérêt ne sont pas considérées comme pertinentes pour les plans d'expansion d'un pays. Ils refuseront de la prendre dans une guerre."
 DESIRE_PROV_TOGGLE:0 "§GCliquez pour définir cette province comme province d'intérêt vital.§!"
 DESIRE_PROV_UNTOGGLE:0 "§GCliquez pour que cette province ne soit plus une province d'intérêt vital.§!"
 DESIRE_PROV_TOGGLE_CANNOT:0 "§RImpossible de définir cette province comme province d'intérêt vital car un allié de guerre l'a déjà revendiquée.§!"
 DESIRE_PROV_TOGGLE_CANNOT_2:0 "§RImpossible de définir cette province comme province d'intérêt vital car un allié de guerre la possède.§!"
 SCORE_ACCUM:0 "Accumulé : §Y$VAL$§!\n"
 SCORE_ACCUM_VC:0 "Accumulé des cartes de victoire détenues : §Y$VAL$§!\n"
 HORDE_RAZE_TOOLTIP_INSTANT:0 "§YRaser la province§!"
 HORDE_RAZE_TOOLTIP_DELAYED:0 "§Y$NAME$§! sera rasée, réduisant son niveau de développement de §R$AMT$§!.\n\nCela vous donnera §G$ADM$§! £adm, §G$DIP$§! £dip, §G$MIL$§! £mil et §G$LOOT$§!¤ de butin, ainsi que $UNITY$ d'unité de la horde.\n\nLes nations §YXhazobkult§! gagneront du §GPouvoir démoniaque§! dont le montant dépend du §Yterrain§!."
 HORDE_RAZE_TOOLTIP_DELAYED2:1 "\n\nLeur opinion de nous changera de $OPINION$."
 HORDE_RAZE_TOOLTIP_NO_POWER:0 "§RNous n'obtiendrons actuellement aucun pouvoir du rasage en raison de :\n$MODIFIERDESC$§!"
 HORDE_RAZE_TOOLTIP_LATER:0 "Si nous rasons $NAME|Y$ plus tard, nous gagnerons §G$ADM$§! £adm, §G$DIP$§! £dip, §G$MIL$§! £mil et §G$LOOT$§!¤ de butin, ainsi que $UNITY$ d'unité de la horde."
 CONFIRM_RAZE_TITLE:0 "Confirmer le rasage de la province"
 HORDE_RAZE_TOOLTIP_ONLY_NON_CORES:1 "Seules les provinces non légitimisées que vous possédez et contrôlez peuvent être rasées."
 HORDE_RAZE_TOOLTIP_MIN_DEVELOPMENT:1 "Cette province ne peut pas être rasée car son développement est trop bas."
 HORDE_RAZE_TOOLTIP_COOLDOWN:1 "Cette province ne peut pas être rasée à nouveau avant le §Y$DATE$§!."
 HORDE_RAZE_TOOLTIP_UNDER_SIEGE:1 "Les provinces ne peuvent pas être rasées pendant un siège."
 HORDE_RAZE_TOOLTIP_COLONY:1 "Impossible de raser une province que vous avez colonisée."
 NO_SECONDARY_RELIGION:0 "Pas de foi syncrétique"
 CONVERT_TO_NO_SECONDARY:0 "Choisir de ne pas avoir de foi syncrétique"
 SECONDARY_RELIGION_NAME:0 "Foi syncrétique : §Y$NAME$§!"
 SECONDARY_RELIGION_DESC:0 "- Les provinces de votre foi syncrétique sont tolérées comme si elles étaient §Y$NAME$§!.\n- Les pays suivant votre foi syncrétique vous considéreront comme si vous suiviez cette religion."
 SECONDARY_RELIGION_BONUS:0 "Parce que §Y$NAME$§! est une foi syncrétique :"
 SECONDARY_RELIGION_PRIMARY_BONUS:0 "§Y$NAME$§! sans foi syncrétique :"
 tengri_clergy_conflicts:0 "Conflits cléricaux"
 desc_tengri_clergy_conflicts:0 "Alors que l'influence des religions étrangères croît dans notre société, elle entre de plus en plus en conflit avec ceux qui suivent les anciennes voies. À travers notre société, les partisans de chaque foi sont actuellement en désaccord, nuisant à l'unité de notre pays."
 tengri_abandoning_the_old_ways:0 "Abandon des anciennes voies"
 desc_tengri_abandoning_the_old_ways:0 "Le peuple de cette province craint que notre flirt avec les religions étrangères signifie l'abandon de la religion de nos ancêtres."
 tengri_insincere_leadership:0 "Direction insincère"
 desc_tengri_insincere_leadership:0 "Des événements récents ont fait douter les fidèles de cette province de la sincérité de nos dirigeants."
 tengri_settled_warriors:0 "Héritage perdu"
 desc_tengri_settled_warriors:0 "Certains de nos guerriers ont commencé à adopter des religions étrangères et à oublier la culture martiale et les croyances de leurs ancêtres."
 tengri_local_plight:0 "Idéaux conflictuels"
 desc_tengri_local_plight:0 "Une série de mauvais événements a rendu la vie difficile dans cette province. Bien que nous soyons sûrs que les choses s'améliorent après nos tentatives de remédier à cela en utilisant les rituels tengristes appropriés, il est clair que les locaux ont été moins satisfaits de nos efforts."
 tengri_shamans_spurned:0 "Traditions chamaniques mises de côté"
 desc_tengri_shamans_spurned:0 "Nos chamans sont mécontents de perdre du terrain face à d'autres religions dans certaines parties de notre royaume."
 tengri_religious_influx:0 "Communauté religieuse croissante"
 desc_tengri_religious_influx:0 "Cette province a connu une augmentation de la migration religieuse, renforçant les congrégations locales et enracinant la religion locale. Cela rendra probablement cette province plus difficile à convertir même si la religion locale devait tomber en disgrâce auprès de notre élite dirigeante."
 tengri_qadi:0 "Qadi érudit"
 desc_tengri_qadi:0 "Un qadi érudit s'est installé dans notre capitale, agissant comme juge et arbitre dans de nombreuses affaires, il a facilité la croissance de l'autorité centrale dans notre État. Les traditionalistes, cependant, voient sa présence comme un affront à nos anciennes valeurs et aux codes juridiques de nos ancêtres."
 tengri_devout_muslim:0 "Musulman dévot"
 desc_tengri_devout_muslim:0 "Les musulmans concernés de notre pays ont trouvé en eux de faire confiance à notre dirigeant après notre adoption de règles islamiques beaucoup plus strictes pour la vie à la cour. Cette insistance sur le rituel et la tradition musulmans a, cependant, fait douter beaucoup de nos sujets plus traditionnels de notre droit à les gouverner."
 tengri_ruler_questioned:0 "Dirigeant remis en question par les autorités locales"
 desc_tengri_ruler_questioned:0 "Beaucoup des habitants de cette province ont du mal à faire confiance à l'autorité centrale et à notre dirigeant en particulier."
 tengri_jihad:0 "Guerriers religieux"
 desc_tengri_jihad:0 "La propagation de l'Islam parmi nos guerriers leur a laissé une ferveur retrouvée dans leur lutte contre nos ennemis religieux."
 tengri_sufi_teacher:0 "Maître soufi"
 desc_tengri_sufi_teacher:0 "Un maître soufi charismatique s'est installé dans notre capitale, enrichissant notre foi et plaçant notre pays sur la carte spirituelle."
 tengri_growing_cities:0 "Cités en croissance"
 desc_tengri_growing_cities:0 "En statuant en faveur de leurs droits, nous avons renforcé la communauté urbaine dans cette région et en conséquence elle croît bien. Leur gratitude assure également qu'ils sont beaucoup plus enclins à payer leurs impôts."
 tengri_strengthened_local_clans:0 "Clan renforcé"
 desc_tengri_strengthened_local_clans:0 "En statuant en faveur de leurs droits, nous avons renforcé nos liens avec les guerriers locaux de cette région et en conséquence ils sont plus que disposés à nous aider à l'avenir."
 tengri_closer_ties:0 "Liens religieux plus étroits"
 tengri_turned_away_monks:0 "Moines bouddhistes refoulés"
 tengri_influx_of_monks:0 "Afflux de moines"
 desc_tengri_influx_of_monks:0 "Un grand nombre de moines se sont installés dans cette région et ont commencé à établir des institutions religieuses locales. En conséquence, leur foi se répand dans la province elle-même, un processus qui n'est pas entièrement sans tensions entre convertis et traditionalistes."
 tengri_monks_in_capital:0 "Délégation de moines"
 desc_tengri_monks_in_capital:0 "Une délégation de moines bouddhistes est arrivée dans nos terres depuis l'étranger dans l'espoir de répandre leur philosophie religieuse parmi nous. Leur présence a de bien des façons influencé nos rituels et cérémonies de cour, facilitant nos contacts avec d'autres pays."
 tengri_religious_pilgrimages:0 "Pèlerinages religieux"
 desc_tengri_religious_pilgrimages:0 "Nous connaissons un nouvel afflux d'idées de nobles rentrant du Tibet et de l'Inde. Leur étude des idéaux bouddhistes ainsi que leurs impressions de ces sociétés en général ont conduit à de nombreux développements parmi notre classe supérieure."
 tengri_confucian_titles:0 "Noblesse décadente"
 desc_tengri_confucian_titles:0 "Les idéaux confucéens que beaucoup de nos nobles ont pris en affection les ont rendus faibles et désintéressés des affaires de guerre. Leurs ancêtres combattaient à cheval mais ils préfèrent le pinceau à l'arc."
 tengri_traditionalists_strengthened:0 "Traditionalistes renforcés"
 desc_tengri_traditionalists_strengthened:0 "Nous avons interdit l'utilisation des titres et de la nomenclature confucéens parmi notre noblesse pour continuer à favoriser une éthique martiale forte parmi notre peuple. Si cela contrarie un scribe ou deux, c'est le prix que nous devons payer pour la grandeur."
 tengri_confucian_nobles:0 "Noblesse confucéenne"
 desc_tengri_confucian_nobles:0 "Beaucoup des nobles de notre pays ont adopté les idéaux confucéens et passent leurs jours à s'éduquer sur comment ils peuvent s'améliorer dans leurs rôles de représentants de l'État."
 tengri_confucian_elites_alienated:0 "Élites confucéennes aliénées"
 desc_tengri_confucian_elites_alienated:0 "En gardant notre élite confucéenne séparée de notre noblesse traditionaliste, nous avons aliéné nos administrateurs de nos nobles. Bien que ce soit à la fois approprié et bien, cela a signifié une certaine distance entre nous et eux."
 tengri_traditional_elites_alienated:0 "Élites traditionnelles aliénées"
 desc_tengri_traditional_elites_alienated:0 "En restreignant notre pratique des rituels de nos ancêtres, nous nous sommes encore plus éloignés de nos racines et avons aliéné ceux de nos nobles qui suivent les voies traditionnelles. Certains diraient que nous avons pris le parti des hommes de plume et abandonné nos guerriers."
 tengri_christian_mission:0 "Mission chrétienne"
 desc_tengri_christian_mission:0 "Des missionnaires chrétiens ont reçu le droit de répandre leur religion dans cette région."
 tengri_turned_away_mission:0 "Missionnaires expulsés"
 tengri_syncretic_fears:0 "Sorcellerie !"
 tengri_personal_confessor:0 "Prêtre de cour"
 desc_tengri_personal_confessor:0 "Nous avons amené un puissant saint homme errant à notre cour où il agit comme notre conseiller sur les questions religieuses et comme le confesseur de notre dirigeant."
 tengri_unchristian_values:0 "Mécontentement face aux valeurs non-chrétiennes"
 desc_tengri_unchristian_values:0 "Le peuple ici est mécontent de ce qu'ils voient comme les rituels et coutumes tengristes ou syncrétiques décadents pratiqués dans notre capitale."
 tengri_devout_christian_ruler:0 "Chrétien dévot"
 desc_tengri_devout_christian_ruler:0 "Bien que la foi tengriste de nos ancêtres soit encore pratiquée par beaucoup des roturiers de notre pays, notre dirigeant et sa cour maintiennent un ensemble strict de règles chrétiennes, facilitant les négociations avec les dirigeants étrangers ainsi que l'apaisement des tensions avec la population chrétienne dans beaucoup de nos cités. Beaucoup voient cependant cette rupture avec la tradition comme le signe d'un dirigeant faible."
 tengri_hindu_syncretism:0 "Syncrétisme tengri-hindou"
 desc_tengri_hindu_syncretism:0 "À la suite de la fusion des coutumes tengristes et hindoues, nous sommes devenus plus aptes à incorporer diverses parties des religions étrangères en général. Certains diraient que nous diluons la foi de nos ancêtres mais en ce moment nous voyons un apaisement des tensions partout où nous interagissons avec des personnes de fois étrangères."
 hindufication:0 "Propagation des coutumes hindoues"
 desc_hindufication:0 "Cette province a connu une augmentation de l'immigration hindoue ainsi qu'une adoption croissante des coutumes hindoues. Chamans et roturiers ont commencé à s'intégrer au système de castes hindou des nouveaux venus."
 tengri_hindu_conflict:0 "Conflits entre chamans et brahmanes"
 desc_tengri_hindu_conflict:0 "Les chamans de jadis et les prêtres brahmanes des hindous ont peu d'affection l'un pour l'autre et rivalisent à travers notre société pour l'influence."
 tengri_support_of_shamans:0 "Établissement brahmanique mécontent"
 desc_tengri_support_of_shamans:0 "En soutenant nos chamans quand ceux-ci ont été en conflit avec l'établissement brahmane, nous avons irrité les prêtres hindous de notre royaume. Cela a conduit à leur manque de coopération et à l'incitation à la désobéissance envers notre règne."
 tengri_support_of_brahmins:0 "Chamans non coopératifs"
 desc_tengri_support_of_brahmins:0 "Par notre soutien aux prêtres brahmanes, nous avons irrité les chamans de notre empire qui se sont maintenant retirés de la cour et de la vie citadine de notre État. Au lieu de cela, ils se sont retirés à la campagne et incitent à la désobéissance envers l'établissement."
 opinion_tengri_tea_ceremony:0 "Voie du thé"
 tengri_tea_ceremony:0 "Culture de cour shinto-tengriste"
 desc_tengri_tea_ceremony:0 "En introduisant des coutumes shinto comme la cérémonie du thé japonaise dans notre culture de cour, nous avons réussi à impressionner nos voisins et à augmenter notre compréhension des négociations dans les cultures étrangères."
 spread_of_tengri_tea_ceremony:0 "Propagation de la voie du thé"
 desc_spread_of_tengri_tea_ceremony:0 "Les coutumes shinto se répandent dans nos terres et spécialement dans les cités sous notre contrôle. Les artisans et marchands japonais deviennent un spectacle de plus en plus fréquent alors que notre culture urbaine devient de plus en plus similaire."
 tengri_japanese_swordsmithing:0 "Épées japonaises"
 desc_tengri_japanese_swordsmithing:0 "L'adoption d'épées de style japonais parmi nos guerriers d'élite a rehaussé le statut du combat à pied."
 tengri_bow_and_arrow_defended:0 "Traditions martiales défendues"
 desc_tengri_bow_and_arrow_defended:0 "Même si la culture guerrière shinto s'est répandue dans nos terres dans une certaine mesure, nous avons adopté une politique de limitation de son influence en nous assurant que tous nos guerriers sont toujours formés aux anciennes traditions."
 tengri_monastic_order:0 "Monastères en développement"
 desc_tengri_monastic_order:0 "Cette région abrite un ordre monastique en croissance qui met à profit certaines terres auparavant inutilisées."
 tengri_pali_legal_traditions:0 "Recueil de lois"
 desc_tengri_pali_legal_traditions:0 "Grâce au travail des moines theravada, nous disposons actuellement d'un recueil structuré de décisions pour nous aider dans les futurs cas juridiques. Cela permettra à nos juges de statuer équitablement et de manière cohérente sur toutes les terres que nous contrôlons. À mesure que de nouvelles décisions s'accumulent, il est probable qu'un nouveau recueil devra être fait à l'avenir."
 tengri_stood_up_for_yassa:0 "Yassa défendu"
 desc_tengri_stood_up_for_yassa:0 "Nous avons défendu les lois traditionnelles de notre peuple, choisissant de conserver les anciennes traditions du Yassa de Gengis Khan au lieu de codes juridiques étrangers, et peut-être plus cohérents. Pour cela, les élites guerrières de notre société nous respectent."
 tengri_shiite_immigration:0 "Immigration chiite"
 desc_tengri_shiite_immigration:0 "Un flux de fidèles de la foi chiite est venu dans nos terres espérant réaliser leur rêve d'un État correspondant à leurs idéaux. Leur volonté de protéger leurs nouveaux foyers a créé une bonne base de recrutement pour nos armées."
 tengri_shiite_settled_in_capital:0 "Immigration chiite"
 desc_tengri_shiite_settled_in_capital:0 "Nous avons permis aux minorités chiites d'autres pays qui viennent dans nos terres cherchant à commencer une nouvelle vie ici de s'installer dans et autour de notre capitale. Notre capitale grandit en conséquence mais les chamans tengristes et les traditionalistes craignent leur influence sur notre politique."
 support_of_the_khojas:0 "Soutien du Khoja"
 desc_support_of_the_khojas:0 "Notre dirigeant a le soutien du descendant actuel de la lignée de puissants Khojas soufis qui détiennent une grande influence dans nos terres."
 zoroastrian_traders:0 "Marchands zoroastriens"
 desc_zoroastrian_traders:0 "Les marchands zoroastriens en sont venus à dominer la vie quotidienne dans beaucoup de nos cités."
 tengri_ibadi_scholars:0 "Ijtihad"
 desc_tengri_ibadi_scholars:0 "En soutenant la communauté savante ibadite et en tentant de vivre selon leurs idées de leadership et de droiture, nous avons réussi à augmenter notre soutien pour notre dirigeant."
 tengri_animist_pantheon:0 "Panthéon tengri-animiste"
 desc_tengri_animist_pantheon:0 "Notre acceptation de divinités très différentes dans notre propre panthéon a conduit à une tolérance générale et à une fusion des traditions religieuses. En conséquence, nous avons moins de problèmes en général avec les conflits religieux dans nos terres."
 tengri_nahuatl_sacrifices:0 "Sacrifices humains"
 tengri_nahuatl_extradition:0 "Guerriers des fleurs extradés"
 tengri_expel_the_khojas_title:0 "Expulser les Khojas"
 tengri_expel_the_khojas_desc:0 "Au fil du temps, l'influence du Khoja et de ses descendants est devenue dangereusement forte dans notre pays. Maintenant qu'ils n'ont pas l'oreille de notre dirigeant, nous pouvons les expulser de force de nos terres, évitant ainsi de futurs conflits."
 tengri_pope_spurned:0 "Pape irrité"
 tengri_confucian_administrators:0 "Administrateurs confucéens"
 desc_tengri_confucian_administrators:0 "Afin de trouver des enseignants talentueux pour notre cadre d'administrateurs, nous recrutons ceux qui ont échoué aux examens impériaux dans les régions voisines."
 tengri_events.1.t:0 "Conflits entre chamans et clergé"
 tengri_events.1.d:0 "Le clergé de la foi [Root.SecondaryReligion.GetName] a été inhabituellement peu coopératif dernièrement. Ils craignent que nous ne professions un intérêt pour leur religion que pour un gain personnel et que nous ne soyons pas prêts à adopter, patronner et répandre pleinement ses enseignements. De même, les chamans tengristes sont de plus en plus irrités par notre désir apparent de guidance spirituelle étrangère."
 tengri_events.1.a:0 "Soutenir les chamans."
 tengri_events.1.b:0 "Soutenir les fidèles [Root.SecondaryReligion.GetName]."
 tengri_events.1.c:0 "Laissons-les gérer cela sans notre intervention."
 tengri_events.2.t:0 "Afflux d'idées"
 tengri_events.2.d:0 "Certaines parties de notre société ont été plus disposées que d'autres à adopter la foi [Root.SecondaryReligion.GetName]. Elle a, cependant, gagné une grande popularité parmi nos administrateurs et alors qu'ils regardent à l'étranger pour une inspiration spirituelle, ils en sont également venus à apprendre une chose ou deux sur l'art de gouverner."
 tengri_events.2.a:0 "Excellent."
 tengri_events.3.t:0 "Guerriers perdant le contact avec leur héritage"
 tengri_events.3.d:0 "Bien que certains remettraient en question leur sincérité, beaucoup de nos guerriers en sont venus à chérir les idéaux de la foi [Root.SecondaryReligion.GetName] tels que promus par notre État. Bien qu'ils considèrent indubitablement que cela a enrichi leur vie spirituelle, les commandants craignent qu'ils ne perdent le contact avec les anciens idéaux et morales de nos ancêtres."
 tengri_events.3.a:0 "Troublant."
 tengri_events.3.b:0 "Envoyer les chamans."
 tengri_events.4.t:0 "Connexions religieuses"
 tengri_events.4.d:0 "En patronnant la foi [Root.SecondaryReligion.GetName], nous en sommes venus à développer des liens plus étroits avec certains de nos voisins. Nos dirigeants ne sont pas toujours d'accord sur tout, mais nos institutions religieuses ont maintenant beaucoup en commun et certains de nos nobles se côtoient lors de pèlerinages religieux."
 tengri_events.4.a:0 "D'accord."
 tengri_events.5.t:0 "Crise en [Root.GetName]"
 tengri_events.5.d:0 "Une crise locale est en cours dans une zone sous notre contrôle. Un certain nombre de problèmes mineurs ont ensemble causé calamité, famine et destruction de biens. La population de la zone ne suit pas les voies tengristes et nous a implorés de gérer la catastrophe selon les nouvelles traditions de notre État. Nos chamans de cour ont, cependant, rapidement pris position qu'on doit leur permettre de remédier à la situation. Il ne semble pas y avoir de solution qui apaisera les deux groupes."
 tengri_events.5.a:0 "Envoyer les chamans pour restaurer la paix."
 tengri_events.5.b:0 "Donner du pouvoir au clergé local."
 tengri_events.6.t:0 "Migration religieuse"
 tengri_events.6.d:0 "Ayant appris notre patronage de leur foi, un grand nombre de fidèles ont voyagé vers nos terres pour aider à répandre la bonne parole et pour s'installer et se faire une vie à l'intérieur de nos frontières."
 tengri_events.6.a:0 "Les encourager à s'installer parmi leurs pairs."
 tengri_events.6.b:0 "Les envoyer dans les provinces."
 tengri_events.7.t:0 "Conversion de [Root.GetName]"
 tengri_events.7.d:0 "Il semble que les partisans de notre foi syncrétique n'aient pas perdu de temps à faire du prosélytisme parmi notre peuple. Le peuple de [Root.GetName] en est venu à abandonner de plus en plus les coutumes de leurs ancêtres et à adopter les voies enseignées par les nombreux prêtres que nous avons invités dans notre pays."
 tengri_events.7.a:0 "D'accord."
 tengri_events.8.t:0 "Troubles religieux"
 tengri_events.8.d:0 "Avec le temps, la foi de nos ancêtres est devenue une partie beaucoup plus marginalisée de notre société. La foi [Root.SecondaryReligion.GetName], en revanche, est patronnée par nos dirigeants, propagée par la plupart des prêtres de notre société et en général beaucoup plus dominante. Peut-être est-il temps d'en finir enfin avec les rituels chamaniques de ceux qui nous ont précédés et d'adopter pleinement la religion de la plupart de nos sujets actuels."
 tengri_events.8.a:0 "Adopter notre nouvelle foi."
 tengri_events.8.b:0 "Non."
 tengri_events.9.t:0 "Ijtihad"
 tengri_events.9.d:0 "La communauté ibadite de [Root.Owner.Capital.GetCapitalName] abrite de nombreux érudits religieux, des hommes de savoir qui interprètent les textes sacrés et les façons dont ils peuvent être utilisés pour gouverner équitablement et justement dans les affaires juridiques. En raison de la grande influence des Ibadites dans notre société en général, les résultats de ces érudits commencent à se répandre dans notre pays et ont un effet profond sur la vision du pouvoir et de la droiture."
 tengri_events.9.a:0 "Nous devons être à la hauteur de ces idéaux !"
 tengri_events.9.b:0 "Cela ne concerne pas [Root.Monarch.GetTitle]."
 tengri_events.10.t:0 "Soufis itinérants"
 tengri_events.10.d:0 "L'ouverture de notre pays aux influences de l'Islam a attiré un filet de personnes du monde musulman plus large. Les marchands musulmans font maintenant des incursions plus profondes dans les campagnes de notre pays et les soufis itinérants sont devenus un spectacle plus commun parmi nos établissements. Parfois, il est possible de suivre le chemin de tels saints hommes par les convertis qu'ils laissent derrière eux en passant d'une région à l'autre. Certains de ces hommes sont déjà célèbres quand ils arrivent dans nos terres et possèdent un moyen de mobiliser le cœur et la volonté des hommes pour suivre un dirigeant qu'ils voient comme juste.\nUn enseignant soufi particulièrement célèbre est récemment arrivé dans nos terres."
 tengri_events.10.a:0 "L'encourager à s'installer dans notre capitale."
 tengri_events.10.b:0 "L'encourager à chercher un patron ailleurs."
 tengri_events.11.t:0 "Arrivée d'un juge érudit"
 tengri_events.11.d:0 "Un homme avec une vaste expérience comme juge dans d'autres pays musulmans est arrivé dans nos terres. Il dit qu'il est disposé à s'installer dans nos terres pour un temps et à exercer son ancienne profession, dispensant la justice selon la Charia, assurant la loi et l'ordre dans nos terres. Cela serait sans doute populaire, surtout parmi la communauté musulmane de notre pays. Son expérience dans d'autres pays pourrait également aider à centraliser notre royaume."
 tengri_events.11.a:0 "Le laisser rester."
 tengri_events.11.b:0 "Tous doivent suivre les lois de nos ancêtres."
 tengri_events.12.t:0 "[Root.Monarch.GetTitle] interrogé par les Oulémas"
 tengri_events.12.d:0 "Notre adoption de l'Islam ne s'est pas faite sans frictions. Bien que son statut privilégié ait fait croître la communauté musulmane dans nos terres, beaucoup restent mal à l'aise avec leur dieu unique. [Root.Monarch.GetName] a [Root.Monarch.GetHerselfHimself] montré un grand intérêt pour la religion étrangère mais pratique toujours beaucoup des rituels de nos ancêtres. Peut-être est-ce parce qu'[Root.Monarch.GetSheHe] y prend tant d'intérêt que la communauté musulmane elle-même en est venue à scruter la vie et les actions de notre [Root.Monarch.GetTitle]. Les dirigeants de la communauté musulmane remettent en question si [Root.Monarch.GetHerHis] décisions sont vraiment prises dans leur meilleur intérêt et celui de leur dieu."
 tengri_events.12.a:0 "Jurer de mener une vie plus dévote."
 tengri_events.12.b:0 "Nos traditions [Root.Religion.GetName] doivent passer en premier."
 tengri_events.12.b.tt:0 "Chaque province suivant notre foi §YSyncrétique§! souffrira de §R5§! de troubles pendant §Y10§! ans."
 tengri_events.13.t:0 "Incident à la cour"
 tengri_events.13.d:0 "Dans une gaffe malheureuse, notre [Root.Monarch.GetTitle] a réussi à contrarier la communauté musulmane de [Root.Capital.GetCapitalName] en incluant leurs dirigeants dans une cérémonie [Root.Religion.GetName]. Bien que cet acte était entièrement destiné comme un honneur, il a résulté en des sentiments très blessés parmi les musulmans de notre capitale et ailleurs."
 tengri_events.13.a:0 "D'accord."
 tengri_events.14.t:0 "Guerriers de la foi"
 tengri_events.14.d:0 "Notre pays est d'une certaine façon à la frontière du monde islamique et en tant que tel attire principalement l'attention des soufis itinérants ou des marchands. Il semble, cependant, qu'un prédicateur fervent ait réussi à convaincre un grand groupe de guerriers de se soumettre à ce dieu étranger et ces hommes participent maintenant à nos guerres actuelles contre leurs ennemis religieux avec une ferveur retrouvée."
 tengri_events.14.a:0 "Excellent !"
 tengri_events.15.t:0 "Conflit entre cités et nomades"
 tengri_events.15.d:0 "Avec l'influence croissante de l'Islam, surtout dans nos cités en croissance, les anciens codes juridiques comme le Yassa ont été de plus en plus abandonnés en faveur de la Charia que nos citadins musulmans préfèrent.\nCe développement a récemment résulté en une bataille juridique acharnée en [Root.GetName] où un guerrier important d'un clan local insiste sur ses droits selon la tradition tandis que l'établissement urbain insiste pour suivre la Charia. Soutenir un camp plutôt que l'autre aura indubitablement des répercussions pour le développement de toute la région."
 tengri_events.15.a:0 "Nommer un juge musulman pour l'affaire."
 tengri_events.15.b:0 "Nommer quelqu'un pour juger selon nos traditions."
 tengri_events.16.t:0 "Enseignant soufi populaire"
 tengri_events.16.d:0 "Un enseignant d'une lignée de soufis célèbres a récemment gagné une popularité croissante dans nos terres. Ses enseignements ont non seulement gagné les oreilles de nos communautés musulmanes mais ont également profondément impressionné les élites guerrières plus traditionnelles. Beaucoup de ceux qui écoutent ses paroles ne renonceront toujours pas aux chamans tengristes mais la personnalité charismatique de l'enseignant assure que même ainsi ils valoriseront chaque parole de ce « Khoja ». Un noble local qui a réussi à entrer en conflit avec le Khoja a si mal perdu qu'il a dû abandonner ses terres.\nJusqu'ici le Khoja a discrètement soutenu notre [Root.Monarch.GetTitle], peut-être pourrait-il être persuadé de soutenir le trône un peu plus ouvertement si nous lui accordons des terres et un titre officiel à notre cour ?"
 tengri_events.16.a:0 "Qu'il serve le trône !"
 tengri_events.16.a.tt:0 "Chaque futur dirigeant se verra offrir ce modificateur mais le Khoja ou ses descendants pourraient bien essayer de prendre le pouvoir eux-mêmes éventuellement."
 tengri_events.16.b:0 "Non, il est trop dangereux."
 tengri_events.16.b.tt:0 "Le Khoja et ses descendants ne nous importuneront plus."
 tengri_events.17.t:0 "Les Khojas"
 tengri_events.17.d:0 "Le pouvoir de la lignée Khoja sur nos sujets est presque trop grand. Ils s'ingèrent constamment dans les affaires juridiques, la politique religieuse et les affaires quotidiennes de notre pays. Le Khoja est, cependant, toujours l'un des plus vaillants défenseurs du trône. Avec le couronnement de [Root.Monarch.GetName], on s'attendra à ce que nous affirmions les liens avec le Khoja et peut-être étendions encore ses privilèges."
 tengri_events.17.a:0 "Il reste notre plus fort soutien."
 tengri_events.17.a.tt:0 "Cela renforcera le Khoja et augmentera la probabilité que lui ou ses successeurs tentent de prendre le pouvoir à l'avenir."
 tengri_events.17.b:0 "Tenter de limiter l'influence des Khojas."
 tengri_events.17.b.tt:0 "Cela affaiblira l'influence des Khojas et leurs chances de prendre le pouvoir à l'avenir."
 tengri_events.18.t:0 "Le Khoja prend le pouvoir"
 tengri_events.18.d:0 "Ne se contentant pas de continuer à servir comme pouvoir derrière le trône, le chef actuel de la lignée Khoja s'est aujourd'hui déclaré plus apte à gouverner que n'importe quel [Root.Monarch.GetTitle]. Ses partisans se massent aux abords de notre capitale ainsi que dans les campagnes, tentant de créer un État construit directement sur les enseignements de leur charismatique enseignant soufi."
 tengri_events.18.a:0 "Il n'y a qu'un seul Dieu !"
 tengri_events.18.b:0 "Protéger notre [Root.Monarch.GetTitle] !"
 tengri_events.19.t:0 "Diaspora chiite"
 tengri_events.19.d:0 "Bien qu'il y ait amplement de doutes sur la sincérité de notre conviction, la nouvelle de notre conversion s'est répandue parmi les communautés chiites du monde entier. De petits groupes de chiites ont commencé à arriver à [Root.Capital.GetCapitalName] cherchant à aider à construire et protéger un État pour ceux qui honorent les Imams.\nLeurs services pourraient s'avérer très utiles mais nos chamans appréhendent de permettre à ce qu'ils voient comme des zélotes étrangers de s'installer parmi notre peuple."
 tengri_events.19.a:0 "Les installer près de notre capitale."
 tengri_events.19.b:0 "Les installer dans les campagnes."
 tengri_events.19.c:0 "Les renvoyer."
 tengri_events.20.t:0 "Afflux de moines"
 tengri_events.20.d:0 "Une grande délégation de moines Vajrayana est arrivée à [Root.Capital.GetCapitalName] aujourd'hui. Ayant appris l'intérêt que nous portons à leur foi, ils sont impatients de l'expliquer non seulement à notre [Root.Monarch.GetTitle] mais à nos nombreux sujets."
 tengri_events.20.a:0 "Les laisser voyager librement."
 tengri_events.20.a.tt:0 "Augmente les chances de conversion au Vajrayana dans les provinces avec le modificateur §YAfflux de moines§!."
 tengri_events.20.b:0 "Les confiner à [Root.Capital.GetCapitalName]."
 tengri_events.20.b.tt:0 "Augmente les chances de conversions au Vajrayana dans toutes nos provinces."
 tengri_events.20.c:0 "Les renvoyer."
 tengri_events.21.t:0 "Textes religieux traduits en [Root.Culture.GetName]"
 tengri_events.21.d:0 "Dans leur désir de répandre leur foi et d'incorporer le royaume de [Root.GetName] dans le monde bouddhiste plus large, certains moines ont pris sur eux de traduire de nombreuses œuvres historiques, philosophiques et religieuses bouddhistes au bénéfice de notre peuple. Ces manuscrits ont ouvert les yeux de beaucoup sur un nouveau monde spirituel et nous ont donné une meilleure compréhension du monde environnant en général. Parmi la noblesse, collectionner ces manuscrits est devenu à la mode, bien que certains diraient pas toujours pour des raisons spirituelles."
 tengri_events.21.a:0 "Accueillir la diffusion de ces livres."
 tengri_events.21.b:0 "Nous devons honorer nos traditions ancestrales à la place."
 tengri_events.22.t:0 "Chaman vaincu en [Root.GetName]"
 tengri_events.22.d:0 "Des récits étranges nous parviennent des provinces, parlant d'un moine bouddhiste itinérant utilisant sa sagesse pour surmonter divers problèmes et répandant sa foi parmi les nombreuses personnes bénéficiant de son aide. Tout le monde n'est pas content de ces avancées parmi le peuple, cependant, car elles impliquent souvent de vaincre les chamans locaux.\nEn [Root.GetName], ce moine aurait vaincu un chaman local et guéri une princesse locale d'une grave maladie, laissant les rituels traditionnels paraître pauvres et insuffisants. En conséquence, le seigneur local a interdit les rituels traditionnels dans ses terres et promeut à la place [Root.SecondaryReligion.GetName]."
 tengri_events.22.a:0 "Excellent."
 tengri_events.22.b:0 "Déposer le noble."
 tengri_events.23.t:0 "Destruction d'idoles en [Root.GetName]"
 tengri_events.23.d:0 "Depuis un certain temps, les moines Vajrayana gagnent des adeptes dans la province de [Root.GetName] et bien que leur influence soit encore assez limitée, ils ont apparemment pris sur eux d'aller un pas plus loin dans leur activité missionnaire. Des rapports arrivent à [Root.Capital.GetCapitalName] de la destruction et de l'incinération de nos idoles ancestrales. La réception générale de cette politique ne s'est pas avérée comme les moines l'auraient espéré, cependant, car les locaux se défendent maintenant à la fois contre les moines et l'autorité centrale qui les favorise."
 tengri_events.23.a:0 "D'accord."
 tengri_events.24.t:0 "Pèlerinages religieux"
 tengri_events.24.d:0 "Il est devenu coutumier parmi nos nobles de voyager vers les lieux saints du bouddhisme Vajrayana au Tibet et en Inde pour étudier et apprendre la foi bouddhiste. Alors qu'ils reviennent apportant de nouvelles coutumes et perspectives dans notre pays, notre société change lentement. Ce n'est pas toujours un processus sans problèmes mais récemment nous avons vu des tendances très positives dans notre gouvernement résultant de cet échange."
 tengri_events.24.a:0 "Excellent !"
 tengri_events.25.t:0 "Vol de terres"
 tengri_events.25.d:0 "Avec l'influence croissante de la foi [Root.SecondaryReligion.GetName] dans notre pays, un certain nombre de nouveaux monastères ont été fondés. Leur but est à la fois d'héberger les moines [Root.SecondaryReligion.GetName] qui sont venus dans nos terres et le nombre lentement croissant de moines [Root.GetAdjective] natifs.\nLes propriétaires terriens traditionnels ne semblent pas très impressionnés par les prétentions de ces nouveaux venus, cependant, et se sont servis des terres réservées aux moines. Les moines prétendent que la terre serait plus productive sous leur contrôle tandis que les propriétaires estiment qu'ils réclament le droit à ce qui est déjà le leur."
 tengri_events.25.a:0 "Nous devons soutenir ces ordres !"
 tengri_events.25.b:0 "Nous devons protéger les droits traditionnels de notre peuple."
 tengri_events.26.t:0 "Traditions juridiques pali"
 tengri_events.26.d:0 "Avec le bouddhisme Theravada vient une ancienne tradition juridique basée sur d'anciens textes pali ainsi que les décisions recueillies de nombreux juges et monarques jusqu'à ce jour. Certains moines Theravada ont trouvé notre manque de décisions écrites recueillies très troublant et ont cherché notre bénédiction pour créer une collection de décisions à jour qui, avec le Canon Pali, pourrait servir de base pour les futures décisions dans notre pays."
 tengri_events.26.a:0 "Permettre aux érudits de continuer."
 tengri_events.26.b:0 "Le Yassa nous suffit."
 tengri_events.27.t:0 "Bouddhisme de la Terre Pure"
 tengri_events.27.d:0 "En adoptant la foi Mahayana, nous avons ouvert nos frontières à un large éventail de traditions et d'enseignements mais aucun ne semble avoir attiré autant de fidèles que les promesses du mouvement de la « Terre Pure ». À travers [Root.GetName], des sujets immergés dans la méditation et la récitation sont devenus un spectacle de plus en plus commun."
 tengri_events.27.a:0 "Amitabhaya."
 tengri_events.30.t:0 "Propagation des idéaux confucéens"
 tengri_events.30.d:0 "Impressionnés par les préceptes raffinés et bien argumentés du confucianisme, beaucoup de nos nobles ont commencé à s'efforcer de s'améliorer par une étude rigoureuse et un travail acharné. En conséquence, nous devenons non seulement meilleurs pour comprendre le monde confucéen plus large mais l'administration de notre terre et de nos ressources s'est notablement améliorée et surtout est devenue plus cohérente."
 tengri_events.30.a:0 "Recruter ces hommes comme administrateurs."
 tengri_events.30.b:0 "Nous pouvons utiliser cela pour purger la corruption."
 tengri_events.30.c:0 "Encourageons-les à développer la terre elle-même."
 tengri_events.31.t:0 "[Root.Monarch.GetTitle] et les Beiles"
 tengri_events.31.d:0 "Alors que les idéaux savants de la philosophie confucéenne gagnent de plus en plus de terrain parmi la noblesse [Root.GetAdjective], [Root.Monarch.GetName] a été assailli par la crainte que nos anciennes voies soient oubliées. Beaucoup de dignitaires [Root.GetAdjective] de haut rang ont pris à utiliser des titres et noms étrangers plutôt que les titres [Root.Culture.GetName] de nos ancêtres. Notre [Root.Monarch.GetTitle] craint que dans une génération nul ne se souviendra des anciennes voies de l'arc et du cheval et notre nation sera une nation de faibles scribes et poètes."
 tengri_events.31.a:0 "Aucune nation qui a abandonné sa propre langue ne peut prospérer !"
 tengri_events.31.b:0 "Nous n'avons aucune raison de craindre la Voie confucéenne."
 tengri_events.32.t:0 "Élites confucéennes aliénées"
 tengri_events.32.d:0 "La participation à de nombreux rituels traditionnels est réservée à notre [Root.Monarch.GetTitle] et ceux les plus proches d'[Root.Monarch.GetHerHim]. Bien que cela signifie que l'élite confucéenne de notre pays ne peut pas participer, cela n'a pas souvent été un problème car ils voient de tels rituels et sacrifices « superstitieux » avec au mieux un léger déplaisir. Cette insistance à garder notre [Root.Monarch.GetTitle] et ses proches des anciennes élites [Root.Religion.GetName] séparés de nos autres sujets a, cependant, conduit à une division inutilement nette entre les deux groupes. Cela, plutôt que les rituels eux-mêmes, semble être une source constante d'irritation et de malentendus, même au sommet de notre société."
 tengri_events.32.a:0 "Louons les cieux !"
 tengri_events.32.b:0 "Concevons des rituels communs à la place."
 tengri_events.33.t:0 "[Root.Heir.GetName]"
 tengri_events.33.d:0 "Ceux autour de [Root.Heir.GetName] s'accordent à dire que l'enfant montre des promesses au-delà de ce qui était initialement attendu. [Root.Heir.GetSheHe] apprend rapidement et [Root.Heir.GetHerHis] compétences s'améliorent de jour en jour.\nTraditionnellement, les héritiers de [Root.Monarch.GetTitle] devraient passer leurs jeunes années à apprendre à monter et tirer comme les guerriers [Root.Culture.GetName] de notre passé. Ce n'est peut-être pas la meilleure façon de cultiver les capacités grandissantes de [Root.Heir.GetName] cependant. Si on leur en donne l'opportunité, les enseignants confucéens promettent d'enseigner à notre héritier comment mieux [Root.Heir.GetHerselfHimself] et plus important comment gouverner et tirer le meilleur parti de notre terre et de ses sujets."
 tengri_events.33.a:0 "Engageons des enseignants confucéens."
 tengri_events.33.b:0 "Une éducation traditionnelle est la seule voie."
 tengri_events.33.c:0 "Nous n'avons pas de ressources supplémentaires à consacrer à [Root.Heir.GetHerHim]."
 tengri_events.35.t:0 "Propagation de la cérémonie du thé"
 tengri_events.35.d:0 "Les cérémonies du thé élaborées qui sont courantes dans de nombreuses terres shinto se sont répandues bien au-delà de la religion shinto elle-même et deviennent monnaie courante dans la plupart des cités [Root.GetAdjective] ainsi que parmi les membres de notre cour."
 tengri_events.34.t:0 "Examen des administrateurs"
 tengri_events.34.d:0 "Les Chinois ont longtemps estimé qu'un bon moyen d'assurer une administration efficace selon les idéaux confucéens est de tenir des examens généraux pour tous les administrateurs. Cela fonctionne bien pour un pays avec des générations d'expérience sur lesquelles s'appuyer, ce que nous n'avons pas.\nLe manque actuel à la fois d'administrateurs et d'enseignants pourrait être remédié en attirant certains de ceux qui ont échoué aux examens dans les pays voisins mais nous paierions un prix élevé pour une marchandise incertaine."
 tengri_events.34.a:0 "C'est un risque que nous devons prendre."
 tengri_events.34.b:0 "Cherchons plutôt les talents parmi les nôtres."
 tengri_events.35.a:0 "Notre culture de cour ne sera plus jamais la même."
 tengri_events.35.b:0 "Encourager la propagation de la Voie du thé."
 tengri_events.36.t:0 "[Root.Monarch.GetName] perd la face"
 tengri_events.36.d:0 "La vision shinto de l'échec est quelque peu différente de celle de nos traditions tengristes. Alors que les valeurs shinto deviennent une partie de plus en plus importante de notre société, les attentes envers notre [Root.Monarch.GetTitle] changent.\nCertaines actions de [Root.Monarch.GetName] en sont venues à être interprétées comme manquant à la fois d'honneur et de capacité par ceux qui suivent le mélange syncrétique de coutumes shinto et tengristes qui a pris forme dans nos terres."
 tengri_events.36.a:0 "C'est malheureux."
 tengri_events.36.b:0 "Les chamans disent que je ne peux être blâmé."
 tengri_events.37.t:0 "Forge d'épées japonaises"
 tengri_events.37.d:0 "L'ouverture de notre royaume aux coutumes et à la culture shinto a également résulté en une migration croissante de pratiquants shinto dans nos terres, parmi eux un certain nombre de forgerons d'armes japonais. Les épées qu'ils produisent sont devenues de plus en plus populaires auprès des parties les plus riches de notre société et les forgerons japonais deviennent communs dans la plupart de nos cités. Beaucoup de nos guerriers d'élite ont commencé à s'entraîner avec ces armes.\nCertains craignent que cela signifie l'abandon des traditions martiales de nos ancêtres bien que même ceux qui s'accrochent aux anciennes voies aient bénéficié d'une meilleure compréhension des techniques de combat étrangères."
 tengri_events.37.a:0 "Encourager nos élites à utiliser ces épées."
 tengri_events.37.b:0 "L'arc et la flèche sont pour le vrai guerrier tengriste."
 tengri_events.38.t:0 "Croissance des monastères"
 tengri_events.38.d:0 "Habitués à agir loin du Patriarche de leur église, les ordres monastiques coptes se sont rapidement installés dans nos terres. Ils croissent maintenant en nombre et en influence, surtout dans les régions frontalières sous notre contrôle. Dans des circonstances idéales, les ordres sont prêts à entrer dans une région nouvellement conquise, établissant de nouveaux monastères, stabilisant rapidement et convertissant la région à leur foi. Nos chamans sont alarmés par cette pratique car ils estiment qu'ils devraient être ceux qui accueillent nos nouveaux sujets plutôt que ces moines étrangers."
 tengri_events.38.a:0 "Excellent !"
 tengri_events.38.b:0 "Nous devons promouvoir nos chamans tengristes !"
 tengri_events.39.t:0 "Ambassade papale"
 tengri_events.39.d:0 "Une ambassade papale officielle est arrivée à [Root.Capital.GetCapitalName] cherchant une audience avec [Root.Monarch.GetName]. La tâche des envoyés est de juger la sincérité de notre [Root.Monarch.GetTitle], d'entendre une fois de plus accepter le pape comme chef de l'église et d'inclure [Root.Monarch.GetName] dans la communauté catholique plus large.\nPour y parvenir, les envoyés ont apporté avec eux un certain nombre de livres, de cartes et d'hommes savants. Ces hommes sont sûrement aussi des espions, désireux d'apprendre nos secrets. Il est également certain que nos chamans seront en désaccord avec toute politique de s'incliner devant un chef religieux étranger et leur refuser une audience leur plairait. Mais peut-être que le savoir que ces catholiques apportent peut compenser cette opportunité manquée."
 tengri_events.39.a:0 "Renvoyer ces espions chez eux !"
 tengri_events.39.b:0 "Nous sommes de loyaux fidèles de l'Église romaine."
 tengri_events.40.t:0 "Missionnaires chrétiens"
 tengri_events.40.d:0 "Un groupe de missionnaires chrétiens de l'étranger est arrivé à [Root.Capital.GetCapitalName] et est impatient de répandre la parole de Dieu parmi les païens. Ne voulant pas entrer en conflit avec notre [Root.Monarch.GetTitle], cependant, ils viennent chercher notre bénédiction. Le chef du groupe a approché le trône demandant qu'on lui donne le droit de répandre la foi chrétienne dans une région sous notre contrôle sans entrave."
 tengri_events.40.a:0 "Les laisser aller où ils veulent."
 tengri_events.40.b:0 "Les renvoyer d'où ils viennent."
 tengri_events.40.a.tt:0 "Cette province pourrait changer de religion à l'avenir."
 tengri_events.40.c:0 "Leur interdire de convertir les tengristes."
 tengri_events.41.t:0 "Propagation du christianisme"
 tengri_events.41.d:0 "Les missionnaires en [Root.GetName] ont fait de bons progrès vers la conversion de la population locale. Les chamans sont devenus un spectacle de plus en plus rare et un certain nombre d'églises parsèment le paysage."
 tengri_events.41.a:0 "Loué soit le Seigneur."
 tengri_events.42.t:0 "Conflits entre chamans et missionnaires"
 tengri_events.42.d:0 "La présence d'une mission en [Root.GetName] a conduit à un certain nombre de conflits entre les chamans [Root.Religion.GetName] et les prêtres locaux. Les chamans ont proclamé des malédictions sur les prêtres et parfois sur des congrégations entières."
 tengri_events.42.a:0 "Il est temps pour les missionnaires de partir."
 tengri_events.42.b:0 "Nous ne devons pas interférer."
 tengri_events.43.t:0 "Dirigeant chrétien alarmé"
 tengri_events.43.d:0 "L'adoption du christianisme aux côtés de la foi traditionnelle [Root.Religion.GetName] de nos ancêtres a donné naissance à un certain nombre de coutumes moins qu'orthodoxes. Des rituels syncrétiques qui font référence à la fois au dieu du christianisme et aux dieux du ciel sont devenus monnaie courante et certains ont même été adoptés à la cour de [Root.Monarch.GetName].\nBien que cela semble plaire à la plupart de nos sujets chrétiens, les sensibilités délicates d'un dirigeant sujet chrétien visitant [Root.Capital.GetCapitalName] ont été profondément heurtées par sa participation forcée à de tels rituels."
 tengri_events.43.a:0 "Mais ils sont tous deux seigneurs des cieux ?"
 tengri_events.43.b:0 "Essayer de faire amende honorable."
 tengri_events.44.t:0 "Miracle"
 tengri_events.44.d:0 "Des nouvelles nous sont parvenues d'un vagabond remarquable. Tirant son pouvoir de sa forte dévotion au dieu chrétien, il a réussi à guérir les faibles et soigner les malades. Un nombre croissant de convertis ont commencé à créer des congrégations dans son sillage. Beaucoup incorporent encore des parties de leurs anciennes coutumes tengristes dans leur vie quotidienne mais ce saint homme a eu plus de succès à attirer des fidèles que beaucoup des missionnaires plus traditionnels qui fréquentent maintenant nos campagnes."
 tengri_events.44.a:0 "Le laisser errer librement."
 tengri_events.44.b:0 "L'inviter à la cour."
 tengri_events.45.t:0 "Vie à la cour"
 tengri_events.45.d:0 "[Root.Monarch.GetName] a toujours porté un grand intérêt à la fois à notre religion adoptée et à ceux qui la pratiquent. [Root.Monarch.GetSheHeCap] n'a, cependant, pas toujours mené une vie que beaucoup de nos sujets chrétiens approuveraient. Entre l'influence des chamans à la cour et les habitudes de [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself], il y en a beaucoup qui estiment que nous risquons une punition divine.\nPeut-être devrions-nous envisager d'instituer des règles plus clairement chrétiennes pour notre cour et notre dirigeant ? Restreindre l'influence des chamans, le nombre d'épouses autorisées et généralement le nombre de rituels officiellement sanctionnés ferait beaucoup pour apaiser les communautés chrétiennes."
 tengri_events.45.a:0 "Une cour chrétienne, soit !"
 tengri_events.45.b:0 "Ces religions doivent coexister, côte à côte."
 tengri_events.45.b.tt:0 "Chaque province suivant notre foi §YSyncrétique§! aura §R6§! de troubles pendant §Y10§! ans."
 tengri_events.46.t:0 "Brahmanes et chamans"
 tengri_events.46.d:0 "Une bataille des esprits et des âmes de notre peuple s'est engagée entre les prêtres brahmanes et les chamans, qui se considèrent guides et protecteurs de notre peuple. Dernièrement, les discussions animées se terminent fréquemment par les chamans maudissant les brahmanes tandis que les brahmanes se tournent vers nous, insistant pour que leur statut héréditaire soit respecté."
 tengri_events.46.a:0 "Soutenir les administrateurs brahmanes."
 tengri_events.46.b:0 "Soutenir nos chamans."
 tengri_events.46.c:0 "Éviter de prendre parti."
 tengri_events.47.t:0 "Syncrétisme"
 tengri_events.47.d:0 "La coexistence de l'hindouisme et de la foi [Root.Religion.GetName] a été plus facile à bien des égards que nous le craignions initialement. Il y a déjà de nombreux exemples de divinités tengristes incorporées parmi les nombreux dieux des hindous et de dieux et coutumes hindous incorporés dans la vie des fidèles tengristes. En fait, dans une certaine mesure, il semble que la même chose ait commencé à se produire avec beaucoup d'autres religions dans les coins les plus reculés de notre empire, avec de nombreux dieux mineurs et majeurs incorporés dans le panthéon conjoint hindou-tengri."
 tengri_events.47.a:0 "Excellent !"
 tengri_events.48.t:0 "Propagation du système de castes"
 tengri_events.48.d:0 "Avec l'élévation de la foi hindoue, un grand nombre d'hindous sont venus s'installer dans beaucoup de nos cités et avec eux le concept de caste se répand dans nos terres. Il est intéressant de noter qu'au moins certains de ceux qui font régulièrement des affaires avec les hindous ainsi que certains de nos chamans ont adopté cette façon d'organiser la société.\nLes effets immédiats semblent difficiles à juger mais pour l'instant tout semble progresser un peu plus harmonieusement en [Root.GetName]."
 tengri_events.48.a:0 "D'accord."
 tengri_events.49.t:0 "Une patrie juive ?"
 tengri_events.49.d:0 "La nouvelle de notre adoption de la religion juive a commencé à se répandre largement parmi les juifs de la Diaspora. Un filet lent mais de plus en plus régulier d'immigrants a commencé à apparaître à nos frontières, espérant vivre et servir dans un État où ils ne sont pas confinés dans des ghettos ou restreints par des lois et des préjugés."
 tengri_events.49.a:0 "Qu'ils servent comme administrateurs !"
 tengri_events.49.b:0 "Qu'ils servent comme soldats !"
 tengri_events.50.t:0 "Communauté marchande zoroastrienne croissante"
 tengri_events.50.d:0 "Bien que les temples du Feu de [Root.GetName] leur semblent probablement un peu hétérodoxes, notre société attire toujours un certain nombre de zoroastriens de la diaspora. Depuis qu'ils ont quitté la Perse il y a presque un millénaire, ils se sont habitués à être la minorité et semblent contents de se mêler à notre société en général. Certains, cependant, sont venus demander une zone à eux où ils peuvent vivre et pratiquer leur culte selon leurs traditions."
 tengri_events.50.a:0 "« Comme du sucre dans le lait. »"
 tengri_events.50.b:0 "Mieux vaut les garder tous au même endroit."
 tengri_events.51.t:0 "Panthéon croissant"
 tengri_events.51.d:0 "La fusion de nos traditions chamaniques avec le large éventail de croyances animistes que nous avons rencontrées a résulté en un panthéon sans cesse croissant. Il n'y a pas de maladie, de catastrophe ou de destin qui n'ait au moins une divinité pour le contrer. Cette large acceptation de différentes traditions spirituelles a conduit à une gestion de plus en plus efficace des conflits religieux entre les sujets sous notre contrôle, peu importe ce qu'ils croient."
 tengri_events.51.a:0 "Excellent."
 tengri_events.52.t:0 "Soutien des chamans"
 tengri_events.52.d:0 "Les chamans de cour ont toujours été une institution importante dans notre État. [Root.Monarch.GetTitle] et [Root.Monarch.GetHerHis] nobles participent à un large éventail de cérémonies pour assurer que les dieux regardent favorablement nos entreprises, que ce soit aller en guerre ou sceller un mariage stratégique. Avec le nombre grandement accru de traditions chamaniques que nous patronnons maintenant, nous pouvons être sûrs de leur soutien, un point que nos sujets n'ont pas manqué de noter."
 tengri_events.52.a:0 "Les dieux favorisent nos guerres."
 tengri_events.52.b:0 "Les dieux béniront notre peuple."
 tengri_events.53.t:0 "Guerres des fleurs"
 tengri_events.53.d:0 "Inspirés par les précurseurs nahuatl, nos guerriers ont commencé à razzier les terres étrangères déjà subjuguées par notre [Root.Monarch.GetTitle] pour prendre des prisonniers à offrir sur la Pierre Sacrificielle aux cieux. C'est légèrement problématique car ce sont des gens qui ont accepté de nous obéir en échange de protection, mais l'expérience que ces guerriers acquièrent au combat rapproché pourrait nous être utile."
 tengri_events.53.a:0 "Extrader les guerriers fautifs."
 tengri_events.53.b:0 "Les dieux réclament leur sang !"
 tengri_events.54.t:0 "Restrictions somptuaires ?"
 tengri_events.54.d:0 "Offensés par les vêtements luxueux d'un marchand à [Root.Capital.GetCapitalName], un certain nombre de guerriers ont pris sur eux d'assaillir sa demeure somptueuse et de le dépouiller de ses biens. Ils prétendent qu'une telle parure doit être réservée à ceux qui se sont distingués au combat et qu'ils ont rectifié une offense aux dieux. Le marchand, en revanche, est furieux et exige réparation et la restitution de ses biens."
 tengri_events.54.a:0 "Prendre le parti du marchand."
 tengri_events.54.b:0 "Prendre le parti des guerriers."
 tengri_events.55.t:0 "Confiscation d'idoles"
 tengri_events.55.d:0 "Le peuple de [Root.GetName] a organisé sa résistance contre notre règne à travers les lieux saints locaux et beaucoup de leurs dirigeants se trouvent dans le clergé local. L'assimilation les calmera sûrement à long terme mais pour l'instant nos prêtres Inti suggèrent que nous confisquions leurs idoles [Root.Religion.GetName] ; en les protégeant dans notre capitale, nous pouvons nous assurer que le peuple de [Root.GetName] se souvienne où réside le vrai pouvoir."
 tengri_events.55.a:0 "Une excellente idée."
 tengri_events.55.b:0 "Barbare."
 tengri_events.56.t:0 "Jeu de balle rituel"
 tengri_events.56.d:0 "Nos prêtres mayas sont impatients de promouvoir les jeux de balle rituels de leur religion, une coutume à laquelle beaucoup de nos guerriers ont été assez réceptifs. Beaucoup affluent maintenant vers les terrains pour voir leurs équipes favorites s'affronter, bien que peut-être les paris associés soient autant une attraction que leur conviction religieuse."
 tengri_events.56.a:0 "Pour les dieux !"
 tengri_events.56.b:0 "Pour le peuple !"
 tengri_events.57.t:1 "Nouvelle traduction de la Bible"
 tengri_events.57.d:1 "Désireux que tous nos sujets puissent lire et interpréter eux-mêmes la parole de Dieu, les prêtres protestants de notre pays cherchent notre soutien pour créer une nouvelle traduction de la Bible. Ils prétendent que la nouvelle traduction unira notre peuple comme jamais auparavant et les introduira au dieu unique qu'ils vénèrent."
 tengri_events.57.a:1 "Excellent !"
 tengri_events.58.t:1 "Prédestination"
 tengri_events.58.d:1 "L'idée que « Tous les événements quels qu'ils soient sont gouvernés par le conseil secret de Dieu » est chère aux membres de l'Église réformée de notre pays. Tellement que cela en est venu à se répandre au-delà de ceux qui ne seraient pas considérés comme chrétiens par quelque définition que ce soit. Que ce soit dû à cela ou non, dernièrement beaucoup de nos sujets semblent inhabituellement désireux de se surpasser. Que ce soit dans les domaines de la gouvernance ou de l'économie."
 tengri_events.58.a:1 "L'or est une mesure de qualité."
 tengri_events.58.b:1 "La loyauté prouve le caractère."
 tengri_events.59.t:0 "Monastère établi"
 tengri_events.59.d:0 "Il y a quelque temps, un certain nombre de nos moines orthodoxes les plus pieux ont quitté les zones sous notre contrôle afin de créer un monastère fortifié en frontière dans les parties plus sauvages des terres que nous bordons. L'histoire de leur succès a attiré un certain nombre de croyants à les rejoindre. Leur établissement grandit maintenant et sera bientôt remarquable. Peut-être serait-il temps de revendiquer la terre pour nous-mêmes afin que ces colons n'oublient pas d'où ils viennent ?"
 tengri_events.59.a:0 "Il est temps de revendiquer ces terres pour nous-mêmes."
 tengri_events.59.b:0 "Ils sont livrés à eux-mêmes."
 tengri_events.60.t:0 "Arrivée d'un riche marchand"
 tengri_events.60.d:0 "Désireux de faire un bon profit des divers biens disponibles dans nos terres, les marchands du monde musulman plus large continuent de chercher notre [Root.Monarch.GetTitle]. Un tel homme prétend maintenant que nous n'en faisons pas assez pour capitaliser sur les ressources sous notre contrôle. Pour des honoraires modestes, il offre d'agir comme notre agent dans tous les contacts avec les marchands étrangers en général et les groupes financiers influents comme les Karimis en particulier."
 tengri_events.60.a:0 "Intéressant."
 tengri_events.61.t:0 "Maladie de [Root.Heir.GetName]"
 tengri_events.61.d:0 "Une étrange maladie a frappé [Root.Heir.GetName], une fièvre que nos chamans n'ont pu arrêter ni même soulager. Un médecin sunnite de passage prétend reconnaître la condition et pouvoir la guérir. Nos chamans seraient probablement offensés si nous faisions appel à un étranger après leur propre échec notoire, mais la vie de notre héritier semble toucher à sa fin à moins que nous ne fassions quelque chose."
 tengri_events.61.a:0 "Laisser le médecin essayer."
 tengri_events.61.b:0 "Il n'y a rien que nous puissions faire."
 tengri_events.62.t:0 "Protection des pèlerins"
 tengri_events.62.d:0 "Nos guerres fréquentes ont rendu les musulmans fidèles de notre État réticents à entreprendre des pèlerinages vers les cités saintes. Bien que la foi puisse souvent surmonter la peur, il est vrai que les pèlerins passant par nos terres sont souvent attaqués et leur voyage est souvent une épreuve périlleuse."
 tengri_events.62.a:0 "Nous devons assurer leur sécurité."
 tengri_events.62.b:0 "Leur foi les protégera."
 tengri_events.63.t:0 "Influence des Khojas"
 tengri_events.63.d:0 "Bien que [Root.Monarch.GetName] ait limité l'influence des Khojas par rapport à certains de [Root.Monarch.GetHerHis] prédécesseurs, ils restent une force puissante dans nos terres et beaucoup de nos sujets admirent le Khoja et [Root.Monarch.GetHerHis] famille. Cette faction puissante dans notre pays ne nous a jamais directement confrontés mais leur influence omniprésente érode lentement notre autorité."
 tengri_events.63.a:0 "Il n'y a rien à faire pour l'instant."
 tengri_events.63.b:0 "Tenter de limiter l'influence des Khojas."
