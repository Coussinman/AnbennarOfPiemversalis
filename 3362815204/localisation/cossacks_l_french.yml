l_french:
 tooltip_own_cossack_province:0 "Au moins une province possédée appartient à l'État des §YOrachav§!."
 estate_nobles:0 "Noblesse"
 estate_nobles_desc:0 "Cet état représente les familles d'aristocrates terriens de votre pays. Leurs privilèges sont garantis par d'anciennes traditions et la plupart ont été originellement acquis en rendant de grands services à l'État. Leur responsabilité traditionnelle est de combattre et de protéger le royaume contre les dangers extérieurs ainsi que d'aider le dirigeant à maintenir la paix."
 estate_church:0 "Clergé"
 estate_church_desc:0 "Cet état représente les prêtres éduqués de votre religion d'État. Ils ont une longue tradition de service dans l'administration de votre pays et leur responsabilité traditionnelle est de veiller au bien-être spirituel de celui-ci et de votre peuple. Au fil des siècles, ils ont acquis tant des propriétés terriennes que des privilèges de la part d'anciens dirigeants ainsi que d'individus pieux."
 estate_burghers:0 "Bourgeoisie"
 estate_burghers_desc:0 "Cet état représente la population urbaine de votre pays, comme les artisans, les marchands ou d'autres qui résident à l'intérieur des murs des cités. Leur responsabilité traditionnelle est de travailler pour maintenir l'économie en marche et, pour le faire efficacement, ils s'attendent à se voir accorder des droits et privilèges spéciaux pour eux-mêmes et les cités qu'ils représentent."
 estate_cossacks:0 "Orachav"
 estate_cossacks_desc:0 "Cet état représente principalement les éclaireurs et gardes à cheval des pionniers triuniques qui promeuvent un mode de vie plus nomade pour contrer la vulnérabilité des établissements sédentaires que leurs ancêtres avaient face à la menace centaure."
 estate_dhimmi:0 "Dhimmi"
 estate_dhimmi_desc:0 "Terme originellement réservé aux chrétiens et aux juifs, les Dhimmi sont les sujets non-musulmans dans un royaume musulman. Leur statut et leurs privilèges peuvent varier grandement entre différents États, tout comme leur organisation et leur nombre. Traditionnellement, il est de la responsabilité d'un dirigeant juste de protéger ces gens tout en les gardant séparés de la majorité musulmane. Ces principes ne sont cependant pas toujours aussi faciles à maintenir dans les parties du monde où les Dhimmi peuvent eux-mêmes constituer la majorité de la population."
 estate_nomadic_tribes:0 "Tribus"
 estate_nomadic_tribes_desc:0 "Le dirigeant d'un royaume nomade doit toujours s'efforcer de garder le contrôle sur les nombreuses tribus qui composent ses terres. Comme il n'y a pas d'institutions fortes ou permanentes de la même manière que dans de nombreux États sédentaires, les tribus sont la source principale d'autorité et agissent comme tout, des collecteurs d'impôts aux soldats ou pillards. Bien que les tribus considèrent le dirigeant de leur État comme le premier d'entre eux, elles s'attendent à se voir accorder de vastes territoires pour nourrir leurs chevaux et soutenir leur mode de vie, ainsi qu'une influence sur la plupart des affaires quotidiennes de l'État."
 MAPMODE_ESTATES:0 "États"
 MAPMODE_ESTATES_DESC:0 "Colore vos provinces selon l'État qui les contrôle."
 VITAL_PROVINCES:0 "Provinces d'intérêt"
