 THREATENWAR_ACCEPT:0 "S'ils acceptent, §Y$PROV$§! devient §Y$TAKERS$§! et nous gagnons $AE$ d'expansion agressive. Ils perdent $PRESTIGE$ de prestige. Il y aura une trêve jusqu'au $TRUCEDATE|Y$."
 THREATENWAR_REQDESC:0 "Mon $MONARCHTITLE$, les scélérats infâmes de $ACTOR$ §RMenacent de guerre§! si nous ne leur cédons pas $PROV$. Accepter nous coûtera $PRESTIGE$ de prestige et imposera une trêve jusqu'au $TRUCEDATE|Y$.\n\nS'ils refusent, ils nous déclareront la guerre."
