 THREATENWARTITLE:0 "Menacer de guerre"
 THREATENWARDESC:0 "Cela les menace de guerre pour une province sur laquelle vous avez une revendication ou une légitimisation. Il y a une chance qu'ils reculent selon à quel point ils vous craignent. S'ils ne le font pas, une guerre pour cette province commence. Si en revanche ils acceptent et que vous gagnez la province, il y aura une trêve."
 THREATENWAR_DESC:0 "Nous exigerons $PROV|Y$ de $THEM$ sous la menace de guerre."
 THREATENWAR_CLAIM:0 "En raison de la revendication de §Y$TAKERS$§!, nous déclarerons une guerre de $CBTYPE$ s'ils refusent."
