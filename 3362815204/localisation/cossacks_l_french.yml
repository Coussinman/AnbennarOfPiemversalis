 cossack_raids_opinion:0 "Raids orachav"
 cossack_estate_events.1.t:0 "Colonisation des steppes"
 cossack_estate_events.1.d:0 "La $ESTATE_NOBLES$ se plaint qu'un nombre croissant de serfs désertent les foyers sûrs qui leur sont fournis pour chercher fortune parmi les Orachav des steppes. Ils estiment que nous sommes à blâmer car nous avons laissé les Orachav devenir trop puissants, ce qui inspire les serfs à abandonner leurs maîtres légitimes.\nDes représentants des grandes familles exigent maintenant que nous limitions le pouvoir des Orachav afin qu'ils puissent étendre leurs latifundia dans les régions bordant la steppe. De cette façon, argumentent-ils, les champs sauvages peuvent être apprivoisés et les lois du royaume respectées."
 cossack_estate_events.1.a:0 "Ces serfs doivent être ramenés."
 cossack_estate_events.1.b:1 "Nous ne pouvons pas nous permettre de contrarier les Orachav."
 cossack_estate_events.2.t:0 "Agression orachav"
 cossack_estate_events.2.d:0 "Se déplaçant rapidement en bateau ou à cheval, les Orachav des steppes sont des pillards très habiles. Plusieurs de ces raids ont récemment dévasté nos campagnes et même des cités importantes à quelque distance de nos frontières. Une fois les raids exécutés, ces pillards se retirent derrière les frontières de [cossacks_here_target.GetName] aussi vite qu'ils sont venus. La $ESTATE_NOBLES$ et notre $ESTATE_BURGHERS$ ont des intérêts dans les zones affectées et les deux groupes exigent maintenant que nous fassions quelque chose."
 cossack_estate_events.2.d.tribes:0 "Se déplaçant rapidement en bateau ou à cheval, les Orachav des steppes sont des pillards très habiles. Plusieurs de ces raids ont récemment dévasté nos campagnes et même des cités importantes à quelque distance de nos frontières. Une fois les raids exécutés, ces pillards se retirent derrière les frontières de [cossacks_here_target.GetName] aussi vite qu'ils sont venus. La $ESTATE_NOMADIC_TRIBES$ a des intérêts dans les zones affectées et exige que nous fassions quelque chose."
 cossack_estate_events.2.d.fallback:0 "Se déplaçant rapidement en bateau ou à cheval, les Orachav des steppes sont des pillards très habiles. Plusieurs de ces raids ont récemment dévasté nos campagnes et même des cités importantes à quelque distance de nos frontières. Une fois les raids exécutés, ces pillards se retirent derrière les frontières de [cossacks_here_target.GetName] aussi vite qu'ils sont venus. Nos autorités locales dans les zones affectées exigent maintenant que nous fassions quelque chose."
 cossack_estate_events.2.a:0 "Exiger que ces Orachav soient traduits en justice !"
 cossack_estate_events.2.b:0 "Nous devrons laisser passer cela."
 cossack_estate_events.3.t:0 "Agression orachav"
 cossack_estate_events.3.d:0 "Se déplaçant rapidement en bateau ou à cheval, les Orachav des steppes sont des pillards très habiles. Plusieurs de ces raids ont récemment dévasté les campagnes [From.GetAdjective] et même des cités importantes à quelque distance de nos frontières.\nComme les Orachav responsables sont basés à l'intérieur de nos frontières, les [From.GetAdjective] exigent maintenant à la fois une compensation et que les coupables soient traduits en justice."
 cossack_estate_events.3.a:0 "Cette affaire échappe à notre contrôle."
 cossack_estate_events.3.b:0 "Les traduire en justice !"
 cossack_estate_events.4.t:0 "La réponse [From.GetAdjective]"
 cossack_estate_events.4.d:0 "La réponse [From.GetAdjective] est qu'ils refusent de prendre la responsabilité des raids dans notre pays, prétendant qu'ils sont incapables de contrôler eux-mêmes les Orachav."
 cossack_estate_events.4.a:0 "Nous nous soucions peu de telles excuses."
 cossack_estate_events.5.t:0 "La réponse [From.GetAdjective]"
 cossack_estate_events.5.d:0 "La réponse [From.GetAdjective] a été d'envoyer une compensation monétaire pour les raids de leurs sujets orachav, ce qui a compensé les dommages aux propriétés. Ils prétendent également avoir traduit les coupables en justice."
 cossack_estate_events.5.a:0 "Si seulement nous pouvions croire cela."
 cossack_estate_events.6.t:1 "Croissance du pouvoir orachav"
 cossack_estate_events.6.d:0 "Bien que peu contesteraient leur influence sur les steppes, les Orachav ont beaucoup de choses jouant contre eux quand il s'agit de gagner de l'influence dans les couloirs du pouvoir. La $ESTATE_NOBLES$ les méprise et voudrait les voir tous ramenés à travailler comme serfs sur leurs latifundia, et leurs manières ne leur ont pas valu beaucoup d'amis à [Root.Capital.GetCapitalName].\nDernièrement, cependant, les choses ont tourné en leur faveur. Ils ont réussi à défendre leurs établissements et leurs services à l'État comme pillards sont indiscutables."
 cossack_estate_events.6.a:0 "D'accord."
 cossack_estate_events.7.t:1 "Déclin du pouvoir orachav"
 cossack_estate_events.7.d:0 "La nature libre des Orachav et la distance entre eux et les couloirs du pouvoir à [Root.Capital.GetCapitalName] a toujours été un problème pour eux. Manquant de privilèges héréditaires, le nombre d'Orachav enregistrés auprès de l'État comme officiers avec les avantages que cela implique a diminué régulièrement."
 cossack_estate_events.7.a:0 "D'accord."
 cossack_estate_events.8.t:0 "Pétition pour des privilèges"
 cossack_estate_events.8.d:0 "Tous les Orachav ne se voient pas accorder les mêmes privilèges par l'État. Traditionnellement, les droits sont accordés à des Orachav spécifiques qui sont prêts à rendre de grands services à l'État en temps de guerre. Comme ces droits ne sont pas transférables à la mort, cela signifie que l'influence des Orachav peut varier considérablement au fil du temps. Selon les Orachav, il est grand temps que nous leur accordions davantage de privilèges pour renforcer leurs effectifs."
 cossack_estate_events.8.a:0 "Nous avons besoin de plus d'Orachav enregistrés !"
 cossack_estate_events.8.b:0 "Qu'ils s'occupent de leurs steppes."
 cossack_estate_events.9.t:1 "Approvisionnements pour les Orachav"
 cossack_estate_events.9.d:0 "La vie en frontière peut être rude et bien que les Orachav soient habitués à mener leurs propres batailles, un peu d'aide du trésor central pourrait probablement être mise à profit. La saison dernière a été inhabituellement dure et combinée à un nombre croissant d'incursions tartares, de nombreux Orachav ont maintenant une pénurie urgente de nourriture pour les mois à venir. Si nous devions approvisionner les Orachav en grain ainsi qu'en fournitures militaires comme des armes et des uniformes, nous ne renforcerions pas seulement directement nos défenseurs des steppes, nous les lierions probablement aussi plus étroitement à notre État."
 cossack_estate_events.9.a:0 "Leur envoyer ce dont ils ont besoin."
 cossack_estate_events.9.b:0 "Ils devront se débrouiller seuls."
 cossack_estate_events.10.t:0 "Perturbations du commerce de grain"
 cossack_estate_events.10.d:0 "Il y a toujours eu des tensions entre les Orachav et les autres états, ne serait-ce qu'à cause de leurs manières inhabituelles et de leurs origines diverses. Dernièrement, cependant, celles-ci ont considérablement augmenté. La $ESTATE_BURGHERS$ est alarmée par les raids orachav et prétend qu'ils ciblent les expéditions de leur grain. Les Orachav eux-mêmes prétendent qu'ils n'attaquent que les Tartares et les brigands de la région et que la $ESTATE_BURGHERS$ se trompe simplement. Comme il y a peu de représentation gouvernementale dans la zone, il est difficile de déterminer la vérité, mais il y a clairement des frictions entre ces deux groupes et on attend de nous que nous réprimandions ou sanctionnions l'un des camps dans ce conflit."
 cossack_estate_events.10.a:1 "Soutenir les Orachav."
 cossack_estate_events.10.b:0 "Soutenir la $ESTATE_BURGHERS$."
 cossack_estate_events.11.t:1 "Colons orachav en [cossack_settlers_province.GetName]"
 cossack_estate_events.11.d:1 "La vie des steppes a habitué les Orachav à une existence de frontière. Les menaces constantes à la fois d'un climat rude dans une terre non colonisée et des pillards tartares ont fait des Orachav à la fois des guerriers redoutés et des colons robustes.\nAlors que nous tournons nos regards vers la terre de [cossack_settlers_province.GetName], il devient apparent que la vie sur la frontière orientale n'est pas si différente de celle des steppes que nous contrôlons déjà."
 cossack_estate_events.11.a:1 "Enrôler des colons orachav."
 cossack_estate_events.11.b:1 "Nous ne pouvons pas faire confiance aux Orachav."
 cossack_estate_events.12.t:1 "Troubles parmi les Orachav"
 cossack_estate_events.12.d:1 "La profonde méfiance des Orachav envers l'État en général et notre [Root.Monarch.GetTitle] en particulier a culminé en une rupture totale de l'autorité dans les steppes. Les communautés orachav sont ouvertement hostiles à nos émissaires et agissent de facto maintenant entièrement indépendamment de l'autorité centrale."
 cossack_estate_events.12.a:0 "Les laisser tranquilles, les relations s'amélioreront en temps voulu."
 cossack_estate_events.12.b:0 "Écraser les dissidents."
 cossack_estate_events.13.t:1 "Expansion orachav en [growing_cossack_communities.GetName]"
 cossack_estate_events.13.d:1 "Les frontières peuvent souvent être des choses théoriques, surtout dans les champs sauvages. Il semble que les Orachav se soient rapidement étendus en [growing_cossack_communities.GetName]. Nous pourrions tenter d'inverser ce développement mais les Orachav n'apprécieraient probablement pas d'être retirés de terres qu'ils ont travaillé dur pour coloniser."
 cossack_estate_events.13.a:0 "Accepter le nouveau statu quo."
 cossack_estate_events.13.b:1 "Récupérer la terre des Orachav."
 cossack_estate_events.14.t:0 "Demandes de privilèges étendus"
 cossack_estate_events.14.d:0 "Le vieux rêve des Orachav a toujours été d'être acceptés comme égaux aux états établis comme la $ESTATE_NOBLES$ ou la $ESTATE_BURGHERS$. Jamais ce rêve n'a été plus proche de sa réalisation qu'aujourd'hui. Les Orachav ont acquis une grande influence dans notre État et à bien des égards nous dépendons de leur soutien.\nÉtant donné les circonstances favorables, de nombreux Orachav expriment maintenant leurs vieilles revendications pour une reconnaissance et des privilèges officiels."
 cossack_estate_events.14.a:0 "Absurde."
 cossack_estate_events.14.b:0 "Céder à leurs demandes."
 cossack_estate_events.15.t:0 "Révolte des Orachav de [Root.GetName]"
 cossack_estate_events.15.d:0 "Peu impressionnée par notre décret de quitter [Root.GetName], l'armée orachav s'y est soulevée en révolte."
 cossack_estate_events.15.a:0 "D'accord."
 cossack_estate_events.16.t:1 "Loyauté vacillante des Orachav"
 cossack_estate_events.16.d:0 "Les bonnes relations doivent être entretenues. Alors que leurs effectifs augmentent et que certains des chefs orachav vieillissent, nos relations chaleureuses sont devenues plus froides. Nous devons prendre des dispositions avec la génération actuelle de chefs orachav pour être sûrs de leur loyauté."
 cossack_estate_events.16.a:0 "D'accord."
 tribal_estate_events.1.t:0 "Tensions entre nomades et population sédentaire"
 tribal_estate_events.1.d:0 "La différence entre la collecte d'impôts, l'extorsion ou la demande de tribut peut parfois être quelque peu vague. Dans de nombreuses parties de notre pays, les impôts sont collectés par les clans nomades de manières très similaires à la façon dont ils se seraient comportés lors d'un raid.\nAujourd'hui, un émissaire de certains de nos sujets les plus aisés est arrivé pour raconter comment les soi-disant collecteurs d'impôts ont pillé leurs terres puis assiégé leurs demeures fortifiées. Ils exigent maintenant réparation de [Root.Monarch.GetTitle] et que les coupables soient punis. Les tribus, cependant, n'apprécieraient probablement pas de telles restrictions de leur conduite."
 tribal_estate_events.1.a:0 "Réprimander les chefs."
 tribal_estate_events.1.b:0 "Soutenir les chefs."
 tribal_estate_events.2.t:0 "Croissance de l'influence tribale"
 tribal_estate_events.2.d:0 "Un État tribal est toujours quelque peu instable. Certains clans augmenteront rapidement leur influence sur les autres, pour s'effondrer à nouveau tout aussi soudainement. Dernièrement, un nouveau groupe de chefs tribaux en est venu à étendre considérablement son pouvoir sur les tribus moindres."
 tribal_estate_events.2.a:0 "D'accord."
 tribal_estate_events.3.t:0 "Déclin de l'influence tribale"
 tribal_estate_events.3.d:0 "En raison des luttes intestines entre clans, de manœuvres politiques mal réfléchies et de conflits liés à la succession, notre influence sur les autres tribus a considérablement augmenté au cours des dernières années. Ce déclin de l'influence tribale est peu susceptible de durer mais constitue un répit agréable pour l'instant."
 tribal_estate_events.3.a:0 "D'accord."
 tribal_estate_events.4.t:0 "Plaintes des chefs locaux"
 tribal_estate_events.4.d:0 "Plusieurs chefs de clan se sont plaints à nous des jeunes hommes de leur région quittant leurs clans pour rejoindre notre propre armée. Ils prétendent que ce n'est pas ainsi que cela se faisait du temps de notre père, et que chaque homme devrait d'abord servir dans l'armée de son clan local. Que devons-nous faire ?"
 tribal_estate_events.4.a:0 "Renvoyer les jeunes hommes chez eux."
 tribal_estate_events.4.b:0 "Les garder dans l'armée."
 tribal_estate_events.5.t:0 "Les chefs retiennent les impôts"
 tribal_estate_events.5.d:0 "L'un de nos plus proches conseillers est venu nous voir avec la preuve que les chefs locaux ne paient pas autant d'impôts qu'on pourrait l'attendre de leurs terres. C'est une situation délicate, mais nous devons prendre une décision rapidement."
 tribal_estate_events.5.a:0 "Leur terre, leurs règles !"
 tribal_estate_events.5.b:0 "Ils ploient le genou devant MOI !"
 tribal_estate_events.6.t:0 "Notre horde est en désarroi !"
 tribal_estate_events.6.d:0 "Maintenir des tribus nomades unies n'est jamais une tâche facile et en ce moment nous traversons des temps difficiles. La $ESTATE_NOMADIC_TRIBES$ pourrait très probablement nous aider à stabiliser la situation pour que nous puissions nous remettre sur pied, mais nous augmenterions leur influence sur notre État."
 tribal_estate_events.6.a:0 "Compter sur la $ESTATE_NOMADIC_TRIBES$ !"
 tribal_estate_events.6.b:0 "Nous n'avons pas besoin de leur aide."
 EST_VAL_TRIBES_STABILIY_BOOSTED:0 "Horde stabilisée : §Y$VAL$%§!"
 tribal_estate_events.7.t:0 "Nos tribus voient la horde comme faible !"
 tribal_estate_events.7.d:0 "Notre commandement militaire est inexpérimenté et faible. La $ESTATE_NOMADIC_TRIBES$ se demande si elle peut vraiment suivre de tels hommes novices au combat, offrant plutôt de nous fournir des guerriers aguerris prêts à mener nos troupes."
 tribal_estate_events.7.a:0 "Compter sur la $ESTATE_NOMADIC_TRIBES$ !"
 tribal_estate_events.7.b:0 "Nous n'avons pas besoin de leur aide."
 tribal_estate_events.8.t:0 "La horde n'est pas unifiée !"
 tribal_estate_events.8.d:0 "Notre [Root.Monarch.GetTitle] s'est montré [Root.Monarch.GetHerselfHimself] incapable de maintenir les [Root.GetAdjective] unis et la $ESTATE_NOMADIC_TRIBES$ craint que nous ne devenions un objet de ridicule. Des chefs de clan éminents ont approché [Root.Monarch.GetTitle] offrant de renforcer notre règne, bien que certains diraient que compter sur d'autres pour imposer cette unité crée une paix instable."
 tribal_estate_events.8.a:0 "Compter sur la $ESTATE_NOMADIC_TRIBES$ !"
 tribal_estate_events.8.b:0 "Nous n'avons pas besoin de leur aide."
 EST_VAL_TRIBES_UNITY:0 "Horde unifiée : §Y$VAL$%§!"
 EST_VAL_TRIBES_ARMY:0 "Armée renforcée : §Y$VAL$%§!"
 tribal_estate_events.9.t:0 "Retour aux anciennes voies !"
 tribal_estate_events.9.d:0 "L'un des chefs de clan s'est présenté, comme porte-parole de leur groupe, et nous exhorte à revenir aux anciennes voies, les voies qui nous ont rendus forts. « Écrasez vos ennemis, chassez-les devant vous, et entendez les lamentations de leurs femmes ! »"
 tribal_estate_events.9.a:0 "C'est cela qui est bon dans la vie."
 tribal_estate_events.9.b:0 "Cela appartient au passé."
 tribal_estate_events.10.t:0 "Révolte de la $ESTATE_NOMADIC_TRIBES$ de [Root.GetName]"
 tribal_estate_events.10.d:0 "Refusant de rester les bras croisés pendant que nous prenons le contrôle de leurs terres, les tribus de [Root.GetName] ont pris les armes contre nous."
 tribal_estate_events.10.a:0 "D'accord."
 tribal_estate_events.11.t:0 "[Root.Monarch.GetTitle] après [Root.Monarch.GetTitle]"
 tribal_estate_events.11.d:0 "Un cousin éloigné de [Root.Monarch.GetName] a réussi à gagner la gratitude des tribus. De nombreux chefs tribaux puissants exigent maintenant que nous changions les plans futurs de succession pour assurer que ce cousin soit garanti sa place légitime comme [Root.Monarch.GetTitle]. S'ils sont motivés par une vraie loyauté envers notre parent ou s'ils estiment qu'il pourrait facilement être contrôlé est difficile à dire, mais ils n'apprécieraient certainement pas un refus de suivre leurs conseils."
 tribal_estate_events.11.a:0 "Un nouvel héritier, soit !"
 tribal_estate_events.11.b:0 "Ces tribus doivent connaître leur place !"
 tribal_estate_events.12.t:0 "Les tribus exigent plus d'hommes"
 tribal_estate_events.12.d:0 "Des chefs tribaux éminents nous ont approchés pour exiger que nous les laissions utiliser les ressources de l'État pour défendre leurs terres. Ils prétendent que les États voisins font des incursions et des raids sur les terres qu'ils contrôlent et que le seul moyen efficace de les défendre est de placer certaines de nos troupes directement sous leur commandement."
 tribal_estate_events.12.a:0 "Bien sûr qu'ils auront nos hommes !"
 tribal_estate_events.12.b:0 "C'est une excuse pour nous affaiblir !"
 tribal_estate_events.13.t:0 "$ESTATE_NOMADIC_TRIBES$ indépendantes"
 tribal_estate_events.13.d:0 "Plusieurs chefs de la puissante $ESTATE_NOMADIC_TRIBES$ de notre pays ont approché [Root.Monarch.GetTitle] pour se plaindre de l'ingérence injuste de [Root.Monarch.GetHerHis] représentants. La $ESTATE_NOMADIC_TRIBES$ estime qu'elle devrait être laissée tranquille conformément à ses droits ancestraux."
 tribal_estate_events.13.a:0 "Nous devons les laisser tranquilles alors."
 tribal_estate_events.13.a.tt:1 "Les provinces qui constituent la part de terres de l'État §YTribus§! gagneront §R35§! d'autonomie."
 tribal_estate_events.13.b:0 "Nous ne pouvons tolérer aucun État dans notre État !"
 tribal_estate_events.14.t:0 "Demandes de la $ESTATE_NOMADIC_TRIBES$"
 tribal_estate_events.14.d:0 "La $ESTATE_NOMADIC_TRIBES$ estime que les talents de leurs généraux sont gaspillés dans nos armées et a exigé que leurs chefs soient renvoyés chez eux pour rassembler leurs propres troupes. Comme nous dépendons d'eux pour la plupart des affaires militaires, cela mettra à rude épreuve notre commandement restant."
 tribal_estate_events.14.a:0 "D'accord."
 tribal_estate_events.14.b:0 "Ils ne feront rien de tel !"
 tribal_estate_events.15.t:0 "Loyauté vacillante de la $ESTATE_NOMADIC_TRIBES$"
 tribal_estate_events.15.d:0 "Les bonnes relations doivent être entretenues. Alors que leurs effectifs augmentent et que certains des chefs de la $ESTATE_NOMADIC_TRIBES$ vieillissent, nos relations chaleureuses sont devenues plus froides. Nous devons prendre des dispositions avec la génération actuelle de chefs pour être sûrs de leur loyauté."
 tribal_estate_events.15.a:0 "D'accord."
 the_proper_old_ways:0 "Les vraies anciennes voies"
 desc_the_proper_old_ways:0 "Nous avons tenté de revenir à nos racines et de gouverner nos terres selon ce que nous imaginons être la voie du grand Gengis Khan et de ses contemporains. Certains appelleraient cela arriéré, nous appelons cela convenable."
 church_estate_events.1.t:0 "Libertas Ecclesiae"
 church_estate_events.1.d:0 "Le $ESTATE_CHURCH$ a longtemps été l'un des premiers piliers du royaume [Root.GetAdjective], fournissant non seulement une guidance spirituelle mais aussi des administrateurs, des juges et des diplomates au bénéfice de notre [Root.Monarch.GetTitle]. En retour de ces grands services, aucun manoir ecclésiastique, monastère ou autre propriété ne paie de taxes à l'État et les autorités temporelles ne se mêlent pas des affaires internes du $ESTATE_CHURCH$.\nLes temps deviennent difficiles, cependant, et l'État doit couvrir un nombre croissant de dépenses. Les suggestions que peut-être le $ESTATE_CHURCH$ pourrait faire une contribution volontaire n'ont pas été favorablement reçues."
 church_estate_events.1.a:0 "Leur faire comprendre clairement qu'ils doivent contribuer."
 church_estate_events.1.b:0 "Nous trouverons l'argent ailleurs."
 church_estate_events.101.t:0 "Terres des temples"
 church_estate_events.101.d:0 "Le $ESTATE_CHURCH$ a longtemps été l'un des premiers piliers du royaume [Root.GetAdjective], fournissant non seulement une guidance spirituelle mais aussi des administrateurs, des juges et des diplomates au bénéfice de notre [Root.Monarch.GetTitle]. En retour de ces grands services, de nombreuses donations ont été faites au fil des années, tant par l'État que par d'autres, sous forme de villages pour soutenir les communautés brahmanes. Ces Brahmadeyas ont au cours des siècles rendu notre $ESTATE_CHURCH$ assez riche.\nLes temps deviennent difficiles, cependant, et l'État doit couvrir un nombre croissant de dépenses. Les suggestions que peut-être le $ESTATE_CHURCH$ pourrait faire une contribution volontaire n'ont pas été favorablement reçues."
 church_estate_events.102.t:0 "Les richesses du $ESTATE_CHURCH$"
 church_estate_events.102.d:0 "Le $ESTATE_CHURCH$ a longtemps été l'un des premiers piliers du royaume [Root.GetAdjective], fournissant non seulement une guidance spirituelle mais aussi des administrateurs, des juges et des diplomates au bénéfice de notre [Root.Monarch.GetTitle]. En retour de ces grands services, de nombreuses donations ont été faites au fil des années, tant par l'État que par d'autres, au $ESTATE_CHURCH$ et aux dieux qu'ils servent. Ces dons ont au cours des siècles rendu le $ESTATE_CHURCH$ assez riche et influent.\nLes temps deviennent difficiles, cependant, et l'État doit couvrir un nombre croissant de dépenses. Les suggestions que peut-être le $ESTATE_CHURCH$ pourrait faire une contribution volontaire n'ont pas été favorablement reçues."
 church_estate_events.103.t:0 "Les richesses du $ESTATE_CHURCH$"
 church_estate_events.103.d:0 "Le $ESTATE_CHURCH$ a toujours été le premier pilier du royaume [Root.GetAdjective], fournissant non seulement une guidance spirituelle mais aussi des administrateurs, des juges et des diplomates au bénéfice de notre [Root.Monarch.GetTitle]. En retour de ces grands services, de nombreuses terres ont été mises de côté comme propriétés religieuses, exemptées de la plupart de nos taxes. De cette façon, le $ESTATE_CHURCH$ et les nombreux projets qu'ils soutiennent peuvent être pourvus.\nLes temps deviennent difficiles, cependant, et l'État doit couvrir un nombre croissant de dépenses. Les suggestions que peut-être le $ESTATE_CHURCH$ pourrait faire une contribution volontaire n'ont pas été favorablement reçues."
 church_estate_events.104.t:0 "Les richesses du $ESTATE_CHURCH$"
 church_estate_events.104.d:0 "Le $ESTATE_CHURCH$ a longtemps été l'un des premiers piliers du royaume [Root.GetAdjective], fournissant non seulement une guidance spirituelle mais aussi des administrateurs, des juges et des diplomates au bénéfice de notre [Root.Monarch.GetTitle]. En retour de ces grands services, de nombreuses donations ont été faites au fil des années, tant par l'État que par d'autres, au $ESTATE_CHURCH$. Ces dons ont au cours des siècles rendu le $ESTATE_CHURCH$ assez riche et influent.\nLes temps deviennent difficiles, cependant, et l'État doit couvrir un nombre croissant de dépenses. Les suggestions que peut-être le $ESTATE_CHURCH$ pourrait faire une contribution volontaire n'ont pas été favorablement reçues."
 church_estate_events.105.t:0 "Les richesses du $ESTATE_CHURCH$"
 church_estate_events.105.d:0 "Le $ESTATE_CHURCH$ a longtemps été l'un des premiers piliers du royaume [Root.GetAdjective], fournissant non seulement une guidance spirituelle mais aussi des administrateurs, des érudits en droit et des diplomates au bénéfice de notre [Root.Monarch.GetTitle]. En retour de ces grands services, de nombreuses donations ont été faites au fil des années, tant par l'État que par d'autres, au grand $ESTATE_CHURCH$ et à leurs vastes propriétés foncières. Ces dons ont au cours des siècles rendu le $ESTATE_CHURCH$ assez riche et influent.\nLes temps deviennent difficiles, cependant, et l'État doit couvrir un nombre croissant de dépenses. Les suggestions que peut-être le $ESTATE_CHURCH$ pourrait faire une contribution volontaire n'ont pas été favorablement reçues."
 church_estate_events.2.t:0 "Avancée du $ESTATE_CHURCH$"
 church_estate_events.2.d:0 "Le pouvoir du $ESTATE_CHURCH$ n'a jamais reposé sur l'État lui-même. C'est plutôt à bien des égards le $ESTATE_CHURCH$ qui, par ses liens avec le royaume spirituel, prête sa légitimité à [Root.Monarch.GetTitle]. Une combinaison de manœuvres politiques habiles, de mauvais présages perçus et de dons généreux de nos sujets a récemment cimenté le pouvoir de cet état."
 church_estate_events.2.a:0 "D'accord."
 church_estate_events.3.t:0 "$ESTATE_CHURCH$ perdant du pouvoir"
 church_estate_events.3.d:0 "Plus que tout autre état, l'influence du $ESTATE_CHURCH$ dépend de sa réputation auprès du peuple. Il a été difficile de mettre le doigt sur la raison exacte, mais au cours des dernières années le $ESTATE_CHURCH$ en est venu à être vu moins comme les gardiens spirituels de notre pays et plus comme des intrigants riches et corrompus. Combiné à des investissements malheureux dans les propriétés mêmes du $ESTATE_CHURCH$ et à de mauvaises manœuvres politiques, le $ESTATE_CHURCH$ a perdu à la fois pouvoir et influence."
 church_estate_events.3.a:0 "D'accord."
 church_estate_events.4.t:0 "Anticléricalisme"
 church_estate_events.4.d:0 "La $ESTATE_BURGHERS$ de plusieurs cités importantes accuse le $ESTATE_CHURCH$ d'être cupide et indolent. Les gens du peuple pieux retiennent maintenant la dîme en signe de protestation contre un exemple particulièrement mauvais d'abus de l'autorité du $ESTATE_CHURCH$. Les $ESTATE_BURGHERS$ pieux refusent maintenant de payer les dîmes au $ESTATE_CHURCH$ car ils considèrent le $ESTATE_CHURCH$ indigne de les recevoir.\nLe $ESTATE_CHURCH$ est furieux et exige que nous infligions une amende aux $ESTATE_BURGHERS$ obstinés."
 church_estate_events.4.d.2:0 "Les Vaishyas de plusieurs cités importantes accusent le $ESTATE_CHURCH$ d'être cupide et indolent. Les gens du peuple pieux retiennent maintenant la dîme en signe de protestation contre un exemple particulièrement mauvais d'abus de l'autorité du $ESTATE_CHURCH$. Les Vaishyas pieux refusent maintenant de payer les dîmes au $ESTATE_CHURCH$ car ils considèrent le $ESTATE_CHURCH$ indigne de les recevoir.\nLe $ESTATE_CHURCH$ est furieux et exige que nous infligions une amende aux Vaishyas obstinés."
 church_estate_events.4.a:0 "Alors nous devons les forcer à payer !"
 church_estate_events.4.b:0 "Une légère réprimande suffira."
 church_estate_events.5.t:0 "Détérioration des relations avec le $ESTATE_CHURCH$"
 church_estate_events.5.d:0 "Les relations entre l'État et le $ESTATE_CHURCH$ ont maintenant suffisamment baissé pour être entièrement caractérisées par la méfiance et même la défiance ouverte. Les lieux saints de notre nation sont des centres de résistance à [Root.Monarch.GetTitle] et la plupart des fidèles de nos terres doutent de la légitimité de notre règne.\nLes choses étant ce qu'elles sont, il n'est pas surprenant que tout ce qu'il a fallu pour que la situation s'enflamme soit un petit faux pas de notre [Root.Monarch.GetTitle] lors d'une cérémonie religieuse la semaine dernière. Les paysans se soulèvent maintenant dans tout notre pays avec le $ESTATE_CHURCH$ les incitant et dirigeant leur colère vers nous."
 church_estate_events.5.a:0 "D'accord."
 church_estate_events.6.t:0 "Triomphe du $ESTATE_CHURCH$ ?"
 church_estate_events.6.d:0 "Bien que nul ne défie ouvertement le $ESTATE_CHURCH$, il y a peu d'États où ils sont aussi influents qu'en [Root.GetName]. Il n'y a pas une seule institution dans notre pays qui ne soit entièrement sous l'influence du $ESTATE_CHURCH$ et le pouvoir de notre [Root.Monarch.GetTitle] dépend d'eux maintenant plus que jamais.\nIl est peut-être naturel que le $ESTATE_CHURCH$ souhaite également prendre un rôle plus actif dans le gouvernement pratique de notre pays. Dernièrement, un certain nombre de suggestions ont été faites par leurs représentants pour harmoniser davantage nos lois et traditions avec celles du royaume spirituel. L'ambition est de purger notre culture de cour de toute hétérodoxie et de s'assurer que le pays est gouverné selon des règles et idéaux religieusement sains."
 church_estate_events.6.a:0 "Suivre les recommandations du $ESTATE_CHURCH$."
 church_estate_events.6.b:0 "Rejeter leur autorité."
 church_estate_events.7.t:0 "$ESTATE_CHURCH$ puissant"
 church_estate_events.7.d:0 "Bien que de nombreux dirigeants puissent compter sur le soutien du $ESTATE_CHURCH$, peu ont des partisans aussi forts que nous. Une longue tradition de coopération étroite et de loyauté entre nous et le $ESTATE_CHURCH$ a résulté en une situation où l'Église se considère comme faisant partie de l'administration de l'État plutôt que comme un acteur indépendant. Dans tout notre État, le $ESTATE_CHURCH$ répand la parole de l'excellence et de la force spirituelle de notre [Root.Monarch.GetTitle]."
 church_estate_events.7.a:0 "Excellent."
 church_estate_events.8.t:0 "Vol de terres"
 church_estate_events.8.d:0 "De nombreuses donations de terres sont assez anciennes et bien qu'elles soient toujours consignées par écrit, le paysage et les noms peuvent bien avoir changé depuis qu'une donation a été originellement écrite. Récemment, le $ESTATE_CHURCH$ a accusé plusieurs membres de la $ESTATE_NOBLES$ de vol de terres pur et simple sous forme d'empiétement sur des terres données au $ESTATE_CHURCH$ il y a longtemps. La $ESTATE_NOBLES$, en revanche, argue que c'est le $ESTATE_CHURCH$ qui essaie de saisir des zones de terre qu'ils ne possèdent pas.\nQuiconque nous déciderons de soutenir deviendra le propriétaire foncier majoritaire dans la zone."
 church_estate_events.8.a:0 "Prendre le parti du $ESTATE_CHURCH$."
 church_estate_events.8.b:0 "Prendre le parti de la $ESTATE_NOBLES$."
 church_estate_events.8.c:0 "Ne favoriser aucune partie."
 church_estate_events.9.t:0 "Religion populaire"
 church_estate_events.9.d:0 "Il y a toujours eu quelque divergence entre la religion réellement enseignée et défendue par le $ESTATE_CHURCH$ et la foi réelle du peuple dans les provinces. La plupart du temps, les différences sont assez petites pour que le $ESTATE_CHURCH$ choisisse de les ignorer pour se concentrer plutôt sur le renforcement des idées spirituelles plus orthodoxes du peuple.\nIl semble, cependant, que certaines idées assez hétérodoxes, bien qu'enracinées dans d'anciennes traditions, aient commencé à se répandre avec la foi [Root.Religion.GetName] parmi nos sujets non-[Root.Religion.GetName]. Le mélange résultant d'anciennes idées païennes, de superstitions populaires et de la vraie foi [Root.Religion.GetName] elle-même a été un peu trop pour le $ESTATE_CHURCH$ même si cela semble avoir rendu la conversion une proposition beaucoup plus attrayante pour nos sujets païens."
 church_estate_events.9.a:0 "Tenter d'éradiquer ce syncrétisme."
 church_estate_events.9.b:0 "Mieux vaut laisser les choses suivre leur cours."
 church_estate_events.10.t:0 "Lutte politique au sein du $ESTATE_CHURCH$"
 church_estate_events.10.d:0 "Le temps est venu pour le $ESTATE_CHURCH$ de nommer un nouveau chef pour assister notre [Root.Monarch.GetTitle] dans la capitale. Le candidat probable est un vieux clerc avec une solide histoire comme membre éminent du $ESTATE_CHURCH$ derrière lui. Il a, cependant, également acquis de nombreux ennemis au cours de sa vie qui espèrent maintenant voir un candidat quelque peu plus jeune avec un passé moins laid être nommé. En tant que [Root.Monarch.GetTitle], il ne serait pas difficile d'influencer cette élection en faveur du candidat plus jeune qui serait probablement plus loyal. Être vu se mêler des affaires du $ESTATE_CHURCH$, cependant, affaiblirait très probablement la faction à long terme."
 church_estate_events.10.a:0 "Ne pas se mêler des affaires du $ESTATE_CHURCH$."
 church_estate_events.10.b:0 "Soutenir le candidat plus jeune."
 church_estate_events.11.t:0 "Révolte du $ESTATE_CHURCH$ de [Root.GetName]"
 church_estate_events.11.d:0 "En réponse à la réduction des propriétés du $ESTATE_CHURCH$, le peuple de la province s'est soulevé pour protéger le $ESTATE_CHURCH$ de nos soldats."
 church_estate_events.11.a:0 "D'accord."
 church_estate_events.12.t:0 "Loyauté vacillante du $ESTATE_CHURCH$"
 church_estate_events.12.d:0 "Les bonnes relations doivent être entretenues. Alors que leurs effectifs augmentent et que certains des chefs du $ESTATE_CHURCH$ vieillissent, nos relations chaleureuses sont devenues plus froides. Nous devons prendre des dispositions avec la génération actuelle du $ESTATE_CHURCH$ pour être sûrs de leur loyauté."
 church_estate_events.12.a:0 "D'accord."
 nobles_estate_events.1.t:0 "Naissance noble"
 nobles_estate_events.1.d:0 "Beaucoup des familles de la $ESTATE_NOBLES$ ont gagné leur position actuelle grâce aux actions d'un ancêtre qui a servi l'État en temps de guerre. Pour la plupart de leurs fils, une vie sur le champ de bataille est donc la seule carrière imaginable. Avec la modernisation de l'armée, cependant, les officiers roturiers ne sont plus entièrement inhabituels. Des membres de la noblesse nous ont maintenant approchés demandant que nous garantissions ce qu'ils estiment être le droit acquis de leur classe. Aucun homme ne devrait pouvoir prendre service comme commandant dans les armées [Root.GetAdjective] s'il n'est pas de naissance noble !"
 nobles_estate_events.1.a:0 "Garantir leur droit de commander nos armées."
 nobles_estate_events.1.b:0 "Nous ne pouvons pas nous engager dans de telles promesses."
 nobles_estate_events.2.t:0 "Avancée de la $ESTATE_NOBLES$"
 nobles_estate_events.2.d:0 "L'État n'est pas la seule source d'influence dans notre pays. Au cours des dernières décennies, un champion charismatique de la $ESTATE_NOBLES$ a réussi à augmenter le pouvoir des grandes familles de la $ESTATE_NOBLES$ sur la plupart des institutions de notre pays.\nLes contacts et les privilèges peuvent être des choses puissantes, surtout combinés à l'ambition."
 nobles_estate_events.2.a:0 "D'accord."
 nobles_estate_events.3.t:1 "Empiètement de la $ESTATE_NOBLES$ en [noble_encroachment.GetName]"
 nobles_estate_events.3.d:1 "Il est difficile de surveiller tout le monde partout tout le temps et les limites entre les propriétés foncières individuelles sont souvent fondées sur d'anciennes traditions ou des documents écrits quand le paysage pouvait avoir l'air assez différent. Pour quelqu'un avec les bonnes ressources, cela peut être exploité. Un certain nombre de familles éminentes de la $ESTATE_NOBLES$ ont utilisé leur influence considérable à [Root.Capital.GetCapitalName] pour s'en tirer en étendant considérablement leurs propriétés en [noble_encroachment.GetName]. Si nous voulons protéger la propriété de l'État, nous devons agir bientôt."
 nobles_estate_events.3.a:0 "Laisser passer."
 nobles_estate_events.3.b:0 "Exiger que la terre soit restituée."
 nobles_estate_events.4.t:0 "Nobles tyranniques"
 nobles_estate_events.4.d:0 "Un représentant du peuple vivant dans une zone dominée par l'une des familles les plus éminentes de la $ESTATE_NOBLES$ a approché le trône aujourd'hui, implorant [Root.Monarch.GetTitle] de prendre des mesures contre ce qu'il prétend être des abus de pouvoir systématiques contre le peuple là-bas. En tant que dirigeant de [Root.GetName], [Root.Monarch.GetName] a la responsabilité de protéger son peuple ; ne pas le faire nous fera paraître faibles et pourrait nuire à la croissance à long terme de la province. La $ESTATE_NOBLES$ n'apprécierait probablement pas que l'on châtie un membre aussi puissant de ses rangs cependant."
 nobles_estate_events.4.a:0 "Fermer les yeux."
 nobles_estate_events.4.b:0 "Châtier le propriétaire terrien."
 nobles_estate_events.5.t:0 "Déclin du pouvoir de la $ESTATE_NOBLES$"
 nobles_estate_events.5.d:0 "En tant que propriétaires terriens influents et classe guerrière traditionnelle de notre État, la $ESTATE_NOBLES$ n'a pas prospéré dernièrement. Par une combinaison de luttes intestines excessives et de manœuvres de pouvoir mal coordonnées, la $ESTATE_NOBLES$ a perdu de l'influence à [Root.Capital.GetCapitalName] et beaucoup se sont retirés dans leurs propriétés de campagne."
 nobles_estate_events.5.a:0 "D'accord."
 nobles_estate_events.6.t:0 "La $ESTATE_NOBLES$ exige des lois somptuaires plus strictes"
 nobles_estate_events.6.d:0 "Les vêtements coûteux, les grands banquets et les palais impressionnants sont quelques-uns des symboles les plus visibles de la $ESTATE_NOBLES$, mais le degré auquel une famille a de l'argent à dépenser pour de telles choses peut varier considérablement. Dans certains cas, la $ESTATE_BURGHERS$ de notre pays est capable de dépenser tout aussi somptueusement, sinon plus, que le noble moyen. Bien qu'il existe d'anciennes règles et traditions restreignant de telles choses pour ceux de naissance moins noble, celles-ci sont difficiles à appliquer efficacement. C'est inacceptable pour la puissante $ESTATE_NOBLES$ de notre pays qui exige maintenant que nous mettions à jour nos lois sur ce qu'un étranger peut et ne peut pas porter. Ils suggèrent maintenant un certain nombre d'amendes lourdes pour quiconque essaie de s'élever visiblement au-dessus de ses supérieurs."
 nobles_estate_events.6.d.1:0 "Les vêtements coûteux, les grands banquets et les palais impressionnants sont quelques-uns des symboles les plus visibles de la $ESTATE_NOBLES$, mais le degré auquel une famille a de l'argent à dépenser pour de telles choses peut varier considérablement. Dans certains cas, les Vaishyas de notre pays sont capables de dépenser tout aussi somptueusement, sinon plus, que le noble moyen. Bien qu'il existe d'anciennes règles et traditions restreignant de telles choses pour ceux de naissance moins noble, celles-ci sont difficiles à appliquer efficacement. C'est inacceptable pour la puissante $ESTATE_NOBLES$ de notre pays qui exige maintenant que nous mettions à jour nos lois sur ce qu'un étranger peut et ne peut pas porter. Ils suggèrent maintenant un certain nombre d'amendes lourdes pour quiconque essaie de s'élever visiblement au-dessus de ses supérieurs."
 nobles_estate_events.6.a:0 "Se plier aux souhaits de la $ESTATE_NOBLES$."
 nobles_estate_events.6.b:0 "Refuser d'obéir à la $ESTATE_NOBLES$."
 nobles_estate_events.7.t:0 "Le lever"
 nobles_estate_events.7.d:0 "Avec le temps, beaucoup des événements quotidiens dans la vie de notre [Root.Monarch.GetTitle] et de [Root.Monarch.GetHerHis] prédécesseurs sont devenus le sujet de cérémonies. Pouvoir assister à la chambre du dirigeant pendant qu'[Root.Monarch.GetSheHe] s'habille, par exemple, est considéré par beaucoup comme le meilleur moyen de gagner l'oreille de [Root.Monarch.GetTitle]. Une vie de cour élaborée limitera certainement le pouvoir de nos nobles à comploter contre nous dans leurs propriétés de campagne, mais cela pourrait aussi s'avérer assez coûteux. Leur refuser entièrement le droit de faire partie de la vie quotidienne de notre [Root.Monarch.GetTitle], en revanche, limiterait également leur influence mais la $ESTATE_NOBLES$ le ressentirait probablement amèrement."
 nobles_estate_events.7.a:0 "Gardons cela à un niveau modeste."
 nobles_estate_events.7.b:0 "Une cérémonie élaborée et longue pour les plus influents."
 nobles_estate_events.7.c:0 "Nous n'avons pas besoin de telles choses."
 nobles_estate_events.8.t:0 "Détérioration des relations avec la $ESTATE_NOBLES$"
 nobles_estate_events.8.d:0 "Les relations entre la $ESTATE_NOBLES$ et [Root.Monarch.GetTitle] ne pourraient guère être pires. Le grand sentiment de méfiance est clairement visible par la cour presque désertée à [Root.Capital.GetCapitalName] car la plupart des familles éminentes restent dans leurs manoirs de campagne. À moins que nous ne fassions quelque chose bientôt, l'autorité de l'État se détériorera dans les zones contrôlées par la $ESTATE_NOBLES$, mais toute demande de l'État sera probablement accueillie les armes à la main à ce stade."
 nobles_estate_events.8.a:0 "Les laisser tranquilles."
 nobles_estate_events.8.b:0 "Les forcer à accepter l'autorité de l'État."
 nobles_estate_events.9.t:0 "$ESTATE_NOBLES$ insubordonnée"
 nobles_estate_events.9.d:0 "Aucun de nos sujets n'est plus associé à la guerre que la $ESTATE_NOBLES$. Il y a des générations, leurs familles nous ont servis ou les États avant nous et ont gagné leur statut actuel sur le champ de bataille. Depuis lors, la plupart d'entre eux ont maintenu leurs vieilles traditions vivantes, s'entraînant pour une vie sur le terrain et créant des liens avec d'autres de la même inclination.\nL'état actuel des affaires dans notre pays, cependant, nous a laissés avec peu de membres de la $ESTATE_NOBLES$ disposés à mener nos batailles. L'insubordination est devenue répandue parmi les officiers supérieurs et nous avons de bonnes raisons de soupçonner que plus d'un espère une guerre infructueuse."
 nobles_estate_events.9.a:0 "Malheureux."
 nobles_estate_events.9.b:0 "Il est grand temps de les remplacer par des hommes de vrai talent."
 nobles_estate_events.9.c:0 "Il est grand temps de les remplacer par des hommes en qui nous pouvons avoir confiance."
 nobles_estate_events.9.dd:0 "Consultons les brahmanes, certains de ces hommes savants sont clairement aptes à diriger."
 nobles_estate_events.10.t:0 "Croissance de l'administration"
 nobles_estate_events.10.d:1 "À mesure que l'État et sa bureaucratie croissent, il y a un besoin toujours croissant de personnes pour superviser et administrer diverses terres et fonctions. La [Root.GetNobilityOrFallbackName] a traditionnellement été plus associée aux services militaires à l'État mais a de plus en plus fait comprendre qu'elle s'attend toujours à être en première ligne quand les postes gouvernementaux sont distribués. La [Root.GetBurghersOrFallbackName], en revanche, prétend que la [Root.GetNobilityOrFallbackName] considère de telles nominations comme de simples récompenses et les utilisera uniquement pour s'enrichir. Au lieu de cela, la [Root.GetBurghersOrFallbackName] argue que nous devrions nommer des hommes selon leur mérite individuel.\nLa mort inattendue d'un secrétaire de confiance a laissé un poste vacant à pourvoir au centre de ce conflit, avec la [Root.GetBurghersOrFallbackName] soutenant un candidat et la [Root.GetNobilityOrFallbackName] s'attendant à ce que nous en choisissions un autre. Bien que les deux candidats soient des hommes talentueux, cela doit être une décision politique."
 nobles_estate_events.10.d.1:0 "À mesure que l'État et sa bureaucratie croissent, il y a un besoin toujours croissant de personnes pour superviser et administrer diverses terres et fonctions. La $ESTATE_NOBLES$ a traditionnellement été plus associée aux services militaires à l'État mais a de plus en plus fait comprendre qu'elle s'attend toujours à être en première ligne quand les postes gouvernementaux sont distribués. Les Vaishyas, en revanche, prétendent que la $ESTATE_NOBLES$ considère de telles nominations comme de simples récompenses et les utilisera uniquement pour s'enrichir. Au lieu de cela, les Vaishyas arguent que nous devrions nommer des hommes selon leur mérite individuel.\nLa mort inattendue d'un secrétaire de confiance a laissé un poste vacant à pourvoir au centre de ce conflit, avec les Vaishyas soutenant un candidat et la $ESTATE_NOBLES$ s'attendant à ce que nous en choisissions un autre. Bien que les deux candidats soient des hommes talentueux, cela doit être une décision politique."
 nobles_estate_events.10.a:0 "Avec un grand pedigree viennent de grandes capacités."
 nobles_estate_events.10.b:0 "Les hommes qui se sont faits eux-mêmes sont ce dont nous avons besoin pour diriger ce pays."
 nobles_estate_events.10.c:0 "Tournons-nous plutôt vers le $ESTATE_CHURCH$."
 nobles_estate_events.10.c.2:0 "Tournons-nous plutôt vers les brahmanes."
 nobles_estate_events.10.dd:0 "Tournons-nous plutôt vers les $ESTATE_DHIMMI$."
 nobles_estate_events.11.t:0 "Tradition de service"
 nobles_estate_events.11.d:0 "La $ESTATE_NOBLES$ a une longue tradition de service à l'État, tant comme chefs militaires que, plus récemment, comme administrateurs fiables. Dans un État où la $ESTATE_NOBLES$ est aussi solidement établie et loyale que la nôtre, cela signifie que de temps en temps des nobles de grand talent et de grande loyauté émergeront pour mener le pays à la grandeur."
 nobles_estate_events.11.a:0 "Excellent !"
 nobles_estate_events.12.t:0 "Soulèvement de la $ESTATE_NOBLES$ de [Root.GetName]"
 nobles_estate_events.12.d:0 "La $ESTATE_NOBLES$ refuse d'accepter la confiscation de ses biens en [Root.GetName] et s'est soulevée en révolte contre nous !"
 nobles_estate_events.12.a:0 "D'accord."
 nobles_estate_events.13.t:0 "Loyauté vacillante de la $ESTATE_NOBLES$"
 nobles_estate_events.13.d:0 "Les bonnes relations doivent être entretenues. Alors que leurs effectifs augmentent et que certains des chefs de la $ESTATE_NOBLES$ vieillissent, nos relations chaleureuses sont devenues plus froides. Nous devons prendre des dispositions avec la génération actuelle de la $ESTATE_NOBLES$ pour être sûrs de leur loyauté."
 nobles_estate_events.13.a:0 "D'accord."
 burghers_estate_events.1.t:0 "Avancée des classes marchandes"
 burghers_estate_events.1.d:0 "Le statut de la $ESTATE_BURGHERS$ ne repose pas sur les mêmes vieilles traditions que celui de la $ESTATE_NOBLES$ ou du $ESTATE_CHURCH$. Au lieu de cela, ils ont dû faire leur propre fortune en travaillant avec diligence puis en risquant le profit pour à nouveau étendre leurs affaires. En règle générale, cependant, cela a très bien fonctionné pour eux dernièrement. Bien que moins prestigieux, le commerce est à bien des égards l'épine dorsale de notre économie et par leur contrôle des pièces, la $ESTATE_BURGHERS$ a réussi à augmenter son pouvoir sur notre pays."
 burghers_estate_events.1.a:0 "D'accord."
 burghers_estate_events.2.t:0 "Barons brigands"
 burghers_estate_events.2.d:0 "La $ESTATE_BURGHERS$ est préoccupée par la grande influence de la $ESTATE_NOBLES$ dans notre État. Elle prétend que de nombreux membres inférieurs de la noblesse ignorent la paix et la loi du pays, utilisant leur position de pouvoir et les terres qu'ils détiennent pour prélever des péages et taxes déraisonnables sur les commerçants de passage. Certains sont même réputés attaquer et tendre des embuscades aux marchands, les volant ou leur extorquant leur argent.\nDes représentants de la $ESTATE_BURGHERS$ [Root.GetAdjective] prétendent maintenant que le développement économique de notre pays est freiné par ces excès. La $ESTATE_NOBLES$, en revanche, argue qu'elle ne fait que facturer raisonnablement pour l'utilisation de leurs routes. Certains sont prêts à donner à l'État une partie de ce qu'ils prélèvent."
 burghers_estate_events.2.a:0 "Ils ne prennent que ce qui est leur droit."
 burghers_estate_events.2.b:0 "Nous devons freiner de tels excès !"
 burghers_estate_events.3.t:0 "Déclin des classes marchandes"
 burghers_estate_events.3.d:0 "Sans les anciens privilèges et pedigrees des autres factions, le statut et l'influence de la $ESTATE_BURGHERS$ sont rarement aussi sûrs que ceux de ceux qui sont nés au pouvoir. Dernièrement, une combinaison d'infortune financière et d'ambitions politiques mal dirigées a résulté en une perte de pouvoir et d'influence pour la $ESTATE_BURGHERS$ de [Root.GetName]."
 burghers_estate_events.3.a:0 "D'accord."
 burghers_estate_events.4.t:1 "[growing_city.GetCapitalName] demande des privilèges"
 burghers_estate_events.4.d:1 "La $ESTATE_BURGHERS$ de [growing_city.GetCapitalName], une cité commerciale de plus en plus importante, a approché [Root.Monarch.GetTitle] aujourd'hui demandant que lui soient accordés des privilèges pour pouvoir faire prospérer la région sans l'entrave de beaucoup de nos taxes normales. Si nous leur fournissons ces moyens de croître, ils nous assurent que l'économie de la zone s'améliorerait rapidement, résultant en plus de richesse pour l'État."
 burghers_estate_events.4.a:0 "Accepter la pétition."
 burghers_estate_events.4.b:0 "Rejeter la pétition."
 burghers_estate_events.5.t:0 "Prix immoraux"
 burghers_estate_events.5.d:0 "Les prix du grain sont notoirement instables ; tout, du temps là où il est cultivé aux incidents nuisant à sa distribution, peut soudainement faire monter le prix significativement. En raison d'un tel changement soudain, il y a actuellement une pénurie aiguë de grain dans beaucoup de nos grandes cités. Désespérés de se nourrir, le peuple dirige sa colère contre les marchands qui, selon lui, profitent de cette situation pour surfacturer leurs marchandises. Les marchands eux-mêmes, en revanche, prétendent que c'est un résultat naturel de la pénurie et qu'il n'y a tout simplement pas assez de pain pour tout le monde."
 burghers_estate_events.5.a:0 "Forcer les marchands à baisser leurs prix."
 burghers_estate_events.5.b:0 "Nous ne devrions pas nous mêler de ces choses."
 burghers_estate_events.5.c:0 "Nous devons payer et distribuer le pain qu'il y a."
 burghers_estate_events.6.t:0 "Autorité parallèle"
 burghers_estate_events.6.d:1 "La $ESTATE_BURGHERS$ n'est pas la seule autorité au sein de ses cités ; le $ESTATE_CHURCH$ a également une forte présence dans la plupart des grandes cités remontant à leur fondation initiale. Des conflits surgissent parfois quand les conseils de la $ESTATE_BURGHERS$ mettent en œuvre des règles que le $ESTATE_CHURCH$ désapprouve.\nDe tels conflits sont devenus de plus en plus courants et des membres du $ESTATE_CHURCH$ agissent ouvertement en défiance des diverses règles que la $ESTATE_BURGHERS$ a convenues dans ses cités. Des délégués de diverses cités dominées par la $ESTATE_BURGHERS$ nous exhortent maintenant à clarifier la situation."
 burghers_estate_events.6.a:0 "Prendre le parti de la $ESTATE_BURGHERS$."
 burghers_estate_events.6.b:0 "Prendre le parti du $ESTATE_CHURCH$."
 burghers_estate_events.7.t:0 "Privilèges étendus pour la $ESTATE_BURGHERS$"
 burghers_estate_events.7.d:0 "La $ESTATE_BURGHERS$ estime qu'elle est indûment taxée et réglementée compte tenu de la grande importance de son travail pour notre pays. Les péages, taxes et divers tarifs la retiennent de pouvoir accomplir des choses encore plus grandes et elle n'hésitera pas à utiliser toute son influence pour les abolir."
 burghers_estate_events.7.a:0 "Supprimons ces obstacles !"
 burghers_estate_events.7.b:0 "La $ESTATE_BURGHERS$ doit connaître sa place !"
 burghers_estate_events.8.t:0 "Politiques commerciales préjudiciables"
 burghers_estate_events.8.d:0 "Les intérêts de familles marchandes éminentes sont lésés par nos politiques commerciales répressives envers d'autres pays. La $ESTATE_BURGHERS$ soutient ces familles et nous a maintenant pétitionnés pour les compenser en ouvrant au moins quelques autres restrictions sur le commerce pour compenser leur perte de revenus."
 burghers_estate_events.8.a:0 "Nous devons soutenir la $ESTATE_BURGHERS$."
 burghers_estate_events.8.b:0 "Nous ne pouvons pas laisser notre politique commerciale être décidée par ces colporteurs."
 burghers_estate_events.9.t:0 "Industrie à domicile"
 burghers_estate_events.9.d:1 "Le développement économique n'est pas toujours sans conflit. Il semble que de riches marchands dans certaines de nos cités dominées par la $ESTATE_BURGHERS$ aient tenté de contourner divers privilèges des guildes en sous-traitant le travail aux foyers de familles vivant hors de la cité. Le fait que ce « système de sous-traitance » ait été une stratégie très profitable ne fait qu'enflammer davantage la colère des artisans de la cité, qui estiment que leurs droits anciens ont été piétinés et que les prix soigneusement gérés de leurs produits en souffriront. Les artisans [Root.GetAdjective] se tournent maintenant vers [Root.Monarch.GetTitle] pour défendre leurs privilèges car le conseil de la cité a été incapable d'éliminer la concurrence de l'extérieur de la cité."
 burghers_estate_events.9.a:0 "Nous ne pouvons pas nous mettre en travers du progrès."
 burghers_estate_events.9.b:0 "Nous devons sauvegarder les privilèges des guildes."
 burghers_estate_events.10.t:0 "Mobilité sociale"
 burghers_estate_events.10.d:0 "Le pouvoir croissant de la $ESTATE_BURGHERS$ a conduit des individus de ses rangs à chercher fortune dans des domaines traditionnellement dominés par d'autres groupes. Les fils de familles de moyenne à faible importance de la $ESTATE_BURGHERS$ ont maintenant l'éducation et l'ambition pour rivaliser avec les classes plus privilégiées et en conséquence un nombre croissant d'entre eux sont maintenant employés comme administrateurs, avocats, officiers ainsi que dans d'autres postes traditionnellement dominés par un autre état. La $ESTATE_BURGHERS$ estime toujours qu'elle est indûment freinée par les droits et privilèges archaïques d'une autre ère mais ses adversaires sont de plus en plus las de l'actuelle mobilité sociale « non naturelle ».\nÀ moins que nous ne fassions quelque chose, nous risquons de perdre le soutien des classes privilégiées, mais si nous retirons notre soutien à la $ESTATE_BURGHERS$ à ce stade, cela aura probablement de graves effets sur nos relations avec elle."
 burghers_estate_events.10.a:0 "Nous ne devons pas nous mettre en travers de ces hommes nouveaux."
 burghers_estate_events.10.b:0 "Nous devons protéger les droits anciens des autres États."
 burghers_estate_events.11.t:0 "Croissance de l'économie"
 burghers_estate_events.11.d:0 "Notre politique de coopération avec la $ESTATE_BURGHERS$ a porté ses fruits sous forme de développement économique dans de nombreux domaines. Les cités de la $ESTATE_BURGHERS$ prospèrent et notre influence dans le commerce international croît rapidement."
 burghers_estate_events.11.a:0 "Excellent."
 burghers_estate_events.12.t:0 "Les risques du commerce"
 burghers_estate_events.12.d:0 "Le commerce sur de longues distances peut être risqué, bien que profitable. Le temps, les brigands et les pirates restent une menace sur terre comme sur l'eau. Normalement, la $ESTATE_BURGHERS$ peut faire face à un certain nombre de mésaventures et a ses propres moyens de se protéger et d'assurer sa cargaison. Dernièrement, cependant, les choses ont mal tourné pour un grand nombre de familles marchandes et certaines risquent la faillite. Il serait peut-être prudent d'offrir une compensation financière pour les remettre sur pied."
 burghers_estate_events.12.a:0 "Compenser les marchands."
 burghers_estate_events.12.b:0 "Ils savaient dans quoi ils s'engageaient."
 burghers_estate_events.13.t:0 "Urbanisation"
 burghers_estate_events.13.d:0 "Bien que seule une petite partie de notre population vive dans les cités, la prospérité croissante de la $ESTATE_BURGHERS$ attire un nombre croissant de personnes de la campagne. Certaines cités croissent si vite que les problèmes existants en termes d'assainissement et de surpeuplement sont passés de troublants à catastrophiques selon la $ESTATE_BURGHERS$. Les pauvres se sont installés hors des murs de la cité où des faubourgs insalubres ont surgi et où la maladie prospère.\nLa $ESTATE_BURGHERS$ trouve la situation intolérable et demande maintenant que l'État intervienne pour fournir de l'aide tant en termes de ressources que d'application des règles hors des murs. Ce n'est qu'ainsi que cette urbanisation croissante peut réellement mener à quelque chose de bon."
 burghers_estate_events.13.a:0 "Tenter d'améliorer les conditions."
 burghers_estate_events.13.b:0 "Ce n'est rien d'inhabituel, la $ESTATE_BURGHERS$ peut gérer cela."
 burghers_estate_events.14.t:0 "Politique économique"
 burghers_estate_events.14.d:0 "À mesure que la $ESTATE_BURGHERS$ gagne en pouvoir, ses appels à moins de réglementations commerciales et de taxes deviennent de plus en plus fréquents. Beaucoup estiment que notre pays a une politique commerciale démodée et répressive et que nous bénéficierions de la réduction du nombre de taxes et péages qui entravent le commerce."
 burghers_estate_events.14.a:0 "Réduire le mercantilisme."
 burghers_estate_events.14.b:0 "Refuser de changer la politique commerciale."
 burghers_estate_events.15.t:0 "Protestations parmi la $ESTATE_BURGHERS$"
 burghers_estate_events.15.d:0 "La relation continuellement détériorée entre l'État et la $ESTATE_BURGHERS$ a atteint le point où il y a peu de confiance du tout pour [Root.Monarch.GetTitle] dans nos grandes cités. Chaque initiative de l'État est soupçonnée de viser à contenir le pouvoir de la $ESTATE_BURGHERS$ et l'évasion fiscale est devenue répandue.\nOn en est maintenant au point où un certain nombre de guildes ont commencé une grève générale, exigeant plus d'autonomie et de liberté vis-à-vis de l'État oppressant."
 burghers_estate_events.15.a:0 "Ils plaisantent !"
 burghers_estate_events.15.b:0 "Céder à leurs demandes."
 burghers_estate_events.16.t:0 "Révolte de la $ESTATE_BURGHERS$ de [Root.GetName]"
 burghers_estate_events.16.d:0 "Consternée par la perte de ses privilèges, la $ESTATE_BURGHERS$ de la province de [Root.GetName] a pris les armes contre nous !"
 burghers_estate_events.16.a:0 "D'accord."
 burghers_estate_events.17.t:0 "Loyauté vacillante de la $ESTATE_BURGHERS$"
 burghers_estate_events.17.d:0 "Les bonnes relations doivent être entretenues. Alors que leurs effectifs augmentent et que certains des chefs de la $ESTATE_BURGHERS$ vieillissent, nos relations chaleureuses sont devenues plus froides. Nous devons prendre des dispositions avec la génération actuelle des chefs de la $ESTATE_BURGHERS$ pour être sûrs de leur loyauté."
 burghers_estate_events.17.a:0 "D'accord."
 dhimmi_estate_events.1.t:0 "Qadi trop zélé"
 dhimmi_estate_events.1.d:0 "Le Qadi dans l'une de nos grandes cités a utilisé son influence pour interpréter la loi islamique ainsi que les édits de notre [Root.Monarch.GetTitle] un peu trop zélément. Non content de maintenir le statu quo dans la cité largement non-musulmane, il a essayé de forcer activement les non-croyants à se convertir tout en fermant systématiquement leurs centres de culte.\nAprès le suicide récent d'un commerçant converti de force, les non-musulmans quittent maintenant la cité en masse pour s'installer quelque part de plus accueillant. Bien que même le $ESTATE_CHURCH$ semble largement trouver ces actions trop extrêmes, il considérerait probablement toute action prise contre le Qadi comme bien pire."
 dhimmi_estate_events.1.a:0 "Soutenir le Qadi."
 dhimmi_estate_events.1.b:0 "Remplacer le Qadi et essayer de faire amende honorable."
 dhimmi_estate_events.2.t:0 "Demandes d'allègement des taxes sur les païens"
 dhimmi_estate_events.2.d:0 "Alors que notre [Root.Monarch.GetTitle] se rendait à la procession hebdomadaire à la mosquée royale, un grand nombre de $ESTATE_DHIMMI$ s'était rassemblé devant le bâtiment, empêchant le passage de notre [Root.Monarch.GetTitle] et exigeant que certaines des taxes discriminatoires contre les non-musulmans comme les taxes sur les temples ou les pèlerinages soient révoquées."
 dhimmi_estate_events.2.a:0 "Piétiner les dissidents !"
 dhimmi_estate_events.2.b:0 "Révoquer certaines des taxes !"
 dhimmi_estate_events.3.t:0 "Pragmatisme religieux"
 dhimmi_estate_events.3.d:0 "Bien que tout le monde ne l'apprécie pas, les non-musulmans de notre royaume ont gagné en influence au cours des dernières années. Des membres des Dhimmi sont fréquemment vus même parmi les guildes commerciales les plus importantes de notre pays et beaucoup servent comme administrateurs dans nos provinces ou ont été autorisés à conserver leurs titres héréditaires."
 dhimmi_estate_events.3.a:0 "D'accord."
 dhimmi_estate_events.4.t:0 "Marginalisation des Dhimmi"
 dhimmi_estate_events.4.d:0 "Bien qu'ils constituent une partie importante de notre société, les non-musulmans ont récemment perdu du terrain face à d'autres groupes. Ils sont régulièrement ignorés pour tout type de service gouvernemental, doivent payer un certain nombre de taxes discriminatoires et voient souvent des accords commerciaux aller à leurs concurrents musulmans."
 dhimmi_estate_events.4.a:0 "D'accord."
 dhimmi_estate_events.5.t:0 "Les $ESTATE_DHIMMI$ et la $ESTATE_NOBLES$"
 dhimmi_estate_events.5.d:0 "Beaucoup parmi la $ESTATE_NOBLES$ musulmane ont exprimé des plaintes sur ce qu'ils estiment être un favoritisme injuste et inéquitable envers les infidèles dans notre gouvernement. Ayant cherché le soutien du $ESTATE_CHURCH$, ils prétendent maintenant que nous dirigeons notre pays contrairement aux coutumes islamiques établies et que nous devons nous assurer que les infidèles soient tenus à l'écart des positions d'influence.\nLa construction d'un nouveau sanctuaire dans une province largement dominée par les $ESTATE_DHIMMI$, entièrement financée par des nobles et marchands locaux, a encore aggravé la situation, le $ESTATE_CHURCH$ et la $ESTATE_NOBLES$ exigeant que nous démolissions le bâtiment sacré et remettions les infidèles à leur place."
 dhimmi_estate_events.5.a:0 "Nous devons écouter la $ESTATE_NOBLES$."
 dhimmi_estate_events.5.b:0 "Soutenir les $ESTATE_DHIMMI$."
 dhimmi_estate_events.6.t:0 "Administrateurs parmi les $ESTATE_DHIMMI$"
 dhimmi_estate_events.6.d:0 "Traditionnellement, les $ESTATE_DHIMMI$ sont exclus du service dans beaucoup des postes supérieurs de l'administration. Au lieu de cela, ceux-ci sont généralement donnés à des lettrés musulmans fidèles. À mesure que notre appareil gouvernemental croît, cependant, il a une soif constante de plus d'hommes savants et parmi les $ESTATE_DHIMMI$ il y en a beaucoup qui correspondraient à cette description. Bien que certains considèrent cela comme hétérodoxe, nous pourrions probablement grandement bénéficier du recrutement parmi leurs rangs."
 dhimmi_estate_events.6.a:0 "Mettons ces hommes savants à bon usage."
 dhimmi_estate_events.6.b:0 "Nous ne pouvons pas risquer leurs capacités d'assimilation."
 dhimmi_estate_events.7.t:0 "Brigands infidèles"
 dhimmi_estate_events.7.d:0 "Les relations rapidement détériorées entre l'État et les $ESTATE_DHIMMI$ ont résulté en une rupture totale des relations locales dans certaines zones. Les collecteurs d'impôts racontent des histoires de convois disparaissant sur la route entre les zones dominées par les Dhimmi, avec ce qui avait été collecté. Dans les cités, les prêtres et les chefs des $ESTATE_DHIMMI$ agitent contre nous et il est devenu de plus en plus difficile de suivre nos sujets même à l'intérieur des murs. Même ceux opposés à l'influence des $ESTATE_DHIMMI$ constatent maintenant qu'ils remettent en question notre capacité à gouverner."
 dhimmi_estate_events.7.a:0 "Infidèles indignes de confiance !"
 dhimmi_estate_events.7.b:0 "Faire des concessions pour atténuer la situation."
 dhimmi_estate_events.8.t:0 "Richesses des $ESTATE_DHIMMI$"
 dhimmi_estate_events.8.d:0 "Dans tout le monde islamique, le terme $ESTATE_DHIMMI$ en est venu à être appliqué à une grande variété de personnes disparates. La définition traditionnelle et plus restrictive de seulement les chrétiens et les juifs a été rapidement abandonnée par les États musulmans où les populations majoritaires sont hindoues ou bouddhistes. Indépendamment de qui est inclus, les $ESTATE_DHIMMI$ reçoivent une protection en échange d'être exemptés de beaucoup des lois du royaume.\nBien que cela puisse sembler malheureux pour eux, c'est assez fortuné pour nous en ce moment ; alors que l'économie générale se remet encore des guerres récentes, de nombreuses familles dhimmi détiennent encore d'assez grandes réserves de liquidités et elles n'ont aucune loi ou règle leur interdisant d'investir ou de prêter à d'autres."
 dhimmi_estate_events.8.a:0 "Convaincre les $ESTATE_DHIMMI$ d'investir dans la reprise économique."
 dhimmi_estate_events.8.b:0 "Nous ne devons pas nous rendre dépendants des infidèles."
 dhimmi_estate_events.9.t:0 "Révolte des Dhimmi de [Root.GetName]"
 dhimmi_estate_events.9.d:0 "Désespérés de voir leurs privilèges rétablis, les Dhimmi de [Root.GetName] ont pris les armes contre nous !"
 dhimmi_estate_events.9.a:0 "D'accord."
 dhimmi_estate_events.10.t:0 "Loyauté vacillante des $ESTATE_DHIMMI$"
 dhimmi_estate_events.10.d:0 "Les bonnes relations doivent être entretenues. Alors que leurs effectifs augmentent et que certains des chefs des $ESTATE_DHIMMI$ vieillissent, nos relations chaleureuses sont devenues plus froides. Nous devons prendre des dispositions avec la génération actuelle des chefs des $ESTATE_DHIMMI$ pour être sûrs de leur loyauté."
 dhimmi_estate_events.10.a:0 "D'accord."
 estate_disasters.1.t:0 "La $ESTATE_NOBLES$ s'empare du pouvoir"
 estate_disasters.1.d:0 "$MONARCH$ a laissé la $ESTATE_NOBLES$ de $COUNTRY$ devenir trop puissante et maintenant elle a fait son mouvement. Exerçant le large éventail de privilèges et de droits qui lui ont été accordés, elle a effectivement saisi les rênes du gouvernement et fait de $MONARCHTITLE$ guère plus que sa marionnette."
 estate_disasters.1.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.1.a.tt:0 "[Root.GetName] sera maintenant contrôlé par la §YNoblesse§! jusqu'à ce que la décision §Y« Réduire la noblesse »§! soit prise."
 estate_disasters.2.t:1 "La [Root.GetNobilityOrFallbackName] réduite"
 estate_disasters.2.d:1 "Nous avons réussi à limiter l'influence de la [Root.GetNobilityOrFallbackName] à des niveaux tolérables. Les privilèges de la [Root.GetNobilityOrFallbackName] ont été révoqués et ses propriétés réduites. La [Root.GetNobilityOrFallbackName] elle-même a accepté à contrecœur que $MONARCHTITLE$ est le chef incontesté de ce pays et le sceau autrefois utilisé par la [Root.GetNobilityOrFallbackName] à la place de [Root.Monarch.GetHerHis] signature a été détruit."
 estate_disasters.2.a:0 "$MONARCHTITLE$ est de nouveau aux commandes."
 estate_disasters.3.t:0 "Le $ESTATE_CHURCH$ s'empare du pouvoir"
 estate_disasters.3.d:0 "$MONARCH$ a laissé le $ESTATE_CHURCH$ de $COUNTRY$ devenir trop puissant et maintenant il a fait son mouvement. Tout en maintenant le peuple en ligne par ses liens avec le divin, le $ESTATE_CHURCH$ a utilisé chacun des nombreux moyens à sa disposition pour saisir les rênes du gouvernement. Bien qu'encore dirigeant de nom, notre $MONARCHTITLE$ n'est maintenant guère plus que sa marionnette."
 estate_disasters.3.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.3.a.tt:0 "[Root.GetName] sera maintenant contrôlé par le §YClergé§! jusqu'à ce que la décision §Y« Réduire le clergé »§! soit prise."
 estate_disasters.4.t:0 "Le [Root.GetChurchOrFallbackName] réduit"
 estate_disasters.4.d:0 "Utilisant un large éventail de mesures, $MONARCHTITLE$ a réussi à dépouiller le [Root.GetChurchOrFallbackName] des nombreuses fonctions qu'il détenait et des propriétés sous son contrôle. L'autorité sur le royaume temporel repose à nouveau entre les mains de $MONARCH$."
 estate_disasters.4.a:0 "$MONARCHTITLE$ est de nouveau aux commandes."
 estate_disasters.5.t:0 "La $ESTATE_BURGHERS$ s'empare du pouvoir"
 estate_disasters.5.d:0 "$MONARCH$ a laissé la $ESTATE_BURGHERS$ de $COUNTRY$ devenir trop puissante et maintenant elle a fait son mouvement. Faisant usage de ses nombreux privilèges durement gagnés ainsi que des nombreuses dettes qui lui sont dues, elle a effectivement saisi les rênes du gouvernement et fait de $MONARCHTITLE$ guère plus que sa marionnette."
 estate_disasters.5.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.5.a.tt:0 "[Root.GetName] sera maintenant contrôlé par la §YBourgeoisie§! jusqu'à ce que la décision §Y« Réduire la bourgeoisie »§! soit prise."
 estate_disasters.6.t:0 "La [Root.GetBurghersOrFallbackName] réduite"
 estate_disasters.6.d:0 "Nous avons finalement réussi à briser notre dépendance envers la [Root.GetBurghersOrFallbackName], reprenant le contrôle de toutes les fonctions importantes de l'État et réduisant ces colporteurs à leur juste place à l'intérieur des murs de la cité."
 estate_disasters.6.a:0 "$MONARCHTITLE$ est de nouveau aux commandes."
 estate_disasters.7.t:0 "La $ESTATE_NOMADIC_TRIBES$ s'empare du pouvoir"
 estate_disasters.7.d:0 "$MONARCH$ a laissé la $ESTATE_NOMADIC_TRIBES$ de $COUNTRY$ devenir trop puissante et maintenant elle a fait son mouvement. Utilisant l'influence qu'elle avait déjà sur notre État en termes de contrôle sur tout, de la collecte des impôts à la direction et au recrutement de nos armées, elle a effectivement saisi les rênes du gouvernement et fait de $MONARCHTITLE$ guère plus que sa marionnette."
 estate_disasters.7.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.7.a.tt:0 "[Root.GetName] sera maintenant contrôlé par les §YTribus§! jusqu'à ce que la décision §Y« Réduire les tribus »§! soit prise."
 estate_disasters.8.t:0 "La [Root.GetTribesOrFallbackName] réduite"
 estate_disasters.8.d:0 "Après une lutte ardue, la [Root.GetTribesOrFallbackName] a finalement été remise au pas. [Root.Monarch.GetTitle] contrôle maintenant assez de terres, d'hommes et d'institutions pour à nouveau se dire le dirigeant de notre peuple."
 estate_disasters.8.a:0 "$MONARCHTITLE$ est de nouveau aux commandes."
 estate_disasters.9.t:0 "Les Dhimmi se libèrent"
 estate_disasters.9.d:0 "Les chefs $ESTATE_DHIMMI$ en sont venus à exercer une autorité si étendue sur de vastes zones de notre État qu'on en est maintenant au point où $MONARCHTITLE$ a dû accepter qu'[Root.Monarch.GetSheHe] n'a plus aucun contrôle pratique sur eux. Avec le couronnement d'un chef à eux, la transition est complète et notre perte d'autorité sur les $ESTATE_DHIMMI$ totale."
 estate_disasters.9.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.10.t:1 "Les Orachav se libèrent"
 estate_disasters.10.d:0 "$MONARCH$ a laissé les Orachav de $COUNTRY$ devenir trop puissants et maintenant ils ont fait leur mouvement. Leur grande influence sur les steppes ainsi que sur de nombreuses affaires à [Root.Owner.Capital.GetCapitalName] leur a permis de se préparer à se séparer en un État entièrement nouveau."
 estate_disasters.10.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.10.b:0 "Les steppes m'appellent..."
 estate_disasters.11.t:0 "Les Marathes se libèrent"
 estate_disasters.11.d:0 "Les chefs marathes en sont venus à exercer une autorité si étendue sur de vastes zones de notre État qu'on en est maintenant au point où $MONARCHTITLE$ a dû accepter qu'[Root.Monarch.GetSheHe] n'a plus aucun contrôle pratique sur eux. Avec le couronnement d'un chef à eux, la transition est complète et notre perte d'autorité sur les Marathes totale."
 estate_disasters.11.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.11.b:0 "L'avenir est avec eux !"
 estate_disasters.12.t:0 "Les brahmanes s'emparent du pouvoir"
 estate_disasters.12.d:0 "$MONARCH$ a laissé les brahmanes de $COUNTRY$ devenir trop puissants et maintenant ils ont fait leur mouvement. Tout en maintenant le peuple en ligne par leurs liens avec le divin, les brahmanes ont utilisé chacun des nombreux moyens à leur disposition pour saisir les rênes du gouvernement. Bien qu'encore dirigeant de nom, notre $MONARCHTITLE$ n'est maintenant guère plus que leur marionnette."
 estate_disasters.12.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.12.a.tt:0 "[Root.GetName] sera maintenant contrôlé par les §YBrahmanes§! jusqu'à ce que la décision §Y« Réduire les brahmanes »§! soit prise."
 estate_disasters.13.t:0 "Les brahmanes réduits"
 estate_disasters.13.d:0 "Utilisant un large éventail de mesures, $MONARCHTITLE$ a réussi à dépouiller les brahmanes des nombreuses fonctions qu'ils détenaient et des propriétés sous leur contrôle. L'autorité sur le royaume temporel repose à nouveau entre les mains de $MONARCH$."
 estate_disasters.13.a:0 "$MONARCHTITLE$ est de nouveau aux commandes."
 estate_disasters.14.t:0 "Les Vaishyas s'emparent du pouvoir"
 estate_disasters.14.d:0 "$MONARCH$ a laissé les Vaishyas de $COUNTRY$ devenir trop puissants et maintenant ils ont fait leur mouvement. Faisant usage de leurs nombreux privilèges durement gagnés ainsi que des nombreuses dettes qui leur sont dues, ils ont effectivement saisi les rênes du gouvernement et fait de $MONARCHTITLE$ guère plus que leur marionnette."
 estate_disasters.14.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.14.a.tt:0 "[Root.GetName] sera maintenant contrôlé par les §YVaishyas§! jusqu'à ce que la décision §Y« Réduire les Vaishyas »§! soit prise."
 estate_disasters.15.t:0 "Les Vaishyas réduits"
 estate_disasters.15.d:0 "Nous avons finalement réussi à briser notre dépendance envers les Vaishyas, reprenant le contrôle de toutes les fonctions importantes de l'État et réduisant ces colporteurs à leur juste place à l'intérieur des murs de la cité."
 estate_disasters.15.a:0 "$MONARCHTITLE$ est de nouveau aux commandes."
 estate_disasters.16.t:0 "Les Rajputs se libèrent"
 estate_disasters.16.d:0 "Les chefs rajputs en sont venus à exercer une autorité si étendue sur de vastes zones de notre État qu'on en est maintenant au point où $MONARCHTITLE$ a dû accepter qu'[Root.Monarch.GetSheHe] n'a plus aucun contrôle pratique sur eux. Avec le couronnement d'un chef à eux, la transition est complète et notre perte d'autorité sur les Rajputs totale."
 estate_disasters.16.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.17.t:0 "Puissante société jaïn"
 estate_disasters.17.d:0 "$MONARCH$ a laissé les Jaïns de $COUNTRY$ devenir trop puissants et maintenant ils ont fait leur mouvement. Faisant usage de leurs nombreux privilèges durement gagnés ainsi que des nombreuses dettes qui leur sont dues, ils ont effectivement saisi les rênes du gouvernement et fait de $MONARCHTITLE$ guère plus que leur marionnette."
 estate_disasters.17.a:0 "Nous aurions dû voir cela venir..."
 estate_disasters.17.a.tt:0 "[Root.GetName] sera maintenant contrôlé par les §YJaïns§! jusqu'à ce que la décision §Y« Réduire les Jaïns »§! soit prise."
 estate_disasters.18.t:0 "Les Jaïns réduits"
 estate_disasters.18.d:0 "Nous avons finalement réussi à briser notre dépendance envers les Jaïns, reprenant le contrôle de toutes les fonctions importantes de l'État et les réduisant à leur juste place à l'intérieur des murs de la cité."
