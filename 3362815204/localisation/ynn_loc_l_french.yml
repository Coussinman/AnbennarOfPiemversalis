 #Barge Events
 ynn_barges.1.t:0 "Le Voyage Ultime"
 ynn_barges.1.d1:0 "Pendant des années, $PREVIOUS_MONARCH$ a régné sur notre nation. Pour le meilleur ou pour le pire, ce souverain a guidé notre peuple vers l'avenir. Aujourd'hui, cependant, son voyage en tant que dirigeant s'achève, et son voyage vers l'au-delà, son périple le long du sacré Ynn, commence. Pour que ce voyage soit couronné de succès, nous devons assurer un transport approprié, afin de préserver notre souverain de toute impureté flottant dans le Fleuve."
 ynn_barges.1.d2:0 "Un ancien [Root.Monarch.GetTitle] est décédé. Pour le meilleur ou pour le pire, il a guidé notre peuple vers l'avenir, et a continué à diriger en tant que chef de sa famille une fois son mandat achevé. Aujourd'hui, cependant, son voyage en tant que dirigeant s'achève, et son voyage vers l'au-delà, son périple le long du sacré Ynn, commence. Pour que ce voyage soit couronné de succès, nous devons assurer un transport approprié, afin de préserver notre souverain de toute impureté flottant dans le Fleuve."
 ynn_barges.1.a:0 "Construire une barge opulente"
 ynn_barges.1.b:0 "Construire une barge élégante"
 ynn_barges.1.c:0 "Construire une barge simple"
 ynn_barges.1.e:0 "Le jeter dans le Fleuve"
 ynn_barges.1.f:0 "Sa famille organisera ses funérailles comme pour tout autre défunt"

 ynn_barges.2.t:0 "Les Morts Demandent Passage"
 ynn_barges.2.d1:0 "La barge du monarque défunt de [From.GetName] est arrivée à notre Grand Barrage Ynnique de [Root.GetName]. S'ils doivent poursuivre leur voyage sur l'Ynn, c'est à nous d'en décider."
 ynn_barges.2.d2:0 "La barge de notre monarque défunt $PREVIOUS_MONARCH$ est arrivée à notre Grand Barrage Ynnique de [Root.GetName]. Les habitants observent avec la révérence due tandis que la barge flotte vers l'avant, approchant des portes du barrage."
 ynn_barges.2.a:0 "Laissons-les passer"
 ynn_barges.2.b:0 "Exigeons le péage"
 ynn_barges.2.c:0 "Renvoyons-les"
 ynn_barges.2.e:0 "Laissons passer notre monarque"

 ynn_barges.3.t:0 "[From.Owner.GetName] exige un péage"
 ynn_barges.3.d:0 "Le [From.Owner.Monarch.GetTitle] de [From.Owner.GetName], détenteur du Grand Barrage Ynnique de [From.GetName], exige un péage de notre nation si notre monarque doit passer. Bien que beaucoup n'y voient guère plus qu'une extorsion, si nous souhaitons conduire dignement $PREVIOUS_MONARCH$ jusqu'à la Cascade Divine, nous devrons peut-être payer. Cependant, il reste toujours la possibilité de saborder la barge, et de laisser notre monarque passer avec les roturiers, si nécessaire."
 ynn_barges.3.c:0 "Nous ouvrirons le barrage nous-mêmes"
 ynn_barges.3.a:0 "Soit"
 ynn_barges.3.b:0 "Sabordons la barge"

 ynn_barges.4.t:0 "Le Paiement Arrive"
 ynn_barges.4.d:0 "Une autre barge en provenance de [From.GetName] est arrivée, flottant bas sur l'eau en raison de sa cargaison : une quantité massive de pièces de monnaie. Il semble que notre péage ait été acquitté."
 ynn_barges.4.a:0 "Laissons passer leur monarque défunt"

 ynn_barges.5.t:0 "Aucune Réponse"
 ynn_barges.5.d:0 "Malgré notre demande tout à fait raisonnable au nouveau dirigeant de [From.GetName], celui-ci n'a envoyé aucun fonds. Au lieu de cela, il semble qu'ils aient sabordé leur propre barge, laissant leur monarque flotter avec le reste des morts par la Porte des Roturiers."
 ynn_barges.5.a:0 "Voilà qui règle la question"

 ynn_barges.6.t:0 "Notre Barge n'a Pas Réussi"
 ynn_barges.6.d:0 "Notre barge étant arrêtée, nous avons été contraints à un dernier recours : laisser notre monarque flotter seul le long du Fleuve. Bien qu'il coure le risque d'être souillé par les âmes maléfiques qui pourraient flotter dans le Fleuve, au moins de cette façon il atteindra l'au-delà, pour le meilleur ou pour le pire."
 ynn_barges.6.a:0 "Puisse-t-il avoir plus de chance dans l'autre monde"

 ynn_barges.7.t:0 "[From.Owner.GetName] Empêche le Passage"
 ynn_barges.7.d:0 "Il semble que le [From.Owner.Monarch.GetTitle] de [From.Owner.GetName] ait arrêté notre barge dans son saint voyage, ne nous laissant d'autre choix que de saborder la barge et de faire courir à notre souverain le risque d'être souillé. Il semble que nous ne puissions rien y faire, et leur dirigeant ne semble pas avoir l'intention de changer d'avis."
 ynn_barges.7.a:0 "[From.Owner.GetName] paiera pour cela"

 ynn_barges.8.t:0 "Un Autre Monarque Se Présente à Nous"
 ynn_barges.8.d1:0 "Le Grand Prêtre de Chrempredpadh recevra bientôt une autre barge passant par [Root.GetName], transportant le monarque défunt de [From.GetName] alors qu'elle atteint la fin de son saint périple."
 ynn_barges.8.d2:0 "Le Grand Prêtre de Chrempredpadh recevra bientôt la barge transportant notre monarque défunt $PREVIOUS_MONARCH$ alors qu'elle atteint la fin de son saint périple."
 ynn_barges.8.a:0 "Laissons-la passer"
 ynn_barges.8.b:0 "Préparons un modeste rituel"
 ynn_barges.8.c:0 "Organisons une grande cérémonie"

 ynn_barges.9.t:0 "Repos Éternel"
 ynn_barges.9.d:0 "La barge transportant notre monarque a atteint la fin de l'Ynn, et, à la Cascade Divine, notre monarque passe dans l'autre vie, pur de toute souillure de ce royaume mortel. Son voyage achevé, un nouveau voyage, celui de [Root.Monarch.GetName], peut enfin commencer."
 ynn_barges.9.a:0 "D'hier vers demain"

 ynn_barges.10.t:0 "[From.GetName] Force le Passage"
 ynn_barges.10.d:0 "Malgré notre demande tout à fait raisonnable au nouveau dirigeant de [From.GetName], celui-ci n'a envoyé aucun fonds. Au lieu de cela, il semble qu'ils aient profité du conflit en cours pour envoyer des troupes s'emparer de notre barrage, et ont ouvert ses portes à leur barge."
 ynn_barges.10.a:0 "Ils n'étaient pas censés faire cela !"

 ynn_barges.11.t:0 "Une Barge Ynnique Accoste"
 ynn_barges.11.d1:0 "Un vaisseau contenant le cercueil d'un ancêtre est arrivé à [1031.GetName] aujourd'hui, plongeant dans le lac depuis la Grande Cascade au-dessus. Le vaisseau, endommagé après la chute, a atteint le rivage, et à l'intérieur nous avons trouvé plusieurs objets de valeur tels que des poteries, des pierres précieuses et des vêtements, ainsi que le cercueil lui-même, recouvert de métal précieux."
 ynn_barges.11.d2:0 "Un vaisseau est arrivé à [1031.GetName] aujourd'hui, plongeant dans son lac depuis la grande cascade au-dessus. Le vaisseau, endommagé après la chute, a atteint le rivage, et à l'intérieur aucun occupant n'a été trouvé ; il contenait plutôt plusieurs objets de valeur tels que des poteries, des pierres précieuses et des vêtements, ainsi qu'un cercueil, recouvert de métal précieux."
 ynn_barges.11.d3:0 "Un vaisseau contenant le cercueil d'un monarque ynnique défunt est arrivé à [1031.GetName] aujourd'hui, plongeant dans son lac depuis la grande cascade au-dessus. Le vaisseau, endommagé après la chute, a atteint le rivage, et à l'intérieur se trouvent plusieurs objets de valeur tels que des poteries, des pierres précieuses et des vêtements, ainsi que le cercueil lui-même, recouvert de métal précieux."
 ynn_barges.11.a:0 "Un tribut des cieux ! Saisissons-le et enterrons le corps"
 ynn_barges.11.b:0 "Pillons le contenu du vaisseau"
 ynn_barges.11.c:0 "Enterrons ces objets de valeur avec le cercueil"
 ynn_barges.11.e:0 "Pillons tout"
 ynn_barges.11.f:0 "Laissons les Morts reposer"

 ynn_hide_barges_loot_tt:0 "§TLes revenus des barges resteront mais nous ne verrons plus cet événement§!"
 ynn_hide_barges_no_loot_tt:0 "§TNous continuerons à enterrer leurs Souverains mais nous ne verrons plus cet événement§!"

 #Ynn Events
 ynn_events.0.t:0 "Réurbanisation"
 ynn_events.0.d:0 "Après des siècles de déclin, de guerres et d'abandon au profit des campagnes, la paix instaurée par notre nation a permis aux cités-carrefours le long du Fleuve Ynn de connaître à nouveau la prospérité, atteignant des niveaux d'expansion urbaine jamais vus depuis l'époque de l'Empire Ynnique.\n\nLà où gisaient jadis des ruines et des bâtiments décrépits pillés pour leurs matériaux, s'épanouissent désormais des métropoles florissantes dont les rues attirent aussi bien les guerriers cannoriens que les marchands rahenis, et tout le long de l'Ynn, le peuple remercie notre nation pour cela."
 ynn_events.0.a:0 "Puisse cette ère apporter une prospérité plus grande encore"

 ynn_events.1.t:0 "Déblayer la Voie de Tromseloc"
 ynn_events.1.d:0 "Un groupe de trois cavaliers arborant les bannières de [Root.GetName] chevaucha à travers la brume, le silence sinistre de Tromseloc n'étant rompu que par le clapotis des sabots de leurs montures sur le vieux chemin boueux. Chevauchant en tête vers un relais en ruine aux peintures rouge et blanc défraîchies, le capitaine scruta entre les murs lézardés et aperçut un mouvement de bois. « Tenez-vous prêts, on dirait que nous avons acculé un wendigo », dit le capitaine à ses compagnons, avant de mettre pied à terre et de s'approcher de la porte.\n\nD'un coup de pied, la vieille porte fut fracassée, et le capitaine entra l'épée à la main, pivotant vers la droite et levant sa lame pour parer les griffes du wendigo qui fondait sur lui."
 ynn_events.1.a:0 "La voie est-elle dégagée ? Elle l'est assez pour qu'une armée puisse y défiler, avec prudence."

 ynn_events.6.t:0 "L'Iosahar S'éloigne"
 ynn_events.6.d:0 "Notre Iosahar à [iosahar_into_tributary_target.GetName] agit de manière indépendante depuis un certain temps maintenant, reconnaissant notre Suzeraineté mais non notre autorité. Il a utilisé son éloignement de notre capitale comme excuse pour commodément oublier nos édits, nos missives, et, que l'Ynn soit clément, nos invitations aux festivités, espérant que nous ne remarquerions pas son absence.\n\nSi nous n'agissons pas rapidement, [iosahar_into_tributary_target.GetName] pourrait déclarer son indépendance totale."
 ynn_events.6.a:0 "Rappelons-lui qui commande."
 ynn_events.6.b:0 "Nous n'avons pas besoin de son épée ; son tribut nous suffit."
 ynn_events.6.c:0 "Laissons-le partir."
 iosahar_goes_tributary_dlc_tooltip:0 "Les §YIosahars§! qui ne partagent pas de frontière avec vous pourraient tenter de faire sécession à nouveau à l'avenir. Dépensez de l'§YAutorité Religieuse§! pour contrer cela."
 iosahar_goes_tributary_no_dlc_tooltip:0 "Les §YIosahars§! qui ne partagent pas de frontière avec vous pourraient tenter de faire sécession à nouveau à l'avenir. Dépensez de la §YLégitimité§! pour contrer cela."

 ynn_events.7.t:0 "Le Suzerain Enfreint la Tradition"
 ynn_events.7.d1:0 "Le [From.Monarch.GetTitle] [From.Monarch.GetName] a déclaré le système des Iosahar obsolète, défaisant l'œuvre de nos prédécesseurs pour établir une terre de seigneurs égaux. De toute évidence, [From.Monarch.GetName] cherche à restaurer les excès de pouvoir qui ont conduit à la chute de l'Empire Ynnique ! Quelqu'un devrait-il intervenir ?"
 ynn_events.7.d2:0 "Le [From.Monarch.GetTitle] [From.Monarch.GetName] a tourné le dos au Culte du Fleuve Ynn, se convertissant à une nouvelle religion étrangère. De toute évidence, [From.Monarch.GetName] est devenu fou, et maintenant cette folie menace d'engloutir tout le royaume ! Quelqu'un devrait-il intervenir ?"
 ynn_events.7.a:0 "Nous nous soulèverons !"
 ynn_events.7.b:0 "Reculons."

 ynn_events.8.t:0 "La Grande Insurrection des Iosahar"
 ynn_events.8.d1:0 "Nos sujets Gardiens du Serment se sont soulevés en rébellion : menés par le [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.GetName], ils sont clairement mécontents de notre choix de mettre fin à la complaisance et à l'égoïsme permis par le système des Iosahar. Il est trop tard pour reculer maintenant, tout ce qu'il nous reste à faire est d'écraser cette rébellion, et notre règne sur l'Ynn sera consolidé à jamais."
 ynn_events.8.d2:0 "Nos sujets Gardiens du Serment se sont soulevés en rébellion : menés par le [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.GetName], ils sont clairement mécontents de notre choix d'apporter la lumière d'une nouvelle religion sur ces terres. Il est trop tard pour reculer maintenant, tout ce qu'il nous reste à faire est d'écraser cette rébellion, et notre règne sur l'Ynn sera consolidé à jamais."
 ynn_events.8.a:0 "Leurs Serments n'auront plus besoin d'être gardés."
 ynn_events_8_tooltip:0 "§Y[From.GetName]§! déclare la guerre à §Y[Root.GetName]§! avec le casus belli §YSubjugation d'Iosahar§!."

 ynn_events.9.t:0 "[From.GetName] nous a subjugués !"
 ynn_events.9.d1:0 "Nous avons été vaincus en guerre et notre [Root.Monarch.GetTitle] plie désormais le genou devant [From.GetName], lui promettant [Root.Monarch.GetHerHis] épée et [Root.Monarch.GetHerHis] bourse. Nous pouvons attendre notre heure et nous libérer de leur joug un jour, peut-être en devenant Suzerain nous-mêmes. En attendant…"
 ynn_events.9.d2:0 "Nous avons été vaincus en guerre par l'un des Seigneurs à Bois, et avons été contraints de plier le genou. La Cité des Guerriers et ses institutions sont à la merci du [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.GetName], à qui nous prêterons désormais nos épées et nos deniers."
 ynn_events.9.a:0 "Servons le royaume."

 ynn_events.10.t:0 "Partitionner [From.GetName] ?"
 ynn_events.10.desc:0 ""
 ynn_events.10.a:0 ""

 ynn_events.17.t:0 "Le Royaume du Dragon"
 ynn_events.17.d:0 "Les Rzentur partagent nombre des coutumes et du mode de vie de la culture ynnique au sens large, cependant depuis le renversement du Seigneur Trantan et l'essor de la foi Drozma Tur, un fossé s'est creusé entre les Sarda et Dolindhans adorateurs du Fleuve et leurs cousins Rzentur adorateurs du Dragon, qui sont à nouveau décriés comme « barbares » par les deux autres.\n\nDes événements tels que la montée de la Grande Armée Païenne, culminant avec la mort de Drozmagog aux mains d'un chevalier ynnique, ont encore creusé ce fossé, entraînant un tournant brutal pour la tradition encore naissante de la chevalerie rzentane.\n\nBien que de nombreux chevaliers soient encore employés par les dirigeants rzentur, l'individualisme n'est plus encouragé ni les hauts faits glorifiés, et le code informel de relations Suzerain-Vassal développé pendant l'apogée d'Amacimst et d'Amaceped, la Période des Deux Châteaux, a été mis de côté : le plus puissant des Seigneurs Rzentur règne avec le titre de Ladr, Duc, en tant que supérieur de ses autres vassaux et seul exécuteur de la volonté du Dragon."
 ynn_events.17.a:0 "Il est temps d'enterrer les bois."
 ynn_events.17.b:0 "Nous conquerrons les Ynniques en utilisant leurs lois."
 ynn_17_tooltip:0 "Chaque sujet §YIosahar§! rzentur devient un §YVassal§! normal, gagnant §R+20 %§! de Désir de Liberté et perdant §R10§! de Confiance.\nVous ne pourrez plus créer de nouveaux §YIosahars§!."
 ynn_17_tooltip_really_good_idea:0 "§RVos vassaux dolindhans n'apprécieront pas cela.§!"

 ynn_events.18.t:0 "Contourner le Serment"
 ynn_events.18.d1:0 "Notre lointain Suzerain à [From.GetName] attendait de nous que nous pliions le genou, prêtions notre épée et payions des impôts à une capitale distante, mais plus maintenant !\n\nGrâce à quelques manœuvres habiles, notre [Root.Monarch.GetTitle] a réussi à devenir libre de fait sinon de nom, n'envoyant plus qu'un modeste tribut à [From.GetName] de temps à autre."
 ynn_events.18.d2:0 "Notre lointain Suzerain à [From.GetName] attendait de nous que nous pliions le genou, prêtions notre épée et payions des impôts à une capitale distante, mais plus maintenant !\n\nGrâce à quelques manœuvres habiles, notre [Root.Monarch.GetTitle] a réussi à devenir libre non seulement de fait mais aussi de nom, se débarrassant du besoin de maintenir tout semblant de vassalité."
 ynn_events.18.a:0 "Coup de maître."

 ynn_events.22.t:0 "Visiteurs d'En-Bas"
 ynn_events.22.d:0 "Nous qui depuis longtemps nous tenons sur ce que nous considérions comme le bord du monde, les visiteurs qui arrivent à [1133.GetName] d'en bas se limitent généralement à quelques groupes de grimpeurs boeks ou de mercenaires cheshoshis, mais aujourd'hui cela a changé : des elfes à la peau rosée et aux oreilles arrondies, non sans rappeler celles d'un chevalier, sont venus visiter la cité sainte, apportant avec eux non seulement des armes et des bourses, mais aussi des chariots tirés par de petits chevaux sans bois.\n\nAprès interrogation, nous avons été surpris d'apprendre que la majorité d'entre eux n'étaient pas des elfes du tout, mais une variété d'espèces : ce qu'ils avaient en commun était qu'ils venaient tous d'un continent lointain connu sous le nom de « Krarh Nor », la Terre Nouvelle.\n\nLeurs chariots étaient remplis de cultures exotiques, de meubles de qualité, d'armes nouvelles et originales, de vêtements dignes de nos dames, et même d'un aliment savoureux en forme d'arbre appelé champignon. En échange de leurs présents, ils demandaient simplement à être autorisés à entrer dans la cité, où ils pourraient contempler le grand barrage de [1133.GetName], dont la vue les avait attirés de si loin."
 ynn_events.22.a:0 "Mesdames et messieurs, bienvenue à [1133.GetName]."
 ynn_events.22.b:0 "Gardes ! Chassez ces vagabonds."
 ynn_22_tooltip:0 "Les visiteurs repartent déçus."

 ynn_events.24.t:0 "Le Dernier Bastion du Culte du Dragon"
 ynn_events.24.d:0 "« Les [Root.GetAdjective] arrivent ! Sonnez l'alarme ! » hurla Erethra Dolenmach, courant d'un clocher à l'autre.\n\nTandis que les cloches résonnaient dans les rues de [drozma_last_stand_prov.GetName], des centaines, des milliers de fidèles sortirent de leurs demeures. Une foule armée de torches, de haches et de tout objet qu'ils pouvaient trouver, également renforcée par les quelques dévots d'élite de la cause Drozma Tur encore présents, forme maintenant une barrière de plusieurs rangées de profondeur entre le Prince-Dragon et les [Root.KnightsWarriors] de [Root.GetName] qui approchent. Peu de choses peuvent être dites ou faites, tandis que les [Root.KnightsWarriors] avancent d'un air sinistre, et que les cultistes brandissent leurs lames et bandent leurs arcs…"
 KnightsWarriors_1:0 "chevaliers"
 KnightsWarriors_2:0 "guerriers"
 ynn_events.24.a:0 "Affrontez maintenant le courroux du Fleuve !"
 ynn_events.26.t:0 "Le Culte du Dragon Vaincu"
 ynn_events.26.d1:0 "C'en est fait. Nous avons écrasé la horde démente du Culte du Dragon et nous sommes frayé un chemin à travers les rues de [drozma_last_stand_prov.GetName], atteignant le palais de dépravation où le Prince-Dragon était élevé et vénéré. Nos [Root.KnightsWarriors] ont désarmé les portes enchantées et pénétré dans le jardin du palais, échangeant des salves magiques de feu et d'eau avec les derniers défenseurs du Culte du Dragon. Les combats ont continué à l'intérieur, pièce par pièce, jusqu'à ce que chaque Rzentur dans le bâtiment gise mort.\n\nUne fois la poussière retombée, nos mages ont déterminé que le Prince-Dragon était mort, et nous ont présenté le corps d'un adolescent en habits nobles, nul autre que la créature elle-même ayant pris forme rzentane."
 ynn_events.26.d2:0 "C'en est fait. Nous avons écrasé la horde démente du Culte du Dragon et nous sommes frayé un chemin à travers les rues de [drozma_last_stand_prov.GetName], atteignant le palais de dépravation où le Prince-Dragon était élevé et vénéré. La créature ne nous a pas attendus plus longtemps et s'est perchée sur le toit du palais, grondant vers nos [Root.KnightsWarriors] avant de cracher un nuage de flammes sur eux, repoussé par les boucliers d'eau lancés par nos mages.\n\nUne fois la poussière retombée, le dragon gisait mort parmi les décombres du palais désormais en ruine et d'innombrables cadavres de nos [Root.KnightsWarriors]. Malgré tout, nos troupes survivantes lèvent leurs lames vers le ciel et acclament la victoire, car peu nombreux sont ceux qui peuvent se vanter d'avoir accompli les hauts faits survenus à [drozma_last_stand_prov.GetName] aujourd'hui."
 ynn_events.26.d3:0 "C'en est fait. Nous avons écrasé la horde démente du Culte du Dragon et nous sommes frayé un chemin à travers les rues de [drozma_last_stand_prov.GetName], atteignant le palais de dépravation où le Prince-Dragon était élevé et vénéré. La créature ne nous a pas attendus plus longtemps et s'est perchée sur le toit du palais, grondant vers nos [Root.KnightsWarriors] avant de cracher un nuage de flammes sur eux, repoussé par les boucliers d'eau lancés par nos mages. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] se tenait au premier rang, brandissant une lance et chargeant la bête.\n\nUne fois la poussière retombée, le dragon gisait mort parmi les décombres du palais désormais en ruine et d'innombrables cadavres de nos [Root.KnightsWarriors]. Hélas, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] comptait parmi ceux qui ont péri dans le combat, [Root.Monarch.GetHerHis] mort étant le sacrifice ultime pour la défaite finale du Culte du Dragon. [Root.Monarch.GetHerHisCap] restes furent promptement pris en charge par les meilleurs embaumeurs accompagnant notre armée, et des charpentiers de confiance furent convoqués pour confectionner un cercueil et une barge royale. Les rues de [drozma_last_stand_prov.GetName] sont maintenant emplies de chagrin et de célébration à parts égales tandis qu'elles attendent les funérailles du [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 ynn_events.26.d4:0 "C'en est fait. Nous avons écrasé la horde démente du Culte du Dragon et nous sommes frayé un chemin à travers les rues de [drozma_last_stand_prov.GetName], atteignant le palais de dépravation où le Prince-Dragon était élevé et vénéré. La créature ne nous a pas attendus plus longtemps et s'est perchée sur le toit du palais, grondant vers nos [Root.KnightsWarriors] avant de cracher un nuage de flammes sur eux, repoussé par les boucliers d'eau lancés par nos mages. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] se tenait au premier rang, brandissant une lance et chargeant la bête.\n\nUne fois la poussière retombée, le dragon gisait mort parmi les décombres du palais désormais en ruine et d'innombrables cadavres de nos [Root.KnightsWarriors]. Au-dessus de la carcasse du dragon se tenait le [Root.Monarch.GetTitle] [Root.Monarch.GetName], blessé, couvert de sang et de marques de brûlure, avec une arme brisée et une armure bosselée, mais néanmoins triomphant. Nos troupes survivantes lèvent leurs lames vers le ciel et acclament leur victoire d'aujourd'hui, et la victoire de leur [Root.Monarch.GetTitle], qui sera immortalisé dans la mémoire ynnique comme la seconde venue d'Artorean."
 ynn_26_tooltip:0 "Chaque nation §Y[Root.Religion.GetName]§! :\nOpinion de §Y[Root.GetName]§! modifiée de §G+100§!.\n\nChaque nation §YDrozma Tur§! :\nDevient sujette de §Y[Root.GetName]§!.\n§Y[Root.Religion.GetName]§! devient la nouvelle religion d'État. Cela s'appliquera également aux dirigeants et héritiers potentiels.\nOpinion de §Y[Root.GetName]§! modifiée de §R-100§!.\nAjoute §R50§! de Méfiance envers §Y[Root.GetName]§!.\n\nChaque province §YDrozma Tur§! est convertie à §Y[Root.Religion.GetName]§!.\nDes §RRebelles Hérétiques§! se soulèveront dans chaque province convertie que nous possédons directement."
 ynn_events.26.a:0 "On écrira des chansons sur ce jour !"
 ynn_events.28.t:0 "Le Culte du Dragon Nous Repousse !"
 ynn_events.28.d:0 "La force que nous avons envoyée pour capturer le Prince-Dragon n'était pas suffisante ! La discipline de nos [Root.KnightsWarriors] a été submergée par des milliers de fanatiques déchaînés, qui ont renversé notre garnison et déclaré leur indépendance."
 ynn_events.28.a:0 "Ils regretteront ce jour !"
 ynn_events.29.t:0 "Sans Dragon Une Fois de Plus"
 ynn_events.29.d:0 "Les troupes de [From.GetName] ont envahi la demeure du Prince-Dragon et l'ont tué ! Des milliers de personnes ont pris les rues et se sont battues pour le défendre, mais en vain : elles ont été fauchées également."
 ynn_events.29.a:0 "C'est véritablement la fin du Culte du Dragon"

 #General Flavour Events

 ynn_events.106.t:0 "Inondations Dévastatrices"
 ynn_events.106.d1:0 "La province de [Root.GetName] a été brutalement inondée par le Fleuve Ynn, et malgré les vaillants efforts des sauveteurs locaux, une aide directe de notre [Root.Owner.GovernmentName] est nécessaire afin de déployer suffisamment d'équipes de secours pour sauver la population de [Root.GetName] et financer sa reconstruction."
 ynn_events.106.d2:0 "« L'eau détruira\nL'eau ruinera\nDans un grondement pur\n\nLe Fleuve coule en silence\nDélogeant les pierres séculaires »\n\n-Kamir Kablaka, Poème Ynnique, 1796\n\nNotre pays tout entier est inondé par le Fleuve Ynn avec une violence inédite depuis des siècles. La situation est particulièrement critique à [Root.GetName], où les équipes d'urgence ont désespérément renforcé les digues le long du cours principal de l'Ynn, tandis que les plus courageux des Gardes-Marée partaient secourir les habitants et les objets de valeur des bâtiments effondrés emportés par les flots.\n\nMalgré ces efforts, les forces locales de [Root.GetName] ne suffisent pas, et elles demandent l'assistance de [Root.Owner.GovernmentName]. Une assistance que nous ne pouvons pas fournir, car tout notre pays lutte également contre le courroux du Fleuve."
 ynn_events.106.a:0 "Nous aiderons [Root.GetName] de notre mieux"
 ynn_events.106.b:0 "Malheureusement, nous n'avons aucune aide à offrir"

 ynn_events.107.t:0 "Le Grand Barrage Nécessite un Entretien"
 ynn_events.107.d1:0 "Les barrages sont des structures puissantes, construites pour endurer la force d'un fleuve en crue. Malgré cela, ils nécessitent des contrôles et un entretien réguliers, et pour un fleuve aussi immense que l'Ynn, ceux-ci peuvent devenir extrêmement coûteux. Le Grand Barrage de [Root.GetName] a besoin d'un tel entretien, selon le rapport des inspecteurs, et notre [Root.Owner.Monarch.GetTitle] a été sollicité pour aider.\n\nBien que des citoyens privés puissent réunir suffisamment de ressources et de main-d'œuvre pour colmater les fuites et éviter un effondrement désastreux du Barrage, traditionnellement l'Empire Ynnique et ses États successeurs ont fourni la majeure partie des capitaux nécessaires pour maintenir les barrages pleinement opérationnels et garantir qu'ils conservent leur véritable grandeur monumentale."
 ynn_events.107.d2:0 "Le Grand Barrage de [Root.GetName], aussi puissant soit-il, a subi des dommages considérables, que ce soit par des armées assiégeantes ou par une négligence prolongée. Il nécessite des réparations urgentes, selon le rapport des inspecteurs, et notre [Root.Owner.Monarch.GetTitle] a été sollicité pour aider avant que le flux d'eau incontrôlé ne provoque des inondations désastreuses pour les communautés en aval.\n\nBien que des citoyens privés puissent réunir suffisamment de ressources et de main-d'œuvre pour colmater les fuites et éviter un effondrement désastreux du Barrage, traditionnellement l'Empire Ynnique et ses États successeurs ont fourni la majeure partie des capitaux nécessaires pour maintenir les barrages pleinement opérationnels et garantir qu'ils conservent leur véritable grandeur monumentale."
 ynn_events.107.a:0 "Pour l'Ynn et son peuple, nous payons ce prix avec joie"
 ynn_events.107.b:0 "L'État ne peut se permettre aucune dépense en ce moment"
 ynn_events.107.c:0 "Engageons une compagnie d'ingénieurs nains pour cette tâche"
 ynn_flooding_downstream_tt:0 "§RLes provinces en aval seront inondées plus fréquemment.§!"

 ynn_events.110.t:0 "Nous Devons Exiger Réparation !"
 ynn_events.110.d:0 "Un prétendu geste diplomatique récemment reçu de [ynn_joust_offender.GetName] s'est révélé n'être rien de plus qu'une insulte flagrante. Conformément aux règles de la chevalerie, les paroles prononcées peuvent justifier un duel d'honneur, traditionnellement sous la forme d'une joute.\n\nBien qu'il puisse être téméraire de risquer sa vie pour les bavardages d'un [ynn_joust_offender.Monarch.GetTitle] arrogant au manque évident de savoir-vivre, l'absence de défi de notre part sur cette affaire sera interprétée par beaucoup comme une confirmation de la véracité des paroles offensantes !"
 ynn_events.110.a:0 "Ils répondront de cet affront !"
 ynn_events.110.b:0 "C'est une idée insensée."
 ynn_joust_tt:0 "§TL'issue de la joute entre souverains sera influencée par leurs âges respectifs, leurs traits de personnalité et leur compétence militaire.§!"

 ynn_events.111.t:0 "Le Gant a Été Jeté !"
 ynn_events.111.d:0 "Il semble que les voisins aient le sang chaud !\n\nNotre différend en cours avec les [From.GetAdjective] a fait entrer le [From.Monarch.GetTitle] [From.Monarch.GetName] dans une rage incontrôlable. Déclarant que les paroles justes et vraies de nos diplomates n'étaient que mensonges sans fondement, [From.Monarch.GetSheHe] s'est levé de son haut siège dans les salles de [From.Capital.GetName], et a jeté [From.Monarch.GetHerHis] gant au sol aux pieds de notre diplomate : un défi !\n\nNe pas relever ce défi signifierait non seulement que [Root.Monarch.GetName] serait déclaré couard, mais notre crédibilité dans toutes les négociations serait remise en question."
 ynn_events.111.a:0 "Je le rencontrerai le fer à la main !"
 ynn_events.111.b:0 "Mieux vaut ne pas risquer d'envenimer les choses."

 ynn_events.112.t:0 "La Joute"
 ynn_events.112.d:0 "Les deux jouteurs se rencontrent au jour convenu. Des lices ont été dressées en territoire neutre sur un terrain sec et plat. Une petite foule de nobles et de gentilshommes avec leurs bannières flottant au vent, ainsi que d'autres de moindre naissance, s'est rassemblée pour assister à la justice. Supervisant les procédures, garantissant un comportement honorable et rendant un verdict impartial, se trouvent les Prêtres-du-Fleuve. Ils paraissent inanimés et stoïques à côté des autres spectateurs, qui rugissent de soutien et huent de dédain tandis que les combattants approchent.\n\nAu son d'un clairon, les jouteurs commencent la charge. Lances pointées et regard fixe, ils avancent, la terre volant sous les sabots de leurs massifs chevaux-à-bois qui galopent à une vitesse tonnante malgré les cavaliers somptueusement armurés.\n\n[Root.YnnEvents112Bloc0]"
 YnnEvents112Bloc0_1:0 "Après plusieurs passes, le vainqueur reste incertain. Les fiers chevaux-à-bois halètent d'épuisement tandis que les écuyers se hâtent de livrer les lances de remplacement. Le clairon sonne à nouveau, et ils chargent encore. Le rugissement de la foule atteint son paroxysme au fracas d'une lance trouvant enfin sa cible, les deux chevaux-à-bois atteignent l'extrémité des lices, et l'un revient sans cavalier.\n\nÔtant [ynn_joust_winner.Monarch.GetHerHis] heaume et levant [ynn_joust_winner.Monarch.GetHerHis] lance vers les cieux, le [ynn_joust_winner.Monarch.GetTitle] [ynn_joust_winner.Monarch.GetName] savoure un glorieux triomphe !"
 YnnEvents112Bloc0_2:0 "Dès la première passe, la lance habile du [ynn_joust_winner.Monarch.GetTitle] [ynn_joust_winner.Monarch.GetName] trouve l'écu du [ynn_joust_loser.Monarch.GetTitle] [ynn_joust_loser.Monarch.GetName], le projetant au sol dans un fracas retentissant d'armure et la plainte horrifiée des [ynn_joust_loser.GetAdjective] dans les tribunes.\n\nÔtant [ynn_joust_winner.Monarch.GetHerHis] heaume et levant [ynn_joust_winner.Monarch.GetHerHis] lance vers les cieux, le [ynn_joust_winner.Monarch.GetTitle] [ynn_joust_winner.Monarch.GetName] savoure un glorieux triomphe !"
 ynn_events.112.a:0 "La victoire est mienne !"

 ynn_events.113.t:0 "La Joute"
 ynn_events.113.d:0 "Les deux jouteurs se rencontrent au jour convenu. Des lices ont été dressées en territoire neutre sur un terrain sec et plat. Une petite foule de nobles et de gentilshommes avec leurs bannières flottant au vent, ainsi que d'autres de moindre naissance, s'est rassemblée pour assister à la justice. Supervisant les procédures, garantissant un comportement honorable et rendant un verdict impartial, se trouvent les Prêtres-du-Fleuve. Ils paraissent inanimés et stoïques à côté des autres spectateurs, qui rugissent de soutien et huent de dédain tandis que les combattants approchent.\n\nAu son d'un clairon, les jouteurs commencent la charge. Lances pointées et regard fixe, ils avancent, la terre volant sous les sabots de leurs massifs chevaux-à-bois qui galopent à une vitesse tonnante malgré les cavaliers somptueusement armurés.\n\n[Root.YnnEvents113Bloc0]"
 YnnEvents113Bloc0_1:0 "Après plusieurs passes, le vainqueur reste incertain. Les fiers chevaux-à-bois halètent d'épuisement tandis que les écuyers se hâtent de livrer les lances de remplacement. Le clairon sonne à nouveau, et ils chargent encore. Le rugissement de la foule atteint son paroxysme au fracas d'une lance trouvant enfin sa cible, les deux chevaux-à-bois atteignent l'extrémité des lices, et l'un revient sans cavalier.\n\nGisant dans la poussière, tandis que [ynn_joust_winner.Monarch.GetHerHis] adversaire savoure sa victoire, le [ynn_joust_loser.Monarch.GetTitle] [ynn_joust_loser.Monarch.GetName] peste de honte."
 YnnEvents113Bloc0_2:0 "Dès la première passe, la lance habile du [ynn_joust_winner.Monarch.GetTitle] [ynn_joust_winner.Monarch.GetName] trouve l'écu du [ynn_joust_loser.Monarch.GetTitle] [ynn_joust_loser.Monarch.GetName], le projetant au sol dans un fracas retentissant d'armure et la plainte horrifiée des [ynn_joust_loser.GetAdjective] dans les tribunes.\n\nQuand la poussière retombe, le corps meurtri du [ynn_joust_loser.Monarch.GetTitle] [ynn_joust_loser.GetAdjective] gît grièvement blessé dans la terre."
 ynn_events.113.a:0 "Comment est-ce possible ? La justice était clairement de notre côté !"

 ynn_events.114.t:0 "Le Couard a Refusé Notre Défi !"
 ynn_events.114.d:0 "La réponse de [From.Capital.GetName] parle d'elle-même : le [From.Monarch.GetTitle] des [From.GetAdjective] n'est rien d'autre qu'un pathétique petit pleutre ! Au lieu de défendre [From.Monarch.GetHerHis] paroles dans un combat honorable, [From.Monarch.GetSheHe] a trouvé une excuse pitoyable pour décliner notre défi."
 ynn_events.114.a:0 "[From.Monarch.GetHerHisCap] couardise prouve que nous avions raison !"

 ynn_events.115.t:0 "Le Sang de Lukaus"
 ynn_events.115.d1:0 "Lukaus est le fondateur mythique de Dolindha, qui le premier dompta les Chevaux-à-Bois des contrées sauvages ynniques et piétina ses ennemis dans une charge dévastatrice. Bien que la dynastie de Lukaus se soit éteinte, on se souvient de lui pour avoir engendré tant d'enfants bâtards que toute personne dans l'Ynn pourrait bien avoir un peu de son sang en [Root.Monarch.GetHerHim].\n\nPour [Root.Monarch.GetHerHis] exploits équestres et [Root.Monarch.GetHerHis] empathie exceptionnelle avec toute monture sur laquelle [Root.Monarch.GetSheHe] monte, les gens ont pris l'habitude de dire que le sang de Lukaus coule très puissamment dans les veines du [Root.Monarch.GetTitle] [Root.Monarch.GetName], et que quiconque chevauche contre [Root.Monarch.GetHerHim] est soit un fou, soit un champion de même envergure."
 ynn_events.115.d2:0 "Lukaus est le fondateur mythique de Dolindha, qui le premier dompta les Chevaux-à-Bois des contrées sauvages ynniques et piétina ses ennemis dans une charge dévastatrice. Bien que la dynastie de Lukaus se soit éteinte, on se souvient de lui pour avoir engendré tant d'enfants bâtards que toute personne dans l'Ynn pourrait bien avoir un peu de son sang en [Root.Mil_Advisor.GetHerHim].\n\nPour [Root.Mil_Advisor.GetHerHis] exploits équestres et [Root.Mil_Advisor.GetHerHis] empathie exceptionnelle avec toute monture sur laquelle [Root.Mil_Advisor.GetSheHe] monte, les gens ont pris l'habitude de dire que le sang de Lukaus coule très puissamment dans les veines de notre conseiller militaire [Root.Mil_Advisor.GetName], et que quiconque chevauche contre [Root.Mil_Advisor.GetHerHim] est soit un fou, soit un champion de même envergure."
 ynn_events.115.a:0 "Enseignons aux écuyers comment cela se fait"
 ynn_events.115.b:0 "Nos éleveurs pourraient bénéficier de ses conseils"

 #Events pertaining particular countries

 ynn_events.150.t:0 "[G27.GetName] Propose du Fer à Bas Prix !"
 ynn_events.150.d:0 "Les mines de fer de la province de [2838.GetName] appartenant à [G27.GetName] sont traditionnellement connues comme la plus grande source de fer pour l'Ynn. Bien que la province de [1169.GetName] possède un gisement tout aussi important, son peuple est réputé pour le garder jalousement et ne laisser que les forgerons les plus habiles utiliser le minerai extrait de leur territoire. Cette appréhension [1169.GetAdjective] a fait du fer un métal coûteux dans l'Ynn.\n\nHeureusement pour nous, cependant, un marchand de [G27.GetName] traverse une période difficile et doit écouler sa marchandise à n'importe quel prix. Un tel afflux de fer réduirait considérablement les coûts que nous devons consacrer à l'entretien de l'équipement de notre armée."
 ynn_events.150.a:0 "Remercions l'Ynn pour cette opportunité économique !"
 ynn_events.150.b:0 "Nous ne nous portons guère mieux nous-mêmes."

 ynn_events.151.t:0 "Un Présent de Fleurs !"
 ynn_events.151.d:0 "Devant vous se trouve un bouquet de campanules retombantes, aux tiges soigneusement enveloppées dans un tissu brodé délicat, émettant un parfum clair de fraîcheur sucrée qui s'insinue dans vos narines et apaise votre esprit, vous rappelant un jour de printemps. Ces fleurs sont un présent du [G28.Monarch.GetTitle] de [G28.GetName], un fief dolindhan réputé pour sa tradition botanique, et elles sont accompagnées d'une lettre souhaitant le meilleur avenir pour vous et votre maison, et une collaboration continue au fil des années à venir."
 ynn_events.151.a:0 "« Comme notre lien, puissent ces fleurs s'épanouir. -[G28.Monarch.GetTitle] [G28.Monarch.GetName] »"

 ynn_events.152.t:0 "Les Campanules en Fleur !"
 ynn_events.152.d:0 "Les fleurs que nous avons reçues des jardins de [1182.GetName] ont été soigneusement entretenues depuis leur replantation. Nos jardiniers ont travaillé avec un zèle renouvelé, inspirés par le privilège de s'occuper de spécimens si bien sélectionnés transmis par des cultivateurs admirés et respectés. Plus tôt aujourd'hui, notre jardinier en chef s'est présenté devant le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et, avec une lueur dans les yeux, l'a invité à visiter les jardins et à admirer les fruits de leurs efforts.\n\nLa première chose que [Root.Monarch.GetSheHe] remarqua en approchant des jardins avec son entourage fut le doux parfum dans l'air, et malgré [Root.Monarch.GetHerHim]-même, [Root.Monarch.GetSheHe] pressa le pas d'excitation. La scène qui l'attendait à l'endroit où les fleurs avaient été plantées semblait légendaire, comme les récits de la belle Arverynn à son apogée impériale. Les tiges des campanules grimpaient le long de supports en bois finement sculptés, qui se terminaient en arches au-dessus du sentier. Suspendues à ces arches se trouvaient les campanules elles-mêmes, surplombant le pavage, laissant filtrer la lumière audacieuse du soleil matinal en rayons dorés à travers les interstices entre les feuilles et en cascades bleues à travers les pétales translucides."
 ynn_events.152.a:0 "Par le Fleuve, vous vous êtes véritablement surpassés !"

 ynn_events.153.t:0 "Chevalier d'Améthyste Exilé"
 ynn_events.153.d:0 "Une cape violette usée claque puissamment dans le vent, un cheval-à-bois solide mais las gratte le sol avec anxiété, et un elfe grand et robuste retire son heaume à bois pour se montrer au regard du [Root.Monarch.GetTitle] tandis que [Root.Monarch.GetSheHe] observe ce visiteur lourdement armé depuis les remparts au-dessus de la porte du château. L'elfe se présente comme un chevalier de peu de renom, désireux de prêter serment au [Root.Monarch.GetTitle] en échange de [Root.Monarch.GetHerHis] protection, mais son apparence trahit son origine.\n\nAux confins nord-est de l'Ynn, à l'orée de la Forêt des Maudits, se dresse le château d'Amacimst. De là viennent les Chevaliers d'Améthyste, l'ordre chevaleresque le plus célèbre et le plus habile de l'Ynn, leurs capes et caparaçons pourpres inspirant crainte et respect à travers tous les royaumes du Fleuve. Ce chevalier est clairement de l'Ordre d'Améthyste mais, comme il arrive en raison des règles strictes de l'ordre concernant la propagation d'idées qu'ils jugent subversives, il a dû être exilé ou autrement contraint de fuir son château natal."
 ynn_events.153.a:0 "Un hôte si talentueux. Bienvenue !"
 ynn_events.153.b:0 "Les Chevaliers d'Améthyste n'exileraient pas quelqu'un sans raison."

 ynn_events.154.t:0 "Adopter le Croisé d'Epednar pour l'Éclairage ?"
 ynn_events.154.d:0 "Le Croisé d'Epednar est un hybride entre les chevaux-à-bois de Dolindha et le cheval d'Epednar des plaines epednanes. Facilement identifiable par ses longs bois non ramifiés, qui se brisent aisément mais repoussent aussi vite, on peut en dire autant de son caractère, plus endurant qu'un cheval-à-bois malgré sa stature plus petite.\n\nRécemment, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a reçu une offre de [G34.GetName] pour enrôler quelques cavaliers utilisant cette monture plus légère : les cavaliers de croisés sont experts en reconnaissance et harcèlement des approvisionnements ennemis, ainsi qu'en combats prolongés où les chevaux-à-bois manqueraient d'énergie pour charger, et bien que beaucoup de non-Juzornics maintiennent qu'ils sont indignes d'un chevalier et une monture de couard, les exploits du Seigneur Artorean Uma-Zomaj parlent d'eux-mêmes.\n\nDans un exploit légendaire, le Seigneur Artorean devança tous les autres guerriers de l'Alliance des Seigneurs Chevaliers pour poursuivre Drozmagog dans les pentes abruptes des montagnes occidentales, où aucun Cheval-à-Bois ne pouvait marcher et encore moins galoper, rattrapant finalement le prétendu Dieu Dragon et le terrassant en 1371."
 ynn_events.154.a:0 "Je ne refuserai pas un avantage au combat, qu'ils rient."
 ynn_events.154.b:0 "Nous ne pouvons pas nous permettre de perdre la face ainsi."

 ynn_events.155.t:0 "La Flotte Marchande Sacrée Demande un Port"
 ynn_events.155.d:0 "Une flotte de barges et de canoës accoste au quai fluvial, et leur représentant, un marchand-elfe corpulent d'âge mûr vêtu d'un gilet brun et coiffé d'un chapeau à plumes, pose le pied sur le rivage pour s'entretenir avec les braves gens de [ynn_holy_merchant_prov.GetName]. Il en divertit beaucoup en parlant d'un langage coloré mais direct des luxes et richesses que sa flotte transporte à travers l'Ynn, qui pourraient être livrés à [ynn_holy_merchant_prov.GetName] également, s'ils acceptent une simple requête, chaque mot de son discours accompagné de gestes théâtraux chaleureux.\n\nLa foule qui s'était formée autour de lui finit par s'ouvrir, tandis que l'intendant local arrive avec deux gardes. Le marchand-elfe sourit simplement et extrait un présent de sa poche.\n\nPlus tard ce même jour, la requête du marchand-elfe est parvenue au [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.GetName], qui répond promptement en l'entendant :"
 ynn_events.155.a:0 "Tant qu'ils ont assez de pièces d'or."
 ynn_events.155.b:0 "Je ne peux accorder crédit à un seul mot qu'ils disent !"

 ynn_events.156.t:0 "[H25.GetName] Offre un Teriyer !"
 ynn_events.156.d:0 "Des yeux sages et bienveillants observent le [Root.Monarch.GetTitle] [Root.Monarch.GetName] depuis le sol de la cour. Une petite queue blanche à poils longs bat doucement d'un côté à l'autre de manière patiente et polie. Devant le [Root.Monarch.GetTitle] est assis un chiot Teriyer de Stenurynn, un présent du [H25.Monarch.GetTitle] [H25.Monarch.GetName] de [H25.GetName]. Les Teriyers sont célèbres pour leur élégance et leur intelligence sociale et sont des animaux de compagnie prisés de nombreux nobles de haut rang. Les meilleurs chiots sont parfois offerts à des alliés estimés ou à d'autres amis de la cour [H25.GetAdjective], aussi ce geste témoigne-t-il d'une profonde confiance entre nos nations."
 ynn_events.156.a:0 "Qui est un bon chien ?"

 #Events pertaining particular provinces

 ynn_events.200.t:0 "Un Diplômé des Lames-du-Fleuve Offre ses Services"
 ynn_events.200.d1:0 "Un jeune bretteur à la lame courbée et à la cape azur a fait son apparition à [Root.Capital.GetName] aujourd'hui. Sans besoin de présentations, on pouvait comprendre que l'individu était une Lame-du-Fleuve, ayant récemment obtenu son diplôme de l'École des Lames-du-Fleuve de [1138.GetName] et cherchant un emploi auprès de notre [Root.Monarch.GetTitle].\n\nRenommées pour leur élégance et leur affinité avec la magie de l'eau, les Lames-du-Fleuve suivent un entraînement rigoureux pour combiner la létalité d'un guerrier avec la grâce d'un courant d'eau calme ; un tel individu dans nos rangs donnera certainement l'exemple de la discipline à nos troupes."
 ynn_events.200.d2:0 "Un jeune bretteur vient d'obtenir son diplôme de l'École des Lames-du-Fleuve, réussissant l'examen final avec plusieurs honneurs. Alors qu'à ce stade une jeune Lame-du-Fleuve quitterait [1138.GetName] pour chercher un emploi à travers l'Ynn, cet individu particulier souhaite rester dans notre capitale et aider le règne bienveillant du [Root.Monarch.GetTitle] [Root.Monarch.GetName], un souhait que les instructeurs de l'école nous assurent être soutenu par un véritable talent.\n\nRenommées pour leur élégance et leur affinité avec la magie de l'eau, les Lames-du-Fleuve suivent un entraînement rigoureux pour combiner la létalité d'un guerrier avec la grâce d'un courant d'eau calme ; un tel individu dans nos rangs donnera certainement l'exemple de la discipline à nos troupes."
 ynn_events.200.a:0 "Nos troupes auraient intérêt à apprendre de ce parangon de style et de grâce"
 ynn_events.200.b:0 "Les courants de maintes batailles tourneront en notre faveur"

 ynn_events.201.t:0 "Le Palais Darantynn"
 ynn_events.201.d:0 "Trhevyr Darantynn était un marchand sarda né à [1140.GetName]. Il fut le premier Né-des-Ruines ynnique jamais enregistré à voyager vers la Baie-des-Trolls après le contact cannorien, menant des affaires qui l'amenèrent finalement à être pionnier dans l'adoption de l'étrier, de nouveaux systèmes bancaires et de techniques de partenariat à travers l'Ynn.\n\nAprès des années à l'étranger, Trhevyr revint chez lui à [1140.GetName] où il commença la construction du Palais Darantynn pour en faire sa nouvelle demeure, utilisant sa fortune acquise pour financer les travaux et décorer les halls avec une collection d'œuvres d'art elfes lunaires qu'il avait achetées par l'intermédiaire de ses contacts cannoriens."
 ynn_events.201.a:0 "Fascinant, peut-être lui écrirai-je une lettre ou deux."
 ynn_events.201.b:0 "Un palais construit avec la richesse du Monde d'En-Bas, rempli de bibelots du Monde d'En-Bas ? Rasez-le !"

 ynn_events.202.t:0 "Erandil Flèche-Empoisonnée"
 ynn_events.202.d:0 "Erandil était un aventurier et général de [2859.GetName]. Troisième fils de la famille noble yen Cestor, tandis que son frère aîné était formé pour régner et son frère cadet étudiait pour devenir prêtre-du-fleuve, Erandil répondit à l'appel de la nature sauvage, et devint d'abord chasseur, puis aventurier. À l'âge de seize ans, il quitta son foyer avec son cheval-à-bois, son équipement de rôdeur et les bénédictions de sa famille.\n\nAprès avoir parcouru les domaines veykodans pendant deux décennies, Erandil revint chez lui pour aider sa famille qui s'était rangée du côté de Calrodiy V pendant la sanglante Guerre de Succession de Bacaran. Crédité d'avoir renversé le cours de la Bataille du Champ de Lune, les archers [2859.GetAdjective] qu'il commandait étaient déjà tristement célèbres pour leur létalité depuis l'époque de la Guerre d'Alaran, et sous la direction d'Erandil leur renommée s'éleva encore plus haut grâce à de nombreuses victoires contre les armes à feu cannoriennes, un exploit qui poussa les plus riches seigneurs ynniques à courtiser Erandil avec des offres pour qu'il devienne plutôt instructeur pour leurs armées.\n\nFinalement, Erandil partit pour le monde sous les Falaises Méridionales où il passa ses derniers jours, mais c'est une histoire pour une autre fois."
 ynn_events.202.a:0 "Un jour viendra peut-être où l'art de l'arc des elfes faillira, mais ce jour n'est pas venu !"

 ynn_events.203.t:0 "Les Ruines de Domfanynn"
 ynn_events.203.d:0 "En arpentant le terrain de [1856.GetName], une série de ruines a été mise au jour par nos colons. Au début, ils remarquèrent ce qui semblait être des vestiges délabrés d'habitations sous l'argile asséchée, puis ils déterrèrent des éclats de métal et de verre, et finalement ils atteignirent une couche de décombres qui enterrait des sols en mosaïque élaborés de halls autrefois grandioses.\n\nLa nouvelle de la découverte fit rapidement le tour, attirant des gens de toute l'Étendue à la recherche de Reliques Précurseurs. La noblesse ynnique s'impliqua également, offrant une prime pour tout artefact qui leur serait apporté dès que les prospecteurs purent confirmer que les ruines de [1856.GetName] appartenaient en fait à Domfanynn, la mythique capitale perdue des Nés-des-Ruines sardas et leur plus ancienne implantation après la Ruine d'Aelantir.\n\nDe l'ancienne capitale, les vestiges les mieux conservés étaient une paire de flèches de pierre ornées de dômes métalliques qui, bien qu'enfoncées dans un lit de rivière, restaient protégées du courant par des protections magiques de qualité Précurseur. Quant aux artefacts récupérables, la plupart trouvèrent leur chemin vers des seigneurs ynniques aux bourses bien garnies, mais des colons téméraires essayèrent encore d'en écouler certains comme des Reliques Précurseurs auprès des Cannoriens, leur valant le nom de Fausses Reliques Précurseurs."
 ynn_events.203.a:0 "Des ruines presque Précurseurs… mais pas tout à fait."
 ynn_events.203.b:0 "Contrairement à Domfanynn, Elathael résistera à l'épreuve du temps."
 ynn_events.203.c:0 "Un chaînon manquant entre les Sardas modernes et l'ère précédente."

 ynn_events.204.t:0 "Les Ruines de Mara Luar"
 ynn_events.204.d:0 "« Après avoir erré dans [mara_luar_prov.GetName] pendant des jours avec seulement des herbes folles et des oiseaux-tonnerre en vue, le vieil elfe a crié qu'il voyait des murailles de ville au loin. On pensait qu'il avait perdu la tête, qui diable irait mettre des murs au milieu de nulle part ? Mais, que je sois pendu, il avait raison. Notre chariot s'est approché, et nous avons aperçu un périmètre d'honnêtes murailles de pierre. Personne n'était à l'intérieur, tout n'était que ruines, et elles ne protégeaient aucun bâtiment non plus, à part un poste de garde attenant.\n\nNous avons trouvé un puits, et une inscription en langue dolindhane. Mara Luar - Eau de Brume. C'est ainsi que nous avons commencé à appeler cet endroit, et nous pensons tenter notre chance ici. Construire quelques maisons et saloons, réparer les murs, fonder une ville… Parce que quand des cavaliers epednars ou des voisins turbulents viennent frapper, ça réconforte d'être entouré de murs qui se dressent ici depuis Dieu sait combien de temps. »\n\n-Journal d'un Colon"
 ynn_events.204.a:0 "Un nouveau chapitre commence pour le vieil avant-poste."

 ynn_events.205.t:0 "Un Mage de l'Académie de Rzenta"
 ynn_events.205.d:0 "Aujourd'hui, un visiteur remarquable vêtu de robes et brandissant une baguette de bois s'est présenté devant le [Root.Monarch.GetTitle] [Root.Monarch.GetName], offrant ses services.\n\nBien que de nombreux manipulateurs de magie existent à travers l'Ynn, comme les mages des moissons de Stantirshalas et les Lames-du-Fleuve lanceurs d'eau de Vels Bacar, les études magiques qu'ils mènent sont le plus souvent secondaires par rapport à leur compétence principale et il est donc difficile d'évaluer leur véritable puissance et leur savoir. Le mage qui se tient devant [Root.Monarch.GetName] aujourd'hui, cependant, possède la preuve d'avoir étudié à l'Académie de Rzenta, une institution magique établie à l'époque impériale à la frontière des forêts infestées de fées au nord-ouest de Dolindha.\n\nUn mage approuvé par l'académie n'est pas un amuseur de foire, ayant passé des études rigoureuses sous la direction de professeurs talentueux pour être approuvé par la faculté. Ce mage serait d'une grande aide aussi bien pour l'administration que pour les efforts de guerre."
 ynn_events.205.a:0 "Ses sortilèges aideront notre administration."
 ynn_events.205.b:0 "Que nos ennemis tremblent !"
 ynn_events.205.c:0 "Nous n'avons pas besoin de ses services."

 ynn_events.206.t:0 "Fausses Rumeurs Venues de [1140.GetName]"
 ynn_events.206.desc:0 "Les gens ont murmuré… et ils ont murmuré sans cesse, car leurs paroles ont fini par atteindre le [Root.Monarch.GetTitle] [Root.Monarch.GetName], avec des effets pour le moins déplaisants. Comment quiconque peut-il concevoir, croire, répéter de telles calomnies ?\n\nSelon nos agents, nous devrions demander aux habitants de [1140.GetName] de répondre à cela, car ils ont été les principaux acteurs de la propagation de ces mensonges. La ville de [1140.GetName] a une histoire en tant que capitale des commérages de l'Ynn, et même le Divin Fleuve n'est pas assez puissant pour empêcher les rumeurs sans fondement de traverser du nord au sud, d'est en ouest, bien qu'on puisse au moins espérer que quand viendra l'heure des comptes, tous ceux qui ont participé à de telles faussetés sans prudence ni remords seront engloutis par ses marées purificatrices."
 ynn_events.206.a:0 "Mes informateurs à [1140.GetName] ont déjà fait en sorte que leurs mensonges se retournent contre eux."
 ynn_events.206.b:0 "COMMENT OSENT-ILS ?!?"
 ynn_events.206.c:0 "Les bavardages des marchands ne concernent pas les gens d'honneur."
 ynn_events.206.d:0 "Finançons nos réseaux d'espions pour mieux combattre de tels récits."
 ynn_events.206.e:0 "Ces rumeurs… ne sont pas sans fondement."
 ynn_206_a_tt:0 "Chaque pays de l'§YYnn§! : gagne §R5§! de Méfiance envers §Y[G85.GetName]§!."
 ynn_206_b_tt:0 "Chaque pays de l'§YYnn§! : gagne §R10§! de Méfiance envers §Y[Root.GetName]§!."
 ynn_206_c_tt:0 "Chaque pays de l'§YYnn§! : 50 % de chances de gagner §R5§! de Méfiance envers §Y[Root.GetName]§!."
 ynn_206_e_tt:0 "Chaque pays de l'§YYnn§! : gagne §R5§! de Méfiance envers §Y[Root.GetName]§!."

 ynn_events.207.t:0 "Héros Aspirant en Potraga"
 ynn_events.207.desc:0 "Un bruissement de rumeurs a couvé à travers [Root.GetName]. Bientôt les rumeurs chuchotées se sont transformées en récits : bêtes et bandits occis, duels audacieux et bonnes actions, trésors découverts et fermiers aidés, tout cela centré autour d'un individu, qui a enfin fait son apparition officielle.\n\nOriginaire des forêts profondes de [2813.GetName], ce jeune individu est à peine un homme par l'âge. Pourtant il a prouvé être un homme par ses actes, réussissant brillamment la tradition connue des villageois de son pays natal sous le nom de « Potraga », où tout mâle de 16 ans part pour un voyage solitaire pour découvrir le monde et ses habitants. Et pendant ce voyage, il est venu dans le royaume du [Root.Monarch.GetTitle] [Root.Monarch.GetName] et a accompli de nombreux exploits, assez pour être connu comme un héros et obtenir une audience à la cour de [Root.Capital.GetName], où le public, et certainement le héros lui-même également, s'attend à voir le [Root.Monarch.GetTitle] le louer et le récompenser pour sa bravoure et son talent."
 ynn_events.207.a:0 "Ce héros pourrait instruire toute notre armée !"
 ynn_events.207.b:0 "Il nous servirait mieux en terrassant nos ennemis sur le champ de bataille."
 ynn_events.207.c:0 "Servir ? Il devrait plutôt épouser l'une de nos princesses !"
 ynn_events.207.d:0 "Épousez-moi !"
 ynn_events.207.e:0 "Vous avez peut-être la faveur des paysans, mais la guerre et le règne ne sont pas l'affaire des garçons."

 #Zodiac Animal Events

 ynn_events.300.t:0 "Le Roi du Stuir Balia"
 ynn_events.300.d:0 "Les Serpents d'Eau qui nagent sous l'Ynn sont des créatures stupéfiantes, dont les plus grands seraient plus longs que les affluents mêmes du Fleuve Ynn et plus anciens que le Déluge Final.\n\nUne telle aura de profondeur n'empêche pas la jeunesse dans toute sa vigueur présomptueuse d'essayer de plaisanter avec eux : un groupe de garçons de ferme, au nombre de 26, transporte un serpent d'eau de 7 mètres de long à travers la campagne tout en chantant à tue-tête sur leur force. La créature, qui a eu le malheur d'échouer sur le rivage, se tortille encore dans la prise des garçons tandis qu'ils approchent des portes de [Root.Capital.GetName] ; là ils expliquent à moitié sérieusement aux gardes que cette créature leur a été donnée par le Saint Fleuve, et qu'ils veulent la faire défiler devant le [Root.Monarch.GetTitle] [Root.Monarch.GetName] pour les célébrations du Stuir Balia du Serpent d'Eau, afin qu'[Root.Monarch.GetSheHe] puisse la nommer Roi du Stuir Balia et lui accorder un bassin royal digne de son statut.\n\nEntendant cela presque instinctivement, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] selle [Root.Monarch.GetHerHis] cheval et galope vers les portes. Il suffit d'un regard sur la créature pour que [Root.Monarch.GetName] sache quelle sera [Root.Monarch.GetHerHis] réponse :"
 ynn_events.300.a:0 "Bien joué ! Vous m'honorez véritablement avec ce présent."
 ynn_events.300.b:0 "Par l'amour du Fleuve, RAMENEZ-LE !"

 ynn_events.301.t:0 "Un Serpent d'Eau Fait Surface !"
 ynn_events.301.d1:0 "Tandis que notre souverain défunt effectue son ultime voyage le long du sacré Fleuve, un grand Serpent d'Eau émerge des profondeurs pour accompagner la barge. Ses écailles miroitant de vert vif, de bleu et d'or, avec des parties de son corps couvertes de bernacles fluviales et d'herbes d'eau douce, il fixe d'un regard ancien les bateaux et la faune de passage, un avertissement de rester à l'écart.\n\nSon corps plus long que la plus opulente des barges, certains témoins ont prétendu pouvoir voir sa queue s'étirer loin à l'horizon passé les méandres du grand Fleuve. Après avoir escorté la barge pendant quelques jours, le serpent souffle un dernier jet d'eau brillante dans les airs au-dessus de la barge, comme un prêtre administrant une bénédiction, avant de replonger dans les profondeurs."
 ynn_events.301.d2:0 "Tandis que la barge du souverain défunt descend l'Ynn, un grand serpent d'eau émerge rugissant des profondeurs. Les témoins frissonnent de peur en décrivant comment la bête massive s'est élevée au-dessus de l'eau plus haut qu'un mur de château avant de plonger et d'avaler la barge entière et notre cher monarque avec !"
 ynn_events.301.a:0 "Le Fleuve honore le passage d'un grand monarque !"
 ynn_events.301.b:0 "Quelle horreur ! Quelle disgrâce !"

 ynn_events.302.t:0 "Une Loutre Happeuse de Compagnie ?"
 ynn_events.302.desc:0 "La loutre happeuse est l'un des seize animaux du Zodiaque Ynnique. Elles sont connues pour leur bon caractère et leur intelligence, et de nombreux Sardas dressent des loutres happeuses pour les aider à pêcher, de manière similaire aux chiens de chasse.\n\nUn elfe-pêcheur du royaume du [Root.Monarch.GetTitle] [Root.Monarch.GetName] a réussi à dresser une loutre si remarquable qu'on en parle à plusieurs villes de distance. Après qu'un baron local ait vu l'animal en action et commenté qu'un animal de compagnie si talentueux ferait un présent même pour un [Root.Monarch.GetTitle], le pêcheur a décidé de voyager jusqu'à [Root.Capital.GetName] pour présenter la loutre à son suzerain en cadeau."
 ynn_events.302.a:0 "Merci, mon brave. Je la nommerai Vydra !"
 ynn_events.302.b:0 "Merci, noble citoyen. Je la nommerai Bedopan !"
 ynn_events.302.c:0 "Un animal bien dressé, je la nommerai Tarka !"
 ynn_events.302.d:0 "Ma foi, je ne peux pas dire non, j'appellerai le petit Mijbil, vous voyez !"
 ynn_events.302.e:0 "Drôle de petit compagnon, tu seras Portlynn"
 ynn_events.302.f:0 "Très bien mon brave. Je l'appellerai Otto !"
 ynn_events.302.g:0 "Merci, je la nommerai Viyokienik !"
 ynn_events.302.h:0 "Merci, inconnu aléatoire. Je la nommerai Lovoc !"
 ynn_events.302.i:0 "Vous faites honneur à votre [Root.Monarch.GetTitle]. Je la nommerai Rhulynn."
 ynn_events.302.j:0 "Ysther, un nom digne d'une bête gracieuse !"
 ynn_events.302.k:0 "Elle s'appellera Vynnix !"

 ynn_events.303.t:0 "Une Joyeuse Partie de Pêche"
 ynn_events.303.d:0 "Le [Root.Monarch.GetTitle] part souvent en excursions de pêche avec [Root.Monarch.GetHerHis] loutre de compagnie bien-aimée ; ce jour-là [Root.Monarch.GetSheHe] a décidé d'emmener quelques membres de la cour. Bien que n'ayant pas visité les bons coins de pêche, de peur que les vêtements ne soient endommagés par le terrain accidenté, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a tout de même reçu une prise que toute la cour mettrait des jours à consommer. Tout le groupe s'est déclaré profondément impressionné par l'efficacité et l'espièglerie de la démonstration de la loutre, et ils sont revenus à [Root.Capital.GetName] bien plus joyeux qu'à leur départ."
 ynn_events.303.a:0 "Qui est le meilleur chasseur de l'Ynn ? C'est toi !"

 ynn_events.304.t:0 "La Mort d'un Champion"
 ynn_events.304.d:0 "La tragédie frappe les halls de [Root.Capital.GetName] car la loutre de compagnie bien-aimée du [Root.Monarch.GetTitle] est décédée. Le chagrin est grand chez beaucoup : les courtisans qui appréciaient la légèreté de son espièglerie, les cuisiniers qui préparaient le poisson qu'elle attrapait, les elfes-pêcheurs qui accompagnaient le [Root.Monarch.GetTitle] et lui enseignaient leurs arts, et la population de [Root.Capital.GetName] qui en plusieurs occasions a reçu les masses de poissons restant des contributions de la loutre aux festins de [Root.Monarch.GetName]. Mais le plus grand chagrin revient au [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.GetHerHim]-même, qui a perdu la compagnie du plus fidèle et loyal des amis."
 ynn_events.304.a:0 "Bientôt la plus petite des barges commencera son voyage."
 ynn_events.304.b:0 "Attends-moi mon ami, et nous nous accompagnerons lors de nos ultimes voyages."

 ynn_events.305.t:0 "Village Submergé par des Castors Géants"
 ynn_events.305.d:0 "Bien que la présence d'animaux sauvages près des habitations puisse souvent être interprétée comme un bon présage par les elfes ynniques, les habitants de la province de [ynn_giant_beaver_attack.GetName] ont dû y réfléchir à deux fois. Une famille de castors, des castors géants pour être précis, s'est établie à une courte marche en amont d'un village, vivant en paix avec les habitants locaux pendant un temps… jusqu'à ce que les castors géants construisent un barrage qui détourna un cours d'eau, le faisant se déverser dans le village voisin.\n\nDans l'inondation qui s'ensuivit, le village autrefois heureux fut transformé en un ensemble d'étangs tandis que d'honnêtes gens, par un cruel caprice du destin, se retrouvèrent sans abri à cause de l'eau même qui alimente leur divin Fleuve Ynn."
 ynn_events.305.a:0 "L'eau détruit, mais aussi crée. Lançons un effort de reconstruction !"
 ynn_events.305.b:0 "Je ne suis pas obligé de payer pour chaque rongeur qui déplace une brindille, n'est-ce pas ?"

 ynn_events.306.t:0 "Un Cochon Ynnéen de Compagnie ?"
 ynn_events.306.d:0 "Couvert de fourrure et de taille diminutive, le Cochon Ynnéen est un animal de compagnie populaire parmi les classes supérieures ynniques. Il n'appartient pas à la même famille que les porcs, c'est en fait un rongeur (en fait, la partie « Cochon » du nom est une invention cannorienne, chez les Ynniques il est connu sous le nom de « Kui » d'après le bruit qu'il fait) ; malgré tout, cet animal possède la même voracité que les porcs et préfère fortement vivre en groupe, rendant son entretien moins bon marché qu'on ne le prédirait initialement. On dit aussi qu'il possède des pouvoirs de guérison purifiant ceux qui sont près de lui.\n\nAujourd'hui le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a approché un marchand d'animaux en passant par les marchés [Root.Capital.GetAdjective], et [Root.Monarch.GetHerHis] regard a été attiré par un spécimen particulièrement amical. Est-il temps d'acheter un animal de compagnie ?"
 ynn_events.306.a:0 "Ma foi, je prendrai bien soin de cet animal !"
 ynn_events.306.b:0 "Malheureusement, je n'ai jamais eu de passion pour les petites créatures poilues."

 ynn_events.307.t:0 "Renard à Queue Blanche Aperçu !"
 ynn_events.307.d:0 "« Un renard ! J'ai vu un renard ! » est devenu un cri commun à travers la province de [ynn_whitetail_prov.GetName], après qu'un renard à queue blanche ait créé sa tanière près d'un village local, pour le plus grand bonheur des habitants. La légende dit que lorsque les premiers elfes erraient sur la terre après que le Déluge Final eut purifié le monde, tout le monde était incertain de ce qu'il fallait faire jusqu'à ce qu'un renard approche les gens et leur enseigne comment reconstruire la société.\n\nMaintenant, de nouveaux visages rejoignent le village de [ynn_whitetail_prov.GetName] et ses habitants travaillent à un rythme plus vif qu'avant, et qui peut dire si c'est l'influence du renard à l'œuvre ou une simple superstition jouant en notre faveur ?"
 ynn_events.307.a:0 "Que dit le renard ?"

 ynn_events.308.t:0 "Komenvecer"
 ynn_events.308.d:0 "Komenvecer ou « Dîner de Pierre » désigne un dîner ou une festivité où divers fruits de mer sont présentés, avec comme plat principal un grand plateau de Poisson de Pierre dont tous les convives sont censés prendre un morceau. Généralement organisé vers le milieu du Stuir Balia du Poisson de Pierre, le Komenvecer peut également être organisé lorsqu'il y a une grosse prise de poisson ou chaque fois que le seigneur local en a envie.\n\nEt naturellement, quand c'est quelqu'un d'aussi puissant que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] qui organise un Komenvecer pour ses nobles Iosahar, on peut s'attendre à ce que les fruits de mer soient à la fois abondants et délicieux !"
 ynn_events.308.a:0 "Il est temps de se régaler !"
 ynn_events.308.b:0 "Je dois m'excuser."

 ynn_events.309.t:0 "Un Komenvecer Réussi"
 ynn_events.309.d:0 "Les Iosahar rient amicalement tandis qu'ils font leurs adieux au [Root.Monarch.GetTitle] [Root.Monarch.GetName] à la fin du Komenvecer, se levant de la large table de banquet où ne restent que des assiettes vides. Certains Iosahar sont ivres, mais pas de nourriture bien sûr, plutôt de vin. Tous ont été impressionnés par les talents culinaires des chefs de [Root.GetName] et la finesse du personnel de cuisine trié sur le volet du [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 ynn_events.309.a:0 "Recommençons l'année prochaine !"

 ynn_events.310.t:0 "Un Komenvecer Suspect"
 ynn_events.310.d:0 "Vous auriez juré que le Poisson de Pierre avait un drôle de goût un moment, mais vous ne vouliez pas inquiéter les autres convives qui semblaient absorbés par le festin. Maintenant, quelques semaines ont passé, et vous avez appris la nouvelle de nombreux Iosahar [Root.GetAdjective] souffrant de douleurs d'estomac et de fièvres. Bien que personne n'accuserait le [Root.Monarch.GetTitle] [Root.Monarch.GetName] d'en être responsable, beaucoup soupçonnent que l'intoxication alimentaire avait un certain degré de corrélation avec [Root.Monarch.GetHerHis] récent festin."
 ynn_events.310.a:0 "Espérons qu'il n'arrive rien de grave au [Root.Monarch.GetTitle] [Root.Monarch.GetName]."

 ynn_events.311.t:0 "Rivalité Entre Ciel et Eau"
 ynn_events.311.desc:0 "Un barrage incessant de pluie et de tonnerre s'est abattu sur la province de [ynn_thunderdome_prov.GetName] ces dernières semaines, dans ce que les locaux ont juré n'être pas une simple tempête. Nos agents ont enquêté et ont découvert que c'était la vérité : les précipitations et les éclairs sont en fait les coups vicieux de deux créatures, un Oiseau-Tonnerre et un Lynx Subaquatique, enfermées dans un combat acharné à mort à en juger par la sévérité de leurs attaques.\n\nNous pouvons dire aux habitants de [ynn_thunderdome_prov.GetName] de rester à l'abri dans leurs maisons le temps qu'il faut pour qu'un des combattants batte l'autre, cependant les dégâts causés par le temps qui empire constamment pourraient bien s'avérer désastreux d'ici là. Pour mettre fin à cela plus rapidement, nous connaissons des rituels qui peuvent apaiser les créatures zodiacales et restaurer l'équilibre, cependant ceux qui les exécutent courront un grand risque, car ils devront approcher l'œil même de la tempête tandis que les créatures échangent leurs coups."
 ynn_events.311.a:0 "Mieux vaut ne pas interférer dans des combats surnaturels."
 ynn_events.311.b:0 "Exécutons un rituel pour apaiser les créatures ! C'est le seul moyen d'éviter le désastre !"
 ynn_events.311.c:0 "Demandons conseil aux druides veykodans."
 ynn_events.311.d:0 "Invoquons l'aide des chamans epednars."

 ynn_events.312.t:0 "Apprivoiser un Cheval-à-Bois Sauvage"
 ynn_events.312.d:0 "Notre [Root.Monarch.GetTitle] semblait inhabituellement en retard de retour de [Root.Monarch.GetHerHis] dernière partie de chasse, mais juste au moment où les courtisans commençaient à s'inquiéter, le voilà qui apparaît à l'horizon, et sur une nouvelle monture. Un cheval-à-bois d'une taille massive, bien plus que votre destrier de guerre habituel, trotte le long de la route qui mène à [Root.Capital.GetName], portant le [Root.Monarch.GetTitle] [Root.Monarch.GetName] sur son dos rugueux.\n\nArrivant aux portes de [Root.Capital.GetName] devant une rangée de gardes impressionnés et de paysans effrayés, le souverain descend adroitement le long du flanc de la créature et lui fait ses adieux pour l'instant, tandis que le cheval commence sa marche vers un bosquet voisin ; les portes et les rues n'étaient tout simplement pas assez grandes pour lui de toute façon."
 ynn_events.312.a:0 "La faveur d'un cheval-à-bois sauvage est un grand signe de prestige !"
 ynn_events.312.b:0 "La terre tremblera, et nos ennemis aussi."

 ynn_events.313.t:0 "Une Bête Mystérieuse Coule des Canoës"
 ynn_events.313.d:0 "D'étranges rapports arrivent de [river_monster_prov.GetName] ! Bien qu'il soit assez courant que des navires, canoës, barques et tout autre vaisseau osant traverser l'Ynn soient coulés par les bêtes sous sa surface, il est inhabituel qu'une telle bête coule plusieurs vaisseaux de manière constante. Il est extrêmement rare qu'une bête aussi vicieuse reste dans une zone, mais le serpent fluvial de [river_monster_prov.GetName], que les locaux ont craintivement surnommé Drelvrydal, semble effectivement bloquer pratiquement la province avec ses attaques sur tous les vaisseaux qui quittent son port. Le peuple s'est tourné vers son [Root.Monarch.GetTitle] pour obtenir de l'aide afin d'éliminer le monstre."
 ynn_events.313.a:0 "Traquons cette satanée chose !"
 ynn_events.313.b:0 "Nous n'avons même aucune méthode pour la capturer"

 ynn_events.314.t:0 "La Bête est Capturée !"
 ynn_events.314.d:0 "Malgré les doutes concernant la capacité des hommes compétents envoyés pour tuer le monstre de [river_monster_prov.GetName], le redouté « Drelvrydal », les braves marins ont réussi à attraper et tuer la bête. Bien qu'ils aient subi de lourdes pertes, et certains osent même prétendre qu'un mystérieux Chevalier de Pagaie a fait tout le vrai travail plutôt que les propres soldats du [Root.Monarch.GetTitle], c'est avec fierté que nous entendons les récits de la carcasse de la bête défilant à travers les villes et villages."
 ynn_events.314.a:0 "Je vous avais dit que ce serait facile"

 ynn_events.315.t:0 "L'Insaisissable Drelvrydal"
 ynn_events.315.d:0 "Il déchire les filets ! Il fracasse les canoës de pêche ! Il entraîne les harponneurs dans les profondeurs, emportant parfois des navires entiers avec eux ! Le redouté monstre de [river_monster_prov.GetName] semble être complètement insaisissable, malgré les meilleurs efforts des hommes du [Root.Monarch.GetTitle]. Les habitants ont commencé à murmurer que c'est un signe que le fleuve ne nous favorise pas, un inconvénient mineur comparé aux conséquences économiques d'un tronçon de fleuve dépourvu de vaisseaux de transport."
 ynn_events.315.a:0 "Arrêtez de couler mes foutus navires !"

 ynn_events.991.t:0 "Les Nombreuses Couleurs de l'Ynn"
 ynn_events.991.d:0 "L'Ynn est une région où les seigneuries sont largement subjuguées plutôt qu'annexées. Nos cartographes ont eu l'idée innovante que nous pourrions colorer les seigneuries subjuguées par d'autres de la même couleur que leur suzerain, afin qu'elles puissent être facilement reconnues comme la même entité. D'autres soutiennent que cela rendrait plus difficile de voir les frontières des seigneuries au fil du temps, et insistent pour que les couleurs restent séparées."
 ynn_events.991.a:0 "Faites-les de la même couleur."
 ynn_events.991.b:0 "Donnez à chaque seigneurie une couleur différente."
 ynn_events.991.c:0 "Faites-les de la même couleur, sauf s'ils ne sont pas des Élus comme nous."
 #tooltips for above event
 change_colour_iosahars_tt:0 "§TLes Iosahars prendront la couleur de leur suzerain.§!"
 dont_change_colour_iosahars_tt:0 "§TLes Iosahars garderont leur propre couleur plutôt que de prendre celle de leur suzerain.§!"
 only_cannorian_change_colour_iosahars_tt:0 "§TLes Iosahars ynniques prendront la couleur de leur suzerain, mais tous les autres Iosahars garderont leur propre couleur.§!"
 #Authority Events

 ynn_authority_events.100.t:0 "Le Stuir Balia - Bons Présages !"
 ynn_authority_events.100.d:0 "Tous les deux ans, le Grand Fleuve Ynn déborde de ses rives en raison de la fonte des glaces et des fortes tempêtes de printemps et d'été plus en amont. Deux ans plus tard, les glaciers dans les collines et les montagnes à la source du fleuve gèlent à nouveau et les eaux se retirent. Toute vie est engendrée par l'Ynn, et cette crue régulière donne aux élus du Fleuve un calendrier prévisible pour nos saisons de récolte. Nous plantons juste après la décrue et nous récoltons juste avant la prochaine crue. Le Stuir Balia, le début d'un nouveau cycle, est enfin arrivé.\n\nCette fois cependant, le fleuve apporte avec lui non seulement la nouvelle saison de plantation mais un présent généreux. Avec les courants impétueux est venue une toute nouvelle couche de limon, pleine de minéraux vitaux et de nutriments pour rendre notre prochaine récolte abondante. Notre peuple célèbre la bonté du Grand Fleuve et attend avec impatience la récolte de l'année prochaine."
 ynn_authority_events.100.a:0 "Gloire au Grand Fleuve !"

 ynn_authority_events.101.t:0 "Le Stuir Balia - Année Normale"
 ynn_authority_events.101.d:0 "Tous les deux ans, le Grand Fleuve Ynn déborde de ses rives en raison de la fonte des glaces et des fortes tempêtes de printemps et d'été plus en amont. Deux ans plus tard, les glaciers dans les collines et les montagnes à la source du fleuve gèlent à nouveau et les eaux se retirent. Toute vie est engendrée par l'Ynn, et cette crue régulière donne aux élus du Fleuve un calendrier prévisible pour nos saisons de récolte. Nous plantons juste après la décrue et nous récoltons juste avant la prochaine crue. Le Stuir Balia, le début d'un nouveau cycle, est enfin arrivé.\n\nCette année a été semblable à tous les autres cycles. Le sol laissé dans le sillage de l'Ynn, bien que pas extrêmement fertile, est assez fertile pour nourrir notre peuple. Aujourd'hui nous remercions le Fleuve pour sa généreuse bonté et espérons un autre cycle réussi la prochaine fois."
 ynn_authority_events.101.a:0 "Gloire au Grand Fleuve"

 ynn_authority_events.102.t:0 "Le Stuir Balia - Année Médiocre"
 ynn_authority_events.102.d:0 "Tous les deux ans, le Grand Fleuve Ynn déborde de ses rives en raison de la fonte des glaces et des fortes tempêtes de printemps et d'été plus en amont. Deux ans plus tard, les glaciers dans les collines et les montagnes à la source du fleuve gèlent à nouveau et les eaux se retirent. Toute vie est engendrée par l'Ynn, et cette crue régulière donne aux élus du Fleuve un calendrier prévisible pour nos saisons de récolte. Nous plantons juste après la décrue et nous récoltons juste avant la prochaine crue. Le Stuir Balia, le début d'un nouveau cycle, est enfin arrivé.\n\nMalheureusement, les eaux de crue ont été plus basses que d'habitude. Cela signifie que la récolte du prochain cycle sera maigre et la famine suivra certainement. Qu'avons-nous fait pour mériter cela ? Déjà les gens se montrent du doigt les uns les autres. Les temps à venir seront assurément difficiles pour les élus de l'Ynn."
 ynn_authority_events.102.a:0 "Espérons que nous avons assez de nourriture en réserve."

 ynn_authority_events.103.t:0 "Des [Root.GetNobilityName] Heureux Célèbrent le [Root.Monarch.GetTitle] [Root.Monarch.GetName] !"
 ynn_authority_events.103.d:0 "Aujourd'hui [Root.Monarch.GetName] a assisté à un festin organisé par les [Root.GetNobilityName]. Tandis que certains des confidents les plus prudents de notre monarque se méfiaient d'un événement aussi inhabituellement organisé, notre bienveillant dirigeant s'est empressé d'apaiser leurs craintes et d'assister au festin. À la grande surprise de ces mêmes confidents, le festin s'est révélé être une joyeuse réjouissance avec beaucoup de boisson, d'histoires racontées et de ballades ivres entonnées à tue-tête. Ceux du cercle intime de notre dirigeant l'ont rarement vu aussi heureux que ce jour-là. Le lendemain matin, notre dirigeant a quitté le festin avec de nombreux nouveaux amis."
 ynn_authority_events.103.a:0 "Un grand moment pour tous !"

 ynn_authority_events.104.t:0 "Des [Root.GetNobilityName] Mécontents Se Rallient Contre le [Root.Monarch.GetTitle] [Root.Monarch.GetName] !"
 ynn_authority_events.104.d:0 "Un grand groupe de [Root.GetNobilityName] menace de se révolter si leurs demandes pour plus d'influence au sein de la structure du pouvoir du pays ne sont pas satisfaites. Ces [Root.GetNobilityName] estiment que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a négligé [Root.Monarch.GetHerHis] devoirs de maintenir le statut élevé et les privilèges uniques des [Root.GetNobilityName], tels qu'ils leur ont été accordés par nos lois."
 ynn_authority_events.104.a:0 "Ils ont raison, malheureusement."
 ynn_authority_events.104.b:0 "Il faudra me passer sur le corps !"

 ynn_authority_events.105.t:0 "Les Marchands Remercient l'État !"
 ynn_authority_events.105.d:0 "Les marchands de [Root.GetAreaName] se sentent soutenus par le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et offrent une contribution supplémentaire en plus de leurs impôts normaux."
 ynn_authority_events.105.a:0 "Que l'Ynn bénisse leurs cœurs généreux !"

 ynn_authority_events.106.t:0 "Des Marchands Ignorent Ouvertement Nos Lois !"
 ynn_authority_events.106.d:0 "Les marchands de [ynn_lawless_merchant_prov.GetName] ont délibérément évité nos intendants et leurs escortes, dans une tentative bien trop réussie de contourner nos lois et de saper notre autorité. Naturellement, cela ne peut rester impuni : même si ces marchands rusés pourraient fournir une grande croissance économique à [ynn_lawless_merchant_prov.GetName], cela peint de manière inacceptable notre gouvernement comme faible et insignifiant, sur nos propres terres, sans parler du reste de l'Ynn. L'ordre à [ynn_lawless_merchant_prov.GetName] doit donc être restauré."
 ynn_authority_events.106.a:0 "Qu'ils présentent leurs excuses à nos intendants !"
 ynn_authority_events.106.b:0 "Bah, des marchands, que pourraient-ils me faire ?"

 ynn_authority_events.107.t:0 "Un Baron Abusif Provoque une Révolte Paysanne !"
 ynn_authority_events.107.d:0 "Une révolte paysanne a été provoquée par un baron abusif qui a surimposé ses sujets au point de les affamer ! Les paysans affamés sont disposés à négocier avec notre [Root.GovernmentName] si le baron en question est destitué."
 ynn_authority_events.107.a:0 "Nous n'avons que faire de paysans si exigeants !"
 ynn_authority_events.107.b:0 "Asseyons-nous et regardons les événements se dérouler."
 ynn_authority_events.107.c:0 "Ces paysans affamés auront ce qu'ils demandent !"

 ynn_authority_events.108.t:0 "Un Bandit Imite Rhovynuc !"
 ynn_authority_events.108.d:0 "Un groupe de nobles très prestigieux et autrefois très riches vient vous signaler qu'un brigand de [ynn_rhovynuc_prov.GetName] les a pris pour cible, eux et leur fortune. Ce bandit semble croire qu'il est la réincarnation de Rhovynuc, le roi des bandits du IXe siècle qui volait la noblesse puis donnait ses gains mal acquis à la paysannerie. Le faux prétendant suit malheureusement les mêmes pratiques que son infâme prédécesseur et continue de dérober aux plus importants de notre royaume, avec l'intention de décharger sa nouvelle richesse sur la paysannerie… Pour aggraver les choses, la garnison locale est complètement dépassée par « Rhovynuc » et sa grande cohorte de bandits. Les nobles sont donc venus demander qu'une armée soit levée et envoyée à [ynn_rhovynuc_prov.GetName] pour arrêter ce transfert de richesse non consenti."
 ynn_authority_events.108.a:0 "Arrêtez-le avant qu'il ne s'en prenne à nous aussi !"
 ynn_authority_events.108.b:0 "Voler des nobles ? Rhovynuc, mon ami !"

 ynn_authority_events.109.t:0 "Rhovynuc Dévalise Notre Percepteur"
 ynn_authority_events.109.d:0 "Dans un événement pas si imprévisible, Rhovynuc a pris l'un de nos percepteurs pour cible, malheureusement, ce percepteur spécifique venait de terminer sa tournée à [ynn_rhovynuc_prov.GetName]. Il revenait vers la capitale transportant de nombreuses pièces d'or lorsqu'il a été dévalisé. Le pauvre percepteur ne possède plus une seule pièce de métal, précieuse ou non. Dans un acte supposé de représailles, même sa boucle de ceinture en fer et son alliance lui ont été prises."
 ynn_authority_events.109.a:0 "Au moins j'ai encore ma ceinture."

 ynn_authority_events.150.t:0 "Les Iosahar Célèbrent le Règne du [Root.Monarch.GetTitle] [Root.Monarch.GetName]"
 ynn_authority_events.150.d:0 "Aujourd'hui nos vassaux Iosahar se sont rassemblés avec notre souverain sur leur propre suggestion pour une fois. Ils semblent avoir commencé à déborder d'amour pour notre bienveillant [Root.Monarch.GetTitle] et [Root.Monarch.GetHerHis] politiques clairvoyantes. Dans ce qu'ils nous assurent n'être qu'une faible démonstration des vraies profondeurs de leur amour, ils ont organisé une grande chasse, suivie d'un festin tout aussi grandiose.\n\nLa chasse a duré près de 3 heures et au moment où le groupe est revenu au campement, ils avaient amplement de viande à manger. Le festin qui s'ensuivit n'est pas près d'être oublié : l'alcool coulait comme le puissant Ynn et tous les elfes rassemblés ont bu leur content et bien plus encore. Au lever du soleil le lendemain, notre puissant souverain gisait évanoui entouré de [Root.Monarch.GetHerHis] loyaux Gardiens du Serment."
 ynn_authority_events.150.a:0 "J'adore avoir de bons amis"

 ynn_authority_events.151.t:0 "[ynn_overtaxed_iosahar.GetName] Se Plaint des Impôts Élevés"
 ynn_authority_events.151.d:0 "Le [ynn_overtaxed_iosahar.Monarch.GetTitle] [ynn_overtaxed_iosahar.Monarch.GetName] de [ynn_overtaxed_iosahar.GetName] vient à notre cour cherchant à faire réduire [ynn_overtaxed_iosahar.Monarch.GetHerHis] obligations fiscales féodales. [ynn_overtaxed_iosahar.Monarch.GetSheHeCap] semble déterminé dans cette démarche et aura un sérieux différend avec le [Root.Monarch.GetTitle] [Root.Monarch.GetName] si [ynn_overtaxed_iosahar.Monarch.GetHerHis] demandes ne sont pas satisfaites."
 ynn_authority_events.151.a:0 "[ynn_overtaxed_iosahar.Monarch.GetSheHeCap] fait une demande raisonnable."
 ynn_authority_events.151.b:0 "Non ! [ynn_overtaxed_iosahar.Monarch.GetSheHeCap] me paie déjà moins qu'un ouvrier agricole !"

 ynn_authority_events.152.t:0 "[ynn_levy_iosahar.GetName] Offre des Levées"
 ynn_authority_events.152.d:0 "Le [ynn_levy_iosahar.Monarch.GetTitle] [ynn_levy_iosahar.Monarch.GetName] de [ynn_levy_iosahar.GetName] a été saisi d'enthousiasme pour notre guerre, pour une raison interdite par le fleuve. Aussi [ynn_levy_iosahar.Monarch.GetSheHe] nous a offert un grand nombre d'hommes au-delà de [ynn_levy_iosahar.Monarch.GetHerHis] obligations normales de levée pour renforcer nos rangs. Les accepter dépeindrait le [Root.Monarch.GetTitle] [Root.Monarch.GetName] comme un monarque si faible qu'[Root.Monarch.GetSheHe] doit compter sur la générosité de [Root.Monarch.GetHerHis] sujets pour gagner [Root.Monarch.GetHerHis] batailles. Que faire ?"
 ynn_authority_events.152.a:0 "Plus de soldats, dites-vous ?"
 ynn_authority_events.152.b:0 "La charité est pour les mendiants, pas pour les seigneurs !"

 ynn_authority_events.153.t:0 "[ynn_whiny_iosahar.GetName] Proteste Contre la Guerre Prolongée"
 ynn_authority_events.153.d:0 "Le [ynn_whiny_iosahar.Monarch.GetTitle] de [ynn_whiny_iosahar.GetName] a ignoré nos ordonnances en signe de protestation contre la longue et dévastatrice guerre dans laquelle nous avons forcé leur implication."
 ynn_authority_events.153.a:0 "Ça va barder !"

 ynn_authority_events.154.t:0 "Organiser un Tournoi de Joute ?"
 ynn_authority_events.154.desc:0 "L'opportunité s'est présentée pour le [Root.Monarch.GetTitle] [Root.Monarch.GetName] d'organiser un tournoi de joute pour que les Iosahar et de nombreux chevaliers du royaume y participent, ce serait une épreuve grandiose et sanglante d'habileté. Cela donnerait l'occasion aux nombreux autres sujets du [Root.GovernmentName] de profiter du magnifique spectacle de chevaliers entièrement équipés et de leurs chevaux-à-bois chargeant les uns contre les autres dans un violent test d'honneur. Organiser un tournoi somptueux a le potentiel d'améliorer les relations de notre [Root.Monarch.GetTitle] avec nos nombreux sujets, et de l'insinuer dans les bonnes grâces du peuple. Si cela se passe mal cependant, on peut s'attendre à ce que cela rejaillisse négativement sur nous, car nous sommes les hôtes de ce tournoi."
 ynn_authority_events.154.a:0 "Faisons-en un spectacle !"
 ynn_authority_events.154.b:0 "Ne faisons rien de spécial."
 ynn_authority_events.154.c:0 "Pourquoi engagerions-nous la sécurité ? Nous avons des chevaliers !"
 ynn_authority_events.154.d:0 "Ne pouvons-nous pas simplement réutiliser les vieilles tribunes ?"
 ynn_authority_events.154.e:0 "Pas intéressé."

 ynn_authority_events.155.t:0 "Grand Tournoi de Joute !"
 ynn_authority_events.155.d:0 "Le tournoi de joute a été un succès majeur ! Il s'est extraordinairement bien passé, grâces soient rendues à l'Ynn ! Notre peuple a été très diverti par les chevaliers légendaires et leur habileté extraordinaire, et nos Iosahar l'ont trouvé si agréable qu'ils ressentent une nouvelle parenté entre eux et le [Root.Monarch.GetTitle] [Root.Monarch.GetName] !"
 ynn_authority_events.155.a:0 "L'issue n'a jamais vraiment fait de doute."

 ynn_authority_events.156.t:0 "Tournoi de Joute Médiocre"
 ynn_authority_events.156.d:0 "Le tournoi de joute n'a vraiment rien eu de spécial, certains elfes raisonnables le qualifieraient même de décevant. Il était bien trop moyen pour avoir été organisé par un [Root.Monarch.GetTitle]."
 ynn_authority_events.156.a:0 "Hé, moi j'ai aimé !"

 ynn_authority_events.157.t:0 "Bagarre Entre Iosahar Pendant le Tournoi !"
 ynn_authority_events.157.d:0 "Oh Ynn, une bagarre a éclaté entre le [iosahar_rowdy_1.Monarch.GetTitle] de [iosahar_rowdy_1.GetName] et le [iosahar_rowdy_2.Monarch.GetTitle] de [iosahar_rowdy_2.GetName]. Leurs vassaux et sujets respectifs se sont joints à la rixe et ont transformé notre tournoi méticuleusement planifié en un immense embarras pour le [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Cela a montré qu'[Root.GetSheHe] est incapable de contrôler [Root.Monarch.GetHerHis] sujets même lors des jours les plus spéciaux"
 ynn_authority_events.157.a:0 "Tout sauf ça !"
 ynn_authority_events.157.b:0 "On dirait qu'on a eu droit à un beau spectacle finalement !"

 ynn_authority_events.158.t:0 "Tournoi de Joute Catastrophique !"
 ynn_authority_events.158.d:0 "Le tournoi a été un désastre total, de nombreux chevaliers sont arrivés avec des heures de retard car le [Root.Monarch.GetTitle] n'avait pas payé assez de messagers. En raison d'une vague de chaleur extrême, de nombreux chevaliers et leurs montures se sont effondrés de coup de chaleur avant même le début de l'événement. Pour couronner le tout, l'une des vieilles tribunes pourries s'est effondrée sous le poids des vassaux et partisans de nos Iosahar, envoyant nos sujets les plus chers dégringoler sur le sol boueux dans une pluie de bois éclaté."
 ynn_authority_events.158.a:0 "Peut-être devrions-nous arrêter les joutes."

 ynn_authority_events.159.t:0 "Les Iosahar Exigent une Réduction des Impôts !"
 ynn_authority_events.159.d:0 "Nos nombreux Iosahar ont fait une scène à la cour, exigeant que leurs obligations fiscales envers le [Root.Monarch.GetTitle] [Root.Monarch.GetName] soient réduites en compensation pour les avoir forcés à participer à la guerre prolongée du [Root.GovernmentName]."
 ynn_authority_events.159.a:0 "Ai-je vraiment le choix ?"
 ynn_authority_events.159.b:0 "Payez les impôts ou allez fonder votre propre [Root.GovernmentName] !"

 ynn_authority_events.160.t:0 "Le Souverain Négocie la Soumission"
 ynn_authority_events.160.d:0 "Aujourd'hui notre grand souverain a rencontré [Root.Monarch.GetHerHis] loyaux Iosahar pour une raison routinière à peine digne de mention. C'était si routinier et trivial que notre souverain l'a réglé si rapidement qu'[Root.Monarch.GetSheHe] a eu pas mal de temps avant de sentir qu'[Root.Monarch.GetSheHe] devait partir. [Root.Monarch.GetSheHeCap] a passé ce temps à parler avec eux tous, surtout ceux parmi eux qui devenaient particulièrement irrités par notre règne bienveillant. La langue d'argent de notre monarque a opéré sa magie et au moment où [Root.Monarch.GetSheHe] est finalement parti ce jour-là, tous les Iosahar présents se sont trouvés moins enclins à créer des problèmes."
 ynn_authority_events.160.a:0 "Les mots frappent plus fort que les épées."
 ynn_authority_events.160.b:0 "Que tous s'inclinent devant moi !"

 ynn_authority_events.161.t:0 "Le Souverain Offense les Iosahar"
 ynn_authority_events.161.d:0 "Notre souverain, béni qu'[Root.Monarch.GetSheHe] soit par l'Ynn, n'est pas une personne diplomatique. Pour une raison ou une autre, [Root.Monarch.GetSheHe] ne peut s'empêcher d'offenser tous ceux qui l'entourent par ses paroles et ses actes. [Root.Monarch.GetHerHisCap] réputation est bien connue de tous, sauf de [Root.Monarch.GetHerHim]-même au moins, et c'est pourquoi, dans l'intérêt de préserver notre position, nous gardons notre gracieux souverain sous une laisse malheureusement serrée. [Root.Monarch.GetSheHeCap] ne s'éloigne jamais trop de nos diplomates lors des visites officielles de peur qu'[Root.Monarch.GetSheHe] ne dise quelque chose qui causerait un incident. Cependant lors d'une récente réunion entre [Root.Monarch.GetHerHim] et les Iosahar, [Root.Monarch.GetSheHe] a apparemment échappé à [Root.Monarch.GetHerHis] accompagnateur. Au moment où nous avons pu le récupérer, le mal était déjà fait. Nous ne savons pas ce qu'[Root.Monarch.GetSheHe] a dit ou fait, mais à en juger par la colère sur les visages de nos loyaux vassaux, ça a dû être grave."
 ynn_authority_events.161.a:0 "Je suppose que je vais m'excuser"
 ynn_authority_events.161.b:0 "Ha, qu'[iosahar_insulted.Monarch.GetHerHim] rage et désespère !"

 ynn_authority_events.162.t:0 "Organiser une Course de Canoës"
 ynn_authority_events.162.desc:0 "La course de canoës sur les eaux sauvages de l'Ynn est une tradition ancienne. Cela pourrait servir à construire de bonnes relations entre nous et nos Iosahar si nous organisions un tel événement."
 ynn_authority_events.162.a:0 "Ce sera un grand événement !"
 ynn_authority_events.162.b:0 "Assurons-nous que cela fonctionne bien, rien de spécial"
 ynn_authority_events.162.c:0 "Je suppose qu'un petit effort pourrait être fait"
 ynn_authority_events.162.d:0 "Croyez-vous qu'ils remarqueront que nous avons utilisé des pelles comme pagaies ?"
 ynn_authority_events.162.e:0 "Mieux vaut ne pas organiser que mal organiser."

 ynn_authority_events.163.t:0 "Une Course Extraordinaire"
 ynn_authority_events.163.d:0 "Même les caprices les plus sauvages de l'Ynn n'ont pas réussi à renverser les pagayeurs habiles, et leur vitesse était véritablement spectaculaire !"
 ynn_authority_events.163.a:0 "File, noble canoë..."

 ynn_authority_events.164.t:0 "Une Performance Solide"
 ynn_authority_events.164.d:0 "La course d'aujourd'hui s'est bien passée. L'Ynn était calme, les embarcations bien construites et les équipes suffisamment déterminées. Tandis que les canoës fendaient l'Ynn vers la ligne d'arrivée, progressivement l'une des équipes prit la tête et franchit la ligne d'arrivée avec du temps d'avance. Bien qu'il y eut quelques grognements, le festin qui suivit noya toutes les peines que les perdants auraient pu avoir. Lorsque les célébrations prirent enfin fin, tous les participants rentrèrent chez eux satisfaits des événements de la journée."
 ynn_authority_events.164.a:0 "Un autre succès !"

 ynn_authority_events.165.t:0 "Les Coureurs Déclenchent une Rixe !"
 ynn_authority_events.165.d:0 "Cela a commencé par une dispute avant même que la course ne débute. Une équipe a eu un différend avec une autre pour une raison quelconque et des mots vifs ont été échangés. Cela aurait dégénéré en bagarre sur-le-champ si notre magnanime souverain n'était pas intervenu à temps pour apaiser les tensions. Nous pensions que c'était terminé, mais nous avons malheureusement eu tort. Pendant la course, l'une des équipes offensées s'est approchée de l'autre et a commencé à pousser leur canoë avec leurs pagaies. L'autre équipe est rapidement passée de ramer à repousser leurs assaillants également. Bientôt les deux équipes étaient hors course et entièrement concentrées sur le fait de faire chavirer l'autre.\n\nFinalement l'une d'elles l'emporta et l'autre équipe bascula dans l'Ynn. À ce moment, une bête horrible surgit du puissant Fleuve et s'acharna sur l'équipe, frappant les hommes qui se débattaient encore et encore avant d'être repoussée par des guerriers proches armés de leurs propres lances. Au moment où l'autre équipe regagna le rivage, on constata que deux membres de l'équipe étaient morts et les trois autres grièvement blessés."
 ynn_authority_events.165.a:0 "Tentons d'apaiser les tensions"
 ynn_authority_events.165.b:0 "Montons les deux camps l'un contre l'autre"

 ynn_authority_events.166.t:0 "Une Course Désastreuse"
 ynn_authority_events.166.d:0 "Aujourd'hui la grande course de canoës devait avoir lieu. Nous disons « devait » car elle a à peine commencé. D'abord toutes les équipes, seigneurs compris, se sont présentées ivres et en retard. Ils ont apporté des canoës qui semblaient avoir été fabriqués par des enfants la veille au soir et deux des canoës se sont effondrés avant même de toucher le Fleuve.\n\nQuand la course a enfin commencé, elle n'a même pas duré cinq minutes avant que les canoës de pacotille et les équipages ivres ne conduisent chaque équipe à fracasser leurs canoës et les couler. Les équipages trempés ont ensuite été tirés du fleuve pour qu'ils se mettent tous immédiatement à blâmer les autres équipes pour leur échec, déclenchant presque une bagarre massive. Notre puissant souverain, agacé au-delà du possible, a rapidement renvoyé tout le monde chez soi et annulé le festin. Espérons que la prochaine course sera meilleure."
 ynn_authority_events.166.a:0 "Quelle disgrâce"

#Interaction with other countries
 ynn_authority_events.225.t:0 "Les Pèlerins du Barrage"
 ynn_authority_events.225.d:0 "Aujourd'hui un grand groupe de pèlerins s'est rassemblé pour rencontrer notre souverain. Ils demandent le droit de partir en pèlerinage vers un Grand Barrage Ynnique situé hors de nos frontières. Ces grandes structures, construites par nos ancêtres il y a longtemps, aident à calmer le Grand Ynn et à détourner l'eau vers nos champs et nos moulins. En tant que vaisseau par lequel l'Ynn passe, tous attirent un grand nombre de pèlerins religieux.\n\nCe groupe semble bien approvisionné pour traverser nos terres, mais qui sait ce qui leur arrivera hors de nos frontières. Les barrages sont extrêmement importants pour notre culture et laisser un pèlerinage se faire détrousser ou pire pourrait nous faire passer pour négligents aux yeux de nos vassaux et de notre peuple."
 ynn_authority_events.225.a:0 "Souhaitons-leur bon voyage"
 ynn_authority_events.225.b:0 "Assignons quelques chevaliers pour les escorter"

 ynn_authority_events.226.t:0 "Des Pèlerins Portés Disparus"
 ynn_authority_events.226.d:0 "Il semble que notre groupe de pèlerins ne soit jamais arrivé. Nous avons perdu le peu de contact que nous maintenions avec la caravane de pèlerins, et les nouvelles ont cessé d'arriver concernant leur voyage. Les voyages sur de longues distances à travers les terres ynniques sont une entreprise périlleuse même pour des aventuriers expérimentés et il n'est pas rare que des pèlerins, généralement pas formés aux subtilités de l'autodéfense, disparaissent.\n\nCependant leur disparition pourrait nuire à nos liens avec leur ville d'origine. Non seulement cela, mais en supposant qu'ils aient été dévorés par un Wendigo ou victimes de bandits, cela rend les bois encore moins sûrs, et c'est un problème que nous devrons peut-être régler à l'avenir."
 ynn_authority_events.226.a:0 "Puisse l'Ynn apporter la paix à leurs âmes…"

 ynn_authority_events.227.t:0 "Un Pèlerinage Arrive !"
 ynn_authority_events.227.d:0 "Nos terres ont la chance d'accueillir l'un des Grands Barrages Ynniques de l'Empire Ynnique. Ces Barrages non seulement détournent l'eau vers nos champs et aident à gérer l'Ynn quand c'est possible, ils servent de sites religieux pour notre peuple. Peu de fiers Ynniques mourraient heureux s'ils n'avaient pas vu au moins un des Grands Barrages au moins une fois. C'est ce qui rend notre contrôle de l'un d'eux si profitable.\n\nDes bourgs marchands surgissent fréquemment près des barrages pour servir les pèlerins et ils sont une source de revenus précieuse. Non seulement cela, mais le prestige d'en avoir un dans nos frontières est également immense. En fin de compte, il est présumé que nous accueillerons ces âmes errantes de [From.GetName] à bras ouverts afin que tous connaissent notre bonté et notre générosité. Cependant, aussi importants soient-ils, ces barrages sont également des cibles précieuses pour les campagnes militaires. Et si ces « pèlerins » n'étaient que des espions déguisés ?"
 ynn_authority_events.227.a:0 "Bienvenue à tous !"
 ynn_authority_events.227.b:0 "Chassons ces saboteurs !"

 ynn_authority_events.229.t:0 "Le Pèlerinage Échoué"
 ynn_authority_events.229.d:0 "Aujourd'hui un pèlerinage qui était récemment parti de nos terres pour atteindre l'un des Grands Barrages Ynniques nous est revenu. Cependant ils ne reviennent pas dans la joie et l'extase religieuse d'avoir contemplé un tel monument, mais dans la frustration, la colère et la tristesse. Il semble que le dirigeant local de [From.GetName] ait décidé de renvoyer nos pauvres pèlerins à [From.Monarch.GetHerHis] portes. [From.Monarch.GetSheHeCap] les soupçonne peut-être d'être des espions ou d'autres absurdités de ce genre.\n\nBien que les moins religieux parmi nos courtisans aient simplement haussé les épaules et soient passés à autre chose, une force puissante au sein de notre cour exhorte notre glorieux souverain à ne pas laisser passer cela. Si [From.Monarch.GetSheHe] l'a fait une fois, [From.Monarch.GetSheHe] pourrait le refaire et aucun vrai souverain ne pourrait jamais tolérer un tel déshonneur !"
 ynn_authority_events.229.a:0 "Malheureux mais parfois inévitable"
 ynn_authority_events.229.b:0 "Si nos pèlerins ne peuvent pas voir le barrage, nos soldats le feront !"

 ynn_authority_events.228.t:0 "Le Pèlerinage Réussi"
 ynn_authority_events.228.d:0 "Aujourd'hui un pèlerinage qui était récemment parti de nos terres nous est revenu sain et sauf. Ils reviennent porteurs de récits de leur visite au Grand Barrage et de la contemplation de sa gloire. Ils ont bu dans le vaste réservoir du Barrage, se sont émerveillés dans son ombre et ont senti l'esprit du Grand Ynn les traverser en visitant la ville voisine. Ils avaient des choses particulièrement positives à dire sur le noble local qui règne sur les terres où se trouve le Barrage. Ils parlent de [From.Monarch.GetHerHis] grâce en les autorisant à traverser [From.Monarch.GetHerHis] terres et de la sécurité qu'ils ont ressentie lors de leurs voyages à travers celles-ci."
 ynn_authority_events.228.a:0 "Louanges au Puissant Ynn !"

 ynn_authority_events.300.t:0 "Un [Root.Monarch.GetTitle] Respecté"
 ynn_authority_events.300.d:0 "Le règne de [Root.Monarch.GetName] a été grandement apprécié par nos Iosahar, et ils sont venus présenter leurs sentiments de loyauté et de gratitude. Cependant, dans leurs compliments se cache un message voilé, car un souverain si apprécié serait imprudent de potentiellement écarter du pouvoir quand les serments de vos sujets sont liés à lui ; qui peut dire si ces liens ne se briseront pas s'il n'est pas réélu ? Pouvons-nous nous permettre de laisser la déloyauté fermenter parmi nos Iosahar en élisant un [Root.Monarch.GetTitle] différent ?"
 ynn_authority_events.300.a:0 "Organisez une élection rapide et assurez-vous que [Root.Monarch.GetName] soit victorieux"
 ynn_authority_events.300.b:0 "La République est au-dessus des souhaits des Iosahar"
 ynn_forced_reelection_tt:0 "§TNous allons forcer la réélection de notre actuel [Root.Monarch.GetTitle]§!"

 ynn_authority_events.301.t:0 "Prêter Serment à Nouveau"
 ynn_authority_events.301.d:0 "Certains de nos Iosahar grognent à l'idée de prêter un nouveau serment à un quelconque inconnu de famille et de renommée modestes qu'ils n'ont pas participé à élire."
 ynn_authority_events.301.a:0 "C'est leur sort"
 ynn_authority_events.301.b:0 "Prosternez-vous et essayez de faire amende honorable"
 ynn_authority_events.301.c:0 "Je suis votre Suzerain et [Root.Monarch.GetTitle] !"

 ynn_authority_events.302.t:0 "Contesté par le Clergé"
 ynn_authority_events.302.d:0 "Le clergé vous approche avec des documents et des interprétations théologiques affirmant que le républicanisme ne peut être suzerain des Iosahar, car l'inconstance permanente du pouvoir corrompt le but du saint serment des Iosahar."
 ynn_authority_events.302.a:0 "Laissons-les se plaindre, peu les écouteront sûrement"
 ynn_authority_events.302.b:0 "Heureusement je connais tous les arguments théologiques contraires"

 ynn_authority_events.303.t:0 "Noblesse Mécontente"
 ynn_authority_events.303.d:0 "En passant du temps à festoyer avec la noblesse de nos Iosahar, les idées de monarchisme ont commencé à s'enraciner fermement parmi nos propres nobles. Certains d'entre eux murmurent même que nous devrions abandonner notre république et couronner un Seigneur !"
 ynn_authority_events.303.a:0 "Ils menacent nos fondations, réprimons-les"
 ynn_authority_events.303.b:0 "Qu'ils grognent, espérons que ça ne dure pas"

 ynn_authority_events.304.t:0 "Trop Longtemps au Pouvoir ?"
 ynn_authority_events.304.d:0 "L'actuel [Root.Monarch.GetTitle], [Root.Monarch.GetName], est au pouvoir depuis un bon moment. Nombreux sont ceux parmi nos Iosahar qui exigent presque ouvertement qu'[Root.Monarch.GetSheHe] prenne [Root.Monarch.GetHerHis] place légitime de Seigneur !"
 ynn_authority_events.304.a:0 "Les laisser continuer à penser ainsi les maintient loyaux"
 ynn_authority_events.304.b:0 "Faites sortir [Root.Monarch.GetName], maintenant !"

### Ynnsman Events ###
 #Events for Cannorians About Ynnics

 ynnsman_events.1.t:0 "Des Vagabonds Ynniques Rejoignent nos Rangs !"
 ynnsman_events.1.d:0 "Un énorme groupe de nés-des-ruines à l'allure misérable a traversé la frontière, la plupart brandissant leurs propres armes. Il semble clair qu'ils ont fui la servitude, se sont tournés vers le banditisme, ou les deux. Quoi qu'il en soit, ils ont expliqué qu'ils ne sont plus les bienvenus dans leur patrie et ont l'intention de rester ici, mais sont plus que disposés à se battre pour nous si nous les acceptions."
 ynnsman_events.1.a:0 "Vous êtes dans l'armée maintenant."
 ynnsman_events.1.b:0 "Nous avons des standards."

 ynnsman_events.2.t:0 "La Diaspora [Root.GetAdjective]"
 ynnsman_events.2.d:0 "Notre nation a été bâtie avec un labeur éreintant et un esprit inébranlable, mais ce n'est pas pour tout le monde. De nombreux [Root.GetAdjective], plutôt que de vivre une vie rude à la frontière, sont entrés au service de divers seigneurs féodaux dans la vallée. Ils ont établi de petites communautés çà et là, et maintenant beaucoup parmi notre jeunesse envisagent de les rejoindre pour de meilleures opportunités. Ils enverront de l'argent chez eux, bien sûr, mais ce sont nos meilleurs éléments, et notre pays souffrirait sans eux."
 ynnsman_events.2.a:0 "Souhaitons-leur bonne chance !"
 ynnsman_events.2.b:0 "Peut-être pourraient-ils être convaincus de rester ?"

 ynnsman_events.3.t:0 "Un Prêtre-du-Fleuve Demande l'Hospitalité"
 ynnsman_events.3.d:0 "Notre intégration dans le système féodal [Root.Overlord.GetAdjective] s'est bien déroulée jusqu'ici. Seules deux parties de notre contrat avec eux ne sont pas négociables : nous devons les reconnaître comme le dirigeant légitime de l'Ynn, et offrir l'hospitalité à tout prêtre du fleuve sacré qui la demande.\n\nAujourd'hui, [Root.Overlord.GetName] nous a informés qu'un tel prêtre a l'intention de voyager à travers nos terres. Tout prosélytisme qui aurait lieu, affirment-ils, serait de la propre volonté du prêtre. Notre acceptation est une simple formalité qu'ils espèrent rapide."
 ynnsman_events.3.a:0 "Dites-leur que nous acceptons, bien sûr."
 ynnsman_events.3.b:0 "Dites-leur que nous acceptons, bien sûr, mais joignez quelques pièces de verre à la lettre."

 ynnsman_events.4.t:0 "Un [Root.GetAdjective] Adoubé !"
 ynnsman_events.4.d:0 "Les premiers Cannoriens à travailler pour des seigneurs ynniques étaient des mercenaires ; la guerre est un langage universel, après tout. La pratique s'est étendue pour inclure non seulement des compagnies libres, mais aussi des auxiliaires cannoriens, des gardes du corps et des conseillers militaires. Aujourd'hui une telle personne d'origine [Root.GetAdjective] s'est distinguée et a reçu un titre mineur de son seigneur en remerciement pour un service exceptionnel.\n\nCet événement inhabituel a surpris Ynniques et Cannoriens, mais [Root.GetName] a été mentionné avec respect lors de la cérémonie, et notre réputation dans la vallée s'en est trouvée améliorée !"
 ynnsman_events.4.a:0 "Envoyons nos félicitations !"

 ynnsman_events.5.t:0 "Hors de Portée de Lance"
 ynnsman_events.5.d:0 "Un groupe de chevaliers ynniques chevauchant leurs emblématiques chevaux-à-bois a atteint notre frontière, affirmant qu'ils poursuivent un groupe de hors-la-loi et qu'ils ont enfin trouvé leur repaire, qui se trouve sur notre territoire. Ils exigent que nous les laissions rendre justice, avec des accusations à peine voilées que nous hébergeons volontairement les bandits. Non seulement ces implications sont sans fondement — nous ne pouvons pas contrôler les actions de tout le monde à la frontière, après tout — mais laisser des soldats étrangers traquer des malfaiteurs sur nos propres terres saperait grandement notre autorité."
 ynnsman_events.5.a:0 "Très bien. Entrez et sortez. Vous avez vingt heures."
 ynnsman_events.5.b:0 "Donc vous ne pouvez pas protéger vos propres villages, et c'est notre faute ?"

 #Events for Ynnics about Cannorians
 #Generic Cannorian Events

 ynnsman_events.100.t:0 "Un Prédicateur [ynn_preacher_origin.GetAdjective] Fait des Progrès"
 ynnsman_events.100.d:0 "Des prédicateurs étrangers de [ynn_preacher_origin.GetName] font des avancées à [ynn_preacher_prov.GetName]. La province est sur le point de se convertir, mais heureusement nous avons encore l'opportunité de réprimer ces étrangers et leurs idées étranges."
 ynnsman_events.100.a:0 "Laissons-les tranquilles !"
 ynnsman_events.100.b:0 "Arrêtons-les !"

 ynnsman_events.101.t:0 "Des Kobolds Viennent Chercher des Dragons !"
 ynnsman_events.101.d:0 "Des kobolds à écailles vertes désireux d'être en présence des dragons qu'ils vénèrent sont arrivés à [ynn_kobold_migration_prov.GetName] depuis Cannor cherchant une nouvelle vie. Ils peuvent encore être renvoyés sans trop d'efforts, mais un tel afflux de créatures travailleuses améliorerait grandement les revenus collectés de [ynn_kobold_migration_prov.GetName]."
 ynnsman_events.101.a:0 "Laissons entrer les petits lézards !"
 ynnsman_events.101.b:0 "Renvoyons-les !"

 ynnsman_events.102.t:0 "Manufactures Kobolds Souterraines !"
 ynnsman_events.102.d:0 "Un petit groupe de kobolds à [ynn_kobold_arms_dealer_prov.GetName] a été découvert en train de fabriquer des armes avec le pouvoir de tuer un elfe adulte, puis de les vendre à la paysannerie sous le prétexte de l'élimination de la vermine. Techniquement, ils n'enfreignent aucune loi, car nos édits interdisent la production non autorisée d'armes à feu sur terre et sur l'Ynn, mais ne disent rien sur la production d'armes à feu dans les grottes. Cependant, cette subtilité de la loi importe peu à la noblesse, qui exige que les kobolds soient empêchés de poursuivre cette activité souterraine, car tout noble raisonnable sait qu'un paysan armé est une recette pour le désastre."
 ynnsman_events.102.a:0 "Ils peuvent tuer un elfe adulte ? Alors réécrivons les lois et saisissons ces satanées armes !"
 ynnsman_events.102.b:0 "Élimination de la vermine ? Ça me semble bon pour la production de céréales !"

 ynnsman_events.103.t:0 "Les Réformes Controversées du [Root.GetEventAdvisorTitle] Cannorien"
 ynnsman_events.103.d:0 "Beaucoup de membres de notre cour pensaient que l'inclusion de [Root.GetEventAdvisorName] parmi eux n'était qu'une expérience amusante du [Root.Monarch.GetTitle] au début, mais [Root.GetEventAdvisorHerHis] adaptation des idées cannoriennes à notre réalité ynnique a apporté de grands bénéfices à [Root.GetName].\n\nIl va sans dire que nos maisons nobles ne sont pas enclines à remettre en question ce qu'elles considèrent comme des traditions prestigieuses datant de générations et ont qualifié [Root.GetEventAdvisorName] de barbare étranger déterminé à détruire notre culture.\n\nLes propositions de [Root.GetEventAdvisorName] sont en fait assez limitées en portée, et c'est clairement une manœuvre des [Root.GetNobilityName] pour voir [Root.GetEventAdvisorHerHim] remplacé par l'un des leurs. Néanmoins, [Root.Monarch.GetName] devra régler la situation. Favorisons-nous la compétence ou le statut ?"
 ynnsman_events.103.a:0 "[Root.GetEventAdvisorSheHeCap] a été utile jusqu'ici."
 ynnsman_events.103.b:0 "...jusqu'ici."

 ynnsman_events.104.t:0 "Des Braconniers Cannoriens Tuent Notre Faune !"
 ynnsman_events.104.d:0 "Des braconniers cannoriens de [ynn_cannor_poachers_origin.GetName] pénètrent sur notre territoire et tuent notre faune pour leurs fourrures et leur ivoire. Ils laissent nos forêts dépourvues de vie, et nos chasseurs avec des prises de plus en plus maigres. Si nous laissons cela continuer, il ne restera plus aucun gibier à [ynn_cannor_poachers_prov.GetName]."
 ynnsman_events.104.a:0 "Traquons-les !"
 ynnsman_events.104.b:0 "Nous ne sommes pas en mesure de régler cela maintenant."

 ynnsman_events.105.t:0 "Des Braconniers [ynn_patrol_killers_tag.GetAdjective] Tuent une Patrouille !"
 ynnsman_events.105.d:0 "Des braconniers de [ynn_patrol_killed_prov.GetName] ont attaqué et tué l'une de nos patrouilles anti-braconnage à [ynn_patrol_killed_prov.GetName], avec l'intention de réduire notre sécurité dans la région. Comment devons-nous riposter ?"
 ynnsman_events.105.a:0 "Donnons-leur une leçon !"
 ynnsman_events.105.b:0 "Ignorons cela"

 ynnsman_events.106.t:0 "Des Braconniers Cannoriens Attaquent un Élevage de Chevaux-à-Bois"
 ynnsman_events.106.d:0 "Des Cannoriens de [ynn_ranch_raid_origin.GetName] ont attaqué l'une de nos écuries de chevaux-à-bois cherchant à priver nos patrouilles anti-braconnage de la mobilité que leur fournissent leurs montures. Cela nous donne l'opportunité de commencer à élever de nouvelles races de chevaux de guerre dans cette écurie maintenant vide, à un coût bien sûr."
 ynnsman_events.106.a:0 "Si c'est la guerre qu'ils veulent… la guerre ils auront."
 ynnsman_events.106.b:0 "Nous devrions nous concentrer sur la reconstruction plutôt."

 ynnsman_events.107.t:0 "Les Capitaines de Compagnie Soulèvent un Problème d'Équipement !"
 ynnsman_events.107.d:0 "Les mercenaires cannoriens travaillant sous notre gouvernement ont grogné contre notre politique concernant le choix des armes ; ils disent que les forcer à abandonner leurs armes à feu en faveur d'« armes médiévales » cause la mort de bien plus d'hommes que s'ils combattaient à la manière cannorienne, qui repose sur l'utilisation à grande échelle des armes à feu. Certains de nos généraux les plus éminents ont déclaré qu'autoriser ces hommes à utiliser des armes à feu causerait une diminution générale de la cohésion des unités à tous les niveaux, résultant de l'utilisation de deux méthodes de guerre très différentes au sein de la même armée. On peut s'attendre à ce que ce ne soit pas une décision populaire auprès des Cannoriens, ce qui rendra le recrutement plus coûteux et plus difficile, cependant nous nous retrouverons avec les plus disciplinés du lot. D'autres généraux distingués ont argué qu'autoriser les Cannoriens à combattre dans leur style traditionnel pousserait plus d'hommes à s'enrôler, nous permettant de payer un tarif bien plus bas que si nous leur imposions nos méthodes."
 ynnsman_events.107.a:0 "Qu'ils utilisent leurs armes à feu !"
 ynnsman_events.107.b:0 "C'est moi qui paie, donc vous allez combattre comme je vous dis !"

 ynnsman_events.110.t:0 "Les Écailles-du-Fleuve"
 ynnsman_events.110.d:0 "Les Kobolds de [1138.Province.GetName] ont inventé une étrange forme de combat. Utilisant les techniques des Lames-du-Fleuve, ils forment des boucliers d'eau chatoyants pour couvrir leurs corps. Puis, ils chargent les lignes ennemies en portant des explosifs, qui explosent au visage de leurs adversaires dans des déflagrations de confusion fabuleuse, brisant les rangs ennemis tandis que les boucliers aquatiques protègent les Kobolds. Cette tactique a donné à la compagnie kobold une certaine renommée, les soldats les surnommant même les « Écailles-du-Fleuve », d'après les Lames-du-Fleuve qui ont inspiré leur tactique. Certains remettent en question la validité d'une forme de combat basée sur le fait de courir vers les ennemis avec des bombes, mais pour le moment personne ne peut douter que cela fonctionne."
 ynnsman_events.110.a:0 "Hé, tant que ça marche"

 #Events pertaining particular countries

 ynnsman_events.200.t:0 "Prédicateurs Cramoisis"
 ynnsman_events.200.d:0 "Des prédicateurs suivant la déesse guerrière aux cheveux roux ont aidé les habitants de [ynn_corinite_buildup_prov.GetName] dans une tentative de les convertir à leur foi."
 ynnsman_events.200.a:0 "Leur aide est bienvenue"
 ynnsman_events.200.b:0 "Envoyez les chevaliers, voyons cette déesse de la guerre en action"

 ynnsman_events.210.t:0 "Un Excès de Viande de Bison"
 ynnsman_events.210.d:0 "Les Ebenmassiens sont célèbres pour chasser de vastes troupeaux de bisons. Ils chassent souvent bien plus que ce que leur peuple ne mange, car leur but est d'endommager l'approvisionnement alimentaire des Epednars voisins. Ainsi, acheter chez eux signifie de grandes quantités de viande à bas prix."
 ynnsman_events.210.a:0 "Cela nous aidera à nourrir les hommes"
 ynnsman_events.210.b:0 "Nous ne pouvons pas faire confiance à la nourriture étrangère"

 ynnsman_events.211.t:0 "Rodéo à l'Exposition des Quatre-Cornes"
 ynnsman_events.211.d:0 "Quelques jeunes chevaliers ont décidé de se divertir en visitant l'exposition des quatre-cornes de cette année à Zelen, où les Ebenmassiens amènent des dizaines de milliers d'aurochs pour les vendre aux Cannoriens et Ynniques. Ce n'est certainement pas un endroit convenable pour un chevalier, et pourtant ils ont pétitionné le [Root.Monarch.GetTitle] car ils ont été impressionnés au-delà de toute mesure par le champion local de rodéo, un homme répondant au nom d'Auroch Aucyn.\n\nSelon eux, ils l'ont vu de leurs propres yeux épuiser plusieurs chevaux sauvages epednars, l'un de ces bizarres chevaux violets au tempérament explosif du sud de l'Étendue, et même un rhinocéros laineux veykodan, et il a fait paraître cela comme si ce n'était même pas un défi. Ils affirment que personne ne peut égaler son habileté en selle dans tout l'Ynn et qu'il ferait un instructeur d'équitation extraordinaire bien que très peu conventionnel."
 ynnsman_events.211.a:0 "L'homme au nom particulier peut montrer quelques-uns de ses tours à nos chevaliers."
 ynnsman_events.211.b:0 "S'il est aussi bon qu'ils le disent, nous devrions le faire venir ici à [Root.Capital.GetName] !"
 ynnsman_events.211.c:0 "Absurde. Les chevaliers ynniques sont les meilleurs en acrobaties équestres, tout le monde le sait."

 ynnsman_events.212.t:0 "Expertise de Construction Ebenmassienne"
 ynnsman_events.212.d:0 "De nombreux colons ebenmassiens désespérés se dirigent vers l'ouest dans la mortelle Étendue dans le vain espoir de trouver de l'or comme l'Empire Ynnique l'a fait il y a des siècles, mais tout autant viennent à l'Ynn pour offrir leurs services. Ce qu'ils construisent n'est pas élégant mais fait pour durer. Les communautés ebenmassiennes sont parmi les plus intégrées de l'Ynn et causent rarement des problèmes, leur donnant la réputation d'être des Cannoriens quelque peu fiables. Certains d'entre eux nous ont pétitionnés aujourd'hui pour construire une telle communauté à [Root.GetName], promettant d'aider à améliorer l'infrastructure de la région en retour."
 ynnsman_events.212.a:0 "[Root.Capital.GetName] s'agrandira."
 ynnsman_events.212.b:0 "Nous ne défigurerons pas notre belle cité avec les abominations qu'ils appellent architecture."

 ynnsman_events.220.t:0 "Négocier avec les Armes Buck"
 ynnsman_events.220.d:0 "Le fabricant tellumtiri « Armes à Feu Buck » est le fabricant d'armes à feu le plus connu de la vallée de l'Ynn. Ce n'est pas sans raison car leurs armes sont les meilleures qu'on puisse obtenir, certains disent dans tout le nord d'Aelantir ! Acheter nos armes à feu chez Buck nous donnera sans aucun doute un avantage."
 ynnsman_events.220.a:0 "Ouais ! Ça va faire boum !"
 ynnsman_events.220.b:0 "Nous avons déjà de bonnes armes"

 ynnsman_events.221.t:0 "Services de la Messagerie Tell'em"
 ynnsman_events.221.d:0 "La Messagerie Tell'em livre des messages à travers l'Étendue Epednane. Ils opèrent rapidement et avec un solide professionnalisme. Nos bons amis de Tellumtir offrent l'utilisation de ce service à nos diplomates, tant pour livrer leurs messages que leurs personnes."
 ynnsman_events.221.a:0 "Brillant, bien sûr nous acceptons"
 ynnsman_events.221.b:0 "Utilisons ceci pour quelques manœuvres à court terme efficaces"

 ynnsman_events.230.t:0 "Une Main Secourable Trempée"
 ynnsman_events.230.d:0 "Les Mains-du-Fleuve sont une organisation religieuse servant la déesse Begga, elles sont connues pour leur travail caritatif désintéressé à travers l'Ynn. Actuellement certaines de leurs « Mains » aident les gens désespérés de [ynn_river_hand_help_prov.GetName] à restaurer leurs maisons et leurs fermes."
 ynnsman_events.230.a:0 "Leur bienveillance est admirable"
 ynnsman_events.230.b:0 "Ils corrompent et subvertissent notre peuple, faites-les partir !"

 ynnsman_events.240.t:0 "Universitaire de l'Université de la Dame"
 ynnsman_events.240.d:0 "Un universitaire de l'Université de la Dame à Plumstead propose de rejoindre la cour"
 ynnsman_events.240.a:0 "Un tel expert est toujours nécessaire"
 ynnsman_events.240.b:0 "Nous avons nos propres universitaires"

 ynnsman_events.241.t:0 "Celui Qui Frappe"
 ynnsman_events.241.d:0 "Les festivités de la salle à manger sont interrompues par un soudain frappement. Un humain entre par la porte (déjà ouverte) et se présente avec assurance comme Walbert With, « le meilleur alchimiste que vous verrez jamais au nord des Falaises ». Puis un autre humain, vêtu de haillons et aux manières de voyou, entre à contrecœur dans la salle et est présenté comme Iessíl Pírkmóine, jeune compagnon de Walbert With et « associé commercial » de celui-ci.\n\nCertains à notre cour ricanent devant le contraste improbable entre le sérieux sinistre de l'alchimiste et les manières basses du commerçant, et nos gardes préparent leurs armes par précaution. Normalement nous n'envisagerions même pas d'inviter de tels individus près de notre [Root.Monarch.GetTitle], cependant notre Naturaliste actuellement employé, [Root.Adm_Advisor.GetName], s'est donné beaucoup de mal pour chanter les louanges de Walbert With et se porter garant de lui. Malheureusement pour notre Naturaliste, personne d'autre à la cour n'a entendu parler de « Walbert With » auparavant.\n\nUne fois les ricanements apaisés, [Root.Adm_Advisor.GetName] a nerveusement expliqué qu'[Root.Adm_Advisor.GetSheHe] a amené ces deux-là ici parce qu'il croit que Maître With est très compétent en matière d'alchimie et souhaite apprendre le métier [Root.Adm_Advisor.GetHerHim]-même. « Maître With » a alors pris la parole, comme si quelqu'un avait demandé, et a dit qu'il refuse de travailler à [Root.Capital.GetName] sans son compagnon Pírkmóine, dont il nous assure qu'il est tout aussi renommé. [Root.Adm_Advisor.GetName] fixe alors le [Root.Monarch.GetTitle] d'un air suppliant, cherchant visiblement une sortie de cette humiliation. Le [Root.Monarch.GetTitle] dit alors :"
 ynnsman_events.241.a:0 "Ces humains semblent très compétents, bien sûr nous les aurons pour vous former !"
 ynnsman_events.241.b:0 "Cet humain a déjà manqué à l'étiquette ! Ce sont les Seigneurs qui frappent !"

 ynnsman_events.242.t:0 "Felina"
 ynnsman_events.242.d:0 "Les soupçons de notre [Root.Monarch.GetTitle] étaient corrects ! Les humains que nous avons engagés étaient des voyous, gérant une opération illégale de distillation de gnôle. Par la mort de Walbert With dans une rixe de rue pour le territoire, il a été découvert qu'il était l'alchimiste en charge de la fabrication de la gnôle de prune « Diohúis ». Iessíl Pírkmóine était responsable de l'organisation de la distribution du produit, et en tant que conseiller du [Root.Monarch.GetTitle] il utilisait ses accréditations pour éviter les inspections de transport de marchandises, leur permettant d'opérer sans entrave.\n\nMais avec la mort de Walbert With, tout s'est effondré et dans une sorte d'étrange représailles, Iessíl Pírkmóine a tué le prédécesseur de Walbert, la raison est encore inconnue. Ce meurtre a causé l'exposition de l'implication de Pírkmóine, le forçant à fuir : il a été vu pour la dernière fois se dirigeant vers le nord-ouest passé les Montagnes d'Ekyunimoy pour servir une mythique « Cour d'Hiver ». Cette situation a mis le [Root.GovernmentName] dans l'embarras, notre peuple blâme les humains dans leur ensemble pour cet incident et demande leur persécution. Cependant, des membres de notre administration pointent le manque de surveillance sur les hauts fonctionnaires comme source du problème et suggèrent des réformes pour réduire la corruption."
 ynnsman_events.242.a:0 "Maudits humains !"
 ynnsman_events.242.b:0 "Faisons quelques réformes, et appelons un bon avocat !"

 ynnsman_events.250.t:0 "Un Noble Perd Tout à Móine"
 ynnsman_events.250.d:0 "Tiru Móine est la capitale du jeu, un grand palais du hasard. L'un de nos Nobles s'est bêtement aventuré dans cet endroit et a réussi à perdre tout son argent aux jeux."
 ynnsman_events.250.a:0 "Aidons-le à payer ses dettes"
 ynnsman_events.250.b:0 "C'est sa propre stupide erreur"

 ynnsman_events.260.t:0 "Populariser la Bouffée ?"
 ynnsman_events.260.d:0 "La Bouffée du Pipier est une célèbre herbe à pipe tipneyenne, déjà aimée par beaucoup dans notre pays. Populariser son usage pourrait mener à des résultats positifs, puisqu'elle est connue pour avoir un effet calmant."
 ynnsman_events.260.a:0 "Fumez de l'Herbe à Pipe Tous les Jours !"
 ynnsman_events.260.b:0 "Dites simplement non."

 ynnsman_events.261.t:0 "Moitié de la Taille, Deux Fois le Violoniste"
 ynnsman_events.261.d:0 "Un joyeux violoniste du Tipney Occidental a traversé nos terres répandant le bonheur partout où il passait. Maintenant il s'est présenté à la cour et a prouvé sans aucun doute ses talents musicaux"
 ynnsman_events.261.a:0 "Engagez ce Halfelin !"
 ynnsman_events.261.b:0 "Hors de mes terres"
 ynnsman_events.261.c:0 "Que le petit aille où son cœur le souhaite"

 ynnsman_events.262.t:0 "La Bouffée Devient Populaire"
 ynnsman_events.262.d:0 "Le peuple de [From.GetName] a rapidement adopté l'habitude de fumer notre Herbe à Pipe"
 ynnsman_events.262.a:0 "Une grande aubaine pour notre commerce"

 ynnsman_events.270.t:0 "Des Nains Argezeniques Arrivent !"
 ynnsman_events.270.d:0 "Des nains venant d'Argezvale sont arrivés à [ynn_argezennic_dwarf_prov.GetName] cherchant à s'installer. Leur légendaire éthique de travail et leur longue durée de vie leur fournissent amplement de temps pour maîtriser leurs professions, en faisant des citoyens idéaux, qui contribueront au pays pendant des siècles."
 ynnsman_events.270.a:0 "Ça semble formidable ! Laissons-les entrer !"
 ynnsman_events.270.b:0 "Des nains dans MA [ynn_argezennic_dwarf_prov.GetName] ? Soyez sérieux !"

 ynnsman_events.271.t:0 "Les Forgerons de Balgar Proposent une Collaboration"
 ynnsman_events.271.d:0 "Un officiel d'Argezvale, suivant son instinct nain naturel, prospectait à [ynn_argezennic_smithy_prov.GetName] autour des casernes, et a découvert une veine de fer jusque-là inconnue ! Le nain a affirmé qu'elle ne peut être exploitée qu'en utilisant une technique naine spéciale. Heureusement, il a proposé de faire venir des mineurs nains experts. Cependant, il ne le fera que si une manufacture d'armes conçue et dirigée par les Forgerons de Balgar est construite dans la province."
 ynnsman_events.271.a:0 "Comment puis-je dire non au fer ?"
 ynnsman_events.271.b:0 "Pourquoi paierais-je pour une colonie naine sur mon propre territoire ?!"

 ynnsman_events.272.t:0 "Argezvale Offre de la Pierre Taillée"
 ynnsman_events.272.d:0 "Les nains argezeniques sont des mineurs renommés, utilisant des techniques affinées par des millénaires passés dans les grottes de l'Échine-du-Serpent, pour tailler la pierre plus efficacement que quiconque. Et heureusement pour nous, ils nous offrent les fruits de leur labeur, de la pierre parfaitement taillée à utiliser comme matériaux de construction."
 ynnsman_events.272.a:0 "Ah, les fruits du labeur des autres."
 ynnsman_events.272.b:0 "Ça semble coûteux."

 ynnsman_events.273.t:0 "Un Fonctionnaire Mineur Obtient un Contrat Minier !"
 ynnsman_events.273.d:0 "Un fonctionnaire mineur a obtenu un grand contrat exclusif d'extraction et de production à [From.GetName], cela s'avère être une grande aubaine pour notre économie."
 ynnsman_events.273.a:0 "Donnez une promotion à ce nain !"

 ynnsman_events.280.t:0 "Mercenaires Demi-Orques"
 ynnsman_events.280.d:0 "Une bataille se prépare dans l'Ynn, entre les Gardes de Bataille Malacnari de jadis et les nouveaux venus dans la région, les mercenaires demi-orques. Ce n'est pas une bataille littérale mais plutôt une de contrats, et nous avons reçu l'opportunité de prendre parti, car une bande de mercenaires demi-orques a demandé un contrat de service et des droits d'installation à [ynn_horc_mercs_prov.GetName]. Accepter ces nouveaux venus montrerait un soutien implicite aux demi-orques, et enragerait les Gardes de Bataille Malacnari. Cependant, accepter ce sang neuf améliorerait grandement la qualité de toutes nos compagnies de mercenaires."
 ynnsman_events.280.a:0 "Pour ma part, je souhaite la bienvenue à nos nouveaux condottières demi-orques !"
 ynnsman_events.280.b:0 "Nous devons honorer les défenseurs de longue date de l'Ynn !"

 ynnsman_events.281.t:0 "Formation par les Meilleurs"
 ynnsman_events.281.d:0 "Les mercenaires demi-orques de Chippengard sont parmi les forces combattantes les plus prisées de l'Ynn. Notre relation étroite avec leur patrie nous a donné l'opportunité de faire former nos soldats par certains de leurs élites"
 ynnsman_events.281.a:0 "Cette expertise sera inestimable"
 ynnsman_events.281.b:0 "Engagez leur Capitaine comme Instructeur Permanent"
 ynnsman_events.281.c:0 "Pourquoi vous paierions-nous pour former notre armée quand nous pouvons vous payer pour mener ses batailles ?"

 ynnsman_events.290.t:0 "Les Rudes Rôdeurs de la Forêt des Maudits"
 ynnsman_events.290.d:0 "Les Demi-Orques de la Marche Franche sont un groupe distant, mais leur connaissance pour survivre aux terreurs de la Forêt des Maudits est sans pareille. Un groupe de ces Demi-Orques a offert de nous aider à maintenir nos colonies dans la région en échange de terres en leur sein."
 ynnsman_events.290.a:0 "Cela gardera nos colons en sécurité la nuit"
 ynnsman_events.290.b:0 "Comment pouvons-nous faire confiance à ces gens ?"

 ynnsman_events.300.t:0 "Enchantement Runique ou Enchantement par Sorts ?"
 ynnsman_events.300.d:0 "Deux écoles dominantes d'enchantement ont émergé dans le sillage de l'arrivée cannorienne à l'Ynn. L'enchantement runique, pratiqué par les Veykodans, et l'enchantement par sorts, apporté par les Elfes Lunaires. L'enchantement runique est un artisanat moins complexe, moins cher à appliquer mais nécessitant un entretien plus fréquent, ce qui en fait l'option la plus attrayante pour une utilisation en guerre de masse, tandis que l'enchantement par sorts se concentre sur la fourniture d'enchantements durables qui nécessitent un entretien minimal mais un processus élaboré pour les créer, ce qui en fait le choix favori de notre noblesse montée."
 ynnsman_events.300.a:0 "L'enchantement runique, bien sûr ! L'infanterie est l'épine dorsale de notre armée !"
 ynnsman_events.300.b:0 "L'enchantement par sorts ! Notre cavalerie définit nos armées !"

 ynnsman_events.301.t:0 "Statue de Pelodir"
 ynnsman_events.301.d:0 "Les fanatiques suivant Pelodir le voient comme leur protecteur et souhaitent que tout le monde soit vu par son regard, artificiel ou non, en tout temps. À cause de cette croyance peu orthodoxe, un groupe d'Elfes Lunaires a construit une grande statue de leur chef au milieu de [rock_hard_statue_prov.GetName]. Ils avaient peut-être de bonnes intentions, mais ce n'est pas la manière de procéder. La statue doit être retirée, avoir une icône d'une puissance étrangère hostile au centre de l'une de nos villes est inacceptable."
 ynnsman_events.301.a:0 "Abattez cette statue !"
 ynnsman_events.301.b:0 "Dégradez la statue et renvoyez-la-leur !"

 ynnsman_events.302.t:0 "Les Nés-des-Ruines Envoient une Statue"
 ynnsman_events.302.d:0 "Sans y avoir été invité, [From.GetName] a envoyé une statue de Pelodir, dégradée avec des remarques grossières, accompagnée d'un émissaire ricanant. Il a déclaré que la livraison était une représaille pour notre installation de la statue sur leur territoire. Notre gouvernement est déconcerté par l'accusation, et insulté par le manque de respect montré envers notre bienveillant fondateur, Pelodir, qui n'a jamais voulu autre chose qu'aider ces pauvres nés-des-ruines."
 ynnsman_events.302.a:0 "Ces sauvages n'ont aucun respect pour leurs supérieurs !"
 ynnsman_events.302.b:0 "Ce n'était sûrement qu'un malentendu !"

 ynnsman_events.310.t:0 "Des Bandits Havoralis Rançonnent une Ville !"
 ynnsman_events.310.desc:0 "Des bandits de [ynn_havoral_bandit_origin.GetName] ont attaqué l'une de nos colonies à [ynn_havoral_bandit_prov.GetName] et enlevé ses résidents dans une tentative d'extorquer une rançon. Parmi les captifs se trouvent des personnages liés aux domaines principaux de [Root.GetName], aussi les bandits ont-ils élevé la rançon à un prix exorbitant. Quand nos agents ont essayé de négocier, les bandits ont répondu en nous donnant une liste de noms et le choix de qui sauver et qui abandonner."
 ynnsman_events.310.a:0 "Récupérez-les tous, même les paysans !"
 ynnsman_events.310.b:0 "[ynn_havoral_bandit_prov.GetName] a besoin de cette famille de marchands !"
 ynnsman_events.310.c:0 "La noblesse ne nous pardonnera pas si nous abandonnons cette princesse !"
 ynnsman_events.310.d:0 "Sauvez le Prêtre-du-Fleuve !"
 ynnsman_events.310.e:0 "Nous ne négocions pas avec les brigands !"

 ynnsman_events.311.t:0 "Une Compagnie de Bandits Fait une Belle Prise"
 ynnsman_events.311.d:0 "L'une de nos compagnies de bandits a réussi à capturer et rançonner un membre important du gouvernement de [From.GetName] pour une belle somme d'or. Et notre part vient d'arriver !"
 ynnsman_events.311.a:0 "Bon travail les gars !"

 ynnsman_events.312.t:0 "Une Compagnie de Bandits Fait le Gros Coup"
 ynnsman_events.312.d:0 "L'une de nos compagnies de bandits a réussi à capturer et rançonner une ville entière à [From.GetName] pour une belle somme d'or ! Et notre part vient d'arriver !"
 ynnsman_events.312.a:0 "Haha ! Oui ! À nous le blackjack et les filles elfes !"


# Buycev Events
 mages_aid_wendigo_hunt:0 "Des mages aident à la chasse au Wendigo"

 ynn_buycev_events.1.t:0 "Un Raid Buycev Repoussé !"
 ynn_buycev_events.1.d:0 "Aujourd'hui les Buycev, les nomades belliqueux qui habitent les franges du Fleuve Ynn tout en refusant de reconnaître la civilisation et la religion ynniques, ont lancé un autre de leurs incessants raids sur nos terres. Ils ont frappé vite et fort, visant un petit village près de la frontière. Cependant ils se sont tellement laissé emporter par le pillage de nos terres qu'ils n'ont pas remarqué la garnison voisine marchant pour les affronter au combat.\n\nLe combat fut rude et il y eut des pertes des deux côtés mais au final les Buycev furent contraints à la retraite, laissant derrière eux une grande partie de leurs biens volés. Bien que la victoire ne ramènera pas ceux que nous sommes arrivés trop tard pour sauver, elle garantira que les Buycev restent à l'écart. D'ici au moins, et juste pour un temps."
 ynn_buycev_events.1.a:0 "Le troupeau est sauf !"

 ynn_buycev_events.2.t:0 "Un Moment d'Opportunité"
 ynn_buycev_events.2.d:0 "Aujourd'hui notre maître-espion a été approché par un chef buycev local. Il a apparemment entendu dire que nous sommes rivaux avec les dirigeants qu'il a l'intention de bientôt piller, et nous a offert une part du butin si nous contribuions un peu d'or à sa cause.\n\nBien que certains conseillers aient suggéré d'accepter cette offre, d'autres sont moins enthousiastes. Premièrement et surtout, c'est une chose presque sauvage à faire. Non seulement utiliser une méthode si déloyale pour couper l'herbe sous le pied d'un rival, mais compter sur les Buycev pour faire le sale travail ne fait qu'empirer les choses. L'une des rares choses qui unit tous les peuples ynniques est la haine des Buycev. Les lancer contre un rival pour un avantage momentané est un coup bas."
 ynn_buycev_events.2.a:0 "Acceptons l'offre"
 ynn_buycev_events.2.b:0 "Renvoyons ce barbare !"

 ynn_buycev_events.3.t:0 "Un Complot Perfide !"
 ynn_buycev_events.3.d:0 "Aujourd'hui nous avons encore été pillés par les barbares buycev. Ce n'est pas inhabituel. Ce qui est inhabituel cependant, c'est que ces barbares sont mieux armés qu'ils ne l'étaient la dernière fois, et avaient plus d'hommes et d'armures aussi. Après la retraite des pillards, nous avons inspecté les cadavres laissés derrière et avons trouvé que leur armure porte les marques distinctives d'avoir été forgée par l'un de nos rivaux ! Sans doute ces viles canailles ont-elles soudoyé ces barbares pour nous attaquer ! C'est cynique et méprisable ! Certains disent même que cela signifie la guerre !"
 ynn_buycev_events.3.a:0 "N'ont-ils aucune honte ?"

 ynn_buycev_events.4.t:0 "Nous Avons Été Découverts !"
 ynn_buycev_events.4.d:0 "Nous avons reçu un message des terres que nous avons payé les Buycev pour piller. Il semble que le raid se soit bien passé, mais les Buycev ont subi des pertes. En inspectant ces cadavres, nos rivaux sont arrivés à la conclusion que nous avons payé les Buycev pour piller leurs terres ! Bien sûr nous savons que c'est vrai. Cependant nous ne pouvons pas simplement l'admettre. Nous devons et allons simplement maintenir notre innocence, malgré toutes les preuves du contraire."
 ynn_buycev_events.4.a:0 "Mensonges et calomnies !"

#Veykodan Events

 ynn_buycev_events.50.t:0 "Raid Veykodan"
 ynn_buycev_events.50.d:0 "Une bande de Veykodans pille l'une de nos provinces"
 ynn_buycev_events.50.a:0 "Puisse l'Ynn les défendre"
 ynn_buycev_events.50.b:0 "Envoyons des soldats pour les chasser"
 ynn_buycev_events.50.c:0 "Engageons les meilleurs mercenaires disponibles, tuons-les tous."

 ynn_buycev_events.52.t:0 "Rivalités Veykodanes"
 ynn_buycev_events.52.d:0 "Les Veykodans se battent beaucoup entre eux, nous pouvons aider une tribu à gagner sa querelle en échange de leur défense de notre frontière"
 ynn_buycev_events.52.a:0 "Bon plan"
 ynn_buycev_events.52.b:0 "Non"

 ynn_buycev_events.53.t:0 "Embuscade"
 ynn_buycev_events.53.d:0 "C'est un jour pluvieux et une bande de guerriers veykodans, couverts de tatouages sinueux et aux muscles imposants, mais armés d'armes simples nous barre le chemin, que faisons-nous."
 ynn_buycev_events.53.a:0 "Payons-les et ils ne nous feront pas de mal"
 ynn_buycev_events.53.b:0 "Tuons-les, je ne me rendrai pas !"

 ynn_buycev_events.54.t:0 "Faux Veykodans"
 ynn_buycev_events.54.d:0 "Tandis que la bande s'éloigne par-dessus une colline, leurs tatouages commencent à se dissoudre sous la pluie, il est évident que nous avons été dupés"
 ynn_buycev_events.54.a:0 "N'en parlez à personne"

 ynn_buycev_events.55.t:0 "Faux Veykodans"
 ynn_buycev_events.55.d:0 "Dès que le combat a commencé, il est devenu clair qu'ils n'étaient pas de vrais veykodans, la pluie a dissous leurs tatouages et nous les avons tous tués comme les imposteurs qu'ils étaient."
 ynn_buycev_events.55.a:0 "Je ne suis pas facile à duper"

 ynn_buycev_events.56.t:0 "Auxiliaires à Tigres à Dents de Sabre ?"
 ynn_buycev_events.56.d:0 "Bemo, le capitaine d'une compagnie de mercenaires à tigres à dents de sabre renommée, visite la cour à [Root.Capital.GetName] pour offrir ses services au [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Bemo promet que si lui et sa compagnie sont engagés par le [Root.GovernmentName], ils s'engageront alors à aller au-delà de leurs obligations normales et à prévenir tous les raids dont ils pourraient avoir connaissance."
 ynn_buycev_events.56.a:0 "Puis-je monter l'un de vos tigres, Bemo ?"
 ynn_buycev_events.56.b:0 "Pourquoi voudrais-je des chats domestiques buycev quand j'ai des Chevaux-à-Bois ?"
 ynn_buycev_events.56.c:0 "C'est très aimable de votre part Bemo, mais je ne suis pas intéressé par l'offre."


 ynn_buycev_events.57.t:0 "Une Compagnie de Tigres à Dents de Sabre Pille [Root.Province.GetName] !"
 ynn_buycev_events.57.d:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a reçu une lettre théâtrale de Devynn Zakavlai, un fonctionnaire administratif mineur de [Root.Province.GetName], détaillant un raid tout à fait ordinaire.\n\n« Le redouté Bemo, chef d'une compagnie de tigres à dents de sabre renommée a pillé [Root.Province.GetName]. Tandis que l'abominable capitaine Bemo fuyait votre territoire en ricanant, je me suis retrouvé à faire l'inventaire de ce qu'il nous a laissé : nous avons trouvé des dizaines de villages autrefois productifs et animés abandonnés ; de vastes étendues de terres agricoles ont été brûlées en représailles pour notre prétendue insulte. Et pire que tout, le cheval-à-bois de mon percepteur, autrefois ployant sous les nombreuses pièces d'or présentes dans ses sacoches de selle, a été trouvé gambadant dans un champ ouvert, libre de sa selle autrefois dorée. »\n\nLe récit de Zakavlai est certainement tout un conte, vraisemblablement, il croyait que sa lettre serait le seul témoignage de l'événement qui atteindrait la cour à [Root.Province.GetName]. Il devait s'attendre à un joli paiement du [Root.GovernmentName] pour financer l'effort de reconstruction d'une province si « ravagée »."
 ynn_buycev_events.57.a:0 "Amenez ce conteur de sornettes à la cour !"
 ynn_buycev_events.57.b:0 "Ha, belle tentative Zakavlai."


 ynn_buycev_events.58.t:0 "Un Scribe Runique Offre des Tatouages à Notre Armée !"
 ynn_buycev_events.58.d:0 "Nous avons reçu une offre très, très étrange, enfin la qualifier d'étrange serait un euphémisme, c'est plus exactement radicalement non conventionnel. Un scribe runique veykodan, Ur Fijon, offre de donner à notre armée ses tatouages runiques bien connus, moyennant un prix bien sûr. Si nous acceptions son offre, notre armée verrait de grands bénéfices de l'utilisation de ces puissantes magies veykodanes.\n\nNotre peuple cependant ne verrait pas cela d'un bon œil : la vue de nos soldats marchant de ville en ville portant les marques de nos ennemis de longue date ébranlerait sans doute leur foi en notre [Root.GovernmentName]."
 ynn_buycev_events.58.a:0 "Je prendrai quelques-unes de vos marques, Fijon."
 ynn_buycev_events.58.b:0 "Mon ami Ur Fijon, j'ai un travail de taille pour vous !"
 ynn_buycev_events.58.c:0 "Qui a amené ce barbare ici ? Exécutez cet elfe sur-le-champ !"


 ynn_buycev_events.59.t:0 "Un Scribe Runique Offre un Tatouage à [Root.Monarch.GetName] !"
 ynn_buycev_events.59.d:0 "Nous avons reçu une proposition étrange d'un scribe runique veykodan bien connu, Kalaszo Varyl. Il est venu à la cour de [Root.Capital.GetName] et souhaite rendre visite au [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Il vient avec une offre de, comme il l'a dit, « lier nos deux peuples plus étroitement ensemble via un ensemble spécial de tatouages complexes et ornés ». Dans la culture veykodane, les tatouages runiques sont encrés dans la peau et utilisés pour lancer de puissantes magies d'évocation. Cet elfe, Varyl, connaît la capacité magique du [Root.Monarch.GetTitle] [Root.Monarch.GetName] et souhaite l'améliorer en utilisant son habileté dans l'art du tatouage runique, moyennant un prix bien sûr. Voir notre monarque couvert de symboles étrangers ne plairait pas à notre peuple : ce serait une trahison envers nos sujets, car de nombreuses bonnes vies elfiques ont été écourtées par les Buycev et leur soif sauvage de notre or brillant."
 ynn_buycev_events.59.a:0 "Ces tatouages sont assez magnifiques."
 ynn_buycev_events.59.b:0 "Qui a ouvert les portes à cet elfe fou ?!"


#Epednar Events

 ynn_buycev_events.100.t:0 "Les Epednars Pillent une Province"
 ynn_buycev_events.100.d:0 "Une bande d'Epednars, montés sur des chevaux rapides des plaines, pille l'une de nos provinces"

 ynn_buycev_events.101.t:0 "Un Chef Epednar Offre ses Services"
 ynn_buycev_events.101.d:0 "Un chef d'une tribu epednare nous offre l'aide de sa tribu en temps de guerre"
 ynn_buycev_events.101.a:0 "Rejoignez mon armée"
 ynn_buycev_events.101.b:0 "L'éclairage et les flanquements seront votre devoir"
 ynn_buycev_events.101.c:0 "Allez-vous-en, idiot de buycev"

 ynn_buycev_events.102.t:0 "Les Epednars Volent du Bétail"
 ynn_buycev_events.102.d:0 "Des pillards epednars se sont emparés de grands troupeaux de bétail de l'une de nos provinces"
 ynn_buycev_events.102.a:0 "Puisse l'Ynn protéger ces Aurochs"

#Old Rzentur Events

 ynn_buycev_events.125.t:0 "Les Vieux Rzentur Pillent une Province"
 ynn_buycev_events.125.d:0 "Une armée de Vieux Rzentur, mystiques et silencieux, pille l'une de nos provinces"

 ynn_buycev_events.126.t:0 "Marchands de Fourrures des Vieux Rzentur"
 ynn_buycev_events.126.d:0 "Les terres des Vieux Rzentur ne sont connues que de peu en dehors d'eux et regorgent de fourrures, une tribu nous offre maintenant de bons prix si nous acceptons de les payer régulièrement"
 ynn_buycev_events.126.a:0 "Bonne affaire"
 ynn_buycev_events.126.b:0 "Non, nous chassons mieux que les buycev de toute façon"

 ynn_buycev_events.127.t:0 "Murmures de Vechnogejzn"
 ynn_buycev_events.127.d:0 "On dit que les Vieux Rzentur gardent des flammes mystérieuses, une pour chaque tribu. Ces flammes ne meurent jamais si les légendes sont vraies, et maintenant il est venu à notre attention qu'une tribu près de notre frontière a subi quelque malheur, et s'est entièrement éteinte. Ce pourrait être une bonne opportunité d'envoyer un groupe de recherche pour voir si ces légendes incendiaires sont vraies."
 ynn_buycev_events.127.a:0 "Envoyez un groupe de recherche"
 ynn_buycev_events.127.b:0 "C'est insensé et dangereux"

 ynn_buycev_events.128.t:0 "Vechnogejzn Trouvée"
 ynn_buycev_events.128.d:0 "Ondulant en langues multicolores, la flamme est magnifique mais dégage un malaise glaçant à tous ceux qui la contemplent, que ferons-nous de ce trophée ?"
 ynn_buycev_events.128.a:0 "Gardons-la en exposition, et surveillons-la de près"
 ynn_buycev_events.128.b:0 "Détruisons ce Feu hérétique !"
 ynn_buycev_events.128.c:0 "Offrons-la à une tribu qui sait quoi en faire"

 ynn_buycev_events.129.t:0 "Groupe de Recherche Perdu"
 ynn_buycev_events.129.d:0 "Les vents hurlent à travers les forêts du nord, les bêtes murmurent dans les ombres, et les fées rient derrière les feuilles. Mais nulle part les cors de nos braves hommes ne nous appellent peu importe combien nous les cherchons."
 ynn_buycev_events.129.a:0 "La Forêt les a pris"

#Cursed Ones Events

 ynn_buycev_events.150.t:0 "Les Maudits Dévastent une Province"
 ynn_buycev_events.150.d:0 "Malgré les défenses locales, les Maudits ont attaqué l'une de nos provinces, à présent ils tuent et détruisent tout ce qu'ils trouvent."

#Colonial events

 ynn_buycev_events.175.t:0 "Une Colonie Pillée par des Veykodans Montés !"
 ynn_buycev_events.175.d:0 "Nos colons à [Root.Province.GetName] ont été trouvés empalés et leurs maisons pillées. La garnison locale n'a découvert l'attaque que le lendemain matin : de nombreuses maisons ont été trouvées portes entrouvertes, leurs habitants massacrés et leurs objets de valeur volés. Notre pauvre percepteur s'est également trouvé être la cible de l'une des attaques, laissant l'État avec beaucoup moins de revenus que prévu. D'après les empreintes de pattes trouvées autour de la section la moins défendue du mur de la colonie, il semble probable qu'une bande de Veykodans ait utilisé leurs agiles montures à dents de sabre pour sauter par-dessus nos palissades en pleine nuit, nous prenant au dépourvu."
 ynn_buycev_events.175.a:0 "C'est la vie à la frontière."


 ynn_buycev_events.176.t:0 "Le Fléau de [Root.Province.GetName]"
 ynn_buycev_events.176.desc:0 "Une lettre est arrivée du gouverneur de la colonie de [Root.Province.GetName] qui lit :\n\n« Mon [Root.Monarch.GetTitle], notre colonie a été rasée par un Veykodan maniant de terribles magies. J'ai regardé depuis les remparts tandis qu'un Veykodan décrépit, couvert de la tête aux pieds de tatouages, brillant de rouge avec des pulsations de bleu, boitait jusqu'à la place de la ville sur une canne et attendait. Il a pris une profonde inspiration, et ses tatouages ont commencé à briller. Au début, c'était un seul rayon d'énergie : les gens autour de lui regardaient avec étonnement et se sont approchés. Mais d'autres sont venus du Veykodan, et ceux-ci étaient brûlants, des dizaines de flux sinueux de rouge et de bleu émanaient de ce vil Veykodan, se répandant dans toutes les directions et faisant des bruits de crépitement terribles tandis que l'air lui-même bouillait de chaleur.\n\nLa ville et ses résidents paniqués furent enveloppés par ce barrage rampant. Les chanceux, ceux directement touchés, furent réduits en cendres en un instant, les autres périrent dans l'incendie qui s'ensuivit. Mes propres vêtements prirent feu dans le chaos, mais je me suis souvenu du ruisseau près des remparts, en contrebas d'un petit escarpement. J'ai couru vers lui et plongé, perdant connaissance. Je fus réveillé par le bruit du vent hurlant et du feu déchaîné, et j'ai levé la tête au-dessus de l'escarpement pour voir que toute la ville avait été consumée par les flammes, avec ce Veykodan décrépit boitillant sur sa canne, admirant son œuvre tandis qu'il cherchait des survivants ! Heureusement l'escarpement cachait le ruisseau de sa vue. Un moment plus tard il partit avec une femme veykodane le soutenant dans sa boiterie. »\n\nLe récit du gouverneur de ce qui s'est passé a été consigné et diffusé. Maintenant nos citoyens exigent que nous trouvions ce Veykodan, surnommé « le Fléau de [Root.Province.GetName] », et le fassions torturer à mort pour ses crimes. L'un de nos généraux a suggéré d'envoyer une armée à [Root.Province.GetName] pour le trouver et accomplir le souhait du peuple.\n\n§RLe nombre de troupes que nous enverrons à [Root.Province.GetName] déterminera notre chance de succès dans la chasse au Veykodan. Nous avons 30 jours pour envoyer une armée dans la province.§!"
 ynn_buycev_events.176.a:0 "Envoyons quelques hommes."
 ynn_buycev_events.176.b:0 "Envoyons quelques hommes et engageons des guides locaux."
 ynn_buycev_events.176.c:0 "Envoyons quelques hommes à [Root.Province.GetName]."
 ynn_buycev_events.176.d:0 "Eh bien, c'est une tragédie mais nos armées ne peuvent épargner aucune aide en ce moment."


 ynn_buycev_events.177.t:0 "Le Fléau Trouvé !"
 ynn_buycev_events.177.d:0 "Profondément dans la forêt, à de nombreux kilomètres de tout signe de civilisation, nous avons trouvé une modeste cabane nichée entre les arbres. En fouillant la maison, nos soldats ont trouvé une jeune femme et un Veykodan âgé avec les mêmes tatouages pulsants que celui qui a détruit notre colonie à [rune_mage_raid_prov.Province.GetName]. Le Veykodan gît dans son lit sans réagir, comme s'il était mort. Par l'interrogatoire de la femme, nos soldats découvrent que ce Veykodan est bien celui responsable de la destruction à [rune_mage_raid_prov.Province.GetName].\n\nAvant que nos soldats ne commencent à l'emmener, elle continue : « Si mon frère n'avait pas été tué par l'un de vos méprisables soldats de sang-froid, mon père n'aurait jamais mis les pieds dans votre ville maudite ! Il était déjà gravement malade avant d'aller à [rune_mage_raid_prov.Province.GetName]. Il serait mort dans les 2 mois, mais votre acte méprisable a fait bouillir le sang de mon père. Il s'est donné pour mission de faire payer votre peuple, pour qu'ils ressentent dix fois la souffrance que nous avons traversée. Et vous l'avez ressentie, nous sommes quittes pour le moment, mais cela a pris la dernière énergie de mon père et il sera mort dans la semaine ; il serait déjà décédé sans moi. Alors je vous demande de faire un acte de bonté dans toute votre misérable vie, et de nous laisser tranquilles. Vous m'avez déjà pris mon frère, et les derniers moments heureux de la vie de mon père, que voulez-vous de plus ? »\n\nL'officier répond sans hésitation :"
 ynn_buycev_events.177.a:0 "Tuez-le, et mettez sa tête sur une pique devant [Root.Capital.GetName] !"

 ynn_buycev_events.178.t:0 "Le Fléau Toujours en Liberté"
 ynn_buycev_events.178.d:0 "La force que nous avons envoyée n'a trouvé aucune trace de ce Veykodan, tout ce que nos soldats ont trouvé étaient des villages endormis ordinaires et de vastes étendues de forêt vide."
 ynn_buycev_events.178.a:0 "Malédiction !"


 ynn_buycev_events.179.t:0 "Un Wendigo Attaque la Colonie de [Root.Province.GetName] !"
 ynn_buycev_events.179.d:0 "Notre colonie a été attaquée par un Wendigo, une menace omniprésente à travers l'Ynn. Ce sont des humanoïdes décharnés avec des têtes de cerf trempées de sang, de longues griffes acérées en guise de mains et une faim insatiable de chair. Si cette menace n'est pas traitée, notre peuple réfléchira à deux fois avant de rejoindre d'autres efforts coloniaux à [Root.Province.GetName]."
 ynn_buycev_events.179.a:0 "Rassemblez nos meilleurs ! Il est temps de chasser !"
 ynn_buycev_events.179.b:0 "Juste un wendigo ? Pourquoi devrais-je m'en soucier ?"


 ynn_buycev_events.180.t:0 "Comment Allons-Nous Chasser ?"
 ynn_buycev_events.180.d:0 "De nombreux membres éminents de notre pays sont venus à [Root.Capital.GetName] pour offrir leurs services dans notre chasse. Les membres de l'assemblée qui intéressent particulièrement notre [Root.Monarch.GetTitle] : un vieux commandant aguerri et un jeune chevalier ynnique, certains diraient téméraire. Le commandant demande dix mille hommes forts et valides pour trouver le vicieux Wendigo et le faire occire. Le jeune chevalier, Sire Galindan, suggère que notre [Root.Monarch.GetTitle] devrait chasser le wendigo [Root.Monarch.GetHerHis] seul. Galindan ensuite, sans qu'on lui demande, présumément pour accentuer son point, commence à divertir l'assemblée avec des légendes ynniques d'antan :\n\nIl raconte l'histoire du Roi des Batailles Malacnari Vatrevid Roosgevit, qui, lassé de voir ses sujets massacrés par les Wendigos, rassembla ses guerriers et en tua un nombre incalculable, tant et si bien que les monstres n'osèrent plus approcher Malacnar pendant cent ans ! Pour ne pas être en reste, le Seigneur-à-Bois Privyldha de Stantirvare fit dépouiller ses gardes de leurs vêtements, ne gardant que leurs épées, et tuer un wendigo seuls pour prouver leur valeur et devenir des cavaliers à part entière ! Et bien sûr, le chevalier à moitié fou Yanobnik Stretocvytrie, qui en rentrant d'un tournoi de joutes aperçut une meute de wendigos attaquant un groupe de voyageurs, mit sa lance en arrêt et chargea, embrochant trois des bêtes d'un seul coup !\n\nMême si les contes de Galindan sont très probablement apocryphes, ils contiennent une part de vérité, le peuple respecte un [Root.Monarch.GetTitle] qui se battra pour eux."
 ynn_buycev_events.180.a:0 "Donnez au commandant ses dix mille !"
 ynn_buycev_events.180.b:0 "Trouvez un devin ! Et donnez au commandant ses dix mille !"
 ynn_buycev_events.180.c:0 "Je tuerai cette vile bête, car je suis le [Root.Monarch.GetTitle] !"
 ynn_buycev_events.180.e:0 "Trouvez un devin ! Et je tuerai cette vile bête, car je suis le [Root.Monarch.GetTitle] !"


 ynn_buycev_events.181.t:0 "Wendigo Tué par des Soldats !"
 ynn_buycev_events.181.d:0 "Le général et une centaine de ses hommes ont trouvé le wendigo, il était à peine visible à travers les broussailles de la forêt mal entretenue ; il mangeait, quelque chose, quelque chose de petit. La vue fit vomir beaucoup des hommes du général, le corps mutilé les fixait sans vie d'un seul œil, plein de terreur.\n\nAprès que les hommes se furent ressaisis, ils tentèrent de se faufiler jusqu'à la bête. Une brindille fut cassée avant que les hommes ne puissent se former autour de l'animal. Le wendigo tourna la tête de son repas d'un mouvement fluide et hurla dans un rugissement guttural, moins d'une seconde plus tard les trois soldats les plus proches de la bête étaient occis. Une course folle s'ensuivit tandis que la bête sprintait à travers la forêt, réalisant qu'elle était en infériorité numérique ; nos soldats la poursuivirent avec un abandon téméraire. Le wendigo se retourna plusieurs fois pour frapper ses poursuivants, les laissant agrippant les trous béants dans leurs cous.\n\nFinalement, un semblant d'organisation fut restauré, et heureusement la bête s'était acculée contre une falaise à pic. Le général capitalisa rapidement sur cela et fit former à ses hommes un grand cercle autour de la bête, la piégeant. Après beaucoup de débattements, de nombreuses piques brisées, la mort d'un officier et de quelques soldats qui n'avaient pas gardé leurs distances, la bête fut finalement abattue, morte de mille coupures. Il n'y eut cependant pas de célébration, car aucune gloire ne fut gagnée, la seule chose forgée ici dans les bois autour de [Root.Province.GetName] fut des cauchemars pour ces soldats qui n'oublieraient jamais cette horreur, ils remercieraient éternellement leurs prédécesseurs d'avoir rendu ces bêtes rares dans l'Ynn."
 ynn_buycev_events.181.a:0 "Rendons grâce au divin que je n'aie pas essayé de chasser cette chose !"

 ynn_buycev_events.182.t:0 "Wendigo Tué par [Root.Monarch.GetName]"
 ynn_buycev_events.182.d:0 "Notre [Root.Monarch.GetTitle] est revenu de la chasse après deux semaines, boitant, trempé de sang mais victorieux ! [Root.Monarch.GetSheHeCap] a régalé l'assemblée rassemblée à [Root.Capital.GetName] de comment [Root.Monarch.GetSheHe] a traqué la bête et interrompu son repas. Comment elle s'est ensuite jetée sur [Root.Monarch.GetHerHim] dans une attaque fulgurante pour l'avoir interrompue, laissant une grande marque sur le casque du [Root.Monarch.GetTitle] [Root.Monarch.GetName], que [Root.Monarch.GetSheHe] a fièrement présenté à l'assemblée comme un insigne d'honneur.\n\nPuis en détail comment [Root.Monarch.GetSheHe] a échangé coup pour coup avec le wendigo, lui estropiant la jambe et étant férocement frappé à la poitrine en retour pour l'avoir mutilé. Le [Root.Monarch.GetTitle] trancha un doigt d'une griffe, la blessant au vif et faisant jaillir le sang de la bête qui hurla d'agonie. Finalement le [Root.Monarch.GetTitle] gagna la bataille car lorsque le wendigo donna un coup de patte à [Root.Monarch.GetName], il se laissa ouvert, ils se frappèrent mutuellement, cependant, l'armure lourde du [Root.Monarch.GetTitle] le protégea du pire du coup sauvage du wendigo, lui permettant de glisser [Root.Monarch.GetHerHis] épée sous la cage thoracique de la bête et de finalement l'achever.\n\nMaintenant que la bête était morte, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] récupéra la griffe et en fit un pendentif. Ne manquant jamais une bonne opportunité, notre [Root.Monarch.GetTitle] s'assura que [Root.Monarch.GetHerHis] récit de la bataille serait distribué dans chaque ville du royaume, représentation artistique du casque bosselé et du pendentif de griffe inclus bien sûr."
 ynn_buycev_events.182.a:0 "Je suis vraiment formidable, n'est-ce pas ?"


 ynn_buycev_events.183.t:0 "Échec de la Chasse au Wendigo !"
 ynn_buycev_events.183.d:0 "La chasse a échoué, cela fait plus d'un mois et la seule chose que nous avons trouvée ce sont les os blanchis de nos citoyens et de nos soldats morts, aucun wendigo en vue. Cependant la bête reste en liberté dans la province et notre colonie voit des dizaines de ses résidents disparaître, pour être trouvés plus tard, leurs carcasses décharnées, la seule chose restant étant leurs os griffés."
 ynn_buycev_events.183.a:0 "Je suis sûr qu'il partira éventuellement."


 ynn_buycev_events.184.t:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] Trouvé Mort"
 ynn_buycev_events.184.d:0 "Après deux semaines sans nouvelles de notre [Root.Monarch.GetTitle], un groupe de recherche a été formé pour le chercher. Il a fallu une semaine de ratissage des bois que le wendigo a infestés pour trouver l'armure raffinée que notre [Root.Monarch.GetTitle] portait quand il est parti, maintenant cabossée et trempée de sang. Elle a été trouvée à plusieurs mètres des os du [Root.Monarch.GetTitle] [Root.Monarch.GetName], nettoyés par le wendigo. La seule chose identifiant clairement le corps comme étant spécifiquement celui de [Root.Monarch.GetName] était l'anneau doré et incrusté de gemmes trouvé parmi les os des doigts portant le lettrage éclaboussé de sang « [Root.Monarch.Dynasty.GetName] ». Les citoyens du [Root.GovernmentName] n'ont aucune sympathie pour leur précédent [Root.Monarch.GetTitle], s'il y a quoi que ce soit, ils ressentent du ressentiment, car leur dirigeant supposément sage est parti en mission suicide qui s'est terminée de manière prévisible, laissant le [Root.GovernmentName] dans un état de désarroi."
 ynn_buycev_events.184.a:0 "Occupez-vous de [Root.Monarch.GetHerHis] funérailles rapidement et discrètement. Espérons que le [Root.GovernmentName] l'oubliera vite."


 ynn_buycev_events.185.t:0 "Un Veykodan Tatoué Perd son Calme"
 ynn_buycev_events.185.d:0 "Un Veykodan avec un ensemble de tatouages magiques lumineux, non habitué aux jeux de hasard cannoriens, a été convaincu par le propriétaire du bar de la colonie de [veykodan_tavern_brawl.Province.GetName] de participer à un jeu de bonneteau. Le Veykodan fut bientôt désemparé, car il avait perdu chaque partie sauf la première, le laissant les poches vides. Quelqu'un de plus versé dans les jeux de hasard cannoriens tapota l'épaule du Veykodan et l'informa qu'il était trompé. Les tatouages du Veykodan se mirent à briller, tandis qu'il menaçait le bonneteur et affirmait que toute la ville serait rasée si son argent ne lui était pas rendu.\n\nLe bonneteur, manifestement inconscient de la menace posée par la magie veykodane, l'ignora et commença à argumenter. Le propriétaire tenta de désamorcer la situation mais il était trop tard, car notre colonie fut bénie d'un nouveau cratère fumant de la taille du bar, avec un Veykodan pas amusé debout seul au centre, tenant une lourde bourse. Le Veykodan fut autorisé à quitter la ville, car aucun membre de la garnison n'osa le défier après cette démonstration. Dans les suites de cet événement particulier, nous nous retrouvons avec une ville frontalière sans bar, ce qui est une recette pour le désastre, car de nombreux résidents de [veykodan_tavern_brawl.Province.GetName], citoyens ou non, en sont venus à dépendre de la boisson, sans laquelle on peut s'attendre à ce qu'ils deviennent assez turbulents."
 ynn_buycev_events.185.a:0 "Reconstruisez ce bar ! Mais plus de jeux de hasard !"
 ynn_buycev_events.185.b:0 "Construisons une bibliothèque, pourquoi boire quand on peut apprendre ?"
 ynn_buycev_events.185.c:0 "Pourquoi un bar détruit dans une ville frontalière est-il mon problème ?"


 ynn_buycev_events.186.t:0 "Une Colonie Construite sur un Site Rituel [buycev_site_from.Culture.GetName] !"
 ynn_buycev_events.186.d:0 "Notre colonie à [buycev_site_prov.Province.GetName], à notre insu, a été fondée directement sur un site rituel [buycev_site_from.Culture.GetName]. Les [buycev_site_from.Culture.GetName] à [buycev_site_prov.Province.GetName] sont enragés par nos transgressions sur leur terre sacrée, et rassemblent leurs forces alors que nous parlons. L'administrateur colonial, ne souhaitant pas causer de bain de sang, a demandé que la colonie soit déplacée, afin de désamorcer la situation. En raison de la petite taille de la colonie, il ne coûterait pas une somme particulièrement importante de déraciner le campement."
 ynn_buycev_events.186.a:0 "Comme si j'avais besoin de plus de problèmes, déplacez simplement la colonie."
 ynn_buycev_events.186.b:0 "Ils veulent que je déplace MA colonie ?"


 ynn_buycev_events.187.t:0 "Un Chef [buycev_site_from.Culture.GetName] Apporte la Guerre !"
 ynn_buycev_events.187.d:0 "Le neveu d'un chef [buycev_site_from.Culture.GetName] a été tué par l'un de nos citoyens. L'administration coloniale a ignoré ses demandes de justice et il a donc pris l'affaire en main. Le chef a rassemblé une armée, et elle est en route vers la colonie de [buycev_site_prov.Province.GetName] avec l'intention de tuer."
 ynn_buycev_events.187.a:0 "Préparez-vous, soldats !"


 ynn_buycev_events.188.t:0 "Ultimatum [buycev_site_from.Culture.GetName] !"
 ynn_buycev_events.188.d:0 "Un homme puissant dans la société [buycev_site_prov.Culture.GetName] a envoyé un ultimatum à [Root.Capital.GetName]. Il exige que l'un de nos citoyens, qu'il croit être le meurtrier de son père, lui soit remis, afin que le supposé tueur puisse être puni conformément aux coutumes [buycev_site_from.Culture.GetName]. Si le « meurtrier » n'est pas remis dans les 3 mois, il a promis qu'une grande armée de guerre s'abattra sur notre colonie à [Root.Province.GetName], cherchant leur rétribution par le sang. Le citoyen accusé a nié toute responsabilité, affirmant plutôt que le chef [buycev_site_from.Culture.GetName] a tué son propre père dans une quête de pouvoir, puis l'a accusé pour éviter d'être vu comme un parricide."
 ynn_buycev_events.188.a:0 "Comme si j'avais besoin de plus de problèmes. Remettez-le simplement !"
 ynn_buycev_events.188.b:0 "Envoyez au chef une statuette miniature de lui poignardant son père dans le dos !"


 ynn_buycev_events.189.t:0 "Un Chef [buycev_site_from.Culture.GetName] S'installe dans Notre Colonie !"
 ynn_buycev_events.189.d:0 "Le chef d'un groupe [buycev_site_from.Culture.GetName] s'est installé dans notre colonie à [buycev_site_prov.Province.GetName]. Cet apport de sang s'avère être une grande aubaine pour la vitesse de développement de la colonie. Et heureusement pour nous, le chef nous a dit que plus de ses gens seraient disposés à s'installer dans la colonie si des logements supplémentaires étaient construits et réservés pour eux."
 ynn_buycev_events.189.a:0 "Non merci, nous en avons assez de vous."
 ynn_buycev_events.189.b:0 "Ça semble formidable, construisez ces maisons vite !"

# Jousting

 ynn_joust_events.1.t:0 "Préparatifs"
 ynn_joust_events.1.d:0 "Le [ynn_joust_opponent_2.Monarch.GetTitle] [ynn_joust_opponent_2.Monarch.GetName] de [ynn_joust_opponent_2.GetName] a défié le [ynn_joust_opponent_1.Monarch.GetTitle] [ynn_joust_opponent_1.Monarch.GetName] de [ynn_joust_opponent_1.GetName] en joute !"
 ynn_joust_events.1.a:0 "Je triompherai !"

 ynn_joust_events.13.d:0 "Le [ynn_joust_opponent_2.Monarch.GetTitle] [ynn_joust_opponent_2.Monarch.GetName] de [ynn_joust_opponent_2.GetName] a défié le [ynn_joust_opponent_1.Monarch.GetTitle] [ynn_joust_opponent_1.Monarch.GetName] de [ynn_joust_opponent_2.GetName] en joute !"

 ynn_joust_events.3.t:0 "Préparez-vous à la Passe"
 ynn_joust_events.3.d1:0 "[Root.Monarch.GetName] a de nombreuses options à sa disposition. Peut-être charger de front, forçant une réponse. Peut-être qu'une contre-attaque appropriée et une défense efficace seront la meilleure offensive. Même une action imprévisible et soudaine pourrait suffire à déstabiliser le cavalier ennemi."
 ynn_joust_events.3.d2:0 "[Root.Monarch.GetName] a maintenant atteint l'autre extrémité des lices, [Root.YnnJoustEvents3Bloc0], [Root.YnnJoustEvents3Bloc1] et [Root.YnnJoustEvents3Bloc2]. Si nous optons pour une attaque frontale, ils seront obligés de répondre à notre force. Agir de manière défensive ouvre une opportunité pour une contre-attaque dévastatrice. Enfin, nous pouvons tenter une frappe sauvage et imprévisible, mais nous serons en difficulté s'ils nous frappent trop fort et trop vite."
 YnnJoustEvents3Bloc0_1:0 "C'était leur première passe"
 YnnJoustEvents3Bloc0_2:0 "C'était leur deuxième passe"
 YnnJoustEvents3Bloc0_3:0 "C'était leur troisième passe"
 YnnJoustEvents3Bloc0_4:0 "C'était leur quatrième passe"
 YnnJoustEvents3Bloc0_5:0 "C'était leur cinquième passe"
 YnnJoustEvents3Bloc0_6:0 "C'était leur sixième passe"
 YnnJoustEvents3Bloc0_7:0 "C'était leur septième passe"
 YnnJoustEvents3Bloc0_8:0 "C'était leur huitième passe"
 YnnJoustEvents3Bloc0_9:0 "C'était leur neuvième passe"
 YnnJoustEvents3Bloc0_10:0 "C'était leur dixième passe"

 YnnJoustEvents3Bloc1_1:0 "[Root.Monarch.GetName] a tenté une charge frontale"
 YnnJoustEvents3Bloc1_2:0 "[Root.Monarch.GetName] a tenté une charge mesurée"
 YnnJoustEvents3Bloc1_3:0 "[Root.Monarch.GetName] a tenté une frappe imprévisible"

 YnnJoustEvents3Bloc2_1:0 "[Root.Monarch.GetHerHis] adversaire a répondu à la charge par une approche tonitruante ; leurs charges les ont fait s'écraser ensemble de manière dramatique mais sans donner d'avantage à l'un ou l'autre."
 YnnJoustEvents3Bloc2_2:0 "[Root.Monarch.GetHerHis] adversaire a répondu par un trot mesuré et régulier, utilisant la propre force de [Root.Monarch.GetName] comme une arme."
 YnnJoustEvents3Bloc2_3:0 "[Root.Monarch.GetHerHis] adversaire a tenté une feinte surprise, mais la vitesse de la charge de [Root.Monarch.GetName] les a pris au dépourvu."
 YnnJoustEvents3Bloc2_4:0 "[Root.Monarch.GetHerHis] adversaire a répondu par un trot mesuré et régulier, les charges lentes n'ont ébranlé aucun des cavaliers."
 YnnJoustEvents3Bloc2_5:0 "[Root.Monarch.GetHerHis] adversaire a répondu à la charge par une approche tonitruante, mais s'est écrasé contre [Root.Monarch.GetName] qui est resté ferme."
 YnnJoustEvents3Bloc2_6:0 "[Root.Monarch.GetHerHis] adversaire a tenté une feinte surprise, [Root.Monarch.GetName], s'attendant à un assaut frontal, a été pris par surprise."
 YnnJoustEvents3Bloc2_7:0 "[Root.Monarch.GetHerHis] adversaire a tenté une feinte surprise, ils sont tous deux passés en trombe, chacun échouant à frapper l'autre."
 YnnJoustEvents3Bloc2_8:0 "[Root.Monarch.GetHerHis] adversaire a répondu par un trot mesuré et régulier, non préparé à la ruse, et la lance de [Root.Monarch.GetName] a porté un coup solide."
 YnnJoustEvents3Bloc2_9:0 "[Root.Monarch.GetHerHis] adversaire a répondu à la charge par une approche tonitruante, s'écrasant contre [Root.Monarch.GetName] avant qu'[Root.Monarch.GetSheHe] ne puisse réagir."


 ynn_joust_events.3.a:0 "Chargez ! Pour l'Ynn ! Pour l'Honneur et la Chevalerie !"
 ynn_joust_events.3.b:0 "Une passe régulière mais ferme s'impose"
 ynn_joust_events.3.c:0 "Et si je tournais ma lance un peu comme en escrime ?"

 ynn_joust_events.4.t:0 "La Charge Résultante."
 ynn_joust_events.4.d:0 "Tout se joue maintenant. La décision dans laquelle le cavalier doit mettre toute sa foi. La foule attend avec impatience le choc inévitable. Tous retiennent leur souffle."
 ynn_joust_events.4.a:0 "Nous verrons les résultats, et les accepterons à bras ouverts."

 firstJoustPower:0 "Votre Habileté en Joute"
 secondJoustPower:0 "Habileté de l'Adversaire en Joute"

 ynn_joust_v2_tt:0 "§TSi vous choisissez une option qui convient aux Traits de votre souverain, elle sera Plus Forte, cependant votre adversaire est susceptible de faire de même, alors réfléchissez stratégiquement§!"
 ynn_joust_ruler_affinity_tt:0 "§GCette option convient bien à votre souverain !§!"
 ynn_joust_enemy_ruler_affinity_tt:0 "§RVotre adversaire est susceptible de favoriser cette option !§!"

# ynn_events.6.t:0 "Rumours from the Nether World"
# ynn_events.6.d:0 "The Netherfolk are a mysterious people who live beneath the enormous cliffs to our south, conducting primitive semi-nomadic lives in a land which is known to us as Posveagal, the Nether World. Contacts with them are scarce, and often limited to the legends and deeds of our oldest forefathers or the recountings from the rare visitor who daringly climbed the Southern Cliffs.\n\nToday [1133.GetName] received one such visitor, an elf named Kalin'do who brought an unusual story: while he and his tribe were out hunting, they saw an enormous vessel approach their shores, and from the vessel descended people dressed like kings, wielding tools and weapons of a quality unmatched."
# ynn_events.6.a:0 "Spread the news to the rest of the Ynn"
# ynn_events.6.b:0 "We would be fools to entertain such rumours"

 #Decisions
 the_dragon_kingdom_decision_title:0 "Centraliser les Seigneurs Drozma Tur"
 the_dragon_kingdom_decision_desc:0 "Notre royaume est très fragmenté comme le reste de l'Ynn. Si nous devions subjuguer les autres seigneurs et nous imposer comme le suzerain Drozma Tur, nous pourrions être en mesure de forger un royaume plus cohésif."
 ynn_unite_drozma_tur_tt:0 "Toutes les nations §YDrozma Tur§! sont nos sujets"
 rebuild_tromseloc_way_title:0 "Reconstruire la Voie de Tromseloc"
 rebuild_tromseloc_way_desc:0 "Depuis le déclenchement de la Guerre des Trois Empereurs en 1151, de plus en plus de troupes ont été rappelées pour combattre d'autres Ynniques, y compris celles qui gardaient la Voie de Tromseloc, la route terrestre orientale reliant Thromshana à Bosancovac. Tous les villages le long de ce chemin furent finalement abandonnés en raison d'une résurgence des Wendigos et des raids veykodans.\n\nMaintenant que nous nous préparons à restaurer l'ordre et à émerger des Âges Sombres, reconstruire la Voie de Tromseloc ouvrira une connexion vitale entre Dolindha et les Sardas. Nous enverrons des groupes pour nettoyer les relais en ruine avant que nos ingénieurs puissent les réparer ou en construire de nouveaux à partir de zéro, des chemins devront être retracés, et les communautés auront besoin de beaucoup d'encouragements pour s'y installer ; nous ferons sans doute face à une résistance acharnée des tribus veykodanes, ou pire encore, à des embuscades de Wendigos cachés parmi les arbres et les ruines, c'est pourquoi nos efforts doivent être menés avec la plus grande vigilance."
 slay_the_dragon_prince_title:0 "Tuer le Prince-Dragon"
 slay_the_dragon_prince_desc:0 "Des rumeurs inquiétantes arrivent du pays de Rzenta. Le Culte du Dragon, vaincu après la chute de Drozmagog, s'agite à nouveau. La raison : l'éclosion de l'œuf de Drozmagog. Si ces rumeurs sont vraies, alors nous devons agir immédiatement pour tuer le nouveau-né avant qu'il ne devienne une bête terrifiante."
 ynn_slay_1480_tt:0 "§RLe combat sera plus difficile si nous arrivons après le Stuir Balia du Dragon.§!"

 #Core Modifiers
 ynn_urban_decline:0 "Déclin Urbain"
 desc_ynn_urban_decline:0 "Les siècles qui ont suivi la chute de l'Empire Ynnique ont vu l'abandon progressif des centres urbains au profit d'un féodalisme décentralisé. Les cités de Vareynn, Arverynn et Svemel, autrefois joyaux tentaculaires de l'Empire Ynnique, ne sont plus que des bourgs gouvernés par des seigneurs fluviaux vivant dans leurs châteaux.\n\n§TPour remédier à cette situation, une nouvelle §lgrande puissance§T devra émerger dans l'Ynn, une qui a §lembrassé§T le commerce avec des continents lointains, est assez forte pour unir §lles trois§T cités et leur apporter §lla prospérité§T à nouveau.§!"
 ynn_ynnic_population_boom:0 "Boom Démographique Ynnique"
 ynn_dark_ages:0 "Âges Sombres Ynniques"
 #desc_ynn_dark_ages:0 ""
 ynn_diplo:0 "Diplomatie Ynnique"
 desc_ynn_diplo:0 "Permet la création de sujets de type §YIosahar§!, qui ont les caractéristiques suivantes :\n- Donne au Suzerain §G+0,50§! d'Autorité Annuelle.\n- Ne prend pas de Relations Diplomatiques. Cependant le Suzerain est §Rincapable de s'allier avec des nations au sein de l'Ynn§!.\n- Contribution réduite à la Limite de Force du Suzerain, propre Limite de Force Terrestre augmentée.\n- Ne peut pas être annexé par des moyens normaux.\n--------------\nLa société et les croyances ynniques accordent une grande valeur à la continuité et à la décentralisation : ainsi, utiliser les guerres pour voler des terres à d'autres seigneurs se heurtera à une forte opposition, tandis qu'il sera bien plus facile de les vassaliser. Cependant, le besoin de maintenir des relations avec vos nombreux vassaux entravera considérablement vos capacités diplomatiques avec les royaumes extérieurs.\n\n§TPour remédier à cette situation, les seigneurs ynniques devront soit régler tous les Débats Théologiques après quoi ils pourront mettre fin au Système des Iosahar, soit abandonner entièrement leur religion. Les Drozma Tur commencent avec une décision pour réformer les Iosahar en vassaux normaux dès le début.§!\n\n§TD'un autre côté, on pourrait choisir de ne pas réparer ce qui n'est pas cassé…§!"
 ynn_temple_crasher:0 "Destructeur de Temples"
 desc_ynn_temple_crasher:0 "Les autorités cléricales sont horrifiées par nos actions récentes. Pourquoi avons-nous détruit ces temples ?"
 ynn_pomentere_estates:0 "Domaines de Pomentere"
 desc_ynn_pomentere_estates:0 "Cette province contient de vastes domaines accordés aux vétérans veykodans, et nous fournit un bassin constant de recrues, ainsi que des terrains d'élevage pour leurs montures.\n\n§TNous pouvons assigner des Domaines de Pomentere en convertissant des provinces à la culture veykodane.§!"
 ynn_pomentere_estates_info_tt:0 "§TNous pouvons maintenant assigner des Domaines de Pomentere en convertissant des provinces à la culture veykodane, tant que la culture veykodane est acceptée par nous.§!"
 ynn_veykodirzag_capital:0 "Siège du Vyrizer"
 ynn_veykodirzag_capital_desc:0 "Sur les ruines du plus puissant royaume de Veykoda d'antan s'élève une nouvelle cité, plus haute et plus belle que toute autre vue auparavant dans tout l'Ynn et ses affluents."

