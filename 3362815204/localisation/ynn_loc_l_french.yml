 #Events pertaining particular provinces
 ynn_erandil_reforms:0 "Réformes d'Erandil"
 ynn_domfanynn_ruins:0 "Ruines de Domfanynn"
 desc_ynn_domfanynn_ruins:0 "Domfanynn (ou Drefhainé en Elfe Précurseur) est la plus ancienne cité construite par les Elfes Nés-des-Ruines Sardas, fondée au troisième siècle après les Cendres. Elle fut détruite avant le début du cinquième siècle, et le dôme Précurseur qui bénissait autrefois la cité fut emporté à Stanyrhrada. Bien que le site se soit avéré dépourvu de véritables Reliques Précurseurs, l'intérêt suscité parmi les Cannoriens et Ynniques pour les fouilles a contribué à l'économie voisine."
 ynn_mara_luar_ruins:0 "Ruines de Mara Luar"
 desc_ynn_mara_luar_ruins:0 "Mara Luar (ou Yenasdahna en Epednar) est un avant-poste fortifié construit par des soldats de l'Empire Ynnique dans le cadre de la campagne de Lovdrakan de 1028. Il fut assiégé en 1076 lorsque les Epednars libérèrent leurs terres, bien qu'il ait résisté contre toute attente. Mara Luar est maintenant à nouveau habité de façon permanente, et bien que ses murs et garnisons adjacentes soient tout ce qui a été découvert du passé, ils suffisent à faire figurer Mara Luar parmi les plus anciennes colonies de l'Étendue."
