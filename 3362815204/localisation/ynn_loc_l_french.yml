 #CBs, Wargoals and Diplomacy
 cb_iosahar_annex:0 "Subjugation d'Iosahar"
 cb_iosahar_annex_desc:0 "Établissons-nous comme Suzerain d'un royaume voisin."
 ynnic_subjugation_desc:0 "L'objectif de guerre est de prendre la capitale de la cible de Subjugation d'Iosahar."
 CB_ALLOWED_po_feudal_ynnic_subjugation:0 "Devenir Iosahar"
 PEACE_po_feudal_ynnic_subjugation:0 "Devenir Iosahar"
 po_feudal_ynnic_subjugation_desc:0 "[From.GetName] va [From.po_iosahar_blocM][From.po_iosahar_bloc0][From.po_iosahar_bloc1][From.po_iosahar_bloc2][Root.po_iosahar_bloc3]\n\nCaractéristiques du sujet §YIosahar§! :\n- Donne au Suzerain §G+0,50§! d'Autorité Annuelle.\n- Ne prend pas de Relations Diplomatiques. Cependant le Suzerain est §Rincapable de s'allier avec des nations au sein de l'Ynn§!.\n- Peut créer des alliances et mener des guerres de manière indépendante.\n- Contribution réduite à la Limite de Force du Suzerain, propre Limite de Force Terrestre augmentée.\n- Ne peut pas être annexé par des moyens normaux."
 po_iosahar_blocM_1:0 "plier le genou devant nous et promettre ses armées pour la défense du royaume"
 po_iosahar_blocM_2:0 "cesser ses activités de §ORoyaume de Bataille§! et se soumettre à notre jugement"
 po_iosahar_blocM_3:0 "plier le genou, adopter la §YDiplomatie Ynnique§! et abandonner certaines de ses conquêtes"
 po_iosahar_bloc0_1:0 "."
 po_iosahar_bloc0_2:0 ", ainsi que leurs véritables sujets ynniques qui appartiendront désormais à nous."
 po_iosahar_bloc1_1:0 "§T§!"
 po_iosahar_bloc1_2:0 " Les sujets non-ynniques de [From.GetName] seront libérés."
 po_iosahar_bloc2_1:0 "§T§!"
 po_iosahar_bloc2_2:0 " L'union personnelle de [From.GetName] sera brisée."
 po_iosahar_bloc3_1:0 "§T§!"
 po_iosahar_bloc3_2:0 "\n§REn devenant Suzerain, nous perdrons toutes nos alliances au sein de l'Ynn.§!"
 YNNIC_SUBJUGATION_WAR_NAME:0 "$ORDER$Guerre de Subjugation d'Iosahar $FIRST$-$SECOND$"
 OVERLORD_AMBITION:0 "Ceux qui cherchent à devenir Suzerain de l'Ynn voient tous les autres comme leurs Iosahar. Ils ne maintiennent pas d'alliances."
 IOSAHAR_NO_CALL_ENNEMI_SUBJECTS:0 "\nIls sont un vassal Iosahar de notre ennemi."

