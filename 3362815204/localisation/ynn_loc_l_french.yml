 #Zodiac Animal Events
 ynn_king_of_the_stuir_balia:0 "Le Roi du Stuir Balia"
 ynn_pet_snapping_otter:0 "Loutre Happeuse de Compagnie"
 desc_ynn_pet_snapping_otter_1:0 "\nVydra, une loutre loyale et diligente"
 desc_ynn_pet_snapping_otter_2:0 "\nBedopan, cette loutre se comporte avec dignité et fierté"
 desc_ynn_pet_snapping_otter_3:0 "\nUne loutre brave, Tarka a un jour plaqué un Mouton à Quatre Cornes"
 desc_ynn_pet_snapping_otter_4:0 "\nMalgré avoir été amenée devant la cour dans un sac, Mijbil ne montre aucune peur des gens"
 desc_ynn_pet_snapping_otter_5:0 "\nBien que le ventre de Portlynn la rende quelque peu comique sur terre, la loutre est inégalée une fois dans l'eau"
 desc_ynn_pet_snapping_otter_6:0 "\nOtto est connue comme une menace aux festins, bien que ce soient les boissons plutôt que la nourriture qui disparaissent"
 desc_ynn_pet_snapping_otter_7:0 "\nOn raconte beaucoup de légendes sur Viyokienik, la loutre est connue pour chanter avec les elfes, et même pratiquer la magie"
 desc_ynn_pet_snapping_otter_8:0 "\nUne loutre silencieuse et concentrée, Lovoc ne s'intéresse à rien d'autre qu'à la chasse"
 desc_ynn_pet_snapping_otter_9:0 "\nRhulynn n'est pas amie des chats"
 desc_ynn_pet_snapping_otter_10:0 "\nUne loutre gracieuse, Ysther est une merveille à contempler quand elle nage"
 desc_ynn_pet_snapping_otter_11:0 "\nÉtrangement, cette loutre a tendance à accorder beaucoup d'attention particulière aux membres du même genre"
 ynn_pet_ynnea_pig:0 "Cochon Ynnéen de Compagnie"
 desc_ynn_pet_ynnea_pig:0 "Un animal de compagnie courant parmi la haute société Sarda, les cochons ynnéens sont associés à la fertilité et à l'empathie."
 ynn_rebuilding_flooded_property:0 "Reconstruction des Propriétés Inondées"
 ynn_whitetail_residence:0 "Renard à Queue Blanche Aperçu"
 desc_ynn_whitetail_residence:0 "Selon la légende, c'est un renard à queue blanche qui a appris aux survivants du Déluge Final comment reconstruire leur société. Son récent aperçu dans cette province est vu comme un bon présage."
