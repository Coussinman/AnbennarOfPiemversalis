##mission events
verne_flavor_ace.1.t: "Un Tournant Sociétal"
verne_flavor_ace.1.d: "Les Vernois, avec leur longue culture martiale, leur importante population de paysans affranchis et leur contrôle sur le Khenak riche en cuivre, se trouvent à raconter une histoire bien différente de celle des entités féodales qui les entourent dans l'Empire. La surpopulation relative, le désir de gloire et les nombreuses querelles entre comtes, disputes et princes ambitieux ont conduit nombre de Vernois à chercher emploi et gloire au service de divers souverains et gouverneurs étrangers. Cette tendance s'est encore accélérée avec la venue de la Marée Verte et des Guerres Lilas ; jamais la demande pour un régiment vernois n'avait été si forte et jamais l'offre si abondante. Aujourd'hui cependant, les nombreux vétérans des guerres des décennies passées cherchent à acquérir des terres dans leur patrie, se heurtant aux nobles locaux sur les concessions foncières. Les nobles, craignant que cela ne sonne le glas de l'ordre féodal traditionnel à Verne, cherchent un recours auprès de la cour pour mettre en œuvre une réforme agraire en apparence anodine qui aurait pour effet d'anoblir les propriétaires terriens moyennant une prime, une tentative désespérée pour diviser et intégrer la vaste cohorte de nouveaux seigneurs en herbe. Les conséquences du traitement de cette affaire pourraient s'avérer durables pour l'avenir de Verne."
verne_flavor_ace.1.a: "La décision devrait en définitive revenir au Duc"

verne_flavor_ace.2.t: "Administrer le Khenak"
verne_flavor_ace.2.d: "La conquête de l'ensemble de la chaîne du Khenak a posé un problème épineux à notre administration. La chaîne montagneuse est mal connue, habitée par les Gnolls des Collines depuis des siècles et divisée en douzaines de factions dans les parties les plus impraticables du massif. Les relations entre Gnolls des Collines peuvent être exploitées en lieu et place de la hiérarchie féodale habituelle, bien que cette approche non interventionniste nous prive des riches ressources et exploitations minières du Khenak."
verne_flavor_ace.2.a: "Exploiter la population et les ressources du Khenak."
verne_flavor_ace.2.b: "Tenter une approche plus douce"

verne_flavor_ace.3.t: "L'Offre de la Vieille-Tour"
verne_flavor_ace.3.d: "La Vieille-Tour appartient ostensiblement au Magisterium, mais elle était autrefois aux mains de l'ancien royaume de Verne. En tant que l'un des plus anciens bastions magiques et bibliothèques de la région, son prestige et sa collection seraient d'une aide considérable dans la construction d'installations capables d'héberger et de dresser les jeunes dragons dont nous avons la charge. Le magistère a déjà été sondé en vue d'une offre et seul le prix reste à fixer dans la négociation potentielle."
verne_flavor_ace.3.a: "Faire une offre modeste"
verne_flavor_ace.3.b: "Tout tenter par la voie diplomatique"

verne_flavor_ace.4.t: "Verne propose d'acheter la Vieille-Tour"
verne_flavor_ace.4.d: "Le Duc de Verne a soudainement commencé à soumettre des offres pour la Vieille-Tour tout en nous sondant simultanément sur un prix pour sa vente potentielle."
verne_flavor_ace.4.a: "Les termes sont des plus acceptables"
verne_flavor_ace.4.b: "Nous ne céderons point nos terres à ces vagabonds"

verne_flavor_ace.5.t: "Vente de la Vieille-Tour acceptée"
verne_flavor_ace.5.d: "Il semble que nos ouvertures diplomatiques concernant la vente de la Vieille-Tour aient été couronnées d'un franc succès. Il reste encore des baux et documents à signer et ratifier dans divers parlements et registres, mais après quelques cérémonies à la fin du mois, la Vieille-Tour sera de nouveau vernoise."
verne_flavor_ace.5.a: "Les termes sont des plus acceptables"

verne_flavor_ace.6.t: "Vente de la Vieille-Tour refusée"
verne_flavor_ace.6.d: "Lors des dernières offres et signatures diplomatiques pour une vente potentielle de la Vieille-Tour, les relations diplomatiques ont été subitement rompues. Il semble que la Vieille-Tour soit bien trop précieuse pour les sommes que nous avons proposées et désormais seuls des documents et signatures à moitié achevés en témoignent."
verne_flavor_ace.6.a: "Maudits soient-ils ! Déplaçons le chantier près de la cour et payons le surcoût"

verne_flavor_ace.7.t: "Alliance Éborthilienne"
verne_flavor_ace.7.d: "Les Guerres Lilas s'avérèrent désastreuses pour le parti lunaire, mais lors de la Bataille du Détroit de Busilar nous remportâmes une victoire éclatante aux côtés de la marine éborthilienne, écrasant l'armada du lion. La coopération et le dédain mutuel envers Busilar ont forgé de solides liens diplomatiques avec Eborthil et ont suscité l'organisation de manœuvres militaires conjointes, la seule question demeurant leur orientation."
verne_flavor_ace.7.a: "Se concentrer sur la coordination terrestre"
verne_flavor_ace.7.b: "Approfondir notre coopération navale"

verne_flavor_ace.8.t: "Pacte de protection vernois-éborthilien"
verne_flavor_ace.8.d: "La défaite finale de Busilar nous a établis comme le partenaire principal de l'alliance avec Eborthil, sans pour autant mettre fin à la coopération. Le Divenhal a malheureusement continué de causer des troubles à nos deux nations, la coopération continue exigeant une intégration accrue des efforts. Nombre de nos hommes d'État et généraux ont contribué à un projet cimentant notre coopération avec Eborthil ainsi que notre prééminence. L'idée du traité a reçu un accueil favorable, bien que le sentiment général soit qu'il nécessite certaines garanties."
verne_flavor_ace.8.a: "Espérons des négociations équitables"

verne_flavor_ace.9.t: "Débats sur l'autonomie"
verne_flavor_ace.9.d: "Lors d'une des réunions les moins monotones concernant l'élaboration d'un pacte de protection avec Eborthil, une délégation de petits nobles et de magnats est arrivée. Ils ont tenté de plaider pour l'inclusion d'une extension des protections et privilèges qu'ils conservent actuellement sous la protection de la couronne éborthilienne dans le projet de traité actuel. Leur présence a détourné l'attention de certains sujets prévus pour la journée, qui étaient plus importants.\n§YFaveur Éborthilienne§! actuelle : [Root.verne_eborthil_chance.GetValue]"
verne_flavor_ace.9.a: "Les assurer qu'ils conserveront leurs privilèges"
verne_flavor_ace.9.b: "Recentrer la conversation sur le sujet"

verne_flavor_ace.10.t: "Craintes concernant l'emploi"
verne_flavor_ace.10.d: "\n§YFaveur Éborthilienne§! actuelle : [Root.verne_eborthil_chance.GetValue]"
verne_flavor_ace.10.a: "Tenter de les indemniser pour leur emploi précédent"
verne_flavor_ace.10.b: "Rejeter leurs pétitions et préoccupations"

verne_flavor_ace.11.t: "Question de défense commune"
verne_flavor_ace.11.d: "\n§YFaveur Éborthilienne§! actuelle : [Root.verne_eborthil_chance.GetValue]"
verne_flavor_ace.11.a: "Promettre des régiments vernois pour leur défense"
verne_flavor_ace.11.b: "Leur prêter des officiers et fonctionnaires"

verne_flavor_ace.12.t: "Délégation des affaires étrangères"
verne_flavor_ace.12.d: "\n§YFaveur Éborthilienne§! actuelle : [Root.verne_eborthil_chance.GetValue]"
verne_flavor_ace.12.a: "Leur accorder une large capacité de décision autonome"
verne_flavor_ace.12.b: "Exiger qu'un ambassadeur vernois approuve leurs décisions"

verne_flavor_ace.13.t: "Le traité est achevé"
verne_flavor_ace.13.d: "\n§YFaveur Éborthilienne§! actuelle : [Root.verne_eborthil_chance.GetValue]"
verne_flavor_ace.13.a: "Notre prééminence sur eux est manifeste et notre protection bienveillante"
verne_flavor_ace.13.b: "Espérons que nos compromis porteront leurs fruits"
verne_flavor_ace.13.c: "Une négociation ardue mais profitable"

verne_flavor_ace.14.t: "Protection vernoise"
verne_flavor_ace.14.d: "Les négociations concernant une alliance potentielle et un pacte de protection avec Verne sont conclues. Notre sécurité semble bien garantie, bien qu'une certaine souveraineté doive être concédée pour la maintenir. Il serait possible d'annuler l'accord dans son intégralité avant que l'encre ne sèche, bien que cela irriterait Verne."
verne_flavor_ace.14.a: "Les Vernois sont nos amis et leur protection est nécessaire"
verne_flavor_ace.14.b: "Nous ne renoncerons point à notre souveraineté"

verne_flavor_ace.15.t: "Eborthil rompt les liens"
verne_flavor_ace.15.d: "Il semble qu'à l'issue du sommet de négociations, Eborthil ait soudainement et irrespectueusement quitté la conférence. Le traité était en grande partie achevé et prêt à être signé, ce qui a surpris nombre de nos fonctionnaires. Ce choc s'est rapidement mué en colère, nombre d'hommes d'État considérant désormais l'application militaire du traité comme le seul moyen de restaurer l'honneur de Verne."
verne_flavor_ace.15.a: "Maudits soient-ils, nous imposerons le traité nous-mêmes"


verne_flavor_ace.16.t: "Réforme des régiments ?"
verne_flavor_ace.16.d: "Lors de l'une des sessions les plus marquantes du comité de réforme des wyvernes, un groupe de délégués et de commandants a présenté une série de traités détaillant la formation d'unités massives de wyvernes. Ces traités seront vraisemblablement au cœur des discussions et orientations du comité pour les prochaines semaines, opposition et contre-propositions se formant et se rédigeant instantanément. Le principe des formations massives semble imiter les développements dans les formations d'infanterie tout en accentuant le potentiel d'anéantir toute armée que la formation pourrait rencontrer. L'opposition soutient qu'il s'agirait d'une force irréaliste à gérer et ravitailler correctement et que la faible concentration du système régimentaire permet de mieux réagir aux circonstances locales. Avant qu'un blocage ne se développe et que d'autres sujets de réforme moins controversés ne soient négligés, il pourrait être nécessaire de trancher."
verne_flavor_ace.16.a: "Bâtissons des « armées entièrement de wyvernes »"
verne_flavor_ace.16.b: "Renforcer le système régimentaire"

verne_flavor_ace.17.t: "Une aventure au Haut Temple"
verne_flavor_ace.17.d: "Une expédition vers un Haut Temple a récemment engagé un contingent de nos plus braves aventuriers. Ce pourrait être une excellente occasion de découvrir ce qui s'y cache. En raison de la rareté de cette opportunité, les aventuriers ont contacté des fonctionnaires pour tenter d'obtenir davantage de ressources en échange des informations que rapportera cette expédition. Il y a amplement d'occasions de tirer ressources et connaissances de cette entreprise sans les soutenir directement, bien que cela puisse s'avérer potentiellement utile."
verne_flavor_ace.17.a: "Mobiliser des ressources d'État pour les assister"
verne_flavor_ace.17.b: "Que cela reste un contrat privé"

verne_flavor_ace.18.t: "Une divergence de philosophie"
verne_flavor_ace.18.d: "Venant de côtés opposés de Halann, il était inévitable que les différentes écoles de pensée mènent à quelques heurts concernant l'exploration du temple. Le conflit est survenu plus tôt qu'espéré, car la procédure d'exploration et de démarrage a provoqué une dispute. Les hôtes halessi prônent un examen approfondi et une documentation minutieuse de toute chose, tandis que le groupe de mercenaires réclame moins de documentation au profit d'une couverture de terrain plus rapide."
verne_flavor_ace.18.a: "Se fier à l'expertise locale"
verne_flavor_ace.18.b: "Faire valoir les obligations contractuelles"

verne_flavor_ace.19.t: "Traversée du Haut Temple"
verne_flavor_ace.19.d: "L'expédition a bien progressé dans le temple en suivant une carte apparemment fiable, tout en notant et collectant différents mécanismes et bibelots du temple. La bonne fortune de la carte semble cependant s'être tarie, car un mur renforcé par les protections du haut temple bloque le passage. Les hôtes halessi sont troublés que ce mur ne figure pas sur la carte, mais sont venus préparés avec une autre foreuse korashi pour le percer. Cependant, un autre élément absent de la carte est une entrée flanquant le côté opposé du mur, menant à ce qui semble être un labyrinthe de tunnels pouvant offrir un passage plus rapide et direct."
verne_flavor_ace.19.a: "La fortune sourit aux audacieux ; le labyrinthe sera conquis"
verne_flavor_ace.19.b: "Laisser les experts poursuivre leur forage"

verne_flavor_ace.20.t: "Embuscade dans le labyrinthe"
verne_flavor_ace.20.d: "La traversée des tunnels du haut temple a désensibilisé le groupe aux nombreux craquements et bruits étranges venant de toutes les directions. Un bruit apparemment innocent était en réalité un membre du groupe déclenchant une dalle à pression qui engloutit alors plusieurs hommes. Le groupe réagit rapidement et parvint à sauver quelques-uns d'une chute des plus périlleuses, mais une portion considérable du groupe et de leurs provisions ne sera plus jamais entendue."
verne_flavor_ace.20.a: "L'imprudence ne trouvera nulle clémence en ces lieux"

verne_flavor_ace.21.t: "Toujours aller à gauche"
verne_flavor_ace.21.d: "Le sentiment dominant dans le groupe était de continuer à travers les tunnels dans une même direction, mais cela s'avéra vain, car ils ne cessaient de retrouver les mêmes tunnels. En tournant en rond cependant, le porteur de carte parvint à identifier un schéma correspondant à ce qui aurait dû être une section éloignée de la carte. Suivre cette route mena à une autre section de tunnels correspondant à une autre partie de la carte, qui après bien des frustrations conduisit finalement le groupe à la sortie du labyrinthe."
verne_flavor_ace.21.a: "La voie est éclairée, le chemin est dégagé ; il ne nous faut que la force de le suivre."

verne_flavor_ace.22.t: "La foreuse surchauffe"
verne_flavor_ace.22.d: "La foreuse korashi de rechange que les hôtes halessi avaient apportée était un modèle bien plus petit, prévu pour être transporté sans encombre, mais ses performances moindres se font désormais sentir par tous les membres du groupe. En raison d'une mauvaise manipulation d'un membre subalterne du groupe, la foreuse s'est temporairement brisée pour avoir fonctionné trop longtemps. L'expert de la foreuse estime qu'au rythme actuel et une fois la foreuse réparée, il faudra environ un jour pour percer le mur."
verne_flavor_ace.22.a: "Réveillez-moi quand nous aurons percé"

verne_flavor_ace.23.t: "Progression régulière"
verne_flavor_ace.23.d: "Percer le mur a exigé bien plus de temps et d'efforts qu'initialement prévu. Fort heureusement cependant, le principal problème auquel le groupe fait actuellement face est l'ennui. Avec des morceaux de débris claquant bruyamment de temps en temps pour signifier la progression, le groupe n'a plus qu'à patienter encore un peu."
verne_flavor_ace.23.a: "La patience est une vertu"

verne_flavor_ace.24.t: "Effraction des voûtes à reliques"
verne_flavor_ace.24.d: "Bien que la carte se soit avérée en grande partie obsolète et erronée, les gravures s'étaient révélées suffisamment distinctives pour identifier les sanctuaires intérieurs du temple lorsque le groupe les rencontra. Les voûtes semblent cependant bien trop peu garnies par rapport à ce que le contingent halessi avait escompté, bien que la carte dissimulât encore d'autres éléments du haut temple. Des portes latérales de la voûte mènent à une annexe potentiellement non documentée sur la carte et dans les récits de ce temple, provoquant une spéculation effrénée sur d'autres trésors."
verne_flavor_ace.24.a: "Nous devrions rester prudents et trouver la sortie"
verne_flavor_ace.24.b: "Il y a forcément d'autres salles"

verne_flavor_ace.25.t: "Piège à rocher"
verne_flavor_ace.25.d: "Après mûre délibération, le groupe décida de poursuivre l'exploration de l'annexe. Bien que nombre de portes menassent à de petites pièces vides ou de longs placards délabrés, un corridor prometteur et long se présenta. Alors que le groupe croyait le corridor sur le point de se terminer, quelqu'un trébucha par inadvertance sur un fil. Le reste du groupe dans l'annexe fut soudainement alerté lorsque l'équipe du corridor revint en courant avec un rocher à leurs trousses ; heureusement la majorité de l'équipe s'en sortit, bien que certaines personnes et tout l'équipement emporté se trouvent désormais de l'autre côté du rocher bloquant le corridor."
verne_flavor_ace.25.a: "D'anciens pièges guettent, non déclenchés et assoiffés de sang..."

verne_flavor_ace.26.t: "Sanctuaire précurseur"
verne_flavor_ace.26.d: "Après mûre délibération, le groupe décida de poursuivre l'exploration de l'annexe. Bien que nombre de portes menassent à de petites pièces vides ou de longs placards délabrés, une petite trappe discrète se présenta. En se faufilant dans ce qui semblait être une bouche d'égout à en juger par l'odeur, l'infortuné chargé de descendre découvrit avec ravissement une salle. Un examen plus approfondi révéla une conduite d'égout exposée dans un coin de la salle, mais aussi un autre ensemble de caisses et de tiroirs remplis de divers artefacts."
verne_flavor_ace.26.a: "Espérons qu'il y a du parfum là-dedans"

verne_flavor_ace.27.t: "Du beau travail"
verne_flavor_ace.27.d: "Après un travail considérable d'excavation et d'exploration, le groupe du haut temple est revenu et le contrat des mercenaires a expiré, séparant les chemins des deux parties. Parmi les récompenses pour l'assistance fournie, les mercenaires reçurent une variété de belles pièces halessi qui, grâce à quelques trocs habiles, furent échangées contre une petite foreuse korashi. Normalement ces appareils sont jalousement protégés par les marchands halessi, mais il semble que la camaraderie forgée durant l'expédition ait aidé le charisme du capitaine, premier Cannorien à posséder cette merveille technologique."
verne_flavor_ace.27.a: "La foreuse korashi et ses secrets sont enfin nôtres."

verne_flavor_ace.28.t: "Une expédition au Kheinoai"
verne_flavor_ace.28.d: "L'exploration du Kheinoai devra être bien différente de toute expédition précédente en Aelantir. Le nombre d'États établis et développés dans la région offre une formidable opportunité d'étendre les liens commerciaux existants, bien que cela exige du doigté et peut-être de la coercition. Une expédition a été encouragée et patronnée avec enthousiasme par l'ambitieuse aventurière Castina síl Thanallen. Avec les rumeurs d'autres expéditions similaires au Kheinoai pour le commerce et la conquête, nous devons agir promptement pour soutenir ses entreprises."
verne_flavor_ace.28.a: "Une occasion grandiose ; faites voile immédiatement"

verne_flavor_ace.29.t: "La question de l'intrusion"
verne_flavor_ace.29.d: "Il semble malheureusement que malgré une amabilité et de bonnes relations initiales, l'intrusion prolongée de l'expédition soit de plus en plus accueillie avec hostilité. Bien qu'elle n'ait pas initié la plupart des conflits, Castina a continuellement empêché la désescalade et a envenimé diverses rencontres. Sans être un début particulièrement prometteur, un consensus a été trouvé entre l'officier colonial et Castina : la poursuite de la cartographie et de l'exploration du Kheinoai nécessiterait davantage d'hommes et d'armes avec l'approche actuelle."
verne_flavor_ace.29.a: "Poursuivre par une approche plus discrète et formelle"
verne_flavor_ace.29.b: "Cartographier ces terres étranges est essentiel et la discrétion un luxe"

verne_flavor_ace.30.t: "Insuffisances en matière de siège"
verne_flavor_ace.30.d: "Bien que de petite échelle, les conflits contre les différentes forces hostiles au Kheinoai ont continuellement tourné en faveur de l'expédition grâce au commandement de Castina. Un problème croissant a cependant été constaté dans le manque de puissance de feu capable de percer les fortifications. La plupart des fortifications rencontrées sont principalement des ouvrages de campagne ou de vieux murs que l'on peut heureusement contourner et canonner avec quelque effet. Castina a toutefois l'ambition de faire tomber bien plus que de simples ouvrages de campagne et a envoyé une requête à l'officier colonial pour que des bombardes soient envoyées à l'expédition."
verne_flavor_ace.30.a: "Envoyer plus d'hommes coûterait trop cher"
verne_flavor_ace.30.b: "Fournir une force de siège adéquate est peut-être possible"

verne_flavor_ace.31.t: "Postes pour les protégés"
verne_flavor_ace.31.d: "La bureaucratie coloniale est de plus en plus inquiète à chaque message retourné par Castina, car elle ne cesse de promouvoir ses propres membres aux fonctions de fonctionnaires et de diplomates. Cette situation laisse la bureaucratie coloniale à la merci d'inconnus en qui elle n'a pas pleinement confiance, ni en compétence ni en caractère. Les services internes ont commencé à rédiger un mandat exigeant la réaffectation des personnes promues par Castina avec des bureaucrates expérimentés."
verne_flavor_ace.31.a: "Insister sur des administrateurs officiels"
verne_flavor_ace.31.b: "Un travail bien fait mérite une promotion"

verne_flavor_ace.32.t: "La campagne du Kheinoai commence"
verne_flavor_ace.32.d: "Après une série d'embuscades, Castina et l'expédition ont été repoussées vers le sud du Kheinoai, parvenant à arrêter les assaillants juste avant la côte. Rompant avec l'autorité coloniale qui insiste sur une solution diplomatique, elle a saisi une zone à Dnagutakh dans le sud de Devand avec l'intention de soumettre les pays voisins à son commandement. Le bureau colonial est en panique, car ayant sanctionné l'expédition de Castina, celle-ci fait désormais appel au continent pour soutenir ses conquêtes."
verne_flavor_ace.32.a: "Le sort en est jeté"

verne_flavor_ace.33.t: "Une expédition au Taychend"
verne_flavor_ace.33.d: "Les premières expéditions tentant de contourner les Leechdens avaient traversé des marécages insupportables et des jungles atroces pour se retrouver face aux monts Veyil Sikhara, freinant l'exploration de ce qui deviendrait le Taychend. Il fallut encore du temps avant que le contact et la découverte des États taychendi ne se produisent, chaque nouvelle information provenant de cette terre protégée suscitant toujours plus d'intérêt. Des vétérans des anciennes expéditions dans l'Effelai et des aventuriers ambitieux cherchent désormais à lancer une nouvelle expédition pour véritablement franchir le Veyil Sikhara et en apprendre davantage sur ces terres mystérieuses."
verne_flavor_ace.33.a: "Ils sont déjà divisés ; il ne nous reste peut-être qu'à conquérir"

verne_flavor_ace.34.t: "Le besoin de montures plus robustes"
verne_flavor_ace.34.d: "Les terres du Taychend présentent un environnement bien différent des forêts voisines de l'Effelai, étant bien plus montagneuses et vallonnées. Cela fut d'abord remarqué à l'œil, mais se manifeste désormais dans l'usure des diverses bêtes de somme, particulièrement inadaptées à l'environnement. Cela devient un problème de plus en plus grave à mesure que l'expédition rencontre des signes toujours plus nombreux de banditisme généralisé et de violence gratuite dans la région. Le bureau colonial doit maintenant débattre de l'envoi d'une mission pour rassembler des montures plus adaptées, puis de les transporter vers l'une des parties les plus dangereuses d'Aelantir."
verne_flavor_ace.34.a: "Ils devront se contenter de ce qu'ils ont"
verne_flavor_ace.34.b: "Peut-être que le prochain navire pourrait amener quelques bœufs et mulets"

verne_flavor_ace.35.t: "Ambitions de seigneur de guerre"
verne_flavor_ace.35.d: "Au cours de ce qui avait débuté comme une marche assez ordinaire, l'expédition taychendi rencontra un autre groupe de soldats qui se mit rapidement à les attaquer. L'escarmouche avait tourné en défaveur de l'expédition quand un groupe de Nés-des-Ruines commença à attaquer les assaillants, surgissant soudainement dans le feu de l'action. L'escarmouche avait tué le précédent capitaine Alano s'il Verne, mais la majorité du groupe, grâce aux Nés-des-Ruines amicaux, avait survécu. L'hôte ruiné commença à expliquer au commandant suivant, Cicero Silebor, ce que l'expédition avait commencé à reconstituer concernant le seigneurisme de guerre endémique au Taychend. Les guerriers nés-des-ruines encouragent maintenant Cicero à pourchasser leurs assaillants et à protéger et gouverner cette zone, le précédent chef ayant maraude à travers ces terres. C'est une occasion intéressante de constituer un contingent autochtone connaissant le terrain, bien qu'ils ne jurent allégeance que si Cicero prend le manteau de dirigeant."
verne_flavor_ace.35.a: "Le laisser poursuivre sa prétention"
verne_flavor_ace.35.b: "Insister pour qu'il décourage toute velléité"

verne_flavor_ace.36.t: "Une question de détente"
verne_flavor_ace.36.d: "Il semble que nous ne soyons pas les seuls à nous intéresser à la connaissance du Taychend, car [taychend_36_target.GetName] nous a approchés avec une offre des plus inhabituelles. Ils nous proposent, pour un prix relativement modeste, leurs cartes et leurs connaissances du Taychend, qui se sont avérées considérables. Nous savons que leurs récentes incursions ont été sévèrement entravées par les guerres de la région, il est donc probable qu'ils tentent de nous faire tirer les marrons du feu en attirant davantage de cibles qu'eux seuls. La connaissance de la région est cependant vaste et peut-être encore trop précieuse, les sceptiques de la cour demeurant méfiants quant à toute aide potentielle apportée à [taychend_36_target.GetName]."
verne_flavor_ace.36.a: "Aider [taychend_36_target.GetName] coûterait trop cher"
verne_flavor_ace.36.b: "Il est peut-être bon de se montrer amical"

verne_flavor_ace.37.t: "La campagne du Taychend commence"
verne_flavor_ace.37.d: "L'expédition taychendi avait débuté avec de grands espoirs de découvrir une terre mystique et exotique regorgeant de potentiel commercial, mais ces espoirs moururent devant les spectacles de destruction et de guerre endémiques. Cette terre aurait rendu les descriptions les plus brutales de l'Agrados bien ternes par moments, l'expédition devant continuellement combattre pour se frayer un chemin à travers embuscades et brigandages. Cicero Silebor, ayant pris la tête d'une force toujours plus importante après la défaite de nombreuses bandes de petits seigneurs, considère désormais que le seul moyen de rendre véritablement la région malléable aux intérêts vernois est de la conquérir. Ayant saisi un port à Ursibamkq, il fait maintenant face au nord avec son armée pour sécuriser une meilleure base d'opérations."
verne_flavor_ace.37.a: "La fortune sourit aux braves"

verne_flavor_ace.38.t: "Réforme de la méthode coloniale"
verne_flavor_ace.38.d: "Notre méthode coloniale a conduit à la conquête de certains des plus grands empires d'Aelantir. Toutefois, la méthode s'est avérée médiocre pour la gouvernance de vastes territoires et a mené au sous-développement de régions entières. Elle a engendré une gouvernance bâclée et un contrôle insuffisant sur notre empire théoriquement vaste, et de nouvelles conditions imposent un changement de méthode."
verne_flavor_ace.38.a: "Restructurer leurs finances dans un esprit plus mercantiliste"
verne_flavor_ace.38.b: "Développer de meilleurs codes juridiques devrait être la priorité"
verne_flavor_ace.38.c: "Renforcer l'esprit aventurier dans les colonies"


verne_flavor_ace.39.t: "L'héritage des Conquistadors"
verne_flavor_ace.39.d: "Les premières expéditions au Taychend et au Kheinoai furent menées par des conquistadors de renommée légendaire, affrontant les éléments et des armées contre toute attente. Leur héritage vit dans nos vastes possessions en Aelantir, mais aussi dans les régiments qui évoluèrent à partir de leurs expéditions initiales. Ces régiments de longue date peuvent s'avérer un outil incroyablement loyal et tactique pour les conflits dans la région ; il ne nous reste qu'à établir leur tradition et les formaliser."
verne_flavor_ace.39.a: "Que leurs triomphes soient éternels"

verne_flavor_ace.40.t: "Recherches dans les ruines précurseurs"
verne_flavor_ace.40.d: "Les recherches dans les établissements précurseurs du Taychend ont porté de nombreux fruits. Déjà, un grand nombre de découvertes technologiques et de progrès ont été tirés de l'exploration. Ces puits d'ancienne technologie ont soulevé la question de savoir s'il faut conserver les artefacts sur place afin de mieux en comprendre l'usage, ou commencer l'expédition de reliques vers le continent."
verne_flavor_ace.40.a: "Voir si cela peut être appliqué aux études d'Artisanat Magique"
verne_flavor_ace.40.b: "Cela appartient à un musée pour les études générales, bien entendu"

verne_flavor_ace.41.t: "Les honneurs de la conquête"
verne_flavor_ace.41.d: "Les récents appels à une expédition sur l'Ynn ont suscité une compétition entre les deux groupes de pionniers du Noruin. Les Mariniers Ynniques ont patrouillé et maintenu un bon équilibre le long de l'estuaire de l'Ynn jusqu'à la Baie-des-Trolls tout en naviguant régulièrement en amont. Les Rôdeurs de l'Ynn aident à entretenir et explorer la moitié orientale du Noruin ; ils sont habitués aux escarmouches le long et à travers l'Ynn pour chasser les menaces hors de notre territoire au Noruin, une tâche rude et exigeante."
verne_flavor_ace.41.a: "Les mariniers seront les plus à même de dompter l'Ynn"
verne_flavor_ace.41.b: "Les rôdeurs seront bien adaptés aux terres sauvages et indomptées"

verne_flavor_ace.42.t: "Appel à une expédition en Éordande"
verne_flavor_ace.42.d: "L'Éordande est une terre de saisons, de mystère, de fées et de reliques précurseurs. Son isolement et son unité ont empêché toute ingérence sérieuse sur ses terres, bien que les richesses qu'elle recèle aient suscité de nombreuses tentatives. Cette richesse et ce lien avec le mystère des fées ont nourri l'intérêt pour une nouvelle grande expédition afin de mener une campagne de conquête et d'exploration en Éordande."
verne_flavor_ace.42.a: "Les réponses aux mystères du Royaume Féerique sont si proches de notre portée"

verne_flavor_ace.43.t: "Traversée du portail"
verne_flavor_ace.43.d: "Le Royaume Féerique au sein du Domandrod semble plus agité et malléable que d'ordinaire. En certains endroits, ce qui mènerait habituellement à une barrière infranchissable s'est effondré, permettant le voyage dans cet étrange royaume."
verne_flavor_ace.43.a: "Le Domandrod nous appelle"

verne_flavor_ace.44.t: "Intégrer les aventuriers ynniques"
verne_flavor_ace.44.d: "L'Étendue Ynnique est peut-être aussi difficile à gérer et à habiter qu'elle est vaste. Cela n'a pas dissuadé de nombreux groupes indépendants cannoriens de tenter de revendiquer un lopin de terre. Ces aventuriers pourraient cependant être réceptifs à notre administration coloniale, et une invitation à les intégrer à notre sphère d'influence pourrait s'imposer."
verne_flavor_ace.44.a: "Sonder leurs diplomates ; peut-être pourrons-nous les convaincre"


verne_flavor_ace.45.t: "Offre de protection de Verne"
verne_flavor_ace.45.d: "Verne, en tant que partenaire principal de notre alliance ces dernières années, nous a offert un statut plus favorable en matière de protection et de coopération. Cette offre se ferait cependant au détriment de notre souveraineté."
verne_flavor_ace.45.a: "L'offre est généreuse et peut-être trop avantageuse"
verne_flavor_ace.45.b: "Nous ne devons jamais céder notre souveraineté"

verne_flavor_ace.46.t: "Choisir ses favoris"
verne_flavor_ace.46.d: "Notre politique visant à unifier les cités mineures vernoises en une sorte de client a rencontré un franc succès et jouit désormais du soutien des seigneurs de la Luna. Bien que nous ayons obtenu tout le soutien nécessaire pour bâtir notre État client, les différents dirigeants des anciennes nations continuent de se disputer et de négocier pour le droit de détenir la position de dirigeant nominal. Puisque c'est désormais eux qui recherchent quelque chose de nous, différentes concessions peuvent être négociées en échange de la position estimée de favori de la cour vernoise."
verne_flavor_ace.46.a: "Assurément le comte de Galèinn peut fournir davantage d'exportations de sel"
verne_flavor_ace.46.b: "Le patronage du centre d'aventuriers de Menibor est assurément un grand avantage"
verne_flavor_ace.46.c: "La dette du grand port de l'ancien royaume de Verne est avantageuse"

verne_flavor_ace.47.t: "L'Offre du Donjon-Vaillant"
verne_flavor_ace.47.d: "Le Donjon-Vaillant demeure une possession très isolée de l'Ordre Aldrésien. Il ne constitue pas une menace ouverte à notre position, mais tend à attiser les conflits entre souverains locaux quant à l'étendue de la souveraineté du donjon. Puisqu'il a été précédemment acheté et que l'Ordre se montre assez conciliant dans les transactions territoriales, il serait peut-être possible de racheter le donjon."
verne_flavor_ace.47.a: "Leur faire une offre raisonnable"
verne_flavor_ace.47.b: "La générosité n'a jamais failli en matière de négoce"

verne_flavor_ace.48.t: "Une offre pour le Donjon-Vaillant"
verne_flavor_ace.48.d: "Les seigneurs de Verne ont soumis une offre pour le territoire et le château entourant le Donjon-Vaillant. Ils offrent une somme tout à fait convenable pour le soulagement d'une gouvernance coûteuse hors de notre protection immédiate."
verne_flavor_ace.48.a: "C'est une offre raisonnable"
verne_flavor_ace.48.b: "Non, le donjon est trop important"

verne_flavor_ace.49.t: "Vente du Donjon-Vaillant annulée"
verne_flavor_ace.49.d: "Il semble que malgré nos offres plus que généreuses, notre proposition pour le Donjon-Vaillant se soit soldée par un refus. La majeure partie des documents et traités nécessaires avaient été signés, mais lors des négociations finales l'accord semble avoir échoué et la délégation aldrésienne est partie."
verne_flavor_ace.49.a: "Maudits soient-ils ! Saisissez les brouillons et insistez qu'ils ont signé"


verne_flavor_ace.50.t: "Choisir le nouveau siège de Damérie"
verne_flavor_ace.50.d: "À force de diplomatie éreintante et exaspérante, nous sommes enfin parvenus à coaliser les différents États querelleurs ayant émergé de la chute de la Damérie durant les Guerres Lilas. Ces États sont désormais favorables au retour d'un grand-duché formel de Damérie, guidé par d'étroites relations avec notre cour. Bien que la question du nouvel emplacement de la capitale n'ait pas déchiré l'accord, elle a suscité nombre de pots-de-vin et offres de faveurs qui peuvent s'avérer utiles."
verne_flavor_ace.50.a: "Nous pourrions apprendre des maréchaux de l'Empire"
verne_flavor_ace.50.b: "Les mages seraient de grands alliés en Damérie"
verne_flavor_ace.50.c: "Les Elfes apprécieraient une position rehaussée"
verne_flavor_ace.50.d1: "Protéger les petits princes pourrait améliorer notre image"

verne_flavor_ace.51.t: "Réorganiser le grand-duché de Wex"
verne_flavor_ace.51.d: "La défaite et la déposition des puissances wexonardes hostiles ont laissé une sérieuse rupture au sein de l'Empire. Les États privés de dirigeants et isolés ont laissé tous les nobles wexonards restants terrifiés par la menace de nouvelles partitions ou conquêtes de leurs domaines. Ces circonstances ont permis à une délégation de sonder une potentielle unification des territoires du grand-duché de Wex. Cette initiative s'écartera de notre intention initiale de mettre fin aux occupations wexonardes illégales et irritera les princes, mais c'est la meilleure chance de contrôler cette partie cruciale des frontières."
verne_flavor_ace.51.a: "Bal Hyl peut diriger le nouveau duché"
verne_flavor_ace.51.b: "La cour de Sugamber possède de meilleures prétentions dynastiques pour étayer le duché"
verne_flavor_ace.51.c: "Les Bisanais sont endurcis et loyaux à la cause impériale"


verne_flavor_ace.52.t: "Unifier les Marches"
verne_flavor_ace.52.d: "Les frontières orientales ont été parmi les parties les plus négligées et les plus fractionnées de l'Empire, ce qui n'est guère un bon état de fait pour l'un de nos points d'invasion. Avant que ce problème ne surgisse, une nouvelle entité est en voie de promulgation légale afin d'unifier la gouvernance et les ressources des Marches. Les difficultés d'administration et de formation de ce duché se sont déroulées sans heurts, sauf pour la décision de l'emplacement de la capitale, de nombreux lieux offrant de grandes promesses et attraits."
verne_flavor_ace.52.a: "Arannen dirigera les Marches à nouveau"
verne_flavor_ace.52.b: "Les síl Vivins d'Ashfield apportent une offre curieuse"
verne_flavor_ace.52.c: "Peut-être qu'un des ports du Highcliff ferait mieux"
verne_flavor_ace.52.d1: "Tellum est une capitale digne de notre plus grande marche"



verne_flavor_ace.53.t: "Le Dostanor anbennérien"
verne_flavor_ace.53.d: "Formuler les divisions de nouvelles terres pour l'Empire peut être une tâche fastidieuse et cauchemardesque selon la façon dont le territoire a été acquis. Faire cela pour une région de la taille du Dostanor tout en l'intégrant davantage au droit impérial en tant que grand-duché s'est avéré bien pire. Divers nobles de la région ont offert leurs services et leur soutien pour la réforme, bien que tous semblent exiger que leur cour devienne la nouvelle capitale et soit autorisée à administrer le grand-duché. Sans le soutien de l'une des factions, nos bureaucrates se tueront probablement à la tâche, et avec des accords généreux il pourrait être judicieux d'accepter une offre."
verne_flavor_ace.53.a: "Les Korbarides offrent un marché quelque peu sinistre..."
verne_flavor_ace.53.b: "Bal Ouord se dresse en travers de toute invasion"
verne_flavor_ace.53.c: "Nathalaire pourrait bien œuvrer à la reconstruction de la côte inondée"

verne_flavor_ace.54.t: "Le statut de Vertesk"
verne_flavor_ace.54.d: "Vertesk et sa grande citadelle castanorienne se trouvent à la pointe même de la Couronne-de-Dame, et les discussions sur un grand État de la Couronne-de-Dame ont questionné son inclusion ou non. Ses liens avec les peuples aléniques et ses querelles entre les divers petits pays orientaux de la Couronne-de-Dame, qui s'unissent typiquement contre l'empiètement alénique, ont conduit les penseurs à souligner des problèmes pratiques dans une potentielle union. Aujourd'hui cependant, le temps de l'union est venu et l'avenir de Vertesk doit être décidé : avec ses frères aléniques ou avec ses partenaires commerciaux de la Tête-de-Dame."
verne_flavor_ace.54.a: "Ils sont clairement destinés à faire partie de la Couronne-de-Dame"
verne_flavor_ace.54.b: "Peut-être que leur destin se trouve ailleurs"

verne_flavor_ace.55.t: "Formation du duché de la Tête-de-Dame"
verne_flavor_ace.55.d: "Parmi les marchands impitoyables de la Tête-de-Dame, la cérémonie et la compétition entourant la future capitale potentielle ont été plus flagrantes et à peine voilées. Le duché de la Tête-de-Dame aidera à réinvestir les profits massifs de la Tête-de-Dame dans l'ensemble du duché et probablement dans la capitale, les routes commerciales changeant probablement de ce fait. Pour les cités-États commerciales de la Tête-de-Dame, cela peut constituer le plus grand bouleversement de l'équilibre des pouvoirs de la région en leur faveur depuis longtemps, et elles sont donc très vocales sur ce qu'elles peuvent offrir si on leur accorde ce privilège."
verne_flavor_ace.55.a: "La Tour Noire dirigera le duché"
verne_flavor_ace.55.b: "Les marchands de la Tête-de-Dame se sentent chez eux à la Couronne-de-Dame"
verne_flavor_ace.55.c: "L'Atelier Impérial est un bastion de notre autorité"
verne_flavor_ace.55.d1: "Les juristes de Crothàn avancent une fois encore de bons arguments"


verne_flavor_ace.56.t: "Querelles au sujet de Telgeir"
verne_flavor_ace.56.d: "Dans la délégation chargée de renverser des siècles de tradition impériale et de bâtir des grands-duchés dans la moitié orientale de l'Empire, un problème plutôt inattendu a surgi. Le comté de Telgeir a été, dans de précédentes itérations, considéré comme partie de l'ancien royaume d'Esmarie et du concept entourant l'ancien titre défunt de grand-duché d'Esmarie. Commercialement cependant, Telgeir est très intégré et lié aux princes de la Couronne-de-Dame, qui exercent une influence considérable pour tenter de gagner les fameux armuriers contre les princes esmari. La querelle autour du fief des Vanbury est devenue un obstacle majeur dans la finalisation des futurs grands-duchés esmari et de la Couronne-de-Dame, bien que la maison Vanbury possède également des liens ailleurs qui peuvent être priorisés."
verne_flavor_ace.56.a: "Les connexions de Telgeir avec la Tête-de-Dame sont manifestes"
verne_flavor_ace.56.b: "Ils font partie depuis longtemps de l'ancien royaume d'Esmarie et le resteront"
verne_flavor_ace.56.c: "Les revendications de Telgeir les orientent ailleurs..."

verne_flavor_ace.57.t: "Restaurer le grand-duché d'Esmarie"
verne_flavor_ace.57.d: "L'Esmarie se trouve au cœur de l'Empire, seuls les Elfes isolationnistes d'Ibevar faisant office de voisins non impériaux. Elle se dresse comme l'une des régions les plus prospères de l'Empire, nourrie par le grand fleuve Esmar où les barges fluviales arborent la richesse de l'Esmarie. C'est l'un des grands-duchés les plus logiques à créer, son statut de quasi-duché étant déjà loi ; il ne manque qu'une capitale proprement établie, pour laquelle de nombreuses enchères existent parmi les riches petits États."
verne_flavor_ace.57.a: "Les barges fluviales exclusives de Themarenn devraient être bienvenues à l'Empereur"
verne_flavor_ace.57.b: "Les grandes œuvres de Balgar ont encore un sens à Forgelune"
verne_flavor_ace.57.c: "Les voies fluviales esmari confluent agréablement à Estallen"
verne_flavor_ace.57.d1: "Giberd serait un grand partenaire avec ses innovations en Artisanat Magique"


verne_flavor_ace.58.t: "Proclamer le Petit-Duché"
verne_flavor_ace.58.d: "L'incorporation du Petit-Pays dans l'Empire ne doit pas reproduire l'emprise impérialiste que Gawed et Lorent exercèrent sur ces terres. Pour véritablement s'assurer que les halfelins ne se révoltent pas et demeurent satisfaits dans l'Empire, nous devons poursuivre leur représentation, soit par l'électorat de Pic-des-Abeilles, soit par un prince nouvellement promu en qui les halfelins ont confiance."
verne_flavor_ace.58.a: "L'électeur halfelin est le mieux placé pour diriger le nouveau duché"
verne_flavor_ace.58.b: "Un prince loyal dirigera ce nouveau duché"

verne_flavor_ace.59.t: "Les Elfes du Bois-d'Argent"
verne_flavor_ace.59.d: "À travers l'Empire existent de nombreux groupes minoritaires d'elfes, mais dans le lieu de débarquement de Munas et le Bois-d'Argent environnant, ils ont établi une présence bien plus solide. Dans la constitution d'un grand-duché elfique, la question s'est posée de savoir si ces terres devraient y être incluses afin que le duché puisse protéger la population elfique importante de la région. Ce lambeau de territoire détaché serait une source significative d'inefficacité dans la gouvernance impériale, mais les elfes du Bois-d'Argent seraient mieux représentés dans l'Empire, tout en renforçant le duché en lui fournissant une région prospère et un port."
verne_flavor_ace.59.a: "Ils feront partie du nouveau duché"
verne_flavor_ace.59.b: "Ce serait impraticable à administrer"

verne_flavor_ace.60.t: "La capitale du Royaume Elfique"
verne_flavor_ace.60.d: "Les elfes de l'Empire existent en groupes disparates et divisés et ont souvent été lentement réduits à des minorités sur leurs propres terres. Aussi, lors de l'élaboration des plans d'un grand-duché elfique, les seules terres véritablement sensées pouvant servir de cœur territorial se trouvent à l'ouest, à travers Arbaran et Ibevar. Là se trouve l'ancien centre des Royaumes Elfiques cannoriens, bien qu'Arbaran ait depuis longtemps abandonné ce statut. Ibevar resta quant à elle un royaume isolationniste et le Repos-Silencieux abrite les plus anciens Elfes de tout Cannor. Choisir un membre principal parmi ces trois pourrait s'avérer délicat mais nécessaire pour que le duché fonctionne."
verne_flavor_ace.60.a: "Ibevar est le centre des Elfes cannoriens depuis un certain temps"
verne_flavor_ace.60.b: "En tant que l'une des marches de l'Empire, Arbaran sera récompensée"
verne_flavor_ace.60.c: "Le Repos-Silencieux est un candidat consensuel"

verne_flavor_ace.61.t: "La frontière occidentale"
verne_flavor_ace.61.d: "La sécurité de la moitié occidentale de la Tête-de-Dame a été négligée depuis un certain temps. Pour véritablement protéger la région des menaces des Seigneurs-du-Vin, il conviendrait d'unir les Damériens de l'Ouest en une marche occidentale. Ensemble, ils seront plus à même de se défendre, bien que la direction de la marche sera probablement déterminée par l'emplacement de leur capitale."
verne_flavor_ace.61.a: "Le marquis de Wesdam rendra la frontière occidentale sûre"
verne_flavor_ace.61.b: "Un véritable geste pour enterrer la hache de guerre avec Bord-de-Perles pourrait être bénéfique"
verne_flavor_ace.61.c: "La marine impériale à Neckcliffe sera nécessaire pour les campagnes à l'ouest"

verne_flavor_ace.62.t: "Formation du duché du Lencenor"
verne_flavor_ace.62.d: "Des siècles de conflit avec les descendants de Lorenan semblent enfin toucher à leur terme. La puissance de Lorent a été définitivement brisée et à sa place de meilleurs partenaires et princes ont émergé au Lencenor. Nous devons consolider nos acquis et inaugurer dignement notre triomphe sur Lorent en proclamant le Lencenor comme partie intégrante de l'Empire en tant que grand-duché."
verne_flavor_ace.62.a: "L'ennemi héréditaire... démantelé"

verne_flavor_ace.63.t: "Les revendications de Telgeir"
verne_flavor_ace.63.d: "La maison Vanbury qui règne sur le comté de Telgeir fut bannie de sa position de seigneurs à Gawed il y a des siècles. Cette revendication est toujours dédaigneusement détenue par les Vanbury, bien qu'elle soit depuis longtemps considérée comme caduque ; elle pourrait cependant être réactivée de façon réaliste afin de légitimer une occupation anbennérienne de la région alénique et une éventuelle restructuration."
verne_flavor_ace.63.a: "Leur présence dans la région apportera une certaine stabilité"
verne_flavor_ace.63.b: "Le fardeau administratif d'un tel éloignement est trop lourd"

verne_flavor_ace.64.t: "Le statut de Vertesk"
verne_flavor_ace.64.d: "Vertesk et sa grande citadelle castanorienne se trouvent à la pointe même de la Couronne-de-Dame, et les discussions sur un grand État de la Couronne-de-Dame ont questionné son inclusion ou non. Ses liens avec les peuples aléniques et ses querelles entre les divers petits pays orientaux de la Couronne-de-Dame, qui s'unissent typiquement contre l'empiètement alénique, ont conduit les penseurs à souligner des problèmes pratiques dans une potentielle union. Aujourd'hui cependant, le temps de l'union est venu et l'avenir de Vertesk doit être décidé : avec ses frères aléniques ou avec ses partenaires commerciaux de la Tête-de-Dame."
verne_flavor_ace.64.a: "La Tour Noire de Vertesk projettera son ombre sur les Aléniques"
verne_flavor_ace.64.b: "Peut-être que leur destin se trouve ailleurs"

verne_flavor_ace.65.t: "Formation du duché alénique"
verne_flavor_ace.65.d: "L'Empire célébrera à jamais le triomphe contre les Gawedi hostiles. Cependant, la victoire s'accompagne de défis, car nous devons désormais administrer la région. Fragmenter et protéger correctement les Aléniques empêchera toute puissance de menacer à nouveau la Couronne-de-Dame ou la nouvelle frontière."
verne_flavor_ace.65.a: "Vertesk, en tant que principal membre alénique de l'Empire, le dirigera"
verne_flavor_ace.65.b: "Les revendications de Telgeir seront restaurées"
verne_flavor_ace.65.c: "Peut-être faudrait-il élever un nouveau prince à cette position"

verne_flavor_ace.66.t: "Gouverner la Détresse"
verne_flavor_ace.66.d: "Le titre de roi de Khétérata ne peut être conféré qu'au peuple de Khétérata, ce qui n'empêche guère le clergé intrigant de la région de tenter de revendiquer le titre ou de l'octroyer en contrepartie de pouvoir. Il ne serait donc pas impossible de ressusciter la sujétion de la Khétérata que l'ancienne République Damérienne exerçait, en revendiquant le mandat nous-mêmes ou par l'intermédiaire d'un mandataire. Cette dernière condition contribuera certainement à prévenir la folie de l'ancienne domination damérienne sur la Khétérata."
verne_flavor_ace.66.a: "Nommer un roi fantoche comme gouverneur de facto pourrait être la meilleure option"
verne_flavor_ace.66.b: "Nous revendiquerons le Mandat pour nous-mêmes"

verne_flavor_ace.67.t: ""
verne_flavor_ace.67.d: ""
verne_flavor_ace.67.a: ""
verne_flavor_ace.67.b: ""
verne_flavor_ace.67.c: ""

verne_flavor_ace.68.t: "Crise à Verne"
verne_flavor_ace.68.d: "Ce qui avait commencé comme une protestation essentiellement coloniale contre l'autorité et la politique autoritaire du gouvernement dans les colonies a recueilli le soutien de certains méritistes. Le règne des sénioristes a fini par faire déborder la colère des différentes factions méritistes et les a poussées à s'unir dans la révolte avec les divers exilés et rebelles en quête de plus grandes libertés et de pouvoir. À travers les colonies, des bandes armées de méritistes se sont soulevées et ont commencé à assaillir différents arsenaux gouvernementaux, forts et domaines sénioristes, des actions réciproques étant entreprises par les sénioristes avec la levée d'armées privées. La révolte s'est propagée sporadiquement sur le continent où les sénioristes ont lancé une campagne brutale pour tenter de l'enrayer indépendamment de la couronne. La capitale semble pour l'heure calme et soutenue par les factions modérées et neutres. En cet instant de paix, la couronne doit prendre une décision pour rétablir l'ordre dans ce moment de tourmente croissante."
verne_flavor_ace.68.a: "Les méritistes arrivistes doivent être écrasés et l'ordre restauré"
verne_flavor_ace.68.b: "Les sénioristes ont abusé de leurs privilèges depuis bien trop longtemps"

verne_flavor_ace.69.t: "Fin de la guerre civile vernoise"
verne_flavor_ace.69.d: "Ce que l'on pensait devoir se transformer en une grande crise civile et politique surprit tous les spectateurs lorsque la crise à Verne éclata en guerre civile. La destruction provoquée à travers les colonies et le continent a été catastrophique pour le bien-être de tous à Verne et n'a épargné ni les régions les plus éloignées ni les plus reculées. Il semble que l'effusion de sang et la destruction aient finalement dégrisé la majorité des combattants et fait capituler les factions radicales cherchant à prolonger le conflit. Différents groupes rebelles sont en cours de dissolution et la crise s'apaisera, espérons-le, avec le temps pour que la nation guérisse."
verne_flavor_ace.69.a: "L'aristocratie perdure encore"
verne_flavor_ace.69.b: "Vers un nouvel âge de liberté"
verne_flavor_ace.69.c: "Peut-être pouvons-nous songer à panser les plaies de la nation..."

verne_flavor_ace.70.t: "Ralliement des sénioristes"
verne_flavor_ace.70.d: "Les récents efforts des sénioristes ont réussi à constituer et lever une armée considérable. Il semble que les nobles auparavant distants soient désormais engagés contre les méritistes et cherchent à rejoindre la réaction générale contre eux."
verne_flavor_ace.70.a: "Cieux cendrés"

verne_flavor_ace.71.t: "Ralliement des méritistes"
verne_flavor_ace.71.d: "Une bande d'aventuriers et d'exilés auparavant désorientée semble avoir finalement craqué et pris parti dans la guerre civile. Ils ont rassemblé des aspirants nobles déçus et mécontents et ont contraint des garnisons à les rejoindre pour fomenter la révolte."
verne_flavor_ace.71.a: "Cieux cendrés"

verne_flavor_ace.72.t: "Désertions massives"
verne_flavor_ace.72.d: "La destruction observée à travers la campagne vernoise et la peur générale de ce qui se passe au pays ont provoqué une grande vague de désertions dans nos rangs. Il semble que cette tendance ait débuté parmi quelques régiments qu'il était impossible de contraindre à prolonger leur service, d'autres régiments les imitant par jalousie ou en raison de l'expiration prochaine de leurs propres contrats."
verne_flavor_ace.72.a: "Nous devons reprendre le contrôle du pays"

verne_flavor_ace.73.t: "Non-engagement impérial"
verne_flavor_ace.73.d: "La guerre civile qui a fait rage à Verne est fort heureusement restée en grande partie confinée aux territoires de la couronne de Verne. Cette situation a cependant conduit nombre de cours impériales et du parlement à déclarer que l'affaire devait être réglée avec les propres ressources de l'empereur. Ce défi stupéfiant à la volonté impériale a causé un sérieux revers pour nos efforts dans la guerre et nos ouvertures d'aide."
verne_flavor_ace.73.a: "Ne voient-ils pas que cela les concerne aussi ?"

verne_flavor_ace.74.t: "Le parlement impérial accorde son aide"
verne_flavor_ace.74.d: "La diète impériale a récemment décidé de répondre à nos appels de levées dans nos efforts pour reconquérir nos territoires en révolte. Cela a nécessité beaucoup d'influence politique, mais moins que ce qu'aurait pu coûter ce que le parlement a offert."
verne_flavor_ace.74.a: "Jamais un retour d'impôt n'a été plus nécessaire"
verne_flavor_ace.74.b: "Voyons si nous pouvons rediriger le recrutement impérial"


verne_flavor_ace.75.t: "La nation rallie notre cause"
verne_flavor_ace.75.d: "Il semble que la couronne ait une fois de plus pris une décision judicieuse. Malgré l'effusion de sang et la destruction qui entourent le pays, un effort renouvelé a mobilisé quelques villes et villages, envoyant davantage d'hommes rejoindre nos rangs."
verne_flavor_ace.75.a: "Enfin de bonnes nouvelles"

verne_flavor_ace.76.t: "Un chef charismatique fomente la révolte"
verne_flavor_ace.76.d: "Une région relativement calme a été incitée à la révolte, principalement sous l'influence d'une figure auparavant neutre. La révolte pourrait être apaisée cependant, car il ne semble pas idéologiquement engagé et se révolte plutôt pour tenter d'arracher pouvoir et influence au mouvement. Si nous pouvions lui offrir un meilleur marché, cela pourrait empêcher l'agitateur d'attiser la révolte."
verne_flavor_ace.76.a: "Nous ne nous laisserons pas faire chanter"
verne_flavor_ace.76.b: "Voyons si nous pouvons réaffecter quelques fonds pour arrêter cela"

verne_flavor_ace.77.t: "Un conseiller incompétent"
verne_flavor_ace.77.d: "Il semble que l'un des membres de notre conseil ait connu un léger déclin."
verne_flavor_ace.77.a: "L'informer de rédiger une lettre de démission"
verne_flavor_ace.77.b: "C'est l'un des nôtres et les nôtres lui font confiance"

verne_flavor_ace.78.t: "Réattribution des postes du cabinet"
verne_flavor_ace.78.d: "Il semble que l'un des membres de notre conseil ait connu un léger déclin. Son travail est de plus en plus bâclé et de moindre qualité, tandis que sa participation au conseil a été médiocre au mieux. Ses performances mettent désormais en question son aptitude à occuper son poste, bien qu'il conserve de nombreux alliés au gouvernement plaidant pour qu'il reste en place."
verne_flavor_ace.78.a: "Une excellente occasion d'intégrer de nouveaux talents"
verne_flavor_ace.78.b: "Ces fonctions requièrent finesse et tact dans leur exercice"

verne_flavor_ace.79.t: "Mort d'un propriétaire terrien"
verne_flavor_ace.79.d: "Il semble que le récent décès d'un éminent propriétaire foncier ait causé de sérieux problèmes concernant son héritage. Au moment de sa mort, ses options d'héritiers sont floues, en froid et non mentionnées dans son testament rédigé à la hâte. En conséquence, son vaste domaine se retrouvera entre les mains de l'État, et la question de son utilisation a occupé la majeure partie des débats du cabinet ces derniers jours."
verne_flavor_ace.79.a: "Diviser le domaine pour des propriétaires plus modestes"
verne_flavor_ace.79.b: "L'État pourrait encore avoir usage de ces terres"

verne_flavor_ace.80.t: "Triomphe des domaines traditionnels"
verne_flavor_ace.80.d: "Il semble que récemment quelques agendas et stratagèmes aient abouti avec succès pour une partie de la noblesse. Certains sont plus banals et routiniers, mais un bon nombre sont parvenus à étendre l'influence de ces figures traditionnelles."
verne_flavor_ace.80.a: "Utiliser cela pour affaiblir leur opposition"
verne_flavor_ace.80.b: "Veiller à ce que leur projet aboutisse avec succès"

verne_flavor_ace.112.t: "Accueillir la Régate"
verne_flavor_ace.112.desc: "La Régate, depuis ses origines plus modestes et locales, est devenue une grande fête traditionnelle pour le peuple et les communautés maritimes de Verne. Pour correctement inaugurer et promouvoir la compétition, nous devrons collaborer avec les maîtres de jeu traditionnels de la course pour fournir un itinéraire aussi sûr que possible. Ce faisant, nous sommes en mesure d'influencer avec une certaine assurance la destination de la course, formant un groupe endurci de marins pour une tâche de notre choix."
verne_flavor_ace.112.a: "De Stingport à Ekha : une tradition classique"
verne_flavor_ace.112.b: "Atteindre la Fangaula requiert une certaine habileté et finesse"
verne_flavor_ace.112.c: "Une course vers les Îles aux Clous de Girofle favorise le trafic marchand"
verne_flavor_ace.112.d: "Contourner Ardimya requiert de bons capitaines et un meilleur navire"
verne_flavor_ace.112.e: "Suivre le chemin de maints pionniers et terminer à Haless"
verne_flavor_ace.112.f: "Ceux qui recherchent le plus la gloire devront naviguer autour du monde entier !"
verne_flavor_ace.112.f2: "Un passage à travers les barrières sûres des Vents-de-Mort est palpitant et exige de l'adresse"
verne_flavor_ace.112.g: "Quitter"


