##privleges
verne_merchant_escort: "Garde Marchande"
verne_merchant_escort_desc: "La présence d'un petit détachement de mercenaires à bord d'un navire peut faire toute la différence pour repousser les pirates. Les pirates préféreront souvent ne pas chercher querelle, et montrer qu'ils en trouveront une face aux fameux marins et aventuriers vernois contribuera grandement à assurer la sécurité de nos marchands en mer."
verne_red_brass_mono: "Monopole du Laiton Rouge"
verne_red_brass_mono_desc: "Établie en tant que compagnie par la famille síl na Bronzewing, la bronzerie et l'artillerie vernoises se sont vu octroyer par l'empereur d'Anbennar un monopole complet et le contrôle de la production du laiton rouge. Le laiton rouge, extrait de cuivre unique au Khenak, est très prisé pour sa facture supérieure et sa qualité inégalée comparée aux autres alliages de bronze."
verne_land_grants: "Concessions Foncières aux Vétérans"
verne_land_grants_desc: "La retraite d'un aventurier pourrait ne jamais arriver, et ceux qui sont trop blessés ou trop vieux pour poursuivre sombrent souvent dans l'indigence. Concevoir un système de concessions foncières pour récompenser les aventuriers vétérans peut aider à mieux orienter le développement des terres tout en offrant une juste récompense à nos meilleurs."
verne_korvid_offer: "« Diplomates » Korbarides"
verne_korvid_offer_desc: "Les Korbarides cachent un très sombre secret dans leurs châteaux et domaines. Le fait qu'ils parviennent à garder ce secret face à toute enquête est remarquable. Conclure un marché pour les protéger et les laisser tranquilles en échange d'un peu de leur expertise devrait être un marché équitable."
unlock_privilege_verne_korvid_offer_tt: "Active le privilège de [Root.GetNoblesName] « §Y« Diplomates » Korbarides§! »."
A33_pioneer_initiative: "Compagnies d'Exilés"
A33_pioneer_initiative_desc: "Compagnies d'Exilés"
verne_high_priest_governor: "Gouverneur Grand-Prêtre"
verne_high_priest_governor_desc: "Gouverneur Grand-Prêtre"
verne_adventurers_swing: "Titres de Bravoure"
verne_adventurers_swing_desc: "Une extension de clauses de lois antérieures concernant les concessions et achats fonciers, permettant l'acquisition ou la concession de certaines terres sur la base de grands actes de bravoure attestés par les tribunaux locaux."
verne_nobles_swing: "Édits de Préséance"
verne_nobles_swing_desc: "Précédents et édits favorisant le renouvellement de certains postes occupés par des candidats moins qu'idéaux, sur la base d'une lignée ayant précédemment occupé de hautes fonctions."
estate_A33_adventurers_heroes_in_the_army: "Verne, terre d'aventuriers"
estate_A33_adventurers_heroes_in_the_army_desc: "Certains Vernois sont devenus des noms de légende, même parmi les meilleurs aventuriers, renommés dans leur domaine et célèbres pour leurs exploits. En offrant à ces héros des contrats de longue durée pour servir comme officiers, spécialistes et meneurs au même niveau et avec la même autorité que notre personnel traditionnel, cela apportera sans doute un avantage créatif à nos forces, mais peut-être au détriment de notre décorum professionnel habituel."

