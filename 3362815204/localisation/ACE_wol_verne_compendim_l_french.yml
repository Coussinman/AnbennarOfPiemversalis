###factions
adven_rep_captains: "Les Capitaines"
adven_rep_captains_FACTION_DESC: "Les dirigeants influents et aventuriers fortunés de Verne, de par leurs positions de pouvoir, tendent à orienter l'État vers une république plus traditionnelle. Maintenir la stabilité de l'État et la respectabilité de la république est leur intention, bien qu'ils soient souvent perçus comme stricts au mieux et autoritaires au pire."
adven_rep_captains_influence: "Influence des Capitaines"
adven_rep_dogooder: "Les Bienfaiteurs"
adven_rep_dogooder_FACTION_DESC: "Les divers chasseurs de monstres, gardiens de la paix, explorateurs et diplomates sont souvent catégorisés comme les bienfaiteurs. Leur tendance à moraliser et à se concentrer sur les conditions internes de Verne contribue à les rendre populaires auprès de la population et dans les relations diplomatiques en temps de paix. Cette tendance à moraliser tend cependant à entraver la conduite d'une guerre et enflammera le sentiment pacifiste qu'ils encouragent."
adven_rep_dogooder_influence: "Influence des Bienfaiteurs"
adven_rep_gloryhound: "Les Chasseurs de Gloire"
adven_rep_gloryhound_FACTION_DESC: "Les Chasseurs de Gloire sont de jeunes aventuriers ambitieux et aspirants qui cherchent à se faire un nom par la conquête ou de grands exploits physiques. Leur intrépidité et leur zèle à se joindre à tout combat tendent également à en faire une faction perturbatrice et sujette aux émeutes."
adven_rep_gloryhound_influence: "Influence des Chasseurs de Gloire"
##governments
A33_adventury_republic_reform: "République Aventurière"
A33_adventury_republic_reform_desc: "Les derniers vestiges de l'ancienne noblesse vernoise ont engendré une nouvelle forme de gouvernement. Le vide de pouvoir laissé par la noblesse fut rapidement comblé par la caractéristique la plus notable et la plus abondante de Verne : les aventuriers. Ce gouvernement, valorisant une représentation plus démocratique, est mené et protégé par les aventuriers de Verne qui, n'ayant plus à défier la noblesse, se chamaillent désormais entre eux sur la meilleure approche pour gouverner."
A33_nobles_adventurers_gov: "Monarchie Aventurière"
A33_nobles_adventurers_gov_desc: "Le résultat du pari désespéré des nobles vernois pour sauver un ordre aristocratique à Verne. Leur stratagème s'avéra fructueux, mais la patte de singe s'est tordue et la nature de l'ordre est en flux constant. Des factions se sont retranchées pour tenter de faire pencher la balance d'un côté ou de l'autre : les méritistes tentent de créer une cour noble plus qualifiée et inclusive, tandis que les sénioristes s'efforcent de préserver l'exclusivité de la noblesse et l'ancien ordre aristocratique ainsi que les privilèges de leur base de noblesse ancienne."
ability_A33_adven_vs_noble_mechanic: "Équilibre Aventuriers et Noblesse"
ability_A33_adven_vs_noble_mechanic_desc: ""
ability_A33_adven_vs_noble_mechanic_1: "Équilibre Aventuriers et Noblesse"
ability_A33_adven_vs_noble_mechanic_1_desc: ""
A33_gov_power: "Sénioristes contre Méritistes"
A33_gov_power_desc: "Le pouvoir Sénioristes contre Méritistes\n§YAugmente§! vers le côté de la Noblesse avec les facteurs suivants :\n - Être en guerre\n - Niveau de mercantilisme\n - Noblesse loyale\n - Privilège de noblesse Édits de Préséance\n - Aventuriers déloyaux\n - Convoquer la Diète\n§YAugmente§! vers le côté des Aventuriers avec les facteurs suivants :\n - Être en paix\n - Aventuriers loyaux\n - Privilège d'aventuriers Titres de Bravoure\n - Noblesse déloyale\n - Vente de titres\n - Lassitude de guerre\n - Entraînement des armées\n \nÀ §Y100§! nous obtenons les effets suivants :\n Équilibre de loyauté de tous les états : §G+10,00 %§!\n Gain d'autorité impériale : §G+10,00 %§!\n Progrès mensuel de réforme : §R-15,00 %§!\nEntre §Y25§! et §Y100§! nous obtenons les effets suivants :\n Autonomie globale : §G-0,05 %§!\nEntre §Y50§! et §Y100§! nous obtenons les effets suivants :\n Discipline : §G+2,5 %§!\n\nÀ §Y-100§! nous obtenons les effets suivants :\n Agitation nationale : §G-3,00§!\n Coût des conseillers : §G-15,00 %§!\n Réputation diplomatique : §R-1§!\nEntre §Y-25§! et §Y-100§! nous obtenons les effets suivants :\n Coût de stabilité : §G-20,00 %§!\nEntre §Y50§! et §Y100§! nous obtenons les effets suivants :\n Dégâts au moral reçus : §G-10,00 %§!"
A33_button_nobles: "Imposer l'ancienneté"
A33_button_adven: "Redistribuer les commissions"
A33_button_neutral: "Apaiser le factionnalisme"
A33_button_nobles_desc: "Les voix les plus anciennes du gouvernement possèdent la plus grande expérience et le meilleur jugement. Prioriser leurs sièges dans les comités et commissions contribuera grandement à exploiter leur expertise."
A33_button_adven_desc: "Redistribuer les divers titres et commissions au gouvernement aidera à introduire de nouveaux talents dans les salles poussiéreuses du pouvoir et à démettre les fonctionnaires corrompus."
A33_button_neutral_desc: "Une brève coalition entre modérés et indépendants devrait favoriser la civilité et la coopération parmi les membres les plus radicaux du gouvernement."
A33_gov_power_gain_modifier: "Modificateur de gain de pouvoir Sénioristes contre Méritistes"
monthly_A33_gov_power: "Sénioristes contre Méritistes mensuel"
A33_parliament_hre: "Diète impériale intégrée"
A33_parliament_hre_desc: "En abolissant formellement les diverses diètes locales désuètes et la diète nationale, il serait possible d'intégrer la diète impériale à la nôtre. Une telle mesure contribuera à fournir un meilleur contrôle sur nos vassaux nominaux dans l'Empire et nos propres territoires centraux. Une meilleure représentation et des méthodes directes pour s'adresser à l'empereur devraient s'avérer populaires auprès des princes et seigneurs de l'Empire."
unlock_A33_adventury_republic_reform_tt: "Débloque la réforme gouvernementale « §YRépublique Aventurière§! »."
unlock_A33_nobles_adventurers_gov_tt: "Débloque la réforme gouvernementale « §YMonarchie Aventurière§! »."
unlock_A33_parliament_hre_tt: "Débloque la réforme gouvernementale « §YDiète Impériale Intégrée§! »."
