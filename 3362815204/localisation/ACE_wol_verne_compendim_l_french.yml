##subjects
A33_adventurer_colony: "Colonie Aventurière"
A33_adventurer_colony_title: "Colonie Aventurière"
A33_adventurer_colony_title_plural: "Colonies Aventurières"
A33_adventurer_colony_is_our: "$NAME|Y$ est notre Colonie Aventurière"
A33_adventurer_colony_long_desc: "Une colonie centrant la gouvernance et le pouvoir politique autour de divers capitaines aventuriers. Ces capitaines reçoivent des concessions foncières au sein d'une colonie pour gouverner et peupler comme bon leur semble avec leur compagnie. Un système de gouvernance moins qu'idéal et stable, il fournit cependant une source d'hommes enthousiastes en quête de nouvelles aventures, de leur propre frontière à coloniser ou d'un refuge temporaire."

A33_grand_duchy: "Grand Kreis"
A33_grand_duchy_title: "Grand Kreis"
A33_grand_duchy_title_plural: "Kreise"
A33_grand_duchy_is_our: "$NAME|Y$ est notre Kreis"
A33_grand_duchy_long_desc: "Fruit de la réorganisation et de la réforme vernoises de l'Empire, le Grand Kreis constitue une nouvelle division administrative dans l'Empire. Permettant un contrôle bien plus direct d'une zone de l'Empire, ils demeurent quelque peu distants en raison de leur subdivision et de leurs factions internes. Il représente toutefois un degré de contrôle jusqu'ici inconnu des empereurs de l'Empire."

