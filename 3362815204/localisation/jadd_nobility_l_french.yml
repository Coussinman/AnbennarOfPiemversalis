l_french:
 ASSIMILATED_CULTURE_HEADER:0 "$TITLE|Y$"
 ASSIMILATED_CULTURE_NO_BENEFIT:0 "Assimiler ce groupe culturel ne confère aucun avantage."

 jadd_empire_anbennarian_assimilated:0 "Unité Anbennarienne"
 jadd_empire_anbennarian_assimilated_desc:0 "Anbennar signifie unité, et l'unité signifie Anbennar. Notre cause aussi est celle de l'unité : l'unité de Surael, chaque personne servant Sa cause et portant une part de Sa Lumière. Avec les Anbennariens dans notre nation, cet appel à l'unité ne sera que plus fort, et chaque entreprise renforcée par là même."

 jadd_empire_alenic_assimilated:0 "Proto-Industrialisation des Hommes de l'Étendue"
 jadd_empire_alenic_assimilated_desc:0 "Tandis que nous répandions la Lumière et la vérité de Surael à travers le Salahad, le Bulwar et le Rahen, les peuples aléniques se battaient pour leur vie contre les féroces Orques Gris, et plus important encore, ils développaient des formes innovantes de manufacture et de production. Maintenant que la Lumière de Surael s'est levée au-dessus de leurs rivages froids, nous devrions rattraper ce que nous avons manqué, et nous assurer d'implémenter leurs idées à travers notre royaume."

 jadd_empire_businori_assimilated:0 "Résilience Businori"
 jadd_empire_businori_assimilated_desc:0 "Bien qu'assaillie par des peuples plus forts et plus nombreux de tous côtés, l'identité businori est restée forte et unique. Leur obstination personnelle se reflète dans la robustesse de leurs navires, et nous ferions bien de mettre à jour nos techniques de construction navale pour refléter de tels designs."

 jadd_empire_escanni_assimilated:0 "Innovation Gouvernementale Escannienne"
 jadd_empire_escanni_assimilated_desc:0 "Suite au chaos de la Marée Verte, l'Escann a vu l'épanouissement de nouvelles nations, et avec elles, il est devenu un foyer d'innovation administrative. Bien que notre conquête nette révèle clairement les défauts de beaucoup de ces gouvernements, nous devrions examiner leurs systèmes et prendre les meilleures idées pour fluidifier notre propre bureaucratie."

 jadd_empire_dostanorian_g_assimilated:0 "Inébranlable comme un Dostanorien"
 jadd_empire_dostanorian_g_assimilated_desc:0 "La Folie de Daravan reste une tragédie à ce jour, une cicatrice sur Halcann. Mais avec tant de terres perdues à jamais pour eux, le peuple dostanorien s'accroche fermement à ce qui reste, refusant de le céder à tout envahisseur. Bien que cela ait été une nuisance dans notre conquête, de leur esprit chaque homme de l'Empire peut apprendre à ne jamais abandonner une position."

 jadd_empire_kheteratan_assimilated:0 "Héritage du Divenhal"
 jadd_empire_kheteratan_assimilated_desc:0 "Le Divenhal fut là où les humains ont navigué les vagues pour la première fois, et les peuples environnants peuvent faire remonter leurs techniques de navigation maritime à ces jours. Maintenant qu'ils sont une partie loyale de notre Empire, ils devraient être persuadés de partager ces secrets assez facilement."

 jadd_empire_lencori_assimilated:0 "Traditions de Chevalerie"
 jadd_empire_lencori_assimilated_desc:0 "Là où les chevaliers parlent de Chevalerie, nous voyons les mêmes principes que Surael a commandé à nous tous de suivre. Maintenant que chaque Lencori nous prête allégeance, cela ne devrait pas être un grand écart pour certains de nos cavaliers d'apprendre leurs traditions, et leurs charges n'en seront que plus dévastatrices."

 jadd_empire_halfling_assimilated:0 "Connexions Halfelines"
 jadd_empire_halfling_assimilated_desc:0 "Les halfelins ont toujours su que pour obtenir leur liberté, ils auraient besoin de plus que la force brute : cela exigeait leur esprit le plus aiguisé, et l'exploitation de connexions et de faveurs qu'ils ont construites pendant des décennies. Maintenant qu'ils ont trouvé la vraie liberté, celle de la Lumière de Surael, nous devrions pouvoir mettre ces réseaux à un usage encore meilleur."

 jadd_empire_gnomish_assimilated:0 "Intervention Bienveillante"
 jadd_empire_gnomish_assimilated_desc:0 "Idéalement, les gnomes ne remarqueront même pas que nous les avons conquis (à part un changement obligatoire dans leurs pratiques religieuses). Nous devons nous assurer que leurs universités, laboratoires et projets de recherche continuent tous comme avant, afin que nous puissions récolter les bénéfices de leurs esprits brillants."

 jadd_empire_gerudian_assimilated:0 "Mémoires de la Glace Noire"
 jadd_empire_gerudian_assimilated_desc:0 "À l'Âge de la Glace Noire, les pillards gérudiens dominaient le monde, conquérant et colonisant comme bon leur semblait. Bien que ces jours soient depuis longtemps révolus, et notre ascension dépasse de loin toute précédente, ces peuples nouvellement conquis assureront que nous n'oublions jamais l'importance de la puissance navale."

 jadd_empire_giantkind_assimilated:0 "Techniques de Construction Gigantesques"
 jadd_empire_giantkind_assimilated_desc:0 "Ce que les Géants ont construit, ils l'ont construit pour durer. Les mêmes idées perdurent chez les peuples qui ont hérité de leur sang et de leur héritage, et bien que nos bâtiments ne seront pas tout à fait à la même échelle, nos architectes ont sûrement beaucoup à apprendre du peuple des Géants et des bâtiments qui font maintenant partie de notre domaine."

 jadd_empire_elven_assimilated:0 "Les Elfes Réunifiés"
 jadd_empire_elven_assimilated_desc:0 "Jadis, nous régnions. Jadis, nous fûmes brisés. Jadis, nous fûmes jetés aux vagues, perdus pendant un millénaire et plus. Mais ces jours sont derrière nous maintenant, car sous la Lumière de Surael nous avons créé un État pour rivaliser même avec l'Empire Précurseur. Et chaque elfe dans notre armée combattra avec plus de férocité sachant qu'il est la pointe de lance d'un peuple réunifié."

 jadd_empire_dwarven_assimilated:0 "Canons Anciens, et Modernes"
 jadd_empire_dwarven_assimilated_desc:0 "Les nains ont oublié plus sur l'artillerie que la plupart des autres peuples n'en ont jamais su. Les canons nains ont autrefois combattu l'Empire Précurseur jusqu'à l'impasse, et bien qu'ils n'aient pu repousser nos forces justes, nous devons nous assurer d'apprendre leurs techniques et d'élever nos canons au même niveau."

 jadd_empire_kobold_assimilated:0 "Honorer les Tombés-aux-Pièges"
 jadd_empire_kobold_assimilated_desc:0 "Aucun peuple ne connaît l'art de la guérilla ou du piège comme les kobolds, et nous avons payé un prix considérable pour apprendre cette vérité lors de la conquête de leurs terres. Nous devons nous assurer d'étudier leurs mécanismes diaboliques, afin que chaque goutte de sang qu'ils ont versée soit remboursée au décuple dans le sang de tout envahisseur qui s'introduit dans notre royaume."

 jadd_empire_gnollish_assimilated:0 "Sociopathie en Laisse"
 jadd_empire_gnollish_assimilated_desc:0 "Depuis nos jours en tant que Légion du Désert, nous avons essayé d'éduquer les gnolls aux bases de l'éthique. Bien que notre succès ait été limité, nous avons réalisé que leurs tendances amorales, tenues en laisse serrée, pourraient être utiles dans certaines de nos négociations diplomatiques les plus épineuses."

 jadd_empire_orcish_assimilated:0 "Avant-Garde Orque"
 jadd_empire_orcish_assimilated_desc:0 "Qu'est-ce qui est le mieux dans la vie ? Les orques diraient que c'est d'écraser ses ennemis, de les voir fuir devant soi, et d'entendre les lamentations de leurs femmes. Nous devons leur faire comprendre qu'en vérité, le mieux est de servir Surael et de L'imiter, mais jusqu'à ce que cela soit fait, nous pouvons profiter de leur férocité en les utilisant comme troupes de choc."

 jadd_empire_goblin_assimilated:0 "Survie, Contre Toute Attente"
 jadd_empire_goblin_assimilated_desc:0 "Dans des cavernes stériles. Dans les chaînes d'esclaves hobgobelins. Dans le sillage de la Marée Verte. Peu de races ont enduré plus, ou survécu à pire, que les gobelins. Bien que nos jours dans le désert austère ne soient pas si lointains nous-mêmes, nous pouvons encore apprendre quelque chose d'eux sur la survie même dans les conditions les plus rudes."

 jadd_empire_bulwari_assimilated:0 "Berceau des Empires"
 jadd_empire_bulwari_assimilated_desc:0 "Tout comme pour Jaher, la promesse de notre Empire fut d'abord illuminée dans le Bulwar, drapé de soleil, béni par le soleil. Maintenant qu'il est complètement dans notre emprise, nous commençons à voir cette promesse accomplie. En avant, pour Surael !"

 jadd_empire_harpy_assimilated:0 "Le Salut de Jasiéne"
 jadd_empire_harpy_assimilated_desc:0 "Quand la Légion du Désert errait dans les étendues désolées du Salahad Oriental, ce furent les harpies qui les prirent sous leur aile, leur montrant des oasis et assurant leur survie. Depuis ces jours, les harpies ont été une partie intégrante de l'Empire Jadd. Elles furent notre salut, et avec la Jadd nous devînmes le leur également ; il en est de même pour nos blessés de guerre, qui pourraient fermer les yeux sur la mort pour se réveiller avec une harpie les évacuant pour faire soigner leurs blessures."

 jadd_empire_upper_raheni_assimilated:0 "Leçons du Rahenraj"
 jadd_empire_upper_raheni_assimilated_desc:0 "Le Rahenraj est tombé il y a des siècles et des siècles, bien avant le Jour des Cieux Cendrés, mais ses drapeaux de communication et ses règlements d'armée perdurent encore parmi les Shamakhadi. Nous pensions cela un étrange anachronisme quand nous conquérions ces terres, mais avons rapidement compris que cela signifiait qu'ils pouvaient rapidement équiper de nouvelles armées et fusionner des forces sans confusion. Intégrer certains de ces éléments dans notre propre structure de commandement devrait apporter des avantages similaires."

 jadd_empire_middle_raheni_assimilated:0 "Bateaux-Érudits du Kharunyana"
 jadd_empire_middle_raheni_assimilated_desc:0 "L'un des spectacles les plus étranges alors que nos armées marchaient dans les terres dhujati était les grands bateaux qui flottaient paisiblement sur le Kahrunyana, à bord desquels des philosophes et autres érudits livraient des batailles aussi féroces que les nôtres. Nous devons nous assurer que ces bateaux continuent de naviguer ; tout comme nos campagnes ont forgé un domaine dédié à Surael, de leurs conflits émergent les idées nouvelles les plus extraordinaires."

 jadd_empire_south_raheni_assimilated:0 "La Brigade des Palais"
 jadd_empire_south_raheni_assimilated_desc:0 "Dans notre conquête du Rahen du Sud, nous avons été à la fois frustrés et fascinés par les palais variés que nous avons rencontrés qui parsemaient le Dhenbasana. C'étaient des œuvres de beauté même pour nos yeux austères du désert, et malgré cette beauté, ils étaient extrêmement difficiles à percer. Maintenant que la région est fermement entre nos mains, nous devons rassembler les mêmes architectes et ingénieurs qui les ont construits, pour nous assurer qu'aucun mur ne retienne la Lumière de Surael."

 jadd_empire_hobgoblin_assimilated:0 "Un Héritage de Soldats"
 jadd_empire_hobgoblin_assimilated_desc:0 "Avec nos racines dans la Légion du Désert de Jaddar, beaucoup de gens de l'Empire Jadd se sont longtemps vus comme des soldats avant tout. Mais même si le Commandement a maintenant été consumé par le feu de Surael, il est clair que même nous avons quelque chose à apprendre des hobgobelins pour faire du métier de soldat le cœur de notre être."

 jadd_empire_harimari_assimilated:0 "Le Codex de Sitarayar"
 jadd_empire_harimari_assimilated_desc:0 "Parmi les nombreux harimari qui ont vu la Lumière de la Jadd dans nos premiers jours de progression dans le Rahen, Sitarayar de la Griffe Brillante a brillé le plus fort. En tant que général, il fut essentiel dans la conquête du Harimraj. Mais après avoir perdu une patte dans notre croisade contre le Commandement, il se tourna vers l'érudition. Ses traités sur l'histoire et le développement des systèmes gouvernementaux harimari royaux sont essentiels, et le codex qui les compile est peut-être son plus grand héritage."

 jadd_empire_centaur_assimilated:0 "La Tempête, Domptée"
 jadd_empire_centaur_assimilated_desc:0 "Les centaures, longtemps divisés, doivent s'unir. Les centaures, longtemps unis, doivent se diviser. Ainsi en a-t-il été, mais maintenant qu'ils ont été unifiés sous la bannière de la Jadd et le soleil de Surael, ils ne se diviseront plus. Au lieu de cela, leurs charges féroces rendront les nôtres d'autant plus puissantes."

 jadd_empire_ogre_assimilated:0 "Peaux Épaisses"
 jadd_empire_ogre_assimilated_desc:0 "Bien que les Fathides soient les seuls ogres qui font de leur corpulence une partie de leur autodescription, la peau épaisse de chaque ogre les aide à ignorer coups et blessures. Tandis que la Lumière de Surael a bien sûr pénétré même cette plus épaisse des barrières, il reste clair que placer des ogres sur les flancs de nos armées assurera que nous subissions peu de pertes, peu importe la férocité du combat."

 jadd_empire_triunic_assimilated:0 "Débatteurs Expérimentés"
 jadd_empire_triunic_assimilated_desc:0 "Jadis, la grande Salle d'Assemblée de la Fédération des Lacs contenait les débats d'un peuple entier, alors qu'ils naviguaient les crises et tendaient vers la grandeur. Maintenant qu'ils ont vu la Lumière de Surael, la grande Salle est devenue un temple encore plus grand de la Jadd. Cela laisse tout de même pas mal d'orateurs talentueux et de politiciens intrigants sans espace pour exercer leurs talents, et nous devrions nous assurer qu'ils trouvent une place convenable dans notre corps diplomatique."

 jadd_empire_bom_assimilated:0 "Architecture des Forts de Bim Lau"
 jadd_empire_bom_assimilated_desc:0 "La Jadd a connu bien des citadelles en son temps. De notre première conquête d'Azka-Sur, aux divers nids de harpies que nous avons surmontés, aux murs balayés par le désert de Davharral, tous sont tombés devant nous avec le temps. Mais nous n'avons jamais connu une barrière comme les murs de Bim Lau, où vivants et morts défendent avec une vigueur suprême et un nombre écrasant. Bien que les âmes de nos morts soient laissées aux soins de Surael plutôt que pressées au service sur les murs, nous devrions chercher à adapter leur style pour assurer que nos propres forts repoussent les envahisseurs presque aussi bien."

 jadd_empire_kai_assimilated:0 "Le Pas de la Lumière Solaire"
 jadd_empire_kai_assimilated_desc:0 "Nos généraux ont ri quand ils ont vu pour la première fois l'étrange style de marche des Kai. Ils sont rapidement devenus jaloux, une fois qu'ils ont réalisé que cela permettait d'une façon ou d'une autre un repositionnement ultra-rapide des forces, avec les avantages stratégiques et tactiques correspondants. Bien que le gros de nos forces n'ait pas l'expérience de marathon qu'ont les Kai, nous devons voir ce qui peut être adapté de leur style. La Lumière de Surael voyage vite, et nos armées doivent aussi."

 jadd_empire_kelino_assimilated:0 "Coopération des Familles Marchandes"
 jadd_empire_kelino_assimilated_desc:0 "Les Elfes Solaires d'Arawkelin ont survécu à l'éclatement de l'Empire du Phénix en coopérant avec les tribus pagnili locales, et cet héritage perdure dans les familles Kelino qui dominent encore leur commerce. Il est temps pour les locaux de coopérer avec des conquérants elfiques une fois de plus, et une fois qu'ils le feront, toutes les richesses de Haless afflueront entre nos mains."

 jadd_empire_yanglam_assimilated:0 "Une Jungle de Couronnes"
 jadd_empire_yanglam_assimilated_desc:0 "Dans la forêt tropicale yanglamese, chaque dirigeant se disait roi, avec les accessoires et regalia correspondants. Maintenant, cependant, par l'épée ou par la plume ils en sont venus à réaliser que Surael est le vrai Roi, et l'Empire Jadd Son État. Nous nous retrouvons donc avec un surplus de couronnes sans personne pour les porter ; elles feront d'excellentes pièces centrales pour nos salles d'assemblée et nos salles de banquet, et rappelleront à tous notre règne suprême."

 jadd_empire_yan_assimilated:0 "Un Arsenal des Trois Armes"
 jadd_empire_yan_assimilated_desc:0 "Depuis que Jaddar et ses flèches incessantes ont mené la Légion du Désert à la victoire et à l'ascension, apprendre l'arc a été un composant essentiel de l'éducation militaire de nos soldats. Mais chaque bataille, sanglante, belle, brutale, dans la conquête de Yanshen a montré clairement pourquoi ces gens voient l'utilité d'apprendre aussi la lance et le jian. Notre régime d'entraînement devrait être mis à jour en conséquence."

 jadd_empire_gowon_assimilated:0 "Seigneurs de l'Arc, Anciens et Nouveaux"
 jadd_empire_gowon_assimilated_desc:0 "La Jadd a commencé avec Jaddar, dont l'habileté à l'arc nous a menés à la victoire dans de nombreuses batailles précoces. Dans la conquête de Danggun, nous avons été exposés à un nouvel ensemble de seigneurs de l'arc, leurs Hwalbaek, et nous avons été impressionnés par l'habileté des manieurs d'armes-esprits même en redoutant les pertes qu'ils infligeaient. Maintenant que la terre est embrassée par la Lumière de Surael, nous devrions intégrer leurs traditions de tir à l'arc dans notre entraînement, et nous assurer que chaque soldat apprenne certaines des capacités de leurs tireurs d'élite."

 jadd_empire_khantaar_assimilated:0 "Éclaireurs sur Oiseaux-Terreur"
 jadd_empire_khantaar_assimilated_desc:0 "Les Jaddari ont commencé sur le dos de destriers du désert, et en nous étendant, nous avons été forcés de trouver des races mieux adaptées aux jungles épaisses du Rahen ou aux grandes forêts des Bois-Profonds. Maintenant que, enfin, les guerriers sans visage de la steppe du nord ont été subjugués, nous devrions intégrer les oiseaux-terreur également (où approprié) dans notre cavalerie. Et avec leurs habitudes alimentaires, tant que nous continuons à livrer des batailles nous devrions pouvoir dépenser significativement moins en fourrage."

 jadd_empire_besholgi_assimilated:0 "Vers les Mers les Plus Lointaines"
 jadd_empire_besholgi_assimilated_desc:0 "Nous avons trouvé Moduk une terre froide, rude, désolée. Mais cela ne la rend pas moins importante pour Surael que toute autre, et amener les Besholgi dans Sa Lumière est aussi important pour nos Porteurs de Lumière que tout autre (ignorez ceux qui pourraient décrire être envoyé à Moduk comme une punition). De plus, mettre en place des flottes pour ravitailler des terres stériles nous a beaucoup appris sur les nécessités logistiques pour l'action dans des ports distants, une bénédiction de Surael qui servira indubitablement bien nos voyages commerciaux."

 jadd_empire_akasi_assimilated:0 "Commerce Sarhali Sécurisé"
 jadd_empire_akasi_assimilated_desc:0 "Que les Akasi aient vu la Lumière de la Jadd a de nombreux avantages. Premièrement, bien sûr, c'est qu'ils peuvent maintenant accomplir leur but donné par Surael. Deuxièmement, que toute notre croisade est plus forte grâce à leur rôle unique en elle. Et troisièmement, nous pouvons commercer de manière sécurisée avec et autour de Sarhal, et chaque marchand de la Jadd en sera plus riche."

 jadd_empire_irsukuba_assimilated:0 "Visions Différentes, Un Seul Surael"
 jadd_empire_irsukuba_assimilated_desc:0 "Quand ceux au sein de la Jaddari ont entendu pour la première fois comment les enseignements de Surael étaient racontés au Horashesh, il y a eu des appels à brûler ces hérétiques. Surael et son prophète Jaddar sont pris comme partie de leur propre panthéon de figures héroïques plutôt que comme la seule vraie divinité. Pourtant personne ne pouvait douter de leur croyance en Ses enseignements. Tant qu'ils suivent Sa volonté, peut-être pouvons-nous les laisser être. Tous sont égaux sous la Lumière de Surael, après tout."

 jadd_empire_vurebindu_assimilated:0 "Abondance du Horashesh"
 jadd_empire_vurebindu_assimilated_desc:0 "Comparé à nos humbles débuts dans le désert du Salahad, les réserves de nourriture au Horashesh étaient stupéfiantes. Du bétail plus gras que tout ce que nous avions jamais vu. Des champs de blé et de haricots cultivés à travers leurs vastes plaines fertiles. Il faudra du temps pour perfectionner ces pratiques agricoles, mais cela pourrait aider à nourrir chaque enfant affamé sous Surael."

 jadd_empire_vyzemby_assimilated:0 "Marins des Îles d'Été"
 jadd_empire_vyzemby_assimilated_desc:0 "Les Vyzemby de Fahvanosy ont une culture légendaire de navigation qui, jusqu'à présent, dépassait de loin la nôtre. Maintenant, la bannière du Divin-Héraut flotte fièrement sur chaque mât. Les Vyzemby serviront fièrement comme marins sous la Lumière de Surael."

 jadd_empire_mengi_assimilated:0 "Surael dans le Ciel"
 jadd_empire_mengi_assimilated_desc:0 "Jusqu'à présent, beaucoup de Mengi ont vénéré un dieu du ciel qui règne sur tout ce qui existe au-dessus de Halann. Une foi égarée, mais qui n'est pas totalement contradictoire avec la vérité divine. Bien qu'ils nécessitent beaucoup de guidance pour aligner cette vénération avec la doctrine de Surael, il reste clair que ces gens autrefois non-éclairés ont entrevu une petite fraction de la Lumière même avant notre arrivée. Le peuple de Surael se trouve maintenant enhardi dans ses croyances, absolument convaincu de Sa vérité !"

 jadd_empire_baashidi_assimilated:0 "Connaissance au Service de Surael"
 jadd_empire_baashidi_assimilated_desc:0 "Les chercheurs de vérité baashidi sont des érudits impressionnamment érudits. Alors que nous nous trouvons maintenant prêts à dissiper la fausse foi qui a longtemps obscurci leur vision, nous fidèles du Divin-Héraut sommes en position de bénéficier du plein potentiel des Baashidi. Du Jasiir Jadid au Jasiir Doog, un autre peuple noble est maintenant prêt à offrir sa force, et son intelligence, à la mission de Surael."

 jadd_empire_inyaswarosa_assimilated:0 "Les Peuples Frères du Tanizuland"
 jadd_empire_inyaswarosa_assimilated_desc:0 "Vraiment, les Tanizu sont un peuple fier. Bien que beaucoup les aient rejetés comme des bêtes primales à cause de leur capacité à changer de forme, nous en sommes venus à les voir comme bénis d'un don de Surael. Maintenant que les tribus Tanizu se tiennent unies dans la Lumière du Divin-Héraut, nous sommes capables de leur montrer un nouveau but servant dans les légions de Surael."

 jadd_empire_west_sarhaly_assimilated:0 "Loyauté Sarhali"
 jadd_empire_west_sarhaly_assimilated_desc:0 "Les terres du Sarhal occidental sont dominées par la Fangaula. Bien qu'il y ait une myriade d'identités régionales et de particularités qui ont marqué chaque nation ayant existé dans cette région, elles sont toutes connues pour un certain sens de l'élégance courtoise qui est couplé avec une culture de loyauté. Cela s'avérera avantageux pour la mission de Surael."

 jadd_empire_lizardfolk_assimilated:0 "Artisans à Sang Froid"
 jadd_empire_lizardfolk_assimilated_desc:0 "Les Hommes-Lézards sont connus à travers tout Sarhal pour leur industriosité. Maints hérauts errants de Surael ont pénétré dans les terres de ce peuple ancien et se sont trouvés humiliés par leurs œuvres fines et leur sens du design. Leurs œuvres sont maintenant à créer pour la gloire de Surael ; un grand but qui motive les artisans à aspirer à des œuvres toujours plus grandes."

 jadd_empire_wuhyun_assimilated:0 "Hommes d'Honneur"
 jadd_empire_wuhyun_assimilated_desc:0 "Après des générations de règne hobgobelin, les humains vivant sous le Commandement se sont graduellement intégrés à la société hobgobeline. À travers le système éducatif fourni par les Lois de Ninun ils ont adopté la langue hobgobeline, la discipline et le sens de l'honneur. Cela a résulté en la création de cultures entièrement nouvelles, combinant les coutumes humaines et hobgobelinnes, en quelque chose de nouveau et unique. Une vraie bénédiction de Surael ! Leurs prouesses martiales aideront grandement notre mission de répandre la Lumière de Surael."

 jadd_empire_reachman_assimilated:0 "Atteindre les Nordiques"
 jadd_empire_reachman_assimilated_desc:0 "Vivant dans l'ombre d'un conquérant ou d'un autre, les petits royaumes et les cités querelleuses de la Mer de la Tombe des Géants se sont chamaillés pour des profits dérisoires pendant des siècles. Ces derniers temps, ces âmes égarées se sont blotties ensemble comme « Hommes de l'Étendue » sous le Royaume d'Adshaw, mais de tels liens culturels anciens et effilochés ne les ont pas guidés vers la victoire. Avec notre arrivée, l'éclat du soleil illumine même le nord gelé. Maintenant ils vivent tous libres sous la gloire purificatrice de Surael. Leur ancienne cupidité alimente maintenant notre prospérité, et leurs marchands nous aident maintenant à répandre Sa Lumière toujours plus loin."

 jadd_empire_khudi_assimilated:0 "Harmonie avec la Terre"
 jadd_empire_khudi_assimilated_desc:0 "Les mythes les plus anciens des Khudi racontent leur arrivée sur les rivages de Gozengun, et depuis ils ont clairement montré qu'ils ont une aptitude pour s'adapter aux terres étrangères et à leurs dangers et avantages nouveaux et non découverts. Leur recours à la géomancie pour apaiser les esprits habitant leur nouvelle patrie a aiguisé leur œil pour les variations infimes présentes même dans le paysage le plus monotone. Cela en a fait des éclaireurs habiles capables de traverser des terrains impraticables pour la plupart, et leurs escarmoucheurs exceptionnels permettront à nos forces de danser avec aisance autour des armées pesantes des ennemis de la Jadd."

 jadd_empire_tyvorkan_assimilated:0 "Richesses du Col Septentrional"
 jadd_empire_tyvorkan_assimilated_desc:0 "Les peuples robustes qui survivent péniblement dans les terres gelées impitoyables du Col Septentrional connaissent l'importance de la communauté et de se sacrifier pour le bien commun. Après que la Marée Grise les a forcés hors de leurs foyers ancestraux dans la vaste nature sauvage du Col Septentrional, ce ne fut que leur ingéniosité et leur persévérance implacable qui ont empêché leur extinction. Ils connaissent chaque trésor caché du grand nord et toutes les routes commerciales traversant cette terre accidentée. Sous la lumière de la Jadd, ils ont trouvé une nouvelle vocation comme marchands prolifiques fournissant aux terres du sud la générosité du nord."

