### AIG Idea Groups ###

### Serpentspine Doctrine ###
 AIG_serpentspine_ideas_bonus:0 "Maîtrise de l'Échine-du-Serpent"
 AIG_hold_your_ground:0 "Tenir la Position"
 AIG_hold_your_ground_desc:0 "Les races de l'Échine-du-Serpent sont robustes, toujours prêtes à résister à une charge de cavalerie. Leurs tactiques sont admirables et leur usage de longues armes d'hast pour stopper les charges de cavalerie dans les tunnels étroits est efficace."
 AIG_hostile_ground:0 "Terrain Hostile"
 AIG_hostile_ground_desc:0 "Même sur votre propre territoire, l'Échine-du-Serpent est un endroit traître sans accès facile aux approvisionnements. Les ingénieux résidents de l'Échine-du-Serpent sont capables de fourrager des champignons et autres végétaux, évitant la flore vénéneuse en chemin."
 AIG_your_last_stand:0 "Votre Dernier Rempart"
 AIG_your_last_stand_desc:0 "L'histoire naine est pleine de récits de longs sièges, quelques centaines de Nains résistant contre la Marée Verte. Un exemple fut quand Gurukk Brise-Siège submergea la forteresse Khugdihr en 1424. Leur bravoure est un exemple pour nous tous."
 AIG_under_fire:0 "Sous le Feu"
 AIG_under_fire_desc:0 "Les fusils modernes furent utilisés dans l'Échine-du-Serpent bien plus tôt que dans d'autres régions du monde. Cela mena à son tour à plus d'innovations en matière d'armure ; tout en étant résistant à la magie, le Mithril est particulièrement solide contre les balles."
 AIG_make_your_bullets_count:0 "Chaque Balle Compte"
 AIG_make_your_bullets_count_desc:0 "Tandis que la bataille dans les montagnes faisait rage, il devint évident que les fusils seuls n'allaient pas suffire : une balle ne peut atteindre qu'une seule cible après tout. Des projectiles plus gros étaient nécessaires, ce qui mena à l'invention de l'artillerie."

### Artificery Ideas ###
 AIG_artificery_ideas:0 "Idées d'Artisanat Magique"
 AIG_artificery_ideas_bonus:0 "Maîtrise de l'Artisanat Magique"
 AIG_engineer_kits:0 "Équipements d'Ingénieur"
 AIG_engineer_kits_desc:0 "Le simple fantassin de nos jours est de plus en plus susceptible d'être trouvé avec des trousses à outils et de l'équipement de sape sur lui. La dépendance croissante de notre armée envers l'Artisanat Magique a naturellement fait ruisseler notre doctrine jusqu'à la vie du plus humble conscrit."
 AIG_expanded_doctrines:0 "Doctrines Élargies"
 AIG_expanded_doctrines_desc:0 "Une chose que l'établissement a oubliée en introduisant des intellectuels dans l'armée : tout le monde veut écrire son propre livre sur les doctrines de la guerre. Nous sommes complètement submergés de manuels affirmant que des bâtiments mobiles indestructibles et des canons volants sont l'avenir de la guerre."

### Magocratic Ideas ###
 AIG_magocratic_ideas:0 "Idées Magocratiques"
 AIG_magocratic_ideas_bonus:0 "Maîtrise de la Magocratie"
 AIG_years_of_study:0 "Années d'Étude"
 AIG_years_of_study_desc:0 "Les doués pour la magie de notre classe dirigeante fréquentent des collèges affiliés au Magisterium ; maîtriser le pouvoir peut prendre de nombreuses années et requiert une concentration intense."
 AIG_ascended_bloodline:0 "Lignée Transcendée"
 AIG_ascended_bloodline_desc:0 "Notre classe dirigeante a utilisé la magie pour prolonger légèrement sa durée de vie ; bien qu'ils ne soient pas immortels, cela leur donne du temps supplémentaire à consacrer à leurs études arcaniques.\n§YAugmente les chances que l'héritier soit un mage puissant.§\n"

### Marauder Ideas ###
 monstrous_ideas:0 "Idées Monstrueuses"
 monstrous_ideas_bonus:0 "Maîtrise de la Monstruosité"
 monstrous_ideas_ambition: "Ambition Monstrueuse"
 AIG_your_mom:0 "Techniques d'Intimidation"
 AIG_your_mom_desc:0 "Une partie de la perception de la force est de ne pas avoir peur de lancer quelques insultes aux nations puissantes."
 AIG_black_market:0 "Marché Noir"
 AIG_black_market_desc:0 "Malgré notre adoption d'une manière plus sauvage de gérer l'économie, nous ne nous faisons pas d'illusions : permettre à notre population de rentrer avec le butin de guerre ne causera-t-il pas des dommages à long terme ? Les objets de grande valeur sont saisis par l'État et vendus en secret."
 AIG_horde_of_the_seas:0 "Horde des Mers"
 AIG_horde_of_the_seas_desc:0 "Les nations côtières essaient toujours de faire passer des approvisionnements en douce pour tenir plus longtemps contre nous ; si nous avions notre propre marine, nous pourrions lancer des raids sur leur chaîne d'approvisionnement."

### Industrial Ideas ###
 AIG_industrial_ideas:0 "Idées Industrielles"
 AIG_industrial_ideas_bonus:0 "Maîtrise de l'Industrie"

### Infrastructure Ideas ###
 AIG_infrastructure_ideas:0 "Idées d'Infrastructure"
 AIG_infrastructure_ideas_bonus:0 "Maîtrise des Infrastructures"
 AIG_ideas_spread:0 "Diffusion des Idées"
 AIG_ideas_spread_desc:0 "Nos citoyens sont des vecteurs de connaissance, transportant livres et expériences entre les villes."
 AIG_sea_lanes:0 "Routes Maritimes"
 AIG_sea_lanes_desc:0 "Tous les chemins ne mènent pas à Castanor. Les marchandises peuvent voyager vers des nations lointaines par la mer."
 AIG_connected_hamlets:0 "Hameaux Connectés"
 AIG_connected_hamlets_desc:0 "Les petites villes sont désormais plus facilement gérées par notre administration. Plus jamais les petits établissements n'éviteront de payer leurs impôts simplement à cause de la difficulté de les atteindre."
 AIG_canal_network:0 "Réseau de Canaux"
 AIG_canal_network_desc:0 "Inspirés par les fleuves du Bulwar, les canaux intérieurs peuvent transporter les marchandises à l'intérieur des terres."
 AIG_golden_highway:0 "Routes Dorées"
 AIG_golden_highway_desc:0 "Les merveilleuses Routes Dorées construites par Jaher durant son règne sur l'Empire du Phénix étaient un prodige d'ingénierie, permettant aux marchandises de voyager entre les coins les plus reculés de son empire. Bien que les Routes Dorées soient tombées en désuétude, elles recèlent de nombreuses leçons que nous pouvons appliquer aujourd'hui."

### Racial Supremacy Ideas ###
 AIG_elven_supremacy_ideas_bonus:0 "Maîtrise de la Suprématie Elfique"
 AIG_police_state:0 "État Policier"
 AIG_police_state_desc:0 "C'est un combat constant de garder les minorités dans le rang ; des groupes d'intervention seront mis en place pour traiter spécifiquement de ces indésirables."

### Imperial Ideas ###
 AIG_imperial_ideas:0 "Idées Impériales"
 AIG_imperial_ideas_bonus:0 "Maîtrise de l'Empire"
 AIG_a_velvet_glove:0 "Un Gant de Velours"
 AIG_a_velvet_glove_desc:0 "Les nations voisines nous trouvent simplement charmants ; pouvez-vous imaginer quelqu'un nous accusant de fabriquer des revendications frivoles sur leurs terres ? Absurde."

### Legionary Ideas ###
 AIG_legionary_ideas_bonus:0 "Maîtrise de la Légion"
 AIG_phlanx_formation:0 "Formation en Phalange"
 AIG_phlanx_formation_desc:0 "Avant l'âge de la poudre noire, l'infanterie était au cœur de l'armée ; une tactique particulièrement efficace était la formation en phalange conçue pour arrêter les charges de cavalerie ou de grands monstres."
 AIG_infantry_en_masse:0 "Système Légionnaire"
 AIG_infantry_en_masse_desc:0 "Les soldats étaient recrutés par province en groupe pour servir ensemble, réduisant le besoin de s'inquiéter des dialectes. L'entraînement de formation était souvent conduit en silence pour que chaque soldat puisse réagir au mouvement des autres par la vue seule."
 AIG_always_on_campaign:0 "Toujours en Campagne"
 AIG_always_on_campaign_desc:0 "La vie dans les Légions originelles du Phénix était dure, voyageant d'un bout à l'autre de l'Empire pour réprimer des révoltes similaires. S'entraîner en marche, apprendre sur le tas."
 AIG_foreign_auxilleries:0 "Auxiliaires Étrangers"
 AIG_foreign_auxilleries_desc:0 "Bien que le cœur de nos armées soit composé d'unités légionnaires loyales, nous nous tournons vers d'autres groupes pour leurs talents spécifiques. Les harpies par exemple sont excellentes pour escalader les murs ennemis."
 AIG_centralising_our_base:0 "Base de Pouvoir Centralisée"
 AIG_centralising_our_base_desc:0 "Dans la région du Bulwar, il est courant d'avoir des vassaux ou tributaires connus sous le nom d'Akalats. C'est un modèle que nous pouvons utiliser à notre avantage."
 AIG_widespread_culture:0 "Culture Répandue"
 AIG_widespread_culture_desc:0 "Lorsque les soldats se retirent après avoir servi dans la légion, ils emportent notre éthique et notre culture avec eux dans leurs provinces d'origine."
 AIG_administering_the_fringes:0 "Administrer les Confins"
 AIG_administering_the_fringes_desc:0 "Les parties reculées de tout empire sont difficiles à contrôler ; une solution est de faire confiance aux compagnies commerciales qui peuvent administrer la région en échange d'un flux constant d'or."



