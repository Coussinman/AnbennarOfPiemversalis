 anb_ruler.0.t:0 "Dirigeant à longue vie"
 anb_ruler.0.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est membre d'une race à longue vie, et peut donc espérer une existence apparemment immortelle."
 anb_ruler.0.a:0 "Une bénédiction... ou une malédiction ?"

 anb_ruler.2.t:0 "La vieillesse de [Root.Monarch.GetTitle]"
 anb_ruler.2.dwarven:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est un nain et, malgré l'entêtement de son peuple, doit accepter la fragilité de la vie. Les nains vivent généralement jusqu'à 200 ans et bientôt il sera temps pour [Root.Monarch.GetHerHim] de retourner à la terre."
 anb_ruler.2.gnomish:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est un gnome et finalement toute réflexion, tout apprentissage et tout rire doivent prendre fin. [Root.Monarch.GetName] a une pensée : « Je suis en train de mourir. »"
 anb_ruler.2.elven:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est un elfe mais demeure très mortel. Bien qu'étant membre de la race à la plus longue vie de Halann, [Root.Monarch.GetName] ne s'est jamais senti aussi proche des griffes de la mort qu'en ce moment."
 anb_ruler.2.wood_elven:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est un Elfe Sylvestre et, après une vie passée à endurer les facéties des fées et à profiter de la compagnie de son salla, doit accepter que son temps touche à sa fin. Les Elfes Sylvestres vivent moins longtemps que les autres elfes, et les conséquences de ce fait deviennent maintenant apparentes."
 anb_ruler.2.half_elven:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est un demi-elfe et, bien que vivant plus longtemps qu'un humain, [Root.Monarch.GetSheHe] doit finalement mourir. [Root.Monarch.GetName] approche de la fin de [Root.Monarch.GetHerHis] vie."
 anb_ruler.2.devouring:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] a prolongé sa vie au-delà de ce qui est considéré comme naturel par de sombres rituels, mais malgré [Root.Monarch.GetHerHis] longévité accrue, [Root.Monarch.GetName] est maintenant entré dans sa dernière année."
 anb_ruler.2.a:0 "Tous sont égaux devant la mort."
 ruler_is_dwarven_tooltip:0 "§TEspérance de vie estimée : jusqu'à 200 ans§!"
 ruler_is_gnomish_tooltip:0 "§TEspérance de vie estimée : jusqu'à 250 ans§!"
 ruler_is_elven_tooltip:0 "§TEspérance de vie estimée : jusqu'à 400 ans§!"
 ruler_is_wood_elven_tooltip:0 "§TEspérance de vie estimée : jusqu'à 250 ans§!"
 ruler_is_half_elven_tooltip:0 "§TEspérance de vie estimée : jusqu'à 100 ans§!"
 ruler_is_dying_tooltip:0 "§R[Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] n'en a plus pour longtemps en ce monde.§!"

 anb_ruler.3.t:0 "[Root.Monarch.GetTitle] meurt de vieillesse"
 anb_ruler.3.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] a vécu une longue vie bien au-delà de celle de tout humain ordinaire, témoin du passage des âges, d'innombrables triomphes, et de l'accablant chagrin et des pertes qui s'infiltrent dans les fissures de l'esprit, l'érodant au-delà de toute mesure. Pourtant [Root.Monarch.GetName] n'a jamais faibli, [Root.GetFirstRulerExploit]. Alors que les rouages du temps tournent sans cesse, nous nous souviendrons [Root.GetSecondRulerExploit]. Bien que [Root.Monarch.GetHerHis] corps puisse retourner en poussière, [Root.Monarch.GetHerHis] mémoire et héritage perdureront à travers l'impact durable qu'[Root.Monarch.GetSheHe] a laissé sur [Root.GetName]."
 anb_ruler.3.a:0 "Repose en paix."
 anb_ruler.3.b:0 "[Root.Monarch.GetSheHeCap] est enfin mort !"
 anb_ruler.3.tt.1:0 "[Root.GetName] pleure la perte de [Root.Monarch.GetName], [Root.Monarch.GetTitle] véritablement magistral."
 anb_ruler.3.tt.2:0 "[Root.GetName] pleure la perte de [Root.Monarch.GetName], administrateur sans égal."
 anb_ruler.3.tt.3:0 "[Root.GetName] pleure la perte de [Root.Monarch.GetName], seul arbitre du champ de bataille."
 anb_ruler.3.tt.4:0 "[Root.GetName] pleure la perte de [Root.Monarch.GetName], le renard à la langue d'argent."
 anb_ruler.3.tt.5:0 "[Root.GetName] pleure la perte de [Root.Monarch.GetName], vestige d'un âge révolu."
 anb_ruler.3.tt.6:0 "[Root.GetName] pleure la perte de [Root.Monarch.GetName]."
 anb_ruler.3.tt.7:0 "[Root.GetName] célèbre la disparition de [Root.Monarch.GetName] [Root.Dynasty.GetName]."
 first_ruler_exploit_expansionist:0 "devenant un expansionniste obstiné, étendant sans relâche les frontières de la nation conformément à [Root.Monarch.GetHerHis] vision"
 first_ruler_exploit_stable_hand:0 "devenant une main stable pour guider la nation à travers épreuves et tribulations, agissant comme une force stabilisatrice et devenant synonyme de l'état de droit"
 first_ruler_exploit_dumbass:0 "apportant encore plus de ruine aux fondations déjà chancelantes de notre jadis grande nation"
 first_ruler_exploit_lived_long:0 "devenant la seule constante de notre nation au fil des siècles"
 second_ruler_exploit_iron_fist:0 "du poing de fer, planant au-dessus de nos têtes, même alors que son détenteur quitte cette vie"
 second_ruler_exploit_popular:0 "du grand charisme exercé par feu [Root.Monarch.GetTitle]. Nous ne pouvons qu'espérer que [Root.Monarch.GetHerHis] successeur hérite ne serait-ce qu'une fraction de [Root.Monarch.GetHerHis] vaste personnalité"
 second_ruler_exploit_reputable:0 "de la grande facilité avec laquelle feu [Root.Monarch.GetTitle] se faisait amis et alliés, maniant une réputation spectaculaire comme une lame"
 second_ruler_exploit_dumbass:0 "de la grande facilité avec laquelle feu [Root.Monarch.GetTitle] a gaspillé [Root.Monarch.GetHerHis] potentiel, dressant les masses contre [Root.Monarch.GetHerHim] même dans la mort"
 second_ruler_exploit_lived_long:0 "de la grande durée de [Root.Monarch.GetHerHis] règne, si rien d'autre"

 anb_ruler.6.t:0 "La décadence vient avec l'âge"
 anb_ruler.6.d:0 "Il est difficile de suivre le rythme des jeunes races du monde. [Root.Monarch.GetName] croit que tout était mieux dans le bon vieux temps."
 anb_ruler.6.a:0 "Suis-je déconnecté ? Non, ce sont les jeunes races qui ont tort !"
 anb_ruler.6.b:0 "Le monde va trop vite... Je dois méditer là-dessus."
 anb_ruler.6.c:0 "Se remémorer les jours de gloire."
 anb_ruler.6.e:0 "Je suis sûr que ces vieilles tactiques nous aideront !"
 anb_ruler.6.f:0 "Nous n'avions pas besoin de tout cet argent de mon temps."
 anb_ruler.6.g:0 "Tous ces conseillers ne connaissent rien au monde réel !"
 anb_ruler.6.h:0 "J'ai de bonnes idées pour une nouvelle forme..."
 anb_ruler.6.i:0 "Je suis sûr que cet investissement sera très lucratif."
 ruler_incoherent_orders:0 "Ordres incohérents"
 ruler_complecent_ruler:0 "Dirigeant complaisant"
 ruler_antagonized_advisor:0 "Conseillers irrités"
 ruler_stupid_administration_reform:0 "Réformes administratives"

 anb_ruler.7.t:0 "Enseignements d'un ancien"
 anb_ruler.7.d:0 "Il est très facile d'oublier que les jeunes races vivent leur vie à un rythme plus intense et plus rapide que le nôtre. [Root.Monarch.GetName] doit se tenir au courant des nouvelles évolutions si notre pays doit prospérer."
 anb_ruler.7.a:0 "Nous devons être ouverts au changement et aux nouvelles idées."
 anb_ruler.7.b:0 "Il y a tout un nouveau monde là-bas, en tant que race ancienne nous devons montrer la voie !"
 anb_ruler.7.c:0 "J'ai vu assez de guerres pour savoir où nous allons."

 anb_ruler.8.t:0 "[Root.Consort.GetTitle] meurt de vieillesse"
 anb_ruler.8.d:0 "[Root.Consort.GetTitle] [Root.Consort.GetName] a vécu une longue vie bien au-delà de celle de tout humain ordinaire, et maintenant a quitté ce monde."
 anb_ruler.8.a:0 "Repose en paix"

 anb_ruler.11.t:0 "Une nouvelle génération, un nouveau [Root.Monarch.GetTitle]"
 anb_ruler.11.d:0 "Avec le passage des années, une autre génération des races à courte vie s'est écoulée. Il est attendu que [Root.Monarch.GetTitle] [Root.Monarch.GetName] abdique afin que nous ne soyons pas dépassés par le temps."
 anb_ruler.11.a:0 "Mon temps est révolu."
 anb_ruler.11.b:0 "Je ne me retirerai pas."
 long_lived_theocracy_no_abdication:0 "Passé son temps"

 long_lived_theocracy_abdicate_title:0 "Abdiquer"
 long_lived_theocracy_abdicate_desc:0 "Le dirigeant ne s'est pas retiré comme le voulait la coutume, mais peut encore le faire à tout moment."

 anb_ruler.12.t:0 "Une visite de la Mort"
 anb_ruler.12.d:0 "La vie immortelle.\n\nUn tel état peut à peine être qualifié de vivant. C'est quelque chose de plus grand : ne faire qu'un avec les plans, immuable et inchangeant. Une présence éternelle, au potentiel aussi vaste que la mer d'étoiles au-dessus. Le monde s'use en votre présence, esclave de son maître. Comme le soleil dans le ciel, vous êtes toujours vigilant ; plus encore, car celui qui s'est élevé n'a nul besoin de se lever.\n\n« Ton heure est venue. »\n\nRire de mépris face à cette idée. Le temps est un concept sans substance, un vestige de conséquence depuis longtemps rejeté. Pourtant écoutez, votre œil sans âme a contemplé sa figure, sa forme aussi interminable que la vôtre. Des doigts grossièrement articulés serrant le zénith d'un tyran : un imposteur. Vous êtes la mort, pas le charlatan qui voudrait usurper votre titre, une simple faux, rien de moins. Dans son reflet, vous voyez votre visage. Non pas un [Root.Monarch.GetTitle], mais un vieux fou gériatrique s'affirmant comme détenteur du pouvoir sur ce monde, sur cet instant.\n\nLe pouvoir. Dans la vie, le pouvoir était votre quête. Au-delà de la vie, cette quête n'a jamais cessé, la complaisance rejetée avec une ténacité immortelle. Pouvoir sur l'immuable, l'inchangeant, les ennemis dans votre esprit, l'ennemi que vous trouvez flottant devant vous, vêtu d'une cape écarlate et orné d'un masque de rubis. L'œil de votre esprit frémit d'une émotion inconnue, que vous étiquetez prudemment comme de la peur.\n\nLa peur. Au-delà de la vie, il n'y a que le soi absolu, la peur sombrant dans le bourbier insondable du passé, la paranoïa s'affirmant avec une ressemblance appropriée, mais finalement une émotion différente : une avec élan, dessein. Un testament. La peur avait depuis longtemps perdu sa place dans votre esprit, supplantée par une paranoïa née de la résolution.\n\nLa résolution. Oui, la résolution de poursuivre la vie. La résolution de vaincre la mort. La résolution de devenir éternel. Sûrement l'éternité n'est pas aussi courte que cela, n'est-ce pas ?"
 anb_ruler.12.a:0 "La résolution surpasse tout."
 anb_ruler.12.b:0 "Je surpasse tout."
 fight_red_reaper_tt:0 "[Root.Monarch.GetName] tentera de combattre l'§Rassaillant inconnu.§!"
 explode_red_reaper_tt:0 "[Root.Monarch.GetName] s'avance calmement vers l'§Rassaillant inconnu.§!"
 beat_red_reaper_tt:0 "\nLes §RFaucheurs Rouges§! ne reviendront pas en [Root.GetName]."
 red_reaper_explode_option_tt:0 "--------------\nCette option est disponible grâce à... attendez, £icon_red_text_2£"

 anb_ruler.13.t:0 "Une danse avec la Mort"
 anb_ruler.13.d:0 "Précision d'un autre monde, motif incompréhensible, étendue insondable. La seule façon de vaincre un tel adversaire est de devenir encore plus insondable, de surpasser le naturel et de devenir infini. Un tel pouvoir et une telle résolution, nés de la paranoïa, ne faibliront pas face à la nature elle-même, quel que soit l'instrument avec lequel elle entend corroder, dégrader et éroder le sens de soi. La conscience doit devenir un monolithe de pure ténacité non adultérée, s'accrochant au monde qui s'efforce de délivrer une juste délivrance.\n\nLa faux du Faucheur approcha d'un large mouvement, promettant une fin rapide et douloureuse. Pourtant elle ne rencontra que le vide, votre forme flottant maintenant derrière votre adversaire. Un seul doigt est posé sur le Faucheur, et avec une brève incantation, la nature s'effondre en un tas de cendres osseuses, couronné d'une merveilleuse cape, désormais un trophée."
 anb_ruler.13.a:0 "« Invoquez toutes les légions de l'enfer pour me vaincre. Je ne faiblirai pas. »"

 anb_ruler.14.t:0 "Une danse avec la Mort"
 anb_ruler.14.d:0 "Précision d'un autre monde, motif incompréhensible, étendue insondable. La seule façon de vaincre un tel adversaire est de devenir encore plus insondable, de surpasser le naturel et de devenir infini. Un tel pouvoir et une telle résolution, nés de la paranoïa, ne faibliront pas face à la nature elle-même, quel que soit l'instrument avec lequel elle entend corroder, dégrader et éroder le sens de soi. La conscience doit devenir un monolithe de pure ténacité non adultérée, s'accrochant au monde qui s'efforce de délivrer une juste délivrance.\n\nLa faux du Faucheur approcha d'un large mouvement, promettant une fin rapide et douloureuse.\n\nEt ce fut une promesse tenue."
 anb_ruler.14.a:0 "« Le monde me rejette. Mais je reviendrai. »"

 anb_ruler.15.t:0 "Un nouveau Seigneur de la Mort"
 anb_ruler.15.d:0 "Précision d'un autre monde, motif incompréhensible, étendue insondable. La seule façon de vaincre un tel adversaire est de devenir encore plus insondable, de surpasser le naturel et de devenir infini. Un tel pouvoir et une telle résolution, nés de la paranoïa, ne faibliront pas face à la nature elle-même, quel que soit l'instrument avec lequel elle entend corroder, dégrader et éroder le sens de soi. La conscience doit devenir un monolithe de pure ténacité non adultérée, s'accrochant au monde qui s'efforce de délivrer une juste délivrance.\n\nMais la droiture est le manteau du trompeur, la vraie nature cachée dans le bourbier trouble de sa propre façade. Vous n'avez nul besoin de vous accrocher à de tels concepts. Vous voyez tout, vous savez tout, vous êtes tout. Conquérant du matériel, un avec l'immatériel, et élucidateur des profondeurs insondables de la compréhension, l'univers déroulé à vos pieds.\n\nVous ordonnez au Faucheur devant vous de s'agenouiller. Vos mots portent sens et intention, votre volonté faite son, résonnant à travers vos salles devant le Faucheur, incitant sa soumission. Pourtant contrairement à tous ceux avant lui, vos mots le laissent insensible. Vous essayez à nouveau, concentrant ardemment chaque once de pouvoir primordial que vous possédez en un seul mot : « agenouille-toi. »\n\nLe Faucheur Rouge ploie, non pas dans une pose de soumission, mais plutôt dans une pose d'agonie, comme forcé au sol par un million de mains invisibles, écrasant le sol sous lui à chaque seconde qui passe. Le craquement des os se fait entendre, puis le silence.\n\nUn tas d'os brisés et de tissu cramoisi déchiré gît devant vous. Et ainsi, votre journée continue."
 anb_ruler.15.a:0 "« Il n'est nul destin que je ne puisse conquérir, nulle facette de la réalité que je ne puisse vaincre. »"

