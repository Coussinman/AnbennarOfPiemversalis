l_french:

kozenad_brothel_new_ladies_of_the_opal_calling: "Nouvelles Dames de l'Appel d'Opale présentées à Verkal Kozenad"
kozenad_brothel_new_ladies_of_the_opal_calling_desc: "Les célèbres Dames de l'Appel d'Opale sont les femmes qui ont rendu Verkal Kozenad fameuse (ou infâme, selon les avis). Avec les dernières améliorations et extensions du quartier des plaisirs de Verkal Kozenad, la maîtresse des lieux a informé nos officiels locaux qu'elle compte célébrer les généreux investissements de l'État en organisant un grand projet destiné à raviver les esprits des habitants et de l'armée. La maîtresse n'en a pas dit davantage pour l'instant, mais il n'est guère difficile d'imaginer ce qu'elle prépare au vu des circonstances."

gor_vazumbrog_the_vaulthold_secrets: "Secrets de la Forteresse-Coffre mis au jour"
gor_vazumbrog_the_vaulthold_secrets_desc: "La Forteresse-Coffre abrite de nombreux secrets nains ancestraux perdus au fil du temps. Nous devrions étudier ces technologies anciennes et déterminer comment les utiliser au mieux contre nos ennemis."

verkal_skomdihr_warding_gate_extra_firepower: "Une arme pour surpasser les Bois-Profonds"
verkal_skomdihr_warding_gate_extra_firepower_desc: "Pour assurer notre domination sur les Bois-Profonds, nous devons nous équiper des outils et techniques les plus puissants de la guerre moderne."

amlharaz_assembly_hold_council: "Tenir une nouvelle assemblée à Amlharaz"
amlharaz_assembly_hold_council_desc: "Avec l'achèvement des améliorations de la nouvelle Salle d'Assemblée d'Amlharaz, nous organiserons une grande réunion avec tous les dignitaires importants de notre nation et des nations alliées (s'il en existe) pour discuter des affaires de l'État. Nous saisirons cette occasion pour impressionner nos invités par notre puissance et notre influence, depuis la magnificence de l'une des plus anciennes forteresses naines qui soient."

verkal_dromak_mage_academy_mages_summon_large_damestear_meteor: "Les mages de Dromak invoquent un imposant météore de Damestear"
verkal_dromak_mage_academy_mages_summon_large_damestear_meteor_desc: "Nos mages de Verkal Dromak sont parvenus à accomplir un rituel d'invocation complexe pour faire s'abattre un imposant météore de Damestear juste devant l'entrée de notre forteresse. C'est sans doute l'un des plus grands météores de Damestear que nous ayons jamais contemplés, et il fournira aux mages d'abondantes ressources pour de futurs sortilèges."

orlazam_food_silos_shrimp_fried_rice: "Un nain local invente le riz frit aux crevettes"
orlazam_food_silos_shrimp_fried_rice_desc: "Un nain local de notre forteresse a réussi à utiliser un peu de Damestear sur une crevette pêchée dans le lac Logr pour la faire frire du riz. Lorsque le nain a offert ce plat à un officiel local, celui-ci lui a demandé comment il l'avait préparé et fut frappé de stupeur en apprenant qu'une crevette avait frit son riz."

ramvault_mines_rise_of_the_rams: "L'essor des chevaucheurs de béliers"
ramvault_mines_rise_of_the_rams_desc: "Les grandes salles du Dwarovar connaîtront le martèlement de nos sabots. L'essor de notre glorieuse cavalerie de béliers est arrivé ! Que tous ceux qui entendront le son de leurs sabots tremblent devant nos armées !"

emerald_spire_emerald_deposit_beneath_the_spire: "Important gisement d'émeraudes sous la Flèche"
emerald_spire_emerald_deposit_beneath_the_spire_desc: "Un petit groupe de mineurs travaillant pour l'État a découvert un important gisement d'émeraudes sous la Flèche d'Émeraude. Si le chef des mineurs a avancé plusieurs théories quant à leur origine, une chose est certaine : nous pouvons en tirer parti."

sedadhum_discovery_of_mithril_small: "Faible quantité de mithril découverte en sous-sol"
sedadhum_discovery_of_mithril_small_desc: "Une grande crevasse a été mise au jour dans les profondeurs de l'Enclume du Géant par une petite équipe de mineurs basée à Krakdûmvror. Ils rapportent que la crevasse contient un gisement de mithril modeste mais néanmoins économiquement significatif. Ils indiquent également que les sondages de surface suggèrent un gisement plus vaste que prévu, mais des investissements supplémentaires sont nécessaires pour dégager la roche gelée."

sedadhum_discovery_of_mithril_medium: "Gisement de mithril plus profond découvert"
sedadhum_discovery_of_mithril_medium_desc: "Grâce à des investissements supplémentaires, l'équipe de mineurs de Krakdûmvror rapporte avoir dégagé une quantité considérable de la roche gelée recouvrant le gisement de mithril dans la profonde crevasse. Ils ont déjà commencé à extraire ce qu'ils peuvent des veines fraîchement exposées, et signalent qu'il reste probablement encore davantage de mithril sous l'épaisse couche de glace. Les mineurs semblent optimistes quant au potentiel d'extraction massive de mithril et demandent un dernier investissement de l'État pour mieux cartographier l'étendue du gisement."

sedadhum_discovery_of_mithril_large: "Le mithril de Sedadhûm"
sedadhum_discovery_of_mithril_large_desc: "Incroyable ! L'équipe de mineurs de Krakdûmvror a mis au jour les dernières réserves de mithril enfouies au plus profond de la crevasse glacée au fond de l'Enclume, et quel gisement ! Le chef de l'équipe minière avec laquelle nous avons collaboré a expliqué à l'un de nos officiels qu'ils estiment n'avoir extrait que 10 à 15 % du mithril total de cette veine avant que les investissements supplémentaires ne permettent d'en découvrir davantage."

haraz_orldhum_nobles_pleased_with_hold_improvements: "Les nobles satisfaits des améliorations de la forteresse"
haraz_orldhum_nobles_pleased_with_hold_improvements_desc: "Une petite délégation des nobles résidant à Haraz Orldhûm s'est présentée à notre cour aujourd'hui pour nous remercier des améliorations et modernisations que nous avons apportées à leur forteresse. Bien que la délégation n'ait guère dit plus, il est plus qu'évident que les nobles du royaume seront désormais plus enclins à accepter nos réformes et exigences, du moins pour un temps."

ovdal_az_an_display_of_state_power: "Grande démonstration de la puissance de l'État"
ovdal_az_an_display_of_state_power_desc: "Un grand bal masqué a été organisé dans la salle de réception d'Ovdal Az-An, réunissant d'importants dignitaires et ambassadeurs venus du monde connu. Le spectacle est véritablement impressionnant, avec des centaines de convives virevoltant au son des dernières compositions de musique raffinée et civilisée. En tant qu'hôtes d'une soirée si remarquable, notre État ne peut qu'en sortir grandi."

marrhold_tatake_tatake: "Tatake, Tatake"
marrhold_tatake_tatake_desc: "Notre général Eren Jeager ne cesse de fixer son reflet dans le miroir en répétant « Tatake, Tatake ». Nos officiels ne parviennent pas à comprendre ce qu'il cherche à faire, s'il cherche quoi que ce soit. Peut-être se prépare-t-il à un grand combat contre nos ennemis dans un avenir proche."

tuwad_dhumakon_gardens_prosperity: "Nouvelles techniques de jardinage pour les forteresses"
tuwad_dhumakon_gardens_prosperity_desc: "Les Jardins de Tuwad-Dhûmakon sont un spectacle magnifique, et les jardiniers et paysagistes nains professionnels qui les entretiennent souhaitent depuis longtemps diffuser leurs techniques aux autres forteresses que nous possédons dans l'Échine-du-Serpent. Après une longue période de planification et de financement pour ces expéditions horticoles, ils peuvent enfin partir pour la grande expédition de jardinage. Qui sait à quel point nos forteresses seront verdoyantes à l'avenir ?"

khugdihr_bank_generous_interest_rates: "La Banque d'Asra accorde des taux d'intérêt généreux"
khugdihr_bank_generous_interest_rates_desc: "En témoignage de gratitude pour notre aide dans la rénovation et l'amélioration de la Banque d'Asra à Khugdihr, les banquiers nous ont accordé des taux plus avantageux sur les prêts contractés auprès de la Banque d'Asra et de ses succursales affiliées pour une certaine période."

earthseed_missionaries: "Une campagne de conversion depuis Graine-de-Terre"
earthseed_missionaries_desc: "Des missionnaires de Graine-de-Terre, emplis d'un zèle nouveau après nos rénovations du lieu le plus sacré de l'Échine-du-Serpent, sont partis convertir les païens et hérétiques qui résident sur nos terres tout en rejetant encore Halanna comme créatrice toute-puissante de Halann. C'est dans le nom même !"

ovdal_kanzad_cannon_foundry_experimental_artillery: "Nouvelle artillerie expérimentale d'Ovdal Kanzad"
ovdal_kanzad_cannon_foundry_experimental_artillery_desc: "Les fonderies d'Ovdal Kanzad produisent désormais sans relâche de nouvelles formes améliorées d'artillerie, de mortiers, de canons et de tout ce qui peut faucher les troupes ennemies à distance. Ce nouveau lot d'artillerie expérimentale issu des fonderies est particulièrement prometteur, et l'ingénieur en chef responsable promet qu'il sera particulièrement dévastateur contre les murailles de forteresse."

arg_ordstun_great_clast_shafts_development: "Nouvelles techniques de forage d'Arg-Ôrdstun"
arg_ordstun_great_clast_shafts_development_desc: "Les mineurs et foreurs d'Arg-Ôrdstun ont mis au point de nouvelles techniques utilisables dans les autres forteresses que nous possédons, qui pourraient s'avérer très bénéfiques."

ovdal_lodhum_tunnel_of_love_colonizing_the_serpentspine: "Coloniser l'Échine-du-Serpent"
ovdal_lodhum_tunnel_of_love_colonizing_the_serpentspine_desc: "Tant qu'une partie de l'Échine-du-Serpent demeurera hors de notre contrôle, l'État devra s'étendre pour remédier à ce problème."

grozumdhir_green_gate_friendlier_relations: "Relations plus cordiales avec les royaumes environnants"
grozumdhir_green_gate_friendlier_relations_desc: "Dans le cadre des plans généraux de notre gouverneur local à Grozumdhir concernant la restauration de la Porte Verte, il s'est efforcé d'investir progressivement dans un corps diplomatique plus étoffé et plus compétent, capable de montrer au monde extérieur (et intérieur) à l'Échine-du-Serpent que nous sommes des gens amicaux qui ne souhaitent de mal à personne. Si nous sommes assurément des gens amicaux, nous entendons très certainement causer des dommages considérables à certains ennemis de l'État, mais les autres nations n'ont pas nécessairement besoin d'entendre cette partie."

kronium_throne_one_throne_to_rule_them_all: "Un Trône pour les gouverner tous !"
kronium_throne_one_throne_to_rule_them_all_desc: "Un Trône pour les gouverner tous, Un Trône pour les trouver, Un Trône pour les amener tous et dans les ténèbres les lier..."

seghdihr_home_of_the_seg_band_warriors_of_the_segbandal: "Guerriers du Segbandal"
seghdihr_home_of_the_seg_band_warriors_of_the_segbandal_desc: "Le Segbandal était jadis une puissante alliance de nations dirigée par Seghdihr. Parmi ses nations figuraient certains des guerriers mercenaires les plus redoutables de tout le Bulwar. Avec le retour de Seghdihr à sa gloire passée, nous pourrions nous adjoindre l'aide de tels guerriers..."

verkal_ozovar_phokhao_citadel_enhanced_diplomacy: "Diplomatie renforcée"
verkal_ozovar_phokhao_citadel_enhanced_diplomacy_desc: "De nouveaux investissements dans l'enseignement des protocoles les plus récents à nos ambassadeurs et diplomates garantiront que notre habileté diplomatique sera sans égale à Haless."

ovdal_tungr_port_hold_ship_durability: "Nouvelles techniques de construction navale naine d'Ovdal Tungr"
ovdal_tungr_port_hold_ship_durability_desc: "Les nains d'Ovdal Tungr nous suggèrent d'utiliser des fonds en cuivre sur nos navires afin d'accroître leur durabilité. Bien que cela puisse n'être qu'une ruse pour nous vendre davantage de cuivre de leur forteresse, les premiers essais suggèrent qu'ils tiennent peut-être quelque chose..."

fortress_of_verkal_vazkron_capital_terrain_bonus: "La grande défense de l'Échine-du-Serpent"
fortress_of_verkal_vazkron_capital_terrain_bonus_desc: "Les forteresses de l'Échine-du-Serpent étaient jadis quasi invincibles face aux attaques extérieures. Avec une planification judicieuse et un peu d'ingéniosité, nos forteresses peuvent redevenir des bastions contre le monde entier."