 refused_royal_letter_of_bohemia:0 "A refusé la Lettre Royale de Bohême"
 SHA_ideas:0 "Idées Shawnee"
 SHA_ideas_start:0 "Traditions Shawnee"
 SHA_ideas_bonus:0 "Ambition Shawnee"
 the_wandering_people:0 "Le Peuple Errant"
 the_wandering_people_desc:0 "Partout où nous sommes allés, la guerre nous a suivis. Pourtant nous poursuivons toujours notre route, vers d'autres terres, de la mer jusqu'au-delà du Grand Fleuve. Ainsi, quand la guerre reviendra nous chercher, nous devrons être prêts à nous déplacer."
 dark_and_bloody_ground:0 "Terre Sombre et Sanglante"
 dark_and_bloody_ground_desc:0 "Notre antique patrie a été le théâtre de guerre après guerre. Ceux qui ont cherché à la revendiquer et à la garder ont payé un prix cruel. Nous devons veiller à ce qu'il en soit toujours ainsi."
 the_bread_dance:0 "La Danse du Pain"
 the_bread_dance_desc:0 "En organisant des cérémonies pour célébrer les semailles et les récoltes, nous pouvons mieux réguler nos vies et mieux inculquer un sens de la tradition."
 shaawanwaki_identity:0 "Identité Shaawanwaki"
 shaawanwaki_identity_desc:0 "Bien que nous puissions être dispersés aux quatre vents, et que des voyages de plusieurs mois puissent séparer nos villages, nous ne devons jamais nous permettre d'oublier que nous sommes le peuple Shaawanwaki, les Shawnee."
 autonomous_clans:0 "Clans Autonomes"
 autonomous_clans_desc:0 "Vu la grande distance entre les clans de notre peuple, chacun doit apprendre à fonctionner de manière indépendante et à trouver les chefs dont il a besoin parmi ses membres, donnant ainsi à plus de Shawnee l'occasion de se distinguer."
 farreaching_relations:0 "Relations Étendues"
 farreaching_relations_desc:0 "Au cours de nos migrations, nous avons rencontré de nombreux peuples. Certains sont devenus des amis, d'autres des ennemis, mais si nous pouvions unir ces peuples, peut-être pourrions-nous ne pas abandonner notre patrie."
 private_war_parties:0 "Expéditions de Guerre Privées"
 private_war_parties_desc:0 "Nous devrions encourager les membres de la tribu qui ont perdu les leurs par les actions des tribus voisines à former des expéditions de guerre privées pour exercer leur vengeance. Ainsi, davantage des nôtres auraient l'occasion d'apprendre l'art de la guerre, augmentant le nombre de guerriers entraînés sur lesquels nous pouvons compter."
 POWER_COST_CORE:0 "Nous avons une province légitimée : $VAL$\n"
 CRE_ideas:0 "Idées Creek"
 CRE_ideas_start:0 "Traditions Creek"
 CRE_ideas_bonus:0 "Ambition Creek"
 creek_caste_system:0 "Système de Castes Creek"
 creek_caste_system_desc:0 "En maintenant un système de castes établi, nous pouvons nous assurer que notre société demeure stable."
 green_corn_celebration:0 "Célébration du Maïs Vert"
 green_corn_celebration_desc:0 "Les fêtes agricoles, telles que la Célébration du Maïs Vert, encourageront notre peuple à s'efforcer d'obtenir de meilleurs rendements dans leurs champs."
 four_mother_towns:0 "Les Quatre Villes-Mères"
 four_mother_towns_desc:0 "Nous ne devons jamais oublier les quatre villes dont notre peuple tire ses origines, et devons nous efforcer de maintenir leur glorieux héritage."
 micos_leadership:0 "Direction des Micos"
 micos_leadership_desc:0 "En laissant la direction des batailles aux chefs de village locaux, les Micos, qui connaissent le mieux leur propre peuple, nous renforçons grandement notre capacité à obtenir le soutien des villages locaux."
 muscogee_neutrality:0 "Neutralité Muscogee"
 muscogee_neutrality_desc:0 "Nous ne devrions pas prendre parti dans les guerres des peuples qui nous entourent, aussi puissants soient-ils, mais plutôt chercher à commercer avec tous."
 red_sticks:0 "Bâtons Rouges"
 red_sticks_desc:0 "Les armes rouges de nos guerriers les plus traditionnels nous rappellent nos traditions guerrières et notre force au combat. Nous ne devons pas les oublier !"
 coptic:0 "Copte"
 ibadi:0 "Ibadite"
 dharmic:0 "Dharmique"
 sikhism:0 "Sikh"
 coptic_rebels_demand:0 "Convertir $COUNTRYNAME$"
 coptic_rebels_demand_desc:0 "Les rebelles religieux combattent pour la religion $RELIGION$. Ils exigent que nous reconnaissions sa suprématie ou, à tout le moins, que nous cessions nos efforts pour les convertir et les laissions pratiquer leur culte en paix."
