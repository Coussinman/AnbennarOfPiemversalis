 construct_kiel_canal_title:0 "Construire le Canal de Kiel"
 construct_kiel_canal_desc:0 "Creuser un canal à travers la péninsule du Jutland pour relier la mer Baltique à la mer du Nord est une tâche véritablement titanesque qui, une fois achevée, réduira considérablement le temps de voyage de nos navires. Mais le projet est très coûteux et pourrait rencontrer des problèmes supplémentaires en cours de route…"
 construct_suez_canal_title:0 "Construire le Canal de Suez"
 construct_suez_canal_desc:0 "Creuser un canal pour séparer l'Afrique de la péninsule du Sinaï afin de relier la mer Méditerranée à la mer Rouge est une tâche véritablement titanesque qui, une fois achevée, réduira considérablement le temps de voyage de nos navires. Mais le projet est très coûteux et pourrait rencontrer des problèmes supplémentaires en cours de route…"
 construct_panama_canal_title:0 "Construire le Canal de Panama"
 construct_panama_canal_desc:0 "Creuser un canal à travers l'isthme de Panama pour relier l'océan Atlantique à l'océan Pacifique est une tâche véritablement titanesque qui, une fois achevée, réduira considérablement le temps de voyage de nos navires. Mais le projet est très coûteux et pourrait rencontrer des problèmes supplémentaires en cours de route…"
 cancel_kiel_canal_title:0 "Annuler le Canal de Kiel"
 cancel_kiel_canal_desc:0 "Notre projet de construction du canal de Kiel a été jugé trop coûteux et sera annulé."
 cancel_suez_canal_title:0 "Annuler le Canal de Suez"
 cancel_suez_canal_desc:0 "Notre projet de construction du canal de Suez a été jugé trop coûteux et sera annulé."
 cancel_panama_canal_title:0 "Annuler le Canal de Panama"
 cancel_panama_canal_desc:0 "Notre projet de construction du canal de Panama a été jugé trop coûteux et sera annulé."
 canal_events.EVTNAME1:0 "Mauvaise Planification"
 canal_events.EVTDESC1:0 "Il semble que les préparatifs de notre construction de canal en [Root.GetName] aient été insuffisants. Le projet a connu plusieurs revers récemment en raison d'une mauvaise planification. Constituer une commission pour réorganiser et replanifier l'ensemble du projet pourrait le remettre sur les rails."
 canal_events.EVTOPTA1:0 "Procédons ainsi"
 canal_events.EVTOPTB1:0 "C'est trop coûteux"
 canal_events.EVTNAME2:0 "Direction Défaillante"
 canal_events.EVTDESC2:0 "Nombre des difficultés concernant notre construction de canal en [Root.GetName] semblent liées à une direction défaillante sur place. Nous devrions envisager de remplacer les responsables."
 canal_events.EVTOPTA2:0 "Nommer de nouveaux dirigeants"
 canal_events.EVTOPTB2:0 "Ils devront faire avec"
 canal_events.EVTNAME3:0 "Nouvelle Direction ?"
 canal_events.EVTDESC3:0 "Au vu des nombreux revers et épreuves qui ont accablé notre projet de canal en [Root.GetName], il n'est guère surprenant d'apprendre que la direction locale s'est découragée et qu'une grande partie de la main-d'œuvre a sombré dans l'apathie. Peut-être devons-nous envoyer quelqu'un d'autre pour prendre les commandes et réorganiser l'opération ?"
 canal_events.EVTOPTA3:0 "Nommer de nouveaux dirigeants pour le projet"
 canal_events.EVTOPTB3:0 "Nous n'en avons pas les moyens"
 canal_events.EVTNAME4:0 "Commerce Local en Déclin"
 canal_events.EVTDESC4:0 "Nombre de ceux qui travaillent à la construction du canal en [Root.GetName] complètent leurs revenus en vendant des marchandises à la population locale. Mais dernièrement ce commerce a décliné, et sans lui, beaucoup d'ouvriers risquent de ne pas survivre."
 canal_events.EVTOPTA4:0 "Aidons-les à améliorer la situation"
 canal_events.EVTOPTB4:0 "Nous ne pouvons en être tenus responsables"
 canal_events.EVTNAME5:0 "Glissement de Terrain Désastreux"
 canal_events.EVTDESC5:0 "Notre projet de canal en [Root.GetName] semble maudit. Un glissement de terrain massif a enseveli certains de nos camps de travail, tuant de nombreuses personnes et obligeant à draguer à nouveau des portions du canal."
 canal_events.EVTOPTA5:0 "Leur envoyer davantage de ressources"
 canal_events.EVTOPTB5:0 "Nous ne pouvons rien y faire"
 canal_events.EVTNAME6:0 "Manque de Provisions"
 canal_events.EVTDESC6:0 "Des problèmes imprévus ont laissé notre chantier de canal en [Root.GetName] à court de provisions pour sa main-d'œuvre. Si des provisions supplémentaires ne leur parviennent pas rapidement, le projet pourrait subir de sérieux retards."
 canal_events.EVTOPTA6:0 "Veillons à ce qu'ils reçoivent ce dont ils ont besoin"
 canal_events.EVTOPTB6:0 "Nous ne pouvons rien y faire"
 canal_events.EVTNAME7:0 "Graves Inondations"
 canal_events.EVTDESC7:0 "De graves inondations ont causé d'importants dégâts en [Root.GetName] et ont ainsi retardé la construction du canal. Sans fonds supplémentaires, le projet risque d'être retardé."
 canal_events.EVTOPTA7:0 "Investir des fonds supplémentaires"
 canal_events.EVTOPTB7:0 "Nous ne pouvons nous le permettre"
 canal_events.EVTNAME8:0 "Ivresse Accrue"
 canal_events.EVTDESC8:0 "Notre idée de récompenser les ouvriers de notre projet de canal en [Root.GetName] par des rations d'alcool accrues semble avoir des effets indésirables. Une ivresse accrue était attendue, mais cela semble également avoir augmenté le nombre de morts parmi ceux déjà affaiblis par la dysenterie et la fièvre."
 canal_events.EVTOPTA8:0 "Réduire à nouveau les rations"
 canal_events.EVTOPTB8:0 "Ce qui est fait est fait"
 canal_events.EVTNAME9:0 "Rations d'Alcool"
 canal_events.EVTDESC9:0 "Les conditions misérables entourant notre projet de canal en [Root.GetName] ont laissé la main-d'œuvre déprimée et démotivée. Il faut faire quelque chose ou toute l'entreprise risque de s'enliser. Une suggestion a été d'augmenter les rations d'alcool."
 canal_events.EVTOPTA9:0 "Cela semble une bonne idée"
 canal_events.EVTOPTB9:0 "Cela semble être la mauvaise voie"
 canal_events.EVTNAME10:0 "Création d'une Compagnie du Canal"
 canal_events.EVTDESC10:0 "Un groupe fortuné d'investisseurs et de marchands intéressés par les perspectives économiques d'un canal à travers [Root.GetName] a formé une compagnie commerciale afin de soutenir la construction."
 canal_events.EVTOPTA10:0 "Excellent !"
 canal_events.EVTNAME11:0 "Scandale de la Compagnie du Canal"
 canal_events.EVTDESC11:0 "Il semble que la compagnie du canal privée fondée il y a quelques années ait fait faillite. Elle a apparemment rencontré de graves problèmes financiers dès le début, mais a dissimulé cette information au public et trompé les investisseurs pour qu'ils investissent de plus en plus d'argent dans le projet. Beaucoup ont été ruinés par ce que l'on appelle désormais communément le « scandale du canal » et des foules en colère se rassemblent à [Root.Owner.Capital.GetCapitalName], exigeant justice et réparations financières."
 canal_events.EVTOPTA11:0 "Ce n'est pas notre faute !"
 canal_events.EVTOPTB11:0 "Réglons la note…"
 canal_events.EVTNAME12:0 "Bonne Direction ?"
 canal_events.EVTDESC12:0 "De façon étonnante, il semble que notre projet de canal en [Root.GetName] ait progressé en avance sur le calendrier !"
 canal_events.EVTOPTA12:0 "Serait-ce vrai ?"
 canal_events.EVTNAME13:0 "Beau Temps"
 canal_events.EVTDESC13:0 "Notre projet de canal en [Root.GetName] a été béni par de bonnes conditions météorologiques dernièrement et les travaux progressent en avance sur le calendrier !"
 canal_events.EVTOPTA13:0 "Enfin de bonnes nouvelles"
 canal_events.EVTNAME20:0 "Épidémie"
 canal_events.EVTDESC20:0 "Une épidémie a frappé notre projet de canal en [Root.GetName] ! De nombreux ouvriers ont péri après avoir souffert de fièvre, de nausées et dans certains cas de saignements de la bouche et des yeux. Les rapports mentionnent que la peau de certaines victimes a viré au jaune…"
 canal_events.EVTOPTA20:0 "Envoyer des soldats pour les remplacer"
 canal_events.EVTOPTB20:0 "Prier et espérer le meilleur"
 canal_events.EVTNAME21:0 "Épidémie"
 canal_events.EVTDESC21:0 "Une épidémie a frappé notre projet de canal en [Root.GetName] ! Les rapports mentionnent des frissons soudains suivis de fièvre et de cas de vomissements, convulsions et lésions oculaires. Elle semble apparaître fréquemment près des marais et marécages et a été nommée fièvre des marais ou mala aria, de l'italien signifiant « mauvais air »."
 canal_events.EVTOPTA21:0 "Envoyer des soldats pour prendre leur place"
 canal_events.EVTOPTB21:0 "Ne pas risquer davantage de vies"
 canal_events.EVTNAME22:0 "Violents Orages"
 canal_events.EVTDESC22:0 "Même le temps semble être contre notre projet de canal en [Root.GetName]. De violents orages ont détruit une grande partie des camps et les coulées de boue qui ont suivi nous ont sérieusement fait reculer."
 canal_events.EVTOPTA22:0 "Leur envoyer davantage de ressources"
 canal_events.EVTOPTB22:0 "Nous ne pouvons rien y faire"
 canal_events.EVTNAME23:0 "Canal Traversant une Rivière"
 canal_events.EVTDESC23:0 "Un autre problème à surmonter pour notre projet de canal en [Root.GetName] : une rivière locale traverse le tracé du canal. En raison du débit puissant, surtout en saison des pluies, l'eau ne peut pas simplement être déversée dans le canal, car ce serait trop dangereux pour les navires de passage. Nous devons donc dévier toute la rivière…"
 canal_events.EVTOPTA23:0 "Engager davantage d'ouvriers"
 canal_events.EVTOPTB23:0 "Envoyer des soldats"
 canal_events.EVTNAME24:0 "Manque d'Eau Potable"
 canal_events.EVTDESC24:0 "Notre projet de canal en [Root.GetName] a progressé loin dans les terres. Malheureusement, cela a fait que les camps en première ligne n'ont plus accès à une source d'eau potable. Des ressources supplémentaires sont nécessaires pour assurer leur approvisionnement."
 canal_events.EVTOPTA24:0 "Nous nous en occuperons"
 canal_events.EVTOPTB24:0 "Les laisser résoudre le problème"
 trade_company_events.EVTNAME1:0 "Déplacement de Population"
 trade_company_events.EVTDESC1:0 "[Root.TradeCompany.GetName] souhaite chasser la population locale de [Root.GetName] afin de dégager le terrain pour des plantations et éventuellement y installer un grand nombre de colons [Root.Owner.Culture.GetName]."
 trade_company_events.EVTOPTA1:0 "Soutenir cette initiative"
 trade_company_events.EVTOPTB1:0 "Interdire ces actions"
 trade_company_events.EVTNAME2:0 "Échec du Plan de Déplacement"
 trade_company_events.EVTDESC2:0 "Le plan de réinstallation de colons [Root.Owner.Culture.GetName] en [Root.GetName] ne s'est pas déroulé comme prévu. Il semble que très peu soient disposés à y émigrer."
 trade_company_events.EVTOPTA2:0 "Abandonner le projet"
 trade_company_events.EVTOPTB2:0 "Offrir des incitations"
 trade_company_events.EVTNAME3:0 "Succès du Plan de Déplacement"
 trade_company_events.EVTDESC3:0 "Les plans de réinstallation de colons [Root.Owner.Culture.GetName] en [Root.GetName] ont attiré suffisamment de personnes."
 trade_company_events.EVTOPTA3:0 "Excellent"
 trade_company_events.EVTNAME4:0 "Nouveau Fort"
 trade_company_events.EVTDESC4:0 "Afin de mieux résister aux attaques des indigènes et des puissances étrangères hostiles, [Root.TradeCompany.GetName] a décidé de construire un nouveau fort en [Root.GetName]."
 trade_company_events.EVTOPTA4:0 "Bonne initiative !"
 trade_company_events.EVTOPTB4:0 "Mieux vaut ne pas irriter les autochtones."
 trade_company_events.EVTNAME5:0 "Conflit Frontalier"
 trade_company_events.EVTDESC5:0 "Le comportement agressif de [Root.TradeCompany.GetName] a provoqué un conflit avec [enemy_country.GetUsableName] au sujet de la province de [target_province.GetName]."
 trade_company_events.EVTOPTA5:0 "Les forcer à se retirer"
 trade_company_events.EVTOPTB5:0 "Approuver leur comportement"
 trade_company_events.EVTNAME6:0 "Massacre de [Root.GetName]"
 trade_company_events.EVTDESC6:2 "Une conspiration a été découverte en [Root.GetName] ! Des employés étrangers mécontents de [Root.TradeCompany.GetName], de concert avec des marchands de [enemy_country.GetUsableName], menés par nul autre qu'un gouverneur de [target_province.TradeCompany.GetName], avaient prévu de prendre d'assaut et de s'emparer du fort local et d'assassiner le gouverneur local dans une tentative de saper les affaires de la compagnie commerciale. Tous les conspirateurs ont été reconnus coupables, condamnés à mort et décapités sur ordre du gouverneur. Cet incident a naturellement suscité de vives réactions…"
 trade_company_events.EVTOPTA6:0 "Emprisonner le gouverneur"
 trade_company_events.EVTOPTB6:0 "Soutenir le gouverneur"
 trade_company_events.EVTNAME7:0 "Massacre de [From.GetName]"
 trade_company_events.EVTDESC7:0 "Le gouverneur de [Root.TradeCompany.GetName] en [Root.GetName] ainsi que plusieurs autres ont été assassinés ! Le gouverneur [From.Owner.Culture.GetName] de [From.TradeCompany.GetName] en [From.GetName] les a capturés, reconnus coupables et décapités sur la base d'accusations vagues concernant une prétendue conspiration."
 trade_company_events.EVTOPTA7:0 "Scandaleux !"
 trade_company_events.EVTNAME8:0 "Expansion de la Compagnie Commerciale"
 trade_company_events.EVTDESC8:0 "[Root.TradeCompany.GetName] est mécontente de la concurrence des autres compagnies commerciales de la région. Elle exige que nous revendiquions les provinces environnantes afin d'étendre la base opérationnelle de la compagnie."
 trade_company_events.EVTOPTA8:0 "Procéder à la revendication"
 trade_company_events.EVTTOOLTIP8:0 "[Root.TradeCompany.GetName] s'attendra à ce que la province soit conquise par [Root.Owner.GetName] dans les prochaines années."
 trade_company_events.EVTOPTB8:0 "Ignorer leur demande"
 trade_company_events.EVTNAME9:0 "Compagnie Commerciale Mécontente"
 trade_company_events.EVTDESC9:0 "[Root.TradeCompany.GetName] est extrêmement mécontente du manque de soutien de [Root.Owner.GetName]. Il y a plusieurs années, elle nous a demandé de l'aider à étendre ses frontières dans les provinces voisines. Nous en avons même revendiqué une. Mais jusqu'à présent, aucun progrès n'a été réalisé dans cette affaire."
 trade_company_events.EVTOPTA9:0 "Renouveler la promesse"
 trade_company_events.EVTOPTB9:0 "Les soutenir autrement"
 trade_company_events.EVTOPTC9:0 "Ignorer leurs préoccupations"
 trade_company_events.EVTNAME10:0 "Essor de la Compagnie Commerciale"
 trade_company_events.EVTDESC10:0 "Notre [Root.TradeCompany.GetName] a connu une période de croissance régulière et une partie de son succès commence maintenant à se répercuter sur [Root.Owner.GetName]."
 trade_company_events.EVTOPTA10:0 "Profiter de cette tendance"
 trade_company_events.EVTOPTB10:0 "Exiger des dividendes sur notre investissement"
 trade_company_events.EVTNAME11:0 "Difficultés de la Compagnie Commerciale"
 trade_company_events.EVTDESC11:0 "Notre [Root.TradeCompany.GetName] a rencontré de graves difficultés financières. Elle invoque le manque d'expansion ainsi que la concurrence accrue des compagnies commerciales d'autres nations. À long terme, nous devons l'aider à s'étendre et nous assurer qu'elle soit la compagnie la plus puissante de la région. Pour l'instant, ce dont elle a besoin, c'est d'une injection de fonds de roulement et de ressources militaires et navales."
 trade_company_events.EVTOPTA11:0 "C'est dans notre intérêt"
 trade_company_events.EVTOPTB11:0 "Ce n'est pas notre problème"
 trade_company_annoyed:0 "Compagnie Commerciale Contrariée"
 desc_trade_company_annoyed:0 "Les actions récentes de leur pays d'origine ont contrarié la Compagnie Commerciale."
 trade_company_upset:0 "Compagnie Commerciale Mécontente"
 desc_trade_company_upset:0 "Les actions récentes de leur pays d'origine ont mécontent la Compagnie Commerciale."
 trade_company_greatly_upset:0 "Compagnie Commerciale Très Mécontente"
 desc_trade_company_greatly_upset:0 "Les actions récentes de leur pays d'origine ont grandement mécontent la Compagnie Commerciale."
 beheaded_governor:0 "Gouverneur Décapité"
 trade_company_boom:0 "Essor de la Compagnie Commerciale"
 desc_trade_company_boom:0 "L'une de nos compagnies commerciales a connu une croissance régulière depuis longtemps et contribue à notre efficacité commerciale globale."
 trade_company_trouble:0 "Difficultés de la Compagnie Commerciale"
 desc_trade_company_trouble:0 "L'une de nos compagnies commerciales fait face à des difficultés financières et cela a affecté notre efficacité commerciale globale."
