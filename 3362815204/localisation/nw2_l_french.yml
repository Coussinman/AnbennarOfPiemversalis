 flavor_hun.10.t:0 "Le Trône de Hongrie"
 flavor_hun.10.d:0 "Le [From.Monarch.GetTitle] de [From.GetName] est soudainement décédé, de façon plutôt suspecte, laissant le trône vacant. La Diète [From.GetAdjective] a ignoré que leur défunt [From.Monarch.GetTitle] appartenait à la dynastie des Habsbourg et a élu son propre [From.Monarch.GetTitle], faisant fi de notre revendication légitime sur le trône."
 flavor_hun.10.a:0 "La guerre est la continuation de la politique par d'autres moyens…"
 colonial.EVTDESC20:0 "Ces soi-disant pèlerins venus de [Root.Owner.ColonialParent.GetName] suivent la foi [heretics_from_here.Religion.GetName], ce qui constitue une abomination pour l'Église [Root.Owner.ColonialParent.Religion.GetName] [Root.Owner.ColonialParent.GetAdjective]. Dans l'espoir de trouver une société plus tolérante dans le Nouveau Monde, ils se sont établis en [Root.GetName]."
 colonial.EVTDESC21:0 "Ces soi-disant pèlerins venus de [Root.Owner.ColonialParent.GetName] suivent la foi protestante, ce qui constitue une abomination pour l'Église [Root.Owner.ColonialParent.Religion.GetName] [Root.Owner.ColonialParent.GetAdjective]. Dans l'espoir de trouver une société plus tolérante dans le Nouveau Monde, ils se sont établis en [Root.GetName]."
 colonial.EVTDESC22:0 "Ces soi-disant pèlerins venus de [Root.Owner.ColonialParent.GetName] suivent la foi ravélienne, ce qui constitue une abomination pour l'Église [Root.Owner.ColonialParent.Religion.GetName] [Root.Owner.ColonialParent.GetAdjective]. Dans l'espoir de trouver une société plus tolérante dans le Nouveau Monde, ils se sont établis en [Root.GetName]."
 flavor_fra.EVTNAME100:0 "La Machine Infernale"
 flavor_fra.EVTDESC100:1 "Un attentat a été perpétré contre la vie de notre bien-aimé [Root.Monarch.GetTitle] ! Les conspirateurs royalistes avaient dissimulé leur bombe dans un tonneau sur une charrette garée rue Saint-Nicaise, où Napoléon devait passer pour se rendre à l'Opéra assister à la première de l'oratorio de Joseph Haydn « Die Schöpfung ». Surnommée la « Machine Infernale », la bombe était remplie de poudre à canon, de matériaux inflammables et de balles, et fut déclenchée au moyen d'une longue mèche. L'explosion tua plusieurs passants mais ne blessa point Napoléon."
 flavor_fra.EVTOPTA100:1 "Il l'a échappé belle."
 flavor_fra.EVTNAME101:0 "Aspirations Impériales"
 flavor_fra.EVTDESC101:2 "Non satisfait d'être simplement Premier Consul, Napoléon Bonaparte propose d'être couronné Empereur des Français. Il justifie cela en affirmant que la restauration de la succession héréditaire rendrait plus difficile le retour au pouvoir des anciens rois de France, après tout, plusieurs complots royalistes ont visé sa vie, mais il ne fait guère de doute que sa motivation première est d'assouvir ses propres ambitions de pouvoir suprême. La proposition a rencontré un large soutien parmi le peuple, qui aspire à la stabilité relative des années prérévolutionnaires ; cependant, les partisans acharnés de la Révolution expriment leur inquiétude face à cette tentative de concentrer encore davantage de pouvoir entre les mains de Napoléon."
 flavor_fra.EVTOPTA101:0 "La France sera un Empire !"
 flavor_fra.EVTOPTB101:0 "La Révolution doit continuer !"
 flavor_fra.EVTNAME110:0 "La République Révolutionnaire"
 flavor_fra.EVTDESC110:1 "Les guerres de [Root.GetName] sont un fardeau sans fin pour le peuple du pays. Tandis que les guerres de la République exigent un tribut toujours plus lourd des gens du commun sous forme d'impôts élevés, de conscription et de pertes croissantes, nombre de ceux qui espéraient que leur situation s'améliorerait grâce à la Révolution sont maintenant décédés, et ceux qui pensaient que le changement de gouvernement apporterait la paix au pays semblent avoir perdu foi en la république."
 flavor_fra.EVTOPTA110:0 "La république survivra !"
 flavor_fra.EVTDESC111:1 "Les guerres incessantes ont épuisé la population de [Root.GetName]. Ceux qui soutenaient la Révolution se plaignent qu'ils cherchaient à améliorer leur condition, non à se soumettre à un état de guerre permanent aux effets dévastateurs sur la population générale. Beaucoup perdent de plus en plus foi en la République."
 flavor_fra.EVTDESC112:0 "Le changement de gouvernement ne semble avoir fait qu'aggraver la mauvaise gestion financière. La République de [Root.GetName] ayant déclaré banqueroute, nombre de ses anciens partisans se demandent désormais si les choses n'étaient pas peut-être mieux avant la Révolution…"
 flavor_fra.EVTDESC113:1 "La dette nationale est un problème aux yeux du peuple. Les finances du pays ne semblent guère en meilleur état qu'avant le changement de gouvernement, et beaucoup craignent un défaut de paiement coûteux ou une hausse des impôts. La foi en la République s'effrite et nombreux sont ceux qui se tournent vers les anciennes voies monarchistes."
 flavor_fra.EVTDESC114:1 "La Révolution semble s'être enlisée. Avec plus d'un quart du pays en révolte, rares sont ceux qui croient encore que le gouvernement républicain détient les réponses aux problèmes de notre nation."
 flavor_fra.EVTDESC115:1 "Ceux qui pensaient que la Révolution et la République seraient les réponses à l'instabilité de [Root.GetName] sont de plus en plus désabusés. Les troubles sans cesse croissants qui affligent notre nation causent des souffrances généralisées parmi la paysannerie comme parmi les classes supérieures. Le soutien grandit pour qu'un chef fort prenne le contrôle et mette fin au chaos."
 flavor_fra.EVTDESC116:1 "La foi du Peuple en la République décline. Ils nous accusent de ne pas mettre assez d'efforts à résoudre les problèmes de l'ancien régime et affirment que leur situation était meilleure avant la Révolution. Déjà, des dissidents rallient des soutiens derrière ceux qui souhaitent inverser notre cours et placer un monarque sur le trône [Root.GetAdjective]."
 flavor_fra.EVTOPTA116:0 "Qui ose remettre en question la république !"
 flavor_fra.EVTOPTB116:1 "Augmenter notre programme d'aide publique."
 flavor_fra.EVTOPTC116:0 "Réduire les dépenses diplomatiques."
 flavor_fra.EVTOPTD116:0 "Réduire les dépenses militaires."
 religious_events.EVTNAME1:0 "Politique Tolérante"
 religious_events.EVTDESC1:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi copte."
 religious_events.EVTOPTA1:0 "Indésirables, en effet"
 religious_events.EVTDESC2:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi ravélienne."
 religious_events.EVTDESC3:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi protestante."
 religious_events.EVTDESC4:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi réformée."
 religious_events.EVTDESC5:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi orthodoxe."
 religious_events.EVTDESC6:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi ibadite."
 religious_events.EVTDESC7:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi sunnite."
 religious_events.EVTDESC8:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi chiite."
 religious_events.EVTDESC9:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi sikhe."
 religious_events.EVTDESC10:0 "Notre politique religieuse tolérante semble avoir conduit à des résultats indésirables. Il apparaît que certains de nos sujets ont décidé d'embrasser la foi hindoue."
 religious_events.15.t:0 "Résurgence du Néo-Confucianisme"
 religious_events.15.d:0 "Les idées philosophiques du penseur néo-confucéen Zhu Xi concernant la connaissance et l'action, avec un accent prononcé sur le raisonnement logique et la cohérence, ont été portées à notre attention une fois de plus par les œuvres de Wang Yangming. Ces idées puisent davantage dans le Taoïsme que la philosophie confucéenne orthodoxe. Nous devons décider quelle voie choisir pour notre État."
 religious_events.15.a:0 "Promouvoir le Néo-Confucianisme"
 religious_events.15.b:0 "Dénoncer le Néo-Confucianisme"
 religious_events.16.t:0 "Opposition à [Root.Monarch.GetName]"
 religious_events.16.d:1 "L'importante communauté musulmane de [Root.GetName] a soulevé des objections au couronnement de [Root.Monarch.GetName]. Comme l'ancienne aristocratie et le clergé musulmans demeurent très influents dans notre pays et occupent encore de nombreuses positions de pouvoir au sein de notre État, ce n'est pas un problème mineur. Il a été suggéré que la situation pourrait être désamorcée si [Root.Monarch.GetName] abdiquait en faveur d'un parent qui se convertirait ensuite à l'Islam. Cela permettrait au pouvoir de rester entre les mains de la famille [Root.Monarch.Dynasty.GetName] tout en apaisant les Oulémas et les aristocrates de premier plan. Si [Root.Monarch.GetName] devait continuer à gouverner notre pays, nous pourrions constater que ces éléments au sein de notre État tenteraient probablement d'introniser un candidat de leur choix aux attitudes plus favorables envers l'Islam."
 religious_events.16.a:0 "[Root.Monarch.GetName] abdique."
 religious_events.16.b:0 "Jamais plus nous ne nous courberons devant les infidèles !"
 religious_events.17.t:0 "Coup d'État en [From.GetName]"
 religious_events.17.d:1 "L'avènement d'une dynastie hindoue en [From.GetName] a suscité la colère de l'establishment musulman de la région. Un converti musulman de la maison [From.Monarch.Dynasty.GetName] a maintenant été intronisé pour éviter une révolte ouverte tout en maintenant la dynastie au pouvoir."
 religious_events.17.a:0 "C'est un outrage !"
 religious_events.17.b:0 "Excellent."
 religious_events.18.t:0 "[Root.GetName] se convertit au Christianisme"
 religious_events.18.d:0 "Les communautés chrétiennes de notre pays se réjouissent en apprenant notre intention de faire de leur religion la nôtre. Tous ces missionnaires envoyés à la cour de [Root.Capital.GetName] ont finalement porté leurs fruits."
 religious_events.18.a:0 "Le Saint-Père sera impressionné."
 religious_events.18.b:0 "Nous serons telle une nouvelle Rome."
 religious_events.18.c:0 "Nous devons envoyer un message au Patriarche copte."
 religious_events.18.dd:0 "Dieu l'a ordonné."
 religious_events.18.e:0 "Le temps est venu d'établir une Église d'État."
 religious_events.18.f:0 "Restons fidèles à la foi de nos ancêtres."
 religious_events.18.g:0 "Notre [Root.Monarch.GetTitle] dirigera la nouvelle Église."
 religious_events.18.h:0 "Nous suivrons les enseignements de Jan Hus."
 religious_events.19.t:0 "[Root.GetName] se convertit à l'Islam"
 religious_events.19.d:0 "Les communautés musulmanes de notre pays se réjouissent en apprenant notre intention de faire de leur religion la nôtre. Tous ces missionnaires envoyés à la cour de [Root.Capital.GetName] ont finalement porté leurs fruits."
 religious_events.19.a:0 "Nous suivrons désormais la Sunna."
 religious_events.19.b:0 "Il est temps d'honorer les Imams."
 religious_events.19.c:0 "Nous suivrons la tradition d'Ibn Ibad."
 religious_events.20.t:0 "[Root.GetName] se convertit au Bouddhisme"
 religious_events.20.d:0 "Les communautés orientales de notre pays se réjouissent en apprenant notre intention de faire de leur religion la nôtre. Tous ces moines et érudits envoyés à la cour de [Root.Capital.GetName] ont finalement porté leurs fruits."
 religious_events.20.a:0 "Nous suivrons désormais le Canon Pali."
 religious_events.20.b:0 "Nous devons inviter un Lama à [Root.Capital.GetCapitalName] dès que possible."
 religious_events.20.b2:0 "Nous devrions étudier les sutras du Mahayana."
 religious_events.20.c:0 "Par l'étude attentive des classiques, nous trouverons une voie meilleure."
 religious_events.20.dd:0 "Nous devons nous efforcer de comprendre la voie des Kami."
 religious_events.21.t:0 "Conversion de [Root.GetName]"
 religious_events.21.d:0 "Les communautés dharmiques de notre pays se réjouissent en apprenant notre intention de faire de leur religion la nôtre. Les Gourous envoyés à la cour de [Root.Capital.GetName] ont finalement été entendus !"
 religious_events.21.a:0 "Nous respecterons désormais le Sanatana Dharma."
 religious_events.21.b:0 "Nous suivrons les traces des grands Gourous."
 religious_events.22.t:0 "[Root.GetName] se convertit au Zoroastrisme"
 religious_events.22.d:0 "Les communautés zoroastriennes de notre pays se réjouissent en apprenant notre intention de faire de leur religion la nôtre. Les Feux de leur foi brûleront à jamais à [Root.Capital.GetName] !"
 religious_events.22.a:0 "Bonnes pensées, bonnes paroles et bonnes actions."
 religious_events.23.t:0 "[Root.GetName] se convertit au Judaïsme"
 religious_events.23.d:0 "Les communautés juives de notre pays se réjouissent en apprenant notre intention de faire de leur religion la nôtre."
 religious_events.23.a:0 "Écoute, Israël, l'Éternel est notre Dieu, l'Éternel est Un."
 indian_religious_tensions:0 "Tensions Religieuses"
 desc_indian_religious_tensions:0 "Nous avons rompu avec l'establishment musulman et restauré la religion de nos ancêtres. Jamais plus notre pays ne sera gouverné par des païens. Cependant, la minorité musulmane de notre pays demeurant assez importante, des tensions sont apparues."
 move_capital_to_rome:0 "Déplacer la capitale à Rome"
 move_capital_to_rome_title:0 "Déplacer la capitale à Rome"
 move_capital_to_rome_desc:0 "La province et la cité de Rome sont finalement revenues aux États pontificaux. Le temps est venu de restaurer le Saint-Siège."
