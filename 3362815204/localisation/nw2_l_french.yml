 ancient_pueblo_legacy:0 "Héritage Pueblo Ancestral"
 ancient_pueblo_legacy_desc:1 "Depuis des éons, notre peuple a vécu et bâti des établissements dans cette région. Nos Anciens possèdent une riche histoire à transmettre aux générations futures."
 adobe_architecture:0 "Architecture en Adobe"
 adobe_architecture_desc:0 "En utilisant la boue séchée comme matériau de construction, nous pouvons ériger des établissements solides et durables qui défient les assauts du temps."
 mesa_settlements:0 "Établissements sur les Mesas"
 mesa_settlements_desc:0 "En situant nos villages au sommet de hautes mesas, accessibles uniquement par des ascensions périlleuses, nous accroissons considérablement nos chances de survivre aux attaques ennemies."
 cotton_weaving:0 "Tissage du Coton"
 cotton_weaving_desc:0 "Contrairement à nos voisins, nous avons découvert les secrets du tissage des plantes qui poussent sur nos terres, les transformant en vêtements fins d'une grande valeur. En commerçant avec eux, nous apporterons prospérité à notre peuple."
 kachina_dolls:0 "Poupées Kachina"
 kachina_dolls_desc:0 "En façonnant des poupées à l'image des esprits qui gouvernent notre monde, nous transmettons à nos enfants la connaissance de ces entités et de leurs traditions, assurant ainsi la pérennité de notre société."
 clown_societies:0 "Sociétés de Clowns"
 clown_societies_desc:0 "Nous devons créer des sociétés pour préserver les arts et traditions des clowns, qui revêtent les masques Kachina pour incarner les esprits lors des cérémonies. Ainsi, notre peuple se souviendra de son identité, et les tensions au sein de la communauté seront apaisées."
 legend_of_cibola:0 "Légende de Cíbola"
 legend_of_cibola_desc:0 "Les visiteurs qui contemplent nos cités de loin confondent parfois les murs d'adobe étincelants au sommet des mesas avec des murailles d'or. Cela attirera indubitablement les regards du monde entier sur notre peuple."
 colonial_nation.EVTOPTB4:0 "Il doit être exécuté !"
 reduction_of_charles_xi:0 "Réduction"
 desc_reduction_of_charles_xi:0 "Réduction des terres pour renforcer les finances de l'État."
 reichshofrat:0 "Reichshofrat"
 desc_reichshofrat:0 "Le Reichshofrat a été institué par l'Empereur afin de rivaliser avec la Chambre Impériale que la Diète Impériale lui avait imposée."
 saint_lawrence_estuary_modifier:0 "Estuaire du Saint-Laurent"
 desc_saint_lawrence_estuary_modifier:0 "Le contrôle de l'important estuaire du fleuve Saint-Laurent renforce notre emprise sur le commerce de la région."
 hudson_estuary_modifier:0 "Estuaire de l'Hudson"
 desc_hudson_estuary_modifier:0 "Le contrôle de l'important estuaire du fleuve Hudson renforce notre emprise sur le commerce de la région."
 nelson_eastuary_modifier:0 "Estuaire du Nelson"
 desc_nelson_eastuary_modifier:0 "Le contrôle de l'important estuaire du fleuve Nelson renforce notre emprise sur le commerce de la région."
 desc_ship_building_problems:0 "Une hausse de la demande de navires provenant de diverses sources a accru le temps et le coût de la construction navale."
 tariffs_on_cocoa:0 "Tarifs sur le Cacao"
 desc_tariffs_on_cocoa:0 "Notre métropole a resserré son emprise sur notre économie en introduisant un tarif spécial sur le Cacao."
 aspiration_for_liberty:0 "Aspiration à la Liberté"
 desc_aspiration_for_liberty:0 "La quête de liberté de la population et le désir de voir les idéaux des Lumières mis en œuvre ont déclenché une révolution qui semble désormais inévitable."
