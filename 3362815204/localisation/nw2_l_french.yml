 FE_ONLY_HOST_SAVE_DESC:0 "Si cette option est activée en multijoueur, seuls l'hôte et les nations Observateurs pourront sauvegarder le jeu. Cela empêche les clients de faire une sauvegarde et d'observer les autres joueurs entre les sessions."
