 FE_EDIT_SAVE_DESC:0 "Active ou désactive la possibilité pour les joueurs de modifier manuellement le fichier de sauvegarde entre les sessions. Si cette option est désactivée, il ne sera pas non plus possible de lancer le jeu en solo."
 FE_LOCK_LEDGER:0 "Registre verrouillé"
 FE_LOCKED_LEDGER_DESC:0 "Active ou désactive la possibilité d'ouvrir le registre en jeu. Peut être utilisé en multijoueur pour empêcher les joueurs d'accéder à des informations inconnues."
 FE_DYNAMIC_PROVINCE_DESC:0 "Active ou désactive la possibilité pour les provinces de changer de nom lorsque le groupe culturel ou le propriétaire change. Si l'option est désactivée, les provinces ne peuvent changer de nom que si le joueur choisit de le faire manuellement."
 CANT_START_EDIT_LOCK:0 "Cette sauvegarde doit être jouée en multijoueur."
 LEDGER_LOCKED:0 "Le registre est verrouillé par les paramètres de jeu."
 BECOME_PROTECTORATE_DESC:0 "$WHO$ donnera à $BOSS$ 50 % de son pouvoir commercial, et $BOSS$ aidera $WHO$ dans son avancement technologique. De plus, $WHO$ ne peut avoir d'autre allié que $BOSS$."
 FE_RANDOMWORLD_DESC:0 "§YNouveau Monde Aléatoire§! offrira une véritable exploration. Commencer avec cette option rendra aléatoire toutes les terres d'Amérique du Nord et du Sud."
 FE_RANDOMWORLD_DESC2:0 "Jouer avec §YNouveau Monde Aléatoire§! activé ne fonctionnera que pour les toutes premières dates de départ."
 FE_OBSERVE_DESC:0 "Mode observateur"
 FE_OBSERVE_DESC2:0 "Le mode observateur vous permet de rejoindre une partie sans jouer un pays, vous pouvez à la place observer ce qui se passe dans tous les pays."
 FE_OBSERVE_SERVER:0 "§R- L'hôte ne peut pas être un observateur.§!"
 FE_USETI_DESC:0 "Active ou désactive la Terra Incognita dans le salon. Particulièrement utile si vous ne voulez pas gâcher la surprise de l'apparence du §YNouveau Monde Aléatoire§! avant de l'avoir découvert."
