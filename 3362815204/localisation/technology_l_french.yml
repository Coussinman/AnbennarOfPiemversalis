 adm_tech_cs_32_name:0 "Rotation quadriennale"
 adm_tech_cs_0_desc:0 "L'unité de gouvernance la plus basique est une famille élargie où tous les membres d'une communauté revendiquent une parenté les uns avec les autres, une tribu en d'autres termes."
 adm_tech_cs_1_desc:0 "Une structure familiale avec les membres les plus anciens au sommet peut fonctionner pour des groupes non apparentés. Dans sa forme la plus simple, le système est méritocratique, avec des tâches de direction assignées aux plus capables."
 adm_tech_cs_2_desc:0 "À mesure que l'organisation sociale s'améliore, les choses comme la production alimentaire également. L'augmentation de la production alimentaire permet à une société d'entretenir des personnes qui ne sont pas elles-mêmes productrices de nourriture. Cela conduit à la création d'une élite militaire, pour se défendre contre l'élite militaire ennemie. Le soutien de l'élite militaire est la base du système féodal."
 adm_tech_cs_3_desc:0 "Avec une élite militaire pour gouverner notre société, l'étape suivante du développement est d'avoir une classe lettrée d'administrateurs. Généralement, ceux-ci seront tirés des rangs du clergé."
 adm_tech_cs_4_desc:0 "Loger la machinerie du gouvernement est aussi important que la machinerie elle-même et on ne devrait jamais oublier l'importance de la religion en faisant cela."
 adm_tech_cs_5_desc:0 "Choisir la direction que va prendre un pays est peut-être le choix le plus difficile auquel un dirigeant sera jamais confronté. Les idées nationales sont les concepts qui façonneront notre pays pour les années à venir."
 adm_tech_cs_6_desc:0 "Avant la Révolution industrielle, le système d'atelier ou de travail à domicile était utilisé dans le Cannor des débuts de l'ère moderne pour organiser la production de tout, des textiles au fer forgé. Avec les matériaux fournis, les artisans pouvaient raffiner divers biens soit dans des ateliers soit dans leur propre maison, contournant les restrictions rigides des guildes."
 adm_tech_cs_7_desc:0 "La notion d'une oligarchie noble gouvernant la société existe, eh bien, depuis au moins les temps anciens, et reste populaire dans certaines parties du monde. Maintenant, cette idée gagne à nouveau en popularité parmi ceux qui comptent."
 adm_tech_cs_8_desc:0 "Le problème avec une noblesse locale héréditaire est qu'elle tend à valoriser ses intérêts locaux par-dessus ceux du reste de la nation. Nous devons étendre régulièrement la portée du gouvernement, ce qui commence par le domaine le plus important de l'administration : la justice."
 adm_tech_cs_9_desc:0 "Bien qu'elle existe depuis longtemps, la faux n'est toujours pas l'outil le plus populaire pour récolter les cultures. En encourageant les paysans à utiliser une faux au lieu d'une faucille, nous améliorerons l'efficacité de nos récoltes."
 adm_tech_cs_10_desc:0 "Le développement de la structure sociale n'est pas exclusif à l'aristocratie. Le clergé aussi doit améliorer sa gouvernance interne. Cela aidera au développement de la pensée moderne dans notre pays."
 adm_tech_cs_11_desc:0 "Les textiles sont fabriqués depuis des temps immémoriaux. L'invention du métier à bas en 1589 fut le premier pas vers la révolution industrielle et le début de la mécanisation. Cette invention conduirait à une augmentation de la production textile."
 adm_tech_cs_12_desc:0 "Avec le temps, il est devenu évident qu'une bureaucratie plus centralisée avec des organes administratifs dirigés par des fonctionnaires instruits employés directement par l'État était une nécessité pour les projets ambitieux des dirigeants des débuts de l'ère moderne."
 adm_tech_cs_13_desc:0 "Plus nous pouvons cultiver de terres, plus la population que nous pouvons nourrir dans cette zone est importante. Les améliorations progressives du drainage ont permis de mettre en culture les zones humides."
 adm_tech_cs_14_desc:0 "S'il est vrai que nous nous tenons sur les épaules de nos ancêtres, il est grand temps que nous commencions à apprendre sur le monde à partir de nos propres observations, bien documentées. En observant le monde qui nous entoure et en expérimentant pour prouver ou réfuter nos idées à son sujet, nous pouvons aller plus loin que ceux qui nous ont précédés."
 adm_tech_cs_15_desc:0 "Les armées toujours croissantes du XVIe siècle ont imposé des demandes de plus en plus grandes et difficiles aux systèmes administratifs des États. En créant une organisation permanente chargée de s'occuper de l'approvisionnement et de la planification des fournitures militaires et en gardant plus de troupes sur les registres même pendant l'hiver ou en temps de paix, nous serons à long terme capables de mettre en campagne de grandes armées à moindre coût et de soutenir ces armées plus efficacement en temps de guerre."
 adm_tech_cs_16_desc:0 "Le processus de production du fer forgé était en amélioration continue et au début du XVIIe siècle, le procédé d'affinage est venu supplanter l'ancien procédé Osmond. La production de fer pouvait maintenant être spécialisée, le travail du fer ne se faisant plus au même endroit où il était extrait, et plus de fer, plus fort et plus pur, conduirait avec le temps à des développements dans de nombreux autres secteurs."
 adm_tech_cs_17_desc:0 "Les grandes universités médiévales étaient certes grandes, mais elles n'étaient pas capables de produire suffisamment de diplômés pour doter notre administration croissante en personnel. Nous devons étendre nos universités ou nous serons distancés."
 adm_tech_cs_18_desc:0 "Les nombreuses et longues guerres de la première moitié du XVIIe siècle ont conduit à un système diplomatique international où l'intégrité territoriale des États est une pierre angulaire. Les États plutôt que les dirigeants individuels ou les groupements supranationaux sont les acteurs sur la scène internationale et aucun État n'a le droit d'intervenir dans les affaires intérieures d'un autre."
 adm_tech_cs_19_desc:0 "La promotion de la religion sera cruciale pour la stabilité du royaume. Il ne suffit pas d'être grand, les gens doivent pouvoir voir notre grandeur. Les anciens savaient comment afficher leur grandeur et nous ferons de même en construisant des monuments pour résister à l'épreuve du temps."
 adm_tech_cs_20_desc:0 "Il y a beaucoup de gens qui demandent à avoir un rôle dans le gouvernement, mais en réalité veulent surtout des récompenses sans effort. Une nouvelle idée intéressante d'absolutisme se répand, qui est un système où nous nous débarrassons de ces parasites et gouvernons seuls."
 adm_tech_cs_21_desc:0 "Les grandes étendues boisées sont bien sûr utiles comme source de bois de chauffage et comme lieu de chasse, mais si les arbres disparaissaient, ces terres pourraient être utilisées pour l'agriculture à la place."
 adm_tech_cs_22_desc:0 "Un nouveau concept philosophique appelé constitutionnalisme a été développé, où le gouvernement accepte des limites légales à son pouvoir. C'est une idée intrigante, mais je ne vois pas comment elle pourrait s'imposer."
 adm_tech_cs_23_desc:0 "Les nouvelles sciences nous ont donné un certain nombre de façons différentes de décrire et de mesurer le monde qui nous entoure. Envoyons ces hommes savants dans le monde en général et dans notre pays en particulier. Nous ne pouvons pas savoir quelles ressources sont à notre disposition tant que nous n'avons pas fouillé toutes nos terres à la recherche de minéraux, compté chaque dernier sujet et évalué chaque dernière entreprise."
 adm_tech_cs_24_desc:0 "Payer l'entretien de l'armée, de la marine et de l'administration elle-même représente la majorité des dépenses de tout État. Comme ce sont des dépenses qui peuvent rapidement s'emballer, cependant, les impôts et les péages peuvent être des moyens frustrants et inflexibles de lever l'argent nécessaire. Bien que la dette nationale soit loin d'être inconnue, nous devons trouver de meilleurs plans pour lever des fonds. Les obligations et d'autres plans similaires peuvent être utilisés tant au niveau national qu'à l'étranger pour financer des dépenses imprévues et nous permettront de faire un bien meilleur usage de l'argent que nous avons pour développer notre pays."
 adm_tech_cs_25_desc:0 "Avoir les moyens techniques d'améliorer les terres et donc la production est inutile sans incitations à le faire. En réformant les lois sur la tenure foncière, nous pouvons fournir de plus grandes incitations à adopter des méthodes de production améliorées."
 adm_tech_cs_26_desc:1 "Un traité anonyme sur la théorie politique a émergé, et malgré les efforts pour le supprimer, il se répand rapidement à travers le monde. Il traite de la nature des formes de gouvernement, qu'il s'agisse de monarchies, de despotismes ou de démocraties, et plaide pour une stricte séparation des pouvoirs exécutif, législatif et judiciaire. Cela protégerait le peuple et limiterait le pouvoir d'un monarque, ce qui est naturellement une perspective très populaire pour beaucoup de nos sujets. Malgré les implications malheureuses pour le pouvoir des monarques, ces idées pourraient bien bénéficier grandement à notre nation."
 adm_tech_cs_27_desc:0 "Pour tirer le meilleur parti des terres et des sujets que nous contrôlons, nous devons agrandir, réorganiser et professionnaliser notre bureaucratie. Une organisation robuste peut gérer chaque partie de notre État et éliminer le besoin de solutions ad hoc. Mettons nos universités au travail pour considérer les meilleures façons de gouverner efficacement et encourageons les fils de la noblesse à servir l'État avec une plume en main plutôt qu'une épée."
 adm_tech_cs_28_desc:0 "La charrue de base utilisée à Cannor n'a pas changé depuis l'époque castanorienne. Maintenant, grâce aux améliorations de conception, la même charrue peut être faite beaucoup plus légère, réduisant la charge de travail des animaux de trait, leur permettant de faire plus de travail."
 adm_tech_cs_29_desc:1 "À l'avant-garde de la pensée révolutionnaire actuelle se trouve la notion radicale d'égalité pour tous. Des philosophes de différentes parties du monde ont travaillé ensemble pour créer un document intitulé la « Déclaration des Droits de l'Homme et du Citoyen », proclamant que ces droits sont universels et devraient être appliqués par la loi. Il est probable que cela aura d'amples répercussions pour le développement et la diffusion des concepts de liberté et de démocratie, et nous ferions bien de ne pas rester à la traîne."
 adm_tech_cs_30_desc:0 "Heureusement pour nous, les soi-disant philosophes éclairés ne se sont pas limités à écrire des traités politiques subversifs, mais ils ont également proposé des idées dans les domaines de la science et de l'ingénierie. Celles-ci sont une aubaine pour notre économie et ont conduit à une augmentation de la production."
 adm_tech_cs_31_desc:0 "Ces révolutionnaires insensés pensent qu'ils peuvent simplement reléguer des centaines d'années de progrès aux oubliettes de l'histoire, tout cela au nom de concepts aussi extravagants que la liberté et l'égalité. Nous les vaincrons par le plan éprouvé de voler les morceaux de leurs idées que nous aimons."
 adm_tech_cs_32_desc:0 "Mon secrétaire d'État m'assure que le passage au trèfle comme culture fourragère et l'ajout du navet dans une rotation « quadriennale » augmenteront les rendements agricoles. Je suis enclin à promouvoir cette idée."
