 mil_tech_cs_0_desc:0 "Le soldat-citoyen, le guerrier tribal, essentiellement le non-professionnel. Le point de départ de toute armée."
 mil_tech_cs_1_desc:0 "La création d'une classe militaire professionnelle est la première étape vers la création d'une armée moderne."
 mil_tech_cs_2_desc:0 "Charger aveuglément vers l'ennemi n'est peut-être pas la meilleure tactique connue de l'homme, mais c'est l'une des plus simples à maîtriser. C'est aussi le tremplin vers des stratégies plus avancées."
 mil_tech_cs_3_desc:0 "À la fin du Moyen Âge, les armées terrestres étaient devenues plus professionnelles et bien organisées. De meilleurs systèmes sont en place pour soutenir le mélange de levées et de soldats professionnels qui dominent maintenant les champs de bataille, et la puissance de l'infanterie gagne lentement mais sûrement sur l'arme de cavalerie."
 mil_tech_cs_4_desc:0 "Tout au long du Moyen Âge, la domination de la cavalerie a été remise en question par des piquiers disciplinés. Dans de nombreuses batailles, la cavalerie a été vaincue par les piques. Une combinaison d'entraînement et de discipline améliorés, ainsi que l'ajout d'épéistes pour fournir un soutien au corps à corps, a porté cette formation au sommet de son efficacité."
 mil_tech_cs_5_desc:0 "Une pique est une arme remarquablement simple à fabriquer, mais pour tirer pleinement parti de l'utilisation des piques, il est nécessaire que toute la formation manie des armes de longueur et de lame similaires."
 mil_tech_cs_6_desc:0 "Bien que les canons à main aient été développés depuis longtemps, la faiblesse de ces armes réduisait leur utilité sur le champ de bataille. L'arquebuse légère et fiable a pu supplanter l'arc grâce à trois facteurs principaux : elle avait une meilleure pénétration des armures, il était plus facile de former des hommes à son utilisation, et elle ne dépendait pas de la force de l'utilisateur."
 mil_tech_cs_7_desc:0 "L'artillerie était documentée à Cannor depuis le treizième siècle, mais en raison de son manque de mobilité, elle avait une utilisation très limitée sur le champ de bataille. Le développement de l'avant-train dans les années 1470 a permis aux canons de devenir plus mobiles et donc utiles."
 mil_tech_cs_8_desc:0 "L'arquebuse était facile à utiliser comme arme, mais était aussi imprécise et lente à tirer, laissant son utilisateur vulnérable aux charges de cavalerie. La combinaison avec des piquiers permettait aux arquebusiers de tirer puis de se replier pour être protégés par les piquiers lorsque la cavalerie ou l'infanterie ennemie apparaissait."
 mil_tech_cs_9_desc:0 "La valeur de l'entraînement et de l'expérience a toujours été grande sur le champ de bataille. Avec l'avènement de la poudre à canon et les changements tactiques qui y sont associés, ainsi qu'avec d'autres armes d'infanterie, vint une grande demande d'unités versées dans ces nouvelles innovations. Comme les armées professionnelles étaient encore loin, ce besoin devait être comblé par des unités mercenaires. Une classe croissante d'officiers mercenaires professionnels a commencé à vivre de la fourniture de ces régiments aux États dans le besoin, au milieu de la transition militaire."
 mil_tech_cs_10_desc:0 "Les formations pique et tir se sont révélées être une menace majeure pour les chevaliers médiévaux. La réponse initiale fut des armures plus lourdes pour contrer la puissance des armes à poudre, mais cela ralentissait la cavalerie, réduisant sa puissance de choc. Les reîtres étaient généralement armés de deux pistolets et d'une épée, leur permettant soit de tirer soit de charger selon l'opposition à laquelle ils faisaient face."
 mil_tech_cs_11_desc:0 "L'arquebuse s'est avérée être une arme très efficace pour la pénétration des armures, le résultat fut que les armures commencèrent à devenir plus lourdes pour résister à son feu. Un mousquet plus grand pouvait délivrer un projectile plus lourd offrant une meilleure pénétration des armures."
 mil_tech_cs_12_desc:0 "Les formations en carré se sont développées naturellement à partir des formations pique et tir. En son cœur se trouvait un carré de piques traditionnel. À chacun des coins, il y avait un groupe d'arquebusiers. Il conservait la puissance de maintien du carré de piques traditionnel et l'améliorait avec la puissance de feu de l'arquebuse."
 mil_tech_cs_13_desc:0 "La nouvelle artillerie plus mobile avait un problème : elle ne pouvait pas être facilement élevée ou abaissée pour ajuster sa portée de tir. Les tourillons étaient des protubérances cylindriques qui servaient de supports pour le canon sur son affût, ce qui permettait de l'incliner et donc de mieux viser."
 mil_tech_cs_14_desc:0 "Il était difficile de tirer autour de murs courbes, ainsi une fois que les attaquants se rapprochaient suffisamment de la fortification, la capacité des autres parties des défenses à fournir un tir de flanc était annulée. Le développement des bastions en étoile permettait à chaque partie du mur d'être soutenue depuis d'autres parties."
 mil_tech_cs_15_desc:0 "La taille et la profondeur des formations en carré lui donnaient une puissance de maintien mais la rendaient lente et encombrante à manœuvrer sur le champ de bataille. Cela conduisait également à un grand pourcentage de troupes inactives pendant les batailles. Réduire le nombre total d'hommes dans la formation la rendait plus mobile et réduisait sa profondeur, de sorte qu'elle maintenait les mêmes valeurs de puissance de feu et de choc."
 mil_tech_cs_16_desc:0 "Avec l'importance croissante de l'artillerie sur le champ de bataille, le nombre d'armes à feu n'a cessé d'augmenter. Mais comme chaque canon était fabriqué séparément, il nécessitait également un grand effort pour le réapprovisionner. Une taille de calibre standardisée a allégé ce fardeau."
 mil_tech_cs_17_desc:0 "La plus grande faiblesse du mécanisme de tir à mèche était la nécessité de garder la mèche allumée pour tirer l'arme. Bien que la platine à rouet ait été développée, elle était trop coûteuse à produire pour entrer en usage de masse. Le développement de la platine à silex a créé une arme plus fiable."
 mil_tech_cs_18_desc:0 "La carabine était une forme plus courte du mousquet."
 mil_tech_cs_19_desc:0 "D'autres développements dans la formation d'infanterie ont amélioré leur puissance de feu. Elles ont été rétrécies et rendues rectangulaires pour augmenter le nombre de mousquets pouvant tirer à chaque salve. L'attachement de petites pièces d'artillerie a encore augmenté la puissance de feu de l'infanterie."
 mil_tech_cs_20_desc:0 "Avec le développement de nouveaux bastions, les ingénieurs ont commencé à améliorer l'art de les positionner pour canaliser les armées attaquantes vers des zones de mort spécialement préparées, où les défenseurs pouvaient infliger un maximum de pertes à leur ennemi."
 mil_tech_cs_21_desc:0 "Grâce aux baïonnettes, chaque mousquetaire pouvait également fonctionner comme un piquier. Cela a permis de retirer les piques de l'équipement d'infanterie et a fourni aux formations d'infanterie plus de puissance de feu."
 mil_tech_cs_22_desc:0 "Dans les années 1620, l'idée de combiner le projectile et la poudre en une seule unité, une cartouche, a permis un rechargement plus rapide et donc un tir plus rapide. Cela a considérablement amélioré la puissance de feu des armes."
 mil_tech_cs_23_desc:0 "Les cavaliers lourdement blindés étaient par nature lents à se former et vulnérables sur le champ de bataille. Une cavalerie plus légère a été ajoutée aux armées pour servir d'éclaireurs pendant la marche et protéger la cavalerie plus lourde avant sa charge sur le champ de bataille."
 mil_tech_cs_24_desc:0 "Un fossé extérieur est devenu une zone clé pour le siège. Si les troupes attaquantes prenaient le contrôle du glacis, alors les bastions seraient perdus. Le fossé est devenu la première ligne de défense d'un fort. L'accès à ce fossé, et s'assurer qu'il continuait à fournir une protection aux troupes en défense, est devenu une partie essentielle de la conception des fortifications."
 mil_tech_cs_25_desc:0 "Les améliorations en métallurgie ont permis aux canons de devenir plus légers et plus fiables. Cela leur a permis de devenir plus efficaces sur le champ de bataille."
 mil_tech_cs_26_desc:0 "Introduites d'abord comme troupes irrégulières de la frontière militaire, les compagnies d'infanterie légère étaient déployées en ordre dispersé et se sont révélées très efficaces pour harceler l'ennemi et mener des assauts sur les retranchements."
 mil_tech_cs_27_desc:0 "Bien qu'un mousquet puisse toujours être utilisé comme une massue, ce n'était pas une arme efficace au corps à corps. Une baïonnette était une lame qui se fixait à l'extrémité d'un mousquet, permettant à l'arme de fonctionner comme une lance. Les premières conceptions de baïonnettes bouchaient le canon, en faisant un choix exclusif, mais le développement de la baïonnette à douille, qui se fixait autour du canon, a transformé le mousquet en une arme de soutien utile."
 mil_tech_cs_28_desc:0 "Bien qu'une cuirasse (ou plastron) existe depuis de nombreuses années, récemment un nouveau style de cavalier a gagné en popularité, avec seulement un plastron et un dosseret, ce qui offrait un meilleur équilibre entre la protection des parties clés du corps et la mobilité."
 mil_tech_cs_29_desc:0 "Grâce à la construction de plusieurs couches de fortification, la prise des bastions extérieurs déplaçait simplement le siège vers la couche suivante, forçant les attaquants à préparer de nouveaux emplacements pour positionner les canons et augmentant la durée du siège."
 mil_tech_cs_30_desc:0 "L'introduction des troupes d'infanterie légère a conduit à un changement dans la guerre. Les tirailleurs étaient déployés en avant en ordre dispersé pour distraire et harceler l'ennemi avant l'attaque principale d'infanterie, qui était généralement livrée en ligne ou en colonne."
 mil_tech_cs_31_desc:0 "La faiblesse du mousquet était le fait qu'il était très imprécis au-delà de 50 yards. Le fusil, bien que jamais une arme d'infanterie standard, a ajouté une plus grande portée aux unités d'élite, ce qui donnait à l'armée une plus grande puissance de frappe globale."
 mil_tech_cs_32_desc:0 "Développé à l'origine pour les sièges, l'obusier tirait un projectile à angle élevé par-dessus les fortifications et dans la ville à l'intérieur. L'obusier de campagne, une variante plus légère et plus mobile, tirait un obus explosif au-dessus des troupes ennemies. Mélangé avec d'autres types d'artillerie, il ajoutait à l'efficacité des brigades d'artillerie."
