 dip_tech_cs_0_desc:0 "La construction navale peut signifier beaucoup de choses différentes, c'est incroyable jusqu'où on peut aller sur un radeau par exemple. Cependant, ce n'est pas la même chose que de créer une flotte pour appliquer les politiques d'un État. Cela nécessite une approche tout à fait différente de la construction des navires, ainsi que le développement de moyens pour contrôler la marine que vous avez construite."
 dip_tech_cs_1_desc:0 "Les modèles de commerce avaient été sérieusement perturbés au XIVe siècle, possiblement en raison de pestes et de pandémies. Maintenant le commerce commence lentement à se rétablir."
 dip_tech_cs_2_desc:0 "La barque a une longue histoire, commençant comme un bateau de rivière. Cependant, depuis lors, le terme en est venu progressivement à désigner un navire léger."
 dip_tech_cs_3_desc:0 "Le premier véritable navire de haute mer. Contrairement aux galères et aux cogues, les caraques peuvent servir de véritables navires de guerre de haute mer."
 dip_tech_cs_4_desc:0 "La création d'une infrastructure légale et régionale pour promouvoir le commerce encouragera non seulement le commerce mais nous permettra aussi de mieux le taxer."
 dip_tech_cs_5_desc:0 "Le commerce outre-mer est très risqué mais aussi très rentable. Le développement d'instruments financiers comme les lettres de crédit aidera à réduire le risque, augmentant nos profits."
 dip_tech_cs_8_desc:1 "Le transport terrestre de beaucoup de marchandises est simplement trop coûteux, les déplacer par bateau est plus efficace. Construire des chantiers navals fournira suffisamment de navires pour le faire."
 dip_tech_cs_7_desc:0 "Avec un coup de pouce supplémentaire au moral naval, nos marins conquerront les vagues et domineront les mers. Tandis que nos colons pourront braver les coins sombres du monde, fondant de nouveaux établissements plus loin de chez eux que jamais auparavant."
 dip_tech_cs_6_desc:1 "Au fil du temps, un secteur de construction navale en expansion et de plus en plus avancé a imposé de nouvelles exigences aux ports maritimes. Des quais bien entretenus et planifiés sont passés d'une commodité à une nécessité pour tout endroit souhaitant devenir un centre d'activité navale ou maritime."
 dip_tech_cs_9_desc:0 "Le développement de la voile latine a permis aux caraques de naviguer beaucoup plus près du vent que les navires antérieurs. La maniabilité améliorée les rendait supérieures aux autres navires."
 dip_tech_cs_10_desc:0 "Une flûte est un navire cargo spécialisé capable de transporter une grande charge avec un très petit équipage. Les flûtes étaient conçues pour être construites à bas prix et en grand nombre. Un navire utile si vous avez besoin de déplacer des choses à travers les océans."
 dip_tech_cs_11_desc:0 "Les grands débarcadères et jetées serviront d'entrepôts pour les marchandises du monde. Construisons-les et la prospérité suivra."
 dip_tech_cs_12_desc:0 "Tout au long du XVIe siècle, la capacité de navigation croissante des navires combinée à un nombre croissant de canons plus efficaces a conduit à une spécialisation croissante des types de navires. Un vaisseau de guerre est un navire entièrement dédié à la guerre navale avec un plus grand nombre de canons et de munitions qu'un navire qui devrait aussi agir comme navire marchand ne pourrait jamais contenir. À long terme, ce développement conduira à des marines permanentes croissantes et au développement de tactiques navales pour mieux correspondre aux nouvelles réalités de la guerre maritime."
 dip_tech_cs_13_desc:0 "Le monde est un grand endroit et pour développer notre commerce, il faut parfois prendre des risques assez importants. Heureusement, il y a des marchands dans notre pays qui seraient prêts à le faire, utilisant principalement leur propre capital. En sanctionnant de telles compagnies par une charte gouvernementale leur donnant des droits spéciaux pour exercer des pouvoirs gouvernementaux ainsi que des monopoles dans certaines zones, nous pouvons contrôler et encourager le développement commercial de tout, des contacts commerciaux étrangers à nos possessions coloniales outre-mer."
 dip_tech_cs_14_desc:0 "Les galères étaient légères et petites, et il était très difficile d'y monter des canons. La galéasse était un navire plus grand capable de porter une bordée de canons comme un vaisseau de guerre. Pour compenser ce poids supplémentaire, la galéasse était équipée d'une voile supplémentaire."
 dip_tech_cs_15_desc:0 "Le galion a été créé en abaissant le gaillard d'avant et en allongeant la coque. Ces changements de conception ont amélioré la vitesse et la stabilité du navire. Ce qui était d'une importance vitale pour que les galions servent de meilleures plates-formes d'artillerie."
 dip_tech_cs_16_desc:0 "Avec de plus en plus de pays envoyant leurs sujets ou citoyens à l'étranger pour diverses entreprises commerciales et avec tant de gens vivant si près les uns des autres pendant si longtemps, il est devenu absolument essentiel d'avoir au moins un concept de base de lois communes des mers. Une série de publications a posé les bases d'un droit international de la mer."
 dip_tech_cs_17_desc:0 "Le développement ultérieur des navires de transport a conduit à la construction de navires plus grands et plus rapides, qui essayaient toujours de maintenir la simplicité de construction de la flûte. Ces navires sont tombés sous le terme générique de navire marchand."
 dip_tech_cs_18_desc:0 "Pour mieux utiliser les divers développements de la guerre navale, de nouvelles tactiques sont nécessaires. L'évolution du canon de bordée a signifié que la façon la plus efficace pour les navires n'est plus de chercher à aborder l'autre partie mais plutôt de former une ligne de bataille pour pouvoir maximiser la quantité de puissance de feu dirigée contre l'ennemi."
 dip_tech_cs_19_desc:0 "Le galion de guerre, également connu sous le nom de galion profilé, a été construit en réduisant le nombre de ponts sur un galion. Cela sacrifiait des canons pour la maniabilité, ce qui s'est avéré bénéfique au combat."
 dip_tech_cs_20_desc:0 "Même au début du XVIIe siècle, les marines permanentes étaient assez petites et même les puissances navales de renom ne maintenaient généralement qu'une force navale pour répondre à leurs besoins immédiats. Avec le temps, cependant, nous nous dirigeons vers une marine professionnelle plus grande. À moins que nous ne voulions voir nos rivaux nous dépasser en matière navale, nous devons nous efforcer de créer une marine permanente plus grande avec une structure administrative pour la soutenir ainsi que de nous assurer qu'une carrière navale peut être une occupation permanente pour nos officiers."
 dip_tech_cs_21_desc:0 "Développée à l'origine par des pirates, cette galère ne portait pas autant de canons qu'une galéasse, mais elle était plus petite et bien plus maniable. Cette maniabilité améliorée lui permettait d'être bien plus efficace au combat."
 dip_tech_cs_22_desc:0 "En 1614, un médecin plutôt fou a écrit un traité suggérant que le scorbut était le résultat d'un problème alimentaire et pouvait être résolu en consommant du jus de citron ou de citron vert. Il s'avère qu'il y avait de la méthode dans sa folie et nous avons commencé à fournir ce nouveau régime à nos marins. Les autres pays nous appellent maintenant « les citrons »."
 dip_tech_cs_23_desc:0 "La conception originale de la frégate décrivait tout navire construit pour la vitesse et la maniabilité. Cependant, à mesure que le concept se développait, il est devenu sa propre classe unique de navire conçu pour soutenir les navires de ligne."
 dip_tech_cs_24_desc:0 "Une version spéciale de la frégate développée à l'origine pour opérer dans les mers intérieures. Elle conservait la bordée d'une frégate, mais avait un faible tirant d'eau et des rames donnant une plus grande maniabilité dans les eaux peu profondes, tout en sacrifiant la tenue de mer en plein océan."
 dip_tech_cs_25_desc:0 "L'ajout d'un troisième pont était un petit sacrifice en maniabilité pour un énorme gain au combat rapproché. Le pont supplémentaire donnait au navire la capacité de tirer sur les ponts des navires à deux ponts plus petits, tout en protégeant son propre pont."
 dip_tech_cs_26_desc:0 "Le Rahenman était le plus grand navire marchand construit, il pouvait généralement déplacer plus de 1 000 tonnes et mesurer plus de 53 mètres de long. Ces reines des océans étaient le moyen le plus efficace de déplacer hommes et marchandises autour du globe."
 dip_tech_cs_27_desc:0 "La vie en mer est pleine de dangers et donc les punitions doivent être sévères. Si elles n'ont pas un effet dissuasif suffisant, nous aurons rapidement des problèmes. Au fil du temps, un système de châtiments hautement publics a évolué, et maintenant le temps est venu de les formaliser. Cela améliorera grandement la discipline en mer."
 dip_tech_cs_28_desc:0 "À mesure que le commerce grandissait, le risque aussi. De nouvelles façons d'accumuler du capital et de gérer le risque devaient être développées. Dans les sociétés par actions, le risque de l'entreprise était partagé entre leurs nombreux actionnaires."
 dip_tech_cs_29_desc:0 "À l'origine, l'aspirant était un grade donné à un marin expérimenté qui travaillait au milieu du navire. Les hommes qui aspiraient à devenir officiers choisissaient souvent de servir dans ce rôle. Si nous formalisons cela et en faisons une condition préalable à l'acquisition du grade d'officier commissionné, nous nous assurerons que nos futurs chefs comprennent les navires qu'ils commandent."
 dip_tech_cs_30_desc:0 "Une réduction supplémentaire du risque est venue avec le développement de l'assurance. La capacité pour les gens de compenser le risque par le paiement d'une petite somme à un courtier d'assurance a permis une croissance supplémentaire du commerce."
 dip_tech_cs_31_desc:0 "Construire des navires légèrement plus rapides que ceux de nos adversaires, même si cette vitesse supplémentaire est si négligeable qu'elle n'a aucune signification militaire, peut tout de même remplir nos équipages de confiance et rendre notre ennemi méfiant de nous affronter dans un combat équitable."
 dip_tech_cs_32_desc:0 "Le déficit commercial permanent entre Cannor et Haless a causé une pénurie de lingots d'argent à Cannor et dans le monde entier. Passer de la monnaie d'argent à la monnaie d'or permettra à de nouvelles pièces d'entrer en circulation et de faire circuler le commerce en quantités toujours plus grandes."
