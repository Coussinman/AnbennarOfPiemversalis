l_french:
 flavor_beiklings.1.t:0 "L'Avarice de Chinhu"
 flavor_beiklings.1.d:0 "Rien n'aveugle l'âme autant que le scintillement de l'or.\n\nNiché dans les Collines-Démoniaques, le Shirgrii de Kabiurgarko, appelé « Chinhu » par les Beiklings locaux, trône sur une véritable montagne d'or. Les mines là-bas sont anciennes, vastes et apparemment sans fin, et il s'ensuit que le gouvernement local désire garder cette richesse pour lui-même. Ce soi-disant Conseil des Affamés a une réputation bien méritée de convoitise, et ils n'ont jamais été que des sujets réticents au mieux.\n\nIl n'est donc pas surprenant que le tribut ait progressivement ralenti jusqu'à n'être plus qu'un filet. Nous avons naturellement supposé que le Conseil thésaurise les richesses, mais ils prétendent à leur tour que les Harimari de Hubao ont collecté des impôts, c'est-à-dire pillé, de l'autre côté de la frontière. Le conseil postule que premièrement, ils n'ont ni le désir ni l'obligation de payer deux fois les impôts. Si le gouvernement souhaite recevoir ses impôts, il doit s'adresser à Hubao. Deuxièmement, comme ces raids semblent continuer sans fin en vue, la richesse de Chinhu est nécessaire pour repousser les Harimari cupides. En vérité, postulent-ils, c'est une parodie que nous ne les payions pas pour ce service au royaume.\n\nIl est vrai qu'il n'y a guère d'amour perdu entre les Beiklings de Chinhu et les Harimari de Hubao. Les raids transfrontaliers sont-ils probables ? Certainement. Prouvables ? Peut-être.\n\nTout cela ressemble-t-il à une excuse pour que Chinhu garde ses richesses pour lui-même ? Absolument."
 flavor_beiklings.1.a:0 "C'est peut-être une excuse, mais nous pouvons relâcher les rênes pour l'instant, pendant que nous traitons avec Hubao."
 flavor_beiklings.1.b:0 "Tout le monde paie des impôts, sauf les riches. Je veux dire, surtout les riches. Envoyez les percepteurs !"
 flavor_beiklings.1.c:0 "Une montagne d'or, dites-vous ? ...Peut-être vais-je déménager à Chinhu."

 flavor_beiklings.2.t:0 "Xiongxiap se Soulève !"
 flavor_beiklings.2.d:0 "Notre guerre contre les Jiangshi de Jinqiu a pris un tournant ironique.\n\nAlors que nos troupes traversaient la frontière vers les terres frontalières escarpées de la Citadelle de Jade Noir, nous avons rencontré des envoyés de la ligue de Xiongxiap. Il apparaît qu'ils sont disposés, anticipant probablement le changement imminent de suzerain, à soutenir notre invasion contre le Conseil Éternel, en échange de certaines concessions et garanties sous le nouveau régime.\n\nBien que leur manque de loyauté soit déplorable, leur duplicité nous profite. Ils sont faibles, et bien qu'ils soient prêts à nous offrir accès soit à leurs coffres soit à leurs guerriers, leur envoyé insiste qu'ils ne peuvent se séparer des deux. Mais, s'empresse de souligner l'envoyé, il pourrait y avoir une alternative.\n\nWeizhen Suzhen, l'actuel chef de la ligue, est l'esprit derrière ce complot, et il risque de tout perdre s'il échoue. Nous pourrions, plutôt que simplement accepter ses modestes offres de soutien, lui apporter notre soutien total à la place. Agir ainsi galvaniserait sans doute la ligue en une force bien plus redoutable, et rendrait Suzhen dépendant de nous à perpétuité."
 flavor_beiklings.2.a:0 "Des auxiliaires locaux familiers de ces terres profiteront grandement à nos forces."
 flavor_beiklings.2.b:0 "Est-ce là toute la richesse que Xiongxiap peut offrir ? Eh bien, nous la prendrons quand même."
 flavor_beiklings.2.c:0 "Je déteste les traîtres. Nous refusons d'être liés à eux."
 flavor_beiklings.2.e:0 "Envoyez message et troupes à Weizhen Suzhen. $COUNTRY$ se tient aux côtés de Xiongxiap !"

 flavor_beiklings.3.t:0 "Jianlin se Révolte Poliment !"
 flavor_beiklings.3.d:0 "Nos récents investissements dans la cité de Yangcheng ont provoqué un contrecoup surprenant. L'une de nos propres cités ressent apparemment du ressentiment envers nos investissements à l'étranger, affirmant que cet argent pourrait être mieux dépensé sur le territoire national. Nulle part ce sentiment n'est plus fort que dans la cité Beikling de Jianlin, où l'Ordre Stratocratique des Bouches Closes, leur gouvernement local, a rédigé une lettre immaculément polie, mais cinglante, condamnant ce qu'ils appellent « l'expansionnisme téméraire et la consolidation inutile de la Ligue de Yanszin, aux dépens du peuple du Yanshen en général, et de l'honorable citoyenneté de Jianlin en particulier ».\n\nEn conséquence, la cité de Jianlin demande maintenant des subventions à la ligue, pour encourager le développement local, et pour prouver, selon leurs propres termes, « que la direction de la Ligue reste engagée envers les droits et libertés des grandes cités sur lesquelles elle repose ». Agir ainsi serait sans doute coûteux, mais la direction de Jianlin est à notre connaissance honorable. Si nous les soutenons, ils développeront sans doute leur domaine, au bénéfice de la ligue dans son ensemble. Et bien sûr, si nous refusons, cela mènera sans doute à des frictions accrues au sein de la ligue.\n\nQue ferons-nous ?"
 flavor_beiklings.3.a:0 "La Ligue doit prospérer dans l'unité. Investissons dans Jianlin."
 flavor_beiklings.3.b:0 "Cette lettre est une insulte. Nous avons déjà donné à Jianlin plus qu'ils ne méritent."
 flavor_beiklings.3.c:0 "S'ils craignent tant d'être marginalisés, ils n'ont encore rien vu. Faites les bagages ! Nous transférons la cour à Jianlin !"

 flavor_beiklings.4.t:0 "Le Masque aux Mille Visages"
 flavor_beiklings.4.d:0 "La Puissance, le pouvoir de régner.\nLa Richesse, signe de prospérité.\nLe Contrôle, de soi-même et des autres.\nEt le Droit, de siéger sur le trône et de porter le masque.\n\nLes rues de [From.Capital.GetCapitalName] sont illuminées de lanternes. Des centaines de milliers de Beiklings ont revêtu des masques, et à travers toute la cité, festivités, défilés et prières se tiennent, alors que le peuple célèbre la renaissance du Grand Luzhong.\n\nMais à l'intérieur du palais, la cour est silencieuse. De lourdes tentures couvrent les fenêtres, et seules les lanternes violettes de la garde royale empêchent la salle d'être enveloppée d'obscurité totale. Chaque envoyé, chaque magistrat, et chaque noble repose sur les genoux, la tête inclinée vers le trône, où $MONARCH$ attend dans la pénombre. Un par un, les masques sont apportés, portés sur des coussins de soie noire de Jinqiu. Lorsque le premier porteur de masque atteint le trône, $MONARCH$ saisit le masque avec révérence, tandis que le porteur se prosterne à ses pieds. Le deuxième porteur fait de même, alors que $MONARCH$ joint un masque à l'autre. Il n'y a aucun son, aucun clic, aucun ajustement requis. Deux deviennent simplement un, et le silence emplissant la salle s'intensifie. Un troisième rejoint ses semblables, et la cour entend le sang couler dans ses veines, le silence si absolu que leurs battements de cœur deviennent forts comme des tambours. Alors que toujours plus lentement, leurs cœurs commencent à battre à l'unisson.\n\nLorsque le quatrième et dernier masque est joint, la cour respire comme un seul être, un bruit semblable à une tempête dans le silence assourdissant. Pendant un instant, il y a un silence absolu. Les cœurs s'arrêtent. Les souffles se suspendent. La cour semble figée dans le temps. $MONARCH$ tient le Masque aux Mille Visages devant lui. Il y a un moment de clarté. Dans le silence, il peut entendre le masque parler, des mots si nombreux qu'ils fusionnent en un bourdonnement incessant. Des mots qui deviendront les siens."
 flavor_beiklings.4.a:0 "Revêtir le Masque, que la terreur recommence"




