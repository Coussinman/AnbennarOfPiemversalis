 flavor_tus.EVTNAME22:0 "Le Grand Recteur [medici_pope_home.GetAdjective]"
 flavor_tus.EVTDESC22:0 "Les machinations de [medici_pope_home.GetName] ont abouti à ce que l'un de leurs propres hommes devienne Grand Recteur. Si [medici_pope_home.GetName] en est sûrement satisfait, certains ont dénoncé l'ascension de [Root.Monarch.GetName] comme corrompue et signe d'une corruption encore plus profonde au sein de l'Église. Notre nouveau Grand Recteur, pour sa part, a juré de régner avec... distinction."
 flavor_tus.EVTOPTA22:0 "Habemus Papam !"
 flavor_tus.EVTNAME23:0 "Nous avons un Grand Recteur !"
 flavor_tus.EVTDESC23:0 "Après une longue et patiente attente, nos stratagèmes ont porté leurs fruits, et désormais un candidat que nous avons longuement préparé pour ce rôle a accédé à la Papauté en tant que [Z97.Monarch.GetTitle] [Z97.Monarch.GetName]. Nous sommes assurés de jouir d'une relation étroite et profitable avec l'Église aussi longtemps qu'il siégera sur le trône pontifical."
 flavor_tus.EVTOPTA23:0 "Profitons de la Papauté !"
 flavor_tus.EVTNAME24:0 "Mort du Grand Recteur [medici_pope_home.GetAdjective]"
 flavor_tus.EVTDESC24:0 "Le défunt Grand Recteur était une figure controversée, et avec son trépas s'achève un chapitre haut en couleur de l'histoire de la Papauté. Les relations avec [medici_pope_home.GetName] sont revenues à leur état antérieur, et tout est redevenu comme avant. Plus ou moins."
 flavor_tus.EVTOPTA24:0 "Requiescat in pace."
 flavor_tus.EVTNAME25:1 "Notre Grand Recteur est Mort"
 flavor_tus.EVTDESC25:0 "Notre relation privilégiée avec la Papauté a pris fin avec la vie de notre Grand Recteur. Cette connexion étroite avec [Z97.Capital.GetCapitalName], quelle qu'ait été sa durée, fut certainement haute en couleur et, espérons-le, fructueuse."
 flavor_tus.EVTOPTA25:0 "Requiescat in pace, Papa."
 emp_lan_next_pope_medici_tt:0 "Le prochain Grand Recteur élu aura une relation privilégiée avec notre pays."
 opinion_our_pope_on_throne:0 "Notre Grand Recteur est sur le Trône"
 opinion_pope_tuscan_homeland:0 "Patrie du Grand Recteur"

 WORLD_CRUSADE_WAR_NAME:0 "$ORDER$$FIRST$ Grande Guerre Sainte contre $SECOND$"
 cb_world_crusade:0 "Grande Guerre Sainte"
 cb_world_crusade_desc:0 "Ce monde est blasphématoire et corrompu ; nous devons chercher à purifier ce monde du vice et du péché !"
 flavor_efr.EVTNAME1:0 "La Revendication de [Root.Monarch.GetName] sur la Frise Orientale"
 flavor_efr.EVTDESC1:0 "Depuis 1381, l'indépendance de la Frise Orientale est au mieux discutable. Ocko II, le dernier comte officiel de Frise Orientale, a prêté son titre au comte Guillaume V de Hollande. Lorsque le traître Ocko II fut chassé du pouvoir de force par notre milice paysanne à la Bataille des Champs Sauvages, le statut de [Root.Monarch.GetName] en tant que comte de Frise Orientale ne fut pas reconnu par l'Empire.\n\n[dutch_east_frisia_claimant.Monarch.GetName], [dutch_east_frisia_claimant.Monarch.GetTitle] de [dutch_east_frisia_claimant.GetName], insiste sur le fait que [Root.Monarch.GetName] n'est guère plus qu'un paysan menant une révolte contre [Root.Monarch.GetHerHis] suzerain et n'a aucun droit à revendiquer la souveraineté sur la Frise Orientale. Solliciter l'approbation de l'Empereur pourrait aider à renforcer notre revendication et tenir [dutch_east_frisia_claimant.GetName] à distance."
 flavor_efr.EVTOPTA1:0 "Présentez notre offre à l'Empereur."
 flavor_efr.EVTOPTB1:0 "Je ne m'incline devant aucun Empereur."
 flavor_efr.EVTNAME2:0 "La Frise Orientale Propose de Rejoindre l'Empire"
 flavor_efr.EVTDESC2:0 "Un envoyé du chef des paysans de Frise Orientale est arrivé, demandant au [Root.Monarch.GetTitle] [Root.Monarch.GetName] de soutenir la revendication de [EFR.Monarch.GetName] sur le Comté de Frise Orientale. En échange de notre soutien, [Root.Monarch.GetSheHe] a offert de s'agenouiller devant l'Empereur en tant que Prince de l'Empire d'Anbennar.\n\nOfficiellement, le comté de Frise Orientale est détenu par [dutch_east_frisia_claimant.Monarch.GetName] de Hollande. L'Empire d'Anbennar n'a pris aucune position officielle sur la question, et un seul mot de l'Empereur pourrait mettre fin à ce conflit."
 flavor_efr.EVTOPTA2:0 "Bienvenue dans l'Empire."
 flavor_efr.EVTOPTB2:0 "Soutenir la revendication [dutch_east_frisia_claimant.GetAdjective] sur la Frise Orientale."
 flavor_efr.EVTNAME3:0 "La Frise Orientale et l'Empire"
 flavor_efr.EVTDESC3.1:0 "Avec l'approbation de [From.Monarch.GetName], [Root.Monarch.GetName] n'est plus un chef paysan sans nom. [Root.Monarch.GetSheHeCap] est le Comte Impérial [Root.Monarch.GetName] de Frise Orientale. Avec l'approbation et la reconnaissance de l'Empereur, les revendications [dutch_east_frisia_claimant.GetAdjective] sur la Frise Orientale se sont affaiblies au-delà de toute reconnaissance."
 flavor_efr.EVTDESC3.2:0 "L'Empereur a décidé de soutenir [dutch_east_frisia_claimant.GetName] et leur revendication et de refuser notre entrée dans l'Empire d'Anbennar. Bien que nous n'ayons pas encore vu ce que [dutch_east_frisia_claimant.Monarch.GetName] fera de [dutch_east_frisia_claimant.Monarch.GetHerHis] revendication, cela ne se terminera sûrement pas bien pour notre nation."
 flavor_efr.EVTDESC3.3:0 "Pendant trop longtemps, le chef paysan de Frise Orientale a été autorisé à gouverner ses petites terres sans opposition. Désormais, avec le soutien du [From.Monarch.GetTitle] [From.Monarch.GetName], notre revendication lointaine sur la Frise Orientale a été renforcée et le [From.Monarch.GetTitle] nous a donné [From.Monarch.GetHerHis] bénédiction pour envahir la petite république de Frise Orientale."
 flavor_efr.EVTOPTA3:0 "Longue vie au Comte."
 flavor_efr.EVTOPTB3:0 "L'Empereur est un imbécile bouffi !"
 flavor_efr.EVTOPTC3:0 "Mettons fin au règne de [EFR.Monarch.GetName]."
 great_privilege_opinion:0 "Le Grand Privilège"
