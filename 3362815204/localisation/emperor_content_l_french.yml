 # Misc indicents loc
 incident_shadow_kingdom:0 "Le Royaume de l'Ombre"
 incident_shadow_kingdom_member_alert:0 "Bien que le Royaume d'Italie fasse encore formellement partie de l'Empire d'Anbennar, il s'est à bien des égards transformé en un « Royaume de l'Ombre », les États italiens agissant indépendamment de l'Empereur. L'échec des Empereurs successifs à restaurer l'autorité impériale dans la région a également laissé de vastes zones sous le contrôle d'États qui rejettent purement et simplement l'Autorité Impériale.\nÀ ce stade, la question pour de nombreux États italiens est de savoir pourquoi ils devraient permettre à l'Empereur d'exercer une quelconque autorité sur leurs terres."
 incident_shadow_kingdom_emperor_alert:0 "Bien que le Royaume d'Italie fasse encore formellement partie de l'Empire d'Anbennar, il s'est à bien des égards transformé en un « Royaume de l'Ombre », les États italiens agissant indépendamment de l'Empereur. L'échec des Empereurs successifs à restaurer l'autorité impériale dans la région a également laissé de vastes zones sous le contrôle d'États qui rejettent purement et simplement l'Autorité Impériale.\nÀ ce stade, la question pour de nombreux États italiens est de savoir pourquoi ils devraient permettre à l'Empereur d'exercer une quelconque autorité sur leurs terres."
 incident_dutch_revolt:0 "La Rébellion Néerlandaise"
 incident_dutch_revolt_member_alert:0 "La Révolte Néerlandaise a dépassé le stade des troubles régionaux pour devenir une crise internationale, les nations prêtant leurs armées à chaque camp. La République Néerlandaise nouvellement déclarée se trouve dans les frontières de l'Empire, et il a donc été avancé que l'Empereur a le devoir d'étendre la protection impériale sur cette nation naissante. L'intervention impériale, quelle que soit sa forme, est certaine d'altérer le destin des Pays-Bas pour toujours."
 incident_dutch_revolt_emperor_alert:0 "La Révolte Néerlandaise a dépassé le stade des troubles régionaux pour devenir une crise internationale, les nations prêtant leurs armées à chaque camp. La République Néerlandaise nouvellement déclarée se trouve dans les frontières de l'Empire, et il a donc été avancé que l'Empereur a le devoir d'étendre la protection impériale sur cette nation naissante. L'intervention impériale, quelle que soit sa forme, est certaine d'altérer le destin des Pays-Bas pour toujours."
 shadow_kingdom.5.a:0 "L'Empereur doit décider. Convoquons la diète !"
 shadow_kingdom.3.b:0 "L'Italie a été ramenée au bercail. Vive l'Empire !"
 shadow_kingdom.3.d2:0 "Fidèle à sa promesse, l'Empire a maîtrisé les Princes d'Italie et assuré leur place au sein de l'Empire d'Anbennar. Par cet exploit de génie diplomatique et militaire, toute la Chrétienté connaît désormais la futilité de défier la domination impériale."
