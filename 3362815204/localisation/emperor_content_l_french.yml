 horde_barbaric_despoilers_reform:0 "Pillards Barbares"
 horde_barbaric_despoilers_reform_desc:0 "À la guerre, rien n'est véritablement sacré. Combattre, c'est vivre, et les plus forts doivent s'emparer de tout ce qu'ils convoitent."
 horde_tribal_unity_reform:0 "Identité Unifiée de la Horde"
 horde_tribal_unity_reform_desc:0 "Nous devons mettre de côté les anciennes allégeances tribales au nom de la Horde. Nous sommes un seul peuple sous un seul Khan."
 # Misc
 army_professionalism_events.1.d2:0 "Pillons le Trésor du Rectorat !"
 army_professionalism_events.3.d2:0 "Alors que la cité de [Root.GetCapitalName] tombait aux mains de l'ennemi, les armées [From.GetAdjective] en progression se sont livrées à plusieurs jours de pillage. À l'intérieur des murs de la cité, des ruines fumantes sont tout ce qui reste de la cité autrefois florissante et les survivants cherchent refuge aussi loin que possible. Pire encore, les envahisseurs impies ont pillé le trésor du Rectorat, dérobant les coffres de Dieu lui-même."
 army_professionalism_events.3.b:0 "Tout cela pour trente deniers."
 # Mercs
 mercs.7.t:0 "Forte Demande pour les [popular_mercs.GetName]"
 mercs.7.d:0 "Alors que les conflits qui ravagent notre partie du monde continuent de faire rage, les services des compagnies de mercenaires sont très demandés. Les [popular_mercs.GetName] ont constaté que leurs talents particuliers sont particulièrement adaptés à la situation actuelle et ont été engagés par plusieurs États belligérants.\n\nLorsque les soldats des [popular_mercs.GetName] rentrent chez eux à [popular_mercs_origin.GetName], ils rapportent avec eux le butin de guerre, y compris leur salaire contractuel et toutes les richesses qu'ils ont pu piller durant leur campagne. Cet afflux de richesses a stimulé l'économie locale et encourage le recrutement supplémentaire pour les [popular_mercs.GetName]."
 mercs.7.a:0 "Encourager le recrutement à [popular_mercs_origin.GetName]."
 mercs.7.b:0 "Laissons les richesses affluer."
 popular_mercs_prosperity:0 "Les Mercenaires Apportent la Prospérité"
 desc_popular_mercs_prosperity:0 "Les soldats mercenaires basés dans cette province rapportent le butin de guerre chez eux, stimulant l'économie locale."
 mercs.8.t:0 "[long_time_hires.Leader.GetName] des [long_time_hires.GetName]"
 mercs.8.d:0 "Le Capitaine [long_time_hires.Leader.GetName] des [long_time_hires.GetName], satisfait de nos paiements ponctuels et de notre relation courtoise, nous a approchés avec une offre de service. [long_time_hires.Leader.GetSheHeCap] souhaite devenir un Général au service de l'armée [Root.GetAdjective], nous prêtant [long_time_hires.Leader.GetHerHis] vaste expérience tactique de manière permanente."
 mercs.8.a:0 "Il sera un excellent ajout à notre effectif."
 mercs.8.b:0 "Merci, mais non merci."
 mercs.9.t:0 "La Guerre a Changé"
 mercs.9.d:0 "L'avènement de l'usage généralisé des armes à feu a radicalement changé le visage de la guerre à Cannor. Un certain nombre de nouvelles compagnies de mercenaires ont été fondées, armées d'armes modernes et employant des tactiques modernes, tandis que d'autres n'ont pas su s'adapter et ont perdu leur pertinence dans cette nouvelle ère de guerre sophistiquée."
 mercs.9.a:0 "Chassons l'ancien, accueillons le nouveau."
 new_mercs_europe_tt:0 "§YLes Cavaliers de Vivinmar seront disponibles à l'engagement§!\n§YLes Sans-Blasons seront disponibles à l'engagement§!\n§YLa Compagnie Libre des Chasseurs du Bois-des-Bardes seront disponibles à l'engagement§!\n§YLe Corps de Fusiliers de la Lance-Lunaire sera disponible à l'engagement§!\n§YLa Compagnie de Canonniers de Catelsvord sera disponible à l'engagement§!\n§YLes Fusiliers-Oiseaux de Siádan seront disponibles à l'engagement§!\n§YLes Brigades de Fusils Indépendantes seront disponibles à l'engagement§!\n§YLa Compagnie de la Rayure sera disponible à l'engagement§!\n\n§YLes Maîtres d'Épée de Saloren ne seront plus disponibles à l'engagement§!\n§YLes Heaumes-Courts ne seront plus disponibles à l'engagement§!\n§YLa Compagnie des Grandes-Épées de Wexonard ne sera plus disponible à l'engagement§!\n§YLes Lances-Lunaires ne seront plus disponibles à l'engagement§!\n§YLes Danseurs de Lames Indépendants ne seront plus disponibles à l'engagement§!\n§YLes Vieux Forestiers Aléniques ne seront plus disponibles à l'engagement§!\n§YLa Bande Olavienne ne sera plus disponible à l'engagement§!\n§YLes Boucliers Luisants ne seront plus disponibles à l'engagement§!\n§YLes Chevaliers Sans Terre ne seront plus disponibles à l'engagement§!\n§YLes Sabres Libres de Larankar ne seront plus disponibles à l'engagement§!\n§YLes Guerriers du Sanglier ne seront plus disponibles à l'engagement§!"
 mercs.10.t:0 "Ferveur Mercenaire"
 mercs.10.d:0 "Les [pious_mercs.GetName] prennent leur foi [Root.Religion.GetName] très au sérieux, du moins selon les standards des épées à louer. Galvanisés par notre cause juste, la Compagnie est de bonne humeur alors qu'ils se préparent à affronter les impies [pious_mercs_enemy.GetName]."
 mercs.10.a:0 "Notre cause est juste !"
 pious_mercenaries:0 "Ferveur Mercenaire"
 desc_pious_mercenaries:0 "Les compagnies de mercenaires que nous employons sont remplies de ferveur religieuse alors que nous combattons les ennemis de notre foi."
 veteran_mercs_modifier:0 "Mercenaires Vétérans"
 desc_veteran_mercs_modifier:0 "Nos pratiques honorables encouragent les vétérans à rejoindre les compagnies de mercenaires à notre service."
 mercs.11.t:0 "Paiements Retardés"
 mercs.11.d:0 "Les [unpaid_mercs.GetName] se plaignent de ne pas avoir reçu l'intégralité du salaire convenu pour leurs services. Leur Capitaine, [unpaid_mercs.Leader.GetName], nous accuse de corruption et de conduite déshonorante et menace de faire partir [unpaid_mercs.Leader.GetHerHis] hommes si le paiement n'est pas effectué."
 mercs.11.a:0 "Ils seront payés. Éventuellement."
 mercs.11.b:0 "Une simple erreur d'écriture, nous avons l'argent."
 mercs.11.c:0 "Ils peuvent prendre ce qu'on leur donne ou partir."
 delayed_payments:0 "Paiements Retardés"
 desc_delayed_payments:0 "Les compagnies de mercenaires que nous employons reçoivent leurs salaires en retard, encourageant la désertion dans leurs rangs."
 # Revolution
 revolutionary_republic_factions.1.a2:0 "Le Culte de la Raison montrera la voie."
 revolutionary_republic_factions.1.b2:0 "Louanges à notre divin [Root.Monarch.GetTitle] !"
 revolutionary_republic_factions.7.d2:0 "Écraser l'ancien ordre a apporté une justice et une égalité sans précédent aux masses ainsi que des actifs substantiels dans le trésor de l'État. Cela a cependant également signifié une perte d'administrateurs, de bureaucrates et de clercs expérimentés. Beaucoup de ces fils de la petite noblesse, de l'ancien clergé et d'autres classes privilégiées se sont retirés de la vie publique et quittent le pays par crainte pour leur vie.\nCela nous a laissés avec un État qui a plus à administrer mais moins de personnes possédant l'expérience requise pour le faire. Avec le mérite comme principe directeur du gouvernement, nous sommes certains de trouver de nouveaux citoyens capables pour prendre leur place, mais cela nous a tout de même placés dans une situation quelque peu délicate pour le moment."
 revolutionary_republic_factions.9.d2:0 "Craignant l'influence des crypto-monarchistes et des contre-révolutionnaires parmi l'élite dirigeante, le peuple de [Root.Capital.GetCapitalName] est descendu dans les rues pour défendre l'esprit de la révolution. Tous ceux associés à l'ancien ordre, des prêtres [Root.Owner.Religion.GetName], aux membres de la petite noblesse, ou même ceux déjà emprisonnés pour leurs crimes contre l'État, ont été ciblés. Les radicaux font de leur mieux pour enflammer les cœurs et les esprits des masses.\nCela place le gouvernement dans une situation quelque peu précaire. Certaines des personnes ciblées sont membres de leurs propres rangs, et ces massacres incontrôlés nous font paraître faibles, car ils nuisent gravement au bien-être de notre cité autrefois magnifique. Si nous faisons quoi que ce soit pour y mettre fin, cependant, cela jouera directement dans les mains des radicaux..."
 napoleon.1.t:0 "Le [Root.Monarch.GetTitle] sur le Champ de Bataille"
 napoleon.1.d:1 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est une figure d'immense renommée militaire. On dit que [Root.Monarch.GetHerHisCap] présence vaut quarante mille hommes, instillant une croyance inébranlable en notre victoire imminente tant chez les officiers que chez les simples soldats. Le [Root.Monarch.GetTitle] observe le champ de bataille et se prépare à donner un ordre qui résonnera dans tout [Root.GetName]..."
 napoleon.1.a:0 "Barrage d'artillerie ! Brisez les murs !"
 napoleon.1.b:0 "Marchez ! Marchez jusqu'à la mort !"
 napoleon.1.c:0 "Chargez ! Ne laissez aucun homme en vie !"
 napoleon.1.da:0 "Feu ! Remplissez nos ennemis de plomb !"
 napoleon_siege:0 "Barrage d'Artillerie !"
 desc_napoleon_siege:0 "Notre glorieux Empereur a donné l'ordre : Feu d'artillerie ! Brisez les murs !"
 napoleon_manuever:0 "Marchez !"
 desc_napoleon_manuever:0 "Notre glorieux Empereur a donné l'ordre : Marchez ! Marchez jusqu'à la mort !"
 napoleon_shock:0 "Chargez !"
 desc_napoleon_shock:0 "Notre glorieux Empereur a donné l'ordre : Chargez ! Ne laissez aucun homme en vie !"
 napoleon_fire:0 "Feu !"
 desc_napoleon_fire:0 "Notre glorieux Empereur a donné l'ordre : Feu ! Remplissez nos ennemis de plomb !"
 napoleon.2.t:0 "Propagande Impériale"
 napoleon.2.d:0 "En [Root.GetName], notre glorieux [Root.Monarch.GetTitle] gouverne l'État avec une autorité absolue, mais l'État ne survit que par le soutien du peuple. L'État doit s'assurer que le peuple admire la figure du [Root.Monarch.GetTitle] avec un zèle fervent frôlant l'adoration, et nous devons donc produire une propagande abondante pour promouvoir l'image du monarque. Nous devons soigneusement considérer comment le [Root.Monarch.GetTitle] est dépeint, en mettant l'accent uniquement sur les aspects de [Root.Monarch.GetHerHis] règne que le peuple peut voir en action."
 napoleon.2.a:0 "Mettez en avant le [Root.Monarch.GetTitle] comme législateur."
 napoleon.2.b:0 "Mettez en avant le [Root.Monarch.GetTitle] comme artisan de paix."
 napoleon.2.c:0 "Mettez en avant le [Root.Monarch.GetTitle] comme héros militaire."
 napoleon.2.da:0 "Mettez en avant le [Root.Monarch.GetTitle] comme prophète divin."
 napoleon.2.e:0 "Mettez en avant [Root.Monarch.GetHerHis]... amour des petits animaux ?"
 napoleon_lawbringer:0 "Propagande Impériale : Législateur"
 desc_napoleon_lawbringer:0 "Nous publions de la propagande qui promeut l'image de l'Empereur comme un donneur de lois."
 napoleon_peacebringer:0 "Propagande Impériale : Artisan de Paix"
 desc_napoleon_peacebringer:0 "Nous publions de la propagande qui promeut l'image de l'Empereur comme un champion de la paix."
 napoleon_inspirational_general:0 "Propagande Impériale : Héroïsme Militaire"
 desc_napoleon_inspirational_general:0 "Nous publions de la propagande qui promeut l'image de l'Empereur comme un héros militaire."
 napoleon_prophet:0 "Propagande Impériale : Le Prophète"
 desc_napoleon_prophet:0 "Nous publions de la propagande qui promeut l'image de l'Empereur comme un prophète divin."
 roman_garisson:0 "Garnison Romaine Renforcée"
 desc_roman_garisson:0 "Après le Sac de Rome, nous avons renforcé la garnison à Rome pour empêcher que cette tragédie ne se reproduise."
 cardinal_nephew_tt:0 "§Y[cardinal_nephew_country.GetName] reçoit un événement.§!"
 adm_vatican_library_tt:1 "§YLa Bibliothèque Vaticane - Édition Administrative§! sera établie à §Y[118.GetName]§!, conférant les effets suivants :\nCoût de la Technologie Administrative : §G-5 %§!\nTroubles Nationaux : §G-2§!"
 dip_vatican_library_tt:0 "§YLa Bibliothèque Vaticane - Édition Diplomatique§! sera établie à §Y[118.GetName]§!, conférant les effets suivants :\nCoût de la Technologie Diplomatique : §G-5 %§!\nRéputation Diplomatique : §G+1§!"
 mil_vatican_library_tt:0 "§YLa Bibliothèque Vaticane - Édition Militaire§! sera établie à §Y[118.GetName]§!, conférant les effets suivants :\nCoût de la Technologie Militaire : §G-5 %§!\nTradition Militaire des Batailles : §G+50 %§!"
 fra_pro_tt:0 "Au moins §Y3§! provinces dans la zone §YProvence§! sont possédées par §Y[Root.GetName]§! ou ses sujets non-souverains."
 center_of_revolution.13.t:0 "Rêves de Liberté"
 center_of_revolution.13.d:0 "Les nouvelles de la révolution en [revolution_target.GetName] se sont répandues jusqu'aux colonies du Nouveau Monde. La rhétorique enflammée de la liberté embrase les cœurs du peuple, qui rêve désormais d'indépendance pour ses colonies.\n\nCet esprit rebelle serait certainement atténué si nous pouvions mettre fin à l'insidieuse révolution qui répand sa propagande depuis [revolution_target.Capital.GetCapitalName]."
 center_of_revolution.13.a:0 "Cette révolution doit être écrasée."
 center_of_revolution.14.t:0 "Rêves de Liberté Écrasés"
 center_of_revolution.14.d:0 "L'esprit de rébellion qui embrasait le Nouveau Monde a été atténué suite à la défaite écrasante de la Révolution dans l'Ancien Monde. Le flot de propagande a cessé, et les instigateurs peinent à inspirer les peuples des colonies à poursuivre leurs rêves d'indépendance condamnés."
 center_of_revolution.14.a:0 "Les coloniaux devraient connaître leur place."
 colony_inspired_by_revolution:0 "Rêves de Liberté"
 desc_colony_inspired_by_revolution:0 "Inspirés par la Révolution dans l'Ancien Monde, des mouvements dans les colonies aspirent à leur propre liberté."
 sistine_chapel_tt:0 "§YLa Chapelle Sixtine§! sera ajoutée à §Y[118.GetName]§!, conférant les effets suivants :\nDévotion Annuelle : §G+0,10§!"
 pap_sistinechapel_botticelli_tt:0 "§YLa Chapelle Sixtine décorée par Botticelli§! sera ajoutée à §Y[118.GetName]§!, conférant les effets suivants :\nDévotion Annuelle : §G+0,10§!\nTroubles Nationaux : §G-1§!"
 pap_sistinechapel_ghirlandaio_tt:0 "§YLa Chapelle Sixtine décorée par Ghirlandaio§! sera ajoutée à §Y[118.GetName]§!, conférant les effets suivants :\nDévotion Annuelle : §G+0,10§!\nPrestige Annuel : §G0,5§!"
 pap_sistinechapel_perugino_tt:0 "§YLa Chapelle Sixtine décorée par le Pérugin§! sera ajoutée à §Y[118.GetName]§!, conférant les effets suivants :\nDévotion Annuelle : §G+0,10§!\nAmélioration des Relations : §G+10 %§!"
 pap_sistinechapel_michelangelo_tt:0 "§YLa Chapelle Sixtine décorée par Michel-Ange§! sera ajoutée à §Y[118.GetName]§!, conférant les effets suivants :\nDévotion Annuelle : §G+0,10§!\nCoût des Idées : §G-5 %§!"
