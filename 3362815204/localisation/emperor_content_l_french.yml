 # The Borgia Pope
 borgia_pope_tt:0 "§YLa corruption se répand dans l'Église, égarant les fidèles.§!"
 borgia_pope:0 "Le Haut-Recteur Borgia"
 desc_borgia_pope:0 "Rodrigo Borgia a été élu Haut-Recteur. Son Pontificat est terni par des rumeurs de corruption. Le népotisme est endémique et la foi publique envers l'Église en souffre."
 scandalized_papacy:0 "Papauté Scandaleuse"
 desc_scandalized_papacy:0 "Les activités présumées de la famille Borgia sont une tache sur la réputation de la Papauté."
 borgia_diplomacy:0 "Diplomatie Borgia"
 desc_borgia_diplomacy:0 "Malgré les rumeurs salaces sur la famille Borgia, leurs compétences diplomatiques sont inégalées et ils refusent de laisser leur réputation être souillée par leurs ennemis."
 flavor_pap.16.t:0 "Le Haut-Recteur Borgia"
 flavor_pap.16.d:0 "De la fumée blanche émerge du toit de la Chapelle Sixtine. Au milieu d'accusations de simonie, le Conclave a élu Rodrigo Borgia, Archevêque de Valence, au Trône de Saint-Pierre. Les Borgia sont des arrivants relativement récents dans le théâtre de la politique romaine, et ont gagné l'ire des familles romaines plus établies qui convoitaient cette position pour eux-mêmes.\n\nBien que beaucoup de rumeurs entourant ce Haut-Recteur Borgia soient probablement des exagérations propagées par ses ennemis, il est connu pour entretenir ouvertement une maîtresse et a déjà élevé son fils adolescent Cesare au rang de Véridical. Les spéculations abondent que le règne de ce Haut-Recteur sera parsemé de scandales et de corruption."
 flavor_pap.16.a:0 "La Papauté survivra."
 flavor_pap.17.t:0 "Cesare Borgia"
 flavor_pap.17.d:0 "Cesare Borgia, fils du Haut-Recteur, est devenu le premier homme à jamais démissionner de la position de Véridical. Cherchant plutôt une carrière d'aventurier militaire, il a déjà prouvé être un condottiero capable et impitoyable. Le Saint-Père a choisi de reconnaître ses capacités en accordant à Cesare le rôle de Capitaine-Général de l'Église, lui donnant le contrôle des armées du Rectorat."
 flavor_pap.17.a:0 "Aut Caesar, aut nihil."
 flavor_pap.18.t:0 "Une Papauté Scandaleuse"
 flavor_pap.18.d:0 "Une nuée de rumeurs vicieuses entoure les actes de la famille Borgia. Les accusations abondent de meurtres par cantarella, supposément un poison mortel et difficile à détecter, utilisé pour éliminer les rivaux politiques. Le Saint-Père lui-même est réputé s'engager régulièrement dans la simonie et la corruption, et des actes encore plus salaces sont murmurés concernant la relation entre ses enfants, Cesare et Lucrèce. Bien qu'il semble y avoir peu de preuves pour ces accusations, elles sont largement crues par les Ravéliens de partout."
 flavor_pap.18.a:0 "Mensonges et calomnies !"
 flavor_pap.18.b:0 "Nous pouvons tourner cette situation à notre avantage."
 flavor_pap.19.t:0 "La Fin de la Papauté Borgia"
 flavor_pap.19.d:0 "La mort du Haut-Recteur Borgia a été accueillie par une célébration discrète parmi les familles patriciennes de Rome. Les Véridicals ont élu l'un des rivaux les plus persistants de Borgia pour le remplacer. [Root.Monarch.GetName] promet de défaire la corruption de son prédécesseur et de restaurer la confiance dans la sainteté de l'Église.\n\nCesare Borgia, pendant ce temps, a vu son pouvoir s'effondrer du jour au lendemain sans le soutien du Rectorat. Craignant pour sa vie, il a fui en Navarre où il espère trouver un répit face à ses ennemis."
 flavor_pap.19.d2:0 "La mort du Haut-Recteur Borgia a été accueillie par une célébration discrète parmi les familles patriciennes de Rome. Les Véridicals ont élu l'un des rivaux les plus persistants de Borgia pour le remplacer. [Root.Monarch.GetName] promet de défaire la corruption de son prédécesseur et de restaurer la confiance dans la sainteté de l'Église."
 flavor_pap.19.a:0 "L'Église doit réparer sa réputation."
 flavor_pap.20.t:0 "L'Arrivée de Cesare Borgia"
 flavor_pap.20.d:0 "Cesare Borgia, fils d'un Haut-Recteur et commandant militaire éprouvé, est arrivé à la cour de Navarre. Il cherche l'asile contre ses ennemis en Italie, car sans le soutien du Rectorat, son pouvoir s'est effondré. En échange, il offre ses services en tant que commandant, si nous en avons besoin."
 flavor_pap.20.a:0 "Cesare Borgia est le bienvenu ici."
 # Switzerland incident
 incident_switzerland.1.t:0 "La Suisse et l'Empire"
 incident_switzerland.1.d:1 "Avec la fin du grand bouleversement religieux qui a englouti non seulement l'Empire mais aussi une grande partie de Cannor, les cantons de Suisse reconsidèrent leur relation de plus en plus lâche avec l'Empire. Bien que beaucoup aient combattu et soient morts pour la paix, les détails du règlement n'étaient pas au goût des élites suisses et beaucoup appellent à la séparation formelle et totale de la Suisse de l'Empire d'Anbennar."
 incident_switzerland.1.a:0 "Nous n'avons plus besoin de l'Empire."
 incident_switzerland.1.b:0 "La Suisse restera au sein de l'Empire."
 swixit_tt:1 "§YL'Empereur obtient une revendication sur toutes les provinces impériales possédées par la Suisse.§!\n§YL'Empereur peut répondre violemment à cette décision.§!"
 incident_switzerland.2.t:0 "La Suisse et l'Empire"
 incident_switzerland.2.d:1 "La Suisse a abandonné l'Empire ! Poussés par l'insatisfaction envers la paix religieuse ainsi que par l'affaiblissement des liens avec les institutions impériales, les Suisses ont décidé que l'adhésion à l'Empire d'Anbennar ne sert plus leurs intérêts."
 incident_switzerland.2.a:0 "Leur accorder la permission de partir."
 incident_switzerland.2.b:0 "L'adhésion n'est pas optionnelle."
 # High Rector incident
 pope_in_hre_triggered_modifier:0 "Le Haut-Recteur dans l'Empire"
 desc_pope_in_hre_triggered_modifier:0 "L'adhésion du Haut-Recteur à l'Empire d'Anbennar a des ramifications désastreuses pour les Ravéliens en dehors de l'Empire."
 incident_pope.1.t:0 "Un Saint Empire ?"
 incident_pope.1.d:0 "L'État Ravélien doit maintenant choisir s'il accepte l'hégémonie de l'Empereur ou s'il est condamné à rester nu et vulnérable à sa porte.\n\nAccepter l'autorité de l'Empereur aurait des ramifications désastreuses pour le monde ravélien. Alors que les Ravéliens dans l'Empire pourraient voir leur foi renforcée par la légitimité conférée par l'adhésion ravélienne, ceux en dehors de l'Empire ne verront probablement pas cette décision d'un bon œil et pourraient se tourner vers l'hérésie."
 incident_pope.1.a:0 "Nous rejoindrons l'Empire."
 incident_pope.1.b:0 "Le Haut-Rectorat doit rester indépendant."
 pope_incident_tt:0 "L'Empereur décidera s'il accepte l'État Ravélien dans l'Empire d'Anbennar.\n§YCela aura des ramifications pour l'ensemble du monde ravélien.§!"
 pope_incident_tt2:1 "§YCela aura des ramifications pour l'ensemble du monde ravélien.§!\n§YLes Ravéliens en dehors de l'Empire recevront des pénalités de Prestige.§!"
 incident_pope.2.t:0 "Un Saint Empire ?"
 incident_pope.2.d:0 "Le Haut-Recteur, écoutant la sagesse du Fragment Divin, a choisi d'accepter l'hégémonie de l'Empire plutôt que d'être condamné à rester nu et vulnérable à sa porte.\n\nPermettre au Haut-Recteur de devenir un Prince Impérial aurait des ramifications désastreuses pour le monde ravélien. Alors que les Ravéliens dans l'Empire pourraient voir leur foi renforcée par la légitimité conférée par l'adhésion au Rectorat, ceux en dehors de l'Empire ne verront probablement pas cette décision d'un bon œil et pourraient se tourner vers l'hérésie."
 incident_pope.2.a:0 "Le Haut-Recteur rejoindra l'Empire"
 incident_pope.2.b:0 "Le Haut-Rectorat devrait rester indépendant."
 incident_pope.3.t:0 "Un Empire Impie"
 incident_pope.3.d:1 "La Diète Impériale de l'Empire a adopté un édit terrible et intolérable : l'Empire ne suivra plus la foi ravélienne. Tous nos efforts pour restaurer la dignité de la Sainte Mère Église ont été vains, et nous devons donc sérieusement envisager d'abandonner cette institution corrompue."
 incident_pope.3.a:0 "Quittons cet antre de péché."
 incident_pope.3.b:0 "Nous devons rester pour le bien des fois cannoriennes."
 pope_left_empire:0 "Le Haut-Recteur a quitté l'Empire"
 # Dutch revolt rework
 dutch_unification_tt:0 "§Y[dutch_unification_country.GetName] obtiendra toutes les provinces détenues par nos sujets Néerlandais, Frisons ou Flamands.§!"
 dutch_revolt_modifier:0 "Révolte Néerlandaise"
 desc_dutch_revolt_modifier:0 "Les habitants de cette province aspirent à un Pays-Bas indépendant."
 dutch_revolt_tt:0 "Toutes les provinces possédées dans la région des §YPays-Bas§! avec une culture §YNéerlandaise§!, §YFrisonne§! ou §YFlamande§! reçoivent le modificateur §YRévolte Néerlandaise§!, donnant §R+10§! d'agitation locale jusqu'à la résolution du Désastre."
 dutch_revolt_disaster:0 "Révolte Néerlandaise"
 dutch_revolt_disaster_desc:0 "Le peuple néerlandais vivant sous l'autorité de [Root.GetName] est devenu mécontent et cherche à créer un État indépendant par des moyens violents."
 dutch_revolt.1.t:0 "Fin de la Révolte Néerlandaise"
 dutch_revolt.1.d:0 "Nous avons réussi à réprimer l'insurrection néerlandaise, mettant fin à tous les foyers de sentiment séparatiste sauf les plus insignifiants. La présence militaire [Root.GetAdjective] accrue dans la région a beaucoup contribué à faire taire par la peur même ceux qui ne cherchaient qu'une plus grande autonomie."
 dutch_revolt.1.d2:0 "La Révolte Néerlandaise a dégénéré bien au-delà de ce que nous avions anticipé. Les rebelles ont formé un État cohérent et ont commencé à chercher le soutien de nos rivaux à l'étranger. Nous devons rassembler nos forces et nous préparer à la guerre !"
 dutch_revolt.1.a:0 "C'est bien pire qu'une rébellion locale."
 dutch_revolt.1.b:0 "L'insurrection est terminée."
 dutch_revolt.2.t:0 "Indépendance Néerlandaise"
 dutch_revolt.2.d:1 "La Révolte Néerlandaise a dégénéré bien au-delà de troubles régionaux et est devenue une crise internationale alors que des nations prêtent leurs armées à chaque camp. La République Néerlandaise nouvellement déclarée se trouve dans les limites de l'Empire, et il a donc été soutenu que l'Empereur a le devoir d'étendre la protection impériale sur cette nation naissante. L'intervention impériale, quelle que soit sa forme, modifiera certainement le destin des Pays-Bas pour toujours."
 dutch_revolt.2.a:0 "Nous soutiendrons les Néerlandais."
 dutch_revolt.2.b:0 "Nous ne devrions pas intervenir."
 dutch_revolt.2.c:0 "Ils sont les sujets légitimes de [dutch_revolt_country.GetName]."
 dutch_will_leave_later:0 "§YSi les Pays-Bas émergent de la guerre en position de force, ils quitteront le Saint Empire Romain.§!"
 dutch_revolt.3.t:0 "Les Pays-Bas abandonnent l'Empire"
 emperor_helped_dutch:0 "A soutenu l'Indépendance Néerlandaise"
 emperor_sided_against_dutch:0 "A dénoncé l'Indépendance Néerlandaise"
 flavor_ara.EVTNAME7:0 "La Succession Napolitaine"
 flavor_ara.EVTDESC7:0 "Le fils bâtard d'Alphonse le Magnanime, Ferdinand, n'est pas éligible pour succéder au trône aragonais, mais avant sa mort, Alphonse a obtenu le consentement du Pape Eugène IV pour faire de Ferdinand le successeur légitime au trône de Naples. Selon les termes du testament d'Alphonse, le Royaume de Naples devrait maintenant être gouverné par Ferdinand, tandis que [ARA.Monarch.GetName] continuera de détenir toutes les autres possessions aragonaises."
 flavor_ara.EVTOPTA7:0 "Nous suivrons le dernier testament d'Alphonse."
 flavor_ara.EVTOPTB7:0 "Alphonse était un fou ! Nous garderons Naples."
 flavor_ara.EVTNAME8:0 "La Succession Napolitaine"
 flavor_ara.EVTDESC8:0 "Alphonse le Magnanime a légué que la couronne de Naples devait passer à son fils bâtard, Ferdinand, plutôt qu'à [ARA.Monarch.GetName] d'Aragon. Cela nécessitait le consentement spécial de la Papauté et la soumission de l'Aragon devant l'Église. Le Pape s'attend maintenant à ce que Ferdinand fasse comme son père, et paie ses dettes à l'Église."
 flavor_ara.EVTOPTA8:0 "Les exigences de la Papauté sont exorbitantes ! Nous ne paierons pas."
 flavor_ara.EVTOPTB8:0 "Sa Sainteté recevra ce qui lui est dû."
 flavor_ara.EVTNAME9:0 "Naples refuse de se soumettre !"
 flavor_ara.EVTDESC9:0 "Le nouveau roi de Naples, [NAP.Monarch.GetName], a refusé de suivre les pas de son père et de se soumettre au Saint-Siège. C'est une grave insulte à l'Église et une violation de l'accord conclu avec le roi Alphonse V d'Aragon qui, peut-on argumenter, annule la prétention de [NAP.Monarch.GetName] à la couronne napolitaine. Nous ne pouvons pas laisser une telle grave insulte sans réponse !"
 flavor_ara.EVTOPTA9:0 "Reconnaître l'ancienne prétention angevine de la France sur Naples."
 flavor_ara.EVTOPTB9:0 "Forcer Naples à se soumettre à nous par des moyens militaires."
 flavor_ara.EVTOPTC9:0 "Il n'est pas nécessaire de forcer les choses."
 flavor_ara.EVTNAME10:0 "Naples paie ses dettes"
 flavor_ara.EVTDESC10:0 "Le nouveau roi de Naples, [NAP.Monarch.GetName], a respecté les termes de l'accord de son père et a payé ses dettes à l'Église."
 flavor_ara.EVTOPTA10:0 "C'est agréable de rencontrer un roi qui connaît sa place !"
 flavor_ara.EVTNAME11:0 "La Succession Napolitaine contestée"
 flavor_ara.EVTDESC11:0 "Le roi Alphonse V d'Aragon a divisé son royaume à sa mort, accordant la couronne napolitaine à son fils bâtard, Ferdinand. C'était un acte controversé à l'époque, et l'est devenu encore plus depuis. Il est temps de reconsidérer la légalité de la succession de Ferdinand."
 flavor_ara.EVTOPTA11:0 "Naples appartient à [Root.GetName] !"
 flavor_ara.EVTOPTB11:0 "Nous continuerons à respecter l'indépendance de Naples."
 #Formable nations decisions
 bavaria_nation_title:0 "Former la Bavière"
 bavaria_nation_desc:0 "L'autrefois fier Duché de Bavière est divisé et affaibli. Nous devons réunir ses anciens territoires et reconquérir les gloires du passé si nous voulons éviter de n'être qu'une note de bas de page dans l'histoire."
 pomerania_nation_title:0 "Former la Poméranie"
 pomerania_nation_desc:0 "Les lois de succession ont conduit le Duché de Poméranie à être divisé avec une grande fréquence. Cela a laissé les sous-duchés vulnérables aux attaques des puissances plus fortes autour de la Baltique et à la puissance montante du Brandebourg. Nous devons forger une nation poméranienne forte pour résister à ces menaces."
 franconia_nation_title:0 "Former la Franconie"
 franconia_nation_desc:0 "Le souvenir de l'ancien Duché de Franconie perdure dans les mémoires des dirigeants locaux ambitieux. Le Prince-Évêque de Würzburg revendique le titre, mais en pratique il est resté en déshérence pendant des siècles, ses anciennes terres déchirées par la désunion. Si cette unité était restaurée, alors la Franconie redeviendrait une force avec laquelle il faut compter en Germanie."
 swabia_nation_title:0 "Former la Souabe"
 swabia_nation_desc:0 "L'ancien Duché de Souabe s'est terminé avec l'exécution de Conradin, le dernier des Ducs Hohenstaufen, en 1268. Depuis lors, une pléthore de comtés, d'évêchés et de villes libres ont émergé pour combler le vide laissé par la chute des Hohenstaufen. Cependant, ces petits États sont souvent incapables de protéger leur liberté ; ainsi, les Habsbourg d'Autriche ont constitué des possessions territoriales considérables en Souabe, qu'ils appellent « Autriche Antérieure ». Nous devons restaurer l'unité de la Souabe si nous voulons mettre fin à ce schéma d'empiètements extérieurs."
 saxony_nation_title:0 "Former la Saxe"
 saxony_nation_desc:0 "Le Duché de Saxe est passé entre les mains de différentes dynasties et a même considérablement changé de territoire au fil des siècles. Peut-être devrions-nous également revendiquer ce titre ?"
 #Scripted trigger custom tooltips
 has_adm_advisor_tooltip:0 "Emploie un Conseiller §YAdministratif§!."
 has_adm_advisor_2_tooltip:0 "Emploie un Conseiller §YAdministratif§! avec au moins Compétence §Y2§!."
 has_adm_advisor_3_tooltip:0 "Emploie un Conseiller §YAdministratif§! avec au moins Compétence §Y3§!."
 has_dip_advisor_tooltip:0 "Emploie un Conseiller §YDiplomatique§!."
