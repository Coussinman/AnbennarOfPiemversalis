 #Government Reforms
 imperial_diplomacy_reform:0 "Diplomatie Impériale"
 imperial_diplomacy_reform_desc:0 "La cité ne peut maintenir son indépendance sans le soutien de l'Empereur et de nos autres alliés. Nous concentrerons nos énergies sur le renforcement de nos liens diplomatiques et nous assurerons que, chaque fois que nous aurons besoin d'eux, nos amis seront là pour nous aider à défendre la cité."
 municipal_self_defense_reform:0 "Autodéfense Municipale"
 municipal_self_defense_reform_desc:0 "Ce n'est qu'en comptant sur les capacités militaires de notre cité que nous pouvons assurer notre survie. Nous allouerons plus de pouvoir politique aux capitaines de la Garde Municipale et nous assurerons qu'ils ont tout ce dont ils ont besoin pour assurer notre défense."
 austrian_archduchy_reform:0 "Archiduché Autrichien"
 austrian_archduchy_reform_desc:0 "Bien qu'organisé de manière similaire à un monarque féodal, l'Archiduché Autrichien est un cran au-dessus des autres duchés de Cannor. Grâce à une longue expérience de règne sur les autres, qu'il s'agisse de Tyroliens, de Styriens, de Hongrois ou de Bohémiens, et d'arrangements dynastiques en leur faveur, les Archiducs ont pu développer un système efficace pour gouverner leurs terres et maintenir leur unité."
 austrian_archduchy:0 "Archiduché Autrichien"
 #Korean content
 kor_factional_upheaval:0 "Bouleversement Factionnel"
 desc_kor_factional_upheaval:0 "L'essor des néo-confucéens a déclenché une vague de bouleversement factionnel sur le pays."
 kor_factional_unity:0 "Unité Factionnelle"
 desc_kor_factional_unity:0 "Les querelles factionnelles qui ont déchiré le pays ont pris fin, inaugurant une nouvelle ère d'unité coréenne."
 flavor_kor.10.tt2:0 "Ce modificateur ne sera supprimé qu'à l'achèvement de la mission §YLibération des Querelles Factionnelles§!.\n"
 no_country_is_EoC:0 "Aucun pays n'est l'Empereur de Chine."
 #English Disasters
 war_of_the_roses_end_tooltip_pretender_still_lives:1 "Le Prétendant est mort"
 war_of_the_roses.200.name:0 "Le Prétendant S'échappe"
 war_of_the_roses.200.desc.york:0 "Le Prétendant Richard York s'est échappé dans le chaos suivant sa défaite à la Bataille de [From.GetCapitalName] ! Bien qu'on ne le trouve nulle part, nous ne pouvons que supposer qu'il rassemble ses troupes pour une nouvelle tentative sur la couronne."
 war_of_the_roses.200.desc.lancaster:0 "Le Prétendant Édouard de Lancastre s'est échappé dans le chaos suivant sa défaite à la Bataille de [From.GetCapitalName] ! Bien qu'on ne le trouve nulle part, nous ne pouvons que supposer qu'il rassemble ses troupes pour une nouvelle tentative sur la couronne."
 war_of_the_roses.200.opt:0 "Nous trouverons ce prétendant."
 war_of_the_roses.201.name:0 "Le Prétendant Réapparaît"
 war_of_the_roses.201.desc.york:0 "Richard York, le prétendant, a réapparu à [new_revolt_province.GetName] à la tête d'une nouvelle armée. Nous devons rallier nos troupes pour faire face à cette nouvelle menace !"
 war_of_the_roses.201.desc.lancaster:0 "Édouard de Lancastre, le prétendant, a réapparu à [new_revolt_province.GetName] à la tête d'une nouvelle armée. Nous devons rallier nos troupes pour faire face à cette nouvelle menace !"
 war_of_the_roses.201.opt:0 "Qu'on lui coupe la tête !"
 flavor_eng.lost_to_royalists:0 "Les Royalistes ont gagné. Hélas pour nos libertés !"
 flavor_eng.lost_to_parliament:0 "Le Parlement a gagné. Hélas pour le Roi !"
 english_civil_war.11.d.heir:0 "Alors que la guerre civile qui a affligé notre terre touche à sa fin, nous nous trouvons à la croisée des chemins. Certains pensent que ce serait le moment idéal pour rétablir une monarchie dans nos terres et appellent à la réintégration de l'ancien héritier du trône, bien que sous la condition que la gouvernance de [Root.GetName] soit régulée par une constitution et des lois strictes pour prévenir la situation qui a conduit à nos récents troubles. D'autres soutiennent que le temps est venu d'en finir complètement avec la monarchie et d'établir une république moderne construite autour des anciens principes du Parlement anglais."
 english_civil_war.12.d.heir:0 "Avec la mort de notre Lord Protecteur, la question demeure de savoir comment notre pays devrait progresser. Certains pensent que ce serait le moment idéal pour rétablir une monarchie dans nos terres et appellent à la réintégration de l'ancien héritier du trône, bien que sous la condition que la gouvernance de [Root.GetName] soit régulée par une constitution et des lois strictes pour prévenir la situation qui a conduit à la Guerre Civile que nous venons de laisser derrière nous. D'autres soutiennent que le temps est venu d'en finir complètement avec la monarchie et d'établir une république moderne construite autour des anciens principes du Parlement anglais."
 #Fixes to Wokou Pirates
 japan.2.name:0 "Le Nouveau Shogun"
 japan.2.desc:0 "[new_shogunate.GetName] a pris le Shogunat et exige maintenant notre allégeance. Devrions-nous accepter leur autorité ?"
 japan.2.A:0 "Nous nous inclinerons devant ce nouveau Shogun."
 japan.2.B:0 "Les pirates ne connaissent pas de maîtres."
 japan.3.name:0 "[From.GetName] Nous Défie"
 japan.3.desc:0 "Les pirates de [From.GetName] défient notre revendication du Shogunat. Ayant renvoyé notre ambassadeur, ils ont l'intention de gouverner leur terre comme une nation indépendante."
 japan.3.opt:0 "Ils s'inclineront devant nous, avec le temps."
 opinion_defy_new_shogun:0 "Défie notre Autorité en tant que Shogunat"
 PIRATE_DAIMYO:0 "Daimyo Pirate"
 #Imperial Reforms
 emperor_reichsstabilitaet_title:0 "Stabilité Absolue"
 emperor_reichsstabilitaet_desc:0 "Sauvegarder la stabilité de l'Empire en sécurisant les moyens de son expansion."
 emperor_perpetual_diet_title:0 "Parlement Permanent"
 emperor_perpetual_diet_desc:1 "Instituer une session permanente du Parlement Impérial afin que les affaires importantes puissent lui être présentées au fur et à mesure qu'elles surviennent."
 emperor_landsknechtswesen_title:0 "Compagnies d'Aventuriers Impériales"
 emperor_landsknechtswesen_desc:0 "Organiser les nombreuses bandes d'aventuriers et de mercenaires d'Anbennar en compagnies officielles disponibles pour la défense de l'Empire."
 emperor_reichstag_collegia_title:0 "Établir les Collèges Parlementaires"
 emperor_reichstag_collegia_desc:0 "Diviser le Parlement en collèges séparés pour l'Empereur, les Princes et les Villes Impériales pour améliorer son fonctionnement pour tous."
 emperor_geteilte_macht_title:0 "Autorité Partagée"
 emperor_geteilte_macht_desc:0 "Garantir les pouvoirs des Princes afin qu'ils puissent à leur tour soutenir la force de l'Empereur."
 emperor_rechenschaft_title:0 "Embrasser les Réformes d'Erelas"
 emperor_rechenschaft_emperor_per_prince:0 "Réformes d'Erelas"
 emperor_rechenschaft_desc:0 "Inspirés par le mage-empereur Erelas l'Humble, qui a abdiqué sa position pour partager le trône de la colombe entre un Empereur noble et un Grand Magistère, nous devons étendre les contre-pouvoirs de l'Empire pour créer un système plus équitable."
 emperor_expand_gemeiner_pfennig_title:0 "Étendre l'Impôt de la Colombe"
 emperor_expand_gemeiner_pfennig_desc:0 "Augmenter l'impôt commun pour étendre les capacités de l'Empire en temps de guerre."
 emperor_reichskrieg_title:0 "Guerre Impériale"
 emperor_reichskrieg_desc:0 "Mobiliser les forces de l'Empire contre tous ceux qui cherchent à le menacer !"
 emperor_imperial_estates_title:0 "Restreindre les États Impériaux"
 emperor_imperial_estates_desc:0 "Réduire les libertés des États Impériaux afin qu'ils ne soient plus en mesure de défier l'Empereur."

