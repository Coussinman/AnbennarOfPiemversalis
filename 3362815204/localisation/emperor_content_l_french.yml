 has_mil_advisor_3_tooltip:0 "Emploie un Conseiller §YMilitaire§! avec au moins Compétence §Y3§!."
 has_completed_all_reforms_trigger_tooltip:0 "A complété toutes les réformes gouvernementales."
 has_been_insulted_by_root:1 "A été insulté par §Y[Root.GetName]§!"
 #DHEs
 new_flavour_bav.12.t:0 "Ingolstadt : Une Cité de la Bière ?"
 new_flavour_bav.12.d:0 "Ingolstadt et ses environs ont traditionnellement produit du vin. Cependant, suivant la tendance d'autres parties de la Bavière, où la bière est préférée, un nombre croissant de brasseries ont été fondées dans la cité. Si nous le souhaitons, nous pourrions accorder notre soutien à ces brasseries naissantes et permettre à la bière de remplacer le vin comme principal produit d'exportation de la province."
 new_flavour_bav.12.a:0 "La bière est l'avenir."
 new_flavour_bav.12.b:0 "Le vin est la boisson supérieure."
 ingolstadt_beer_city:0 "Brasseries d'Ingolstadt"
 desc_ingolstadt_beer_city:0 "Un grand nombre de brasseries éminentes ont été établies dans et autour d'Ingolstadt, faisant de la cité l'un des principaux centres de brassage de bière bavaroise."
 new_flavour_bav.13.name:0 "La Succession Bavaroise"
 new_flavour_bav.13.desc:0 "Le Duché Wittelsbach de Bavière a été divisé en plusieurs parties depuis le milieu du XIVe siècle. À présent, le Duché est partagé entre trois branches différentes de la famille : celles de Munich, Landshut et Ingolstadt. Divers arrangements complexes régissent quelle branche de la famille devrait hériter des terres de tout Duc qui pourrait mourir sans héritier mâle. Cependant, ces arrangements ne sont pas toujours au-dessus de tout litige, et un Duc puissant pourrait tenter de s'agrandir avec les terres de ses parents, que sa prétention soit entièrement juste ou non."
 new_flavour_bav.13.opt:0 "Peut-être l'unité devrait-elle être restaurée en Bavière."
 new_flavour_bav.14.name:0 "La Mort de Ludwig VIII"
 new_flavour_bav.14.desc:0 "Ludwig VIII, le Duc Wittelsbach d'Ingolstadt sans héritier, est mort. Conformément aux arrangements de la famille Wittelsbach, le Duché d'Ingolstadt revient maintenant au [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 new_flavour_bav.14.opt:0 "Excellent."
 new_flavour_bav.15.name:0 "La Mort de Ludwig VIII"
 new_flavour_bav.15.desc:0 "Notre Duc, Ludwig VIII, est mort, ne laissant aucun héritier pour hériter de ses territoires. Conformément aux arrangements de la famille Wittelsbach, le Duché d'Ingolstadt revient maintenant au [LBV.Monarch.GetTitle] [LBV.Monarch.GetName] de Landshut."
 new_flavour_bav.15.opt:0 "Un état de fait malheureux."
 new_flavour_bav.16.name:0 "La Mort de Ludwig VIII"
 new_flavour_bav.16.desc:0 "Ludwig VIII, le Duc Wittelsbach d'Ingolstadt sans héritier, est mort. Conformément aux arrangements de la famille Wittelsbach, le Duché d'Ingolstadt revient maintenant au [LBV.Monarch.GetTitle] [LBV.Monarch.GetName] de Landshut."
 new_flavour_bav.16.opt:1 "Peut-être est-il temps de revendiquer Landshut."
 new_flavour_bav.17.name:0 "Les Prétentions de Ludwig VII"
 new_flavour_bav.17.desc:1 "Suite à la mort de Ludwig VIII d'Ingolstadt, le [LBV.Monarch.GetTitle] [LBV.Monarch.GetName] de Landshut a revendiqué les territoires d'Ingolstadt pour lui-même. Cependant, cela reviendrait à ignorer les prétentions de Ludwig VII, qui fut chassé de ses terres par son fils il y a quelques années et qui est depuis le prisonnier du [Root.Monarch.GetTitle] [Root.Monarch.GetName] à Ansbach. Ayant appris la mort de son fils, Ludwig VII fait du bruit pour reconquérir son ancien Duché. Cela pourrait nous offrir une chance de tirer quelque gain de cette affaire."
 new_flavour_bav.17.A:0 "Vendre Ludwig à ses ennemis en Bavière."
 new_flavour_bav.17.B:0 "Soutenir ses prétentions."
 new_flavour_bav.17.C:0 "Lui racheter ses droits sur le Duché."
 new_flavour_bav.171.name:0 "Ansbach Achète une Prétention à l'Héritage Wittelsbach"
 new_flavour_bav.171.desc:1 "Nous n'étions pas les seuls à avoir des droits sur Ingolstadt ; sans doute Ludwig VII, le père de Ludwig VIII qui fut chassé du duché par son fils, avait-il la meilleure prétention. Cependant, Ludwig a été retenu prisonnier par le [From.Monarch.GetTitle] [From.Monarch.GetName] d'Ansbach ces dernières années. Maintenant, le [From.GetAdjective] [From.Monarch.GetTitle] a utilisé [From.Monarch.GetHerHis] considérables talents de persuasion, et une importante somme d'argent, pour convaincre Ludwig de lui vendre [From.Monarch.GetHerHim] ses droits sur l'héritage Wittelsbach."
 new_flavour_bav.171.A:0 "Le Duché est et restera nôtre !"
 new_flavour_bav.18.name:0 "Le Mandat Religieux du [Root.Monarch.GetTitle] [Root.Monarch.GetName]"
 new_flavour_bav.18.desc:0 "La propagation rapide du protestantisme a alarmé nombre des conseillers fermement catholiques du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Pour empêcher sa propagation sur nos terres, ils ont rédigé un ensemble de règlements qui interdisent les enseignements hérétiques sur nos terres et combattent les déficiences religieuses tant parmi les évêques bavarois que parmi nos sujets. Une commission sera instituée pour effectuer des visites religieuses, l'impression ne sera autorisée qu'avec la permission du [Root.Monarch.GetTitle], et tout changement liturgique émanant de terres tombées aux mains des hérésies sera interdit. Bien que le clergé peine sous ces lourdes restrictions, elles seraient probablement efficaces pour empêcher la propagation des hérésies."
 new_flavour_bav.18.a:0 "Instituer le Mandat."
 new_flavour_bav.18.b:0 "Le Clergé doit garder les mains libres."
 new_flavour_bav.19.name:0 "La Barbe de Hanns Steininger"
 new_flavour_bav.19.desc:0 "La cité de Braunau s'est récemment distinguée d'une manière des plus inhabituelles. L'un de leurs anciens magistrats, un certain Hanns Steininger, a contribué à sa ville moins par sa perspicacité que par sa barbe. Ladite barbe était largement considérée comme un beau spécimen de pilosité faciale masculine, atteignant presque ses orteils (et il n'était pas un homme petit). Cependant, il était destiné à être victime du trait même qui le rendait remarquable : alors qu'il montrait son allégeance au [Root.Monarch.GetTitle] [Root.Monarch.GetName], qui passait par là, il trébucha sur sa barbe, tomba mal, et mourut par la suite de ses blessures, martyr de sa beauté présomptueuse !"
 new_flavour_bav.19.a:0 "Intéressant..."
 new_flavour_bav.20.name:0 "La Theatinerkirche"
 new_flavour_bav.20.desc:1 "[Root.Consort.GetTitle] [Root.Consort.GetName] exhorte le [Root.Monarch.GetTitle] [Root.Monarch.GetName] à s'engager à financer une magnifique église pour l'Ordre des Théatins à [Root.Capital.GetCapitalName] si un héritier du trône naît. Elle a déjà choisi un architecte bolonais, Agostino Barelli, pour construire l'église dans le style baroque italien. Notre aristocratie et nos riches bourgeois sont très séduits par les plans, qu'elle a laissé devenir largement connus, car ils sont de grands admirateurs du style italien à la mode. Devrions-nous faire comme elle le demande ?"
 new_flavour_bav.20.a:0 "Très bien, faisons comme elle le souhaite."
 new_flavour_bav.20.b:0 "Balivernes !"
 bav_religious_mandate_mod:0 "Le Mandat Religieux"
 desc_bav_religious_mandate_mod:0 "Nous avons institué des contrôles stricts régissant la pratique de la religion sur nos terres."
 bav_building_wife_church:0 "Les Plaisirs du Mariage"
 desc_bav_building_wife_church:0 "Il n'y a pas de meilleure façon de dire « je t'aime » que de construire une église à la demande de son épouse."
 bav_woman_scorned_mod:0 "Une Femme Offensée"
 desc_bav_woman_scorned_mod:0 "Il est imprudent de déplaire à son épouse quand on a besoin d'un héritier."
 new_flavour_bav.27.name:0 "[bavarian_lesser_union_member.GetName] Ronge son Frein sous le Danemark"
 new_flavour_bav.27.desc:1 "La noblesse bavaroise de [bavarian_lesser_union_member.GetName] en veut d'être gouvernée depuis le lointain Danemark. Elle aspire aux jours où elle pourrait, une fois encore, être gouvernée par l'un des siens.\n\nAu cours des derniers mois, il y a eu des signes qu'un complot était en cours, mais nos autorités n'ont pu confirmer ces rumeurs. Cependant, il ne peut plus y avoir de doute : un groupe de nobles rebelles se sont ralliés derrière Maximilien, un prince d'une branche obscure de la famille von Wittelsbach, et ont pris les armes contre nous, le déclarant leur Duc."
 new_flavour_bav.27.A:0 "Nous devons écraser cette rébellion !"
 #The Sale of Regensburg Chain
 new_flavour_bav.21.name:0 "Nos Dettes envers l'Empereur"
 new_flavour_bav.21.desc:0 "Au cours des dernières décennies, la cité de Ratisbonne a accumulé des dettes considérables envers l'Empereur [HAB.Monarch.Dynasty.GetName] du Saint Empire Romain. Bien qu'il n'ait pas encore exigé le remboursement de [HAB.Monarch.GetHerHis] créances, notre position est considérablement affaiblie par le fait qu'il pourrait le faire à tout moment."
 new_flavour_bav.21.A:0 "Nous devrions payer maintenant."
 new_flavour_bav.21.B:0 "Attendons que nos dettes soient réclamées."
 new_flavour_bav.22.name:0 "Les Dettes de Ratisbonne"
 new_flavour_bav.22.desc:0 "La guerre actuelle contre [emperors_enemy.GetUsableName] a mis à rude épreuve nos coffres. Nos conseillers soulignent que la cité de Ratisbonne nous doit une importante somme d'argent. Ils sont confiants que nous pouvons persuader la cité de payer en la menaçant de notre défaveur. Cependant, exiger une telle somme d'argent d'eux déstabilisera probablement le gouvernement de la cité, et la famille Wittelsbach, qui a des liens étroits avec la cité, pourrait intercéder en leur faveur."
 new_flavour_bav.22.A:0 "Ils doivent payer leurs dettes."
 new_flavour_bav.22.A.tooltip:0 "Si §YRatisbonne§! est en mesure de payer, nous recevrons :"
 new_flavour_bav.22.B:0 "Nous pardonnerons leurs transgressions financières."
 new_flavour_bav.23.name:0 "Les Dettes de Ratisbonne"
 new_flavour_bav.23.desc:0 "Au cours des dernières décennies, la cité de Ratisbonne a accumulé des dettes considérables envers l'Empereur [HAB.Monarch.Dynasty.GetName] du Saint Empire Romain. Maintenant, l'Empereur [HAB.Monarch.GetName] réclame le remboursement de [HAB.Monarch.GetHerHis] créances pour financer sa guerre contre [emperors_enemy.GetUsableName]. Cependant, étant donné notre lien étroit avec Ratisbonne, qui fut autrefois une capitale Wittelsbach, nous sommes en position d'intercéder. Si nous pouvons rassembler les fonds nécessaires pour rembourser leurs dettes, il serait tout à fait dans nos droits d'offrir à Ratisbonne de nous transférer leurs dettes, ce qui signifierait essentiellement que nous paierons leurs dettes en échange de leur liberté. Cependant, les Autrichiens pourraient voir de telles transactions d'un mauvais œil."
 new_flavour_bav.23.A:0 "Nous les renflouerons en échange de la cité."
 new_flavour_bav.23.A.tooltip:0 "Si §YRatisbonne§! accepte notre offre, les effets suivants se produiront :"
 new_flavour_bav.23.B:0 "Ils sont livrés à eux-mêmes."
 new_flavour_bav.23.B.tooltip:0 "D'autres souverains §YWittelsbach§! pourraient offrir leur soutien à §YRatisbonne§!."
 new_flavour_bav.24.name:0 "L'Empereur Exige le Paiement"
 new_flavour_bav.24.desc.default:0 "L'Empereur [HAB.GetAdjective], [HAB.Monarch.GetName], réclame le remboursement de [HAB.Monarch.GetHerHis] créances pour financer [HAB.Monarch.GetHerHis] guerre contre [emperors_enemy.GetUsableName]. [HAB.Monarch.GetSheHeCap] exige un paiement complet et immédiat. Nous devons soit payer soit manquer à nos obligations en tant que Ville Libre."
 new_flavour_bav.24.desc.wittelsbach:0 "L'Empereur [HAB.GetAdjective], [HAB.Monarch.GetName], réclame le remboursement de [HAB.Monarch.GetHerHis] créances pour financer [HAB.Monarch.GetHerHis] guerre contre [emperors_enemy.GetUsableName]. [HAB.Monarch.GetSheHeCap] exige un paiement complet et immédiat, menaçant de sanctions si nous manquons à nos obligations en tant que Ville Libre. Cependant, le [From.Monarch.GetTitle] Wittelsbach de [From.GetName] a proposé une troisième voie : [From.Monarch.GetSheHeCap] a accepté de payer nos dettes pour nous en échange de la reconnaissance de la prétention historique Wittelsbach sur la cité."
 new_flavour_bav.24.A:0 "Très bien, nous paierons."
 new_flavour_bav.24.B:0 "Nous ne pouvons pas payer ces dettes."
 new_flavour_bav.24.B.tooltip:0 "§RL'Empereur révoquera notre droit d'être une Ville Libre. L'Évêché de Ratisbonne prendra le contrôle de la cité.§!"
 new_flavour_bav.24.C:0 "Accepter l'offre de [From.GetName]."
 new_flavour_bav.24.C.player_warning_tooltip:0 "§RRatisbonne est entièrement annexée par [From.GetName].§!"
 new_flavour_bav.25.name:0 "Nos Dettes Pardonnées"
 new_flavour_bav.25.desc:0 "Un temps considérable s'est écoulé depuis que nous avons contracté des dettes envers l'Empereur, durant lequel il y a eu de nombreux changements d'Empereur et de politique impériale. En conséquence, la position de l'Empereur sur la question s'est adoucie. Notre [Root.Monarch.GetTitle], [Root.Monarch.GetName], a persuadé le [HAB.Monarch.GetTitle] [HAB.Monarch.GetName] de réduire nos dettes à un niveau plus gérable et de considérer le reste comme pardonné."
 new_flavour_bav.25.A:0 "Excellente nouvelle."
 new_flavour_bav.26.name:0 "Nos Dettes Pardonnées"
 new_flavour_bav.26.desc:0 "L'Empereur, [HAB.Monarch.GetName] de [HAB.GetName], un [HAB.Monarch.GetWomanMan] d'une sagesse infinie, a magnanimement choisi de nous pardonner nos dettes. Nous ne serons plus appelés à payer l'argent que nous devions dans le passé."
 new_flavour_bav.26.A:0 "Longue vie à l'Empereur !"
 opinion_regensburg_paid:0 "A payé ses Dettes"
 opinion_regensburg_no_money:0 "A pardonné les Dettes"
 opinion_regensburg_defaulted:0 "A manqué à ses Dettes"
 opinion_stole_free_city:0 "A annexé une Ville Libre"
 opinion_regensburg_demand_too_much:0 "Exigences Excessives"
 #Addition to old Brandenburg DHE
 flavor_brapru.25.a.tt2:0 "§RBayreuth ne sera plus gouverné depuis le Brandebourg.§!"
 #Saxon DHEs
 flavor_sax.4.name:0 "La Guerre Fratricide Saxonne"
 flavor_sax.4.desc:0 "Après la mort de l'oncle du [Root.Monarch.GetTitle] [Root.Monarch.GetName], Frédéric de Thuringe, les terres Wettin de Thuringe sont passées sous le règne de [Root.GetName]. Cependant, une dispute a rapidement éclaté entre le [Root.Monarch.GetTitle] et son frère, Guillaume, concernant la distribution équitable de ces terres. Selon la Division d'Altenbourg, un accord arbitré avec l'aide du Brandebourg et de la Hesse, les deux frères seraient co-souverains, avec [Root.Monarch.GetName] se voyant attribuer les territoires centraux de Meissen à l'est et Guillaume recevant le contrôle de la Thuringe.\n\nCependant, Guillaume conteste cet arrangement, exigeant plus de terres, la souveraineté de Wittenberg au minimum, menaçant de guerre dans le cas contraire."
 flavor_sax.4.A:0 "Nous ferions n'importe quoi pour notre cher frère."
 flavor_sax.4.B:0 "Scandaleux ! Que la guerre soit !"
 flavor_sax.6.name:0 "Les Princes Saxons pris en Otage"
 flavor_sax.6.desc:1 "Il semble que les tensions restent vives parmi la noblesse saxonne et thuringeoise suite à la guerre entre Frédéric et Guillaume. Un chevalier, Kunz von Kauffungen, qui a combattu du côté de Frédéric mais a été financièrement ruiné par le conflit, s'est allié à plusieurs chevaliers thuringiens mécontents et a ourdi un plan pour prendre les fils du [Root.Monarch.GetTitle] en otage afin d'obtenir un levier pour le chantage. Ils ont réussi à s'emparer des princes mais ont été appréhendés alors qu'ils cherchaient à franchir la frontière, les princes étant rendus sains et saufs à [Root.Capital.GetCapitalName]. Comment devons-nous traiter les traîtres ?"
 flavor_sax.6.A:0 "Qu'on leur coupe la tête !"
 flavor_sax.6.B:0 "Leur accorder l'amnistie."
 flavor_sax.7.name:0 "Les Princes Saxons pris en Otage"
 flavor_sax.7.desc:1 "Il semble que les tensions restent vives parmi la noblesse saxonne et thuringeoise suite à la guerre entre Frédéric et Guillaume. Un chevalier, Kunz von Kauffungen, qui a combattu du côté de Frédéric mais a été financièrement ruiné par le conflit, s'est allié à plusieurs chevaliers thuringiens mécontents et a ourdi un plan pour prendre les fils du [Root.Monarch.GetTitle] en otage afin d'obtenir un levier pour le chantage. L'acte a été un succès, et ils ont réussi à franchir la frontière vers [neighbour.GetUsableName], d'où ils ont émis une demande : 200 ducats ou les deux princes meurent."
 flavor_sax.7.A:0 "Payer."
 flavor_sax.7.B:0 "Nous ne payons pas les traîtres."
 flavor_sax.8.name:0 "Le Traité de Leipzig"
 flavor_sax.8.desc:0 "Avec la mort de Frédéric II, de nouvelles disputes de succession ont surgi concernant la succession saxonne, cette fois entre [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] frère Ernest. Selon les termes du testament de Frédéric, Ernest devrait recevoir les terres de Thuringe et gouverner indépendamment de [Root.Monarch.GetHerHis] [Root.Monarch.GetSisterBrother]. Cependant, [Root.Monarch.GetName] est en position de force et pourrait ignorer la volonté de [Root.Monarch.GetHerHis] père, si [Root.Monarch.GetSheHe] est disposé à en accepter les conséquences."
 flavor_sax.8.A:0 "Accepter le testament."
 flavor_sax.8.B:0 "Les terres saxonnes ne seront pas divisées !"
 flavor_sax.9.name:0 "L'Électorat Saxon"
 flavor_sax.9.desc:0 "Nos frères de Saxe ne gouvernent plus nos terres, mais ils détiennent toujours l'Électorat. Maintenant, avec notre démonstration de supériorité sur eux, et avec la bienveillance de l'Empereur apparemment assurée, l'occasion idéale se présente de pétitionner pour que ce tort historique soit réparé et pour que notre branche de la famille von Wettin reçoive le statut d'Électeur."
 flavor_sax.9.desc.emperor:0 "Nos frères de Saxe ne gouvernent plus nos terres, mais ils détiennent toujours l'Électorat. Maintenant, avec notre démonstration de supériorité sur eux, et avec notre autorité en tant qu'Empereur, l'occasion idéale se présente de réparer ce tort historique et pour que notre branche de la famille von Wettin reçoive le statut d'Électeur."
 flavor_sax.9.A:0 "Pétitionner l'Empereur !"
 flavor_sax.9.B:0 "L'Électorat sera nôtre."
 flavor_sax.9.C:0 "Cela n'en vaut pas la peine."
 flavor_sax.11.name:1 "La Thuringe Demande l'Électorat Saxon"
 flavor_sax.11.desc:0 "Notre allié, la Thuringe, a atteint la supériorité dans la lutte entre les Wettin et contrôle maintenant la Saxe. Il demande qu'un ancien tort soit réparé et que l'Électorat que la Saxe contrôlait jusqu'à présent lui soit transféré."
 flavor_sax.11.A:0 "Longue vie à l'Électeur de [From.GetUsableName] !"
 flavor_sax.11.B:0 "L'Électorat restera avec la Saxe."
 sax_grieving_death_of_sons:0 "En Deuil"
 desc_sax_grieving_death_of_sons:0 "Bien qu'il sache que le temps presse pour lui de produire un héritier, la perte de ses fils bien-aimés rend Frédéric réticent à s'engager dans d'autres aventures sentimentales."
 sax_really_bad_reputation:0 "Déshonorable"
 desc_sax_really_bad_reputation:0 "Ayant succombé à l'opportunisme et ignoré le Testament de son père, le Prince doit faire face aux répercussions que ses actions ont provoquées."
 #Ladislaus Postumus Union
 hun_ladislaus_postumus_warning_tooltip:0 "§REn tant qu'héritier de l'Autriche et de la Hongrie, si Ladislas le Posthume atteint sa majorité et hérite des deux trônes, la Hongrie sera gouvernée par l'Autriche sous Union Personnelle.§!"
 flavor_hab.21.name:0 "Archiduc d'Autriche, Roi de Hongrie"
 flavor_hab.21.desc:1 "Ladislas le Posthume, l'Archiduc d'Autriche, est maintenant le souverain reconnu de l'Autriche et de la Hongrie. Préférant gouverner depuis Vienne, il a adopté le titre d'Archiduc comme titre principal. Malgré les protestations de la noblesse hongroise, la Hongrie est donc maintenant gouvernée par l'Autriche sous une union personnelle."
 flavor_hab.21.A:0 "Longue vie à l'Archiduc Ladislas."
 flavor_hab.23.name:0 "La Diète de la Noblesse Hongroise et Croate"
 flavor_hab.23.desc:0 "La noblesse croate et hongroise s'est réunie en une diète improvisée, au cours de laquelle il a été convenu que les deux royaumes, ayant été gouvernés ensemble sous une union personnelle pendant des décennies, devraient désormais être considérés comme un seul afin de présenter un front uni face à leurs suzerains [Root.GetAdjective]. Le royaume de Croatie a donc été annexé par celui de Hongrie."
 flavor_hab.23.A:0 "Qu'il en soit ainsi."
 flavor_hab.24.name:0 "La Diète de la Noblesse Hongroise et Croate"
 flavor_hab.24.desc:1 "La noblesse croate et hongroise s'est réunie en une diète improvisée, au cours de laquelle il a été convenu que les deux royaumes, ayant été gouvernés ensemble sous une union personnelle pendant des décennies, devraient désormais être considérés comme un seul afin de présenter un front uni face à leurs suzerains [From.GetAdjective]. Nous avons donc annexé le royaume de Croatie."
 flavor_hab.24.A:0 "Excellent."
 #Neapolitan Republic
 new_flavour_nap.1.name:0 "Senatus Populusque Neapolitanus"
 new_flavour_nap.1.desc:0 "Le peuple est resté insatisfait de l'issue de la Révolte de Masaniello. Il s'est maintenant soulevé à nouveau, exigeant cette fois la liberté sous un gouvernement républicain. Ayant pris le contrôle de la cité, leur chef, Gennaro Annese, un armurier de grande ruse et bravoure qui était le cerveau derrière Masaniello, a déclaré la « Très Sérénissime République de ce Royaume de Naples », qui sera gouvernée par le S.P.Q.N., le Sénat et Peuple de Naples.\n\nLa noblesse est partagée entre la loyauté envers le [Root.Monarch.GetTitle] et le soutien à la république naissante. Quelle que soit notre réponse, le tumulte nous attend assurément !"
 new_flavour_nap.1.A:0 "Nous devons écraser ces rebelles !"
 new_flavour_nap.1.B:0 "Longue vie à la Sérénissime République !"
 new_flavour_nap.1.B.tooltip:0 "Les monarchies voisines seront inquiètes de la montée d'une puissante République dans le sud de l'Italie."
 new_flavour_nap.2.name:0 "Senatus Populusque Neapolitanus"
 new_flavour_nap.2.desc:0 "Excédé par les politiques fiscales sévères du [Root.Monarch.GetTitle] [Root.Monarch.GetName] et les déprédations du vice-roi [overlord_country.GetAdjective], le peuple de Naples s'est soulevé pour exiger la liberté sous un gouvernement républicain. Menés par Masaniello, un pêcheur très charismatique auparavant connu uniquement pour ses exploits à échapper au percepteur, et Gennaro Annese, un armurier qui est le cerveau derrière l'ascension de Masaniello, ils ont pris le contrôle de la cité et déclaré la « Très Sérénissime République de ce Royaume de Naples », qui sera gouvernée par le S.P.Q.N., le Sénat et Peuple de Naples.\n\nDes membres mécontents de la noblesse de la cité se sont ralliés pour soutenir la république naissante, et ceux ayant des connexions avec [rival_of_overlord.GetUsableName] ont organisé une délégation auprès du [rival_of_overlord.GetRulerAdjAndTitle] pour plaider le soutien à leur cause."
 new_flavour_nap.2.A:0 "Nous devons écraser ces rebelles !"
 new_flavour_nap.2.A.tooltip:0 "\nSi les rebelles brisent §Y[Root.GetName]§!, l'union entre §Y[overlord_country.GetName]§! et §Y[Root.GetName]§! sera rompue.\n"
 new_flavour_nap.3.A.tooltip:0 "\nSi les rebelles brisent §Y[From.GetName]§!, l'union entre §Y[overlord_country.GetName]§! et §Y[From.GetName]§! sera rompue.\n"
 new_flavour_nap.4.name:0 "Les Émissaires Républicains Napolitains"
 new_flavour_nap.4.desc:0 "Une délégation nous a rejoints depuis Naples, où un soulèvement populaire a conduit à l'établissement d'une république naissante qui est en rébellion contre notre rival, [overlord_country.GetUsableName]. Ils nous implorent de les aider contre le [overlord_country.GetRulerAdjAndTitle], sous le règne tyrannique duquel ils ont longtemps souffert. En effet, ils iraient jusqu'à offrir à l'un de nos propres nobles la position de « Signore », Seigneur de la République, en échange de notre soutien. Ce serait une excellente occasion d'affaiblir les [overlord_country.GetAdjective], si nous pouvons nous permettre d'engager les ressources."
 new_flavour_nap.4.A:0 "Nous soutiendrons la République Napolitaine."
 new_flavour_nap.4.A.tooltip:0 "\nSi les rebelles brisent §Y[From.GetName]§!, l'union entre §Y[overlord_country.GetName]§! et §Y[From.GetName]§! sera rompue.\n"
 new_flavour_nap.4.B:0 "Nous ne pouvons pas engager les fonds."
 new_flavour_nap.5.name:0 "Les Émissaires Républicains à [From.GetUsableName] Reviennent"
 new_flavour_nap.5.desc:0 "L'ambassade républicaine auprès du [From.GetRulerAdjAndTitle] est revenue. Ils rapportent avec joie que les [From.GetAdjective] enverront [Root.nap_foreign_republican.GetName], un membre de leur haute noblesse, à la tête d'une bande de mercenaires pour prendre le rôle de Seigneur de la République."
 new_flavour_nap.5.A:0 "Nous devons rassembler nos forces contre cette nouvelle menace !"
 new_flavour_nap.6.name:0 "Les Émissaires Républicains à [From.GetUsableName] Reviennent"
 new_flavour_nap.6.desc:1 "L'ambassade républicaine auprès du [From.GetRulerAdjAndTitle] est revenue, l'abattement clairement visible sur leurs visages : il n'y aura pas de soutien pour leur cause de ce côté-là."
 new_flavour_nap.6.A:0 "La [Root.GovernmentName] tiendra !"
 new_flavour_nap.7.name:0 "Ingérence [From.GetAdjective] à [From.From.GetUsableName]"
 new_flavour_nap.7.desc:0 "Les perfides [rival_of_overlord.GetAdjective] ont choisi de fournir leur soutien au soulèvement républicain à Naples ! À la demande des Napolitains, ils ont envoyé [From.From.nap_foreign_republican.GetName], un membre de leur haute noblesse, à la tête d'une bande de mercenaires pour prendre le rôle de Seigneur de la République. Nous devons rassembler nos forces contre cette nouvelle menace !"
 new_flavour_nap.7.A:0 "Ils paieront pour cela."
 new_flavour_nap.8.name:0 "Senatus Populusque Neapolitanus"
 new_flavour_nap.8.desc:0 "Grâce à notre soutien, les républicains napolitains ont brisé l'État et déclaré la Très Sérénissime République du Royaume de [From.GetName], avec notre homme, [From.Monarch.GetName] comme leur [From.Monarch.GetTitle]. Avec de la chance, cela inaugurera une nouvelle période d'influence [Root.GetAdjective] sur [From.GetName]."
 new_flavour_nap.8.A:0 "Excellent."
 establish_a_republic:0 "Établir une République"
 establish_a_republic_desc:0 "Les Républicains exigent l'établissement d'un système de gouvernance républicain pour $COUNTRYNAME$."
 opinion_against_nap_republic:0 "Contre la République Napolitaine"
 nap_republican_rebels_title:0 "Républicain"
 nap_republican_rebels_name:0 "Républicains de $COUNTRY$"
 nap_republican_rebels_desc:0 "Les rebelles républicains visent à renverser le régime et à le remplacer par une forme de gouvernance républicaine. Ils sont menés par des bourgeois désillusionnés et des membres de la noblesse en disgrâce auprès du régime actuel."
 nap_republican_rebels_army:0 "Rebelles Républicains"
 opinion_supported_republican_uprising:0 "A soutenu le Soulèvement Républicain Napolitain"
 opinion_sponsors_of_republican_uprising:0 "Parrains du Soulèvement Républicain Napolitain"
 opinion_supported_republican_uprising_overlord:0 "A soutenu le Soulèvement Républicain Napolitain"

 #Savoyard DHEs
 new_flavour_sav.3.name:0 "Le Royaume de Chypre"
 new_flavour_sav.3.desc.firstruler:0 "Les Sarrasins de [infidels_of_cyprus.GetUsableName] ont conquis Chypre, éliminant l'un des derniers bastions de la chrétienté au Moyen-Orient et mettant fin au règne de la dynastie de Lusignan, qui durait depuis le XIIe siècle.\n\nCependant, la lignée des Lusignan n'est pas entièrement éteinte. Par le mariage du [Root.Monarch.GetTitle] [Root.Monarch.GetName] avec la Princesse chypriote, Anne de Lusignan, nous avons une prétention dynastique légitime au Royaume de Chypre qui ne peut être contestée maintenant que la lignée principale est éteinte : [Root.Heir.GetName] héritera du royaume, si nous pouvons l'arracher des mains des infidèles."
 new_flavour_sav.3.desc.notfirstruler:0 "Les Sarrasins de [infidels_of_cyprus.GetUsableName] ont conquis Chypre, éliminant l'un des derniers bastions de la chrétienté au Moyen-Orient et mettant fin au règne de la dynastie de Lusignan, qui durait depuis le XIIe siècle.\n\nCependant, la lignée des Lusignan n'est pas entièrement éteinte. Par le mariage de notre ancêtre le Duc Ludovico Ier avec la Princesse chypriote, Anne de Lusignan, nous avons une prétention dynastique légitime au Royaume de Chypre qui ne peut être contestée maintenant que la lignée principale est éteinte. Si seulement nous pouvons arracher l'île des mains des infidèles, nous pourrons légitimement revendiquer nos droits sur le royaume."
 new_flavour_sav.3.A:0 "Chypre sera nôtre."
 new_flavour_sav.5.name:0 "L'Anti-Pape Félix V"
 new_flavour_sav.5.desc:1 "Le père de Ludovico Ier, Amédée VIII, a renoncé à sa position de Duc de Savoie en 1440 afin de devenir l'Anti-Pape Félix V en opposition au Pape Eugène IV. Cependant, il n'a pas été très couronné de succès dans son rôle d'Anti-Pape, n'ayant gagné le soutien que d'un petit groupe de dissidents au sein de l'Église catholique. Étant donné le manque d'influence diplomatique du groupe de Félix, il est donc tentant de considérer nos liens avec le Pape à [PAP.Capital.GetName] plus importants que les liens familiaux et de le désavouer. Cependant, le soutien à l'Anti-Pape pourrait devenir un point de ralliement pour notre peuple contre l'adversité étrangère."
 new_flavour_sav.5.A:0 "Pour la justice, pour le Pape Félix V !"
 new_flavour_sav.5.B:1 "Le vrai Pape est celui qui réside actuellement à [PAP.Capital.GetName]."
 sav_supports_antipopes_justice:0 "Justice de l'Antipape"
