 institute_prussian_republic_title:0 "Instituer la République prussienne"
 institute_prussian_republic_desc:0 "La République prussienne ne doit pas être basée sur des élections populistes ou un népotisme élitiste, mais sur le pur mérite militaire. La hiérarchie militaire deviendra la hiérarchie d'État : nous serons une armée avec un État."
 emp_mission_events.1.t:0 "Cession d'Avignon"
 emp_mission_events.1.d:0 "Le [From.Monarch.GetTitle] de [From.GetName] a demandé que la ville d'Avignon lui soit cédée. Avignon a une longue histoire de signification ecclésiastique, étant par exemple le foyer des antipapes d'Avignon. Il a été difficile pour l'État ravélien d'administrer la ville en raison de sa distance et de sa déconnexion des autres domaines rectoraux, nous devrions donc considérer sérieusement cette proposition."
 emp_mission_events.1.a:0 "Nous acceptons de céder Avignon à [From.GetName]"
 emp_mission_events.1.b:0 "Nous ne céderons jamais Avignon !"
