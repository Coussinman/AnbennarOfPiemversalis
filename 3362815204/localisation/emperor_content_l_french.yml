 great_peasants_war_concessions_triggered_modifier:0 "Concessions à la Paysannerie"
 desc_great_peasants_war_concessions_triggered_modifier:0 "La Grande Guerre des Paysans a contraint l'Empire à reconsidérer les droits de la paysannerie. Un certain nombre de concessions ont été accordées et d'anciens privilèges garantis, entraînant une capacité diminuée à extraire des richesses de leur labeur."
