 flavor_orl.4.t:0 "Le Procès en révision de Jeanne d'Arc"
 flavor_orl.4.d:0 "La mère de Jeanne d'Arc, avec le soutien de [Root.GetName], a pétitionné Sa Sainteté pour ordonner une enquête sur le procès de sa fille. Une inquisition a méticuleusement examiné le procès de 1431 et après de nombreuses audiences, l'a innocentée de toutes les charges. Jeanne d'Arc est maintenant considérée comme une martyre de l'Église ravélienne et son juge a été déclaré hérétique."
 flavor_orl.4.o.a:0 "[Root.Monarch.GetName] est vraiment le premier-né de l'Église"
 flavor_orl.6.t:0 "Des Protestants détruisent la statue de Jeanne d'Arc"
 flavor_orl.6.d:0 "Une foule de protestants a renversé une statue proéminente de Jeanne d'Arc à Orléans. Il semblerait que son symbole soit de plus en plus associé à la lutte contre « l'hérésie » que le ravélianisme mène contre la Réforme. Peut-être devrions-nous faire quelque chose pour apaiser les tensions ?"
 flavor_orl.6.o.a:0 "Comment osent-ils ? Reconstruisez cette statue !"
 flavor_orl.6.o.b:0 "Montrons de la tolérance, reconstruisons la statue"
 flavor_orl.6.o.c:0 "Il est temps que ce symbole disparaisse"
 flavor_orl.8.t:0 "La Ligue ravélienne accueille notre soutien"
 flavor_orl.8.d:0 "La Ligue ravélienne a utilisé Jeanne d'Arc comme cri de ralliement dernièrement, ce qui a poussé [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] à nous envoyer une délégation pour nous accueillir personnellement dans leur faction. [Emperor.Monarch.GetSheHeCap] n'avait aucun doute que le pays de Jeanne d'Arc choisirait le camp de Dieu dans le conflit contre la Réforme. Nous avons bien sûr partagé la bonne nouvelle avec nos soldats pour renforcer leur moral."
 flavor_orl.8.o.a:0 "Nous ne faisons que l'œuvre de Dieu"
 flavor_orl.10.t:0 "La Canonisation de Jeanne d'Arc"
 flavor_orl.10.d:0 "Après des années de pétition au Saint-Siège, le Cardinal d'Orléans a finalement convaincu Sa Sainteté [PAP.Monarch.GetName] de déclarer Jeanne d'Arc sainte de l'Église ravélienne. Le peuple [Root.GetAdjective] est désormais assuré pour toujours que Dieu se tiendra à leurs côtés dans leurs heures les plus sombres."
 flavor_orl.10.o.a:0 "Sainte Jeanne d'Arc, j'aime ce nom"
 flavor_orl.11.t:0 "L'Ordre militant de Sainte Jeanne"
 flavor_orl.11.d:0 "Un ordre local de religieuses ravéliennes dédié à Sainte Jeanne d'Arc est venu nous apporter les nouvelles les plus singulières. Elles affirment que puisqu'il a fallu une pieuse jeune fille pour sauver [Root.GetName] des Anglais, alors qui pourrait être plus efficace pour combattre les ennemis de [Root.GetName] qu'un ordre militant de religieuses ? Elles s'appellent l'« Ordre de Notre Dame Martyrisée » et sont prêtes à combattre pour nous."
 flavor_orl.11.o.a:0 "Nous pourrions les utiliser."
 flavor_orl.11.o.a.t:0 "La compagnie de mercenaires §YOrdre de Sainte Jeanne§! devient disponible pour nous."
 flavor_orl.11.o.b:0 "Une vie de sœur pour moi !"
 retrial_of_joan_of_arc_title:0 "Le Destin de Jeanne d'Arc"
 retrial_of_joan_of_arc_desc:0 "Jeanne d'Arc a retourné la marée de la Guerre de Cent Ans en sauvant Orléans et en faisant couronner le Roi Charles à Reims. Nous pourrions faire bon usage d'elle comme symbole national, mais nous devons d'abord laver son nom des allégations de sorcellerie et d'hérésie."
 rebuilt_joan_of_arc_statue_catholic:0 "Statue de Jeanne d'Arc reconstruite"
 desc_rebuilt_joan_of_arc_statue_catholic:0 "Nous nous sommes assurés que tous voient que Jeanne d'Arc reste un symbole de la lutte contre l'hérésie."
 rebuilt_joan_of_arc_statue_protestant:0 "Statue de Jeanne d'Arc reconstruite"
 desc_rebuilt_joan_of_arc_statue_protestant:0 "Que cette statue reste un rappel pour tous que nous acceptons tous les chrétiens dans notre royaume."
 destroyed_joan_of_arc_statue_catholic:0 "Statue de Jeanne d'Arc détruite"
 desc_destroyed_joan_of_arc_statue_catholic:0 "Jeanne d'Arc était un symbole d'intolérance religieuse, nous ne devrions pas l'encourager."
 destroyed_joan_of_arc_statue_protestant:1 "Statue de Jeanne d'Arc détruite"
 desc_destroyed_joan_of_arc_statue_protestant:0 "Jeanne d'Arc était un symbole d'oppression ravélienne que nous devrions tous oublier."
 joan_of_arc_catholic_league_symbol:0 "Symbole de la Ligue ravélienne"
 desc_joan_of_arc_catholic_league_symbol:0 "La Ligue ravélienne utilise notre Jeanne d'Arc comme symbole de la lutte contre la Réforme."
 joan_of_arc_beatified:0 "Jeanne d'Arc béatifiée"
 desc_joan_of_arc_beatified:0 "Jeanne d'Arc a été déclarée sainte par l'Église ravélienne. Que ce soit un rappel pour nous tous que Dieu viendra à notre secours dans les moments désespérés."
