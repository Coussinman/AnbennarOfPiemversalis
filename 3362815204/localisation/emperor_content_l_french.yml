 bullion_famine.1.t:0 "La Grande Famine de Métal Précieux"
 bullion_famine.1.d:1 "Nous payons souvent en or pour importer soie, alun, épices et perles de l'Orient. À mesure que le commerce entre l'Est et l'Ouest devient plus fréquent, le déficit d'or à Cannor devient plus apparent. L'or est devenu une denrée de plus en plus rare dans notre monde, mais la demande pour ces luxes n'a pas diminué. Si nous pouvions accéder à une source d'or hors de Cannor, nous mettrions fin à cette famine de métal précieux."
 bullion_famine.1.a:0 "Nous devrions commencer à chercher de l'or avant les autres."
 bullion_famine.1.tooltip:0 "La première puissance chrétienne cannorienne à sécuriser une nouvelle source d'or en récoltera de grands bénéfices."
 bullion_famine.2.t:0 "De l'Or Trouvé à [nonCannorian_gold_province.GetName]"
 bullion_famine.2.d:1 "Nos explorateurs ont voyagé au plus profond de territoires inexplorés pour chercher de l'or en terres étrangères. Nous y sommes enfin parvenus. La mine d'or a été découverte à [nonCannorian_gold_province.GetName]. Cette découverte mettra certainement fin à la famine de métal précieux qui afflige Cannor."
 bullion_famine.2.a:0 "Nous avons trouvé de l'or à [nonCannorian_gold_province.GetName] !"
 bullion_gold_mining:0 "Frapper l'Or"
 desc_bullion_gold_mining:1 "Notre peuple a trouvé de l'or en terres étrangères."
 geneva_liberty_opinion:0 "Désir d'Indépendance"
 geneva_liberty_desire:0 "Désir d'Indépendance"
