 release_imperial_tt:1 "§YChaque Province§! dans l'EoA possédée par la §YBourgogne§! sera §Ylibérée§! en tant que §YPrinces de l'EoA§!."
 demand_lowlands_tt:0 "Exiger que les §YPays-Bas§! soient libérés en tant que §YPrinces de l'EoA§!."
 east_frisia_empire_tt:0 "La §YFrise Orientale§! fera partie de l'Empire d'Anbennar\nLe type de gouvernement devient une §YMonarchie§!."
