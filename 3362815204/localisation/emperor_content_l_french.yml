 mission_to_civilize_reform_desc:0 "Notre mission est de rechercher les pauvres primitifs égarés à travers le monde et de leur enseigner la voie appropriée pour aligner leurs vies afin qu'eux aussi puissent nous rejoindre dans notre divinité."
 mission_to_kill_pirates_reform:0 "Mission en Haute Mer"
 mission_to_kill_pirates_reform_desc:0 "Les mers sont remplies de païens et de scélérats pillant les navires de commerce et de transport des honnêtes fidèles de notre foi. Il est devenu évident que les pèlerins ne seront jamais en sécurité pour visiter les lieux saints sous notre protection si nous ne faisons pas de notre mission sacrée l'élimination de la menace pirate en haute mer !"
 loyal_nobility_reform:0 "Noblesse Divine"
 loyal_nobility_reform_desc:0 "Il y a dans notre royaume ceux qui naissent avec un sang divin ; choisis par les forces saintes de ce monde pour diriger et gouverner. Bien que le chef de notre État soit une position non héréditaire, nous devons élever ceux nés avec un sang divin à des positions de direction au sein de notre nation."
 pious_merchants_reform:0 "Dîme Marchande"
 pious_merchants_reform_desc:0 "Répandre la seule vraie foi est un travail coûteux, et nos marchands ont des poches bien garnies qui s'avéreraient utiles à la foi si nous élevions ces hommes riches à des positions de pouvoir au sein de l'État."
 monastic_breweries_reform:0 "Brasseries Monastiques"
 #monastic_breweries_reform_desc:1 "In the Catholic faith, the consumption of alcohol for the clergy is associated with the dedication of the priests to hard labor, humility and the honor of God's nature. So, many Catholic Monasteries fill their treasuries with the profits made from brewing wine, mead, and ale, going as far as to make a name for the quality of their products."
 #Anbennar overwrite monastic breweries for yinquan
 monastic_breweries_reform_desc:1 "Le brassage du Mijiu est considéré comme d'une importance capitale à Yinquan, car cette boisson est la préférée des Huli-Jing et l'État paie donc richement les Servantes de Liho pour la brasser. Une part significative de la production agricole du pays a été réservée à la création de Mijiu, l'excédent étant vendu aux paysans. L'agriculture étant traitée comme une affaire commerciale, la production dépasse largement ce qu'elle serait autrement."
 warrior_monks_reform:0 "Intégration des Sohei"
 warrior_monks_reform_desc:0 "À travers le monde oriental, il existe de puissants ordres de moines formés tant aux voies de la prière qu'aux arts martiaux. Si nous permettons à ces moines de construire des temples sur nos terres, ils deviendront partie intégrante de l'État et renforceront grandement la discipline et la conviction de nos armées."
 partial_secularisation_reform:0 "Sécularisation Partielle"
 partial_secularisation_reform_desc:0 "Bien que la religion sera toujours au cœur de notre administration, certains secteurs de notre gouvernement doivent être sécularisés si nous voulons nous adapter à ce monde en mutation."
 conciliarism_reform:0 "Embrasser le Conciliarisme"
 conciliarism_reform_desc:0 "Le Conciliarisme insiste sur le fait que c'est le Concile Mondial, et non le Grand Recteur, qui détient la souveraineté suprême sur notre pays. En acceptant cela comme vérité dans notre foi et notre administration, nous pouvons vastement étendre le pouvoir des Véridicaux et empêcher la Papauté de tomber sous influence étrangère."
 clerical_commission_reform:0 "Commission Cléricale"
 clerical_commission_reform_desc:0 "Nous devrions diviser les pouvoirs de l'État entre notre chef religieux et une commission de clercs. Cette commission sera chargée de maintenir la paix dans notre nation et de mener les affaires diplomatiques au nom de notre dirigeant."
 divine_guidance_reform:0 "Guidance Divine"
 divine_guidance_reform_desc:0 "Le peuple questionne si nous devrions diviser le pouvoir dans notre nation, mais le pouvoir est déjà divisé. Le véritable chef de notre État est de nature divine, et sa volonté est interprétée par notre dirigeant ici sur Terre."
 theocratic_democracy_reform:0 "Démocratie Théocratique"
 theocratic_democracy_reform_desc:0 "Nous sommes les plus divins de tous, mais nous ne devons jamais oublier la divinité inhérente trouvée même chez le plus humble des roturiers. En permettant à nos paysans d'élire leurs propres représentants, nous leur permettons d'avoir leur propre voix à la cour du divin."
 regionally_elected_commanders:0 "Commandants Élus Régionalement"
 regionally_elected_commanders_desc:0 "Dans notre gouvernement, le successeur du dirigeant actuel est décidé par un vote des guerriers qui ont dédié leurs vies à protéger la Foi. En permettant aux citoyens des villes et villages sous notre protection de participer à l'élection du Commandant qui représente leurs intérêts, nous pouvons commencer à étendre notre administration et faire en sorte que ceux sous notre protection se sentent représentés de manière précise à la Cour des Commandants."
 monastic_elections_reform:0 "Élections Publiques Ouvertes"
 monastic_elections_reform_desc:1 "De nombreux villages sous notre protection exigent une représentation, et bien qu'ils soient des sots qui ne comprennent pas que notre gouvernement est divin, nous devons leur accorder quelques concessions si nous voulons les garder satisfaits. Traditionnellement, seule l'élite du Clergé votait pour le nouveau chef de notre gouvernement, mais en ouvrant les élections au public et en établissant deux nouvelles subdivisions de notre gouvernement pour lesquelles le peuple peut voter, ils peuvent sentir que leurs intérêts sont représentés par l'État."
 commander_king_reform:1 "Une Théocratie Dynastique"
 commander_king_reform_desc:1 "La foi jouera toujours un rôle vital dans notre État, mais il devient clair que notre gouvernement n'est pas assez adaptable pour gouverner de vastes étendues de terre et fonctionner dans ce monde en mutation. Il n'y a aucune raison pour que nos hommes de foi doivent se vouer au célibat et en réorganisant notre État en une Théocratie Dynastique et en accordant à nos dirigeants des titres royaux, nous deviendrons protecteurs de la foi et de la couronne, guidés par notre Roi Théocratique."
 admiral_king_reform:0 "Seigneurs de la Mer"
 admiral_king_reform_desc:1 "Le bon travail que nos soldats ont accompli pour assurer un passage sûr aux pèlerins à travers la mer a fait de nos voiles un spectacle redouté des pirates et des païens. Cependant, il est devenu clair que la menace que les pirates représentent pour notre foi va bien au-delà de nos petites côtes, et nous devons étendre notre gouvernement pour devenir un Empire en soi si nous voulons servir correctement notre mission sacrée. En promulguant une série de réformes au sein de notre gouvernement, nous étendrons vastement notre administration au-delà de nos frontières et nos vaillants Chevaliers éliront tous les futurs commandants en fonction du nombre de seigneurs pirates qu'ils auront fait plier le genou devant Dieu !"
 church_and_state_reform:0 "Église et État"
 church_and_state_reform_desc:0 "La foi et l'État sont les deux piliers qui soutiennent le monde. Nos lois sont des lois saintes et elles ne peuvent être remises en question."
 religious_harmony_reform:0 "Âme et Corps"
 religious_harmony_reform_desc:0 "Nous ne devons jamais oublier que les barrières de culture et de langue ne sont qu'une illusion. Nous ne sommes tous que de simples âmes habitant une enveloppe. Peu importe la langue que nous parlons, seul compte que nous servions le divin de la manière appropriée."
 god_and_man_reform:0 "Dieu et l'Homme"
 god_and_man_reform_desc:0 "La seule relation qui compte est celle entre les humbles mortels et les esprits saints immortels. Notre État existe simplement pour rappeler aux gens les voies appropriées pour se dévouer à la prière."
 organising_our_religion_reform:0 "Organiser Notre Foi"
 organising_our_religion_reform_desc:0 "Nous sommes un État hautement organisé orienté autour d'une foi qui est elle-même hautement désorganisée. En tentant d'établir une hiérarchie officielle pour notre religion, nous pouvons commencer à convertir plus de fidèles aux vraies voies des Dieux."
 religion_in_one_country_reform:0 "Un Seul État Sous Dieu"
 religion_in_one_country_reform_desc:1 "Notre foi et notre État sont devenus totalement synonymes l'un de l'autre. Nous sommes notre religion, et quiconque se dévoue au divin doit aussi se dévouer à l'État."
 religious_permanent_revolution_reform:0 "La Croisade Mondiale"
 religious_permanent_revolution_reform_desc:0 "Ce monde est plein d'hérétiques, de païens, de pécheurs et de blasphémateurs ! Nous devons chercher à corriger hérétiques et païens, et répandre nos voies pacifiques par la force !"
 world_crusade_tt:0 "Cela débloquera la capacité d'utiliser le §YCasus Belli de Grande Guerre Sainte§!, vous permettant d'imposer votre religion même aux §YPaïens§! voisins. \nAvec la réforme §YMission Civilisatrice§!, les nations §YPaïennes§! non frontalières peuvent être ciblées par la §YGrande Guerre Sainte§!. \nAvec l'idée §YDeus Vult§!, les nations non frontalières peuvent être ciblées par la §YGrande Guerre Sainte§!."
 many_fingers_of_god_reform:0 "Les Nombreux Doigts de Dieu"
 many_fingers_of_god_reform_desc:0 "Nous croyons qu'il n'y a qu'un seul Dieu, par qui nous vivons et par qui nous mourons, et pour qui nous avons un cœur droit. Mais comme Dieu nous donne les différents doigts de la main, ainsi donne-t-il aux hommes diverses voies pour l'approcher."
 priestly_autonomy_reform:0 "Autonomie Sacerdotale"
 priestly_autonomy_reform_desc:0 "Aucun prêtre ne devrait détenir pouvoir sur un autre prêtre, à l'exception de notre dirigeant. Chaque royaume sera pleinement autonome, et les prêtres resteront libres d'interpréter la volonté des Dieux de toute manière qui leur soit vraie."
 proclaim_religious_head_reform:0 "Proclamer le Chef Religieux"
 proclaim_religious_head_reform_desc:0 "Nous avons organisé notre foi et nous sommes maintenant prêts à imiter les païens au-delà de nos frontières en proclamant le chef de notre État comme détenant également la direction suprême sur l'ensemble de notre foi !"
 all_under_tengri_reform:0 "Tout Sous Tengri"
 all_under_tengri_reform_desc:0 "Tout ce qui est sous le ciel est sous Tengri, et tout ce qui est sous Tengri nous appartient. Avec le grand aigle planant haut dans les cieux, nous ne nous reposerons pas tant que le monde entier ne sera pas amené à plier le genou devant Tengri !"
 liberte_reform:0 "Idéaux de Liberté"
 liberte_reform_desc:0 "La Liberté est l'école de pensée au sein de la Révolution qui affirme que tout individu devrait avoir le droit divin de faire tout ce qu'il souhaite qui ne nuit pas ou ne restreint pas la liberté des autres."
 egalite_reform:0 "Idéaux d'Égalité"
 egalite_reform_desc:0 "Ceux qui croient aux idéaux d'Égalité croient que la loi, qu'il s'agisse d'une règle ou d'un droit, s'applique également à toutes les personnes, indépendamment de la foi, de la classe sociale, de la culture et du genre. De même, tous les citoyens devraient avoir accès à tous les postes de notre gouvernement uniquement sur la base de leurs compétences."
 fraternite_reform:0 "Idéaux de Fraternité"
 fraternite_reform_desc:0 "Tout le monde ne reconnaît pas les idéaux de Fraternité comme un idéal de la Révolution, mais les considèrent comme un élément réactionnaire au sein de notre propre État qui souhaite revenir à l'ancien gouvernement. La Fraternité est un sens de la camaraderie et ceux qui suivent ses principes croient que l'État devrait suivre une voie autoritaire où il y a une place appropriée pour tous les citoyens assignée par l'État."
 legislative_assembly_reform:0 "Assemblée Législative"
 legislative_assembly_reform_desc:0 "Avec l'effondrement de l'ancien gouvernement, nous avons l'opportunité de reconstruire un nouveau gouvernement législatif qui traite toutes les personnes, indépendamment de leur classe sociale, comme égales. Ce gouvernement sera absolument engagé envers les idéaux de la Révolution, et ne tolérera pas ceux qui souhaitent nous soumettre à nouveau à l'ancien régime."
 national_constituent_reform:0 "Assemblée Constituante"
 national_constituent_reform_desc:0 "L'Assemblée Constituante était une ébauche de démocratie fournie par l'ancien gouvernement qui gouvernait le peuple en trois constituantes distinctes. En construisant et en développant l'ancien gouvernement plutôt qu'en le refondant avec le nouveau, nous pouvons prouver aux gouvernements réactionnaires à nos frontières que nous sommes toujours une nation civilisée et une force pour le bien dans ce monde en mutation."
 feuillant_reform:0 "Le Système Feuillant"
 feuillant_reform_desc:0 "Il y a de nombreux citoyens et politiciens dans la République qui souhaitent retourner à la tyrannie d'une monarchie absolue. Cependant, le groupe politique Feuillant croit en un compromis : que les pouvoirs dans la nation devraient être partagés entre un Empereur et un Président, similaire à une monarchie constitutionnelle. En chevauchant le délicat équilibre entre Empire et République, nous pourrions en fait satisfaire à la fois les Impérialistes et les Républicains au sein de notre nation."
 two_chamber_reform:0 "Le Système Bicaméral"
 two_chamber_reform_desc:0 "Pendant longtemps, le système cantonal a maintenu la paix, la stabilité et l'indépendance de petites ligues démocratiques comme les Fédérations Suisse et Souabe. En divisant similairement notre législature en un Grand Conseil représentant les Cantons, et le Sénat représentant la république dans son ensemble, nous pouvons protéger les intérêts des villes individuelles et des identités culturelles au sein de notre nation tout en plaçant les valeurs de la Révolution au-dessus de tout !"
 absolute_president_reform:0 "Pouvoir Absolu du Président"
 absolute_president_reform_desc:0 "Bien que nous ayons des membres de notre nation élus pour représenter le peuple de leur circonscription, nous ne devons jamais oublier que c'est le Président qui a été élu pour représenter tout le peuple. Le rôle des représentants élus au sein de la Révolution devrait être simplement de conseiller le Président qui détient le pouvoir absolu sur la République."
 revolutionary_council_reform:0 "Un Conseil Révolutionnaire"
 revolutionary_council_reform_desc:0 "Il est devenu clair que le culte de la personnalité entourant notre dirigeant nous ramène rapidement aux anciennes méthodes de gouvernement. Nous ne pouvons permettre cela, donc en concentrant le pouvoir dans un conseil d'individus élus pour représenter les valeurs de la Révolution, nous retirons le pouvoir de l'individu à la tête de notre État et créons un autre bouclier contre l'horreur du pouvoir absolu."
 revolutionary_principle_reform:0 "Principe Révolutionnaire"
 revolutionary_principle_reform_desc:0 "Le but de notre État est assez simple : répandre la Révolution. Nous devons centraliser notre État autour de l'idée que ce n'est qu'en libérant tous les peuples du monde en États Révolutionnaires que nous pouvons créer un état permanent de paix et d'égalité dans le monde."
 equality_principle_reform:0 "Principe d'Égalité"
 equality_principle_reform_desc:0 "Bien que notre État tienne l'Égalité comme l'une de ses valeurs fondamentales, il est clair que nous avons complètement échoué dans notre objectif de traiter tout notre peuple avec équité et égalité. Le principe fondamental de notre nation doit être d'éliminer les barrières de genre, de culture et de classe sociale et de s'assurer qu'il est connu que toutes les personnes sont créées égales, et un bon début serait de s'assurer que la religion reste une affaire privée et ne dicte pas les droits de chacun au sein de l'État."
 imperial_principle_reform:0 "Principe Impérial"
 imperial_principle_reform_desc:0 "La Révolution a rendu clair que notre nation, par-dessus toutes les autres, détient le droit divin à l'Hégémonie Impériale sur toutes les autres nations. Les États autour de nous sont fragiles et faibles, et il est clair que ce n'est qu'en contrôlant directement ces États nous-mêmes que nous assurerons que les valeurs de la Révolution sont appliquées sur le peuple."
 equal_electorate_reform:0 "Électorat Égal"
 equal_electorate_reform_desc:0 "Nous devons dissoudre toutes les barrières qui séparent notre peuple et étendre le droit de détenir une fonction politique à toutes les personnes. Le genre, la religion, la classe sociale, la culture, tout est sans rapport avec la capacité de quelqu'un à détenir une fonction politique et nous devons donc nous efforcer de maintenir l'égalité des chances au sein de notre gouvernement."
 three_classes_reform:0 "Trois Classes Sociales"
 three_classes_reform_desc:0 "Dans les jours avant la naissance de la Révolution, l'ancien gouvernement a tenté de dissuader le peuple de prendre les armes en permettant à trois classes sociales une représentation au sein du gouvernement : le clergé, les paysans et la classe supérieure. Peut-être pourrions-nous imiter ce système en organisant notre peuple en une classe supérieure, moyenne et inférieure basée sur leur statut économique et en créant trois entités politiques distinctes au sein de notre gouvernement pour représenter leurs intérêts."
 military_electorate_reform:0 "Électorat Militaire"
 military_electorate_reform_desc:0 "Notre nation valorise la camaraderie par-dessus tout, et personne n'exemplifie la valeur d'être un camarade comme nos garçons combattant sur les champs de bataille. Ce sont les hommes qui ont vu les horreurs de la guerre et combattu aux côtés de leurs compatriotes pour préserver et faire avancer la Révolution, et ces hommes devraient être ceux qui nous gouvernent. Nous devons modifier les conditions pour détenir une fonction dans notre gouvernement afin que seuls ceux qui ont servi dans notre armée soient éligibles pour représenter le peuple au sein du gouvernement."
 president_for_life_reform:0 "Président à Vie"
 president_for_life_reform_desc:0 "Bien que de nombreux politiciens révolutionnaires soutiennent l'idée d'un Empire Révolutionnaire avec un dirigeant héréditaire à sa tête, d'autres résistent farouchement à cette idée et affirment qu'elle trahit les idéaux mêmes de la Révolution. Le Président est souverain, et nul ne peut supplanter l'autorité de la Présidence. En élisant nos Présidents pour gouverner à vie, nous assurerons à la fois le leadership absolu que les Impérialistes exigent sans abandonner complètement les idéaux de la République."
 government_for_people_reform:0 "Gouvernement pour le Peuple"
 government_for_people_reform_desc:0 "Égalité, Fraternité, Liberté. Les trois vertus de la République pointent vers une chose : que la République existe pour servir son peuple, et pour aucune autre raison. Nous ne nous rendrons jamais aux Impérialistes, et le Président servira toujours son mandat avec l'unique objectif de protéger la liberté et l'égalité de notre peuple."
 become_rev_empire_reform:0 "Un Empire Révolutionnaire"
 become_rev_empire_reform_desc:0 "Même dans une République alimentée par les feux de la Révolution, il devient clair que des dynasties politiques s'établissent dans notre nation. Notre Président souhaite se couronner Empereur et continuer à répandre les idéaux de la Révolution, avec la dignité impériale revendiquant la souveraineté sur tous les peuples."
 legion_of_honor_reform:0 "La Légion d'Honneur"
 legion_of_honor_reform_desc:1 "Maintenant que nous avons réorganisé la révolution en un Empire héréditaire, nous devons enrôler nos compatriotes les plus célèbres pour légitimer notre règne impérial. La Légion d'Honneur sera un ordre de Chevaliers, d'Officiers et de Commandeurs auxquels la Cour Impériale accordera des positions de grand prestige."
 imperial_nobility_reform:0 "Noblesse de l'Empereur"
 imperial_nobility_reform_desc:0 "La majorité de l'ancienne Noblesse de notre nation étant maintenant enterrée sans tête dans des fosses communes, le temps est venu de rétablir notre Noblesse dans une structure plus conforme aux objectifs de l'Empire. En assignant des titres nobiliaires presque entièrement aux loyalistes et aux membres de la famille impériale, nous assurerons que la Noblesse n'agira jamais en dehors des intérêts de la Couronne."
 imperial_decree_reform:0 "Décret Impérial"
 imperial_decree_reform_desc:0 "L'Empereur règne en maître suprême dans cette nation et la déloyauté envers l'Empereur équivaut à la déloyauté envers la Révolution. Tous les décrets émis par l'Empire le sont bien sûr dans l'intérêt du peuple, de la Révolution et de l'Empire, et la déloyauté ne restera pas impunie."
 consulate_reform:0 "Un Consulat Loyal"
 consulate_reform_desc:0 "Avec la chute du gouvernement républicain au sein de la Révolution, il est vite devenu clair qu'un nouveau système était nécessaire pour continuer la propagation de la révolution. Le Consulat a comblé ce vide, et peut-être qu'en faisant avancer les pouvoirs du Consulat et en renvoyant libéralement quiconque s'oppose au règne de l'Empereur, nous consoliderons notre emprise sur toutes nos possessions impériales."
 emperor_of_the_revolution_reform:0 "Empereur de la Révolution"
 emperor_of_the_revolution_reform_desc:0 "Notre État est le foyer de la Révolution, et notre Empereur en est la tête. Il n'est donc que naturel que nous couronnions notre Empereur comme l'Empereur de tous ceux qui sont loyaux à la Révolution et que nous rallions le peuple autour de sa cause divine."
 enlightened_monarchy_reform:0 "Une Monarchie Éclairée"
 enlightened_monarchy_reform_desc:0 "Les idéaux des Lumières sont le fondement même de la pensée révolutionnaire, et tant que notre Empereur n'embrasse pas véritablement les idéaux des Lumières, il ne représente pas les valeurs de la Révolution. Beaucoup diraient qu'une monarchie héréditaire trahit en soi les idéaux de la Révolution, mais une combinaison d'un monarque absolu et de la pensée des Lumières assurera que nul ne peut s'opposer aux idéaux de notre État."
 become_rev_republic_reform:0 "Retour à la République Révolutionnaire"
 become_rev_republic_reform_desc:0 "L'Empire a servi son but de faire avancer les besoins du peuple par un gouvernement absolu. Maintenant que notre mission est accomplie, nous devrions rendre nos pouvoirs au peuple pour lequel nous avons tant combattu pour le libérer et lui permettre de choisir son propre destin."
 consolidate_power_in_cities_reform:0 "Disperser le Pouvoir à Travers les Cités"
 consolidate_power_in_cities_reform_desc:0 "Notre gouvernement est un étrange mélange entre une République, une Oligarchie et une Monarchie. Le commerce est notre préoccupation principale et nous ne sommes pas intéressés à bâtir un empire mondial, seulement à faire un empire du commerce. Si nous fragmentons les pouvoirs dans notre nation et accordons un plus grand contrôle aux Cités Marchandes, nous rendrons notre ligue commerciale beaucoup plus invitante pour les petites puissances qui ne désirent que la liberté et la stabilité économique que nous pouvons fournir."
 consolidate_power_in_doge_reform:0 "Consolider le Pouvoir Exécutif"
 consolidate_power_in_doge_reform_desc:0 "Pendant des années, notre République a eu sa base de pouvoir divisée entre l'Exécutif, le Conseil, les citoyens et d'innombrables autres organes législatifs. Chacun est sujet aux autres, mais l'Exécutif siège au sommet de la hiérarchie. Notre système gouvernemental lâche a été utile jusqu'à présent pour faire avancer nos efforts commerciaux, mais alors que notre nation s'étend à travers le monde, il est devenu clair que nous devons accorder à l'Exécutif le pouvoir total sur toutes les branches du gouvernement si nous voulons éliminer la corruption dans notre administration."

 TTL_ideas:0 "Idées des Trois Ligues"
 TTL_ideas_start:0 "Traditions des Ligues"
 TTL_ideas_bonus:0 "Ambition des Trois Ligues"
 ttl_league_system:0 "Le Système des Ligues"
 ttl_league_system_desc:0 "Notre État est une fédération décentralisée de Ligues, toutes unies dans leur objectif de neutralité et de paix. Nous ne souhaitons pas ensanglanter notre sol avec le sang d'hommes étrangers, mais plutôt permettre aux étrangers de s'entre-tuer pendant que nous collectons les profits. En tant que tel, il est vital que les Cantons au sein de notre nation soient capables de maintenir des relations positives avec toutes les nations voisines. Cependant, ce style de gouvernement décentralisé peut s'avérer difficile à maintenir à mesure que notre nation s'étend."
 ttl_gods_house:0 "La Ligue de la Maison-Dieu"
 ttl_gods_house_desc:0 "La Maison-Dieu est une ligue de puissants évêques et de Cantons unis dans leur objectif de résister à l'Évêché de Coire et au pouvoir croissant des princes Habsbourg au sein de notre nation. La préoccupation principale de cette ligue est de s'assurer que les Cantons restent hors des mains des Habsbourg et restent fidèles à la seule vraie parole de Dieu."
 ttl_grey_league:0 "La Ligue Grise"
 ttl_grey_league_desc:0 "Cette ligue est née du conflit et s'est efforcée de l'atténuer et d'y mettre fin partout où c'était possible. La ligue a été formée lorsque de nombreux comtes, barons et évêques voisins ont commencé à devenir de plus en plus hostiles. La Ligue Grise a mis fin à ces hostilités et continue de garder tous les Cantons en son sein hors de conflit direct avec les puissances étrangères."
 ttl_league_of_ten:0 "La Ligue des Dix"
 ttl_league_of_ten_desc:0 "Lorsque la dynastie de Toggenburg s'est éteinte, les dix districts de Toggenburg se sont unis en une seule ligue afin de pouvoir continuer à jouir de leur indépendance. La Ligue des Dix a rejoint les Trois Ligues pour ne pas être forcée de retourner à la servitude d'un Comte, c'est pourquoi l'esprit de notre mode de vie indépendant vit le plus vivement dans la Ligue des Dix."
 ttl_independent_cities:0 "Cités Indépendantes"
 ttl_independent_cities_desc:0 "Les Trois Ligues ne sont pas une nation ; c'est plutôt une fédération de cités, d'évêchés et de Cantons unis dans leur désir de rester indépendants. En tant que tel, la ligue elle-même exige très peu sous forme de tribut de ses États membres, mais également les États membres attendent peu de contribution en retour."
 ttl_economic_league:0 "Une Ligue Économique"
 ttl_economic_league_desc:0 "En plus de se réunir en temps de guerre, les Trois Ligues se sont également rencontrées pour assurer leur coopération économique. En coordonnant les contrats de mercenaires en temps de guerre et les accords commerciaux en temps de paix, les ligues ont pu maximiser leurs profits, que le monde autour d'elles prospère dans la paix ou brûle dans la guerre."
 ttl_expanding_league:0 "Étendre les Ligues"
 ttl_expanding_league_desc:0 "Il est devenu clair que notre mode de vie est grandement menacé par les autres puissances de Cannor. Notre indépendance et notre neutralité ne seront pas respectées si nous n'avons pas le pouvoir de les faire respecter. Ce n'est qu'en étendant la ligue pour inclure plus de nations indépendantes que nous pouvons continuer à jouir de notre autonomie partagée."
 teutonic_legacy:0 "Héritage des Chevaliers Teutoniques"
 teutonic_legacy_desc:0 "Bien que notre État soit maintenant entièrement sécularisé, nous ne devons jamais oublier qu'il a été bâti sur les restes de l'Ordre Teutonique. Ces chevaliers, unis dans leur foi, se sont établis ici en Prusse pour défendre le monde chrétien contre les païens barbares à l'Est, et nous aussi devrions faire de notre devoir de répandre la réformation dans tous les coins de notre nation et devenir unis dans les vrais enseignements du Christ !"
 soldier_king:0 "Le Roi-Soldat de Prusse"
 soldier_king_desc:0 "La plupart des États sont des pays qui ont une armée, la Prusse en revanche est une armée qui a un pays. Les nombreux Rois de Prusse étaient autant soldats que monarques, et chacun terminerait son règne non seulement en ayant réformé l'État mais aussi en ayant laissé sa marque sur l'armée."
 BRA_ideas:0 "Idées Brandebourgeoises"
 BRA_ideas_start:0 "Traditions Brandebourgeoises"
 BRA_ideas_bonus:0 "Ambition Brandebourgeoise"
 northern_march:0 "Marche du Nord"
 northern_march_desc:0 "Aux premiers jours de l'Empire, la région du Brandebourg était peuplée et gouvernée par des tribus slaves, jusqu'à ce que l'Empereur crée la Marche du Nord pour subjuguer et civiliser la région. Cette Marche du Nord a finalement évolué en Brandebourg ; l'une des régions les plus prospères de l'Empire. Ce n'est que grâce à la fortitude de nos soldats que nous avons pu dompter et sécuriser cette terre de sauvages."
 bra_pomeranian_wars:0 "Guerres de Poméranie"
 bra_pomeranian_wars_desc:0 "Tout au long de l'ère médiévale, les Margraves de Brandebourg et les Ducs de Poméranie se sont trouvés en guerre constante pour le contrôle de la région. Finalement, les Brandebourgeois furent victorieux lorsque le Traité de Stettin fut signé, partitionnant la région entre le Brandebourg et le Royaume de Suède."
 seat_of_the_old_emperors:0 "Siège des Anciens Empereurs"
 seat_of_the_old_emperors_desc:0 "Avant la domination des Habsbourg, l'empire était véritablement diversifié dans les familles qu'il élisait, et le Brandebourg était souvent un grand prix distribué aux princes talentueux de ces lignées royales. Le Brandebourg représente les anciennes voies, et peut-être pourrons-nous un jour utiliser notre position pour restaurer les idéaux de l'Empire d'Anbennar."
 iron_tooth:0 "Dent de Fer"
 iron_tooth_desc:0 "Durant ses trente ans comme Électeur de Brandebourg, Frédéric II a gagné le surnom de « Dent de Fer » tant pour sa volonté de fer face aux nobles et aux villes rebelles, que pour sa fortitude dans les Guerres de Poméranie. Son règne a laissé une marque sur notre nation, une marque qui instille un sens de fierté et de loyauté même chez le plus humble paysan du Brandebourg."
 margrave_council:0 "Geheimer Rat für die Kurmark"
 margrave_council_desc:0 "Le pouvoir du Margrave est grandement menacé par le pouvoir sans cesse croissant de nos États. Les États sont d'un grand bénéfice pour notre nation, mais la menace très réelle qu'ils représentent pour notre base de pouvoir nécessite la création d'un nouveau conseil, un qui réduise le pouvoir très réel que les états détiennent sur notre nation en une position plus consultative pour le Margrave. De cette façon, nous pouvons continuer à exploiter les bénéfices de nos États tout en ayant peu à nous soucier de leurs besoins."
 GNV_ideas:0 "Idées Genevoises"
 GNV_ideas_start:0 "Traditions Genevoises"
 GNV_ideas_bonus:0 "Ambition Genevoise"
 gnv_grand_council:0 "Le Grand Conseil"
 gnv_grand_council_desc:0 "Genève est gouvernée par un Grand Conseil sans chef formel. La version originale du conseil était le « Conseil des Deux-Cents » qui avait deux cents sièges et gouvernait le pays de manière lâche et indirecte. Ce style autonome de gouvernement a été respecté et maintenu que Genève ait été indépendante, gouvernée sous une monarchie, ou membre de la Fédération Suisse, et notre autonomie a apporté une grande prospérité à Genève elle-même."
 gnv_neutral_grounds:0 "Terrain Neutre"
 gnv_neutral_grounds_desc:0 "Tout au long de notre histoire, Genève a été un terrain totalement neutre dans les conflits autant que possible. En tant que tel, nous avons acquis une réputation positive auprès de nos voisins qui savent que chaque fois que des questions de conflit et de discorde doivent être discutées, Genève est le terrain idéal pour organiser des négociations."
 gnv_home_of_calvin:0 "Patrie de Jean Calvin"
 gnv_home_of_calvin_desc:0 "Alors que Jean Calvin répandait ses croyances à travers Cannor, il trouva un havre sûr à Genève où il établit une demeure permanente. De là, les croyances du Calvinisme se répandirent et inspirèrent de nouvelles religions à travers Cannor ; d'aussi loin que les Pays-Bas et l'Écosse. Qui exemplifie mieux les valeurs de l'Église Réformée que Genève ?"
 gnv_spiritual_leader:0 "Chef Spirituel de Genève"
 gnv_spiritual_leader_desc:0 "À mesure que l'influence de Calvin à Genève grandissait, le Grand Conseil créa et lui donna le titre de « Chef Spirituel ». Ce titre accordait à Calvin un contrôle complet sur toutes les affaires religieuses dans l'État, et séparait les pouvoirs séculiers du conseil des pouvoirs spirituels de l'église."
 gnv_calvins_laws:0 "Les Lois de Calvin"
 gnv_calvins_laws_desc:0 "En tant que Chef Spirituel, Calvin apporta des changements drastiques aux lois religieuses à Genève. Alors que Genève avait été précédemment neutre dans la réformation protestante, les lois de Calvin assurèrent Genève comme partisan de la réformation."
 gnv_unconquerable_city:0 "Cité Imprenable"
 gnv_unconquerable_city_desc:0 "L'histoire de Genève est caractérisée en partie par les efforts incessants des ducs de Savoie pour soumettre notre cité. Nous tenons fermement notre indépendance contre les aspirants tyrans de Savoie, et le Grand Conseil continuera à refuser et résister aux efforts de la Savoie pour subjuguer notre cité sous la domination féodale. Bien que nous ayons souvent vécu sous l'influence d'une puissance étrangère, nous ne rejoindrons une autre nation que si c'est de notre propre choix et à nos propres conditions."
 gnv_armed_neutrality:0 "Neutralité Armée"
 gnv_armed_neutrality_desc:0 "Si nous voulons continuer à jouir de notre liberté et de notre neutralité, nous aurons besoin d'une armée qui croit absolument aux idéaux de Genève et qui est prête à mourir pour protéger notre nation. Nous nous sommes défendus contre des probabilités écrasantes d'innombrables fois dans le passé, et nous continuerons à le faire à l'avenir."
 FER_ideas:0 "Idées Ferraraises"
 FER_ideas_start:0 "Traditions Ferraraises"
 FER_ideas_bonus:0 "Ambition Ferraraise"
 FER_papal:0 "Reconnaissance Rectorale"
 FER_papal_desc:0 "Pendant très longtemps, Ferrare n'était qu'un simple sujet d'autres duchés et républiques italiens, mais lorsque nous nous sommes déclarés duché indépendant, notre revendication a été renforcée par le Grand Recteur lui-même ! Plusieurs ducs successifs de notre lignée seraient couronnés par Sa Sainteté, et ce sont nos relations étroites avec la voix de Dieu ici sur Terre qui font de la lignée royale de Ferrare véritablement le peuple élu de Dieu."
 FER_culture:0 "Centre de Culture"
 FER_culture_desc:0 "De nombreux compositeurs et artistes viennent à Ferrare de partout dans le monde ; des Flandres, de France, de Hollande, et des innombrables États de l'Empire. Les œuvres de ces grands artistes ont laissé un impact immense sur Ferrare et ont transformé notre cité en un grand centre des arts et de la culture que toute l'Italie viendra à envier."
 FER_alfonso:0 "Réformes d'Alphonse Ier"
 FER_alfonso_desc:0 "Durant le règne d'Alphonse Ier, de nombreuses grandes réformes furent apportées à l'armée ferraraise. Alphonse était un ingénieur et un mécène des arts, et son expertise en ingénierie s'avéra utile pour faire de Ferrare la plus grande puissance d'artillerie de toute l'Italie."
 FER_margrave_of_este:0 "Margraves d'Este"
 FER_margrave_of_este_desc:0 "Aux premiers jours de notre histoire en tant que Duché indépendant, Ferrare fut accordée à l'Empereur comme Fief Impérial par les États du Rectorat. La Maison d'Este fut choisie par Dieu et l'Empereur pour diriger Ferrare, et c'est notre reconnaissance irréfutable par ces entités divines qui nous permettra de gouverner sans conflit."
 FER_resisting_venice:0 "Résister au Contrôle Vénitien"
 FER_resisting_venice_desc:0 "Les Vénitiens détiennent une emprise de fer sur le commerce de l'Italie orientale, et en tant que tel nous nous trouvons en conflit presque constant avec la république. Nous avons été choisis par Dieu pour protéger l'Italie des entités séculières comme la république vénitienne, et peut-être qu'en commerçant plus agressivement que les Vénitiens, nous pouvons arracher le contrôle du commerce à ces sauvages."
 FER_este_castle:0 "Château d'Este"
 FER_este_castle_desc:0 "Quel meilleur moyen de sécuriser notre règne qu'avec un château puissant et impénétrable ? Contrairement aux hideux châteaux d'autres nations qui existent simplement pour défendre leur peuple, les châteaux de Ferrare doivent être embellis et resplendissants ; une demeure digne du nom de famille d'Este."
 FER_ferraran_arsenal:0 "L'Arsenal Ferrarais"
 FER_ferraran_arsenal_desc:0 "À Venise existe un arsenal conçu purement pour produire des navires de guerre en masse. C'est une méthode de guerre grossière et non civilisée, et nous à Ferrare comprenons que ce n'est pas la quantité de navires qui nous fera gagner la guerre, mais la grandeur de leurs conceptions. L'Arsenal Ferrarais doit exister pour faire de grandes constructions, des bateaux individuels assez forts pour renverser des flottes entières de nations moindres !"
 URB_ideas:0 "Idées Urbinates"
 URB_ideas_start:0 "Traditions Urbinates"
 URB_ideas_bonus:0 "Ambition Urbinate"
 URB_italian_wars:0 "Les Guerres d'Italie"
 URB_italian_wars_desc:0 "L'Italie est un sous-continent qui se trouve en conflit et en lutte presque constants. Les divers duchés, princes et républiques rivalisent toujours pour la domination sur la péninsule italienne, tandis qu'Urbino reste en sécurité dans le giron des États du Rectorat. Notre position de sûreté et de sécurité laisse beaucoup de place au profit alors que nos fameuses armées de condottieri parcourent l'Italie à la recherche des contrats de mercenaires les plus lucratifs pour ramener le butin de guerre à Urbino."
 URB_condot_kings:0 "Rois Condottieri"
 URB_condot_kings_desc:0 "De nombreuses nations à travers la péninsule italienne génèrent leurs revenus en louant des condottieri, mais à Urbino c'est un mode de vie pour nos monarques. Beaucoup de nos Ducs acquièrent une réputation non seulement d'excellents dirigeants mais deviennent également des légendes en tant que généraux Condottieri."
 URB_ducal_palace:0 "Le Palais Ducal d'Urbino"
 URB_ducal_palace_desc:0 "La cité d'Urbino baigne dans l'ombre du grand Palais Ducal d'Urbino. Le palais est un symbole de notre idéologie : notre système de cour idéal, notre piété et nos traditions humanistes. Parmi les nombreuses caractéristiques de ce palais se trouvent deux grandes chapelles, l'une dédiée à Dieu et au Christ, et l'autre dédiée aux Muses du Paganisme Hellénistique ; un lieu où ceux qui embrassent nos enseignements humanistes peuvent rendre leurs respects à notre glorieux passé."
 URB_humanist_court:0 "Une Cour Humaniste"
 URB_humanist_court_desc:0 "Le Duc Federico da Montefeltro, bien qu'il ait juré fidélité aux États du Rectorat, a cherché à embrasser les idéaux humanistes et a rassemblé une cour considérable d'humanistes au Palais Ducal d'Urbino. Sa cour ne se composait que de ceux qui étaient prêts à embrasser l'Humanisme de la Renaissance, apprenant des grands philosophes de l'ère classique, et mettant de côté le zèle en faveur du rationalisme."
 URB_book_of_courtier:0 "Le Livre du Courtisan"
 URB_book_of_courtier_desc:0 "Suite à l'invention de l'imprimerie, une fiction détaillant les interactions entre les divers courtisans du Duché d'Urbino fut publiée. Le livre est un guide d'instruction sur la façon d'être le courtisan idéal pour plaire à son propre suzerain et établit Urbino comme l'icône de la vie de cour idéaliste."
 URB_papal_loyalty:0 "Loyauté Rectorale"
 URB_papal_loyalty_desc:0 "Sa Sainteté le Grand Recteur détient une influence à travers tout le monde ravélien, mais Urbino ne jure fidélité qu'à sa sainteté et à nul autre. En tant que loyaux serviteurs de Dieu, nous reconnaissons le Grand Recteur comme le chef d'État officiel d'Urbino, et en tant que tel nous aussi gagnons beaucoup d'influence au Rectorat et grandissons unis dans notre foi."
 URB_light_of_italy:0 "La Lumière de l'Italie"
 URB_light_of_italy_desc:0 "L'adoption de la Renaissance est un grand outil pour notre nation, et ici dans notre grande capitale nous avons construit peut-être la bibliothèque la plus complète de toute l'Italie en dehors de la bibliothèque du Vatican elle-même. Peut-être que si nous continuons à faire croître et à nourrir notre grande collection, nous pourrions même faire grandir notre collection plus grande encore que l'ancienne bibliothèque d'Alexandrie !"
 BLG_ideas:0 "Idées Bolonaises"
 BLG_ideas_start:0 "Traditions Bolonaises"
 BLG_ideas_bonus:0 "Ambition Bolonaise"
 BLG_etruscan:0 "Origines Étrusques"
 BLG_etruscan_desc:0 "Les Étrusques étaient le plus grand rival de Rome aux premiers jours de la République romaine. Établie à l'origine comme la cité de Velzna o Felzna, la cité de Bologne existait en tant que sujette de l'État étrusque jusqu'à ce qu'elle s'élève au statut de cité-état sous le nom de Felsina et mène une campagne pour civiliser les tribus celtes au Nord."
 BLG_bentivoglio:0 "Famille Bentivoglio"
 BLG_bentivoglio_desc:0 "Bien que nous soyons explicitement une république, il y a toujours eu une famille dominant la République Bolonaise : la famille Bentivoglio. Ses membres ont contrôlé la république pendant presque un siècle et ont le soutien du peuple. Le prestige et le respect exigés par la famille Bentivoglio les élèvent presque au statut d'une famille royale, mais nous ne devrions jamais abandonner nos racines républicaines."
 BLG_papal_rebellion:0 "Rébellion Contre la Papauté"
 BLG_papal_rebellion_desc:0 "La famille Bentivoglio a combattu sans crainte contre la tyrannie des États du Rectorat pour assurer l'indépendance de Bologne. Bien que nous ayons finalement été vaincus, les cicatrices de ce que les États du Rectorat ont fait à notre nation restent profondes et nous n'oublierons jamais ce que l'église ravélienne nous a fait et nous ne nous engagerons jamais envers aucun officiel du Vatican."
 BLG_la_grassa:0 "La Grassa"
 BLG_la_grassa_desc:0 "La cité de Bologne a gagné de nombreux surnoms pour son architecture et sa culture. La Grassa (la grasse) fait référence à la cuisine fameusement riche de la cité. Alors que la plupart des cités italiennes sont connues pour les arts de la peinture et de l'écriture, les artistes de Bologne s'expriment plutôt à travers la viande, le fromage, les tomates et le beurre. De nombreux plats sont devenus synonymes de la cité et ont donné à Bologne une culture alimentaire unique sans pareille ailleurs sur la péninsule italienne."
 BLG_la_rossa:0 "La Rossa"
 BLG_la_rossa_desc:0 "La Rossa est le surnom attribué à Bologne pour la rougeur de nos bâtiments. Nos châteaux, manoirs et églises sont tous d'un rouge iconique qui en est venu à impressionner quiconque vient visiter la cité. La rougeur est devenue une sorte de symbole de patriotisme à Bologne, et en tant que tel nos urbanistes n'approuveront aucune nouvelle construction à moins qu'elle ne soit de la couleur rouge flamboyante passionnée du reste de la cité."
 BLG_la_turrita:0 "La Turrita"
 BLG_la_turrita_desc:0 "La Turrita ou « la Hérissée de Tours » fait référence aux innombrables tours défensives de la cité dispersées à travers la cité de Bologne. Les tours nous gardent à l'abri des envahisseurs et servent d'excellentes positions défensives en cas d'armées envahissantes."
 BLG_la_dotta:0 "La Dotta"
 BLG_la_dotta_desc:0 "Le dernier surnom attribué à notre cité est La Dotta. L'Université de Bologne a été fondée en 1088 et depuis, Bologne est un grand centre d'apprentissage pour tout Cannor. C'était l'une des premières universités d'Italie et il n'a pas fallu longtemps pour qu'elle devienne l'une des plus prestigieuses, à tel point qu'elle a valu à Bologne le surnom de « la savante »."
 MAN_ideas:0 "Idées Mantouanes"
 MAN_ideas_start:0 "Traditions Mantouanes"
 MAN_ideas_bonus:0 "Ambition Mantouane"
 MAN_free_city:0 "Cité Impériale Libre de Mantoue"
 MAN_free_city_desc:0 "Mantoue a d'abord gagné son indépendance lorsque l'Empereur lui-même nous a accordé le statut de Cité Libre. Bien que nous soyons maintenant un comté impérial avec notre propre famille royale, les liens entre notre nation et l'Empire sont profonds et pourraient s'avérer assez avantageux, si jamais notre lignée était élue à la dignité impériale."
 MAN_studiolo:0 "Le Studiolo de la Comtesse"
 MAN_studiolo_desc:0 "Bien qu'un cabinet serait habituellement réservé uniquement aux hommes, la Comtesse de Mantoue a établi son propre studiolo qui est devenu célèbre à Mantoue. C'était son lieu d'apprentissage et de méditation centré autour de l'école de pensée humaniste, et peut-être que de nombreuses autres jeunes femmes brillantes à Mantoue suivront l'exemple de la comtesse et adopteront les pratiques de l'art et de l'apprentissage."
 MAN_noble_clergy:0 "Clercs Nobles"
 MAN_noble_clergy_desc:0 "La famille Gonzague a maintenu des liens étroits avec le clergé tout au long de son histoire et continuera à le faire aussi longtemps que Mantoue existera. Dans notre histoire, il y a eu de nombreux membres de notre famille qui ont été nommés cardinaux et évêques, au point où notre famille royale existe presque entièrement au sein de la classe cléricale. Ces liens étroits avec le clergé réduisent leur influence en tant qu'entité indépendante, et assurent leur loyauté continue."
 MAN_walls:0 "Les Murs de Gonzague"
 MAN_walls_desc:0 "Au XIVe siècle, les grands murs de Mantoue furent construits par la famille Gonzague pour protéger Mantoue des forces hostiles de Milan et de Venise. Les murs serviront à rendre notre nation impénétrable, et nos armées défendant les portes garderont notre nation heureuse et en sécurité."
 MAN_soldiers:0 "Soldats pour la Protection"
 MAN_soldiers_desc:0 "Nous sommes petits en taille et sujets à l'influence de puissances étrangères ; cependant la force et la discipline de nos troupes nous ont rendus plus utiles comme alliés qu'une cible de guerre. Pour maintenir notre indépendance, nous avons continuellement déployé nos troupes pour être utilisées dans des guerres étrangères en échange de protection, et cela a façonné les hommes de Mantoue en guerriers féroces."
 MAN_royal_ties:0 "Liens Royaux Mantouans"
 MAN_royal_ties_desc:0 "À travers une série de négociations astucieuses et habiles, nous avons marié notre famille à certaines des familles royales les plus puissantes de Cannor. De l'Espagne à l'Autriche en passant par Naples, on a du mal à trouver une cour qui ne soit pas influencée par un membre de notre famille royale."
 MAN_mercenary_princes:0 "Princes Mercenaires"
 MAN_mercenary_princes_desc:0 "C'est une pratique courante à Mantoue que l'héritier du comté serve comme chef militaire et acquière une expertise dans l'art de la guerre avant de s'élever pour diriger en tant que Comte. Bien que cette pratique mette nos héritiers potentiels en grand danger, elle nous sert certainement bien en faisant de tous nos futurs dirigeants d'excellents commandants militaires."
 PGA_ideas:0 "Idées Pérugines"
 PGA_ideas_start:0 "Traditions Pérugines"
 PGA_ideas_bonus:0 "Ambition Pérugine"
 PGA_herculanus:0 "Saint Herculanus"
 PGA_herculanus_desc:0 "Herculanus de Pérouse était un évêque chrétien loyal à Pérouse qui a vaillamment défendu la cité contre les sauvages envahisseurs ostrogoths au VIe siècle. Il a tenté de tromper les envahisseurs en donnant le dernier sac de grain à un agneau faible, pour leur faire croire que la cité avait de vastes réserves de nourriture et pouvait résister à un siège. Les Ostrogoths réussirent leur invasion de Pérouse malgré tout, et les soldats firent décapiter le sage Herculanus. Miraculeusement cependant, quatre jours après que sa tête eut commencé à pourrir et à se décomposer, elle fut réunie avec son corps et Herculanus passa le reste de ses jours à christianiser le Royaume Ostrogoth. Ce récit de persévérance et de ruse symbolise l'endurance de notre peuple, et servira d'exemple sur la façon de résister aux envahisseurs pour les générations à venir."
 PGA_umbrian_hegemony:0 "Hégémonie Ombrienne"
 PGA_umbrian_hegemony_desc:0 "Bien que la majorité de l'Ombrie soit détenue par les États du Rectorat, Pérouse se trouve au cœur même de la politique ombrienne et est un symbole de l'identité ombrienne. Bien que de nombreux Ravéliens de la région afflueraient vers les États du Rectorat, ceux d'inclination plus séculière ressentent une plus grande parenté avec notre grande nation."
 PGA_five_conclaves:0 "Réunion des Cinq Conclaves"
 PGA_five_conclaves_desc:0 "Sous la domination vaticane, Pérouse est devenue le lieu de réunion des Cinq Conclaves Rectoraux, et est même devenue connue comme la Papauté Pérugine. De nombreux Grands Recteurs notables ont été élus à Pérouse, dont : Clément IV, Célestin V et Clément V. Malgré une forte influence rectorale cependant, Pérouse a toujours refusé l'annexion pure et simple par les États du Rectorat et continuera à agir comme terrain neutre pour la politique rectorale."
 PGA_signoria:0 "Signoria Pérugine"
 PGA_signoria_desc:0 "Dans sa première histoire, Pérouse s'est trouvée en lutte politique constante. Les conflits entre la noblesse et la paysannerie ont presque déchiré notre nation, et après la mort du Seigneur Biordo Michelotti, la cité est devenue un simple sujet de puissances étrangères. Mais avec la bénédiction du Grand Recteur, le général condottiere Braccio da Montone a établi le contrôle sur Pérouse en tant que république, et notre nation est restée aussi forte et stable qu'on peut l'attendre d'une république italienne au XVe siècle."
 PGA_heartbeat_of_christianity:0 "Cœur Battant de la Chrétienté"
 PGA_heartbeat_of_christianity_desc:0 "Bien qu'explicitement une puissance séculière par nature, la relation entre Pérouse et l'église ravélienne a toujours été intime. En plus d'accueillir de nombreux Conclaves Rectoraux, il y eut même quelques Grands Recteurs qui semblaient préférer l'environnement de Pérouse à Rome elle-même, et de nombreux représentants du Vatican se sont battus pour assurer l'indépendance continue de notre nation. Vraiment, aucune nation ne représente les valeurs de la Chrétienté occidentale tout à fait comme Pérouse !"
 PGA_war_of_eight_saints:0 "La Guerre des Huit Saints"
 PGA_war_of_eight_saints_desc:0 "Alors que les tensions grandissaient entre les États expansionnistes du Rectorat et de nombreuses puissances séculières à travers Cannor, Pérouse s'est trouvée prise dans une guerre entre la République Florentine et l'église ravélienne. Les Florentins nous ont inspirés à combattre contre la tyrannie du Vatican et à affirmer nos valeurs démocratiques en tant que cité-état libre et indépendante. Bien que ces efforts aient finalement échoué, la conviction de notre croyance en la démocratie continuera à inspirer nos soldats à combattre non pas pour Dieu ou les hommes ; mais pour la République !"
 PGA_baglioni_dream:0 "Le Rêve Baglioni"
 PGA_baglioni_dream_desc:0 "Bien que nous soyons une république, la famille Baglioni domine notre politique et ses membres occupent diverses positions dans notre gouvernement. C'est une famille avec un rêve d'hégémonie italienne. La famille Baglioni rêve d'un État gouverné depuis Pérouse qui s'étend de Bologne à Naples et peut-être même plus loin. Maintenant que nous avons établi notre idéologie et nos croyances, nous pouvons commencer à transformer ce rêve en réalité et étendre notre État à travers toute l'Italie et au-delà !"
 SZO_ideas:0 "Idées de Saluces"
 SZO_ideas_start:0 "Traditions de Saluces"
 SZO_ideas_bonus:0 "Ambition de Saluces"
 SZO_golden_age:0 "L'Âge d'Or de Saluces"
 SZO_golden_age_desc:0 "Le XVe siècle est un âge d'or pour Saluces. Bien que nous nous trouvions coincés entre plusieurs puissances régionales et en lutte pour trouver de l'espace pour établir une base de pouvoir propre, notre nation n'a jamais connu une telle prospérité pour la culture et la productivité."
 SZO_rich_mountain:0 "Les Riches Montagnes de Saluces"
 SZO_rich_mountain_desc:0 "Saluces est une cité située entre plusieurs montagnes, chacune riche en ressources précieuses pour l'Italie : marbre, argent, ardoise et fer. Ce sont nos mineurs qui nous ont rendus riches et nous ont fourni les ressources nécessaires pour nous armer et nous protéger. La robustesse de nos travailleurs fera clairement de nous les producteurs de matières premières les plus dominants de toute l'Italie."
 SZO_marquisate:0 "Marquisat"
 SZO_marquisate_desc:0 "Malgré notre petite taille, notre nation est un Marquisat indépendant depuis des siècles et bien sûr elle continuera à l'être pendant d'innombrables siècles encore ! Nous nous sommes rarement étendus en dehors de nos frontières traditionnelles, mais peut-être qu'en ralliant le peuple autour de l'identité unique du Marquisat, nous pourrons les motiver à défendre et étendre les terres que nous appelons Saluces !"
 SZO_alpine_engineering:0 "Ingénierie Alpine"
 SZO_alpine_engineering_desc:0 "Le Tunnel du Mont Viso est un tunnel piétonnier artificiel conçu pour créer un chemin pour nos armées pour marcher entre les régions alpines italiennes et françaises. Le tunnel est une conception miraculeuse et ingénieuse inventée par notre brillant Marquis et est peut-être le premier de son genre dans tout Cannor ! En continuant à déployer les idées de notre Marquis à travers notre nation montagneuse, nous pouvons façonner tout notre environnement avec de tels passages cachés afin de déjouer et surpasser nos ennemis à chaque tournant."
 SZO_key_to_italy:0 "La Clé de la Maison d'Italie"
 SZO_key_to_italy_desc:0 "L'Italie est une péninsule séparée du continent par les Alpes, et accessible par terre uniquement par quelques points clés. Ces positions sont les « Clés de la Maison » et Saluces avec le Piémont forme l'une de ces clés. Nos passages montagneux fournissent une route inattendue vers l'Italie, et que nous choisissions ou non d'ouvrir nos frontières aux armées étrangères dicte souvent si les États italiens restent ou non libres de l'influence étrangère."
 SZO_chiesa_san_giovanni:0 "Chiesa San Giovanni"
 SZO_chiesa_san_giovanni_desc:0 "La Chiesa San Giovanni est une église à Saluces construite par l'Ordre Dominicain et dédiée à Sainte Marie. C'est le cœur religieux même de Saluces, et le zèle de l'Ordre Dominicain a laissé sa marque sur les autorités religieuses de Saluces. C'est le devoir solennel de tous les Chrétiens de protéger ceux de la vraie foi, et de convertir ceux qui ont été égarés par les démons et les faux prophètes."
 SZO_mint:0 "L'Atelier Monétaire du Marquis"
 SZO_mint_desc:0 "Le Château de Saluces a été conçu pour garder le Marquis en sécurité et confortable en temps de siège, mais alors que Saluces a continué à se développer en un centre économique dans l'Italie alpine, il est devenu tout aussi nécessaire de protéger notre or et nos biens que de protéger le Marquis lui-même. La construction d'un Atelier Monétaire du Marquis devrait garder nos richesses à l'abri des mains étrangères, et aider à la protection de la monnaie que nous avons travaillé si dur pour extraire des gisements minéraux de montagne et de nos loyaux contribuables."
 MFA_ideas:0 "Idées de Montferrat"
 MFA_ideas_start:0 "Traditions de Montferrat"
 MFA_ideas_bonus:0 "Ambition de Montferrat"
 MFA_kings_and_emperors:0 "Cousins des Rois et Empereurs"
 MFA_kings_and_emperors_desc:0 "Les familles royales qui se sont mariées dans Montferrat sont trop nombreuses pour être comptées. Par une grande part de chance et de manœuvres politiques, le petit margraviat de Montferrat s'est trouvé en union dynastique avec l'Empire Romain d'Orient, l'Empire d'Anbennar, le Royaume de France et le Duché de Savoie parmi d'autres grandes puissances. En tant que tel, nos liens royaux vont profondément et le prestige à couper le souffle de la lignée de Montferrat ne peut être égalé."
 MFA_fertile_mountain:0 "La Montagne Riche et Fertile"
 MFA_fertile_mountain_desc:0 "Montferrat signifie littéralement « montagne riche et fertile » et c'est un surnom bien mérité. Notre nation est située entre rivières et montagnes et cela crée des conditions idéales pour les vignobles italiens. La délicatesse de nos rouges et blancs prouve que le vin italien est vraiment le meilleur."
 MFA_frontier:0 "La Frontière Italienne"
 MFA_frontier_desc:0 "La plupart de l'Italie est toute en plaines et en cités, mais pas ici dans le Nord. Le Nord est rude et montagneux, et aux jours de la domination anbennari, Montferrat a été établi comme une marche frontalière pour dompter les terres sauvages du Nord avant d'être pleinement établi comme un Margraviat. Nous sommes habitués aux rudes conditions des Alpes et nous en avons fait notre foyer. Aucun sol étranger n'aura raison de notre peuple robuste."
 MFA_savoyard_loyalty:0 "Loyauté Savoyarde"
 MFA_savoyard_loyalty_desc:0 "Nous sommes riches et prestigieux pour une nation de notre taille, mais nous comprenons notre place dans ce monde et elle est aux côtés de nos compatriotes piémontais. Nous avons été sujets aux Empereurs allemands, aux rois français, et même aux Grecs, mais finalement nous nous retrouvons toujours à revenir aux Savoyards. Peut-être que si nous effectuons les bonnes manœuvres politiques, nous pourrions même un jour être le partenaire senior dans notre union perpétuelle avec la Savoie."
 MFA_apennine:0 "Campagnes des Apennins"
 MFA_apennine_desc:0 "Nous ne sommes pas réputés pour nos grands chefs militaires, mais notre propre Margrave Gian Giacomo s'est distingué comme général dans la campagne anbennari dans les montagnes des Apennins, ce qui pendant un temps a rendu les armées de Montferrat hautement désirables comme alliés militaires."
 MFA_crossroads_of_powers:0 "Carrefour des Puissances"
 MFA_crossroads_of_powers_desc:0 "Bien qu'une puissance moindre nous-mêmes, Montferrat est niché entre de nombreuses grandes puissances, et chacune souhaite voir Montferrat plier le genou d'une manière ou d'une autre. Nous devons cependant rester fermes et affirmer le peu de pouvoir que nous avons pour jouer ces grandes nations les unes contre les autres afin de nous assurer que nous continuons à récolter les bénéfices de leurs richesses, sans tomber proie de leurs armées."
 MFA_byzantine_claimants:0 "Derniers Prétendants de Byzance"
 MFA_byzantine_claimants_desc:0 "Il y eut plusieurs mariages entre les Paléologue de l'Empire Byzantin et les Aleramici de Montferrat, y compris celui du mariage d'Irène de Montferrat et d'Andronic II Paléologue. Le mariage d'Irène est ce qui a amené la branche italienne de la famille royale byzantine à Montferrat et a créé une certaine unité entre l'Empire d'Anbennar et Rome Orientale. Alors que les Turcs Ottomans ont ravagé la Grèce contrôlée par les Paléologue et mis l'Empire Byzantin à genoux, c'est la responsabilité de Montferrat de restaurer l'ordre et de continuer à affirmer la dignité et le prestige de notre ancienne lignée !"
 SIE_ideas:0 "Idées Siennoises"
 SIE_ideas_start:0 "Traditions Siennoises"
 SIE_ideas_bonus:0 "Ambition Siennoise"
 SIE_council_priori:0 "Le Conseil des Prieurs"
 SIE_council_priori_desc:0 "Suite à une série de gouvernements républicains et royaux échoués, nous avons établi un Conseil pour le Peuple de Sienne, un qui, espérons-le, ne tombera pas dans l'aristocratie et la corruption comme tant d'autres avant lui. Bien que le nombre exact de représentants dans le Conseil et la façon dont ils sont élus soit dans un état quelque peu fluctuant, décentraliser notre gouvernement de cette façon ne mènera sûrement jamais Sienne à retomber dans un autre gouvernement aristocratique."
 SIE_lordship:0 "Seigneurie de Sienne"
 SIE_lordship_desc:0 "Suite à l'échec et à l'instabilité du Conseil des Prieurs, nous nous sommes réorganisés en une Seigneurie avec sa propre famille royale et ses dynasties politiques. Que nous choisissions de revenir à cette forme de gouvernement autoritaire ou de maintenir nos traditions démocratiques, le rôle de la classe noble dans la politique siennoise s'est enraciné et nous risquerons toujours de revenir au style seigneurial de gouvernement."
 SIE_bank:0 "La Banque de Sienne"
 SIE_bank_desc:0 "Tout au long de notre histoire, nous avons été une puissance bancaire sans égale sur la péninsule italienne. Une série d'investissements avisés dans nos nations italiennes voisines a apporté les profits du soutien financier à notre nation, malgré notre manque de ressources naturelles. Bien que Florence cherche à défier notre domination économique, nous devons croire que les banques de Sienne continueront à apporter stabilité et croissance à notre nation."
 SIE_perseverance:0 "Persévérance Siennoise"
 SIE_perseverance_desc:0 "Malgré toutes les pestes et l'instabilité économique qui ont marqué nos terres, nous avons continué à prospérer et à développer Sienne en un phare rayonnant de prospérité pour toute l'Italie à voir. Alors que des nations moindres s'effondreraient sous la pression d'un seul désastre, Sienne a prouvé qu'elle est capable non seulement de survivre à toute tragédie mais de continuer à croître et à se développer même alors que Dieu lui-même semble déterminé à nous arrêter."
 SIE_artists:0 "École de Peinture Siennoise"
 SIE_artists_desc:0 "L'art de la peinture a fleuri en Italie pendant la renaissance, mais aucun artiste ne peut égaler la pure habileté et qualité atteintes par ceux de Sienne. Contrairement à ces gribouillis grossiers qui passent pour de l'« art » dans l'école florentine, l'art siennois est un style qui est éthéré et élégant, avec un fort accent sur les miracles accomplis par les figures bibliques et les Saints. Alors que d'autres artistes peuvent paraître beaux dans l'instant, le style plus subtil de l'école siennoise lui permettra sûrement de résister à l'épreuve du temps."
 SIE_saints_of_siena:0 "Les Saints de Sienne"
 SIE_saints_of_siena_desc:0 "Au XVe siècle, nous avons vu deux Saints siennois canonisés passer au ciel. Pour le moment, il semble que le Rectorat favorise Sienne par-dessus tous les autres, et même si nous devions perdre la bonne volonté de l'église ravélienne ou rejoindre la Réformation, l'héritage de Sainte Catherine et de Saint Bernardin devrait rendre toutes les nations chrétiennes plus favorables à notre cause."
 SIE_peoples_republic:0 "La République du Peuple"
 SIE_peoples_republic_desc:0 "Sienne s'est constamment trouvée tombant dans les griffes desséchées de nobles étrangers, mais chaque fois qu'une telle chose arrive, le peuple se lève contre ses oppresseurs et restaure la démocratie et la paix à Sienne ! Certes, le nouveau gouvernement est rarement stable et ne dure généralement pas longtemps, mais comme un chien de chasse loyal retournant à son maître, nous reviendrons toujours aux valeurs qui font de nous des Siennois !"
 LUC_ideas:0 "Idées Lucquoises"
 LUC_ideas_start:0 "Traditions Lucquoises"
 LUC_ideas_bonus:0 "Ambition Lucquoise"
 LUC_mending_schisms:0 "Réparer les Schismes Rectoraux"
 LUC_mending_schisms_desc:0 "Au début du XVe siècle, de profonds schismes commençaient à se former au sein des États du Rectorat, et un terrain neutre était nécessaire pour discuter de ces problèmes profonds dans l'institution rectorale avant qu'ils n'explosent en hérésie et réformation, et Lucques a été jugée un emplacement idéal pour ces conversations difficiles. En restant neutre en matière de religion, nous pouvons peut-être continuer à être agréables aux loyalistes du Rectorat et à ceux qui cherchent la réforme."
 LUC_libertas:0 "Libertas !"
 LUC_libertas_desc:0 "Lucques a changé de mains de nombreuses fois avant de devenir une démocratie libre et indépendante. D'abord, nous avons été occupés par les Bavarois qui ont vendu notre grande cité aux Génois, puis rapidement occupés par le Roi de Bohême qui a jugé bon de la vendre aux Rossi de Parme, et cette chaîne d'occupation et de vente a continué pendant un bon moment. Finalement, l'Empereur lui-même est intervenu et a décrété que Lucques était un prix si précieux qu'elle méritait de devenir une cité libre et indépendante. Même aujourd'hui, nos marchands portent un drapeau bleu marqué « Libertas » en souvenir du grand cadeau d'indépendance qui nous a été accordé par l'Empereur d'Anbennar."
 LUC_draining_the_lake:0 "L'Assèchement du Lago di Bientina"
 LUC_draining_the_lake_desc:0 "Nous nous trouvons sans fin en conflit avec la République Florentine au sud concernant la propriété du Lago di Bientina. Nos pêcheurs se rendent sur le lac chaque jour, et se trouvent en dispute avec les pêcheurs de Florence sur qui exactement a le droit d'y être. Un compromis a été trouvé en asséchant le lac et en divisant la propriété le long de sa frontière. Cet ingénieux exploit de manipulation environnementale a étendu notre terre habitable sans besoin de guerre ou de conflit. Peut-être qu'en continuant à façonner notre environnement, nous pourrons apporter plus de développement à Lucques, qu'est-ce qui pourrait mal tourner ?"
 LUC_naval_ambitions:0 "Ambitions Navales Lucquoises"
 LUC_naval_ambitions_desc:0 "Notre plus grand rival est la République Florentine au sud. Alors qu'ils nous surpassent militairement en nombre, nous possédons un long littoral qui n'a pas encore été exploité. Si nous pouvons attirer plus de nos soldats à adopter les méthodes maritimes de guerre, nous pourrions non seulement surpasser nos rivaux florentins en mer, mais nous pourrions même devenir une superpuissance navale sur la côte ouest de l'Italie !"
 LUC_captain_of_people:0 "Le Capitaine du Peuple"
 LUC_captain_of_people_desc:0 "Capitano del Popolo était un titre administratif accordé à Luchetto Gattilusio qui a consolidé Lucques en un gouvernement central. Le titre a été créé en raison d'un nombre croissant de roturiers dans la cité se trouvant à s'élever à la classe bourgeoise, et a été utilisé pour donner aux artisans de notre nation une voix dans la république. Cette augmentation de l'influence de la classe ouvrière fera sûrement des merveilles pour le bonheur et la productivité de nos honnêtes travailleurs !"
 LUC_black_party:0 "Le Parti Noir"
 LUC_black_party_desc:0 "Lorsque le tyrannique Castruccio Castracani a pris le pouvoir à Lucques, c'est grâce à la diligence et à la loyauté du Parti Noir des Guelfes qu'il et sa famille ont été exilés, et bien qu'il soit revenu et ait pris le pouvoir comme Consul à vie de la république, les Guelfes ont saisi la richesse de Castracani à sa mort et ont assuré que cette impiété ne revienne jamais dans la république."
 LUC_jacobin_state:0 "L'État Jacobin de Lucques"
 LUC_jacobin_state_desc:0 "Suite à l'occupation de Lucques par Napoléon, notre État a été réorganisé en quelque chose de plus conforme à la cause révolutionnaire. Enfin notre nation deviendra pleinement centralisée dans un gouvernement fort et uni adapté à notre peuple, et résistera sûrement à l'épreuve du temps !"
 VRN_ideas:0 "Idées Véronaises"
 VRN_ideas_start:0 "Traditions Véronaises"
 VRN_ideas_bonus:0 "Ambition Véronaise"
 VRN_three_households:0 "Trois Maisons Égales en Dignité"
 VRN_three_households_desc:0 "La République de Vérone a été gouvernée par trois familles nobles rivales : la Maison della Scala, la Maison Visconti et la Maison da Carrara. Les maisons sont presque constamment en conflit l'une avec l'autre, et la lutte pour le pouvoir et la politique impitoyable de la République ont rendu notre cité belle de sang et de conflit. Comme la lune, la base du pouvoir à Vérone est inconstante et changeante."
 VRN_fair_verona:0 "Dans la Belle Vérone"
 VRN_fair_verona_desc:0 "L'horizon de Vérone est vraiment à couper le souffle, l'emplacement idéal pour tout dramaturge aspirant à situer son récit tragique. Les bâtiments sont plus que de fantastiques exploits d'architecture, ce sont des œuvres d'art à part entière ; ornés de sculptures de nos grands maires, saints et symboles de notre patrimoine vénitien. Vraiment, nous méritons plus que jamais le titre de « Belle Vérone »."
 VRN_ancient_grudge:0 "Rancune Ancestrale"
 VRN_ancient_grudge_desc:0 "Notre rivalité avec la République de Venise remonte à des générations. Nous avons lutté pour garder notre indépendance alors que les Vénitiens interféraient dans notre politique et finalement ont exécuté notre bon Seigneur Francesco, prenant le contrôle de la cité. Leur pathétique île a des ambitions dépassant de loin ses capacités, et chaque territoire marqué comme possession vénitienne est une tache sur la carte que nous nous consacrerons à éradiquer !"
 VRN_civil_blood_and_civil_hands:0 "Sang Civil et Mains Civiles"
 VRN_civil_blood_and_civil_hands_desc:0 "Lorsque les Vénitiens ont pris la cité, ce ne sont pas les officiels ou l'armée qui ont combattu pour les arrêter, c'est le bon peuple de Vérone qui s'est levé contre ses oppresseurs. Bien que nos tentatives de rétablir la République aient initialement échoué, nous pouvons être assurés que si nous tombons à nouveau sous une puissance étrangère, notre peuple versera son propre sang pour restaurer la république ! Vraiment ce sont de violents plaisirs pour nous avec des fins violentes pour nos oppresseurs."
 VRN_ending_the_strife:0 "Mettre Fin au Conflit"
 VRN_ending_the_strife_desc:0 "Bien que nous ayons beaucoup de raisons de garder rancune contre la République de Venise, nous devons nous reprendre et trouver une solution au conflit entre nos deux nations. La solution évidente est de retirer la république de la surface de la verte Terre de Dieu, mais certains types plus modérés au sein de notre nation insistent sur le fait que nous devons apprendre à coexister avec les Vénitiens avant que cela n'apporte une plaie sur nos deux maisons."
 VRN_some_shall_be_punished:0 "Certains Seront Pardonnés, Certains Punis"
 VRN_some_shall_be_punished_desc:0 "Quand nous exercerons notre vengeance sur tous ceux qui nous ont fait du tort, nous ne serons pas aveugles. Nous laisserons à Dieu le soin de décider du sort de nos ennemis alors que nous enfonçons nos lances dans leurs cœurs, car ce n'est pas à nous de décider de leur punition. Se séparer du monde des vivants peut être une si douce tristesse."
 VRN_a_tale_of_woe:0 "Car Jamais il n'y Eut Histoire Plus Triste"
 VRN_a_tale_of_woe_desc:0 "Il n'y a pas d'histoire dans notre passé qui soit une plus grande tragédie que l'exécution de notre Seigneur par des mains vénitiennes. Son histoire vivra dans les cœurs du peuple de Vérone, alors que nous tournons nos regards vers l'océan ouvert. Il est clair qu'une république marchande enclavée est quelque peu limitée dans ses partenaires commerciaux, nous devons donc apprendre de notre passé et adopter le style vénitien de commerce. Nous ne nous précipiterons pas vers la mer. Nous irons sagement et lentement, car ceux qui se précipitent ne font que trébucher et tomber."
 DAL_ideas:0 "Idées Dalmates"
 DAL_ideas_start:0 "Traditions Dalmates"
 DAL_ideas_bonus:0 "Ambition Dalmate"
 DAL_kingdom_of_dalmatia:0 "Royaume de Dalmatie"
 DAL_kingdom_of_dalmatia_desc:0 "Lorsque les Byzantins ont échoué à protéger les Principautés, les cités de Dalmatie ont convenu que nous devions chercher la protection soit des Vénitiens soit des Hongrois. Sous Venise, nous avons maintenu nos titres royaux. Les principautés indépendantes étaient gouvernées par notre propre peuple, mais le Royaume de Dalmatie existait en union avec la République de Venise. Que ce soit sous un Roi à nous, ou un étranger, la stabilité accordée par notre système de double gouvernement gardera le peuple pacifié et productif."
 DAL_principalities:0 "Les Principautés Dalmates"
 DAL_principalities_desc:0 "Nous exerçons un contrôle très lâche sur nos principautés, et en tant que tel les pratiques gouvernementales à travers la côte dalmate sont variées et hautement expérimentées. En étendant la gouvernance des Principautés à toutes les possessions d'outre-mer de la Dalmatie, nous serons assurés que nos sujets transmettront dûment leurs biens et richesses au cœur de la Dalmatie."
 DAL_language:0 "La Langue Dalmate"
 DAL_language_desc:0 "La Dalmatie est située entre les Bosniaques, les Herzégoviniens et les Croates, et pendant d'innombrables siècles nos côtes ont été visitées par des Latins, des Grecs et des Vénitiens. En tant que tel, la Dalmatie est un rare creuset de cultures se rassemblant parmi nos vastes étendues de Principautés. En fusionnant ces nombreuses langues et cultures en une seule identité, nous créerons une nouvelle culture distincte de toutes les autres, mais familière aux Slaves, aux Grecs et aux Latins."
 DAL_art_and_lit:0 "Centre d'Art et de Littérature"
 DAL_art_and_lit_desc:0 "Bien que la Renaissance soit largement confinée à la péninsule italienne, notre héritage latin et nos liens étroits avec les républiques marchandes de l'Adriatique ont fait des belles cités de Dalmatie l'emplacement de choix pour d'innombrables peintres et sculpteurs vers nos cités ; transformant le paysage non seulement de notre culture, mais même notre architecture s'est transformée pour devenir de magnifiques œuvres d'art."
 DAL_independent_army:0 "Armée Indépendante Dalmate"
 DAL_independent_army_desc:0 "Même sous l'occupation vénitienne, les armées de Dalmatie ont opéré de manière indépendante et ont été une composante vitale de l'Armée Vénitienne. Maintenant que notre gouvernement est aussi libre des mains vénitiennes, nous pouvons centraliser les armées dispersées des Principautés en une Force Dalmate Unie !"
 DAL_arsenal:0 "L'Arsenal Indépendant"
 DAL_arsenal_desc:0 "Similaire à nos armées, la Marine de Dalmatie a également opéré comme une entité indépendante des forces beaucoup plus grandes et plus redoutables de l'Arsenal Vénitien. Nous avons signé un pacte avec les Vénitiens pour garder nos côtes à l'abri des pirates, mais maintenant que nous avons gagné notre autonomie de la République, nous devons nous tenir seuls non seulement pour sécuriser nos propres côtes, mais étendre notre influence à travers l'Adriatique et au-delà !"
 DAL_illyria:0 "Héritage de l'Illyrie"
 DAL_illyria_desc:0 "La Fédération des Dalmates était une nation gouvernée depuis la Dalmatie qui étendait ses frontières à travers l'Adriatique et jusqu'à l'arrière-pays de la Bosnie. Même sous l'occupation romaine, la Dalmatie était le cœur même de la province romaine d'Illyrie, et peut-être qu'en étendant nos propres frontières pour englober tout ce que l'Illyrie avait jadis, nous établirons notre propre État successeur pour réclamer l'Empire Romain !"
 SAR_ideas:0 "Idées Sardes"
 SAR_ideas_start:0 "Traditions Sardes"
 SAR_ideas_bonus:0 "Ambition Sarde"
 SAR_judicate:0 "Du Judicat"
 SAR_judicate_desc:0 "Lorsque la Sardaigne a été subjuguée par la République de Gênes, c'est le Judicat d'Arborée seul qui s'est dressé contre la tyrannie des Génois. Sous la sage gouvernance du Roi Marianus IV de Sardaigne et de Corse, et avec le soutien de la Couronne d'Aragon, l'intégralité de la Sardaigne a été récupérée et rendue à sa juste autonomie sous le Roi Marianus. Bien que nous nous soyons plus tard intégrés aux Aragonais, nous n'oublierons jamais la bravoure démontrée par notre bon roi qui a bâti son royaume sur les cendres de Gênes."
 SAR_papal_restoration:0 "Restauration Rectorale"
 SAR_papal_restoration_desc:0 "La Sardaigne a été divisée entre plusieurs États dans son histoire troublée, mais le Rectorat a toujours eu les intérêts sardes à cœur. Chaque fois que le Royaume s'est trouvé divisé entre gouvernement républicain et féodal, la Papauté a toujours insisté sur le fait que le seul vrai dirigeant de toute cité sur l'île est le Roi de Sardaigne, quel qu'il soit. Bien que notre avenir reste incertain, une chose sur laquelle nous pouvons toujours compter est le soutien de la Papauté."
 SAR_viceroyalty:0 "La Vice-Royauté Sarde"
 SAR_viceroyalty_desc:0 "Bien que nous ayons passé de nombreuses années à porter la Couronne Aragonaise comme Atlas porte le Globe, nous ne l'avons pas fait sans lutte. Les Judicats ont toujours résisté à un dirigeant étranger, et la seule façon pour l'Aragon de maintenir son emprise fragile sur l'île était d'établir un Vice-Roi Sarde pour gouverner le Royaume en son nom. La nécessité de la Vice-Royauté est la preuve de l'esprit sarde, et en gardant un homme de notre culture éternellement sur le trône, nous assurerons la loyauté de notre peuple."
 SAR_and_COR:0 "La Couronne de Sardaigne et de Corse"
 SAR_and_COR_desc:0 "Il y a des siècles, Sa Sainteté le Grand Recteur a établi le Royaume de Sardaigne et de Corse et a accordé ce titre sacré au Roi d'Aragon. Maintenant, l'influence aragonaise sur les îles appartient au passé et la simple existence de notre nation en tant qu'entité indépendante rend évident que nous sommes les vrais successeurs de ce titre ancien et de toutes les revendications, le pouvoir et le prestige qui l'accompagnent."
 SAR_piedmontese_ambition:0 "Ambition Piémontaise"
 SAR_piedmontese_ambition_desc:0 "Notre royaume a toujours eu des liens étroits avec les Piémontais, et tout au long de notre histoire, la Couronne de Sardaigne et de Corse a constamment étendu son influence sur le continent à travers le Piémont. Peut-être que cette union lâche de notre peuple pourra un jour se réaliser dans un État unifié, avec les deux couronnes détenues par le Roi de Sardaigne."
 SAR_cathedrals:0 "Île des Cathédrales"
 SAR_cathedrals_desc:0 "Malgré le fait d'être coupés du reste de l'Italie par l'immensité de la Mer Méditerranée, la culture de la Renaissance non seulement trouve son chemin vers la Sardaigne, elle y prospère. La saveur unique de l'art et de l'architecture sardes n'est démontrée nulle part mieux que dans nos chapelles et cathédrales dispersées à travers notre île. La Sardaigne abrite un mélange unique d'architecture romane et de magnifiques nouveaux styles innovants que d'autres nations ne peuvent même pas tenter de reproduire, et toute cette finesse est créée pour la gloire de Dieu."
 SAR_saint_maurice:0 "L'Ordre de Saint Maurice"
 SAR_saint_maurice_desc:0 "Cet ordre sacré est un Ordre Dynastique de Chevalerie, conçu pour protéger les valeurs royales de la Sardaigne et garder notre lignée noble pure. L'ordre sert Dieu, le Roi et la Sardaigne, et en continuant à soutenir la croissance et la prospérité de cet ordre, l'armée sarde restera pieuse, noble et grande en nombre."
 COR_ideas:0 "Idées Corses"
 COR_ideas_start:0 "Traditions Corses"
 COR_ideas_bonus:0 "Ambition Corse"
 COR_unblinded_moor:0 "Le Maure Non Aveuglé"
 COR_unblinded_moor_desc:0 "Les Génois nous ont accordé un drapeau d'un Maure aveuglé, pour symboliser notre subjugation et l'utilité de notre île pour repousser les pirates barbaresques du Nord de Sarhal. Cependant, maintenant que nous sommes libres, le Maure en est venu à symboliser la Corse elle-même, et le bandeau symbolise la tyrannie de la subjugation étrangère. Tant que le Maure reste sans bandeau, la Corse reste libre, et il servira d'icône pour libérer notre peuple, si jamais nous devions tomber sous une puissance étrangère."
 COR_battle_of_meloria:0 "La Bataille de Meloria"
 COR_battle_of_meloria_desc:0 "Cette bataille historique a eu lieu au large des côtes de la Corse et devait déterminer l'avenir de l'île. La défaite écrasante des Pisans n'a pas seulement marqué la fin de la domination pisane sur la Corse, mais aussi la fin de la république pisane elle-même alors que ses possessions ont été dépecées par la République Florentine et Gênes. Nous n'oublierons jamais l'impact qu'une marine puissante peut avoir sur une nation, et le contrôle de la mer corse détermine le contrôle de la Corse elle-même."
 COR_league:0 "La Ligue Corse"
 COR_league_desc:0 "Pendant des années, la Corse a été gouvernée par une ligue de cités-États et d'évêchés et ce style de gouvernement a assuré que le peuple de Corse jouisse à la fois des libertés accordées par une république, et soit capable de servir Dieu de la manière exacte et appropriée. Similaire à la ligue suisse de l'autre côté de la mer, l'autonomie accordée aux cités corses fait déborder leurs trésoreries d'or et leurs armées débordent d'hommes prêts à mourir pour la cause corse."
 COR_iron_bank:0 "La Banque de Saint-Georges"
 COR_iron_bank_desc:1 "Lorsque les Génois peinaient à maintenir leur emprise illégitime sur l'île, le contrôle a été remis à la Banque de Saint-Georges ; une institution religieuse et financière conçue pour consolider les dettes de tous les habitants de la république de Gênes. Bien que nous ayons maintenant échappé au contrôle génois, la banque reste une entité puissante au sein de notre gouvernement et est un outil utile pour débusquer les nombreuses âmes corrompues et endettées à travers notre nation."
 COR_constitution:0 "La Constitution Corse"
 COR_constitution_desc:0 "La Corse a été sujette à une puissance étrangère et le siège de guildes bancaires, de républiques marchandes, de ligues théocratiques et de monarchies. Notre avenir est incertain et précaire, mais peut-être qu'en rédigeant une constitution pour le gouvernement corse, nous pourrons devenir les capitaines de notre propre destin et assurer l'avenir de la Corse en tant que nation indépendante."
 COR_home_of_the_revolution:0 "Véritable Foyer de la Révolution"
 COR_home_of_the_revolution_desc:0 "Bien que le manteau de la révolution passe d'une nation à une autre, il est connu que le véritable foyer de la pensée révolutionnaire est la Corse. De nombreux grands penseurs révolutionnaires comme Napoléon Bonaparte et Pasquale Paoli appellent la Corse leur foyer et c'est leur dévouement à leur pays et à leurs compatriotes qui motive leur pensée révolutionnaire."
 RVA_ideas:0 "Idées de Dortmund"
 RVA_ideas_start:0 "Traditions de Dortmund"
 RVA_ideas_bonus:0 "Ambition de Dortmund"
 RVA_from_ashes:0 "Des Cendres"
 RVA_from_ashes_desc:0 "L'ancienne cité a été complètement détruite par une œuvre ardente de Dieu, purifiant l'ancienne cité de son impiété et de son péché. Le sage Empereur Frédéric Barberousse fit reconstruire la ville de ses cendres et fit de la cité la capitale de l'empire pendant deux glorieuses années. Notre bonne et pieuse cité fut dotée d'une église, d'une place de marché, et finalement de sa propre brasserie en quelques courtes années. Vraiment nul ne peut renaître des cendres comme Dortmund."
 RVA_meeting_of_bishops_and_emperors:0 "Lieu de Réunion des Évêques et Empereurs"
 RVA_meeting_of_bishops_and_emperors_desc:0 "Avant le grand incendie qui a ravagé l'ancienne cité de Dortmund, la cité était connue sous le nom de « Throtmanni » et était le lieu de réunion tant pour la Diète Impériale de l'Empire d'Anbennar que pour le Concile Ecclésiastique. Des questions tant religieuses qu'impériales y étaient discutées ici à Dortmund, et même aujourd'hui nous nous trouvons comme un centre gouvernemental pour la politique impériale dans le Nord."
 RVA_chief_city:0 "Cité Principale du Rhin"
 RVA_chief_city_desc:0 "Même alors que notre glorieuse cité était en reconstruction, nous sommes devenus connus comme la « cité principale » du Rhin, de la Westphalie et des Pays-Bas, faisant de nous essentiellement la capitale de trois régions administratives impériales. Être une puissance si importante et centrale dans l'Empire apportera sûrement des richesses à notre grande cité !"
 RVA_emperors_favor:0 "Le Favori de l'Empereur"
 RVA_emperors_favor_desc:0 "Pendant deux grandes années, notre cité a été le siège de l'Empire lui-même, et après ce temps l'Empereur a garanti notre indépendance continue en nous accordant le statut de Cité Libre. Depuis, nous avons été de loyaux serviteurs de l'Empereur et quiconque a osé nous chercher querelle a fait face au courroux de l'Empire d'Anbennar !"
 RVA_moneylending:0 "Familles de Prêteurs de Dortmund"
 RVA_moneylending_desc:0 "Nous sommes riches et puissants pour une nation de notre taille. Si profondes sont nos trésoreries que nous sommes capables de prêter de l'argent à de grandes puissances comme l'Angleterre, Cologne, et même l'Empereur lui-même ! Nos investissements avisés et nos familles marchandes sagaces ont fait de nous une puissance économique qui ne peut être ignorée même par les « grandes puissances » de Cannor."
 RVA_fortmund:0 "Fortmund"
 RVA_fortmund_desc:0 "Notre rivalité avec l'évêché de Cologne remonte à des décennies, et à un moment notre rivalité a atteint son paroxysme et nous nous sommes trouvés en guerre avec l'Évêque. Ils ont assiégé notre bonne cité pendant de longs 18 mois, mais notre peuple ne s'est pas rendu aux troupes assiégeantes. Sans même livrer une seule bataille, l'Évêché a concédé la défaite et nous sommes sortis victorieux, humiliant nos rivaux par la seule force de volonté de notre peuple et la richesse de nos réserves alimentaires."
 RVA_reinoldikirche:0 "Reinoldikirche"
 RVA_reinoldikirche_desc:0 "L'Église Saint-Reinold est une icône de Dortmund. Elle a commencé sa construction comme une église ravélienne romaine et était connue comme le « Miracle de Westphalie », célèbre pour sa flèche polygonale et son architecture gothique. Avec l'adoption de l'Église Évangélique de Westphalie, Dortmund en est venue à embrasser les enseignements tant protestants que réformés et ils étaient prêchés ensemble à l'Église Saint-Reinold."
 MBZ_ideas:0 "Idées de Bregenz"
 MBZ_ideas_start:0 "Traditions de Bregenz"
 MBZ_ideas_bonus:0 "Ambition de Bregenz"
 MBZ_lady_of_bregenz:0 "Dame de Bregenz"
 MBZ_lady_of_bregenz_desc:0 "Notre première Comtesse, Elisabeth II de Montfort-Bregenz a accédé au trône lorsque son père est mort sans héritier mâle pour succéder à la lignée. Lorsqu'elle a pris le trône, son oncle traître Hugo de Montfort-Bregenz a combattu pour contester le règne de la comtesse. Après vingt ans de conflit qui ont ravagé la cité, Elisabeth a émergé comme l'unique héritière de Bregenz, montrant la férocité et la force des femmes de Bregenz !"
 MBZ_securing_countess_rule:0 "Assurer le Règne de la Comtesse"
 MBZ_securing_countess_rule_desc:0 "Après que notre Comtesse a assuré sa gouvernance sur Bregenz contre son oncle, elle a fait face à encore plus de résistance masculine de son propre mari ; Wilhelm. Wilhelm a affirmé qu'en tant que son mari, il devrait avoir autant de droits sur les possessions du comté que la comtesse, et il a dépensé sans compter du trésor et gaspillé l'argent des impôts du comté en frivolités inutiles. Avec le soutien de la famille Montfort-Bregenz, Elisabeth a fait passer une nouvelle loi assurant que seul le dirigeant de Bregenz, indépendamment du genre, pourrait dépenser du trésor royal."
 MBZ_saint_gebhard:0 "Saint Gebhard"
 MBZ_saint_gebhard_desc:2 "Fils du comte de Bregenz, Saint Gebhard a été canonisé par les autorités rectorales en raison de son travail humanitaire dans l'Évêché de Constance, une cité bavaroise de l'autre côté du lac de Bregenz. Gebhard a insisté sur le fait que l'État ne devrait pas confisquer les biens des boulangers et des artisans, et qu'ils devraient plutôt être distribués à leurs successeurs, afin qu'ils puissent continuer à s'enrichir et maintenir la productivité de notre nation."
 MBZ_resisting_habsburgs:0 "Résister à l'Hégémonie des Habsbourg"
 MBZ_resisting_habsburgs_desc:0 "Nous sommes le dernier bastion de la souveraineté autrichienne en dehors du contrôle des Habsbourg. Dans notre nation se trouve le dernier espoir pour l'Autriche de se dresser contre les Habsbourg et notre simple existence continue est une menace pour leur contrôle sur le peuple autrichien, et l'Empire. Peut-être que si nous devions démontrer que nous ne craignons pas leur lignée monstrueuse, nous pourrions menacer la légitimité du règne des Habsbourg."
 MBZ_sale_of_titles:0 "La Vente des Titres de Bregenz"
 MBZ_sale_of_titles_desc:0 "En raison des dépenses massives de notre Comte insensé, la Comtesse s'est trouvée en grandes difficultés financières. À contrecœur, ses propriétés ont dû être vendues aux Habsbourg pour assurer la survie continue de la lignée de Bregenz."
 MBZ_shadow_of_pfander:0 "À l'Ombre du Pfänder"
 MBZ_shadow_of_pfander_desc:0 "Notre nation est encerclée, avec un lac d'un côté de la cité, et le grand mont Pfänder de l'autre. Par conséquent, la cité ne peut être entrée que par quelques zones clés et si nous devions défendre et fortifier nos frontières, la richesse partagée de la montagne et du lac nous garderait à l'abri des envahisseurs hostiles."
 MBZ_lake_constance_navy:0 "La Marine du Lac de Constance"
 MBZ_lake_constance_navy_desc:0 "Dès les tout premiers jours de notre nation, Bregenz a ressenti l'appel des eaux ouvertes. Lorsque les Romains ont colonisé la région, la cité qui allait devenir Bregenz a été faite la capitale navale du Lac de Constance, et désignée l'Amirauté de la région. Peut-être que si nous atteignons un jour les mers ouvertes, nous pourrons montrer au monde à quel point la marine de Constance est vraiment puissante."
 GOS_ideas:0 "Idées de Goslar"
 GOS_ideas_start:0 "Traditions de Goslar"
 GOS_ideas_bonus:0 "Ambition de Goslar"
 GOS_mining_traditions:0 "Traditions Minières de Goslar"
 GOS_mining_traditions_desc:0 "Depuis les jours de l'Empire Romain, Goslar est une ville minière, et les riches gisements de fer de notre patrie continueront à fournir notre richesse pendant des siècles encore. Comme une longue lignée d'extraction de fer caractérise d'innombrables familles de Goslar, et les pères forment leurs fils à suivre leurs traces, nous ne voyons pas de fin à la culture minière qui a caractérisé notre nation."
 GOS_kaiserpfalz:0 "Kaiserpfalz"
 GOS_kaiserpfalz_desc:0 "Bien que de nombreux Empereurs appellent maintenant Vienne leur foyer, il fut un temps où Goslar elle-même était le siège de l'Empereur. Goslar a accueilli le tout premier synode impérial, où les évêques et l'Empereur décidaient des lois de la religion qui gouvernent nos vies. Même aujourd'hui le vieux Kaiserpfalz se dresse au cœur de notre ville ; vide, attendant le jour où l'Empereur appellera à nouveau Goslar son foyer. Un jour, peut-être notre petite Cité Libre pourrait à nouveau être le siège de l'Empire."
 GOS_city_rights:0 "Droits de la Ville de Goslar"
 GOS_city_rights_desc:0 "Lorsque l'Empereur a retiré son contrôle sur la Ville, nous sommes devenus plus dépendants du commerce et des marchands pour apporter leurs richesses en Allemagne du Nord. En tant que tel, la charte des droits qui gouverne notre vie quotidienne favorise grandement les droits des marchands vivant ou passant par notre ville, et en tant que tel beaucoup de la classe bourgeoise choisissent de faire de Goslar leur foyer et apportent leurs richesses à notre petite ville."
 GOS_hanseatic_league:0 "Capitaliser sur la Ligue Hanséatique"
 GOS_hanseatic_league_desc:0 "Alors que la plupart des nations ont rejoint la Ligue Hanséatique pour assurer leur indépendance et profiter des avantages commerciaux de l'union, nous avons utilisé la sécurité et les droits donnés par la Ligue pour faire avancer nos intérêts dans le commerce des nations étrangères et comme outil politique pour faire passer des législations et affiner davantage les systèmes gouvernementaux de notre grande cité."
 GOS_hunting_robber_barons:0 "Chasser les Barons Brigands"
 GOS_hunting_robber_barons_desc:0 "De nos jours, il semble que des barons brigands sans scrupules soient une vue commune sur les routes de campagne d'Allemagne, volant les biens et l'équipement de notre classe marchande productive. Il est devenu clair que nous devons effectuer une expansion massive de notre armée si nous voulons contrer ces bandits de grand chemin et restaurer l'ordre sur les routes d'Allemagne !"
 GOS_resisting_welfs:0 "Résister aux Welfs"
 GOS_resisting_welfs_desc:0 "Suite à la fin du règne de l'Empereur sur Goslar, nous avons été faits Cité Libre, et notre indépendance a été assurée par l'Empereur lui-même. Cependant, le concept d'une cité non gouvernée par un monarque ou une famille royale semble être un concept étranger aux familles non civilisées comme les Welfs car ils font continuellement des efforts pour subjuguer notre cité et prendre le contrôle de nos précieuses mines de fer. Nous ne sommes jamais tombés sous cette soi-disant famille « noble », et nous ne tomberons pas maintenant !"
 GOS_the_leagues:0 "Rejoindre les Ligues"
 GOS_the_leagues_desc:0 "Les efforts continus des Welfs pour nous subjuguer ont été ignorés par l'Empereur. Bien que notre statut de Cité Libre assure prétendument notre indépendance, il est devenu clair que l'Empereur est bien trop indolent pour nous protéger suffisamment, donc nous devons nous protéger nous-mêmes ! En entrant dans des ligues commerciales et militaires avec nos voisins, nous pourrons peut-être enfin avoir un certain répit de la guerre et du conflit."
 ROT_ideas:0 "Idées de Rothenburg"
 ROT_ideas_start:0 "Traditions de Rothenburg"
 ROT_ideas_bonus:0 "Ambition de Rothenburg"
 ROT_zarfat_registry:0 "Registre de Zarfat"
 ROT_zarfat_registry_desc:0 "La plupart des villes ne tiennent qu'un registre d'église sur les Chrétiens nés dans leurs frontières, mais ici à Rothenburg, nous accordons refuge aux marchands et hommes saints juifs. Meir de Rothenburg était un homme saint issu d'une longue lignée de Rabbins qui est devenu connu sous le nom de Maharam, signifiant Notre Maître. Il était bien connu pour les nombreuses grandes œuvres d'écriture qu'il a créées dans notre ville, et était la preuve vivante des vertus de montrer charité et tolérance envers ceux qui adorent Dieu à leur manière particulière."
 ROT_beautiful_city:0 "La Belle Cité"
 ROT_beautiful_city_desc:0 "Notre cité a connu beaucoup de destruction et de dévastation au fil des ans, et les anciens symboles de la monarchie se sont régulièrement effrités pour être remplacés par des symboles de notre foi et de nos traditions républicaines. En tant que tel, les châteaux se sont effrités et ont été remplacés par des monastères, et les maisons au cœur de la cité ont été construites par de riches marchands plus soucieux d'esthétique que de praticité. Si belle est notre cité que beaucoup proposent que nous arrêtions simplement de construire et profitions de la magnificence de Rothenburg telle qu'elle est."
 ROT_end_of_the_line:0 "La Fin de la Lignée"
 ROT_end_of_the_line_desc:0 "De nombreuses autres Cités Libres de l'Empire l'ont été en raison d'une bizarrerie dans leurs gouvernements menant l'Empereur à saisir et abandonner le contrôle, mais la lignée de Rothenburg s'est éteinte naturellement, et pendant quelques années sombres, notre cité n'a connu aucun dirigeant. Nous n'avons jamais été directement tenus par l'Empereur, et avons toujours été une cité libre et indépendante d'une manière ou d'une autre. C'est l'Empereur Rudolf de Habsbourg qui nous a accordé notre statut de Cité Libre, et ainsi notre gouvernement républicain libre est devenu inséparable de la culture de Rothenburg."
 ROT_hinterland_knights:0 "Les Chevaliers de l'Arrière-Pays"
 ROT_hinterland_knights_desc:0 "Des Chevaliers de l'Ordre Allemand patrouillent l'arrière-pays autour de notre cité, nous gardant à l'abri des bandits et des barbares. Afin de continuer leur saint devoir, nous devons coopérer avec ces chevaliers et faire construire par nos citoyens un grand monastère pour eux. Ce n'est qu'alors que nous pourrons attirer ces hommes bons dans notre cité et nous garder à l'abri des envahisseurs et des bandits."
 ROT_drink_of_war:0 "La Boisson de Guerre"
 ROT_drink_of_war_desc:0 "Il y a une légende populaire parmi le peuple de Rothenburg. La légende raconte que le Comte de Tilly avait assiégé notre ville et avait l'intention de la brûler jusqu'au sol, mais le conseil municipal a tenté de le convaincre de montrer de la clémence avec une boisson de trois litres de vin. Il a ricané, et a exigé que si le maire pouvait finir la boisson seul, il épargnerait la ville. Notre magnifique maire avait un estomac de fer et une volonté d'acier et il a terminé la boisson sans même faire de pause pour respirer, et fidèle à sa parole, le Comte a déclaré que la ville était sauvée. Ainsi, c'est vrai, aucun homme ne tient l'alcool comme un homme de Rothenburg !"
 ROT_holy_blood:0 "Le Saint Sang"
 ROT_holy_blood_desc:0 "Notre coopération avec l'Ordre Allemand a fait de notre cité un lieu saint, populaire auprès des pèlerins de tout Cannor. Une route de pèlerins populaire est le Pèlerinage du Saint Sang, qui a Rothenburg comme l'une de ses villes majeures le long du parcours. Les pèlerins apportent souvent des richesses et des biens avec eux, dont nous pourrions bien sûr profiter..."
 ROT_klingentorturm:0 "Klingentorturm"
 ROT_klingentorturm_desc:0 "Notre cité est entourée de murs, et ces murs nous ont gardés à l'abri tant des bandits et des pillards de la campagne allemande que des armées d'invasion étrangères. De nombreux hommes de notre nation voient comme leur devoir patriotique de tenir les murs au moins une fois dans leur vie. Tant que le Klingentorturm tiendra, Rothenburg tiendra."
 ANH_ideas:0 "Idées d'Anhalt"
 ANH_ideas_start:0 "Traditions d'Anhalt"
 ANH_ideas_bonus:0 "Ambition d'Anhalt"
 ANH_mittelgebirge:0 "Mittelgebirge"
 ANH_mittelgebirge_desc:0 "Notre foyer est situé entre les montagnes du Harz et le fleuve Elbe, protégé et coupé du reste de la Saxe. Cet isolement relatif et cette position défensive ont apporté la prospérité à Anhalt pendant des siècles, et si nous continuons à rester en dehors des conflits mesquins de nos confrères Princes, nous ferons d'Anhalt la perle de l'Elbe."
 ANH_branches:0 "Les Branches d'Anhalt"
 ANH_branches_desc:0 "Lorsque le bon Duc Henri est décédé, ses territoires ont été divisés entre ses trois fils, qui à leur tour partitionneraient également leurs territoires entre leurs fils, et ainsi l'administration royale d'Anhalt continuerait à se diviser et à croître avec chaque génération. Bien que de nombreuses branches convergent et se consolident en une, ce style de gouvernement facilitera l'expansion d'Anhalt et la croissance et la prospérité de notre lignée royale."
 ANH_incorporating_the_bishopric:0 "Incorporation de l'Évêché"
 ANH_incorporating_the_bishopric_desc:0 "Il y a longtemps, notre nation était divisée entre la Principauté d'Anhalt et l'Évêché de Halberstadt du côté nord des montagnes du Harz. Lorsque le Duc Henri est décédé, ses territoires ont été divisés entre ses fils, et avec la promesse de toujours suivre la seule vraie parole de Dieu, l'Évêque de Halberstadt a juré fidélité au fils aîné de Henri et a rejoint le district d'Aschersleben."
 ANH_castle:0 "Château d'Anhalt"
 ANH_castle_desc:0 "Bien que notre nation ait longtemps été protégée par les montagnes et les rivières de notre patrie, le terrain seul n'était pas suffisant pour nous protéger des envahisseurs. Malgré notre petite taille, le Donjon d'Anhalt a été rapidement transformé en Château d'Anhalt, construit dans les montagnes du Harz pour protéger notre nation de tout entrant avec des intentions malveillantes. C'est la nécessité de survie qui motive la rapidité de nos bâtisseurs, et si Anhalt doit continuer à se protéger de la subjugation, nous devons continuer cette tradition de construction rapide et économique."
 ANH_garden_kingdom:0 "Royaume-Jardin de Dessau"
 ANH_garden_kingdom_desc:0 "Notre patrie est pleine de vastes espaces vides, mais notre Lignée Royale mérite quelque chose pour démontrer la richesse et le pouvoir détenus au sein d'Anhalt. Bien que beaucoup construiraient un palais ou une cathédrale, notre sage noblesse désire plutôt établir un jardin si vaste et beau qu'il est lui-même un Royaume que les nobles peuvent explorer."
 ANH_schultheiss:0 "Le Duc et le Schultheiss"
 ANH_schultheiss_desc:0 "L'une des plus grandes colonies du Duché d'Anhalt est Dessau, qui elle-même est gouvernée de manière autonome par un individu sélectionné par le Duc et élu par le peuple. La gouvernance de ce style est commune à travers Anhalt et garantit que la collecte des impôts dans nos nombreuses villes et villages est effectuée de manière exacte et rapide sans détournement de fonds."
 ANH_confessor:0 "Le Confesseur"
 ANH_confessor_desc:0 "Avec la Réformation se répandant à travers le monde chrétien, il est temps qu'Anhalt prenne position sur cette question préoccupante. En nous rangeant du côté des réformateurs et en adoptant le titre de Confesseur, nous pouvons mettre fin à la corruption du Ravélianisme dans notre nation, et répandre la seule vraie parole de Dieu, libre des fioritures et des faux-semblants des Ravéliens !"
 AUS_ideas:0 "Idées Australiennes"
 AUS_ideas_start:0 "Traditions Australiennes"
 AUS_ideas_bonus:0 "Ambition Australienne"
 AUS_outback_stations:0 "Stations de l'Outback"
 AUS_outback_stations_desc:0 "L'Outback est une nature sauvage rude et impitoyable dépourvue des commodités nécessaires à la vie telles que les rivières et les précipitations. Cependant, nous avons adopté une méthode d'élevage semblable à l'élevage en ranch d'Aelantir, où le propriétaire foncier reçoit des terres de la Couronne sur lesquelles élever son bétail et ses chevaux. Cette méthode d'élevage est adaptable à toutes les conditions, et a rendu des régions du pays qui seraient habituellement inutiles en composantes productives vitales de l'État."
 AUS_land_down_under:0 "Le Pays d'En Bas"
 AUS_land_down_under_desc:0 "L'Océanie a été le dernier continent à être découvert par les Cannoriens, et l'Australie est de loin la plus grande masse terrestre singulière sur le continent océanien. Les créatures trouvées en Australie étaient à un moment considérées si fantastiques et d'un autre monde que de nombreux Cannoriens ne croyaient tout simplement pas qu'elles pouvaient exister jusqu'à ce qu'ils les voient de leurs propres yeux. La nature inconnue de notre faune et de notre géographie rend l'Australie mortelle pour les armées d'invasion. Nous étions autrefois des étrangers sur cette terre aussi, mais nous nous sommes adaptés aux rudes conditions de l'outback et nos soldats peuvent facilement s'adapter à tout sol étranger."
 AUS_eureka_rebellion:0 "La Rébellion d'Eureka"
 AUS_eureka_rebellion_desc:0 "Nous avons été envoyés en Australie par notre ancien suzerain comme prisonniers, minorités non désirées et insurgés politiques de la patrie pour travailler dans les mines d'or de cette terre étrangère. Notre suzerain était assez fou pour croire qu'envoyer des hommes qui avaient des raisons de haïr l'État n'inciterait pas à une rébellion, mais les mineurs d'or ont inévitablement levé leur drapeau en rébellion contre la couronne. Notre suzerain exigeait que nous rendions la plupart des richesses accumulées de l'extraction de notre or, mais nous n'en avions rien à faire de ces bêtises ! C'est cette rébellion qui a donné naissance au Drapeau Eureka, et bien que cette rébellion ait échoué, nous nous tenons maintenant enfin comme une nation indépendante, et personne ne prendra l'or australien sinon les Australiens !"
 AUS_sandpaper_and_cheating:0 "Les Diggers"
 AUS_sandpaper_and_cheating_desc:0 "Les Diggers Australiens sont des fusiliers et des marines déployés pour combattre sur un sol étranger pour notre glorieux Empire. Le terme « digger » est de l'argot pour mineur du fait que la plupart des soldats Digger sont des mineurs lorsqu'ils ne sont pas en service actif. Le terme informel symbolise le concept australien d'être « copains » ; égaux, camarades et amis."
 AUS_royal_navy:0 "Marine Royale Australienne"
 AUS_royal_navy_desc:0 "La Marine Royale Australienne est divisée en six divisions basées sur les différentes provinces de la colonie australienne. Maintenant que nous sommes libres de la domination coloniale, nous sommes libres d'unir les six provinces en une seule et nous ferons de l'Australie une force féroce et incontestée dans le Pacifique."
 AUS_bushrangers:0 "Intégration des Bushrangers"
 AUS_bushrangers_desc:0 "Un nombre considérable de colons envoyés du continent pour vivre en Australie étaient des condamnés et des indésirables forcés à l'exil, et les plus rusés parmi ces voleurs et coupe-gorges deviendraient des Bushrangers. C'étaient des hommes endurcis qui utilisaient l'impitoyable brousse australienne comme base pour leurs opérations de vol. Ils étaient particulièrement riches et puissants pendant la Ruée vers l'Or Australienne, mais maintenant que nous avons gagné notre liberté de nos oppresseurs coloniaux, ces hommes ne sont condamnés pour personne, et nous ferions bien d'utiliser leurs tactiques d'embuscade sur nos ennemis !"
 AUS_waltzing_matilda:0 "Waltzing Matilda"
 AUS_waltzing_matilda_desc:0 "Un jour un joyeux vagabond campait près d'un billabong\nÀ l'ombre d'un coolibah,\nEt il chantait en attendant que son Billy bouille,\n« Tu viendras danser la Matilda avec moi. »\n\nCette chanson folklorique traditionnelle australienne symbolise les valeurs de notre peuple. Elle raconte l'histoire d'un condamné évadé volant un mouton et mourant dans son combat contre la loi. Car pour nous en Australie, ce n'est pas la gloire de la victoire, mais l'honneur de la lutte qui définit qui nous sommes !"
 swabian_ideas:0 "Idées des Cités-États Souabes"
 swabian_ideas_start:1 "Traditions des Cités-États Souabes"
 swabian_ideas_bonus:1 "Ambition des Cités-États Souabes"
 swabian_mercenaries:0 "Mercenaires Souabes"
 swabian_mercenaries_desc:0 "Bien que les Mercenaires Suisses soient renommés à travers Cannor, nous Souabes offrons aux suisses une compétition redoutable, nos propres mercenaires étant réputés pour leur discipline et leur efficacité sur le champ de bataille."
 swabian_river_iller:0 "Au Bord de la Rivière Iller"
 swabian_river_iller_desc:0 "Nous sommes séparés des Bavarois par la Rivière Iller, et avec l'expansion des ducs bavarois à l'Est, la rivière s'avérera utile non seulement pour nourrir nos cultures et garder la Souabe fertile, mais aussi comme position défensive dans tout conflit dans lequel nous nous trouvons contre les Bavarois."
 swabian_bavarian_resistance:0 "Résistance Bavaroise"
 swabian_bavarian_resistance_desc:0 "Comme toute région de l'Empire, les États souabes se trouvent en autant de conflit entre eux qu'avec toute menace externe. Avec nos voisins de l'Est se consolidant en un Royaume centralisé et avec l'influence croissante des Habsbourg dans la région, nous devons mettre de côté nos querelles mesquines et travailler pour maintenir l'indépendance de tous les États souabes."
 swabian_decapole:0 "Décapole"
 swabian_decapole_desc:0 "La Décapole était une alliance formée par les États impériaux à la frontière française, dont beaucoup sont souabes. Bien que nous dépendions habituellement de l'Empire pour soutenir notre indépendance, la politique interne de l'Empire est toujours en tumulte, et ce n'est qu'en formant des alliances comme la Décapole que nous pouvons vraiment résister à l'influence étrangère."
 swabian_reclaiming_the_duchy:0 "Réclamer le Duché"
 swabian_reclaiming_the_duchy_desc:0 "Le Duché de Souabe a été dissous il y a plus d'un siècle, mais le rêve de réunir la nation est fort parmi tous les États successeurs. Nos tentatives de reconsolidation jusqu'à présent ont été écrasées par l'Empereur, mais il ne peut pas nous maintenir supprimés éternellement !"
 swabian_thorn_of_the_empire:0 "L'Épine de l'Empire"
 swabian_thorn_of_the_empire_desc:0 "Tout au long de notre histoire, l'Empereur n'a cherché rien d'autre qu'à nous soumettre, mais la Souabe n'est pas un chien des Habsbourg. Nous continuerons à être une épine dans le pied de l'Empereur, jusqu'à ce que nous ayons éliminé toute trace d'influence des Habsbourg de la Souabe !"
 swabian_habsburg_league:0 "La Ligue des Habsbourg"
 swabian_habsburg_league_desc:0 "Inspiré par les ligues suisses au sud, l'Empereur a organisé les nombreuses cités-États souabes en une ligue libre et indépendante avec un Prince Habsbourg comme chef. Contrairement aux Cantons Suisses qui organisent leur gouvernement autour de la protection mutuelle et d'un désir partagé d'indépendance et de liberté, la Ligue Souabe est une union beaucoup plus agressive et militariste conçue pour contester les Suisses. Bien que de nombreux Souabes soutiennent l'idée de rejoindre la Ligue Suisse, nous devons maintenir l'illusion que la Ligue Souabe fera tout aussi bien pour garder notre indépendance."
 LAU_ideas:0 "Idées de Saxe-Lauenbourg"
 LAU_ideas_start:0 "Traditions de Saxe-Lauenbourg"
 LAU_ideas_bonus:0 "Ambition de Saxe-Lauenbourg"
 LAU_partition_of_saxony:0 "Le Partage de la Saxe"
 LAU_partition_of_saxony_desc:0 "Notre nation est née du partage du Duché original de Saxe. Lorsque Jean Ier a abdiqué ses fonctions de Duc, il a déterminé qu'il diviserait ses titres et son gouvernement parmi ses fils et frères. Cette déconstruction de l'ancien État saxon rend quelque peu incertain qui est le propriétaire légitime de quoi, mais la confusion facilite certainement la revendication de la région."
 LAU_diarchy:0 "Duché Diarchique"
 LAU_diarchy_desc:0 "Une fois que le Duché de Saxe eut été dissous et notre nation pleinement établie, nous avons passé quelques années extensives sous un gouvernement diarchique d'Eric Ier et de quelques-uns de ses frères. Dissoudre ce gouvernement et centraliser Saxe-Lauenbourg en un duché libre à part entière fut un grand défi, mais les manœuvres politiques entreprises par Eric Ier ont fait de nos ducs des maîtres de l'art de gouverner et de plaire à la cour."
 LAU_niedersachsen:0 "Niedersachsen"
 LAU_niedersachsen_desc:0 "Nous nous trouvons en conflit constant avec les États successeurs saxons, dont beaucoup détiennent plus de terres et de titres que notre Duc. Les autres nations de la région nous voient comme des prétendants au trône saxon, et bien que ce puisse être une belle idée de s'asseoir sur le trône de Saxe, nous avons besoin d'un nouveau titre pour notre nation qui donne au moins l'illusion que nous n'avons aucun désir d'unir les nations saxonnes. Niedersachsen, signifiant Basse-Saxe, confirme à la fois que nous ne prétendons pas être les successeurs de l'ancien duché saxon tout en n'affaiblissant pas notre revendication au titre, si nous choisissions de le poursuivre."
 LAU_claiming_electorate:0 "Revendiquer l'Électorat"
 LAU_claiming_electorate_desc:0 "Bien que nous ne puissions jamais réunir la Saxe en une seule nation, nous aimerions certainement détenir la position électorale dans l'Empire que notre nation détenait autrefois. Actuellement, les États saxons sont divisés en le Cercle de Haute-Saxe et le Cercle de Basse-Saxe, et ce sont les Hauts-Saxons qui ont la faveur de l'Empereur et détiennent la position électorale. Peut-être qu'en rendant l'Empereur plus favorable à notre cause, nous pourrions faire du Cercle de Basse-Saxe le choix de l'Empereur pour toute position électorale future."
 LAU_church_of_hadeln:0 "L'Ordre Ecclésiastique de Hadeln"
 LAU_church_of_hadeln_desc:0 "Avec la réformation brûlant son chemin à travers Cannor, Saxe-Lauenbourg doit décider s'il restera loyal au Vatican ou se ramifiera et formera sa propre église basée sur les enseignements de Luther. Le Peuple de Hadeln a déjà commencé à organiser un ordre ecclésiastique centré sur la Réformation, et avec l'approbation de notre Duc et l'embrassement des enseignements protestants, l'ordre pourrait être officiellement reconnu et former une partie vitale de notre gouvernement."
 LAU_centralisation:0 "Centralisation de Lauenbourg"
 LAU_centralisation_desc:0 "Même alors que notre État s'étend et grandit, et que notre dirigeant revendique de plus en plus de titres, Lauenbourg reste le siège du pouvoir dans le Duché. Les murs du Château de Lauenbourg sont impénétrables, et notre position centrale dans la région du Schleswig-Holstein fait de notre grande capitale un emplacement idéal pour gouverner l'Allemagne du Nord."
 LAU_salty_salty_salty:0 "Vieille Route du Sel"
 LAU_salty_salty_salty_desc:1 "La Vieille Route du Sel est une route commerciale à travers l'Allemagne du Nord, et Saxe-Lauenbourg est une capitale commerciale importante dans ce commerce salé. Si profitable est cette route commerciale que le sel est souvent appelé « or blanc », et bien que cet « or » puisse être facilement acquis en faisant bouillir les eaux saumâtres de Lüneburg, les profits qu'il apporte à Saxe-Lauenbourg à travers ce commerce lucratif parlent d'eux-mêmes."
 BRG_ideas:0 "Idées de Berg"
 BRG_ideas_start:0 "Traditions de Berg"
 BRG_ideas_bonus:0 "Ambition de Berg"
 BRG_heirs_of_lotharingia:0 "Les Héritiers de Lotharingie"
 BRG_heirs_of_lotharingia_desc:0 "Notre lignée peut être retracée jusqu'aux Rois originaux de Lotharingie, et sans le déclin de l'ancien royaume, tout le Rhin et au-delà plierait le genou devant notre famille. Bien que ces jours soient loin derrière nous, le prestige de notre lignée et notre revendication au droit divin de gouverner le Rhin n'est pas sujet à débat."
 BRG_julich_berg:0 "Duché de Juliers-Berg"
 BRG_julich_berg_desc:0 "Suite à la chute du Royaume Lotharingien, notre territoire a été divisé en deux régions ; le comté de Mark et le comté de Berg. Le comte serait plus tard élevé au rang de Duc par l'Empereur Venceslas, nous rendant certains de nos territoires et titres perdus dans le processus."
 BRG_united_duchies:0 "Les Duchés Unis"
 BRG_united_duchies_desc:0 "À mesure que notre puissant duché s'étend, les différentes lois de succession et le nombre croissant de prétendants à nos titres commencent à devenir quelque peu confus. Nous nous trouvons constamment à tomber dans et hors d'unions, et à former nos propres unions. Modeler notre État comme une série de duchés séparés et autonomes unis sous un seul duc peut s'avérer utile pour maintenir toutes nos diverses terres et titres."
 BRG_seat_of_the_electorate:0 "Le Siège de l'Électorat"
 BRG_seat_of_the_electorate_desc:0 "À mesure que nos duchés unis se rapprochent de l'Électorat du Palatinat, les chances que nos deux nations entrent en union commencent à apparaître plus probables. Cependant, si une telle chose devait se produire, il est clair que Düsseldorf deviendrait la nouvelle capitale de l'Électorat Palatin."
 BRG_rhineland_market:0 "Le Marché Rhénan"
 BRG_rhineland_market_desc:0 "À mesure que notre influence en Rhénanie grandit, Düsseldorf commence à se développer en une véritable métropole. Les marchands affluent vers la place du marché sur la rive du Rhin, et la prospérité du marché commence à se répandre dans toute la cité. Les cathédrales, les manoirs et les demeures majestueuses deviennent une vue commune à Düsseldorf, et nous serions fous de ne pas capitaliser sur cette prospérité et faire de notre grande cité l'une des plus prestigieuses de toute l'Allemagne !"
 BRG_art_gallery:0 "Galerie d'Art de Düsseldorf"
 BRG_art_gallery_desc:0 "Avec l'émergence de la Renaissance en Italie, nos Ducs et Duchesses ont pris un grand intérêt pour les arts. Dans le château de la cité, notre classe noble a construit une galerie d'art regorgeant des sculptures et peintures les plus époustouflantes de toute l'Allemagne, et la noblesse de tout l'Empire afflue pour voir l'incroyable collection hébergée à Düsseldorf."
 BRG_happy_clergy:0 "Respecter l'Autonomie du Clergé"
 BRG_happy_clergy_desc:0 "Même alors que notre État s'étend à travers le Rhin, nous n'avons jamais fait de mal aux bons hommes d'église qui occupent la Rhénanie. Nous croyons en la sainteté de l'église, et attaquer un membre du clergé est une ligne que nous ne franchirons jamais sans la provocation appropriée."
 TNT_ideas:0 "Idées de Trente"
 TNT_ideas_start:0 "Traditions de Trente"
 TNT_ideas_bonus:0 "Ambition de Trente"
 TNT_prince_bishop:0 "Prince-Évêque"
 TNT_prince_bishop_desc:0 "Notre gouvernement est un compromis entre la gouvernance séculière d'un Prince Impérial, et la gouvernance dévote d'un Prêtre Ravélien, avec le Prince-Évêque à sa tête. En consolidant les autorités séculières et religieuses dans notre nation, l'Église et l'État seront ensemble les deux piliers qui soutiennent notre nation."
 TNT_republican_slaughter:0 "Massacre des Républicains"
 TNT_republican_slaughter_desc:0 "Le lien inséparable entre l'Église et l'État a causé beaucoup de troubles au sein de notre nation. Les paysans envient sottement les gouvernements républicains adoptés par d'autres petits États en Italie et dans l'Empire, mais ils ne comprennent tout simplement pas que c'est leur devoir de servir Dieu et l'Empereur et la seule façon de le faire est de servir le Prince-Évêque. Peut-être qu'en enfonçant périodiquement nos lances dans les cœurs des paysans rebelles, nous leur rappellerons nos valeurs pacifiques."
 TNT_south_tyrol_identity:0 "Identité du Tyrol du Sud"
 TNT_south_tyrol_identity_desc:0 "Notre patrie montagneuse existe à un carrefour entre l'Italie et l'Autriche, et en tant que tel notre nation est un creuset de cultures germaniques et latines. Nous avons appris à coexister avec ceux qui sont différents de nous, et peut-être qu'en embrassant cette identité multiculturelle, nous pourrions promouvoir le dialogue entre d'innombrables autres cultures au sein de notre État."
 TNT_italy_and_the_empire:0 "L'Italie et l'Empire"
 TNT_italy_and_the_empire_desc:0 "Notre position géographique est aussi un grand avantage pour le commerce et l'économie. Il y a peu de chemins entre l'Italie et l'Empire, et le nôtre est la route la plus directe de Vienne à Milan et Venise, et les opportunités commerciales pour notre petite nation sont grandes et peut-être qu'un jour, nous pourrions même dépasser ces partenaires commerciaux majeurs et bâtir une grande économie en nous-mêmes !"
 TNT_trent_brixen_confederacy:0 "Confédération Trente-Brixen"
 TNT_trent_brixen_confederacy_desc:0 "Notre règne est assuré par la confédération perpétuelle entre notre Prince-Évêché et l'Évêché de Brixen. Notre Confédération est unie tant dans la foi que dans notre désir farouche de maintenir notre indépendance. Peut-être qu'en établissant plus d'évêchés à mesure que nous étendons notre nation, nous pourrons maintenir un contrôle plus direct sur nos territoires conquis."
 TNT_mountain_warfare:0 "Guerre de Montagne"
 TNT_mountain_warfare_desc:0 "Tout au long de l'histoire du Tyrol, le combat que nous avons affronté dans les montagnes nous a rendus robustes et impossibles à conquérir pour les forces molles et faibles des envahisseurs étrangers. Ils ne sont pas habitués aux rudes conditions des Alpes, mais nous sommes nés sur ces collines et avons grandi dans ces montagnes, et nous utiliserons notre familiarité avec ces conditions rudes pour faire fuir toute armée étrangère vers son pays !"
 TNT_trent_religious_unity:0 "Unité Religieuse de Trente"
 TNT_trent_religious_unity_desc:0 "Bien que nous soyons divisés culturellement, c'est notre foi qui nous unit. Alors que les feux de la réformation brûlent leur chemin à travers Cannor, nous ne permettrons pas à notre peuple de se diviser sur des questions de foi. Quelle que soit la doctrine chrétienne à laquelle nous nous engageons, nous devons nous assurer par-dessus tout, que tout le monde au sein de notre nation fasse de même."
 HRZ_ideas:0 "Idées herzégoviniennes"
 HRZ_ideas_start:0 "Traditions herzégoviniennes"
 HRZ_ideas_bonus:0 "Ambition herzégovinienne"
 HRZ_eparchy:0 "Éparchie"
 HRZ_eparchy_desc:0 "L'Éparchie de Zahumlje et d'Herzégovine n'est pas seulement un centre spirituel de notre nation, c'est aussi la Métropole où les évêques d'Herzégovine informent notre souverain et s'assurent qu'il continue de suivre le juste chemin de Dieu."
 HRZ_saint_sava:0 "Saint Sava"
 HRZ_saint_sava_desc:0 "Le titre officiel de notre nation est le Duché de Saint Sava. Nous avons adopté ce titre pour nous distancier du Royaume de Bosnie, nouvellement converti au ravélianisme, et pour vénérer le grand Saint Sava qui avait été une icône unificatrice pour de nombreux peuples des Balkans. Saint Sava était un comte de Hum qui abandonna ses titres royaux pour devenir moine au Mont Athos, qu'il transforma ensuite en un important centre religieux pour l'Église orthodoxe avec la fondation du Monastère de Hilandar. Saint Sava représente pour nous notre dévotion à l'Église orthodoxe et constitue l'icône qui nous sépare du Royaume de Bosnie."
 HRZ_stjepan_rebellion:0 "La Rébellion de Stjepan"
 HRZ_stjepan_rebellion_desc:0 "Lorsque le Roi de Bosnie osa s'écarter de la seule vraie foi, notre bon chef Stjepan utilisa l'Herzégovine comme base pour monter sa rébellion. Que nous continuions ou non à pratiquer l'orthodoxie orientale, l'esprit de ce qui fait de nous des Herzégoviniens est ancré dans la résistance et la force, et nous ne servirons jamais aucun « Roi » qui oserait exiger que nous changions."
 HRZ_ottoman_accommodation:0 "Accommodement avec les Turcs ottomans"
 HRZ_ottoman_accommodation_desc:0 "Alors que de nombreuses autres nations résistent à la puissance croissante des Turcs ottomans, de nombreux nobles d'Herzégovine affluent vers les Turcs pour obtenir leur soutien afin de renverser le régime tyrannique de Bosnie. Peut-être qu'en acceptant la montée des Ottomans, nous pourrons manipuler leur noblesse et leurs armées pour qu'elles combattent pour notre cause et fassent avancer nos intérêts dans les Balkans."
 HRZ_herceg:0 "Herceg"
 HRZ_herceg_desc:0 "Lorsque nous avons déclaré notre indépendance du Royaume de Bosnie, nous n'étions ni un Roi ni un Duc. Notre sage chef Stjepan adopta le titre de « Herceg », un titre emprunté à l'Empire d'Anbennar. Ainsi, le titre séculier du Duché de Saint Sava devint l'Herzégovine, les terres appartenant au Herceg. Avec notre identité nationale liée à notre brillant chef, nous resterons unis dans notre dévotion absolue aux sages dirigeants de notre nation alors qu'ils nous guident sur le chemin de la victoire et de la prospérité."
 HRZ_shifting_allegiances:0 "Allégeances mouvantes"
 HRZ_shifting_allegiances_desc:0 "Notre Herceg a plié le genou devant Espagnols, Turcs, Bosniaques et Serbes. Nous comprenons que les vents du changement et de la fortune favorisent ceux qui ont la langue d'argent et une politique étrangère flexible. Nous n'avons jamais été un grand empire ou royaume, mais nous avons continué à protéger nos intérêts, tant en tant que nation indépendante que sujette de puissances étrangères, grâce à notre diplomatie flexible et nos tactiques de négociation acharnées. En gardant nos oreilles ouvertes aux nouvelles opportunités diplomatiques, nous continuerons à protéger nos intérêts dans le paysage inconstant de la politique méditerranéenne."
 custom_positive_piety:0 "Dévotion au légalisme"
 custom_positive_piety_desc:0 "Le Coran indique très clairement comment notre religion doit être pratiquée. Ce n'est que par une dévotion totale au légalisme islamique que nous pourrons prouver que nous sommes une nation pieuse et dogmatique, unie par l'étude du droit islamique."
 custom_negative_piety:0 "Dévotion au mysticisme"
 custom_negative_piety_desc:0 "Notre État est entièrement dévoué au mysticisme islamique et, malgré tous nos efforts pour ramener les fidèles à la lettre de la loi telle qu'elle est dictée dans le Coran et les Hadiths, le peuple de notre nation s'oriente inévitablement vers l'aspect spirituel de la pratique islamique."
 custom_reform_progress:0 "Politique progressiste"
 custom_reform_progress_desc:0 "Notre nation est célèbre pour sa politique en constante évolution. On dit que chaque jour dans notre nation, les rouages du progrès gouvernemental sont en action, poussant toujours notre nation vers un avenir radieux."
 custom_free_religion:0 "Liberté de religion"
 custom_free_religion_desc:0 "De nombreuses personnes vivent comme si elles étaient séparées et différentes, mais font en réalité toutes partie d'un même ensemble : notre grande nation. Bien que nous maintenions toujours une religion d'État officielle qui peut être propagée, hérétiques et païens sont nos frères et seront protégés de la persécution religieuse."
 custom_same_culture_idea_advisor_cost:0 "Mécène de la culture"
 custom_same_culture_idea_advisor_cost_desc:0 "La nature de notre culture et de notre État est devenue inséparable et de nombreuses personnes talentueuses de notre culture viennent visiter notre nation comme une sorte de rite de passage. Les gens de notre culture fière et ancienne considèrent qu'il est de leur devoir patriotique de servir l'État et le feront volontiers pour bien moins que ce qu'ils méritent probablement."
 custom_power_prod_insults:0 "Artistes de l'insulte professionnels"
 custom_power_prod_insults_desc:0 "Notre État n'emploie que les plus expérimentés dans l'art de l'insulte. Quand on est repoussé par un diplomate de notre nation, on dit que même les plus puissants Khans et Rois rentreraient chez eux en pleurant pour que leurs mères soignent leur fierté profondément blessée."
 custom_manifest_destiny:0 "Partager notre Âge d'or"
 custom_manifest_destiny_desc:0 "Notre nation connaît l'âge d'or le plus long de l'histoire : culture, économie, agriculture, tout prospère comme jamais auparavant dans notre nation. Il serait égoïste de garder toute cette prospérité pour nous alors qu'il y a de pauvres primitifs malheureux dans le monde qui pourraient partager ce grand âge avec nous !"
 custom_justify_conflict_cost:0 "Marchands féroces"
 custom_justify_conflict_cost_desc:0 "Nos marchands sont une partie vitale de notre nation et ils sont féroces et trop zélés dans leurs négociations. Certains étrangers confondent notre passion pour le commerce avec de l'agressivité, mais nous n'en avons cure, nous voulons juste leur argent."
 custom_claim_fab_cost:0 "Maîtres des murmures"
 custom_claim_fab_cost_desc:0 "Nous possédons le droit divin de régner et ce droit s'étend à peu près partout où nous le souhaitons. Notre réseau d'espions et de comploteurs ne connaît pas de limites et ils sont experts pour trouver le document le plus obscur détaillant comment nous sommes les souverains légitimes de pratiquement n'importe où sur notre frontière directe."
 custom_sailor_maintenance:0 "Marins doux"
 custom_sailor_maintenance_desc:0 "Nous sommes une société maritime et nos marins sont largement réputés pour leurs bonnes manières et leur nature douce. On dit que peu importe où nos marins accostent, ils sont accueillis dans la ville à bras ouverts. Il y a même ceux dans notre nation qui prétendent ne parler qu'aux marins, car ce sont les seules personnes qui valent leur temps."
 custom_artillery_fire:0 "Canons dorés"
 custom_artillery_fire_desc:0 "Certains diraient que dépenser des quantités massives du trésor pour des canons en or est une dépense inutile, mais ces gens ne sont simplement pas éclairés. En n'utilisant que les métaux de la plus haute qualité pour fabriquer nos canons, le monde craindra le tonnerre de nos fûts."
 custom_coastal_combat:0 "Un avec l'eau"
 custom_coastal_combat_desc:0 "Les vagues violentes et les typhons de l'océan semblent toujours être un cauchemar pour nos ennemis, mais une grande aide pour nos propres hommes. Certains croient même que nos marins plient littéralement l'eau à leur volonté, mais une telle suggestion est clairement ridicule."
 custom_manchu_ban:0 "Organisation des bannières"
 custom_manchu_ban_desc:0 "Les tactiques de horde sont très utiles pour briser les défenses d'une nation, mais en organisant nos cavaliers, nous serons en mesure de rassembler des nombres bien plus grands."
 custom_garrison_growth:0 "Allumer les feux"
 custom_garrison_growth_desc:0 "Habituellement, en temps de paix, les forts sont laissés à l'abandon et rassembler des soldats pour renforcer ces forts en temps de guerre peut prendre plusieurs mois. En installant une série de feux de signalement à travers notre nation, nos hommes sauront rapidement qu'il est de leur devoir de se présenter à leur garnison locale et de commencer la défense de notre nation."
 custom_available_province_loot:0 "Pillage organisé"
 custom_available_province_loot_desc:0 "Les butins de guerre sont en effet considérables. Nous pillerons systématiquement chaque centimètre de la campagne ennemie afin qu'aucun trésor caché ne reste découvert."
 greek_orthodox_constantinople_title:0 "Restaurer Constantinople"
 greek_orthodox_constantinople_desc:0 "La ville de Constantinople était autrefois un phare rayonnant de l'Empire romain d'Orient avant la conquête turque et la conversion de la ville. Nous devons reprendre la ville et la restaurer dans son ancienne gloire."
 EVTDESC3072.TC:0 "Nos colons dans la province de [Root.GetName] tentent simplement d'apporter la civilisation aux terres sauvages de [Root.GetSuperRegionName] et de l'éclairer avec notre culture supérieure. Cependant, il semble que les sauvages [Root.NativeCulture.GetName] refusent d'accepter nos voies supérieures et notre traitement sévère de ces indigènes n'a fait qu'augmenter les tensions entre les tribus [Root.NativeCulture.GetName] et nos colons. La seule question maintenant est : comment résoudre cette situation ?"
 EVTDESC3074.TC:0 "Il semblerait que notre traitement sévère du peuple [Root.NativeCulture.GetName] vivant à [Root.GetName] ait porté ses fruits de façon massive. Forcer ces primitifs à quitter leur sol riche et fertile a créé de nouvelles opportunités pour nos colons de prendre leur place et nos compagnies coloniales ont déjà commencé à exploiter les terres ancestrales des [Root.NativeCulture.GetName], mais elles demandent une aide financière pour achever la construction de la nouvelle colonie."
 extremadura_area:0 "Estrémadure"
 extremadura_area_name:0 "Estrémadure"
 extremadura_area_adj:0 "Estrémadurienne"
