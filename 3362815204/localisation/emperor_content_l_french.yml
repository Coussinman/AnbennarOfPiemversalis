 industrialization:0 "Industrialisation"
 desc_industrialization:0 "Le rythme effréné du progrès technologique commence à exercer une influence profonde sur l'organisation même de la société. L'invention de la machine à vapeur, l'utilisation du coke dans la production de fer et les nouveaux équipements de fabrication mécanisés permettent des économies d'échelle sans précédent, entraînant une augmentation massive de la productivité des ouvriers. D'autres inventions contribuent grandement à faciliter le transport de volumes considérables de marchandises. Le commerce mondial étant plus interconnecté que jamais, les manufactures peuvent à la fois s'approvisionner en matières premières et vendre les produits manufacturés qui en résultent sur les marchés du monde entier, générant des richesses inimaginables pour leurs propriétaires.\n\nParallèlement, dans le domaine agricole, de nouvelles pratiques telles que la rotation des cultures et l'usage des enclosures ont pareillement accru la productivité, ce qui signifie que moins d'ouvriers sont nécessaires pour travailler la même superficie de terre, poussant nombre d'entre eux à abandonner leurs foyers pour s'installer dans les cités industrielles en pleine expansion. Un monde nouveau est en train de naître, un monde dans lequel les ambitieux et les fortunés domineront la société comme jamais auparavant."
