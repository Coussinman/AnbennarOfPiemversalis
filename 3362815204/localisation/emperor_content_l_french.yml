 incidents_bur_inheritance.6.t:0 "Les Lois du [Root.Monarch.GetTitle] [Root.Monarch.GetName]"
 incidents_bur_inheritance.6.d:0 "[Root.GetName] a évité de justesse une crise de succession désastreuse, avec le [Root.Monarch.GetTitle] [Root.Monarch.GetName] émergeant finalement comme notre souverain incontesté. Mais les lois de succession restent inchangées et pourraient nous rendre vulnérables à une autre crise à l'avenir. Le [Root.Monarch.GetTitle] envisage d'instituer des réformes juridiques qui donneraient aux hommes et aux femmes des droits égaux à l'héritage des titres, éliminant le besoin désespéré pour les monarques d'avoir des héritiers mâles ou de risquer la dissolution de leurs royaumes. Alternativement, nous pouvons considérer la crise comme évitée et nous concentrer plutôt sur le renforcement de l'ordre traditionnel qui a élevé [Root.GetName] au seuil de la grandeur."
 incidents_bur_inheritance.6.a:0 "Changeons les lois de succession."
 incidents_bur_inheritance.6.b:0 "[Root.Monarch.GetName] restaurera la stabilité en [Root.GetName]."
 mary_inheritance_reforms:0 "Réformes de succession bourguignonnes"
 desc_mary_inheritance_reforms:0 "Nous avons réformé les lois de succession afin que les hommes et les femmes aient des droits égaux à la succession des titres."
 mary_reputation:0 "Crise évitée"
 desc_mary_reputation:0 "La crise de succession est terminée. Le monde voit maintenant que nous avons un souverain fort et un royaume stable."
