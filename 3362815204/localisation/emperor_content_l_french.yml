 prussian_republic_reform:0 "Administration Stratocratique"
 prussian_republic_reform_desc:0 "Notre État n'est pas gouverné par des oligarques corrompus, ni par la volonté des masses ignorantes, mais par ses commandants militaires les plus compétents et éprouvés. L'expansion et la protection de nos frontières sont les directives premières de l'État.\n\nDésactive les élections."
