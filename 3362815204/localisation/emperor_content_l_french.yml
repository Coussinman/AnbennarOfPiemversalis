 #Misc new events
 pirates.22.name:0 "Les Pirates de Rügen"
 pirates.22.desc:0 "La mer Baltique est le théâtre de la piraterie depuis des temps immémoriaux. Parmi les marins et pêcheurs de Rügen, nombreux sont ceux qui racontent avec nostalgie les histoires des jours lointains où Klaus Störtebeker et sa bande de Likedeelers sillonnaient les mers et s'enrichissaient en dépouillant tous ceux qui avaient le malheur de les croiser. Comparée à la monotonie de la vie ordinaire, l'excitation de la course semble curieusement attrayante pour beaucoup, même sachant que les Likedeelers finiraient par payer leurs actes de leur vie, un destin qui pourrait bien les attendre eux aussi. Menés par un ancien officier de marine qui prétend descendre de Störtebeker lui-même, ils ont réussi à rassembler plusieurs navires de guerre et sont prêts à hisser à nouveau le pavillon noir.\n\nDevons-nous nous ranger du côté des aspirants pirates ?"
 pirates.22.a:0 "Une vie de pirate pour moi !"
 pirates.22.b:0 "Les lois du pays doivent être respectées."
