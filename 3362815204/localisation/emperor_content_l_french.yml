 become_hussite_title:0 "Adopter l'hussitisme"
 become_hussite_desc:0 "Les enseignements de Jan Hus se sont répandus dans notre nation et beaucoup parmi le peuple sont réceptifs à sa parole. Dénoncée comme hérésie par le Haut-Recteur, adopter cette foi nous mettrait en opposition avec la majeure partie de la chrétienté. Pourtant, avec la droiture dans nos cœurs, nous pouvons surmonter même le plus grand ennemi."
 shadow_kingdom_decision_title:0 "Contenir l'Italie"
 shadow_kingdom_decision_desc:0 "Les Princes italiens doivent être contenus soit par la diplomatie soit par la guerre. Nous ne pouvons permettre à l'Italie de devenir un royaume fantôme !"
 shadow_kingdom_will_leave_info_decision_tt:1 "§YN'a pas été contenu et pourrait quitter l'Empire§!"
 has_reined_in_all_italians_early:0 "Tous les Princes italiens ont été contenus."
 great_peasants_war_emperor_decision_title:0 "Mettre fin à la Grande Guerre des Paysans"
 great_peasants_war_emperor_decision_desc:0 "La Grande Guerre des Paysans doit être amenée à sa fin, avec soit la paysannerie soit la noblesse émergeant comme victorieuse dans ce conflit. À mesure que les paysans imposent leurs demandes ou créent de nouvelles républiques, ils se rapprochent de l'imposition de leurs revendications. Mais quand une nouvelle république est écrasée, la marée tourne en faveur de la noblesse."
 high_peasant_score_emperor_tt:0 "La Progression de la Guerre des Paysans doit être supérieure à §Y9§! ou inférieure à §Y-9§!. Progression actuelle : §Y[1.GPW_counting_variable.GetValue]§!."
 great_peasants_war_peasant_decision_title:0 "Imposer les revendications paysannes"
 great_peasants_war_peasant_decision_desc:1 "Depuis trop longtemps nous avons souffert sous le talon tyrannique de la noblesse. La Progression de la Guerre des Paysans est gagnée quand des pays deviennent des Républiques paysannes ou quand ils s'effondrent face aux rebelles paysans."
 high_peasant_score__peasant_tt:0 "La Progression de la Guerre des Paysans doit être d'au moins §Y10§!. Progression actuelle : §Y[1.GPW_counting_variable.GetValue]§!."
