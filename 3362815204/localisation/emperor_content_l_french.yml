 memes.1.d:0 "Le dirigeant de [da_company.GetName] s'est ennuyé et a décidé d'organiser une sorte de jeu dans lequel chaque homme serait déposé dans une partie de [da_company.Location.GetName] et chargé de traquer les autres."
 memes.1.opt.a:0 "[da_company.Leader.GetName], NOOON !"
