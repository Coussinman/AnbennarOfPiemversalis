 # PROV_ADJ4788:0 "Plasencian"
 # PROV4789:0 "Segovia"
 # PROV_ADJ4789:0 "Segovian"
 nahuatl_events.32.t:0 "Les Muxe à la cour"
 nahuatl_events.32.d:0 "Dans la société zapotèque, il existe trois genres définis : masculin, féminin et muxe. Les muxe sont un groupe de personnes qui ont été désignées comme masculines à la naissance, mais qui se sont depuis reconnues comme féminines. Elles portent des vêtements féminins traditionnels, s'identifient avec des titres féminins et abandonnent généralement leur nom de naissance en faveur de quelque chose de plus conventionnellement féminin.\n\nHabituellement, les muxe sont de peu d'importance pour le [Root.Monarch.GetTitle], cependant notre [Root.Adm_Advisor.GetTitle] [Root.Adm_Advisor.GetName] a confessé qu'elle est membre de la communauté muxe et s'est présentée à la cour sous le nom de [Root.muxe_advisor_name.GetName]. En tant que femme, elle n'est pas éligible pour continuer à servir aux côtés du [Root.Monarch.GetTitle], mais ses talents uniques en font un atout difficile à abandonner.\n\nCertains hauts responsables à la cour suggèrent que les talents de [Root.muxe_advisor_name.GetName] sont la preuve que nous passons à côté d'un trésor infini de talents en interdisant aux femmes de servir à la cour et notre [Root.Monarch.GetTitle] serait bien avisé de réviser les exigences légales pour devenir conseiller royal."
 nahuatl_events.32.a:0 "Les femmes n'ont pas leur place à la cour, muxe ou autrement."
 nahuatl_events.32.b:0 "Homme, femme ou muxe, nous ne pouvons pas perdre notre [Root.Adm_Advisor.GetTitle] !"
 nahuatl_events.321.t:0 "Les Muxe dans l'armée"
 nahuatl_events.321.d:0 "Depuis que notre [Root.GovernmentName] a accepté les droits des muxe à servir à la cour, de plus en plus de hauts fonctionnaires ont commencé à être ouverts sur leur identité muxe. Cela n'a pas posé de problème jusqu'à présent, mais récemment notre [Root.Mil_Advisor.GetTitle] [Root.Mil_Advisor.GetName] a adopté une identité féminine sous le nom de [Root.muxe_military_name.GetName] et s'est associé à un certain nombre de guerriers puissants pour exiger que le droit de servir dans notre armée soit également étendu aux femmes, tant muxe qu'autrement."
 nahuatl_events.321.a:0 "Absolument pas !"
 nahuatl_events.321.b:0 "Pourquoi n'y avons-nous pas pensé plus tôt ?"
 muxe_is_fired_tt:0 "Notre §Y[Root.Adm_Advisor.GetTitle]§! sera renvoyé."
 muxe_general_is_fired_tt:0 "Notre §Y[Root.Mil_Advisor.GetTitle]§! sera renvoyé."
 muxe_advisor_tt:0 "§Y[Root.Adm_Advisor.GetName]§! sera retiré et réapparaîtra à la cour sous le nom de §Y[Root.muxe_advisor_name.GetName]§!."
 muxe_advisor_mil_tt:0 "§Y[Root.Mil_Advisor.GetName]§! sera retiré et réapparaîtra à la cour sous le nom de §Y[Root.muxe_military_name.GetName]§!."
 muxe_at_court:0 "Droits des Muxe"
 desc_muxe_at_court:0 "La présence des muxe à la cour a motivé ce pays à étendre les droits accordés aux femmes."
 muxe_at_military:0 "Les Muxe dans l'armée"
 desc_muxe_at_military:0 "Les muxe ont motivé ce pays à permettre aux femmes de servir dans l'armée."
 cornish:0 "Cornique"
 #PROV4785:0 "Sheffield"
 #PROV_ADJ4785:0 "Sheffielder"
 loses_old_world_provs_tt:2 "§RVous abandonnerez toutes les provinces centrales et sujets en Cannor, Haless et Sarhal.§!\nVous annexerez tous les sujets §YNations coloniales§!."
 producing_wine_and_grain_tt:0 "Production de §YCéréales§! : §G+75,0 %§!\nProduction de §YVin§! : §G+50,0 %§!"
 ALA:0 "Alaska"
 ALA_ADJ:0 "Alaskien"
 CSC:0 "Cascadie"
 CSC_ADJ:0 "Cascadien"
 NZL:0 "Zealandia"
 NZL_ADJ:0 "Kiwi"
 zealandia_nation_title:0 "Former la Zealandia"
 zealandia_nation_desc:0 "Ici, sur les îles du nord et du sud, nous avons fait un foyer pour nous-mêmes. Bien que beaucoup nous oublient et négligent de marquer notre place sur la carte, nous nous unirons ensemble et nous assurerons que tous les peuples connaissent le nom « Zealandia » !"
 alaska_nation_title:0 "Former l'Alaska"
 alaska_nation_desc:0 "Bien que notre patrie soit froide et rude, nous avons maîtrisé son terrain et l'avons appelée notre foyer. D'innombrables empires ont tenté de nous construire et de nous acheter, mais maintenant nous nous dressons seuls et indépendants, prêts à nous forger un nom !"
 cascadia_nation_title:0 "Former la Cascadie"
 cascadia_nation_desc:0 "Tout le long du fleuve Columbia et sur la côte Pacifique d'Aelantir, nos colonies se dressent unies et indépendantes et il est temps que nous décidions d'un nom pour notre nouvelle nation, libre des étiquettes de nos suzerains coloniaux. En tant que Cascadie, nous revendiquerons toutes les terres au nord du fleuve Columbia et créerons une nouvelle nation de commerce, de liberté et de beauté !"
 NZL_ideas:0 "Idées kiwi"
 NZL_ideas_start:0 "Traditions kiwi"
 NZL_ideas_bonus:0 "Ambition kiwi"
 NZL_maori_seats:0 "Sièges maoris"
 NZL_maori_seats_desc:0 "En Zealandia, nous les Kiwis ne sommes pas seuls dans l'occupation de notre île natale. Nos terres abritent également le peuple autochtone connu sous le nom de Maoris. Historiquement, ces personnes ont été grandement maltraitées dans la vague sans fin du colonialisme et bien que nous ne puissions jamais guérir les cicatrices que notre conquête impitoyable a laissées dans son sillage, permettre aux Maoris leur propre représentation au sein du gouvernement pourrait commencer le lent processus de guérison entre nos peuples."
 NZL_otago_gold:0 "La Ruée vers l'or d'Otago"
 NZL_otago_gold_desc:0 "La Zealandia regorge de nourriture et de ressources et notre patrie est idéale pour les mineurs et les bergers. Avec le bétail qui se reproduit en abondance et nos collines qui explosent d'or, de cuivre et d'étain, la Zealandia sera une terre bien plus riche et prospère pour sa petite taille."
 NZL_piopiotahi:0 "Piopiotahi"
 NZL_piopiotahi_desc:0 "Milford Sound, ou « Piopiotahi » comme l'appellent les Maoris, est une spectaculaire étendue de côte et de montagne luxuriante de vie et de verdure dans l'Île du Sud. Elle a été un témoignage de la fertilité de cette terre et pendant des années, ce fut un terrain commun partagé entre les Maoris de tous les Iwi."
 NZL_haka:0 "Le Haka kiwi"
 NZL_haka_desc:0 "Le peuple maori a pratiqué le chant de guerre traditionnel connu sous le nom de Haka pendant des siècles avant notre arrivée sur leurs rivages. Alors que nos cultures commencent à s'entremêler de plus en plus, de nombreuses personnes extérieures à la culture maorie ont commencé à pratiquer le Haka comme démonstration de patriotisme avant une bataille ou un match sportif. Bien au-delà de nos rivages, les étrangers racontent des histoires de Maoris et de Kiwis éclatant dans une terrifiante démonstration d'intrépidité et de masculinité avant de charger au combat."
 NZL_company:0 "La Compagnie de Nouvelle-Zélande"
 NZL_company_desc:0 "Avant que la Compagnie de Nouvelle-Zélande ne fasse la promotion de la vie idyllique offerte par la Zealandia, la colonisation de l'île était lente et stagnante. Mais, grâce aux conseils de la Compagnie de Nouvelle-Zélande, des hordes de colons de tout l'Ancien Monde sont venus en Zealandia pour une vie nouvelle et meilleure. En continuant à promouvoir notre nation comme un phare du rêve colonial, nous pourrons nous répandre à travers le Pacifique avec des hordes de nouveaux colons cherchant refuge et opportunité au sein de notre État !"
 NZL_rejecting_australia:0 "Rejet de la Constitution australienne"
 NZL_rejecting_australia_desc:0 "Notre petite nation s'est vu offrir un jour l'opportunité de rejoindre les colons d'Australie comme leurs sujets, mais par la démocratie seule, le peuple a fait le bon choix et a maintenu l'indépendance de la Zealandia pour tous les temps. En continuant à rejeter et à résister à toute tentative de subjuguer notre peuple, nous persévérerons."
 NZL_pokarekare_ana:0 "Pokarekare Ana"
 NZL_pokarekare_ana_desc:0 "Pokarekare ana, nga wai o Waiapu\nWhiti atu koe hine, marino ana e.\nE hine e, hoki mai ra\nKa mate ahau i te aroha e.\n\nCette chanson parle du long voyage qu'un soldat doit entreprendre avant de retourner vers sa femme et son amour. Nous ne devons pas gaspiller la vie des jeunes hommes dans des guerres inutiles et nous consacrer à la paix et à la tranquillité continues au Pays du Long Nuage Blanc."
 ALA_ideas:0 "Idées alaskiennes"
 ALA_ideas_start:0 "Traditions alaskiennes"
 ALA_ideas_bonus:0 "Ambition alaskienne"
 ALA_endurance:0 "Endurance aléoute"
 ALA_endurance_desc:0 "Le peuple aléoute vit dans l'extrême nord de l'Alaska et a été dans cette terre froide et rude depuis des millénaires, survivant à ces conditions difficiles grâce à des méthodes de pêche et de chauffage ingénieuses. En émulant les tactiques de survie des peuples autochtones de l'Alaska, nous aussi pourrons tirer le meilleur parti de notre foyer froid et impitoyable."
 ALA_hard_push_east:0 "La Dure Poussée vers l'Est"
 ALA_hard_push_east_desc:0 "Contrairement à de nombreuses colonies cannoriennes dans l'extrême ouest d'Aelantir, l'Alaska a été abordé depuis l'Est par la mer. Bien que beaucoup auraient rejeté l'Alaska comme des étendues arctiques inutiles, notre suzerain a sagement pris note de la beauté et des opportunités que présentait notre foyer improbable et s'est rapidement adapté à notre mode de vie quelque peu difficile."
 ALA_secretary_icebox:0 "La Glacière du Secrétaire"
 ALA_secretary_icebox_desc:0 "Même si les terres d'Alaska ont été achetées à un prix ridiculement bas, ne coûtant que 2 cents l'acre, l'achat de l'Alaska a été ridiculisé comme étant « la Glacière du Secrétaire », se moquant des ministres qui ont acheté nos terres. Ce que ces imbéciles à courte vue n'ont pas réussi à reconnaître, c'était la valeur cachée de l'Alaska et de ses ressources, et même maintenant, nous sommes sous-estimés par nos rivaux."
 ALA_bear_hunting:0 "Chasse à l'ours"
 ALA_bear_hunting_desc:0 "Il fait terriblement froid et ennuyeux ici dans les confins septentrionaux de l'Alaska. Une activité que les roturiers et la classe dirigeante apprécient est l'activité de se promener dans la nature avec un fusil et de cribler de balles des animaux sans méfiance ! Cette activité a indirectement fait de notre peuple des tireurs d'élite experts, une compétence incroyablement utile en temps de guerre !"
 ALA_diversity:0 "Diversité religieuse alaskienne"
 ALA_diversity_desc:0 "Notre colonie a été soumise à plusieurs suzerains et a attiré des colons de tout le Pacifique et du cœur d'Aelantir. Ainsi, d'Anchorage à Juneau, notre peuple prie Dieu chacun à sa manière unique et nous ferions bien de continuer à permettre à notre peuple la liberté religieuse qui a façonné l'Alaska en un havre de liberté religieuse."
 ALA_navy:0 "Marine alaskienne"
 ALA_navy_desc:0 "Anchorage, Navy Town et de nombreuses autres villes le long des côtes de l'Alaska célèbrent nos traditions maritimes. De la mer, nous chassons le poisson et les baleines vitaux pour notre survie et notre croissance continues, et le long du littoral, les garde-côtes de l'Alaska protègent notre peuple des envahisseurs du Pacifique. À travers tout le pays, notre peuple répond à l'appel de la mer et afflue vers nos ports pour servir la marine alaskienne."
 ALA_beauty:0 "La Beauté de l'Alaska"
 ALA_beauty_desc:0 "Notre patrie est célèbre pour ses paysages à couper le souffle, tant le long de la côte arctique que profondément dans la chaîne de montagnes inhabitée. La plupart des gens éviteraient de visiter n'importe où de glacial et impitoyable, mais l'Alaska est unique dans sa beauté naturelle et son attrait pour les colons et les touristes."
 CSC_ideas:0 "Idées cascadiennes"
 CSC_ideas_start:0 "Traditions cascadiennes"
 CSC_ideas_bonus:0 "Ambition cascadienne"
 CSC_melting_pot:0 "Creuset cascadien"
 CSC_melting_pot_desc:0 "L'emplacement de la Cascadie le long de la côte ouest d'Aelantir a fait de la région la cible d'immigration idéale pour les colons tant de Haless que de Cannor. Son accessibilité géographique à Haless et la présence d'opportunistes cannoriens ont fait de la Cascadie un creuset unique entre l'Est et l'Ouest."
 CSC_chinook_jargon:0 "Jargon chinook"
 CSC_chinook_jargon_desc:0 "Contrairement à beaucoup d'autres colonisateurs impitoyables, nous les Cascadiens comprenons la valeur à trouver dans le commerce et la coopération avec nos peuples autochtones, même si un peu d'exploitation ici et là est nécessaire pour conclure une bonne affaire. En développant un langage en partie informé par notre ancien suzerain et en partie par les peuples autochtones, nous pourrons communiquer facilement avec les deux parties pour assurer un avenir plus brillant pour la Cascadie."
 CSC_forts_of_hudson_bay:0 "Les Forts de la Baie d'Hudson"
 CSC_forts_of_hudson_bay_desc:0 "La Compagnie de la Baie d'Hudson, responsable de la colonisation du nord d'Aelantir, a été confrontée à de nombreuses opportunités d'étendre ses efforts défensifs en Cascadie. Notre patrie montagneuse a permis à de nombreux avant-postes d'être construits le long de notre frontière sud pour nous défendre contre les colons rivaux et les pillards autochtones. Ainsi, notre peuple est né et prêt à servir dans la défense de son pays en tant que défenseurs loyaux."
 CSC_settling_boundaries:0 "Établir les frontières"
 CSC_settling_boundaries_desc:0 "Pendant des années, les colonisateurs au nord et au sud de nous ont contesté qui pourrait posséder quelles terres le long du fleuve Columbia et des Montagnes Rocheuses, organisant des escarmouches et des échauffourées sur le territoire. Espagnols, Aelantiris et Britanniques ont tous revendiqué le territoire à un moment donné, mais maintenant nous nous dressons en tant qu'État indépendant uni comme un seul, et ainsi personne n'osera plus défier notre unité et notre indépendance."
 CSC_nookta_sound:0 "Commerce de Nootka Sound"
 CSC_nookta_sound_desc:0 "La première colonisation de la Cascadie a eu lieu lorsqu'un explorateur ambitieux a acheté une section de terre à un chef autochtone et y a établi un comptoir commercial pour commercer entre autochtones et colons. De là, d'autres comptoirs commerciaux, forts et éventuellement des villages ont surgi le long des rivages de la Cascadie jusqu'à ce que la région soit remplie de villes et de colonies de taille et de grandeur égales à celles de l'Est."
 CSC_oregon_trail:0 "La Piste de l'Oregon"
 CSC_oregon_trail_desc:0 "Notre patrie existe loin à l'ouest du continent aelantirien et les colons souhaitant se faire une nouvelle vie en Cascadie ont dû endurer désert, montagnes, rivières et les conditions impitoyables des terres indomptées d'Aelantir. Ainsi, seuls les colons les plus endurcis ont survécu pour atteindre la Cascadie, bien qu'ils aient pu perdre certains de leurs compagnons à cause de la dysenterie…"
 ICE_ideas:0 "Idées islandaises"
 ICE_ideas_start:0 "Traditions islandaises"
 ICE_ideas_bonus:0 "Ambition islandaise"
 ICE_althingi:0 "L'Althing"
 ICE_althingi_desc:0 "L'Althing est une forme ancienne et vénérée de démocratie nordique établie par nos ancêtres et encore pratiquée par notre jeunesse. Le Porte-Parole des Lois doit prendre place en tant que responsable présidant l'assemblée. De sa bouche, nous apprendrons les lois en vigueur pour notre nation et toutes les oreilles islandaises écouteront et respecteront ses paroles, car il est de son devoir de proclamer le droit procédural de l'Althing à ceux qui assistent à l'assemblée chaque année."
 ICE_hrafna_floki:0 "L'Héritage de Hrafna-Floki"
 ICE_hrafna_floki_desc:0 "Un vrai roi de la construction navale, Hrafna-Floki était capable, dit-on, de voir les planches des navires dans les arbres. Il a enseigné ses compétences à de nombreux voyageurs et autochtones qu'il a rencontrés en Islande et au fil des générations, ses enseignements ont été transmis et affinés au point où les constructeurs de navires d'Islande sont sans égal."
 ICE_christian_identity:0 "Identité chrétienne"
 ICE_christian_identity_desc:0 "Depuis la contemplation et la déclaration de Thorgeir le porte-parole des lois en l'an 1000, nous sommes une nation chrétienne. Maintenant que la Réforme déferle sur Cannor, nous resterons dévots quel que soit le chemin que nous choisirons."
 ICE_merchant_navy:0 "Marchands armés"
 ICE_merchant_navy_desc:0 "Nos marins et marchands sont constamment irrités sous le joug des pirates et brigands lors de leurs voyages en mer du Nord, mais ils ne souffriront plus en silence. Nous nous assurerons qu'ils soient bien équipés et formés pour se défendre contre les menaces, tant sur nos propres rivages que loin de chez nous."
 ICE_fire_and_ice:0 "Les Hommes de feu et de glace"
 ICE_fire_and_ice_desc:0 "Notre patrie est un champ de bataille de feu et de glace. Nos guerriers ont gagné leur fer dans les conditions les plus rudes, les pires champs de bataille et sous des chefs exigeants. Dans le soldat islandais moyen, nous ne voyons pas de simples hommes, mais des parangons de puissance, de force et de capacité."
 ICE_natural_builders:0 "Artisans résilients"
 ICE_natural_builders_desc:0 "Notre peuple possède la remarquable capacité de construire en n'utilisant que le peu que la terre fournit. Notre peuple robuste a appris à porter son propre poids et à payer le prix froid pour tous les biens matériels qu'il possède. Nous, contrairement à quiconque, pouvons fabriquer de l'or à partir de la terre."
 ICE_nationalism:0 "Identité nationale islandaise"
 ICE_nationalism_desc:0 "Un héritage historique, une tradition fière et un patrimoine fort, nous embrassons notre identité avec fierté et ferveur. Nous croyons que chacun a une chance de s'épanouir s'il reçoit la bonne opportunité. Le reste du monde considère notre culture comme archaïque et sans importance, mais nous leur enseignerons nos voies pacifiques, par la force."
 polynesia_node:0 "Triangle polynésien"
 TRADE_COMPANY_POLYNESIA_Root_Culture_GetName:0 "Compagnie du Pacifique [Root.Culture.GetName]"
 TRADE_COMPANY_POLYNESIA_Oceania_Trade_Company:0 "Compagnie polynésienne"
 guru_advisors_reform:0 "La Sagesse du Guru"
 guru_advisors_reform_desc:0 "À travers tout le monde dharmique, il y a des hommes et des femmes qui se détachent complètement du monde matériel et vivent isolés dans la campagne indomptée pour atteindre l'illumination. Être sikh signifie être un étudiant et en apprenant de ces sages et en étudiant les œuvres des grands Gurus de la religion sikhe, nous pourrons répandre notre vision éclairée à travers le monde."
 global_holy_war_released_modifier:0 "État croisé mondial"
 desc_global_holy_war_released_modifier:0 "Ce pays a été créé par une nation participant à une Croisade mondiale."
 icelandic:0 "Islandais"
 SNA:0 "Sonora"
 SNA_ADJ:0 "Sonorien"
 WSI:0 "Indes occidentales"
 WSI_ADJ:0 "Caribéen"
 CUB:0 "Cuba"
 CUB_ADJ:0 "Cubain"
 VRM:0 "Vermont"
 VRM_ADJ:1 "Vermontois"
 FLO:0 "Floride"
 FLO_ADJ:0 "Floridien"
 ILI:0 "Illinois"
 ILI_ADJ:0 "Illinoisien"
 west_indies_nation_title:0 "Former la Nation caribéenne"
 west_indies_nation_desc:0 "Maintenant que nos îles ont été coupées des puissances corrompues et faibles de l'Ancien Monde, nous devons nous fédérer en une nation capable d'unir nos îles disparates et leurs innombrables cultures et langues. Nous ne serons jamais un seul peuple, mais dans la Fédération des Indes occidentales, nous demeurerons ensemble dans l'unité."
 vermont_nation_title:1 "Former la Nation vermontoise"
 vermont_nation_desc:0 "Ici, dans les terres fertiles et luxuriantes du nord-ouest d'Aelantir et libres des puissances coloniales de l'Ancien Monde, nous nous trouvons capables de couper tous les liens avec notre ancienne identité et de rédiger une constitution qui promet de protéger les droits des citoyens et des propriétaires terriens. Nous formerons une nouvelle nation sur les principes de liberté et d'unité."
 sonora_nation_title:0 "Former la Nation de Sonora"
 sonora_nation_desc:0 "Nous avons fait de cette terre rude notre foyer. Il est temps pour nous de rassembler nos forces et de rejeter l'oppression de nos suzerains coloniaux, afin de construire un paradis dans l'Ouest."
 florida_nation_title:0 "Former la Nation floridienne"
 florida_nation_desc:0 "Ici, dans cette terre rude de marécages, d'alligators et de plages ensoleillées, nous avons réussi à faire un foyer. C'est sur ces terres que nous ferons notre foyer et les grands exploits des Hommes de Floride seront connus à travers Aelantir et le monde !"
 cuba_nation_title:0 "Former la Nation cubaine"
 cuba_nation_desc:0 "Notre île a finalement été libérée des oppresseurs coloniaux, mais ce n'est pas suffisant. Nous devons unir notre peuple derrière une nouvelle identité libre du fardeau de l'Ancien Monde si nous voulons maintenir notre indépendance."
 illinois_nation_title:0 "Former la Nation illinoisienne"
 illinois_nation_desc:0 "Le Pays de l'Illinois a longtemps été une branche administrative de la colonie de Louisiane, mais maintenant que nous sommes libres, nous pouvons commencer à tourner notre attention de la longueur incommensurable du Mississippi vers les Grands Lacs."
 WSI_Plantation_Economy:0 "Économie de plantation"
 WSI_Plantation_Economy_desc:0 "L'économie des Indes occidentales est construite sur les plantations. Les travailleurs des plantations sont travailleurs et possèdent une grande ingéniosité et une passion pour la vie comme nul autre. C'est cette combinaison de travail acharné en plein air et d'une vigueur pour le travail et le jeu qui définit l'honorable travailleur caribéen."
 WSI_Blue_Mountain_Coffee:0 "Le Café des Montagnes Bleues"
 WSI_Blue_Mountain_Coffee_desc:0 "La région des Montagnes Bleues est considérée comme la meilleure région caféière des Caraïbes et est appréciée par les grands penseurs du monde entier ! La propagation du café a donné naissance à de nouvelles idées alors que les locaux et leurs suzerains coloniaux ont commencé à avoir des discussions profondes et complexes sur la nature du monde tout en sirotant le meilleur café du monde."
 WSI_Sugar_Revolution:0 "La Révolution du sucre"
 WSI_Sugar_Revolution_desc:0 "Le besoin de sucre à travers le monde a signifié plus d'argent dans les coffres des locaux alors qu'ils travaillent dur pour répondre à la demande sans fin pour cette douce canne."
 WSI_Aelantiri_Trade_Hub:0 "Le Carrefour commercial aelantirien"
 WSI_Aelantiri_Trade_Hub_desc:0 "Le commerce des Caraïbes s'est étendu à travers la côte est d'Aelantir, Sarhal et Cannor. La portée des marchands est plus grande que nous aurions pu l'anticiper et à cet égard, les Caraïbes sont véritablement le berceau d'une économie mondialisée."
 WSI_Miskoto_Zambos:0 "Miskito-Zambos"
 WSI_Miskoto_Zambos_desc:0 "Les Miskito-Zambos sont un mélange culturel des nombreux peuples qui ont construit notre grande nation : Sarhalns, Cannoriens et les peuples autochtones qui sont venus avant tous les autres. L'essor démographique qui en a résulté a aidé notre multiculturalisme diversifié et a conduit à une explosion démographique qui pourrait être utilisée pour l'expansion territoriale."
 WSI_Interconnected_Relations:0 "Relations interconnectées"
 WSI_Interconnected_Relations_desc:0 "Les relations que nos marchands et diplomates ont construites nous ont établis comme un partenaire commercial fiable et de grande qualité. Nous avons d'innombrables partenaires et alliés dans notre poche et nous devons exploiter cela si nous voulons devenir l'une des grandes puissances de ce monde colonial."
 WSI_Colonial_Legacy:0 "Héritage colonial"
 WSI_Colonial_Legacy_desc:0 "Les Caraïbes ont été âprement disputées entre une liste interminable de puissances coloniales et de conquérants potentiels. Les corsaires au cœur de l'âge d'or de la piraterie et les gouverneurs ambitieux ont tous exploité notre patrie pour tout ce qu'elle valait et ont construit une richesse à travers notre nation qui alimente encore notre économie à ce jour. En tant que véritable berceau du colonialisme et de la politique coloniale, nous avons une expertise unique qui nous élèvera au rang de puissance sur la scène mondiale."
 SNA_mercenary_republic:0 "République de mercenaires"
 SNA_mercenary_republic_desc:0 "Contrairement à d'autres républiques aelantiris qui ont combattu pour leur indépendance contre les puissances coloniales, notre État a été établi par la pure force et l'audace de nos mercenaires. La région de Sonora et de Basse-Californie a été saisie par seulement 45 hommes et leur commandant, et malgré les probabilités écrasantes, ils ont triomphé des républiques bien plus grandes de la région. Il ne peut y avoir aucun doute que la pure qualité des mercenaires sonoriens sera l'envie de tout Aelantir."
 SNA_sale_of_script:0 "La Vente des titres sonoriens"
 SNA_sale_of_script_desc:0 "Afin de financer l'expédition mercenaire vers Sonora, nous avions besoin d'investissements et de ressources. Bien que beaucoup aient douté de notre cause, il y en avait qui étaient assez sages pour investir dans l'achat de documents légaux non encore échangeables dans la région de Sonora jusqu'à l'établissement de notre État. En continuant à vendre la promesse de terres futures à nos investisseurs, nous pourrons à la fois étendre notre État et faire un joli profit en le faisant."
 SNA_cowboy_country:0 "Pays des cowboys"
 SNA_cowboy_country_desc:0 "Les hommes de notre nation sont habitués aux conditions rudes et aux ressources rares de l'Ouest aelantirien et sont devenus plus qu'accoutumés aux voies de la guerre ici. Notre nation a été construite par des bandits et des mercenaires et est crainte à travers l'Ouest et au-delà."
 SNA_take_what_is_yours:0 "Prendre ce qui est nôtre"
 SNA_take_what_is_yours_desc:0 "Il y en a qui appellent Sonora un État voyou et qui appelleraient notre Président un « Pirate », et ils diraient ces choses comme si c'étaient des insultes. Ce que ces individus enchaînés par les lois de leur pays ne comprennent pas, c'est que la vraie liberté consiste à prendre ce qui est à vous et à ne s'excuser de rien. Nos bandits pillent déjà les routes de l'ouest, mais avec des flottes au trésor passant devant nos côtes chaque jour, il devient clair que nous pourrions apprendre quelque chose des corsaires de l'est…"
 SNA_uniting_the_outlaws:0 "Unir les hors-la-loi"
 SNA_uniting_the_outlaws_desc:0 "À travers tout l'Ouest, il y a des cowboys, des bandidos et des desperados : des hommes audacieux qui vivent libres. Nous n'avons pas peur de la loi et sommes prêts à faire tout ce qu'il faut pour s'en sortir dans ce monde cruel et impitoyable. Avec des hommes comme ceux-ci à la tête de notre nation, nous avons créé un foyer pour les sans-abri et nous deviendrons les hommes dont nos mères nous avaient mis en garde."
 SNA_taking_the_fight_south_desc:0 "Bien que notre nation existe dans l'Ouest rude du Mexique, nous ne pouvons pas nous maintenir uniquement avec les contrats trouvés ici. Nous devons porter notre combat du Nord au Sud, des marécages de Louisiane aux jungles du Nicaragua. Nos braves généraux mèneront nos compatriotes de contrat en contrat, tout en s'assurant de prendre autant de territoire pour nous-mêmes que nous pouvons gérer."
 SNA_taking_the_fight_south:0 "Porter le combat au Sud"
 SNA_Good_Use_Of_Gold:0 "De l'or, de l'or, de l'or !"
 SNA_Good_Use_Of_Gold_desc:0 "Avec la forte dépendance à l'or dans notre région, nous avons appris à en faire bon usage et à ne pas causer les problèmes rampants que nous avons vus outre-mer. Avec notre utilisation sensée et conservatrice de nos gisements d'or, nous garderons la ressource précieuse sans gonfler notre économie."
 VRM_Establish_sovereignty:0 "Établir notre souveraineté"
 VRM_Establish_sovereignty_desc:0 "Établir notre souveraineté de nos colonisateurs cannoriens n'a pas été une tâche facile, mais nous avons défini nos droits dans une constitution irréfutable. Nos dirigeants ont montré une grande prévoyance pour l'administration."
 VRM_Removing_the_shackles:0 "Briser les chaînes"
 VRM_Removing_the_shackles_desc:0 "Briser les chaînes de la machine militaire de nos anciens suzerains signifie que nous pouvons opérer de manières dont nous n'avions jamais rêvé auparavant. Nos troupes utilisent le terrain à leur avantage et font de la guérilla une tactique efficace."
 VRM_Aelantiri_Frontier:0 "Frontière aelantiris"
 VRM_Aelantiri_Frontier_desc:0 "La frontière aelantiris est une terre vaste et inconnue. Nous devons nous établir comme les leaders du nouveau monde et accueillir ceux qui croisent notre chemin."
 VRM_Cheese_wheels:0 "Meules de fromage"
 VRM_Cheese_wheels_desc:0 "Les fermiers locaux ont commencé à produire en masse des meules de fromage pour les longs voyages à travers les terres et les mers. C'est devenu un produit recherché partout où nous l'emmenons et nous ne produisons que le meilleur."
 VRM_Will_of_the_people:0 "Volonté du peuple"
 VRM_Will_of_the_people_desc:0 "Nous ne voulons que la paix et la prospérité avec ceux qui viennent sur nos rivages, mais il y en a qui apparaîtraient sur les rivages du nord-est d'Aelantir avec l'intention de mettre fin à notre liberté. De tels efforts doivent être accueillis par une puissante riposte du peuple."
 VRM_Liberty_is_Life:0 "Vivre libre ou mourir"
 VRM_Liberty_is_Life_desc:0 "Nos sujets n'ont fait qu'être loyaux envers nous car nous avons garanti leur sécurité. À mesure qu'ils grandissent, leur sentiment pour la liberté grandit aussi, mais nous avons des moyens de les garder en ligne. Ceux qui refusent de vivre leur vie en embrassant les valeurs de liberté et de justice ne doivent pas vivre leur vie du tout."
 VRM_What_we_do_best:0 "Ce que nous faisons le mieux"
 VRM_What_we_do_best_desc:0 "Nos marchands savent ce qui est le mieux avant quiconque. Nous avons les plus belles soies, les meilleures épices et les meilleurs colorants. Parce que nous investissons judicieusement dans les terres où ils sont abondants et les renvoyons chez notre peuple."
 VRM_home_of_the_revolution_desc:0 "À travers tout Aelantir, il y a un désir ardent de liberté et de démocratie, et nous ne devons jamais oublier que c'est ici dans le nord-est que ces idées ont brûlé le plus fort. Nous avons coulé des navires coloniaux, brûlé des propriétés d'État et nous étions prêts à combattre et à mourir pour l'avenir de notre peuple et de notre État nouveau-né."
 VRM_home_of_the_revolution:0 "Foyer de la Révolution aelantiris"
 VRM_tea_party:0 "La Boston Tea Party"
 VRM_tea_party_desc:0 "Nous ne devons jamais oublier qu'à un moment de l'histoire, l'idée d'un État colonial indépendant en Aelantir était quelque chose dont on riait, mais nous avons vite fait cesser les rires. Qui aurait imaginé que le simple acte de jeter le précieux thé de notre ancien suzerain dans les eaux du port de Boston aurait servi de tel catalyseur pour l'esprit d'indépendance à travers notre nation ? Maintenant, le flambeau de la liberté brûle vif et cet acte de protestation sera commémoré comme un événement glorieux dans la naissance de notre nation."
 VRM_vermont_constitution:0 "La Constitution du Vermont"
 VRM_vermont_constitution_desc:0 "Quand nous avons déclaré notre indépendance de notre suzerain, il est devenu immédiatement clair aux gouverneurs du Vermont que l'esclavage était un affront aux valeurs de liberté qui ont donné naissance à notre nation. La Constitution du Vermont a été le premier document écrit dans l'histoire d'Aelantir à proscrire la pratique immorale de l'esclavage et en continuant à défendre les valeurs trouvées dans notre constitution, nous créerons un avenir plus juste et plus brillant pour tous les peuples de notre nation."
 WSI_ideas:0 "Idées des Indes occidentales"
 WSI_ideas_start:0 "Traditions des Indes occidentales"
 WSI_ideas_bonus:0 "Ambition des Indes occidentales"
 SNA_ideas:0 "Idées sonoriennes"
 SNA_ideas_start:0 "Traditions sonoriennes"
 SNA_ideas_bonus:0 "Ambition sonorienne"
 VRM_ideas:0 "Idées vermontoises"
 VRM_ideas_start:0 "Traditions vermontoises"
 VRM_ideas_bonus:0 "Ambition vermontoise"
 opinion_refused_burgundian_membership:0 "A accepté l'adhésion bourguignonne"
 hussite:0 "Hussite"
 hussite_religion_desc:1 "Les Hussites sont les disciples de Jan Hus, un réformateur religieux bohémien brûlé sur le bûcher pour hérésie en 1415. Ils forment un groupe diversifié de non-conformistes allant des modérés avec des désaccords théologiques mineurs avec la doctrine ravélienne aux radicaux qui voient l'Église ravélienne comme irrémédiablement corrompue."
 TABORITE:0 "Taborite"
 UTRAQUIST:0 "Utraquiste"
 ORPHAN:0 "Orphelin"
 clerical_poverty_aspect:0 "Pauvreté cléricale"
 desc_clerical_poverty_aspect:0 "Le clergé ne devrait posséder aucune richesse et abandonner ses possessions matérielles. Il devrait consacrer son attention à Dieu plutôt qu'au monde séculier."
 bread_and_wine_aspect:0 "Pain et vin"
 desc_bread_and_wine_aspect:0 "Pour les Utraquistes, le principal désaccord doctrinal entre eux et l'Église ravélienne est le concept de communion sous les deux espèces. Les sectes hussites croient que seule une communion qui inclut à la fois le pain et le vin est valide, même pour les membres laïcs."
 sola_scriptura_aspect:0 "Sola Scriptura"
 desc_sola_scriptura_aspect:0 "La Bible, la parole de Dieu transmise à l'homme, est la seule autorité en matière de doctrine chrétienne. Toutes les pratiques religieuses qui ne peuvent être soutenues par une référence biblique doivent être dénoncées comme hérésie."
 adamite_services_aspect:0 "Services adamites"
 desc_adamite_services_aspect:0 "La secte adamite insiste sur la nudité pendant les services religieux. Sans les atours du statut ou de la culture, nous apparaissons comme égaux aux yeux de Dieu, un rappel saisissant de notre humanité partagée et de l'innocence dont nous jouissions avant la Chute."
 pacifism_aspect:0 "Pacifisme"
 desc_pacifism_aspect:0 "Heureux les artisans de paix, car ils seront appelés fils de Dieu."
 punishment_of_sins_aspect:0 "Punition des péchés"
 desc_punishment_of_sins_aspect:0 "Tous ceux qui pèchent doivent être punis de manière égale, quelle que soit leur richesse ou leur rang. Même la noblesse n'est pas au-dessus des lois de Dieu."
 regular_defenestrations_aspect:0 "Défenestrations régulières"
 desc_regular_defenestrations_aspect:0 "La pratique de jeter des hommes par les fenêtres est une tradition vénérable parmi les réformateurs religieux bohémiens. Nous devrions en faire une habitude régulière."
 taborite_resurgence_aspect:0 "Résurgence taborite"
 desc_taborite_resurgence_aspect:1 "Les Taborites étaient une faction radicale et militante lors des guerres hussites. Bien qu'ils aient perdu beaucoup de pouvoir après leur défaite, ils ont commencé à refaire surface maintenant que les enseignements de Hus sont de nouveau en faveur."
 freedom_to_preach_aspect:0 "Liberté de prêcher"
 desc_freedom_to_preach_aspect:0 "Il y a beaucoup de désaccord parmi les disciples de Hus, mais chaque secte aura la liberté de prêcher librement tant que Dieu est dans leur cœur."
 orphan_hetmans_aspect:0 "Hetmans orphelins"
 desc_orphan_hetmans_aspect:0 "Les Orphelins sont une faction de radicaux composée principalement de bourgeois. Ils ont démontré leurs compétences sur le champ de bataille à de nombreuses occasions, employant des wagons de guerre avec grande efficacité. Nous devrions nous assurer que leurs Hetmans partagent leur expertise tactique à travers notre nation."
 flavor_boh.12.t:0 "Les Compacts de Bâle"
 flavor_boh.12.d:1 "Les guerres hussites se sont conclues par une paix religieuse entre la faction modérée utraquiste des Hussites et l'Église ravélienne. Jusqu'à présent, les Compacts ont été honorés et la paix est revenue en Bohême. Pourtant, les tensions avec les Hussites n'ont pas disparu : les disciples de Hus comptent de nombreux adeptes parmi le peuple et la noblesse. Peut-être devrions-nous éradiquer leur hérésie avant qu'ils ne reprennent les armes."
 flavor_boh.12.a:0 "Honorons les Compacts."
 flavor_boh.12.b:0 "Il ne peut y avoir de paix avec les hérétiques."
 flavor_boh.1.c:0 "Que le [Root.Monarch.GetTitle] suive Hus, la nation suit Rome."
 first_hussite_tt:0 "§YCette option peut mener vers une réconciliation pacifique avec les Hussites ou un mouvement hussite résurgent.§!"
 hussite_center_of_reformation:0 "Centre de Réformation"
 religious_peace_hussites:0 "Compacts de Bâle"
 desc_religious_peace_hussites:1 "Nous honorons les Compacts de Bâle en appliquant la paix fragile entre les factions religieuses en Bohême."
 hussite_persecution:0 "Persécution des Hussites"
 desc_hussite_persecution:0 "Nous avons abandonné la paix religieuse et nous nous sommes reconsacrés à éliminer l'hérésie hussite."
 rejected_reconciliation_tt:0 "§YLes nations ravéliennes peuvent utiliser le Casus Belli de purification de l'hérésie contre vous tant que [Root.Monarch.GetName] règne sur [Root.GetName].§!"
 remain_hussite_tt:0 "§YLes Hussites se distancient du protestantisme et ne bénéficieront pas si le protestantisme devient dominant dans l'Empire.§!"
 hussite_rebels_demand:0 "Convertir $COUNTRYNAME$"
 hussite_rebels_demand_desc:0 "Les rebelles religieux se battent pour la religion $RELIGION$. Ils exigent que nous reconnaissions sa suprématie ou qu'au moins nous cessions nos efforts pour les convertir et les laissions pratiquer leur culte en paix."
 hussite_conversions:0 "Retour des Hussites"
 desc_hussite_conversions:0 "La foi hussite est revenue en force. Beaucoup déclarent avec ferveur leur dévouement aux enseignements de Hus."
 entertaining_defenestrations:0 "Mort par défenestration"
 desc_entertaining_defenestrations:0 "Les exécutions publiques par défenestration sont des événements populaires dans notre nation."
 conscripting_pacifists:0 "Conscription des pacifistes"
 desc_conscripting_pacifists:0 "Nul ne peut refuser l'appel aux armes, même les pacifistes doivent servir."
 taborite_radicals:0 "Taborites radicaux"
 desc_taborite_radicals:0 "Nous avons embrassé la résurgence des Taborites, une faction hussite radicale."
 utraquist_moderates:0 "Utraquistes modérés"
 desc_utraquist_moderates:0 "Nous avons choisi de soutenir la faction modérée utraquiste, qui ne favorise que des réformes religieuses limitées."
 war_wagons:0 "Wagons de guerre"
 desc_war_wagons:0 "Nous avons réaffirmé notre tactique séculaire d'utiliser des wagons de guerre pour soutenir nos régiments d'infanterie, réduisant l'efficacité de la cavalerie ennemie."
 less_war_wagons:0 "Retour de la cavalerie"
 desc_less_war_wagons:0 "Nous réduisons notre dépendance aux tactiques de wagons de guerre, intégrant plus de cavalerie dans nos armées."
 hussite.1.t:0 "Les Pacifistes s'opposent à la guerre"
 hussite.1.d:0 "Un mouvement pacifiste croissant s'empare des Hussites [Root.GetAdjective] et a même été approuvé dans une certaine mesure par l'État. Malgré cela, nous nous trouvons dans une guerre d'agression. Bien que nous ayons sûrement d'excellentes raisons d'attaquer, les pacifistes s'opposent à la guerre et refusent de combattre."
 hussite.1.a:0 "Nous respecterons leurs croyances."
 hussite.1.b:0 "Tous ceux qui sont appelés doivent servir."
 hussite.2.t:0 "Heureux les artisans de paix"
 hussite.2.d:0 "Des années de paix ont favorisé la croissance d'un mouvement pacifiste au sein de la foi hussite en [Root.GetName]. [Root.pacifist_theologian.GetName], un théologien pacifiste respecté, a pris la parole auprès du peuple en soutien de notre régime bienveillant et exhorte tous les vrais chrétiens à suivre l'exemple vertueux du [Root.Monarch.GetTitle]."
 hussite.2.a:0 "Nous sommes tous les enfants de Dieu."
 hussite.3.t:0 "Vœux de pauvreté"
 hussite.3.d:0 "De nombreuses sectes hussites rejettent l'accumulation de richesses cléricales, l'associant à la décadence pécheresse de l'Église ravélienne. Les vœux de pauvreté parmi les prêtres deviennent courants et l'Église [Root.GetAdjective] se confine de plus en plus aux questions spirituelles et s'abstient d'interférer dans les affaires temporelles de l'État ou des terres."
 hussite.3.a:0 "Encourageons les vœux cléricaux."
 hussite.3.b:0 "Il y a des mérites à une Église puissante."
 hussite.4.t:0 "Noble pécheur"
 hussite.4.d:0 "L'Église [Root.GetAdjective] croit que personne, quelle que soit sa richesse ou son statut, n'est au-dessus des lois de Dieu. Tous ceux qui pèchent doivent être punis en conséquence.\n\n[Root.sinful_noble.GetName] a publiquement et sans honte commis le péché de [Root.GetRandom_Sin], offensant gravement le clergé et suscitant des appels à la punition."
 hussite.4.a:0 "Nul n'est au-dessus des lois de Dieu."
 hussite.4.b:0 "Rendons la punition purement symbolique."
 hussite.5.t:0 "Défenestrations"
 hussite.5.d:0 "La défenestration est devenue la méthode d'exécution standard en [Root.GetName] depuis la résurgence des Hussites. Les foules se rassemblent pour regarder les criminels être jetés par la fenêtre et tomber d'une grande hauteur vers leur mort dans les rues en contrebas. C'est devenu un spectacle populaire parmi les citadins [Root.GetAdjective] qui s'ennuient."
 hussite.5.a:0 "C'est la manière [Root.GetAdjective]."
 hussite.6.t:0 "Utraquistes et Taborites"
 hussite.6.d:0 "Bien que ce soient les Utraquistes modérés qui aient triomphé dans les guerres hussites, la résurgence de la foi hussite à travers [Root.GetName] a conduit à la réapparition de sectes taborites radicales. Elles cherchent à abolir toutes les formes d'autorité théologique en dehors des Écritures bibliques et à rejeter les influences ravéliennes dans la plus grande mesure possible. Les dirigeants utraquistes ont fait appel à l'État pour réduire leur influence croissante."
 hussite.6.a:0 "Embrassons les Taborites."
 hussite.6.b:0 "Soutenons les Utraquistes."
 hussite.7.t:0 "Wagons de guerre"
 hussite.7.d:0 "Les wagons de guerre ont été employés avec grande efficacité pendant les guerres hussites. Comme les armées hussites étaient composées en grande partie d'infanterie paysanne et avaient peu de cavalerie propre à amener sur le terrain, les wagons de guerre fournissaient une défense solide contre les charges de cavalerie d'ennemis mieux équipés. Beaucoup de nos commandants sont des Orphelins, vétérans des guerres hussites, et souhaitent faire de cette tactique une doctrine militaire officielle."
 hussite.7.a:0 "Les wagons de guerre nous ont bien servis auparavant."
 hussite.7.b:0 "Nous devrions aligner plus de cavalerie à la place."
