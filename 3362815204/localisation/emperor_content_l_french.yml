 # Misc content
 ven_mercenaries_paid_with_land:0 "Les Mercenaires Reçoivent des Concessions de Terres"
 desc_ven_mercenaries_paid_with_land:0 "En accordant des terres aux mercenaires au lieu de les payer en pièces, le fardeau financier des mercenaires peut diminuer d'un montant modeste."
 ven_venture_captain_recruitment:0 "Recrutement de Capitaines-Aventuriers"
 desc_ven_venture_captain_recruitment:0 "Attirer plus de chefs mercenaires dans notre royaume augmente notre capacité à lever de grandes armées en cas d'urgence et à s'assurer qu'elles sont dirigées par des généraux compétents, même si cela nous coûte un peu plus."
 flavor_ara7_naples_goes_free:0 "Naples deviendra indépendante, gouvernée par le fils d'Alphonse V."
 opinion_NAP_paid_tribute:0 "Naples a payé tribut"
 naples_in_union_with_france:0 "§YNaples§! devient un Partenaire Junior sous nous."
 mch_khan_of_the_mongols_mercs_unlocked_tt:0 "Débloquer l'accès aux mercenaires §YBannière Mongole§!."
 emp_swi_mercenaries_merc_tt:0 "Débloquer l'accès aux mercenaires §YGarde Nationale Suisse§!."
 swiss_mountains_modifier:0 "Montagnards Suisses"
 desc_swiss_mountains_modifier:0 "Nos armées sont expertes dans le combat en haute montagne des Alpes."
 flavor_tus.EVTNAME21:0 "Le moment est venu !"
 flavor_tus.EVTDESC21:0 "Avec notre pouvoir à son apogée, c'est notre chance de mettre en œuvre des changements radicaux dans la nature de l'État. Nous pourrions nous proclamer rois, ou réaffirmer notre engagement envers les idéaux de la République. Avec tout le pouvoir que nous avons amassé, nous pourrions faire passer n'importe quel changement que nous voulons."
 flavor_tus.EVTOPTA21:0 "Notre gouvernement est parfait tel qu'il est !"
 flavor_tus.EVTOPTB21:0 "Notre couronnement de gloire sera une couronne !"
 flavor_tus.EVTOPTC21:0 "Il est temps que le Peuple soit entendu ! Et par le Peuple nous voulions dire les patriciens."
 flavour_swa.1.name:0 "La Fondation de Karlsruhe"
 flavour_swa.1.desc:0 "La ville de Durlach est devenue une ville prospère. Cependant, les visiteurs sont souvent déçus par son aspect peu attrayant et son manque général de splendeur, comparé aux principales villes de nos voisins. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] partage cette opinion. Dans un rêve, [Root.Monarch.GetSheHe] a récemment vu une vision d'un grand palais au cœur d'une belle ville bien ordonnée, [Root.Monarch.GetHerHis] ville.\n\nLes autorités municipales de Durlach sont réticentes à autoriser un réaménagement majeur de la ville et de ses palais, donc un autre site à courte distance de la ville a été suggéré. Le site proposé, que les partisans du plan appellent « Karlsruhe », montre un potentiel considérable ; cependant, les habitants de Durlach pourraient en vouloir à leur ville d'être supplantée. Devrions-nous construire la nouvelle ville ?"
 flavour_swa.1.A:0 "Fondons Karlsruhe."
 flavour_swa.1.B:0 "Nous ne voyons pas la nécessité d'une nouvelle ville."
 #Brunswick Ideas
 BRU_ideas:0 "Idées de Brunswick"
 BRU_ideas_start:0 "Traditions de Brunswick"
 BRU_ideas_bonus:0 "Ambition de Brunswick"
 bru_welfian_dynasty:0 "La Dynastie Welf"
 bru_welfian_dynasty_desc:0 "Notre dynastie a perduré pendant des centaines d'années. L'un des nôtres, Otton IV, était même un Empereur d'Anbennar au XIIIe siècle. Notre nom est donc bien connu dans toute la Germanie, apportant un gravitas supplémentaire à nos paroles."
 bru_residenzstadt_wolfenbuttel:0 "Residenzstadt Wolfenbüttel"
 bru_residenzstadt_wolfenbuttel_desc:0 "Nous avons récemment déplacé notre résidence ducale à Wolfenbüttel, une ville de fortes forteresses et de beaux palais. Sous notre patronage, elle deviendra un monument à la gloire et à la bienveillance de notre dynastie."
 bru_herzog_august_bibliothek:0 "Bibliothèque Herzog August"
 bru_herzog_august_bibliothek_desc:0 "Nous afficherons nos vertus avant-gardistes en établissant une magnifique bibliothèque, la plus grande au nord des Alpes, qui attirera des manuscrits et des érudits de tout Cannor à notre cour."
 bru_trade_guilds:0 "Guildes de Brunswick"
 bru_trade_guilds_desc:0 "Bien que faisant nominalement partie du Duché, les villes de Brunswick et Göttingen ont longtemps été semi-indépendantes et gouvernées par une classe puissante de bourgeois et patriciens. Maintenant que nous avons réaffirmé notre autorité sur elles, nous pouvons utiliser l'expertise qu'elles ont accumulée au fil des années pour augmenter notre production."
 bru_leibnitz_lessing:0 "Leibniz et Lessing"
 bru_leibnitz_lessing_desc:0 "Plusieurs des penseurs les plus éminents de Germanie ont élu domicile à Wolfenbüttel, choisissant de publier leurs traités philosophiques et œuvres littéraires à notre cour. En tant que centre d'apprentissage du nord de la Germanie, nous pouvons compter sur le fait que les nouvelles idées progressent rapidement dans nos terres."
 bru_schwarze_schar:0 "Les Brunswickois Noirs"
 bru_schwarze_schar_desc:0 "Les Brunswickois ne se soumettront jamais à l'occupation étrangère, peu importe le désespoir de la situation. Même si tout semble perdu, nos troupes d'élite continueront à porter le combat à l'ennemi et gagneront la renommée de partout grâce à leurs exploits."
 #Luneburg Ideas
 LUN_ideas:0 "Idées de Lunebourg"
 LUN_ideas_start:0 "Traditions de Lunebourg"
 LUN_ideas_bonus:0 "Ambition de Lunebourg"
 lun_hansa_contacts:0 "Contacts Hanséatiques"
 lun_hansa_contacts_desc:0 "Nos villes ont souvent fait partie de la Ligue Hanséatique. Nos marchands ont donc bâti un solide réseau de contacts auxquels ils peuvent vendre leurs marchandises."
 lun_staple_rights:0 "Droits d'Étape"
 lun_staple_rights_desc:0 "Notre ville non seulement jouit de droits d'étape, obligeant les marchands de passage à mettre leurs marchandises en vente chez nous, en fait, nous avons érigé des ouvrages de terre pour nous assurer qu'ils ne peuvent pas nous contourner. Toutes sortes de marchandises peuvent donc être échangées dans nos marchés, ce qui apporte une richesse considérable à la ville."
 lun_adroit_diplomacy:0 "Diplomatie Habile"
 lun_adroit_diplomacy_desc:0 "En tant que duché relativement petit, nous avons été contraints de développer une expertise considérable dans l'art de la diplomatie au fil des années pour assurer notre survie. Cette expertise nous servira à l'avenir alors que nous cherchons une plus grande importance."
 lun_dynastic_play:0 "Branches Dynastiques"
 lun_dynastic_play_desc:0 "La dynastie von Welf a une multitude de sous-branches, chacune gouvernant son propre petit territoire. Les chances que nous ne puissions pas trouver un héritier éligible de notre dynastie sont donc faibles."
 lun_lionhearted:0 "Cœur de Lion"
 lun_lionhearted_desc:0 "Notre bannière redoutable inspire nos troupes à trouver le courage d'accomplir de grands exploits dignes de quelqu'un avec le cœur d'un lion."
 #Ulmer Ideas
 ULM_ideas:0 "Idées d'Ulm"
 ULM_ideas_start:0 "Traditions d'Ulm"
 ULM_ideas_bonus:0 "Ambition d'Ulm"
 ulm_grosser_schwoerbrief:0 "Großer Schwörbrief"
 ulm_grosser_schwoerbrief_desc:0 "Le Großer Schwörbrief de 1397 affirme les privilèges des marchands patriciens et des diverses guildes commerciales au sein de la ville. Nos bourgeois et artisans, qui forment l'épine dorsale de notre ville, prospéreront certainement sous cette constitution."
 ulm_swabian_league:0 "Schwäbischer Bund"
 ulm_swabian_league_desc:0 "Le Schwäbischer Bund, ou Ligue Souabe, est une alliance de Souabes pour se défendre contre les Wittelsbach de Bavière et du Palatinat qui empiètent, et la Confédération Suisse émergente au sud. Nos nombreux pactes avec les princes de Souabe et au-delà serviront à maintenir notre ville libre forte et préserver le privilège d'immédiateté impériale dont nous jouissons. Nous mènerons cette ligue à la victoire sur les voisins arrogants qui nous menaceraient."
 ulm_german_realism:0 "Berceau du Réalisme Germanique"
 ulm_german_realism_desc:0 "Ulm abrite l'atelier et la galerie de Hans Multscher, un artiste pionnier de la renaissance germanique. Il a apporté le style réaliste de peinture et de sculpture qu'il a appris en étudiant en France et aux Pays-Bas en Germanie. Ses innovations artistiques ont valu à Ulm la reconnaissance comme centre culturel aussi bien qu'économique dans le sud de la Germanie. L'influence culturelle qu'un tel artiste peut exercer est vraiment remarquable."
 ulm_duerer_fort:0 "Fortifications de Dürer"
 ulm_duerer_fort_desc:0 "Suite à la tentative de l'Empereur Louis de Bavière de s'emparer de la ville en 1316, nous avons étendu les fortifications de la ville et donné la priorité absolue à leur entretien. Maintenant, cependant, de nouvelles innovations militaires laissent notre ville de plus en plus vulnérable aux attaques. Nous moderniserons les fortifications en employant de nouveaux principes mathématiques qui amélioreront l'efficacité de l'artillerie défensive et rendront l'artillerie attaquante bien moins efficace, rendant la ville bien plus résistante aux attaques."
 ulm_textile_trade:0 "Commerce Textile d'Ulm"
 ulm_textile_trade_desc:0 "Notre réputation pour la création de textiles fins a apporté des éloges à nos artisans et marchands. Pendant des centaines d'années, les textiles d'Ulm ont apporté richesse et prospérité à nos citoyens grâce au commerce le long du Danube et vers l'Italie. Nous encouragerons ce commerce en soutenant nos propres marchands et en concluant des accords mutuellement bénéfiques avec les guildes et marchands d'autres villes."
 ulm_swiss_mercs:0 "Engager les Mercenaires Suisses"
 ulm_swiss_mercs_desc:0 "Nos voisins du sud sont connus dans toutes les cours de Cannor pour leurs excellents mercenaires. En cultivant une relation pour notre bénéfice mutuel, nous pourrions trouver des soldats capables de défendre notre enclave de prospérité contre ceux qui nous menaceraient, et peut-être décourager ceux qui chercheraient à empiéter sur notre indépendance. Notre Ville Libre doit rester libre."
 ulm_minster:0 "Achever la Cathédrale d'Ulm"
 ulm_minster_desc:0 "La Cathédrale d'Ulm est plus grande que de nombreuses cathédrales, construite pour accueillir 20 000 fidèles et vantant la plus haute tour d'église connue de l'homme. Son énorme flèche est un monument non seulement à la puissance de l'Église, mais aussi à la richesse de nos bourgeois. Cependant, bien que les travaux aient commencé au XIVe siècle, l'église reste incomplète. Nous ferons de son achèvement notre priorité."
 #Augsburger Ideas
 AUG_ideas:0 "Idées d'Augsbourg"
 AUG_ideas_start:0 "Traditions d'Augsbourg"
 AUG_ideas_bonus:0 "Ambition d'Augsbourg"
 aug_augusta_vindelicorum:0 "Augusta Vindelicorum"
 aug_augusta_vindelicorum_desc:0 "Nous sommes une vieille ville, fondée par les Romains eux-mêmes. La ville a été nommée Augusta Vindelicorum en l'honneur du premier, grand empereur romain Auguste, et a servi de capitale pour la province de Rhétie. Bien que les Romains tels que nous les connaissons ne soient plus, Augsbourg persiste, et avec elle l'héritage romain."
 aug_afra_ulrich:0 "Patrie de Sainte Afre et Saint Ulrich"
 aug_afra_ulrich_desc:0 "Notre ville abrite deux des grands saints du passé : Sainte Afre et Saint Ulrich. Afre a garanti la protection de l'évêque chrétien Narcisse de Gérone à Augsbourg pendant l'époque de leur persécution sous le règne romain. Elle fut plus tard baptisée par Narcisse. Cependant, les Romains ont découvert son rôle dans la persécution et elle fut exécutée par les Romains en l'an 304.\nSaint Ulrich d'autre part a un rôle moindre dans la foi chrétienne, mais était un grand dirigeant de notre ville. Son règne a duré de 923 à 973 et a assuré la construction d'un mur de ville approprié, qui a protégé Augsbourg des Hongrois maraudeurs."
 aug_hans_holbein:0 "Lieu de Naissance de Hans Holbein le Jeune"
 aug_hans_holbein_desc:0 "Hans Holbein le Jeune (1497-1543) est le fils d'une famille de peintres, imprimeur et peintre lui-même. Tandis que son père est resté à Augsbourg et a fourni la ville et les environs avec ses œuvres, Hans le Jeune a beaucoup voyagé au cours de sa vie. Finalement, grâce à l'aide du philosophe Érasme, il s'est retrouvé à la cour anglaise. L'une de ses œuvres les plus célèbres sont les portraits du roi Henri VIII lui-même."
 aug_fugger_welser:0 "Les Fugger"
 aug_fugger_welser_desc:1 "Augsbourg est le foyer des Fugger, une famille de marchands dont les investissements et les compétences commerciales ont influencé les grandes puissances d'Europe. Commençant par la publication de produits de tissage, les Fugger ont rapidement gagné du pouvoir à travers l'Europe grâce à leur focus sur la banque, le commerce immobilier et la domination du cuivre."
 aug_elias_holl:0 "Bâtiments d'Elias Holl"
 aug_elias_holl_desc:0 "Elias Holl (1573-1646) était un maître bâtisseur, responsable de la construction du célèbre Goldener Saal, la splendide salle d'État dorée de l'hôtel de ville. Ses œuvres sont une inspiration pour de nombreux maîtres bâtisseurs d'Augsbourg à venir."
 aug_religionsfrieden:0 "Paix d'Augsbourg"
 aug_religionsfrieden_desc:0 "La Réforme Protestante s'est répandue comme une peste dans le Saint-Empire Romain. Catholiques et Protestants ont fait la guerre les uns contre les autres et la souveraineté de l'Empereur lui-même était menacée. L'Empereur Charles Quint de Habsbourg (1500-1558) a essayé d'arrêter la réforme par des combats avec les princes hérétiques mais à la fin il a dû admettre sa défaite. Le 25 septembre 1555, Charles a signé le Augsburger Reichs- und Religionsfrieden, le traité de paix impérial et religieux, qui a fourni l'unité religieuse au sein de l'État. Bien qu'il n'ait pas donné aux Protestants la pleine liberté religieuse ni empêché la Guerre de Trente Ans de 1618, c'est au moins le pionnier du traité de paix qui sera connu comme le Westfälischer Friede, la Paix de Westphalie."
 aug_textile_industry:0 "Industrie Textile d'Augsbourg"
 aug_textile_industry_desc:0 "Augsbourg a toujours eu la réputation d'une ville de tisserands et de textiles de qualité ; une réputation partiellement perpétuée par les premières stratégies commerciales des Fugger eux-mêmes. Grâce à notre utilisation du cours du Lech, les manufactures textiles d'Augsbourg parviennent à confectionner des produits textiles de la plus fine qualité et quantité, et ont approvisionné le centre avec ces étoffes."
 #Frankfurter Ideas
 FRN_ideas:0 "Idées de Francfort"
 FRN_ideas_start:0 "Traditions de Francfort"
 FRN_ideas_bonus:0 "Ambition de Francfort"
 frn_buchmesse:0 "Établir la Buchmesse"
 frn_buchmesse_desc:0 "Les foires désormais bien établies de Francfort remontent aux privilèges accordés par les Empereurs Frédéric II en 1240 et Louis de Bavière en 1330. Avec l'invention de l'imprimerie, nous devrions établir une autre foire spécialement dédiée à la vente de livres. Non seulement cela bénéficierait à notre commerce, mais les divers tomes et innovations passant par notre ville feraient de nous l'un des principaux centres de connaissance et d'innovation du continent."
 frn_stock_exchange:0 "Standardisation des Taux de Change"
 frn_stock_exchange_desc:0 "En tant que grand centre commercial, une pléthore de différentes monnaies passent par notre ville dans les mains de marchands étrangers. Nos ancêtres ont décidé de ne permettre que trois pièces différentes comme monnaie, à savoir le Tournois, le Heller et le Loven Brabançon. Cependant, les systèmes que nous avions en place pour échanger les devises ont été mis sous une pression croissante, et pas assez de monnaie légitime n'est disponible, permettant aux criminels de commettre des actes massifs de fraude. Nous établirons donc une bourse centrale basée sur une réunion annuelle durant laquelle nos principaux marchands fixeront les taux de change entre les différentes devises."
 frn_postzeitung:0 "Frankfurter Postzeitung"
 frn_postzeitung_desc:0 "Bien que n'étant pas le plus ancien journal régional de l'Empire, la Frankfurter Postzeitung est le premier à jouir d'une grande popularité à travers la Germanie. En raison de notre position centrale sur les routes commerciales, les nouvelles de toute la Germanie et de plus loin atteignent Francfort rapidement, et le Postzeitung peut facilement être expédié à toutes les parties de la Germanie."
 frn_imperial_elections:0 "Siège des Élections et Couronnements Impériaux"
 frn_imperial_elections_desc:0 "La Bulle d'Or de 1356 a établi Francfort comme siège des élections impériales. Maintenant, l'Empereur est de plus en plus couronné dans la Cathédrale de Francfort également. La magnifique cérémonie de couronnement est une excellente occasion de nouer des contacts diplomatiques dans tout l'Empire d'Anbennar, puisque presque tous les dirigeants y assistent. Nous les impressionnerons avec le spectacle que nous offrons !"
 frn_cultural_center:0 "Centre Culturel Civil"
 frn_cultural_center_desc:0 "Sans monarque ni évêque comme suzerain, toutes nos institutions culturelles dépendent uniquement de l'engagement de nos citoyens. Au fil des années, nous avons établi de nombreux sites culturels dignes tels que le Théâtre National de Francfort et la Société des Musées de Francfort, de sorte que la splendeur de notre ville est sans aucun doute plus grande que celle de nombreuses villes de résidence !"
 frn_sausages:0 "Frankfurter Würstchen"
 frn_sausages_desc:0 "Nos bien-aimées et populaires Frankfurter Würstchen sont des saucisses fumées à base de porc, bien que certains bouchers peu scrupuleux mélangent d'autres viandes dans leurs saucisses. Nous décréterons donc qu'un boucher ne peut traiter qu'un seul type de viande par jour pour garder nos chères Frankfurter pures."
 frn_freie_stadt:0 "Freie Stadt Frankfurt"
 frn_freie_stadt_desc:0 "Pendant des siècles, Francfort a été une république oligarchique dominée par les patriciens. Cependant, ce système politique est contraire aux idées éclairées qui balaient Cannor, de sorte que maintenant le progrès est entravé. Nous nous adapterons aux temps en décrétant un amendement à notre constitution accordant des droits égaux à toutes les dénominations chrétiennes, améliorant la situation et les droits des non-chrétiens et éliminant les anciens privilèges patriciens. Désormais, tous les citoyens masculins de plus de 21 ans et possédant suffisamment de propriété à Francfort pourront voter et décider du destin de Francfort !"
 #Cologne Ideas
 KOL_ideas:0 "Idées de Cologne"
 KOL_ideas_start:0 "Traditions de Cologne"
 KOL_ideas_bonus:0 "Ambition de Cologne"
 kol_pursuit_of_unity:0 "La Poursuite de l'Unité Territoriale"
 kol_pursuit_of_unity_desc:0 "Notre territoire est géographiquement divisé entre la Rhénanie et la Westphalie. Nous devons trouver un moyen d'unir nos possessions séculières afin de renforcer l'évêché et de centraliser le gouvernement. Peut-être pouvons-nous trouver quelques revendications oubliées dans nos archives."
 kol_archchancellor_of_italy:0 "Archicancellarius per Italiam"
 kol_archchancellor_of_italy_desc:0 "Nous détenons le titre d'Archichancelier d'Italie au sein de l'Empire d'Anbennar. Bien que ce titre n'apporte que peu en termes de pouvoir matériel ou de responsabilités, il apporte un certain niveau de prestige, nous aidant à gagner le respect des autres princes."
 kol_hanseatic_city:0 "Ville Commerciale Hanséatique"
 kol_hanseatic_city_desc:0 "En raison de sa position centrale sur le Rhin et de ses liens commerciaux avec Cannor occidental et oriental, Cologne a traditionnellement été un membre éminent de la Ligue Hanséatique. Grâce à son commerce avec l'Angleterre et ses contacts dans la ligue, Cologne s'est développée en une grande et riche ville commerciale. En encourageant sa croissance future, nous assurerons un dividende économique abondant à l'avenir !"
 kol_prime_minister:0 "Premier Ministre de Cologne"
 kol_prime_minister_desc:0 "La gouvernance d'un évêché aussi grand que Cologne requiert beaucoup de temps. Pour administrer cette terre, l'Archevêque néglige ses devoirs spirituels, ce qui conduit au mécontentement parmi ses sujets. En établissant le poste de Premier Ministre, à qui l'administration séculière de l'Archevêché sera déléguée, l'Archevêque gagnera plus de temps pour les besoins spirituels de la population de Cologne."
 kol_pivotal_ecclesiastic_territory:0 "Territoire Ecclésiastique Pivot"
 kol_pivotal_ecclesiastic_territory_desc:0 "En tant qu'Évêque-Électeur et l'un des plus grands territoires ecclésiastiques de l'Empire, Cologne est un acteur pivot dans les guerres de religion. Notre soutien est susceptible d'être la clé du succès ou de la chute de l'un ou l'autre camp dans la lutte. Nous utiliserons cette opportunité pour répandre la droiture et l'exactitude religieuse à travers la Germanie."
 kol_shifting_alliances:0 "Alliances Changeantes"
 kol_shifting_alliances_desc:0 "En tant qu'État dont le pouvoir est basé plus sur son prestige que sur sa force armée, l'Archevêché est dépendant d'une diplomatie compétente et même sournoise pour survivre. Au fil des années d'être un Électeur dans l'Empire d'Anbennar, les Évêques-Électeurs ont pu établir des liens forts avec d'autres nations, et apprendre quelques ficelles du métier."
 kol_order_of_saint_michael:0 "Ordre de Saint-Michel"
 kol_order_of_saint_michael_desc:0 "C'est notre devoir de mettre la noblesse de notre territoire en ligne avec les croyances acceptées de l'Église afin de défendre la foi dans notre évêché. À cette fin, nous devrions établir un ordre militaire ouvert uniquement aux nobles. Cet ordre, avec Saint-Michel comme patron, va enseigner à nos nobles à prier et à recevoir les sacrements avec une âme chaste. De cette façon, ils acquerront la discipline et le zèle dont ils ont besoin pour défendre notre évêché contre ses ennemis spirituels et autres."
 #Mainz Ideas
 MAI_ideas:0 "Idées de Mayence"
 MAI_ideas_start:0 "Traditions de Mayence"
 MAI_ideas_bonus:0 "Ambition de Mayence"
 mai_archchancellor_of_germany:0 "Archicancellarius per Germaniam"
 mai_archchancellor_of_germany_desc:1 "Depuis le Xe siècle, les Archevêques de Mayence ont détenu le titre d'Archichancelier, faisant d'eux les plus hauts dignitaires du royaume après l'Empereur lui-même. Notre devoir le plus prestigieux est de convoquer et d'organiser les Élections Impériales et de guider les autres Princes-Électeurs dans leur recherche d'un nouvel Empereur."
 mai_center_of_religious_learning:0 "Centre d'Apprentissage Religieux"
 mai_center_of_religious_learning_desc:0 "En tant que l'un des grands centres d'apprentissage religieux et de théologie dans tout Cannor, Mayence abrite nombre des érudits chrétiens et juifs les plus brillants. Veillant sur eux se trouve la Cathédrale Saint-Martin, le siège épiscopal de notre évêque, où Rois et Empereurs ont été couronnés."
 mai_saint_hildegard:0 "Sainte Hildegarde de Bingen"
 mai_saint_hildegard_desc:0 "Hildegarde de Bingen, l'abbesse bénédictine et polymathe du XIIe siècle, est vénérée comme une sainte dans notre région. Cependant, sa canonisation a été entravée par des disputes entre nos précédents Archevêques et le Haut-Recteur. Mais maintenant Hildegarde a finalement été acceptée dans le martyrologe romain, ce qui favorisera une vénération encore plus grande pour elle, et pour l'Église en général, parmi le peuple."
 mai_weck_worscht_woi:0 "Weck, Worscht & Woi"
 mai_weck_worscht_woi_desc:0 "Weck, Worscht un Woi, pain, saucisse et vin, est un repas favori de nos sujets. Sa simplicité le rend facilement transportable, et donc une ration alimentaire optimale pour notre armée. Comme nous possédons des terres fertiles, et les meilleurs vignobles de toute la Germanie, nous pouvons facilement nous permettre d'approvisionner nos troupes en Weck, Worscht un Woi, maintenant certainement leur moral de combat élevé !"
 mai_perpetual_privy_council:0 "Conseil Privé Perpétuel"
 mai_perpetual_privy_council_desc:0 "Le territoire disjoint que nous gouvernons a rendu nécessaire la création d'une administration centrale durable, le conseil privé perpétuel. Désormais, nous imposerons une règle plus rigide sur nos sujets et priverons les états de leur pouvoir ainsi que les empêcherons de se réunir."
 mai_rhine_fortress:0 "La Garde du Rhin"
 mai_rhine_fortress_desc:0 "Les terres germaniques ont été menacées par des ennemis venant de l'Ouest depuis que l'Empire d'Anbennar a vu le jour, avec de nombreux ennemis cherchant à nous repousser au-delà du Rhin. En tant que forteresse la plus puissante sur les rives ouest du fleuve, nous sommes l'épée et le bouclier de l'Empire et c'est notre devoir sacré de résister fermement à tous les intrus !"
 mai_fifth_season:0 "La Cinquième Saison"
 mai_fifth_season_desc:0 "D'autres pays moins éclairés pourraient interdire la critique de la noblesse par le peuple, mais ce n'est pas le cas ici à Mayence quand le Karneval annuel arrive. Les gens sont libres de critiquer les injustices sociales et politiques sous l'abri du bonnet et des grelots, imitant ceux d'un rang social différent pour la journée. Celui qui n'est pas fou au Karneval est fou pour le reste de l'année !"
 #New Portuguese Idea
 por_royal_military_academy:0 "Académie Royale de Fortification, d'Artillerie et de Dessin"
 por_royal_military_academy_desc:0 "Notre corps d'artillerie et nos fortifications ont longtemps été la clé de la défense de notre territoire, faisant de notre petit pays une noix bien difficile à casser pour les armées ennemies. Nous établirons une académie militaire, l'Academia Real de Fortificação, Artilharia e Desenho, pour former nos officiers dans ces domaines, afin qu'ils puissent à leur tour façonner nos forts et notre corps d'artillerie pour en faire les meilleurs au monde !"
 #Trierian Ideas
 TRI_ideas:0 "Idées de Trèves"
 TRI_ideas_start:0 "Traditions de Trèves"
 TRI_ideas_bonus:0 "Ambition de Trèves"
 tri_crusader_past:0 "Passé Croisé"
 tri_crusader_past_desc:0 "Il y a des siècles, de nombreux hommes braves ont quitté notre pays comme croisés pour participer aux Croisades. Leurs exploits sont profondément ancrés dans la mémoire de notre évêché. Nos armoiries, la Croix de Saint-Georges, ont été choisies pour honorer ces croisés. Que tous nos soldats se souviennent de notre passé de croisés et soient exhortés à montrer que le feu des temps passés est toujours en eux."
 tri_university_of_trier:0 "Université de Trèves"
 tri_university_of_trier_desc:0 "Le Haut-Recteur nous a accordé la permission d'établir une université dans notre ville, où nous pouvons former les futurs prêtres et administrateurs pour notre évêché. Faisons-le et promouvons en outre l'étude du droit et de la médecine, afin que nous puissions devenir un véritable centre d'apprentissage et attirer des étudiants de partout."
 tri_archchancellor_of_gaul:0 "Archicancellarius per Galliam"
 tri_archchancellor_of_gaul_desc:0 "En tant qu'Archichancelier d'Arles, de Bourgogne et de toute la France, c'est notre droit et notre devoir de ramener ces terres perdues dans l'empire. Sous notre bannière, l'Empire en France sera restauré !"
 tri_landesburgen:0 "Landesburgen"
 tri_landesburgen_desc:0 "Nous avons plusieurs châteaux appelés « Landesburgen » répartis sur notre territoire séculier. Ils jouent un rôle vital dans notre administration, servant de sièges pour nos fonctionnaires, de postes de collecte de péage et de positions fortes autour desquelles rallier notre défense contre nos ennemis."
 tri_seamless_robe_of_jesus:0 "La Sainte Tunique de Jésus"
 tri_seamless_robe_of_jesus_desc:0 "Hélène, mère de l'Empereur romain Constantin le Grand, aurait envoyé la Sainte Tunique de Jésus à Trèves (alors connue sous le nom d'Augusta Treverorum) après l'avoir découverte à Jérusalem. Elle a depuis été conservée dans un reliquaire dans la cathédrale de Trèves, mais nous la mettons parfois en exposition pour les fidèles, attirant un grand nombre de pèlerins dans notre ville pour l'occasion."
 tri_prum_abbey:0 "Abbaye de Prüm"
 tri_prum_abbey_desc:0 "Prüm était le monastère préféré des Carolingiens, recevant de nombreux privilèges et grands domaines du Roi Pépin le Bref après son mariage avec Bertrade la Jeune, petite-fille du fondateur de l'abbaye. Au fil des années, elle est devenue non seulement une belle abbaye, mais aussi un centre d'apprentissage ecclésiastique. Cependant, elle a considérablement décliné depuis ces jours, et est incapable de survivre seule. Nous prendrons en charge l'administration de l'abbaye et la restaurerons à son ancienne gloire !"
 tri_domkapitel:0 "Influence du Domkapitel"
 tri_domkapitel_desc:0 "Le Domkapitel ou Chapitre Cathédral a une grande influence sur l'Archevêché, choisissant les nouveaux Archevêques, décidant quand l'Archevêque peut convoquer les états, et gouvernant à sa place en cas d'absence. Grâce à leur vigilance, ils veilleront à ce que Trèves soit toujours bien administrée, que l'Archevêque soit présent ou non."
#Bavarian DHEs
 new_flavour_bav.181.name:0 "Le Mandat Religieux Expire"
 new_flavour_bav.181.desc:0 "Ces dernières années, nous avons institué un mandat religieux pour empêcher la propagation des hérésies dans notre terre. Cela s'est avéré réussi, et nous avons traversé la soi-disant Réforme sans compromettre notre foi. Maintenant que les menaces contre le Ravélianisme ont été surmontées, il est temps que le mandat prenne fin et que les restrictions que nous avions imposées au clergé soient levées."
 new_flavour_bav.181.A:0 "Très bien."
 new_flavour_bav.20.a.tooltip:0 "\nUne fois qu'un héritier est né :"
 new_flavour_bav.201.name:0 "La Theatinerkirche est Achevée"
 new_flavour_bav.201.desc:0 "L'église que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] avait promise à [Root.Consort.GetTitle] [Root.Consort.GetName] une fois qu'elle lui aurait donné un héritier a été achevée, maintenant que [Root.Heir.GetName] est né. Connue sous le nom d'Église des Théatins, sa beauté est un digne ajout à notre capitale !"
 new_flavour_bav.201.A:0 "Excellent."
 new_flavour_bav.2401.name:0 "Ratisbonne Paie ses Dettes"
 new_flavour_bav.2401.desc:0 "La ville de Ratisbonne a payé ses dettes envers nous en totalité."
 new_flavour_bav.2401.opt:0 "Excellent."
 new_flavour_bav.2402.desc:0 "La ville de Ratisbonne a pu payer ses dettes envers l'Empereur en totalité sans avoir besoin de recourir à notre offre."
 new_flavour_bav.2402.opt:0 "Donc notre générosité était vaine ?"
 new_flavour_bav.2403.name:0 "Ratisbonne Fait Défaut sur ses Dettes"
 new_flavour_bav.2403.desc:0 "La ville de Ratisbonne n'a pas pu payer ses dettes et a fait défaut sur ses obligations envers notre personne. Nous n'avons d'autre choix que de lui retirer son statut de Ville Libre et d'accorder la ville à l'Évêché de Ratisbonne."
 new_flavour_bav.2403.opt:0 "C'est malheureux."
 new_flavour_bav.2404.desc:0 "La ville de Ratisbonne a rejeté notre offre et décidé de faire défaut sur ses dettes envers l'Empereur. Par conséquent, elle a été privée de son statut de Ville Libre et l'Évêché de Ratisbonne a reçu le contrôle de la ville."
 new_flavour_bav.2404.opt:0 "Mais nous avons offert si gentiment..."
 new_flavour_bav.2405.name:0 "[regensburg_fromfrom.GetName] Intercède au Nom de Ratisbonne"
 new_flavour_bav.2405.desc:0 "Le [regensburg_fromfrom.GetRulerAdjAndTitle] a intercédé au nom de Ratisbonne et payé leurs dettes envers nous en échange du contrôle de la ville elle-même. Il semble que le corps gouvernant de Ratisbonne était assez désespéré pour n'avoir d'autre choix que d'accepter cette proposition, un défi direct à notre autorité, puisque la ville de Ratisbonne était une ville impériale sous notre protection !"
 new_flavour_bav.2405.opt:0 "Nous ne pouvons tolérer cela."
 new_flavour_bav.2406.desc:0 "Le corps gouvernant de Ratisbonne nous remercie chaleureusement pour notre offre, qu'ils n'ont d'autre choix que d'accepter. Ils ont ouvert les portes de leur ville pour permettre à notre garnison d'entrer. L'Empereur, cependant, est moins impressionné par cet arrangement."
 new_flavour_bav.2406.opt:0 "Excellent."
 #Saxony DHEs
 flavor_sax.8.A.tooltip:0 "§YLa Saxe§! n'obtiendra PAS de Casus Belli §YRestauration d'Union§! sur §YLa Thuringe§!."
 flavor_sax.5.name:0 "La Guerre Fratricide Saxonne Évitée"
 flavor_sax.5.desc:0 "Après la mort de l'oncle du [From.Monarch.GetTitle] [From.Monarch.GetName], Frédéric de Thuringe, les terres Wettin de Thuringe sont passées sous le règne de [From.GetName]. Cependant, une dispute a bientôt éclaté entre le [From.Monarch.GetTitle] et son frère, Guillaume, sur la juste distribution de ces terres. Selon la Division d'Altenbourg, un accord arbitré avec l'aide de Brandebourg et Hessen, les deux frères seraient des dirigeants conjoints, Guillaume recevant le contrôle de la Thuringe.\n\nCependant, Guillaume n'a jamais été satisfait de cet arrangement. En faisant pression sur [From.Monarch.GetName], il a réussi à renégocier l'accord de sorte que ses domaines incluent maintenant Wittenberg."
 flavor_sax.51.name:0 "La Guerre Fratricide Saxonne"
 flavor_sax.51.desc:1 "Après la mort de l'oncle du [From.Monarch.GetTitle] [From.Monarch.GetName], Frédéric de Thuringe, les terres Wettin de Thuringe sont passées sous le règne de [From.GetName]. Cependant, une dispute a bientôt éclaté entre le [From.Monarch.GetTitle] et son frère, Guillaume, sur la juste distribution de ces terres. Selon la Division d'Altenbourg, un accord arbitré avec l'aide de Brandebourg et Hessen, les deux frères seraient des dirigeants conjoints, Guillaume recevant le contrôle de la Thuringe.\n\nCependant, Guillaume n'a jamais été satisfait de cet arrangement. Face au refus obstiné du [From.Monarch.GetTitle] [From.Monarch.GetName] de revoir ses termes, Guillaume a maintenant pris les armes contre le règne de son frère."
 flavor_sax.51.opt:0 "Vive le Duc Guillaume !"
 flavor_sax.81.name:0 "Le Traité de Leipzig"
 flavor_sax.81.desc:0 "Conformément au dernier testament de Frédéric II, les terres saxonnes ont été divisées entre [From.Monarch.GetName], qui a pris Meissen, et [From.Monarch.GetHerHis] frère Ernest, qui gouverne maintenant la Thuringe, chacun des deux gouvernant désormais leurs terres de manière totalement indépendante de l'autre."
 flavor_sax.81.opt:0 "Vive le Duc Ernest !"
 flavor_sax.82.name:0 "Le Traité de Leipzig"
 flavor_sax.82.desc:0 "Selon le dernier testament de Frédéric II, les terres saxonnes devaient être divisées entre [From.Monarch.GetName], qui devait prendre Meissen, et [From.Monarch.GetHerHis] frère Ernest, qui devait recevoir la Thuringe. Cependant, l'infâme [From.Monarch.GetName] a choisi de ne pas honorer le testament, prétendant que Frédéric avait été frappé par des accès de folie dans ses dernières années. Il cherche maintenant à imposer son règne illégitime sur nous."
 flavor_sax.82.opt:0 "Nous ne supporterons pas cela."
 #Naples DHE
 new_flavour_nap.5.B:0 "Peut-être devrions-nous également soutenir ces rebelles."
