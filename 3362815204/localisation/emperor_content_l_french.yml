 incident_burgundy_wants_to_join:0 "La Bourgogne et l'Empire"
 elections.721.dc:0 "Le décès malheureux de $MONARCH$ nous contraint à tenir une élection prématurée. Les Militaristes et les Théocrates ont tous deux présenté un nouveau candidat."
 elections.721.de:0 "Le décès malheureux de $MONARCH$ nous contraint à tenir une élection prématurée. Les Révolutionnaires ont présenté un candidat jacobin et un candidat girondin, et les Monarchistes ont présenté un candidat royal."
 elections.720.e:0 "Un candidat militariste."
 elections.720.f:0 "Un candidat théocratique."
 elections.720.g:0 "Un candidat jacobin."
 elections.720.h:0 "Un candidat girondin."
 elections.720.dc:0 "Le renforcement des pouvoirs séculiers dans notre nation a contraint $MONARCH$ à entamer le processus d'élection d'un nouveau [Root.Monarch.GetTitle]. Les Militaristes et les Théocrates ont tous deux présenté de nouveaux candidats."
 elections.720.de:0 "Le mandat de $MONARCH$ est arrivé à son terme et il est temps d'entamer le processus d'élection d'un nouveau [Root.Monarch.GetTitle]. Les Révolutionnaires ont présenté un candidat jacobin et un candidat girondin, et les Monarchistes ont présenté un candidat royal."
 pirates.23.t:0 "Les Pirates de Penzance"
 pirates.23.d:0 "Depuis que nous avons obtenu notre autonomie vis-à-vis du Royaume d'Angleterre, la profession de corsaire est devenue une source massive de revenus pour les habitants de notre [Root.GovernmentName]. Penzance est devenue un port de grande fortune pour les contrebandiers et les corsaires, et nos exploits tant en Mer du Nord que dans la Manche sont devenus légendaires : nul n'ose naviguer dans ces eaux sans escorte par crainte du courroux des Cornouaillais.\n\nCependant, l'influence de ces hommes de basse condition au sein de notre nation devient assez inquiétante, et récemment un groupe de puissants capitaines a marché sur [Root.Capital.GetCapitalName] avec leurs équipages et menace de renverser le [Root.Monarch.GetTitle] et de prendre le contrôle du [Root.GovernmentName] [Root.GetAdjective]."
 pirates.23.a:0 "Il est temps d'abandonner le navire."
 pirates.23.b:0 "Nous ne deviendrons pas esclaves de voleurs et de brigands !"
 pirates.24.t:0 "Un Amiral Modèle"
 pirates.24.d:0 "Un capitaine prometteur est arrivé à Penzance il y a peu, et a immédiatement commencé à se vanter fièrement de ses exploits à travers le monde. Il prétend être non seulement un grand amiral, mais le modèle même d'un major général moderne. De plus, il affirme que ses voyages lui ont conféré une connaissance approfondie de tous les sujets, de la botanique à l'élevage en passant par la géologie. Non seulement cela, mais il a rencontré des Rois et des Empereurs, et a personnellement participé à chaque bataille majeure des cent dernières années. Il prétend également être un expert en mathématiques, bien que nous ne sachions pas quel avantage cela représente pour un corsaire. Beaucoup doutent de la légitimité de ses affirmations, mais il les a exprimées d'une manière si charmante que nous ne pouvons nous empêcher d'être captivés par ce personnage singulier."
 pirates.24.a:0 "Il pourrait conseiller le [Root.Monarch.GetTitle]."
 pirates.24.b:0 "Il devrait devenir le [Root.Monarch.GetTitle] !"
 flavor_koi.1.t:0 "Un Royaume de Mann"
 flavor_koi.1.d:0 "Malgré notre taille relativement modeste comparée aux autres royaumes britanniques, Mann est depuis longtemps reconnu comme un royaume à part entière. Avec notre propre lignée royale, notre propre culture et notre propre langue, le mode de vie mannois est véritablement unique à travers les îles. Maintenant que nous nous sommes libérés de l'influence étrangère, nous pouvons à nouveau endosser le manteau des Rois et Reines de Mann !"
 flavor_koi.1.a:0 "Peut-être qu'un jour, nous serons les Empereurs de Mann..."
 flavor_nol.1.t:0 "Le Roi du Nord !"
 flavor_nol.1.d:0 "Dans les temps anciens de l'Angleterre, le Nord abritait de nombreux royaumes grands et puissants. Les anciens Rois de Northumbrie régnaient sur un royaume qui s'étendait d'Édimbourg jusqu'au sud de la Humber. Peu après, les envahisseurs nordiques s'installèrent à York et créèrent leur propre royaume septentrional sur les cendres de notre royaume déchu, qu'ils nommèrent Jorvik. Finalement, après de nombreuses années sous le contrôle des Nordiques, des Normands et des méridionaux, la Northumbrie est à nouveau libre et nous pouvons nous couronner Rois et Reines du Nord !"
 flavor_nol.1.a:0 "Le Roi du Nord !"
 flavor_nol.2.t:0 "Sélection d'un Candidat Septentrional"
 flavor_nol.2.d:0 "[Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] a bien servi le Nord jusqu'à présent, mais alors que nous commençons à nous développer en un État autonome, le besoin d'un prétendant légitime à l'ancien Royaume de Northumbrie commence à se faire sentir. Nous devons sélectionner un remplaçant convenable si nous voulons consolider notre emprise sur la région."
 flavor_nol.2.a:0 "Nous avons besoin d'un Percy."
 flavor_nol.2.b:0 "Le Nord se souvient de la maison York."
 flavor_nol.2.c:0 "Les Lancaster envoient leurs salutations."
 flavor_nol.2.e:0 "Ce noble prétend être un descendant de Halfdan Ragnarsson !"
 flavor_nol.2.f:0 "[Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] restera sur le trône."
 flavor_nol.3.t:0 "Revendications Nordiques"
 flavor_nol.3.d:1 "Les possessions de Ragnar Lothbrok et de ses descendants s'étendaient à travers les îles Britanniques et la Scandinavie. [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] prétend être un descendant direct de cet envahisseur viking, et en tant que tel a revendiqué le Royaume de Norvège, affirmant qu'il fait légitimement partie de [Root.Monarch.GetHerHis] Royaume Septentrional. Bien que beaucoup doutent de la légitimité de l'ascendance nordique de [Root.Monarch.GetName], les nobles de notre propre royaume soutiennent [Root.Monarch.GetHerHis] revendication et leur approbation est tout ce dont nous avons vraiment besoin pour faire valoir notre revendication sur la Norvège."
 flavor_nol.3.a:0 "Cela commence à me sembler familier..."
 flavor_nol.3.b:0 "Le règne de [Root.Monarch.GetName] est déjà contesté, n'aggravons pas la situation."
 flavor_eng.99.t:0 "Les Soldates en Jupons"
 flavor_eng.99.d:0 "Quelques années avant la Révolution, un « Grand Acte de Réforme » fut adopté par l'ancien gouvernement, stipulant que seules les personnes de sexe masculin pouvaient détenir le droit de vote, sapant activement les droits des femmes nobles propriétaires terriennes. Menées par ces dames de la haute société mécontentes, des femmes pauvres comme riches descendirent dans les rues durant la Révolution, marchant ensemble sous le Régiment des Femmes [Root.GetAdjective] Révolutionnaires nouvellement formé. Leur chant de marche « le vote aux femmes, en cadence ! » fut chanté en chœur triomphant à travers les rues de [Root.Capital.GetCapitalName] tandis que l'ancien gouvernement était totalement écrasé par nos forces. Même les plus conservateurs au sein du Conseil Révolutionnaire ne peuvent nier le rôle vital que ces dames ont joué dans la consolidation de notre domination sur les Îles et l'impact que leur esprit libéral a eu sur notre identité nationale.\n\nBien que nous n'ayons fait aucune promesse explicite d'étendre le suffrage aux femmes, leur rôle déterminant dans notre libération des chaînes d'hier pousse un nombre considérable de messieurs au sein du Conseil Révolutionnaire à accorder à ces braves dames leurs revendications et même à permettre aux femmes d'occuper des fonctions politiques sur un pied d'égalité avec les hommes."
 flavor_eng.99.a:0 "Adoptons les réformes ! Les filles de nos filles nous adoreront !"
 flavor_eng.99.b:0 "Catastrophe ! Anarchie ! En bref, nous avons un désordre épouvantable !"
 sister_suffragettes:0 "Le Vote aux Femmes"
 desc_sister_suffragettes:0 "Cette nation a instauré l'égalité politique entre hommes et femmes. Bien joué, sœurs suffragettes !"
 colonial_boom:0 "Essor Colonial"
 desc_colonial_boom:0 "Les gens affluent vers cette colonie pour la chance d'une vie meilleure."
 baby_boomers:0 "Un Baby-Boom !"
 desc_baby_boomers:0 "Cette province connaît une augmentation massive des taux de natalité, favorisant l'expansion de la province."
 enforcing_unity:0 "Unité Imposée"
 desc_enforcing_unity:0 "Le propriétaire de cette province répand les valeurs pacifiques de sa religion sur ce peuple, par la force !"
 sexist_revolution:0 "Administration Misogyne"
 desc_sexist_revolution:0 "Les femmes vivant dans cette nation ont le sentiment d'avoir été trahies par leur gouvernement."
 shinto_events.59.t:0 "Une Nouvelle Tradition"
 shinto_events.59.d:0 "Nombre de nos administrateurs suivent les philosophies confucéennes et leurs croyances s'emparent rapidement de l'administration de notre nation. Bien que le Shintoïsme soit encore largement pratiqué au sein de notre administration, beaucoup commencent à croire que la religion est une affaire privée à décider par l'individu, et non quelque chose dans lequel l'État devrait s'immiscer. Si nous abandonnons entièrement nos traditions et adoptons le Confucianisme comme philosophie d'État, nous pourrions apporter paix et harmonie à tous les fidèles de toutes religions vivant sur les terres [Root.GetAdjective]."
 become_kirishitan_daimyo_title:0 "La Question Kirishitan"
 become_kirishitan_daimyo_desc:0 "Cela fait un moment que les missionnaires de Cannor sont arrivés dans nos ports et ont commencé à commercer avec notre peuple. Ce n'est un secret pour personne que le chef de notre clan éprouve de la sympathie pour les Kirishitans, mais est-il temps pour nous d'abandonner les Kami pour le Christ et la Sainte Vierge ?"
 become_ikko_ikki_daimyo_title:0 "Le Vent Divin"
 become_ikko_ikki_daimyo_desc:0 "Notre souverain a toujours eu des sympathies pour les Ikko Ikki et leur foi bouddhiste. Bien que de nombreuses personnes au Japon suivent simultanément les fois bouddhiste et shintoïste, peut-être est-il temps d'abandonner les anciennes coutumes et d'adopter le Bouddhisme Shin."
 become_confucian_daimyo_title:0 "Adopter l'Administration Confucéenne"
 become_confucian_daimyo_desc:0 "Le Confucianisme a influencé notre Daimyo de manière si unique que les institutions religieuses commencent à sembler quelque peu superflues. Peut-être que si nous adoptons pleinement les enseignements de Confucius, nous créerons un royaume plus paisible et harmonieux."
 DAL:0 "Dalmatie"
 DAL_ADJ:0 "Dalmate"
 dalmatian:0 "Dalmate"
 dalmatian_nation_title:0 "Réunifier le Royaume de Dalmatie"
 dalmatian_nation_desc:0 "Lorsque les autres États de la Fédération Dalmate ont signé un pacte avec les Vénitiens, notre peuple n'a tout simplement pas pu les suivre et tomber sous l'influence d'une autre nation étrangère. Maintenant que nous avons reconquis une grande partie de l'ancien Royaume, nous sommes en position d'abandonner notre identité isolée et de consolider la Fédération Dalmate en un seul État, libre de toute main étrangère."
 incident_hansa:0 "Déclin de la Ligue Hanséatique"
 incident_hansa_member_alert:0 "La Hanse était jadis la maîtresse incontestée du commerce de Londres à Novgorod. Aujourd'hui cependant, la fortune de la Ligue Hanséatique est en déclin. Dans leur désespoir, la Ligue a adressé une pétition à l'Empereur pour obtenir de l'aide."
