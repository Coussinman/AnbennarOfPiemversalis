l_french:
 # Country formation decisions
 TTS:0 "Deux-Siciles"
 TTS_ADJ:0 "Sicilien"
 two_sicilies_nation_title:0 "Unir les Deux-Siciles"
 two_sicilies_nation_desc:0 "Naples et la Sicile ont été divisées et disputées par les grandes puissances de Cannor depuis bien trop longtemps. Nous devons réunir les Siciles et devenir une grande puissance à part entière."
 switzerland_nation_title:0 "Restaurer la Confédération Suisse"
 switzerland_nation_desc:0 "Notre nation est vulnérable lorsqu'elle se tient seule. Nous devrions unir le peuple suisse sous une Confédération de petits royaumes afin de préserver la liberté de chaque membre constitutif tout en présentant un front uni face aux envahisseurs étrangers."
 silesia_nation_title:0 "Former la Nation Silésienne"
 silesia_nation_desc:0 "La Silésie a été divisée en Duchés et gouvernée depuis des capitales étrangères pendant des siècles. Il est temps pour la Silésie de rejeter à la fois la domination étrangère et la division interne, créant une nouvelle nation silésienne."
 # Ambrosian Republic
 military_dictatorship_reform:1 "Dictature Militaire"
 military_dictatorship_reform_desc:1 "Un dictateur militaire a pris le pouvoir et gouverne l'État en autocrate. Les nouveaux dirigeants sont invariablement sélectionnés parmi les Généraux."
 military_dictatorship:0 "Dictature Militaire"
 military_dictatorship_desc:0 "Un dictateur militaire a pris le pouvoir et gouverne l'État en autocrate. Les nouveaux dirigeants sont invariablement sélectionnés parmi les Généraux."
 MILITARY_GOVERNMENT:0 "République Militaire"
 ambrosian_republic.1.t:0 "Un Gouvernement Stable à Milan"
 ambrosian_republic.1.d:0 "L'établissement de la République Ambrosienne Dorée ne s'est pas fait sans difficultés, mais la liberté a finalement prévalu. Nous ne sommes pas retombés dans les ténèbres du féodalisme, et nous n'avons pas non plus sombré dans la tyrannie militaire. La paix, la justice et la liberté règnent dans tout [Root.GetName]."
 ambrosian_republic.1.d2:0 "L'établissement de la République Ambrosienne Dorée ne s'est pas fait sans difficultés. Dans notre désespoir, nous avons abandonné nos idéaux de liberté et accordé le pouvoir absolu à notre Capitaine Général. Puisse [Root.Monarch.GetName] protéger la paix pour de nombreuses années à venir."
 ambrosian_republic.1.d3:0 "La République Ambrosienne Dorée était une expérience vouée à l'échec. Les nobles idéaux de ses fondateurs érudits se sont révélés impraticables, et le peuple a réclamé le retour d'un Duc. [Root.Monarch.GetTitle] [Root.Monarch.GetName] a pris le trône et restauré l'ordre naturel à [Root.GetName]."
 ambrosian_republic.1.d4:0 "La République Ambrosienne Dorée était une expérience vouée à l'échec. En l'absence d'un Duc, les seigneurs avisés de [Root.Overlord.GetName] ont saisi l'opportunité de revendiquer le trône vacant de [Root.GetName] pour eux-mêmes. Puisse [Root.Monarch.GetName] nous gouverner avec sagesse et patience."
 ambrosian_republic.1.a:0 "Louons Saint Ambroise !"
 ambrosian_republic.2.t:0 "La Succession Milanaise"
 ambrosian_republic.2.d:1 "Avec le trône de [Root.GetName] laissé vacant, le [FRA.Monarch.GetTitle] de France et l'Empereur discutent ouvertement de leurs prétentions au Duché. La revendication française est fondée sur des liens matrimoniaux avec l'ancienne dynastie Visconti. Bien que la prétention ne soit pas forte, la France convoite l'Italie depuis longtemps et peu ont la force de résister au [FRA.Monarch.GetTitle]. L'Empereur, quant à lui, soutient qu'en l'absence d'un héritier clair, le titre de Duc doit être conféré à l'Empereur selon la loi impériale."
 ambrosian_republic.2.a:0 "Nous devons être prêts à défendre notre liberté."
 ambrosian_republic.3.d:0 "Milan est tombée dans le chaos politique. Le trône est vacant et une République naissante s'efforce en vain d'établir l'ordre. Ce serait un excellent moment pour faire valoir notre prétention au Duché de Milan, fondée sur nos liens matrimoniaux avec la Maison de Visconti, maintenant éteinte."
 ambrosian_republic.3.a:0 "Le trône nous appartient !"
 ambrosian_republic.3.b:0 "Nous n'avons aucun intérêt pour Milan"
 ambrosian_republic.4.d:1 "Milan est tombée dans le chaos politique. Le trône est vacant et une République naissante s'efforce en vain d'établir l'ordre. Selon la loi impériale, le titre de Duc devrait passer à l'Empereur [Emperor.Monarch.GetHerselfHimself] lorsque la lignée des Ducs s'éteint. Si nous souhaitons imposer cette loi et revendiquer Milan pour nous-mêmes, nous devons agir rapidement pour déposer la soi-disant République Ambrosienne Dorée."
 ambrosian_republic.5.t:0 "Une Proposition pour Sforza"
 ambrosian_republic.5.d:1 "Francesco Sforza est l'un des plus grands généraux militaires de notre temps, et un éminent chef de condottieri. Il est des plus malheureux que nous nous trouvions en conflit avec lui dans notre guerre contre Venise. Sforza est populaire parmi le peuple milanais cependant, et possède même une prétention au trône.\n\nUne faction au sein du gouvernement divisé a écrit à Sforza avec une offre généreuse : s'il abandonne nos ennemis et rejoint notre cause, Milan lui offrirait la province de [sforza_promised_province.GetName] ainsi qu'un poste de Capitaine et Défenseur. Sforza pourrait être un grand atout pour la République, mais beaucoup se demandent si sa loyauté envers Milan l'emportera sur son ambition personnelle."
 ambrosian_republic.5.d2:1 "Francesco Sforza est l'un des plus grands généraux militaires de notre temps, et un éminent chef de condottieri. Il est des plus malheureux que nous nous trouvions en conflit avec lui dans notre guerre contre [sforza_origin_country.GetName]. Sforza est populaire parmi le peuple milanais cependant, et possède même une prétention au trône.\n\nUne faction au sein du gouvernement divisé a écrit à Sforza avec une offre généreuse : s'il abandonne nos ennemis et rejoint notre cause, Milan lui offrirait la province de [sforza_promised_province.GetName] ainsi qu'un poste de Capitaine et Défenseur. Sforza pourrait être un grand atout pour la République, mais beaucoup se demandent si sa loyauté envers Milan l'emportera sur son ambition personnelle."
 ambrosian_republic.5.d3:1 "Francesco Sforza est l'un des plus grands généraux militaires de notre temps, et un éminent chef de condottieri. Il est des plus malheureux que nous nous trouvions en conflit avec lui dans nos efforts pour réprimer la rébellion. Sforza est populaire parmi le peuple milanais cependant, et possède même une prétention au trône.\n\nUne faction au sein du gouvernement divisé a écrit à Sforza avec une offre généreuse : s'il abandonne nos ennemis et rejoint notre cause, Milan lui offrirait la province de [sforza_promised_province.GetName] ainsi qu'un poste de Capitaine et Défenseur. Sforza pourrait être un grand atout pour la République, mais beaucoup se demandent si sa loyauté envers Milan l'emportera sur son ambition personnelle."
 ambrosian_republic.5.a:0 "Nous le nommerons commandant de nos armées."
 ambrosian_republic.5.b:0 "Nous n'avons pas besoin de Sforza."
 ambrosian_republic.6.t:0 "Sforza s'oppose à la République"
 ambrosian_republic.6.d:0 "Sforza a de nombreux rivaux au sein de la République Ambrosienne Dorée. Les politiciens plus idéalistes et érudits qui ont fondé la République le soupçonnent de conspirer pour s'emparer du trône, tandis que les politiciens plus pragmatiques lui en veulent pour sa popularité auprès du peuple.\n\nSforza a récemment appris l'existence d'un complot visant à le priver de son commandement militaire et à l'éjecter de sa position au gouvernement. Outré, Sforza lance un ultimatum à l'État : accepter son autorité militaire absolue, ou l'affronter à nouveau sur le champ de bataille."
 ambrosian_republic.6.a:0 "Imposer le régime militaire sous Sforza."
 ambrosian_republic.6.b:0 "Résister à la tyrannie de Sforza. Nous combattons pour la liberté !"
 ambrosian_republic.7.t:0 "Sforza s'empare du Trône"
 ambrosian_republic.7.d:0 "Toujours l'opportuniste ambitieux, Sforza a trahi la République et s'est proclamé Duc légitime de Milan ! Sa popularité auprès du peuple et son emprise de fer sur l'armée et les mécanismes de l'État font que toute défiance à son règne semble vouée à l'échec. Peut-être devons-nous accepter le retour de la monarchie. Ou peut-être que la liberté vaut n'importe quel prix."
 ambrosian_republic.7.a:0 "Vive le Duc Sforza !"
 ambrosian_republic.7.b:0 "Inacceptable ! Nommer un nouveau Capitaine Général."
 ambrosian_republic.7.c:0 "Jamais ! Restaurons la République comme les fondateurs l'avaient prévu."
 ambrosian_republic.8.t:0 "La Mort de Sforza"
 ambrosian_republic.8.d:0 "Le Grand Capitaine Sforza est mort, soudainement et de façon inattendue. Sa popularité auprès du peuple et son emprise de fer sur la politique milanaise étaient tout ce qui maintenait la jeune République unie, et maintenant les diverses factions du gouvernement se battent pour leurs visions de l'avenir.\nLa faction de Giorgio Lampugnano souhaite renouveler les idéaux sur lesquels notre République a été fondée, restaurant la démocratie et mettant fin au régime militaire. La faction de Jacopo Piccinino, en contraste marqué, argue que seul un Capitaine Général fort peut maintenir la République unie et résister à ses nombreux ennemis."
 ambrosian_republic.8.a:0 "Vive le nouveau Capitaine Général !"
 ambrosian_republic.8.b:0 "Restaurer la République comme les fondateurs l'avaient prévu."
 opinion_swayed_sforza:0 "A détourné Sforza"
 ambrosian_republic_disaster:0 "République Ambrosienne Dorée"
 ambrosian_republic_disaster_desc:0 "En l'absence d'un prétendant fort au trône, des érudits idéalistes établissent une république naissante à Milan."
 ambrosian_republic_resolved_tt:0 "§YLe gouvernement de Milan sera stabilisé§!"
 ambrosian_republic_disaster_resolved_tt:0 "Le gouvernement de Milan a été stabilisé"
 # Bonfire of the Vanities
 signoria_reform:0 "Seigneurie Italienne"
 signoria_reform_desc:0 "La République fonctionne le plus harmonieusement sous la juridiction de facto de notre famille politique la plus éminente. Toute suggestion que cela soit à peine distinguable d'une monarchie est bien sûr absurde."
 signoria:0 "Seigneurie Italienne"
 signoria_desc:0 "La République fonctionne le plus harmonieusement sous la juridiction de facto de notre famille politique la plus éminente. Toute suggestion que cela soit à peine distinguable d'une monarchie est bien sûr absurde."
 savonarola_dead_tt:0 "Savonarole n'est pas le dirigeant de [Root.GetName]"
 had_disaster_for_6_months:0 "Le désastre est actif depuis 6 mois"
 bonfire_of_the_vanities_disaster:0 "Bûcher des Vanités"
 bonfire_of_the_vanities_disaster_desc:0 "Un clerc radical prend le pouvoir à Florence, engageant notre belle cité sur une voie politique et spirituelle dangereuse."
 flavor_tus.17.t:0 "L'Ordre Restauré à [Root.GetName]"
 flavor_tus.17.d:0 "Les Médicis ont restauré l'ordre dans la cité de Florence. Le moine fou Savonarole est mort et son nom déshonoré, à jamais rappelé comme le fou qui a failli conduire [Root.GetName] à la ruine."
 flavor_tus.17.d2:0 "Les Médicis ont été définitivement chassés de la cité et il est peu probable qu'ils y soient jamais les bienvenus. Sous la guidance vertueuse de Savonarole, le nouvel ordre à [Root.GetName] est caractérisé par le fanatisme religieux et l'obéissance aux édits de Dieu tels qu'interprétés par notre Prophète."
 flavor_tus.17.a:0 "Nous avons un gouvernement stable !"
 flavor_tus.18.t:0 "Savonarole : le Prophète"
 flavor_tus.18.d:0 "Des colonnes de fumée s'élèvent de la cité de [Root.Capital.GetCapitalName] alors que le peuple brûle ses vanités. Les foules se rassemblent pour assister à l'immolation des sorcières et des hérétiques. Les rangs des Pleureurs, les fidèles disciples du Prophète, ont grossi alors que Savonarole cimente son emprise sur les cœurs de nos citoyens. C'est décidé : [Root.GetName] abandonnera ses voies pécheresses et se consacrera uniquement à la volonté de Dieu et de son nouveau Prophète."
 flavor_tus.18.a:0 "La fin des temps approche. Nous prions pour le salut."
 flavor_tus.19.t:0 "Le Haut-Recteur condamne Savonarole"
 flavor_tus.19.d:0 "La nouvelle des actes de Savonarole s'est répandue jusqu'à l'archi-hérétique lui-même, le Haut-Recteur de Rome. Sans surprise, le Pontife a condamné le prédicateur et demandé son procès immédiat au Vatican, un appel que Savonarole a refusé avec défi. En réponse, le Haut-Recteur a fait savoir que Savonarole a été excommunié de l'Église Ravélienne, et tous ceux qui l'hébergent doivent être considérés comme des hérétiques du plus haut ordre."
 flavor_tus.19.a:0 "Le Haut-Recteur est un hérétique !"
 flavor_tus.19.b:0 "Assurer au peuple que le Haut-Recteur est simplement égaré."
 add_savanarola_support_tt:0 "§YSavonarole gagne des disciples, nous menant sur la voie de la théocratie§!"
 lose_savanarola_support_tt:0 "§YSavonarole perd des disciples, nous menant vers la restauration des Médicis§!"
 SAVANAROLA_GOVERNMENT:0 "Gouvernement de Savonarole"
 BROTHER:0 "Frère"
 # Great Peasants' War
 great_peasant_war.1.t:0 "La Grande Guerre des Paysans"
 great_peasant_war.1.d:0 "La paysannerie se soulève contre leurs maîtres légitimes, exigeant la fin du servage et des protections formelles pour leurs droits. Ce n'est pas une rébellion localisée : les graines de la dissidence sont répandues dans tout l'Empire et souvent plantées par de dangereux hérétiques. Tous les Princes de Germanie doivent veiller à leurs défenses et se préparer à une guerre contre le peuple même qu'ils gouvernaient autrefois."
 great_peasant_war.1.a:0 "Nous devrions rappeler à ces paysans leur place."
 gpw_effects_tt:0 "§YL'agitation est accrue dans tout l'Empire d'Anbennar.§!\nLes paysans sont plus susceptibles de se rebeller.\nLes rébellions paysannes réussies peuvent être enhardies à renverser l'aristocratie et imposer un système de gouvernement radicalement différent."
 great_peasant_war.2.t:0 "Les Revendications de la Paysannerie [Root.GetAdjective]"
 great_peasant_war.2.d:0 "Contre toute attente, les paysans rebelles de [Root.GetName] ont vaincu les forces du [Root.Monarch.GetTitle] et sont maintenant en position de faire appliquer leurs revendications. Certains des chefs paysans plus radicaux n'exigent rien de moins que l'élimination totale de l'aristocratie, mais la plupart sont disposés à accepter des concessions majeures afin de pouvoir retourner dans leurs foyers et auprès de leurs familles sans crainte de représailles."
 great_peasant_war.2.a:0 "À bas l'aristocratie !"
 great_peasant_war.2.b:0 "Nous n'avons pas d'autre choix que de capituler."
 great_peasant_war.3.t:1 "La Grande Guerre des Paysans"
 great_peasant_war.3.d:1 "Le violent conflit entre la paysannerie et l'ordre établi a fait rage pendant des décennies au sein de l'Empire d'Anbennar. Il est temps pour l'Empereur d'imposer une résolution ferme et définitive : protéger les droits de la paysannerie ou imposer le contrôle de la noblesse."
 great_peasant_war.3.a:0 "Écraser les agitateurs restants."
 great_peasant_war.3.b:1 "Accorder des concessions à la paysannerie."
 great_peasants_war_triggered_modifier:0 "Grande Guerre des Paysans"
 desc_great_peasants_war_triggered_modifier:0 "La Grande Guerre des Paysans plonge l'Empire d'Anbennar dans le conflit. Tant qu'elle dure, les paysans rebelles seront enhardis et pourraient même renverser le gouvernement."
 great_peasant_war.4.t:0 "Fin de la Grande Guerre des Paysans"
 great_peasant_war.4.d:0 "Les paysans sont devenus, pour la plupart, moins indisciplinés et ont appris à accepter leur place au bas de l'ordre naturel."
 great_peasant_war.4.a:0 "Remercions le Seigneur"
 end_gpw_tt:0 "§YLa Grande Guerre des Paysans prend fin.§!"
 # King in Prussia
 king_in_prussia.1.t:0 "Une Couronne Prussienne"
 king_in_prussia.1.d:0 "Alors que notre grande nation s'élève vers des sommets toujours plus hauts, le [Root.Monarch.GetTitle] a fait savoir qu'il a l'intention d'élever la Prusse au rang de Royaume et lui-même au rang de Roi. En tant que Prince de l'Empire d'Anbennar, il serait malséant que nous ne consultions pas l'Empereur en cette matière, et nous avons donc rédigé une proposition qu'il serait sage de considérer attentivement."
 king_in_prussia.1.a:0 "Nous serons Rois"
 king_in_prussia.2.t:0 "Le Roi en Prusse"
 king_in_prussia.2.d:1 "La Prusse est une puissance montante dans l'Empire d'Anbennar, devenant toujours plus dominante dans la politique impériale et se consolidant comme un concurrent sur la scène mondiale. [PRU.Monarch.GetTitle] [PRU.Monarch.GetName] a annoncé [PRU.Monarch.GetHerHis] intention de créer un Royaume de Prusse, élevant la nation de son statut de simple [PRU.GovernmentName]. C'est presque sans précédent au sein de l'Empire d'Anbennar, et l'Empereur doit considérer comment traiter cette affaire."
 king_in_prussia.2.a:0 "Élever la Prusse au rang de Royaume Impérial"
 king_in_prussia.2.b:0 "Qu'il se nomme Roi en Prusse"
 king_in_prussia.2.c:0 "Nous ne reconnaîtrons pas ce monarque autoproclamé."
 king_in_prussia.3.t:0 "Le Roi en Prusse"
 king_in_prussia.3.d:0 "Notre proche ami et allié, l'Empereur [emperor.Monarch.GetName], a gracieusement décidé d'élever la Prusse au rang de Royaume Impérial ! Un tel privilège n'a pas été accordé depuis l'ascension des Rois de Bohême. Les Rois de Prusse porteront leur couronne avec fierté, se souvenant toujours de la faveur qui leur a été accordée par l'Empereur."
 king_in_prussia.3.d2:0 "La tradition impériale dicte que les seuls Rois dans l'Empire devraient être le Roi des Romains, c'est-à-dire l'Empereur lui-même, et le Roi de Bohême. Nous avons cependant atteint un compromis juridique intrigant avec l'Empereur : nos monarques utiliseront le titre de « Roi en Prusse ». Comme la Prusse se trouve en dehors des limites de l'Empire d'Anbennar, nous pouvons nous nommer Rois sans que l'Empereur ait besoin de rompre les traditions impériales."
 king_in_prussia.3.d3:0 "L'Empereur, ce chien sans honneur, a refusé de reconnaître notre droit de nous appeler Rois, quels que soient les compromis raisonnables que nous avons proposés. Nous ne lui prêterons aucune attention bien sûr, et nous titrerons Rois malgré tout."
 king_in_prussia.3.a:0 "Remercions Dieu et l'Empereur !"
 king_in_prussia.3.b:0 "Un compromis satisfaisant."
 king_in_prussia.3.c:0 "Nous n'avons pas besoin de la permission de l'Empereur."
 elevated_prussia:0 "A élevé la Prusse"
 opinion_king_in_prussia:0 "Roi en Prusse"
 opinion_prussia_not_recognized:0 "Nie la Légitimité Prussienne"
 # Duke of Alencon
 emp_mission_events.10.t:0 "Le Duc d'Alençon"
 emp_mission_events.10.d:0 "Durant la Guerre de Cent Ans, les Ducs d'Alençon ont été expulsés de leurs terres par l'invasion anglaise. Maintenant que les territoires traditionnels du Duché sont revenus entre des mains françaises, les aristocrates survivants de la Maison de Valois-Alençon implorent le [Root.Monarch.GetTitle] de restaurer leurs terres et titres perdus."
 emp_mission_events.10.a:0 "Restaurer le Duc."
 emp_mission_events.10.b:0 "Alençon appartient à la Couronne."
 EST_VAL_DUKE_OF_ALENCON:0 "Le Duc d'Alençon : §Y$VAL$%§!"
 # Misc government reforms
 admiralty_reform:0 "Conseil des Amiraux"
 admiralty_reform_desc:0 "Notre nation vit et meurt de notre capacité à projeter notre puissance sur les mers. À cette fin, nous avons remis les rênes du gouvernement au Conseil des Amiraux, dont les membres sont expérimentés et patriotes au-delà de tout reproche.\n\nDésactive les élections."
 protectorate_parliament_reform:0 "Parlement du Protectorat"
 protectorate_parliament_reform_desc:0 "Sous la guidance bienveillante du Lord Protecteur, notre nation est administrée par un parlement croupion loyal au Commonwealth.\n\nDésactive les élections."
 protectorate_parliament_legacy:0 "Parlement du Protectorat"
 protectorate_parliament_legacy_desc:0 "Sous la guidance bienveillante du Lord Protecteur, notre nation est administrée par un parlement croupion loyal au Commonwealth.\n\nDésactive les élections."
