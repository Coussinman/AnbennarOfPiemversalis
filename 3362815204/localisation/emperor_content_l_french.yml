 flavor_kor.12.t:0 "La Détresse de la Paysannerie"
 flavor_kor.12.d:0 "Bien que la Corée ait connu une sorte d'âge d'or ces dernières années, cette prospérité n'a guère profité à la paysannerie, qui vit pour l'essentiel dans une misère abjecte. Les premiers signes de mécontentement susceptibles de menacer la stabilité du royaume se manifestent déjà. Des mesures devront être prises pour améliorer leur sort si nous voulons éviter des troubles majeurs."
 flavor_kor.12.A:0 "Maudits paysans..."
 flavor_kor.12.tt:0 "Accomplissez la mission « §YLa Détresse de la Paysannerie§! » avant les années 1470 pour éviter les troubles liés à l'agitation paysanne."

