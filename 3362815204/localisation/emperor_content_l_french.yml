 event.5017.2:0 "Un scandale a éclaté à la cour royale ! Il semble que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] ait été surpris dans une position compromettante avec l'épouse d'un noble éminent. Avec les rumeurs salaces sur [Root.Monarch.GetHerHis] supposées « aventures » qui se répandent presque plus vite que la pensée, il devient difficile de gouverner véritablement..."
 event.5017.3:0 "Un scandale a éclaté à la cour royale ! Il semble que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] ait été surpris dans une position compromettante avec un noble relativement insignifiant. Avec les rumeurs salaces sur [Root.Monarch.GetHerHis] supposées « aventures » qui se répandent presque plus vite que la pensée, il devient difficile de gouverner véritablement..."
 event.5017.4:0 "Un scandale a éclaté à la cour royale ! Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est adonné un peu trop facilement à la bouteille ces derniers temps, et on l'a vu festoyer jusqu'aux petites heures en maintes occasions. Il semble que l'alcool ait quelque peu délié [Root.Monarch.GetHerHis] langue, au point que [Root.Monarch.GetSheHe] a ouvertement divulgué certains détails intimes et embarrassants de [Root.Monarch.GetHerHis] mariage avec le [Root.Consort.GetTitle]..."
 event.5017.5:0 "Un scandale a éclaté à la cour royale ! Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est adonné un peu trop facilement à la bouteille ces derniers temps, et on l'a vu festoyer jusqu'aux petites heures en maintes occasions. Il semble que l'alcool ait quelque peu délié [Root.Monarch.GetHerHis] langue, au point que [Root.Monarch.GetSheHe] a ouvertement divulgué certains détails intimes et embarrassants de [Root.Monarch.GetHerHis] mariage avec [Root.Monarch.GetHerHis] consort..."
 event.5017.6:0 "Un scandale a éclaté à la cour royale ! Un visiteur récent à la cour a publiquement accusé le [Root.Monarch.GetTitle] [Root.Monarch.GetName] de toutes sortes d'outrages, accusations que [Root.Monarch.GetSheHe] nie en bloc. Bien que la noblesse soit généralement perplexe face à cette situation, les spéculations effrénées quant à la véracité de ces allégations rendent difficile toute action..."
 event.5017.A2:0 "La Maison [Root.Monarch.Dynasty.GetName] est ébranlée !"
 event.5017.B2:0 "Quelques présents aideront à faire taire les rumeurs."
 event.5073.2:0 "Nos autorités en [Root.GetName] ont réussi à ouvrir de nouvelles terres pour notre peuple en drainant un vaste marécage fétide qui rendait auparavant une grande superficie inhospitalière à la colonisation. Ces zones nouvellement défrichées conduiront assurément à un essor démographique dans la région."

 flavor_fra.9500.name:0 "L'Enfant Royal"
 flavor_fra.9500.desc:0 "[Root.Consort.GetName] a donné naissance à une petite fille. Il y a toutefois un problème : l'enfant a un teint plutôt sombre, en contraste frappant avec le [Root.Monarch.GetTitle] et son épouse [Root.consort_culture_var.GetCultureName]. À tel point, d'ailleurs, qu'un évêque s'est évanoui en voyant l'enfant et que le frère du [Root.Monarch.GetTitle] s'est effondré dans un fou rire incontrôlable. Les soupçons se sont rapidement tournés vers un certain nain sarhali faisant partie de la maisonnée de la [Root.Consort.GetTitle]..."
 flavor_fra.9500.A:0 "Ces rumeurs doivent cesser ! Envoyez l'enfant dans un couvent."
 flavor_fra.9500.B:0 "De l'infidélité ? Impensable ! C'est ma fille !"
 flavor_fra.9500.C:0 "Une [Root.Consort.GetTitle] doit être au-dessus de tout reproche ! Divorcez d'elle !"

 event.5051.desc:0 "Les artisans parmi les [Root.GetVaishyasOrBurghersName] protestent de plus en plus contre les impôts élevés, les politiques commerciales et douanières nuisibles, et ce qu'ils perçoivent comme de l'hostilité envers eux de la part du [Root.Monarch.GetTitle]. Ils menacent de perturber l'ordre, ce qui pourrait entraîner une chute brutale de notre production industrielle si nous n'acceptons pas d'améliorer leur situation. Déjà, ceux de [uppity_artisans_province.GetName] sont au bord de la rébellion ouverte."
 event.5053.desc:0 "Les classes marchandes sont de plus en plus mécontentes des taxes, des corporations, des droits portuaires, des réquisitions navales et des politiques commerciales et douanières. Ils menacent de déplacer leurs richesses ailleurs si nous ne parvenons pas à créer un environnement moins hostile au commerce en [Root.GetUsableName]."
 shortage_of_officers:0 "Pénurie d'Officiers"
 desc_shortage_of_officers:0 "Notre armée souffre d'un manque d'officiers bien formés capables d'exécuter les ordres et la volonté du royaume."
 opinion_heretical_philosopher:0 "Abrite un Philosophe Hérétique"
 event.736.desc:0 "L'un des hommes les plus grands et les plus riches de [Root.GetUsableName], [Root.trader_name.GetName], est décédé sans héritier. Négociant respecté qui a bâti sa fortune dans le commerce du [trade_province.GetFancyTradeGood_LOW], il était un mécène bien connu de la religion et des arts. Aujourd'hui, dans la mort, il a légué toutes ses richesses à l'État."
