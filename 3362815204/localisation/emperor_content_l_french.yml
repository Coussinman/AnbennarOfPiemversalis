 institution_events.80.t:0 "La Révolution Industrielle"
 institution_events.80.d:0 "Le rythme effréné du progrès technologique commence à exercer une influence profonde sur l'organisation même de la société. L'invention de la machine à vapeur, l'utilisation du coke dans la production de fer et les nouveaux équipements de fabrication mécanisés permettent des économies d'échelle sans précédent, entraînant une augmentation massive de la productivité des ouvriers. D'autres inventions contribuent grandement à faciliter le transport de volumes considérables de marchandises. Le commerce mondial étant plus interconnecté que jamais, les manufactures peuvent à la fois s'approvisionner en matières premières et vendre les produits manufacturés qui en résultent sur les marchés du monde entier, générant des richesses inimaginables pour leurs propriétaires.\n\nParallèlement, dans le domaine agricole, de nouvelles pratiques telles que la rotation des cultures et l'usage des enclosures ont pareillement accru la productivité, ce qui signifie que moins d'ouvriers sont nécessaires pour travailler la même superficie de terre, poussant nombre d'entre eux à abandonner leurs foyers pour s'installer dans les cités industrielles en pleine expansion. Un monde nouveau est en train de naître, un monde dans lequel les ambitieux et les fortunés domineront la société comme jamais auparavant."
 institution_events.80.a:0 "Cela change tout..."
 institution_events.80.a.tt:1 "§YAdopter§! l'institution de l'§YIndustrialisation§! sera vital pour les avancées futures en matière de §YTechnologie§!."
 institution_events.801.d:0 "Les marchands rapportent des afflux massifs de produits manufacturés étrangers bon marché sur nos marchés, ainsi que l'achat par ces mêmes marchands étrangers de quantités tout aussi considérables de matières premières chez nous. Bien que leur origine reste incertaine, ces développements ont déjà un impact profond sur l'organisation de notre société."
 birthplace_of_industrialization:0 "Manufactures de Production de Masse"
 desc_birthplace_of_industrialization:0 "Cette province fut le lieu où les nouvelles méthodes et technologies de la révolution industrielle furent expérimentées pour la première fois. Elle demeure à ce jour un centre industriel urbain florissant."

 institution_events.81.t:0 "Adoption de Nouvelles Méthodes de Production"
 institution_events.81.da:0 "Les maîtres de forge de [industrialisation_province.GetName] ont réussi à accroître considérablement leur production de fonte brute et de fer forgé en adoptant de nouvelles méthodes mises au point à l'étranger. Cela représente une aubaine considérable pour tous les fabricants ayant besoin de fer résistant, leur permettant d'augmenter leur production à moindre coût. Il a été suggéré que d'autres régions de notre pays pourraient bénéficier de l'adoption de ces méthodes. Toutefois, y parvenir représenterait un investissement conséquent..."
 institution_events.81.db:0 "Les fabricants de textiles de [industrialisation_province.GetName] ont réussi à accroître considérablement leur production en adoptant de nouvelles méthodes mises au point à l'étranger. De nouveaux équipements ont entraîné une augmentation massive de la productivité des ouvriers, révolutionnant la production textile dans la province et permettant aux propriétaires de manufactures d'amasser des richesses considérables. Il a été suggéré que d'autres régions de notre pays pourraient bénéficier de l'adoption de ces méthodes. Toutefois, y parvenir représenterait un investissement conséquent..."
 institution_events.81.a:0 "Cela change tout..."
 institution_events.81.b:0 "Grand bien leur fasse."
 institution_events.82.name:0 "Mutation de la Production Locale"
 institution_events.82.desc:0 "Nos voisins de [institution_country.GetUsableName] ont réussi à accroître considérablement leur production de biens manufacturés en adoptant de nouvelles méthodes et technologies, dont nos propres fabricants n'ont pas encore percé les secrets. Leurs produits moins chers inondent désormais nos marchés, rendant la vie plus difficile pour les producteurs locaux. D'un autre côté, l'appétit insatiable des industries [institution_country.GetAdjective] signifie que les matières premières produites en [Root.GetUsableName] sont désormais très demandées, avec pour résultat que la population abandonne de plus en plus les manufactures urbaines au profit des plantations rurales."
 institution_events.82.a:0 "Nous devons empêcher cela."
 institution_events.82.b:0 "Qu'il en soit ainsi."
 two_neighbor_dev_15_provinces:0 "Possède deux provinces voisines de 15 de développement"

