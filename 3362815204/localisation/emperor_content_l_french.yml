 incident_hungary_mission_emperor_alert:0 "Ayant unifié les Royaumes de Hongrie et de Bohême sous le [Hungary.Monarch.GetTitle] [Hungary.Monarch.GetName], les Hongrois ont adressé une pétition au [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] en [Emperor.Monarch.GetHerHis] qualité d'Empereur de l'Empire d'Anbennar pour être autorisés à rejoindre l'Empire. De plus, ils insistent sur le fait que, puisque la Bohême ne fait désormais plus qu'une partie de leurs domaines plus vastes, l'Électorat de Bohême devrait officiellement être transféré à la Dynastie [Hungary.Monarch.Dynasty.GetName] de Hongrie."
 incident_hungary_mission_member_alert:0 "Ayant unifié les Royaumes de Hongrie et de Bohême sous le [Hungary.Monarch.GetTitle] [Hungary.Monarch.GetName], les Hongrois ont adressé une pétition au [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] en [Emperor.Monarch.GetHerHis] qualité d'Empereur de l'Empire d'Anbennar pour être autorisés à rejoindre l'Empire. De plus, ils insistent sur le fait que, puisque la Bohême ne fait désormais plus qu'une partie de leurs domaines plus vastes, l'Électorat de Bohême devrait officiellement être transféré à la Dynastie [Hungary.Monarch.Dynasty.GetName] de Hongrie."
 incident_reformer_dissension_can_happen_tt:0 "§YPossédant la majorité des provinces de l'Empire, les Princes Ravéliens contestent ce résultat.§!"
 incident_reformer_dissension:0 "L'Épiphanie Ravélienne"
 incident_reformer_dissension_emperor_alert:0 "Le dernier grand Débat Ravélien étant achevé, l'Église Ravélienne s'est enfin imposée comme supérieure à la plupart des fois du monde. La leur est une foi pour tous, peut-être semblable au Jadd, mais animée par un mélange respectueux de raison et de spiritualité. Pendant longtemps, les Ravéliens de notre royaume ont observé les fidèles d'Adean et de Corin se quereller pour le Trône Régent au sujet de ce que les Ravéliens considèrent, dans l'ordre des choses, comme une affaire triviale. Ils se sont lassés de voir leur religion traitée comme une foi secondaire, mais désormais leurs enseignements universalistes se sont enfin enracinés comme le troisième pilier des fois du Panthéon Cannorien qui domine Anbennar depuis son existence.\n\nMenés par le [reformed_leader_country.Monarch.GetTitle] [reformed_leader_country.Monarch.GetName] de [reformed_leader_country.GetName], ils ont approché l'Empereur [Emperor.Monarch.GetName] pour exiger que la foi Ravélienne se voie accorder une place égale, sinon supérieure, à la foi existante au sein de l'Empire."
 incident_reformer_dissension_member_alert:0 "Le dernier grand Débat Ravélien étant achevé, l'Église Ravélienne s'est enfin imposée comme supérieure à la plupart des fois du monde. La leur est une foi pour tous, peut-être semblable au Jadd, mais animée par un mélange respectueux de raison et de spiritualité. Pendant longtemps, les Ravéliens de notre royaume ont observé les fidèles d'Adean et de Corin se quereller pour le Trône Régent au sujet de ce que les Ravéliens considèrent, dans l'ordre des choses, comme une affaire triviale. Ils se sont lassés de voir leur religion traitée comme une foi secondaire, mais désormais leurs enseignements universalistes se sont enfin enracinés comme le troisième pilier des fois du Panthéon Cannorien qui domine Anbennar depuis son existence.\n\nMenés par le [reformed_leader_country.Monarch.GetTitle] [reformed_leader_country.Monarch.GetName] de [reformed_leader_country.GetName], ils ont approché l'Empereur [Emperor.Monarch.GetName] pour exiger que la foi Ravélienne se voie accorder une place égale, sinon supérieure, à la foi existante au sein de l'Empire."
 reformer_dissension.1.name:0 "L'Épiphanie Ravélienne"
 reformer_dissension.1.desc:0 "Le dernier grand Débat Ravélien étant achevé, l'Église Ravélienne s'est enfin imposée comme supérieure à la plupart des fois du monde. La leur est une foi pour tous, peut-être semblable au Jadd, mais animée par un mélange respectueux de raison et de spiritualité. Pendant longtemps, les Ravéliens de notre royaume ont observé les fidèles d'Adean et de Corin se quereller pour le Trône Régent au sujet de ce que les Ravéliens considèrent, dans l'ordre des choses, comme une affaire triviale. Ils se sont lassés de voir leur religion traitée comme une foi secondaire, mais désormais leurs enseignements universalistes se sont enfin enracinés comme le troisième pilier des fois du Panthéon Cannorien qui domine Anbennar depuis son existence.\n\nMenés par le [reformed_leader_country.Monarch.GetTitle] [reformed_leader_country.Monarch.GetName] de [reformed_leader_country.GetName], ils ont approché l'Empereur [Emperor.Monarch.GetName] pour exiger que la foi Ravélienne se voie accorder une place égale, sinon supérieure, à la foi existante au sein de l'Empire."
 reformer_dissension.1.desc2:0 "Le dernier grand Débat Ravélien étant achevé, l'Église Ravélienne s'est enfin imposée comme supérieure à la plupart des fois du monde. La leur est une foi pour tous, peut-être semblable au Jadd, mais animée par un mélange respectueux de raison et de spiritualité. Pendant longtemps, les Ravéliens de notre royaume ont observé les fidèles d'Adean et de Corin se quereller pour le Trône Régent au sujet de ce que les Ravéliens considèrent, dans l'ordre des choses, comme une affaire triviale. Ils se sont lassés de voir leur religion traitée comme une foi secondaire, mais désormais leurs enseignements universalistes se sont enfin enracinés comme le troisième pilier des fois du Panthéon Cannorien qui domine Anbennar depuis son existence.\n\nÀ présent, avec l'empereur ravélien [Emperor.Monarch.GetName] sur le Trône de la Colombe, il semble inévitable que la foi Ravélienne devienne la nouvelle foi officielle de l'Empire."
 reformer_dissension.1.A:0 "La foi de l'Empire ne sera pas remise en question !"
 reformer_dissension.1.A.tt:0 "§YLes Princes Ravéliens seront outrés et pourraient choisir de quitter l'Empire.§!"
 reformer_dissension.1.B:0 "Accordez-leur des droits égaux."
 reformer_dissension.1.C:0 "Nous devons céder à toutes les exigences."
 reformer_dissension.1.C.tt:0 "\nUn Empereur réduit à §Y1§! province ou avec moins de §Y-50§! de score de guerre contre un ennemi §YRavélien§! choisira cette option."
 reformer_dissension.2.name:0 "[Emperor.GetName] Rejette les Exigences Ravéliennes !"
 reformer_dissension.2.desc:0 "L'Empereur [Emperor.Monarch.GetName] de [Emperor.GetName] a rejeté les exigences ravéliennes d'égalité au sein de l'Empire, proclamant que [Emperor.Religion.GetName] est la seule vraie foi, et que ceux qui suivent d'autres religions doivent se conformer ou en subir les conséquences. Nous ne pouvons que nous émerveiller de [Emperor.Monarch.GetHerHis] arrogance tandis que nous considérons notre réponse."
 reformer_dissension.2.A:0 "Notre avenir reste au sein de l'Empire."
 reformer_dissension.2.B:0 "Nous sommes mieux en dehors."
 hre_dominant_reformed:0 "Empire Ravélien"
 desc_hre_dominant_reformed:0 "La foi Ravélienne est la religion officielle de l'Empire d'Anbennar. Suivre cette foi confère à notre nation une certaine légitimité morale."
 opinion_annoyed_at_hre_protestant:0 "Application des Anciennes Fois aux Alliés Ravéliens"

