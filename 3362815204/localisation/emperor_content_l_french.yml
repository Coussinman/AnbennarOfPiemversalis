 flavor_hun.201.name:0 "La Mort de Ladislas le Posthume"
 flavor_hun.201.d.king_no_heir:0 "Ladislas le Posthume, notre roi bien-aimé, est mort soudainement dans des circonstances suspectes. Les allégations de malversation semblent d'autant plus probables qu'il était sur le point d'unir l'Autriche et la Hongrie sous son règne, soumettant la Hongrie à la domination étrangère. Déjà la noblesse s'active pour le remplacer par leur favori, Mátyás Hunyadi, le fils du grand Voïvode János Hunyadi, brisant ainsi la lignée de succession habsbourgeoise au trône hongrois. Cependant, d'autres favorisent le maintien de nos bonnes relations avec les Habsbourg et soutiennent que le [HAB.Monarch.GetTitle] [HAB.Monarch.GetName] d'Autriche devrait être le successeur légitime de Ladislas."
 flavor_hun.201.d.king:0 "Ladislas le Posthume, notre roi bien-aimé, est mort soudainement dans des circonstances suspectes. Les allégations de malversation semblent d'autant plus probables qu'il était sur le point d'unir l'Autriche et la Hongrie sous son règne, soumettant la Hongrie à la domination étrangère. Maintenant, cette lignée de succession est brisée, et [Root.Heir.GetTitle] [Root.Heir.GetName] lui succédera comme dirigeant de la Hongrie."
 flavor_hun.201.d.heir:0 "Ladislas le Posthume, notre héritier bien-aimé, est mort soudainement dans des circonstances suspectes. Les allégations de malversation semblent d'autant plus probables que, s'il avait atteint la majorité, il aurait été sur le point d'unir l'Autriche et la Hongrie sous son règne, soumettant la Hongrie à la domination étrangère. Déjà la noblesse s'active pour le remplacer par leur favori, Mátyás Hunyadi, le fils du grand Voïvode János Hunyadi, brisant ainsi la lignée de succession habsbourgeoise au trône hongrois."
 flavor_hun.201.a:0 "Mátyás sera notre nouvel héritier."
 flavor_hun.201.b:0 "Le vieux Roi est mort, vive le Roi !"
 flavor_hun.201.c:0 "Un Roi germanique serait préférable."
 flavor_hun.201.d:0 "Élire Mátyás comme Roi."

