 flavor_pap.21.t:0 "Fin du Débat ravélien"
 flavor_pap.21.d:0 "Le Débat ravélien a été convoqué dans l'espoir de réconcilier les diverses églises schismatiques qui ont émergé dans le sillage de la Réforme protestante, mais après une série apparemment interminable de débats et de négociations, les résultats ont été peu concluants. La décision a finalement été prise de dissoudre le Concile. Que Dieu ait pitié des âmes de ceux qui n'ont pas été ramenés à l'Église."
 flavor_pap.21.d2:0 "Le Débat ravélien a été convoqué dans l'espoir de réconcilier les diverses églises schismatiques qui ont émergé dans le sillage de la Réforme protestante, mais maintenant qu'un conflit sanglant entre protestants et ravéliens a éclaté à travers Cannor, les travaux ont été interrompus de manière peu concluante. Le Concile a été formellement dissous sans qu'aucun des participants ne soit pleinement satisfait. Que Dieu ait pitié des âmes de ceux qui n'ont pas été ramenés à l'Église."
 flavor_pap.21.a:0 "La réconciliation était un rêve illusoire."
