 french_wars_of_religion.1.desc.Ravelian:0 "Alors que la foi [religion_province.Religion.GetName] se répand comme une traînée de poudre parmi la population et que ses dirigeants se montrent de plus en plus audacieux, de nombreux Ravéliens commencent à s'inquiéter de la situation en [Root.GetName]. Les tensions croissantes entre les deux groupes ont atteint leur paroxysme avec la formation de la Ligue [religion_province.Religion.GetName], une organisation paramilitaire qui cherche à installer un [Root.Monarch.GetTitle] [religion_province.Religion.GetName] sur le trône de [Root.GetName]. À défaut, ils exigent des droits et libertés significatifs pour garantir leur avenir. De leur côté, les dirigeants de la communauté ravélienne mettent en garde contre toute concession, laissant entendre que la violence suivrait si le [Root.Monarch.GetTitle] semblait tourner le dos aux enseignements du Grand Recteur. Quoi qu'il en soit, le tumulte nous attend.\n\nQuelle devrait être notre ligne de conduite ?"
 french_wars_of_religion.1.desc.not_Ravelian:0 "La colère gronde parmi les Ravéliens de France face à la conversion du [Root.Monarch.GetTitle] à la foi [Root.Religion.GetName]. Ressentant les changements radicaux dans notre nation et craignant pour leur avenir, ils ont formé une organisation paramilitaire qu'ils appellent la Ligue Ravélienne afin d'exiger que le [Root.Monarch.GetTitle] se soumette à nouveau au Grand Recteur, ou à défaut, qu'on leur accorde des droits et libertés significatifs pour garantir leur avenir. De leur côté, les dirigeants de la communauté [Root.Religion.GetName] mettent en garde contre toute concession, laissant entendre que la violence suivrait si le [Root.Monarch.GetTitle] semblait favoriser les Ravéliens. Quoi qu'il en soit, le tumulte nous attend.\n\nQuelle devrait être notre ligne de conduite ?"
 french_reformed:0 "Réformateurs Français"
 desc_french_reformed:0 "Dans les Guerres de Religion, nous avons choisi de soutenir ceux qui suivent la foi Réformée."
 bought_indulgence:0 "Indulgence Achetée"
 desc_bought_indulgence:0 "Nous avons acheté une indulgence auprès du Grand Recteur."

 dodo.1.name:0 "Volaille Sauvage en [Root.GetName]"
 dodo.1.desc:0 "Nos colons en [Root.GetName] rapportent que l'île abrite un grand oiseau incapable de voler, plutôt laid et à la démarche disgracieuse. Apparemment, cet oiseau est extrêmement facile à chasser, n'ayant jamais eu à faire face à de grands prédateurs auparavant, et sa chair procure une saveur agréable en bouche. Déjà, ses effectifs commencent à diminuer. Notre naturaliste [Root.Owner.Adm_Advisor.GetName] a manifesté un intérêt personnel pour ces rapports et propose une expédition scientifique pour capturer des spécimens vivants de cette espèce et les ramener à [Root.Owner.Capital.GetCapitalName] pour étude, avant qu'ils ne succombent à l'extinction, destin pérenne des espèces si manifestement inaptes à la coexistence avec les humains."
 dodo.1.A:0 "Envoyez l'expédition."
 dodo.1.A.tt:0 "Nous tenterons de capturer un spécimen vivant de cet oiseau."
 dodo.1.B:0 "Cette volaille sauvage fera bonne nourriture pour nos colons."
 edible_dodos:0 "Dodos Comestibles"
 desc_edible_dodos:0 "Cette île abrite une grande espèce d'oiseau incapable de voler, facile à chasser et dont la chair procure une saveur agréable."
 dodo.2.name:0 "Le Dodo"
 dodo.2.desc:0 "L'expédition vers [From.GetName] a réussi à capturer plusieurs spécimens vivants de l'oiseau, qui a été baptisé « dodo ». Plus gros qu'un cygne et plutôt corpulent, leur énorme tête n'est couverte de peau qu'à moitié, comme revêtue d'un capuchon. Ils possèdent un grand bec recourbé vers le bas et des yeux petits comme des diamants. L'impression générale est celle d'une apparence quelque peu mélancolique, comme s'ils déploraient leur incapacité à voler, leurs petites ailes impuissantes servant simplement à prouver qu'il s'agit bien d'oiseaux. Malgré cela, ils possèdent un appétit vorace, ce qui n'est guère surprenant compte tenu de leur démarche.\n\nAprès avoir étudié l'oiseau avec vigueur, [Root.Owner.Adm_Advisor.GetName] a organisé son exposition publique à [Root.Owner.Capital.GetCapitalName]."
 dodo.2.A:0 "Une plume à notre chapeau."
 dodo.3.name:0 "Mort comme un Dodo"
 dodo.3.desc:0 "L'expédition vers [From.GetName] n'a trouvé aucune trace de l'oiseau. S'il a jamais existé, ses effectifs étaient réduits et n'ont pas survécu aux prédations des chasseurs humains. Néanmoins, nos scientifiques ont pu étudier en détail la faune de l'île, découvrant plusieurs nouvelles espèces et offrant aux colons de précieux conseils pour s'adapter à leur nouveau foyer."
 dodo.3.A:0 "Une triste histoire."

