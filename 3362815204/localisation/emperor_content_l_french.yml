 #Court Flavour Events
 new_court_flavour_events.1.name:0 "Conseiller Intermédiaire"
 new_court_flavour_events.1.desc:0 "[Root.GetEventAdvisorName] a impressionné beaucoup dans le pays par [Root.GetEventAdvisorHerHis] proactivité et ses compétences de leadership capables, ainsi que par [Root.GetEventAdvisorHerHis] efforts pour s'intégrer à la cour [Root.GetAdjective]. Cependant, il semblerait qu'il n'ait pas coupé tous les liens avec [Root.GetEventAdvisorHerHis] compatriotes de [advisor_liaisons_target_country.GetUsableName]. [Root.GetEventAdvisorSheHeCap] a poussé pour de meilleures relations avec [Root.GetEventAdvisorHerHis] patrie, [advisor_liaisons_target_country.GetUsableName], et a offert de mettre à profit [Root.GetEventAdvisorHerHis] contacts à la cour [advisor_liaisons_target_country.GetAdjective] pour inciter le [advisor_liaisons_target_country.Monarch.GetTitle] à adopter une position plus amicale envers nous."
 new_court_flavour_events.1.A:0 "Faisons-le."
 new_court_flavour_events.1.B:0 "Nous n'avons pas besoin de meilleures relations avec eux."
 new_court_flavour_events.2.name:0 "Rapprochement avec [From.GetUsableName] ?"
 new_court_flavour_events.2.desc:0 "[From.GetEventAdvisorName], un [From.GetEventAdvisorTitle] [Root.Culture.GetName] qui est employé à la cour [From.GetAdjective], a approché [From.GetEventAdvisorHerHis] ancien associé [Root.Dip_Advisor.GetName], notre [Root.Dip_Advisor.GetTitle], avec un plan pour favoriser de meilleures relations entre [From.GetUsableName] et [Root.GetUsableName]. [Root.Dip_Advisor.GetName] a approché le [Root.Monarch.GetTitle] [Root.Monarch.GetName] avec le message [From.GetAdjective], qui parle de leur désir d'amitié entre nos peuples."
 new_court_flavour_events.2.A:0 "De meilleures relations pourraient en effet nous être bénéfiques."
 new_court_flavour_events.2.B:0 "De meilleures relations ne sont pas dans notre intérêt."
 new_court_flavour_events.2.C:0 "L'amitié ? Hors de ma vue !"
 new_court_flavour_events.3.name:0 "Rapprochement Réussi"
 new_court_flavour_events.3.desc:0 "Les contacts de [Root.GetEventAdvisorName] à [From.GetUsableName] ont présenté notre cas au [From.Monarch.GetTitle] [From.Monarch.GetName] et ont reçu une réponse favorable. Le [From.Monarch.GetTitle] dit qu'il se réjouit d'une nouvelle ère d'amitié entre nos pays."
 new_court_flavour_events.3.desc2:0 "[Root.GetEventAdvisorName] a tenu parole : [Root.GetEventAdvisorHerHisCap] contacts à [From.GetUsableName] ont présenté notre cas au [From.Monarch.GetTitle] [From.Monarch.GetName] et ont reçu une réponse favorable. [From.Monarch.GetSheHeCap] dit qu'il se réjouit d'une nouvelle ère d'amitié entre nos pays."
 new_court_flavour_events.4.name:0 "Rapprochement Infructueux"
 new_court_flavour_events.4.desc:0 "Les contacts de [Root.GetEventAdvisorName] ne semblent pas avoir pu gagner beaucoup de terrain à la cour [From.GetAdjective]. Le [From.Monarch.GetTitle] [From.Monarch.GetName] les a informés que [From.GetUsableName] n'est pas intéressé par de meilleures relations avec [Root.GetUsableName]."
 new_court_flavour_events.4.desc2:0 "[Root.GetEventAdvisorName] ne semble pas avoir trahi notre confiance, mais [Root.GetEventAdvisorSheHe] n'a pas obtenu le résultat qu'il espérait. [Root.GetEventAdvisorHerHisCap] contacts ne semblent pas avoir pu gagner beaucoup de terrain à la cour [From.GetAdjective]. Le [From.Monarch.GetTitle] [From.Monarch.GetName] les a informés que [From.GetUsableName] n'est pas intéressé par de meilleures relations avec [Root.GetUsableName]."
 new_court_flavour_events.5.name:0 "Rapprochement Violemment Repoussé"
 new_court_flavour_events.5.desc:0 "Les contacts de [Root.GetEventAdvisorName] n'ont pas pu gagner de terrain à la cour [From.GetAdjective]. En fait, la réponse qu'ils ont reçue était ouvertement hostile. Non seulement on leur a dit sans ambiguïté que [From.GetUsableName] n'est pas intéressé par de meilleures relations avec [Root.GetUsableName], mais [Root.GetEventAdvisorName] a été informé qu'il n'est désormais plus le bienvenu à [From.GetUsableName]. Dans le climat anti-[Root.GetAdjective], le [From.Monarch.GetTitle] [From.Monarch.GetName] est même allé jusqu'à bannir plusieurs des associés de notre conseiller de [From.Monarch.GetHerHis] cour."
 new_court_flavour_events.5.option:0 "Qu'il en soit ainsi."
 new_court_flavour_events.5.desc2:0 "[Root.GetEventAdvisorName] ne semble pas avoir trahi notre confiance, mais [Root.GetEventAdvisorSheHe] n'a pas obtenu le résultat qu'il espérait. [Root.GetEventAdvisorHerHisCap] contacts n'ont pas pu gagner de terrain à la cour [From.GetAdjective]. En fait, la réponse qu'ils ont reçue était ouvertement hostile. Non seulement on leur a dit sans ambiguïté que [From.GetUsableName] n'est pas intéressé par de meilleures relations avec [Root.GetUsableName], mais [Root.GetEventAdvisorName] a été informé qu'il n'est désormais plus le bienvenu à [From.GetUsableName]. Dans le climat anti-[Root.GetAdjective], le [From.Monarch.GetTitle] [From.Monarch.GetName] est même allé jusqu'à bannir plusieurs des associés de notre conseiller de [From.Monarch.GetHerHis] cour."
 opinion_court_events_accept:0 "Rapprochement"
 opinion_court_events_rebuke:0 "Rapprochement Repoussé"
 opinion_court_events_rebuke_1:0 "Rapprochement Repoussé"
 opinion_court_events_grateful:0 "A renvoyé un Traître"
 opinion_court_events_annoyed:0 "A accueilli un Traître"
 new_court_flavour_events.10.name:0 "Allégations de Déloyauté"
 new_court_flavour_events.10.desc.adm:0 "Tout le monde n'est pas satisfait du projet de confier à [Root.GetEventAdvisorName] la recherche de meilleures relations avec [advisor_liaisons_target_country.GetUsableName]. Alors que la dissidence monte à la cour [Root.GetAdjective], [Root.Adm_Advisor.GetName], qui entretenait auparavant une rivalité amicale avec lui pour l'attention du [Root.Monarch.GetTitle] [Root.Monarch.GetName], s'est présenté avec des allégations de déloyauté. [Root.Adm_Advisor.GetSheHeCap] prétend avoir enquêté sur les activités de [Root.GetEventAdvisorName] et découvert qu'elles ne sont guère plus que lui transmettant des secrets d'État à [advisor_liaisons_target_country.GetUsableName] sous le couvert de la recherche d'un rapprochement.\n\nPour [Root.GetEventAdvisorHerHis] part, [Root.GetEventAdvisorName] proteste que les preuves apportées contre lui sont une fabrication inspirée par la jalousie de [Root.Adm_Advisor.GetName] face à [Root.GetEventAdvisorHerHis] succès. [Root.GetEventAdvisorSheHeCap] jure [Root.GetEventAdvisorSheHe] être loyal et qu'il livrera des résultats positifs si [Root.GetEventAdvisorSheHe] reçoit notre entière confiance."
 new_court_flavour_events.10.desc.dip:0 "Tout le monde n'est pas satisfait du projet de confier à [Root.GetEventAdvisorName] la recherche de meilleures relations avec [advisor_liaisons_target_country.GetUsableName]. Alors que la dissidence monte à la cour [Root.GetAdjective], [Root.Dip_Advisor.GetName], qui entretenait auparavant une rivalité amicale avec lui pour l'attention du [Root.Monarch.GetTitle] [Root.Monarch.GetName], s'est présenté avec des allégations de déloyauté. [Root.Dip_Advisor.GetSheHeCap] prétend avoir enquêté sur les activités de [Root.GetEventAdvisorName] et découvert qu'elles ne sont guère plus que lui transmettant des secrets d'État à [advisor_liaisons_target_country.GetUsableName] sous le couvert de la recherche d'un rapprochement.\n\nPour [Root.GetEventAdvisorHerHis] part, [Root.GetEventAdvisorName] proteste que les preuves apportées contre lui sont une fabrication inspirée par la jalousie de [Root.Dip_Advisor.GetName] face à [Root.GetEventAdvisorHerHis] succès. [Root.GetEventAdvisorSheHeCap] jure [Root.GetEventAdvisorSheHe] être loyal et qu'il livrera des résultats positifs si [Root.GetEventAdvisorSheHe] reçoit notre entière confiance."
 new_court_flavour_events.10.desc.mil:0 "Tout le monde n'est pas satisfait du projet de confier à [Root.GetEventAdvisorName] la recherche de meilleures relations avec [advisor_liaisons_target_country.GetUsableName]. Alors que la dissidence monte à la cour [Root.GetAdjective], [Root.Mil_Advisor.GetName], qui entretenait auparavant une rivalité amicale avec lui pour l'attention du [Root.Monarch.GetTitle] [Root.Monarch.GetName], s'est présenté avec des allégations de déloyauté. [Root.Mil_Advisor.GetSheHeCap] prétend avoir enquêté sur les activités de [Root.GetEventAdvisorName] et découvert qu'elles ne sont guère plus que lui transmettant des secrets d'État à [advisor_liaisons_target_country.GetUsableName] sous le couvert de la recherche d'un rapprochement.\n\nPour [Root.GetEventAdvisorHerHis] part, [Root.GetEventAdvisorName] proteste que les preuves apportées contre lui sont une fabrication inspirée par la jalousie de [Root.Mil_Advisor.GetName] face à [Root.GetEventAdvisorHerHis] succès. [Root.GetEventAdvisorSheHeCap] jure [Root.GetEventAdvisorSheHe] être loyal et qu'il livrera des résultats positifs si [Root.GetEventAdvisorSheHe] reçoit notre entière confiance."
 new_court_flavour_events.10.A:0 "[Root.GetEventAdvisorSheHeCap] a notre entière confiance."
 new_court_flavour_events.10.A.tt1:0 "[Root.GetEventAdvisorName] reste loyal."
 new_court_flavour_events.10.A.tt2:0 "[Root.GetEventAdvisorName] trahit notre confiance."
 new_court_flavour_events.10.B:0 "Mieux vaut ne pas prendre de risques. Arrêtez-les !"
 new_court_flavour_events.10.B.tt:0 "§Y[advisor_liaisons_target_country.GetUsableNameCap]§! pourrait protester contre cette décision."
 new_court_flavour_events.12.name:0 "Transfuge [From.GetAdjective] !"
 new_court_flavour_events.12.desc:0 "Un individu s'est présenté devant le [Root.Monarch.GetTitle], insistant pour être entendu. Selon lui, il était au service du [From.GetRulerAdjAndTitle] et a appris des informations d'un intérêt vital pour nous comme pour [From.GetUsableName]. Se proclamant patriote [Root.GetAdjective], il nous offre maintenant ses services ainsi que des informations, qui selon lui ont été expertement obtenues des cercles les plus intimes de la cour [From.GetAdjective] et nous ont été apportées au péril considérable de sa vie."
 new_court_flavour_events.12.A:0 "Ses services seront mémorisés, et récompensés."
 new_court_flavour_events_add_traitor_tooltip_adm:0 "§Y[Root.advisor_traitor.GetName]§!, un conseiller administratif de niveau [Root.event_advisor_skill_level.GetValue], est ajouté au vivier de conseillers."
 new_court_flavour_events_add_traitor_tooltip_dip:0 "§Y[Root.advisor_traitor.GetName]§!, un conseiller diplomatique de niveau [Root.event_advisor_skill_level.GetValue], est ajouté au vivier de conseillers."
 new_court_flavour_events_add_traitor_tooltip_mil:0 "§Y[Root.advisor_traitor.GetName]§!, un conseiller militaire de niveau [Root.event_advisor_skill_level.GetValue], est ajouté au vivier de conseillers."
 new_court_flavour_events.12.B:0 "Nous n'avons pas besoin de traîtres."
 new_court_flavour_events.11.name:0 "Trahison"
 new_court_flavour_events.11.desc.adm:0 "[Root.GetEventAdvisorName] nous a trahis ! [Root.Adm_Advisor.GetName] a découvert des preuves irréfutables qu'il a révélé divers secrets d'État à [advisor_liaisons_target_country.GetUsableName] tout en prétendant représenter nos intérêts. Malheureusement, il a fui de l'autre côté de la frontière avant que nous puissions l'arrêter."
 new_court_flavour_events.11.desc.dip:0 "[Root.GetEventAdvisorName] nous a trahis ! [Root.Dip_Advisor.GetName] a découvert des preuves irréfutables qu'il a révélé divers secrets d'État à [advisor_liaisons_target_country.GetUsableName] tout en prétendant représenter nos intérêts. Malheureusement, il a fui de l'autre côté de la frontière avant que nous puissions l'arrêter."
 new_court_flavour_events.11.desc.mil:0 "[Root.GetEventAdvisorName] nous a trahis ! [Root.Mil_Advisor.GetName] a découvert des preuves irréfutables qu'il a révélé divers secrets d'État à [advisor_liaisons_target_country.GetUsableName] tout en prétendant représenter nos intérêts. Malheureusement, il a fui de l'autre côté de la frontière avant que nous puissions l'arrêter."
 new_court_flavour_events.13.name:0 "Pris sur le Fait"
 new_court_flavour_events.13.desc:0 "L'ambassadeur [From.GetAdjective] rapporte que les autorités [From.GetAdjective] ont arrêté le malfaiteur, [Root.GetEventAdvisorName], alors qu'il cherchait à trahir notre confiance et à faire défection vers [From.GetUsableName]. Il nous assure que nos secrets sont en sécurité et que notre [Root.GetEventAdvisorTitle] agissait sans la connaissance ou l'approbation [From.GetAdjective]."
 new_court_flavour_events.13.option:0 "Notre gratitude sera éternelle."
 new_court_flavour_events.15.name:0 "Compatriote Emprisonné à [From.GetUsableName]"
 new_court_flavour_events.15.desc:0 "Il nous a été porté à notre attention que [Root.advisor_traitor.GetName], l'un de nos compatriotes qui était employé à la cour [From.GetAdjective], est détenu pour avoir prétendument planifié de nous divulguer des secrets d'État. Bien que ces allégations semblent vraies, [Root.Dip_Advisor.GetName] a pris fait et cause pour lui et pétitionne le [Root.Monarch.GetTitle] : « Pourquoi un sujet loyal devrait-il être prisonnier dans des salles étrangères ? » demande-t-il. « Nous devons protester vigoureusement contre cette action et exiger sa restitution. »"
 new_court_flavour_events.15.A:0 "Nous ne pouvons pas l'abandonner."
 new_court_flavour_events.15.B:0 "Nous n'interviendrons pas."
 new_court_flavour_events.16.name:0 "Exigences [From.GetAdjective]"
 new_court_flavour_events.16.desc:0 "Le [From.GetRulerAdjAndTitle] nous a envoyé une missive courroucée exigeant une explication pour avoir arrêté le traître : « Nous avons appris que vous détenez l'un de nos compatriotes prisonnier pour avoir prétendument trahi vos intérêts à notre demande. Nous pouvons vous assurer que ce n'est pas le cas. Nous exigeons que vous le libériez immédiatement ! »"
 new_court_flavour_events.16.A:0 "Très bien. Qu'il en soit ainsi."
 new_court_flavour_events.16.B:0 "Nous n'agirons pas en défiance de la justice."
 new_court_flavour_events.17.name:0 "La Réponse [From.GetAdjective]"
 new_court_flavour_events.17.desc:0 "Le [From.GetRulerAdjAndTitle] a répondu à nos exigences : « En signe de bonne volonté, malgré des preuves considérables incriminant sa personne, nous avons libéré [Root.advisor_traitor.GetName]. Nous espérons que vous nous regarderez favorablement pour cet acte. »"
 new_court_flavour_events.17.option:0 "Ce n'était que justice."
 new_court_flavour_events.18.name:0 "La Réponse [From.GetAdjective]"
 new_court_flavour_events.18.desc:0 "Le [From.GetRulerAdjAndTitle] a répondu à nos exigences : « Nous ne relâchons pas ceux qui sont coupables de trahison. [Root.advisor_traitor.GetName] restera en détention. »"
 new_court_flavour_events.18.option:0 "Vous le regretterez."
 opinion_court_events_interfered:0 "S'est ingéré dans Nos Affaires"
 opinion_court_events_released_compatriot:0 "A libéré un Compatriote"
 opinion_court_events_held_compatriot:0 "A retenu un Compatriote Prisonnier"
 UNFORTUNATE:0 "Malheureux."
 new_court_flavour_events.20.name:0 "Pratiques de Dépenses Douteuses"
 new_court_flavour_events.20.desc:1 "Les habitudes de dépenses de [Root.GetEventAdvisorName] ont soulevé quelques sourcils. [Root.GetEventAdvisorSheHeCap] a dépensé de grandes sommes d'argent, bien plus importantes que ce à quoi quelqu'un dans [Root.GetEventAdvisorHerHis] position devrait avoir accès, distribuant des cadeaux aux [Root.GetEventAdvisorEstate] locaux de [Root.GetEventAdvisorHerHis] région d'origine et améliorant l'infrastructure locale. Une enquête a révélé les faits : plutôt que de servir le [Root.Monarch.GetTitle] au mieux de [Root.GetEventAdvisorHerHis] capacités, [Root.GetEventAdvisorName] a détourné des fonds publics vers [corrupt_advisor_province.GetName] afin d'accroître [Root.GetEventAdvisorHerHis] popularité là-bas. Bien que cela ait été bénéfique pour l'économie locale, de telles pratiques pourraient s'avérer dommageables pour l'État dans son ensemble si elles étaient tolérées."
 new_court_flavour_events.20.A:0 "Fermer les yeux."
 new_court_flavour_events.20.B:0 "Arrêtez-le !"
 new_court_flavour_events_subsidies:0 "Investissement Local"
 desc_new_court_flavour_events_subsidies:0 "Un dignitaire local a investi dans l'infrastructure de cette province, et dans sa propre popularité parmi les habitants."
 new_court_flavour_events.21.name:0 "Un Départ de Conscience"
 new_court_flavour_events.21.desc:0 "Une note de [Root.GetEventAdvisorName], notre [Root.GetEventAdvisorTitle], a été trouvée parmi les papiers du [Root.Monarch.GetTitle].\n\n« Mon [Root.Monarch.GetTitle],\n\nJe vous ai toujours servi vous et [Root.GetUsableName] au mieux de mes capacités. Cependant, c'est avec le cœur lourd que je dois annoncer ma démission en tant que votre [Root.GetEventAdvisorTitle]. La déclaration de guerre contre [religious_enemy_country.GetUsableName] a franchi une ligne : je ne peux plus rester silencieux face à vos crimes contre mes frères religieux.\n\nBien à vous,\n[Root.GetEventAdvisorName] »\n\nLes tentatives pour le localiser se sont jusqu'ici révélées infructueuses. Il semble qu'il ait fui le pays."
 new_court_flavour_events.22.name:0 "Sagesse Étrangère"
 new_court_flavour_events.22.desc:0 "Bien que la noblesse [Root.GetAdjective] soit quelque peu perturbée par l'idée qu'un étranger travaille pour leur [Root.Monarch.GetTitle], notre [Root.GetEventAdvisorTitle] [Root.advisor_culture.GetCultureName], [Root.GetEventAdvisorName], a été largement loué pour avoir apporté des idées et des pratiques nouvelles à la cour. Il semble que nous puissions encore apprendre une chose ou deux du savoir étranger !"
 new_court_flavour_events.25.name:0 "Les Liens du Sang sont-ils plus Forts ?"
 new_court_flavour_events.25.desc:0 "La guerre actuelle avec [advisor_enemy_country.GetUsableName] a déclenché une série d'intrigues à la cour [Root.GetAdjective]. D'un côté, [Root.GetEventAdvisorName], notre [Root.GetEventAdvisorTitle] [Root.advisor_culture.GetCultureName], a offert de puiser des informations de [Root.GetEventAdvisorHerHis] réseau de contacts à [advisor_enemy_country.GetUsableName], un réseau considérable, affirme-t-il, incluant plusieurs contacts proches du [advisor_enemy_country.Monarch.GetTitle], pour aider l'effort de guerre.\n\nD'un autre côté, [Root.GetEventAdvisorHerHis] opposants politiques ont soulevé des doutes sur [Root.GetEventAdvisorHerHis] loyauté. Ils arguent que, malgré [Root.GetEventAdvisorHerHis] service exemplaire jusqu'ici, nous ne pouvons tout simplement pas faire confiance à un [Root.advisor_culture.GetCultureName] pour participer à des délibérations d'importance nationale en ce moment. Ils exigent donc qu'il soit banni de la cour."
 new_court_flavour_events.25.A:0 "Ils ont raison : bannissez-le !"
 new_court_flavour_events.25.B:0 "Gardez-le : ses informations seront utiles."
 tooltip_in_30_days:0 "Dans 30 jours :\n"
 new_court_flavour_events.26.name:0 "Rapports sur les Plans de Guerre [advisor_enemy_country.GetAdjective]"
 new_court_flavour_events.26.desc:0 "Malgré les questions entourant [Root.GetEventAdvisorHerHis] loyauté, [Root.GetEventAdvisorName] semble avoir tenu parole. Les premiers rapports de [Root.GetEventAdvisorHerHis] réseau de contacts sont arrivés, nous fournissant des informations considérables concernant les plans de guerre [advisor_enemy_country.GetAdjective]."
 new_court_flavour_events.27.name:0 "Transfuge [From.GetAdjective] !"
 new_court_flavour_events.27.desc:0 "Un individu s'est présenté devant le [Root.Monarch.GetTitle], insistant pour être entendu. Il prétend avoir été au service du [From.GetRulerAdjAndTitle] et avoir appris les détails des plans de guerre [From.GetAdjective] contre [Root.GetUsableName], sa patrie. Se proclamant patriote [Root.GetAdjective], il nous offre maintenant ses services ainsi que ces informations, qui selon lui ont été expertement obtenues des cercles les plus intimes de la cour [From.GetAdjective] et nous ont été apportées au péril considérable de sa vie."
 new_court_flavour_events.27.option:0 "Ses services seront mémorisés, et récompensés."
 new_court_flavour_events.28.name:0 "Trahison"
 new_court_flavour_events.28.desc:0 "[Root.GetEventAdvisorName] nous a trahis ! Malgré les yeux vigilants de [Root.GetEventAdvisorHerHis] ennemis, [Root.GetEventAdvisorSheHe] a réussi à passer la frontière avec des copies de documents importants concernant nos plans de guerre !"
 new_court_flavour_events.30.name:0 "Un Changement de Politique ?"
 new_court_flavour_events.30.desc:0 "[Root.GetEventAdvisorName] s'est fait de nombreux amis à la cour [Root.GetAdjective] grâce à [Root.GetEventAdvisorHerHis] service dévoué en tant que [Root.GetEventAdvisorTitle] du [Root.Monarch.GetTitle]. Cependant, il semble que l'inverse soit également vrai parmi [Root.GetEventAdvisorHerHis] compatriotes au service de l'[advisor_antiliaisons_target_country.GetStateForm] [advisor_antiliaisons_target_country.GetAdjective] : envieux de [Root.GetEventAdvisorHerHis] position, ils lui reprochent d'avoir accepté un emploi parmi les ennemis de [Root.GetEventAdvisorHerHis] peuple et ont commencé à répandre des rumeurs mettant en doute [Root.GetEventAdvisorHerHis] fiabilité.\n\nInquiet de [Root.GetEventAdvisorHerHis] position à la cour [Root.GetAdjective], [Root.GetEventAdvisorName] est devenu un fervent opposant au [advisor_antiliaisons_target_country.GetRulerAdjAndTitle]. [Root.GetEventAdvisorSheHeCap] a fait cause commune avec plusieurs [Root.GetNoblemenPoliticians] partageant les mêmes idées pour appeler à une position plus dure contre [advisor_antiliaisons_target_country.GetUsableName]."
 new_court_flavour_events.30.A:0 "[Root.GetEventAdvisorSheHeCap] a raison : un changement de politique s'impose."
 new_court_flavour_events.30.B:0 "De plus mauvaises relations ne seraient pas dans notre intérêt."
 new_court_flavour_events.31.name:0 "Conseiller Intrigant"
 new_court_flavour_events.31.desc:0 "Nos yeux et oreilles à [From.GetUsableName] rapportent que le [From.GetRulerAdjAndTitle] a récemment pris une position plus dure envers [Root.GetUsableName]. Il semble que ce changement de politique ait été largement provoqué par [From.GetEventAdvisorName], un [From.GetEventAdvisorTitle] [Root.Culture.GetName] qui, inquiet de [From.GetEventAdvisorHerHis] position à la cour [From.GetAdjective], a formulé diverses accusations contre nous et agité pour une réponse ferme à nos prétendues agressions."
 new_court_flavour_events.31.option:0 "Mais quel petit... !"
 new_court_flavour_events.32.name:0 "Conseiller Intrigant"
 new_court_flavour_events.32.desc:0 "Malgré notre manque de soutien pour [Root.GetEventAdvisorHerHis] projet de semer la discorde entre nous et [advisor_antiliaisons_target_country.GetUsableName], [Root.GetEventAdvisorName] n'a pas cessé [Root.GetEventAdvisorHerHis] efforts. Il semble qu'il ait attiré un large public de [Root.GetNoblemenPoliticians] influents qui soutiennent [Root.GetEventAdvisorHerHis] position et appellent urgemment à un changement de politique. Ils répandent leur message, qui semble résonner fortement parmi le peuple, par tous les moyens en leur pouvoir. Aller contre leur volonté pourrait s'avérer risqué."
 new_court_flavour_events.32.A:0 "Peut-être [Root.GetEventAdvisorSheHe] a-t-il raison après tout."
 new_court_flavour_events.32.B:0 "Non c'est non."
 advisor_antiliaisons:0 "Position Dure"
 advisor_spurious_accusations:0 "Accusations Fallacieuses"
 new_court_flavour_events.35.name:0 "Exilé [exile_country.GetAdjective]"
 new_court_flavour_events.35.desc:1 "[Root.fleeing_advisor.GetName], un exilé politique de [exile_country.GetUsableName], est apparu à notre cour. Il prétend être [Root.GetExileAdvisorAAnTitle] et offre ses services à l'[Root.GetStateForm] [Root.GetAdjective] en échange de protection contre le [exile_country.GetRulerAdjAndTitle]. Devrions-nous l'accueillir ?"
 new_court_flavour_events.35.A:0 "Ses services seront utiles."
 new_court_flavour_events.35.B:0 "Nous n'avons pas de place pour lui."
 new_court_flavour_events.36.name:0 "Exilés [exile_country.GetAdjective]"
 new_court_flavour_events.36.desc:0 "[Root.fleeing_advisor.GetName] est reconnaissant de s'être vu accorder l'asile à la cour [Root.GetAdjective]. Cependant, il a récemment attiré l'attention sur le fait qu'il y a beaucoup d'autres notables [exile_country.GetAdjective] dans sa position, « des hommes d'une grande sagesse et influence », insiste-t-il. Il pourrait être utile de les autoriser à rejoindre notre cour, si nous souhaitons intensifier notre opposition aux ambitions [exile_country.GetAdjective]."
 new_court_flavour_events.36.A:0 "Nous les accueillerons."
 new_court_flavour_events.36.B:0 "Nous n'avons pas de place pour plus d'exilés."
 new_court_flavour_events.37.name:0 "Exilés à [From.GetUsableName]"
 new_court_flavour_events.37.desc:0 "Nos yeux et oreilles à [From.GetUsableName] rapportent que le [From.GetRulerTitleOrRegency] a accueilli nombre des ennemis politiques de notre [Root.Monarch.GetTitle] qui avaient été précédemment exilés de la cour [Root.GetAdjective] ou ont choisi de chercher des opportunités ailleurs. Ils poussent maintenant pour une action forte contre le « régime » [Root.GetAdjective] actuel et fournissent une assistance active au [From.GetRulerAdjAndTitle] pour atteindre cet objectif."
 new_court_flavour_events.37.option:0 "Comment osent-ils !"
 opinion_took_in_exiles:0 "A accueilli des Exilés"
 opinion_turned_away_exiles:0 "A refoulé des Exilés"
 opinion_hosting_exiles:0 "Héberge des Exilés"
 new_court_flavour_events.39.name:0 "Hérésie à [heathen_advisor_country.GetUsableName]"
 new_court_flavour_events.39.desc:0 "Il nous a été porté à notre attention que le [heathen_advisor_country.GetRulerAdjAndTitle] héberge un hérétique à [heathen_advisor_country.Monarch.GetHerHis] cour. [heathen_advisor_country.Monarch.GetHerHisCap] [heathen_advisor_country.GetEventAdvisorTitle], [heathen_advisor_country.GetEventAdvisorName], s'est détourné des enseignements du Haut-Recteur et professe ouvertement son adhésion à la foi [heathen_advisor_country.advisor_religion.GetReligionName], répandant au passage de vicieux mensonges contre Sa Sainteté."
 new_court_flavour_events.39.A:0 "Intolérable ! Nous devons protester."
 new_court_flavour_events.39.B:0 "Nous fermerons les yeux."
 new_court_flavour_events.40.name:0 "Les Exigences du [Z97.Monarch.GetTitle]"
 new_court_flavour_events.40.desc:0 "Un émissaire du Rectorat est arrivé. Avec une expression grave sur le visage, il délivre son message : « Il a été porté à l'attention de Sa Sainteté le [Z97.Monarch.GetTitle] [Z97.Monarch.GetName] que vous hébergez un hérétique à votre cour. Nous exigeons que vous le remettiez à l'inquisition. À défaut, le Haut-Recteur considérera que vous avez abandonné la Vraie Voie et sera contraint de prendre toutes les mesures nécessaires contre vous. »"
 new_court_flavour_events.40.A:0 "Remettez-le."
 new_court_flavour_events.40.B:0 "Nous ne nous plierons pas à la pression du Rectorat."
 new_court_flavour_events.41.name:0 "[heathen_advisor_country.GetUsableName] se Conforme à nos Exigences"
 new_court_flavour_events.41.desc:0 "Le [heathen_advisor_country.GetRulerAdjAndTitle] s'excuse d'avoir engagé l'hérétique, qui nous sera amené enchaîné, ses mensonges réduits au silence à jamais !"
 new_court_flavour_events.41.A:0 "Excellent."
 new_court_flavour_events.42.name:0 "[heathen_advisor_country.GetUsableName] Défie notre Autorité"
 new_court_flavour_events.42.desc:0 "Le [heathen_advisor_country.GetRulerAdjAndTitle] exprime sa colère face à notre requête, qu'il a la témérité de prétendre outrepasse notre autorité, comme si le Haut-Recteur n'était pas l'arbitre de toutes choses spirituelles dans le monde chrétien. Le mal a vraiment pris possession de [heathen_advisor_country.GetUsableName]."
 new_court_flavour_events.42.A:0 "Ils ont été égarés."
 opinion_interfering_pope:0 "Haut-Recteur Ingérant"
 opinion_bowed_to_papal_demand_advisor:0 "S'est plié aux Exigences du Rectorat"
 handed_over_heretic:0 "A remis un Hérétique"
 desc_handed_over_heretic:0 "Les hérétiques savent qu'ils doivent vivre dans la peur d'un dirigeant qui soutient la persécution du Haut-Recteur contre leur espèce."
 opinion_rejected_papal_demand_advisor:0 "Héberge un Hérétique"
