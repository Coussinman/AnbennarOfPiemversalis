 legislative_sejm:0 "Sejm Législatif"
 legislative_sejm_desc:0 "En accordant davantage de pouvoirs législatifs au Sejm, nous nous assurons que seuls les meilleurs candidats de notre nation sont sélectionnés pour être en ligne pour le trône."
 integrated_sejmiks:0 "Intégrer les Sejmiks"
 integrated_sejmiks_desc:0 "Les Sejmiks sont les parlements locaux chargés de gouverner les différentes régions de notre nation. En intégrant les Sejmiks dans notre gouvernement, nous nous assurons que les personnes de toutes cultures se sentent correctement représentées au Sejm."
 penal_colonies_reform:0 "Compagnies Coloniales d'Exil"
 penal_colonies_reform_desc:0 "Le Nouveau Monde est un lieu de grandes opportunités, et pour nous c'est l'occasion d'établir des Colonies d'Exil et de débarrasser notre nation des condamnés et des minorités. En permettant aux compagnies coloniales de revendiquer la souveraineté sur nos indésirables, nous créerons l'harmonie dans l'Ancien Monde et étendrons notre influence dans le Nouveau Monde."
 john_calvin_modifier:0 "Chef Spirituel"
 desc_john_calvin_modifier:0 "Jean Calvin sert cette nation en tant que Chef Spirituel."
 mercenary_monopoly_modifier:0 "Monopole des Mercenaires"
 desc_mercenary_monopoly_modifier:0 "Cette nation a atteint un monopole complet sur le marché des mercenaires."
 colonial_assimilation_of_natives_mod:0 "Assimilation des Autochtones"
 desc_colonial_assimilation_of_natives_mod:0 "Ce pays a été efficace dans l'intégration des peuples autochtones avec ses colonies."
 colonial_accommodation_mod:0 "Intégration Coloniale Autochtone"
 desc_colonial_accommodation_mod:0 "Les peuples autochtones rejoignent cette colonie."
 flavor_swi.EVTNAME4:0 "Les Confédérations Suisses"
 flavor_swi.EVTDESC4:0 "[Root.GetName] n'est pas officiellement reconnue comme une nation, pas même par elle-même. Les cités suisses sont libres de l'Empire d'Anbennar et répondent directement à l'Empereur. La Confédération [Root.GetAdjective] n'est qu'un accord de coopération militaire et commerciale entre les cités suisses. Plusieurs de ces accords existent parmi les Suisses, notamment avec notre voisin : [TTL.GetName].\n\n[TTL.GetName] est une confédération de cantons indépendants en coopération mutuelle, et peut-être qu'en proposant de travailler à leurs côtés, nous pourrions commencer à unifier tous les cantons suisses en un seul État."
 flavor_swi.EVTOPTA4:0 "Étendre la confédération."
 flavor_swi.EVTOPTB4:0 "Se concentrer sur le renforcement des Cantons."
 flavor_swi.EVTNAME5:0 "Jean Calvin"
 flavor_swi.EVTDESC5:0 "Alors que la Réforme se fraie un chemin sanglant à travers Cannor, l'unité entre les cantons suisses commence à se fissurer. Tandis que chaque canton choisit son allégeance dans le conflit entre Protestants et Ravéliens, le conflit des guerres de religion continue de souiller notre terre du sang suisse.\n\nUn prédicateur du nom de Jean Calvin prêche dans les rues de Genève. À travers Cannor, il prêche son interprétation unique de la réforme, attestant que tous les humains naissent dans une dépravation totale dès leur naissance et que c'est seulement par la grâce de Dieu qu'ils peuvent être libérés du vice et du péché.\n\nDernièrement, il a gagné une suite assez considérable au sein de notre nation, une suite suffisamment importante pour qu'il puisse bien supplanter l'autorité de [Root.Monarch.GetName]."
 flavor_swi.EVTOPTA5:0 "Le peuple de Genève peut suivre qui bon lui semble."
 flavor_swi.EVTOPTB5:0 "Bannissez ce zélote de notre nation !"
 flavor_swi.EVTNAME6:0 "Calvin Revient à Genève"
 flavor_swi.EVTDESC6:0 "En dépit de son bannissement de la ville, on nous informe que Jean Calvin est réapparu dans les rues de [4720.GetName] pour répandre sa foi. Beaucoup s'attendent à un nouveau bannissement rapide, mais peut-être que [Root.Monarch.GetName] se montre plus sympathique concernant la nature de la foi de Calvin."
 flavor_swi.EVTOPTA6:0 "Il n'en vaut pas la peine."
 flavor_swi.EVTOPTB6:0 "Encore ? Chassez cet hérétique !"
 flavor_swi.EVTNAME7:0 "Calvin Devient Chef Spirituel de Genève"
 flavor_swi.EVTDESC7:0 "Le réformateur Jean Calvin répand ses vues religieuses uniques à Genève depuis de nombreuses années. Alors que notre nation se détourne de plus en plus de l'Église Ravélienne, le désir d'un chef spirituel à Genève grandit. La majorité du Grand Conseil a voté pour créer un tel titre et a nommé Jean Calvin à ce poste. [Root.Monarch.GetName] a l'autorité d'intervenir dans la décision du conseil et de démettre Calvin du pouvoir, mais cela contrarierait grandement la population Réformée vivant à [4720.GetName]."
 flavor_swi.EVTOPTA7:0 "Invitez Calvin à être le chef spirituel de [Root.GetName] à la place !"
 flavor_swi.EVTOPTB7:0 "Nous ne ferons simplement rien."
 flavor_swi.EVTOPTC7:0 "Nous devons éliminer cette mauvaise graine avant qu'elle ne s'épanouisse en coup d'État !"
 flavor_swi.EVTNAME8:0 "Le Déclin du Pouvoir du [Root.Monarch.GetTitle]"
 flavor_swi.EVTDESC8:0 "Depuis des années maintenant, le siège du pouvoir dans notre nation est partagé par notre dirigeant séculier [Root.Monarch.GetName] et notre chef spirituel Jean Calvin. Alors que la foi Réformée est devenue une majorité écrasante dans notre pays, ceux qui croient encore au pouvoir du [Root.Monarch.GetTitle] se font rares, et davantage de gens reconnaissent Calvin comme notre chef d'État. En dehors de nos frontières, Calvin a gagné des adeptes de tout Cannor et beaucoup de ses partisans influents viennent à [Root.Capital.GetName] pour rencontrer Calvin sans même accorder à [Root.Monarch.GetName] un regard en passant."
 flavor_swi.EVTOPTA8:0 "Voilà comment meurt la démocratie..."
 flavor_swi.EVTOPTB8:0 "Cette folie a assez duré, il n'y a pas de Chef Spirituel de [Root.GetName] !"
 flavor_swi.EVTNAME9:0 "Champions de la Guerre de Cent Ans"
 flavor_swi.EVTDESC9:0 "Tandis que les Anglais et les Français s'affrontent dans leur guerre futile, les mercenaires suisses offrant leurs services dans le conflit commencent à se forger une solide réputation. Pour la plupart des nations, être soldat n'est qu'un emploi à temps partiel, mais nos mercenaires hautement entraînés combattant dans la guerre stupéfient tant les Français que les Anglais par leurs tactiques magistrales et leurs méthodes brutales pour remporter victoire après victoire pour leurs contractants."
 flavor_swi.EVTOPTA9:0 "Bientôt, tout Cannor tremblera à la simple vue des mercenaires suisses !"
 flavor_swi.EVTNAME10:0 "Le Monopole des Mercenaires"
 flavor_swi.EVTDESC10:0 "Tout au long de l'histoire de Cannor, les mercenaires les plus recherchés ont été ceux qui appellent la Suisse leur foyer, ainsi que ceux de Souabe. Maintenant qu'il n'existe plus d'États souabes indépendants auprès desquels acheter des condottieres, la demande de mercenaires suisses n'a fait qu'augmenter. Ce monopole que nous détenons sur les mercenaires nous permettra de pratiquer des tarifs encore plus élevés pour nos armées, et l'absence de Souabes pour défier notre domination ne fera que renforcer la réputation terrifiante de nos mercenaires."
 flavor_swi.EVTOPTA10:0 "Excellent."
 flavor_swi.EVTNAME11:0 "La République Helvétique"
 flavor_swi.EVTDESC11:0 "Alors que nous répandons la révolution à travers la Suisse, nous avons l'opportunité unique de réorganiser la Fédération Suisse en un gouvernement plus proche du nôtre. En établissant une République Helvétique sur les cendres des cantons suisses, nous pourrions mettre fin au conflit entre nos nations et répandre la révolution en Suisse."
 flavor_swi.EVTOPTA11:0 "Cela me semble bien. Mettez cela en place !"
 flavor_swi.EVTOPTB11:0 "Nous avons d'autres projets pour les Suisses..."
 flavor_swi.EVTDESC1101:0 "Alors que les feux de la révolution [From.GetAdjective] se frayent un chemin à travers la Suisse, les anciennes coutumes s'effacent rapidement devant un nouveau gouvernement moderne et centralisé. Nous ne pouvons plus nous appeler la Fédération Suisse, car nos cantons ne sont plus indépendants et libres. L'occupation continue des forces révolutionnaires a provoqué un changement radical dans notre gouvernement, et nous aussi devons maintenant prêter allégeance à la Révolution."
 flavor_swi.EVTOPTA1101:0 "Nous répondons à un nouveau type de [Root.Monarch.GetTitle] maintenant..."
 flavor_swi.EVTOPTB1101:0 "Des zélotes révolutionnaires ne gouverneront pas notre pays !"
 flavor_swi.2.t:0 "Les Cités Suisses et la Savoie"
 flavor_swi.2.d:0 "L'équilibre du pouvoir à Genève est détenu en partie par le [SAV.Monarch.GetTitle] de [SAV.GetName], et en partie par le Grand Conseil de Genève. À tout moment cependant, le [SAV.Monarch.GetTitle] [SAV.Monarch.GetName] pourrait souhaiter exercer plus de pression sur notre nation et dissoudre les pouvoirs démocratiques accordés à Genève. Il existe d'autres cités puissantes sous la même suzeraineté, et peut-être qu'en forgeant les bonnes alliances, notre influence sur les États suisses de Savoie pourrait devenir plus grande que celle du [SAV.Monarch.GetTitle] [SAV.Monarch.GetName] lui-même..."
 flavor_swi.2.a:0 "Envoyez des émissaires aux cités suisses."
 flavor_swi.2.b:0 "Nous ne souhaitons pas irriter notre [SAV.Monarch.GetTitle]."
 flavor_swi.201.t:0 "Genève Demande une Alliance avec les Cités Suisses"
 flavor_swi.201.d:0 "Nous avons appris aujourd'hui que le Grand Conseil gouvernant actuellement Genève a contacté certaines des autres cités suisses officiellement gouvernées par le [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Si nous permettons au Grand Conseil d'étendre son influence parmi les cités suisses, la légitimité du gouvernement de [Root.GetName] dans la région commencera à être remise en question, et les cités conspireront probablement contre nous. Nous pourrions, bien sûr, mettre fin au pouvoir du Grand Conseil par une petite démonstration de force contre le [GNV.Monarch.GetTitle] [GNV.Monarch.GetName]."
 flavor_swi.201.a:0 "Nous laisserons passer cela pour l'instant..."
 flavor_swi.201.b:0 "Interdisez l'alliance, et apportez-moi la tête de [GNV.Monarch.GetName] !"
 flavor_swi.202.t:0 "La Réponse Savoyarde"
 flavor_swi.202.d:0 "La réponse du [SAV.Monarch.GetTitle] [SAV.Monarch.GetName] à notre demande raisonnable a secoué les officiels de notre nation. À notre choc et horreur, la tête du [Root.Monarch.GetTitle] [Root.Monarch.GetName] a été livrée aux Chambres du Grand Conseil par un officiel savoyard. Cette réponse du [SAV.Monarch.GetTitle] ne fera certainement rien pour apaiser la tension entre nos nations."
 flavor_swi.202.a:0 "Nous vengerons notre [Root.Monarch.GetTitle]."
 flavor_swi.203.t:0 "Le Destin de Genève"
 flavor_swi.203.d:0 "Les Ducs de Savoie à travers l'histoire ont lutté pour satisfaire le Grand Conseil de Genève, et une fois de plus nous nous trouvons irrités par l'état des affaires dans le [SAV.GovernmentName] [SAV.GetAdjective] et nous souhaitons nous libérer. Nos récentes relations positives avec la Suisse nous ont donné l'opportunité de nous échapper de la Savoie pour rejoindre la Confédération Suisse. Bien que cela contrarie notre ancien suzerain, les Suisses sont bien équipés pour protéger nos intérêts."
 flavor_swi.203.a:0 "Contactons les Suisses."
 flavor_swi.203.c:0 "N'irritons pas le [SAV.Monarch.GetTitle] de [SAV.GetName]."
 flavor_swi.204.d:0 "Un officiel du Grand Conseil de Genève nous a approchés aujourd'hui pour demander à rejoindre la Fédération Suisse. Genève est un État sujet du [SAV.Monarch.GetTitle] [SAV.Monarch.GetName] de Savoie, et en tant que tel, accepter une telle proposition contrarierait grandement les officiels [SAV.GetAdjective] et pourrait mener à la guerre."
 flavor_swi.204.a:0 "Bienvenue dans la Fédération, [From.GetName]."
 incidents_bur_inheritance.0.t:0 "Marie de Bourgogne"
 incidents_bur_inheritance.0.d:0 "Il semble que la lignée de [Root.Monarch.Dynasty.GetName] se soit corrompue et flétrie avec la dernière descendance de [Root.Monarch.GetName]. [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] a été incapable de produire un héritier durant toutes ses années en tant que dernier mâle de la lignée [Root.Monarch.Dynasty.GetName].\n\nCependant, le [Root.Monarch.GetTitle] a engendré une Princesse talentueuse et belle du nom de Marie. [Root.Monarch.GetHerHisCap] père Philippe [Root.Monarch.Dynasty.GetName] méprisait notoirement Marie et insistait sur le fait qu'aucune femme ne devrait siéger sur le trône de Bourgogne, mais [Root.Monarch.GetName] n'est pas son père et les temps deviennent désespérés. Si [Root.Monarch.GetName] meurt sans produire d'héritier, Marie deviendra de facto [Root.Monarch.GetHerHis] successeur quoi qu'il arrive, mais si [Root.Monarch.GetName] renonçait à la quête d'un héritier mâle et favorisait Marie comme héritière légitime de la Bourgogne, sa revendication serait renforcée et nous pourrions être en mesure de négocier notre sortie de cette crise de succession avec un minimum de conflits.\n\nLes héritières sont considérées comme un prix de choix pour les hommes ambitieux, et la succession de Marie pourrait conduire la Bourgogne à tomber sous une union avec une puissance étrangère."
 incidents_bur_inheritance.0.a:0 "La Maison [Root.Monarch.Dynasty.GetName] a un avenir radieux avec Marie."
 incidents_bur_inheritance.0.b:0 "Mon père avait raison. Aucune femme ne peut gouverner [Root.GetName]."
 incidents_bur_inheritance.1.t:0 "La Succession Bourguignonne"
 incidents_bur_inheritance.1.desc:1 "C'est ce que nous avions toujours redouté : le Duc de [Root.GetName] a quitté cette vie pour les cieux sans produire d'héritier mâle éligible. Avec le trépas prématuré du Duc, [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] a accédé au titre de [Root.Monarch.GetTitle] de Bourgogne. Cependant, avec [Root.Monarch.GetHerHis] revendication relativement faible aux yeux de nombreux seigneurs et dames, la Bourgogne est perçue comme mûre pour être prise par l'ambitieux [FRA.Monarch.GetTitle] de [FRA.GetName] et le [Emperor.Monarch.GetTitle] de l'Empire d'Anbennar.\n\n[Root.Monarch.GetName] est une jeune femme courageuse et intelligente, mais si la Bourgogne doit survivre à cette crise sans entrer en conflit avec l'une des grandes puissances, alors [Root.Monarch.GetName] doit épouser un membre d'une famille royale prestigieuse pour solliciter leur soutien et leur protection. Bien sûr, [Root.Monarch.GetName] sera mariée dans un mariage patrilinéaire traditionnel, donc la Bourgogne sera essentiellement sujette à une nation étrangère, mais en ces temps de grand chaos, quel choix avons-nous ?"
 incidents_bur_inheritance.1.a:0 "Advienne que pourra, la Bourgogne restera bourguignonne."
 incidents_bur_inheritance.1.b:0 "Les Français ne sont plus là pour nous arrêter désormais."
 incidents_bur_inheritance.1.c:0 "Le Prince [Emperor.Monarch.Dynasty.GetName] fera parfaitement l'affaire."
 incidents_bur_inheritance.1.d:0 "[bur_strongest_ally.GetName] nous défendra à nouveau."
 incidents_bur_inheritance.1.e:0 "Réintégrons-nous avec les Français."
 incidents_bur_inheritance.101.t:0 "[From.GetName] Défiant"
 incidents_bur_inheritance.101.d.emp:1 "Malgré notre forte revendication sur le [BUR.GovernmentName] de [BUR.GetName], [Emperor.Monarch.GetName] [Emperor.Monarch.Dynasty.GetName] a refusé de nous faire la moindre concession et s'est déclaré le véritable successeur de l'ensemble de [BUR.GetName]. C'est des plus inattendus, car [BUR.GetName] n'était guère plus qu'un duché mineur en révolte contre la Couronne [FRA.GetAdjective]. Si nous ignorons la décision du [Emperor.Monarch.GetTitle], nous risquons d'affaiblir notre emprise sur le manteau français."
 incidents_bur_inheritance.101.d.indi:1 "Malgré notre forte revendication sur le [BUR.GovernmentName] de [BUR.GetName], [BUR.Monarch.GetName] [BUR.Monarch.Dynasty.GetName] a refusé de nous faire la moindre concession et s'est déclaré indépendant de toute puissance étrangère. C'est des plus inattendus, car la lignée de [BUR.Monarch.Dynasty.GetName] n'ayant produit aucun héritier mâle, nous nous attendions à ce que le [BUR.GovernmentName] se réintègre au [FRA.GovernmentName] [FRA.GetAdjective], les Pays-Bas retournant à l'Empire. Cette tournure inattendue des événements nous a cependant donné une revendication très solide sur le [BUR.GovernmentName] et nous pourrions simplement mettre fin au règne illégitime de [BUR.Monarch.GetName] [BUR.Monarch.Dynasty.GetName] par la force."
 incidents_bur_inheritance.101.a:0 "Notre heure est venue."
 incidents_bur_inheritance.101.b:0 "Cela n'en vaut pas la peine."
 incidents_bur_inheritance.102.t:0 "L'Empereur Exige les Pays-Bas"
 incidents_bur_inheritance.102.d:0 "Avec la mort du Duc de [BUR.GetName], les réformes qu'il avait adoptées et qui avaient conduit à l'intégration étroite des Pays-Bas avec le reste du [Root.GovernmentName] [Root.GetAdjective] reviennent nous hanter. Le [Emperor.Monarch.GetTitle] a envoyé un émissaire, exigeant que les Pays-Bas soient séparés du [BUR.GovernmentName] de [BUR.GetName] et retrouvent leur statut de Principauté au sein de l'Empire d'Anbennar.\n\nCependant, [Root.Monarch.GetName] est un [Root.Monarch.GetTitle] rusé et avisé, et a proposé de révoquer les réformes du précédent dirigeant de [BUR.GetName] et d'introduire un Grand Privilège. Ce Privilège imposerait que toutes les cités des Pays-Bas reconnaissent [BUR.GetName] comme leur [BUR.Monarch.GetTitle] légitime tout en demeurant loyales au [Emperor.Monarch.GetTitle] de l'Empire d'Anbennar. Notre stratagème pourrait bien sûr se retourner contre nous et le [Emperor.Monarch.GetTitle] pourrait s'en servir comme provocation pour la guerre, mais il y a aussi une chance que le [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] soit satisfait pour l'instant..."
 incidents_bur_inheritance.102.a:0 "Nous ne nous inclinons pas devant ce « [Emperor.Monarch.GetTitle] »."
 incidents_bur_inheritance.102.b:0 "Accorder le Grand Privilège."
 incidents_bur_inheritance.102.c:0 "Abandonner les Pays-Bas."
 incidents_bur_inheritance.102.c.tt:0 "Chaque sujet de §Y[BUR.GetName]§! ayant sa capitale dans les §YPays-Bas§! devient indépendant et rejoindra le Saint-Empire Romain."
 incidents_bur_inheritance.103.t:0 "La Bourgogne Héritée !"
 incidents_bur_inheritance.103.d.fra:1 "Les Ducs de Bourgogne ont toujours été une épine dans le pied de la Maison [Root.Monarch.Dynasty.GetName] de France, mais avec la mort du dernier mâle de la lignée bourguignonne, Marie de Bourgogne a proposé de se réintégrer à la France. Cette décision signifie que le duché bourguignon rebelle appartient au passé et que notre domination sur la France est assurée, bien que le [Emperor.Monarch.GetTitle] de l'Empire d'Anbennar puisse s'irriter de notre contrôle sur les Pays-Bas."
 incidents_bur_inheritance.103.d.emp:1 "Avec la mort du Duc de Bourgogne, nos liens royaux étroits avec les Bourguignons ont porté leurs fruits de façon remarquable. De nombreux territoires bourguignons existent au sein de l'Empire, et Marie de Bourgogne a décidé de s'intégrer pleinement à l'Empire en proposant d'épouser un Prince [Root.Monarch.Dynasty.GetName] ! Les Français s'attendent à ce que nous rendions les terres bourguignonnes qui appartenaient jadis au trône français, mais nous pourrions bien sûr rejeter leurs revendications et conserver la Bourgogne comme partie intégrante de l'Empire."
 incidents_bur_inheritance.103.d.oth:1 "Avec la mort du Duc de Bourgogne, nos liens royaux étroits avec les Bourguignons ont porté leurs fruits de façon remarquable. Parmi toutes les options qui s'offraient à elle, Marie « la Belle » de Bourgogne a choisi d'épouser un membre de la lignée [Root.Monarch.Dynasty.GetName], et bien que Marie soit techniquement toujours Duchesse de Bourgogne, tous ses héritiers seront de notre lignée et nous sommes déjà si influents dans la région qu'elle peut tout aussi bien être considérée comme [Root.GetAdjective] de toute façon."
 incidents_bur_inheritance.103.a:0 "Excellent."
 incidents_bur_inheritance.104.t:0 "Le Grand Privilège"
 incidents_bur_inheritance.104.d:0 "La réponse du [BUR.Monarch.GetTitle] [BUR.GetAdjective] n'était pas du tout ce que nous attendions. [BUR.Monarch.GetSheHeCap] a choisi de ne pas rendre les terres qu'ils ont volées à l'Empire, mais d'adopter plutôt une loi complexe stipulant que les Pays-Bas font simultanément partie de l'Empire et sont sujets au [BUR.Monarch.GetTitle] de [BUR.GetName]. Nous avons les mains liées : si nous intervenons, nous risquons de nuire à notre réputation d'Empereur, mais si nous ne faisons rien, nous risquons de perdre les Pays-Bas à jamais."
 incidents_bur_inheritance.104.a:0 "Je suppose que nous ne pouvons rien y faire..."
 incidents_bur_inheritance.104.b:0 "Au diable les lois, je veux que [BUR.GetName] sorte de l'Empire !"
 incidents_bur_inheritance.2.t:0 "La Bourgogne Héritée !"
 incidents_bur_inheritance.2.d:1 "Avec la mort du Duc de Bourgogne, les liens royaux bourguignons avec l'Empire ont porté leurs fruits de façon remarquable. De nombreux territoires bourguignons existent au sein de l'Empire, et Marie de Bourgogne a décidé de s'intégrer pleinement à l'Empire en proposant d'épouser un Prince [Emperor.Monarch.Dynasty.GetName] ! Les Français s'attendent au retour des terres bourguignonnes qui appartenaient jadis au trône français, mais le [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] pourrait bien sûr rejeter leurs revendications et conserver la Bourgogne comme partie intégrante de l'Empire."
 incidents_bur_inheritance.2.a:0 "Conserver notre union avec la Bourgogne."
 incidents_bur_inheritance.2.b:0 "Faire des concessions à la France."
 incidents_bur_inheritance.2.c:0 "Intégrer la Bourgogne à l'Empire."
 incidents_bur_inheritance.3.t:0 "La Crise des Pays-Bas"
 incidents_bur_inheritance.3.d:0 "Avec la mort du Duc de Bourgogne, les Pays-Bas nous ont complètement échappé. Si nous voulons renforcer l'Empire et tenir les étrangers à l'écart des affaires impériales, nous devons faire valoir nos revendications sur les Pays-Bas, ou risquer de les perdre à jamais."
 incidents_bur_inheritance.3.a:0 "Exiger l'indépendance des Pays-Bas."
 incidents_bur_inheritance.3.b:0 "Faire valoir notre revendication sur la Bourgogne."
 incidents_bur_inheritance.3.c:0 "Abandonner les revendications."
 incidents_bur_inheritance.301.t:0 "L'Empereur Exige les Pays-Bas"
 incidents_bur_inheritance.301.d:0 "Lorsque nous avons hérité de la Bourgogne, nous sommes également devenus souverains des territoires bourguignons dans les Pays-Bas. Ces territoires font traditionnellement partie de l'Empire d'Anbennar, et sans surprise, notre héritage a poussé [Emperor.GetName] à nous réclamer ces territoires. Nous pourrions refuser, bien sûr, mais le [Emperor.Monarch.GetTitle] a clairement indiqué qu'il s'agit d'une exigence, et ne pas y répondre lui donnera motif à tirer l'épée de l'Empire."
 incidents_bur_inheritance.301.a:0 "Toute la Bourgogne est nôtre !"
 incidents_bur_inheritance.301.b:0 "Une requête raisonnable."
 incidents_bur_inheritance.302.t:0 "L'Empereur Exige la Bourgogne"
 incidents_bur_inheritance.302.d:0 "Il y a de nombreux prétendants au [BUR.GovernmentName] de [BUR.GetName], et lorsque nous avons hérité du [BUR.GovernmentName], nous nous attendions à ce que le [Emperor.Monarch.GetTitle] de l'Empire d'Anbennar exige [Emperor.Monarch.GetHerHis] revendications traditionnelles sur les Pays-Bas. Ce à quoi nous ne nous attendions pas, cependant, c'est que [Emperor.Monarch.GetName] exige l'intégralité de [BUR.GetName]. Le [Emperor.Monarch.GetTitle] a clairement indiqué que la paix n'est pas une option, et que la guerre nous frapperait à moins que nous ne cédions totalement la Bourgogne à l'Empire."
 incidents_bur_inheritance.302.a:0 "Toute la Bourgogne est nôtre."
 incidents_bur_inheritance.302.b:0 "La Bourgogne est de toute façon une épine dans notre pied..."
 incidents_bur_inheritance.4.t:0 "[From.GetName] Défiant"
 incidents_bur_inheritance.4.d:1 "Malgré notre forte revendication sur le [BUR.GovernmentName] de [BUR.GetName], [BUR.Monarch.GetName] [BUR.Monarch.Dynasty.GetName] a refusé de nous faire la moindre concession et s'est déclaré indépendant de toute puissance étrangère. C'est des plus inattendus, car la lignée de [BUR.Monarch.Dynasty.GetName] n'ayant produit aucun héritier mâle, nous nous attendions à ce que le [BUR.GovernmentName] se réintègre au [FRA.GovernmentName] [FRA.GetAdjective], les Pays-Bas retournant à l'Empire. Cette tournure inattendue des événements nous a cependant donné une revendication très solide sur le [BUR.GovernmentName] et nous pourrions simplement mettre fin au règne illégitime de [BUR.Monarch.GetName] [BUR.Monarch.Dynasty.GetName] par la force."
 incidents_bur_inheritance.4.a:0 "Exiger les Pays-Bas."
 incidents_bur_inheritance.5.t:0 "La Duchesse de Bourgogne Meurt"
 incidents_bur_inheritance.5.d:0 "De tristes nouvelles nous parviennent aujourd'hui alors que nous apprenons que notre bien-aimée Marie, Duchesse de Bourgogne, a quitté cette vie pour l'au-delà. Jeune fille douce et au cœur généreux, Marie nous manquera cruellement à la cour [burgundy_senior_partner.GetAdjective], mais maintenant qu'elle a trépassé, il semble que nous devions être hérités par [burgundy_senior_partner.GetName]. De nombreux nobles du royaume plient déjà le genou devant le [burgundy_senior_partner.Monarch.GetTitle] de [burgundy_senior_partner.GetName], mais bien d'autres commencent à se rassembler autour d'un cousin éloigné de Marie et l'un des rares membres survivants de la famille royale bourguignonne. Si nous nous soumettons, notre [Root.GovernmentName] cessera d'exister et nous serons annexés au [burgundy_senior_partner.GovernmentName] [burgundy_senior_partner.GetAdjective]. Si nous reconnaissons la faible revendication du prétendant bourguignon, nous entrerons sans aucun doute en état de guerre avec [burgundy_senior_partner.GetName]."
 incidents_bur_inheritance.5.a:0 "Hélas, nous n'avons pas le choix."
 incidents_bur_inheritance.5.b:0 "Je préférerais mourir plutôt qu'être [burgundy_senior_partner.GetAdjective] !"
 incidents_bur_inheritance.501.d:0 "De tristes nouvelles parviennent à [Root.Capital.GetName] aujourd'hui alors que nous apprenons que notre bien-aimée Marie, Duchesse de Bourgogne, a quitté cette vie pour l'au-delà. Jeune fille douce et au cœur généreux, et épouse aimante du Prince [Root.Monarch.Dynasty.GetName], Marie nous manquera cruellement à la cour [burgundy_senior_partner.GetAdjective]. Marie était une cavalière passionnée et accompagnait son époux dans ses chasses routinières, mais son cœur généreux et sa passion pour l'équitation n'ont pu la sauver lorsque son cheval de cinq cents kilogrammes est tombé sur elle et lui a brisé la colonne vertébrale.\n\nLe mariage entre un prince de la famille [Root.Monarch.Dynasty.GetName] et la Duchesse Marie Ire de Bourgogne a uni nos nations dans une union bienheureuse, mais maintenant que Marie a quitté cette vie pour l'au-delà, nul ne peut contester notre revendication sur le Duché de Bourgogne et déjà les nobles de Bourgogne se tournent vers le [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] comme leur suzerain légitime."
 incidents_bur_inheritance.501.a:0 "Je pourrais embrasser ce cheval !"
 incidents_bur_inheritance.502.d:0 "De tristes nouvelles parviennent à [Root.Capital.GetName] aujourd'hui alors que nous apprenons que notre bien-aimée Marie, Duchesse de Bourgogne, a quitté cette vie pour l'au-delà. Jeune fille douce et au cœur généreux, et épouse aimante du Prince [Root.Monarch.Dynasty.GetName], Marie nous manquera cruellement à la cour [burgundy_senior_partner.GetAdjective]. Marie était une cavalière passionnée et accompagnait son époux dans ses chasses routinières, mais son cœur généreux et sa passion pour l'équitation n'ont pu la sauver lorsque son cheval de cinq cents kilogrammes est tombé sur elle et lui a brisé la colonne vertébrale.\n\nÀ notre grande surprise, les seigneurs et dames de Bourgogne n'ont pas immédiatement commencé à plier le genou devant notre [Root.Monarch.GetTitle], mais ont plutôt reconnu un cousin éloigné de Marie comme leur dirigeant légitime. C'est ridicule, la loi stipule clairement qu'un [Root.Monarch.Dynasty.GetName] doit succéder à la mort de Marie. Il semble que les nobles insensés de Bourgogne ne reconnaissent que le langage de la violence et nous devrons faire valoir notre revendication légitime par le sang."
 incidents_bur_inheritance.502.a:0 "Cela n'en vaut pas la peine."
 incidents_bur_inheritance.502.b:0 "J'aurai mon union même si je dois brûler tout [BUR.Capital.GetCapitalName] !"
 incidents_bur_join_empire.1.t:0 "Entrée Impériale"
 incidents_bur_join_empire.1.desc:0 "Notre État doit originellement son existence à la famille royale de Bourgogne qui s'est détachée du Royaume de France dans une tentative de faire valoir notre revendication légitime sur le Trône de tous les Francs. Nous n'avons jusqu'à présent pas choisi de faire valoir notre revendication sur le Royaume de France et, de ce fait, notre revendication s'est depuis longtemps refroidie. La notion d'une Bourgogne véritablement indépendante existant à perpétuité est risible pour de nombreux nobles étrangers, et notre [Root.Monarch.GetTitle] a été conseillé par le conseil royal de solliciter l'entrée dans l'Empire d'Anbennar et de plier le genou devant le [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] [Emperor.Monarch.Dynasty.GetName] en tant que Prince Impérial.\n\nLes opportunités pour la Bourgogne au sein de l'Empire sont grandes, et peut-être qu'un jour nous pourrons même revendiquer la dignité impériale pour nous-mêmes..."
 incidents_bur_join_empire.1.a:0 "Je ne me suis jamais vraiment soucié de revendiquer le Trône de France."
 incidents_bur_join_empire.1.b:0 "Qu'ils rient. La Bourgogne restera la Bourgogne."
 incidents_bur_join_empire.2.t:0 "[BUR.GetName] Demande l'Entrée dans l'Empire"
 incidents_bur_join_empire.2.desc:0 "Le [BUR.Monarch.GetTitle] de [BUR.GetName] souhaite rejoindre l'Empire d'Anbennar. Bien que cela puisse sembler une décision simple, un Prince bourguignon représenterait un certain nombre de dangers pour l'Empire. Il nous serait difficile de résister aux avancées continues de la Bourgogne en territoire impérial, et les Électeurs pourraient commencer à penser que les Bourguignons seraient un candidat convenable pour la dignité impériale. Cependant, intégrer la Bourgogne à l'Empire dissiperait complètement les tensions entre l'Empire et la Bourgogne, et présenterait l'opportunité unique d'étendre l'influence impériale en France."
 incidents_bur_join_empire.2.a:0 "Accueillir [BUR.Monarch.GetName] de [BUR.GetName] dans l'Empire."
 incidents_bur_join_empire.2.b:0 "Leur permettre l'entrée, à condition qu'ils abandonnent tous les autres titres."
 incidents_bur_join_empire.2.c:0 "Interdire leur entrée."
 incidents_bur_join_empire.3.t:0 "Une Offre Étrange"
 incidents_bur_join_empire.3.desc:0 "Le [Emperor.Monarch.GetTitle] a décidé d'autoriser notre entrée dans l'Empire à une condition : nous devons abandonner tous les titres en dehors de notre Duché et de nos territoires d'outre-mer. Cela signifierait que toutes les terres que nous détenons et qui ne sont pas considérées comme faisant légitimement partie du Duché de Bourgogne seront libérées en tant que Prince Impérial et la taille de notre nation diminuera considérablement. Certains membres de la cour voient cela comme une insulte flagrante à nos possessions royales légitimes, tandis que d'autres insistent encore sur le fait que le [Emperor.Monarch.GetTitle] reste notre meilleure option pour chercher protection."
 incidents_bur_join_empire.3.a:0 "Même si cela me peine, j'accepte."
 incidents_bur_join_empire.3.b:0 "Cela n'en vaut vraiment pas la peine."
 incidents_bur_join_empire.4.t:0 "Le [Emperor.Monarch.GetTitle] Refuse"
 incidents_bur_join_empire.4.desc:0 "Invoquant la menace que nous représentons pour l'indépendance des autres Princes Impériaux, le [Emperor.Monarch.GetTitle] a refusé notre entrée dans l'Empire d'Anbennar. Il nous est évident que le [Emperor.Monarch.GetTitle] n'est rien de plus qu'un serpent desséché enroulé autour de la Couronne Impériale, craignant que les nobles lions [Root.GetAdjective] ne viennent la lui arracher. Qu'importe, nous devrons simplement adopter une approche plus musclée pour rejoindre l'Empire..."
 incidents_bur_join_empire.4.a:0 "[Emperor.Monarch.GetSheHeCap] n'est [Emperor.Monarch.GetTitle] que de nom."
 burgundy_has_resolved_imperial_issue_tt:1 "Cette mission sera accomplie une fois la question de notre appartenance à l'Empire résolue."
 burgundy_has_secured_succession_tt:1 "Résoudre la §YCrise de Succession Bourguignonne§! ou atteindre l'année 1500 sans la déclencher."
 burgundy_asks_to_join_empire_tt:0 "Nous demanderons au §Y[Emperor.Monarch.GetTitle]§! de nous laisser rejoindre l'§YEmpire d'Anbennar§!."
 burgundy_may_refuse_tt:0 "Il sera demandé à la §YBourgogne§! de §Ylibérer toutes les nations cannoriennes ayant des cœurs sur ses provinces§! en tant que §YPrinces Impériaux§!.\nLa §YBourgogne§! refusera probablement."
 become_balkanised_tt:0 "Nous allons §Ylibérer toutes les nations cannoriennes§! ayant des §Ycœurs§! sur nos provinces en tant que §YPrinces Impériaux§!."
 incident_burgundian_succ_emp_emperor_alert:0 "Nous avons hérité de la Bourgogne et devons décider quelle sera la relation entre la Bourgogne et l'Empire ainsi que comment traiter avec les Français."
 incident_burgundian_succ_emp_member_alert:0 "L'Empereur a hérité de la Bourgogne et doit décider quelle sera la relation entre la Bourgogne et l'Empire ainsi que comment traiter avec les Français."
 incident_burgundian_succ_strong_ally_emperor_alert:1 "[BUR.Overlord.GetName] a hérité de la Bourgogne, laissant les Pays-Bas entre des mains étrangères."
 incident_burgundian_succ_strong_ally_member_alert:1 "[BUR.Overlord.GetName] a hérité de la Bourgogne, laissant les Pays-Bas entre des mains étrangères."
 incident_burgundian_succ_alone_emperor_alert:0 "La Bourgogne a défié la tradition et placé une femme sur le Trône. Nous devons mettre fin à son règne et rendre les Pays-Bas à l'Empire d'Anbennar."
 incident_burgundian_succ_alone_member_alert:0 "La Bourgogne a défié la tradition et placé une femme sur le Trône. Le [Emperor.Monarch.GetTitle] doit mettre fin à son règne et rendre les Pays-Bas à l'Empire d'Anbennar."
 incident_burgundy_wants_to_join_emperor_alert:0 "Le [BUR.Monarch.GetTitle] de [BUR.GetName] souhaite rejoindre l'Empire d'Anbennar."
