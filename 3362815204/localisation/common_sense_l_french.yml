 friendship_events.1.t:0 "Animosité croissante"
 friendship_events.1.d:0 "Depuis aussi longtemps que quiconque se souvienne, nous nous considérions comme amis des $From.GetAdjective$. Cependant, avec la récente défaite humiliante aux mains de nos anciens amis, tout discours sur l'amitié historique entre nos deux peuples doit être considéré comme de simples mots. Chez nous, des mères apprennent la mort de leurs fils aux mains des armées de [From.GetName], l'amitié ou même la paix semble un rêve lointain."
 friendship_events.1.a:0 "Sales traîtres !"
 friendship_events.2.t:0 "Animosité croissante"
 friendship_events.2.d:0 "L'une des victimes de notre guerre actuelle semble avoir été notre longue histoire d'amitié entre les $From.GetAdjective$ et nous. Après la défaite écrasante que nous avons récemment infligée aux armées $From.GetAdjective$, nous craignons qu'ils ne nous pardonnent jamais."
