l_french:
 papacy_events.1.t:0 "La Garde Suisse"
 papacy_events.1.d:1 "L'encre a séché sur le contrat établissant la Garde Suisse Pontificale. Ce régiment d'élite est composé d'hommes disciplinés et expérimentés, voués d'une loyauté absolue envers le Saint-Père. Ils ont juré de servir l'État du Rectorat jusqu'au Jour du Jugement."
 papacy_events.1.d:1 "L'encre a séché sur le contrat établissant la Garde Suisse Pontificale. Ce régiment d'élite est composé d'hommes disciplinés et expérimentés, voués d'une loyauté absolue envers le Saint-Père. Ils ont juré de servir l'État du Rectorat jusqu'au Jour du Jugement."
 papacy_events.1.a:1 "Ils défendront l'Église avec honneur."
 papacy_events.2.t:0 "Le Haut-Recteur demande la Garde Suisse"
 papacy_events.2.d:0 "Nos soldats cherchent fortune à l'étranger, ce qui a valu à nos troupes une réputation d'être les plus disciplinées, les plus loyales et les plus puissantes, employant des tactiques de combat révolutionnaires. Nombreux sont ceux qui souhaitent engager nos troupes, y compris le Haut-Recteur qui désire conclure un pacte avec nous. Il demande que nous fournissions à [From.GetName] un corps permanent de mercenaires suisses. Cela accroîtra assurément notre prestige et nous vaudra d'autres faveurs."
 papacy_events.2.a:0 "Envoyons les gardes au Haut-Recteur."
 papacy_events.2.b:0 "Non, nous en avons davantage besoin."
 papacy_events.3.t:0 "La Suisse envoie la Garde Suisse"
 papacy_events.3.d:0 "Le messager de Suisse est arrivé et a annoncé qu'ils acceptent le pacte. Il ajoute : « Les Suisses voient la triste situation de l'Église de Dieu, Mère de la Chrétienté, et réalisent combien il est grave et dangereux que n'importe quel tyran, avide de richesses, puisse assaillir impunément la Mère commune de la Chrétienté. »"
 papacy_events.3.a:0 "Nous leur sommes infiniment reconnaissants !"
 papacy_events.4.t:0 "Pas de Garde Suisse"
 papacy_events.4.d:0 "En raison de l'excellence des mercenaires suisses et de la forte demande des autres pays, la Suisse a rejeté notre pacte et refuse d'envoyer le moindre corps pour notre défense."
 papacy_events.4.a:0 "Mais... nous en avons besoin !"
 papacy_events.5.t:0 "Le Passetto di Borgo"
 papacy_events.5.d:1 "Rome est perdue ! Alors que l'ennemi s'avance pour arrêter [Root.Monarch.GetTitle] [Root.Monarch.GetName], on lui rappelle l'existence du Passetto di Borgo, un passage qui relie la Cité du Vatican au Château Saint-Ange. De nombreux Hauts-Recteurs l'ont utilisé comme voie d'évasion en temps de péril, et maintenant [Root.Monarch.GetName] doit décider s'il fuit le Vatican."
 papacy_events.5.a:0 "Fuyons par le passage !"
 papacy_events.5.b:1 "Le Haut-Recteur n'abandonnera pas le Vatican."
 papacy_events.6.t:0 "Véridique-Neveu"
 papacy_events.6.d:1 "Il existe une longue tradition de Hauts-Recteurs nommant leurs parents au Collège des Véridiques. Après tout, si le Haut-Recteur est l'interprète choisi du Fragment Divin, alors ceux de son sang possèdent assurément la volonté et l'intelligence pour en faire autant. Bien que certains appellent cela du népotisme, les Véridiques-Neveux occupent une place établie au sein du Rectorat. À présent qu'il est temps de nommer un nouveau Véridique en [cardinal_nephew_country.GetName], le Haut-Recteur [Root.Monarch.GetName] doit décider si un parent serait apte à prendre résidence en [cardinal_nephew_province.GetName]."
 papacy_events.6.a:0 "Non, c'est une tradition que nous devons abolir."
 papacy_events.6.b:1 "Le neveu du Haut-Recteur fera un excellent Véridique."
 papacy_events.7.t:0 "Un Véridique-Neveu du Haut-Recteur"
 papacy_events.7.d:2 "[From.Monarch.GetTitle] [From.Monarch.GetName] nous demande de nommer son parent en [Root.GetName] comme Véridique. Bien que ce soit une pratique courante, beaucoup y voient un népotisme flagrant."
 papacy_events.7.a:0 "Accepter le Véridique-Neveu du Haut-Recteur."
 papacy_events.7.b:1 "Nous ne faciliterons pas le népotisme au sein de l'Église."
 papacy_events.8.t:0 "Véridique-Neveu accepté"
 papacy_events.8.d:1 "[From.Owner.GetName] a accepté le neveu du Haut-Recteur comme nouveau Véridique en [From.GetName]."
 papacy_events.8.a:0 "Parfait !"
 papacy_events.9.t:0 "Véridique-Neveu refusé"
 papacy_events.9.d:1 "[From.Owner.GetName] a refusé de nommer le neveu du Haut-Recteur comme Véridique en [From.GetName]."
 papacy_events.9.a:0 "Quelle déception."
 papacy_events.10.t:0 "Le Sac de Rome"
 papacy_events.10.d:1 "La guerre a laissé la cité de Rome en ruines. L'ennemi a pris d'assaut les murailles et mis la ville à sac, submergeant la garnison. Sur les marches de la Basilique Saint-Pierre, nos derniers gardes ont connu une fin atroce, massacrés avant que ne commence le pillage. Destruction, pillage et exécutions s'ensuivirent jusqu'à ce qu'enfin, les bandits, déserteurs, soldats et pillards entament leur long retour avec les objets de valeur qu'ils avaient réussi à dérober."
 papacy_events.10.a:1 "Renforçons la garnison, cela ne doit plus jamais se reproduire."
 papacy_events.10.b:1 "Réparons les dégâts causés à la cité."
 papacy_events.11.t:0 "La Bibliothèque du Vatican"
 papacy_events.11.d:1 "L'Église Ravélienne possède une vaste multitude d'œuvres écrites à travers les âges. Des fonds ont été réunis pour consolider et enrichir le savoir de la Chrétienté en établissant une magnifique bibliothèque au sein des murs du Vatican. La fondation de la Bibliothèque du Vatican établira Rome comme le centre du monde savant."
 papacy_events.11.a:0 "Établissons-la, en nous concentrant sur les œuvres administratives."
 papacy_events.11.b:0 "L'accent devrait être mis sur les œuvres diplomatiques."
 papacy_events.11.c:0 "Finançons une bibliothèque consacrée aux arts militaires."
 papacy_events.11.e:0 "Nous devrons y réfléchir davantage."
 papacy_events.12.t:1 "La Chapelle Sixtine"
 papacy_events.12.d:0 "La Cappella Maggiore, la Grande Chapelle, est utilisée pour les messes qui peuvent se tenir dans des espaces plus petits et moins publics que les basiliques. Les années n'ont pas été clémentes envers cette chapelle jadis magnifique décorée par Fra Angelico : ses murs penchent et elle est dans un état de ruine. La chapelle devrait être démolie, car sa structure n'est plus assez sûre pour les nombreuses messes qui s'y tiennent chaque année. Un nouvel édifice plus magnifique devrait prendre sa place, et nombreux sont les artistes célèbres qui seraient honorés si on leur demandait de décorer la nouvelle Chapelle Sixtine."
 papacy_events.12.a:0 "Démolissons l'ancienne et construisons la nouvelle au même emplacement."
 papacy_events.12.b:0 "Cessons simplement d'utiliser l'ancienne chapelle, il y a d'autres bâtiments que nous pouvons utiliser."
 papacy_events.13.t:0 "Décorer la Chapelle Sixtine"
 papacy_events.13.d:0 "L'ancienne Cappella Maggiore décrépite n'est plus, à sa place se dresse désormais la grandiose Chapelle Sixtine. Le Temple de Salomon et la Chapelle Sixtine ont les mêmes dimensions, telles que données dans l'Ancien Testament. L'extérieur est dépourvu de détails décoratifs, le bâtiment divisé en trois niveaux avec un plafond voûté et six hautes fenêtres arquées sur les côtés, deux à chaque extrémité. Bien que belle dans sa simplicité, la beauté de la chapelle pourrait être rehaussée par des fresques peintes par les plus grands artistes de notre temps."
 papacy_events.13.a:0 "Engageons Sandro Botticelli."
 papacy_events.13.b:0 "Engageons Domenico Ghirlandaio."
 papacy_events.13.c:0 "Engageons Pietro Perugino."
 papacy_events.13.e:0 "Engageons Michel-Ange."
 papacy_events.13.f:0 "Trouvons simplement quelqu'un pour décorer la chapelle !"
 papacy_events.13.g:0 "Laissons-la en l'état, nous n'avons pas besoin de le faire maintenant."
 papacy_events.14.t:1 "La Vente des Indulgences"
 papacy_events.14.d:0 "De nombreux pays ont commencé à vendre des indulgences contre de l'argent, afin que les riches puissent sauver leurs âmes tout en continuant à vivre dans le péché. Cette pratique dirige beaucoup d'argent vers les coffres de l'Église, et bien que certains la condamnent, d'autres pensent qu'elle devrait être autorisée."
 papacy_events.14.a:0 "Nous interdisons cette pratique !"
 papacy_events.14.b:0 "L'argent fait tourner le monde..."
 papacy_events.15.t:0 "La Simonie jugée"
 papacy_events.15.d:0 "Dans les Actes des Apôtres 8:9-24, Simon le Mage offrit de l'argent aux deux disciples Pierre et Jean s'ils lui donnaient le pouvoir de conférer le Saint-Esprit à quiconque il imposerait les mains. Cet acte, de vendre des choses spirituelles telles que des offices et des charges ecclésiastiques, est appelé simonie d'après cet homme, et maint souverain a été tenté par l'éclat de l'or de vendre des sièges de prévôt."
 papacy_events.15.a:0 "Nous traiterons cela comme le crime que c'est !"
 papacy_events.15.b:0 "C'est une pratique que nous autoriserons."
 papacy_events.16.t:0 "Vénération des Reliques : autoriser ou interdire ?"
 papacy_events.16.d:0 "Les églises ont toujours conservé des reliques de saints, pour les vénérer et dans certains cas les utiliser pour guérir les malades et les infirmes. Cette longue pratique est maintenant contestée, et certains croient qu'il s'agit d'idolâtrie, une hérésie qui devrait être bannie. La vente de reliques a enrichi maintes églises, et si le Haut-Recteur devait annoncer publiquement son soutien à cette pratique, une partie de cet argent trouverait son chemin vers nos coffres."
 papacy_events.16.a:0 "Empêchons la vente des reliques !"
 papacy_events.16.b:0 "Nous nous enrichirons si nous autorisons et pratiquons cela."
 papacy_events.17.t:0 "Galilée"
 papacy_events.17.d:1 "L'idée que la Terre et les planètes tourneraient autour du Soleil est une notion que Nicolas Copernic a d'abord exposée dans son livre « De revolutionibus orbium coelestium » en 1543, et maintenant Galilée l'a promue à nouveau, dans son livre « Sidereus Nuncius », le « Messager des Étoiles ». Sa défense controversée de cette théorie lui a valu de nombreux ennemis au sein de l'Église Ravélienne, et bien que nous admettions qu'il serait un adversaire de débat des plus intéressants, peut-être devrions-nous être prudents et simplement l'emprisonner pour empêcher ses idées d'atteindre le public ?"
 papacy_events.17.a:0 "Invitons-le à discuter de théologie."
 papacy_events.17.b:0 "Il doit être traduit en justice."
 papacy_events.18.t:0 "Sublimis Deus"
 papacy_events.18.d:0 "C'est avec consternation que nous avons appris que des pays ravéliens ont réduit en esclavage les Indiens de l'Ouest et du Sud pour les utiliser comme main-d'œuvre bon marché. Certes, des Hauts-Recteurs précédents ont autorisé cela, arguant que ces nouveaux peuples n'étaient pas vraiment humains et ne possédaient pas d'âme. Le Nouveau Testament dit que l'Évangile a été prêché à toutes les nations, et puisqu'ils ne croient pas en notre Dieu, peut-être ne comptent-ils pas. L'humanité est divisée en trois races, les Européens, les Asiatiques et les Africains, une pour chacun des fils de Noé, et les Indiens des Amériques ne correspondent à aucune de ces divisions. Maintenant que nous savons que ces païens peuvent être convertis, il est temps de réviser nos anciennes croyances et de les reconnaître comme des humains, avec des âmes, pour lesquels Dieu a un dessein."
 papacy_events.18.a:0 "Condamnons cela et assurons-nous que chaque Ravélien sache que c'est mal."
 papacy_events.18.b:0 "Leur dessein est l'esclavage."
 papacy_events.19.t:0 "Le Haut-Recteur condamne l'esclavage"
 papacy_events.19.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] a publié une nouvelle bulle rectorale, le Sublimis Deus, qui interdit l'asservissement des Indiens de l'Ouest et du Sud ainsi que de tous les autres peuples."
 papacy_events.19.a:0 "Accepter la bulle rectorale."
 papacy_events.19.b:0 "Refuser et poursuivre l'esclavage de ces peuples."
 papacy_events.20.t:0 "[From.GetName] suit le décret du Haut-Recteur"
 papacy_events.20.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] condamnera l'esclavage."
 papacy_events.20.a:0 "Excellent !"
 papacy_events.21.t:0 "[From.GetName] ignore le décret du Haut-Recteur"
 papacy_events.21.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] refuse de condamner l'esclavage des Indiens de l'Ouest et du Sud."
 papacy_events.21.a:0 "Comment peuvent-ils refuser ?!"
 papacy_events.22.t:0 "Procès de sorcières apostates"
 papacy_events.22.d:0 "Bien que courants dans les terres corinites frustes, les premiers Ravéliens se sont toujours enorgueillis d'être des gens de raison. Ces derniers temps, avec la fondation officielle de la foi, les masses font souvent preuve de très peu de tolérance envers les mages et les sorciers, surtout ceux qui semblent trop séculiers quant à l'idée que la magie est divine. De nombreux mages et personnes accusées de posséder des capacités magiques ont été marqués comme sorcières et apostats, adorateurs du Diable et menaces pour le monde ravélien. C'est allé si loin que des gens ont lynché des apostats présumés sans procès en bonne et due forme ni supervision de l'Inquisition !"
 papacy_events.22.a:0 "L'apostasie doit être traitée selon les règles !"
 papacy_events.22.b:0 "Nous n'interférerons pas, pas maintenant."
 papacy_events.22.c:0 "Envoyons un messager au Haut-Recteur pour demander conseil."
 papacy_events.22.e:0 "Ne rien faire à ce sujet."
 papacy_events.23.t:0 "Le Haut-Recteur condamne les procès de sorcières apostates"
 papacy_events.23.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] a envoyé un messager pour discuter des récentes chasses aux sorcières dans notre pays. Il condamne fermement les procès de sorcières, en particulier les lynchages qui se sont produits lorsque des gens souffrants ont pris sur eux de punir des sorcières présumées, dont beaucoup n'étaient même pas des mages. « La magie est divine, et doit être traitée et respectée par tous. Mais les mages apostats qui refusent de le faire doivent être traités par des officiels du Rectorat et des inquisiteurs compétents, non selon les caprices des masses. » Nous pouvons ne pas être d'accord avec ce sentiment, mais [From.Monarch.GetName] est [From.Monarch.GetTitle]..."
 papacy_events.23.a:0 "Arrêtons les chasses aux sorcières et les procès !"
 papacy_events.23.b:0 "Les sorcières apostates sont responsables de nos souffrances, cela ne peut pas s'arrêter !"
 papacy_events.24.t:0 "$FROMCOUNTRY$ met fin aux procès de sorcières apostates"
 papacy_events.24.tooltip:0 "Plus de procès de sorcières !"
 papacy_events.24.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] a mis fin aux chasses aux sorcières en $FROMCOUNTRY$ et a proclamé que le traitement des mages apostats est du ressort du Rectorat, non du peuple."
 papacy_events.24.a:0 "C'est merveilleux !"
 papacy_events.24.b:0 "Quoi ? Comment ose-t-[From.Monarch.GetSheHe] s'opposer à [Root.Monarch.GetTitle] ?"
 papacy_events.25.t:0 "$FROMCOUNTRY$ autorise les procès de sorcières"
 papacy_events.25.tooltip:0 "Des procès de sorcières pour tous !"
 papacy_events.25.d:0 "Les souffrances du peuple de [From.Monarch.GetTitle] [From.Monarch.GetName] ont endurci son cœur et les procès de sorcières continueront en $FROMCOUNTRY$."
 papacy_events.25.a:0 "Ce n'est pas ce que nous avons décrété !"
 papacy_events.25.b:0 "Excellent !"
 papacy_events.26.t:0 "Procès de sorcières en $FROMCOUNTRY$"
 papacy_events.26.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] demande conseil à [Root.Monarch.GetTitle] concernant les récentes chasses aux sorcières et procès. Le peuple de $FROMCOUNTRY$ accuse les famines, les maladies et autres événements malheureux d'être l'œuvre de la sorcellerie et de mages qui refusent de traiter la magie comme un pouvoir divin. Les souffrances ont conduit des femmes, des enfants et des hommes à être accusés d'adorer le Diable et de menacer le monde ravélien. Faut-il les interdire, ces chasses aux sorcières et ces procès, ou faut-il permettre au peuple de chasser, poursuivre, accuser et punir des gens qui peuvent être innocents ou non de sorcellerie ?"
 papacy_events.26.a:0 "Condamnons les chasses aux sorcières et les procès !"
 papacy_events.26.b:0 "Le peuple devrait être autorisé à poursuivre cette pratique."
 papacy_events.27.t:0 "[From.Monarch.GetTitle] : Condamner les procès de sorcières apostates"
 papacy_events.27.d:0 "Après avoir demandé conseil à [From.Monarch.GetTitle] [From.Monarch.GetName] sur toute cette affaire de sorcières, sur la question de savoir si nous devions ou non poursuivre nos chasses aux sorcières et nos procès, nous avons longtemps attendu la réponse. Elle est finalement arrivée, avec la signature de [From.Monarch.GetTitle] au bas du document officiel. « Cessez immédiatement les chasses aux sorcières et les procès ! »"
 papacy_events.27.a:0 "Nous obéissons."
 papacy_events.27.b:0 "Nous refusons."
 papacy_events.28.t:0 "[From.Monarch.GetTitle] : Autoriser les procès de sorcières"
 papacy_events.28.d:0 "Le message de [From.Monarch.GetTitle] était très clair : la sorcellerie et la magie noire doivent être poursuivies, les accusés jugés et les coupables punis pour leurs actes pécheurs. Car la magie est divine et c'est la volonté du peuple de veiller à ce que le monde la respecte. Tous ceux qui adorent le Diable, assistent aux sabbats de sorcières et menacent les Ravéliens brûleront en Enfer !"
 papacy_events.28.a:0 "Nous comprenons, et nous acceptons."
 papacy_events.28.b:0 "Non, nous refusons !"
 papacy_events.29.t:0 "Le Haut-Recteur du Rival"
 papacy_events.29.d:0 "L'ancien contrôleur du Rectorat est un rival de l'actuel, et il y a de nombreuses décisions, bulles rectorales et décrets du dernier [Root.Monarch.GetTitle] qui peuvent être annulés. Cela ternirait la réputation de l'ancien [Root.Monarch.GetTitle] et le ferait paraître incompétent, ce qui serait accueilli avec gratitude et approbation par notre contrôleur actuel du Rectorat."
 papacy_events.29.a:0 "Alors nous effacerons ses actes."
 papacy_events.29.b:0 "Chaque Haut-Recteur devrait être respecté, même les mauvais."
 papacy_events.30.t:0 "Rivalité entre Hauts-Recteurs"
 papacy_events.30.d:0 "Le précédent [From.Monarch.GetTitle] était contrôlé par l'un de nos rivaux, et si [From.Monarch.GetTitle] [From.Monarch.GetName] devait effacer le travail qu'il a accompli en annulant des décisions, en révoquant des bulles rectorales et en rejetant ses décrets, cela ternirait la réputation à la fois du précédent [From.Monarch.GetTitle] et de notre rival !"
 papacy_events.30.a:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] a effacé les décisions de l'ancien Haut-Recteur !"
 papacy_events.30.b:0 "Il n'a rien fait ?!"
 papacy_events.31.t:0 "Rivalité rectorale"
 papacy_events.31.d:0 "Le contrôleur actuel du Rectorat fait pression sur [From.Monarch.GetTitle] [From.Monarch.GetName] pour annuler les décisions, bulles rectorales et décrets du précédent [From.Monarch.GetTitle] dont nous étions le contrôleur du Rectorat. Cela ternirait notre réputation et celle de notre [From.Monarch.GetTitle], nous faisant tous deux paraître incompétents !"
 papacy_events.31.a:0 "Le sal... [From.Monarch.GetName] l'a vraiment fait !"
 papacy_events.31.b:0 "Heureusement, [From.Monarch.GetTitle] [From.Monarch.GetName] a refusé !"
 opinion_swiss_guard:0 "A envoyé la Garde Suisse"
 opinion_no_swiss_guard:0 "Pas de Garde Suisse"
 pap_swiss_guard:0 "La Garde Suisse"
 desc_pap_swiss_guard:0 "Disciplinés, loyaux et employant des tactiques de combat révolutionnaires, les Gardes Suisses sont les troupes les plus puissantes du monde."
 opinion_popes_pet:0 "Protégé du Haut-Recteur"
 mil_vatican_library:0 "La Bibliothèque du Vatican - Édition militaire"
 desc_mil_vatican_library:0 "Se concentrant sur les œuvres militaires et encourageant la recherche dans l'art de la guerre, la Bibliothèque du Vatican récemment fondée deviendra la plus grande collection de livres sur la guerre, les soldats, l'armée et les pratiques militaires au monde."
 dip_vatican_library:0 "La Bibliothèque du Vatican - Édition diplomatique"
 desc_dip_vatican_library:0 "Les diplomates sont encouragés à écrire sur leurs voyages, négociations et travail quotidien, qui seront ensuite publiés et ajoutés à la Bibliothèque du Vatican. À l'aide de ces œuvres, les érudits peuvent analyser et mener des recherches pour déterminer les diverses pratiques de la diplomatie et quand, comment et pourquoi elles fonctionnent le mieux."
 adm_vatican_library:0 "La Bibliothèque du Vatican - Édition administrative"
 desc_adm_vatican_library:0 "Une grande collection de livres, manuscrits et documents de toutes sortes, principalement sur les travaux administratifs, constitue le cœur de la nouvelle Bibliothèque du Vatican."
 pap_sistine_chapel:0 "La Chapelle Sixtine"
 desc_pap_sistine_chapel:0 "À l'emplacement où se dressait jadis l'ancienne Cappella Maggiore, décrépite et en ruines, se dresse maintenant la nouvelle et grandiose Chapelle Sixtine."
 pap_sistinechapel_botticelli:0 "Chapelle Sixtine décorée par Botticelli"
 desc_pap_sistinechapel_botticelli:0 "Les murs de la Chapelle Sixtine sont désormais décorés de fresques de Sandro Botticelli. Ses contributions sont les « Tentations du Christ », la « Punition des Rebelles » et l'« Épreuve de Moïse »."
 pap_sistinechapel_ghirlandaio:0 "Chapelle Sixtine décorée par Ghirlandaio"
 desc_pap_sistinechapel_ghirlandaio:0 "Le grand artiste Domenico Ghirlandaio faisait partie de l'équipe de peintres florentins et ombriens qui ont créé une série de fresques sur les murs de la Chapelle Sixtine représentant les vies de Moïse et de Jésus. Il a peint la « Vocation des Apôtres » et la « Résurrection du Christ »."
 pap_sistinechapel_perugino:0 "Chapelle Sixtine décorée par Perugino"
 desc_pap_sistinechapel_perugino:0 "Le peintre ombrien Pietro Perugino a peint le mur de l'autel de la Chapelle Sixtine avec l'« Assomption », la « Nativité » et « Moïse dans les Joncs ». Les fresques qu'il a peintes sur les murs étaient « Moïse et Séphora », le « Baptême du Christ » et la « Remise des Clefs »."
 pap_sistinechapel_michelangelo:0 "Chapelle Sixtine décorée par Michel-Ange"
 desc_pap_sistinechapel_michelangelo:0 "Michel-Ange a repeint le plafond de la Chapelle Sixtine, qui était auparavant orné d'étoiles dorées sur fond bleu. Il est maintenant peint avec des scènes de la Genèse, la Création, la Chute de l'Homme, la Promesse du Salut par les prophètes, et la généalogie du Christ."
 pap_sistinechapel_decorated:0 "Chapelle Sixtine décorée"
 desc_pap_sistinechapel_decorated:0 "Une équipe de peintres ombriens et florentins a peint les murs de la Chapelle Sixtine avec une série de fresques représentant les vies de Moïse et de Jésus."
 pap_indulgences:0 "Vente des Indulgences"
 desc_pap_indulgences:0 "La vente des indulgences apporte un revenu bienvenu à nos coffres et permet aux riches de sauver leurs âmes tout en continuant à vivre dans le péché."
 pap_simony:0 "Simonie"
 desc_pap_simony:0 "L'or provenant de la vente des offices et charges ecclésiastiques remplit nos coffres."
 pap_veneration_relics:0 "Vénération des Reliques"
 desc_pap_veneration_relics:0 "Les reliques de Saints, c'est-à-dire les restes physiques tels que les os ou les effets personnels, sont vendues par les églises et les enrichissent progressivement."
 disables_indulgences:0 "Cela désactive l'événement « Vente des Indulgences » pour les pays ravéliens."
 disables_simony:0 "Cela désactive l'événement « Simonie » pour les pays ravéliens."
 disables_veneration_of_relics:0 "Cela désactive l'événement « Vénération des Reliques » pour les pays ravéliens."
 opinion_condemn_slavery:0 "A condamné l'esclavage"
 opinion_allows_slavery:0 "Autorise l'esclavage"
 pap_condemn_slavery:0 "Condamnation de l'esclavage"
 desc_pap_condemn_slavery:0 "Le Haut-Recteur a décrété que la pratique abominable de l'esclavage devrait être interdite et que le commerce des esclaves devrait être déclaré hors-la-loi."
 opinion_condemn_witchtrials_good:0 "A condamné les procès de sorcières"
 opinion_condemn_witchtrials_bad:0 "A condamné les procès de sorcières"
 opinion_allows_witchtrials_good:0 "Autorise les procès de sorcières"
 opinion_allows_witchtrials_bad:0 "Autorise les procès de sorcières"
 RAZE_POWER_GAIN:0 "Gain de puissance par pillage"
 MODIFIER_LOOT_AMOUNT:0 "Vitesse de pillage"
 opinion_erased_rival_pope:0 "A effacé les décisions du Haut-Recteur rival"
 opinion_erased_pope:0 "A effacé les décisions de notre Haut-Recteur"
 opinion_not_erased_rival_pope:0 "N'a pas effacé les décisions du Haut-Recteur rival"
 opinion_not_erased_pope:0 "N'a pas effacé les décisions de notre ancien Haut-Recteur"
 opinion_veridical_nephew:0 "Véridique-Neveu"
 # Devotion Events
 devotion_events.1.t:0 "Hôpital général"
 devotion_events.1.d:0 "Une proposition a été faite d'établir un hôpital général, pour créer un lieu où les nécessiteux seraient accueillis et assistés. La santé publique est très importante, et offrir un cours de sage-femme gratuit ainsi que quelques établissements pour combattre la maladie améliorerait le bien-être de tous."
 devotion_events.1.a:0 "Si cela doit améliorer la santé publique, alors qu'attendons-nous ? Faisons-le !"
 devotion_events.1.b:0 "La prière résoudra tous leurs problèmes, ne gaspillons pas d'argent pour cela !"
 devotion_events.2.t:0 "Entretien des forts"
 devotion_events.2.d:0 "Nos forts sont la défense la plus importante que nous ayons contre les intrus et les ennemis, mais ils ont grand besoin de restauration. Nous devrions augmenter nos impôts pour financer cela, ce qui mécontentera certainement ceux qui paient des impôts."
 devotion_events.2.a:0 "Nous en avons besoin, ignorons la populace !"
 devotion_events.2.b:0 "Faisons ce qui est possible avec l'argent que nous avons déjà."
 devotion_events.3.t:0 "Modernisation des forts"
 devotion_events.3.d:0 "Les forts ne semblent plus sur le point de s'effondrer sous nos yeux, ils sont maintenant assez solides pour résister à la plupart des attaques contre leurs murs. Leurs défenses, bien que désormais fonctionnelles et impressionnantes malgré leur âge, sont encore insuffisantes comparées aux forts des autres nations. Nous devrions puiser profondément dans les poches de nos contribuables pour pouvoir financer les améliorations et la modernisation dont nos forts ont cruellement besoin."
 devotion_events.3.a:0 "C'est pour le bien commun... qui veut être envahi ?"
 devotion_events.3.b:0 "Ils sont assez bons tels qu'ils sont."
 devotion_events.4.t:0 "Impôts trop élevés"
 devotion_events.4.d:0 "Il est difficile d'entendre les citoyens se déchaîner contre les impôts augmentés depuis les hauts, très hauts murs et à l'intérieur des épaisses, très épaisses tours de nos forts restaurés, mais nous les entendons menacer de révolte et de rébellion si nous ne baissons pas les impôts."
 devotion_events.4.a:0 "Nous entendons, et nous obtempérons à contrecœur."
 devotion_events.4.b:0 "Quoi ? NOUS NE POUVONS PAS VOUS ENTENDRE !"
 devotion_events.5.t:0 "Embellissement des forts"
 devotion_events.5.d:0 "Un vitrail a été offert et placé dans l'un de nos forts, et l'effet est exquis. Si exquis, en fait, que nous envisageons d'embellir chaque fort que nous possédons avec notre emblème en vitrail."
 devotion_events.5.a:0 "La vanité est un péché, même pour un fort !"
 devotion_events.5.b:0 "Augmentons simplement les impôts pour payer cela."
 devotion_events.6.t:0 "La Quête de la Liberté Religieuse"
 devotion_events.6.d:0 "Un homme connu pour ses idées radicales sur les réformes religieuses condamne les prêtres et les doctrines [Root.Religion.GetName] dans ses sermons. Cela a conduit à de nombreuses plaintes et exigences de liberté religieuse de la part de nos citoyens peu loyaux."
 devotion_events.6.a:0 "Notre pays est [Root.Religion.GetName] et le sera toujours !"
 devotion_events.6.b:0 "Accorder la pleine liberté religieuse à la cité."
 devotion_events.7.t:0 "Fausses croyances"
 devotion_events.7.d:0 "L'un des buts de [Root.GovernmentName] est de répandre la foi [Root.Religion.GetName] et de la protéger de l'hérésie. C'est une noble cause, mais quand l'hérésie frappe au cœur même de notre pays, cela nous fait honte. L'une de nos provinces ne suit pas la foi [Root.Religion.GetName] et comme notre cause est de répandre la vraie foi, nous devons régler cela ou être à jamais honnis."
 devotion_events.7.a:0 "Envoyons des missionnaires et redoublons d'efforts pour convertir les hérétiques."
 devotion_events.7.b:0 "Alors nous serons honnis."
 devotion_events.8.t:0 "Falsification de documents"
 devotion_events.8.d:0 "C'était une défense courante contre l'annexion et l'usurpation que de falsifier des documents, les contrefaire ou les antidater pour corroborer ses arguments en temps de luttes pour l'expansion des terres ou des privilèges. Même aujourd'hui, ces méthodes douteuses sont utilisées, et nous nous demandons nous-mêmes si cette pratique pourrait nous être bénéfique. Espérons que personne ne détectera les incohérences..."
 devotion_events.8.a:0 "Falsifions ces documents."
 devotion_events.8.b:0 "Gardons cette ordure hors de nos archives !"
 devotion_events.8.ct:0 "La falsification pourrait être découverte..."
 devotion_events.9.t:0 "Documents falsifiés"
 devotion_events.9.d:0 "Malgré tous nos efforts pour dissimuler la falsification, la contrefaçon, les documents antidatés, nous avons été démasqués. Tout ce que nous voulions faire était de protéger [Root.Country.GetName] de ceux qui chercheraient à annexer et usurper nos provinces."
 devotion_events.9.a:0 "Soudoyons, faisons chanter, battons quiconque a laissé échapper ce secret !"
 devotion_events.10.t:0 "Le Noble local"
 devotion_events.10.d:1 "[Root.Heir.GetName] a rapidement gagné la confiance et la faveur du peuple de [Root.Country.GetName], en particulier des aristocrates locaux auxquels [Root.Heir.GetSheHe] appartenait avant de devenir l'héritier de [Root.Monarch.GetTitle]. Cela nous a aidés à regagner de l'autorité et notre emprise sur notre règne est plus grande que jamais."
 devotion_events.10.a:0 "Quelle chance pour nous de l'avoir choisi !"
 devotion_events.11.t:0 "Le Noble étranger"
 devotion_events.11.d:0 "En plus d'un grand sens de la diplomatie, de l'avancement militaire et de l'administration, l'héritier de [Root.Monarch.GetTitle], [Root.Heir.GetName], a également apporté des alliances et des connexions aux cours étrangères qui pourraient s'avérer indispensables."
 devotion_events.11.a:0 "Nous avions des doutes sur [Root.Heir.GetHerHim], mais ils sont depuis longtemps dissipés."
 devotion_events.12.t:0 "Le Fils du marchand"
 devotion_events.12.d:0 "Un esprit avisé pour les négociations et un talent pour le marchandage qui doit venir de ses parents marchands ont fait que les bourgeois, les paysans libres et les nobles de [Root.Country.GetName] respectent et craignent [Root.Heir.GetName]. Ils ne tenteront jamais de le duper dans quelque marché ou négociation que ce soit quand [Root.Heir.GetName] deviendra [Root.Monarch.GetTitle]."
 devotion_events.12.a:0 "Notre héritier n'est peut-être qu'un fils de marchand, mais [Root.Heir.GetSheHe] a fait ses preuves !"
 devotion_events.13.t:0 "Le Théologien talentueux"
 devotion_events.13.d:0 "Érudit dans la science des choses divines, le prochain [Root.Monarch.GetTitle] [Root.Heir.GetName] est capable d'utiliser diverses formes d'analyse et d'argumentation pour aider à comprendre, expliquer, défendre ou promouvoir de nombreux sujets religieux."
 devotion_events.13.a:0 "Nous savions dès le début qu'[Root.Heir.GetSheHe] gouvernerait [Root.Country.GetName] avec sagesse."
 devotion_events.14.t:0 "Le Prédicateur local"
 devotion_events.14.d:0 "Le peuple s'est réjoui quand le prédicateur local [Root.Heir.GetName] a été choisi comme héritier de [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.Country.GetName]. Se réjouissaient-ils parce qu'ils voyaient une fin à ses sermons constants, ou parce qu'ils croyaient en sa capacité à faire une différence en [Root.Country.GetName] ? Quoi qu'il en soit, le peuple soutient et fait confiance au prochain [Root.Monarch.GetTitle], [Root.Heir.GetName]."
 devotion_events.14.a:0 "[Root.Heir.GetName] avait le soutien du peuple, maintenant [Root.Heir.GetSheHe] a le nôtre."
 devotion_events.15.t:0 "Règne contesté"
 devotion_events.15.d:0 "Cela a commencé, comme toujours, par des rumeurs, des commérages et des regards furtifs emplis de mépris et de malveillance. Si cette contestation du règne de [Root.Monarch.GetTitle] [Root.Monarch.GetName] va trop loin, prétendant qu'[Root.Monarch.GetSheHe] n'a pas été élu correctement au siège de [Root.Country.GetName], les gens ne parleront plus mais pourraient tenter de le déposer !"
 devotion_events.15.a:0 "Comment cela est-il arrivé ?"
 devotion_events.16.t:0 "Pèlerinages et pratiques superstitieuses interdits"
 devotion_events.16.d:0 "L'attitude stricte et dictatoriale de [Root.Monarch.GetTitle] [Root.Monarch.GetName] a provoqué les paysans et bourgeois de [Root.Country.GetName] qui exigent que l'interdiction des pèlerinages et des pratiques superstitieuses soit levée. La rage émanant de ces simples d'esprit concernant des interdictions qui seront à terme bénéfiques pour tous n'est pas quelque chose à prendre à la légère."
 devotion_events.16.a:0 "Nous retirons notre décision, faites tous les pèlerinages que vous voulez !"
 devotion_events.16.b:0 "La décision est maintenue, et vous nous en remercierez plus tard !"
 devotion_events.17.t:0 "La Grande Querelle de [Root.GetName]"
 devotion_events.17.d:0 "Le grave conflit avec la cité de [Root.GetCapitalName] est allé trop loin ! Les citoyens ont fait prisonniers certains des vassaux de [Root.Owner.Monarch.GetTitle], et malgré tous nos efforts, en répondant par l'anathème et l'interdit, la cité résiste ! Ils ont commencé à renforcer les fortifications de la ville et combattront quiconque tentera de prendre la cité. Nous avons essayé d'ordonner à la ville de ramener les murs de la cité à leur taille précédente, mais ils refusent."
 devotion_events.17.a:0 "Continuons ainsi, ils céderont tôt ou tard."
 devotion_events.17.b:0 "Donnons-leur ce qu'ils veulent..."
 devotion_events.18.t:0 "Le Voyant fou"
 devotion_events.18.d:0 "Il prétend être un voyant qui a vu la gloire civique, la destruction de l'art et de la culture séculiers et le grand déluge qui purifiera [Root.Capital.GetName] de sa corruption. Le prédicateur fou appelle au renouveau [Root.Religion.GetName] et a institué une campagne puritaine extrême. En enrôlant l'aide des jeunes hommes de [Root.Capital.GetName], il risque de causer des troubles ou même de contester le droit de [Root.Monarch.GetTitle] [Root.Monarch.GetName] à régner !"
 devotion_events.18.a:0 "Assurons-nous qu'il soit réduit au silence, pour de bon !"
 devotion_events.18.b:0 "Ne reconnaissons ni ne réagissons à ses diatribes."
 devotion_events.19.t:0 "Un Conseil selon nos goûts"
 devotion_events.19.d:0 "À notre grand déplaisir mais sans surprise, la lutte perpétuelle entre [Root.Monarch.GetTitle] et chaque institution de [Root.Country.GetName], qu'elle soit ecclésiastique, éducative, juridique, médicale, fiscale, administrative ou de publication, ne fait qu'augmenter avec chaque nouvelle réforme suggérée. En plaçant des gens partageant nos idées dans les diverses institutions, peut-être cela persuadera-t-il la populace réticente de changer d'avis vers une forme plus adaptable."
 devotion_events.19.a:0 "Nous commencerons par nos propres conseillers."
 devotion_events.19.b:0 "Rappelons plus fermement aux gens qui est [Root.Monarch.GetTitle] de [Root.Country.GetName] !"
 devotion_events.20.t:0 "Le Conflit social et politique en [Root.GetName]"
 devotion_events.20.d:0 "Les aristocrates urbains et les guildes et les classes inférieures sont en proie à un conflit, que les conseillers de [Root.Owner.GetName] ont vu comme une opportunité de renforcer l'influence de [Root.Owner.Monarch.GetTitle] dans la cité de [Root.GetCapitalName]. L'encouragement des conseillers de [Root.Owner.Monarch.GetName] a fait se révolter les guildes contre les aristocrates et ils ont ouvert les portes de la ville pour permettre à l'armée de [Root.Owner.Monarch.GetTitle] [Root.Owner.Monarch.GetName] d'occuper la cité. C'est une excellente opportunité pour nous de soumettre la cité à [Root.Owner.Monarch.GetTitle] et de réduire les droits de la ville !"
 devotion_events.20.a:0 "Entrons et prenons la ville !"
 devotion_events.20.b:0 "Il n'y a pas besoin d'occupation. Nous possédons déjà la cité."
 devotion_events.21.t:0 "Les Séculiers parmi nous"
 devotion_events.21.d:0 "Chaque incident qui diminue notre dévotion envers [Root.Country.GetName] voit de plus en plus de problèmes approcher notre porte. Il y a ceux qui croient que les considérations religieuses devraient être exclues des affaires civiles, et leur nombre a grandi. Ils réclament le changement et souhaitent que nous sécularisions notre gouvernement."
 devotion_events.21.a:0 "Qu'il en soit ainsi."
 devotion_events.21.b:0 "Cette mesure drastique ne sera pas prise pour l'instant."
 devotion_events.22.t:0 "La Décadence règne"
 devotion_events.22.d:1 "Désabusés par ce qu'ils perçoivent comme de la corruption et de la décadence, les fidèles ont cessé de nous envoyer des dons et refusent de se porter volontaires pour combattre dans nos armées en tant que rempart de la foi [Root.Religion.GetName]."
 devotion_events.22.a:0 "C'est un désastre, un pur désastre !"
 devotion_events.23.t:0 "[Root.Monarch.GetTitle] corrompu"
 devotion_events.23.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est devenu corrompu, se concentrant sur ses objectifs personnels plutôt que sur le bien de la foi. Notre peuple est désabusé de lui."
 devotion_events.23.a:0 "Ignorons la dépravation de [Root.Monarch.GetTitle]."
 devotion_events.23.b:0 "Essayons de faire un changement."
 devotion_events.24.t:0 "Volontaires pour le Combat sacré"
 devotion_events.24.d:0 "Inspirés par notre cause sacrée, des volontaires du monde [Root.Religion.GetName] sont arrivés pour aider à porter le combat contre les infidèles et répandre la vraie foi !"
 devotion_events.24.a:0 "Merveilleux ! Quelle magnifique initiative."
 devotion_events.25.t:0 "Le Nouveau Monarque"
 devotion_events.25.d:0 "La vie de [Root.Monarch.GetTitle] n'a pas été comme vous l'imaginiez, le pouvoir que vous exercez est moindre que celui d'un roi ou d'un duc, d'un calife ou même d'un émir. La pression de toujours devoir adhérer aux règles strictes et aux lois de la foi [Root.Religion.GetName] et de les faire respecter vous a épuisé. Serait-il peut-être temps, comme le suggèrent certains de vos conseillers, de séculariser [Root.Country.GetName] et de devenir un souverain d'un autre nom ?"
 devotion_events.25.a:0 "Oui, que mon front soit plutôt alourdi par une couronne."
 devotion_events.25.b:0 "Non, je conserverai le titre de [Root.Monarch.GetTitle]."
 devotion_events.26.t:0 "Le Réformateur influent"
 devotion_events.26.d:0 "Une personne pragmatique, bien versée dans l'art de la rhétorique, le prochain souverain [Root.Heir.GetName] utilise déjà ses pouvoirs pour le bien, répandant ses idées à quiconque veut écouter : les membres de la haute société sont désireux de prouver leur intellect auprès de [Root.Heir.GetHerHim], tandis que d'autres sont simplement fascinés par ce bel individu. Quelle qu'en soit la raison, il y a clairement quelque chose de spécial chez [Root.Heir.GetName], car même les gens habituellement complètement désintéressés de la politique se retrouvent à prendre part à la discussion."
 devotion_events.26.a:0 "[Root.Heir.GetSheHeCap] pourrait être exactement ce dont [Root.Country.GetName] a besoin."
 # Christian Theocracies
 devotion_events.100.t:0 "Conflit entre la Cité et [Root.GovernmentName]"
 devotion_events.100.d:0 "La longue rivalité entre [Root.GovernmentName] et l'une de nos cités a endommagé les relations entre nous pendant de nombreuses années. La cité cherche à se libérer de l'autorité de [Root.Monarch.GetTitle] [Root.Monarch.GetName], et a refusé d'abriter nos [Root.Monarch.GetTitle]s en temps de troubles et de guerre."
 devotion_events.100.a:0 "Tôt ou tard, ils reviendront à la raison."
 devotion_events.100.b:0 "Faisons respecter notre autorité !"
 devotion_events.101.t:0 "La Lanterne de Lumière"
 devotion_events.101.d:0 "L'odieux livre hérétique « La Lanterne de Lumière » prétend que la cause principale de la persécution des premiers chrétiens était la rétention illégale de biens précieux par les prêtres. Il va également jusqu'à comparer les sièges des archiprévôts ou prévôts à ceux de l'Antéchrist. Ce livre a été trouvé en possession d'un hérétique relaps qui, malgré de nombreuses années de prison et de nombreuses abjurations larmoyantes, semble toujours refuser de changer ses habitudes."
 devotion_events.101.a:0 "Condamnons l'hérétique à la prison une fois de plus."
 devotion_events.101.b:0 "Brûlons l'hérétique."
 devotion_events.102.t:0 "Impôts injustes"
 devotion_events.102.d:0 "L'une de nos cités s'est vu accorder le privilège d'élire son propre conseil et maire, ce qui a bien sûr conduit à une lutte constante entre eux et les [Root.Monarch.GetTitle]s. Outre cette lutte pour le pouvoir dans la cité, cela a causé des troubles car les bourgmestres et conseillers municipaux lèvent des impôts injustes. Nous avons besoin d'un moyen rapide pour affirmer notre autorité et reprendre le contrôle de cette cité, mais sans alerter les coupables de nos intentions."
 devotion_events.102.a:0 "Invitons-les à un dîner de gala et arrêtons-les là-bas !"
 devotion_events.102.b:0 "Cela perturberait la stabilité de notre royaume, mieux vaut éviter."
 devotion_events.103.t:0 "Le Dîner de gala"
 devotion_events.103.d:0 "Le festin est somptueux, comme il se doit. Nourriture et boissons sont abondantes, personne ne partira sans le ventre plein et une gueule de bois en perspective. Le maire et les conseillers boivent abondamment et ne pourront résister aux mains fermes et sobres des gardes. L'animosité entre [Root.Monarch.GetTitle] [Root.Monarch.GetName] et le conseil de la cité semble s'être dissipée au cours des nombreux plats du dîner de gala. Devons-nous poursuivre le plan d'arrêter le maire et les conseillers ?"
 devotion_events.103.a:0 "Arrêtons-les et forçons-les à renoncer à leurs droits."
 devotion_events.103.b:0 "Nous avons clairement réussi à améliorer les relations, pas besoin de faire quoi que ce soit de précipité."
 devotion_events.104.t:0 "Le Bûcher des Vanités"
 devotion_events.104.d:0 "Il y a un prédicateur vigoureux à [Root.Capital.GetCapitalName] dont les sermons en plein air sur les tentations des objets de vanité ont conduit ses partisans à collecter et brûler des cosmétiques, des œuvres d'art, des livres jugés immoraux et des instruments de musique. Il vitupère sur la façon dont ces objets pourraient tenter quelqu'un à pécher et exhorte les gens, en particulier les artistes célèbres de [Root.Country.GetName], à apporter les choses qu'il juge immorales à ses bûchers."
 devotion_events.104.a:0 "Arrêtons cet homme !"
 devotion_events.104.b:0 "Laissons-le continuer, mais sauvons les œuvres d'art."
 devotion_events.105.t:0 "L'Aiguille de l'Évêque"
 devotion_events.105.d:0 "La cité fortifiée de [Root.Province.GetName] ne permet aux [Root.Owner.Monarch.GetTitle]s de [Root.Country.GetName] d'entrer que par une porte très étroite appelée Acus Episcopi ou l'Aiguille de l'Évêque. L'étroitesse de la porte rend impossible l'entrée accompagnée de chevaliers, et les gardes de la cité refusent de laisser les soldats de [Root.Owner.Monarch.GetTitle] [Root.Owner.Monarch.GetName] entrer par les portes normales de la ville."
 devotion_events.105.a:0 "Forçons les portes de la cité ! Personne ne nous empêchera d'entrer dans notre propre ville."
 devotion_events.105.b:0 "Acceptons à contrecœur les règles de la cité."
 devotion_events.106.t:0 "Pouvoir partagé"
 devotion_events.107.t:0 "Jubilé à [Root.Capital.GetName]"
 devotion_events.107.d:0 "Un jubilé, une année sainte, implique un pèlerinage vers un site sacré tel que Rome ou notre propre capitale. C'est une année spéciale de rémission des péchés et de pardons universels, quelque chose que le Haut-Recteur convoque habituellement tous les 25 ou 50 ans, mais qui dit que nous ne pouvons pas convoquer notre propre jubilé à [Root.Capital.GetName] ?"
 devotion_events.107.a:0 "Une excellente idée : nous approuvons !"
 devotion_events.107.b:0 "Pas cette année, peut-être la prochaine ?"
 devotion_events.108.t:0 "Jubilé à [From.Capital.GetName]"
 devotion_events.108.d:0 "[From.Monarch.GetTitle] de [From.Country.GetName] a convoqué un jubilé à [From.Capital.GetName], une année sainte de rémission des péchés et de pardons universels. C'est une tradition chrétienne qui remonte à 1300, quand le Haut-Recteur Boniface VIII a convoqué une année sainte à Rome."
 devotion_events.108.a:0 "Cela devrait nous être réservé, tous les souverains chrétiens ne devraient pas avoir ce droit !"
 devotion_events.108.b:0 "C'est une merveilleuse idée !"
 devotion_events.109.t:0 "[From.Monarch.GetTitle] réagit au Jubilé à [Root.Capital.GetName]"
 devotion_events.109.d:0 "La tradition des jubilés a commencé quand le Haut-Recteur Boniface VIII a convoqué une année sainte à Rome en 1300. [From.Monarch.GetTitle] [From.Monarch.GetName] nous a envoyé un messager quand la nouvelle du jubilé à [Root.Capital.GetName] lui est parvenue, et nous craignons sa réaction..."
 devotion_events.109.a:0 "...et cela ne lui plaît pas, pas du tout."
 devotion_events.109.b:0 "...mais nous n'avions pas à nous inquiéter. Il approuve !"
 devotion_events.110.t:0 "Le Protégé du Rectorat"
 devotion_events.110.d:0 "Avoir [PAP.Monarch.GetTitle] [PAP.Monarch.GetName] comme mentor a développé toute la personne de [Root.Heir.GetName]. La sagesse de [PAP.Monarch.GetTitle] a guidé [Root.Heir.GetName] et lui a valu le respect et la dévotion du peuple de [Root.Country.GetName]."
 devotion_events.110.a:0 "[PAP.Monarch.GetTitle] croyait en [Root.Heir.GetHerHim], et maintenant nous aussi."
 devotion_events.117.t:0 "Confiscation d'une église réformée"
 devotion_events.117.d:0 "Un abbé a confisqué une église réformée ! Son action n'a pas été sanctionnée par [Root.Monarch.GetTitle] [Root.Monarch.GetName], et si nous avions été au courant de ses intentions, nous aurions persuadé l'abbé de choisir un autre bâtiment pour sa chapelle. Cela a bien sûr contrarié le peuple de la province concernée, et même si nous avons forcé l'abbé à rendre l'église, les paysans et bourgeois furieux n'oublieront pas l'affront."
 devotion_events.117.a:0 "Que veulent-ils de plus ?"
 devotion_events.118.t:0 "Hallesches Heilthum"
 devotion_events.118.d:0 "Le défunt [Root.Monarch.GetTitle] craignait pour sa paix d'esprit au paradis et a collecté de nombreuses reliques pour s'assurer qu'il passerait le moins de temps possible au purgatoire. Ces 8 100 reliques et 42 squelettes saints ont été récemment trouvés, cachés dans divers endroits de l'ancienne résidence de [Root.Monarch.GetTitle]."
 devotion_events.118.a:0 "La vente d'indulgences est ce qui a déclenché la foi [Root.Religion.GetName] ! Gardons-les cachées."
 devotion_events.118.b:0 "Faisons-leur de la place. Je me demande si [Root.Monarch.GetTitle] est entré au paradis..."
 devotion_events.119.t:0 "La Rumeur de la Tête de Rosse"
 devotion_events.119.d:0 "Les chuchotements et les regards vers [Root.Monarch.GetTitle] [Root.Monarch.GetName] quand [Root.Monarch.GetSheHe] parcourt les rues de [Root.Capital.GetName] sont causés par une rumeur troublante. Les gens croient réellement que [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'a pas été consacré solennellement, mais a plutôt été consacré avec une Bible pressée contre son cou à l'intérieur d'une taverne de mauvaise réputation !"
 devotion_events.119.a:0 "Ignorons l'affaire et prions pour qu'elle disparaisse."
 devotion_events.119.b:0 "Nions-le avec ferveur."
 dev_confiscated_reformed_church:0 "Église réformée confisquée"
 desc_dev_confiscated_reformed_church:0 "La confiscation d'une église réformée par un abbé a grandement contrarié les paysans et les bourgeois, même si elle a été restituée."
 # Muslim Theocracies
 devotion_events.200.t:0 "L'Imam Khatib local"
 devotion_events.200.d:0 "[Root.Heir.GetName] était le guide des prières dans la mosquée et prédicateur lors de la prière du vendredi avant d'être choisi pour gouverner [Root.Country.GetName] après [Root.Monarch.GetTitle] [Root.Monarch.GetName]. La communauté locale qui l'avait élu comme Imam Khatib sera triste de voir [Root.Heir.GetName] partir, car peu d'autres sont aussi savants et vertueux que lui pour instruire la congrégation dans les bases de l'Islam. Quand il partira, les questions religieuses devront désormais être posées à quelqu'un d'inférieur à [Root.Heir.GetName], mais ce qu'ils perdront, nous le gagnerons."
 devotion_events.200.a:0 "Nous avons été sages de choisir [Root.Heir.GetName] comme prochain [Root.Monarch.GetTitle]."
 devotion_events.201.t:0 "Les Principes directeurs"
 devotion_events.201.d:0 "Certains pourraient soutenir que l'Al-Shura fait partie de la structure dirigeante, mais n'en est pas l'un des piliers. Les réunions devraient suivre les enseignements de l'Islam, les consultations les directives du Coran et de la Sunna. Le chef devrait être élu parmi les participants pour diriger la réunion. Les discussions sont basées sur la mushawarah et la mudhakarah, la délibération et le consensus. Chacun peut exprimer ses opinions et les voix de la majorité sont acceptées, tant que cela ne viole pas les enseignements du Coran et de la Sunna."
 devotion_events.201.a:0 "Faisons-en l'un des piliers."
 devotion_events.201.b:0 "Cela semble être un moyen facile d'administrer notre pays."
 devotion_events.202.t:0 "Cœur de Miséricorde"
 devotion_events.202.d:0 "Ali, cousin du Prophète, a dit un jour : « Emplis ton cœur de miséricorde, d'amour et de bonté pour tes sujets. Ne sois pas face à eux un animal vorace, les comptant comme une proie facile, car ils sont de deux sortes : soit ils sont tes frères en religion, soit ils sont tes égaux dans la création. L'erreur les prend au dépourvu, les déficiences les submergent, les mauvaises actions et les péchés sont commis par eux intentionnellement et par erreur. Accorde-leur donc ton pardon et ton indulgence dans la même mesure que tu espères que Dieu t'accordera Son pardon et Son indulgence. Car tu es au-dessus d'eux, et celui qui t'a nommé est au-dessus de toi, et Dieu est au-dessus de celui qui t'a nommé. Dieu t'a demandé de satisfaire leurs besoins et Il te met à l'épreuve par eux. »\nUne leçon précieuse peut être tirée de ces paroles, que nous pourrions nous consacrer à suivre, ou trouver des moyens d'incorporer dans notre administration."
 devotion_events.202.a:0 "Inch'Allah."
 devotion_events.202.b:0 "Sages paroles que nous suivrons."
 devotion_events.203.t:0 "Bayt al-Mal"
 devotion_events.203.d:0 "La Maison des Richesses administre les impôts et sert de trésorerie qui gère les finances personnelles et les dépenses gouvernementales. Elle administre également la zakat, l'impôt que chaque musulman aisé paie et qui sera distribué à ceux dans le besoin, aux sans-emploi, aux blessés ou autrement incapables de travailler. Cette dernière année, quels que soient les problèmes qu'a eus [Root.Country.GetName], les habitants en ont eu une meilleure. Le montant de zakat qui afflue vers le Bayt al-Mal dépasse toutes les attentes que nous aurions pu avoir. Que devons-nous faire de cet excédent de couronnes ?"
 devotion_events.203.a:0 "L'argent va dans nos grands coffres."
 devotion_events.203.b:0 "Il ira aux pauvres et aux nécessiteux, comme toujours."
 devotion_events.204.t:0 "L'Éducation des femmes"
 devotion_events.204.d:1 "Mahomet, paix soit sur lui, a loué les femmes des ansar car la pudeur ne les empêchait pas d'apprendre l'Islam. Fatima al-Fihir, qui a fondé l'Université d'al-Karaouine, Lubna de Cordoue, la mathématicienne accomplie, et Fatima b. Abi al-Qasim 'Abd al-Rahman b. Muhammad b. Ghalib al-Ansari al-Sharrat dont les œuvres de théorie juridique, de jurisprudence ainsi que de mysticisme montrent sa grande connaissance des sciences islamiques, sont tous de grands exemples de ce qui se passe quand on éduque les femmes. À travers l'histoire, les femmes ont montré qu'elles sont désireuses et capables d'apprendre l'Islam et de continuer le travail de propagation de la foi [Root.Religion.GetName]. En donnant aux femmes cette grande opportunité d'apprendre et d'enseigner, nous pourrons répandre notre foi beaucoup plus rapidement."
 devotion_events.204.a:0 "L'éducation devrait être pour tous, hommes et femmes."
 devotion_events.204.b:0 "C'est une question sur laquelle nous devons réfléchir avant de décider quoi que ce soit."
 devotion_events.205.t:0 "Le Bazar"
 devotion_events.205.d:0 "[Root.Capital.GetName] attire des marchands et des négociants du monde entier, et le bruit et l'odeur des animaux stressés, les voix marchandant, l'odeur des épices et toutes les couleurs des vêtements, des tissus et des tapis vendus ici peuvent être accablants. Une zone au centre du bazar a été laissée intacte, destinée à une mosquée, mais comme le bazar est devenu de plus en plus fréquenté, cet espace pourrait être mieux utilisé pour plus d'étals de marché."
 devotion_events.205.a:0 "Accordons plus d'espace aux marchands."
 devotion_events.205.b:0 "Faisons-en un lieu de culte."
 devotion_events.206.t:0 "Purification religieuse"
 devotion_events.206.d:0 "Mahomet lui-même a brisé des idoles quand il a repris La Mecque, et nous avons été encouragés par nos conseillers à imiter l'exemple du prophète, à purifier [Root.Country.GetName] et à ramener l'Islam à ses débuts simples. L'idolâtrie est interdite, mais les gens font encore des pèlerinages vers des sanctuaires sacrés et prient sur des tombes en [Root.Province.GetName]. Est-ce haram, un péché, ou devraient-ils être pardonnés ?"
 devotion_events.206.a:0 "Purifions cette province de ses péchés !"
 devotion_events.206.b:0 "Ce n'est pas haram, mais mubah : non recommandé mais pas pécheur non plus."
 devotion_events.207.t:0 "Le Gouverneur corrompu"
 devotion_events.207.d:0 "Chaque gouverneur voit ses actifs financiers et autres détails enregistrés avant sa nomination. Ceux-ci sont ensuite conservés dans un bureau spécial, pour n'être examinés que chaque année lors des vérifications des écarts dans les finances. C'est pour éviter la corruption et les pots-de-vin, mais parfois le système échoue."
 devotion_events.207.a:0 "Donnons son poste à quelqu'un de plus qualifié et moins enclin aux pots-de-vin."
 devotion_events.207.b:0 "Je t'avais envoyé comme gouverneur, pas comme marchand !"
 devotion_events.207.c:0 "Ignorons l'affaire."
 devotion_events.208.t:0 "Un Kafir à notre Cour"
 devotion_events.208.d:0 "$THEOLOGIAN$$INQUISITOR$$PHILOSOPHER$$NATURAL_SCIENTIST$ a contrarié le mauvais fidèle [Root.Religion.GetName] avec une déclaration qui pourrait être interprétée comme si le conseiller avait sciemment abandonné l'Islam. Avant que nous puissions interrompre la discussion et peut-être sauver $THEOLOGIAN$$INQUISITOR$$PHILOSOPHER$$NATURAL_SCIENTIST$ de toute accusation, des déclarations le qualifiant de kafir, d'incroyant, avaient été faites."
 devotion_events.208.a:0 "Ignorons-le, excusons-le, oublions-le."
 devotion_events.208.b:0 "Essayons de trouver une solution à cela."
 devotion_events.208.c:0 "Renvoyons le conseiller."
 devotion_events.209.t:0 "Un Coup d'État contre la Décadence"
 devotion_events.209.d:1 "Les plaintes concernant la débauche de [Root.Monarch.GetTitle] [Root.Monarch.GetName], ses manières décadentes et son refus de restaurer le prestige de l'Islam sont devenues de plus en plus courantes. Les paysans murmurent avec colère que [Root.Monarch.GetName] passe ses jours à dormir et ses nuits avec des esclaves et des musiciens. L'imam de [Root.Capital.GetName] a nommé [Root.Monarch.GetTitle] dans les prières publiques, les paysans lui ont même jeté des pierres !"
 devotion_events.209.a:0 "Je promets de changer mes habitudes."
 devotion_events.209.b:0 "Les paysans peuvent proférer tous les reproches qu'ils veulent, mais je suis [Root.Monarch.GetTitle] !"
 devotion_events.210.t:0 "Les Rafida"
 devotion_events.210.d:1 "Les Chiites, ceux que nous appelons les rafida, qui rejettent l'autorité et le leadership islamiques, qui ne reconnaissent pas Abu Bakr, Omar et Uthman comme successeurs du prophète Mahomet, paix soit sur lui, ont fait connaître leur présence dans nos provinces et en ont attiré d'autres à les rejoindre. Ils s'appellent même Rawafid, ceux qui refusent, et sont fiers d'avoir toujours rejeté le mal, de ne jamais s'être tournés vers lui."
 devotion_events.210.a:0 "Ne perdons pas de temps, expulsons-les de [Root.Country.GetName] !"
 devotion_events.210.b:0 "Qu'ils croient et s'appellent comme ils le souhaitent."
 devotion_events.211.t:0 "Les Nasibi"
 devotion_events.211.d:0 "Ceux que nous appelons les nasibi, ceux qui haïssent l'Ahl Al-Bayt, la Famille du prophète Mahomet, et qui haïssent leurs adeptes, ont émergé dans nos provinces. Les Sunnites qui croient follement qu'Abu Bakr, Omar et Uthman sont les successeurs légitimes de Mahomet, paix soit sur lui, menacent l'uniformité religieuse de [Root.Country.GetName]."
 devotion_events.211.a:0 "Les Sunnites n'ont pas leur place en [Root.Country.GetName]."
 devotion_events.211.b:0 "Laissons-les tranquilles, ils réaliseront un jour leur erreur."
 devotion_events.212.t:0 "La Malhonnêteté au Majlis"
 devotion_events.212.d:0 "Le conseil a convoqué une réunion, un majlis, pour discuter de questions importantes et urgentes en [Root.Country.GetName]. Bien que leurs visages fussent honnêtes, leurs paroles vraies, leurs intentions étaient fourbes et malhonnêtes ! Argent gaspillé, prestige perdu, et les espoirs d'un majlis juste pour le bien de [Root.Country.GetName] brisés et anéantis."
 devotion_events.212.a:0 "Faisons ce que nous pouvons pour panser cette blessure à notre orgueil."
 devotion_events.212.b:0 "Nous leur faisions confiance et ils nous ont trahis."
 devotion_events.212.c:0 "Je me blâme d'avoir été trop naïf."
 devotion_events.213.t:0 "Conseiller accusé de Shirk"
 devotion_events.213.d:0 "Le travail d'un conseiller vous expose à différentes cultures, religions et traditions. Nous avons toujours choisi de détourner le regard des habitudes particulières de $STATESMAN$$TRADER$$DIPLOMAT$$COLONIAL_GOVERNOR$ et de l'obsession que notre conseiller a pour les manuscrits enluminés et les miniatures. Bien que nos soupçons aient grandi quand nous avons entendu des commérages et des récits de serviteurs et de gens de la cour, nous n'aurions jamais anticipé l'expression sur le visage de $STATESMAN$$TRADER$$DIPLOMAT$$COLONIAL_GOVERNOR$ quand l'imam l'a accusé de shirk, de pratiquer l'idolâtrie !"
 devotion_events.213.a:0 "Retirons $STATESMAN$$TRADER$$DIPLOMAT$$COLONIAL_GOVERNOR$ de la cour, immédiatement !"
 devotion_events.213.b:0 "Rejetons cette notion : $STATESMAN$$TRADER$$DIPLOMAT$$COLONIAL_GOVERNOR$ est un bon conseiller."
 devotion_events.214.t:0 "Abolir l'idolâtrie ?"
 devotion_events.214.d:0 "« Votre autorité est contestée », dit votre conseiller, « et le peuple doute de votre piété. Vous devez faire quelque chose pour établir une souveraineté religieuse et politique ! L'idolâtrie est haram, mais votre peuple offre toujours des prières à des figures saintes, fait des pèlerinages vers des tombes et des mosquées, vénère des arbres, des grottes et même des pierres. Montrez votre force religieuse, abolissez ces choses et saisissez le pouvoir qui est légitimement le vôtre ! »"
 devotion_events.214.a:0 "Allons-y, interdisons un tas de choses."
 devotion_events.214.b:0 "Pourquoi se donner cette peine ?"
 devotion_events.215.t:0 "Impôts ou Agriculture"
 devotion_events.215.d:0 "Le peuple de [Root.Country.GetName] est composé de nomades et de paysans qui vivent de ce que la terre fournit. Nos gouverneurs ont besoin que nous décidions sur quoi nous devons nous concentrer, les impôts ou l'agriculture ? Un conseiller affirme que le développement des terres est plus important que la collecte de l'impôt. L'impôt ne peut être obtenu que par le développement des terres, et exiger l'impôt sans le faire ruinera [Root.Country.GetName] et détruira son peuple. Un autre affirme que les gens développeront les terres sans interférence si l'impôt est exigé d'eux et qu'ils voient une raison derrière cette exigence."
 devotion_events.215.a:0 "Concentrons-nous sur les impôts."
 devotion_events.215.b:0 "Concentrons-nous sur l'agriculture."
 devotion_events.215.c:0 "Essayons de trouver un équilibre entre les deux."
 devotion_events.216.t:0 "Réformes des Pieux"
 devotion_events.216.d:0 "Après de nombreuses réunions, discussions et majlis, nos ministres et conseillers nous ont apporté différentes réformes à considérer. Chacun a présenté ses idées, et nous devons choisir entre deux d'entre elles. La première : exclure les fonctionnaires d'État, tels que les diplomates et les gouverneurs, de toute activité commerciale. Cela pour leur permettre de se concentrer pleinement sur leur travail et sur rien d'autre, leur permettant ainsi, espérons-le, de faire un meilleur travail. La deuxième réforme : distribuer les pâturages et les réserves de chasse qui sont maintenant réservés à la famille des dignitaires parmi les pauvres, pour cultiver les terres. Le travail non rémunéré devrait également être rendu illégal."
 devotion_events.216.a:0 "Excluons les fonctionnaires d'État de toute activité commerciale."
 devotion_events.216.b:0 "Distribuons les terres aux pauvres."
 devotion_events.216.c:0 "Ne choisissons aucune d'entre elles."
 devotion_events.217.t:0 "Nouvelles Écoles"
 devotion_events.217.d:0 "Chaque province, et chaque cité, devrait avoir au moins une madrassa, une école religieuse avec une éducation gratuite, une nourriture délicieuse, des livres gratuits et même des allocations fournies à chaque étudiant. Il devrait y avoir des examens annuels, et les étudiants qui ont excellé devraient recevoir des prix et être recommandés pour des postes élevés et honorables. Celles-ci devraient-elles enseigner le Hadith, les enseignements, actes et paroles du prophète Mahomet, paix soit sur lui, ou devraient-elles enseigner le Fiqh et l'Iman, la théologie et la croyance ?"
 devotion_events.217.a:0 "Des madrassas pour enseigner le Hadith."
 devotion_events.217.b:0 "Des madrassas pour enseigner le Fiqh et l'Iman."
 devotion_events.217.c:0 "Deux madrassas, une pour enseigner le Hadith, et une pour le Fiqh et l'Iman."
 devotion_events.217.e:0 "Nous ne pouvons pas nous permettre d'écoles pour le moment."
 devotion_events.218.t:0 "Le Sulh"
 devotion_events.218.d:0 "Deux parties en conflit sont venues à vous. Elles vous demandent de servir de médiateur dans le conflit et présentent des documents, des témoins et d'autres preuves. Vous examinez le matériel fourni tout en réfléchissant à la manière de déclarer une hudna, une trêve, et à la façon dont le règlement devrait être élaboré afin de préserver l'honneur et le statut des deux parties. Ce litige de propriété n'est pas le premier que vous devez régler, mais c'est un cas rare et sensible qui doit être résolu de manière à éviter un cycle de vengeance. Les deux ont des revendications qui devraient leur donner droit à la terre, mais laquelle est vraie et laquelle est fausse ?"
 devotion_events.218.a:0 "Donnons à cet homme toute la terre."
 devotion_events.218.b:0 "Divisons la terre en deux."
 devotion_events.218.c:0 "Ordonnons-leur de régler ce conflit mesquin ailleurs."
 devotion_events.219.t:0 "Le Qadi, la Hisbah et le Muhtasib"
 devotion_events.219.d:0 "Peu de mois après que vous avez nommé un Qadi, un juge statuant conformément à la Charia, il vient à vous le front plissé et les yeux anxieux. Il vous parle de la décadence de votre peuple, de leurs crimes et de leurs manières impies. Il vous rappelle sévèrement la Hisbah, votre devoir divinement sanctionné d'intervenir et d'ordonner le bien et d'interdire le mal. Les lois d'Allah doivent être suivies. Votre peuple a besoin de mutaweens, une police religieuse, pour faire respecter la Charia."
 devotion_events.219.a:0 "Trouvons des volontaires et formons-les pour devenir des Muhtasibs."
 devotion_events.219.b:0 "Je ne pense pas que ce soit la bonne façon de traiter cela."
 dev_general_hospital:0 "Hôpital général"
 desc_dev_general_hospital:0 "Le nouvel Hôpital général avec son cours de sage-femme gratuit et ses établissements pour combattre la maladie a amélioré la santé publique et le bien-être de vos compatriotes."
 dev_fort_maintenance:0 "Entretien des forts"
 desc_dev_fort_maintenance:0 "Nos cités contribuent financièrement à l'entretien de nos forts."
 dev_heretical_expulsion:0 "Expulsion des Hérétiques"
 desc_dev_heretical_expulsion:0 "Vous avez expulsé les Hérétiques de cette province."
 opinion_jubilee_good:0 "Le Haut-Recteur approuve le Jubilé"
 opinion_jubilee_bad:0 "Le Haut-Recteur désapprouve le Jubilé"
 dev_jubilee:0 "Jubilé"
 desc_dev_jubilee:0 "Un jubilé est une année sainte de rémission des péchés et de pardon universel où les gens partent en pèlerinage vers les cités saintes."
 theocracy.1.tt:0 "Ce choix peut influencer d'autres événements."
 opinion_confiscated_church:0 "Église réformée confisquée"
 dev_religious_cleansing:0 "Purification religieuse"
 desc_dev_religious_cleansing:0 "Nous cherchons à ramener l'Islam à ses débuts simples, et à imiter Mahomet quand il a repris La Mecque et brisé les idoles."
 dev_rafida:0 "Les Rafida"
 desc_dev_rafida:0 "Les Chiites sont parfois appelés les Rafida, ceux qui refusent, car ils refusent de reconnaître Abu Bakr, Omar et Uthman comme successeurs du prophète Mahomet."
 dev_nasibi:0 "Les Nasibi"
 desc_dev_nasibi:0 "Ennemis de l'Ahl Al-Bayt, la Famille du prophète Mahomet, et de leurs adeptes, le groupe religieux sunnite croit follement qu'Abu Bakr, Omar et Uthman sont les successeurs légitimes de Mahomet."
 dev_idolatry_abolished:0 "Idolâtrie abolie"
 desc_dev_idolatry_abolished:0 "Les prières aux figures saintes, les pèlerinages aux tombes et aux mosquées, la vénération des arbres, des grottes et des pierres sont désormais abolis."
 dev_focus_taxes:0 "Priorité aux impôts"
 desc_dev_focus_taxes:0 "Les gouverneurs ont reçu l'instruction de se concentrer sur les impôts, pas très pieux mais très efficace."
 dev_focus_agriculture:0 "Priorité à l'agriculture"
 desc_dev_focus_agriculture:0 "Les gouverneurs ont reçu l'instruction de se concentrer sur l'agriculture, très pieux et espérons-le efficace avec le temps."
 dev_balance_tax_agriculture:0 "Équilibre entre impôts et agriculture"
 desc_dev_balance_tax_agriculture:0 "Les gouverneurs ont reçu l'instruction d'équilibrer leur attention entre les impôts et l'agriculture."
 dev_hadith_madrasa:0 "Madrassa pour le Hadith"
 desc_dev_hadith_madrasa:0 "Une école qui enseigne le corpus des récits des enseignements, actes et paroles du prophète Mahomet."
 dev_fiqah_madrasa:0 "Madrassa pour le Fiqh et l'Iman"
 desc_dev_fiqah_madrasa:0 "Une école qui enseigne la théologie et la croyance."
 dev_hadith_fiqah_madrasa:0 "Une madrassa pour le Hadith et une madrassa pour le Fiqh et l'Iman."
 desc_dev_hadith_fiqah_madrasa:0 "Deux écoles dans chaque province et cité, une qui enseigne le Hadith et une autre qui enseigne le Fiqh et l'Iman."
 dev_mutaween:0 "Muhtasib"
 desc_dev_mutaween:0 "La police religieuse fera respecter la Charia, les lois d'Allah, dans nos provinces."
 dev_educated_women:0 "Femmes éduquées"
 desc_dev_educated_women:0 "Les femmes ont la grande opportunité d'apprendre et d'enseigner l'Islam aux autres."
 dev_modern_forts:0 "Plaintes concernant les forts modernes"
 desc_dev_modern_forts:0 "Le coût de modernisation et d'embellissement de nos forts irrite le peuple dont l'argent des impôts est dépensé pour des caractéristiques qu'ils jugent inutiles."
 add_country_unrest_5_modifier:0 "Le Pays rage contre une décision impopulaire"
 desc_add_country_unrest_5_modifier:0 "Tout le pays est en émoi, les actions du souverain leur ont déplu et les paysans agitent leurs fourches en signe de protestation."
 protestantism_events.1.t:0 "Un réformateur cherche un refuge"
 protestantism_events.1.d:0 "Craignant pour sa sécurité, l'un des grands théologiens de notre époque a dû quitter sa patrie. En tant que pays protestant, c'est notre devoir d'offrir un refuge à cet homme et ce faisant, nous renforcerions sans doute la position de notre Église d'État. Du moins tant que ce réformateur est d'accord avec nos politiques."
 protestantism_events.1.a:0 "Accueillons ce grand homme !"
 protestantism_events.1.a.tt:0 "Aussi longtemps que le Réformateur vivra sur nos terres, il pourra choisir de critiquer ou d'approuver les politiques de notre Église d'État."
 protestantism_events.1.b:0 "Renvoyons-le."
 protected_reformer:0 "A accordé refuge au Réformateur"
 did_not_protect_reformer:0 "A refusé refuge au Réformateur"
 harbouring_reformer:0 "Héberge un Réformateur"
 desc_harbouring_reformer:0 "Nous avons permis à l'un des théologiens les plus actifs de la Réforme de résider dans notre pays, prêtant son grand nom et ses œuvres à notre Église d'État."
 protestantism_events.2.t:0 "Un réformateur cherche refuge en [From.GetName]"
 protestantism_events.2.d:0 "L'un des défenseurs les plus éminents de la Réforme dans notre pays est parti pour [From.GetName], prétendant craindre la persécution des autorités ravéliennes ici. Non content de simplement partir, cet homme passe maintenant son temps à produire des pamphlets pour dénigrer non seulement l'Église ravélienne mais aussi son ancienne patrie."
 protestantism_events.2.a:0 "Scandaleux !"
 protestantism_events.3.t:0 "Un réformateur critique l'Église d'État"
 protestantism_events.3.d:0 "Avoir un réformateur à la volonté forte sur nos terres n'a pas été entièrement sans friction. Il semblerait qu'un homme qui a déjà abandonné son pays d'origine puisse être assez réticent à modérer ses opinions pour correspondre aux politiques de sa nouvelle patrie."
 protestantism_events.3.a:0 "Vivre sous notre protection signifie soutenir l'Église !"
 protestantism_events.3.b:0 "Eh bien, si vous le ressentez aussi fortement..."
 protestantism_events.4.t:0 "L'Église d'État condamnée !"
 protestantism_events.4.d:0 "Déçu par notre incapacité à embrasser pleinement la Réforme, le réformateur étranger est parti vers les terres d'un prince plus enclin. À long terme, cela pourrait renforcer notre église, mais des pamphlets ont déjà commencé à circuler sur la fausseté de l'Église de [Root.GetName]."
 protestantism_events.4.a:0 "Soit."
 protestantism_events.5.t:0 "Critique retirée"
 protestantism_events.5.d:0 "Une réprimande sévère a suffi. La crise mineure dans les relations de notre église d'État s'est dissipée et les voix troublantes de critique se sont tues."
 protestantism_events.5.a:0 "Excellent !"
 protestantism_events.6.t:0 "La Peur des Crypto-Ravéliens"
 protestantism_events.6.d:0 "Toujours présente dans notre État est la crainte que certains qui professent croire en tous les aspects de notre église d'État soient encore secrètement des sympathisants ravéliens. Une famille noble en particulier, bien que fermement ancrée dans les rouages de l'État, aurait des penchants papistes. Au fil des ans, ces rumeurs refusent de mourir et il semblerait maintenant presque impossible pour nous de les ignorer."
 protestantism_events.6.a:0 "Interdisons à cette famille d'occuper des fonctions."
 protestantism_events.6.b:0 "Ils doivent être traduits en justice."
 protestantism_events.6.c:0 "Ignorons ces viles rumeurs."
 catholics_in_hiding:0 "Persécution des Crypto-Ravéliens"
 desc_catholics_in_hiding:0 "Notre politique de persécution active des Crypto-Ravéliens présumés dans l'administration a réduit la volonté de critiquer notre Église d'État, mais signifie aussi que certains évitent complètement de chercher une carrière au service de l'État."
 rumored_crypto_catholics:0 "Peur des Crypto-Ravéliens"
 desc_rumored_crypto_catholics:0 "Notre refus d'enquêter sur les rumeurs de Crypto-Ravéliens essayant secrètement de subvertir l'État a alimenté diverses théories conspirationnistes dans les campagnes."
 protestantism_events.7.t:0 "« Les Derniers Jours » de [Root.GetName]"
 protestantism_events.7.d:0 "Une ferveur religieuse s'est emparée de [Root.GetName] alors que la population est devenue convaincue que la fin des temps approche. Les paysans parlent de signes dans le ciel et contrairement à la doctrine de l'Église d'État, les prêtres locaux font des sermons sur l'apocalypse. Alors que le millénarisme balaie la province, la faute est rejetée sur l'État et l'Église d'État elle-même qui prétend être protestante mais ne vit clairement pas à la hauteur de son nom.\nLes réactions officielles ont jusqu'ici été très faibles car même parmi le clergé de [Root.Owner.Capital.GetCapitalName], certains estiment que ces craintes sont justifiées."
 protestantism_events.7.a:0 "Essayons de calmer la situation."
 protestantism_events.7.b:0 "Agissons avec force."
 protestantism_events.7.c:0 "Ils ont raison d'avoir peur. Repentez-vous, car la fin est proche !"
 millenarianism:0 "Millénarisme"
 desc_millenarianism:0 "La croyance que la fin violente du monde est sur nous s'est emparée des fidèles de cette province. Croyant que la fin des temps purgera la société de toute corruption et de tout péché, cela a mobilisé la population ici contre nous et contre l'église d'État."
 fear_of_god:0 "Peur de l'Apocalypse"
 desc_fear_of_god:0 "« Nous savons par les Écritures, et tous les hommes savants l'affirment, que le monde devait durer 6 000 ans. »\nBeaucoup dans notre pays sentent que la fin des temps approche et notre Église d'État fait ce qu'elle peut pour capitaliser sur cette croyance. Bien que nous courions le risque d'alimenter des forces millénaristes anti-établissement dans notre pays, la grande majorité se concentre sur la sécurité de leurs propres âmes."
 protestantism_events.8.t:0 "Avarice"
 protestantism_events.8.d:0 "Certains membres de notre Église d'État ont beaucoup souffert en raison de taux d'intérêt excessivement élevés, des voix s'élèvent et des pamphlets circulent condamnant « l'usure et la fraude » et affirmant que de petits courtiers se trouvent dans chaque rue.\nC'est l'avis de notre État et de son Église que prélever des intérêts est compatible avec le fait d'être un bon chrétien, mais dans certains cas, cela semble pouvoir mener à des excès. Peut-être serait-il préférable de diminuer davantage le taux d'intérêt autorisé pour freiner les pires cas."
 protestantism_events.8.a:0 "Ignorons les détracteurs."
 protestantism_events.8.b:0 "Diminuons la limite d'intérêt pour un temps."
 prot_economic_downturn:0 "Ralentissement économique"
 desc_prot_economic_downturn:0 "L'utilisation généralisée de taux d'intérêt excessivement élevés et la spéculation financière ont conduit à un ralentissement économique dans cette région et certains estiment que l'église d'État est en faute pour avoir assoupli l'interdiction chrétienne de l'usure."
 stricter_usury_regulations:0 "Réglementations plus strictes sur l'usure"
 desc_stricter_usury_regulations:0 "Afin de freiner les pires excès de l'autorisation de prélever des intérêts pour les prêts d'argent, nous avons légèrement modifié le montant maximum d'intérêt autorisé."
 protestantism_events.9.t:0 "Message pour les Fidèles"
 protestantism_events.9.d:0 "L'une des grandes forces d'avoir une Église d'État est la capacité d'atteindre tous les fidèles de notre pays en même temps. Un jour national de prière approche et il est de coutume que le sermon de ce jour soit en partie dicté par l'Église d'État centrale. Sur quoi le sermon devrait-il se concentrer dans les années à venir ?"
 protestantism_events.9.a:0 "La gratitude pour la Paix dont nous jouissons maintenant."
 protestantism_events.9.b:0 "La justification de nos Guerres."
 protestantism_events.9.c:0 "La Pureté de la Foi."
 protestantism_events.9.dd:0 "L'unité de la Chrétienté elle-même."
 protestantism_events.9.e:0 "Évitons de nous mêler des affaires locales."
 prot_peace:0 "Propagande pour la valeur de la Paix"
 desc_prot_peace:0 "Nous avons utilisé le sermon du jour national de prière pour faire comprendre à nos sujets la grande valeur de la Paix et comment tout bon chrétien devrait faire tout son possible pour la préserver."
 prot_wars:0 "Propagande pour la justesse de nos Guerres"
 desc_prot_wars:0 "Nous avons utilisé le sermon du jour national de prière pour faire comprendre à nos sujets la justesse de notre cause dans les guerres que nous menons."
 prot_purity_of_faith:0 "Propagande pour la Pureté de notre Foi"
 desc_prot_purity_of_faith:0 "Nous avons utilisé le sermon du jour national de prière pour faire comprendre à nos sujets la grande valeur de préserver la pureté de notre foi et comment repérer ceux qui voudraient la souiller."
 prot_christian_unity:0 "Propagande pour l'Unité Chrétienne"
 desc_prot_christian_unity:0 "Nous avons utilisé le sermon du jour national de prière pour faire comprendre à nos sujets la grande valeur de s'unir avec la Chrétienté tout entière contre les infidèles."
 protestantism_events.10.t:0 "Résistance à la Réforme en [Root.GetName]"
 protestantism_events.10.d:0 "Il y a encore ceux, surtout dans les campagnes, qui s'opposent à l'Église d'État de [Root.Owner.GetName] et qui aspirent à retourner dans le giron de l'Église romaine. Il y a cependant une grande différence entre les doutes religieux et la rébellion ouverte, et jusqu'ici les choses ont été calmes en [Root.GetName]. L'Église d'État s'est à son tour contentée de laisser la plupart de ces gens tranquilles tant qu'ils assistent aux offices et paient leurs impôts.\nIl semble que cette paix n'était pas destinée à durer. La récente collecte d'argenterie d'Église dans la région a été considérée comme une déclaration de guerre ouverte par la population locale et ils prennent maintenant les armes pour protéger leurs Églises des mains avides de [Root.Owner.Capital.GetCapitalName]."
 protestantism_events.10.a:0 "Il est temps d'user d'une persuasion musclée."
 protestantism_events.10.b:0 "Exemptons cette région pour l'instant."
 protestantism_events.11.t:0 "$THEOLOGIAN$ dénonce l'Église de [Root.GetName]"
 protestantism_events.11.d:0 "$THEOLOGIAN$ avait une carrière prometteuse bien avant que la réforme n'atteigne notre pays et que l'Église d'État de [Root.GetName] ne soit créée. En tant que personne influente avec des idées fermement ancrées, $THEOLOGIAN$ a été difficile à convaincre d'embrasser la nouvelle nature de l'Église. Cette résistance au changement n'a fait que grandir au fil des ans et maintenant $THEOLOGIAN$ semble être ouvertement opposé à l'Église. Un membre de la cour ne peut pas être vu s'opposer ouvertement à [Root.Monarch.GetName] de cette façon, quelque chose doit être fait !"
 catholic_stronghold:0 "Bastion ravélien"
 desc_catholic_stronghold:0 "Le peuple de cette province a été exempté de l'Église d'État et est autorisé à pratiquer son ancienne foi ravélienne, pour l'instant."
 protestantism_events.11.a:0 "Bannissons $THEOLOGIAN$"
 protestantism_events.11.b:0 "Jugeons $THEOLOGIAN$ pour blasphème et ordonnons son exécution."
 protestantism_events.11.c:0 "C'est regrettable."
 protestantism_events.12.t:0 "Penseur ravélien à la Cour"
 protestantism_events.12.d:0 "$NATURAL_SCIENTIST$$PHILOSOPHER$ est célèbre pour son intellect aiguisé et sa présence à notre cour confère une certaine grandeur à notre nom. $NATURAL_SCIENTIST_CAP_ADJ$$PHILOSOPHER_CAP_ADJ$ est cependant aussi un fervent Ravélien et a été autorisé à pratiquer sa foi comme il le souhaite afin de venir ici. Il serait impensable pour l'Église de [Root.GetName] elle-même de critiquer [Root.Monarch.GetName], mais dans les rues de [Root.Capital.GetCapitalName], on parle de $NATURAL_SCIENTIST$$PHILOSOPHER$ essayant de planter des idées ravéliennes subversives dans la tête de [Root.Monarch.GetName]."
 protestantism_events.12.a:0 "Laissons-les parler."
 protestantism_events.12.b:0 "Renvoyons $NATURAL_SCIENTIST$$PHILOSOPHER$ de la cour."
 protestantism_events.13.t:0 "Influence de $TREASURER$$PHILOSOPHER$$ARTIST$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$"
 protestantism_events.13.d:0 "On dit que $TREASURER$$PHILOSOPHER$$ARTIST$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$, un proche conseiller de [Root.Monarch.GetName], nourrirait en fait des penchants calvinistes cachés. Un certain nombre de lois récentes ont été accusées de chercher secrètement à rapprocher notre pays des idéaux des Églises réformées."
 protestantism_events.13.a:0 "Rejetons ces rumeurs comme des absurdités."
 protestantism_events.13.b:0 "Prenons publiquement nos distances avec $TREASURER$$PHILOSOPHER$$ARTIST$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$"
 protestantism_events.13.c:0 "Essayons d'apporter des ajustements aux lois incriminées."
 protestantism_events.14.t:0 "L'Éducation de [Root.Heir.GetName]"
 protestantism_events.14.d:0 "Les précepteurs de [Root.Heir.GetName] le trouvent tous exceptionnellement prometteur comme futur souverain. Dans tous les domaines relatifs à l'art de gouverner, [Root.Heir.GetName] s'est montré à la fois intéressé et talentueux. Cependant, les autorités religieuses en sont venues à s'inquiéter qu'il ait pris un intérêt bien trop grand pour la foi ravélienne que nous avons laissée derrière nous."
 protestantism_events.14.a:0 "Cela fera de lui un meilleur souverain."
 protestantism_events.14.a.tt:0 "[Root.Heir.GetName] sera autorisé à poursuivre un intérêt pour le Ravélianisme."
 protestantism_events.14.b:0 "Interdisons toute étude des Enseignements papistes."
 protestantism_events.14.b.tt:0 "[Root.Heir.GetName] sera empêché de poursuivre un intérêt pour le Ravélianisme."
 protestantism_events.15.t:0 "Penchants ravéliens de [Root.Monarch.GetName]"
 protestantism_events.15.d:0 "Ce n'est un secret pour personne que [Root.Monarch.GetName] a une grande compréhension de la foi ravélienne, peut-être bien plus que le clergé de notre Église d'État ne le souhaiterait. Néanmoins, son couronnement a été un événement populaire et le peuple semble soutenir notre nouveau souverain. Sans doute, une compréhension des fois étrangères peut être d'une grande utilité pour un souverain d'un Royaume protestant et peu oseraient accuser [Root.Monarch.GetName] de Crypto-Ravélianisme."
 protestantism_events.15.a:0 "Longue vie à [Root.Monarch.GetName] !"
 tolerant_monarch:0 "Monarque tolérant"
 desc_tolerant_monarch:0 "Notre souverain est connu pour sa grande compréhension des autres fois et les minorités religieuses sous notre règne jouissent de privilèges qu'elles n'auraient pas autrement grâce à cela."
 protestantism_events.16.t:0 "La Conscience de [Root.Monarch.GetName]"
 protestantism_events.16.d:0 "Les années ont passé et [Root.Monarch.GetName] s'est révélé être un souverain juste et équitable. Le clergé ne craint plus un coup d'État ravélien soudain et leur haine du Papisme a été tempérée par la compréhension de [Root.Monarch.GetName] envers cette religion.\n[Root.Monarch.GetName] lui-même, cependant, est troublé. Au fil des ans, il en est venu à réaliser que sa foi personnelle est bien plus proche des Ravéliens qu'il a tant fait pour protéger, et non de l'Église d'État dogmatique de [Root.GetName]."
 protestantism_events.16.a:0 "L'Abdication personnelle est la seule Solution."
 protestantism_events.16.b:0 "[Root.Monarch.GetName] devra continuer avec une conscience tourmentée."
 plagued_concience:0 "Conscience tourmentée"
 desc_plagued_concience:0 "Notre souverain est loin d'être un fervent croyant des enseignements de notre Église d'État. Bien que cela n'influence pas directement nos politiques, cela signifie que la gestion de l'Église elle-même est devenue une priorité basse."
 protestantism_events.17.t:0 "Frictions entre [Root.Heir.GetName] et [Root.Monarch.GetName]"
 protestantism_events.17.d:0 "L'intérêt de [Root.Heir.GetName] pour le Ravélianisme semble n'avoir fait que grandir au fil des ans et il s'entoure maintenant de philosophes, de scientifiques et d'artistes du monde ravélien. Cela est devenu quelque peu embarrassant. En tant que chef de l'Église de [Root.GetName], c'est le devoir de [Root.Monarch.GetName] de défendre les valeurs de la réforme. À moins que [Root.Heir.GetName] ne puisse être convaincu de changer, l'autorité de notre Église pourrait en souffrir."
 protestantism_events.17.a:0 "Essayons de forcer [Root.Heir.GetName] à changer ses habitudes."
 protestantism_events.17.b:0 "Acceptons nos désaccords."
 protestantism_events.18.t:0 "[Root.Heir.GetName] voit l'erreur de ses voies"
 protestantism_events.18.d:0 "Après qu'il lui ait été clairement expliqué ce qui est attendu de lui, [Root.Heir.GetName] a accepté de se distancer plus clairement des Ravéliens et de leurs croyances."
 protestantism_events.18.a:0 "Dieu soit loué !"
 protestantism_events.19.t:0 "[Root.Capital.GetCapitalName] vaut bien une Messe"
 protestantism_events.19.d:0 "Depuis sa jeunesse, [Root.Monarch.GetName] a douté de la vérité des enseignements de l'Église de [Root.GetName] et maintenant il a finalement franchi le pas non seulement vers une conversion personnelle mais a commencé à contre-réformer tout le royaume. Le chemin à venir ne sera certainement pas facile, mais personne n'est aussi convaincu que [Root.Monarch.GetName] que tout ira bien."
 protestantism_events.19.a:0 "Mettons notre foi en Dieu."
 catholic_zealot:0 "Monarque converti"
 desc_catholic_zealot:0 "Notre Monarque a converti le pays en raison d'une conviction personnelle que le Ravélianisme est la vraie foi et fera tout pour que tous les sujets suivent."
 protestantism_events.20.t:0 "[Root.Heir.GetName] refuse de faire des compromis"
 protestantism_events.20.d:0 "Malgré nos tentatives de clarifier au maximum les attentes envers un héritier royal, [Root.Heir.GetName] insiste pour maintenir sa fascination néfaste pour l'Église ravélienne. Dans la capitale, propagandistes et satiristes ont déjà commencé à distribuer des pamphlets sur le fait que [Root.Monarch.GetName] ne semble pas pouvoir contrôler sa propre famille, encore moins protéger les fidèles du royaume."
 protestantism_events.20.a:0 "Il n'y a rien à faire."
 protestantism_events.20.b:0 "Nous n'avons pas d'autre choix que de déshériter [Root.Heir.GetName] !"
 protestantism_events.21.t:0 "Clerc problématique"
 protestantism_events.21.d:0 "$THEOLOGIAN$$INQUISITOR$ a eu une carrière exemplaire, commençant comme prêtre local de bas niveau pour finalement atteindre le sommet de la hiérarchie de l'Église, et en est venu au fil des ans à être considéré comme un pilier de l'Église de [Root.GetName]. Il est donc très troublant que $THEOLOGIAN$$INQUISITOR$ ait commencé à contester la direction que prend l'Église. Bien que $THEOLOGIAN$$INQUISITOR$ se soit abstenu de critiquer directement [Root.Monarch.GetName], il est difficile pour quiconque de prendre ses paroles autrement que comme nuisibles pour l'Église d'État."
 protestantism_events.21.a:0 "Je suis sûr que nous pouvons trouver quelqu'un d'autre pour prendre la place de $THEOLOGIAN$$INQUISITOR$."
 protestantism_events.21.b:0 "Autorisons-le mais assurons-nous que $THEOLOGIAN$$INQUISITOR$ n'ait aucun pouvoir réel."
 protestantism_events.22.t:0 "L'Espoir persistant de Réconciliation"
 protestantism_events.22.d:0 "Il y a encore ceux qui aspirent au temps où la foi chrétienne était unifiée. Bien qu'ils voient la Réforme et la naissance du Protestantisme comme nécessaires, ils déplorent aussi que cela n'ait pu se faire sans un schisme.\nBien intentionnés, ce genre de penchants peut être très nuisible à une Église d'État comme la nôtre et il est donc quelque peu préoccupant qu'il semble qu'un certain nombre d'officiels de notre Église ainsi que certains de nos séminaires entretiennent de telles idées."
 protestantism_events.22.a:0 "Une réprimande suffira."
 protestantism_events.22.b:0 "Rassemblons les plus éminents et jugeons-les pour trahison."
 phillipists:0 "Philippistes"
 desc_phillipists:0 "Bien que ce soit mal vu, certains dans la hiérarchie de notre Église d'État entretiennent l'idée d'une réunification avec Rome. Notre incapacité à traiter de manière décisive avec ces éléments a rendu plus difficile la conversion des Ravéliens restants sur nos terres."
 protestantism_events.23.t:0 "Diaspora protestante"
 protestantism_events.23.d:0 "Alors que la Chrétienté se divise de plus en plus, le filet de réfugiés religieux s'est transformé en un flux constant. Les conflits religieux dans les grands États ravéliens ont poussé de nombreux Protestants à quitter leur ancien pays. En tant que pays protestant avec notre propre Église, nous serions en mesure de leur offrir une protection et nous pourrions aussi faire bon usage de leurs compétences et de leurs biens.\nLe Protestantisme est cependant loin d'être une foi unifiée et il n'est pas très probable que tous ceux qui viennent à nous trouveront que l'Église de [Root.GetName] corresponde pleinement à leurs propres croyances. Bien qu'il serait admirable de recevoir tous les immigrants protestants, il serait peut-être plus prudent de sélectionner ceux qui possèdent des compétences dont nous pourrions faire bon usage."
 protestantism_events.23.a:0 "Ouvrons nos frontières à tous les Protestants."
 protestantism_events.23.b:0 "Ne recevons que ceux qui peuvent nous être utiles."
 protestantism_events.23.c:0 "Renvoyons-les."
 protestantism_events.23.dd:0 "Offrons-leur des terres dans le Nouveau Monde."
 protestant_influx:0 "Immigrants protestants"
 desc_protestant_influx:0 "Notre pays a accueilli un certain nombre d'immigrants protestants fuyant leurs pays d'origine catholiques. Leur foi peut ne pas correspondre exactement à la nôtre mais nous avons un ennemi commun dans le Haut-Recteur et nous pouvons mettre leurs compétences à profit."
 protestant_refugees:0 "Afflux de réfugiés protestants"
 desc_protestant_refugees:0 "Un grand nombre d'immigrants protestants se sont installés ici, laissant leurs pays d'origine ravéliens derrière eux. Comme ils ne sont pas habitués à notre église d'État, il y a eu quelques tensions mais la province a en général connu une reprise économique."
 welcomed_fleeing_protestants:0 "A accueilli les réfugiés"
 turned_away_fleeing_protestants:0 "A renvoyé les réfugiés"
 protestant_refugees_to_the_colonies:0 "Émigration protestante"
 desc_protestant_refugees_to_the_colonies:0 "Un certain nombre d'émigrants protestants ont reçu la promesse de la protection de notre État ici par notre mère patrie."
 protestantism_events.24.t:0 "Critique de la Bible officielle"
 protestantism_events.24.d:0 "Avoir une traduction de la Bible sanctionnée par l'État a beaucoup contribué à unifier la foi protestante dans notre pays et c'est l'opinion du grand public et de la plupart des théologiens que notre traduction a produit un livre bien plus fidèle aux origines de notre religion.\nIl y a cependant aussi certains qui trouvent la traduction officielle de la Bible très insuffisante. Certains groupes affirment qu'elle est simplement dépassée et a besoin de modernisation, d'autres qu'elle est trop favorable à l'État au pouvoir et que nous avons tenté de l'utiliser pour pacifier nos sujets. D'autres encore estiment simplement qu'elle ne va pas assez loin et maintient encore beaucoup des erreurs qui se sont accumulées au fil des ans dans les versions précédentes de la Bible."
 protestantism_events.24.a:0 "Maintenons la version existante."
 protestantism_events.24.b:0 "Ordonnons une nouvelle traduction."
 new_bible_translation:0 "Nouvelle traduction de la Bible"
 desc_new_bible_translation:0 "Un travail est en cours pour créer une nouvelle traduction de la Bible qui sera utilisée comme Bible officielle de notre Église d'État. L'objectif est de créer autant que possible une Bible qui satisfera à la fois les besoins de l'État et répondra aux objections que certains ont eues envers l'ancienne traduction."
 controversy_over_official_bible:0 "Controverse sur la Bible officielle"
 desc_controversy_over_official_bible:0 "Nous avons publié une Bible officielle pour être utilisée par notre Église d'État, ce qui a beaucoup contribué à promouvoir l'uniformité de notre foi et à effacer le vieux bagage ravélien. Il est cependant impossible pour une seule traduction de satisfaire tous ceux qui utilisaient auparavant leurs propres traductions diverses de la Bible et il semble que des groupes de tout le spectre religieux aient réussi à trouver un passage auquel ils s'opposent. Néanmoins, nous avons choisi de maintenir notre version, confiants qu'elle leur survivra à tous en fin de compte."
 protestantism_events.25.t:0 "Le Dilemme de [Root.Monarch.GetName]"
 protestantism_events.25.d:0 "Ce n'est un secret pour personne que le mariage de [Root.Monarch.GetName] et de son épouse n'est pas l'union la plus aimante et produire un héritier s'est avéré assez problématique. On dit que [Root.Monarch.GetName] a eu un certain nombre de liaisons extraconjugales et la réputation de notre Royaume risque d'être ternie. [Root.Monarch.GetName] ne veut cependant pas entendre parler de divorce et considère une telle chose comme profondément immorale.\nAu lieu de cela, il soutient que si la bigamie a pu fonctionner pour les patriarches, alors peut-être cela pourrait servir de précédent pour lui permettre une seconde union. Les Réformateurs qui ont été contactés pour donner leur opinion à ce sujet ont été très hésitants, c'est le moins qu'on puisse dire, mais [Root.Monarch.GetName] semble déterminé que c'est la meilleure solution à son problème."
 protestantism_events.25.a:0 "La bigamie est un péché."
 protestantism_events.25.b:0 "Si c'était assez bon pour les Patriarches, c'est assez bon pour moi."
 protestantism_events.25.c:0 "Si c'était assez bon pour mes prédécesseurs, c'est assez bon pour moi."
 protestant_bigamy:0 "Bigamie"
 desc_protestant_bigamy:0 "Plutôt que de vivre dans le péché avec des partenaires à côté de l'épouse royale ou à jamais dans un mariage sans amour, notre souverain a suivi l'exemple des patriarches et a épousé plusieurs conjoints."
 bigamy_of_ruler:0 "Bigamie"
 protestantism_events.26.t:0 "Tribunaux surchargés"
 protestantism_events.26.d:0 "L'incorporation de la Loi mosaïque directement dans les lois de [Root.GetName] a conduit à une croissance sans précédent du système judiciaire de notre pays dans certaines parties du territoire. Un flux constant d'accusations est devenu un nombre presque ingérable d'affaires judiciaires. Non seulement cela, mais le nombre de condamnations à mort a également beaucoup augmenté et si ce n'était la pratique déjà établie d'accorder une dispense pour une telle condamnation si le condamné peut présenter une certaine somme d'argent en compensation, nous aurions une très mauvaise situation sur les bras."
 protestantism_events.26.a:0 "S'ils ont été condamnés, ils ont péché et doivent payer."
 protestantism_events.26.b:0 "Donnons aux tribunaux plus de ressources pour gérer cela."
 mosaic_law_accusations:0 "Tribunaux débordés"
 desc_mosaic_law_accusations:0 "L'incorporation de la Loi mosaïque directement dans les lois de notre pays a fait que des incidents relativement courants comme l'adultère sont passibles de la peine de mort. La population de cette région a fait bon usage des lois et bien qu'il soit encourageant de voir l'autorité de nos tribunaux augmenter, le nombre d'affaires a atteint un niveau presque ingérable."
 protestantism_events.27.t:0 "Théologien austère"
 protestantism_events.27.d:0 "Un homme inhabituel a récemment émergé du système éducatif de l'Église de [Root.GetName]. C'est un prêtre d'un charisme et d'une conviction inhabituels, mais au lieu de désirer changer l'Église selon ses convictions, il est déterminé à inculquer la valeur de rester fidèle aux traditions et dogmes protestants de l'Église d'État.\nC'est un homme inhabituel en ces temps et nous pourrions sans doute le mettre à profit."
 protestantism_events.27.a:0 "Laissons-le éduquer nos prêtres."
 protestantism_events.27.b:0 "Utilisons-le pour combattre l'hérésie."
 protestantism_events.27.c:0 "Loyauté et Tradition, ce sont les valeurs nécessaires pour un chef de notre Église."
 stern_theologian_education:0 "Théologien austère"
 desc_stern_theologian_education:0 "L'éducation des prêtres de notre Église d'État est influencée à un très haut degré par un chef inhabituellement charismatique et dogmatique, un homme qui peut insuffler le bon zèle pour notre église d'État à notre clergé."
 stern_theologian_mission:0 "Théologien austère"
 desc_stern_theologian_mission:0 "L'entreprise de conversion des païens et des hérétiques est menée par un chef inhabituellement charismatique et dogmatique, un homme qui inspire la volonté de rejoindre l'Église d'État comme peu d'autres."
 stern_theologian_leader:0 "Théologien austère"
 desc_stern_theologian_leader:0 "Notre Église d'État est dirigée par un chef inhabituellement charismatique et dogmatique. Un théologien austère qui valorise la tradition et la loyauté par-dessus tout."
 protestantism_events.28.t:0 "Sacramentaires"
 protestantism_events.28.d:0 "La question de savoir si le corps du Christ est vraiment physiquement présent pendant l'Eucharistie ou non était l'un des principaux points sur lesquels Protestants et Ravéliens étaient en désaccord pendant la réforme. Certains, cependant, ont du mal même à accepter l'Union Sacramentelle luthérienne. Une publication récente qui a gagné une certaine circulation dans notre pays semble avoir été rédigée par l'un de ces groupes. Elle sera sans doute bientôt oubliée mais à court terme, la légitimité de notre Église d'État est remise en question."
 protestantism_events.28.a:0 "Regrettable."
 protestantism_events.28.b:0 "Cela sent le Crypto-Calvinisme, trouvons et bannissons les instigateurs."
 protestantism_events.28.c:0 "Essayons de limiter la diffusion de ces pamphlets."
 protestantism_events.29.t:0 "Un Réformateur fait l'éloge de l'Église de [Root.GetName]"
 protestantism_events.29.d:0 "L'un des grands penseurs à l'avant-garde de la Réforme a récemment cité notre pays comme un bon exemple à suivre pour les autres dans l'une de ses publications ainsi que lors d'une disputation. Cela renforcera sûrement à la fois notre réputation internationale et donnera plus de poids à l'autorité de notre église elle-même."
 protestantism_events.29.a:0 "Utilisons cela dans notre propagande interne."
 protestantism_events.29.b:0 "Cela nous aidera à nous rapprocher des autres Protestants."
 protestantism_events.29.b.tt:0 "Les relations avec tous les pays §YRavéliens§! diminuées de §R35§!.\nLes relations avec tous les pays §YProtestants§! augmentées de §G35§!.\nCes effets se dissiperont au cours des 12 prochaines années."
 beacon_of_protestantism:0 "Pays protestant idéal"
 protestant_ideal:0 "Pays protestant idéal"
 protestantism_events.31.t:0 "Circulation de publications hostiles"
 protestantism_events.31.d:0 "Un grand nombre de pamphlets, de gravures sur bois et d'autres publications mineures ont commencé à circuler récemment, sans doute financées par nos ennemis. Dans ces textes vils, il est prétendu que de nombreux aspects de l'Église de [Root.GetName] ont été conçus par commodité pour l'État.\nBien qu'il soit douteux que cette critique laisse une marque permanente sur la réputation de notre Église d'État, elle a été endommagée à court terme."
 protestantism_events.30.t:0 "Procès de sorcières en [Root.GetName]"
 protestantism_events.30.d:0 "La transition de faire partie de la plus large Église Romaine Ravélienne à l'Église locale de [Root.Owner.GetName] s'est généralement bien passée mais dans certaines régions, il est devenu flou où réside l'autorité. Quand il y avait une suspicion de sorcellerie dans l'ancien temps, l'Église ravélienne s'impliquait souvent et pouvait tempérer l'indignation de la population locale. La réforme, en revanche, a fait beaucoup pour renforcer la croyance dans les versions populaires du christianisme.\nUn certain nombre de femmes sont accusées de sorcellerie en [Root.GetName] et une recherche a déjà commencé pour en trouver davantage. Des prêtres locaux et des magistrats se sont impliqués dans les procès mais jusqu'ici, l'État n'a pas été impliqué. Alors que le nombre de femmes en attente de procès grandit de plus en plus, il peut être nécessaire pour nous d'agir."
 protestantism_events.30.a:0 "Approuvons les procès."
 protestantism_events.30.a.tt:0 "Aussi longtemps que les procès continueront, il y a un risque qu'ils se propagent à d'autres provinces ou dégénèrent."
 protestantism_events.30.b:0 "Ignorons les procès."
 protestantism_events.30.c:0 "Nous devons arrêter ces procès."
 protestantism_events.30.c.tt:0 "Les procès de sorcières ne se propageront pas et ne dégénéreront pas depuis cette province."
 protestantism_events.31.a:0 "Regrettable."
 protestantism_events.31.b:0 "On peut jouer à deux à ce jeu, lançons une contre-campagne."
 protestantism_events.32.t:0 "Incorporation de nouvelles régions"
 protestantism_events.32.d:0 "Alors que notre pays s'étend dans de nouvelles régions à population protestante, nous avons commencé le processus de les incorporer à l'Église d'État. Avec l'introduction des registres paroissiaux dans certaines terres récemment acquises est venue une révélation surprenante. La région est beaucoup plus densément peuplée que ses anciens maîtres ne semblent l'avoir réalisé."
 protestantism_events.32.a:0 "Excellent !"
 protestantism_events.33.t:0 "Piétisme"
 protestantism_events.33.d:0 "Un nouveau type de mouvement protestant a commencé à s'enraciner dans notre pays. Les Piétistes se préoccupent du salut intérieur et montrent peu d'intérêt pour l'étude théologique et le dogme de l'Église d'État."
 protestantism_events.33.a:0 "Essayons de limiter son influence."
 protestantism_events.33.b:0 "Approchons les Piétistes avec intérêt."
 spread_of_pietism:0 "Propagation du Piétisme"
 desc_spread_of_pietism:0 "Les Piétistes croient en la religiosité intérieure des individus plutôt qu'en des dogmes théologiques. Ce manque d'intérêt pour des règles strictement définies a conduit à un affaiblissement de l'autorité de notre église d'État tout en nous rapprochant des autres Églises évangéliques."
 protestantism_events.34.t:0 "Émeutes iconoclastes en [Root.GetName]"
 protestantism_events.34.d:0 "La haine des Icônes et des Images de l'ancienne église ravélienne est quelque chose que de nombreux Protestants ont en commun et la politique de les autoriser dans l'Église de [Root.Owner.GetName] n'a donc jamais été entièrement sans problème.\nEnragée par ce qu'elle voit comme de l'idolâtrie, la population de [Root.GetName] a pris d'assaut de nombreuses Églises de la province, brisant des vitraux et détruisant des Icônes et des Autels."
 protestantism_events.34.a:0 "Punissons les coupables."
 protestantism_events.34.b:0 "Réparons et restaurons les Églises endommagées."
 iconoclast_riot:0 "Émeutes iconoclastes"
 desc_iconoclast_riot:0 "Des émeutiers ont détruit des autels, des peintures et des vitraux dans cette province, déterminés à éradiquer ce qu'ils voient comme un culte des idoles dans notre Église d'État."
 protestantism_events.35.t:0 "Prédicateur patriote charismatique en [Root.GetName]"
 protestantism_events.35.d:0 "[Root.GetName] est une région pleine de petites églises protestantes qui rejettent toutes l'idée d'une église dogmatique centralisée.\nUn prédicateur puissant a gagné en importance ici et tout comme ses sermons maintiennent les communautés ici ensemble, ils les maintiennent aussi déterminées à conserver leur autonomie par rapport à l'église de leur ancienne patrie."
 protestantism_events.35.a:0 "Excellent."
 protestantism_events.35.b:0 "Faisons ce que nous pouvons pour diminuer son influence."
 patriot_preacher:0 "Prédicateur patriote"
 desc_patriot_preacher:0 "Un prédicateur charismatique dans cette province agite pour le besoin d'une liberté religieuse totale vis-à-vis de notre mère patrie."
 colonial_religious_tensions:0 "Tensions religieuses"
 desc_colonial_religious_tensions:0 "Cette province connaît de fortes tensions dues à l'agitation pour plusieurs croyances religieuses opposées."
 loyalist_preacher:0 "Prédicateur loyaliste"
 desc_loyalist_preacher:0 "Un prédicateur charismatique dans cette province agite pour le besoin de soutenir l'Église d'État de notre mère patrie."
 protestantism_events.36.t:0 "Tensions religieuses en [Root.GetName]"
 protestantism_events.36.d:0 "En raison de la politique de notre mère patrie d'envoyer les hérétiques religieux dans les colonies, une grande variété de fois différentes peut être trouvée dans nos colonies. Bien qu'on puisse dire qu'elles sont toutes protestantes sous une forme ou une autre, elles ont des vues qui sont souvent diamétralement opposées les unes aux autres sur de nombreuses questions. La province de [Root.GetName] a été colonisée par un grand nombre de deux églises théologiquement opposées, l'une plus proche des églises réformées d'Europe, tandis que l'autre est plus proche des Églises protestantes. Les deux sont cependant tout aussi opposées au contrôle de l'Église d'État qu'elles ont laissée derrière elles. Les tensions sont vives et il serait peut-être préférable d'intervenir maintenant pour les séparer avant que les choses ne dégénèrent."
 protestantism_events.36.a:0 "Pourquoi distinguer entre hérétiques ? Laissons-les se quereller s'ils le désirent."
 protestantism_events.36.b:0 "Convainquons le parti réformé de partir vers d'autres terres."
 protestantism_events.36.c:0 "Convainquons le parti protestant de partir vers d'autres terres."
 protestantism_events.37.t:0 "Prédicateur loyaliste charismatique en [Root.GetName]"
 protestantism_events.37.d:0 "Malgré la multitude de dénominations du Protestantisme dans ces terres, le peuple de [Root.GetName] semble aussi loyal que jamais à l'Église d'État de notre mère patrie. La montée récente d'un prédicateur charismatique, agitant contre ceux qui proposeraient de couper les liens avec cette Église, a encore cimenté la loyauté de la population de [Root.GetName]."
 protestantism_events.37.a:0 "Excellent."
 protestantism_events.37.b:0 "Nous devons faire ce que nous pouvons pour inculquer la valeur de la liberté à ces gens."
 protestantism_events.38.t:0 "Tensions religieuses en [Root.GetName]"
 protestantism_events.38.d:0 "Peu sont aussi tentés par la promesse d'une nouvelle vie dans les colonies que les dissidents religieux. En conséquence, nos terres abritent une grande variété de fois chrétiennes différentes qui, grâce à la grande quantité d'espace à coloniser, n'est pas un aussi gros problème qu'elle le serait dans notre mère patrie.\nCe n'est cependant pas entièrement sans conflits locaux, et il semble que des nouvelles de certains d'entre eux ont maintenant atteint notre pays d'origine. Nous avons reçu des ordres de chez nous d'être plus prudents avec ceux qui exigent des libertés religieuses sur nos terres."
 protestantism_events.38.a:0 "Essayons d'imposer une plus grande uniformité avec l'Église d'État."
 protestantism_events.38.b:0 "C'est seulement un problème pour l'Église d'État elle-même."
 protestantism_events.39.t:0 "Tensions religieuses en [From.GetName]"
 protestantism_events.39.d:0 "Beaucoup des hérétiques sur nos terres ont choisi de s'installer dans les colonies. C'est quelque chose qui la plupart du temps est bénéfique à la fois pour nous et pour les colonies, mais dernièrement, des nouvelles nous sont parvenues d'un usage excessif par certains groupes des libertés religieuses qu'implique la vie coloniale. Les représentants de l'Église de [Root.GetName] estiment que nous devons agir maintenant ou les colonies pourraient inspirer les hérétiques chez nous également."
 protestantism_events.39.a:0 "Essayons de renforcer l'emprise de l'Église d'État sur les colonies."
 protestantism_events.39.b:0 "Ce que nos sujets font sur un autre continent n'a pas à nous préoccuper."
 protestantism_events.40.t:0 "L'État vu comme protégeant les sorcières"
 protestantism_events.40.d:0 "Nos tentatives de tempérer la chasse aux sorcières de plus en plus paranoïaque en [From.GetName] ont été entièrement mal comprises par la population locale là-bas. Nos émissaires ont eux-mêmes été accusés de sorcellerie et des parties de la population sont devenues très hostiles envers tout pouvoir extérieur qui tente de protéger les sorcières qui supposément hantent la région."
 protestantism_events.40.a:0 "Soit."
 protestantism_events.41.t:0 "La chasse aux sorcières dégénère"
 protestantism_events.41.d:0 "Les histoires les plus horrifiantes nous sont parvenues des procès de sorcières en cours dans les campagnes. En un seul jour, plus de 70 femmes ont été jugées et tuées et la recherche d'autres continue sans fin sans que les autorités locales n'aient même demandé l'avis de l'État. Le bilan des morts et la perte d'autorité centrale marqueront probablement la région à jamais. Les dirigeants de notre Église d'État à [Root.Capital.GetCapitalName] semblent être aussi impuissants que tout le monde pour arrêter cela."
 protestantism_events.41.a:0 "Nous devons arrêter cette folie !"
 protestantism_events.41.b:0 "Ils font l'œuvre de Dieu !"
 protestantism_events.42.t:0 "Mort d'un héritier"
 protestantism_events.42.d:0 "La mort d'un héritier est toujours un événement triste mais pour les hauts représentants de l'Église de [Root.GetName], la nouvelle a été secrètement accueillie avec un certain soulagement. Ils n'ont plus à s'inquiéter d'un souverain qui un jour pourrait avoir des idées à tendance ravélienne..."
 protestantism_events.42.a:0 "Soit."
 prot_witch_trials:0 "Procès de sorcières"
 desc_prot_witch_trials:0 "Il y a actuellement une recherche en cours de sorcières dans cette région et les autorités locales jugent et condamnent toutes les sorcières qui apparaissent. Alors que la situation devient de plus en plus intense, l'économie locale souffre de l'incertitude et de la perturbation causées par les rumeurs et la peur générale ainsi que par la mort d'un certain nombre de personnes de toutes les couches de la société."
 escalated_witch_trials:0 "Chasses aux sorcières ayant dégénéré"
 desc_escalated_witch_trials:0 "Les procès de sorcières dans cette région ont dégénéré en une chasse aux sorcières aveugle où personne n'est à l'abri des accusations et de la menace d'exécution. La région est absorbée par la paranoïa et la société locale souffre grandement. L'Église d'État a peu d'autorité ici car les prédicateurs et magistrats locaux décident rapidement de qui vivra ou mourra."
 prot_stopped_witch_trials:0 "Procès de sorcières arrêtés"
 desc_prot_stopped_witch_trials:0 "Un certain nombre de procès de sorcières dans cette région a menacé de déchirer la société locale avec des voisins dénonçant des voisins. L'État est cependant intervenu et a tenté de désamorcer la situation. Tout le monde n'est pas satisfait de cette solution mais les tensions semblent diminuer."
 custodian_of_the_two_holy_mosques:0 "Gardien des Cités Saintes"
 desc_custodian_of_the_two_holy_mosques:0 "Nous contrôlons les cités de La Mecque et de Médine et avec elles les sanctuaires les plus sacrés du monde islamique."
 organised_through_bishops_aspect:0 "Organisation par Prévôts"
 desc_organised_through_bishops_aspect:0 "Les prévôts étaient autrefois des dirigeants d'une seule église, confinés à une zone urbaine. De nos jours, ils dirigent les églises d'une zone plus large et ne servent plus des congrégations individuelles. Des prêtres sont nommés pour servir chaque congrégation et agissent comme délégués du prévôt.\n\n Nous gagnerons également §G-10 %§! de coût de construction pendant §Y10§! ans"
 priests_may_marry_aspect:0 "Les Prêtres peuvent se marier"
 desc_priests_may_marry_aspect:0 "L'empereur Justinien Ier a déclaré tous les mariages contractés par des clercs dans les Ordres Sacrés nuls et non avenus et les enfants de tels mariages illégitimes. Les prêtres ont toujours, plus ou moins illégalement, vécu avec leurs épouses et élevé des familles bien que le célibat soit attendu d'eux. En autorisant les prêtres à se marier, nous mettons le sceau de l'approbation sur le mariage clérical et condamnons les vœux de célibat sur des bases bibliques.\n\n Nous gagnerons également §G+1§! de Tolérance de la Vraie Foi pendant §Y10§! ans"
 adult_baptism_aspect:0 "Baptême Adulte"
 desc_adult_baptism_aspect:0 "Être baptisé adulte sur la base d'une profession de foi en Jésus-Christ et comme admission dans une communauté de foi locale est fait par ceux qui croient que la grâce salvatrice et l'appartenance à l'Église sont des dons de Dieu. La foi du destinataire doit être vocalisée et ne peut être transmise ou transférée d'une personne à une autre.\n\n Nous gagnerons également §G+10 %§! de main-d'œuvre dans les provinces de la Vraie Foi pendant §Y10§! ans"
 holy_sacraments_aspect:0 "Saints Sacrements"
 desc_holy_sacraments_aspect:0 "Les sept sacrements sont des rituels qui sont des signes efficaces de grâce, institués par le Christ et confiés à l'Église, par lesquels la vie divine nous est dispensée. Ces Saints Sacrements sont : le Baptême, la Confirmation ou Chrismation, l'Eucharistie, la Pénitence, l'Onction des Malades, l'Ordre et le Mariage.\n\n Nous gagnerons également §G+5 %§! de dégâts de moral pendant §Y10§! ans"
 saints_accept_prayers_aspect:0 "Les Saints acceptent les Prières"
 desc_saints_accept_prayers_aspect:0 "L'Intercession des saints, selon laquelle on peut demander aux saints d'intercéder ou de prier pour les autres, est une doctrine soutenue par notre église.\n\n Nous gagnerons également §G+100 %§! de tradition militaire des batailles pendant §Y10§! ans"
 icons_images_aspect:0 "Icônes"
 desc_icons_images_aspect:0 "Les images représentant Jésus, Marie, les saints et les anges, coulées dans le métal, sculptées dans la pierre, brodées sur le tissu, peintes sur bois ou fabriquées de nombreuses manières différentes sont souvent illuminées. Ces icônes ont été débattues et opposées, mais la faveur populaire pour les icônes a garanti leur existence continue et l'Église s'est finalement résignée à autoriser la vénération des icônes.\n\n Nous gagnerons également §G-10 %§! de coût des conseillers avec la culture du souverain pendant §Y10§! ans"
 legalised_divorces_aspect:0 "Divorces légalisés"
 desc_legalised_divorces_aspect:0 "L'autorité de l'Église déterminait l'annulation des mariages jusqu'à ce qu'il en vienne à être considéré comme un contrat civil. Les autorités civiles peuvent décréter un « divortium a vinculo matrimonii » ou « divorce de tous les liens du mariage », dissolvant ainsi un mariage.\n\n Nous gagnerons également §G+10 %§! de croissance du progrès de réforme pendant §Y10§! ans"
 heretics_deported_aspect:0 "Hérétiques déportés"
 desc_heretics_deported_aspect:0 "Les exécutions des hérétiques qui s'opposent à notre Église dans des croyances ou opinions jugées hérétiques sont remplacées par la déportation de ceux coupables de ce péché.\n\n Nous gagnerons également §G+10 %§! de chance de colon pendant §Y10§! ans"
 parish_registers_aspect:0 "Registres paroissiaux"
 desc_parish_registers_aspect:0 "Les détails des baptêmes, mariages et enterrements seront désormais documentés dans un registre paroissial. Chaque prêtre de paroisse tiendra un livre où il inscrira ces événements et le conservera dans un coffre sûr à deux serrures.\n\n Nous gagnerons également §G-0,10 %§! de corruption annuelle pendant §Y10§! ans"
 individual_creeds_aspect:0 "Crédos individuels"
 desc_individual_creeds_aspect:0 "Accepter et avoir une plus grande tolérance envers la libre pensée qui permet aux gens de former leurs propres opinions et croyances sur la religion conduit à une stimulation technologique.\n\n Nous gagnerons également §G+2§! conseillers possibles pendant §Y10§! ans"
 allow_usury_aspect:0 "Autoriser l'usure"
 desc_allow_usury_aspect:0 "Les prêts monétaires avec intérêts qui enrichissent le prêteur sont désormais autorisés et ne sont plus considérés comme un péché.\n\n Nous gagnerons également §G-0,5 %§! d'intérêt par an pendant §Y10§! ans"
 translated_bibles_aspect:0 "Bibles traduites"
 desc_translated_bibles_aspect:1 "Traduire les bibles dans d'autres langues donne aux gens la meilleure ressource pour connaître Dieu dans une langue qui parle à leurs esprits et à leurs cœurs.\n\n Nous gagnerons également §G+25 %§! de propagation des institutions dans les provinces de la Vraie Foi pendant §Y10§! ans"
 justified_religious_war_aspect:0 "Conflit justifié"
 desc_justified_religious_war_aspect:1 "La nouvelle Église du pays est menacée par les païens et les hérétiques à la fois. Dans une guerre d'auto-préservation, l'Église justifiera nos conflits avec la Bible.\n\n Nous gagnerons également §G-10 %§! de coût de score de guerre contre les autres religions pendant §Y10§! ans"
 war_preaches_aspect:1 "Sermons de guerre"
 desc_war_preaches_aspect:1 "En temps de conflits, la foi préserve l'espoir de notre peuple. L'Église de notre royaume prêchera à partir du livre saint pour maintenir le moral de la population même pendant les heures les plus sombres.\n\n Nous gagnerons également §G-100 %§! de coût des impôts de guerre pendant §Y10§! ans"
 head_of_the_church_aspect:0 "Chef de la Foi"
 desc_head_of_the_church_aspect:1 "L'Église n'est plus soumise à un théocrate externe et corrompu. Au lieu de cela, toutes les questions religieuses seront désormais redirigées vers le souverain qui sert de nouveau Chef de la Foi.\n\n Nous gagnerons également §G+1 %§! d'absolutisme annuel pendant §Y10§! ans"
 organised_through_bishops_aspect_modifier:0 "Zèle de l'Aspect de l'Église"
 desc_organised_through_bishops_aspect_modifier:0 "L'introduction d'un nouvel aspect de notre foi a inspiré notre peuple à vivre selon ce nouveau codex."
 priests_may_marry_aspect_modifier:0 "Zèle de l'Aspect de l'Église"
 desc_priests_may_marry_aspect_modifier:0 "L'introduction d'un nouvel aspect de notre foi a inspiré notre peuple à vivre selon ce nouveau codex."
 adult_baptism_aspect_modifier:0 "Zèle de l'Aspect de l'Église"
 desc_adult_baptism_aspect_modifier:0 "L'introduction d'un nouvel aspect de notre foi a inspiré notre peuple à vivre selon ce nouveau codex."
 holy_sacraments_aspect_modifier:0 "Zèle de l'Aspect de l'Église"
 desc_holy_sacraments_aspect_modifier:0 "L'introduction d'un nouvel aspect de notre foi a inspiré notre peuple à vivre selon ce nouveau codex."
