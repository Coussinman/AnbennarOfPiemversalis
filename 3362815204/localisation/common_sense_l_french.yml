 subject_interaction_events.1.t:0 "Le Prétendant [Root.Monarch.GetTitle] se soulève"
 subject_interaction_events.1.d:0 "L'ancien monarque, désormais déposé, de [Root.Country.GetName] avait une famille nombreuse, et au moins l'un d'entre eux croit avoir une meilleure prétention au trône de [Root.Country.GetName] que [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Ils ont réussi à rassembler un nombre assez important de partisans et marchent vers [Root.Capital.GetName], déterminés à placer le « vrai » [Root.Monarch.GetTitle] sur le trône."
 subject_interaction_events.1.a:0 "Demander de l'aide au Suzerain."
 subject_interaction_events.1.b:0 "Régler cela nous-mêmes."
 subject_interaction_events.2.t:0 "[From.Country.GetName] demande de l'aide"
 subject_interaction_events.2.d:0 "Une armée rebelle menée par un prétendant marche vers la capitale de [From.Country.GetName], [From.Capital.GetName] ! Des membres de la famille du monarque déposé de [From.Country.GetName] ont réussi à rassembler un nombre assez important de partisans et tentent maintenant de détrôner [From.Monarch.GetTitle] [From.Monarch.GetName]."
 subject_interaction_events.2.a:0 "Leur envoyer de l'or et des soldats."
 subject_interaction_events.2.b:0 "Ils devront se débrouiller seuls."
 subject_interaction_events.3.t:0 "L'aide arrive-t-elle ?"
 subject_interaction_events.3.d:0 "Les rebelles prétendants se rapprochent de nous, et le messager envoyé à [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] devrait bientôt revenir. Avec un peu de chance, peut-être le messager aura-t-il des soldats et de l'or de [From.Country.GetName] qui nous aideront à repousser ces maudits rebelles !"
 subject_interaction_events.3.a:0 "[From.Monarch.GetName] de [From.Country.GetName] nous a envoyé de l'or et des soldats !"
 subject_interaction_events.3.b:0 "[From.Monarch.GetName] a refusé de nous envoyer de l'aide !"
 subject_interaction_events.4.t:1 "Cousin incompétent en [incompetent_cousin_country.GetName]"
 subject_interaction_events.4.d:1 "Notre cousin bien-aimé qui règne sur [incompetent_cousin_country.GetName], notre État sujet, s'est révélé être un bouffon incompétent, quelqu'un qui ne peut et ne devrait diriger aucun pays."
 subject_interaction_events.4.a:1 "Essayons de trouver quelqu'un de meilleur pour diriger [incompetent_cousin_country.GetName]."
 subject_interaction_events.4.b:0 "Cela ne peut qu'apporter le désordre au pays. Laissons faire."
 subject_interaction_events.5.t:0 "Cousin compétent"
 subject_interaction_events.5.d:0 "Des réformes ont été entreprises, des ministres et conseillers inutiles renvoyés, l'armée et la marine n'ont jamais été meilleures... Il semble que notre cousin serve bien notre État sujet, gouvernant d'une main ferme et prenant des décisions compétentes."
 subject_interaction_events.5.a:0 "Si nous avons jamais eu des doutes, ils sont depuis longtemps oubliés."
 subject_interaction_events.6.t:0 "Le cousin revendique le Trône de [Root.Country.GetName]"
 subject_interaction_events.6.d:0 "Notre emprise fragile sur le trône de [Root.Country.GetName] a renforcé la prétention de notre cousin, et ce bâtard revendique que le trône devrait être le sien ! Il serait facile de déposer notre cousin, mais mieux pour la paix s'il peut être soudoyé pour retirer sa prétention."
 subject_interaction_events.6.a:0 "Déposons notre cousin !"
 subject_interaction_events.6.b:0 "Essayons de le soudoyer."
 subject_interaction_events.7.t:0 "Main-d'œuvre mal utilisée"
 subject_interaction_events.7.d:0 "La main-d'œuvre que nous avons envoyée à notre État sujet a été utilisée de manières que nous n'aurions jamais pu prévoir ! Les hommes ont été forcés de construire des routes et des bâtiments, de nettoyer les places publiques des ordures et détritus, et pas une fois ils n'ont vu la bataille. Bien que les routes soient plus larges et meilleures qu'avant, les bâtiments plus solides et les places publiques immaculées, ce n'était sûrement pas ainsi que ces hommes devaient être utilisés ?"
 subject_interaction_events.7.a:0 "Disons-leur comment utiliser la main-d'œuvre, correctement !"
 subject_interaction_events.7.b:0 "Ils font preuve de débrouillardise, tant mieux pour eux !"
 subject_interaction_events.8.t:0 "Débrouillard ou réprimandé"
 subject_interaction_events.8.d:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] nous a envoyé de la main-d'œuvre et a subventionné notre armée, mais en ces temps paisibles, il n'y a pas eu besoin de soldats. Au lieu de rester oisifs à ne rien faire d'autre que s'entraîner, manger et dormir, nous les avons mis au travail. Ils ont construit des routes et des bâtiments, nettoyé les places publiques des ordures et détritus, et accompli d'autres tâches utiles qui auraient autrement pris plus de temps et d'argent que [Root.Country.GetName] n'en a."
 subject_interaction_events.8.a:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] pense que nous avons gaspillé la main-d'œuvre."
 subject_interaction_events.8.b:0 "[From.Monarch.GetTitle] [From.Monarch.GetName] nous a félicités pour notre débrouillardise."
 subject_interaction_events.9.t:0 "La menace de la main-d'œuvre"
 subject_interaction_events.9.d:0 "Nous n'avons pas manqué de main-d'œuvre depuis que notre suzerain a commencé à subventionner notre armée, mais il y a eu beaucoup de troubles parmi les soldats depuis l'arrivée des nouveaux. Leur culture, leur langue, leurs traditions et parfois même leur religion diffèrent de celles de nos propres soldats, et cela nous cause beaucoup de problèmes. Ils sont moins disciplinés, ou refusent tout simplement de recevoir des ordres de nos propres généraux."
 subject_interaction_events.9.a:0 "Renvoyons-les d'où ils viennent."
 subject_interaction_events.9.b:0 "Essayons de les faire obéir."
 subject_interaction_events.10.t:0 "La main-d'œuvre cause des troubles en [From.Country.GetName]"
 subject_interaction_events.10.d:0 "Il y a toujours des troubles quand des gens de cultures différentes, avec des langues, des traditions et parfois même des religions différentes se réunissent et doivent travailler comme une unité même quand tant de choses les séparent. La main-d'œuvre que nous avons envoyée à [From.Country.GetName] a causé plus de problèmes que [From.Monarch.GetTitle] [From.Monarch.GetName] n'était disposé à gérer, et donc certains des hommes nous ont été renvoyés."
 subject_interaction_events.10.a:0 "Nos hommes savent obéir aux ordres, [From.Monarch.GetName] n'a pas assez essayé !"
 subject_interaction_events.11.t:0 "Les soldats marchent sur leur estomac"
 subject_interaction_events.11.d:0 "La nourriture, les armes, les vêtements et toutes sortes d'équipements sont nécessaires pour assurer que nos armées seront victorieuses dans toute bataille. Cependant, avec l'afflux récent de main-d'œuvre, nous sommes en mesure d'enrôler plus d'hommes que nous pouvons à peine nous permettre."
 subject_interaction_events.11.a:0 "Demandons à notre suzerain plus d'argent pour l'entretien."
 subject_interaction_events.11.b:0 "Résolvons le problème d'une autre manière."
 subject_interaction_events.12.t:0 "Le besoin d'entretien de [From.Country.GetName]"
 subject_interaction_events.12.d:0 "Tout soldat décent a besoin de nourriture, d'une arme ou deux, de vêtements et d'autres types d'équipement pour donner le meilleur de lui-même pour le pays qui lui donne des ordres. [From.Country.GetName] connaît ses limites pour fournir ces choses aux soldats qu'ils peuvent enrôler, et a demandé que nous leur envoyions quelque chose pour les aider à s'occuper de la main-d'œuvre que nous leur subventionnons."
 subject_interaction_events.12.a:0 "Envoyons-leur un général."
 subject_interaction_events.12.b:0 "Ils ont besoin d'un bon conseiller."
 subject_interaction_events.12.c:0 "Envoyons plus de soldats et d'or."
 subject_interaction_events.12.e:0 "Ils ont tout ce dont ils ont besoin, nous ne leur donnerons rien de plus."
 subject_interaction_events.13.tt1:0 "A envoyé un Général à [From.Country.GetName]"
 subject_interaction_events.13.tt2:0 "A envoyé un Conseiller à [From.Country.GetName]"
 subject_interaction_events.13.tt3:0 "A envoyé plus d'Or et de Main-d'œuvre à [From.Country.GetName]"
 subject_interaction_events.13.tt4:0 "N'a rien envoyé à [From.Country.GetName]"
 subject_interaction_events.13.t:0 "[From.Country.GetName] répond à la demande d'entretien"
 subject_interaction_events.13.d:0 "Nous doutions que [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] nous envoie quoi que ce soit pour nous aider avec l'entretien de nos armées, mais gardions espoir pour quelque chose qui pourrait vraiment nous aider. Un général, un conseiller, peut-être même plus d'or et de main-d'œuvre ? Qu'allions-nous obtenir, si toutefois nous obtenions quelque chose ?"
 subject_interaction_events.13.a:0 "[From.Country.GetName] a envoyé un général."
 subject_interaction_events.13.b:0 "[From.Country.GetName] a envoyé un conseiller."
 subject_interaction_events.13.c:0 "[From.Country.GetName] a envoyé de l'or et de la main-d'œuvre."
 subject_interaction_events.13.e:0 "[From.Country.GetName] n'a rien envoyé."
 subject_interaction_events.14.t:0 "Embargos et contrebandiers"
 subject_interaction_events.14.d:0 "Les récents embargos contre les rivaux de notre suzerain pourraient être notre ruine financière. Heureusement, il y a des individus estimés en [Root.Country.GetName] qui nous aideraient gracieusement avec notre problème commercial. Bien qu'il puisse sembler ridicule d'appeler une si petite opération « contrebande », c'est exactement ce que c'est, et comme nous pourrions enfreindre certains des embargos que notre suzerain nous a imposés, ils ne seront probablement pas contents de notre inconduite."
 subject_interaction_events.14.a:0 "Une opportunité comme celle-ci se présente rarement, nous devons accepter !"
 subject_interaction_events.14.b:0 "Cela ne vaut pas le risque d'encourir la colère de notre suzerain."
 subject_interaction_events.14.ct:0 "Il y a une légère chance que notre suzerain le remarque"
 subject_interaction_events.15.t:0 "Les contrebandiers de notre vassal"
 subject_interaction_events.15.d:0 "Nos embargos contre nos rivaux ne fonctionnent pas aussi bien que nous l'espérions, et une raison pourrait être que l'un de nos vassaux commerce encore avec eux ! Ils font passer des marchandises en contrebande et interfèrent ainsi avec nos objectifs, nous faisant paraître faibles. La contrebande est très mineure, mais pourrait devenir très dommageable pour nous.\nD'un autre côté, de puissants intérêts commerciaux seraient prêts à payer pour ignorer la contrebande."
 subject_interaction_events.15.a:0 "Forçons-les à arrêter la contrebande, maintenant !"
 subject_interaction_events.15.b:0 "Ils peuvent poursuivre cette petite entreprise."
 subject_interaction_events.16.tt1:0 "Notre vassal est sommé de cesser la contrebande"
 subject_interaction_events.16.tt2:0 "Notre vassal est autorisé à maintenir la contrebande à petite échelle"
 subject_interaction_events.16.t:0 "Pris la main dans le sac !"
 subject_interaction_events.16.d:0 "Notre opération de contrebande a été exposée par [From.Country.GetName], les contrebandiers littéralement pris en flagrant délit pendant le déchargement de marchandises destinées à l'un des rivaux de [From.Country.GetName]. Les lâches ont tout avoué, même depuis combien de temps cette opération était en cours."
 subject_interaction_events.16.a:0 "Ils nous forcent à arrêter cette contrebande !"
 subject_interaction_events.16.b:0 "Tant que nous restons discrets, nous pouvons continuer."
 subject_interaction_events.17.t:0 "La guerre ne change jamais"
 subject_interaction_events.17.d:0 "En échange d'un peu de paix et de tranquillité, nos vassaux sont obligés de nous payer plus de revenus, à nous leur suzerain. Ils ne sont pas appelés dans aucune de nos guerres, ce que nous estimons être un excellent compromis : pour un peu d'or, ils sont exclus de presque toutes les guerres. L'un de nos vassaux se demande s'il ne vaudrait pas mieux être appelé aux guerres au lieu de payer ces sommes, selon eux, « ridicules »."
 subject_interaction_events.17.a:0 "Ingrats idiots !"
 subject_interaction_events.18.t:0 "Les avantages de l'écuage"
 subject_interaction_events.18.d:0 "Alors que nos terres ravagées par la guerre sont lentement reconstruites, nous avons remarqué un regard dans les yeux de l'ambassadeur de notre vassal, un regard de compréhension et de peur mêlé d'un certain soulagement que la terre qu'ils regardent ne soit pas la leur. « Maintenant », disent-ils, « l'or que nous payons en écuage pour éviter d'être appelés à la guerre semble être une petite somme, quelque chose dont nous pourrions facilement nous séparer en échange de la paix. »"
 subject_interaction_events.18.a:0 "Nous leur avions dit que cela fonctionnerait !"
 subject_interaction_events.19.t:0 "Conscrits chaotiques"
 subject_interaction_events.19.d:0 "Les soldats que nous avons envoyés à l'un de nos vassaux dans le cadre de la subvention des armées sont devenus incontrôlables ! Ils menacent de se rebeller à moins que nous ne les retirions des terres de notre vassal et les laissions rentrer chez eux."
 subject_interaction_events.19.a:0 "Si nous fermons les yeux, peut-être partiront-ils."
 subject_interaction_events.19.b:0 "Essayons de calmer ces forces turbulentes, laissons-les rentrer chez eux si c'est ce qu'ils souhaitent."
 subject_interaction_events.20.t:0 "Loyalistes gaspilleurs"
 subject_interaction_events.20.d:0 "Nous payons des loyalistes pour maintenir le Désir de liberté dans le pays de notre partenaire junior bas et gérable, mais les derniers rapports sont devenus de plus en plus désespérés dans leurs suppliques pour de l'argent. De l'argent qu'ils doivent gaspiller, ne l'utilisant pas pour s'assurer que l'union entre notre pays et le leur reste en place !"
 subject_interaction_events.20.a:0 "Convainquons-les de mieux gérer les paiements mensuels."
 subject_interaction_events.20.b:0 "Envoyons-leur une petite somme pour garantir leur loyauté."
 subject_interaction_events.21.t:0 "L'embarras des loyalistes"
 subject_interaction_events.21.d:0 "Bien que nous apprécions tous les patriotes, les loyalistes, ceux qui aiment leur pays et le protégeront à tout prix, quand ils réussissent à nous embarrasser devant toute la cour, leur amabilité diminue férocement. Ce n'est pas pour cela que nous payons, cette belle somme qui chaque mois disparaît dans leurs poches avides ! L'union que nous essayons de protéger vaut plus que leurs têtes pleines de poux."
 subject_interaction_events.21.a:0 "Qu'on leur coupe la tête et qu'on les mette sur les murs de [Root.Capital.GetName] !"
 subject_interaction_events.21.b:0 "Il y a sûrement quelque chose que nous pouvons faire pour oublier et pardonner cet événement malheureux ?"
 subject_interaction_events.22.t:0 "Loyalistes couronnés de succès"
 subject_interaction_events.22.d:0 "L'argent envoyé aux loyalistes dans l'un des pays avec lesquels nous avons une union a été bien dépensé, plus que nous n'aurions jamais pu imaginer et anticiper. Le Désir de liberté de leur peuple a diminué bien au-delà de ce que nous pensions possible."
 subject_interaction_events.22.a:0 "Quelle agréable surprise !"
 subject_interaction_events.23.t:0 "Les loyalistes provoquent une rébellion"
 subject_interaction_events.23.d:0 "Un fléau a frappé un pays avec lequel nous avons une union, un fléau de fous et de folles armés de toutes les armes qu'ils ont pu trouver. Enragés par le comportement des loyalistes, ils se sont soulevés ! Au lieu de renforcer le lien entre nous, les loyalistes ont réussi à nuire au pays et à faire montrer leur sale tête aux rebelles."
 subject_interaction_events.23.a:0 "Essayons de réparer leurs dégâts."
 subject_interaction_events.23.b:0 "Il n'y a rien que nous puissions faire."
 subject_interaction_events.24.t:0 "Le comportement cruel d'officiers grossiers"
 subject_interaction_events.24.d:0 "« Beaucoup de petits ruisseaux font une grande inondation » : un proverbe qui s'est malheureusement avéré vrai dans notre protectorat. De petits événements, à peine perceptibles pour nous mais de grands affronts pour ceux qui en ont été témoins ou exposés, combinés à d'anciennes plaintes et des souvenirs amers de quand le pays est devenu notre protectorat, ont été la goutte d'eau. Le comportement déplorable, non, cruel des officiers que nous avons envoyés, a conduit à une rupture et à de mauvaises relations entre nous et le protectorat."
 subject_interaction_events.24.a:0 "Nous devons apprendre à nos officiers comment devenir des gentilshommes !"
 subject_interaction_events.25.t:0 "Un gentilhomme et un officier"
 subject_interaction_events.25.d:0 "Le code de conduite que nous avons essayé d'imprimer dans l'esprit de chaque officier avant qu'ils ne quittent notre pays pour travailler comme instructeurs militaires dans l'un de nos protectorats n'a peut-être pas été du temps perdu. Nous avons reçu un message applaudissant et exprimant à quel point le comportement et la discipline stricte que ces officiers montrent sont impressionnants, et nous en tant que pays devrions être fiers d'avoir réussi à faire des gentilshommes de nos officiers."
 subject_interaction_events.25.a:0 "Nous ne pourrions être plus fiers."
 subject_interaction_events.26.t:0 "Plus on vend, plus on sème, plus on récolte"
 subject_interaction_events.26.d:0 "Nous contrôlons le commerce de notre protectorat, et plus nous réussissons à exporter de tout ce qu'ils cultivent et produisent, plus la récolte est grande ! D'une manière ou d'une autre, nous avons réussi à augmenter à la fois la qualité et la quantité de leur production, et à accroître notre puissance commerciale également."
 subject_interaction_events.26.a:0 "Quantité et qualité, c'est la voie."
 subject_interaction_events.27.t:0 "Exacerbation des effets de l'exportation"
 subject_interaction_events.27.d:0 "Les marchands et négociants de nos protectorats ont subi un coup majeur à leur commerce quand nous avons décidé de prendre le contrôle de la puissance commerciale de leur pays. Leurs plaintes concernant les « difficultés » que cette politique mercantile leur a apportées ont atteint le souverain du protectorat, qui est d'accord avec eux et a clairement fait savoir que nos relations avec eux souffrent à cause de cela."
 subject_interaction_events.27.a:0 "Tant que tout ce qu'ils font c'est se plaindre, nous nous en moquons."
 subject_interaction_events.28.t:0 "Rivalité fraternelle"
 subject_interaction_events.28.d:0 "Ce n'est jamais amusant de regarder des frères se battre, ou peut-être que si... surtout si ces frères sont deux pays, dont l'un est un protectorat de [Root.Country.GetName]. Peut-être pouvons-nous servir de médiateur et voir si nous pouvons forcer... négocier une paix blanche entre eux ?"
 subject_interaction_events.28.a:0 "Enquêtons et servons d'intermédiaire."
 subject_interaction_events.28.b:0 "Battez-vous ! Battez-vous ! Battez-vous !"
 subject_interaction_events.29.t:0 "Légitimité contestée"
 subject_interaction_events.29.d:0 "Bien que notre emprise sur le trône de [Root.Country.GetName] puisse faiblir et notre légitimité être contestée, notre fierté et notre prestige ont pris un coup quand l'un de nos sujets s'est exprimé contre nous en public. Ils prétendent que nous n'avons pas le droit d'essayer de les gouverner aussi alors que nous pouvons à peine gérer notre propre pays."
 subject_interaction_events.29.a:0 "Réprimandons-les pour avoir parlé contre nous en public."
 subject_interaction_events.29.b:0 "Ils ont peut-être raison, et cela ne devrait pas affecter leur opinion de nous."
 subject_interaction_events.30.t:0 "Le gouffre de la banqueroute"
 subject_interaction_events.30.d:0 "Un souverain avide du meilleur que le pays peut fournir, un trésor gouverné par des personnes cupides et incompétentes, des investissements qui ont mal tourné et trop d'emprunts... Voilà comment on creuse le gouffre de la banqueroute, et c'est peut-être tout cela ou juste l'une de ces raisons qui a fait trébucher l'un de nos sujets dans le gouffre et tomber jusqu'au fond. Nous pouvons les aider à en sortir partiellement avec un don d'argent, ou ignorer cela et les laisser s'aider eux-mêmes."
 subject_interaction_events.30.a:0 "Intervenons, envoyons-leur de l'argent et une échelle !"
 subject_interaction_events.30.b:0 "Ils n'ont qu'eux-mêmes à blâmer !"
 subject_interaction_events.31.t:0 "La question des droits"
 subject_interaction_events.31.d:0 "L'un de nos sujets détient actuellement des terres sur lesquelles nous avons une revendication. Si nous devions revendiquer cette province pour nous-mêmes, ils nous regarderaient sans doute avec mépris et méfiance. D'un autre côté, ils ne seraient pas en position de nous empêcher de prendre le contrôle de la région si nous le souhaitions."
 subject_interaction_events.31.a:0 "Prenons la province."
 subject_interaction_events.31.b:0 "Renonçons à la revendication et au cœur."
 subject_interaction_events.31.c:0 "Cette situation nous convient, laissons faire."
