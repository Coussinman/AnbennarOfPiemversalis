 wedge_throw:0 "« Jet de coin »"
 desc_wedge_throw:0 "Les fermiers de cette province traversent des temps difficiles. Pour les aider à se remettre, nous avons allégé leur charge fiscale et leur avons accordé un prêt pour 3 ans."
 poor_rice_harvests:0 "Mauvaises récoltes de riz"
 desc_poor_rice_harvests:0 "Les fermiers de cette province traversent des temps difficiles. Comme nous avons refusé d'alléger leur charge fiscale ou de leur permettre d'emprunter de l'argent, la région bouillonne maintenant de mépris pour le pouvoir étatique."
 monastaries_blooming:0 "Monastères florissants"
 desc_monastaries_blooming:0 "Les politiques sages de notre souverain ont eu un effet très bénéfique sur l'activité monastique dans cette région, avec un développement généralement positif ici. Les Monastères eux-mêmes sont riches et les moines sont disciplinés, et en conséquence toute la province prospère, des malades et des pauvres aux bien-portants et aux riches."
 gifted_white_elephant:0 "Éléphant blanc offert"
 cleansing_of_monasteries:0 "Purification des monastères"
 desc_cleansing_of_monasteries:0 "Afin d'améliorer la discipline monastique très déficiente dans cette région, nous avons infligé des punitions très violentes et strictes à ceux qui enfreignent leurs vœux. De telles purifications sont parfois nécessaires bien que regrettables, la situation semble s'améliorer lentement."
 strict_punishment_of_monks:0 "Punition stricte des moines"
 desc_strict_punishment_of_monks:0 "Afin d'améliorer la discipline monastique déficiente dans cette région, nous avons imposé un contrôle beaucoup plus strict de la zone et des amendes aux moines déviants. Tout moine trouvé en train de déshonorer ses vœux ou son ordre devra payer un grand nombre de têtes de bétail à l'État."
 lacking_monastic_discipline:0 "Discipline monastique déficiente"
 desc_lacking_monastic_discipline:0 "La discipline déficiente des Monastères dans cette région est largement connue et en conséquence la région souffre à la fois économiquement et spirituellement. C'est le devoir du pouvoir temporel de freiner de tels excès dans les Monastères, mais cette fois-ci il a échoué."
 forced_labor:0 "Travail forcé"
 desc_forced_labor:0 "Nous avons forcé des fermiers des provinces environnantes à aider à améliorer cette province pour le bien commun."
 human_sacrifice:0 "« Le Sacrifice humain »"
 desc_human_sacrifice:0 "Nous avons demandé à des fermiers des provinces environnantes d'aider à améliorer cette région en échange d'une compensation pour la perte de revenus."
 bountiful_harvest:0 "Récolte abondante"
 desc_bountiful_harvest:0 "La nourriture est bon marché et nos greniers sont pleins après une récolte inhabituellement abondante."
 political_rival_crushed:0 "Rival politique écrasé"
 desc_political_rival_crushed:0 "Nous avons bien profité d'une série temporaire de revers pour l'un de nos rivaux politiques. Il a maintenant été manœuvré au point qu'il semble peu probable qu'il redevienne un problème un jour. D'autres ont observé nos actions et y réfléchiront à deux fois avant d'essayer de remettre en question le pouvoir de l'État à l'avenir."
 hostile_monastery:0 "Monastère hostile"
 desc_hostile_monastery:0 "En raison de ce qu'ils perçoivent comme une grave inconduite de la part de leur souverain, les moines de cette province sont ouvertement hostiles à l'État et à son dirigeant."
 social_bandit:0 "Bandit populaire"
 desc_social_bandit:0 "Une bande de brigands inhabituellement efficace harcèle cette région et échappe aux troupes de l'État. La bande en général et le chef en particulier ont acquis une popularité même en dehors de la zone immédiate grâce à leur succès. Bien qu'il soit très incertain que leurs objectifs soient vraiment idéologiques, ils ont commencé à devenir un symbole de résistance au pouvoir central et à l'autorité en général."
 social_bandit_local_search:0 "Bandit populaire"
 desc_social_bandit_local_search:0 "Une bande de brigands inhabituellement efficace harcèle cette région et échappe aux troupes de l'État. La bande en général et le chef en particulier ont acquis une popularité même en dehors de la zone immédiate grâce à leur succès. Bien qu'il soit très incertain que leurs objectifs soient vraiment idéologiques, ils ont commencé à devenir un symbole de résistance au pouvoir central et à l'autorité en général."
 upset_theravada_monks:0 "Ordre monastique offensé"
 desc_upset_theravada_monks:0 "En raison d'un désaccord avec la décision de notre souverain dans une affaire qui les concernait, un ordre monastique très influent dans cette région est actuellement assez antagoniste."
 pleased_theravada_nobles:0 "Aristocrates locaux satisfaits"
 desc_pleased_theravada_nobles:0 "En raison d'une décision favorable de notre souverain dans un litige juridique, une famille très influente de cette région est très favorable à notre souverain."
 pleased_theravada_monks:0 "Ordre monastique satisfait"
 desc_pleased_theravada_monks:0 "En raison d'une décision favorable de notre souverain dans un litige juridique, le monastère local de cette région est très favorable à notre souverain."
 upset_theravada_nobles:0 "Aristocrates locaux offensés"
 desc_upset_theravada_nobles:0 "En raison d'un désaccord avec la décision de notre souverain dans une affaire qui les concernait, une famille très influente dans cette région est actuellement assez antagoniste."
 regulate_the_monastaries_title:0 "Réglementer les monastères"
 regulate_the_monastaries_desc:0 "Bien que la richesse spirituelle des principaux monastères de notre pays soit un atout constant pour notre souverain, ces monastères ont aussi tendance à sombrer dans la corruption et le manque de discipline. Nous devons freiner les excès des moines et créer un ensemble de lois strictes avec des punitions sévères pour ceux qui faiblissent, qu'il s'agisse de moines individuels ou d'ordres entiers."
 regulated_monasteries:0 "Loi monastique réglementée"
 desc_regulated_monasteries:0 "Nous avons créé un recueil de lois ferme et strict pour assurer la discipline des ordres monastiques dans notre pays. Des punitions sévères attendent ceux qui faiblissent dans leur rôle de guides spirituels, qu'il s'agisse de moines individuels ou d'ordres entiers."
 invite_lama_title:0 "Inviter un Lama à s'installer dans notre pays"
 invite_lama_desc:0 "Nous devrions inviter un Lama puissant à s'installer dans notre capitale. En patronnant cet homme et ses futures réincarnations, nous pouvons créer un héritage durable pour notre dynastie."
 vajrayana_lama:0 "Lama"
 desc_vajrayana_lama:0 "Un Lama puissant s'est installé dans notre capitale et s'est allié à nos dirigeants."
 influx_of_tibetan_monks:0 "Afflux de moines tibétains"
 desc_influx_of_tibetan_monks:0 "Une délégation de moines tibétains est arrivée sur ces terres pour promouvoir la propagation du bouddhisme ici et dans tous les coins du pays."
 vajrayana_great_monastery:0 "Grand Monastère"
 desc_vajrayana_great_monastery:0 "Cette province abrite l'un des plus grands monastères de notre pays. Bien que ce soit toujours un fardeau financier pour l'État de partager tant de terres avec quelqu'un d'autre, la communauté riche et florissante de moines ici fait sa part pour développer la province."
 adopt_vajrayana_title:0 "Adopter le Bouddhisme Vajrayana"
 adopt_vajrayana_desc:0 "La religion du Tibet est un outil puissant et le bouddhisme a jadis été défendu par de grands empires. Convertissons notre pays à cette nouvelle religion puissante et apprenons la valeur de la paix et de la discipline."
 destruction_of_idols:0 "Destruction des idoles"
 desc_destruction_of_idols:0 "Une campagne pour détruire les idoles païennes dans notre pays ne nous fait guère d'amis parmi les partisans acharnés de l'ancienne religion, mais elle accélère grandement la conversion de tous les païens, même si l'on peut douter de la sincérité de certains."
 hampered_growth:0 "Croissance entravée"
 desc_hampered_growth:0 "Cette province s'est développée plus rapidement que l'infrastructure ne pouvait le supporter. En conséquence, les tensions sociales augmentent."
 improvement_program:0 "Amélioration des infrastructures"
 desc_improvement_program:0 "Afin de soutenir le développement rapide de cette province, elle a reçu de la nourriture supplémentaire et la pression fiscale a été allégée ici."
 supporting_local_monastic_traditions:0 "Soutien aux traditions monastiques locales"
 desc_supporting_local_monastic_traditions:0 "Plutôt que d'essayer d'imiter les autres, nous cultivons une tradition Theravada qui nous est très distinctement propre. Cela renforcera sans doute nos institutions nationales à long terme, mais cela nous a aussi aliénés des autres souverains."
 lankan_monks_sent:0 "Échange de moines Theravada"
 no_lankan_monks_sent:0 "Éducation monastique refusée"
 monks_from_ceylon:0 "Influence sri-lankaise"
 desc_monks_from_ceylon:0 "Nous nous sommes grandement inspirés des États du Sri Lanka et des ordres monastiques de là-bas. Cela nous a permis de former des liens beaucoup plus profonds avec les prestigieuses traditions Theravada de cette île."
 powerful_buddhist_monastery:0 "Monastère puissant"
 desc_powerful_buddhist_monastery:0 "Cette province abrite un Ordre monastique puissant qui, bien que content de s'occuper de ses propres affaires, est devenu assez puissant pour ignorer le pouvoir de l'État dans une certaine mesure."
 powerful_benevolent_monastery:0 "Monastère puissant et bienveillant"
 desc_powerful_benevolent_monastery:0 "Cette province abrite un Ordre monastique puissant qui soutient notre État. Bien que leur soutien nous aide au niveau national, leur influence sur cette province croît rapidement."
 powerful_hostile_monastery:0 "Monastère puissant et hostile"
 desc_powerful_hostile_monastery:0 "Cette province abrite un Ordre monastique puissant en opposition au pouvoir de l'État."
 bandit_leader_returned:0 "Chef de bandits"
 desc_bandit_leader_returned:0 "Un ancien chef de bandits avec un public assez populaire a repris ses activités dans cette région. À présent, cependant, c'est un homme plus âgé et plus fragile et ce n'est sans doute qu'une question de temps avant que ses activités ne cessent d'une manière ou d'une autre."
 social_bandit_myth:0 "Mythe du chef de bandits libre d'esprit"
 desc_social_bandit_myth:0 "Les ennemis de l'État partout puisent actuellement de la force dans le mythe d'un chef de bandits ordinaire que nous avons tué pour ses crimes. Ce mythe sera sans doute relégué au rang de conte de fées avec le temps, mais pour l'instant il sert à unir ceux qui s'opposent au pouvoir de l'État."
 grain_for_the_poor:0 "Du grain pour les pauvres"
 desc_grain_for_the_poor:0 "Nous avons redistribué notre surplus de grain pour nous assurer que personne n'aura à endurer la faim sur nos terres."
 grain_reserves:0 "Réserves de grain"
 desc_grain_reserves:0 "Nos réserves de grain bien remplies sont un garant de la stabilité de notre pays."
 governor_replaced:0 "Discontinuité administrative"
 desc_governor_replaced:0 "Notre remplacement soudain du gouverneur local dans cette province a conduit à un manque de contrôle central."
 buddhist_nepotism:0 "Népotisme"
 desc_buddhist_nepotism:0 "La population de cette province a l'impression que ce sont les relations personnelles plutôt que la compétence qui guident les nominations d'officiels dans cette région."
 sold_our_elephant:0 "A vendu l'éléphant blanc offert"
 buddhism_events.1.t:0 "Démission du ministre"
 buddhism_events.1.d:1 "$PHILOSOPHER$$NATURAL_SCIENTIST$$ARTIST$$TREASURER$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$ a publiquement condamné les politiques de [Root.Monarch.GetName] et de son gouvernement. Notre ministre ne veut plus avoir affaire à nous et nous rappelle qu'un [Root.Monarch.GetTitle] qui ne peut pas faire respecter les lois légitimes n'attirera que des menteurs et des délateurs dans son gouvernement."
 buddhism_events.1.a:0 "Bon débarras !"
 buddhism_events.2.t:0 "Détérioration des monastères de [Root.GetName]"
 buddhism_events.2.d:0 "En raison d'une combinaison de discipline monastique déficiente et d'une économie chancelante, de nombreux grands monastères de [Root.GetName] ont vu leur effectif diminuer au cours des dernières années. Un Bhikkhu préoccupé a approché [Root.Owner.Monarch.GetTitle] avec un avertissement que si rien n'est fait bientôt, la situation désastreuse pourrait conduire les derniers moines à abandonner leurs vœux ou à chercher à rejoindre des monastères ailleurs, laissant [Root.GetName] appauvri à la fois spirituellement et économiquement. Il y a, cependant, de nombreux propriétaires terriens locaux plus que prêts à empiéter sur les terres qu'un monastère vide laisserait derrière lui. Comme [Root.Owner.Monarch.GetTitle] est censé protéger la vie monastique en [Root.Owner.GetName], il sera clair pour de nombreux observateurs que la responsabilité de ce qui arrivera reposera sur ses épaules."
 buddhism_events.2.a:0 "Nous devons faire tout ce que nous pouvons !"
 buddhism_events.2.b:0 "Peut-être que la terre sera maintenant mieux utilisée."
 buddhism_events.3.t:0 "Vœux monastiques rompus"
 buddhism_events.3.d:0 "La discipline religieuse des moines de [Root.GetName] faiblit. En raison du manque de fonds, de la monopolisation des postes monastiques supérieurs par un petit groupe d'aristocrates et d'un [Root.Owner.Monarch.GetTitle] incapable de protéger les fidèles comme on l'attend d'un véritable souverain bouddhiste, de plus en plus de moines semblent rompre leurs vœux pour abandonner la vie monastique, ou dans certains cas la maintenir sans en honorer les principes. Un cas particulièrement flagrant d'un moine rompant ses vœux et incitant les autres à faire de même a récemment été porté à notre attention et beaucoup liront sans doute beaucoup de choses dans la façon dont nous choisirons de traiter cela. Bien qu'un bon souverain doive toujours faire preuve de clémence et de douceur, c'est aussi le devoir de tout souverain de maintenir la discipline des monastères, par la force si nécessaire."
 buddhism_events.3.a:0 "Nous devons faire preuve de douceur."
 buddhism_events.3.b:0 "Amendes aux moines déviants : tous biens meubles et bétail."
 buddhism_events.3.c:0 "Exécutons le moine et quiconque le soutient !"
 buddhism_events.4.t:0 "Les ordres monastiques soutiennent un prétendant"
 buddhism_events.4.d:0 "Comme c'est le devoir du monarque de protéger les institutions monastiques, c'est le devoir de ces institutions de protéger le pays contre les mauvais dirigeants. En raison de ce qu'ils estiment être un manque d'attention aux devoirs d'un monarque et une incapacité et un désintérêt à défendre le bien commun en général et les organisations monastiques de notre pays en particulier, certains des monastères les plus puissants se sont ouvertement prononcés en faveur d'un parent éloigné de notre [Root.Monarch.GetTitle]."
 buddhism_events.4.a:0 "C'est un scandale !"
 buddhism_events.5.t:0 "Précédent de [Root.Monarch.GetName]"
 buddhism_events.5.d:0 "Une décision récente de [Root.Monarch.GetName] a été considérée si juste et bien argumentée qu'elle a été utilisée comme exemple à suivre dans des cas similaires dans un addendum récemment créé à une collection des lois Pali de [Root.GetName]. Comme [Root.Monarch.GetName] est connu pour sa rigueur constante à adhérer aux vertus du Rajadhamma, ce n'est pas la première fois que son règne est présenté comme un bon exemple."
 buddhism_events.5.a:0 "Et ce ne sera pas la dernière."
 buddhism_events.6.t:0 "Éléphant blanc capturé"
 buddhism_events.6.d:0 "Un éléphant blanc a été capturé dans l'arrière-pays de [Root.GetName]. Cet incident de bon augure a été largement interprété comme un témoignage du règne sage et bienveillant de [Root.Monarch.GetName]."
 buddhism_events.6.a:0 "Prenons-en bien soin."
 buddhism_events.6.b:0 "Vendons-le."
 buddhism_events.6.c:0 "Il ferait un excellent cadeau !"
 buddhism_events.7.t:0 "Un éléphant blanc"
 buddhism_events.7.d:0 "Un éléphant blanc a été capturé dans l'arrière-pays de [From.GetName] et [From.Monarch.GetName] a sagement interprété cela comme un signe de l'alliance productive de nos deux peuples. C'est le plus grand cadeau qu'un souverain puisse nous faire et sera probablement très bien vu par notre population. Cependant, il sera aussi assez coûteux de prendre soin de cette bête rare, même si nous pourrions difficilement refuser de le faire."
 buddhism_events.8.t:0 "Les monastères de [Root.GetName]"
 buddhism_events.8.d:0 "Les politiques sages et productives de [Root.Monarch.GetName] concernant les monastères du royaume ont toujours été bien réfléchies et bienveillantes. Aucun monastère n'est autorisé à devenir pauvre, et pourtant la discipline et la force des institutions elles-mêmes n'ont pas été autorisées à se détériorer. En conséquence, les monastères de [Root.GetName] sont florissants et notre État est devenu connu partout comme un exemple à suivre."
 buddhism_events.8.a:0 "Exigeons qu'ils aident à développer la province."
 buddhism_events.8.b:0 "Merveilleux !"
 buddhism_events.9.t:0 "Les horreurs de la guerre"
 buddhism_events.9.d:0 "Tous les hommes ne sont pas faits pour mener une vie de guerre et il semble que le conflit dans lequel notre pays est actuellement engagé en a fait réaliser certains. Le nombre de déserteurs cherchant à se cacher derrière les murs des monastères n'est pas grand, mais ils donnent un exemple dangereux. En tant que [Root.Monarch.GetTitle], c'est cependant notre devoir de protéger les monastères et bien que nous les ayons avertis à plusieurs reprises de ne pas accepter de tels hommes, il semble que certains le fassent encore."
 buddhism_events.9.a:0 "Nous devons nous rappeler d'être doux."
 buddhism_events.9.b:0 "Exigeons que les monastères nous remettent ces « moines »."
 buddhism_events.9.c:0 "Infligeons une amende aux monastères pour chaque déserteur trouvé."
 buddhism_events.10.t:0 "« Jet de coin »"
 buddhism_events.10.d:0 "Les dernières saisons n'ont pas été très clémentes pour la région de [Root.GetName] et l'un des devoirs d'un [Root.Owner.Monarch.GetTitle] est de s'occuper des pauvres. Une délégation de fermiers a maintenant approché [Root.Owner.Monarch.GetName] demandant à être exemptée d'impôts et à recevoir un prêt de 3 ans afin de pouvoir s'occuper de leurs familles pendant qu'ils travaillent à se remettre sur pied."
 buddhism_events.10.a:0 "Une demande raisonnable."
 buddhism_events.10.a.tt:0 "Il y a une chance que la province se rétablisse et l'argent pourra alors être remboursé."
 buddhism_events.10.b:0 "Malheureusement, les coffres de l'État sont aussi affamés."
 buddhism_events.11.t:0 "Reprise économique de [Root.GetName]"
 buddhism_events.11.d:0 "[Root.GetName] s'est maintenant entièrement remis de ses années difficiles et les riziculteurs de la région sont venus rembourser le prêt que nous leur avons si gracieusement accordé."
 buddhism_events.11.a:0 "Très bien."
 buddhism_events.12.t:0 "Reprise partielle en [Root.GetName]"
 buddhism_events.12.d:0 "Bien que le prêt que nous avons accordé aux fermiers de [Root.GetName] les ait aidés à ramener lentement la région à son état d'antan, ils sont encore incapables de rembourser la dette que nous leur avons un jour accordée."
 buddhism_events.12.a:0 "Passons cela en perte."
 buddhism_events.12.b:0 "Exigeons le remboursement."
 buddhism_events.13.t:0 "« Sacrifice humain »"
 buddhism_events.13.d:0 "[Root.GetName] a un besoin urgent de meilleures infrastructures. Les monastères locaux font ce qu'ils peuvent, tout comme les aristocrates locaux, mais si la région doit prospérer, l'État devra intervenir. Les plans pour améliorer la situation nécessitent des travailleurs supplémentaires venant de la campagne pour rejoindre le projet, mais tous les fermiers sont occupés par la récolte. En tant que souverain, nous pouvons leur ordonner de cesser le travail pour participer à des projets de construction pour le bien commun, mais en retour ils s'attendront à être payés le « Sacrifice humain » coutumier, soit l'équivalent de la quantité de riz qu'ils auraient pu cultiver pendant ce temps."
 buddhism_events.13.a:0 "Payons le Sacrifice humain."
 buddhism_events.13.b:0 "Abandonnons le projet."
 buddhism_events.13.c:0 "Exigeons que les fermiers travaillent sans compensation."
 buddhism_events.14.t:0 "Récolte abondante"
 buddhism_events.14.d:0 "Cette récolte a été inhabituellement abondante et [Root.Monarch.GetName] pourrait bien utiliser cette richesse inattendue pour financer les travaux religieux prévus. Une taxe supplémentaire a été suggérée pour transférer le grain excédentaire des fermiers à l'État. Cependant, la loi bouddhiste traditionnelle stipule qu'il ne peut prendre plus de 10 %, le « Sacrifice de foin », de ce qui a été récolté, et certains de nos ministres semblent mal à l'aise à l'idée d'enfreindre cette règle."
 buddhism_events.14.a:0 "Prélevons la taxe."
 buddhism_events.14.b:0 "Ne volons pas les fruits de leur labeur."
 buddhism_events.15.t:0 "Charité corinite ?"
 buddhism_events.15.d:0 "C'est en des temps comme ceux-ci, quand notre pays est caractérisé par une tranquillité relative, que nous sommes rappelés à regarder ceux qui sont moins fortunés. Les dernières récoltes n'ont été ni des échecs ni un grand succès, et en conséquence la plupart ont de la nourriture et l'État a d'amples réserves de grain. Il y a, cependant, encore quelques malheureux qui n'ont pas assez de nourriture pour se nourrir."
 buddhism_events.15.a:0 "Distribuons notre grain aux pauvres !"
 buddhism_events.15.b:0 "Gardons-le en réserve."
 buddhism_events.16.t:0 "Paroles vicieuses ?"
 buddhism_events.16.d:0 "L'aristocratie locale de [Root.GetName] semble avoir gagné en puissance ces dernières années. Bien que nous conservions un contrôle nominal sur la région, une grande partie du pouvoir réel repose sur les propriétaires terriens locaux, qui sont connus pour agrandir leurs domaines aux dépens des terres monastiques. Cette pratique, ainsi que d'autres excès, pourrait bien être utilisée contre eux, mais pour obtenir le plein effet, nous devrions probablement embellir un peu la vérité. Il y a des gens qui seraient prêts à le faire pour nous en échange de belles positions dans notre administration par la suite."
 buddhism_events.16.a:0 "Trouvons une autre voie."
 buddhism_events.16.b:0 "La fin justifie les moyens."
 buddhism_events.17.t:0 "Le souverain au front"
 buddhism_events.17.d:0 "La volonté de [Root.Monarch.GetName] de risquer sa vie et son intégrité physique pour protéger son peuple est considérée digne de respect aux yeux de Corin. Des figures monastiques de premier plan ont exprimé leur soutien et certains le comparent même à un souverain idéal pour ce sacrifice de soi."
 buddhism_events.17.a:0 "Très bien."
 buddhism_events.18.t:0 "Tapa"
 buddhism_events.18.d:0 "Récemment, [Root.Monarch.GetName] a été attaqué par ceux qui estiment que son règne a été marqué par l'extravagance et la consommation ostentatoire. Certains de nos ministres, cependant, insistent sur le fait qu'une certaine dose de luxe est nécessaire pour un souverain, surtout lorsqu'il traite avec des monarques étrangers et leurs émissaires."
 buddhism_events.18.a:0 "Débarrassons-nous des choses mondaines !"
 buddhism_events.18.b:0 "Nous ne pouvons pas descendre au niveau des paysans..."
 buddhism_events.19.t:0 "Rival politique affaibli"
 buddhism_events.19.d:0 "Même un grand souverain a quelques détracteurs. Un critique particulièrement efficace et franc de [Root.Monarch.GetName] s'est récemment retrouvé dans une situation assez difficile. Ses amis l'ont quitté et de lourdes dettes lui rendent très difficile de subvenir aux besoins de sa famille. Bien qu'une personne ingénieuse puisse encore se remettre de cette situation, nous pourrions aussi profiter de cette opportunité pour nous débarrasser de cet homme une fois pour toutes."
 buddhism_events.19.a:0 "Assurons-nous qu'il ne se remette jamais !"
 buddhism_events.19.b:0 "Un vrai [Root.Monarch.GetTitle] ne garde pas rancune."
 buddhism_events.19.c:0 "C'est le moment de la charité, aidons cet homme à se remettre."
 buddhism_events.20.t:0 "L'ancien rival se remet"
 buddhism_events.20.d:0 "Notre volonté d'aider un rival dans le besoin l'a converti de détracteur en fervent partisan. Avec sa base de pouvoir reconstruite, il est maintenant désireux de servir [Root.Monarch.GetName] et en plus de son capital politique, il offre ses propres services en tant que ministre de notre gouvernement."
 buddhism_events.20.a:0 "Excellent !"
 buddhism_events.21.t:0 "L'ancien rival se remet"
 buddhism_events.21.d:0 "Notre volonté d'aider un rival dans le besoin a peut-être été un acte vertueux, mais maintenant qu'il s'est remis, il est aussi critique que jamais de notre pouvoir. Ce qui s'est passé a peut-être légèrement affaibli la base de sa position, mais il est toujours déterminé à utiliser tout son pouvoir pour saboter le gouvernement de [Root.GetName]."
 buddhism_events.21.a:0 "Aucune bonne action ne reste impunie..."
 buddhism_events.22.t:0 "Détresse de [Root.GetName]"
 buddhism_events.22.d:0 "Un représentant des fermiers de [Root.GetName] est arrivé à [Root.Owner.Capital.GetCapitalName] aujourd'hui, implorant [Root.Owner.Monarch.GetName] d'aider à étendre et maintenir le système d'irrigation de la province. La population locale croît et revendique de nouvelles terres à une vitesse que l'infrastructure actuelle ne peut pas supporter. Le représentant demande aussi que l'État fournisse de la nourriture à ceux qui en ont besoin en attendant.\nBien que ce projet n'ait que peu d'inconvénients outre le coût, il n'y a actuellement aucun plan pour améliorer cette région particulière et le faire dans un délai raisonnable serait probablement assez coûteux."
 buddhism_events.22.a:0 "Ce [Root.Owner.Monarch.GetTitle] est toujours prêt à écouter le peuple."
 buddhism_events.22.b:0 "Vous devrez attendre votre tour."
 buddhism_events.23.t:0 "Héritage"
 buddhism_events.23.d:1 "Un conflit a surgi dans l'un des monastères les plus influents de [Root.GetName] après la mort d'un moine issu d'une famille laïque très influente. Pendant son temps en robe, il avait réussi à acquérir un riche ensemble de manuscrits précieux et un assortiment d'images de Bouddha, entre autres choses. Bien que les moines ne puissent posséder de biens en tant que tels, la loi permet encore à un disciple dévoué d'hériter de ces choses et d'être considéré comme un fils du moine. Dans ce cas, un jeune disciple a pris soin du moine jusqu'à sa fin. Il y a, cependant, d'autres intéressés, et le monastère lui-même a argué qu'il devrait recevoir l'héritage et serait probablement très reconnaissant d'un soutien dans cette affaire. La famille laïque du moine a aussi approché [Root.Monarch.GetName] espérant hériter non seulement des manuscrits et images mais aussi de certaines des terres qu'ils avaient données au monastère pendant que leur membre de famille en faisait partie."
 buddhism_events.23.a:0 "Statuer en faveur du disciple."
 buddhism_events.23.b:0 "Statuer en faveur du Monastère."
 buddhism_events.23.c:0 "Soutenir la famille laïque du moine."
 buddhism_events.24.t:0 "Monastère puissant en [Root.GetName]"
 buddhism_events.24.d:0 "Les monastères de [Root.GetName] abritent certaines des lignées les plus anciennes et les plus distinguées de [Root.Owner.Country.GetName] et ont donc toujours été influents. Ils ont, cependant, au fil des années gagné de plus en plus de pouvoir et ont aussi cultivé une relation troublamment proche avec d'autres pouvoirs de la région. Il est difficile maintenant de trouver une personne d'influence dans l'un des monastères qui ne vienne pas de l'une des familles nobles les plus riches de la région. La discipline monastique est importante, mais attaquer un Monastère puissant aussi bien retranché ne se fait pas à la légère, une option tentante est simplement de s'allier avec les moines et de les laisser prêter leur pouvoir au nôtre."
 buddhism_events.24.a:0 "Une purification est nécessaire !"
 buddhism_events.24.b:0 "Cherchons la bénédiction des moines."
 buddhism_events.24.c:0 "Ignorons la situation."
 buddhism_events.25.t:0 "Banditisme en [Root.GetName]"
 buddhism_events.25.d:0 "Des bandits harcèlent la province de [Root.GetName] depuis un bon moment maintenant, les routes sont dangereuses et les marchands évitent la région et prennent des chemins alternatifs. Comme l'autorité locale n'est pas aussi forte dans cette région que dans d'autres parties de notre Empire, les brigands ont pu continuer sans être contrôlés pour l'instant. Cela est devenu une source de préoccupation même en dehors de la région car le chef de la bande a acquis une réputation de leader de résistance contre le pouvoir central en général.\nLes autorités locales ont contacté [Root.Owner.Monarch.GetTitle] pour demander de l'aide afin de régler le problème avant qu'il ne se propage."
 buddhism_events.25.a:0 "Nous devons nous occuper de ces voleurs."
 buddhism_events.25.b:0 "Laissons les autorités locales s'en charger."
 buddhism_events.25.a.tt:0 "L'aide de l'État aidera à conclure cette affaire sans détourner les fonds locaux. Le processus peut être accéléré en diminuant l'autonomie locale."
 buddhism_events.25.b.tt:0 "Laissées à elles-mêmes, les autorités devront détourner une partie des revenus locaux pour attraper les bandits. Le processus peut être accéléré en diminuant l'autonomie locale."
 buddhism_events.26.t:0 "Chef des bandits capturé en [Root.GetName]"
 buddhism_events.26.d:0 "La campagne en [Root.GetName] pour attraper le chef des bandits de la région a finalement réussi. Pendant la chasse, sa popularité n'a fait qu'augmenter, cependant, et il est clair que c'est un homme très dangereux à laisser en vie. Le commandant des troupes qui l'ont capturé recommande que nous le tuions maintenant et ne risquions pas qu'il puisse un jour inciter ceux qui l'idéalisent à se révolter contre nous. L'un de nos ministres, cependant, souhaite rappeler à [Root.Owner.Monarch.GetName] que sauver une vie vaut mieux que construire une pagode à sept niveaux."
 buddhism_events.26.a:0 "Tuons-les tous."
 buddhism_events.26.a.tt:0 "Risque de faire des martyrs des bandits."
 buddhism_events.26.b:0 "Bannissons-le et emprisonnons ses partisans."
 buddhism_events.26.b.tt:0 "Le chef des bandits pourrait revenir un jour."
 buddhism_events.27.t:0 "Le chef des bandits revient"
 buddhism_events.27.d:0 "L'homme que nous avons autrefois banni pour banditisme dans l'une de nos provinces semble être revenu dans notre pays, prêt à rendre la vie difficile à nouveau à nos sujets locaux. Il y a encore une popularité persistante dans certaines parties du pays et on craint qu'il puisse en faire bon usage pour échapper aux autorités une fois de plus.\nSelon tous les témoignages, cependant, c'est un homme plus âgé et plus faible maintenant et bien que la situation soit encore problématique, il semble clair qu'il ne peut pas continuer longtemps cette fois."
 buddhism_events.27.a:0 "Très bien."
 buddhism_events.28.t:0 "Le mythe perdure"
 buddhism_events.28.d:0 "La réputation du chef de bandits que nous avons fait exécuter il y a quelques années a refusé de mourir avec lui. Bien que sa bande de brigands ne puisse plus terroriser les marchands et mettre en danger l'intégrité de nos routes, le mythe du chef de bandits a grandi hors de toute proportion. Un jour, son destin sera sûrement l'une des nombreuses vieilles histoires racontées aux jeunes enfants sans grande signification, pour l'instant, cependant, c'est une histoire racontée pour ridiculiser [Root.Monarch.GetName] et son règne."
 buddhism_events.28.a:0 "Très bien."
 buddhism_events.29.t:0 "Un émissaire étranger insulte [Root.Monarch.GetName]"
 buddhism_events.29.d:0 "L'émissaire de l'un de nos pays voisins a gravement offensé [Root.Monarch.GetTitle] en refusant de participer à une cérémonie à laquelle il avait été invité. [Root.Monarch.GetName] est furieux et bien qu'il puisse y avoir un doute sur le caractère délibéré ou non de l'affront, le public le perçoit clairement comme tel.\nSi nous ne condamnons pas publiquement l'ambassadeur, nous risquons de perdre la face, le conseil des ministres, cependant, recommande la prudence."
 buddhism_events.29.a:0 "Dénigrons publiquement l'ambassadeur."
 buddhism_events.29.b:0 "Un souverain ne doit jamais perdre son sang-froid."
 buddhism_events.30.t:0 "[Root.Owner.Monarch.GetTitle] accusé de favoritisme"
 buddhism_events.30.d:0 "C'est avec grand plaisir que [Root.Owner.Monarch.GetName] a regardé certains de ses amis d'enfance gravir la hiérarchie de l'État, mais maintenant cela nous a rendu la cible d'accusations de favoritisme. Le gouverneur local de [Root.GetName] a été pointé du doigt par ces accusations et la situation serait sans doute désamorcée en le remplaçant, peu importe sa compétence à ce poste."
 buddhism_events.30.a:0 "Ses services sont requis par l'État."
 buddhism_events.30.b:0 "Nous devons éviter le favoritisme à tout prix."
 buddhism_events.31.t:0 "Les lois de [Root.GetName]"
 buddhism_events.31.d:0 "La loi Pali est généralement pratiquée sous une forme ou une autre dans de nombreux pays bouddhistes et surtout parmi les Theravada. Bien que ces lois ne soient pas collectées et écrites par les États eux-mêmes, elles varient d'un pays à l'autre et parfois une collection devra être mise à jour ou renouvelée. Un sage moine a entrepris une telle collection récemment en [Root.GetName] et a produit une version mise à jour de l'une des collections de lois les plus couramment utilisées dans notre pays.\nComme la collection elle-même s'appuie sur des cas réels, elle peut cependant être vue comme un commentaire assez actuel sur les décisions de [Root.Monarch.GetName]."
 buddhism_events.31.a:0 "Excellent ! Promouvons ces lois."
 buddhism_events.31.a.tt1:0 "Comme notre souverain n'a pas été juste envers ses sujets, cette collection de lois reflète mal sur lui et diminuera notre §YPrestige§!."
 buddhism_events.31.a.tt2:0 "Comme notre souverain a été juste envers ses sujets, cette collection de lois reflète positivement sur lui et augmentera notre §YPrestige§!."
 buddhism_events.31.b:0 "Faisons ce que nous pouvons pour empêcher cela de se répandre."
 buddhism_events.32.t:0 "Avocats en désaccord"
 buddhism_events.32.d:0 "Des avocats pariant sur l'issue d'un litige juridique n'est pas rare dans nos terres, pas plus qu'un certain degré de rivalité amicale entre les professionnels d'un tribunal. Quand une telle rivalité se transforme en véritable colère et passion, l'intégrité de nos lois est en jeu.\nIl semble que deux avocats, représentant chacun de puissants protecteurs, l'un un riche monastère et l'autre une famille aristocratique de quelque influence, ont transformé un récent conflit juridique concernant un domaine considérable en une dispute acharnée. C'est très malheureux et il incombe maintenant à [Root.Monarch.GetName] de tenter de sauver la face des deux parties de manière équitable sans compromettre l'intégrité de nos tribunaux."
 buddhism_events.32.a:0 "Exigeons un nouveau procès avec d'autres avocats."
 buddhism_events.32.b:0 "Jugeons en faveur du monastère."
 buddhism_events.32.c:0 "Jugeons en faveur des nobles."
 buddhism_events.32.dd:0 "Compensons les deux parties."
 buddhism_events.33.t:0 "Une alliance utile ?"
 buddhism_events.33.d:0 "Il y a bien des siècles, les souverains mongols ont adopté la religion bouddhiste et ont cherché à la répandre parmi leur peuple. Au fil des années, cependant, beaucoup sont retournés aux anciennes voies des Chamans. [Root.Monarch.GetName] a toujours été fasciné par l'héritage de gens comme Kubilai Khan et les empires qu'ils ont autrefois créés au nom de cette religion. Quand des nouvelles nous parviennent d'un ordre monastique tibétain dynamique et en expansion, il était donc clair pour lui que cela devait être investigué.\nL'émissaire du Lama se tient maintenant devant nous et a expliqué que le Lama s'attend en effet à ce que [Root.Monarch.GetName] soit une réincarnation de Kubilai Khan. Il est aussi prêt à soutenir notre règne si nous lui permettons de répandre sa secte dans toutes les terres que nous contrôlons."
 buddhism_events.33.a:0 "Le temps du changement est venu."
 buddhism_events.33.b:0 "Restons fidèles à nos anciennes voies."
 buddhism_events.34.t:0 "Le messager revient du Tibet"
 buddhism_events.34.d:0 "Notre messager du Tibet est revenu avec des nouvelles d'un puissant chef religieux qui s'est intéressé à la cause de [Root.Monarch.GetName] et de sa dynastie. S'il doit venir à [Root.Capital.GetCapitalName], cependant, nous devons pouvoir faire bien plus que simplement garantir sa sécurité. Pour que le Lama lie son destin au nôtre, nous devons jurer que lui et ses futures incarnations recevront le respect et l'influence appropriés dans notre royaume et que nous créerons un grand Monastère pour lui et ses disciples. Si nous ne pouvons pas faire ces garanties, nous devrons nous contenter de recevoir une délégation de moines désireux de fonder un nouveau Monastère dans nos terres."
 buddhism_events.34.a:0 "D'accord."
 buddhism_events.34.b:0 "Acceptons les moines."
 buddhism_events.35.t:0 "Figures chamaniques"
 buddhism_events.35.d:0 "La conversion d'un pays chamaniste à un pays bouddhiste ne se fait pas du jour au lendemain et une grande partie des gens dans nos frontières vénèrent encore selon les anciennes voies. Désireux de répandre sa religion, cependant, le Lama le plus éminent de notre pays a condamné les figures chamaniques communes que beaucoup de gens ordinaires honorent encore et a exigé qu'elles soient toutes détruites."
 buddhism_events.35.a:0 "Brûlons les Figures."
 buddhism_events.35.b:0 "Laissons-leur du temps..."
 buddhism_events.36.t:0 "Mort d'un Lama"
 buddhism_events.36.d:0 "Notre Lama le plus vénéré et honoré est mort et la recherche de sa réincarnation a commencé. Bien que son ordre soit certain de pouvoir localiser son nouveau moi rapidement, il est probable qu'une aide de l'État pour financer l'expédition ne serait pas de refus."
 buddhism_events.36.a:0 "Donnons-leur un coup de main."
 buddhism_events.36.b:0 "Je suis sûr qu'ils peuvent gérer."
 buddhism_events.37.t:0 "Réincarnation trouvée"
 buddhism_events.37.d:0 "L'ordre de notre ancien Haut Lama a réussi à trouver son nouveau moi et l'a intronisé dans son Monastère."
 buddhism_events.37.a:0 "Qu'il vive longtemps."
 buddhism_events.38.t:0 "Légitimité de l'incarnation contestée"
 buddhism_events.38.d:0 "Les subtilités de la renaissance peuvent parfois échapper aux esprits plus simples. Même si son ordre insiste sur le fait que leur nouveau Lama est une réincarnation de leur ancien chef, certaines personnes dans les campagnes ont été très réticentes à accepter ce fait. Comme ils ne le reconnaissent pas, ils craignent d'avoir été dupés et en quelques occasions les tensions sont montées au point de conflit armé."
 buddhism_events.38.a:0 "Envoyons des émissaires pour les convaincre."
 buddhism_events.38.b:0 "Envoyons des troupes pour les convaincre."
 buddhism_events.39.t:0 "Sri Lanka"
 buddhism_events.39.d:0 "L'île de Lanka, récemment conquise par nos troupes, est pleine de riches monastères bouddhistes et la société semble être pratiquement dirigée par les moines en leur sein. Comme [Root.Monarch.GetName] a finalement pu les visiter, il se tient émerveillé devant la richesse économique et culturelle des ordres monastiques."
 buddhism_events.39.a:0 "Nous devons intégrer cela à notre culture !"
 buddhism_events.39.b:0 "Pillons les Monastères !"
 buddhism_events.40.t:0 "Guidance religieuse"
 buddhism_events.40.d:0 "L'île de Lanka a été la source d'une forte tradition bouddhiste Theravada pendant des siècles. C'est à bien des égards une société modèle pour un État Theravada et ses communautés monastiques florissantes font l'envie du monde bouddhiste.\nBien que notre propre État suive aussi la voie Theravada, nos lois et traditions sont un patchwork de traditions locales, d'idées d'écoles bouddhistes concurrentes et nous manquons de l'infrastructure monastique solide de l'île. Nos ministres suggèrent que pour remédier à cela, nous devrions envoyer une ambassade au Sri Lanka et demander qu'ils nous envoient des moines pour apporter leurs traditions Theravada dans notre pays."
 buddhism_events.40.a:0 "Envoyons une ambassade."
 buddhism_events.40.b:0 "Non, nous devons soutenir nos sectes locales !"
 buddhism_events.41.t:0 "Une ambassade de [From.GetName]"
 buddhism_events.41.d:0 "Des communautés monastiques florissantes, des reliques saintes sacrées ainsi qu'une longue tradition de gestion de la coexistence du pouvoir monastique et royal font de nous l'envie de nombreux souverains Theravada. Il n'est donc pas surprenant que [From.Monarch.GetTitle] de [From.GetName] aspire à imiter notre grandeur. L'ambassade $From.GetAdjective$ arrivée aujourd'hui demande que nous permettions à un certain nombre de leurs moines de voyager dans notre pays et de recevoir l'ordination ici afin d'apporter nos traditions à [From.GetName]."
 buddhism_events.41.a:0 "Permettons-le."
 buddhism_events.41.b:0 "Ils ne feront rien de tel !"
 buddhism_events.42.t:0 "Réponse $From.GetAdjective$"
 buddhism_events.42.d:0 "[From.Monarch.GetTitle] de [From.GetName] a permis à 40 moines de recevoir l'ordination dans son pays. Il a aussi envoyé un groupe de moines directement de ses terres aux nôtres pour s'assurer que les traditions Theravada sont transmises de manière sensée."
 buddhism_events.42.a:0 "Excellent."
 buddhism_events.43.t:0 "Réponse $From.GetAdjective$"
 buddhism_events.43.d:0 "[From.Monarch.GetTitle] $From.GetAdjective$ a fait savoir qu'il ne permettra pas à nos moines d'apprendre les voies du bouddhisme sri-lankais et qu'il ne nous aidera pas non plus d'aucune autre manière à développer nos institutions religieuses."
 buddhism_events.43.a:0 "Très bien."
 HAVE_NO_RIVALS:0 "Doit avoir au moins un rival pour faire cela."
 MUST_WAIT_UNTIL_DATE:0 "Devez attendre jusqu'au §Y$DATE$§! avant de pouvoir refaire cela."
 START_COLONIAL_WAR_NO_ELIGBLE:0 "Ils n'ont aucun Casus Belli contre un pays sans trêve avec eux."
 FORTIFY_MARCH_NO_ELIGBLE:0 "Il n'y a aucune province leur appartenant que nous pourrions fortifier."
 FORTIFY_MARCH_NO_FORTS:0 "Nous ne pouvons pas améliorer davantage le fort dans cette province."
 SEIZE_TERRITORY_NO_ELIGBLE:0 "Il n'y a aucune province non-capitale à portée de cœur que nous pourrions saisir."
 seized_province:0 "Province saisie"
 PROMOTING_INVESTMENTS_COLON:0 "Promotion des investissements : "
 placate_rulers_desc:0 "Apaise les souverains locaux, changeant leur Désir de liberté de $LD$ au prix de $PRESTIGE$ de prestige."
 embargo_rivals_desc:0 "Cela obligera votre sujet à mettre vos rivaux sous embargo, au prix de $LD$ de Désir de liberté."
 embargo_rivals_cancel_desc:0 "Cela obligera votre sujet à cesser de mettre vos rivaux sous embargo, supprimant la pénalité de $LD$ de Désir de liberté."
 relative_on_throne_desc:0 "Vous placerez votre propre dynastie sur leur trône. Change le Désir de liberté de $LD$."
 enforce_religion_desc:0 "Les force à changer leur religion pour la vôtre (§Y$RELIGION$§!), changeant le Désir de liberté de $LD$."
 scutage_desc:1 "Force votre vassal à vous payer un supplément de $TAX$ (actuellement $AMOUNT|Y$¤ mensuellement) de leurs revenus comme écuage, mais ils ne seront plus appelés aux guerres."
 scutage_ld:0 "Désactiver l'Écuage augmentera leur Désir de liberté de $VAL$."
 subsidize_armies_desc:0 "Envoie §Y$MP$§! de votre Main-d'œuvre mensuelle à votre Marche. Cela changera leur opinion de vous de $OPINION$."
 fortify_march_desc:1 "Construit ou améliore un fort chez votre sujet. Vous payez pour le fort."
 fortify_march_desc2:0 "Vous améliorerez la forteresse en §Y$PROV$§! à §Y$NAME$§! pour un coût de $COST$"
 enforce_culture_desc:0 "Change la culture principale d'un sujet pour la vôtre (§Y$CULTURE$§!). Cela changera leur Désir de liberté de $LD$. Cela nous coûtera aussi $DIP$£dip  en raison de leur développement total."
 siphon_income_desc:0 "Siphonne $VAL$ de leur revenu annuel ($AMOUNT$), ce qui détériorera les relations de $OPINION$ et augmentera le Désir de liberté de $LD$."
 support_loyalists_desc:1 "Réduit le Désir de liberté de $LD$ au prix de $PERCENT$ (actuellement $AMOUNT|Y$¤) de leur revenu mensuel."
 send_officers_desc:0 "Leur envoie des officiers et instructeurs militaires, ce qui nous coûtera $VAL$ (actuellement $AMOUNT|Y$¤ mensuellement) de leur entretien d'armée. Cela changera leur Désir de liberté de $LD$."
 divert_trade_desc:1 "Le sujet doit vous céder $VAL$ de sa Puissance commerciale. Change le Désir de liberté de $LD$."
 seize_territory_desc:0 "Saisit de force l'une de leurs provinces à portée de cœur. Cela les mettra en colère."
 seize_territory_desc3:0 "Nous prendrons §Y$PROV$§!. Leur Désir de liberté augmentera de $LD$ et deviendra $LD_TOTAL$."
 start_colonial_war_desc:0 "Fait démarrer une guerre par votre Nation coloniale contre une autre nation coloniale ou des indigènes. Vous devez sélectionner l'un de leurs Casus belli."
 start_colonial_war_desc2:0 "§Y$SUBJECT$§! déclarera une guerre §Y$CB$§! contre §Y$TARGET$§!."
 replace_governor_desc:0 "Lance des élections coloniales, change le Désir de liberté de $LD$."
 promote_investments_desc:0 "Augmente la puissance commerciale dans toutes les provinces de la Compagnie commerciale de $VAL$, tout en causant une inflation annuelle de $INFLATION$."
 additional_subject_interaction_desc:0 "\n\nCela aura aussi les effets suivants sur le sujet :\n"
 ASPECTS:0 "Aspects"
 KARMA_FOR_CTA:0 "Nous gagnerions $KARMA$ de Sainteté corinite, car c'est la bonne chose à faire."
 alert_mothballed_forts_instant:0 "§YIl y a des forts mis en sommeil dans votre pays !§!"
 alert_mothballed_forts_delayed:0 "Les forteresses mises en sommeil n'ont pas de garnison pour les défendre et tomberont rapidement aux mains des assiégeants ennemis.\n\nLes forts suivants sont actuellement mis en sommeil :"
 subject_interaction_events.32.t:0 "Le sujet se retourne contre vous"
 subject_interaction_events.32.d:0 "Notre bellicisme, disent-ils, a causé le courroux parmi nos sujets. Selon les rumeurs, ils pensent que nous nous soucions peu de régner justement et plus de conquérir comme des barbares. Aussi fausses et grossières qu'elles soient, il serait imprudent de laisser cela ainsi."
 subject_interaction_events.32.a:0 "Faisons un exemple d'eux."
 subject_interaction_events.32.b:0 "Je suis sûr que nous pouvons arranger les choses."
 subject_interaction_events.33.t:0 "Le suzerain fait un exemple de vous"
 subject_interaction_events.33.d:0 "En raison du mécontentement, notre suzerain a jugé bon de faire un exemple de notre nation. C'est une disgrâce."
 subject_interaction_events.33.a:0 "Œil pour œil..."
 subject_interaction_events.34.t:0 "Sujets loyaux"
 subject_interaction_events.34.d:0 "Il est bien connu que nos sujets sont parmi les plus contents et loyaux du monde. Créer une division entre eux et nous est heureusement pratiquement impossible, et en tant que tel cela reflète bien sur notre nation."
 subject_interaction_events.34.a:0 "Ce temps restera dans les mémoires"
 subject_interaction_events.34.b:0 "Cela devrait être exploité"
 subject_interaction_events.35.t:0 "Sujets déloyaux"
 subject_interaction_events.35.d:0 "Ce n'est un secret pour personne que l'animosité entre nous et nos sujets est vraiment terrible. Dans notre cour, les salles ruissellent de sang et sont noires de secrets alors que les haines fleurissent. Naturellement, cela doit être réglé."
 subject_interaction_events.35.a:0 "Laissons faire"
 subject_interaction_events.35.b:0 "Réglons cela"
 subject_interaction_events.36.t:0 "Chair à canon"
 subject_interaction_events.36.d:0 "Il semble que notre pays se vide et manque d'une ressource très importante : la chair à canon. N'ayez crainte ! Bien que nous manquions de cette ressource, l'un de nos sujets a plein de viande fraîche pour les champs de bataille. Si nous devions forcer leur servitude, ils seraient moins que contents, mais c'est ainsi que vont les choses."
 subject_interaction_events.36.a:0 "Les canons ont besoin d'hommes pour les tirer"
 subject_interaction_events.36.b:0 "Nous ne pouvons pas risquer d'antagoniser nos sujets"
 subject_interaction_events.37.t:0 "Chair à canon"
 subject_interaction_events.37.d:0 "Il semble que notre suzerain ait jugé bon de forcer la servitude de nos sujets pour compenser un leadership insensé. Nos champs se vident et resteront probablement ainsi."
 subject_interaction_events.37.a:0 "C'est un scandale !"
 subject_interaction_events.38.t:0 "Une taxe supplémentaire"
 subject_interaction_events.38.d:0 "Ce serait un euphémisme de dire que notre économie fonctionne « mal », en fait, certains diraient que c'est un désastre. Alors que nous luttons pour joindre les deux bouts, nos sujets, de toutes les personnes, se portent plus que bien. Peut-être ne les taxons-nous pas assez."
 subject_interaction_events.38.a:0 "Une taxe supplémentaire pourrait aider"
 subject_interaction_events.38.b:0 "Nous n'avons pas besoin d'eux"
 subject_interaction_events.39.t:0 "Une taxe supplémentaire"
 subject_interaction_events.39.d:0 "Notre suzerain nous a demandé de payer une grosse somme d'or pour aider à réparer son économie défaillante."
 subject_interaction_events.39.a:0 "Maudits soient-ils !"
 subject_interaction_events.40.t:0 "Propriété légitime"
 subject_interaction_events.40.d:1 "Notre terre légitime en [rightful_province.GetName] se trouve sous la domination de notre suzerain. C'est une situation indigne et si elle continue, nous ne serons que davantage sous leur ombre. Cela ne peut être toléré, nous devons récupérer notre terre légitime !"
 subject_interaction_events.40.a:0 "Demandons-la"
 subject_interaction_events.40.b:0 "Laissons faire"
 subject_interaction_events.41.t:0 "Propriété légitime"
 subject_interaction_events.41.d:2 "Ces derniers temps, nos sujets en [From.GetUsableName] ont jugé bon de nous rappeler les tensions causées par notre possession de terres en [rightful_province.GetName], qu'ils considèrent comme légitimement les leurs. Les leur rendre montrerait que nous sommes un pouvoir bienveillant, cependant, un tel geste pourrait aussi nous affaiblir."
 subject_interaction_events.41.a:0 "C'est le leur de droit"
 subject_interaction_events.41.b:0 "C'est le nôtre et le restera toujours"
 subject_interaction_events.42.t:0 "Propriété légitime refusée !"
 subject_interaction_events.42.d:0 "Notre demande de récupérer notre terre légitime a été refusée ! C'est un scandale !"
 subject_interaction_events.42.a:0 "Maudits soient-ils !"
 subject_interaction_events.43.t:0 "Le sujet est fatigué de la guerre"
 subject_interaction_events.43.d:0 "Il semblerait qu'avec nos guerres, l'un de nos sujets ait été assez déstabilisé. Bien sûr, nous pourrions simplement les laisser gérer, mais ce serait un geste de bonne foi si nous les aidions."
 subject_interaction_events.43.a:0 "Envoyer de l'aide"
 subject_interaction_events.43.b:0 "Qu'ils se débrouillent seuls"
 subject_interaction_events.44.t:0 "Le suzerain envoie de l'aide"
 subject_interaction_events.44.d:0 "Notre suzerain a jugé bon d'envoyer de l'aide pour que nous puissions reconstruire notre pays après les guerres."
 subject_interaction_events.44.a:0 "Envoyons nos remerciements"
 subject_interaction_events.45.t:0 "Liberté économique"
 subject_interaction_events.45.d:0 "Maintenant que nous ne sommes plus soumis aux caprices d'un autre pays, nous pouvons mener nos propres politiques commerciales et n'aurons plus à vivre de contournement des réglementations commerciales et de contrebande."
 subject_interaction_events.45.a:0 "Très bien."
 subject_interaction_events.46.t:0 "Fin de l'embargo"
 subject_interaction_events.46.d:0 "Avec la fin de l'embargo, notre commerce de contrebande a malheureusement cessé."
 opinion_tyrant_overlord:0 "Suzerain tyrannique"
 opinion_gave_province:0 "A rendu la province légitime"
 opinion_benevolent_overlord:0 "Suzerain bienveillant"
 opinion_scutage_benefits:0 "Avantages de l'écuage"
 loyal_subjects:0 "Sujets loyaux"
 desc_loyal_subjects:0 "Nos sujets sont loyaux et cela facilite la diplomatie."
 disloyal_subjects:0 "Sujets déloyaux"
 desc_disloyal_subjects:0 "Nos sujets sont déloyaux et cela rend la diplomatie un peu plus difficile."
 custom_idea_fort_maintenance:0 "Castramétation"
 custom_idea_fort_maintenance_desc:0 "Où il y a la guerre, il y a des forteresses. Certaines sont temporaires, des fortifications de campagne abandonnées après la victoire ou la défaite. D'autres sont des fortifications permanentes, avec de grands murs solides qui offrent une défense robuste contre tout ce qui leur est lancé, que ce soient des hommes, des boulets de canon ou d'autres projectiles. Les améliorations de l'entretien des forts conduisent à de meilleurs forts et rendent moins coûteux et plus facile l'entretien de notre première ligne de défense, les forts."
 custom_idea_development_cost:0 "Réforme agraire"
 custom_idea_development_cost_desc:0 "De nombreux droits et coutumes anciens entravent le développement des terres sous notre contrôle. Nous devons entreprendre une vaste réforme agraire pour nous assurer que toutes les terres de notre pays sont organisées et détenues de manière à rendre leur développement jusqu'à leur plein potentiel aussi facile que possible."
 free_cities.5.tt1:1 "[From.Country.GetName] est informé que nous allons aider."
 free_cities.5.tt2:1 "[From.Country.GetName] est informé que nous avons refusé d'aider."
 free_cities.6.tt1:1 "Le nouvel Empereur sera couronné en [This.Country.GetName]."
 fc_imperial_coronation:0 "Couronnement impérial"
 desc_fc_imperial_coronation:0 "Cette cité a été choisie comme lieu du Couronnement impérial et ses citoyens rayonnent de fierté !"
 fc_mercenary_contracts:0 "Contrats de mercenaires"
 desc_fc_mercenary_contracts:0 "Cette nation concentre sa défense sur la négociation de contrats moins chers avec les mercenaires."
 free_cities.1.t:1 "La Cité libre de [Root.Capital.GetCapitalName]"
 free_cities.1.d:1 "La cité de [Root.Capital.GetCapitalName] s'est vu accorder l'immédiateté impériale en tant que Cité libre impériale de l'Empire d'Anbennar. Bien qu'il y ait de nombreuses cités autonomes importantes dans l'Empire, [Root.GetName] a maintenant quelque chose au-delà de sa richesse et de sa taille pour la protéger : des libertés économiques et politiques perpétuellement garanties par [Emperor.Monarch.GetTitle] lui-même."
 free_cities.1.a:1 "Excellent"
 free_cities.2.t:1 "[Root.GetName] - Plus une Cité libre de l'Empire"
 free_cities.2.d:1 "[Root.GetName] n'est plus une Cité libre de l'Empire d'Anbennar. La direction de la Cité a été condamnée pour son abus flagrant de pouvoir et son manque de respect pour les institutions impériales, et a perdu tous les privilèges associés au titre qui lui avait été accordé."
 free_cities.2.a:1 "Malheureux"
 free_cities.3.t:1 "Fourches et torches dans les rues de [Root.Capital.GetName]"
 free_cities.3.d:1 "Le mécontentement et l'anonymat entre les classes inférieures et les dirigeants de la cité nous ont menés au bord de la guerre civile. Nous sommes mal préparés à affronter une rébellion à grande échelle, et de nombreux membres des classes supérieures pressent le conseil municipal de porter l'affaire devant [Emperor.Monarch.GetTitle], pour supplier [Emperor.Monarch.GetTitle] lui-même de toute l'aide qu'il peut fournir. De bons hommes solides et de l'or sont ce dont nous avons le plus besoin pour éteindre les feux de rébellion qui couvent dans les rues de [Root.Capital.GetName]."
 free_cities.3.a:1 "Demandons l'aide de [Emperor.Monarch.GetTitle]."
 free_cities.3.b:1 "Rassemblons le peu d'hommes que nous avons et réglons cela nous-mêmes."
 free_cities.4.t:1 "La Cité libre de [From.GetName] implore notre aide"
 free_cities.4.d:1 "Nous avons reçu un envoyé ce matin de la Cité libre de [From.GetName] détaillant l'échec total du conseil municipal à satisfaire les besoins de leurs classes laborieuses. Le messager a parlé de feux couvant et faisant rage dans les rues de [From.Capital.GetName] comme métaphore du mécontentement avec lequel la cité libre se débat, et affirme que si rien n'est fait, les paysans de la cité lèveront bientôt leurs fourches en rébellion. Ils implorent humblement des soldats et de l'or, afin de pouvoir rendre une justice rapide à ces citoyens mécontents."
 free_cities.4.a:1 "C'est une demande raisonnable, et nous l'honorerons."
 free_cities.4.b:1 "Le problème est plus profond au sein de [From.Country.GetName] et tant qu'ils ne s'en rendront pas compte, nous n'enverrons pas d'aide."
 free_cities.5.t:1 "La réponse de [Emperor.Monarch.GetTitle]"
 free_cities.5.d:1 "Chaque jour le mécontentement grandit et peu importe comment nous essayons d'utiliser les hommes à notre disposition, une fois un feu éteint, un autre s'embrase devant nos yeux. Où est ce messager ? Nous espérons que notre humble requête à [From.Monarch.GetTitle] [From.Monarch.GetName] ne le mettra pas en colère, et qu'il acceptera de nous aider."
 free_cities.5.a:1 "Enfin, de bons hommes et de l'argent, exactement ce dont nous avions besoin !"
 free_cities.5.b:1 "[From.Monarch.GetTitle] affirme que le problème est trop profond pour être résolu avec du sang et de l'or..."
 free_cities.6.t:1 "Le couronnement"
 free_cities.6.d:1 "Devant les diplomates et dignitaires assemblés, [PAP.Monarch.GetTitle] [PAP.Monarch.GetName] place les Insignes impériaux dans les mains du nouvel [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName], le reconnaissant comme le légitime [Emperor.Monarch.GetTitle] d'Anbennar au nom de l'Église Ravélienne et du Dieu unique et véritable. Le couronnement terminé, [Root.Monarch.GetTitle] [Root.Monarch.GetName] observe depuis un balcon les participants se déverser hors de l'église vers les célébrations environnantes, suivis peu après par le nouvel [Emperor.Monarch.GetTitle]. Être choisi comme lieu du couronnement est un grand honneur, dont la signification n'échappera pas aux citoyens de [Root.GetName] ni au reste de l'Empire."
 free_cities.6.a:1 "Nous sommes vraiment bénis !"
 free_cities.7.t:1 "La conférence du traité"
 free_cities.7.d:1 "Après la fin de la Conférence du Traité de [Root.GetName], les diplomates des vainqueurs de [hre_winner.GetName] et les diplomates signant les conditions de reddition de [hre_loser.GetName] nous ont remerciés pour notre aide dans tous les détails nécessaires entourant un événement aussi important, et pour notre neutralité en la matière. Cela leur a permis de se concentrer sur la tâche à accomplir. Bien que nous n'ayons été compensés financièrement que pour les dépenses engagées pour la conférence, nous sommes maintenant considérés comme un pays plus prestigieux qu'auparavant."
 free_cities.7.a:1 "Cela valait tous les tracas."
 free_cities.8.t:1 "Privilèges de douane et fiscaux"
 free_cities.8.d:1 "La Cité libre de [free_city_in_debt_target.GetName] plie sous son propre poids, gagnant à peine assez d'argent pour se tenir à l'écart du gouffre redouté de la banqueroute. Une fois que l'économie de [free_city_in_debt_target.GetName] s'effondrera inévitablement sous le poids des problèmes qu'ils ont eux-mêmes créés, ce sera dommageable non seulement pour leur réputation, mais aussi pour la réputation et la légitimité de l'Empire lui-même. Nous pourrions essayer de les aider en leur accordant certains privilèges de douane et fiscaux qui, s'ils sont bien gérés, soulageront leurs difficultés financières."
 free_cities.8.a:1 "Accordons-leur des privilèges de douane et fiscaux."
 free_cities.8.b:1 "Ils ne l'ont pas mérité."
 free_cities.9.t:1 "Privilèges de douane et fiscaux accordés"
 free_cities.9.d:1 "La nouvelle de notre lutte pour rester à flot de nos dettes a été une petite surprise, mais la grande surprise a été que [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] a décidé de nous aider en nous accordant certains privilèges de douane et fiscaux dont nous doutons que peu d'autres Cités libres bénéficient."
 free_cities.9.a:1 "Une surprise certes, mais une agréable !"
 free_cities.10.t:1 "Nobles armés"
 free_cities.10.d:1 "Les nobles propriétaires terriens de [Root.Capital.GetName] n'aiment pas que notre statut de Cité libre nous garde hors de la domination noble directe, et dernièrement nous avons épuisé toutes les options pour les faire taire. S'ils n'étaient que de simples paysans, armés de fourches et de torches et avec peu d'entraînement militaire, nous serions capables d'écraser toute révolte qu'ils pourraient déclencher. Mais ce sont des hommes et des femmes avec des terres et des titres, formellement instruits dans l'art de la guerre, et ils ne doivent pas être sous-estimés. Le seul qui puisse faire taire leurs ambitions est [Emperor.Monarch.GetTitle] de l'Empire d'Anbennar..."
 free_cities.10.a:1 "Demandons l'aide de [Emperor.Monarch.GetTitle]."
 free_cities.10.b:1 "Accordons aux nobles quelques privilèges et espérons qu'ils se taisent."
 free_cities.11.t:1 "Appel à l'aide de [From.GetName] contre les nobles rebelles"
 free_cities.11.d:1 "Il est venu à notre attention que la Cité libre de [From.Country.GetName] se débat avec des nobles propriétaires terriens qui n'aiment pas le statut de Cité libre de [From.Country.GetName]. Le pays demande notre aide pour réprimander les nobles et leur faire accepter le leadership séculier de [From.Monarch.GetName], libre de titres royaux et de privilèges."
 free_cities.11.a:1 "Ils auront notre aide."
 free_cities.11.b:1 "S'ils ne peuvent pas gérer leurs citoyens, sont-ils vraiment aptes à diriger un pays ?"
 free_cities.12.t:1 "Aidés ou entravés ?"
 free_cities.12.d:1 "Les nobles deviennent plus audacieux, et essaient maintenant d'engager les paysans et bourgeois à rejoindre leur révolte contre nous et notre statut de Cité libre. Jusqu'à présent, ils ont eu peu de succès, mais nous craignons, comme toujours quand des princes arrogants aux noms de famille distingués essaient de briser la paix que nous luttons si durement pour maintenir. Que pensera [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] de nous ? Tiendra-t-il sa promesse et mettra-t-il fin à ces nobles indisciplinés ?"
 free_cities.12.a:1 "L'aide est arrivée de [From.Monarch.GetTitle] !"
 free_cities.12.b:1 "« ...inaptes à diriger... » Donc, pas d'aide envoyée."
 free_cities.13.t:1 "Ligue des cités"
 free_cities.13.d:1 "Anbennar signifie unité, mais si souvent les nations de l'Empire sont restées divisées et à se quereller. Nous-mêmes pouvons encore choisir une autre voie, cependant, et nous avons récemment demandé si d'autres Cités libres seraient disposées à former une ligue avec nous. Nous, Cités libres, sommes faibles seules, mais collectivement il est clair que la coopération mutuelle entre petites nations sur des questions telles que le commerce, le maintien de la paix impériale, le soutien aux tribunaux et le maintien d'une force unifiée fait de nous une force avec laquelle même les Grandes Puissances auront du mal à rivaliser."
 free_cities.13.a:2 "Envoyons des diplomates à [fc_league_invitation_target.GetName] !"
 free_cities.13.b:1 "Ne pourrions-nous pas simplement engager des mercenaires à la place ?"
 free_cities.14.t:1 "La suggestion de la Ligue des cités"
 free_cities.14.d:1 "Il y a eu de nombreuses Ligues de coopération mutuelle à Cannor. La Ligue de Celmaldor, par exemple, était une ligue de guildes marchandes dans une confédération commerciale et défensive, ou les Huit Sœurs qui était une association de défense mutuelle et de maintien de la paix. Certaines Ligues deviennent si puissantes et unies qu'elles sont même considérées comme un État à part entière, comme la Ligue Céruléenne. La Cité libre de [From.Country.GetName] a suggéré que nous rejoignions quelque chose de similaire, une sorte de coopération, où nous collaborons sur des questions de commerce, de maintien de la paix impériale et de soutien aux tribunaux."
 free_cities.14.a:1 "Qu'avons-nous à perdre ? Rejoignons-la !"
 free_cities.14.b:1 "Cela semble être un énorme gaspillage de temps et de ressources."
 free_cities.15.tt:1 "[From.Country.GetName] recevra votre accord."
 free_cities.16.tt:1 "[From.Country.GetName] recevra votre refus."
 free_cities.15.t:1 "Membres de la Ligue des cités"
 free_cities.15.d:1 "[From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] a accepté de coopérer avec nous sur certaines questions, telles que le commerce, le maintien de la paix impériale et le soutien aux tribunaux."
 free_cities.15.a:1 "Bienvenue dans la Ligue !"
 free_cities.16.t:1 "[From.GetName] a refusé la Ligue des cités"
 free_cities.16.d:1 "« C'est avec le plus profond regret que [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] doit refuser la coopération avec [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.Country.GetName]... »"
 free_cities.16.a:1 "Ils verront bientôt la gloire de nos économies combinées et regretteront de ne pas nous avoir rejoints !"
 free_cities.17.t:1 "L'adhésion à la Ligue des cités"
 free_cities.17.d:1 "La coopération entre diverses Cités libres, basée et inspirée par des ligues telles que la Ligue de Couronne-de-Dame, la Ligue de Celmaldor et les Huit Sœurs, semble fonctionner splendidement. Elles ont accepté de travailler ensemble sur des questions de commerce, de maintien de la paix impériale et de soutien aux tribunaux. Nous, en tant que Cité libre, pourrions demander l'adhésion à cette union plutôt exclusive..."
 free_cities.17.a:1 "Envoyons un diplomate à leurs dirigeants !"
 free_cities.17.b:1 "Nous n'en avons pas besoin."
 free_cities.18.t:1 "Membre potentiel de la Ligue des cités"
 free_cities.18.d:1 "Notre coopération avec d'autres Cités libres fonctionne si bien que nous recevons de plus en plus de demandes d'adhésion chaque jour ! [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.Country.GetName] est l'un des nombreux qui souhaitent nous rejoindre."
 free_cities.18.a:1 "Acceptons la candidature de [From.Country.GetName]."
 free_cities.18.b:1 "Refusons la candidature de [From.Country.GetName]."
 free_cities.19.t:1 "Réformes coopératives"
 free_cities.19.d:1 "De nombreux érudits et savants appellent la Cité libre de [Root.Country.GetName] leur foyer. En coopérant avec leurs collègues des autres Cités libres de notre Ligue, ils ont pu affiner leurs idées et théories de manières très bénéfiques pour nous."
 free_cities.19.a:1 "Splendide !"
 fc_hre_privileges:0 "Privilèges de douane et fiscaux accordés par l'Empereur"
 desc_fc_hre_privileges:0 "L'Empereur de l'Empire d'Anbennar nous a accordé des privilèges spéciaux de douane et fiscaux."
 opinion_special_privileges:0 "Privilèges spéciaux accordés par l'Empereur"
 opinion_agreed_league:0 "A accepté la Ligue des cités"
 opinion_refused_league:0 "A refusé la Ligue des cités"
 fc_city_league:0 "Ligue des cités"
 desc_fc_city_league:0 "Inspirées par d'anciennes ligues de cités telles que la première République Damérienne, la Ligue de Couronne-de-Dame ou la Ligue de Port-Vinier, les Cités libres de l'Empire d'Anbennar ont accepté d'unir leurs forces sur certaines questions et de coopérer."
 opinion_withheld_reforms:0 "A retenu les idées de réformes"
 opinion_introduced_reforms:0 "A introduit des idées de réformes"
 fc_league_reforms:0 "Réformes de la Ligue des cités"
 desc_fc_league_reforms:0 "Les nouvelles réformes de la Ligue des cités se répandent dans les Cités libres et aideront tous ces pays à atteindre la grandeur."
 ADD_SEAT_IN_PARLIAMENT_SHORT:0 "Accorder un siège au $NAME$"
 SEAT_PARLIAMENT_DESC:0 "Cela a les effets suivants :\n"
 ADD_SEAT_IN_PARLIAMENT_LONG:0 "Donner un siège au $NAME$ à une province apportera des bonus, mais à chaque question, une majorité des sièges doit être satisfaite."
 withdrawn_parliamentary_seat:0 "Siège parlementaire retiré"
 desc_withdrawn_parliamentary_seat:0 "La population de cette province estime avoir été privée de son influence légitime sur la politique de notre pays."
 rotten_borough:0 "Bourg pourri"
 desc_rotten_borough:0 "Cette province a un siège au Parlement malgré son importance relative. Cela a permis à ceux qui détiennent le pouvoir dans la région de contrôler les votes car les électeurs sont assez peu nombreux et assez pauvres pour être facilement manipulés."
 parliamentary_scandal:0 "Scandale parlementaire"
 desc_parliamentary_scandal:0 "La capitale est secouée par les actions d'un député en visite et l'incapacité de l'État à le punir pour sa conduite."
 demands_representation:0 "Exigence de représentation"
 desc_demands_representation:0 "Les habitants de cette région exigent une plus grande représentation au gouvernement central. Le mouvement est centré sur leurs anciennes assemblées provinciales qu'ils estiment devoir être recréées au niveau national."
 yearning_for_representation:0 "Espoir de représentation"
 desc_yearning_for_representation:0 "Les développements récents ont conduit les habitants de ce pays à espérer un parlement représentatif et une constitution écrite."
 parlaments.2.t:0 "Bourgs pourris"
 parlaments.2.d:2 "Grâce à son siège au [Root.Owner.GetParliamentWithGrammar], [Root.GetName] peut se vanter d'avoir une certaine influence sur la politique de notre pays. Ce siège est, cependant, la seule chose qui distingue la région de parties beaucoup plus riches de notre État, comme la province de [envious_province.GetName], qui regarde [Root.GetName] avec grande envie. C'est quelque chose que les propriétaires terriens locaux ont réalisé, et par une combinaison de pots-de-vin et de menaces, les votes de [Root.GetName] en sont venus à être entièrement contrôlés par quelques individus corrompus mais influents."
 parlaments.2.a:0 "Pourri !"
 parlaments.2.a.tt:0 "Ce siège parlementaire changera son mode de vote à partir de maintenant."
 parlaments.2.b:0 "Nous devons réattribuer le siège."
 parlaments.4.t:0 "Corruption du vote"
 parlaments.4.d:2 "Les députés des bourgs pourris de [Root.GetName] ont choisi de s'opposer à notre proposition au [Root.Owner.GetParliamentWithGrammar]. Il semble que le propriétaire terrien qui contrôle la région ait été persuadé que la question n'est pas dans son intérêt."
 parlaments.4.a:0 "Pourri !"
 parlaments.4.b:0 "Nous devons donc soudoyer le propriétaire terrien."
 parlaments.5.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.5.d:2 "L'influente Université de [Root.GetCapitalName] a réussi à convaincre les Membres du [Root.Owner.GetParliamentWithGrammar] de [Root.GetName] de se prononcer en faveur de l'augmentation du financement universitaire."
 parlaments.5.a:0 "Excellent !"
 parlaments.6.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.6.d:2 "Outre le fait d'être un siège du [Root.Owner.GetParliamentWithGrammar], [Root.GetName] est aussi le centre d'un certain nombre de compagnies influentes ayant des intérêts dans le commerce outre-mer. Il semble que beaucoup d'entre elles aient décidé qu'elles bénéficieraient de la mise en œuvre de la question actuellement débattue et ont exercé des pressions sur leurs Membres du [Root.Owner.GetParliamentWithGrammar] pour qu'il en soit ainsi."
 parlaments.6.a:0 "Excellent !"
 parlaments.7.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.7.d:2 "L'armée est à bien des égards la force interne la plus influente de [Root.GetName] et leur loyauté envers cette organisation a persuadé les Membres du [Root.Owner.GetParliamentWithGrammar] de ce siège de voter en faveur de la question actuelle."
 parlaments.7.a:0 "Excellent !"
 parlaments.8.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.8.d:2 "Le débat actuel au [Root.Owner.GetParliamentWithGrammar] sur la meilleure façon de protéger la production nationale a attiré l'attention de nombreuses personnes à [Root.GetName]. Ce siège du [Root.Owner.GetParliamentWithGrammar] en est venu à nous soutenir dans le débat, dans l'espoir de bénéficier de la politique suggérée."
 parlaments.8.a:0 "Excellent !"
 parlaments.9.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.9.d:0 "En tant que siège de notre capitale, la province de [Root.GetName] a beaucoup à gagner des réformes actuellement proposées. Heureusement, suffisamment de gens l'ont réalisé pour s'assurer que le siège vote maintenant en notre faveur."
 parlaments.9.a:0 "Excellent !"
 parlaments.10.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.10.d:1 "Il semble que les députés du siège de [Root.GetName] aient réalisé à quel point la question actuellement débattue leur serait bénéfique. Leur soutien à notre cause est le bienvenu."
 parlaments.10.a:0 "Excellent !"
 parlaments.11.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.11.d:1 "Il semble que les députés du siège de [Root.GetName], fervents partisans de notre cause il y a peu, aient complètement changé d'avis sur la question actuellement débattue. Nous ne pouvons pas savoir avec certitude comment cela s'est produit, mais il est clair que nous ne pouvons plus compter sur leur vote."
 parlaments.11.a:0 "La cupidité est une chose horrible."
 parlaments.12.t:0 "Bourg pourri"
 parlaments.12.d:1 "Alors qu'il semblait que le vote de [Root.GetName] allait effectivement soutenir la réforme actuellement proposée pour éliminer les Bourgs pourris de notre [Root.Owner.GetParliamentName], il semble que celui qui soutenait le député dans la région ait soudain réalisé qu'il était sur le point de perdre son siège. Il a maintenant réussi à convaincre le député de voter contre notre réforme."
 parlaments.12.a:0 "Pourri !"
 parlaments.13.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.13.d:0 "Une campagne déterminée par des membres de l'administration de [Root.GetCapitalName] pour s'opposer au changement des lois et réglementations visant à intégrer d'autres systèmes dans le nôtre a réussi à convaincre le député de la région de s'opposer à notre proposition."
 parlaments.13.a:0 "Très bien."
 parlaments.14.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.14.d:0 "Les députés de [Root.GetName] ont été convaincus par ceux qui ont des intérêts dans les industries de production de la province de s'opposer à l'ouverture des réglementations qui les protègent de la concurrence extérieure."
 parlaments.14.a:0 "Très bien."
 parlaments.15.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.15.d:3 "Beaucoup à [Root.GetName] ont été assez déçus par la proposition d'augmenter les dépenses navales. Ils estiment que la région contribue déjà tant aux forces armées de notre pays et s'attendaient plutôt à ce que le [Root.Owner.GetParliamentWithGrammar] autorise plus de fonds pour eux que de demander plus d'argent pour la marine."
 parlaments.15.a:0 "Très bien."
 parlaments.16.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.16.d:2 "La domination de la marine dans la province de [Root.GetName] a fait que la proposition d'augmentation des dépenses pour l'armée au [Root.Owner.GetParliamentWithGrammar] a été plutôt froidement accueillie là-bas. Bien qu'initialement favorables à la proposition, les Membres du [Root.Owner.GetParliamentWithGrammar] de cette région ne voient maintenant pas d'autre choix que de voter contre."
 parlaments.16.a:0 "Très bien."
 parlaments.17.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.17.d:0 "Bien qu'initialement favorables, les députés de [Root.GetName] ont déclaré leur dégoût pour la question actuelle. Elle signifie une ambition de grande envergure de l'État de posséder et contrôler tout ce qui se trouve dans ses frontières et ils disent qu'ils ne toléreront pas cela."
 parlaments.17.a:0 "Vous pouvez bien penser cela. Je ne saurais commenter."
 parlaments.18.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.18.d:0 "Les députés de [Root.GetName] sont étonnamment favorables à notre proposition dans le débat parlementaire. Il semble que l'université de [Root.GetName] soit convaincue qu'elle sera impliquée dans le comptage et les mesures que la proposition actuelle implique et les érudits sont ravis de l'opportunité de prendre part à de nouvelles données brutes concernant notre pays."
 parlaments.18.a:0 "Très bien."
 parlaments.19.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.19.d:0 "Voter en faveur de l'augmentation des impôts a été très difficile à vendre à [Root.GetName]. Après de nombreuses protestations, le député de la région a retiré son soutien à notre proposition et s'y oppose maintenant, craignant pour sa réélection."
 parlaments.19.a:0 "Très bien."
 parlaments.20.t:0 "Vie citadine"
 parlaments.20.d:0 "En tant que représentants de régions parfois assez éloignées de [Root.Capital.GetCapitalName], de nombreux députés trouvent souvent que la vie dans la capitale pendant leurs visites est très différente de ce à quoi ils sont habitués. Certains la trouvent à la fois étriquée et sale, et beaucoup semblent assez soulagés quand ils peuvent rentrer chez eux.\n\nCette année s'est avérée encore plus difficile à endurer pour les sensibilités délicates de nos députés. Les mois chauds ont été inhabituellement chauds, les mois humides inhabituellement humides et les mois froids inhabituellement froids. Un certain nombre de députés ont maintenant décidé qu'ils en avaient assez et nous ont approchés pour demander de l'aide afin de rendre leurs séjours plus agréables."
 parlaments.20.a:0 "Nous devons faire ce que nous pouvons."
 parlaments.20.b:0 "Ils devront endurer comme le reste d'entre nous."
 parlaments.21.t:0 "Député dans un scandale"
 parlaments.21.d:0 "Un scandale mineur s'est produit dans la capitale pendant le débat actuel. Il semble que plutôt que d'assister lui-même aux sessions, le député de [recalcitrant_seat.GetName] était dehors à troubler l'ordre public et à harceler sa logeuse. L'indignation est grande tant parmi ses pairs que dans la rue et risque de hanter les futurs parlements pendant des années."
 parlaments.21.a:0 "Laissons passer."
 parlaments.21.b:0 "Arrêtons le député."
 parlaments.22.t:0 "Absentéisme"
 parlaments.22.d:1 "Étant donné sa grande influence sur la politique de notre pays, il serait facile de supposer que tous les députés assistent aux sessions parlementaires avec grand enthousiasme, désireux de faire le maximum avec le pouvoir qui leur a été confié. Ce n'est, cependant, loin d'être le cas et dans tout [Root.GetParliamentName] il y en aura certains qui ne se présentent jamais, soit parce qu'ils profitent encore de leurs domaines à la campagne, soit parce qu'ils décident de participer aux nombreuses joies de la capitale. Le problème s'est aggravé dernièrement et nous craignons que les dignitaires étrangers ne se moquent de nous dans notre dos. Il y a un certain nombre de mesures qui pourraient être prises pour augmenter l'assiduité, mais aucune que les députés actuels n'accueilleraient très favorablement."
 parlaments.22.a:0 "Mettons à l'amende les pires abus."
 parlaments.22.b:0 "Il n'y a rien que nous puissions faire."
 parlaments.23.t:0 "Demandes de représentation"
 parlaments.23.d:0 "Un certain nombre de publications hostiles ont commencé à circuler dans les cités de [Root.GetName]. Des auteurs anonymes, mais très critiques, affirment que notre gouvernement est « autocratique » et exigent à la fois une constitution écrite et un parlement où les différentes parties de notre pays peuvent être représentées."
 parlaments.23.a:0 "Interdisons les Publications"
 parlaments.23.b:0 "Faisons de vagues promesses de réforme"
 parlaments.24.t:0 "Aide financière"
 parlaments.24.d:0 "En raison des mauvaises finances gouvernementales actuelles, toute contribution au trésor public est très bienvenue. C'est donc avec un certain enthousiasme que nous recevons les représentants d'un certain nombre d'assemblées de cités riches offrant leur aide. Leur prix, cependant, est une plus grande représentation au gouvernement en général et des moyens formalisés pour l'État de demander leur aide à l'avenir."
 parlaments.24.a:0 "Accordons-leur une plus grande représentation"
 parlaments.24.b:0 "Refusons leur argent."
 parlaments.24.c:0 "Promettons de prendre leurs points de vue en considération."
 parlaments.24.dd:0 "Refusons leur argent."
 parlaments.25.t:1 "Demandes du peuple [Root.Culture.GetName]"
 parlaments.25.d:0 "Bien que notre pays n'ait pas de parlement national, des assemblées locales existent depuis des temps anciens dans nombre de nos provinces. Celles-ci ont peu d'influence en dehors de leurs propres provinces mais elles approcheront parfois l'État et leur existence permet une taxation plus efficace des provinces.\n\nDernièrement, des troubles couvent à [Root.GetName], où un certain nombre de ces assemblées provinciales ont récemment commencé à exiger une représentation au niveau national. Elles estiment être mal représentées par le gouvernement central et qu'un parlement central où elles pourraient offrir leurs opinions au souverain serait le seul moyen d'atténuer cela."
 parlaments.25.a:0 "Nous y réfléchirons."
 parlaments.25.b:0 "De telles idées doivent être écrasées."
 parlaments.26.t:0 "Contribution directe"
 parlaments.26.d:0 "Enthousiasmé par la question actuellement débattue au parlement, un groupe dont les intérêts sont très alignés sur les nôtres de [Root.GetName] est venu faire une contribution directe à l'État. Ils espèrent que l'argent pourra être utilisé à bon escient pour « convaincre » les députés encore opposés, ou au moins nous compenser pour les coûts que nous avons eus jusqu'à présent."
 parlaments.26.a:0 "Je suis sûr que nous lui trouverons une utilité."
 parlaments.27.t:0 "Traditions parlementaires"
 parlaments.27.d:0 "L'une des choses les plus difficiles à propos du fait d'être parlementaire n'a rien à voir avec les débats dans la capitale mais plutôt avec la façon de vendre les nouvelles lois aux gens de retour chez eux. Pourtant, un député local aura souvent plus de facilité à expliquer un nouvel impôt que le collecteur envoyé par le gouvernement central ne l'aurait dans des systèmes moins représentatifs.\n\nIl semble que les députés en général et ceux de [Root.GetName] en particulier soient devenus si habiles à défendre les politiques que nous pouvons voir une hausse du soutien au gouvernement central dans son ensemble."
 parlaments.27.a:0 "Ils me comprennent enfin !"
 parlaments.28.t:0 "Soutien de l'assemblée locale"
 parlaments.28.d:0 "L'assemblée locale de [Root.GetName] a été assez enthousiaste dans son soutien à notre proposition actuelle au [Root.GetParliamentWithGrammar]. Tellement qu'ils ont déjà commencé les préparatifs nécessaires pour ce qu'ils sont certains sera une approbation assurée."
 parlaments.28.a:0 "Remarquable."
 parlaments.29.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.29.d:1 "Citant leur loyauté éternelle envers [Root.Owner.Monarch.GetTitle] et leur pleine confiance en sa capacité à savoir ce qui est le mieux pour notre État, les députés du siège de [Root.GetName] se sont prononcés en soutien de notre position au [Root.Owner.GetParliamentWithGrammar]. Leur soutien à notre cause est le bienvenu."
 parlaments.29.a:0 "Excellent !"
 parlaments.30.t:0 "[Root.GetName] change de position dans le débat !"
 parlaments.30.d:1 "Citant leur méfiance envers [Root.Owner.Monarch.GetTitle] et sa capacité à savoir ce qui est le mieux pour notre État, les députés du siège de [Root.GetName] ont retiré leur soutien à notre position au [Root.Owner.GetParliamentWithGrammar]."
 parlaments.30.a:0 "Leur manque de confiance est troublant."
