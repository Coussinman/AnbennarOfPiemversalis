cannorian_monuments_bal_dostan.1.t: "Les Vampires de Bal Dostan"
cannorian_monuments_bal_dostan.1.d: "Alors que nous venions de mettre la dernière main à l'expansion de Bal Dostan, une petite délégation de personnages pour le moins inhabituels s'est présentée. Ils se sont présentés comme les représentants des clans vampiriques qui résident dans les ombres de Bal Dostan et ses environs depuis des siècles. En échange de la liberté d'opérer au sein de notre État, ils offrent de mettre leurs talents de vampires à notre service. Devrions-nous accepter cette proposition ?"
cannorian_monuments_bal_dostan.1.a: "Laissons les graines des ténèbres germer..."
cannorian_monuments_bal_dostan.1.b: "Des vampires ? Scandaleux ! Gardes, arrêtez immédiatement cette délégation !"
cannorian_monuments_bal_dostan.1.c: "Des vampires ? De quoi parle-t-il ? Nous avons déjà des vampires !"

cannorian_monuments_hammerhome_artificers.t: "Les Artificiers de la Demeure-du-Marteau"
cannorian_monuments_hammerhome_artificers.d: "Alors que les dernières touches de la nouvelle Guilde des Artificiers de la Demeure-du-Marteau sont mises en place, une délégation représentant les membres de la Guilde des Artificiers nous a approchés. Tout en nous remerciant pour nos contributions et investissements continus dans l'encouragement de l'étude et de la pratique de l'Artisanat Magique au sein de l'État, les membres de la guilde demandent que la Guilde des Artificiers devienne une composante officielle et intégrante de l'appareil d'État. En retour, ils promettent que leurs travaux de recherche en Artisanat Magique seront au service du pays. Devrions-nous accepter cette proposition ?"
cannorian_monuments_hammerhome_artificers.a: "Nous accorderons aux artificiers le plein soutien de l'État !"
cannorian_monuments_hammerhome_artificers.b: "Nos ressources seraient mieux employées ailleurs."
cannorian_monuments_hammerhome_artificers.c: "Cette délégation sort d'une caverne : nous soutenons déjà l'Artisanat Magique !"

cannorian_monuments_nimscodd_artificers.t: "Les Artificiers de Nimscodd"
cannorian_monuments_nimscodd_artificers.d: "Alors que les dernières touches des nouvelles améliorations et de l'expansion de l'Académie de Nimscodd sont mises en place, une délégation représentant les membres du personnel de l'Académie nous a approchés. Tout en nous remerciant pour nos contributions et investissements continus dans l'encouragement de l'étude et de la pratique de l'Artisanat Magique au sein de l'État, le personnel de l'académie demande que celui-ci, et par extension l'Artisanat Magique lui-même, devienne une composante officielle et intégrante de l'appareil d'État. En retour, ils promettent que leurs travaux de recherche et leur enseignement de l'Artisanat Magique seront au service du pays. Devrions-nous accepter cette proposition ?"
cannorian_monuments_nimscodd_artificers.a: "Nous accorderons à l'Artisanat Magique le plein soutien de l'État !"
cannorian_monuments_nimscodd_artificers.b: "Nos ressources seraient mieux employées ailleurs."
cannorian_monuments_nimscodd_artificers.c: "Le personnel de l'académie sort d'une caverne : nous soutenons déjà l'Artisanat Magique !"

cannorian_monuments_giberd_artificers.t: "Les Artificiers de Giberd"
cannorian_monuments_giberd_artificers.d: "Alors que les dernières touches de l'Académie d'Ingénierie de Giberd sont mises en place, une délégation représentant les membres de l'Académie nous a approchés. Tout en nous remerciant pour nos contributions et investissements continus dans l'encouragement de l'étude et de la pratique de l'Artisanat Magique au sein de l'État, les professeurs et universitaires demandent que l'étude de l'Artisanat Magique devienne une composante officielle et intégrante de l'appareil d'État. En retour, ils promettent que leurs travaux de recherche en Artisanat Magique seront au service du pays. Devrions-nous accepter cette proposition ?"
cannorian_monuments_giberd_artificers.a: "Nous accorderons à ces artificiers universitaires les fonds nécessaires !"
cannorian_monuments_giberd_artificers.b: "Nos ressources seraient mieux employées ailleurs."
cannorian_monuments_giberd_artificers.c: "Cette délégation sort d'une caverne : nous soutenons déjà l'Artisanat Magique !"