l_french:
 dwarven_hold:0 "Bastion Nain"
 dwarven_hold_surface:0 "Bastion de Surface"
 dwarven_road:0 "Route Naine"
 cavern:0 "Caverne"
 city_terrain:0 "Urbain"
 gladeway:0 "Clairevoie"
 fey_gladeway:0 "Clairevoie Féerique"
 ancient_forest:0 "Forêt Ancienne"
 mushroom_forest_terrain:0 "Forêt Fongique"
 shadow_swamp_terrain:0 "Marais des Ombres"
 bloodgroves:0 "Bois-Sanglants"
 dwarven_hold_desc:0 "Le terrain de Bastion Nain désigne une puissante forteresse des nains, façonnée par des générations d'artisans qui ont taillé la roche vive pour y ériger des halls monumentaux s'enfonçant jusqu'au cœur même des montagnes."
 dwarven_hold_surface_desc:0 "Le terrain de Bastion de Surface désigne une forteresse naine fortifiée, creusée dans les profondeurs des montagnes, mais disposant d'un accès vers le monde extérieur."
 dwarven_road_desc:0 "Le terrain de Route Naine représente les vastes réseaux routiers que les nains ont bâtis sous la surface du monde, témoignages de leur maîtrise inégalée de l'ingénierie souterraine."
 cavern_desc:0 "Le terrain de Caverne représente les passages et tunnels souterrains qui s'étendent sous la surface du monde, formant un dédale naturel de galeries obscures."
 city_terrain_desc:0 "Le terrain Urbain représente une infrastructure développée et des provinces densément peuplées, dominées par les bâtiments et les rues. Les provinces de ce type ont historiquement prospéré par leur propre mérite, plutôt que d'être de simples cités au sein d'un royaume plus vaste. On compte parmi elles les cités-États les plus éminentes, ainsi que les villes ayant acquis, ou ayant historiquement détenu, une richesse et un poids politique considérables face à leur suzerain."
 gladeway_desc:0 "Le terrain de Clairevoie représente les sentiers tortueux qui serpentent à travers les futaies impénétrables des forêts anciennes."
 ancient_forest_desc:0 "Une Forêt Ancienne est une forêt ayant atteint un âge vénérable sans perturbation majeure, développant ainsi des caractéristiques écologiques uniques et une atmosphère empreinte de mystère."
 fey_gladeway_desc:0 "Le terrain de Clairevoie Féerique représente les chemins capricieux qui relient le Plan Matériel Premier au Royaume Féerique, permettant aux voyageurs avertis de se « téléporter » à travers le Plan Matériel. Dans les Bois-Profonds, ces sentiers sont connus sous le nom de Lien Verdoyant.\n\n§TToutes les Clairevoies Féeriques sont connectées entre elles.§!\n\n§TIl est impossible de construire des forts sur ce terrain.§!"
 mushroom_forest_terrain_desc:0 "S'apparentant davantage à une jungle, la Forêt Fongique du sud d'Aelantir abrite des champignons colossaux tenant lieu d'arbres, ainsi qu'une végétation dense unique à cette région."
 shadow_swamp_terrain_desc:0 "Le terrain de Marais des Ombres représente des terres où le Plan de l'Ombre s'est répandu dans le Plan Matériel Premier, un lieu caractérisé par l'absence totale de couleurs et un marécage corrompu sous l'influence des guenaudes nocturnes qui y résident."
 bloodgroves_desc:0 "Le terrain de Bois-Sanglants représente une forêt d'arbres blancs étrangement uniformes qui pleurent une substance semblable au sang durant l'hiver, teintant toute la région d'une frappante nuance écarlate."
