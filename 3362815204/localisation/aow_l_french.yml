 aow_events.1.t:0 "La Détresse de [Root.GetName]"
 aow_events.1.d:0 "Tout [Root.Owner.GetName] souffre en temps de guerre, mais les provinces qui se trouvent sur le chemin de l'ennemi souffrent le plus. Ce qui apparaît à un soldat ou commandant comme une source commode de ravitaillement est souvent tout ce que possède le petit peuple. Les environs de [Root.GetCapitalName] ont été pillés pendant cette guerre jusqu'à la famine. Ils tendent maintenant la main vers le gouvernement pour les aider à se remettre, de peur que les souffrances de [Root.Owner.GetName] ne se prolongent pendant des années après la paix éventuelle."
 aow_events.1.a:0 "Quoi qu'il faille, nous le fournirons."
 aow_events.1.b:0 "Cet argent serait mieux dépensé à gagner cette guerre."
 aow_events.2.t:0 "À la Lisière des Frontières"
 aow_events.2.d:0 "Les sièges peuvent être coûteux tant en temps qu'en vies, et nous prenons normalement toutes les mesures nécessaires pour les terminer rapidement. Un siège dans la guerre en cours s'est trouvé se dérouler près de la frontière, déclenchant une discussion sur jusqu'où les soldats devraient aller pour piller la campagne.\n\nLa nation de l'autre côté n'est pas notre ennemi dans cette guerre, mais peut-être que si certains de leurs hameaux étaient pillés, apparemment par erreur, ils comprendraient. Le siège pourrait être grandement aidé par ces approvisionnements."
 aow_events.2.a:0 "Allez aussi loin que nécessaire pour vous réapprovisionner, et finissez-en."
 aow_events.2.a.tt:0 "[This.Owner.GetName] pourrait ne pas être satisfait de nous..."
 aow_events.2.b:0 "Je ferais mieux de laisser ce conflit rester dans les frontières de nos ennemis."
 aow_events.3.t:0 "[From.GetName] Assaille nos Frontières"
 aow_events.3.d:0 "Bien que nos nations soient en paix, nous avons reçu des rapports de soldats [From.GetAdjective] attaquant nos frontières à [Root.GetName], agressant des paysans pour se réapprovisionner. Leurs ambassadeurs nous assurent qu'il s'agit d'une simple erreur et que l'armée est devenue un peu désespérée pour maintenir les approvisionnements d'un siège en cours de l'autre côté de la frontière. Erreur ou non, [Root.GetName] en a souffert."
 aow_events.3.a:0 "C'est une violation inacceptable de nos frontières !"
 aow_events.3.b:0 "Nous pouvons tous faire des erreurs en temps de guerre. Des excuses suffisent."
 aow_events.4.t:0 "Résistance"
 aow_events.4.d:0 "Roturiers et nobles ne sont peut-être pas toujours satisfaits de notre règne, mais ils sont encore moins satisfaits de l'occupation étrangère de leur terre. Bien que la province soit sous contrôle ennemi, un mouvement de résistance s'est développé à [Root.GetName], prêt à frapper contre les envahisseurs et à reconquérir la terre pour leur cause. Leur chef est venu nous demander de l'aide, promettant que si nous apportons les armes, ils peuvent apporter le feu."
 aow_events.4.a:0 "Espérons que ces patriotes pourront causer quelques troubles."
 aow_events.4.b:0 "S'ils veulent soutenir [Root.Owner.GetName], ils devraient travailler avec nos forces armées."
 aow_events.5.t:0 "Peste lors du Siège de [Root.GetName]"
 aow_events.5.d:0 "Là où va la guerre, vont la peste, la famine et la mort. Nos armées à [Root.GetName] ont tenu le fort contre les forces assiégeantes de nos ennemis, mais les deux camps ont vu l'arrivée d'une terrible maladie dans la province, mettant en danger les civils autant que les soldats. Pour épargner aux habitants une épidémie pire, au moins un camp devrait évacuer une partie de ses gens. Cependant, à moins que les attaquants ne montrent la même prudence, ils pourraient profiter de cette occasion pour avancer leur siège."
 aow_events.5.a:0 "Très bien, nous devons penser au peuple."
 aow_events.5.a.tt:0 "Si nos ennemis restent, ils pourraient en profiter pour prendre le dessus dans le siège."
 aow_events.5.b:0 "Nous n'abandonnerons pas notre défense !"
 aow_events.5.b.tt:0 "À moins que le camp attaquant n'évacue partiellement, la maladie s'aggravera..."
 aow_events.6.t:0 "Peste lors du Siège de [From.GetName]"
 aow_events.6.d:0 "Là où va la guerre, vont la peste, la famine et la mort. Les troupes [From.Owner.GetAdjective] à [From.GetName] ont tenu le fort contre nos forces assiégeantes, mais les deux camps ont vu l'arrivée d'une terrible maladie dans la province, mettant en danger les civils autant que les soldats. Pour épargner aux habitants et à nos propres soldats une épidémie pire, au moins un camp devrait évacuer une partie de ses gens. Cependant, à moins que les défenseurs ne montrent la même prudence, ils pourraient profiter de cette occasion pour causer un revers à notre siège."
 aow_events.6.a:0 "Nous ne pouvons pas nous permettre que cette crise s'aggrave."
 aow_events.6.b:0 "Nous ne pouvons pas leur laisser prendre le dessus !"
 aow_events.6.b.tt:0 "À moins que le camp défenseur n'évacue partiellement, la maladie s'aggravera..."
 aow_events.7.t:0 "Les Défenseurs [From.Owner.GetAdjective] Évacuent le Siège"
 aow_events.7.d:0 "Quand la maladie a frappé à [From.GetName], nous avons refusé d'évacuer, considérant que c'était le devoir des [From.Owner.GetAdjective] de le faire en premier, pour s'occuper de leur propre peuple. Heureusement, nous avions raison : les défenseurs ont cédé, choisissant d'affaiblir leur position dans le siège pour consacrer ces ressources à essayer d'atténuer la propagation de la maladie. Une excellente occasion de lancer une offensive sur leur position affaiblie."
 aow_events.7.a:0 "Une occasion que nous saisirons certainement."
 aow_events.8.t:0 "Les Attaquants Évacuent le Siège"
 aow_events.8.d:0 "Quand la maladie a frappé à [From.GetName], nous avons refusé d'évacuer, considérant que c'était le devoir des forces attaquantes qui avaient apporté la peste là-bas de faire le premier pas. Heureusement, nous avions raison : Craignant les conséquences que la maladie pourrait avoir sur leurs troupes, les attaquants ont cédé, causant un revers temporaire pour eux dans le siège. Pendant ce temps, nos défenses restent intactes."
 aow_events.8.a:0 "Puissent-elles ne jamais faiblir."
 aow_events.9.t:0 "La Peste à [Root.GetName] S'aggrave"
 aow_events.9.d:0 "Malgré la peste balayant les terres ravagées par la guerre, nos vaillantes forces défensives et les assaillants incessants assiégeant notre forteresse à [Root.GetName] ont refusé de céder. L'obstination mutuelle a causé des pertes majeures pour la population civile de [Root.Capital.GetCapitalName], qui voit maintenant sa ville natale détruite à la fois par la guerre et la peste."
 aow_events.9.a:0 "Nous étions tous deux des imbéciles..."
 aow_events.10.t:0 "La Peste à [From.GetName] S'aggrave"
 aow_events.10.d:0 "Malgré la peste balayant les terres ravagées par la guerre, les forces défensives acharnées et nos audacieux assaillants assiégeant leur forteresse à [From.GetName] ont refusé de céder. L'obstination mutuelle a causé des pertes majeures pour la population civile de [From.Capital.GetCapitalName], détruisant les infrastructures et rendant le siège encore plus difficile."
 aow_events.10.a.tt:0 "La peste persistera pendant des années à [This.GetName], augmentant l'attrition pour les troupes étrangères et nuisant à ses habitants."
 aow_events.11.t:0 "Propagation de la Pestilence"
 aow_events.11.d:0 "La guerre a aggravé la propagation des maladies, et ce qui a commencé comme une épidémie locale centrée autour d'un siège s'est maintenant répandu plus loin. Les civils déplacés ainsi que les mouvements de troupes, tous deux difficiles à éviter en temps de guerre, ont facilité cela et maintenant [Root.GetName] est également tombé victime de la maladie."
 aow_events.11.a:0 "Maudite soit cette guerre..."
 aow_events.12.t:0 "Cruauté des Mercenaires"
 aow_events.12.d:1 "La guerre est rarement sans brutalité. Les soldats ne sont pas connus pour leur miséricorde, mais cette guerre a vu des comportements exceptionnellement vils de la part de nos forces d'occupation. Il semble que la [hired_mercenary_band.GetName], la bande de mercenaires que nous avons envoyée occuper [war_province.GetAreaName], soit insatisfaite des salaires que nous leur fournissons et ait eu recours au vol de la population civile. Leurs actions ont terni l'image de toutes nos troupes. Alors que l'extorsion par la terreur et la torture devient monnaie courante, les soldats [Root.GetAdjective] sont vilipendés autant que craints et les récits de leurs atrocités se répandent bien au-delà des frontières de la guerre."
 aow_events.12.a:0 "Nous devrions empêcher que cela se reproduise à l'avenir."
 aow_events.12.b:0 "Bellum se ipsum alet ! Qu'ils prennent ce qu'ils veulent."
 aow_events.13.t:1 "Des Bandes de Mercenaires Pillent [Root.GetAreaName]"
 aow_events.13.d:1 "L'occupation ennemie de [Root.GetAreaName] a eu un coût élevé pour sa population. Poussée par un mélange de cupidité et de désespoir, la [hired_mercenary_band.GetName], une bande de mercenaires engagée par [From.GetUsableName], a violemment pillé et terrorisé les civils locaux pour extorquer de l'argent et des ressources."
 aow_events.13.a:0 "La cupidité corrompt le cœur des hommes..."
 aow_events.14.t:0 "Réfugiés Déplacés de [Root.GetName]"
 aow_events.14.d:0 "Les effets persistants de la guerre affligent encore [Root.Owner.GetName]. Certaines régions ont été détruites au point de devenir presque inhabitables, et les gens ont été forcés de se déplacer pour survivre dans ces conditions. Certaines personnes ont quitté entièrement [Root.GetName], s'installant dans les provinces voisines où la guerre a laissé moins de cicatrices."
 aow_events.14.a:0 "La guerre est peut-être terminée, mais nos troubles ne le sont pas."
 aow_events.15.t:0 "Les Familles Laissées Derrière"
 aow_events.15.d:0 "La guerre récente a lourdement pesé sur notre peuple. Beaucoup ont été appelés, peu sont revenus. Les familles de nobles et de roturiers ont peiné en attendant que les soldats rentrent chez eux, mais la guerre s'est terminée et ils ne sont jamais revenus. Maintenant, le labeur continue, beaucoup étant si préoccupés par le travail pour compenser la paire de bras perdue qu'ils ont à peine le temps de faire leur deuil. Parmi ceux qui ont le temps de réfléchir, beaucoup pensent de plus en plus que nous avons gaspillé des vies trop négligemment."
 aow_events.15.a:0 "Nous pouvons alléger le fardeau fiscal des endeuillés."
 aow_events.15.b:0 "Soyons plus indulgents dans la conscription pour l'armée à l'avenir."
 aow_events.15.c:0 "C'est le prix qui doit être payé pour notre glorieuse nation."
 aow_events.16.t:0 "Sorcellerie"
 aow_events.16.d:0 "Les habitants de la ville ravagée par la guerre de [Root.Capital.GetCapitalName] cherchent des raisons aux malheurs qui se sont abattus sur eux. Heureusement, ils n'ont pas trouvé qu'ils étaient liés à notre gouvernance, mais malheureusement, ce qu'ils ont trouvé a causé beaucoup d'émoi. Les effets prolongés de la guerre et la façon dont ils semblent affecter certains plus que d'autres, prétendent-ils, ne peuvent être que l'œuvre de ceux qui pratiquent la sorcellerie et la magie.\n\nDes accusations ont été portées généreusement, et il y a des autorités locales disposées à organiser des procès en bonne et due forme pour ces crimes. Aussi en bonne et due forme que peuvent l'être des procès pour magie à [Root.GetName], en tout cas."
 aow_events.16.a:0 "Autorisez-les à procéder aux procès locaux."
 aow_events.16.b:0 "$INQUISITOR$ peut s'occuper de ces affaires de manière plus organisée."
 aow_events.16.c:0 "De telles superstitions insensées n'ont pas leur place en [Root.Owner.GetName] !"
 aow_events.17.t:0 "Chasse aux Sorcières"
 aow_events.17.d:0 "Depuis que les habitants longtemps éprouvés de [Root.GetName] ont reçu la bénédiction de l'État et de l'Église pour poursuivre ceux qui auraient prétendument amené famine et maladie sur eux par le biais de la sorcellerie, ils en ont fait bon usage. Alors qu'autrefois seuls les évidemment suspects étaient désignés, les sorcières semblent maintenant être partout. La foule réclame le sang de paysans et de nobles, et même certains membres du clergé local pourraient ne pas être dignes de confiance.\n\nCette abondance de pratiques sataniques explique certainement largement les difficultés d'après-guerre de [Root.GetName], mais les procès de masse qui ont suivi deviennent incontrôlables. Nous pourrions envisager la possibilité que certains soient innocents."
 aow_events.17.a:0 "Cessez cette folie !"
 aow_events.17.b:0 "Intervenez au nom des nobles."
 aow_events.17.c:0 "Intervenez au nom des roturiers."
 aow_events.17.e:0 "Laissez-les rendre justice comme ils l'entendent."
 aow_events.18.t:0 "Une Sorcière des Terres Étrangères"
 aow_events.18.d:1 "Être capable de reconnaître les sorcières et sorciers avec certitude est un don rare, dont nous ne savons pas à qui Dieu l'accordera. Heureusement, être capable de les reconnaître avec incertitude sur la base d'un comportement ou de succès étranges ou inhabituels est un don très commun avec l'avantage supplémentaire de cibler plus systématiquement des personnes quelque peu inadaptées.\n\nParfois, cependant, cela peut être gênant. Des habitants de [Root.GetName] ont récemment désigné une noble [they_send_us_witches.GetAdjective] comme sorcière. La poursuivre pourrait causer un incident diplomatique, mais ne pas intervenir pourrait être perçu comme un signe de manque de foi."
 aow_events.18.a:0 "Cette peur de l'inconnu doit être stoppée."
 aow_events.18.b:0 "Sorcières, espions, qui sait ce qu'ils manigancent ?"
 aow_events.19.t:0 "Une Accusation Hautement Troublante"
 aow_events.19.d:1 "Sous l'œil vigilant de $INQUISITOR$, les procès pour sorcellerie et hérésie se sont déroulés dans des circonstances relativement contrôlées. $INQUISITOR_CAP_ADJ$ ne serait pas à notre cour si nous ne lui faisions pas confiance, après tout. Un événement récent a cependant compliqué les choses, car $INQUISITOR_ADJ$ a défié notre confiance envers un autre. $STATESMAN$$TRADER$$SPYMASTER$$DIPLOMAT$, qui a grandement aidé [Root.GetName] dans les relations étrangères, a été accusé de sorcellerie, preuve que personne n'est véritablement au-dessus de tout soupçon.\n\n$STATESMAN$$TRADER$$SPYMASTER$$DIPLOMAT$ prétend que $INQUISITOR$ soutient ces accusations par pure jalousie. Un drame politique pourrait être derrière tout cela, mais encore une fois, nous avons fait confiance à notre inquisiteur jusqu'ici."
 aow_events.19.a:0 "Tu ne laisseras pas vivre une sorcière."
 aow_events.19.b:0 "Tu ne porteras pas de faux témoignage contre ton prochain."
 aow_events.20.t:0 "Les Feux de l'Enfer"
 aow_events.20.d:0 "$INQUISITOR$ a été diligent. Avec le soutien du [Root.Monarch.GetTitle], ceux qui pratiquent la sorcellerie sont condamnés et brûlés, sur Terre comme en Enfer. Notre poursuite impitoyable de ces crimes a mis notre dévotion religieuse au-dessus de tout reproche.\n\nPourtant, il y a des moments de doute. Un jour, votre jeune héritier [Root.Heir.GetName] assiste pour la première fois à l'exécution publique d'une sorcière. Vous voyez ses yeux se remplir de terreur à la lueur du feu, et avant que ce soit terminé, votre enfant supplie qu'on épargne la sorcière. Vos tentatives d'explication ne font rien pour arrêter les larmes, et finalement vous vous retrouvez incapable de justifier cela à un esprit innocent. Peut-être que la condamnée est innocente aussi, et que vous brûlerez vous-même un jour, éternellement."
 aow_events.20.a:0 "L'enfant a raison. Nous avons été aveuglés par notre zèle."
 aow_events.20.b:0 "Chut, enfant, et espère que personne n'a entendu cela..."
 aow_events.21.t:0 "Tireur Inconnu"
 aow_events.21.d:0 "[Root.GetName] a un passé récent de guerre, et le peuple [Root.GetAdjective] doute de plus en plus de ses objectifs, mais le [Root.Monarch.GetTitle] persiste à mener l'armée toujours plus loin. Les soldats sont las, beaucoup souhaitant rentrer chez eux. Nous n'avons jamais eu de raison de considérer à quel point.\n\nJusqu'à ce jour. Alors que les troupes se préparaient à affronter l'ennemi, un coup de feu a retenti, et le roi est tombé au sol, mort. Un tireur d'élite ennemi ? Un complot de prétendants au trône ? Ou peut-être était-ce simplement la mesure du désespoir de quelqu'un voulant laisser tout cela derrière lui."
 aow_events.21.a:0 "Nous ne le saurons peut-être jamais."
 aow_events.22.t:0 "Un Changement de Caractère"
 aow_events.22.d:0 "Après la fin de la guerre, notre ardent conseiller diplomatique $DIPLOMAT$ a imploré à plusieurs reprises [Root.Monarch.GetName] non seulement de modifier la politique étrangère pour éviter de futurs bains de sang, mais a même suggéré qu'il devrait changer ses priorités en tant que dirigeant.\n\n« Tant que le peuple voit son [Root.Monarch.GetTitle] se préparer à la guerre, comment peut-il faire autre chose que nous blâmer quand la guerre est sur nous ? » demande $DIPLOMAT$. « Ce n'est pas simplement ce que le peuple veut. C'est ce dont cette nation a besoin. »"
 aow_events.22.a:0 "Vous avez raison, [Root.GetName] a besoin de paix."
 aow_events.22.b:0 "Abandonner l'esprit qui m'a appelé à la guerre ? Ridicule."
 aow_events.23.t:0 "Les Fidèles en Terres Ennemies"
 aow_events.23.d:2 "Beaucoup de soldats voient notre guerre en cours comme un conflit de fois. Cela a conduit à un certain débat autour de l'un de nos sièges en cours, où la population locale est [Root.Religion.GetName]. Normalement, nos troupes se ravitailleraient pour le siège en prenant ce dont nous avons besoin aux habitants, mais les pieux de notre armée pensent que nous devrions épargner nos frères et sœurs [Root.Religion.GetName], même au prix d'un siège plus long. Qu'est-ce qui passe en premier parmi le peuple [Root.GetAdjective], la foi ou la guerre ?"
 aow_events.23.a:0 "Épargnez les fidèles."
 aow_events.23.b:0 "Aucune pitié pour les ennemis de [Root.GetName] !"
 aow_events.24.t:0 "[Root.GetName] Trahie par des Frères dans la Foi"
 aow_events.24.d:0 "Quand les imbéciles [Root.Religion.GetName] de [Root.GetName] ont été attaqués pour la première fois par nos ennemis, ils partageaient leur foi, malgré nos meilleurs efforts pour leur faire voir la lumière. Maintenant, ayant subi l'assaut brutal de la guerre, ils ont vu à quel point la morale des [Root.Religion.GetName] est vraiment superficielle. Après avoir été assiégés et pillés par les gens en qui ils avaient confiance, ils ont amèrement rejeté leurs anciennes croyances, et juré allégeance non seulement à notre pays, mais à notre religion."
 aow_events.24.a:0 "Nous leur montrerons que la foi [Root.Owner.Religion.GetName] a plus d'intégrité que cela."
 aow_events.25.t:0 "Les Incroyants de [Root.GetName] Vacillent"
 aow_events.25.d:0 "Alors que la plupart de notre nation craint les envahisseurs [Root.Religion.GetName], quelques citoyens semblent les accueillir. Après que [Root.GetName] soit tombée aux mains de l'ennemi, ses habitants semblent avoir commencé à se demander s'ils seraient mieux dans un pays dirigé par des dirigeants de leur propre foi. Dans un effort pour atténuer cette trahison, les dirigeants locaux ont envoyé un messager à notre cour, demandant des promesses d'une approche plus distante des questions religieuses à [Root.GetName]. Sinon, l'ennemi pourrait déjà avoir une emprise sur la province."
 aow_events.25.a:0 "Nous récompenserons la loyauté par le respect."
 aow_events.25.b:0 "Nous n'accepterons pas la déloyauté."
 aow_events.26.t:0 "Transfuges [Root.Religion.GetName]"
 aow_events.26.d:0 "Les gens sages et spirituellement éclairés de [From.GetName] ont trouvé, après que nous ayons occupé leur terre, qu'ils pourraient bénéficier de nous rejoindre. Après tout, [From.Owner.GetName] est un pays [From.Owner.Religion.GetName], avec peu de compréhension de leurs voies. Si la guerre se passe bien, cela aidera certainement."
 aow_events.26.a:0 "Nous pourrions être en mesure de les accommoder..."
 aow_events.27.t:1 "Trahison [Root.Religion.GetName] à [Root.GetName] !"
 aow_events.27.d:0 "Notre guerre contre les [Root.Religion.GetName] n'est pas passée inaperçue de leurs partisans locaux. À [Root.GetName], des traîtres qui placent la foi avant le pays ont saisi l'occasion de se soulever et de nous attaquer, espérant peut-être aider l'ennemi ou encourager d'autres nations [Root.Religion.GetName] à rejoindre la guerre."
 aow_events.27.a:0 "La foi détermine le chemin de tous, même des méchants."
 aow_events.28.t:0 "Lutte Extérieure, Lutte Intérieure"
 aow_events.28.d:1 "Parfois, nous voyons des conflits sur la scène internationale se refléter à l'intérieur de nos propres frontières. Aujourd'hui, nous avons reçu la nouvelle que notre guerre avec des nations [Root.Religion.GetName] a provoqué un conflit religieux à [Root.GetName], où les fois [Root.Religion.GetName] et [Root.Owner.Religion.GetName] coexistent. Des gens qui étaient autrefois voisins et amis s'attaquent les uns les autres à cause de ce qu'ils perçoivent comme les différences entre nous et nos adversaires."
 aow_events.28.a:0 "Comme la guerre, ce conflit doit suivre son cours."
 aow_events.28.b:0 "Unissez-vous contre le vrai ennemi ! Vous êtes tous [Root.Owner.GetAdjective] !"
 aow_events.29.t:0 "La Patrie Avant la Foi"
 aow_events.29.d:0 "Notre relation avec les dissidents religieux à [Root.GetName] a varié, mais au moins certains des citoyens locaux [Root.Religion.GetName] semblent apprécier notre direction. « Semblent » pourrait être une expression clé dans la situation, car ils nous ont récemment approchés avec une offre d'utiliser leurs liens religieux dans l'un de nos pays rivaux pour renforcer notre réseau d'espionnage international. À condition qu'on puisse leur faire confiance, ils pourraient fournir un atout rare et précieux..."
 aow_events.29.a:0 "Nous leur ferons confiance pour rester loyaux envers nous."
 aow_events.29.b:0 "Nous n'avons pas besoin de telles tactiques sournoises... ni de tels risques."
 aow_events.30.t:0 "Guerriers de la Foi [Root.Religion.GetName]"
 aow_events.30.d:0 "Les plus zélés parmi les [Root.Religion.GetName] de [Root.GetName] ont longtemps monté la garde à la frontière, suspicieux des motifs des incroyants de l'autre côté. Maintenant, ils voient leurs soupçons confirmés par la déclaration ouverte de guerre. Préparés et disposés à donner leur vie pour la cause [Root.Religion.GetName], leur milice locale a rejoint nos forces dans la bataille contre l'armée envahissante."
 aow_events.30.a:0 "En avant, sentinelles de la vérité !"
 aow_events.31.t:0 "Pionniers de la Réforme"
 aow_events.31.d:0 "Quand la nouvelle de la foi [Root.Religion.GetName] s'est répandue dans notre pays, nous étions parmi les premiers à l'accepter. Nous savons où se trouve l'avenir de la foi chrétienne et tandis que des nations moins éclairées peuvent prendre leur temps pour y arriver et avoir besoin d'être traînées, nous marchons fièrement vers lui.\n\nHeureusement, nous ne sommes pas entourés de ces imbéciles de tous côtés. Les dirigeants d'un pays voisin ont pris le même chemin admirable, se libérant des griffes du Haut-Recteur et s'éduquant en théologie [Root.Religion.GetName]. L'Église de [Root.GetName] peut abriter les plus grands érudits, mais il peut encore y avoir beaucoup à apprendre des autres."
 aow_events.31.a:0 "Ensemble, nous répandrons le vrai message de Dieu !"
 aow_events.31.b:0 "L'Église de [Root.GetName] se tient seule."
 aow_events.32.t:0 "Ni [Root.Religion.GetName] ni Ravélien"
 aow_events.32.d:0 "Les prédicateurs [Root.Religion.GetName] ne sont pas les seuls à s'opposer à l'Église Ravélienne. Des érudits de différents mouvements remettent en question leur doctrine corrompue, peut-être pas en parfaite harmonie avec notre propre critique, mais néanmoins très pertinents. L'une de nos nations voisines abrite un tel mouvement. En ces temps tumultueux, pouvons-nous vraiment nous permettre de chipoter sur des désaccords théologiques alors que nous pourrions travailler ensemble ? Cela pourrait nous être bénéfique, s'ils montrent la même ouverture d'esprit."
 aow_events.32.a:0 "Nous nous tiendrons avec eux contre le Haut-Recteur, s'ils se tiennent avec nous."
 aow_events.32.b:0 "Ils répandent des mensonges, simplement des mensonges différents."
 aow_events.33.t:0 "Les Voisins [From.Religion.GetName] Tendent la Main"
 aow_events.33.d:0 "L'Église de [From.GetName] est loin d'être en plein accord avec l'Église de [Root.GetName] sur de nombreuses questions spirituelles, mais sur une question temporelle nous sommes d'accord : l'hégémonie du Haut-Recteur et des Patriarches ne peut être acceptée par les vrais chrétiens. Cela, pour eux, est clairement une raison suffisante de coopérer, malgré le fait qu'ils soient [From.Religion.GetName] et nous [Root.Religion.GetName]. Qu'est-ce qui prend le pas, la réalité politique de notre ennemi commun, ou notre doctrine ecclésiastique ?"
 aow_events.33.a:0 "Ensemble, nous pouvons ramener le christianisme à ce qu'il était censé être."
 aow_events.33.b:0 "La dernière chose dont nous avons besoin est une confusion théologique dans nos propres rangs."
 aow_events.34.t:0 "Les Voisins [From.Religion.GetName] Acceptent"
 aow_events.34.d:0 "Notre geste généreux envers [From.GetName] a porté ses fruits. Malgré nos différences, leurs dirigeants [From.Religion.GetName] ont concédé que nous, en tant qu'avant-garde de la Réforme, devrions tenter d'unir nos causes pour le plus grand bien."
 aow_events.34.a:0 "Les pieux de [Root.GetName] et [From.GetName] se souviendront de ce jour."
 aow_events.35.t:0 "Les Voisins [From.Religion.GetName] Rejettent Notre Charité"
 aow_events.35.d:0 "L'Église dogmatiquement bornée de [From.GetName] est apparemment trop ancrée dans ses habitudes pour faire de la diplomatie avec ceux qui essaient de les aider. Peut-être que nos voies [Root.Religion.GetName] leur semblent aussi mal orientées que les politiques du Saint-Siège."
 aow_events.35.a:0 "Ne savent-ils pas aimer leur prochain comme eux-mêmes ?"
 aow_events.36.t:0 "Les Hérétiques Empiètent sur Notre Terre"
 aow_events.36.d:0 "Alors que nous avons travaillé dur pour éradiquer la confusion hérétique qui cherche à saper la foi chrétienne, juste de l'autre côté de nos frontières, une nation l'a embrassée. Peut-être pensent-ils que nous n'avons pas remarqué qu'ils ont permis à ceux qui rejettent l'Église Ravélienne de dicter l'agenda dans leur capitale, répandant leurs mensonges rapidement depuis celle-ci. Peut-être pensent-ils que nous n'avons pas remarqué que notre propre pays a vu des provinces détournées de la vraie foi. L'avons-nous fait ?"
 aow_events.36.a:0 "Non, nous ne voyons que trop bien ce qui doit être fait."
 aow_events.36.b:0 "Nous pouvons certainement faire semblant."
 aow_events.37.t:0 "La Cause du Fléau Protestant"
 aow_events.37.d:0 "Normalement, la populace de chaque nation est sa propre affaire. Il n'en est pas ainsi quand une autre nation épouse ouvertement la même pourriture spirituelle que la populace. Beaucoup parmi le clergé et les militaires tracent une ligne droite entre les révoltés protestants que nous combattons aujourd'hui et le dévouement à la cause protestante montré par nos voisins. Nous ne pouvons pas rester une nation respectée et crainte aux yeux des autres si nous ne les confrontons pas sur leur soutien, explicite ou implicite, aux hérétiques qui assaillent les terres [Root.GetAdjective]."
 aow_events.37.a:0 "Ils feraient mieux d'avoir une réponse pour nous !"
 aow_events.37.b:0 "Ne suscitons pas plus de troubles à ce sujet."
 aow_events.38.t:0 "La Cause du Fléau Calviniste"
 aow_events.38.d:0 "Normalement, la populace de chaque nation est sa propre affaire. Il n'en est pas ainsi quand une autre nation épouse ouvertement la même pourriture spirituelle que la populace. Beaucoup parmi le clergé et les militaires tracent une ligne droite entre les révoltés réformés que nous combattons aujourd'hui et le dévouement à la cause réformée montré par nos voisins. Nous ne pouvons pas rester une nation respectée et crainte aux yeux des autres si nous ne les confrontons pas sur leur soutien, explicite ou implicite, aux hérétiques qui assaillent les terres [Root.GetAdjective]."
 aow_events.38.a:0 "Ils feraient mieux d'avoir une réponse pour nous !"
 aow_events.38.b:0 "Ne suscitons pas plus de troubles à ce sujet."
 aow_events.39.t:0 "[From.GetName] Nous Confronte au Sujet des Rebelles"
 aow_events.39.d:0 "Apparemment, la décision du gouvernement [From.GetAdjective] d'imposer la foi de la Cour Régente dans leurs terres a été une erreur à plus d'un titre. Leurs sujets [Root.Religion.GetName] se sont révoltés contre eux, ce que plus d'un parmi ceux qui sont affectés reproche à notre soutien de la vraie foi.\n\nMaintenant, un ambassadeur de [From.GetName] nous a ouvertement confrontés sur cette question, et a impérieusement exigé que nous renoncions aux rebelles et à leur lutte. Bien que nous aimerions certainement voir la propagation de la foi [Root.Religion.GetName], c'est une question diplomatique plus que religieuse. Quelle est notre position sur ces rebelles étrangers ?"
 aow_events.39.a:0 "Cuius regio, eius religio. Ils devraient respecter la volonté de leurs dirigeants."
 aow_events.39.b:0 "Nous exigeons que vous cessiez votre oppression de ces pauvres sujets [Root.Religion.GetName] !"
 aow_events.39.c:0 "Nous soutiendrons les fidèles contre vous, ouvertement et avec joie !"
 aow_events.40.t:0 "[From.GetName] Renonce aux Rebelles [From.Religion.GetName]"
 aow_events.40.d:0 "Quels que soient les troubles que nous ayons avec la vermine [From.Religion.GetName] à l'intérieur de nos propres frontières, nous pouvons nous consoler avec le fait que les dirigeants internationaux de leur foi se distancient de cette rébellion. [From.GetName] nous a promis que quelles que soient leurs propres croyances, ils considèrent la révolte contre notre règne inacceptable."
 aow_events.40.a:0 "Espérons que ce ne sont pas que des paroles hypocrites."
 aow_events.41.t:0 "[From.GetName] Défend les Rebelles [From.Religion.GetName]"
 aow_events.41.d:0 "Apparemment, les [From.Religion.GetName] de [From.GetName] sont plus effrontés quant aux troubles qu'ils causent que nous le pensions. Confrontés au fait que leurs frères et sœurs dans la foi se révoltent dans nos rues, leur réponse a été que nous nous l'étions attiré en manquant de respect à leurs croyances hérétiques."
 aow_events.41.a:0 "S'ils voient les choses ainsi, ils ne peuvent guère espérer conserver notre respect."
 aow_events.42.t:0 "[From.GetName] Finance les Rebelles [From.Religion.GetName] !"
 aow_events.42.d:0 "Nos efforts pour amener [From.GetName] à assumer la responsabilité de l'hérésie qu'ils répandent semblent s'être retournés contre nous. Non seulement ils ont embrassé le mouvement rebelle contre notre religion d'État, mais ils ont ouvertement incité à plus d'émeutes, rendant les hérétiques encore plus confiants dans leur cause. Chaque goutte de sang Adéanique versée sur notre sol par ces maniaques est maintenant sur leurs mains."
 aow_events.42.a:0 "Il ne peut y avoir d'absolution pour ceux qui persistent dans le péché."
 aow_events.43.t:0 "Un Véridical de l'Autre Côté de la Frontière"
 aow_events.43.d:1 "Parfois, nous avons la chance de mettre quelque chose en mouvement sans sembler avoir rien fait. Une telle chance s'est présentée récemment, quand un véridical vivant à [send_veridical_province.GetName] a admis à un agent de [Root.GetName] qu'il envisagerait de traverser la frontière vers [receive_cardinal_province.GetName] et de nous soutenir au Rectorat pour un prix. Bien que cela puisse être tentant, il pourrait y avoir un prix plus élevé à payer si nous profitons de cela : la colère de [send_cardinal_province.Owner.GetUsableName], le pays qu'il déserterait."
 aow_events.43.a:0 "Nous prendrons le risque qu'ils ne découvrent jamais."
 aow_events.43.b:0 "Cela ne vaut pas le risque, mais l'homme qui l'a trouvé mérite une promotion."
 aow_events.44.t:0 "Un Véridical Soudoyé pour Déménager"
 aow_events.44.d:0 "Un véridical qui séjournait précédemment en [Root.GetName], près de la frontière, a maintenant quitté entièrement notre nation et déplacé son allégeance vers nos voisins. Les agents [From.GetAdjective] qui l'ont soudoyé pour nous trahir pensaient probablement que nous ne remarquerions pas leur main dans l'affaire, mais ils avaient tort. Ce sabotage intentionnel de notre influence au Rectorat est inacceptable et ne restera pas sans réponse."
 aow_events.44.a:0 "C'est un affront à nous et au Dieu Unique."
 aow_events.45.t:0 "Pensées d'Hérésie"
 aow_events.45.d:0 "Le véridical de [Root.GetName] a vécu près des hérétiques de notre nation et plutôt que de les condamner, il a essayé de les comprendre. Bien que ce soit une conduite sympathique, il a récemment approché l'un de nos ministres pour confesser qu'il a lui-même commencé à douter de la doctrine de l'Église. Si cela venait à la connaissance du Haut-Recteur, il ne serait plus autorisé à servir au Rectorat, mais peut-être pourrions-nous le convaincre de garder cela pour lui pour quelques couronnes."
 aow_events.45.a:0 "La foi ne peut s'acheter, mais le silence le peut."
 aow_events.45.a.tt:0 "le Haut-Recteur découvrant nos actions."
 aow_events.45.b:0 "C'est malheureux, mais il est mal adapté à son poste s'il a des doutes."
 aow_events.46.t:0 "Le Haut-Recteur Découvre la Duplicité"
 aow_events.46.d:0 "Le véridical que nous avons soudoyé pour garder le silence sur ses doutes concernant la doctrine de l'Église croyait malheureusement encore à la confession de ses péchés. Plus malheureusement encore, la manière dont il l'a fait au Haut-Recteur ne lui a pas accordé le pardon, peut-être parce qu'il ne regrette pas vraiment ses doutes. Bien qu'il regrette d'avoir pris notre pot-de-vin, cela aussi est venu à la connaissance du Saint-Père, qui est mécontent de nous autant que de l'ancien véridical."
 aow_events.46.a:0 "Est-il trop tard pour nous aussi de demander pardon ?"
 aow_events.47.t:0 "Un Véridical Se Méfie des Païens"
 aow_events.47.d:0 "Le véridical de [Root.GetName] a été loyal envers [Root.Owner.GetName] jusqu'ici, mais commence à avoir des doutes sur son séjour continu ici après avoir vu des païens vivre si près de sa ville natale de [Root.GetCapitalName]. Dans une lettre au [Root.Owner.Monarch.GetTitle], il a affirmé qu'on ne peut pas faire confiance à ces gens et a demandé qu'ils soient soumis à des réglementations beaucoup plus strictes que nos autres citoyens."
 aow_events.47.a:0 "Si nous ne pouvons pas juger le caractère de quelqu'un par la foi, par quoi d'autre ?"
 aow_events.47.b:0 "Nous n'avons aucune intention de limiter leurs droits à cause d'un seul homme."
 aow_events.48.t:0 "Contacts au Saint-Siège"
 aow_events.48.d:0 "$THEOLOGIAN$$INQUISITOR$, étant un Ravélien sage et respecté, a maintenu de bonnes relations avec des véridicals et d'autres personnes de l'Église même en dehors des frontières de [Root.GetName]. Ils ont récemment découvert qu'un homme qui vient d'être promu véridical, qui est aussi un bon ami à eux, envisage de déménager dans notre pays pour faciliter leur travail mutuel sur un texte théologique. Si nous aidions ce processus, nous aurions un véridical au Rectorat qui est non seulement loyal envers $THEOLOGIAN$$INQUISITOR$, mais aussi envers [Root.Monarch.GetName]."
 aow_events.48.a:0 "Tout ce que nous pouvons faire pour aider, nous le ferons."
 aow_events.48.b:0 "Notre administration a d'autres priorités que le népotisme."
 aow_events.49.t:0 "Un Véridical Ministre"
 aow_events.49.d:0 "L'un des véridicals de [Root.GetName] s'est avéré être un administrateur compétent et fournit déjà des conseils utiles au [Root.Monarch.GetTitle]. À ce stade, en faire un ministre de notre gouvernement ne serait presque qu'une formalité, mais une formalité importante néanmoins, car il pourrait devenir encore plus puissant. Avoir un véridical à notre service nous donnerait certainement de la crédibilité auprès du Haut-Recteur et renforcerait le sentiment que [Root.GetName] est avant tout une nation Ravélienne."
 aow_events.49.a:0 "Il nous a bien aidés jusqu'ici, alors passons aux formalités."
 aow_events.49.b:0 "[Root.Monarch.GetName] n'a pas besoin de ses conseils pour gouverner [Root.GetName]."
 aow_events.50.t:0 "Les Politiques du Véridical Mécontentent les Nobles"
 aow_events.50.d:0 "Depuis que nous avons fait de l'un de nos véridicals un ministre de notre gouvernement, il est allé bien au-delà des éclairages théologiques et a innové de manière significative dans l'administration de [Root.GetName]. Malheureusement, ses suggestions de centralisation du pouvoir ne sont pas possibles sans retirer une partie de l'autorité aux nobles, qui ont commencé à le voir comme un opportuniste. À ce stade, essayer de le démettre de ses fonctions à cause de ce différend signifierait probablement que nous perdrions totalement sa loyauté, mais les nobles qui ont à perdre de ses plans considèrent cela comme un sacrifice facile à faire."
 aow_events.50.a:0 "Le ministre nous montre le chemin vers l'avenir."
 aow_events.50.b:0 "Il a outrepassé son autorité et devrait être renvoyé."
 aow_events.51.t:0 "Péchés d'un Véridical"
 aow_events.51.d:0 "En menant de l'espionnage dans l'un de nos pays voisins, nos agents ont suivi un homme puissant, un véridical, et ont découvert que bien que sa loyauté semble incorruptible, ses mœurs sont déjà corrompues au-delà de ce que l'Église peut possiblement imaginer. Bien que les détails de ses transgressions ne nous intéressent pas, ils pourraient intéresser le Haut-Recteur et nous donner une chance d'affaiblir l'influence de notre voisin au Rectorat. D'un autre côté, avoir une emprise sur un homme de son rang pourrait être utile dans de nombreuses situations."
 aow_events.51.a:0 "Le Saint-Siège doit être informé de ses actions."
 aow_events.51.b:0 "Nous pouvons utiliser cela comme chantage pour améliorer notre réseau d'espionnage."
 aow_events.52.t:0 "Un Véridical Dénoncé"
 aow_events.52.d:0 "Le véridical de [Root.GetName] était réputé pour avoir un caractère faible, mais a toujours été assez discret pour ne pas justifier d'enquête approfondie. Maintenant, il semble que des espions étrangers de [From.GetName] qui l'avaient à l'œil ont mis fin à cela et exposé ses péchés au Haut-Recteur. Ses jours en tant que véridical sont comptés, et notre pouvoir au Rectorat sera affaibli à cause de cette intervention [From.GetAdjective] inopportune."
 aow_events.52.a:0 "Quelle manière sournoise de porter atteinte à notre influence."
 west_african.1.t:0 "Le Sultanat de [Root.GetName]"
 west_african.1.d:0 "Notre peuple a parcouru un long chemin depuis ses origines. Là où il y avait autrefois de nombreuses tribus avec leurs propres coutumes et chefs, les gens à travers [Root.GetName] reconnaissent maintenant [Root.Monarch.GetName] comme leur dirigeant. Beaucoup ont supposé qu'il pourrait bientôt se déclarer Sultan, mais cela pourrait ne pas aller sans contestation à moins que le titre ne lui soit donné par le Calife.\n\nLa nouvelle nous est parvenue que le Califat Ottoman a son siège dans la lointaine cité d'Istanbul et ils pourraient bien être disposés à nous accorder une audience. Peut-être qu'avec la bénédiction du Calife, le Sultanat de [Root.GetName] trouvera du soutien parmi les fidèles de ses citoyens."
 west_african.1.a:0 "Voyageons vers cette terre lointaine et cherchons leur soutien !"
 west_african.1.b:0 "Nous n'avons pas besoin de leur approbation pour régner !"
 west_african.2.t:0 "Un Sultan en [From.GetName]"
 west_african.2.d:0 "Un émissaire est arrivé des terres de [From.GetName], cherchant le soutien de [Root.Monarch.GetName] en sa qualité de Calife pour la création d'un nouveau sultanat. Autrefois un ensemble de tribus disparates, nous sommes informés que le peuple [From.GetAdjective] est maintenant de pieux musulmans et dévoué à leur dirigeant, [From.Monarch.GetName], qui souhaite saisir le titre de Sultan avec notre soutien."
 west_african.2.a:0 "Un noble objectif. La fondation d'un nouveau sultanat est une bénédiction pour nous également."
 west_african.2.b:0 "Si vous souhaitez être Sultan, vous devez convaincre le peuple vous-même."
 west_african.3.t:0 "Le Calife Approuve le Sultanat"
 west_african.3.d:0 "L'émissaire est revenu d'Istanbul, apportant la nouvelle que le chef du monde musulman a décrété que [Root.Monarch.GetName] est maintenant le Sultan de [Root.GetName]. Ce qui aurait autrement pu se transformer en une lutte violente pour le pouvoir et un bouleversement politique verra maintenant le soutien de la plupart, peut-être de tous, les sages et les fidèles parmi le peuple [Root.GetAdjective]."
 west_african.3.a:0 "Seuls les incroyants nous opposeront maintenant."
 west_african.4.t:0 "Le Calife Désapprouve le Sultanat"
 west_african.4.d:0 "L'émissaire est revenu d'Istanbul, mais malgré nos meilleurs efforts, le Calife ne nous a pas accordé le titre. Selon lui, c'est à nous de convaincre le peuple de la capacité de [Root.Monarch.GetName] à régner en tant que Sultan."
 west_african.4.a:0 "Un Calife montrant un jugement si pauvre est à peine digne du titre."
 west_african.5.t:0 "Peuple du Désert"
 west_african.5.d:0 "Le peuple [Root.Owner.GetAdjective] a vécu dans ce climat aride pendant longtemps. Bien que cela amène certaines nations insensées à nous rejeter comme habitant une terre que personne d'autre ne veut, nous avons maîtrisé des compétences de survie et de combat qu'ils feraient bien de craindre.\n\nJuste de l'autre côté de la frontière à [Root.GetName], nos frères souffrent de l'oppression d'autres peuples, des peuples qui pourraient ne pas être préparés à ce dont les [Root.Culture.GetName] sont capables quand on les sous-estime. Avec l'aide de ces locaux, nous pourrions organiser un raid dans les terres de leurs oppresseurs, frappant rapidement et profitant du fait que nous connaissons le désert là-bas mieux que quiconque."
 west_african.5.a:0 "Nous arriverons et nous retirerons comme une tempête de sable."
 west_african.5.b:0 "Nous n'agresserons pas nos voisins de cette façon, peu importe qui sont leurs sujets."
 west_african.6.t:0 "Pillards du Désert"
 west_african.6.d:0 "Certaines personnes de l'élite [Root.Culture.GetName] ont récemment été attaquées par ce qu'ils croient être un raid organisé par une armée étrangère. Initialement, l'attaque semblait s'être produite trop profondément dans nos frontières pour que cela soit possible, mais une explication de comment cela a pu se produire a commencé à prendre forme. Les [From.Culture.GetName] dans l'une de nos provinces frontalières, que nous pensions être nos loyaux sujets, semblent avoir conspiré avec nos voisins pour organiser l'attaque.\n\nBien qu'il ne soit peut-être pas possible de riposter de la même manière, il y a d'autres façons de montrer ce que nous pensons de telles tactiques lâches."
 west_african.6.a:0 "Tôt ou tard, ils paieront."
 west_african.7.t:0 "Une Frontière Plus Sûre"
 west_african.7.d:0 "Beaucoup de temps a passé, mais nous n'avons pas oublié comment [Root.GetName] a autrefois servi de point d'entrée pour une attaque audacieuse pour piller notre pays. Beaucoup de gens croient que cette menace reste réelle, et exigent que le [Root.Owner.Monarch.GetTitle] agisse en conséquence, renforçant notre contrôle de la frontière et s'assurant que les pillards du désert ne soient plus jamais autorisés à la traverser."
 west_african.7.a:0 "Nous enverrons immédiatement les troupes nécessaires."
 west_african.7.b:0 "Le [Root.Owner.Monarch.GetTitle] voyagera pour patrouiller la frontière en personne !"
 west_african.7.c:0 "Une initiative locale peut sûrement être organisée."
 west_african.8.t:0 "Terres Désolées pour Certains"
 west_african.8.d:0 "Le peuple [Root.Culture.GetName] a toujours été ingénieux et adaptable au-delà de ce que d'autres considéreraient possible, et des terres que d'autres pourraient trouver impossibles à habiter ou même à traverser sont nos foyers, nos routes et notre domaine. Nous pourrions en faire bon usage, y compris dans les efforts commerciaux de notre pays. L'une de nos principales routes commerciales est en fait juste à côté d'une telle zone, et il y a eu des discussions sur la meilleure façon d'en tirer parti."
 west_african.8.a:0 "Nous pouvons envoyer nos caravanes sur des routes que nous seuls connaissons."
 west_african.8.b:0 "Elle peut être utilisée comme base pour organiser une attaque sur la route commerciale."
 west_african.9.t:0 "Idolâtrie ou Révérence ?"
 west_african.9.d:0 "Nos efforts pour apporter le salut aux païens de [Root.GetName] ont porté leurs fruits, mais c'est un fruit étrange et peu familier. La population locale a commencé à accepter le Christ, mais la foi a été entrelacée avec leurs anciennes voies. Anges et esprits, le vrai Seigneur et l'ancien Seigneur du Ciel, la Sainte Vierge et la Déesse de la Terre... ces gens croient-ils vraiment à ce qu'ils entendent, ou appellent-ils simplement leurs anciennes idoles par des noms différents ? Le missionnaire local est venu nous demander conseil, préoccupé par les âmes du peuple [Root.Owner.GetAdjective], et la sienne."
 west_african.9.a:0 "Leur foi est pure, et nous serions des imbéciles de la rejeter."
 west_african.9.b:0 "C'est pire que l'hérésie. Cela doit être éradiqué."
 west_african.10.t:0 "Dieu du Ciel"
 west_african.10.d:0 "Nous avons confiance dans les esprits, dans les dieux qui ont toujours été avec nous, et notre peuple est rarement impressionné par les mensonges de ceux qui nous éloigneraient d'eux. Cependant, certaines personnes à notre frontière qui sont entrées en contact avec ceux qui adorent celui qu'ils prétendent revenu d'entre les morts semblent avoir vu des similitudes entre leur foi et la nôtre. Tout comme beaucoup ici choisissent d'adorer le Père Céleste, nos voisins parlent de celui qu'ils appellent Christ comme ayant lui-même un Père Céleste. Beaucoup ont commencé à suggérer que ces deux pourraient être un et même, et que l'animosité entre nos fois n'est rien qu'un malentendu."
 west_african.10.a:0 "Ce n'est qu'un autre mensonge qu'ils répandent pour nous imposer leur foi."
 west_african.10.b:0 "Nous avons des noms différents pour beaucoup d'autres choses, alors pourquoi pas des dieux ?"
 west_african.11.t:0 "Tradition ou Haram ?"
 west_african.11.d:0 "Apporter la parole du Prophète au peuple de [Root.GetName] n'a pas été impossible, mais le résultat jusqu'ici a troublé certains de nos érudits religieux. Bien qu'ils aient abandonné de nombreuses traditions païennes, une révérence pour les ancêtres demeure avec des sous-entendus troublants d'adoration. Nous ne voyons pas de faute à honorer sa famille, mais quand les prières sont adressées aux morts et non à Dieu, quelque chose de bon peut-il vraiment en résulter ? Néanmoins, ce sont des pratiques anciennes. Les rejeter pourrait aliéner beaucoup de ceux qui seraient autrement à l'écoute."
 west_african.11.a:0 "Nous respecterons leurs pratiques comme égales aux nôtres."
 west_african.11.b:0 "Il n'y a de Dieu que Dieu. S'ils ne l'apprennent pas, nous n'avons rien accompli."
 west_african.12.t:0 "Beaucoup d'Esprits, Un Dieu"
 west_african.12.d:0 "Nous connaissons la foi musulmane depuis longtemps, mais avons choisi de rester fidèles à nos traditions. Ceux qui se consacrent uniquement au créateur distant, délaissant les dieux et les esprits qui habitent parmi nous, sont certainement sur le chemin du malheur.\n\nLes gens à la frontière, qui vivent aux côtés des musulmans chaque jour, ont commencé à voir les choses différemment. Ils trouvent que les paroles de Mahomet leur parlent aussi bien qu'à leurs voisins et plutôt que de voir cela comme une trahison des anciennes voies, ils identifient le Dieu du prophète avec notre divinité céleste la plus révérée."
 west_african.12.a:0 "Vos ancêtres sont oubliés pendant que vous priez le ciel. C'est inacceptable."
 west_african.12.b:0 "Peut-être que si nous acceptons leur Dieu unique, ils considéreront nos nombreux."
 west_african.13.t:0 "Pas de Compromis dans la Foi"
 west_african.13.d:0 "Bien que beaucoup de nos citoyens ne soient pas encore adeptes de la foi [Root.Religion.GetName], nous sommes restés pleins d'espoir et patients. D'autres ne sont pas si patients. Beaucoup de nos citoyens considèrent absurde que le [Root.Monarch.GetTitle], régnant par la grâce de Dieu, accepte le paganisme répandu dans notre pays. Cela, à son tour, a suscité l'inquiétude parmi ces mêmes païens qu'ils sont sujets d'un système de croyances imposé de l'extérieur, certains d'entre eux appelant au renversement du [Root.Monarch.GetTitle] s'il ne montre pas de révérence pour les pratiques spirituelles qui ont vécu avec le peuple ici pendant des millénaires."
 west_african.13.a:0 "Les croyants ont raison. Nous ne tolérerons pas cette impiété."
 west_african.13.b:0 "Les animistes, bien qu'égarés, doivent être respectés en tant que citoyens."
 west_african.13.c:0 "Laissons-les résoudre l'affaire entre eux."
 west_african.13.e:0 "Il y a encore du temps pour la réconciliation."
 west_african.14.t:0 "Érudits [Root.Religion.GetName]"
 west_african.14.d:0 "Bien que coupés de beaucoup de notre foi, nous n'avons pas abandonné l'érudition islamique. $THEOLOGIAN$ n'est qu'un parmi beaucoup qui ont écrit de grandes œuvres sur le sujet, leur travail inspirant d'innombrables autres. Grâce à notre dévouement à la foi [Root.Religion.GetName], les œuvres théologiques de [Root.Capital.GetCapitalName] en ont fait une cité célèbre."
 west_african.14.a:0 "Elle restera un phare de sagesse à travers les âges."
 west_african.15.t:0 "La Flore de [Root.GetName]"
 west_african.15.d:0 "Les érudits et scientifiques parmi les [Root.GetAdjective] se sont distingués par une innovation et une curiosité extraordinaires. Leurs derniers efforts se sont concentrés sur la collecte d'informations sur la vie végétale des grandes zones de jungle de notre pays, espérant obtenir des informations utiles pour aider à la recherche en médecine et en techniques de teinture. Cela a été un succès jusqu'ici, le projet de botanique ayant des répercussions dans d'autres domaines de recherche."
 west_african.15.a:0 "Et beaucoup reste encore à découvrir."
 west_african.16.t:0 "Les Armes de nos Voisins"
 west_african.16.d:0 "Bien que nous ne doutions pas de la force et de la ténacité de nos guerriers [Root.GetAdjective], les avancées technologiques des armées voisines ne sont pas passées inaperçues. L'adoption des armes à feu change considérablement la guerre, et nous pouvons voir des avantages clairs dans cela.\n\nNos voisins sont peu susceptibles de nous fournir tous les détails techniques pour équiper pleinement notre armée, mais ils semblent disposés à nous vendre certaines de leurs armes. Bien que cela leur donnerait probablement un avantage en termes de nos échanges commerciaux, cela serait sans aucun doute utile à nos efforts militaires."
 west_african.16.a:0 "Nous devons acquérir cet équipement à tout prix."
 west_african.16.b:0 "Notre armée remplit son rôle, avec ou sans ces armes."
 west_african.17.t:0 "Traite Transatlantique des Esclaves"
 west_african.17.d:0 "[Root.GetName] est loin d'être le seul pays à garder des esclaves, c'est un sort commun pour les captifs de guerre dans la région. Nos voisins cannoriens semblent particulièrement intéressés par cela dernièrement, ayant apparemment désespérément besoin de serviteurs pour travailler les nouvelles terres qu'ils ont saisies de l'autre côté de l'océan. À cette fin, ils tentent maintenant d'organiser un accord commercial à long terme avec nous qui facilitera cet achat d'esclaves.\n\nBien que nous puissions gagner de l'argent avec cela, les implications ont été une source de préoccupation. Ils considèrent apparemment notre peuple, ou du moins nos captifs, comme appropriés pour être leurs esclaves et les traitent avec une brutalité sans bornes. Nous ne souhaitons pas encourager cette notion, mais on ne sait pas ce qu'ils pourraient finir par faire si nous refusons."
 west_african.17.a:0 "Aucun ne sera vendu à ces gens si nous pouvons l'empêcher."
 west_african.17.b:0 "S'ils peuvent payer, nous pouvons fournir."
 west_african.17.c:0 "Il est temps de mettre fin à la pratique de l'esclavage, pour nous comme pour eux."
 west_african.18.t:0 "Autrefois Nomades"
 west_african.18.d:0 "Le peuple [Root.Culture.GetName] de [Root.GetName] a traditionnellement vécu, au moins en partie, une vie nomade. Bien que nos efforts de centralisation aient rendu cela moins faisable, les gens y sont habitués et s'attendent à ce que nous n'intervenions pas. Cela rend cependant [Root.Owner.GetName] plus difficile à gérer. Certains conseillers du [Root.Owner.Monarch.GetTitle] ont suggéré que nous essayions de prendre le contrôle et de restreindre leurs mouvements, mais cela pourrait être perçu comme piétiner le mode de vie qui les a rendus prospères en premier lieu."
 west_african.18.a:0 "Laissons-les vivre comme ils l'ont toujours fait."
 west_african.18.b:0 "[Root.GetName] est déjà assez indisciplinée comme ça."
 west_african.19.t:0 "Les Ashantis"
 west_african.19.d:0 "Le peuple Akan de Kumasi et de la région environnante y vit depuis longtemps maintenant, bien que nous ne les ayons pas considérés comme une nation à part entière. Cependant, leur tribu est d'une telle importance pour nos affaires actuelles que nous devons mener du commerce et de la diplomatie avec eux. Bien que la nature de l'État Akan puisse encore changer, nous ne pouvons pas remettre en question son existence."
 west_african.19.a:0 "Qui sait, un jour ils pourraient devenir assez forts pour former un empire."
 west_african.20.t:0 "Sika 'dwa : Le Tabouret d'Or"
 west_african.20.d:1 "Les Ashantis ont été voisins de l'une de nos colonies depuis un certain temps, jusqu'ici sans incident diplomatique majeur. Tout cela a changé récemment, quand notre gouverneur $COLONIAL_GOVERNOR$, notre représentant sur la Côte de l'Or, a entendu parler du Tabouret d'Or. Cet ancien artefact mystérieux a apparemment une grande importance pour les Ashantis, pour qui c'est le siège du roi. Bien que nous ayons été vaguement au courant de son existence auparavant, il est récemment venu à la connaissance de $COLONIAL_GOVERNOR$, qui exige de s'asseoir dessus comme démonstration de son, et par extension notre, pouvoir suprême dans la région.\n\n« Pourquoi ne suis-je pas assis sur le Tabouret d'Or en ce moment ? » a-t-il demandé aux Ashantis, qui n'ont jusqu'ici montré aucun signe de se conformer. En fait, ils semblent très insultés par la seule suggestion. Jusqu'où devrions-nous être prêts à poursuivre cela ?"
 west_african.20.a:0 "Aussi loin qu'il le faudra !"
 west_african.20.a.tt:0 "Les Ashantis pourraient ne pas apprécier cela."
 west_african.20.b:0 "Nous n'avons que faire d'un homme qui exige de tels moyens pour affirmer sa domination."
 west_african.21.t:0 "Guerre du Tabouret d'Or"
 west_african.21.d:0 "Le Tabouret d'Or est le symbole du roi Ashanti, que personne n'est autorisé à violer. Maintenant, les [From.GetAdjective], en qui nous avions confiance pour avoir un certain respect de nos traditions malgré leur désintérêt pour elles, ont envoyé un gouverneur ici qui exige de s'asseoir sur le Tabouret comme s'il était roi lui-même. Cela a outragé la Reine Mère et beaucoup d'autres, qui soutiennent que cet homme doit être arrêté et la sainteté du Tabouret d'Or préservée, au prix de la guerre si nécessaire."
 west_african.21.a:0 "Si [From.GetName] fait confiance à un tel imbécile pour les représenter, il ne peut y avoir que la guerre."
 west_african.21.b:0 "Les traditions ne valent pas la peine de commencer une guerre."
 west_african.22.t:0 "Autonomie pour les [Root.Culture.GetName]"
 west_african.22.d:0 "Les [Root.Owner.Culture.GetName] dirigent [Root.Owner.GetName] justement, croyons-nous. [Root.Owner.Monarch.GetName] a été juste envers les différentes tribus sous notre règne, mais pour certains de ses sujets, ce n'est pas suffisant. Le peuple [Root.Culture.GetName] a envoyé un représentant de [Root.GetName], demandant de plus grands droits pour prendre des décisions concernant leurs propres tribus s'ils doivent rester sous le règne du [Root.Owner.Monarch.GetTitle]. Bien que ce soit apparemment une humble requête, la nouvelle du mécontentement dans leurs provinces natales la fait ressembler davantage à une exigence."
 west_african.22.a:0 "Les tribus sont le mieux gouvernées quand elles se gouvernent elles-mêmes."
 west_african.22.b:0 "Nous ne cédons pas aux exigences, même voilées."
 west_african.23.t:0 "Raids à Travers la Jungle"
 west_african.23.d:0 "Depuis notre adoption de la cavalerie, les guerriers montés de [Root.GetName] sont craints de tous pour leur capacité étrange à attaquer rapidement profondément en territoire ennemi, pillant et affaiblissant les défenses. Un groupe de soldats a préparé un plan pour aider la guerre en cours basé sur cette tactique, se préparant à se détacher de l'armée principale et à effectuer l'attaque en secret, avant que l'ennemi ne puisse réagir. Bien que ce soit un plan risqué, il pourrait rapporter des fonds très nécessaires pour la guerre."
 west_african.23.a:0 "Nous avons besoin de plus de plans comme ceux-ci !"
 west_african.23.b:0 "Amenez-moi ceux qui ont planifié cela et laissez-les aider nos plus grands projets à la place."
 west_african.24.t:0 "Vers l'Inconnu"
 west_african.24.d:0 "Le territoire inexploré à l'intérieur et au-delà des jungles à notre frontière peut sembler menaçant pour beaucoup d'autres peuples. Mais notre tribu a vécu dans des terres comme celles-ci pendant longtemps, et n'aurait jamais prospéré si nous avions eu peur d'explorer l'inconnu. Maintenant, un grand groupe de jeunes chasseurs demande la permission du [Root.Monarch.GetTitle] d'explorer et de s'installer dans n'importe quel endroit qu'ils pourraient découvrir. Certainement, ce sont des gens capables qui pourraient accomplir beaucoup s'ils ne perdaient pas de temps avec des rêves d'endroits pas encore connus, mais qui sommes-nous pour mettre fin à la curiosité juvénile ?"
 west_african.24.a:0 "Allez et revendiquez ce que vous trouverez pour [Root.GetName] !"
 west_african.24.b:0 "Nous sommes le [Root.Monarch.GetTitle] et on a besoin d'eux ici."
 west_african.25.t:0 "Nouvelles Teintures"
 west_african.25.d:0 "Nos recherches sur la vie végétale de [Root.GetName] continuent de mener à de nouvelles découvertes. Nous avons récemment découvert une nouvelle façon de créer des teintures, qui est à la fois efficace et produit des couleurs impressionnantes qu'on ne trouve nulle part ailleurs que nous sachions. Puisque les teintures sont l'une des importantes exportations [Root.GetAdjective], nous veillerons à ce que ces techniques précieuses soient répandues rapidement à travers notre pays."
 west_african.25.a:0 "Nous mourons d'envie de les essayer !"
 west_african.26.t:0 "Les Esprits Demeurent"
 west_african.26.d:0 "Beaucoup de religions étrangères ont tenté de s'enraciner parmi nous et beaucoup de missionnaires ont essayé de nous tourner vers un Dieu, toujours le Dieu unique, toujours le même, toujours différent, toujours le leur. Mais malgré les temps difficiles que nous avons traversés, nous continuons à honorer les esprits et nos ancêtres. Maintenant les anciens nous ont dit que le moment est venu pour une plus grande célébration de ces rites anciens et que les gens à travers [Root.GetName] devraient être encouragés à participer.\n\nAvec les gens mêmes qui voudraient nous convertir juste de l'autre côté de la frontière, ce genre d'événement national attirerait probablement une certaine irritation de ceux qui se considèrent au-dessus de cela. Nos diplomates suggèrent de le maintenir à une échelle plus réduite, afin de ne pas offenser nos voisins."
 west_african.26.a:0 "Nos ancêtres ne se sont pas recroquevillés de honte, et nous non plus !"
 west_african.26.b:0 "Nous ne pouvons pas nous permettre d'irriter ceux qui ont oublié la vérité."
 west_african.27.t:0 "[Root.Monarch.GetTitle] Immortel"
 west_african.27.d:0 "[Root.GetName] est un pays avec de nombreux artisans et artisans qualifiés. Le [Root.Monarch.GetTitle] est souvent censé commander une œuvre d'art pour commémorer son prédécesseur, une tradition qui aide à la fois à se souvenir de nos ancêtres et à démontrer la richesse et l'influence du dirigeant actuel.\n\nBeaucoup de matériaux sont disponibles, le bronze étant le choix traditionnel. Nous devrions choisir quelque chose de convenable à la fois pour la grandeur du précédent [Root.Monarch.GetTitle] et abordable pour [Root.Monarch.GetName]."
 west_african.27.a:0 "Nos sculpteurs peuvent faire des miracles avec la terre cuite."
 west_african.27.b:0 "Le travail du bronze convient pour le [Root.Monarch.GetTitle]."
 west_african.27.c:0 "Si nous pouvons obtenir l'ivoire nécessaire, ce pourrait être une œuvre pour les âges."
 west_african.27.e:0 "Rien de moins que l'or ne fera l'affaire."
 west_african.27.f:0 "Nous ne pouvons pas nous permettre de telles frivolités."
 west_african.28.t:0 "Les Fusils des [Root.Culture.GetName]"
 west_african.28.d:0 "Bien que nos efforts pour adopter certaines technologies de Cannor aient été quelque peu entravés par la guerre en cours, appliquer nos nouvelles armes sur le terrain a eu un impact positif. Nos soldats se sont avérés très capables avec les armes à feu, et les gens dans l'armée qui étaient sceptiques quant à nos efforts sont maintenant beaucoup plus positifs. Bien que nous soyons loin d'équiper entièrement nos soldats de fusils, nous avons fait des pas significatifs dans cette direction."
 west_african.28.a:0 "Les guerriers [Root.GetAdjective] sont déjà craints aujourd'hui. Ils seront inarrêtables demain."
 GEO_ideas:0 "Idées Géorgiennes"
 GEO_ideas_start:0 "Traditions Géorgiennes"
 GEO_ideas_bonus:0 "Ambition Géorgienne"
 bagrationi_dynasty:0 "Dynastie Bagration"
 bagrationi_dynasty_desc:0 "Une dynastie si ancienne que ses origines sont enveloppées de mystère, les rois et reines de la maison Bagration ont gouverné la Géorgie depuis le IXe siècle, d'abord comme ses princes puis comme monarques."
 georgian_isolation:0 "Isolement Géorgien"
 georgian_isolation_desc:0 "Entourés de pays puissants de religion et de culture différentes, nous sommes forcés d'utiliser une diplomatie opportuniste et de changer souvent d'allégeances afin d'apaiser tout le monde et de préserver la paix aussi longtemps que possible."
 restoration_of_fortresses_and_churches:0 "Restauration des Forteresses et des Églises"
 restoration_of_fortresses_and_churches_desc:0 "Pour restaurer le royaume des invasions dévastatrices des derniers siècles, nous devons reconstruire les grandes forteresses et églises afin que nos villes et villages puissent à nouveau prospérer. Une taxe spéciale a été imposée pour financer ces efforts."
 georgian_protectorates:0 "Protectorats Géorgiens"
 georgian_protectorates_desc:0 "Avant l'arrivée des Mongols, à son âge d'or, la Géorgie exerçait son pouvoir sur un certain nombre d'États clients. Entourés de peuples de cultures et de religions différentes, nous pourrions trouver plus facile de nous étendre si nous cherchons à créer des États dépendants, plutôt que d'incorporer de nouvelles terres directement dans notre royaume."
 samouravo_counties:0 "Réforme des Samouravo"
 samouravo_counties_desc:0 "Grâce à une réforme administrative divisant les grands saeristavo autonomes (duchés) en samouravo plus petits et plus faciles à contrôler (comtés), notre royaume deviendra plus facile à gouverner, plus stable et plus loyal à la couronne."
 sadrosho_districts:0 "Districts Sadrosho"
 sadrosho_districts_desc:0 "Les Sadrosho (bannières) sont des districts militaires spéciaux utilisés à des fins de mobilisation. Les nobles séculiers se sont avérés indisciplinés et peu fiables à leur tête, nous confierons donc le pouvoir sur eux à des nobles ecclésiastiques comme nos évêques locaux."
 georgian_embassies:0 "Ambassades Géorgiennes"
 georgian_embassies_desc:0 "Entourés de pays qui cherchent notre destruction, nous essayons de trouver des alliés qui nous aideraient à unifier et à préserver notre royaume. Des ambassadeurs ont été dépêchés auprès des plus grands monarques de Cannor pour demander leur soutien."
 sumatran_ideas:0 "Idées Sumatraises"
 reliance_on_trade:0 "Dépendance au Commerce"
 reliance_on_trade_desc:0 "Le commerce a toujours été la principale ressource de notre immense richesse. En tant que tel, nous nous sommes spécialisés pendant des générations dans l'affinement de nos compétences de négociation, apprenant à tirer le meilleur parti de nos relations avec les autres."
 porch_of_mecca:0 "Porche de La Mecque"
 porch_of_mecca_desc:0 "Les villes sumatraises ont été les premières en Asie du Sud-Est à embrasser l'Islam. Nous n'avons pas seulement accueilli des voyageurs musulmans du monde entier, mais avons également propagé la foi par le travail missionnaire au nom du Prophète. Nous sommes le pilier indonésien de l'Islam !"
 spice_pirates:0 "Pirates des Épices"
 spice_pirates_desc:0 "Depuis qu'il y a du commerce dans le détroit de Malacca, il y a eu des pirates. Peut-être devrions-nous conclure un accord avec les chefs pirates chevronnés et transformer leur présence en quelque chose de bénéfique ?"
 center_of_scholarship:0 "Centre d'Érudition"
 center_of_scholarship_desc:0 "Pendant des siècles, les magnifiques cités de Sumatra ont été un lieu d'apprentissage savant et de connaissance. Attirant vers elles les meilleurs et les plus brillants d'abord du monde bouddhiste et maintenant du monde musulman, il n'y a pas d'égal à nos esprits académiques !"
 merchants_of_the_indian_ocean:0 "Marchands de l'Océan Indien"
 merchants_of_the_indian_ocean_desc:0 "Voyageant loin et large, nos marchands voyagent vers les endroits les plus exotiques du monde ; du Maghreb à l'ouest à la Chine à l'est, et bien au-delà ! Les richesses abondantes du commerce des épices attirent de nombreux nouveaux corps capables vers le métier de marchand."
 legacy_of_srivijaya:0 "Héritage de Srivijaya"
 legacy_of_srivijaya_desc:0 "Srivijaya était un État sumatrain dominant qui a influencé la majeure partie de l'Asie du Sud-Est. Ils ont exercé une forte hégémonie dans la région pendant plusieurs siècles, s'étendant par le commerce et la pure force militaire. Et nous sommes leurs fiers héritiers ! Réjouissez-vous !"
 rule_of_the_sea:0 "Domination de la Mer"
 rule_of_the_sea_desc:0 "Les fiers empires sumatrais ont toujours eu de fortes traditions thalassocratiques. Nous devons assurer la domination continue des mers à la fois pour protéger notre commerce ainsi que nos cités !"
 sumatran_ideas_start:0 "Traditions Sumatraises"
 sumatran_ideas_bonus:0 "Ambition Sumatraise"
 AFG_ideas:0 "Idées Afghanes"
 AFG_ideas_start:0 "Traditions Afghanes"
 AFG_ideas_bonus:0 "Ambition Afghane"
 pashtunwali:0 "Pachtoune Wali"
 pashtunwali_desc:0 "Pendant des siècles, notre peuple a suivi les principes du Pachtoune Wali. Ce code d'éthique exige que toute insulte soit rencontrée par la vengeance. Nous ne reculerons devant rien pour obtenir vengeance pour nos fils perdus."
 shadows_of_the_hindu_kush:0 "Les Ombres de l'Hindu Kush"
 shadows_of_the_hindu_kush_desc:0 "Tous les Pachtounes sont nés dans les ombres de la grande chaîne de montagnes connue sous le nom d'Hindu Kush, et les montagnes seront notre forteresse contre tout intrus."
 tureh:0 "Tureh"
 tureh_desc:0 "Un principe central du Pachtoune Wali. Un guerrier doit être brave et affronter toute menace contre sa famille, sa terre ou son honneur. Ainsi, nous ne trouverons pas de pénurie d'hommes prêts à combattre pour leur terre."
 afghan_diaspora:0 "Diaspora Afghane"
 afghan_diaspora_desc:0 "Avant la montée des Moghols, beaucoup d'Afghans ont migré vers le nord de l'Inde, où ils ont réussi à dominer l'aristocratie locale. Même quand l'Afghanistan était sous contrôle Safavide et Moghol, le pays servait de terrain de recrutement pour des soldats et des conseillers. Cela a fourni à l'Afghanistan une influence significative dans les cours étrangères."
 durrani_imperialism:0 "Impérialisme Durrani"
 durrani_imperialism_desc:0 "Après l'indépendance de l'Afghanistan de la Perse, beaucoup de cavaliers afghans sont rentrés chez eux pour servir leur roi connu sous le nom de Durr-i-Durrani ou perle des perles. Commençant comme de simples pillards, ces forces de cavalerie sont bientôt devenues la base de la formation du plus grand empire jamais gouverné depuis Kaboul."
 institutionalized_loya_jirga:0 "Loya Jirga Institutionnalisée"
 institutionalized_loya_jirga_desc:0 "Le grand conseil tribal connu sous le nom de Loya Jirga était traditionnellement assemblé pour traiter des événements majeurs tels que le couronnement d'un nouveau roi. Le rôle de la Loya Jirga sera maintenant institutionnalisé afin que personne ne puisse remettre en question notre droit de régner."
 graveyard_of_empires:0 "Cimetière des Empires"
 graveyard_of_empires_desc:0 "Aucune force extérieure n'occupera nos terres. Que ces soi-disant empires fassent de leur mieux, ils seront tous jugés insuffisants."
 WAL_ideas:0 "Idées Valaques"
 WAL_ideas_start:0 "Traditions Valaques"
 WAL_ideas_bonus:0 "Ambition Valaque"
 cunning_diplomacy:0 "Diplomatie Rusée"
 cunning_diplomacy_desc:0 "Confrontés à des ennemis supérieurs des deux côtés, les dirigeants valaques ont développé un don pour changer d'alliances quand c'était prudent. Plusieurs ont assuré leur trône avec le soutien ottoman et sont ensuite allés former des alliances avec la Hongrie ou l'Empereur Anbennarien."
 foreign_trade_restrictions:0 "Restrictions du Commerce Étranger"
 foreign_trade_restrictions_desc:0 "Pendant le règne de Vlad l'Empaleur, le commerce étranger était limité à trois villes afin d'aider les marchands valaques."
 mercenary_guard:0 "Garde Mercenaire"
 mercenary_guard_desc:0 "Afin de sécuriser le pouvoir du trône contre les prétendants rivaux, Vlad l'Empaleur a institué une garde mercenaire permanente sans lien avec la politique de pouvoir locale."
 w_foreign_advisors:0 "Conseillers Étrangers"
 w_foreign_advisors_desc:0 "À partir de Vlad l'Empaleur, les positions à la cour étaient souvent données à des étrangers sans terre en Valachie. Cela a réduit la dépendance à l'aristocratie locale."
 legacy_of_the_impaler:0 "Héritage de l'Empaleur"
 legacy_of_the_impaler_desc:0 "Au moment de sa mort, Vlad l'Empaleur était connu dans toute l'Europe comme un tyran prenant un plaisir sadique à torturer et tuer. Bien que son héritage ait peut-être été immérité, être craint a ses mérites, et les ennemis de la Valachie trembleront quand ils verront nos armées approcher."
 boyar_regime:0 "Régime Boyarde"
 boyar_regime_desc:0 "Le Traité d'Alba Iulia a cimenté le pouvoir de la noblesse valaque. Un conseil de 12 grands boyards devait participer aux côtés du voïvode au gouvernement exécutif du pays."
 abolition_of_serfdom:0 "Abolition du Servage"
 abolition_of_serfdom_desc:0 "En 1746, le servage a été aboli en Valachie, réduisant considérablement le nombre de serfs fuyant vers la Transylvanie."
 CANNOT_JOIN_LEAGUE_AT_LEAGUE_WAR:0 "§R- Nous ne pouvons pas rejoindre ou quitter une Ligue pendant qu'une Guerre des Ligues fait rage.§!"
 CANNOT_JOIN_LEAGUE_AT_WAR:0 "§R- Nous ne pouvons pas rejoindre ou quitter une Ligue pendant que nous sommes en guerre.§!"
 CANNOT_JOIN_LEAGUE_TRUCE_WITH_EMPEROR:0 "§R- Nous ne pouvons pas rejoindre cette Ligue tant que nous avons une trêve avec l'Empereur.§!"
 EMPEROR_CANNOT_JOIN_LEAGUE:0 "§R- L'Empereur ne peut pas rejoindre ou quitter une Ligue.§!"
 NOT_DISCOVERED_HRE:0 "§R- Nous n'avons pas découvert l'Empire d'Anbennar !§!"
 HRE_ON_OTHER_CONTINENT:0 "§R- Nous ne pouvons pas rejoindre une Ligue si notre capitale est sur un continent différent de celui de l'Empire d'Anbennar.§!"
 ALREADY_MEMBER_OF_LEAGUE:0 "§R- Nous sommes déjà membre d'une Ligue Religieuse !§!"
 RECENTLY_JOINED_LEAGUE:0 "§R- Vous avez récemment rejoint une Ligue et ne pourrez pas partir avant le §Y$DATE$§!."
 manchu_nation_1_title:1 "Adopter l'Identité Mandchoue"
 manchu_nation_1_desc:0 "Avec les trois capitales des anciennes tribus Jurchen fermement entre nos mains, il est maintenant temps de proclamer l'unification de notre peuple par l'adoption d'une nouvelle identité : Mandchou."
 cb_sengoku:0 "Sengoku"
 cb_sengoku_desc:0 "Nous devrions étendre notre influence dans le Shogunat en saisissant des terres d'un clan voisin."
 british_nation_diplomatically_title:0 "Former la Nation Britannique Diplomatiquement"
 british_nation_diplomatically_desc:0 "En unifiant notre développement politique sur le plan intérieur et en étendant notre influence au-delà de nos frontières, nous serons en mesure de renforcer notre position dans les affaires mondiales et de nous transformer en l'une des principales puissances cannoriennes, l'Empire Britannique."
 canal_events.25.t:0 "Canal de Kiel Terminé"
 canal_events.25.d:0 "Par ce qui a été considéré comme un effort de construction sans précédent dans la région, la construction du Canal de Kiel reliant la Mer du Nord à la Baltique a été achevée à [Root.GetName]. Notre flotte peut maintenant se déplacer entre ces zones clés plus rapidement et plus sûrement, nous donnant l'opportunité de manœuvres militaires uniques et de projets commerciaux."
 canal_events.25.a:0 "Il changera le cours des navires et de l'histoire !"
 canal_events.26.t:0 "Canal de Suez Terminé"
 canal_events.26.d:0 "À travers l'histoire, des tentatives ont été faites pour relier la Mer Rouge et la Méditerranée d'une certaine manière, mais aucune n'a réussi au niveau du projet de [Root.Owner.GetName]. Là où les navires devaient autrefois contourner un continent pour voyager entre l'Europe et l'Océan Indien, la barrière de terre que de nombreux capitaines ont sans doute maudite pendant des siècles a été entaillée par nos ingénieurs ingénieux. Personne ne pensait que ce serait possible avant des décennies, mais nous avons osé non seulement le penser, mais le faire."
 canal_events.27.t:0 "Canal de Panama Terminé"
 canal_events.27.d:0 "Beaucoup ont prétendu que c'était impossible. D'autres l'ont mis dans le domaine du futur lointain, ou des rêves, mais [Root.Owner.GetName] l'a mis dans le domaine de la réalité. Des idées pour relier deux océans, l'Atlantique et le Pacifique semblaient toujours les plus distantes, malgré être séparés par si peu de terre. Mais par la résilience, l'ingéniosité et les ressources considérables que nous avons investies dans le projet, il a été achevé, permettant à nos navires un passage sûr sans avoir besoin de contourner le Cap Horn. Le canal, considéré comme en avance de plusieurs siècles sur son temps, servira non seulement de passage, mais de monument au fait que rien n'est impossible pour [Root.Owner.GetName]."
 canal_events.28.t:0 "Canal en [From.Owner.GetName] Retardé"
 canal_events.28.d:0 "Notre sujet [From.Owner.GetName] nous a informés que notre construction de canal a été retardée en raison de divers facteurs hors de leur contrôle."
 canal_events.28.a:0 "Regrettable"
 canal_events.29.t:0 "Projet de Canal en [From.Owner.GetName] en Avance"
 canal_events.29.d:0 "Notre sujet [From.Owner.GetName] nous a informés que notre construction de canal progresse à un rythme plus rapide que prévu grâce à leur gestion habile du projet."
 canal_events.29.a:0 "Merveilleux !"
