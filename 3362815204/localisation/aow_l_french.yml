 TRIANGLE_TRADE:0 "Le Commerce Triangulaire"
 prices.1.t:0 "Le Commerce Triangulaire"
 prices.1.d:0 "Lorsque les nations cannoriennes ont commencé à coloniser l'Amérique du Nord et du Sud, elles ont créé de grandes plantations pour la production de Coton, de Tabac et de Sucre. D'abord elles ont essayé d'utiliser la population locale comme esclaves, mais elle a rapidement péri là où cela fut tenté. Des esclaves furent alors importés d'Afrique, ce qui créa un système de commerce triangulaire. Cannor vendait des textiles, du rhum et des produits manufacturés à l'Afrique, l'Afrique vendait des esclaves à l'Amérique, et l'Amérique vendait du coton, du sucre et du tabac à Cannor."
 prices.1.a:0 "Cela augmentera la demande d'Esclaves."
 EUROPEANS_IN_CHINA:0 "Marchands Cannoriens en Chine"
 prices.2.t:0 "Marchands Cannoriens en Chine"
 prices.2.d:0 "Avec un contingent considérable de Marchands Cannoriens en Chine, la demande de porcelaine chinoise a explosé. La porcelaine chinoise est demandée par tous en Cannor, et les Chinois n'acceptent que l'argent ou l'or comme paiement."
 prices.2.a:0 "Cela augmentera la demande de Porcelaine."
 JOHAN_FRIEDRICH_BOTTGER:0 "Production de Porcelaine en Cannor"
 prices.3.t:1 "Porcelaine à Meissen"
 prices.3.d:1 "Nos inventeurs ont passé du temps à étudier des échantillons de porcelaine que nos marchands ont rapportés de Chine. Ils prétendent avoir découvert les secrets de sa production. Les échantillons qu'ils ont présentés au [Root.Owner.Monarch.GetTitle] [Root.Owner.Monarch.GetName] sont certainement très fins, et rapporteront une richesse considérable s'ils peuvent être produits en grandes quantités. Ils demandent maintenant notre investissement pour établir une manufacture de porcelaine qui, disent-ils, nous permettra de capturer le marché germanique de la faïence."
 prices.3.a:1 "La porcelaine sera notre voie vers la richesse."
 Corinite_DONT_EAT_FISH:0 "Les Corinites ne Mangent pas de Poisson"
 prices.4.t:0 "Les Corinites s'Enracinent"
 prices.4.d:0 "Avec les Corinites prenant le pouvoir dans de plus en plus de pays Adéaniques, il y a moins de gens qui observent le Carême. Sans les 40 jours où tout bon Ravélien ne peut manger de viande et est forcé de manger du poisson, la demande de poisson s'effondre."
 prices.4.a:0 "Cela diminuera la demande de Poisson."
 COFFEE_BOOM:0 "Boom du Café"
 prices.5.t:0 "Boom du Café"
 prices.5.d:1 "À l'origine une boisson largement associée au monde musulman, le café est devenu de plus en plus courant même parmi les chrétiens en Cannor. Dans un monde de plus en plus interconnecté, acquérir quoi que ce soit, y compris le café, n'est plus aussi difficile qu'auparavant. En conséquence, des cafés sont de plus en plus établis en Cannor et les grains exotiques sont de plus en plus demandés."
 prices.5.a:0 "Cela augmentera le prix du café."
 COTTON_IMPORTS:0 "Importations de Coton Cannoriennes"
 COTTON_IMPORTS_BANNED:0 "Importations de Coton Interdites"
 prices.6.t:0 "Importations de Coton"
 prices.6.d:0 "Durant la Renaissance, les tissus de coton indiens sont devenus de plus en plus populaires en Cannor. Finalement, l'industrie lainière [Root.GetAdjective] a subi une pression intense et a exigé une interdiction des importations de coton."
 prices.6.a:0 "Nous ne restreindrons pas le libre-échange."
 prices.6.b:0 "Le mercantilisme est la bonne voie."
 TEA_AND_SUGAR:0 "Thé et Sucre"
 prices.7.t:0 "Du Thé et du Sucre"
 prices.7.d:0 "À l'origine une boisson chinoise, le thé est rapidement devenu la nouvelle boisson nationale [Root.GetAdjective] après son introduction en [Root.GetName]. Mélangé avec du sucre, il est consommé par les riches, les pauvres et même le [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 prices.7.a:0 "Cela augmentera la demande de thé et de sucre."
 SPICE_TRADE:0 "Commerce des Épices"
 prices.8.t:0 "Commerce des Épices"
 prices.8.d:0 "La découverte de la Route Commerciale des Indes Orientales a inauguré l'ère du Commerce des Épices. Avec de nouvelles routes commerciales disponibles, contrôler le flux d'épices comme le poivre ou la cannelle est devenu plus important que jamais."
 prices.8.a:0 "Cela augmentera le prix des épices."
 ABOLITIONISM:0 "Abolitionnisme"
 prices.9.t:0 "Abolitionnisme"
 prices.9.d:0 "Avec l'esclavage maintenant interdit en [Root.GetName] et d'autres pays susceptibles de suivre, il semble que le commerce transatlantique des esclaves connaîtra un déclin marqué."
 prices.9.a:0 "Cela diminuera la demande d'esclaves."
 HUAYNAPUTINA:0 "Éruption du Huaynaputina"
 prices.10.t:0 "Éruption du Huaynaputina"
 prices.10.d:0 "En février 1600, le volcan péruvien connu sous le nom de Huaynaputina est entré en éruption dans une explosion massive. Les effets de l'éruption ont été ressentis dans le monde entier, où la famine a tué des millions de personnes et le commerce de céréales et de vin s'est effondré."
 prices.10.a:0 "Les céréales et le vin seront moins rentables pour l'instant."
