 HRE_LEAGUE_LEADER_SCORE:1 "Pour devenir le nouveau chef de cette ligue, §Y$COUNTRY$§! aurait besoin d'un score militaire supérieur à §Y$SCORE_NEEDED$§! car le chef actuel a un score de §Y$SCORE_LEADER$§!. Le score militaire actuel de §Y$COUNTRY$§! est §Y$SCORE_CURRENT$§!. L'Effectif Maximum, la Limite de Forces et les Tactiques déterminent le score militaire. Être en Guerre le réduit dramatiquement, tandis qu'être Électeur l'augmente significativement."
