 HRE_RELIGIOUS_PEACE_DESC:0 "Un traité de paix religieuse permanente a été établi dans l'Empire. Les Princes de l'Empire sont libres de choisir leur propre confession, et l'Empereur peut être de n'importe quelle foi."
