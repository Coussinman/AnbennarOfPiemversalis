 religious_leagues.1.t:0 "L'Empereur Triomphant"
 religious_leagues.1.d:0 "La Guerre de Religion dans l'Empire s'est terminée par une victoire totale pour l'Empereur et le Parlement Impérial s'est réuni en Diète pour proclamer la Cour Régente Adéanique comme seule foi confessionnelle de l'Empire d'Anbennar. Les Électeurs qui suivent une confession différente seront dépouillés de leurs privilèges, et l'Empereur reçoit une large autorité pour imposer l'unité de la Cour Régente au sein de l'Empire."
 religious_leagues.1.a:0 "Un jour glorieux !"
 religious_leagues.2.t:0 "L'Accord Corinite est Victorieux"
 religious_leagues.2.d:0 "La Guerre de Religion dans l'Empire s'est terminée par une victoire pour l'Accord Corinite. L'Empereur a été contraint d'abdiquer et la foi Corinite est maintenant dominante dans l'Empire."
 religious_leagues.2.a:0 "Un jour sombre !"
 religious_leagues.3.t:0 "La Ligue Adéanique est Victorieuse"
 religious_leagues.3.d:0 "La Guerre de Religion dans l'Empire s'est terminée par une victoire pour la Ligue Adéanique. L'Empereur a été contraint d'abdiquer et la Cour Régente Adéanique est maintenant la foi dominante dans l'Empire."
 religious_leagues.3.a:0 "Un jour sombre !"
 religious_leagues.4.t:0 "La Paix d'Esmarie"
 religious_leagues.4.d:0 "La Guerre de Religion dans l'Empire s'est terminée de manière non concluante et les deux camps se sont réunis dans la cité de Bennon en Esmarie pour signer une paix de compromis. Selon les termes de la Paix d'Esmarie, la foi confessionnelle de chaque État sera déterminée par son dirigeant, selon le principe de « Tel prince, telle religion »."
 religious_leagues.4.a:0 "Tel prince, telle religion."
 religious_leagues.5.t:0 "Proclamation de $CAPITAL_CITY$"
 religious_leagues.5.da:0 "Suite aux tensions croissantes entre les factions Adéanique et Corinite de la Cour Régente, l'Empereur $MONARCH$ a émis la Proclamation de $CAPITAL_CITY$ qui stipule que seuls les dirigeants Adéaniques peuvent être élus empereur. Les États impériaux Corinites ont répondu en formant l'Accord Corinite, avec une armée et un trésor communs et en cherchant des liens à l'étranger. Les États Adéaniques, se sentant menacés par cette nouvelle alliance, se sont regroupés en une Ligue Adéanique. Le décor est planté pour un conflit religieux dans l'Empire."
 religious_leagues.5.db:0 "Suite aux tensions croissantes entre les factions Adéanique et Corinite de la Cour Régente, l'Empereur $MONARCH$ a émis la Proclamation de $CAPITAL_CITY$ qui stipule que seuls les dirigeants Corinites peuvent être élus empereur. Les États impériaux Adéaniques ont répondu en formant la Ligue Adéanique, avec une armée et un trésor communs et en cherchant des liens à l'étranger. Les États Corinites, se sentant menacés par cette nouvelle alliance, se sont regroupés dans l'Accord Corinite. Le décor est planté pour un conflit religieux dans l'Empire."
 religious_leagues.5.dc:0 "Les tensions montent entre les factions Adéanique et Corinite de la Cour Régente et menacent de dégénérer en guerre au sein de l'Empire. Les États impériaux Adéaniques ont formé la Ligue Adéanique, avec une armée et un trésor communs et cherchant des liens à l'étranger. Les États Corinites, se sentant menacés par cette nouvelle alliance, se sont regroupés dans l'Accord Corinite. Le décor est planté pour un conflit religieux dans l'Empire."
 religious_leagues.5.a:0 "Ces hérétiques regretteront leur audace !"
 religious_leagues.6.t:0 "La Diète de $CAPITAL_CITY$"
 religious_leagues.6.d:0 "Avec l'échec de l'Accord Corinite à défier avec succès l'Empereur, le Parlement Impérial s'est réuni en Diète pour proclamer la Cour Régente Adéanique comme seule foi confessionnelle de l'Empire d'Anbennar. Les Électeurs qui suivent une confession différente seront dépouillés de leurs privilèges, et l'Empereur reçoit une large autorité pour imposer l'unité Adéanique au sein de l'Empire."
 religious_leagues.6.a:0 "Un jour glorieux !"
 religious_leagues.7.t:0 "La Diète de $CAPITAL_CITY$"
 religious_leagues.7.d:0 "Avec l'échec de la Ligue Adéanique à défier avec succès l'Empereur, le Parlement Impérial s'est réuni en Diète pour proclamer la foi Corinite comme seule foi confessionnelle de l'Empire d'Anbennar. Les Électeurs qui suivent une confession différente seront dépouillés de leurs privilèges, et l'Empereur reçoit une large autorité pour imposer l'unité Corinite au sein de l'Empire."
 religious_leagues.7.a:0 "Un jour glorieux !"
 religious_leagues.8.t:0 "L'Empereur Triomphant"
 religious_leagues.8.d:0 "La Guerre de Religion dans l'Empire s'est terminée par une victoire totale pour l'Empereur et le Parlement Impérial s'est réuni en Diète pour proclamer la foi Corinite comme seule foi confessionnelle de l'Empire d'Anbennar. Les Électeurs qui suivent une confession différente seront dépouillés de leurs privilèges, et l'Empereur reçoit une large autorité pour imposer l'unité Corinite au sein de l'Empire."
 religious_leagues.8.a:0 "Un jour glorieux !"
 religious_leagues.9.t:0 "Le Sort des Corinites Impériaux"
 religious_leagues.9.d:0 "En tant que chef de la Ligue Adéanique victorieuse, l'empereur a le décret impérial de loi pour éliminer tout fanatique restant et propagateur de la foi Corinite au sein de l'Empire d'Anbennar par tous les moyens nécessaires s'il le désire."
 religious_leagues.9.a:0 "Ils finiront par s'arrêter. Laissons-les tranquilles pour l'instant."
 religious_leagues.9.b:0 "Ils doivent être arrêtés immédiatement."
 religious_leagues.10.t:0 "Initialisation de la Paix Religieuse"
 religious_leagues.10.d:0 "événement caché"
 religious_leagues.10.a:0 "événement caché"
 religious_leagues.12.t:0 "La Dernière Croisade"
 religious_leagues.12.d:0 "Le temps est venu de décider du sort d'Anbennar, et par extension, de Cannor."
 religious_leagues.12.a:0 "Pour Corin !"

