 cuiaba:0 "Cuiabá"
 DNZ_ideas:0 "Idées de Dantzig"
 DNZ_ideas_start:0 "Traditions de Dantzig"
 DNZ_ideas_bonus:0 "Ambition de Dantzig"
 danzig_law:0 "Loi de Dantzig"
 danzig_law_desc:0 "Avec l'établissement de la Loi de Dantzig, nous avons obtenu de nombreux privilèges importants en termes de gouvernement, de frappe de monnaie et de relations extérieures."
 vistula_river_trade:0 "Commerce de la Vistule"
 vistula_river_trade_desc:0 "Les investissements de Pologne et de l'Ordre Teutonique ont conduit à une augmentation du commerce de blé, de bois et d'autres marchandises. Cela a apporté prospérité et expérience commerciale."
 centralized_population:0 "Population Centralisée"
 centralized_population_desc:0 "La taille de notre population et de notre commerce est ce qui nous a rendus si importants pour nos alliés et ennemis. Nous devons exploiter davantage cela et augmenter encore plus la population, renforçant ainsi notre statut indépendant."
 hanseatic_league_member:0 "Membre de la Ligue Hanséatique"
 hanseatic_league_member_desc:0 "Les villes hanséatiques sont obligées de se protéger mutuellement. Étant l'un des membres les plus importants, nous en bénéficions plus que la plupart."
 danziger_shipyard:0 "Chantiers Navals de Dantzig"
 danziger_shipyard_desc:0 "L'expérience de notre statut comme l'un des plus grands constructeurs navals de la Ligue Hanséatique a grandement aidé à maximiser notre efficacité navale et à réduire nos coûts."
 continued_independence:0 "Indépendance Maintenue"
 continued_independence_desc:0 "Au fil des années, beaucoup ont essayé de nous retirer nos privilèges, mais nous avons prévalu et conservé notre indépendance. Cela n'aurait pas été possible sans notre capacité à résister à l'invasion."
 lutheran_change:0 "Changement Luthérien"
 lutheran_change_desc:0 "Avoir une grande partie de notre population convertie au Luthéranisme signifie que les gens sont plus unifiés qu'avant et que l'opportunité d'augmenter les impôts s'est présentée."
 KRA_ideas:0 "Idées de Cracovie"
 KRA_ideas_start:0 "Traditions de Cracovie"
 KRA_ideas_bonus:0 "Ambition de Cracovie"
 kra_legendary_legacy:0 "Héritage Légendaire"
 kra_legendary_legacy_desc:0 "La légende dit que notre ville est fondée sur le site de l'antre d'un dragon. Que cela soit vrai ou non, nous partageons la bravoure de notre fondateur légendaire."
 kra_seat_of_gov:0 "Siège du Gouvernement"
 kra_seat_of_gov_desc:0 "Cracovie a été un centre gouvernemental important aussi loin que remonte la mémoire. Bien que n'étant plus partie du Royaume de Pologne, nous maintenons toujours une bureaucratie et une administration très efficaces."
 kra_city_rights:0 "Droits de Cité"
 kra_city_rights_desc:0 "Bien que différents des traditions semi-républicaines des cités-États allemandes, les citoyens cracoviens jouissent d'une pléthore d'avantages sur les marchands étrangers."
 kra_cas_forts:0 "Fortifications Casimiriennes"
 kra_cas_forts_desc:0 "Le Roi Casimir a érigé certains des plus grands murs d'Europe dans notre ville, et ils furent tout ce qui nous sauva de l'invasion à de nombreuses reprises. Bien que les originaux ne tiennent plus, nous n'avons pas oublié les leçons que nous en avons tirées."
 kra_jewish_community:0 "Communautés Juives"
 kra_jewish_community_desc:0 "Contrairement à nos voisins, nous avons accueilli les Juifs cruellement opprimés d'Europe dans notre pays à bras ouverts, leur permettant même de participer à l'économie et au gouvernement municipal."
 kra_polish_athens:0 "Athènes Polonaise"
 kra_polish_athens_desc:0 "Cracovie a toujours eu un riche patrimoine culturel. Nos contributions à la culture et notre identité nationale montrent clairement que nous partageons l'esprit des anciens Athéniens."
 kra_free_city:0 "La Ville Libre"
 kra_free_city_desc:0 "Avant tout, Cracovie est une ville libre et indépendante. Rester ainsi est le seul moyen de sauvegarder nos libertés, et nous sommes déterminés à ne jamais sacrifier ces précieux idéaux."
 SIL_ideas:0 "Idées Silésiennes"
 SIL_ideas_start:0 "Traditions Silésiennes"
 SIL_ideas_bonus:0 "Ambition Silésienne"
 under_the_infuence:0 "Sous Influence"
 under_the_infuence_desc:0 "Sous l'influence constante de la Bohême, de l'Allemagne et de la Pologne, nous avons appris à utiliser la diplomatie au mieux de nos capacités."
 silesian_duchies:0 "Duchés Silésiens"
 silesian_duchies_desc:0 "Depuis la fragmentation féodale de la Pologne, la Silésie était divisée entre de nombreux duchés. La décentralisation a facilité l'administration de ces régions."
 german_settlers:0 "Colons Allemands"
 german_settlers_desc:0 "À partir du XIIe siècle, nous avons vu un afflux constant de colons allemands. Ils apportent les lois municipales allemandes et la connaissance de divers artisanats aidant à développer davantage notre pays."
 raubritter:0 "Raubritter"
 raubritter_desc:0 "Les barons brigands (Raubritter) parcouraient les routes commerciales et entravaient le commerce en imposant des péages ou tarifs non autorisés. Les contrôler aide notre influence commerciale dans la région."
 via_regia:0 "Via Regia"
 via_regia_desc:0 "La Via Regia était une route commerciale importante et bien entretenue qui traversait l'Empire d'Anbennar. La plupart du commerce intérieur en Europe centrale passait par elle."
 hanseatic_ties:0 "Liens Hanséatiques"
 hanseatic_ties_desc:0 "Avec Breslau devenant membre de la Ligue Hanséatique, nous gagnons plus de contrôle sur le commerce cannorien central."
 black_gold:0 "Or Noir"
 black_gold_desc:0 "La Silésie est riche en ressources naturelles, particulièrement le charbon. En construisant des mines, nous pouvons augmenter considérablement nos revenus."
 FEO_ideas:0 "Idées de Théodoro"
 FEO_ideas_start:0 "Traditions de Théodoro"
 FEO_ideas_bonus:0 "Ambition de Théodoro"
 principate_guard:0 "Gardes du Principat"
 principate_guard_desc:0 "Les Authentes du riche et petit Théodoro ont souvent fait usage de mercenaires dans leurs guerres contre la république de Gênes. Durant le siège de Théodoro, trois cents soldats moldaves combattaient du côté de Théodoro contre les Turcs."
 komnin_paleolog_gavras:0 "Comnènes, Paléologues et Gavras"
 komnin_paleolog_gavras_desc:0 "Marie Paléologue, la princesse de Mangup, était l'épouse du prince Étienne III de Moldavie. En 1426, sa parente et fille d'Alexis Ier, Marie de Gothie, devint la première épouse du dernier empereur de Trébizonde, David Mégas Comnène. Selon une légende, la princesse de Théodoro était de la dynastie arménienne des Gavras. Le plus célèbre représentant de la dynastie, qui devint plus tard son Saint Protecteur, était Théodore Gavras."
 aristocracy_in_moskovia:0 "Aristocratie Russe"
 aristocracy_in_moskovia_desc:0 "Vers la fin du XIVe siècle, la famille marchande des Khovrines de Théodoro arriva à Moscou. Ils devinrent rapidement l'une des familles nobles les plus puissantes et prospères de Moscou."
 avlita_port:0 "Port d'Avlita"
 avlita_port_desc:0 "Fondé en 1425 sur la rivière Chernaya, Avlita était le seul port commercial de Théodoro. Bien qu'il fût le seul port, il causa des conflits constants avec les colonies génoises au sud pour l'accès aux côtes et au commerce qui passait par les ports de Crimée."
 mangup_kalamita:0 "Forts de Mangup et Kalamita"
 mangup_kalamita_desc:0 "La forteresse de Kalamita fut construite pour défendre le port commercial d'Avlita contre les attaques génoises. Le fort, avec les montagnes de Crimée, formait une défense formidable pour les princes de Gothie."
 turms:0 "Turms"
 turms_desc:0 "Le territoire de Gothie était divisé en 11 Turms pour un contrôle administratif et militaire plus efficace."
 cave_monasteries:0 "Monastères Troglodytes"
 cave_monasteries_desc:0 "À une époque d'Iconoclasme, de nombreux moines orthodoxes arrivèrent en Crimée byzantine et fondèrent des cités et monastères troglodytes. L'un d'eux était le monastère Saint-Clément près de Kalamita."
 PSK_ideas:0 "Idées de Pskov"
 PSK_ideas_start:0 "Traditions de Pskov"
 PSK_ideas_bonus:0 "Ambition de Pskov"
 veche_of_pskov:0 "Vétché de Pskov"
 veche_of_pskov_desc:0 "Le Vétché de Pskov, ou Conseil Suprême, était l'organe politique le plus élevé et le plus puissant de Pskov, supérieur même aux princes de Pskov. Chargé d'élire les possadniks et sotskiys, des fonctionnaires qui régulaient toutes les relations internes."
 legacy_of_daumantas:0 "Héritage de Daumantas"
 legacy_of_daumantas_desc:0 "À l'origine un duc lituanien, après une série de batailles où il mena les armées de Pskov, Daumantas réussit à persuader les Pskoviens de l'élire comme leur prince. Baptisé orthodoxe, il prit le nom de Timofei et devint plus tard un héros légendaire de Pskov, menant avec succès leurs armées contre les Lituaniens et l'Ordre Livonien."
 balt_mercenaries:0 "Mercenaires Baltes"
 balt_mercenaries_desc:0 "Étant à la bordure occidentale du royaume russe, Pskov a toujours eu des contacts avec diverses tribus baltes. Bien que quelque peu rustres, ces guerriers étaient toujours nombreux et désireux de combattre, pour le bon prix."
 pskov_charter:0 "Charte de Pskov"
 pskov_charter_desc:0 "Le plus ancien code de loi de l'histoire russe fut écrit à Pskov, et fut plus tard incorporé dans le code de loi panrusse, le Soudiebnik."
 psk_knights_guard:0 "La Garde Chevaleresque"
 psk_knights_guard_desc:0 "Établir un corps militaire spécial composé de chevaliers mercenaires occidentaux chargés d'agir comme garde personnelle du Kniaz."
 arts_and_crafts_of_pskov:0 "Arts et Artisanat de Pskov"
 arts_and_crafts_of_pskov_desc:0 "Centre régional de commerce, ainsi que foyer d'innombrables petites manufactures et ateliers d'artisanat, Pskov était l'un des plus grands centres commerciaux de la Rous', attirant des marchands de toute l'Europe."
 pskov_before_all_others:0 "Pskov Avant Tout"
 pskov_before_all_others_desc:0 "Avec la montée d'autres grands centres de la Rous', nous devons maintenant, plus que jamais, faire tout ce qui est en notre pouvoir pour assurer l'avenir et la prospérité de Pskov ainsi que la domination des routes commerciales du nord. Nul n'éclipsera la puissante Pskov !"
 SMO_ideas:0 "Idées de Smolensk"
 SMO_ideas_start:0 "Traditions de Smolensk"
 SMO_ideas_bonus:0 "Ambition de Smolensk"
 smolenskian_resolve:0 "Résolution Smolenskienne"
 smolenskian_resolve_desc:0 "Depuis très longtemps, Smolensk a été une terre soumise, possédée par divers étrangers, la traitant comme guère plus qu'un riche butin. Si nous voulons changer cela, nous devons rassembler toute notre force intérieure et rejeter toutes les différences religieuses qui nous divisent. Après et avant tout, il n'y a que Smolensk."
 armories_of_smolensk:0 "Les Arsenaux de Smolensk"
 armories_of_smolensk_desc:0 "Après un long âge de tyrannie lituanienne et polonaise sur nos terres, nous avons obtenu de nombreuses armes et tactiques de style occidental de nos anciens oppresseurs. Nous sommes dans une position unique pour devenir la seule principauté russe combinant les leçons militaires de l'ouest et de l'est."
 smo_western_mercenaries:0 "Mercenaires Occidentaux"
 smo_western_mercenaries_desc:0 "Nos contacts étrangers avec diverses cours occidentales nous permettent d'engager des mercenaires d'Europe occidentale d'une qualité inégalée dans nos contrées. Un fait envié par certains, mais certainement craint par la plupart."
 the_great_foundry:0 "La Grande Fonderie"
 the_great_foundry_desc:0 "Construire la plus grande fonderie militaire d'Europe orientale capable de construire des canons plus gros et meilleurs que quiconque autour de nous. Tous nos ennemis trembleront au rugissement de l'artillerie smolenskienne."
 smo_hold_the_line:0 "Tenir la Ligne"
 smo_hold_the_line_desc:0 "Nous comprenons une vérité que le reste de nos frères russes ignore : l'ère de la bardiche est révolue. Nous ne romprons plus les rangs pour charger l'ennemi dans une mêlée insensée. Soldats, vous rechargerez vos mousquets, et tiendrez la ligne !"
 artillery_before_all:0 "L'Artillerie Avant Tout"
 artillery_before_all_desc:0 "L'artillerie de campagne est une invention relativement nouvelle sur les champs de bataille cannoriens. Aussi puissante soit-elle, elle est aussi très peu fiable et capable de causer des dommages collatéraux dévastateurs. Il est donc primordial que nous développions des tactiques fiables et uniques fournissant à nos futurs commandants militaires une compréhension inégalée de la façon d'appliquer l'artillerie à son plein potentiel."
 tsar_mortars:0 "Mortiers du Tsar"
 tsar_mortars_desc:0 "Développer un nouveau type d'artillerie terrifiante, capable non seulement de tir direct, mais aussi de tir indirect contre la dévastation duquel aucun mur ne peut protéger nos ennemis. L'ère des châteaux et des forts sera brisée par les Mortiers du Tsar."
 YAR_ideas:0 "Idées de Iaroslavl"
 YAR_ideas_start:0 "Traditions de Iaroslavl"
 YAR_ideas_bonus:0 "Ambition de Iaroslavl"
 between_hammer_and_avil:0 "Entre le Marteau et l'Enclume"
 between_hammer_and_avil_desc:0 "Iaroslavl a toujours été dans une position difficile, entourée de principautés plus grandes, plus puissantes et plus ambitieuses, dont la plus récente est Moscovie. De cette réalité sont nées une aptitude diplomatique spéciale et un talent pour les nuances."
 third_option:0 "Troisième Option"
 third_option_desc:0 "Depuis très longtemps, Iaroslavl a été un joyau convoité par les princes de Novgorod et de Moscovie. Une position stratégique si délicate a influencé notre peuple à développer un sens particulier pour éviter de toujours faire des choix entre l'un ou l'autre. Au lieu de cela, notre peuple trouve toujours une troisième option. Un talent reconnu par la plupart et respecté par beaucoup."
 reform_boyars:0 "Réforme des Boyards"
 reform_boyars_desc:0 "Les Boyards, propriétaires terriens russes, nobles et principale source d'effectifs expérimentés et équipés pendant les guerres, ont toujours joui de nombreux privilèges à Iaroslavl. Mais ils ont aussi une tendance à être très peu fiables, à se regrouper selon leurs préférences personnelles, à attaquer selon leur propre évaluation, et en général à ne jamais suivre les ordres, sauf quand ils n'ont pas d'autre option. Nous devons nous assurer que nos Boyards acceptent notre autorité, s'équipent comme infanterie ou cavalerie selon les ordres et suivent toujours les commandements."
 siberian_mercenaries:0 "Mercenaires Sibériens"
 siberian_mercenaries_desc:0 "Proche de la frontière nord du royaume russe, Iaroslavl a toujours entretenu des relations commerciales raffinées avec diverses tribus ouraliennes et iakoutes. Bien que peu développés technologiquement, ces indigènes tribaux sont sans égaux quand il s'agit de combattre dans les conditions de froid extrême de l'hiver russe."
 cult_of_generals:0 "Culte des Généraux"
 cult_of_generals_desc:0 "Étant la deuxième plus grande ville de toute la Russie, Iaroslavl fut le lieu de naissance de nombreux chefs militaires, de l'ère viking à l'ère de la Rous'. Cela a toujours été une grande source de fierté parmi notre peuple, et un motif suprême d'excellence militaire pour toutes les générations à venir."
 yar_two_towers:0 "Les Deux Tours"
 yar_two_towers_desc:0 "Depuis sa fondation, Iaroslavl a toujours été une ville de bois. Aussi grande qu'elle ait toujours été, cela a aussi rendu la ville susceptible aux incendies qui l'ont dévastée à de nombreuses reprises. Il est temps maintenant de reconstruire d'abord le kremlin de Iaroslavl en pierre, et avec le temps, tous nos établissements devraient être construits en pierre."
 yar_russian_ambition:0 "Ambition Russe"
 yar_russian_ambition_desc:0 "Être une petite principauté au bord du royaume russe n'a jamais empêché nos dirigeants d'être ambitieux. La Russie n'est plus simplement un rêve, mais une réalité distante, et pourtant presque palpable, à portée de main. À cette fin, nous devons rassembler tout notre charme et notre patience et persuader les autres frères russes de suivre notre direction."
 TVE_ideas:0 "Idées de Tver"
 TVE_ideas_start:0 "Traditions de Tver"
 TVE_ideas_bonus:0 "Ambition de Tver"
 tverian_merchants:0 "Marchands Tvériens"
 tverian_merchants_desc:0 "Établir un réseau de marchands tvériens loyaux pour servir de représentants dans tous les centres commerciaux étrangers importants."
 defend_against_muscowy:0 "Défense contre Moscovie"
 defend_against_muscowy_desc:0 "Depuis un certain temps, la Grande Principauté de Moscovie s'est développée, dévorant lentement les petites principautés autour d'elle. Mais ce ne sera pas notre destin. Nous construirons des murs qui ne seront jamais percés par ces satanés Moscovites."
 patriarch_of_tver:0 "Patriarche de Tver"
 patriarch_of_tver_desc:0 "Pourquoi devrions-nous accepter la domination d'une autre Principauté ? Non, nous créerons notre propre Patriarche, et ne nous inclinerons plus devant Kiev, Moscou ou quiconque."
 tverian_architects:0 "Architectes Tvériens"
 tverian_architects_desc:0 "Envoyer nos meilleurs et plus brillants artistes et artisans dans un pays lointain appelé l'Italie. Là-bas, ils apprendront à travailler la pierre, et bientôt, de nouveaux bâtiments glorieux s'élèveront à Tver. Nous ne construirons plus des murs de bois, mais des palais et des cathédrales qui tiendront pour toujours."
 cloth_business:0 "Commerce du Tissu"
 cloth_business_desc:0 "Développer notre commerce de tissus en investissant dans la production domestique. Avec le temps, nous monopoliserons la production russe de tissus."
 tverian_tercio:0 "Tercio Tvérien"
 tverian_tercio_desc:0 "Pendant d'innombrables siècles, nous nous sommes appuyés sur l'héritage de la Rous'. Maintenant, le temps est venu d'étudier ces idées occidentales."
 tve_national_army:0 "Armée Nationale"
 tve_national_army_desc:0 "Pendant très longtemps, nous nous sommes appuyés principalement sur des mercenaires et de petites suites de nos dirigeants pour défendre Tver. Il est temps d'établir une armée nationale, une institution qui nous permettrait de remplir les rangs avec des paysans, et de combattre toute guerre future jusqu'à la dernière goutte de sang paysan ! C'est bien plus économique et pratique."
 RYA_ideas:0 "Idées de Riazan"
 RYA_ideas_start:0 "Traditions de Riazan"
 RYA_ideas_bonus:0 "Ambition de Riazan"
 arsenal_of_ryazan:0 "L'Arsenal de Riazan"
 arsenal_of_ryazan_desc:0 "L'une des premières institutions nécessaires pour construire un État approprié est une armée appropriée. Nous devons étendre l'ancienne infrastructure militaire et faire de la place pour les armées riazaniennes dans les siècles à venir."
 tatar_mercenaries:0 "Mercenaires Tatars"
 tatar_mercenaries_desc:0 "Situés à la bordure même de Zalesié, l'ancien arrière-pays de la Rous' qui sépare les Russes des nomades des steppes, les dirigeants de Riazan ont toujours maintenu des relations uniques avec leurs voisins qui servaient souvent les princes riazaniens comme mercenaires de cavalerie hautement capables."
 rya_land_charters:0 "Chartes Foncières"
 rya_land_charters_desc:0 "Émettre un ensemble de chartes foncières listant toutes les propriétés possédées par nos Boyards afin de créer une base d'effectifs fiable et stable fournie par chaque foyer individuel."
 rya_russian_grain:0 "Céréales Russes"
 rya_russian_grain_desc:0 "Les parties méridionales de la Grande Principauté de Riazan ont toujours été exceptionnellement fertiles, fournissant des récoltes abondantes assez grandes pour nourrir des armées plusieurs fois la taille de la leur. Cela attire des marchands étrangers de contrées lointaines."
 march_of_russia:0 "Marche de Russie"
 march_of_russia_desc:0 "Vivant à la bordure des terres tatares, Riazan a toujours été une kraïna, la version russe d'une marche militaire, une province frontalière, toujours prête pour la guerre avec ses voisins. Ayant été envahis d'innombrables fois dans l'histoire, avec nos villes de bois pillées et brûlées, le peuple de Riazan n'est pas étranger à la dévastation des guerres."
 russian_ambition:0 "Ambition Russe"
 russian_ambition_desc:0 "Il y a longtemps, nos ancêtres vivaient dans un pays qui unissait tous les Russes sous une seule bannière. La Rous' de Kiev n'est plus, et les hordes des steppes ont ravagé les terres jadis riches et fertiles. Néanmoins, notre rêve d'unifier une nouvelle Russie ne s'est jamais estompé."
 western_contacts:0 "Contacts Occidentaux"
 western_contacts_desc:0 "Notre commerce lucratif avec les marchands étrangers nous a permis de développer une relation unique avec de nombreuses cours occidentales, attirant des personnes hautement éduquées dans nos terres. Jamais les terres riazaniennes n'ont été si pleines d'intellectuels occidentaux."
 KBO_ideas:0 "Idées du Kanem-Bornou"
 KBO_ideas_start:0 "Traditions du Kanem-Bornou"
 KBO_ideas_bonus:0 "Ambition du Kanem-Bornou"
 land_of_ngazargamu:0 "Terre de Ngazargamu"
 land_of_ngazargamu_desc:0 "Ngazargamu était la capitale fortifiée de l'Empire du Kanem-Bornou. C'est dans cette région que vivait le cœur des dirigeants."
 sayfawad_dynasty:0 "Dynastie Sayfawa"
 sayfawad_dynasty_desc:0 "La dynastie Sayfawa était celle qui régnait sur les terres du Kanem-Bornou. Elle dura près de 500 ans, maintenant unie une grande nation."
 alumas_reforms:0 "Réformes d'Alouma"
 alumas_reforms_desc:0 "Un royaume fort exige des réformes administratives. En instituant une Cour d'Appel composée de savants renommés de l'Islam, en s'appuyant sur des esclaves loyaux et bien éduqués pour conseiller le dirigeant, et en attirant des individus talentueux de royaumes étrangers, notre administration peut croître."
 house_of_kanem:0 "Maison du Kanem"
 house_of_kanem_desc:0 "Pour inspirer les pèlerins de notre pays à accomplir leur devoir religieux, nous devrions financer une auberge à La Mecque, où ils trouveraient un hébergement au terme de leur voyage."
 fixed_military_camps:0 "Camps Militaires Permanents"
 fixed_military_camps_desc:0 "Plutôt que de compter sur des hébergements temporaires pendant la guerre, nous devrions établir des camps militaires permanents fortifiés, pour servir de base à nos troupes et pour repousser les attaques."
 clan_head_council:0 "Le Conseil des Chefs de Clan"
 clan_head_council_desc:0 "En sollicitant les conseils des chefs des clans les plus importants de notre pays, nous pouvons obtenir un gouvernement plus stable et apporter une grande prospérité au pays."
 duties_on_sahara_trade:0 "Taxes sur le Commerce Saharien"
 duties_on_sahara_trade_desc:0 "Chaque année, de grandes caravanes de sel quittent nos terres pour des voyages à travers le désert. En imposant des tarifs et des taxes sur ce commerce, nous pouvons générer des revenus accrus."
 ruthenian_nation_title:0 "Revendiquer l'Héritage Ruthène"
 ruthenian_nation_desc:1 "Il y a des siècles, la terre de la Rous' était unie sous une seule bannière et gouvernée depuis la légendaire cité de Kiev. Mais vinrent alors les hordes mongoles, avançant depuis la grande steppe, pillant et brûlant. Ils détruisirent nos kremlins et les villes tombèrent une par une, même Kiev elle-même ne put éviter ce destin. Terrifiés, nos ancêtres fuirent les plaines de la Rous' et allèrent vers le nord. Dans les forêts et l'arrière-pays de la terre que nous appelons aujourd'hui Russie.\nMaintenant, une nouvelle et arrogante cité du nord est en plein essor. Elle attire les petits États autour d'elle et son dirigeant envisage une nouvelle Rous'. Une Rous' centrée sur Moscou et non sur Kiev.\nCependant, nous Ruthènes n'irons pas silencieusement dans les pages de l'histoire. Nous ne permettrons pas aux nouveaux venus et aux prétendants de revendiquer l'héritage de nos ancêtres. Kiev s'élèvera à nouveau et nous la restaurerons dans sa gloire et sa splendeur d'antan. Et la Rous' également."
 ruthenian_ideas:0 "Idées Ruthènes"
 ruthenian_ideas_start:0 "Traditions Ruthènes"
 ruthenian_ideas_bonus:0 "Ambition Ruthène"
 mother_of_russian_cities:0 "La Mère des États Russes"
 mother_of_russian_cities_desc:0 "Historiquement, Kiev était le centre de la Rous' avant l'invasion mongole. De nombreux autres États russes ont tenté de combler le vide après la chute de Kiev : Moscou, Tver, Novgorod... Mais aucun d'eux ne pouvait égaler l'ancienne gloire de Kiev.\nContrairement à ces parvenus du nord, cependant, nous sommes les vrais héritiers de l'héritage kiévien, notre peuple foule la même terre que nos ancêtres kiéviens et notre capitale aspire à la même grandeur. Nos revendications doivent être respectées !"
 international_influences:0 "Influences Étrangères"
 international_influences_desc:0 "Les terres russes furent historiquement divisées entre plusieurs nations, parmi lesquelles les Polonais, les Lituaniens, les Tatars et les Hongrois. En tant que tels, nos citoyens viennent de multiples cultures et suivent différentes religions. Pour être un État unifié, nous devons respecter leur foi."
 zaporizhian_cossacs:0 "Cosaques Zaporogues"
 zaporizhian_cossacs_desc:0 "La caste cosaque est originaire des steppes zaporogues et est rapidement devenue la puissance militaire la plus forte de cette région. Maintenant, ils font partie de l'État ruthène et n'ont donc plus besoin de lutter pour leur survie. En tant que tels, nous pouvons les réformer pour en faire l'épine dorsale de notre nouvelle armée."
 east_and_west:0 "Est et Ouest"
 east_and_west_desc:0 "Notre position géographique entre les États de l'est et de l'ouest a offert à nos marchands l'opportunité d'être les intermédiaires des routes commerciales extrêmement lucratives de la région."
 legacy_of_ancient_rus:0 "Héritage de l'Ancienne Rous'"
 legacy_of_ancient_rus_desc:0 "Les systèmes sociaux de l'ancienne Rous' différaient souvent grandement du despotisme moscovite. En Ruthénie, plus de liberté était accordée aux paysans, le servage d'État n'était pas imposé, et la noblesse servait l'État au lieu de l'exploiter. Cela a aidé à transformer la Ruthénie en une Rous' de Kiev moderne."
 reuniting_rus:0 "Réunir la Rous'"
 reuniting_rus_desc:0 "La Rous' de Kiev est ressuscitée sur les terres ruthènes, mais beaucoup de gens de l'ancienne Rous' vivent sous domination étrangère ou dans de petites principautés. La Rous' doit être réunie !"
 birth_of_russian_orthodoxy:0 "Naissance de l'Orthodoxie Russe"
 birth_of_russian_orthodoxy_desc:0 "La Rous' primitive souffrit de divers troubles religieux. En l'an 988, Vladimir le Grand fut baptisé après la prise de Korsoun. À son retour à Kiev, il ordonna le baptême de masse des citoyens dans le fleuve Dniepr, marquant la première étape de la christianisation de la Rous'."
