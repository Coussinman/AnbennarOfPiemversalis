 HRE_RELIGIOUS_WAR:0 "§YGuerre de Religion§!"
 HRE_RELIGIOUS_WAR_DESC:0 "L'Empire d'Anbennar est en état de Guerre de Religion entre les fois de la Cour Régente et Corinite. Durant une Guerre de Religion, l'Accord Corinite et les Ligues Adéaniques peuvent être rejoints. La Ligue qui ne suit pas la foi dominante dans l'Empire peut déclarer la guerre à l'Empereur pour tenter de changer la foi dominante de l'Empire."
