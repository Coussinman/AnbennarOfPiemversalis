 tamil_traders_content:0 "Marchands Tamouls Autonomes"
 desc_tamil_traders_content:0 "Cette région abrite d'anciennes et puissantes guildes commerciales auxquelles nous avons permis de conserver d'anciens privilèges dans l'espoir que cela atténuera les tensions entre elles et l'administration centrale de notre pays."
 tamil_traders_angered:0 "Communautés Commerciales Mécontentes"
 desc_tamil_traders_angered:0 "Les guildes de marchands et d'artisans de cette région sont mécontentes que nous ayons empiété sur leurs anciens privilèges."
 vadugan_settlement:0 "Colons Telugu"
 desc_vadugan_settlement:0 "Des colons Telugu du nord ont commencé à construire leurs propres communautés dans cette région tamoule, ce qui cause des tensions entre eux et la population rurale existante."
 rural_tamil_autonomy:0 "Communautés Rurales Défendues"
 desc_rural_tamil_autonomy:0 "Nous avons limité la migration extérieure dans cette région et défendu les droits des communautés locales en limitant l'afflux de colons militaires du nord."
 tamil_grandee:0 "Grand Seigneur Tamoul"
 desc_tamil_grandee:0 "C'est la base de pouvoir de l'homme fort local Chellappa. Bien qu'il semble satisfait pour le moment, il augmente lentement son pouvoir sur la région."
 pulicat_booming:0 "Le Grand Port de Pulicat"
 desc_pulicat_booming:0 "Pulicat est idéalement situé pour être le port principal pour toutes les importations vers la grande cité de Vijayanagar. À mesure que la capitale grandit, son port grandit aussi et grâce à une série d'événements fortunés, le commerce ici est en plein essor en ce moment. Pour le moment, c'est le port le plus attractif de l'Océan Indien."
 tirupati_tirumala_temple_complex:0 "Complexe Templier de Tirupati-Tirumala"
 desc_tirupati_tirumala_temple_complex:0 "En tant que principal temple patronné par notre État, le complexe de Tirupati est devenu l'un des plus grands joyaux de l'Inde. Bien que le fait que la cité-temple elle-même contrôle tant de villages dans cette région diminue légèrement nos revenus ici, cela est plus que compensé par la splendeur que le temple confère à notre État."
 flavor_vij.11.t:0 "Les Guildes Commerciales Tamoules"
 flavor_vij.11.d:0 "L'empire Vijayanagara, avec sa base militaire dans les hautes terres arides des régions de langue kannada et telugu du plateau du Deccan, a toujours eu du mal à maintenir les cités commerçantes animées du sud du pays tamoul en ligne.\nUne ambassade représentant de nombreuses guildes commerciales tamoules les plus importantes vient d'arriver dans notre capitale exigeant que leurs traditions et droits ancestraux soient respectés.\nIls ne demandent pas de petites concessions mais s'attendent plutôt à entendre qu'ils peuvent être laissés plus ou moins à leurs propres affaires."
 flavor_vij.11.a:0 "Nous pouvons leur accorder une plus grande autonomie."
 flavor_vij.11.b:0 "Nous devons tenir ces boutiquiers en laisse serrée."
 flavor_vij.12.t:0 "Migration Vadugan"
 flavor_vij.12.d:0 "Depuis la fondation de notre empire, un flux constant de colons Telugu a migré vers le sud dans nos terres depuis le Telingana au nord. Nous leur avons jusqu'ici gracieusement fourni des terres à développer dans les parties peu peuplées de notre empire et construit des réservoirs d'eau pour aider leurs colonies à croître. De cette façon, nous avons gagné une source saine et loyale d'effectifs pour nos armées.\nDernièrement, cependant, ces colons (connus sous le nom de Vadugans par les Tamouls) ont commencé à se répandre encore plus au sud dans les régions de langue tamoule. Les communautés agricoles tamoules ont élevé la voix pour leur permettre d'arrêter les colons Telugu qui s'installent sur leurs terres."
 flavor_vij.12.a:0 "Ignorez les protestations."
 flavor_vij.12.b:0 "Aidez les fermiers à défendre leurs foyers."
 flavor_vij.13.t:0 "L'Ascension de Chellappa Narasimha"
 flavor_vij.13.d:0 "La nature autonome de nos possessions tamoules a été l'environnement parfait pour construire une base de pouvoir pour un homme fort local.\nL'homme en question, connu sous le nom de Chellappa, a demandé à être autorisé à servir comme général et semble satisfait d'agir dans la structure interne de notre empire. Il est cependant généralement supposé qu'un homme aussi ambitieux que lui doit avoir les yeux fixés sur des objectifs bien plus élevés qu'une position dans l'armée. Bien qu'il soit facile de lui refuser l'honneur qu'il cherche et d'essayer de l'isoler politiquement, nous courons le risque de nous éloigner de quelqu'un qui contrôle une grande partie de notre cœur économique.\nD'un autre côté, peut-être serait-il plus prudent de frapper maintenant au lieu de prolonger un conflit que beaucoup estiment inévitable."
 flavor_vij.13.a:0 "Gardez vos amis près et vos ennemis plus près"
 flavor_vij.13.b:0 "Essayez de limiter son influence à sa base de pouvoir tamoule."
 flavor_vij.13.c:0 "Frappez maintenant pour l'écraser avant qu'il ne devienne trop fort."
 flavor_vij.14.t:0 "Révolte de Chellappa"
 flavor_vij.14.d:1 "Il semble que notre général Chellappa ait conspiré pour prendre le trône pour lui-même !\n\nSe faisant maintenant appeler Narasimha Saluva, il a levé une armée de troupes qui lui sont loyales et marche sur la capitale."
 flavor_vij.14.a:0 "Entendu."
 flavor_vij.15.t:0 "Révolte de Chellappa"
 flavor_vij.15.d:0 "Les chefs des terres tamoules ont été dupés en croyant qu'ils seraient mieux dans un État à eux plutôt que comme partie de notre empire. L'homme fort local Chellappa Saluva a levé une armée et tente de se tailler un État sur la zone déjà de facto sous son contrôle."
 flavor_vij.15.a:0 "Entendu."
 flavor_vij.16.t:0 "Chellappa Marginalisé"
 flavor_vij.16.d:1 "Avec le temps, l'influence de Chellappa a diminué. Maintenant qu'il n'est plus nouveau ni prometteur, il n'est plus un facteur majeur dans la politique tamoule."
 flavor_vij.16.a:0 "Entendu."
 flavor_vij.17.t:0 "Pulicat"
 flavor_vij.17.d:0 "La côte nord de Coromandel et la cité de Pulicat en particulier sont vitales pour notre empire. C'est par cette bande côtière que tous les biens de l'est atteignent les 500 000 âmes exigeantes de notre capitale impériale.\nAlors que la région se remet de l'occupation Orissane, et que la capitale de Vijayanagar elle-même continue de croître, le port semble maintenant être entré dans un âge d'or de croissance économique et de prospérité."
 flavor_vij.17.a:0 "Entendu."
 flavor_vij.18.t:0 "Complexe Templier de Tirupati-Tirumala"
 flavor_vij.18.d:0 "Peut-être le plus grand temple de tous dans nos terres, le grand temple de Venkateshwara et la cité-temple connectée de Tirupati sont de plus en plus associés aux dirigeants de notre État. Au fil des ans, il est passé d'un pèlerinage majeur à l'une des grandes cités-temples en Inde. La cité est soutenue par les dons d'innombrables trésors ainsi que par plus de 40 villages lui fournissant nourriture et revenus.\nNous ne devrions cependant pas nous contenter de cela. En augmentant notre soutien, en lui fournissant encore plus de villages et de dons, nous pourrions nous assurer qu'elle devienne la plus grande cité-temple de tout le sud de l'Inde. Puisse Tirupati prospérer aussi longtemps que notre empire grandit !"
 flavor_vij.18.a:0 "Donnez généreusement."
 flavor_vij.18.b:0 "Gardons nos contributions plus modestes."
 flavor_vij.19.t:0 "Abd-ur-Razzaq, ambassadeur de la cour Timuride"
 flavor_vij.19.d:0 "Un ambassadeur de Shah Rukh dans la lointaine Samarcande est arrivé aujourd'hui dans notre capitale. Bien que le Timuride ait voyagé loin et vu beaucoup de grandes choses sur son chemin vers notre grande cité, il semblait très impressionné par ce qu'il a trouvé ici. Sa connaissance du monde extérieur à l'Inde ainsi que les observations qu'il pourrait partager concernant les terres de nos voisins directs nous seront très utiles."
 flavor_vij.19.a:0 "Entendu."
 flavor_vij.20.t:0 "La Capitale Impériale Chalukya"
 flavor_vij.20.d:0 "Bien qu'ils soient partis depuis longtemps, l'Empire Chalukya qui s'étendait du Deccan aux royaumes tamouls reste un souvenir puissant. Alors que notre propre empire s'est étendu et avancé, les poètes et chroniqueurs écrivent comme si Vijayanagar était l'Empire Chalukya ressuscité. Maintenant que nous avons saisi l'ancienne capitale Chalukya de Kalyana, située non loin de l'ancienne capitale Bahmani de Bidar, nous avons l'opportunité de relocaliser la cour dans la cité du nord afin de pouvoir pleinement revendiquer l'héritage Chalukya comme le nôtre.\n\nLa capitale traditionnelle à Vijayangar, la Cité de la Victoire, reste cependant une grande et prestigieuse cité, et nous permet de forger un héritage impérial qui nous est propre."
 flavor_vij.20.a:0 "La Cité de la Victoire restera notre capitale."
 flavor_vij.20.b:0 "Nous revendiquerons l'héritage Chalukya, déplaçons la capitale à Kalyana !"
 flavor_vij.20.c:0 "Laissez la capitale dans son emplacement actuel."
 flavor_vij.21.t:0 "La Cité de la Victoire"
 flavor_vij.21.d:0 "L'Empire Vijayangar se tient victorieux sur tous ses ennemis ; le Sultanat Bahmani parvenu est totalement vaincu, les rois tamouls acceptent dûment notre règne, et nous avons même ajouté l'Andhra et Lanka à notre domaine. Fêtes et festivals dans la capitale célèbrent le moment de notre victoire en Inde du Sud alors que le Maharaja confère à [Root.Owner.Monarch.GetHerselfHimself] le titre de Chhatrapati dans un message clair au monde que Vijayanagar ne se soumettra à aucune puissance étrangère."
 flavor_vij.21.a:0 "Nous sommes victorieux !"
 aow_trade_goods_events.1.t:0 "Bois Tropical"
 aow_trade_goods_events.1.d:0 "Nous avons reçu des rapports de nos colons à $PROVINCENAME$ indiquant que les forêts denses de la province sont pleines d'un type de bois rare et exceptionnellement beau."
 aow_trade_goods_events.1.a:0 "C'est une excellente nouvelle"
 aow_trade_goods_events.2.t:0 "Teintures"
 aow_trade_goods_events.2.d:0 "Nous avons reçu des rapports de nos colons à $PROVINCENAME$ indiquant que la province abrite une plante sauvage qui peut être utilisée pour teindre le tissu."
 aow_trade_goods_events.2.a:0 "C'est une excellente nouvelle"
