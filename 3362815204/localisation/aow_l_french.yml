 plundered_in_war:0 "Pillée en Guerre"
 desc_plundered_in_war:0 "La population locale souffre des effets des soldats qui pillent pour nourrir la guerre et eux-mêmes aux dépens des civils."
 plague_at_siege:0 "Peste lors du Siège"
 desc_plague_at_siege:0 "La guerre a apporté la maladie dans cette province, aggravée par les armées qui l'assiègent."
 lingering_plague:0 "Peste Persistante"
 desc_lingering_plague:0 "Le refus des commandants militaires des deux camps de placer le bien-être de la population avant la victoire a permis à la maladie de se propager ici."
 terrorized_by_mercenaries:0 "Terrorisée par les Mercenaires"
 desc_terrorized_by_mercenaries:0 "Les habitants ont subi pillages et tortures aux mains de soldats de fortune sans pitié, nourrissant leur haine envers les puissances occupantes."
 curtailed_mercenaries:0 "Mercenaires Encadrés"
 post_war_tax_relief:0 "Allègement Fiscal d'Après-Guerre"
 desc_post_war_tax_relief:0 "Pour alléger les difficultés des familles qui luttent après avoir perdu des êtres chers à la guerre, les impôts ont été diminués."
 decreased_drafting:0 "Conscription Réduite"
 desc_decreased_drafting:0 "La perte de tant de vies lors de la dernière guerre nous a conduits à être plus indulgents dans la conscription de notre armée."
 suffering_bereaved:0 "Familles Endeuillées Souffrantes"
 desc_suffering_bereaved:0 "Les familles des soldats qui ont donné leur vie pour notre nation sont en colère face à notre manque de sympathie pour leur détresse."
 desc_curtailed_mercenaries:0 "Après que des forces mercenaires ayant pris trop de libertés avec les locaux ont causé des troubles, nous avons commencé à être plus prudents sur qui nous engageons et comment nous les payons."
 local_witch_hunts:0 "Chasses aux Sorcières Locales"
 desc_local_witch_hunts:0 "Les habitants de cette province ravagée par la guerre cherchent des causes surnaturelles à leurs souffrances, traquant les sorcières présumées."
 nationwide_witch_hunts:0 "Chasses aux Sorcières Nationales"
 desc_nationwide_witch_hunts:0 "La poursuite de la sorcellerie est encouragée au niveau de l'État, sous la supervision de l'inquisiteur de la cour."
 forbade_witch_hunts:0 "Chasses aux Sorcières Interdites"
 desc_forbade_witch_hunts:0 "Les dirigeants de l'État et de l'Église de notre nation se sont prononcés contre la croyance hérétique en la magie, frustrant ceux qui s'accrochent à de telles superstitions."
 loyal_unbelievers:0 "Incroyants Loyaux"
 desc_loyal_unbelievers:0 "Des espions ont utilisé leurs liens religieux pour feindre la loyauté envers nos ennemis, améliorant nos opérations d'espionnage à l'étranger."
 disloyal_unbelievers:0 "Incroyants Déloyaux"
 desc_disloyal_unbelievers:0 "Des espions qui ne jurent pas par notre religion d'État ont permis aux ennemis de compromettre nos opérations d'espionnage."
 abadoned_religious_rebels:0 "Rebelles Religieux Abandonnés"
 desc_abadoned_religious_rebels:0 "Pour éviter une crise diplomatique, nous nous sommes distancés des rebelles étrangers qui prétendent combattre pour notre propre religion."
 desert_traders:0 "Marchands du Désert"
 animist_syncretism:0 "Syncrétisme Animiste"
 desc_animist_syncretism:0 "Un mélange d'anciennes traditions locales et de nouvelles idées monothéistes rend les lignes religieuses difficiles à tracer."
 dogmatic_preacher:0 "Prédicateur Dogmatique"
 desc_dogmatic_preacher:0 "Refusant de voir la parole de Dieu mêlée à d'anciennes superstitions, l'effort missionnaire local a rencontré des difficultés ici."
 buying_firearms_from_neighbor:0 "Achat d'Armes à Feu au Voisin"
 desc_buying_firearms_from_neighbor:0 "En acceptant l'offre de nos voisins de vendre des armes plus avancées, nous leur avons donné un avantage dans nos échanges commerciaux."
 refused_slave_trade_with_europeans:0 "Commerce d'Esclaves Refusé aux Cannoriens"
 desc_refused_slave_trade_with_europeans:0 "Notre refus de vendre des esclaves capturés en guerre aux colonies cannoriennes nous a permis de conserver un certain contrôle sur notre commerce local."
 slave_trade_with_europeans:0 "Commerce d'Esclaves avec les Cannoriens"
 desc_slave_trade_with_europeans:0 "L'accord avec nos voisins cannoriens pour leur vendre des esclaves a augmenté la demande, notre offre suivant le mouvement."
 raided_by_cavalry:0 "Pillée par la Cavalerie"
 desc_raided_by_cavalry:0 "Une attaque inattendue par une petite force de cavalerie hostile a affaibli les défenses de cette province."
 new_dyeing_methods:0 "Nouvelles Méthodes de Teinture"
 desc_new_dyeing_methods:0 "L'étude de la vie végétale dans la jungle a produit de nouvelles méthodes pour créer des teintures."
