 sent_mercenaries:0 "A envoyé des mercenaires"
 supported_huguenots:0 "A soutenu les Huguenots"
 plundered_prague:0 "A pillé Prague"
 questioned_league:0 "A remis la Ligue en question"
 jesuit_heir:0 "Héritier Jésuite"
 rejected_noble_refugees:0 "A refusé les réfugiés nobles"
 sheltered_enemy_nobles:0 "A abrité les nobles ennemis"
 opinion_enforced_sound_toll:0 "A imposé le péage du Sund"
 conspired_with_ottomans:0 "A conspiré avec les Ottomans"
 refused_backing_claims:0 "A refusé de soutenir les revendications"
 rulers_united_in_prayer:0 "Dirigeants unis dans la prière"
 attacked_treasure_fleet:0 "A attaqué la flotte au trésor"
 joined_league_for_land:0 "A rejoint notre Ligue pour des terres"
 joined_league_for_faith:0 "A rejoint notre Ligue pour la foi"
 enforced_sound_toll:0 "A imposé le péage du Sund"
 unaided_during_blockade:0 "Sans aide durant le blocus"
 desc_unaided_during_blockade:0 "Le manque de soutien de l'État pendant que la ville était sous blocus a amené la population à se méfier de ses dirigeants."
 scottish_mercenaries:0 "Mercenaires Écossais"
 desc_scottish_mercenaries:0 "De nombreux Écossais servent dans nos armées comme soldats de fortune, augmentant notre dépendance potentielle envers de telles troupes."
 huguenot_stronghold:0 "Bastion Huguenot"
 desc_huguenot_stronghold:0 "Des dissidents religieux ont trouvé refuge ici et ont commencé à fortifier en préparation de la défense ou de la révolte."
 jesuit_ruler:0 "Dirigeant Jésuite"
 desc_jesuit_ruler:0 "Le dirigeant a été éduqué par les Jésuites et ne peut supporter les hérésies ou les hérétiques."
 nobles_fled:0 "Nobles en fuite"
 desc_nobles_fled:0 "Quand notre capitale est tombée, les nobles se sont sentis menacés et ont fui le pays, trouvant refuge dans les nations voisines de notre foi."
 golden_age_transylvania:0 "Âge d'Or de la Transylvanie"
 desc_golden_age_transylvania:0 "Notre monarque talentueux et nos investissements dans notre capitale ont inauguré un âge d'or pour notre nation."
 god_is_spanish:0 "Dieu est Espagnol"
 desc_god_is_spanish:0 "Nos succès dans la Guerre de la Ligue ont convaincu beaucoup que Dieu est de notre côté et combat pour notre nation."
 god_wants_peace:0 "Dieu veut la paix"
 desc_god_wants_peace:0 "Nos revers dans la Guerre de la Ligue ont convaincu beaucoup que Dieu veut que nous fassions la paix et perdions espoir en la victoire."
 in_league_for_land:0 "Dans la Ligue pour des terres"
 desc_in_league_for_land:0 "Nous avons clairement fait connaître nos intentions de prendre des terres dans la Guerre de la Ligue, et que les préoccupations religieuses sont secondaires."
 in_league_for_faith:0 "Dans la Ligue pour la foi"
 desc_in_league_for_faith:0 "Nous avons clairement fait savoir que nous avons rejoint la Guerre de la Ligue pour combattre pour la survie de la vraie foi."
 tyw_events.1.t:0 "Reservatum Ecclesiasticum"
 tyw_events.1.d:0 "En tant qu'Empereur, nous devons peut-être accepter que certains de nos sujets tombent dans l'hérésie pour éviter les conflits internes. Le dirigeant dicte la religion du royaume, après tout. Nous ne pouvons cependant pas nous permettre d'être aussi indulgents avec les principautés ecclésiastiques. L'un des Princes-Électeurs qui règnent dans l'Empire d'Anbennar semble avoir abandonné la Cour et écouté les mensonges des Corinites, risquant non seulement son âme mais aussi celles de tous ses sujets. Grâce à la réserve ecclésiastique, nous nous réservons le droit de le forcer à démissionner en cas de trahison comme celle-ci."
 tyw_events.1.a:0 "Appliquez-la ! Un bon Adéanique prendra sa place."
 tyw_events.1.a.tt:0 "Envoyez un message au [This.Monarch.GetTitle] de [This.GetName]. Nous connaîtrons sa réponse dans deux semaines."
 tyw_events.1.b:0 "Cela causerait trop de problèmes."
 tyw_events.2.t:0 "L'Empereur exige la démission"
 tyw_events.2.d:0 "La conversion de [Root.Monarch.GetName] à la foi [Root.Religion.GetName] semble avoir irrité l'Empereur [From.Monarch.GetName]. [From.GetName] prétend maintenant faire appliquer le Reservatum Ecclesiasticum, une mesure qui force les [Root.Monarch.GetTitle]s au sein de l'Empire à abandonner leurs titres s'ils se convertissent depuis la Cour Régente Adéanique. La réserve n'est pas soutenue parmi les Corinites de l'Empire, et peut-être perdrait-elle une partie de son autorité si elle était véritablement contestée."
 tyw_events.2.a:0 "C'est dans le droit de l'Empereur."
 tyw_events.2.b:0 "Jamais ! Il y a un salut en dehors de l'Église !"
 tyw_events.3.t:0 "Le [From.Monarch.GetTitle] refuse de démissionner"
 tyw_events.3.d:0 "À notre surprise et indignation, [From.Monarch.GetName] de [From.GetName] a refusé d'accepter la validité de la réserve ecclésiastique telle que nous l'interprétons, affirmant que l'invoquer est la preuve de tyrannie de notre part. Si nous souhaitons sauver les âmes du peuple [From.GetAdjective], il semble que nous devons imposer la vraie foi nous-mêmes."
 tyw_events.3.a:0 "Les hérétiques brûleront."
 tyw_events.4.t:0 "Le [From.Monarch.GetTitle] démissionne"
 tyw_events.4.d:0 "Le [From.Monarch.GetTitle] de [From.GetName] a sagement accepté notre application de la réserve ecclésiastique et a démissionné en faveur du Ravélien [From.Monarch.GetName]. Nous avons également démontré que l'Empire d'Anbennar reste fidèle à son nom et que nous attendons de nos chefs religieux, sinon de tous les princes, qu'ils restent sur le vrai chemin ou cèdent leur titre à quelqu'un qui le fait."
 tyw_events.4.a:0 "L'Empereur protège."
 tyw_events.5.t:0 "Blocus"
 tyw_events.5.d:0 "Le peuple de [Root.GetCapitalName] dépend fortement de son port pour approvisionner la ville en ce dont elle a besoin, mais le blocus contre [Root.GetName] a coupé à la fois de nombreux luxes et certains biens qu'ils prétendent nécessaires au fonctionnement de la ville. Le peuple peut difficilement se contenter de [Root.GetTradeGoodsName] seul et se tourne vers le [Root.Owner.Monarch.GetTitle] pour trouver une solution."
 tyw_events.5.a:0 "Détournez des ressources pour faire livrer des marchandises par voie terrestre."
 tyw_events.5.b:0 "Employez notre réseau de corsaires pour faire passer les marchandises en contrebande."
 tyw_events.5.c:0 "La guerre est dure pour tout le monde. Ils devront se débrouiller."
 tyw_events.6.t:0 "La Grande Comète"
 tyw_events.6.d:0 "Les phénomènes mystérieux dans le ciel nocturne ont souvent été interprétés comme de mauvais présages ou des signes de la fin des temps. Un tel phénomène exceptionnellement remarquable, une grande comète, a été visible récemment, causant plus d'émoi que d'habitude.\n\n$NATURAL_SCIENTIST$, cependant, a saisi l'occasion pour observer de près les mouvements de la comète. Le résultat a été un travail scientifique qui nous apprend beaucoup sur la distance de l'objet par rapport à nous et dissipe de nombreuses vieilles superstitions sur les comètes. Bien qu'il semble incertain si les gens du commun s'en souviendront à l'avenir, cette comète a fourni plus d'illumination que de peur."
 tyw_events.6.a:0 "Continuons à regarder le ciel !"
 tyw_events.7.t:0 "Éducation pour un [Root.Monarch.GetTitle]"
 tyw_events.7.d:0 "La disparition tragique du précédent [Root.Monarch.GetTitle] a laissé [Root.Heir.GetName] sans parent, mais pas sans tuteurs ou précepteurs. Les conseillers servant à notre cour sont préoccupés à lui donner la meilleure éducation disponible en préparation du règne sur [Root.GetName]. Espérant gagner faveur et influence à l'avenir, beaucoup tentent de servir d'influence principale. En fin de compte, l'un d'entre eux réussira probablement, impactant le genre de dirigeant que [Root.Heir.GetName] deviendra."
 tyw_events.7.a:0 "Un conseiller travaillant dans la division administrative fournira la meilleure éducation."
 tyw_events.7.a.tt:0 "[Root.Heir.GetName] augmentera ses compétences administratives."
 tyw_events.7.b:0 "Un esprit diplomatique est nécessaire pour enseigner et gouverner [Root.GetName]."
 tyw_events.7.b.tt:0 "[Root.Heir.GetName] augmentera ses compétences diplomatiques."
 tyw_events.7.c:0 "La guerre doit être la préoccupation principale d'un futur [Root.Monarch.GetTitle]."
 tyw_events.7.c.tt:0 "[Root.Heir.GetName] augmentera ses compétences militaires."
 tyw_events.8.t:0 "Mercenaires Écossais"
 tyw_events.8.d:0 "Bien que l'Écosse ait jusqu'ici réussi à rester en dehors des conflits religieux dans l'Empire d'Anbennar, ce n'est pas par manque d'intérêt. Nous sommes bien conscients que cette guerre aura un impact sur toute l'Europe et nous ne sommes pas sans enjeu diplomatique dans l'issue. Bien que l'Écosse ne soit pas disposée à aller en guerre pour une Ligue, beaucoup d'Écossais le sont. Servant comme mercenaires dans les armées étrangères sur le continent, ils pourraient bien changer le cours de la guerre sans notre implication directe."
 tyw_events.8.a:0 "Envoyez-les combattre pour la Ligue Évangélique."
 tyw_events.8.b:0 "Envoyez-les combattre pour la Ligue Adéanique."
 tyw_events.8.c:0 "Nous avons besoin de toutes les troupes que nous pouvons rassembler ici même."
 tyw_events.9.t:0 "Mercenaires Écossais"
 tyw_events.9.d:0 "Des mercenaires d'Écosse ont commencé à rejoindre nos rangs en grand nombre. Les rapports indiquent que nos alliés voient également beaucoup d'entre eux arriver pour rejoindre les justes dans nos efforts pour mettre fin aux luttes religieuses dans l'Empire d'Anbennar une fois pour toutes. Bien que leur nation ne nous rejoigne pas dans la guerre, les Écossais semblent prêts à combattre pour notre Ligue, pour le bon prix."
 tyw_events.9.a:0 "Alors nous serons prêts à le payer."
 tyw_events.10.t:0 "Les Hongrois se révoltent contre la domination des Habsbourg"
 tyw_events.10.d:0 "Le peuple hongrois de [Root.GetName] a commencé à voir le conflit religieux dans l'Empire comme un conflit entre eux et les Habsbourg qui gouvernent [Root.Owner.GetName]. Quand la guerre fait rage entre rois et empereurs Corinites et Ravéliens, ils affirment que le peuple doit prendre les armes pour protéger sa foi également. Comme si la guerre en cours ne suffisait pas, nous devons maintenant faire face à ces fauteurs de troubles dans des terres qui auraient dû depuis longtemps accepter d'être gouvernées par la dynastie des Habsbourg."
 tyw_events.10.a:0 "Nos ennemis répandent des mensonges partout."
 tyw_events.11.t:0 "Les Huguenots se rassemblent à La Rochelle"
 tyw_events.11.d:0 "Les guerres de religion sont peut-être terminées, mais les conflits religieux en France ne le sont pas. Les hérétiques huguenots, prétendant être préoccupés par leur droit de pratiquer leur foi sous le règne de [Root.Monarch.GetName], ont commencé à se préparer à ce qui pourrait bien être une révolte ouverte. Bien qu'ils n'en soient pas encore arrivés là, ils se sont rassemblés dans la ville de La Rochelle et ont commencé à fortifier ses structures défensives. Leurs intentions exactes ne sont pas claires, mais les plus rebelles d'entre eux affirment qu'ils créeront un État indépendant, se libérant de la domination française et Ravélienne."
 tyw_events.11.a:0 "Si cela continue, nous pourrions bien nous montrer aussi impitoyables qu'ils le prétendent."
 tyw_events.12.t:0 "Les Rebelles Huguenots ont besoin de notre aide"
 tyw_events.12.d:0 "Bien que [Root.GetName] soit maintenant libre de la tyrannie de l'Église Ravélienne, beaucoup souffrent de la même oppression à l'étranger. Les Huguenots en France ont trouvé nécessaire de construire des fortifications en préparation des terreurs que le régime français est sans doute prêt à leur infliger.\n\nAussi vraie que soit la foi de ces braves gens, il est douteux qu'ils aient les moyens de résister à la puissance de l'armée française. Cependant, avec le soutien du [Root.Monarch.GetTitle] [Root.GetAdjective], tout est possible."
 tyw_events.12.a:0 "Dites-leur de frapper contre les Français, et nous suivrons !"
 tyw_events.12.b:0 "Nous préférerions ne pas attirer la colère de la France."
 tyw_events.13.t:0 "Soutien britannique aux Huguenots"
 tyw_events.13.d:0 "Les dissidents huguenots rassemblés à La Rochelle, montrant auparavant au moins une certaine prudence, ont été enhardis par le soutien du [From.Monarch.GetTitle] [From.GetAdjective]. Apparemment, les hérétiques traîtres de [From.GetName] ont jugé bon non seulement de répandre leurs mensonges en France mais aussi d'y allumer des feux. Qu'ils honorent ou non leur promesse, les Huguenots sont maintenant en révolte ouverte."
 tyw_events.13.a:0 "Les ennemis de la France paieront pour cela, à La Rochelle comme à [From.Capital.GetCapitalName]."
 tyw_events.14.t:0 "Chute de Prague"
 tyw_events.14.d:0 "Prague a été le foyer de nombreux rois et même d'empereurs et est une ville riche en héritages. Avec sa capture aujourd'hui par les troupes [Root.GetAdjective], il y a certainement une tentation de ramener certains des trésors de la ville à [Root.Capital.GetCapitalName] et de les revendiquer pour nous. Certains artefacts rares étant sans égal dans le monde connu, cela pourrait être notre seule chance de mettre la main dessus... mais pas sans attirer la colère des citoyens de Prague."
 tyw_events.14.a:0 "Ramenez-les dans notre capitale ! C'est ainsi que se construisent les héritages."
 tyw_events.14.b:0 "Ces trésors appartiennent ici."
 tyw_events.15.t:0 "Albrecht von Wallenstein"
 tyw_events.15.d:0 "Un noble de la Maison de Waldstein a émergé comme un général talentueux au milieu des conflits religieux dans l'Empire d'Anbennar. Originaire de Bohême, Wallenstein a prouvé sa loyauté envers l'empereur tôt dans la guerre. Il a déjà commencé à fournir des perspectives et des innovations tant à grande qu'à petite échelle de la guerre et, nous l'espérons, continuera à être un atout précieux dans nos efforts pour restaurer la foi et l'ordre dans l'Empire."
 tyw_events.15.a:0 "L'Empereur [Root.Monarch.GetName] a besoin de loyauté maintenant plus que jamais."
 tyw_events.16.t:0 "Les loyautés de Wallenstein remises en question"
 tyw_events.16.d:0 "Depuis qu'il a rejoint nos forces au début de la guerre, Wallenstein s'est montré très capable comme commandant militaire. Cependant, bien qu'il ait fait un effort pour paraître loyal et reconnaissant, il est connu pour être en désaccord avec de nombreuses décisions de l'Empereur [Root.Monarch.GetName]. Des sources fiables indiquent qu'il a même été irrité par certains de nos refus de compromis dans le conflit. Beaucoup le soupçonnent maintenant d'envisager de déserter pour l'ennemi. Heureusement, certains des officiers de ses forces nous sont encore loyaux en premier. Ils pourraient s'assurer qu'il ne combatte jamais pour une autre Ligue."
 tyw_events.16.a:0 "Il doit être capturé, mort ou vif."
 tyw_events.16.b:0 "Nous avons besoin de lui vivant, à la tête de nos troupes."
 tyw_events.17.t:0 "Wallenstein nous trahit"
 tyw_events.17.d:0 "Les pires craintes de nos conseillers se sont avérées vraies. Notre dépendance envers le leadership militaire de Wallenstein alors que la guerre mettait une pression accrue sur notre nation et Empire l'a rendu assez audacieux pour nous déserter au milieu de la guerre, fuyant pour rejoindre l'ennemi. Nos troupes ne l'ont pas vu pour la dernière fois sur les champs de bataille, mais il mènera maintenant les armées des traîtres contre l'Empereur."
 tyw_events.17.a:0 "Nous aurions dû le faire tuer quand nous en avions l'occasion."
 tyw_events.17.a.tt:0 "Albrecht von Wallenstein passera à [This.GetName]."
 tyw_events.18.t:0 "Le Général Wallenstein déserte [From.GetName]"
 tyw_events.18.d:0 "Notre guerre pour arrêter la tyrannie [From.Religion.GetName] de l'Empereur d'Anbennar à [From.Capital.GetCapitalName] a fait douter même ses propres généraux de leur cause. Après avoir vu le refus de [From.GetName] de faire des compromis alors que la guerre se prolonge, Albrecht von Wallenstein a décidé qu'il serait mieux servi en nous servant. Il semble qu'ils aient douté de ses loyautés une fois de trop."
 tyw_events.18.a:0 "Une prophétie auto-réalisatrice, mais fortunée pour nous."
 tyw_events.19.t:0 "Siège d'hiver"
 tyw_events.19.d:0 "Un siège qui se prolonge pendant l'hiver est toujours coûteux et mieux vaut l'éviter complètement. Cet hiver a été particulièrement rude et l'un de nos sièges a vu équipement et soldats geler. À ce rythme, nous devrons soit récupérer et attendre la fin de l'hiver, soit envoyer plus d'hommes, dont beaucoup mourront probablement du froid et de la famine. Combien sommes-nous prêts à sacrifier pour prendre cette seule ville ?"
 tyw_events.19.a:0 "Autant qu'il le faudra."
 tyw_events.19.b:0 "Prenons notre temps."
 tyw_events.20.t:0 "Fin de la Maison des Griffons"
 tyw_events.20.d:0 "L'état tumultueux de l'Empire d'Anbennar a eu un impact sur la santé de notre [Root.Monarch.GetTitle]. Notre petite nation se trouve au milieu d'un conflit naissant, et au pire moment possible, notre dirigeant est en mauvaise santé et manque d'héritiers. Avec sa disparition, la Poméranie voit la fin des Griffons, qui ont gouverné cette nation pendant des siècles, et risque la partition par les puissances qui frappent de manière opportuniste contre les parties les plus faibles de l'Empire."
 tyw_events.20.a:0 "Nous persisterons comme souverains à travers ces temps difficiles."
 tyw_events.20.a.tt:0 "[This.GetName] obtiendra des revendications sur toutes les provinces poméranies."
 tyw_events.21.t:0 "Fin de la Maison des Griffons"
 tyw_events.21.d:0 "Après avoir gouverné la Poméranie pendant des siècles, le dernier [From.Monarch.GetTitle] de la Maison des Griffons à régner dans le pays est décédé sans héritier. Avec les conflits religieux en cours dans l'Empire d'Anbennar, il ne serait pas impossible pour quelqu'un d'ambitieux de revendiquer la région. Cependant, nous ne sommes pas les seuls à l'avoir remarqué, et de nombreuses puissances pourraient bientôt se préparer à obtenir leur part des terres poméranies."
 tyw_events.21.a:0 "Nous reconnaissons une opportunité quand nous en voyons une."
 tyw_events.22.t:0 "Bataille de [Root.GetCapitalName]"
 tyw_events.22.d:0 "La Guerre de la Ligue a été amenée au cœur de notre nation, et pourtant nous avons subi une défaite. Les forces [From.GetAdjective]s ont engagé les nôtres près de notre capitale de [Root.Capital.GetCapitalName] et ont gagné, ce qui a causé à la fois inquiétude et honte dans notre armée. La guerre peut encore être gagnée, mais cette bataille pourrait encore être mémorisée, que nous le voulions ou non."
 tyw_events.22.a:0 "Nous ne pouvons qu'espérer que nos succès futurs l'éclipseront."
 tyw_events.23.t:0 "Ennemis de la Ligue"
 tyw_events.23.d:0 "Notre décision de prendre position dans le conflit religieux de l'Empire d'Anbennar a causé des discussions encore plus vives sur la position de [Root.GetName] concernant la question de la Réforme. Nous ne doutons peut-être pas des objectifs de la Ligue, mais il ne manque pas de gens dans notre pays qui le font. Ce qui nous semble évident, que nous avons choisi le bon camp pour le bien de tous les [Root.GetAdjective]s quelle que soit leur foi, semble être les mensonges d'hérétiques pour certains de nos sujets. Les opposants les plus zélés ont pris les armes contre leurs dirigeants et la Ligue."
 tyw_events.23.a:0 "Que ces gens connaissent peu les affaires internationales."
 tyw_events.24.t:0 "$THEOLOGIAN$$INQUISITOR$ remet notre foi en question"
 tyw_events.24.d:0 "[Root.Monarch.GetName] est un dirigeant pragmatique. Bien qu'aussi pieux que n'importe quel [Root.Monarch.GetTitle], les alliances politiquement opportunes passent en premier, et malgré notre foi [Root.Religion.GetName], nous avons rejoint une Ligue religieuse qui s'oppose à nos croyances. La plupart des conseillers voient cela comme une nécessité, certains d'entre eux l'ont peut-être même suggéré.\n\n$THEOLOGIAN$$INQUISITOR$ n'est pas un tel conseiller. Personne de foi, ils ont mal caché leur indignation face à notre décision et leur attitude commence maintenant à impacter notre diplomatie internationale. Bien que nous restions loyaux à la Ligue, nous pourrions avoir du mal à maintenir de bonnes relations avec ses membres quand nous sommes non seulement de la mauvaise foi, mais gardons une telle compagnie."
 tyw_events.24.a:0 "S'ils ne peuvent pas garder la bouche fermée, ils doivent partir."
 tyw_events.24.b:0 "Nos alliés méritent d'entendre la vérité, même quand ils ne l'aiment pas."
 tyw_events.25.t:0 "Les [Root.Religion.GetName]s [Root.Culture.GetName]s remettent en question notre règne"
 tyw_events.25.d:0 "Le peuple de [Root.GetName] a souvent vu sa loyauté envers [Root.Owner.GetName] remise en question à la fois en raison de son héritage [Root.Culture.GetName] et de son refus de suivre la foi [Root.Owner.Religion.GetName]. Cela a conduit certains d'entre eux à se demander s'ils appartiennent vraiment sous le règne de [Root.Owner.Monarch.GetName]. De plus en plus, ils demandent le droit pour des locaux représentant leurs intérêts de prendre des décisions sur la façon dont la province devrait être gouvernée. Nous atteignons un point où une sorte de compromis doit être fait."
 tyw_events.25.a:0 "Donnez le pouvoir aux nobles [Root.Religion.GetName]s [Root.Owner.Culture.GetName]s de la région."
 tyw_events.25.b:0 "Donnez le pouvoir aux [Root.Culture.GetName]s qui suivent la foi [Root.Owner.Religion.GetName]."
 tyw_events.25.c:0 "Acceptez de leur donner le droit de se gouverner eux-mêmes dans une certaine mesure."
 tyw_events.26.t:0 "Éducation jésuite pour [Root.Heir.GetName]"
 tyw_events.26.d:0 "La Compagnie de Jésus, une congrégation plus communément connue par le nom de ses membres, les Jésuites, a offert de fournir une éducation au jeune [Root.Heir.GetName]. De nombreux parents et conseillers ont soutenu la suggestion, espérant qu'il grandira pour devenir, comme les Jésuites s'appellent eux-mêmes, un soldat de Dieu. En ces temps troublés, affirment-ils, la force de l'esprit est le trait le plus important d'un dirigeant. D'autres craignent qu'un peuple si proche de l'Église endurcirait le cœur du [Root.Monarch.GetTitle] naissant envers ceux qui s'écartent de sa doctrine."
 tyw_events.26.a:0 "Nous avons besoin d'un [Root.Monarch.GetTitle] qui peut combattre pour notre foi !"
 tyw_events.26.a.tt:0 "[Root.Heir.GetName] sera élevé comme un soldat de Dieu, versé dans les affaires militaires, mais dur envers les hérétiques."
 tyw_events.26.b:0 "Nous ne permettrons pas à un ordre religieux d'influencer notre futur dirigeant."
 tyw_events.27.t:0 "Le [Root.Monarch.GetTitle] éduqué par les Jésuites monte sur le trône"
 tyw_events.27.d:0 "Confier l'éducation de [Root.Monarch.GetName] aux Jésuites a donné ce que la plupart considéreraient comme les résultats attendus. Le nouveau [Root.Monarch.GetTitle] ne manque pas de conviction ni de courage, mais est farouchement loyal à l'Église Ravélienne et aux Jésuites en particulier. Les fidèles se réjouissent, mais les hérétiques craignent maintenant [Root.GetName] plus que jamais."
 tyw_events.27.a:0 "Ad maiorem Dei gloriam."
 tyw_events.28.t:0 "Les nobles [Root.Culture.GetName]s fuient à l'étranger"
 tyw_events.28.d:0 "La guerre pour l'unité religieuse dans l'Empire d'Anbennar ne va pas en notre faveur. Notre capitale de [Root.Capital.GetCapitalName], considérée par beaucoup comme le dernier refuge sûr pour ceux qui peuvent l'atteindre, a été prise par l'ennemi. Maintenant la noblesse, à la fois ceux qui résidaient dans la ville au départ et ceux qui y avaient fui, craint que [Root.GetName] soit perdue et a commencé à s'échapper vers les voisins qui pourraient encore abriter de bons [Root.Religion.GetName]s."
 tyw_events.28.a:0 "Laissez-les fuir et revenir quand [Root.GetName] connaîtra des jours meilleurs."
 tyw_events.28.b:0 "Mettez-les en sécurité dans nos frontières, quoi qu'il en coûte."
 tyw_events.29.t:0 "Les nobles [From.Culture.GetName]s cherchent refuge"
 tyw_events.29.d:0 "L'occupation de [From.Capital.GetCapitalName] a effrayé beaucoup parmi la noblesse de [From.GetName], les faisant fuir le pays et espérant trouver refuge parmi leurs coreligionnaires [Root.Religion.GetName]s ici. Puisque le conflit est religieux, au moins en surface, on s'attendrait à ce que nous aidions ceux qui partagent notre foi. Pourtant les yeux des ennemis de la Ligue sont toujours sur nous, et il y en a beaucoup qui ne verraient pas d'un bon œil leurs ennemis sous notre protection."
 tyw_events.29.a:0 "Il y a sûrement d'autres qui peuvent porter ce fardeau."
 tyw_events.29.b:0 "Les fidèles [Root.Religion.GetName]s trouveront toujours un havre ici."
 tyw_events.30.t:0 "Íñigo Vélez de Guevara"
 tyw_events.30.d:0 "Des conflits comme nos préoccupations actuelles concernant l'état religieux de l'Empire d'Anbennar, bien qu'ils puissent sembler décidés par la guerre, nécessitent également du tact et de la finesse diplomatique pour être gagnés. Il se trouve que nous avons un homme à notre disposition, le Comte d'Oñate, qui possède exactement ces talents. Nos ennemis dans l'Empire ont des voisins qui pourraient bien être intéressés de savoir que nous préférerions voir ces terres dans d'autres mains. Simplement les en informer pourrait déclencher un conflit à notre avantage."
 tyw_events.30.a:0 "Faites savoir que [Root.GetName] souhaite leur donner les terres de nos ennemis."
 tyw_events.30.a.tt:0 "Offrez à [This.GetName] une revendication sur une nation voisine de l'Empire qui s'oppose dans les Ligues."
 tyw_events.30.b:0 "Ses talents sont mieux employés à des efforts diplomatiques à long terme."
 tyw_events.31.t:0 "[From.GetName] offre un ennemi de la Ligue"
 tyw_events.31.d:0 "L'allégeance de l'un de nos voisins, un membre de l'Empire, semble avoir irrité [From.GetName]. Ils ont envoyé un ambassadeur, un homme nommé Íñigo Vélez de Guevara qui semble avoir mené des missions diplomatiques dans diverses parties de l'Empire, pour nous offrir une revendication sur les terres de ceux qui se sont opposés à leur Ligue.\n\nDes temps difficiles nous attendent peut-être, mais les temps difficiles ne sont pas sans opportunités. C'est une chance d'étendre nos frontières, ou alternativement de montrer que nous ne voulons aucun mal à nos voisins dans l'Empire, indépendamment des loyautés de Ligue."
 tyw_events.31.a:0 "Acceptez l'offre de l'ambassadeur."
 tyw_events.31.b:0 "Faites savoir à tous que nous ne revendiquons pas cette terre."
 tyw_events.32.t:0 "Imposer le péage du Sund à la Suède"
 tyw_events.32.d:0 "Le péage du Sund a été une importante source de revenus pour le Danemark depuis le début du XVe siècle et nous a permis d'exercer une influence significative sur le commerce à travers l'Øresund depuis.\n\nLa Suède a été exemptée des péages depuis que nos pays étaient unis dans l'Union de Kalmar. Cependant, la Suède n'est plus sous le règne de la couronne danoise et ne l'est plus depuis longtemps. Peut-être devraient-ils commencer à payer le prix eux aussi : après tout, il n'y a qu'un certain degré de générosité que nous pouvons montrer pour le bon vieux temps."
 tyw_events.32.a:0 "Nous aurions dû supprimer cette exemption il y a longtemps."
 tyw_events.32.b:0 "Des traditions comme celles-ci sont ce qui maintient la paix."
 tyw_events.33.t:0 "Le Danemark impose le péage du Sund"
 tyw_events.33.d:0 "Malgré leur contrôle du Sund leur donnant déjà une position puissante dans le commerce baltique, les Danois semblent avoir laissé leur cupidité prendre le dessus. Nous avons été informés que le péage du Sund, dont notre nation a été exemptée depuis les jours de l'Union de Kalmar, est maintenant imposé aux navires suédois également. C'est déjà une nuisance significative, et certains conseillers suggèrent même des plans pour entrer en guerre à cause de cette grave insulte."
 tyw_events.33.a:0 "Diables danois !"
 tyw_events.34.t:0 "Demander le soutien ottoman pour revendiquer la Pologne"
 tyw_events.34.d:0 "Nous vivons une époque de possibilités, et notre nation n'a fait que commencer à étendre ses frontières. Nés à la frontière entre le monde chrétien et musulman, avec l'Empire d'Anbennar et l'Empire Ottoman si proches, nous devons utiliser nos connexions sagement pour persister. Ayant maintenu de bonnes relations diplomatiques avec les Turcs, nous pouvons tirer parti de leur soutien pour préparer une invasion des terres polonaises et les revendiquer pour nous."
 tyw_events.34.a:0 "Le moment est propice. C'est notre chance."
 tyw_events.34.a.tt:0 "Si les Ottomans sont d'accord, nous devrions avoir des revendications sur les provinces polonaises voisines après une semaine."
 tyw_events.34.b:0 "La Transylvanie ne souhaite aucun mal aux Polonais."
 tyw_events.35.t:0 "La Transylvanie demande un soutien pour revendiquer la Pologne"
 tyw_events.35.d:0 "[From.Monarch.GetName] de Transylvanie nous a fait savoir qu'ils envisagent une invasion de la Pologne. Croyant que nous bénéficierions de voir leurs voisins affaiblis, ils veulent notre soutien implicite pour revendiquer ces terres."
 tyw_events.35.a:0 "Une excellente initiative."
 tyw_events.35.b:0 "Nous ne voyons pas l'intérêt d'une telle campagne."
 tyw_events.36.t:0 "Libérer la Hongrie de l'oppression religieuse"
 tyw_events.36.d:0 "La formation des Ligues dans l'Empire d'Anbennar a clairement montré que nous vivons une époque où les nations ne restent plus les bras croisés et ne permettent plus aux gens de leur foi de souffrir sous des dirigeants impies. Non loin de notre frontière, les [Root.Religion.GetName]s hongrois sont exactement dans cette situation inacceptable. Notre nation a des liens forts avec la Hongrie en droit et en esprit, et ne peut laisser cela continuer. Il est temps pour nous de les libérer et de reconquérir la terre, afin que le sang [Root.Religion.GetName] ne soit plus jamais versé sur elle."
 tyw_events.36.a:0 "La Transylvanie se tient aux côtés des Hongrois."
 tyw_events.37.t:0 "Âge d'Or de la Transylvanie"
 tyw_events.37.d:0 "Notre nation connaît peut-être sa meilleure ère depuis qu'elle est née sous sa forme actuelle. [Root.Monarch.GetName] s'est avéré être un [Root.Monarch.GetTitle] très capable, et des investissements sont faits pour faire de [Root.Capital.GetCapitalName] une ville cultivée et impressionnante. Nous espérons répandre l'architecture et l'éducation dans toute la nation au cours de la prochaine décennie, et prions pour que cet âge de paix et de prospérité dure."
 tyw_events.37.a:0 "Nous construirons une nation qui traversera les âges."
 tyw_events.38.t:0 "Unis dans la prière"
 tyw_events.38.d:0 "[Root.Monarch.GetName], étant un homme de foi, a trouvé une façon inhabituellement personnelle de créer la confiance et d'assurer la loyauté. Lorsqu'il rencontre un autre dirigeant [Root.Religion.GetName] en personne, il leur demandera souvent de prier ensemble pour leurs objectifs communs. Bien que cela abandonne peut-être une partie de la distance parfois nécessaire en diplomatie, cela peut créer des liens plus forts que n'importe quel accord formel. Il a envisagé d'employer cette méthode à nouveau lors d'une prochaine visite dans une capitale étrangère, bien qu'il ne soit pas certain que cela réussisse."
 tyw_events.38.a:0 "Les âmes, pas seulement les esprits, doivent s'unir pour qu'une vraie confiance se forme."
 tyw_events.38.b:0 "Peut-être serait-il préférable de pratiquer une diplomatie plus séculière."
 tyw_events.39.t:0 "Dieu est Espagnol"
 tyw_events.39.d:0 "Notre guerre en cours pour l'état religieux de l'Empire d'Anbennar se passe bien. L'optimisme de voir nos efforts pour accomplir des objectifs religieux a pris une forme particulièrement spirituelle, l'un de nos ministres déclarant que Dieu est Espagnol, combattant pour notre nation ces jours-ci. Si les choses continuent d'aller en notre faveur, même nos ennemis devront peut-être admettre qu'il y a une part de vérité là-dedans."
 tyw_events.39.a:0 "Quel meilleur allié un soldat pourrait-il jamais demander ?"
 tyw_events.40.t:0 "Dieu veut la paix"
 tyw_events.40.d:0 "Notre guerre en cours pour l'état religieux de l'Empire d'Anbennar se passe mal. Puisque la religion est au cœur de ce conflit, beaucoup de ceux qui prétendaient autrefois que les Dieux étaient avec nous quand nous avons décidé de rejoindre la Ligue prétendent maintenant que les Dieux nous privent des moyens de guerre et veulent que nous fassions la paix. Bien que loin d'être la seule interprétation des événements actuels, elle a été assez répétée pour augmenter les doutes que la guerre puisse être gagnée."
 tyw_events.40.a:0 "C'est une pauvre foi qui augmente le doute."
 tyw_events.41.t:0 "Augmentation du troc"
 tyw_events.41.d:0 "Alors que le mauvais état de la monnaie [Root.GetAdjective] devient de plus en plus préoccupant pour nous, les gens du commun ont commencé à chercher d'autres solutions. Beaucoup se méfient de plus en plus de l'utilisation de l'argent et l'évitent autant que possible, revenant à d'anciens moyens de commerce comme le système de troc. Peut-être que leurs inquiétudes sont déplacées, mais si nous n'agissons pas rapidement, nous pourrions perdre notre emprise sur l'économie et le pays lui-même."
 tyw_events.41.a:0 "Espérons simplement que cela fonctionne bien pour eux jusqu'à ce que nous ayons le problème sous contrôle."
 tyw_events.41.b:0 "Demandez l'avis de nos meilleurs économistes pour arrêter cela par tous les moyens."
 tyw_events.42.t:0 "Capturer la flotte au trésor espagnole"
 tyw_events.42.d:0 "Nos corsaires ont longtemps été une nuisance pour les flottes espagnoles, mais un plan audacieux récemment élaboré nous rendrait plus qu'une simple nuisance. La flotte au trésor espagnole quitte les colonies, transportant une cargaison d'argent, d'or et de marchandises exotiques valant plus que leur poids en l'un ou l'autre. Nos corsaires prévoient d'intercepter ces navires dans les premières étapes de leur route. Ils nous assurent que la cargaison peut être capturée avec peu de risques, et qu'elle ne devrait échouer que si quelqu'un trahit notre plan aux Espagnols."
 tyw_events.42.a:0 "Leurs trésors seraient mieux entre des mains [Root.GetAdjective]s."
 tyw_events.42.b:0 "Nous ne souhaitons guère attirer la colère de l'armada espagnole."
 tyw_events.43.t:0 "Flotte au trésor espagnole capturée !"
 tyw_events.43.d:0 "Un par un, les navires de la flotte au trésor espagnole ont été interceptés, beaucoup d'entre eux pris par surprise, certains piégés, non préparés à ce que nous fassions une attaque aussi audacieuse. Malgré certains navires ayant reçu un avertissement au préalable, la cargaison des navires capturés stimulera notre économie pendant des mois, sinon des années. Les corsaires sont revenus à [Root.Capital.GetCapitalName] en héros. Il est peu probable que nous voyions jamais une capture aussi réussie."
 tyw_events.43.a:0 "Pourtant ce fut une joie de la voir une fois."
 tyw_events.44.t:0 "Flotte au trésor capturée par les Hollandais"
 tyw_events.44.d:0 "Les corsaires hollandais qui ont longtemps entravé nos efforts pour ramener les marchandises commerciales des colonies lointaines ont récemment lancé une attaque directe contre notre flotte au trésor juste au moment où elle partait pour les ports espagnols pour ramener l'argent et l'or vers notre patrie. Bien que certains navires aient été préparés et aient réussi à éviter l'assaut, ceux qui n'y sont pas parvenus nous ont coûté cher. Il n'a pas encore été décidé comment ni ce que les Hollandais paieront pour cela, mais ils paieront certainement."
 tyw_events.44.a:0 "Or, argent et sang seraient tous des monnaies acceptables."
 tyw_events.45.t:0 "Un [Root.Monarch.GetTitle] éduqué"
 tyw_events.45.d:0 "L'éducation que [Root.Monarch.GetName] a reçue pendant la régence l'a préparé à régner comme [Root.Monarch.GetTitle], tout comme nous l'espérions. Les conseillers qui l'ont fournie sont fiers d'avoir laissé un tel héritage durable dans la sagesse et les motivations de l'homme qui gouvernera [Root.GetName]."
 tyw_events.45.a:0 "Ils devraient l'être."
 tyw_events.46.t:0 "Victoire à [From.Capital.GetCapitalName] !"
 tyw_events.46.d:0 "La Guerre de la Ligue nous a amenés jusqu'à la capitale de l'un de nos ennemis. Frappant au cœur de leur nation, nous avons été victorieux, à leur grande honte. Parmi les nombreux soldats talentueux impliqués, l'un en particulier a été loué pour avoir contribué à la victoire et a été promu au poste de général après avoir montré un calme exceptionnel et une réflexion rapide pendant le chaos."
 tyw_events.46.a:0 "Il pourrait encore frapper la peur dans le cœur de plus de nations."
 tyw_events.47.t:0 "Préparation de nos défenses"
 tyw_events.47.d:0 "[Root.GetName] est attaqué, mais l'ennemi n'a pas encore avancé très loin dans nos terres. Nos stratèges militaires suggèrent de fortifier nos défenses là où elles sont les plus nécessaires. Ils se tournent cependant vers [Root.Monarch.GetName] pour une opinion sur où exactement ce serait. Il est certainement vrai que nous ne pouvons pas nous permettre de perdre le contrôle de notre capitale mais il pourrait être préférable de fortifier d'abord nos frontières."
 tyw_events.47.a:0 "Concentrez-vous sur la préparation de la capitale et des provinces environnantes."
 tyw_events.47.b:0 "Les fortifications doivent commencer aux points de nos frontières."
 tyw_events.48.t:0 "Vraies intentions"
 tyw_events.48.d:0 "Bien que la Guerre de la Ligue ait été lancée pour des raisons religieuses, l'allégeance religieuse de l'Empire d'Anbennar n'est pas la seule préoccupation des membres. Certains voient la guerre comme une chance de revendiquer des terres à certains de ceux du camp opposé, considérant les objectifs religieux des dirigeants comme secondaires, sinon entièrement un prétexte.\n\nRécemment, nous avons été confrontés par des ambassadeurs du chef de notre Ligue, qui nous implorent de clarifier nos vraies motivations pour le bien des futures négociations de paix."
 tyw_events.48.a:0 "Nous espérons finir cette guerre avec plus de terres et ne faisons aucun secret de cela."
 tyw_events.48.b:0 "[Root.GetName] combat pour la cause de la foi elle-même !"
 tyw_events.49.t:0 "[From.GetName] prétend combattre pour des terres"
 tyw_events.49.d:0 "Bien que la foi [Root.Religion.GetName] puisse être cruciale pour nous, certains membres de la Ligue ne sont pas si nobles dans leurs intentions. Un ambassadeur récemment revenu de [From.Capital.GetCapitalName] avec des nouvelles des [From.GetAdjective]s, qui ont admis que ce qu'ils espèrent vraiment gagner de cette guerre est l'expansion de leurs frontières. Nouvelles désagréables, affaiblissant la force de notre coopération et notre position pour négocier la paix."
 tyw_events.49.a:0 "Au moins ils sont honnêtes dans leur égoïsme."
 tyw_events.50.t:0 "[From.GetName] prétend combattre pour la foi"
 tyw_events.50.d:0 "Tous les membres de la Ligue n'ont pas rejoint notre camp pour combattre pour la cause [Root.Religion.GetName]. Beaucoup ont simplement choisi notre camp parce que c'est politiquement opportun. Les nouvelles de [From.GetName], cependant, sont qu'ils se soucient vraiment de notre cause et voient la Ligue comme une alliance religieuse avant tout, et vont au combat sachant qu'ils font l'œuvre des Dieux à nos côtés."
 tyw_events.50.a:0 "Espérons qu'ils restent fidèles à un idéal si noble."
 AUTO_TRANSPORT_CURRENT_MISSION:0 "$NAVIES|Y$ transportent actuellement $ARMIES|Y$ vers $TARGET|Y$."
 MOVE_AUTO_TRANSPORT_TITLE:0 "Transport automatique"
 MOVE_AUTO_TRANSPORT_DIALOG:0 "Souhaitez-vous utiliser le $LIST$ pour transporter automatiquement §Y$UNIT$§! vers §Y$DESTINATION$§! ?"
 EXPLORE_MISSION_SEA_TITLE:0 "Explorer une zone inexplorée"
 EXPLORE_MISSION_SEA_DIALOG:0 "Souhaitez-vous ordonner à $UNIT$ d'explorer automatiquement ces mers ?"
 EXPLORE_MISSION_CIRCUMNAVIGATE_TITLE:0 "Faire le tour du monde"
 EXPLORE_MISSION_CIRCUMNAVIGATE_DIALOG:0 "Souhaitez-vous ordonner à $UNIT$ de tenter de faire le tour du monde ? C'est très difficile et peut entraîner la perte de la flotte par attrition."
 EXPLORE_MISSION_COAST_TITLE:0 "Cartographier le littoral"
 EXPLORE_MISSION_COAST_DIALOG:0 "Souhaitez-vous ordonner à $UNIT$ de cartographier automatiquement ce littoral ?"
 SPLIT_UNIT_AUTO_TRANSPORT_TITLE:0 "Transport automatique"
 SPLIT_UNIT_MOVE_AUTO_TRANSPORT_DIALOG:0 "Souhaitez-vous diviser §Y$UNIT$§! et utiliser $LIST$ pour transporter automatiquement les unités divisées vers §Y$DESTINATION$§! ?"
 per_najaf:0 "Les Sanctuaires de Nadjaf"
 desc_per_najaf:0 "Nadjaf, lieu de repos final d'Ali, est l'un des endroits les plus sacrés sur terre pour les Chiites. En tant que gardiens de cette ville sainte, nous avons entrepris divers projets pour faire de ce site tout ce qu'il est censé être."
 per_miniature_school:0 "École de peinture miniature persane"
 desc_per_miniature_school:0 "L'industrie de la peinture miniature est en plein essor. Tous ceux qui comptent dans le monde islamique souhaitent acquérir ou imiter les œuvres de nos maîtres."
 per_mushashaiya:0 "La Musha'sha'iyyah"
 desc_per_mushashaiya:1 "La secte militante Musha'sha'iyyah s'est emparée de cette province, entraînant troubles et instabilité sociale."
 per_safawiya:0 "La Safawiyyah"
 desc_per_safawiya:1 "L'ordre militant Safawiyyah s'est emparé de cette province et beaucoup de ses habitants aspirent à rejoindre leurs coreligionnaires."
 per_shia_conversion_policy:0 "Un État Chiite"
 desc_per_shia_conversion_policy:0 "Un pays fort est un pays de foi forte. Nous promouvons activement le Chiisme Duodécimain comme la foi pour le peuple de Perse."
 per_pragmatic_ulema:0 "Conversion du clergé"
 desc_per_pragmatic_ulema:0 "Nous avons adopté une politique de généreuses récompenses pour les religieux sunnites qui se convertissent à notre nouvelle religion d'État."
 per_conversion_of_the_clergy:0 "Conversion du clergé"
 desc_per_conversion_of_the_clergy:0 "Tous les religieux qui ne sont pas disposés à devenir de fidèles adeptes de notre nouvelle religion d'État sont activement persécutés. Il ne doit y avoir aucun traître parmi le clergé de notre État."
 per_shiite_immigration:0 "Migration Chiite"
 desc_per_shiite_immigration:0 "Des érudits, juristes, religieux et autres hommes de qualité chiites affluent vers nos rivages de partout dans le monde."
 per_building_isfahan:0 "Reconstruction d'Ispahan"
 desc_per_building_isfahan:0 "Les ressources de cette zone sont en partie consommées par le projet de refaire la ville d'Ispahan en capitale mondiale."
 per_isfahan_maidan:0 "Ispahan nisf-i Jahan"
 desc_per_isfahan_maidan:0 "« Ispahan est la moitié du monde » est un vieux dicton. Après notre restructuration de la ville, c'est plus vrai que jamais. Cette ville est la capitale artistique, politique et culturelle non seulement de la Perse mais de tout le monde persan."
 MOVE_WITH_TRANSPORT:0 "Il est possible de se déplacer ici avec l'aide de navires de transport."
 MOVE_WITH_TRANSPORT_BUSY:0 "Il est possible de se déplacer ici avec l'aide de navires de transport, mais toutes les flottes de transport sont actuellement occupées."
 CAN_EXPLORE_TOOLTIP:0 "Faites un clic droit pour ordonner à votre marine d'explorer cette province."
 CANNOT_CIRCUMNAVIGATE_ALREADY_CIRCUMNAVIGATED:0 "Vous ne pouvez faire le tour du monde qu'une seule fois !"
 CANNOT_CIRCUMNAVIGATE_NO_TECH:0 "Vous avez besoin d'au moins le niveau §Y$NUM$§! de technologie diplomatique pour pouvoir faire le tour du monde."
 CANNOT_EXPLORE_NO_EXPLORER:1 "Vous devez avoir un Explorateur à la tête de cette marine pour pouvoir l'envoyer en mission d'exploration.\n"
 CANNOT_EXPLORE_NO_ADJACENT:1 "Vous devez explorer une province adjacente pour pouvoir y envoyer des explorateurs.\n"
 CANNOT_EXPLORE_NOT_ENOUGH_SHIPS:0 "Vous devez avoir un total d'au moins 3 navires légers et lourds dans cette flotte pour pouvoir explorer avec elle."
 CANNOT_EXPLORE_NOT_IN_PORT:0 "Votre flotte doit être au port pour pouvoir l'envoyer en mission d'exploration. "
 CANNOT_EXPLORE_TOO_FAR_AWAY:0 "Cette province est trop éloignée de votre province centrale la plus proche pour pouvoir l'explorer."
 flavor_per.7.t:0 "Peinture miniature persane"
 flavor_per.7.d:0 "Dans l'art persan, l'interdiction de représenter la figure humaine n'a jamais atteint la littérature non religieuse et la noblesse persane commande des manuscrits enluminés contenant des peintures miniatures exquises et très coûteuses depuis aussi longtemps que quiconque s'en souvienne.\nAvec la renaissance de l'Empire perse, l'industrie de la peinture miniature est maintenant en plein essor. Les œuvres des maîtres de l'école de $CAPITAL$ attirent non seulement des acheteurs nationaux mais sont maintenant exportées dans tout le monde islamique."
 flavor_per.7.a:0 "Entendu."
 flavor_per.8.t:0 "Iskander Munshi"
 flavor_per.8.d:0 "Après une vie dans la bureaucratie royale, Iskandar Beg Munshi a achevé une grande chronique de l'histoire de notre État. Commençant par la fondation de notre dynastie, Munshi continue à raconter les événements de chaque Shah depuis. Les parties plus récentes de la période couverte par la chronique s'appuient sur la riche expérience personnelle de Munshi de son temps au service du trône."
 flavor_per.8.a:0 "Entendu."
 flavor_per.9.t:0 "Nadjaf"
 flavor_per.9.d:0 "Nous avons la chance d'être les gardiens de Nadjaf, l'une des villes les plus saintes du monde et le lieu de repos de l'Imam Ali. Au cours des dernières années, pendant les luttes de Tamerlan, des Jalayirides et des Qara Qoyunlu, la ville et ses sanctuaires sont devenus quelque peu négligés. Il est de notre devoir de rectifier cette situation."
 flavor_per.9.a:0 "Nous devons faire tout notre possible pour embellir Nadjaf et ses sanctuaires."
 flavor_per.9.b:0 "Protégeons Nadjaf sans nous livrer à l'extravagance."
 flavor_per.10.t:0 "L'ascension de la Musha'sha'iyyah"
 flavor_per.10.d:0 "Une secte millénariste centrée autour du théologien irakien Mohammed Ibn Falah gagne rapidement des adeptes parmi les tribus arabes et persanes du sud de la Mésopotamie. Alors que la secte continue de gagner des adeptes et des actifs financiers, il reste incertain si Ibn Falah ou l'un de ses successeurs deviendra un facteur significatif dans la politique de la Perse."
 flavor_per.10.a:0 "Entendu."
 flavor_per.11.t:0 "L'ascension de la Safawiyyah"
 flavor_per.11.d:0 "La riche secte soufie Safawiyyah du nord-ouest de la Perse a commencé une transformation d'une secte largement ascétique en un ordre militaire. Les idées de la secte ont trouvé un écho parmi les tribus turcomanes en Perse et les dirigeants de la secte sont de plus en plus considérés comme des êtres semi-divins. Quel effet cela aura sur la politique de la Perse reste à voir."
 flavor_per.11.a:0 "Entendu."
 flavor_per.12.t:0 "Révolte Qizilbash"
 flavor_per.12.d:0 "L'apparition d'un État perse religieux a remué les cœurs des tribus Qizilbash dans nos terres. Des escarmouches mineures avec les fonctionnaires du gouvernement se sont maintenant transformées en un soulèvement généralisé."
 flavor_per.12.a:0 "Entendu."
 flavor_per.13.t:0 "Chiisme persan"
 flavor_per.13.d:0 "Pendant trop longtemps la Perse est restée divisée quand des envahisseurs étrangers sont entrés dans nos terres. Bien que $MONARCH$ soit un $MONARCHTITLE$ immensément populaire, un État durable ne devrait pas être construit uniquement sur des loyautés personnelles. La voie à suivre doit être d'unifier notre peuple à travers une identité religieuse commune différente de celle de nos voisins.\nBien que tous nos sujets ne s'identifieraient pas actuellement comme Chiites, il y a de nombreux cas de coutumes chiites, comme l'honneur des Imams, pratiquées par les Musulmans de Perse. En veillant à ce que notre peuple adhère tous au Chiisme Duodécimain, nous pouvons créer une identité persane qui résistera à l'épreuve du temps."
 flavor_per.13.a:0 "Notre peuple sera unifié par sa foi."
 flavor_per.13.b:0 "Il y a aussi de la force dans la diversité."
 flavor_per.14.t:0 "La foi des oulémas sunnites"
 flavor_per.14.d:0 "Bien que l'Islam populaire en Iran puisse être positivement prédisposé envers le Chiisme, les oulémas ont toujours été dominés par les Sunnites. Pour certains de ces religieux, la transition a été très douce, presque suspecte, tandis que d'autres ont refusé de s'adapter aux nouvelles voies de notre État."
 flavor_per.14.a:0 "Récompensez ceux qui se convertissent."
 flavor_per.14.b:0 "Punissez ceux qui ne se convertissent pas."
 flavor_per.15.t:0 "Fuite des cerveaux chiites"
 flavor_per.15.d:0 "Cela fait maintenant des siècles qu'il n'y a pas eu d'État chiite fort en Iran ou ailleurs. Avec la naissance de notre royaume, un nombre croissant de théologiens chiites, de religieux et de toutes sortes d'intelligentsia chiite affluent vers nos frontières de partout dans le monde musulman.\nC'est assez fortuné car il y a une pénurie de juristes, de religieux et de fonctionnaires chiites dans nos terres, mais ce tournant des événements a fait que de nombreux monarques musulmans se sentent assez menacés par notre État."
 flavor_per.15.a:0 "Accueillons nos frères."
 flavor_per.15.b:0 "Nous ne devrions pas risquer d'irriter nos voisins."
 flavor_per.16.t:0 "Ispahan"
 flavor_per.16.d:0 "Si nous voulons construire une nation véritablement persane, nous devons créer une capitale digne et véritablement persane. Ispahan est une vieille ville située au cœur des terres de Perse et conviendrait bien à nos ambitions.\nDes architectes talentueux de toutes nos terres sont prêts à transformer cette vieille ville en un symbole approprié de notre puissance. C'est cependant un processus qui sera à la fois coûteux et long."
 flavor_per.16.a:0 "Que le travail commence !"
 flavor_per.16.b:0 "$CAPITAL_CITY$ est la capitale de ce pays."
 flavor_per.17.t:0 "Ispahan nisf-i Jahan"
 flavor_per.17.d:0 "La construction du nouveau centre royal à Ispahan est enfin terminée et devant nous se trouve maintenant l'une des plus grandes villes du monde. Commençant par l'avenue Chahar Bagh et se terminant par le grand Maydan-i Naqsh-i Jahan, nous avons maintenant rassemblé toutes les institutions gouvernementales de notre empire en un seul endroit.\nCe Maidan d'Ispahan est lui-même un microcosme de notre empire, une immense place remplie d'étals de marchands de toutes nos terres, dominée par la monumentale mosquée Masjid-i Shah, le Bazar Impérial et le Palais Ali Qapu de notre $MONARCHTITLE$. Dans le processus d'achèvement de la restructuration de la ville, de nombreuses nouvelles techniques de construction sont nées par nécessité et une génération d'artisans et d'architectes ont développé leurs métiers plus loin qu'on ne le pensait possible auparavant."
 flavor_per.17.a:0 "Excellent !"
 flavor_jaj.1.t:0 "L'État Siddi d'Habsan"
 flavor_jaj.1.d:0 "Les versions semblent diverger sur exactement comment c'est arrivé, certains disent qu'ils sont venus dans l'obscurité, d'autres qu'ils s'étaient cachés dans de grandes boîtes déguisées en cadeaux, mais d'une manière ou d'une autre le commandant de l'un de nos forts côtiers a réussi à perdre le contrôle à la fois de son fort insulaire et de toute la région sous son contrôle en même temps. Les auteurs sont un groupe de Siddis, d'anciens esclaves d'origine éthiopienne qui sont devenus une vue assez commune dans les marines et les armées de cette région.\nLe chef des Siddis a envoyé un émissaire à notre cour aujourd'hui, demandant que nous leur permettions de garder le contrôle du fort qu'ils ont pris en échange de leur service loyal à notre État."
 flavor_jaj.1.a:0 "Très bien."
 flavor_jaj.1.b:0 "Ces rebelles doivent être traités !"
 flavor_jaj.1.c:0 "Permettez-leur d'avoir carte blanche."
 mer_fortification_effort:0 "Fortifications du Mewar"
 desc_mer_fortification_effort:0 "Notre Rana a jugé bon de faire un examen général de tous les forts dans nos terres."
 mer_kumbalgarh:0 "Kumbhalgarh"
 desc_mer_kumbalgarh:0 "Cette zone est contrôlée par l'immense forteresse au sommet de la montagne de Kumbhalgarh. Ses longs et épais murs sont réputés n'être seconds qu'à ceux des terres lointaines de Chine."
 mer_vijaya_sthambha:0 "Vijaya Sthambha"
 desc_mer_vijaya_sthambha:0 "De style similaire aux anciens monuments jaïns de la même région, le Vijaya Sthambha ou Tour de la Victoire se dresse comme un monument au succès de notre dynastie."
 flavor_mer.1.t:0 "Vijaya Sthambha"
 flavor_mer.1.d:0 "Afin de commémorer ses victoires sur ses nombreux ennemis tels que le Sultan du Malwa, les Rajas traîtres du Marwar et le cupide Sultan du Gujarat, le Rana Kumbha a commencé la construction d'un monument unique en 1442.\nMettant plus de dix ans à être achevé, le Vijaya Sthambha avec ses neuf étages richement décorés est un témoignage non seulement de notre dynastie mais aussi de l'habileté et du savoir-faire de nos sculpteurs et architectes."
 flavor_mer.1.a:0 "Perfection !"
 flavor_mer.2.t:0 "Le retour du Rana Jodha Rathore"
 flavor_mer.2.d:0 "Quand nous avons annexé le royaume voisin du Marwar en 1438, c'était un acte de représailles. Les Ranas Rathore du Marwar, autrefois amis de confiance et régents de nos Rajas, avaient conspiré pour assassiner notre héritier royal et renverser notre royaume. Depuis lors, le dernier héritier restant de la lignée Rathore erre dans les déserts du Rajasthan, attendant son heure et guettant une opportunité de reconquérir son patrimoine.\nCe temps semble être enfin venu, du moins dans l'esprit de Jodha Rathore. Nous venons de recevoir la nouvelle que nos hommes dans le fort de Mandore au Marwar ont été submergés par des soldats loyaux à la cause des Rathores."
 flavor_mer.2.a:0 "Cela signifie la guerre."
 flavor_mer.2.b:0 "Passons l'éponge."
 flavor_mer.3.t:0 "Kumbhalgarh"
 flavor_mer.3.d:0 "Bien que le royaume du Mewar soit à la fois fier et fort, incarnation de l'esprit Rajput d'antan, il a peu d'amis et beaucoup d'ennemis. Afin de nous défendre et de dissuader tout envahisseur potentiel, nous devons fortifier notre royaume. Des plans ont été élaborés pour une forteresse utilisant la chaîne de l'Aravalli elle-même comme mur contre nos ennemis. Cette immense forteresse au sommet de la montagne nous permettrait de surveiller de près la plupart de nos terres et, avec le fort de Chittorgarh, fera de nos terres un cauchemar à contrôler pour tout envahisseur."
 flavor_mer.3.a:0 "Construisez Kumbhalgarh"
 flavor_mer.3.b:0 "Fortifiez plutôt la campagne."
 flavor_mer.4.t:0 "Mira Bai"
 flavor_mer.4.d:0 "Dans une tentative de réconcilier notre dynastie avec nos rivaux du Marwar, l'un de nos princes a été marié à la Princesse Rathore Mira Bai il y a quelques années. Le mariage devait devenir une affaire assez courte, cependant, car la jeune princesse est devenue veuve quelques années plus tard.\nEn tant que veuve, Mira Bai s'est de plus en plus dévouée à Krishna et a été vue errant dans les rues de la capitale, chantant et dansant avec d'autres d'une foi similairement forte. Le fait que ce comportement soit loin d'être convenable pour une veuve royale a conduit à une certaine animosité au sein de la famille royale. Peut-être à cause de cela, Mira Bai a maintenant choisi de quitter $CAPITAL_CITY$ et on l'entend faire le tour de la campagne du Rajasthan, proclamant son amour et sa dévotion à Krishna."
 flavor_mer.4.a:0 "Entendu."
 flavor_mer.5.t:0 "Le complot contre le Rana Kumbha"
 flavor_mer.5.d:0 "Le Rana Kumbha, l'un des plus grands rois de notre dynastie, est devenu la victime d'un complot odieux. Apparemment inconscient du fait que cela entachera la réputation de notre famille pour toujours, l'un des fils royaux, Udai, a assassiné son père.\nCe parricide a ébranlé notre royaume jusqu'à ses fondations. Ne voulant rien avoir à faire avec un meurtrier, les fiers chefs du royaume du Mewar ont choisi de soutenir le frère d'Udai, Raimal, à la place."
 flavor_mer.5.a:0 "Soutenez Udai."
 flavor_mer.5.b:0 "Soutenez Raimal."
 granada_influx:0 "Afflux Maure"
 desc_granada_influx:0 "Une proclamation est partie de notre pays, que les enfants perdus d'al-Andalus sont invités à chercher refuge et de nouvelles vies dans nos belles villes. Nous leur réserverons un accueil amical et chaleureux car ils enrichiront notre pays et appauvriront celui de l'infidèle. Avec le temps, ils deviendront visibles par leur sophistication et influenceront notre recherche."
 flavor_gra.1.t:0 "Réfugiés Maures"
 flavor_gra.1.d:0 "Au nom d'Allah, le Très Miséricordieux, le Très Clément. Grenade est tombée aux mains des infidèles ! Le dernier joyau d'al-Andalus, un phare du savoir est maintenant entre les mains des Castillans. Alors que le monde islamique chancelle sous cette perte, les réfugiés maures affluent vers les villes et cours musulmanes d'Afrique du Nord et du Moyen-Orient, apportant avec eux des connaissances, des œuvres d'érudits exceptionnels comme Abu al-Walid ibn Rushd, Abu al-Qasim al-Zahrawi et Abu Bakr ibn Tufail. Inviter ces réfugiés dans $COUNTRY$ pourrait fournir un énorme coup de pouce à nos propres efforts dans les domaines de la science et de la culture."
 flavor_gra.1.a:0 "Bien sûr, invitons-les dans $COUNTRY$ !"
 flavor_gra.1.b:0 "Non, nous n'avons pas besoin d'eux."
 jnp_jaunpur_qila:0 "Shahi Qila de Jaunpur"
 desc_jnp_jaunpur_qila:0 "Le Shahi Qila de Jaunpur est la citadelle la plus fortifiée de notre pays et la fierté de notre dynastie."
 jnp_kabir:0 "Kabir"
 desc_jnp_kabir:0 "Le Sant Kabir a peut-être un problème avec l'autorité religieuse, mais pour notre royaume dans son ensemble, la présence de ce saint homme aide à unir notre peuple."
 jnp_rajput_recruitment:0 "Recrutement Rajput"
 desc_jnp_rajput_recruitment:0 "Nous avons initié un programme de recrutement ciblant les villages Rajput du Doab et de la plaine gangétique. Rejoindre l'armée devient une nouvelle tradition pour les cadets des familles de ces communautés."
 jnp_decline_of_delhi:0 "Déclin de Delhi"
 desc_jnp_decline_of_delhi:0 "Le destin de nos anciens suzerains du Sultanat de Delhi est scellé. Désormais, tous les hommes talentueux quittent le Sultanat pour chercher un emploi à l'étranger."
 jnp_pilgrim_tax:0 "Taxe sur les pèlerins"
 desc_jnp_pilgrim_tax:0 "Nous avons adopté une politique de taxation sur les nombreux pèlerins de l'Inde du Nord. Bien que ce soit une politique très impopulaire pour nos sujets non-musulmans, elle apporte un revenu régulier au trésor de l'État."
 jnp_sadak_e_azam:0 "Sadak-e-Azam"
 desc_jnp_sadak_e_azam:0 "L'ancienne route commerciale du Nord de l'Inde, le Sadak-e-Azam, est soutenue par un réseau de caravansérails, facilitant le commerce et enrichissant notre État."
 flavor_jnp.1.t:0 "Le déclin de Delhi"
 flavor_jnp.1.d:0 "Bien que ce soit une grande tragédie pour beaucoup, le sac de Delhi par Tamerlan en 1398 a été l'un des événements les plus importants de l'histoire de notre sultanat. C'est ce qui a propulsé nos ancêtres de simples gouverneurs de l'est (Malik-us-Sharq) à Sultans à part entière. Depuis ce jour, nous avons observé avec grand intérêt le Sultanat de Delhi être progressivement déchiré par des luttes internes et des prétendants soutenus de l'extérieur, utilisant chaque opportunité pour lentement grignoter leur contrôle sur l'Inde du Nord.\nLa situation de Delhi est maintenant pire que jamais et alors qu'un autre chef local assoiffé de pouvoir marche sur la capitale, un flot croissant de nobles et de fonctionnaires de Delhi traverse nos frontières cherchant un nouvel emploi et offrant de nous aider à sécuriser ce qui reste des terres de Delhi."
 flavor_jnp.1.a:0 "Entendu."
 flavor_jnp.2.t:0 "Les Rajputs du Doab"
 flavor_jnp.2.d:0 "Traditionnellement, les puissances musulmanes de cette région se sont appuyées militairement sur la cavalerie afghane et persane. Si nous sommes prêts à étendre l'influence hindoue dans nos armées, cependant, les communautés agricoles Rajput qui parsèment les régions du Doab et du Gange feraient une source idéale d'infanterie. Non seulement il y a beaucoup de cadets qui sauteraient sur l'occasion de devenir soldats, mais beaucoup de ces communautés auraient déjà maîtrisé l'utilisation des armes à feu mieux que beaucoup de nos soldats réguliers."
 flavor_jnp.2.a:0 "Intégrons-les avec nos forces."
 flavor_jnp.2.b:0 "Non, c'est trop dangereux de compter sur ces Hindous."
 flavor_jnp.3.t:0 "Kabir"
 flavor_jnp.3.d:0 "Certains disent qu'il est né Musulman et d'autres Hindou, pour l'homme lui-même cela importe peu. Un Sant d'une pauvre caste de tisserands à Varanasi s'est élevé à des niveaux de popularité sans précédent. Les poèmes de Kabir sont une attaque contre les dogmes inutiles, le système des castes et le clergé hindou et musulman. Pour Kabir, le divin est sans forme et les coutumes religieuses trop réglementées ne font que nous en éloigner."
 flavor_jnp.3.a:0 "Entendu."
 flavor_jnp.4.t:0 "Le Jaunpur Qila"
 flavor_jnp.4.d:0 "Le site de Jaunpur sur la rive nord de la Gomti est commandé par un fort depuis bien avant l'arrivée de l'Islam dans ces terres. Les sultans de Delhi en leur temps ont encore fortifié le lieu en utilisant des matériaux de nombreux bâtiments des Rashtrakutas vaincus de Kannauj.\nAvec l'avènement de notre Sultanat indépendant à la fin du XIVe siècle, le fort a été encore renforcé et a commencé à servir de résidence royale. Maintenant que notre État est devenu une puissance à part entière, cependant, il est grand temps de jeter un nouveau regard sur l'état du Jaunpur Qila."
 flavor_jnp.4.a:0 "Entreprenons d'énormes rénovations."
 flavor_jnp.4.b:0 "Renforçons-le dans les zones faibles."
 flavor_jnp.5.t:0 "Mosquée Jama Masjid"
 flavor_jnp.5.d:0 "La première des grandes œuvres du sultanat de Jaunpur après son indépendance a été l'imposante mosquée Atala Masjid, un mariage d'architecture locale et musulmane comme on n'en voit nulle part ailleurs en Inde. La façade impressionnante de la mosquée est tout à fait unique et a attiré l'attention des grands comme des humbles.\nAlors que notre Sultanat a grandi, la renommée de la mosquée Atala Masjid a grandi aussi et maintenant que nous nous apprêtons à commencer d'autres travaux de construction, on pense que nous devrions continuer à développer ce style architectural unique et le rendre plus étroitement associé à notre Sultanat."
 flavor_jnp.5.a:0 "Nous avons besoin d'une nouvelle mosquée dans ce style !"
 flavor_jnp.5.b:0 "Revenons au style plus conservateur des Sultans de Delhi."
 flavor_jnp.6.t:0 "Les pèlerins de Varanasi"
 flavor_jnp.6.d:0 "L'une des plus anciennes villes du monde et la ville la plus sainte de l'Hindouisme, Varanasi, n'est pas loin de Jaunpur. Chaque jour, d'innombrables pèlerins indiens traversent nos terres pour atteindre non seulement Varanasi mais beaucoup d'autres lieux saints de l'Hindouisme, du Bouddhisme et du Jaïnisme dans la région que nous occupons.\nCes voyageurs sont poussés par leurs convictions religieuses à faire ce voyage et tenteront d'atteindre leur but presque indépendamment de tout obstacle que nous pourrions mettre sur leur chemin. Notre vizir a donc suggéré que nous, comme les sultans de Delhi avant nous, créions une taxe spécifique sur tous les pèlerins qui visiteraient les lieux saints dans nos terres. Une telle taxe nous apporterait sans aucun doute un revenu régulier, mais ce ne serait pas une politique très populaire parmi nos sujets non-musulmans."
 flavor_jnp.6.a:0 "Nous avons besoin de la taxe sur les pèlerins."
 flavor_jnp.6.b:0 "Permettons aux pèlerins le libre passage."
 flavor_jnp.7.t:0 "Le Sadak-e-Azam"
 flavor_jnp.7.d:0 "À travers le milieu de nos terres, de tout le chemin du Bengale à Kaboul, passe l'une des plus anciennes routes commerciales du monde. Le Sadak-e-Azam est l'artère commerciale de l'Inde du Nord et le moyen par lequel la plupart des marchandises et des marchands arrivent ou quittent nos terres. Rendre le voyage plus sûr et plus rapide pour les voyageurs de cette route devrait être une priorité absolue pour notre Sultanat et pour tout autre pouvoir que le chemin traverse. Il a été suggéré qu'en renforçant la route existante et en complétant les arrêts existants de la route par un réseau de Serais de notre propre fabrication, nous pourrions grandement faciliter le voyage pour beaucoup."
 flavor_jnp.7.a:0 "Investissez dans le Sadak-e-Azam."
 flavor_jnp.7.b:0 "Les marchands devraient payer leurs propres dépenses."
 flavor_jnp.8.t:0 "Le Gouverneur de Kalpi"
 flavor_jnp.8.d:0 "Juste entre le plateau du Malwa et les plaines du sultanat de Jaunpur se trouve le petit État de Kalpi. C'est une zone qui pendant des années a été contestée entre nous et les Sultans du Malwa avant de finalement tomber entre leurs mains en 1433.\nDes rumeurs sur la mauvaise conduite du gouverneur du Malwa envers les filles musulmanes de sa cour ont dernièrement enflammé l'opinion publique contre lui parmi notre population musulmane. Cela pourrait bien être l'opportunité que nous attendions..."
 flavor_jnp.8.a:0 "Exigez qu'on nous donne le droit de punir Kalpi."
 flavor_jnp.8.b:0 "Laissons l'affaire reposer."
 flavor_jnp.9.t:0 "Le sort de Kalpi"
 flavor_jnp.9.d:0 "Les émissaires des Sultans de Jaunpur affirment que le sultan de Kalpi, notre vassal, s'est mal comporté envers les femmes musulmanes et doit être puni. Les Jaunpuris prendraient l'affaire en main et veulent mener une expédition punitive contre Kalpi.\nBien que nous ayons également entendu des rumeurs sur l'état des affaires à Kalpi, c'est une décision à considérer soigneusement. Kalpi est une ancienne zone contestée entre Jaunpur et le Malwa et il ne semble pas improbable que les Jaunpuris puissent avoir de plus grands plans qu'ils ne le laissent entendre."
 flavor_jnp.9.a:0 "Permettez aux Jaunpuris de punir Kalpi"
 flavor_jnp.9.b:0 "Nous devons soutenir notre vassal."
 flavor_jnp.10.t:0 "Kalpi : Permission accordée"
 flavor_jnp.10.d:0 "Le Malwa a accepté de nous laisser punir le Sultan de Kalpi dans l'intérêt de meilleures relations entre nos deux États."
 flavor_jnp.10.a:0 "Excellent !"
 flavor_jnp.11.t:0 "Le Sultan du Malwa refuse"
 flavor_jnp.11.d:0 "Le Malwa a clairement fait savoir que si nous voulons entreprendre une quelconque expédition punitive contre Kalpi, nous devrons aussi les combattre."
 flavor_jnp.11.a:0 "Entendu."
 javan_region:0 "Java"
 sumatran_region:0 "Sumatra"
 borneo_region:0 "Bornéo"
 malay_peninsula_region:0 "Péninsule Malaise"
 mlc_tun_perak:0 "Tun Perak"
 desc_mlc_tun_perak:0 "Notre pays prospère sous la direction capable du Bendahara Tun Perak."
 mlc_piracy_controlled:0 "Piraterie sous contrôle"
 desc_mlc_piracy_controlled:0 "La piraterie dans la mer de Malaisie peut souvent être un problème mais en ce moment nous avons la situation en main."
 mlc_islamic_laws_enforced:0 "Application plus stricte de la loi religieuse"
 desc_mlc_islamic_laws_enforced:0 "Afin de satisfaire les éléments plus orthodoxes de notre établissement religieux, nous avons adopté une interprétation plus stricte de la loi islamique moins conforme aux lois traditionnelles de Malacca. Cette nouvelle direction pour le Sultanat a cependant fait craindre à de nombreux non-musulmans de devenir une partie marginalisée de notre société."
 mlc_economic_boom:0 "Essor économique"
 desc_mlc_economic_boom:0 "Notre décision de réduire toutes les taxes sur le commerce à presque rien a stimulé la croissance économique et a conduit notre royaume à entrer dans une période de croissance économique sans précédent."
 flavor_mlc.1.t:0 "Le complot contre le Raja Ibrahim"
 flavor_mlc.1.d:0 "L'équilibre religieux dans un État aussi cosmopolite que Malacca peut être une chose très fragile. Dans notre État, des marchands de nombreuses religions et cultures vivent côte à côte tout en restant encore séparés dans une certaine mesure. Les plus grandes communautés, celles des Gujaratis, des Tamouls, des Javanais et des Chinois ont toutes leurs obligations respectives envers l'État et maintenir l'influence de ces groupes en équilibre est l'une des tâches les plus importantes de tout monarque malaccan.\nL'ascension du Raja Ibrahim en 1444 a donc froissé pas mal de susceptibilités. Ibrahim était un Hindou pratiquant et en est venu à être vu par beaucoup comme un traditionaliste visant à faire reculer l'influence de l'Islam dans notre pays. C'est encore une grande surprise quand le jeune roi a été trouvé mort dans son palais aujourd'hui. Beaucoup soupçonnent que son Premier ministre, le Bendahara royal, a dû avoir un rôle là-dedans mais peu peut être prouvé."
 flavor_mlc.1.a:0 "Le Raja Ibrahim ne sera pas oublié."
 flavor_mlc.2.t:0 "Bendahara Tun Perak"
 flavor_mlc.2.d:0 "Contrairement au défunt Raja Ibrahim (maintenant connu sous le nom d'Abu Syahid Shah, le roi martyr) notre nouveau dirigeant est Musulman et les communautés marchandes de notre ville semblent être plus acceptantes de son règne. Néanmoins, un Bendahara royal qui comploterait contre son suzerain est une chose effrayante et nous serions sages de remplacer ce ministre ou risquer de subir le même sort que son dernier maître. Nos conseillers de confiance désignent tous un jeune général à succès comme un remplaçant approprié. Tun Perak est dit sage pour son âge mais surtout il est aussi dit extrêmement loyal."
 flavor_mlc.2.a:0 "Nommez Tun Perak"
 flavor_mlc.2.b:0 "Nommez une marionnette et marginalisez le Bendahara."
 flavor_mlc.3.t:0 "Piraterie dans la mer de Malaisie"
 flavor_mlc.3.d:0 "Garder les voies maritimes dégagées est une priorité importante pour un État aussi dépendant du commerce que le nôtre. Dernièrement, l'activité pirate est à nouveau en hausse. Traditionnellement, c'est le genre de tâche qui serait déléguée aux communautés marchandes de notre ville."
 flavor_mlc.3.a:0 "Attribuez la tâche à l'une des communautés marchandes."
 flavor_mlc.3.b:0 "Nous utiliserons nos propres ressources pour régler cela."
 flavor_mlc.4.t:0 "L'Islam et l'État malaccan"
 flavor_mlc.4.d:0 "Malacca a de bien des façons été le centre de l'islamisation de l'archipel malais. Notre État lui-même a cependant toujours évité toute variété sévère ou trop orthodoxe de la loi islamique en faveur d'en faire un endroit attrayant pour les marchands de toutes nationalités. Au lieu de cela, on s'appuie sur la tradition pour être la loi du pays tandis que les lois islamiques orthodoxes ont été réservées aux cas spéciaux, souvent liés au maintien de l'ordre public. Bien que cela ait contrarié certains de ceux qui ont des sensibilités religieuses plus délicates au fil des ans, cela a été bon pour le commerce et a donc été soutenu par les communautés malaccanes.\nAvec le temps, cependant, les Musulmans sont devenus de plus en plus dominants dans notre État et en raison de son importance pour la propagation de l'Islam parmi les îles, certains ont même commencé à considérer Malacca comme un lieu de pèlerinage. Peut-être le temps est-il venu d'introduire un peu plus d'orthodoxie dans les lois et coutumes de notre État ?"
 flavor_mlc.4.a:0 "Oui, au nom d'Allah."
 flavor_mlc.4.b:0 "Non, restons fidèles à nos anciennes traditions."
 flavor_mlc.5.t:0 "Douanes et droits"
 flavor_mlc.5.d:0 "Le commerce est l'unique occupation de notre royaume et à la surprise de nombreux visiteurs, nous avons peu en matière d'agriculture et devons importer même les denrées alimentaires de base. Malgré cela, notre royaume est florissant et des navires de toute l'Asie viennent à nos quais pour vendre, acheter et revendre toutes sortes de marchandises.\nAfin d'encourager davantage le commerce, le Bendahara royal a suggéré que nous réduisions les douanes et droits à presque rien. Cette politique audacieuse nous distinguerait même des autres royaumes orientés vers le commerce et, selon lui, assurerait notre place comme le plus grand emporium de l'Orient."
 flavor_mlc.5.a:0 "Malacca n'a rien de propre et a tout du monde."
 flavor_mlc.5.b:0 "Nous ne pouvons pas nous permettre de réduire ces frais."
 flavor_mlc.6.t:0 "Hang Tuah"
 flavor_mlc.6.d:0 "En réprimant des troubles liés à un homme devenu fou furieux dans la campagne, notre Bendahara a reçu une aide inattendue d'un guerrier local aujourd'hui. Quand tous les propres gardes du Bendahara avaient fui, cet homme et ses amis ont agi rapidement et vaillamment pour sauver notre ministre. Ému par cette profonde loyauté envers l'État, le Bendahara a immédiatement nommé le jeune guerrier, Hang Tuah, au poste de commandant royal.\nNotre royaume a maintenant gagné le service de l'un de ses plus grands champions."
 flavor_mlc.6.a:0 "Puisse notre peuple ne jamais disparaître de cette terre."
 flavor_mlc.7.t:0 "Arrivée des Portugais"
 flavor_mlc.7.d:0 "Des navires de rivages lointains ne sont pas rares à Malacca, pourtant un visiteur inhabituel est arrivé dans notre ville aujourd'hui. Le capitaine se présente comme venant d'un royaume chrétien lointain connu sous le nom de Portugal et veut signer un accord commercial par lequel son pays deviendrait l'un des partenaires commerciaux les plus favorisés de notre État.\nLa communauté gujaratie musulmane, cependant, propage très fortement que l'homme est dangereux et que son pays est un ennemi juré de notre religion. Les Gujaratis sont si véhémentement opposés à la présence portugaise ici qu'ils ont déjà commencé à agir avec une hostilité ouverte envers les nouveaux venus, confisquant leurs marchandises et montant à bord de leurs navires. Il y a un risque que cela dégénère très rapidement..."
 flavor_mlc.7.a:0 "Réprimandez les Gujaratis et tentez de sauver la situation."
 flavor_mlc.7.b:0 "Nous ne devons pas permettre aux Portugais de prendre pied dans cette partie du monde."
 flavor_mlc.7.a.tt:0 "L'incident va être perçu comme légèrement MOINS GRAVE par le Portugal."
 flavor_mlc.7.b.tt:0 "L'incident va être perçu comme PIRE par le Portugal."
 flavor_mlc.8.t:0 "Incident à Malacca"
 flavor_mlc.8.d:0 "La nouvelle nous est parvenue que le Sultanat de Malacca a confisqué la cargaison des navires portugais en visite. Nous craignons que nos vieux ennemis du monde musulman soient arrivés les premiers et aient empoisonné leurs esprits contre nous."
 flavor_mlc.8.a:0 "Entendu."
 tribal_democracy_ruthenian:0 "Hetmanat"
 tribal_democracy_ruler_ruthenian:0 "Hetman"
 tribal_democracy_ruler_female_ruthenian:0 "Hetman"
 tribal_democracy_ruler_vassal_ruthenian:0 "Ataman"
 prices.11.t:0 "Période la plus froide du Petit Âge Glaciaire"
 prices.11.d:0 "Les hivers deviennent plus longs et plus froids depuis aussi longtemps que quiconque s'en souvienne. Alors que la glace et la neige s'étendent à nouveau plus au sud cet hiver, les récoltes sont ruinées, le vin est gâté et les poissons ont commencé à migrer vers des eaux plus chaudes."
 prices.11.a:0 "Brrrr."
 LITTLE_ICE_AGE:0 "Période la plus froide du Petit Âge Glaciaire"
 prices.12.t:0 "Bouchons de liège"
 prices.12.d:0 "Des développements dans la fabrication des bouteilles ont permis aux producteurs de vin de créer des bouteilles de tailles plus standardisées et en conséquence ont pu réintroduire l'utilisation du bouchon de liège. C'est un moyen beaucoup plus efficace de sceller le vin que les anciens bouchons en tissu et a signifié que le vin peut maintenant être transporté sur des distances beaucoup plus grandes qu'on ne le pensait possible auparavant. Peut-être assistons-nous à la naissance d'un commerce mondial du vin."
 prices.12.a:0 "Entendu."
 WINE_CORKS:0 "Croissance du commerce international du vin"
 prices.13.t:0 "Nouvelles Draperies"
 prices.13.d:0 "Une nouvelle technique de production textile a commencé à émerger parmi les drapiers de $COUNTRY$. Les soi-disant « Nouvelles Draperies » sont beaucoup plus minces, plus légères et moins chères que les épais lainages qui étaient autrefois demandés. Bien que la demande soit en hausse pour ces nouveaux produits, leur production utilise considérablement moins de laine et en conséquence les prix ont baissé."
 prices.13.a:0 "Entendu."
 NEW_DRAPERIES:0 "Nouvelles Draperies"
 prices.14.t:0 "Réglementations uniformes"
 prices.14.d:0 "Les armées de conscription d'antan sont de plus en plus remplacées par des armées nationales plus permanentes. Dans le cadre de ce processus, de nombreux États ont commencé à réglementer l'apparence des uniformes de leurs soldats et certains ont même commencé à fournir ces uniformes eux-mêmes à leurs soldats. La teinture n'a jamais été bon marché et avec la demande accrue maintenant mise sur les teintures et les tissus, les prix sont en hausse."
 prices.14.a:0 "Entendu."
 REGULATED_UNIFORMS:0 "Réglementations uniformes"
 prices.15.t:0 "Pêcheries des Grands Bancs"
 prices.15.d:0 "Nos explorateurs rapportent qu'au-dessus des Grands Bancs de Terre-Neuve, ils ont trouvé des eaux grouillant de milliers et de milliers de poissons n'attendant qu'à être pêchés ! Des expéditions de pêche se dirigent vers ces eaux en nombre toujours plus grand et les marchés sont inondés d'une offre inimaginable de poisson."
 prices.15.a:0 "Entendu."
 GREAT_FISHERIES:0 "Pêcheries des Grands Bancs"
 prices.16.t:0 "Indiennes et autres tissus de coton"
 prices.16.d:0 "L'approvisionnement régulier en cotons indiens a commencé à entraîner de grands changements dans la consommation de tissus cannorien. Les mousselines, indiennes et autres tissus de coton sont vendus à des prix de plus en plus élevés sur les marchés cannorien."
 prices.16.a:0 "Entendu."
 CALICOES:0 "Indiennes"
 prices.17.t:0 "Épuisement du castor cannorien"
 prices.17.d:0 "La demande de fourrures n'a cessé d'augmenter tout au long du Moyen Âge et un climat de plus en plus froid n'a rien changé à cela dernièrement. À cause de cela, la population de castors cannorien a du mal à faire face à la demande constamment croissante de fourrures. On en est arrivé au point que les castors sont très rarement vus en Europe et que les fourrures doivent maintenant être importées à grands frais de Russie et du Grand Nord."
 prices.17.a:0 "Entendu."
 DEPLETION_OF_EUROPEAN_BEAVER:0 "Épuisement du castor cannorien"
 prices.18.t:0 "Chapeaux de feutre"
 prices.18.d:0 "La fourrure de castor est un excellent matériau pour la chapellerie. Elle garde la chaleur et peut conserver sa forme même par mauvais temps et sur de longues périodes. La demande croissante de chapeaux de feutre ainsi que le processus compliqué impliqué dans leur fabrication ont conduit à la croissance d'un secteur de chapellerie sain dans notre économie."
 prices.18.a:0 "Entendu."
 FELT_HATS:0 "Chapeaux de feutre"
 prices.19.t:0 "Marines permanentes"
 prices.19.d:0 "Les marines permanentes sont passées de cas exceptionnels à la norme. Les institutions consacrées au contrôle de ces nouvelles marines commencent à jouer un rôle beaucoup plus actif dans l'approvisionnement en fournitures pour la construction, le ravitaillement et l'entretien de leurs navires."
 prices.19.a:0 "Entendu."
 PERMANENT_NAVIES:0 "Marines permanentes"
 prices.20.t:0 "Canons de bronze"
 prices.20.d:0 "Le canon de bronze a fait son entrée sur le champ de bataille et est là pour rester. Les matériaux nécessaires pour alimenter les industries de fabrication de canons en croissance ont conduit à une explosion de la demande de cuivre au cours des dernières années et les prix ont augmenté en conséquence."
 prices.20.a:0 "Entendu."
 BRONZE_CANNONS:0 "Canons de bronze"
 prices.21.t:0 "Culture du thé japonaise"
 prices.21.d:0 "La consommation de thé est loin d'être un nouvel élément de la culture japonaise. Le développement continu de la Cérémonie du thé japonaise au XVIe siècle, cependant, a conduit la boisson à devenir maintenant monnaie courante dans toute la société japonaise."
 prices.21.a:0 "Entendu."
 JAPANESE_TEA_CULTURE:0 "La Voie du thé"
 prices.22.t:0 "Déclin du commerce des épices"
 prices.22.d:0 "Avec un nombre croissant de concurrents sur le marché des épices, la disponibilité des épices autrefois extrêmement rares de l'Orient a considérablement augmenté en Occident. Bien que certains aient essayé de stabiliser les prix des épices en brûlant ce qu'ils produisent ou en imposant des règles plus strictes pour leur exportation, il semble maintenant clair que la rentabilité du commerce a connu un déclin permanent."
 prices.22.a:0 "Entendu."
 DECLINE_OF_SPICE_TRADE:0 "Déclin du commerce des épices"
 prices.23.t:0 "Évolution des habitudes de consommation"
 prices.23.d:0 "Le sucre était autrefois un luxe rare qui devait être importé du Maghreb ou du Moyen-Orient. Alors que le monde s'est ouvert et que le pouvoir d'achat de notre classe urbaine a augmenté, le sucre peut encore être considéré comme un luxe, mais un luxe assez abordable."
 prices.23.a:0 "Entendu."
 POPULARIZATION_OF_SUGAR:0 "Popularisation du sucre"
 prices.24.t:0 "Popularisation des tissus de soie"
 prices.24.d:0 "La soie a été très demandée dans le monde entier depuis bien avant le Moyen Âge et son obtention était l'une des forces motrices derrière les voyages de découverte en Orient. Avec la plus grande disponibilité de la soie, tant brute que tissée, la demande de tissu de soie en Occident monte toujours plus haut."
 prices.24.a:0 "Entendu."
 POPULAR_SILK_FABRICS:0 "Tissus de soie à la mode"
 prices.25.t:0 "Plantations de teinture du Bengale"
 prices.25.d:0 "Notre contrôle direct sur certaines des zones productrices de teinture du nord de l'Inde a attiré un certain nombre de chercheurs de fortune visant à étendre la production dans nos terres au Bengale. Certaines parties du Bengale sembleraient idéales pour cultiver l'indigo et la plupart semblent juger qu'il est probable que ces efforts réussiront si on les autorise. Cultiver l'indigo et le processus de transformation des plantes en teinture est un travail difficile, cependant, et permettre à ces personnes sans scrupules d'avoir carte blanche ici pourrait entraîner des difficultés plus tard."
 prices.25.a:0 "Autorisez-le."
 prices.25.b:0 "Restreignez la création de nouvelles plantations."
 BENGALI_INDIGO_PRODUCTION:0 "Disponibilité accrue des teintures"
 prices.26.t:0 "Développement du placage"
 prices.26.d:0 "Au départ, de nombreux types de bois tropical auraient été considérés comme trop cassants par les menuisiers. Avec le développement du placage, cependant, il est devenu possible d'utiliser l'ébène et d'autres bois tropicaux sélectionnés pour leur beauté plutôt que pour leur solidité. En conséquence, la création de beaux cabinets originaux et d'autres meubles de prestige en bois tropicaux est devenue une activité majeure."
 prices.26.a:0 "Entendu."
 VENEERING:0 "Cabinets plaqués"
 prices.27.t:0 "Déclin des populations d'éléphants en Asie du Sud-Est"
 prices.27.d:0 "Après de nombreuses années de lent déclin, la population d'éléphants d'Asie du Sud-Est est maintenant au plus bas. La demande d'éléphants et de produits en ivoire en Asie du Sud-Est et en Chine n'a cependant jamais faibli et en conséquence le prix des éléphants et de leur ivoire augmente."
 prices.27.a:0 "Entendu."
 IVORY_SHORTAGE:0 "Pénurie d'ivoire en Asie de l'Est"
 prices.28.t:0 "Développement du travail du fer"
 prices.28.d:0 "Diverses avancées dans le domaine du travail du fer ont signifié que le canon en fer est maintenant à la fois plus efficace et plus fiable que les anciens canons de bronze. Comme les produits en fer remplacent également de plus en plus le cuivre dans d'autres domaines, comme pour les ustensiles de table, le prix du cuivre a baissé tandis que la demande de fer est en hausse."
 prices.28.a:0 "Entendu."
 IRON_WORKING:0 "Développement du travail du fer"
 prices.29.t:0 "Chocolat chaud"
 prices.29.d:0 "L'utilisation du cacao pour créer une boisson chaude est une coutume héritée des indigènes américains. Bien que la nouvelle boisson ait rapidement séduit certaines parties de la société cannorien, il a fallu du temps, et de grandes quantités de sucre, avant qu'elle n'atteigne une plus large acceptation. Cela fait, cependant, la demande de chocolat augmente maintenant régulièrement dans l'Ancien Monde."
 prices.29.a:0 "Entendu."
 HOT_CHOCOLATE:0 "Consommation de chocolat chaud"
 prices.30.t:0 "Popularisation croissante du tabac"
 prices.30.d:0 "Initialement commercialisé comme plante médicinale, le tabac est devenu de plus en plus populaire dans le monde chrétien et musulman pour ses usages récréatifs. De Paris au Bengale, l'habitude s'est développée à tel point que le commerce du tabac devient assez lucratif."
 prices.30.a:0 "Entendu."
 POPULARIZATION_OF_TOBACCO:0 "Popularisation du tabac"
 prices.31.t:0 "Dissémination du caféier"
 prices.31.d:0 "Pendant des siècles, le café a été un produit exclusivement cultivé et exporté du Yémen et d'Éthiopie. Les marchands du Yémen en particulier ont eu une emprise si forte sur le commerce du café qu'ils se sont donnés beaucoup de mal pour empêcher quiconque de faire passer la plante au-delà de leurs frontières.\nTout comme le ver à soie a autrefois voyagé vers l'ouest le long des routes commerciales, le caféier est maintenant en possession de nos marchands. Les plantations de [java_coffee_here.GetName] ont commencé à produire une quantité significative de café, rendant les grains beaucoup plus facilement disponibles."
 prices.31.a:0 "Prenez une tasse de [java_coffee_here.GetName] !"
 prices.32.t:0 "Déclin de [mocha.GetCapitalName]"
 prices.32.d:0 "Les marchands qui venaient autrefois dans nos ports pour se procurer du café ont maintenant d'autres options, et bien que [mocha.GetCapitalName] reste un port important à part entière, elle n'est plus le principal entrepôt de grains de café dans le monde."
 prices.32.a:0 "Espérons que les marchands [From.GetAdjective]s s'étouffent avec leurs viles concoctions."
 JAVA_COFFEE:0 "Dissémination du caféier"
 prices.33.t:0 "Le marché international du livre"
 prices.33.d:0 "Bien que le papier soit supérieur au parchemin à bien des égards, il n'a jamais entièrement pu le remplacer. Cependant, avec la popularisation de l'imprimerie, les livres, les pamphlets et même les cartes à jouer sont devenus monnaie courante, d'une manière qu'ils ne l'avaient jamais été auparavant. L'art de produire le papier lui-même est également devenu beaucoup plus raffiné au cours des dernières décennies et ces deux choses coïncident maintenant pour rendre le papier beaucoup plus recherché que jamais.\nL'exemple le plus visible de cela est peut-être le marché du livre de [bookmarket_here.GetCapitalName], qui semble croître chaque année. À l'origine une foire pour les imprimeurs de [bookmarket_here.GetAreaName], la foire voit maintenant des visiteurs de tout le continent."
 prices.33.a:0 "[bookmarket_here.GetCapitalName] est vraiment le plus grand marché du livre au monde."
 prices.33.b:0 "Cela bénéficiera à toute la province."
 INCREASED_PRINTING:0 "Croissance de l'imprimerie et de l'édition modernes"
 prices.34.t:0 "La pile hollandaise"
 prices.34.d:0 "Pendant des siècles, les moulins à papier se sont appuyés sur des marteaux mécaniques pour battre la pâte à papier grumeleuse, écrasant la fibre pour créer la matière première nécessaire à la fabrication du papier.\nUtilisant les moulins à vent locaux comme source d'énergie, des artisans entreprenants de [hollender_beater_province.GetName] ont maintenant conçu une solution plus efficace. Ce qu'ils appellent la pile [Root.GetAdjective], est une cuve avec un rouleau horizontal à lames actionné par le vent. Ces lames peuvent déchiqueter autant de pâte en quelques heures que les anciens marteaux en plusieurs jours."
 prices.34.a:0 "Le marché du papier ne sera plus jamais le même."
 HOLLENDER_BEATER:0 "Les piles remplacent les marteaux pour la production de papier"
 prices.35.t:0 "Administrer un Empire"
 prices.35.d:0 "Les bureaucrates ont longtemps préféré le papier au parchemin et autres matériaux en raison de sa facilité de travail. Il existe également diverses mesures qui peuvent être prises pour rendre les documents officiels plus difficiles à falsifier. L'invention du filigrane à Fabriano en est une, les techniques élaborées de marbrage et de calligraphie des producteurs de papier islamiques en sont une autre.\nAlors que les Empires en viennent de plus en plus à englober plus d'un continent, ce besoin d'authenticité prouvable et de facilité d'utilisation a conduit les bureaucraties impériales de la Chine à l'Europe à utiliser exclusivement le papier pour les documents et ordres officiels."
 prices.35.a:0 "Le papier est l'avenir."
 PAPER_IN_BUREAUCRACY:0 "Filigranes et marbrage"
 prices.36.t:0 "Bibliothèques de prêt et clubs de lecture"
 prices.36.d:0 "Avec l'alphabétisation en hausse, la diffusion et la dissémination des livres sont devenues un objectif à la fois pour des raisons économiques et idéologiques. Les libraires sont devenus une vue beaucoup plus courante dans de nombreuses villes en général, et dans les grandes comme [lending_libraries_here.GetName], il y a des rues entières de boutiques bordées de boîtes de livres à vendre.\nPour ceux qui ne pouvaient pas se permettre d'acheter des livres eux-mêmes, il existe maintenant un nombre croissant de façons d'emprunter ou de cofinancer des achats de livres, comme les bibliothèques de prêt payantes, les coopératives d'achat de livres ou les sociétés d'abonnement."
 prices.36.a:0 "Les masses peuvent-elles vraiment être dignes de confiance avec le mot écrit ?"
 LENDING_LIBRARIES:0 "Bibliothèques de prêt et clubs de lecture"
 prices.37.t:0 "Échange colombien"
 prices.37.d:0 "Avec la colonisation des Amériques, un large éventail de nouvelles graines, cultures et animaux commencent à se répandre entre le Nouveau Monde et l'ancien. Dès le premier moment de leur introduction, des cultures comme le maïs, le manioc et les tomates se répandent maintenant sur tout l'ancien monde, tout comme les bêtes de somme non américaines sont de plus en plus recherchées dans le nouveau monde.\nAlors que des terres autrefois considérées comme impropres à la culture de quoi que ce soit, soit pendant une partie de l'année, soit dans certains cas jamais, sont mises à contribution dans la production de nourriture et de céréales, la disponibilité générale de nourriture dans le monde est plus élevée que jamais. Peu de choses dans ce siècle apporteront autant de bénéfices au commun des mortels, car la nourriture cultivée est maintenant beaucoup moins rare qu'elle ne l'était autrefois."
 prices.37.a:0 "C'est formidable..."
 prices.38.t:0 "Facettage"
 prices.38.d:0 "Les maîtres tailleurs de pierres précieuses de [diamond_city.GetCapitalName] ont fait une percée dans la taille du diamant en expérimentant avec de la poudre de diamant suspendue dans l'huile sur leurs scaifes. Cela permet aux artisans [Root.GetAdjective]s de tailler les pierres rares dans des formes entièrement nouvelles et avec une plus grande brillance. La technique résultante, connue sous le nom de facettage, produit une pierre d'une forme géométrique plus agréable et avec de meilleures qualités optiques. Alors que les nouvelles pierres, et la technique pour les fabriquer, se répandent à travers les cours et les ateliers, la demande de bijoux, de diamants et de pierres précieuses augmente considérablement."
 prices.38.a:0 "Les gemmes sont vraiment extraordinaires."
 FACETING:0 "Facettage"
 prices.39.t:0 "Diamants du Nouveau Monde"
 prices.39.d:0 "Les diamants, un type de pierre si durable qu'elle ne peut même pas être polie, sauf en utilisant sa propre poussière, sont depuis longtemps les plus rares de toutes les pierres précieuses. Pendant des siècles, l'Inde a été la seule source connue de diamants dans le monde entier, et même là, on ne les trouve que dans quelques régions minières bien gardées.\nAvec la découverte de grandes quantités de diamants dans l'intérieur de l'Amérique du Sud, cependant, les diamants sont devenus quelque chose non seulement pour les rois et les princes, mais aussi pour les riches magnats, bourgeois ou autres connaisseurs de bijoux."
 prices.39.a:0 "Les diamants sont éternels."
 BRAZILIAN_DIAMONDS:0 "Diamants du Nouveau Monde"
 prices.40.t:0 "Les Églises corinite et réformée rejettent l'encens"
 prices.40.d:0 "De nombreux théologiens réformés et corinites en sont venus à rejeter non seulement la nature richement décorée des églises ravéliennes mais aussi l'utilisation de l'encens dans les rituels religieux. L'utilisation de parfums, de bougies et d'encens est maintenant de plus en plus considérée comme un sacrilège et en conséquence la demande pour tous les types d'encens qui pendant plus d'un millénaire ont tiré l'encens et la myrrhe de l'Orient vers l'Europe a finalement commencé à diminuer."
 prices.40.a:0 "Tout en flammes."
 REFORMED_REJECTION_OF_INCENSE:0 "Rejet de l'encens par les Réformés et les Corinites"
 prices.41.t:0 "Croissance de l'industrie du parfum"
 prices.41.d:0 "Une classe marchande croissante ainsi qu'un code social de plus en plus exigeant parmi la noblesse et les classes supérieures ont conduit à une demande accrue de parfum. On s'attend maintenant à ce que les halls des grands palais aient un parfum agréable ainsi qu'un décor majestueux. Cela a entraîné une augmentation de la demande de produits tels que l'encens, la myrrhe et d'autres produits parfumés pour la fabrication de parfum et à [perfume_city_grass.GetCapitalName], le raffinage des fleurs locales et des marchandises parfumées étrangères est même devenu une industrie majeure en soi."
 prices.41.a:0 "Ils ont certainement le nez pour des choses comme ça."
 GROWTH_OF_PERFUME_BUSINESS:0 "Croissance de l'industrie du parfum"
 prices.42.t:0 "Élevage sélectif"
 prices.42.d:0 "Grâce à l'élevage scientifique et très agressif de chevaux, porcs, vaches et moutons, les fermiers [Root.GetAdjective]s ont commencé à créer des types d'animaux entièrement nouveaux, plus spécialisés pour les diverses tâches qu'ils doivent accomplir. Pendant des siècles, diverses régions ont eu des races célèbres de bétail mais avec les nouvelles méthodes maintenant pionnières, il est devenu évident combien il est facile pour l'homme de créer des améliorations spécifiques chez les animaux.\nEn conséquence, le commerce du bétail est revitalisé, avec une augmentation drastique de la qualité des animaux vendus plutôt que simplement de la quantité d'animaux vendus."
 prices.42.a:0 "Remarquable."
 SELECTIVE_BREEDING:0 "Élevage sélectif"
 prices.43.t:0 "Cristal de Bohême"
 prices.43.d:1 "Pendant des siècles, le verre vénitien a dominé le secteur de la verrerie, avec de plus petites entreprises de verrerie essayant d'imiter fidèlement les maîtres de l'île de Murano. La Bohême est une région verrière depuis le XIIe siècle, mais en combinant leur craie native avec de la potasse dans une nouvelle méthode, les verriers bohémiens sont maintenant enfin capables de défier le verre vénitien. La nouvelle variété de cristal de Bohême est à la fois plus durable, brillante et distinctement différente dans son style du verre vénitien. Les lustres en cristal de Bohême, les bijoux en verre et le verre gravé deviennent rapidement une vue commune dans toutes les cours d'Europe."
 prices.43.a:0 "Clair comme du cristal."
 BOHEMIAN_GLASS:0 "Verre de Bohême"
 prices.44.t:0 "Améliorations dans la fabrication des lentilles"
 prices.44.d:0 "Depuis le XIIIe siècle, les lunettes fabriquées à partir de lentilles de verre ont remplacé les pierres de lecture des époques plus anciennes. Grâce à une observation optique approfondie, ces lentilles ont maintenant atteint un niveau de perfection qui a permis même aux plus petites choses d'être agrandies.\nPour le plus grand plaisir des érudits, ces nouvelles lentilles peuvent également être utilisées pour créer à la fois des microscopes optiques, leur permettant d'examiner ce qui n'avait jamais pu être vu auparavant, et le télescope réfracteur, permettant l'étude d'objets lointains comme les étoiles. Le domaine de l'optique est maintenant au bord d'une révolution, apportant de grands bénéfices à la fois à la science, à la navigation et à la guerre."
 prices.44.a:0 "Nous pouvons maintenant voir les choses éloignées comme si elles étaient proches."
 MODERN_OPTICS:0 "Optique moderne"
 prices.45.t:0 "Verre au plomb et cristal au plomb"
 prices.45.d:0 "Les verriers de [glass_province.GetName] ont commencé à utiliser du silex et du sable avec du plomb pour créer un produit clair, facile à travailler et sans défaut. Cette nouvelle méthode défie rapidement les principaux centres de production de verre existants dans le monde alors que les marchés sont inondés du nouveau produit très populaire."
 prices.45.a:0 "Brillant."
 LEAD_CRYSTAL:0 "Cristal au plomb"
 prices.46.t:0 "Améliorations dans l'extraction du charbon"
 prices.46.d:0 "Au fil du temps, la technologie a grandement augmenté la production des mines de charbon existantes tout en rendant possible l'extraction du charbon dans de nombreux endroits où cela aurait été auparavant infaisable. Nos mines de charbon fonctionnent avec une efficacité sans précédent et bien que l'industrialisation continue signifie que le charbon est toujours très demandé, cette demande peut maintenant être plus facilement satisfaite."
 prices.46.a:0 "Excellent."
 IMPROVED_COAL_MINING:0 "Plus grande disponibilité du charbon"
 trade_company_moluccas:0 "Charte des Moluques"
 TRADE_COMPANY_MOLUCCAS_Indonesia_Trade_Company:0 "Compagnie commerciale des Moluques"
 TRADE_COMPANY_MOLUCCAS_Root_Culture_GetName:0 "Compagnie [Root.Culture.GetName] des Moluques"
 new_england_region:0 "Nouvelle-Angleterre"
 ori_jagannath_cult:0 "Jagannath et les Gajapatis"
 desc_ori_jagannath_cult:0 "Plus que toute autre divinité, Jagannath est lié au peuple d'Orissa et plus que toute autre divinité ce plus grand avatar de Vishnu est lié à notre dynastie. Chaque roi Gajapati est soutenu par Jagannath et ses prêtres et le temple de Puri s'enrichit d'année en année grâce au patronage royal."
 ori_no_salt_tax:0 "Pas de taxe sur le sel"
 desc_ori_no_salt_tax:0 "Nous avons temporairement arrêté la traditionnelle taxe sur le sel. Bien que cela nous ait privés d'une source majeure de revenus pour l'État, la popularité de notre dynastie et de notre monarque a grandement bénéficié de ce geste."
 ori_popular_unrest:0 "Population lasse de la guerre"
 desc_ori_popular_unrest:0 "Après des années de guerre, notre peuple est fatigué et veut vivre en paix."
 ori_support_for_pretender:0 "Soutien au prétendant"
 desc_ori_support_for_pretender:0 "Cette province soutient un prétendant contre notre règne."
 flavor_ori.1.t:0 "Les Gajapatis et le culte de Jagannath"
 flavor_ori.1.d:0 "Les cérémonies au grand temple de Puri et la bûche dans laquelle Jagannath se manifeste ont parfois été ridiculisées et moquées par des dirigeants étrangers, mais en Orissa Jagannath, le « Seigneur de l'Univers » est indiscutablement la divinité la plus populaire.\nLe soutien de Jagannath et de ses prêtres a également été sans faille pour le Raja Kapilendra, le fondateur de notre dynastie. Maintenant le temps est venu pour notre dynastie de rembourser cette dette : nous devrions patronner le temple de Puri et élever le culte de Jagannath comme culte principal de notre royaume."
 flavor_ori.1.a:0 "Louons Jagannath !"
 flavor_ori.1.b:0 "Ne mettons pas tous nos œufs dans le même panier."
 flavor_ori.2.t:0 "Les guerres de Kapilendra"
 flavor_ori.2.d:0 "Quand Kapilendra Deva a renversé le dernier des rois Eastern Ganga en 1434, l'Orissa était dans un triste état. Les incursions musulmanes du nord et de l'ouest ainsi que la rivalité avec d'autres voisins au sud avaient grandement réduit le royaume. Depuis lors, le Raja Kapilendra a rapidement renversé tout cela. Dans des guerres consécutives avec le Bengale, les Reddys d'Andhra, les Sultans Bahmanides et l'empire Vijayanagar, l'Orissa a grandi en taille et en force sous sa direction.\nCette guerre constante a cependant pris son tribut sur la population de notre royaume et une saison de récolte inhabituellement mauvaise a maintenant entraîné une agitation populaire croissante. Il a été suggéré que l'humeur publique s'améliorerait si nous levions temporairement la traditionnelle taxe sur le sel et consacrions autrement notre attention un peu plus au bien public."
 flavor_ori.2.a:0 "Nous n'avons pas besoin de la taxe sur le sel."
 flavor_ori.2.b:0 "Nous ne pouvons pas céder à la pression populaire."
 flavor_ori.3.t:0 "Mort de Kapilendra"
 flavor_ori.3.d:0 "Après une longue vie, le grand roi guerrier Kapilendra est sur son lit de mort. À la stupeur de ses 18 fils légitimes, cependant, le vieux roi, guidé par la voix de Jagannath, a choisi de faire de son fils illégitime Purushottama son héritier.\nAlors que le roi rend son dernier souffle, la succession royale est loin d'être assurée car Hamvira, le candidat favori jusqu'à cette date, a fui vers le sud où il a pris les armes contre Purushottama."
 flavor_ori.3.a:0 "Nous devons suivre la volonté de Jagannath !"
 flavor_ori.3.b:0 "Hamvira est l'héritier légitime !"
 flavor_ori.3.a.tt:0 "Nos voisins apprendront cela et réagiront en conséquence."
 flavor_ori.4.t:0 "Crise de succession en Orissa"
 flavor_ori.4.d:0 "La nouvelle nous est parvenue que Kapilendra, le roi guerrier d'Orissa, est mort et il semble que ses fils se battent pour son trône, laissant le royaume faible et exposé."
 flavor_ori.4.a:0 "Entendu."
 flavor_ori.5.t:0 "L'offre d'Hamvira"
 flavor_ori.5.d:1 "Un messager est arrivé aujourd'hui d'Hamvira, un prétendant au trône d'Orissa. Si nous le soutenons dans sa lutte pour s'assurer le trône d'Orissa, Hamvira prétend qu'il nous accordera un certain nombre de forts importants à l'est."
 flavor_ori.5.a:0 "Envoyez des troupes et de l'argent."
 flavor_ori.5.b:0 "Évitez de vous impliquer."
 flavor_ori.6.t:0 "Les Bahmanides soutiennent Hamvira."
 flavor_ori.6.d:0 "Le sultan Bahmanide, un vieil ennemi de notre royaume, a décidé de soutenir Hamvira. Nous ne pouvons pas savoir avec certitude ce qui lui a été promis mais si les rumeurs sont vraies, Hamvira a été assez désespéré pour promettre aux Bahmanides une grande partie de notre pays."
 flavor_ori.6.a:0 "Mieux vaut s'assurer qu'il ne gagne pas alors."
 flavor_ori.7.t:0 "Hamvira victorieux"
 flavor_ori.7.d:0 "Alors que les armées d'Hamvira, le prétendant, prennent le contrôle de la capitale, la guerre civile semble toucher à sa fin. Au sud, le sultan Bahmanide a agi rapidement en envoyant des troupes garnir les nouveaux forts qui leur ont été promis."
 flavor_ori.7.a:0 "Ce n'est pas bon."
 flavor_ori.8.t:0 "Hamvira paie ses dettes."
 flavor_ori.8.d:0 "Avec la fin de la guerre civile en Orissa, nous avons maintenant réussi à prendre le contrôle des zones qui nous ont été promises par Hamvira."
 flavor_ori.8.a:0 "Excellent !"
 flavor_ori.9.t:0 "Le culte de Jagannath"
 flavor_ori.9.d:0 "Avec le départ des Gajapatis du trône d'Orissa, le lien étroit entre l'État et Jagannath et ses prêtres a été coupé. Bien que le temple de Puri et le culte de cette divinité elle-même restent importants pour la vie culturelle et spirituelle de l'Orissa, il n'est plus aussi étroitement lié à la monarchie elle-même."
 flavor_ori.9.a:0 "Entendu."
 flavor_ori.10.t:0 "Naissance de la littérature oriya"
 flavor_ori.10.d:1 "Jusqu'à présent, le sanskrit a été la seule langue de la littérature en Orissa, la langue oriya familière étant réservée aux Shudras et aux castes inférieures. Sarala Das, un soldat à la retraite avec peu d'éducation formelle, a commencé à changer cela en traduisant le Mahabharata en oriya. L'œuvre originale de Sarala Das est également exclusivement en oriya et d'autres poètes ont maintenant commencé à adopter cette pratique."
 flavor_ori.10.a:0 "Entendu."
 flavor_ori.11.t:0 "Achyutananda"
 flavor_ori.11.d:0 "Un poète, voyant et auteur prolifique gagne en popularité comme saint Vaishnava dans notre royaume. Achyutananda est dit capable de prédire l'avenir et ses livres sont écrits en oriya, la langue du peuple."
 flavor_ori.11.a:0 "Entendu."
 zan_shirazi_islam:0 "Islam Shirazi"
 zan_religious_orthodoxy:0 "A adopté nos vues religieuses"
 zan_religious_unrest:0 "Rupture avec les traditions Shirazi"
 desc_zan_religious_unrest:0 "Afin d'apaiser les nombreux marchands étrangers dans notre État, nous avons commencé à éliminer les pratiques religieuses peu orthodoxes. Bien que cela puisse être à notre avantage à long terme, cela mine actuellement la légitimité de notre propre dynastie, qui est enracinée dans ces traditions, et crée des tensions entre les nombreux groupes religieux de notre État en même temps."
 zan_sacked_by_the_zimba:0 "Saccagée par les Zimba"
 desc_zan_sacked_by_the_zimba:0 "Cette ville a été attaquée et saccagée par le peuple Zimba et l'économie locale souffre pendant sa reconstruction et son repeuplement."
 zan_kilwa_chronicle:0 "Chronique de Kilwa"
 desc_zan_kilwa_chronicle:0 "La Chronique de Kilwa est un livre qui enregistre l'histoire de notre dynastie depuis ses origines avant d'arriver à Kilwa jusqu'à nos jours. C'est un document qui prouve notre droit légitime de gouverner les ports de la côte swahilie sans l'ombre d'un doute."
 flavor_zan.1.t:0 "L'Islam Shirazi et les patriciens de Kilwa"
 flavor_zan.1.d:1 "La plupart des États swahilis sont encore aujourd'hui gouvernés par des dynasties qui prétendent descendre de la première migration islamique dans cette région. L'Islam pratiqué par ces « Shirazis », comme ils s'appellent eux-mêmes, n'est cependant pas la forme la plus orthodoxe de la religion. De nombreuses anciennes cérémonies locales sont pratiquées quotidiennement à notre cour et les lignées Shirazi sont considérées comme ayant des capacités magiques qui leur donnent le droit de gouverner ces villes.\nAlors que la richesse de Kilwa et des autres États swahilis croît, cependant, de nouvelles vagues d'étrangers continuent d'arriver en grand nombre. Des marchands d'Oman, de Perse, du royaume Bahmanide et d'autres terres lointaines ont fait de nos villes leur foyer et une classe montante de marchands autochtones a fait de ces groupes leurs partenaires. Beaucoup de nouveaux venus sont horrifiés par nos traditions. Si nous adoptions une forme plus orthodoxe de l'Islam, cela aiderait certainement nos relations avec les autres États de l'Océan Indien, mais il y a un risque très réel que cela sape notre propre règne et nuise aux relations avec les autres États swahilis."
 flavor_zan.1.a:0 "Nous devons suivre les voies de nos ancêtres."
 flavor_zan.1.b:0 "Purgeons notre royaume des croyances et cérémonies païennes."
 flavor_zan.2.t:0 "La Chronique de Kilwa"
 flavor_zan.2.d:0 "Avec de plus en plus de marchands étrangers arrivant sur la côte swahilie d'États islamiques orthodoxes, nos anciennes traditions Shirazi ont été de plus en plus attaquées. Nous avons regardé avec dégoût certaines des anciennes dynasties Shirazi de la côte swahilie être renversées par une classe montante de marchands autochtones alliés aux nouveaux venus.\nEn tant que l'une des dynasties Shirazi les plus anciennes et les plus puissantes, cependant, nous restons forts. Afin d'impressionner convenablement les étrangers et les fauteurs de troubles nationaux, il serait peut-être préférable que nous assignions nos scribes à créer une chronique de notre célèbre lignée, afin que personne ne puisse douter de notre origine Shirazi et des anciennes racines islamiques de notre dynastie."
 flavor_zan.2.a:0 "Créons une telle Chronique."
 flavor_zan.2.b:0 "Nous avons des affaires plus importantes à régler."
 flavor_zan.3.t:0 "Abandon des traditions Shirazi"
 flavor_zan.3.d:0 "Dans le processus de réforme de l'établissement religieux de notre royaume, nous en sommes arrivés au point où nous devrons faire un choix concernant la tradition que nous devrions essayer d'imiter. Notre royaume abrite des Chiites persans, des marchands Ibadites d'Oman ainsi que des marchands Sunnites indiens et turcs. En dehors des considérations théologiques, la forme d'Islam à laquelle nous nous associerons est susceptible de façonner la politique étrangère de notre royaume pour les années à venir."
 flavor_zan.3.a:0 "Nos réformes actuelles ont été suffisantes."
 flavor_zan.3.b:0 "Embrassons le Chiisme."
 flavor_zan.3.c:0 "Alignons-nous avec les Ibadites."
 flavor_zan.3.od:0 "Nous devrions inviter des érudits sunnites pour aider à réformer notre royaume."
 flavor_zan.4.t:0 "Cannibales !"
 flavor_zan.4.d:0 "Bien que notre royaume doive son existence entière au réseau commercial de l'Océan Indien et n'ait que peu de contrôle réel sur l'arrière-pays africain, nous devons toujours être sur nos gardes face aux peuples de l'intérieur. Un tel groupe, les cannibales Zimba, ont semé la terreur le long de la côte bien au sud de chez nous. Sans avertissement, les Zimba ont soudainement fondu sur la ville de Kilwa elle-même aujourd'hui. De nombreux citoyens de Kilwa sont maintenant morts et encore plus ont fui la ville. Il faudra des années à Kilwa pour se remettre : nous ne nous souvenons guère d'une plus grande tragédie dans l'histoire de notre royaume."
 flavor_zan.4.a:0 "Un jour de chagrin."
 flavor_zan.4.b:0 "Utilisez toutes les ressources pour reconstruire et restaurer Kilwa."
 flavor_zan.5.t:0 "Le coup d'État de Suleiman et Muhammad al-Mazlum"
 flavor_zan.5.d:0 "Quand le Sultan Ismâ'îl est monté sur le trône de Kilwa en 1442, son règne a été contesté par les dirigeants locaux de Zanzibar qui soutenaient la candidature de son parent Said au sultanat. Le complot de Said a cependant été déjoué par le vizir royal Suleiman et l'émir Muhammad al-Mazlum.\nAvec la disparition d'Ismâ'îl lui-même, cependant, il semble que Suleiman et Muhammad aient décidé que le temps est venu pour eux de régner en leur propre nom. Agissant rapidement, ils ont utilisé leur influence pour s'assurer la capitale et ont convenu de partager le pouvoir en prenant le trône à tour de rôle."
 flavor_zan.5.a:0 "Suleiman prend le trône."
 flavor_zan.5.b:0 "Muhammad al-Muzlum prend le trône."
 flavor_zan.5.c:0 "$MONARCH$ est notre dirigeant légitime !"
 flavor_zan.6.t:0 "Putschiste impopulaire"
 flavor_zan.6.d:0 "Bien que $MONARCH$ ait servi comme ministre du trône pendant de nombreuses années avant d'usurper le pouvoir directement, son coup d'État l'a rendu impopulaire parmi les citoyens de Kilwa. Des citoyens éminents exigent maintenant sa démission et à moins d'être apaisés, nous pourrions avoir une révolte sur les bras tôt ou tard."
 flavor_zan.6.a:0 "Abdiquez en faveur de $HEIR$"
 flavor_zan.6.b:0 "Notre dirigeant a gagné le droit à ce trône."
 flavor_zan.7.t:0 "Vizir comploteur"
 flavor_zan.7.d:0 "Garder le trône de Kilwa n'a jamais été facile et avec le grand nombre de complots entourant le couronnement des monarques au cours des dernières décennies, le poste de Vizir dans le gouvernement royal est devenu un poste recherché par des hommes ambitieux voulant le trône pour eux-mêmes plutôt que par des administrateurs loyaux désireux de servir la couronne.\nLa popularité chancelante de la monarchie dernièrement était apparemment tout ce dont notre Vizir actuel avait besoin pour tenter de s'assurer le trône pour lui-même."
 flavor_zan.7.a:0 "Entendu."
 ful_marabout_wars:0 "Rebelles Marabouts"
 desc_ful_marabout_wars:0 "Un mouvement populaire dans cette zone a commencé à œuvrer pour limiter l'autorité centrale et essayer d'établir un État islamique orthodoxe gouverné par la Charia."
 flavor_ful.1.t:0 "Troubles marabouts à $PROVINCENAME$"
 flavor_ful.1.d:0 "Des prédicateurs marabouts inspirés par le charismatique Nasir al-Din ont commencé à prêcher pour une réforme islamique à $PROVINCENAME$. De nombreux guerriers locaux ont rejoint les Marabouts et ensemble ils travaillent maintenant en dehors de l'État pour créer ici une société suivant la Charia dans sa forme la plus pure. Ils sont violemment opposés à toute tradition païenne ou influence étrangère."
 flavor_ful.1.a:0 "Entendu."
 flavor_ful.2.t:0 "Révolution islamique orthodoxe"
 flavor_ful.2.d:0 "Les tensions religieuses ont lentement augmenté dans notre pays depuis la montée des Marabouts au milieu du XVIIe siècle. Maintenant la faction marabout de $COUNTRYNAME$ s'est ouvertement révoltée contre l'ancienne aristocratie de $CAPITAL_CITY$. La révolution promise a rapidement obtenu le soutien de nombreux pasteurs peuls présents dans de grandes parties de notre État et il est clair que nous aurons bientôt une révolte très sérieuse sur les bras."
 flavor_ful.2.a:0 "Nous devons rejoindre la révolution, mort aux aristocrates !"
 flavor_ful.2.b:0 "Nous devons préserver nos traditions !"
 flavor_ful.3.t:0 "Fin du Djihad Peul"
 flavor_ful.3.d:0 "Comme notre pays a maintenant entièrement abandonné les idéaux islamiques sur lesquels il a été construit, la faction marabout a quitté notre pays et est partie vers d'autres lieux."
 flavor_ful.3.a:0 "Entendu."
 ful_fulani_wars:0 "Troubles parmi les Peuls et les Musulmans orthodoxes"
 desc_ful_fulani_wars:0 "Nos politiques d'État en général et nos actions contre les disciples d'Usman dan Fodio en particulier ont conduit à des troubles généralisés dans notre pays. Les Musulmans peuls à l'étranger nous regardent avec mépris et nos propres sujets rejettent notre autorité. Sûrement que les choses vont se calmer bientôt ?"
 flavor_sok.1.t:0 "Usman dan Fodio"
 flavor_sok.1.d:1 "Inspiré par les révolutions religieuses peules, Usman dan Fodio, un érudit musulman peul au Gobir, a commencé à agiter pour une réforme dans notre pays. Son message fort et sa personne charismatique ont impressionné des parties de notre population et un mouvement croissant soutient maintenant la création d'un Califat gouverné par des traditions islamiques orthodoxes, l'adhésion à la Charia et la mission de répandre la vraie foi en Afrique de l'Ouest.\nLe message est également assez critique de la façon dont notre État est actuellement dirigé et les autorités du Gobir craignent que les disciples d'Usman Dan Fodio puissent bientôt se révolter ouvertement contre notre règne."
 flavor_sok.1.a:0 "Invitez Usman dan Fodio à réformer notre pays."
 flavor_sok.1.b:0 "Ce dangereux agitateur et ses disciples doivent être expulsés."
 flavor_sok.1.b.tt:0 "Usman dan Fodio et ses disciples quitteront le pays."
 flavor_sok.2.t:0 "Les disciples d'Usman dan Fodio"
 flavor_sok.2.d:0 "Le réformateur islamique populaire Usman dan Fodio a été expulsé par les autorités du Gobir. Lui et ses disciples cherchent maintenant un dirigeant pieux ailleurs qui leur permettra de reconquérir la ville de Gobir et de créer l'État islamique orthodoxe dont ils rêvent."
 flavor_sok.2.a:0 "Entendu."
 flavor_sok.2.a.tt:0 "Le Califat de Sokoto peut maintenant être créé."
 sokoto_nation_title:0 "Créer le Califat de Sokoto"
 sokoto_nation_desc:0 "Usman dan Fodio et ses disciples cherchent maintenant un dirigeant pieux qui leur permettra de gouverner la ville de Gobir et de créer l'État islamique orthodoxe dont ils rêvent. Nous devons aider ces hommes pieux à atteindre leur objectif et mettre notre pays à leur disposition."
 kbo_gazargamu:0 "Gazargamu"
 desc_kbo_gazargamu:0 "Nous avons construit une ville fortifiée solide comme nouvelle capitale de notre dynastie ici. Gazargamu assure que nos rois seront à l'abri des armées étrangères et des prétendants."
 kbo_death_to_kingmakers:0 "Aristocratie loyale"
 desc_kbo_death_to_kingmakers:0 "Nous avons éliminé l'ancienne classe de faiseurs de rois intéressés parmi les divers détenteurs de titres de notre royaume. Nos subordonnés actuels se concentrent sur le service du trône plutôt que sur leur propre enrichissement."
 kbo_religious_orthodoxy:0 "Orthodoxie imposée"
 desc_kbo_religious_orthodoxy:0 "Nous avons une politique stricte contre tout syncrétisme religieux ou influences païennes parmi notre aristocratie."
 flavor_kbo.1.t:0 "Les deux branches de la dynastie Sayfawa"
 flavor_kbo.1.d:0 "Depuis le XIVe siècle, deux branches de la dynastie Sayfawa se battent pour le trône de notre royaume. Comme aucune des branches n'a été assez puissante pour vaincre entièrement l'autre, les lignées Idriside et Dawudide en sont venues à prendre de courts tours sur le trône. Certains dirigeants n'ont même pas duré un an. Ce conflit dure depuis bien trop longtemps et maintenant nos ministres et gouverneurs jouent tous aux faiseurs de rois pendant que le royaume brûle.\nAvec la mort de notre $MONARCHTITLE$, la succession disputée habituelle a eu lieu avec un prétendant prenant les armes contre l'héritier royal."
 flavor_kbo.1.a:0 "Entendu."
 flavor_kbo.2.t:0 "Fondation de Gazargamu"
 flavor_kbo.2.d:0 "Bien que Borno soit une riche province tout à fait digne d'être la capitale de notre royaume, la défendre a toujours été un problème. De l'est, nos vieux ennemis les Bilala font fréquemment des raids dans nos terres et les fréquentes guerres de succession soulignent également le besoin d'une capitale plus fortifiée.\nDes plans ont été élaborés pour la création d'une ville fortifiée sur la rive ouest du lac Tchad pour assurer la sécurité future de notre dynastie."
 flavor_kbo.2.a:0 "Construisez Gazargamu."
 flavor_kbo.2.b:0 "Notre capitale actuelle convient."
 flavor_kbo.3.t:0 "Imposer l'orthodoxie islamique"
 flavor_kbo.3.d:0 "Bien que notre Sultanat islamique soit l'un des plus anciens de cette région, c'est même parmi les classes supérieures une religion hétérodoxe et syncrétique. Inspiré par les nombreux hommes savants qui viennent dans notre capitale, $MONARCH$ a envisagé si nous devrions commencer une purge du syncrétisme religieux, particulièrement parmi l'aristocratie et les membres de la dynastie royale. Comme la lignée Dawudide tire une partie de son soutien des païens, nous ne pouvons qu'espérer que cela réduira peut-être aussi l'instabilité politique de notre pays."
 flavor_kbo.3.a:0 "Plus de syncrétisme !"
 flavor_kbo.3.b:0 "N'exagérons pas avec cela."
 flavor_kbo.4.t:0 "Traiter avec les faiseurs de rois"
 flavor_kbo.4.d:0 "Pendant l'instabilité politique et les conflits fréquents entre Dawudides et Idrisides, tout le monde, de nos détenteurs de titres locaux aux ministres de notre palais, s'est habitué à pouvoir jouer aux faiseurs de rois tout en s'enrichissant en utilisant les ressources de l'État.\nCela doit cesser. Révoquons leurs privilèges et si nécessaire même leurs titres et rappelons-leur leurs devoirs envers le trône."
 flavor_kbo.4.a:0 "Reprenons-les en main."
 flavor_kbo.4.b:0 "Nous ne pouvons pas empiéter sur leurs droits."
 flavor_kbo.5.t:0 "Calipha"
 flavor_kbo.5.d:0 "Le prétendant abbasside Abd al-Azis Yakub a conféré le titre de Calipha à notre $MONARCHTITLE$. Ce geste fortement légitimant est quelque chose que nous nous assurerons que personne n'oublie et tous les successeurs de $MONARCH$ utiliseront ce titre désormais."
 flavor_kbo.5.a:0 "Entendu."
 flavor_kbo.6.t:0 "Réformes de $MONARCH$"
 flavor_kbo.6.d:0 "Inspiré par ce qu'il a vu lors de son Hajj, notre $MONARCHTITLE$ $MONARCH$ a décidé que notre royaume doit moderniser son armée et son économie. $MONARCH$ a déjà commencé à prendre des mesures pour renforcer notre cavalerie, inviter des artilleurs turcs et adopter les techniques administratives qu'il a vues chez nos frères musulmans entre ici et La Mecque."
 flavor_kbo.6.a:0 "Réformez à la fois l'économie et l'armée."
 flavor_kbo.6.b:0 "Concentrez-vous sur l'armée."
 flavor_kbo.6.c:0 "Concentrez-vous sur l'économie."
 flavor_kbo.7.t:0 "Magira Aisha"
 flavor_kbo.7.d:0 "Pendant la régence de $HEIR$, la reine mère Aisha s'est illustrée. Sous le règne ferme et énergique de cette remarquable régente, le royaume lui-même et son futur dirigeant prospèrent tous deux."
 flavor_kbo.7.a:0 "Entendu."
 flavor_kbo.8.t:0 "Succession disputée"
 flavor_kbo.8.d:0 "Avec la mort de notre dirigeant, la succession disputée habituelle a eu lieu avec un prétendant prenant les armes contre l'héritier royal."
 flavor_kbo.8.a:0 "Entendu."
