l_french:
great_port:0 "Grand Port"
great_port_title:0 "Grand Port"
great_port_desc:0 "Le Grand Port est le plus grand port du monde. C'est la plaque tournante principale pour tout le commerce de la région, et la première escale pour tout marchand cherchant à faire du profit."
center_of_the_world:0 "Bazar"
center_of_the_world_title:0 "Bazar"
center_of_the_world_desc:0 "Le Bazar est le centre du monde, où toutes les routes commerciales convergent. C'est le cœur de la cité, et la principale source de richesse pour la région."
regional_port:0 "Port Régional"
regional_port_title:0 "Port Régional"
regional_port_desc:0 "Le Port Régional est un port plus modeste qui sert de plaque tournante pour le commerce dans la région. C'est une source de revenus importante pour l'économie locale, et un acteur clé du réseau commercial régional."
regional_hub:0 "Carrefour Régional"
regional_hub_title:0 "Carrefour Régional"
regional_hub_desc:0 "Le Carrefour Régional est une ville-marché animée qui sert de plaque tournante pour le commerce dans la région. C'est un acteur clé du réseau commercial régional, et une source de revenus importante pour l'économie locale."
institution_growth_decision_title:0 "Décision de croissance institutionnelle"
institution_growth_decision_desc:0 "Cette décision vous permettra d'investir dans la croissance d'une institution locale, augmentant son influence et son pouvoir dans la région."
custom_institution_growth_event.1.t:0 "Investir dans la croissance de l'institution locale."
custom_institution_growth_event.1.d:0 "Investir dans la croissance de l'institution locale, augmentant son influence et son pouvoir dans la région."
custom_institution_growth_event.1.a:0 "Investir de l'or dans la croissance de l'institution locale."
custom_institution_growth_event.1.b:0 "Investir des ressources dans la croissance de l'institution locale."
custom_institution_growth_event.1.c:0 "Je suis un champion, je développerai l'institution moi-même."
institution_growth_boost_modifier:0 "Stimulation de la croissance institutionnelle"
institution_growth_boost_modifier2:0 "Stimulation de la croissance institutionnelle 2"
custom_celmador_nimscodd_issue.1.t:0 "Le dilemme d'Oddcodd"
custom_celmador_nimscodd_issue.1.d:0 "L'île d'Oddcodd a longtemps été un point de discorde entre Nimscodd et Celmador. Celmador exige maintenant le contrôle de l'île, offrant de l'or et une aide au développement en échange. Nos conseillers sont divisés : certains soutiennent que la paix et la prospérité valent plus qu'un rocher stérile, tandis que d'autres insistent sur le fait que nous ne devons jamais céder un pouce du sol de Nimscodd."
custom_celmador_nimscodd_issue.1.a:0 "Accepter l'offre de Celmador et céder Oddcodd."
custom_celmador_nimscodd_issue.1.b:0 "Aux armes ! Nous défendrons Oddcodd !"
custom_celmador_nimscodd_issue.2.t:0 "Oddcodd sécurisée"
custom_celmador_nimscodd_issue.2.d:0 "Avec Oddcodd pacifiquement transférée à Celmador, nos marchands et colons se précipitent pour intégrer l'île dans nos réseaux commerciaux. Les communautés locales sont transformées alors que de nouvelles opportunités émergent à travers les Îles de la Tempête."
custom_celmador_nimscodd_issue.2.a:0 "Investir dans l'île et les Îles de la Tempête."
custom_celmador_nimscodd_issue.3.t:0 "Ils refusent, c'est la guerre"
custom_celmador_nimscodd_issue.3.d:0 "Nimscodd refuse notre proposition ! Nous prendrons cette île par la force !"
custom_celmador_nimscodd_issue.3.a:0 "GUERRRRRE (Attention, cela appellera TOUS les alliés de Nimscodd !)"
custom_celmador_nimscodd_issue.3.b:0 "Nous ne sommes pas encore prêts pour la guerre"


custom_heir_boost.1.t:0 "Amélioration de l'héritier"
custom_heir_boost.1.d:0 "Amélioration de l'héritier"
custom_heir_boost.1.A:0 "Amélioration de l'héritier"

