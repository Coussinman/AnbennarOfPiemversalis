 cannor_monument_flavour.1.t:0 "La Cour Délabrée"
 cannor_monument_flavour.1.d:0 "Des décennies s'étaient écoulées depuis la chute de la Citadelle Septentrionale aux mains des orques durant la Marée Verte, et pourtant les restes dispersés des Castellyriens massacrés continuaient de dépeindre avec une vivacité crue la sauvagerie qui s'abattit sur eux en ce jour funeste. Traverser la cour intérieure était un acte de profanation, car des ossements humains, dissimulés sous les hautes herbes, se brisaient et craquaient à chaque pas.\n\nBien que des portions de la Citadelle Septentrionale eussent été restaurées par Castellyr, le palais, qui ne remplissait aucune fonction militaire, demeurait intact depuis la Bataille de Trialmount, des siècles auparavant. Dans les rares endroits où la lumière atteignait le sol, la végétation s'agrippait fermement au marbre, n'offrant que de fugaces aperçus de la maçonnerie ouvragée et des fresques décolorées qui ornaient jadis cette cour splendide. Dans l'obscurité, les champignons prospéraient, se repaissant du tissu des tapisseries finement ouvragées et des étoffes précieuses.\n\nSur le flanc du palais faisant face au Trialmount se trouve le Grand Hall du Départ, d'où d'innombrables aspirants au titre de Castan avaient gravi la montagne au fil des siècles pour affronter les Épreuves de Castan. Ceux qui échouèrent sont perdus pour l'histoire, et ceux qui triomphèrent furent immortalisés par des statues de marbre sculptées dans les piliers mêmes qui soutenaient l'édifice. Pourtant, des centaines de piliers demeurent de simples blocs de marbre brut, le Grand Hall du Départ ayant été conçu pour accueillir un millier de statues de Castans qui régneraient sur Castanor pendant des millénaires. L'idée qu'un monde sans Castanor pût exister n'avait jamais effleuré l'esprit de ses bâtisseurs.\n\nBien que la Citadelle Septentrionale demeure intacte, la question de savoir si une nation pourra restaurer ce monument à la hauteur de son potentiel, à un état digne de son héritage, reste sans réponse."
 cannor_monument_flavour.1.a:0 "Par la diligence, la Citadelle pourra prospérer."
 cannor_monument_flavour.1.b:0 "Ce lieu fut jadis le centre de l'un des plus grands empires ; il peut le redevenir."
 cannor_monument_flavour.1.c:0 "La Citadelle est une relique d'un âge révolu ; nos efforts devraient se porter ailleurs."

 cannor_monument_flavour.2.t:0 "Le Duo Prospère"
 cannor_monument_flavour.2.d:0 "Castonath et la Citadelle Septentrionale furent jadis le centre du monde. Depuis la Citadelle Septentrionale régnèrent des générations de Castans, jamais déconnectés de l'empire qu'ils gouvernaient, car la Cité du Désir du Monde demeurait toujours en vue. Tandis que Castonath prospérait sous le regard vigilant de la Citadelle Septentrionale, elle demeurait rassurée par la certitude que, même si son paysage urbain avait changé maintes fois depuis l'Antiquité, la citadelle au sommet de la montagne lointaine restait immuable.\n\nLa survie de ces deux géants témoigne de leur robustesse et de leur importance, car toutes les Merveilles de Balgar n'ont pas subsisté. L'aqueduc qui reliait autrefois la Citadelle Septentrionale à Castonath n'est plus qu'une coquille vide de son ancienne gloire, son marbre séculaire pillé tant par des pillards désespérés que par des sculpteurs ambitieux. Tandis que la Citadelle Méridionale, ce palais de rêves et de luxe qui éclipsait l'opulence des cours rivales à travers le continent, est depuis longtemps tombée, Castonath et la Citadelle Septentrionale ont résisté à l'épreuve du temps.\n\nBien que ces jours glorieux soient révolus depuis longtemps, la perspective d'une prospérité mutuelle entre la Citadelle Septentrionale et Castonath est redevenue un objectif réalisable. Pour la première fois depuis l'ère des royaumes chevaleresques, notre État possède les ressources nécessaires pour restaurer quelques fragments de la magnificence de Castanor."
 cannor_monument_flavour.2.a:0 "Se concentrer sur la cour impériale de la Citadelle Septentrionale."
 cannor_monument_flavour.2.b:0 "Les deux sont inséparables ; investissons dans les deux à parts égales."
 cannor_monument_flavour.2.c:0 "Castonath a toujours été le joyau de l'Escann ; elle doit être traitée comme tel."

 cannor_monument_flavour.3.t:0 "La Citadelle Septentrionale, Cœur de la Conquête"
 cannor_monument_flavour.3.d:0 "Depuis les premiers jours de Castanor, la Citadelle Septentrionale a rempli trois fonctions primordiales. La première était celle d'une fortification imprenable garantissant l'acheminement des vivres vers Castonath même en cas de siège ; quiconque souhaitait prendre la cité devait d'abord conquérir la colossale forteresse au sommet de la montagne. Sa seconde fonction était d'être le cœur de Castanor, un lieu élevé de sérénité d'où les Castans administraient leur vaste empire.\n\nDepuis qu'elle est tombée en décrépitude il y a des siècles, tous ceux qui connaissaient la troisième fonction de la Citadelle Septentrionale et son ancien nom familier ont depuis longtemps trépassé. Pourtant, avec la restauration de la citadelle dans sa gloire d'antan et le réveil de la salle de guerre, le peuple connaîtra de nouveau le nom de « Citadelle de la Conquête ».\n\nGénéraux et membres de la cour se rassemblent désormais autour d'une carte topographique de l'Escann et de Cannor, avec des maquettes à l'échelle des Murailles de Castanor et de toutes les Merveilles de Balgar, réalisées avec un souci exquis du détail. Chaque donnée militaire, quelle que soit son importance, est mise à jour quotidiennement et marquée par des pièces de pierre représentant armées, flottes et fortifications. Des officiers subalternes suivent les routes logistiques amies et ennemies, cartographiant méticuleusement les itinéraires des convois de ravitaillement devant accompagner nos armées en cas de guerre, tout en surveillant la situation logistique de l'ennemi afin que nos généraux ne soient jamais pris au dépourvu durant leurs campagnes. Les bureaucrates impriment dans leur mémoire le paysage qu'ils gouverneront, tandis que les cartographes produisent laborieusement des centaines de cartes d'une précision méticuleuse afin qu'aucun dirigeant ne reste aveugle aux particularités de son environnement. Aucun détail n'échappe à l'examen de la salle de guerre, car si le vieil adage « l'information est le pouvoir » est vrai, alors il n'est point de lieu plus puissant en Halann que la salle de guerre."
 cannor_monument_flavour.3.a:0 "Depuis la Citadelle de la Conquête, un nouvel empire s'élèvera !"

 cannor_monument_flavour.4.t:0 "Les Mages de l'intérieur"
 cannor_monument_flavour.4.d:0 "« Quand un mage s'épanouit-il ? »\n\nUn mage emprisonné titube à travers le dédale de Bal Vertesk, cherchant désespérément une issue. Sachant qu'il ne peut gaspiller sa seule chance de liberté, il ne s'arrête pas pour se demander pourquoi sa cellule disposait d'une voie d'évasion aussi providentielle.\n\n                                                            ***\n\nUn détenu est suspendu à un nœud coulant, avec tout juste assez de marge pour que la pointe de ses orteils touche le sol. Il lutte pour respirer, dressé sur la pointe des pieds, jusqu'à ce que ses muscles cèdent et qu'il endure l'asphyxie pendant d'atroces instants, avant de rassembler ses forces pour se hisser de nouveau sur ses orteils. Le cycle se répète des centaines de fois tandis que le mage suffoque lentement au fil des heures.\n\nLe sujet n'a pas réussi à invoquer un serviteur élémentaire pour se libérer. Test infructueux.\n\n« Quand un mage s'épanouit-il ? »\n\nDeux rats affamés en cage sont placés directement sur le torse nu d'un détenu. Tandis que les rats commencent à se repaître de sa peau et de sa chair, le mage hurle dans une agonie croissante. Pourtant, l'extérieur de son corps s'avère insuffisant pour sustenter ces vermines voraces, et lorsque le mage sent un rat s'enfouir dans son corps, il perd enfin connaissance.\n\nLe sujet n'a pas réussi à enchanter deux vulgaires rats. Test infructueux.\n\n« Quand un mage s'épanouit-il ? »\n\n                                                            ***\n\nAprès des heures d'errance, le détenu tourne sans le savoir le dernier angle, mais ce n'est pas la liberté qui l'accueille, mais la vue d'hommes arborant le blason du Magisterium. L'homme le plus richement vêtu parle d'un ton froid et dénué d'émotion : « Le sujet s'est échappé du labyrinthe sans l'aide de sa magie de divination. Test non concluant. Administrer de nouveau le test. » Le sol tremble tandis que les murs du labyrinthe commencent à se mouvoir ; le fugitif se rue vers la brèche qui se referme mais ne parvient pas à l'atteindre à temps. Son appel désespéré à la clémence résonne à travers le dédale, mais en vain.\n\nLe sujet n'a pas réussi à utiliser la magie de divination pour s'échapper du labyrinthe. Test infructueux."
 cannor_monument_flavour.4.a:0 "« Quand un mage s'épanouit-il ? »"

 cannor_monument_flavour.5.t:0 "Vertesk, Cité de la Vision Éternelle"
 cannor_monument_flavour.5.d:0 "Les gens les tolérèrent au début, séduits qu'ils étaient par la promesse alléchante d'une plus grande sécurité offerte par ces yeux artificiels flottant au-dessus d'eux. Ce qui commença par quelques observateurs volant çà et là en quête de criminels et de vauriens se multiplia toujours davantage, alors même que la criminalité avait disparu.\n\nMême lorsque le battement d'ailes devint omniprésent, les gens continuèrent à ignorer leur présence ; après tout, les yeux volants ne traquaient que les criminels, et qui n'avait rien à cacher n'avait rien à craindre.\n\nDes familles en apparence innocentes furent soudain déchirées et les disparitions ne cessèrent de croître, mais les yeux continuaient d'essaimer hors de la Tour Noire. L'invention des artificiers avait anéanti le couvert des ténèbres, rendant le soleil et la lune indiscernables. L'éradication du crime n'était pas leur véritable objectif, mais une conséquence commode de l'appareil sécuritaire qui scrutait chaque seconde de la vie des citoyens verteskers.\n\nLe moindre mot déplacé, le moindre geste suspect, la moindre émotion compromettante, la moindre dissidence perçue, et les yeux s'agrippaient à chacun de vos mouvements jusqu'à votre inévitable disparition. Pas un instant de répit n'est accordé face à cette surveillance incessante. Il n'y a point de salut, seulement la conformité ; la nouvelle normalité doit être embrassée non parce qu'elle est juste, mais parce qu'elle est une condition préalable à votre survie."
 cannor_monument_flavour.5.a:0 "La lumière est la réponse de la nuit à l'ombre menaçante du jour."

 cannor_monument_flavour.6.t:0 "Marais et feux follets"
 cannor_monument_flavour.6.d:0 "Des corps conservés sous les marécages depuis des siècles affleurent sous les eaux fangeuses, leurs yeux vitreux fixant le ciel pour l'éternité. Leurs âmes s'accrochent au monde avec rage, macérant dans la malice tandis qu'elles cherchent une vengeance qu'elles ne peuvent obtenir. Pourtant, la magie de celui qu'elles haïssent persiste, permettant à ces âmes de pervertir le paysage petit à petit. Lorsqu'un nombre suffisant d'âmes convergent, elles entremêlent cadavres, flore et boue en une abomination titubante, agissant un temps avec cette enveloppe fusionnée selon leur fureur, avant de se désintégrer et de retomber en leurs parties constituantes. Ce cycle se poursuit jusqu'à ce que les âmes aient perdu tout souvenir de ce qu'elles furent jadis, un vide empli uniquement de rage. Une fois purgées de leur passé mortel, une abomination qui ne connaît que la rage prend corps et erre dans les marais, cherchant un ennemi dont elle n'a plus mémoire.\n\nBal Mire fut jadis l'une des plus grandes fortifications de Cannor, jusqu'à ce que Zaamalot le Noir incendie la forteresse et en fasse son antre. Des siècles après sa mort, les terres entourant Bal Mire restent souillées par une magie inconnue que seuls de puissants mages peuvent purifier. L'afflux de colons précipite toutefois une approche nouvelle, car même si une parcelle de terre est purifiée, si le village est anéanti, le marais engloutira à nouveau ce qu'il a été contraint de céder.\n\nBal Mire elle-même n'est pas souillée par cette magie corruptrice et, si elle est reconstruite, peut devenir une oasis de tranquillité d'où la reconquête des tourbières environnantes pourra véritablement commencer."
 cannor_monument_flavour.6.a:0 "Bal Mire recèle un immense potentiel. Elle doit être reconstruite dans toute sa splendeur !"
 cannor_monument_flavour.6.b:0 "Des périls rôdent dans les marais, mais rebâtir la forteresse en vaut la peine."
 cannor_monument_flavour.6.c:0 "Les marécages de Balmire ne présentent guère d'intérêt pour nous."

 cannor_monument_flavour.7.t:0 "S'adapter à une vie inquiétante"
 cannor_monument_flavour.7.d:0 "Bal Mire apporte une certaine quiétude à des marécages par ailleurs inhospitaliers. Au milieu d'une mer de marais périlleux, elle représente un phare d'espoir, un témoignage de la façon dont l'indomptable volonté peut persévérer même dans les paysages les plus hostiles. Bien que des abominations continuent de rôder dans les marais et que des âmes tourmentées contorsionnent le paysage pour piéger les victimes imprudentes, avec suffisamment d'expérience, les ténèbres des marécages peuvent être traversées.\n\nMême si un nombre croissant de colons continuent d'établir leurs foyers à l'ombre de Bal Mire, il reste encore beaucoup à faire. Si nos progrès sont un signe de ce que nous pouvons accomplir, un jour ces âmes agitées trouveront enfin le repos et ces marécages souillés seront libérés de l'emprise du silence tordu."
 cannor_monument_flavour.7.a:0 "La lumière de Bal Mire réconforte tous ceux qui l'approchent."

 cannor_monument_flavour.9.t:0 "L'Héritage d'Oldhaven"
 cannor_monument_flavour.9.d:0 "This should be hidden"
 cannor_monument_flavour.9.a:0 "This should be hidden."

