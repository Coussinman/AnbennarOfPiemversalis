l_french:
 nativebuyout.1.t:0 "Acquérir de Nouvelles Terres"
 nativebuyout.1.desc1:0 "Le voyage est terminé, et nous sommes enfin arrivés en Aelantir ! Notre campement provisoire se muera bientôt en une ville, et son nom sera [Root.Capital.GetName].\n\nCela dit, nos éclaireurs ont repéré un emplacement encore plus propice à quelques lieues d'ici pour bâtir une capitale. Et ils sont convaincus de pouvoir persuader les autochtones de nous vendre leurs terres !"
 nativebuyout.1.desc2:0 "Le voyage est terminé, et nous sommes enfin arrivés en Aelantir ! [Root.Capital.GetName] deviendra bientôt une magnifique capitale.\n\nCela dit, l'île juste en face de notre rivage est contrôlée par des autochtones connus sous le nom de « Nés-des-Ruines ». Il serait sage d'établir le contact avec ces peuples et de tenter de leur racheter l'île."
 nativebuyout.1.a:0 "Envoyer aux autochtones une offre généreuse"
 nativebuyout.1.b:0 "Leur envoyer quelques babioles et de nos armes les plus vétustes"
 nativebuyout.1.c:0 "Nous prendrons simplement l'endroit par la force"
 nativebuyout.1.d:0 "Notre emplacement actuel à [Root.Capital.GetName] nous convient parfaitement"
 nativebuyout.2.t:0 "Une offre des étrangers"
 nativebuyout.2.d1:0 "Des émissaires d'un peuple nouveau venu du rivage, ceux qui se nomment la nation [From.GetName], sont arrivés à [nativebuy_prov3.GetName] avec une proposition. Ils demandent l'autorisation d'installer leur peuple à [nativebuy_prov3.GetName] et d'y bâtir une grande cité, et en échange, ils promettent de nous céder une grande part de leurs richesses et matériaux."
 nativebuyout.2.d2:0 "Des émissaires d'un peuple nouveau venu du rivage, ceux qui se nomment la nation [From.GetName], sont arrivés à [nativebuy_prov3.GetName] avec une proposition. Ils demandent l'autorisation d'installer leur peuple à [nativebuy_prov3.GetName] et d'y bâtir une grande cité, et en échange, ils promettent de nous donner quelques-unes de leurs pièces d'or et de leurs ouvrages artisanaux."
 nativebuyout.2.d3:0 "Des émissaires d'un peuple nouveau venu du rivage, ces êtres de petite stature que nous connaissons sous le nom de « Shokils », sont arrivés à [nativebuy_prov3.GetName] avec une proposition. Ils demandent l'autorisation d'y installer leur peuple et d'y bâtir une grande cité, et en échange, ils promettent de nous offrir un panier rempli de pièces d'or ainsi que nombre de leurs inestimables objets patrimoniaux."
 nativebuyout.2.a:0 "Nous acceptons le marché"
 nativebuyout.2.b:0 "Les terres de [nativebuy_prov3.GetName] ne sont pas à vendre"
 nativebuyout.3.t:0 "Les autochtones acceptent !"
 nativebuyout.3.d1:0 "Les émissaires de la tribu [From.GetName] ont répondu : ils acceptent notre offre d'achat de leurs terres. Nos colons s'installeront et poseront les fondations de notre nouvelle capitale, [nativebuy_prov4.GetName], en un rien de temps."
 nativebuyout.3.d2:0 "Les émissaires de la tribu [From.GetName] ont répondu : ils acceptent notre offre d'achat de leur île. Nos colons s'installeront et poseront les fondations d'un nouvel établissement dans ce qui deviendra [nativebuy_prov4.GetName]."
 nativebuyout.3.a:0 "Ce fut un plaisir de traiter avec vous"
 nativebuyout.4.t:0 "Les autochtones refusent"
 nativebuyout.4.d:0 "Les autochtones de [From.GetName] ont, contre toute attente, refusé notre offre pourtant des plus raisonnables pour l'achat de leurs terres. Leur [From.Monarch.GetTitle] n'a aucunement l'intention de laisser nos colons pénétrer sur leur territoire."
 nativebuyout.4.a:0 "Quel dommage"
 nativebuyout.4.b:0 "...pour eux"
 nativebuyout.5.t:0 "Attaque sur nos terres"
 nativebuyout.5.d:0 "Le peuple de la côte a lancé une attaque surprise sur nos terres et chassé notre tribu, s'emparant du territoire et le rebaptisant [nativebuy_prov3.GetName] !\n\n(N.B. : Cet événement est prévu uniquement pour l'IA ; si vous voyez ceci, veuillez le signaler comme un bogue sur le Discord d'Anbennar.)"
 nativebuyout.5.a:0 "Rassemblez les guerriers !"