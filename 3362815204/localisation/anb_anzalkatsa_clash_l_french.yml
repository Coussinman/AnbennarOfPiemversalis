 #Events
 AnzalkatsaSchoolFightEvents.0.t:0 "Nous sommes victorieux"

 AnzalkatsaSchoolFightEvents.4.t:0 "Renaissance de la pensée ancienne"
 AnzalkatsaSchoolFightEvents.4.d:0 "L'idée de redécouvrir et d'apprécier les œuvres anciennes n'est certes pas étrangère à notre peuple ; nous n'avions nul besoin qu'un humain nous conte les merveilles du passé, surtout de notre propre passé. Cependant, avec la diffusion récente de l'idée d'une « Renaissance » jusqu'en nos contrées, une intensification de l'étude de nos anciens auteurs et théoriciens s'est amorcée. Des œuvres telles que les Trois Cent Trente-Trois de Nulri Dreamscribe et De l'Équilibre des Plateaux de Thuz Bluescale, considérées comme des exemples exemplaires de la production intellectuelle du 332e Empire, sont de nouveau consultées par des érudits de toutes obédiences à travers Taneyas. En tant que meilleurs conservateurs de ce passé, les textes et les études de ces œuvres anciennes proviennent des adeptes des Sculpteurs de l'Être, dont les temples bruissent de scribes copiant et diffusant ces manuscrits, tandis que des architectes étudient les bâtiments antiques de Zerat et de Karassk pour en concevoir de nouveaux à leur image.\n\nL'essor et l'influence de ces travaux ont naturellement renforcé les positions des Sculpteurs de l'Être. Ils arguent que ces œuvres démontrent la puissance du 332e Empire, et qu'en observant le passé et les grandes réalisations qui furent les siennes, on peut mieux façonner le présent. Forts de la sagesse de leurs prédécesseurs, tous les Sauriens seront mieux préparés pour l'avènement du 333e Empire."
 AnzalkatsaSchoolFightEvents.4.a:0 "Ce n'est point dans de vieux grimoires poussiéreux que réside le 333e Empire."
 AnzalkatsaSchoolFightEvents.4.b:0 "Nous trouverons notre avenir dans les leçons du passé."

 AnzalkatsaSchoolFightEvents.5.t:0 "Colonies nouvelles et colonies anciennes"
 AnzalkatsaSchoolFightEvents.5.d:0 "Des nouvelles nous sont parvenues de l'étranger concernant une terre nouvelle, ou ancienne selon certains récits, nommée « Aelantir ». Il semble que les Cannoriens aient entrepris d'explorer et de coloniser ces terres, et d'y fonder leurs propres empires. Alors que ces nouvelles se sont répandues jusqu'à Taneyas, elles nous ont amenés à réfléchir à notre propre histoire de colonisation, en particulier aux efforts de l'ancien 332e Empire. De nombreux adeptes des Sculpteurs de l'Être se sont attelés à retrouver les informations et l'histoire perdues des institutions coloniales, les archives de colonies disparues, et même à établir le contact avec les communautés sauriennes qui sont les vestiges de ces avant-postes perdus du 332e Empire.\n\nCe qui a été découvert s'est avéré des plus fascinants, et a fait l'objet de maintes discussions tant parmi les nobles que les intellectuels de tout Taneyas. Le savoir que nous nous étendîmes jadis bien au-delà de nos terres actuelles, jusque dans la Fangaula et le Marais des Ombres, que des institutions redoutables permirent cette expansion, et que des influences de cet âge antique de colonisation perdurent encore, a grandement rehaussé l'estime envers le 332e Empire et son héritage. Les adeptes des Sculpteurs de l'Être ont œuvré avec zèle à promouvoir cet effort, et beaucoup voient désormais leur position comme la plus juste : pourquoi détruire l'héritage d'un empire qui put atteindre une telle étendue et une telle influence ?"
 AnzalkatsaSchoolFightEvents.5.a:0 "Ces diversions ne nous rapprocheront point du 333e Empire !"
 AnzalkatsaSchoolFightEvents.5.b:0 "Les racines du 332e Empire plongent profond, même au-delà de Taneyas."

 AnzalkatsaSchoolFightEvents.6.t:0 "L'impression des idées"
 AnzalkatsaSchoolFightEvents.6.d:0 "« ...Contrairement à ce que certains prétendent, nous ne pouvons nous en remettre au destin pour qu'il advienne simplement et engendre notre 333e Empire. Ce n'est point chose qui nous sera ordonnée d'en haut, apparaissant quand le besoin s'en fera sentir. Ce n'est point une marmite qui ne bouillira que lorsque nous détournerons le regard, pour découvrir à notre retour que notre empire est arrivé. C'est un destin que nous devons forger de nos propres mains, de toute la vigueur et la puissance que nous pouvons rassembler. Les flèches doivent être conquises, les Sauriens unifiés, et les anciennes voies renversées et piétinées pour faire place à l'avenir.\n\nIls parlent de laisser cela à d'autres, aux ankashyi, aux Naga et aux soldats, mais n'est-ce point notre dessein que de lutter pour cet objectif ? De combattre pour lui, de l'accomplir. Même nous, les humbles Sauriens de cette terre, devons faire tout ce qui est en notre pouvoir pour avancer vers notre destinée. Aussi je vous appelle tous à présent : abattez le passé ! Effacez-le et détruisez-le ! Trouvez tout ce qui en subsiste et mettez-y fin. Ensemble, nous ferons un pas de plus vers notre avenir. » — Extrait de « Que devons-nous faire ? », un texte controversé imprimé par Kizwa Flametongue en soutien aux Sculpteurs du Destin."
 AnzalkatsaSchoolFightEvents.6.a:0 "L'imprimerie répandra nos croyances plus loin encore !"
 AnzalkatsaSchoolFightEvents.6.b:0 "Des idées dangereuses qui ne sèment que le désordre."

 AnzalkatsaSchoolFightEvents.7.t:0 "Nouveaux marchands, nouvelles idées"
 AnzalkatsaSchoolFightEvents.7.d:0 "« ...Bien que la richesse de notre correspondance et nos nombreuses discussions durant le voyage parlent d'elles-mêmes, je me dois d'exprimer explicitement ma gratitude pour notre chaleureuse amitié. Certes, je n'étais point un étranger aux mœurs des peuples d'ailleurs, mais avant l'arrivée de l'expédition commerciale que vous accompagniez, je ne leur avais guère accordé de réflexion. Puis, en vous rencontrant, j'y fus véritablement initié. Des formes de gouvernance différentes, d'organisation politique, de commerce, de guerre, de systèmes de croyances et de technologie... Tout cela, fascinant et nouveau pour moi. Je chéris les ouvrages que vous m'avez offerts, et je les parcours assidûment tout en les traduisant en Zytazashtu. Je sais que vous en faites de même avec ceux que je vous ai offerts ; j'espère seulement avoir été un tuteur assez compétent dans notre langue pour que vous puissiez vous attaquer à ces textes.\n\nComme je vous l'ai confié, je ne suis plus si singulier parmi les Sauriens dans mon étude et mon appréciation du savoir étranger. Chaque jour, de nouveaux marchands venus d'au-delà des mers abordent nos rivages, et chacun d'eux contribue à répandre de nouvelles idées, qu'ils soient Cannoriens, comme vous-même, ou Yanshenais, Rahenis, voire quelques Nés-des-Ruines d'Aelantir ! Chacun apporte des idées neuves, qui ont influencé nos propres pensées. Beaucoup remettent désormais en question les voies de l'ancien 332e Empire et de ses partisans parmi les Sculpteurs de l'Être. Les Sculpteurs du Destin arguent que, puisque certaines de ces idées nouvelles sont acceptables et bénéfiques aux Sauriens, ne devrions-nous pas remplacer les anciennes voies par ces dernières, afin de faire advenir le 333e Empire ?\n\nJ'ignore de quel côté penchera le débat lorsque notre dernier Empire sera fondé, mais je sais désormais de quel côté je me tiens.\n\nAvec mes salutations les plus cordiales,\nQakot Waverider »\n — Extrait de la Correspondance Qakot-Amiera, $YEAR$"
 AnzalkatsaSchoolFightEvents.7.a:0 "Nous forgerons notre destin avec des idées nouvelles !"
 AnzalkatsaSchoolFightEvents.7.b:0 "Ces idées étrangères n'apporteront que la ruine..."

 AnzalkatsaSchoolFightEvents.8.t:0 "Une ancienne menace"
 AnzalkatsaSchoolFightEvents.8.d:0 "Des nouvelles inquiétantes sont parvenues de ceux qui vivent aux confins des tribus Ashhana : les tribus maudites par le sang se sont trouvé un dirigeant unifié. Celui-ci règne sur la majeure partie de leur peuple et proclame son dessein de soumettre le reste à sa domination. Une telle entité politique unifiée et organisée des Sauriens Ashhana, quelles que soient leurs proclamations d'intentions envers les terres extérieures aux tribus Ashhana, a semé l'inquiétude et l'alarme parmi le reste des Sauriens.\n\nCela a conduit beaucoup à étudier le passé, pour y chercher des réponses, et à découvrir qu'il en offre bien peu. Le 332e Empire, après tout, fut renversé par les berserkers maudits par le sang, et ses textes n'offrent donc guère de solutions sur la manière de répondre au retour de cette grande menace. Cela a engendré un foisonnement d'idées, de réflexions et de théories nouvelles sur la meilleure façon de réagir à la montée en puissance des Ashhana, souvent enveloppées de critiques envers l'approche du 332e Empire à leur égard. Il s'en est suivi un accroissement général du prestige des Sculpteurs du Destin, dont les érudits mènent cette charge, et le soutien à leurs croyances s'est renforcé."
 AnzalkatsaSchoolFightEvents.8.a:0 "Notre empire final ne succombera point à de tels ennemis."
 AnzalkatsaSchoolFightEvents.8.b:0 "Mais les tactiques éprouvées restent les meilleures !"

 AnzalkatsaSchoolFightEvents.9.t:0 "Des idées hérétiques"
 AnzalkatsaSchoolFightEvents.9.d:0 "Toute croyance saurienne est bâtie autour de l'objectif de l'édification du dernier, du 333e Empire. Tous ceux qui chassent dans les jungles, marchent dans l'armée, écrivent dans les cités, ou accomplissent toute autre tâche, le font dans la conviction que cela rapproche notre destin d'un pas supplémentaire. C'est la raison pour laquelle nous nous levons le matin et nous reposons le soir, et qui motive les actes et les choix des souverains à travers tout Taneyas. Que ferait un rhadakaya s'il perdait cette raison d'être ? Comment pourrait-il exister sans elle ?\n\nC'est une question devenue étonnamment et dangereusement d'actualité, car les dirigeants d'une nation saurienne ont décidé d'abandonner l'Anzalkatsa, jurant allégeance à un système de croyances païen, totalement étranger à ces terres et à notre peuple. Alors que cette nouvelle est digérée à travers Taneyas, les Sculpteurs de l'Être se sont empressés de fournir une explication à cet acte. Ils accusent les Sculpteurs du Destin, connus pour leur promotion et leur adoption des idées étrangères, d'avoir poussé trop loin et d'avoir désormais invité l'hérésie au cœur même des Sauriens. Bien qu'ils nient vigoureusement cette accusation, beaucoup y voient la vérité, et se sont détournés des Sculpteurs du Destin et de leurs arguments."
 AnzalkatsaSchoolFightEvents.9.a:0 "Ils ont poussé leurs études trop loin."
 AnzalkatsaSchoolFightEvents.9.b:0 "Le 333e Empire ne se trouvera point dans des croyances païennes !"

 AnzalkatsaSchoolFightEvents.10.t:0 "Une menace nouvelle"
 AnzalkatsaSchoolFightEvents.10.d:0 "Si notre terre n'a jamais été totalement à l'abri des envahisseurs, ceux-ci se sont souvent limités à des incursions tout au plus. Un revirement de fortune s'est toutefois produit : une menace nouvelle, organisée et sérieuse a lancé non pas une simple intrusion, mais une véritable invasion de Taneyas comme on n'en avait plus vu depuis celle qui brisa le 332e Empire. Des étrangers, ignorant nos coutumes et même hostiles à celles-ci, ont réclamé la souveraineté sur de nombreuses colonies sauriennes et sur un large pan de nos terres, perturbant les ambitions de tous les fidèles qui préparaient notre peuple au 333e Empire.\n\nTandis que beaucoup cherchent des explications à cette situation, les Sculpteurs du Destin ont été pris pour cibles, nombre arguant que le désarroi et la division qu'ils ont apportés aux terres sauriennes ont créé la brèche que ces envahisseurs hostiles ont exploitée. Si les Sauriens étaient demeurés unis dans le maintien du 332e Empire, de ses institutions, de ses richesses et de sa puissance, au lieu de chercher à les abattre, les envahisseurs auraient été repoussés, soutient-on. Cela a provoqué une réaction contre les Sculpteurs du Destin, et une montée du nombre d'adeptes des Sculpteurs de l'Être."
 AnzalkatsaSchoolFightEvents.10.a:0 "C'est la pourriture du 332e qui attire ces invasions, et non qui les repousse !"
 AnzalkatsaSchoolFightEvents.10.b:0 "La désunion que les Sculpteurs du Destin sèment a provoqué ce désastre."

 AnzalkatsaSchoolFightEvents.11.t:0 "De nouvelles cités surgissent"
 AnzalkatsaSchoolFightEvents.11.d:0 "L'un des arguments que les Sculpteurs de l'Être avancent toujours pour défendre leurs vues, ce sont les cités impériales disséminées à travers Taneyas. La majesté de leur architecture, l'ampleur de leur population et leur rôle central dans le commerce et la gouvernance sauriens sont toutes les preuves dont ils ont besoin de l'influence persistante et du puissant héritage du 332e Empire. Si ce qu'il a construit était si médiocre, pourquoi les gens continuent-ils à affluer vers ces centres pour y vivre et y travailler ? Pourquoi les Sculpteurs du Destin ne bâtissent-ils pas quelque chose de leur cru ?\n\nIl semble que cette critique ait été prise à cœur, car une nouvelle cité s'est élevée à une grande proéminence, éclipsant même nombre de Cités Impériales. Ses origines ne résident pas dans l'antique 332e Empire, mais dans la réalité contemporaine de Taneyas : non pas bâtie sur les ossements de l'ancien, mais érigée de fond en comble comme quelque chose de frais et de neuf. Cela a impressionné nombre de Sauriens qui ont entendu parler ou même visité cette nouvelle métropole, et qui voient désormais les Sculpteurs du Destin, dont les croyants furent les principaux artisans de cette cité nouvelle, comme étant dans le vrai quant à la pratique de l'Anzalkatsa."
 AnzalkatsaSchoolFightEvents.11.a:0 "Qui bâtit verra son œuvre peuplée."
 AnzalkatsaSchoolFightEvents.11.b:0 "Mais tous les chemins ne mènent-ils pas à Zerat ?"

 AnzalkatsaSchoolFightEvents.12.t:0 "Les Ashhana réformés"
 AnzalkatsaSchoolFightEvents.12.d:0 "Des nouvelles stupéfiantes se sont répandues rapidement dans les cours des Sauriens, puis de ces cours jusqu'au peuple : des visiteurs venus des terres Ashhana de Taneyas, qui sont justement cela : des visiteurs. Ni conquérants, ni envahisseurs, ni bêtes écumantes assoiffées de mort et de destruction. Il semble qu'ils soient parvenus à maîtriser ce qu'ils appellent la « malédiction du sang », qui les transforme en ces brutes pour lesquelles ils sont tristement célèbres en terres sauriennes. Ils déclarent l'avoir vaincue, et ne cherchent que la paix et la compréhension entre nos deux peuples « frères », comme ils les décrivent.\n\nCette requête a été accueillie de manière fort différente selon les cours. Celles des Sculpteurs du Destin, toujours avides de changer la société saurienne, se sont montrées plutôt accueillantes envers les Ashhana et disposées à les écouter ; dans certains cas, elles ont même envoyé des émissaires en leurs terres pour poursuivre ces pourparlers. Les Sculpteurs de l'Être ont, au contraire, réagi avec mépris et suspicion. Ils y voient une simple ruse de l'ennemi de tous les Sauriens civilisés pour continuer à saper les ambitions des fidèles de l'Anzalkatsa, d'autant plus compte tenu des croyances hérétiques des Ashhana. Parmi le peuple, les arguments de ces derniers ont trouvé davantage d'écho, car la méfiance envers les Sauriens crocodiliens demeure vive."
 AnzalkatsaSchoolFightEvents.12.a:0 "Ne devrions-nous pas leur accorder une chance ?"
 AnzalkatsaSchoolFightEvents.12.b:0 "Ce ne sont que des hérétiques barbares, rien de plus."

 AnzalkatsaSchoolFightEvents.13.t:0 "Karrask endure"
 AnzalkatsaSchoolFightEvents.13.d:0 "La plupart estimaient que Karrask serait bientôt relégué aux annales de l'histoire. D'abord attaqué par l'ambitieux Katyradz Riverclaw d'Asarta, puis par des rebelles sur les îles de Karshyr, il semblait aux observateurs extérieurs que Karrask, jadis l'un des plus puissants royaumes sauriens lorsqu'il dirigeait la Confédération Karassienne, succomberait face à ces envahisseurs et rebelles. Cette certitude ne fit que se renforcer dans l'esprit de beaucoup lorsque Katyradz s'empara de la forteresse d'Ashuzal, laissant la voie vers la cité de Karrask grande ouverte. Assailli de toutes parts, la chute imminente de ce bastion, à la fois Cité Impériale et fief des Sculpteurs de l'Être, face à leurs adversaires philosophiques, semblait annoncer à beaucoup la direction que prendrait l'avenir des Sauriens, et celle-ci résidait dans les croyances des Sculpteurs du Destin.\n\nMais, malgré ces adversaires et ces menaces dressés contre lui, Karrask a survécu : certes meurtri et blessé par l'épreuve, mais toujours debout, défiant ceux qui tentèrent de le soumettre. Cela a déjà provoqué des ondes de choc dans toute la société saurienne, surtout dans le sillage de la conquête de Zerat par Rayaz, qui avait signalé à beaucoup la direction dans laquelle soufflait le vent à Taneyas. Nombre de ceux qui juraient par les Sculpteurs du Destin après cette conquête voient désormais les Sculpteurs de l'Être sous un jour nouveau, et certains arguent que la résilience de Karrask face à cette invasion justifie leurs croyances."
 AnzalkatsaSchoolFightEvents.13.a:0 "Ils n'ont peut-être pas succombé cette fois, mais leur chute viendra."
 AnzalkatsaSchoolFightEvents.13.b:0 "Les vrais croyants ne se laissent pas si aisément vaincre !"

 AnzalkatsaSchoolFightEvents.14.t:0 "Les Sculpteurs de l'Être conquièrent de nouvelles terres !"
 AnzalkatsaSchoolFightEvents.14.d:0 "Avec les derniers bouleversements territoriaux à Taneyas, les adeptes des Sculpteurs de l'Être ont étendu leur emprise sur les Cités Impériales. Déjà ils ont entrepris de restaurer des pans du 332e Empire, reconstruisant ses symboles et son iconographie, hissant ses bannières et réparant les édifices érigés sous son règne. Cette conquête et ces travaux de restauration ont convaincu davantage de Sauriens de la justesse des croyances des Sculpteurs de l'Être, qui œuvrent désormais au maintien des institutions du 332e Empire."
 AnzalkatsaSchoolFightEvents.14.a:0 "De sombres nouvelles."
 AnzalkatsaSchoolFightEvents.14.b:0 "D'excellentes nouvelles !"

 AnzalkatsaSchoolFightEvents.15.t:0 "Les Sculpteurs du Destin conquièrent de nouvelles terres !"
 AnzalkatsaSchoolFightEvents.15.d:0 "Avec les derniers bouleversements territoriaux à Taneyas, les adeptes des Sculpteurs du Destin ont étendu leur emprise sur les Cités Impériales. Ils se sont attelés à effacer les symboles du 332e Empire, abattant son iconographie, piétinant ses bannières et dressant des plans pour remplacer les anciens bâtiments du 332e par de nouveaux édifices. Cette conquête et cette volonté de changement ont convaincu davantage de Sauriens de la justesse des croyances des Sculpteurs du Destin, qui œuvrent désormais à provoquer le changement qui rapprochera notre empire fatidique."
 AnzalkatsaSchoolFightEvents.15.a:0 "D'excellentes nouvelles !"
 AnzalkatsaSchoolFightEvents.15.b:0 "De sombres nouvelles."

 AnzalkatsaSchoolFightEvents.16.t:0 "Les Sculpteurs du Destin remportent le Conflit des Écoles"
 AnzalkatsaSchoolFightEvents.16.d:0 "Le destin est chose tangible. C'est une force que chacun peut influencer, par ses paroles, ses actes et ses actions, pour le rapprocher ou l'éloigner. Il peut être tracé dans les étoiles, et son cours hâté. Cette croyance s'est avérée juste, car un adepte des Sculpteurs du Destin a fondé le 333e Empire. Ils ont balayé le passé du 332e Empire, renversant ses entités politiques, ses institutions et ses symboles pour les remplacer par tout ce qui est neuf, qu'il s'agisse d'idées et de pratiques nées en nos terres ou adoptées de l'étranger. Grâce à ce savoir nouveau et à cette pensée nouvelle, ils ont forgé le chemin vers l'Empire Final.\n\nLe sort qui attend les Sauriens croyant aux Sculpteurs de l'Être est simplement d'admettre qu'ils avaient tort et d'embrasser les croyances des Sculpteurs du Destin, celles-là même qui ont mené au 333e Empire. Déjà, nombre d'érudits qui juraient par cette croyance dénoncent les écrits où ils la vantaient, et certains chefs et souverains qui la suivaient effacent tout signe de l'Empire Pénultième pour le remplacer par la nouvelle symbolique du 333e. Et partout, tous croient que le 333e Empire réunira désormais tous les Sauriens et les guidera vers l'avenir."
 AnzalkatsaSchoolFightEvents.16.a:0 "Nous avons fait du destin notre œuvre."
 AnzalkatsaSchoolFightEvents.16.b:0 "Il semble que nous avions tort, en fin de compte..."

 AnzalkatsaSchoolFightEvents.17.t:0 "Les Sculpteurs de l'Être remportent le Conflit des Écoles"
 AnzalkatsaSchoolFightEvents.17.d:0 "Le destin est chose éphémère. Nul ne peut en altérer le cours ni prédire son avènement : il survient, simplement, et sera manifeste lorsqu'il se produira. Cette croyance a été confirmée aux yeux de tous les Sauriens, car un adepte des Sculpteurs de l'Être a fondé le 333e Empire. Ils ont préservé le passé du 332e Empire, renforcé ses institutions, maintenu ses Cités Impériales et gardé vivants son héritage et ses symboles. Par des réformes discrètes et méticuleuses de ces pratiques et organisations antiques, apportant des changements subtils à ce qui était déjà en place, ils se sont façonnés en l'Empire Final.\n\nLe seul choix qui reste aux Sauriens qui croyaient aux Sculpteurs du Destin, jadis une vaste majorité des fidèles de l'Anzalkatsa, est d'accepter qu'ils avaient tort, et que ce sont les réformes prudentes qu'ils abhorraient tant qui ont accompli la Prophétie du 333e Empire. Nombre d'adeptes des Sculpteurs du Destin affluent désormais vers les Cités Impériales en une sorte de pèlerinage, cherchant à laver leurs anciennes croyances en contemplant la magnificence de ces cités, et tous les souverains qui ne sont pas encore sous la domination de Khatalashya hissent à la hâte l'iconographie du 332e, devenu 333e, Empire."
 AnzalkatsaSchoolFightEvents.17.a:0 "Le 332e avait donc bien quelque mérite, en fin de compte..."
 AnzalkatsaSchoolFightEvents.17.b:0 "Le 333e Empire est arrivé précisément quand il le devait."