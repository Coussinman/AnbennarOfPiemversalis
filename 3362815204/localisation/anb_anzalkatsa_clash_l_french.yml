 #Province Group
 imperial_332_cities:0 "Cités Impériales du 332e Empire"
 imperial_332_cities_desc:0 "Telles étaient les principales Cités Impériales du 332e Empire."

 #Decision
 anzalkatsa_switch_religious_school_title:0 "Abandonner notre philosophie actuelle"
 anzalkatsa_switch_religious_school_desc:0 "Tandis que les débats du Conflit des Écoles font rage dans les halls des érudits, les rues des cités, et dégénèrent en escarmouches et en guerres ouvertes, il est devenu manifeste que notre vision philosophique a perdu la faveur de la société saurienne. Notre peuple remet en question les inclinations de notre cour, et nombre de savants haranguent notre souverain pour ce qu'ils qualifient de croyances erronées. Face à une telle situation, certains de nos conseillers nous recommandent de rompre avec nos convictions et de déclarer notre soutien à l'école adverse, de peur d'être laissés en arrière par le cours du temps.\n\nBien que cela nous placerait du côté des « vainqueurs », nos conseillers avertissent également que ce revirement pourrait engendrer une instabilité au sein de la cour, tant il est fondamental de changer ainsi de doctrine. Sans compter le courroux qu'il suscitera chez les Naga, qui ont été nos principaux conseillers en matière de pratique religieuse. Ce serait empiéter sur leur domaine et contredire ce qu'ils nous ont conseillé."

 #Clash State Fate Sculptor
 AnzalkatsaSchoolFightFate:0 "[Root.FateSculptorFight]"

 AnzalkatsaSchoolFightFateWon.1:0 "Notre philosophie a prouvé sa supériorité sur son adversaire, et a été reconnue comme la voie véritable vers le 333e Empire."

 AnzalkatsaSchoolFightFateLosing.1:0 "Nous sommes légèrement défavorisés dans le Conflit des Écoles ; notre philosophie ne jouit pas d'autant d'influence que celle de nos adversaires."
 AnzalkatsaSchoolFightFateLosing.2:0 "Nous sommes défavorisés dans le Conflit des Écoles ; beaucoup considèrent notre philosophie comme rétrograde et arriérée."
 AnzalkatsaSchoolFightFateLosing.3:0 "Nous sommes lourdement défavorisés dans le Conflit des Écoles ; la grande majorité estime que notre philosophie ne mérite d'être suggérée que par le Conseil des Fous de Yassa !"

 AnzalkatsaSchoolFightFateTied.1:0 "Nous sommes actuellement à égalité avec nos adversaires philosophiques !"

 AnzalkatsaSchoolFightFateWinning.1:0 "Nous sommes légèrement favorisés dans le Conflit des Écoles ; notre philosophie est acceptée plus aisément que celle de nos adversaires."
 AnzalkatsaSchoolFightFateWinning.2:0 "Nous sommes favorisés dans le Conflit des Écoles ; notre philosophie est défendue par beaucoup comme juste et porteuse d'avenir pour l'Anzalkatsa."
 AnzalkatsaSchoolFightFateWinning.3:0 "Nous sommes largement favorisés dans le Conflit des Écoles ; nos croyances sont considérées comme les seules dignes d'être embrassées par les vrais croyants du rêve du 333e Empire !"

