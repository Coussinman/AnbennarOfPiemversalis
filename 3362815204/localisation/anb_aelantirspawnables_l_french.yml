 aelantirspawnables.1.a:0 "Un concurrent de plus en Aelantir."
 aelantirspawnables.1.b:0 "£event_button_spawnable£"
 aelantirspawnables.1.t:0 "La Fondation de Gommoport"
 aelantirspawnables.1.d:0 "Le Gommo porte son regard avide sur Aelantir depuis que Cannor en a découvert l'existence. À mesure que la cartographie du continent progressait, cet intérêt n'a fait que s'intensifier. Davantage de défis à relever, davantage de secrets à percer, et surtout, davantage de terres à revendiquer. La préparation d'une telle expédition n'est cependant guère bon marché, si bien que les excursions effectives sont longtemps restées fort limitées. Au crépuscule de cette journée, il n'en sera plus ainsi.\n\nBien qu'il leur ait fallu un temps considérable pour réunir les fonds nécessaires, le Gommo dispose désormais des ressources suffisantes pour prendre la mer. Leur expédition, promettant terres et richesses à tout travailleur volontaire, s'apprête à appareiller pour établir un avant-poste baptisé Gommoport, à l'embouchure d'un fleuve connu sous le nom de Harafroy. L'organisation entend exploiter et surmonter les défis uniques que présente Aelantir afin de faire progresser la cause de l'Artisanat Magique."
 aelantirspawnables.2.t:0 "La colonie d'artificiers kobolds de Zurzumexia"
 aelantirspawnables.2.d:0 "La Côte-du-Dragon est depuis longtemps une terre de conflits et d'hostilité. Les guerres entre gnomes, humains et kobolds ont certes forgé les kobolds de la côte, les rendant aussi endurants que les Hauteurs-du-Dragon elles-mêmes, et les ont même initiés à l'art de l'Artisanat Magique, mais la survie demeure leur préoccupation première.\n\nAnimé par un désir d'expérimenter, de bricoler et d'apprendre, affranchi des épreuves et des contraintes de sa terre natale, un kobold brillant du nom de Zurzumex, pionnier de l'Artisanat Magique biomécanique kobold, a décidé de tracer sa propre voie. Rejoint par bon nombre de ses apprentis et de kobolds partageant ses aspirations, Zurzumex a rassemblé une expédition et pris la mer en direction d'Aelantir, en quête d'une terre où la guerre se ferait moins pressante et où le temps de bricoler ne manquerait point.\n\nParvenu en Haraf après de longs mois de tempêtes océaniques et de rencontres périlleuses avec des navires hostiles, Zurzumex découvrit une terre peu peuplée, au climat agréable, où les kobolds pourraient prospérer et bâtir à satiété. Là, son expédition fonda sa première colonie, une cité qu'ils édifieraient pour incarner leur rêve d'artifice et de liberté : Zurzumexia."
 aelantirspawnables.3.t:0 "Des artificiers gobelins s'établissent"
 aelantirspawnables.3.d:0 "Depuis des décennies, la cité de Bayvek constitue un havre de paix pour les réfugiés gobelins venus d'Escann. Bien que la vie citadine diffère considérablement de leur existence dans l'Échine-du-Serpent, l'ingéniosité et le sens des affaires des gobelins les ont menés à de grands succès : artificiers inventifs, marchands habiles, et surtout les banquiers scandaleusement fortunés de la banque Sizapzarko.\n\nCeux qui ont réussi considèrent largement les autres avec dédain, en particulier les réfugiés escanniens dans la misère et les gobelins frustrés qui se plaignent de leur statut de citoyens de seconde zone. C'est pourquoi la banque Sizapzarko a lancé une expédition composée des artificiers gobelins citadins les plus enclins aux explosions, des fauteurs de troubles locaux et des nouveaux arrivants, avec un seul objectif (promettent-ils) : fonder une cité gobeline en Aelantir. Une cité véritablement gobeline, bâtie pour des gobelins, par des gobelins.\n\nNe possédant pratiquement aucune connaissance en construction navale, mais débordant d'ingéniosité et de détermination, l'expédition gobeline de Bayvek a réuni tant bien que mal une flotte (à peine) en état de naviguer, et a fondé sa cité en Haraf. Elle a été baptisée Mestikardu, dérivé de Mestin-Nezkaru, « ville de clan », pour symboliser la race gobeline œuvrant de concert à bâtir son avenir."
 aelantirspawnables.4.t:0 "Fondation de la colonie de Cestirmark"
 aelantirspawnables.4.d:0 "Depuis la victoire de la Confrérie-de-la-Rose lors de la quatrième Guerre Lilas, les nobles de Cestirande ont vu leur influence décliner à mesure que le duc centralisait le pouvoir autour du trône. Certains nobles se contentèrent de se prélasser dans le luxe, mais ces dernières années, une nouvelle génération plus énergique a gravi les échelons de la noblesse, portée par un renouveau de tradition et d'idéalisme.\n\nNombre de ces nobles sont issus de familles autrefois mineures au sein de la Damérie unie, mais devenues importantes dans la plus petite Cestirande. Le premier d'entre eux est Varil sína Cymainé, chef de l'opposition au parlement, las de voir le duc ignorer si fréquemment la position des représentants, un affront qui, selon lui, ne se serait jamais produit dans l'ancienne Damérie. Il eut même l'audace d'accuser la maison ducale síl Cestir de dégénérescence morale, affirmant qu'elle avait trahi les valeurs de l'Empire tout comme leurs ancêtres avaient trahi les Silmunas. Ses paroles enflammées galvanisèrent cette faction de parvenus, et lorsqu'il fut menacé d'emprisonnement, la frustration face à la décadence du parlement atteignit son point d'ébullition.\n\nContraint de prendre position, Varil déclara que l'Empire avait oublié son idéal d'égalité pour tous et qu'un nouveau départ s'imposait. La plupart de ses partisans l'ont rejoint dans son projet de créer un pays véritablement idéal en Aelantir, et la maison ducale s'est empressée de soutenir sa cause, du moins officiellement, afin de voir ces parvenus et leurs idées dangereuses mettre les voiles loin de Cestirande ! Dans l'est de la Baie-des-Trolls, la compagnie de sína Cymainé a fondé la république de Cestirmark, édifiée sur ses valeurs libérales."
 aelantirspawnables.5.t:0 "Les pionniers d'Ebenmas chevauchent vers l'Ouest"
 aelantirspawnables.5.d:0 "Lencenor est synonyme de culture raffinée, de vin et d'intrigues politiques. Souvent négligés, même par les Lorentais eux-mêmes, les robustes éleveurs des plaines occidentales perpétuent un mode de vie humble qui remonte à l'époque de Lorenan elle-même ; mais c'est un mode de vie en voie de disparition.\nIl fut un temps où les rois menaient eux-mêmes la charge de cavalerie et où le collecteur d'impôts ne se présentait pas chaque année avec la régularité d'une horloge, mais c'est un temps qu'ils n'ont jamais connu, pas plus que les pères de leurs pères.\n\nEt pourtant, au début du XVIe siècle, la nouvelle parvint d'une terre semblable en tout point aux récits de leurs ancêtres : une grande plaine aux troupeaux tout aussi grands, et des rumeurs de nobles chevaliers. Elle devint rapidement le sujet principal des conversations lors de l'assemblée des éleveurs de l'Ord en [GetYear].\nCertains pensèrent qu'il fallait vendre leurs troupeaux et commencer une nouvelle vie dans l'Étendue. D'autres estimèrent que c'était un pari risqué. Finalement, tous se tournèrent vers un vieil homme, Alain, qui avait passé de longues années sous le chaud soleil lorentais, presque autant à cheval, et qui était réputé pour toujours dire la vérité.\n\n« Nous sommes des cavaliers. Aujourd'hui, comme toujours, nous chevauchons. Vers Westport. Vers l'Étendue ! »\n\nAinsi fut fondée la nation d'Ebenmas, nommée d'après la plaine sans fin de l'Ynn occidental."
 aelantirspawnables.6.t:0 "Fondation de la colonie de Corinsfield"
 aelantirspawnables.6.d:0 "Le Père Godwin, un prédicateur corinite, s'est récemment illustré au sein d'Ionntrás en appelant à un pèlerinage de masse vers Aelantir afin d'y fonder un royaume saint. Sa vision pleine d'espoir et sa virulente rhétorique antimagie ont trouvé un écho favorable parmi les Escanniens désireux d'échapper aux rois-sorciers de plus en plus tyranniques. Ces « pèlerins de Corin » se comptent désormais par milliers, tous déterminés à se forger une vie meilleure dans l'ancienne patrie elfique.\n\nLeur voyage fut périlleux ; les pèlerins durent endurer de terribles tempêtes et escalader des falaises vertigineuses. Ils furent harcelés à chaque étape par des colons rivaux et des autochtones tatoués d'étranges runes magiques. Ils n'étaient plus que quelques-uns lorsque le groupe se retrouva à Tuznviar et contempla un champ de fleurs rouges. Le Père Godwin y vit un signe de Corin en personne : leur pèlerinage était achevé. Désormais, à travers tout Cannor, les fidèles les plus ardents de Corin parlent d'une terre bénie par la déesse et préservée des ravages de la magie : Corinsfield."
 aelantirspawnables.7.t:0 "Fondation de la colonie de Valorpoint"
 aelantirspawnables.7.d1:0 "L'une des conséquences les plus méconnues de la Marée Verte fut la démonstration de l'efficacité des compagnies d'aventuriers dans les entreprises pionnières. Ces organisations étaient pour la plupart autosuffisantes et capables de se défendre contre la majorité des menaces sans recourir à des puissances étrangères. L'existence de systèmes juridiques et économiques déjà établis au sein des guildes permit également l'incorporation rapide de nouveaux territoires, les aventuriers pouvant assumer à la fois des fonctions militaires et civiques. Le succès des Royaumes Aventuriers d'Escann face aux anciens royaumes, tels que la prétendue Ligue des Comtes, peut en partie être attribué à ces avantages mêmes.\n\nUne communauté qui embrassa ces idées fut la diaspora vernoise. La surpopulation dans le Duché de Verne et dans les cités-États du fleuve Luna, conjuguée à une forte culture martiale, provoqua une explosion du nombre de compagnies d'aventuriers vernoises, qui trouvèrent un terreau fertile dans la paranoïa antimonstres caractéristique du milieu du XVe siècle. Ces compagnies entretenaient des liens très étroits entre elles, ce qui en fit les premières organisations à apprendre les succès et les méthodes des Frères-Braves (qui devinrent plus tard la nation de Cœur-de-Wyverne) dans le Castanor intérieur.\n\nBien que ces idées se soient révélées utiles à petite échelle, les compagnies d'aventuriers vernoises durent attendre le début du XVIe siècle pour les exploiter à leur plein potentiel, avec la découverte d'Aelantir. Cet événement coïncida avec une effervescence de pensée libérale parmi les aventuriers vernois à la retraite, adeptes des idéaux corinites, qui se mirent à aspirer à la liberté éprouvée lors de leurs missions dans les contrées sauvages, la comparant à leurs expériences face à la force oppressive de la noblesse féodale.\n\nC'est pourquoi, en [GetYear], sept des plus grandes compagnies d'aventuriers vernoises signèrent la déclaration de Heartspier, qui prévoyait la création d'un État dans la Baie-des-Trolls, un État capable d'incarner ces idéaux sous le nom de Valorpoint."
 aelantirspawnables.7.d2:0 "L'une des conséquences les plus méconnues de la Marée Verte fut la démonstration de l'efficacité des compagnies d'aventuriers dans les entreprises pionnières. Ces organisations étaient pour la plupart autosuffisantes et capables de se défendre contre la majorité des menaces sans recourir à des puissances étrangères. L'existence de systèmes juridiques et économiques déjà établis au sein des guildes permit également l'incorporation rapide de nouveaux territoires, les aventuriers pouvant assumer à la fois des fonctions militaires et civiques. Le succès des Royaumes Aventuriers d'Escann face aux anciens royaumes, tels que la prétendue Ligue des Comtes, peut en partie être attribué à ces avantages mêmes.\n\nUne communauté qui embrassa ces idées fut la diaspora vernoise. La surpopulation dans le Duché de Verne et dans les cités-États du fleuve Luna, conjuguée à une forte culture martiale, provoqua une explosion du nombre de compagnies d'aventuriers vernoises, qui trouvèrent un terreau fertile dans la paranoïa antimonstres caractéristique du milieu du XVe siècle. Ces compagnies entretenaient des liens très étroits entre elles, ce qui en fit les premières organisations à apprendre les succès et les méthodes des Frères-Braves (qui devinrent plus tard la nation de Cœur-de-Wyverne) dans le Castanor intérieur.\n\nBien que ces idées se soient révélées utiles à petite échelle, les compagnies d'aventuriers vernoises durent attendre le début du XVIe siècle pour les exploiter à leur plein potentiel, avec la découverte d'Aelantir. Cet événement coïncida avec une effervescence de pensée libérale parmi les aventuriers vernois à la retraite, qui se mirent à aspirer à la liberté éprouvée lors de leurs missions dans les contrées sauvages, la comparant à leurs expériences face à la force oppressive de la noblesse féodale.\n\nC'est pourquoi, en [GetYear], sept des plus grandes compagnies d'aventuriers vernoises signèrent la déclaration de Heartspier, qui prévoyait la création d'un État dans la Baie-des-Trolls, un État capable d'incarner ces idéaux sous le nom de Valorpoint."
 aelantirspawnables.8.t:0 "Les fusiliers marins de Themarenni s'embarquent vers des rivages opulents !"
 aelantirspawnables.8.d:0 "Nombre d'Esmariens aspirent aux terres généreuses d'Aelantir, et plus nombreux encore sont ceux qui ne supportent plus de servir la maison décadente de Vanbury ou la sauvagerie débridée de la bande Havoral. Des multitudes ont voyagé vers l'ouest aux côtés d'autres Anbennariens, mais se sont retrouvées parmi des étrangers et des inconnus, les terres les plus fertiles étant déjà revendiquées et colonisées.\n\nAinsi commence le récit d'une terre encore libre, faite de forêts, de lacs et de rivières. La nouvelle de cette abondance parvint aux oreilles de ces Esmariens égarés, dont les espoirs et le courage furent ravivés avec ferveur. Des colons venus des rives de l'Esmar et de ses affluents, pour la plupart d'anciens membres des fusiliers marins de Themarenni, ainsi que des pionniers avides de terres, se rassemblèrent en toute hâte. Un passage fut trouvé à Yearncliff sous la forme de six navires commandés par la petite noble de Themarenni, Aucana de Sweetcastle. Là, portés par une marée favorable et un vent ami, ces esprits vifs et enthousiastes prirent la mer vers les forêts luxuriantes de la Côte de la Mer-Brisée."
 aelantirspawnables.9.t:0 "Des réfugiés du Culte du Vieux Soleil fondent une colonie"
 aelantirspawnables.9.d:0 "Les adeptes du Culte du Vieux Soleil ont toujours été présents à Bahar et dans les Collines-aux-Harpies. Des groupes disparates ont survécu dans la région depuis l'arrivée des elfes, et leurs nombreuses petites communautés prospèrent dans des vallées montagneuses reculées, protégées par le terrain escarpé.\n\nLa défaite de l'akalat de Dartaxâgerdim à la fin du XVe siècle mit fin à cet isolement. Les Exemplaires Jahériens investirent les Collines-aux-Harpies et allumèrent des bûchers à travers les villages, convertissant les dociles et exécutant les obstinés. Ce nouvel âge de Ténèbres engendra une montée du terrorisme du Culte du Vieux Soleil, culminant avec l'attentat du Sommet de Samartal. La découverte des coupables, une secte du Culte du Vieux Soleil liée aux Casques Verts de Kuzak, déclencha une nouvelle vague de persécutions, que de nombreux fidèles du Vieux Soleil interprétèrent comme le signe que les Ténèbres Malveillantes avaient triomphé.\n\nLa redécouverte d'Aelantir conduisit au rappel de nombreux Exemplaires vers leur quartier général d'Elizna, entraînant une réduction notable des persécutions. La nouvelle de terres vierges, dépourvues d'Elfes Solaires et d'intérêts solaires, fut perçue par Ageela szel-Akal-Uak comme un signe de Surakel. Ses fidèles pourraient y bâtir une nouvelle vie, libre des Ténèbres et des persécutions, un refuge où faire croître la Lumière. Prêtresse dotée d'un pouvoir magique dissimulé, Ageela rassembla les diverses communautés et se mit en route pour fonder une terre nouvelle pour les fidèles de Surakel. Avec l'aide de contrebandiers drolakandis et de ses propres talents magiques, elle parvint à constituer une flotte sans attirer l'attention des elfes, qui prit la mer vers le couchant en $YEAR$. Ces migrants finirent par atteindre la Baie-des-Trolls, où ils fondèrent le nouvel État de Zanlib."
 aelantirspawnables.10.t:0 "Des orques esclaves affranchis fondent une colonie !"
 aelantirspawnables.10.d:0 "Scandaleux ! Nos esclaves orques, que nous avions amenés en Aelantir, ont lancé une rébellion sous le commandement de Bramash Œil-Voilé ! Ils ont ravagé plusieurs colonies d'Endralliande et se sont enfuis de l'île à bord de navires volés !"
 aelantirspawnables.11.t:0 "La banque Asra dévoile son port"
 aelantirspawnables.11.d:0 "La célèbre banque naine Asra a fondé un port en Aelantir, sans nul doute pour tirer profit des richesses du peuple elfique."
 aelantirspawnables.12.t:0 "Le rêve d'Isobel : la cité qui ne dort jamais"
 aelantirspawnables.12.d:0 "« Je vois notre cité sur une carte, s'élevant non pas vers les quatre coins de Halann comme quelque mauvaise herbe, mais croissant, haute comme un chêne vénérable, le long duquel nos citoyens pourraient grimper vers des sommets toujours nouveaux. »\n-Journal de Dame Isobel\n\nDame Isobel, veuve éminente et fortunée, est un modèle de sa cité natale de Toarnaire. Issue d'une maison de petite noblesse roilsarde au bord de la faillite, elle a su transformer un maigre héritage en l'une des entreprises commerciales les plus puissantes de la cité. Pour les milliers d'ouvriers salariés de ses chantiers navals, entrepôts et ateliers, elle est une employeuse stricte mais juste, bien éloignée des barons féodaux arbitraires et cruels dont les domaines ont été désertés au profit des opportunités citadines. Comme la plupart des citoyens de Toarnaire, elle est farouchement indépendante, urbaine et commerçante jusqu'au tréfonds de l'âme, et fermement convaincue que les horizons d'un être doivent être fixés par ses capacités et son ambition, non par sa naissance.\n\nToujours avisée, Isobel sait que ses idéaux périront vraisemblablement à Cannor : elle voit la guerre poindre à l'horizon, tandis que Lorent et Anbennar font résonner leurs sabres et clament leurs prétentions sur la cité. La guerre apporte le pillage, et elle répugne à voir ses richesses durement gagnées emportées vers Lorentaine. Apprenant l'existence d'une terre nouvelle au-delà de la Lamentation d'Uelos, elle a vendu la majeure partie de ses propriétés et proclamé son désir de réaliser ces idéaux dans une cité nouvelle, loin des tyrans de Cannor. Ayant acquis une flotte de navires et des matériaux bruts pour un établissement, elle a invité tous ceux qui souhaiteraient la rejoindre dans cette quête d'une vie nouvelle de liberté et de fortune, moyennant un modeste droit d'entrée, bien entendu."
 aelantirspawnables.13.t:0 "Saamir Ruqašah et les pillards du continent perdu"
 aelantirspawnables.13.d:0 "Saamir Ruqašah est un nom bien connu à travers tout le Bulwar. Né au sein de la famille Ruqašah, l'une des Douze de la cité de Bulwar, il apprit dès son plus jeune âge l'histoire du Bulwar antique et décida de devenir aventurier, résolu à percer les secrets que l'histoire avait oubliés.\n\nSon bazar dans la cité de Bulwar regorge d'artefacts issus de ses diverses aventures ; on y trouve des armures et des armes provenant du Temple de l'Éclipse, des artefacts de génie récupérés dans l'Arche Perdue du Dieu-Roi Irsakar le Bienveillant, les crânes dorés rapportés de son Raid sur le Don du Serpent, un étendard de Phénix doré enfoui par des légionnaires à Kalib, ou même la célèbre couronne de Dalarand perdue durant la Seconde Guerre des Braises. Il n'est aucun lieu dans toute la région que Saamir n'ait visité ou exploré, et tout souverain civilisé du Bulwar l'a compté parmi ses hôtes ou ses pourvoyeurs de curiosités à un moment ou un autre.\n\nLorsque la nouvelle de la redécouverte d'Aelantir parvint au Bulwar, Saamir fut parmi les premiers à réagir. Il vendit ses diverses propriétés, y compris certaines de ses reliques les plus précieuses, et commanda des navires pour une expédition vers Aelantir. Il envoya des messagers à travers toute la région pour offrir une nouvelle vie d'aventure à l'Ouest à quiconque souhaiterait le rejoindre, qu'il soit humain ou elfe, pourvu qu'il soit serviteur de Surael. Des caravanes d'hommes et de femmes impatients de se joindre à sa quête de savoir perdu et d'aventure, ou désireux de fuir les dernières décennies d'instabilité dans la région, ont afflué vers Bulwar et Anzabad où les navires ont été construits pour l'expédition. Il se tient désormais prêt à voguer vers le Couchant pour dompter et percer les secrets des terres étranges d'Aelantir."
 aelantirspawnables.14.t:0 "Les corsaires cynophiles de Mykx"
 aelantirspawnables.14.d:0 "Une capitaine de navire viakkocienne du nom de Mykx, traîtresse à sa flotte, a abandonné le pavillon noir de Viakkoc et s'est établie avec ses partisans gnolls dans les Îles Ruinées d'Aelantir."
 aelantirspawnables.15.t:0 "Des chevaliers nains prennent un nouveau départ"
 aelantirspawnables.15.d:0 "Alors que les traditions chevaleresques se sont estompées au cours du siècle écoulé, un important groupe de chevaliers nains de Lencenor a décidé d'abandonner ses anciennes coutumes et de commencer une nouvelle vie sur les terres prometteuses d'Aelantir. Menés par les plus éminents chevaliers qui formèrent les clans de Hardgauntlet, Runeback et Glitterhoof, ils s'aventurent vers les riches terres de Veykoda pour un avenir nouveau."
 aelantirspawnables.16.t:0 "Des propriétaires terriens arannais fondent une société par actions"
 aelantirspawnables.16.d:0 "Plusieurs riches propriétaires terriens de Marllin se sont associés en une entreprise conjointe pour fonder une colonie en Aelantir, peuplée de plusieurs dizaines de serviteurs sous contrat."
 aelantirspawnables.17.t:0 "Les halfelins de Vis dans la Baie-des-Trolls"
 aelantirspawnables.17.d:0 "Lassés du traitement déplorable réservé aux halfelins à Cannor, des membres de la maison halfeline de Vis ont vendu leurs possessions du Mur-de-Vis et pris la mer pour fonder une nouvelle colonie halfeline indépendante en Aelantir. Ils ambitionnent d'ériger la plus haute tour de la Baie-des-Trolls afin de toiser les autres colons d'en haut : la tour de Vis, également connue sous le nom de Thílvis."
 aelantirspawnables.18.t:0 "La Guilde Vanbury : chapitre d'Aelantir"
 aelantirspawnables.18.d:0 "Telgeir est réputée comme le berceau des meilleurs armements et armures de tout Cannor, mais la Guilde aspire à davantage. L'acier précurseur est révéré comme un matériau d'une puissance incomparable pour les équipements les plus fins (et les plus onéreux) qui soient. Il est rare à Cannor, mais semble se trouver en abondance parmi les reliques découvertes en Aelantir. La recherche et l'acquisition de ces reliques sont devenues une priorité pour Telgeir et la vénérable famille Vanbury. Ne contrôlant que Telgeir, la Maison Vanbury cherche à étendre son influence vers le nouveau monde et à y établir un chapitre aelantirois de sa célèbre fonderie. Publiquement, Vincen de Vanbury fut choisi parmi les candidats pour mener cette expédition en quête de reliques précurseurs et pour étendre l'influence des Vanbury, en vertu de ses compétences et de son expérience. En coulisses, la Maison Vanbury reconnaît qu'elle a choisi Vincen pour se débarrasser de son comportement peu recommandable et mettre fin aux disparitions et démissions mystérieuses des autres candidats. Quoi qu'il en soit, les navires à destination d'Aelantir ont appareillé avec les meilleurs hommes et femmes de Telgeir pour assembler une nouvelle fonderie qui forgerait de nouvelles armes à partir d'acier précurseur ; une fonderie digne de l'héritage Vanbury.\n\nLorsque les vaisseaux pénétrèrent dans la Mer Déchirée et que l'île d'Esmaráil apparut à l'horizon, Vincen proclama qu'elle s'appellerait Vanburia en l'honneur de la Maison Vanbury, liant ainsi l'île à leur nom. Vanburia s'avérerait être une base d'opérations idéale pour la recherche de sources de reliques précurseurs, ainsi qu'une position défensive parfaite en cas de conflit.\n\nTandis que l'expédition approchait de Vanburia, ils débarquèrent dans une baie abritée, entourée de plaines sauvages et de jungles luxuriantes, regorgeant de ressources à exploiter… Lorsque les navires accostèrent à l'embouchure de la rivière qui se déversait dans la baie, Vincen fut le premier à poser le pied sur le rivage. La construction d'un grand port fut planifiée : Ricardsport, ainsi nommé en l'honneur du seul roi Vanbury de Gawed."
 aelantirspawnables.19.t:0 "La Compagnie Commerciale Calasanni met les voiles vers de nouvelles richesses !"
 aelantirspawnables.19.d:0 "Nouvelles de Couronne-de-Dame : la Compagnie Commerciale Calasanni, la compagnie de négoce privée la plus influente et la plus riche de tout l'Empire, s'est révélée être à l'origine de l'immense flotte de navires construite à Couronne-de-Dame l'année passée et partie au cours des mois précédents.\nL'organisation arbaranaise a rassemblé une flotte expéditionnaire financée par des investisseurs de toute la Tête-de-Dame, comptant plus de quarante navires armés par des marins anbennariens d'élite. Le célèbre Calas Silcalas, cousin au second degré du marquis d'Arbaran, assume le rôle de directeur du chapitre aelantirois de la Compagnie, et a déjà signalé son succès dans l'acquisition de cartes et l'atteinte des rivages redécouverts d'Aelantir.\n\nDéjà, les premiers navires sont revenus chargés de marchandises exotiques jamais vues sur les marchés de Cannor, tandis que les investisseurs initiaux se disputent les terres de plantation autour de l'établissement de Nouvelle-Calas. Il semble que cette expédition sera un formidable coup d'éclat pour la CLSTC dans sa quête de domination commerciale."
 aelantirspawnables.20.t:0 "La Compagnie Commerciale Deranne poursuit ses opérations"
 aelantirspawnables.20.d:0 "L'une des plus anciennes et des premières compagnies commerciales, la Compagnie Commerciale Deranne était à bien des égards la véritable propriétaire des possessions coloniales de Deranne. Les colonies derannaises sont de facto administrées directement par la compagnie, et le duc n'a jamais exercé de véritable emprise sur elles.\n\nLa CCD a reconnu l'autorité de [Root.GetName] sur Deranne elle-même, mais ne considère pas que le sort du duché ait une quelconque incidence sur ses affaires, et a décidé de poursuivre ses opérations comme à l'accoutumée."
 aelantirspawnables.21.t:0 "Expédition vers les terres septentrionales"
 aelantirspawnables.21.d:0 "Face au niveau croissant de militarisation au sein de la Hiérarchie de Nimscodd, et avec lui les restrictions et conformités obligatoires toujours plus nombreuses imposées par le gouvernement central, de nombreux gnomes des Îles de la Tempête, peuple de tout temps querelleur, ont commencé à supporter de plus en plus mal la tutelle de leurs cousins gnomes des falaises, au sud.\n\nLa situation atteignit son paroxysme lorsqu'un personnage respecté quoique irascible, un certain Professeur Sneecood, des fameux Sneecood des Îles de la Tempête, après s'être plaint des restrictions croissantes imposées à son atelier, démissionna soudainement de son poste de représentant, au moment même où des rumeurs de détournement de fonds commençaient à circuler.\n\nEn l'espace de quelques jours, Sneecood avait miraculeusement acquis un grand nombre de navires, avec l'intention d'entreprendre une « expédition scientifique vers le nord d'Aelantir », qu'il présentait comme une opportunité pour les gnomes intelligents et déterminés de faire quelque chose de leur vie, avec la possibilité de « repousser les frontières de l'artifice au service du progrès, dans le Nortiochand ». De nombreux gnomes des tempêtes accoururent pour se joindre à lui, et avant que les gouverneurs locaux n'aient la moindre idée de la marche à suivre, la flotte avait levé l'ancre et mis le cap vers le nord glacial."

 adventurerspawnables.1.a:0 "Très bien"
 adventurerspawnables.1.b:0 "£event_button_spawnable£"
 adventurerspawnables.1.t:0 "Les exilés de Sorncóst en Aelantir"
 adventurerspawnables.1.d:0 "À Sorncóst, les anciennes traditions de Lencenor ont été repoussées dans les hautes terres, largement supplantées par les coutumes lorentaises. La spoliation la plus criante de terres et de culture eut lieu à Casna Ola, qui fut annexée de force par Lorent, et dans le sillage d'une armée de soldats vint une armée de colons, qui chassèrent des milliers de Sorncostis des vignobles qui appartenaient à leurs familles depuis des générations.\n\nUn natif de Casna Ola du nom de Reán en eut assez. Il rassembla les réfugiés de cette crise amère à Sornaire, et avec l'aide de pêcheurs patriotes, de vétérans de la marine et de propriétaires de docks, ses « Fils de Sornique » parvinrent à réunir une petite flotte de cinq navires et à prendre la mer vers la liberté d'Aelantir, afin d'être les premiers à bâtir une terre nouvelle dans l'ancien monde. Les plans des Fils de Sornique furent d'abord moqués et tournés en dérision, mais lorsque la nouvelle arriva que leur première colonie avait survécu à l'hiver, le soutien afflua rapidement. De nombreux Sorncostis fuient désormais en masse vers la colonie, dans l'espoir d'une vie sans oppression culturelle.\n\nAvec un brin de chance et de détermination, ils pourraient réussir à bâtir une nouvelle Sorncóst et, peut-être, revenir un jour reconquérir leurs foyers."
 adventurerspawnables.2.t:0 "La Légion d'Onyx débarque en Aelantir"
 adventurerspawnables.2.d:0 "La Légion d'Onyx voue à Nerat une dévotion fanatique, que d'aucuns qualifieraient de quasi hérétique, ainsi qu'à la destruction de toute abomination commise contre lui. Si elle s'était illustrée par son rôle dans la défaite des hordes mortes-vivantes de la Pestilence Blanche à Dostanor, le vent a désormais tourné en sa défaveur. Une proclamation émanant de la Nécropole de Corseton ordonne son expulsion de tous les recoins de Cannor. Nul ne saurait dire avec certitude si cette disgrâce est due à l'influence croissante de l'ordre sur le temple, menaçant sa hiérarchie, ou aux étranges accusations que l'ordre a récemment portées contre de nombreux nobles de Corvurie. Tout ce que l'on peut affirmer, c'est que l'ordre n'est plus le bienvenu à Cannor. Ayant eu vent de rumeurs concernant un culte de mort pervers en Aelantir, la Légion a pris la mer pour se forger un nouveau foyer par-delà l'horizon et renverser ces blasphémateurs.\n\n§RLa Légion d'Onyx ne sera plus disponible à l'embauche.§!"
 adventurerspawnables.3.t:0 "Le Cercle Lumineux arrive en Aelantir"
 adventurerspawnables.3.d:0 "Le Cercle Lumineux, une confrérie de dévots adorateurs de l'avatar d'Ara, Begga Bonsdoigts, divinité des halfelins et de la charité, est arrivé en Aelantir pour secourir les démunis et répandre la richesse de l'Ynn parmi ses habitants. Sous l'œil bienveillant et économe de la prêtresse halfeline Cela Boucles-d'Argent, plus aucun village ne sera laissé à l'abandon après avoir été soumis aux caprices erratiques de l'Ynn, et plus aucun enfant ne sera laissé à mourir de faim dans des rues délabrées ou dans les contrées sauvages et incivilisées, loin du regard des nobles.\n\nLes rares Nés-des-Ruines de l'Ynn qui remarquèrent leur arrivée témoignent de la même méfiance envers le Cercle Lumineux qu'envers le reste des aventuriers cannoriens, affirmant que leurs efforts caritatifs ne sont rien d'autre que du prosélytisme déguisé."
 adventurerspawnables.4.t:0 "La croisade istralorianne met les voiles pour Aelantir !"
 adventurerspawnables.4.d:0 "La fin de la Marée Verte marqua également la fin du combat entre le bien et le mal. Les enseignements de Corin ordonnaient de combattre le mal où qu'il se terre, mais ses fidèles n'avaient plus d'ennemi commun à affronter ; certains devinrent trop complaisants, d'autres perdirent de vue leur objectif ; et pourtant, il y eut ceux qui refusèrent ces deux destins.\nIl devait bien rester un empire maléfique à affronter, un dragon à pourfendre, un peuple opprimé à libérer. Hélas, Cannor n'en offrait plus.\n\nAlors, naturellement, ils portèrent leur regard plus loin. Corin prêchait de chercher le mal, après tout, non d'attendre qu'il se manifeste. Et lorsque la nouvelle parvint du Drozma Tur, le culte du dragon par-delà les mers gelées cherchant à soumettre tous les peuples, tous eurent la même pensée. Corin prêchait de combattre le mal, aussi difficile soit-il à atteindre.\n\nDes aventuriers de tous les horizons de Cannor se rallièrent ici, à Istralore, cœur battant du corinisme au sein de l'Empire. Des soldats de fortune, mais aussi des bardes d'Esmarie, des mages de Damesear, des rôdeurs de l'Alen, des clercs d'Escann, et même quelques artificiers gnomes qui prétendaient posséder les plans de navires capables de briser les glaces de la Mer-Brisée.\nMais la première à se présenter fut Sybille Lánchs, l'une des aventurières les plus célèbres de tout Cannor, et il était évident pour tous les membres de la croisade que sa chevelure de feu et ses discours enflammés prouvaient qu'elle était l'avatar de Corin, même si le clergé refusait de l'admettre. Peu importait, car ils avaient un empire maléfique à affronter, un dragon à pourfendre et un peuple opprimé à libérer."
 adventurerspawnables.5.t:0 "Les aventuriers de Menibór font faillite"
 adventurerspawnables.5.d:0 "La Compagnie Libre de Menibór était depuis longtemps considérée comme l'une des compagnies de soldats privés les plus professionnelles et les plus efficaces de tout Cannor. Cependant, une série particulièrement malheureuse de quêtes ratées et de mauvais contrats les plongea dans la misère la plus totale. Récemment, la compagnie s'est murée dans un silence complet, et la plupart des gens à travers Cannor supposèrent qu'elle s'était discrètement dissoute, s'éteignant dans un murmure au cœur de la nuit.\n\nÀ la stupéfaction générale, des rapports récents révèlent que le chef de la Compagnie Libre de Menibór, un vétéran aguerri du nom de Ricard Tenach, a vendu la totalité de ses biens accumulés au cours de sa longue carrière afin d'acheter un passage bon marché pour sa compagnie vers Aelantir. De toute évidence galvanisé par les rumeurs d'or découvert à travers l'Étendue d'Epednar, Tenach a misé pièces et hommes dans l'espoir que la Compagnie Libre puisse rembourser ses dettes. L'avenir dira si ce grand pari fera sauter la banque, ou s'il n'est que la mise désespérée d'un vagabond aux abois.\n\n§RLa Compagnie Libre de Menibór ne sera plus disponible à l'embauche.§!"
 adventurerspawnables.6.t:0 "Des esclaves demi-orques s'enfuient dans les bois !"
 adventurerspawnables.6.d:0 "Le vieux capitaine se tenait silencieux au-dessus du champ de bataille. Des dizaines de corps, demi-orques, orques, mais surtout humains, gisaient éparpillés. Aucun des anciens esclaves ne s'était laissé prendre vivant. La plupart s'étaient enfuis ; ceux qui étaient restés avaient combattu jusqu'à leur dernier souffle.\nFinalement, un éclaireur s'approcha du capitaine.\n« Rapport. » exigea le capitaine d'une voix sévère.\n« Capitaine, la plupart des esclaves ainsi que Varbuk se sont échappés. Ils ont été vus pour la dernière fois… » l'éclaireur marqua une pause, « …ils se dirigeaient vers l'ouest. »\n« L'ouest ?! » répliqua le capitaine avec surprise. Il n'y avait que cette maudite forêt à l'ouest, ainsi que ces brutes de Nés-des-Ruines, songea-t-il.\n« Capitaine, devons-nous les poursuivre ? » demanda l'éclaireur à son supérieur. Le capitaine esquissa un léger rictus. « Inutile. Ces esclaves seront considérés comme des biens perdus. Ils ne survivront pas dans cette forêt de toute façon. »\n\n...\n\nLa forêt avait changé. Elle était moins dense, les animaux semblaient moins hostiles et, surtout, les Affranchis n'avaient pas aperçu un seul Maudit depuis plus d'une semaine. Varbuk continuait de guider son peuple après tout ce temps, et il semblait qu'enfin, le pire était derrière eux. Ses cicatrices de fouet avaient guéri, ses poignets ne se souvenaient plus de l'étreinte des chaînes. Mais surtout, il avait oublié le visage de son maître. À la place, il ne se rappelait plus que la bouillie sanglante qu'avait été un jour ce visage. C'était un bon souvenir.\nMais cela appartenait au passé. L'avenir devait le préoccuper désormais. Et Varbuk n'éprouvait aucune crainte. Derrière lui se tenait son peuple, ses Affranchis. Ensemble, ils avaient combattu pour la liberté… et vaincu. Et à présent, ils s'assureraient que nul ne la leur arrache jamais."
 adventurerspawnables.7.t:0 "La Maison de la Réflexion prend le large"
 adventurerspawnables.7.d:0 "Après avoir humilié Ivrandir Branche-Nocturne lors du Débat de Thanas, l'ancien controversé du Repos, Pelodir « le Grand », rassembla autour de lui des Elfes Précédents. Au fil des décennies qui suivirent, les nouveaux enseignements de Pelodir accentuèrent la singularité de cette secte naissante, lui attirant le mépris tant des Réformistes d'Ibevar que des traditionalistes du Repos Silencieux. La découverte d'Aelantir et de la Fresque de Castellos électrisa Pelodir et ses dévots, car tandis que la Cour Régente était rongée par le doute face à la révélation de la mort de Castellos, la secte tourna son attention vers l'Appel à la Réflexion, trop longtemps négligé.\n\nIl y a plus de vingt mille ans, l'Empereur Précurseur Aldan promulgua le Décret de la Réflexion, qui exigeait le retour de tous les elfes en Aelantir. Pour Pelodir, célèbre pour ses longues pérégrinations et sa philosophie sinueuse, le message ne pouvait être plus limpide : il devait répondre à l'appel d'Aldan. Éprouvée par les feux de la ruine et voilée par les brumes de l'histoire, l'ancienne patrie elfique s'est faite à nouveau neuve, portant l'horizon tentateur comme son voile. Pelodir et sa Maison de la Réflexion, fraîchement réorganisée, prennent désormais le large pour répondre à cette antique convocation, en quête de l'illumination des frontières."
 adventurerspawnables.8.t:0 "Les Tipneyans partent vers l'Ouest"
 adventurerspawnables.8.d:0 "Fuyant les guerres du Petit-Pays, de nombreux habitants de la bourgade de Tipney ont vendu leurs biens les plus précieux et pris la route de l'ouest vers Aelantir."
 adventurerspawnables.9.t:0 "La bande Havoral fuit les conséquences de ses actes"
 adventurerspawnables.9.d:0 "Après des années de répression par les autorités impériales pour leur comportement méprisable, la bande de brigands et de mercenaires sans honneur connue sous le nom de bande Havoral a réalisé un coup des plus audacieux.\n\nSentant que leurs jours à Cannor étaient comptés, ils quittèrent leurs repaires de montagne pour une attaque nocturne téméraire contre un port notable d'Esmarie, s'emparant de plusieurs navires avant de fuir vers le large. Le temps que l'identité des coupables et des victimes fût confirmée, la bande Havoral avait déjà franchi les péages de la Tête-de-Dame. Leur destination ne pouvait être que celle de toute âme errante mettant le cap à l'ouest : les terres inexplorées d'Aelantir.\n\nTandis que le peuple d'Esmarie pousse un soupir de soulagement d'être débarrassé de cette racaille organisée, les autochtones comme les colons d'Aelantir doivent désormais se préparer à un concurrent de plus dans la course au continent redécouvert… Bien plus sauvage et impitoyable que la plupart.\n\n§RLa bande Havoral ne sera plus disponible à l'embauche.§!"
 adventurerspawnables.10.t:0 "La Compagnie de la Dent Ébréchée part vers l'Ouest"
 adventurerspawnables.10.d:0 "La Compagnie de la Dent Ébréchée jouit d'une sinistre réputation à Cannor : des mercenaires impitoyables mais d'une redoutable efficacité. Composée principalement de demi-orques, la compagnie acquit sa renommée par sa férocité dans les combats contre l'agression orque en Escann, mais se heurta souvent à la discrimination de ses employeurs et des autres aventuriers en raison de son héritage métis et de l'acceptation du culte de Dookan parmi ses membres. Le mécontentement face à ce traitement injuste finit par éclater ouvertement au début des années 1500, poussant la compagnie à quitter la discrimination de Cannor pour de plus grandes aventures et davantage d'opportunités en Aelantir.\n\nLes rumeurs d'une richesse colossale découverte aux confins de la Baie-des-Trolls menèrent la Compagnie de la Dent Ébréchée vers les terres des Boek, à l'embouchure du fleuve Ynn. Là, les tribus de Nés-des-Ruines se paraient de fer et d'or finement ouvragés qu'ils avaient découverts au pied des falaises de la ruine. Supposant que le peuple avancé ayant créé ces biens se trouverait sur les plateaux bien au-dessus, la compagnie escalada les falaises et émergea dans les collines brumeuses de Veykoda. De là, la Dent Ébréchée poursuivit sa route vers l'ouest et découvrit la florissante civilisation ynnique, où elle trouva d'amples occasions d'emploi auprès des petits seigneurs de Sarda et de Dolindha.\n\nD'abord satisfaits de vivre comme des mercenaires sans terre, très prisés par les seigneurs ynniques, l'arrivée d'autres colons cannoriens dans la vallée de l'Ynn poussa le capitaine de la Dent Ébréchée, Otó le Beau, à rêver d'une terre appartenant entièrement aux demi-orques. Emmenant la bande de mercenaires vers l'ouest, aux confins de l'Étendue d'Epednar, la Compagnie de la Dent Ébréchée revendiqua une vaste étendue des prairies occidentales peu peuplées. Se déclarant État aventurier indépendant, la Dent Ébréchée devint une armée dotée d'un État, également résolue à mener une vie de mercenaires pour les Ynniques et de propriétaires libres sur leur propre parcelle d'Aelantir.\n\n§RLa Compagnie de la Dent Ébréchée ne sera plus disponible à l'embauche.§!"
 adventurerspawnables.11.t:0 "La Société d'Exploration de Plumwall prend le large !"
 adventurerspawnables.11.d:0 "« La Société d'Exploration de Plumwall prend le large !\n\nL'organisation célèbre pour ses fouilles dans les ruines de l'ancien Damenath a une nouvelle mission : quitter Cannor tout entier à la recherche des richesses d'Aelantir ! »\n\n-Extrait de la Gazette d'Anbenncóst de [GetMonth] [GetYear].\n\n« Marcan, mon cher ami,\n\nAs-tu vu les gros titres ? J'ai reçu plus de quatre-vingt-dix demandes officielles pour un poste au sein de la flotte expéditionnaire, et cela ne fait que quelques heures depuis que j'ai reçu le soutien officiel. Mais j'ai la chance que le Comité ait pris sa décision avant que tout ne transpire, et je peux ainsi me concentrer entièrement sur les préparatifs… et sur cette pile de paperasse qui s'amoncelle.\n\nAvec un peu de chance, tout cela en vaudra la peine. Nos premiers explorateurs ont déjà rapporté de fantastiques bibelots et trésors, et des rumeurs de bien d'autres encore.\n\nMaintenant, il me faut retourner au travail. La flotte doit appareiller dans quelques courtes semaines à peine, et je dois m'assurer de rappeler toutes les faveurs qui nous sont dues en avance : le Magisterium peut enfin considérer notre travail à l'ancien Damenath comme payé en totalité ! J'espère que tu te joindras à nous, vieil ami ? »\n\n-Correspondance d'Adelar Longstaff, directeur de la Société d'Exploration de Plumwall, adressée à Marcan Stonerider, alchimiste en chef."
 adventurerspawnables.12.t:0 "La Brigade Magnifique part pour Aelantir !"
 adventurerspawnables.12.d:0 "Désillusionnés par la paresse des Chevaliers Magnifiques et leur refus d'adopter les nouvelles technologies et méthodes de pensée ces dernières années, un grand nombre de chevaliers plus jeunes et plus novateurs ont quitté Arbaran pour établir une colonie dans le sud d'Aelantir.\n\nIl semble que l'expédition soit sanctionnée par l'ordre chevaleresque, très probablement pour éloigner pacifiquement les éléments rebelles de leur organisation. Se faisant appeler la Brigade Magnifique, des centaines de chevaliers, accompagnés de milliers de colons et d'aventuriers potentiels, ont pris la mer aujourd'hui pour affronter les maux qui rôdent dans les jungles et dompter ces terres au nom de la civilisation. Bien que l'expédition soit raillée par beaucoup à Cannor comme une pure folie, elle demeure populaire parmi les corinites qui ont fait don d'une fortune à ces braves guerriers partis en quête du mal à détruire."
 adventurerspawnables.13.t:0 "La bande de Bardswood part en quête de nouveaux mystères"
 adventurerspawnables.13.d:0 "L'énigmatique bande de Bardswood de Tellum a soudainement disparu ! Les rumeurs affirment qu'elle est partie pour Aelantir."
 adventurerspawnables.14.t:0 "Les Exemplaires Elfes Solaires arrivent en Aelantir"
 adventurerspawnables.14.d:0 "Très cher [Root.Monarch.GetName],\n\nMerci pour votre hospitalité durant toutes ces années, et pour toutes les bonnes actions que votre lignée a accomplies pour les Exemplaires Jahériens.\n\nAu cours des nombreuses années de guerre des Exemplaires au nom de Surael, et de mon propre service aux côtés de Corin lors de la Marée Verte, j'ai compris que le mal se terre en tous lieux. Les graines des ténèbres sont grossières, rugueuses, et se trouvent dans chaque recoin du monde. C'est pourquoi j'ai fait mien, et celui de mon ordre, le devoir de détruire le chaos et de lui substituer l'ordre sous Surael. Cité après cité a sollicité notre aide contre monstre et hérétique, et jamais nous n'avons failli à notre engagement.\n\nMais nous avons appris la nouvelle de la redécouverte des foyers de nos ancêtres. On dit que la terre est abandonnée, hormis quelques créatures survivantes, à peine dignes du nom d'elfes, dans ce qui ne peut être que l'œuvre des Ténèbres Malveillantes.\n\nLes Exemplaires doivent embrasser un nouveau dessein : sauver nos frères de la gueule des ténèbres. La lumière de Surael doit se répandre à travers tout Aelantir, et l'obscurité qui y règne sera purifiée, les monstres purgés. Nous prenons la mer à l'aube, et au moment où vous lirez cette lettre, notre flotte aura déjà quitté le port. Le petit nombre qui demeure est insuffisant pour poursuivre les services des anciens Exemplaires, et nous vous prions de nous en excuser.\n\nMais les Exemplaires Jahériens doivent sauver Aelantir de tout ce qui est maléfique, et porter le rêve de Jaher jusqu'à la patrie de nos Précurseurs.\n\nSincèrement,\nEcaris."
 adventurerspawnables.15.t:0 "Les chasseresses harpies s'envolent vers Aelantir"
 adventurerspawnables.15.d:0 "La succession dans la société harpie était souvent capricieuse et querelleuse. Comme la prochaine matriarche était choisie parmi un vivier de candidates dignes, être éliminée de la course était chose courante et aboutissait souvent à des conséquences sanglantes. Un tel événement venait de se produire : la princesse Ašuria Ayarakin, autrefois héritière favorite de la matriarche, fut entièrement écartée de la succession. Enragée de se voir dérober son droit de naissance, Ašuria et ses alliées tentèrent un coup d'État contre [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Le coup fut un échec catastrophique ; nombre de ses alliées périrent au combat, s'enfuirent en exil ou l'avaient purement et simplement trahie durant le chaos. Elle parvint à peine à s'échapper aux côtés de ses plus proches confidentes. Elles fuirent vers Aqatbar, se baptisant les « Filles des Collines », et embarquèrent les maigres provisions qu'elles et leurs époux purent emporter sur des navires achetés à la hâte.\n\nBien que la matriarche eût normalement cherché à traquer ces dissidentes et à couper ces fils pendants, la nouvelle est parvenue aux aires que leurs navires cinglaient vers Aelantir, le continent perdu des elfes. N'ayant ni les moyens ni la volonté de poursuivre Ašuria à de telles distances, la menace grandissante des nobles volées parvenues a contraint [Root.Monarch.GetTitle][Root.Monarch.GetName] à consolider la position de [Root.Heir.GetName]. Assurément, un destin bien plus périlleux attend la princesse Ašuria par-delà la mer houleuse."