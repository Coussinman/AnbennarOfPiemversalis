l_french:

####################
#Alenic Frontier
####################

gawed_castle_gaweton_northern_lord_meeting: "Assemblée des Seigneurs du Nord"
gawed_castle_gaweton_northern_lord_meeting_desc: "Avec l'achèvement des dernières améliorations et modernisations du Château de Gaweton, une importante délégation des seigneurs septentrionaux de l'Alen a été réunie pour délibérer des affaires du royaume."

####################
#Lencenor
####################

lorentaine_mage_academy_loyalty: "Les mages satisfaits des améliorations de l'Académie"
lorentaine_mage_academy_loyalty_desc: "Les mages de tout notre royaume se réjouissent grandement des nouvelles améliorations et modernisations apportées à l'Académie de Magie de Lorentainé."

lorent_new_adea_naval_school_new_admiralty: "Nouvel Amirauté d'Adéa"
lorent_new_adea_naval_school_new_admiralty_desc: "Nos investissements dans la formation des officiers supérieurs de notre marine commencent à porter leurs fruits : les officiers diplômés de l'École Navale de Nouvelle-Adéa font preuve d'une maîtrise approfondie des techniques les plus modernes en matière de guerre navale."

minara_temple_degenerate_sex_party: "Membres de la cour conviés à une fête bachique"
minara_temple_degenerate_sex_party_desc: "Plusieurs membres éminents de notre cour ont été conviés en qualité d'hôtes d'honneur au Temple de Minara, afin de célébrer les investissements supplémentaires que l'État a consacrés à faire de ce temple l'un des joyaux de la région. Puissent-ils apprécier leur séjour !"

deranne_westport_derannic_colonial_enthusiasm: "Enthousiasme colonial derannique"
deranne_westport_derannic_colonial_enthusiasm_desc: "Certaines franges de notre population, particulièrement dans les quartiers pauvres des villes, manifestent une agitation croissante au fil du temps. Peut-être devrions-nous leur offrir l'opportunité de s'établir outre-mer et de contribuer à l'expansion de nos possessions coloniales en Aelantir ?"

####################
#Damescrown
####################

ara_temple_lods_of_emone: "Plein aux as !"
ara_temple_lods_of_emone_desc: "P, L, E, I, N aux A, S ! Qu'est-ce que ça donne ? Plein aux as ! Enfin, probablement..."

damescrown_grand_exchange_the_prosperous_merchants: "Les prospères marchands de Damescrown"
damescrown_grand_exchange_the_prosperous_merchants_desc: "Les marchands qui peuplent le port et la cité de Damescrown ont grandement prospéré grâce à nos politiques avisées et à notre juste gouvernance de la ville."

beepeck_the_largest_small_city_traders_of_beepeck_dominating: "Les négociants du Pic-des-Abeilles dominent les échanges"
beepeck_the_largest_small_city_traders_of_beepeck_dominating_desc: "Nos négociants et marchands du Pic-des-Abeilles dominent les mers et sont les principaux convoyeurs de marchandises et de matériaux dans un vaste rayon autour de la cité. En vérité, ce développement n'est que le résultat attendu de nos politiques avisées et justes."

####################
#Daravan's Folly
####################

nathalaire_city_of_pirates_nathalynes_boon: "Bénédiction de l'Infiltratrice"
nathalaire_city_of_pirates_nathalynes_boon_desc: "Nathalyne est une déesse généreuse, et nous a accordé sa bénédiction pour avoir restauré sa cité bien-aimée à sa juste place."

####################
#Dragon's Coast
####################

####################
#Esmaria
####################

giberd_academy_of_engineering_building_boom: "Essor de la construction gnomique"
giberd_academy_of_engineering_building_boom_desc: "L'ajout de conseillers gnomes impériaux venus de Giberd a considérablement accru l'efficacité avec laquelle nous pouvons ériger des bâtiments."

seinathil_institute_of_song_bardic_inspiration: "Inspiration bardique"
seinathil_institute_of_song_bardic_inspiration_desc: "Musique ! Chants ! Danses ! Avec l'achèvement de l'Institut du Chant de Seinathíl, nous avons engagé plusieurs bardes renommés de l'établissement pour accompagner nos armées et les galvaniser. Nos troupes adorent cette musique et leur moral est au plus haut. Nos commandants rapportent qu'ils se sentent capables de conquérir le monde !"

####################
#Forlorn Vale
####################

ibevar_temple_of_munas_boon: "Bénédiction du Bien-Aimé de la Lune"
ibevar_temple_of_munas_boon_desc: "Munas est un dieu généreux, et nous a accordé sa bénédiction pour avoir érigé un temple si magnifique en son honneur et celui de ses principes."

####################
#Gerudian Coast
####################

urviksten_ebonsteel_armory_roars_to_life: "L'Armurerie d'Acier d'ébène reprend vie !"
urviksten_ebonsteel_armory_roars_to_life_desc: "Nous avons restauré l'Armurerie d'Acier d'ébène à sa juste place de forge suprême de toute la Gérudie, voire de tout Cannor. Nos armées seront équipées d'armures forgées dans le plus noble des métaux : l'Acier d'ébène !"

####################
#South Castanor
####################

marrhold_the_feather_academy_aerial_cavalry: "Cavalerie aérienne de l'Académie de la Plume"
marrhold_the_feather_academy_aerial_cavalry_desc: "Nos investissements dans l'Académie de la Plume à Griffonsgate portent leurs fruits : nous sommes désormais en mesure d'expérimenter de nouvelles formes de cavalerie aérienne à déployer contre nos ennemis."

esthili_academy_of_magic_tier_one: "Une petite météorite de Damestear s'écrase sur le campus"
esthili_academy_of_magic_tier_one_desc: "L'académie fonctionnait à peine depuis un trimestre qu'un nouvel étudiant a réussi, *on ne sait comment*, à provoquer la chute d'une météorite de Damestear sur le campus. La manière dont il s'y est pris demeure un mystère, et le météore semble minuscule. L'étudiant est actuellement interrogé par nos plus éminents mages. Quoi qu'il en soit, c'est un développement formidable, tant pour les applications militaires que scientifiques. Nous avons déjà dépêché nos meilleurs esprits à la Bibliothèque du Mont-Lunaire pour chercher des ouvrages expliquant comment exploiter cette précieuse ressource, si tant est que cela soit possible."

esthili_academy_of_magic_tier_two: "Davantage de Damestear tombe du ciel !"
esthili_academy_of_magic_tier_two_desc: "Incroyable ! Il apparaît que l'un des ouvrages de la Bibliothèque du Mont-Lunaire contenait des informations sur une météorite de Damestear tombée à cet endroit précis il y a des éons, à l'époque des elfes précurseurs. Selon le tome, ce phénomène contre nature est causé par un rituel ancien, censé ne se produire qu'une fois tous les dix mille ans environ. En ajustant légèrement certains paramètres, nos plus éminents mages ont réussi à *dupliquer* quelque peu le rituel, provoquant la chute de davantage de Damestear sur notre tas existant ! Les mages nous ont toutefois informés qu'il y aura presque certainement des conséquences pour avoir altéré un rituel si ancien."

esthili_academy_of_magic_tier_three: "Faire s'écraser ce météore... sans survivants !"
esthili_academy_of_magic_tier_three_desc: "Nous avons fait une découverte fascinante ! Apparemment, les rituels précédents que nous avons accomplis, ou plutôt *contournés*, invoquaient tous de la Damestear provenant du même météore, très loin dans l'espace. Nos plus éminents mages pensent pouvoir faire s'écraser le reste du météore sur Halann, ici même, bien que les conséquences puissent être... imprévisibles."

esthili_academy_of_magic_consequences_of_baneposting: "Le météore de Damestear s'écrase sur la ville voisine"
esthili_academy_of_magic_consequences_of_baneposting_desc: "Le météore ne contenait que CINQ POUR CENT de Damestear ! Le reste n'était que de la vulgaire roche ! Pah ! Et maintenant, la ville universitaire voisine est en ruines ! Il faudra des décennies pour tout remettre en ordre. Au moins, la Damestear que nous avons récoltée sera mise à bon usage, et l'académie de magie elle-même est en grande partie intacte. Quel gâchis..."

####################
#West Dameshead
####################

neckcliffe_journey_across_the_sea_of_stars: "Voyage à travers la Mer (d'Étoiles)"
neckcliffe_journey_across_the_sea_of_stars_desc: "À chaque époque, en chaque lieu, les actes des hommes demeurent les mêmes..."

sorncell_deepwater_harbor_hardy_sailors: "Rudes marins de Sorncell"
sorncell_deepwater_harbor_hardy_sailors_desc: "Le port de Sorncell produit des navires de qualité, mais il s'avère que la cité forme également de rudes marins, notamment des matelots parfaitement à l'aise avec les plus grands vaisseaux de notre flotte."
