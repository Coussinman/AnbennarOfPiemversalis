 DEMAND_ARTIFACTS_DESCRIPTION:0 "Rappeler à $SUBJECT|Y$ sa place en exigeant ses plus beaux artefacts. Cela augmentera notre prestige de $PRESTIGE|Y$ à ses dépens, mais accroîtra également son désir de liberté de §R$LD$ %§!."
 OVERLORD_DEMANDED_ARTIFACTS:0 "exiger que nous cédions nos artefacts les plus précieux, nous coûtant $PRESTIGE|R$ de prestige. Nous ne pouvons rien y faire."
 DEMAND_ADDITIONAL_TRIBUTE_TITLE:0 "Exiger un tribut supplémentaire"
 DEMAND_ADDITIONAL_TRIBUTE_DESCRIPTION:1 "Exiger que $SUBJECT|Y$ nous envoie $TRIBUTE|Y$¤ supplémentaires en gage de bonne volonté. Après tout, ils sont notre §Ysujet§!. Cependant, cela augmenterait leur désir de liberté de §R$LD$ %§!."
 DEMAND_ADDITIONAL_TRIBUTE_BROKE:0 "Ils ne disposent pas des $TRIBUTE|Y$¤ requis."
 OVERLORD_DEMANDED_ADDITIONAL_TRIBUTE:0 "que nous leur envoyions un tribut supplémentaire de $TRIBUTE|Y$¤. Quand seront-ils satisfaits ?"
 FORCE_SEPPUKU_TITLE:0 "Forcer l'abdication"
 FORCE_SEPPUKU_DESCRIPTION:2 "Les Xiaken belliqueux perturbent la paix du royaume. Ce comportement montre que leurs intérêts ne sont pas alignés avec ceux des ministères et qu'ils sont donc inaptes à gouverner. Si nous forçons $DAIMYO|Y$ à abdiquer, $HISHER$ successeur devrait voir les avantages d'une voie plus pacifique.\n\nCela nous rapporterait également $X|Y$ fois les compétences du nouveau dirigeant en pouvoir du monarque."
 CANT_SEPPUKU_REGENT:0 "$MONARCH$ ne peut pas abdiquer."
 CANT_SEPPUKU_PEACEFUL:0 "$DAIMYO$ n'a déclaré aucune guerre."
 RETURN_LAND_TITLE:0 "Restituer des terres"
 RETURN_LAND_DESCRIPTION:0 "Ils détiennent des terres qui ne leur appartiennent pas légitimement. Corrigeons cela."
 RETURN_LAND_SPECIFIC_DESC:1 "Restituer $PROVINCE|Y$ à $TAKER|Y$. Le désir de liberté de $GIVERS|Y$ augmentera de $LD$ pour atteindre $LD_TOTAL$."
 RETURN_LAND_NO_ELIGBLE:0 "Aucune province éligible à restituer."
 RETURN_LAND_EFFECT:0 "Ils ont restitué $PROVINCE$ à $WHO$,"
 OVERLORD_RETURNED_LAND:0 "que nous restituions $PROVINCE|Y$ à $WHO|Y$."
 CONTRIBUTE_TO_CAPITAL_TITLE:0 "Contribuer à la capitale"
 CONTRIBUTE_TO_CAPITAL_DESCRIPTION:0 "Forcer leur province la plus développée, $PROVINCE|Y$, à contribuer en $DEVTYPE|Y$ à $CAPITALNAME|Y$. Ils perdront $LOST|Y$ de développement et nous en gagnerons $GAINED|Y$."
 CONTRIBUTE_TO_CAPITAL_GENERAL_DESC:0 "Forcer leur province la plus développée à contribuer en développement à $CAPITALNAME|Y$. Ils perdront $LOST|Y$ de développement et nous en gagnerons $GAINED|Y$."
 CONTRIBUTE_TO_CAPITAL_NO_TARGET:1 "Aucune province n'a au moins $MINDEV$ de développement du même type."
 CONTRIBUTE_TO_CAPITAL_SIEGE:0 "$CAPITAL$ est assiégée !"
 CONTRIBUTE_TO_CAPITAL_OCCUPIED:0 "$CAPITAL$ est occupée par l'ennemi !"
 CONTRIBUTE_TO_CAPITAL_TOO_SMALL:1 "Leur clan est trop petit, et $NAME$, en tant que province la plus développée, doit avoir au moins $DEV$ de développement pour que nous puissions les faire contribuer à la capitale."
 OVERLORD_CONTRIBUTED_TO_CAPITAL:0 "voler $AMOUNT|Y$ de $DEVTYPE|Y$ à $TAKENFROM|Y$."
 INCREASE:0 "Augmenter"
 DECREASE:0 "Diminuer"
 CHANGE:0 "Modifier"
 CHANGE_ISOLATION_TITLE:0 "$INCREASEDECREASE$ l'isolationnisme"
 CHANGE_ISOLATION_DESCRIPTION:1 "Rapprocher leur isolationnisme du nôtre !"
 CHANGE_ISOLATION_SAME:0 "Ils ont le même niveau d'isolationnisme que nous."
 CONSCRIPT_GENERAL_TITLE:0 "Conscription d'un général"
 CONSCRIPT_GENERAL_SPECIFIC_DESC:1 "Conscrit $NAME|Y$ ($FIRE$/$SHOCK$/$MANUEVER$/$SIEGE$), leur meilleur général, dans nos propres forces."
 CONSCRIPT_GENERAL_DESCRIPTION:0 "Conscrit leur meilleur général dans nos propres forces."
 CONSCRIPT_GENERAL_NO_TARGET:0 "Aucun général valide."
 OVERLORD_CONSCRIPTED_GENERAL:0 "conscrit notre général $NAME|Y$ ($FIRE$/$SHOCK$/$MANUEVER$/$SIEGE$) pour leurs armées. Il ne nous sert plus."
 WE_CONSCRIPTED_GENERAL:0 "laisser leur général $NAME|Y$ ($FIRE$/$SHOCK$/$MANUEVER$/$SIEGE$) combattre pour nous. Il était trop compétent pour servir un clan inférieur."
 NO_VALID_SUBJECT:0 "Vous n'avez aucun Xiaken."
 TOO_ILLEGITIMATE:0 "Vous n'avez pas assez de légitimité !"
 COOLDOWN_UNTIL:0 "$ACTION$ ne peut être utilisé qu'une fois tous les $YEARS$ ans. Vous pourrez le refaire le $UNTIL|Y$."
 SWORD_HUNT_TITLE:0 "Chasse aux sabres"
 SWORD_HUNT_DESCRIPTION:0 "Parmi nos sujets se trouvent de nombreux dissidents, des vulgaires bandits aux talentueux guerriers errants, qui représentent tous une menace potentielle pour notre règne légitime sur ces terres. Nous ordonnerons une chasse aux sabres, envoyant nos armées à travers le pays pour confisquer les armes de ceux qui pourraient nous vouloir du mal."
 SANKIN_KOTAI_TITLE:0 "Convocation à la cour"
 SANKIN_KOTAI_DESCRIPTION:0 "Nous imposerons à nos sujets l'obligation de se présenter périodiquement à $CAPITALNAME$ tout en gardant des membres clés de leur cour en otages. Cela placera nos sujets sous pression diplomatique tout en renforçant notre propre influence."
 EXPEL_RONIN_TITLE:0 "Expulsion forcée des guerriers errants"
 EXPEL_RONIN_DESCRIPTION:0 "Nous sommes assaillis par des guerriers errants, sans maître et égoïstes, qui finissent souvent par devenir bandits, brutes ou vagabonds. Nous effectuerons un recensement dans les grandes villes de nos sujets et expulserons tous ceux qui correspondent à ces critères vers les campagnes, nous attirant les faveurs de tous ceux qui servent sous notre règne."
 SHOGUN_INTERACTIONS_EFFECT_INTRO:0 "$WHO$ perd $LEGITIMACY|R$ de légitimité et pendant §Y$YEARS$ ans§! :\n"
 WHO_GETS_WHAT:0 "$WHO$ obtient :\n$WHAT$\n"
 DUE_TO_X_DAIMYOS:0 "en raison de ses $X|Y$ Xiaken.\n"
 EACH_DAIMYO:0 "Chaque Xiaken"
 overlord_sankin_kotai:0 "Convocation à la cour"
 subject_sankin_kotai:0 "Convocation à la cour"
 overlord_expel_ronin:0 "Guerriers errants expulsés"
 subject_expel_ronin:0 "Guerriers errants expulsés"
 overlord_sword_hunt:0 "Chasse aux sabres"
 subject_sword_hunt:0 "Chasse aux sabres"
 ottoman_government:0 "Gouvernement ottoman"
 ottoman_government_desc:0 "Le gouvernement ottoman est à bien des égards synonyme de la maison royale. Le harem garantit qu'il n'y aura jamais de pénurie d'héritiers pour le souverain ottoman."
 ottoman_government_legacy:0 "Gouvernement ottoman"
 ottoman_government_legacy_desc:0 "Le gouvernement ottoman est à bien des égards synonyme de la maison royale. Le harem garantit qu'il n'y aura jamais de pénurie d'héritiers pour le souverain ottoman."
 coptic_conquest_of_alexandria_title:0 "Libérer Alexandrie"
 coptic_conquest_of_alexandria_desc:0 "Le Patriarcat d'Alexandrie et de toute l'Afrique est la plus grande Église copte du monde, mais son siège ancestral ainsi qu'une grande partie de la communauté copte languissent actuellement sous un joug étranger. Nous devons libérer Alexandrie et revigorer la communauté copte d'Égypte !"
 coptic_conquest_of_qasr_ibrim_title:0 "Conquérir Qasr Ibrim"
 coptic_conquest_of_qasr_ibrim_desc:0 "Bien qu'elle demeure le principal centre de dévotion des coptes nubiens, la cathédrale de Qasr Ibrim n'est plus que l'ombre d'elle-même depuis le déclin des États de la région. Nous devons conquérir Qasr Ibrim et rétablir l'honneur de la communauté copte de Nubie !"
 coptic_conquest_of_cairo_title:0 "Libérer Le Caire"
 coptic_conquest_of_cairo_desc:0 "Le Caire est la plus grande cité copte existante et, depuis des siècles, elle est la résidence du Patriarche d'Alexandrie. Nous ne pouvons permettre que cette ville reste aux mains des infidèles. Nous devons libérer la communauté copte du Caire et affranchir les coptes d'Égypte."
 the_faithful_liberated:0 "Les fidèles libérés"
 desc_the_faithful_liberated:0 "Les fidèles coptes de cette province ont été libérés."
 coptic_flavor.1.t:0 "Le Cœur sacré de [Root.GetName]"
 coptic_flavor.1.da:0 "Jadis, Aksoum était le cœur de l'antique Empire aksumite, un bastion de puissance chrétienne situé au carrefour de l'Afrique, de l'Arabie et du monde gréco-romain. Parmi les obélisques et les ruines des palais, nous avons reconstruit les églises de cette puissante nation d'antan.\n\nLa plus grande d'entre elles est l'Église Notre-Dame-Marie-de-Sion. C'est là que nous couronnons nos empereurs, descendants de Ménélik Ier, fils du roi Salomon et de la reine de Saba. C'est ici qu'il apporta l'Arche d'Alliance. Chaque année, des milliers de pèlerins viennent des confins les plus reculés de notre [Root.GovernmentName] et d'au-delà pour visiter ce lieu saint."
 coptic_flavor.1.db:0 "Gloire au Seigneur, Aksoum est nôtre ! Jadis, elle était le cœur de l'antique Empire aksumite, un bastion de puissance chrétienne situé au carrefour de l'Afrique, de l'Arabie et du monde gréco-romain. Parmi les obélisques et les ruines des palais, nous reconstruirons les églises de cette puissante nation d'antan.\n\nLa plus grande d'entre elles est l'Église Notre-Dame-Marie-de-Sion. C'est là que les empereurs éthiopiens furent couronnés, descendants de Ménélik Ier, fils du roi Salomon et de la reine de Saba. C'est ici qu'il apporta l'Arche d'Alliance. Chaque année, des milliers de pèlerins viennent visiter ce lieu saint."
 coptic_flavor.1.a:0 "Qu'Aksoum resplendisse à nouveau de l'infinie gloire de Dieu !"
 coptic_flavor.2.t:0 "Le Cœur sacré de [From.GetName]"
 coptic_flavor.2.d:0 "L'antique cité d'Aksoum repose en sécurité entre des mains coptes. Jadis, elle était le cœur de l'antique Empire aksumite, un bastion de puissance chrétienne situé au carrefour de l'Afrique, de l'Arabie et du monde gréco-romain. Parmi les obélisques et les palais, [From.GetName] reconstruit les églises de cette puissante nation d'antan.\n\nLa plus grande d'entre elles est l'Église Notre-Dame-Marie-de-Sion. C'est là que les empereurs éthiopiens furent couronnés, descendants de Ménélik Ier, fils du roi Salomon et de la reine de Saba. C'est ici qu'il apporta l'Arche d'Alliance. Chaque année, des milliers de pèlerins viennent visiter ce lieu saint."
 coptic_flavor.3.t:0 "La Perle de la Méditerranée"
 coptic_flavor.3.d:0 "Réjouissez-vous, la sainte cité d'Alexandrie est de nouveau sous domination copte ! Le siège historique de notre Église sacrée a été libéré.\n\nAlexandrie est une cité antique et fière, fondée par Alexandre le Grand. Nombre des plus brillants esprits de l'humanité l'ont appelée leur foyer. Pendant des centaines d'années, les érudits d'Alexandrie étudièrent et enseignèrent à la Grande Bibliothèque, à laquelle succéda l'École catéchétique d'Alexandrie, première du monde en son genre. Dans les années à venir, nous restaurerons les salles sacrées du savoir et formerons certains des plus grands théologiens que le monde ait jamais connus."
 coptic_flavor.3.a:0 "Que Dieu bénisse Alexandrie !"
 coptic_flavor.3.a.tt:1 "Les coptes de la région du §YDelta§! sortent de la clandestinité."
 coptic_flavor.4.d:0 "Réjouissez-vous, la sainte cité d'Alexandrie est de nouveau sous domination copte ! Le siège historique de notre Église sacrée a été libéré par [From.GetName].\n\nAlexandrie est une cité antique et fière, fondée par Alexandre le Grand. Nombre des plus brillants esprits de l'humanité l'ont appelée leur foyer. Pendant des centaines d'années, les érudits d'Alexandrie étudièrent et enseignèrent à la Grande Bibliothèque, à laquelle succéda l'École catéchétique d'Alexandrie, première du monde en son genre. Dans les années à venir, ses salles sacrées du savoir seront restaurées et formeront certains des plus grands théologiens que le monde ait jamais connus."
 coptic_flavor.5.t:0 "Le Cœur de l'Arménie"
 coptic_flavor.5.da:0 "Enfin, nous sommes à nouveau libres, et Erevan ainsi que notre sacrée cathédrale d'Etchmiadzine ont été libérées ! Elle est le refuge de notre peuple, notre havre de paix dans les temps difficiles. Durant les années d'apatridie de notre peuple, Etchmiadzine est demeurée notre centre national et politique. À travers des siècles de guerres et de pertes, nous avons trouvé dans son étreinte aimante la force et la volonté de continuer à nous battre, et maintenant nous pouvons enfin rendre à notre mère sa gloire d'antan."
 coptic_flavor.5.db:0 "Erevan ainsi que la sacrée cathédrale d'Etchmiadzine ont été libérées ! Pendant de nombreuses années, elle a été le centre national et politique du peuple arménien apatride. À travers des siècles de guerres et de pertes, ils ont trouvé dans son étreinte aimante la force et la volonté de continuer à se battre. Maintenant, nous lui rendrons sa gloire d'antan, créant à nouveau un havre de paix pour nos frères et sœurs chrétiens d'Arménie."
 coptic_flavor.5.a:0 "Nous rendrons à Erevan sa grandeur !"
 coptic_flavor.6.d:0 "Erevan a été libérée par notre nation copte sœur, [From.GetName] ! Au début du IVe siècle, la sacrée cathédrale d'Etchmiadzine y fut édifiée. Pendant de nombreuses années, cette cathédrale a été le centre national et politique du peuple arménien apatride. À travers des siècles de guerres et de pertes, ils ont trouvé dans son étreinte aimante la force et la volonté de continuer à se battre. Maintenant, elle retrouvera sa gloire d'antan !"
 coptic_flavor.6.a:0 "La vraie foi ne cesse de croître !"
 coptic_flavor.7.t:0 "Le Berceau du Christianisme"
 coptic_flavor.7.d:0 "L'antique cité d'Antioche fait désormais partie de notre saint [Root.GovernmentName] ! Antioche fut un centre du christianisme primitif à l'époque des Romains. Les Juifs convertis ici par l'apôtre Pierre furent les premiers à être appelés chrétiens. Un grand nombre de monastères y furent fondés à cette époque. Depuis lors, Antioche a connu de nombreuses guerres et de nombreux maîtres. Au XIIIe siècle, la ville tomba aux mains des Mamelouks et toute sa population chrétienne fut passée au fil de l'épée. En l'honneur de leur sacrifice, nous reconstruirons Antioche et ses monastères, la rendant plus glorieuse que jamais !"
 coptic_flavor.7.a:0 "Ô Seigneur, bénis cette cité, dans Ta miséricorde !"
 coptic_flavor.8.d:0 "L'antique cité d'Antioche fait désormais partie du [From.GovernmentName] [From.GetAdjective] ! Antioche fut un centre du christianisme primitif à l'époque des Romains. Les Juifs convertis ici par l'apôtre Pierre furent les premiers à être appelés chrétiens. Un grand nombre de monastères y furent fondés à cette époque. Depuis lors, Antioche a connu de nombreuses guerres et de nombreux maîtres. Au XIIIe siècle, la ville tomba aux mains des Mamelouks et toute sa population chrétienne fut passée au fil de l'épée. En l'honneur de leur sacrifice, Antioche et ses monastères seront reconstruits, la rendant plus glorieuse que jamais !"
 coptic_flavor.9.t:0 "Sur les rives du Nil"
 coptic_flavor.9.d:0 "Gloire au Seigneur, Qasr Ibrim est nôtre ! Pendant de nombreuses années, cette grande cité chrétienne a persévéré, bien qu'entourée d'ennemis religieux de toutes parts. Perchée au sommet d'une falaise surplombant le puissant Nil, Qasr Ibrim est demeurée un bastion du christianisme en Basse-Nubie alors même que le reste de la région sombrait dans les ténèbres. Ce nouvel ajout à notre [Root.GovernmentName] ne revêt pas seulement une importance religieuse : c'est aussi un centre de commerce et de politique. Avec ces ressources entre nos mains, [Root.GetName] deviendra encore plus puissant !"
 coptic_flavor.9.a:0 "C'est le début d'une ère glorieuse !"
 coptic_flavor.9.a.tt:1 "Les coptes des régions de §YBasse-Nubie et Dongola§! sortent de la clandestinité."
 coptic_flavor.10.d:0 "Gloire au Seigneur, Qasr Ibrim appartient au [From.GovernmentName] copte de [From.GetName] ! Pendant de nombreuses années, cette grande cité chrétienne a persévéré, bien qu'entourée d'ennemis religieux de toutes parts. Perchée au sommet d'une falaise surplombant le puissant Nil, Qasr Ibrim est demeurée un bastion du christianisme en Basse-Nubie alors même que le reste de la région sombrait dans les ténèbres. Désormais, [From.GetName] utilisera les grandes ressources politiques et économiques de la ville pour répandre la parole du seul vrai Dieu à travers toute la Nubie."
 coptic_flavor.11.t:0 "Monastère de Saint-Antoine"
 coptic_flavor.11.d:0 "Au cœur des montagnes de la mer Rouge, dans une oasis cachée, se trouve l'un de nos lieux les plus sacrés : le monastère de Saint-Antoine. Édifié par les disciples d'Antoine au IVe siècle, ce monastère chrétien est l'un des plus anciens au monde. Saint Antoine, le plus éminent des Pères du désert, est connu comme le Père des moines. Il s'aventura dans le désert où il passa de nombreuses années en ermite, sa vie dédiée à Dieu. Durant la Grande Persécution, il retourna à la civilisation pour réconforter les prisonniers, risquant sa vie pour ses frères chrétiens. À la fin de sa vie, il s'établit près de l'oasis où se dresse aujourd'hui le grand monastère. Des milliers de pèlerins suivent les pas d'Antoine chaque année, et maintenant qu'As-Suways est sous notre protection, nous pouvons nous assurer qu'ils atteignent leur destination en toute sécurité."
 coptic_flavor.11.a:0 "Nous apprendrons des voies de Saint Antoine."
 coptic_flavor.11.a.tt:1 "Les coptes de la région des §YCollines de la mer Rouge§! sortent de la clandestinité."
 coptic_flavor.12.d:0 "Au cœur des montagnes de la mer Rouge, dans une oasis cachée, se trouve l'un de nos lieux les plus sacrés : le monastère de Saint-Antoine. Édifié par les disciples d'Antoine au IVe siècle, ce monastère chrétien est l'un des plus anciens au monde. Saint Antoine, le plus éminent des Pères du désert, est connu comme le Père des moines. Il s'aventura dans le désert où il passa de nombreuses années en ermite, sa vie dédiée à Dieu. Durant la Grande Persécution, il retourna à la civilisation pour réconforter les prisonniers, risquant sa vie pour ses frères chrétiens. À la fin de sa vie, il s'établit près de l'oasis où se dresse aujourd'hui le grand monastère. Des milliers de pèlerins suivent les pas d'Antoine chaque année, et maintenant qu'As-Suways est sous la protection [From.GetAdjective], ils atteindront leur destination en toute sécurité."
 coptic_flavor.13.t:0 "Sainte Catherine à la roue"
 coptic_flavor.13.d:0 "Au pied du saint mont Sinaï, où Moïse reçut les Dix Commandements, se dresse un monastère dédié à sainte Catherine d'Alexandrie. Catherine était une étudiante dévouée et une disciple du Christ. Lorsque l'empereur romain Maxence commença à persécuter les chrétiens, la courageuse jeune vierge lui reprocha sa cruauté. L'empereur rassembla cinquante de ses meilleurs philosophes et orateurs pour débattre avec elle, mais la sage Catherine l'emporta. Bien qu'elle fût ensuite emprisonnée et torturée, Maxence échoua à nouveau car nombre de ses plus proches sujets furent convertis par l'éloquence et la piété de Catherine. Dans sa fureur, l'empereur condamna Catherine à mourir sur une roue de supplice, mais celle-ci se brisa à son contact. Elle fut finalement décapitée, bien que son martyre ait contribué à répandre la lumière du Christ dans de nombreux cœurs impies."
 coptic_flavor.13.a:0 "Le monastère de Sainte-Catherine au Sinaï est désormais sous notre protection."
 coptic_flavor.14.a:0 "Le monastère de Sainte-Catherine au Sinaï est désormais sous la protection [From.GetAdjective]."
 coptic_flavor.15.t:0 "Le Patriarche d'Afrique"
 coptic_flavor.15.d:0 "Louons le Seigneur en ce jour des plus glorieux ! Pendant des siècles, tous les coptes célébreront cette date en mémoire de notre grande victoire. Enfin, nous avons libéré notre vénéré Patriarche, le Pape d'Alexandrie, de sa cage dorée au Caire ! Nous n'aurons plus à ramper devant nos ennemis ni à attendre des décennies pour voir de nouveaux évêques nommés. C'est une étape capitale sur notre chemin pour restaurer l'Église copte à sa grandeur d'antan, et au-delà."
 coptic_flavor.15.a:0 "Plus rien ne nous retient désormais !"
 coptic_flavor.15.a.tt:0 "Les coptes de la région de §YBahari§! sortent de la clandestinité."
 coptic_flavor.16.a:0 "Que Dieu bénisse le [From.GovernmentName] de [From.GetName] !"
 coptic_flavor.16.d:0 "Louons le Seigneur en ce jour des plus glorieux ! Pendant des siècles, tous les coptes célébreront cette date en mémoire de cette grande victoire. Enfin, notre vénéré Patriarche, le Pape d'Alexandrie, a été libéré de sa cage dorée au Caire par le [From.GovernmentName] [From.GetAdjective] ! Nous n'aurons plus à ramper devant nos ennemis ni à attendre des décennies pour voir de nouveaux évêques nommés. C'est une étape capitale sur le chemin pour restaurer l'Église copte à sa grandeur d'antan, et au-delà."
 coptic_flavor.20.t:0 "L'importance de l'érudition"
 coptic_flavor.20.d:0 "Les monastères de notre [Root.GovernmentName] sont réputés comme centres d'érudition et d'art. Dans chaque école monastique résident plusieurs érudits religieux, experts en histoire de l'Église, exégèse des Saintes Écritures, lecture, grammaire, poésie, musique, calligraphie et peinture. Les monastères rivalisent pour attirer les maîtres les plus savants et les entretiennent avec grands honneurs et rémunérations. En retour, les érudits transmettent leur savoir à leurs élèves, composés de futurs ecclésiastiques comme de nobles ambitieux. Pour rejoindre l'élite chrétienne, appartenir à une famille puissante suffit rarement : tous ceux qui jouent un rôle significatif dans la conduite de notre pays ont été formés dans l'une des écoles monastiques les plus prestigieuses.\n\nNous avons été contactés par deux de ces écoles qui sollicitent notre soutien. Si nous choisissons d'accorder notre patronage, cela pourrait être bénéfique pour le développement érudit de la nation."
 coptic_flavor.20.a:0 "Soutenons l'école spécialisée en administration."
 coptic_flavor.20.a.tt:0 "Investir dans l'école monastique à spécialisation administrative."
 coptic_flavor.20.b:0 "Il vaut mieux investir dans les affaires diplomatiques."
 coptic_flavor.20.b.tt:0 "Investir dans l'école monastique à spécialisation diplomatique."
 coptic_flavor.20.c:0 "Ces institutions ont déjà suffisamment d'influence ; peut-être devraient-elles nous soutenir ?"
 coptic_flavor.20.c.tt:0 "Contraindre les écoles monastiques à payer un impôt supplémentaire. Le tout pour le bien de la nation."
 administration_monastery_school:0 "École monastique d'administration"
 desc_administration_monastery_school:0 "Notre développement technologique est renforcé par une école monastique de grand prestige spécialisée en administration."
 diplomacy_monastery_school:0 "École monastique de diplomatie"
 desc_diplomacy_monastery_school:0 "Notre développement technologique est renforcé par une école monastique de grand prestige spécialisée en diplomatie."
 coptic_flavor.28.t:0 "La Naissance de l'Église"
 coptic_flavor.28.d:0 "Aujourd'hui, cinquante jours après Pâques, nous célébrons la Pentecôte. En ce jour sacré, il y a bien des siècles, notre Église naquit. L'Esprit Saint descendit sur les Apôtres et les autres disciples du Christ sous forme de langues de feu. Ainsi parlèrent-ils la parole du Seigneur dans toutes les langues du monde et convertirent des milliers d'âmes à la vraie foi. Ainsi débuta une ère nouvelle, l'ère messianique du Royaume de Dieu. En mémoire de ce grand événement, nous tenons l'une des plus grandes célébrations de l'Église. Ensemble, nous lisons la Bible, chantons des hymnes joyeux et nous agenouillons en prière."
 coptic_flavor.29.t:0 "Fête du Dimanche des Rameaux"
 coptic_flavor.29.d:0 "En tant que coptes, nous célébrons le Dimanche des Rameaux, l'une des Sept Grandes Fêtes du Seigneur. Le septième dimanche du Grand Carême, nous commémorons et revivons l'entrée triomphale de Jésus dans la sainte ville de Jérusalem. C'est ce jour-là qu'Il chassa les marchands et les changeurs du Temple. La foule qui accueillit joyeusement le Messie agitait des branches de palmier au-dessus de leurs têtes, et nous faisons de même lors de notre procession à travers l'église en ce jour de joie. Durant la procession, nous chantons des hymnes joyeux, et c'est véritablement l'un de nos moments préférés de l'année liturgique."
 coptic_flavor.29.a:0 "Qu'aucune dépense ne soit épargnée en ce grand jour !"
 coptic_flavor.28.a.tt:0 "Consacrer des ressources considérables à la fête de la Pentecôte."
 coptic_flavor.29.a.tt:0 "Consacrer des ressources considérables à la fête du Dimanche des Rameaux."
 coptic_flavor.29.b:0 "Notre amour du Christ ne se mesure pas en or dépensé."
 coptic_flavor.28.b.tt:0 "Célébrer la Pentecôte comme d'habitude."
 coptic_flavor.29.b.tt:0 "Célébrer le Dimanche des Rameaux comme d'habitude."
 celebrating_lords_feast:0 "Célébration d'une Fête du Seigneur"
 desc_celebrating_lords_feast:0 "Nous célébrons l'une des Sept Grandes Fêtes du Seigneur. Aucune dépense n'a été épargnée pour cet événement joyeux."
 coptic_flavor.30.t:0 "En quête de l'âme"
 coptic_flavor.30.d:0 "Quelques conversations religieuses par-ci, quelques arguments impressionnants sur la moralité de l'homme par-là, et l'un de nos nobles les plus érudits a décidé d'embrasser la vie monastique. « Je suivrai les traces de saint Shenoute l'Archimandrite ; un jour, je fonderai peut-être même mon propre monastère ! » s'exclame-t-il passionnément.\nTous ne seraient pas d'accord avec la décision du noble, cependant, et bien qu'il ait déjà commencé à distribuer ses biens, il pourrait encore être temps de le dissuader de partir."
 coptic_flavor.30.a:0 "Nous pourrions utiliser cette passion dans certaines de nos provinces..."
 coptic_flavor.30.a.tt:0 "Le noble devient missionnaire, un devoir sacré envers le [Root.Monarch.GetTitle] supérieur à celui de moine."
 coptic_flavor.30.b:0 "Attendez ! Nous avons besoin d'érudits à la cour !"
 coptic_flavor.30.b.tt:0 "Le noble devient notre conseiller de confiance."
 coptic_flavor.30.c:0 "Il doit être autorisé à trouver Dieu."
 coptic_flavor.30.c.tt:0 "Le noble quitte la cour pour vivre le reste de sa vie dans la solitude."
 enthusiastic_believer:0 "Un croyant enthousiaste"
 desc_enthusiastic_believer:0 "Un noble pieux a accepté le devoir sacré de répandre la foi auprès des âmes égarées de notre royaume."
 coptic_flavor.31.t:0 "Le Monastère Blanc"
 coptic_flavor.31.d:0 "La province de Quina a envoyé des représentants pour solliciter des ressources et du soutien afin de restaurer un célèbre ancien monastère qui aurait été la demeure de saint Shenoute l'Archimandrite lui-même. Les fondations des murs de pierre furent posées il y a plus d'un millénaire, et les fidèles dévots de la région n'aspirent à rien de plus que de restaurer l'édifice à sa gloire d'antan. « Avec votre aide, il redeviendra un centre d'érudition et d'études scripturaires », nous assurent-ils."
 coptic_flavor.31.a:0 "Qu'ils aient leurs livres !"
 coptic_flavor.31.a.tt:0 "Le monastère sera reconstruit."
 coptic_flavor.31.b:0 "Il y a plus de savoir en ce monde que celui des érudits."
 coptic_flavor.31.b.tt:0 "Les représentants repartent déçus."
 songs_of_the_pious:0 "Chants des pieux"
 desc_songs_of_the_pious:0 "Une nouvelle église a récemment été établie dans la région. Les hymnes sont un ajout bienvenu à cette contrée."
 scripture_studies:0 "Études scripturaires"
 desc_scripture_studies:0 "Le Monastère Blanc situé dans la région est renommé pour son impressionnante bibliothèque."
 coptic_flavor.32.t:0 "Une ère nouvelle"
 coptic_flavor.32.d:0 "Nous avons reçu des nouvelles de [pious_province.GetName] concernant un groupe de gens du peuple se rassemblant régulièrement dans la campagne ; il semble que ce soient des fidèles du Seigneur. Selon nos messagers, ils tentent de construire un lieu de culte depuis quelque temps, mais des fonds supplémentaires accéléreraient probablement le projet."
 coptic_flavor.32.a:0 "Les pieux seront récompensés ! Qu'on leur construise une église !"
 coptic_flavor.32.a.tt:0 "Une nouvelle église sera construite."
 coptic_flavor.32.b:0 "Nous avons des affaires plus importantes à régler."
 coptic_flavor.40.t:0 "Le Patriarche de [cairo_province.GetName]"
 coptic_flavor.40.d:0 "La religion copte est présente depuis longtemps à [cairo_province.GetName]. Certains disciples du Patriarche à l'étranger ont même prétendu que nous retenions des coptes captifs sur nos terres... Peut-être ont-ils besoin qu'on leur rappelle la situation ?"
 coptic_flavor.40.a:0 "Envoyons des messages rappelant à mon voisin mon régime tolérant."
 coptic_flavor.40.a.tt:0 "Il y a une chance que §Y[ally_to_patriarch.GetName]§! apprécie ce geste."
 coptic_flavor.40.b:0 "Rappelons-leur qui contrôle leur Pape."
 coptic_flavor.40.b.tt:0 "Il y a une chance que §Y[ally_to_patriarch.GetName]§! n'apprécie pas ce geste."
 coptic_flavor.40.c:0 "Nous ne devrions pas nous en mêler."
 coptic_flavor.41.t:0 "Demeure du Patriarche"
 coptic_flavor.41.d:0 "Nos voisins de [From.GetName] ont envoyé des messages à notre royaume, nous informant du statut actuel du bienheureux Patriarche de [cairo_province.GetName]. Selon la missive, Sa Sainteté est très satisfaite du niveau de tolérance religieuse affiché par le gouvernement [From.GetAdjective]."
 coptic_flavor.41.a:0 "Nous sommes ravis de l'apprendre !"
 coptic_flavor.41.a.tt:0 "Cela pourrait être le début d'une belle amitié : les deux pays reçoivent §YApprouve la diplomatie§! et leur opinion réciproque change de §G+25§!."
 coptic_flavor.41.b:0 "Est-ce une plaisanterie ?! Ils se moquent de nous !"
 coptic_flavor.41.b.tt:0 "Envoyer une lettre de réponse courroucée."
 coptic_flavor.42.t:0 "Le Patriarche captif"
 coptic_flavor.42.d:0 "Nos voisins de [From.GetName] ont envoyé des messages à notre royaume, nous rappelant qu'ils détiennent notre bienheureux Patriarche de [cairo_province.GetName]. Bien que Sa Sainteté soit toujours en vie, nous ne pouvons être certains du niveau de tolérance religieuse affiché par le gouvernement [From.GetAdjective]."
 coptic_flavor.42.a:0 "C'est inacceptable ! Une menace voilée reste une menace !"
 coptic_flavor.42.a.tt:0 "Nous leur faisons connaître nos sentiments."
 coptic_flavor.42.b:0 "Ne nous laissons pas provoquer."
 coptic_flavor.42.b.tt:0 "Nous laissons passer pour l'instant."
 coptic_flavor.43.t:0 "Réponse des coptes"
 coptic_flavor.43.da:0 "Les coptes [From.GetAdjective] sont ravis de nos messages empreints de bienveillance ! Peut-être nos peuples vivront-ils en harmonie pour les siècles à venir ?"
 coptic_flavor.43.a:0 "Espérons-le."
 coptic_flavor.43.a.tt:0 "Cela pourrait être le début d'une belle amitié : les deux pays reçoivent §YApprouve la diplomatie§! et leur opinion réciproque change de §G+25§!."
 coptic_flavor.43.db:0 "Les paranoïaques [From.GetAdjective] sont offensés par nos messages, y voyant une menace à peine voilée contre leur Patriarche. Leur réponse contenait une quantité impie de malédictions à notre encontre. Peut-être était-ce une erreur ?"
 coptic_flavor.43.b:0 "Ce n'est pas notre faute."
 coptic_flavor.43.dc:0 "Les [From.GetAdjective] sont offensés par notre menace à peine voilée contre leur Patriarche de [cairo_province.GetName]. La réponse de leurs dirigeants contient un avertissement belliqueux de ne pas toucher à un seul cheveu d'un copte."
 coptic_flavor.43.c:0 "Nous nous y attendions."
 coptic_flavor.43.dd:0 "Les [From.GetAdjective] n'ont envoyé aucun message en réponse à nos menaces à peine voilées contre leur Patriarche de [cairo_province.GetName]. Soit ils ne se soucient pas de leur lieu saint, soit ils sont trop effrayés par la glorieuse [Root.GetName] pour oser s'exprimer contre nous."
 coptic_flavor.43.d:0 "Ils ont compris le message."
 SELECT_CULTURE_CONFIRM_TITLE:0 "Confirmer le changement culturel"
 PROMOTE_CULTURE_CONFIRM_TITLE:0 "Confirmer la promotion de culture"
 DEMOTE_CULTURE_CONFIRM_TITLE:0 "Confirmer la rétrogradation de culture"
 SELECT_CULTURE_CONFIRM_DESC:0 "Changer votre culture principale pour $NAME|Y$ coûtera $COST|Y$£dip.\nÊtes-vous sûr ?"
 PROMOTE_CULTURE_CONFIRM_DESC:0 "Promouvoir $NAME|Y$ au statut de culture acceptée coûtera $COST|Y$£dip.\nÊtes-vous sûr ?"
 DEMOTE_CULTURE_CONFIRM_DESC:0 "Rétrograder $NAME|Y$ au statut de culture non acceptée coûtera $COST|Y$£dip.\nL'§Yagitation§! dans toutes les provinces $NAME|Y$ augmentera de $UNREST$ pendant $YEARS$ ans.\nÊtes-vous sûr ?"
 coptic_flavor.33.t:0 "Alliés de la foi"
 coptic_flavor.33.d:0 "Nous sommes fiers d'être coptes, disciples de la vraie foi. Bien que nous soyons fermes dans nos convictions et que nous n'abandonnerons jamais le Christ, notre isolement du reste de la communauté chrétienne constitue une faiblesse. Nous sommes assaillis par des ennemis religieux sur de nombreux fronts. La guerre imminente n'est pas une question de « si », mais de « quand ». Avant qu'elle n'éclate, nous devrions tenter de trouver des alliés puissants. Il existe un puissant royaume chrétien loin au nord, mais son emplacement exact et la distance qui nous en sépare nous sont inconnus. Cependant, nous pouvons financer une expédition dans le but de les trouver."
 coptic_flavor.33.a:0 "Envoyons nos meilleurs explorateurs, prêtres et diplomates !"
 coptic_flavor.33.a.tt:0 "Envoyer une expédition vers le nord à la recherche de chrétiens. Le succès n'est pas garanti, mais nous pourrions trouver une forme d'assistance contre nos ennemis religieux communs."
 coptic_flavor.33.b:0 "Nous n'avons besoin de personne d'autre quand Dieu est à nos côtés."
 coptic_flavor.33.b.tt:0 "Aucune expédition n'est envoyée."
 coptic_flavor.34.t:0 "Livres ou épées"
 coptic_flavor.34.d:0 "Un groupe de diplomates coptes de notre voisin [From.GetName] a pénétré sur notre territoire. Ils comptent un nombre inhabituellement élevé de prêtres parmi eux. Nos conseillers soupçonnent qu'ils tentent d'établir un contact avec d'autres chrétiens au nord. Les diplomates restent étrangement silencieux sur l'objet de leur mission. Peut-être s'agit-il simplement d'une affaire religieuse, mais et s'ils tentaient de rassembler des alliés contre nous ? Nous serions assaillis sur plusieurs fronts par des infidèles fanatiques !"
 coptic_flavor.34.a:0 "Ce ne sont que des spéculations. Les diplomates [From.GetAdjective] peuvent passer."
 coptic_flavor.34.b:0 "Nous ne pouvons prendre ce risque. Arrêtez-les."
 coptic_flavor.35.t:0 "Ennemi de la foi"
 coptic_flavor.35.d:0 "Une nouvelle nous est parvenue : nos méprisables voisins, le [From.GovernmentName] de [From.GetName], ont fait prisonniers nos diplomates ! Ils refusent de laisser nos émissaires poursuivre leur voyage ou de les laisser rentrer chez eux. Nous ne pouvons qu'espérer qu'ils changent d'avis. Quoi qu'il en soit, cette attaque révoltante contre un groupe d'envoyés pacifiques ne fait que confirmer nos soupçons. [From.GetName] est un dangereux ennemi de la seule vraie foi."
 coptic_flavor.35.a:0 "Que Dieu frappe les infidèles !"
 coptic_flavor.36.t:0 "Frères venus d'outre-mer"
 coptic_flavor.36.d:0 "Parfois, nous nous rappelons à quel point ce monde s'étend au-delà de nos propres royaumes. Nous avons reçu la visite d'un étrange groupe de personnes venues de terres situées loin au sud d'ici. Bien que la plupart d'entre eux ne parlent que leur propre langue au son particulier, quelques-uns ont pu converser avec nos interprètes en arabe. Ils prétendent venir du grand [sent_diplomats.GovernmentName] de [sent_diplomats.GetName] et chercher des amis parmi leurs coreligionnaires chrétiens. Nous savons très peu de choses sur les chrétiens du sud, mais ces hommes [sent_diplomats.GetAdjective] semblent être de véritables croyants. Ils parlent du Christ avec ferveur dans la voix et semblent bien plus versés dans les Écritures que notre noble moyen. Apparemment, leur pays est entouré d'ennemis religieux et ils nous demandent de les aider à défendre la vraie foi. Bien que ce conflit soit trop distant et méconnu pour que nous nous y engagions directement, nous pourrions partager avec eux une partie de notre savoir et de nos ressources."
 coptic_flavor.36.a:0 "Bien sûr que nous vous aiderons, mes frères. Tout pour le seul vrai Dieu !"
 coptic_flavor.36.a.tt:0 "Les diplomates [From.GetAdjective] sont renvoyés chez eux avec des ressources pour les aider dans leur défense du christianisme."
 coptic_flavor.36.b:0 "Cela ne nous concerne pas. Nous avons nos propres guerres à mener."
 coptic_flavor.36.b.tt:0 "Les diplomates [From.GetAdjective] sont renvoyés chez eux les mains vides."
 coptic_flavor.37.t:0 "Amis en terres étrangères"
 coptic_flavor.37.d:0 "Gloire au Seigneur, nos diplomates sont enfin revenus de leur voyage vers le nord ! Non seulement ils sont de nouveau parmi nous, sains et saufs, mais ils rapportent également de nombreux ouvrages et récits intéressants de leurs voyages. La plupart proviennent du [From.GovernmentName] de [From.GetName], où nos diplomates ont été très bien reçus. Bien que nous aurions pu espérer plus que du savoir, nous sommes reconnaissants de tout ce que Dieu et nos coreligionnaires chrétiens nous offrent. Nous veillerons à ce que leur don ne soit pas gaspillé."
 coptic_flavor.37.a:0 "Peut-être est-ce le début d'une amitié durable entre nos nations ?"
 coptic_flavor.38.t:0 "Seuls au monde"
 coptic_flavor.38.d:0 "Après un long et ardu voyage, les diplomates que nous avions envoyés vers le nord sont enfin revenus. Ils ont effectivement atteint des terres chrétiennes, mais ils reviennent les mains vides. Bien que de nombreux chrétiens qu'ils ont rencontrés les aient écoutés, peu semblaient véritablement se soucier de notre sort. Dans notre isolement, nous sommes doublement maudits : non seulement nous sommes entourés d'ennemis, mais la distance qui nous sépare du reste de la communauté chrétienne fait de nous des parias. Ce qui se passe en [Root.GetName] ne les affecte pas et peut-être nos coutumes leur sont-elles trop étrangères pour qu'ils s'y identifient. Il semble que les coptes soient seuls au monde."
 coptic_flavor.38.a:0 "Nous ne devons pas perdre la foi. Dieu est le seul allié dont nous avons besoin."
 opinion_captured_diplomats:0 "Diplomates capturés"
 coptic_flavor.100.t:0 "Les Pèlerins de [Root.GetName]"
 coptic_flavor.100.da:0 "[Root.GetName] a récemment vu de nombreuses âmes égarées chercher conseil au monastère de la région. En fait, la région devient très populaire auprès de ceux qui recherchent la repentance et l'absolution selon les voies de saint Antoine : les grottes du désert sont parfaitement adaptées à la vie d'ermite, permettant aux coptes les plus dévots de passer des années dans une solitude contemplative.\n\nEntre-temps, la population de [Root.GetName] tire une grande fierté de cette piété. Quelques paroles d'encouragement bien placées pourraient nous permettre de renforcer encore leur estime de soi..."
 coptic_flavor.100.db:0 "[Root.GetName] a récemment vu de nombreuses âmes égarées chercher conseil au monastère de la région. En fait, la région devient très populaire auprès de ceux qui recherchent la repentance et l'absolution selon les voies de saint Antoine : les étendues sauvages environnantes sont parfaitement adaptées à la vie d'ermite, permettant aux coptes les plus dévots de passer des années dans une solitude contemplative.\n\nEntre-temps, la population de [Root.GetName] tire une grande fierté de cette piété. Quelques paroles d'encouragement bien placées pourraient nous permettre de renforcer encore leur enthousiasme..."
 coptic_flavor.100.a:0 "Rappeler au peuple les vertus du labeur."
 coptic_flavor.100.b:0 "Leur dire que nous devons être prêts à défendre notre foi à tout prix."
 inspired_workers:0 "Travailleurs inspirés"
 desc_inspired_workers:0 "Les travailleurs de cette région sont galvanisés par la piété de leur communauté."
 inspired_soldiers:0 "Soldats inspirés"
 desc_inspired_soldiers:0 "Les soldats de cette région sont galvanisés par la piété de leur communauté."
 coptic_flavor.101.t:0 "Un monastère pillé"
 coptic_flavor.101.d:0 "L'une de nos provinces a envoyé des représentants pour solliciter des ressources et du soutien afin de restaurer un ancien monastère, récemment pillé lors d'un raid de bandits. Les fondations des murs de pierre furent posées il y a des générations, et les habitants de la région n'aspirent à rien de plus que de restaurer l'édifice et d'en faire un phare de dévotion sainte. Toute aide apportée à la communauté pourrait impressionner les habitants."
 coptic_flavor.101.a:0 "Envoyons-leur des ressources."
 coptic_flavor.101.a.tt:0 "Le monastère sera restauré."
 coptic_flavor.101.b:0 "Ils peuvent prier chez eux."
 coptic_flavor.101.b.tt:0 "Les représentants repartent déçus."
 monastery_repaired:0 "Monastère restauré"
 desc_monastery_repaired:0 "Un monastère qui avait été incendié ici a été rapidement reconstruit."
 coptic_flavor.150.t:0 "Le monde chrétien au sens large"
 coptic_flavor.150.d:0 "La conquête d'Alexandrie est une grande victoire non seulement pour les coptes d'Égypte. Les grandes cités marchandes italiennes ont toutes une présence permanente dans ce grand port et se sont montrées très désireuses de commercer avec nous. Ces marchands rivalisent désormais pour obtenir les faveurs du [Root.Monarch.GetTitle] qui a accompli ce que les croisés n'ont pu faire, et grâce à eux, nous avons pu établir le contact avec un grand nombre d'autres États chrétiens autour de la Méditerranée orientale."
 coptic_flavor.150.a:0 "« Ayez soin de vous réunir souvent pour rendre grâces à Dieu et proclamer sa gloire. »"
 coptic_flavor.150.a.tt:0 "Nos cartes de la Méditerranée orientale sont désormais plus complètes."
 HOLY_SITE_1227_DESC:0 "À Aksoum se dresse l'Église Notre-Dame-Marie-de-Sion, édifiée au IVe siècle sous le règne d'Ezana, premier souverain chrétien de l'antique Empire aksumite. Selon les légendes, c'est ici que le grand empereur Ménélik Ier, fils du roi Salomon et de la reine de Saba, apporta l'Arche d'Alliance après son voyage à Jérusalem."
 HOLY_SITE_358_DESC:0 "Alexandrie est le siège historique de l'Église copte, bien que son Patriarche, le Pape d'Alexandrie, réside au Caire depuis le XIe siècle. Lorsque le Pape résidait à Alexandrie, son siège était la cathédrale Saint-Marc, édifiée en l'honneur de Marc l'Évangéliste, fondateur de l'Église copte. Pendant des millénaires, Alexandrie a été un centre d'érudition et la première école catéchétique au monde y fut fondée."
 HOLY_SITE_419_DESC:0 "La cathédrale d'Etchmiadzine à Vagharchapat aurait été fondée par saint Grégoire l'Illuminateur et saint Tiridate le Grand, et malgré des siècles d'occupation étrangère, elle demeure l'un des lieux saints les plus importants de l'Église apostolique arménienne."
 HOLY_SITE_2313_DESC:0 "Antioche, le Berceau du Christianisme, fut un centre du christianisme à l'époque romaine. Elle devint le siège de l'un des cinq patriarcats originels, avec Constantinople, Jérusalem, Alexandrie et Rome. Antioche était jadis une métropole bouillonnante d'un demi-million d'âmes, mais déclina après avoir été ravagée durant les Croisades. Elle tomba au XIIIe siècle lorsque la cité fut rasée par les musulmans et que toute sa population chrétienne fut réduite en esclavage ou massacrée."
 HOLY_SITE_1234_DESC:0 "L'antique cité de Qasr Ibrim devint un centre du christianisme au VIIIe siècle et atteignit son apogée durant l'Éparchie de Nobatie. Même lorsque le reste de la Makurie devint islamique, la population de Qasr Ibrim resta chrétienne et l'est demeurée jusqu'à ce jour. Perchée au sommet d'une falaise surplombant le Nil, Qasr Ibrim est devenue un lieu d'une grande importance économique, politique et religieuse."
 #Ottoman Government
 MDEATH_HAREM_SUCCESSION:0 ""
 harem_events.1.t:0 "Les Fils de [Root.Monarch.GetName]"
 harem_events.1.da:0 "Sa Majesté Impériale [Root.Monarch.GetName] [Root.Monarch.GetTitle], souverain de la maison d'Osman, Sultan des Sultans et Khan des Khans, jouit d'une réputation d'homme d'exception et règne sans partage.\nComme il sied à un homme de son calibre et de sa stature, le Sultan a engendré plusieurs enfants capables, dont beaucoup montrent un grand potentiel comme futurs souverains. Cependant, comme les fils eux-mêmes et nos fonctionnaires gouvernementaux le savent bien, un seul peut hériter et il n'y a guère de lots de consolation. Nos vizirs insistent sur le fait qu'il est grand temps pour [Root.Monarch.GetName] de désigner un favori parmi les successeurs possibles. Cela ne mettra probablement pas fin à la compétition pour [Root.Monarch.GetHerHis] faveurs, mais cela évitera, espérons-le, les pires luttes de succession qui pourraient suivre si notre [Root.Monarch.GetTitle] venait à rejoindre son créateur sans avoir désigné un successeur clair."
 harem_events.1.db:0 "Sa Majesté Impériale [Root.Monarch.GetName] [Root.Monarch.GetTitle], souverain de la maison d'Osman, Sultan des Sultans, Khan des Khans, Kayser-i-Roum, Empereur des Trois Cités de Constantinople, Andrinople et Bursa, jouit d'une réputation d'homme d'exception et règne sans partage.\nComme il sied à un homme de son calibre et de sa stature, le Sultan a engendré plusieurs enfants capables, dont beaucoup montrent un grand potentiel comme futurs souverains. Cependant, comme les fils eux-mêmes et nos fonctionnaires gouvernementaux le savent bien, un seul peut hériter et il n'y a guère de lots de consolation. Nos vizirs insistent sur le fait qu'il est grand temps pour [Root.Monarch.GetName] de désigner un favori parmi les successeurs possibles. Cela ne mettra probablement pas fin à la compétition pour [Root.Monarch.GetHerHis] faveurs, mais cela évitera, espérons-le, les pires luttes de succession qui pourraient suivre si notre [Root.Monarch.GetTitle] venait à rejoindre son créateur sans avoir désigné un successeur clair."
 harem_events.1.dc:0 "Sa Majesté Impériale [Root.Monarch.GetName] [Root.Monarch.GetTitle], souverain de la maison d'Osman, Sultan des Sultans, Khan des Khans, Gardien des Deux Nobles Sanctuaires, Kayser-i-Roum, Empereur des Trois Cités de Constantinople, Andrinople et Bursa, jouit d'une réputation d'homme d'exception et règne sans partage.\nComme il sied à un homme de son calibre et de sa stature, le Sultan a engendré plusieurs enfants capables, dont beaucoup montrent un grand potentiel comme futurs souverains. Cependant, comme les fils eux-mêmes et nos fonctionnaires gouvernementaux le savent bien, un seul peut hériter et il n'y a guère de lots de consolation. Nos vizirs insistent sur le fait qu'il est grand temps pour [Root.Monarch.GetName] de désigner un favori parmi les successeurs possibles. Cela ne mettra probablement pas fin à la compétition pour [Root.Monarch.GetHerHis] faveurs, mais cela évitera, espérons-le, les pires luttes de succession qui pourraient suivre si notre [Root.Monarch.GetTitle] venait à rejoindre son créateur sans avoir désigné un successeur clair."
 harem_events.1.dd:0 "Sa Majesté Impériale [Root.Monarch.GetName] [Root.Monarch.GetTitle], souverain de la maison d'Osman, Sultan des Sultans, Khan des Khans, Commandeur des Croyants et Successeur du Prophète du Seigneur de l'Univers, Gardien des Deux Nobles Sanctuaires, Kayser-i-Roum, Empereur des Trois Cités de Constantinople, Andrinople et Bursa, jouit d'une réputation d'homme d'exception et règne sans partage.\nComme il sied à un homme de son calibre et de sa stature, le Sultan a engendré plusieurs enfants capables, dont beaucoup montrent un grand potentiel comme futurs souverains. Les fils eux-mêmes comme nos fonctionnaires gouvernementaux savent parfaitement qu'un seul peut hériter et ce qui attend les autres. Nos vizirs insistent sur le fait qu'il est grand temps pour [Root.Monarch.GetName] de désigner un favori parmi les successeurs possibles. Cela ne mettra probablement pas fin à la compétition pour [Root.Monarch.GetHerHis] faveurs, mais cela évitera, espérons-le, les pires luttes de succession qui pourraient suivre si notre [Root.Monarch.GetTitle] venait à rejoindre son créateur sans avoir désigné un successeur clair."
 harem_events.1.female:0 "Sa Majesté Impériale [Root.Monarch.GetName] [Root.Monarch.GetTitle], souveraine de la maison d'Osman et Sultane des Sultanes, jouit d'une réputation de femme d'exception et règne sans partage.\nComme il sied à une souveraine de son calibre et de sa stature, la Sultane a enfanté plusieurs héritiers capables, dont beaucoup montrent un grand potentiel comme futurs souverains. Les fils eux-mêmes comme nos fonctionnaires gouvernementaux savent parfaitement qu'un seul peut hériter et ce qui attend les autres. Nos vizirs insistent sur le fait qu'il est grand temps pour [Root.Monarch.GetName] de désigner un favori parmi les successeurs possibles. Cela ne mettra probablement pas fin à la compétition pour [Root.Monarch.GetHerHis] faveurs, mais cela évitera, espérons-le, les pires luttes de succession qui pourraient suivre si notre [Root.Monarch.GetTitle] venait à rejoindre son créateur sans avoir désigné un successeur clair."
 harem_events.1.a:0 "Le fils pieux est notre favori."
 harem_events.1.b:0 "Le fils le plus fort est notre favori."
 harem_events.1.c:0 "Le fils studieux est notre favori."
 harem_events.1.d:0 "Le fils sociable est notre favori."
 harem_events.1.e:0 "Le meneur naturel est notre favori."
 harem_events.1.f:0 "Le fils le plus beau est notre favori."
 harem_events.1.g:0 "Le fils entreprenant est notre favori."
 harem_events.1.h:0 "Le fils curieux est notre favori."
 harem_events.1.i:0 "Le fils le plus doué est notre favori."
 harem_events.1.j:0 "Le fils généreux est notre favori."
 harem_events.2.t:0 "Kılıç Alayı"
 harem_events.2.d:0 "Une cérémonie de couronnement ottoman est la chose la plus grandiose que beaucoup verront de leur vivant, et le couronnement de [Root.Monarch.GetName] ne fait pas exception. Cependant, alors que l'Épée d'Osman est ceinte sur [Root.Monarch.GetName] par le Chérif de Konya, nos vizirs l'observent avec une certaine appréhension. [Root.Monarch.GetSheHeCap] n'était jamais le candidat le plus probable et n'aurait probablement jamais accédé au trône si un favori clair avait existé.\nCertains iraient jusqu'à dire que c'est [Root.Monarch.GetHerHis] médiocrité qui a permis à [Root.Monarch.GetName] de triompher. Les hommes de plus grande envergure ne l'ont jamais considéré comme une menace et d'autres espéraient contrôler l'Empire à travers [Root.Monarch.GetHerHim]. Notre nouveau [Root.Monarch.GetTitle] a clairement démontré une chose : lorsque le besoin s'en fait sentir, [Root.Monarch.GetSheHe] n'hésitera pas à planter un poignard dans le dos de ceux qui lui font confiance."
 harem_events.2.a:0 "Longue vie au [Root.Monarch.GetTitle] !"
 harem_events.2.a.tt:0 "Seul le temps dira quel genre de souverain sera §Y[Root.Monarch.GetName]§!."
 harem_events.3.t:0 "Sancağa Çıkma"
 harem_events.3.d:0 "Notre favori et héritier, [Root.Heir.GetName], est jeune et a encore beaucoup à apprendre sur la vie et sur la manière d'être un bon souverain. La plupart de nos vizirs estiment qu'il est de notre devoir de maintenir notre tradition dynastique de nommer nos fils gouverneurs de petites provinces. Ainsi, ils peuvent apprendre ce que signifie être un souverain. En attribuant des provinces suffisamment puissantes, nous pouvons également réduire le risque d'une future lutte de succession. [sancaga_cikma_province.GetName] a servi de gouvernorat de ce type par le passé et conviendrait probablement très bien à [Root.Heir.GetName].\nD'autres, dont notre mère, la Valide Sultan, estiment que le jeune [Root.Heir.GetName] bénéficierait davantage d'une éducation entre les murs du Harem Impérial, où [Root.Heir.GetSheHe] aura un accès constant à de bons précepteurs et pourra être supervisé par ceux qui le connaissent. De cette façon, [Root.Heir.GetSheHe] serait également loin de tout endroit où [Root.Heir.GetSheHe] pourrait développer des ambitions politiques prématurées."
 harem_events.3.a:0 "Gouverner [sancaga_cikma_province.GetName] lui fera le plus grand bien."
 harem_events.3.a.tt:0 "§Y[Root.Heir.GetName]§! recevra le plein contrôle de §Y[sancaga_cikma_province.GetName]§! et si tout se passe bien, il pourrait revenir avec des capacités de gouvernement améliorées."
 harem_events.3.b:0 "Le Harem Impérial est l'endroit parfait pour un jeune [Root.Heir.GetWomanMan] !"
 harem_events.3.b.tt:0 "§Y[Root.Heir.GetName]§! restera à §Y[Root.Capital.GetCapitalName]§! où c'est plus sûr à tous égards, mais n'aura pas l'occasion d'améliorer ses capacités de gouvernement."
 heir_in_training:0 "Héritier gouverneur"
 desc_heir_in_training:0 "Nous avons confié cette province à notre héritier pour qu'il la gouverne, espérant que cette expérience renforcera ses capacités de souverain à l'avenir."
 harem_events.4.t:0 "Sancağa Çıkma"
 harem_events.4.d:0 "[Root.Heir.GetName] est revenu de son temps en tant que gouverneur. Selon [Root.Heir.GetHerselfHimself], l'expérience l'a enrichi de bien des manières et [Root.Heir.GetSheHe] est plus que jamais prêt à succéder lorsque Dieu rappellera notre vénéré [Root.Monarch.GetTitle]. Si notre favori a effectivement appris quelque chose, cela ne nous est cependant pas très apparent, et au Harem, des rumeurs circulent selon lesquelles la seule façon dont [Root.Heir.GetName] se serait enrichi serait en remplissant ses poches lors de la collecte des revenus locaux."
 harem_events.4.a:0 "Tout va bien alors."
 harem_events.4.a.tt:0 "§Y[Root.Heir.GetName]§! est plus âgé, plus sage, mais généralement la même personne qu'avant son départ."
 harem_events.5.t:0 "La tentative de [Root.Heir.GetName] pour le trône"
 harem_events.5.da:0 "Agir comme gouverneur de province peut sans aucun doute enseigner de précieuses leçons à ceux qui régneront un jour sur un empire. Cela peut aussi donner un premier goût du vrai pouvoir. Des rumeurs de maladie se propageant au palais de Topkapi ont dû atteindre [Root.Heir.GetName] et plutôt que d'enquêter ou de prier pour notre santé, [Root.Heir.GetSheHe] a décidé que c'était une excellente occasion de saisir ce qui allait de toute façon lui revenir un jour."
 harem_events.5.db:0 "Agir comme gouverneur de province peut sans aucun doute enseigner de précieuses leçons à ceux qui régneront un jour sur un empire. Cela peut aussi donner un premier goût du vrai pouvoir. Des rumeurs de maladie se propageant au Palais Royal ont dû atteindre [Root.Heir.GetName] et plutôt que d'enquêter ou de prier pour notre santé, [Root.Heir.GetSheHe] a décidé que c'était une excellente occasion de saisir ce qui allait de toute façon lui revenir un jour."
 harem_events.5.a:0 "Trahison !"
 harem_events.6.t:0 "Les années à [heir_governorship_province.GetName]"
 harem_events.6.d:0 "[Root.Heir.GetName] est revenu à [Root.Capital.GetCapitalName] après son mandat de gouverneur de [heir_governorship_province.GetName]. [Root.Heir.GetSheHeCap] affirme que ces années lui ont appris bien des choses sur ce que signifie diriger un gouvernement et sur le fonctionnement de notre système provincial au niveau local. Durant [Root.Heir.GetHerHis] absence de [Root.Capital.GetCapitalName], [Root.Heir.GetSheHe] a eu amplement le temps de commander les troupes locales, de superviser l'administration et de jongler avec les potentats locaux."
 harem_events.6.a:0 "Excellent..."
 harem_events.7.t:0 "La peur du cordon de soie"
 harem_events.7.d:0 "Alors que les détails pratiques de la succession de [Root.Monarch.GetName] sont en cours de règlement, des nouvelles nous sont parvenues de [enthronement_or_death.GetName]. Il semble que l'un des frères de Sa Majesté Impériale [Root.Monarch.GetHerHis] préférerait mourir en combattant plutôt que de risquer les procédures traditionnelles d'une succession perdue. Son nom a été lu lors des prières du vendredi à [enthronement_or_death.GetName] et en peu de temps, une armée a été rassemblée pour renverser notre nouveau [Root.Monarch.GetTitle]."
 harem_events.7.a:0 "Tuez-les. Tuez-les tous."
 harem_events.8.t:0 "Mort de la Valide Sultan"
 harem_events.8.da:0 "Depuis qu'[Root.Monarch.GetSheHe] était un jeune Şehzade au Harem Impérial, [Root.Monarch.GetName] a toujours eu [Root.Monarch.GetHerHis] mère à ses côtés. Elle a offert conseils et protection tout au long de [Root.Monarch.GetHerHis] carrière et lorsqu'[Root.Monarch.GetSheHe] a accédé au trône, elle est restée l'une de [Root.Monarch.GetHerHis] plus proches confidentes et conseillères les plus influentes. Bien qu'elle fût désormais une femme très âgée, la nouvelle de sa mort a été un coup terrible pour notre [Root.Monarch.GetTitle] qui a perdu d'un seul coup une bonne amie, une conseillère et [Root.Monarch.GetHerHis] mère."
 harem_events.8.db:0 "Depuis qu'il était un jeune Şehzade au Harem Impérial, [Root.Monarch.GetName] a toujours eu sa mère à ses côtés. Elle a offert conseils et protection tout au long de [Root.Monarch.GetHerHis] carrière et lorsqu'[Root.Monarch.GetSheHe] a accédé au trône, elle est restée l'une de ses plus proches confidentes et conseillères les plus influentes. La nouvelle de sa mort prématurée a été une surprise et un coup terrible pour notre [Root.Monarch.GetTitle] qui a perdu bien trop tôt une bonne amie, une conseillère et [Root.Monarch.GetHerHis] mère."
 harem_events.8.dc:0 "Depuis qu'[Root.Monarch.GetSheHe] était un jeune Şehzade au Harem Impérial, [Root.Monarch.GetName] a toujours eu [Root.Monarch.GetHerHis] mère à ses côtés. Elle a offert conseils et protection tout au long de [Root.Monarch.GetHerHis] carrière et lorsqu'[Root.Monarch.GetSheHe] a accédé au trône, elle est restée l'une de ses plus proches confidentes et conseillères les plus influentes. La nouvelle de sa mort prématurée est un coup terrible pour notre [Root.Monarch.GetTitle] qui a perdu d'un seul coup une bonne amie, une conseillère et [Root.Monarch.GetHerHis] mère."
 harem_events.8.a:0 "L'Empire la pleurera pendant trois jours."
 harem_events.8.b:0 "Nous devons consacrer des terres à une fondation caritative en sa mémoire !"
 waqf_for_dead_valide_sultan:0 "Fondation en mémoire de la Valide Sultan"
 desc_waqf_for_dead_valide_sultan:0 "Nous avons consacré les revenus de plusieurs sources dans cette province pour soutenir une mosquée et une soupe populaire en mémoire de notre Mère Impériale, la Valide Sultan."
 harem_events.9.t:0 "Rites de passage"
 harem_events.9.d:0 "Comme les Sultans d'antan, [Root.Heir.GetName] espère se faire un nom en tant que conquérant et [Root.Monarch.GetTitle] qui mènera l'Empire depuis le dos d'un cheval. Comme [Root.Monarch.GetName] est encore en bonne santé, et comme nous n'avons pas permis à notre héritier de prendre réellement le commandement sur le terrain, la réalisation de ce rêve reste incertaine. La situation en est arrivée au point où [Root.Heir.GetName] est ridiculisé par les autres Şehzade et [Root.Heir.GetHerHis] mère implore [Root.Monarch.GetName] de lui confier un commandement.\nCe n'est pas une demande déraisonnable, bien que l'on puisse s'interroger sur les motivations de ceux qui tentent de pousser notre favori à risquer sa vie et ses membres."
 harem_events.9.a:0 "Cela lui fera du bien."
 harem_events.9.b:0 "Le Harem est bien plus sûr."
 harem_events.10.t:0 "Trahison au sein de la famille"
 harem_events.10.d:0 "On nous rapporte que le fils bien-aimé et préféré, [Root.Heir.GetName], comploterait contre [Root.Heir.GetHerHis] père et viserait à renverser l'État. Notre consort de confiance et la plus proche, la Haseki Sultan, nous implore d'extirper ce cancer de notre corps et de faire assassiner [Root.Heir.GetName].\nIl ne fait aucun doute que la Haseki Sultan parle dans son propre intérêt en cette affaire : [Root.Heir.GetName] n'est pas son fils, mais son remplaçant le sera très probablement. Cependant, nos propres ministres parlent également de la trahison de [Root.Heir.GetName], et il pourrait représenter une menace très réelle."
 harem_events.10.a:0 "[Root.Heir.GetName] doit mourir..."
 harem_events.10.a.tt:0 "Envoyer des assassins tuer §Y[Root.Heir.GetName]§!.\nS'ils échouent, cela provoquera une révolte quelle que soit sa culpabilité."
 harem_events.10.b:0 "Convoquer [Root.Heir.GetName] pour qu'il se défende."
 harem_events.10.b.tt:0 "Si les rumeurs sont vraies, cela donnera à §Y[Root.Heir.GetName]§! le temps de rassembler une armée plus importante."
 harem_events.10.c:0 "Je n'écouterai pas de tels mensonges !"
 harem_events.10.c.tt:0 "§Y[Root.Consort.GetName]§! tombe en disgrâce.\nSi les rumeurs sont vraies, cela donnera à §Y[Root.Heir.GetName]§! le temps de rassembler une armée plus importante."
 harem_events.11.t:0 "[Root.Heir.GetName] est innocent"
 harem_events.11.d:0 "Ayant eu le temps de présenter sa défense, [Root.Heir.GetName] a pleinement convaincu notre [Root.Monarch.GetTitle] de son innocence et restera le plus favori de nos héritiers. Toute cette épreuve a renforcé sa position à la cour et auprès du public de [Root.Capital.GetCapitalName]."
 harem_events.11.a:0 "On ne me berne pas si facilement."
 harem_events.12.t:0 "Le complot de [Root.Heir.GetName]"
 harem_events.12.d:0 "Le temps accordé par notre indécision a suffi à [Root.Heir.GetName] pour rassembler l'armée rebelle qu'il avait prévue. Alors que le soleil se couche le septième jour après sa découverte, une armée marche vers [Root.Capital.GetCapitalName]."
 harem_events.12.a:0 "Oui, mon fils ?"
 harem_events.13.t:0 "Le destin d'un Vali Ahad"
 harem_events.13.d:0 "Les assassins que nous avons envoyés tuer le Vali Ahad sont revenus après avoir accompli leur mission avec succès. Nous ne saurons jamais s'il était coupable de trahison ou non."
 harem_events.13.a:0 "Une grande tragédie."
 harem_events.14.t:0 "Le destin d'un Vali Ahad"
 harem_events.14.d:0 "Les assassins que nous avons envoyés tuer le Vali Ahad ont échoué dans leur mission. Notre ancien héritier a fui la capitale avec un groupe de ses plus proches partisans et se prépare maintenant à lutter pour leur survie."
 harem_events.14.a:0 "Une grande tragédie."
 harem_events.15.t:0 "Prince-gouverneur à la frontière"
 harem_events.15.da:1 "Fidèles à notre héritage turc, nous avons permis à plusieurs Şehzade de servir comme gouverneurs de diverses provinces à travers notre empire. La guerre actuelle contre les infidèles [enemy_neighbor_ottomans.GetAdjective] a permis au prince-gouverneur de [ottoman_prince_here.GetName] de vraiment prouver sa valeur en tant que commandant militaire et Ghazi. Selon les rapports, il a déployé de grands efforts pour vaincre les troupes ennemies dans sa région, portant la bataille de l'autre côté de la frontière. Les fidèles affluent sous ses bannières et l'élite militaire a commencé à le remarquer et pourrait bien finir par le soutenir lors d'une future lutte de succession."
 harem_events.15.db:0 "Fidèles à notre héritage turc, nous avons permis à plusieurs Şehzade de servir comme gouverneurs de diverses provinces à travers notre empire. La guerre actuelle contre les [enemy_neighbor_ottomans.GetAdjective] a permis au prince-gouverneur de [ottoman_prince_here.GetName] de vraiment prouver sa valeur en tant que commandant militaire. Selon les rapports, il a déployé de grands efforts pour vaincre les troupes ennemies dans sa région, portant la bataille de l'autre côté de la frontière. Les recrues affluent sous ses bannières et l'élite militaire a commencé à le remarquer et pourrait bien finir par le soutenir lors d'une future lutte de succession."
 harem_events.15.a:0 "Il a prouvé qu'il mérite d'être notre nouveau favori."
 harem_events.15.b:0 "Il a prouvé qu'il est un vrai fils d'Osman."
 harem_events.15.b.tt:0 "La position de §Y[Root.Heir.GetName]§! est légèrement affaiblie car son opposition devient plus forte."
 harem_events.16.t:0 "Soutien de la Valide Sultan"
 harem_events.16.d:0 "Notre désignation de [Root.Heir.GetName] comme héritier préféré et Vali Ahad a été aussi populaire que l'on pouvait s'y attendre parmi les autres princes impériaux et leurs mères. Malgré tout, [Root.Heir.GetHerHis] ascension a été bien moins fluide qu'on aurait pu l'espérer, ce dont beaucoup blâmeraient notre Haseki Sultan, [Root.Consort.GetName].\nCependant, déterminée à mettre fin à ces intrigues destructrices, la Valide Sultan, mère de Sa Majesté Impériale [Root.Monarch.GetHerHis] [Root.Monarch.GetHerselfHimself], est intervenue pour protéger [Root.Heir.GetName]."
 harem_events.16.a:0 "Merci, Mère !"
 harem_events.17.t:0 "Conflit entre [Root.Consort.GetName] et la Valide Sultan"
 harem_events.17.d:0 "La consort préférée de [Root.Monarch.GetName], la Haseki Sultan, et [Root.Monarch.GetHerHis] mère, la Valide Sultan, sont des femmes de grande influence et d'ambition. Toutes deux contrôlent également leur propre faction au sein du Harem Impérial et, bien qu'elles prétendent toutes deux avoir les meilleurs intérêts de [Root.Monarch.GetName] à cœur, un affrontement de volontés a toujours été inévitable. [Root.Consort.GetName] a manœuvré pour qu'un de ses fils prenne la place de [Root.Heir.GetName] comme héritier, mais la Valide Sultan n'en veut rien savoir. Les deux femmes ont investi un prestige considérable dans ce conflit."
 harem_events.17.a:0 "Prendre le parti de la mère du Sultan."
 harem_events.17.a.tt:0 "Prendre le parti de la Valide Sultan est attendu de nous et apportera du prestige. §Y[Root.Consort.GetName]§! sera toutefois déjouée, et une nouvelle consort prendra sa place comme Haseki Sultan."
 harem_events.17.b:0 "Prendre le parti de [Root.Consort.GetName]."
 harem_events.17.b.tt:0 "En allant contre l'avis de la Valide Sultan, §Y[Root.Monarch.GetName]§! perdra son soutien."
 harem_events.17.c:0 "Éviter de prendre parti."
 harem_events.17.c.tt:0 "Le conflit s'envenimera et affaiblira la légitimité de notre héritier favori actuel."
 harem_events.18.t:0 "Ambitions de la Valide Sultan"
 harem_events.18.d:0 "Comme beaucoup de Sultans avant [Root.Monarch.GetHerHim], [Root.Monarch.GetName] entretient un lien très étroit avec [Root.Monarch.GetHerHis] mère. Qu'il plaise à Dieu, la Valide Sultan est une puissante alliée, amie et confidente pour notre [Root.Monarch.GetTitle] et pour refléter cela, une allocation très généreuse lui a été accordée. Cet argent, outre ses besoins personnels, elle l'a utilisé pour le bien de l'État. Notre mère ne s'en contente pas cependant, et a demandé un arrangement encore plus généreux qui lui permettrait de financer d'ambitieux projets de construction à [Root.Capital.GetCapitalName] même."
 harem_events.18.a:0 "Tout ce que vous désirez."
 harem_events.18.b:0 "Elle fait un excellent travail mais doit connaître ses limites."
 architectural_work_of_valide_sultan:0 "Financement architectural de la Valide Sultan"
 desc_architectural_work_of_valide_sultan:0 "La Valide Sultan porte un intérêt particulier au développement de cette ville comme métropole digne de notre empire."
 harem_events.19.t:0 "Haseki Sultan influente"
 harem_events.19.d:0 "[Root.Owner.Consort.GetName] n'a pas seulement conquis le cœur du [Root.Owner.Monarch.GetTitle], c'est aussi une femme dynamique à part entière. Son travail constant pour renforcer le royaume de [Root.Owner.Monarch.GetName] est une bénédiction tant pour [Root.Owner.Monarch.GetHerHim] que pour [Root.Owner.Monarch.GetHerHis] sujets.\nRécemment, plusieurs projets caritatifs financés par [Root.Owner.Consort.GetName] dans [Root.GetName] et ses environs ont fait s'épanouir toute la région."
 harem_events.19.a:0 "Quelle grande dame."
 charitable_work_of_haseki:0 "Œuvres caritatives de la Haseki Sultan"
 desc_charitable_work_of_haseki:0 "La Haseki Sultan a dépensé beaucoup pour des projets caritatifs dans cette région. Des aqueducs, des mosquées et des hôpitaux sont construits et les pauvres sont nourris. Toute la région prospère en conséquence."
 harem_events.20.t:0 "[Root.Consort.GetName] contestée"
 harem_events.20.d:0 "La Haseki Sultan n'est pas seulement la consort favorite du [Root.Monarch.GetTitle], elle est aussi la maîtresse du Harem Impérial et la femme la plus puissante de l'Empire après la Sultane Mère. Atteindre et conserver cette position est le rêve de chaque consort du harem.\nIl ne devrait donc pas surprendre qu'une jeune femme ambitieuse ait attiré l'attention du [Root.Monarch.GetTitle]..."
 harem_events.20.a:0 "Nous ne pourrions jamais abandonner [Root.Consort.GetName]."
 harem_events.20.b:0 "L'heure est venue, ma chère."
 harem_events.21.t:0 "Compétition pour le [Root.Monarch.GetTitle]"
 harem_events.21.d:0 "Comme [Root.Monarch.GetName] n'a pas encore désigné de favorite parmi ses consorts, chacune d'elles manœuvre pour prendre sa place légitime aux côtés du Sultan. Le Harem Impérial est un nid d'intrigues et actuellement, faire un choix éclairé pour le poste de Haseki Sultan, l'un des plus grands honneurs imaginables dans l'empire, semble quasi impossible. Heureusement, la mère de [Root.Monarch.GetName] a une poigne ferme sur la politique du Harem et a présenté à [Root.Monarch.GetName] une consort qu'elle estime être une bonne candidate."
 harem_events.21.a:0 "Excellent !"
 harem_events.21.b:0 "Je ferai mes propres choix, Mère..."
 harem_events.21.c:0 "Gardons nos options ouvertes."
 harem_events.22.t:0 "[Root.GetName] et les princes royaux"
 harem_events.22.d:1 "Comme le veut la coutume, certaines de nos provinces sont gouvernées par des princes impériaux afin qu'ils apprennent ce que signifie être souverain un jour. Il est également entendu que ces provinces peuvent servir de base de pouvoir lorsque viendra le moment de régler la succession. Cette lutte elle-même offre souvent amplement l'occasion d'éliminer les mauvais éléments.\nParfois, cependant, le processus peut être encore plus expéditif. Il semble qu'un de nos princes-gouverneurs ait réussi à détruire activement les ressources sous son contrôle. Si rien n'est fait rapidement, les revenus seront définitivement réduits. Malheureusement, cependant, le prince royal, bien qu'il ne soit pas notre favori, bénéficie du soutien de certains groupes influents à [Root.Owner.Capital.GetCapitalName], donc si nous devons le démettre de ses fonctions, il y aura des répercussions."
 harem_events.22.a:0 "Le remplacer immédiatement"
 harem_events.22.b:0 "Trouver un prétexte pour le rappeler ultérieurement."
 harem_events.23.t:0 "Jouer au roi"
 harem_events.23.d:0 "À mesure que notre [Root.Monarch.GetTitle] prend de l'âge, [Root.Monarch.GetHerHis] fils s'impatientent. Des rumeurs infondées circulent régulièrement sur [Root.Monarch.GetHerHis] santé déclinante et les diverses factions de la cour s'alignent avec les nombreux prétendants parmi [Root.Monarch.GetHerHis] fils. Pour l'un d'eux, la distance dans la supposée ligne de succession suffisait à risquer l'incertitude de la machine à rumeurs. À [revolter_prince.GetName], l'un des fils de [Root.Monarch.GetName] a pris les armes contre [Root.Monarch.GetHerHim]."
 harem_events.23.a:0 "Tuez-les tous."
 harem_events.24.t:0 "[Root.GetName] prospère"
 harem_events.24.d:0 "L'administration de [Root.GetName] a récemment été confiée à l'un de nos princes impériaux. Ce que nous n'avions pas prévu, c'est qu'il accomplirait tant de choses si rapidement. L'économie locale prospère et les centres urbains attirent de plus en plus de marchands et d'artisans. Les revenus semblent avoir été définitivement améliorés.\nCertains considéreraient cela comme un signe favorable ; peut-être devrions-nous élever ce fils au rang de nouveau favori ?"
 harem_events.24.a:0 "C'est exactement l'homme qu'il nous faut."
 harem_events.24.b:0 "Ne nous emballons pas."
 harem_events.24.b.tt:0 "Le succès de ce prince affaiblit la prétention au trône de notre héritier favori."
 #African Cults
 yemoja_cult:0 "Yemoja"
 yemoja_cult_desc:0 "Yemoja, la Mère des Eaux, est une puissante Orisha parmi le peuple Yoruba. Nous l'invoquons pour la protection des femmes, pour les voyages en mer et pour de bonnes récoltes."
 roog_cult:0 "Roog"
 roog_cult_desc:0 "Roog, le Créateur, est le nom et la force de la divinité pour le peuple Sérère. Par le sacrifice aux esprits ancestraux appelés Pangool, nous reconnaissons le caractère sacré de nos vies."
 nyame_cult:0 "Nyame"
 nyame_cult_desc:0 "Nyame, le Dieu du Ciel, a créé les premiers humains selon le peuple Ashanti. Les enfants de Nyame sont les Abosom, des dieux moindres et des ancêtres connus pour nous aider, nous les humains sur Terre ; ensemble, nous ne faisons qu'un."
 cwezi_cult:0 "Cwezi"
 cwezi_cult_desc:0 "Nous chérissons les traditions de l'ancien empire de Kitara. En entretenant de bonnes relations avec les esprits de la nature et en chérissant nos ancêtres Kitara et les lignées qui gardent leurs sanctuaires, nous pouvons être sûrs de conserver la faveur divine."
 central_african_ancestor_cult:0 "Mlira"
 central_african_ancestor_cult_desc:0 "Par les oracles, nous pouvons communiquer avec nos ancêtres défunts et les esprits de la nature. Ainsi, nous pouvons être sûrs d'honorer ceux qui nous ont précédés et d'acquérir de l'aide pour affronter l'environnement hostile qui nous entoure."
 mwari_cult:0 "Mwari"
 mwari_cult_desc:0 "Nous honorons le grand dieu Mwari qui a créé ce monde à partir de rien et qui fait trembler les montagnes quand il parle. Mwari est le seul vrai dieu et son oracle et sa voix sur cette terre est notre souverain."
 enkai_cult:0 "Enkai"
 enkai_cult_desc:0 "Nous suivons Enkai, l'Homme dans le Ciel, qui nous a envoyé son troupeau et fait de nous les propriétaires légitimes de tout le bétail du monde. En tant que maître des cieux, il est aussi celui qui nous bénit de la pluie, ou la retient dans sa fureur."
 waaq_cult:0 "Waaq"
 waaq_cult_desc:0 "Le grand Waaq est le Dieu du Ciel, maître suprême et tout-puissant de l'Univers. Ses disciples prient pour la paix et l'harmonie, croyant que l'équilibre dans le monde est vital pour éviter les catastrophes et les malheurs."
 zanahary_cult:0 "Zanahary"
 zanahary_cult_desc:0 "Zanahary le Créateur a une double nature : à la fois masculin et féminin, Lumière et Ténèbres, Ciel et Terre. Les Ancêtres sont les membres les plus importants de la communauté, car ils sont en contact direct avec le divin, tandis que les vivants ne sont qu'une extension temporaire."
 christianity_cult:0 "Christianisme"
 christianity_cult_desc:0 "Nous suivons les voies du dieu qui a mis Jésus-Christ sur cette terre pour mourir pour nos péchés."
 islam_cult:0 "Islam"
 islam_cult_desc:0 "Nous suivons les voies du grand dieu révélé au monde par son prophète Mahomet."
 buddhism_cult:0 "Buddhadharma"
 buddhism_cult_desc:0 "Nous suivons la voie du grand maître Gautama Bouddha qui a foulé cette terre il y a bien des siècles. Grâce à lui, nous avons appris les quatre nobles vérités, la renaissance et la nature de ce monde."
 dharmic_cult:0 "Sanatana Dharma"
 dharmic_cult_desc:0 "Nous suivons les voies anciennes des dieux hindous. D'eux, nous avons appris la réincarnation et comment organiser efficacement la société à travers les castes."
 south_central_american_cult:0 "Teotl"
 south_central_american_cult_desc:0 "On nous a enseigné les voies mystiques des dieux Teotl venus d'outre-mer. Par les sacrifices et l'observation attentive des cieux, nous pouvons influencer la vie sur cette terre et éviter la fin de la civilisation telle que nous la connaissons."
 norse_cult:0 "Freyja"
 norse_cult_desc:0 "Nous suivons la belle dame Freyja, déesse de l'amour, de la guerre et de la magie. Par son don de la magie seiðr, nous accomplirons de glorieuses conquêtes !"
 zoroastrian_cult:0 "Mazdéisme"
 zoroastrian_cult_desc:0 "Nous suivons les enseignements du prophète Zoroastre et honorons Ahura Mazda le sage. Qu'il plaise aux dieux, nous garderons les feux sacrés allumés pour l'éternité."
 jewish_cult:0 "Haymanot"
 jewish_cult_desc:0 "Nous croyons au Dieu unique et sommes les enfants d'Abraham. Au fil des siècles, nous avons perdu nos liens avec nos racines juives, mais nous embrassons à nouveau leurs traditions."
 CONFIRM_NEW_CULT_TITLE:0 "Embrasser un culte"
 CONFIRM_NEW_CULT_DESC:0 "En choisissant d'embrasser ce culte, nous acceptons ses traditions et consentons à suivre les exigences que cela impose à notre souverain."
 RV_NO_CULT:0 "Aucun culte sélectionné"
 RV_NO_CULT_TITLE:0 "Aucun culte actuel"
 RV_NO_CULT_DESC:0 "Votre religion vous permet de choisir quel culte suivre. Chaque culte aura ses propres effets et durera jusqu'au changement de monarque."
 RV_PICK_CULT:0 "Choisir un culte"
 RV_PICK_CULT_THIS:0 "Choisir $CULTNAME$"
 HAS_ADOPTED_CULT:0 "Suit le culte de $CULTNAME|Y$"
 NOT_HAS_ADOPTED_CULT:0 "Ne suit PAS le culte de $CULTNAME|Y$"
 HAS_UNLOCKED_CULT:0 "A débloqué le culte de $CULTNAME|Y$"
 NOT_HAS_UNLOCKED_CULT:0 "N'a PAS débloqué le culte de $CULTNAME|Y$"
 CHANGE_CULT_EFFECT:0 "Changer de culte pour $CULTNAME|Y$"
 UNLOCK_CULT_EFFECT:0 "Débloquer le culte de $CULTNAME|Y$"
 fetishist_flavor.1.t:0 "Les Anciens des Yoruba"
 fetishist_flavor.1.d:0 "Nos guerriers ont été intrigués par les habitants de cette région et leur profonde spiritualité : les anciens parlent ici d'équilibre intérieur, de respect de la Terre et de recherche de la transcendance. Un élément clé de leur croyance semble résider dans les Orishas, qui sont des esprits ou des manifestations de quelque chose d'apparenté au divin, toujours présents dans la vie quotidienne de leurs fidèles. On parle aussi de l'« Atunwa », la réincarnation au sein de la famille, et les cérémonies entourant les étapes de la vie sont tenues en haute vénération.\n\nCertaines des âmes égarées de nos armées ont commencé à méditer et à chercher du réconfort auprès de l'une des Orishas les plus vénérées : « Yemoja », la Mère des Eaux."
 fetishist_flavor.1.a:0 "Intéressant."
 fetishist_flavor.2.t:0 "Les Pangool vigilants"
 fetishist_flavor.2.d:0 "Nous avons rencontré un peuple qui vénère le dieu céleste « Roog », le Maître du Monde. Ils disent que Roog est le commencement et la fin de toutes choses, si sacré que les fidèles ne sont même pas autorisés à créer des images le représentant. Ils ne s'adressent pas non plus directement à ce Créateur dans leurs prières ou lorsqu'ils demandent une faveur divine. Au lieu de cela, ils se tournent vers d'anciens esprits appelés les Pangool, les médiateurs entre les mondes. Certains de ces Pangool seraient les esprits des ancêtres d'une personne, et être accepté par eux à la mort est ce qui permet de passer dans le « Jaaniiw », le royaume nocturne et demeure sacrée de l'âme.\n\nCertains de nos guerriers sont fascinés par les mythes de ce peuple : pour s'assurer qu'ils ne finiront pas comme des errants perdus entre les royaumes, ils se sont mis, comme le veut la tradition locale, à laisser des offrandes au pied de grands arbres en l'honneur des Pangool."
 fetishist_flavor.2.a:0 "Fascinant !"
 fetishist_flavor.3.t:0 "Les Enfants de l'Architecte"
 fetishist_flavor.3.d:0 "« Si j'en appelle un, je les appelle tous », peut-on entendre un fidèle dire. On les trouve souvent en prière près des rivières et des ruisseaux de la région, ces croyants en Nyame, le Père Céleste. Ils croient en l'âme des animaux et des plantes, aux « Abosom », des esprits moindres qui entourent notre plan d'existence, et ils communiquent avec leurs ancêtres par des rituels ornés.\n\nSurtout, cette société semble être composée d'un peuple à forte communauté. Lorsqu'ils relatent les exploits de leurs ancêtres, ils parlent parfois d'eux-mêmes comme d'un tout : certains de nos érudits attribuent cette particularité à une erreur de traduction, tandis que d'autres soutiennent que ces fidèles se voient comme quelque chose de plus grand qu'un individu, comme partie d'un esprit commun, particulièrement au sein de leur propre famille. « Ils sont comme un crocodile à deux têtes, avec un seul estomac : ils ne se battent pas entre eux pour la nourriture », suggèrent nos conseillers."
 fetishist_flavor.3.a:0 "Intrigant."
 fetishist_flavor.4.t:0 "L'Avenir du [Root.Monarch.GetTitle]"
 fetishist_flavor.4.d.a:1 "En préparation des batailles à venir, le [Root.Monarch.GetTitle] est récemment allé voir [Root.Monarch.GetHerHis] Babalawo. Le père des mystères possède la sagesse de l'Orunmila et tout aperçu du destin du [Root.Monarch.GetTitle], [Root.Monarch.GetHerHis] « Ori », est toujours le bienvenu. Le devin a cependant laissé [Root.Monarch.GetName] perplexe, car [Root.Monarch.GetSheHe] s'est vu dire que [Root.Monarch.GetHerHis] héritier [Root.Heir.GetName] causerait d'une manière ou d'une autre une mort prématurée au [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Une bataille ? Du poison ? Un accident ?\n\n« Lequel sera-ce ? » a exigé de savoir le [Root.Monarch.GetTitle], mais les signes n'étaient pas clairs : traiter cette affaire est désormais un choix de la plus haute délicatesse."
 fetishist_flavor.4.d.b:1 "En préparation des batailles à venir, le [Root.Monarch.GetTitle] est récemment allé voir [Root.Monarch.GetHerHis] voyant. L'ancien mystérieux possède une grande sagesse et tout aperçu du destin du [Root.Monarch.GetTitle] est toujours le bienvenu. Le devin a cependant laissé [Root.Monarch.GetName] perplexe, car [Root.Monarch.GetSheHe] s'est vu dire que [Root.Monarch.GetHerHis] héritier [Root.Heir.GetName] causerait d'une manière ou d'une autre une mort prématurée au [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Une bataille ? Du poison ? Un accident ?\n\n« Lequel sera-ce ? » a exigé de savoir le [Root.Monarch.GetTitle], mais les signes n'étaient pas clairs : traiter cette affaire est désormais un choix de la plus haute délicatesse."
 fetishist_flavor.4.a:0 "Faire éliminer l'héritier."
 fetishist_flavor.4.a.tt:0 "Les guerriers seront impressionnés par cette décision."
 fetishist_flavor.4.b:0 "[Root.Heir.GetName] n'est qu'un enfant. C'est absurde."
 fetishist_flavor.4.b.tt:0 "Le peuple sera peu impressionné par l'indifférence de son souverain."
 fetishist_flavor.4.c:0 "Faire éliminer l'héritier [Root.Heir.GetName]."
 fetishist_flavor.4.d:0 "C'est absurde."
 fetishist_flavor.5.t:0 "La Route depuis [nonchalant_neighbor.Capital.GetCapitalName]"
 fetishist_flavor.5.d.a:0 "Un cousin du [Root.Monarch.GetTitle] est décédé. La lettre qui nous est parvenue décrit comment une embuscade de bandits s'est abattue sur l'escorte des hommes d'État en voyage et comment ils ont tous été précipités d'une falaise sur le chemin du retour après une visite à [nonchalant_neighbor.Capital.GetCapitalName], dans notre nation voisine de [nonchalant_neighbor.GetName]. Les quelques possessions qui ont pu être récupérées ont été envoyées à [Root.Capital.GetCapitalName], mais le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est bouleversé par la mort de [Root.Monarch.GetHerHis] parent favori. Pour aggraver les choses, la lettre de [nonchalant_neighbor.GetName] ne dit rien sur la question de savoir si une cérémonie funéraire appropriée a été envisagée ou non.\n\nNous souhaitent-ils du mal avec cet Oku igbe, une mort dans la brousse, pour le parent du [Root.Monarch.GetTitle] ?"
 fetishist_flavor.5.d.b:0 "Un cousin du [Root.Monarch.GetTitle] est décédé. La lettre qui nous est parvenue décrit comment une embuscade de bandits s'est abattue sur l'escorte des hommes d'État en voyage et comment ils ont tous été précipités d'une falaise sur le chemin du retour après une visite à [nonchalant_neighbor.Capital.GetCapitalName], dans notre nation voisine de [nonchalant_neighbor.GetName]. Les quelques possessions qui ont pu être récupérées ont été envoyées à [Root.Capital.GetCapitalName], mais le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est bouleversé par la mort de [Root.Monarch.GetHerHis] parent favori. Pour aggraver les choses, la lettre de [nonchalant_neighbor.GetName] ne dit rien sur la question de savoir si une cérémonie funéraire appropriée a été envisagée ou non.\n\nLe cher cousin renaîtra bientôt, soit dans le monde visible, soit dans l'invisible, mais la pensée que cette bonne femme n'ait pas reçu les rites funéraires appropriés tourmente le [Root.Monarch.GetTitle] qui reste seul, méditant sur [Root.Monarch.GetHerHis] mortalité."
 fetishist_flavor.5.d.c:0 "Un cousin du [Root.Monarch.GetTitle] est décédé. La lettre qui nous est parvenue décrit comment une embuscade de bandits s'est abattue sur l'escorte des hommes d'État en voyage et comment ils ont tous été précipités d'une falaise sur le chemin du retour après une visite à [nonchalant_neighbor.Capital.GetCapitalName], dans notre nation voisine de [nonchalant_neighbor.GetName]. Les quelques possessions qui ont pu être récupérées ont été envoyées à [Root.Capital.GetCapitalName], mais le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est bouleversé par la mort de [Root.Monarch.GetHerHis] parent favori. Pour aggraver les choses, la lettre de [nonchalant_neighbor.GetName] ne dit rien sur la question de savoir si une cérémonie funéraire appropriée a été envisagée ou non.\n\nLe cher cousin, ayant traversé le voile des vivants, est désormais plus proche de Nyame. Pourtant, la pensée que cette bonne femme n'ait pas reçu les rites funéraires appropriés tourmente le [Root.Monarch.GetTitle]."
 fetishist_flavor.5.d.d:0 " "
 fetishist_flavor.5.a:0 "Nous devons récupérer le corps et voir aux rites."
 fetishist_flavor.5.a.tt:0 "Nous envoyons nos remerciements, engageons des hommes pour s'aventurer dans [nonchalant_neighbor.GetName] et payons nous-mêmes les cérémonies requises. Que [Root.GetCult] donne force au [Root.Monarch.GetTitle]."
 fetishist_flavor.5.b:0 "Cette moquerie de notre foi ne restera pas impunie."
 fetishist_flavor.5.b.tt:0 "Les dirigeants de [nonchalant_neighbor.GetName] recevront une lettre courroucée."
 fetishist_flavor.5.c:0 "Ce sont des temps difficiles pour nous tous."
 fetishist_flavor.5.c.tt:0 "Nous laissons passer. [nonchalant_neighbor.GetName] recevra une lettre avec nos remerciements pour nous avoir informés des événements."
 fetishist_flavor.6.t:0 "La Colère du [From.Monarch.GetTitle]"
 fetishist_flavor.6.d.a:0 "Nous avons reçu une lettre belliqueuse de notre nation voisine [From.GetName], apparemment en réponse à nos diplomates informant le [From.Monarch.GetTitle] d'une tragique attaque de bandits impliquant des hommes d'État [From.GetAdjective]. Il semble que l'une des victimes de la calamité était un parent du [From.Monarch.GetTitle] et [From.Monarch.GetSheHe] est outré que les informations transmises n'aient fait aucune mention des rites sacrés à accomplir pour [From.Monarch.GetHerHis] parent.\n\nLe culte de [From.GetCult] exige plus que ce que nos ambassadeurs avaient supposé."
 fetishist_flavor.6.d.b:0 "Nos voisins de [From.GetName] nous ont envoyé un avertissement hostile en réponse à des informations que nous leur avons récemment transmises concernant une attaque de bandits contre des hommes d'État [From.GetAdjective]. La racine des mauvais sentiments semble provenir de quelque chose concernant des rites funéraires non correctement accomplis, ou peut-être la récupération des corps non effectuée ? C'est difficile à dire à partir du fouillis d'insultes qui compose la lettre. Le culte de [From.GetCult] est apparemment assez compliqué... ?"
 fetishist_flavor.6.a:0 "Cela ne nous concerne pas."
 fetishist_flavor.6.a.tt:0 "Enfants de [From.GetCult] ou non, nous ne pouvons pas nous soucier de chaque petite chose en ce monde."
 fetishist_flavor.6.b:0 "Cela ne nous concerne pas."
 fetishist_flavor.6.b.tt:0 "Les enfants de [From.GetCult] ne sont pas si différents de nous, mais nous ne pouvons pas céder à tous leurs caprices."
 fetishist_flavor.6.c:0 "On ne peut pas satisfaire tout le monde."
 fetishist_flavor.7.t:0 "La Mare devient Fleuve"
 fetishist_flavor.7.d.a:0 "[Root.Monarch.GetName] est plus en paix depuis que les funérailles de [Root.Monarch.GetHerHis] cousin ont été accomplies. La cérémonie a même été suivie par des diplomates de [nonchalant_neighbor.GetName]. Soulagé de savoir que [Root.Monarch.GetHerHis] parent repose en sécurité dans les bras de la déesse Yemoja, les chants résonnent encore dans l'esprit du [Root.Monarch.GetTitle].\n\n« Mais quand tu vois une antilope Kob sur le chemin de la ferme,\nQuand tu vois l'antilope Kob sur le chemin de la rivière –\nLaisse tes flèches dans le carquois,\nEt laisse les morts partir en paix. »"
 fetishist_flavor.7.d.b:0 "[Root.Monarch.GetName] est plus en paix depuis que les funérailles de [Root.Monarch.GetHerHis] cousin ont été accomplies. La cérémonie a même été suivie par des diplomates de [nonchalant_neighbor.GetName] et le fait de savoir que le parent du [Root.Monarch.GetTitle] a entamé en toute sécurité la prochaine étape de son voyage vers le monde des ombres apporte un grand réconfort au [Root.Monarch.GetTitle].\n\n« Tu seras remémoré pendant des générations, mon ami », dit-[Root.Monarch.GetSheHe], avant de se tourner pour sourire au Dieu du Ciel."
 fetishist_flavor.7.d.c:0 "[Root.Monarch.GetName] est plus en paix depuis que les funérailles de [Root.Monarch.GetHerHis] cousin ont été accomplies. La cérémonie élaborée a même été suivie par des diplomates de [nonchalant_neighbor.GetName]. Le fait de savoir que le parent du [Root.Monarch.GetTitle] a reçu tous les rituels nécessaires pour maintenir l'équilibre avec les esprits a apporté un grand réconfort au [Root.Monarch.GetTitle].\n\nLe soir, une légère brise traverse les appartements de [Root.Monarch.GetName], le faisant sourire : le Dieu du Ciel a bien des façons de manifester sa présence. « Nous sommes donc toujours ensemble », dit-[Root.Monarch.GetSheHe], avant de s'endormir."
 fetishist_flavor.7.a:0 "Bénis soient les défunts."
 fetishist_flavor.7.a.tt:0 "Toutes les provinces fétichistes possédées reçoivent « §YSérénité de la Foi§! » pendant cinq ans, donnant les effets suivants :\nMoral des armées : §G+15,0 %§!\nTemps de recrutement : §G-20,0 %§!"
 fetishist_flavor.8.t:0 "Les Fils de Nyame"
 fetishist_flavor.8.d.a:0 "Les habitants de [tormented_province.GetName] se trouvent dans un état de confusion après que l'un de leurs membres les plus estimés de la société est tombé malade. Alitée, une ancienne du village influente n'a pas bougé de son sommeil depuis plus d'une semaine. Nos conseillers suggèrent d'encourager les habitants à prier, mais vers qui les âmes égarées devraient-elles se tourner ? D'un côté, nous avons Tano, le dieu de la rivière et fils de Nyame, qui, dit-on, court à vos côtés contre la Mort dans les dernières heures de votre vie. D'un autre côté, Anansi le Rusé pourrait peut-être être convaincu de prêter son aide également, en échange de quelque chose de valeur ?"
 fetishist_flavor.8.a:0 "Ils devraient se tourner vers Tano, la divinité de la rivière."
 fetishist_flavor.8.a.tt:0 "Il n'y a aucune garantie que la prière aura un effet.\n"
 fetishist_flavor.8.b:0 "Ils devraient se tourner vers Anansi le Rusé."
 fetishist_flavor.8.b.tt:0 "Le peuple pourrait au moins se sentir mieux après avoir accompli tous les sacrifices possibles.\n"
 fetishist_flavor.9.t:0 "Le Pangool rampant"
 fetishist_flavor.9.d:0 "Une rumeur de [heathen_province.GetName] raconte qu'un serpent géant s'est installé dans un arbre, en plein milieu d'une place de village. Bien que les habitants aient été alarmés au début, l'animal n'a fait aucune tentative de blesser quiconque et a au contraire gagné un certain statut social parmi les habitants, qui ont commencé à lui donner des petits noms... Finalement, une femme sage de la région a déclaré le serpent sacré, affirmant que la créature est certainement un esprit ayant pris la forme d'un serpent, ce qui a encouragé les gens à lui apporter sacrifices et nourriture."
 fetishist_flavor.9.a:0 "Le Pangool est là pour nous aider."
 fetishist_flavor.10.a:0 "D'accord."
 fetishist_flavor.11.t:0 " "
 fetishist_flavor.11.a:0 "D'accord."
 the_will_of_tano:0 "La Volonté de Tano"
 desc_the_will_of_tano:0 "Une ancienne du village s'est miraculeusement remise de ce qui semblait être une maladie mortelle. L'événement a revigoré les guerriers de la province."
 the_whim_of_anansi:0 "Le Caprice d'Anansi"
 desc_the_whim_of_anansi:0 "Une ancienne du village s'est miraculeusement remise de ce qui semblait être une maladie mortelle. L'événement a revigoré les travailleurs de la province."
 serenity_of_faith:0 "Sérénité de la Foi"
 desc_serenity_of_faith:0 "Le souverain de cette terre est un fervent croyant, inspirant son peuple à la grandeur."
 decisive_ruler:0 "Souverain décisif"
 desc_decisive_ruler:0 "Le peuple est impressionné par la dévotion de son souverain envers les croyances traditionnelles."
 nonchalant_ruler:0 "Souverain nonchalant"
 desc_nonchalant_ruler:0 "Le peuple est peu impressionné par le désintérêt de son souverain envers les croyances traditionnelles."
 presence_of_the_ancestors:0 "Présence des Ancêtres"
 desc_presence_of_the_ancestors:0 "Les habitants d'ici ont été témoins de ce qu'ils interprètent comme un signe des Pangool."
 fetishist_flavor.101.t:0 "Les Héros Cwezi de Kitara"
 fetishist_flavor.101.d:0 "Il fut un temps où les Cwezi régnaient sur ces terres, car leur Empire, Kitara, englobait tout ce qui est connu des hommes. Dans nos voyages, nous avons rencontré un nombre croissant de peuples qui prétendent être les héritiers de Kitara et chérissent ces héros d'antan. Les esprits existent toujours dans le monde qui nous entoure, dans la nature et dans nos esprits, et certains peuvent communiquer avec les Cwezi par l'intermédiaire d'oracles et de devins. Dans leurs terres, nous avons croisé des groupes de prêtresses itinérantes qui ont le pouvoir de canaliser ces esprits et, par eux, la maladie, l'infertilité et le malheur peuvent être atténués. Il y a ceux qui consacrent toute leur vie à ces ancêtres disparus et à leurs sanctuaires. Toute autorité temporelle doit découler de liens avec le passé et nul ne peut être apte à gouverner sans un lien direct avec les esprits Cwezi."
 fetishist_flavor.101.a:0 "Intéressant."
 fetishist_flavor.102.t:0 "Le Culte de Mlira"
 fetishist_flavor.102.d:0 "Nous avons rencontré un peuple qui vénère et adore ses propres ancêtres comme des dieux. Par l'intermédiaire de puissants oracles, ils peuvent constamment rester en contact avec leurs prédécesseurs et, en s'assurant que leurs tombes et sanctuaires sont en bon état, ils peuvent être certains que les ancêtres eux-mêmes ont le pouvoir de continuer à les protéger."
 fetishist_flavor.102.a:0 "Je veux en apprendre davantage..."
 fetishist_flavor.103.t:0 "Le Créateur Suprême"
 fetishist_flavor.103.d:0 "« Au commencement, il n'y avait rien, puis Mwari créa le monde et fit sortir l'homme d'un trou dans le sol. Mwari créa les montagnes et Mwari peut les faire trembler de sa voix. Mwari alluma les feux connus des hommes et Mwari fait tomber la pluie. Mwari est le père et la mère de l'humanité et nous gardera dans l'adversité. »\nNous avons rencontré un nombre croissant de fidèles de Mwari récemment. Ils ont tous en commun de refuser de reconnaître toute autre puissance spirituelle que leur dieu unique et, bien qu'ils parlent librement et volontiers de son existence, ils gardent soigneusement les secrets du culte lui-même."
 fetishist_flavor.103.a:0 "Nyadenga - Musikavanahu - Muvambapasi"
 fetishist_flavor.130.t:0 "La Voix de nos Ancêtres"
 fetishist_flavor.130.d:0 "L'Oracle Royal est venu porteur de bonnes nouvelles. Après avoir accompli la grande danse cérémonielle requise pour contacter nos ancêtres les plus vénérés afin de les consulter sur l'année à venir, il semble qu'un avenir radieux nous attend. Les détails sont difficiles à obtenir à travers le voile de la mort, mais cela ne peut signifier que de bonnes choses."
 fetishist_flavor.130.a:0 "Nous en récolterons sans doute les fruits pendant des années."
 fetishist_flavor.130.b:0 "Cela prouve nos liens étroits avec ceux qui nous ont précédés."
 ancestral_support:0 "Soutien ancestral"
 desc_ancestral_support:0 "Une série de présages favorables contribue à maintenir le calme dans notre royaume. Nos liens étroits avec nos ancêtres ont permis à notre société de rester stable et prospère."
 fetishist_flavor.131.t:0 "Prendre soin de ceux qui nous ont précédés"
 fetishist_flavor.131.d:0 "L'entretien de nos sanctuaires ancestraux reste un défi constant pour notre [Root.Monarch.GetTitle]. Il a été suggéré que la meilleure façon de gérer cela serait de nommer l'un de nos ministres les plus loyaux comme gardien permanent des sanctuaires, avec un budget associé. Tant que nos finances peuvent le supporter, cela aurait peu d'inconvénients, du moins tant que nous avons quelqu'un en qui nous pouvons avoir confiance..."
 fetishist_flavor.131.a:0 "Je connais exactement la bonne personne pour cela !"
 fetishist_flavor.131.b:0 "Je ne ferais confiance à personne d'autre que moi-même."
 ancestral_shrine_caretaker:0 "Gardien des Sanctuaires Ancestraux"
 desc_ancestral_shrine_caretaker:0 "Nous avons employé un groupe de bureaucrates permanents pour superviser l'entretien de nos sanctuaires ancestraux. Ces fonctionnaires sont principalement chargés des affaires quotidiennes de l'entretien des sanctuaires eux-mêmes, mais dans une certaine mesure, certains s'attendent également à ce qu'ils parlent au nom de nos ancêtres."
 fetishist_flavor.132.t:0 "Souverain contesté"
 fetishist_flavor.132.d:0 "Nommer quelqu'un à la tête de nos sanctuaires ancestraux a généralement été une décision réussie. Les sanctuaires eux-mêmes sont en bon état et notre fonctionnaire est également devenu si étroitement associé à ces esprits qu'il a pu créer un nouvel ensemble de cérémonies pour leur culte, en étroite collaboration avec les oracles. En effet, on attend désormais de lui qu'il parle en leur nom à certains égards.\nCependant, il semble que notre gardien ait commencé à valoriser sa loyauté envers les ancêtres au-dessus de celle envers son [Root.Monarch.GetTitle]. Il a récemment fait pression pour une augmentation du budget destiné à entretenir nos sanctuaires sacrés. Il est difficile de voir une raison d'aller contre les ancêtres à ce sujet, mais il est regrettable que quelqu'un se sente capable de parler en leur nom contre nous..."
 fetishist_flavor.132.a:0 "Accepter d'augmenter le budget des sanctuaires."
 fetishist_flavor.132.b:0 "Il est temps de reprendre le pouvoir sur nos ancêtres !"
 fetishist_flavor.133.t:0 "Faveur de $RANDOM_OLD_MONARCH$"
 fetishist_flavor.133.d:0 "Parfois, les actes accomplis au cours d'une vie sont d'un tel calibre que tous peuvent voir ce qui les attend. Les devins s'accordent à dire que $RANDOM_OLD_MONARCH$ était d'un tel calibre que [Root.Monarch.GetTitle] est un titre insuffisant et que nous devrions plutôt parler d'un dieu ou d'une divinité. Notre peuple parle de $RANDOM_OLD_MONARCH$ avec vénération et a déjà commencé à adorer son [Root.Monarch.GetTitle] disparu et ceux qui canalisent son esprit."
 fetishist_flavor.133.a:0 "Gloire à $RANDOM_OLD_MONARCH$ !"
 fetishist_flavor.150.t:0 "Mwari, le dieu unique"
 fetishist_flavor.150.d:0 "Bien que nous ayons accepté la nature de Mwari comme notre unique créateur et l'origine de tout pouvoir, il semble que tous nos sujets ne soient pas aussi convaincus de sa grandeur. À [Root.GetName], la vénération répandue de leurs propres esprits locaux anciens est devenue trop sincère pour la sensibilité de nos prêtres."
 fetishist_flavor.150.a:0 "Nous devons leur montrer la voie."
 fetishist_flavor.150.b:0 "Nous pouvons être un peu indulgents pour l'instant."
 fetishist_flavor.150.c:0 "Il est le propriétaire de la terre !"
 religious_leniency:0 "Indulgence religieuse"
 desc_religious_leniency:0 "Nous avons choisi d'être pragmatiques et avons autorisé certaines déviations par rapport à la religion d'État dans cette province."
 enforced_mwari_orthodoxy:0 "Orthodoxie Mwari imposée"
 desc_enforced_mwari_orthodoxy:0 "En agissant par la force contre quiconque oserait contester la position de Mwari comme dieu unique, nous avons imposé un contrôle et une autorité stricts sur cette province."
 mwari_forced_conversions_of_heathens:0 "Conversion forcée des païens"
 desc_mwari_forced_conversions_of_heathens:0 "Nous avons entrepris un projet de conversions dans cette province pour faire voir aux incroyants la vraie lumière de la grandeur de Mwari."
 fetishist_flavor.151.t:0 "Mwari et les Esprits Mhondoro"
 fetishist_flavor.151.d:0 "Bien que Mwari soit le créateur de tout et l'origine de tout pouvoir, il dispose d'un certain nombre d'esprits subordonnés qui l'aident à contrôler le monde. De même, un grand souverain doit s'appuyer sur des chefs subordonnés pour gérer les affaires quotidiennes des différents villages du royaume. Tant que nous menons une vie conforme à la volonté de Mwari, nous pouvons également être assurés du soutien des esprits Mhondoro. Il n'est donc pas surprenant que les devins de [Root.GetName] aient réprimandé les chefs locaux et renforcé notre emprise sur la région."
 fetishist_flavor.151.a:0 "Il est le propriétaire des cieux !"
 fetishist_flavor.152.t:0 "Courroux de Mwari"
 fetishist_flavor.152.d:0 "Lors des récents troubles à [wrath_of_mwari.GetName], des chefs locaux sous notre commandement ont jugé bon de punir les chefs ennemis capturés par l'exécution. Ce faisant, cependant, ils n'ont pas consulté les devins de Mwari et ont enfreint plusieurs de ses règles. Bien qu'il soit clair pour la plupart que ces hommes ont agi sans notre sanction officielle, le fait que ni nous ni les esprits de Mwari n'avons pu les contrôler a créé une agitation généralisée. D'autant plus que les habitants prétendent que Mwari lui-même a parlé pour montrer son grand mécontentement quant à la façon dont les choses se sont passées."
 fetishist_flavor.152.a:0 "Nous essaierons de faire mieux."
 fetishist_flavor.153.t:0 "La foi de [Root.GetName]"
 fetishist_flavor.153.d:0 "Le chef local de [Root.GetName] proteste bruyamment contre les politiques de notre [Root.Owner.Monarch.GetTitle], affirmant que nous ignorons la voix de Mwari et de ses émissaires. Le chef, de son côté, prétend avoir eu une liaison étroite avec les devins locaux et leur esprit Mhondoro. Aussi improbable que cela puisse paraître, d'autres ont commencé à le rejoindre dans sa protestation et il semble que ce ne soit qu'une question de temps avant qu'une révolte ouverte ne se déclenche."
 fetishist_flavor.153.a:0 "Nous devrons leur montrer l'erreur de leurs voies."
 fetishist_flavor.154.t:0 "Feux royaux"
 fetishist_flavor.154.d:0 "Un royaume comme le nôtre repose sur un certain degré de délégation. Heureusement, notre [Root.Monarch.GetTitle] est un excellent juge de caractère et nous avons aussi Mwari et ses émissaires pour nous aider à sélectionner et contrôler notre royaume.\nMême ainsi, il est coutumier que les divers chefs du royaume viennent à [Root.Capital.GetCapitalName] pour faire leur rapport et montrer leur loyauté une fois par an. Lors d'une grande cérémonie, les chefs doivent rallumer leurs feux royaux et les ramener dans leur province comme signe de leurs liens avec nous et avec Mwari. C'est donc avec une grande irritation que nous notons que certains de nos chefs cette année ont négligé de venir, envoyant au lieu de cela de faibles excuses concernant la distance."
 fetishist_flavor.154.a:0 "Nous pouvons nous permettre de les laisser se désister."
 fetishist_flavor.154.b:0 "Si nous permettons cela, d'autres suivront."
 firexit:0 "Déclin de l'autorité"
 desc_firexit:0 "Nous avons fermé les yeux sur les chefs éloignés qui ne se déplacent pas jusqu'à notre capitale pour renouveler leur serment de servir et rallumer leurs feux royaux."
 forced_mwari_adherence:0 "Centralisation forcée"
 desc_forced_mwari_adherence:0 "Nous avons contraint tous les chefs du royaume à adhérer aux règles traditionnelles de la chefferie, à se rendre régulièrement à notre capitale pour rallumer les feux royaux de Mwari."
 fetishist_flavor.170.t:0 "Affliction de [Root.GetName]"
 fetishist_flavor.170.d:0 "Notre peuple de [Root.GetName] craint que les esprits Cwezi soient mécontents de leur conduite dans la région. Selon la croyance populaire, il y a eu un net déclin du nombre de grossesses et une augmentation des complications à l'accouchement, ce qui est attribué à la négligence récente d'un sanctuaire mineur à [Root.GetCapitalName]."
 fetishist_flavor.170.a:0 "Nous ne pouvons rien faire."
 fetishist_flavor.170.b:0 "Nous devons solliciter l'aide des prêtresses Cwezi."
 fetishist_flavor.170.b.tt:0 "En donnant du pouvoir aux prêtresses Cwezi et en les faisant consulter les esprits et accomplir le rituel d'initiation sur les femmes locales, nous avons de bonnes chances d'éviter un désastre local."
 fetishist_flavor.170.c:0 "Nous devons offrir [Root.Owner.Consort.GetName] à l'Esprit Cwezi."
 fetishist_flavor.170.c.tt:0 "En tant qu'épouse de l'Esprit Cwezi, [Root.Owner.Consort.GetName] pourra agir en notre nom et mettre fin à cela. Elle sera cependant incapable de servir comme reine de notre pays par la suite."
 fetishist_flavor.171.t:0 "Soutien des Esprits"
 fetishist_flavor.171.d:0 "Les ancêtres Cwezi ont répondu à nos appels à l'aide et il est largement admis que la région autour de [Root.GetName] ne souffre plus de l'horrible malédiction d'infertilité qui l'affligeait."
 fetishist_flavor.171.a:0 "Nous avons réussi à éviter le désastre imminent à [Root.GetName]."
 fetishist_flavor.172.t:0 "Abandon spirituel"
 fetishist_flavor.172.d:0 "Les esprits Cwezi restent peu impressionnés par nos efforts pour solliciter leur aide contre le terrible fléau de fertilité qui a frappé [Root.GetName]. Notre peuple fuit la région, espérant éviter la terrible malédiction qui, selon la croyance répandue, les rendrait incapables d'avoir des enfants."
 fetishist_flavor.172.a:0 "Nous avons été mis à l'épreuve et trouvés insuffisants."
 fertility_concerns:0 "Fertilité en déclin"
 desc_fertility_concerns:0 "Un déclin marqué des naissances dans cette région indique que les esprits sont mécontents de nous. En conséquence, un grand nombre de nos habitants déménagent vers d'autres parties du pays, espérant éviter leur colère."
 fetishist_flavor.173.t:0 "Sorcière itinérante"
 fetishist_flavor.173.d:0 "Un groupe de prêtresses mené par une puissante sorcière est arrivé à [Root.Capital.GetCapitalName] pour solliciter notre hospitalité. Par les voies secrètes de la possession spirituelle, elles peuvent parlementer directement avec les grands esprits Cwezi d'antan. Refuser leur demande d'hospitalité n'est pas vraiment une option : le type de soutien que nous accordons à ce groupe influencera probablement le type de soutien que nous pouvons attendre pour notre [Root.Monarch.GetTitle]."
 fetishist_flavor.173.a:0 "Nous ne pouvons offrir que des logements modestes mais attendons peu en retour."
 fetishist_flavor.173.b:0 "Rappelons à notre peuple nos liens étroits avec Kitara."
 fetishist_flavor.173.c:0 "Offrir guérison et consolation à tous ceux qui en ont besoin à [Root.Capital.GetCapitalName]."
 fetishist_flavor.174.t:0 "Mauvais présage"
 fetishist_flavor.174.da:0 "Les devins de [Root.Capital.GetCapitalName] ont des visions de destruction imminente. Ils nous assurent que les esprits Cwezi de l'ancien Kitara feront ce qu'ils peuvent pour nous protéger, mais nous pouvons être sûrs que des temps difficiles nous attendent."
 fetishist_flavor.174.a:0 "Sombres paroles..."
 fetishist_flavor.174.b:0 "Les devins se tiendront entre nous et les héros d'antan."
 fetishist_flavor.175.t:0 "Sanctuaire de l'esprit"
 fetishist_flavor.175.d:0 "Le représentant de l'un des plus grands sanctuaires de notre pays a sollicité une audience auprès de notre [Root.Monarch.GetTitle] pour nous demander de financer une extension et d'acquérir davantage de prêtres pour l'esprit Cwezi qui y réside. Selon le gardien, ce sanctuaire, bien qu'il ne soit pas négligé, n'est pas digne d'abriter nos grands ancêtres, et ils nous ont fait savoir que nous ne pouvons pas espérer de grandes choses tant que nous ne ferons rien à ce sujet.\nCela serait inquiétant en soi, mais il semble également qu'un démagogue local se soit greffé à cette affaire. Avec [Root.Monarch.GetName] si vilipendé par le clergé local, il est difficile de ne pas soupçonner une collaboration entre les deux."
 fetishist_flavor.175.a:0 "Nous donnerons carte blanche à la prêtresse."
 fetishist_flavor.175.b:0 "Je refuse d'être manipulé !"
 shrine_with_privileges:0 "Sanctuaire privilégié"
 desc_shrine_with_privileges:0 "Nous avons accordé un nombre significatif de privilèges à l'influent sanctuaire de l'esprit dans cette province."
 local_demagogue:0 "Démagogue local"
 desc_local_demagogue:0 "Un démagogue local tente d'inciter la population de cette province contre nous."
 fetishist_flavor.201.t:0 "Le Peuple d'Enkai"
 fetishist_flavor.201.d:0 "Nous avons rencontré une tribu qui vénère avec ferveur une divinité qu'ils appellent « Enkai », l'Homme dans le Ciel. Ils semblent accorder une importance capitale au bétail et chaque homme compte sa richesse en vaches, taureaux et veaux. Un berger que nous avons rencontré nous a raconté la légende d'Enkai et du don qu'il a envoyé à leur peuple.\n\nL'histoire raconte qu'Enkai était autrefois un humain et que son troupeau contenait tout le bétail du monde. Lorsque le ciel fut séparé de la terre, il renvoya son troupeau à son peuple le long d'une corde d'écorce. Une tribu de chasseurs jaloux qui convoitaient la viande coupa la corde et maintenant le bétail est le seul lien restant avec Enkai. Ce peuple prétend être les élus d'Enkai et ainsi tout le bétail sous les cieux leur appartient."
 fetishist_flavor.201.a:0 "Nous chercherons à en apprendre davantage sur Enkai et ses bénédictions."
 fetishist_flavor.202.t:0 "Dieu du Ciel"
 fetishist_flavor.202.d:0 "Nous avons récemment rencontré des gens qui vouent leur vie à l'adoration du seul vrai dieu qu'ils appellent « Waaq ». Ils affirment qu'il est le maître suprême et tout-puissant de l'Univers. Si leurs paroles sont vraies, il a créé le monde et réside aux Cieux d'où il veille sur nous tous. L'humanité est soumise à sa volonté et doit toujours l'adorer et le craindre.\n\nLes disciples de Waaq prient pour la paix et l'harmonie par-dessus tout. Ils croient que le monde repose sur les cornes d'un grand taureau. Debout devant lui, attachée à un poteau, se trouve une vache. L'équilibre de l'Univers est lié à l'amour entre le taureau et la vache. Si elle se détourne de lui, le taureau deviendrait anxieux et ainsi le monde basculerait. Cela pourrait entraîner toutes sortes de catastrophes sur Terre. Cependant, tant que nous prions et offrons des présents au grand Waaq, nous serons en sécurité. C'est du moins ce que ces gens affirment."
 fetishist_flavor.202.a:0 "Enseignez-nous davantage sur le puissant Waaq."
 fetishist_flavor.203.t:0 "Le Dieu divisé"
 fetishist_flavor.203.d:0 "En élargissant nos horizons et en rencontrant de nouvelles communautés, nous découvrons d'autres divinités et modes de vie. Récemment, on nous a parlé du dieu « Zanahary ». Il est le Créateur de l'Univers, divisé en deux : il est à la fois masculin et féminin, Lumière et Ténèbres, Ciel et Terre. Le Zanahary céleste insuffle la vie dans les corps d'argile façonnés par le Zanahary terrestre, créant ainsi les humains. Lorsque les deux aspects de Zanahary se querellent, le souffle est retiré du corps, entraînant la mortalité et la mort.\n\nLes disciples de Zanahary ne semblent pas trop s'en inquiéter, cependant. Ils nous disent que la vie n'est qu'un état temporaire et que les morts sont les membres les plus importants de la communauté. Les ancêtres, ou « razana », sont décrits comme des dieux sur terre et agissent comme médiateurs entre les vivants et Zanahary."
 fetishist_flavor.203.a:0 "Intrigant ! Nous devons en apprendre davantage sur Zanahary et les razana."
 fetishist_flavor.21.t:0 " "
 fetishist_flavor.204.t:0 "Prière pour la pluie"
 fetishist_flavor.204.d.a:0 "La saison des pluies approche et nous avons reçu des nouvelles de la province de [rain_province.GetName], sollicitant notre aide. Le travail des terres est essentiel à l'économie locale de [rain_province.GetName], ainsi qu'à celle des régions environnantes, cependant, ils n'ont pas été bénis par des précipitations suffisantes ces dernières années. Les fermiers prient certainement déjà Waaq pour des champs fertiles et une récolte abondante, cependant, les prêtres Wadaad locaux pensent qu'une célébration organisée s'avérerait plus efficace. Ils soulignent à quel point la récolte de cette année sera vitale pour la prospérité future de la région."
 fetishist_flavor.204.d.b:0 "La saison des pluies approche et nous avons reçu des nouvelles de la province de [rain_province.GetName], sollicitant notre aide. Le travail des terres est essentiel à l'économie locale de [rain_province.GetName] ainsi qu'à celle des régions environnantes, mais ces dernières années, ils n'ont pas été bénis par des précipitations suffisantes. Les fermiers prient certainement déjà Yemoja, la déesse de la fertilité, pour une récolte abondante. Cependant, les anciens locaux pensent qu'une célébration organisée s'avérerait plus efficace. Ils soulignent à quel point la récolte de cette année sera vitale pour la prospérité future de la région."
 fetishist_flavor.204.a:0 "Nous aiderons à organiser une grande célébration en l'honneur de Waaq."
 fetishist_flavor.204.a.tt:0 "Aider les prêtres de [rain_province.GetName]. Une sécheresse aurait un impact négatif significatif sur la productivité de la région, tandis que de bonnes pluies l'aideraient à prospérer. Cependant, rien ne garantit que Waaq écoutera."
 fetishist_flavor.204.b:0 "Nous organiserons une grande célébration en l'honneur de la Dame de la Pluie."
 fetishist_flavor.204.b.tt:0 "Aider les anciens de [rain_province.GetName]. Une sécheresse aurait un impact négatif significatif sur la productivité de la région, tandis que de bonnes pluies l'aideraient à prospérer. Cependant, rien ne garantit que Yemoja écoutera."
 fetishist_flavor.204.c:0 "Si ces fermiers impies meurent de faim, ils n'ont qu'à s'en prendre à eux-mêmes !"
 fetishist_flavor.204.c.tt:0 "Ne pas aider les prêtres de [rain_province.GetName], risquant une autre année de pluies insuffisantes. Une sécheresse aurait un impact négatif significatif sur la productivité de la région."
 fetishist_flavor.205.t:0 "L'Année des Grandes Pluies"
 fetishist_flavor.205.d.a:0 "Que le miséricordieux Waaq soit loué, nos prières ont été exaucées ! La pluie tombe régulièrement sur [rain_province.GetName] et les environs. Il semble que nos efforts aient porté leurs fruits. Cela fait de nombreuses années que les habitants de la région n'ont pas reçu cette quantité de précipitations et il n'y a toujours pas de fin en vue. De lourds nuages, gros des bénédictions de Waaq, couvrent le ciel d'horizon en horizon. Le peuple célèbre le Barwaqoo, ou Pluie de Dieu, et se prépare à la récolte d'une vie."
 fetishist_flavor.205.d.b:0 "Que le miséricordieux Waaq soit loué ! La pluie tombe régulièrement sur [rain_province.GetName] et les environs. Il semble que les prières des fermiers aient suffi, malgré ce que disaient les prêtres. Cela fait de nombreuses années qu'ils n'ont pas reçu cette quantité de précipitations et il n'y a toujours pas de fin en vue. De lourds nuages, gros des bénédictions de Waaq, couvrent le ciel d'horizon en horizon. Le peuple célèbre le Barwaqoo, ou Pluie de Dieu, et se prépare à la récolte d'une vie."
 fetishist_flavor.205.d.c:0 "Que la miséricordieuse Dame soit louée, nos prières ont été exaucées ! La pluie tombe régulièrement sur [rain_province.GetName] et les environs. Il semble que nos efforts aient porté leurs fruits. Cela fait de nombreuses années que les habitants de la région n'ont pas reçu cette quantité de précipitations et il n'y a toujours pas de fin en vue. De lourds nuages, gros des bénédictions de Yemoja, couvrent le ciel d'horizon en horizon. Le peuple célèbre la pluie de la Dame et se prépare à la récolte d'une vie."
 fetishist_flavor.205.d.d:0 "Que la miséricordieuse Dame soit louée ! La pluie tombe régulièrement sur [rain_province.GetName] et les environs. Il semble que les prières des fermiers aient suffi, malgré ce que disaient les anciens. Cela fait de nombreuses années qu'ils n'ont pas reçu cette quantité de précipitations et il n'y a toujours pas de fin en vue. De lourds nuages, gros des bénédictions de Yemoja, couvrent le ciel d'horizon en horizon. Le peuple célèbre la pluie de la Dame et se prépare à la récolte d'une vie."
 fetishist_flavor.205.a:0 "Nous rendons grâce au Père Céleste pour notre prospérité !"
 fetishist_flavor.205.b:0 "Nous rendons grâce à la Dame de la Pluie pour notre prospérité !"
 fetishist_flavor.206.t:0 "L'Indifférence de Dieu"
 fetishist_flavor.206.d.a:0 "Nous avons fait de notre mieux, mais parfois cela ne suffit pas. Nos prières sont restées sans réponse et nos offrandes ont été rejetées. Si les pluies à [rain_province.GetName] et dans les environs ont été décevantes ces dernières années, il y avait au moins un peu de pluie. Maintenant, il n'y a rien. Le soleil nous fixe depuis un ciel pâle et dégagé, brûlant la terre et tout ce qui a le courage de pousser. Les habitants de [rain_province.GetName] ont des années de disette devant eux..."
 fetishist_flavor.206.d.b:0 "Il semble que les habitants de [rain_province.GetName] n'aient pas réussi à apaiser Waaq. Peu importe si leurs prières n'étaient pas sincères ou leurs offrandes médiocres : nous devrons tous payer pour leur échec. Si les pluies à [rain_province.GetName] et dans les environs ont été décevantes ces dernières années, il y avait au moins un peu de pluie. Maintenant, il n'y a rien. Le soleil nous fixe depuis un ciel pâle et dégagé, brûlant la terre et tout ce qui a le courage de pousser. Les habitants de [rain_province.GetName] ont des années de disette devant eux..."
 fetishist_flavor.206.d.c:0 "Nous avons fait de notre mieux, mais parfois cela ne suffit pas. Nos prières sont restées sans réponse et nos offrandes ont été rejetées. Si les pluies à [rain_province.GetName] et dans les environs ont été décevantes ces dernières années, il y avait au moins un peu de pluie. Maintenant, il n'y a rien. Le soleil nous fixe depuis un ciel pâle et dégagé, brûlant la terre et tout ce qui a le courage de pousser. Les habitants de [rain_province.GetName] ont des années de disette devant eux..."
 fetishist_flavor.206.d.d:0 "Il semble que les habitants de [rain_province.GetName] n'aient pas réussi à apaiser Yemoja. Peu importe si leurs prières n'étaient pas sincères ou leurs offrandes médiocres : nous devrons tous payer pour leur échec. Si les pluies à [rain_province.GetName] et dans les environs ont été décevantes ces dernières années, il y avait au moins de la pluie. Maintenant, il n'y a rien. Le soleil nous fixe depuis un ciel pâle et dégagé, brûlant la terre et tout ce qui a le courage de pousser. Les habitants de [rain_province.GetName] ont des années de disette devant eux..."
 fetishist_flavor.206.a:0 "Waaq peut être un maître sévère."
 fetishist_flavor.206.b:0 "La Mère des Eaux peut être une maîtresse sévère."
 rains_of_fertility:0 "Pluies de fertilité"
 desc_rains_of_fertility:0 "Des pluies abondantes ont donné l'une des récoltes les plus fructueuses de mémoire d'homme. La région prospérera pendant des années."
 barren_lands:0 "Terres arides"
 desc_barren_lands:0 "Après avoir subi une période de sécheresse sévère, les champs de ces terres sont restés secs et stériles."
 ancestral_tomb:0 "Tombeau ancestral"
 desc_ancestral_tomb:0 "Les terres ancestrales de notre souverain sont situées dans cette province. Les grands tombeaux revêtent une importance religieuse considérable pour notre nation."
 grand_ancestral_tomb:0 "Grand tombeau ancestral"
 desc_grand_ancestral_tomb:0 "Les terres ancestrales de notre souverain sont situées dans cette province. Les tombeaux nouvellement restaurés comptent parmi les bâtiments les plus impressionnants de la nation et revêtent une grande importance religieuse pour notre peuple."
 crumbling_ancestral_tomb:0 "Tombeau ancestral en ruine"
 desc_crumbling_ancestral_tomb:0 "Les terres ancestrales de notre souverain sont situées dans cette province. Les tombeaux jadis grandioses ont honteusement été laissés à l'abandon."
 fetishist_flavor.207.t:0 "La Nouvelle Génération"
 fetishist_flavor.207.d:0 "L'heure est venue pour un autre groupe d'âge de garçons de subir le rite de l'« Emuratare », devenant enfin des hommes et des guerriers. Avec l'âge adulte vient la responsabilité de protéger notre peuple et notre territoire. Pendant dix ans, ils résideront ensemble dans l'« Emanyatta », un village guerrier, durant lequel ils vivent pour servir la nation.\n\nAvec cet afflux dans l'armée de notre pays, nous avons également l'occasion de façonner une nouvelle génération de guerriers. Quel devrait être l'axe principal de leur éducation ?"
 fetishist_flavor.207.a:0 "Ils combattront comme des lions, audacieux et féroces !"
 fetishist_flavor.207.b:0 "Nous leur enseignerons la discipline et comment travailler ensemble, comme une colonie de fourmis !"
 bold_warriors:0 "Guerriers audacieux"
 desc_bold_warriors:0 "Le groupe d'âge actuel de guerriers a été entraîné à être audacieux et féroce comme des lions."
 disciplined_warriors:0 "Guerriers disciplinés"
 desc_disciplined_warriors:0 "Le groupe d'âge actuel de guerriers a été entraîné à être discipliné et tenace comme des fourmis soldats."
 fetishist_flavor.208.t:0 "Le Courroux d'Enkai"
 fetishist_flavor.208.d:0 "La plupart du temps, Enkai est un dieu bienveillant et juste. Nous l'appelons « Enkai Naibor », Dieu est Noir, car il rend les nuages sombres lourds de pluie. Cependant, lorsque nous regardons le ciel aujourd'hui, ce n'est pas ce que nous voyons. Au lieu de cela, le ciel est rouge et sec. En de tels temps, nous lui donnons un autre nom : « Enkai Nanyokie », Dieu est Rouge.\n\nLa sécheresse a durement frappé notre peuple. Il devient de plus en plus difficile de trouver de l'eau dans certaines régions et il ne reste presque plus rien à manger pour nos troupeaux. La situation est devenue particulièrement préoccupante dans la région autour de la province de [drought_province.GetName]. Un « oloiboni » local, un chef spirituel, a suggéré que chaque propriétaire de bétail sacrifie huit taureaux pour apaiser le grand Enkai. Bien que nous le pensions dans le vrai, imposer un tel décret mécontenterait certainement notre peuple."
 fetishist_flavor.208.a:0 "Si nous ne sacrifions pas le bétail, il périra de la sécheresse de toute façon."
 fetishist_flavor.208.a.tt:0 "Ordonner aux habitants de [drought_province.GetName] et des environs de sacrifier une partie de leur bétail pour tenter d'arrêter la sécheresse et faire venir la pluie. Rien ne garantit cependant qu'Enkai sera apaisé."
 fetishist_flavor.208.b:0 "C'est trop demander. Notre peuple a assez souffert."
 fetishist_flavor.208.b.tt:0 "Ne pas ordonner le sacrifice, risquant la colère continue d'Enkai."
 fetishist_flavor.209.t:0 "Dieu est Noir"
 fetishist_flavor.209.d:0 "Gloire à Enkai Naibor, notre Seigneur bienveillant ! Une fois encore, les cieux sont sombres de lourds nuages ! Il n'a pas plu depuis de nombreux jours, mais même ainsi, tout est différent. Ce qui était sec et rouge est maintenant humide et vert. Nos enfants n'auront plus soif et notre bétail ne mourra plus de faim. Nous sommes vraiment bénis."
 fetishist_flavor.209.a:0 "Nous pouvons toujours faire confiance à Enkai."
 fetishist_flavor.210.t:0 "Dieu est Rouge"
 fetishist_flavor.210.d:0 "Nous avons versé le sang de milliers de taureaux sur la terre brûlée, et pourtant nous n'avons pas eu une goutte de pluie. Les cieux sont aussi cramoisis que le sol, le ciel et la terre reflétant la colère d'Enkai Nanyokie. En écoutant l'oloiboni de [drought_province.GetName], nous avons empiré la situation. Le sang et la viande que nous avons laissés aux charognards auraient pu sauver de nombreuses vies, des vies qui se sont maintenant éteintes sous un soleil impitoyable."
 fetishist_flavor.210.a:0 "Qu'Enkai soit miséricordieux !"
 fetishist_flavor.210.a.tt:0 "La sécheresse à [drought_province.GetName] et dans les environs continue, malgré le sacrifice."
 god_is_black:0 "Dieu est Noir"
 desc_god_is_black:0 "Enkai Naibor a rempli les nuages de pluie, ce qui a ramené la prospérité dans la province."
 god_is_red:0 "Dieu est Rouge"
 desc_god_is_red:0 "Enkai Nanyokie refuse la pluie à ses disciples, laissant cette province sèche et stérile. Hommes et bétail périssent sous un soleil brûlant."
 forced_sacrifice:0 "Sacrifice forcé"
 desc_forced_sacrifice:0 "Les habitants de cette province ont été contraints de sacrifier une partie de leurs troupeaux. Le bétail est leur ressource la plus précieuse et ils n'en sont pas du tout satisfaits, quel que soit le résultat."
 fetishist_flavor.301.t:0 "Terre des Ancêtres"
 fetishist_flavor.301.d.a:0 "Pour le grand Zanahary, la vie d'un homme passe en un clin d'œil. Les morts, cependant, sont éternels. Nos vénérés ancêtres agissent comme intermédiaires entre Dieu et les vivants. Nous devons solliciter leur conseil et les garder heureux pour que notre communauté prospère.\n\nPour communier avec eux, nous devons visiter le « tanindrazana », la terre des ancêtres. Tandis que nos propres demeures sont généralement modestes, les morts résident dans de grands tombeaux funéraires. Un jour, nous les rejoindrons, mais pour l'instant, notre plus grande responsabilité est de servir nos ancêtres en entretenant leurs demeures et en exécutant leurs volontés."
 fetishist_flavor.301.a:0 "Nous protégerons les terres des ancêtres jusqu'à notre dernier souffle."
 fetishist_flavor.301.a.tt:0 "Les terres ancestrales du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! sont situées dans la province de [ancestral_lands.GetName]."
 fetishist_flavor.302.t:0 "Morts et oubliés"
 fetishist_flavor.302.d:0 "Autrefois, nous adorions ceux qui nous ont précédés, mais maintenant nous avons choisi une nouvelle voie. Bien que les grands tombeaux que nous avons construits en l'honneur des ancêtres demeurent, ils n'ont plus la même importance pour notre peuple. Leurs gardiens sont partis accomplir d'autres devoirs et un jour, il ne restera plus que des os et des ruines. Le repos final de nos ancêtres commence maintenant."
 fetishist_flavor.302.a:0 "C'est le temps d'une ère nouvelle ! Longue vie au [Root.Monarch.GetTitle] [Root.Monarch.GetName] !"
 fetishist_flavor.302.a.tt:0 "Parce que le [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! a choisi un autre culte pour notre nation, les terres ancestrales de [ancestral_lands.GetName] ont perdu leur importance."
 fetishist_flavor.303.t:0 "Le Silence infini"
 fetishist_flavor.303.d.a:0 "Nous avons toujours pu nous tourner vers les razana, nos ancêtres, pour obtenir conseils et guidance, mais maintenant il n'y a plus que le silence. Les terres ancestrales de l'élite de notre nation, y compris le grand mausolée des [Root.Monarch.Dynasty.GetName], ont été perdues. On nous rapporte des tombeaux pillés et des restes profanés. Nous sommes coupés des ancêtres et donc du grand Zanahary. Vers qui nous tourner maintenant ? Qui montrera la voie ? Nombreux sont ceux qui doutent que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] doive gouverner notre nation s'[Root.Monarch.GetSheHe] a échoué à protéger ce qu'il y a de plus sacré."
 fetishist_flavor.303.d.b:0 "perdu, CA"
 fetishist_flavor.303.a:0 "C'est un jour sombre pour [Root.GetName]."
 fetishist_flavor.303.a.tt:0 "Le tombeau ancestral des [Root.Monarch.Dynasty.GetName] a été perdu et beaucoup s'inquiètent de la capacité du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! à gouverner."
 fetishist_flavor.304.t:0 "Un nouveau commencement"
 fetishist_flavor.304.d.a:0 "Depuis le jour où nous avons perdu nos terres ancestrales les plus sacrées, notre pays a été affaibli. Avec l'avènement de notre nouveau [Root.Monarch.GetTitle], cependant, le temps est venu de refermer cette blessure pour de bon. [Root.Monarch.GetName] est le chef d'une nouvelle génération et tandis qu'elle avance, nous pouvons tourner nos regards vers un avenir radieux. [Root.Monarch.GetSheHeCap] a le pouvoir de désigner un nouveau tanindrazana et de construire un grand tombeau où [Root.Monarch.GetHerHis] prédécesseur pourra reposer."
 fetishist_flavor.304.d.b:0 "Reconstruire ? pour culte CA"
 fetishist_flavor.304.a:0 "Désormais, nous enterrerons nos morts à [ancestral_lands.GetName]."
 fetishist_flavor.304.a.tt:0 "Un terrain dans la province de [ancestral_lands.GetName] est dédié aux ancêtres et un tombeau est construit pour la famille [Root.Monarch.Dynasty.GetName]."
 fetishist_flavor.304.b:0 "Nous ne pouvons pas nous permettre de construire un autre monument pour des prêtres et des cadavres."
 fetishist_flavor.304.b.tt:0 "Bien que cela contrarie beaucoup de monde, aucun nouveau tombeau n'est construit pour la famille [Root.Monarch.Dynasty.GetName]."
 fetishist_flavor.310.t:0 "Palais des Morts"
 fetishist_flavor.310.d.a:0 "L'un des lieux les plus sacrés de notre nation est le tanindrazana du [Root.Monarch.GetTitle] [Root.Monarch.GetName], situé dans la province de [ancestral_lands.GetName]. Certains de nos ancêtres les plus respectés et influents résident ici dans le mausolée de la famille [Root.Monarch.Dynasty.GetName]. Bien que le tombeau reste l'un des monuments les plus impressionnants du pays, l'entretien d'un si grand édifice est une entreprise considérable et l'état du tombeau a commencé à se détériorer. Si nous ne dépensons pas davantage pour son entretien, ce serait un affront aux ancêtres."
 fetishist_flavor.310.d.b:0 "Autre description"
 fetishist_flavor.310.a:0 "Nous restaurerons le tombeau des [Root.Monarch.Dynasty.GetName] dans sa gloire d'antan !"
 fetishist_flavor.310.a.tt:0 "Profiter de l'occasion pour apporter quelques améliorations au tombeau ancestral de [ancestral_lands.GetName] pendant les réparations."
 fetishist_flavor.310.b:0 "Mettre de côté des ressources pour les réparations les plus nécessaires."
 fetishist_flavor.310.b.tt:0 "Le tombeau ancestral de [ancestral_lands.GetName] sera entretenu mais aucune amélioration ne sera apportée."
 fetishist_flavor.310.c:0 "Les besoins des vivants sont plus pressants que ceux des morts !"
 fetishist_flavor.310.c.tt:0 "Économiser les ressources pour autre chose tandis que le tombeau ancestral de [ancestral_lands.GetName] se détériore."
 fetishist_flavor.311.t:0 "Satisfaction des Ancêtres"
 fetishist_flavor.311.d:0 "Les ancêtres ont été très satisfaits des améliorations apportées au tombeau de la famille [Root.Monarch.Dynasty.GetName] il y a quinze ans. Bien que la splendeur ait quelque peu diminué avec le temps, ils se souviendront certainement de notre révérence, même si elle n'impressionne plus les vivants."
 fetishist_flavor.311.a:0 "Puissent les ancêtres veiller sur nous pendant de nombreuses années encore."
 fetishist_flavor.311.a.tt:0 "Le tombeau de la famille [Root.Monarch.Dynasty.GetName] à [ancestral_lands.GetName] n'est plus considéré comme grandiose."
 fetishist_flavor.312.t:0 "Le Jour où la Terre a tremblé"
 fetishist_flavor.312.d.a:0 "Des nouvelles nous sont parvenues de la province de [earthquake_province.GetName] concernant une terrible tragédie. Le sol a tremblé et s'est déplacé, effaçant plusieurs villages et faisant de nombreuses victimes. En tant que disciples de Waaq, nous croyons en l'harmonie et l'équilibre par-dessus tout. Notre monde repose sur les cornes du grand taureau, qui se tient face à son amour, la vache. Le désastre s'abat sur notre monde lorsqu'elle se détourne de lui, car le monde bascule sur ses cornes. L'harmonie doit être restaurée ! La question est comment... ?"
 fetishist_flavor.312.a:0 "Les infâmes infidèles de [earthquake_infidel.GetName] sont responsables !"
 fetishist_flavor.312.a.tt:0 "Affirmer que le [earthquake_infidel.GovernmentName] de [earthquake_infidel.GetName] est responsable du tremblement de terre, nous donnant une raison de les attaquer."
 fetishist_flavor.312.b:0 "Tel un poison dans les veines de la nation, les incroyants parmi nous sont coupables."
 fetishist_flavor.312.b.tt:0 "Blâmer quiconque n'est pas un disciple de [Root.GetCult], retournant les fidèles contre eux."
 fetishist_flavor.312.c:0 "Nous travaillerons ensemble pour reconstruire [earthquake_province.GetName]."
 fetishist_flavor.312.c.tt:0 "Collecter des ressources de tout le royaume pour financer des projets de construction à [earthquake_province.GetName]."
 fetishist_flavor.312.d:0 "[Root.GetCult] est mécontent de nos façons. Nous devons nous repentir."
 fetishist_flavor.312.d.tt:0 "Ne pas profiter de la situation, mais plutôt tenter de plaire à [Root.GetCult] par une dévotion sincère."
 hit_by_earthquake:0 "Frappé par un séisme"
 desc_hit_by_earthquake:0 "Le tremblement de terre qui a frappé cette province a exigé un lourd tribut, non seulement en coûts de réparation, mais aussi en vies humaines."
 opinion_insulted_by_accusation:0 "Insulté par l'accusation"
 devout_ruler:0 "Souverain dévot"
 desc_devout_ruler:0 "Le souverain de notre nation est un disciple dévot de la vraie foi, essayant toujours de bien agir envers les puissances supérieures."
 persecuting_infidels:0 "Persécution des infidèles"
 desc_persecuting_infidels:0 "Les disciples de la vraie foi dans notre nation n'ont guère d'amour à accorder aux infidèles parmi nous."
 rebuilding_efforts:0 "Efforts de reconstruction"
 desc_rebuilding_efforts:0 "Après qu'un désastre a frappé cette province, elle a reçu une aide financière pour accélérer les réparations et la reconstruction."
 fetishist_flavor.400.t:0 "Fils de Dieu"
 fetishist_flavor.400.d:0 "Des étrangers nous ont récemment rencontrés, portant avec eux la parole du « Christ », qu'ils affirment être le Fils de Dieu. Ils disent qu'il est descendu des Cieux et a marché parmi nous, enseignant l'amour et le pardon. À la fin, il est mort sur une croix pour nos péchés, pour ressusciter et monter aux Cieux. Ils disent qu'un jour, le Sauveur reviendra sur Terre pour accorder la vie éternelle à ses disciples et établir le Royaume final de Dieu."
 fetishist_flavor.400.a:0 "La vie éternelle, dites-vous ? Racontez-nous en davantage."
 fetishist_flavor.401.t:0 "L'Unicité de Dieu"
 fetishist_flavor.401.d:0 "Nous avons rencontré des gens qui consacrent leur vie à adorer le seul vrai dieu qu'ils appellent « Allah ». Ils vivent selon le décret que leur ont donné leurs prophètes, dont le plus grand se nommait Mahomet. On nous a dit que pour être un vrai serviteur de Dieu, il faut adhérer aux Cinq Piliers : la foi, la prière, l'aumône, le jeûne et le pèlerinage à « La Mecque ». Ils ont partagé avec nous une écriture, le « Coran », qui contient apparemment la révélation finale et inaltérée de Dieu."
 fetishist_flavor.401.a:0 "Nous examinerons cela de plus près."
 fetishist_flavor.402.t:0 "Les Quatre Nobles Vérités"
 fetishist_flavor.402.d:0 "Nous avons rencontré un sage, vêtu très humblement, qui prétend être un moine suivant les enseignements du « Bouddha ». Quand nous lui avons demandé ce que cela signifiait, il a entrepris de nous raconter l'histoire d'un homme qui a atteint l'illumination. Il est devenu connu sous le nom de Bouddha et a partagé sa sagesse des Quatre Nobles Vérités avec ses disciples. Elles révèlent comment nous, humains, désirons et nous accrochons à ce qui est impermanent, nous gardant insatisfaits et piégés dans un cycle sans fin de renaissance, mais aussi comment atteindre la libération et l'illumination en suivant le Noble Chemin Octuple."
 fetishist_flavor.402.a:0 "Intéressant. Racontez-nous en davantage."
 fetishist_flavor.403.t:0 "La Voie Éternelle"
 fetishist_flavor.403.d:0 "Nous avons rencontré des croyants du Sanatana Dharma, ou la voie éternelle. Ils valorisent une vie vertueuse et morale, la stabilité et la liberté de l'ignorance. Il semble qu'ils vénèrent non pas un mais plusieurs dieux pour les aider dans leur cheminement vers l'amélioration, mentionnant des noms comme Shiva le Destructeur et Vishnu le Préservateur. Ils exhortent notre peuple à considérer nos actions dans cette vie, et par le « karma », la cause et l'effet spirituel, nous pouvons chercher à mériter une meilleure vie après celle-ci. Le but ultime est de mettre fin au cycle de la naissance et de la renaissance..."
 fetishist_flavor.403.a:0 "Cela semble digne d'investigation."
 fetishist_flavor.404.t:0 "La Puissance du Soleil"
 fetishist_flavor.404.d:0 "Les peuples d'outre-mer sont intrigants. Au début, ce n'étaient que leurs symboles dorés et leurs pyramides élaborées qui inspiraient l'admiration de nos guerriers, mais récemment, même certains de nos membres éminents de la société ont commencé à explorer la foi qui sous-tend cette vie mystique. Jusqu'ici, nous avons trouvé un panthéon de dieux et du rituel en toutes choses : nous avons entendu des histoires comme celle de la cérémonie du Feu Nouveau, ou Xiuhmolpilli, où après des semaines d'abstinence corporelle, de rituels de sang et même d'un vœu de silence, un homme est sacrifié au sommet d'un ancien volcan, commençant ainsi un nouveau cycle de leur calendrier de 52 ans.\n\nD'après ce que nous comprenons, une grande partie de leur vision du monde repose sur le fait de repousser la fin du monde, une idée qui trouve un écho favorable parmi certains de nos guerriers."
 fetishist_flavor.404.a:0 "Affronter la mort fait partie de la vie."
 fetishist_flavor.405.t:0 "Dame des Occis"
 fetishist_flavor.405.d:0 "Nous avons rencontré une femme qui prétend être une représentante des « seidkonur », un ordre de voyantes chamaniques. Elle nous dit qu'elles suivent la déesse « Freyja », patronne de l'amour, de la magie et de la guerre. Elle chevauche au combat dans un char tiré par deux chats, vêtue d'un manteau enchanté de plumes de faucon, et parmi les guerriers tombés, elle en choisit la moitié pour résider dans son royaume « Fólkvangr ». Elle promet que si nous jurons notre allégeance à Freyja, la magie seid sera nôtre, à utiliser pour le bien ou le mal..."
 fetishist_flavor.405.a:0 "Une promesse des plus intrigantes."
 fetishist_flavor.406.t:0 "Les Lois d'Igziabeher"
 fetishist_flavor.406.d:0 "Il y a quelques lunes, on nous a parlé d'un peuple qui se nomme « Israélites » et prétend être le peuple élu d'Igziabeher, le Dieu Unique. Nous avons pris contact et discuté avec certains d'entre eux depuis.\n\nIls nous ont raconté comment, par l'intermédiaire du prophète Moïse, ils ont reçu les lois d'Igziabeher. Elles sont écrites dans l'« Orit », leur écriture sainte, dont ils nous ont offert une copie. En échange du respect de ces lois, les Israélites sont sous Sa protection. Ils attendent l'arrivée du Roi Messie qui régnera sur le Royaume de Dieu et inaugurera une ère de paix et de liberté éternelles. Il n'y aura plus de mort et ceux qui sont décédés seront ressuscités par Igziabeher. Quiconque aura suivi les lois de Dieu vivra éternellement dans le bonheur tandis que les pécheurs seront punis et exécutés."
 fetishist_flavor.406.a:0 "La vie éternelle, dites-vous ? Nous ferons étudier l'Orit de très près..."
 fetishist_flavor.407.t:0 "Le Feu Éternel"
 fetishist_flavor.407.d:0 "Un groupe de voyageurs est arrivé à [Root.Capital.GetCapitalName] demandant une audience avec [Root.Monarch.GetName]. Ils apportent avec eux un feu qui ne doit pas s'éteindre, et qu'ils prétendent avoir maintenu allumé pendant des mois alors qu'ils voyageaient depuis des terres lointaines pour chercher notre protection. Ils suivent le grand prophète Zoroastre et nous avons compris que leur patrie d'origine a été perdue il y a des siècles. Depuis, ils survivent dans des communautés autour de l'océan Indien où ils continuent à pratiquer leurs anciennes traditions.\nLes étrangers semblent désireux de partager leur savoir sur la façon dont le monde est en lutte constante entre l'ordre et le chaos, Ahura Mazda et Angra Mainyu, mais ne semblent pas s'attendre à ce que nous le prenions à cœur. Ils demandent cependant à être autorisés à établir un temple pour leur feu à [Root.Capital.GetCapitalName] et promettent que, bien qu'ils soient peu nombreux, ils pourront enrichir notre société, tout comme le sucre versé dans le lait peut rendre toute la boisson plus douce et apaisante."
 fetishist_flavor.407.a:0 "Humata, Hukhta, Huvarshta."
 fetishist_flavor.408.t:0 "Un Rite de Fertilité"
 fetishist_flavor.408.d.a:0 "Le « Wotan », chamane en chef des voyantes seidkonur, nous a approchés concernant l'absence d'enfants du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Bien que nous nous soyons principalement inquiétés de la ligne de succession, le Wotan s'inquiète également de [Root.Monarch.GetHerHis] dévotion envers Freyja. Elle suggère un rite de fertilité dans lequel le [Root.Monarch.GetTitle] s'unira à l'une des seidkonur. Si Freyja reçoit suffisamment de respect et de sacrifices, le Wotan est convaincu qu'une telle union produira un enfant fort et béni."
 fetishist_flavor.408.d.b:0 "Le « Wotan », chamane en chef des voyantes seidkonur, nous a approchés concernant l'absence d'enfants du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Bien que nous nous soyons principalement inquiétés de la ligne de succession, le Wotan s'inquiète également de [Root.Monarch.GetHerHis] dévotion envers Freyja. Elle suggère un rite de fertilité dans lequel le [Root.Monarch.GetTitle] s'unira à un « seidmadur », l'un des rares praticiens masculins du seid. Si Freyja reçoit suffisamment de respect et de sacrifices, le Wotan est convaincu qu'une telle union produira un enfant fort et béni."
 fetishist_flavor.408.a:0 "Cela ne peut pas faire de mal. Au moins les seidkonur seront satisfaites."
 fetishist_flavor.408.a.tt:0 "Organiser un impressionnant rite de fertilité dans l'espoir de produire un héritier. Bien que le Wotan semble certainement convaincu, les dieux sont connus pour être capricieux et il n'y a aucune garantie. Un rite raté pourrait même nuire à l'honneur du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§!."
 fetishist_flavor.408.b:0 "Le [Root.Monarch.GetTitle] n'a pas besoin d'intervention divine pour produire un héritier !"
 fetishist_flavor.408.b.tt:0 "Ne pas procéder à l'idée du Wotan."
 displeased_the_wotan:0 "Wotan mécontent"
 desc_displeased_the_wotan:0 "Nous n'avons pas accepté la suggestion du Wotan, ce qui nous a valu sa désapprobation ainsi que celle des autres seidkonur."
 fetishist_flavor.409.t:0 "La Bénédiction de la Dame"
 fetishist_flavor.409.d.a:0 "Louée soit Freyja, très belle dame de l'amour et de la fertilité ! Notre puissant et pieux [Root.Monarch.GetTitle] [Root.Monarch.GetName] a engendré non pas un, mais deux enfants ! La seidkona du rite de fertilité a donné naissance à deux robustes et saines jumelles. Comme Freyja elle-même est mère de deux filles, cela a été interprété comme un signe d'approbation divine. En l'honneur de Freyja, les nourrissons ont été nommées Hnoss et Gersemi d'après ses filles. Le Wotan nous assure que l'une ou l'autre fera une excellente souveraine un jour."
 fetishist_flavor.409.d.b:0 "Louée soit Freyja, très belle dame de l'amour et de la fertilité ! Notre vibrante et pieuse [Root.Monarch.GetTitle] [Root.Monarch.GetName] est mère de non pas un, mais deux enfants ! Neuf mois après le rite de fertilité, elle a donné naissance à deux robustes et saines jumelles. Comme Freyja elle-même est mère de deux filles, cela a été interprété comme un signe d'approbation divine. En l'honneur de Freyja, les nourrissons ont été nommées Hnoss et Gersemi d'après ses filles. Le Wotan nous assure que l'une ou l'autre fera une excellente souveraine un jour."
 fetishist_flavor.409.a:0 "La belle Hnoss guidera notre peuple !"
 fetishist_flavor.409.b:0 "La forte petite Gersemi régnera sur [Root.GetName] !"
 fetishist_flavor.410.t:0 "Une Bénédiction refusée"
 fetishist_flavor.410.d.a:0 "Des mois se sont écoulés depuis le rite de fertilité et la seidkona avec qui le [Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est uni ne montre aucun signe de grossesse. Malgré l'impressionnant sacrifice en l'honneur de Freyja, elle n'a pas accordé sa bénédiction au [Root.Monarch.GetTitle]. Les gens murmurent sur la virilité défaillante du [Root.Monarch.GetTitle] et l'avenir incertain de notre nation..."
 fetishist_flavor.410.d.b:0 "Des mois se sont écoulés depuis le rite de fertilité et le [Root.Monarch.GetTitle] [Root.Monarch.GetName] ne montre aucun signe de grossesse. Malgré l'impressionnant sacrifice en l'honneur de Freyja, elle n'a pas accordé sa bénédiction au [Root.Monarch.GetTitle]. Les gens murmurent sur le ventre stérile du [Root.Monarch.GetTitle] et l'avenir incertain de notre nation..."
 fetishist_flavor.410.a:0 "Freyja, pourquoi nous as-tu abandonnés ?"
 fetishist_flavor.411.t:0 "Le Pouvoir de la Magie"
 fetishist_flavor.411.d:0 "Le chamane en chef des voyantes seidkonur nous a approchés en ces temps de conflit. Elle nous dit qu'un sort bien tissé, avec la bénédiction de Freyja, pourrait nous être bénéfique dans la guerre contre les infidèles [freyja_enemy.GetAdjective]. Bien que les seidkonur de Freyja soient certainement puissantes, nos conseillers nous avertissent également que la magie est chose capricieuse et que les sorts sont connus pour se retourner contre leur auteur..."
 fetishist_flavor.411.a:0 "Protégez nos braves guerriers ! Qu'ils ne tombent jamais au combat."
 fetishist_flavor.411.a.tt:0 "Demander aux seidkonur de tisser un sort pour le succès à la guerre, à vos risques et périls..."
 fetishist_flavor.411.a.pos:0 "un résultat positif."
 fetishist_flavor.411.a.neg:0 "un résultat négatif."
 fetishist_flavor.411.b:0 "Les liens d'amitié sont plus puissants que n'importe quelle lame."
 fetishist_flavor.411.b.tt:0 "Demander aux seidkonur de tisser un sort pour le succès diplomatique, à vos risques et périls..."
 fetishist_flavor.411.c:0 "Nous ne sommes pas encore assez désespérés pour nous mêler de la trame du destin."
 fetishist_flavor.411.c.tt:0 "Décliner l'offre du Wotan."
 fetishist_flavor.412.t:0 "Guerriers de Freyja"
 fetishist_flavor.412.d:0 "Dernièrement, nos braves guerriers ont dépassé les attentes, comme guidés par une puissance supérieure. Il semble que le sort tissé par les seidkonur ait finalement été couronné de succès."
 fetishist_flavor.412.a:0 "Gloire à Freyja, la plus féroce de toutes les déesses !"
 freyjas_chosen:0 "Élus de Freyja"
 desc_freyjas_chosen:0 "Les guerriers de la nation dépassent les attentes. Certains disent qu'ils sont bénis par Freyja."
 fetishist_flavor.413.t:0 "L'Avidité de Freyja"
 fetishist_flavor.413.d:0 "Dernièrement, nous avons été malchanceux au combat. Plusieurs grands guerriers sont tombés alors que les chances étaient en notre faveur. Beaucoup pointent du doigt les seidkonur, blâmant notre malheur sur leur sort. Ils croient que Freyja a été offensée par nos demandes et a décidé de réclamer davantage de braves champions pour son royaume « Fólkvangr », mais les voyantes insistent sur le fait qu'elles ne sont pas responsables."
 fetishist_flavor.413.a:0 "Freyja peut être une maîtresse sévère."
 greed_of_freyja:0 "Avidité de Freyja"
 desc_greed_of_freyja:0 "Les guerriers de la nation sont en dessous des attentes. Alors qu'ils tombent au combat, certains disent que Freyja réclame nos meilleurs champions pour elle-même."
 fetishist_flavor.414.t:0 "Déesse de l'Amour"
 fetishist_flavor.414.d:0 "Dernièrement, nos diplomates semblent tout faire correctement. Ils ne cessent d'impressionner tous ceux qu'ils rencontrent par leurs bonnes manières, leurs connaissances étendues et leur conversation spirituelle. Nous devrions profiter de notre bonne fortune pour construire des relations plus solides avec de futurs alliés. Il semble que le sort tissé par les seidkonur ait finalement été couronné de succès."
 fetishist_flavor.414.a:0 "Nul ne peut détester ceux qui sont bénis par Freyja."
 beloved_diplomats:0 "Diplomates bien-aimés"
 desc_beloved_diplomats:0 "Nos diplomates sont les bienvenus dans presque toutes les cours, où leurs manières, leurs connaissances et leur amabilité sont très appréciées."
 fetishist_flavor.415.t:0 "Insultes involontaires"
 fetishist_flavor.415.d:0 "Dernièrement, nos diplomates ont commis erreur sur erreur. Habituellement bien élevés et posés, beaucoup de leurs récents engagements se sont terminés de façon désastreuse. Par pure chance, ils n'ont offensé personne de trop important jusqu'ici, bien que nous devrions être prudents. Beaucoup pointent du doigt les seidkonur, blâmant notre malheur sur leur sort. Ils croient que Freyja était mécontente que nous préférions parler plutôt que combattre notre chemin à travers la guerre, mais les voyantes insistent sur le fait qu'elles ne sont pas responsables."
 scorned_diplomats:0 "Diplomates méprisés"
 desc_scorned_diplomats:0 "Nos diplomates ont un don malencontreux pour commettre des maladresses dans des situations délicates. Ils ne reçoivent plus d'invitations aux événements importants comme autrefois."
 fetishist_flavor.416.t:0 "Le Quatrième Sentier"
 fetishist_flavor.416.d:0 "Le sage Bouddha nous a enseigné à suivre le Noble Chemin Octuple afin d'être libérés du cycle éternel de la mort et de la renaissance. Le Quatrième Sentier, « Samyag Karman » ou Action Juste, dit que nous ne devons pas commettre d'inconduite sensuelle, prendre ce qui ne nous appartient pas, blesser ou tuer. À bien des égards, Samyag Karman a rendu notre nation stable et prospère, mais cela a ses inconvénients. Pour ne pas déplaire au Bouddha, des moines de la province de [no_killing_province.GetName] ont encouragé nos sujets à ne pas rejoindre l'armée. Au début, leur influence était négligeable, cependant, avec le temps, la parole s'est répandue et nous commençons à en ressentir les conséquences."
 fetishist_flavor.416.a:0 "Rester fidèle au Noble Sentier est une entreprise honorable."
 fetishist_flavor.416.a.tt:0 "Permettre aux hommes qui veulent suivre le Noble Sentier de rester hors de l'armée."
 fetishist_flavor.416.b:0 "Leur devoir envers notre nation est plus grand que celui envers le Bouddha !"
 fetishist_flavor.416.b.tt:0 "Forcer les déserteurs à rejoindre l'armée. Eux, ainsi que leurs proches, résisteront probablement."
 doing_no_harm:0 "Ne faire aucun mal"
 desc_doing_no_harm:0 "Certains des hommes valides de cette province refusent de rejoindre l'armée en raison de convictions religieuses, du moins c'est ce qu'ils prétendent."
 forced_conscription:0 "Conscription forcée"
 desc_forced_conscription:0 "Certains hommes de cette province sont forcés de rejoindre l'armée, malgré leurs convictions religieuses."
 fetishist_flavor.417.t:0 "L'Esprit de Générosité"
 fetishist_flavor.417.d:0 "Pour grandir en tant qu'êtres humains et approcher la libération spirituelle, nous devons acquérir du mérite. Selon les enseignements du Bouddha, nous le faisons par de bonnes actions, des actes et des pensées, et l'accumulation de mérite se reportera sur nos prochaines incarnations. Le signe ultime d'un bon cœur est le transfert volontaire de mérite aux autres. Cela prouve que nous n'accomplissons pas seulement de bonnes actions, actes et pensées pour notre propre bénéfice, mais pour celui de tous les autres également.\n\nNotre grand souverain, le [Root.Monarch.GetTitle] [Root.Monarch.GetName], a organisé une grande cérémonie au sanctuaire de la famille [Root.Monarch.Dynasty.GetName]. À la fin, [Root.Monarch.GetSheHe] transmettra le mérite qu'[Root.Monarch.GetSheHe] a accumulé durant le rituel. À qui devra-t-[Root.Monarch.GetSheHe] le dédier ?"
 selfless_ruler:0 "Souverain désintéressé"
 desc_selfless_ruler:0 "Lors d'une grande cérémonie, notre souverain a généreusement dédié du mérite à toute vie sensible."
 fetishist_flavor.417.a:0 "[Root.Monarch.GetHerHisCap] ancêtres, afin d'alléger leurs souffrances dans la prochaine vie."
 fetishist_flavor.417.a.tt:0 "Tout le monde sera rappelé de la grande ascendance du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§!."
 fetishist_flavor.417.b:0 "Tous les êtres sensibles, pour le bien commun."
 fetishist_flavor.417.b.tt:0 "Tout le monde sera ému par la nature humble et généreuse du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§!."
 fetishist_flavor.418.t:0 "Retour au bercail"
 fetishist_flavor.418.d:0 "Il y a plus de mille ans, les Israélites furent exilés de la Terre Promise et depuis lors, les enfants d'Abraham ont été dispersés à travers le monde sans véritable royaume à appeler leur. Avec le temps, nos traditions et pratiques ont changé et divergé. Nous-mêmes n'avons que récemment retrouvé notre chemin vers Igziabeher et sommes maintenant farouchement protecteurs de notre propre identité Haymanot émergente.\n\nUne grande tribu de vagabonds est récemment arrivée dans la province de [Root.GetName]. Bien qu'ils prétendent également être les descendants d'Abraham, et que beaucoup de leurs coutumes reflètent les nôtres, il y a certaines différences. Quand ils prient, ils le font à « Yahweh » et l'écriture qu'ils portent se nomme la « Torah ». Ils ont demandé à s'installer ici sous notre protection. Bien que nombre d'entre eux soient des artisans qualifiés et des érudits sages, des ressources qui profiteraient sans doute à notre nation, nos conseillers nous mettent en garde contre les frictions qui apparaîtront certainement entre ces nouveaux venus et nos sujets actuels..."
 fetishist_flavor.418.a:0 "Bien sûr que nos frères et sœurs resteront !"
 fetishist_flavor.418.a.tt:0 "Un grand nombre d'immigrants juifs s'installent dans la province de [Root.GetName]."
 fetishist_flavor.418.b:0 "Ils ne sont pas comme nous, pas de vrais disciples d'Igziabeher."
 fetishist_flavor.418.b.tt:0 "Les immigrants juifs sont exilés."
 jewish_immigrants:0 "Immigrants juifs"
 desc_jewish_immigrants:0 "Cette province a récemment reçu un grand afflux d'immigrants juifs."
 fetishist_flavor.419.t:0 "Exigence des Juifs"
 fetishist_flavor.419.d:0 "Bien qu'ils fussent certainement reconnaissants au début, la population juive de [Root.GetName] est devenue de plus en plus mécontente. Les frictions entre eux et les sujets Haymanot nous ont causé bien des nuits blanches. Les Juifs ont également commencé à se plaindre du manque d'influence qu'ils ont dans les affaires de la nation, maintenant qu'ils en font partie. Ils exigent que l'un de leurs dirigeants, le maître de guilde Isaïe, obtienne un siège au conseil des conseillers. Bien que cela satisferait certainement les Juifs, nous affaiblirions également notre autorité religieuse et irriterions nos sujets les plus fanatiques."
 fetishist_flavor.419.a:0 "Nous accepterons volontiers les sages conseils d'Isaïe."
 fetishist_flavor.419.b:0 "Ne vous avons-nous pas assez donné ? Sangsues ingrates..."
 blasphemous_advisor:0 "Conseiller blasphémateur"
 desc_blasphemous_advisor:0 "Les fervents disciples d'Igziabeher s'inquiètent de l'un de nos conseillers et de l'impact qu'il aura sur nos traditions et coutumes."
 dissatisfied_jews:0 "Juifs mécontents"
 desc_dissatisfied_jews:0 "La population juive locale est mécontente du manque d'influence qu'elle a concernant la conduite de notre nation."
 fetishist_flavor.420.t:0 "Profanation du Sanbat"
 fetishist_flavor.420.d:0 "Le Septième Jour après qu'Igziabeher eut créé le monde, Il se reposa. En Son honneur, nous gardons le septième jour de la semaine saint. Durant le Sanbat, du coucher du soleil la veille jusqu'à l'apparition des étoiles, nous ne travaillons pas, n'écrivons pas et ne cuisinons pas. Nous n'allumons même pas de feux. Profaner le Sanbat est un crime contre les lois de Dieu.\n\nOn a appris que l'un de nos conseillers les plus fiables, [Root.Adm_Advisor.GetName], travaille souvent durant le Sanbat. Alors que certains des manifestants les plus extrêmes exigent qu'[Root.Adm_Advisor.GetSheHe] soit lapidé à mort pour [Root.Adm_Advisor.GetHerHis] façons pécheresses, nous ne voulons pas créer un dangereux précédent. Après tout, [Root.Adm_Advisor.GetName] n'est pas le seul à la cour à violer le Sanbat, bien qu'[Root.Adm_Advisor.GetSheHe] soit le coupable le plus régulier et le moins discret. Simplement le renvoyer apaiserait certainement la majorité, bien que [Root.Adm_Advisor.GetHerHis] expérience en ferait une grande perte..."
 fetishist_flavor.420.a:0 "Nous ne pouvons permettre qu'un caractère moral aussi pauvre représente notre gouvernement."
 fetishist_flavor.420.b:0 "[Root.Adm_Advisor.GetName] est trop important pour notre [Root.GovernmentName]. [Root.Adm_Advisor.GetSheHeCap] restera."
 fetishist_flavor.450.t:0 "La Nature de Dieu"
 fetishist_flavor.450.d:0 "Notre vénération du Dieu chrétien nous a généralement beaucoup rapprochés des [christian_neighbor.GetAdjective], mais il y a toujours ce léger sentiment que nous parlons à côté l'un de l'autre plutôt que des mêmes choses en matière de théologie. Cela a été encore plus mis en évidence aujourd'hui lorsque, lors d'une cérémonie d'État conjointe, notre ambassadeur en [christian_neighbor.GetName] s'est lancé dans une discussion animée sur la nature de la Sainte Trinité. Les [christian_neighbor.GetAdjective] s'offensent clairement de la façon dont le Père, le Fils et le Saint-Esprit sont vénérés dans nos terres."
 fetishist_flavor.450.a:0 "Quelque chose a dû se perdre dans la traduction ?"
 fetishist_flavor.450.b:0 "S'excuser et tenter de réparer le désaccord."
 fetishist_flavor.451.t:0 "La Grande Communauté Chrétienne"
 fetishist_flavor.451.d:0 "Pour le monde chrétien au sens large, notre vénération de leur Dieu doit sembler un miracle. Bien qu'ils puissent contester certaines de nos interprétations, il semble y avoir un soulagement général que la parole de Dieu puisse se répandre parmi les païens. Partout où ils vont, nos diplomates semblent être accueillis à bras ouverts."
 fetishist_flavor.451.a:0 "Kyrie Eleison"
 fetishist_flavor.451.a.tt:0 "Les relations avec tous les pays chrétiens améliorées de §G50§!."
 fetishist_flavor.452.t:0 "Mission chrétienne en [Root.GetName]"
 fetishist_flavor.452.d:0 "En ouvrant nos bras au Dieu chrétien, nous avons également attiré un certain nombre de ses disciples. Un flux constant de marchands, prêtres, moines et aventuriers aide maintenant, entre autres, à répandre la parole de Dieu dans nos terres.\nUn groupe de missionnaires de [christian_missionary_origin.GetName] souhaite maintenant s'installer en [Root.GetName]."
 fetishist_flavor.452.a:0 "Quel mal pourrait venir d'accueillir des hommes de Dieu ?"
 fetishist_flavor.452.b:0 "Nous devons maintenir nous-mêmes le contrôle sur les fidèles."
 fetishist_flavor.452.b.tt:0 "En refusant les missionnaires, nous éviterons que des sectes chrétiennes étrangères se répandent dans nos terres, mais nous irriterons leur pays d'origine."
 christian_unorthodoxy:0 "Hétérodoxie chrétienne"
 christian_brotherhood:0 "Fraternité chrétienne"
 christian_mission_fetishism:0 "Mission chrétienne"
 desc_christian_mission_fetishism:0 "Nous avons autorisé des missionnaires à s'installer dans cette province. En échange de la permission de répandre leur foi, ils travaillent activement à améliorer l'infrastructure locale pour soutenir la communauté ici."
 fetishist_flavor.455.t:0 "Un Voyageur lointain"
 fetishist_flavor.455.d:0 "Un Qadi érudit, bien formé en jurisprudence islamique, a daigné honorer notre pays de sa visite. Il semble qu'il voyage à travers le monde islamique pour apporter ordre et structure au système juridique et observer les diverses façons dont la vie et les paroles du prophète sont enseignées. Bien que ce soit un grand honneur qu'un tel homme visite [Root.Capital.GetCapitalName], il serait peut-être encore plus bénéfique si nous pouvions le convaincre de rester..."
 fetishist_flavor.455.a:0 "Offrons-lui une généreuse dotation."
 fetishist_flavor.455.b:0 "Quel grand jour."
 fetishist_flavor.456.t:0 "Marchands Shirazi"
 fetishist_flavor.456.d:0 "Un groupe de marchands Shirazi de l'Est s'est établi en [Root.GetName], espérant apporter de nouvelles marchandises aux villes portuaires d'où ils viennent. Bien que les Shirazi prétendent être originaires de quelques familles qui furent les premiers musulmans à s'installer sur la côte africaine, leur Islam mélange généreusement rituels et cérémonies magiques. En [Root.GetName], ils se sentent chez eux et la population locale n'a eu aucun problème avec eux."
 fetishist_flavor.456.a:0 "Parfait."
 fetishist_flavor.457.t:0 "Tensions religieuses en [Root.GetName]"
 fetishist_flavor.457.d:0 "Notre adoption de l'Islam comme nouvelle religion s'est généralement déroulée sans heurts. Du moins dans les régions où les musulmans ne sont pas encore majoritaires. En [Root.GetName], cependant, la nouvelle religion compte un grand nombre de pratiquants, dont certains estiment que notre théologie est un peu trop libérale. Un récent afflux de convertis de la partie moins orthodoxe du pays a créé des tensions notables. Pour contrôler ses sujets, notre représentant local a amené encore plus de convertis récents comme soldats, ce qui n'a fait qu'enflammer la situation. Il semble que ce ne soit qu'une question de temps avant que la violence n'éclate..."
 fetishist_flavor.457.a:0 "Remplacer le gouverneur immédiatement."
 fetishist_flavor.457.b:0 "Nous devons utiliser la force pour calmer la situation."
 fetishist_flavor.458.t:0 "Propagation de l'Islam"
 fetishist_flavor.458.d:0 "Les missionnaires [muslim_missionary_origin.GetAdjective] sont devenus une vue de plus en plus courante en [Root.GetName] et leur message a bien trouvé écho auprès de la population de la province. Cela est allé si loin qu'il est difficile de dire si la province adhère encore aux traditions de ses ancêtres. Pour le meilleur ou pour le pire, [Root.GetName] est maintenant une région véritablement islamique."
 fetishist_flavor.458.a:0 "Dieu est grand."
 qadi_in_fetishist_lands:0 "Qadi respecté"
 desc_qadi_in_fetishist_lands:0 "Un érudit juridique et juge respecté s'est installé dans notre royaume."
 shirazi_merchant_presence:0 "Communauté marchande Shirazi"
 desc_shirazi_merchant_presence:0 "Un groupe de commerçants musulmans s'est installé dans notre province."
 fetishist_flavor.460.t:0 "Migration zoroastrienne"
 fetishist_flavor.460.d:0 "La nouvelle de notre vénération de la foi Mazdéenne s'est répandue parmi les diverses communautés zoroastriennes exilées. Les temples du feu de [Root.GetCapitalName] ont acquis une renommée particulière, et maintenant un grand nombre de zoroastriens ont commencé à arriver dans la région pour commencer une nouvelle vie dans ce qu'ils espèrent être une terre plus hospitalière.\nBien que certains trouvent troublant que la province perde si rapidement le contact avec les traditions de nos ancêtres, le flux constant d'érudits, de marchands et d'autres hommes et femmes de valeur aidera certainement la région à croître."
 fetishist_flavor.460.a:0 "Nous devons accueillir nos frères et sœurs venus de loin !"
 fetishist_flavor.460.b:0 "Nous devons sauvegarder nos traditions !"
 zoroastrian_migration_into_africa:0 "Migration zoroastrienne"
 desc_zoroastrian_migration_into_africa:0 "Des membres de la diaspora zoroastrienne sont venus s'installer dans cette province, jurant d'aider notre administration locale de toutes les manières possibles en échange de notre protection."
 fetishist_flavor.461.t:0 "Feu de [Root.GetName] éteint"
 fetishist_flavor.461.d:0 "Avec le temps, un nombre croissant de temples du feu ont été consacrés en utilisant le feu original apporté par les disciples de Zoroastre. À mesure que la foi se répand, cependant, elle a également réussi à irriter certains de nos sujets les plus traditionalistes. Un temple du feu consacré assez près du sanctuaire de l'un des ancêtres les plus vénérés en [Root.GetName] a conduit à une hostilité ouverte entre les disciples des anciennes voies et les « Mages » de l'Est. Les traditionalistes ont fait irruption dans le temple et éteint le feu sacré."
 fetishist_flavor.461.a:0 "Yatha ahu vairyo."
 zoroastrian_unrest:0 "Tensions religieuses"
 desc_zoroastrian_unrest:0 "Les tensions sont vives entre les adeptes du nouveau culte Mazdéen et les disciples de nos traditions plus anciennes."
 TRADING_CITY_TOOLTIP:0 "§YCréer une cité marchande§!"
 TRADING_CITY_ONLY_TRADE_LEAGUE_LEADER:0 "\nSeul le chef d'une ligue commerciale peut créer une cité marchande."
 TRADING_CITY_ONLY_ONE_PER_TRADE_NODE:0 "\nVotre ligue commerciale ne peut avoir qu'une seule cité marchande dans le même nœud commercial."
 TRADING_CITY_CAPITAL:0 "\nVous ne pouvez pas céder votre province capitale à une cité marchande."
 CANT_LEAD_TRADE_LEAGUE:0 "\nVous ne pouvez pas diriger une ligue commerciale car :\n"
 trading_city:0 "Cité marchande"
 trading_city_desc:0 "Une forme gouvernementale où la nation est dirigée comme une république fortement dépendante du commerce.\nLes cités marchandes ne peuvent être créées que par le chef d'une ligue commerciale.\nSi une cité marchande s'étend à plus d'une province, la forme de gouvernement changera en §YRépublique marchande§!.\n"
 trading_city_legacy:0 "Cité marchande"
 trading_city_legacy_desc:0 "Une forme gouvernementale où la nation est dirigée comme une république fortement dépendante du commerce.\nLes cités marchandes ne peuvent être créées que par le chef d'une ligue commerciale.\nSi une cité marchande s'étend à plus d'une province, la forme de gouvernement changera en §YRépublique marchande§!.\n"
 fetishist_flavor.500.t:0 "Le Conseil de [Root.Capital.GetCapitalName]"
 fetishist_flavor.500.d:0 "Nos anciens s'inquiètent que la paix et la bonne fortune aient fait dégénérer les récentes générations de notre communauté : ils disent que nos guerriers sont devenus mous et l'esprit de nos érudits, émoussé. « Ce n'est pas à quoi devrait ressembler le culte Teotl », argumentent-ils. Pour apaiser ces membres savants de notre société, nous pourrions faire construire un bâtiment pour abriter des érudits et des devins afin de cartographier les étoiles. Nous pourrions également effectuer un sacrifice de sang au nom du Dieu Soleil."
 fetishist_flavor.500.a:0 "Construire un observatoire."
 fetishist_flavor.500.a.tt:0 "Si l'entreprise réussit, une puissante pyramide pourrait nous accorder un savoir sublime pendant des générations."
 fetishist_flavor.500.b:0 "Faire confiance au pouvoir du sacrifice."
 fetishist_flavor.500.b.tt:0 "Si le sacrifice se déroule comme prévu, notre souverain sera renommé pour [Root.Monarch.GetHerHis] dévotion."
 fetishist_flavor.501.t:0 "Contempler les étoiles"
 fetishist_flavor.501.d:0 "En combinant des ingénieurs hautement qualifiés et les dernières innovations architecturales, nos ouvriers ont érigé une magnifique pyramide. La porte du bâtiment fait parfaitement face à l'est : chaque matin, le Dieu Soleil nous offre sa lumière en remerciement de l'effort que nous avons mis dans ce magnifique temple."
 fetishist_flavor.501.a:0 "Parfait !"
 fetishist_flavor.502.t:0 "Le Sang d'un [Root.Monarch.GetTitle]"
 fetishist_flavor.502.d:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] de notre magnifique [Root.GovernmentName] s'est avancé vers l'autel avec une détermination féroce. Le soleil couchant a scintillé sur la lame d'obsidienne qu'[Root.Monarch.GetSheHe] tenait et le chant des prêtres s'est intensifié. Alors qu'[Root.Monarch.GetSheHe] faisait une entaille nette sur toute la longueur de [Root.Monarch.GetHerHis] bras, la foule a acclamé. Le sang dégoulinant encore de [Root.Monarch.GetHerHim], [Root.Monarch.GetSheHe] a hoché solennellement la tête vers les anciens assis dans l'audience. L'un d'eux a souri alors qu'une file de guerriers impatients commençait à se former vers l'autel."
 fetishist_flavor.502.a:0 "Pour le Soleil !"
 fetishist_flavor.503.t:0 "L'Architecture de l'échec"
 fetishist_flavor.503.d:0 "Le mauvais temps et une mauvaise gestion ont conduit les ouvriers à poser leurs outils et à abandonner la construction d'un observatoire. Au lieu de cela, ils se plaignent d'avoir trop longtemps supporté des salaires et des conditions de travail injustes ; certains ont même mis le feu au site de construction prévu. Les membres mécontents du conseil des anciens secouent la tête."
 fetishist_flavor.503.a:0 "Typique !"
 fetishist_flavor.504.t:0 "Sous le regard des Ancêtres"
 fetishist_flavor.504.d:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est avancé nerveusement vers l'autel. La lame tremblait dans [Root.Monarch.GetHerHis] main tandis que la foule retenait son souffle. Fermant [Root.Monarch.GetHerHis] yeux, [Root.Monarch.GetSheHe] a ensuite enfoncé le poignard dans [Root.Monarch.GetHerHis] peau...\n\nL'entaille qu'[Root.Monarch.GetSheHe] a faite devait être profonde car le sang qui a coulé sur le sol de pierre l'a rapidement peint en rouge en dégoulinant le long des marches. Le liquide a brillé dans les braises du crépuscule et le [Root.Monarch.GetTitle] n'a eu que le temps d'entendre les prêtres remplacer leur chant par des halètements avant de s'évanouir.\n\nQuand [Root.Monarch.GetName] s'est réveillé, [Root.Monarch.GetSheHe] n'était plus tout à fait le même."
 fetishist_flavor.504.a:0 "Quelle honte !"
 fetishist_flavor.505.t:0 "Idoles d'or"
 fetishist_flavor.505.d:0 "Un fin artisan de bijoux en or a acquis une certaine renommée dans nos terres. Sa popularité lui a permis d'agrandir considérablement son atelier et il a déjà pris plusieurs apprentis sous son aile. Notre noblesse est particulièrement intriguée par sa spécialisation dans les délicates idoles d'or : représentant divers dieux et conservées pour la protection divine, elles prennent la forme de serpents, d'aigles et de jaguars. Sans surprise, il est devenu très à la mode de garder ces totems près de soi, de préférence en pendentif autour du cou."
 fetishist_flavor.505.a:0 "Charmant !"
 fetishist_flavor.506.t:0 "L'Unité du Sang"
 fetishist_flavor.506.d:0 "Ce matin, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a reçu une missive de l'un des anciens de [worried_province.GetName], nous assurant des bienfaits d'un grand sacrifice au Serpent à Plumes.\n\nIl est indéniable que le temps ces derniers mois a été inhabituellement sec, particulièrement en [worried_province.GetName]. Les habitants s'inquiètent pour leurs récoltes tandis que les anciens locaux élèvent la voix de plus en plus fort chaque jour : leurs devins l'avaient prédit depuis des mois, disent-ils, remettant en question la nonchalance et le manque de foi des villageois. Il y a un étrange air d'élitisme qui se développe parmi les anciens alors que certains se moquent des fermiers anxieux qui cherchent maintenant leur conseil.\n\nEn relisant la missive, le [Root.Monarch.GetTitle] est perplexe. Peut-être qu'une cérémonie élaborée est précisément ce qu'il faut pour stabiliser la région ?"
 fetishist_flavor.506.a:0 "Ordonner une cérémonie extravagante de sang !"
 fetishist_flavor.506.b:0 "Nous avons des affaires plus importantes en cours."
 fetishist_flavor.507.t:0 "Sous une Lune froide"
 fetishist_flavor.507.d:0 "La lune pendait sinistrement dans le ciel au-dessus de la foule, les visages des prêtres éclairés en rouge par la lumière de leurs torches. L'air était silencieux, hormis le bruit des pas traînants menant à l'autel : une douzaine d'hommes étaient menés, ou traînés, vers le centre de la cérémonie. [worried_province.GetName] a rarement vu un tel rituel et il était clair que cela aurait un impact sur la foule, jeunes et vieux, qui regardait nerveusement. Après avoir passé un mois en silence, le grand prêtre a finalement appelé les dieux d'une voix suppliante tandis qu'un malheureux villageois était maintenu sur l'autel. Son cœur, ainsi que ceux des autres sacrifiés, était sur le point d'être arraché de son corps, « libéré » pour rejoindre les esprits."
 fetishist_flavor.507.a:0 "Nous devrions refaire cela un jour."
 fetishist_flavor.507.b:0 "C'est notre mode de vie."
 fetishist_flavor.508.t:0 "Un Effort gaspillé"
 fetishist_flavor.508.d:0 "C'était une soirée sombre et nuageuse lorsque les habitants de [worried_province.GetName], comme ordonné par leurs anciens, s'étaient rassemblés pour être témoins du grand sacrifice. « Cela sauvera [worried_province.GetName] », proclama le grand prêtre. « Cela arrêtera la sécheresse, mais cela ne semble plus vraiment nécessaire », murmuraient les gens, certains regardant le ciel. Étaient-ce des nuages de pluie ?\nLes dons prévus au Serpent à Plumes criaient et pleuraient en protestant alors qu'ils étaient traînés vers la scène de la cérémonie. La tension était lourde et un ancien a changé nerveusement de position.\nSoudain, le ciel a craqué de tonnerre et la pluie a commencé à se déverser sur la scène. La foule a sombré dans le chaos alors que cris et hurlements emplissaient l'air : certains villageois luttaient pour sauver leurs proches d'être sacrifiés en vain ! Le couteau cérémoniel, levé en défense terrifiée par le grand prêtre, s'est abattu en panique sur les gens alors que les anciens vénérés tentaient de fuir la scène."
 fetishist_flavor.508.a:0 "Terrible nouvelle !"
 distrust_of_the_elders:0 "Méfiance envers les anciens"
 desc_distrust_of_the_elders:0 "Les anciens ici ont fait des prophéties très inexactes."
 blessed_rains:0 "Pluies bénies"
 desc_blessed_rains:0 "Les habitants d'ici pratiquent le sacrifice humain rituel après chaque récolte."
 fetishist_flavor.510.t:0 "Un Guru béni"
 fetishist_flavor.510.d:0 "Nous avons entendu parler d'un homme de basse naissance possédant une présence apaisante et un talent pour les mots, tout en semblant sage dans les voies de la philosophie. Ses semblables le traitent avec le plus grand respect, comme s'il était de la caste des Brahmanes. Curieusement, l'homme évite les possessions terrestres et ne demande jamais plus que l'occasion de prêcher sa sagesse aux autres ; en fait, il est devenu une sorte d'attraction locale alors que les gens cherchent son aide pour toutes sortes de questions, allant de celles du cœur à celles de l'agriculture ou du devoir civique. Certains nobles affirment qu'il commencera à faire payer ses conseils d'un jour à l'autre, tandis que d'autres le voient clairement destiné à autre chose qu'à passer le reste de sa vie à méditer dans le temple local."
 fetishist_flavor.510.a:0 "En faire notre conseiller de confiance."
 fetishist_flavor.510.b:0 "Il devrait rester dans son temple de village."
 fetishist_flavor.511.t:0 "Écriture sacrée"
 fetishist_flavor.511.d:0 "[dharmic_neighbor.GetName] nous a envoyé une lettre furieuse, nous informant d'un moine [Root.GetAdjective] problématique qui vend des livres à l'intérieur de leurs frontières, les faisant passer pour des textes sacrés. Non seulement il s'agit manifestement de matériel contrefait, mais l'écriture contient également plusieurs erreurs concernant la vision du monde hindoue, et les autorités de [dharmic_neighbor.GetName] nous accusent d'essayer d'inciter à des émeutes religieuses dans leurs rues. On peut arguer que le moine essayait simplement d'explorer sa propre philosophie, mais considérant la popularité des écrits en [dharmic_neighbor.GetName], il est raisonnable de supposer que ce moine est en effet un charlatan utilisant notre foi pour gagner de l'argent...\n\nLe mal étant déjà fait, tout ce que nous pouvons faire est d'envoyer des troupes pour trouver et escorter le moine hors du pays de [dharmic_neighbor.GetName]."
 fetishist_flavor.511.a:0 "Ainsi soit-il."
 dharmic_imitators:0 "Imitateurs de notre foi"
 selfless_guru:0 "Guru désintéressé"
 desc_selfless_guru:0 "Un vieil homme réside actuellement dans un village près de notre capitale, recevant humblement des visiteurs et offrant des conseils aux gens de toute la nation."
 in_honor_of_the_sun_god:0 "En l'honneur du Dieu Soleil"
 desc_in_honor_of_the_sun_god:0 "Les habitants d'ici ont adopté une forte culture du sacrifice humain rituel."
 rioting_workers:0 "Ouvriers révoltés"
 desc_rioting_workers:0 "Cette communauté est en proie au mécontentement et à la discorde."
 observatory_building:0 "Observatoire"
 desc_observatory_building:0 "Centre de divination et d'astronomie, cette province abrite une pyramide offrant une excellente vue sur les étoiles."
 warrior_of_the_sun:0 "Guerrier du Soleil"
 desc_warrior_of_the_sun:0 "Ce souverain a fait preuve d'une grande dévotion envers les dieux par un auto-sacrifice de sang volontaire."
 artisan_of_gold:0 "Artisan de l'or"
 desc_artisan_of_gold:0 "Un célèbre orfèvre et maître des totems réside ici."
 TRADING_CITY_NEW_TITLE:0 "Créer une nouvelle cité marchande"
 TRADING_CITY_NEW_DESC:0 "Souhaitez-vous créer une nouvelle cité marchande, lui donnant §Y$PROVINCE$§! comme capitale ?"
 rr_girondists:0 "Les Girondins"
 rr_girondists_influence:0 "Influence girondine"
 rr_girondists_FACTION_DESC:1 "Plutôt que de laisser la Révolution échapper à tout contrôle en interne, les Girondins veulent se concentrer sur sa propagation au-delà de nos frontières. Ils croient en une politique étrangère active et en la fin des régimes contre-révolutionnaires sur le continent.\n\n§YGagne de l'influence en étant en guerre et grâce à la tradition militaire. Perd de l'influence à cause de l'épuisement de guerre et en temps de paix.§!"
 support_rr_girondists_title:0 "Encourager les Girondins"
 support_rr_girondists_desc:0 ""
 rr_royalists:0 "Les Impériaux"
 rr_royalists_influence:0 "Influence impériale"
 rr_royalists_FACTION_DESC:1 "Les Impériaux souhaitent reprendre le contrôle de la révolution et centraliser à nouveau l'autorité. Ils prétendent respecter la volonté du peuple mais sont horrifiés par les excès et la terreur que l'opinion populaire incontrôlée peut engendrer. Si les Impériaux réussissent à prendre le contrôle, ils tenteront éventuellement de créer un Empire Révolutionnaire.\n\n§YGagne de l'influence grâce à l'épuisement de guerre.§!"
 support_rr_royalists_title:0 "Encourager les Impériaux"
 support_rr_royalists_desc:0 ""
 rr_jacobins:0 "Les Jacobins"
 rr_jacobins_influence:0 "Influence jacobine"
 rr_jacobins_FACTION_DESC:1 "Les Jacobins sont les plus fervents partisans de la révolution populaire. Ils croient que nous devons éliminer de force les anciennes classes dirigeantes et saisir leurs propriétés. Cette faction a le soutien des masses dans notre capitale et n'hésitera pas à les inciter à la violence pour le bien de la Révolution.\n\n§YL'influence dépend de la tradition républicaine et de la stabilité positive.§!"
 support_rr_jacobins_title:0 "Encourager les Jacobins"
 support_rr_jacobins_desc:0 ""
 consort_events.1.t:0 "Une Offre de mariage"
 consort_events.1.da:0 "C'est avec une certaine consternation que les puissantes familles du royaume ont observé [Root.Monarch.GetName] laisser passer les années sans trouver quelqu'un à épouser. Ces sentiments se sont maintenant transformés en consternation ouverte car, malgré l'absence d'une ligne de succession claire dans le royaume, notre [Root.Monarch.GetTitle] ne semble pas avoir de plans pour trouver un époux et ne montre guère d'intérêt pour les propositions qui lui sont envoyées.\nNous en sommes arrivés au point où la cour s'attend à ce que le [Root.Monarch.GetTitle] accepte l'une des offres sur la table. Continuer à ne pas assurer la succession met tout le royaume en danger. Heureusement, l'une des plus anciennes et prestigieuses familles [origin_of_queens_family.GetName] du [Root.GovernmentName] nous a offert la main de l'une de leurs filles, accompagnée d'une généreuse dot."
 consort_events.1.db:0 "Diriger un grand [Root.GovernmentName] peut être un travail accaparant et [Root.Monarch.GetName] n'a jamais reculé devant ce défi. Cependant, avec le temps, il devient de plus en plus clair que notre [Root.Monarch.GetTitle] ne consacre pas le temps et l'effort attendus pour trouver un nouveau consort. Bien qu'il soit raisonnable d'attendre une certaine période de deuil, ce temps est maintenant révolu.\nIl est grand temps que [Root.Monarch.GetName] prenne un nouvel époux. Heureusement, quand on est [Root.Monarch.GetTitle], les familles de haut rang du royaume sont impatientes de prêter main-forte."
 consort_events.1.dc:0 "La stabilité d'un royaume héréditaire repose sur une succession claire. Notre [Root.Monarch.GetTitle] reste un [Root.Monarch.GetWomanMan] non marié malgré avoir atteint l'âge du mariage sans héritier clair. Certaines des plus belles familles de notre [Root.GovernmentName] seraient ravies de nous aider en cette matière et seraient probablement prêtes à payer une dot astronomique pour ce privilège."
 consort_events.1.dd:0 "Avoir un membre de votre famille comme consort principal du [Root.Monarch.GetTitle] est un grand honneur que toutes les familles influentes de [Root.GetName] convoitent. Dans l'espoir de sécuriser une alliance durable, d'importants propriétaires terriens [origin_of_queens_family.GetName] ont envoyé une offre, et une dot astronomique, demandant que [Root.Monarch.GetName] épouse leur fille."
 consort_events.1.a:0 "Accepter l'offre."
 consort_events.1.a.tt:0 "En acceptant cette offre, il est entendu que la famille de notre nouveau conjoint peut s'attendre à certaines faveurs à l'avenir."
 consort_events.1.b:0 "[Root.Monarch.GetName] doit se réserver pour une meilleure offre."
 domain_of_spouses_family:0 "Siège de puissants aristocrates"
 desc_domain_of_spouses_family:0 "C'est le siège de la famille de notre consort royal. Leurs liens étroits avec notre souverain leur ont accordé un certain nombre de privilèges locaux qui ne peuvent être facilement révoqués tant que l'union dure."
 consort_events.2.t:0 "La Maison des [Root.Consort.Dynasty.GetName]"
 consort_events.2.d:0 "Avec l'union de [Root.Monarch.GetName] et [Root.Consort.GetName], nous avons gagné non seulement un époux mais aussi un nouvel allié dans le royaume. Les [Root.Consort.Dynasty.GetName] sont une famille ancienne et influente et leur siège à [origin_of_queens_family.GetName] est un joyau du [Root.GovernmentName].\nBien sûr, l'amitié doit être réciproque et on attendra de [Root.Consort.GetName] qu'[Root.Consort.GetSheHe] parle au nom de [Root.Consort.GetHerHis] famille tandis que notre [Root.Monarch.GetTitle] sera censé considérer ces conseils très attentivement."
 consort_events.2.a:0 "À une amitié éternelle !"
 consort_events.2.a.tt:0 "[origin_of_queens_family.GetName] est le siège de la famille de notre [Root.Consort.GetTitle]. Cette province sera moins susceptible de se révolter mais se verra accorder des privilèges rendant plus difficile de la taxer ou de la convertir."
 consort_events.3.t:0 "Grandes attentes"
 consort_events.3.d:0 "Un mariage politique est autant une union qu'un contrat de soutien mutuel. La famille [Root.Consort.Dynasty.GetName] s'attend à ce que le [Root.Monarch.GetTitle] tienne compte des conseils du [Root.Consort.GetTitle] et veille activement sur leurs (et [Root.Monarch.GetHerHis]) intérêts."
 consort_events.3.a:0 "Tout pour notre cher [Root.Consort.GetTitle]."
 consort_events.3.a.tt.0:0 "La famille [Root.Consort.Dynasty.GetName] se souviendra que nous sommes venus à leur aide."
 consort_events.3.a.tt.1:0 "La Couronne financera le développement des terres des [Root.Consort.Dynasty.GetName]."
 consort_events.3.a.tt.2:0 "La Couronne remboursera une partie de la dette des [Root.Consort.Dynasty.GetName]."
 consort_events.3.a.tt.3:0 "La Couronne favorisera les intérêts de la faction [Root.Consort.Dynasty.GetName] dans le royaume."
 consort_events.3.a.tt.4:0 "La Couronne aidera à se débarrasser d'un conseiller peu coopératif."
 consort_events.3.a.tt.5:0 "Les officiers de la famille [Root.Consort.Dynasty.GetName] seront favorisés pour la promotion sans égard au mérite."
 consort_events.3.a.tt.6:0 "Les officiers de la famille [Root.Consort.Dynasty.GetName] seront favorisés pour la promotion sans égard au mérite."
 consort_events.3.a.tt.6b:0 "Nous favoriserons les intérêts des [Root.Consort.Dynasty.GetName] lors de la création de nouvelles législations."
 consort_events.3.b:0 "Désolé, pas de faveurs spéciales."
 consort_events.3.b.tt:0 "Cela entraînera une moindre coopération des [Root.Consort.Dynasty.GetName] au niveau local et ils nous en tiendront également rigueur à l'avenir."
 consort_events.4.t:0 "Félicité conjugale"
 consort_events.4.d:0 "Sa Majesté le [Root.Consort.GetTitle] est bien sûr un compagnon constant et un bon conseiller à part entière. Cependant, en dehors de ce rôle, notre [Root.Consort.GetTitle] est également un représentant de la couronne auprès de la maison [Root.Consort.Dynasty.GetName] et vice versa. Parfois, cet arrangement n'est pas sans avantages.\nAujourd'hui, [Root.Consort.GetName] semble très heureux d'annoncer que [Root.Consort.GetHerHis] famille a décidé de montrer son soutien au trône et à l'union de [Root.Monarch.GetName] et [Root.Consort.GetName]."
 consort_events.4.a:0 "Puisse cette union nous profiter à tous deux."
 consort_events.4.a.tt.0:0 "La famille [Root.Consort.Dynasty.GetName] nous considérera comme étant en dette envers eux."
 consort_events.4.a.tt.1:0 "La famille [Root.Consort.Dynasty.GetName] aidera à développer l'infrastructure du royaume."
 consort_events.4.a.tt.2:0 "La famille [Root.Consort.Dynasty.GetName] contribuera de l'argent au trésor royal."
 consort_events.4.a.tt.3:0 "Les [Root.Consort.Dynasty.GetName] offrent de fournir un conseiller talentueux au conseil royal."
 consort_events.4.a.tt.4:0 "Les [Root.Consort.Dynasty.GetName] offrent de fournir un conseiller talentueux au conseil royal."
 consort_events.4.a.tt.5:0 "Les [Root.Consort.Dynasty.GetName] offrent de soutenir le trône contre les factions mécontentes du royaume."
 consort_events.4.a.tt.6:0 "Les [Root.Consort.Dynasty.GetName] offrent de fournir un conseiller talentueux au conseil royal."
 consort_events.4.b:0 "Nous devons éviter de nous endetter envers la famille [Root.Consort.Dynasty.GetName]."
 consort_events.4.b.tt:0 "En refusant l'aide, nous évitons d'augmenter les attentes de réciprocité de la famille de notre conjoint."
 consort_events.5.t:0 "La Famille d'abord ?"
 consort_events.5.d:0 "Lorsque [Root.Monarch.GetName] est devenu consort royal, les [Root.Monarch.Dynasty.GetName] étaient enthousiastes. Maintenant qu'[Root.Monarch.GetSheHe] est le régent royal du royaume, ils sont extatiques. [Root.Monarch.GetName] est maintenant l'un des, sinon le, plus puissant [Root.Monarch.GetWomanMan] du royaume et la famille nous a fait comprendre très clairement qu'elle s'attend à être traitée en fonction de [Root.Monarch.GetHerHis] position."
 consort_events.5.a:0 "Quel genre de [Root.Monarch.GetDaughterSon] serait-[Root.Monarch.GetSheHe] s'[Root.Monarch.GetSheHe] n'aidait pas ?"
 consort_events.5.a.tt.0:0 "Les [Root.Monarch.Dynasty.GetName] se souviendront que nous sommes venus à leur aide."
 consort_events.5.a.tt.1:0 "La Couronne financera le développement des terres des [Root.Monarch.Dynasty.GetName]."
 consort_events.5.a.tt.2:0 "La Couronne remboursera une partie de la dette des [Root.Monarch.Dynasty.GetName]."
 consort_events.5.a.tt.3:0 "La Couronne favorisera les intérêts de la faction [Root.Monarch.Dynasty.GetName] dans le royaume."
 consort_events.5.a.tt.4:0 "La Couronne aidera à se débarrasser d'un conseiller peu coopératif."
 consort_events.5.a.tt.5:0 "Les officiers de la famille [Root.Monarch.Dynasty.GetName] seront favorisés pour la promotion sans égard au mérite."
 consort_events.5.a.tt.6:0 "Les officiers de la famille [Root.Monarch.Dynasty.GetName] seront favorisés pour la promotion sans égard au mérite."
 consort_events.5.a.tt.6b:0 "Nous favoriserons les intérêts des [Root.Monarch.Dynasty.GetName] lors de la création de nouvelles législations."
 consort_events.5.b:0 "Nous ne pouvons permettre qu'[Root.Monarch.GetSheHe] abuse de [Root.Monarch.GetHerHis] fonction."
 consort_events.5.b.tt:0 "La famille de notre régent le prendra très mal."
 consort_events.6.t:0 "Aimer et être aimé"
 consort_events.6.d:0 "Un mariage royal est rarement une affaire d'amour. C'est plutôt une opportunité diplomatique qu'il ne faut pas gaspiller. Il est également de grande importance que le futur consort soit de statut convenable et il est avantageux qu'il soit étranger, afin de ne pas perturber l'équilibre de la politique interne.\n\nCependant, même un [Root.Monarch.GetTitle] peut tomber éperdument amoureux. Alors toutes ces considérations semblent s'évanouir, de [Root.Monarch.GetHerHis] point de vue du moins. Un habitant de la province de [consort_home.GetName] a attiré l'attention de [Root.Monarch.GetName]. [Root.Monarch.GetSheHeCap] semble plus heureux que jamais, entièrement et infiniment épris. Bien que nos nobles et conseillers soient moins que satisfaits, l'union entre [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] bien-aimé jouit d'un fort soutien parmi les gens du peuple du royaume."
 consort_events.6.a:0 "Laissons le [Root.Monarch.GetTitle] avoir ce que son cœur désire."
 consort_events.6.b:0 "Épouser un roturier ? Totalement hors de question !"
 consort_of_the_people:0 "Consort du peuple"
 desc_consort_of_the_people:0 "Le consort de notre souverain est aimé du peuple, ce qui atténue les frictions autrement tendues entre l'élite et ses sujets."
 home_of_consort:0 "Foyer du consort"
 desc_home_of_consort:0 "Notre souverain a épousé un roturier de cette province, ce qui est une source de grande joie et de fierté pour les gens du peuple locaux."
 nobles_displeased_with_consort:0 "Nobles mécontents du consort"
 desc_nobles_displeased_with_consort:0 "Les nobles sont loin d'être satisfaits du choix de consort de leur souverain."
 consort_events.51.t:0 "Liens familiaux"
 consort_events.51.da:0 "Ces derniers jours, nous avons reçu une invitée de la cour royale de [origin_country_of_consort.GetName], l'ancienne patrie du [Root.Consort.GetTitle]. Après une semaine entière de chasse, de festins et de commérages en famille, la sœur de [Root.Consort.GetName] se prépare enfin à retourner à [origin_country_of_consort.Capital.GetCapitalName]. Elle nous assure qu'elle a passé un merveilleux séjour et que la famille royale doit absolument venir visiter [origin_country_of_consort.Capital.GetCapitalName] bientôt. Avec délice dans la voix, elle dit qu'elle veillera à informer tout le monde au pays que le jeune héritier du [Root.GovernmentName] de [Root.GetName] est le portrait craché de [Root.Consort.GetHerHis] cher [Root.Consort.GetSisterBrother] [Root.Consort.GetName]."
 consort_events.51.db:0 "Ces derniers jours, nous avons reçu une invitée de la cour royale de [origin_country_of_consort.GetName], l'ancienne patrie du [Root.Consort.GetTitle]. Après une semaine entière de chasse, de festins et de commérages en famille, la cousine de [Root.Consort.GetName] se prépare enfin à retourner à [origin_country_of_consort.Capital.GetCapitalName]. Elle nous assure qu'elle a passé un merveilleux séjour et c'est avec une profonde révérence de gratitude qu'elle dit qu'elle veillera à informer tout le monde au pays de la bonté que le grand [Root.GovernmentName] de [Root.Country.GetName] lui a témoignée, et continue de témoigner à sa chère cousine."
 consort_events.51.a:0 "Voilà ce que signifie la famille."
 consort_events.51.a.tt:0 "La famille royale de §Y[origin_country_of_consort.GetName]§! apprendra les civilités échangées."
 we_are_kin:0 "Nous sommes parents"
 consort_events.52.t:0 "L'Hérétique royal"
 consort_events.52.da:0 "Les habitants de [Root.Country.GetName] se sont réjouis lorsque le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a annoncé [Root.Monarch.GetHerHis] mariage avec [Root.Consort.GetName]. À l'époque, peu de choses ont été dites sur [Root.Consort.GetHerHis] origine ou [Root.Consort.GetHerHis] éducation à [origin_country_of_consort.Capital.GetCapitalName] : pour la plupart des gens du peuple de [Root.Country.GetName], les membres de la royauté sont une race à part et ils se soucient peu de ces détails. Cependant, des rumeurs mettant ces questions en lumière ont récemment commencé à se répandre... Certains disent que le [Root.Consort.GetTitle] a refusé d'abandonner [Root.Consort.GetHerHis] ancienne foi [origin_country_of_consort.Religion.GetName] : si le peuple a pu comprendre la nécessité d'un mariage avec des étrangers, il est moins susceptible d'accepter d'être gouverné par un hérétique."
 consort_events.52.a:0 "Comment osent-ils ?"
 consort_events.52.a.tt:0 "Le [Root.Consort.GetTitle] est au-dessus de tout reproche : les gens du peuple finiront par oublier ces rumeurs."
 consort_events.52.b:0 "[Root.Consort.GetName] cause plus de problèmes qu'[Root.Consort.GetSheHe] n'en vaut la peine."
 consort_events.52.b.tt:0 "Tenter de divorcer du [Root.Consort.GetTitle]. La famille royale de §Y[origin_country_of_consort.GetName]§! en sera informée."
 heretic_royalty:0 "Royauté hérétique"
 desc_heretic_royalty:0 "Le peuple est contrarié par les croyances présumées hérétiques du consort royal."
 consort_events.53.t:0 "Affaires d'État"
 consort_events.53.d:0 "Les habitants de notre grand [Root.GovernmentName] sont bien au courant de notre différend avec [origin_country_of_consort.GetName]. Étant donné que c'est aussi la patrie de notre [Root.Consort.GetTitle], il n'est pas étonnant que [Root.Consort.GetName] ait été accueilli avec une animosité croissante. Pour ce qu'ils en savent, [Root.Consort.GetSheHe] pourrait nourrir des loyautés envers l'ancien pays, ou pire : [Root.Consort.GetSheHe] pourrait être un espion ! Et n'est-ce pas une drôle de coïncidence, arguent les nobles, que le grand [Root.Monarch.GetTitle] [Root.Monarch.GetName] soit devenu si dépendant des conseils de [Root.Monarch.GetHerHis] conjoint ?\n\nNotre conseiller militaire $ARMY_ORGANISER$$ARMY_REFORMER$$COMMANDANT$$GRAND_CAPTAIN$$MASTER_RECRUITER$$MILITARY_ENGINEER$$QUARTERMASTER$ est allé jusqu'à menacer de quitter la cour si le [Root.Monarch.GetTitle] ne prend pas ses distances avec le [Root.Consort.GetTitle] et [Root.Consort.GetHerHis] murmures indignes de confiance."
 consort_events.53.a:0 "Le [Root.Consort.GetTitle] a besoin de notre soutien."
 consort_events.53.a.tt:0 "§Y[Root.Consort.GetName]§! a notre confiance : que nous importe un modeste conseiller ?"
 consort_events.53.b:0 "Un peu de distance ne ferait pas de mal."
 consort_events.53.b.tt:0 "Le [Root.Monarch.GetTitle] interdira à [Root.Monarch.GetHerHis] conjoint de prononcer le moindre mot sur les affaires d'État."
 without_spouse_advice:0 "Amour perdu"
 desc_without_spouse_advice:0 "Après les pressions des nobles et des conseillers, notre souverain a choisi de douter ouvertement de la fiabilité de son consort."
 consort_events.54.t:0 "Les Talents du [Root.Consort.GetTitle]"
 consort_events.54.da:0 "Depuis que [Root.Consort.GetName] est arrivé à la cour, [Root.Consort.GetSheHe] s'est beaucoup intéressé aux affaires administratives de [Root.GetName]. C'est au point que le [Root.Consort.GetTitle] est devenu une sorte d'autorité en matière de personnel et de gestion du château, ayant la confiance non seulement du [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself] mais de la noblesse en général. Rarement le [Root.GovernmentName] a connu une telle efficacité."
 consort_events.54.db:0 "Quiconque a eu une quelconque interaction verbale avec [Root.Consort.GetName] peut attester qu'[Root.Consort.GetSheHe] a le don de la parole. Qu'[Root.Consort.GetSheHe] ait été formé pour devenir diplomate ou non, traiter avec les ministres étrangers et les affaires délicates de la cour semble être quelque chose pour lequel le [Root.Consort.GetTitle] est bien adapté : il semblerait que [Root.Consort.GetHerHis] simple présence ait un effet apaisant sur les gens."
 consort_events.54.dc:0 "[Root.Consort.GetName] devient bien connu pour [Root.Consort.GetHerHis] intérêt pour l'armée. [Root.Consort.GetSheHeCap] est souvent vu en train de marcher avec nos généraux, engagé dans de profondes conversations, et [Root.Consort.GetSheHe] a même commencé à assister au conseil de guerre. Au début, il semblait que le [Root.Consort.GetTitle] était simplement curieux et voulait apprendre la stratégie militaire, mais récemment [Root.Consort.GetName] s'est mis à offrir [Root.Consort.GetHerHis] propres conseils, des conseils que les gens écoutent. Il est clair que ce [Root.Consort.GetWomanMan] est fait pour ces affaires."
 consort_events.54.dd:0 "Même avant que [Root.Consort.GetName] n'épouse les plus hauts rangs de la noblesse que [Root.GetName] puisse offrir, le [Root.Consort.GetTitle] était connu pour être un [Root.Consort.GetWomanMan] aux multiples facettes, impressionnant souvent les invités par [Root.Consort.GetHerHis] intellect érudit et son esprit, tout en faisant preuve d'une connaissance impressionnante de la stratégie militaire. Peut-être est-ce pour cela qu'[Root.Consort.GetSheHe] a été choisi comme conjoint royal ? Quoi qu'il en soit, depuis [Root.Consort.GetHerHis] arrivée à la cour, le [Root.Consort.GetTitle] a continué à faire une impression exceptionnelle sur nobles et roturiers."
 consort_events.54.a:0 "[Root.Consort.GetName] est une bénédiction."
 consort_events.54.b:0 "Le monde a besoin de plus de gens comme [Root.Consort.GetName]."
 consort_events.54.c:0 "Nous avons toujours besoin de stratèges."
 consort_events.54.d:0 "Quel atout, ce [Root.Consort.GetName]."
 consort_events.55.t:0 "Dans l'esprit de [Root.Consort.GetName]"
 consort_events.55.da:0 "Le [Root.Consort.GetTitle] arpente le palais ces derniers temps, la tête baissée, ne s'arrêtant parfois que pour regarder par la fenêtre avec nostalgie. La vie est bien différente ici, comparée à [Root.Consort.GetHerHis] ancien pays de [origin_country_of_consort.GetName], une nation que certains appellent notre ennemi de nos jours. Où cela laisse-t-il [Root.Consort.GetName], comme traître à au moins l'un des deux camps ? [Root.Consort.GetName] secoue la tête : de telles pensées n'aident personne, [Root.Consort.GetHerHis] place est ici, en [Root.GetName], aux côtés du [Root.Monarch.GetTitle].\n\nQuand le doute l'assaille, [Root.Consort.GetSheHe] a tendance à chercher le jeune [Root.Heir.GetName], car le rire innocent et les yeux calmes de [Root.Consort.GetHerHis] [Root.Heir.GetDaughterSon] lui mettent généralement un sourire sur le visage. Aujourd'hui, cependant, même cela n'aide pas. Peut-être est-ce le temps ?"
 consort_events.55.db:0 "Le [Root.Consort.GetTitle] arpente le palais ces derniers temps, la tête baissée, ne s'arrêtant parfois que pour regarder par la fenêtre avec nostalgie. La vie est bien différente ici, comparée à [Root.Consort.GetHerHis] ancien pays de [origin_country_of_consort.GetName], une nation que certains appellent notre ennemi. Où cela laisse-t-il [Root.Consort.GetName], comme traître à au moins l'un des deux camps ? Malgré quelques efforts, [Root.Consort.GetHerHis] accent le trahit encore, rappelant constamment aux gens [Root.Consort.GetHerHis] origines : sera-t-[Root.Consort.GetSheHe] jamais vraiment l'un des leurs ?\n\n[Root.Consort.GetName] secoue la tête. De telles pensées n'aident personne, [Root.Consort.GetHerHis] place est ici, en [Root.GetName], aux côtés du [Root.Monarch.GetTitle]. Cependant, savoir que le couple royal n'a pas encore produit d'héritier n'allège aucunement le stress...\n\nAprès avoir passé encore un autre repas silencieux en [Root.Consort.GetHerHis] compagnie, il est évident même pour le [Root.Monarch.GetTitle] que [Root.Monarch.GetHerHis] conjoint est un peu dépassé, soit par l'ennui, soit par l'agitation, ou peut-être par quelque chose de plus mélancolique."
 consort_events.55.dc:0 "Le [Root.Consort.GetTitle] arpente le palais ces derniers temps, la tête baissée, ne s'arrêtant parfois que pour regarder par la fenêtre avec nostalgie. La vie est bien différente ici, comparée à [Root.Consort.GetHerHis] ancien pays de [origin_country_of_consort.GetName], une nation que certains appellent notre ennemi. Où cela laisse-t-il [Root.Consort.GetName], comme traître à au moins l'un des deux camps ? [Root.Consort.GetName] secoue la tête : de telles pensées n'aident personne, [Root.Consort.GetHerHis] place est ici, en [Root.GetName], aux côtés du [Root.Monarch.GetTitle]. Cependant, sachant que le [Root.GovernmentName] a déjà [Root.Heir.GetName] [Root.Heir.Dynasty.GetName], et en [Root.Heir.GetHerHim] la ligne de succession assurée, le [Root.Consort.GetTitle] s'interroge parfois sur [Root.Consort.GetHerHis] utilité à la cour. [Root.Consort.GetSheHeCap] n'a pas épousé par amour, et [Root.Consort.GetSheHe] n'a pas produit d'enfants royaux. Serait-[Root.Consort.GetSheHe] même regretté s'[Root.Consort.GetSheHe] partait ?"
 consort_events.55.dd:0 "Le [Root.Consort.GetTitle] arpente le palais ces derniers temps, la tête baissée, ne s'arrêtant parfois que pour regarder par la fenêtre avec nostalgie. La vie est bien différente ici, comparée à [Root.Consort.GetHerHis] ancien pays de [origin_country_of_consort.GetName]. Ce qui lui manque le plus, c'est [Root.Consort.GetHerHis] famille, et la sécurité des coutumes familières. [Root.Consort.GetSheHeCap] a été un bon [Root.Consort.GetDaughterSon] pour [Root.Consort.GetHerHis] parents, décide-t-[Root.Consort.GetSheHe], en repensant à [Root.Consort.GetHerHis] enfance. Mais comment sait-on si l'on est un bon [Root.Consort.GetWifeHusband] ? Ou mieux encore, un bon [Root.Consort.GetMotherFather] ? [Root.Consort.GetSheHeCap] secoue la tête et continue de marcher.\n\nEn rejoignant [Root.Consort.GetHerHis] [Root.Heir.GetDaughterSon] pour le souper, [Root.Consort.GetName] se trouve désemparé. Les yeux calmes de [Root.Heir.GetName] lui mettent généralement un sourire sur le visage. Aujourd'hui, cependant, même cela ne l'apaise pas... Peut-être est-ce le temps ?"
 consort_events.55.de:0 "Le [Root.Consort.GetTitle] arpente le palais ces derniers temps, la tête baissée, ne s'arrêtant parfois que pour regarder par la fenêtre avec nostalgie. La vie est bien différente ici, comparée à [Root.Consort.GetHerHis] ancien pays de [origin_country_of_consort.GetName]. Ce qui lui manque le plus, c'est [Root.Consort.GetHerHis] famille, et la sécurité des coutumes familières. [Root.Consort.GetSheHeCap] a été un bon [Root.Consort.GetDaughterSon] pour [Root.Consort.GetHerHis] parents, décide-t-[Root.Consort.GetSheHe], en repensant à [Root.Consort.GetHerHis] enfance. Mais comment sait-on si l'on est un bon [Root.Consort.GetWifeHusband] ? Et qu'en sera-t-il à l'avenir, d'être un bon [Root.Consort.GetMotherFather]... ? [Root.Consort.GetSheHeCap] secoue la tête, vivement rappelé au fait que le couple royal n'a pas encore produit d'héritier.\n\nAprès avoir passé encore un autre repas silencieux en [Root.Consort.GetHerHis] compagnie, il est évident même pour le [Root.Monarch.GetTitle] que [Root.Monarch.GetHerHis] conjoint est un peu dépassé, soit par l'ennui, soit par l'agitation, ou peut-être par quelque chose de plus mélancolique."
 consort_events.55.df:0 "Le [Root.Consort.GetTitle] arpente le palais ces derniers temps, la tête baissée, ne s'arrêtant parfois que pour regarder par la fenêtre avec nostalgie. La vie est bien différente ici, comparée à [Root.Consort.GetHerHis] ancien pays de [origin_country_of_consort.GetName]. Ce qui lui manque le plus, c'est [Root.Consort.GetHerHis] famille, et la sécurité des coutumes familières. [Root.Consort.GetSheHeCap] a été un bon [Root.Consort.GetDaughterSon] pour [Root.Consort.GetHerHis] parents, décide-t-[Root.Consort.GetSheHe], en repensant à [Root.Consort.GetHerHis] enfance. Mais comment sait-on si l'on est un bon [Root.Consort.GetWifeHusband] ? Ou mieux encore, un bon [Root.Consort.GetMotherFather] ?\n\n[Root.Consort.GetSheHeCap] secoue la tête, incertain qu'[Root.Consort.GetSheHe] connaîtra jamais la [Root.Consort.GetMotherFather]nité. Sachant que le [Root.GovernmentName] a déjà [Root.Heir.GetName] [Root.Heir.Dynasty.GetName], et en [Root.Heir.GetHerHim] la ligne de succession assurée, le [Root.Consort.GetTitle] s'interroge parfois sur [Root.Consort.GetHerHis] utilité à la cour. [Root.Consort.GetSheHeCap] n'a pas épousé par amour et tout le monde sait qu'[Root.Consort.GetSheHe] n'a pas produit d'enfants royaux. Serait-[Root.Consort.GetSheHe] même regretté s'[Root.Consort.GetSheHe] partait ?"
 consort_events.55.a:0 "Nous devons faire quelque chose à ce sujet."
 consort_events.55.a.tt:0 "Organiser une fête en l'honneur du [Root.Consort.GetTitle]. Cela devrait rendre les gens heureux et aider [Root.Consort.GetName] à se sentir chez [Root.Consort.GetHerHim]."
 consort_events.55.b:0 "Être [Root.Consort.GetTitle] peut être exigeant parfois."
 consort_events.55.b.tt:0 "Mieux vaut qu'[Root.Consort.GetSheHe] s'y habitue."
 life_of_the_party:0 "Boute-en-train"
 desc_life_of_the_party:0 "En plus d'avoir acquis une certaine renommée pour être un plaisir à côtoyer, le consort royal est devenu un symbole de l'élite sociale : partout où il va, la noblesse suit, impatiente d'être celle qui fera sourire le consort."
 consort_adm_advice:0 "Efficacité royale"
 desc_consort_adm_advice:0 "Le consort royal s'est donné pour mission d'optimiser la gestion de ce pays."
 consort_dip_advice:0 "Médiateur royal"
 desc_consort_dip_advice:0 "Le consort royal est un réconfort à côtoyer, apaisant les nerfs de tout négociateur agité et inspirant les autres."
 consort_mil_advice:0 "Conseil de guerre élargi"
 desc_consort_mil_advice:0 "Le consort royal est généralement présent lors du conseil de guerre, ajoutant ses connaissances aux efforts militaristes de la nation."
 consort_events.56.t:0 "En temps de besoin"
 consort_events.56.d:1 "La dynastie de notre noble [Root.Monarch.GetTitle], les [Root.Monarch.Dynasty.GetName], est certainement puissante. Par [Root.Monarch.GetName], ils gouvernent notre nation et le feront pendant de nombreuses années encore. Cependant, même les grands ont parfois besoin d'aide. Heureusement, la famille de notre chef d'État a tissé des liens solides avec d'autres grandes puissances, comme la maison [marriage_partner.Monarch.Dynasty.GetName] dirigée par nul autre que [marriage_partner.Monarch.GetName], [marriage_partner.Monarch.GetTitle] de [marriage_partner.GetName]. [marriage_partner.Monarch.GetHerHisCap] gracieux [marriage_partner.Consort.GetWifeHusband] [marriage_partner.Consort.GetName] est un [marriage_partner.Consort.GetDaughterSon] de notre propre maison royale et un contact inestimable. Peut-être devrions-nous [marriage_partner.Consort.GetHerHim] demander si [marriage_partner.Consort.GetSheHe] peut influencer [marriage_partner.Consort.GetHerHis] [marriage_partner.Monarch.GetWifeHusband] pour nous prêter main-forte ?"
 consort_events.56.a:0 "Nos coffres deviennent dangereusement légers."
 consort_events.56.a.tt:0 "Envoyer une lettre au [marriage_partner.Consort.GetTitle] §Y[marriage_partner.Consort.GetName]§! de [marriage_partner.GetName], lui demandant de l'argent."
 consort_events.56.b:0 "Nous avons besoin d'aide pour gérer notre administration."
 consort_events.56.b.tt:0 "Envoyer une lettre au [marriage_partner.Consort.GetTitle] §Y[marriage_partner.Consort.GetName]§! de [marriage_partner.GetName], lui demandant une aide administrative."
 consort_events.56.c:0 "Nos diplomates pourraient certainement apprendre de ceux de [marriage_partner.GetName]."
 consort_events.56.c.tt:0 "Envoyer une lettre au [marriage_partner.Consort.GetTitle] §Y[marriage_partner.Consort.GetName]§! de [marriage_partner.GetName], lui demandant une aide diplomatique."
 consort_events.56.e:0 "Peut-être pouvons-nous emprunter l'un des généraux du [marriage_partner.Monarch.GetTitle] [marriage_partner.Monarch.GetName] ?"
 consort_events.56.e.tt:0 "Envoyer une lettre au [marriage_partner.Consort.GetTitle] §Y[marriage_partner.Consort.GetName]§! de [marriage_partner.GetName], lui demandant une aide militaire."
 consort_events.56.f:0 "Nous avons besoin de plus d'hommes pour notre armée."
 consort_events.56.f.tt:0 "Envoyer une lettre au [marriage_partner.Consort.GetTitle] §Y[marriage_partner.Consort.GetName]§! de [marriage_partner.GetName], lui demandant des effectifs."
 consort_events.56.g:0 "Nous n'avons besoin d'aucune aide de [marriage_partner.GetName] ou de la maison [marriage_partner.Monarch.Dynasty.GetName] !"
 consort_events.57.t:0 "Des Amis dans le besoin"
 consort_events.57.da:0 "Le [Root.Consort.GetTitle] de notre illustre [Root.Monarch.GetTitle], [Root.Consort.GetName], nous a récemment apporté une demande de [Root.Consort.GetHerHis] famille, la maison [From.Monarch.Dynasty.GetName] de [From.GetName]. Apparemment, le [From.Monarch.GetTitle] [From.Monarch.GetName] a un besoin urgent d'argent et nous a demandé, à nous « [From.Monarch.GetHerHis] amis les plus fiables », si nous pouvions contribuer de quelque manière que ce soit. [From.Monarch.GetHerHisCap] lettre est remplie de compliments sur notre grande économie."
 consort_events.57.db:0 "Le [Root.Consort.GetTitle] de notre illustre [Root.Monarch.GetTitle], [Root.Consort.GetName], nous a récemment apporté une demande de [Root.Consort.GetHerHis] famille, la maison [From.Monarch.Dynasty.GetName] de [From.GetName]. Apparemment, l'administration du [From.Monarch.GetTitle] [From.Monarch.GetName] est dans un grand désarroi et [From.Monarch.GetSheHe] nous a demandé, à nous « [From.Monarch.GetHerHis] amis les plus fiables », si nous pouvions aider de quelque manière que ce soit. [From.Monarch.GetHerHisCap] lettre est remplie de compliments sur nos talentueux comptables et bureaucrates."
 consort_events.57.dc:0 "Le [Root.Consort.GetTitle] de notre illustre [Root.Monarch.GetTitle], [Root.Consort.GetName], nous a récemment apporté une demande de [Root.Consort.GetHerHis] famille, la maison [From.Monarch.Dynasty.GetName] de [From.GetName]. Apparemment, le [From.Monarch.GetTitle] [From.Monarch.GetName] a été troublé par des scandales diplomatiques dernièrement et [From.Monarch.GetSheHe] nous a demandé, à nous « [From.Monarch.GetHerHis] amis les plus fiables », si nous pouvions aider de quelque manière que ce soit. [From.Monarch.GetHerHisCap] lettre est remplie de compliments sur notre réputation internationale et nos représentants bien élevés."
 consort_events.57.dd:0 "Le [Root.Consort.GetTitle] de notre illustre [Root.Monarch.GetTitle], [Root.Consort.GetName], nous a récemment apporté une demande de [Root.Consort.GetHerHis] famille, la maison [From.Monarch.Dynasty.GetName] de [From.GetName]. Apparemment, le [From.Monarch.GetTitle] [From.Monarch.GetName] a fait face à de sérieux problèmes concernant la formation des soldats de [From.GetName] et [From.Monarch.GetSheHe] nous a demandé, à nous « [From.Monarch.GetHerHis] amis les plus fiables », si nous pouvions aider de quelque manière que ce soit. [From.Monarch.GetHerHisCap] lettre est remplie de compliments sur notre belle armée et nos brillants généraux."
 consort_events.57.de:0 "Le [Root.Consort.GetTitle] de notre illustre [Root.Monarch.GetTitle], [Root.Consort.GetName], nous a récemment apporté une demande de [Root.Consort.GetHerHis] famille, la maison [From.Monarch.Dynasty.GetName] de [From.GetName]. Apparemment, le [From.Monarch.GetTitle] [From.Monarch.GetName] a été troublé par un grave manque d'effectifs pour [From.Monarch.GetHerHis] armée et [From.Monarch.GetSheHe] nous a demandé, à nous « [From.Monarch.GetHerHis] amis les plus fiables », si nous pouvions aider de quelque manière que ce soit. [From.Monarch.GetHerHisCap] lettre est remplie de compliments sur nos braves soldats et notre population florissante."
 consort_events.57.a:0 "Nous pouvons certainement épargner quelques pièces pour nos amis [From.GetAdjective]."
 consort_events.57.b:0 "Nous enverrons certains de nos meilleurs administrateurs pour les aider."
 consort_events.57.c:0 "Quelques-uns de nos diplomates les plus talentueux seront envoyés pour les aider."
 consort_events.57.d:0 "L'un de nos meilleurs généraux sera envoyé pour leur enseigner nos méthodes."
 consort_events.57.e:0 "Des hommes valides seront envoyés en [From.GetName] en ces temps de besoin."
 consort_events.57.f:0 "Et qu'obtiendrions-nous en retour ? Non, jamais !"
 consort_events.58.t:0 "Une Main secourable"
 consort_events.58.da:0 "Nous avons enfin reçu des nouvelles de la chère [From.Consort.GetName] concernant notre demande pour [From.Consort.GetHerHis] [From.Monarch.GetWifeHusband]. Le très noble [From.Monarch.GetTitle] [From.Monarch.GetName] a décidé de l'accorder ! La réponse est revenue avec des coffres d'or pour remplir notre trésorerie vide. Une lettre de remerciement sera immédiatement envoyée au généreux [From.Monarch.GetTitle] [From.Monarch.GetName]. Longue vie à [From.Monarch.GetSheHe] !"
 consort_events.58.db:0 "Nous avons enfin reçu des nouvelles de la chère [From.Consort.GetName] concernant notre demande pour [From.Consort.GetHerHis] [From.Monarch.GetWifeHusband]. Le très noble [From.Monarch.GetTitle] [From.Monarch.GetName] a décidé de l'accorder ! La réponse a été rapportée par certains des meilleurs administrateurs de [From.GetName], qui sont ici pour nous conseiller sur la gestion de notre pays. Une lettre de remerciement sera immédiatement envoyée au généreux [From.Monarch.GetTitle] [From.Monarch.GetName]. Longue vie à [From.Monarch.GetSheHe] !"
 consort_events.58.dc:0 "Nous avons enfin reçu des nouvelles de la chère [From.Consort.GetName] concernant notre demande pour [From.Consort.GetHerHis] [From.Monarch.GetWifeHusband]. Le très noble [From.Monarch.GetTitle] [From.Monarch.GetName] a décidé de l'accorder ! La réponse a été rapportée par certains des meilleurs diplomates de [From.GetName], qui sont ici pour enseigner à nos propres représentants. Une lettre de remerciement sera immédiatement envoyée au généreux [From.Monarch.GetTitle] [From.Monarch.GetName]. Longue vie à [From.Monarch.GetSheHe] !"
 consort_events.58.dd:0 "Nous avons enfin reçu des nouvelles de la chère [From.Consort.GetName] concernant notre demande pour [From.Consort.GetHerHis] [From.Monarch.GetWifeHusband]. Le très noble [From.Monarch.GetTitle] [From.Monarch.GetName] a décidé de l'accorder ! La réponse a été rapportée par l'un de [From.Monarch.GetHerHis] meilleurs généraux, qui est ici pour enseigner à nos propres officiers comment la formation militaire est menée en [From.GetName]. Une lettre de remerciement sera immédiatement envoyée au généreux [From.Monarch.GetTitle] [From.Monarch.GetName]. Longue vie à [From.Monarch.GetSheHe] !"
 consort_events.58.de:0 "Nous avons enfin reçu des nouvelles de la chère [From.Consort.GetName] concernant notre demande pour [From.Consort.GetHerHis] [From.Monarch.GetWifeHusband]. Le très noble [From.Monarch.GetTitle] [From.Monarch.GetName] a décidé de l'accorder ! La réponse nous a été renvoyée accompagnée d'une belle troupe de recrues [From.GetAdjective]. Une lettre de remerciement sera immédiatement envoyée au généreux [From.Monarch.GetTitle] [From.Monarch.GetName]. Longue vie à [From.Monarch.GetSheHe] !"
 consort_events.58.a:0 "Nous avons toujours su que nous avions un ami en [From.GetName]."
 consort_events.59.t:0 "Promesses non tenues"
 consort_events.59.d:0 "Lorsque nous avons marié notre [From.Consort.GetName] au [From.Monarch.GetTitle] [From.GetAdjective], nous pensions qu'un lien solide avait été formé entre nos pays. Bien que nous ne déshonorions jamais notre part de cet accord, apparemment le [From.Monarch.GetTitle] [From.Monarch.GetName] n'a pas de tels scrupules. La lettre de réponse de [From.Consort.GetName] nous est parvenue aujourd'hui. Non seulement le [From.Monarch.GetTitle] [From.Monarch.GetName] a refusé notre demande, mais [From.Monarch.GetSheHe] a également eu le culot de nous reprocher nos « exigences scandaleuses » !"
 consort_events.59.a:0 "Cette offense ne sera pas oubliée."
 consort_events.60.t:0 "Dans le cœur de [Root.Consort.GetName]"
 consort_events.60.d:0 "Le [Root.Consort.GetTitle] s'est fait non pas un, mais plusieurs amis lors de la fête organisée en [Root.Consort.GetHerHis] nom. Bien que cela remonte à plusieurs mois, le [Root.Consort.GetTitle] a maintenu ces liens sans effort, et avec l'aide d'un noble[Root.Consort.GetWomanMan] en particulier, [Root.Consort.GetSheHe] a eu plaisir à apprendre tout ce qu'il y a à savoir sur la vie de cour à [Root.Capital.GetCapitalName] : il y a tellement de fêtes, de chasses et de banquets auxquels assister !\nLes habitants de [Root.GetName] ne sont vraiment pas si mal, pense-t-[Root.Consort.GetSheHe], en regardant par la fenêtre du palais. Dernièrement, [Root.Consort.GetSheHe] sourit au paysage extérieur, réalisant que même si [Root.Consort.GetSheHe] chérira toujours [Root.Consort.GetHerHis] temps dans l'ancien pays, [Root.Consort.GetName] a trouvé un nouveau foyer."
 consort_events.60.a:0 "Puisse-t-[Root.Consort.GetSheHe] le garder dans [Root.Consort.GetHerHis] cœur à jamais."
 grateful_for_aid:0 "Reconnaissant pour l'aide"
 denied_aid:0 "Aide refusée"
 outrageous_demands:0 "Exigences scandaleuses"
 consort_events.61.t:0 "Une Influence royale"
 consort_events.61.da:0 "Avec le mariage entre [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband] [Root.Consort.GetName], les habitants de [Root.GetName] éprouvent un attrait croissant pour tout ce qui est [origin_country_of_consort.GetAdjective]. Bien qu'un certain échange culturel était à prévoir, particulièrement compte tenu de la popularité du [Root.Consort.GetTitle], c'est avec alarme que notre conseiller administratif [Root.Adm_Advisor.GetName] rapporte qu'un changement religieux a eu lieu dans l'une de nos provinces. Il semblerait que l'influence de notre [Root.Consort.GetTitle] [origin_country_of_consort.GetAdjective] se répercute même dans la façon de prier de nos sujets, car les paroles des croyants [origin_country_of_consort.Religion.GetName] ont converti un nombre surprenant de personnes...\n\nConfronté à ce sujet, [Root.Consort.GetName] hausse les épaules, arguant qu'[Root.Consort.GetSheHe] s'est converti à la foi [Root.Religion.GetName] depuis longtemps et que le [Root.Monarch.GetTitle] devrait le savoir. « Je n'ai rien à voir avec cela », plaide-t-[Root.Consort.GetSheHe]."
 consort_events.61.a:0 "[Root.Consort.GetSheHeCap] doit publiquement dénoncer [Root.Consort.GetHerHis] ancienne foi !"
 consort_events.61.b:0 "Ainsi soit-il."
 angered_believers:0 "Croyants en colère"
 desc_angered_believers:0 "Le consort royal a publiquement dénoncé le schisme religieux dans cette région, espérant changer l'avis des gens."
 consort_events.101.t:0 "Les Ambitions d'un [Root.Consort.GetTitle]"
 consort_events.101.d:0 "Ce n'est un secret pour personne que le [Root.Consort.GetTitle] [Root.Consort.GetName] n'a aucune affection pour l'héritier du [Root.Monarch.GetTitle], [Root.Heir.GetName] [Root.Heir.Dynasty.GetName]. Depuis [Root.Consort.GetHerHis] arrivée à la cour, la friction entre les deux est évidente et elle n'a fait qu'empirer depuis la naissance du premier enfant du [Root.Consort.GetTitle]. Bien sûr, [Root.Consort.GetSheHe] préférerait voir sa propre progéniture sur le trône. Depuis un certain temps maintenant, [Root.Consort.GetSheHe] tire silencieusement les ficelles pour y parvenir, convainquant ou soudoyant les bonnes personnes et préparant [Root.Consort.GetHerHis] aîné du mieux de [Root.Consort.GetHerHis] capacités. Cependant, ce n'est qu'hier qu'[Root.Consort.GetSheHe] a confronté notre [Root.Monarch.GetTitle] et exigé qu'il était temps de désigner un nouvel héritier."
 consort_events.101.a:0 "L'aîné du [Root.Consort.GetTitle] [Root.Consort.GetName] est un choix légitime, cela ne fait aucun doute."
 consort_events.101.a.tt:0 "L'enfant aîné du [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! devient l'héritier de [Root.GetName]."
 consort_events.101.b:0 "Comment ose-t-[Root.Consort.GetSheHe] remettre en question le droit de [Root.Heir.GetName] au trône ?"
 consort_events.101.b.tt:0 "§Y[Root.Heir.GetName]§! [Root.Heir.Dynasty.GetName] reste l'héritier de [Root.GetName]."
 consort_events.102.t:0 "Jouer les favoris"
 consort_events.102.da:0 "On dit que l'amour d'un parent pour son enfant est sans limites, mais il est évident que certains amours sont plus illimités que d'autres. Bien que le [Root.Consort.GetTitle] [Root.Consort.GetName] soit certainement attaché à [Root.Consort.GetHerHis] aîné, [Root.Heir.GetName] [Root.Heir.Dynasty.GetName], tout le monde sait que [Root.Heir.GetHerHis] sœur occupe une place plus grande dans le cœur de [Root.Consort.GetName]. Le [Root.Consort.GetTitle] la chérit et s'est assuré qu'elle a reçu la meilleure éducation possible. Maintenant, [Root.Consort.GetSheHe] essaie de faire de [Root.Consort.GetHerHis] fille préférée la nouvelle héritière de [Root.GetName]."
 consort_events.102.db:0 "On dit que l'amour d'un parent pour son enfant est sans limites, mais il est évident que certains amours sont plus illimités que d'autres. Bien que le [Root.Consort.GetTitle] [Root.Consort.GetName] soit certainement attaché à [Root.Consort.GetHerHis] aîné, [Root.Heir.GetName] [Root.Heir.Dynasty.GetName], tout le monde sait que [Root.Heir.GetHerHis] frère occupe une place plus grande dans le cœur de [Root.Consort.GetName]. Le [Root.Consort.GetTitle] le chérit et s'est assuré qu'il a reçu la meilleure éducation possible. Maintenant, [Root.Consort.GetSheHe] essaie de faire de [Root.Consort.GetHerHis] fils préféré le nouvel héritier de [Root.GetName]."
 consort_events.102.a:0 "Ce n'est pas une mauvaise idée. Le favori du [Root.Consort.GetTitle] [Root.Consort.GetName] est exceptionnellement intelligent."
 consort_events.102.a.tt:0 "L'enfant favori du [Root.Consort.GetTitle] [Root.Consort.GetName] devient l'héritier de [Root.GetName]."
 consort_events.102.b:0 "Peut-être qu'un siège au conseil serait une alternative convenable ?"
 consort_events.102.b.tt:0 "L'enfant favori du [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! devient conseiller du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§!."
 consort_events.103.t:0 "Un Berceau vide"
 consort_events.103.d:0 "Plusieurs années se sont écoulées depuis le mariage entre le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et le [Root.Consort.GetTitle] [Root.Consort.GetName], et pourtant ils n'ont pas été bénis d'un enfant. Les gens commencent à s'inquiéter pour l'avenir du pays car il n'y a pas d'héritier au trône. De vicieuses rumeurs circulent concernant l'infertilité, tant de la part du [Root.Monarch.GetTitle] que du [Root.Consort.GetTitle]. Nous devrions faire quelque chose concernant cette situation, non seulement pour assurer l'avenir de [Root.GetName], mais aussi pour protéger l'honneur de notre [Root.Monarch.GetTitle]."
 consort_events.103.a:0 "C'est évidemment la faute de [Root.Consort.GetName]. Le [Root.Monarch.GetTitle] a besoin d'un autre [Root.Consort.GetTitle]."
 consort_events.103.b:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a un cousin éloigné qui pourrait être une option convenable."
 consort_events.103.b.tt:0 "Un cousin éloigné du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! devient l'héritier de [Root.GetName]."
 consort_events.103.c:0 "Nous devons être patients. Cela arrivera, finalement."
 consort_events.103.c.tt:0 "Donner une autre chance au [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§!, même si cela ne mettra pas fin aux rumeurs."
 consort_events.104.t:0 "Tel [Root.Consort.GetMotherFather], tel [Root.Heir.GetDaughterSon]"
 consort_events.104.da:0 "Au fil des années, notre noble [Root.Consort.GetTitle] [Root.Consort.GetName] [Root.Consort.Dynasty.GetName] nous a impressionnés à maintes reprises par [Root.Consort.GetHerHis] excellentes connaissances et compétences. [Root.Consort.GetHerHisCap] maîtrise des tactiques militaires surpasse celle de nombreux officiers de haut rang de notre armée et [Root.Consort.GetHerHis] habileté à l'épée ferait d'elle un adversaire redoutable sur le champ de bataille. [Root.Consort.GetName] est clairement une [Root.Consort.GetWomanMan] cultivée et [Root.Consort.GetHerHis] intérêt pour l'apprentissage a semé une graine chez [Root.Consort.GetHerHis] [Root.Heir.GetDaughterSon] [Root.Heir.GetName]. La pomme ne tombe pas loin de l'arbre, en effet."
 consort_events.104.db:0 "Au fil des années, notre noble [Root.Consort.GetTitle] [Root.Consort.GetName] [Root.Consort.Dynasty.GetName] nous a impressionnés à maintes reprises par [Root.Consort.GetHerHis] excellentes connaissances et compétences. [Root.Consort.GetSheHeCap] a une grande vision de la gestion de notre nation et [Root.Consort.GetSheHe] est plus rapide avec les chiffres que n'importe lequel de nos comptables. [Root.Consort.GetName] est clairement un [Root.Consort.GetWomanMan] cultivé et [Root.Consort.GetHerHis] intérêt pour l'apprentissage a semé une graine chez [Root.Consort.GetHerHis] [Root.Heir.GetDaughterSon] [Root.Heir.GetName]. La pomme ne tombe pas loin de l'arbre, en effet."
 consort_events.104.dc:0 "Au fil des années, notre noble [Root.Consort.GetTitle] [Root.Consort.GetName] [Root.Consort.Dynasty.GetName] nous a impressionnés à maintes reprises par [Root.Consort.GetHerHis] excellentes connaissances et compétences. En plus de posséder beaucoup de charisme et de bonnes manières, [Root.Consort.GetSheHe] est bien versé dans l'histoire et la politique de toutes les puissances étrangères importantes. [Root.Consort.GetName] est clairement un [Root.Consort.GetWomanMan] cultivé et [Root.Consort.GetHerHis] intérêt pour l'apprentissage a semé une graine chez [Root.Consort.GetHerHis] [Root.Heir.GetDaughterSon] [Root.Heir.GetName]. La pomme ne tombe pas loin de l'arbre, en effet."
 consort_events.104.a:0 "[Root.Consort.GetName] instruira [Root.Heir.GetName] sur tous les aspects administratifs de la gestion de notre nation."
 consort_events.104.a.tt:0 "Le [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! [Root.Consort.Dynasty.GetName] passe une partie de [Root.Consort.GetHerHis] temps à éduquer §Y[Root.Heir.GetName]§! [Root.Heir.Dynasty.GetName] en matière d'administration."
 consort_events.104.b:0 "[Root.Consort.GetName] enseignera à [Root.Heir.GetName] les subtilités de la politique."
 consort_events.104.b.tt:0 "Le [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! [Root.Consort.Dynasty.GetName] passe une partie de [Root.Consort.GetHerHis] temps à éduquer §Y[Root.Heir.GetName]§! [Root.Heir.Dynasty.GetName] en matière de diplomatie."
 consort_events.104.c:0 "Avec l'aide de [Root.Consort.GetName], [Root.Heir.GetName] deviendra un grand général."
 consort_events.104.c.tt:0 "Le [Root.Consort.GetTitle] [Root.Consort.GetName] [Root.Consort.Dynasty.GetName] passe une partie de [Root.Consort.GetHerHis] temps à éduquer §Y[Root.Heir.GetName]§! [Root.Heir.Dynasty.GetName] en matière militaire."
 consort_events.104.d:0 "Le [Root.Consort.GetTitle] a mieux à faire que d'éduquer [Root.Consort.GetHerHis] [Root.Heir.GetDaughterSon] !"
 consort_events.104.d.tt:0 "Il est interdit au [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! [Root.Consort.Dynasty.GetName] d'enseigner à §Y[Root.Heir.GetName]§! [Root.Heir.Dynasty.GetName]."
 angered_nobles:0 "Nobles en colère"
 desc_angered_nobles:0 "Une puissante maison noble de cette province est outrée que le souverain ait divorcé du consort de leur famille."
 offended_by_divorce:0 "Offensé par le divorce"
 divorce.a.tt:0 "Le consort principal, §Y[Root.Consort.GetName]§!, est mis de côté et un nouveau consort principal est choisi parmi les autres épouses du [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§!."
 divorce.b.tt:0 "Le [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! divorce du [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§!."
 consort_events.201.t:0 "Autorité rectorale"
 consort_events.201.da:0 "En tant que Ravéliens dévots, la seule façon de mettre fin à un mariage est de demander une dispense spéciale au Haut Recteur, [PAP.Monarch.GetName]. Dans des circonstances normales, [PAP.Monarch.GetSheHe] serait très peu susceptible d'accorder une telle demande, cependant, si nous pouvons tirer parti de notre influence sur [PAP.GetName], le Haut Recteur pourrait n'avoir d'autre choix que de dire oui."
 consort_events.201.db:0 "En tant que Ravéliens dévots, la seule façon de mettre fin à un mariage est de demander une dispense spéciale au Haut Recteur, [PAP.Monarch.GetName]. Il est presque inédit qu'[PAP.Monarch.GetSheHe] accorde une telle demande. Si seulement nous avions quelque influence sur [PAP.GetName], peut-être aurions-nous pu la mettre à profit pour changer [PAP.Monarch.GetHerHis] avis, mais il s'avère que nous sommes sans pouvoir dans cette situation."
 consort_events.201.a:0 "Au moins pouvons-nous essayer."
 consort_events.201.a.tt:0 "Dépenser §R25§! d'Influence rectorale. Ce n'est probablement pas suffisant pour convaincre le [PAP.Monarch.GetTitle] §Y[PAP.Monarch.GetName]§!."
 consort_events.201.b:0 "Informer l'émissaire de l'importance de sa mission."
 consort_events.201.b.tt:0 "Dépenser §R50§! d'Influence rectorale. Il est aussi probable que cela convainque le [PAP.Monarch.GetTitle] §Y[PAP.Monarch.GetName]§! que le contraire."
 consort_events.201.c:0 "N'épargnez aucune dépense ! Notre envoyé sera des plus impressionnants."
 consort_events.201.c.tt:0 "Dépenser §R75§! d'Influence rectorale. Il est probable que cela convainque le [PAP.Monarch.GetTitle] [PAP.Monarch.GetName]."
 consort_events.201.e:0 "Tirez toutes les ficelles et rappelez toutes les faveurs. Le Haut Recteur ne nous refusera pas cela !"
 consort_events.201.e.tt:0 "Dépenser §R100§! d'Influence rectorale. Le [PAP.Monarch.GetTitle] §Y[PAP.Monarch.GetName]§! est pratiquement garanti d'être convaincu."
 consort_events.201.f:0 "Peut-être notre influence serait-elle mieux utilisée pour d'autres choses."
 consort_events.201.f.tt:0 "Le [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! reste marié au [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§!."
 consort_events.201.g:0 "C'est fort embarrassant..."
 consort_events.202.t:0 "La Sainteté du mariage"
 consort_events.202.d:1 "Le Père nous a enseigné que le mariage, l'union entre un homme et une femme, est sacré. Une fois qu'ils ont fait leur promesse devant Dieu, rien ne peut briser le lien entre eux si ce n'est la mort. Cependant, la vie est parfois plus compliquée que ce qui peut être lu dans la Bible. Le [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.GetName] demande une annulation du mariage entre [From.Monarch.GetHerHim] et [From.Monarch.GetHerHis] [From.Consort.GetWifeHusband], le [From.Consort.GetTitle] [From.Consort.GetName]. Normalement, nous n'envisagerions pas d'accorder une telle demande dans ces circonstances, cependant, le [From.Monarch.GetTitle] [From.Monarch.GetName] détient une certaine influence sur nous."
 consort_events.202.a:0 "Le [From.Monarch.GetTitle] [From.Monarch.GetName] aura son annulation."
 consort_events.202.b:0 "La loi de Dieu ne peut être brisée, même par un [From.Monarch.GetTitle]."
 consort_events.202.b.tt:0 "Comme le [From.Monarch.GetTitle] §Y[From.Monarch.GetName]§! a tiré parti d'une partie de [From.Monarch.GetHerHis] influence sur nous, cela nous coûtera §R13§! de Dévotion pour [From.Monarch.GetHerHim] refuser."
 consort_events.202.c.tt:0 "Comme le [From.Monarch.GetTitle] §Y[From.Monarch.GetName]§! a tiré parti d'une partie de [From.Monarch.GetHerHis] influence sur nous, cela nous coûtera §R25§! de Dévotion pour [From.Monarch.GetHerHim] refuser."
 consort_events.202.d.tt:0 "Comme le [From.Monarch.GetTitle] §Y[From.Monarch.GetName]§! a tiré parti d'une partie de [From.Monarch.GetHerHis] influence sur nous, cela nous coûtera §R38§! de Dévotion pour [From.Monarch.GetHerHim] refuser."
 consort_events.202.e.tt:0 "Comme le [From.Monarch.GetTitle] §Y[From.Monarch.GetName]§! a tiré parti d'une partie de [From.Monarch.GetHerHis] influence sur nous, cela nous coûtera §R50§! de Dévotion pour [From.Monarch.GetHerHim] refuser."
 consort_events.203.t:0 "Une Dispense spéciale"
 consort_events.203.d:0 "Louons le Seigneur ! Nous avons reçu la réponse du [PAP.Monarch.GetTitle] [PAP.Monarch.GetName] et notre demande d'annulation a été accordée ! Maintenant, nous sommes libres de mettre fin au mariage entre notre grand [Root.Monarch.GetTitle], [Root.Monarch.GetName], et son consort [Root.Consort.GetName]."
 consort_events.203.a:0 "Pas un jour trop tôt !"
 consort_events.203.a.tt:0 "Le [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! divorce du [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§!."
 consort_events.203.b:0 "Peut-être avons-nous agi de façon précipitée. Le [Root.Consort.GetTitle] [Root.Consort.GetName] peut rester pour l'instant."
 consort_events.203.b.tt:0 "Le mariage entre le [Root.Monarch.GetTitle] §Y[Root.Monarch.GetName]§! et le [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! demeure."
 consort_events.204.t:0 "La Sainteté du mariage"
 consort_events.204.d:1 "Nous avons reçu la réponse du [PAP.Monarch.GetTitle] [PAP.Monarch.GetName] et malheureusement [PAP.Monarch.GetSheHe] a refusé notre demande. Il n'y aura pas d'annulation du mariage entre notre [Root.Monarch.GetTitle], [Root.Monarch.GetName], et son consort [Root.Consort.GetName]."
 consort_events.205.t:0 "La Plus Grave des insultes"
 consort_events.205.d:0 "Ces rats infâmes et méprisables ! Comment osent-ils nous insulter ainsi ! Des nouvelles nous sont parvenues que le mariage entre l'ignoble [From.Monarch.GetTitle] [From.Monarch.GetName] et [From.Monarch.GetHerHis] [From.Consort.GetWifeHusband], notre propre [From.Consort.GetName], a pris fin. [From.Monarch.GetSheHeCap] l'a mis de côté, l'a jeté comme un jouet usé. La honte de [From.Consort.GetName] ainsi que celle de toute la famille [Root.Monarch.Dynasty.GetName] est grande en effet."
 consort_events.205.a:0 "Cette insulte ne restera pas sans réponse !"
 consort_events.205.a.tt:1 "Le [From.Monarch.GetTitle] §Y[From.Monarch.GetName]§! de [From.GetName] a divorcé du [From.Consort.GetTitle] §Y[From.Consort.GetName]§!."
 consort_events.301.t:0 "Une Décennie de mariage"
 consort_events.301.da:0 "Lorsque [Root.Consort.GetName] a épousé la maison royale des [Root.Monarch.Dynasty.GetName], certains étaient sceptiques à l'idée que le [Root.Monarch.GetTitle] invite un jeune [Root.Consort.GetWomanMan] de [origin_of_consort.GetName], un étranger, à rejoindre la famille régnante. Cependant, le temps file et cela fait maintenant plus de dix ans que l'union a eu lieu. Bien que tout le monde n'adore pas le [Root.Consort.GetTitle], la plupart ont fini par le respecter comme l'un des leurs : il est fort improbable que l'anniversaire de mariage du couple élevé soit passé inaperçu, et un certain nombre de lettres de félicitations, ainsi que des cadeaux de splendeur variée, ont déjà été envoyés au palais."
 consort_events.301.db:0 "Lorsque [Root.Consort.GetName] a épousé la maison royale des [Root.Monarch.Dynasty.GetName], certains étaient sceptiques quant à [Root.Consort.GetHerHis] origine. [Root.Consort.GetSheHeCap] était un jeune [Root.Consort.GetWomanMan] de [origin_of_consort.GetName], un inconnu aux yeux de beaucoup, soudainement invité à régner sur la grande nation de [Root.GetName]. Cependant, le temps file et cela fait maintenant plus de dix ans que l'union a eu lieu. Bien que tout le monde n'adore pas le [Root.Consort.GetTitle], la plupart ont fini par le respecter comme l'un des leurs : il est fort improbable que l'anniversaire de mariage du couple élevé soit passé inaperçu, et ainsi [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] [Root.Consort.GetName] acceptent humblement toutes les lettres de félicitations, ainsi que les cadeaux de splendeur variée, qu'on leur apporte."
 consort_events.301.dc:0 "Lorsque [Root.Consort.GetName] a épousé la maison royale des [Root.Monarch.Dynasty.GetName], certains étaient sceptiques quant à [Root.Consort.GetHerHis] origine. [Root.Consort.GetSheHeCap] était un jeune [Root.Consort.GetWomanMan] d'une petite ville, un inconnu aux yeux de beaucoup, soudainement invité à régner sur la grande nation de [Root.GetName]. Cependant, le temps file et cela fait maintenant plus de dix ans que l'union a eu lieu. Bien que tout le monde n'adore pas le [Root.Consort.GetTitle], la plupart ont fini par le respecter comme l'un des leurs : il est fort improbable que l'anniversaire de mariage du couple élevé soit passé inaperçu, et ainsi [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] [Root.Consort.GetName] acceptent gracieusement toutes les lettres de félicitations, ainsi que les cadeaux de splendeur variée, qu'on leur apporte."
 consort_events.301.dd:0 "Lorsque [Root.Consort.GetName] a épousé la maison royale des [Root.Monarch.Dynasty.GetName], certains étaient sceptiques. Cependant, le jeune [Root.Consort.GetWomanMan] a gagné la confiance du peuple, presque sans effort, et [Root.Consort.GetSheHe] a grandi dans le rôle de membre de la classe dirigeante de [Root.GetName]. Cela fait maintenant plus de dix ans que l'union a eu lieu. Même ceux qui n'adorent pas le [Root.Consort.GetTitle] ont fini par le respecter comme l'un des leurs : l'anniversaire de mariage du couple élevé était très attendu. C'est en souriant gentiment aux nobles et aux roturiers que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] [Root.Consort.GetName] acceptent gracieusement les cadeaux de splendeur variée."
 consort_events.301.de:0 "Lorsque [Root.Consort.GetName] a épousé la maison royale des [Root.Monarch.Dynasty.GetName], certains étaient sceptiques. Cependant, le jeune [Root.Consort.GetWomanMan] a impressionné tous par [Root.Consort.GetHerHis] manière authentique et gracieuse avec les gens et la noblesse de [Root.Capital.GetCapitalName] ne cesse de trouver de nouvelles façons de montrer leur adoration du [Root.Consort.GetTitle]. Il n'est pas surprenant que l'anniversaire de mariage du couple élevé ait été très attendu : d'une manière ou d'une autre, le [Root.Consort.GetTitle] a même réussi à remercier personnellement chaque noble pour les cadeaux apportés pour l'occasion."
 consort_events.301.a:0 "Quelle heureuse occasion !"
 consort_events.301.a.tt:0 "Nous recevons de nombreux cadeaux pour l'anniversaire royal."
 consort_events.302.t:0 "Une Joyeuse occasion"
 consort_events.302.da:0 "La célébration annuelle de l'union royale entre [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] et [Root.Consort.GetName] a eu lieu. Il est difficile d'imaginer que [Root.GetName] ait pu être autrement : qu'il y ait eu un temps où le [Root.Consort.GetTitle] grandissait en [origin_of_consort.GetName], loin de notre [Root.Monarch.GetName], qui passait [Root.Monarch.GetHerHis] jours à [Root.Capital.GetCapitalName] seul. Tout cela semble si naturel maintenant. Comme le temps file ! Cela fait maintenant plus de deux décennies que [Root.Consort.GetName] a épousé le [Root.Monarch.GetTitle], et même s'ils ne sont plus des enfants, c'est avec une certaine allégresse qu'ils acceptent les cadeaux en l'honneur de leur anniversaire de mariage."
 consort_events.302.db:0 "Cela fait plus de deux décennies que [Root.Consort.GetName] a épousé le [Root.Monarch.GetTitle], et même s'ils ne sont plus des enfants, c'est avec une certaine allégresse qu'ils acceptent les cadeaux en l'honneur de leur anniversaire de mariage. Nobles et roturiers, particulièrement de [origin_of_consort.GetName], l'ancien foyer du [Root.Consort.GetTitle], sont jubilants d'assister aux célébrations pour avoir la chance d'apercevoir le couple royal. Comme le temps file !"
 consort_events.302.dc:0 "Comme le temps file ! Cela fait plus de deux décennies que [Root.Consort.GetName] a épousé le [Root.Monarch.GetTitle], et même s'ils ne sont plus des enfants, c'est avec une certaine allégresse qu'ils acceptent les cadeaux en l'honneur de leur anniversaire de mariage. Nobles et roturiers, tous assistent aux célébrations pour avoir la chance d'apercevoir le couple royal."
 consort_events.302.dd:0 "Comme le temps file ! Cela fait plus de deux décennies que [Root.Consort.GetName] a épousé le [Root.Monarch.GetTitle], et même s'ils ne sont plus des enfants, c'est avec une certaine allégresse qu'ils acceptent les cadeaux en l'honneur de leur anniversaire de mariage. Bien que la noblesse soit présente, les roturiers en particulier sont jubilants d'assister aux célébrations pour avoir la chance d'apercevoir leur bien-aimé [Root.Consort.GetTitle] [Root.Consort.GetName]."
 consort_events.302.de:0 "Comme le temps file ! Cela fait plus de deux décennies que [Root.Consort.GetName] a épousé le [Root.Monarch.GetTitle], et même s'ils ne sont plus des enfants, c'est avec une certaine allégresse qu'ils acceptent les cadeaux en l'honneur de leur anniversaire de mariage. Même si les roturiers sont dûment présents pour les célébrations, la noblesse en particulier se bouscule avec jubilation pour avoir la chance d'apercevoir leur [Root.Consort.GetTitle] [Root.Consort.GetName]."
 consort_events.302.a:0 "Puissent-ils avoir encore de nombreuses années ensemble."
 consort_events.302.a.tt:0 "Nous recevons de nombreux cadeaux pour l'anniversaire royal."
 consort_events.303.t:0 "L'Approche diplomatique de [Root.Consort.GetName]"
 consort_events.303.da:1 "En grandissant en [origin_of_consort.GetName], [Root.Consort.GetName] aimait étudier les gens. [Root.Consort.GetSheHeCap] faisait souvent un jeu d'essayer de prédire les actions des gens autour d'[Root.Consort.GetHerHim], trouvant cela non seulement amusant, mais au fil des années, une habitude de plus en plus utile à garder. Heureusement, le déménagement à la cour royale de [Root.GetName] n'a pas amené [Root.Consort.GetName] à abandonner [Root.Consort.GetHerHis] talent pour l'intrigue. Au contraire, [Root.Consort.GetSheHe] a eu beaucoup de pratique : lors de certaines de nos négociations récentes avec des diplomates étrangers, ces compétences se sont en fait avérées très précieuses pour le conseil."
 consort_events.303.db:0 "En grandissant en [origin_of_consort.GetName], [Root.Consort.GetName] aimait apprendre sur le monde. [Root.Consort.GetSheHeCap] posait toujours des questions et réfléchissait souvent à des moyens de rendre la vie plus facile aux gens, ou comment rendre une tâche donnée plus efficace. Mieux encore, comment convaincre quelqu'un d'autre que [Root.Consort.GetHerHis] façon d'organiser une mission était la bonne. Heureusement, le déménagement à la cour royale de [Root.GetName] n'a pas amené [Root.Consort.GetName] à abandonner [Root.Consort.GetHerHis] rêves de commander des gens. Au contraire, [Root.Consort.GetSheHe] a eu beaucoup de pratique : lors de certaines de nos négociations récentes avec des diplomates étrangers, [Root.Consort.GetHerHis] idées ont reçu des retours très positifs."
 consort_events.303.dc:0 "En grandissant en [origin_of_consort.GetName], [Root.Consort.GetName] aimait passer du temps avec les autres. [Root.Consort.GetSheHeCap] était un enfant inhabituellement calme, finement accordé aux sentiments de [Root.Consort.GetHerHis] amis, ou même de quiconque [Root.Consort.GetSheHe] rencontrait. Ce sixième sens presque lorsqu'il interagit avec les gens a non seulement fait de [Root.Consort.GetName] un convive très estimé et recherché, depuis [Root.Consort.GetHerHis] arrivée à [Root.Capital.GetCapitalName] : cela s'est également traduit dans d'autres affaires d'État. Lors d'une récente réunion avec des diplomates étrangers, on dit que les tactiques de négociation irréprochables du [Root.Consort.GetTitle] ont été le point culminant de l'événement !"
 consort_events.303.dd:0 "En grandissant, [Root.Consort.GetName] aimait étudier les gens. [Root.Consort.GetSheHeCap] faisait souvent un jeu d'essayer de prédire les actions des gens autour d'[Root.Consort.GetHerHim], trouvant cela non seulement amusant, mais au fil des années, une habitude de plus en plus utile à garder. Heureusement, le déménagement à la cour royale de [Root.GetName] n'a pas amené [Root.Consort.GetName] à abandonner son talent pour l'intrigue. Au contraire, [Root.Consort.GetSheHe] a eu beaucoup de pratique : lors de certaines de nos négociations récentes avec des diplomates étrangers, ces compétences se sont en fait avérées très précieuses pour le conseil."
 consort_events.303.de:0 "En grandissant, [Root.Consort.GetName] aimait apprendre sur le monde. [Root.Consort.GetSheHeCap] posait toujours des questions et réfléchissait souvent à des moyens de rendre la vie plus facile aux gens, ou comment rendre une tâche donnée plus efficace. Mieux encore, comment convaincre quelqu'un d'autre que [Root.Consort.GetHerHis] façon d'organiser une mission était la bonne. Heureusement, le déménagement à la cour royale de [Root.GetName] n'a pas amené [Root.Consort.GetName] à abandonner [Root.Consort.GetHerHis] rêves de commander des gens. Au contraire, [Root.Consort.GetSheHe] a eu beaucoup de pratique : lors de certaines de nos négociations récentes avec des diplomates étrangers, [Root.Consort.GetHerHis] idées ont reçu des retours très positifs."
 consort_events.303.df:0 "En grandissant, [Root.Consort.GetName] aimait passer du temps avec les autres. [Root.Consort.GetSheHeCap] était un enfant inhabituellement calme, finement accordé aux sentiments de [Root.Consort.GetHerHis] amis, ou même de quiconque [Root.Consort.GetSheHe] rencontrait. Ce sixième sens presque lorsqu'il interagit avec les gens a non seulement fait de [Root.Consort.GetName] un convive très estimé et recherché, depuis [Root.Consort.GetHerHis] arrivée à [Root.Capital.GetCapitalName] : cela s'est également traduit dans d'autres affaires d'État. Lors d'une récente réunion avec des diplomates étrangers, on dit que les tactiques de négociation irréprochables du [Root.Consort.GetTitle] ont été le point culminant de l'événement !"
 consort_events.303.a:0 "Excellent."
 consort_events.304.t:0 "Les Idées administratives de [Root.Consort.GetName]"
 consort_events.304.da:0 "Combiné à une forte boussole morale, [Root.Consort.GetName] a toujours eu le sens de l'ordre. Les décisions prises par [Root.Consort.GetHerHim] sont des décisions de confiance : que ce soit sur des questions politiques ou lors de conversations amicales, le [Root.Consort.GetTitle] exprime [Root.Consort.GetHerHis] avis avec éloquence, quelque chose qui lui a valu une certaine admiration même durant [Root.Consort.GetHerHis] premiers jours en [origin_of_consort.GetName]. Plus important encore, les paroles du [Root.Consort.GetTitle] portent en elles une sincérité qui fait que même les membres les plus entêtés de la cour prêtent attention à tout conseil offert par [Root.Consort.GetHerHim]."
 consort_events.304.db:1 "Le royal [Root.Consort.GetTitle] [Root.Consort.GetName] possède une curiosité innée quant à sa façon de voir le monde. Comprendre ce qui fait agir les gens, ou comment un système s'articule, est un sujet souvent discuté autour du [Root.Consort.GetTitle] et on dit que cet intérêt a commencé tôt, durant [Root.Consort.GetHerHis] enfance en [origin_of_consort.GetName]. Ces réflexions peuvent le garder éveillé tard le soir, à étudier les textes d'érudits, anciens ou contemporains, ou même à s'assurer que [Root.Consort.GetHerHis] propres idées sont notées pour le bénéfice futur du [Root.GovernmentName]."
 consort_events.304.dc:0 "Cela a peut-être quelque chose à voir avec [Root.Consort.GetHerHis] éducation en [origin_of_consort.GetName], ou peut-être est-ce simplement [Root.Consort.GetHerHis] personnalité... Quoi qu'il en soit, le [Root.Consort.GetTitle] est l'un des sujets les plus dévots de tout [Root.GetName]. [Root.Consort.GetHerHisCap] foi inébranlable en temps difficiles apporte de l'espoir à notre peuple même dans les jours les plus sombres. Après chaque apparition publique qu'[Root.Consort.GetSheHe] fait, nous constatons que les habitants de notre grand [Root.GovernmentName] ont tendance à afficher une énergie renouvelée, sur leurs visages comme dans leurs tâches quotidiennes."
 consort_events.304.dd:0 "Combiné à une forte boussole morale, [Root.Consort.GetName] a toujours eu le sens de l'ordre. Les décisions prises par [Root.Consort.GetHerHim] sont des décisions de confiance : que ce soit sur des questions politiques ou lors de conversations amicales, le [Root.Consort.GetTitle] exprime [Root.Consort.GetHerHis] avis avec éloquence. Plus important encore, [Root.Consort.GetHerHis] paroles portent en elles une sincérité qui fait que même les membres les plus entêtés de la cour prêtent attention à tout conseil offert par [Root.Consort.GetHerHim]."
 consort_events.304.de:0 "Le royal [Root.Consort.GetTitle] [Root.Consort.GetName] possède une curiosité innée quant à sa façon de voir le monde. Comprendre ce qui fait agir les gens, ou comment un système s'articule, est un sujet souvent discuté autour du [Root.Consort.GetTitle]. Ces réflexions peuvent le garder éveillé tard le soir, à étudier les textes d'érudits, anciens ou contemporains, ou à s'assurer que [Root.Consort.GetHerHis] propres idées sont notées pour le bénéfice futur du [Root.GovernmentName]."
 consort_events.304.df:0 "Le [Root.Consort.GetTitle] est l'un des sujets les plus dévots de tout [Root.GetName]. [Root.Consort.GetHerHisCap] foi inébranlable en temps difficiles apporte de l'espoir à notre peuple même dans les jours les plus sombres. Après chaque apparition publique qu'[Root.Consort.GetSheHe] fait, nous constatons que les habitants de notre grand [Root.GovernmentName] ont tendance à afficher une énergie renouvelée, sur leurs visages comme dans leurs tâches quotidiennes."
 consort_events.304.a:0 "Excellent."
 consort_events.305.t:0 "Les Idées militaires de [Root.Consort.GetName]"
 consort_events.305.da:0 "Le [Root.Consort.GetTitle] [Root.Consort.GetName] se révèle être un [Root.Consort.GetWomanMan] intrépide. Souvent vu en train d'étudier la technique des soldats durant leur entraînement, parfois [Root.Consort.GetSheHe] approche même les terrains d'exercice [Root.Consort.GetHerselfHimself]... Bien que certains aient d'abord hésité à engager le royal [Root.Consort.GetTitle] au corps à corps, d'autres étaient curieux des compétences qu'[Root.Consort.GetSheHe] avait apportées de [Root.Consort.GetHerHis] vie en [origin_of_consort.GetName]. Même si ce fut une surprise pour certains, la réputation de [Root.Consort.GetName] de savoir se défendre dans un combat n'est pas usurpée. De plus, la présence du [Root.Consort.GetTitle] semble avoir un effet encourageant sur les troupes."
 consort_events.305.db:0 "Tout au long de [Root.Consort.GetHerHis] vie, remontant à [Root.Consort.GetHerHis] temps en [origin_of_consort.GetName], [Root.Consort.GetName] a développé une bonne compréhension de la stratégie militaire, lui permettant de participer à de nombreuses discussions sur le sujet. [Root.Consort.GetHerHisCap] sens sont clairement gouvernés par la raison, tandis que [Root.Consort.GetHerHis] idées concernent souvent les troupes dans leur ensemble, et comment prendre soin au mieux des hommes eux-mêmes, de l'être humain derrière le masque du guerrier. Cela a conduit nos généraux à tenir souvent les pensées du [Root.Consort.GetTitle] en haute estime."
 consort_events.305.dc:0 "Le [Root.Consort.GetTitle] [Root.Consort.GetName] se révèle être un [Root.Consort.GetWomanMan] intrépide. Souvent vu en train d'étudier la technique des soldats durant leur entraînement, parfois [Root.Consort.GetSheHe] approche même les terrains d'exercice [Root.Consort.GetHerselfHimself]... Bien que certains aient d'abord hésité à engager le royal [Root.Consort.GetTitle] au corps à corps, d'autres étaient curieux. Même si ce fut une surprise pour certains, la réputation de [Root.Consort.GetName] de savoir se défendre dans un combat n'est pas usurpée. De plus, la présence du [Root.Consort.GetTitle] semble avoir un effet encourageant sur les troupes."
 consort_events.305.dd:0 "Tout au long de [Root.Consort.GetHerHis] vie, [Root.Consort.GetName] a développé une bonne compréhension de la stratégie militaire, lui permettant de participer à de nombreuses discussions sur le sujet. [Root.Consort.GetHerHisCap] sens sont clairement gouvernés par la raison, tandis que [Root.Consort.GetHerHis] idées concernent souvent les troupes dans leur ensemble, et comment prendre soin au mieux des hommes, de l'être humain derrière le masque du guerrier. [Root.Consort.GetHerHisCap] pensées sont souvent tenues en haute estime par nos généraux."
 consort_events.305.a:0 "Excellent."
 consort_events.306.t:0 "Un Intérêt partagé"
 consort_events.306.da:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est connu pour posséder un esprit d'organisation. S'assurer que les gens ainsi que l'administration de [Root.GetName] respectent la loi, tout en mettant à jour et en ajustant le système pour s'adapter à notre époque, est d'un grand intérêt pour le [Root.Monarch.GetTitle]. Imaginez [Root.Monarch.GetHerHis] joie, en réalisant que [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband] partage bon nombre de ces idées !\n« Une conversation avec vous, cher [Root.Consort.GetName], est aussi stimulante que n'importe quelle réunion du conseil ! », s'exclame-t-[Root.Monarch.GetSheHe] au [Root.Consort.GetTitle] un après-midi. [Root.Consort.GetSheHeCap] répond par un sourire, appréciant également beaucoup de créer des liens avec [Root.Consort.GetHerHis] [Root.Monarch.GetWifeHusband] sur ces questions."
 consort_events.306.db:0 "Ce n'est un secret pour personne que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et le [Root.Consort.GetTitle] [Root.Consort.GetName] ont le don de la parole, et donc avec les gens. Ils peuvent tous deux mettre un étranger parfaitement à l'aise en leur présence, et réussissent toujours à être celui qui fait l'argument final dans une discussion. Bien que peut-être pas tout à fait égaux en charme, et utilisant différentes forces personnelles, ils ont appris à apprécier d'assister ensemble aux événements sociaux, souvent vus se sourire d'un air suffisant à distance. Ce qui est certain, c'est que le [Root.GovernmentName] se porte mieux depuis leur union."
 consort_events.306.dc:0 "La première fois que [Root.Consort.GetName] a regardé [Root.Monarch.GetName] s'entraîner avec [Root.Monarch.GetHerHis] soldats, [Root.Consort.GetSheHe] a été impressionné. Ce n'est pas tous les nobles qui apprécieraient le labeur manuel d'apprendre réellement à manier une arme. « Mais le [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'est pas n'importe qui », pensa-t-[Root.Consort.GetSheHe] avant d'approcher [Root.Consort.GetHerHis] [Root.Monarch.GetWifeHusband] pour complimenter [Root.Monarch.GetHerHis] compétences. [Root.Consort.GetSheHeCap] a même osé demander [Root.Monarch.GetHerHis] avis sur la situation militaire actuelle du [Root.GovernmentName]. Intrigué par cet intérêt mutuel pour les aspects militaires de [Root.GetName], le [Root.Monarch.GetTitle] a acquis beaucoup de nouvelles idées pour [Root.Monarch.GetHerHis] armée."
 consort_events.306.dd:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est connu pour posséder un esprit d'organisation. S'assurer que les gens ainsi que l'administration de [Root.GetName] respectent la loi, tout en mettant à jour et en ajustant le système pour s'adapter à notre époque, est d'un grand intérêt pour le [Root.Monarch.GetTitle]. Imaginez [Root.Monarch.GetHerHis] joie, en réalisant que [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband] partage bon nombre de ces idées !\n« Une conversation avec vous, cher [Root.Consort.GetName], est aussi stimulante que n'importe quelle réunion du conseil ! », s'exclame-t-[Root.Monarch.GetSheHe] au [Root.Consort.GetTitle] un après-midi. [Root.Consort.GetSheHeCap] répond par un sourire, appréciant également beaucoup de créer des liens avec [Root.Consort.GetHerHis] [Root.Monarch.GetWifeHusband] sur ces questions."
 consort_events.306.de:0 "Ce n'est un secret pour personne que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et le [Root.Consort.GetTitle] [Root.Consort.GetName] ont le don de la parole, et donc avec les gens. Ils peuvent tous deux mettre un étranger parfaitement à l'aise en leur présence, et réussissent toujours à être celui qui fait l'argument final dans une discussion. Bien que peut-être pas tout à fait égaux en charme, et utilisant différentes forces personnelles, ils ont appris à apprécier d'assister ensemble aux événements sociaux, souvent vus se sourire d'un air suffisant à distance. Ce qui est certain, c'est que le [Root.GovernmentName] se porte mieux depuis leur union."
 consort_events.306.df:0 "La première fois que [Root.Consort.GetName] a regardé [Root.Monarch.GetName] s'entraîner avec [Root.Monarch.GetHerHis] soldats, [Root.Consort.GetSheHe] a été impressionné. Ce n'est pas tous les nobles qui apprécieraient le labeur manuel d'apprendre réellement à manier une arme. « Mais le [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'est pas n'importe qui », pensa-t-[Root.Consort.GetSheHe] avant d'approcher [Root.Consort.GetHerHis] [Root.Monarch.GetWifeHusband] pour complimenter [Root.Monarch.GetHerHis] compétences. [Root.Consort.GetSheHeCap] a même osé demander [Root.Monarch.GetHerHis] avis sur la situation militaire actuelle du [Root.GovernmentName]. Intrigué par cet intérêt mutuel pour les aspects militaires de [Root.GetName], le [Root.Monarch.GetTitle] a acquis beaucoup de nouvelles idées pour [Root.Monarch.GetHerHis] armée."
 consort_events.306.a:0 "Ces deux-là vont bien ensemble."
 consort_events.307.t:0 "Partager ses défauts"
 consort_events.307.da:0 "Bien que notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'ait pas été le plus brillant en matière de gestion des finances de [Root.GetName], c'est avec intérêt que les gens ont observé le [Root.Monarch.GetTitle] et [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband] ensemble : ils semblent bien s'entendre, souvent surpris à discuter de futilités et à plaisanter sur la façon de dépenser le trésor du pays pour agacer les gens au maximum. « Qu'ils mangent de la brioche ! », dit [Root.Consort.GetName], souriant malicieusement."
 consort_events.307.db:0 "Certains disent que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est un [Root.Monarch.GetWomanMan] rustre. Bien qu'[Root.Monarch.GetSheHe] ait certainement [Root.Monarch.GetHerHis] bons côtés, le don de la parole n'est pas quelque chose pour lequel notre souverain est connu. Cependant, en observant le [Root.Monarch.GetTitle] avec [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband] à ses côtés, il semble que le couple ait trouvé un terrain d'entente dans cette lacune diplomatique. Il semble qu'un sentiment mutuel d'affection grandisse entre les royaux, né de leur maladresse commune."
 consort_events.307.dc:0 "[Root.Monarch.GetName] n'a jamais aimé être poussé à l'entraînement physique enfant. Toujours anxieux quand quelqu'un l'approche avec l'attente que le [Root.Monarch.GetTitle] montre une quelconque prouesse au combat, [Root.Monarch.GetSheHe] a été ravi de constater que [Root.Consort.GetName] semble également nerveux autour des armes et des discussions sur l'effusion de sang. Ensemble, ils ont créé des liens autour des choses plus raffinées de la vie, laissant les conversations mornes concernant la guerre et la stratégie militaire à d'autres parties plus intéressées."
 consort_events.307.a:0 "Ces deux-là vont bien ensemble."
 affectionate_royal_couple:0 "Couple royal affectueux"
 desc_affectionate_royal_couple:0 "L'affection mutuelle souvent affichée par notre couple royal renforce la confiance du peuple en nos souverains."
 consort_events.308.t:0 "Se Souvenir du consort"
 consort_events.308.da:0 "Après plus de dix ans de mariage, [Root.Monarch.GetName] est perdu sans [Root.Monarch.GetHerHis] conjoint. De nombreux jours, on le trouve à fixer le vide, pour que [Root.Monarch.GetHerHis] conseillers le ramènent à la réalité, leurs expressions anxieuses. Tous s'accordent à dire qu'il est temps de faire quelque chose pour aider le [Root.Monarch.GetTitle] à traverser cette période difficile."
 consort_events.308.db:0 "Après des décennies de mariage, [Root.Monarch.GetName] est perdu sans [Root.Monarch.GetHerHis] conjoint. De nombreux jours, on le trouve à fixer le vide, pour que [Root.Monarch.GetHerHis] conseillers le ramènent à la réalité, leurs expressions anxieuses. Tous s'accordent à dire qu'il est temps de faire quelque chose pour aider le [Root.Monarch.GetTitle] à traverser cette période difficile."
 consort_events.308.dc:0 "Après un si long mariage, [Root.Monarch.GetName] est perdu sans [Root.Monarch.GetHerHis] cher conjoint. De nombreux jours, on le trouve à fixer le vide, pour que [Root.Monarch.GetHerHis] conseillers le ramènent à la réalité, leurs expressions anxieuses. Tous s'accordent à dire qu'il est temps de faire quelque chose pour aider le [Root.Monarch.GetTitle] à traverser cette période difficile."
 consort_events.308.a:0 "Engager un sculpteur. Nous érigerons une statue à la mémoire de [Root.Monarch.GetHerHis] conjoint."
 consort_events.308.b:0 "[Root.Monarch.GetName] devrait se concentrer sur [Root.Monarch.GetHerHis] travail administratif."
 consort_events.308.c:0 "Laissons [Root.Monarch.GetName] chercher la distraction de [Root.Monarch.GetHerHis] devoir diplomatique."
 consort_events.308.d:0 "Faites passer [Root.Monarch.GetName] plus de temps à la table de guerre."
 consort_events.308.e:0 "Le [Root.Monarch.GetTitle] traversera cela par [Root.Monarch.GetHerHis] propres moyens."
 commemorative_statue:0 "Statue commémorative"
 desc_commemorative_statue:0 "Une belle statue représentant le défunt consort royal se trouve ici."
 attention_to_detail:0 "Attention aux détails"
 desc_attention_to_detail:0 "Notre souverain passe actuellement beaucoup de temps à son bureau, supervisant attentivement chaque détail des affaires administratives du royaume."
 focused_listener:0 "Auditeur attentif"
 desc_focused_listener:0 "Notre souverain fait actuellement un effort impressionnant pour tirer le meilleur parti de chaque interaction diplomatique qui se présente."
 dedicated_strategist:0 "Stratège dévoué"
 desc_dedicated_strategist:0 "Notre souverain passe actuellement la plupart de son temps éveillé en conseil, contemplant et discutant la stratégie élaborée et les tactiques complexes de la guerre."
 overworked_ruler_adm:0 "Administrateur surmené"
 desc_overworked_ruler_adm:0 "En essayant de se distraire de son chagrin, notre souverain s'est noyé dans le travail, ce qui n'a pas eu l'effet désiré."
 overworked_ruler_dip:0 "Diplomate surmené"
 desc_overworked_ruler_dip:0 "En essayant de se distraire de son chagrin, notre souverain s'est noyé dans le travail, ce qui n'a pas eu l'effet désiré."
 overworked_ruler_mil:0 "Commandant surmené"
 desc_overworked_ruler_mil:0 "En essayant de se distraire de son chagrin, notre souverain s'est noyé dans le travail, ce qui n'a pas eu l'effet désiré."
 consort_events.309.t:0 "Le Succès de la succession"
 consort_events.309.da:0 "Depuis la mort de [Root.Consort.GetHerHis] conjoint, le [Root.Consort.GetTitle] [Root.Consort.GetName] s'est installé de plus en plus confortablement dans [Root.Consort.GetHerHis] position, à la fois comme tuteur du jeune héritier et comme régent royal de [Root.GetName]. Pour le grand public, il est clair que la situation est temporaire et simplement une nécessité politique en attendant le couronnement du petit [Root.Heir.GetName] [Root.Heir.Dynasty.GetName]. Pendant ce temps, il y a des rumeurs d'autres personnages, qui participeraient à des réunions clandestines où ils discutent, à leurs yeux, du véritable potentiel du jeune héritier... « Mettre cet imbécile baveux sur le trône serait une menace pour tout le royaume », marmonne un conspirateur. « Le [Root.Consort.GetTitle] est certainement un [Root.Consort.GetWomanMan] capable, et une bien meilleure option », argumente un autre.\n\nBien que certainement conscient de ces forces rusées, le [Root.Consort.GetTitle] [Root.Consort.GetHerselfHimself] n'a pas encore pris position sur cette question très sensible."
 consort_events.309.a:0 "Ce sont des temps intéressants..."
 consort_events.309.a.tt:0 "Le [Root.Consort.GetTitle] méditera ces idées avec son conseil le plus proche."
 consort_events.309.b:0 "Quelle trahison ! Nous n'admettrons plus ces idées."
 consort_events.309.b.tt:0 "Les instigateurs ne seront pas encouragés."
 consort_events.310.t:0 "Un Changement de pouvoir"
 consort_events.310.da:0 "Utilisant les conseils de [Root.Consort.GetHerHis] conseillers les plus proches et non sans mettre [Root.Consort.GetHerHis] propre charme à l'épreuve, le [Root.Consort.GetTitle] [Root.Consort.GetName] a habilement manipulé un bon nombre de membres de la cour pour qu'ils s'accordent : [Root.Heir.GetName] [Root.Heir.Dynasty.GetName], l'héritier royal et prochain sur la ligne de succession, est un imbécile à l'esprit faible, indigne de [Root.Heir.GetHerHis] héritage. Cependant, il y a une solution simple au problème...\nLors d'un autre festin extravagant organisé pour plaire à la noblesse en charge, [Root.Consort.GetName] et [Root.Consort.GetHerHis] laquais ont réussi à répandre l'idée de garder le jeune [Root.Heir.GetName] enfermé dans [Root.Heir.GetHerHis] quartiers : un peu d'isolement permettrait à l'enfant [Root.Heir.Dynasty.GetName] de se concentrer sur [Root.Heir.GetHerHis] éducation, argue-t-on. Que le jeune héritier puisse aussi s'effacer de la vue du public est malheureux pour [Root.Heir.GetName], mais ultimement un bonus pour [Root.GetName]..."
 consort_events.310.a:0 "Faites en sorte que cela se produise."
 consort_events.310.b:0 "En fait, peut-être que le jeune [Root.Heir.GetName] mérite une chance après tout."
 devious_ruler:0 "Souverain retors"
 desc_devious_ruler:0 "Ce souverain est arrivé au pouvoir dans des circonstances très inhabituelles."
 consort_events.311.t:0 "Un [Root.Consort.GetTitle] du peuple"
 consort_events.311.d:0 "Il nous est devenu clair que le [Root.Consort.GetTitle] [Root.Consort.GetName] est un [Root.Consort.GetWomanMan] au cœur d'or. [Root.Consort.GetSheHeCap] fait toujours de [Root.Consort.GetHerHis] mieux pour plaire à [Root.Consort.GetHerHis] [Root.Monarch.GetWifeHusband], le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et traite [Root.Consort.GetHerHis] amis avec une bonté inégalée. Lors d'un récent voyage dans la province de [poor_province.GetName], le [Root.Consort.GetTitle] [Root.Consort.GetName] a vu la souffrance de ses paysans les plus pauvres de [Root.Consort.GetHerHis] propres yeux. Depuis, [Root.Consort.GetSheHe] élabore un plan pour aider [Root.Consort.GetHerHis] sujets les plus démunis. Cependant, pour que ces idées deviennent réalité, [Root.Consort.GetName] a besoin de fonds du trésor de la nation."
 consort_events.311.a:0 "Le peuple est à notre charge. [Root.Consort.GetSheHeCap] a notre soutien."
 consort_events.311.b:0 "Nous avons des affaires plus importantes à régler."
 consort_events.312.t:0 "Deux âmes semblables"
 consort_events.312.da:0 "Notre [Root.Consort.GetTitle] [Root.Consort.GetName] a impressionné de nombreux hommes et femmes à la cour par [Root.Consort.GetHerHis] esprit vif et ses connaissances étendues du monde naturel. [Root.Consort.GetSheHeCap] collectionne depuis longtemps des ouvrages de botanique et de chimie, et [Root.Consort.GetSheHe] correspond avec plusieurs des esprits les plus brillants de notre génération. Actuellement, l'un de ces scientifiques visite notre cour sur invitation de notre [Root.Consort.GetTitle]. On peut les trouver en train de discuter de toutes sortes de nouvelles théories jusque tard dans la nuit. Le [Root.Consort.GetTitle] [Root.Consort.GetName] nous a demandé de faire une offre au scientifique, affirmant qu'elle ferait un bien meilleur conseiller que le [Root.Adm_Advisor.GetTitle] [Root.Adm_Advisor.GetName] que nous employons actuellement."
 consort_events.312.db:0 "La plupart des [Root.Consort.GetTitle] acceptent leur pouvoir limité et consacrent leur vie à divers passe-temps et à leur famille, mais pas [Root.Consort.GetName]. [Root.Consort.GetSheHeCap] est sincèrement intéressé par tous les tenants et aboutissants des affaires gouvernementales. Au fil des années, [Root.Consort.GetSheHe] s'est lié d'amitié avec de nombreux grands penseurs, politiciens et diplomates. Parmi eux se trouve l'un de nos hommes d'État les plus connus, avec qui [Root.Consort.GetSheHe] a passé beaucoup de temps dernièrement. Maintenant, le [Root.Consort.GetTitle] [Root.Consort.GetName] nous a demandé de faire une offre à l'homme d'État, affirmant qu'il ferait un bien meilleur conseiller que le [Root.Dip_Advisor.GetTitle] [Root.Dip_Advisor.GetName] que nous employons actuellement."
 consort_events.312.dc:0 "Aucun autre [Root.Consort.GetTitle] n'est aussi brave que notre [Root.Consort.GetName] ! Les tactiques et l'organisation militaires ont toujours été d'un grand intérêt pour [Root.Consort.GetHerHim]. En plus de [Root.Consort.GetHerHis] pratique quotidienne de l'épée, [Root.Consort.GetSheHe] passe de nombreuses heures chaque jour à étudier l'art de la guerre. Ces derniers mois, [Root.Consort.GetSheHe] s'est rapproché de l'un de nos commandants les plus respectés, et lui à son tour a pris notre [Root.Consort.GetTitle] sous son aile, enseignant à [Root.Consort.GetName] tout ce qu'[Root.Consort.GetSheHe] souhaite savoir. Maintenant, le [Root.Consort.GetTitle] [Root.Consort.GetName] nous a demandé de faire une offre au commandant, affirmant qu'il ferait un bien meilleur conseiller que le [Root.Mil_Advisor.GetTitle] [Root.Mil_Advisor.GetName] que nous employons actuellement."
 consort_events.312.a:0 "Le [Root.Consort.GetTitle] [Root.Consort.GetName] a raison ! Nous inviterons [Root.Consort.GetHerHis] connaissance à rester."
 consort_events.312.a.tt:0 "L'ami du [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! devient conseiller à la cour."
 consort_events.312.b:0 "Non, nous demanderons simplement au [Root.Adm_Advisor.GetTitle] [Root.Adm_Advisor.GetName] de travailler plus dur."
 consort_events.312.b.tt:0 "Le [Root.Adm_Advisor.GetTitle] §Y[Root.Adm_Advisor.GetName]§! travaillera encore plus dur pour mériter [Root.Adm_Advisor.GetHerHis] place."
 consort_events.312.c:0 "Non, nous demanderons simplement au [Root.Dip_Advisor.GetTitle] [Root.Dip_Advisor.GetName] de travailler plus dur."
 consort_events.312.c.tt:0 "Le [Root.Dip_Advisor.GetTitle] §Y[Root.Dip_Advisor.GetName]§! travaillera encore plus dur pour mériter [Root.Dip_Advisor.GetHerHis] place."
 consort_events.312.d:0 "Non, nous demanderons simplement au [Root.Mil_Advisor.GetTitle] [Root.Mil_Advisor.GetName] de travailler plus dur."
 consort_events.312.d.tt:0 "Le [Root.Mil_Advisor.GetTitle] §Y[Root.Mil_Advisor.GetName]§! travaillera encore plus dur pour mériter [Root.Mil_Advisor.GetHerHis] place."
 consort_events.313.t:0 "Le Miracle de la vie"
 consort_events.313.d:0 "En ces jours sombres de guerre et de mort, un rappel de nouveaux commencements peut soulager les peines de notre peuple. Notre grand [Root.Monarch.GetTitle] [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] noble [Root.Consort.GetTitle] [Root.Consort.GetName] ont été bénis d'un autre enfant. L'arrivée du bébé a apporté un nouvel espoir et une nouvelle énergie au couple royal, et par extension, à leur cour et leurs sujets. Beaucoup de gens rêvent que cet enfant grandira dans un avenir meilleur et plus radieux, et que tous les combats en auront valu la peine."
 consort_events.313.a:0 "Bénis soient [Root.Monarch.GetName], [Root.Consort.GetName] et leur nouveau-né !"
 consort_events.313.a.tt:0 "La naissance du nouveau bébé [Root.Monarch.Dynasty.GetName] revitalise le peuple de [Root.GetName]."
 consort_events.314.t:0 "Désirs de la chair"
 consort_events.314.da:0 "Bien que nous ayons réussi à cacher la vérité au reste de la cour, ce n'est qu'une question de temps avant qu'elle ne se sache si nous ne faisons rien. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a récemment découvert que [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband], le [Root.Consort.GetTitle] [Root.Consort.GetName], a une liaison ! Non seulement cela, mais l'autre coupable n'est autre que notre conseiller [Root.Adm_Advisor.GetName]. La confiance que nous lui avons accordée était manifestement infondée. Pire encore, cela soulève également des questions concernant la légitimité du [Root.Heir.GetDaughterSon] du [Root.Monarch.GetTitle], [Root.Heir.GetName] [Root.Heir.Dynasty.GetName]."
 consort_events.314.db:0 "Bien que nous ayons réussi à cacher la vérité au reste de la cour, ce n'est qu'une question de temps avant qu'elle ne se sache si nous ne faisons rien. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a récemment découvert que [Root.Monarch.GetHerHis] [Root.Consort.GetWifeHusband], le [Root.Consort.GetTitle] [Root.Consort.GetName], a une liaison ! Non seulement cela, mais l'autre coupable n'est autre que notre conseiller [Root.Adm_Advisor.GetName]. La confiance que nous lui avons accordée était manifestement infondée."
 consort_events.314.a:0 "Maintenant nous savons, au moins. Nous pouvons prendre des mesures pour garder cela secret."
 consort_events.314.a.tt:0 "Permettre à la liaison entre le [Root.Consort.GetTitle] §Y[Root.Consort.GetName]§! et le [Root.Adm_Advisor.GetTitle] §Y[Root.Adm_Advisor.GetName]§! de continuer, tout en faisant de notre mieux pour la cacher au public."
 consort_events.314.b:0 "Cela ne peut pas continuer. Découvrons ce que [Root.Adm_Advisor.GetName] veut pour [Root.Adm_Advisor.GetHerHis] silence."
 consort_events.314.b.tt:0 "Soudoyer le [Root.Adm_Advisor.GetTitle] §Y[Root.Adm_Advisor.GetName]§! pour qu'il quitte la cour et ne souffle jamais mot de la liaison à quiconque."
 consort_events.314.c:0 "C'est de la haute trahison, ni plus ni moins ! Nous aurons la tête de [Root.Adm_Advisor.GetName] pour cela !"
 consort_events.314.c.tt:0 "Le [Root.Adm_Advisor.GetTitle] §Y[Root.Adm_Advisor.GetName]§! est exécuté. Sans explication suffisante, cet acte sera perçu comme tyrannique et créera des troubles dans §Y[Root.Capital.GetName]§! et les environs."
 consort_events.314.d:0 "Nous ne pouvons avoir une adultère pour Reine. [Root.Consort.GetName] doit partir."
 consort_events.314.e:0 "Nous ne pouvons avoir un adultère pour Prince-Consort. [Root.Consort.GetName] doit partir."
 tyrannical_ruler:0 "Souverain tyrannique"
 desc_tyrannical_ruler:0 "Pour des raisons obscures, le souverain a fait exécuter l'un des conseillers les plus fiables du conseil. Le peuple s'inquiète de cette démonstration de cruauté."
 consort_events.315.t:0 "Un Bâtard royal"
 consort_events.315.d:0 "Nous avons essayé d'arrêter les rumeurs, mais lorsque nous en avons pris connaissance, il était déjà trop tard. Maintenant, un homme sur deux et une femme sur deux à la cour commérent dans notre dos. Même les roturiers dans les rues ont le culot de faire des plaisanteries grivoises sur « l'aimable [Root.Consort.GetTitle] [Root.Consort.GetName] » et « le bâtard de [Root.Capital.GetName] ». On dit que la Reine est une adultère et que [Root.Heir.GetName], l'héritier de [Root.GetName], n'est pas réellement le [Root.Heir.GetDaughterSon] du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Tout ce que nous pouvons faire à ce stade est de sauver les apparences du mieux possible et espérer que les rumeurs s'estomperont avec le temps."
 consort_events.315.a:0 "Ces mensonges sont grotesques !"
 EST_VAL_NOBLE_CONSORT:0 "Noble Consort"
 revolutionary_republic_factions.0.t:0 "Troubles dans l'armée"
 revolutionary_republic_factions.0.d:0 "Briser les chaînes de l'ancien régime a enfin libéré le sommet du corps des officiers des liens restrictifs entre la naissance et la promotion. Sans aucun doute, notre armée sera bientôt dirigée par des hommes de mérite qui surpasseront l'ancienne récolte d'aristocrates. Pour l'instant cependant, le manque soudain d'officiers expérimentés au sommet ainsi que le grand afflux de nouvelles recrues à la base ont créé une atmosphère quelque peu volatile dans nos rangs. Le patriotisme et la ferveur révolutionnaire sont de fortes motivations mais sans un commandement capable, toute armée peut se retrouver incapable de remplir ses objectifs."
 revolutionary_republic_factions.0.a:0 "Nous ne pourrions jamais compromettre notre idéologie !"
 revolutionary_republic_factions.0.b:0 "Ce sont des hommes d'ambition dont nous avons besoin. Laissons-les remodeler notre armée !"
 revolutionary_republic_factions.0.c:0 "Nous devons faire ce que nous pouvons pour garder les vieux hommes de qualité pour l'instant."
 revolutionary_republic_factions.1.t:0 "Faute d'une corde..."
 revolutionary_republic_factions.1.d:1 "L'ancien régime a toujours été étroitement lié au pouvoir du clergé et la peur du divin est l'un des moyens de contrôler le peuple que nos radicaux détestent le plus. Par conséquent, la confiscation des biens religieux et l'obligation pour tout le clergé de prêter un serment de loyauté à une Constitution Civile ont été en tête de l'agenda pour beaucoup à l'Assemblée nationale. En dehors des radicaux, tout le monde à l'assemblée n'est pas d'accord sur la meilleure marche à suivre et notre politique a oscillé quelque peu au fil du temps. L'athéisme n'est pas toujours le plus populaire auprès des masses et surtout dans les campagnes, nos actions contre les prêtres locaux ont été accueillies avec mépris.\nPeut-être serait-il bénéfique de réduire un peu notre radicalisme sans abandonner l'objectif à long terme de libérer la société de la religion ?"
 revolutionary_republic_factions.1.a:0 "Nous ne pouvons trahir notre idéologie !"
 revolutionary_republic_factions.1.b:0 "Le clergé peut être utile pour maintenir l'ordre."
 revolutionary_republic_factions.1.c:0 "Nous pouvons faire preuve d'un peu de souplesse ici."
 revolutionary_republic_factions.2.t:0 "La Faveur de la populace"
 revolutionary_republic_factions.2.d:2 "Les gens pauvres et démunis de [Root.Capital.GetCapitalName] ont été à bien des égards plus habilités par la révolution que d'autres groupes dans notre [Root.GovernmentName]. Bien que l'objectif soit de briser les chaînes de l'ancien ordre pour tous ceux qui ont été opprimés si longtemps, les citoyens de [Root.Capital.GetCapitalName] sont proches du siège du pouvoir et peuvent faire connaître leur volonté directement à leurs représentants. Certains craignent même la volonté de ce qu'ils considèrent comme une populace indisciplinée qui change de loyauté selon son caprice. D'autres soulignent que cette « populace » est une manifestation directe de la volonté du peuple et que nous ferions tous bien de l'écouter."
 revolutionary_republic_factions.2.a:0 "Ils ont besoin de quelqu'un pour parler en leur nom !"
 revolutionary_republic_factions.2.a.tt:0 "En donnant du pouvoir et en flattant le peuple de [Root.Capital.GetCapitalName], nous renforcerons la popularité de notre gouvernement."
 revolutionary_republic_factions.2.b:0 "À l'armée !"
 revolutionary_republic_factions.2.b.tt:0 "Nous exploiterons le patriotisme du peuple de [Root.Capital.GetCapitalName] en les enrôlant dans les rangs de notre grande armée. La révolution doit être propagée à l'étranger !"
 revolutionary_republic_factions.2.c:0 "Nous ne pouvons laisser la peur gouverner ce grand pays."
 revolutionary_republic_factions.2.c.tt:0 "Nous donnerons du pouvoir à ceux qui veulent limiter le pouvoir des masses afin de restaurer l'ordre et l'autorité dans notre belle République."
 revolutionary_republic_factions.3.t:0 "Loyauté vacillante"
 revolutionary_republic_factions.3.da:0 "Les convictions idéologiques peuvent changer et parfois les rivalités personnelles laissent même de hauts fonctionnaires désillusionnés par leurs anciens compagnons d'armes. Un haut fonctionnaire des gouvernements précédents est récemment passé à ceux qu'il aurait autrefois considérés comme ses ennemis jurés. Avec lui, il apporte certains des secrets les plus sombres des $RR_GIRONDISTS$ et une volonté fervente de nuire à leur influence en général et à l'Assemblée nationale en particulier."
 revolutionary_republic_factions.3.db:0 "Les convictions idéologiques peuvent changer et parfois les rivalités personnelles laissent même de hauts fonctionnaires désillusionnés par leurs anciens compagnons d'armes. Un haut fonctionnaire des gouvernements précédents est récemment passé à ceux qu'il aurait autrefois considérés comme ses ennemis jurés. Avec lui, il apporte certains des secrets les plus sombres des $RR_ROYALISTS$ et une volonté fervente de nuire à leur influence en général et à l'Assemblée nationale en particulier."
 revolutionary_republic_factions.3.dc:0 "Les convictions idéologiques peuvent changer et parfois les rivalités personnelles laissent même de hauts fonctionnaires désillusionnés par leurs anciens compagnons d'armes. Un haut fonctionnaire des gouvernements précédents est récemment passé à ceux qu'il aurait autrefois considérés comme ses ennemis jurés. Avec lui, il apporte certains des secrets les plus sombres des $RR_JACOBINS$ et une volonté fervente de nuire à leur influence en général et à l'Assemblée nationale en particulier."
 revolutionary_republic_factions.3.a:0 "Intéressant."
 revolutionary_republic_factions.4.t:0 "Ennemis de la Révolution"
 revolutionary_republic_factions.4.d:0 "Les ennemis de la révolution sont partout, même parmi nous. Nous ne pouvons permettre aux nobles, aux prêtres et aux divers représentants de l'ancien ordre de continuer comme si de rien n'était. Nous devons agir rapidement et délibérément pour écraser tout comportement contre-révolutionnaire ou suspicion de monarchisme. À cette fin, les $RR_JACOBINS$ ont eu la prévoyance d'établir un tribunal où le peuple peut donner son jugement sur où nous pouvons trouver amis et ennemis. Qui serait plus apte à identifier les ennemis de la révolution que les citoyens et citoyennes ordinaires de [Root.Capital.GetCapitalName] ?"
 revolutionary_republic_factions.4.a:0 "Égalité, Liberté, Fraternité ou la Mort !"
 revolutionary_republic_factions.5.t:0 "Consolidation du pouvoir"
 revolutionary_republic_factions.5.d:0 "Depuis son élection, le nouveau [Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est efforcé de consolider son pouvoir. Divers hommes d'ambition ont été soit remplacés soit promus, les membres de l'assemblée nationale ont été contournés, marginalisés et déjoués à chaque occasion possible. Les gens dans les rues de [Root.Capital.GetCapitalName] sont quelque peu inquiets de cette activité mais la présence de troupes loyales et le soutien de la population des campagnes maintiennent [Root.GetName] comme un pays inhabituellement calme et ordonné. Pour l'instant."
 revolutionary_republic_factions.5.a:0 "Liberté et Ordre public !"
 revolutionary_republic_factions.6.t:0 "Une Constitution pour [Root.GetName]"
 revolutionary_republic_factions.6.d:0 "Bien qu'ils soient principalement perçus comme les partisans de la propagation de la révolution à l'étranger par des actions militaires, les $RR_GIRONDISTS$ sont également à bien des égards la voix de l'establishment. Maintenant qu'ils ont acquis une influence considérable à l'Assemblée nationale, ils utilisent ce pouvoir pour tenter de créer un ensemble formalisé de règles, une constitution pour notre nouveau pays. Ce n'est pas le premier projet de ce genre et probablement pas le dernier mais ils espèrent qu'il nous rapprochera d'un nouvel ordre et d'une ère de Libéralisme, d'Égalité et de Fraternité."
 revolutionary_republic_factions.6.a:0 "Vive la République !"
 revolutionary_republic_factions.7.t:0 "Manque d'administrateurs"
 revolutionary_republic_factions.7.d:0 "Écraser l'ancien ordre a apporté une justice et une égalité sans précédent aux masses ainsi que des actifs substantiels dans le trésor de l'État. Cela a cependant aussi signifié une perte d'administrateurs, de bureaucrates et de clercs expérimentés. Les $RR_GIRONDISTS$ sont rapidement devenus la faction de nombreux membres restants de l'ancien establishment et bien qu'ils prétendent soutenir la révolution dans chaque principe, ils sont consternés par la direction que les choses ont prise dernièrement. Beaucoup de ces fils de la petite noblesse, de l'ancien clergé et d'autres classes privilégiées se sont retirés de la vie publique et quittent le pays par crainte pour leur vie.\nCela nous a laissés avec un État qui a plus à administrer mais moins de gens avec l'expérience requise pour le faire. Avec le mérite comme principe directeur du gouvernement, nous sommes certains de trouver de nouveaux citoyens capables pour prendre leur place mais cela nous a tout de même mis dans une situation quelque peu difficile pour le moment."
 revolutionary_republic_factions.7.a:0 "C'est un petit prix à payer pour l'avancement de l'Homme."
 revolutionary_republic_factions.7.b:0 "Essayons d'en garder au moins quelques-uns."
 revolutionary_republic_factions.8.t:0 "Généraux populaires"
 revolutionary_republic_factions.8.d:2 "Le principal protecteur de notre [Root.GovernmentName] et des valeurs de la Révolution est notre armée. Contrairement aux représentants de l'ancien ordre, nos rangs sont remplis de citoyens ordinaires animés par leur patriotisme ardent et leurs convictions libérales. Une vie dans l'armée peut aussi rapprocher les personnes les plus disparates et créer des liens forts entre les soldats et leurs officiers.\nLa popularité de certains de nos généraux a maintenant atteint des niveaux quelque peu effrayants et il y a des craintes à l'Assemblée nationale que cela se répande dans la population générale en raison de nos politiques de recrutement larges. Nous pourrions essayer de limiter certains des hommes les plus manifestement dangereux en leur donnant des missions loin de nous mais cela renforcerait probablement leurs partisans dans leur conviction de notre propre incompétence, du moins à court terme."
 revolutionary_republic_factions.8.a:0 "C'est inévitable mais inoffensif."
 revolutionary_republic_factions.8.b:0 "Tenter de limiter certains des dirigeants les plus menaçants."
 revolutionary_republic_factions.9.t:0 "Massacres de [GetMonth]"
 revolutionary_republic_factions.9.d:1 "Craignant l'influence des crypto-monarchistes et des contre-révolutionnaires parmi l'élite dirigeante, le peuple de [Root.Capital.GetCapitalName] est descendu dans les rues pour défendre l'esprit de la révolution. Tous ceux associés à l'ancien ordre, des prêtres [Root.Owner.Religion.GetName] aux membres de la petite noblesse, ou même ceux déjà emprisonnés pour leurs crimes contre l'État ont été ciblés. Les $RR_JACOBINS$ radicaux font de leur mieux pour enflammer les cœurs et les esprits des masses.\nCela place le gouvernement dans une situation quelque peu précaire. Certaines des personnes ciblées sont membres de leurs propres rangs, et ces massacres incontrôlés nous font paraître faibles, car ils nuisent gravement au bien-être de notre ville autrefois belle. Cependant, si nous faisions quoi que ce soit pour les arrêter, cela ferait le jeu des Jacobins..."
 revolutionary_republic_factions.9.a:0 "Les ennemis de la révolution doivent mourir !"
 revolutionary_republic_factions.9.b:0 "Il est temps de faire intervenir les troupes."
 clerical_pragmatism:0 "Clergé contrôlé"
 desc_clerical_pragmatism:0 "Nous avons permis au clergé de conserver certains de ses privilèges, surtout dans les campagnes tant qu'il est loyal à l'État."
 clerical_support:0 "Clergé soutenant"
 desc_clerical_support:0 "Nous avons permis au clergé de conserver la plupart de ses privilèges tant qu'il est loyal à nos dirigeants."
 state_atheism:0 "Persécution du clergé"
 desc_state_atheism:0 "Nous maintenons fermement le principe d'un État entièrement libre d'influence religieuse. Les clercs sont tenus de prêter un serment de loyauté à une constitution civique et de renoncer à leurs liens avec l'establishment religieux et tous les biens religieux ont été confisqués par l'État. Bien que juste, cette politique n'est pas toujours la plus populaire auprès des citoyens des campagnes."
 imperial_faction_in_army:0 "Faction impériale forte dans l'armée"
 desc_imperial_faction_in_army:0 "Des généraux populaires ont gagné un large soutien parmi les soldats ordinaires de notre armée républicaine. Beaucoup d'entre eux ont utilisé cette influence pour obtenir des droits et privilèges qui nuisent à l'intégrité des valeurs révolutionnaires qu'ils ont juré de défendre."
 radical_massacres:0 "Massacres"
 desc_radical_massacres:0 "Le peuple de notre grande capitale a pris sur lui de se débarrasser des ennemis de la Révolution. Bien que cela nous ait sans doute libérés de nombreux traîtres, cela a aussi eu un coût en souffrances humaines pour la ville autrefois belle. Tant qu'ils ne feront pas confiance à la province pour être sûre, les commerçants et marchands l'éviteront."
 revolutionary_tribunals:0 "Tribunaux révolutionnaires"
 desc_revolutionary_tribunals:0 "Pour traiter les ennemis de la Révolution, les Jacobins ont enrôlé le soutien du peuple de la rue pour se débarrasser des traîtres, des espions et des mécontents. Nous ne nous reposerons pas tant que le dernier noble traître ne sera pas mort."
 constitutional_project:0 "Projet constitutionnel"
 desc_constitutional_project:0 "Les Girondins utilisent leur influence pour formaliser les idées de la révolution et pour cimenter leurs propres idées dans un grand projet constitutionnel pour la République. Nous approchons d'un avenir où tout sera ordonné de la meilleure façon possible."
 consolidation_of_power:0 "Consolidation du pouvoir exécutif"
 desc_consolidation_of_power:0 "Notre conseil ne perd pas de temps au pouvoir. Il a consolidé son pouvoir et placé ses propres gens aux bons postes."
 suffering_administration:0 "Administration souffrante"
 desc_suffering_administration:0 "Notre ferveur révolutionnaire a assuré de grandes avancées pour le peuple. Cela a cependant aussi entraîné une certaine pénurie d'hommes et de femmes instruits pour occuper les bureaux de notre nation..."
