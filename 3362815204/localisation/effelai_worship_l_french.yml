l_french:
    #Events For Effelai Worship
    effelai_worship.1.t:0 "Gestionnaire d'événements"
    effelai_worship.1.d:0 "placeholder"
    effelai_worship.1.a:0 "placeholder"
    effelai_worship.2.t:0 "Les Explorateurs d'Effelai"
    effelai_worship.2.d:0 "Son chant résonne sans cesse, nous rappelant notre serment envers elle. Protéger ces terres des menaces extérieures, purifier ces jungles immenses de ceux qui chercheraient à la corrompre. Mais sa beauté s'étend bien au-delà de ce marécage d'horreurs. De vastes contrées nous entourent, chacune étant une part unique de son être, et toutes également essentielles à la survie des autres. Nous devons partir explorer chaque région, recueillant les bienfaits variés qu'elle nous offre tout au long de notre périple, jusqu'à ce qu'enfin nous puissions nous établir. Notre quête accomplie, nous ferons de la dernière région visitée notre foyer. Ce n'est qu'après les rudes épreuves qui nous attendent que nous aurons de nouveau mérité le droit d'être ses protecteurs."
    effelai_worship.2.a:0 "Effelai chante"
    effelai_worship.10.t:0 "Le Cerveau"
    effelai_worship.10.d:0 "Le domaine de Chahinanito est vaste et varié ; il nous faudra bien des jours de voyage et de labeur pour contempler toute sa splendeur. En quittant les terres des Effe'i, nous découvrons une contrée mystérieuse, enveloppée d'une aura de secrets anciens. Cet espace énigmatique, dissimulé parmi le feuillage dense et voilé d'une brume éthérée, recèle des ruines à peine visibles. À mesure que l'on s'aventure avec prudence en ce lieu sacré, les vestiges émergent de la végétation envahissante : éclats de flèches de verre, pierres aux gravures complexes, et mosaïques à demi effacées représentant des étrangers qui portaient notre visage, leurs silhouettes à peine discernables sous l'inexorable avancée du feuillage. La flore luxuriante de la jungle s'entrelace aux vestiges de merveilles architecturales, tandis que des arbres immenses s'élancent vers les cieux à travers les plafonds érodés de temples depuis longtemps abandonnés. Des murmures de savoir, émanant peut-être de l'esprit même de la Déesse, semblent résonner à travers le bruissement des feuilles, nous invitant à percer les secrets qui s'y cachent.\n\nIci, en ce sanctuaire oublié du temps, Chahinanito semble veiller sur ces vestiges d'une aura protectrice, comme si elle préservait la mémoire de ses habitants disparus. D'élégantes arches de pierre encadrent des panoramas d'une beauté naturelle à couper le souffle, tandis que des passages secrets et des chambres souterraines laissent entrevoir des mystères enfouis qui n'attendent que d'être découverts. Alors que le soleil projette sa lumière tachetée sur les ruines, une atmosphère d'émerveillement et de révérence imprègne l'air, invitant les voyageurs à méditer sur la grandeur et la tragédie de ceux qui les précédèrent, à jamais perdus dans la marche inexorable du temps. Méditons sur cela tandis que nous poursuivons notre pèlerinage."
    effelai_worship.10.a:0 "La puissance de l'esprit est redoutable."
    effelai_worship.11.t:0 "La Gueule"
    effelai_worship.11.d:0 "Au plus profond de nos terres s'étend une région traîtresse et hostile : la Gueule. Cette vaste étendue n'est qu'un immense marécage où des eaux troubles s'étendent à l'infini et où la végétation enchevêtrée est presque aussi dense que le brouillard. C'est un royaume de maladies perpétuelles et d'humidité étouffante, créant un environnement qui grouille de créatures propres à ce lieu maudit. Des monstres à tentacules guettent sous la surface, leurs appendices ondoyants prêts à capturer tout voyageur imprudent osant s'aventurer dans leur domaine ; le sol boueux cède la place à des essaims de myriades de vers suceurs de sang ; et pire encore, au cœur de ce paysage cauchemardesque prospèrent les Hommes-Sangsues. Ces créatures grotesques et mutantes persistent à nuire à notre peuple et à profaner Chahinanito. Ces êtres, à la peau visqueuse et aux traits difformes, ont bâti une société fondée sur cette cruauté, car la malveillance du marécage menace l'essence même des créations de la Déesse.\n\nEt pourtant, n'est-ce pas aussi Sa terre ? La Gueule, aussi morne et maudite qu'elle nous paraisse, porte également sa lumière. Tel le gosier d'une bête, elle est certes répugnante et dangereuse, mais néanmoins vitale. Tandis que nous nous abritons dans le peu de sécurité que l'on peut trouver, méditons sur cela et sur notre devoir envers la Déesse de la voir prospérer à nouveau. Puisse un jour nos rois régner avec des couronnes faites de mille dents d'Hommes-Sangsues, et chanter pour une nature reconnaissante. Sur cette pensée, nous poursuivons notre route."
    effelai_worship.11.a:0 "Un creuset dans la fange."
    effelai_worship.12.t:0 "La Griffe"
    effelai_worship.12.d:0 "En nous aventurant au plus profond de l'est du domaine de Chahinanito, nous foulons les terres sauvages où se déploie une tapisserie complexe de vie, symphonie à la fois harmonieuse et périlleuse. L'air est chargé d'anticipation tandis que nous naviguons à travers ce labyrinthe verdoyant, pleinement conscients de la faune diverse et redoutable qui peuple ce royaume. Chaque pas est mesuré, chaque souffle calculé, car dans ces fourrés denses se terrent de formidables créatures, gardiennes de leur territoire. Des prédateurs furtifs rôdent dans les sous-bois, leurs instincts aiguisés pour la survie, tandis que des serpents venimeux s'enroulent parmi les fougères géantes, leur venin nous rappelant avec force la dualité de notre Déesse. La jungle pulse d'une puissance brute, ses habitants déployant un arsenal impressionnant de mécanismes de défense et de résilience innée. Pourtant, face à cet écosystème formidable, nous sommes humbles devant l'équilibre complexe entre vie et mort, émerveillés par l'interconnexion qui définit cette tapisserie vibrante. Nous avançons avec le plus grand respect, le cœur empli d'un mélange de crainte et de révérence, sachant que dans cette étreinte périlleuse réside la beauté profonde et le mystère insondable de la jungle indomptée. Voici la griffe de Chahinanito, fièrement brandie face à quiconque douterait de sa force et de sa détermination. Un lieu dangereux mais puissant à admirer avant de poursuivre notre voyage."
    effelai_worship.12.a:0 "Une griffe levée pour frapper. Une griffe levée pour défendre."
    effelai_worship.13.t:0 "La Profanation"
    effelai_worship.13.d:0 "Calcinée, dénudée, mais surtout silencieuse. C'est le silence qui règne ici, loin du chant de Chahinanito et de la musique de la vie débridée. Rares sont les oiseaux en ces lieux, et ceux qui demeurent chantent avec parcimonie et ne s'attardent guère. Nulle grenouille n'appelle sa compagne la nuit venue, car le sol est bien trop sec pour leur peau. En des temps révolus, cette vaste région prospérait comme partie intégrante d'une forêt ancestrale, véritable extension de Chahinanito ; sa canopée verdoyante s'étendait à perte de vue. Cependant, face à l'avancée inexorable de la forêt, nos cousins hérétiques ont riposté. Faisant du feu leur allié, ils ont méthodiquement brûlé la végétation dense, transformant ces bois autrefois vibrants en vestiges calcinés. Les flammes dévastatrices ont réduit la région à un silence lugubre, écho de la gloire passée de la forêt.\n\nPourtant, la nature possède une résilience stupéfiante. Parmi la terre noircie, de délicats signes de renouveau émergent désormais, s'élevant timidement vers le ciel. De faibles signes de vie, de tendres pousses et des jeunes arbres bourgeonnants murmurent un avenir où cette terre pourrait de nouveau prospérer, reconquérant lentement sa place dans la tapisserie de l'existence. Pour l'heure, elle demeure la profanation de Chahinanito, un avertissement de ce qui adviendrait de nos terres si nous relâchions notre vigilance. Gardons cela en mémoire tandis que nous poursuivons vers de nouvelles contrées."
    effelai_worship.13.a:0 "Les graines d'espoir éclosent."
    effelai_worship.14.t:0 "L'Échine"
    effelai_worship.14.d:0 "Tandis que notre peuple voyage vers l'ouest de nos terres, un profond sentiment d'émerveillement nous enveloppe. À chaque pas, Chahinanito semble nous étreindre, Sa sagesse ancestrale murmurant à travers le bruissement des feuilles. L'air était chargé d'énergie mystique, comme si l'essence même de la forêt reconnaissait notre présence.\n\nEn ce royaume sacré, nous avons découvert que la forêt elle-même pourvoyait à nos besoins, un acte divin de subsistance qui nourrissait nos esprits et nous poussait à continuer. C'était comme si la flore et la faune vibrantes de la forêt reconnaissaient notre dévotion, nous offrant une abondance de nourritures sylvestres. Les arbres portaient des fruits succulents, leurs couleurs vives nous invitant à goûter leur doux nectar. Nous les cueillions avec révérence, sentant l'énergie de la forêt imprégner nos corps, nous revigorant pour le pèlerinage à venir.\n\nLa générosité de la forêt ne s'arrêtait pas là. Tandis que nous avancions, des ruisseaux et des sources naturelles apparurent, leurs eaux fraîches et vivifiantes coulant gracieusement sur notre chemin. Nous bûmes profondément, l'eau purifiant non seulement nos corps mais aussi nos âmes. C'était un rappel profond que nous n'étions pas seuls dans notre quête. Chahinanito, par Ses provisions généreuses, nous nourrissait, nous guidant vers notre destination finale.\n\nDans l'étreinte des dons de la forêt, nos esprits s'envolèrent et notre détermination grandit. Nous ressentîmes une profonde gratitude envers notre Déesse. Tandis que nous poursuivions notre pèlerinage, nous savions que nous n'étions pas de simples visiteurs en ce royaume, mais une part chérie de sa tapisserie divine. Avant de reprendre notre route, nous nous délectâmes de la générosité de Chahinanito."
    effelai_worship.14.a:0 "Un répit bienvenu."
    effelai_worship.15.t:0 "La Tumeur"
    effelai_worship.15.d:0 "Au plus profond de notre foyer, par-delà les arbres et les vallées et toute la beauté naturelle qui foisonne, se trouve la Tumeur. Dominant la végétation environnante se dressent des champignons colossaux, leur stature imposante surpassant même les arbres les plus hauts. Le sol n'est pas couvert d'herbe mais d'un réseau entrelacé de mycélium continu. C'est un lieu étrange, rendu plus étrange encore par le fait que des animaux de toutes sortes sont attirés à périr dans ses ombres humides, devenant une source vitale de nourriture pour les spores omniprésentes. Ici également demeurent les énigmatiques Lai'i, qui font partie de leur terre tout comme nous faisons partie de la nôtre. En tant que fervents adorateurs de Chahinanito et gardiens de ses secrets, nous demeurons perplexes face à cette terre étrange et altérée. La Tumeur est aliène, apparemment perverse, et pourtant son existence est entrelacée à l'essence même de la jungle que nous appelons notre foyer. Est-elle, peut-être, une expression divine du pouvoir de la forêt, une épreuve de compréhension, ou quelque chose de plus ?\n\nNous devons nous efforcer de comprendre l'énigme de la Tumeur, cherchant l'harmonie et l'équilibre parmi les forces captivantes et insondables qui façonnent notre existence spirituelle. Une leçon pour le reste de nos voyages."
    effelai_worship.15.a:0 "Toute chose a sa place, à sa manière."
    effelai_worship.16.t:0 "Le Cœur"
    effelai_worship.16.d:0 "Ce fut un temps difficile pour notre peuple. Ces derniers jours ont vu les ignobles Serviteurs du Chant nous assaillir avec une fréquence et une férocité croissantes. Certains furent perdus, et d'autres crurent que nous avions perdu notre voie.\n\nPuis, une mélodie d'une beauté solennelle nous enveloppa alors que nous pénétrions en ce lieu étrange. Nous nous retournâmes, tous ensemble, contemplant l'environnement autour de nous. À chaque pas plus profond dans le feuillage verdoyant, la pulsation harmonieuse se faisait plus forte, englobant tout, des arbres les plus majestueux aux plus infimes brins d'herbe. C'était comme si la nature elle-même dansait sur ce tempo remarquable, dont l'intensité ne cessait de croître.\n\nEt puis, soudain, tout s'assembla. Une symphonie de sons, de sensations, de divinité. Une glorieuse convergence où tous les éléments se fondirent en un. Les oiseaux fredonnaient en harmonie, les cimes des arbres se balançaient en synchronie avec le vent, et nos propres pas résonnaient au rythme divin ; le tout en parfaite harmonie avec un chant que nous n'entendions pas de nos oreilles, mais au plus profond de nos âmes. Le battement de cœur d'une Déesse, dans toute sa puissance primordiale, s'accordait au nôtre.\n\nNous tombâmes à genoux, humbles et submergés, tandis que la présence de Chahinanito se manifestait. Aucun mot ne fut prononcé, pourtant une compréhension tacite passa entre nous, une étreinte profonde d'appartenance qui surpassait tout ce que nous avions jamais connu. En cet instant fugace, nous comprîmes : c'était le Cœur, de Chahinanito, de nous tous."
    effelai_worship.16.a:0 "Nous revenons maintenant, rendus complets."
    effelai_worship.50.t:0 "La Tour Étincelante"
    effelai_worship.50.d:0 "Épuisé et en haillons, l'un de nos éclaireurs revient après avoir été porté disparu ces deux derniers jours. Parmi les acclamations de notre peuple et de sa famille, il nous raconte avoir découvert quelque chose : une flèche de verre, une tour de lumière qu'il n'a pu briser. Perdu dans l'Effelai, dit-il, Chahinanito elle-même lui a montré le chemin vers cette structure ancestrale, jaillissant du flanc d'une montagne, enfouie sous les racines et les fougères envahissantes. Là, épuisé d'avoir fui la faune dangereuse, et sous la faible lueur de la tour, notre éclaireur était prêt à mourir. C'est alors qu'il trouva une porte. En s'y réfugiant, il parvint à échapper aux créatures avant de revenir vers nous, bien qu'il ne se soit jamais aventuré plus loin que la première chambre."
    effelai_worship.50.a:0 "Organisons une expédition. Nous explorerons ce que notre Déesse a préparé pour nous."
    effelai_worship.51.t:0 "L'Exploration des Ruines"
    effelai_worship.51.d:0 "En raison de son épuisement et de la hâte de son récit, la description que notre éclaireur avait faite des ruines découvertes ne nous avait guère préparés à leur magnificence. Une flèche bâtie d'un cristal transparent aux reflets bleutés, dressée de travers sur le flanc d'une montagne qu'elle surmontait jadis. Peut-être était-elle tombée lors d'un glissement de terrain, mais l'édifice avait tenu assez longtemps pour que nous puissions enfin parcourir ses couloirs. À l'intérieur, un escalier de cristal délabré était bordé des effigies de curieux personnages. Ils nous ressemblaient, mais leurs oreilles étaient plus pointues, leurs corps relativement glabres, et certains d'entre eux avaient la peau bien plus pâle que quiconque parmi notre peuple. Qu'était ce lieu dans les temps anciens ? Qui étaient ces gens ? Notre expédition ne pouvait que conjecturer tandis qu'elle continuait son ascension, évitant de justesse la mort là où les marches cédaient dans l'abîme."
    effelai_worship.51.a:0 "Le temps garde jalousement ses vérités."
    effelai_worship.52.t:0 "Le Prisme Étincelant"
    effelai_worship.52.d:0 "Atteignant le sommet, notre expédition se trouva face à une salle extrêmement étrange, plongée dans l'obscurité malgré le matériau apparemment transparent de la tour. Plus étrange encore, la salle était envahie de végétation de toutes formes et couleurs, dont certaines étaient inconnues des chasseurs expérimentés de notre forêt. Au centre de la pièce reposait un prisme pentagonal, tournant lentement sur son axe et maintenu en lévitation sur un piédestal par quelque force invisible. L'un des nôtres rapporte avoir vu une liane croître vers le prisme, pour se consumer en franchissant un périmètre invisible. Alors que la nuit et ses myriades d'horreurs approchaient rapidement, les membres de l'expédition jugèrent bon de s'emparer du prisme et de le ramener sur nos terres pour l'étudier. Malheureusement, ni notre chef ni nos sages ne peuvent discerner le but ni même l'usage de cet objet, car il s'est éteint une fois retiré du piédestal de cristal."
    effelai_worship.52.a:0 "Conservons-le en lieu sûr. Nous en apprendrons peut-être davantage un jour."
    effelai_worship.53.t:0 "Attaque des Hommes-Sangsues"
    effelai_worship.53.d:0 "Lors de nos voyages, tout notre peuple sait que vivre en ces terres bénies signifie survivre à toutes sortes de dangers. De nombreuses créatures et plantes carnivores nous sont connues, et certaines inspirent à juste titre la crainte du plus jeune enfant au plus expérimenté des chasseurs. Pourtant, un seul danger inspire la haine. Les ignobles Hommes-Sangsues, agissant depuis leur marécage au service de quelque sombre divinité, sont la plus vraie expression de la corruption que nous connaissions, et leurs méthodes de combat sont cruelles et contre nature. Une fois de plus, ces monstres cherchent à nous déraciner de leur marécage. Nous devons leur rendre leur cruauté au centuple."
    effelai_worship.53.a:0 "Aux palissades !"
    effelai_worship.54.t:0 "Les Crimes des Hommes-Sangsues"
    effelai_worship.54.d:0 "Les attaques des horribles Hommes-Sangsues se poursuivent, grandissant en ampleur et en malveillance. Si cela ne suffisait pas, des rapports épars nous sont parvenus qu'hier, un groupe d'entre eux a attaqué une équipe de cueilleurs, les emmenant prisonniers dans leurs pirogues pour être sacrifiés à leur divinité horrifique. L'indignation gronde parmi notre peuple, qui ne se sent plus en sécurité même lors de tâches ordinaires habituellement réservées à ceux qui n'ont pas l'aptitude physique pour participer aux chasses. Tout n'est peut-être pas perdu cependant, car des signes de lutte mènent nos pisteurs vers l'emplacement de leur campement."
    effelai_worship.54.a:0 "Rassemblons un groupe de guerre pour libérer notre peuple. Donnez-leur tout ce qu'il faut."
    effelai_worship.54.b:0 "Sans cette équipe de cueilleurs, nous avons à peine de quoi nous nourrir. Nous devons fuir."
    effelai_worship.55.t:0 "Créatures des Ténèbres"
    effelai_worship.55.d:0 "Hier, alors que le crépuscule tombait, des bruits de pas approchant furent entendus, peut-être par trop peu d'entre nous, peut-être bien trop tard, tandis qu'une créature d'une vitesse aveuglante traversait notre campement. Ceux d'entre nous qui survivent décrivent la vision horrible d'une créature dont la posture ressemblait grossièrement à la nôtre ; dépourvue de poils ou de tout autre trait, son corps recouvert d'une peau pâle, blanc cassé, à l'exception de ses dents jaunâtres et pourries. Elle courait avec la vitesse et la grâce d'un jaguar, déchirant les gorges des braves guerriers qui eurent le temps de saisir leurs lances pour monter une quelconque défense. Elle les traîna, un par un, dans l'obscurité des sous-bois. Leurs ultimes hurlements sont tout ce que quiconque, hormis Chahinanito, connaîtra jamais de leur sort, car nous n'avons pas retrouvé leurs dépouilles."
    effelai_worship.55.a:0 "Déesse... Protège-nous..."
    effelai_worship.56.t:0 "Renouveau sur la Côte Brûlée"
    effelai_worship.56.d:0 "Aruá pagayait sans relâche, sa pirogue bravant les petites vagues côtières tandis qu'elle longeait ce que son peuple appelait autrefois la Côte Brûlée. Elle aussi lui donnait ce nom jadis, mais au fil des années passées à rejoindre les nasses à poissons disposées parmi ses récifs, il lui est devenu évident que la région est tout sauf calcinée. Aride, peut-être, mais pas stérile. Son temps près de la côte se passe en compagnie lointaine de petits troupeaux de volailles se régalant de maigres touffes d'herbe. Là, l'arbrisseau occasionnel a poussé plus haut et plus robuste que ce que leurs dents peuvent entamer, et continuera donc de croître comme les majestueuses tours vertes de sa patrie. Peut-être, songe-t-elle, a-t-elle apporté un morceau de chez elle avec elle."
    effelai_worship.56.a:0 "Chahinanito est toujours avec nous."
    effelai_worship.57.t:0 "Les Bienfaits de la Jungle"
    effelai_worship.57.d:0 "Chahinanito est une déesse capricieuse, et elle reprend aussi souvent qu'elle donne. Mais quand elle donne, elle donne généreusement. Sur notre chemin gît un arbre, abattu et brisé en plusieurs morceaux d'un bois extrêmement solide. Le bois est déjà débité en morceaux assez petits pour être transportés sur nos chariots et nos pirogues, et assez grands pour en faire des planches ou des outils. Quoi que nous ayons besoin, Chahinanito y pourvoit."
    effelai_worship.57.a:0 "Un chant, en remerciement à notre grande déesse !"
    effelai_worship.58.t:0 "Un Espoir Bourgeonnant"
    effelai_worship.58.d:0 "Le petit Jaikó était terriblement malade. Son corps brûlait plus qu'il n'aurait dû, et il était maladif, alité et misérable. Sa famille et la tribu avaient accepté qu'il ne serait plus de ce monde bien longtemps. Son frère, cependant, refusa cette fatalité. Courant dans l'Effelai, il trouva le salut. Une fleur, Maga dans notre langue, extrêmement rare et qui ne fleurit généralement qu'une fois au cours de ses décennies de vie, connue pour ses propriétés curatives. Le spécimen que l'enfant trouva portait deux bourgeons ondulant doucement dans le vent, au lieu d'un seul. Le premier bourgeon, comme le veut la bonne coutume, fut utilisé pour guérir son frère, mais que faire du second ?"
    effelai_worship.58.a:0 "Donnez-le à notre chef, une protection pour les temps de besoin."
    effelai_worship.58.b:0 "Conservons ses graines pour quand nous trouverons un lieu à appeler définitivement notre foyer."
    effelai_worship.59.t:0 "Le Chant de la Discorde"
    effelai_worship.59.d:0 "Le silence. Pas un mot prononcé, juste un massacre aveugle. Les Serviteurs du Chant, asservis à la volonté du mal, ont encerclé notre peuple alors qu'il pêchait dans un lit de rivière peu profond. Le seul son était celui de leurs pas précipités à travers les eaux tumultueuses vers notre peuple, défendu uniquement par leurs harpons de pêche et leur foi en la Déesse. Beaucoup tombèrent, mais certains survécurent assez longtemps pour revenir sur nos terres et nous avertir de ces êtres voraces. L'un d'eux rapporte une mélodie qu'il n'avait jamais entendue auparavant."
    effelai_worship.59.a:0 "Nous chantons ce soir pour notre protection."
    effelai_worship.60.t:0 "Monnaie Mycélienne"
    effelai_worship.60.d:0 "Les grands Lai'i, parés de champignons, sont un peuple versatile. Leur culture nous est étrangère à bien des égards, notamment en raison des particularités de leur patrie. Néanmoins, les marchands Parura sont prisés et largement respectés, et au cours de notre existence, nous avons traité avec bien des tribus différentes, mais n'avons trouvé aucun peuple qui ne parle pas le langage du commerce et du bénéfice mutuel. Les Lai'i nous donnent nombre de leurs étranges champignons au goût rappelant la viande, tandis qu'en retour nous leur fournissons ce que nous avons en abondance dans notre foyer forestier, comme le bois solide, les grandes peaux et la poterie ouvragée. C'est un arrangement pacifique qui sert à rapprocher nos peuples."
    effelai_worship.60.a:0 "Chahinanito bénit nos deux peuples en ce jour."
    effelai_worship.61.t:0 "Croissance Sauvage"
    effelai_worship.61.d:0 "Aux lisières de la Forêt-aux-Champignons, en des lieux pas encore conquis par la flore particulière de cet endroit, nos éclaireurs rapportent une scène étrange. Des animaux, par centaines, se rassemblent sur ces lisières pour apparemment y mourir. Leurs corps furent ensuite trouvés à divers stades de décomposition, utilisés par les champignons comme combustible pour leur stature massive et comme lits de germination pour de nouvelles spores. Plus inquiétant peut-être, certains de ces champignons poussent sur les arbres voisins, ainsi que sur d'étranges amas fongiques qui semblent croître à partir des corps de Lai'i. Quelle que soit leur origine, cela pourrait expliquer comment cette étrange forêt se sustente et se renouvelle."
    effelai_worship.61.a:0 "Tant qu'ils ne nous touchent pas, tout ira bien."
    effelai_worship.62.t:0 "Compagnons de Voyage"
    effelai_worship.62.d:0 "Notre campement fut alerté à l'aube par un bruissement dans les feuilles qui se dirigeait vers nous. Nos meilleurs guerriers furent mobilisés, pour ne découvrir qu'une petite tribu d'Effa'i se frayant un chemin à travers la jungle. Il y avait des blessés parmi eux, et ils implorèrent notre aide. Tandis que nous soignions ces individus, les autres proposèrent du troc, et nous parvînmes à échanger quelques denrées essentielles contre leurs effigies et colliers brillants avant qu'ils ne poursuivent leur route."
    effelai_worship.62.a:0 "Chahinanito nous enseigne le respect des compagnons chasseurs, de peur d'être nous-mêmes chassés."
    effelai_worship.63.t:0 "Un Chœur Lancinant"
    effelai_worship.63.d:0 "D'étranges rapports nous parviennent de [Root.GetName], évoquant des chants étranges qui retentissent à travers la province. Bien que ces chants ne semblent provenir d'aucune direction discernable, notre peuple est convaincu que des Serviteurs du Chant, esclaves de la jungle d'Effelai, en sont la cause."
    effelai_worship.63.a:0 "Les horreurs nous encerclent."
    effelai_worship.64.t:0 "Sagesse Orwa'ii"
    effelai_worship.64.d:0 "« Vous servez tous une volonté maléfique ! Elle doit être consumée par les flammes pour que notre peuple survive ! » s'écria-t-il. « Les Serviteurs, ce sont des créatures engendrées par votre forêt ! Vous aussi serez asservis et absorbés ! » dit le vieil Orwa'ii aux cheveux gris et à l'air débraillé, qui avait erré jusqu'au centre de notre village tandis que les spectateurs stupéfaits le regardaient bouche bée. Avant longtemps, notre peuple s'arma pour s'en prendre à l'hérétique avant qu'il ne déchaîne la colère de Chahinanito sur nous par son irrespect. Cependant, lorsqu'ils arrivèrent, il avait disparu."
    effelai_worship.64.a:0 "Quel étrange individu."
    effelai_worship.90.t:0 "Le Massacre des Hommes-Sangsues"
    effelai_worship.90.d:0 "Des cadavres. Éparpillés autour d'un autel ensanglanté et de couteaux de silex émoussés, abandonnés. Notre équipe de cueilleurs, notre peuple, avait déjà été sacrifié quand nous arrivâmes au campement des Hommes-Sangsues. Nous ne pouvons plus rien pour eux, sinon abattre les monstres qui ont commis cela. Ils connaîtront la colère de Chahinanito, et celle d'un peuple poussé à l'action par la violence. Leurs appels sifflants émis par leurs bouches tordues seront réduits au silence dans une nuit de lames dansantes et de sang versé."
    effelai_worship.90.a:0 "Tuez. Les. Tous."
    effelai_worship.100.t:0 "L'Exploration d'Effelai"
    effelai_worship.100.d:0 "Notre brève visite de cette région d'Effelai terminée, il est temps pour nous de choisir le prochain site à visiter. Notre groupe d'aventuriers doit continuer à éclaireur et rechercher le prochain lieu sacré."
    effelai_worship.100.a:0 "Migrer vers l'Effelai oriental"
    effelai_worship.100.b:0 "Migrer vers la Côte Aride"
    effelai_worship.100.c:0 "Migrer vers l'Effelai méridional"
    effelai_worship.100.e:0 "Migrer vers la Forêt-aux-Champignons"
    effelai_worship.100.f:0 "Migrer vers l'Effelai occidental"
    effelai_worship.100.g:0 "Migrer vers Soruin"
    effelai_worship.100.h:0 "Migrer vers les Marais-aux-Sangsues !"
    effelai_worship.100.i:0 "Soruin est proche !"
    effelai_worship.100.j:0 "L'Effelai occidental est proche !"
    effelai_worship.100.k:0 "La Forêt-aux-Champignons est proche !"
    effelai_worship.100.l:0 "L'Effelai méridional est proche !"
    effelai_worship.100.m:0 "Ce lieu convient pour notre nouveau campement"
    effelai_worship.100.n:0 "Notre foyer d'origine fera un meilleur campement"
    effelai_worship.200.t:0 "L'Établissement"
    effelai_worship.200.d:0 "Ce fut un voyage long et ardu, qui nous a menés à travers chaque région de la jungle, toutes aussi terrifiantes que disparates. Nous avons été témoins de tout le spectre des offrandes de cette terre, de la noirceur la plus sombre à la bienfaisance la plus généreuse. À travers tout cela, nous avons persévéré, unis dans notre quête d'un nouveau foyer pour notre peuple. En ces terres où la maladie et la mort rôdaient, nous ferons jaillir une vie nouvelle. Là où des forêts ténébreuses et des monstres aux aguets régnaient jadis, le rire des enfants étouffera bientôt ces anciennes horreurs. Parmi les ruines envahies par la végétation, oubliées depuis longtemps par le temps, nous élèverons un jardin qui perdurera, symbole de notre résilience.\n\nLes préparatifs ont déjà commencé, et les survivants de notre éprouvante marche se sont déjà bien acclimatés aux environs. Des arbres sont abattus pour fournir les matériaux de nos abris, les tentes sont transformées en maisons, et de solides palissades s'élèvent de la terre. L'énergie avec laquelle nous œuvrons est alimentée par l'espoir d'un peuple qui rêve de bâtir quelque chose de valeur durable, quelque chose qui justifie chaque pas agonisant que nous avons fait pour atteindre ce lieu sacré. Nous sommes portés par la conviction que les épreuves et tribulations de notre migration n'auront pas été vaines, et que notre nouveau foyer sera un testament à la force et à l'unité de notre peuple, un lieu où les générations à venir prospéreront."
    effelai_worship.200.a:0 "Il est maintenant temps de coloniser ces terres"
    effelai_worship.302.t:0 "Le Premier Couplet"
    effelai_worship.302.d:0 "Ne te fie pas à tes yeux menteurs. Seules tes oreilles peuvent te guider ici.\n\nLe tout premier chant des ancêtres enseigné à chaque enfant de [Root.GetName] s'ouvre sur ce conseil ancestral. Depuis aussi longtemps que les elfes ont vécu en Soruin, ils ont chanté les chants de ceux qui les ont précédés. Les chants relatent des conseils précis tirés des hauts faits de leurs ancêtres, servant de leçons pour survivre dans la jungle d'Effelai. La grande jungle est tout ce qu'ils ont jamais connu. Effelai est sombre et dense, les pluies sont incessantes, l'air toujours chaud et humide. Se rappeler même où l'on se trouve est difficile quand tout semble si semblable à l'œil non exercé. Il faut ses oreilles pour traverser ces terres. Parfois, tout ce que l'on a, ce sont les chants que la jungle entonne. L'elfe exercé peut écouter les particularités des chants et déterminer sa position d'après la manière dont les arbres chantent. Tes yeux peuvent te trahir, car ils peuvent attirer le courroux de ceux qui ne désirent pas être vus. Regarde les racines et le sol devant tes pieds et surveille tes pas, et ne plonge pas ton regard dans les ténèbres, de peur qu'elles ne te regardent en retour.\n\nAinsi les elfes de Soruin ont-ils toujours chanté durant le jour, contant les histoires de héros avec lesquels ils partageaient le sang ; ils tenaient des célébrations, offrant révérence au passé. Quand la nuit tombait, tous se taisaient pour laisser à la jungle, chantant sans cesse, sa sérénade nocturne.\n\nJusqu'à un certain festival. Un jeune enfant demanda au plus ancien des chamans : « Quel est notre récit le plus récent ? » Une question simple, mais personne ne put y répondre. La question fermenta dans les esprits de la tribu. Mais en aucun plus qu'en celui de l'enfant. Nul ne se souvient avoir fait autre chose que chanter les héros anciens et errer sans but dans le nord de la jungle d'Effelai, évitant ses plus grands dangers, mais aussi ses opportunités les plus héroïques. L'enfant dit que si personne n'avait été jugé digne d'un chant, alors il le ferait, quel qu'en soit le prix.\n\nAujourd'hui, [Root.Monarch.GetName] observe sa tribu se préparer pour une grande migration. [Root.Monarch.GetSheHeCap] se souvient avoir posé au chaman cette question qui changea tout, et de sa quête d'une vie pour mener [Root.GetName] dans un grand pèlerinage afin de recréer et de surpasser les ancêtres."
    effelai_worship.302.a:0 "Aujourd'hui, nous commençons à composer le prochain grand chant de notre peuple !"
    effelai_worship.310.t:0 "Un Couplet Apaisant"
    effelai_worship.310.d:0 "La lisière septentrionale de l'Effelai est là où le monde s'achève. Coincée entre la grande mer au nord et l'Effelai au sud, la tribu de [Root.GetName] a passé presque toute son existence sur ces rives ou à proximité. Nous ne sommes pas étrangers aux lumières envoûtantes dans le ciel, aux constellations présentes un jour et disparues le lendemain, ou aux cauchemars occasionnels portés par la brise marine. Ce ne sont que des choses que les yeux voient, et les yeux mentent toujours dans l'Effelai. Comparé à l'idée de s'aventurer plus profondément dans la jungle et d'affronter ses horreurs, nous avons toujours choisi les rives plus sûres, bien que plus inquiétantes, de la mer. Mais pour véritablement mériter le droit d'avoir nos propres chants et récits, nous n'avons eu d'autre choix que de nous aventurer plus profondément dans la jungle. Nous nous fions à nos oreilles pour nous guider. Les jungles ici ont un chant plus calme, un air plus pensif. Les anciens chants disent que ces notes étaient propres à Soruin. Elles inspirent la curiosité et la détermination. C'est pourquoi nos ancêtres sont venus ici. Maintenant nous cherchons un lieu, un endroit où le chant de la jungle résonne en parfaite harmonie. Où un ancêtre terrassa jadis un monstre fluvial traître, et trouva un sanctuaire en ruines des anciens elfes.\n\nCe n'est rien de ce que nous attendions.\n\n[Root.Monarch.GetName] contemple les ruines, plus grandioses en personne que ne le laissaient entendre les chants. Une grande main de verre surgit de la terre, comme si quelque géant était enterré là, agrippant en vain le salut. Une rivière coule à travers les vestiges effondrés de quelque palais jadis majestueux, creusant des cavernes dans l'ancienne maçonnerie. Nous parcourons des halls antiques que même l'Effelai a peiné à totalement engloutir, effleurant du doigt les gravures complexes sur les édifices de pierre. Nous nous arrêtons devant une fresque représentant des elfes semblables à nous et ressentons un profond sentiment de perte.\n\nLe monde est ancien. Même dans nos chants les plus anciens, les premiers héros parlent d'un monde qui existait bien avant eux. De choses enfouies dans les ruines, trop malveillantes et perverses pour jamais véritablement mourir. Ils voyagèrent vers ces lieux pour les combattre et les tuer malgré tout. Et maintenant, nous tenant là où ils se tinrent jadis, notre dessein est une flamme ravivée.\n\nNotre fardeau n'est pas de grandes bêtes, mais le sentiment de perte lui-même. Les premiers pas du grand pèlerinage ont été accomplis. Et le peuple de [Root.GetName] se prépare pour un festival comme aucun autre avant lui pour célébrer. Nous érigeons un grand feu de joie et dansons, chantant en harmonie avec ce lieu sacré, nos voix résonnant dans la vallée formée par les anciens bâtiments. Nous mangeons du poisson, des galettes de manioc et de la purée de plantain. Nous composons le plus récent couplet de notre chant, un couplet dédié à nous-mêmes en tant que tout."
    effelai_worship.310.a:0 "Et ils savent que le prochain couplet sera encore plus grandiose."
    effelai_worship.311.t:0 "Un Couplet de Sangsues"
    effelai_worship.311.d:0 "Il existe peu de chants sur ce lieu, tous emplis de luttes et de chagrin. Nos histoires ne pouvaient nous préparer aux horreurs qui nous attendent ici. Même la musique de l'Effelai y est différente : elle est froide, débordante de malveillance et de faim. Un seul pas dans la boue et des créatures s'enfouissent dans la plante de vos pieds. La simple piqûre d'un insecte étrange peut vous laisser mort avant la tombée de la nuit. Nos chants se répercutent sur les eaux saumâtres et voyagent loin dans les marécages. Parfois des choses nous répondent, des créatures aux visages difformes et contre nature. Il y a des gens ici, les Parura, qui nous aident à nous guider. Ils nous disent que ces créatures à face de sangsue vénèrent un maître maléfique, et que les chasser est un rite de passage pour leur tribu. Une telle chasse nous vaudrait assurément la faveur d'Effelai, et nous aiderait à traverser en sécurité le reste de la jungle.\n\nNous partageons nos chants avec eux, et nous sommes d'accord. Cosaínti, la héroïne la plus révérée de notre peuple, détruisit une horde de monstres, donnant sa vie pour offrir à sa tribu le temps de s'échapper de ce lieu horrible. Si nous devons poursuivre sur ce chemin pour mériter notre propre légende, nous devons nous enfoncer au plus profond de la Gueule même des Marais-aux-Sangsues, là où nos ancêtres ne trouvèrent que chagrin et désespoir.\n\nIci, dans cette gueule du mal, entourés par les abominations à face de sangsue qui guettent de tous côtés, nous établissons notre camp. Nous festoierons des tiques grosses comme le poing et des créatures visqueuses dans l'eau, et proclamerons notre plus grande victoire avec le plus récent chant. Un grand festival de chaleur, d'amour et de lumière. Un refuge encerclé par les lieux les plus ténébreux."
    effelai_worship.311.a:0 "Un chant de lumière, un chant de conquête, un chant de sangsues."
    effelai_worship.312.t:0 "Un Couplet d'Art"
    effelai_worship.312.d:0 "La lisière orientale de l'Effelai nous est aussi étrangère que familière. Plus d'un éclaireur nous revient avec des récits de grandes horreurs rôdant dans les sous-bois. La nuit, le scintillement sans fin d'yeux dans l'obscurité se reflète vers nous. Une garde est postée à toute heure du jour et nos enfants sont gardés près de nous. Nous n'avons d'autre choix que de braver ce qui se tapit dans les ténèbres si nous voulons saisir notre propre gloire.\n\nEt puis nous le trouvons, à la lisière des grandes eaux où les chants de l'Effelai oriental s'harmonisent le mieux. Il y a des âges, la grande héroïne Aíthzi prit une hache et un couteau et commença à sculpter le bois pétrifié. Les arbres ici sont d'une qualité anormalement élevée, et leurs racines profondes mettent au jour de grandes quantités de minerai de fer. Ici, Aíthzi forgea ses armes légendaires. Il était donc approprié que la clé pour chasser les monstruosités de cette région se trouve en son centre même. Les arcs, lances et javelots qu'Aíthzi fabriqua ont depuis longtemps été perdus par le temps, mais nous avons les mêmes outils qu'elle, et il y a encore beaucoup de bois et de fer à disposition.\n\nTandis que nous façonnons nos armes, sachant que les bêtes de la jungle sont à quelques buissons de là, nos chants sont discrets mais joyeux. Nous nous demandons si ce grand pèlerinage qui est le nôtre ne porte peut-être pas tant sur les monstres que nous affrontons, que sur les choses que nous apprenons en chemin. Car il y a tant à apprendre des grandes œuvres d'Aíthzi, que nous les emporterons avec nous dans cette grande aventure, pour que les générations futures les admirent et en tirent leçon."
    effelai_worship.312.a:0 "Un chant de création, de beauté."
    effelai_worship.313.t:0 "Un Couplet de Culture"
    effelai_worship.313.d:0 "Peu importe à quel point nous fouillons les mémoires de nos chamans les plus anciens, nous ne possédons aucun chant sur ce lieu. Nous fûmes presque surpris en découvrant cette terre. L'Effelai est dense un instant, puis s'estompe rapidement en une terre desséchée le long d'une grande côte méridionale. L'Effelai semble presque amère envers ce lieu, ses chants distants et étouffés quand nous pouvons les entendre, des murmures emplis de haine née de quelque grande trahison. Certains suggèrent de rebrousser chemin et de retourner dans la jungle, mais tout autant nous disent de poursuivre et de suivre nos oreilles. Ici, peut-être plus qu'ailleurs, la terre elle-même sera notre défi : notre obstacle héroïque à surmonter et dont tirer de nouveaux chants. Alors nous entrons dans cette terre désolée, essayant de suivre les chants faibles et étouffés de l'Effelai.\n\nLe voyage vers le lieu que nous cherchons n'est pas un grand périple, mais nous sommes à nos dernières provisions quand nous le trouvons : une baie nichée contre les montagnes, où de minuscules pousses et verdures ont osé germer. Le chant de l'Effelai est faible, mais ici plus qu'ailleurs dans ces terres, nous pouvons le sentir et l'entendre. Il semble plaintif et blessé. Nous passons des jours à creuser, de plus en plus profond jusqu'à atteindre la nappe phréatique, et la remontons pour étancher notre soif. Tandis que nous débattons de comment couper du petit bois pour un feu de joie festif, un groupe d'autochtones est découvert en train de nous observer depuis les collines. Notre éclaireur les invite à nous rejoindre, et une courageuse jeune locale accepte l'invitation.\n\nElle dit que son peuple sont les Orwa'ii, que c'est ce qui reste de leur foyer, et que nos chants la rendent très anxieuse. Nous lui demandons ce qui est arrivé à ce lieu. Elle dit qu'un grand feu a fait cela, mais que c'était mieux que de laisser la jungle gagner. Elle est méfiante envers nos chants, mais accepte néanmoins de se joindre à notre festival.\n\nNous n'allumons pas de feu, nous occupant plutôt d'un petit jardin et de notre puits récemment creusé. Apprenant plutôt à cultiver le peu de vie que nous avons trouvé ici, nous composons des chants pour le renouveau et la croissance de la vie. Car pour tout ce que nous avons combattu pour être ici, peut-être vaut-il la peine de prêter attention et de prendre soin des petites choses et les uns des autres. Nous laissons aux Orwa'ii des cadeaux et de l'eau que nous avons collectée en ce lieu, et poursuivons notre voyage."
    effelai_worship.313.a:0 "Chants de perte et de vie nouvelle."
    effelai_worship.314.t:0 "Un Couplet de Répit"
    effelai_worship.314.d:0 "L'air humide de la jungle est moins chaud et moins dense ici, en une terre étrange nichée sous une grande chaîne de montagnes. Ici, disent les chants, le grand héros Aururã gravit les grandes parois rocheuses afin de cueillir une herbe pour sauver sa bien-aimée. Nous suivons son chemin grâce aux indices des chants, trouvant eau claire et gibier abondant.\n\nDes âmes courageuses font les premiers pas en montagne là où le feuillage s'éclaircit. Ils nous rapportent de grandes cascades et des sources, et un endroit où les chants sont le plus harmonieux. Nous rassemblons la générosité de l'Effelai et passons des jours à gravir. Là, où nous peinons à respirer, la vue de l'Effelai nous coupe le souffle restant. L'immense étendue verte s'étire jusqu'à chaque horizon. Certains pointent les chemins que nous avons empruntés, et d'autres regardent les voies que nous pourrions encore suivre. Le monde semble si petit et pourtant si grand depuis ici. Nous ne savions presque pas que le ciel pouvait être si vaste. Ce n'est pas étonnant qu'Aururã se soit arrêté ici pour s'émerveiller devant le monde. Maintenant, toute notre tribu a refait son grand voyage.\n\nNous buvons profondément des grandes eaux d'ici, les jeunes cueillent des fleurs de montagne en des endroits périlleux pour les offrir à leurs bien-aimés en l'honneur d'Aururã, et nos chants de festival résonnent en descendant la montagne jusque dans la forêt elle-même. Nos chamans, pendant ce temps, trient les plantes étranges pour trouver les plus médicinales à emporter avec nous. Nous préparons des thés et confectionnons des gâteaux à partir des herbes des montagnes, et sommes emplis d'une chaleur réconfortante qui chasse tout le froid de la montagne. Quand le matin arrive et que nos feux sont cendres, nous redescendons, le cœur empli d'espoir, l'esprit rempli de savoir, et le ventre plein de remèdes."
    effelai_worship.314.a:0 "Un chant de répit et de détermination."
    effelai_worship.315.t:0 "Un Couplet de Renaissance"
    effelai_worship.315.d:0 "L'Effelai est étrange, merveilleux et terrifiant à parts égales. Loin des côtes d'où nous venons, le grand feuillage de la jungle cède la place à quelque chose d'autre : de grands champignons qui s'élèvent vers le ciel et s'étendent au loin dans le lointain.\n\nNous avons commencé ce voyage pour imiter nos ancêtres, cherchant même à les surpasser, à notre manière. Les héros vont et viennent, ils meurent et renaissent par le chant. Nous étions faibles et apeurés sur la côte septentrionale, et maintenant nous sommes venus si loin, surmontant tant d'obstacles non pas en tant que héros solitaires, mais en tant que peuple collectif. Les champignons imposants sont semblables. Dans la majeure partie de l'Effelai, les champignons sont petits et discrets : de petits doigts surgissant des sous-bois qui se cachent de la lumière tandis qu'ils se nourrissent des morts et des choses en décomposition. Ici, cependant, ils dominent. Ils ont transcendé leur nature même pour devenir les maîtres de leur environnement. Un environnement de décomposition.\n\nPeut-être nous ressemblent-ils plus que nous ne le pensions. Nous venons d'origines si craintives, et sommes venus si loin en triomphant. Maintenant, en ce lieu de champignons imposants, nous avons trouvé ce que l'Effelai craint : la mort. Les chants sont ténus et effrayés. Effelai n'est là que parce qu'elle n'a pas d'autre choix. Elle ne peut être absente du lieu où des parties d'elle-même vont mourir.\n\nComme les champignons, nous avons renaît. Nous sommes quelque chose de nouveau et de fort en une terre étrange. Nous apprenons les chants obsédants de la forêt aux champignons, et modifions les airs jusqu'à ce qu'ils nous conviennent le mieux. Nous célébrons notre grand pèlerinage, notre voyage vers la force et le courage. Mais surtout, nous ajoutons un nouveau couplet aux chants nous concernant : un récit que nos enfants prendront à cœur pour les encourager à être encore plus grands que nous."
    effelai_worship.315.a:0 "Un chant de renaissance en quelque chose de plus fort."
    effelai_worship.316.t:0 "Un Couplet d'Orientation"
    effelai_worship.316.d:0 "L'Effelai profond est traître. Nous chantons les histoires de Prigaír, un pisteur aveugle qui guida nos ancêtres à travers ces terres. Ses oreilles étaient aiguisées comme du silex, et son arc pouvait épingler les ailes d'une mouche à trois cents mains de distance. C'était un grand chasseur, non pas seulement de bêtes, mais de chemins. Ses chants nous donnent force même tandis que nous nous enfonçons plus profondément dans le cœur des ténèbres.\n\nPuis nous le trouvons. Ce n'est pas une clairière. Ce n'est pas particulièrement différent pour l'œil. Ce n'est même pas particulièrement serein. Le chant d'Effelai, cependant, est indubitable. Nous tournoyons et réalisons que nous sommes au centre même de tous les chants. Nous pouvons percevoir une centaine d'airs, une centaine d'émotions, tous convergeant en ce lieu dans les profondeurs obscures. Le nombre et l'intensité sont étourdissants. Des dizaines de nos meilleurs chanteurs restent là un moment dans l'émerveillement, hypnotisés par les sons, tout comme les serviteurs de la jungle. Ils ne sortent de leur transe que lorsque nous leur couvrons les oreilles et les secouons. Nous ne laissons pas les chants d'Effelai nous contrôler. À la place, nous créons nos propres couplets, notre propre rythme. Nous complémentons l'Effelai à notre manière, y ajoutant plutôt que de la laisser nous consumer. Nous faisons comme Prigaír le fit jadis, et forgeons notre propre chemin. L'Effelai est notre foyer et nous respectons ses horreurs, mais nous ne sommes pas ses esclaves : nous sommes une part distincte et forte de son écosystème. Nous tracerons nos propres chemins et assurerons notre propre avenir."
    effelai_worship.316.a:0 "Un chant pionnier de défi."
    effelai_worship.402.t:0 "Un Périlleux Voyage Commence"
    effelai_worship.402.d:0 "Il est temps.\n\nC'est une tradition ancestrale, ce pèlerinage. Une pratique qui s'étend sur des générations dans l'histoire de notre peuple. Tswohvwoh'ii, notre maîtresse, est à la fois envoûtante et inquiétante, et son domaine un lieu de mystères insondables et de bienfaits encore à découvrir. Nous marcherons ensemble, à travers ces terres si fermement sous son emprise, car notre pèlerinage n'est pas un choix, mais une obligation, un devoir qui nous lie à la terre et aux histoires qui ont été murmurées à travers le temps.\n\nLa préparation de notre pèlerinage est une affaire solennelle et complexe. Notre peuple se rassemble, et pendant des jours, nous réunissons les biens nécessaires qui nous accompagneront dans l'étreinte de Tswohvwoh'ii. Nous taillons le verre noir pour forger les lames les plus acérées, nous tissons ensemble des treillis d'os pour nous protéger, nous sélectionnons les plus beaux vêtements tissés, les outils robustes et les artefacts rituels transmis de génération en génération. Chaque objet porte le poids de la tradition et l'espoir d'un passage sûr à travers les terres sacrées où Son chant règne. Tandis que nous nous tenons devant nos possessions, nous prononçons des prières de protection, invoquant toute bienveillance qu'Elle peut encore éprouver envers ceux qui cherchent le salut. Les incantations sont récitées à voix basse, portant avec elles les espoirs et les craintes collectifs de notre peuple. En ce moment solennel, notre volonté se manifeste, nos esprits s'alignent pour mener à bien ce périple.\n\nTswohvwoh'ii, nous honorons ton nom. Tswohvwoh'ii, nous craignons ta colère. Tswohvwoh'ii, nous entamons ce voyage."
    effelai_worship.402.a:0 "Sa volonté sera faite"
    effelai_worship.410.t:0 "Le Cerveau"
    effelai_worship.410.d:0 "Un sanctuaire au milieu des étendues sauvages périlleuses, cette région où nous sommes arrivés est étrange, ne serait-ce que par son extrême beauté. La terre est emplie de paysages surréalistes de flèches scintillantes façonnées de verre cristallin, ces tours éthérées s'élèvent avec défi depuis le sol de la forêt, leurs pointes perçant la dense canopée comme des éclats de mémoire gravés dans la pierre.\n\nMalgré la nature hostile de Tswohvwoh'ii, ce sanctuaire semble résister à l'empiètement inexorable des lianes et des vrilles ; sa beauté immaculée préservée, même temporairement. Les bêtes qui chasseraient notre peuple, elles aussi, semblent étrangement absentes. Nous avons longtemps été attirés par ce sanctuaire, car il nous offre un répit de la colère omniprésente de notre Déesse. Ici, nous trouvons une faible lueur de réconfort parmi la mélancolie, un rappel poignant de ce qui fut jadis, un aperçu fugace du monde que nous n'avons jamais connu, mais auquel nous aspirons à retourner.\n\nTandis que nous nous frayons un chemin à travers le feuillage, nos pas prudents et révérencieux, nous ne pouvons nous empêcher de méditer sur le monde qui a été perdu. Les flèches de verre qui s'enfoncent, jadis monuments à l'ingéniosité d'une ère meilleure, se dressent maintenant comme de sévères rappels de notre existence précaire à la merci de quelque chose de bien plus grand, de bien plus terrible. Chaque reflet dans le verre porte des fragments d'une époque où la jungle n'était pas notre oppresseur mais une douce protectrice. Qu'étions-nous, alors ? Était-ce même nous ? Qu'est-ce qui a changé ? Le cœur lourd et avec un adieu réticent, nous quittons cette terre, conscients de la beauté éphémère dont nous avons été témoins. Pourtant, en ce moment de départ, nous jurons aussi de poursuivre notre voyage, car nous comprenons que pour survivre, nous devons à la fois honorer ce qui fut perdu et nous efforcer d'atteindre ce qui peut encore être reconquis."
    effelai_worship.410.a:0 "Une terre de secrets"
    effelai_worship.411.t:0 "La Gueule"
    effelai_worship.411.d:0 "« Ne vous attardez pas », dit Nitayno, notre guide Parura local pour cette partie de notre voyage. « Contemplez les ténèbres. Contemplez le souffle râpeux de ce qui ne devrait pas être. Contemplez les Marais-aux-Sangsues. »\n\nNous avons progressé plus profondément dans le cœur sinistre de ces contrées sauvages. Ici, la terre elle-même semblait suinter de malveillance, tandis que de vils marécages et des fondrières s'étendaient à l'infini devant nous, infestés d'insectes aux proportions grotesques et d'autres formes de vie parasitaires. L'air était lourd de l'odeur oppressante de la décomposition, et le sol sous nos pieds cédait à une bouillie gargouillante de boue et de fange, faisant de chaque pas un tourment.\n\nUn petit bruit de pas, bien plus agiles que les nôtres, se fit entendre juste au-delà des hautes herbes qui maintenaient le marécage juste au-dessus de l'eau boueuse. Aucune parole n'était prononcée, aucun chant de guerre ni cri de bataille. Juste des créatures misérables et furtives ; des faces déformées en gueules circulaires faites de dents pourries, avançant avec une aisance grotesque tandis qu'elles prélevaient les vieux, les infirmes et les mourants parmi nous.\n\nNous avons essayé d'agir, nous avons essayé de les sauver, mais leur destin fut quelque sacrifice innommable à quelque divinité inconnue et maligne. Leurs atrocités étaient une vision cauchemardesque, comme si le mal lui-même avait engendré cette congrégation. L'air s'épaissit d'énergies contre nature et du sang des tués, faisant trembler la terre sous nos pieds.\n\nAu cœur des Marais-aux-Sangsues, face aux horreurs de ce bourbier maudit, la malveillance implacable des Hommes-Sangsues fut un rappel glaçant qu'il y avait des forces encore plus sombres à l'œuvre en ce monde, et que peut-être Tswohvwoh'ii était une maîtresse plus clémente que ce qui se trouvait au-delà. Tandis que nous poursuivons notre pèlerinage, cette pensée n'apporte guère de réconfort."
    effelai_worship.411.a:0 "Nous devons fuir ce sinistre marécage au plus vite"
    effelai_worship.412.t:0 "La Griffe"
    effelai_worship.412.d:0 "Le cœur lourd et avec une détermination sinistre, nous avons poursuivi notre route. Nous sommes maintenant moins nombreux, mais nous trouvions réconfort dans l'idée que ceux qui restaient étaient tous assez forts pour survivre à tout ce que nous affronterions désormais.\n\nNous avions tort.\n\nNotre voyage nous a menés plus profondément dans l'étreinte de Tswohvwoh'ii, loin sous la canopée d'arbres colossaux qui faisaient paraître le soleil de midi comme un crépuscule lointain. Dans le feuillage, des formes innombrables nous traquaient à nouveau, semblant se fondre parfaitement dans la flore tordue qui les entourait, avant de bondir avec une fureur bestiale. Des crocodiliens terrestres qui guettent dans les cimes, des chauves-souris d'un blanc pâle qui emportent les imprudents dans le clair de lune. Ici, dans cette cacophonie vibrante de danger et de mort, nous connûmes la peur.\n\nPourtant, les bêtes peuvent être tuées, les bêtes peuvent être comprises, la volonté derrière elles est simple. Il n'en va pas de même pour ceux saisis par le chant de Tswohvwoh'ii et asservis à Sa volonté. Ces visages jadis familiers se mouvaient maintenant comme manipulés par une force d'un autre monde, leurs esprits piégés, contrôlés par un bourdonnement surnaturel, tandis qu'un feuillage insidieux se répandait sur leurs corps. Leurs voix, autrefois pleines de chaleur et de familiarité, avaient été remplacées par des mélodies étranges et obsédantes, faisant écho aux secrets et désirs de notre cruelle Maîtresse. Nous n'osions pas croiser leur regard, car leurs yeux renfermaient un vide vacant et hanté. C'était un cruel coup du sort de voir nos frères réduits à de simples pantins, un chœur enchaîné.\n\nNous ne pouvions nous empêcher de nous demander si nous n'étions pas entrés dans un royaume où même nos propres esprits étaient en péril, et où l'emprise insidieuse de la jungle s'étendait non seulement à la terre mais aux âmes mêmes de ceux qui osaient y marcher."
    effelai_worship.412.a:0 "Quittons cette terre d'horreurs tapies"
    effelai_worship.413.t:0 "La Profanation"
    effelai_worship.413.d:0 "Nos chants de révérence craintive nous ont portés à travers un jour de plus. Nous émergeons des vastes canopées dans des environnements entièrement différents. Ici, tout comme aux Marais-aux-Sangsues, le chant de Tswohvwoh'ii s'était estompé jusqu'à se perdre dans la brise soufflant de la mer, et la rareté de nourriture est devenue un nouveau défi omniprésent. L'absence de Sa malveillance n'a apporté que peu de répit ; au lieu de cela, elle nous a laissé un vide troublant qui semblait s'infiltrer jusqu'à nos os. La terre était aride et impitoyable ; des affleurements rocheux entrecoupés de lits de rivières asséchés et d'une végétation occasionnelle donnant accès au seul maigre ombrage pouvant nous protéger des rayons brûlants qui brillaient au-dessus.\n\nNous sommes venus en cette terre désolée car nous savions qu'elle était le foyer de ceux qui, comme nous, cherchaient à se libérer du chant de la jungle. Ici, ceux qui défieraient Tswohvwoh'ii avaient supposément bâti leur bastion. Alors que nous attendions, le souffle coupé, à l'ombre d'un ravin près de l'océan, des silhouettes approchèrent, leurs formes déformées par la chaleur sur les dunes. C'était un petit groupe d'Orwa'ii, leurs formes autrefois larges et plus rondes maintenant réduites à un état de malnutrition et de peur.\n\nLeurs yeux portaient un ressentiment las, et leurs silhouettes fragiles parlaient d'une lutte incessante pour la survie. Le contraste saisissant entre les Orwa'ii dont nous avions entendu parler et ceux devant nous nous laissa dans une contemplation sombre. Tandis que nous échangions des regards désespérés et des murmures fatigués parmi notre propre groupe, nous ne pouvions nous empêcher de nous demander si, peut-être, la sécurité relative de cette côte aride valait le prix de leur existence diminuante dans ce refuge stérile. Cela nous fit nous interroger si nous aussi avions un choix dans notre propre pèlerinage, ou si nous n'étions que des pions dans les jeux insondables de Tswohvwoh'ii, coincés entre le diable et les profondeurs de la mer."
    effelai_worship.413.a:0 "Cette pauvre terre stérile"
    effelai_worship.414.t:0 "L'Échine"
    effelai_worship.414.d:0 "Notre pèlerinage nous a menés aux contreforts engendrant une échine de montagnes imposantes et une terre d'arbres majestueux et immenses, leurs troncs s'élevant comme d'antiques sentinelles pour toucher les cieux. La beauté naturelle de ce lieu était à couper le souffle, tandis que nous nous émerveillions devant la taille immense et l'âge même de ces forêts colossales. Un seul de ces titans, une fois abattu, suffisait pour plusieurs jours de travail, un don pour les artisans qui se réjouissaient de l'opportunité de travailler avec des matériaux aussi exceptionnels. En effet, la qualité du bois était exceptionnelle, apparemment léger mais non moins rigide, et imperméable à l'humidité comme à la pourriture. Tswohvwoh'ii, semble-t-il, nous a accordé le rare privilège de prendre certaines de ces précieuses ressources pour aider notre voyage, bien que dans quel but, nul ne peut le dire, car notre Déesse est rarement encline à la bienveillance.\n\nBien que cette terre soit riche en ressources, elle n'est pas sans défis. Même ici, nous ne sommes pas à l'abri des serviteurs-graines et de leur massacre choral. Des monstres aussi ont élu domicile ici, avec des wyvernes planantes protégeant avidement les bosquets les plus généreux. C'est peut-être dans nos échanges avec les Effe'i locaux que cette dichotomie a été mise à nu. Ils nous ont offert leur connaissance des herbes médicinales, comme la racine de la fleur de Payay, la sève des arbres Ceila, et la si importante Fleur-de-Vie. Ces dons furent une bénédiction si cruellement nécessaire pour soigner nos compagnons blessés. Cependant, certains de nos membres payèrent un lourd tribut pour leur tentative de récolter ces herbes eux-mêmes, car les mêmes plantes qui pouvaient apporter soulagement pouvaient aussi devenir extrêmement toxiques si elles n'étaient pas cueillies avec soin, et nous perdîmes quelques-uns des nôtres dans le processus, un rappel brutal que nous ne sommes pas libres de toute appréhension même en des terres d'abondance."
    effelai_worship.414.a:0 "Véritablement une terre aux riches ressources"
    effelai_worship.415.t:0 "La Tumeur"
    effelai_worship.415.d:0 "Nous avons marché pendant plusieurs jours, et nos éclaireurs ont rapporté un changement remarquable de décor. Les arbres ici cèdent lentement la place à des monolithes cylindriques géants de champignons, les brins d'herbe sont supplantés par des colonies de champignons à chapeaux blancs, et l'odeur verdoyante de la flore est remplacée par la puanteur caractéristique de la pourriture, créant une atmosphère surréaliste et surnaturelle. Il ne fallut pas longtemps avant que nous trouvions la source de l'odeur de décomposition ; des troncs d'arbres anciens évidés, des cadavres de grandes bêtes de la jungle, et l'occasionnel ossement marquant le lieu de repos de l'un des nôtres ; les restes de ceux qui avaient péri lors de leurs propres pèlerinages, leurs corps et possessions réclamés par la flore mycologique. Il est évident que cette terre était un lieu où toutes choses venaient mourir, un cimetière pour ceux qui avaient succombé à l'emprise implacable de l'Effelai.\n\nÉtrangement, malgré les environs sinistres, cette terre semblait être hors de portée de notre Déesse. Tswohvwoh'ii semble avoir une amère aversion pour ce lieu, en faisant un sanctuaire presque paradoxal. Les habitants natifs qui résident ici, les grands Lai'i à l'armure étrange, sont également étonnamment accueillants. Ils sont venus à nous à bras ouverts et avec un empressement pour le commerce, et certains de nos jeunes sont revenus de l'expérience avec une nouvelle affinité pour les chapeaux fongiques si communs dans leur culture. Ce fut une rencontre qui nous emplit d'un étrange mélange d'émotions : soulagement de trouver des compatriotes et un sentiment d'unité, mais aussi un malaise tenace que la Tumeur représentait le dernier lieu de repos pour beaucoup qui avaient entrepris le même voyage. L'Effelai est vraiment un lieu de contradictions, où la frontière entre la vie et la mort, l'ami et l'ennemi, est devenue de plus en plus floue, et nous sommes laissés à naviguer ce royaume énigmatique avec un mélange de crainte et d'espoir."
    effelai_worship.415.a:0 "Des monolithes grotesques qui propagent la vie"
    effelai_worship.415.b:0 "Finir le travail avant de poursuivre notre voyage"
    effelai_worship.416.t:0 "Le Cœur"
    effelai_worship.416.d:0 "Avec appréhension, nous nous sommes aventurés au plus profond du cœur ténébreux de Tswohvwoh'ii. Une puissante résonance nous accueille ; des mélodies sinistres engendrées par notre Maîtresse, tissées dans la jungle comme des fils qui lient sa tapisserie. Les sons de notre environnement, autrefois une cacophonie de vie sauvage, sont devenus uniformes dans leur dessein. Ce dessein était clair, la force motrice derrière chaque liane et brin d'herbe : elle cherchait à contrôler, à prendre pour sienne, à nous étreindre dans un embrassement étouffant, anathème à toute individualité. Les serviteurs-graines, les pantins qui furent jadis nos parents, étaient particulièrement implacables, alors que les chants de Tswohvwoh'ii se faisaient toujours plus forts et s'enfonçaient plus profondément dans nos âmes. Cela faisait si mal, tant des nôtres ne purent endurer. Même les esprits les plus stoïques et inébranlables souffraient dès l'instant où nos oreilles étaient saluées par cet air obsédant.\n\nUn vertige insidieux s'installa, suivi rapidement de maux de tête atroces qui semblaient ronger notre volonté même de continuer. C'était comme si Tswohvwoh'ii cherchait à submerger notre existence même, nous transformant en simples vaisseaux de ses sombres désirs.\n\nNous n'osâmes pas nous attarder ici, nous hâtant de traverser le terrain périlleux et maudissant l'idée même que les esclaves de la jungle qui nous suivaient de près puissent jamais être apaisés. L'urgence de fuir son cœur était indéniable, et nous nous précipitâmes hors de ce lieu maudit, nos pas ponctués par les cris discordants des serviteurs-graines qui brisaient le rythme macabre. Il était abondamment clair que nous n'étions pas les bienvenus en cette demeure, chaque instant éveillé prouvant que notre présence était une transgression contre l'ancienne puissance qui régnait ici. Que faire, alors, pour que notre peuple perdure ?"
    effelai_worship.416.a:0 "Nos têtes résonnent encore"
    effelai_worship.500.t:0 "Élection de l'Alianaíarat"
    effelai_worship.500.d:0 "Contrairement à notre héritage tribal, nous n'avons plus besoin des limitations de tirer nos dirigeants de nos propres familles, car nous sommes tous unis dans l'étreinte de notre Déesse. Chaque tribu ayant affiné différentes capacités pour répondre aux épreuves de leur région d'origine, nous avons une vaste richesse de talents d'où tirer nos futurs dirigeants. Quelle que soit la tribu que nous choisissons, notre héritier devra subir les épreuves de notre Déesse.\n\nAyant toujours été les guerriers les plus zélés de notre déesse, les Parura résidant dans les Marais-aux-Sangsues font des administrateurs compétents, et en raison de l'environnement hostile de ce marécage redouté, sont tous des guerriers aguerris. Bien que la Déesse bénisse tous ses enfants, ils continuent d'être les plus favorisés de ses fidèles, et elle accorde souvent aux touchés par la magie des pouvoirs extraordinaires de divination.\n\nLes parties orientales de cette jungle abritent les nombreuses tribus Thavo'i. Construisant de vastes colonies et pratiquant régulièrement de dangereuses « Chasses Sanglantes », ils font des guerriers excellant dans la communication et l'organisation d'autres tribus pour œuvrer vers des objectifs communs.\n\nQu'il s'agisse de construire des structures méticuleusement ouvragées ou de concocter de nouvelles formes de médecine, les Effe'i sont les plus fins administrateurs de la jungle. Leur ensemble de compétences unique favorisera assurément la prospérité et la stabilité durant leur règne.\n\nUne force prodigieuse et une prouesse martiale inégalée composent la légende des Lai'i. Bien qu'une puissance militaire inégalée ne soit pas la seule chose dont une nation prospère ait besoin, un dirigeant intimidant assurera notre autonomie face aux étrangers.\n\nEmplis d'une passion ardente pour les festivités et la diplomatie, les tribus Soruiniques font des diplomates incroyablement talentueux. Bien qu'ils n'aient établi un contact significatif avec les autres tribus que récemment, ils se sont déjà imposés comme inégalés dans l'art de tisser des liens avec leurs voisins et les étrangers qui s'aventurent en ces terres.\n\nNous devons cependant nous rappeler que les dons de notre bienveillante Déesse requièrent souvent de grands sacrifices pour être obtenus."
    effelai_worship.500.a:0 "Descendant Parura"
    effelai_worship.500.b:0 "Dirigeant Thavo'i"
    effelai_worship.500.c:0 "Administrateur Effe'i"
    effelai_worship.500.e:0 "Guerrier Lai'i"
    effelai_worship.500.f:0 "Diplomate Soruinique"
    effelai_worship.501.t:0 "Descente Magique : Les Épreuves du Cœur"
    effelai_worship.502.t:0 "Descente Magique : Succès !"
    effelai_worship.502.d:0 "Comme si elle anticipait l'émergence de [Root.Heir.GetName] des profondeurs du temple, l'air lui-même semble frémir d'un doux chœur. Des racines noueuses s'agitent de façon erratique, avant de se retirer de leur position précédente gardant l'entrée. Bien que la floraison ait toujours été rampante dans cette région, le feuillage semble maintenant à peine capable de se contenir de s'étendre et d'engloutir le temple.\n\nNous pouvions voir une lumière féroce émaner de nombreuses brèches, et un sentiment de soulagement avait déjà commencé à envahir ceux qui assistaient à la cérémonie. [Root.Heir.GetName] s'avança rapidement depuis la lumière enveloppante, une lueur chaude émanant brièvement de sa forme, avant de rapidement se dissiper. [Root.Heir.GetName] avait réussi, et la bénédiction de la Déesse continuait de répandre une main apaisante sur tous ceux présents aux alentours, même tandis que le chant se tordait en une cascade extatique de voix assourdissantes."
    effelai_worship.502.a:0 "[Root.Heir.GetName] porte les bénédictions de la Déesse !"
    effelai_worship.503.t:0 "Descente Magique : Échec"
    effelai_worship.503.d:0 "Une mélodie malsaine emplit le bosquet, la déception irradiant des profondeurs du temple. Les lianes se rétractent lentement tandis que le chant commence à enfler, atteignant brièvement une intensité assourdissante, avant de se replier dans un silence froid et mort. [Root.Heir.GetName] émerge soudain du temple, des serviteurs sans émotion de notre Déesse le portant de chaque côté. Semblant presque dans un état second, [Root.Heir.GetName] est étendu sur le sol à l'extérieur, avant d'être abandonné par ses gardiens temporaires qui redescendent rapidement dans les profondeurs.\n\nBien que cela ne soit pas de bon augure pour notre avenir, il y aura d'autres occasions pour [Root.Heir.GetName] de prouver sa valeur."
    effelai_worship.503.a:0 "Notre héritier a succombé aux épreuves, et revient vaincu"


    effelai_startup_information_tt:0 "§G« Chaque région contient un lieu sacré que nous devons visiter. Choisir un chemin efficace sera important, car nous ignorons quels dangers se profilent à l'horizon. »§!"
    effelai_startup_information_soruinics_tt:0 "§GNous entreprenons un grand pèlerinage vers chaque région de l'Effelai. Ce voyage ne sera pas chose aisée. Il pourrait prendre plus de vingt ans. Les monstres et l'Effelai elle-même nous remarqueront quand nous migrerons. Quand tout sera accompli, cependant, nous nous établirons enfin pour composer le dernier et plus grand chant et fonder une colonie permanente.§!\n"
    effelai_migration_information_tt:0 "§RSi nous voulons que nos guerriers nous accompagnent lors de la migration, ramenez-les à la capitale avant de confirmer cette décision§!"
    effelai_settler_information_tt:0 "§G« Après une longue période de migration et d'innombrables défis surmontés, nous avons maintenant enfin mérité le droit de nous établir et de construire des colonies florissantes à travers cette terre dangereuse »§!"
    effelai_parura_candidate_tt:0 "§GCe candidat sera compétent tant en compétences §YAdministratives§! que §YMartiales§!. Notre Déesse bénira également un dirigeant Parura d'une capacité de §YDivination§! accrue s'il réussit ses épreuves.§!"
    effelai_thavoi_candidate_tt:0 "§GCe candidat sera compétent tant en compétences §YDiplomatiques§! que §YMartiales§!.§!"
    effelai_effei_candidate_tt:0 "§GCe candidat sera extrêmement compétent en compétence §YAdministrative§!.§!"
    effelai_laii_candidate_tt:0 "§GCe candidat sera extrêmement compétent en compétence §YMartiale§!.§!"
    effelai_soruinic_candidate_tt:0 "§GCe candidat sera extrêmement compétent en compétence §YDiplomatique§!.§!"
    effelai_form_araya_tt:0 "§GFormer§! §YAráya§! §Get ne faire qu'un avec notre Déesse !§!"

    effelai_precursor_relics_decision_title:0 "Établir les Reliques Précurseurs"
    effelai_precursor_relics_decision_desc:0 "Nous pouvons enfin nous établir et étudier les reliques que nous avons découvertes."
    effelai_plant_seeds_decision_title:0 "Planter les Graines Mystérieuses"
    effelai_plant_seeds_decision_desc:0 "Ces merveilleuses graines seront d'une grande utilité pour cultiver notre nouveau foyer."
    effelai_redistribute_supplies_decision_title:0 "Redistribuer les Provisions"
    effelai_redistribute_supplies_decision_desc:0 "Mettre ces matériaux robustes à bon usage lors de l'établissement de notre colonie."

    pilgrims_of_effelai:0 "Pèlerins d'Effelai"
    pilgrims_of_effelai_desc:0 "Bien que nous nous efforcions d'entretenir les arbres fruitiers, les buissons de baies et autres plantes comestibles partout où nous nous établissons, tous ont besoin de temps pour repousser après avoir été récoltés. À cette fin, nous suivons l'appel d'Effelai : nous devons toujours continuer à nous déplacer, mais nous savons que partout où nous allons, la jungle nous fournira amplement de nourriture à chasser et à cueillir."
    settlers_of_effelai:0 "Colons d'Effelai"
    settlers_of_effelai_desc:0 "Avec la bénédiction d'Effelai obtenue, nos vies ont été transformées : la jungle est la ferme, la ferme est la jungle. Une fois que l'on est capable de prendre soin d'Effelai au point de pouvoir vivre au même endroit toute sa vie sans avoir faim, il est naturel d'appliquer ces méthodes partout où l'on va. La ferme s'étend simplement à travers tout Effelai, tandis que la tribu construit de nouveaux chemins et villages dans les profondeurs de la jungle."
