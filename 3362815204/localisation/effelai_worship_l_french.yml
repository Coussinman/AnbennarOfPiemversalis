    #Effelai Tribes MT Loc
    effelai_progress_and_ingenuity_title:0 "Progrès et Ingéniosité"
    effelai_progress_and_ingenuity_desc:0 "Nous n'avions autrefois pas de mot pour « académie », ni même pour « école ». Nous avions des mots pour enseignant, pour sagesse, pour savoir et étudiant, mais l'apprentissage ne se faisait jamais de manière structurée. Alors, nous avons simplement emprunté le mot aux visiteurs cannoriens et l'avons fait nôtre. Il s'intègre étrangement au reste de notre langue, comme un poisson hors de l'eau, mais cela semble approprié d'une certaine façon. Le savoir est souvent étrange et contre-intuitif, alors pourquoi le nom du lieu où il s'acquiert ne le serait-il pas ? L'Académie d'Aráya sera un rassemblement des esprits les plus brillants sous la canopée, où le savoir des tribus disparates ainsi que les idées nouvelles venues d'au-delà des mers seront réunis."
    effelai_prosperous_growth_title:0 "Croissance Prospère"
    effelai_prosperous_growth_desc:0 "Les Cannoriens sont d'étranges peuples. Ils connaissent peu la jungle, s'enfonçant souvent vers une mort précoce avec leur confiance imméritée dès qu'ils s'aventurent à plus de cinq lieues de la côte. Ils vénèrent des dieux étrangers, et la plupart raillent la puissance pourtant clairement démontrable de notre Déesse. Mais ils possèdent une richesse et une prospérité que nous n'avions jamais vues auparavant, même les terres au sud de la jungle, transportées simplement à bord de leurs navires. Pour que notre peuple bénéficie de niveaux similaires de prospérité, nous devons assurément apprendre d'eux, et adapter leurs méthodes productives d'une manière qui satisfera la Déesse."
    effelai_harmonous_expansion_title:0 "Expansion Harmonieuse"
    effelai_harmonous_expansion_desc:0 "Afin de nous assurer que notre prospérité nouvellement acquise se répande jusqu'aux confins les plus éloignés de Son royaume, plutôt que seulement dans notre cœur, nous avons dû concevoir une logistique jusqu'alors inouïe. Là où autrefois nous facilitions le commerce par des rivières envahies par la végétation et d'étroits sentiers, nous sommes passés des pirogues et des sacs à dos aux barges et aux mille-pattes géants chargés. Pour cela, nous avons besoin de rivières dégagées et de chemins plus larges, ce qui n'est pas tâche aisée sans perturber notre Déesse. Mais chaque tribu a travaillé dur pour résoudre ces problèmes, et l'ingéniosité prodigieuse que nous avons pu déployer en œuvrant ensemble a grandement contribué à trouver des solutions."
    effelai_taiabarsapri_title:0 "Tai'aba'rsapri"
    effelai_taiabarsapri_desc:0 "Plus nous voyageons, plus le voyage devient aisé. Nous n'étions autrefois accoutumés qu'à notre petit coin de jungle, et le reste de Son royaume nous semblait étranger et dangereux. Mais plus nous voyons, plus nous réalisons que les fondements de notre savoir sont applicables à travers toute la jungle, et chaque nouvel obstacle est plus facile à surmonter que le précédent. Notre voyage n'est pas encore terminé, mais nous faisons déjà des préparatifs pour notre retour au foyer."
    effelai_settled_down_title:0 "Établis"
    effelai_settled_tt:0 "§RTous les Sites de Festival non visités seront supprimés§!"
    effelai_settled_down_desc:0 "Nous sommes venus de loin, très loin en vérité. Nous avons accompli notre voyage ordonné et contemplé la vaste diversité de l'influence de notre Déesse. Plus important encore, cependant, nous avons réussi les Épreuves de la Déesse.\n\nNotre société, autrefois si chaotique et déchirée par les conflits, est maintenant stable et florissante. Sous la guidance de la Déesse, nous croyons qu'un avenir radieux nous attend."
    effelai_a_burgeoning_civilization_title:0 "Une Civilisation en Plein Essor"
    effelai_a_burgeoning_civilization_desc:0 "Qui aurait cru que planter nos racines produirait les résultats que nous avons connus ? Il y a eu une expansion extérieure prodigieuse et une explosion démographique. Dans une seule maison, il y a maintenant plus d'enfants qu'il n'y avait d'adultes dans les deux générations précédentes réunies. Pour répondre à cette explosion démographique, nous avons établi des réseaux commerciaux et créé des dizaines de nouvelles colonies.\n\nLe résultat en est une sorte de renaissance culturelle. Avec tant de monde, nous avons maintenant le temps de réfléchir correctement au fonctionnement du monde. Les gens peuvent maintenant s'occuper à comprendre les voies et les secrets de toutes choses, et le chemin sur lequel notre Déesse nous a guidés. Ils inventent des concepts et découvrent des lois de la nature ; ils créent même des manifestations artistiques jusqu'alors inconnues, d'une beauté sans pareille. Qu'il n'y ait aucun doute : notre peuple s'épanouit !"
    effelai_unite_the_tribes_title:0 "Unir les Tribus"
    effelai_unite_the_tribes_desc:0 "Notre force n'est pas un accident : nous avons surmonté bien des obstacles pour accomplir ce que nous avons accompli. Mais les autres tribus de l'Effelai luttent pour survivre ; nous ne pouvons leur permettre de rester ainsi à la dérive. La volonté de la Déesse est claire. Nous devons placer les autres peuples sous notre influence et partager Ses bénédictions avec eux.\n\nCeux que nous avons déjà assujettis nous apporteront grande renommée, et ceux qui restent à rallier se joindront à nous avec le temps. Mais afin de finaliser notre mission, il est également crucial que nous étendions la capacité militaire de notre pays. Heureusement, nous avons un large éventail d'options à notre disposition."
    effelai_alianaiarat_title:0 "Alianaíarat"
    effelai_alianaiarat_desc:0 "Conformément au commandement de la Déesse, la dernière tâche qu'Elle nous a confiée, nous avons dûment uni tous les peuples de la jungle. Une confédération a été créée, unissant toutes les tribus de l'Effelai, et notre gouvernement est enfin libéré pour progresser d'une manière correspondant à sa croissance.\n\nNous allons maintenant adopter un gouvernement fondé sur le règne de la Déesse, une théocratie, dont les objectifs principaux seront de préserver chaque culture au sein de l'Effelai et d'étendre l'influence élevée et juste de la Déesse. Afin de finaliser l'établissement de notre Alianaíarat ou Confédération des Tribus, nous devrions maintenant bâtir des légations de notre gouvernement dans les capitales de chacune de nos tribus vassales."
    effelai_looming_ascendance_title:0 "Ascension Imminente"
    effelai_looming_ascendance_desc:0 "Quel chemin parcouru ! Autrefois, nous étions des tribus disparates luttant pour vivre dans une jungle qui semblait infernale et incompréhensible. Mais aujourd'hui, nous sommes les serviteurs investis et éclairés de l'Effelai, ses protecteurs incontestés ! La jungle est en pleine floraison autour de nous, et nous-mêmes commençons à fleurir en tant que peuple grâce aux bénédictions de la Déesse, qui est maintenant disposée à accorder encore davantage de Son pouvoir à l'ensemble de notre population.\n\nAujourd'hui, grâce au pouvoir de la Déesse et de la jungle, nous franchissons la première étape vers l'ascension et devenons Aráya, des semis au sens propre comme au sens figuré. Notre peuple se transforme, comme les serviteurs-graines, mais ils ne perdent pas leur autonomie et gagnent au contraire accès à un vaste potentiel magique.\n\nCe n'est pas un instant trop tôt, car des étrangers tentent de s'immiscer dans nos terres sacrées. Par la volonté de la Déesse et la force de l'Effelai, nous les empêcherons de devenir une véritable menace."
    effelai_tentative_connections_title:0 "Connexions Hésitantes"
    effelai_tentative_connections_desc:0 "Dans les chroniques de notre tribu, bien peu de rencontres sont consignées avec des peuples autres que les pantins sans esprit asservis à Son chant ou les adorateurs de ce misérable marécage. Cependant, récemment nos éclaireurs ont rapporté des ombres se mouvant sous la canopée, des silhouettes portant une ressemblance frappante avec... nous-mêmes ? Nous devons découvrir qui ou quoi sont ces êtres, et s'ils pourraient être de précieux alliés dans notre lutte pour la survie ou simplement utiles comme tremplins vers le succès."
    effelai_survival_through_unity_title:0 "La Survie par l'Unité"
    effelai_survival_through_unity_desc:0 "Alors que notre pèlerinage touche à sa conclusion, nous avons appris non seulement l'existence de plusieurs autres tribus, mais aussi leurs différences avec la nôtre, et ce faisant nous avons renforcé tant notre lien tribal interne que notre capacité à naviguer Son royaume et à garder notre tribu en sécurité. Nous devons maintenant chercher au-delà de nos frontières et rechercher proactivement de nouveaux amis ou ennemis sous Sa canopée, afin de préserver notre avenir."
    effelai_surveying_our_lands_title:0 "Arpenter nos Terres"
    effelai_surveying_our_lands_desc:0 "Nos ancêtres parlaient de la « grande-bonté » de l'Effelai, une référence à la beauté du lieu où ils vivaient. Contemplant chaque partie de cette belle terre lors de nos voyages et reprenant le contrôle de terres à travers toute la jungle, nous comprenons ce qu'ils voulaient dire.\n\nMais ayant acquis le contrôle de bien plus qu'auparavant, nous devons comprendre ce qui est désormais à notre disposition pour la prochaine étape de notre voyage. Bien que tout fasse partie d'un seul Effelai, les régions sont différentes : une région avec un grand fleuve aura une flore et une faune différentes d'une autre qui subsiste grâce aux ruisseaux ou aux pluies. Commençons donc à apprendre à connaître les terres sous notre intendance."
    effelai_goddess_heart_title:0 "Le Cœur de la Déesse"
    effelai_goddess_heart_desc:0 "Nous avons été guidés par la Déesse jusqu'à un lieu au centre de la jungle. Quand nous y sommes arrivés, Elle nous a dit de construire un grand temple pour Elle afin que nous puissions ne faire qu'un avec Elle. En déférence à Sa volonté, nous commençons cette grande œuvre.\n\nNotre ascension commence ici. Quel que soit le nom que ce lieu portait jadis, il est immatériel : nous appelons la demeure du Cœur de la Déesse « Máyna », signifiant à la fois « Jardin de Vie » et « Jardin de Mort ». Nous utilisons un nom riche de significations apparemment contradictoires car nous connaissons Máyna pour ce qu'elle est : le lieu où le cycle de la vie et de la mort cessera finalement pour notre peuple, car nous ne ferons plus qu'un au sein de la Déesse."
    effelai_ancient_knowledge_title:0 "Savoir Ancestral"
    effelai_ancient_knowledge_desc:0 "Durant notre pèlerinage à travers le paysage tortueux du nord, notre Déesse a jugé bon d'accorder à notre chef des visions de plusieurs emplacements proches où nous pourrions localiser d'importants artefacts magiques. Coloniser cette zone et trouver un emplacement approprié pour collecter et canaliser l'énergie magique ambiante pourrait permettre à notre chef de mieux nous guider vers les grottes cachées et les reliques évoquées dans ses visions."
    effelai_far_from_home_title:0 "Loin du Foyer"
    effelai_far_from_home_desc:0 "Notre pèlerinage nous a menés dans chaque recoin et jusqu'aux confins les plus éloignés de Son royaume. Ici, nous disent nos guides, se trouve le point le plus éloigné de notre clairière natale. Ici se trouve une beauté sans égale par rapport à tout ce que nous avons vu. De nombreux jeunes membres de notre tribu n'ont connu que la vie depuis le début de notre voyage, et pourtant ils ont acquis une richesse de connaissances sur Son royaume plus grande que ce dont nos ancêtres auraient pu rêver. De nouveaux amis et ennemis se sont fait connaître, et bien que notre monde ait changé à jamais, une chose est certaine : nous ne sommes jamais trop loin de chez nous."
    effelai_effelai_bloom_title:0 "L'Éclosion d'Effelai"
    effelai_effelai_bloom_desc:0 "Enfin, nos décennies d'exploration extensive, de diplomatie intertribale et d'amélioration économique ont porté leurs fruits. Le monument à Sa majesté est achevé, et nous étendons maintenant notre surveillance aux centres de Son pouvoir dans chaque région que couvre la canopée. Il est temps de nous concentrer sur notre administration, car à mesure qu'Elle devient une part plus intégrante de notre société, nous devons nous adapter aux forces tant intérieures qu'extérieures à notre foyer."
    effelai_parura_showing_superiority_title:0 "Démontrer notre Supériorité"
    effelai_parura_showing_superiority_desc:0 "Nous connaissons bien les autres tribus de la jungle ; nos marchands ont toujours navigué les grands fleuves pour commercer avec elles. Elles respectent Chahinanito, et lui chantent comme nous le faisons. Mais elles ne la révèrent pas comme nous, et ne sont pas de vrais chasseurs comme nous le sommes. Cela suffisait autrefois, mais les temps ont changé. Chahinanito exige l'obéissance de ses enfants si elle doit les garder en sécurité en prévision des temps dangereux à venir. Nous partagerons la chasse avec eux, et alors ils connaîtront la vraie voie de Chahinanito."
    effelai_parura_cut_off_one_head_title:0 "Couper une Tête"
    effelai_parura_cut_off_one_head_desc:0 "À travers nos voyages, Sel'Parura est devenue plus forte qu'elle ne l'a jamais été. Maintenant, nous pouvons enfin accomplir ce que nos ancêtres ont tenté maintes fois : l'élimination des Hommes-Sangsues importuns. Trop longtemps ces monstres ont profané le domaine de notre Déesse, ensanglantant leurs autels immondes, tentant d'éveiller leur dieu vil. Plus jamais. Nous sommes la lance, le croc et la griffe de Chahinanito, et elle désire que ce dieu prétendant dorme pour l'éternité."
    effelai_parura_trials_of_blood_title:0 "Épreuves de Sang"
    effelai_parura_trials_of_blood_desc:0 "Les Parura ont toujours été des guerriers, en raison de notre guerre éternelle contre les Hommes-Sangsues, et de nos grandes chasses. Mais on ne peut nier que les Lai'i et les Thavo'i possèdent également de formidables guerriers. Les vaincre apportera honneur à Sel'Parura. Mais plus que cela, cela montrera que seule une révérence inébranlable envers Chahinanito peut nous permettre, à nous ses enfants, d'obtenir la vraie force. Et si nous montrons aux autres tribus le chemin de la chasse, elles aussi pourront peut-être y parvenir."
    effelai_parura_chahinanitos_chosen_title:0 "Les Élus de Chahinanito"
    effelai_parura_chahinanitos_chosen_desc:0 "Un nouvel âge est sur nous. Sel'Parura, la tribu élue de Chahinanito, mène toutes les autres tribus sous sa canopée, et se tient prête à accomplir sa volonté. Malgré tous les dangers que recèle la jungle, des Hommes-Sangsues et serviteurs-graines aux bêtes terribles et aux monstres, nous seuls sommes aimés... nous seuls sommes la vraie puissance. Quoi que l'avenir nous réserve, Sel'Parura est prête à y faire face."
    effelai_soruinic_festival_of_unity_title:0 "Festival de l'Unité"
    effelai_soruinic_festival_of_unity_desc:0 "Les invitations ont été envoyées, et les préparatifs sont en cours. Si Aen'Saldyano a toujours été renommée à travers Soruin pour ses festivals, nous devons être bien plus ambitieux si notre légende doit s'élever encore plus haut. Nous devons tenir un festival pour tous les enfants de l'Effelai.\n\nPour ce faire, nous devons accommoder les goûts divers des nombreuses tribus disparates qui résident dans cette vaste jungle. Outre les festins, la musique et le théâtre traditionnels, il y aura de nombreux nouveaux événements : des courses et des concours de nage à contre-courant pour les sportifs, du tir à l'arc et de la lutte pour les plus martiaux d'entre eux, et un marché avec des marchandises de tout l'Effelai et au-delà."
    effelai_soruinic_a_story_for_the_ages_title:0 "Une Histoire pour les Âges"
    effelai_soruinic_a_story_for_the_ages_desc:0 "La tribu bourdonne d'excitation, car il est à nouveau temps d'accueillir le grand rassemblement de tous les peuples de Soruin : le Festival du Chant. Un nom quelque peu trompeur, peut-être ; bien qu'il y ait beaucoup de chants, le festival est bien plus que cela. Il y a des concours de poésie, des festins, des représentations théâtrales de légendes anciennes, et bien plus encore. Cela a toujours été un temps où les plus âgés d'entre nous retrouvent de vieux amis, où nos jeunes trouvent leurs premiers amours, et où les gens de tous âges s'enivrent de vin de baies."
    effelai_soruinic_better_with_friends_title:0 "Mieux avec des Amis"
    effelai_soruinic_better_with_friends_desc:0 "Pour véritablement unir les peuples de l'Effelai, la diplomatie est la seule solution viable. Un royaume de jungle vaste et impénétrable ne peut être gouverné qu'avec le consentement de ses sujets. Il est très important que nous soyons très clairs dès le départ : nous offrons l'amitié, nous recherchons la suzeraineté, et nous promettons la prospérité à tous ceux qui se joindraient à nous."
    effelai_soruinic_destiny_defined_title:0 "Destinée Définie"
    effelai_soruinic_destiny_defined_desc:0 "Il est approprié que notre tribu de récits et de chants soit au centre de la plus grande histoire à ce jour : l'histoire de l'Effelai uni. Nos noms seront évoqués dans les chants, les pièces et les poèmes de toutes les générations à venir, aux côtés des noms de Cosaínti, Aíthzi, Aururã et de nos autres héros ancestraux.\n\nMais ce n'est pas seulement dans les chants que nos exploits résonneront. Notre peuple s'en souviendra dans la nouvelle sécurité dans laquelle il se trouve, assurée par la paix durable que nous avons créée."
    effelai_effei_sowing_the_future_title:0 "Semer l'Avenir"
    effelai_effei_sowing_the_future_desc:0 "À chaque épreuve que nous surmontons, nos pousses apprennent davantage du chœur qui donne vie à notre Déesse. Nous avons trouvé des racines qui brûlent comme mille aiguilles lorsque la chair y est exposée, et des pétales capables d'apaiser même la plus enragée des bêtes, et notre tribu laisse maintenant derrière elle de vastes étendues de nouvelle croissance, aidée par ces découvertes, qu'Elle habitera un jour, et ce faisant nous accordera, espérons-le, la paix."
    effelai_effei_goddess_garden_title:0 "Le Jardin de la Déesse"
    effelai_effei_goddess_garden_desc:0 "Des feuilles aussi larges que les épaules de nos plus fins guerriers, des fleurs aussi brillantes que des ruisseaux tachetés de soleil, et des lianes assez épaisses pour supporter de grandes bêtes. Notre succès dans la culture de ces plantes est entièrement dû à notre Déesse, et lui est dédié. Tandis que nous voyageons, chaque membre de notre tribu chante pour les graines semées par notre chef. Ce rituel d'enrichissement aide à apaiser Sa colère envers les terres stériles, bien que temporairement. Nous avons eu peu de succès sur la côte brûlée, mais en rentrant dans la jungle nous avons souvent été confrontés à moins de dangers pendant un temps."
    effelai_effei_a_conversation_over_tea_title:0 "Conversation autour du Thé"
    effelai_effei_a_conversation_over_tea_desc:0 "Durant notre grand pèlerinage, une graine a été trouvée dont les feuilles, une fois infusées dans de l'eau bouillante, produisent une chaleur revigorante qui enveloppe le buveur et éclaircit l'esprit. Nous avons proposé de partager ce thé, et notre chœur de graines, avec les autres tribus afin qu'un jour nous puissions revenir et partager les fruits collectifs de notre labeur."
    effelai_effei_to_soothe_her_wounds_title:0 "Apaiser ses Blessures"
    effelai_effei_to_soothe_her_wounds_desc:0 "Une seule pousse. Notre chef est assurément béni par Elle. Il a réussi à cultiver une seule pousse le long de la Côte Aride occidentale. Nous ne saurons peut-être jamais si nos jardins le long de la côte fleuriront, mais nous avons prouvé que la vie peut germer à nouveau. Les autres tribus ont expérimenté notre capacité à réparer et étendre l'influence de notre Déesse, et ont choisi de suivre notre exemple suite à un généreux afflux de jardins nourriciers plantés dans la patrie de leur chef."
    effelai_laii_carcass_craftsmen_title:0 "Artisans de Carcasses"
    effelai_laii_carcass_craftsmen_desc:0 "Voici maintenant devant nous un jeune de notre tribu, exigeant son entrée dans l'ordre de nos guerriers ou de nos chamans. Il a tué une grande bête de la forêt tout seul : peut-être un grand tigre à trois têtes, ou un singe gargantuesque à quatre bras. Il a ligoté l'animal avec le meilleur de sa force et de ses ressources, et maintenant que la plus grande partie de son travail est accomplie, nous l'aiderons.\n\nL'initié abattra rituellement son captif, tout en chantant les chants du peuple qui honorent le mieux son sacrifice. Les os de la créature seront façonnés en armure par la magie transmise par la Déesse, car c'est seulement grâce à Sa providence que nous sommes capables de transformer ces os en pièces d'armure pouvant protéger de larges parties de nos corps, et rendus plus lourds ou plus légers selon les besoins de l'initié. Cela fait, l'énergie de la bête appartiendra désormais au nouveau guerrier ou chaman qui aura ainsi prouvé son passage à l'âge adulte."
    effelai_laii_bone_bound_title:0 "Liés par l'Os"
    effelai_laii_bone_bound_desc:0 "Ce n'est pas une simple chasse pour la nourriture ou pour satisfaire quelque curiosité. Ce n'est pas non plus une quête de gloire ; c'est plutôt une guerre pour la survie même de notre peuple. Nous partons maintenant prouver à la Déesse que nous avons la force des armes et de la foi pour accomplir Sa volonté. Notre cible ? Les os de bêtes, les grands os de bêtes, les fragments des plus terribles habitants de la Forêt !\n\nPourquoi partons-nous chasser ces bêtes ? C'est simple. Quand nous tuons une bête et prenons ses os, les façonnant en armes et armures, les armements ainsi créés possèdent le pouvoir de la grande bête à laquelle ils appartiennent. Les armes liées par l'os ainsi créées ont une puissance inouïe par quiconque dans la grande forêt ou au-delà. Elles confèrent à nos soldats une force incroyable et d'autres avantages redoutables, qui varient selon l'arme et la bête. Avec de tels bénéfices à portée de main, nous marchons pour apporter gloire et force à notre peuple."
    effelai_laii_finishing_the_job_title:0 "Finir le Travail"
    effelai_laii_finishing_the_job_desc:0 "Nous avons écrasé les Dugui'hi une première fois ; nous les avons chassés de leurs foyers autrefois prospères et avons pris le contrôle de ces foyers pour nous-mêmes. Nous pensions que cela pourrait être la fin, pour l'instant, étant donné à quel point nous avions réussi à briser leur volonté à l'époque. Mais maintenant nos éclaireurs nous rapportent qu'ils planifient une « récupération » de leur foyer perdu ? Quelle folie de leur part ; quelle opportunité pour nous !\n\nNous finirons le travail. Marchant vers le Taychend à travers la Forêt-aux-Champignons, nous les abattrons une fois pour toutes. Créant des lances et de grandes hallebardes à partir des os de grandes bêtes et du bois réputé résistant de cette région, nous utiliserons les bêtes de la terre d'exil des Dugui'hi contre eux, et les achèverons définitivement."
    effelai_laii_bone_bound_arsenal_title:0 "Arsenal Lié par l'Os"
    effelai_laii_bone_bound_arsenal_desc:0 "Nous avons déjà parcouru un si long chemin. Nous avons accompli les épreuves de la Déesse, nous avons chassé les grandes bêtes de la forêt et lié leurs os à nous, et nous avons pleinement assujetti et détruit nos rivaux mortels insensés. Aujourd'hui, nos guerriers sont vêtus d'armures liées par l'os magistralement façonnées, et manient des armes liées par l'os d'une puissance dont nos ancêtres n'osaient que rêver.\n\nIl n'y a plus de fous à vaincre au sein de la Forêt. Nous regardons maintenant vers le sud, vers les seigneurs de guerre du Taychend. Ils sont forts, mais ils n'ont aucun lien avec les animaux qu'ils abattent ; encore moins jouissent-ils de la faveur de notre Déesse. Nous les affronterons, les chasserons de leurs foyers et de leurs trônes comme nous l'avons fait de nos rivaux, et cimenterons à jamais notre place comme les guerriers les plus forts de la région."
    effelai_thavoi_service_and_sacrifice_title:0 "Service et Sacrifice"
    effelai_thavoi_service_and_sacrifice_desc:0 "Il y a longtemps, une bande de pêcheurs fut massacrée jusqu'au dernier par des Serviteurs du Chant. Leur tribu les railla, insulta leur nom, et les traita d'inutiles car ils ne purent récupérer qu'une partie de la prise. Ils furent réduits au silence par les paroles de leur chef, le Kasike Cacimar, qui proclama qu'une patrie n'est rien de plus, et rien de moins, que service et sacrifice. Le service, dit-il, était le privilège des vivants, et le sacrifice le privilège des morts. Au fil des années, cela est devenu l'axiome sur lequel les Thavo'i perdurent. Bien que nous soyons nombreux, jamais nous ne pouvons nous permettre de laisser à autrui ce que nous pouvons individuellement faire pour nos compagnons. Bien que nous soyons puissants, nous ne pouvons jamais oublier qu'individuellement nous pouvons payer le prix ultime. C'est la vérité au cœur de notre peuple, et les corps des tombés pour cette cause ne sont que des graines pour l'éclosion de notre avenir.\n\nEnfin, ces graines ont porté leurs fruits.\n\nNos guerriers ont affronté des horreurs à travers les innombrables chasses convoquées pour protéger nos colonies, les transformant en une force combattante expérimentée et implacable à la hauteur des bêtes qui continuent d'assaillir nos frontières. Sous leurs yeux vigilants, nos terres ont été colonisées et fortifiées, et notre connexion avec notre Déesse demeure résolue. En effet, tandis que la nouvelle de nos victoires se répand au loin, nos tribus voisines en sont venues à craindre notre nom à juste titre. Par un effort inlassable, les épreuves lancées contre nous par Tswohvwoh'ii ont été surmontées. Qu'il soit connu que les Thavo'i n'adorent pas par une adoration docile et des prières pleines d'espoir, mais par l'action, et nous avons répondu à la férocité de la jungle et à la fureur de notre déesse par la nôtre."
    effelai_thavoi_blood_hunts_title:0 "Chasses Sanglantes"
    effelai_thavoi_blood_hunts_desc:0 "De nombreuses sociétés soutiendraient que prospérer dans une terre signifie la surpasser. Pour elles, il est impératif d'agir comme si les individus résidant dans une terre se tenaient au-dessus d'elle et devaient donc imposer une volonté étrangère à sa vraie nature. Ces sociétés sont mortes, leurs ruines éparpillées dans les sous-bois et leurs paroles perdues dans la cacophonie intemporelle de la nature sauvage. Les Thavo'i savent mieux. Dans les temps passés, la Kasike Itaya dirigeait la plus prospère des bandes Thavo'i. Le crédit qu'elle attribuait à leur abondance était que, depuis aussi longtemps qu'ils s'en souviennent, ils avaient cherché à suivre les lois de l'araya'iki et les lois de la nature en égale mesure. D'elle, nous avons appris que nous ne sommes pas de simples animaux, ni ne sommes-nous entièrement au-dessus des forces qui règnent sur les bêtes également. En tant que joyaux dans cette tapisserie, nous avons notre rôle à jouer pour la maintenir. Avec le temps, ces leçons se sont harmonisées.\n\nDans la société Thavo'i, il vient un temps où les jeunes doivent grandir vers les responsabilités qui les attendent en tant qu'adultes. C'est à travers les Chasses Sanglantes que la Déesse Tswohvwoh'ii les façonne en membres de la société capables, stoïques et ingénieux. Chaque génération, les membres potentiels de la tribu, appelés les « non-ensanglantés », ont l'opportunité de prouver leur valeur en ramenant une proie sans égale. Ils sont autorisés à poursuivre ces chasses jusqu'à ce qu'ils réussissent, ou jusqu'à ce qu'ils succombent. Ceux qui ne survivent pas, nous ne les condamnons pas, car c'est l'ordre des choses, et c'est à travers ces épreuves que ceux qui vivent encore peuvent apporter une nouvelle vie à notre peuple."
    effelai_thavoi_diplomacy_through_force_title:0 "La Diplomatie par la Force"
    effelai_thavoi_diplomacy_through_force_desc:0 "Les Thavo'i sont des chasseurs sans égaux, et nous l'avons prouvé maintes et maintes fois à travers ces temps difficiles. Cela ne signifie cependant pas que nous sommes sans cœur. Bien que nous soyons maintenant un peuple uni et fort, les histoires de nos anciens nous humilient avec la connaissance qu'il n'en a pas toujours été ainsi. Pendant des siècles passés, nous étions seuls, isolés, vulnérables. Dans l'obscurité sous la canopée, les lumières de nos feux s'éteignaient les unes après les autres. C'était une époque sombre alors, et l'avenir de notre peuple était en suspens. Notre salut ne vint pas par la lance d'un grand guerrier ou la flèche d'un tireur d'élite renommé, mais par les paroles du Kasike Urayoán. Les Thavo'i, dit-il, doivent être un bouclier pour l'araya'iki ; un rempart contre les ténèbres, une force qui gagne le respect de Tswohvwoh'ii par une unité déterminée. Ainsi en fut-il, et ainsi cela a été. Ceci, bien plus que nos prouesses martiales, est notre vraie force.\n\nEn nous souvenant des leçons d'Urayoán, nous regardons vers les tribus voisines et les trouvons insuffisantes. Elles sont désunies, faibles, incapables de résister à la fois à la volonté de notre Déesse et aux pressions des puissances extérieures. Leur temps de malheurs, s'il n'est pas déjà sur elles, est certain de leur arriver bientôt. Non, nous ne sommes pas sans cœur ; nous ne pouvons permettre que cela arrive. Il est temps que les Thavo'i portent les leçons de nos Anciens au-delà de nos frontières en apportant davantage les leçons que nous avons déjà apprises sur leurs genoux. Montrons-leur le pouvoir de l'unité, et offrons notre gracieuse protection ; qu'ils le veuillent ou non."
    effelai_thavoi_survival_of_the_fittest_title:0 "La Survie du Plus Fort"
    effelai_thavoi_survival_of_the_fittest_desc:0 "La jungle a déployé le pire d'elle-même. Elle a combattu avec dents, griffes et dards pour nous chasser de notre nouveau foyer. Elle a échoué. Lors du festival tenu aujourd'hui dans notre capitale, nos Anciens nous ont rappelé que, comme c'est si souvent le cas, nous avons déjà vécu cela. Dans les âges passés, la Kasike Mayai'i guida son peuple contre une menace existentielle : un grand ver qui menaçait de dévorer son peuple. Il vint pour eux, plus vite qu'ils ne pouvaient fuir. Il ne servait à rien d'évacuer, aucune utilité à se cacher, ce devait être le dernier combat de sa tribu. Sans se laisser décourager, elle parla à son peuple alors que la bataille approchait, leur rappelant que se recroqueviller et craindre, c'est embrasser la défaite, et embrasser la défaite, c'est accepter l'échec. Les Thavo'i ne sont pas de tels lâches. Avec cœur, son peuple accepta la victoire par la défaite du monstre, ou la victoire qui venait en affrontant tout ce que les ombres pouvaient rassembler avec une résolution inébranlable. Les enfants de Tswohvwoh'ii, dit-elle, sont le roc sur lequel la tempête se brisera.\n\nAujourd'hui, nous avons enfin vécu à la hauteur de ces paroles anciennes. Alors qu'autrefois, même les chasses de subsistance nous mettaient à l'épreuve, nos guerriers ensanglantés abattent maintenant les bêtes devant lesquelles nous nous recroquevillions avec une aisance pratiquée. Aussi organisés qu'implacables, nos chasseurs s'élancent d'un cœur de pays sécurisé sous les acclamations d'une population reconnaissante. Maintenant, de nouvelles voix s'élèvent de la foule, et de nouvelles idées sont discutées dans la demeure du Kasike. Ces appels à la réforme parlent de ce qui se trouve au-delà du jour où nos chasseurs rentreront chez eux, car ils pourraient être utilisés à leur tour pour quelque chose de meilleur ; quelque chose de plus grand. Que le monde sache, nous ne nous recroquevillerons jamais, nous ne briserons jamais."

