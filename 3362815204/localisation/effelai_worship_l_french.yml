    effelai_worship.514.b:0 "Échec..."
    effelai_worship.515.t:0 "Ses Dons Sous-Estimés"
    effelai_worship.515.d:0 "Tswohvwoh'ii est bien des choses, et les autres tribus l'adorent de bien des façons. Certaines l'adorent simplement comme une déesse et partent abattre des ennemis à son ordre. D'autres la voient comme une créatrice d'épreuves contre lesquelles ils se forgent. D'autres encore la voient comme une force dangereuse qui doit être apaisée de peur de perdre sa conscience.\n\nNous nous concentrons sur autre chose, cependant. Bien que ce soient certainement tous des aspects de la déesse, les autres tribus négligent que Tswohvwoh'ii n'est pas un simple être abstrait ; elle est ici tout autour de nous. Nous cultivons la terre parce que la terre est la déesse, et donc si la terre est blessée, elle l'est aussi. Cela n'est pas sans retour, bien sûr. Tswohvwoh'ii nous permet d'utiliser sa propre forme pour survivre, car elle est charitable, et mieux nous prenons soin d'elle, plus elle peut donner. Elle est les arbres et les lianes, les racines et les fruits. Les autres tribus comprennent cela dans une certaine mesure mais dans leur concentration sur ses autres aspects, ils peuvent oublier que son pouvoir englobe encore plus, elle fait fleurir les rochers de cristaux et fait pousser du sel pour nous le long du bord de l'eau. Tout ce que nous avons vient d'elle : nous cultivons ses jardins, cultivons la déesse elle-même, et tandis que nous la cultivons, elle nous cultive afin que nous puissions devenir plus forts également."
    effelai_worship.515.a:0 "Notre déesse n'est rien sinon généreuse"
    effelai_worship.515.tt:0 "Les biens de commerce inorganiques peuvent également être cultivés par notre Déesse, mais seulement si la terre a déjà accès à cette ressource"
    effelai_worship.521.t:0 "§YAmbitions Festives§!"
    effelai_worship.521.d:0 "Longtemps nous avons célébré les accomplissements de nos ancêtres. Nous devons perpétuer cette tradition en visitant les sites de leurs grands exploits, et créer nos propres nouvelles légendes dans le processus."
    effelai_worship.521.a:0 "Il est temps de festoyer !"
    effelai_worship.522.t:0 "§YSite de Festival§!"
    effelai_worship.522.d:0 "Il y a longtemps, nos ancêtres accomplirent de grands exploits de prouesse, ou de grandes innovations dans les divers arts. Aujourd'hui nous honorons leur mémoire, et reviendrons ici un jour après l'achèvement de notre grand voyage."
    effelai_worship.522.a:0 "Une fois de plus nous avançons pour notre quête"
    effelai_worship.523.t:0 "§YSite de Festival§!"
    effelai_worship.523.d:0 ""
    effelai_worship.523.a:0 "Nous avons créé de grandes œuvres d'art ici"
    effelai_worship.523.b:0 "Nos duels ici furent légendaires..."
    effelai_worship.531.t:0 "Chasses aux Bêtes : Effelai Méridional"
    effelai_worship.531.d:0 "Nous faisons face au plus grand défi jamais présenté devant nous depuis l'aube de notre peuple. Nous partons maintenant défier les différentes bêtes légendaires de Tswohvwoh'ii ; nous les appelons bêtes-dieux faute d'un meilleur nom, bien que nous sachions qu'elles ne sont pas des dieux. Créatures intelligentes, ces formes de vie sont massives comparées à toute autre forme de vie dans la jungle. Elles sont également bien plus dangereuses.\n\nDans le sud de Tswohvwoh'ii, la Bête-Dieu locale a l'apparence d'une panthère colossale à moitié asservie-graine. Elle est couverte de plantes carnivores, avec une apparence de pièges à mouches ou de piranhas verts, qui dévorent tout ce qui passe à côté même si l'hôte n'a pas faim lui-même. Si nous pouvons réclamer les os de cette créature, nous pouvons apporter grande gloire à nous-mêmes et à notre peuple."
    effelai_worship.531.a:0 "Alors qu'attendez-vous ?"
    effelai_worship.532.t:0 "Chasses aux Bêtes : Effelai Occidental"
    effelai_worship.532.d:0 "Nous faisons face au plus grand défi jamais présenté devant nous depuis l'aube de notre peuple. Nous partons maintenant défier les différentes bêtes légendaires de Tswohvwoh'ii ; nous les appelons bêtes-dieux faute d'un meilleur nom, bien que nous sachions qu'elles ne sont pas des dieux. Créatures intelligentes, ces formes de vie sont massives comparées à toute autre forme de vie dans la jungle. Elles sont également bien plus dangereuses.\n\nLa bête-dieu locale ici dans l'ouest des terres de Tswohvwoh'ii est un boa constricteur féroce capable de briser les arbres massifs de cette terre, eux-mêmes plus durs que le métal, avec seulement un effort modéré. Il se nourrit de suffisamment de toxine de fleur-de-mort pour qu'un repas d'une demi-journée pour lui empoisonnerait tout notre peuple. Parce qu'il se frotte également sur cette plante nocive, tant sa morsure que sa peau sont mortellement toxiques au moindre contact. Si nous pouvons d'une façon ou d'une autre le tuer, cela signifiera une gloire incommensurable pour nous-mêmes et notre peuple."
    effelai_worship.532.a:0 "Alors qu'attendez-vous ?"
    effelai_worship.533.t:0 "Chasses aux Bêtes : Marais-aux-Sangsues"
    effelai_worship.533.d:0 "Nous faisons face au plus grand défi jamais présenté devant nous depuis l'aube de notre peuple. Nous partons maintenant défier les différentes bêtes légendaires de Tswohvwoh'ii ; nous les appelons bêtes-dieux faute d'un meilleur nom, bien que nous sachions qu'elles ne sont pas des dieux. Créatures intelligentes, ces formes de vie sont massives comparées à toute autre forme de vie dans la jungle. Elles sont également bien plus dangereuses.\n\nLes Parura, quand nous leur avons prouvé notre valeur, nous ont parlé de la Bête-Dieu que nous devons affronter. Une araignée si grande qu'elle s'étend des sillons dans le sol jusqu'à la cime même de la canopée. Son antre est une toile s'étendant sur des centaines d'arbres, possédant apparemment des milliers de cocons. L'affronter est compliqué par la présence de sangsues apparemment intelligentes, sa suite, qui utilisent des tactiques d'embuscade pour rapidement tirer des chasseurs imprudents dans les profondeurs inextricables du marécage. Si nous pouvons surmonter cet ennemi apparemment implacable, notre peuple aura une légende transmise pour l'éternité."
    effelai_worship.533.a:0 "Guettez tout mouvement dans la canopée..."
    effelai_worship.534.t:0 "Chasses aux Bêtes : Effelai Oriental"
    effelai_worship.534.d:0 "Nous faisons face au plus grand défi jamais présenté devant nous depuis l'aube de notre peuple. Nous partons maintenant défier les différentes bêtes légendaires de Tswohvwoh'ii ; nous les appelons bêtes-dieux faute d'un meilleur nom, bien que nous sachions qu'elles ne sont pas des dieux. Créatures intelligentes, ces formes de vie sont massives même comparées aux autres formes de vie gargantuesques de la jungle. Elles sont également bien plus dangereuses.\n\nLa Bête-Dieu qui règne sur les terres orientales de Tswohvwoh'ii est une plante carnivore à des milliers de têtes qui s'étend de racines profondes sous la surface qu'elle peut mouvoir et déraciner à volonté jusqu'à juste sous le sommet de la canopée. Bien qu'elle semble être entièrement faite de matière végétale, elle déchire et lacère ses proies avec l'impitoyabilité et l'habileté d'un animal carnivore.\n\nPire encore, contrairement à pratiquement toutes les autres créatures dans Tswohvwoh'ii, elle est apparemment indépendante du contrôle de la Déesse. L'a-t-Elle relâchée comme épreuve pour nous ou pour elle-même, ou s'est-elle libérée par sa propre force de volonté ? Nous ne le savons pas. Mais nous soupçonnons que vaincre cette créature nous apportera non seulement gloire et mémoire éternelles, mais aussi la faveur de la Déesse."
    effelai_worship.534.a:0 "Des plantes carnivores... typique"
    effelai_worship.535.t:0 "Humiliation de Kalavend"
    effelai_worship.535.d.1:0 "Victoire ! Nous avons montré aux faibles du Taychend et de Kalavend leur place, sous nous, et quel sentiment exaltant ! Nous avons décimé leurs armées avec notre force d'armes supérieure. Notre équipement Lié par l'Os fut plus que suffisant pour briser leurs pathétiques soi-disant « armes », une qualité qui devint plus claire à mesure que nous l'utilisions.\n\nAyant liquidé leurs soldats, nous avons pillé leurs terres. Nous avons pris le meilleur pour notre usage et laissé le reste pourrir. De cette manière nous avons prouvé notre supériorité, et la réalité que nos ennemis vaincus refusaient d'accepter : que la force fait le droit, et que la puissance est la loi du monde."
    effelai_worship.535.d.2:0 "Défaite ! Humiliation d'une ampleur inouïe depuis l'aube de notre peuple ! Nos guerriers se sont avérés complètement inégaux face à l'épreuve devant eux. Ils n'étaient pas suffisamment accoutumés à leur équipement Lié par l'Os, et cela s'est vu dans l'incompétence de leurs offensives et l'inexistence de leur endurance face aux faibles de Kalavend et du Taychend.\n\nCela ne change rien. Les imbéciles qui nous ont mis en déroute pour l'instant restent inférieurs et faibles, et quelques petites victoires ne changent pas cela. Mais la honte, oh, la honte de la défaite, elle exige vengeance. Nous les leur rendrons au centuple."
    effelai_worship.535.a:0 "Gloire ! Nous sommes victorieux !"
    effelai_worship.535.b:0 "La honte..."
    effelai_worship.601.t:0 "Chasses Sanglantes : Initiation"
    effelai_worship.601.d:0 ""
    effelai_worship.601.a:0 "Prouvons notre valeur"
    effelai_worship.602.t:0 "La Diplomatie par la Force"
    effelai_worship.602.d:0 "Tandis que d'autres tribus peuvent essayer de négocier par des moyens « pacifiques » ; c'est un signe de leur faiblesse rampante. Nous ne tolérerons pas une telle pitoyabilité parmi nous. Montrons-leur notre force, car ceux qui ne peuvent survivre par leur propre volonté devraient s'agenouiller."
    effelai_worship.602.a:0 "Les armes parlent plus fort que les mots"
    effelai_worship.603.t:0 "L'Assaut Commence"
    effelai_worship.603.d:0 "Tenez ferme, car l'assaut de notre Déesse est sur nous. Tous nos efforts nous ont menés à ce moment de sacrifice."
    effelai_worship.603.a:0 "Préparez-vous pour la tempête qui vient"
    effelai_worship.604.t:0 "§RAssaut :§! Deuxième Phase"
    effelai_worship.604.d:0 ""
    effelai_worship.604.a:0 "La tempête se prépare"
    effelai_worship.605.t:0 "§RAssaut :§! Phase Finale"
    effelai_worship.605.d:0 ""
    effelai_worship.605.a:0 "Tenez bon !"
    effelai_worship.607.t:0 "§RAssaut :§! Victoire !"
    effelai_worship.607.d:0 ""
    effelai_worship.607.a:0 "Gloire en abondance"
    effelai_worship.608.t:0 "§RAssaut :§! Échec"
    effelai_worship.608.d:0 ""
    effelai_worship.608.a:0 "Malédiction..."
    effelai_worship.611.t:0 "Incursion des Hommes-Sangsues : Le Chaos Éclate"
    effelai_worship.611.d:0 "Désastre ! Une horde massive d'Hommes-Sangsues a commencé à déferler sur nos territoires dans les Marais-aux-Sangsues, surgissant par milliers du marécage même où nous les avons massacrés autrefois. Une action décisive doit être prise de peur que notre travail pour assumer la responsabilité des Marais-aux-Sangsues au service de la Déesse ne soit entièrement défait."
    effelai_worship.611.a:0 "Aux armes, pour la justice !"
    effelai_worship.613.t:0 "Incursion des Hommes-Sangsues : Victoire"
    effelai_worship.613.d:0 "Victoire ! Nous avons, après une dépense significative d'efforts et de ressources, réussi à chasser les Hommes-Sangsues des territoires des Marais-aux-Sangsues que nous contrôlons. La plupart des créatures viles qui habitent ces terres fétides se sont maintenant retirées loin sous le marécage, bien au-delà de la portée de nos lances. Nous devrons nous assurer que nos défenses persistent, mais en attendant, le règne de notre peuple et de sa Déesse sur ces territoires a été assuré."
    effelai_worship.613.a:0 "Et restez dehors !"
    effelai_worship.614.t:0 "Incursion des Hommes-Sangsues : Défaite"
    effelai_worship.614.d:0 "Échec ! Par quelque convergence maligne d'incompétence, nous avons été vaincus par les forces du mal dans les Marais-aux-Sangsues. Ceux de notre peuple qui n'ont pas pu s'échapper de ce trou pestilentiel à temps ont été exterminés jusqu'au dernier. Les Marais-aux-Sangsues ont, en raison de notre échec et des pouvoirs maléfiques des Hommes-Sangsues, été réduits à un marécage sans valeur dépourvu de toute vie alignée avec l'Effelai et sa Déesse."
    effelai_worship.614.a:0 "Et comment allons-nous nous expliquer à Elle ?"
    effelai_worship.621.t:0 "Tous les Regards sur Nous"
    effelai_worship.621.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] et le reste de la foule regardaient la scène avec attention. Au rythme des tambours, les acteurs exécutent leur danse : huit hommes en fourrures et masques monstrueux et une seule femme avec une courte lance tournoyaient les uns autour des autres, simulant artistement une bataille qui avait eu lieu il y a des siècles. Un par un, les monstres tombèrent, jusqu'à ce que seule la femme reste debout. Elle tomba à genoux, ses mains serrant son ventre, mouillé de vin comme s'il était taché de sang. Alors qu'elle commençait sa lamentation, aucun autre son ne se fit entendre dans le bosquet, comme si non seulement la foule mais même la jungle était enchantée par les paroles que tous avaient entendues maintes fois. « Cosaínti » avait toujours été l'une des pièces les plus populaires de tout Soruin, depuis sa première représentation il y a tant de générations.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] ferma les yeux, murmurant les paroles. Les défis que Cosaínti avait affrontés il y a si longtemps ne seraient pas sans rappeler ce que la tribu affronterait bientôt à nouveau. C'est une chose de déclarer le début d'un nouvel âge de héros, mais ce serait tout autre chose de le vivre. La jungle, les autres tribus, et le poids de leurs attentes feraient des ravages sur l'optimisme et la détermination de ces gens. Il incomberait à leur [Root.Monarch.GetTitle] de s'assurer qu'ils iraient jusqu'au bout. De créer une nouvelle légende. Les derniers vers de la lamentation résonneraient dans son esprit pendant de nombreux jours à venir.\n\n« Et à travers les ténèbres maintenant je vais, et bien que je meure seule... »"
    effelai_worship.621.a:0 "...la musique dans mon cœur me dit ; mon histoire sera connue."
    effelai_worship.622.t:0 "Parmi les Festivités"
    effelai_worship.622.d:0 "Avec les sons des festivités tout autour, l'atmosphère plus solennelle dans la tente du [Root.Monarch.GetTitle] semble quelque peu surréaliste. Les représentants de [Root.GetName] savent pourquoi ils sont ici. Tout au long de la journée, ils ont assisté au festival. Ils ont regardé le théâtre, participé aux concours, et se sont joints aux festins. Maintenant, légèrement plus déterminés qu'ils ne l'étaient ce matin, ils scellent l'union de nos tribus, nous rapprochant d'un pas de plus vers un Effelai unifié."
    effelai_worship.622.a:0 "« À nos nouveaux frères et sœurs ! »"
    effelai_worship.623.t:0 "Ébranler le Monde"
    effelai_worship.623.d:0 "Aucun de nos festivals n'avait jamais été aussi bondé. Les terrains étaient cinq fois plus grands que ceux de tous les festivals précédents, mais c'était comme si chaque âme vivante de la jungle s'était rassemblée pour assister à l'événement. Il était facile d'identifier l'origine tribale de tous les visiteurs : les Effe'i par leur peau sombre, presque végétale, les Lai'i par leurs silhouettes grandes et imposantes, et les Parura et les nombreux Thavo'i par leurs couleurs de cheveux vives de bleu et de vert. Malgré tout, ils avaient bien plus en commun que de différent ; ils riaient ensemble, chantaient ensemble, buvaient ensemble. Lentement mais sûrement, les barrières entre eux s'effaçaient."
    effelai_worship.623.a:0 "Un peuple uni sous la canopée."
    effelai_worship.641.t:0 "Un Échange Agréable"
    effelai_worship.641.d:0 "Sirotant dans des tasses faites des arbres cultivés en harmonie, [Root.Monarch.GetName] et [effei_pleasant_exchange.Monarch.GetName] boivent le breuvage revigorant et contemplent les jardins qu'ils ont cultivés ensemble. « Vous avez beaucoup aidé notre tribu, nos jeunes mangent et jouent librement, et la prise de nos chasseurs est abondante. Notre peuple a décidé, une union est dans le meilleur intérêt de tous nos peuples. »"
    effelai_worship.641.a:0 "Pourquoi se battre quand on peut boire du thé !"
    effelai_worship.701.t:0 "Ami ou Ennemi ?"
    effelai_worship.701.d:0 "Les rapports de nos éclaireurs sont clairs : des gens au-delà de nous vivent dans Son grand royaume. Bien que leur culture ressemble quelque peu à la nôtre, leurs corps sont très différents, peut-être mieux adaptés à d'autres parties de la jungle que les nôtres. Lors du premier contact, ils furent accueillis avec une salutation prudente ; maintenant nous devons envoyer un émissaire portant des cadeaux finement ouvragés, ainsi que des paroles éloquentes mais fermes. D'une manière ou d'une autre, nos nouveaux voisins coopéreront ou se soumettront à nous."
    effelai_worship.701.a:0 "Maintenant... la diplomatie prévaudra-t-elle ?"
    effelai_worship.701.b:0 "Unité inébranlable"
    effelai_worship.702.t:0 "La Survie par l'Unité"
    effelai_worship.702.d:0 "Nos présentations conclues, il était temps pour notre chef de négocier en notre nom. À huis clos, de nombreuses paroles dures restèrent non dites, dans la compréhension que les deux tribus doivent mettre de côté certaines différences si nous devons avancer comme un seul. La vie sous Sa canopée est une lutte constante pour la survie ; en tant que tel, le don le plus précieux est celui du savoir. Chaque membre de la tribu présent témoigne du scellement du pacte, des siècles de savoir partagés entre les tribus, nos cultures embrassant un nouvel avenir. Un avenir dans lequel tous œuvrent à surmonter tous les périls qui existent dans Son domaine ou au-delà."
    effelai_worship.702.a:0 "S'unifier avec notre proche allié"
    effelai_worship.702.b:0 "Remplacer la haine par l'amitié"
    effelai_worship.703.t:0 "Loin du Foyer : Lai'i"
    effelai_worship.703.d:0 "Nous avons voyagé loin et vu de nombreux combattants dignes ; mais une seule tribu tient ses duels en aussi haute estime que nous : les Soruiniques. Ils se vantent de festins abondants, de statues massives dédiées aux vainqueurs passés, et de foules composées de leur tribu entière. Nous sommes impressionnés. Cependant, ces duels ne semblent être ni pour éliminer les faibles, ni un simple match d'entraînement. Après enquête, nous avons découvert que ces duels s'appellent des tournois, et sont organisés pour trouver le meilleur combattant de leur tribu, oui, mais aussi simplement pour célébrer.\n\nLes Soruiniques vivent pour être remémorés, afin que quand Elle finira par nous engloutir et nous consumer tous, ils vivront encore dans la mémoire. Nous ne voyons pas la nécessité de cela, car avoir vécu aussi longtemps qu'on le fait est mémoire suffisante ; mais il y a quelque chose de vraiment impressionnant dans ce spectacle extravagant... car cette grande organisation de duels, et ces festins maintiennent l'esprit d'un guerrier prêt à combattre."
    effelai_worship.703.a:0 "Nous tiendrons un grand festin !"
    effelai_worship.704.t:0 "Loin du Foyer : Thavo'i"
    effelai_worship.704.d:0 "Nous avons voyagé loin et vu de nombreux bosquets florissants, mais aucun ne semble aussi luxuriant ou abondant que ceux de la tribu Effe'i. Même les plus jeunes de leur tribu apprennent le chant de la vie, et comment chaque plante a un bourdonnement unique dans son esprit. Encore plus impressionnante que leurs jardins abondants est leur architecture stupéfiante. Des sculptures florales exquises ornent les façades en bois de leurs bâtiments, presque comme si les structures elles-mêmes étaient vivantes. Ils sont capables de préparer apparemment sans effort des bûches anciennes massives pour être utilisées dans la construction, un matériau qui reste solide et sec même à travers les tempêtes les plus rudes qu'Elle peut nous envoyer. Les Effe'i sont un peuple généreux ; peut-être partageraient-ils ces compétences avec nous contre notre propre savoir ?"
    effelai_worship.704.a:0 "Un échange de mémoires"
    effelai_worship.705.t:0 "Loin du Foyer : Parura"
    effelai_worship.705.d:0 "Nous avons voyagé loin et vu de nombreux dangers lors de notre pèlerinage ; l'un de ces maux se trouve juste sous Sa canopée. Une vaste étendue de terre dense, humide et traître nichée entre deux chaînes de montagnes non loin de Son cœur. Ici festoie un amas massif de champignons pourrissants, comme une plaie purulente dans Son flanc. Son chant n'atteint pas ici ; tordu et assourdi par les tiges massives, il rejette Sa beauté. On ne l'a pas vu s'étendre à notre connaissance, mais s'il devait jamais montrer des signes de le faire, nous devons le raser. Un autre mal se trouve bien plus près de chez nous, les ignobles Hommes-Sangsues du marécage. Longtemps nous avons guerroyé contre eux et leur faux dieu vorace, celui qui cherche à consumer Ses dons. Récemment, cependant, nous avons rencontré un groupe différent de nous-mêmes seulement par l'apparence. Ils s'appellent les Lai'i, et similairement à nous, ils luttent pour survivre sous Ses branches, bien qu'il semble que nous avons plus à apprendre que prévu. Ce sont des guerriers féroces avec une armure plus forte que tout ce que nous avons vu, et bien que leurs vues sur Sa beauté diffèrent des nôtres, peut-être peuvent-ils être convaincus de combattre contre un ennemi commun."
    effelai_worship.705.a:0 "Nous leur enverrons une invitation sanglante"
    effelai_worship.706.t:0 "Loin du Foyer : Effe'i"
    effelai_worship.706.d:0 "Nous avons voyagé loin et vu de nombreuses luttes pour la survie ; cependant un peuple connu sous le nom de Lai'i s'est montré être de grands guerriers et ne semble pas lutter, mais prospérer.\n\nDes matchs d'entraînement quotidiens ont lieu dès le plus jeune âge, et les disputes entre membres de la tribu ne sont pas rarement réglées par un combat en duel, généralement à mort. Leur armure surpasse de loin la nôtre, semblant fournir une protection bien au-delà de sa construction matérielle. Ils sont extrêmement réticents à partager leurs secrets, mais d'après ce que nous avons compris, une propriété mystique est insufflée dans les étapes finales de sa fabrication. Ils sont sans peur face au danger, chargeant souvent témérairement dans le péril sans préparation visible. Il semble dommage de perdre de si vaillants guerriers dans des querelles mesquines ; peut-être trouveraient-ils utilité à certains de nos remèdes, et en retour nous offrir un minimum de protection contre Ses bêtes."
    effelai_worship.706.a:0 "S'il vous plaît, laissez notre herboriste soigner leurs blessures"
    effelai_worship.707.t:0 "Loin du Foyer : Soruinique"
    effelai_worship.707.d:0 "Nous avons voyagé loin et vu de nombreuses causes de célébration ; mais une seule tribu semble rivaliser avec notre propre désir de festivités. Les Thavo'i sont très fiers de leurs traditions et de leur dévouement à leur tribu. Chaque membre de leur tribu, du plus jeune à peine capable de se tenir seul aux plus âgés au-delà de leurs jours de chasse, participe à ces rituels. Lors de ces spectacles massifs mais solennels, les Thavo'i rendent grâce à leurs ancêtres pour les avoir guidés jusqu'ici, et à Elle ils envoient des cadeaux pour leur avoir fourni les moyens de vivre. Ces festivals ont lieu comme une sorte de célébration de passage à l'âge adulte après que les membres ont réussi une chasse sanglante. Leur population est la plus importante de toutes celles que nous avons vues sous Sa canopée ; y a-t-il quelque bienfait qui leur est accordé par ces célébrations plutôt modestes que nous n'avons pas encore découvert ?"
    effelai_worship.707.a:0 "Tenons un grand festin !"
    effelai_worship.708.t:0 "Savoir Ancestral : L'Expédition Commence"
    effelai_worship.708.d:0 "Notre quête onirique fut un succès. Notre chef a reçu la vision d'un chemin traître à travers des fourrés de lianes étrangleuses, le long de centaines de pieds de fleurs au poison assez puissant pour terrasser même une grande bête avec un seul pétale, et passé des marécages bouillonnant de vapeurs nocives, le tout nous guidant vers une clairière. Non. Une étendue. Un espace anormalement grand et vide s'ouvre devant nous, mais on pourrait être pardonné de manquer son énormité car le regard est naturellement et entièrement attiré par une seule tour massive au centre. C'est probablement la structure la plus impressionnante jamais rencontrée dans l'histoire de notre tribu, même dans son état actuel désolé et envahi par la végétation. On ne peut que se demander quels trésors peuvent se trouver à l'intérieur."
    effelai_worship.708.a:0 "Une belle opportunité d'étude"
    effelai_worship.708.b:0 "Forcer notre chemin jusqu'au sommet"
    effelai_worship.709.t:0 "Savoir Ancestral : Reliques"
    effelai_worship.709.d:0 "Nos éclaireurs les plus intelligents désarment soigneusement chaque piège tandis que nous avançons, atteignant finalement le laboratoire au sommet et découvrant de nombreuses reliques endommagées et des tablettes de pierre gravées de symboles étranges, mais parmi elles nous trouvons une petite tablette de métal réfléchissant, qui affiche des informations variables lorsqu'elle est observée à différents niveaux de lumière, dans une écriture qui est étrangement lisible malgré son caractère étranger. Cela va des améliorations agricoles aux usages médicinaux de plusieurs plantes et champignons rares que nous pensions auparavant inutiles, jusqu'aux techniques d'assemblage du bois par la magie. Tout cela est un savoir inconnu de nos sages et n'a jamais été trouvé documenté nulle part ailleurs !"
    effelai_worship.709.a:0 "Ces reliques nous serviront bien"
    effelai_worship.710.t:0 "Savoir Ancestral : Reliques"
    effelai_worship.710.d:0 "Tandis que nos guerriers dégagent un chemin vers la tour, de nombreux pièges anciens et défaillants sont rencontrés, mais certains pièges encore fonctionnels sont déclenchés par quelques-uns de nos guerriers moins chanceux, avec des conséquences plutôt permanentes. Cependant, pour chaque piège déclenché, nous sommes récompensés par de nouvelles connaissances sur leur création et composition matérielle, glanées en disséquant leurs restes. Nos plus fins forgerons ont pris certains de ces débris et les façonnent en armes plus tranchantes et plus fortes que nous n'aurions jamais osé en rêver !"
    effelai_worship.710.a:0 "Des armes de guerre anciennes !?"
