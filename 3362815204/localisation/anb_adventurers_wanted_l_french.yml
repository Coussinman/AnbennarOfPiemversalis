l_french:
  aw_has_adventurer_generous_rewards:0 "Vous avez le privilège d'état §YRécompenses de quête généreuses§! actif, ce qui augmentera les chances de succès des aventuriers.\nL'influence £estate_influence£ et la loyauté £estate_loyalty£ de l'état des $ESTATE_ADVENTURERS$ affecteront également ce résultat."


  aw_basic.0.a:0 "Aventuriers recherchés !"
  aw_basic.0.b:0 "Accorder des récompenses généreuses aux aventuriers devrait aider."
  aw_basic.0.c:0 "Fort heureusement, nous traitons déjà bien nos aventuriers."
  aw_basic.0.dd:0 "Ils ne feront pas le poids face à des aventuriers comme nous !"
  aw_basic.13.b:0 "Bon vent et bon débarras !"
  aw_how_to_get_more_adventurer_removal_chance_tooltip:0 "§TDisposer du privilège §YRécompenses de quête généreuses§!, d'une §Yinfluence élevée§! §R(30+ et 60+ £estate_influence£)§!, et d'une §Yloyauté élevée§! §R(60+ £estate_loyalty£)§! augmentera les chances de résoudre les rencontres Aventuriers recherchés !§!"

  aw_crossed_border:0 "La rencontre Aventuriers recherchés ! a franchi la frontière"
  increasing_tolerance_will_convert_aw_to_pop_tooltip:0 "§TAugmenter la tolérance à §YCoexistence§! ou plus activera des événements convertissant cette rencontre Aventuriers recherchés en population raciale.§!"
  EST_VAL_AW_FAILED_ADVENTURERS_WANTED_ENCOUNTER:0 "Rencontre Aventuriers recherchés échouée : §Y$VAL$%§!"
  EST_VAL_AW_RESOLVED_ADVENTURERS_WANTED_ENCOUNTER:0 "Rencontre Aventuriers recherchés résolue : §Y$VAL$%§!"
  EST_VAL_FORCED_TO_SHARE_SPOILS:0 "Contraint de partager le butin : §Y$VAL$%§!"

  aw_monster_attack_reparations_start_tooltip:0 "La guerre a été déclarée pour obtenir des réparations contre notre nation en raison d'un monstre §OAventuriers recherchés§! ayant attaqué au-delà de ses frontières."
  aw_monster_attack_reparations:0 "Réparations pour monstre §OAventuriers recherchés§!"
  aw_monster_attack_reparations_desc:0 "Guerre pour obtenir des réparations contre une nation dont un monstre §OAventuriers recherchés§! a attaqué au-delà des frontières."
  cb_aw_monster_attack:0 "Réparations pour attaque de monstre"
  cb_aw_monster_attack_desc:0 "Guerre pour obtenir des réparations contre une nation dont un monstre §OAventuriers recherchés§! a attaqué au-delà des frontières."
  AW_MONSTER_ATTACK_REPARATIONS_NAME:0 "Réparations pour monstre §OAventuriers recherchés§!"

  aw_thieves_guild_1:0 "§Y(Aventuriers recherchés !)§! §gGuilde des voleurs :§! §OTruands locaux§!"
  desc_aw_thieves_guild_1:0 "Une série de cambriolages retentissants perpétrés par un groupe de criminels audacieux mais encore maladroits a frappé cette province. Il ne fait aucun doute que si on les laisse proliférer, ils continueront à piller la province et à s'enrichir de leurs gains mal acquis."
  aw_thieves_guild_2:0 "§Y(Aventuriers recherchés !)§! §gGuilde des voleurs :§! §OCriminels établis§!"
  desc_aw_thieves_guild_2:0 "Une guilde des voleurs s'est solidement implantée dans cette province : un groupe de voleurs professionnels et talentueux œuvrant de concert pour s'enrichir aux dépens des braves gens du pays. Nul doute que leurs méfaits deviendront de plus en plus audacieux si on les laisse prospérer."
  aw_thieves_guild_3:0 "§Y(Aventuriers recherchés !)§! §gGuilde des voleurs :§! §OMaîtres de l'Art§!"
  desc_aw_thieves_guild_3:0 "Des maîtres voleurs dirigent la guilde des voleurs de cette province. Inégalés dans leur art, ils utilisent désormais la province comme base d'opérations non seulement pour former des dizaines de jeunes criminels, mais aussi pour frapper à travers tout le royaume, remplissant leurs coffres des dernières pièces d'or et colifichets en date."

  aw_thieves_guild_migrate_to_other_country_tt:0 "La guilde des voleurs migre vers un pays voisin."

  aw_thieves_guild.0.t:0 "La guilde des voleurs [Root.GetAdjective]"
  aw_thieves_guild.0.d:0 "£icon_adventurers_wanted_banner£\nCela a commencé par quelques bourses volées ici et là, mais désormais il semble que tout le monde connaisse un malheureux dépouillé jusqu'au dernier sou par ces voleurs !\n\nUne soi-disant guilde des voleurs s'est abattue sur [This.GetName], et le capitaine de la garde locale a lancé un appel à tout aventurier capable de traduire ces criminels en justice."
  aw_thieves_guild.11.t:0 "La guilde des voleurs arrive de [From.GetName]"
  aw_thieves_guild.11.d:0 "£icon_adventurers_wanted_banner£\nFuyant le règne monstrueux de [From.GetName], la guilde des voleurs locale a rapidement plié bagage et repris ses opérations ténébreuses dans notre royaume."
  aw_thieves_guild.11.a:0 "Où est ma bourse ?"
  aw_thieves_guild.13.t:0 "La guilde des voleurs étend ses racines !"
  aw_thieves_guild.13.d:0 "£icon_adventurers_wanted_banner£\nUne boutique réputée de [aw_thieves_guild_migration_target.GetName] a vu tout son inventaire dérobé en pleine nuit. Pire encore, ces effrontés ont laissé une carte de visite portant l'emblème de la guilde des voleurs de [Root.GetName], signifiant sans doute aux autorités qu'ils se sont désormais étendus à [aw_thieves_guild_migration_target.GetName]."
  aw_thieves_guild.13.a:0 "Maudits soient-ils !"
  aw_thieves_guild.15.t:0 "La guilde des voleurs fuit les monstres !"
  aw_thieves_guild.15.d:0 "£icon_adventurers_wanted_banner£\nLa guilde des voleurs commerce dans l'ombre et les contrats, et il ne saurait guère y avoir de commerce avec ceux qu'ils considèrent comme des monstres ! Échapper à la garde municipale et vivre sous leur nez est une chose, mais vivre parmi des monstres qui ne partagent pas forcément un code de justice dont un voleur pourrait tirer parti est mauvais pour les affaires."
  aw_thieves_guild.15.a:0 "Cours, petit voleur !"
  aw_thieves_guild.20.t:0 "La guilde des voleurs se dissipe"
  aw_thieves_guild.20.d:0 "£icon_adventurers_wanted_banner£\nLorsque nos agents ont retrouvé le repaire de la guilde des voleurs [Root.GetAdjective], il n'y avait plus âme qui vive. Qui sait par quelle circonstance ils ont disparu ? Plus assez de cibles lucratives ? Une querelle autour de joyaux volés ? Ou bien avaient-ils enfin rempli leurs coffres de suffisamment de couronnes ? Comme il sied à leur engeance : un jour ils étaient là, le lendemain, envolés."
  aw_thieves_guild.20.a:0 "Bon débarras !"
  aw_thieves_guild.21.t:0 "Les aventuriers défont la guilde des voleurs !"
  aw_thieves_guild.21.d:0 "£icon_adventurers_wanted_banner£\n« On a d'abord cru que les voleurs venaient se rendre, mais que nenni, c'étaient nos braves aventuriers assermentés, avec les vrais voleurs enchaînés derrière eux, bien entendu ! »\n\nLes aventuriers du royaume ont enfin appréhendé l'infâme guilde des voleurs de [Root.GetName], tout en récupérant le butin de leur dernière série de vols. Vos gardes n'ont pas demandé comment ils s'y sont pris ni comment ils ont trouvé leur repaire, mais une chose était certaine : ils avaient désormais à gérer une bande de criminels à emprisonner ou à pendre, avec un peu de chance."
  aw_thieves_guild.21.a:0 "Beau travail !"
  aw_thieves_guild.22.t:0 "Le guet appréhende la guilde des voleurs !"
  aw_thieves_guild.22.d:0 "£icon_adventurers_wanted_banner£\n« À quoi servent ces aventuriers, hein ? On les a pris la main dans le sac nous-mêmes ! »\n\nDes membres de la garde ont capturé des membres clés de la guilde des voleurs, affaiblissant assurément leur présence en [Root.GetName]."
  aw_thieves_guild.22.a:0 "Bien !"
  aw_thieves_guild.23.t:0 "Les aventuriers entravent la guilde des voleurs"
  aw_thieves_guild.23.d:0 "£icon_adventurers_wanted_banner£\nNous avons appris que les aventuriers ont porté un coup sévère à la guilde des voleurs opérant en [Root.GetName]."
  aw_thieves_guild.23.a:0 "Bien !"
  aw_thieves_guild.24.t:0 "Les monstres détruisent la guilde des voleurs"
  aw_thieves_guild.24.d:0 "£icon_adventurers_wanted_banner£\nLes ombres et les promesses de fausses richesses ne signifient rien pour nous. La première occasion que nos guerriers ont eue était la seule dont ils avaient besoin, et nous avons réussi à incendier le repaire de la guilde des voleurs prise à rôder sur nos terres."
  aw_thieves_guild.24.a:0 "Meurs, petit voleur !"
  aw_thieves_guild.30.t:0 "La guilde des voleurs gagne en puissance"
  aw_thieves_guild.30.d:0 "£icon_adventurers_wanted_banner£\nDans une série incessante de larcins à travers tout [Root.GetName], la guilde des voleurs locale est devenue bien plus audacieuse dans le choix de ses cibles, utilisant sans nul doute ses gains mal acquis pour améliorer ses outils, contacts et tactiques contre les braves gens de la province."
  aw_thieves_guild.30.a:0 "Malédiction !"
  aw_thieves_guild.120.t:0 "La guilde des voleurs éliminée, leur argent aussi !"
  aw_thieves_guild.120.d:0 "£icon_adventurers_wanted_banner£\nNous avons appris que les aventuriers engagés par notre guet local pour éliminer la guilde des voleurs ont accompli leur mission, mais se sont aussi enfuis avec les biens volés !"
  aw_thieves_guild.120.a:0 "Au moins la guilde n'est plus."
  aw_thieves_guild.121.t:0 "Pas d'honneur entre voleurs"
  aw_thieves_guild.121.d:0 "£icon_adventurers_wanted_banner£\nLes vols ont considérablement augmenté en [Root.GetName] dans ce que le guet municipal a décrit comme une « guerre entre voleurs ». Il semble que la guilde des voleurs de la cité ait perdu le contrôle de son emprise sur ses membres, qui se volent désormais entre eux et rivalisent pour savoir qui peut dérober le plus !"
  aw_thieves_guild.121.a:0 "[Root.GetName] ne peut qu'en pâtir."
  aw_thieves_guild.123.t:0 "Les bons temps font les mauvais voleurs"
  aw_thieves_guild.123.d:0 "£icon_adventurers_wanted_banner£\nIl semble que la stabilité et la bonne fortune de [Root.Country.GetName] aient fait du vol un métier peu populaire. Les exploits de la guilde des voleurs [Root.GetAdjective] se sont faits de moins en moins audacieux ces derniers mois."
  aw_thieves_guild.123.a:0 "Bien."
  aw_thieves_guild.124.t:0 "Un maître voleur cherche à négocier"
  aw_thieves_guild.124.d:0 "£icon_adventurers_wanted_banner£\nUn maître voleur et membre éminent de la guilde des voleurs [Root.GetAdjective] a vieilli et cherche à se retirer... en sécurité. Il n'est plus le jeune voleur audacieux qui menaçait nos coffres, mais un vétéran vieillissant avec une famille à protéger. Son parcours est long et riche en histoires, et il a suggéré qu'il pourrait nous servir dans toute affaire de ruse et de subterfuge, si nous pouvons garantir la sécurité de ses proches. Il est bien entendu aussi disposé à livrer ses complices et à mettre fin à leur menace en [Root.GetName] une fois pour toutes."
  aw_thieves_guild.124.a:0 "Il nous servira bien."
  aw_thieves_guild.124.b:0 "Je ne négocie pas avec les voleurs."
  aw_thieves_guild.124.c:0 "Oui, bien sûr ; maintenant, dites-nous tout..."
  aw_thieves_guild.130.t:0 "Cambriolages à travers le pays"
  aw_thieves_guild.130.d:0 "£icon_adventurers_wanted_banner£\nCieux cendrés !\n\nDes rapports affluent vers la capitale faisant état de multiples cambriolages de grande envergure frappant les institutions et personnalités les plus éminentes de tout [Root.Country.GetName], tous portant la carte de visite de l'infâme guilde des voleurs de [Root.GetName]. Nul doute qu'il s'agit d'un effort concerté pour repousser les limites de leur art ténébreux."
  aw_thieves_guild.130.a:0 "Nathalyne elle-même en serait fière..."
  aw_thieves_guild.130.b:0 "Nathalyne elle-même en serait fière !"
  aw_thieves_guild.131.t:0 "Les mauvais temps font les bons voleurs"
  aw_thieves_guild.131.d:0 "£icon_adventurers_wanted_banner£\nLes affaires sordides du pays, qu'il s'agisse d'une économie en berne ou d'une corruption décadente, ont renforcé la guilde des voleurs de [Root.GetName]. Il n'est guère surprenant que lorsque les temps sont durs et que l'État ne peut subvenir aux besoins de son peuple, celui-ci doive se tourner vers le vol pour joindre les deux bouts."
  aw_thieves_guild.131.a:0 "Cieux cendrés !"
  aw_thieves_guild.200.t:0 "La guilde des voleurs dépouille les $ESTATE_BURGHERS$"
  aw_thieves_guild.200.d:0 "£icon_adventurers_wanted_banner£\nLes tout-puissants $ESTATE_BURGHERS$ du pays ont été durement frappés par une série de vols ciblant leurs affaires les plus lucratives. Des cargaisons de joyaux venus de contrées lointaines, prêtes à être vendues au prochain jour de marché, ont disparu du jour au lendemain, et des coffres-forts dissimulés, emplis d'or à la faveur de subtilités juridiques, se sont volatilisés comme par enchantement."
  aw_thieves_guild.200.a:0 "Voilà pour la théorie du ruissellement."
  aw_thieves_guild.200.b:0 "Nous devons aider les commerces à se remettre !"
  aw_thieves_guild.201.t:0 "La guilde des voleurs dépouille les $ESTATE_NOBLES$"
  aw_thieves_guild.201.d:0 "£icon_adventurers_wanted_banner£\nLes $ESTATE_NOBLES$ sont des gens décadents, vivant grassement des richesses de leurs ancêtres et contribuant peu à la société. Du moins, c'est ce que croit la guilde des voleurs.\n\nDe nombreux manoirs nobiliaires ont signalé la disparition de tableaux inestimables, et d'innombrables colifichets, bibelots et héritages ancestraux se sont retrouvés dans les échoppes de prêteurs à gage à travers le pays. La noblesse, bien entendu, est humiliée, et cet acte ne peut que révéler sa faiblesse en ce monde."
  aw_thieves_guild.201.a:0 "Mangeons les riches, je suppose."
  aw_thieves_guild.201.b:0 "Préserver leur réputation."
  aw_thieves_guild.202.t:0 "Les banques nationales dévalisées !"
  aw_thieves_guild.202.d:0 "£icon_adventurers_wanted_banner£\nLes banques financées par l'État ont toutes été frappées par une attaque coordonnée, l'or de leurs réserves s'étant volatilisé ! Sur chaque scène de crime, la carte de visite de la guilde des voleurs [Root.GetAdjective] a été laissée en évidence."
  aw_thieves_guild.202.a:0 "Nous les avons laissés devenir trop puissants."
  aw_thieves_guild.202.b:0 "Sauver les banques... ?"
  aw_thieves_guild.203.t:0 "Des reliques précurseurs dérobées !"
  aw_thieves_guild.203.d:0 "£icon_adventurers_wanted_banner£\nLes Elfes Précurseurs ont laissé derrière eux d'innombrables artefacts inestimables qui éblouissent les simples par leur beauté et confondent les érudits par leurs applications en Artisanat Magique. Pour les voleurs de [Root.GetName], cependant, ce sont des cibles des plus exaltantes."
  aw_thieves_guild.203.a:0 "Sa place est dans un musée !"

  aw_thieves_guild_stolen_relics:0 "Reliques précurseurs dérobées par la guilde des voleurs"
  aw_thieves_guild_war_among_thieves:0 "Guerre entre voleurs"
  has_personal_deity_nathalyne_tooltip:0 "§RDisponible grâce à §YNathalyne§! comme divinité personnelle.§!"



  EST_VAL_AW_THIEVES_GUILD_ROBBED:0 "Dépouillé par la guilde des voleurs : §Y$VAL$%§!"
  EST_VAL_AW_THIEVES_GUILD_ROBBED_SUPPORTED:0 "Soutenu après le vol de la guilde des voleurs : §Y$VAL$%§!"



  aw_bandits_1:0 "§Y(Aventuriers recherchés !)§! §gBandits :§! §OMaraudeurs errants§!"
  desc_aw_bandits_1:0 "Des bandits rôdent dans cette province, détroussant les passants et causant des nuisances."
  aw_bandits_2:0 "§Y(Aventuriers recherchés !)§! §gBandits :§! §OPilleurs meurtriers§!"
  desc_aw_bandits_2:0 "Les bandits de cette province se sont enhardis et disposent de suffisamment de forces pour menacer la milice provinciale : pillant et attaquant villages et colonies."
  aw_bandits_3:0 "§Y(Aventuriers recherchés !)§! §gBandits :§! §OForteresse du roi des bandits§!"
  desc_aw_bandits_3:0 "Les bandits de cette province se sont unis sous un roi des bandits et ont capturé une fortification. Ils menacent ouvertement l'autorité de la province et de l'État, et se comportent en souverains autoproclamés."

  aw_bandits_migrate_to_other_country_tt:0 "Les bandits migrent vers un pays voisin."

  aw_bandits.0.t:0 "Les bandits de [Root.GetName]"
  aw_bandits.0.d:0 "£icon_adventurers_wanted_banner£\nLes bandits sont des brutes et des criminels qui parcourent la campagne, s'en prenant aux faibles pour s'enrichir ou par pur plaisir. Nés des temps difficiles, de l'économie en berne et de la guerre, une bande de bandits notoire s'est fait connaître en [Root.GetName]."
  aw_bandits.10.t:0 "Les bandits sont en mouvement"
  aw_bandits.10.d:0 "£icon_adventurers_wanted_banner£\nLes bandits infestant [Root.GetName] ont été aperçus se déplaçant en masse vers [aw_bandits_migration_target.GetName]. Il semble que les gens du peuple de [aw_bandits_migration_target.GetName] seront leurs prochaines victimes."
  aw_bandits.10.a:0 "Malédiction !"
  aw_bandits.10.b:0 "Bonne chance à eux !"
  aw_bandits.11.t:0 "Des bandits arrivent de [From.GetName]"
  aw_bandits.11.d:0 "£icon_adventurers_wanted_banner£\nFace à la recrudescence des détroussages sur les routes et des bourgs mis à sac, il semble que des bandits soient arrivés en [Root.GetName]. Ceux que nous avons capturés disent venir de [From.GetName] et jettent désormais leur dévolu sur nos terres."
  aw_bandits.13.t:0 "Le domaine du roi des bandits s'étend"
  aw_bandits.13.d:0 "£icon_adventurers_wanted_banner£\nL'infâme roi des bandits de [Root.GetName] a considérablement gagné en puissance, au point d'avoir étendu ses sbires à la province voisine de [aw_bandits_migration_target.GetName]."
  aw_bandits.13.a:0 "Maudit soit le roi !"
  aw_bandits.14.t:0 "Le roi des bandits de [From.GetName]"
  aw_bandits.14.d:0 "£icon_adventurers_wanted_banner£\nLa province voisine de [From.GetName] était en proie à des bandits détroussant d'innocentes gens et pire encore, mais il semble qu'ils aient gagné un pouvoir considérable, unis par un « roi » autoproclamé. Ce roi a gracieusement envoyé ses « émissaires » de l'autre côté de la frontière dans notre royaume, afin d'y prélever l'« impôt » auprès de nos citoyens."
  aw_bandits.15.t:0 "Les bandits fuient les monstres !"
  aw_bandits.15.d:0 "£icon_adventurers_wanted_banner£\nLes bandits sont le fruit de royaumes « civilisés » corrompus qui ne peuvent plus subvenir aux besoins de leur peuple. Fort heureusement, en [Root.Owner.GetName], nous ne tolérons pas de telles frivolités, et ces vautours ont fui sachant qu'ils ne pourraient exploiter notre peuple aussi facilement qu'ailleurs."
  aw_bandits.15.a:0 "Bon débarras !"
  aw_bandits.21.t:0 "Les aventuriers défont les bandits"
  aw_bandits.21.d:0 "£icon_adventurers_wanted_banner£\nPour bien des aventuriers, avant de partir affronter des dragons et toutes sortes de monstres, on fait d'abord ses armes contre les bandits, et il semble qu'aujourd'hui soit ce jour pour [Root.GetName]. Défaits et brisés, les bandits de [Root.GetName] ne sont plus."
  aw_bandits.21.a:0 "Gain de niveau !"
  aw_bandits.22.t:0 "Le banditisme décline"
  aw_bandits.22.d:0 "£icon_adventurers_wanted_banner£\nLe temps passant, de moins en moins de caravanes sont dévalisées et de moins en moins de braves gens sont extorqués en [Root.GetName]. Quelle qu'en soit la cause, il semble que cette ignoble profession soit en déclin."
  aw_bandits.22.a:0 "Adieu."
  aw_bandits.23.t:0 "Aventuriers contre bandits"
  aw_bandits.23.d:0 "£icon_adventurers_wanted_banner£\nLes $ESTATE_ADVENTURERS$ à notre service ont mené des escarmouches dans tout [Root.GetName] contre les bandits de la province. Un camp détruit ici, un repaire débusqué là, et même de simples tire-laine défaits alors qu'ils tentaient de détrousser les passants !"
  aw_bandits.23.a:0 "Excellent !"
  aw_bandits.24.t:0 "Les monstres massacrent les bandits"
  aw_bandits.24.d:0 "£icon_adventurers_wanted_banner£\nLes bandits pris à rôder sur nos terres ont été abattus là où ils se tenaient, jusqu'au dernier. Ils n'ont trouvé ni richesses ni caravanes à prendre en otage et à piller ; non, rien que la mort."
  aw_bandits.24.a:0 "Les faibles périssent !"
  aw_bandits.30.t:0 "Le banditisme paie"
  aw_bandits.30.d:0 "£icon_adventurers_wanted_banner£\nLes coffres des bandits se remplissent. Les fourbes et les canailles continuent de grossir leurs rangs.\n\nLes bandits de [Root.GetName] se sont renforcés ces dernières semaines, et seront sans nul doute plus audacieux que jamais pour harceler les pauvres gens du pays."
  aw_bandits.30.a:0 "Hé, c'est mon argent !"
  aw_bandits.120.t:0 "Soudoyer les bandits ?"
  aw_bandits.120.d:0 "£icon_adventurers_wanted_banner£\nIl n'y a qu'une seule et unique chose qui motive les bandits : l'argent.\n\nC'est le cas ici, et une large faction au sein des bandits de [Root.GetName] a proposé une solution élégante à l'État : leur verser une somme rondelette, et ils disparaîtront dans les taudis d'où ils sont venus."
  aw_bandits.120.a:0 "L'argent fait sa loi."
  aw_bandits.120.b:0 "Il faudra me passer sur le corps !"
  aw_bandits.130.t:0 "Des déserteurs se tournent vers le banditisme"
  aw_bandits.130.d:0 "£icon_adventurers_wanted_banner£\nQuand les guerres se terminent ou semblent perdues, les soldats cherchent ailleurs où exercer leur art. Pour certains, ils n'ont pas d'autre moyen de survivre et y sont contraints ; pour d'autres, ils veulent assouvir leur soif de sang. Quelles qu'en soient les raisons, des déserteurs de nos guerres ont établi un camp en [Root.GetName]."
  aw_bandits.130.a:0 "Traîtres !"
  aw_bandits.130.b:0 "Offrir une meilleure solde."
  aw_bandits.130.c:0 "REPRENEZ LES RANGS, VERMINE !"
  aw_bandits.200.t:0 "Les bandits détroussent les percepteurs !"
  aw_bandits.200.d:0 "£icon_adventurers_wanted_banner£\nPlusieurs de nos (bien-aimés) percepteurs sont revenus avec des coffres plus légers que prévu. Si nos fonctionnaires ont d'abord cru qu'ils en avaient prélevé leur part, comme certains le font, il semble que leurs trajets à travers [Root.GetName] aient été semés d'embûches grâce aux bandits de [Root.GetName]."
  aw_bandits.200.a:0 "Où est mon argent ?!"
  aw_bandits.201.t:0 "Les bandits rasent une colonie !"
  aw_bandits.201.d:0 "£icon_adventurers_wanted_banner£\nUn grand panache de fumée noire envahit le ciel.\n\nUne colonie de [Root.GetName] a été rasée jusqu'aux fondations par les bandits de [Root.GetName], emportant toutes les richesses et ne laissant aux malheureux villageois survivants que des cendres."
  aw_bandits.201.a:0 "Il faut en finir avec eux !"
  aw_bandits.202.t:0 "Les bandits sur le fil du rasoir"
  aw_bandits.202.d:0 "£icon_adventurers_wanted_banner£\nLes récentes escarmouches avec les bandits de [Root.GetName] ont provoqué une montée des hostilités à travers toute la province. Une petite provocation pourrait les mener à la révolte ouverte, mais c'est peut-être exactement ce qu'il faut pour les faire sortir de l'ombre et leur montrer ce qu'est la vraie guerre."
  aw_bandits.146.a:0 "Les provoquer."
  aw_bandits.146.b:0 "Ce n'est pas le moment."
  aw_bandits.203.t:0 "Le roi des bandits terrorise la région !"
  aw_bandits.203.d:0 "£icon_adventurers_wanted_banner£\nL'infâme roi des bandits régnant sur [Root.GetName] a ordonné de piller et de saccager les provinces proches de son domaine !"
  aw_bandits.203.a:0 "Il faut en finir avec le roi..."
  aw_bandits.204.t:0 "Les bandits volent les riches..."
  aw_bandits.204.d:0 "£icon_adventurers_wanted_banner£\n...et donnent aux pauvres.\n\nDans un cas inhabituel de charité, les bandits de [Root.GetName] ont distribué des couronnes et des biens volés à la population souffrante de la province, dans l'espoir de les aider à se remettre de leur infortune."
  aw_bandits.204.a:0 "Le peuple est reconnaissant... envers eux, pas envers nous."
  aw_bandits.205.t:0 "La garnison du fort combat les bandits"
  aw_bandits.205.d:0 "£icon_adventurers_wanted_banner£\nLes soldats maintenant le fort de [Root.GetName] ont apparemment riposté contre la menace des bandits dans la province. Utilisant leur fort comme base fiable, ils ont réussi à affaiblir considérablement les bandits de [Root.GetName]."
  aw_bandits.205.a:0 "Beau travail !"
  aw_bandits.206.t:0 "L'armée du roi des bandits se lève !"
  aw_bandits.206.d:0 "£icon_adventurers_wanted_banner£\nUnis sous la bannière du roi des bandits, les bandits de [Root.GetName] ont rassemblé une vaste troupe de coupe-jarrets pour piller le pays sans retenue. Leur armée pourrait même rivaliser avec la nôtre !"
  aw_bandits.206.a:0 "Combattre sur un champ de bataille, ce n'est pas la même chose que dans l'ombre."

  aw_bandits_rebels_name:0 "Maraudeurs bandits"
  aw_bandits_rebels_title:0 "Bandit"
  aw_bandits_rebels_desc:0 "Les bandits se sont unis en une armée déterminée à semer le chaos et à piller le pays."
  aw_bandits_rebels_army:0 "Maraudeurs bandits"
  aw_bandits_rebels_demand:0 "Filez-nous votre or !"
  aw_bandits_rebels_demand_desc:0 "Ces bandits se battent pour le sang et l'or. Surtout l'or. Ils exigent que vous vidiez vos trésors."

  aw_bandits_tax_collectors_robbed:0 "Percepteurs détroussés par les bandits"
  aw_bandits_stole_from_rich_give_to_poor:0 "Les bandits donnent de l'argent aux pauvres"




  aw_werewolves_1:0 "§Y(Aventuriers recherchés !)§! §gLoups-garous :§! §OHurlement dans la nuit§!"
  desc_aw_werewolves_1:0 "Il est normal d'entendre des loups hurler la nuit... mais cette fois, c'est différent. Quelque chose rôde sous la lumière de la pleine lune, quelque chose qui n'est ni tout à fait homme ni tout à fait bête."
  aw_werewolves_2:0 "§Y(Aventuriers recherchés !)§! §gLoups-garous :§! §OLa meute§!"
  desc_aw_werewolves_2:0 "Les loups-garous ne sont pas un mythe ici. Les routes ne sont plus sûres, et les cadavres à demi dévorés sont monnaie courante pour ceux qui osent emprunter les chemins nocturnes."
  aw_werewolves_3:0 "§Y(Aventuriers recherchés !)§! §gLoups-garous :§! §OInfestation lycanthrope§!"
  desc_aw_werewolves_3:0 "La malédiction contagieuse de la lycanthropie sévit dans cette province. Le jour, les voisins se soupçonnent les uns les autres, tenant même des conseils pour se juger et se condamner mutuellement ; la nuit, eh bien..."

  aw_werewolves_migrate_to_other_country_tt:0 "Les loups-garous migrent vers un pays voisin."

  aw_werewolves.0.t:0 "Un hurlement dans la nuit"
  aw_werewolves.0.d:0 "£icon_adventurers_wanted_banner£\nUne pleine lune trône au-dessus de [Root.GetName]. Dans chaque taverne, on murmure que quelque chose, au-delà de l'homme et de la bête, rôde dans les terres sauvages, s'en prenant aux voyageurs infortunés dans la nuit."
  aw_werewolves.13.t:0 "La lycanthropie se répand jusqu'à [aw_werewolves_migration_target.GetName]"
  aw_werewolves.13.d:0 "£icon_adventurers_wanted_banner£\nC'est une croyance populaire bien connue que la lycanthropie peut se transmettre par morsure, et qu'à la prochaine pleine lune, l'infecté se transformera en un effroyable mi-loup mi-homme : un loup-garou.\n\nLa meute de loups-garous de [From.GetName] ne cesse de croître à mesure que les morsures se multiplient. Des rapports de plus en plus nombreux en provenance de [aw_werewolves_migration_target.GetName] indiquent que la meute s'est scindée en deux, la plus faible étant contrainte de migrer."
  aw_werewolves.13.a:0 "Nous devons les contenir !"
  aw_werewolves.13.b:0 "Pas mon loup, pas mon problème."
  aw_werewolves.14.t:0 "La meute"
  aw_werewolves.14.d:0 "£icon_adventurers_wanted_banner£\nLa province voisine de [From.GetName] était en proie aux loups-garous, et il semble que son incapacité à contenir ces monstres nous ait littéralement mordu les fesses. La pleine lune se lève et des hurlements inhumains retentissent d'allégresse, car une meute de loups-garous a fait de [Root.GetName] son territoire."
  aw_werewolves.20.t:0 "Les loups-garous disparaissent, le peuple aussi"
  aw_werewolves.20.d:0 "£icon_adventurers_wanted_banner£\nEntendre leurs hurlements chaque nuit était presque devenu un rituel, mais à présent le silence semble étrange sans eux. Les loups-garous qui ravageaient nos terres ont presque tous disparu, en même temps que certains braves gens qui appelaient [Root.GetName] leur foyer."
  aw_werewolves.20.a:0 "Suspect... mais au moins c'est terminé."
  aw_werewolves.21.t:0 "Les aventuriers terrassent les loups-garous"
  aw_werewolves.21.d:0 "£icon_adventurers_wanted_banner£\n« Le lycanthrope est une bête mortelle, et tenter de le vaincre au combat est une folie. Sa faiblesse réside dans son affliction. Au lever du jour, il s'éveille de son cauchemar et retourne dans la société : c'est le moment de frapper. »\n\n— Dr. Reginald síl Vekt\n\nLes $ESTATE_ADVENTURERS$ se sont certes battus contre les bêtes, mais aujourd'hui ils viennent avec des informations : une liste de tous les individus liés à la meute de loups-garous qui infeste nos terres."
  aw_werewolves.21.a:0 "Capturez-les discrètement, et nous verrons s'ils sortent les griffes !"
  aw_werewolves.23.t:0 "Les aventuriers terrassent les loups-garous"
  aw_werewolves.23.d:0 "£icon_adventurers_wanted_banner£\nBalle en argent ? Vérifié. Aconit ? Prêt.\n\nLes $ESTATE_ADVENTURERS$ de [Root.GetName] sont revenus auprès des autorités locales en piteux état, mais porteurs de présents : plusieurs peaux et dépouilles des loups-garous qui terrorisaient la province."
  aw_werewolves.23.a:0 "L'argent tue."
  aw_werewolves.25.t:0 "Monstre contre loup-garou"
  aw_werewolves.25.d:0 "£icon_adventurers_wanted_banner£\nSi les nations « civilisées » du monde nous voient comme de simples bêtes à tuer et à conquérir, il existe pire en ce monde. Notre peuple s'est heurté aux loups-garous de [Root.GetName] et en est sorti victorieux."
  aw_werewolves.25.a:0 "Graaah !"
  aw_werewolves.30.t:0 "L'écho des hurlements"
  aw_werewolves.30.d:0 "£icon_adventurers_wanted_banner£\nChaque semaine apporte son lot de récits de morsures de loup-garou ou de villageois abandonnant leur famille pour la solitude des bois autour de [Root.GetName]. Peu importe, car la pleine lune les rappelle tous, et chaque mois les hurlements se font plus nombreux..."
  aw_werewolves.30.a:0 "Les temps sont désespérés."
  aw_werewolves.120.t:0 "Bûcherons aléniques"
  aw_werewolves.120.d:0 "£icon_adventurers_wanted_banner£\nPuissante est la hache du bûcheron, et puissants sont les Aléniques qui la manient. Depuis longtemps, les Grands-Bois le long de l'Alen sont protégés par leurs forestiers contre les créatures qui hantent les ombres. Il n'est donc guère surprenant qu'ils aient réussi à purger [Root.GetName] de son infestation de loups-garous."
  aw_werewolves.120.a:0 "Par loyauté envers notre prestigieux $MONARCHTITLE$."
  aw_werewolves.120.b:0 "Non, nous avons besoin d'eux ailleurs."
  aw_werewolves.121.t:0 "Les loups-garous et le village"
  aw_werewolves.121.d:0 "£icon_adventurers_wanted_banner£\nUne bande d'aventuriers a proposé d'abattre du bétail sur la place du village de [Root.GetName] pour tendre un piège aux loups-garous avant la prochaine pleine lune. C'est un risque que d'attirer les lycans à notre porte, mais l'espace confiné pourrait garantir que nous les tuerons tous."
  aw_werewolves.121.a:0 "La pleine lune approche. Préparez le piège !"
  aw_werewolves.121.b:0 "Le risque est trop grand."
  aw_werewolves.122.t:0 "La Grande Purge lupine"
  aw_werewolves.122.d:0 "£icon_adventurers_wanted_banner£\nL'infestation est désormais une plaie, les attaques de loups-garous se multipliant à travers le royaume. Les villages ont commencé à organiser de grandes battues et l'hystérie atteint son paroxysme. Pour le bien de notre nation, nous devons répondre au massacre par l'offensive."
  aw_werewolves.122.a:0 "Chaque dernier loup-garou doit être tué."
  aw_werewolves.122.b:0 "C'est l'anarchie. Je ne le tolérerai pas !"
  aw_werewolves.200.t:0 "Pénurie d'argenterie"
  aw_werewolves.200.d:0 "£icon_adventurers_wanted_banner£\nL'hystérie a gagné la petite noblesse de [Root.GetName], qui s'est mise à thésauriser l'argent sous toutes ses formes pour sa prétendue toxicité envers les loups-garous et sa capacité à purifier les morts. Tout, de l'argenterie aux pièces d'argent, est fondu en balles ou forgé en masses d'armes. Piètre réconfort face à la bête."
  aw_werewolves.200.a:0 "L'économie s'en remettra-t-elle un jour ?"
  aw_werewolves.201.t:0 "Soupçons au sein de la cour"
  aw_werewolves.201.d:0 "£icon_adventurers_wanted_banner£\nSi la présence lycanthrope n'a pas eu un impact trop considérable sur notre royaume, les soupçons ont gagné notre cour tandis que les murmures circulent. Des accusations fusent désormais, affirmant qu'un conseiller particulièrement velu serait lui-même un loup-garou !"
  aw_werewolves.201.a:0 "Il y a une certitude dans la mort."
  aw_werewolves.201.b:0 "Quand la paranoïa prendra-t-elle fin ?"
  aw_werewolves.202.t:0 "La population fuit les loups-garous"
  aw_werewolves.202.d:0 "£icon_adventurers_wanted_banner£\n[Root.GetName] a connu une hausse de l'émigration à mesure que les attaques de loups-garous se multiplient. Certains villageois préfèrent abandonner leurs terres familiales plutôt que de risquer de voir leur famille tomber en proie à la bête. La confiance communautaire fut l'une des premières victimes de cette menace."
  aw_werewolves.202.a:0 "Puissent-ils trouver refuge..."
  aw_werewolves.203.t:0 "Chaos dans les ateliers"
  aw_werewolves.203.d:0 "£icon_adventurers_wanted_banner£\nLes loups-garous ont commencé à attaquer les ateliers locaux de [Root.GetName]. Cependant, ils montrent peu d'intérêt pour les ouvriers et ciblent activement notre industrie. Plus étrange encore, les rapports indiquent que cette récente violence est menée par un grand loup blanc."
  aw_werewolves.203.a:0 "Renvoyez-les dans les terres sauvages !"
  aw_werewolves.204.t:0 "Recherches académiques"
  aw_werewolves.204.d:0 "£icon_adventurers_wanted_banner£\nUn délégué de la guilde des mages de [Root.GetName] a demandé que nous concentrions nos efforts sur la capture de loups-garous vivants et a suggéré de soumettre des prisonniers à leurs morsures afin de mieux comprendre la magie de transmutation. Cependant, les bûcherons locaux ont mis en garde contre le fait de laisser les bêtes en vie et ont proposé de nous aider dans notre chasse dès le lendemain."
  aw_werewolves.204.a:0 "Vendre les prisonniers aux mages et capturer les bêtes vivantes."
  aw_werewolves.204.b:0 "Magie immonde pour bêtes immondes. Il faut les tuer."
  aw_werewolves.205.t:0 "Luttes de pouvoir au sein de la meute"
  aw_werewolves.205.d:0 "£icon_adventurers_wanted_banner£\nDes luttes intestines ont éclaté entre deux meutes rivales de loups-garous en [Root.GetName]. Nous ne saurions dire ce qui a causé le conflit, mais si nos aventuriers valent leur solde, ils tireront parti de cette désorganisation."
  aw_werewolves.205.a:0 "Moins il en restera, mieux ce sera."
  aw_werewolves.206.t:0 "Le jeu du loup-garou"
  aw_werewolves.206.d:0 "£icon_adventurers_wanted_banner£\nÀ mesure que les loups-garous se multiplient, la panique s'est emparée de la population de [Root.GetName]. D'abord, il n'y eut que des accusations et des doigts pointés. Récemment cependant, ces incidents ont dégénéré en agressions nocturnes mystérieuses les uns contre les autres ! Les autorités locales demandent de l'aide."
  aw_werewolves.206.a:0 "C'est leur problème, à eux de le régler."
  aw_werewolves.206.b:0 "Envoyer un représentant de la couronne superviser les procédures."
  aw_werewolves.207.t:0 "Massacre en [Root.GetName] !"
  aw_werewolves.207.d:0 "£icon_adventurers_wanted_banner£\nUne grande meute de loups-garous s'est abattue sur un petit village de [Root.GetName]. Nul n'a survécu, et seule la moitié des villageois a pu être retrouvée parmi les morts. Face à ce spectacle macabre, le royaume est plongé dans le deuil et la tourmente, se demandant comment un tel acte a pu se produire en [Root.Owner.GetName]."
  aw_werewolves.207.a:0 "Rien ne peut-il nous sauver de ce fléau ?"
  aw_werewolves.208.t:0 "Un décès secoue le royaume"
  aw_werewolves.208.d:0 "£icon_adventurers_wanted_banner£\nLa presse est consternée par une récente série de décès en [Root.GetName], le plus macabre impliquant une jeune fille rendant visite à sa grand-mère. Il semble qu'un loup-garou les ait surprises toutes deux dans la maison, causant la mort des deux. Tout ce qu'on a pu retrouver de la pauvre enfant fut son petit chaperon rouge, mis en lambeaux."
  aw_werewolves.208.a:0 "Combien d'innocents devront encore mourir ?"
  aw_werewolves.209.t:0 "Loups-garous contre vampires"
  aw_werewolves.209.d:0 "£icon_adventurers_wanted_banner£\nBête contre bête se sont affrontées en [Root.GetName] cette nuit, les loups-garous déchaînant leur nature sauvage contre les pouvoirs surnaturels des vampires."
  aw_werewolves.209.a:0 "Les vampires ont été mis en pièces."

  aw_werewolves_werewolf_hysteria:0 "Hystérie lycanthrope"
  aw_werewolves_werewolf_hysteria_court_oversight:0 "Hystérie lycanthrope (supervision de la cour)"

  EST_VAL_AW_MONSTER_EXPERIMENTATION_SUPPORTED:0 "Expérimentation sur les monstres soutenue : "


  aw_trolls_1:0 "§Y(Aventuriers recherchés !)§! §gTrolls :§! §OErrants voraces§!"
  desc_aw_trolls_1:0 "Un troll ou deux ont élu domicile dans cette province. S'ils tendent à éviter nos colonies, les trolls sont des prédateurs suprêmes qui finissent par dévaster et dévorer toute la faune d'une province avant de passer à la suivante..."
  aw_trolls_2:0 "§Y(Aventuriers recherchés !)§! §gTrolls :§! §OAntre de trolls§!"
  desc_aw_trolls_2:0 "Les trolls de cette province ont établi un antre semi-permanent, leur permettant de croître en nombre. Si rien n'est fait, ils ne se contenteront pas de dévaster la province, mais en feront véritablement leur territoire !"
  aw_trolls_3:0 "§Y(Aventuriers recherchés !)§! §gTrolls :§! §OPays des trolls§!"
  desc_aw_trolls_3:0 "Un important groupe de trolls s'est installé de façon permanente sur ces terres, en faisant leur foyer. Nul doute qu'ils ont déjà ravagé l'écosystème au point que toute vie a dû s'adapter ou apprendre à coexister avec ces prédateurs suprêmes. Ici, c'est le pays des trolls."

  aw_trolls_migrate_to_other_country_tt:0 "Les trolls migrent vers un pays voisin."

  aw_trolls.0.t:0 "Trolls aperçus en [Root.GetName]"
  aw_trolls.0.d:0 "£icon_adventurers_wanted_banner£\nPour la plupart des gens, les trolls sont connus pour deux choses : leur nez grotesque et leurs impressionnantes capacités de régénération qui les rendent incroyablement difficiles à tuer.\n\nMais pour ceux qui ont vécu parmi les trolls, il existe un péril plus grand dans leur présence au sein de l'écosystème d'une province. En raison de leur grande taille et de leur régénération, les trolls n'ont aucun prédateur naturel dans la nature : ce sont des prédateurs suprêmes. Laissez un troll tranquille assez longtemps et il finira par dévaster l'environnement, dévorant et éliminant toute la faune sauvage."
  aw_trolls.0.a:0 "Ils finiront par passer leur chemin, n'est-ce pas ?"
  aw_trolls.10.t:0 "Les trolls quittent [Root.GetName]"
  aw_trolls.10.d:0 "£icon_adventurers_wanted_banner£\nBonne et mauvaise nouvelle. Les trolls ont été aperçus quittant [Root.GetName] en direction de [aw_trolls_migration_target.GetName]. La mauvaise nouvelle, c'est qu'ils ne partent que parce qu'ils ont décimé l'écosystème de [Root.GetName]..."
  aw_trolls.10.a:0 "Enfin, ils s'en vont."
  aw_trolls.10.b:0 "Pensées émues pour [aw_trolls_migration_target.GetName]."
  aw_trolls.11.t:0 "Des trolls arrivent de [From.GetName]"
  aw_trolls.11.d:0 "£icon_adventurers_wanted_banner£\nPour la plupart des gens, les trolls sont connus pour deux choses : leur nez grotesque et leurs impressionnantes capacités de régénération qui les rendent incroyablement difficiles à tuer.\n\nMais pour les habitants de [From.GetName] voisin, il existe un péril plus grand dans leur présence au sein de l'écosystème d'une province. En raison de leur grande taille et de leur régénération, les trolls n'ont aucun prédateur naturel dans la nature : ce sont des prédateurs suprêmes. Laissez un troll tranquille assez longtemps et il finira par dévaster l'environnement, dévorant et éliminant toute la faune sauvage.\n\nIl semble que les trolls de [From.GetName] aient été victimes d'un tel cas de figure, et jettent désormais leur dévolu sur [Root.GetName]."
  aw_trolls.21.t:0 "Pourfendeurs de trolls !"
  aw_trolls.21.d:0 "£icon_adventurers_wanted_banner£\n« La régénération rapide des tissus est la plus grande force du troll. Quiconque voudrait affronter un tel ennemi doit envisager des sources de dommages continus. Poisons. Acides. Flammes. »\n— Avant-propos du Dr. Reginald síl Vekt, Des trolls et des hommes : le guide complet sur les trolls, 5e éd.\n\nUn groupe d'aventuriers a réussi à abattre les trolls qui infestaient la région ! Si les dégâts sont faits, la faune ne sera plus menacée par ces dangereux prédateurs."
  aw_trolls.21.a:0 "Problème réglé !"
  aw_trolls.22.t:0 "Cadavres de trolls retrouvés"
  aw_trolls.22.d:0 "£icon_adventurers_wanted_banner£\nLes trolls ne sont guère territoriaux, sauf entre eux. Quand la nourriture vient à manquer, un troll migre généralement vers des terres riches en faune, mais il arrive qu'ils s'affrontent entre eux, se voyant comme des rivaux pour la nourriture plutôt que comme une meute : après tout, pourquoi se déplacer quand on peut simplement réduire le nombre de bouches à nourrir ?"
  aw_trolls.22.a:0 "Les choses reprennent leur cours naturel."
  aw_trolls.23.t:0 "Les aventuriers bafouent les trolls"
  aw_trolls.23.d:0 "£icon_adventurers_wanted_banner£\nSi les trolls sont indubitablement des créatures sentientes, ils sont souvent obtus et faciles à duper. Peut-être est-ce dû à leur « prétendue » moralité étrangère, ou peut-être que leur rôle de bêtes quasi invulnérables signifie qu'ils n'ont jamais vraiment eu à se soucier d'être intelligents. Quoi qu'il en soit, les aventuriers chargés d'éliminer la menace des trolls en [Root.GetName] ont rapporté de bons progrès, avec plusieurs trolls abattus."
  aw_trolls.23.a:0 "Bien."
  aw_trolls.25.t:0 "Tueurs de trolls"
  aw_trolls.25.d:0 "£icon_adventurers_wanted_banner£\nLes trolls sont des ennemis brutaux. Leur chair régénérante signifie que même le coup de hache le plus sauvage sera oublié en quelques minutes. Ils sont en effet des adversaires implacables, la définition même du monstre. Ils chargent sans retenue ni peur pour leur vie, et leurs griffes acérées agrippent tout ce qui se trouve à portée pour le déchiqueter. Malgré cela, nos braves guerriers ont réussi à les terrasser au combat."
  aw_trolls.25.a:0 "Un combat digne de ce nom !"
  aw_trolls.30.t:0 "La meute de trolls grandit"
  aw_trolls.30.d:0 "£icon_adventurers_wanted_banner£\nLa plupart des trolls vivent en petites meutes familiales de 3 à 12 individus et sont de nature semi-nomade, menant une vie de chasseurs itinérants. Grâce à leur dévastation constante de la province, ils ont réussi à croître en nombre, menaçant sans nul doute davantage de terres de leurs sombres méfaits."
  aw_trolls.30.a:0 "Cieux cendrés !"
  aw_trolls.40.t:0 "Les trolls souhaitent s'installer"
  aw_trolls.40.d:0 "£icon_adventurers_wanted_banner£\nIl est vrai que les trolls ne cherchent pas la violence pour la violence. Ils la cherchent comme un moyen : se nourrir. Ils possèdent en effet des qualités rédemptrices. Leur « moralité étrangère » est certes étrange, car ils peinent à saisir les conventions et contextes sociaux, mais cela s'accompagne d'une sorte d'innocence enfantine capable de la plus grande des choses : la confiance.\n\nUn tel jour est arrivé. Ayant entendu parler de notre tolérance envers leur espèce, les trolls qui ravageaient [Root.GetName] ne souhaitent plus chasser la faune aux confins des terres, mais rejoindre leurs frères et sœurs pour vivre parmi notre peuple, comme bâtisseurs de ponts et gardiens, comme chasseurs et guides et êtres à part entière."
  aw_trolls.40.a:0 "Bienvenue, défenses comprises !"
  aw_trolls.40.b:0 "Vous n'êtes que des monstres !"
  aw_trolls.140.t:0 "Le troll sous le pont"
  aw_trolls.140.d:0 "£icon_adventurers_wanted_banner£\nLes trolls sont assurément des créatures étranges. Ils ont une sorte d'innocence enfantine, si on les trouve un bon jour. L'un d'entre eux a pris sur lui d'entretenir un pont important en [Root.GetName], en échange de modestes sommes en pièces, en nourriture ou en colifichets, un bien meilleur marché que nos bâtisseurs habituels ! Apparemment, ce phénomène est assez courant chez les trolls vivant près des colonies, et serait dû à un appel inné lié à leurs origines de serviteurs des Vrais Géants, qui leur confère une étrange affinité avec la pierre et l'entretien de telles structures."
  aw_trolls.140.a:0 "C'est bien, je suppose ?"
  aw_trolls.140.b:0 "Moi. Toi. Troll. Amis ?"
  aw_trolls.200.t:0 "Les aventuriers provoquent la fureur des trolls !"
  aw_trolls.200.d:0 "£icon_adventurers_wanted_banner£\nLes trolls sont des créatures capricieuses, et leur absence d'instinct de conservation en fait des adversaires mortels et imprévisibles. Un stratagème des $ESTATE_ADVENTURERS$ a mal tourné, poussant les trolls à semer la destruction à travers la province."
  aw_trolls.200.a:0 "Soyez prudents !"
  aw_trolls.201.t:0 "Les trolls causent une famine"
  aw_trolls.201.d:0 "£icon_adventurers_wanted_banner£\nIl n'est guère surprenant que la famine ait frappé le pays des trolls de [Root.GetName]. Les chasseurs ne trouvent que des carcasses déjà dévorées par la population croissante de trolls en [Root.GetName]. Pire encore, les trolls s'en prennent désormais aux paysans travaillant dans leurs champs, ruinant les récoltes qui auraient pu empêcher un tel désastre."
  aw_trolls.201.a:0 "Ces trolls sont un fléau !"
  aw_trolls.201.b:0 "Envoyer de l'aide à la province !"
  aw_trolls.202.t:0 "Les trolls dévorent des villages"
  aw_trolls.202.d:0 "£icon_adventurers_wanted_banner£\nAprès avoir méthodiquement dévoré toute la faune sauvage de [Root.GetName], il semble que les trolls se soient enfin tournés vers la malheureuse population de la province. Ils n'évitent plus les sentiers des colonies et des caravanes, les attaquant et laissant des cadavres dévorés à la vue des pauvres voyageurs..."
  aw_trolls.202.a:0 "Plus de nouvelles de certains villages depuis un moment..."
  aw_trolls.204.t:0 "Les $ESTATE_MAGES$ veulent du tissu de troll"
  aw_trolls.204.d:0 "£icon_adventurers_wanted_banner£\nLes trolls sont célèbres pour leurs capacités régénératives. Une simple coupure guérira en quelques secondes, et le troll peut poursuivre sa route comme si de rien n'était. Les adeptes de la magie sont toujours en quête de nouveaux réactifs pour leurs études et expériences, et ont demandé une escorte militaire afin de récolter ces précieux ingrédients."
  aw_trolls.204.a:0 "Envoyer un détachement pour les aider."
  aw_trolls.204.b:0 "Débrouillez-vous tout seuls !"
  aw_trolls.205.t:0 "Les trolls dévorent la milice locale"
  aw_trolls.205.d:0 "£icon_adventurers_wanted_banner£\nLe fort de [Root.GetName] offre bien des avantages. Il protège la province contre les attaques de conquérants potentiels et permet à la garnison locale de projeter son influence sur les environs. Pour les trolls de [Root.GetName], cela a conduit des miliciens téméraires, enhardis par leur fort, à traquer les trolls rôdant dans leur voisinage."
  aw_trolls.205.a:0 "Ils auraient dû laisser cela aux aventuriers..."

  aw_trolls_bridge_troll_tolls:0 "Troll du pont"
  aw_trolls_ate_local_militia:0 "Les trolls ont dévoré la milice locale"
  aw_trolls_troll_caused_famine:0 "Famine causée par les trolls"



  aw_goblins_1:0 "§Y(Aventuriers recherchés !)§! §gGobelins :§! §ORôdeurs gobelins§!"
  desc_aw_goblins_1:0 "Des éclaireurs d'une tribu gobeline ont été aperçus dans cette province. S'ils n'ont pas encore eu l'audace d'attaquer au grand jour, nul doute que si on les laisse proliférer, davantage des leurs arriveront..."
  aw_goblins_2:0 "§Y(Aventuriers recherchés !)§! §gGobelins :§! §OCaverne gobeline§!"
  desc_aw_goblins_2:0 "Une tribu gobeline s'est établie ici, attaquant les cibles faibles comme les caravanes pour le butin et le sang."
  aw_goblins_3:0 "§Y(Aventuriers recherchés !)§! §gGobelins :§! §OHorde gobeline§!"
  desc_aw_goblins_3:0 "Les gobelins infestent cette province. Il est courant d'apercevoir leurs petits yeux rouges perçants et leurs larges rictus aux dents acérées tapis dans l'ombre, guettant le moment le plus propice pour frapper. Si un gobelin seul est peut-être lâche, en nombre, ils ne connaissent plus la peur."

  aw_goblins_migrate_to_other_country_tt:0 "Les gobelins migrent vers un pays voisin."

  aw_goblins.0.t:0 "Des rôdeurs gobelins apparaissent"
  aw_goblins.0.d:0 "£icon_adventurers_wanted_banner£\nDes gobelins ont infesté [Root.GetName]. Ils sont violents et indisciplinés, mais pour l'instant se tiennent à distance, fuyant à la vue de nos soldats, très probablement en raison de leur petit nombre. Toutefois, il ne faut pas les sous-estimer, car les gobelins deviennent exponentiellement plus agressifs à mesure qu'ils sont plus nombreux."
  aw_goblins.0.a:0 "Agaçant..."
  aw_goblins.10.t:0 "Les gobelins partent piller [aw_goblins_migration_target.GetName]"
  aw_goblins.10.d:0 "£icon_adventurers_wanted_banner£\nLes gobelins de [Root.GetName] nous ont laissé leur désordre à nettoyer, ne laissant que détritus, os épars et une odeur nauséabonde. La paix peut désormais revenir dans la campagne sans craindre leurs raids, bien que les routes commerciales locales mettront du temps à se rétablir."
  aw_goblins.10.a:0 "Mieux vaut aller voir comment va [aw_goblins_migration_target.GetName]."
  aw_goblins.10.b:0 "Nous verrons bien comment ils s'en sortent."
  aw_goblins.11.t:0 "Des gobelins arrivent en [Root.GetName]"
  aw_goblins.11.d:0 "£icon_adventurers_wanted_banner£\nUne masse bruyante et querelleuse de gobelins s'est installée en [Root.GetName]. Ils ont déjà commencé à harceler le bétail et à creuser là où ils n'auraient pas dû, causant toutes sortes d'ennuis. Il va nous falloir trouver un moyen de régler cela."
  aw_goblins.11.a:0 "Agaçant..."
  aw_goblins.13.t:0 "La horde gobeline se scinde"
  aw_goblins.13.d:0 "£icon_adventurers_wanted_banner£\nLes gobelins sont des créatures versatiles, qui au fond ne pensent qu'à eux-mêmes et rien qu'à eux-mêmes. Il semble qu'un tel conflit ait eu lieu en [Root.GetName], et que la horde gobeline qui l'infestait se soit brisée en deux. La troupe la plus faible a été vue pour la dernière fois se dirigeant vers [aw_goblins_migration_target.GetName]."
  aw_goblins.13.a:0 "Au moins, ils sont divisés à présent."
  aw_goblins.13.b:0 "Bon débarras !"
  aw_goblins.14.t:0 "Des exilés de la horde gobeline arrivent"
  aw_goblins.14.d:0 "£icon_adventurers_wanted_banner£\nUn nid de rats, se reproduisant jusqu'à déborder de son repaire. Un nuage de criquets, tourbillonnant dans les airs en traversant [Root.Owner.GetName]. Une plaie carabinée, qui ne se limite pas à une seule région.\n\nTelles sont les pensées qui traversent l'esprit du [Root.Owner.Monarch.GetTitle] tandis qu'il entend le dernier rapport sur l'infestation gobeline du royaume : la horde grandissante de [From.GetName] a débordé par-delà la frontière en [Root.GetName], et un nouveau repaire de rôdeurs nécessitera une nouvelle bande d'aventuriers."
  aw_goblins.14.a:0 "Prévenir les aventuriers."
  aw_goblins.15.t:0 "Les gobelins fuient de peur !"
  aw_goblins.15.d:0 "£icon_adventurers_wanted_banner£\nLa seule chose meilleure que résoudre un problème, c'est de faire en sorte que quelqu'un d'autre le règle. Ce principe a guidé les derniers efforts de nos forces en [Root.GetName] : les gobelins sont des créatures peureuses, et nous n'avons pas eu à nous donner la peine de les traquer pour nous en débarrasser. Au lieu de cela, nous avons réussi à les repousser au-delà de la frontière vers [aw_goblins_migration_target.GetName]. C'est leur problème désormais, et s'ils envoient une quelconque plainte diplomatique, eh bien, [Root.Monarch.GetName] pourra toujours s'offrir un bon rire."
  aw_goblins.15.a:0 "Et ne revenez plus !"
  aw_goblins.20.t:0 "Luttes intestines gobelines"
  aw_goblins.20.d:0 "£icon_adventurers_wanted_banner£\nNous pensions que nos aventuriers étaient doués pour éliminer les gobelins, mais il semble que même eux aient quelque chose à apprendre des véritables experts en la matière : les gobelins eux-mêmes ! Nous ignorons ce qui en est la cause, mais la nature égoïste des gobelins implique sans doute des rivalités et des coups dans le dos. Quoi qu'il en soit, le nid gobelin de [Root.GetName] semble s'être dissous dans une frénésie de querelles intestines. D'innombrables gobelins sont tombés sous les griffes et les couteaux de leurs congénères, nos aventuriers observant la scène de loin avec un ravissement stupéfait. Le [Root.Owner.Monarch.GetTitle] est tout aussi ravi d'apprendre ces nouvelles : ils ne troubleront plus le royaume."
  aw_goblins.20.a:0 "Maintenant, fouillez leurs terriers pour trouver les biens volés."
  aw_goblins.21.t:0 "Les aventuriers défont les gobelins !"
  aw_goblins.21.d:0 "£icon_adventurers_wanted_banner£\nÉpée et mousquet, lance et sortilège. Tels sont les outils du métier d'aventurier, et tous étaient présents lors de l'assaut organisé contre les gobelins de [Root.GetName]. Au matin, l'acier poli étincelait ; au crépuscule, il était taché de sang, les aventuriers prétendant avoir chacun abattu vingt gobelins !"
  aw_goblins.21.a:0 "Les gobelins ne sont plus ; puissent-ils ne jamais revenir !"
  aw_goblins.22.t:0 "L'infestation gobeline décroît"
  aw_goblins.22.d:0 "£icon_adventurers_wanted_banner£\nLa lune croît et décroît. Les marées montent et descendent. Les jours s'allongent et raccourcissent. Il semble que les gobelins de [Root.GetName] suivent un cycle similaire, un phénomène dépassant l'entendement de tout philosophe ou savant, car pour une raison inconnue leur nombre a également diminué."
  aw_goblins.22.a:0 "Puisse cette tendance se poursuivre."
  aw_goblins.23.t:0 "Les aventuriers mettent les gobelins en déroute"
  aw_goblins.23.d:0 "£icon_adventurers_wanted_banner£\nLes aventuriers accomplissent d'innombrables quêtes, de l'exploration de ruines antiques au décryptage de sortilèges mystérieux. Les bardes vous diront que jamais deux quêtes ne se ressemblent, oubliant bien sûr la quête que presque tout aventurier a accomplie un jour ou l'autre : tuer des gobelins.\n\nIl n'est donc guère surprenant que la récente incursion dans le repaire gobelin de [Root.GetName] se soit bien déroulée. La réduction de leur nombre devrait soulager les habitants."
  aw_goblins.23.a:0 "Voilà pourquoi nous les engageons !"
  aw_goblins.24.t:0 "Pitoyables gobelins"
  aw_goblins.24.d:0 "£icon_adventurers_wanted_banner£\nLa force fait loi. Telle est la règle de [Root.Owner.GetName], et nous n'en avons besoin d'aucune autre. C'est cette loi que nous avons si clairement démontrée aux gobelins rôdeurs de [Root.GetName], et leur faiblesse a prouvé leur absence de tout droit à être là. Leurs griffes et leurs dents n'ont pas fait le poids face aux nôtres, et au crépuscule, les forces du [Root.Owner.Monarch.GetTitle] se sont assurées que ce nid de rôdeurs ne troublerait plus [Root.Monarch.GetHerHim]. Ils n'ont pas payé tribut en loyauté ni en or, et ils ont donc payé en sang."
  aw_goblins.24.a:0 "Une leçon pour tous !"
  aw_goblins.25.t:0 "Faiblesse gobeline"
  aw_goblins.25.d:0 "£icon_adventurers_wanted_banner£\nLes querelles tribales sont le fléau de l'existence de [Root.Owner.Monarch.GetName]. Bien qu'aucune société [Root.Owner.Culture.GetName] n'en soit exempte, elles sont une épine constante dans le pied du [Root.Owner.Monarch.GetTitle], détournant les lieutenants et immobilisant les ressources. Fort heureusement, il semble que les [Root.Owner.Culture.GetName] ne soient pas les seuls à en souffrir. Les rôdeurs gobelins qui infestent [Root.GetName] se sont apparemment scindés en factions rivales, dont l'une a été chassée du nid, pour être aisément écrasée par notre groupe de guerre assemblé à la hâte."
  aw_goblins.25.a:0 "Le règne de [Root.Owner.Monarch.GetName] ne sera défié par aucun squatteur."
  aw_goblins.30.t:0 "Surpopulation gobeline"
  aw_goblins.30.d:0 "£icon_adventurers_wanted_banner£\nQuelle est la différence entre les gobelins et les lapins ? Les gobelins ne se contentent pas de manger les récoltes du fermier, ils le poignardent aussi ! Mais à tous autres égards, les deux espèces se ressemblent trait pour trait, et notamment en ce qui concerne l'infestation de [Root.GetName] : leur reproduction incessante a fait gonfler les rangs gobelins. Dans leurs profondes galeries, deux nouveaux gobelins semblent apparaître pour chacun que nous abattons."
  aw_goblins.30.a:0 "Nous les chasserons tout de même."
  aw_goblins.40.t:0 "Les gobelins capitulent"
  aw_goblins.40.d:0 "£icon_adventurers_wanted_banner£\nL'un des conseillers du [Root.Owner.Monarch.GetTitle] aime dire que deux choses sont constantes dans la vie : la mort et les impôts. Les aventuriers ont clairement fait comprendre aux gobelins de [Root.GetName] que la première option était tout à fait sur la table, le massacre de gobelins étant un classique de tout tableau de quêtes. Mais les gobelins semblent avoir opté pour la seconde voie, du moins c'est le message parvenu à la cour de [Root.Owner.Capital.GetName] par l'intermédiaire de leur représentant un-tout-petit-peu-plus-propre-que-d'habitude.\n\nIl semble qu'ils aient entendu dire que les gobelins pouvaient vivre libres (ou du moins plus libres que d'habitude) en [Root.Owner.GetName], tant qu'ils obéissent aux lois (ou du moins feignent de le faire). Les aventuriers se plaindront assurément des récompenses de quête perdues, et les comptables du [Root.Owner.Monarch.GetTitle] redoutent le casse-tête, mais il est bon de voir ce problème résolu."
  aw_goblins.40.a:0 "La mort."
  aw_goblins.40.b:0 "Les impôts."
  aw_goblins.41.t:0 "Les tribus gobelines soumises"
  aw_goblins.41.d:0 "£icon_adventurers_wanted_banner£\nLa force fait loi. Telle est la règle de [Root.Owner.GetName], et nous n'en avons besoin d'aucune autre. C'est une idée qui n'est pas étrangère aux gobelins qui ont récemment infesté [Root.GetName], du moins c'est ce que nous concluons du somptueux tribut qui vient d'arriver à [Root.Owner.Capital.GetName], accompagné d'une petite délégation de rôdeurs. Ils sont profondément désolés d'avoir empiété sur les terres du [Root.Owner.Monarch.GetTitle], et espèrent que ce présent digne de sa stature convainc de la profondeur de leurs remords. Ils promettent également les plus beaux joyaux et métaux qu'ils découvriront dans leurs galeries si nous leur permettons de rester en [Root.GetName]. [Root.Owner.Monarch.GetName] acceptera-t-il cet arrangement, ou faut-il qu'une bande de guerre aiguise ses haches et se prépare à les expulser ?"
  aw_goblins.41.a:0 "Ils peuvent rester."
  aw_goblins.41.b:0 "Nous ne montrons aucune pitié !"
  aw_goblins.120.t:0 "Reddition gobeline"
  aw_goblins.120.d:0 "£icon_adventurers_wanted_banner£\nVous envoyez un limier après un renard et il revient en disant que le renard veut payer des impôts... Nos aventuriers sont revenus avec la nouvelle qu'ils ont vaincu l'infestation gobeline en [Root.GetName]. Plutôt que de massacrer les créatures, il semble que ces gobelins tiennent à leur vie plus que la plupart des leurs et se soient rendus tôt. Il semble qu'ils veuillent devenir nos sujets. Un tournant inhabituel assurément, et d'autant plus vexant que les aventuriers ont bel et bien rempli leur part du marché pour éliminer l'infestation..."
  aw_goblins.120.a:0 "Ils peuvent rester tant qu'ils obéissent."
  aw_goblins.120.b:0 "Non, confisquer leurs possessions et les renvoyer."
  aw_goblins.121.t:0 "Réaction en chaîne de coups dans le dos"
  aw_goblins.121.d:0 "£icon_adventurers_wanted_banner£\nGobelins et traîtrise forment un duo difficile à surpasser. Un vieux proverbe gobelin affirme qu'il faut toujours porter trois couteaux : un pour les ennemis, un pour les amis, et un pour se poignarder soi-même et accuser quelqu'un d'autre. Cette tendance des gobelins à trahir et à s'entre-tuer a déclenché une grande orgie de violence en [Root.GetName], réduisant considérablement l'infestation, mais au détriment de la province."
  aw_goblins.121.a:0 "Certains problèmes se règlent d'eux-mêmes."
  aw_goblins.122.t:0 "Explosion massive en [Root.GetName]"
  aw_goblins.122.d:0 "£icon_adventurers_wanted_banner£\nIl semble que l'Artisanat Magique ne soit pas l'apanage des gobelins citadins, mais plutôt un besoin inné de faire tout exploser. Les gobelins de [Root.GetName] avaient récemment amassé un énorme stock d'explosifs qui ont, d'une manière ou d'une autre, détoné au mauvais moment. La tempête de feu qui a suivi semble avoir complètement effondré les nids gobelins, et après plusieurs jours, aucun signe de survivants."
  aw_goblins.122.a:0 "Un problème de moins."
  aw_goblins.123.t:0 "La horde gobeline se lève"
  aw_goblins.123.d:0 "£icon_adventurers_wanted_banner£\nC'est un fait bien connu que certaines régions de [Root.GetName] hébergent un grand nombre de gobelins depuis quelques années. Nos efforts pour les déloger ont échoué, et ils sont devenus de plus en plus audacieux grâce à leur nombre. Au cours de la semaine passée, les gobelins ont simultanément jailli de leurs terriers à travers tout [Root.GetName], déterminés à s'emparer d'autant de richesses et de terres que possible. Une grande marée gobeline recouvre le pays, un problème devenu bien trop vaste pour que les aventuriers s'en chargent seuls."
  aw_goblins.123.a:0 "Mobiliser les troupes !"
  aw_goblins.124.t:0 "Préjugés nains envers les gobelins"
  aw_goblins.124.d:0 "£icon_adventurers_wanted_banner£\nComme dans toute espèce, nombre de gobelins dévient de la norme et peuvent devenir des membres précieux de leur communauté si on leur en donne la chance. Cela complique quelque peu le travail des aventuriers qui tentent d'éliminer uniquement les gobelins problématiques d'une zone, surtout avec peu de connaissance du terrain. Fatigué de la lenteur du processus, un groupe de nains de [Root.GetName] a pris les choses en main pour résoudre ce dilemme. En appliquant le vieil adage nain selon lequel le seul bon gobelin est un gobelin mort, ils ont pu traquer et tuer ou expulser efficacement chaque gobelin qu'ils pouvaient trouver, un processus grandement simplifié quand on n'a pas à se soucier de l'identité ou de la valeur de ceux dont le sang est versé."
  aw_goblins.124.a:0 "La fierté de notre clan !"
  aw_goblins.124.b:0 "Cessez ces efforts et laissez le travail aux aventuriers !"
  aw_goblins.130.t:0 "Boom démographique gobelin"
  aw_goblins.130.d:0 "£icon_adventurers_wanted_banner£\nLes gobelins sont prodigieux dans leur capacité à se reproduire, avec des périodes de gestation courtes et des naissances multiples par grossesse. Un petit groupe de gobelins arrivant dans une zone verra ses effectifs gonfler rapidement en un rien de temps. C'est, malheureusement, exactement ce qui s'est passé en [Root.GetName]."
  aw_goblins.130.a:0 "Ils ne sont pas discrets non plus..."
  aw_goblins.130.b:0 "Ils passent à l'attaque !"
  aw_goblins.131.t:0 "Des gobelins sortent de partout !"
  aw_goblins.131.d:0 "£icon_adventurers_wanted_banner£\nSi les gobelins ne poussent pas, à proprement parler, directement des parois des cavernes, on pourrait être pardonné de le croire : leur capacité à se faufiler dans les espaces les plus étroits et à creuser de nouveaux tunnels pour surgir de directions inattendues en grand nombre est bien connue. D'innombrables gobelins supplémentaires ont surgi en [Root.GetName], créant un problème bien plus grave qu'il ne l'était il y a peu."
  aw_goblins.131.a:0 "Mais d'où viennent-ils tous ?"
  aw_goblins.200.t:0 "Les gobelins retournent les champs"
  aw_goblins.200.d:0 "£icon_adventurers_wanted_banner£\nUn groupe de gobelins s'est mis à creuser et à retourner les parcelles agricoles de [Root.GetName]. S'ils ont globalement laissé les paysans tranquilles, la viabilité des cultures dans la zone a été compromise et nous devrons envoyer un fonctionnaire de la cour évaluer les dégâts et ajuster nos attentes fiscales en conséquence."
  aw_goblins.200.a:0 "Les dégâts étaient moins graves qu'annoncé."
  aw_goblins.200.b:0 "Nous devrons réduire nos impôts en [Root.GetName]."
  aw_goblins.200.c:0 "Les taxer tout autant !"
  aw_goblins.201.t:0 "Les gobelins causent une explosion en [Root.GetName]"
  aw_goblins.201.d:0 "£icon_adventurers_wanted_banner£\nLes gobelins ont toujours eu une fascination pour les explosifs : le danger, la puissance et le chaos qu'ils produisent en font un outil idéal et une métaphore assez fidèle de la culture gobeline. Le facteur limitant de leur expertise étant la tendance des inventeurs à ne pas survivre à leur invention. Il n'est pas clair si l'explosion en [Root.GetName] était une attaque directe contre l'un de nos villages ou s'ils avaient simplement infesté les entrepôts locaux. Quoi qu'il en soit, elle a gravement endommagé une partie du village et fait plusieurs victimes."
  aw_goblins.201.a:0 "Nous devons reprendre la situation en main..."
  aw_goblins.202.t:0 "Gemmes gobelines"
  aw_goblins.202.d:0 "£icon_adventurers_wanted_banner£\nL'obsession gobeline de creuser pour trouver des richesses les tue le plus souvent, mais parfois elle rapporte gros. C'est apparemment l'un de ces cas, car les gobelins infestant [Root.GetName] ont découvert un riche filon de pierres précieuses. Si nous agissons vite, nous pourrons les revendiquer pour nous-mêmes !"
  aw_goblins.202.a:0 "À l'assaut !"
  aw_goblins.202.b:0 "Les laisser tranquilles."
  aw_goblins.203.t:0 "Les villageois provoquent les gobelins"
  aw_goblins.203.d:0 "£icon_adventurers_wanted_banner£\nLas d'attendre que les compagnies d'aventuriers règlent le problème gobelin en [Root.GetName], les habitants se sont ligués et ont attaqué les gobelins rôdant près de leur village. Cela ne s'est pas passé comme prévu, et comme en donnant un coup de pied dans une ruche, les villageois ont été rapidement submergés par les gobelins. Fort heureusement, la plupart ont pu s'enfuir, mais les gobelins ont décidé de raser le village en représailles."
  aw_goblins.203.a:0 "Aux armes !"
  aw_goblins.204.t:0 "Les tribus gobelines attaquent un manoir"
  aw_goblins.204.d:0 "£icon_adventurers_wanted_banner£\nLes vils gobelins de [Root.GetName] ont récemment pillé un manoir de renom pour ses joyaux et autres objets de valeur, et au cours de l'attaque, plusieurs nobles ont été blessés et l'un d'eux a été tué. Si nous n'allouons pas de ressources pour traquer ces créatures meurtrières, les nobles ne manqueront pas de douter de notre capacité à les gérer !"
  aw_goblins.204.a:0 "Traquer le groupe de pillards."
  aw_goblins.204.b:0 "Les nobles peuvent s'en charger."
  aw_goblins.205.t:0 "Les gobelins provoquent un effondrement de mine !"
  aw_goblins.205.d:0 "£icon_adventurers_wanted_banner£\nLes gobelins sont réputés pour leur grande capacité à creuser et à miner en quête d'objets de valeur, un talent égalé seulement par leur mépris total de la stabilité structurelle. L'une des mines exploitées par les clans gobelins de [Root.GetName] s'est récemment effondrée, les tunnels sinueux s'affaissant et causant d'immenses dégâts non seulement aux gobelins mais aussi aux colonies voisines, dévastées à grande échelle."
  aw_goblins.205.a:0 "Envoyer des soldats pour déblayer les décombres."
  aw_goblins.205.b:0 "Payer pour le déblaiement des décombres."
  aw_goblins.206.t:0 "Saccage gobelin en état d'ébriété"
  aw_goblins.206.d:0 "£icon_adventurers_wanted_banner£\nSi la consommation prodigieuse d'alcool est un trait que l'on retrouve chez leurs parents proches, les nains, la beuverie est aussi une occupation courante chez de nombreux gobelins, et la quête de davantage d'alcool a récemment conduit un vaste groupe de gobelins en [Root.GetName] à saccager chaque brasserie, vignoble et distillerie qu'ils pouvaient trouver. Quand les sources faciles de liqueur se sont taries, les gobelins se sont rapidement transformés en une foule violente, attaquant les gens, forçant les maisons et semant le chaos."
  aw_goblins.206.a:0 "Envoyez nos plus braves soldats !"
  aw_goblins.207.t:0 "Les gobelins embusquent les routes commerciales"
  aw_goblins.207.d:0 "£icon_adventurers_wanted_banner£\nDans leur quête de toujours plus de richesses et de butin, les gobelins de [Root.GetName] se sont récemment mis à tendre des embuscades aux caravanes marchandes sur les routes menant à ses principales villes, tuant les gardes et s'enfuyant avec les marchandises et les captifs. Beaucoup évitent désormais la région entièrement, les routes restant désertes tandis que les caravanes préfèrent apporter leurs marchandises n'importe où ailleurs plutôt que de risquer une rencontre avec les pillards."
  aw_goblins.207.a:0 "Il faudra du temps pour que la confiance se rétablisse."
  aw_goblins.208.t:0 "Les gobelins envahissent la campagne"
  aw_goblins.208.d:0 "£icon_adventurers_wanted_banner£\nLes gobelins de [Root.GetName] semblent avoir cessé leurs querelles intestines et se sont unis sous un seul seigneur de guerre, déferlant sur la campagne, détruisant les villages et emportant de nombreux captifs et objets de valeur. Puis, aussi vite qu'ils étaient apparus, ils ont de nouveau disparu sous terre avec leur butin."
  aw_goblins.208.a:0 "Il faudra des années pour rebâtir nos fondations."

  aw_goblins_rebels_name:0 "Horde gobeline"
  aw_goblins_rebels_title:0 "Gobelins"
  aw_goblins_rebels_desc:0 "Une masse grouillante de gobelins s'est unie sous la bannière de la mort, de la destruction et du gros butin."
  aw_goblins_rebels_army:0 "Horde gobeline"
  aw_goblins_rebels_demand:0 "Donnez-nous votre or !"
  aw_goblins_rebels_demand_desc:0 "Lorsqu'ils grouillent en une immense horde, les gobelins ne connaissent point la peur. Seule la mort brisera la horde."
  aw_goblins_trade_disruption:0 "Commerce perturbé"
  desc_aw_goblins_trade_disruption:0 "Les embuscades gobelines ont perturbé le commerce dans la région."
  aw_goblins_overrun: "Invasion gobeline"
  desc_aw_goblins_overrun: "Une vaste horde de gobelins a déferlé sur les terres, pillant tout ce qu'elle pouvait avant de se replier prestement sous terre."


  aw_haunted_house_1:0 "§Y(Aventuriers recherchés !)§! §gMaison hantée :§! §OApparitions spectrales§!"
  desc_aw_haunted_house_1:0 "Des visages aux fenêtres. Des silhouettes dans la brume. Les voyageurs ont remarqué que d'étranges phénomènes se produisent dans l'une des vieilles maisons abandonnées des environs..."
  aw_haunted_house_2:0 "§Y(Aventuriers recherchés !)§! §gMaison hantée :§! §ODemeure du Mal, dormante§!"
  desc_aw_haunted_house_2:0 "Une sombre réputation précède une demeure de cette province. Fantômes, spectres et autres phénomènes étranges et morbides s'y produisent fréquemment. Fort heureusement, la maison a été abandonnée en raison de son sinistre passé..."
  aw_haunted_house_3:0 "§Y(Aventuriers recherchés !)§! §gMaison hantée :§! §ODemeure du Mal, active§!"
  desc_aw_haunted_house_3:0 "Une sombre réputation précède une demeure de cette province. Fantômes, spectres et autres phénomènes étranges et morbides s'y produisent fréquemment. Hélas, des occupants mortels s'y sont installés ; après tout, le prix de la propriété était dérisoire. Espérons qu'il ne leur arrivera rien..."


  aw_haunted_house.0.t:0 "Maison des horreurs"
  aw_haunted_house.0.d:0 "£icon_adventurers_wanted_banner£\nDes rumeurs circulent selon lesquelles une demeure singulière dans la province de [Root.GetName] ne serait pas ce qu'elle paraît, et elle s'est acquis une réputation particulièrement sinistre de lieu macabre et lugubre. On dit que quiconque pose le pied sur ses terres est envahi d'une peur rampante qui s'intensifie à mesure que l'on s'approche du cœur de ses fondations, certains affirmant qu'elle est hantée par le souvenir d'un événement horrifique survenu jadis en ces lieux...\n\nQuoi qu'il en soit, les signalements de ces apparitions spectrales semblent se propager au-delà de la maison, terrorisant les villageois et emplissant d'effroi le cœur de ceux qui vivent alentour. Cela ne saurait continuer ; il nous faut quelqu'un pour régler cette affaire sur-le-champ !"
  aw_haunted_house.0.a:0 "Aventuriers recherchés !"
  aw_haunted_house.10.t:0 "Un déplacement inquiétant"
  aw_haunted_house.10.d:0 "£icon_adventurers_wanted_banner£\nIl y a une maison hantée dans la province de [aw_haunted_house_migration_target.GetName], mais n'y en a-t-il pas toujours eu une ? Elle est là depuis des années, des décennies même, terrorisant les villageois qui osent s'en approcher. Pourtant, certains de nos sujets, de manière assez délirante, affirment que cette même maison se trouvait auparavant dans la province de [Root.GetName], et que c'est là qu'elle a toujours été. Une telle chose est absurde, assurément ; les maisons ne peuvent pas simplement exister en deux endroits à la fois, ni se déplacer d'un lieu à l'autre en une nuit, n'est-ce pas ?"
  aw_haunted_house.10.a:0 "N'est-ce pas ?"
  aw_haunted_house.20.t:0 "Dépasser la peur"
  aw_haunted_house.20.d:0 "£icon_adventurers_wanted_banner£\nLe temps passe et les gens changent. Les histoires traversent les âges, certes, mais parfois les menaces qui furent jadis tangibles et réelles sont reléguées au rang de récits lointains, puis plus loin encore en mythes et fables. Les cités ont grandi, les gens ont changé, et les nouvelles générations n'ont tout simplement pas le temps d'écouter les histoires d'une vieille maison aux confins du bourg, assise là dans sa solitude, regardant un lieu qui jadis se souciait d'elle, mais ne s'en soucie plus. Ce ne sont, après tout, que des histoires..."
  aw_haunted_house.20.a:0 "N'est-ce pas ?"
  aw_haunted_house.21.t:0 "Bannis par l'acier"
  aw_haunted_house.21.d:0 "£icon_adventurers_wanted_banner£\nLes aventuriers se réjouirent lorsque le dernier spectre gémit en retournant dans l'éther d'où il venait, accordant au bourg, et peut-être même aux esprits eux-mêmes, la paix qu'ils désiraient depuis si longtemps. Si les villageois n'ont pas pu offrir autant de butin que ce à quoi les aventuriers sont habituellement accoutumés, certains ont dit que la vue du ciel couvert se dégageant en un soleil radieux au-dessus de la maison hantée leur suffisait amplement."
  aw_haunted_house.21.a:0 "Réjouissons-nous !"
  aw_haunted_house.24.t:0 "Le cri des damnés"
  aw_haunted_house.24.d:0 "£icon_adventurers_wanted_banner£\nIl n'y avait aucun intérêt à garder une chose aussi abjecte dans les parages ; même notre peuple, aussi endurant et fort soit-il, était réduit à l'état d'animal gémissant à sa vue. Alors nous avons fait ce que nous faisons toujours avec les choses de cette nature : nous l'avons détruite. À coups de haches et de flammes, nous avons écrasé la chose avec la même furie que nous réservons à nos ennemis vivants, sachant bien que toute chose, même les fantômes, peut périr quand on la frappe assez fort. Mais dans sa destruction, elle lâcha un dernier râle d'agonie, répandant ses énergies maléfiques à travers notre pays et empoisonnant l'esprit de notre peuple d'une peur momentanée, mais intense."
  aw_haunted_house.24.a:0 "Bon débarras, au moins."
  aw_haunted_house.30.t:0 "Un froid sinistre"
  aw_haunted_house.30.d:0 "£icon_adventurers_wanted_banner£\nUn vent souffle à travers le bourg, et tout se tait. Les enfants cessent leurs jeux, et les adultes interrompent ce qu'ils étaient en train de faire. Même les chevaux et les bêtes ne sont pas immunisés contre ce froid, et fuient ou se figent sur place. Certains osèrent se tourner vers sa source, tandis que d'autres choisirent de détourner le regard, loin de cette chose maléfique, cette maison, tandis que de lourds nuages se formaient au-dessus d'elle, enveloppant ses fondations d'une obscurité surnaturelle.\n\nSi nul ne connaît la véritable ampleur de ce qui se passe, une chose est certaine : quelque chose de terrible est arrivé dans leur bourg."
  aw_haunted_house.30.a:0 "Et les choses ne feront qu'empirer."
  aw_haunted_house.120.t:0 "La nuit sans étoiles"
  aw_haunted_house.120.d:0 "£icon_adventurers_wanted_banner£\nLa nuit était morne et sans étoiles ; les villageois voulaient l'ignorer, mais la plupart ne purent s'empêcher de le remarquer. Certains tentèrent de prétendre n'avoir rien vu de particulier dans cette nuit, tandis que d'autres nièrent ou minimisèrent autant qu'ils le purent. Quoi qu'il en soit, les villageois qui réussirent à dormir savaient que quelque chose n'allait pas, mais ne sauraient à quel point avant que le matin ne vienne, quand certains allèrent prendre des nouvelles de la famille qui demeurait dans la vieille maison...\n\nOu du moins, de ce qu'il en restait."
  aw_haunted_house.120.a:0 "Tragique."
  aw_haunted_house.121.t:0 "Vide"
  aw_haunted_house.121.d:0 "£icon_adventurers_wanted_banner£\nLa bande d'aventuriers revint au bourg après s'être suffisamment préparée, prête à protéger la famille dans la supposée maison hantée et à exorciser ses fondations. À leur retour cependant, il n'y avait nulle famille ; en fait, il n'y avait aucun signe qu'ils aient jamais été là, et une immobilité étouffante flottait dans l'air, omniprésente et suffocante pour quiconque respirait le même air que la maison. Les aventuriers cherchèrent durant des heures, jusqu'à ce qu'un jour entier se soit écoulé, mais rien ne fut découvert. Pas même le gémissement d'un fantôme, ni le craquement d'un plancher... juste...\n\nRien..."
  aw_haunted_house.121.a:0 "Déconcertant."
  aw_haunted_house.122.t:0 "En plein jour"
  aw_haunted_house.122.d:0 "£icon_adventurers_wanted_banner£\nLa peur s'empare du bourg tandis que les rumeurs circulent comme la peste. Les récits se contredisent et nul ne s'accorde sur les détails, mais une chose est certaine : la famille qui vivait dans la maison a disparu, présumée morte. Le dernier membre de la famille aperçu était apparemment « de bonne humeur », selon un villageois, bien que ce fût une sorte de bonheur plutôt sinistre et étrange. Ce même villageois le vit rentrer chez lui ce jour-là, sur le chemin du retour vers cette maison des horreurs, à travers un brouillard aussi épais que les nuages du ciel.\n\nC'était hier, et ce fut la dernière fois que quiconque revit jamais la famille."
  aw_haunted_house.122.a:0 "Déconcertant."
  aw_haunted_house.123.t:0 "Surgi de la terre"
  aw_haunted_house.123.d:0 "£icon_adventurers_wanted_banner£\nUn grand grondement a secoué le bourg, et beaucoup sont harassés par les tremblements de la terre. Des poteaux sont tombés, des pierres ont roulé, et pots et bibelots ont été renversés de leurs étagères. Certains ont été blessés, mais aucune blessure mortelle, et le bourg semble pouvoir reprendre son cours normal après cela. Cependant, quand quelques personnes inquiètes décidèrent d'aller vérifier la maison, celle toujours couverte par l'ombre des nuages, ils ne trouvèrent aucune trace des gens qui y résidaient, ni aucun signe de dégâts aux alentours.\n\nDes équipes de recherche furent envoyées, mais rien ne fut jamais retrouvé de la famille."
  aw_haunted_house.123.a:0 "Intrigant."
  aw_haunted_house.124.t:0 "Un coupable maladroit"
  aw_haunted_house.124.d:0 "£icon_adventurers_wanted_banner£\nLes phénomènes étaient nombreux, mais les pièces du puzzle ne collaient pas. Des cordes effilochées ici, des empreintes de pas là où il n'aurait pas dû y en avoir, de la poussière dans des endroits inhabités depuis des décennies ; c'était déconcertant. L'indice décisif fut les objets de valeur dérobés : « pourquoi donc un fantôme aurait-il besoin de babioles d'or et d'argent ? » nota l'un des aventuriers les plus hardis, déclenchant une alarme dans tous les esprits. Au moment de la prochaine hantise, ils étaient prêts, ayant installé des pièges élaborés selon les suggestions du chef de groupe, avec le chasseur couard et son compagnon animal placés en appâts bien malgré eux.\n\nUne course-poursuite s'ensuivit à travers le manoir et le plan faillit échouer, mais une redirection de dernière seconde par le barde assura leur succès. Le « fantôme » capturé et les villageois rassemblés, le mage s'avança et confirma leur intuition...\n\nLes villageois poussèrent un cri de stupeur, certains murmurant leur incrédulité, tandis que l'un d'eux clama sa vindication : « Je le savais ! Vous pensiez tous que c'était moi ! » s'exclama-t-il, tandis que le vrai coupable, furieux et ligoté, grommela les détails de ses plans, se vantant de la perfection de son coup de génie."
  aw_haunted_house.124.a:0 "J'y serais arrivé, si ce n'était pour vous autres, aventuriers fouineurs !"
  aw_haunted_house.125.t:0 "Incendie"
  aw_haunted_house.125.d:0 "£icon_adventurers_wanted_banner£\nLes gardes virent la flamme en premier depuis leur poste ; c'était bizarre, car elle ne fumait presque pas, ne dégageant qu'une infime quantité de fumée avant d'éructer en un feu abominable. Les flammes semblaient danser de manière surnaturelle, grandissant et se tordant pour toucher tout ce qui se trouvait dans l'enceinte du manoir, engloutissant tout, des murs de bois jusqu'aux barreaux de fer du portail. Les villageois furent pris de panique quand la flamme se propagea à travers l'herbe morte entourant le domaine, agrippant désespérément leurs seaux tandis que le feu, hors de tout contrôle, valsait à travers leur bourg, consumant tout ce qu'il touchait, y compris les malheureux pris dans son sillage.\n\nLa maison hantée qui jadis se dressait sinistrement au-dessus des habitants de [Root.GetName] n'est plus, épargnant à jamais les gens de ses horreurs, ayant quitté ce monde de la même manière qu'elle y vécut : en terrorisant et traumatisant tous ceux en sa présence."
  aw_haunted_house.125.a:0 "Et en créant davantage d'esprits vengeurs."
  aw_haunted_house.126.t:0 "Exorcisme de la maison hantée"
  aw_haunted_house.126.d:0 "£icon_adventurers_wanted_banner£\nSi les gens d'Église de la foi [Root.Owner.Religion.GetName] se préoccupent souvent de questions de foi et de surnaturel, il est rare qu'ils sortent eux-mêmes pour affronter directement les affaires du profane. Le plus souvent, ils se contentent d'accorder des bénédictions ou même des reliques sacrées à nos aventuriers et guerriers à ces fins. Cependant, de temps à autre, un homme ou une femme de foi, tel un clerc ou un paladin, s'aventure dehors pour affronter l'adversité seul, servant à la fois de rempart et d'épée pour notre foi, défendant les innocents contre les outrages du surnaturel en enfonçant le pieu dans le cœur proverbial, et parfois littéral, du mal.\n\nAujourd'hui, un clerc d'un sanctuaire local en a eu assez et a fait irruption seul dans la maison hantée, vêtu d'armure mais protégé avant tout par sa foi. Si la lutte fut terrible, la foi finit par triompher du mal, les fantômes étant bannis dans l'éther une fois de plus."
  aw_haunted_house.126.a:0 "Repoussez les morts-vivants !"
  aw_haunted_house.130.t:0 "De nouveaux visages"
  aw_haunted_house.130.d:0 "£icon_adventurers_wanted_banner£\nUne nouvelle famille a emménagé en ville, une famille qui venait tout juste d'avoir des enfants pour la première fois après des années d'échecs. Ils sont venus chercher l'air frais et une communauté, s'installant avec ravissement en lisière du bourg. Ce sont de braves gens, amicaux, gentils... mais ô combien imprudents.\n\nLes villageois ne purent que les observer, le souffle coupé, tandis qu'ils sautillaient sur les pierres de cette maison, se dressant au-dessus d'eux tel un prédateur guettant l'occasion parfaite."
  aw_haunted_house.130.a:0 "De toutes les maisons à choisir..."
  aw_haunted_house.131.t:0 "Ceux qui fuient"
  aw_haunted_house.131.d:0 "£icon_adventurers_wanted_banner£\nLes guerres et occupations étrangères peuvent être grandioses pour ceux qui jouent le jeu de l'acier et de la conquête, mais elles ne sont jamais aussi glorieuses pour ceux qui veulent simplement vivre leur vie. Un groupe de lointains étrangers fuyant la persécution est arrivé au bourg, suppliant les autorités locales de les loger, d'accepter leur argent ne serait-ce que pour un bref séjour. La cruauté des fonctionnaires, cependant, ne connaît pas de limites, et bien qu'ils aient accepté le marché et les maigres sommes, les réfugiés ne furent autorisés à vivre qu'en un seul endroit : la maison aux confins du bourg.\n\nCe fut un acte révoltant, même pour les plus sectaires du bourg, mais la nouvelle famille n'en savait rien, et n'eut d'autre choix que de sceller son propre destin."
  aw_haunted_house.131.a:0 "N'y a-t-il aucune pitié ?"
  aw_haunted_house.132.t:0 "Héritiers infortunés"
  aw_haunted_house.132.d:0 "£icon_adventurers_wanted_banner£\nUne branche déchue d'une maison jadis prestigieuse de notre cour se serait installée dans un bourg sans importance de la province de [Root.GetName], notable uniquement pour la maison, prétendument, hantée à sa lisière. On dit qu'ils ne sont là que pour se reposer et reconstituer leurs investissements, et pour se remettre sur pied. La misère de leur demeure choisie a provoqué un émoi parmi les nantis, mais c'est à peine surprenant compte tenu du scandale qui a ébranlé leur famille, suffisant à priver n'importe quel homme de son emploi et de son honneur.\n\nÀ l'insu de tous sauf des villageois, le scandale dont ils fuyaient deviendrait le moindre de leurs soucis."
  aw_haunted_house.132.a:0 "En effet."
  aw_haunted_house.133.t:0 "Pâles et solitaires"
  aw_haunted_house.133.d:0 "£icon_adventurers_wanted_banner£\nComme surgie de nulle part, une famille, qui aurait apparemment vécu dans le bourg depuis des mois, s'est présentée avec une demande personnelle d'investigation de leur maison, ce qui fut une surprise pour bien plus que les greffiers et fonctionnaires du bourg. Ils affirment que les hantises se produisent depuis des mois, mais qu'ils ont été ignorés très longtemps ; apparemment, leur apparence a trompé les autres villageois qui les prenaient pour les fantômes eux-mêmes, car ils s'étaient installés en silence et avaient délibérément évité tout contact pendant si longtemps.\n\nQuoi qu'il en soit, il semble que des fantômes vivent véritablement dans cette maison, et sont suffisamment réels pour effrayer une famille déjà bien étrange."
  aw_haunted_house.133.a:0 "Ils auraient pu demander plus tôt..."
  aw_haunted_house.134.t:0 "Hubris sacré"
  aw_haunted_house.134.d:0 "£icon_adventurers_wanted_banner£\nIl y a une raison pour laquelle la plupart des hommes de foi et leurs disciples ne s'aventurent pas seuls pour affronter les choses profanes et surnaturelles de leur entourage. Les hommes de foi sont souvent faibles, inaptes à toute forme de combat, à moins d'être des individus exceptionnels comme les paladins qui se tournent vers l'aventure. Ils sont davantage faits pour la table d'écriture et le fauteuil rembourré que pour quelque champ de bataille que ce soit. Il ne manque néanmoins jamais de prêtres téméraires dont l'orgueil est aussi démesuré que fragile, persuadés que tout ce qu'il faut pour vaincre le mal, c'est du savoir et quelques reliques.\n\nC'est ce qui est arrivé dans le cas de la maison hantée de [Root.GetName], où un jeune ambitieux au cœur enflammé fut promptement éteint après s'y être précipité sans préparation ni information suffisante, enhardissant les fantômes et renforçant leur confiance à la vue de l'homme de foi qui tourna les talons, laissant tomber toutes ses reliques sacrées et courant au dehors comme un enfant apeuré."
  aw_haunted_house.134.a:0 "Formidable... vraiment formidable..."
  aw_haunted_house.134.b:0 "...mais ma foi est VRAIE !"
  #There was a b option here I removed it I didn't think it was necessary.
  aw_haunted_house.135.t:0 "Frissons et sueurs froides"
  aw_haunted_house.135.d:0 "£icon_adventurers_wanted_banner£\nLes nantis de notre société sont en émoi face aux récentes rumeurs d'apparitions spectrales dans la province de [Root.GetName], certains allant jusqu'à vouloir visiter les lieux eux-mêmes pour la nouveauté et le frisson de voir un véritable fantôme. Si beaucoup au sein de notre gouvernement voient cet engouement comme une aubaine à exploiter, les villageois et citoyens de [Root.GetName] avertissent que de telles actions ne feraient qu'enrager davantage les fantômes et attirer leur courroux sur le bourg. Quelle ligne de conduite devrions-nous adopter ?"
  aw_haunted_house.135.a:0 "Les profits avant les histoires de fantômes."
  aw_haunted_house.135.b:0 "Était-ce un frisson dans mon dos ?"
  aw_haunted_house.200.t:0 "Récoltes flétries"
  aw_haunted_house.200.d:0 "£icon_adventurers_wanted_banner£\nUn miasme putride emplit l'air, et les villageois suffoquent. L'odeur les a frappés soudainement, s'infiltrant dans leurs maisons tel un voleur ou un brigand, envahissant leurs pièces et emplissant leurs poumons d'un gaz nauséabond et surnaturel. Les plus proches de la source, cette maison maléfique à la lisière du bourg, ont même évacué leurs foyers en hâte, laissant derrière eux nourriture et objets de valeur sans doute putréfiés dès la première heure d'exposition à cette odeur pestilentielle.\n\nTandis que nous parlons, l'odeur ne fait que se répandre davantage, empoisonnant les récoltes et tout bétail assez malheureux pour y être exposé trop longtemps. Les villageois réclament une solution à grands cris : les uns suggèrent de régler le problème directement, en envoyant nos plus braves trouver la source de la puanteur et la brûler, tandis que d'autres veulent monter une expédition plus complète et exciser le mal sans risquer un grand incendie."
  aw_haunted_house.200.a:0 "Brûlons tout !"
  aw_haunted_house.200.b:0 "Bouchez-vous le nez, ça va prendre un moment."
  aw_haunted_house.201.t:0 "Couloirs mouvants, murs grandissants"
  aw_haunted_house.201.d:0 "£icon_adventurers_wanted_banner£\nLes plans du vieux manoir sont d'une conception archaïque et biscornue qui, combinée aux circonstances déconcertantes qui l'entourent, incluant entre autres : apparitions spectrales, mites du bois, créatures dans les couloirs et occupants malicieux s'obstinant à déplacer les meubles, font que traverser cette demeure ressemble davantage à un grand labyrinthe de haies qu'à un véritable foyer. Des escaliers menant nulle part, des portes ouvrant sur des murs, des caves dans des caves avec des échelles menant à d'autres pièces, le tout dans un limbe apparemment malveillant qui modifie l'agencement de la maison à chaque expédition successive. Les cartes sont inutiles, et l'on doit se fier à son propre instinct et au caprice des morts agités.\n\nPeut-être était-ce de la folie, peut-être une ingérence maléfique, mais une bande récemment envoyée explorer le manoir n'est toujours pas revenue une semaine après la date prévue. Leurs provisions s'amenuisent sans doute, et ce qui les retient là-bas pourrait bientôt en faire une compagnie éternelle. La question est : risquons-nous une autre bande pour leur seul retour ?"
  aw_haunted_house.201.a:0 "Plus aucun fantôme ne remplira ces halls !"
  aw_haunted_house.201.b:0 "Il y a toujours d'autres aventuriers."
  aw_haunted_house.202.t:0 "Le vacarme des morts"
  aw_haunted_house.202.d:0 "£icon_adventurers_wanted_banner£\nCela commença par un gémissement, inaperçu dans l'agitation de la vie au village, ce cri inquiétant à peine perceptible dans les lieux de repos, où le silence était nécessaire pour apaiser les blessés et les épuisés. Puis il devint un grondement, changeant de tonalité comme l'exercice d'un apprenti luthiste, audible même dans les conversations entre proches. Puis il cessa, et beaucoup tentèrent de l'ignorer, comme s'il n'avait jamais existé et ne reviendrait jamais.\n\nÔ combien ils avaient tort.\n\nQuand il revint, ce fut la nuit, et il passa au-delà des oreilles des villageois pour s'insinuer dans leurs esprits ; c'était un hurlement abominable, un gémissement maudit, le cri perçant d'un nourrisson et le hurlement d'un homme agonisant tout à la fois. Les plus forts pressèrent leurs mains sur leurs oreilles si fort qu'elles faillirent être broyées, ceux qui ne le purent virent leurs yeux vibrer tandis que leur nez saignait, et les moins fortunés furent retrouvés bavant au sol, les yeux révulsés, la vie éteinte.\n\nQuand les gémissements cessèrent, les gens les plus proches de ce chant glaçant étaient irrémédiablement changés, et ne désirent plus qu'une chose : partir, partir avec au moins un semblant de raison intacte."
  aw_haunted_house.202.a:0 "Vous pouvez partir."
  aw_haunted_house.202.b:0 "Il y a pire destin que des oreilles qui saignent."
  aw_haunted_house.203.t:0 "Cauchemar éveillé"
  aw_haunted_house.203.d:0 "£icon_adventurers_wanted_banner£\nLe bourg est en état de paralysie, et ce qui reste de cette localité animée n'est plus qu'un désert vide et sombre, les villageois barricadés dans leurs propres maisons, trop effrayés pour dormir ou même cligner des yeux, ou partis vers des cieux plus cléments où ils n'ont pas à craindre leurs propres ombres. Les champs sont dépourvus de toute flore et faune, la forêt envahie d'arbres sinistres, et une aura mortifère émane de ce phare pestilentiel assis dans la partie la plus maudite de la lisière du bourg. Les cieux couverts pointent vers ce phare, ce qui fut jadis une maison de bonne renommée et de joie, à présent une abomination persistante.\n\nLe mal est venu en ces terres il y a longtemps, et maintenant le mal a triomphé."
  aw_haunted_house.203.a:0 "Pour l'instant..."
  aw_haunted_house.204.t:0 "ENTENDS MA VOIX, OBÉIS À MON APPEL"
  aw_haunted_house.204.d:0 "£icon_adventurers_wanted_banner£\nUn fou furieux a fait irruption sur la place du bourg en plein accès de démence ; sa respiration était laborieuse et aussi déchirée que ses vêtements, déchirés par endroits et se déchirant encore sous sa propre main. Les ouvriers et ouvrières s'écartèrent tandis qu'il hurlait et gémissait, son corps se contorsionnant de manières jamais prévues pour les corps humains, crachant un hideux liquide semblable à du goudron par la bouche. Les villageois ne purent que regarder l'homme, un membre de la famille d'une maison à la sinistre réputation, se mutiler davantage contre sa propre volonté, impuissant et incapable de rien faire tandis que le goudron emplissait ses yeux et que ses cris étouffés emplissaient leurs oreilles.\n\nL'homme gisait là, silencieux, recroquevillé tandis que les gardes l'encerclaient. Les secondes passèrent, puis les minutes, et il semblait que le cauchemar, aussi horrifique fût-il, s'était achevé aussi vite qu'il avait commencé... jusqu'à ce qu'il se remette à bouger...\n\nAvec un cri maudit, un son que beaucoup peuvent encore se remémorer avec une clarté parfaite, il revint, un calme surnaturel enduisant chaque syllabe maudite qu'il crachait. Il tordit la tête sur le côté et se mit à parler de l'avenir, de cieux lugubres et de peste, de flammes et de hordes de sans-âmes, avant de terminer sa tirade par un rire qui tordait l'esprit autant qu'il tordait son propre corps."
  aw_haunted_house.204.a:0 "..."
  aw_haunted_house.205.t:0 "L'innocence n'est pas épargnée"
  aw_haunted_house.205.d:0 "£icon_adventurers_wanted_banner£\nUne plainte déchire la nuit. Elle est stridente, elle est lugubre, elle est inéluctable. Le chagrin s'insinue par les fissures de chaque foyer et pénètre l'esprit de ceux qui l'entendent. D'autres voix suivent la première, certaines pleurent avec elle, d'autres tentent encore de la consoler.\n\nPlus tôt dans la journée, deux enfants ont disparu, et ils sont toujours portés manquants. Ils se sont perdus quand le jour était encore neuf et frais comme la joie sur leurs visages, chaud comme l'étreinte qu'ils sentaient dans les bras de leur mère, et plein d'espoir comme leur père quand il est parti travailler aujourd'hui. Il est minuit à présent, et les recherches nocturnes n'ont rien donné. La nouvelle est tombée, froide pour la mère, sinistre pour le père, et ils ne purent s'empêcher de pleurer, de pleurer dans la nuit tandis qu'une poupée esseulée fut retrouvée près de la maison du mal, un jouet qui ne pouvait appartenir qu'à leur enfant."
  aw_haunted_house.205.a:0 "..."
  aw_haunted_house.206.t:0 "Ménagerie morbide"
  aw_haunted_house.206.d:0 "£icon_adventurers_wanted_banner£\nQuelques individus particulièrement excentriques se sont présentés à la cour, s'enquérant des récents événements dans la province de [Root.GetName]. Ils prétendent être des collectionneurs d'artefacts mystiques et profanes, et nous offrent une coquette somme directement si nous leur procurons quelques objets remarquables pour une exposition destinée aux riches habitants de notre pays.\n\nUn tel marché serait assurément profitable, mais quelque chose me dit que manipuler des artefacts maudits n'est peut-être pas la meilleure des idées..."
  aw_haunted_house.206.a:0 "Inutile d'être si superstitieux, tout ira bien !"
  aw_haunted_house.206.b:0 "Vous savez quoi ? Vous n'avez pas tort."

