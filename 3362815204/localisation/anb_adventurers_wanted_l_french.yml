  reduced_aw_ghouls_tt:0 "Probabilité §Gréduite§! d'apparition de §Y(Aventuriers recherchés !)§! §WGoules§! dans notre pays."

  aw_ghouls_1:0 "§Y(Aventuriers recherchés !)§! §gGoules :§! §ORôdeurs charognards§!"
  desc_aw_ghouls_1:0 "Des signalements affluent de créatures étranges rôdant dans les cimetières et les charniers. Les témoins décrivent des êtres de forme vaguement humanoïde, à la peau grise et aux langues et bras anormalement longs, ces derniers se terminant par des griffes acérées comme des rasoirs. Cette description est sans équivoque : ce sont des goules, des abominations mortes-vivantes qui se repaissent inlassablement des cadavres. Passives tant qu'un approvisionnement régulier en corps les rassasie, les goules deviennent hostiles en l'absence de chair morte ou lorsque leur repas est interrompu. Il faudra les éliminer avant qu'elles ne deviennent un problème majeur."
  aw_ghouls_2:0 "§Y(Aventuriers recherchés !)§! §gGoules :§! §OInfestation de goules§!"
  desc_aw_ghouls_2:0 "Les observations d'humanoïdes à la peau grise dévorant les morts ont considérablement augmenté ces derniers mois, et la réalité ne peut plus être ignorée. Qu'une grande quantité de cadavres les ait attirées d'ailleurs, ou que des mortels frappés par une épidémie de fièvre des goules se soient transformés post mortem, le résultat est le même : la province est pratiquement envahie par les goules. Les mourants sont chassés de leurs foyers par des proches terrifiés à l'idée d'attirer les dévoreurs de chair, et les équipes de travail s'empressent avec précaution de se débarrasser des cadavres frais de peur que des meutes entières de goules ne fondent sur les corps à la tombée de la nuit, dévorant quiconque se trouvant sur leur passage."

  aw_ghouls.0.t:0 "Apparition de goules dans la province de [Root.GetName]"
  aw_ghouls.0.d:0 "£icon_adventurers_wanted_banner£\nLes goules sont des créatures mortes-vivantes animées par une faim insatiable de chair morte. Affectionnant particulièrement les cadavres frais, elles sont attirées là où des tombes fraîchement creusées peuvent être trouvées et profanées : champs de bataille, cimetières, cryptes et régions frappées par la peste. La dévastation considérable qui a frappé la province de [Root.GetName] a créé les conditions idéales pour que les goules chassent, et elles ont commencé à apparaître dans la région en nombre significatif."
  aw_ghouls.22.t:0 "Les goules meurent de faim ou fuient"
  aw_ghouls.22.d:0 "£icon_adventurers_wanted_banner£\nBien que leur nombre puisse augmenter de manière exponentielle lorsque les cadavres abondent, les goules ont besoin de chair de défunts pour sustenter leur corps, et commencent à se décomposer si elles n'ont pas pu se nourrir depuis plus de quinze jours. Que ce soit par surconsommation ou par élimination adéquate, le manque de cadavres facilement disponibles dans la province de [Root.GetName] a privé les créatures de leur nourriture, et elles sont bien moins nombreuses qu'auparavant. Beaucoup sont mortes de faim, leurs dépouilles desséchées retrouvées par les patrouilles, tandis que d'autres ont quitté la région pour de meilleurs terrains de chasse."
  aw_ghouls.22.a:0 "Au moins la fin de ce cauchemar est en vue."
  aw_ghouls.23.t:0 "Des aventuriers détruisent les nids de goules"
  aw_ghouls.23.d:0 "£icon_adventurers_wanted_banner£\nLes aventuriers engagés pour régler le problème des goules dans la province de [Root.GetName] ont porté un coup terrible aux ignobles créatures. Descendant dans les repaires souterrains qu'elles favorisent comme refuges diurnes, un groupe de guerriers intrépides a réussi à faire effondrer le plafond de la chambre fétide où des dizaines de créatures dormaient. À la suite de ce raid audacieux, les signalements de goules ont chuté brutalement."
  aw_ghouls.23.a:0 "Ils ont fait du bon travail ; nous avons fait le bon choix en les engageant."
  aw_ghouls.25.t:0 "Des guerriers détruisent un nid de goules"
  aw_ghouls.25.d:0 "£icon_adventurers_wanted_banner£\nNos guerriers ont réussi à pister les goules qui infestent la province de [Root.GetName] jusqu'à l'un de leurs répugnants repaires et les ont attaquées avant qu'elles ne puissent s'échapper. Bien que nombre de nos braves combattants soient tombés, pas une seule créature n'a survécu. Les signalements de goules ont fortement diminué depuis la mission, et les habitants de [Root.GetName] dorment un peu plus en sécurité la nuit."
  aw_ghouls.25.a:0 "Une grande victoire !"
  aw_ghouls.30.t:0 "Épidémie de fièvre des goules dans la province de [Root.GetName]"
  aw_ghouls.30.d:0 "£icon_adventurers_wanted_banner£\n« Ceux qui survivent initialement à la morsure d'une goule ne sont pas tirés d'affaire, car la salive de ces ignobles créatures est porteuse d'une maladie mortelle. Connue familièrement sous le nom de fièvre des goules, les personnes affectées développent une fièvre intense quelques heures après l'infection. Cette fièvre est suivie d'hallucinations, d'une perte de poids rapide et d'une faim intense, le sujet tentant d'apaiser la douleur brûlante de son estomac avec tout ce qui lui tombe sous la main. Mortelle dans 90 % des cas, les patients périssent généralement dans les 24 heures suivant l'apparition des symptômes avant de se relever le minuit suivant sous forme de goule. En dehors de la morsure elle-même, la salive de goule semble rester un vecteur de maladie puissant jusqu'à quatre heures après avoir séché, ce qui pourrait expliquer les soi-disant « épidémies de fièvre des goules » observées dans certaines circonstances. »\n\n— Des afflictions surnaturelles, Dr. Reginald síl Vekt, 1876"
  aw_ghouls.30.a:0 "Nous devrons imposer des mesures strictes pour contrôler l'épidémie dans la province de [Root.GetName]."
  aw_ghouls.110.t:0 "Des goules attirées par un champ de bataille"
  aw_ghouls.110.d:0 "£icon_adventurers_wanted_banner£\nPlus encore que les cimetières, un champ de bataille est le terrain de chasse idéal pour les goules. Les innombrables corps de morts et de mourants laissés dans le sillage des affrontements entre armées sont rarement éliminés convenablement, et fournissent une source de nourriture abondante aux monstres. La récente bataille livrée dans la province de [Root.GetName] a offert une telle occasion aux goules de se gorger de chair fraîchement morte, et elles grouillent à présent dans la campagne autour du site de la bataille."
  aw_ghouls.200.t:0 "Des goules profanent les sépultures"
  aw_ghouls.200.d:0 "£icon_adventurers_wanted_banner£\nBien qu'elles préfèrent la chair des défunts récents, les goules ne sont pas particulièrement difficiles quant aux corps qu'elles consomment. En accédant à une crypte ou un mausolée, elles brisent chaque sépulcre et déterrent chaque tombe pour consommer la chair et ronger les os des morts, se déplaçant une fois qu'il n'y a plus de nourriture. Même après le départ des créatures, les dégâts demeurent, et nombre d'habitants de [Root.GetName] sont furieux ou traumatisés par la profanation des tombes de leurs ancêtres. Les demandes d'action pour empêcher de telles perversions, et les accusations selon lesquelles nous ne nous en soucions pas, se font plus véhémentes chaque jour."
  aw_ghouls.200.a:0 "Leur assurer que nous tentons de résoudre le problème."
  aw_ghouls.201.t:0 "Des goules attaquent des villages"
  aw_ghouls.201.d:0 "£icon_adventurers_wanted_banner£\nBien qu'elles préfèrent la chair des morts, les goules pourchassent des proies vivantes et en font des cadavres quand il n'y a pas de sources de corps facilement disponibles. Les goules qui se retrouvent dans des régions sans proie facile forment souvent des meutes de 5 à 8 individus et arpentent les rues sombres et les sentiers isolés la nuit, attaquant les voyageurs ou les hameaux isolés et dévorant les victimes. Une série de telles attaques s'est récemment produite dans la province de [Root.GetName], démontrant que le problème des goules n'est pas encore résolu."
  aw_ghouls.201.a:0 "Nous les vengerons."
  aw_ghouls.202.t:0 "Des cadavres obstruent les égouts"
  aw_ghouls.202.d:0 "£icon_adventurers_wanted_banner£\nSi les goules se tapissent traditionnellement dans les grottes, les forêts profondes ou les tombeaux souterrains, les grandes cités offrent un autre habitat auquel elles sont parfaitement adaptées : les égouts. Une série d'attaques de goules à proximité de plusieurs entrées d'égouts, ainsi que la disparition de dératiseurs et d'autres ouvriers envoyés enquêter, indique une forte présence de goules dans le réseau d'égouts, tout comme les morceaux de corps que l'on retrouve obstruant les drains des égouts à travers la cité. Si les égouts ne sont pas débarrassés des goules et des cadavres rapidement, les conditions insalubres qu'elles provoquent pourraient dégénérer en une épidémie majeure."
  aw_ghouls.202.a:0 "Malédiction !"
  aw_ghouls.202.b:0 "Heureusement, le réseau d'égouts efficacement conçu par [Root.Monarch.GetName] devrait nous permettre de contourner ce problème."
  aw_ghouls.203.t:0 "Champs de cadavres de [Root.GetName]"
  aw_ghouls.203.d:0 "£icon_adventurers_wanted_banner£\nQuand les morts se comptent par milliers et que les corbeaux charognards emplissent les airs, les goules fondent sur les terres et créent un Champ de Cadavres. Rôdant librement et festoyant sur les corps à moitié dévorés, un Champ de Cadavres est un lieu anathème aux mortels, davantage un royaume des morts que des vivants, où monstres prédateurs et maladies abondent. Le problème de goules non résolu dans notre nation s'est manifesté par la présence de nombreux sites de ce type éparpillés à travers notre royaume, leur existence confirmée par des éclaireurs aventureux. L'effroi emplit le cœur de tous à mesure que la nouvelle se répand, et les déplacements se sont presque entièrement arrêtés en de nombreux endroits, les gens se terrant et espérant désespérément échapper à l'attention de la menace des goules."
  aw_ghouls.203.a:0 "Un spectacle digne de la damnation... que les dieux nous préservent d'une telle menace."
  aw_ghouls.204.t:0 "Une puanteur de blême"
  aw_ghouls.204.d:0 "£icon_adventurers_wanted_banner£\nSi les goules sont considérées comme des morts-vivants conscients, elles sont largement guidées par leurs besoins bestiaux de chair, ce qui les rend d'autant plus terrifiantes. Une goule exposée à de puissantes magies, cependant, se transforme en une créature bien plus dangereuse : un blême. Dotée d'une force et d'une ruse dépassant de loin celles d'une goule ordinaire, le blême mène de vastes meutes de goules lors de raids contre les vivants et se délecte de la destruction qu'il cause. Reconnaissable à son horrible puanteur, une odeur de pourriture et de fermentation l'enveloppe en permanence, assez puissante pour faire vomir les guerriers les plus endurcis. Nous avons reçu des nouvelles d'une telle créature aperçue dans la province de [Root.GetName], menant des meutes de dizaines de goules et laissant un sillage de destruction dans son passage."
  aw_ghouls.204.a:0 "Quelles nouvelles sinistres."
  aw_ghouls.205.t:0 "Des prêtres exigent la protection des lieux de sépulture"
  aw_ghouls.205.d:0 "£icon_adventurers_wanted_banner£\nBien qu'elles préfèrent la chair des défunts récents, les goules ne sont pas particulièrement difficiles quant aux corps qu'elles consomment. En accédant à une crypte ou un mausolée, elles brisent chaque sépulcre et déterrent chaque tombe pour consommer la chair et ronger les os des morts, se déplaçant une fois qu'il n'y a plus de nourriture. La profanation des tombes dans la province de [Root.GetName] par les goules qui infestent la région a attiré le courroux du clergé, qui exige que nous fassions davantage pour protéger les lieux de repos des morts. Certains sont allés jusqu'à nous accuser d'inaction délibérée, prétendant que nous avons pris le parti des forces ignobles qui animent les morts."
  aw_ghouls.205.a:0 "Nous regagnerons leur loyauté une fois les monstres éliminés."
  aw_ghouls.205.b:0 "Ils n'oseraient certainement pas accuser [Root.Owner.Monarch.GetName] d'abandonner les fidèles ?"

