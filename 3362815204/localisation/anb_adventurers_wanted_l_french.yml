  aw_orcs_1:0 "§Y(Aventuriers recherchés !)§! §gOrques :§! §OParti de pillards§!"
  desc_aw_orcs_1:0 "Carrures massives et armes au poing, un parti de pillards orques n'est pas un spectacle agréable à l'horizon, et encore moins de près. Bien qu'ils ne soient pas cruels par nature, les orques tueront tout ce qu'ils perçoivent comme une menace. La force fait loi chez les orques, et à présent ils sont venus chez nous."
  aw_orcs_2:0 "§Y(Aventuriers recherchés !)§! §gOrques :§! §OBande de guerre§!"
  desc_aw_orcs_2:0 "Une bande de guerre orque s'est levée en grand nombre pour piller tout ce qu'elle juge de valeur et détruire le reste. À cette taille, aucune milice ordinaire ne saurait leur résister. Il nous faudra nos meilleurs groupes d'aventuriers pour affronter une telle force. Seuls le nombre et l'expérience peuvent nous sauver désormais."
  aw_orcs_3:0 "§Y(Aventuriers recherchés !)§! §gOrques :§! §OClan migratoire§!"
  desc_aw_orcs_3:0 "Un clan errant d'orques traverse nos terres. Bien qu'ils ne soient pas venus pour le sang, ces migrants restent une menace et réagiront agressivement à toute approche, aussi bien intentionnée soit-elle. Ils doivent être traités avec la plus grande prudence tant qu'ils demeurent sur nos terres. Avec un peu de chance, ils ne feront que passer, si nous ne parvenons pas à nous en occuper."

  aw_orcs_migrate_to_other_country_tt:0 "Les orques migrent vers un pays voisin."

  aw_orcs.0.t:0 "Arrivée d'une bande de guerre orque"
  aw_orcs.0.d:0 "£icon_adventurers_wanted_banner£\nUne bande de guerre orque est arrivée dans la province de [Root.GetName], provoquant la panique parmi la population. Ils demandent un soutien immédiat, craignant que leurs colonies périphériques ne soient pillées. Les milices locales ne sont pas assez nombreuses pour défendre partout à la fois, et encore moins pour éliminer la bande par elles-mêmes."
  aw_orcs.0.a:0 "Il faut s'en occuper."
  aw_orcs.10.t:0 "Migration de la bande de guerre orque"
  aw_orcs.10.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque qui causait des troubles dans la province de [Root.GetName] a migré, sentant apparemment qu'il n'y avait plus rien à piller en sécurité. Elle sème à présent le désordre dans la province de [aw_orcs_migration_target.GetName]."
  aw_orcs.10.a:0 "Nous devrons déplacer nos efforts."
  aw_orcs.10.b:0 "C'est le problème de quelqu'un d'autre désormais."
  aw_orcs.11.t:0 "Une bande de guerre orque migre sur nos terres"
  aw_orcs.11.d:0 "£icon_adventurers_wanted_banner£\nUne bande de guerre orque qui maraudait dans la province de [Root.GetName] en a été repoussée et a pénétré sur notre territoire. Nos sujets dans la province de [Root.GetName] signalent un vaste campement orque érigé dangereusement près de nos colonies."
  aw_orcs.11.a:0 "Il faut s'en occuper."
  aw_orcs.20.t:0 "Le campement orque succombe aux luttes intestines"
  aw_orcs.20.d:0 "£icon_adventurers_wanted_banner£\nDans ce qui semble avoir été un combat exceptionnellement sanglant pour le butin ou le commandement, les orques du campement dans la province de [Root.GetName] se sont entretués jusqu'à ce qu'il n'en reste qu'une poignée dispersée. Les milices locales, ne voulant rien laisser au hasard, ont immédiatement saisi l'occasion pour éliminer les derniers survivants."
  aw_orcs.20.a:0 "C'était plus facile que prévu."
  aw_orcs.21.t:0 "Le campement orque détruit par les aventuriers"
  aw_orcs.21.d:0 "£icon_adventurers_wanted_banner£\nLe campement orque dans la province de [Root.GetName] a été anéanti lors d'une attaque organisée par plusieurs bandes d'aventuriers. Si des orques ont survécu, ils ont été dispersés de manière si complète qu'ils ne constitueront plus aucune menace."
  aw_orcs.21.a:0 "Une prime de moins sur la liste."
  aw_orcs.22.t:0 "La bande de guerre orque s'affaiblit"
  aw_orcs.22.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque dans la province de [Root.GetName] semble avoir considérablement diminué, et les habitants signalent moins d'incidents de pillage et de rapine. Nos messagers rapportent qu'après la mort de leur précédent chef, plusieurs orques de la bande ainsi que leurs partisans s'affrontent pour prendre le contrôle de la bande."
  aw_orcs.22.a:0 "Ce sera plus facile de s'en occuper, alors."
  aw_orcs.23.t:0 "Les aventuriers affaiblissent la bande de guerre orque"
  aw_orcs.23.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque dans la province de [Root.GetName] a été considérablement réduite par nos aventuriers. Ceux-ci ont réussi à attaquer le campement tandis que nombre d'orques étaient partis piller, portant un coup sévère à leurs effectifs."
  aw_orcs.23.a:0 "Un pas de plus vers l'éradication."
  aw_orcs.24.t:0 "Éradication du campement orque"
  aw_orcs.24.d:0 "£icon_adventurers_wanted_banner£\nNos forces ont attaqué la bande de guerre orque qui maraudait dans la province de [Root.GetName] et l'ont entièrement anéantie. Elle ne nous importunera plus."
  aw_orcs.24.a:0 "Nous étions les plus forts !"
  aw_orcs.25.t:0 "La bande de guerre orque vaincue"
  aw_orcs.25.d:0 "£icon_adventurers_wanted_banner£\nNos forces ont attaqué la bande de guerre orque qui maraudait dans la province de [Root.GetName] et en ont tué un grand nombre. Le peu qui en reste est bien moins menaçant."
  aw_orcs.25.a:0 "Tuez les intrus sur nos terres !"
  aw_orcs.30.t:0 "La bande de guerre orque grossit"
  aw_orcs.30.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque dans la province de [Root.GetName] semble grossir en nombre, de plus en plus d'orques étant attirés par la promesse de gloire et de butin que la bande leur offre."
  aw_orcs.30.a:0 "Le problème devient plus urgent."
  aw_orcs.40.t:0 "Le campement orque s'intègre"
  aw_orcs.40.d:0 "£icon_adventurers_wanted_banner£\nLe campement orque dans la province de [Root.GetName] s'est dissous, les orques ayant peu à peu déserté pour rejoindre nos colonies au lieu de les piller, où ils ont été intégrés dans les sociétés locales."
  aw_orcs.40.a:0 "Tant qu'ils paient leurs impôts."
  aw_orcs.40.b:0 "Les déloger et les chasser !"
  aw_orcs.41.t:0 "La bande de guerre orque est soumise"
  aw_orcs.41.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque dans la province de [Root.GetName] a prétendu être maîtresse des lieux pendant trop longtemps. C'est terminé ! Ceux qui nous résistaient ont été tués, les autres ont été mis au pas, et ils servent à présent le [Root.Owner.Monarch.GetTitle] [Root.Owner.Monarch.GetName] [Root.Owner.Monarch.Dynasty.GetName]."
  aw_orcs.41.a:0 "Ils obéissent à nos ordres désormais !"
  aw_orcs.41.b:0 "Qu'ils vivent dans leur déshonneur."
  aw_orcs.100.t:0 "Arrivée d'un clan migratoire orque"
  aw_orcs.100.d:0 "£icon_adventurers_wanted_banner£\nUn grand nombre d'orques sont arrivés sans prévenir dans la province de [Root.GetName], inquiétant les habitants. Les premiers rapports, cependant, semblent indiquer qu'ils ne cherchent pas nécessairement à piller nos colonies, et qu'il s'agit simplement d'un clan migratoire souhaitant y séjourner un temps. Quelques marchands entreprenants ont tenté d'engager le commerce avec eux, mais furent chassés dès leur approche."
  aw_orcs.100.a:0 "Il faut faire quelque chose."
  aw_orcs.110.t:0 "Le clan migratoire orque se déplace"
  aw_orcs.110.d:0 "£icon_adventurers_wanted_banner£\nLe clan migratoire orque qui s'était installé dans la province de [Root.GetName] semble avoir rassemblé et échangé tout ce qu'il désirait, et il s'en va. Les orques ont plié bagage et migrent vers la province de [aw_orcs_migration_target.GetName]."
  aw_orcs.110.a:0 "Cela ne change pas grand-chose."
  aw_orcs.110.b:0 "Ce n'est plus notre problème."
  aw_orcs.111.t:0 "Arrivée d'un clan migratoire orque"
  aw_orcs.111.d:0 "£icon_adventurers_wanted_banner£\nUn clan migratoire orque est arrivé et s'est installé dans la province de [Root.GetName]. Ils ne semblent pas nécessairement avoir l'intention de piller, mais la prudence reste de mise."
  aw_orcs.111.a:0 "Nous les surveillerons de près."
  aw_orcs.120.t:0 "Les aventuriers défont les orques"
  aw_orcs.120.d:0 "£icon_adventurers_wanted_banner£\nEn bataille ouverte, une troupe d'aventuriers a défait les orques résidant dans la province de [Root.GetName]. Ces orques gisent à présent vaincus, et nous pouvons choisir quoi faire d'eux. Dans la défaite, les orques se disent prêts à se soumettre à notre autorité si nous les acceptons. Nous pouvons aussi les forcer à se disperser entièrement, éparpillant les orques pour qu'ils ne constituent plus une menace."
  aw_orcs.120.a:0 "Ils sont vaincus ; ils connaîtront leur place désormais."
  aw_orcs.120.b:0 "Nous veillerons à ce qu'ils ne nous menacent plus."
  aw_orcs.121.t:0 "Clan migratoire intégré"
  aw_orcs.121.d:0 "£icon_adventurers_wanted_banner£\nLe clan migratoire d'orques dans la province de [Root.GetName] a décidé de s'unir à nous, s'établissant sur nos terres et rejoignant notre peuple plutôt que de poursuivre leur mode de vie nomade."
  aw_orcs.121.a:0 "Nous ne sommes qu'un seul peuple."
  aw_orcs.122.t:0 "La bande de guerre orque propose des mercenaires"
  aw_orcs.122.d:0 "£icon_adventurers_wanted_banner£\nUn groupe d'orques de la bande de guerre dans la province de [Root.GetName] a commencé à proposer ses services comme mercenaires, nous donnant accès à des maraudeurs aguerris. Nous ne saurions risquer de déployer des guerriers aussi potentiellement traîtres dans nos rangs, mais nous pourrions les charger de patrouiller nos marches contre le banditisme."
  aw_orcs.122.a:0 "Nous ferons volontiers usage de leurs services."
  aw_orcs.122.b:0 "Et si nous les payions... pour qu'ils s'en aillent ?"
  aw_orcs.123.t:0 "Le campement orque se convertit"
  aw_orcs.123.d:0 "£icon_adventurers_wanted_banner£\nUn prêtre corinite a été vu il y a quelque temps se rendant au campement orque dans la province de [Root.GetName]. Les habitants le pensaient fou et le considéraient déjà comme mort. Aujourd'hui cependant, le prêtre est revenu, avec toute la population du campement à sa suite. Il nous a informés qu'ils souhaitent servir la déesse guerrière qui a tué Korgus Jour-Fatal."
  aw_orcs.123.a:0 "Corin accueille tous ceux qui la servent."
  aw_orcs.124.t:0 "Les orques migratoires nous défient en Ozarm'Chadash"
  aw_orcs.124.d:0 "£icon_adventurers_wanted_banner£\nLes orques migratoires de [Root.GetName] ont défié notre chef en Ozarm'Chadash ! [Root.Owner.Monarch.GetName] n'est nullement obligé d'accepter, car ils ne sont pas de notre clan, mais cela nous offre une occasion. Si nous l'emportons, ce sera un moyen simple d'intégrer ce clan au sein de notre peuple."
  aw_orcs.124.a:0 "Le risque n'en vaut pas la peine."
  aw_orcs.124.b:0 "Tenter de les persuader avant de combattre."
  aw_orcs.124.c:0 "S'ils veulent la bataille, alors ils l'auront !"
  aw_orcs.130.t:0 "La bande de guerre orque se retire"
  aw_orcs.130.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque qui maraudait dans la province de [Root.GetName] semble avoir cessé de piller nos colonies. Apparemment, ils ont surtout chassé, fourragé, et parfois même commercé avec notre peuple. Les habitants restent néanmoins vigilants, car ils ne font pas confiance à la bande pour ne pas revenir à ses anciennes habitudes."
  aw_orcs.130.a:0 "C'est... une bonne nouvelle ?"
  aw_orcs.140.t:0 "Une aventurière remporte l'Ozarm'Chadash"
  aw_orcs.140.d:0 "£icon_adventurers_wanted_banner£\nAprès une tentative ratée d'infiltration du campement orque de [Root.GetName], une aventurière s'est retrouvée en position de défier le chef en Ozarm'Chadash. Qui plus est, elle a réussi à le vaincre ! Fraîchement nommée chef de clan, elle a décrété la dissolution du campement et l'installation de tout le clan sur les terres."
  aw_orcs.140.a:0 "Heureux qu'elle soit dans notre camp."
  aw_orcs.141.t:0 "Le clan migratoire orque s'établit"
  aw_orcs.141.d:0 "£icon_adventurers_wanted_banner£\nLe clan migratoire orque dans la province de [Root.GetName] semble avoir choisi de s'établir de manière permanente. Nombre des anciens résidents de la province se sont dispersés vers les cités voisines, et [Root.GetName] est à présent largement peuplée par les orques nouvellement sédentaires."
  aw_orcs.141.a:0 "Au moins, ils ne nous attaquent plus."
  aw_orcs.142.t:0 "La bande de guerre orque lève une armée"
  aw_orcs.142.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque dans la province de [Root.GetName] a tellement grossi qu'une grande partie d'entre eux a décidé que [Root.GetName] seule ne leur suffisait plus. Ils se sont formés en une vaste armée, déterminés à marauder le pays tout entier !"
  aw_orcs.142.a:0 "Appelez les troupes !"
  aw_orcs.200.t:0 "Petit raid orque"
  aw_orcs.200.d:0 "£icon_adventurers_wanted_banner£\nUn raid a frappé la province de [Root.GetName], mené par le campement orque de la province, causant une dévastation considérable. Les habitants nous appellent à agir contre eux, et vite."
  aw_orcs.200.a:0 "Il faut s'en occuper."
  aw_orcs.201.t:0 "Grand raid orque"
  aw_orcs.201.d:0 "£icon_adventurers_wanted_banner£\nLa bande de guerre orque dans la province de [Root.GetName] a lancé un raid de grande envergure sur nos colonies, causant une dévastation considérable et pillant tout ce qui n'est pas cloué au sol, en plus de saccager le trésor local."
  aw_orcs.201.a:0 "Il faut s'en occuper."
  aw_orcs.202.t:0 "Massacre de la bande de guerre orque"
  aw_orcs.202.d:0 "£icon_adventurers_wanted_banner£\nQuelle tragédie... Lors d'un raid sur la province de [Root.GetName], la bande de guerre orque a perpétré un massacre parmi la population locale après que certains de nos sujets se soient organisés pour tenter de résister au pillage. Ils n'étaient pas de taille et furent tués jusqu'au dernier, ne laissant que des orphelins et des veuves pour enterrer les morts."
  aw_orcs.202.a:0 "Envoyer de l'aide aux familles des défunts."
  aw_orcs.202.b:0 "Si seulement nous pouvions faire quelque chose."
  aw_orcs.203.t:0 "Des aventuriers dérobent un arsenal"
  aw_orcs.203.d:0 "£icon_adventurers_wanted_banner£\nDans un cambriolage impressionnant, un groupe d'aventuriers a réussi à dérober un vaste arsenal d'armes naines au campement orque de [Root.GetName]. De toute évidence, ce sont de vieilles armes forgées dans l'une des forteresses naines de l'Échine-du-Serpent. Selon toute vraisemblance, elles furent pillées à Khugdihr, peu avant la Marée Verte. Même maltraitées par les orques, leur qualité est stupéfiante !"
  aw_orcs.203.a:0 "Un digne trophée !"

  aw_orcs_rebels_name:0 "Bande de guerre orque"
  aw_orcs_rebels_title:0 "Orque"
  aw_orcs_rebels_desc:0 "Une bande de guerre orque s'est levée pour vous défier en juste combat. L'enjeu : or, honneur et sang !"
  aw_orcs_rebels_army:0 "Bande de guerre orque"
  aw_orcs_rebels_demand:0 "Or, honneur et sang !"
  aw_orcs_rebels_demand_desc:0 "La bande de guerre orque ne se rassemble qu'en deux occasions : quand elle veut du sang ou de l'or. Désormais, le seul choix est de l'affronter au combat."

  aw_orcs_lets_fight_tooltip:0 "[Root.Owner.Monarch.GetName] défendra son titre au combat. Cela montrera si [Root.Owner.Monarch.GetSheHe] est digne de régner ! Le succès de votre [Root.Owner.Monarch.GetTitle] dépend de [Root.Owner.Monarch.GetHerHis] habileté martiale."


  aw_wyvern_1:0 "§Y(Aventuriers recherchés !)§! §gWyverne :§! §OWyvernes errantes§!"
  desc_aw_wyvern_1:0 "Les gardes locaux de [Root.GetName] ont confirmé que les signalements hystériques de marchands traumatisés concernant un dragon rouge étaient en réalité une wyverne sauvage. Plus petites et dépourvues du souffle de feu, les wyvernes n'en constituent pas moins une menace pour toutes les caravanes sauf les mieux armées, et un problème majeur pour les éleveurs de bétail. Les wyvernes sont incontestables dans les airs et ne se posent que pour manger et se reposer. Celle-ci semble errer à la recherche d'un endroit où nicher définitivement. Prions pour qu'elle devienne bientôt le problème d'une autre nation."
  aw_wyvern_2:0 "§Y(Aventuriers recherchés !)§! §gWyverne :§! §ONid de wyverne§!"
  desc_aw_wyvern_2:0 "Il n'y a guère de nouvelles en provenance de [Root.GetName] si ce n'est des caravanes détruites et des vachers ensanglantés. Nous ne pouvons plus simplement prier et devons accepter l'inacceptable : une wyverne sauvage et féroce a bâti son nid sur nos terres, et les attaques ne feront qu'empirer. Sans nul doute, tous ceux de la région subiront désormais ses assauts."

  aw_wyvern_migrate_to_other_country_tt:0 "La wyverne migre vers un pays voisin."

  aw_wyvern.0.t:0 "Wyverne repérée dans la province de [Root.GetName]"
  aw_wyvern.0.d:0 "£icon_adventurers_wanted_banner£\nLes wyvernes sont les cousines des dragons : plus petites, dépourvues de souffle mortel, et dotées de seulement deux pattes et d'ailes, mais compensant amplement par leur dard venimeux. L'une d'elles a récemment été aperçue survolant [Root.GetName], mais nous ne pouvons guère agir si elle n'a pas de nid à pister. En attendant, il ne reste qu'à patienter pour voir si elle choisit nos terres pour s'installer, ou poursuit son vol."
  aw_wyvern.10.t:0 "La wyverne errante migre"
  aw_wyvern.10.d:0 "£icon_adventurers_wanted_banner£\nLes wyvernes sont des créatures capricieuses, et il est impossible de savoir si c'est le reroute des caravanes et le déclin du cheptel, ou simplement un acte d'ennui ou une lubie, mais la wyverne de [Root.GetName] est partie terroriser les habitants de [aw_wyvern_migration_target.GetName]."
  aw_wyvern.10.a:0 "Les dieux soient loués !"
  aw_wyvern.10.b:0 "Espérons qu'elle reste loin pour de bon."
  aw_wyvern.11.t:0 "La wyverne errante arrive dans la province de [Root.GetName]"
  aw_wyvern.11.d:0 "£icon_adventurers_wanted_banner£\nLa redoutée wyverne de [From.GetName] a été aperçue dans la province de [Root.GetName] ! Déjà des rapports de dévastation arrivent, avec du bétail emporté vers on ne sait où. Il est regrettable que les habitants de [From.GetName] n'aient pu régler ce problème au préalable, mais heureusement la wyverne ne semble pas avoir niché dans notre province. Avec un peu de chance, elle s'envolera avant de causer davantage de dégâts."
  aw_wyvern.20.t:0 "Un heureux pourrissement"
  aw_wyvern.20.d:0 "£icon_adventurers_wanted_banner£\nLes wyvernes captives peuvent être affectées par la gale des écailles, une affection causée par de minuscules parasites qui se glissent sous les écailles et rongent la chair en dessous. Facilement traitable par un dresseur, laissée sans soin elle provoque démangeaisons, douleur, perte de contrôle, folie, puis la mort. Notre wyverne sauvage locale a contracté cette affection et a été retrouvée aujourd'hui en un amas putréfié dans un champ."
  aw_wyvern.20.a:0 "On en viendrait presque à plaindre la bête."
  aw_wyvern.21.t:0 "Chasseur de monstres"
  aw_wyvern.21.d:0 "£icon_adventurers_wanted_banner£\nLa gloire seule de tuer une wyverne adulte suffirait à de nombreux aventuriers pour répondre à l'appel, mais combinée aux efforts du fonctionnaire provincial pour offrir une prime, un groupe talentueux de chasseurs de monstres a répondu présent. Le groupe a réussi à pister son nid la nuit dernière et a abattu la wyverne de [Root.GetName] à l'aide d'une combinaison de grandes épées, d'armes à feu, de lames doubles et même d'une étrange hache transformable, avant qu'elle ne puisse prendre son envol et fuir."
  aw_wyvern.21.a:0 "Quête accomplie !"
  aw_wyvern.24.t:0 "Une chasse glorieuse !"
  aw_wyvern.24.d:0 "£icon_adventurers_wanted_banner£\nNotre nation n'a nul besoin d'aventuriers avides de pièces pour régler ses problèmes de bêtes. [Root.Owner.Monarch.GetName] a organisé une chasse cérémonielle, agrémentée d'un festin, de jeux, de ménestrels et de conteurs, et la wyverne de [Root.GetName] a finalement été pistée et abattue, sa tête désormais montée et exposée fièrement. Les chasseurs victorieux seront à jamais célébrés en chansons et en gloire !"
  aw_wyvern.24.a:0 "Notre peuple peut être fier !"
  aw_wyvern.30.t:0 "La wyverne niche dans la province de [Root.GetName]"
  aw_wyvern.30.d:0 "£icon_adventurers_wanted_banner£\nLa wyverne errante aperçue dans la province de [Root.GetName] n'a pas disparu, ce qui ne signifie qu'une chose : elle a choisi notre province pour y bâtir son nid. Si le fait d'avoir un repaire nous donne enfin les moyens de tuer la bête, cela crée plus de problèmes qu'il n'en résout. Une wyverne installée est d'autant plus dangereuse, car elle revendiquera désormais un territoire de chasse de plusieurs centaines de lieues, atteignant les confins les plus reculés de la région."
  aw_wyvern.30.a:0 "Cette bête doit être éliminée, avant que la région entière ne soit dévastée !"
  aw_wyvern.110.t:0 "La wyverne nichée prend son envol"
  aw_wyvern.110.d:0 "£icon_adventurers_wanted_banner£\nLa wyverne de [Root.GetName] a été pistée par les aventuriers dans son nid la nuit dernière, mais la bête a réussi à s'échapper avant le coup de grâce. Le nid a été détruit dans le combat, et bien que la wyverne soit toujours dans les environs, elle n'a plus de repaire. Pour le meilleur ou pour le pire, la wyverne reprendra ses errances, hors de notre portée."
  aw_wyvern.110.a:0 "Prions pour qu'elle niche ailleurs, cette fois."
  aw_wyvern.120.t:0 "Une wyverne qui vaut son pesant d'or"
  aw_wyvern.120.d:0 "£icon_adventurers_wanted_banner£\nLa gloire seule de tuer une wyverne adulte suffirait à de nombreux aventuriers pour répondre à l'appel, mais ce qui attire aussi ces chasseurs de monstres, c'est sa vaste abondance de matériaux. Un groupe a réussi à pister le nid la nuit dernière et a abattu la wyverne de [Root.GetName] avant qu'elle ne puisse prendre son envol. À présent cependant, il semble que les aventuriers aient vendu des morceaux utiles de la bête, tels que ses écailles et ses poisons. S'ils sont dans leur droit, il est aussi dans le nôtre de les « taxer » pour de telles ventes, si nous le souhaitons."
  aw_wyvern.120.a:0 "Laissez-les faire ; ils nous ont débarrassés d'un terrible fléau."
  aw_wyvern.120.b:0 "Rendez à Castan ce qui est à Castan, comme on dit."
  aw_wyvern.120.c:0 "Laissez-les vendre le reste, mais le venin de wyverne pourrait nous être fort utile..."
  aw_wyvern.200.t:0 "La wyverne attaque la paysannerie"
  aw_wyvern.200.d:0 "£icon_adventurers_wanted_banner£\nLa wyverne qui niche dans la province de [Root.GetName] a attaqué des fermes dans la province de [nested_wyvern_target.GetName] ! Cela a causé d'immenses pertes en vies et en moyens de subsistance pour la paysannerie, de nombreux animaux de ferme ayant été emportés et des bâtiments détruits. Il faudra du temps pour remplacer le bétail et les récoltes. Et les paysans qui ont péri, bien sûr."
  aw_wyvern.200.a:0 "Maudite soit cette wyverne !"
  aw_wyvern.200.b:0 "Envoyer nos condoléances."
  aw_wyvern.2000.t:0 "La wyverne de [From.Owner.GetName] attaque la paysannerie"
  aw_wyvern.2000.d:0 "£icon_adventurers_wanted_banner£\nLa wyverne de la province de [From.GetName] en [From.Owner.GetName] a survolé nos terres et attaqué [Root.GetName] ! Cela a causé d'immenses pertes en vies et en moyens de subsistance pour la paysannerie, de nombreux animaux de ferme ayant été emportés et des bâtiments détruits. Il faudra du temps pour remplacer le bétail et les récoltes. Et les paysans qui ont péri, bien sûr."
  aw_wyvern.2000.a:0 "La reconstruction prendra du temps."
  aw_wyvern.201.t:0 "La wyverne perturbe les caravanes"
  aw_wyvern.201.d:0 "£icon_adventurers_wanted_banner£\nUne wyverne dans la province de [Root.GetName] a récemment attaqué des caravanes le long des routes de [nested_wyvern_target.GetName], plusieurs marchands de renom ayant été dévorés avant que quoi que ce soit ne puisse être fait pour arrêter la bête. Avec la disparition de ces marchands et la réticence croissante des caravanes à s'aventurer dans la province de [nested_wyvern_target.GetName], l'économie de la province en souffrira grandement."
  aw_wyvern.201.a:0 "Surveillez les cieux."
  aw_wyvern.201.b:0 "Funeste pour leur commerce."
  aw_wyvern.2001.t:0 "La wyverne de [From.Owner.GetName] perturbe les caravanes"
  aw_wyvern.2001.d:0 "£icon_adventurers_wanted_banner£\nUne wyverne nichant dans la province de [From.GetName] en [From.Owner.GetName] a récemment attaqué des caravanes le long des routes de [Root.GetName] ! Plusieurs marchands de renom ont été dévorés et des chevaux emportés avant que quoi que ce soit ne puisse être fait pour arrêter la bête. Avec la disparition de ces marchands et la réticence croissante des caravanes à s'aventurer dans la province de [Root.GetName], l'économie de la province en souffrira grandement."
  aw_wyvern.2001.a:0 "Surveillez les cieux !"
  aw_wyvern.202.t:0 "La wyverne terrorise la campagne"
  aw_wyvern.202.d:0 "£icon_adventurers_wanted_banner£\nBien qu'aucune attaque n'ait été signalée, la seule vue de la wyverne nichée de [Root.GetName] qui a revendiqué la région entière comme son territoire suffit à provoquer une panique généralisée parmi la population de [nested_wyvern_target.GetName]. Si rien n'est fait bientôt, nous pourrions avoir une révolte causée par l'hystérie sur les bras."
  aw_wyvern.202.a:0 "Mais... elle n'attaque même pas !"
  aw_wyvern.202.b:0 "Elle vole où bon lui semble."
  aw_wyvern.2002.t:0 "La wyverne terrorise la campagne"
  aw_wyvern.2002.d:0 "£icon_adventurers_wanted_banner£\nBien qu'aucune attaque n'ait été signalée, la seule vue de la wyverne nichée de la province de [From.GetName] en [From.Owner.GetName] qui a revendiqué la région entière comme son territoire suffit à provoquer une panique généralisée parmi la population de [Root.GetName]. Si rien n'est fait bientôt, nous pourrions avoir une révolte causée par l'hystérie sur les bras."
  aw_wyvern.2002.a:0 "Mais... elle n'attaque même pas !"

  aw_wyvern_migration_tooltip:0 "Les wyvernes errantes peuvent migrer à travers tout le continent."
  aw_wyvern_poison_in_spycraft:0 "Venin de wyverne dans l'espionnage"
  aw_wyvern_attacks_on_caravans:0 "Wyvernes attaquant les caravanes"
  aw_wyvern_flights_scare_people:0 "Les vols de wyverne effraient les habitants"




  aw_satyrs_1:0 "§Y(Aventuriers recherchés !)§! §gSatyres :§! §OTrublions hédonistes§!"
  desc_aw_satyrs_1:0 "Les satyres sont des fées mâles ressemblant à des mi-hommes, mi-boucs. Aux temps anciens, ils peuplaient une grande partie des Bois-Profonds (qui couvraient l'Escann et au-delà) jusqu'à leur quasi-extinction par Castan Fléau-des-Bêtes. Certains disent que c'était à cause du sens de l'humour généralement paillard des satyres. Quand les satyres arrivent, le petit peuple se retrouve souvent soumis à leurs caprices hédonistes, participant à de grandes fêtes, des beuveries et bien pire. Au moins la musique est bonne !"
  aw_satyrs_2:0 "§Y(Aventuriers recherchés !)§! §gSatyres :§! §OFête permanente§!"
  desc_aw_satyrs_2:0 "Les satyres sont des fées mâles ressemblant à des mi-hommes, mi-boucs. Aux temps anciens, ils peuplaient une grande partie des Bois-Profonds (qui couvraient l'Escann et au-delà) jusqu'à leur quasi-extinction par Castan Fléau-des-Bêtes. Leur présence a grandi au point que la capitale provinciale est emplie d'une fête permanente, avec danses, musique et vin à toute heure du jour."
  aw_satyrs_3:0 "§Y(Aventuriers recherchés !)§! §gSatyres :§! §OIndulgence sans fin§!"
  desc_aw_satyrs_3:0 "Les satyres sont des fées mâles ressemblant à des mi-hommes, mi-boucs. Aux temps anciens, ils peuplaient une grande partie des Bois-Profonds (qui couvraient l'Escann et au-delà) jusqu'à leur quasi-extinction par Castan Fléau-des-Bêtes. Ici, la plupart ont cessé tout travail pour rejoindre les satyres et satisfaire chacun de leurs caprices hédonistes, aussi étranges soient-ils."

  aw_satyrs.0.t:0 "Les satyres débarquent dans la province de [Root.GetName]"
  aw_satyrs.0.d:0 "£icon_adventurers_wanted_banner£\nD'étranges fées mi-hommes mi-boucs ont été aperçues dans la province de [Root.GetName]. Si le petit peuple fut d'abord effrayé, elles se firent bientôt connaître comme des satyres et sont déjà devenues une attraction populaire parmi les colonies, offrant des plaisanteries hilarantes, quoique indécentes, et une musique d'une telle qualité qu'elle ne peut provenir que d'un habitant du Royaume Féerique. Bien qu'ils ne constituent pas une menace hostile, ces satyres se moquent des affaires du monde mortel et de ceux qu'ils blessent indirectement dans leurs réjouissances. Leur présence ici pourrait causer plus de mal que de bien."
  aw_satyrs.20.t:0 "Les satyres retournent au Royaume Féerique"
  aw_satyrs.20.d:0 "£icon_adventurers_wanted_banner£\nLes fées sont en effet des créatures étranges, et nous ne saurions espérer les comprendre. On dit que les satyres qui faisaient la fête dans la province de [Root.GetName] devaient organiser une nouvelle réjouissance mais ont tous disparu ! Le trac ? Fort improbable."
  aw_satyrs.20.a:0 "Peut-être la Reine des Fées les a-t-elle rappelés ?"
  aw_satyrs.21.t:0 "Des aventuriers tuent les satyres"
  aw_satyrs.21.d:0 "£icon_adventurers_wanted_banner£\nC'est comme au temps de Castan Fléau-des-Bêtes. Les aventuriers que nous avions engagés n'avaient pas de temps pour les jeux, ni le moindre sens de l'humour. Ils confrontèrent d'abord les satyres, les intimant de partir, mais après une plaisanterie indécente sur la défunte mère de l'un des aventuriers... eh bien. Les épées furent brandies, les instruments fracassés, et les satyres furent tués."
  aw_satyrs.21.a:0 "Au moins c'est réglé ?"
  aw_satyrs.24.t:0 "Les satyres fuient devant nous"
  aw_satyrs.24.d:0 "£icon_adventurers_wanted_banner£\nÀ la suite d'un incident au cours duquel un satyre offensa l'un de nos guerriers et fut promptement châtré, le reste des satyres de [Root.GetName] a fui d'où ils venaient."
  aw_satyrs.24.a:0 "On dirait qu'ils n'avaient pas le sens de l'humour !"
  aw_satyrs.120.t:0 "Les aventuriers boivent les satyres sous la table"
  aw_satyrs.120.d:0 "£icon_adventurers_wanted_banner£\nLes aventuriers envoyés pour régler notre problème de satyres ont résolu la situation pacifiquement. Cela impliqua une compétition en deux volets : la boisson, et, disons, la copulation. Naturellement, les aventuriers du royaume sont fort expérimentés en la matière, et les satyres ont accepté de rentrer chez eux après avoir été largement surpassés."
  aw_satyrs.120.a:0 "Et vous êtes payés pour ça ?"
  aw_satyrs.121.t:0 "Fête d'adieu des satyres"
  aw_satyrs.121.d:0 "£icon_adventurers_wanted_banner£\nLes satyres fauteurs de troubles ont organisé une dernière grande fête dans la province de [Root.GetName]. Les réjouissances emplirent l'air jusqu'aux premières heures du matin, quand les verres étaient encore remplis par des magies féeriques incroyablement puissantes."
  aw_satyrs.121.a:0 "Ça s'est terminé en beauté, dans tous les sens du terme."
  aw_satyrs.122.t:0 "Des satyres battus à mort par des amants furieux"
  aw_satyrs.122.d:0 "£icon_adventurers_wanted_banner£\nLes satyres sont de notoires séducteurs, usant souvent de leurs charmes et de leurs magies féeriques pour ensorceler quiconque. L'une de ces frasques s'est mal terminée pour les satyres, et une orgie gâchée par des amants furieux a dégénéré en bagarre. Malheureusement, leur orgie impliquait des objets dangereux, et les satyres furent battus à mort avec leurs propres outils et engins."
  aw_satyrs.122.a:0 "Quelle fin."
  aw_satyrs.200.t:0 "Actes indécents des satyres"
  aw_satyrs.200.d:0 "£icon_adventurers_wanted_banner£\nLors d'un grand rassemblement organisé par l'un de nos fonctionnaires d'État, les satyres qui infestent ces terres se sont fait connaître haut et fort. Ils ont promptement pris le contrôle de l'événement et accompli plusieurs actes indécents restés sans nom dans les rapports officiels, bien que l'on estime que l'un d'eux impliquait la dégradation d'un portrait de [Root.Owner.Monarch.GetName] !"
  aw_satyrs.200.a:0 "Je suis flatté..."
  aw_satyrs.201.t:0 "Statues phalliques"
  aw_satyrs.201.d:0 "£icon_adventurers_wanted_banner£\nLes satyres sont de grands amants... et amants des arts. Ils ont envoyé un grand tribut à notre cour, lequel, pour une raison inconnue, ne fut vérifié par personne avant d'être dévoilé au [Root.Owner.Monarch.GetTitle] et à la cour..."
  aw_satyrs.201.a:0 "C'est un phallus."
  aw_satyrs.202.t:0 "Orgie satyresque"
  aw_satyrs.202.d:0 "£icon_adventurers_wanted_banner£\nIl n'est pas rare, quand les satyres se manifestent dans une province, d'entendre d'étranges bruits. Des gémissements dans les buissons, des grincements de lits, ce genre de choses. Le tout a culminé en une situation tapageuse sur la place publique de nos bourgs, nombre de citoyens se laissant aller à rejoindre les réjouissances."
  aw_satyrs.202.a:0 "C'est un peu gênant le matin, cela dit."
  aw_satyrs.203.t:0 "La gueule de bois de l'an $YEAR$"
  aw_satyrs.203.d:0 "£icon_adventurers_wanted_banner£\nLes satyres, dans leur liesse, ont offert des boissons et des festivités gratuites à travers [Root.GetName]. Quel était le motif d'une telle fête ? Nul ne le sait, mais un casus belli pour faire la fête est tout ce dont la plupart des gens ont besoin."
  aw_satyrs.203.a:0 "Une boisson gratuite reste une boisson gratuite."
  aw_satyrs.204.t:0 "Un satyre séduit une jeune mariée"
  aw_satyrs.204.d:0 "£icon_adventurers_wanted_banner£\nUn noble éminent de [Root.GetName] s'est retrouvé profondément déshonoré ! Il affirme qu'un satyre a usé de sa magie pour se faire passer pour lui lors de sa nuit de noces... consommant le mariage à sa place ! Sa puissante famille a pétitionné d'autres nobles pour rédiger une lettre de protestation véhémente contre nous pour notre incapacité à régler cette peste satyresque."
  aw_satyrs.204.a:0 "Cocu par un lutin"
  aw_satyrs.205.t:0 "Concert de flûtes satyresques"
  aw_satyrs.205.d:0 "£icon_adventurers_wanted_banner£\nOutre leurs penchants hédonistes, les satyres sont réputés pour être de grands musiciens. Les satyres de [Root.GetName] prétendent être des membres exilés de l'orchestre de flûtes de la Reine des Fées, et ont interprété diverses versions de morceaux aux noms imprononçables. Ce que les spectateurs ont su, c'est que ce fut une expérience unique, et qu'aucun orchestre moderne ne saurait rivaliser."
  aw_satyrs.205.a:0 "J'aurais voulu y être !"

  aw_satyrs_music:0 "Grande musique satyresque"
  aw_satyrs_hangover:0 "Gueule de bois des festivités satyresques"
  aw_satyrs_scorned_lovers:0 "Amants bafoués par l'orgie satyresque"

  EST_VAL_AW_CUCKED_BY_SATYRS:0 "Cocu par un lutin : "


  aw_wendigo_1:0 "§Y(Aventuriers recherchés !)§! §gWendigo :§! §OObservations non confirmées§!"
  desc_aw_wendigo_1:0 "Les paysans chuchotent au sujet de grandes silhouettes maigres et ramifiées au fond des bois. Certains parlent de phénomènes surnaturels, de sons semblables à un cerf mourant dans d'atroces souffrances, et d'une odeur de sang qui rôde autour des maisons la nuit. Les plus courageux ne disent qu'un seul mot... Wendigo."
  aw_wendigo_2:0 "§Y(Aventuriers recherchés !)§! §gWendigo :§! §OTerreur des bois§!"
  desc_aw_wendigo_2:0 "Des bêtes terrifiantes ressemblant à un corps humanoïde émacié, de longues griffes en guise de mains et une tête de cerf maculée de sang... un wendigo hante ces terres. Personne n'est en sécurité dans cette province, et rares sont ceux qui osent marcher seuls la nuit."
  aw_wendigo_3:0 "REPLACE_ME"
  desc_aw_wendigo_3:0 "REPLACE_ME"

  aw_wendigo.0.t:0 "Observation de wendigo dans la province de [Root.GetName] ?"
  aw_wendigo.0.d1:0 "£icon_adventurers_wanted_banner£\nLes wendigos sont des démons surnaturels ressemblant à un corps humanoïde émacié, de longues griffes en guise de mains et une tête de cerf maculée de sang. Que l'on croie qu'ils sont nés des sombres magies d'un ancien sorcier tentant de ramener ceux d'avant le Déluge Final, ou peut-être ceux maudits pour l'acte vil et abject de cannibalisme, une chose est certaine : si un wendigo rôde véritablement dans la province de [Root.GetName], la mort et la destruction ne manqueront pas de suivre."
  aw_wendigo.0.d2:0 "£icon_adventurers_wanted_banner£\nLes wendigos sont des démons surnaturels ressemblant à un corps humanoïde émacié, de longues griffes en guise de mains et une tête de cerf maculée de sang. Que l'on croie qu'ils sont nés des sombres magies d'un ancien sorcier tentant de ramener les Précurseurs, ou peut-être ceux maudits pour l'acte vil et abject de cannibalisme, une chose est certaine : si un wendigo rôde véritablement dans la province de [Root.GetName], la mort et la destruction ne manqueront pas de suivre."
  aw_wendigo.20.t:0 "Les observations de wendigo n'étaient qu'une rumeur ?"
  aw_wendigo.20.d:0 "£icon_adventurers_wanted_banner£\nIl y a eu des murmures d'observations de wendigo dans la province de [Root.GetName], mais aucune attaque ne s'est encore produite. La paysannerie a raison de rester effrayée, mais il semble que ces histoires de wendigos soient sans fondement..."
  aw_wendigo.20.a:0 "...N'est-ce pas ?"
  aw_wendigo.21.t:0 "Des aventuriers tuent le wendigo"
  aw_wendigo.21.d:0 "£icon_adventurers_wanted_banner£\nIl est sage de confier une telle sombre besogne à des étrangers et des fous. Les fous en question ont réussi, pénétrant dans les bois sombres et épais pour tuer le wendigo de [Root.GetName] dans son propre environnement."
  aw_wendigo.21.a:0 "Je ne sais pas comment vous avez fait, mais bien joué."
  aw_wendigo.24.t:0 "Les monstres tuent le wendigo"
  aw_wendigo.24.d:0 "£icon_adventurers_wanted_banner£\nLes Nés-des-Ruines ynniques ont raison de craindre le grand wendigo. Mais notre peuple, non. Un immense parti de guerre fut organisé pour débusquer la bête des ombres, et malgré nos pertes, nous avons réussi cette grande chasse."
  aw_wendigo.24.a:0 "Graaah !"
  aw_wendigo.30.t:0 "Wendigo : terreur des bois"
  aw_wendigo.30.d:0 "£icon_adventurers_wanted_banner£\nC'est donc vrai.\n\nLes rumeurs d'observations de wendigo dans la province de [Root.GetName] ont été confirmées par la découverte d'un carnage récent. Des cadavres jonchent la neige ensanglantée, déchiquetés et dévorés. Ce n'est l'œuvre ni d'une bête ni d'un homme, mais de quelque chose d'impie entre les deux."
  aw_wendigo.30.a:0 "Un sombre présage."
  aw_wendigo.120.t:0 "Des chevaliers tuent les wendigos"
  aw_wendigo.120.d:0 "£icon_adventurers_wanted_banner£\nAux temps jadis, les wendigos infestaient le nord de l'Ynn comme une peste, et il fallait de braves chevaliers pour s'aventurer dans les bois et occire ces bêtes. Ces chevaliers utilisaient cela comme rite de passage pour se prouver véritables champions de leur seigneur, gagnant le droit d'arborer les bois de leurs ennemis vaincus sur leurs heaumes."
  aw_wendigo.120.a:0 "Pour le [Root.Owner.Monarch.GetTitle] et la patrie !"
  aw_wendigo.121.t:0 "Des chevaliers déloyaux tuent le wendigo"
  aw_wendigo.121.d:0 "£icon_adventurers_wanted_banner£\nAux temps jadis, les wendigos infestaient le nord de l'Ynn comme une peste, et il fallait de braves chevaliers pour s'aventurer dans les bois et occire ces bêtes. Ces chevaliers utilisaient cela comme rite de passage pour se prouver véritables champions de leur seigneur, gagnant le droit d'arborer les bois de leurs ennemis vaincus sur leurs heaumes.\n\nUn tel groupe est composé de dissidents notoires contre l'autorité de [Root.Owner.Monarch.GetName], et ils ont utilisé leurs exploits vaillants pour inspirer la déloyauté dans leurs rangs."
  aw_wendigo.121.a:0 "Maudits soient-ils."
  aw_wendigo.200.t:0 "Les attaques de wendigo s'intensifient"
  aw_wendigo.200.d:0 "£icon_adventurers_wanted_banner£\nLes wendigos sont des bêtes assoiffées de sang, animées d'une rage surnaturelle contre tout ce qui est vivant. Ce sont des créatures voraces, et leurs attaques incessantes contre [Root.GetName] ont causé de nombreuses morts et destructions à travers la province."
  aw_wendigo.200.a:0 "Des temps sombres se profilent."
  aw_wendigo.201.t:0 "Le wendigo massacre un village"
  aw_wendigo.201.d:0 "£icon_adventurers_wanted_banner£\nPlusieurs villages se sont tus. Quand nos éclaireurs arrivent, ils ne trouvent que du sang. Il semble que les wendigos rôdant dans la province de [Root.GetName] soient devenus de plus en plus voraces avec le temps, et notre peuple est le seul à en payer le prix."
  aw_wendigo.201.a:0 "Quand cela finira-t-il ?"
  aw_wendigo.202.t:0 "Rumeurs de rituels cannibales"
  aw_wendigo.202.d:0 "£icon_adventurers_wanted_banner£\nOn raconte que les wendigos naissent de ceux qui violent la loi naturelle contre le cannibalisme. Des rumeurs dans l'ombre parlent d'un groupe dépravé et désespéré tentant de « s'élever » et devenir eux-mêmes des wendigos, kidnappant apparemment des pauvres et des oubliés pour les dévorer."
  aw_wendigo.202.a:0 "Malédiction."
  aw_wendigo.203.t:0 "Le wendigo massacre la jeunesse"
  aw_wendigo.203.d:0 "£icon_adventurers_wanted_banner£\nUn groupe de jeunes se serait aventuré pour passer la nuit dans un manoir abandonné de [Root.GetName]. Ils ignoraient que le manoir se trouvait près des territoires de chasse du wendigo. Ce n'est qu'une semaine plus tard qu'un chasseur découvrit le manoir et décida d'y enquêter, et ce qu'il trouva à l'intérieur était un massacre abominable perpétré par les wendigos."
  aw_wendigo.203.a:0 "Une perte d'innocence."
  aw_wendigo.204.t:0 "Des chevaliers massacrés par le wendigo"
  aw_wendigo.204.d:0 "£icon_adventurers_wanted_banner£\nAux temps jadis, les wendigos infestaient le nord de l'Ynn comme une peste, et il fallait de braves chevaliers pour s'aventurer dans les bois et occire ces bêtes. Ces chevaliers utilisaient cela comme rite de passage pour se prouver véritables champions de leur seigneur, gagnant le droit d'arborer les bois de leurs ennemis vaincus sur leurs heaumes.\n\nHélas, nous avons reçu des nouvelles de leurs subordonnés : un groupe de chevaliers éminents n'est pas revenu de sa chasse. Nul doute que cela ébranlera la confiance envers notre [Root.Owner.Monarch.GetTitle] et le royaume."
  aw_wendigo.204.a:0 "Nous ne pouvons que craindre le pire."


  EST_VAL_AW_DISLOYAL_WENDIGO_SLAYER:0 "Pourfendeur de wendigo déloyal : "


  aw_zombies_1:0 "§Y(Aventuriers recherchés !)§! §gZombies :§! §OMorts-vivants errants§!"
  desc_aw_zombies_1:0 "Des zombies, cadavres chancelants et dénués de pensée dont le seul instinct est de tuer les vivants, ont été signalés dans les régions les plus reculées de [Root.GetName]. Bien qu'ils puissent être animés directement par un nécromancien, la plupart des zombies se relèvent lorsqu'un humain succombe à une souche de la peste zombie, transmise par la morsure d'un zombie. Les travaux du sage Garion le Sage durant la Pestilence Blanche de 1040 à 1053 ont abouti à des remèdes contre de nombreuses souches de la maladie, encore utilisés de nos jours, mais ceux qui ont déjà succombé ne peuvent être sauvés et doivent être éliminés par le feu et l'acier."
  aw_zombies_2:0 "§O(Aventuriers recherchés !)§! Zombies : §gInfestation de zombies§!"
  desc_aw_zombies_2:0 "Les morts qui marchent errent librement à travers [Root.GetName], leurs rangs grossis par les cadavres des tombés. Si la vie quotidienne se poursuit dans les villes fortifiées et les colonies éloignées de l'infestation, la menace d'une horde de zombies se levant pour infecter le reste de la province, et au-delà, grandit chaque jour..."
  aw_zombies_3:0 "§O(Aventuriers recherchés !)§! Zombies : §gCauchemar mort-vivant !§!"
  desc_aw_zombies_3:0 "Le spectacle dans la province de [Root.GetName] est digne des plus sombres récits : les zombies surpassent les vivants en nombre et errent dans les rues et la campagne, dévorant les malheureux qui ne peuvent s'enfuir. Ceux qui restent ont dû s'adapter, formant des communautés soudées et bien défendues, fouillant les colonies détruites pour endurer et survivre."

  aw_zombies_migrate_to_other_country_tt:0 "La peste des morts se propage à un pays voisin."

  aw_zombies.0.t:0 "[Root.GetName] : les morts qui marchent"
  aw_zombies.0.d:0 "£icon_adventurers_wanted_banner£\nAnimés par de sombres magies, dénués de pensée, les zombies sont les restes en décomposition de ceux qui jadis vivaient, dotés d'un seul dessein malveillant : tuer. De récents rapports en provenance de [Root.GetName] font état d'un nombre restreint mais croissant de ces abominations mortes-vivantes hantant la région, tuant ceux qui croisent leur chemin, les victimes se relevant en zombies après leur trépas. Les origines de ce fléau sont incertaines : peut-être un vil nécromancien a-t-il perdu le contrôle de ses serviteurs, ou une malédiction ancienne a-t-elle été libérée. Quoi qu'il en soit, les recoins sombres de [Root.GetName] resteront dangereux tant que les créatures ne seront pas éliminées. Si les remèdes de Garion le Sage peuvent être utilisés pour empêcher toute infection ultérieure, la situation deviendra problématique si on la laisse dégénérer."

  aw_zombies.13.t:0 "La peste des morts se propage à [Root.GetName]"
  aw_zombies.13.d:0 "£icon_adventurers_wanted_banner£\nUne fois qu'une horde de zombies atteint une taille suffisante, il devient particulièrement difficile de la mettre en quarantaine, car les individus mordus mais ayant échappé au déchiquetage fuient invariablement vers des zones non affectées dans l'espoir de trouver un remède. Trop souvent, ces personnes meurent et se relèvent avant de pouvoir être aidées, ne réussissant qu'à propager la peste plus loin. C'est apparemment la situation dans la province de [Root.GetName], alors que des zombies et des individus infectés débordent de la frontière depuis [From.GetName], apportant avec eux une souche de la Pestilence Blanche."
  aw_zombies.13.a:0 "Ne peut-on rien faire pour maîtriser cette situation ?"
  aw_zombies.13.b:0 "Quel malheur pour eux."

  aw_zombies.14.t:0 "La peste des morts se propage à [Root.GetName]"
  aw_zombies.14.d:0 "£icon_adventurers_wanted_banner£\nAnimés par de sombres magies, dénués de pensée, les zombies sont les restes en décomposition de ceux qui jadis vivaient, dotés d'un seul dessein malveillant : tuer. Des zombies de la province voisine de [From.GetName] ont débordé la frontière et envahi [Root.GetName], menaçant tous ceux qui y vivent. Il nous faudra agir rapidement si nous espérons contenir la menace et éviter des pertes humaines majeures."

  aw_zombies.21.t:0 "Des aventuriers détruisent la horde de zombies !"
  aw_zombies.21.d:0 "£icon_adventurers_wanted_banner£\nDans une démonstration exceptionnelle de bravoure et d'habileté, une bande d'aventuriers a entièrement anéanti les zombies de [Root.GetName]. Attirant les créatures vers une position défendable, les aventuriers ont employé des méthodes éprouvées de pièges à huile dissimulés, de tranchées soigneusement creusées et de magies dévastatrices pour allumer une immense conflagration qui a consumé l'écrasante majorité des morts-vivants. Des cavaliers et des abjurateurs ont empêché tout retardataire de fuir l'enfer, les chants sacrés et les lances repoussant les abominations. Au lever du soleil, il ne restait de la horde que des cendres."
  aw_zombies.21.a:0 "Une grande victoire !"

  aw_zombies.22.t:0 "Décomposition des zombies de [Root.GetName]"
  aw_zombies.22.d:0 "£icon_adventurers_wanted_banner£\nBien que de sombres magies les animent et les soutiennent, les zombies sont toujours faits de chair morte, incapables de guérir de leurs blessures et se putréfiant lentement. Sauf dans des conditions très sèches ou propres, les zombies se décomposent relativement vite après leur animation, les éléments revendiquant le corps aussi sûrement que s'il avait été enterré sous six pieds de terre. Sans un apport constant de nouvelles victimes à réanimer, une infestation de zombies s'éteint normalement d'elle-même après plusieurs mois par décomposition naturelle. C'est apparemment ce qui s'est produit dans la province de [Root.GetName], les nouvelles observations de zombies ayant presque totalement cessé ces dernières semaines."
  aw_zombies.22.a:0 "Nous avions bien besoin de bonnes nouvelles."

  aw_zombies.23.t:0 "Des héros remportent des victoires contre les morts qui marchent"
  aw_zombies.23.d:0 "£icon_adventurers_wanted_banner£\nIl existe certaines méthodes pour éliminer les zombies bien connues des compagnies d'aventuriers : décapitation, incinération, pièges à effondrement et tireurs d'élite sont autant de méthodes éprouvées contre les morts-vivants. Les aventuriers engagés pour régler le problème de zombies dans la province de [Root.GetName] ont utilisé ces tactiques avec une grande efficacité et ont remporté maintes victoires contre les créatures, réduisant considérablement la population de zombies."
  aw_zombies.23.a:0 "Excellent travail."

  aw_zombies.25.t:0 "Nos guerriers triomphent des morts qui marchent"
  aw_zombies.25.d:0 "£icon_adventurers_wanted_banner£\nUne horde de zombies est une chose terrifiante à affronter seul ou en désordre, mais une force disciplinée maintenant ses formations constitue un obstacle redoutable pour les morts-vivants. Opérant en grands groupes, nos guerriers ont systématiquement éliminé nombre de morts qui marchent dans la province de [Root.GetName], les attirant en petits groupes pour les engager. Nos pertes ont été minimes, et les morts-vivants sont bien moins menaçants qu'auparavant."
  aw_zombies.25.a:0 "Ils ont prouvé leur valeur !"

  aw_zombies.30.t:0 "Croissance de la horde de morts-vivants dans la province de [Root.GetName]"
  aw_zombies.30.d:0 "£icon_adventurers_wanted_banner£\nQuand ils ne sont pas éliminés rapidement et efficacement, les zombies possèdent une capacité prodigieuse à tuer et convertir leurs victimes en davantage de morts chancelants. C'est, hélas, exactement ce qui s'est produit dans la province de [Root.GetName], et bien plus de ces abjects morts-vivants errent désormais dans la zone, vagabondant sans but jusqu'à ce qu'ils captent la piste des vivants."
  aw_zombies.30.a:0 "Personne ne nous débarrassera-t-il de ces monstres ?"

  aw_zombies.100.t:0 "Zombies égarés de l'armée"
  aw_zombies.100.d:0 "£icon_adventurers_wanted_banner£\nL'instabilité dans notre royaume a conduit certains de nos nécromanciens à relâcher leur emprise sur les hordes de morts-vivants sous notre commandement. Qu'ils l'aient fait dans un effort conscient pour semer le chaos ou qu'ils aient simplement été incapables de maintenir leur contrôle mental est incertain, mais le résultat est le même. Certains de ces morts-vivants libérés ont été aperçus rôdant sans but dans la province de [aw_zombies_target.GetName], attaquant les fermes et semant le chaos."
  aw_zombies.100.a:0 "Par les cieux cendrés. Espérons qu'on s'en occupera."
  aw_zombies.100.b:0 "Ha ! Bonne chance à eux !"
  aw_zombies.100.c:0 "Non, vous m'obéirez !"

  aw_zombies.101.t:0 "Zombies égarés de l'armée [From.GetAdjective]"
  aw_zombies.101.d:0 "£icon_adventurers_wanted_banner£\nLe passage récent de l'armée de morts-vivants [From.GetAdjective] a laissé plus que des routes piétinées dans son sillage. Il semble que plusieurs des cadavres animés qu'ils utilisent comme soldats aient été laissés derrière dans notre province de [Root.GetName], et errent désormais dans les environs, semant le chaos et attaquant les villageois. Qu'ils aient été abandonnés volontairement ou non est incertain, mais le résultat est le même : quelqu'un devra s'occuper de ces cadavres avant qu'ils ne deviennent un problème majeur."

  aw_zombies.110.t:0 "Un aventurier mordu provoque une épidémie"
  aw_zombies.110.d:0 "£icon_adventurers_wanted_banner£\nLes zombies de [Root.GetName] ont été vaincus... mais des nouvelles inquiétantes sont arrivées peu après. Si notre victoire fut grande, elle s'accompagne d'un nuage noir : pour une raison insensée, l'un des aventuriers impliqués dans la victoire sur la horde de zombies de [Root.GetName] n'a pas immédiatement cherché à se faire soigner pour sa morsure, choisissant plutôt de la cacher et de se joindre aux célébrations de la victoire. Succombant à la maladie peu après, l'aventurier s'est relevé et a infecté nombre d'aventuriers encore engourdis par la boisson et de clients de taverne qui avaient passé la nuit précédente à boire à l'auberge. En quelques heures seulement, des dizaines de membres du groupe d'aventuriers avaient été relevés en un nouveau groupe de zombies..."
  aw_zombies.110.a:0 "Un problème réglé, un autre prend sa place..."
  aw_zombies.110.b:0 "Heureusement, cela s'est produit à l'étranger, dans la province de [aw_zombies_migration_target.GetName]..."

  aw_zombies.111.t:0 "Un aventurier mordu propage la maladie"
  aw_zombies.111.d:0 "£icon_adventurers_wanted_banner£\nNous avons eu vent du succès des aventuriers dans l'éradication de la menace morte-vivante de la province de [From.GetName]... mais ce que nous ignorions, c'est que certains de ces aventuriers qui avaient dépensé leur or durement gagné dans notre province de [Root.GetName] avaient aussi été mordus ! Imprudemment, ils ont choisi de se noyer dans l'alcool au lieu de vérifier leurs blessures et de se procurer les remèdes appropriés à temps pour prévenir l'affliction. Après s'être effondrés le soir, ils se sont relevés le matin en tant que zombies fraîchement transformés ! Une altercation à la taverne où ils buvaient a fait plusieurs morts, et les anciens aventuriers hantent désormais les collines, la menace même qu'ils avaient tenté de détruire un jour plus tôt !"
  aw_basic.111.a:0 "Pourquoi ces soi-disant héros n'ont-ils pas pris cela plus au sérieux ?"

  aw_zombies.120.t:0 "L'armée des morts se lève !"
  aw_zombies.120.d:0 "£icon_adventurers_wanted_banner£\nDes nouvelles sinistres nous sont parvenues : les nombreux zombies épars qui hantent les sombres recoins de la campagne ont commencé à se rassembler en grand nombre, avançant ensemble dans une même direction telle une marée de mort. Qu'ils soient dirigés par un nécromancien ou qu'une autre puissance maléfique ait causé ce changement de comportement, nous ne saurions le dire, mais la menace posée par ces hordes de damnés dépasse de loin les difficultés rencontrées jusqu'ici. Si nous ne parvenons pas à détruire cette armée des morts sur le champ de bataille... nul doute qu'ils répandront leur peste de mort à travers la nation."
  aw_zombies.120.a:0 "Rassemblez les troupes et murmurez une prière. Nous aurons besoin de toute l'aide possible."

  aw_zombies.121.t:0 "La milice locale lutte contre les morts"
  aw_zombies.121.d:0 "£icon_adventurers_wanted_banner£\nSi ce sont le plus souvent des aventuriers ou des régiments militaires qui combattent les monstres, il arrive que le petit peuple prenne les armes pour frapper un coup contre les créatures qui rôdent dans la nuit. Récemment, un régiment de milice citoyenne a fait preuve d'une grande habileté et d'une bonne fortune en repoussant les zombies qui infestent [Root.GetName], et a fait beaucoup pour protéger plusieurs bourgs reculés et contenir les morts qui marchent. Bien que de nombreux hommes des garnisons rurales soient tombés au combat, ces héros inattendus ont montré que même les plus humbles peuvent se dresser pour détruire le mal."
  aw_zombies.121.a:0 "Avec un peu de chance, ils pourront peut-être éradiquer ces monstres pour de bon !"

  aw_zombies.122.t:0 "Des mages proposent des méthodes nécromantiques pour combattre les zombies"
  aw_zombies.122.d:0 "£icon_adventurers_wanted_banner£\nLa peste de mort qui accable nos terres a jusqu'ici résisté à nos efforts pour l'éradiquer, et les temps désespérés appellent parfois des mesures désespérées. Une petite cabale de mages a approché le [Root.Monarch.GetTitle] avec une offre qui, en temps normal, serait considérée comme répréhensible dans la plupart des nations : utiliser la nécromancie pour combattre la nécromancie. Les mages pensent pouvoir prendre le contrôle des morts-vivants de [Root.GetName] avec relativement peu de risques pour eux-mêmes, puis les mener dans des pièges où ils pourront être aisément éliminés. Cependant, ils aimeraient obtenir l'assurance que leur usage de ces pouvoirs sera sans conséquences, et souhaiteraient que la couronne leur accorde quelques petites faveurs à l'avenir. Que répondre à ces mages ?"
  aw_zombies.122.a:0 "Soit, nous allons tenter cela, mais ce n'est pas une approbation générale de la nécromancie !"
  aw_zombies.122.b:0 "Ces petits mages croient être en position de négocier ? Qu'ils plient le genou."

  aw_zombies.130.t:0 "Épidémie de zombies en centre urbain"
  aw_zombies.130.d:0 "£icon_adventurers_wanted_banner£\nSi les épidémies de zombies ne commencent pas souvent dans les grandes cités, celles qui le font ont tendance à dégénérer rapidement, la forte densité de population et les nombreux recoins sombres offrant les conditions parfaites pour que les zombies se multiplient. La province de [Root.GetName] avait ce que les citadins appelaient un problème de morts-vivants « modeste » hors de ses murs, et malgré les précautions habituellement prises pour contrôler la propagation des maladies et des populations de monstres dans les cités, des centaines de zombies se sont levés pendant la nuit au sein de la cité elle-même. Plusieurs quartiers ont été bouclés pour tenter d'empêcher les créatures de se propager... mais en vain. Des réfugiés sont déjà arrêtés à la frontière de la province par les autorités locales, espérant qu'ils n'apporteront pas la peste avec eux."
  aw_zombies.130.a:0 "Il n'est pas trop tard, n'est-ce pas ?"

  aw_zombies.140.t:0 "Les zombies submergent le fort"
  aw_zombies.140.d:0 "£icon_adventurers_wanted_banner£\nPar quelque sens surnaturel encore mal compris, les morts-vivants sont attirés par les vivants, et tout grand rassemblement de mortels dans une zone infestée de zombies finira par être assiégé par les monstres. Le fort de [Root.GetName] fut un tel refuge pour les vivants jusqu'à récemment, quand les défenseurs succombèrent finalement à la famine et aux assauts des assiégeants infatigables. À présent, le fort se dresse abandonné et dévasté, la plupart de son ancienne garnison titubant aux côtés de leurs anciens ennemis, marchant vers le prochain massacre."
  aw_zombies.140.a:0 "Rien ne peut-il les arrêter ?"

  aw_zombies.200.t:0 "État de décrépitude"
  aw_zombies.200.d:0 "£icon_adventurers_wanted_banner£\nDans les meilleurs temps, les travaux publics tels que routes, ponts et drainage nécessitent un effort considérable d'entretien, et les temps ne sont manifestement pas des meilleurs dans la province de [Root.GetName]. Les morts-vivants qui hantent ces terres ont poussé nombre d'habitants à abandonner leurs foyers et ont rendu impossible l'entretien des infrastructures de la zone. Bâtiments qui s'effondrent, canaux envahis par les herbes et routes délabrées sillonnent le paysage, laissant une blessure durable qui prendra des années à guérir, si tant est qu'elle guérisse jamais."
  aw_zombies.200.a:0 "Un tableau des plus sinistres."

  aw_zombies.201.t:0 "Abominations anormales : cadavres instables"
  aw_zombies.201.d:0 "£icon_adventurers_wanted_banner£\nNormalement, les forces surnaturelles qui ressuscitent un zombie ne causent aucun changement dans le corps de la créature, mais il existe des exceptions à cette règle. Dans certaines circonstances encore mal comprises, la Pestilence Blanche peut provoquer des changements majeurs dans les corps qu'elle réanime, les déformant et les transformant en quelque chose... d'autre. L'une de ces mutations fait gonfler et enfler le corps du zombie de gaz explosifs qui s'enflamment avec une grande force au contact du feu. Plusieurs de ces zombies variants inhabituels ont récemment causé des ravages dans les structures de [Root.GetName], la force de leurs explosions rasant des bâtiments et propageant des incendies dans toute la zone."
  aw_zombies.201.a:0 "La reconstruction en sera d'autant plus difficile."

  aw_zombies.202.t:0 "Abominations anormales : massacreurs musculeux"
  aw_zombies.202.d:0 "£icon_adventurers_wanted_banner£\nNormalement, les forces surnaturelles qui ressuscitent un zombie ne causent aucun changement dans le corps de la créature, mais il existe des exceptions à cette règle. Dans certaines circonstances encore mal comprises, la Pestilence Blanche peut provoquer des changements majeurs dans les corps qu'elle réanime, les déformant et les transformant en quelque chose... d'autre. L'une de ces mutations rend le cadavre affecté aussi fort qu'un éléphant et sa peau dure comme la pierre, sa musculature ondulante déchirant la peau et lui permettant de se déplacer bien plus vite que ses congénères chancelants. Bien qu'heureusement assez rare, l'un de ces monstres est récemment apparu dans la province de [Root.GetName], massacrant d'innombrables civils et miliciens."
  aw_zombies.202.a:0 "Tant de morts... quelle horreur."

  aw_zombies.203.t:0 "Les survivants de [Root.GetName] s'entretuent"
  aw_zombies.203.d:0 "£icon_adventurers_wanted_banner£\nLors de catastrophes naturelles, il est trop facile pour les survivants de sombrer dans les luttes intestines tandis que le stress de la situation fait ressortir les pires instincts des mortels. Les catastrophes surnaturelles, telles que la crise zombie en cours dans la province de [Root.GetName], suivent le même schéma, et les principaux enclaves de survivants de [Root.GetName] se sont enfoncés dans ce que l'on ne peut décrire que comme une petite guerre. Cloîtrés dans la sécurité relative de colonies fortifiées, des personnalités fortes et la méfiance mutuelle entre communautés de survivants opposées ont débordé en conflit armé tandis que les survivants s'entretuaient pour des affronts supposés et des accusations infondées. Plusieurs communautés de survivants ont été anéanties : tuées non pas par les monstres qui rôdaient hors des murs, mais par les monstres qui se trouvaient à l'intérieur."
  aw_zombies.203.a:0 "Comme il est facile de prouver que nous ne sommes guère mieux que des bêtes."

  aw_zombies.204.t:0 "La peur des morts qui marchent se répand"
  aw_zombies.204.d:0 "£icon_adventurers_wanted_banner£\nTandis que les morts qui marchent ravagent la campagne de [Root.GetName], les vivants à travers le pays sont assaillis par des pensées de fin imminente, d'ongles grattant à la porte et de monstres rampant de leurs caves en pleine nuit. Les rapports sur la propagation continue de la peste zombie ont poussé beaucoup à céder à l'hystérie ou au désespoir, et des personnalités puissantes à travers la nation ont commencé à exprimer publiquement leur défiance envers la capacité de notre gouvernement à protéger le peuple de cette menace."
  aw_zombies.204.a:0 "Ils réagissent de manière excessive ; nous maîtrisons encore cette crise."

  aw_zombies_rebels_name:0 "Horde de zombies"
  aw_zombies_rebels_title:0 "Horde de zombies"
  aw_zombies_rebels_desc:0 "Les morts qui marchent approchent, une masse chancelante déterminée à dévorer les vivants.\n\nCréera un §O(Aventuriers recherchés !)§! Zombies : §gInfestation de zombies§! dans chaque province occupée dépourvue de fort."
  aw_zombies_rebels_army:0 "Horde de zombies"
  aw_zombies_rebels_demand:0 "Cerveaaaaux"
  aw_zombies_rebels_demand_desc:0 "Cerveaaaaux"




  aw_vampires_1:0 "§Y(Aventuriers recherchés !)§! §gVampires :§! §OAttaques mystérieuses§!"
  desc_aw_vampires_1:0 "Disparitions nocturnes, cadavres exsangues portant des marques de perforation dissimulés dans la forêt, témoignages de groupes étranges arpentant les routes à la nuit tombée. Ceux qui s'y connaissent en ces sordides affaires ne tardent guère à identifier l'œuvre de vampires ; il semble que quelques-unes de ces créatures aient élu domicile dans nos contrées, car le nombre d'incidents qui leur sont attribués ne cesse de croître de semaine en semaine."
  aw_vampires_2:0 "§Y(Aventuriers recherchés !)§! §gVampires :§! §OInfestation vampirique§!"
  desc_aw_vampires_2:0 "Les villages perdent des habitants chaque jour, les patrouilles sont attaquées dans la nuit, les gens barricadent leurs portes et se méfient de plus en plus de leurs voisins dans l'obscurité, tandis que les autorités débordées semblent incapables de protéger la population. Un nombre considérable de vampires ont établi leurs repaires dans la province de [Root.GetName], et les voyageurs savent qu'il ne faut plus emprunter les routes lorsque la protection du soleil s'estompe."
  aw_vampires_3:0 "§Y(Aventuriers recherchés !)§! §gVampires :§! §OFrénésie de sang !§!"
  desc_aw_vampires_3:0 "Les vampires de [Root.GetName] ont renoncé aux lois de leurs congénères qui préservaient le secret de leur existence. Ils se sont révélés à la populace par des raids brutaux sur les bourgs et les villages au cœur de la nuit, ne laissant aucun survivant. Ils attaquent quiconque croise leur regard et se repaissent du sang des innocents. Des victimes jonchent les rues de cités entières et nul n'ose s'aventurer dehors pour leur donner une sépulture ; il n'y a plus aucune loi."

  aw_vampire_migrate_to_other_country_tt:0 "Les vampires migrent vers un pays voisin."

  aw_vampires.0.t:0 "Ce que nous faisons dans l'ombre"
  aw_vampires.0.d:0 "£icon_adventurers_wanted_banner£\nDivers incidents aux caractéristiques étrangement similaires ont été rapportés dans la province de [Root.GetName]. Ceux qui fréquentent les routes nocturnes sont assaillis par des agresseurs inconnus ; certains disparaissent purement et simplement, d'autres sont retrouvés sans la moindre trace de résistance. Les morts sont exsangues, percés de deux ponctions au cou. Les rares survivants ayant pu témoigner auprès de la garnison ont déjà été mis au secret pour éviter le pire.\n\nIl ne fait guère de doute qu'il s'agit là de l'œuvre de vampires, des créatures dont on murmure qu'elles seraient nées de croisés aldresiens qui convoitaient si ardemment la longévité des elfes qu'ils ressuscitèrent Ettalinde la Misérable, une acolyte du Roi-Sorcier, et marchandèrent avec elle. Elle leur accorda le vampirisme, une condition qui se révéla être autant une malédiction qu'une bénédiction. Elle confère l'immortalité par la non-mort, mais contraint son hôte à fuir la lumière du soleil et à traquer autrui pour se nourrir de son sang."
  aw_vampires.10.t:0 "Les vampires migrent vers [aw_vampires_migration_target.GetName]"
  aw_vampires.10.d:0 "£icon_adventurers_wanted_banner£\nIl semblerait que les vampires de [Root.GetName] aient récemment disparu ; leurs repaires sont déserts et plus aucun incident n'a été signalé dans la province. Des rumeurs font état d'étranges événements nocturnes à [aw_vampires_migration_target.GetName] ; il semble que nos hôtes indésirables aient trouvé un nouveau gîte ailleurs."
  aw_vampires.10.a:0 "Dirigez les aventuriers vers [aw_vampires_migration_target.GetName] !"
  aw_vampires.10.b:0 "Ce n'est plus notre problème, dans ce cas."
  aw_vampires.11.t:0 "Arrivée de vampires à [Root.GetName]"
  aw_vampires.11.d:0 "£icon_adventurers_wanted_banner£\nDes gens disparaissent dans la nuit, d'étranges silhouettes tapies au sein des ténèbres… Des incidents nocturnes sont signalés à [Root.GetName] depuis quelques semaines ; par une troublante coïncidence, des incidents très similaires s'étaient produits à [From.GetName] ces derniers mois. Il semble que ce qui avait élu domicile là-bas se soit déplacé vers [Root.GetName]."
  aw_vampires.11.a:0 "Ils sont censés les tuer, pas les faire fuir !"
  aw_vampires.13.t:0 "Infestation vampirique à [Root.GetName]"
  aw_vampires.13.d:0 "£icon_adventurers_wanted_banner£\nLes vampires qui sévissent à [Root.GetName] ont commencé à propager leur existence maudite. Les chasseurs de vampires rapportent que leur nombre ne cesse de croître, et certains portent les traits familiers d'habitants de la région, probablement convertis par ceux déjà présents. Les témoignages de villageois disparus et de silhouettes inquiétantes aperçues au plus profond de la nuit se répandent comme une traînée de poudre, à mesure que les vampires s'enhardissent de leur supériorité numérique et de l'absence d'intervention efficace."
  aw_vampires.13.a:0 "Il va nous falloir davantage de chasseurs."
  aw_vampires.13.b:0 "Cela ne semble pas être notre affaire."
  aw_vampires.14.t:0 "L'infestation vampirique s'étend à [Root.GetName]"
  aw_vampires.14.d:0 "£icon_adventurers_wanted_banner£\nOn sait depuis un certain temps que [From.GetName] est aux prises avec des vampires qui se soucient fort peu de dissimuler leur présence. Leurs attaques ouvertes contre les voyageurs et leur présence dans les bourgs et autres établissements ont instillé la peur de la nuit dans bien des cœurs.\n\nLa paranoïa croissante de la population et la concurrence entre prédateurs rivaux rendent la chasse aux proies de plus en plus ardue, et les vampires cherchent donc des pâturages plus verts. Récemment, certains d'entre eux et leur progéniture se sont dirigés vers [Root.GetName] pour y établir leurs propres repaires. Nos gens signalent des disparitions et d'étranges silhouettes observant les demeures depuis les ténèbres."
  aw_vampires.15.t:0 "Les vampires fuient devant [Root.Owner.GetName]"
  aw_vampires.15.d:0 "£icon_adventurers_wanted_banner£\nLes lâches sangsues de [Root.GetName] ont fui la région à l'arrivée de nos bandes de guerre. Il semble qu'elles préfèrent des proies faibles et faciles à traquer."
  aw_vampires.20.t:0 "Les vampires disparaissent"
  aw_vampires.20.d:0 "£icon_adventurers_wanted_banner£\nIl semblerait que l'activité vampirique à [Root.GetName] se soit estompée ces derniers temps ; nos aventuriers ont découvert de nombreux repaires abandonnés et plus aucune attaque laissant des cadavres exsangues n'a été signalée. Qu'ils aient choisi de se fondre dans les ombres ou qu'ils aient été rappelés à l'ordre par leurs congénères plus discrets, nous l'ignorons."
  aw_vampires.20.a:0 "Bon débarras !"
  aw_vampires.21.t:0 "Victoire des chasseurs de vampires"
  aw_vampires.21.d:0 "£icon_adventurers_wanted_banner£\nDivers chasseurs de vampires ont méthodiquement ratissé [Root.GetName], traquant les créatures grâce aux empreintes, aux dépouilles de leurs victimes et aux traînées de sang. Les monstruosités surprises en pleine chasse ont été ligotées et exposées au soleil levant ; d'autres ont été débusquées dans leurs cercueils et empalées. Leur sanglante besogne accomplie, les chasseurs empochent leur or et passent à autre chose."
  aw_vampires.21.a:0 "Excellent travail. Dites-moi, les cendres de vampire sont utiles en alchimie, n'est-ce pas ?"
  aw_vampires.24.t:0 "Monstres contre vampires"
  aw_vampires.24.d:0 "£icon_adventurers_wanted_banner£\nLes buveurs de sang de [Root.GetName] ont été des parasites pour notre effort de guerre. Nos bandes de guerre ont ratissé forêts, collines et bourgs, traquant les créatures nocturnes pour leur infliger le trépas. Ceux qui se sont transformés en brume pour regagner leur cercueil ont été retrouvés et empalés ; d'autres ont été ligotés et jetés en plein soleil. S'ils se croyaient supérieurs grâce à leur vie éternelle, nous leur avons prouvé le contraire."
  aw_vampires.24.a:0 "Bon débarras !"
  aw_vampires.30.t:0 "Infestation vampirique de [Root.GetName]"
  aw_vampires.30.d:0 "£icon_adventurers_wanted_banner£\nLe nombre d'incidents signalés à [Root.GetName] a augmenté ces derniers temps. Il semble que les vampires qui y ont établi leurs repaires aient engendré davantage de leurs semblables, et leurs attaques se font de plus en plus audacieuses. Les bourgs ont barricadé leurs portes et se taisent à la tombée de la nuit ; seuls résonnent dans les rues les pas de silhouettes pâles et étranges, la populace refuse d'ouvrir à quiconque et des familles terrifiées prient pour que les ténèbres se dissipent."
  aw_vampires.30.a:0 "Où sont les chasseurs de vampires ?!"
  aw_vampires.100.t:0 "Vampires déchaînés à [Root.GetName]"
  aw_vampires.100.d:0 "£icon_adventurers_wanted_banner£\nTout a commencé par le son d'une cloche avertissant les habitants du bourg de se réfugier dans leurs demeures. Ce qui devait être une nuit de plus à observer d'étranges silhouettes pâles déambuler dans les rues s'est transformé en chaos absolu. Des essaims de chauves-souris s'abattent sur la ville, rendant les murailles inutiles tandis que des meutes de vampires se lancent dans leur festin. La garde a été rapidement submergée par des chauves-souris métamorphosées en assaillants bestiaux, leur sang étalé sur la pierre et aspiré de leurs veines.\n\nBientôt, le bourg sombre dans l'anarchie ; la population désespérée s'y retranche et met le feu à ses propres maisons pour empêcher les bêtes déchaînées d'avancer, mais lentement la nuit s'épaissit et les monstruosités massacrent de plus en plus de groupes désespérés pour assouvir leur soif de sang.\n\nIl n'y a plus aucune prétention de Mascarade à [Root.GetName] ; ces vampires ont succombé à leurs instincts les plus vils et notre peuple se bat désormais pour survivre chaque nuit."
  aw_vampires.100.a:0 "Maudits soient ces fous assoiffés de sang !"
  aw_vampires.120.t:0 "Les vampires de la Mascarade traquent les Anathèmes"
  aw_vampires.120.d:0 "£icon_adventurers_wanted_banner£\nLes vampires qui coopèrent avec notre gouvernement sont les défenseurs de la Mascarade, une règle selon laquelle les vampires doivent faire un effort conscient pour que leur existence ne soit pas révélée aux masses. Il n'est donc guère surprenant que la présence de vampires enfreignant ouvertement cette règle à [Root.GetName] nuise à leurs intérêts au sein de [Root.Owner.GetName].\n\nIls ont donc déclaré ces rebelles anathèmes et envoyé des vampires spécialisés dans la chasse de leurs propres congénères pour des battues sanglantes où la proie est soit détruite, soit contrainte d'accepter le statu quo. Les rapports de nos amis dans les ombres indiquent que l'activité vampirique ouverte a presque entièrement disparu de [Root.GetName] ; la situation est de nouveau sous contrôle, et la population peut désormais circuler sans craindre d'être emportée par des bêtes sanguinaires."
  aw_vampires.120.a:0 "Ils demeurent, en fin de compte, les mieux placés pour régler les affaires de leurs semblables."
  aw_vampires.121.t:0 "Les loyalistes de la Mascarade anéantissent les vampires déchaînés"
  aw_vampires.121.d:0 "£icon_adventurers_wanted_banner£\nDans les rues, de puissantes silhouettes pâles et des bêtes vampiriques se broient mutuellement jusqu'à la poussière durant la nuit ; des familles entières capturées par les monstres pour être dévorées plus tard ont été soudainement libérées par d'étranges êtres surnaturels qui ont détruit les créatures avec une facilité déconcertante, avant de s'évanouir dans un éclair lorsqu'on tenta de les remercier.\n\nLes survivants de [Root.GetName] rapportent qu'un groupe de sauveurs des plus singuliers les a délivrés des vampires déchaînés qui ravageaient leurs bourgs et villages. Il semble que ceux qui respectent encore la Mascarade agissent contre leurs frères enragés dans l'espoir de rétablir l'ancien ordre."
  aw_vampires.121.a:0 "Nous devons coopérer pour restaurer l'ordre."
  aw_vampires.122.t:0 "Vampires soumis"
  aw_vampires.122.d:0 "£icon_adventurers_wanted_banner£\nNos congénères de [Root.GetName] refusent toujours de se conformer à notre nouveau système. Bien que nous n'ayons plus besoin de la Mascarade d'antan, il nous faut néanmoins maintenir une hiérarchie claire entre les nôtres, à laquelle ces maroufles rebelles ont refusé de se plier depuis trop longtemps.\n\nNous avons envoyé des délégations leur soumettre un ultimatum : se soumettre ou recevoir la lumière du soleil. La plupart ont accepté notre gracieuse amnistie, et pour ceux qui ont refusé, nous leur réservons un châtiment particulier. Leur destruction sera lente et méthodique."
  aw_vampires.122.a:0 "Les insolents apprendront leur place, ou ils connaîtront le soleil."
  aw_vampires.124.t:0 "Les vampires anathèmes réintègrent la Mascarade"
  aw_vampires.124.d:0 "£icon_adventurers_wanted_banner£\nNos amis dans les ténèbres comprennent que pour maintenir notre relation symbiotique, les éléments perturbateurs doivent être purgés de leurs rangs. Ils ont déclaré les vampires de [Root.GetName] anathèmes, offrant l'amnistie à ceux qui réintègrent leurs rangs avec les cendres d'un autre, et des récompenses à quiconque traquerait les traîtres. L'activité vampirique ostentatoire a considérablement diminué dans la région ces derniers temps, et la population ne craint plus de quitter son foyer la nuit. Il semble que nos amis aient habilement résolu le problème."
  aw_vampires.124.a:0 "Ils demeurent, en fin de compte, les mieux placés pour régler les affaires de leurs semblables."
  aw_vampires.125.t:0 "Chasses destructrices à [Root.GetName]"
  aw_vampires.125.d:0 "£icon_adventurers_wanted_banner£\nLes chasseurs de vampires de [Root.GetName] ainsi que d'autres aventuriers progressent régulièrement dans leur combat contre les monstruosités tapies dans les ténèbres. Ils se trouvent cependant enlisés dans un statu quo. Les vampires sont des créatures résilientes qui refusent de périr facilement, et plus la chasse se prolonge, mieux ils s'adaptent à ceux qui les traquent.\n\nLes bourgs sont paralysés tandis que la populace et les aventuriers affrontent des vampires barricadés dans des refuges ; les villages sont trop occupés à fouiller les repaires habilement dissimulés pour travailler aux récoltes ; les marchands doivent engager des gardes pour éviter d'être dévorés par les bêtes, réduisant considérablement leurs profits. [Root.GetName] s'est transformé en un véritable champ de bataille où les vivants combattent les vampires."
  aw_vampires.125.a:0 "Nous finirons par les déloger."
  aw_vampires.126.t:0 "Les clercs purgent les vampires"
  aw_vampires.126.d:0 "£icon_adventurers_wanted_banner£\nLes vampires sont considérés comme des entités maléfiques par la quasi-totalité des pratiques religieuses établies. Leur présence est un signe manifeste de corruption parmi la population, et le clergé local est impatient de voir cette réputation s'effacer de ses terres.\n\nQuelques hommes de foi voués à traquer le mal où qu'il se terre se sont rassemblés à [Root.GetName] afin de purger les créatures de ces terres et d'apporter le répit aux fidèles. L'arme bénie dans une main et le pieu fidèle dans l'autre, ils ont pénétré dans les repaires des bêtes et les ont anéanties, tandis que les captifs étaient exposés à l'étreinte purificatrice du soleil."
  aw_vampires.126.a:0 "Le clergé de [Root.Owner.Religion.GetName] nous apporte le répit."
  aw_vampires.127.t:0 "La Cour de Sang nous offre ses services"
  aw_vampires.127.d:0 "£icon_adventurers_wanted_banner£\nDe singuliers visiteurs ont demandé audience auprès de notre [Root.Owner.Monarch.GetTitle] à la tombée de la nuit ; leur peau blafarde et leurs traits d'une beauté envoûtante mettent plus d'un membre de notre cour mal à l'aise. Ils se présentent comme les représentants d'une association qui souhaiterait régler le compte de leurs congénères insolents à [Root.GetName]. Ils demandent l'autorisation de les traquer par tous les moyens qu'ils jugeront nécessaires ; naturellement, aucun citoyen de [Root.Owner.GetName] ne serait inquiété, et ils insistent qu'aucune récompense ne leur est nécessaire."
  aw_vampires.127.a:0 "À cheval donné on ne regarde pas les dents. Faites, mais tenez-nous à l'écart de vos affaires."
  aw_vampires.127.b:0 "Nous nous en occuperons nous-mêmes. Que ces immondes sangsues quittent la cour !"
  aw_vampires.128.t:0 "La Cour de Sang élimine les vampires anathèmes"
  aw_vampires.128.d:0 "£icon_adventurers_wanted_banner£\nBien que la Cour de Sang tolère l'existence de vampires hors de son influence tant qu'ils respectent la Mascarade, ceux qui refusent de respecter une règle si élémentaire sont déclarés anathèmes, proscrits et criminels aux yeux de la société vampirique. Ainsi, l'une des missions les plus cruciales de la Cour de Sang est de neutraliser les anathèmes afin de préserver la réputation de leur organisation, que ce soit en les éliminant lors de sanglantes chasses au sang ou en les contraignant à se soumettre.\n\nLes représentants de la Cour de Sang dédiés à la traque des anathèmes ont éliminé avec succès les vampires qui brisaient la Mascarade dans un autre pays, après avoir reçu la permission de son souverain."
  aw_vampires.128.a:0 "Une preuve de plus de la légitimité de la Cour de Sang."
  aw_vampires.140.t:0 "Les vampires offrent la paix"
  aw_vampires.140.d:0 "£icon_adventurers_wanted_banner£\nLes vampires de notre nation ont récemment multiplié les tentatives ouvertes de négociation d'une trêve avec le gouvernement. Des anciens accompagnés de nombreux néonates appellent au rétablissement de la Mascarade, une règle qui préserve le secret de l'existence des vampires auprès du commun, et offrent de nous aider à détruire ceux qui ne respecteraient pas ce nouveau traité. Cet accord permettrait de fait à une organisation de vampires de s'établir comme détentrice de pouvoir au sein de notre nation.\n\nBien que les vampires soient considérés comme des monstres par la plupart, leurs capacités extraordinaires et la sagesse que confère leur âge ne sont pas à sous-estimer. Ils pourraient s'avérer être un atout pour notre nation à court comme à long terme. Nous devrons, bien entendu, veiller à les satisfaire par d'ignobles offrandes de sang, sous peine de subir les conséquences du courroux d'une société vampirique organisée…"
  aw_vampires.140.a:0 "Soit, nous les autoriserons à établir leur état."
  aw_vampires.140.b:0 "Hors de question ! Apportez les pieux ! Où sont les chasseurs de vampires ?!"
  aw_vampires.141.t:0 "Les vampires déchaînés se rassemblent"
  aw_vampires.141.d:0 "£icon_adventurers_wanted_banner£\nLes rues de [Root.GetName] gisent dans le silence ; les rares survivants sont désormais endurcis par les nombreux jours passés à repousser les vampires déchaînés qui patrouillent sans relâche dans la nuit à la recherche de nouvelles proies à dévorer.\n\nLes vampires, réalisant qu'ils sont à court de proies faciles, se sont rassemblés en meutes dotées de hiérarchies simples, quasi animales. Lentement mais sûrement, un essaim gigantesque de vampires s'est constitué et s'apprête à quitter la province pour poursuivre sa frénésie de sang ailleurs."
  aw_vampires.141.a:0 "Envoyez l'armée ! Ne les laissez pas quitter [Root.GetName] !"
  aw_vampires.200.t:0 "Massacre sanglant"
  aw_vampires.200.d:0 "£icon_adventurers_wanted_banner£\nLe spectacle à [Root.GetName] est à retourner les entrailles. Des gens de toute condition, y compris des vieillards et de jeunes enfants, ont été retrouvés morts et éviscérés par les habitants. Le massacre est rapidement attribué aux vampires, car les corps sont entièrement vidés de leur sang et portent les marques de perforation caractéristiques au cou, en plus de leurs autres blessures.\n\nLes bêtes ont fondu sur ces innocents lors d'un rassemblement et les ont massacrés sans pitié. Tandis que ce récit terrifiant se répand à travers notre nation, le peuple commence à douter de la capacité du gouvernement à résoudre la situation à [Root.GetName], qu'il accuse d'ignorer délibérément les morts insensées qui ne font qu'alimenter la menace croissante du vampirisme dans les terres de [Root.Owner.GetName]."
  aw_vampires.200.a:0 "Où étaient les chasseurs de vampires ?!"
  aw_vampires.201.t:0 "Un noble s'enfuit avec un vampire ?"
  aw_vampires.201.d:0 "£icon_adventurers_wanted_banner£\nUn noble s'est récemment présenté à la cour, sa colère à peine tempérée par son strict respect de l'étiquette et la présence de gardes armés qui lui lancent des regards menaçants. Il proclame avec fureur que son héritier a été soit séduit, soit ensorcelé par un vampire, et qu'il a désormais disparu, probablement à jamais.\n\nIl insinue que le gouvernement ne fait rien pour endiguer la menace vampirique croissante, et que d'autres fils et filles de la prestigieuse noblesse de [Root.Owner.GetName] subiront le même sort que son héritier si la situation perdure et que l'implication du gouvernement demeure aussi laxiste.\n\nUne enquête approfondie n'a produit qu'une lettre d'adieu dans laquelle l'héritier exprime son amour pour son prétendu ravisseur. Bien que les sortilèges vampiriques aient aisément pu l'amener à écrire une telle lettre avant son départ."
  aw_vampires.201.a:0 "Est-ce notre faute si votre héritier était un sot ? Nous réglerons le problème des vampires en temps voulu !"
  aw_vampires.202.t:0 "La foi mise à l'épreuve par les vampires"
  aw_vampires.202.d:0 "£icon_adventurers_wanted_banner£\nLes vampires turbulents de [Root.GetName] ont ouvertement défié le clergé. Ils ont pénétré dans des temples en se vantant que les puissances vénérées par les prêtres ne font rien pour empêcher leurs incursions. Des prêtres ont été saignés à blanc et des lieux sacrés ont été profanés lors d'abominables orgies nocturnes.\n\nLe clergé humilié de [Root.GetName] qui a pu fuir retrouve ses temples transformés en véritables scènes d'horreur. Contraints de jeter les cadavres et de nettoyer les éclaboussures de sang après l'incursion vampirique, ils se retrouvent dans l'incapacité absolue de se venger à court terme."
  aw_vampires.202.a:0 "Les puissances supérieures ont-elles oublié leurs plus fidèles serviteurs ?"
  aw_vampires.202.b:0 "Étouffons cette affaire, mais dites à nos pâles amis de discipliner leurs congénères égarés !"
  aw_vampires.203.t:0 "De jeunes vampires dévastent [Root.GetName]"
  aw_vampires.203.d:0 "£icon_adventurers_wanted_banner£\nLes jeunes vampires, connus sous le nom de rejetons par leurs congénères, ont tendance à expérimenter leurs puissantes nouvelles capacités avec bien peu de prudence ou de responsabilité. Avec le nombre croissant d'infectés à [Root.GetName], il n'est guère surprenant que de nombreux incidents se soient produits où ces vampires novices ont causé destructions et morts pour rien de plus que leur propre amusement.\n\nLes conséquences dévastatrices se feront sentir un certain temps à [Root.GetName], mais fort heureusement, les jeunes ont cessé de mettre à l'épreuve leurs nouvelles capacités après leur frénésie initiale, soit abattus par les chasseurs de vampires, soit rappelés à l'ordre par leurs aînés, soit ayant pris conscience des risques que leur comportement dévastateur leur fait courir."
  aw_vampires.203.a:0 "La malédiction vampirique fait payer un nouveau tribut aux innocents."
  aw_vampires.203.b:0 "Où est leur sire ?! Tenez vos rejetons en laisse et enseignez-leur la Mascarade !"
  aw_vampires.204.t:0 "Les vampires exterminent les loups-garous"
  aw_vampires.204.d:0 "£icon_adventurers_wanted_banner£\nLes prédateurs vivant dans la même région sont voués à s'affronter lorsque leur nombre et leurs territoires de chasse s'étendent. Les vampires, maudits de non-mort par Ettalinde la Misérable, et les loups-garous, descendants de la progéniture d'Agrados Vulkar, se sont récemment livré une guerre sanglante à [Root.GetName] pour revendiquer la province comme terrain de chasse.\n\nLes bêtes se sont affrontées en de nombreuses escarmouches : les loups-garous ont déployé leurs puissantes formes monstrueuses et les vampires ont usé de toutes leurs capacités surnaturelles pour prendre le dessus. Des vampires ont été traînés en hurlant sous l'étreinte du soleil ou empalés dans leurs cercueils, tandis que des meutes de loups-garous ont été assaillies par des attaques coordonnées de vampires et vidées de leur sang.\n\nAvec le temps, les loups-garous ont vu leurs rangs s'éclaircir et les quelques survivants ont fui pour vivre un jour de plus. Les vampires, qui s'étaient unis pour combattre la menace lycanthrope, ont repris leurs habitudes individualistes."
  aw_vampires.204.a:0 "Les descendants de Vulkar ont perdu cette bataille."


  EST_VAL_AW_VAMPIRES_NOBLE_SEDUCED_BY_VAMPIRE:0 "Noble séduit par un vampire : "
  EST_VAL_AW_VAMPIRES_CHALLENGE_FAITH:0 "Les vampires défient la foi : §Y$VAL$%§!"
  EST_VAL_AW_VAMPIRES_SUPPORTED_AGAINST_FRIVOLOUS_RELIGION:0 "Soutenu contre une religion frivole : "
  EST_VAL_AW_VAMPIRES_ROGUE_VAMPIRES_WEAKEN_THE_MASQUERADE:0 "Les vampires renégats affaiblissent la Mascarade : §Y$VAL$%§!"



  aw_eldritch_cultists_1:0 "§Y(Aventuriers recherchés !)§! §gCultistes indicibles :§! §OParia délirant§!"
  desc_aw_eldritch_cultists_1:0 "Un dément en haillons peut être aperçu sur la place du bourg, vociférant d'incompréhensibles prophéties de malheur. Les habitants semblent pour la plupart agacés par sa présence, mais certains paraissent prendre ses divagations au sérieux."
  aw_eldritch_cultists_2:0 "§Y(Aventuriers recherchés !)§! §gCultistes indicibles :§! §ODévots fanatiques§!"
  desc_aw_eldritch_cultists_2:0 "De nombreux habitants du bourg se comportent de manière étrange, et les locaux signalent des rassemblements nocturnes suspects et des rituels inquiétants."
  aw_eldritch_cultists_3:0 "§Y(Aventuriers recherchés !)§! §gCultistes indicibles :§! §OBourg des Mystères !§!"
  desc_aw_eldritch_cultists_3:0 "Un étrange culte indicible a une emprise considérable sur le bourg, certains de ses membres agressant ouvertement les habitants en plein jour. D'aucuns ont fui la ville, ne s'y sentant plus en sécurité, et rapportent des récits de rituels où l'on boit du sang et de préparatifs en vue d'une apocalypse."

  aw_eldritch_cultists_migrate_to_other_country_tt:0 "Les §gcultistes indicibles§! migrent vers un pays voisin."

  aw_eldritch_cultists.0.t:0 "Arrivée d'un paria délirant"
  aw_eldritch_cultists.0.d:0 "£icon_adventurers_wanted_banner£\nUn paria errant est arrivé à [Root.GetName], s'installant sur la place du bourg et avertissant frénétiquement la population d'une catastrophe imminente."
  aw_eldritch_cultists.0.a:0 "Cela ne devrait pas être inquiétant."
  aw_eldritch_cultists.10.t:0 "Le culte indicible migre vers [aw_eldritch_cultists_migration_target.GetName]"
  aw_eldritch_cultists.10.d:0 "£icon_adventurers_wanted_banner£\nLe paria délirant qui semait le trouble à [Root.GetName] se déplace dans la région, en quête d'un nouveau foyer d'où propager sa folie."
  aw_eldritch_cultists.10.a:0 "Il ne fera que semer le trouble ailleurs."
  aw_eldritch_cultists.10.b:0 "Ce n'est plus notre problème."
  aw_eldritch_cultists.11.t:0 "Les cultistes indicibles arrivent à [Root.GetName]"
  aw_eldritch_cultists.11.d:0 "£icon_adventurers_wanted_banner£\nUn paria errant est arrivé à [Root.GetName] après avoir quitté un autre bourg, vociférant à quiconque veut l'entendre qu'une catastrophe imminente se prépare."
  aw_eldritch_cultists.11.a:0 "Préoccupant."
  aw_eldritch_cultists.13.t:0 "Le culte indicible s'étend à [aw_eldritch_cultists_migration_target.GetName]"
  aw_eldritch_cultists.13.d:0 "£icon_adventurers_wanted_banner£\nLe culte indicible de [Root.GetName] gagne en influence et s'étend au-delà des frontières provinciales. Un paria délirant se rend à [aw_eldritch_cultists_migration_target.GetName], sans doute en préparation d'opérations plus vastes sur place."
  aw_eldritch_cultists.13.a:0 "Oh non."
  aw_eldritch_cultists.13.b:0 "Au moins, ce n'est pas notre affaire."
  aw_eldritch_cultists.14.t:0 "Les cultistes indicibles arrivent à [Root.GetName]"
  aw_eldritch_cultists.14.d:0 "£icon_adventurers_wanted_banner£\nUn paria délirant appartenant à un supposé culte indicible venu de [From.GetName] est arrivé à [Root.GetName], dans le but manifeste de propager son influence."
  aw_eldritch_cultists.14.a:0 "Balivernes !"
  aw_eldritch_cultists.15.t:0 "Les cultistes indicibles fuient devant [Root.Owner.GetName]"
  aw_eldritch_cultists.15.d:0 "£icon_adventurers_wanted_banner£\nIl semble que les adeptes de l'indicible n'aient aucune tolérance pour ce qu'ils considèrent être des monstres. Le culte qui se terrait à [Root.GetName] a été vu en pleine fuite, s'en allant sans doute terroriser quelque lieu « civilisé » plus réceptif à leurs tromperies."
  aw_eldritch_cultists.15.a:0 "Fuyez, pauvres fous !"
  aw_eldritch_cultists.20.t:0 "Les cultistes indicibles disparaissent"
  aw_eldritch_cultists.20.d:0 "£icon_adventurers_wanted_banner£\nIl semblerait que les habitants de [Root.GetName] en aient eu plus qu'assez des activités sectaires dans leur bourg, et aient décidé de ne pas attendre que des aventuriers viennent résoudre le problème à leur place. Tous les cultistes ont disparu du jour au lendemain, et plusieurs tombes fraîches ont fait leur apparition au cimetière."
  aw_eldritch_cultists.20.a:0 "Bon débarras."
  aw_eldritch_cultists.21.t:0 "Les aventuriers anéantissent le culte"
  aw_eldritch_cultists.21.d:0 "£icon_adventurers_wanted_banner£\nAprès une longue période de planification, une bande d'aventuriers s'est infiltrée dans un grand rituel du culte indicible à [Root.GetName], lequel tentait selon eux d'invoquer ce qu'ils appellent un « Aspect des Descendants Ténébreux ». Quoi qu'il en soit, l'attaque fut un succès, et les aventuriers ont entièrement éradiqué le culte sur place."
  aw_eldritch_cultists.21.a:0 "Du beau travail."
  aw_eldritch_cultists.23.t:0 "Contre le culte"
  aw_eldritch_cultists.23.d:0 "£icon_adventurers_wanted_banner£\nLe culte indicible qui se terre à [Root.GetName] est d'une insaisissable discrétion. Certains de ses membres vivent au grand jour sous de faux prétextes, voire de fausses identités, tandis que d'autres œuvrent dans l'ombre la plus complète. Identifier les meneurs est une tâche ardue, mais nos aventuriers sont parvenus à porter un coup sévère à leurs opérations en éliminant des membres de la hiérarchie et en sabotant leurs couvertures."
  aw_eldritch_cultists.23.a:0 "C'est un début."
  aw_eldritch_cultists.24.t:0 "Le culte indicible est démantelé"
  aw_eldritch_cultists.24.d:0 "£icon_adventurers_wanted_banner£\nLe culte indicible est un ennemi insaisissable, mais face à nos guerriers, aucune cachette ne peut suffire bien longtemps. Après avoir perquisitionné et interrogé diverses demeures et commerces de [Root.GetName], ils ont enfin été conduits au repaire principal du culte et ont réduit en cendres le bâtiment et ses occupants, abattant ceux qui tentaient de fuir les décombres en flammes. Par mesure de précaution, ils ont également rasé les bâtiments adjacents pour s'assurer que tout vestige du culte était anéanti."
  aw_eldritch_cultists.24.a:0 "On ne peut ni fuir, ni se cacher."
  aw_eldritch_cultists.25.t:0 "Monstres contre cultistes indicibles"
  aw_eldritch_cultists.25.d:0 "£icon_adventurers_wanted_banner£\nLe culte indicible opère dans l'ombre sous de faux prétextes et de belles paroles. Fort heureusement, leurs méthodes ne fonctionnent véritablement que dans ce qu'ils appellent les « royaumes civilisés », et leurs poignées de main secrètes et rituels clandestins n'ont aucune prise sur nos plus grands chamans et nos sages. Nos guerriers ont découvert quelques repaires et organisé des raids pour éliminer quiconque s'y trouvait. Ils sont à présent de retour, et bien que certains cultistes aient réussi à s'échapper, un grand nombre d'entre eux ont été tués."
  aw_eldritch_cultists.25.a:0 "Trouvez les autres !"
  aw_eldritch_cultists.30.t:0 "Le culte indicible s'étend"
  aw_eldritch_cultists.30.d:0 "£icon_adventurers_wanted_banner£\nLe culte indicible de [Root.GetName] gagne rapidement en influence, devenant un pouvoir enraciné dans la province ; ses représentants ont déjà racheté des propriétés et des commerces et gagné les faveurs de personnalités influentes. Il recrute des membres dans toutes les couches de la population, certains par désespoir, d'autres par ambition, d'autres encore par dévotion aveugle."
  aw_eldritch_cultists.30.a:0 "Préoccupant."
  aw_eldritch_cultists.110.t:0 "Le culte indicible se propage depuis [Root.GetName]"
  aw_eldritch_cultists.110.d:0 "£icon_adventurers_wanted_banner£\nL'emprise du culte indicible sur [Root.GetName] est formidable, et il n'est guère surprenant que nombre de ses membres aient recruté de plus en plus d'adeptes dans leur congrégation impie. Lentement mais sûrement, les habitants de [aw_eldritch_cultists_migration_target.GetName] commencent à s'exprimer en termes étranges et à échanger des poignées de main secrètes, à l'image de leurs nouveaux frères de [Root.GetName]."
  aw_eldritch_cultists.110.a:0 "Quelle est donc la puissance de ce culte ?"
  aw_eldritch_cultists.120.t:0 "Le culte indicible expulsé par la province"
  aw_eldritch_cultists.120.d:0 "£icon_adventurers_wanted_banner£\nIl semblerait que les habitants de [Root.GetName] en aient eu plus qu'assez des activités sectaires dans leur bourg, et aient décidé de ne pas attendre les aventuriers pour résoudre le problème. Ils ont expulsé par la force chaque cultiste de leur ville, les dispersant aux quatre vents. Malheureusement, le culte est incroyablement difficile à détruire ; ses membres ont désormais pris racine à [aw_eldritch_cultists_migration_target.GetName]."
  aw_eldritch_cultists.120.a:0 "Puissent-ils aller loin, très loin."
  aw_eldritch_cultists.121.t:0 "La loi du culte à [Root.GetName]"
  aw_eldritch_cultists.121.d:0 "£icon_adventurers_wanted_banner£\nLe culte indicible de [Root.GetName] est devenu extrêmement influent, prenant le contrôle d'une grande partie du gouvernement local au point que la police et la garnison ont été remplacées par une milice sanctionnée par le culte. D'étranges bannières ésotériques flottent haut sur les bâtiments et les chariots à la place de celles de [Root.Owner.GetName]. À ce stade, nous devrons peut-être intervenir pour nous assurer de conserver plus qu'un pouvoir nominal sur la province."
  aw_eldritch_cultists.121.a:0 "Envoyez la garde nationale."
  aw_eldritch_cultists.121.b:0 "Mieux vaut ne pas réveiller le chat qui dort…"
  aw_eldritch_cultists.130.t:0 "Vague de charité du culte indicible"
  aw_eldritch_cultists.130.d:0 "£icon_adventurers_wanted_banner£\nUne somme considérable est versée à diverses fondations caritatives par ce que nous pensons être le culte indicible de [Root.GetName]. Il est difficile de déterminer s'ils agissent par générosité et dévotion, ou s'il y a des moyens plus coercitifs en jeu, pour étendre les tentacules de leur contrôle sur la province."
  aw_eldritch_cultists.130.a:0 "Suspect."
  aw_eldritch_cultists.131.t:0 "Disparitions d'habitants"
  aw_eldritch_cultists.131.d:0 "£icon_adventurers_wanted_banner£\nPlusieurs habitants de [Root.GetName] ont disparu, beaucoup soupçonnant l'implication du culte indicible qui y sévit. Soudain, tous sont revenus, ce qui fut d'abord un immense soulagement pour leurs proches et leurs familles. Certains rapportent cependant que ceux qui sont revenus se comportent étrangement, et ne semblent plus se souvenir de choses élémentaires sur eux-mêmes."
  aw_eldritch_cultists.131.a:0 "C'est sans doute le contrecoup de l'épreuve."
  aw_eldritch_cultists.140.t:0 "Animaux morts du culte indicible"
  aw_eldritch_cultists.140.d:0 "£icon_adventurers_wanted_banner£\nAprès une nuit d'orage d'une violence inhabituelle, un grand nombre de bêtes d'élevage ont été retrouvées mortes dans les champs de [Root.GetName]. Même avec un temps aussi exécrable, de tels dégâts étaient sans précédent. Plus inquiétant encore, l'examen du bétail a révélé que plusieurs organes internes avaient été prélevés, et certaines bêtes portaient d'étranges marques rituelles sur la peau…"
  aw_eldritch_cultists.140.a:0 "Laissez-moi deviner, nous n'avons aucune piste."
  aw_eldritch_cultists.141.t:0 "Des cultistes dans l'administration"
  aw_eldritch_cultists.141.d:0 "£icon_adventurers_wanted_banner£\nDes rumeurs circulent selon lesquelles le culte indicible de [Root.GetName] aurait infiltré les plus hautes sphères de notre gouvernement. Nous ignorons quelles personnes ils tiennent sous leur emprise, mais ils semblent capables d'anticiper chacun de nos mouvements."
  aw_eldritch_cultists.141.a:0 "…par où commencer ?"
  aw_eldritch_cultists.142.t:0 "Une étrange ferveur"
  aw_eldritch_cultists.142.d:0 "£icon_adventurers_wanted_banner£\nLa population de [Root.GetName] a été prise d'une frénésie inexplicable. On rapporte des violences aveugles, des incendies criminels et des flagellations publiques, provoqués par des émotions que personne ne parvient véritablement à articuler."
  aw_eldritch_cultists.142.a:0 "C'est ce maudit culte, n'est-ce pas ?"
  aw_eldritch_cultists.143.t:0 "Disparitions sectaires"
  aw_eldritch_cultists.143.d:0 "£icon_adventurers_wanted_banner£\nNous avons reçu des nouvelles d'étranges cavaliers revenant de [aw_target_eldritch_cultist.GetName]. La rumeur prétend qu'ils ramènent de pauvres victimes de cette province voisine pour accomplir quelque sombre dessein sur ces innocents."
  aw_eldritch_cultists.143.a:0 "Nous devrons tirer cette affaire au clair."
  aw_eldritch_cultists.144.t:0 "Disparitions du culte indicible"
  aw_eldritch_cultists.144.d:0 "£icon_adventurers_wanted_banner£\nPlusieurs personnes ont disparu de [Root.GetName] sans prévenir au cours de la nuit, semant l'inquiétude parmi la population. Beaucoup croient que les victimes ont été emmenées de l'autre côté de la frontière vers l'étrange bourg de [From.GetName], bien qu'ils n'aient aucune preuve pour étayer ces allégations."
  aw_eldritch_cultists.144.a:0 "Sont-ils incapables de contrôler ces cultistes ?"

  aw_eldritch_cultists_donation_spree:0 "Charité du culte indicible"
  aw_eldritch_cultists_dead_livestock:0 "Bétail tué par le culte indicible"
  aw_eldritch_cultists_sacrifices:0 "Le culte indicible… Des enlèvements ?"

  aw_hags_1:0 "§Y(Aventuriers recherchés !)§! §gGuenaudes :§! §OSorcières en périphérie§!"
  desc_aw_hags_1:0 "Un vieux mythe raconte qu'une étrange vieille femme à la peau maladive et couverte de verrues se terre aux confins du bourg. Elle murmure d'étranges paroles et propose d'inquiétants marchés à quiconque s'aventure jusque chez elle, en échange d'actes plus sombres encore et de paiements plus ténébreux. Pour l'aventurier averti, il ne s'agit point d'une femme ordinaire, mais de la plus dangereuse des créatures féeriques : une guenaude. De puissantes fées bannies du Royaume Féerique qui vivent désormais en exil et en ressentiment dans notre monde, les dieux seuls savent pourquoi."
  aw_hags_2:0 "§Y(Aventuriers recherchés !)§! §gGuenaudes :§! §OConvent de guenaudes§!"
  desc_aw_hags_2:0 "Des ricanements de sorcières résonnent dans les faubourgs et les recoins ténébreux. Si une seule mégère suffisait à semer l'effroi, trois ou davantage est un fléau bien pire. Les guenaudes infestant les tréfonds de nos terres se sont liguées à des fins néfastes, offrant des marchés plus considérables à ceux dont le cœur recèle des ténèbres et l'esprit des doutes."
  aw_hags_3:0 "§Y(Aventuriers recherchés !)§! §gGuenaudes :§! §OCultes de guenaudes§!"
  desc_aw_hags_3:0 "Par-delà les lisières de la société civilisée se nichent de tranquilles villages aux sombres secrets. Abandonnant les dieux qu'ils vénéraient jadis, ils se tournent désormais vers de nouvelles puissances temporelles pour obtenir faveurs et bénédictions en échange d'offrandes ténébreuses. Des enfants conduits dans les bois, suivant des traînées de confiseries, d'étranges marques et des mutilations d'oreilles, et des rituels plus étranges encore se déroulent dans les nuits sombres de ces terres reculées, car ce peuple se tourne vers les sorcières pour les guider."

  aw_hags.0.t:0 "Une guenaude s'installe"
  aw_hags.0.d:0 "£icon_adventurers_wanted_banner£\nLa rumeur court qu'une guenaude a établi un repaire dans quelque recoin obscur de [Root.GetName]. Les habitants gardent anxieusement leurs enfants à l'intérieur et réclament que l'on fasse quelque chose. Certains individus plus ambitieux, cependant, semblent moins intimidés par l'arrivée de cette nouvelle menace."
  aw_hags.0.a:0 "Il faudra s'en occuper."
  aw_hags.20.t:0 "La guenaude est tuée"
  aw_hags.20.d:0 "£icon_adventurers_wanted_banner£\nIl semblerait que la guenaude qui habitait [Root.GetName] ait été tuée ! Apparemment, une victime potentielle avait feint l'inconscience et poussé la guenaude dans son propre chaudron lorsque celle-ci eut le dos tourné ! De nouvelles légendes locales sont déjà composées en l'honneur de ce héros du cru."
  aw_hags.20.a:0 "Voilà qui nous épargne bien des tracas."
  aw_hags.21.t:0 "Les aventuriers tuent la guenaude"
  aw_hags.21.d:0 "£icon_adventurers_wanted_banner£\nUne bande d'aventuriers a réussi à tuer la guenaude qui terrorisait [Root.GetName], nous rapportant sa tête pour la prime. Les habitants sont soulagés de savoir la menace écartée, et l'on peut de nouveau voir des enfants jouer dans les rues."
  aw_hags.21.a:0 "C'est pour cela qu'on les paie."
  aw_hags.22.t:0 "La guenaude s'affaiblit"
  aw_hags.22.d:0 "£icon_adventurers_wanted_banner£\nLa guenaude qui sévit à [Root.GetName] représente une menace redoutable depuis un certain temps, mais récemment, quelque chose semble avoir brisé son pouvoir. Certains séides qui étaient sous son emprise sont parvenus à s'en affranchir, et aucune disparition n'a été signalée depuis un moment. Il est probable qu'elle se remettra, mais sans doute pas au niveau de puissance qu'elle possédait initialement."
  aw_hags.22.a:0 "Profitons-en tant que ça dure."
  aw_hags.23.t:0 "Les aventuriers affrontent la guenaude"
  aw_hags.23.d:0 "£icon_adventurers_wanted_banner£\nUne bande d'aventuriers a réussi à pénétrer dans le repaire de la guenaude de [Root.GetName], libérant plusieurs séides de son emprise. Malheureusement, ils n'ont pas réussi à la tuer, mais son pouvoir est réduit pour l'instant."
  aw_hags.23.a:0 "C'est un début."
  aw_hags.24.t:0 "La guenaude est massacrée"
  aw_hags.24.d:0 "£icon_adventurers_wanted_banner£\nNos guerriers ont enfin réussi à trouver le repaire de la guenaude qui infestait [Root.GetName]. Ils l'ont investi, tué la guenaude, et nous ont rapporté sa tête."
  aw_hags.24.a:0 "Pas de squatteuses sur nos terres !"
  aw_hags.25.t:0 "Le repaire de la guenaude est saccagé"
  aw_hags.25.d:0 "£icon_adventurers_wanted_banner£\nNos guerriers ont saccagé le repaire de la guenaude qui infestait [Root.GetName], et ont tout détruit sur leur passage. La guenaude elle-même n'a pas été retrouvée, mais elle sera au moins moins dangereuse désormais."
  aw_hags.25.a:0 "Trouvez-la, et tuez-la !"
  aw_hags.120.t:0 "La guenaude est métamorphosée"
  aw_hags.120.d:0 "£icon_adventurers_wanted_banner£\nTout commença par un ricanement. Au début, seuls nous l'entendîmes, mais avec le temps, la guenaude l'entendit aussi, et elle prit peur. Elle se mit à faire les cent pas en marmonnant, proférant des menaces dans quelque langue inconnue qui se muèrent peu à peu en cris stridents… puis elle commença à changer. Des plumes blanches se mirent à germer sous sa robe, rampant sur sa peau, l'enveloppant, la rapetissant… jusqu'à ce qu'il ne reste plus qu'une oie, toujours vociférante, se dandinant vers le monde extérieur. Tous les survivants de la guenaude de [Root.GetName] racontent la même histoire invraisemblable, que nous n'avons d'autre choix que d'accepter pour véridique."
  aw_hags.120.a:0 "Les voies du peuple fée sont impénétrables."
  aw_hags.130.t:0 "La guenaude gagne en puissance"
  aw_hags.130.d:0 "£icon_adventurers_wanted_banner£\nLes disparitions se multiplient à [Root.GetName] et dans ses environs, car la guenaude qui infeste la province a gagné en puissance, accroissant le nombre de ses séides."
  aw_hags.130.a:0 "Il faut s'en occuper, et vite."
  aw_hags.200.t:0 "Des mages marchandent avec la guenaude"
  aw_hags.200.d:0 "£icon_adventurers_wanted_banner£\nIl semble qu'un groupe de mages expérimente de nouvelles formes de magie, narguant ouvertement leurs pairs incapables de maîtriser leurs nouveaux sorts. De plus en plus, on soupçonne que cette nouvelle magie recèle quelque chose de surnaturel, mais pour l'heure, la recherche magique se concentre entièrement sur la maîtrise de ces nouveaux sortilèges."
  aw_hags.200.a:0 "C'est cette maudite guenaude, n'est-ce pas ?"
  aw_hags.201.t:0 "Des nobles marchandent avec la guenaude"
  aw_hags.201.d:0 "£icon_adventurers_wanted_banner£\nUne maison noble, autrefois de rang assez modeste, a rapidement acquis un prestige et une influence considérables. On crut d'abord à une bonne diplomatie et à un heureux hasard, mais des indices récents suggèrent que cette maison aurait conclu un pacte avec une guenaude. Nous n'avons aucun moyen de le prouver, et nous ne pouvons guère agir tandis qu'elle consolide son pouvoir à nos dépens."
  aw_hags.201.a:0 "Savent-ils à qui ils ont affaire ?"
  aw_hags.202.t:0 "Le clergé marchande avec la guenaude"
  aw_hags.202.d:0 "£icon_adventurers_wanted_banner£\nRécemment, plusieurs membres du clergé ont affiché un comportement que l'on ne peut qualifier autrement que d'impie. Nous avons pu remonter la trace d'au moins un de ces incidents jusqu'à un ecclésiastique ayant conclu un marché avec une guenaude, mais il devient de plus en plus évident qu'il ne s'agit pas d'un cas isolé."
  aw_hags.202.a:0 "Ils devraient pourtant mieux savoir !"
  aw_hags.203.t:0 "Des marchands marchandent avec la guenaude"
  aw_hags.203.d:0 "£icon_adventurers_wanted_banner£\nRécemment, la fortune de trois familles marchandes a considérablement augmenté, ces dernières ayant racheté nombre de leurs petits concurrents. Cela commença par l'une d'elles, rapidement suivie par les deux autres. Nous n'y prêtâmes d'abord guère attention, mais la rivalité entre elles est devenue de plus en plus acerbe, au détriment du bien-être de notre population. Nous avons désormais des indices que la magie d'une guenaude est impliquée dans ces conflits, et ce peut-être depuis le tout début."
  aw_hags.203.a:0 "Découvrez ce qu'ils ont fait, et trouvez cette maudite guenaude !"
  aw_hags.204.t:0 "Des aventuriers marchandent avec la guenaude"
  aw_hags.204.d:0 "£icon_adventurers_wanted_banner£\nL'une des bandes d'aventuriers qui poursuivait la prime pour la guenaude semble l'avoir trouvée il y a déjà quelque temps. Au lieu de la tuer, cependant, ils semblent avoir conclu un marché avec elle et usé de sa magie impie à leurs propres fins. Ils ont finalement été capturés et châtiés, mais nous ne sommes pas plus près de trouver la guenaude, et les autres aventuriers se sont montrés peu compréhensifs sur la question."
  aw_hags.204.a:0 "Pourriez-vous simplement faire votre travail ?"
  aw_hags.205.t:0 "Des enfants disparaissent"
  aw_hags.205.d:0 "£icon_adventurers_wanted_banner£\nMalgré les précautions des parents, plusieurs enfants ont disparu à [Root.GetName], et il ne faut guère d'imagination pour deviner que la guenaude en est responsable. La population locale a organisé des battues de grande envergure et tente de garder espoir de retrouver les enfants perdus, mais l'humeur est sombre."
  aw_hags.205.a:0 "Elle paiera pour ses crimes."
  aw_hags.206.t:0 "Accusations calomnieuses"
  aw_hags.206.d:0 "£icon_adventurers_wanted_banner£\nDes langues jalouses répandent des rumeurs selon lesquelles [Root.Monarch.GetName] aurait conclu des marchés avec une guenaude, qualifiant notre pouvoir de contre nature et soulignant que nous abritons toujours une guenaude en liberté au sein de nos frontières. Ces rumeurs ne sont pas encore prises trop au sérieux, mais nous devons reprendre la situation en main au plus vite."
  aw_hags.206.a:0 "Quelqu'un pourrait-il enfin tuer cette maudite guenaude ?"

