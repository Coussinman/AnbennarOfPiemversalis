l_french:
 LOADING_TIP_0:0 "Les Bois-Profonds abritent de nombreuses fées. Des kelpies carnivores aux tulmuns tenaces en passant par les puissants zites, chaque fée est unique à sa manière."
 LOADING_TIP_1:0 "L'Ordre des Chroniqueurs possède des archives sur plus de 80 types de fromages différents."
 LOADING_TIP_2:0 "Le Bulwar serait le berceau de l'humanité."
 LOADING_TIP_3:0 "On dit que les cheveux de couleur vive ou exotique chez les peuples elfiques sont un signe d'ancienne noblesse."
 LOADING_TIP_4:0 "La Forêt Tropicale d'Effelai est la région la plus riche en biodiversité de Halann. Ses peuples autochtones vénèrent les nombreuses régions de la jungle comme leur dieu."
 LOADING_TIP_5:0 "L'Ère des Rois-Sorciers vit l'ascension de puissants monarques magiciens, régnant sur l'Escann loin des regards indiscrets du Magisterium."
 LOADING_TIP_6:0 "Les armes à feu furent inventées par les anciens nains du Dwarovar, mais gagnèrent en popularité pendant la Marée Verte."
 LOADING_TIP_7:0 "Les halfelins adorent la nourriture."
 LOADING_TIP_8:0 "Wesdam abrite les derniers Silmuna de l'Empire, bien que beaucoup ne les considèrent pas comme les successeurs légitimes de la famille qu'ils ont trahie."
 LOADING_TIP_9:0 "-cestir signifie « camp » en elfique."
 LOADING_TIP_10:0 "Núr signifie « nouveau » en elfique."
 LOADING_TIP_11:0 "Arca signifie « château » en elfique."
 LOADING_TIP_12:0 "Le Jour des Cieux Cendrés est également connu comme la Ruine d'Aelantir."
 LOADING_TIP_13:0 "L'ère calendaire à Anbennar est AC et PC, Avant la Cendre et Pendant la Cendre, d'après le Jour des Cieux Cendrés."
 LOADING_TIP_14:0 "La Guerre du Roi-Sorcier vit Castanor Noir conquérir presque tout Cannor... jusqu'à l'arrivée de la Flotte Vestige elfique en 1000 PC."
 LOADING_TIP_15:0 "La Ligue des Royaumes Libres était composée de pays qui résistèrent au Roi-Sorcier, tels que Gawed, Lorent et la Damérie."
 LOADING_TIP_16:0 "Castanor Noir désigne l'ère durant laquelle Castanor était sous domination gérudienne, y compris la période où il était contrôlé par le Roi-Sorcier."
 LOADING_TIP_17:0 "Le Petit-Pays est connu comme le « grenier à blé de Cannor »."
 LOADING_TIP_18:0 "La Tête-de-Dame tire son nom du moment où les premiers cartographes réalisèrent que la mer ressemblait à une tête de femme, portant un hennin et regardant vers l'ouest !"
 LOADING_TIP_19:0 "Anbenncóst est la plus grande ville du monde connu : le Cœur d'Anbennar, la Cité des Cités, la Ville du Désir du Monde."
 LOADING_TIP_20:0 "L'Empire d'Anbennar possède traditionnellement des électeurs représentant les principales minorités raciales du pays : halfelins, elfes et nains."
 LOADING_TIP_21:0 "La plupart des humains de Cannor parlent la même langue, dérivée de la langue de Castanor, le premier empire humain."
 LOADING_TIP_22:0 "Anbennar était autrefois une magocratie ; depuis les Guerres de Domination en 1284, elle est dirigée par la noblesse. La noblesse, bien sûr, a du sang magique."
 LOADING_TIP_23:0 "La Rébellion de la Poudre Noire est un événement futur qui mettra fin au règne quasi-magocratique d'Anbennar."
 LOADING_TIP_24:0 "Le Bleu Damérien est une couleur spéciale répandue à travers Anbennar en raison de ses origines dans la République Damérienne."
 LOADING_TIP_25:1 "TELLUM"
 LOADING_TIP_26:0 "Anbennar faisait en fait partie de la thèse universitaire de JayBean !"
 LOADING_TIP_27:1 "Saviez-vous que Paradox a organisé un Dev Clash dans Anbennar ?"
 LOADING_TIP_28:0 "Merci à tous les contributeurs et supporters du mod, je n'aurais pas pu faire cela sans vous !"
 LOADING_TIP_29:0 "Les Elfes Marins sont ceux qui ont refusé une vie à Cannor et errent encore sur les mers, vivant comme ils le faisaient dans la Flotte Vestige."
 LOADING_TIP_30:0 "Voulez-vous en savoir plus sur Anbennar, aider au développement, ou simplement discuter avec d'autres joueurs ? Rejoignez notre Discord dès aujourd'hui !"
 LOADING_TIP_31:0 "Saviez-vous qu'Anbennar a un Patreon ?"
 LOADING_TIP_32:0 "Anbennar est un monde en construction depuis 2012, mais le mod n'est en développement que depuis 2018."
 LOADING_TIP_33:0 "Halann est le nom de la planète où se déroule l'univers."
 LOADING_TIP_34:0 "On dit que les anciens elfes, connus comme les elfes précurseurs, régnaient autrefois sur le monde entier."
 LOADING_TIP_35:0 "L'Océan des Lamentations d'Uelos fut nommé d'après le primordial Uelos, qui aurait pleuré et créé les mers en deuil de sa sœur Halanna."
 LOADING_TIP_36:0 "Anbennar signifie « communion » ou « unité » en elfique."
 LOADING_TIP_37:0 "Port-Jaher au Businor abrite la plus grande communauté d'Elfes Solaires de Cannor, et porte le nom du héros Elfe Solaire Jaher."
 LOADING_TIP_38:0 "La Folie-de-Daravan était une terre luxuriante et fertile jusqu'à ce que son homonyme, le Roi Corbeau Daravan le Malfaisant, inonde la région pour stopper une invasion gnolle."
 LOADING_TIP_39:0 "L'Enchantement est l'école magique qui traite de l'influence et du contrôle des esprits d'autrui."
 LOADING_TIP_40:0 "La magie à Anbennar est divisée en huit écoles."
 LOADING_TIP_41:0 "La Révérie tire son nom des Pillards, d'infâmes raiders nordiques de Gérudie."
 LOADING_TIP_42:0 "Deranne fut fondée par la Pilleuse Derhilda Reine-des-Pillards pendant l'Ère de la Glace Noire."
 LOADING_TIP_43:0 "« Cieux Cendrés ! » est un juron courant à Anbennar."
 LOADING_TIP_44:0 "La Flotte Vestige était le nom donné aux navires elfiques ayant survécu au Jour des Cieux Cendrés."
 LOADING_TIP_45:0 "Jexis, l'Impératrice Brûlée, était la fille de Jaher. Elle ressuscita l'Empire du Phénix et conquit près de la moitié de Cannor avant sa mort en 1162."
 LOADING_TIP_46:0 "L'Empire du Phénix de Jaher s'étendait du Businor à l'ouest jusqu'à Tianlou à l'est."
 LOADING_TIP_47:0 "Les Seigneurs du Vin de Rubenaire, Madelaire et Eilísin sont tous des branches cadettes de la Maison de Siloriel."
 LOADING_TIP_48:0 "Les dieux d'Anbennar ne parlent pas à leurs fidèles. Certains se demandent s'ils existent vraiment."
 LOADING_TIP_49:0 "La magie de guérison est rare à Anbennar, et quasi inexistante en 1444."
 LOADING_TIP_50:0 "L'ancien empire humain de Castanor fut fondé par des esclaves en fuite du Bulwar et de la Khétérata appelés les Castanites."
 LOADING_TIP_51:0 "Les peuples aléniques (comme les Gawedi et Wexonards) tirent leurs origines de la Rivière Alen."
 LOADING_TIP_52:0 "La Bande d'Argent était un groupe d'elfes qui suivirent Munas Chante-Lune à la guerre pendant la Guerre du Roi-Sorcier."
 LOADING_TIP_53:0 "Ianren le Cavalier était un général elfique infâme, réputé pour son équitation, qui fonda le Royaume Elfique d'Arbaran."
 LOADING_TIP_54:0 "Eborian Eaux-Dorées était un amiral de la Flotte Vestige qui s'installa plus tard sur l'Île de Tef et fonda la Maison de Silebor."
 LOADING_TIP_55:0 "Narawen la Vagabonde était une grande exploratrice elfique qui fonda plus tard la Maison de Silnara après s'être retirée de ses aventures."
 LOADING_TIP_56:0 "Urion Serment-des-Étoiles fut le premier elfe à devenir chevalier. Il épousa plus tard une princesse escanni et fonda la Maison de Silurion."
 LOADING_TIP_57:0 "Istralania Chanteuse-de-Guerre était une célèbre générale elfique pendant la Guerre du Roi-Sorcier et fonda plus tard la Maison de Silistra."
 LOADING_TIP_58:0 "Calasandur le Magnifique était l'elfe qui construisit les fameux Châteaux Candariens à Cannor. Il est aussi le progéniteur de la Maison Silcalas."
 LOADING_TIP_59:0 "La damestear noire annule la magie au lieu de l'amplifier. La mélanger avec de la poudre à canon permet aux balles de percer n'importe quel bouclier magique."
 LOADING_TIP_60:0 "La damestear est un type de météorite aux propriétés hautement magiques. C'est un composant essentiel de tout ce qui est magique, comme les potions de mana."
 LOADING_TIP_61:0 "L'artisanat magique est l'art d'inventer et de créer des objets imprégnés ou alimentés par la magie."
 LOADING_TIP_62:0 "La Noire du Dwarovar est la bière la plus puissante de la planète, et on dit qu'elle tue les non-nains."
 LOADING_TIP_63:0 "Le Spécial Varilleni est un vin coûteux produit à Ibevar, célèbre pour sa capacité à briller."
 LOADING_TIP_64:0 "On dit qu'une organisation connue sous le nom de Cour du Sang dirige la Corvurie depuis les ombres."
 LOADING_TIP_65:0 "La Cour Régente croit aux avatars divins, des individus qui sont en fait les dieux descendus des cieux sous forme mortelle."
 LOADING_TIP_66:0 "Dans l'antiquité, les peuples gnolls étaient unifiés sous le Grand Xhaz, dirigé par le Xhazobine, un gnoll marqué par les démons."
 LOADING_TIP_67:0 "Selon la tradition, les hommes-lézards ont été gouvernés par 332 empires. Ils croient que le 333e sera l'empire final qui régnera sur leur espèce pour l'éternité."
 LOADING_TIP_68:0 "L'opposé de la Cour Régente est la Cour Infernale. Elle est menée par Kazraiel, le Prince-Courroux, une partie de Castellos corrompue pendant la Guerre des Dieux."
 LOADING_TIP_69:0 "La Cour Régente (aussi connue comme le Panthéon Cannorien) est un ensemble de dieux principalement vénérés sur le continent de Cannor."
 LOADING_TIP_70:1 "Le vrai nom de Castanor est en fait l'Empire de Castan, car chaque souverain change son nom en Castan lors de son élévation à la dignité impériale."
 LOADING_TIP_71:0 "Castellos était la divinité tutélaire de l'ancien Empire de Castanor."
 LOADING_TIP_72:0 "Castellos est le dieu principal de la religion de la Cour Régente. Il est le dieu de l'autorité, de l'ordre et de la justice."
 LOADING_TIP_73:0 "On dit que Munas Chante-Lune, héros elfique légendaire et fondateur de la Maison Silmuna, chanta à la lune pour guider les navires de son peuple vers Cannor."
 LOADING_TIP_74:0 "La Dame est la main gauche et la nièce de Castellos. Elle est la déesse de la Cour Régente de la moisson, du savoir et de la magie."
 LOADING_TIP_75:0 "Adean est le dieu de la Cour Régente de la chevalerie et de la droiture. Il est le premier enfant de Castellos et Esmaryal, et est le patron des chevaliers et des guerriers vertueux."
 LOADING_TIP_76:0 "Les peuples Wexonards fuirent leurs terres dans l'Étendue Alénique pendant l'Éveil-du-Dragon et s'installèrent à Anbennar, où ils demeurent à ce jour."
 LOADING_TIP_77:0 "Castonath est l'ancienne capitale de pierre de l'Empire Castanorien."
 LOADING_TIP_78:0 "L'Escann féodal réglait ses disputes par des combats et duels chevaleresques plutôt que par la guerre."
 LOADING_TIP_79:0 "Escann est le surnom commun pour les terres de l'Est de Cannor."
 LOADING_TIP_80:0 "Les Familles d'Argent (comme les Silmuna, Silistra et Silcalas) sont des maisons nobles descendant des héros elfiques de la Guerre du Roi-Sorcier."
 LOADING_TIP_81:0 "La magie peut être apprise par quiconque, mais il est vrai que ceux qui ont du sang elfique ont une meilleure maîtrise des arts arcaniques."
 LOADING_TIP_82:0 "Les nobles d'Anbennar ne sont pas vraiment de vrais demi-elfes génétiques, et en 1444 sont devenus une sous-race « demi-elfe » à part entière."
 LOADING_TIP_83:0 "Aul-Dwarov était un ancien empire nain qui s'étendait sur l'ensemble des Montagnes de l'Échine-du-Serpent."
 LOADING_TIP_84:0 "La Hiérarchie Gnomique régnait autrefois sur toutes les terres de la Côte-du-Dragon jusqu'à sa défaite par les kobolds pendant l'Éveil-du-Dragon."
 LOADING_TIP_85:0 "Le peuple humain de la Khétérata vénère les Khet, de puissants dieux vivants qui prennent la forme d'un humain avec une tête de chat."
 LOADING_TIP_86:0 "La République Damérienne était une ancienne puissance et rivale de Castanor, centrée sur la Mer-de-Dame dans ce qu'on appelle maintenant le Vieux Damenath."
 LOADING_TIP_87:0 "La Pestilence Blanche était une épidémie de zombies qui faillit détruire Cannor avant d'être stoppée par la Croisade Aldrésienne en 1053."
 LOADING_TIP_88:0 "La religion Corinite croit que Corin est un souverain plus juste et approprié pour la Cour Régente, et sera plus proactif dans la lutte contre le mal."
 LOADING_TIP_89:0 "Ioriel était une elfe qui s'intégra dans le Royaume de Lorent et en fit l'un des pays les plus puissants de l'histoire."
 LOADING_TIP_90:0 "Les Harimari sont un peuple de tigres humanoïdes qui ont gouverné une grande partie de Haless depuis leur accession à la sapience après le Jour des Cieux Cendrés."
 LOADING_TIP_91:0 "Jaher était le légendaire Elfe Solaire qui libéra les peuples Bulwari de leurs conquérants gnolls et forgea l'Empire du Phénix."
 LOADING_TIP_92:0 "les descendants obscurs sont derrière tout"
 LOADING_TIP_93:0 "Anbennar fut formée par un groupe de mages qui cherchaient à apporter la paix pendant une période de troubles connue comme l'Interrègne."
 LOADING_TIP_94:0 "L'Ère de la Glace Noire (768-978) vit les Pillards gérudiens du nord piller, ravager et s'installer à travers Cannor."
 LOADING_TIP_95:0 "Les elfes débarquèrent à Cannor en l'an 1000, alors que le continent était plongé dans la Guerre du Roi-Sorcier."
 LOADING_TIP_96:0 "L'Éveil-du-Dragon (470-500) causa la réapparition des dragons à Cannor, provoquant chaos et bouleversements généralisés."
 LOADING_TIP_97:1 "Les peuples Bulwari croient que le dernier dieu Surakel (Surael en elfique) sacrifia sa vie pour devenir le soleil et tenir les Ténèbres Malveillantes à distance."
 LOADING_TIP_98:0 "Castanor, aussi connu comme l'Empire de Castan, serait le premier et le plus grand empire humain de l'histoire."
 LOADING_TIP_99:0 "Les orques avaient la capacité spéciale de changer la couleur de leur peau pour refléter leur environnement. Cette capacité fut perdue à la mort de Dookanson."
 LOADING_TIP_100:0 "Corin était l'avatar d'Agrados, dieu de la guerre, qui fut disgracié après avoir trahi son frère Castellos et déclenché la Guerre des Dieux."
 LOADING_TIP_101:0 "Les halfelins ont vécu une grande partie de leur existence sous la botte d'une autre nation. En 1444, le Petit-Pays est divisé entre Lorent et Gawed."
 LOADING_TIP_102:0 "Les orques n'étaient jamais un problème majeur à Cannor jusqu'en 1424, quand une vaste horde orque émergea des Montagnes de l'Échine-du-Serpent et dévasta l'Escann."
 LOADING_TIP_103:0 "Les Guerres Lilas furent combattues entre le Royaume de Lorent et la Damérie, alors Empereur d'Anbennar, pour la succession du trône lorentais."
 LOADING_TIP_104:0 "Le Jour des Cieux Cendrés fut un événement cataclysmique qui détruisit le continent elfique d'Aelantir en 1 PC."
 LOADING_TIP_105:0 "Les elfes sont la race à la plus longue durée de vie jamais enregistrée, l'elfe le plus âgé ayant atteint un peu plus de 400 ans."
 LOADING_TIP_106:0 "-thíl signifie « tour » en elfique."
 LOADING_TIP_107:0 "Les peuples aléniques migrèrent considérablement pendant l'Éveil-du-Dragon, s'installant dans des endroits comme les Collines de Wex et Marrhold."
 LOADING_TIP_108:0 "-ainé signifie « rivière » en elfique."
 LOADING_TIP_109:0 "-aire signifie « cité » en elfique."
 LOADING_TIP_110:0 "Depuis la chute de leur patrie, la plupart des nains n'ont jamais mis les pieds dans leurs forteresses ancestrales et gagnent leur vie à la surface."
 LOADING_TIP_111:0 "Voulez-vous en savoir plus sur le lore ? Parlez-nous sur Discord ou consultez le wiki Anbennar !"
 LOADING_TIP_112:0 "Voulez-vous partager votre dernière conquête ? Appuyez sur F11 pour prendre une capture d'écran et téléchargez l'image sur le Discord Anbennar ou le subreddit r/Anbennar !"
 LOADING_TIP_113:0 "Les Elfes Lunaires sont les elfes les plus communs, et tirent leur nom de Munas Chante-Lune, le héros qui mena la Flotte Vestige vers Cannor."
 LOADING_TIP_114:0 "Les Elfes Solaires sont les elfes qui suivirent Jaher au Bulwar au lieu de suivre Munas vers Cannor."
 LOADING_TIP_115:0 "Les Elfes Sylvestres sont les descendants des Elfes Lunaires perdus dans les Bois-Profonds pendant la Guerre du Roi-Sorcier."
 LOADING_TIP_116:0 "La monnaie principale utilisée à Anbennar est la « couronne », nommée d'après la cité de Couronne-de-Dame."
 LOADING_TIP_117:0 "La Route Dorée fut construite par Jaher pour relier ses terres impériales centrales au Bulwar à ses conquêtes à Haless."
 LOADING_TIP_118:0 "Bulwar est un exonyme provenant du contrôle castanorien de la région, les Bulwari natifs appellent leur patrie Surakeš."
 LOADING_TIP_119:0 "La majeure partie de la vie dans le Dwarovar est soutenue par la Fleur-du-Serpent, des plantes souterraines capables de pousser sans lumière du soleil."
 LOADING_TIP_120:0 "L'Échine-du-Serpent est nommée pour sa forme ; certains croient qu'il s'agit de la colonne vertébrale de Malliath, le plus grand des dragons."
 LOADING_TIP_121:0 "La rivière Ynn tire son nom de la même racine que l'elfique « Ainé », que l'on retrouve dans les noms de nombreuses rivières de Cannor."
 LOADING_TIP_122:0 "Anbennar avait plus de présence sur r/Place 2022 que toutes les autres communautés liées à Paradox réunies."
 LOADING_TIP_123:0 "Il y a aussi des projets Anbennar CK3 et Anbennar Vicky3 en cours !"
 LOADING_TIP_124:0 "La Terre Libre de Bhuvauri s'est libérée du Raj il y a près d'un siècle, et compte maintenant parmi les États les plus riches de Halann."
 LOADING_TIP_125:0 "Les adeptes de la Haute Philosophie vénèrent les Hauts Dieux, qui auraient construit les innombrables Hauts Temples disséminés à travers Haless."
 LOADING_TIP_126:0 "Les Nés-des-Ruines Taychendi peuvent faire pousser une barbe, un trait unique parmi tous les peuples elfiques."
 LOADING_TIP_127:0 "On dit que la Forteresse Naine de Dûr-Vazhatun sombra dans la folie après que ses astronomes eurent découvert quelque chose tapi au-delà des étoiles..."
 LOADING_TIP_128:0 "Le Segbandal, ou « Alliance du Sud », était une ligue de forteresses naines dans le Dwarovar Central. Dirigée par Seghdihr, elle survécut jusqu'aux années 1100."
 LOADING_TIP_129:0 "La Flotte au Trésor de la Fédération-des-Lacs fait voile vers Haless une fois par décennie. C'est le seul contact que les Triuniques ont avec le monde au-delà des plaines."
 LOADING_TIP_130:0 "Les Nés-des-Ruines Kheionai ont une peau bleue distinctive, conséquence d'une exposition intergénérationnelle aux sables cancérigènes de la Mer de Kaydhano."
 LOADING_TIP_131:0 "C'est vraiment du bel art ! ^"
 LOADING_TIP_132:0 "Après la chute d'Aul-Dwarov, la forteresse de Grônstunad proclama l'Empire de Jade et tenta de reconquérir l'ensemble de l'Échine-du-Serpent."
 LOADING_TIP_133:0 "Des vers des sables gigantesques vivent dans le Désert du Haraf. Ils sont apprivoisés par les Nés-des-Ruines Haraf'ne, qui les considèrent comme divins."
 LOADING_TIP_134:0 "La Déchirure des Royaumes vit les esprits longtemps endormis de Haless s'éveiller, menant à des changements majeurs à travers le continent dans les années 1700."
 LOADING_TIP_135:0 "Les Khétératans régnaient jusqu'au sud d'Horashesh jusqu'à ce qu'ils soient coupés de leurs terres méridionales par Gnollakaz au début des années 1400."
 LOADING_TIP_136:0 "Les nomades Shuuvush montent de grands oiseaux incapables de voler qui seraient éclos d'œufs pétrifiés pendant le Jour des Cieux Cendrés."
 LOADING_TIP_137:0 "La Côte des Méduses de Haless est renommée pour ses grands ballons, et vit les premiers aéronefs y être inventés au début des années 1800."
 LOADING_TIP_138:0 "Au cœur de Sarhal se trouve le Marais des Ombres, un ulcère sombre d'énergie négative gouverné par des rois trolls brutaux et de cruels covens de sorcières."
 LOADING_TIP_139:0 "Les Djinns régnaient autrefois sur une grande partie de Sarhal. Leurs royaumes déclinèrent au fil des millénaires jusqu'à leur disparition soudaine le Jour des Cieux Cendrés."
 LOADING_TIP_140:0 "Le Jour des Cieux Cendrés brisa les plaques continentales d'Aelantir, permettant à de nombreuses influences étranges de faire sentir leur présence..."
 LOADING_TIP_141:0 "Les Bosquets Sanglants de Noruin laissent couler de la sève rouge pendant l'hiver."
 LOADING_TIP_142:0 "L'Empire Ynnique régna sur une Vallée de l'Ynn unifiée pendant près de 6 siècles jusqu'à ce qu'il soit déchiré par la Guerre des Trois Empereurs en 1205."
 LOADING_TIP_143:0 "La Foi Skaldhyrrique enseigne que le récit de contes magiques empêche le dragon endormi Elkaesal le Blanc de s'éveiller."
 LOADING_TIP_144:0 "Les Gobelins de la Forêt comptent parmi les plus anciens habitants des Bois-Profonds, ayant migré là depuis le Dwarovar il y a des milliers d'années."
 LOADING_TIP_145:0 "À cause de la magie féerique, 1000 ans se sont écoulés pour les Elfes Sylvestres depuis que leurs ancêtres furent perdus dans les Bois-Profonds !"