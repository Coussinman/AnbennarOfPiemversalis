 SACRIFICE_RULER:0 "Sacrifier le Souverain"
 SACRIFICE_HEIR:0 "Sacrifier l'Héritier"
 nahuatl_extra_sacrifice:0 "Sacrifices Exigés"
 nahuatl_sorcerer:0 "Sorcier des Campagnes"
 desc_nahuatl_sorcerer:0 "Un sorcier terroriserait les campagnes de cette province."
 cholula_temples:0 "Temples de Cholula"
 desc_cholula_temples:0 "Le complexe de temples de Cholula est l'un des plus anciens d'Amérique centrale et revêt une importance particulière pour le culte de Quetzalcoatl, le dieu serpent à plumes. Quelle que soit leur origine et leur statut social, les pèlerins seront toujours autorisés à franchir les frontières sans être inquiétés, assurant un flux constant de pèlerins vers ce lieu saint."
 nahuatl_allowed_spying_pochtecas:0 "Pochtecas Espions"
 desc_nahuatl_allowed_spying_pochtecas:0 "En fermant les yeux sur les tentatives même les plus évidentes et flagrantes des guildes marchandes étrangères Pochteca d'espionner notre État et ses forces, nous avons sérieusement compromis toute possibilité de contrecarrer l'espionnage futur."
 nahuatl_angered_pochtecas:0 "Guildes Pochteca en Colère"
 desc_nahuatl_angered_pochtecas:0 "Nous avons fait ce que nous pouvions pour limiter la capacité des guildes marchandes étrangères Pochteca à espionner notre État. Ce faisant, cependant, nous avons mis les guildes elles-mêmes en colère et par conséquent nos revenus commerciaux en souffrent."
 nahuatl_earth_quake_devestation:0 "Dévastée par un Tremblement de Terre"
 desc_nahuatl_earth_quake_devestation:0 "Cette province a été dévastée par un tremblement de terre majeur et est encore en cours de reconstruction et de rétablissement."
 nahuatl_grace_of_xipe_totec:0 "Bénie par Xipe-Totec"
 desc_nahuatl_grace_of_xipe_totec:0 "Par la Grâce de Xipe-Totec, notre peuple a survécu à un tremblement de terre majeur. Le tremblement de terre lui-même est un rappel que nous ne devons jamais faillir dans notre détermination à fournir les sacrifices nécessaires pour que cet âge survive."
 nahuatl_grace_of_huitzilopochtli:0 "Bénie par Huitzilopochtli"
 desc_nahuatl_grace_of_huitzilopochtli:0 "Par la Grâce de Huitzilopochtli, notre peuple a survécu à un tremblement de terre majeur. Le tremblement de terre lui-même est un rappel que nous ne devons jamais faillir dans notre détermination à fournir les sacrifices nécessaires pour que cet âge survive."
 nahuatl_grace_of_quetzalcoatl:0 "Bénie par Quetzalcoatl"
 desc_nahuatl_grace_of_quetzalcoatl:0 "Par la Grâce de Quetzalcoatl, notre peuple a survécu à un tremblement de terre majeur. Le tremblement de terre lui-même est un rappel que nous ne devons jamais faillir dans notre détermination à fournir les sacrifices nécessaires pour que cet âge survive."
 nahuatl_grace_of_tezcatlipoca:0 "Bénie par Tezcatlipoca"
 desc_nahuatl_grace_of_tezcatlipoca:0 "Par la Grâce de Tezcatlipoca, notre peuple a survécu à un tremblement de terre majeur. Le tremblement de terre lui-même est un rappel que nous ne devons jamais faillir dans notre détermination à fournir les sacrifices nécessaires pour que cet âge survive."
 nahuatl_imprisoned_pochtecas:0 "Pochtecas Emprisonnés"
 nahuatl_events.1.t:0 "Mauvais Présages"
 nahuatl_events.1.d:0 "Après une étude intense des cieux et des calendriers pertinents, nos prêtres s'accordent à dire que tout indique que des temps difficiles et troubles sont à venir. Alors que roturiers et nobles se préparent à ce qui arrive, beaucoup tenteront de se sauver des mauvais temps en versant un peu de leur propre sang."
 nahuatl_events.1.a:0 "Ye ica otopan tlamaceuhque."
 nahuatl_events.1.a.tt:0 "Notre souverain sacrifiera un peu de son propre sang aux dieux."
 nahuatl_events.1.b:0 "La fin est proche."
 nahuatl_events.2.t:0 "Fils Précieux"
 nahuatl_events.2.d:0 "Nous avons appris la naissance d'un enfant exceptionnel à [Root.Owner.Capital.GetCapitalName]. Après presque deux jours de travail, un garçon est né d'une femme du peuple, mais les astrologues et autres devins s'accordent à dire qu'il est destiné à la grandeur. Selon la tradition, sa mère l'amènera bientôt à la maison de la jeunesse pour le présenter à ceux qui s'occuperont plus tard de son éducation martiale de la puberté jusqu'à l'âge du mariage."
 nahuatl_events.2.a:0 "Le Telpochcalli fera de lui un bon guerrier."
 nahuatl_events.2.a.tt:0 "L'enfant sera éduqué dans un Telpochcalli"
 nahuatl_events.2.b:0 "Tenter de le faire entrer au Calmecac"
 nahuatl_events.2.b.tt:0 "L'enfant sera éduqué au Calmecac, développant son potentiel mais les gens remarqueront cette rupture avec la tradition."
 nahuatl_events.3.t:0 "La guerre est ton désert, ta tâche"
 nahuatl_events.3.d:0 "Le jeune garçon né sous des étoiles si favorables il y a 15 ans a maintenant atteint l'âge adulte et le moment est venu pour lui d'aller au combat. Comme les autres garçons de son âge, il est censé ramener ses premiers prisonniers bientôt, marquant le début de sa carrière de guerrier.\nSi l'un des garçons ne parvient pas à capturer un prisonnier, il sera à jamais marqué comme inapte à être guerrier et devra continuer ses jours comme homme de peu de conséquence."
 nahuatl_events.3.a:0 "Les Présages favorisent cet homme, je suis sûr qu'il réussira."
 nahuatl_events.3.a.tt:0 "Le Guerrier est envoyé à la guerre pour être mis à l'épreuve."
 nahuatl_events.3.b:0 "Sacrifions un peu de notre sang pour l'aider."
 nahuatl_events.3.b.tt:1 "[Root.Monarch.GetName] verse un peu de [Root.Monarch.GetHerHis] sang, cela aidera sûrement notre guerrier mais si le guerrier est vaincu, la réputation de notre souverain en sera affectée."
 nahuatl_events.4.t:0 "Ta demeure n'est pas ici, car tu es un aigle, un jaguar"
 nahuatl_events.4.d:0 "Confirmant tous les signes, le jeune guerrier né il y a tant d'années a déjà dépassé toutes les attentes. À chaque occasion qui s'est présentée à lui, il a fait des prisonniers et a apporté une grande gloire à lui-même et à sa maison. Avec le temps, il atteindra sûrement les plus grands honneurs qu'une vie de batailles peut conférer."
 nahuatl_events.4.a:0 "Magnifique !"
 nahuatl_events.5.t:0 "Tu mériteras la mort par le Couteau d'Obsidienne."
 nahuatl_events.5.d:0 "Malgré les présages très favorables, il semble que le jeune guerrier né il y a tant d'années ait été capturé par l'ennemi. Bientôt, il affrontera son destin sur la pierre sacrificielle de leur capitale. Bien que ce soit une mort honorable, la déception de sa maison est grande."
 nahuatl_events.5.a:0 "Une mort digne !"
 nahuatl_events.6.t:0 "Tu donneras à boire, nourriture, sustentation au soleil."
 nahuatl_events.6.d:0 "Malgré les présages favorables, le jeune guerrier né il y a tant d'années a été tué sur le champ de bataille. Il ne deviendra jamais un grand guerrier maintenant, et son cœur et son sang ne seront pas sacrifiés aux dieux."
 nahuatl_events.6.a:0 "Une mort malheureuse."
 nahuatl_events.7.t:0 "Ta demeure n'est pas ici..."
 nahuatl_events.7.d:0 "Malgré les présages très favorables, le jeune garçon né il y a tant d'années s'est avéré être une déception pour lui-même et sa maison. Face au combat, il s'est montré lâche, restant en retrait et échouant à faire une seule capture malgré de multiples occasions de le faire. À son retour dans sa maison de guerriers, ses cheveux seront coupés en tonsure et il sera à jamais connu comme un guerrier raté."
 nahuatl_events.7.a:0 "D'accord."
 nahuatl_events.7.b:0 "D'accord."
 nahuatl_events.8.t:0 "Bons Présages"
 nahuatl_events.8.d:0 "Après une étude intense des étoiles, des calendriers pertinents et d'autres signes connus de nos prêtres, il leur est clair que de bons temps sont à venir. Comme la destruction du monde ne peut être imminente, beaucoup de nos sujets peuvent maintenant se reposer un peu plus facilement, sachant que les sacrifices qu'ils ont faits ont été bien reçus."
 nahuatl_events.8.a:0 "Magnifique !"
 nahuatl_events.9.t:0 "Roturier Étalant sa Richesse"
 nahuatl_events.9.d:0 "L'un des artisans experts Toltecca souvent employés par $MONARCH$ et d'autres personnes aisées de notre société a tenté de s'élever au-dessus de son statut social. En tant que roturier, il est censé n'organiser qu'une célébration modeste lorsqu'un enfant naît, mais après la naissance de son fils le mois dernier, il a tenu un banquet digne d'au moins un noble mineur. Bien qu'il ne soit pas mal pour un roturier d'acquérir de la richesse, l'étaler de cette façon est une grande insulte à nos dieux et traditions."
 nahuatl_events.9.a:0 "C'est un affront aux dieux. L'artisan doit mourir."
 nahuatl_events.9.b:0 "Son travail est trop important pour qu'il meure."
 nahuatl_events.10.t:0 "Incident pendant le Nemontemi"
 nahuatl_events.10.d:0 "Un noble d'une de nos familles les plus éminentes a été trouvé ivre dans la rue aujourd'hui. Non seulement c'est un terrible affront aux dieux, punissable par strangulation, mais cela s'est produit pendant la période du Nemontemi où toute perturbation de la paix est strictement interdite."
 nahuatl_events.10.a:0 "Il doit mourir."
 nahuatl_events.10.b:0 "Notre besoin de cet homme est trop grand."
 nahuatl_events.11.t:0 "Sorcier Errant"
 nahuatl_events.11.d:0 "Nous avons reçu des nouvelles d'une de nos provinces qu'un homme prétendant avoir des pouvoirs magiques y répand la peur et des rumeurs maléfiques. Les dirigeants locaux sont confiants qu'il ne s'agit que d'un charlatan qu'ils peuvent gérer, mais de nombreux roturiers sont sensibles à son influence."
 nahuatl_events.11.a:0 "Envoyer un émissaire pour le capturer."
 nahuatl_events.11.a.tt:0 "La chasse au sorcier commence."
 nahuatl_events.11.b:0 "Laisser les autorités locales s'en occuper."
 nahuatl_events.12.t:0 "Le Sorcier Disparaît"
 nahuatl_events.12.d:0 "Le problème du sorcier répandant la peur sur nos terres semble avoir disparu. Il n'a jamais été attrapé, mais comme l'homme n'a pas été vu depuis de nombreuses semaines, sa mauvaise influence s'est estompée."
 nahuatl_events.12.a:0 "D'accord."
 nahuatl_events.13.t:0 "Sorcier Capturé"
 nahuatl_events.13.d:0 "Le sorcier répandant la peur sur nos terres a été capturé. La punition traditionnelle pour un homme comme lui serait de lui couper les cheveux, le privant de ses pouvoirs magiques. Comme cet homme a réussi à causer beaucoup plus de tort que le conjurateur de campagne moyen, cependant, il serait peut-être préférable de le punir immédiatement par la mort pour apaiser les dieux et les hommes."
 nahuatl_events.13.a:0 "Coupez-lui les cheveux !"
 nahuatl_events.13.b:0 "Tuez-le !"
 nahuatl_events.14.t:0 "Tlacatecolotl"
 nahuatl_events.14.d:0 "Des nouvelles nous sont parvenues que la punition du sorcier qui a causé tant d'agitation sur nos terres ne s'est pas exactement passée comme prévu. Aucun des participants ne reste pour raconter l'histoire, mais la rumeur qui se répand est que l'homme était un vrai Tlacatecolotl et qu'un hibou a été vu quittant sa cellule. Qu'il se soit transformé en hibou ou non, tout l'incident a provoqué la propagation de rumeurs folles dans tout notre pays."
 nahuatl_events.14.a:0 "La fin est proche."
 nahuatl_events.15.t:0 "Le Sorcier des Campagnes Revient"
 nahuatl_events.15.d:0 "Il semble que le sorcier qui nous a échappé une fois soit maintenant revenu. Les autorités locales insistent sur le fait que l'homme a répandu des maladies et fait des prédictions néfastes et doit être arrêté."
 nahuatl_events.15.a:0 "Envoyer un émissaire pour le capturer."
 nahuatl_events.15.b:0 "Laisser les autorités locales s'en occuper."
 nahuatl_events.16.t:0 "Cihuateteo"
 nahuatl_events.16.d:0 "Un grand malheur nous est arrivé. Ce matin, $HEIR$ avait disparu. L'un des serviteurs de l'enfant insiste sur le fait que le coupable était une Cihuateotl ressemblant à une femme qui est morte en couches à proximité récemment. Qu'une créature aussi sombre ait pu enlever notre héritier au milieu de la nuit est sûrement un signe que la fin du monde approche."
 nahuatl_events.16.a:0 "Nous devons faire ce que nous pouvons pour apaiser Tezcatlipoca et Tlazolteotl."
 nahuatl_events.16.b:0 "Faire punir le serviteur pour avoir répandu des mensonges."
 nahuatl_events.17.t:0 "Maladie du Souverain"
 nahuatl_events.17.d:0 "$MONARCH$ est tombé malade et a une fièvre montante. Les médecins présents ont recommandé un certain nombre d'infusions à base de racines et de grains de maïs."
 nahuatl_events.17.a:0 "Obtempérer et espérer le meilleur."
 nahuatl_events.17.b:0 "Nous devons procéder à de grands sacrifices pour apaiser les dieux."
 nahuatl_events.18.t:0 "Ollamalitzli"
 nahuatl_events.18.d:0 "Durant son séjour dans sa maison de la jeunesse, [Root.Heir.GetName] est devenu très habile au jeu de balle traditionnel Ollamalitzli, mais à l'âge adulte, il a dû abandonner cette habitude. Comme le jeu est pratiqué dans les différents quartiers de [Root.Capital.GetName], cependant, [Root.Heir.GetSheHe] est souvent vu comme spectateur sur les divers terrains près des temples ou des marchés, même à l'âge adulte. Cette habitude doit également s'étendre à la participation aux paris effrénés souvent associés au jeu car [Root.Heir.GetName] est venu vous voir aujourd'hui pour demander de l'aide afin de payer [Root.Heir.GetHerHis] dettes."
 nahuatl_events.18.a:0 "L'aider"
 nahuatl_events.18.b:0 "Lui interdire de participer à nouveau."
 nahuatl_events.19.t:0 "Prisonnier Volé"
 nahuatl_events.19.d:0 "Les batailles entre guerriers sont toujours des affaires individuelles et il peut être difficile de savoir exactement quand ou comment chaque prisonnier est capturé. Récemment, des guerriers ont observé l'un de nos combattants les plus expérimentés s'éclipser avec un captif d'un autre guerrier. Si le prisonnier a été volé, c'est l'une des offenses les plus graves possibles pour un guerrier, punissable uniquement par la mort. Pire encore, beaucoup soupçonnent que le capteur a délibérément réattribué son prisonnier à son camarade."
 nahuatl_events.19.a:0 "Tuer l'accusé."
 nahuatl_events.19.b:0 "Les tuer tous les deux."
 nahuatl_events.19.c:0 "Épargner les guerriers."
 nahuatl_events.20.t:0 "Tlacaxipehualiztli : la Fête de l'Écorchement des Hommes"
 nahuatl_events.20.d:0 "Alors que l'équinoxe de printemps et la saison des semailles approchent, le temps du Tlacaxipehualiztli est arrivé. Le moment est venu de sacrifier tous les prisonniers de guerre au temple de Xipe-Totec. Leur sang nourrira les dieux et leurs peaux seront portées par leurs capteurs et les prêtres du temple avant d'être conservées dans la grotte sacrée.\nLe destin nous a récompensés avec de nombreux prisonniers et cette fois, le festival va durer de nombreux jours. Beaucoup de sang sera versé en l'honneur des dieux."
 nahuatl_events.20.a:0 "Sacrifier les Prisonniers"
 nahuatl_events.20.b:0 "Organiser un festival encore plus grandiose, en exigeant des prisonniers supplémentaires de nos sujets."
 nahuatl_events.21.t:0 "La Pierre Gladiatoriale"
 nahuatl_events.21.d:0 "Dans le cadre du grand festival Tlacaxipehualiztli de cette année, le plus éminent parmi les guerriers capturés sera opposé à quatre de nos meilleurs guerriers aigles et jaguars tout en étant attaché à une pierre sacrificielle et armé seulement d'un faux Macuahuitl, une massue avec des plumes au lieu de lames d'obsidienne. Dans le cas improbable où le captif survivrait à la rencontre avec ses quatre premiers adversaires, il affrontera un dernier combattant, gaucher. En plus de plaire aux dieux, cette cérémonie est immensément populaire et est susceptible d'attirer un grand nombre de spectateurs."
 nahuatl_events.21.a:0 "Que le combat commence."
 nahuatl_events.21.b:0 "Contentons-nous d'une célébration plus modeste."
 nahuatl_events.22.t:0 "Guerrier Récalcitrant"
 nahuatl_events.22.d:0 "Malgré des préparatifs rigoureux, le guerrier captif qui devait combattre sur la pierre gladiatoriale aujourd'hui s'est montré moins que coopératif. Alors que l'enceinte du temple était remplie à ras bord de spectateurs, l'homme a refusé de combattre et a dû être abattu rapidement par son premier adversaire. Cela a jeté une longue ombre sur toute la célébration de cette année et certains y voient un mauvais présage."
 nahuatl_events.22.a:0 "Ainsi le soleil reçoit à boire."
 nahuatl_events.23.t:0 "Un Grand Spectacle."
 nahuatl_events.23.d:0 "La bataille entre nos quatre champions et le guerrier captif a dépassé toutes les attentes. Non seulement le captif a survécu aux quatre premiers affrontements, mais il semblait presque avoir une chance de battre le dernier adversaire gaucher qu'il a ensuite affronté.\nComme il est de coutume, après que le guerrier captif a finalement été vaincu, son cœur a été sacrifié aux dieux tandis que sa chair a été donnée à la famille du capteur pour être consommée et sa peau sera portée par le capteur lui-même pendant de nombreux jours.\nLes célébrations du Tlacaxipehualiztli de cette année resteront probablement dans les mémoires pendant des années."
 nahuatl_events.23.a:0 "Ainsi le soleil reçoit à boire."
 nahuatl_events.24.t:0 "Fin des Célébrations"
 nahuatl_events.24.d:0 "La Fête de l'Écorchement des Hommes est maintenant terminée et avec elle commence une nouvelle saison des semailles. Les célébrations extravagantes de cette année resteront probablement dans les mémoires pendant longtemps."
 nahuatl_events.24.a:0 "Ainsi le soleil reçoit à boire."
 nahuatl_events.25.t:0 "Tlacaxipehualiztli : la Fête de l'Écorchement des Hommes"
 nahuatl_events.25.d:0 "Alors que l'équinoxe de printemps et la saison des semailles approchent, le temps du Tlacaxipehualiztli est arrivé. Le moment est venu de sacrifier tous les prisonniers de guerre au temple de Xipe-Totec. Leur sang nourrira le soleil et leurs peaux seront portées par leurs capteurs et les prêtres du temple avant d'être conservées dans la grotte sacrée.\nComme nous n'avons pas mené de guerres récemment, cependant, nous avons une pénurie aiguë de prisonniers à sacrifier. C'est en soi un mauvais présage et les choses ne feront probablement qu'empirer si nous ne sommes pas en mesure de verser plus de sang aujourd'hui."
 nahuatl_events.25.a:0 "Nous devons nous contenter des prisonniers que nous avons."
 nahuatl_events.25.b:0 "Que nos États sujets fournissent des prisonniers."
 nahuatl_events.26.t:0 "Espions Pochteca"
 nahuatl_events.26.d:0 "Les riches guildes marchandes Pochteca sont essentielles au réseau commercial de Mésoamérique et leurs membres sont généralement libres de traverser nos frontières comme bon leur semble. Cet accueil sans réserve a, cependant, été manifestement exploité par nos rivaux car un certain nombre de marchands Pochteca sont maintenant accusés d'espionnage en leur nom."
 nahuatl_events.26.a:0 "Confisquer leurs biens."
 nahuatl_events.26.b:0 "Emprisonner les Pochtecas."
 nahuatl_events.26.c:0 "Nous n'osons rien faire."
 nahuatl_events.27.t:0 "Marchands Pochteca Harcelés"
 nahuatl_events.27.d:0 "Les Guildes Marchandes Pochteca basées à [Root.Capital.GetCapitalName] sont venues nous demander de punir [From.GetName] pour avoir harcelé leurs membres. Apparemment, le Tlatoani de [From.GetName] prétend que les Pochtecas ont espionné pour notre compte et a utilisé cela comme prétexte pour confisquer leurs biens."
 nahuatl_events.27.a:0 "Je suis choqué !"
 nahuatl_events.28.t:0 "Grand Poète [Root.Culture.GetName]"
 nahuatl_events.28.d:0 "La parole a toujours eu une signification particulière pour notre peuple, les chants et les récitations occupent une place prépondérante dans toutes nos cérémonies religieuses et profanes, et même nos plus hauts dirigeants sont appelés Tlatoanis, orateurs. La poésie orale est donc l'une des formes d'art les plus sacrées et l'un des rares moyens acceptés par lesquels une personne peut exprimer son mécontentement, son anxiété et même son doute sur le destin lui-même sans irriter les dieux.\nRécemment, un poète nahuatl immensément populaire est arrivé à [Root.Capital.GetName], louant notre cité et son peuple mais critiquant le Tlatoani lui-même."
 nahuatl_events.28.a:0 "Il plaît aux dieux et au peuple."
 nahuatl_events.28.b:0 "On ne peut pas lui permettre de rester."
 nahuatl_events.29.t:0 "Agrandissement du Temple Principal de [Root.Capital.GetCapitalName]"
 nahuatl_events.29.d:0 "Le temple principal de notre capitale est le symbole premier de notre règne et du lien que nous entretenons avec les dieux. C'est là que tous les principaux sacrifices seront effectués durant les nombreux festivals de l'année et c'est la cible principale de tout ennemi envahisseur. Pour un Tlatoani, c'est un devoir d'entretenir et d'agrandir le temple chaque fois que possible."
 nahuatl_events.29.a:0 "Entreprendre un agrandissement ambitieux de la Pyramide."
 nahuatl_events.29.b:0 "Il est temps d'ajouter une nouvelle couche à la Pyramide."
 nahuatl_events.29.c:0 "Des améliorations modestes, c'est tout ce que nous pouvons nous permettre."
 nahuatl_events.29.dd:0 "Nous ne pouvons pas nous permettre de faire grand-chose pour le moment."
 nahuatl_events.30.t:0 "Pèlerinage à Cholula"
 nahuatl_events.30.d:0 "Il est traditionnel pour tous nos nobles de voyager jusqu'au grand sanctuaire de Quetzalcoatl dans la cité-temple de Cholula. Ici, le bienveillant serpent à plumes, protecteur des arts et des pluies, peut être vénéré et ici les nobles de Mésoamérique peuvent étaler leur richesse sans avoir à s'affronter au combat."
 nahuatl_events.30.a:0 "Rendre hommage à Quetzalcoatl."
 nahuatl_events.30.b:0 "Quel genre de dieu n'exige pas de sacrifice humain ?"
 nahuatl_events.31.t:0 "Tremblement de Terre"
 nahuatl_events.31.d:0 "Chaque citoyen de [Root.Capital.GetCapitalName] s'est réveillé en même temps ce matin lorsqu'un puissant tremblement de terre a secoué toute la cité, détruisant plusieurs bâtiments et même certains temples. Au grand soulagement des roturiers comme des nobles, cependant, la cité et la plupart de ses habitants restent indemnes.\nLe fait que la destruction du 5e soleil et la fin de cet âge viendra sous la forme de tremblements de terre massifs qui détruiront tous les êtres vivants est connu même du plus petit enfant. Nous devons remercier les dieux qui nous ont aidés à maintenir ce monde en vie de nous avoir épargnés aujourd'hui."
 nahuatl_events.31.a:0 "Louons Tezcatlipoca, dieu de la providence et maître de la nuit."
 nahuatl_events.31.b:0 "Louons Quetzalcoatl, dieu de la sagesse et de la vie."
 nahuatl_events.31.c:0 "Louons Huitzilopochtli, patron de la guerre et dieu du soleil."
 nahuatl_events.31.dd:0 "Louons Xipe-Totec, dieu de la guerre, de la mort et de l'agriculture."
 sce_poison_rock:0 "Rocher Empoisonné"
 desc_sce_poison_rock:0 "Ainsi nommé à cause des plantes mortelles entourant le rocher."
 sce_poison_rock_tooltip:0 "Rocher Empoisonné"
 desc_sce_poison_rock_tooltip:0 "Ainsi nommé à cause des plantes mortelles entourant le rocher."
 inti_yana_lord:0 "Chef Loyal"
 desc_inti_yana_lord:0 "Nous avons personnellement nommé les chefs de cette région parmi nos plus proches serviteurs. Pour le moment du moins, cela signifie que la province est sous un contrôle central étroit."
 inti_pachamac_oracle:0 "Oracle de Pachacamac"
 desc_inti_pachamac_oracle:0 "L'Oracle de Pachacamac est l'un des sanctuaires les plus importants du monde andin et depuis le VIIe siècle, les souverains et nobles andins sont venus interroger la petite idole de bois sur leur avenir."
 inti_major_huaca_temple:0 "Temple Huaca Majeur"
 desc_inti_major_huaca_temple:0 "Cette province a connu un afflux accru de pèlerins et une identité locale renforcée après l'élévation d'un dieu Huaca par un chef local."
 inti_low_fertility:0 "Familles Récalcitrantes"
 desc_inti_low_fertility:0 "La composition sociale actuelle de cette province a conduit à une forte baisse du nombre de mariages ici. Les prêtres locaux craignent que cela n'entraîne un déclin démographique, mais les familles elles-mêmes sont reconnaissantes d'avoir été laissées tranquilles pour résoudre leurs propres problèmes de mariages."
 inti_arranged_marriages:0 "Mariages Arrangés"
 desc_inti_arranged_marriages:0 "Un prêtre spécialement nommé depuis la capitale a reçu la mission d'agir comme entremetteur ici, s'assurant que les querelles sociales ou économiques mesquines n'empêchent pas la population de plaire à Inti en se mariant."
 inti_shrine_of_virocacha:0 "Sanctuaire de Viracocha"
 desc_inti_shrine_of_virocacha:0 "C'est le site du temple principal de Viracocha, le créateur du monde."
 inti_royal_guard:0 "Nouveaux Membres de la Garde Royale"
 desc_inti_royal_guard:0 "Nous avons fait venir de nouveaux membres, aguerris au combat, de la garde royale héréditaire depuis les provinces. Bien que cela ait considérablement amélioré la qualité de la garde elle-même, les anciennes familles de la garde comme les habitants des provinces qui n'ont pas pu fournir les nouveaux membres sont alarmés par cette évolution."
 inti_alarmed_nobles:0 "Noblesse Aliénée"
 desc_inti_alarmed_nobles:0 "En élargissant la garde royale, nous avons introduit du sang neuf dans les rangs de notre noblesse, quelque chose que les vieilles familles sont déterminées à empêcher."
 inti_attended_inti_raymi:0 "A assisté au Festival Inti Raymi"
 inti_refused_to_attend_inti_raymi:0 "A refusé d'assister à l'Inti Raymi"
 inti_events.1.t:0 "La Panaca de $RANDOM_OLD_MONARCH$"
 inti_events.1.d:0 "Avec les funérailles de $RANDOM_OLD_MONARCH$, sa transition par la momification commence. Une fois les rites funéraires observés, les parents et serviteurs de $RANDOM_OLD_MONARCH$ formeront une lignée Panaca dirigée par le souverain défunt et chargée de préserver sa mémoire et de gérer ses affaires. Sa propriété et son autorité resteront ce qu'elles étaient de son vivant et la momie continuera d'être le chef de sa lignée désormais.\nLes Panacas d'anciens souverains restent souvent les groupes les plus influents de la haute société et il est rare qu'un nouveau souverain s'élève sans leur soutien. Cependant, tous les souverains ne sont pas dignes de momification, il y en a certains que nous préférerions oublier."
 inti_events.1.a:0 "La Panaca de $RANDOM_OLD_MONARCH$ est née."
 inti_events.1.a.tt:0 "La Momie prend sa place à la tête d'une nouvelle Panaca, emportant sa propriété avec elle."
 inti_events.1.b:0 "Ce n'est plus un souverain, c'est un puissant Huaca, un dieu."
 inti_events.1.b.tt:0 "La Momie deviendra un dieu mineur vénéré par tous à la place."
 inti_events.1.c:0 "$RANDOM_OLD_MONARCH$, qui ça ?"
 inti_events.1.c.tt:0 "Seuls ses propres parents seront autorisés à se souvenir de lui. Sa propriété sera saisie et dans quelques générations, peu se souviendront qu'il a jamais existé."
 inti_events.2.t:0 "Une Épouse Convenable pour [Root.Heir.GetName]"
 inti_events.2.d:0 "Les prêtres d'Inti ont clairement fait savoir que [Root.Heir.GetName] doit prendre sa sœur comme épouse principale pour plaire aux dieux. Beaucoup de ses ancêtres et même le dieu du soleil lui-même se sont mariés ainsi au sein de la famille et ont gardé la lignée pure. La mère du garçon, cependant, refuse d'en entendre parler et ne donnera pas son consentement.\nLa bonne façon de résoudre ce schisme serait de demander conseil à notre ancêtre, la momie qui est à la tête de notre lignée Panaca."
 inti_events.2.a:0 "Consulter notre ancêtre."
 inti_events.2.b:0 "Céder à sa Mère."
 inti_events.2.c:0 "Ignorer la Mère purement et simplement."
 inti_events.3.t:0 "Approbation du Mallqui"
 inti_events.3.d:0 "Par l'intermédiaire des prêtres de la Panaca, la Momie à la tête de notre lignée a fait savoir qu'elle approuve le mariage proposé. Comme son autorité est suprême, il n'y a vraiment aucun moyen maintenant pour quiconque de s'opposer au mariage proposé de [Root.Heir.GetName] avec sa sœur."
 inti_events.3.a:0 "Alors qu'ils soient mariés."
 inti_events.3.b:0 "À la réflexion, peut-être vaut-il mieux attendre."
 inti_events.4.t:0 "Désapprobation du Mallqui"
 inti_events.4.d:0 "Par l'intermédiaire des prêtres de la Panaca, la Momie à la tête de notre lignée a fait savoir qu'elle n'approuve pas le mariage proposé. Comme son autorité est suprême, il n'y a vraiment aucun moyen maintenant de procéder au mariage."
 inti_events.4.a:0 "D'accord."
 inti_events.5.t:0 "Chef conspirant contre [Root.Monarch.GetName]"
 inti_events.5.d:0 "Notre inspecteur religieux a découvert une conspiration où l'un des chefs mineurs du royaume a conspiré contre la santé de [Root.Monarch.GetName] par l'intermédiaire d'un dieu Huaca en or.\nBien qu'il soit douteux qu'il y ait jamais eu un réel risque pour [Root.Monarch.GetName], l'inspecteur propose que nous fassions un exemple de ce chef, et le proclamions le pire type de traître tout en retirant de force le Huaca impliqué."
 inti_events.5.a:0 "Retirer le Huaca suffit."
 inti_events.5.b:0 "Ce chef sera jeté dans la fosse Sankacancha."
 inti_events.5.b.tt:0 "Le chef est exécuté et un serviteur loyal est nommé pour gouverner la région jusqu'à ce que la situation se stabilise."
 inti_events.5.c:0 "Réprimander le Chef mais le laisser vivre."
 inti_events.6.t:0 "Vénération d'un Huaca Local"
 inti_events.6.d:0 "Un souverain est censé voyager à travers son royaume, inspectant chaque partie de son domaine et participant aux cérémonies religieuses ainsi que mondaines de ses chefs. Alors que [Root.Monarch.GetName] approche du grand temple d'un dieu Huaca local, une momie d'une dynastie depuis longtemps disparue, les prêtres royaux conseillent la prudence. C'est un Huaca inhabituellement populaire et si nous sommes vus honorer trop clairement les Huacas de nos sujets, nous leur donnerions trop de pouvoir et d'autorité.\nD'un autre côté, ce Huaca est réputé très puissant et sa popularité ainsi que les faveurs qu'il pourrait procurer sont très attirantes."
 inti_events.6.a:0 "Honorer le Huaca."
 inti_events.6.b:0 "Éviter de visiter le Temple."
 inti_events.6.c:0 "Forcer le chef à envoyer le Huaca à [Root.Capital.GetCapitalName]."
 inti_events.7.t:0 "Les Jeunes Hommes et Femmes de [Root.GetName]"
 inti_events.7.d:0 "Les prêtres de [Root.GetName] sont préoccupés par le fait que trop de jeunes hommes et femmes de la région restent célibataires. Il semble que les circonstances aient conspiré pour rendre difficile la conclusion de bons mariages sociaux et économiques ici et les familles de la région sont réticentes à accepter tout mariage proposé. Il n'est pas rare qu'un [Root.Owner.Monarch.GetTitle] intervienne et arrange de force des mariages en de tels temps. Peut-être est-il temps pour [Root.Owner.Monarch.GetName] d'intervenir ?"
 inti_events.7.a:0 "Envoyer un prêtre pour arranger des unions convenables."
 inti_events.7.b:0 "Ce n'est pas à nous de nous mêler de ces choses."
 inti_events.8.t:0 "Sanctuaire de Viracocha"
 inti_events.8.d:0 "Après avoir créé le monde et donné à chaque groupe ethnique sa langue et ses vêtements, Viracocha a voyagé depuis le lac Titicaca à travers les Andes, déguisé en vieil homme. Comme il n'était pas reconnu comme une divinité, il a été maltraité et afin de démontrer son identité, il a finalement brûlé la terre et forcé le peuple à reconnaître son pouvoir.\nAujourd'hui, la route depuis le lac Titicaca est parsemée des sanctuaires du grand dieu et Kacha, où il a forcé le peuple à le reconnaître, serait un emplacement idéal pour un temple au grand créateur."
 inti_events.8.a:0 "Nous devons construire un tel temple."
 inti_events.8.b:0 "Concentrons nos ressources sur d'autres choses."
 inti_events.9.t:0 "Confesseurs Aucachic"
 inti_events.9.d:0 "Après une guerre récente, la culpabilité pèse comme une lourde couverture sur notre peuple. Il est temps de leur donner l'occasion de se purifier des péchés qu'ils ont dû commettre en temps de guerre. Nos prêtres ont signalé que ce serait un moment opportun pour organiser un festival de purification et de jeûne afin que chacun puisse se confesser aux Aucachics et être purifié dans les cours d'eau de [Root.Capital.GetCapitalName]."
 inti_events.9.a:0 "Cela semble une bonne idée."
 inti_events.9.b:0 "Non, évitons cela."
 inti_events.10.t:0 "Grand Temple de [Root.GetName]"
 inti_events.10.d:0 "Nous avons appris qu'un chef local de [Root.GetName] a commencé à construire un nouveau temple ambitieux pour le dieu Huaca principal de sa tribu. Comme c'est souvent le cas, ce Huaca est également un ancêtre momifié de sa propre lignée. Bien que le chef semble satisfait de reconnaître notre autorité, il est difficile de se défaire de la notion qu'il tente de bâtir une base de pouvoir plus importante pour lui-même à [Root.GetName].\nLes prêtres d'Inti à [Root.Capital.GetCapitalName] préconisent fortement que nous retirions le Huaca pour remettre ce chef à sa place."
 inti_events.10.a:0 "Ordonner au chef de remettre son Huaca."
 inti_events.10.b:0 "Permettre la construction du temple."
 inti_events.11.t:0 "Réciprocité"
 inti_events.11.d:0 "Rien n'est gratuit en ce monde. Bien que n'importe lequel des nombreux chefs de notre royaume professerait immédiatement être notre loyal serviteur si on le lui demandait, nous pouvons être sûrs que cette loyauté a un prix. À moins que nous n'organisions régulièrement de grands festins pour les chefs de notre royaume et que nous veillions à ce qu'ils soient récompensés par des cadeaux pour leurs nombreux services envers nous, nous pourrions bien constater qu'ils manquent de motivation pour accomplir même les tâches les plus simples pour nous."
 inti_events.11.a:0 "Organisons un festin somptueux."
 inti_events.11.b:0 "Nous ne pouvons nous permettre qu'un festin modéré."
 inti_events.11.c:0 "Je ne vois aucun besoin d'une telle extravagance."
 inti_events.12.t:0 "Festival de l'Eau"
 inti_events.12.d:0 "Sans rivières et cours d'eau, la vie dans les Andes serait bien plus difficile et les esprits qui animent l'eau courante méritent certainement notre reconnaissance. Le moment est venu pour le festival de Purapucyo. Les forts courants des Andes sont prêts à recevoir nos offrandes."
 inti_events.12.a:0 "Un sacrifice de bière de Chicha à boire."
 inti_events.12.b:0 "Un sacrifice de Lamas pour alléger leurs fardeaux."
 inti_events.12.c:0 "Un sacrifice de beau Tissu pour les tenir au chaud."
 inti_events.13.t:0 "Construction d'un Temple"
 inti_events.13.d:0 "Le peuple de la province de [Root.GetName] est divisé et vénère divers dieux Huaca locaux. Il a donc été décidé qu'un grand temple d'Inti devrait être construit ici comme centre naturel de la vie spirituelle et administrative de la région.\nLe responsable de la construction a présenté à [Root.Owner.Monarch.GetName] deux plans différents pour le temple. Le premier plan consiste à construire le temple à un Tincuy, la confluence sacrée de deux cours d'eau, tandis que l'autre plan préconise d'utiliser un ancien sanctuaire Huaca comme base du nouveau temple."
 inti_events.13.a:0 "Un nouveau temple a besoin d'un nouvel emplacement, ce sera le Tincuy."
 inti_events.13.b:0 "Utilisons l'ancien sanctuaire."
 inti_events.14.t:0 "Oracles et Divination"
 inti_events.14.d:0 "Le monde peut parfois être un endroit impitoyable et le destin peut tourner de manières surprenantes. Heureusement, nous avons les dieux Huaca de notre peuple pour nous aider à interpréter ce que l'avenir nous réserve. Si l'avenir est trop difficile à pénétrer pour les Huacas, il existe d'autres oracles dans les Andes, mais ils exigent une offrande digne avant de partager leurs visions. [Root.Monarch.GetName] a été assailli de nombreux doutes récemment et il est peut-être temps de consulter les augures."
 inti_events.14.a:0 "Consulter l'oracle de notre Huaca local à [Root.Capital.GetCapitalName]."
 inti_events.14.b:0 "Voyager jusqu'au grand Oracle de Pachacamac."
 inti_events.14.c:0 "Nous devons aller à l'Oracle d'Apurímac."
 inti_events.14.dd:0 "Mieux vaut ne pas s'attarder sur l'avenir."
 inti_events.15.t:0 "Réponse Favorable des Huatuc et Hamurpa"
 inti_events.15.d:0 "Un grand nombre de devins sont attachés à tout sanctuaire d'Oracle. Les Guacarimachic parlent aux Huacas tandis que les Ayatapuc communiquent avec les morts. Les Huatuc atteignent un état prophétique en utilisant un breuvage sacré tandis que les Hamurpa lisent les entrailles de Lamas sacrifiés ou d'autres animaux.\nTous ces grands devins se sont maintenant penchés sur les questions que [Root.Monarch.GetName] est venu poser et tous s'accordent à dire que le temps à venir sera des plus fructueux et prospères."
 inti_events.15.a:0 "Excellent."
 inti_events.16.t:0 "Réponse Conflictuelle des Huatuc et Hamurpa"
 inti_events.16.d:0 "Un grand nombre de devins sont attachés à tout sanctuaire d'Oracle. Les Guacarimachic parlent aux Huacas tandis que les Ayatapuc communiquent avec les morts. Les Huatuc atteignent un état prophétique en utilisant un breuvage sacré tandis que les Hamurpa lisent les entrailles de Lamas sacrifiés ou d'autres animaux.\nTous ces grands devins se sont maintenant penchés sur les questions que [Root.Monarch.GetName] est venu poser mais la réponse n'est pas aussi favorable qu'il l'aurait espéré. Les signes sont contradictoires et autant qu'on puisse le discerner, l'avenir recèle à la fois des risques et des opportunités pour nous."
 inti_events.16.a:0 "D'accord."
 inti_events.17.t:0 "Des Mitmaq Souhaitant Rentrer chez Eux"
 inti_events.17.d:0 "Avec la conquête de nouvelles terres, nous avons rencontré des groupes de personnes qui ont été déplacées de force en tant que Mitmaq d'une région à une autre par leurs anciens suzerains. Comme les Mitmaq ne sont pas autorisés à changer leur façon de parler, les vêtements qu'ils portent et doivent emporter tous leurs biens avec eux, ces gens n'ont jamais cessé d'aspirer à leurs foyers d'origine.\nIl se trouve que leur région d'origine est également sous notre contrôle et une délégation des Mitmaq a donc été envoyée devant [Root.Monarch.GetName] affirmant que leurs Huacas leur ont dit de revenir, nous suppliant de lever leurs obligations."
 inti_events.17.a:0 "Permettre aux Mitmaq de Revenir."
 inti_events.17.b:0 "Ils sont nécessaires là où ils sont."
 inti_events.18.t:0 "Prêtres Incitant à l'Agitation à [Root.GetName]"
 inti_events.18.d:0 "Les prêtres d'un dieu Huaca mineur à [Root.GetName] ont essayé d'enflammer les opinions contre notre règne en disant que nous tentons lentement d'accroître l'autorité d'Inti et de marginaliser celle de tous les dieux Huaca. Heureusement, la plupart de nos sujets savent mieux que d'écouter ces accusations folles mais l'une des tribus de [Root.GetName] soutient les prêtres et a maintenant exigé que nous leur donnions des garanties pour la sécurité de leurs Dieux et de leur peuple."
 inti_events.18.a:0 "Le moment est venu pour ces gens de partir, en tant que Mitmaq."
 inti_events.18.b:0 "Donner des garanties aux prêtres locaux."
 inti_events.18.c:0 "Ces prêtres ne sont bons que pour la fosse Sankacancha."
 inti_events.19.t:0 "Croissance de [Root.GetName]"
 inti_events.19.d:0 "La politique étatique d'arrangement de mariages à [Root.GetName] a porté ses fruits. Non seulement la tendance inquiétante s'est inversée, mais la population a en fait fortement augmenté grâce à notre intervention.\nBien que l'augmentation de la main-d'œuvre profite à la province en général, cependant, les sentiments de ressentiment des familles forcées de faire des unions sous-optimales demeurent."
 inti_events.19.a:0 "D'accord."
 inti_events.20.t:0 "Inti Raymi, le Festival du Soleil"
 inti_events.20.d:0 "Les prêtres Yañca, chargés de surveiller le soleil, ont proclamé que le moment le plus propice pour célébrer le festival Inti Raymi est presque arrivé. Le festival qui dure plusieurs jours implique généralement toute la population de [Root.Capital.GetCapitalName] ainsi que d'importants chefs de la campagne et certains de leurs dieux Huaca mineurs."
 inti_events.20.a:0 "La population de [Root.Capital.GetCapitalName] participera."
 inti_events.20.b:0 "Convoquer tous les Chefs importants de l'Empire."
 inti_events.20.c:0 "Tous les chefs et tous les dieux Huaca doivent assister à la cérémonie."
 inti_events.21.t:0 "Chefs Insubordonnés"
 inti_events.21.d:0 "Certains des chefs qui ont été convoqués se sont offensés d'être commandés et ont refusé de se joindre au festival Inti Raymi."
 inti_events.21.a:0 "Les soudoyer avec des biens coûteux et des promesses."
 inti_events.21.b:0 "Nous devrons nous en passer."
 inti_events.21.c:0 "S'ils ne viennent pas de leur plein gré, nous les forcerons."
 inti_events.22.t:0 "Huacas Retenus"
 inti_events.22.d:0 "Les prêtres en charge de certains dieux Huaca se sont offensés d'être sommés de déplacer leur divinité à [Root.Capital.GetCapitalName] et refusent de venir."
 inti_events.22.a:0 "Nous nous en passerons."
 inti_events.22.b:0 "Les forcer à obtempérer."
 inti_events.23.t:0 "Invitation au Festival d'Inti Raymi"
 inti_events.23.d:0 "Un messager est arrivé de [From.GetName] exigeant notre présence au festival d'Inti Raymi à [From.Capital.GetCapitalName]."
 inti_events.23.a:0 "Alors nous devons y aller célébrer le soleil !"
 inti_events.23.b:0 "Restons chez nous et honorons le soleil à notre façon."
 inti_events.24.t:0 "Le Souverain de [From.GetName] Décline notre Invitation."
 inti_events.24.d:0 "[From.Monarch.GetName], le souverain de [From.GetName], a décliné notre invitation à se joindre à la célébration de l'Inti Raymi."
 inti_events.24.a:0 "Nous nous en passerons."
 inti_events.25.t:0 "Célébration de l'Inti Raymi"
 inti_events.25.d:0 "Après plusieurs jours de jeûne et d'abstinence, le moment est venu pour le festival du soleil. Alors que la population de [From.Capital.GetCapitalName] se prépare pour les grandes cérémonies au cours desquelles le soleil est salué et des animaux sacrifiés, elle sait également que plusieurs jours de festin l'attendent."
 inti_events.25.a:0 "D'accord."
 inti_events.26.t:0 "Célébration de l'Inti Raymi"
 inti_events.26.d:0 "Après plusieurs jours de jeûne et d'abstinence, le moment est venu pour le festival du soleil. Les places de [From.Capital.GetCapitalName] sont remplies à ras bord alors que les cérémonies pour saluer le soleil commencent et que des animaux et autres offrandes sont sacrifiés par le peuple de notre [Root.GovernmentName] et les nombreux chefs sous notre autorité. Plusieurs jours de festin et de cadeaux offerts par notre [Root.Monarch.GetTitle] à ses sujets nous attendent maintenant."
 inti_events.26.a:0 "D'accord."
 inti_events.27.t:0 "Célébration de l'Inti Raymi"
 inti_events.27.d:0 "Après plusieurs jours de jeûne et d'abstinence, le moment est venu pour le festival du soleil. Les places de [From.Capital.GetCapitalName] sont remplies à ras bord alors que les cérémonies pour saluer le soleil commencent et que des animaux et autres offrandes sont sacrifiés par le peuple de notre [Root.GovernmentName], les nombreux chefs sous notre autorité et les nombreuses idoles Huaca des terres que nous contrôlons. Plusieurs jours de festin et de cadeaux offerts par notre [Root.Monarch.GetTitle] à ses sujets nous attendent maintenant."
 inti_events.27.a:0 "D'accord."
 inti_events.28.t:0 "Célébration de l'Inti Raymi"
 inti_events.28.d:0 "Après plusieurs jours de jeûne et d'abstinence, le moment est venu pour le festival du soleil. Les places de [From.Capital.GetCapitalName] sont remplies à ras bord alors que les cérémonies pour saluer le soleil commencent et que des animaux et autres offrandes sont sacrifiés par le peuple de notre [Root.GovernmentName], les nombreux chefs sous notre autorité et les nombreuses idoles Huaca des terres que nous contrôlons. Plusieurs jours de festin et de cadeaux offerts par notre [Root.Monarch.GetTitle] à ses sujets nous attendent maintenant."
 inti_events.28.a:0 "D'accord."
 inti_events.29.t:0 "Célébration de l'Itu"
 inti_events.29.d:0 "Il y a une grande détresse dans nos terres. Le peuple souffre et beaucoup craignent pour l'avenir. En de tels temps, une célébration de l'Itu pour tout le royaume pourrait alléger l'esprit de nos sujets. Les sacrifices qu'elle implique feront également que les Dieux écoutent davantage nos peines.\nPour ce festival, nos prêtres insistent pour que nous procédions à un sacrifice humain car la détresse de notre peuple a été grande et ils estiment qu'une grande cérémonie est nécessaire pour apaiser les dieux."
 inti_events.29.a:0 "Contentons-nous des sacrifices habituels."
 inti_events.29.a.tt:0 "Organiser un festival habituel avec des sacrifices de Lamas, de Tissu, de Moutons et de Chicha."
 inti_events.29.b:0 "Ce sera un Sacrifice Humain."
 inti_events.29.b.tt:0 "Organiser un festival plus grand et plus long culminant avec le sacrifice d'Enfants Humains."
 inti_events.29.c:0 "Nous devons nous concentrer sur l'ici et maintenant."
 inti_events.30.t:0 "Célébration de l'Itu"
 inti_events.30.d:0 "Après des jours de célébration, l'avenir semble certainement plus radieux. De grandes cérémonies de danse sur les places publiques de [Root.Capital.GetCapitalName], des festins pour tous les chefs vassaux et d'amples sacrifices d'animaux, de tissu et de bière de Chicha aux dieux garantiront que les Dieux regarderont plus favorablement notre royaume à l'avenir."
 inti_events.30.a:0 "D'accord."
 inti_events.31.t:0 "Célébration de l'Itu"
 inti_events.31.d:0 "Après des jours de célébrations, de festins publics, de danses cérémonielles et à la fois initiés et conclus par le sacrifice des enfants les plus parfaits que nos terres pouvaient offrir, nous sommes confiants que nous affronterons un avenir plus radieux."
 inti_events.31.a:0 "D'accord."
 inti_events.32.t:0 "Les Gardes Royaux"
 inti_events.32.d:0 "L'honneur de garder la vie du [Root.Monarch.GetTitle] est héréditaire et appartient à un certain nombre de familles de [From.Capital.GetCapitalName]. Cet honneur n'est pas en soi une garantie de prouesse martiale cependant. Après une tournée dans les provinces, il est clair pour [Root.Monarch.GetName] que la qualité de la garde pourrait être considérablement améliorée si nous faisions venir du sang neuf de la campagne.\nCela ne serait cependant pas bien reçu par les familles qui détiennent actuellement ce privilège, du moins pas jusqu'à ce que les nouveaux membres soient intégrés depuis quelques générations."
 inti_events.32.a:0 "Faire venir du sang neuf."
 inti_events.32.b:0 "Qu'ils gardent leur privilège."
 inti_events.33.t:0 "Nobles Alarmés"
 inti_events.33.d:0 "Une délégation de certaines des meilleures familles de [From.Capital.GetCapitalName] a approché [Root.Monarch.GetName] en exigeant que les nouveaux membres de la garde royale soient renvoyés dans leurs foyers des provinces. Bien qu'ils soient satisfaits que l'institution en tant que telle n'ait pas été changée, ils sont horrifiés par le genre de personnes qui ont maintenant le droit héréditaire de garder le [Root.Monarch.GetTitle]. Ces hommes ne sont pas dignes de faire partie de la haute aristocratie de [From.Capital.GetCapitalName]."
 inti_events.33.a:0 "Annuler la décision d'élargir la Garde."
 inti_events.33.b:0 "Donnons-leur une génération ou deux."
 inti_events.34.t:0 "Attaque à [From.Capital.GetCapitalName]"
 inti_events.34.d:0 "Durant le service coutumier de boissons aux roturiers autour de la litière royale sur les places de [From.Capital.GetCapitalName] aujourd'hui, [Root.Monarch.GetName] a été attaqué par un petit groupe d'assassins en puissance. Le groupe s'est soudainement retiré sans jamais approcher de l'objectif de blesser [Root.Monarch.GetName], mais il était inquiétant de constater que les gardes royaux n'avaient rien vu venir. Peut-être parce qu'ils ne sont pas encore habitués à l'environnement animé de [From.Capital.GetCapitalName]."
 inti_events.34.a:0 "Annuler la décision d'élargir la Garde."
 inti_events.34.b:0 "Cela semble un peu trop opportun..."
 inti_events.34.b.tt:0 "Lancer une enquête sur qui a planifié l'attaque."
 inti_events.35.t:0 "Enquête au Point Mort"
 inti_events.35.d:0 "L'enquête sur l'attaque à [From.Capital.GetCapitalName] n'avait jamais eu grand-chose sur quoi s'appuyer et il a été difficile d'obtenir la coopération des gens, surtout parmi la noblesse. Bien que l'enquêteur semble soupçonner que c'était l'œuvre de quelques fils mécontents de l'aristocratie, nous ne pouvons jamais en être sûrs."
 inti_events.35.a:0 "D'accord."
 inti_events.36.t:0 "Complot Découvert"
 inti_events.36.d:0 "L'enquête sur l'attaque à [From.Capital.GetCapitalName] a découvert un complot amateur ourdi par un groupe de jeunes nobles des familles qui se sentaient marginalisées dans la garde royale. Ils prétendent que l'attaque n'était jamais destinée à blesser quiconque, juste à souligner les faiblesses des nouvelles recrues de la garde. La punition pour trahison est clairement la mort mais la noblesse de [From.Capital.GetCapitalName] ne se sentirait certainement pas moins menacée si nous tuions leurs fils. Si nous leur pardonnons cette transgression, peut-être que ce sera la fin de cette affaire."
 inti_events.36.a:0 "À la Fosse Sankacancha !"
 inti_events.36.b:0 "Pardonner aux Nobles."
