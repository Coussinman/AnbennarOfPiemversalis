 maya_nation_title:0 "Réunifier la Ligue de Mayapan"
 maya_nation_desc:0 "Jadis, tous les États mayas d'importance combattaient sous la même bannière. Recréons la Ligue de Mayapan et mettons derrière nous les conflits mesquins qui ont autrefois brisé la confédération."
 ND_IDEA_ALREADY_SELECTED:0 "§YVous avez déjà sélectionné ce modificateur, le sélectionner échangera les emplacements avec celui précédemment sélectionné.§!"
 RANDOM_OR_EMPTY_SETUP_DESC:0 "§YUne Configuration Aléatoire ou Personnalisée a été sélectionnée dans les Options. Veuillez créer une Nation Personnalisée pour démarrer la partie.§!"
 AUTHORITY_FROM_LA:0 "Cela changera votre Autorité d'au maximum $CHANGE$."
 custom_idea_years_of_nationalism:0 "Une Nation, Un Peuple"
 custom_idea_years_of_nationalism_desc:0 "La loyauté envers votre nation est un trait honorable, mais un pays peut être composé de nombreuses nations différentes. Avec la notion que notre peuple fait partie d'une seule nation, nous lutterons contre la division que causent de nombreuses petites nations."
 custom_idea_imperial_authority:0 "Règne Impérial"
 custom_idea_imperial_authority_desc:0 "Le souverain d'un Empire, celui d'Anbennar, doit être prêt à exercer son autorité sur ceux qu'il souhaite gouverner et s'assurer que cela soit accepté par tous. Cette autorité doit être pratiquée, exercée et maintenue afin que personne ne conteste votre droit de régner sur un Empire d'Anbennar."
 custom_idea_female_advisor_chance:0 "L'Éducation des Filles"
 custom_idea_female_advisor_chance_desc:0 "Des penseurs anciens et contemporains ont plaidé pour la capacité intellectuelle des femmes et la nécessité d'assurer une bonne éducation aux jeunes filles. Ayant vu cela se vérifier, nous concluons qu'exclure les femmes de participer aux affaires de gouvernance serait une restriction insensée."
 custom_idea_female_generals:0 "Femmes Guerrières"
 custom_idea_female_generals_desc:0 "De nombreuses nations ont vu des femmes prendre les armes lors de révoltes et en temps de besoin, mais peu ont notre tradition distincte de femmes menant le peuple à la guerre. Cela se reflète dans notre recrutement de généraux masculins et féminins à parts égales dans notre quête des meilleurs et des plus braves."
 custom_idea_free_adm_policy:0 "Bureaucratie Élargie"
 custom_idea_free_adm_policy_desc:0 "La bureaucratie s'élargit pour répondre aux besoins de la bureaucratie en expansion."
 custom_idea_possible_adm_policy:0 "Nouveaux Départements d'État"
 custom_idea_possible_adm_policy_desc:0 "De nouveaux postes et départements du gouvernement doivent être créés afin que les ministres puissent se concentrer sur leurs domaines d'expertise respectifs."
 custom_idea_free_dip_policy:0 "Promouvoir les Hommes d'État Provinciaux"
 custom_idea_free_dip_policy_desc:0 "Les hommes d'État prometteurs opérant hors de la capitale devraient avoir des opportunités d'avancer au sein du gouvernement central."
 custom_idea_possible_dip_policy:0 "Ambassades Permanentes"
 custom_idea_possible_dip_policy_desc:0 "L'établissement de consulats permanents dans les nations étrangères renforcera notre portée diplomatique et éclairera l'élaboration des politiques."
 custom_idea_free_mil_policy:0 "Conseil des Généraux"
 custom_idea_free_mil_policy_desc:0 "Nous devrions programmer des réunions régulières entre nos généraux afin qu'ils puissent partager leurs connaissances tactiques et fournir un aperçu de la situation stratégique."
 custom_idea_possible_mil_policy:0 "Inviter des Stratèges Étrangers"
 custom_idea_possible_mil_policy_desc:0 "Nous devrions regarder au-delà de nos frontières pour trouver les meilleurs esprits militaires de notre temps."
