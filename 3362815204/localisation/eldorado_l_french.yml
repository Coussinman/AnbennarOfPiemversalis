l_french:
 exploration_events.1.t:0 "Épreuve en $PROVINCENAME$"
 exploration_events.1.d:0 "Au cours de notre mission visant à découvrir des provinces propices à la colonisation, nous avons découvert $PROVINCENAME$. Ses habitants autochtones se montrent pour la plupart hostiles, mais la terre y est fort prospère. Nous tirerions grand profit du commerce avec cette province. Bien qu'il nous faille peut-être soudoyer un chef ou deux..."
 exploration_events.1.a:0 "Proposons-leur un marché équitable."
 exploration_events.1.b:0 "Proposons-leur un marché malhonnête."
 exploration_events.2.t:0 "Guerriers de $PROVINCENAME$"
 exploration_events.2.d:0 "Notre expédition a rencontré des autochtones hostiles de $PROVINCENAME$, ce qui a contraint nos hommes à fuir la province. Quelques membres de l'équipage avaient débarqué pour trouver de l'eau douce et regagnaient le navire lorsque cinq pirogues transportant des guerriers armés firent leur apparition. L'équipage fit demi-tour et fila vers le bateau, les pirogues à leurs trousses. L'une d'elles faillit les rattraper, mais alors que nos hommes se préparaient au combat, elle ralentit pour attendre les autres. Le navire s'échappa, mais plusieurs membres de l'équipage furent blessés. Une flèche empoisonnée atteignit l'un d'eux à la jambe et, bien que la plaie ait été désinfectée avec de l'urine et de l'huile d'olive, nous ignorons si cet homme survivra."
 exploration_events.2.a:0 "Voyons si quelques colifichets clinquants apaiseront les autochtones."
 exploration_events.2.b:0 "Retournons là-bas, massacrons les indigènes et prenons leur or !"
 exploration_events.3.t:0 "Étranger en terre étrangère"
 exploration_events.3.d:1 "Tandis que notre navire approche de $PROVINCENAME$, un grand nombre de pirogues chargées de présents se mettent à le suivre. Leurs occupants ont intrépidement abordé le vaisseau et deux individus d'apparence importante tentent de persuader le capitaine de les suivre jusqu'à [tribal_nation.Capital.GetCapitalName]. Leurs intentions semblent innocentes et, d'après les quelques mots que notre interprète parvient à saisir, nous sommes arrivés juste à temps pour une festivité quelconque. La configuration de nos mâts, voiles et gréements ressemble à certains artefacts significatifs pour les autochtones, et notre route dans le sens horaire autour de l'île reflète le parcours des processions lors de ce festival. Cela a convaincu les indigènes que nous sommes amicaux, mais un faux pas pourrait tout changer..."
 exploration_events.3.a:0 "Acceptons leurs traditions primitives."
 exploration_events.3.b:0 "Gardons nos distances et n'accostons point !"
 exploration_events.4.t:0 "La route de la gloire"
 exploration_events.4.d:0 "La vigie avait signalé des signes d'habitations, mais le navire n'avait encore aperçu aucun autochtone jusqu'à ce qu'enfin un village côtier de $PROVINCENAME$ soit repéré. Une petite troupe débarqua et fut accueillie avec hospitalité, ce que l'on attribua à la fascination des indigènes pour ces hommes plus grands qu'eux et portant la barbe. Les autochtones étaient imberbes et, non sans difficulté, ils parvinrent à faire comprendre que leurs mythes et légendes prophétisaient un temps où leurs dieux barbus viendraient de la mer pour leur rendre visite. Nourriture et or furent offerts, ce qui indique que la province est prospère et serait d'une grande valeur pour nous."
 exploration_events.4.a:0 "Voilà une terre prometteuse !"
 exploration_events.5.t:0 "Le navire vers l'été"
 exploration_events.5.d:0 "Les mots d'Endral l'Explorateur décrivent parfaitement la tribu que nous avons découverte en $PROVINCENAME$ : « Ils commerçaient avec nous et nous donnèrent tout ce qu'ils possédaient, de bon cœur... Ils prenaient grand plaisir à nous satisfaire... Ce sont des gens très doux, ignorant le mal ; ils ne commettent ni meurtre ni vol... Votre Altesse peut croire qu'en tout le monde il ne saurait y avoir meilleur peuple... Ils aiment leur prochain comme eux-mêmes, ont le parler le plus doux qui soit, et sont toujours souriants et riant. »"
 exploration_events.5.a:0 "Profitons d'eux !"
 exploration_events.5.b:0 "Tirons bon parti de leur nature accommodante."
 exploration_events.6.t:0 "Passager indésirable"
 exploration_events.6.d:0 "Le village était abandonné depuis quelque temps déjà ; les cultures défaillantes témoignaient d'une sécheresse qui devait sévir dans la province depuis un bon moment. Alors que nous regagnions notre navire, nous eûmes un choc terrible : l'un des plus grands ours que nous ayons jamais vus tentait de grimper à bord ! Les marins décidèrent de capturer la bête affamée dans l'espoir de la ramener dans notre pays, mais l'ours avait d'autres plans. Il fut attaché et hissé à bord du navire, mais il se libéra de ses liens et nous dûmes l'abattre. Cette attaque et l'état de désolation de $PROVINCENAME$ nous ont fait comprendre que cette terre est une cause perdue."
 exploration_events.6.a:0 "Quelle déception."
 exploration_events.7.t:0 "Les vertes collines de $PROVINCENAME$"
 exploration_events.7.d:0 "Les autochtones de $PROVINCENAME$ furent enchantés par les perles de verre, les clochettes de laiton et les étoffes que nos explorateurs échangèrent contre du poisson frais et de la venaison. Dans leur rapport, l'équipage du navire nous informa qu'il y avait fort peu de richesses parmi ce peuple, qui semblait paisible. Certains événements les troublèrent, car les villageois, pour une raison inconnue, désertèrent leurs demeures une nuit et laissèrent le village à la disposition des membres de l'expédition. On ne trouva pas grand-chose ; seul un petit hochet en or enterré parmi des filets de pêche témoignait que cette province pourrait nous rapporter quelque fortune."
 exploration_events.7.a:0 "Voilà qui est excellent !"
 exploration_events.8.t:0 "Au-delà de cet horizon"
 exploration_events.8.d:0 "Tandis que notre navire d'exploration mouillait au large des côtes de $PROVINCENAME$, quelques autochtones curieux pagayèrent vers le navire dans leurs pirogues. L'équipage invita les indigènes à monter à bord après que des gestes exprimant des intentions pacifiques furent échangés. Nourriture et boisson furent partagées avec les autochtones avant qu'ils ne regagnent leurs pirogues et retournent à $PROVINCENAME$. Encouragés par le récit de cette première rencontre pacifique, six autres pirogues décidèrent de pagayer vers la caravelle."
 exploration_events.8.a:0 "Invitons-les à nouveau."
 exploration_events.8.b:0 "Capturons-les !"
 exploration_events.9.t:0 "La menace de $PROVINCENAME$"
 exploration_events.9.d:0 "Après un début plutôt tumultueux avec les autochtones de $PROVINCENAME$, nous parvînmes enfin à les convaincre de nos bonnes intentions. Alors que nous accostions, deux hommes, l'un âgé et l'autre jeune, s'approchèrent de notre navire. Ils ne s'intéressaient guère à nos présents et lorsqu'un mousquet fut tiré au-dessus de leurs têtes pour les faire reculer, il blessa légèrement le plus âgé. Celui-ci courut vers leurs huttes et ramena des hommes qui lancèrent des javelots sur notre équipage jusqu'à ce qu'ils soient mis en fuite après deux nouvelles salves. Les adultes s'enfuirent dans les bois, abandonnant leurs enfants. Quelques colifichets et perles furent laissés aux enfants en gage d'amitié avant que les membres de l'expédition ne se replient vers le navire."
 exploration_events.9.a:0 "Faisons-leur comprendre que nous ne leur voulions aucun mal."
 exploration_events.9.b:0 "S'ils reviennent, qu'on les tue !"
 exploration_events.10.t:0 "Les bêtes de $PROVINCENAME$"
 exploration_events.10.d:0 "Avant de partir en expédition, nous avions entendu des récits d'un ancien explorateur gnomique du nom de Hannoddodd qui avait découvert une île peuplée d'« humanoïdes hirsutes et sauvages ». Hannoddodd avait tenté de capturer les mâles sans succès, mais trois femelles furent prises. Leur nature féroce contraignit l'explorateur à les tuer et, pour preuve de l'existence de ces sauvages, leurs peaux furent conservées pour le transport. Ces êtres furent nommés « gorillae » par les interprètes accompagnant Hannoddodd. Nous supposons que les Nés-des-Ruines simiesques que nous avons trouvés en $PROVINCENAME$ doivent être apparentés à ces Gorillae dont parlait Hannoddodd."
 exploration_events.10.a:0 "On peut les apprivoiser avec quelques babioles."
 exploration_events.10.b:0 "Prenez ce que vous pouvez et fuyez !"
 exploration_events.11.t:0 "Une pluie de poison"
 exploration_events.11.d:0 "L'expédition approchait de $PROVINCENAME$ lorsqu'une volée de flèches, décochées par les autochtones massés sur la plage accueillante, assaillit le navire. Dans la hâte de fuir l'ennemi, qui bondissait vers leurs pirogues en poussant de grands cris, l'équipage dut abandonner certains hommes qui avaient été touchés et étaient tombés par-dessus bord. Lorsqu'ils eurent mis quelques milles marins entre $PROVINCENAME$ et eux, ils découvrirent que tout le flanc tribord du navire était hérissé de flèches.\nL'explorateur à bord du navire attaqué fut gravement blessé ; la flèche qui l'avait atteint était empoisonnée. Il resta fiévreux, suant et délirant, pendant plusieurs jours. Malgré les soins du chirurgien et le désinfectant à base d'urine et d'huile d'olive, il mourut il y a quelque temps."
 exploration_events.11.a:0 "Quel destin horrible !"
 exploration_events.12.t:0 "Explorateur ivre"
 exploration_events.12.d:0 "L'un des membres de notre expédition, notre explorateur, de surcroît, s'est mis dans une situation terriblement embarrassante en surestimant sa capacité à supporter la liqueur fruitée que les autochtones de $PROVINCENAME$ préparent. Les détails répugnants ne figureront point dans ce rapport, mais il fut malade comme un chien pendant longtemps. Les indigènes trouvèrent cela amusant, riant de sa misère, mais les rumeurs de cet événement sont parvenues aux oreilles de la haute société, qui réprouve un tel comportement."
 exploration_events.12.a:0 "Liqueur fruitée ? En avez-vous rapporté ?"
 exploration_events.13.t:0 "Repas de plumes"
 exploration_events.13.d:0 "Les seuls résidents de $PROVINCENAME$ semblent être des oiseaux, des oiseaux et encore des oiseaux. Les grands oiseaux, surnommés « pingouins » par l'équipage du navire en raison de leurs petites ailes, ne semblent point nous craindre. Le premier que nous capturâmes nous fixa du regard et ne daigna ni s'envoler ni s'enfuir. Lorsque nous l'attrapâmes par la patte et le tînmes la tête en bas, il fit grand bruit. La colonie de pingouins autour de nous accourut à son secours et tenta de nous mordre avec leurs grands becs. Nos provisions sont basses et ces oiseaux sont gras et semblent assez bons à manger."
 exploration_events.13.a:0 "Laissons ces oiseaux tranquilles."
 exploration_events.13.b:0 "Si ça bouge, qu'on le mange !"
 exploration_events.14.t:0 "Exploratrice inattendue"
 exploration_events.14.d:0 "Lorsque le navire entra dans la baie de $PROVINCENAME$, une petite foule d'autochtones s'était rassemblée sur la plage et observait l'expédition en silence. Le second du navire se lança dans une danse spontanée et joyeuse au son des flûtes. Les indigènes se mirent à rire, ce qui détendit l'atmosphère. Nourriture et boisson furent descendues sur la plage pour que tous festoient ensemble. L'une des autochtones montra un vif intérêt pour le navire, les épées et autres équipements apportés par l'un des membres de l'expédition. Avec l'aide de l'interprète, la jeune femme parla de sa connaissance des îles voisines et de son grand désir de voir davantage du monde."
 exploration_events.14.a:0 "Emmenez-la et faites-en une exploratrice."
 exploration_events.14.b:0 "Il vaut mieux pour elle qu'elle reste où elle est."
 exploration_events.15.t:0 "Mort à l'arrivée"
 exploration_events.15.d:0 "La vie à bord d'un navire est solitaire. Dans quelques provinces visitées par les expéditions, les bras accueillants ne manquaient point pour étreindre et apaiser la solitude pour un temps. Un contact trop intime avec les autochtones a peut-être causé la mort de l'explorateur, car il contracta une étrange maladie qui détériora rapidement son état et provoqua une défaillance cardiaque. Il fut inhumé en mer, non loin de $PROVINCENAME$."
 exploration_events.15.a:0 "Qu'il repose en paix."
 exploration_events.16.t:0 "La première circumnavigation"
 exploration_events.16.d:0 "Notre flotte prit la mer pour trouver une route maritime occidentale vers les riches cités du Golfe du Rahen. Il leur fallut 99 jours pour traverser l'océan vers l'ouest, après avoir découvert le Banc de Kimánis situé près de la pointe d'Aelantir méridional. Le détroit était calme et ils furent escortés par des pêcheurs locaux qui les mirent en garde contre les vents mortels de la Mer de Kaydhano (en réalité un désert, semble-t-il), mais finalement, le capitaine et son équipage parvinrent à gagner le large. L'océan était si calme et dépourvu de terre que l'équipage se crut victime de la Grande Errance, l'événement qui vit les elfes errer sur les mers pendant 1 000 ans après le Jour-des-Cieux-Cendrés. Ils devaient plus tard se rappeler que c'était peut-être ici que les elfes avaient erré, et ils le nommèrent « Océan des Égarés ».\n\nLe capitaine de la flotte mourut d'une blessure causée par une flèche empoisonnée après avoir été pris pour l'un des proto-mécanismes d'Insyaa, probablement en raison de son armure étincelante. Deux de nos navires avaient survécu ; l'un tenta de revenir par l'Océan des Égarés mais ne fut jamais retrouvé. Le dernier navire poursuivit vers l'ouest et traversa la Lamentation d'Uelos, contourna la Côte Kedwali, et lorsqu'il arriva dans notre port, il devint le premier navire à faire le tour du monde."
 exploration_events.16.a:0 "Nous sommes les premiers à avoir fait le tour du globe !"
 exploration_events.17.t:0 "La deuxième circumnavigation"
 exploration_events.17.d:0 "Nous ne sommes pas les premiers à avoir réussi à faire le tour du globe, mais il n'en demeure pas moins que c'est un grand exploit qui sera célébré dans tout le pays !"
 exploration_events.17.a:0 "Un exploit fabuleux, même si nous ne fûmes point les premiers..."
 exploration_events.18.d:0 "Notre flotte prit la mer pour trouver une route maritime vers les riches cités de Cannor. Il leur fallut 99 jours pour traverser l'océan vers l'ouest, après avoir découvert la Côte Kedwali située près de la pointe de Sarhal.\n\nLe capitaine de la flotte fut dévoré sous les yeux de son équipage par une meute de gnolls, mais deux de nos navires avaient survécu ; l'un tenta de revenir par les mers mais périt. Le dernier navire poursuivit vers l'ouest et traversa l'Océan des Égarés, et lorsqu'il arriva dans notre port, il devint le premier navire à faire le tour du monde."
 exploration_events.19.d:0 "Notre flotte prit la mer pour trouver une route maritime occidentale vers les riches cités du Golfe du Rahen. Il leur fallut 99 jours pour traverser l'océan vers l'ouest, après avoir découvert le Banc de Kimánis situé près de la pointe d'Aelantir méridional. Le détroit était calme et ils furent escortés par des pêcheurs locaux qui les mirent en garde contre les vents mortels de la Mer de Kaydhano (en réalité un désert, semble-t-il), mais finalement, le capitaine et son équipage parvinrent à gagner le large.\n\nLe capitaine de la flotte fut écrasé par la queue d'un monstre géant en Insyaa. Deux de nos navires avaient survécu ; l'un tenta de revenir par l'Océan des Égarés mais périt. Le dernier navire poursuivit vers l'ouest et traversa la Côte Sarhalienne, et lorsqu'il arriva dans notre port, il devint le premier navire à faire le tour du monde."
 exploration_events.20.d:0 "Notre flotte prit la mer pour trouver une route maritime occidentale vers les fabuleuses îles et cités riches de l'ouest. Il leur fallut de nombreux jours pour traverser l'océan vers l'ouest, après avoir découvert le Golfe du Rahen.\n\nLe capitaine de la flotte fut massacré par un seigneur de guerre harimari courroucé après l'avoir offensé. Deux de nos navires avaient survécu ; l'un tenta de revenir par la haute mer mais périt. Le dernier navire poursuivit vers l'ouest et traversa la Lamentation d'Uelos, puis la Mer Ruinée, et lorsqu'il arriva dans notre port, il devint le premier navire à faire le tour du monde."
 exploration_events.21.d:0 "Notre flotte prit la mer pour trouver une route maritime vers les riches cités de Cannor. Il leur fallut 99 jours pour traverser l'océan vers l'ouest, après avoir découvert la Côte Kedwali située près de la pointe de Sarhal.\n\nLe capitaine de la flotte fut dévoré sous les yeux de son équipage par une meute de gnolls, mais deux de nos navires avaient survécu ; l'un tenta de revenir par les mers mais périt. Le dernier navire poursuivit vers l'ouest et traversa l'Océan des Égarés, et lorsqu'il arriva dans notre port, il devint le premier navire à faire le tour du monde."
 exploration_events.22.d:0 "Shah [Root.Monarch.GetName] bin $RANDOM_OLD_MONARCH$ Khan el-Muzaffar Daima\n\nÀ mon vénérable vizir, ordonnateur du monde, directeur des affaires de la communauté et gardien de mes Domaines Bien-Protégés : à réception de cet ordre, qu'il soit publiquement su que notre expédition de découverte est revenue victorieuse. Nos plus estimés navigateurs partirent de Kostantiniyye au mois de Muharrem, dans l'intention d'élargir notre connaissance du monde. Ayant atteint le Nouveau Climat, ils démontrèrent les limites de ce continent en le contournant par le sud, et arrivèrent dans le grand océan le séparant du pays de Hitay. Ils le nommèrent el-Bahrü's-selam en l'honneur de sa nature paisible. De là, ils visitèrent les terres de Java et de Hind, et informèrent les Croyants locaux de la puissance de mon Sublime État ; on dit que mon nom fortuné est même mentionné dans leurs prières du vendredi. Sous la protection d'Allah le Très-Haut, ils nous revinrent par la voie de l'Égypte. Que cet événement serve de démonstration éclatante de la puissance et de la portée de la Maison d'Osman à travers les Sept Climats, et que les ambassadeurs des nations étrangères entendent également parler de nos nobles réalisations.\n\nConsigné au premier trimestre du noble mois de Ramadan, à Kostantiniyye, la Bien-Protégée."
 exploration_events.23.d:0 "Jusqu'à présent, nous croyions que le monde était composé de trois grandes régions : le Japon, la Chine et l'Inde. Récemment, nous avons également appris l'existence de la civilisation « Nanban » des Barbares du Sud et, afin de les contacter directement au-delà des hautes mers, nous avons organisé une grande expédition. Notre flotte explora des îles tropicales au sud et rencontra des peuples aux coutumes exotiques à l'ouest. Nos navires naviguèrent entre les glaces dérivantes au nord et découvrirent des continents et des îles inconnus à l'est.\nComme plus grand résultat de cette expédition, nos marins ont été les premiers au monde à faire le tour du globe ! L'Empereur fut très satisfait de notre accomplissement lorsque nos navires rentrèrent enfin au pays. Son Altesse invita le commandant en chef et les autres membres d'équipage de la flotte à la Cour Impériale et tint une glorieuse audience telle qu'il n'en fut jamais consignée auparavant. Cet événement restera dans les mémoires comme le jour où le Japon s'éleva pour dominer les sept mers."
 opinion_worship:0 "Adoration"
 disturbed_ritual:0 "Rituel perturbé"
 angry_natives:0 "Autochtones hostiles"
 friendly_natives:0 "Autochtones amicaux"
 drunken_explorer:0 "Explorateur ivre"
 desc_drunken_explorer:0 "Un explorateur, ivre de liqueur fruitée, a embarrassé toute la nation et lui-même."
 seven_cities_events.1.t:0 "El Dorado"
 seven_cities_events.1.d:0 "Un aventurier sur son lit de mort raconta l'histoire d'un roi couvert d'or qui se lavait de cette dorure tandis que ses serviteurs jetaient des colifichets d'or et de pierres précieuses dans un lac. L'homme prétendait avoir été secouru par El Hombre Dorado lui-même et avoir vu le rituel et la cité d'or de ses propres yeux. Avant de tomber malade, il avait tracé une carte grossière qui, selon lui, montre le chemin vers El Dorado. Maintenant que nous sommes arrivés en $PROVINCENAME$, un point de repère correspond à l'un des rares éléments grossièrement dessinés sur la carte de l'aventurier."
 seven_cities_events.1.a:0 "Suivons cette carte ! Elle nous mènera à de grands trésors."
 seven_cities_events.1.b:0 "Essayons de trouver quelque chose de vraie valeur."
 seven_cities_events.2.t:0 "La fontaine de Jouvence"
 seven_cities_events.2.d:0 "Les récits d'une fontaine accordant la jeunesse éternelle à quiconque se baigne dans ses eaux ou en boit sont connus depuis longtemps. Certains ont toujours rejeté cette idée, tandis que d'autres l'ont cherchée en vain. Nous réussirons à trouver l'Eau de Vie, cette Fontaine de Jouvence, simplement parce que nous avons trouvé quelqu'un en $PROVINCENAME$ qui l'a vue et est disposé à nous y conduire, moyennant un prix, bien entendu."
 seven_cities_events.2.a:0 "Payez cet homme ou cette femme ! Tout ce qu'ils veulent !"
 seven_cities_events.2.b:0 "Trop invraisemblable."
 seven_cities_events.3.t:0 "Cibola"
 seven_cities_events.3.d:0 "Un éclaireur envoyé en avant est revenu avec des nouvelles de Cibola, l'une des Sept Cités d'Or. Il avait rencontré un moine qui avait entendu les histoires des autochtones de $PROVINCENAME$ au sujet d'une cité regorgeant de richesses. Ses habitants décoraient leurs maisons de turquoises, utilisaient des plats d'or et d'argent, et possédaient de gigantesques perles, émeraudes et autres gemmes magnifiques."
 seven_cities_events.3.a:0 "Trouvons le moine et persuadons-le de nous conduire à Cibola !"
 seven_cities_events.3.b:0 "Pourquoi devrions-nous faire confiance à un tel fou ?"
 seven_cities_events.4.t:0 "La Cité des Césars"
 seven_cities_events.4.d:0 "Une cité remplie d'or, d'argent et de diamants... Que pourrait-on souhaiter de plus ? Notre conquistador a trouvé un point de repère indiquant que c'est le chemin vers la Cité des Césars, qui devrait se trouver entre deux montagnes, l'une de diamants et l'autre d'or. Nous avons besoin de guides expérimentés, d'interprètes pour parler avec les autochtones, et de provisions de toutes sortes pour poursuivre cette expédition. La récompense sera grande, si nous trouvons la cité."
 seven_cities_events.4.a:0 "Dites-moi ce qu'il vous faut et vous l'aurez !"
 seven_cities_events.4.b:0 "Continuez à explorer et oubliez la Cité des Césars."
 seven_cities_events.5.t:0 "Sierra de la Plata"
 seven_cities_events.5.d:0 "Le Roi Blanc règne sur la région où se trouvent les Montagnes d'Argent, ou du moins c'est ce que prétend l'équipage rescapé d'un naufrage. Alors qu'ils étaient naufragés en $PROVINCENAME$, ils se lièrent d'amitié avec les autochtones qui leur parlèrent d'une grande montagne de métaux brillants, trop éloignée à l'intérieur des terres pour être atteinte en plusieurs jours, voire plusieurs semaines. Les métaux qu'ils ont rapportés donnent un grain de vérité à cette légende, et ils ont offert de se joindre à nous pour chercher la Sierra de la Plata, les Montagnes d'Argent."
 seven_cities_events.5.a:0 "Emmenez-les et trouvez l'argent !"
 seven_cities_events.5.b:0 "Il n'y a pas un grain de vérité là-dedans !"
 seven_cities_events.6.t:0 "Norumbega"
 seven_cities_events.6.d:0 "Un navigateur français rapporta avoir trouvé une grande rivière, large de plus de 40 lieues et remplie d'îles. Selon ses notes, à quinze lieues à l'intérieur de cette rivière se trouve une ville appelée Norumbega, avec des habitants habiles qui commercent en fourrures de toutes sortes. Ils sont vêtus de fourrures et portent de la zibeline, avec une langue similaire au latin. Ces gens grands et beaux adorent le soleil. La ville est très riche et il doit y avoir une source pour l'or que la plupart des habitants portaient en bijoux."
 seven_cities_events.6.a:0 "Envoyons le conquistador ! Nous devons trouver cet endroit."
 seven_cities_events.6.b:0 "C'est une entreprise vaine."
 seven_cities_events.7.t:0 "Le Royaume de Saguenay"
 seven_cities_events.7.d:0 "Il y a eu des rumeurs concernant un royaume au nord des Amériques gouverné par des hommes blancs et blonds dont le trésor regorge d'or, d'argent et de rubis. Un explorateur, sa flotte prise dans les glaces à l'embouchure d'une rivière, passa un hiver en $PROVINCENAME$ et fut informé du Royaume de Saguenay par les autochtones. Par des signes et des gestes vers ses insignes d'or et d'argent, les indigènes lui indiquèrent que les métaux précieux venaient du nord-ouest, d'une tribu des plus agressives et belliqueuses. Ils ont la peau aussi blanche que l'explorateur lui-même et sont vêtus de façon similaire. Les habitants de Saguenay sont un peuple nombreux, respectueux des lois et riche."
 seven_cities_events.7.a:0 "En avant et trouvons le Royaume de Saguenay !"
 seven_cities_events.7.b:0 "Bah, de simples rumeurs ne suffisent point. Il nous faut des preuves !"
 seven_cities_events.8.t:0 "Quivira"
 seven_cities_events.8.d:0 "L'absence de richesses en $PROVINCENAME$ déçut grandement le conquistador, mais les récits racontés par un autochtone connu sous le nom de « Le Turc » lui remontèrent le moral. Une civilisation prospère nommée Quivira se trouve loin à l'est, ou était-ce au nord, de $PROVINCENAME$, où le chef boit dans des coupes d'or suspendues aux arbres."
 seven_cities_events.8.a:0 "Trouvons les coupes d'or de Quivira !"
 seven_cities_events.8.b:0 "Une entreprise vaine, j'en suis sûr."
 seven_cities_events.100.t:0 "La mort d'un conquistador"
 seven_cities_events.100.d:1 "L'expédition envoya un éclaireur avec pour instructions d'envoyer des croix au groupe principal, la taille de la croix devant correspondre à la richesse découverte. Bientôt, une croix aussi grande qu'un homme arriva et le groupe principal accéléra le pas, flairant sa proie. En entrant dans un grand établissement de $PROVINCENAME$, ils découvrirent que les autochtones avaient tué l'éclaireur et les attendaient. La plupart tombèrent sous les coups des sauvages, mais quelques désespérés parvinrent à s'échapper. Ils nous racontent que le conquistador fut l'un des premiers à périr, et que l'éclaireur était à blâmer. Il avait offert en cadeau une calebasse ornée d'une plume rouge, qui s'avéra être le symbole de guerre des autochtones."
 seven_cities_events.100.a:0 "Nous pleurons la perte d'un grand conquistador."
 seven_cities_events.101.t:0 "Manger du cuir ou mourir de faim"
 seven_cities_events.101.d:0 "L'expédition était à court de provisions avant même d'entrer en $PROVINCENAME$, mais maintenant nous devons survivre de ce que la terre offre, ce qui n'est pas grand-chose. Les serpents ont un goût de poulet et le cuir... Fermez les yeux bien fort en mâchant du cuir bouilli de votre fourreau ou de votre armure, et vous pourriez croire que c'est de la viande séchée. Envoyez-nous de l'aide, ou nous n'atteindrons jamais notre destination."
 seven_cities_events.101.a:0 "De l'aide sera envoyée !"
 seven_cities_events.101.b:0 "Trouvez des autochtones et faites-vous nourrir par eux."
 seven_cities_events.102.t:0 "Quand les autochtones attaquent"
 seven_cities_events.102.d:0 "C'était une vision terrifiante, ces femmes à demi vêtues avec des lances, des massues, des arcs et des flèches à la main, et le son qui sortait de leurs gorges aussi terrifiant que le rugissement d'un tigre ! Ces guerrières de $PROVINCENAME$ furent nommées Amazones par les survivants de notre expédition, et ceux qu'elles ne blessèrent ni ne tuèrent furent faits prisonniers. Parmi eux se trouvait le conquistador, le chef de cette quête."
 seven_cities_events.102.a:0 "Trouvez-les et persuadez-les de libérer leurs captifs !"
 seven_cities_events.102.b:0 "Ils le libéreront, lui et les autres, quand ils seront lassés de lui."
 seven_cities_events.103.t:0 "Une lueur d'espoir"
 seven_cities_events.103.d:0 "Nous avons repoussé des autochtones, mangé des fruits étranges et des animaux plus étranges encore, attrapé des maladies que nul ne devrait jamais avoir à endurer, et désespéré à chaque pas qui nous éloignait des cités habitées. La seule chose qui nous a fait avancer était l'obstination, la curiosité et la ferme conviction de notre chef que nous trouverions l'endroit que nous cherchons. Même sa volonté de fer semble avoir faibli ces derniers jours, et sans une grande découverte en $PROVINCENAME$, il aurait ordonné notre retraite."
 seven_cities_events.103.a:0 "Nous avons trouvé de l'or ?!"
 seven_cities_events.104.t:0 "Enlevé dans la nuit"
 seven_cities_events.104.d:0 "Ce pourrait être la faute des gardes, car ils se sont endormis pendant leur tour de garde. Ou était-ce l'autochtone que nous avions engagé pour nous guider à travers l'inhospitalière $PROVINCENAME$ qui est à blâmer ? Peut-être était-ce le conquistador qui dormait si profondément qu'il ne se réveilla même pas pour crier et hurler tandis que les indigènes l'emportaient silencieusement dans les profondeurs de la forêt. Quoi qu'il en soit, notre conquistador a disparu dans la nuit et nous devons partir à sa recherche."
 seven_cities_events.104.a:0 "Prenez des soldats et allez trouver le conquistador !"
 seven_cities_events.104.b:0 "Il réapparaîtra, tôt ou tard."
 seven_cities_events.105.t:0 "Cochon long"
 seven_cities_events.105.d:0 "L'expédition tomba sur une petite tribu amicale d'autochtones en $PROVINCENAME$ qui les invita à un festin pour célébrer une victoire récente sur une tribu voisine. Il y avait abondance de viande, au goût rappelant le porc, et le nom était apparemment « cochon long ». Ce ne fut qu'après le festin que la source de la viande fut expliquée : des captifs de la tribu vaincue sacrifiés et dévorés pour acquérir la force de leurs ennemis..."
 seven_cities_events.105.a:0 "Toute rumeur de ceci doit être étouffée !"
 seven_cities_events.105.b:0 "Prions pour que le conquistador tienne sa langue."
 seven_cities_events.200.t:0 "El Dorado : un mythe"
 seven_cities_events.200.d:0 "Des années de lutte, car c'est ainsi que cela a dû être ressenti, n'ont presque rien donné ! Le conquistador a abandonné la quête d'El Dorado, affirmant que la cité d'or n'est que mythe et légende. Quelques provinces découvertes, quelques autochtones satisfaits de babioles et colifichets, mais point d'or, point de diamants, et certainement pas une cité aux rues pavées d'or."
 seven_cities_events.200.a:0 "Quel dommage."
 seven_cities_events.201.t:0 "El Dorado : cité sous les eaux"
 seven_cities_events.201.d:0 "Le lac Guatavita serait le lac où le Roi Doré se lave de la poudre d'or dont il est couvert lors d'un rituel s'étendant sur plusieurs jours. Plusieurs colifichets en or et couverts de pierres précieuses ont été trouvés dans l'eau, et notre conquistador a lancé un projet ambitieux : tenter de vider le lac en utilisant une « chaîne de seaux » de travailleurs. Bien qu'ils aient travaillé sans relâche pendant trois mois, le niveau de l'eau n'a baissé que de trois mètres, et seule une petite quantité d'or a été récupérée."
 seven_cities_events.201.a:0 "C'est mieux que rien."
 seven_cities_events.202.t:0 "La découverte d'El Dorado !"
 seven_cities_events.202.d:0 "Des maisons ornées d'or, des statues couvertes de pierres précieuses et un lac dont le fond est tapissé de poudre d'or, de gemmes et d'autres objets de valeur... El Dorado a été trouvé et sa richesse est immense ! Non seulement cela apportera une grande fortune à notre pays, mais aussi du prestige et l'admiration des autres nations."
 seven_cities_events.202.a:0 "Le conquistador sera récompensé !"
 seven_cities_events.203.t:0 "La fontaine de Jouvence : mort par les eaux"
 seven_cities_events.203.d:0 "Après de longs mois à traverser des provinces remplies de plantes vénéneuses, de serpents venimeux, de grenouilles et d'insectes, d'animaux dangereux de toutes sortes et de toutes tailles, la mare de $PROVINCENAME$ connue sous le nom de Fontaine de Jouvence fut enfin trouvée. Son eau est d'un brun boueux et elle est maudite d'une puanteur qui pourrait réveiller les morts. Un seul brave se porta volontaire pour boire de l'Eau de Vie et son corps fut enterré le lendemain, ravagé par la diarrhée et de violents vomissements."
 seven_cities_events.203.a:0 "Il a mal choisi..."
 seven_cities_events.204.t:0 "La fontaine de Jouvence : eau rafraîchissante"
 seven_cities_events.204.d:0 "Une petite cascade alimente la Fontaine de Jouvence en $PROVINCENAME$, dont l'eau d'un bleu vif et cristallin est presque aussi belle que son goût. Nos membres de l'expédition épuisés affirment que se baigner dans l'eau les a rafraîchis physiquement et mentalement, dissipant la majeure partie de leur fatigue et toute la crasse de leurs esprits et corps. Mais cela ne dura point longtemps ; quelques heures seulement après leur bain, la fatigue était de retour, et l'eau rapportée dans des gourdes ne faisait que les désaltérer."
 seven_cities_events.204.a:0 "C'était agréable tant que ça a duré, au moins."
 seven_cities_events.205.t:0 "La fontaine de Jouvence : véritable Eau de Vie"
 seven_cities_events.205.d:0 "Les rides s'estompèrent, la vue s'améliora, la goutte disparut et les esprits tourmentés trouvèrent enfin la paix. Une eau plus douce que le nectar, plus claire que n'importe quel diamant taillé, et plus jalousement gardée que les joyaux de la couronne de n'importe quel pays, mais maintenant elle est nôtre : la Fontaine de Jouvence ! Soyez prudent cependant, car l'abus de cette eau précieuse pourrait causer quelques... effets secondaires imprévus. Trop de bonnes choses et tout le reste."
 seven_cities_events.205.a:0 "Parfait ! Il suffit de rationner l'eau et nous sommes parés."
 seven_cities_events.206.t:0 "Cibola : les mensonges du moine"
 seven_cities_events.206.d:0 "La petite ville aux masures de torchis branlantes et aux rues sales, rien à voir avec les maisons en or et les rues pavées de pierres précieuses qu'on nous avait décrites, accueillit notre conquistador et l'expédition lorsqu'ils atteignirent enfin « Cibola » en $PROVINCENAME$. Le moine tenta de balbutier une explication, disant avoir vu la ville sous une lumière différente, peut-être un coucher de soleil qui l'aurait peinte en doré ? Mais rien de ce qu'il dit ne put apaiser la rage et la déception que tous ressentaient."
 seven_cities_events.206.a:0 "Il a menti ? Il nous a menti à NOUS ?!"
 seven_cities_events.207.t:0 "Cibola : pas tout à fait dorée"
 seven_cities_events.207.d:0 "Il y avait un peu d'or et quelques pierres précieuses, mais ils étaient farouchement gardés par les autochtones de $PROVINCENAME$. Le moine qui nous avait conduits à « Cibola » disparut peu après la découverte, et la plupart de l'or avec lui. Quelques colifichets et de la poudre d'or furent récupérés, bien insuffisants pour donner à Cibola la réputation d'une des Sept Cités d'Or."
 seven_cities_events.207.a:0 "Il doit y avoir un grain de vérité dans au moins un de ces mythes !"
 seven_cities_events.208.t:0 "Découverte dorée : Cibola"
 seven_cities_events.208.d:0 "La richesse se présente sous de nombreuses formes, certains prétendent que la richesse du cœur est à désirer, d'autres que la piété et le prestige devraient être les seules richesses dans la vie. L'or et les pierres précieuses sont les seules richesses que notre cœur désire, et la Cité Dorée de Cibola en $PROVINCENAME$ a fait croître férocement ce désir. Pour chaque once d'or, pour chaque poignée de gemmes, nous en voulons davantage et Cibola continue de donner. L'une des Sept Cités d'Or est nôtre, et nous comptons bien la garder."
 seven_cities_events.208.a:0 "Elle est à nous, notre précieuse..."
 seven_cities_events.209.t:0 "La Cité des Césars : faux or"
 seven_cities_events.209.d:0 "Tout ce qui brille n'est pas or, chose que notre conquistador apprit à ses dépens. L'expédition prétendait avoir trouvé la Cité des Césars en $PROVINCENAME$, une cité dorée située entre deux montagnes d'or et de diamants. Hélas, l'« or » n'était que pyrite et les « diamants » étaient du quartz."
 seven_cities_events.209.a:0 "J'aurais préféré quelque chose de plus... précieux."
 seven_cities_events.210.t:0 "La Cité des Césars : véritable argent"
 seven_cities_events.210.d:0 "Des montagnes d'or et de diamants, et en dessous l'une des Sept Cités d'Or... Les montagnes n'étaient que deux petites collines en $PROVINCENAME$. Elles contenaient quelques métaux précieux et des pierres, mais le métal n'avait pas la couleur du soleil mais celle de la lune : une poignée d'argent et de quartz fut tout ce que le conquistador put trouver."
 seven_cities_events.210.a:0 "C'est mieux que rien."
 seven_cities_events.211.t:0 "La Cité des Césars : montagnes de richesses"
 seven_cities_events.211.d:0 "Entre les deux grandes montagnes d'or et de diamants de $PROVINCENAME$ se trouve la Cité des Césars, une cité prospère remplie de tout ce qu'on pourrait souhaiter. Nourriture et boisson en abondance, consommées dans des plats d'or sertis de pierres précieuses. Nous l'avons trouvée et réclamée, et nous serons riches lorsque toute cette fortune aura été transportée chez nous."
 seven_cities_events.211.a:0 "Pensez à tout cet or et ce prestige que cela nous apportera !"
 seven_cities_events.212.t:0 "Sierra de la Plata et le faux roi"
 seven_cities_events.212.d:0 "Il y avait bien un Roi Blanc en $PROVINCENAME$, mais sa Montagne d'Argent était une supercherie. Sierra de la Plata n'est qu'un autre mythe auquel trop de sots ont cru, et nous devons admettre que nous en faisions partie."
 seven_cities_events.212.a:0 "C'était trop beau pour être vrai."
 seven_cities_events.213.t:0 "Sierra de la Plata : proche, mais sans argent"
 seven_cities_events.213.d:0 "Ce n'est pas une montagne d'argent, pas l'une des Sept Cités d'Or, mais Sierra de la Plata était une vraie légende découverte par nous, enfin ! Elle était située en $PROVINCENAME$ et une quantité adéquate d'argent nous est rapportée chaque mois."
 seven_cities_events.213.a:0 "Bien !"
 seven_cities_events.214.t:0 "Sierra de la Plata : montagne d'argent"
 seven_cities_events.214.d:0 "Sous une grande montagne remplie d'argent réside un Roi Blanc. Sierra de la Plata, les Montagnes d'Argent, est passée de légende à cité réelle en $PROVINCENAME$, et nous fûmes les premiers gens civilisés à la trouver ! Réjouissez-vous, car nous avons trouvé un lieu d'immense richesse et un peuple si crédule que nous n'aurons aucun mal à prendre ce que nous voulons, que dis-je, ce dont nous avons besoin !"
 seven_cities_events.214.a:0 "Magnifique !"
 seven_cities_events.215.t:0 "Nulle trace de Norumbega"
 seven_cities_events.215.d:0 "La ville de Norumbega doit être une supercherie inventée par le navigateur français qui prétendait l'avoir découverte. La seule rivière large de 40 lieues est dépourvue d'îles et il n'y a aucun signe d'une ville plus haut. Nous avons été assez naïfs pour croire quelque chose d'aussi absurde qu'une colonie viking et avons perdu du temps à essayer de la trouver."
 seven_cities_events.215.a:0 "Dommage..."
 seven_cities_events.216.t:0 "Norumbega décevante"
 seven_cities_events.216.d:0 "La ville se trouvait exactement là où le navigateur français l'avait indiqué, à l'embouchure d'une rivière large de 40 lieues. Il n'y avait aucune trace des habitants grands, beaux et habiles dont il avait parlé, mais les autochtones étaient très amicaux et avaient beaucoup de fourrures et de zibeline à échanger."
 seven_cities_events.216.a:0 "J'en attendais davantage."
 seven_cities_events.217.t:0 "Norumbega découverte"
 seven_cities_events.217.d:0 "Les habitants de Norumbega sont grands, habiles et beaux, avec une langue qui partage beaucoup de mots avec le latin. Nous avions espéré une petite ville avec un peu d'or et de fourrures, mais Norumbega dépassa de loin toutes nos attentes avec sa terre riche, sa mine d'or et son commerce de fourrures. C'est une ancienne colonie viking, nous en avons tant appris des habitants, et ils sont disposés à commercer avec nous. La mine d'or semble contenir un flux inépuisable d'or et, tant que nous fournissons notre propre main-d'œuvre, nous sommes autorisés à l'exploiter."
 seven_cities_events.217.a:0 "Voilà d'excellentes nouvelles !"
 seven_cities_events.218.t:0 "Simples mythes : Saguenay"
 seven_cities_events.218.d:0 "Des cartes dessinées avec grand soin, des points de repère découverts et des autochtones pour nous guider, malgré tout cela nous ne nous sommes pas rapprochés du Royaume de Saguenay. C'est une quête sans espoir, il n'y a rien de valeur dans le nord-ouest des Amériques. Que le conquistador rentre chez nous, ou envoyons l'expédition chercher quelque chose de plus tangible, quelque chose de plus qu'un mythe ou une légende raconté par des autochtones ignorants et sauvages."
 seven_cities_events.218.a:0 "Nous n'avons pas d'autre choix. Mettons fin à la recherche de Saguenay."
 seven_cities_events.219.t:0 "Supercherie des Indiens : Saguenay"
 seven_cities_events.219.d:0 "Alors que l'expédition approchait de sa destination, le légendaire Royaume de Saguenay, comparable à n'importe laquelle des Sept Cités d'Or, El Dorado inclus, l'anticipation grandissait à chaque pas. Des mines d'argent, de rubis et d'or, la simple pensée des trésors qui les attendaient faisait saliver la plupart de l'équipage. La première vision fut une palissade entourant la ville, et des sourires avides se plaquèrent sur chaque visage. Ceux-ci furent bientôt remplacés par des regards d'incrédulité et des cœurs se changeant en pierre dans leurs poitrines. Les habitants n'étaient pas blancs, n'étaient pas vêtus comme nous et n'étaient certainement pas riches. Ce n'était qu'une autre tribu d'autochtones, avec plus de richesses que la plupart, mais ce n'était pas une Cité d'Or."
 seven_cities_events.219.a:0 "Ils sont disposés à commercer, c'est déjà quelque chose."
 seven_cities_events.220.t:0 "La découverte du Royaume de Saguenay"
 seven_cities_events.220.d:0 "L'expédition fut accueillie avec grande hospitalité par les habitants blancs du Royaume de Saguenay. Ils racontèrent une saga selon laquelle ils avaient voyagé sur de grands bateaux il y a une centaine d'années environ vers le Vinland, comme ils appellent ce continent. Des mines d'or, d'argent et de rubis furent bientôt trouvées et les tribus alentour s'intéressèrent à leurs découvertes, ce qui conduisit les Saguenais à se forger une réputation de guerriers féroces et brutaux. Ils partagèrent à contrecœur leurs richesses avec nous après que nous eûmes montré notre supériorité avec nos armes à feu et nos épées."
 seven_cities_events.220.a:0 "C'est glorieux !"
 seven_cities_events.221.t:0 "Rien que des masures"
 seven_cities_events.221.d:0 "« Le Turc » remplit les oreilles du conquistador de récits sur la riche cité de Quivira, sur cette terre grasse bien arrosée par des sources et des rivières, l'or qui ornait les maisons et les gens gras et heureux. Ce que l'expédition trouva, cependant, n'était qu'un autre village d'agriculteurs vivant dans des maisons de torchis aux toits plats !"
 seven_cities_events.221.a:0 "Le Turc devrait être étranglé pour ses mensonges !"
 seven_cities_events.222.t:0 "Cité fructueuse"
 seven_cities_events.222.d:0 "Quivira est une ville bien établie, avec une terre très plate et noire. Ruisseaux, sources et rivières garantissent qu'elle soit bien arrosée. Prunes, noix, raisins doux et mûres s'y trouvaient en excès. Il y a d'abondants gisements de jade dans les grottes, mais point d'or du tout. La cité légendaire existe, et bien que riche, elle n'est pas telle qu'on nous l'avait décrite."
 seven_cities_events.222.a:0 "Au moins, nous l'avons trouvée."
 seven_cities_events.223.t:0 "La légendaire cité de Quivira"
 seven_cities_events.223.d:0 "Des coupes d'or pendent aux arbres dans la cité de Quivira et quiconque a soif peut en prendre une et la remplir d'eau douce provenant de l'une des nombreuses sources, rivières et ruisseaux qui maintiennent la région bien arrosée. Prunes, noix, mûres et raisins doux plus gros que tout ce qu'on a jamais vu doivent être la raison derrière ces gens de grande stature et de belle constitution qui habitent la cité. L'or et le jade en grands gisements dans les grottes assurent la richesse de la ville."
 seven_cities_events.223.a:0 "Nous l'avons trouvée ! Enfin !"
