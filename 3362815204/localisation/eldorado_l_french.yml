 # Random Events
 seven_cities_events.300.t:0 "La femme parmi nous"
 seven_cities_events.300.d:0 "Alors que nous réapprovisionnions en $PROVINCENAME$, une jeune femme enceinte et son mari, un trappeur bien connu, ont postulé aux postes d'interprète et de guide pour notre expédition. La femme parle plusieurs langues tandis que son mari est un bon chasseur avec une grande connaissance de ce continent."
 seven_cities_events.300.a:0 "Engageons-les."
 seven_cities_events.300.b:0 "Nous n'avons pas besoin d'eux."
 seven_cities_events.301.t:0 "Sauvé par une princesse"
 seven_cities_events.301.d:0 "Nous ne pouvons imaginer la terreur qu'a dû ressentir notre conquistador lorsqu'il posa sa tête sur une grande pierre tandis que des hommes se tenaient prêts avec des massues au-dessus de lui. Heureusement pour lui, la fille bien-aimée du chef s'élança et posa sa tête sur la sienne pour le sauver de la mort."
 seven_cities_events.301.a:0 "Nous devons veiller à ce que cela ne se reproduise pas."
 seven_cities_events.301.b:0 "Ce sont des barbares !"
 seven_cities_events.302.t:0 "Attaqué par les autochtones"
 seven_cities_events.302.d:0 "Nouvelles tragiques : notre conquistador est mort ! L'expédition remontait une rivière en pirogue lorsqu'elle rencontra des autochtones. La tribu belliqueuse exigea qu'ils accostent et certains des hommes s'exécutèrent. Ils furent désarmés et dévêtus, chose à laquelle notre conquistador s'opposa. Il refusa les ordres et mourut criblé de balles. Les membres de l'expédition virent son corps ramené sur la rive et mis en pièces. Un seul survécut, à qui on ordonna de partir et de courir. Les autochtones le poursuivirent et il courut pour sauver sa vie. Nu, épuisé et saignant, le survivant n'avait plus qu'un seul poursuivant après plusieurs milles. Il parvint à vaincre cet homme seul et trouva refuge en $PROVINCENAME$."
 seven_cities_events.302.a:0 "Quelle horreur !"
 seven_cities_events.303.t:0 "Perdu dans l'esprit et l'espace"
 seven_cities_events.303.d:0 "Nous aurions dû réaliser que notre conquistador n'avait aucun sens de l'orientation dès les deux premières fois où il s'égara. La première fois, il partit récupérer deux de nos chevaux de bât et se perdit pendant seize jours. Sans quelques raisins et lapins, il serait mort de faim. Il nous raconta plus tard qu'il pensait être derrière l'expédition et avait accéléré pour la rattraper, puis il eut faim et descendit la rivière pour chercher un groupe de commerçants. L'expédition envoya son meilleur chasseur pour le retrouver et ils furent finalement réunis avec lui. La deuxième fois, il explora l'un des trois bras d'une rivière et disparut pendant trois jours. Une fois encore, l'expédition envoya le chasseur chevronné pour le retrouver et il raconta avoir essayé de retracer les embranchements et suivi nos traces. Cela fit décider à l'équipage que le conquistador ne serait plus laissé seul pour découvrir d'autres parties de $PROVINCENAME$, mais cela n'aida toujours pas. Quelques minutes plus tard à peine, il avait encore disparu."
 seven_cities_events.303.a:0 "Renvoyons le chasseur."
 seven_cities_events.303.b:0 "Laissons-le. Il devra nous trouver cette fois."
 seven_cities_events.304.t:0 "Une vie de chien"
 seven_cities_events.304.d:0 "Un grand chien noir du nom de Seaman avait accompagné l'expédition depuis le début et avait vécu de nombreuses aventures. Un castor l'avait mordu si gravement que le médecin de l'expédition avait dû opérer sa patte arrière. Les moustiques tourmentaient l'expédition et le chien hurlait du supplice qu'ils enduraient. Des autochtones de $PROVINCENAME$ avaient volé Seaman mais il fut récupéré peu après. Notre conquistador s'est pris d'affection pour le chien et serait dévasté s'il lui arrivait quoi que ce soit."
 seven_cities_events.304.a:0 "Les tribus de $PROVINCENAME$ subiront notre courroux s'il arrive quoi que ce soit à ce chien !"
 seven_cities_events.304.b:0 "Ce n'est qu'un chien."
 seven_cities_events.305.t:0 "Plus vite, traînards !"
 seven_cities_events.305.d:0 "Les autochtones de $PROVINCENAME$ n'ont pas été exactement amicaux envers notre expédition. Ceux que nous avons rencontrés ont tenté de voler nos armes pendant la nuit et lors de la lutte, deux autochtones furent tués. Notre équipage parvint à fuir sur plus de 160 kilomètres en une journée avant d'oser camper à nouveau. Il y a des signes que les autochtones les poursuivent une fois de plus, et ils pourraient trouver la force de répéter cette marche marathon s'ils sont encouragés..."
 seven_cities_events.305.a:0 "Fuyez, imbéciles !"
 seven_cities_events.306.t:0 "Brandir le drapeau blanc"
 seven_cities_events.306.d:1 "Les tribus [Root.Owner.GetName] et [rival_tribe.GetName] sont rivales, chose que notre conquistador ne réalisa pas avant qu'il ne fût trop tard. Toutes deux exigèrent un tribut de l'expédition pour leur permettre le passage. En offrant des cadeaux à un chef autochtone en premier, notre conquistador insulta et irrita l'autre chef. Les cadeaux offerts ne satisfirent point les chefs et certains guerriers tentèrent de prendre les provisions de l'expédition. Le conquistador tint bon, et lui et son second brandirent leurs épées et menacèrent de violence. Les chefs reculèrent et de meilleurs cadeaux leur furent présentés à tous deux."
 seven_cities_events.306.a:0 "Essayons de leur faire enterrer la hache de guerre."
 seven_cities_events.306.b:0 "Bon travail !"
 seven_cities_events.307.t:0 "Gencives qui saignent et dents qui tombent"
 seven_cities_events.307.d:0 "Avec un régime composé principalement de viande salée et séchée et de grains déshydratés, le malaise et la léthargie auraient dû être les premiers symptômes reconnus comme le scorbut, mais ce ne fut pas avant que les gencives ne commencent à saigner et les dents à tomber que nous réalisâmes que nous devions faire quelque chose pour sauver les membres de notre expédition. Comme ils explorent des provinces dont la flore et la faune nous sont inconnues, il serait imprudent de manger quoi que ce soit car cela pourrait être vénéneux. Peut-être devrions-nous essayer d'établir le contact avec les autochtones de $PROVINCENAME$ et demander leur aide ?"
 seven_cities_events.307.a:0 "Négocions le remède !"
 seven_cities_events.307.b:0 "Non, essayons d'abord de manger quelques fruits."
 seven_cities_events.308.t:0 "Les Amazones"
 seven_cities_events.308.d:0 "En $PROVINCENAME$ se trouvent deux petites tribus avec un arrangement très particulier : les femmes vivent séparées, loin des hommes à qui elles ne permettent de leur rendre visite que quelques fois par an. Tout enfant mâle ainsi engendré est rendu au père et les filles sont gardées par les femmes. Si on les approche à tout autre moment que celui prévu, les femmes se défendront avec des arcs et des flèches. Les hommes de l'étrange tribu se préparent actuellement pour la prochaine visite, et ont invité les membres masculins de l'expédition à se joindre à eux."
 seven_cities_events.308.a:0 "Cela semble être une mauvaise idée."
 seven_cities_events.308.b:0 "C'est peut-être le seul moyen d'en apprendre davantage sur ces étranges coutumes."
 seven_cities_events.309.t:0 "Mutinerie en $PROVINCENAME$ !"
 seven_cities_events.309.d:0 "Plusieurs membres de l'équipage de l'expédition du conquistador furent captivés par la vie idyllique en $PROVINCENAME$ et décidèrent d'abandonner l'expédition. Cela fut déclaré acte de mutinerie par le conquistador et après une longue chasse, les mutins furent capturés. Devraient-ils nous être renvoyés et jugés ici, ou devraient-ils être pardonnés et autorisés à réintégrer l'expédition comme membres d'équipage après quelques coups de fouet ?"
 seven_cities_events.309.a:0 "Renvoyez-les."
 seven_cities_events.309.b:0 "Fouettez-les."
 seven_cities_events.310.t:0 "Hivernage chez les autochtones"
 seven_cities_events.310.d:0 "Dans la province de $PROVINCENAME$, notre conquistador rencontra des autochtones si amicaux et accueillants qu'il perdit la notion du temps passé parmi eux. Son expédition fut contrainte de passer l'hiver avec leurs amis et alliés indigènes, mais cela permit de tisser des liens."
 seven_cities_events.310.a:0 "Il a perdu du temps mais gagné des amis... bien."
 seven_cities_events.400.t:0 "Le survivant"
 seven_cities_events.400.d:0 "L'expédition comptait 600 hommes au départ, mais seulement quatre revinrent vivants. À leur première arrivée, l'équipage entendit parler d'une autre expédition où 450 des 600 hommes avaient péri. Craignant le même sort, beaucoup désertèrent. Un ouragan frappa l'expédition peu après, et plusieurs hommes périrent. Catastrophe après catastrophe s'abattit sur l'expédition : famine, maladie et attaques des autochtones. L'un des quatre qui rentrèrent était Estevanico, un esclave noir né en Afrique, qui reçut du conquistador les compétences nécessaires pour mener une expédition. Il est disponible à l'embauche, bien que nous souffrions d'une légère perte de prestige si nous le nommons notre nouveau conquistador."
 seven_cities_events.400.a:0 "Engageons Estevanico, nous avons besoin d'un nouveau conquistador."
 seven_cities_events.400.b:0 "Non, nous trouverons une personne plus convenable pour cela."
 seven_cities_events.401.t:0 "Ivrognes voleurs de whisky"
 seven_cities_events.401.d:0 "Trouvés chantant des chansons grivoises à tue-tête et buvant du whisky directement à la bouteille, les deux hommes étaient clairement coupables de leur crime. Voler du whisky et le boire pendant leur service : quelle conduite indigne ! Ils furent jugés en cour martiale et condamnés à la flagellation, puis libérés."
 seven_cities_events.401.a:0 "Ils ne méritaient point de flagellation !"
 seven_cities_events.401.b:0 "Cela leur a donné une bonne leçon !"
 seven_cities_events.401.c:0 "Espérons que cela ne les a pas trop détournés de leur objectif..."
 seven_cities_events.402.t:0 "La mine d'or des Peralta"
 seven_cities_events.402.d:0 "Le sanglant massacre en $PROVINCENAME$ laissa peu de membres de la famille Peralta en vie lorsque les autochtones attaquèrent leur expédition aurifère de routine. Les survivants ont imploré l'aide de notre conquistador et des soldats de notre expédition, promettant beaucoup d'or si leur famille est vengée."
 seven_cities_events.402.a:0 "Tout ce qu'il leur faut, tant que nous obtenons cet or !"
 seven_cities_events.402.b:0 "L'expédition a des affaires plus pressantes à régler."
 seven_cities_events.403.t:0 "Or et diamants"
 seven_cities_events.403.d:0 "Les membres restants de la famille Peralta nous conduisirent sur les lieux du massacre. Les corps avaient été laissés intacts, les chariots détruits... Notre expédition aida à enterrer les corps tandis que plusieurs éclaireurs fouillaient les environs à la recherche de signes des assaillants. Quelques indices menèrent vers la mine d'or des Peralta et, à mesure qu'ils s'approchaient, il devint clair que les assaillants s'étaient réfugiés dans les mines. L'un des Peralta confirma qu'il s'agissait du même groupe qui les avait attaqués. Après une violente bataille, l'ennemi gisait mort au sol devant la mine. La famille Peralta tint parole et nous récompensa avec une grande quantité d'or."
 seven_cities_events.403.a:0 "Juste paiement pour juste travail."
 seven_cities_events.404.t:0 "Quartz et pyrite"
 seven_cities_events.404.d:0 "Les corps des membres de la famille Peralta tombés au combat avaient été mutilés, ce qui rendit leur identification difficile. Les enterrer prit un temps précieux, et l'éclaireur envoyé fouiller les environs à la recherche des assaillants revint bredouille. Le fils aîné des Peralta, l'un des rares survivants, refusa d'abandonner. Il conduisit l'expédition vers la mine d'or des Peralta, au cas où les assaillants y auraient trouvé refuge. À l'approche de la mine, leurs craintes se confirmèrent. La mine n'existe plus ; les assaillants l'ont ensevelie sous les décombres et l'or est perdu. La famille Peralta fut vengée, car le grand groupe d'assaillants fut pris par surprise et facilement tué."
 seven_cities_events.404.a:0 "C'est... quelque chose, au moins."
 seven_cities_events.405.t:0 "C'est une femme !"
 seven_cities_events.405.d:0 "Nous n'aurions jamais découvert que Baret était une femme si les autochtones ne l'avaient pas crié à tue-tête lorsque l'expédition entra en $PROVINCENAME$. Elle nous avait rejoints comme assistante de notre naturaliste et, comme sa jambe ulcérée lui causait beaucoup d'inconfort, elle avait porté les provisions et les spécimens à sa place. Baret prétend être la gouvernante de notre naturaliste, mais leur relation semble plus profonde que cela. Devrions-nous lui permettre de rester avec nous dans l'expédition ?"
 seven_cities_events.405.a:0 "Oui, permettons-lui de rester."
 seven_cities_events.405.b:0 "Non, renvoyons-la !"
 seven_cities_events.406.t:0 "Rocher empoisonné"
 seven_cities_events.406.d:0 "Neuf chevaux moururent après avoir mangé des plantes vénéneuses, et l'expédition fut contrainte d'abandonner deux autres qui étaient mourants. Un lieu maudit où ne poussent que des plantes vénéneuses et où ne vivent que des animaux venimeux, et le conquistador regrette d'avoir jamais décidé d'y camper. Une grande formation rocheuse offrait un abri contre les vents violents qui les transperçaient, mais le Rocher Empoisonné, comme le conquistador le nomma, n'est pas un endroit pour homme ni bête."
 seven_cities_events.406.a:0 "Continuez à pied s'il le faut !"
 seven_cities_events.407.t:0 "Faux comme les diamants de $PROVINCENAME$"
 seven_cities_events.407.d:0 "Notre explorateur nous a envoyé des gemmes qu'il prétend avoir trouvées en $PROVINCENAME$. Blanches et scintillantes, il les croit être du diamant, mais nos savants érudits nous disent qu'il ne s'agit que de vulgaire quartz. Loin d'être une source de richesse, elles sont devenues une source de ridicule..."
 seven_cities_events.407.a:0 "Tout ce qui scintille n'est pas diamant."
 seven_cities_events.408.t:0 "Un déserteur refait surface !"
 seven_cities_events.408.d:0 "Des nouvelles de notre conquistador nous avertissaient qu'un de ses lieutenants de confiance avait déserté, désespéré par l'état de l'expédition. Notre conquistador pensait que nous avions vu ce déserteur pour la dernière fois, mais nos agents nous informent qu'il a refait surface et qu'il vend ses cartes aux marchands et explorateurs de notre rival..."
 seven_cities_events.408.a:0 "Arrêtez-le, discrètement."
 seven_cities_events.408.b:0 "Tuez-le et faites-en un exemple !"
 seven_cities_events.409.t:0 "Un récit des nouvelles terres"
 seven_cities_events.409.d:0 "Notre conquistador n'a peut-être pas renvoyé d'or, mais il a envoyé une carte magnifiquement détaillée de nos nouveaux domaines, et de toutes les terres non réclamées n'attendant que de braves colons pour réclamer leur destin..."
 seven_cities_events.409.a:0 "Voilà des nouvelles étonnamment bonnes, malgré l'absence d'or."
 seven_cities_events.410.t:0 "Tertres abandonnés"
 seven_cities_events.410.d:0 "De loin, nos conquistadors les prirent pour de simples collines se dressant au milieu de la plaine autrement vide de $PROVINCENAME$. Mais en nous approchant, un homme entreprenant de la compagnie remarqua leur régularité et fit bientôt observer à ses compagnons qu'il devait s'agir des vestiges des grandes pyramides d'un peuple ancien."
 seven_cities_events.410.a:0 "Il doit y avoir de l'or sous ces collines ! Déterrez-les, immédiatement !"
 seven_cities_events.410.b:0 "Laissons-les tranquilles, il n'y a que de la terre dessous."
 seven_cities_events.411.t:0 "Rien que de la terre"
 seven_cities_events.411.d:0 "Ce n'étaient que de simples collines ; cet « homme entreprenant » qui les prenait pour des vestiges de grandes pyramides d'un peuple ancien avait tort. De la terre fut tout ce que l'expédition trouva."
 seven_cities_events.411.a:0 "Quelle déception !"
 seven_cities_events.412.t:0 "Maigre quantité d'or"
 seven_cities_events.412.d:0 "Les collines étaient bien les vestiges des grandes pyramides d'un peuple ancien et l'expédition trouva un peu d'or dans toute cette terre. Bien que l'équipage de l'expédition ait estimé que c'était une perte de temps, et nous sommes d'accord."
 seven_cities_events.412.a:0 "Nous avons obtenu un peu d'or, c'est bien."
 seven_cities_events.413.t:0 "Hic Sunt Dracones"
 seven_cities_events.413.d:0 "La peinture sur le grand rocher qui domine la rivière est presque effacée, mais le monstre à six pattes qu'elle représente est encore visible. Nos guides autochtones nous racontent le conte fantaisiste d'un monstre semblable à un dragon tué par leurs ancêtres, mais certains d'entre eux insistent confusément pour dire que la peinture est un avertissement de ne pas aller plus loin. Ce qui est certain, c'est que tous nos guides autochtones insistent pour décharger leurs armes sur la figure peinte lorsque nous passons devant."
 seven_cities_events.413.a:0 "Économisons nos munitions."
 seven_cities_events.413.b:0 "Soutenons leur guerre contre la bête."
 seven_cities_events.414.t:0 "Un lac des plus mortels"
 seven_cities_events.414.d:0 "Les autochtones chuchotent et jettent des regards mauvais vers les eaux calmes. Ils disent qu'il y a là un esprit, sous la forme d'un grand serpent ou monstre. Ils prétendent que cet esprit tend des embuscades aux pirogues à la surface, les entraînant vers une tombe aquatique. Ce n'est peut-être pas l'œuvre de monstres, mais il serait peut-être sage de prendre le chemin le plus long ?"
 seven_cities_events.414.a:0 "Contournons-le."
 seven_cities_events.414.b:0 "Les monstres n'existent pas ; prenons le raccourci."
 seven_cities_events.500.t:1 "Le conquistador cannibale de [long_pig_country.GetName]"
 seven_cities_events.500.d:1 "Le conquistador de [long_pig_country.GetName] a admis que les membres de leur expédition ont mangé de la chair humaine ! Ils ont tenté de se défendre en prétendant n'avoir aucune idée du type de viande que leur tribu hôte leur avait offert, et que le nom qu'on leur avait donné se traduisait par « cochon long »."
 seven_cities_events.500.a:0 "Répugnant !"
 seven_cities_events.501.t:0 "Traditions respectées"
 seven_cities_events.501.d:0 "Le conquistador de $FROMCOUNTRY$ s'est montré très respectueux et a pris soin de participer à nos traditions de manière correcte."
 seven_cities_events.501.a:0 "C'est important."
 seven_cities_events.502.t:0 "Insulté par un conquistador"
 seven_cities_events.502.d:0 "Nous sommes outrés par le comportement du conquistador de $FROMCOUNTRY$ ! Il a réussi à insulter non seulement nous et nos traditions, mais aussi nos croyances !"
 seven_cities_events.502.a:0 "Il sera puni !"
 seven_cities_events.503.t:0 "Menacé par un conquistador"
 seven_cities_events.503.d:0 "Quelque chose a poussé le conquistador de $FROMCOUNTRY$ à éclater en accusations et menaces de violence ! C'est très troublant."
 seven_cities_events.503.a:0 "Qu'avions-nous fait pour mériter cela ?"
 seven_cities_events.504.t:0 "Conquistador amical"
 seven_cities_events.504.d:0 "$FROMCOUNTRY$ mérite des louanges pour son conquistador amical ; sa visite dans notre province n'a été que profitable."
 seven_cities_events.504.a:0 "Nous devrons les en complimenter."
 seven_cities_events.505.t:0 "Paix apportée par un conquistador"
 seven_cities_events.505.d:0 "L'inimitié entre nous et un pays voisin poussa un conquistador de passage de [conquistador_country.GetName] à tenter de négocier la paix entre nous, ce qui fonctionna !"
 seven_cities_events.505.a:0 "Nous sommes stupéfaits !"
 seven_cities_events.506.t:0 "Conquistador qui s'immisce"
 seven_cities_events.506.d:0 "Un conquistador de [conquistador_country.GetName] a tenté de nous forcer, nous et notre rival, à enterrer la hache de guerre ! L'inimitié entre nous et le pays voisin n'a jamais été aussi forte, tout cela grâce à cette personne qui se mêle de ce qui ne la regarde pas."
 seven_cities_events.506.a:0 "C'est... surprenant."
 kill_conquistador:0 "Le conquistador mourra."
 sce_sacagawea:0 "Sacagawea"
 desc_sce_sacagawea:0 "La femme Lemhi Shoshone Sacagawea était une interprète et guide qui accompagna l'expédition de Lewis et Clark."
 sce_lost_woods:0 "Perdu dans les bois"
 desc_sce_lost_woods:0 "C'est une province où il est facile de se perdre."
 sce_lost_woods_tooltip:0 "Perdu dans les bois"
 desc_sce_lost_woods_tooltip:0 "C'est une province où il est facile de se perdre."
 sce_shortcut:0 "Raccourci"
 desc_sce_shortcut:0 "En utilisant la peur comme grande motivation, vos troupes et votre conquistador traverseront cette province à toute allure."
 sce_shortcut_tooltip:0 "Raccourci"
 desc_sce_shortcut_tooltip:0 "En utilisant la peur comme grande motivation, vos troupes et votre conquistador traverseront cette province à toute allure."
 respected_tribe:0 "Tribu respectée"
 insulted_tribe:0 "Tribu insultée"
 sce_interfering_intruder:0 "Intrus qui s'immisce"
 sce_reluctant_peace:0 "Paix réticente"
 sce_jeanne_baret:0 "Jeanne Baret"
 desc_sce_jeanne_baret:0 "Jeanne Baret était la gouvernante du naturaliste Philibert Commerçon jusqu'à ce qu'il soit invité à rejoindre l'expédition de Louis-Antoine de Bougainville. Elle se déguisa en homme et accompagna Commerçon comme assistante lors de l'expédition."
 sce_cart_peddler_stopped:0 "Colporteur de cartes arrêté"
 desc_sce_cart_peddler_stopped:0 "Un déserteur de notre expédition a été... persuadé de cesser de vendre des cartes et des plans aux marchands et conquistadors."
 sce_cart_peddler_killed:0 "Déserteur tué"
 desc_sce_cart_peddler_killed:0 "Nos espions ont réglé le cas du déserteur de notre expédition, faisant de sa mort un exemple. Personne ne déserte puis ne tente de colporter des cartes à nos marchands et conquistadors rivaux !"
 sce_new_domains:0 "Nouveaux domaines"
 desc_sce_new_domains:0 "Une carte magnifiquement détaillée de nos nouveaux domaines a inspiré notre peuple. Ils sont impatients de s'y rendre et de réclamer ces nouvelles terres."
 sce_mounds:0 "Tertres abandonnés"
 desc_sce_mounds:0 "Sous la terre recouvrant des collines étonnamment régulières pourraient se trouver les vestiges de grandes pyramides, remplies d'or et de pierres précieuses. Cela vaut la peine d'être étudié."
 sce_monster_lake:0 "Le monstre du lac"
 desc_sce_monster_lake:0 "Une superstition locale concernant un monstre attaquant les pirogues tentant de traverser le lac a ralenti l'expédition."
 nahuatl_reforms:0 "Réformes nahuatl"
 nahuatl_reform_1:0 "Assouplir les restrictions somptuaires"
 nahuatl_reform_1_desc:0 "Notre société a traditionnellement réservé l'usage des vêtements fins, des bijoux ou même le nombre d'étages d'une maison à la noblesse héréditaire. En ouvrant ces privilèges à quiconque se distingue sur le champ de bataille, nous pouvons créer un État où chaque membre de notre société est prêt à faire sa part en temps de guerre."
 nahuatl_reform_2:0 "Étendre les obligations des Pochteca"
 nahuatl_reform_2_desc:0 "Les guildes commerciales Pochteca ont souvent agi comme nos émissaires, diplomates et espions dans nos relations avec d'autres cités-États. Formalisons cette relation en un ensemble d'obligations strictes pour gérer plus efficacement nos affaires étrangères."
 nahuatl_reform_3:0 "Rangs de guerriers"
 nahuatl_reform_3_desc:0 "En créant un système de rangs dépendant du nombre de captifs qu'un guerrier a pris au cours de sa carrière, nous pouvons encourager chaque guerrier de nos armées à constamment améliorer ses compétences."
 nahuatl_reform_4:0 "Expansion tribale"
 nahuatl_reform_4_desc:0 "Les terres au nord de nous sont dominées par de nombreuses tribus désorganisées et isolées. En envoyant des groupes de colons et de soldats dans ces régions, nous pouvons étendre notre État même dans ces contrées désolées."
 nahuatl_reform_5:0 "Réforme juridique"
 nahuatl_reform_5_desc:0 "Jusqu'à présent, les cités-États sous notre contrôle avaient chacune leurs systèmes juridiques respectifs contrôlés par leurs propres juges. Créons un ensemble de lois centrales qui doivent s'appliquer dans tout notre empire et commençons à former les juges de manière centralisée."
 inti_reforms:0 "Réformes inti"
 inti_reform_1:0 "Recrutement organisé"
 inti_reform_1_desc:0 "Bien que nos peuples assujettis aient toujours fourni des troupes à nos armées, ils l'ont fait à des degrés divers et de manière ponctuelle. En formalisant l'obligation pour chaque territoire subjugué de fournir des soldats à l'État central, nous pourrons exploiter les ressources en main-d'œuvre de nos terres de manière beaucoup plus efficace."
 inti_reform_2:0 "Politique des Mitma élargie"
 inti_reform_2_desc:0 "La politique consistant à déplacer des villages entiers de régions loyales vers des terres nouvellement conquises ou vers la frontière a aidé à étendre l'empire. Ce type de réinstallation forcée pourrait également être utilisé pour réinstaller la population des régions nouvellement conquises dans les parties centrales de l'empire. Des lois strictes devraient être mises en place pour interdire aux gens de retourner dans leurs foyers d'origine."
 inti_reform_3:0 "Réformer le culte d'Inti"
 inti_reform_3_desc:0 "Bien qu'Inti, le soleil, soit le premier de tous les dieux, la plupart des peuples des Andes adorent également une variété de Huacas mineures. Nous devons exiger que tous les coins de notre empire reconnaissent Inti comme leur dieu principal et que toutes les idoles Huaca soient remises à notre souverain en tant que représentant premier d'Inti."
 inti_reform_4:0 "Seigneurs Yana"
 inti_reform_4_desc:0 "En nous détournant des détenteurs héréditaires ou locaux du pouvoir comme commandants de nos armées, nous pouvons promouvoir une nouvelle classe de chefs nommés directement par l'État. Sélectionnés pour leur mérite personnel et leur loyauté, cela garantira que nos armées seront toujours menées par les plus fervents partisans de notre État."
 inti_reform_5:0 "Réformer la Bureaucratie"
 inti_reform_5_desc:0 "Afin de faciliter l'expansion rapide de notre empire, il est nécessaire de créer une nouvelle classe d'administrateurs pour superviser tout, de la construction de ponts, de routes et de tambos dans les zones nouvellement acquises à l'inspection constante des régions déjà sous notre contrôle."
 mesoamerican_reforms:0 "Réformes Mayas"
 mesoamerican_reform_1:0 "Une Armée Unifiée"
 mesoamerican_reform_1_desc:0 "Notre empire est composé d'un certain nombre de Cahs, d'Altepetls et d'autres cités-États mineures qui reconnaissent toutes notre autorité centrale. Bien que nous puissions commander les forces de toutes ces cités, elles agissent en même temps indépendamment les unes des autres et sont financées par leurs cités d'origine respectives. Une structure militaire unifiée garantirait que moins de ressources soient gaspillées."
 mesoamerican_reform_2:0 "Arbitrage Central"
 mesoamerican_reform_2_desc:0 "Bien qu'elles soient unifiées sous notre autorité, les cités-États de notre empire entrent fréquemment en conflit les unes avec les autres pour tout, des droits commerciaux à la démarcation des frontières. En créant une autorité centrale d'arbitrage, nous pouvons grandement réduire ces tensions."
 mesoamerican_reform_3:0 "Arsenaux Centraux"
 mesoamerican_reform_3_desc:0 "En temps de guerre, il était de coutume pour les cités-États de Mésoamérique d'armer les roturiers afin de lever des armées suffisamment grandes pour défier leurs voisins. Comme chaque État possède ses propres arsenaux, le type et la qualité des armes peuvent varier considérablement au sein de l'empire. En créant un système central d'arsenaux à partir duquel toutes les armées sont équipées, nous pouvons drastiquement améliorer la qualité de nos forces armées."
 mesoamerican_reform_4:0 "Expansion Tribale"
 mesoamerican_reform_4_desc:0 "Des tribus désorganisées contrôlent les jungles et les hauts plateaux aux confins de la Mésoamérique. Bâtissons de nouvelles colonies dans ces zones et absorbons ces peuples dans notre empire."
 mesoamerican_reform_5:0 "Réformer la Bureaucratie"
 mesoamerican_reform_5_desc:0 "Pour que notre empire croisse à une vitesse acceptable, nous devons créer une nouvelle classe d'administrateurs spécialisés ayant l'autorité de prendre rapidement des décisions exécutives dans les zones nouvellement conquises."
 religious_reforms.1.t:0 "Réforme Adoptée"
 religious_reforms.1.d:0 "Réformer notre société a son prix. Alors que les régions centrales de notre État restent loyales à notre autorité, beaucoup d'autres Altepetls ont trouvé ces changements trop difficiles à accepter et ont saisi cette occasion pour rompre leurs liens avec nous."
 religious_reforms.1.a:0 "Ils le regretteront."
 religious_reforms.2.t:0 "Réforme Adoptée"
 religious_reforms.2.d:0 "La mise en œuvre réussie de nos récentes réformes a provoqué une certaine détresse, tant parmi les nobles que parmi les adorateurs de Huaca dans les campagnes, qui se sentent abandonnés. Ils estiment que nous abandonnons les anciennes coutumes de nos ancêtres et des leurs, et craignent que ce développement ne diminue leur pouvoir et leur influence.\nCes dissidents se sont maintenant alliés à l'une des influentes lignées Panaca pour placer un candidat de leur choix sur le trône."
 religious_reforms.2.a:0 "Ils le regretteront."
 religious_reforms.3.t:0 "Réforme Adoptée"
 religious_reforms.3.d:0 "Réformer notre société renforcera grandement notre État, mais a créé des tensions parmi les cités-États sous notre contrôle. En conséquence, toutes les régions, sauf les plus loyales, ont rompu leurs liens avec le gouvernement central."
 religious_reforms.3.a:0 "Ils le regretteront."
 maya_religion_events.1.t:0 "Nourrir les dieux"
 maya_religion_events.1.d:0 "Notre pays a atteint une ère de troubles, et les dieux exigent du sang. Hâtez-vous vers vos cités et pratiquez la saignée rituelle pour nourrir et apaiser Tohil, dieu de la guerre, du sacrifice et de la subsistance. Si vous ne les nourrissez pas, vous ne pourrez pas ramener votre royaume désintégré du bord de la destruction."
 maya_religion_events.1.a:0 "Je guiderai nos nobles dans cette pratique, et puisse mon sang plaire à Tohil."
 maya_religion_events.1.b:0 "Les dieux n'obtiendront pas de sang de moi !"
 maya_religion_events.2.t:0 "Sacrifice de Sang"
 maya_religion_events.2.d:0 "L'énergie humaine est envoyée vers le ciel et nous recevons le pouvoir divin en retour lorsque nous faisons un sacrifice de sang. Le roi utilise un couteau d'obsidienne ou une épine de raie pour entailler son membre viril, laissant le sang tomber sur du papier placé dans des bols. La reine tire une corde garnie d'épines à travers sa langue. Le papier taché de sang est brûlé et la fumée qui s'élève communique avec le Monde Céleste."
 maya_religion_events.2.a:0 "J'accomplis cela avec joie."
 maya_religion_events.2.b:0 "Jamais je ne ferai cela."
 maya_religion_events.3.t:0 "Sacrifice Humain"
 maya_religion_events.3.d:0 "Les esclaves et les prisonniers sont un sacrifice courant aux dieux mayas, mais même des animaux tels que les dindons, les chiens, les écureuils, les cailles et les iguanes ont été considérés comme des offrandes appropriées. Les dieux réclament toujours plus de sang, et nos voisins affirment que les orphelins et les enfants illégitimes apaisent les dieux plus rapidement que tout autre sacrifice."
 maya_religion_events.3.a:0 "Essayer de sacrifier des animaux."
 maya_religion_events.3.b:0 "Sacrifier des enfants, tant qu'ils sont orphelins."
 maya_religion_events.4.t:0 "Cycle de Création et de Destruction"
 maya_religion_events.4.d:0 "Nos récits et nos mythes parlent de cycles répétés de création et de destruction qui rappellent les conséquences qui surviendront si les humains négligent un jour leurs obligations envers les dieux. Nous avons une responsabilité envers les dieux qui rendent notre existence continue possible. Les dieux et autres forces de création et de chaos combattent chaque période de 52 ans, ce qui peut entraîner la destruction des mondes. Si nous ignorons notre devoir envers les dieux, la bataille entre eux qui détermine le destin de toutes les créatures terrestres pourrait ne pas se terminer en notre faveur."
 maya_religion_events.4.a:0 "...et nous, le peuple, ne pouvons que nous terrer de peur..."
 maya_religion_events.5.t:0 "Purification"
 maya_religion_events.5.d:0 "« Un rituel doit toujours commencer par une purification », dit le prêtre à votre héritier. « Vous devenez pur en jeûnant, en vous baignant et en vous confessant, mais vous devez également vous assurer de respecter les dieux. Lorsque vous entrez dans la forêt habitée par un dieu, souvenez-vous de boire de l'eau d'une cavité rocheuse dès que possible après être entré dans la forêt. L'eau doit être crachée sur le sol, et alors vous êtes libre de continuer dans la forêt sacrée. »"
 maya_religion_events.5.a:0 "Souviens-toi de cela, et tu deviendras un grand administrateur."
 maya_religion_events.5.b:0 "Souviens-toi de cela, et tu deviendras un grand diplomate."
 maya_religion_events.5.c:0 "Souviens-toi de cela, et tu deviendras un grand chef militaire."
 maya_religion_events.6.t:0 "Pèlerinages"
 maya_religion_events.6.d:0 "Les treize montagnes sacrées Q'eqchi', le grand cénote de Chichén Itzá et les sanctuaires locaux dédiés à divers dieux et déesses attirent de nombreux pèlerins, qui ont besoin d'abri, de nourriture et d'autres provisions nécessaires. Leur permettre de visiter nos sanctuaires locaux nous apporterait prestige et peut-être quelques autres revenus..."
 maya_religion_events.6.a:0 "Encourager les pèlerins."
 maya_religion_events.6.b:0 "Ne rien faire."
 maya_religion_events.7.t:0 "Aluxob"
 maya_religion_events.7.d:0 "Un fermier a réussi à libérer un alux, négligeant de le sceller à l'intérieur de sa maison après que sept ans se soient écoulés depuis sa construction. Cela a conduit les gens à se plaindre d'objets disparus, d'animaux perdus et de blessures mineures causées par l'alux."
 maya_religion_events.7.a:0 "Sacrifier du sang pour apaiser l'alux et le sceller dans la maison."
 maya_religion_events.7.b:0 "Ne me dérangez pas avec de telles futilités !"
 maya_religion_events.8.t:0 "Chance ou Chaos ?"
 maya_religion_events.8.d:0 "Un homme étrange vous demande des offrandes alors que vous voyagiez à travers votre royaume. Vous soupçonnez vaguement que cela pourrait être un alux, qui sèmera le chaos et répandra la maladie si sa demande est refusée. S'il obtient ce qu'il veut, l'alux protégera contre les voleurs et apportera la chance."
 maya_religion_events.8.a:0 "Lui donner moins qu'il ne veut et le renvoyer."
 maya_religion_events.8.b:0 "Lui donner ce qu'il demande."
 maya_religion_events.8.c:0 "Lui refuser l'or."
 maya_religion_events.9.t:0 "Les Jumeaux Héros"
 maya_religion_events.9.d:0 "Un rêve à propos des Jumeaux Héros, qui furent conçus lorsque leur mère parla à une tête tranchée qui cracha sur sa main. Cette tête tranchée était leur père, qui avec son frère fut convoqué à Xibalba après que leur jeu de balle eut perturbé la paix des Seigneurs du Monde Souterrain. Les jumeaux eurent de nombreuses aventures avant d'être eux-mêmes convoqués à Xibalba, car leur jeu de balle perturba à nouveau les seigneurs. Le rêve parlait des nombreuses épreuves que les jumeaux affrontèrent avant d'atteindre les Seigneurs du Monde Souterrain, et de la façon dont ils parvinrent à vaincre les seigneurs. Le rêve se termina lorsque les jumeaux se transformèrent en soleil et en lune, ce qui est un signe qu'une nouvelle ère commence."
 maya_religion_events.9.a:0 "Devons-nous la craindre, ou l'accueillir à bras ouverts ?"
 maya_religion_events.10.t:0 "Braises Ardentes et Mal Glacial"
 maya_religion_events.10.d:0 "Il est de coutume que les hommes marchent sur un lit de braises incandescentes représentant les feux du Monde Souterrain pour repousser le mal durant l'année, mais l'odeur de pieds grésillants n'est pas attrayante."
 maya_religion_events.10.a:0 "Que mon héritier le fasse."
 maya_religion_events.10.b:0 "Bien sûr que je le ferai !"
 maya_religion_events.11.t:0 "Wayob"
 maya_religion_events.11.d:0 "Laisser votre sang couler dans le bol puis brûler le papier taché de votre sang vous apporte une vision. Le Serpent de Vision vous montre un wayob, dispensateur de maladie et de fièvre, avec une jarre de ténèbres dans ses mains crachant des serpents et des insectes."
 maya_religion_events.11.a:0 "C'est un présage !"
 maya_religion_events.12.t:0 "Traditions Sacrificielles"
 maya_religion_events.12.d:0 "Il est temps de décider comment nous devons sacrifier les offrandes humaines, et il existe plusieurs façons différentes de procéder. La décapitation, l'extraction du cœur, le sacrifice par les flèches, l'éviscération ou jeter l'offrande dans un cénote. Que devons-nous choisir ? La décapitation de l'offrande est effectuée lors d'une reconstitution rituelle de la décapitation du dieu maya du maïs par les dieux mayas de la mort, tandis que l'extraction du cœur est inspirée des Aztèques. Le cœur est arraché alors qu'il bat encore, le sang est enduit sur l'image de la divinité du temple et le corps est écorché. Le sacrifice par les flèches commence avec l'offrande peinte en bleu avec un symbole blanc sur la poitrine, puis attachée à un poteau durant une danse rituelle tout en portant un chapeau pointu. Du sang est prélevé et enduit sur l'image de la divinité, et les danseurs tirent ensuite à tour de rôle des flèches sur l'offrande jusqu'à ce que toute sa poitrine soit remplie de flèches. L'éviscération est une mort plus lente mais moins élaborée : un sacrifice est attaché à un poteau avec les mains liées derrière la tête, puis éviscéré. Les offrandes peuvent également être jetées dans notre Cénote Sacré."
 maya_religion_events.12.a:0 "Décapitez-les !"
 maya_religion_events.12.b:0 "Arrachez leur cœur."
 maya_religion_events.12.c:0 "Sacrifice par les flèches !"
 maya_religion_events.12.e:0 "Éviscérez-les !"
 maya_religion_events.12.f:0 "Jetez-les dans un cénote !"
 maya_religion_events.13.t:0 "Ixtab"
 maya_religion_events.13.d:0 "Notre pays souffre et nos prêtres ont commencé à suggérer qu'honorer Ixtab serait une bonne idée. La Femme à la Corde, comme on l'appelle aussi, est la déesse du suicide et accompagnera ceux qui meurent par pendaison au paradis. C'est une mort honorable, et ceux qui la choisissent rejoindront les personnes mortes en tant que soldats ou victimes sacrificielles, les femmes mortes en couches et les membres du clergé. Ceux-ci jouissent d'une existence délectable et sont récompensés par de délicieux mets et boissons. Ne serait-ce pas préférable au chaos que votre pays connaît actuellement, de reposer plutôt à l'ombre d'un arbre agréable, libre de tout besoin ?"
 maya_religion_events.13.a:0 "Sacrifier [Root.Heir.GetName]"
 maya_religion_events.13.b:0 "Vous sacrifier vous-même."
 maya_religion_events.13.c:0 "Trouver une autre solution."
 maya_religion_events.14.t:0 "Pénurie de Plumes de Quetzal"
 maya_religion_events.14.d:0 "Les plumes de quetzal manquent et la divinité du feu Tohil, le dieu du soleil et le dieu de la pluie, ne peut pas être correctement célébrée sans que des plumes de quetzal lui soient sacrifiées. Il est notre dieu de la guerre, du sacrifice et de la subsistance, et nous ne souhaitons pas sa colère sur nous. Des marchands nous ont dit qu'il y a des plumes de quetzal en abondance dans un pays voisin, et nous devrions envoyer quelqu'un pour acheter ces plumes chez eux."
 maya_religion_events.14.a:0 "Oui, envoyez un marchand chez eux."
 maya_religion_events.14.b:0 "Non, envoyez nos chasseurs à la place."
 maya_religion_events.15.t:0 "Commerce de Plumes de Quetzal"
 maya_religion_events.15.d:0 "$FROMCOUNTRY$ a désespérément besoin de plumes de quetzal qui sont offertes à Tohil, dieu de la guerre, du sacrifice et de la subsistance, une divinité du feu, dieu du soleil et dieu de la pluie. Ils souhaitent nous acheter des plumes."
 maya_religion_events.15.a:0 "Commercer avec eux."
 maya_religion_events.15.b:0 "Refuser."
 maya_religion_events.16.t:0 "Offre de Commerce Acceptée"
 maya_religion_events.16.d:0 "$FROMCOUNTRY$ a accepté de commercer avec nous, nous avons maintenant les plumes de quetzal dont nous avons besoin pour plaire à Tohil !"
 maya_religion_events.16.a:0 "Bien, ils sont de véritables amis."
 maya_religion_events.17.t:0 "Offre de Commerce Refusée"
 maya_religion_events.17.d:0 "$FROMCOUNTRY$ a refusé de commercer avec nous, nous ne pourrons pas leur acheter de plumes de quetzal."
 maya_religion_events.17.a:0 "Dommage."
 maya_religion_events.18.t:0 "Ek Chuaj"
 maya_religion_events.18.d:0 "Une magnifique statue d'Ek Chuaj, dieu des marchands et du cacao, vous a été offerte. On dit qu'elle augmente la productivité et la quantité de fèves de cacao récoltées chaque année."
 maya_religion_events.18.a:0 "La placer dans une province."
 maya_religion_events.18.b:0 "La vendre."
 maya_blodletting:0 "Saignée Rituelle"
 desc_maya_blodletting:0 "Le sacrifice de sang est censé nourrir et apaiser les dieux, et l'élite maya est obsédée par le sang. La saignée rituelle était une partie majeure de tout événement calendaire important."
 maya_chaos_creation:0 "Cycle de Création et de Chaos"
 desc_maya_chaos_creation:0 "Les dieux et autres forces de création et de chaos se livrent bataille dans le monde des mortels, déterminant le destin de toutes les créatures terrestres."
 maya_pilgrimages:0 "Pèlerinages"
 desc_maya_pilgrimages:0 "Les personnes voyageant vers des lieux sacrés tels que les treize montagnes sacrées Q'eqchi' ou le grand cénote de Chichén Itzá ont trouvé un nouveau lieu à visiter durant leurs pèlerinages dans nos provinces."
 maya_embers:0 "Marcher sur les Braises"
 desc_maya_embers:0 "Une autre année a été protégée du mal par des hommes marchant sur un lit de braises incandescentes représentant les feux du Monde Souterrain."
 maya_trade_quetzal_feathers:0 "Commerce de Plumes de Quetzal"
 maya_notrade_quetzal_feathers:0 "Pas de Commerce de Plumes de Quetzal"
 maya_ek_chuaj:0 "Ek Chuaj"
 desc_maya_ek_chuaj:0 "Le dieu des marchands et du cacao, Ek Chuaj, porte une lance, une queue de scorpion et un balluchon de marchand rempli de marchandises."
 custom_idea_global_tax_modifier:0 "Administration Fiscale Efficace"
 custom_idea_global_tax_modifier_desc:0 "Nous avons trouvé un moyen plus efficace d'administrer nos impôts, ce qui facilite grandement la collecte d'or auprès des riches comme des pauvres."
 custom_idea_production_efficiency:0 "Encourager la Production"
 custom_idea_production_efficiency_desc:0 "La carotte et le bâton fonctionnent sur l'âne têtu, mais notre idée pour encourager la production va plus loin. Nous avons réussi à augmenter considérablement notre efficacité de production grâce à quelque chose de plus ingénieux. Bien que vous ne devriez jamais sous-estimer la carotte, ni le bâton."
 custom_idea_global_unrest:0 "Libertés Garanties"
 custom_idea_global_unrest_desc:0 "Certaines libertés sont garanties et nos sujets habituellement agités trouvent désormais plus difficile de protester contre notre autorité."
 custom_idea_stability_cost_modifier:0 "Continuité"
 custom_idea_stability_cost_modifier_desc:0 "Les gens prétendent vouloir de l'aventure et de la passion dans leur vie, mais quand il faut agir, c'est la stabilité que tout le monde désire secrètement. Un peu de continuité permet aux gens de dormir tranquilles dans leurs lits, certains de ce que l'avenir leur réserve."
 custom_idea_missionaries:0 "Écoles de Missionnaires d'État"
 custom_idea_missionaries_desc:0 "Les écoles de missionnaires forment des personnes à partir répandre la vraie foi sans faillir. L'École de Missionnaires d'État n'est pas différente, si ce n'est que c'est l'État lui-même qui éduque ceux qu'il souhaite envoyer en cette sainte quête."
 custom_idea_inflation_reduction:0 "Monnaie Standardisée"
 custom_idea_inflation_reduction_desc:0 "Une monnaie avec un poids standardisé et produite dans un atelier spécial pour garantir qu'elles se ressemblent et pèsent toutes le même fait des merveilles pour le commerce. Les marchands ne se sentent plus floués, du moins pas parce que les pièces qu'ils échangent contiennent plus ou moins d'or ou d'argent, et tout le pays partage la même monnaie standardisée."
 custom_idea_inflation_action_cost:0 "Réglementations Financières"
 custom_idea_inflation_action_cost_desc:0 "Imposer certaines exigences et directives aux prêteurs et aux banquiers les maintient honnêtes et conduit à la prospérité et à la croissance financière."
 custom_idea_interest:0 "Développer les Marchés Financiers"
 custom_idea_interest_desc:0 "Permettre aux gens d'acheter des choses à crédit a fait prospérer le commerce, notre peuple et nos marchands s'enrichissent chaque jour."
 custom_idea_build_cost:0 "Constructeurs Compétitifs"
 custom_idea_build_cost_desc:0 "En permettant aux constructeurs de soumissionner pour des contrats de construction plutôt que de simplement embaucher à répétition les mêmes ouvriers, la concurrence entre les constructeurs et leur empressement à être embauchés diminue le coût global de construction des structures."
 custom_idea_build_power_cost:0 "Architectes d'État"
 custom_idea_build_power_cost_desc:0 "Les architectes d'État examinent chaque contrat de construction, chaque plan et chaque projet de bâtiment avant qu'il ne soit accepté et que les constructeurs puissent commencer à travailler. Cela soulage la classe dirigeante de cette tâche et réduit le coût en Pouvoir du Monarque de chaque bâtiment."
 custom_idea_global_missionary_strength:0 "Missionnaires Zélés"
 custom_idea_global_missionary_strength_desc:0 "Nos missionnaires prêchent avec une ferveur jamais vue auparavant, et personne ne peut échapper à leurs sermons délivrés avec le feu d'un vrai croyant."
 custom_idea_prestige:0 "Patronner les Artistes Locaux"
 custom_idea_prestige_desc:0 "Le soutien, l'encouragement, les privilèges et l'aide financière que nous accordons aux artistes locaux nous marquent comme une nation progressiste et cultivée."
 custom_idea_prestige_decay:0 "Prestige Durable"
 custom_idea_prestige_decay_desc:0 "Mensonge : Empêcher notre prestige de diminuer n'a jamais été aussi facile !"
 custom_idea_legitimacy:0 "Règne Légitime"
 custom_idea_legitimacy_desc:0 "Certainement, personne n'a jamais douté que nous serions le souverain légitime de notre pays, mais si quelqu'un l'a fait, cela fera taire ses doutes."
 custom_idea_devotion:0 "Traditions Religieuses"
 custom_idea_devotion_desc:0 "Notre État a une longue et fière tradition de service à Dieu, renforçant la dévotion de nos dirigeants et garantissant que nous agissons justement et correctement selon la volonté du royaume spirituel."
 custom_idea_horde_unity:0 "Unir les Clans"
 custom_idea_horde_unity_desc:0 "Notre État est bâti sur les fières traditions de multiples clans qui se sont réunis pour créer une grande horde. En tant que tels, nous sommes capables de rester unis même dans les temps les plus durs, à un degré plus élevé que certaines autres hordes."
 custom_idea_republican_tradition:0 "Éthique Républicaine"
 custom_idea_republican_tradition_desc:0 "La tradition républicaine coule dans les veines mêmes de chaque citoyen de notre nation, ils se réjouissent de leur liberté et de leur indépendance."
 custom_idea_technology_cost:0 "Héritage Scientifique"
 custom_idea_technology_cost_desc:0 "Notre terre a une longue tradition d'enquête scientifique. En veillant à ce que notre héritage en science soit exploré, encouragé et exposé, nous verrons notre avenir technologique assuré et à portée de main."
 custom_idea_idea_cost:0 "Philosophes de Cour"
 custom_idea_idea_cost_desc:0 "En patronnant des philosophes libres-penseurs à notre cour, nous pouvons nous assurer que notre nation est prête à s'adapter à tout ce que l'avenir peut lui réserver."
 custom_idea_advisor_cost:0 "Tradition de Service"
 custom_idea_advisor_cost_desc:0 "Les enfants de nos conseillers suivront les pas de leurs parents, nous assurant que nous ne manquerons jamais de conseillers de quelque sorte que ce soit."
 custom_idea_advisor_pool:0 "Grande Cour"
 custom_idea_advisor_pool_desc:0 "Plus la cour est grande, plus les conseillers sont demandés. Notre Grande Cour est peut-être la plus grande de toutes, et cela se reflète par le nombre de conseillers cherchant une place à notre cour."
 custom_idea_tolerance_own:0 "L'État Pieux"
 custom_idea_tolerance_own_desc:0 "L'État et l'Église ne font qu'un, les règles et enseignements religieux seront imposés à tous les citoyens."
 custom_idea_tolerance_heretic:0 "Tolérer les Hérétiques"
 custom_idea_tolerance_heretic_desc:0 "Les prêtres et autres personnes pieuses peuvent protester, mais ceux qui ne partagent pas notre foi, la vraie, seront plus à l'aise sur notre terre."
 custom_idea_tolerance_heathen:0 "Accroître le Sécularisme"
 custom_idea_tolerance_heathen_desc:0 "L'État séparé des institutions et dignitaires religieux affirme le droit d'être libre des règles et enseignements religieux. Si, ou quand, nous déclarons notre État neutre en matière de croyance, le peuple aura le droit d'être libre de l'imposition par le gouvernement de la religion ou des pratiques religieuses sur sa personne. Ergo : les Païens seront plus heureux dans notre pays."
 custom_idea_heir_chance:0 "Descendance Accrue"
 custom_idea_heir_chance_desc:0 "Un souverain doit avoir un héritier, et des recherches récentes ont énuméré plusieurs façons de s'assurer qu'un enfant naîtra du souverain et de son épouse : l'adoption, davantage de mariages royaux, ou peut-être une maîtresse ou deux pour assurer un héritier légitime sont les options désormais disponibles."
 custom_idea_enemy_core_creation:0 "Patriotisme Local"
 custom_idea_enemy_core_creation_desc:0 "Un dévouement et un attachement culturel plus forts à notre pays empêcheront ceux qui cherchent à établir leur propre Noyau dans nos provinces bien-aimées."
 custom_idea_core_creation:0 "Propagande Patriotique"
 custom_idea_core_creation_desc:0 "Conquérir des provinces d'un autre pays mène souvent à l'agitation et à une vague de révoltes. Avec notre nouvelle propagande, nous nous assurerons que les habitants accepteront notre pays, notre autorité et nos traditions plus rapidement qu'auparavant."
 custom_idea_vassal_income:0 "Accords Mercantiles"
 custom_idea_vassal_income_desc:0 "Avoir un accord mercantile avec nos vassaux assure que leurs revenus augmenteront, car les marchands et négociants des autres nations seront contraints de suivre nos normes. Cela augmentera également les revenus que notre pays tire d'eux."
 custom_idea_religious_unity:0 "Unis dans la Foi"
 custom_idea_religious_unity_desc:0 "Malgré les nombreuses différences de traditions, de cultures et de diverses autres choses, nous savons que nous sommes unis sous une seule foi, une seule religion, une raison puissante de rester ensemble."
 custom_idea_global_autonomy:0 "Gouvernement Central Renforcé"
 custom_idea_global_autonomy_desc:0 "Avant que cette idée ne prenne le pouvoir, les provinces réclamaient plus d'autonomie que nous n'étions disposés à leur accorder et l'autorité locale était fortement recherchée. Bien que cette soif d'auto-gouvernance n'ait pas été étanchée, cette idée l'a au moins quelque peu apaisée."
 custom_idea_accepted_culture_threshold:0 "Acceptation Culturelle"
 custom_idea_accepted_culture_threshold_desc:0 "Conquérir des provinces mène à de nombreux conflits culturels intéressants, mais avec une touche de compréhension et une pincée de tolérance, nous pouvons vivre ensemble paisiblement, quelle que soit notre culture."
 custom_idea_culture_conversion_cost:0 "Assimilation Culturelle"
 custom_idea_culture_conversion_cost_desc:0 "D'autres cultures peuvent contenir des éléments que nous ne souhaitons pas adopter, ou être moins tolérantes envers nos propres traditions. Pour assimiler pleinement une autre culture, nous devons la comprendre et lui montrer les défauts de ses voies."
 custom_idea_naval_morale:0 "Principes Navals"
 custom_idea_naval_morale_desc:0 "À mesure que nous étendons notre marine et formons plus de marins, nous avons besoin d'un code de conduite approprié, d'un ensemble de règles pour s'assurer que l'équipage des navires sache ce qui est acceptable et ce qui ne l'est pas. C'était initialement une idée mal accueillie, mais il s'avère qu'elle a augmenté le moral de nos marines."
 custom_idea_trade_efficiency:0 "Commerce Évolutif"
 custom_idea_trade_efficiency_desc:0 "Le commerce et le troc ont toujours existé, mais ils n'ont pas toujours été très efficaces. Les gens échangeaient directement des biens et des services contre d'autres biens et services, mais maintenant, avec nos pratiques commerciales modernes, les biens et services sont négociés par un moyen d'échange : l'Argent."
 custom_idea_global_trade_power:0 "Système Mercantile"
 custom_idea_global_trade_power_desc:0 "Une théorie et une pratique économiques qui ont apporté bien des fortunes à d'autres nations ont maintenant été adoptées par nous."
 custom_idea_global_prov_trade_power_modifier:0 "Séminaires Mercantiles"
 custom_idea_global_prov_trade_power_modifier_desc:0 "Afin de nous assurer que tous nos marchands, négociants et autres membres de la classe commerciale soient compétents dans l'art du négoce, nous avons organisé des séminaires dans nos provinces. Quiconque y participe apprendra le grand art du commerce."
 custom_idea_trade_steering:0 "Théories Mercantiles"
 custom_idea_trade_steering_desc:0 "Certains disent que diriger le commerce en sa faveur est un art, d'autres disent que c'est une science. Beaucoup de nos grands érudits étudient maintenant la direction du commerce et donnent des conseils à nos marchands. Cela nous a rendus plus aptes à diriger le commerce, à notre plus grande joie."
 custom_idea_global_tariffs:0 "Bureau des Affaires Coloniales"
 custom_idea_global_tariffs_desc:0 "Avoir un Bureau des Affaires Coloniales nous permet de transmettre tous ces problèmes ennuyeux que toute colonie pourrait rencontrer à des spécialistes compétents et formés."
 custom_idea_diplomatic_reputation:0 "Diplomates Charismatiques"
 custom_idea_diplomatic_reputation_desc:0 "Promouvoir parmi nos diplomates ceux qui peuvent charmer n'importe qui jusqu'à l'accord augmentera potentiellement notre réputation diplomatique de manière significative."
 custom_idea_diplomatic_upkeep:0 "Bureau des Affaires Étrangères"
 custom_idea_diplomatic_upkeep_desc:0 "Notre nouveau bureau s'occupera de toutes nos affaires étrangères et de notre entretien diplomatique."
 custom_idea_merchants:0 "École de Commerce d'État"
 custom_idea_merchants_desc:0 "Mathématiques, compétences diplomatiques, leadership et charisme... toutes des compétences importantes dont un marchand prospère a besoin. Au lieu d'envoyer des gens qui ne connaissent du commerce que ce que leur maître leur a enseigné, nous pouvons maintenant fournir à notre pays des marchands de premier ordre."
 custom_idea_colonists:0 "Colons Expérimentés"
 custom_idea_colonists_desc:0 "Les personnes qui ont autrefois quitté notre grande nation pour rejoindre d'autres à la recherche de la terre promise ont une grande expérience de ce qui est nécessaire pour créer une colonie et la faire prospérer. Avec un peu de persuasion, et la promesse d'or, certains colons ont accepté de travailler pour nous comme guides coloniaux."
 custom_idea_diplomats:0 "Éducation Diplomatique"
 custom_idea_diplomats_desc:0 "Bien que nous ayons toujours eu de grands diplomates, un moyen d'éduquer ces quelques élus pour mieux nous servir ne peut jamais être une erreur. L'élite, les meilleurs et les plus brillants, affluera vers notre éducation afin de se prouver et d'être sélectionnée pour nous représenter dans diverses actions diplomatiques."
 custom_idea_naval_maintenance_modifier:0 "Conscription Navale"
 custom_idea_naval_maintenance_modifier_desc:0 "Avec la promesse d'or, de promotions et de longues permissions, nous avons éveillé chez de nombreux hommes le désir de voir plus du monde et d'être payés pour cela. Mais si cela n'amène pas assez de recrues, nous pouvons toujours rassembler quelques ivrognes et les traîner en mer. Nos navires auront des équipages complets en un rien de temps !"
 custom_idea_naval_forcelimit_modifier:0 "Chantiers Navals Nationaux"
 custom_idea_naval_forcelimit_modifier_desc:0 "Les navires ont besoin d'un havre sûr lorsqu'ils ne sont pas utilisés, où ils peuvent être restaurés à leur ancienne gloire ou simplement avoir leurs trous colmatés. C'est ce qu'ils trouveront dans nos chantiers navals nationaux."
 custom_idea_ship_durability:0 "Coques Renforcées"
 custom_idea_ship_durability_desc:0 "Pour qu'un navire flotte, son poids doit être inférieur à celui de l'eau déplacée par la coque du navire. Les récentes améliorations apportées aux coques de nos navires les ont rendus à la fois plus légers et ont amélioré leur durabilité."
 custom_idea_war_exhaustion:0 "Fierté Nationale"
 custom_idea_war_exhaustion_desc:0 "La guerre est toujours épuisante, pour les ressources du pays, son peuple, et peut-être surtout pour ses soldats. En impliquant tout le monde, des jeunes aux vieux, hommes et femmes, riches et pauvres, pour aider à défendre contre l'ennemi, un sentiment d'appartenance a saisi la nation et les gens endureront mieux les guerres."
 custom_idea_war_exhaustion_cost:0 "Guerre Tactique"
 custom_idea_war_exhaustion_cost_desc:0 "Avant même qu'une guerre n'ait commencé, les plans de bataille, les avantages tactiques et diverses stratégies seront examinés et discutés afin de réduire au minimum les pertes de soldats et de fournitures."
 custom_idea_navy_tradition_decay:0 "Lois Navales"
 custom_idea_navy_tradition_decay_desc:0 "Comme tout gentleman vous le dira, un ensemble de lois non écrites dictant comment se comporter et agir dans différentes circonstances garantira que vous ne vous sentirez jamais incertain. Cela a été appliqué à notre marine, et bien que nos marins puissent grogner, ils suivent finalement les lois."
 custom_idea_navy_tradition:0 "Fierté Navale"
 custom_idea_navy_tradition_desc:0 "Un nouvel ordre, créé pour donner à nos marins et fusiliers marins un sentiment de fierté et de dévouement, conduira à une grande augmentation de notre tradition navale."
 custom_idea_leader_naval_fire:0 "Canonniers Navals"
 custom_idea_leader_naval_fire_desc:0 "Nos marines disposent de nouvelles équipes standardisées dirigées par des officiers d'artillerie navale. Ces hommes ont une grande connaissance de la bataille navale et savent comment employer les canons de la meilleure manière tactique et stratégique possible."
 custom_idea_leader_naval_shock:0 "Techniques d'Abordage Avancées"
 custom_idea_leader_naval_shock_desc:0 "Bien que l'abordage fasse partie depuis longtemps de la guerre navale, nos capitaines et équipages s'y adonnent plus vigoureusement que la plupart. En réduisant intrépidement la distance et en attaquant férocement, notre marine acquiert une réputation pour ses tactiques de Choc."
 custom_idea_leader_naval_maneuver:0 "Excellents Constructeurs Navals"
 custom_idea_leader_naval_maneuver_desc:0 "En rassemblant les meilleurs constructeurs de navires que notre nation a à offrir, nous sommes en mesure de nous construire une flotte de vaisseaux modernes inégalés en artisanat et en maniabilité."
 custom_idea_spy_offence:0 "Opérations Secrètes"
 custom_idea_spy_offence_desc:0 "Lorsqu'ils sont sous couverture, nos espions sont protégés des soupçons et pourront effectuer des opérations de sabotage avec moins d'efforts."
 custom_idea_spy_defense:0 "Infiltration Ennemie"
 custom_idea_spy_defense_desc:0 "Nos espions tenteront d'infiltrer les forces d'espionnage ennemies pour brouiller les informations et s'assurer que leur gouvernement ne reçoive aucun renseignement sensible sur notre pays."
 custom_idea_ship_recruit_speed:0 "Constructeurs Navals Expérimentés"
 custom_idea_ship_recruit_speed_desc:0 "Une grande marine exige de nombreux chantiers navals et des constructeurs expérimentés. Pour chaque navire que nous construisons, qu'il s'agisse de navires de guerre ou de transports, nos constructeurs acquièrent des connaissances et de l'expérience menant à des moyens plus rapides de construire des navires de toutes sortes."
 custom_idea_blockade_efficiency:0 "Blocus Standardisés"
 custom_idea_blockade_efficiency_desc:0 "La nouvelle force de blocus standardisée s'est déjà avérée extrêmement positive, elle a rendu nos blocus beaucoup plus efficaces."
 custom_idea_embargo_efficiency:0 "Embargos Efficaces"
 custom_idea_embargo_efficiency_desc:0 "Réduire la puissance commerciale des autres nations n'a jamais été aussi facile."
 custom_idea_prestige_from_naval:0 "Grandeur Navale"
 custom_idea_prestige_from_naval_desc:0 "Nos adversaires craignent déjà notre armée, maintenant ils tremblent également à la mention de notre grande marine !"
 custom_idea_range:0 "Provisions Supérieures"
 custom_idea_range_desc:0 "En veillant à ce que nos colons aient accès à des provisions de meilleure qualité, nous pouvons augmenter la distance qu'ils peuvent parcourir par mer sans se ravitailler."
 custom_idea_global_colonial_growth:0 "Promesse de Terre"
 custom_idea_global_colonial_growth_desc:0 "La simple promesse d'un lopin de terre à eux a convaincu des gens de s'installer dans nos colonies."
 custom_idea_ae_impact:0 "Propagande Raffinée"
 custom_idea_ae_impact_desc:0 "Nous avons raffiné notre propagande pour que les gens ignorent, ou du moins acceptent, notre expansion agressive."
 custom_idea_privateer_efficiency:0 "Corsaires Compétents"
 custom_idea_privateer_efficiency_desc:0 "Le passage de simples pirates à des corsaires compétents a été long et difficile, mais nous avons réussi à le franchir avec aisance."
 custom_idea_diplomatic_annexation_cost:0 "Assimilation Soutenue"
 custom_idea_diplomatic_annexation_cost_desc:0 "Au lieu de forcer les gens à s'assimiler, nous leur montrons que nos intérêts communs, parfois même des similitudes religieuses et culturelles, feront de l'assimilation de leurs provinces dans notre pays une entreprise profitable."
 custom_idea_heavy_ship_cost:0 "Forêts de Chênes Protégées"
 custom_idea_heavy_ship_cost_desc:0 "S'assurer que nos forêts de chênes sont protégées par l'État, afin que nous ayons accès à du bois de chêne bon marché pour les coques de navires."
 custom_idea_light_ship_cost:0 "Ingénierie Navale"
 custom_idea_light_ship_cost_desc:0 "La conception d'un navire léger ne concerne pas seulement son but, un ingénieur naval doit également considérer la conception, la construction, l'entretien et l'exploitation du navire."
 custom_idea_galley_cost:0 "Arsenal National"
 custom_idea_galley_cost_desc:0 "Établir un arsenal national où nos galères peuvent être produites rapidement et à moindre coût selon des conceptions standard."
 custom_idea_transport_cost:0 "Architecte Naval d'État"
 custom_idea_transport_cost_desc:0 "Employer un architecte naval à notre cour nous permet de réduire les coûts de construction des navires de transport."
 custom_idea_heavy_ship_power:0 "Exercices de Tir en Bordée"
 custom_idea_heavy_ship_power_desc:0 "Tirer une bordée nécessite un équipage hautement entraîné capable de recharger et de tirer rapidement à l'unisson. Des exercices réguliers garantiront que nos navires disposent d'un tel équipage."
 custom_idea_light_ship_power:0 "Double Charge"
 custom_idea_light_ship_power_desc:0 "Les navires légers sont plus rapides mais ont moins de sabords que les autres navires de guerre. Bien que la nouvelle pratique de charger deux boulets dans un canon et de les tirer tous les deux en même temps signifie que les navires ont une portée effective et une précision plus faibles, c'est dévastateur à courte portée."
 custom_idea_galley_power:0 "Platines à Silex"
 custom_idea_galley_power_desc:0 "Le mécanisme à silex utilisé sur les mousquets et les fusils a été adapté pour être utilisé sur les canons, appelées platines à silex. Celles-ci sont plus sûres que l'ancienne méthode des boute-feux pour mettre le feu au canon."
 custom_idea_land_morale:0 "Fierté de l'Unité"
 custom_idea_land_morale_desc:0 "En encourageant nos soldats à être fiers des unités auxquelles ils appartiennent, nous pouvons augmenter leur moral et les faire combattre d'autant plus ardemment."
 custom_idea_discipline:0 "Police Militaire"
 custom_idea_discipline_desc:0 "Personne ne veut être puni, mais l'introduction de la police militaire dans nos armées a conduit à une diminution des cours martiales et a amélioré la discipline de nos soldats."
 custom_idea_land_maintenance_modifier:0 "Bureaucratie Militaire Organisée"
 custom_idea_land_maintenance_modifier_desc:0 "Réviser et organiser notre bureaucratie militaire n'a pas été une tâche facile, mais une tâche nécessaire."
 custom_idea_mercenary_cost:0 "Recrutement Formalisé de Mercenaires"
 custom_idea_mercenary_cost_desc:0 "Recruter des mercenaires a toujours été une affaire lente et compliquée, si compliquée en fait que compter sur nos propres soldats a souvent été le meilleur choix. En formalisant le recrutement, nous avons contourné de nombreux problèmes et facilité le recrutement de mercenaires."
 custom_idea_merc_maintenance_modifier:0 "Titres pour les Mercenaires"
 custom_idea_merc_maintenance_modifier_desc:0 "Accorder des titres aux commandants mercenaires garantit que nous obtenons les meilleurs soldats pour un prix équitable, ce qui réduit le coût d'entretien des mercenaires."
 custom_idea_mercenary_manpower:0 "Centres de Recrutement de Mercenaires"
 custom_idea_mercenary_manpower_desc:0 "Créer des centres dans tout notre pays pour le recrutement de mercenaires a augmenté le nombre de compagnies de mercenaires disponibles pour nous."
 custom_idea_land_forcelimit_modifier:0 "Établir une Armée Nationale"
 custom_idea_land_forcelimit_modifier_desc:0 "Une armée nationale signifierait que nous n'avons plus à compter sur des mercenaires ou des armées privées en temps de guerre, et que nous pouvons créer des armées plus grandes avec plus de soldats."
 custom_idea_global_manpower_modifier:0 "Conscription Paysanne"
 custom_idea_global_manpower_modifier_desc:0 "Que vous soyez riche ou pauvre, vous pouvez toujours combattre. Conscire des paysans peut ne pas être vu avec plaisir par nos nobles soldats, mais cela augmentera notre main-d'œuvre."
 custom_idea_manpower_recovery_speed:0 "Centres de Recrutement Locaux"
 custom_idea_manpower_recovery_speed_desc:0 "Les centres de recrutement nous permettent de recruter des soldats directement depuis chaque province. Au lieu de les faire voyager jusqu'à nous, nous irons à eux."
 custom_idea_reinforce_speed:0 "Logistique Organisée"
 custom_idea_reinforce_speed_desc:0 "La gestion des fournitures était un désordre désorganisé jusqu'à ce que nous créions un système de logistique organisée."
 custom_idea_hostile_attrition:0 "Politique de la Terre Brûlée"
 custom_idea_hostile_attrition_desc:0 "Notre armée a des ordres stricts de détruire tout ce qui pourrait être utile à l'ennemi, comme les sources de nourriture ou les transports, lors du retrait d'une zone."
 custom_idea_army_tradition:0 "Promotions Méritocratiques"
 custom_idea_army_tradition_desc:0 "L'ancienne façon de promouvoir ceux de sang noble a été abandonnée en faveur de promotions basées sur le mérite."
 custom_idea_army_tradition_decay:0 "Établir des Écoles d'Officiers"
 custom_idea_army_tradition_decay_desc:0 "Ceux qui montrent de grandes promesses ou un grand enthousiasme à diriger des troupes peuvent maintenant s'inscrire dans une école d'officiers, qui leur apprendra à agir en tant qu'officier et gentleman."
 custom_idea_leader_land_fire:0 "Exercices de Tir"
 custom_idea_leader_land_fire_desc:0 "« Donnez un fusil à un homme, et il pourra se défendre pour un jour. Apprenez à un homme à utiliser un fusil, et il ne sera plus jamais sans défense. »"
 custom_idea_leader_land_shock:0 "Officiers de Cavalerie"
 custom_idea_leader_land_shock_desc:0 "Les hommes à cheval ont besoin d'un chef tout autant que les fantassins, et promouvoir des hommes au rang d'officiers parmi la cavalerie ne les rendra que meilleurs."
 custom_idea_leader_land_manuever:0 "Éclaireurs de l'Armée"
 custom_idea_leader_land_manuever_desc:0 "Des éclaireurs sont envoyés dans des régions inconnues pour explorer et recueillir des informations vitales sur les forces ennemies, l'environnement et le terrain."
 custom_idea_leader_siege:0 "Tactiques de Siège"
 custom_idea_leader_siege_desc:0 "Quiconque a pensé que les sièges étaient une façon intelligente de faire la guerre est peut-être un génie, ou un idiot. Avec des tactiques de siège améliorées, cependant, nos officiers s'en sortiront mieux lors des sièges."
 custom_idea_regiment_recruit_speed:0 "Recrutement Rapide"
 custom_idea_regiment_recruit_speed_desc:0 "Plus vite nous pouvons recruter, plus vite nous pouvons renforcer nos armées."
 custom_idea_prestige_from_land:0 "Monuments à la Victoire"
 custom_idea_prestige_from_land_desc:0 "Nos victoires seront célébrées par de grands monuments représentant quiconque nous a aidés à remporter la victoire ou nous a guidés sur le chemin de la gloire."
 custom_idea_defensiveness:0 "Normes de Construction de Fortifications"
 custom_idea_defensiveness_desc:0 "L'une des choses les plus importantes pour défendre notre pays, ce sont nos forts. Les normes de construction des fortifications rendront plus difficile pour nos ennemis de prendre le contrôle de nos provinces."
 custom_idea_siege_ability:0 "Sapeurs"
 custom_idea_siege_ability_desc:0 "Les sièges sont gagnés par la patience et l'ingéniosité. Les sapeurs apportent les deux à un siège, avec leurs tâches consacrées à faciliter le mouvement, la défense et la survie des forces alliées et à entraver celles des ennemis."
 custom_idea_vassal_forcelimit_bonus:0 "Système de Levée Vassale"
 custom_idea_vassal_forcelimit_bonus_desc:0 "Un avantage d'avoir des vassaux est qu'ils aident à étendre considérablement nos armées, et avec le Système de Levée Vassale, nos avantages seront encore plus grands."
 custom_idea_infantry_power:0 "Sergents Vétérans"
 custom_idea_infantry_power_desc:0 "Les sergents sont les vrais chefs des armées, les officiers ne sont là que pour empêcher la guerre de devenir une simple querelle entre paysans."
 custom_idea_cavalry_power:0 "Élevage de Chevaux Fins"
 custom_idea_cavalry_power_desc:0 "Tout cavalier vous dira que la qualité du cheval est aussi importante que la qualité de l'écuyer, souvent même plus."
 custom_idea_artillery_power:0 "Munitions de Haute Qualité"
 custom_idea_artillery_power_desc:0 "Meilleure est la munition, meilleure est la puissance de nos mousquets et de nos canons."
 custom_idea_infantry_cost:0 "Conscription de Masse"
 custom_idea_infantry_cost_desc:0 "L'enrôlement obligatoire de personnes dans le service militaire par conscription de masse réduit le coût de l'infanterie."
 custom_idea_cavalry_cost:0 "Concessions de Terres pour les Cavaliers"
 custom_idea_cavalry_cost_desc:0 "Les chevaux mangent de l'herbe, l'herbe pousse sur la terre, la terre accordée aux cavaliers assure une meilleure cavalerie à moindre coût."
 custom_idea_artillery_cost:0 "Calibres Standardisés"
 custom_idea_artillery_cost_desc:0 "Le diamètre interne du canon détermine la taille des projectiles, et avec un calibre standardisé, nous pouvons produire plus de canons et de meilleures munitions pour eux."
 tribal_kingdom_ruler_nahuatl:0 "Tlatoani"
 tribal_despotism_ruler_nahuatl:0 "Tlatoani"
 tribal_federation_ruler_nahuatl:0 "Tlatoani"
 tribal_democracy_ruler_nahuatl:0 "Tlatoani"
 feudal_monarchy_ruler_nahuatl:0 "Tlatoani"
