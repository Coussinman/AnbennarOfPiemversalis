 sce_search_cityofcaesars:0 "La quête de la Cité des Césars"
 desc_sce_search_cityofcaesars:0 "Votre conquistador recherche la Cité des Césars, une cité prospère et riche, pleine d'or, d'argent et de diamants."
 sce_city_of_caesars:1 "La Cité des Césars"
 desc_sce_city_of_caesars:1 "La légendaire Cité des Césars trône sur une véritable montagne de quartz. Il nous faudrait des centaines, voire des milliers d'années pour tout extraire !"
 sce_search_sierradelaplata:0 "La quête de Sierra de la Plata"
 desc_sce_search_sierradelaplata:0 "Votre conquistador recherche Sierra de la Plata, les Montagnes d'Argent."
 sce_sierradelaplata_quartz:1 "Sierra de la Plata"
 desc_sce_sierradelaplata_quartz:1 "La légende de Sierra de la Plata parle d'une montagne remplie d'argent. Non seulement la légende était vraie, mais elle omettait de mentionner la couronne de diamants perchée sur l'antique trône !"
 sce_sierra_dela_plata:0 "Sierra de la Plata"
 desc_sce_sierra_dela_plata:0 "La Montagne d'Argent, gouvernée par un Roi Blanc, a été trouvée par notre conquistador ! Elle apportera prestige et or à notre pays."
 sce_search_norumbega:0 "La quête de Norumbega"
 desc_sce_search_norumbega:0 "Le conquistador recherche Norumbega, une colonie viking en Amérique du Nord regorgeant de grandes richesses."
 sce_search_quivira:0 "Quivira"
 desc_sce_search_quivira:0 "Une terre où des coupes d'or pendent aux arbres : voilà l'endroit que recherche le conquistador."
 sce_norumbega_abandoned:1 "Norumbega"
 desc_sce_norumbega_abandoned:1 "L'antique cité de Norumbega est découverte ! Une richesse de métaux précieux se trouve dans les filons à ciel ouvert de ses rues mêmes."
 sce_search_saguenay:0 "La quête du Royaume de Saguenay"
 desc_sce_search_saguenay:0 "Votre conquistador recherche le Royaume de Saguenay, un royaume réputé posséder des mines d'or, d'argent et de rubis en Amérique du Nord."
 sce_saguenay_abandoned:1 "Le Royaume de Saguenay"
 desc_sce_saguenay_abandoned:1 "L'antique cité de Saguenay est remplie d'idoles hérétiques et de statues dorées de dieux païens ébattants. C'est notre devoir de les fondre et de réemployer ces richesses."
 sce_golden_cups:1 "La Cité Dorée de Quivira"
 desc_sce_golden_cups:1 "Malgré l'absence de coupes d'or suspendues aux branches, de précieux gisements de jade ont été localisés sous la cité en ruines. Cela prendra du temps et des efforts, mais l'extraction de ce matériau s'avérera une entreprise des plus dignes."

