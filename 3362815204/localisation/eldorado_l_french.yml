 seven_cities_events.1000.t:0 "La Piste se Refroidit"
 seven_cities_events.1000.d:0 "Le trésor légendaire que nous nous étions mis en quête de trouver semble hors de notre portée. N'ayant rien entendu ni vu depuis si longtemps, nos Conquistadors commencent à désespérer."
 seven_cities_events.1000.a:0 "Nous devrons chercher d'autres trésors à la place."
