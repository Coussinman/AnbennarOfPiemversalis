l_french:
 order_of_judges_order:0 "L'Ordre des Juges"
 order_of_judges_order_desc:0 "Les antiques Juges du Bulwar œuvrent en sages itinérants du droit, indépendants de toute autorité temporelle. Ils parcourent les terres pour trancher les différends et veiller à ce que justice soit rendue en toutes circonstances."
 servants_of_surael_order:0 "Les Serviteurs de Surael"
 servants_of_surael_order_desc:0 "Ces artisans du Bulwar n'exercent point leur art pour le seul appât du gain. Dans chaque œuvre qu'ils façonnent, ils puisent leur inspiration auprès de Surael et travaillent en son honneur sacré."
 order_of_exemplars_order:0 "L'Ordre des Exemplaires"
 order_of_exemplars_order_desc:0 "Protecteurs du Culte Solaire, les Exemplaires s'efforcent d'incarner en tout temps la meilleure version d'eux-mêmes. Une grande part de leurs rangs est composée d'elfes solaires cherchant à accomplir leur devoir sacré envers Surael."
 lightbringers_order:0 "Les Porteurs-de-Lumière"
 lightbringers_order_desc:0 "Tandis que le soleil céleste ne brille que durant le jour, l'inquisition du Jadd étend les rayons de Surael jusque dans les recoins les plus profonds et les plus ténébreux, afin d'y consumer hérétiques et infidèles."
 jasienes_daughters_order:0 "Les Filles de Jasiéne"
 jasienes_daughters_order_desc:0 "Ceux qui s'exposent au soleil du désert sont aisément brûlés. Cet ordre exclusivement féminin fait office de baume apaisant : ses membres soignent malades et blessés tout en organisant les travaux d'infrastructure."
 militant_jadd_order:0 "Le Jadd Militant"
 militant_jadd_order_desc:0 "Fondé par un groupe de Phénix du Désert particulièrement ardents, le Jadd Militant est le bras armé de cette jeune foi. On dit que leurs lames et leurs arcs brillent de l'éclat du soleil, même en pleine nuit."
 lightbringers_order_upgraded:0 "Les Porteurs-de-Lumière"
 lightbringers_order_upgraded_desc:0 "Tandis que le soleil céleste ne brille que durant le jour, l'inquisition du Jadd étend les rayons de Surael jusque dans les recoins les plus profonds et les plus ténébreux, afin d'y consumer hérétiques et infidèles."
 jasienes_daughters_order_upgraded:0 "Les Filles de Jasiéne"
 jasienes_daughters_order_upgraded_desc:0 "Ceux qui s'exposent au soleil du désert sont aisément brûlés. Cet ordre exclusivement féminin fait office de baume apaisant : ses membres soignent malades et blessés tout en organisant les travaux d'infrastructure."
 militant_jadd_order_upgraded:0 "Le Jadd Militant"
 militant_jadd_order_upgraded_desc:0 "Fondé par un groupe de Phénix du Désert particulièrement ardents, le Jadd Militant est le bras armé de cette jeune foi. On dit que leurs lames et leurs arcs brillent de l'éclat du soleil, même en pleine nuit."
 servants_of_surakel_order:0 "Les Serviteurs de Surakel"
 servants_of_surakel_order_desc:0 "Ces artisans du Bulwar n'exercent point leur art pour le seul appât du gain. Dans chaque œuvre qu'ils façonnent, ils puisent leur inspiration auprès de Surakel et travaillent en son honneur sacré."
 eduz_nabari_order:0 "Les Eduz-Nabari"
 eduz_nabari_order_desc:0 "Les Eduz-Nabari, les Gardes du Temple, protègent les derniers lieux de culte voués à la Vraie Lumière de Surakel contre ceux qui voudraient l'usurper."
 the_unforgivable_order:0 "Les Impardonnables"
 the_unforgivable_order_desc:0 "Les Impardonnables croient qu'ils ne pourront jamais obtenir la rédemption aux yeux de Surakel. Ils ne cherchent donc que l'oubli : consumer leur âme jusqu'aux cendres dans les flammes les plus intenses de Son service, échappant ainsi aux Ténèbres qui autrement s'empareraient d'eux."
 agrados_passion_order:0 "Les Passionnés d'Agrados"
 agrados_passion_order_desc:0 "Un culte religieux infernaliste identifiant Agrados comme le Père des Hommes et le Grand Amant, proclamant que Castellos et ses loyalistes sont des voleurs ayant dérobé à l'humanité sa domination légitime sur le monde. Ils sont connus pour leur passion obsessionnelle et dévorante, dont la nature et l'objet peuvent changer quotidiennement, et considèrent l'histoire d'Agrados et Halanna comme celle d'un amour détruit par un Castellos jaloux. Ils vouent une loyauté fanatique aux Archidiables Ildran et Hedine."
 triadic_devotees_order:0 "Les Dévots Triadiques"
 triadic_devotees_order_desc:0 "Un culte infernaliste vénérant par-dessus tout les vertus d'avidité, de désir et d'ambition, et qui contrôle une grande partie de l'économie de Moredhal. Ce sont de fervents adeptes des Archidiables Canturian, Ibberal et Forsara."
 grudgeknights_order:0 "Les Chevaliers-du-Grief"
 grudgeknights_order_desc:0 "Un culte infernaliste tirant son origine d'un ordre chevaleresque d'avant la Marée Verte dévoué à Adean. Ils ont fusionné l'abandon de l'Escann par l'Occident face aux déprédations des orques avec l'abandon du monde par les Dieux face aux déprédations des dragons en une doctrine unique d'amertume et de méfiance. Ils agissent comme la combinaison d'un ordre militaire et d'une inquisition, traquant les traîtres à la nation pour les écraser totalement. Ils ne font confiance qu'à leurs maîtres, les Archidiables Kazraiel et Mesner."
 corinite_order_event_block:0 "Bloc d'événements des Ordres Corinites"
 corinite_adm_order_event_karma_tt:0 "§Y+4§! Parangonnat Corinite"
 corinite_dip_order_event_karma_tt:0 "Déplacez votre Parangonnat Corinite de §G2§! points §Yvers le centre§!."
 corinite_mil_order_event_karma_tt:0 "§Y-4§! Parangonnat Corinite"
 begga_order:0 "Moines de la Charité Non-Sanctionnée"
 begga_order_desc:0 "Là où les temples de Begga administrent les aumônes, les Moines Corinites de Begga prononcent des vœux de pauvreté pour mieux comprendre les enseignements de Begga. Ces moines itinérants parcourent les terres, non pour convertir, mais pour vivre une vie simple et se porter volontaires dans les projets communautaires, partout où une main supplémentaire fait merveille : un véritable exemple montrant que même sans rien posséder, on peut avoir la foi."
 begga_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+8§! Progression des Réformes"
 dame_order:0 "Philosophes de la Nouvelle-Lune"
 dame_order_desc:0 "La nature du divin doit toujours être questionnée, et les Philosophes de la Nouvelle-Lune sont à l'avant-garde de telles enquêtes. Le divin œuvre de manières mystérieuses, et la Dame est la Déesse des Mystères entre autres choses. Pour eux, l'ancienne cour est devenue stagnante et prudente, trop focalisée sur les affaires temporelles. Mais cela suffit ! Toute chose doit être questionnée, et Corin n'est qu'une nouvelle lentille à travers laquelle observer."
 dame_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+1§! Innovation\nTout excédent d'Innovation sera converti en §G5§! unités de chaque type de §YPoints de Monarque§!.\n(L'Innovation additionnelle provenant du §YGain d'Innovation§! ne sera PAS convertie)"
 dame_order_event_no_dlc_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+5§! Points Adm/Dip/Mil"
 esmaryal_order:0 "Les Douairières"
 esmaryal_order_desc:0 "Tandis que la vaste majorité des temples d'Esmaryal se rangea du côté d'Adean (après tout, il est son fils), une petite secte de prêtresses vénérables et influentes vit en Corin une nouvelle fille à guider, et chercha à utiliser leurs années de sagesse pour façonner une héritière digne de la Cour Régente. Bien sûr, ces hérétiques, qualifiées de Douairières, furent bannies d'Esmarie, mais finirent par trouver refuge en conseillant la nouvelle génération de rois aventuriers qui affluèrent sous la bannière de Corin."
 esmaryal_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G-2§! Expansion Agressive"
 nerat_order:0 "Chevaliers-Funèbres de Gallowspeak"
 nerat_order_desc:0 "Nommés d'après le prêtre qui aida à la déification de Corin, Dominic de Gallowspeak, ces sinistres chevaliers inspirent la crainte de la justice et de la loi même aux fidèles de Corin. Car dans le sillage du zèle effréné vient la capacité de commettre des maux arbitraires, et l'on doit rester vigilant envers ceux qui, même avec de bonnes intentions, causent le mal sans le vouloir."
 nerat_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G-0,5§! Corruption\n§G+3§! Légitimité/Dévotion/Unité de Horde\n§G+1§! Tradition Républicaine"
 ara_order:0 "Communalistes Aranites"
 ara_order_desc:0 "Il y a longtemps eu une division entre les prêtres aranites urbains et ruraux, et quand la parole de Corin se répandit, nombre du clergé plus pauvre des campagnes y virent une bannière pour enfin défier leurs homologues plus riches. Pour eux, ceux-ci avaient corrompu Ara en une figure justifiant l'avidité, promouvant la spéculation et pire encore, le jeu. Ce mouvement devint bientôt la Guilde des Bons Marchands, qui créa ses propres communes abandonnant la monnaie pour le troc et où les richesses matérielles étaient partagées."
 ara_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+1§! Mercantilisme"
 minara_order:0 "Ordre du Verger"
 minara_order_desc:0 "L'Ordre du Verger considère les temples de Minara comme moralement corrompus, rien d'autre qu'une justification de la débauche et du péché. Au lieu de cela, l'ordre voit en Minara un vecteur pour célébrer l'amour, certes, mais pour eux il n'est pas de plus grand amour que la foi et la communauté. Par un curieux retournement, ces prêtres de Minara devinrent le bastion des temples corinites locaux mais organisés."
 minara_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§GLégère augmentation de la Tolérance§! envers §Ytoutes les Races possédées§!."
 munas_order:0 "Chevaliers du Feu-Lunaire"
 munas_order_desc:0 "Quand on pense aux croisés, on imagine une masse de populace avec des torches enflammées d'une main et l'épée de l'autre, mais la volonté divine doit se répandre tant sur terre que sur mer. Nommés d'après la traduction du navire migrant de Munas, le Lunateín, les Chevaliers du Feu-Lunaire forment un ordre restreint mais dévoué d'officiers et commandants navals qui se voient comme l'avant-garde d'une croisade mondiale planétaire."
 munas_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+1§! Tradition Navale"
 munas_order_upgrade_tt:0 "Ajoute §G+10,0 %§! de Modificateur d'Impôts Locaux, §G+10,0 %§! de Modificateur de Marins Locaux et §G+0,25§! de Limite de Force Navale supplémentaires tant que cet ordre est actif"
 ryala_order:0 "Sororité Cérisienne"
 ryala_order_desc:0 "Ryala enseigne que les femmes doivent être des vierges modestes et des épouses obéissantes. Belles et visibles, mais silencieuses. Mais Corin a montré à une nouvelle génération de prêtresses de Ryala que les anciennes voies ne sont que des chaînes divines destinées à asservir. Désormais, une nouvelle sororité s'est levée : un réseau secret de femmes à travers Cannor jadis considérées dociles, utilisant leurs nouvelles connexions pour ouvrir des routes, des opportunités et des richesses les unes aux autres, car seules les femmes unies, et non divisées, peuvent y prétendre."
 ryala_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+5§! Faveurs auprès d'un allié aléatoire."
 ryala_order_event_no_dlc_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+40§! Couronnes"
 ryala_order_upgrade_tt:0 "Ajoute §G+10,0 %§! de Modificateur d'Impôts Locaux et §G+12,5 %§! de Puissance Commerciale Locale supplémentaires tant que cet ordre est actif."
 balgar_order:0 "Balgarites de la Forge-du-Dragon"
 balgar_order_desc:0 "La Marée Verte fut perçue comme une guerre sainte pour les Balgarites cherchant à reprendre la Forge-du-Dragon, la vaste fonderie-temple que Balgar lui-même bâtit et qui alimentait la machine de guerre qu'était Castanor. Maintenant que la libération de Corin affranchit l'Escann, les Balgarites ont pris leur place d'autorité principale parmi les temples de Balgar. Leurs clercs ne doivent plus se concentrer sur les grandes architectures et les œuvres artisanales : leur parole fait écho aux jours anciens, proclamant que leurs forges sont l'épine dorsale sur laquelle les empires sont bâtis, les flammes qui trempent la lame de la justice, et l'acier qui renforce le rempart de la foi."
 balgar_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G-1§! Inflation"
 balgar_order_upgrade_tt:0 "Ajoute §G+5,0 %§! de Modificateur de Main-d'œuvre Locale, §G+5,0 %§! de Défense Locale et §G-5,0 %§! d'Entretien de Fort Local supplémentaires tant que cet ordre est actif."
 corin_order:0 "Brandons Corinites"
 corin_order_desc:0 "Ce qui distinguait les fidèles de Corin des autres, c'était le nombre, car parmi ses fidèles les devoirs de la foi jadis réservés aux prêtres formés incombent à chaque homme, femme et enfant. Bien sûr, sans l'éducation d'un séminaire, les débats et les mots échouent souvent, et la seule façon d'atteindre le cœur des gens est par le feu et l'épée."
 corin_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+1§! Professionnalisme Militaire"
 corin_order_event_no_dlc_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+2§! Tradition Militaire"
 corin_order_upgrade_tt:0 "Ajoute §G+5,0 %§! de Modificateur de Main-d'œuvre Locale et §G+2,5 %§! de Force Missionnaire Locale supplémentaires tant que cet ordre est actif."
 falah_order:0 "Croisés Carmins"
 falah_order_desc:0 "Avec l'avènement de Corin, la chasse au mal n'est plus le seul mandat des Falahites. Au lieu de cela, ils assument un nouveau rôle d'enseignement et de guidance des masses de brandons suivant la volonté de Corin. Ils seront la flèche enflammée qui éclaire le chemin. Ils seront l'instrument qui guide ses armées à travers Cannor dans son éternelle et glorieuse croisade."
 falah_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+2§! Tradition Militaire"
 falah_order_upgrade_tt:0 "Ajoute §G+5,0 %§! de Modificateur de Main-d'œuvre Locale et §G+5,0 %§! de Vitesse de Mouvement Amie supplémentaires tant que cet ordre est actif."
 nathalyne_order:0 "Maison de Lumière"
 nathalyne_order_desc:0 "« Il ne peut y avoir de lumière sans ombre », ainsi parlent ces Corinites. La Maison de Lumière cherche à être l'autre face de la torche enflammée du zèle corinite, veillant à ce que tandis que les brandons ouvrent la voie avec épée et bouclier, une dague s'occupe des lâches et des couards qui échappent au courroux de Corin. Et l'esclavage est bien une telle abomination."
 nathalyne_order_event_tt:0 "Gagne §G-10§! Années de Séparatisme dans §Ychaque province de l'état§!.\n\n§YChangements nationaux lors de l'établissement :§!\n§G+25§! de Progression d'Institution dans la capitale nationale."
 dookan_order:0 "Confrérie de la Défense-Brisée"
 dookan_order_desc:0 "Après la Marée Verte, de nombreux demi-orques se sentirent tiraillés entre leurs deux natures et tentèrent de renouer avec leur côté orque. Ils ne voient pas Dookan comme une force maléfique, mais comme un dieu de la Force et des Mercenaires qui renversa la Cour décadente et permit à la Corinisme juste et plus fort de s'élever à sa place. La Confrérie de la Défense-Brisée prend les faibles et leur enseigne à devenir forts, sans distinction aucune ; après tout, quelle meilleure façon de protéger quelqu'un que de lui apprendre à se protéger lui-même ?"
 dookan_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\nGagnez un Général proportionnel à votre §YTradition Militaire§!.\nLe §YGénéral§! gagnera §G+1§! de §YChoc§! supplémentaire."
 adean_order:0 "Bannerettes Adéaniques"
 adean_order_desc:0 "Jadis divisés par leurs différences, ces Adéaniques ont surmonté leurs disputes avec les dirigeants corinites et se sont élevés pour incarner les nobles idéaux du Code Adéanique de Chevalerie. Fiers et honorables, ils se dressent en protecteurs indéfectibles de leurs communes, sauvegardant les terres et les peuples qui leur sont chers. Bien qu'ils reconnaissent Adean comme souverain suprême de la Cour, leur dévotion au Dieu de la Chevalerie se manifeste dans leur service à un dirigeant corinite qui, mettant de côté les divisions passées, a choisi l'unité pour le bien supérieur du peuple."
 adean_order_event_tt:0 "\n§YChangements nationaux lors de l'établissement :§!\n§G+5§! Prestige."


 maederitic_rule_order_level_1:"Règle Maédéritique"
 maederitic_rule_order_level_1_desc:"Le gouverneur de cet état suit la Philosophie de la §YRègle Maédéritique§!\n\nSi notre §YDivinité Personnelle§! change pour une autre Divinité §YAdministrative§!, les modificateurs actuels seront remplacés par :\nModificateur d'Impôts Locaux : §G+25,0 %§!\nCoût de Gouvernance de Province : §G-15,0 %§!\n\nSi notre §YDivinité Personnelle§! change pour la Divinité de la §YRègle Maédéritique§!, les modificateurs actuels seront remplacés par :\nModificateur d'Impôts Locaux : §G+25,0 %§!\nCoût de Gouvernance de Province : §G-15,0 %§!\nCoût Local de Centralisation d'État : §G-25,0 %§!"
 maederitic_rule_order_level_2:"Règle Maédéritique"
