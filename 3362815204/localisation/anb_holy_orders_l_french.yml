 teachings_of_varamelas_order_level_2_desc:"Le gouverneur de cet état suit la Philosophie des §YEnseignements de Varamelas§!\n\nSi notre §YDivinité Personnelle§! change pour une Divinité §YDiplomatique§! ou §YMilitaire§!, les modificateurs actuels seront remplacés par :\nModificateur d'Impôts Locaux : §G+15,0 %§!\nCoût de Construction Local : §G-10,0 %§!\n\nSi notre §YDivinité Personnelle§! change pour la Divinité des §YEnseignements de Varamelas§!, les modificateurs actuels seront remplacés par :\nModificateur d'Impôts Locaux : §G+25,0 %§!\nCoût de Construction Local : §G-10,0 %§!\nTemps de Construction Local : §G-15,0 %§!"
