 maederitic_rule_order_level_3:"Règle Maédéritique"
 maederitic_rule_order_level_3_desc:"Le gouverneur de cet état suit la Philosophie de la §YRègle Maédéritique§!\n\nSi notre §YDivinité Personnelle§! change pour une Divinité §YDiplomatique§! ou §YMilitaire§!, les modificateurs actuels seront remplacés par :\nModificateur d'Impôts Locaux : §G+15,0 %§!\nCoût de Gouvernance de Province : §G-15,0 %§!\n\nSi notre §YDivinité Personnelle§! change pour une autre Divinité §YAdministrative§!, les modificateurs actuels seront remplacés par :\nModificateur d'Impôts Locaux : §G+25,0 %§!\nCoût de Gouvernance de Province : §G-15,0 %§!"

