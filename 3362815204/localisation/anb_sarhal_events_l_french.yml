l_french:
 sarhalevents.1.t:0 "Les fidèles affluent vers le lac Kuiziva"
 sarhalevents.1.d:0 "La majesté du Kuiika Gamyi continue d'attirer ceux de notre foi vers le lac Kuiziva. Tout le travail supplémentaire investi dans le défrichage des terres, la construction de foyers et l'organisation de festivals au bord du lac porte ses fruits, avec de plus en plus de gens venant s'installer sur ses rives."
 sarhalevents.1.a:0 "Nous accueillons les fidèles à bras ouverts"

 sarhalevents.2.t:0 "Les Écoles de [Root.Religion.GetName]"
 sarhalevents.2.d:0 "Les hommes-lézards sont un peuple riche en culture, divers tant en pensée qu'en forme. La foi [Root.Religion.GetName] est faite de chemins divergents, et nous devons choisir lequel suivre."
 sarhalevents.2.a:0 "Les Sculpteurs du Destin"
 sarhalevents.2.b:0 "Les Sculpteurs de l'Être"
 sarhalevents.2.c:0 "Lame et Aiguille"
 sarhalevents.2.dd:0 "Le Grand Cycle"
 sarhalevents.2.e:0 "Zèle Humble"
 sarhalevents.2.f:0 "Le Chant-de-l'Âme"

 sarhalevents.3.t:0 "Les Écoles de [Root.Religion.GetName]"
 sarhalevents.3.d:0 "La foi [Root.Religion.GetName] est riche de nombreuses traditions, et nous devons choisir laquelle suivre."
 sarhalevents.3.a:0 "Chamans Démoniaques"
 sarhalevents.3.b:0 "Voie du Fer"
 sarhalevents.3.c:0 "Démons du Chagrin"
 sarhalevents.3.dd:0 "Lignées Monstrueuses"
 sarhalevents.3.e:0 "Enfants de Goxma"
 sarhalevents.3.f:0 "Kulte de la Mère-Meute"
 sarhalevents.3.g:0 "Pactes Ombreux"
 sarhalevents.3.h:0 "Voie des Os"

 sarhalevents.4.title:0 "Le bon Jelli pour la tâche"
 sarhalevents.4.desc:0 "Les brumes matinales s'élèvent encore des berges du fleuve lorsque la nouvelle parvient au palais princier : la convocation annuelle des Jelli à l'Arbre des Contes s'est achevée. De nombreux récits ont été partagés, et une pléthore de nouveaux poèmes et chansons se répandront dans toute la Fangaula dans les mois à venir. Et avec elle, la dernière promotion d'étudiants du Yirisunsiir a terminé son apprentissage et est devenue maître conteur à part entière. Parmi eux, un prodige a attiré l'attention des officiels de la cour, qui font pression pour s'assurer rapidement ses services avant qu'il n'attire l'attention de cours rivales qui pourraient bien nous surenchérir pour gagner sa loyauté."
 sarhalevents.4.a:0 "Qu'il conte les récits d'Aro Makaya, Kanhati et des autres grands esprits totems !"
 sarhalevents.4.b:0 "À la réflexion, nous manquons quelque peu de divertissement."
 sarhalevents.4.c:0 "Peut-être serait-il encore mieux d'avoir un émissaire qui parle en notre nom aux seigneurs étrangers ?"
 sarhalevents.4.d:0 "Ou nous servirait-il mieux en écoutant quand des hommes plus imprudents parlent ?"

 sarhalevents.5.title:0 "Rassembler les étudiants comme des perles sur un fil"
 sarhalevents.5.desc:0 "Alors qu'autrefois d'autres écoles de la tradition Jelli auraient pu contester la primauté de l'Arbre des Contes, désormais grâce à nos efforts continus, le Yirisunsiir est le cœur incontesté de l'art Jelli et se voir offrir l'opportunité d'y étudier est le rêve de nombreux aspirants Jelli. Des plateformes et escaliers de bois laissés à pourrir dans le climat humide ont été restaurés, de nouvelles salles d'enseignement ont été construites et des structures autrefois ordinaires ont été ornées de sculptures délicates et de mosaïques de nacre saisissantes. Nous avons maintenant le choix parmi les Jelli les plus talentueux à recruter pour notre service."
 sarhalevents.5.a:0 "Notre peuple pourrait bénéficier d'un rappel des fondements de notre foi."
 sarhalevents.5.b:0 "Le peuple réclame des histoires de royaumes lointains et des récits de héros de notre passé."
 sarhalevents.5.c:0 "Nous avons besoin de quelqu'un pour répandre des récits de notre puissance et de notre bienveillance aux quatre coins des terres."
 sarhalevents.5.d:0 "Traversant de nombreuses terres et accueilli dans de nombreux foyers, un Jelli fait un excellent espion."
 sarhalevents.5.e:0 "En ces temps incertains, nous utiliserons la magie pour naviguer en toute sécurité dans les eaux troubles de demain."

 sarhalevents.6.title:0 "Les Vents murmurent de nombreux Contes Merveilleux"
 sarhalevents.6.desc:0 "C'est fait ! Après de nombreuses années de labeur et d'efforts, le Yirisunsiir est passé d'un simple lieu de rassemblement pour conteurs itinérants à non seulement le cœur incontesté de la tradition Jelli, mais aussi un symbole de coopération pacifique dans tout le Sarhal occidental. Chaque fois qu'il y a besoin d'un lieu de sommet pour trouver des solutions pacifiques à des conflits latents, l'Arbre des Contes et avec lui la ville de Jirad sont le premier choix évident. Et avec chaque nouveau Jelli quittant les salles d'enseignement et les scènes du Yirisunsiir pour le vaste monde, sa réputation ne fait que grandir. Et tout comme les oiseaux tels que la cigogne voyagent au loin pour revenir chaque année, les bardes Jelli se rassemblent en nombre toujours croissant chaque année pour partager les derniers contes merveilleux de terres lointaines. Il n'est que juste que nous puissions obtenir les services des plus talentueux d'entre eux pour servir nos propres ambitions."
 sarhalevents.6.a:0 "Notre peuple a un besoin désespéré de guidance spirituelle pour apaiser ses esprits."
 sarhalevents.6.b:0 "Que notre cour devienne un centre célébré de poésie et des arts !"
 sarhalevents.6.c:0 "La voix suave comme le miel du Jelli le plus accompli répandra les récits de notre gloire."
 sarhalevents.6.d:0 "Ce qu'il faut, c'est un maître tisseur de toiles pour recueillir les secrets des amis comme des ennemis."
 sarhalevents.6.e:0 "Un maître de la magie Langue-de-Lumière est nécessaire pour assurer la prospérité continue de notre royaume."

 shadowtree_purified_tt:0 "L'arbre-monde de la Matriarche Racine-d'Ombre au centre du Marais-des-Ombres a été libéré du contrôle de la Guenaude et purifié"

 #Coven's Bargain: 20-33 written by De Sterrennacht, 34 and 35 written by Scamp
 sarhalevents.20.t:0 "Marché du Sabbat : Le Prêt"
 sarhalevents.20.d:0 "Vous vous tournez et retournez dans vos appartements. Vous n'avez pas réussi à dormir depuis ce qui semble être une éternité ; l'état de [Root.Country.GetName] a consumé non seulement vos moments d'éveil, mais aussi vos moments de sommeil. Vous aimeriez pouvoir dire que c'était entièrement hors de votre contrôle, mais vous savez que ce n'est pas vrai. C'est votre faute, et maintenant [Root.Country.GetName] est au bord de la faillite.\n\nVous sombrez dans le sommeil et vous retrouvez dans un marécage empli de brume. Votre souffle se bloque lorsque vous reconnaissez les plantes ; c'est le Marais-des-Ombres. Vous plissez les yeux et voyez un éclat doré au loin. Quelque chose en vous prend le dessus, une avidité primitive, et vous vous précipitez vers le faible éclat, courant jusqu'à voir un énorme rocher d'or massif devant vous. Vous vous émerveillez de sa taille. Si seulement vous pouviez l'emporter hors du rêve, alors toutes les dettes de [Root.Country.GetName] seraient résolues. Mais cela ne peut pas être aussi facile, n'est-ce pas ?\n\n« Et si c'était aussi facile ? » entendez-vous quelqu'un murmurer. « Et si vous pouviez simplement prendre l'or, et tout irait mieux ? Cela ferait-il mal d'essayer ? »"
 sarhalevents.20.a:0 "Quelque chose cloche"
 sarhalevents.20.b:0 "Prendre l'or"
 sarhalevents.21.t:0 "Marché du Sabbat : L'heure de payer"
 sarhalevents.21.d:0 "Vous vous allongez dans vos appartements et souriez. Jour pour jour, il y a cinq ans, vous vous êtes réveillé d'un rêve dont vous vous souvenez à peine, et toutes les dettes de [Root.Country.GetName] étaient résolues. Vous ne comprenez pas entièrement comment, mais chaque créancier a simplement... oublié. Vous avez vérifié les registres financiers du pays et n'avez trouvé que des profits soigneusement consignés et une bonne gestion financière là où des dettes ruineuses auraient dû être griffonnées dans le désespoir. Ce soir, comme chaque soir depuis cinq ans, vous dormez paisiblement.\n\nVous ouvrez les yeux et vous retrouvez à nouveau dans le Marais-des-Ombres. Vous regardez autour de vous, mais ne voyez aucun éclat doré. Puis vous essayez de faire un pas, et vos jambes refusent de bouger.\n\nVous regardez en bas. Vos jambes sont emprisonnées dans de l'or massif.\n\nVous entendez un ricanement lointain, et la même voix d'il y a cinq ans parle. « À cause de votre incompétence, un prêt vous a été offert par moi-même, Ilfanill Tisseuse-de-Ténèbres. Les prêts, vous connaissez bien, j'en suis certaine. Votre créancière est venue collecter. Je réclame la prospérité des trois dernières années seulement ; un prix très juste, n'est-ce pas ? En guise d'intérêts, j'exige également toute la prospérité future de votre nation. Sévère, mais le prêt a été offert au débiteur le moins fiable que j'aie jamais vu ! Et, bien sûr, si vous faites défaut, je reprendrai tout ce que je vous ai donné. Je suis sûre que vos anciens créanciers ne seront pas ravis de revoir ces dettes. »"
 sarhalevents.21.a:0 "Je ne vendrai pas l'avenir de [Root.Country.GetName] !"
 sarhalevents.21.b:0 "Payer vos dettes"
 sarhalevents.22.t:0 "Marché du Sabbat : Un intrus"
 sarhalevents.22.d:0 "Avec les troubles qui secouent [Root.Country.GetName], vos conseillers vous ont suggéré de barricader les portes de votre domaine ; vous avez pris ce conseil à cœur. Un jour, alors que vous arpentez votre hall d'entrée, vide de pétitionnaires et rempli de gardes, vous entendez un craquement sur votre porte d'entrée. Puis un autre. Puis un autre, puis un autre, puis votre porte vole en éclats. Vos gardes sursautent, et une silhouette massive encapuchonnée franchit l'ouverture où se trouvait autrefois votre porte. Elle parle d'une voix tonitruante tandis que vos gardes tremblent de peur. « Je peux vous apporter la paix. Je peux tuer vos ennemis, écraser les traîtres, étouffer la sédition. Oui ou non ? »"
 sarhalevents.22.a:0 "Non"
 sarhalevents.22.b:0 "Oui"
 sarhalevents.23.t:0 "Marché du Sabbat : Une livre de chair"
 sarhalevents.23.d:0 "Vous êtes assis dans vos appartements. Vos conseillers vous ont dit que les troubles qui tourmentaient votre pays montrent des signes de recommencement. Les traîtres au sein de [Root.Country.GetName] s'arment, et votre règne est contesté à chaque tournant. Vous entendez un craquement à la fenêtre de votre chambre, puis une forte détonation, et vous bondissez, voyant la silhouette encapuchonnée d'il y a cinq ans grimper par la fenêtre. Elle rabat sa capuche et révèle son visage ; c'est Hireet Défense-Fumeuse, l'une des trois guenaudes de Yezel Mora, et son sourire vous terrifie encore plus que sa taille... « Le pendule oscille à nouveau. Ce que j'ai fait pour vous mènera à plus de troubles, encore pires qu'avant. À moins que vous ne payiez le prix. Une livre de chair de chaque enfant de [Root.Capital.GetName], et votre allégeance éternelle. » Elle se lèche les babines et sourit encore plus largement. « Et quelques morceaux de choix pour moi-même. »"
 sarhalevents.23.a:0 "Je n'ai pas besoin de votre aide à nouveau !"
 sarhalevents.23.b:0 "Se convertir au Pacte des Ombres"
 sarhalevents.24.t:0 "Marché du Sabbat : Neuf mois après"
 sarhalevents.24.d:0 "Vous soupirez. Vos courtisans vous ont traîné à cette fête, avec des nobles de tout le royaume et de nombreux membres de votre propre famille présents. Votre absence d'héritier les inquiète, et ils vous supplient chaque jour d'avoir un enfant, ou de désigner un parent. Mais vous ne voulez pas d'enfant, et tous vos parents sont des sycophantes idiots inaptes à gouverner [Root.Country.GetName]. Vous êtes resté dans un coin, repoussant les demandes de conversation ou de danse de parents avides de pouvoir et de jeunes femmes séduisantes. Puis vous la voyez ; la plus belle femme que vous ayez jamais vue, s'approchant de vous. Elle tend le bras et demande une danse, et vous savez que vous êtes tombé amoureux. Vous passez le reste de la nuit à la connaître dans tous les sens possibles. Quand vous vous réveillez, cependant, elle a disparu.\n\nTout cela s'est passé il y a neuf mois. Aujourd'hui, juste devant vos appartements, vous la voyez, portant un nourrisson, et vous reconnaissez ses yeux comme les vôtres."
 sarhalevents.24.a:0 "Je ne peux pas élever cet enfant, disparaissez !"
 sarhalevents.24.b:0 "Faire de lui mon héritier, et d'elle ma reine"
 sarhalevents.25.t:0 "Marché du Sabbat : Pendu"
 sarhalevents.25.d:0 "[Root.Monarch.GetName] a été trouvé mort dans ses appartements aujourd'hui, pendu à un nœud coulant qu'il avait lui-même attaché. Sa consort et son héritier ont mystérieusement disparu, ne laissant rien derrière eux, et des rumeurs commencent à se répandre qu'ils en seraient d'une certaine manière responsables. La cour est dans le chaos, et un cousin éloigné a été nommé au trône."
 sarhalevents.25.a:0 "Voilà qui augure mal..."
 sarhalevents.26.t:0 "Marché du Sabbat : Consort et héritier disparus"
 sarhalevents.26.d:0 "Après la mort de votre monarque, sa consort et son héritier ont mystérieusement disparu, ne laissant rien derrière eux, et des rumeurs commencent à se répandre qu'ils en seraient d'une certaine manière responsables. La cour est dans le chaos, et un cousin éloigné a été nommé au trône."
 sarhalevents.26.a:0 "Voilà qui augure mal..."
 sarhalevents.27.t:0 "Marché du Sabbat : Le retour de l'héritier"
 sarhalevents.27.d:0 "Le garçon qui se tient devant vous a les yeux de son père. Cela rend la haine avec laquelle il vous fixe encore plus désorientante. « Je suis le légitime [Root.Monarch.GetTitle] de [Root.Country.GetName], et je suis venu réclamer mon droit de naissance », dit-il. « J'ai des milliers d'hommes prêts à combattre pour moi. Donnez-moi le trône, ou je le prendrai. »\n Vous jetez un regard furtif à sa mère dans le coin. Elle est flanquée d'hommes armés, et elle sourit à son fils. Elle a abandonné le déguisement qu'elle a utilisé pour séduire son père, et vous la reconnaissez comme la guenaude Komina Murmure-de-Faille, l'une des souveraines de Yezel Mora. Vous ne doutez pas que son fils obéit à chacun de ses ordres. Si vous lui donnez le trône, il suivra ses sombres desseins."
 sarhalevents.27.a:0 "Il a fui la nation, ce trône n'est pas le sien à prendre !"
 sarhalevents.27.b:0 "Abdiquer en faveur du légitime [Root.Monarch.GetTitle]"
 sarhalevents.28.t:0 "Marché du Sabbat : Un rêve"
 sarhalevents.28.d:0 "Vous êtes inapte à gouverner. Vous le savez. Quelqu'un aurait dû trouver un candidat plus approprié avant que vous ne deveniez [Root.Monarch.GetTitle], mais personne ne l'a fait, et maintenant vous avez l'impression de gouverner le pays en somnambule. Vos conseillers ne peuvent cacher leur dédain pour vous. Ce n'est qu'une question de temps avant que votre incompétence ne mène à votre mort, et vous jurez entendre des pas à chaque coin de rue.\n\nCette nuit, vous rêvez d'une main qui vous est tendue, et vous savez d'une certaine manière que si vous prenez cette main, vous n'aurez plus à vous soucier de votre incompétence."
 sarhalevents.28.a:0 "Refuser"
 sarhalevents.28.b:0 "Prendre la main"
 sarhalevents.29.t:0 "Marché du Sabbat : L'engloutissement"
 sarhalevents.29.d:0 "La sensation de chuter lentement vous réveille en sursaut. Vous regardez autour de vous et vous voyez en train de sombrer dans une boue noire, vos jambes déjà sous la surface. Vous luttez, mais ne trouvez aucune prise, et ne faites que vous enfoncer davantage. Finalement, seuls votre tête et un bras tendu restent au-dessus de la boue. Un frisson vous parcourt l'échine lorsque vous réalisez que vous pouvez sentir votre intelligence s'écouler à mesure que vous vous enfoncez.\n\nUne femme âgée apparaît, marchant sur la boue noire comme si c'était du solide. Vous la reconnaissez comme la guenaude nocturne Tisseuse-de-Ténèbres. Elle rit. « Vous souvenez-vous quand vous avez pris une main dans vos rêves il y a toutes ces années, et que votre incompétence a disparu ? C'était la mienne. Maintenant, prenez ma main à nouveau et je vous tirerai de là, si vous promettez de me servir pour toujours. »"
 sarhalevents.29.a:0 "Refuser sa main, et sombrer sous la boue"
 sarhalevents.29.b:0 "Prendre sa main et vous en extraire"
 sarhalevents.30.t:0 "Marché du Sabbat : Une visite nocturne"
 sarhalevents.30.d:0 "Le chaos règne dans votre nation. Deux hommes côte à côte dans la rue ont peu de chances de prier les mêmes dieux, et votre État est tiraillé de toutes parts sur les questions de foi. Une nuit, une jeune femme séduisante apparaît dans vos appartements. « Je peux unir votre peuple », promet-elle. « Le chaos que vous voyez deviendra ordre. Ils adoreront tous au même autel. Qu'en dites-vous ? »"
 sarhalevents.30.a:0 "La congédier"
 sarhalevents.30.b:0 "Accepter son offre"
 sarhalevents.31.t:0 "Marché du Sabbat : Idolâtrie"
 sarhalevents.31.d:0 "La jeune femme a d'une certaine manière convaincu les hommes de tout votre pays de cesser leurs combats et d'ériger des idoles à la même figure : elle. Ils vénèrent tous à ses pieds. Aujourd'hui, vous avez appris qu'une bagarre a éclaté sur un marché près de [Root.Capital.GetName] à propos de sa faveur, et il y a des rumeurs que les choses vont empirer. Deux de vos gardes se battent dans votre propre hall à cause d'un clin d'œil qu'elle a offert à l'un d'eux et pas à l'autre. Elle a choisi de visiter vos appartements ce soir, et vous pouvez entendre vos conseillers murmurer derrière votre porte que vous ne méritez pas sa faveur. Elle fait la moue de mécontentement et s'assoit sur votre lit. « Tout le monde dans ce pays prie vers moi sauf vous. De quoi donner à une fille l'impression de n'être pas désirée. » Elle s'allonge, et vous sentez soudain vos jambes devenir plus lourdes. « Mettez-vous à genoux et priez, ou je les ferai se battre à mort pour moi. »"
 sarhalevents.31.a:0 "Rejeter cette fausse déesse et libérer votre pays de son lavage de cerveau !"
 sarhalevents.31.b:0 "S'agenouiller devant votre déesse"
 sarhalevents.32.t:0 "Marché du Sabbat : La gnoll massive"
 sarhalevents.32.d:0 "Les rapports de vos gouverneurs régionaux sont préoccupants. Les impôts ne sont tout simplement pas payés. Les fermiers locaux ne livrent pas leurs quotas de récolte, les propriétaires terriens locaux ne vous paient pas d'argent et les nobles locaux ne vous aident pas à résoudre cela. Une nuit, alors que vous marchez dans votre capitale et vous concentrez sur le seul endroit qui respecte encore votre autorité, vous voyez une gnoll massive du coin de l'œil. Elle s'approche de votre entourage et parle. « Je peux faire en sorte que votre peuple vous écoute à nouveau. Ne demandez pas comment, répondez-moi simplement. Accepterez-vous mon aide ou non ? »"
 sarhalevents.32.a:0 "Vous pouvez gérer cela vous-même !"
 sarhalevents.32.b:0 "Accepter son aide"
 sarhalevents.33.t:0 "Marché du Sabbat : Les enfants fermiers"
 sarhalevents.33.d:0 "Votre peuple ne vous a pas tous obéi parfaitement. Cependant... leurs enfants, si. Organisés comme des experts, les enfants ont commencé à payer les impôts pour leurs familles. Ils livrent grain, viande, métal et or aux gouverneurs locaux. C'est troublant, pour dire le moins ; encore plus troublant est que cela semble fonctionner.\n\nUne nuit, vous tombez sur la même gnoll d'il y a des années. Elle sourit, et ses traits se transforment jusqu'à ce que vous reconnaissiez la guenaude Hireet Défense-Fumeuse, l'une des trois guenaudes de Yezel Mora. « Les enfants de [Root.Country.GetName] ne vous obéissent pas. Ils m'obéissent à moi. Jurez de m'obéir, et je relâcherai mon emprise. Refusez, et je leur ferai brûler les champs, saler la terre, puis tuer leurs parents. »"
 sarhalevents.33.a:0 "Je ne servirai pas un monstre comme vous !"
 sarhalevents.33.b:0 "Lui dire que vous, et votre nation, êtes siens."
 sarhalevents.34.t:0 "Marché du Sabbat : Un pacte avec les Ombres"
 sarhalevents.34.d:0 "Là où elle marchait, les ombres suivaient. Le sol sous ses pieds devenait noir de suie. Flanquée d'une paire d'hommes lourdement armés n'ayant que des ombres pour yeux, elle marchait comme si aucun garde ne la voyait. Vous saviez que vous ne deviez pas écouter ses paroles. Aucun marché avec une créature si ignoble ne pourrait jamais être en votre faveur.\n\nPourtant, dans cette crise actuelle, pouvait-on se permettre de refuser son offre ? Elle promettait de fournir d'innombrables soldats pour nous aider, chacun avec pour seul objectif de consolider votre contrôle sur la nation. Elle les appelait ses Soldats des Ombres, et promettait qu'ils n'obéiraient jamais. Laissez passer cette chance, et vous pourriez perdre tout pouvoir tandis que vos terres sombrent dans l'anarchie."
 sarhalevents.34.a:0 "Je ne conclurai jamais de marché avec une guenaude !"
 sarhalevents.34.b:0 "J'utiliserai tous les moyens nécessaires pour maintenir le contrôle"
 sarhalevents.35.t:0 "Marché du Sabbat : La révolte des Ombres"
 sarhalevents.35.d:0 "Les Soldats des Ombres étaient devenus essentiels au gouvernement du royaume au cours des cinq dernières années. Ils suivaient les ordres sans poser de questions, quelle que soit la tâche macabre ou dangereuse qui leur était assignée. Leurs yeux ombreux ne vous effrayaient plus. Leur présence représentait stabilité et pouvoir, un pouvoir que vous contrôliez.\n\nMais plus maintenant. Un jour, au coucher du soleil, chaque Soldat des Ombres se retourna d'un coup et poignarda la personne la plus proche. Puis la suivante. Puis la suivante. La plupart d'entre eux étant intégrés à l'armée, cela décima nos effectifs, laissant l'armée paralysée du jour au lendemain. La poignée de gardes non-ombreux avait barricadé la porte de vos appartements, et les sons de violence s'éloignaient. Les remplaçant venaient les sons de pas lents, rampant toujours plus près, chaque pas éteignant une autre bougie dans la pièce.\n\nQuand la dernière bougie s'éteignit, les portes s'ouvrirent grand, et cette créature des ténèbres entra en traînant les pieds. Cela faisait cinq ans qu'elle n'était pas entrée dans ce domaine, mais vos recherches pendant ce temps signifiaient que vous connaissiez maintenant son nom : Hireet Défense-Fumeuse. Une Guenaude Nocturne du sabbat de Yezel Mora. Elle ricana et pointa un doigt verruqueux vers vous. « Je suis venue recevoir mon paiement. Soit vous concluez un pacte avec les ombres, soit mes soldats continueront leur saccage jusqu'à ce que j'aie vu assez de souffrance. »"
 sarhalevents.35.a:0 "Maudite sois-tu Défense-Fumeuse ! Quitte ces lieux !"
 sarhalevents.35.b:0 "Je me soumets à vous. Rappelez vos soldats"
 sarhalevents.111.t:0 "Marché du Sabbat : Gestionnaire d'événements"
 sarhalevents.111.d:0 "Vous ne devriez pas voir ceci"
 sarhalevents.111.a:0 "Veuillez mentionner @meander__ dans le rapport de bug"


 sarhalevents.300.t: "Choisissez votre divinité"
 sarhalevents.300.d: "À l'ombre du majestueux Khus an Zhyani, notre [Root.Monarch.GetTitle] a convoqué un conseil des nagas les plus éminents et les plus sages de tout Taneyas pour discuter de quelle philosophie devrait guider nos futurs efforts."
 sarhalevents.300.a: "Retour"
 sarhalevents.300.b: "Le Souverain"
 sarhalevents.300.c: "La Tempête"
