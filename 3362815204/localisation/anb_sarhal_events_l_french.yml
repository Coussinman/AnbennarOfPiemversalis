 sarhalevents.301.t: "La Fausse Flèche"
 sarhalevents.301.d: "Cela a commencé par un grondement profond. Après de nombreuses expériences infructueuses pour découvrir la vérité de la flèche de Shalazar, quelque chose avait clairement changé avec cette dernière tentative. La flèche elle-même semblait se déplacer, miroitant au soleil comme si elle luttait pour rester tangible. Une face de la flèche commença à s'effacer de l'existence, révélant derrière elle une écriture ancienne qui commença à se transformer en script lisible devant la foule choquée.\n\n« Merci infiniment de m'avoir prêté sans le savoir votre flèche sacrée.\nVous pouvez la récupérer à son emplacement actuel dans le Plan de Terre... bien que je doute que même votre espèce puisse se métamorphoser en quelque chose capable de supporter ses pressions.\nJ'espère que vous avez apprécié cette réplique en attendant. »\n\nAlors que le lettrage s'effaçait, la colossale flèche commença à se tordre et à se plier de manières contre nature. Des sections de la structure apparaissaient et disparaissaient de la vue, grinçant et gémissant alors que des parties cédaient sous elles.\n\nFinalement, avec un gémissement atrocement fort, la flèche entière céda. La structure entière commença à basculer vers la cité de Shalazar, et le peuple se prépara au pire... mais les blocs disparurent avant de toucher le sol, évitant toute destruction sur la cité. Pendant un moment, la cité entière poussa un soupir de soulagement... puis le véritable cauchemar commença.\n\nLà où la flèche se dressait autrefois, un portail géant et tournoyant tourbillonnait lentement. D'étranges créatures commencèrent à ramper et à voler hors de sa gueule : des élémentaires de terre, des coques gigantesques faites de goudron et de charbon. Bien que l'invasion des élémentaires par le portail se soit calmée en quelques heures, il fallut des semaines pour que les derniers d'entre eux cessent de semer la destruction à travers Odu Kherass."
 sarhalevents.301.a: "C'était un faux !?!"

 sarhalevents.302.t: "Sous l'Ananoma"
 sarhalevents.302.d: "La flèche qui se dresse au centre de l'ancienne citadelle-ruche halfeline a toujours dominé la région, et nous avons toujours su qu'elle s'étendait sous le sol. Mais ce que personne n'aurait pu réaliser, c'est que la section visible au-dessus du sol ne comprend qu'une infime partie de la flèche. Ses nombreux étages semblent plonger à une profondeur au moins cinq fois supérieure à celle de la structure hors-sol, et peut-être encore plus.\n\nÉtage après étage de trésors et d'artefacts de civilisations Vyzemby et Homme-lézard disparues depuis longtemps gisent maintenant prêts à être cueillis. Le déblaiement des premiers étages s'est déjà avéré une opération chronophage, en raison des nombreux pièges et des anciennes barrières magiques en place. Mais la réalisation que nous n'en sommes qu'à une fraction de l'excavation de cette ancienne structure a déclenché une ruée vers l'or pour voir quels autres trésors ses ruines pourraient receler."
 sarhalevents.302.a: "Qu'on m'apporte ma pelle"

 sarhalevents.303.t: "Les Ruines de Kazakesh"
 sarhalevents.303.d: "Alors que les excavateurs creusent plus profondément dans la flèche géante de Kazakesh, il devient clair qu'il ne s'agissait pas simplement d'une ancienne citadelle halfeline. C'était autrefois le centre d'une civilisation homme-lézard ancienne et significativement plus avancée. Bien que leur niveau technologique ne semble pas avoir été beaucoup plus élevé que le nôtre, ils avaient de toute évidence réalisé des avancées magiques qui surpassent ce que nos plus grands esprits pourraient rêver."
 sarhalevents.303.a: "Continuez à creuser !"

 sarhalevents.304.t: "Installation de recherche précurseur"
 sarhalevents.304.d: "Ces dernières semaines, les excavateurs au fond de Kazakesh avaient commencé à entendre quelque chose de nouveau. Un bourdonnement sourd pouvait être entendu à travers la roche, le sol et les diverses barrières magiques érigées à chaque étage de la flèche engloutie. Certains ont même abandonné l'opération, de peur qu'au fond ne se trouve une sorte de dieu homme-lézard vengeur, furieux contre l'équipe pour avoir troublé son lieu de repos.\n\nAu lieu de cela, ce qui fut trouvé était quelque chose de complètement inattendu de ce côté de la Complainte d'Uelos : des reliques Précurseurs ! De multiples étages, jusqu'au tout dernier étage de la flèche entière, étaient garnis d'équipements de recherche et de dispositifs magiques des âges des Elfes Précurseurs. Sauf que cela n'expliquait pas toute l'histoire, car à côté de toutes les reliques précurseurs se trouvaient des reliques similaires d'une ancienne civilisation homme-lézard. Il semble que les deux aient travaillé ensemble sur quelque chose dans cette structure.\n\nLa découverte a soulevé plus de questions que de réponses. Pourquoi y avait-il des précurseurs à Sarhal ? Pourquoi travaillaient-ils côte à côte avec des hommes-lézards ? Essayaient-ils eux aussi de percer les mystères de cette ancienne flèche ? La découverte a déjà bouleversé de nombreuses théories populaires sur la société précurseur et homme-lézard ancienne, et des recherches supplémentaires pourraient bien nous laisser avec encore plus de questions."
 sarhalevents.304.a: "J'ai tellement de questions"

