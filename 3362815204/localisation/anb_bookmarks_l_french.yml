 CANNOR_NAME:0 "ТЃbookmark_cannorТЃ"
 CANNOR_DESC:0 "Cannor                                                                                                ТЃicon_new_playerТЃ ТЇGRecommandУЉ pour les joueurs qui dУЉcouvrent cet univers.ТЇ! \n\nТЃbookmark_race_humanТЃТЃbookmark_race_elvenТЃТЃbookmark_race_halflingТЃТЃbookmark_race_dwarvenТЃТЃbookmark_race_gnomishТЃТЃbookmark_race_koboldТЃТЃbookmark_race_trollТЃТЃbookmark_race_gnollishТЃ\n    ТЃbookmark_separatorТЃ\nUne annУЉe s'est УЉcoulУЉe depuis la fin des Guerres Lilas, guerre dynastique de succession entre le Grand-DuchУЉ impУЉrial de DamУЉrie et son voisin, le Royaume de Lorent. Lorent se tient УЉpuisУЉ mais victorieux, grУЂce У  la trahison des ennemis damУЉriens par leurs propres alliУЉs impУЉriaux, tels le Grand-Duc de Wex, qui occupe dУЉsormais le trУДne impУЉrial. L'УЉquilibre des puissances est rompu et de nouveaux dУЉfis se profilent, mais le rУЊve d'Anbennar, celui de l'unitУЉ, sera-t-il enfin rУЉalisУЉ, ou Cannor sombrera-t-il une fois encore dans le chaos ?"

 ESCANN_NAME:0 "ТЃbookmark_escannТЃ"
 ESCANN_DESC:0 "Escann                                                                       ТЃicon_veteranТЃ ТЇYRecommandУЉ pour les vУЉtУЉrans d'EU4 en quУЊte d'une expУЉrience unique.ТЇ!\n\nТЃbookmark_race_humanТЃТЃbookmark_race_orcishТЃТЃbookmark_race_goblinТЃТЃbookmark_race_elvenТЃТЃbookmark_race_dwarvenТЃТЃbookmark_race_halflingТЃ\n    ТЃbookmark_separatorТЃ\nPendant vingt ans, les clans orques ont ravagУЉ les terres d'Escann, anУЉantissant les royaumes chevaleresques qui avaient succУЉdУЉ У  l'ancien Castanor, le plus grand empire humain de l'histoire. Aujourd'hui, la mort de Korgus, le chef de guerre orque, inaugure une УЈre nouvelle : des aventuriers venus de tout Cannor parcourent l'Escann en quУЊte de richesses, de gloire et d'aventure, inspirУЉs par Corin, l'aventuriУЈre devenue dУЉesse qui terrassa le seigneur de guerre orque. Les royaumes d'antan renaУЎtront-ils, ou les terres de Castanor deviendront-elles le berceau de nouveaux royaumes, tant humains qu'orques ?"

 DWAROVAR_NAME:0 "ТЃbookmark_serpentspineТЃ"
 DWAROVAR_DESC:0 "L'Уchine-du-Serpent                                                         ТЃicon_veteranТЃ ТЇYRecommandУЉ pour les vУЉtУЉrans d'EU4 en quУЊte d'une expУЉrience unique.ТЇ!\n\nТЃbookmark_race_dwarvenТЃТЃbookmark_race_goblinТЃТЃbookmark_race_orcishТЃТЃbookmark_race_koboldТЃТЃbookmark_race_ogreТЃ\n    ТЃbookmark_separatorТЃ\nLa MarУЉe Verte fut un dУЉsastre pour l'Escann, mais pour les nains et les gobelins de l'Уchine-du-Serpent occidentale, elle reprУЉsenta une occasion unique. Le dУЉpart massif des orques vers la surface a crУЉУЉ un vide de pouvoir dans le Dwarovar. Les gobelins se libУЈrent des chaУЎnes de leurs anciens maУЎtres esclavagistes orques, tandis que des nains, tant de la surface que des bastions subsistants, cherchent У  reconquУЉrir ce qu'ils ont perdu jadis. У l'est, les gobelins se taillent des domaines dans l'Arbre-de-Pierre, У  l'ombre du puissant Commandement hobgobelin."

 BULWAR_NAME:0 "ТЃbookmark_bulwarТЃ"
 BULWAR_DESC:0 "Le Bulwar\n\nТЃbookmark_race_elvenТЃТЃbookmark_race_humanТЃТЃbookmark_race_gnollishТЃТЃbookmark_race_harpyТЃТЃbookmark_race_goblinТЃТЃbookmark_race_dwarvenТЃ\n    ТЃbookmark_separatorТЃ\nLes tУЉnУЈbres s'УЉtendent sur la terre du Soleil, car les royaumes des Elfes Solaires sont trop affaiblis pour dУЉfendre leurs domaines contre les assauts renouvelУЉs d'ennemis anciens et nouveaux : les gnolls adorateurs de dУЉmons envahissent depuis le dУЉsert, les royaumes harpies restaurУЉs guettent depuis les collines et les tribus gobelines grouillent depuis les montagnes. Au milieu du chaos, leurs sujets humains commencent У  remettre en cause leurs capacitУЉs, tandis qu'une foi nouvelle se lУЈve dans les sables de l'est. Les Elfes Solaires parviendront-ils У  restaurer l'Empire du PhУЉnix, ou un nouvel empire naУЎtra-t-il de ses cendres ?"

 RAHEN_NAME:0 "ТЃbookmark_rahenТЃ"
 RAHEN_DESC:0 "Le Rahen\n\nТЃbookmark_race_hobgoblinТЃТЃbookmark_race_harimariТЃТЃbookmark_race_humanТЃТЃbookmark_race_ogreТЃТЃbookmark_race_harpyТЃ\n    ТЃbookmark_separatorТЃ\nAutrefois habitУЉ par les seuls humains, le Rahen est gouvernУЉ par les harimari, peuple fУЉlin У  l'allure de tigre, depuis leur ascension lors du Jour-des-Cieux-CendrУЉs, leur empire n'ayant УЉtУЉ briУЈvement interrompu que par les conquУЊtes de Jaher. La souverainetУЉ indigУЈne fut rУЉtablie sous le Dhenijanraj, dУЉsormais une puissance dУЉclinante dont les vassaux tels Rabaghekhur et Buhaanjirghal tirent sur leurs chaУЎnes. Au nord, Rajnadhaga rУЉsiste У  l'invasion du Commandement hobgobelin, tandis que les ogres reclus d'Azjakuma complotent pour tirer le meilleur parti du chaos raheni. Plus У  l'est, Jianglusi, chef nominal des moines Xia, et le Roi-Dragon de Bianfang tournent leurs regards vers une lutte pour leur survie mУЊme."

 HALESS_NAME:0 "ТЃbookmark_halessТЃ"
 HALESS_DESC:0 "Haless\n\nТЃbookmark_race_humanТЃТЃbookmark_race_harimariТЃТЃbookmark_race_koboldТЃТЃbookmark_race_dwarvenТЃ\n    ТЃbookmark_separatorТЃ\nL'УЈre du PhУЉnix est depuis longtemps rУЉvolue, et les seigneurs de guerre de Haless prospУЈrent dans le chaos bУЉant qui subsiste. Les nombreux royaumes humains et harimari du Yanshen jouissent d'une brУЈve pУЉriode de paix, inconscients de la menace grandissante de la Reine sans Visage et de ses hordes d'oiseaux de terreur УЉmergeant des steppes septentrionales. У l'ouest, les monastУЈres retirУЉs des Xia se replient aprУЈs une dУЉfaite УЉcrasante face aux hobgobelins, cherchant le moindre espoir de rУЉsister У  la menace imminente du Grand Commandement. Et au sud gУЎt l'empire brisУЉ de Baihon Xinh, qui УЉchoue У  unir le peuple Kai et se trouve empУЊtrУЉ dans une guerre civile."

 FORBIDDEN_PLAINS_NAME:0 "ТЃbookmark_forbidden_plainsТЃ"
 FORBIDDEN_PLAINS_DESC:0 "Les Plaines-Interdites\n\nТЃbookmark_race_centaurТЃТЃbookmark_race_ogreТЃТЃbookmark_race_humanТЃ\n    ТЃbookmark_separatorТЃ\nUne invasion ratУЉe a laissУЉ la race centaure УЉparpillУЉe en hordes У  travers les plaines, les rУЉpubliques humaines unies autour des lacs par une cause commune, et les clans ogres prУЊts У  se rУЉaffirmer depuis leur vallУЉe. FragmentУЉs, ils sont oubliУЉs du monde, mais une fois rassemblУЉs, ils pourraient le faire trembler."

 NORTH_AELANTIR_NAME:0 "ТЃbookmark_north_aelantirТЃ"
 NORTH_AELANTIR_DESC:0 "Aelantir Septentrional\n\nТЃbookmark_race_ruinbornТЃ\n    ТЃbookmark_separatorТЃ\nLe Jour-des-Cieux-CendrУЉs anУЉantit l'ancienne patrie des elfes. Les survivants mutУЉs, les elfes NУЉs-des-Ruines, arpentent dУЉsormais les ruines hostiles d'un УЂge d'or magique. Des royaumes fУЉeriques de l'Уordande aux chevaliers fУЉodaux de l'Ynn, des chevaucheurs de vers des sables affrontant des horreurs sans bouche en Haraf aux tribus survivant tant bien que mal sur les rivages hantУЉs de la Mer-en-Ruines, seul le temps dira si les NУЉs-des-Ruines surmonteront l'apocalypse qui se lУЈve У  l'est, ou s'ils rejoindront leurs ancУЊtres dans l'anУЉantissement."

 SOUTH_AELANTIR_NAME:0 "ТЃbookmark_south_aelantirТЃ"
 SOUTH_AELANTIR_DESC:0 "Aelantir MУЉridional\n\nТЃbookmark_race_ruinbornТЃ\n    ТЃbookmark_separatorТЃ\nLa cruelle indiffУЉrence du destin УЉpargna aux elfes d'Aelantir mУЉridional le pire du Jour-des-Cieux-CendrУЉs. Les survivants УЉmergУЈrent dans un nouveau cauchemar inhospitalier. У l'ouest, des vents chargУЉs de mana infligent un cancer ruineux, tandis qu'У  l'est, les chants envoУЛtants de la jungle vivante d'Effelai asservissent les esprits, et au sud, des ambitions putrides poussent У  une guerre sans fin. Les elfes NУЉs-des-Ruines parviendront-ils У  se bУЂtir un foyer dans ce monde УЉtrange et nouveau, ou brУЛleront-ils tout pour n'en revendiquer que les cendres comme seul hУЉritage ?"

 WEST_SARHAL:0 "ТЃbookmark_west_sarhalТЃ"
 WEST_SARHAL_DESC:0 "Sarhal Occidental\n\nТЃbookmark_race_humanТЃТЃbookmark_race_gnollishТЃТЃbookmark_race_halflingТЃТЃbookmark_race_elvenТЃ\n    ТЃbookmark_separatorТЃ\nL'УЈre des gnolls est venue. La KhУЉtУЉrata est en ruines, scindУЉe en deux par le lУЉgendaire chef de meute Grizaka et les forces de Gnollakaz. У l'ouest gisent les vestiges du jadis puissant empire Fangaula, rival de la KhУЉtУЉrata, qui lui aussi a subi la fureur des hordes gnolles. Pour certains, nУЉanmoins, l'effondrement des anciens empires reprУЉsente une occasion У  saisir. Les halfelins Vyzemby, sur l'УЎle de Fahvanosy, lorgnent les forts cУДtiers d'Ananoma sur le continent qu'ils ont abandonnУЉ il y a bien longtemps. Les anciens sujets de la KhУЉtУЉrata se dУЉcouvrent indУЉpendants et libres de forger leur propre avenir. RebУЂtiront-ils les grands empires d'antan, ou traceront-ils un avenir nouveau ?"

 EAST_SARHAL:0 "ТЃbookmark_east_sarhalТЃ"
 EAST_SARHAL_DESC:0 "Sarhal Oriental\n\nТЃbookmark_race_humanТЃТЃbookmark_race_lizardfolkТЃТЃbookmark_race_trollТЃТЃbookmark_race_harpyТЃТЃbookmark_race_harimariТЃТЃbookmark_race_gnollishТЃ\n    ТЃbookmark_separatorТЃ\nC'est un УЂge sombre pour l'est de Sarhal. Les seigneurs de guerre Dakinshi sont enfermУЉs dans une sanglante guerre civile, l'empire des sauriens stagne et son effondrement semble inУЉvitable, tandis que des colonisateurs du Rahen se sont emparУЉs de la cУДte septentrionale en quУЊte de richesses et d'esclaves. Le plus grand mal de tous se tapit sous les mangroves monochromes du Marais-des-Ombres, oУЙ rУЉsident les SorciУЈres de l'Ombre. Pourtant, au-delУ  de ces tУЉnУЈbres brille une lueur d'espoir. Les sauriens Ashhana, maudits par la sombre magie du Marais-des-Ombres, ont trouvУЉ refuge dans les chants de leur foi. Les Baashidi au sud vivent leur УЂge d'or, avides d'explorer les ocУЉans et d'УЉtendre leurs frontiУЈres."

 SPAWNABLES_NAME:0 "ТЃbookmark_spawnablesТЃ"
 SPAWNABLES_DESC:0 "Nations formables\n\n    ТЃbookmark_separatorТЃ\nLes entreprises indУЉpendantes ont souvent faУЇonnУЉ l'histoire, qu'elles fussent menУЉes par des aventuriers comme Corin ou des visionnaires comme Castan le Fondateur. Entre les rumeurs selon lesquelles la lУЉgendaire patrie elfique d'Aelantir serait finalement accessible, et le constat que le dУЉpart massif des orques de l'Уchine-du-Serpent lors de la MarУЉe Verte ouvre aussi la voie У  la reconquУЊte des foyers ancestraux nains, de nombreuses entitУЉs УЉlaborent leurs propres plans. Compagnies de mercenaires, ordres saints, rУЉfugiУЉs, compagnies marchandes et colons idУЉalistes se prУЉparent У  partir vers l'ouest, tandis que des champions nains prennent pour la premiУЈre fois depuis des gУЉnУЉrations la route de l'est..."
