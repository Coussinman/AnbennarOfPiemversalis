 city_of_ideas_brasan:0 "L'Entrepôt du Bulwar"
 desc_city_of_ideas_brasan:0 "Brasan est la plus grande cité marchande du Bulwar, et peut-être de toute la mer Divenhal. Des négociants venus du sud de Cannor et du nord de Sarhal s'y rassemblent pour commercer avec les marchands du Bulwar, créant une atmosphère d'échange aussi bien mercantile qu'intellectuel. La connexion de la cité avec Port Jaher, en Cannor, est particulièrement remarquable. Ces deux villes sont en quelque sorte sœurs, de nombreux marchands possédant des résidences dans les deux. Ainsi, les idées nouvelles qui se répandent dans l'une gagnent rapidement l'autre."

 city_of_ideas_port_jaher:0 "Le Port Bulwari de Cannor"
 desc_city_of_ideas_port_jaher:0 "Port Jaher fut fondée il y a plusieurs siècles par le légendaire conquérant elfe solaire Jaher. La cité a toujours entretenu des liens étroits avec le Bulwar, et de nombreux marchands bulwari y établissent résidence temporaire ou permanente. Il en va de même pour les Busilari natifs, dont beaucoup possèdent des villas dans la cité portuaire bulwari de Brasan, où ils séjournent pour y conduire leurs affaires. L'importante communauté bulwari de Port Jaher et les liens tissés entre les deux cités les rendent plus proches que la géographie ne le suggérerait : idées nouvelles et mouvements sociaux circulent librement entre elles."

 city_of_ideas_davharral:0 "Le Grand Caravansérail"
 desc_city_of_ideas_davharral:0 "La petite cité portuaire de Davharral possède une importance qui surpasse de loin sa grandeur apparente. Davharral est la première étape des caravanes marchandes traversant le lointain Salahad depuis le Bulwar jusqu'au Rahen, apportant avec elles marchandises et idées exotiques. Les négociants de la ville ont bâti un commerce florissant autour de cela, veillant à ce que les marchands itinérants arrivent à bon port, qu'il faille pour cela une flotte ou une armée. La nature de cette liaison commerciale fait que les idées et informations nouvelles voyagent autant que les marchandises, faisant de Davharral le repaire de nombreux agents des seigneurs raheni en quête de nouvelles de l'ouest. Contrairement à maintes cités similaires, Davharral connaît son plus grand afflux d'affaires lorsque la saison des marchés décline, accueillant les marchands de retour de la cité bulwari de Sareyand, fraîchement enrichis de trésors et d'informations."

 city_of_ideas_sareyand:0 "Le Bazar de Sareyand"
 desc_city_of_ideas_sareyand:0 "Sareyand est la première étape au Bulwar pour les marchands raheni, servant de chambre de compensation pour les marchandises ensuite acheminées plus avant dans le Bulwar par les négociants locaux. Au plus fort de la saison des marchés, la cité devient un océan humain, et d'immenses campements de tentes s'érigent hors les murs pour accueillir les marchands affluents et leurs cargaisons. Une telle masse de voyageurs fortunés et fatigués attire camelots et artistes de la même manière qu'un marché plus modeste, transformant cette rencontre de négociants en une sorte de festival. Dans cette atmosphère, les idées coulent aussi librement que les pièces et le vin, apportant au Bulwar toutes les nouveautés du caravansérail raheni de Davharral, et offrant aux marchands du Rahen des idées neuves à rapporter dans cette cité lors du voyage de retour."

 institution_events.100.a:0 "Voilà qui nous sera fort utile."

 institution_events.100.t:0 "Une Institution s'est propagée entre Port Jaher et Brasan"
 institution_events.100.d:0 "Grâce aux liens commerciaux unissant Port Jaher et Brasan, les idées nouvelles se répandent aisément entre ces cités malgré la distance qui les sépare. Dès qu'une idée nouvelle prend racine dans l'une, elle est rapidement adoptée par l'autre. Un tel phénomène vient de se produire, et nous en sommes d'autant plus avantagés."

 institution_events.102.a:0 "Voilà qui nous sera fort utile."

 institution_events.102.t:0 "Une Institution s'est propagée entre Sareyand et Davharral"
 institution_events.102.d:0 "Grâce aux liens commerciaux unissant Sareyand et Davharral, les idées nouvelles se répandent aisément entre ces cités malgré la distance qui les sépare. Dès qu'une idée nouvelle prend racine dans l'une, elle est rapidement adoptée par l'autre. Un tel phénomène vient de se produire, et nous en sommes d'autant plus avantagés."