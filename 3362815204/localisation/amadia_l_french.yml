 amadia_early_damestear: "Damestear amadienne" #Anb Event Modifiers

 amadia.3.t: "Le Visage des Dieux"
 amadia.3.desc: "Lorsque la Ruine d'Aelantir déchira nos terres, elle déchira aussi nos dieux. Fragmentés en divers visages par la Ruine, les dieux ne représentent plus qu'un éclat de leur forme originelle, chacun doté de sa propre personnalité et de ses propres desseins. Comme pour bien des choses en Amadia, nous devons abandonner le choix de notre visage aux mains du destin et espérer nous accommoder de celui qui nous sera donné."
 amadia.3.a: "Le Soleil, la Lune, ou quelque chose au-delà..."
 amadia.3.b: "Nous devons nous améliorer, quelle que soit notre forme."
 amadia.3.c: "Allons-nous prospérer, nous flétrir, ou nous muer en quelque chose de nouveau ?"
 amadia.3.d: "La personne idéale n'est jamais véritablement hors de portée."
 amadia.3.e: "Les tempêtes ne sont jamais prévisibles."
 amadia.3.f: "La connaissance, mais de quelle sorte ?"
 amadia.3.g: "De quel côté nous rangerons-nous ?"
 amadia.4.t: "Un nouveau nom pour une terre étrange"
 amadia.4.desc: "Certains nous disaient fous, que les Shuvuush n'avaient jamais été un peuple de marins. Que notre destin résidait dans la conquête de Haless, non dans quelque farce transocéanique.\n\nIls avaient probablement raison. Il ne fut pas aisé d'atteindre ces contrées étranges, mais nous étions déterminés. Qui allait nous en empêcher ? Des voyageurs parlaient d'une terre riche en or, en Damestear, en reliques précurseurs et plus encore. Pourquoi tout cela ne nous reviendrait-il pas ?\n\nNos conteurs rappellent nos premières rencontres avec les autochtones, suivant les caravanes banche vers l'intérieur des terres jusqu'aux grandes cités du Lac Chakantu. Ce sont peut-être ces récits, déformés au-delà de toute reconnaissance lors du voyage de retour, qui inspirèrent notre grande migration. Nos ancêtres avaient survécu au Husuusing, la Marche des Cendres. Nous parlions désormais du Hekuudsuusing, la Grande Marche. Un nouveau foyer pour notre peuple, plus riche que nos rêves les plus fous.\n\nBien sûr, tout ne fut pas aussi grandiose que beaucoup l'avaient espéré. Nos compagnons ailés peinaient sur le nouveau terrain, tandis que nos cavaliers luttaient pour les maîtriser durant leurs incessantes querelles avec les oiseaux de mer et les vautours des Banche. Nos modes de vie traditionnels, bien adaptés au sud plus aride, étaient difficiles à transposer dans les jungles qui se dressaient entre la côte et les richesses de l'intérieur. Aujourd'hui, nous nous asseyons autour des feux et nous demandons pourquoi nous sommes ici, si loin de chez nous. Mais pour ceux qui sont nés ici, Haless n'est qu'un concept lointain.\n\nDans notre langue, Guwaad désigne quelque chose d'étranger ou d'étrange, et jamais nous ne l'avons prononcé autant qu'en ces lieux. Amadia est le nom que cette terre a gagné dans la plupart des langues. Nul ne sait qui l'inventa le premier, mais notre nation ici est désormais connue sous un nom nouveau."
 amadia.4.a: "Nous sommes les Guwaamadia !"
 amadia.4.b: "Pour ma part, je suis attaché au nom [Root.GetName]."
 guwaamadia_form_title: "Devenir Guwaamadia"
 guwaamadia_form_desc: "Bien des questions entourent notre présence ici. Comment ? Pourquoi ? Avons-nous encore toute notre raison ? Quelle que soit leur pertinence, notre destin nous appartient. Nous embrasserons une nouvelle identité : Guwaamadia !"

