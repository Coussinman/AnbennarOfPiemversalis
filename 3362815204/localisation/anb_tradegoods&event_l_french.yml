l_french:

 anb_price.1.t:0 "Demande d'Encens en Hausse"
 anb_price.1.d:0 "Utilisé comme composant essentiel dans de nombreux rituels arcaniques, le prix de l'encens suit inexorablement la demande croissante des mages pour cette précieuse substance."
 anb_price.1.a:0 "Voilà une excellente nouvelle !"
 incense_rise_in_demand:0 "Demande d'encens en hausse"

 anb_price.2.t:0 "Explosion de l'Encens"
 anb_price.2.d:0 "Alors que les mages accèdent aux trônes et que la magie envahit progressivement les rues de chaque ville et village, la demande d'encens explose littéralement, annonçant un nouvel âge de la magie, pour le plus grand bonheur des apothicaires."
 anb_price.2.a:0 "Inaugurons une ère nouvelle !"
 incense_magic_boom:0 "Explosion de l'encens"

 anb_price.3.t:0 "Déclin de la Demande"
 anb_price.3.d:0 "Les besoins et les usages de chacun évoluent avec le temps, en cette époque de bouleversements. Avec l'avènement de l'Artisanat Magique, la demande pour les composants magiques traditionnels décline, entraînant une chute des prix."
 anb_price.3.a:0 "Inaugurons une ère nouvelle !"
 incense_artificier_age:0 "Âge des Artificiers"

 anb_price.4.t:0 "Commerce d'Esclaves Peaux-Vertes"
 anb_price.4.d:0 "Les efforts massifs de colonisation d'Aelantir, récemment redécouvert, exigent une main-d'œuvre efficace, bon marché et nombreuse à l'échelle mondiale. Cette demande a propulsé le prix des orques réduits en esclavage depuis la Marée Verte vers des sommets inédits."
 anb_price.4.a:0 "Considérons cela comme des réparations pour la Marée Verte !"
 green_slave_demand:0 "Demande d'esclaves peaux-vertes"

 anb_price.5.t:0 "Mode Capillaire Extravagante"
 anb_price.5.d:0 "On raconte que l'ancienne noblesse des elfes précurseurs marquait son statut par des couleurs de cheveux contre nature, allant du rose au vert, du bleu à l'argent. Depuis cette découverte, les nobles de Cannor se sont mis à teindre leurs chevelures de couleurs éclatantes pour imiter un âge révolu, réduit en cendres."
 anb_price.5.a:0 "L'heure est à la teinture !"
 noble_dye_hair:0 "Mode capillaire nobiliaire"

 anb_price.6.t:0 "Mur-de-Vis, Cité des Couleurs"
 anb_price.6.d:0 "Seule cité de Cannor à produire toutes les variétés de teintures, Mur-de-Vis n'a pas vu l'afflux de marchandises venues d'Aelantir ternir sa production. Au contraire, elle connaît aujourd'hui une prospérité sans précédent."
 anb_price.6.a:0 "Des teintures pour la noblesse"
 dye_of_europe:0 "Teintures de Mur-de-Vis"

 anb_price.7.t:0 "L'Âge d'Or du Vin"
 anb_price.7.d:0 "Grâce à l'établissement d'un solide monopole sur la production et la distribution du vin, les vignerons lencoriens n'ont plus à s'inquiéter de leur rentabilité. Ils peuvent désormais expérimenter plus librement et investir dans de nouvelles techniques de leur art. Cela a conduit à une productivité accrue et à des vins d'une qualité jamais vue auparavant. Un véritable Âge d'Or s'annonce pour eux."
 anb_price.7.a:0 "Je devrais m'offrir quelques bouteilles"
 golden_age_of_wine:0 "Âge d'Or du vin"

 anb_price.8.t:0 "Nouvelles Draperies"
 anb_price.8.d:0 "Une nouvelle technique de production textile a commencé à émerger parmi les drapiers de [Root.GetName]. Ces « Nouvelles Draperies » sont bien plus fines, légères et bon marché que les épais lainages autrefois en vogue. Si la demande pour ces nouveaux produits est en hausse, leur fabrication utilise considérablement moins de laine, ce qui entraîne une baisse des prix."
 anb_price.8.a:0 "Soit."

 anb_price.9.t:0 "Réglementation des Uniformes"
 anb_price.9.d:0 "Les armées de conscription d'antan sont de plus en plus remplacées par des armées nationales permanentes. Dans le cadre de ce processus, de nombreux États ont commencé à réglementer l'apparence des uniformes de leurs soldats, et certains ont même entrepris de les fournir eux-mêmes. La teinture n'a jamais été bon marché, et avec la demande accrue qui pèse désormais sur les teintures et les étoffes, les prix sont en hausse."
 anb_price.9.a:0 "Soit."

 anb_price.10.t:0 "Disparition du Castor Cannorien"
 anb_price.10.d:0 "La demande de fourrures n'a cessé de croître tout au long du Moyen Âge, et un climat de plus en plus rigoureux n'y a rien changé ces derniers temps. De ce fait, la population de castors de Cannor peine à répondre à la demande sans cesse croissante. La situation est telle que les castors sont devenus extrêmement rares en Cannor, et les fourrures doivent désormais être importées à grands frais depuis Gawed et le Grand Nord."
 anb_price.10.a:0 "Soit."
 DEPLETION_OF_CANNORIAN_BEAVER:0 "Disparition du castor cannorien"

 anb_price.11.t:0 "Chapeaux de Feutre"
 anb_price.11.d:0 "La fourrure de castor est un matériau d'excellence pour la chapellerie. Elle conserve la chaleur et maintient sa forme même par mauvais temps et sur de longues périodes. La demande croissante de chapeaux de feutre, combinée au processus complexe de leur fabrication, a favorisé l'essor d'un secteur chapelier florissant dans notre économie."
 anb_price.11.a:0 "Soit."

 anb_price.12.t:0 "Marines Permanentes"
 anb_price.12.d:0 "Les marines permanentes sont passées du statut d'exception à celui de norme. Les institutions dédiées au commandement de ces nouvelles flottes prennent désormais une part bien plus active dans l'approvisionnement en fournitures pour la construction, le ravitaillement et l'entretien de leurs navires."
 anb_price.12.a:0 "Soit."

 anb_price.13.t:0 "Canons de Bronze"
 anb_price.13.d:0 "Le canon de bronze a fait son entrée sur les champs de bataille et compte bien y demeurer. Les matériaux nécessaires pour alimenter les industries de fabrication de canons en pleine expansion ont entraîné une explosion de la demande de cuivre ces dernières années, faisant grimper les prix en conséquence."
 anb_price.13.a:0 "Soit."

 anb_price.14.t:0 "Évolution des Habitudes de Consommation"
 anb_price.14.d:0 "Le sucre était jadis un luxe rare qu'il fallait importer du nord du Salahad ou du Bulwar. Alors que le monde s'est ouvert et que le pouvoir d'achat de notre classe urbaine a augmenté, le sucre peut encore être considéré comme un luxe, mais désormais tout à fait abordable."
 anb_price.14.a:0 "Soit."

 anb_price.15.t:0 "Popularisation des Étoffes de Soie"
 anb_price.15.d:0 "La soie est très recherchée dans le monde entier depuis bien avant le Moyen Âge, et son acquisition fut l'une des forces motrices des entreprises marchandes vers l'orient. Avec une plus grande disponibilité de la soie, brute ou tissée, la demande d'étoffes de soie en Cannor ne cesse de croître."
 anb_price.15.a:0 "Soit."

 anb_price.16.t:0 "Développement du Placage"
 anb_price.16.d:0 "Initialement, de nombreux types de bois tropicaux étaient jugés trop cassants par les ébénistes. Grâce au développement du placage, il est désormais possible d'utiliser l'ébène et d'autres bois tropicaux sélectionnés pour leur beauté plutôt que pour leur solidité. La création de cabinets magnifiques et originaux ainsi que d'autres meubles de prestige en bois tropicaux est ainsi devenue une activité florissante, [Root.GetName] étant le principal exportateur de ces articles."
 anb_price.16.a:0 "Soit."

 anb_price.17.t:0 "Développement de la Sidérurgie"
 anb_price.17.d:0 "Diverses avancées dans le domaine de la sidérurgie ont rendu le canon de fer à la fois plus efficace et plus fiable que les anciens canons de bronze. Les produits en fer remplaçant également de plus en plus le cuivre dans d'autres domaines, comme les ustensiles de table, le prix du cuivre a chuté tandis que la demande de fer est en hausse."
 anb_price.17.a:0 "Soit."

 anb_price.18.t:0 "Chocolat Chaud"
 anb_price.18.d:0 "L'usage du cacao pour créer une boisson chaude est une coutume héritée des Elfes Précurseurs. Si cette nouvelle boisson s'est rapidement imposée dans certaines couches de la société cannorienne, il a fallu du temps, et de grandes quantités de sucre, avant qu'elle ne gagne une acceptation plus large. Cet obstacle surmonté, la demande de chocolat ne cesse désormais de croître dans l'Ancien Monde."
 anb_price.18.a:0 "Soit."

 anb_price.19.t:0 "Popularité Croissante du Tabac"
 anb_price.19.a:0 "Soit."
 anb_price.19.d:0 "Commercialisé à l'origine comme plante médicinale, le tabac est devenu de plus en plus populaire tant dans le monde cannorien que bulwari pour ses vertus récréatives. D'Anbenncóst au Bulwar, cette habitude s'est répandue au point que le commerce du tabac devient fort lucratif."

 anb_price.20.t:0 "Le Marché International du Livre"
 anb_price.20.d:0 "Si le papier est supérieur au parchemin à bien des égards, il n'a jamais pu le supplanter entièrement. Cependant, avec la popularisation de l'imprimerie, livres, pamphlets et même cartes à jouer sont devenus monnaie courante, comme jamais auparavant. L'art de fabriquer le papier s'est également considérablement raffiné ces dernières décennies, et ces deux facteurs convergent désormais pour rendre le papier plus recherché que jamais.\n\nL'exemple le plus visible en est sans doute le marché du livre de [bookmarket_here.GetCapitalName], qui semble s'agrandir chaque année. Initialement simple foire pour les imprimeurs de [bookmarket_here.GetAreaName], ce marché accueille désormais des visiteurs du continent entier."
 anb_price.20.a:0 "[bookmarket_here.GetCapitalName] est véritablement le plus grand marché du livre au monde."
 anb_price.20.b:0 "Cela profitera à toute la province."

 anb_price.21.t:0 "La Pile Hollandaise"
 anb_price.21.d:0 "Pendant des siècles, les moulins à papier se sont appuyés sur des marteaux mécaniques pour battre la pâte à papier en grumeaux, broyant les fibres pour créer la matière première nécessaire à la fabrication du papier.\n\nUtilisant les moulins à vent locaux comme source d'énergie, des artisans ingénieux de [hollender_beater_province.GetName] ont désormais conçu une solution plus efficace. Ce qu'ils appellent la « pile [Root.GetAdjective] » est une cuve équipée d'un cylindre horizontal entraîné par le vent et muni de lames. Ces lames peuvent déchiqueter autant de pâte en quelques heures que les anciens marteaux en plusieurs jours."
 anb_price.21.a:0 "Le marché du papier ne sera plus jamais le même."

 anb_price.22.t:0 "Administrer un Empire"
 anb_price.22.d:0 "Les bureaucrates ont depuis longtemps préféré le papier au parchemin et autres supports en raison de sa facilité d'utilisation. Diverses mesures peuvent également être prises pour rendre les documents officiels plus difficiles à falsifier. L'invention du filigrane à Seinathíl en est un exemple, les techniques élaborées de marbrure et la calligraphie des ministres rahenis en sont un autre.\n\nAlors que les empires s'étendent de plus en plus sur plusieurs continents, ce besoin d'authenticité vérifiable et de facilité d'usage a conduit les bureaucraties impériales, de Yanshen à Cannor, à utiliser exclusivement le papier pour les documents et ordres officiels."
 anb_price.22.a:0 "Le papier est l'avenir."

 anb_price.23.t:0 "Bibliothèques de Prêt et Cercles de Lecture"
 anb_price.23.d:0 "Avec l'alphabétisation en hausse, la diffusion et la dissémination des livres sont devenues un objectif tant pour des raisons économiques qu'idéologiques. Les libraires sont devenus bien plus courants dans de nombreuses villes en général, et dans les grandes cités comme [lending_libraries_here.GetName], des rues entières sont bordées de boîtes de livres à vendre.\n\nPour ceux qui ne peuvent se permettre d'acheter des livres, il existe désormais un nombre croissant de moyens de prêter ou de cofinancer leurs achats, tels que les bibliothèques de prêt payantes, les coopératives d'achat de livres ou les sociétés par abonnement."
 anb_price.23.a:0 "Peut-on vraiment confier l'écrit aux masses ?"

 anb_price.24.t:0 "Le Facettage"
 anb_price.24.d:0 "Les maîtres joailliers de [diamond_city.GetName] ont réalisé une percée dans la taille du diamant en expérimentant avec de la poudre de diamant en suspension dans l'huile sur leurs meules. Cela permet aux artisans [Root.GetAdjective]s de tailler ces pierres rares selon des formes entièrement nouvelles et avec un éclat bien supérieur. La technique résultante, connue sous le nom de facettage, produit une pierre de forme géométrique plus plaisante et aux qualités optiques supérieures. À mesure que ces nouvelles pierres, et la technique pour les créer, se répandent dans les cours et les ateliers, la demande de joaillerie, de diamants et de pierres précieuses augmente considérablement."
 anb_price.24.a:0 "Les gemmes sont véritablement extraordinaires."

 anb_price.25.t:0 "Diamants de l'Échine-du-Serpent"
 anb_price.25.d:0 "Les diamants, ces pierres si dures qu'elles ne peuvent être polies qu'avec leur propre poussière, ont longtemps été les plus rares de toutes les pierres précieuses. Pendant des siècles, quelques mines cannoriennes furent la seule source connue de diamants au monde, et même là, on ne les trouvait que dans quelques régions minières bien gardées.\n\nAvec la découverte de grandes quantités de diamants dans l'Échine-du-Serpent, les diamants sont devenus accessibles non plus seulement aux rois et princes, mais aussi aux riches magnats, bourgeois et autres amateurs de joaillerie."
 anb_price.25.a:0 "Les diamants sont éternels."
 SERPENTSPINE_DIAMONDS:0 "Diamants de l'Échine-du-Serpent"

 anb_price.26.t:0 "Essor de l'Industrie du Parfum"
 anb_price.26.d:0 "Une classe marchande en pleine expansion ainsi qu'un code social de plus en plus exigeant parmi la noblesse et les classes supérieures ont entraîné une demande accrue de parfums. Les halls des grands palais doivent désormais offrir un parfum agréable autant qu'un décor majestueux. Cela a provoqué une forte hausse de la demande de produits comme l'encens, la myrrhe et autres substances odorantes pour la fabrication de parfums. À [perfume_city_grass.GetCapitalName], le raffinage des fleurs locales et des produits parfumés étrangers est même devenu une industrie majeure à part entière."
 anb_price.26.a:0 "Ils ont assurément du flair pour ces choses."

 anb_price.27.t:0 "Sélection Génétique"
 anb_price.27.d:0 "Grâce à l'élevage scientifique et intensif de chevaux, porcs, bovins et moutons, les éleveurs [Root.GetAdjective]s ont commencé à créer des types d'animaux entièrement nouveaux, plus spécialisés pour les diverses tâches qu'ils doivent accomplir. Depuis des siècles, diverses régions possèdent des races de bétail réputées, mais avec les nouvelles méthodes désormais mises au point, il est devenu évident combien il est facile pour l'homme de créer des améliorations spécifiques chez les animaux.\n\nEn conséquence, le commerce du bétail connaît un renouveau, avec une augmentation drastique de la qualité des animaux vendus plutôt que de leur simple quantité."
 anb_price.27.a:0 "Remarquable."

 anb_price.28.t:0 "Progrès dans la Fabrication des Lentilles"
 anb_price.28.d:0 "Depuis le XIIIe siècle, les lunettes à verres de verre ont remplacé les pierres de lecture des époques antérieures. Grâce à une observation optique minutieuse, ces lentilles ont désormais atteint un niveau de perfection permettant d'agrandir même les plus infimes objets.\n\nPour le plus grand bonheur des érudits, ces nouvelles lentilles peuvent également servir à créer des microscopes optiques, leur permettant d'examiner ce qui n'avait jamais pu être observé auparavant, ainsi que des télescopes à réfraction, permettant l'étude d'objets lointains tels que les étoiles. Le domaine de l'optique est désormais à l'aube d'une révolution, apportant de grands bénéfices tant à la science qu'à la navigation et à la guerre."
 anb_price.28.a:0 "Nous pouvons désormais voir les choses lointaines comme si elles étaient proches."

 anb_price.29.t:0 "Verre au Plomb et Cristal"
 anb_price.29.d:0 "Les verriers de [glass_province.GetName] ont commencé à utiliser du silex et du sable combinés au plomb pour créer un produit limpide, facile à travailler et sans défaut. Cette nouvelle méthode concurrence rapidement les grands centres de production verrière existants dans le monde, les marchés étant inondés de ce nouveau produit très prisé."
 anb_price.29.a:0 "Brillant."

 anb_price.30.t:0 "Progrès dans l'Extraction du Charbon"
 anb_price.30.d:0 "Au fil du temps, la technologie a considérablement augmenté le rendement des mines de charbon existantes tout en rendant possible l'extraction du charbon dans de nombreux endroits où cela aurait été auparavant irréalisable. Nos mines de charbon fonctionnent avec une efficacité sans précédent, et si l'industrialisation continue signifie que le charbon reste très demandé, cette demande peut désormais être plus facilement satisfaite."
 anb_price.30.a:0 "Excellent."

 anb_price.31.t:0 "Café pour les Mages"
 anb_price.31.d:0 "On a récemment découvert que le café augmente considérablement la concentration de tout étudiant en magie. La disponibilité accrue du café grâce aux nombreuses plantations d'Aelantir a permis de répondre à la demande croissante pour ce breuvage noir."
 anb_price.31.a:0 "Excellent."
 MAGIC_BEVERAGE:0 "Breuvage magique"

 anb_price.32.t:0 "Poison pour le Mage"
 anb_price.32.d:0 "La forte consommation de café parmi les jeunes étudiants en magie, en particulier les enfants de nobles, a révélé l'existence d'effets secondaires persistants, notamment un tremblement désormais appelé « la Fébrilité », provoquant des résultats catastrophiques dans leurs incantations."
 anb_price.32.a:0 "Quelle horreur !"
 BAD_SIDEEFFECT:0 "Effets secondaires néfastes"

 anb_price.33.t:0 "Importations de Coton"
 anb_price.33.d:0 "Durant la Renaissance, les tissus de coton rahenis sont devenus de plus en plus populaires en Occident. L'industrie lainière [Root.GetAdjective] finit par subir une pression intense et exigea l'interdiction des importations de coton."
 anb_price.33.a:0 "Nous ne restreindrons pas le libre-échange."
 anb_price.33.b:0 "Le mercantilisme est la voie à suivre."

 anb_price.34.t:0 "Bouchons de Liège"
 anb_price.34.d:0 "Les progrès dans la fabrication des bouteilles ont permis aux producteurs de vin de créer des bouteilles de tailles plus standardisées et, par conséquent, de réintroduire l'usage du bouchon de liège. C'est un moyen bien plus efficace de sceller le vin que les anciens bouchons de tissu, permettant désormais de transporter le vin sur des distances bien plus grandes qu'on ne l'aurait cru possible. Nous assistons peut-être à la naissance d'un commerce mondial du vin."
 anb_price.34.a:0 "Soit."

 anb_price.35.t:0 "Abondance de l'Échine-du-Serpent"
 anb_price.35.d:0 "Pendant des siècles, les vastes montagnes de l'Échine-du-Serpent sont restées en ruines tandis que des hordes d'orques et de gobelins erraient à travers le cadavre qu'était devenu Aul-Dwarov. Ces dernières années, cependant, dans le sillage de la Marée Verte, l'Échine-du-Serpent a lentement été recolonisée par les peuples nains. En conséquence, les anciennes forges des bastions nains reprennent vie, et de vastes quantités de métal commencent à s'écouler hors des montagnes vers les bras avides du monde de la surface."
 anb_price.35.a:0 "Plus de marchandises disponibles signifie des prix plus bas."
 SERPENTSPINE_ABUNDANCE:0 "Abondance de l'Échine-du-Serpent"

 anb_price.36.t:0 "Inventions des Artificiers"
 anb_price.36.d:0 "À travers le monde, l'Artisanat Magique gnomique a gagné en popularité, se répandant sur une grande partie du globe. Divers artificiers, de Cannor à Aelantir, inventent et produisent sans relâche toutes sortes de nouveaux mécanismes. Ces mécanismes nécessitent cependant divers métaux et verreries pour leur fabrication, et la demande pour ces matériaux a donc explosé."
 anb_price.36.a:0 "Cela mènera certainement à plus d'innovation"
 ARTIFICIERS_INVENTIONS:0 "Inventions des artificiers"
 artificier_city:0 "Cité des Artificiers"
 desc_artificier_city:0 "Centre de savoir et d'innovation, cette cité abrite l'une des plus grandes communautés d'artificiers au monde"

 anb_price.37.t:0 "Production de Soie de Masse"
 anb_price.37.d:0 "Depuis des millénaires, Haless produit la plus recherchée de toutes les étoffes : la soie. Bien avant le Jour-des-Cieux-Cendrés, la soie halessi était produite selon un processus laborieux, nécessitant de grands efforts pour créer relativement peu de ce tissu tant convoité. Ces dernières années, cependant, de nouvelles innovations ont permis de produire la soie non seulement de manière bien moins coûteuse, mais aussi à une échelle bien plus grande. Le Rahen produit désormais plus de soie que jamais dans l'histoire connue."
 anb_price.37.a:0 "Cela fera certainement baisser le prix de la soie"
 MASS_SILK_PRODUCTION:0 "Production de soie de masse"

 anb_price.38.t:0 "Popularité de la Porcelaine"
 anb_price.38.d:0 "La porcelaine a toujours été populaire en Cannor, et avec la soie et l'ivoire, elle constituait l'un des principaux produits affluant vers l'ouest depuis Haless. Les nouveaux royaumes d'aventuriers de l'Escann, établis dans le sillage de la Marée Verte, semblent l'adorer bien plus que quiconque, comme c'est souvent le cas chez les nouveaux riches. Combiné à un accès facilité au Rahen via les nouvelles routes commerciales du Dwarovar, la demande de porcelaine n'a jamais été aussi élevée."
 anb_price.38.a:0 "Cela fera monter le prix de la porcelaine"
 PORCELAIN_POPULARITY:0 "Popularité de la porcelaine"

 anb_price.39.t:0 "Propriétés de la Porcelaine"
 anb_price.39.d:0 "La porcelaine, bien que toujours appréciée simplement pour ses qualités décoratives, s'est révélée posséder des propriétés fort intéressantes. Il semble que la porcelaine, plus que tout autre matériau, résiste étrangement à la magie. En fait, contrairement à la Damestear noire, elle semble simplement contenir la magie plutôt que de l'annuler. En conséquence, la demande de porcelaine a explosé, alors que mages, sorciers et ensorceleurs se précipitent pour mettre la main sur autant de porcelaine que possible pour leurs expérimentations magiques."
 anb_price.39.a:0 "J'adore les vases !"
 PORCELAIN_SOUL_JAR:0 "Propriétés de la porcelaine"

 anb_price.40.t:0 "Porcelaine en Escann"
 anb_price.40.d:0 "Depuis des années, la porcelaine est une marchandise extrêmement prisée en Escann, tant pour ses propriétés magiques que non magiques. Cela a conduit nombre de personnes à tenter, apparemment en vain, de la recréer sur le sol cannorien, sans succès. Jusqu'à présent, du moins. Un artificier escanni a réussi à recréer cette substance précieuse à partir de matériaux relativement basiques. Sa méthode s'est rapidement répandue dans tout l'Escann, et il semble que chaque jour, un nouvel atelier de porcelaine ouvre ses portes dans l'Est."
 anb_price.40.a:0 "Enfin, les prix vont baisser !"
 PORCELAIN_IN_ESCANN:0 "Porcelaine en Escann"

 anb_price.41.t:0 "Remèdes Fongiques"
 anb_price.41.d:0 "Les champignons, bien que souvent utilisés dans les cavernes de l'Échine-du-Serpent comme culture de base, à l'instar du blé ou de l'orge en surface, n'avaient jamais connu grande demande au-delà des montagnes. Cela a changé ces dernières années, depuis la découverte de divers remèdes utilisant ces champignons variés, soignant et traitant diverses affections qui affligent le monde de la surface depuis des générations. En conséquence, la demande de champignons a considérablement augmenté ces derniers mois."
 anb_price.41.a:0 "Je prendrai une crème pour les pieds, s'il vous plaît."
 FUNGI_REMEDIES:0 "Remèdes fongiques"

 anb_price.42.t:0 "Abondance de Mithril"
 anb_price.42.d:0 "Le mithril a toujours été le plus précieux des métaux, un minéral si rare que certains le considéraient aussi précieux que la Damestear. Cependant, avec la recolonisation progressive du Dwarovar, de plus en plus de mines de mithril ont été découvertes, et le prix du mithril a lentement mais sûrement diminué. Bien qu'il demeure l'un des métaux les plus précieux au monde, il n'est plus aussi rare qu'autrefois, et le mithril est désormais accessible à l'aventurier moyen, quoique à un prix encore fort élevé."
 anb_price.42.a:0 "Au moins, c'est un peu plus abordable maintenant..."
 MITHRIL_ABUNDANCE:0 "Abondance de mithril"

 anb_price.43.t:0 "Mode Esmarienne"
 anb_price.43.d:0 "Les princes-fluviaux d'Esmarie sont depuis longtemps renommés dans tout Cannor pour leurs fêtes extravagantes, descendant l'Esmar sur leurs somptueuses barges. Au fil des ans, de plus en plus de nobles de tout Anbennar se sont rendus à ces fêtes et, une fois sur place, ont commencé à remarquer l'originalité des vêtements esmariens. Finalement, de plus en plus de nobles, de Lencenor à l'Escann, ont adopté la mode esmarienne."
 anb_price.43.a:0 "Corsets plus serrés, lacets plus fins, capes, oh là là !"
 ESMARI_FASHION:0 "Mode esmarienne"

 anb_price.44.t:0 "Le Petit-Pays Ravagé par la Guerre"
 anb_price.44.d:0 "Le Petit-Pays, aussi loin que remonte la mémoire, a été le grenier à blé de Cannor, sa population halfeline produisant d'immenses quantités de céréales et d'orge pour nourrir les habitants de tout le continent. C'est pourquoi il a longtemps été convoité par les grandes puissances, qu'il s'agisse de Lorent, de Gawed, d'Anbennar ou de la Hiérarchie. Ces dernières années, cependant, les conflits dans la région se sont intensifiés, entraînant une diminution des exportations alimentaires alors que le Petit-Pays est ravagé par la guerre."
 anb_price.44.a:0 "Si le Petit-Pays brûle, Cannor meurt de faim."
 SMALL_COUNTRY_DEVASTATION:0 "Le Petit-Pays ravagé par la guerre"

 anb_price.45.t:0 "Abolitionnisme"
 anb_price.45.d:0 "Avec l'interdiction de l'esclavage dans [Root.GetName] et d'autres pays susceptibles de suivre, il semble que le commerce translaménien d'esclaves connaisse un net déclin."
 anb_price.45.a:0 "L'esclavage est aboli."

 anb_price.46.t:0 "Potions pour Aventuriers"
 anb_price.46.d:0 "Pendant la majeure partie de l'histoire, les potions ont été extrêmement difficiles à élaborer, nécessitant un alchimiste hautement qualifié pour les produire à un rythme tant soit peu raisonnable. Cependant, des percées récentes ont permis une production de potions bien plus aisée, et combinée à la demande toujours croissante des aventuriers d'Escann, les ventes de potions ont explosé. En conséquence, la demande de flacons à potions a similairement augmenté."
 anb_price.46.a:0 "Marchand de potions, je veux vos potions les plus puissantes !"
 POTION_ADVENTURER:0 "Potions pour aventuriers"

 anb_price.47.t:0 "Du Thé et du Sucre"
 anb_price.47.d:0 "L'invention du thé est souvent disputée entre les Elfes Précurseurs et les peuples de Yanshen. Récemment cependant, sa culture dans les terres récemment redécouvertes d'Aelantir, combinée aux immenses plantations de sucre que l'on trouve désormais dans les Îles-des-Ruines, a fait croître la popularité du thé comme jamais auparavant, désormais savouré régulièrement par les riches comme par les pauvres, et par toutes les races du monde."
 anb_price.47.a:0 "Combien de sucres, mon ami ?"

 anb_price.48.t:0 "Culture du Thé en Damérie"
 anb_price.48.d:0 "Depuis l'arrivée des Elfes Précurseurs, le thé est présent sur les terres de Damérie. Cependant, tout au long du XVe siècle, cette boisson est devenue progressivement plus populaire, donnant naissance à une nouvelle culture du thé en Damérie, faite de garden-parties, de commérages et de divers biscuits comme accompagnements traditionnels de ce breuvage."
 anb_price.48.a:0 "Passez-moi la bouilloire, voulez-vous ?"
 DAMERIAN_TEA_CULTURE:0 "Culture du thé damérien"

 anb_price.49.t:0 "Commerce d'Esclaves Orques Interdit en Cannor"
 anb_price.49.d:0 "Ce qui commença comme une idée corinite radicale, l'interdiction de l'esclavage orque en Cannor, fut finalement adoptée par un conglomérat de puissances anbennariennes pour des raisons purement commerciales et politiques : réduire l'influence de leurs rivaux coloniaux occidentaux de Lencenor, et plus important encore, freiner l'ascension de grandes puissances naissantes en Escann comme [Root.Country.GetName].\n\nSi cela n'abolit pas l'esclavage orque en tant que tel, mais seulement le commerce, à court terme, cela rendit les esclaves orques plus rares et donc plus chers, au bénéfice des nombreux esclavagistes locaux d'Aelantir, au grand dam de leurs homologues escannis."
 anb_price.49.a:0 "Les esclaves orques seront demandés, mais finiront par se raréfier."
 ORCISH_SLAVE_TRADE_BANNED_IN_CANNOR:0 "Demande accrue due à l'interdiction du commerce d'esclaves orques en Cannor"
 tooltip_orcish_slave_trade_banned_in_cannor:0 "\nActive des événements qui suppriment le bien commercial §YEsclaves§! en Escann."

 anb_price.50.t:0 "Les Hauts-Fonds des Récifs-Ruinés"
 anb_price.50.d:0 "Les pêcheurs de tout Halann semblent plus amers que de coutume, ce qui n'est pas peu dire. Le prix d'une prise n'a cessé de baisser d'année en année, en raison d'un afflux soudain de poisson salé d'Aelantir. Les marchés du monde ont été bouleversés, alors que les pêcheurs bravent les mers déchaînées par les tempêtes pour piller les récifs abondants entourant les Ruines. Car, tout comme les falaises des Ruines s'élèvent au-dessus, leurs miroirs aquatiques plongent dans les profondeurs, regorgeant de vie comme une cité grouillante de délicieuses créatures. Le peuple peut se réjouir en ouvrant son palais aux saveurs nouvelles de la Mer-des-Ruines."
 anb_price.50.a:0 "Assurément, cette manne durera pour l'éternité !"
 RUINREEF_SHOALS:0 "Hauts-fonds des Récifs-Ruinés"

 anb_price.51.t:0 "Baguettes d'Ivoire"
 anb_price.51.d:0 "Les baguettes magiques ont longtemps été façonnées à partir de bois exotiques et obscurs, les aventuriers s'enfonçant dans les forêts les plus profondes et les plus sombres d'Halann pour trouver les branches les plus appropriées. Mais il semble que ce commerce décline rapidement. Les experts à la pointe de la pratique magique cannorienne ont découvert que l'ivoire surpasse même les bois les plus recherchés dans sa capacité à conduire l'énergie magique.\n\nDésormais, les peuples gris du nord chassent les mammouths sauvages et prolifiques des étendues nordiques, de nouvelles routes vers Sarhal et le Rahen apportent l'ivoire des éléphants de ces régions, et d'étranges bêtes d'Aelantir venues du Taychend et du Grand Nord cèdent leurs défenses. Même si l'offre de ce matériau jadis luxueux explose, la demande l'a égalée, alourdissant les bourses de tout marchand assez chanceux pour mettre la main sur une cargaison d'ivoire."
 anb_price.51.a:0 "Oh, ta baguette a du crin de licorne dedans ? Très drôle."
 IVORY_WANDS:0 "Baguettes d'ivoire"

 anb_price.52.t:0 "Fructification Fongique"
 anb_price.52.d:0 "« Des champignons ! Nous sommes riches ! » Ce cri emblématique du mineur nain résonne une fois de plus. Si souvent prononcé dans les tunnels de l'Échine-du-Serpent, où la nourriture peut être rare, c'est une joie de repérer une parcelle de savoureux champignons. Mais si les champignons de l'Échine-du-Serpent rivalisaient depuis longtemps en taille avec les citrouilles du Nouveau-Comté, rien ne les préparait à cela. Une forêt entière de champignons exotiques, si différents de tout ce qui pousse en surface, ou même en dessous.\n\nS'élevant aussi vastes et imposants que les arbres les plus anciens des Bois-Profonds, les forêts brumeuses de la région offrent un potentiel immense et inexploité pour nourrir le monde. Quand un seul « arbre » peut sustenter un village pour l'hiver, rien ne devrait empêcher Cannor, tout Halann même, de crouler sous une nourriture abordable. Après que quelques âmes courageuses nous aient aidés à déterminer lesquels sont vénéneux, bien sûr."
 anb_price.52.a:0 "Des champignons !"
 AELANTIRI_MUSHROOMS:0 "Champignons d'Aelantir"
 giant_shroom:0 "Champignons géants"

 anb_price.53.t:0 "Les Flottes vers l'Ouest"
 anb_price.53.d:0 "Le port le plus animé de [Root.GetName] était récemment bondé du plus grand nombre de navires jamais vu, alors qu'une flotte majeure s'assemblait et partait pour Aelantir. Mais ils ne sont pas seuls, ils ne sont que les premiers. À travers tout Cannor, aventuriers et colons s'embarquent vers ce monde nouveau (et ancien).\n\nCet afflux vers Aelantir a accru la demande de fournitures navales : bois de marine pour les navires et ainsi de suite. En conséquence, pratiquement tous les marchés de Cannor et de l'Escann ont signalé une hausse du prix des fournitures navales, et l'effet d'entraînement ne tardera pas à se propager vers le sud et l'est."
 anb_price.53.a:0 "Jetez une pierre à travers la mer, et les ondes se propagent bien au-delà..."
 FLEETS_TO_AELANTIR:0 "Flottes vers Aelantir"


 anb_price.54.t:0 "Commerce du Clou de Girofle"
 anb_price.54.d:0 "L'arôme chaud, épicé mais doux du clou de girofle était autrefois inconnu sur nos rivages et bien d'autres, pourtant nous entendons désormais de plus en plus parler de sa prolifération sur les marchés. Néanmoins, lorsqu'on évoque le girofle, il est rare de ne pas entendre mentionner dans la même phrase le grand port de Teramzandai, dans le sud de Fahvanosy. Ce port est devenu une plaque tournante du commerce du girofle ; Cannoriens, Vyzemby et hommes-lézards s'y bousculent pour marchander sur les quais. Il n'est donc pas surprenant qu'avec cet afflux de marchands mettant la main sur ces denrées exotiques, les prix aient également grimpé !"
 anb_price.54.a:0 "Le merveilleux parfum du profit !"
 clove_trade:0 "Commerce du clou de girofle"

 mithril:0 "Mithril"
 mithrilDESC:0 "Summum de la métallurgie naine, ce métal est à la fois plus léger et plus résistant que l'acier, bien que considérablement plus difficile à produire. Les secrets de sa fonte et de son travail sont des savoirs jalousement gardés que l'on croyait perdus lors des Derniers Jours du Dwarovar."

 fungi:0 "Champignons"
 fungiDESC:0 "Un assortiment de champignons exotiques et communs, tant comestibles que médicinaux. Ils comblent le vide laissé dans l'alimentation souterraine par l'absence d'accès à l'agriculture traditionnelle de surface, et constituent la culture de base et le repas fourragé des cavernes."

 serpentbloom:0 "Fleur-du-Serpent"
 serpentbloomDESC:0 "Ensemble de plantes souterraines bioluminescentes utilisées dans l'agriculture souterraine. Prospérant dans l'écosystème particulier qu'est l'Échine-du-Serpent, elles sont employées dans toutes sortes de fermes et plantations depuis des millénaires par les habitants de l'Échine, et forment la base de la chaîne alimentaire."

 COTTON_EXPORTS:0 "Exportations de coton"

 anb_price.100.t:0 "Besoin de Papier"
 anb_price.100.d:0 "Avec la renaissance de l'Ancienne Capitale, nous avons besoin de davantage de papier."
 anb_price.100.a:0 "Du papier pour imprimer de l'argent"
 paper_old_demaria_1:0 "Papier de l'Ancienne Damérie"

 anb_price.101.t:0 "Il Nous Faut Plus de Papier !"
 anb_price.101.d:0 "C'est un cauchemar administratif : il nous faut plus de papier !"
 anb_price.101.a:0 "DU PAPIEEEEEEEEER"
 paper_old_demaria_2:0 "Encore plus de papier pour l'Ancienne Damérie"

 anb_price.102.t:0 "La Soie Rouge à la Mode"
 anb_price.102.d:0 "Les ateliers elfiques produisant la fameuse soie rouge voient la demande monter en flèche. Nobles et marchands se l'arrachent, faisant grimper les prix."
 anb_price.102.a:0 "Un luxe qui a son prix."
 red_silk_1:0 "Soie rouge"

 anb_price.103.t:0 "La Soie Rouge se Raréfie"
 anb_price.103.d:0 "Les artisans elfiques peinent à satisfaire une demande toujours croissante. La soie rouge devient un véritable bien de prestige, difficile à acquérir."
 anb_price.103.a:0 "Les prix ne cessent de grimper."
 red_silk_2:0 "Soie rouge rare"

 anb_price.104.t:0 "Crise de la Soie Rouge"
 anb_price.104.d:0 "Une pénurie frappe les ateliers elfiques : manque de matières premières, tensions politiques, ou simplement changement des tendances ? Quelle qu'en soit la cause, la soie rouge atteint des prix sans précédent."
 anb_price.104.a:0 "Un luxe réservé aux plus fortunés."
 red_silk_3:0 "Soie rouge de luxe"

 anb_price.105.t:0 "Demande Croissante de Verre Alchimique"
 anb_price.105.d:0 "L'expansion rapide de notre guilde des alchimistes requiert toujours plus de fioles, bouteilles et récipients. Les verriers peinent à suivre, ce qui fait naturellement monter les prix."
 anb_price.105.a:0 "Toutes ces potions ont besoin de contenants."
 glass_potion_1:0 "Verre alchimique"

 anb_price.106.t:0 "Pénurie de Verre à Potions"
 anb_price.106.d:0 "La production de verre est désormais submergée par les commandes de la guilde. Les prix explosent, et même le récipient le plus simple est devenu un luxe."
 anb_price.106.a:0 "Nos alchimistes absorbent tout le marché."
 glass_potion_2:0 "Verre à potions rare"

 anb_price.107.t:0 "Un peu de Saumon ragnar ?"
 anb_price.107.d:0 "https://www.youtube.com/watch?v=e_rPbaLmzSM"
 anb_price.107.a:0 "salakis au bon lait de brebis"
 SALAKIS_BREBISS:0 "salakis au bon lait de brebis"

 anb_price.108.t:0 "Hausse du Prix du Vin et du Champagne"
 anb_price.108.d:0 "Suite à la prolifération de multiples cépages sur le marché, le vin connaît un renouveau et les prix ont grimpé en flèche."
 anb_price.108.a:0 "Le vin doit couler"
 LENCENORIAN_CEPAGE:0 "Cépages lencoriens"

 anb_price.109.t:0 "Hausse du Prix du Vin et du Champagne"
 anb_price.109.d:0 "Suite à la prolifération de multiples cépages sur le marché, le vin connaît un renouveau et les prix ont grimpé en flèche."
 anb_price.109.a:0 "Le vin doit couler"
 LENCENORIAN_CEPAGE:0 "Cépages lencoriens 2"