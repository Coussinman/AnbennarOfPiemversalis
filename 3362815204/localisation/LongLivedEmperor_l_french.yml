l_french:
 war_of_the_throne_tooltip:0 "Ceci pourrait déclencher une §RGuerre§! contre les §YÉlecteurs§!."
 rule_for_50years_tooltip:0 "Nous §YGouvernerons l'Empire§! pendant §Y50 ans§!."
 enforce_the_elder_pact_tooltip:0 "Nous §YFerons Appliquer le Pacte des Anciens§!, appelant §YChaque Électeur§! avec nous, et déposerons l'empereur par la §RGuerre§!."
 broke_elder_pact_tooltip:0 "L'opinion de §YChaque Membre de l'EdA§! envers §Y[Root.GetName]§! a changé de §R-50§!."
 broke_elder_pact:0 "A rompu le Pacte des Anciens"

 PEACE_po_enforce_elder_pact:0 "§YFaire Appliquer le Pacte des Anciens§!"
 PEACE_po_revoke_electorship_elder_pact:0 "§YRévoquer l'Électorat§!"
 po_revoke_electorship_elder_pact_desc:0 "§Y[From.GetName]§! perdra son électorat, car c'est le prix à payer pour s'être opposé à §Y[Root.Monarch.GetName]§!."
 po_enforce_elder_pact_desc:0 "§Y[From.Monarch.GetName]§! sera forcé d'§Yabdiquer§!, libérant l'empire de son règne illégitime."
 cb_enforce_elder_pact:0 "Faire Appliquer le Pacte des Anciens"
 cb_enforce_elder_pact_desc:0 "Ils ont rompu le Pacte des Anciens."
 ELDER_PACT_WAR_NAME:0 "Guerre pour Faire Appliquer le Pacte des Anciens"

 elder_pact_broken:0 "A rompu le Pacte des Anciens"

 long_lived_emperor.1.t:0 "Le Pacte des Anciens"
 long_lived_emperor.1.d:0 "Le Pacte des Anciens est un ancien pacte garantissant que les elfes et autres races à longue espérance de vie ne gouvernent pas l'Empire d'Anbennar pendant des centaines d'années."
 long_lived_emperor.1.a:0 "Nous verrons."

 long_lived_emperor.2.t:0 "Le Pacte des Anciens"
 long_lived_emperor.2.d:0 "[Root.Monarch.GetName] règne depuis plus de 50 ans maintenant, et doit se conformer aux règles du Pacte des Anciens."
 long_lived_emperor.2.a:0 "Nous abandonnerons la couronne."
 long_lived_emperor.2.b:0 "Venez donc la prendre !"
 long_lived_emperor.2.c:0 "Les électeurs votent toujours pour moi."

 long_lived_emperor.3.t:0 "Faire Appliquer le Pacte des Anciens"
 long_lived_emperor.3.d:0 "[From.Monarch.GetName], souverain de [From.GetName], a refusé d'abandonner la couronne et de se conformer aux règles du Pacte des Anciens ! C'est à nous maintenant de faire respecter les lois de l'Empire d'Anbennar !"
 long_lived_emperor.3.a:0 "À la guerre !"
 long_lived_emperor.3.b:0 "L'empire n'a pas besoin d'une guerre en ce moment..."

 long_lived_emperor.4.t:0 "Application du Pacte des Anciens"
 long_lived_emperor.4.d:0 "[From.GetName] nous a appelés à la guerre contre [Emperor.Monarch.GetName], qui refuse d'abandonner la couronne après avoir régné pendant plus de 50 ans ! Devons-nous les suivre dans leur guerre ?"
 long_lived_emperor.4.a:0 "Bien sûr !"
 long_lived_emperor.4.b:0 "Nous préférons nous abstenir..."

 long_lived_emperor.5.t:0 "Les Électeurs Gouvernent"
 long_lived_emperor.5.d:0 "Les Électeurs ont réussi à faire appliquer le Pacte des Anciens, rétablissant un règne légitime sur le trône de l'Empire d'Anbennar, forçant [Root.Monarch.GetName] à abdiquer !"
 long_lived_emperor.5.a:0 "Damnation !"

 long_lived_emperor.6.t:0 "La Colère de l'Empereur"
 long_lived_emperor.6.d:0 "[From.Monarch.GetName], souverain de [From.GetName] et empereur illégitime de l'Empire d'Anbennar, a révoqué notre électorat ! Maudits soient-ils !"
 long_lived_emperor.6.a:0 "Damnation !"

 long_lived_emperor.7.t:0 "L'Élection du Pacte des Anciens"
 long_lived_emperor.7.d:0 "Selon le Pacte des Anciens, tous les empereurs d'Anbennar à longue espérance de vie doivent réaffirmer leur droit à gouverner l'empire tous les 50 ans. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] règne maintenant depuis 49 ans. Dans un an, nous devrons non seulement remporter l'élection impériale, mais obtenir une majorité absolue des voix afin de conserver l'empire."
 long_lived_emperor.7.a:0 "Nous nous préparerons en conséquence."