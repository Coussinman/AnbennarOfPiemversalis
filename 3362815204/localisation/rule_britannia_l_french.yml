 SHARING_KNOWLEDGE_PROPERTIES:0 "Partage actuellement $INSTITUTION|Y$, qui peut durer jusqu'au $DATE|Y$."
 KNOWLEDGE_SHARED_BY:0 "Connaissances partagées par $LIST$."
 KNOWLEDGE_SHARING_EFFECT:0 "L'adoption de $INSTITUTION$ sera accélérée dans la région de la capitale de $RECIPIENT$."
 KNOWLEDGE_SHARING_INTERACT_DESC:0 "En payant §R$PERCENT$ %§! de leurs revenus ($INCOME|Y$ ¤) chaque mois, la croissance de notre plus ancienne institution établie non adoptée par eux (actuellement $INSTITUTION|Y$) sera accélérée de $GROWTH$ par mois dans leur région de la capitale."
 OFFER_KNOWLEDGESHARENEWDESC:0 "Souhaitez-vous procéder à l'offre de Partage de Connaissances à $COUNTRY|Y$ ? S'ils acceptent, ils nous paieront §G$PERCENT$ %§! de leurs revenus ($INCOME|Y$ ¤) chaque mois. Pendant ce temps, la croissance de notre plus ancienne institution établie non adoptée par eux (actuellement $INSTITUTION|Y$) sera accélérée de $GROWTH$ par mois dans leur région de la capitale."
 KNOWLEDGESHARE_EXPIRY:0 "L'accord expire une fois que $YEARS|Y$ ans se sont écoulés, qu'aucune autre connaissance ne peut être transférée, ou que nous nous retrouvons dans des camps opposés d'une guerre, selon ce qui se produit en premier."
 ASK_KNOWLEDGESHARENEWDESC:0 "Souhaitez-vous procéder à la demande de Partage de Connaissances à $COUNTRY|Y$ ? S'ils acceptent, nous leur paierons §G$PERCENT$ %§! de nos revenus ($INCOME|Y$ ¤) chaque mois. Pendant ce temps, la croissance de leur plus ancienne institution établie non adoptée par nous (actuellement $INSTITUTION|Y$) sera accélérée de $GROWTH$ par mois dans notre région de la capitale."
 OUTSIDE_COLONIAL_RANGE_ANY:0 "En dehors de la portée coloniale (depuis n'importe quelle province)."
 NO_INSTITUTION_TO_SHARE:0 "Il n'y a pas d'institution qu'ils peuvent apprendre de nous."
 NO_INSTITUTION_TO_SHARE_ASK:0 "Il n'y a pas d'institution que nous pouvons apprendre d'eux."
