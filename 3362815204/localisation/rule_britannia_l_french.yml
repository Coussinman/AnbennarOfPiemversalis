 OFFER_KNOWLEDGESHARETITLE:0 "Offrir un Partage de Connaissances"
 OFFER_KNOWLEDGESHAREDESC:0 "Offrir de partager des connaissances concernant les avancées technologiques de nos institutions."
 ASK_KNOWLEDGESHARE:0 "Les riches sophistiqués de $COUNTRY|Y$ nous donnent la chance de rattraper notre retard technologique par le biais du Partage de Connaissances, nous donnant $GROWTH$ de croissance vers $INSTITUTION$ dans les provinces de notre région de la capitale. Naturellement, des frais mensuels de §R$PERCENT$ %§! de nos revenus ($FEE$ ¤) seront payés par nous si nous acceptons."
 ASK_KNOWLEDGESHARETITLE:0 "Demander un Partage de Connaissances"
 ASK_KNOWLEDGESHAREDESC:0 "Demander qu'ils partagent des connaissances concernant les avancées technologiques de leurs institutions."
 ASK_KNOWLEDGESHARE_REVERSE:0 "La foule non éclairée de $COUNTRY|Y$ nous demande la chance de rattraper leur retard technologique par le biais du Partage de Connaissances, leur donnant $GROWTH$ de croissance vers $INSTITUTION$ dans les provinces de leur région de la capitale. Naturellement, nous exigerons des frais mensuels de §G$PERCENT$ %§! de leurs revenus ($FEE$ ¤) si nous acceptons."
 SELECT_NAVAL_DOCTRINE:0 "§YSélectionner une Doctrine Navale§!"
 SELECT_NAVAL_DOCTRINE_HEADER:0 "Sélectionner une Doctrine Navale"
 NO_NAVAL_DOCTRINE_SELECTED:3 "Aucune Doctrine Navale sélectionnée.\n\nLorsque nous aurons atteint la limite de forces pour soutenir une marine formidable, nous pourrons sélectionner une doctrine nationale pour que nos braves marins la suivent. Cela accordera à notre marine un avantage permanent spécifique."
 CURRENT_NAVAL_DOCTRINE:0 "Actuelle : $DOCTRINE|Y$"
 NAVAL_DOCTRINE_NOT_ENOUGH_FORCE_LIMIT:2 "§RVous devez avoir une limite de forces navales d'au moins $VALUE$ pour pouvoir changer votre Doctrine Navale.§!"
