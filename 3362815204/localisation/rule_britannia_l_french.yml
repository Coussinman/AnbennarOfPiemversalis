l_french:
 NUDGE_END_NODE_TITLE:0 "Aucune route sortante"
 NUDGE_END_NODE_DESC:0 "Le nœud commercial de $NAME|Y$ n'a pas de routes sortantes.\nVeuillez sélectionner un nœud avec des routes sortantes pour modifier les routes commerciales."
 LATENT_TRADE_GOODS_TOOLTIP_HEADER:0 "\nBiens commerciaux latents :\n$BODY$"
 LATENT_TRADE_GOODS_TOOLTIP_ONE:0 "$NAME|Y$\n$TRIGGER$"
 LATENT_TRADE_GOODS_TOOLTIP_SEVERAL_ENTRY:0 "$COL$$NAME$§! : $PERCENTAGE|%2Y$\n"
 LATENT_RESOURCE_DESC:0 "$GOODS|Y$ est une ressource latente dans cette province. Elle pourrait devenir disponible ultérieurement."
 introduction_of_newcommen_engine:0 "Introduction de la Machine Atmosphérique"
 desc_introduction_of_newcommen_engine:0 "Des entrepreneurs de cette province ont commencé à adapter la machine atmosphérique, augmentant considérablement la production des mines locales."
 introduction_of_coke_blast_furnaces:0 "Introduction des Hauts-Fourneaux au Coke"
 desc_introduction_of_coke_blast_furnaces:0 "Des entrepreneurs de cette province ont commencé à utiliser des hauts-fourneaux au coke dans la production locale de fer, augmentant considérablement la productivité."
 introduction_of_rotherham_plough:0 "Introduction de la Charrue Brabant"
 desc_introduction_of_rotherham_plough:0 "La charrue brabant, plus légère et plus efficace, a considérablement augmenté la productivité dans cette région."
 introduction_of_flying_shuttle:0 "Introduction de la Navette Volante"
 desc_introduction_of_flying_shuttle:0 "L'introduction de la navette volante a considérablement augmenté l'efficacité des tisserands de cette région, même si elle a également provoqué quelques troubles parmi les artisans locaux."
 introduction_of_spinning_jenny:0 "Introduction de la Spinning Jenny"
 desc_introduction_of_spinning_jenny:0 "La Spinning Jenny est rapidement adoptée par les tisserands de cette province. Cela augmente considérablement leur production, bien qu'il y ait également eu quelques troubles parmi ceux qui se sentent menacés par ce développement."
 introduction_of_watt_engine:0 "Introduction de la Machine à Vapeur"
 desc_introduction_of_watt_engine:0 "L'adoption de la machine à vapeur moderne propulse rapidement le développement de cette province."
 canals_and_turnpikes:0 "Canaux et Routes à Péage"
 desc_canals_and_turnpikes:0 "Des initiatives pour faciliter la circulation des marchandises dans cette province ont enfin permis aux entreprises locales de croître et de prospérer."
 agricultural_revolution:0 "Révolution Agricole"
 desc_agricultural_revolution:0 "Cette province bénéficie grandement des avancées réalisées dans la technologie et la méthodologie agricoles."
 economic_urbanization_modifier:0 "Urbanisation"
 desc_economic_urbanization_modifier:0 "Cette province a connu un grand afflux de population venant des campagnes environnantes."
 industrial_urbanization_modifier:0 "Afflux de Travailleurs"
 desc_industrial_urbanization_modifier:0 "L'économie florissante de cette province attire des gens de tout le pays. C'est un avantage à bien des égards, mais cela a également conduit à quelques troubles alors que les travailleurs tentent de vivre ensemble dans des quartiers très exigus de la ville."
 metalworks_modifier:0 "Fonderies Métallurgiques"
 desc_metalworks_modifier:0 "Cette province est devenue un centre majeur de production métallique après l'introduction de machines alimentées au charbon."
 textile_mills_modifier:0 "Filatures Textiles"
 desc_textile_mills_modifier:0 "Cette province est devenue un centre majeur de production textile."
 shipyards_of_x_modifier:0 "Grands Chantiers Navals"
 desc_shipyards_of_x_modifier:0 "Cette province est devenue un centre majeur de construction navale industrielle."
 gave_in_to_luddite_protests:0 "Artisans Protégés"
 desc_gave_in_to_luddite_protests:0 "Nous avons fait plusieurs concessions pour apaiser les artisans agités de cette province, protégeant leur travail au détriment d'une concurrence plus moderne."
 impoverished_artisans:0 "Artisans Appauvris"
 desc_impoverished_artisans:0 "Le secteur artisanal local souffre grandement de la concurrence des récents développements technologiques de production. Les artisans se retrouvent incapables de nourrir leurs familles et quittent la région à la recherche d'une nouvelle vie ailleurs."
 fire_compensation:0 "Industriels Payant la Restauration"
 desc_fire_compensation:0 "Les industriels locaux ont été mandatés pour payer la restauration de cette province après la propagation d'un incendie dangereux depuis une usine locale."
 industrialization_events.1.t:0 "La Machine Atmosphérique"
 industrialization_events.1.d:0 "S'appuyant sur d'anciennes pompes à air expérimentales, un inventeur de [invention_province.GetName] a créé un nouveau type de machine qui utilise la pression de la vapeur pour pomper l'eau hors des mines humides. La machine atmosphérique permet désormais l'extraction minière là où c'était auparavant impossible et a considérablement augmenté l'efficacité des mines de charbon et de métal de notre pays."
 industrialization_events.1.a:0 "Un avenir passionnant s'ouvre à nous."
 industrialization_events.1.a.tt:0 "Les provinces de §YCharbon§!, §YFer§! et §YCuivre§! ont désormais plus de chances de déclencher des événements d'industrialisation."
 industrialization_events.2.t:0 "Hauts-Fourneaux au Coke"
 industrialization_events.2.d:0 "[Root.inventor_name.GetName], un inventeur et entrepreneur de [invention_province.GetName], a mis au point un nouveau type de haut-fourneau au coke pour la production de fonte. En utilisant du charbon au lieu du charbon de bois, la production de fer a été considérablement augmentée, nous permettant d'approvisionner le marché en plus grandes quantités de fer bon marché."
 industrialization_events.2.d.england:0 "Abraham Darby, un inventeur et entrepreneur, a mis au point un nouveau type de haut-fourneau au coke pour la production de fonte. En utilisant du charbon au lieu du charbon de bois, la production de fer a été considérablement augmentée, nous permettant d'approvisionner le marché en plus grandes quantités de fer bon marché."
 industrialization_events.2.a:0 "Remarquable."
 industrialization_events.2.a.tt:0 "Les provinces de §YCharbon§! et §YFer§! ont désormais plus de chances de déclencher des événements d'industrialisation."
 industrialization_events.3.t:0 "Machine à Vapeur Améliorée"
 industrialization_events.3.d:0 "Améliorant la conception des machines atmosphériques antérieures, l'entrepreneur et inventeur [Root.inventor_name.GetName] a réussi à créer un nouveau type de machine qui utilise un condenseur séparé et un mouvement rotatif au lieu du mouvement oscillant des machines précédentes. Fonctionnant juste au-dessus de la pression atmosphérique, la machine à vapeur de [Root.inventor_name.GetName] promet d'être deux fois plus productive que les modèles antérieurs et s'avérera inestimable comme moyen d'actionner les machines dans tous types d'entreprises industrielles."
 industrialization_events.3.d.england:0 "Améliorant la conception des machines atmosphériques antérieures, l'entrepreneur et inventeur James Watt a réussi à créer un nouveau type de machine qui utilise un condenseur séparé et un mouvement rotatif au lieu du mouvement oscillant des machines précédentes. Fonctionnant juste au-dessus de la pression atmosphérique, la machine à vapeur de Watt promet d'être deux fois plus productive que les modèles antérieurs et s'avérera inestimable comme moyen d'actionner les machines dans tous types d'entreprises industrielles."
 industrialization_events.3.a:0 "Tchou-tchou."
 industrialization_events.3.a.tt:0 "Les provinces ont désormais plus de chances de déclencher des événements d'industrialisation."
 industrialization_events.4.t:0 "Charrue Brabant"
 industrialization_events.4.d:0 "Expérimentant avec de nouvelles formes et un versoir recouvert de fer, un inventeur local de [invention_province.GetName], [Root.inventor_name.GetName], a créé une charrue beaucoup plus légère, plus facile et plus efficace à utiliser. Combinée à d'autres inventions récentes dans le domaine des outils agricoles, la nouvelle charrue promet d'augmenter considérablement la productivité agricole de notre pays."
 industrialization_events.4.a:0 "Merveilleux."
 industrialization_events.4.a.tt:0 "Les provinces ont désormais plus de chances de déclencher des événements d'industrialisation."
 industrialization_events.5.t:0 "La Navette Volante"
 industrialization_events.5.d:0 "[Root.inventor_name.GetName], un inventeur local de [invention_province.GetName], a breveté un nouveau modèle de navette « à roues » qui promet de révolutionner le tissage en éliminant le besoin d'une seconde personne pour attraper la navette lorsqu'elle passe à travers les fils de chaîne. Bien que la productivité soit encore limitée par la vitesse à laquelle le fil peut être filé, déjà un goulot d'étranglement majeur dans la production textile, la navette se répand rapidement parmi les tisserands de tout le pays."
 industrialization_events.5.a:0 "Si seulement nos fileurs pouvaient suivre..."
 industrialization_events.5.a.tt:0 "Les provinces qui produisent de la §YLaine§!, du §YDrap§!, de la §YSoie§! ou du §YCoton§! ont désormais plus de chances de déclencher des événements d'industrialisation."
 industrialization_events.6.t:0 "Spinning Jenny"
 industrialization_events.6.d:0 "Une limitation majeure pour la productivité du tissage a longtemps été la vitesse à laquelle le fil peut être filé. Même avant l'introduction de la navette volante, un tisserand nécessitait quatre fileurs pour le servir. Pour surmonter cet obstacle, [Root.inventor_name.GetName], un inventeur de [invention_province.GetName], a conçu une machine permettant à un ouvrier de faire le travail de nombreux fileurs. Combinée à la navette volante, cette machine promet d'améliorer considérablement l'efficacité du tissage dans un avenir proche."
 industrialization_events.6.a:0 "Fantastique !"
 industrialization_events.6.a.tt:0 "Les provinces qui produisent de la §YLaine§!, du §YDrap§!, de la §YSoie§! ou du §YCoton§! ont désormais plus de chances de déclencher des événements d'industrialisation."
 industrialization_events.7.t:0 "Canaux et Routes à Péage"
 industrialization_events.7.d:0 "Les mauvaises routes ont longtemps été un facteur limitant pour la croissance économique à [industrial_province.GetName], entravant sévèrement le transfert de marchandises, de personnes et de capitaux. En regardant d'autres régions, les entrepreneurs locaux ont commencé à introduire des routes à péage pour payer l'entretien et il existe des plans avancés pour construire des canaux de transport afin de faciliter davantage la circulation locale des marchandises."
 industrialization_events.7.a:0 "Un objectif louable, ils auront notre patronage !"
 industrialization_events.7.b:0 "Excellente initiative, mais ce n'est pas à l'État de s'y engager."
 industrialization_events.8.t:0 "Les Germes de la Grandeur"
 industrialization_events.8.d:0 "Prenant à cœur les leçons des Lumières, un groupe de propriétaires terriens nobles a commencé à travailler à l'amélioration de l'efficacité agricole. Pionnier des inventions dans l'utilisation des machines pour la distribution des semences, des nouvelles cultures, des nouvelles formes de rotation des terres et de l'élevage, les propriétaires terriens locaux de [agricultural_province.GetName] ont pu améliorer considérablement la production alimentaire locale."
 industrialization_events.8.a:0 "Un excellent précédent à suivre pour les autres."
 industrialization_events.9.t:0 "Développement Économique"
 industrialization_events.9.d:0 "En employant les récentes innovations technologiques dans le domaine des machines, les entrepreneurs locaux ont commencé à améliorer considérablement leur production à [industrialization_province.GetName]. En conséquence, beaucoup se déplacent désormais vers la province depuis les campagnes environnantes, désireux de chercher un nouveau travail dans la ville grandissante de [industrialization_province.GetCapitalName]."
 industrialization_events.9.a:0 "[industrialization_province.GetCapitalName] sera un excellent foyer pour eux."
 industrialization_events.10.t:0 "Croissance de l'Industrie Textile de [industrialization_province.GetName]"
 industrialization_events.10.d:0 "Grâce à l'utilisation de machines et de méthodes de travail modernes, l'activité locale de tissage de [industrialization_province.GetName] s'est développée en une entreprise de bien plus grande envergure. Là où seuls des tissus simples étaient exportés autrefois, il y a maintenant un secteur de production de drap florissant, aidant grandement l'économie locale.\nCependant, tout le monde n'est pas satisfait de ce développement et les artisans de [old_cloth_province.GetName] ont pétitionné les autorités [old_cloth_province.Owner.GetAdjective] pour réprimer ces « produits de basse qualité » qu'ils croient inonder le marché."
 industrialization_events.10.a:0 "Le temps n'attend personne."
 industrialization_events.11.t:0 "Croissance de l'Industrie Papetière"
 industrialization_events.11.d:0 "Depuis quelque temps, les moulins locaux de [industrialization_province.GetName] produisent de petites quantités de papier. En utilisant de nouvelles techniques de production, les papetiers ont étendu leur activité, permettant à l'économie locale de s'épanouir. Bientôt, le papier pourrait même devenir la principale exportation de la province !"
 industrialization_events.11.a:0 "La parole écrite perdure."
 industrialization_events.12.t:0 "Croissance de l'Industrie Verrière de [glass_province.GetName]"
 industrialization_events.12.d:0 "[glass_province.GetName] a toujours eu une production locale de verre forestier, mais avec les progrès récents dans la production verrière, cette province est devenue un centre d'affaires local prometteur. Avec le soutien approprié, le verre pourrait devenir la principale exportation de la région."
 industrialization_events.12.a:0 "Santé."
 industrialization_events.13.t:0 "Urbanisation Industrielle"
 industrialization_events.13.d:0 "L'économie florissante de [urbanization_province.GetName] attire des gens de l'ensemble du [Root.GovernmentName] vers la province. Un flux constant de personnes quitte les campagnes pour chercher de nouvelles opportunités de travail et une nouvelle vie dans la ville de [urbanization_province.GetCapitalName]."
 industrialization_events.13.a:0 "Venez tous, vous êtes les bienvenus !"
 industrialization_events.14.t:0 "Les Fonderies de [iron_province.GetName]"
 industrialization_events.14.d:0 "L'introduction de machines industrielles modernes telles que le coke, les chemins de fer à vapeur et les pompes a grandement contribué à la croissance de l'économie locale à [iron_province.GetName]. Les fonderies locales comptent désormais parmi les meilleures de la région."
 industrialization_events.14.a:0 "C'est l'aube d'une nouvelle ère."
 industrialization_events.15.t:0 "Filatures Textiles de [textile_province.GetName]"
 industrialization_events.15.d:0 "La demande croissante de textiles et l'adoption de nouvelles méthodes et machines ont permis au secteur textile de [textile_province.GetName] de croître et de prospérer ces dernières années. Cela a à son tour entraîné un essor économique pour toute la région, et beaucoup quittent désormais les campagnes pour les nouvelles usines."
 industrialization_events.15.a:0 "Ces métiers habilleront la nation."
 industrialization_events.16.t:0 "Chantiers Navals de [ship_province.GetName]"
 industrialization_events.16.d:0 "De nouvelles avancées dans l'organisation du travail, ainsi que des innovations techniques, ont conduit à une croissance rapide des chantiers navals de [ship_province.GetName]. Les navires et les fournitures navales sont désormais produits plus efficacement, et en conséquence de cet essor économique, la province attire davantage de personnes pour travailler dans les chantiers navals locaux."
 industrialization_events.16.a:0 "[Root.GetName] règne sur les flots."
 industrialization_events.17.t:0 "Hostilité aux Nouvelles Techniques de Production"
 industrialization_events.17.d:0 "Les changements dans les méthodes de production apportés par le progrès technologique n'ont pas été accueillis favorablement par tous. Certains estiment que leur gagne-pain est menacé par la mécanisation croissante et causent des troubles par des protestations et du sabotage. À [luddite_province.GetName], les choses ont même dégénéré en une véritable insurrection parmi les artisans."
 industrialization_events.17.a:0 "Luddites !"
 industrialization_events.17.b:0 "Nous devrons négocier."
 industrialization_events.18.t:0 "Artisans Appauvris"
 industrialization_events.18.d:0 "Les nouvelles méthodes de production ont conduit à l'essor d'une industrie textile prometteuse dans notre pays. Cependant, cette croissance a laissé de nombreuses anciennes familles d'artisans sur le carreau. Beaucoup sont désormais pauvres et doivent chercher un emploi bien moins rentable dans l'industrie en pleine croissance."
 industrialization_events.18.a:0 "Ainsi va le monde."
 industrialization_events.18.b:0 "Faisons ce que nous pouvons pour soutenir ces gens."
 industrialization_events.19.t:0 "Propagation de Maladies à [disease_province.GetCapitalName]"
 industrialization_events.19.d:0 "La ville de [disease_province.GetCapitalName] a connu une croissance immense ces dernières années et le plan autrefois si ambitieux pour la ville a été entièrement subverti. Beaucoup vivent dans des bidonvilles avec des conditions sanitaires très médiocres. La maladie se propage désormais rapidement dans la ville."
 industrialization_events.19.a:0 "Nous devons agir !"
 industrialization_events.19.b:0 "Il n'y a rien que nous puissions faire."
 industrialization_events.20.t:0 "Accident Minier à [mining_province.GetName]"
 industrialization_events.20.d:0 "Les nouvelles technologies ont permis d'agrandir considérablement les mines de [mining_province.GetName] et elles fonctionnent désormais avec une efficacité qui aurait choqué nos ancêtres.\nLes nouvelles machines ne sont cependant pas sans risques. Une explosion dans une mine locale a provoqué un effondrement qui a piégé de nombreux mineurs et causé un important recul de la production."
 industrialization_events.20.a:0 "Malheureux."
 industrialization_events.21.t:0 "Incendie de [fire_province.GetCapitalName]"
 industrialization_events.21.d:0 "Un incendie qui a démarré dans une usine locale s'est rapidement propagé parmi les maisons serrées de [fire_province.GetCapitalName] et a dévasté la ville. Certains y voient un problème supplémentaire de l'urbanisation et de l'industrialisation croissantes de notre époque."
 industrialization_events.21.a:0 "Les propriétaires d'usines doivent contribuer à la reconstruction de la ville."
 industrialization_events.21.b:0 "Nous devons aider ces pauvres gens."
 industrialization_events.22.t:0 "Production Locale Écrasée"
 industrialization_events.22.d:0 "Notre politique d'extraction de matières premières de nos provinces lointaines pour alimenter l'industrialisation de notre patrie a entraîné un développement économique écrasant dans la région de [overseas_production_province.GetAreaName]. Malgré une fière histoire de [overseas_production_province.GetFancyTradeGood], la région a maintenant été réduite à exporter des produits non raffinés, à peine plus que des matières premières à retravailler par d'autres."
 industrialization_events.22.a:0 "Nous devons soutenir les artisans locaux."
 industrialization_events.22.b:0 "C'est pour le mieux."
 anglican_religion_desc:0 "L'anglicanisme est une forme de protestantisme dans laquelle le chef de l'État est également le Gouverneur Suprême de l'Église. Théologiquement et institutionnellement, l'anglicanisme conserve de nombreux éléments du catholicisme tout en étant également influencé par les puritains réformés et les protestants continentaux."
 anglican:0 "Anglican"
 divorce_consort_aspect:0 "§YDivorcer de la Consort§!"
 desc_divorce_consort_aspect:1 "Le monarque s'inquiète que sa consort n'ait pas réussi à lui donner un héritier convenable. Elle doit partir.\n\nNous gagnons §G12§! £adm£, £dip£ et £mil£ pour chaque statistique de la consort divorcée manquant pour atteindre la valeur maximale respectivement.\n§Y(Une consort 6/6/6 ne donnerait aucun pouvoir de monarque tandis qu'une consort 0/0/0 donnerait 72 de chaque catégorie.)§!"
 gain_consort_aspect:1 "§YÉpouser une Noble Locale§!"
 desc_gain_consort_aspect:0 "Il y a de nombreuses demoiselles éligibles dans la nation prêtes à épouser notre monarque. Étant donné notre manque actuel de consort, nous devrions considérer ce bassin de prétendantes."
 gain_consort_aspect_tt:0 "[Root.Monarch.GetName] épouse une nouvelle consort. Augmente la chance d'un nouvel héritier de §G100 %§! pendant §Y15 ans§!."
 a_new_consort_heir_modifier:0 "Nouvelle Consort Royale"
 desc_a_new_consort_heir_modifier:0 "Un nouvel héritier pourrait émerger pour notre pays grâce à l'aide de la nouvelle consort de notre [Root.Monarch.GetTitle]."
 dissolve_monasteries_aspect:0 "§YDissoudre les Monastères§!"
 desc_dissolve_monasteries_aspect:0 "Le monachisme papiste est dépassé et hérétique. Nous devons dissoudre davantage des maisons religieuses non-conformistes restantes, les dépouiller de leurs terres et confisquer leurs objets de valeur."
 dissolve_monasteries_aspect_tt:0 "L'§Y[Root.GetChurchOrFallbackName]§! perd §Y10§! d'influence pendant §Y15 ans§!."
 dissolve_monasteries_aspect_ct:0 "Monastères dissous : $VAL|Y$§Y %§!"
 monopoly_aspect:0 "§YAccorder un Monopole§!"
 desc_monopoly_aspect:0 "Les chartes de monopole ne devraient être accordées qu'aux hommes loyaux et fidèles qui se conforment à la doctrine de l'Église."
 stability_aspect:0 "§YProgression du Gouverneur Suprême§!"
 desc_stability_aspect:0 "Faire parader le Gouverneur Suprême, également chef de l'État, à travers le pays renforce l'esprit public et encourage la loyauté."
 innovativeness_aspect:0 "§YEncourager l'Innovation§!"
 desc_innovativeness_aspect:0 "Les vieilles vues de l'Église sont une relique des temps de superstition. Nous devons encourager l'innovation parmi le clergé et notre peuple.\n\nAugmente le gain d'innovation de §G+50,0 %§! et la croissance du progrès de réforme de §G+15,0 %§! pendant §Y15 ans§!.\nUne province §YAnglicane§! aléatoire possédée qui a soit une §YÉglise§!, soit une §YCathédrale§!, soit une §YUniversité§! gagne §G1§! de production de base."
 innovativeness_aspect_tt:0 "Augmente le gain d'innovation et de progrès de réforme.\nUne province aléatoire gagne de la production de base."
 anglican_innovativeness:0 "Innovation Anglicane"
 desc_anglican_innovativeness:0 "L'Église anglicane a encouragé les nouvelles découvertes en matière d'idées et de technologie pour la gloire de la foi et de l'État."
 expel_heretics_aspect:0 "§YDéporter les Hérétiques§!"
 desc_expel_heretics_aspect:0 "Les hérétiques sont un danger pour notre religion et notre culture. Nous devrions les expulser de notre terre et les envoyer au Nouveau Monde.\n\nSi nous possédons une province coloniale, elle gagne §G100§! de population. Augmente également la chance de colons de §G5,0 %§! et l'unité religieuse de §G10,0 %§! pendant §Y15 ans§!.\nIl y a une chance de §Y33 %§! que la colonie adopte l'une des religions §Yhérétiques§!."
 expel_heretics_aspect_tt:0 "Une colonie possédée aléatoire gagne §G100§! de population.\nAugmente la chance de colons et l'unité religieuse."
 expelling_heretics:0 "Déportation des Hérétiques"
 desc_expelling_heretics:0 "Les ordres du [Root.Monarch.GetTitle] sont clairs : quiconque admet l'hérésie sera soit brûlé, soit expulsé dans nos colonies reculées."
 diplomats_of_the_reformation_aspect:0 "§YDiplomatie de la Réforme§!"
 desc_diplomats_of_the_reformation_aspect:0 "Bien que l'anglicanisme soit une branche spéciale de la Réforme, nous sommes toujours frères et sœurs des fois protestante et réformée. Nous devrions établir un contact diplomatique avec les nations de nos fois sœurs."
 diplomats_of_the_reformation_aspect_tt:0 "Augmente l'opinion de tous les pays §YProtestants§!, §YRéformés§!, §YHussites§! et §YAnglicans§! de §G50§!."
 anglican_reformation_diplomacy:0 "Diplomatie Anglicane"
 icons_of_the_church_aspect:0 "§YMilitariser les Icônes Religieuses§!"
 desc_icons_of_the_church_aspect:0 "La religion joue un rôle important non seulement dans notre société mais aussi dans notre armée. Le moral de notre armée peut être augmenté si elle est autorisée à utiliser les icônes de l'Église pendant ses campagnes."
 icons_of_the_church_aspect_tt:0 "Augmente le moral terrestre de §G10,0 %§! et réduit les dégâts de choc reçus de §G-10,0 %§! pendant §Y15 ans."
 anglican_militarized_church_aspect:0 "Icônes Religieuses pour l'Armée"
 desc_anglican_militarized_church_aspect:0 "Nos armées utilisent des icônes religieuses anglicanes pendant leurs campagnes, augmentant leur moral et, certains le supposent, leur chance."
 anglican_events.1.t:0 "L'Affichage des Armoiries Royales"
 anglican_events.1.d:0 "Suite à la destruction et au retrait des symboles papistes, les églises anglicanes se sont retrouvées quelque peu dépouillées de décoration. Il a été décrété qu'à la place de ces icônes blasphématoires, les armoiries royales de [Root.Monarch.GetName] doivent être affichées. La présence des armoiries royales ancre dans la conscience publique la réalité du nouvel ordre : que [Root.Monarch.GetName] est désigné par Dieu non seulement comme [Root.Monarch.GetTitle] de $COUNTRY$, mais aussi comme Gouverneur Suprême de l'Église."
 anglican_events.1.a:0 "Affichez fièrement les armoiries royales dans chaque église."
 anglican_events.2.t:0 "Récusation"
 anglican_events.2.d:0 "Assister aux services anglicans est obligatoire dans le [Root.GovernmentName] de $COUNTRY$. La récusation est punissable par de lourdes amendes. Une personne reconnue coupable doit renoncer à tous ses biens et effets personnels, ses terres, tenures et héritages, et toutes ses rentes et annuités. L'application de la loi est cependant difficile en raison du nombre considérable de récusants potentiels, et nous devrions donc concentrer nos efforts sur les contrevenants les plus préoccupants.\n\nLe papisme est un crime particulièrement odieux. Comme le Pape nie la légitimité du [Root.Monarch.GetTitle], les catholiques fidèles doivent en faire autant, et ainsi tous les catholiques peuvent être considérés comme des traîtres à l'État.\n\nLes non-conformistes radicaux tels que les puritains peuvent également être ciblés par ces lois s'ils s'écartent trop des doctrines établies de l'Église.\n\nLa loi impose l'uniformité de la croyance religieuse en $COUNTRY$, mais elle pourrait également être utilisée pour décourager le factionnalisme au sein de la cour. La simple suggestion de récusation peut détruire la réputation d'une personne à la cour."
 anglican_events.2.a:0 "Cibler les catholiques."
 anglican_events.2.b:0 "Cibler les puritains."
 anglican_events.2.c:0 "Cibler les menaces politiques."
 anglican_events.3.t:0 "Prophéties et Sermons"
 anglican_events.3.d:1 "L'Église anglicane n'exige pas que son clergé consacre beaucoup de temps à la prédication. Un sermon mensuel ou même trimestriel est adéquat selon la loi, qui est généralement tirée directement du Livre des Homélies.\n\nDe nombreux paroissiens désirent une approche plus personnelle et impliquée des services religieux, et ont pris les choses en main en collectant de l'argent pour payer des prédicateurs éduqués pour prêcher dans leurs villes. Ces prédicateurs n'ont cependant pas toujours les vues théologiques les plus orthodoxes. Il arrive souvent que les plus désireux de prêcher soient ceux qui ont les idées les plus radicales, et ainsi ces sermons privés sont devenus associés au mouvement puritain.\n\nBien qu'il y ait des avantages à avoir une population plus instruite religieusement, réprimer le puritanisme augmenterait l'autorité de l'Église."
 anglican_events.3.a:0 "Interdire ces sermons non-conformistes."
 anglican_events.3.b:0 "Laissons-les prêcher comme ils le souhaitent."
 anglican_events.4.t:0 "Débat Parlementaire sur la Doctrine"
 anglican_events.4.d:2 "Le [Root.GetAdjective] [Root.GetParliamentName] est souvent appelé à débattre de questions religieuses. Typiquement, le [Root.Monarch.GetTitle] proposera une nouvelle vague de réformes pour l'Église anglicane et le [Root.GetParliamentWithGrammer] prendra position selon les lignes factionnelles établies ; les membres des Communes plus susceptibles de soutenir des mesures radicales ou même puritaines, les Lords temporels plus susceptibles de favoriser une approche plus conservatrice. Rarement le [Root.Monarch.GetTitle] obtient-[Root.Monarch.GetSheHe] exactement ce qu'[Root.Monarch.GetSheHe] veut, et quand c'est le cas, des mesures coercitives sont souvent impliquées."
 anglican_events.4.a:0 "Faire passer les réformes exactement comme le [Root.Monarch.GetTitle] les a proposées."
 anglican_events.4.b:0 "Les Lords l'emportent."
 anglican_events.4.c:0 "Les Communes ont leur mot à dire."
 anglican_events.5.t:0 "Les Pamphlets Marprelate"
 anglican_events.5.d:1 "Insatisfaits de l'établissement conservateur de l'Église anglicane, un groupe de puritains écrivant sous le pseudonyme de « Martin Marprelate » a commencé à publier une série de pamphlets cinglants dirigés contre la direction de l'Église. Les évêques de $COUNTRY$, selon ces auteurs, sont des « prélats orgueilleux, papistes, présomptueux, profanes, misérables, pestilentiels et pernicieux » qui usurpent l'autorité de Dieu.\n\nCes pamphlets ont attiré l'attention du public et risquent de ridiculiser l'Établissement si rien n'est fait."
 anglican_events.5.a:0 "Ignorer ces absurdités."
 anglican_events.5.b:0 "Répondre de la même manière, c'est une guerre de pamphlets !"
 anglican_events.5.c:0 "Trouver et arrêter les auteurs."
 anglican_events.6.t:0 "Rébellions du Livre de Prières"
 anglican_events.6.d:0 "Les doctrines de l'Église anglicane sont contenues dans le Livre de Prières Communes. C'est un livre qui nécessite des révisions périodiques pour s'accorder avec les changements dans la pensée anglicane, oscillant entre une théologie plus radicale et plus traditionnelle. L'édition la plus récente contient des éléments qui ont grandement irrité le peuple de [prayer_book_province.GetName], dont beaucoup s'accrochent encore aux dogmes et pratiques catholiques. Ils se sont soulevés en révolte, exigeant que le Livre soit rétabli dans son édition précédente."
 anglican_events.6.a:0 "Abroger la nouvelle édition et faire des concessions traditionalistes."
 anglican_events.6.b:0 "Nous ne tolérerons pas la trahison papiste !"
 anglican_events.7.t:0 "Homme d'État Crypto-Catholique"
 anglican_events.7.d:0 "La Réforme [Root.GetAdjective] n'a pas conquis les cœurs et les esprits de toute la population. Beaucoup continuent de nourrir des sympathies catholiques, même parmi la cour. Il a été découvert que $STATESMAN$ a secrètement assisté à une messe catholique, une pratique strictement interdite par la loi. S'il est exposé, [Root.Dip_Advisor.GetSheHe] risque de perdre toutes ses terres et propriétés, et ne sera plus éligible à une fonction publique."
 anglican_events.7.a:0 "Ils sont trop utiles, pour l'instant."
 anglican_events.7.b:0 "Pas de catholiques dans ma cour !"
 anglican_events.7.c:0 "Qu'on lui coupe la tête !"
 anglican_events.8.t:0 "Prières aux Saints"
 anglican_events.8.d:0 "Lorsque $COUNTRY$ a rompu avec Rome, nous avons abandonné la notion superstitieuse selon laquelle les prières devraient être adressées aux Saints plutôt qu'à Dieu lui-même. Comme notre nouvelle théologie n'a pas de place pour le concept papiste de Purgatoire, il n'y a pas besoin que les Saints intercèdent en faveur de nos âmes. Malgré cela, beaucoup de gens continuent la pratique de prier les Saints, et de nombreuses églises accordent une révérence excessive à leur patron."
 anglican_events.8.a:0 "C'est inoffensif, nous pouvons permettre cela."
 anglican_events.8.b:0 "L'uniformité doit être imposée."
 anglican_events.9.t:0 "Abolition des Jours de Fête"
 anglican_events.9.d:0 "Le calendrier liturgique catholique est rempli de jours de fête qui fonctionnent comme des jours fériés et des occasions de célébration. N'étant plus sous l'autorité papale, notre propre Église doit décider jusqu'où cette pratique devrait continuer. Les réformateurs les plus fervents soutiennent que les jours fériés superflus encouragent la tentation pécheresse et distraient du travail profitable. Cela a été accueilli avec un large accord en termes de théologie, mais abolir les jours de fête risque de contrarier la population qui apprécie tant un jour de congé occasionnel."
 anglican_events.9.a:0 "Abolir davantage de jours de fête."
 anglican_events.9.b:0 "Laissons-les s'amuser."
 anglican_events.10.t:0 "Puritains Partant pour les Colonies"
 anglican_events.10.d:0 "Les puritains critiquent depuis un certain temps la hiérarchie et les doctrines de l'Église de $COUNTRY$. La Réforme, à leurs yeux, n'a fait que remplacer le Pape par le [Root.Monarch.GetTitle] et ils dénoncent ouvertement l'attitude paresseuse de l'État envers la réforme. Mises à part les disputes théologiques, les puritains ont également été persécutés en tant que non-conformistes, selon les penchants du [Root.Monarch.GetTitle] actuel. Finalement épuisés par les affaires religieuses de l'Europe, de nombreux puritains ont décidé de migrer vers le Nouveau Monde. Ils se sont organisés en compagnie coloniale et ont demandé une charte pour établir de nouvelles colonies en Aelantir."
 anglican_events.10.b:1 "Les intégrer dans une colonie établie."
 anglican_events.10.a:1 "Les laisser construire leur propre colonie."
 anglican_events.11.t:0 "Controverse sur les Vêtements Liturgiques"
 anglican_events.11.d:0 "La question des vêtements cléricaux reste un sujet de discorde dans l'Église anglicane. Les haillons extravagants et superstitieux des papistes doivent certainement être abandonnés, mais le degré d'austérité requis du clergé continue d'enflammer le débat et la protestation.\n\nLes anglicans conservateurs souhaitent réinstaurer certains des ornements élaborés de l'ancien sacerdoce catholique, tandis que les modérés soutiennent qu'un simple surplis est suffisant. Les réformateurs radicaux insistent sur le fait que les vêtements liturgiques non seulement manquent de soutien scripturaire, mais défigurent et corrompent les ordonnances instituées par Dieu."
 anglican_events.11.a:0 "Autoriser les vêtements traditionnels."
 anglican_events.11.b:0 "Surplis uniquement."
 anglican_events.11.c:0 "Dénoncer tous les vêtements liturgiques."
 anglican_events.12.t:0 "Destruction des Autels"
 anglican_events.12.d:0 "Les premières années de la Réforme anglaise sont une époque d'iconoclasme fervent. Tout ornement ou relique qui suggère même le papisme, l'existence du Purgatoire ou la divinité des saints est impitoyablement retiré des églises. Tout ce qui pourrait égarer les laïcs doit être détruit ; les autels sont brisés, les peintures recouvertes, les sanctuaires ruinés.\n\nUn problème perpétuel pour la nouvelle Église anglicane est la question de savoir jusqu'où cet iconoclasme devrait aller. Certains réformateurs plus radicaux poussent à la fin des crucifix, des chandeliers et des croix, tandis que d'autres cherchent la restauration de certains ornements plus inoffensifs."
 anglican_events.12.a:0 "Briser les autels et emprisonner les protestataires papistes !"
 anglican_events.12.b:0 "Ne détruire que ce qui est indéniablement papiste."
 anglican_events.12.c:0 "Mettre fin à cet iconoclasme."
 anglican_events.13.t:0 "Instigateurs Catholiques"
 anglican_events.13.d:0 "Bien que $COUNTRY$ ait formellement rompu avec Rome, le Pape continue de s'immiscer dans nos affaires en orchestrant des complots contre [Root.Monarch.GetName]. Jésuites et prêtres comptent parmi ses agents, abrités par des récusants traîtres.\n\nCes crypto-catholiques emploient des méthodes astucieuses pour cacher les agents papistes à la loi, construisant ingénieusement des espaces secrets derrière les murs, sous les planchers, et même dans des passages souterrains dissimulés. Se cacher dans ces « trous à prêtres » peut blesser ou même asphyxier leurs occupants, donc ils sont au moins peu susceptibles de pouvoir s'échapper rapidement une fois localisés."
 anglican_events.13.a:0 "Mener une chasse aux prêtres nationale. Fouillez chaque maison !"
 anglican_events.13.b:0 "Découvrir d'où ils viennent."
 anglican_events.14.t:0 "L'Église de $COUNTRY$"
 anglican_events.14.d:0 "Alors que la Réforme protestante change radicalement le paysage religieux de Cannor, $COUNTRY$ doit prendre une position ferme sur sa foi. Cela a bien sûr provoqué beaucoup de discussions à la cour, certains favorisant la cause protestante et d'autres défendant la religion traditionnelle.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName], cependant, a une idée nouvelle pour la création d'un type d'Église différent. Une Église avec le [Root.Monarch.GetTitle] comme Gouverneur Suprême, une heureuse union de l'Église et de l'État. Ni protestante, ni catholique, ni réformée, elle adopterait une approche flexible de la doctrine selon les circonstances.\n\nUne telle Église aurait ses avantages. N'étant plus soumis à aucune autorité ecclésiastique supérieure, le [Root.Monarch.GetTitle] pourrait se marier et divorcer à volonté, déterminer la direction théologique de la nation, et avoir l'assurance qu'il est désigné pour régner directement par Dieu."
 anglican_events.14.a:0 "Fonder une nouvelle Église d'État."
 anglican_events.14.b:0 "Évangéliser la nouvelle Église dans le monde !"
 anglican_events.14.c:0 "Cela semble être une base médiocre pour une religion."
 anglican_events.14.c.tt:0 "Il n'y aura pas d'autre opportunité de se convertir à l'anglicanisme."
 anglican_events.15.t:0 "Monarque Non-Conformiste"
 anglican_events.15.d:0 "[Root.Monarch.GetName] s'est retrouvé dans la position peu enviable d'être à la fois un non-conformiste religieux et le Gouverneur Suprême de l'Église de $COUNTRY$. Les anglicans de $COUNTRY$ peinent à tolérer cet état de fait, et la légitimité de l'Église est dramatiquement affaiblie."
 anglican_events.15.a:0 "Ce sera un ajustement difficile."
 anglican_events.15.b:0 "Le monarque doit être anglican."
 angry_nonconformists:0 "Non-Conformistes Irrités"
 desc_angry_nonconformists:0 "L'État a forcé le monarque à se convertir à la foi anglicane, irritant grandement les chrétiens non-conformistes de notre nation."
 political_recusancy:0 "Récusation Politisée"
 desc_political_recusancy:0 "Nous utilisons les lois de récusation pour emprisonner les menaces politiques dans le pays."
 commons_decide_doctrine:0 "Les Communes Décident de la Doctrine"
 desc_commons_decide_doctrine:0 "La Chambre des Communes a une influence excessive sur les questions doctrinales dans l'Église d'État."
 prayer_book_rebels_appeased:0 "Rebelles du Livre de Prières Apaisés"
 desc_prayer_book_rebels_appeased:0 "Nous revenons sur les modifications du Livre de Prières Communes pour apaiser une révolte populaire contre les réformes."
 prayers_to_saints_allowed:0 "Prières aux Saints Autorisées"
 desc_prayers_to_saints_allowed:0 "Malgré les problèmes théologiques de cette pratique, nous permettons aux gens d'adresser des prières aux Saints."
 prayers_to_saints_banned:0 "Prières aux Saints Interdites"
 desc_prayers_to_saints_banned:0 "Conformément à la doctrine anglicane, prier les Saints plutôt que directement Dieu est considéré comme hérétique."
 feast_days_abolished:0 "Jours de Fête Abolis"
 desc_feast_days_abolished:0 "Les jours fériés religieux superflus ont été abolis."
 anglican_feast_days:0 "Jours de Fête Restaurés"
 desc_anglican_feast_days:0 "Nous avons réinstauré certains des anciens jours de fête liturgiques, donnant à nos citoyens quelques jours de congé bien mérités."
 puritan_colonists:0 "Colons Puritains"
 desc_puritan_colonists:0 "Les puritains affluent vers nos colonies en Aelantir, s'étant vu refuser une colonie à eux."
 puritan_settlement:0 "Colonie Puritaine"
 desc_puritan_settlement:0 "Cette colonie est habitée par des puritains souhaitant établir leurs propres communautés religieuses."
 anglican_iconoclasm:0 "Iconoclasme Anglican"
 desc_anglican_iconoclasm:0 "Les gens détruisent avec enthousiasme les icônes papistes à travers notre pays."
 priest_hunters:0 "Chasseurs de Prêtres"
 desc_priest_hunters:0 "Les instigateurs catholiques dans notre pays sont une menace omniprésente. Nous organisons un effort national pour trouver les prêtres catholiques cachés."
 anglican_evangelism:0 "Évangélisation Anglicane"
 desc_anglican_evangelism:0 "Nous sommes déterminés à répandre la foi anglicane au-delà de nos frontières. Étant une Église d'État, cela a nui à notre réputation internationale."
 anglican_evangelism_opinion:0 "Évangélisation Anglicane"
 anglican_center_of_reformation:0 "Centre de la Réforme"
 ignore_marprelate:0 "Ignorer les Pamphlets Marprelate"
 desc_ignore_marprelate:0 "Nous refusons de reconnaître les divagations de ces puritains."
 respond_marprelate:0 "Guerre des Pamphlets"
 desc_respond_marprelate:0 "Nous répondons de la même manière à l'invective empoisonnée des pamphlets Marprelate."
 imprison_marprelate:0 "Emprisonner les Marprelate"
 desc_imprison_marprelate:0 "La publication d'hérésie contre l'Église ne peut être tolérée, nous travaillons à trouver et emprisonner les auteurs des pamphlets Marprelate."
 fancy_vestments:0 "Vêtements Élaborés"
 desc_fancy_vestments:0 "Le clergé revêt des vêtements plus élaborés en public. C'est bien sûr très impressionnant."
 nonconformist_anglican_monarch:0 "Monarque Non-Conformiste"
 desc_nonconformist_anglican_monarch:0 "Le monarque est Gouverneur Suprême de l'Église, mais ne suit pas la foi."
 COMMONS_REFORM_CHURCH:1 "Les Communes réforment l'Église : §Y$VAL$ %§!"
 EST_VAL_VESTMENTS_BANNED:0 "Vêtements cléricaux interdits : §Y$VAL$ %§!"
 innovativeness:0 "Innovation"
 NEWS_BANNER_OK_TOOLTIP:0 "Fermer et ne plus afficher."
 critical_press:1 "Imprimeurs Déloyaux"
 desc_critical_press:0 "Notre réticence à traquer ceux qui répandraient de la propagande contre l'État a entraîné un certain mécontentement à travers notre pays."
 harbored_inventor:0 "Inventeur Hostile Hébergé"
 public_schools:0 "Écoles pour le Public"
 desc_public_schools:0 "Des écoles ouvertes aux masses pauvres et non éduquées sont financées par un philanthrope local et l'établissement religieux de cette province. Bien que cela fasse des merveilles pour l'alphabétisation populaire, cela tend également à mettre quelques idées étranges dans la tête des gens, sans parler de renforcer le pouvoir de l'église."
 EST_VAL_PUBLIC_SCHOOLS:1 "Écoles publiques : §Y$VAL$ %§!"
 new_royal_society:0 "Soutien à une Nouvelle Société Savante"
 desc_new_royal_society:0 "Nous avons accordé notre patronage à une nouvelle société savante, désireuse de travailler pour l'amélioration de notre pays."
 unpopular_dissections:0 "Dissections Impopulaires"
 desc_unpopular_dissections:0 "Les habitants de cette province sont mécontents de ce qu'ils considèrent comme le comportement impie de ceux qui étudient l'anatomie et dissèquent des cadavres frais pour le progrès de la science."
 dissenting_academies:0 "Académies Dissidentes"
 desc_dissenting_academies:0 "Un certain nombre d'institutions du pays enseignent en dehors de la doctrine religieuse établie."
 PHYSIOCRACY:1 "Physiocratie : §Y$VAL$ %§!"
 blasphemous_scientist_punished:0 "Philosophe Naturel Blasphémateur Puni"
 desc_blasphemous_scientist_punished:0 "Un traité de philosophie naturelle a offensé les sensibilités religieuses de la population. L'auteur a donc été sévèrement puni."
 religion_mocked:0 "Religion Moquée par un Philosophe Naturel"
 desc_religion_mocked:0 "Un traité récent a moqué l'établissement religieux de manière scandaleuse. Bien que la publication ait été autorisée, elle a causé de l'offense parmi les fidèles."
 coffee_houses:0 "Cafés"
 desc_coffee_houses:0 "Les cafés sont populaires dans toute la nation, servant de lieux de rassemblement pour les intellectuels pour débattre de leurs idées."
 coffee_houses_banned:0 "Cafés Interdits"
 desc_coffee_houses_banned:0 "Les cafés répandaient des idées dangereuses parmi la population. Ils ont été justement interdits."
 cabinet_of_curiosities:0 "Cabinet de Curiosités"
 desc_cabinet_of_curiosities:0 "Une collection d'objets merveilleux et curieux du monde entier est arrangée et exposée par l'État."
 turned_away_inventor:0 "Inventeur Refoulé"
 innovativeness_events.1.t:0 "Liberté de la Presse"
 innovativeness_events.1.d:0 "Avec la diffusion de l'alphabétisation populaire, un grand nombre de publications mineures bon marché ; pamphlets, livrets et similaires, ont commencé à circuler en plus grand nombre. Bien que beaucoup d'entre elles ne soient que des ballades populaires, des histoires ou des potins, certaines sont des tentatives à peine voilées de critiquer les piliers de notre État et l'établissement religieux.\nLa diffusion d'une ballade particulièrement immorale et politique a conduit à des demandes de limiter plus sévèrement la presse et de prendre en charge les imprimeurs déloyaux et leurs produits."
 innovativeness_events.1.a:1 "Interdire la publication."
 innovativeness_events.1.b:0 "Ce n'est qu'un bout de papier."
 innovativeness_events.2.t:0 "Les Inventions de [Root.Adm_Advisor.GetName]"
 innovativeness_events.2.d:0 "En tant que membre du cabinet, [Root.Adm_Advisor.GetName] a eu une bonne occasion de développer ses intérêts personnels. En conséquence, son manoir à l'extérieur de [Root.Capital.GetCapitalName] abrite l'un des plus grands laboratoires du pays, avec de nombreux fourneaux et de grandes réserves de toutes sortes de matériaux imaginables. [Root.Adm_Advisor.GetSheHeCap] est également particulièrement fier de ce qu'[Root.Adm_Advisor.GetSheHe] appelle sa « chambre des merveilles », un grand bureau rempli de curiosités du sol au plafond, ainsi qu'une bibliothèque dédiée à expliquer les objets. De telles habitudes ne sont cependant pas bon marché et comme notre cher ministre demande également un lieu pour étudier la lune et les étoiles, un observatoire-château sur mesure, certains estiment que cela devrait peut-être être la limite de notre générosité."
 innovativeness_events.2.a:0 "Tout pour l'amélioration de la science [Root.GetAdjective] !"
 innovativeness_events.2.b:0 "Clairement, l'argent pourrait être mieux employé."
 innovativeness_events.3.t:0 "Théâtre Anatomique"
 innovativeness_events.3.d:0 "Les médecins locaux de [doctor_province.GetCapitalName] ont commencé à payer cher pour étudier des cadavres frais. Les médecins affirment que cela leur permet d'améliorer leur connaissance du corps humain, le documentant pour le bien de l'humanité. Améliorer la compréhension de l'anatomie humaine n'est cependant pas un argument qui impressionne les locaux lorsque les tombes de personnes récemment décédées sont trouvées ouvertes le matin. Les citoyens de [doctor_province.GetCapitalName] exigent maintenant que nous restreignions ces pratiques horribles et que nous mettions fin aux pilleurs de tombes."
 innovativeness_events.3.a:0 "Réprimander et restreindre les médecins."
 innovativeness_events.3.b:0 "Ils peuvent disséquer les corps des condamnés."
 innovativeness_events.3.c:0 "Travaillons à assurer un approvisionnement constant de corps pour leur travail."
 innovativeness_events.4.t:0 "Inventeur Étranger"
 innovativeness_events.4.d:0 "Un brillant inventeur [inventor_country.GetAdjective] de [inventor_country.GetName] est venu chercher notre patronage après une brouille avec le [inventor_country.GovernmentName]. [Root.inventor.GetName] a été décrit par certains comme l'un des grands esprits de notre époque, produisant de nombreuses inventions mécaniques et chimiques au-delà de la compréhension de la plupart des autres."
 innovativeness_events.4.a:0 "Accueillons [Root.inventor.GetName] !"
 innovativeness_events.4.b:0 "Nous ne risquerions pas la colère de [inventor_country.GetDefiniteArticleBeforePluralCountry][inventor_country.GetName]."
 innovativeness_events.5.t:0 "Éducation pour les Pauvres ?"
 innovativeness_events.5.d:0 "Un philanthrope local religieux a commencé à créer des écoles pour les enfants pauvres à [poor_province.GetName]. L'ambition est d'apporter l'alphabétisation aux pauvres et de les éduquer dans la voie de la foi [Root.Religion.GetName].\nBien sûr, il y a ceux qui arguent que ce n'est pas une activité sans risques."
 innovativeness_events.5.a:0 "Une excellente initiative !"
 innovativeness_events.5.b:0 "Nous ne pouvons pas permettre cela."
 innovativeness_events.6.t:0 "Patronage [Root.GetRoyalOrState]"
 innovativeness_events.6.d:0 "Parmi certains de nos [Root.GetNoblesReplacementForOtherGovernments], il est devenu de plus en plus à la mode de passer du temps sur l'expérimentation et la philosophie. Certains ont commencé à former des groupes de discussion réguliers tandis que d'autres utilisent des lettres pour correspondre avec d'autres esprits curieux.\nUn tel groupe a contacté notre [Root.Monarch.GetTitle], demandant patronage et soutien. Ils insistent sur le fait qu'un tel soutien apportera de grands bénéfices au [Root.GovernmentName] dans un avenir proche."
 innovativeness_events.6.a:0 "Ils auront notre soutien."
 innovativeness_events.6.b:0 "Quelle perte de temps !"
 innovativeness_events.7.t:0 "Université de [university_province.GetName]"
 innovativeness_events.7.d:0 "L'université de [university_province.GetName] a attiré une nouvelle génération d'enseignants et d'étudiants désireux de moderniser l'institution. Ils demandent un financement pour ouvrir un nouveau collège où ils peuvent développer davantage ce qu'ils appellent la « nouvelle science », avec une perspective plus expérimentale et ce qu'ils prétendent être une approche moins dogmatique du monde.\nBien sûr, au sein de l'académie existante, il y a une certaine résistance à ces aspirants réformateurs. Ils arguent que l'argent pourrait être mieux dépensé à soutenir l'institution existante car les nouvelles idées ne sont pas nécessairement de meilleures idées."
 innovativeness_events.7.a:0 "Agrandir l'université ? Cela semble une bonne idée."
 innovativeness_events.7.b:0 "Écoutons les conservateurs."
 innovativeness_events.8.t:0 "Académies Dissidentes"
 innovativeness_events.8.d:0 "Les institutions d'enseignement supérieur limitent généralement l'inscription aux adhérents de la foi dominante. Cela oblige les étudiants potentiels non-conformistes à chercher leur éducation en dehors des universités sanctionnées par l'État. Heureusement pour eux, un certain nombre d'académies informelles ont été fondées en $COUNTRY$ qui accueillent des dissidents religieux de toutes sortes, promouvant souvent une position théologique particulière. De telles académies peuvent strictement être en contradiction avec la loi, car les écoles nécessitent généralement l'accord des autorités religieuses locales ou nationales, mais elles fournissent une éducation aux étudiants qui seraient autrement exclus de l'admission."
 innovativeness_events.8.a:0 "Laissons-les enseigner comme ils le souhaitent."
 innovativeness_events.8.b:0 "L'uniformité religieuse doit être imposée."
 innovativeness_events.9.t:0 "Traité de Philosophie Naturelle"
 innovativeness_events.9.d:0 "Penseur prometteur pour certains, instigateur dangereux pour d'autres, [Root.scientist.GetName] a récemment publié un nouveau traité de philosophie naturelle, montrant qu'il est très probable que beaucoup des choses que nous avons tenues pour évidentes jusqu'à présent pourraient en fait être fausses. Pour aggraver les choses, le penseur a également profité de l'occasion fournie par la publication pour se moquer de l'établissement religieux. Ensemble, cela a créé une forte aversion contre ces nouvelles idées, certains arguant que [Root.scientist.GetName] devrait être incarcéré et puni, tandis que d'autres au minimum se distancient du texte."
 innovativeness_events.9.a:0 "Ce sont des idées intéressantes..."
 innovativeness_events.9.b:0 "Nous ne pouvons permettre un tel blasphème !"
 innovativeness_events.10.t:0 "Mathématicien Impopulaire"
 innovativeness_events.10.d:0 "Comme beaucoup de souverains de cette époque, [Root.Monarch.GetName] a voulu s'entourer de grands esprits capables de débattre des secrets du monde. Certains possèdent un grand esprit et excellent dans les débats, tandis que d'autres sont plus adaptés aux expériences solitaires ou aux calculs mathématiques. Il y a sans doute pas mal de rivalité parfois, car la faveur du [Root.Monarch.GetTitle] peut être une chose très bénéfique pour tout penseur, scientifique ou inventeur.\nUn tel imbécile intelligent a dernièrement été ridiculisé par de nombreux pairs. [Root.mathematician.GetName] a un grand esprit pour les mathématiques mais est un piètre débatteur, et certains diraient que la réputation de la cour souffre d'indulger un tel travail."
 innovativeness_events.10.a:0 "Laissons-les parler."
 innovativeness_events.10.b:0 "Il nous embarrasse."
 innovativeness_events.11.t:0 "Terra Australis"
 innovativeness_events.11.d:0 "Les érudits, remontant aussi loin que l'ancienne Hiérarchie Gnomique, ont théorisé qu'il doit exister un grand continent inconnu à l'extrême sud du monde. Maintenant que traverser le globe est devenu dramatiquement plus accessible, les explorateurs, cartographes et scientifiques commencent à s'intéresser à nouveau au continent manquant. Ils spéculent que certaines des îles découvertes jusqu'ici dans la région pourraient être le terminus de grands archipels. Une expédition vers le grand sud serait coûteuse, nécessiterait beaucoup de préparation et testerait les limites de notre technologie maritime."
 innovativeness_events.11.a:0 "Financer une expédition de recherche et d'exploration."
 innovativeness_events.11.b:0 "C'est une perte de temps et de ressources."
 innovativeness_events.12.t:0 "Cafés"
 innovativeness_events.12.d:0 "L'introduction du café en $COUNTRY$ a pris la nation d'assaut, avec des cafés surgissant dans les villes à travers le pays. Des frais d'admission minuscules garantissent que les éduqués et les non-éduqués, riches et pauvres peuvent aller dans un café et rejoindre les débats animés qui s'y tiennent. Les sujets de discussion populaires incluent la philosophie, la politique, les potins et la finance. Lieu de rencontre naturel pour les intellectuels, le café devient synonyme de débat et d'apprentissage."
 innovativeness_events.12.a:0 "Encourager ces rassemblements."
 innovativeness_events.12.b:0 "Des idées dangereuses se répandent."
 innovativeness_events.13.t:0 "Instruments Scientifiques"
 innovativeness_events.13.d:0 "Avec les nouveaux développements dans l'art de la verrerie et du travail des métaux vient la capacité de créer des instruments scientifiques plus raffinés. Les lentilles qui grossissent le très lointain et le très petit sont inestimables pour nos astronomes et philosophes naturels, tandis que les chimistes perfectionnent leur art avec des outils métalliques plus complexes. Des percées récentes ont donné à $COUNTRY$ un avantage scientifique dans la production de cet équipement. Nous ne pouvons qu'attendre avec impatience les découvertes qui ont été rendues possibles."
 innovativeness_events.13.a:0 "Peuvent-ils déjà transformer le plomb en or ?"
 innovativeness_events.14.t:0 "Physiocrates"
 innovativeness_events.14.d:0 "Une nouvelle tendance économique, connue sous le nom de physiocratie, devient populaire parmi les [Root.GetNoblesReplacementForOtherGovernments]. Les physiocrates soutiennent que la base de la richesse est la production agricole, par laquelle toute civilisation est rendue possible. Les membres les plus importants de la société sont donc la noblesse terrienne qui possède les champs et loue les terres. Les physiocrates rejettent l'économie dominante du mercantilisme en faveur d'une approche agraire de laissez-faire ; les marchands bien sûr ne génèrent pas de richesse, mais ne font que transporter les produits excédentaires d'un endroit à l'autre. Bien que beaucoup trouvent la profondeur de leur économie impressionnante, d'autres sont plus convaincus par les avantages tangibles des politiques protectionnistes existantes."
 innovativeness_events.14.a:0 "Peut-être que cela vaut la peine d'essayer."
 innovativeness_events.14.b:0 "Les propriétaires terriens ont déjà trop de privilèges."
 innovativeness_events.15.t:0 "Cabinet de Curiosités"
 innovativeness_events.15.d:0 "L'exploration de nouvelles terres et l'ouverture du commerce avec des nations lointaines ont apporté toutes sortes d'objets curieux sur nos côtes. Il est devenu à la mode de rassembler des collections de ces objets souvent bizarres et de les exposer aux côtés de trésors plus banals tels que des portraits et des icônes religieuses. Ces collections fantastiques comprennent des trophées d'animaux étranges ou mythiques, des artefacts de cultures inconnues, des minéraux rares et des coquillages aux couleurs vives de rivages étrangers. Ces cabinets d'exposition sont visités non seulement par des aristocrates curieux mais aussi par des naturalistes intéressés par leur valeur scientifique. Bien sûr, il arrive parfois que la corne de licorne prisée du [Root.Monarch.GetTitle] ne soit simplement que la défense d'un narval."
 innovativeness_events.15.a:0 "Comme c'est nouveau. Commissionnez-en un immédiatement."
 innovativeness_events.15.b:0 "C'est ridicule. Nous devrions patronner les institutions religieuses à la place."
