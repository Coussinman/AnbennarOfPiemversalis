 NAVAL_DOCTRINE_CHANGE_TITLE:0 "Changement de Doctrine Navale"
 NAVAL_DOCTRINE_CHANGE_DESC:4 "Êtes-vous sûr de vouloir définir votre Doctrine Navale sur $DOCTRINE|Y$ ?"
 NAVAL_DOCTRINE_CHANGE_REMOVAL:0 "Votre doctrine actuelle $DOCTRINE|Y$ sera supprimée et vous perdrez ses avantages."
 NAVAL_DOCTRINE_CURRENT:0 "C'est votre doctrine actuelle."
 NAVAL_DOCTRINE_CANNOT_AFFORD:1 "§RVous ne pouvez pas vous permettre de changer votre Doctrine Navale pour le moment.§!"
 NAVAL_DOCTRINE_REMOVE_CURRENT:0 "Votre doctrine actuelle $DOCTRINE|Y$ sera supprimée et vous perdrez ses avantages lorsque vous sélectionnerez cette doctrine."
 fleet_in_being:0 "Flotte de Dissuasion"
 fleet_in_being_desc:0 "Notre influence navale se fera sentir sans la dépense de notre flotte quittant le port sauf dans les conditions les plus favorables."
 free_oarsmen:0 "Rameurs Libres"
 free_oarsmen_desc:0 "Nous combattrons la tentation d'avoir des esclaves et des condamnés ramant sur nos galères. Des hommes libres, résilients face à l'adversité et résistants à la défection, formeront la force de notre marine."
 merchant_navy:0 "Marine Marchande"
 merchant_navy_desc:0 "La directive première de notre flotte est de servir les intérêts financiers de l'État. Tous les efforts seront faits pour s'assurer que nos cargos sont chargés de richesses étrangères."
 ship_boarding:0 "Abordage"
 ship_boarding_desc:0 "Avec un droit de prise établi et de généreuses lettres de marque, nous cultiverons une coutume de saisie intacte des navires ennemis."
 wooden_wall:0 "Mur de Bois"
 wooden_wall_desc:0 "Dans un monde de changement rapide, les mers restent d'une importance cruciale pour notre nation. À la fois comme moyen d'assurer notre domination et comme première ligne de défense, notre mur de bois prévaudra."
 danish_admirality:0 "Amirauté Danoise"
 danish_admirality_desc:0 "D'autres se vantent de leurs modèles de navires supérieurs ou de leurs marins qui combattent jusqu'à leur mort inutile. Nous, cependant, savons mieux. Aucune flotte, aussi bon que soit son bois et ses hommes, ne peut remporter la victoire sans un bon chef. Nous adopterons cette attitude pour notre marine."
 norwegian_sailors:0 "Marins Norvégiens"
 norwegian_sailors_desc:0 "Depuis la fondation même de notre royaume, notre peuple a vécu de l'océan et de la côte. Pêche, raids, batailles navales : nos marins ont plus d'expérience que tout autre pays naval, et nous promouvrons cette expertise encore davantage."
 norwegian_sailors_upgraded:0 "Marins Norvégiens"
 norwegian_sailors_upgraded_desc:0 "Depuis la fondation même de notre royaume, notre peuple a vécu de l'océan et de la côte. Pêche, raids, batailles navales : nos marins ont plus d'expérience que tout autre pays naval, et nous promouvrons cette expertise encore davantage."
 dutch_trade_fleet:0 "Flotte Commerciale Hollandaise"
 dutch_trade_fleet_desc:0 "Les nations de Cannor utilisent leurs marines pour projeter leur puissance par la guerre sur mer. Nous, en revanche, utiliserons notre marine pour atteindre les coins les plus reculés du monde afin de commercer avec des cultures étrangères pendant que nos voisins bombardent les côtes les uns des autres."
 aragonese_fleet:0 "Ordonnances de la Mer"
 aragonese_fleet_desc:0 "La Méditerranée compte de nombreuses puissances navales, mais aucune n'a notre expérience et nos lois. Les Ordonnances de notre flotte garantissent que notre marine est toujours préparée à tout type d'engagement sur mer."
 venetian_arsenal_naval_doctrine:0 "Arsenal Vénitien"
 venetian_arsenal_naval_doctrine_desc:0 "La puissance navale d'une nation ne se mesure pas seulement à sa puissance de feu sur mer, mais aussi à sa capacité à construire et entretenir ses navires. Nos arsenaux sont conçus exactement dans ce but."
 korean_panokseon:0 "Panokseon"
 korean_panokseon_desc:0 "Nos voisins navals cherchent la subjugation de notre État et de notre peuple. Le Panokseon, un navire de guerre robuste capable de résister au feu de plusieurs autres navires avec aisance, est notre réponse à cette menace."
 japanese_atakebune:0 "Atakebune"
 japanese_atakebune_desc:0 "À quoi sert un navire s'il coule dans la première heure d'une bataille navale ? L'Atakebune, le modèle de navire de guerre de notre marine, est conçu avec cette question à l'esprit et est plus une forteresse sur la mer qu'un navire coulable."
 hanseatic_trade_fleet:0 "Doctrine Hanséatique"
 hanseatic_trade_fleet_desc:0 "L'intention de notre marine n'est pas une dominance au combat sur mer mais de s'engager dans le commerce. Notre objectif principal est la maximisation de notre richesse et de nos expériences commerciales sur mer."
 letter_of_marque:0 "Lettre de Marque"
 letter_of_marque_desc:0 "Avec la lettre de marque, nous accordons à des personnes privées le droit d'attaquer et de capturer des navires ennemis en notre nom. Cette combinaison de patriotisme et de profit nous offre une alternative moins coûteuse à une marine pour affaiblir nos rivaux."
 novgorodian_ushkuiniks:0 "Ushkuiniks Novgorodiens"
 novgorodian_ushkuiniks_desc:0 "Les Ushkuiniks sont des pirates novgorodiens qui pillaient les villes le long de la Volga. Bien qu'ils n'opèrent pas en haute mer, leur expertise navale en fait des marines inestimables."
 dvoyane_admiralty:1 "Amirauté Dvoryane"
 dvoyane_admiralty_desc:1 "Certains États misent sur la quantité de navires ou la qualité de leur bois. Mais la véritable excellence ne peut être trouvée qu'en utilisant les meilleurs de la noblesse, les Dvoryane, comme commandants de la marine."
 malayan_seafaring:0 "Navigation Malaise"
 malayan_seafaring_desc:0 "En raison de la nature même de la Malaisie et de l'Indonésie, il est de grande nécessité de maintenir une doctrine qui nous permette une maniabilité rapide sur mer."
 the_junk_fleet:0 "La Flotte de Jonques"
 the_junk_fleet_desc:0 "La jonque est un voilier avec des voiles entièrement lattées. Bien qu'utilisée par d'autres États en Asie de l'Est, la jonque était prédominante dans la marine marchande et militaire chinoise."
 chinese_treasure_fleet:0 "La Flotte au Trésor Chinoise"
 chinese_treasure_fleet_desc:0 "La flotte ne sert d'autre but que d'extension de notre puissance. Utilisons nos navires pour recueillir le tribut de nos sujets des terres lointaines."
 maratha_naval_bombards:0 "Bombardes Navales Marathes"
 maratha_naval_bombards_desc:0 "Bien que les navires assurent la suprématie navale et aident nos marchands, leur but principal devrait être leur soutien à nos forces terrestres. Par l'utilisation de l'artillerie navale, nous pouvons provoquer la chute des fortifications côtières."
 polynesian_navigation_seas:0 "Navigation Polynésienne"
