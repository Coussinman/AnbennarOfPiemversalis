l_french:

 A23_tower_renovations_title:0 "Rénovations de la Tour Noire"
 A23_tower_renovations_desc:0 "Bal Vertesk, l'antique citadelle castanorienne qui nous a donné notre nom, constitue depuis toujours le cœur de notre cité, quand bien même d'innombrables étendards s'y seraient succédé. Jadis siège du redouté Dominion de Vertesk au temps de la Guerre du Roi-Sorcier, la tour porte encore les cicatrices de ce conflit. Si nul récit historique ne s'accorde sur les causes exactes, la crête de la tour fut arrachée de son sommet voilà bien longtemps. N'abritant plus qu'une poignée de bureaux administratifs, une modeste garnison et le quartier général de notre prévôté, les récits de ses anciennes terreurs ne sont guère plus que des contes pour effrayer les enfants désobéissants. Nous renforcerons les pierres qui s'effritent et veillerons à ce que la Tour Noire se dresse, rénovée et toujours vigilante, tout en cultivant mythes et rumeurs quant à sa nature terrifiante."
 A23_shadow_of_bal_vertesk_title:0 "L'Ombre de Bal Vertesk"
 A23_shadow_of_bal_vertesk_desc:0 "Alors que nous n'avions initialement envisagé qu'une simple restauration de l'ancienne majesté de Bal Vertesk, le projet a évolué. Bien au-delà du simple remplacement de ses pierres croulantes, nous avons œuvré pour que la tour s'élance loin au-dessus de la cité, projetant l'ombre de ses créneaux acérés et de sa grande crête sur notre peuple, telle la gueule d'un immense dragon, et nous avons empli ses chambres vides de nos plus zélés flagorneurs. Ils sauront que sortir du rang, c'est être traîné jusqu'à l'antre de Venac, et voir cette gueule immense se refermer sur eux."
 A23_expand_the_surveillance_title:0 "Étendre la Surveillance"
 A23_expand_the_surveillance_desc:0 "La grande crête acérée de Bal Vertesk projetée dans l'ombre fait que nos citoyens se précipitent craintivement d'un bâtiment à l'autre, peu enclins à s'attarder. Nous devrions tirer parti de leur peur. Si la garnison de la tour s'est largement confondue avec notre prévôté, nous devons veiller à ce qu'elle puisse mieux exploiter les informations obtenues par nos espions. Consolidons notre espionnage étranger et intérieur avec les efforts de nos hommes de loi. Nos services de sécurité coopérant étroitement à tous les niveaux, nous aurons l'œil sur chaque fauteur de troubles ; nul murmure ne quittera une bouche sans parvenir à nos oreilles."
 A23_darkest_tower_title:0 "La Tour la plus Sombre"
 A23_darkest_tower_desc:0 "L'un de nos conseillers nous a soumis une modification délicieusement sinistre pour la Tour Noire. Il parle d'un « Panoptique », une idée novatrice. Si le concept fut conçu pour maintenir les prisonniers dans le rang, il servira plus efficacement à garantir qu'aucune fourberie, hormis celle orchestrée par nos soins, ne sera tolérée dans les rues de notre cité.\n\nTandis que notre peuple tremble devant l'ombre que projette la tour en plein jour, il se précipitera de peur face aux faisceaux de lumière qui en balaient les ténèbres, les dépouillant de leurs secrets. Alors que notre réseau d'espions et d'informateurs débusque aisément les rendez-vous des malfaiteurs, il n'est guère de terreur plus grande, même parmi les tortures infligées à nos prisonniers, que de voir l'un des grands faisceaux de lumière de Bal Vertesk transformer la nuit en jour, tandis que nos guetteurs surgissent au coin de la rue."
 A23_inevitable_confrontation_title:0 "Confrontation Inévitable"
 A23_inevitable_confrontation_desc:0 "Les Gawedi ont longtemps convoité la cité de Vertesk. De toute évidence, notre belle cité est un phare éclatant, en contraste avec le village de bric et de broc qu'est Gaweton. Il semblait inévitable que cette revendication soit un jour contestée. Nous avons déjà mené ce combat, et nul ne saurait dire qui a déclenché cette manche ; mais nous allons bel et bien y mettre fin et reprendre ce qu'ils nous ont volé !"
 A23_beat_gawed_title:0 "Reprendre les Terres du Nord"
 A23_beat_gawed_desc:0 "Depuis notre apogée en tant que Dominion de Vertesk, redoutable vassal du Noir Castanor, notre chute fut grande. Tenbury et Greenley, nos terres de jure croupissent entre les doigts crasseux des rois prétendants de Gawed ! Nous retrouverons nos proches, séparés par quelque traité coercitif depuis longtemps oublié. Cet affront à notre république et à l'Empire lui-même ne saurait perdurer ! Nous leur montrerons la puissance des plus authentiques Aléniques et déferlerons sur eux comme une crue franchissant les berges de notre furieuse rivière !"
 A23_contact_reachmen_title:0 "Rassembler des Alliés"
 A23_contact_reachmen_desc:0 "Les Gawedi battent en retraite. Nous avons repris notre territoire et veillé à ce qu'ils nous reconnaissent comme leurs frères égaux. Même si nous faisons partie de l'Empire, nous n'avons point été amollis par les elfes, comme ils le murmurent si souvent. De fait, Lorent nous doit encore quelques faveurs pour notre aide au démantèlement de la Damérie, une nation renversée aussi aisément que Venac renversa les Silmuna dont ils portaient le nom.\n\nNous pourrions nous tenir en retrait et rire en regardant les délicats chevaliers de Lorent leur faire ravaler leurs paroles. Ou bien, nous pourrions faire appel à nos nombreux petits frères querelleurs de l'Étendue. Bien que les Aléniques Bleus soient éloignés de nous par les terres, nous partageons un frère commun et un ennemi commun en Gawed. Longtemps l'aîné a bousculé ses cadets. Qu'il s'agisse de leur rival ou de nos frères dispersés au nord, nous tiendrons aisément les effectifs nécessaires pour renverser l'hégémonie de Gawed sur l'Alen."
 A23_brothers_war_title:0 "La Guerre des Frères"
 A23_brothers_war_desc:0 "Tous les Aléniques sont frères, mais hélas les fratries sont enclines au conflit. C'est du moins ainsi que nous justifions notre rivalité avec Gawed. Néanmoins, l'heure de l'action a sonné. Nos armées sont puissantes et nos alliés nombreux ; avec cela, nous porterons enfin un coup décisif à Gawed, brisant leurs espoirs de domination alénique."
 A23_dominion_of_gawed_title:0 "Dominion de Gaweton"
 A23_dominion_of_gawed_desc:0 "Délicieuse ironie ! Vertesk a repris sa place légitime à la tête de l'Alen. Si nous avons toujours détenu ce siège d'honneur sur nos terres, nous pouvons désormais le revendiquer par l'immensité de notre domination ! Les rois de Gawed ont assez longtemps langui dans nos salles ; il est temps que nous ornions les leurs de nos bannières bleues, balayant leurs petits tyrans comme les eaux de l'Alen. Nous prendrons leur précieuse petite cité et la remodelerons à notre image."
 A23_teal_tower_title:0 "La Tour Sarcelle"
 A23_teal_tower_desc:0 "Notre propre peuple a été mis au pas par la flèche imposante de Bal Vertesk rénovée, l'ombre de sa crête acérée planant comme une gueule dentée, les lumières projetées depuis ses salles consumant nos dissidents tel le souffle d'un grand et terrible dragon. Si les Gawedi sont nos frères, ils ne sont guère de notre sang.\n\nLes systèmes de contrôle que nous avons développés autour de Bal Vertesk seront doublés, tandis qu'un miroir de notre grande tour s'élèvera au cœur de Gaweton. Nos bannières sarcelle flottant au-dessus de l'ombre de la tour, les hurlements des dissidents séditieux dans les cachots de la grande tour résonneront comme un hymne à notre grande et croissante nation, et nos espions disposeront d'une autre ruche d'où coordonner leurs efforts."
 A23_lords_of_gerudia_title:0 "Seigneurs de Gérudie"
 A23_lords_of_gerudia_desc:0 "Si Gawed est nôtre, nous ne devons pas nous reposer sur nos lauriers. Bjarnrík et d'autres nations gérudiennes regardent l'Étendue avec convoitise, tout comme les Gawedi lorgnaient nos propres terres il n'y a guère. Qu'ils souhaitent nous défier par la conquête ou le commerce, nous ne nous laisserons pas abattre par quelques pitoyables barbares ! Nos espions et marchands redoubleront d'efforts pour entraver leurs entreprises. Nous prendrons toutes les mesures nécessaires : sous-coter leurs marchands, exposer les secrets scandaleux de leurs nobles.\n\nLa main légère qu'ils gardent sur leurs roturiers favorise le genre de délinquants qui languiraient dans les entrailles de la Tour Noire en nos propres terres. Nous mettrons quiconque peut être acheté ou fait chanter à calomnier leurs marchandises, trancher des gorges, semer le trouble avec les trolls. Nulle tactique n'est trop basse ni trop simple pour contrarier leurs efforts et les détourner de l'Étendue."
 A23_head_crown_title:0 "La Tête et la Couronne"
 A23_head_crown_desc:0 "Vertesk ne sera plus jamais dédaignée par nos voisins du sud. Nous avons fait en sorte que tout Cannor réclame la marque de confiance de la Tour Noire sur ses marchandises. S'il peut y avoir quelques protestations concernant certains accidents curieux et disparitions de marchands concurrents, nul ne peut nier que nous dominons le commerce de la Tête-de-Dame tout comme Bal Vertesk domine notre cité.\n\nDe surcroît, grâce à nos efforts dans le nord, la Tête-du-Serpent s'incline tout aussi bas. Du Port-Blanc aux rues rudes de Revrhavn, il n'est guère d'âme qui puisse contester les prix et la qualité de nos marchandises. Ou du moins aucune assez imprudente pour le faire ouvertement."
 A23_halflings_title:0 "Citoyenneté Halfeline"
 A23_halflings_desc:0 "Nous avons un petit problème dans notre cité. Difficile de dire quand ils sont apparus pour la première fois, mais depuis aussi loin que chacun se souvienne, certains des va-nu-pieds de nos rues sont restés environ moitié moins grands qu'ils ne devraient l'être durant tout le cours de leur existence. Si nous les avons longtemps considérés comme source d'ennuis, nous pourrions tirer profit de l'extension des pleins privilèges de citoyenneté aux Halfelins."
 A23_settle_marshes_title:0 "Coloniser les Marais-Inondés"
 A23_settle_marshes_desc:0 "Les Marais-Inondés ont longtemps défini la perception de notre royaume, ayant été notre plus grande étendue de terre tandis que Gawed nous forçait à nous accrocher aux bords de la côte. Les historiens pourraient vous rebattre les oreilles sur le fait qu'ils étaient quelque prairie fertile avant le Jour-des-Cieux-Cendrés, quand les eaux vinrent, sectionnant la Tête-de-Dame et noyant maintes côtes de Cannor. Cependant, nous avons l'œil pratique. Même si les marais salés ne seront plus jamais quelque cœur fertile, nous pouvons trouver un usage à ces terres.\n\nIl est assez aisé de faire un exemple des fauteurs de troubles, que ce soit en versant leur sang dans les entrailles de notre tour, ou en les précipitant du sommet pour faire spectacle. Toutefois, nous pourrions concevoir une autre punition à ajouter à notre arsenal. Le déplaisir particulier de la vie dans la boue fangeuse devrait servir de dissuasion suffisante. Nous enverrons certains de nos fauteurs de troubles et rivaux aux marais salés, et tirerons même quelque profit de leur exil."
 A23_establish_spy_network_title:0 "Établir des Réseaux d'Espionnage"
 A23_establish_spy_network_desc:0 "Investir en nous-mêmes ne fera avancer nos efforts que jusqu'à un certain point. Il est temps de revenir à nos anciennes méthodes. En utilisant le vaste réseau de contacts louches qui nous permet d'exercer le contrôle sévère que nous maintenons sur Vertesk et nos autres possessions, nous pouvons atteindre leurs contacts autour de la Tête-de-Dame. Avec leur aide, chaque murmure parviendra à nos oreilles. Au-delà de la simple possibilité d'étouffer tout complot qui entraverait nos efforts, ces espions devraient nous permettre d'entraver activement les efforts de nos concurrents."
 A23_spy_west_title:0 "Espions à l'Ouest"
 A23_spy_west_desc:0 "Nos voisins occidentaux ont longtemps été une épine dans notre flanc. L'isolationnisme obstiné de l'Uelaire refusant si souvent l'accès de leurs ports à nos navires au moindre prétexte, nous avons souvent vu nos marchandises exclues de marchés potentiellement lucratifs. De plus, aussi difficile que ce soit à admettre, les marchands de Pic-des-Abeilles surpassent souvent les nôtres, grâce aux produits de luxe qui descendent le Widderoy depuis le Petit-Pays. Il est temps d'orchestrer une série d'infortunes pour ceux qui entraveraient la prospérité de notre nation et d'ouvrir ces régions à notre influence."
 A23_extra_dip_title:0 "Prévôtés Anbennarienne"
 A23_extra_dip_desc:0 "Si les tactiques de notre prévôté peuvent être assez brutales, nul ne saurait contester qu'elles ont fait de Vertesk une cité d'une discipline impeccable, libre de toute petite criminalité. Certains diraient que c'est simplement parce que tous les criminels ont trouvé leur chemin jusqu'à la prévôté. Si tel est le cas, pourquoi l'Empereur réclamerait-il leurs services ? Cela nous tombe tout cuit dans le bec ! Les nombreux dirigeants de l'Empire souhaitent répandre nos guetteurs aussi loin et aussi large que les crieurs de Tellum. Espérons qu'ils ne se plaindront pas si nous les utilisons pour quelque subterfuge opportun, de temps à autre."
 A23_the_gamers_title:0 "Intégrer les Isolationnistes"
 A23_the_gamers_desc:0 "L'Uelaire abrite les gens les plus bornés et les plus entêtés de la Tête-de-Dame. Paranoïaques et obtus, ils passent la moitié de leurs journées à trembler de peur à l'idée que nous-mêmes, les Gawedi, ou même les Halfelins de Pic-des-Abeilles ne submergent leur pitoyable petit duché. Mettons leur esprit en paix et intégrons-les à notre État. Peut-être qu'après quelque temps sous notre autorité, ils auront trouvé leur courage. Mais nous aurons leurs impôts quoi qu'il en soit."
 A23_beepeck_title:0 "Halfelins Impériaux"
 A23_beepeck_desc:0 "Si les divagations paranoïaques des gens de l'Uelaire ont rarement quelque mérite, nous pouvons au moins nous accorder avec eux sur un point. Pic-des-Abeilles est un essaim de moucherons, des escrocs qui vous trancheront les chevilles pour accéder à votre bourse. Bien que beaucoup tiennent les marchands miniatures en haute estime, nous mettrons nos sujets de l'Uelaire au travail avec nos espions pour répandre quelques rumeurs savoureuses sur leurs affaires et l'état de leur cité."
 A23_forehead_title:0 "Frapper la Ruche"
 A23_forehead_desc:0 "L'opportunité se présente ! Ayant la chance d'avoir Pic-des-Abeilles en notre possession, pour le moment du moins, nous enverrons nos hommes auprès des meilleurs marchands et artisans de leur cité, pour voir si nous ne pourrions pas les réinstaller depuis cette ruche de canailles et de vilains vers la nôtre. Cité. Notre propre cité qui n'est certainement rien de tout cela ! Ils trouveront une demeure délicieuse parmi les sombres pierres de Vertesk."
 A23_alenic_city_title:0 "Plus Grande Cité Alénique"
 A23_alenic_city_desc:0 "Comme nous n'en avons jamais douté, Vertesk est la plus belle cité le long de tout l'Alen. En remontant l'Alen, passé les marchés d'Alenath, le taudis sordide de Gaweton, passé les forges poussiéreuses de Vanbury, la grande convergence d'Alenvord, jusqu'à Bal Mire, jusqu'à la Porte-de-l'Ouest, Silvervord, et même jusqu'à Castonath, nulle ne peut prétendre surpasser notre capitale. Si l'impact de la Marée Verte sur l'Escann fut certes une aide pour revendiquer ce titre, nous savions depuis toujours que Vertesk était la plus grande cité sur la plus grande rivière de tout Cannor. Il est fort agréable de voir que le reste du monde parvient à une réalisation si évidente. Ses pierres noires scintillent dans la lumière de cette nouvelle aurore."
 A23_northern_jewel_title:0 "Joyau de Couronne-de-Dame"
 A23_northern_jewel_desc:0 "Un rejeton aux yeux vifs de la lignée Blacktower dit un jour que Vertesk « … scintille comme une magnifique gemme d'obsidienne, à sa place de choix au sommet du hennin de la Dame. » Désormais, ces mots sonnent vrais. Avec la subjugation de Couronne-de-Dame, l'expression a commencé à évoquer le cœur général de notre domaine. Les artisans de Pic-des-Abeilles ont suivi leurs pairs et fui vers les marchés animés de notre cité. Aramar et Crothán sont mentionnés dans le même souffle que Haut-Port. Ce n'est qu'une question de temps avant que nous soyons les meilleurs de toute la Tête-de-Dame. Bientôt, Vertesk éclipsera Anbenncóst elle-même. Vertesk, Cité du Désir du Monde. Cela sonne bien, non ?"
 A23_secure_west_title:0 "Sécuriser l'Ouest"
 A23_secure_west_desc:0 "Les gens des Landes sont un peuple sauvage et indomptable, une menace dispersée et turbulente sur leur terre désolée. Tandis que la plupart négligeraient leur domaine comme le firent nos ancêtres du Dominion, nos investissements dans les Marais-Inondés ont prouvé combien de détestables marécages comme les leurs peuvent receler de valeur. En les prenant, nous pourrons fièrement dire que nous avons surpassé l'ancien vassal du Noir Castanor. Nous sommes prêts à nous étendre au-delà de ces anciennes frontières, à soumettre nos frères les plus incivilisés, les plus sauvages."
 A23_northarbour_title:0 "Établir Port-du-Nord"
 A23_northarbour_desc:0 "Avec la mainmise précaire du Dominion sur l'Étendue Alénique, les elfes de Celmaldor ont pu se faufiler sous le nez des gens de l'Étendue et se créer un foyer. Si nous n'avons pas la haine particulière des elfes que les machinations d'Ioriel et Jexis ont instillée chez les Gawedi, le fait est qu'ils possèdent le meilleur port de l'Étendue. Nous prendrons fermement la cité en main, lui conférant un nom approprié pour convenir à ses nouveaux habitants : Port-du-Nord. Réinstallons-y nos propres constructeurs de navires et loyalistes pour surpasser les Celmaldori en nombre. Après tout, il serait fâcheux de perdre l'endroit au profit de quelque complot au sang d'argent."
 A23_north_fleet_title:0 "Construire une Flotte Gérudienne"
 A23_north_fleet_desc:0 "Avec l'accroissement du commerce dans le nord, nous ne pouvons simplement compter sur nos marchands pour se défendre eux-mêmes. Alors que nos navires deviennent des cibles de plus en plus lucratives pour les pillards de Gérudie, il est temps de bâtir une marine capable d'envoyer ces sauvages rejoindre les ossements des géants dans les profondeurs."
 A23_build_up_title:0 "Se Préparer au Pire"
 A23_build_up_desc:0 "S'ils ont pu servir d'État tampon utile pour contenir la Marée Verte, Gawed n'est point un ami. Avec leur emprise sur Tenbury et Greenley, l'étroite bande de terre entre Vertesk et la Tête-de-Dame est indubitablement une cible tentante. Nous ne pouvons leur laisser l'avantage quand ils viendront la chercher."
 A23_expand_harbour_title:0 "Agrandir le Port"
 A23_expand_harbour_desc:0 "Haut-Port, qui fut longtemps notre seule possession de valeur hors de Bal Vertesk elle-même, a connu des jours meilleurs. Longtemps négligé, le port est infesté de toutes sortes de vermine. Rats, escrocs, voleurs. Ces planches pourries qui ont englouti maintes caisses et marins imprudents devront être remplacées. Il est temps non seulement de restaurer le port, mais de laisser un rappel de qui en est le maître."
 A23_good_harbour_title:0 "Un Port dont être Fier"
 A23_good_harbour_desc:0 "Là où se dressaient jadis de fragiles boiseries pourrissantes reposent désormais les pierres noires caractéristiques de Bal Vertesk. Les mêmes pierres noires que celles de Bal Vertesk et de grande partie de notre capitale ont été disposées pour façonner un port qui résistera intact pendant des générations. Désormais, quiconque entre dans notre port secondaire se souviendra dans quelles eaux il navigue. Ce port servira de rappel qu'il n'y a pas de place pour la duplicité à Vertesk. Après tout, c'est notre plus grand monopole."
 A23_spies_east_title:0 "Espions à l'Est"
 A23_spies_east_desc:0 "Malgré la prospérité de l'Alen et la multitude de marchandises qui descendent son cours, les gens prétentieux de Couronne-de-Dame à la tête de l'Esmar continuent de nous traiter de faux négociants et de refuser à nos marchands l'accès à l'abondance de biens qui coule de leur rivière. De surcroît, nous n'entendons que des ennuis de la Monnaie Impériale, les prêtres d'Ara murmurant sans cesse quelques inepties sur la dévaluation de leur monnaie. S'ils veulent dire de telles choses, pourquoi ne pas les rendre vraies ? Une fois que nous leur aurons causé le genre d'ennuis qu'ils aiment nous imputer, nous tiendrons une position bien plus forte dans la région."
 A23_sabotage_title:0 "Saboter le Flux Commercial"
 A23_sabotage_desc:0 "Notre espionnage autour de Couronne-de-Dame s'est avéré véritablement fructueux, nous permettant de venger les nombreux affronts de nos voisins. Par un mélange de sabotage délibéré de nos concurrents et d'une appréciation sincère de notre politique commerciale une fois que nous avons forcé l'ouverture des ports voisins à nos marchands, nous pouvons nous donner un avantage dans la région. Si nos efforts antérieurs ont largement été un patchwork de stratagèmes individuels, un effort plus coordonné dans la région, intégré au travail de nos opérations de renseignement plus formelles, devrait ouvrir la porte à des complots bien plus grandioses."
 A23_ara_ara_title:0 "Temple d'Or"
 A23_ara_ara_desc:0 "La chance est capricieuse. Dame Fortune, plus encore. Heureusement, avoir son plus grand temple sous notre contrôle aidera assurément notre cause. Les fidèles d'Ara monteront et descendront avec nos marées. Tenir la Monnaie Impériale ne fera pas de mal non plus. De plus, nous prendrons quelques souvenirs des deux, pour nous assurer de sortir gagnants quoi qu'il arrive."
 A23_damescrown_1_title:0 "Faux Marchands"
 A23_damescrown_1_desc:0 "Les marchands de Couronne-de-Dame élaborent des contrats labyrinthiques et confus pour piéger leurs partenaires commerciaux, vous forçant à lire des tomes et des tomes de verbiage insignifiant, et vous traînant devant les tribunaux à la moindre provocation. À Vertesk, nous demandons simplement que vous teniez votre part d'un simple marché. Si vous le rompez, vous finissez au fond du port. Nous aiderons à enseigner au reste de l'Empire un sain respect pour notre manière de faire des affaires."
 A23_damescrown_2_title:0 "Essayer la Couronne"
 A23_damescrown_2_desc:0 "N'est-il pas ridicule que la Cité Libre de Couronne-de-Dame ait détenu un tel monopole sur le nom de toute notre région ? Notre grande rivale orientale a finalement été renversée, ses terres désormais fermement enserrées dans notre poigne. Maintenant, tous devraient pouvoir voir ce qui était évident depuis longtemps. Vertesk, postée à l'embouchure de l'Alen comme à la tête d'une grande table, est devenue le centre de Couronne-de-Dame. Bientôt, leur pitoyable petite république s'effacera des esprits de Cannor, et les mots Couronne-de-Dame et Vertesk auront un sens commun."
 A23_gib_electorate_title:0 "Accord de Couronne-de-Dame"
 A23_gib_electorate_desc:0 "Détenant l'électorat censé représenter les intérêts de tous les marchands de l'Empire, Couronne-de-Dame a longtemps joui d'un grand prestige en tant que premiers commerçants de l'Empire. Cependant, avec notre emprise ferme sur leurs terres, ce prestige s'évanouit rapidement. Nous ne sommes pas du genre à laisser passer une telle opportunité. Nous capitaliserons sur leur faiblesse et veillerons à ce que nos loyaux serviteurs plient le genou. Comme étape supplémentaire dans l'intégration de leur royaume, nous les pousserons à signer un nouveau traité pour transférer leur électorat.\n\nPlutôt que d'affronter une campagne intensifiée du genre d'infortunes qui les ont assez affaiblis pour tomber sous notre coupe, nos vassaux seront assurément impatients d'accéder. Cela légitimera notre influence sur le nord de l'Empire, donnant à tout empiétement ultérieur sur le territoire de nos confrères princes un air de légitimité, tandis que nous nous épanouissons en un grand tampon septentrional."
 A23_influence_title:0 "Influence Anbennarienne"
 A23_influence_desc:0 "Désormais reconnus comme un acteur majeur de l'Empire, il est temps que nous exercions nos muscles. Notre cher Empereur étant bien conscient de l'importance de notre soutien, et les autres électeurs commençant à nous parler d'égal à égal, nous veillerons à ce que les intérêts de nos marchands soient entendus et appliqués. Après tout, en tant qu'électeur marchand, ces préoccupations sont assurément partagées par tous les marchands d'Anbennar. Notre légitimité nouvellement acquise nous permettra de repousser nos concurrents et rivaux aux marges, de les ostraciser du commerce formalisé."
 A23_destiny_title:0 "Destinée de Vertesk"
 A23_destiny_desc:0 "À la fin des Guerres Lilas, Bal Vertesk se dressait comme une ombre creuse d'elle-même. Notre commerce était paralysé tandis que les cités d'Escann demeuraient désertes. Gawed semblait inévitable, l'hégémon de l'Alen. Couronne-de-Dame détenait le monopole du commerce de l'Empire. Mais, même avec tout contre nous, Vertesk a prospéré, trouvant une opportunité dans chaque tragédie et menace. Depuis ces jours, notre peuple a été uni par un objectif commun. Nous avons cherché à recouvrer notre ancienne gloire et à forger un royaume digne du nom que nous prenons désormais. Nous ne vivrons plus dans l'ombre d'Anbennar, mais nous dresserons fiers et grands : le Dominion de Vertesk renaît."
 A23_are_we_the_baddies_title:0 "Commencer la Consolidation"
 A23_are_we_the_baddies_desc:0 "Une nouvelle ère se lève pour tout l'Alen ! Si le Dominion a été renouvelé, nous ne devons pas passer trop de temps à nous prélasser dans notre gloire. Nous veillerons à ce que nul ne doute de notre suprématie et de notre légitimité en tant que seigneurs de l'Alen. Nous unirons les peuples de la Frontière Alénique et de l'Étendue, les serrerons aussi fermement que nous tenons Couronne-de-Dame. Tandis que certains s'inquiètent des tactiques brutales employées dans nos conquêtes et la répression de notre peuple, nous balayerons quiconque se dressera sur notre chemin, que ce soit à l'intérieur de nos frontières ou au-delà.\n\nNotre administration bourdonne de discussions sur le besoin d'expansion, pour assurer notre place dans le monde. Même si nos frères aléniques couinent et se débattent face à la notion de soumission, nous qualifiant de pas meilleurs que les gens elfisés et efféminés de la Tête-de-Dame, notre domination devient inévitable. Nous commencerons la consolidation de l'Alen, créerons un empire rivalisant avec Anbennar lui-même."
 A23_secure_gawed_title:0 "Renforcer Gawed"
 A23_secure_gawed_desc:0 "Si la conquête de Gaweton fut un puissant symbole, les Gawedi se considèrent toujours comme autre chose que le peuple de Vertesk. Il est temps d'y mettre fin. Par la conquête du cœur de Gawed, nous veillerons à ce qu'aucune nation véritablement alénique ne puisse espérer se dresser en rival, ni même revendiquer une identité séparée de la nôtre."
 A23_end_consolidation_title:0 "Achever la Consolidation"
 A23_end_consolidation_desc:0 "Enfin, nous sommes un véritable État alénique. Vertesker, Gawedi, gens de l'Étendue, gens des Landes, Vieil Alen. Tout cela ne sera bientôt plus que des cultures provinciales, tandis que notre peuple s'installe sous l'autorité de Vertesk. L'ombre de la Tour Noire s'est étendue sur tous nos frères."
 A23_steampunk_time_title:0 "Tour Noire, Rivière Noire"
 A23_steampunk_time_desc:0 "Les dernières années ont été une grande aubaine pour les coffres de notre république. Grâce aux innovations de nos artificiers et à l'argent des marchands et magnats, des quartiers entiers de manufactures et d'ateliers se sont élevés pour dominer nos cités. Les eaux de l'Alen coulent noires et tièdes de leurs émissions, la boue rance de leurs effluents exhalant un air vicié capable de faire tomber du ciel nos mouettes noires pourtant si résistantes.\n\nLes jours particulièrement tièdes, on dit même qu'on peut marcher d'une rive à l'autre. Bien qu'il soit préférable de brûler les bottes utilisées pour cette traversée ensuite. Outre le profit, le mieux que nous puissions en dire est que la nouvelle teinte de la rivière est un parfait reflet des pierres sombres de notre cité. Veillez simplement à ne pas y tomber. Ni, d'ailleurs, à en boire."
 A23_eternal_vertesk_title:0 "Vertesk l'Éternelle"
 A23_eternal_vertesk_desc:0 "Les siècles passent, les empires s'élèvent et tombent, mais Vertesk demeure. Ayant assuré notre position sur l'Alen et dans l'Étendue et prouvé que nous étions la puissance la plus forte du nord de Cannor, nous avons étendu ce sentiment d'éternité de notre capitale à l'ensemble du Dominion."
 A23_trade_influence_title:0 "Étendre l'Influence Commerciale"
 A23_trade_influence_desc:0 "Pour une république de marchands, nous avons offert un spectacle embarrassamment médiocre en matière de commerce. Il est temps de chasser les pickpockets et les voyous de nos marchés et de faire briller à nouveau ces pierres noires. En développant les installations et infrastructures pour renforcer nos marchands, nous nous dresserons de nouveau en rivaux dignes de Pic-des-Abeilles et Couronne-de-Dame, tandis que nos grands ports de Vertesk et Haut-Port s'élèvent à la prééminence."
 A23_estuary_of_alen_title:0 "Estuaire de l'Alen"
 A23_estuary_of_alen_desc:0 "Longtemps notre atout le plus solide, la rivière Alen a toujours façonné notre cité, nous conférant un avantage unique avec notre contrôle de son estuaire. Avec le soutien de nos marchands, nous restructurerons notre autorité portuaire et créerons un péage formel qui alimentera véritablement nos coffres, au lieu de disparaître avec nos gardes à la fin de leur tour de garde. En exploitant correctement notre pouvoir, nous pouvons veiller à ce que le flux de marchandises le long de l'Alen continue vers la Tête-de-Dame selon nos seuls termes."
 A23_dominate_north_trade_title:0 "Dominer le Commerce Septentrional"
 A23_dominate_north_trade_desc:0 "S'il nous a fallu nous battre bec et ongles, user de chaque stratagème sournois du répertoire pour y parvenir, nous avons finalement gravi notre chemin jusqu'au sommet du commerce de la Tête-de-Dame. Aux embouchures de l'Alen, du Widderoy, de l'Esmar, et même jusqu'au nord de la Damesear, les acheteurs se bousculent pour des caisses frappées du sceau de la Tour Noire. C'est tout un revirement de voir nos marchands recherchés, plutôt que dernier recours pour une remise sur des caisses de marchandises qui « sont tombées de la poupe d'un navire », mais un revirement bienvenu néanmoins."
 A23_expand_arsenal_title:0 "Agrandir l'Arsenal de Vertesk"
 A23_expand_arsenal_desc:0 "Autre mastodonte de pierre noire, notre Arsenal a une longue histoire, remontant aux jours du vieux Castanor. Si son existence moderne a été plutôt tranquille, hormis quelques incidents curieux comme un rôle pivot dans le déclenchement du Grand Incendie de 1422, un désastre résultant d'une tentative malavisée d'importer les fêtes fluviales esmaries sur l'Alen. Si l'état plutôt modeste du port n'est pas une grande honte pour notre cité, si nous prétendons avoir de sérieuses ambitions navales, il serait irresponsable de ne pas investir dans le centre névralgique de notre marine. En le développant et en modernisant le port de Vertesk, nous avons l'opportunité d'agrandir notre flotte et de véritablement régner sur les vagues de la Tête-de-Dame."
 A23_legacy_of_greentide_title:0 "Cité des Chaînes"
 A23_legacy_of_greentide_desc:0 "Alors que de plus en plus d'esclaves orques sont amenés d'Escann, la vue de dizaines, voire de centaines de créatures vertes massives est devenue ordinaire pour les citoyens de Vertesk. Certains louent le nom de Nerat, appelant cela un acte de jugement pour les dévastations causées par les orques ; d'autres en profitent directement, et la majorité s'en moque tout simplement. La cité des chaînes continue de fournir Aelantir en esclaves et nos coffres s'en emplissent d'autant."
 A23_reward_adventurers_title:0 "Récompenses pour Aventuriers"
 A23_reward_adventurers_desc:0 "Aussi agaçant soit-il de l'admettre, nous devons beaucoup aux aventuriers. Avant la Marée Verte, Vertesk les employait couramment comme mercenaires, et maintenant ils fournissent à notre cité une source de revenus régulière sous forme d'esclaves orques. Peut-être… une récompense est-elle de mise ? Non par bonté d'âme, mais pour célébrer ce commerce mutuellement profitable que nous entretenons."
 A23_contacts_title:0 "Contacts en Escann"
 A23_contacts_desc:0 "Vertesk n'est qu'une destination finale à Cannor pour les esclaves orques, qui changent de mains à travers plusieurs États au cours de leur voyage en Escann. Le problème est que Vertesk n'est qu'une destination parmi d'autres, pas la seule. Nous devrions contacter directement les colons d'Escann impliqués dans la capture des orques et les convaincre d'envoyer les esclaves spécifiquement à Vertesk, et non ailleurs comme cette ignoble ruche de voleurs de Nathalaire. Contrairement à eux, nous avons une certaine forme de standards."
 A23_green_trade_hegemony_title:0 "Hégémonie du Commerce Vert"
 A23_green_trade_hegemony_desc:0 "Le commerce d'esclaves a atteint des sommets inimaginables à Vertesk. Les esclaves arrivent par vagues d'Escann et beaucoup de nos citoyens l'appellent par dérision la seconde Marée Verte. Nos ports sont quotidiennement remplis de navires prêts à appareiller pour Aelantir dès qu'ils ne peuvent plus contenir davantage de Peaux-Vertes. Les colonies en Aelantir sont pleines d'orques, et une grande partie d'entre eux se souviennent d'avoir vu la Tour Noire alors qu'ils traversaient la cité enchaînés ensemble. Mais Aelantir est loin ; ici à Cannor, nous pouvons affirmer que Vertesk a atteint une hégémonie sur le commerce d'esclaves et que nos coffres n'ont jamais été aussi pleins."
 A23_old_way_title:0 "L'Ancienne Voie"
 A23_old_way_desc:0 "Notre décision de faire respecter la loi et de mettre fin au commerce d'esclaves à Vertesk n'a pas été bien accueillie par tous, surtout pas par les marchands qui en profitaient le plus. Indépendamment de leurs rancœurs, il est temps pour Vertesk de changer et de dépasser l'esclavage. Avec le soutien des guildes, nous ramènerons Vertesk aux jours anciens d'avant que les orques enchaînés ne marchent vers le port. Ce sera coûteux, mais au final Vertesk ne dépendra plus des aventuriers peu fiables d'Escann qui ont toujours du mal à remplir les quotas de nombre d'orques."
 A23_mistakes_of_past_title:0 "Erreurs du Passé"
 A23_mistakes_of_past_desc:0 "Quand les premiers orques arrivèrent à Vertesk, personne n'a pensé qu'aucun d'entre eux resterait volontairement ici. Et nous avions raison : il n'y avait pas d'orques ayant choisi de rester à Vertesk, car ce choix fut fait par leurs propriétaires restant à Vertesk. Et ainsi, une petite population d'orques demeura à Vertesk et continua de s'étendre jusqu'à l'interdiction du commerce d'esclaves. Actuellement, les orques récemment affranchis vivent dans les pires quartiers de la cité, encore pires que là où vivent les Halfelins. Lors d'une récente réunion à Vertesk, la question des orques fut soulevée et une idée curieuse naquit : qualifier le commerce d'esclaves d'erreur et accorder la citoyenneté aux orques.\n\nSi certains rirent à la simple proposition, la plupart décidèrent qu'employer réellement les orques, bien que sans chaînes, serait bénéfique pour Vertesk. En améliorant leurs conditions de vie et en essayant généralement d'expier nos méfaits passés envers les orques, nous pourrions obtenir de nouvelles mains utiles dans la cité : de grandes mains vertes qui trouveront assurément leur utilité à Vertesk."
 A23_secure_east_title:0 "Sécuriser l'Est"
 A23_secure_east_desc:0 "Même s'ils furent longtemps tenus par Gawed, le peuple robuste et les terres des Grands-Bois ne sont pas à dédaigner. Tout comme Venac rabroua Munas, les Vieux-Aléniques n'eurent pas besoin d'un grand chef, car un simple bûcheron fut le fléau d'Ianren d'Arbaran. Les récits de loups-garous et de grandes bêtes ont toujours jailli des lèvres de nos mariniers.\n\nPresque aussi denses et mystiques que les Bois-Profonds, nous nous esclaffons quand les Gawedi crient de peur devant les Clairières-Rouges, un petit bosquet qui pourrait difficilement rivaliser avec ceux des terres de notre propre peuple. Indépendamment de ces récits, l'unique vérité certaine de la région est le fléau du banditisme qui entrave notre commerce. Si nous voulons vraiment un lien avec l'Escann et nous proclamer seigneurs de l'Alen, nous devons tenir l'est dans notre poigne."
 A23_grey_tower_title:0 "La Tour Grise"
 A23_grey_tower_desc:0 "Si les Tours Noire et Sarcelle ont longtemps servi à coordonner les efforts de notre espionnage et de notre défense, elles servent aussi de grand pôle d'administration. Le besoin d'une troisième tour est devenu évident, grâce aux nombreuses disputes et rébellions des gens de l'Étendue toujours querelleurs. Érigeons ce monument à notre grandeur dans la cité de Bayvic, notre possession la plus vitale et la plus volatile dans l'Étendue. De plus, cela nous permettra de garder un œil sur les gobelins de la cité.\n\nAvec cela, nous aurons enfin un pôle septentrional pour notre administration et veillerons à ce que l'Étendue soit aussi profondément purgée de toute dissidence que nos possessions plus proches. Le perchoir de la tour près du port de la cité permettra de grandes démonstrations de bienveillance et justifiera notre surveillance, ses grands projecteurs illuminant non seulement les agissements des malfaiteurs, mais aussi les rochers dangereux dans le port de Bayvic, offrant un passage sûr à nos marchands."
 A23_invest_north_title:0 "Investissements Septentrionaux"
 A23_invest_north_desc:0 "Si les stratagèmes des Vertesker ont toujours été une entreprise productive, les desseins de Gawed l'étaient bien moins. Ils se contentaient d'utiliser les terres hors de leur cœur comme source d'hommes à jeter dans le hachoir à viande pour leurs conquêtes du Petit-Pays, ou quelque autre plan farfelu qui avait volé leurs maigres attentions. Il est temps que nous accordions des soins appropriés à ces terres.\n\nNous soutiendrons les Vieux-Aléniques dans la domestication de leurs forêts, les gens de l'Étendue et des Landes-de-l'Ouest dans l'exploitation des bancs grouillants de la Tombe-des-Géants. Cela devrait servir un double objectif : gagner la loyauté de nos frères et nous assurer un flux régulier de revenus en dehors de notre dépendance habituelle au commerce."
 A23_build_up_navy_title:0 "Constituer une Force de Frappe"
 A23_build_up_navy_desc:0 "Il est venu à notre attention que, concernant les affaires mercantiles, nous manquons d'une certaine méthode pour trancher avec les dents ces nœuds politiques qui ne céderont pas à nos langues. Nous œuvrerons à développer une marine digne de ce nom avec laquelle projeter notre puissance sur la Tête-de-Dame. Nul ne déteste le gaspillage d'argent autant que nous ; ainsi la menace d'une pluie remarquablement dense de boulets de fer sur les navires ou ports de nos rivaux pourrait aider à ce que les pièces changent de mains sans problème."
 A23_northern_navy_title:0 "Marine du Nord"
 A23_northern_navy_desc:0 "Longtemps affligés par notre réputation douteuse, les marchands de Vertesk ont coopéré avec notre État pour créer une marine devenue la fierté de notre nation. Nul port n'osera refouler nos navires, ni même médire de nos méthodes commerciales, de peur de voir les voiles noires de notre grande flotte emplir l'horizon. Nos rivaux de Couronne-de-Dame ont perdu tout espoir de nous égaler. Peut-être que s'ils réunissaient toutes leurs flottes, ils auraient une chance. Mais nous savons aussi bien qu'eux qu'ils se haïssent autant qu'ils nous haïssent. Sans doute, la Tête-de-Dame est notre terrain de jeu."
 A23_seagulls_title:0 "Les Mouettes Noires"
 A23_seagulls_desc:0 "Les Mouettes Noires, un nom partagé entre nos équipes d'abordage et les oiseaux aux plumes sombres et au mauvais caractère de notre port. Incarnant parfaitement l'opportunisme vicieux des uns et des autres, le nom en est venu à désigner nos marins les plus impitoyables et les plus rusés, experts dans le maniement de petits navires qui plongent habilement dans les batailles les plus féroces pour s'emparer prise après prise et les ajouter à notre flotte. Après tout, quoi de mieux qu'un navire commandé sur les deniers d'un autre ?\n\nSi auparavant ces spécialistes étaient souvent des mercenaires, de simples pêcheurs, ou même des marchands cherchant à faire un profit rapide, il est temps de formaliser ces arrangements et d'institutionnaliser les tactiques qui ont donné un tel succès aux Mouettes Noires."
 A23_source_title:0 "Directement à la Source"
 A23_source_desc:0 "Malgré la défaite de Dookanson par Corin marquant la fin de l'invasion orque pour la majeure partie de Cannor, certaines tribus orques plus petites ont réussi à survivre. L'existence d'orques libres cherchant à s'établir un foyer en Escann n'augurerait rien de bon pour notre commerce d'esclaves. Ainsi, nous avons conçu une mission pour les aventuriers impliquant une petite expédition dans ces tribus pour en capturer certains et nous les vendre.\n\nLe capitaine aventurier a toutefois déclaré qu'il aurait besoin de plus de soutien de notre part que d'habitude. Nous n'aimons pas nous salir les mains, du moins pas ouvertement, mais cette idée semble prometteuse à beaucoup dans notre gouvernement. Frapper de terreur les cœurs orques et leur faire savoir qu'ils devront un jour ou l'autre affronter la Tour Noire ressemble à ce que nous voulons que nos futures marchandises pensent."
 A23_goblins_title:0 "Entrepreneurs Gobelins"
 A23_goblins_desc:0 "Les Marais-Inondés, malgré nos tentatives de colonisation et de développement de la zone, sont restés une partie embarrassante de Vertesk. Avec l'essor du commerce d'esclaves orques, certains locaux des marais ont proposé d'utiliser les orques comme outils de développement. Si nous sommes certainement les meilleurs pour vendre des orques, on ne peut pas en dire autant de notre utilisation de la main-d'œuvre orque. Mais nous connaissons quelqu'un qui le fait. Les gobelins, un autre type de créature originaire des montagnes, se sont libérés du joug orque et ont inversé les rôles, les utilisant désormais comme esclaves. Peut-être pourrions-nous les contacter et apprendre à utiliser les orques comme esclaves plus efficacement ?"
 A23_dwarves_title:0 "Expertise Naine"
 A23_dwarves_desc:0 "Alors que l'Échine-du-Serpent est recolonisée par les Nains suite à la fin de la Marée Verte, de plus en plus d'États nains puissants se développent. Si Vertesk est connue pour notre utilisation commerciale des orques, les Nains sont les experts pour les combattre. De temps en temps, nous avons quelques orques récalcitrants qui, pour quelque raison, n'aiment vraiment pas l'idée d'aller à Aelantir et tentent de se libérer. Cela ne saurait perdurer et ces esclaves doivent être remis à leur place. Une proposition a été faite d'envoyer une mission diplomatique dans l'un de ces États nains pour apprendre d'eux ce qui rend exactement un orque obéissant."
 A23_east_reach_title:0 "Usurpateurs Gris"
 A23_east_reach_desc:0 "Tandis que l'ancien Dominion de Vertesk revendiquait l'ouest de l'Étendue Alénique, nos confrères sujets de Castanor en Vrorenmarch faisaient de même à l'est de l'Étendue. Et maintenant, ils ont disparu. Concurremment à la Marée Verte, les anciennes terres de Vrorenmarch affrontèrent la Marée Grise et furent totalement défaites, remplacées par les Orques Gris. Depuis lors, les orques ont formé Grombar, un pays dont les intérêts dans le nord entrent en conflit avec les nôtres.\n\nHeureusement pour nous, beaucoup de marchands dans l'Étendue sont encore humains et seraient plus enclins à commercer avec nous qu'avec ces usurpateurs gris. En utilisant cette influence nouvellement acquise, nous devrions perturber les routes commerciales grombaries à travers l'Étendue et la Gérudie, ce qui sapera assurément leurs efforts dans la région."
 A23_full_alenic_control_title:0 "L'Alen Coule Sereinement"
 A23_full_alenic_control_desc:0 "Quand Vertesk n'était qu'une simple cité dans l'Empire, la rivière Alen nous approvisionnait en richesses. À l'époque, Vertesk n'était qu'un point final de l'Alen. Mais maintenant… maintenant nous sommes l'Alen. La partie la plus importante en tout cas. Des dizaines de comptoirs commerciaux sont disséminés le long de la rivière à travers tout le Dominion et au-delà, et des fortifications ont été bâties pour maintenir l'ordre le long de l'Alen. L'Alen respire de vie, et avec elle, Vertesk."
 A23_underground_trade_title:0 "Commerce d'Esclaves Souterrain"
 A23_underground_trade_desc:0 "Le commerce d'esclaves a apporté la prospérité à Vertesk, et nous n'allons pas abandonner notre hégémonie sur les esclaves orques si facilement. Ils peuvent interdire le commerce d'esclaves et nous empêcher de faire défiler les orques enchaînés à travers la cité, mais ils ne peuvent nous forcer à arrêter complètement le commerce. En contactant directement les colonies en besoin de nouveaux travailleurs et en évitant les suzerains cannoriens, nous serions en mesure d'établir un réseau souterrain de commerce d'esclaves, loin des regards indiscrets de ces législateurs jaloux de notre richesse."
 A23_outside_cannor_title:0 "Hors de Cannor"
 A23_outside_cannor_desc:0 "Aussi difficile soit-il de l'admettre, nous ne pouvons maintenir le commerce d'esclaves à la même échelle qu'auparavant. Vertesk ne peut plus agir comme une cité des chaînes et un port principal pour les esclaves… mais elle n'a pas besoin de l'être non plus. Si l'interdiction a mis fin au commerce d'esclaves à Cannor, elle ne dit rien sur les puissances cannoriennes déplaçant des esclaves de l'extérieur de Cannor vers Aelantir. En établissant un nouveau centre de commerce d'esclaves ailleurs, nous serions en mesure de poursuivre notre commerce extrêmement profitable. Comment les esclaves y parviendraient-ils depuis l'Escann ? Eh bien, personne ne devrait se soucier de tels détails de toute façon."
 A23_secure_arbaran_title:0 "Sécuriser Arbaran"
 A23_secure_arbaran_desc:0 "Les demi-elfes d'Arbaran occupent les terres aléniques légitimes de l'étendue orientale, qui leur furent données lorsque Castanor fut mis en pièces. Ils n'ont aucun sentiment d'unité avec les autres Aléniques et se considèrent comme faisant partie de l'Empire. Notion absurde ! Néanmoins, ces Arabanais trouveront leur utilité pour Vertesk. Il y a là-bas de nombreux artisans et artistes qualifiés, et certains bâtiments pourraient être démontés pour que leurs matériaux soient utilisés ailleurs dans le Dominion."
 A23_unforeseen_consequences_title:0 "Conséquences Imprévues"
 A23_unforeseen_consequences_desc:0 "Ce que personne ne s'attendait à ce que la Marée Verte crée fut une race entièrement nouvelle : les demi-orques. Comme ils font de moins bons esclaves que les orques, ils ne sont pas vendus par nous aussi fréquemment que leurs frères verts, et une grande partie des demi-orques vus à Vertesk sont en fait des mercenaires libres. Actuellement, ils n'ont d'autre objectif que de gagner quelque argent rapide et de s'éloigner de nous, mais nos marchands croient qu'il y a un usage pour eux. Les demi-orques feraient de parfaits captureurs d'orques, car ils sont plus forts que les humains et auraient plus de facilité à gérer nos futurs esclaves. De plus, n'ayant pas beaucoup d'options, ils accepteraient pratiquement n'importe quel travail, nous faisant économiser quelques pièces."
 A23_increase_numbers_title:0 "Augmenter les Effectifs"
 A23_increase_numbers_desc:0 "Au fur et à mesure que l'Escann se colonise et se développe, notre commerce d'esclaves se porte mieux. La demande d'esclaves en Aelantir et ailleurs ne cesse d'augmenter, et parfois nous risquons de ne pas avoir assez d'orques à fournir. Les effectifs doivent être augmentés, des contacts avec davantage de nations en Escann établis, et le commerce doit couler pour la prospérité de Vertesk, de l'Escann, d'Aelantir, et surtout de nos bourses."
 A23_half_orcs_title:0 "Connexions Demi-Orques"
 A23_half_orcs_desc:0 "Notre emploi de demi-orques comme aventuriers et gardes pour les esclaves orques s'est avéré mutuellement bénéfique. Beaucoup de demi-orques ont choisi de s'installer à Vertesk et sont devenus quelque peu influents parmi nos guildes d'aventuriers. Comme nous pourrions toujours faire usage de plus de demi-orques, la décision fut prise de rechercher les demi-orques installés ailleurs pour leur offrir des opportunités d'emploi et des logements à Vertesk. Si certains dans notre pays s'opposent à donner trop d'influence aux demi-orques, le gouvernement ne s'inquiète pas. Après tout, que pourraient-ils faire, nous renverser ?"

