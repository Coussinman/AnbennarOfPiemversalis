 flavor_vertesk.1.t:0 "Citoyenneté Halfeline"
 flavor_vertesk.1.d:0 "Si les petites gens ont longtemps eu une présence dans notre cité, la question de leur accorder ou non la citoyenneté est arrivée à un point critique. Nous enverrions volontiers la racaille s'entretenir avec notre prévôté sur le comportement acceptable, mais peut-être devrions-nous leur témoigner quelque respect. Ou devrions-nous simplement sévir et les jeter directement dans les cachots ?"
 flavor_vertesk.1.a:0 "Un marchand est un marchand, peu importe sa taille."
 flavor_vertesk.1.b:0 "Rats, mouettes, halfelins. Juste d'autres parasites du port."
 flavor_vertesk.2.t:0 "Une Offre"
 flavor_vertesk.2.d:0 "Les Magnats, nos proches septentrionaux, les grands barons de l'industrie, ainsi que la noblesse et autres détenteurs du pouvoir dans l'ancien Royaume ont pris conscience de nos ambitions dans l'Étendue. Ils sont venus à nous, offrant leurs services et leur expérience, simplement en échange de l'adoption par nous des traditions et du faste de l'État gawedi. Il semble y avoir de bons arguments des deux côtés, mais, aussi contentieux que ce soit, notre dirigeant, [Root.Monarch.GetName], a le dernier mot. Cela ressemble à un tournant. Deux visions de notre nation s'affrontent. Nous pouvons choisir maintenant d'embrasser les Gawedi et de nous défaire de nos notions d'une nation vertesker, ou de poursuivre comme nous sommes, vers la notion d'un Dominion de Vertesk renouvelé, pour nous dresser aussi grands que nous l'étions en ces jours depuis longtemps révolus."
 flavor_vertesk.2.a:0 "Réclamons plutôt l'héritage de Gawed. Nous sommes tous Aléniques !"
 flavor_vertesk.2.b:0 "Nous n'avons pas besoin du nom de Gawed pour tenir ses terres ! Le Dominion sera restauré."
 flavor_vertesk.3.t:0 "Vertesk l'Éternelle"
 flavor_vertesk.3.d:0 "La majeure partie de l'Étendue Alénique et de grandes parties de l'Étendue sont couvertes de fumée depuis des années maintenant. La raison pour laquelle les cieux virent au noir est l'industrialisation en cours du Dominion, des quantités massives de charbon brûlant bien en dessous des nuages. Si certains de nos citoyens prétendent avoir du mal à respirer dans de telles conditions, nous ne voyons guère de problème. Si quoi que ce soit, cela devrait être un rappel constant que la Tour Noire veille sur ses sujets. Quoi qu'il en soit, peut-être personne n'aurait pu s'attendre à ce qu'une Cité Libre de Vertesk, un éclat perdu de l'empire de Nichmer, parvienne aussi loin, et encore moins devienne une grande puissance. Mais pour nous, le peuple vertesker, cela n'est guère surprenant. Tandis que d'autres empires s'effritent et tombent, Vertesk demeure. Le déclin de la magie et l'essor de l'artisanat magique seraient de peu de conséquence pour nous. Vertesk s'adaptera à tout ce qui se présentera et perdurera pendant des siècles."
 flavor_vertesk.3.a:0 "L'éternité nous attend."
 flavor_vertesk.4.t:0 "Avenir du Dominion"
 flavor_vertesk.4.d:0 "Avec la restauration du Dominion de Vertesk, une certaine question se pose. Le navire de l'État devrait-il être orienté dans une nouvelle direction ? Suite à une grande réunion des personnalités les plus éminentes de Vertesk, trois camps ont émergé. Notre armée, de plus en plus prééminente à mesure que l'ampleur de nos conquêtes s'est accrue, affirme que leur règne permettrait une conquête et une défense plus efficaces. Nos marchands souhaitent maintenir le statu quo, affirmant que seule leur sagesse maintient notre domination sur le commerce de la région. Le troisième camp soutient une femme nommée Dalya, qui prétend être l'héritière légitime de la dynastie Blacktower. Soutenue par une coalition hétéroclite d'aristocrates, d'érudits et de roturiers, ces populistes affirment que pour prendre le titre, nous devons restaurer notre souveraine légitime, une puissante mage au sang de Venac lui-même. Cependant, la légitimité de cette revendication est incertaine. Quel que soit le chemin que nous choisissons, nous allons froisser quelques susceptibilités."
 flavor_vertesk.4.a:0 "L'armée a raison ! Notre nation vivra par l'épée !"
 flavor_vertesk.4.b:0 "Ne soyons pas hâtifs, les marchands ne nous ont jamais induits en erreur."
 flavor_vertesk.4.c:0 "La Tour Noire se dresse fièrement ! Longue vie à la Reine !"
