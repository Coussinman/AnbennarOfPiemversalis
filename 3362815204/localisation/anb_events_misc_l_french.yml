 anb_miscevents.1.t:0 "Requête d'Élévation au Duché"
 anb_miscevents.1.d:0 "[Root.GetName] est devenu fort et prospère, mais demeure toujours sous le titre insignifiant de [Root.Monarch.GetTitle]. Il est temps de nous élever à un titre plus approprié, et ceux qui sont au-dessus de nous ne pourront qu'acquiescer !"
 anb_miscevents.1.a:0 "Espérons qu'ils accepteront notre requête."
 anb_miscevents.2.t:0 "[From.GetName] Sollicite son Élévation au Duché"
 anb_miscevents.2.d:0 "Notre sujet de jure, [From.GetName], a demandé que nous l'élevions de son titre de [From.Monarch.GetTitle] à celui de duc. Ceci n'est bien entendu que purement cérémoniel et n'affectera en rien sa position au sein de notre royaume."
 anb_miscevents.2.a:0 "Naturellement, ils ont fait leurs preuves."
 anb_miscevents.2.b:0 "Oh, je ne crois pas, non."
 anb_miscevents.3.t:0 "[From.GetName] Accepte Notre Requête de Duché !"
 anb_miscevents.3.d:0 "Le très juste [From.Monarch.GetTitle] [From.Monarch.GetName] a accepté notre requête légitime d'élever officiellement nos terres au rang qui leur revient de droit !"
 anb_miscevents.3.a:0 "Gloire au nouveau duché de [Root.GetName] !"
 anb_miscevents.4.t:0 "[From.GetName] Rejette Notre Requête de Duché !"
 anb_miscevents.4.d:0 "Le vil [From.Monarch.GetTitle] [From.Monarch.GetName] a rejeté notre requête légitime, l'insensé ! Envoyez-lui une lettre, et répétez après moi : « Tout d'abord, comment osez-vous... »"
 anb_miscevents.4.a:0 "Nous sommes la risée de tous."
 anb_miscevents.5.t:0 "Du Comté au Duché"
 anb_miscevents.5.d:0 "[Root.GetName] est devenu fort et prospère, mais demeure toujours sous le titre insignifiant de [Root.Monarch.GetTitle]. Il est temps de nous élever à un titre plus approprié !"
 anb_miscevents.5.a:0 "Gloire au nouveau duché de [Root.GetName] !"
 anb_miscevents.6.t:0 "Colons"
 anb_miscevents.6.d:0 "Depuis la fin de la Marée Verte, l'une de nos provinces est demeurée vide et infestée d'orques... Jusqu'à présent. Un gouverneur local a pris les choses en main et a engagé des aventuriers pour nettoyer la province, qui a maintenant été colonisée pour le bénéfice du pays."
 anb_miscevents.6.a:0 "Excellent !"
 anb_miscevents.7.t:0 "Ambitions Coloniales"
 anb_miscevents.7.d:0 "Nous nous sommes récemment fait connaître auprès de la communauté internationale pour nos ambitions de coloniser et de peupler les régions inexplorées du monde."
 anb_miscevents.7.a:0 "Il est temps de commencer à planter des drapeaux !"
 anb_miscevents.8.t:0 "Aventuriers dans un Nouveau Monde"
 anb_miscevents.8.d:0 "Nous avons franchi un pas au-delà de nos semblables et sommes partis vers des terres inexplorées pour découvrir quelles nouvelles richesses et opportunités nous pourrions y trouver !"
 anb_miscevents.8.a:0 "En avant !"
 anb_miscevents.9.t:0 "Réformer le Gouvernement de $COUNTRY$"
 anb_miscevents.9.d:0 "Notre jeune pays de $COUNTRY$ requiert des orientations claires. Nous devons réformer notre gouvernement si nous voulons être pris au sérieux dans l'arène politique. La question est : quel modèle devrions-nous chercher à atteindre ?"
 anb_miscevents.9.a:0 "Nous avons besoin d'une république !"
 anb_miscevents.9.b:0 "Former une monarchie centralisée"
 anb_miscevents.9.c:0 "Élever nos dirigeants en théocratie"
 anb_miscevents.9.f:0 "Conserver le gouvernement actuel"
 anb_miscevents.10.t:0 "Retour aux Racines Aventurières"
 anb_miscevents.10.d:0 "Pour une raison ou une autre, nous avons dévié de nos origines aventurières. Il est temps de retourner à une vie de quêtes !"
 anb_miscevents.10.a:0 "Quête Acceptée !"
 anb_miscevents.11.t:0 "Retour aux Racines Religieuses"
 anb_miscevents.11.d:0 "Pour une raison ou une autre, nous avons dévié de nos origines religieuses. Il est temps de rendre le pouvoir aux dirigeants du temple !"
 anb_miscevents.11.a:0 "Temple Ouvert !"