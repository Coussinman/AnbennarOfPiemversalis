l_french:
    ## Harmonization finished
    kalyin_harmonize.50.t:0 "Harmonisation Religieuse Accomplie"
    kalyin_harmonize.50.different_group.d:0 "Tous les dieux, déesses et divinités sont différents aspects de la seule vraie Déesse, Kalyin. Les partisans de l'Unique Vérité dans notre pays ont souligné l'importance de nous assurer que nous comprenons comment Kalyin est représentée dans d'autres cultures pour approfondir notre compréhension et nos propres croyances. Nous avons exploré les croyances que les peuples [harmonized_target.Religion.GetGroupName] détiennent ainsi que leurs interprétations de la divinité et de la foi. Après des années de travail, nos administrateurs ont pu intégrer une partie des coutumes et de la foi [harmonized_target.Religion.GetGroupName] dans notre culte de Kalyin. Cela permet également aux fidèles [harmonized_target.Religion.GetGroupName] de conserver intacte leur propre manière unique de vénérer Kalyin."
    kalyin_harmonize.50.same_group.d:0 "Tous les dieux, déesses et divinités sont différents aspects de la seule vraie Déesse, Kalyin. Les partisans de l'Unique Vérité dans notre pays ont souligné l'importance de nous assurer que nous comprenons comment Kalyin est représentée dans d'autres cultures pour approfondir notre compréhension et nos propres croyances. Nous avons exploré les croyances que les fidèles de [harmonized_target.Religion.GetName] détiennent ainsi que leurs interprétations de la divinité et de la foi. Après des années de travail, nos administrateurs ont pu intégrer une partie des coutumes et de la foi de [harmonized_target.Religion.GetName] dans notre culte de Kalyin. Cela permet également aux fidèles de [harmonized_target.Religion.GetName] de conserver intacte leur propre manière unique de vénérer Kalyin."
    kalyin_harmonize.50.a:0 "Nous voilà plus proches de comprendre pleinement Kalyin !"
