l_french:

 bulgu_orazan.1.t:0 "Chants de Bramash"
 bulgu_orazan.1.d:0 "Bramash Œil-Voilé s'éleva au rang de légende après avoir mené les orques asservis d'Ozgarom depuis l'Endralliande jusqu'aux jungles de Soruin, à bord de navires pris à leurs oppresseurs, pour y mener une vie libre. Il est considéré comme le père fondateur d'Ozgarom et a même été divinisé dans certains foyers sous le nom de Bramash le Libérateur. Ses Chants insufflent le courage chez de nombreux orques du nouveau monde, qui luttent encore contre l'esclavage, la servitude, le racisme et le colonialisme."
 bulgu_orazan.1.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.2.t:0 "Chants de Korgus"
 bulgu_orazan.2.d:0 "Korgus Dookanson unit des millions d'orques pour un but commun, mais échoua finalement à accomplir ce qu'il s'efforçait d'atteindre et périt de la main d'une femme humaine. La plupart des orques tirent de ce récit qu'il ne faut jamais surestimer ses propres forces et qu'il convient de rester toujours sur ses gardes."
 bulgu_orazan.2.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.3.t:0 "Chants de Brasûr"
 bulgu_orazan.3.d:0 "Brasûr Gueule-Gelée fut exilé avec son clan et vit son père périr en duel contre Korgus pour avoir contesté son autorité, puis unit les clans orques gris et persévéra à travers des terres froides et inconnues, survivant à l'exil et fondant un royaume. La plupart des orques tirent de ce récit la résolution de continuer à se battre pour ses convictions, même au prix du châtiment."
 bulgu_orazan.3.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.4.t:0 "Chants de l'Avant-Garde Brune"
 bulgu_orazan.4.d:0 "Les Orques Bruns ont passé des siècles assujettis au Commandement hobgobelin, servant de troupes de choc en avant-garde durant les guerres et de force d'occupation contre les humains récalcitrants en temps de paix. Au cours de leur service comme avant-garde des hobgobelins, ils ont bâti une histoire commune, avec un chant pour chaque bataille, chaque siège, chaque héros et chaque chef."
 bulgu_orazan.4.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.5.t:0 "Chants de Défense-Bleue"
 bulgu_orazan.5.d:0 "Lothane Défense-Bleue, qui combattit aux côtés de Corin contre le Dookanson, est une figure controversée dans la société orque, considéré par certains comme un traître à sa race. Cependant, pour de nombreux demi-orques, il est le premier défenseur éminent de leur cause. S'il échoua à protéger son groupe de demi-orques face à Karagh Poing-Sanglant, il parvint à sauver des milliers d'autres orques et demi-orques en promouvant l'intégration et la tolérance envers les (demi-)orques dans la société corintarienne."
 bulgu_orazan.5.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.6.t:0 "Chants de l'Ashentree"
 bulgu_orazan.6.d:0 "Le Pacte d'Ashentree est une foi qui se développa parmi certains orques des Bois-Profonds après un contact intense avec les fées de la région. Ils vénèrent la nature par-dessus tout et les récits de leur peuple enseignent comment tirer profit de la nature sans lui nuire, que ce soit par la magie ou la cueillette."
 bulgu_orazan.6.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.7.t:0 "Chants de Maxug"
 bulgu_orazan.7.d:0 "Maxug, du clan des Guerriers-de-la-Route, était célèbre pour son esprit d'invention et sa soif de découverte ; il mena son clan depuis l'Arbre-de-Pierre jusqu'au Dwarovar occidental, apprenant des inventions et des ouvrages nains rencontrés en chemin et les mettant à profit."
 bulgu_orazan.7.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.8.t:0 "Chants de la Couronne Brisée"
 bulgu_orazan.8.d:0 "Le clan de la Couronne Brisée est réputé pour sa résistance féroce contre les aventuriers nains, et tandis que de nombreux clans orques noirs succombèrent en quelques années, eux combattirent sans relâche, cherchant un moyen de libérer Dookan alors même que leur patrie était menacée dans son existence."
 bulgu_orazan.8.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.9.t:0 "Chants de Bordu Brise-Couronne"
 bulgu_orazan.9.d:0 "Bordu, qui sera plus tard connu sous le nom de Bordu Brise-Couronne, était un orque de la horde qui prit Amldihr aux nains. On dit qu'il arracha le Dwarovkron de la tête d'un roi nain en personne. La légende raconte qu'il usa de toute sa force pour tordre la couronne naine afin qu'elle s'ajuste à son propre crâne, en brisant des fragments au passage. Ce jour-là naquit Bordu Brise-Couronne, père du clan de la Couronne Brisée, chef d'Amldihr. Il passa la majeure partie de sa vie à unifier le vaste bastion d'Amldihr sous la bannière de son seul clan et à imposer une structure à une société autrement chaotique. Les Chants qui lui sont consacrés parlent des nombreuses cicatrices qu'il reçut et des amis qu'il perdit en tentant d'unifier son bastion, une leçon dont nous pourrions tous tirer profit."
 bulgu_orazan.9.a:0 "Ces chants guideront notre peuple"

 bulgu_orazan.10.t:0 "Des femmes chamanes ?"
 bulgu_orazan.10.d:0 "Les femmes devraient-elles avoir le droit d'être chamanes ? Cette question attise les flammes du débat à [Root.Capital.GetName]. Des chamanes éminents et des détenteurs du pouvoir politique se querellent sur les conséquences qu'aurait le retrait des quelques femmes exerçant actuellement la fonction de chamane dans leurs communautés.\n\nLes partisans de l'autorisation officielle des femmes chamanes arguent qu'interdire aux femmes d'exercer cette profession priverait certaines petites communautés de toute guidance spirituelle, faute d'hommes suffisamment versés dans les Chants pour les remplacer. Nombre d'hommes en position de pouvoir soutiennent que les chamanes masculins sont de meilleurs meneurs pour les communautés en difficulté.\n\nQu'en pense [Root.GetRulerTitleAndNameOrRegencyCap] ?"
 bulgu_orazan.10.a:0 "Reconnaître officiellement les femmes comme aptes au chamanisme"
 bulgu_orazan.10.b:0 "Interdire aux femmes d'être chamanes"
 bulgu_orazan.10.c:0 "Nous avons des affaires plus pressantes à régler"

 bulgu_orazan.11.t:0 "Abstinence forcée pour les chamanes ?"
 bulgu_orazan.11.d:0 "Les chamanes devraient-ils être astreints à l'abstinence ? D'un point de vue orque, la réponse historique est évidemment non, mais diverses organisations religieuses et philosophiques imposent l'abstinence à leurs clercs et affirment que cela crée un environnement plus propice à leur épanouissement.\n\nCette question ne serait pas importante si la fille d'un noble éminent de [Root.Capital.GetName] n'était pas tombée enceinte du chamane qui était censé lui enseigner les Chants de son héritage. Le noble était dans une rage folle et a mis le pays en alerte ; d'autres se sont manifestés avec des récits similaires.\n\nQu'en pense [Root.GetRulerTitleAndNameOrRegencyCap] ?"
 bulgu_orazan.11.a:0 "Imposer l'abstinence aux chamanes"
 bulgu_orazan.11.b:0 "Réaffirmer leurs droits"
 bulgu_orazan.11.c:0 "Nous avons des affaires plus pressantes à régler"

 bulgu_orazan.12.t:0 "Mouvements anti-dookanistes"
 bulgu_orazan.12.d:0 "Une foule imposante de fidèles du Bulgu Orazan s'est rassemblée à [Root.Capital.GetName], exigeant que des mesures soient prises contre les nombreux dookanistes vivant parmi nous.\n\n[Root.GetRulerTitleAndNameOrRegencyCap] devrait-il ordonner aux chamanes d'agir ?"
 bulgu_orazan.12.a:0 "Les encourager à participer à nos rituels afin qu'ils apprennent"
 bulgu_orazan.12.b:0 "Les forcer à renier Dookan"
 bulgu_orazan.12.c:0 "Nos Chants ne sont pas si différents ; laissons-les tranquilles"

 bulgu_orazan.13.t:0 "Des chamanes du Bulgu souhaitent évangéliser"
 bulgu_orazan.13.d:0 "Une congrégation de chamanes du Bulgu Orazan souhaite établir un temple dans la province dookaniste de [bulgu_church_target.GetName], dans l'espoir d'éclairer la population locale. Ils ont réuni quelques fonds, mais demandent à [Root.GetRulerTitleAndNameOrRegencyCap] si l'État peut combler ce qui manque."
 bulgu_orazan.13.a:0 "« Allez, et chantez ! »"
 bulgu_orazan.13.b:0 "« Je ne puis vous soutenir pour le moment »"

 #Tooltips

