 string_start_title_dwarovar_adventurer:0 "Les Aventuriers Nains de [Root.GetName]"
 string_start_dwarovar_adventurer_description:0 "§g« Qu'il soit résolu que : 1) Une force expéditionnaire sera assemblée, avec composition telle que décrite en Annexe 2... iii) Dirigée par Jarmun Asra... 2) Les profits de reconquête seront utilisés comme financement initial pour de futures entreprises dans l'Échine-du-Serpent... le remboursement du prêt suivra le Calendrier IV... Note finale : Notre devoir fiduciaire impose que les profits doivent primer sur le prestige ou toute idée de 'gloire naine'. »\n-Fragments de la charte de la Banque Asra, établissant le financement d'une expédition vers l'Échine-du-Serpent, 1443§!\n\n§OAperçu§!\nJadis, le peuple nain s'étendait sur l'entièreté de la Chaîne de Montagnes de l'§YÉchine-du-Serpent§!, de ses frontières occidentales à Escann jusqu'aux confins les plus reculés de Yanshen. Jadis, tous les nains étaient unifiés sous l'Empire d'§YAul-Dwarov§!, Foyer-de-Tous-les-Nains, et avaient connu leur âge d'or bien avant que l'humanité ne construise ses premiers châteaux.\n\nMais c'était il y a des millénaires. Aul-Dwarov s'effrita lentement, tandis que nombre de §YForteresses§! tombèrent face aux §YOrques§! et §YGobelins§!. Le gouvernement central, l'§YAmlharaz§!, s'effondra avec la chute de l'ancienne capitale de l'empire, §YAmldihr§!. Le grand §YRail Nain§! entretenu par §YEr-Natvir§!, qui transportait autrefois la bière de §YHul-az-Krakazol§! et les découvertes scientifiques de §YDûr-Vazhatun§! à travers toute l'Échine-du-Serpent, tomba en décrépitude.\n\nLes longs et sombres §YDerniers Jours du Dwarovar§! s'achevèrent lorsque d'innombrables §YOrques§! se déversèrent hors de §YHul-Jorkad§!. Cette ruée féroce à travers l'Échine-du-Serpent fracassa les Forteresses, massacra les nains et invita même le gobelin le plus couard à infester les tunnels des montagnes, laissant une grande partie du Dwarovar en ruines.\n\nCependant, toutes les régions ne furent pas aussi dévastées par les forces envahissantes que l'Ouest. Le §YSegbandal§! fut ravivé dans le Dwarovar Central et prospéra pendant des millénaires tandis que la puissante alliance parvenait à commencer des tentatives de reconquête à l'ouest, prospérer durant un âge d'or et grandement aider les peuples de §YBulwar§!. Dans l'Échine-du-Serpent Orientale, l'§YEmpire de Jade§! fut proclamé par la forteresse de §YGrônstunad§!, revendiquant le titre de Haut-Roi et d'héritiers légitimes de l'empire perdu. Ils consolidèrent toutes les forteresses de leur région tout en repoussant gobelins, ogres et hobgobelins qui tentaient de profiter du chaos causé par les orques à l'ouest. Tout en se faisant des ennemis du Segbandal, ils parvinrent à grandement influencer les humains de §YRahen§! et §YVimdatrong§! et construisirent la forteresse de §YVerkal Ozovar§!. Au final cependant, tant le Segbandal que l'Empire de Jade échouèrent à contenir les menaces qui les assaillaient, menant à leurs chutes dans l'histoire plus récente.\n\n§OHistoire Récente§!\nLa dernière Forteresse Naine à tomber à l'ouest fut §YKhugdihr§!, brisée par §YGurukk Brise-Siège§! en 1424. Mais ce n'était qu'un présage de la §YMarée Verte§!, lorsque §YKorgus Dookanson§! unifia les clans et les mena se déversant hors de l'Échine-du-Serpent vers l'§YEscann§! et plus tard §Yvers les Bois-Profonds§!.\n\nMais le flot d'orques et gobelins hors des montagnes et la défaite de Korgus par §YCorin§! en 1444 signifièrent une opportunité : les montagnes abandonnées de longue date étaient maintenant plus vides qu'auparavant, et mûres pour la reconquête. Des nains des états d'exode de §YForteresse-de-Rubis§! et §YForgelune§! qui vivent parmi l'humanité, et la riche §YBanque Asra§! ont versé des financements dans de multiples expéditions. Vous êtes l'un des nombreux aventuriers, fils et filles de vos ancêtres qui fuirent vers la surface il y a longtemps, qui cherchent maintenant à retourner vers les terres de vos aïeux.\n\nLa route devant vous ne sera pas facile. Les cavernes et routes abandonnées du §YDwarovrod§! sont traîtresses, et toute carte a depuis longtemps pourri. Des centaines de milliers de gobelins et orques demeurent encore, tant errant dans les montagnes qu'organisés en états squatteurs et bandes de guerre ravageuses. Les défis seront féroces, mais devant vous se trouve le prix ultime : refonder une ancienne Forteresse, creuser plus profondément que jamais auparavant, et rétablir la domination Naine sur l'Échine-du-Serpent. Peut-être qu'un jour, pas trop lointain, §YAul-Dwarov§! renaîtra, encore plus grand qu'avant."
 string_start_title_dwarovar_remnant:0 "La Forteresse Rémanente de [Root.GetName]"
 string_start_dwarovar_remnant_description:0 "§g'Aucun Nain de Diamant, dans quelque partie assez large pour saigner, même si aucune hémorragie ne se produit du fait de bandage, cautérisation... ou autres moyens efficaces, ne peut quitter la Forteresse... ou par action, malversation, malentendu... ou inaction causer qu'un autre Nain... quitte la Forteresse'\n-Article 4 du Code Légal d'Arg-Ôrdstun, révision 827.§!\n\n§OAperçu§!\nJadis, le peuple nain s'étendait sur l'entièreté de la Chaîne de Montagnes de l'§YÉchine-du-Serpent§!, de ses frontières occidentales à Escann jusqu'aux confins les plus reculés de Yanshen. Jadis, tous les nains étaient unifiés sous l'Empire d'§YAul-Dwarov§!, Foyer-de-Tous-les-Nains, et avaient connu leur âge d'or bien avant que l'humanité ne construise ses premiers châteaux.\n\nMais c'était il y a des millénaires. Aul-Dwarov s'effrita lentement, tandis que nombre de §YForteresses§! tombèrent face aux §YOrques§! et §YGobelins§!. Le gouvernement central, l'§YAmlharaz§!, s'effondra avec la chute de l'ancienne capitale de l'empire, §YAmldihr§!. Le grand §YRail Nain§! entretenu par §YEr-Natvir§!, qui transportait autrefois la bière de §YHul-az-Krakazol§! et les découvertes scientifiques de §YDûr-Vazhatun§! à travers toute l'Échine-du-Serpent, tomba en décrépitude.\n\nLes longs et sombres §YDerniers Jours du Dwarovar§! s'achevèrent lorsque d'innombrables orques se déversèrent hors de §YHul-Jorkad§!. Cette ruée féroce à travers l'Échine-du-Serpent fracassa les Forteresses, massacra les nains et invita même le gobelin le plus couard à infester les tunnels des montagnes, laissant une grande partie du Dwarovar en ruines.\n\nCependant, toutes les régions ne furent pas aussi dévastées par les forces envahissantes que l'Ouest. Le §YSegbandal§! fut ravivé dans le Dwarovar Central et prospéra pendant des millénaires tandis que la puissante alliance parvenait à commencer des tentatives de reconquête à l'ouest, prospérer durant un âge d'or et grandement aider les peuples de §YBulwar§!. Dans l'Échine-du-Serpent Orientale, l'§YEmpire de Jade§! fut proclamé par la forteresse de §YGrônstunad§!, revendiquant le titre de Haut-Roi et d'héritiers légitimes de l'empire perdu. Ils consolidèrent toutes les forteresses de leur région tout en repoussant gobelins, ogres et hobgobelins qui tentaient de profiter du chaos causé par les orques à l'ouest. Tout en se faisant des ennemis du Segbandal, ils parvinrent à grandement influencer les humains de §YRahen§! et §YVimdatrong§! et construisirent la forteresse de §YVerkal Ozovar§!. Au final cependant, tant le Segbandal que l'Empire de Jade échouèrent à contenir les menaces qui les assaillaient, menant à leurs chutes dans l'histoire plus récente.\n\n§OHistoire Récente§!\nToutes les Forteresses ne tombèrent pas face aux orques et gobelins, cependant. Le foyer des Nains de Diamant, §YArg-Ôrdstun§!, fut à la hauteur de son statut de gemme la plus dure, et l'impénétrable §YOvdal Kanzad§! déchiqueta ses assiégeants avec de massives batteries d'artillerie. Mais même si leurs Forteresses tenaient encore debout, les cicatrices infligées au peuple nain étaient profondes. L'obscurité au-delà des murs d'une Forteresse ne devait jamais être foulée, et avec leur attention entièrement tournée vers l'intérieur, les blessures qui avaient abattu Aul-Dwarov ne firent que s'envenimer. L'innovation naine cessa : la recherche novatrice fut remplacée par d'interminables débats sur les mêmes questions mineures, tandis que les architectes cessèrent toute nouvelle construction et se contentèrent de polir les merveilles de leurs prédécesseurs. Mais même la focalisation intérieure des Forteresses ne put les aveugler à la §YMarée Verte§!, lorsque §YKorgus Dookanson§! unifia les clans et les mena se déversant hors de l'Échine-du-Serpent vers l'§YEscann§! et plus tard §Yvers les Bois-Profonds§!.\n\nCette perturbation du statu quo de l'Échine-du-Serpent a servi d'étincelle dans les halls poussiéreux de votre Forteresse, et des voix jadis endormies s'élèvent maintenant avec passion. Mais la route devant vous ne sera pas facile. Vous devez mener votre état hors de son long, long sommeil, et bien que des millions d'orques et gobelins soient partis, des centaines de milliers demeurent encore, tant errant dans les montagnes qu'organisés en états squatteurs et bandes de guerre ravageuses. Les défis seront féroces, mais devant vous se trouve le prix ultime : reconquérir votre gloire ancienne, creuser plus profondément que jamais auparavant, et rétablir la domination naine sur l'Échine-du-Serpent. Peut-être qu'un jour, pas trop lointain, §YAul-Dwarov§! renaîtra, encore plus grand qu'avant."

 string_start_cave_goblin_description:0 "§g« Garde toujours trois dagues cachées sur toi. Une pour ton ennemi, une pour ton ami, et une autre pour te poignarder toi-même et accuser ton chef. »\n-Règle 222 dans « Da Ultimate Rulez for Survival » par Muk le Sans-Sang, mort d'hémorragie en 1571.§!\n\n§OAperçu§!\nNé comme l'une des, sinon la plus faible des races, les gobelins comptent sur le pragmatisme, la ruse et une cruauté extrême (même en traitant avec leurs semblables) pour obtenir chaque avantage, un instinct de survie qui s'est profondément imprégné dans la société gobeline où les vies ne sont qu'une denrée relativement bon marché. On les connaît pour vivre en nombres innombrables dans les profondeurs obscures de l'§YÉchine-du-Serpent§!, et prétendent avoir existé dans les montagnes bien avant que l'empire nain §YAul-Dwarov§! ne domine la région. Malgré la technologie avancée de cet empire, ils restèrent une épine et irritant constants, pillant les trains §YEr-Natvir§! non protégés et tendant des embuscades à tout nain s'égarant trop loin hors des murs d'une §YForteresse§!. Et, bien sûr, ils survécurent à cet empire décrépit, observant avec délectation durant les millénaires des §YDerniers Jours du Dwarovar§!.\n\nLorsque les orques émergèrent cependant, se précipitant hors de §YHul-Jorkad§!, les gobelins firent face à une nouvelle menace. Ils asservirent d'innombrables clans, et beaucoup furent massacrés même alors qu'ils réalisaient le rêve longtemps chéri de voir les forteresses naines fracassées devant eux (certaines, comme §YVerkal Kozenad§!, tombèrent rapidement ; d'autres, comme §YGor Ozumbrog§!, ne tombèrent face à une horde gobeline que lorsque trahies par leurs alliés).\n\nCette histoire signifia que nombre de gobelins savaient ce qui venait lorsque le §YDookanson§! se leva et unifia les orques derrière lui. Certains fuirent, battant en retraite vers les cavernes les plus sombres et inhospitalières. D'autres échappèrent à l'Échine-du-Serpent, déferlant dans §YBulwar§! et §YBahar§! comme les §YGobelins de l'Exode§! et menant aux §YDécennies de Dévastation§!. Les plus malheureux, cependant, ne purent échapper à l'esclavage du Dookanson et ne devinrent rien de plus que chair à canon et serviteurs durant la §YMarée Verte§!.\n\n§OHistoire Récente§!\nÀ la fin cependant, les gobelins survécurent au Dookanson, tout comme ils survécurent à Aul-Dwarov. Maintenant, pour la première fois en de nombreux siècles, les gobelins sont libres de l'oppression de tout empire. Parmi d'autres, §YRôdeur-des-Rails§! a revendiqué les anciens Dépôts Ferroviaires, §YDoigt-de-Morve§! projette vengeance contre les orques méprisés, et §YRictus-Avide§! convoite l'or de §YVerkal Gulan§!.\n\nMais le destin de la race gobeline demeure incertain. D'avides aventuriers nains du monde extérieur envahissent l'Échine-du-Serpent à nouveau, tandis que de décrépites §YForteresses Rémanentes§! brillent de lumière, semblant s'éveiller de leur long sommeil. Entre-temps, des nouvelles de l'est disent que les gobelins y ont été soumis par un §YCommandement§! hobgobelin.\n\nPlus jamais ! Les gobelins reconquerront leurs foyers une fois pour toutes. Ils s'élèveront de l'obscurité opaque et uniront les tribus en un empire qui régnera sur toute l'Échine-du-Serpent. Par conquête, pillage, flammes, explosions et tous autres stratagèmes pouvant être imaginés, c'est maintenant à vous de revendiquer les montagnes et voir les gobelins s'élever comme jamais auparavant."

 string_start_title_serpentspine_squatter:0 "Squatteur"
 string_start_dwarovar_serpentspine_description:0 "C'est un squatteur. Dans une forteresse."

 string_government_dwarven_adventurer:0 "§OMécaniques Uniques Anbennar§!\nEn tant qu'§YAventurier Nain§!, vous commencez dans un coin sans intérêt de l'Échine-du-Serpent. Mais tant que vous n'avez qu'une seule province, vous pourrez §Ymigrer§!, vous permettant de vous déplacer à travers et explorer les montagnes. Si des Orques ou Gobelins semblent bloquer votre chemin (ou si vous cherchez à rembourser de vieilles rancunes), si vous possédez une unique province non légitimée de culture Peau-Verte, vous aurez accès à £icon_dig_deeper£§YPurger la Bande de Guerre§! dans le §YMenu de Décisions§!, qui détruira la province, donnera quelques petites récompenses, et la laissera prête pour future colonisation ou migration.\n\nDans votre exploration, vous pourriez tomber sur l'une des nombreuses anciennes §YForteresses§! abandonnées (ou une où des squatteurs ont pris résidence). Une fois que vous atteignez la §YTechnologie Administrative 7§!, vous pourrez refonder toute Forteresse que vous contrôlez, et faire un premier pas audacieux dans la refondation de la gloire Naine.\n\nC'est une opportunité qui ne se présente qu'une fois par millénaire pour revendiquer le Dwarovar, et en tant que telle jusqu'en §Y1494§!, vous aurez le bonus §YRevendicateur du Dwarovar§! qui accorde £icon_morale£§YMoral§!, £land_forcelimit_icon£§YLimite de Forces§! et £icon_manpower£§YMain-d'Œuvre§! massivement augmentés, ainsi que £icon_maintenance£§YEntretien Terrestre§! massivement diminué. Mais attention — vos rivaux l'ont aussi. Vous §RPerdrez§! le bonus si vous vous concentrez ailleurs et attaquez des pays hors de l'Échine-du-Serpent.\n\nEn tant qu'§YAventurier§!, vous avez accès à l'§YEfficacité d'Aventurier§!, visible sous votre Dirigeant dans l'§YÉcran de Gouvernement§!. Représentant votre talent pour les quêtes et l'exploration, elle accorde £icon_tax_base£§YRevenu Fiscal Annuel§!, £land_forcelimit_icon£§YLimite de Forces§! et §YRécupération de Main-d'Œuvre§! augmentés. Elle peut être modifiée par divers événements, augmentée en dépensant £mil£ §YPouvoir Militaire§! et en ayant un £icon_prestige£ §YPrestige §YÉlevé§!, mais sera diminuée par une £icon_stability£ §YStabilité§! §Yfaible§!, un £icon_prestige£ §YPrestige§! §Ynégatif§!, ou en §YContrôlant Plusieurs Provinces§!.\n\n§YReconquérir le Dwarovar§! n'est pas une entreprise facile, et sera une tâche d'épée et de pioche, de sang et d'acier. Tant que votre §YCapitale§! est dans l'Échine-du-Serpent, vous aurez un §YColon§! supplémentaire pour aider vos efforts de reconquête, mais la nature sanglante de l'effort signifie que vous subirez §Y50 % d'Augmentation§! de §YChance de Soulèvement Natif§! et ne connaîtrez §Yaucune§! §YAssimilation Native§!.\n\n§OMécaniques du Jeu de Base§!\n[Root.startup_government_explanation][Root.startup_estates_explanation]"

 string_government_dwarven_remnant:0 "§OMécaniques Uniques Anbennar§!\nEn tant que §YForteresse Rémanente§!, votre première tâche sera d'essuyer le sommeil de vos yeux et de rendre quelque semblant de dynamisme à votre gouvernement. Jusque-là, vous serez incapable de vous étendre hors de vos murs. Cependant, une fois que vous accomplirez cet §YÉveil Rémanent§!, vous pourrez commencer à §YReconquérir le Dwarovar§!. Ce n'est pas une entreprise facile cependant, et sera une tâche d'épée et de pioche, de sang et d'acier. Tant que votre §YCapitale§! est dans l'Échine-du-Serpent, vous aurez un §YColon§! supplémentaire pour aider vos efforts de reconquête, mais la nature sanglante de l'effort signifie que vous subirez §Y50 % d'Augmentation§! de §YChance de Soulèvement Natif§! et ne connaîtrez §YAucune§! §YAssimilation Native§!.\n\n§OMécaniques du Jeu de Base§!\n[Root.startup_government_explanation][Root.startup_estates_explanation]"

 string_start_serpentspine_description:0 "§OMécaniques de Terrain§!\nL'Échine-du-Serpent est une chaîne de montagnes géante qui s'étend sur la majeure partie d'Halcann. Elle comporte 3 types de terrain : Forteresses, Routes Naines et Cavernes. Chacun a des interactions uniques à mesure que votre nation croît et se développe :\n\nLes Forteresses sont les centres politiques, industriels et créatifs de l'Échine-du-Serpent, qui se trouvent soit profondément sous terre (Forteresses Naines) soit chevauchant la frontière avec le monde extérieur (Forteresses de Surface). Si contrôlées par une race souterraine, à savoir Nains, Gobelins ou Kobolds, elles recevront des bonus majeurs de §YProduction§!, §YDéveloppement§! et §YDéfense§!, ainsi qu'une §YCroissance de Développement Passive§!.\nÀ mesure qu'elles croissent en développement, elles peuvent être £icon_dig_deeper£§YCreusées Plus Profondément§!, intensifiant leurs bénéfices et permettant une croissance supplémentaire au coût de beaucoup de couronnes et de temps. Celles-ci sont cependant affectées par les modificateurs de §YCoût de Construction§! et §YTemps de Construction§!.\nLes Forteresses peuvent être endommagées, soit du fait de siècles d'abandon soit en étant §YAssiégées§!. Cela §YCoûtera du Développement§! et retirera temporairement leurs bonus jusqu'à ce qu'elles soient entièrement £icon_dig_deeper£§YRéparées§!.\nLes Forteresses Abandonnées peuvent aussi être §YInfestées§!, avec des habitants qui opposeront une résistance féroce si vous revendiquez la Forteresse comme vôtre.\n\nLes §YRoutes Naines§! s'étendent à travers chaque montagne, liant l'Échine-du-Serpent ensemble. Dominées par une vaste route et un §YVieux Rail en Ruines§! au centre, il y a aussi une variété de tunnels et recoins qui permettent l'habitation et le développement des provinces. À mesure que votre §YTechnologie Administrative§! augmente, vous pourriez un jour avoir la capacité de £icon_dig_deeper£§YRestaurer le Chemin de Fer§!, ou même £icon_dig_deeper£§YAméliorer le Rail§! au-delà de sa capacité originale.\n\nLes §YCavernes§! sont des grottes largement sous-développées qui entourent les Forteresses et Routes du Dwarovar. Elles sont difficiles à améliorer mais peuvent contenir des biens commerciaux précieux tels que Mithril et Or.\n\nLes §YExpéditions§! sont une mécanique qui vous permet d'envoyer et équiper des troupes dans les profondeurs de l'Échine-du-Serpent pour trouver des trésors perdus dans toute province avec le modificateur de province §YCible d'Expédition§! et peuvent être gérées dans le £icon_dig_deeper£§YMenu d'Expédition§!. Une fois que votre expédition revient avec succès de l'une d'elles, elle peut rapporter de nombreuses richesses sous forme d'or, gemmes perdues du §YDwarovkron§! et grands monuments perdus dans le temps."
 string_start_serpentspine:0 "L'Échine-du-Serpent"

 string_start_religion_ancestor_worship:0 "[Root.start_religion_intro]\n\nLa foi du §YCulte des Ancêtres§! reflète la grande histoire orale des nains, qui présente divers héros et rois, et s'étend jusqu'à la création de la race par §YHalanna la Mère-Terre§! dans l'§YArbre-de-Pierre§!. On dit qu'une salle de cent conteurs ne pourrait raconter le folklore nain complet même s'ils avaient cent ans pour le faire. Leurs histoires étaient anciennes au temps d'§YAul-Dwarov§!, et l'ascension et la chute de ce grand empire ne laissèrent derrière qu'encore plus de récits de tragédie et de gloire.\n\nDurant la stagnation naine cependant, l'histoire réelle des récits s'est estompée en ombres d'un souvenir d'un rêve. C'est à vous de restaurer la prééminence naine dans l'§YÉchine-du-Serpent§!, et de reconquérir les §YSites Sacrés§! tels que l'ancienne capitale §YAmldihr§!, le nœud ferroviaire §YEr-Natvir§!, ou le lieu de naissance des nains à §YGraine-de-Terre§!. Si vous pouvez le faire, votre peuple pourra mieux croire en leur gloire ancienne, et vous gagnerez accès à de puissantes §YBénédictions Ancestrales§!. Mais dans les millénaires depuis que les nains ont abandonné ces sites, des ennemis tels que la §YCouronne Brisée§! orque et le massif §YCommandement Hobgobelin§! s'y sont installés, et ils défendront sans aucun doute leurs gains mal acquis et trempés de sang avec vigueur et violence."