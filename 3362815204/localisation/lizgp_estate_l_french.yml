l_french:

estate_mages_steppe_enhancement_desc: "Les Mages du Désert canalisent leur pouvoir pour dompter les steppes arides, réduisant les coûts de développement et augmentant la production."
estate_mages_steppe_enhancement: "§dConquête des Steppes§!"

estate_mages_desert_enhancement: "§pSeigneurs des Sables§!"
estate_mages_desert_enhancement_desc: "Les Mages du Désert canalisent leur pouvoir pour dompter les déserts arides, réduisant les coûts de développement et augmentant la production."
mages_steppe_dev_cost: "Steppes Enchantées"
mages_steppe_dev_cost_desc: "La magie des Mages du Désert remodèle les steppes, rendant les colonies plus faciles à développer et augmentant la capacité productive de la région."

mages_steppe_and_desert_dev_cost: "Sables Transformés"
mages_steppe_and_desert_dev_cost_desc: "La puissance des Mages du Désert altère la terre elle-même : les sables se solidifient pour soutenir de grandes structures, et la terre produit plus de richesses que jamais auparavant."

estate_mages_steppe_enhancement_tooltip: "Accorde un modificateur de réduction du coût de développement à toutes les provinces de steppe"
estate_mages_desert_enhancement_tooltip: "Accorde un modificateur de réduction du coût de développement à toutes les provinces de désert"

zirbit_2_tt: "§pDébloque le privilège d'enchantement des steppes§!"
zirbit_3_tt: "§pDébloque le privilège d'enchantement des déserts§!"