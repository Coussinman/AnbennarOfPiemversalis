 elections.1002.t:0 "Convention constitutionnelle"
 elections.1002.d:0 "Pendant cinquante ans, notre [Root.Monarch.GetTitle] a gouverné notre république, et son règne fut long et stable. Cependant, avec le temps, les longs règnes tendent vers la stagnation et la tyrannie. Consciente de ce problème, notre Constitution accorde à une seule personne le droit de gouverner pour un maximum de cinquante ans. Ce terme étant atteint, les plus hauts dignitaires de l'État se sont réunis pour préparer une transition pacifique du pouvoir. Notre [Root.Monarch.GetTitle], conscient de l'imminence de la fin de son mandat, a déjà commencé les préparatifs pour se retirer de ses fonctions et mettre fin à [Root.Monarch.GetHerHis] longue et fructueuse tenure. Après une si longue période, le temps est enfin venu de changer de chef d'État."
 elections.1002.a:0 "Un compromis nécessaire pour protéger la République."


