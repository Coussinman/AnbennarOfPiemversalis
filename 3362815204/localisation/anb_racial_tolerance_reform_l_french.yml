 #Racial tolerance
 racial_tolerance_reform:0 "Tolérance raciale"
 racial_tolerance_reform_desc:0 "Toutes les créatures douées de raison naissent libres et égales en dignité et en droits. En inscrivant ces idéaux dans la Constitution de notre République, nous poursuivrons notre quête de démocratie, de liberté et d'égalité. Toute personne, quelle que soit sa race, sera autorisée à servir dans les plus hautes fonctions de l'État."
 mechanic_racial_election_yes:0 "Permet d'élire d'autres races.\nLes souverains confèrent des §Gbonus§! supplémentaires selon leur race.\nLes souverains à longue vie dans les républiques non longévives ont un mandat limité à §Y50 ans§!."
 anbennar_racial_tolerance_trigger_tooltip:0 "Possède au moins trois races §Ynon principales§! §TIntégrées§! et au moins une race §Ynon principale§! §Tintégrée§! est §Yprésente§! dans notre nation."

