 ##Election Event
 elections.1001.t:0 "Élections !"
 elections.1001.d:0 "L'heure des nouvelles élections a sonné ! Les délégués de chacune de nos provinces ont envoyé leurs représentants dans la capitale, s'affrontant les uns les autres et se ralliant derrière divers candidats potentiels à la tête de l'État. La campagne a commencé pour de bon, chaque candidat s'efforçant d'impressionner le public. Certains sont naturellement plus populaires que d'autres : seul le temps nous dira qui réussira dans sa quête pour devenir le nouveau [Root.Monarch.GetTitle] de notre pays."
