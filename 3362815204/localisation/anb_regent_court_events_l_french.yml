 ryala_temple:0 "Temple de Ryala"
 ryala_temple_inactive:0 "Temple de Ryala §g(Inactive)§!"
 ryala_temple_desc:0 "Le temple principal de Ryala reflète son essence divine, un espace sacré paré d'une ambiance sereine. La cour de son plus grand temple embaume perpétuellement de grands parfums et d'encens mêlés avec une subtilité raffinée.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
