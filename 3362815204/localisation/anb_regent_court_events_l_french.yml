 to_munas:0 "Temple de Munas"
 to_munas_inactive:0 "Temple de Munas §g(Inactive)§!"
 to_munas_desc:0 "Le temple de Munas dans le port portant son nom est l'un des plus récents lieux saints de la Cour Régente. La vie et la mort du Chante-Lune, survenues en rapide succession avant sa déification, font que ses fidèles sont encore capables de raconter ce que c'était de le connaître, et ainsi d'expliquer son importance.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
 to_munas_inactive_desc:0 "Le temple de Munas dans le port portant son nom est l'un des plus récents lieux saints de la Cour Régente. La vie et la mort du Chante-Lune, survenues en rapide succession avant sa déification, font que ses fidèles sont encore capables de raconter ce que c'était de le connaître, et ainsi d'expliquer son importance.\n\nCe lieu saint est actuellement §gInactif§! :\n£no£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
 hall_shadowdancer:0 "Hall de la Danseuse d'Ombre"
 hall_shadowdancer_inactive:0 "Hall de la Danseuse d'Ombre §g(Inactive)§!"
 hall_shadowdancer_desc:0 "Le Hall de la Danseuse d'Ombre est un lieu étrange, Nathalyne n'étant guère portée sur un clergé particulièrement traditionnel. L'agencement et la construction accueillants conviennent néanmoins à la nature ouverte de la dévotion envers elle, rappelant ses origines en tant qu'avatar de la Dame.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
 hall_shadowdancer_inactive_desc:0 "Le Hall de la Danseuse d'Ombre est un lieu étrange, Nathalyne n'étant guère portée sur un clergé particulièrement traditionnel. L'agencement et la construction accueillants conviennent néanmoins à la nature ouverte de la dévotion envers elle, rappelant ses origines en tant qu'avatar de la Dame.\n\nCe lieu saint est actuellement §gInactif§! :\n£no£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
 dorum_odir_temple:0 "Temple de Dôrum-Odir"
 dorum_odir_temple_inactive:0 "Temple de Dôrum-Odir §g(Inactive)§!"
 dorum_odir_temple_desc:0 "Le hall des Forgerons de Balgar près de Forgelune est un lieu de grande industrie, où le clergé balgarique forge pour lui-même des instruments de dévotion que les fidèles peuvent ensuite emporter ou admirer. Ces modèles concentrent leurs propres efforts alors qu'ils entament leur période de dévotion au Bâtisseur et à Dôrum-Odir.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
 dorum_odir_temple_inactive_desc:0 "Le hall des Forgerons de Balgar près de Forgelune est un lieu de grande industrie, où le clergé balgarique forge pour lui-même des instruments de dévotion que les fidèles peuvent ensuite emporter ou admirer. Ces modèles concentrent leurs propres efforts alors qu'ils entament leur période de dévotion au Bâtisseur et à Dôrum-Odir.\n\nCe lieu saint est actuellement §gInactif§! :\n£no£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
 skaldol_temple:0 "Temple de Skaldol"
 skaldol_temple_inactive:0 "Temple de Skaldol §g(Inactive)§!"
 skaldol_temple_desc:0 "Niché dans les vallées escarpées au pied des Montagnes du Repos-des-Titans, Skaldol a longtemps perduré comme site sacré pour les Gérudiens, trois fois reconstruit à différentes époques. Si les temps changent, du déclin des Géants de Givre dans les éons passés à la mort de Castanor lui-même, les montagnes et côtes de Gérudie subissent encore chaque année le courroux hivernal d'Elkaesal. C'est à Skaldol que tombent les premiers flocons et que fond la dernière neige. En chantant ces temps troubles et oubliés, le froid mordant de l'hiver peut être incité à geler les profanateurs potentiels de Skaldol, comme le démontra avec grande efficacité le Pilier-de-Glace de Torbjold fran Rosstavik.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion est §YFoi Skaldhyrrique§!"
