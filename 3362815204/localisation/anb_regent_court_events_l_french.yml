 temple_ara:0 "Temple d'Ara"
 temple_ara_inactive:0 "Temple d'Ara §g(Inactive)§!"
 temple_ara_desc:0 "Le temple dédié à Dame Chance se trouve ici ; l'épouse d'Adean et celle qui assuma le manteau divin laissé vacant quand Forsara renia toute fidélité à la fin de la Guerre des Dieux. Les Aranites se rassemblent de tout Cannor en pèlerinage pour tenter de toucher le socle porte-bonheur de sa statue.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
