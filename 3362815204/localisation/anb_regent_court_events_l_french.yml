 grand_begga:0 "Grand Temple de Begga"
 grand_begga_inactive:0 "Grand Temple de Begga §g(Inactive)§!"
 grand_begga_desc:0 "Le Grand Temple de Begga au Pic-des-Abeilles était à l'origine un temple d'Ara, et c'est dans sa vénération ici que le statut d'avatar de Begga commença à se manifester, après quoi Begga accéda à sa propre divinité au terme de sa vie mortelle.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
