 necropolis_minor:0 "Les Catacombes de la Nécropole"
 necropolis_minor_inactive:0 "Les Catacombes de la Nécropole §g(Inactive)§!"
 necropolis_minor_desc:0 "Les salles du Juge des Morts offrent réconfort à ceux qui viennent chercher de maigres réponses. Ceux qui visitent glanent rarement des vérités simples, mais ses Gardiens terrestres guident ceux qui errent sans leurs proches vers un chemin nouveau. Ainsi en va-t-il de la Nécropole.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
