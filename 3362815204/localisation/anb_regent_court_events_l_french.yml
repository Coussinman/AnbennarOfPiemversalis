 minara_bosom:0 "Temple du Sein de Minara"
 minara_bosom_inactive:0 "Temple du Sein de Minara §g(Inactive)§!"
 minara_bosom_desc:0 "Domaine principal de la théocratie du Temple Minaran, ce temple faillit être mis à sac lors de la Troisième Guerre Lilas et ne fut défendu que grâce aux liens d'amour charnel et de joie que les soldats avaient forgés durant les combats, canalisés pour défendre la sainteté de ce lieu.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
