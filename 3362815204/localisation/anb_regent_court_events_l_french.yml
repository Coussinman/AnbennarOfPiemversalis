 improve_relations_with_deity_followers_tt:0 "L'opinion de §Ychaque pays suivant cette divinité§! envers §Y[Root.GetName]§! a changé de §G+25§!."
 heeds_deity_advice:0 "La Cour écoute les conseils de notre Dieu"