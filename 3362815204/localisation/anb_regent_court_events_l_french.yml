 aldtempel:0 "Aldtempel"
 aldtempel_inactive:0 "Aldtempel §g(Inactive)§!"
 aldtempel_desc:0 "Aldtempel est un site abritant de nombreux temples anciens dédiés à des êtres tant divins que damnés, comme Agrados et prétendument Kazraiel, et c'est ainsi que l'un des sites les plus humbles et pourtant les plus sacro-saints de la Chasseresse est préservé à la surface de cette terre profane.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
