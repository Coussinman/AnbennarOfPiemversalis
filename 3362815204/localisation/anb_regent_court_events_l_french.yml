 mothers_sanctuary:0 "Sanctuaire de la Mère"
 mothers_sanctuary_inactive:0 "Sanctuaire de la Mère §g(Inactive)§!"
 mothers_sanctuary_desc:0 "Le Sanctuaire de la Mère, le plus grand temple dédié à Esmaryal dans tout Halann, est le siège du Clergé d'Esmaryal, bien connu et apprécié dans la cité pour ses nombreux actes de soutien aux futurs parents et aux nouveau-nés.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
