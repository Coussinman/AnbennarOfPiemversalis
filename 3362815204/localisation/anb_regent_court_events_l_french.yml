l_french:
 regent_court.1.t:0 "Un nouveau patron ?"
 regent_court.1.d:0 "Après des décennies de dévotion fidèle, notre [Root.Monarch.GetTitle] envisage de vénérer un autre membre de la Cour Régente. Si cela pourrait indubitablement apporter de grands bénéfices à notre nation, une telle décision aura forcément des conséquences parmi la population et le clergé."
 regent_court.1.a:0 "Nous continuerons à révérer notre Dieu."
 regent_court.1.b:0 "Peut-être est-il temps de changer."

 regent_court.2.t:0 "Faire notre choix."
 regent_court.2.d:0 "Notre [Root.Monarch.GetTitle] a convoqué une réunion des plus hauts dignitaires religieux de [Root.GetName] pour décider quel membre de la Cour Régente nous suivrons. Qui devrions-nous choisir ?\n\n§P(Il y a une barre de défilement pour les options ici, au passage)§!"
 regent_court.2.a:0 "Retour"
 regent_court.2.b:0 "Castellos, Chef de la Cour Régente"
 regent_court.2.c:0 "La Dame, Déesse du Savoir"
 regent_court.2.n:0 "Corin, Déesse de la Guerre"
 regent_court.2.e:0 "Adean, Dieu de la Chevalerie"
 regent_court.2.f:0 "Munas, Sauveur des Elfes"
 regent_court.2.g:0 "Ara, Déesse de la Chance et de la Fortune"
 regent_court.2.h:0 "Balgar le Bâtisseur"
 regent_court.2.i:0 "Esmaryal, Déesse du Foyer et de la Famille"
 regent_court.2.j:0 "Ryala, Déesse du Véritable Amour"
 regent_court.2.k:0 "Minara, Déesse de l'Amour (Charnel)"
 regent_court.2.l:0 "Falah, Déesse de la Chasse"
 regent_court.2.m:0 "Nerat, Juge des Morts"
 regent_court.2.o:0 "Nathalyne, Déesse des Ombres"
 regent_court.2.p:0 "Begga, Déesse de la Charité"
 regent_court.2.q:0 "Dookan, Dieu des Mercenaires"
 regent_court.2.r:0 "Le Père-Lumière, Seigneur de Tout"
 regent_court.2.s:0 "Wip, Dieu de la Comédie"

 cannorian_holy_sites:0 "Lieux saints cannoriens"
 pantheonway_temple:0 "La Voie du Panthéon"
 pantheonway_temple_inactive:0 "La Voie du Panthéon §g(Inactive)§!"
 pantheonway_temple_desc:0 "Un chemin bordé de nombreuses statues représentant les anciens précurseurs castanoriens des divinités de la Cour Régente ; Castellos, en tant que primus inter pares, occupe la place d'honneur. Les idéaux de la Cour dans son ensemble sont incarnés dans le sceptre de Castellos, et se ressentent le plus fortement ici. Une statue de Corin, Martyre d'Escann, est l'ajout le plus récent et se trouve à la droite de Castellos.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
