 highest_moon:0 "Temple de la Plus Haute Lune"
 highest_moon_inactive:0 "Temple de la Plus Haute Lune §g(Inactive)§!"
 highest_moon_desc:0 "Situé au sommet du Mont-de-la-Lune, le Temple de la Plus Haute Lune est un lieu de réflexion sur le savoir. Servant également de séminaire, une grande partie du clergé organisé de la Dame y forge des liens durables dans ses hautes salles en débattant de la nature du divin.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
