 adeanscour:0 "Adeanscour"
 adeanscour_inactive:0 "Adeanscour §g(Inactive)§!"
 adeanscour_desc:0 "Adeanscour est le plus ancien temple dédié à Adean au Lencenor, le centre principal de son culte, situé à Nouvelle-Adéa. Il fut le centre du culte lencori d'Adean jusqu'à la fondation de Hautecour et demeure la plus vénérable congrégation des fidèles du Bon Chevalier en existence continue.\n\nCe lieu saint est actuellement §YActif§! :\n£yes£Propriétaire de la province :\n   La religion n'est pas §YCour Infernale§!\n   L'une des conditions suivantes doit être vraie :\n      La religion est §YFoi Skaldhyrrique§!\n      Appartient au groupe religieux §YCannorien§!"
