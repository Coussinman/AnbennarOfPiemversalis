l_french:

 khet_civil_war.1.t:0 "La Défiance de Nirat"
 khet_civil_war.1.d:0 "Des années d'agitation ont finalement culminé en une révolte totale ! Le Grand Prêtre Nahab pense que notre dynastie n'est pas digne de gouverner Khétérata, et s'est converti au Nirakhétisme dans un manque de respect flagrant de nos traditions, emmenant d'autres sujets hérétiques mécontents avec lui. Les Ahati toujours opportunistes les ont également rejoints, espérant recevoir une plus grande influence sur la cour si leur rébellion réussit. Cela ne doit pas être toléré !"
 khet_civil_war.1.a:0 "Quelle insolence !"
 khet_civil_war.1.tooltip:0 "§TPour mettre fin à cette révolte nous devons contrôler §YNirat§! et avoir plus de §Y75 % de Score de Guerre§!§!"

 khet_civil_war.2.t:0 "La Marche des Fidèles"
 khet_civil_war.2.d:0 "La lignée des Crodamos a montré qu'ils valorisent leurs propres intérêts au-dessus de ceux de leur peuple, de leur pays, et pire que tout du Khétarque. Nous devons prendre les choses en main, en ralliant les fidèles pour les supplanter avec un dirigeant plus béni. Heureusement nous ne sommes pas seuls, car le Commandant Dajasht et ses compagnons Ahati ont choisi de soutenir notre juste cause. Ensemble nous marchons sur Khétérat, pour restaurer la foi !"
 khet_civil_war.2.a:0 "Au nom de Nirakhét !"
 khet_civil_war.2.tooltip:0 "§TPour gagner notre guerre nous devons contrôler §YKhétérat§! et avoir plus de §Y50 % de Score de Guerre§!§!"

 khet_civil_war.3.t:0 "Notre Opportunité Est Arrivée !"
 khet_civil_war.3.d:0 "Un petit soulèvement dans les terres centrales de Khétérata s'est transformé en une guerre à grande échelle car il semble que de grandes factions internes se massacrent mutuellement pour des différences minimes. Cela présente une belle opportunité pour nous de fondre sur eux pendant qu'ils sont faibles, et de saisir ce que nous pouvons pendant ce chaos ! Par mesure de précaution, nous pourrions demander à Viakkoc de nous assister dans cette entreprise en échange de droits de pillage et quelques sacrifices."
 khet_civil_war.3.a:0 "Appeler Viakkoc, poussons vers la côte !"
 khet_civil_war.3.b:0 "Nous les conquerrons seuls !"
 khet_civil_war.3.tooltip:0 "§TSi nous sommes capables d'occuper rapidement le littoral, nous obtiendrons des cœurs gratuits sur ces provinces§!"
 khet_civil_war.3.tooltip2:0 "§YViakkoc§! recevra du butin et des sacrifices en échange de leur aide"

 khet_civil_war.4.t:0 "Frappe Opportuniste"
 khet_civil_war.4.d:0 "Les Khétératans se battent actuellement entre eux, une opportunité dont Brrtekuh cherche à profiter. Ils ont demandé notre assistance pour piller le littoral, et nous ont offert une part modeste du butin potentiel si nous le faisons."
 khet_civil_war.4.a:0 "Nous prendrons d'assaut le Chagrin, ensemble !"
 khet_civil_war.4.b:0 "Ils devront se débrouiller seuls."
 khet_civil_war.4.tooltip:0 "§T§YBrrtekuh§! nous offre du butin et des sacrifices s'ils réussissent§!"

 khet_civil_war.5.t:0 "Chiens Déloyaux"
 khet_civil_war.5.d:0 "Dans notre moment de faiblesse, la meute gnoll de Brrtekuh a décidé d'essayer de s'emparer de notre littoral occidental. S'ils ne rencontrent aucune résistance, notre peuple sera voué à des destins pires que la mort."
 khet_civil_war.5.a:0 "Voyez ce que cette défiance a engendré ? Nous devons régler cela."
 khet_civil_war.5.tooltip:0 "§T§YBrrtekuh§! doit être empêché d'occuper le littoral§!"

 khet_civil_war.6.t:0 "La Défiance Vaincue"
 khet_civil_war.6.d:0 "La rébellion de Nirat a été anéantie par nos armées, et la paix intérieure a été restaurée. Cependant, la paix totale n'est pas encore atteinte. Il reste encore la question des pillards gnolls à notre ouest, et une fois qu'ils seront traités, il est presque certain que leurs congénères au sud et les elfes opportunistes à l'est tenteront tous deux de profiter de notre tourmente. Devant nous s'étendent des eaux tumultueuses, mais Elikhét nous a choisis sachant que nous pouvions guider notre peuple à travers elles."
 khet_civil_war.6.a:0 "La Maison de Crodamos triomphera !"
 khet_civil_war.6.tooltip:0 "§TLes gnolls opportunistes de Brrtekuh doivent être écrasés !§!"

 khet_civil_war.7.t:0 "La Rédemption de Khétérat"
 khet_civil_war.7.d:0 "Nous avons chassé les faux rois khétératans de la capitale, les envoyant en exil dans la campagne ! Le Grand Prêtre est entré à Khétérat suite aux nouvelles de notre succès et a promptement proclamé le Khétarque comme le vrai roi de Khétérata. Il sera désormais du devoir du Grand Prêtre de gérer les affaires tant religieuses que séculières sous la guidance des enseignements du Khétarque, afin que nous soyons toujours justement guidés par la parenté de Nirakhét.\n\nLes chances étaient contre nous, mais la foi de notre peuple en la Divine Mère a montré sa vérité, et nous pouvons maintenant commencer la purification des terres que ses larmes ont nourries pour nous."
 khet_civil_war.7.a:0 "La foi est triomphante !"
 khet_civil_war.7.b:0 "Gloire à Nirat !"

 khet_civil_war.10.t:0 "Les Larmes des Vaincus"
 khet_civil_war.10.d:0 "Avec leurs armées éparpillées, prendre la Côte des Larmes fut un exploit facile, mais pas moins satisfaisant. Nous avons augmenté notre base de pouvoir et avons beaucoup de butin pour le prouver !"
 khet_civil_war.10.a:0 "La Côte des Larmes est à nous !"
 khet_civil_war.10.tooltip:0 "§TMaintenant il est temps de donner à §YViakkoc§! leur part !§!"

 khet_civil_war.11.t:0 "Piller le Butin"
 khet_civil_war.11.d:0 "Brrtekuh a réussi dans son invasion, principalement grâce à notre aide bien sûr. Honorant leurs termes, ils nous ont fourni beaucoup de butin, de navires, et de sacrifices pour notre assistance."
 khet_civil_war.11.a:0 "Un arrangement profitable."


 khet_civil_war_no_ally:0 "Les alliances ne peuvent pas être conclues pendant la guerre civile !"
 khet_civil_war_no_peace:0 "Il n'y aura de paix que quand ils seront détruits !"