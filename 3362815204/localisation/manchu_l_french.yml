 # Mandate modifiers
 lost_control_of_beijing:1 "L'Empereur ne possède pas et ne contrôle pas Pékin"
 desc_lost_control_of_beijing:0 "C'est de mauvais augure pour notre revendication au Mandat du Ciel si nous ne pouvons pas tenir Pékin, l'une des principales villes de Chine."
 lost_control_of_nanjing:1 "L'Empereur ne possède pas et ne contrôle pas Nankin"
 desc_lost_control_of_nanjing:0 "C'est de mauvais augure pour notre revendication au Mandat du Ciel si nous ne pouvons pas tenir Nankin, l'une des principales villes de Chine."
 lost_control_of_canton:1 "L'Empereur ne possède pas et ne contrôle pas Canton"
 desc_lost_control_of_canton:0 "C'est de mauvais augure pour notre revendication au Mandat du Ciel si nous ne pouvons pas tenir Canton, l'une des principales villes de Chine."
 humane_personality:0 "Prudent"
 desc_humane_personality:0 "Ce souverain est Prudent. Béni d'un bon jugement, il a la confiance à la fois du peuple du Chagrin de la Mère et du khet."
 humane_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] sujets se souviendront de [Root.Monarch.GetHerHis] compassion et bienveillance avec affection."
 petty_personality:0 "Mesquin"
 desc_petty_personality:0 "Ce souverain est Mesquin. Même la plus triviale offense rouvrira l'indignation de ce souverain, et aucune possession aussi insignifiante soit-elle n'échappe à l'envie de ce souverain."
 petty_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] mesquinerie et envie n'ont apporté que du malheur à notre dynastie."
