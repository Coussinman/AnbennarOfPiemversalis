 # Modifier descs
 JAP_siberian_intervention_tt:0 "Chaque province possédée dans la Région §YSibérie Orientale§! obtient « §YBoom Sibérien§! » pour §Y10 ans§!, donnant les effets suivants :\nModificateur de Production Locale de Biens : §G+15,0%§!"
 desc_JAP_siberian_boom:0 "L'investissement en Sibérie a attiré un certain nombre de prospecteurs et d'aventuriers dans la région, stimulant la productivité."
 desc_JAP_gokaido_stations:0 "Les relais le long des routes les plus importantes du royaume facilitent non seulement les voyages, mais aident à imposer l'autorité centrale dans les régions périphériques."
 desc_JAP_sankin_kotai_modifier:1 "Accueillir un vaste public de seigneurs en constante évolution dans la capitale a rendu le gouvernement particulièrement apte à gérer de nombreuses questions diplomatiques à la fois."
 desc_JAP_social_hierarchy:0 "Dans notre royaume, chacun sait où est sa place."
 desc_JAP_indochinese_trade:0 "Les navires marchands dotés du Sceau Rouge du gouvernement bénéficient de protections et privilèges spéciaux, rendant le commerce beaucoup moins risqué pour eux."
 desc_JAP_trade_hegemon:0 "Notre commerce et notre industrie n'ont pas de second, et des représentants de nos plus grands intérêts mercantiles peuvent être trouvés n'importe où sur le globe."
 desc_JAP_cadastral_surveys:0 "L'arpentage de la campagne pour les propriétés non déclarées a révélé de nouvelles sources de revenus pour le gouvernement."
 desc_JAP_currency_regulations:0 "Des prêts sécurisés ont rendu plus facile que jamais le financement de nouveaux projets de construction à travers le pays."
 desc_JAP_sengoku_contender:1 "Parmi tous les royaumes en guerre, nous avons prouvé que nous sommes une puissance avec laquelle il faut compter, et notre force a été reconnue tant à l'intérieur qu'au-delà de notre domaine."
 #More Additions to Chinese Crises
 ming_crisis.9.t:0 "Intervention dans la Crise de la Dynastie [From.GetAdjective]"
 ming_crisis.9.d:0 "L'Empereur [From.GetAdjective] a perdu le contrôle du nord. Le seigneur de guerre paysan Li Zicheng a rassemblé une grande armée de rebelles et de bandits sous son commandement et pris le contrôle de [CSH.Capital.GetCapitalName], se proclamant Empereur de Chine. Ce moment de faiblesse [From.GetAdjective] présente une opportunité idéale pour nous de prendre le contrôle du nord de la Chine et, si tout va bien, et si nous jugeons bon de l'exercer, préparer le terrain pour notre propre revendication au Mandat du Ciel."
 ming_crisis.9.A:0 "Nous chevauchons vers la guerre !"
 ming_crisis.9.B:0 "Le temps n'est pas encore venu pour nous d'intervenir."
 empire_of_china_nomadic_border_events.3.t:0 "Craintes Nomades de [From.GetUsableNameCap]"
 empire_of_china_nomadic_border_events.3.d:0 "Il y a eu des murmures mécontents parmi les sujets du [From.Monarch.GetTitle] [From.GetAdjective] face à [From.Monarch.GetHerHis] incapacité à gérer la menace que nous représentons. Alors que notre pouvoir continue de croître, nous pouvons nous attendre à ce que ces murmures deviennent plus forts."
 empire_of_china_nomadic_border_events.3.opt:0 "Nous n'avons qu'à attendre leur effondrement."
 empire_of_china_nomadic_border_events.3.tooltip:0 "§Y[From.GetName]§! :\nA §R10%§! de progression vers le désastre §YFrontière Nomade Non Gardée§!."
 empire_of_china_nomadic_border_events.4.t:0 "Panique à [From.GetUsableName]"
 empire_of_china_nomadic_border_events.4.d:0 "Le [From.Monarch.GetTitle] [From.GetAdjective] fait face à une lutte sévère pour maintenir [From.Monarch.GetHerHis] autorité face aux craintes généralisées de la menace que nous représentons pour [From.GetUsableName]. Nos espions parmi eux s'attendent à ce que, très bientôt, le mécontentement éclate en révoltes ouvertes et un effondrement de l'autorité du [From.Monarch.GetTitle]... nous offrant l'opportunité idéale de saisir les richesses de la Chine pour nous-mêmes."
 empire_of_china_nomadic_border_events.4.opt.manchu:0 "Appelez les Bannières !"
 empire_of_china_nomadic_border_events.4.opt:0 "La Chine sera nôtre !"
 empire_of_china_nomadic_border_events.4.tooltip:0 "§Y[From.GetName]§! :\nA §R75%§! de progression vers le désastre §YFrontière Nomade Non Gardée§!."
 empire_of_china_nomadic_border_events.5.t:0 "Les Inquiétudes [emperor_of_china.GetAdjective] S'Apaisent"
 empire_of_china_nomadic_border_events.5.d:0 "Comme nous ne sommes plus considérés comme une menace pour [emperor_of_china.GetUsableName], leurs sujets sont à nouveau satisfaits de leur règne."
 empire_of_china_nomadic_border_events.5.d.disaster:0 "Les inquiétudes concernant notre menace ont été dépassées par d'autres menaces pour [emperor_of_china.GetUsableName], qui menacent la cohésion interne de l'État. C'est peut-être le moment pour nous de frapper !"
 empire_of_china_nomadic_border_events.5.opt:0 "Malheureux."
 #Shun Ideas
 CSH_ideas:0 "Idées des Grands Shun"
 CSH_ideas_start:0 "Traditions des Grands Shun"
 CSH_ideas_bonus:0 "Ambition des Grands Shun"
 shun_humble_beginnings:0 "Origines Humbles"
 shun_humble_beginnings_desc:0 "La dynastie Shun a commencé comme une rébellion contre l'autorité Ming, un soulèvement de fermiers et de paysans las d'être saignés à blanc par les collecteurs d'impôts de leurs suzerains. Notre peuple prendra volontiers les armes plutôt que d'être forcé à souffrir davantage de difficultés et de famine."
 shun_dashing_king:0 "Le Roi Audacieux"
 shun_dashing_king_desc:0 "Le chef des Shun a été surnommé le Roi Audacieux. En adoptant officiellement ce titre et en l'utilisant dans nos relations avec les dignitaires étrangers, nous pouvons renforcer notre réputation tant sur le plan intérieur qu'international."
 shun_hidden_treasury:0 "Trésor Caché"
 shun_hidden_treasury_desc:0 "Nous avons aboli l'ancien système de paiement des impôts sur le grain, permettant aux seigneurs ruraux Shun de garder plus de leurs revenus, avec lesquels ils peuvent payer leurs soldats pour combattre, leurs fermiers pour cultiver, et leurs diplomates pour les représenter à l'étranger. Cela signifie également qu'il y a de l'argent disponible si nous devons en emprunter."
 shun_obedient_to_heaven:0 "Obéissant au Ciel"
 shun_obedient_to_heaven_desc:0 "Le nom choisi pour notre dynastie signifie « obéissant au ciel ». Conformément à ce nom, nos troupes ont prêté serment de loyauté à notre souverain, qu'ils considèrent comme doté de capacités célestes. Ainsi, ils sont prêts à s'entraîner plus dur et à devenir plus disciplinés pour assurer une issue glorieuse à leurs batailles."
 shun_perfection_of_sieging:0 "Perfection de l'Art du Siège"
 shun_perfection_of_sieging_desc:0 "Nous avons trouvé de nouvelles façons d'utiliser la poudre à canon dans la guerre de siège et développé des méthodes efficaces pour escalader et briser les murs des forts. Avec ces méthodes, nous pouvons assiéger avec succès même les forts les plus solides, et capturer et contrôler facilement des provinces en temps de guerre."
 shun_from_sticks_to_guns:0 "Des Bâtons aux Fusils"
 shun_from_sticks_to_guns_desc:0 "Nos troupes ont été entraînées à l'usage d'armes de corps à corps et d'armes à distance. Compétents avec les bâtons, épées, couteaux, arcs et fusils, nos soldats peuvent remplir n'importe quel rôle que nous pourrions exiger d'eux. Leur polyvalence leur donne la capacité de dominer le champ de bataille."
 shun_claim_to_the_mandate:0 "Revendication au Mandat"
 shun_claim_to_the_mandate_desc:0 "Bien que notre dynastie ait émergé d'origines humbles, par notre force et notre justice nous avons gagné nobles et gens du commun à notre cause. Nous sommes maintenant considérés comme des prétendants dignes au Mandat du Ciel, une dynastie régnante légitime de la terre de Chine."
