 # Ming modifier
 desc_repaired_great_wall:0 "Nous entreprenons des réparations à la Grande Muraille qui devraient empêcher les incursions des barbares du nord."
 # Tumu Crisis
 flavor_oir.1.t:0 "La Crise de Tumu"
 flavor_oir.1.d:0 "Alors que le conflit avec les Oïrats dégénère en guerre ouverte, l'Empereur a pris la décision téméraire de mener personnellement les armées Ming. Malgré un manque de talent militaire et les avertissements de [Root.Monarch.GetHerHis] conseillers, l'Empereur est résolu dans [Root.Monarch.GetHerHis] décision de mener depuis le front."
 flavor_oir.1.a:0 "Mon Empereur, c'est imprudent !"
 flavor_oir.2.t:0 "La Capture de l'Empereur Ming"
 flavor_oir.2.d:0 "Dans un tournant surprenant des événements, nous avons découvert que l'Empereur Ming menait personnellement son armée au combat. [MNG.Monarch.GetSheHeCap] était un fou de nous affronter sur le champ de bataille ; nous avons fait un travail rapide de ses soldats pathétiques et indisciplinés et avons même réussi à capturer l'Empereur [MNG.Monarch.GetHerselfHimself].\n\nCela pourrait nous donner un grand avantage sur le gouvernement Ming, mais nous devons agir rapidement pour tirer parti de la situation. Nous devons nous hâter de capturer Pékin, où nous imposerons nos conditions."
 flavor_oir.2.a:0 "En avant vers Pékin !"
 oir_emperor_captured_tt:1 "§YNous occuperons la région de Chine du Nord si nous capturons Pékin avant que l'Empereur captif ne meure ou ne soit remplacé§!"
 flavor_oir.3.d:1 "Le désastre a frappé ! L'Empereur a été capturé au combat par les Oïrats à cause de sa sottise.\n\nNous devons empêcher nos ennemis de capturer Pékin, sinon nous n'aurons peut-être pas d'autre choix que d'accepter les demandes des barbares. Si l'Empereur reste en captivité trop longtemps cependant, il est probable qu'un autre membre de la famille [Root.Monarch.Dynasty.GetName] saisira le trône."
 flavor_oir.3.a:0 "Désastreux !"
 flavor_oir.4.t:0 "La Nomination d'un nouvel Empereur"
 flavor_oir.4.d:0 "Nous ne pouvons pas attendre éternellement que les barbares nous rendent l'Empereur. Le Mandat exige qu'un Empereur siège sur le Trône du Dragon, et il a donc été décrété que [Root.Heir.GetName] assumera immédiatement le titre."
 flavor_oir.4.d2:0 "Nous ne pouvons pas attendre éternellement que les barbares nous rendent l'Empereur. Le Mandat exige qu'un Empereur siège sur le Trône du Dragon, et il a donc été décrété qu'un membre des [Root.Monarch.Dynasty.GetName] prendra [Root.Monarch.GetHerHis] le trône."
 flavor_oir.4.a:0 "Puisse son jugement être meilleur que celui de son prédécesseur."
 flavor_oir.5.t:0 "La Capture de Pékin"
 flavor_oir.5.d:0 "Pékin est tombé ! Avec la capitale sous notre contrôle et l'Empereur lié en captivité, les Ming ne peuvent pas refuser nos demandes. Un message a été envoyé aux restes du gouvernement Ming exigeant leur capitulation immédiate."
 flavor_oir.5.a:0 "Nous n'accepterons que la reddition totale."
 ming_surrender_tt:0 "§YChaque province possédée et contrôlée par Ming dans la région de Chine du Nord deviendra occupée par [Root.GetName]§!"
 flavor_oir.6.t:0 "Capture de Pékin par les Oïrats"
 flavor_oir.6.d:0 "Les barbares Oïrats ont capturé Pékin. Il y a peu que nous puissions faire maintenant sinon nous rendre et accepter leurs demandes."
 flavor_oir.6.a:0 "Nous n'avons pas d'autre choix que d'accepter."
 flavor_oir.7.t:0 "L'Empereur Meurt en Captivité"
 flavor_oir.7.d:0 "Malgré nos meilleurs efforts, l'Empereur Ming est mort en notre garde. Nous avions espéré pouvoir l'utiliser comme levier pour imposer nos demandes, mais il semble que ce ne soit plus une possibilité."
 flavor_oir.7.a:0 "Nous avons perdu notre moyen de pression !"
 mng_militry_incompetence:0 "Incompétence Militaire"
 desc_mng_militry_incompetence:0 "L'Empereur a sottement décidé de mener les armées personnellement, malgré son manque de talent militaire."
 oir_captured_mng_emperor:0 "A capturé l'Empereur"
 desc_oir_captured_mng_emperor:0 "Notre souverain a capturé l'Empereur Ming. Tant qu'il vit, il inspirera nos armées à de grands exploits."
 # Misc
 warriors_do_not_read_books:0 "Les Guerriers ne lisent pas de Livres"
 desc_warriors_do_not_read_books:0 "Notre nation se consacre aux affaires militaires au détriment des avancées culturelles et administratives."
 IS_NOT_GETTING_EXPELLED_MINORITY:0 "Ne reçoit pas de minorités expulsées"
