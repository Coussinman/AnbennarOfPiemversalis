 flavor_oir.8.t:0 "Les Dzoungars"
 flavor_oir.8.d:1 "Avec la Confédération Oïrat brisée, beaucoup de ses tribus constituantes se sont séparées et ont formé de nouvelles identités. Le plus grand de ces groupes oïrats sont les Dzoungars, qui ont revendiqué une grande région au nord des montagnes Tian Shan comme leurs pâturages. Il n'est pas encore clair s'ils constituent une menace pour [Root.GetName]."
 flavor_oir.8.a:0 "Espérons qu'ils sont pacifiques."
