l_french:
 # New Manchu culture
 manchu_new:0 "Mandchou"
 manchu_culture_tt:0 "Toutes les provinces §YJurchen§! adopteront la culture §YMandchoue§!"
 changbai_mountain:0 "Mont Paektu"
 desc_changbai_mountain:0 "Le Mont Paektu est un lieu d'immense signification spirituelle tant pour les Jurchens que pour les Coréens. Figurant fortement dans les légendes traditionnelles des deux peuples, la Montagne est un lieu de beauté sublime."
 #Culture Shift
 sinicize_culture_title:0 "Siniciser notre Culture"
 sinicize_culture_desc:0 "Notre culture est notre plus grande fierté. Notre langue est unique en son genre, nos traditions et notre héritage sont les piliers de notre société.\nNéanmoins, nous ne pouvons nier l'influence que la langue et la culture chinoises ont eue sur nous au fil des décennies, maintenant plus que jamais. Bien que tout le monde ne sera pas d'accord avec cette décision, il pourrait être utile d'envisager de siniciser notre culture afin de créer une plus grande harmonie entre les [Root.Culture.GetName] et les Chinois sur nos terres."
 sinicize_culture_tt:2 "Chaque province §Y[Root.Culture.GetName]§!, qui n'est pas dans le Nouveau Monde ou en Océanie, est possédée par [Root.GetName] ou ses sujets."
 sinicize_culture_at:0 "Chaque province §Y[Root.Culture.GetGroupName]§!, qui n'est pas dans le Nouveau Monde ou en Océanie, est possédée par [Root.GetName] ou ses sujets."
 chinese_culture_group_dominates_in_country:0 "L'une des cultures chinoises est la §YCulture Dominante§! de [Root.GetName]."
 sinicize_culture_ct:0 "Toutes les provinces §Y[Root.Culture.GetName]§! seront adoptées dans le groupe culturel §YChinois§!."
 sinicize_mongols_ct:0 "Toutes les provinces §YMongoles§!, §YKorchin§!, §YKalkha§! et §YOïrat§! seront adoptées dans le groupe culturel §YChinois§!."
 vietnamese_new:1 "Sino-Vietnamien"
 korean_new:1 "Sino-Coréen"
 tibetan_new:1 "Sino-Tibétain"
 altaic_new:0 "Sino-Altaïque"
 zhuang_new:0 "Sino-Zhuang"
 # Manchu missions
 mch_great_wall_title:0 "Contourner la Grande Muraille"
 mch_great_wall_desc:0 "L'Empereur chinois croit sottement qu'un mur peut le protéger de ses ennemis. Un assaut direct serait risqué, mais il existe d'autres moyens de contourner un mur..."
 mch_eight_banners_title:0 "Les Huit Bannières"
 mch_eight_banners_desc:0 "Les parties de chasse traditionnelles jurchen nous ont bien servis dans les conflits contre nos rivaux, mais si nous souhaitons un jour conquérir un empire, nous devons réorganiser nos forces en régiments de Bannières disciplinés."
 mch_invade_joseon_title:0 "Envahir Joseon"
 mch_invade_joseon_desc:0 "La dynastie Joseon de Corée se considère fièrement comme subordonnée uniquement à l'Empereur de Pékin. Elle doit être amenée à accepter un nouveau suzerain."
 mch_khan_of_the_mongols_title:0 "Soumettre les Mongols"
 mch_khan_of_the_mongols_desc:0 "Pour accomplir nos objectifs impériaux, nous devrons bâtir une armée ; les Mongols orientaux sont des guerriers habiles et compléteraient parfaitement nos Porte-Bannières. Il est cependant peu probable qu'ils se soumettent à notre règne sans une démonstration de force."
 mch_mandate_of_heaven_title:0 "Le Mandat du Ciel"
 mch_mandate_of_heaven_desc:0 "Avec Pékin fermement sous notre contrôle, il est temps de revendiquer le Mandat du Ciel. Nous proclamerons une nouvelle dynastie en Chine qui durera mille ans !"
 mch_green_standard_army_title:0 "L'Armée de l'Étendard Vert"
 mch_green_standard_army_desc:0 "Les armées chinoises sont en désarroi, leurs généraux perdant rapidement confiance en leurs maîtres. Si nous pouvons contrôler suffisamment du nord de la Chine, ces généraux pourraient décider de passer de notre côté plutôt que de servir un Empereur condamné."
 mch_devastate_china_title:0 "Dévaster une Métropole"
 mch_devastate_china_desc:0 "De nombreuses villes chinoises refusent de se rendre à nos armées, nous forçant à de longs sièges qui ralentissent notre campagne. Nous devons faire un exemple de l'une des plus grandes villes de Chine pour leur montrer les conséquences de la défiance."
 mch_extinguish_ming_title:0 "Éteindre les Ming"
 mch_extinguish_ming_desc:0 "Tant qu'il restera un bastion de loyalisme Ming, notre règne sur la Chine ne sera jamais vraiment sécurisé. Nous devons éradiquer totalement les Ming."
 extinguish_ming_tt:0 "§Y[Root.GetName]§! obtient des cœurs sur toutes les provinces non possédées du sous-continent §YChine§!"
 mch_ten_great_campaigns_title:0 "Les Dix Grandes Campagnes"
 mch_ten_great_campaigns_desc:0 "Nous désirons dépasser les accomplissements de toutes les dynasties qui nous ont précédés. Les frontières des Qing doivent s'étendre vers l'Asie Intérieure et vers le Sud, régnant sur des peuples qui n'ont jamais connu de gouvernance depuis Pékin."
 mch_confucian_administration_title:0 "Administration Confucéenne"
 mch_confucian_administration_desc:0 "La bureaucratie impériale a été administrée par des élites de lettrés confucéens pendant des siècles. Nous ne pouvons tout simplement pas gouverner la Chine sans leur conformité. Nous devons restaurer et réorganiser la bureaucratie."
 mch_reform_the_censorate_title:0 "Réformer le Censorat"
 mch_reform_the_censorate_desc:0 "La corruption était répandue pendant les dernières années de la dynastie Ming. Le Censorat Qing doit être les yeux et les oreilles de l'Empereur, recherchant la corruption dans toute la Chine et exposant les fonctionnaires malhonnêtes."
 mch_establish_tributaries_title:0 "Établir des Tributaires"
 mch_establish_tributaries_desc:0 "Nous avons supplanté les Ming, et ainsi les nations du monde doivent nous reconnaître comme leurs nouveaux suzerains. Rétablir les tributaires impériaux sera une tâche difficile, et certains pourraient, sottement, être trop épris de leur indépendance nouvellement acquise pour se soumettre pacifiquement."
 mch_harmonious_empire_title:0 "Empire Harmonieux"
 mch_harmonious_empire_desc:0 "La Chine doit être complètement unie sous le règne Qing. Son peuple doit travailler harmonieusement sous notre sage administration, libre de conflits entre nations et croyances."
 mch_library_of_the_four_treasuries_title:0 "Bibliothèque des Quatre Trésors"
 mch_library_of_the_four_treasuries_desc:0 "Il est temps de compiler une histoire complète de la Chine, rassemblant des livres de tout le pays pour les copier dans nos nouvelles bibliothèques. Cela présentera également une opportunité de censurer les livres contenant des idées qui pourraient perturber l'harmonie du règne mandchou."
 mch_three_feudatories_title:0 "Les Trois Feudataires"
 mch_three_feudatories_desc:0 "Alors que notre campagne atteint le sud de la Chine, nous devons considérer s'il serait plus facile, au moins à court terme, de déléguer le gouvernement de la région aux gouverneurs Ming qui ont fait défection vers les Qing. Nous devons trouver un moyen d'exploiter la situation dans le sud."
 mch_revoke_the_feudatories_title:0 "Révoquer les Feudataires"
 mch_revoke_the_feudatories_desc:0 "Les gouverneurs régionaux du sud ne peuvent vraiment pas être dignes de confiance, et nos espions rapportent qu'ils conspirent secrètement pour renverser notre dynastie. Nous devons révoquer les privilèges que nous avons accordés au nom du pragmatisme afin de pouvoir gouverner directement le sud de la Chine."
 mch_annex_tibet_title:0 "Annexer le Tibet"
 mch_annex_tibet_desc:0 "Nos anciens rivaux de la steppe se sont établis au Tibet, dont les seigneurs doivent accepter notre suzeraineté. Il est temps d'intégrer le Tibet à l'Empire Céleste."
 mch_secure_inner_asia_title:0 "Sécuriser l'Asie Intérieure"
 mch_secure_inner_asia_desc:0 "L'Asie Intérieure a été une source perpétuelle de danger et d'anxiété pour les dirigeants de Chine. Bien que des expéditions aient été envoyées pour pacifier la région dans le passé, la Chine n'a jamais vraiment gouverné la région. Cela doit changer."
 mch_integrate_taiwan_title:0 "Intégrer Taïwan"
 mch_integrate_taiwan_desc:0 "Des loyalistes Ming, des pirates et des opportunistes européens pullulent sur la côte de Taïwan. L'île n'a jamais été intégrée à la Chine, la plupart la considérant comme un arrière-pays sauvage. Mais nous ne pouvons plus nier son importance stratégique entre les mains de nos ennemis."
 mch_burma_campaign_title:0 "La Campagne de Birmanie"
 mch_burma_campaign_desc:0 "Encore plus de loyalistes Ming ont fui vers les collines de Birmanie, cherchant refuge parmi les chefs Shan et Bamar. Nous devons leur montrer qu'il n'y a nulle part où se cacher de ceux qui détiennent légitimement le Mandat."
 mch_subjugate_dai_viet_title:0 "Soumettre le Dai Viet"
 mch_subjugate_dai_viet_desc:0 "Les seigneurs du Dai Viet se prennent pour des Empereurs à la chinoise, et émulent même la bureaucratie confucéenne. Malgré toutes leurs prétentions, ils ne sont rien de plus que des usurpateurs, et doivent être amenés à se soumettre au véritable Empereur."
 devastate_china_tooltip2:0 "Posséder n'importe quelle province dans les régions §YChine du Sud§! ou §YXinan§! avec au moins §Y25§! de développement"
 # Manchu mission modifiers
 mch_mountain_title:0 "Sanctuaires à la Montagne"
 mch_mountain_desc:0 "La Montagne Bukuri, également appelée Paektu par les Coréens, est le site d'origine sacré de notre peuple. Selon la légende, une jeune fille céleste résidant au lac de la montagne fut fécondée par un fruit laissé tomber par une pie. Son fils devint le premier chef jurchen. Nous devons honorer nos ancêtres en construisant des sanctuaires près de la Montagne."
 breached_great_wall:0 "A franchi la Grande Muraille"
 desc_breached_great_wall:0 "Nos armées ont franchi la Grande Muraille, permettant le libre passage entre nos terres natales et nos ennemis chinois."
 mch_treason_modifier:0 "Trahison à la Grande Muraille"
 desc_mch_treason_modifier:0 "Le général chargé de défendre la Grande Muraille contre les barbares du nord a honteusement abandonné son poste, permettant à des hordes de sauvages de se déchaîner en Chine."
 mukden_palace_modifier:0 "Le Palais de Moukden"
 desc_mukden_palace_modifier:0 "Le Palais de Moukden témoigne de nos ambitions impériales. Nous gouvernerons à la manière chinoise, mais nous n'oublierons pas nos coutumes mandchoues."
 mukden_palace_modifier_fallback:0 "Le Palais de Moukden"
 desc_mukden_palace_modifier_fallback:0 "Le Palais de Moukden témoigne de nos ambitions impériales. Nous gouvernerons à la manière chinoise, mais nous n'oublierons pas nos coutumes mandchoues."
 terrified_china:0 "Un Exemple Cruel"
 desc_terrified_china:0 "Nous avons cruellement mis à sac l'une des plus grandes villes de Chine. Les récits de cette terrible ruine répandent le désespoir dans les rangs de nos ennemis. Seuls les vrais fous ne se rendront pas maintenant."
 confucian_administration:0 "Administration Confucéenne"
 desc_confucian_administration:0 "Nous avons adopté le style de bureaucratie confucéenne, dans lequel les fonctionnaires chinois sont sélectionnés par une étude méticuleuse des Classiques pour administrer l'Empire."
 confucian_administration_fallback:0 "Administration Confucéenne"
 desc_confucian_administration_fallback:0 "Nous avons adopté le style de bureaucratie confucéenne, dans lequel les fonctionnaires chinois sont sélectionnés par une étude méticuleuse des Classiques pour administrer l'Empire."
 qing_censorate:0 "Censorat Qing"
 desc_qing_censorate:0 "Nous avons résolu que le Censorat Qing sera plus vertueux et plus minutieux que celui des Ming vaincus."
 the_sacred_edict:0 "L'Édit Sacré"
 desc_the_sacred_edict:0 "L'Empereur souhaite une Chine stable et harmonieuse unie sous les principes confucéens. Deux fois par mois dans chaque village, seize maximes de moralité confucéenne doivent être récitées dans la langue locale de la population."
 mch_sacred_mountain:0 "Sanctuaires à la Montagne Sacrée"
 desc_mch_sacred_mountain:0 "Nous avons établi des sanctuaires à la Montagne Bukuri, le site d'origine sacré du peuple jurchen."
 mch_korean_subjugation:0 "La Soumission de la Corée"
 desc_mch_korean_subjugation:0 "Nous avons finalement soumis le royaume Joseon et le peuple coréen."
 library_of_the_four_treasuries:0 "Bibliothèque des Quatre Trésors"
 desc_library_of_the_four_treasuries:1 "L'histoire complète de la Chine a été rassemblée dans nos archives, tout matériel hostile aux Qing étant exclu pour éviter la propagation de la dissidence."
 inner_asian_trade:0 "Commerce d'Asie Intérieure"
 desc_inner_asian_trade:0 "Avec l'Asie Intérieure enfin soumise, le commerce peut à nouveau prospérer dans la région."
 mch_combat_modifier:0 "Bannières de Chasse"
 desc_mch_combat_modifier:1 "Envoyer des parties de chasse organisées autour d'unités de « bannière » est un excellent entraînement pour les tactiques de combat jurchen."
 # Tungning tag
 FRM:0 "Tungning"
 FRM_ADJ:0 "Taïwanais"
 # Manchu mission events
 mch_missions.1.t:0 "Trahison à la Grande Muraille"
 mch_missions.1.d:0 "Peu ont désormais confiance en l'État Ming. Même ses généraux se demandent à voix haute s'il ne serait pas prudent de passer du côté des envahisseurs [Root.GetAdjective]. L'homme chargé de défendre la Passe de Shanhai est Wu Sangui, un commandant talentueux et ambitieux qui a affronté les armées [Root.Culture.GetName] au combat auparavant avec un certain succès. Les événements récents dans la capitale et au-delà ont ébranlé sa loyauté envers le [MNG.Monarch.GetTitle] Ming, et maintenant il cherche une alliance improbable avec ses anciens ennemis. Promis titres et postes sous le nouvel ordre, Wu Sangui a accepté de passer du côté de [Root.GetName]. Nous pouvons marcher en sécurité à travers la Passe de Shanhai et vers un Pékin affaibli."
 mch_missions.1.d2:0 "Wu Sangui, un ancien général de la dynastie Ming, garde diligemment la Passe de Shanhai malgré l'effondrement de l'État. Des envoyés de plus en plus désespérés de [Root.Monarch.GetName] et du [726.Owner.Monarch.GetTitle] de [726.Owner.GetName] ont essayé de convaincre Wu et son armée de prendre parti dans la guerre.\n\nLe [726.Owner.Monarch.GetTitle] a eu recours à un acte de coercition lâche ; menaçant la vie du père de Wu Sangui s'il ne se soumet pas au règne de [726.Owner.GetName]. Plutôt que de se soumettre aux prétendants de [726.Owner.GetName], Wu est devenu furieux et a juré loyauté à [Root.GetName] par défi. Les portes de la Passe de Shanhai nous sont ouvertes. L'ordre a été donné de marcher sur Pékin."
 mch_missions.1.a:0 "Wu a choisi sagement."
 mch_missions.3.t:0 "L'Armée de l'Étendard Vert"
 mch_missions.3.d:0 "La désertion et la défection sont répandues en Chine. Il est clair que les Ming ont perdu leur Mandat sacré, et qu'un nouveau pouvoir se lève pour prendre sa place. Des milliers de soldats Ming sous-payés et mécontents ont juré loyauté à [Root.GetName] dans l'espoir que nous puissions avec le temps apporter paix, stabilité et, finalement, paiement. Nous avons organisé ces transfuges dans l'Armée de l'Étendard Vert. Nous nous attendons à ce qu'ils soient habiles à combattre leurs anciens compatriotes."
 mch_missions.3.a:0 "Ils sont mieux à notre service."
 mch_missions.4.d:0 "Dans le sillage de l'effondrement imminent de notre nation, des déserteurs affluent pour passer du côté de nos ennemis [From.GetAdjective]. Ils ont organisé ces déserteurs dans l'Armée de l'Étendard Vert, et nous nous attendons à les rencontrer sur le champ de bataille sous peu."
 mch_missions.4.a:0 "Traîtres !"
 mch_missions.5.t:0 "Koxinga fuit vers Taïwan"
 mch_missions.5.d:0 "Au cours de l'effondrement de notre nation, nous avons perdu la plupart de nos ports et donc le contrôle de ce qui reste de notre marine. Prétendant être un loyaliste Ming, un général connu sous le nom de Koxinga a réquisitionné plusieurs navires et fui vers Taïwan. Le gouvernement Ming a historiquement pris peu d'intérêt pour l'île, la considérant comme un arrière-pays largement insignifiant. Koxinga cependant voit du potentiel dans l'île, et vise à l'utiliser comme base d'où reprendre éventuellement le continent."
 mch_missions.5.a:0 "Lâche !"
 mch_missions.5.b:0 "Une vie sur cette île serait agréable cependant..."
 # Ming disaster
 ming_crisis:0 "Crise de la Dynastie Ming"
 ming_crisis_desc:0 "La dynastie Ming s'effondre à cause de conflits internes. Ils risquent de perdre le Mandat."
 ming_crisis.1.t:0 "Crise de la Dynastie Ming"
 ming_crisis.1.d:0 "Les Grands Ming font face à une terrible crise. La famille [Root.Monarch.Dynasty.GetName] a échoué à gouverner conformément au Mandat du Ciel, et a perdu les bénédictions et la bonne renommée que le Mandat confère. La mauvaise gestion et les conflits sont répandus en Chine et le mécontentement se propage rapidement parmi le peuple ; déjà de grandes masses se sont soulevées en révolte. Nous devons penser à nos ancêtres et nous efforcer de cultiver la vertu, car le grand Mandat n'est pas facile à garder."
 ming_crisis.1.a:0 "Puisse le Mandat ne pas finir avec nous."
 ming_crisis.2.t:0 "Le Mandat Restauré"
 ming_crisis.2.d:0 "Nous avons regagné la confiance du peuple ; il n'y a plus personne qui doute de notre droit à détenir le Mandat du Ciel. Nous devons réfléchir aux méfaits qui nous ont conduits à la crise et nous modeler sur les Rois Sages d'autrefois pour éviter de répéter nos erreurs."
 ming_crisis.2.a:0 "Nul ne nous questionnera plus."
 ming_crisis.3.t:0 "La Rébellion de Li Zicheng et la Dynastie Shun"
 ming_crisis.3.d:0 "Nous avons perdu le contrôle du nord. Le seigneur de guerre paysan Li Zicheng a consolidé une grande armée de rebelles et de bandits sous son commandement et s'est emparé du contrôle d'une portion alarmante de l'Empire. Li s'est proclamé Empereur et a revendiqué le Mandat du Ciel. Dans une proclamation depuis la capitale, Li annonce le début de la dynastie Shun et s'engage à restaurer les rituels traditionnels et à gouverner conformément au Ciel."
 ming_crisis.3.a:0 "Tuez ce rebelle !"
 ming_crisis.3.b:0 "Je souhaiterais vraiment être à [CSH.GetName] en ce moment..."
 ming_crisis.4.t:0 "Protectorat du Yunnan"
 ming_crisis.4.d:1 "Il a toujours été difficile de gouverner les peuples disparates des provinces du sud-ouest, mais jamais plus qu'en ce temps de crise. Les rebelles ont commencé à se consolider sous le seigneur de guerre [CDL.Monarch.GetName], qui exige que l'État [Root.GetAdjective] le reconnaisse comme Protecteur du Yunnan. Nous risquons de perdre entièrement le contrôle de la région si nous ne prenons pas de mesures drastiques."
 ming_crisis.4.a:0 "Établir un Protectorat"
 ming_crisis.4.b:1 "Le grand [Root.GetName] ne sera pas fracturé !"
 ming_crisis.4.c:0 "[CDL.GetName] doit être très agréable en cette période..."
 ming_crisis.5.t:0 "Perte du Contrôle du Sud"
 ming_crisis.5.d:1 "Le sud de la Chine est dans le chaos. Des essaims de rebelles et de bandits ravagent la campagne et contrôlent même plusieurs villes d'importance vitale pour l'État. Comme l'État [Root.GetAdjective] a échoué à gérer cette crise, les gouverneurs locaux ont pris les choses en main. Ils ont levé des armées pour combattre les rebelles, mais ils refusent de recevoir des ordres de nos généraux. Nos messagers rapportent qu'ils ont l'intention de continuer à administrer leurs États feudataires même après la fin de la crise. Leur permettre de gouverner si autonomement créera un dangereux précédent, mais nous ne sommes guère en position de défier ces seigneurs."
 ming_crisis.5.a:0 "Nommer des gouverneurs autonomes."
 ming_crisis.5.b:1 "Le grand [Root.GetName] ne sera pas fracturé !"
 ming_crisis.5.c:0 "[YUE.GetName] est un excellent royaume où être..."
 ming_crisis.5.e:0 "Je pense que je vais commencer une nouvelle vie à [WUU.GetName]..."
 ming_crisis.6.t:0 "Des Paysans Chinois se Révoltent à [ming_disaster_rebel_province.GetAreaName]"
 ming_crisis.6.d:1 "Les paysans de [ming_disaster_rebel_province.GetAreaName] se sont soulevés en révolte après des décennies de mauvaise gestion et de négligence de la part de l'État [Root.GetAdjective]. Si leur rébellion se propage trop loin, elle pourrait déclencher une crise encore plus grande, nous devons donc soit répondre immédiatement à leurs préoccupations, soit les affronter promptement au combat."
 ming_crisis.6.a:0 "Cette rébellion sera écrasée."
 ming_crisis.6.b:0 "Céder à leurs demandes."
 # Mongol Missions
 mongols_restore_the_khanate_title:0 "Revendiquer le Khanat"
 mongols_restore_the_khanate_desc:0 "Nous devons rétablir le Khanat Mongol à l'ancienne capitale de Qaraqorum. De là, nous convoquerons un Kurultai et exigerons que toutes les tribus reconnaissent notre autorité."
 mongols_unite_the_mongols_title:0 "Unir les Mongols"
 mongols_unite_the_mongols_desc:0 "Sous Gengis Khan, le peuple mongol était uni sous une seule Horde et un seul dirigeant. Nous devons rassembler des partisans de toutes les tribus et restaurer une identité mongole partagée."
 mongols_restore_yuan_title:0 "Reforger le Grand Yuan"
 mongols_restore_yuan_desc:0 "Nous avons été chassés de Chine par les rebelles Ming, et avons perdu le Mandat du Ciel. Nous devons reforger l'empire de Kubilai Khan et reprendre le Mandat !"
 mongols_reconquer_china_title:0 "Restaurer le Règne sur la Chine"
 mongols_reconquer_china_desc:0 "Sous la dynastie Yuan, les Mongols ont gouverné toute la Chine. Nous devons viser ce même objectif."
 mongols_subjugate_korea_title:0 "Soumettre la Corée"
 mongols_subjugate_korea_desc:0 "Möngke Khan a forcé les Coréens à se soumettre au règne mongol. Ils ont depuis cessé de s'incliner devant nous, et doivent être rappelés à leurs véritables maîtres."
 mongols_invade_japan_title:0 "Détruire le Shogunat"
 mongols_invade_japan_desc:0 "Même les grands généraux de l'ancien Khanat ont échoué à conquérir le Japon. Quand nos flottes mettront les voiles depuis l'ouest, aucun vent divin ne nous empêchera d'accomplir notre destin !"
 mongols_annex_tibet_title:0 "Annexer le Tibet"
 mongols_annex_tibet_desc:0 "De nombreux Mongols ont commencé à adopter la foi bouddhiste tibétaine. Nous devrions conquérir le Tibet pour nous assurer que cette foi est fermement sous le contrôle du Khanat."
 oir_tumu_crisis_title:0 "La Crise de Tumu"
 oir_tumu_crisis_desc:0 "Les Ming sont faibles et mûrs pour une invasion. Nous devons rassembler nos armées et les vaincre sur le champ de bataille avant qu'ils n'aient le temps d'organiser correctement leurs forces."
 mongols_central_asia_title:0 "Restaurer le Règne sur la Steppe"
 mongols_central_asia_desc:0 "La Steppe est devenue un lieu indiscipliné depuis l'effondrement du Khanat Mongol. Nous devons soumettre son peuple à notre règne et restaurer l'ordre."
 mongols_persia_title:0 "Restaurer l'Ilkhanat"
 mongols_persia_desc:0 "Le temps est venu de conquérir la Perse, comme notre grand ancêtre l'a fait il y a longtemps. Mais qui la gouvernera quand la bataille sera gagnée ?"
 mongols_anatolia_title:0 "Envahir la Syrie et l'Anatolie"
 mongols_anatolia_desc:0 "Nous devons continuer notre campagne vers l'ouest, faisant des incursions en Syrie et en Anatolie. Nous ne pouvons pas permettre aux Turcs de défier notre règne !"
 mongols_religion_mission_title:0 "Sécuriser la Foi"
 mongols_religion_mission_desc:0 "Que nous embrassions une nouvelle foi ou renforcions nos traditions anciennes, le peuple mongol doit atteindre l'harmonie religieuse."
 mongols_tatars_title:0 "Soumettre les Tatars"
 mongols_tatars_desc:0 "C'était clairement une erreur de permettre à la soi-disant Horde d'Or de gouverner de manière autonome. Avec leur Khanat brisé, c'est à nous de réunir les Tatars et de les ramener dans le giron."
 mongols_yam_title:0 "Restaurer le Yam"
 mongols_yam_desc:0 "Gengis Khan a établi un système de relais, de réseaux d'approvisionnement et de collecte de renseignements à employer à travers l'Empire Mongol pour faciliter le gouvernement d'un empire s'étendant sur des milliers de kilomètres. Nous devrions restaurer le Yam pour que nos armées et envoyés puissent voyager efficacement à travers le royaume."
 mongols_pax_mongolica_title:0 "Pax Mongolica"
 mongols_pax_mongolica_desc:0 "On dit que sous le règne des grands Khans du passé, une femme pouvait marcher d'un bout de l'Empire à l'autre avec une pépite d'or sur la tête et voyager sans crainte. Nous restaurerons cette paix à travers nos terres."
 mongols_russia_title:0 "Vaincre les Rus"
 mongols_russia_desc:0 "Les Rus nous ont défiés quand nous avons d'abord exigé leur obéissance. Espérons qu'ils ont appris leur leçon après la dévastation que nous avons infligée à leurs terres, sinon nous serons forcés de répéter la violence du passé."
 tumu_crisis_complete_tt:0 "A forcé la reddition de §YMing§! pendant la §YCrise de Tumu§!, ou possède §YPékin§! comme province cœur."
 # Mongol Mission Modifiers
 tibetan_missionaries:0 "Moines Tibétains"
 desc_tibetan_missionaries:0 "Nous avons envoyé des moines du Tibet pour répandre la foi bouddhiste à travers notre domaine."
 mongol_rule_tibet:0 "Conquête du Tibet"
 desc_mongol_rule_tibet:0 "Nous avons rejeté l'offre du Dalaï Lama et avons choisi de gouverner le Tibet par la force."
 mongol_religion_unity:0 "Unis dans la Foi"
 desc_mongol_religion_unity:0 "Le peuple mongol a surmonté ses différences religieuses."
 mongol_fleet_modifier:0 "Construction de la Flotte Mongole"
 desc_mongol_fleet_modifier:0 "Aucun vent divin ne déjouera nos plans cette fois. Le Shogunat doit tomber !"
 mongol_defeated_japan:0 "A détruit le Shogunat"
 desc_mongol_defeated_japan:0 "Nous avons mis à sac Kyoto, le siège du Shogunat, et ainsi accompli ce que nos ancêtres n'ont jamais pu faire."
 pax_mongolica:0 "Pax Mongolica"
 desc_pax_mongolica:0 "Une femme peut marcher d'un bout de l'empire à l'autre avec une pépite d'or sur la tête et être assurée qu'elle voyage en sécurité."
 mongol_european_conquest:0 "L'Invasion de l'Europe"
 desc_mongol_european_conquest:0 "Avec les Rus vaincus, la porte de l'Europe est ouverte. Ils connaîtront à nouveau la terreur des hordes mongoles !"
 mongol_kurultai:0 "Kurultai Annuel"
 desc_mongol_kurultai:0 "Un grand Kurultai sera organisé ici annuellement, où toutes les tribus doivent jurer loyauté à notre Khan."
 mongol_kurultai_tooltip:0 "Active le modificateur déclenché §YKurultai Annuel§! à §YQaraqorum§!"
 reorganized_mongols:0 "Réorganisation des Tribus Mongoles"
 desc_reorganized_mongols:0 "Nous avons organisé les tribus mongoles en unités distinctes avec des frontières territoriales bien définies. Malgré nos différences, nous avons mis fin aux querelles internes."
 genghis_khan_reborn:0 "Gengis Khan Réincarné"
 desc_genghis_khan_reborn:0 "Le Dalaï Lama a proclamé que notre souverain est Gengis Khan réincarné."
 # Mongol Mission Events
 mch_missions.6.t:1 "Le [Root.Monarch.GetTitle] et le Dalaï Lama"
 mch_missions.6.d:1 "[Root.Monarch.GetName], Khan des Mongols, était sceptique quant à la valeur de rencontrer un moine frêle et chauve. Sans doute ce Dalaï Lama s'accroche-t-il simplement aux derniers vestiges de son pouvoir brisé. Avec le Tibet maintenant sous le règne [Root.GetAdjective], il n'y avait pas vraiment besoin de négocier avec l'ancien ordre. Pourtant, de nombreux chefs parmi les Mongols avaient embrassé la foi bouddhiste et se tournaient vers le Lama pour guidance spirituelle, et ainsi le [Root.Monarch.GetTitle] fut contraint d'assister.\n\nÀ la grande surprise du [Root.Monarch.GetTitle], le Dalaï Lama a fait une offre vraiment intéressante. Si nous devions proclamer le Bouddhisme Tibétain comme la nouvelle foi de tout le peuple mongol, le Dalaï Lama révélerait en retour au monde que [Root.Monarch.GetName] est Gengis Khan réincarné. La légitimité que cela procurerait au [Root.Monarch.GetTitle] serait immense, pourtant tous n'accepteraient pas facilement cette nouvelle foi."
 mch_missions.6.a:0 "Accepter la coopération avec le Dalaï Lama."
 mch_missions.6.b:0 "Nous n'écouterons pas ces absurdités superstitieuses."
 mongol_tibetan_rulership_tt:1 "Toutes les provinces possédées dans la région §YTibet§! avec la religion §YVajrayana§! obtiennent le modificateur §YConquête du Tibet§! pour §Y20 ans§!, donnant les effets suivants :\nAutonomie Locale : §G-0,05§!\nAgitation Locale : §G-3§!"
 mch_missions.7.t:0 "Réunifier les Mongols"
 mch_missions.7.d:0 "Depuis la chute du grand Empire Mongol, il y a eu de nombreuses tentatives pour réunifier le peuple mongol. Aucune n'a réussi plus qu'un bref instant. Comme beaucoup avant nous, nous avons assemblé une horde avec des guerriers et des chefs de chaque tribu, mais cette unité sera probablement temporaire à moins que nous ne visions une plus grande unité. Nous pourrions, comme Gengis Khan l'a fait, proclamer que tous les Mongols sont un seul peuple, avec toute division entre eux rendue obsolète. Alternativement, nous pourrions réorganiser les tribus, reconnaissant leur caractère distinctif mais définissant clairement leurs droits et territoires."
 mch_missions.7.a:0 "Nous sommes tous des Mongols."
 mch_missions.7.b:0 "Les tribus doivent être réorganisées."
 unite_mongol_culture_tt:1 "Toutes les provinces possédées avec la culture §YKorchin§!, §YKhalka§! ou §YOïrat§! changeront pour la culture §YMongole§!"
 # Wokou Pirates
 SOO:0 "So"
 SOO_ADJ:0 "So"
 pirates.21.t:0 "Retour à l'Ère Wakou"
 pirates.21.d:0 "Après l'invasion coréenne de Tsushima en 1419, le clan So a signé le Traité de Gyehae dans lequel le commerce avec la Corée a été légitimé en échange de la cessation de la piraterie. En contrôlant le commerce japonais-coréen, le clan So a profité d'énormes profits et est devenu très respecté dans le Shogunat comme spécialistes de la diplomatie coréenne.\n\nAvec le Shogunat affaibli, certains suggèrent maintenant que le clan devrait revenir à l'ancienne tradition de la piraterie. Le chef des pirates insurgés prétend être la réincarnation du pirate légendaire Akibatsu Matsura, qui a mené une flotte de 500 navires pour piller la côte coréenne."
 pirates.21.a:0 "Une vie de pirate pour moi !"
 pirates.21.b:0 "Nous sommes des marchands et des diplomates, pas des pirates."
 SOO_ideas:0 "Idées So"
 SOO_ideas_start:0 "Traditions So"
 SOO_ideas_bonus:0 "Ambition So"
 soo_wakan:0 "Wakan"
 soo_wakan_desc:0 "Les Wakan, les établissements japonais dans la partie la plus méridionale de la péninsule coréenne, sont les seules portes officielles reconnues par le gouvernement. Si nous arrivons à les contrôler en protégeant les colons, nous pouvons monopoliser le commerce coréen."
 soo_tradition_of_wakou:0 "Tradition Wakou"
 soo_tradition_of_wakou_desc:0 "Bien que nous apprécions le commerce légal et pacifique sous certificat officiel, nous devons nous préparer à une pire situation avec des tensions militaires. Heureusement, notre tradition de piraterie pourrait nous aider à résoudre les problèmes par la force."
 soo_fight_for_tsushima:0 "Combattre pour Tsushima"
 soo_fight_for_tsushima_desc:0 "Situés entre le continent asiatique et les îles japonaises, notre patrie Tsushima et sa zone maritime sont le lieu où les pays s'affrontent et combattent durement. Que nos flottes soient fortes, afin que nous puissions non seulement défendre notre pays, mais aussi l'étendre !"
 soo_bahan_ship:0 "Navire Bahan"
 soo_bahan_ship_desc:0 "Nos navires corsaires, appelés Bahan, sont craints en arborant le drapeau de Hachiman. Personne n'interceptera notre flotte protégée par ce dieu de la guerre !"
 soo_tough_negotiator:0 "Négociateurs Tenaces"
 soo_tough_negotiator_desc:0 "Nous sommes un creuset de différentes cultures, et connaissons la difficulté des négociations entre différents peuples. Même dans une guerre dure et apparemment sans fin, nous devons essayer de trouver des solutions diplomatiques."
 soo_port_improvement:0 "Entretien des Ports"
 soo_port_improvement_desc:0 "Nous sommes des marchands dans des pays étrangers, mais il est maintenant temps de considérer les opportunités d'expansion outre-mer. Améliorons nos ports afin de pouvoir construire une flotte militaire de taille."
 soo_elementary_school:0 "École Élémentaire"
 soo_elementary_school_desc:0 "Les écoles élémentaires sont importantes pour l'éducation de base des enfants. Ils sont la prochaine génération et doivent amener notre pays dans une nouvelle ère."
