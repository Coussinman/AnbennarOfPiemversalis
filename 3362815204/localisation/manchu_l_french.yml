 string_start_korea:1 "Le §YRoyaume Joseon de Corée§!, officiellement le §YRoyaume du Grand Joseon§!, a émergé des cendres des invasions §YMongoles§! et §YMing§! via un coup d'État par le Général §YYi Seonggye§! (connu plus tard sous le nom de §YRoi Taejo§!) en 1392. Dès le départ, le lien de la Corée Joseon avec la §YChine Ming§! était fort : Lors du choix d'un nom pour le nouveau royaume, Taejo a soumis les options « Hwaryeong » et « Joseon » aux Ming et a décidé le second après son approbation par l'Empereur.\n\nCe lien étroit avec la §YChine Ming§! devait rester jusqu'à la chute des Ming au milieu du XVIIe siècle, tout comme le statut subordonné de la Corée dans cette relation. En tant qu'adeptes du §YConfucianisme§!, les Coréens voyaient la Chine comme étant au cœur du monde coréen, et la Corée Joseon est devenue à certains égards encore plus sinicisée que la Chine elle-même, une « petite Chine ». De leur côté, les Chinois voyaient la Corée Joseon comme le « pays du peuple courtois de l'Est ». Tant que les Ming restent les prétendants incontestés au §YMandat du Ciel§!, le maintien de ces liens forts restera vital pour la survie du jeune royaume coréen.\n\nLes accomplissements du premier siècle du règne §YJoseon§! furent considérables. Au début du XVe siècle, les régions frontalières de §YGyeongseong§! et §YYukjin§! furent prises aux §YJurchens§!, permettant aux Coréens d'unifier le territoire qui formerait la Corée moderne. Il y eut aussi un épanouissement de l'académie et du savoir. En particulier, l'alphabet hangeul fut introduit en 1446. Contrairement à l'alphabet chinois, il fut conçu pour être à la fois facile à apprendre et facile à adapter à la langue coréenne, rendant son usage bien plus pratique et permettant à une section bien plus large de la société de lire les textes savants. D'autres progrès notables furent faits dans les domaines de l'agriculture, de la poudre à canon et de la codification de la loi, et des efforts majeurs furent faits pour étudier et enregistrer la géographie du pays.\n\nCependant, des menaces pour le royaume coréen demeurent tant à l'intérieur qu'au-delà de ses frontières. Au pays, les paysans de Corée restent pauvres, et les §Ysoulèvements paysans§! ainsi que des recettes fiscales insuffisantes risquent de devenir un problème si rien n'est fait pour rectifier la situation. De plus, bien que la classe supérieure des §Yélites yangban§! ait été pour la plupart unie, les fissures dans cette façade commencent déjà à apparaître et pourraient éclater en §Yquerelles factionnelles§! à tout moment.\n\nSur le front étranger se trouvent des menaces en abondance. Au nord attendent les belliqueux §YJurchens§!, bien que présentement divisés, s'ils venaient à être unifiés sous un chef fort, une invasion de la Corée pourrait suivre rapidement. De même, de l'autre côté de la mer à l'est se trouve le §YJapon§!, une nation de §Ydaimyos§! en guerre et de §Yshoguns§! potentiels. La Corée doit être vigilante, de peur qu'un Japon uni ne cherche à étendre son pouvoir à travers l'étroit détroit de la Mer de Corée. Enfin, bien que la Corée se prélasse dans l'ombre de l'§YEmpire Ming§!, malheur au prince Joseon qui réveille le dragon !"
 string_start_jurchens:2 "Les Han connaissent bien les dangers de permettre aux §YJurchens§! de s'unir. Au XIIe siècle, le seigneur de guerre jurchen §YAguda§! a uni les Jurchens en rébellion contre les §YLiao§!, fondant l'État de §YJin§! et se couronnant §YEmpereur Taizu§!. La dynastie §YMing§! souhaite éviter un autre soulèvement jurchen, et prend des mesures pour s'assurer qu'ils continuent à se battre entre eux sans qu'aucune faction ne devienne trop puissante. À cette fin, les Ming ont établi une suzeraineté lâche sur les Jurchens §YJianzhou§! et §YHaixi§!.\n\nParmi les tribus jurchen, les Jianzhou sont de loin les plus puissants. Comme les Haixi, ils sont un peuple sédentaire ; les institutions et philosophies du gouvernement chinois se répandent lentement dans la région et sont embrassées par les Khans locaux.\n\nMalgré l'empiètement du gouvernement et des coutumes chinoises, les Jurchens sédentaires conservent la plupart des mêmes traditions et la culture guerrière des « Jurchens Sauvages » au nord. Les tribus nomades de §YXibe§!, §YNanaï§! et §YOrotchoni§! sont loin d'être impuissantes, et n'ont à affronter que les uns les autres et les peuples relativement isolés des §YSolon§! et §YNivkh§!.\n\nLa §YCorée§! se retrouve souvent en désaccord avec les Jurchens, et n'a que récemment annexé les provinces du nord-est de §YYukjin§! et §YGyeongseong§! à une branche des Jianzhou. Les Jurchens et les Coréens considèrent tous deux le §YMont Paektu§! comme un lieu sacré, et chacun croit qu'il devrait seul avoir accès au pic saint.\n\nLes Jurchens et les §YMongols§! ont une relation en constante évolution. Parfois alliés et parfois rivaux acharnés, les tribus des deux peuples s'entre-marient souvent pour sécuriser des liens politiques, et les querelles dynastiques sont courantes. Les Mongols §YKorchin§! sous §YKhan Unebolad§! sont devenus ascendants à l'est et pourraient avoir des visées d'expansion en terre jurchen s'ils ne sont pas contenus.\n\nLes Khans jurchens se souviennent avec tendresse des jours des Jin. S'ils sont capables de surmonter les divisions entre les tribus et de tenir les Mongols à distance, ils pourraient encore se relever sous un nouveau chef, vaincre les Ming et se forger une nouvelle identité."
