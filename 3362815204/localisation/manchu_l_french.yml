 MJZ_ideas:0 "Idées Jurchen"
 MJZ_ideas_start:0 "Traditions Jurchen"
 MJZ_ideas_bonus:0 "Ambition Jurchen"
 sons_of_the_mountain:0 "Fils de la Montagne"
 sons_of_the_mountain_desc:1 "Selon le mythe fondateur du peuple jurchen, le premier prince jurchen était la progéniture d'une jeune fille céleste résidant sur le Mont Bukari (connu sous le nom de Mont Paektu par les Coréens) qui fut fécondée par un fruit laissé tomber par une pie.\n\nLes descendants de ce prince connaissent intimement notre terre inhospitalière, et mourront volontiers en la protégeant de leurs ennemis."
 jurchen_pigtail:0 "La Queue"
 jurchen_pigtail_desc:0 "Depuis des générations, les hommes jurchen portent leurs cheveux d'une manière distincte connue sous le nom de « queue », rasant le devant de la tête et tressant le reste en une natte. Cela a contribué à favoriser un sentiment de fraternité entre les divers peuples jurchen."
 jurchen_border_skirmishes:0 "Les Terres Frontalières"
 jurchen_border_skirmishes_desc:1 "Pour maintenir notre indépendance, nous avons dû protéger nos frontières contre les Chinois et les Mongols voisins en maintes occasions. Ces guerres frontalières ainsi que les nombreux conflits intestins ont donné naissance à une nation de tribus farouchement indépendantes et de guerriers redoutés."
 jurchen_many_wives:0 "Épouses et Concubines"
 jurchen_many_wives_desc:0 "En raison de leur pratique de prendre une multitude d'épouses et de concubines, les seigneurs de guerre jurchen ne manquent jamais d'héritiers potentiels pour hériter de leurs conquêtes."
 jurchen_foreign_service:0 "Service Étranger"
 jurchen_foreign_service_desc:1 "Nous avons traditionnellement vécu dans l'ombre de nos voisins des Grands Ming, qui ont souvent cherché à exercer leur influence sur nous. Maints princes jurchen ont pratiqué l'art de la guerre à leur service."
 jurchen_warlords_generosity:0 "Générosité du Seigneur de Guerre"
 jurchen_warlords_generosity_desc:0 "Le seigneur de guerre jurchen est prêt à donner des cadeaux somptueux d'esclaves, d'épouses et de propriétés pour gagner d'autres à sa cause. Son grand nombre de descendants lui permet d'offrir un approvisionnement prêt d'épouses pour courtiser les dignitaires étrangers et les transfuges potentiels."
 the_jurchen_banners:0 "Armées de Bannières Jurchen"
 the_jurchen_banners_desc:0 "Réorganiser l'armée des clans tribaux en une force redoutable et établir les redoutées armées de bannières jurchen."
 the_later_jin:0 "Les Jin Postérieurs"
 the_later_jin_desc:1 "L'État mandchou trace ses racines jusqu'aux Grands Jin des XIIe-XIIIe siècles, qui dominaient le nord de la Chine jusqu'à la conquête mongole. Le nouvel État Jin restauré cherche à imiter les conquêtes de son prédécesseur et restaurer la gloire du passé."
 manchu_chinese_learning:0 "Savoir Chinois"
 manchu_chinese_learning_desc:0 "Nos érudits ont traduit des traités militaires chinois tels que « L'Art de la Guerre » de Sun Tzu et les « Six Enseignements Secrets » de Lü Shang en mandchou, permettant à nos seigneurs de guerre de devenir versés dans la théorie de la stratégie militaire."
 seven_grievances:0 "Les Sept Griefs"
 seven_grievances_desc:1 "Au fil des ans, le peuple mandchou a accumulé une longue liste de griefs contre les Han, une liste qui pourrait être vue comme justifiant une action militaire pour déposer leurs dirigeants actuels."
 QNG_ideas:0 "Idées des Grands Qing"
 QNG_ideas_start:0 "Traditions des Grands Qing"
 QNG_ideas_bonus:0 "Ambition des Grands Qing"
 expand_the_banners:0 "Étendre les Bannières"
 expand_the_banners_desc:0 "En permettant aux peuples Han et Mongol d'entrer dans les Huit Bannières, une grande et puissante force multiethnique disponible au gré de l'Empereur Qing est établie."
 qng_bogda_khan:0 "Bogda Khan"
 qng_bogda_khan_desc:0 "Contrairement aux Ming, les Empereurs Qing n'ont aucun scrupule concernant l'acculturation des « barbares » et cherchent activement à les intégrer dans l'Empire. Par exemple, bien que connu sous le nom de Huangdi (Empereur) par les Han, les Qing adoptent le titre de Bogda Khan (Khan sage) parmi les Mongols."
 qing_viceroyalties:0 "Les Vice-Royautés"
 qing_viceroyalties_desc:1 "Nous avons étendu le système de vice-rois des derniers Ming, qui se concentrait sur la protection de la frontière nord, en un système de huit vice-rois permanents couvrant la majorité de la Chine. Les vice-rois ont un pouvoir militaire et civil considérable dans leurs provinces, agissant effectivement comme les gouverneurs régionaux de l'Empereur et simplifiant ainsi le système administratif de l'Empire."
 the_ten_great_campaigns:0 "Les Dix Grandes Campagnes"
 the_ten_great_campaigns_desc:1 "Notre conquête de la Chine a permis à ceux vivant en marge de l'Empire de s'élever au-dessus de leur condition. Une série de campagnes doit être menée pour restaurer l'ordre dans ces territoires et étendre le pouvoir des Grands Qing sur nos ennemis."
 #Oirat Ideas
 OIR_ideas:0 "Idées Oïrats"
 OIR_ideas_start:0 "Traditions Oïrats"
 OIR_ideas_bonus:0 "Ambition Oïrat"
 fearsome_warriors_of_tumu:0 "Redoutables Guerriers de Tumu"
 fearsome_warriors_of_tumu_desc:0 "Les Oïrats sont des cavaliers habiles et redoutés, capables d'humilier des armées d'infanterie bien plus vastes avec leur plus grande manoeuvrabilité. Le son des sabots battant à travers les plaines frappera de terreur le cœur de nos ennemis !"
 the_four_oirats:0 "Les Quatre Oïrats"
 the_four_oirats_desc:0 "L'Alliance des Quatre Tribus Oïrats lie les Mongols Occidentaux ensemble. Composée des Dzoungars (ou Choros), Torghut, Dörbet et Khoshut, elle a d'abord émergé en 1399 et tient depuis, permettant à un puissant État oïrat d'émerger dans la Steppe d'Asie Centrale."
 OIR_great_khans_legacy:0 "Héritage du Grand Khan"
 OIR_great_khans_legacy_desc:0 "Beaucoup parmi notre peuple se souviennent des exploits de notre peuple sous la direction du Grand Khan. Ils souhaiteraient les imiter et reprendre son héritage, mais cette fois, le Khan devrait être un Oïrat, pas l'un des Mongols Orientaux."
 todo_besheg_script:0 "Écriture Todo Besheg"
 todo_besheg_script_desc:0 "L'Écriture Todo Besheg ou « Claire » adapte l'écriture mongole pour s'assurer que tous les sons de la langue oïrat parlée peuvent être distingués, tout en facilitant la transcription des langues sanscrites et tibétiques. Ce sera un atout considérable pour nous dans notre administration et dans la diffusion du savoir acquis par nos voisins et sujets étrangers."
 defiance_of_the_dzungars:0 "Défi des Dzoungars"
 defiance_of_the_dzungars_desc:0 "Les Dzoungars ou « mains gauches » sont la tribu la plus redoutable des Oïrats. Largement haïs et craints par nos ennemis, ils combattront jusqu'au dernier homme, femme ou enfant plutôt que de se rendre à un dirigeant étranger."
 #Mongolian Ideas
 KHA_ideas:0 "Idées Mongoles"
 KHA_ideas_start:0 "Traditions Mongoles"
 KHA_ideas_bonus:0 "Ambition Mongole"
 ikh_mongol_uls:0 "Ikh Mongol Uls"
 ikh_mongol_uls_desc:1 "En tant que Mongols originels, nous Mongols de l'Ikh Mongol Uls (« Grand État Mongol ») nous considérons comme les héritiers principaux du grand empire de Gengis Khan. À la moindre occasion, notre peuple chercherait à imiter les exploits du Grand Khan et reprendre son héritage, réunifiant les vastes territoires jadis du Khanat Mongol."
 northern_yuan:0 "Les Yuan du Nord"
 northern_yuan_desc:2 "Au XIIIe siècle, Kubilai Khan a conquis la Chine et fondé la dynastie Yuan. Revendiquant le titre de Grand Khan de Gengis ainsi que celui d'Empereur de Chine, l'État Yuan était parfois connu comme l'Empire du Grand Khan. Bien que finalement vaincu par les Ming, qui ont confiné notre pouvoir à la Mongolie elle-même, la mémoire des Yuan perdure, tout comme l'ambition de reprendre le Trône Céleste si jamais l'occasion se présentait."
 ghostly_horses_of_the_plain:0 "Chevaux Fantômes de la Plaine"
 ghostly_horses_of_the_plain_desc:0 "La prouesse des cavaliers mongols est renommée à travers le monde entier. Nos ennemis trembleront de peur à la vue d'un nuage de poussière au loin, craignant qu'il puisse signifier l'approche de notre cavalerie !"
 yams_of_the_great_khan:0 "Yams du Grand Khan"
 yams_of_the_great_khan_desc:2 "Afin de s'assurer que les messagers puissent voyager assez vite pour suivre les armées mongoles, Gengis Khan a institué un système de relais ou « yams », qui étaient établis tous les 30-60 km pour fournir nourriture, abri et chevaux de rechange aux messagers de l'armée mongole. Cela permettait aux messages de voyager aussi vite qu'un cheval peut galoper, la fatigue ne ralentissant plus la vitesse à laquelle un messager pouvait voyager. Par ces moyens, notre empire a pu surmonter les problèmes logistiques causés par la vaste échelle de la Pax Mongolica, au moins temporairement."
 mongolian_mobility:0 "Mobilité Mongole"
 mongolian_mobility_desc:2 "Chacun de nos soldats entretient généralement 3 ou 4 chevaux, leur permettant de changer de monture chaque fois que leur cheval se fatigue et ainsi voyager à grande vitesse pendant des jours sans s'arrêter. De plus, leurs montures supplémentaires leur fournissent des réserves alimentaires à travers le lait de jument ainsi que la viande de cheval, rendant nos armées bien moins vulnérables à la famine que les armées d'autres nations soi-disant civilisées. Cela nous permet de surclasser nos ennemis avec facilité, couvrant une quantité stupéfiante de territoire en des périodes plus courtes qu'ils ne l'auraient cru possible."
 MNG_kheshig:0 "Le Kheshig"
 MNG_kheshig_desc:0 "Le Kheshig formait autrefois la redoutable garde du corps du Grand Khan Mongol. Leurs descendants continueront à protéger les Khans de Mongolie alors qu'ils chevauchent au combat contre les ennemis de leur peuple !"
 #Chagatai Ideas
 CHG_ideas:0 "Idées Chagatai"
 CHG_ideas_start:0 "Traditions Chagatai"
 CHG_ideas_bonus:0 "Ambition Chagatai"
 the_mountain_khanate:0 "Le Khanat des Montagnes"
 the_mountain_khanate_desc:0 "Le Khanat Chagatai se trouve abrité entre le Lac Balkhach et les Montagnes Tian Shan. C'est une terre dure et impitoyable, que notre peuple peut exploiter comme arme contre les envahisseurs potentiels."
 sons_of_chagatai:0 "Fils de Chagatai Khan"
 sons_of_chagatai_desc:0 "Le Khan actuel de Chagatai trace sa lignée jusqu'à Chagatai Khan, le deuxième fils de Gengis Khan, qui a jadis régné sur ces terres et établi un puissant État successeur mongol. Bien que cet empire ait maintenant été divisé entre Chagatai, Yarkand et Transoxiane, les Khans actuels peuvent encore revendiquer une légitimité considérable en faisant appel à l'héritage de leur ancêtre."
 CHG_chagatai_literature:0 "Littérature Chagatai"
 CHG_chagatai_literature_desc:0 "La langue chagatai des steppes orientales est largement utilisée jusqu'à l'Empire Timouride comme vecteur des pensées et idées de la grande lignée mongole. Nous devons promouvoir l'usage de notre langue ancestrale et permettre à la tradition littéraire chagatai de prospérer."
 CHG_border_wars:0 "Guerres Frontalières Incessantes"
 CHG_border_wars_desc:1 "Coincés entre l'Empire de Chine, les Timourides, les Ouzbeks et les Oïrats, nous faisons face à une lutte constante pour maintenir nos frontières. Nos soldats toujours vigilants ont de nombreuses occasions d'affûter leurs compétences au combat, donnant naissance à un peuple guerrier aguerri prêt à reprendre l'héritage du Grand Khan."
 CHG_constant_scheming:0 "Noblesse Intrigante"
 CHG_constant_scheming_desc:0 "Les luttes de pouvoir constantes entre les divers princes, nobles locaux, villes et tribus du Khanat Chagatai ont produit une nation d'intrigants et de politiciens hautement compétents. Si nous pouvons mettre de côté nos querelles et canaliser cette énergie pour surpasser nos ennemis, ce serait un grand atout pour notre peuple."
 #Korean Missions
 KOR_has_factional_upheaval_tooltip2:1 "A eu l'événement §YTroisième Purge Littéraire§!."
 is_rivalled_by_root:0 "Est rivalisé par §Y[Root.GetName]§!."
 have_at_least_7point5_more_discipline:1 "Avoir au moins §G107,5%§! de Discipline"
