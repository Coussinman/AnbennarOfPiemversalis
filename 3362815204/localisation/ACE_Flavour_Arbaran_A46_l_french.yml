A46_avenging_ianren_tooltip: "Les provinces de l'§YÉtendue Alénique§! se convertiront à la culture §YArbarani§! lorsque nous les posséderons."
A46_knocking_door_tooltip1: "\n§RGawed sera démantelé ! Il libérera tous ses sujets et pays§!"
A46_halfling_liberator_tooltip: "Chaque province possédée de §YCéréales§! et de §YBétail§! recevra une minorité §Yhalfeline§!.\n"
A46_halfling_liberator_tooltip1: "Si nous sommes l'§YEmpereur§!"
A46_halfling_liberator_tooltip2: "Les provinces du §YPetit-Pays§! se convertiront progressivement à la culture §YHalfeline Impériale§!."
A46_onwards_aelcandar_tooltip1: "Si §YCrownsman§! est une culture acceptée."
A46_reclaim_aelcandar_tooltip1: "Si nous avons choisi la voie du §MRoyaume Elfique§!."
A46_reclaim_aelcandar_tooltip2: "Si nous avons choisi la voie de §oRohibonia§!."
A46_legacy_rider_tooltip: "\nNos souverains et héritiers auront davantage de chances d'obtenir le trait de personnalité §MDernier Chevalier§!.\n"
A46_knights_magnificent_tooltip: "Obtient §G2,5 %§! de §Ycapacité de combat de cavalerie§!£cavalry_icon_small£ par point de §Yréputation diplomatique§!£dip£."

