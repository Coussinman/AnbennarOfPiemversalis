unlock_merc_knights_magnificent_tt: "Débloque la compagnie de mercenaires §MChevaliers Magnifiques§! à recruter"
A46_horsemeat_tooltip: "\nChaque province possédée de §YBétail§! gagnera §G1§! £dip£\n"
A46_invite_settlers_tooltip: "10 provinces aléatoires disposant d'un bâtiment de §Ycommerce§! recevront une minorité §Melfique§!.\n"
A46_invite_settlers_tooltip2: "Obtient un §Ycasus belli de subjugation§! sur tous les pays §Md'elfes lunaires§! pour §Y25§! ans."
A46_lead_elves_tooltip: "Débloque la possibilité d'établir des vassaux de type §MRoyaume Elfique§! parmi nos sujets, les convertissant à la culture §Melfique§! s'ils ne le sont pas déjà."
A46_magnates_tooltip: "La politique de la classe des bourgeois §Y« Contrôle de la Politique Monétaire »§! perdra ses effets négatifs."
A64_bring_them_prosperity_tooltip: "Chaque province §Yalénique§! possédée recevra le modificateur suivant"
A46_gawedi_cloth_tooltip: "8 provinces remplissant les conditions verront leurs biens commerciaux changés en §YTissus§! et recevront le modificateur suivant."
A46_state_arbaran_tooltip: "Débloque l'aperçu des branches"
A64_bring_them_prosperity_tooltip2: "\nLes provinces aléniques se convertiront progressivement à la culture §MSemi-Elfe Alénique§!."
A64_bring_them_prosperity_tooltip3: "\nLes provinces remplissant les conditions recevront une minorité §MSemi-Elfique§!."
A46_elven_emperor_tooltip: "Les provinces humaines anbennariennes se convertiront progressivement à la culture §MSemi-Elfe Arbarani§!."
A46_elvish_capital_tooltip: "Les §MElfes§! coloniseront pleinement les États de §YCestir§! et §YArbaran§! !"
A46_strong_seed_tooltip: "Débloque l'option de paix §MRépandre les Silcalas§!, nous permettant de propager notre dynastie dans d'autres pays et de transformer leurs dirigeants en §MSemi-Elfes§! tout en diffusant des minorités §MSemi-Elfiques§! et §MElfiques§!."
A46_plenty_of_us_tooltip: "Débloque la possibilité de créer des §Ysujets incorporés§!"
flavor_Arbaran.3.a.tt: "Libérer @B60 §YFarranéen§! en tant que §Ymarche§! dans nos provinces non elfiques de la région du §YVal Désolé§!. Ils recevront les modificateurs suivants :"
flavor_Arbaran.3.a.tt2: "Les provinces non elfiques du §YVal Désolé§! se convertiront progressivement à la culture §MSemi-Elfe Farrani§!."
flavor_Arbaran.5.b.tt: "L'armée restera elfique."



hispanic_monarchy_events.1.t: "Se Concentrer sur le Conseil Royal"
hispanic_monarchy_events.1.desc: "Après de mûres délibérations, les secrétaires des différents conseils sont parvenus au consensus que nous devons concentrer les efforts de notre gouvernement au cours des années à venir sur les affaires intérieures, leurs actions étant coordonnées par le Conseil Royal. Il nous appartient de décider quel conseil spécifique devra guider l'action gouvernementale."
hispanic_monarchy_events.1.a: "Le Conseil de la Chambre dispensera la volonté royale et la justice."
hispanic_monarchy_events.1.b: "Le Conseil des Finances mettra le trésor en ordre et accroîtra nos revenus."
hispanic_monarchy_events.1.c: "Hérétiques et traîtres doivent être châtiés !"
hispanic_monarchy_events.2.t: "Se Concentrer sur le Conseil d'État"
hispanic_monarchy_events.2.desc: "Après de mûres délibérations, les secrétaires des différents conseils sont parvenus au consensus que nous devons concentrer les efforts de notre gouvernement au cours des années à venir sur les affaires diplomatiques, leurs actions étant coordonnées par le Conseil d'État. Il nous appartient de décider quel conseil spécifique devra guider l'action gouvernementale."
hispanic_monarchy_events.2.a: "Notre quête d'hégémonie sur Cannor sera la priorité absolue !"
hispanic_monarchy_events.2.b: "Nous orienterons les voiles de notre gouvernement vers la Tête-de-Dame et ses ports."
hispanic_monarchy_events.2.c: "L'image du Royaume Elfique doit être rehaussée."
hispanic_monarchy_events.3.t: "Se Concentrer sur le Conseil de Guerre"
hispanic_monarchy_events.3.desc: "Après de mûres délibérations, les secrétaires des différents conseils sont parvenus au consensus que nous devons concentrer les efforts de notre gouvernement au cours des années à venir sur la guerre, leurs actions étant coordonnées par le Conseil de Guerre. Il nous appartient de décider quel conseil spécifique devra guider l'action gouvernementale."
hispanic_monarchy_events.3.a: "Le Conseil de Guerre mènera nos efforts contre nos ennemis !"
hispanic_monarchy_events.3.b: "Le Conseil des Ordres Militaires fournira davantage de ressources à notre machine de guerre."
hispanic_monarchy_events.3.c: "Le Conseil de l'Armada assurera notre domination sur les routes maritimes."

