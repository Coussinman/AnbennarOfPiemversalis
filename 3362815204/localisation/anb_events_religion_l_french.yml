 corinite.301.t:0 "Choisir un Ordre pour Aider notre Présence Mondiale"
 corinite.301.d:0 "Corin enseigne qu'il appartient à chaque individu de faire sa part dans la lutte contre la tyrannie et le mal, et nombre de fidèles ont créé des organisations pour faire avancer la cause de Corin. Promouvoir officiellement l'un de ces ordres pourrait aider notre présence mondiale.[GetAraOrderSummary][GetMinaraOrderSummary][GetMunasOrderSummary][GetRyalaOrderSummary]"
 ara_order_summary:0 "\n\nLes Communalistes Aranites souhaitent éliminer le péché et l'excès de la doctrine d'Ara. Ils cherchent à promouvoir le troc plutôt que la spéculation et le partage communautaire plutôt que l'accumulation personnelle."
 minara_order_summary:0 "\n\nL'Ordre du Verger voit l'amour de Minara comme l'amour de la communauté plutôt que celui des plaisirs physiques. Ils œuvrent à connecter les divers temples locaux en une communauté corinite mondiale."
 munas_order_summary:0 "\n\nLes Chevaliers du Feu Lunaire sont un ordre de croisés navals dévoués à Munas. Ils se voient comme les hérauts de la croisade mondiale de Corin."
 ryala_order_summary:0 "\n\nLa Sororité Cérisienne est une société secrète de femmes ayant radicalement réinterprété les idées traditionnelles de la féminité ryalienne. Avec des chapitres dans tout Cannor, elles travaillent ensemble pour libérer les femmes des chaînes de la tradition."
 corinite.301.a:0 "Nous promouvrons les Communalistes Aranites"
