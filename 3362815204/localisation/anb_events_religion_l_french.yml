 corinite.1.t:0 "La Proclamation Corinite"
 corinite.1.d:0 "De nombreuses questions ont surgi avec la récente révélation que Castellos, la divinité régnante de la Cour Régente, est mort : quand exactement a-t-il péri ? Les textes découverts en Aelantir peuvent-ils être vérifiés ? Qui dirigera désormais la Cour Régente ?\n\nLes traditionalistes tentent de maintenir la paix et affirment qu'Adean, fils de Castellos et héritier légitime, s'élèvera pour prendre la place de son père.\nCependant, nombre de ceux qui ont souffert sous la Marée Verte soutiennent que c'est la négligence de la Cour Régente qui a mené à la destruction de l'Escann et de Castellyr, signe manifeste que si Castellos avait été vivant et les dieux capables d'agir, la Marée Verte aurait été évitée, et que Castellos aurait protégé son royaume patron comme il le fit dans les éons passés.\n\nLa popularité croissante de Corin, déesse de la Guerre récemment ascendée et héroïne de la Marée Verte, a conduit à des appels pour sa succession divine au Trône Régent, par ses liens en tant que successeure de facto d'Agrados, le frère défunt de Castellos. Les Corinites de $CAPITAL$ contestent que si Adean est peut-être un dieu noble et chevaleresque, son temps sous la tutelle de Castellos l'a rendu conservateur, sclérosé et finalement incapable de défendre le Royaume contre ses nombreuses menaces extérieures, et que le système actuel de régence divine n'est qu'un piètre prétexte pour des souverains faibles et injustes de conserver leur pouvoir et d'ignorer les monstres et tyrans qui rôdent au-delà de leurs frontières."
 corinite.1.a:0 "Seul le temps révélera ce que cela pourrait apporter"
 corinite.2.t:0 "Le Déluge Cramoisi"
 corinite.2.d:0 "Alors que les prophètes de Corin répandent son message à travers le continent, une scène que l'on ne peut décrire que comme apocalyptique s'est produite en de nombreuses régions de l'Empire : le ciel s'assombrissait comme avant une averse, pour s'ouvrir et libérer un torrent de sang sur les citoyens pris au dépourvu. Horrifiées, des foules se ruèrent dans les rues, tentant d'échapper aux averses de plasma. Beaucoup furent écrasés et piétinés en essayant de fuir ce qui ne pouvait sembler être que la fin du monde. Que l'on reconnaisse Corin ou Adean comme mère ou père divin, tous s'accordent à dire qu'il s'agit d'une preuve irréfutable d'une guerre sanglante et terrible dans les cieux eux-mêmes. Ce n'est qu'une question de temps avant que les rivières ne soient alimentées non par le sang des dieux, mais par celui des hommes."
 corinite.2.a:0 "Un sombre présage de l'usurpatrice Corin tentant de faire ce qu'Agrados fit jadis !"
 corinite.2.b:0 "Nous devons nous convertir à la foi de Corin pour prévenir d'autres cataclysmes !"
 corinite.2.c:0 "C'est la fin du monde !"
 corinite.2.e:0 "Un signe de la vérité de Corin !"
 corinite.3.t:0 "Le Déluge Cramoisi"
 corinite.3.d:0 "Dans de nombreuses régions de Cannor, une pluie horrible a commencé. Une pluie de sang cramoisi. Presque tout Cannor à l'est de la Tête-de-Dame connaît des pluies de sang régulières, causant chaos et inondations. Ceux qui en sont affectés affirment que c'est le signe que les dieux s'affrontent dans les cieux, Corin défiant Adean pour le siège de son père en tant que souverain de la Cour Régente. Des rapports d'hystérie collective et de violences éclatent partout."
 corinite.3.a:0 "La trahison de Corin détruit des vies."
 corinite.3.b:0 "La victoire de Corin sauvera ces régions."
 corinite.3.c:0 "Tant pis pour eux !"
 corinite.4.t:0 "Le Déluge Cramoisi prend fin"
 corinite.4.d:0 "Enfin, après dix longues années, les pluies ont cessé... et la clarté semble être revenue sur les terres. On dit que la guerre entre les dieux est terminée... sans vainqueur clair. Le monde mortel peut maintenant retrouver la paix, mais certains murmurent que le véritable vainqueur de cette guerre doit désormais être désigné par ses fidèles..."
 corinite.4.a:0 "Adean se remet et compte sur nous maintenant."
 corinite.4.b:0 "Corin vit encore, et bientôt, nous devons suivre ses traces."
 corinite.4.c:0 "Nous pouvons reprendre une vie normale."
 corinite.5.t:0 "Résistance au Ravélianisme"
 corinite.5.d:0 "Nous sommes les enfants de Corin. Nous avons enduré la Marée Verte et contemplé la lumière de Corin. Nous avons survécu au Déluge Cramoisi qui faillit détruire nos terres, mais nous avons persévéré par la foi.\n\nLes Ravéliens, dans leur avidité pour la vérité, ont complètement corrompu l'objectif fondamental de Corin d'atteindre la paix et la justice. Leur soi-disant religion organisée cherche à dominer et conquérir tous les modes de vie sous leur dogme, mais nous, en tant qu'enfants de l'Escann et héritiers de l'Escann, devons résister à cette nouvelle vague de bouleversement."
 corinite.5.a:0 "Par Sa force, nous resterons debout."
 corinite.5.b:0 "Peut-être les Ravéliens sont-ils une continuation de l'œuvre de Corin ?"
 corinite.100.t:0 "Le Dixième Concile Panthéonique"
 corinite.100.d:0 "Il existe des rituels et des formes associés à un concile panthéonique, établis au fil des siècles depuis la première codification du culte de la Cour Régente. Il doit y avoir un rassemblement de tous les grands prêtres de chaque divinité. Il doit y avoir au moins sept jours de discussion, puis sept autres jours de débat. Des rites d'action de grâces, de divination et de culte sont requis.\n\nLe Dixième Concile Panthéonique ne suit pas ces règles. C'est un conclave de clercs aventuriers, un échantillon de chaque divinité, mené par Dominic de Gallowspeak (jadis de Nerat, maintenant voué à Corin). C'est moins une discussion qu'une proclamation : Corin ne fut pas vraiment tuée, mais racheta au contraire les échecs d'Agrados et s'éleva pour prendre la place de ce dieu déchu dans la Cour. Ou peut-être est-ce moins une proclamation qu'un incendie de forêt, se propageant rapidement parmi les aventuriers de l'Escann, les suivant jusqu'à leurs foyers à travers Cannor, et là se répandant comme une étincelle dans du petit bois sec.\n\nFinalement, il semble que les temples eux-mêmes aient publié des déclarations reconnaissant cette vérité, même s'ils ergotent sur l'hérésie d'Agrados et son statut d'avatar. Leur lenteur est un acte d'accusation comparée à Sa force féroce et implacable : il est clair que la déesse de la guerre, de la bravoure et de l'héroïsme est un ajout fort nécessaire à la cour."
 corinite.100.a:0 "Que tous trouvent le salut sous Son épée et Son bouclier."
 corinite.100.b:0 "Nous rejoindrons sa croisade !"
 corinite.100.c:0 "Et dire que nous avons combattu à ses côtés."
 corinite.100.e:0 "Nous rejoindrons sa croisade !"
 corinite.101.t:0 "Le Dixième Concile Panthéonique ?"
 corinite.101.d:0 "Il existe des rituels et des formes associés à un concile panthéonique, établis au fil des siècles depuis la première codification du culte de la Cour Régente. Il doit y avoir un rassemblement de tous les grands prêtres de chaque divinité. Il doit y avoir au moins sept jours de discussion, puis sept autres jours de débat. Des rites d'action de grâces, de divination et de culte sont requis.\n\nAucune de ces règles ne fut suivie lors du soi-disant Dixième Concile Panthéonique. Ce fut un conclave de clercs aventuriers indisciplinés, dont beaucoup à peine lettrés dans les enseignements de leur divinité, menés par l'inconnu Dominic de Gallowspeak. C'est moins une discussion qu'une spéculation effrénée : Corin ne fut pas vraiment tuée, mais s'éleva au-delà de l'hérésie du maudit Agrados et prit la place de ce dieu déchu dans la Cour. Ou peut-être est-ce moins une proclamation qu'un incendie de forêt : ces croyances se répandirent rapidement parmi les aventuriers de l'Escann, les suivirent jusqu'à leurs foyers à travers Cannor, et là se propagèrent comme une étincelle dans du petit bois sec.\n\n[Root.Monarch.GetName] a bien remarqué la foi croissante en Son ascension, et il semble qu'aujourd'hui les temples eux-mêmes aient publié des déclarations reconnaissant ce statut. Ils notent que des discussions supplémentaires sont nécessaires concernant Sa relation avec Agrados et tous ses échecs, mais ils ne se dresseront pas contre la marée. Qu'il soit proclamé à travers [Root.GetName], afin que tous apprennent que Corin a rejoint la Cour Régente en tant que déesse de la guerre, de la bravoure et de l'héroïsme."
 corinite.101.a:0 "Une nouvelle venue à la Cour."
 corinite.101.b:0 "Nous prendrons Son épée et Son bouclier !"
 corinite.101.c:0 "Nous avons combattu aux côtés de Corin jadis, et le ferons à nouveau !"
 corin_deity_activated_tt:0 "Corin sera débloquée en tant que §Ydivinité patronne§! pour tous les fidèles de la §YCour Régente§!."
 corinite_paragonhood_vanquished_evil_ruler:0 "A vaincu un souverain maléfique : un véritable Parangon de Corin !"
 corinite_independent_preachers:0 "Prédicateurs Indépendants"
 wealthy_temples_sacked_by_zealots:0 "Temples Opulents Pillés par des Zélotes"
 corinite_divine_inspiration:0 "Inspiration Divine"
 corinite_offensive_war_dogma:0 "Dogme de Guerre Offensive"
 corinite_defensive_war_dogma:0 "Dogme de Guerre Défensive"
 corinite_cult_of_personality:0 "Culte de la Personnalité Corinite"
 corinite.200.t:0 "Des Croisés rejoignent le Combat"
 corinite.200.d:0 "Le terme « Croisé Corinite » est un terme vague accordé à tous ceux qui combattent au nom de Corin. Leurs rangs grossissent de gens de tous horizons, mais un grand nombre peut simplement être compté comme de la populace paysanne qui combat pour la religion plutôt que pour leur seigneur féodal. Ce qui est certain, cependant, c'est leur zèle inébranlable à répandre la justice de Corin à travers le pays.\nAvec notre récente guerre prolongeant les souffrances de notre peuple, de grandes bandes de croisés ont afflué vers nos bannières, tant dans l'armée que dans le train de ravitaillement, espérant que la guerre puisse enfin se terminer avec un vainqueur juste."
 corinite.200.a:0 "Qu'ils remplissent les rangs de notre armée."
 corinite.200.b:0 "Leurs bonnes œuvres apaiseront notre peuple."
 corinite.201.t:0 "Minorités Corinites à [target_province.GetName]"
 corinite.201.d:0 "Des fanatiques ! Les fidèles les plus zélés de Corin à [target_province.GetName] ont pris les armes contre leurs voisins incroyants. Bien que leur dévotion à la foi soit admirable, cette fois ces zélotes sont allés trop loin. La conversion sous peine de mort est-elle vraiment la justice de Corin ?"
 corinite.201.a:0 "Leur amour pour Elle les a rendus aveugles."
 corinite.202.t:0 "Prêtres de Carrière Évincés"
 corinite.202.d:0 "Au fil du temps, nos ministres ont remarqué que notre clergé est de plus en plus submergé par des prêtres fougueux aux humbles origines rurales. Ils prétendent connaître la volonté de Corin plus véritablement que ceux qui ont étudié Sa parole, qualifiant nos séminaires et temples de décadents et adéaniques."
 corinite.202.a:0 "Le peuple connaît Sa voie, qu'il ait ses prêtres."
 corinite.202.b:0 "Ces vagabonds ne savent rien de la justice de Corin !"
 corinite.203.t:0 "Prédicateurs Indépendants"
 corinite.203.d:0 "Une nation forte et prospère est souvent la patronne bienveillante de ses institutions religieuses, mais avec la montée du comportement zélé de notre souverain, le peuple a commencé à interpréter les voies de Corin selon ses propres interprétations de notre dogme officiel. De nombreux prêtres autoproclamés de Corin, souvent autodidactes, sont apparus à travers notre pays, prêchant sa bonne parole. Bien que beaucoup soient sans doute de pure intention, ces prédicateurs indépendants peuvent frôler l'interprétation erronée, voire pire, l'hérésie, ou même exciter les masses et les dresser contre notre gouvernement."
 corinite.203.a:0 "Envoyez-les au séminaire, ou hors de nos terres."
 corinite.203.b:0 "Je ne puis guère me plaindre, ils font Son œuvre sans nous demander une seule couronne."
 corinite.204.t:0 "Temples Opulents Pillés par des Zélotes"
 corinite.204.d:0 "Suivant la volonté de Corin, nous avons bâti une terre paisible et prospère. Et pourtant, une populace égarée tourne ses gourdins et ses torches contre nos prêtres ! Prétendant que nous avons oublié Sa justice, des fanatiques iconoclastes ont incendié l'un de nos temples, brutalisé notre clergé et brisé les statues et idoles de nos dieux, tant Corin que les autres de la Cour Régente."
 corinite.204.a:0 "Sauvages ! Au nom de Corin, vous marchez dans les pas des Dookanson !"
 corinite.205.t:0 "Corruption au sein de la Foi"
 corinite.205.d:0 "Il est attendu de nos prêtres qu'ils aillent parmi le peuple, qu'ils servent la justice de Corin, répandent Sa miséricorde auprès des gens du commun et leur épargnent les peines du monde. Il est donc préoccupant que notre clergé devienne de plus en plus distant du peuple, se querellant pour les rangs, se parant de grands honneurs tout en refusant d'accomplir les bonnes œuvres pour lesquelles ils furent nommés."
 corinite.205.a:0 "Et alors ? Nous avons accompli Son œuvre dans nos terres."
 corinite.205.b:0 "Il est temps de secouer les choses. Les petites politiques sont pour les fidèles d'Adean."
 corinite.206.t:0 "La Communauté autour de la Foi"
 corinite.206.d:0 "Alors que notre pays s'unifie autour des voies de Corin, nous en sommes venus à nous appuyer de plus en plus sur ses temples comme bastion de Sa volonté et notre place en tant qu'amis, famille et communauté."
 corinite.206.a:0 "Un Pays, Une Foi."
 corinite.207.t:0 "Dons à la Cour"
 corinite.207.d:0 "Nous avons enveloppé le peuple de notre nation dans l'étreinte bienveillante de Corin, lui épargnant la douleur de la pauvreté et les horreurs de la guerre. Et pour cela, nous avons gagné sa gratitude et sa dévotion. En retour de cette gratitude, les gens du commun ont amassé une fortune considérable et l'ont offerte en présent. Devrions-nous simplement la placer dans notre trésor ? Peut-être pourrions-nous mieux accomplir l'œuvre de Corin en la donnant aux pauvres."
 corinite.207.a:0 "Merci !"
 corinite.207.b:0 "Nous l'utiliserons comme Elle le voudrait."
 corinite.208.t:0 "Culte de la Personnalité"
 corinite.208.d:0 "Notre souverain en est véritablement venu à incarner la volonté de Corin dans le cœur de notre peuple. Aucun quartier n'a été accordé aux corrompus et aux décadents, aux cruels et aux abusifs, et la miséricorde est accordée à ceux qui la méritent. Cependant, il n'est pas faible. Chaque coup de fouet est mesuré et nécessaire. Chaque bouche est nourrie, chaque besoin est pris en compte. Avec l'audace inébranlable, la compassion sans réserve montrées par notre souverain, des murmures ont commencé à se répandre sur sa connexion inhabituelle avec la volonté de Corin. Ce serait de l'orgueil de suggérer une telle chose nous-mêmes, mais beaucoup parmi le peuple se sont demandé si notre souverain pourrait être un avatar de Corin, et à tout le moins, un véritable émule de ses voies."
 corinite.208.a:0 "Un véritable parangon."
 corinite.209.t:0 "Dogme Défensif"
 corinite.209.d:0 "Nous ne pouvons céder un pouce, de peur que notre peuple ne souffre aux mains de ces couards décadents. Nos généraux et officiers restent inébranlables à leurs postes, pour assurer la sécurité de notre patrie. Assurément, nous serions mieux servis en restant fermes comme le bouclier de Corin pour notre peuple, même si nous devons prendre la lame nous-mêmes, pour épargner nos bien-aimés."
 corinite.209.a:0 "Nos boucliers protègent..."
 corinite.210.t:0 "Dogme Offensif"
 corinite.210.d:0 "Pas de quartier ! Ces vils bâtards se dressent en défi de tout ce que Corin a forgé, de tout ce qu'Elle voudrait que nous fassions pour améliorer le monde. Frappez fort, frappez sans merci, afin que nous puissions chasser ces misérables dans la froide étreinte de Nerat, droit vers l'Enfer qu'ils méritent tant."
 corinite.210.a:0 "Nos épées frappent juste..."
 corinite.211.t:0 "Inspiration Divine"
 corinite.211.d:0 "Une épée dans un bouclier. Cet emblème de Corin est clair comme le jour, reconnaissable par presque tous à travers Cannor, et de plus en plus à travers Halann. Mais que signifie-t-il ? Il nous rappelle nos doubles objectifs. Nous devons être un rempart inflexible, défendant les faibles. Et de plus, nous devons être rapides et tranchants comme la plus fine lame, en frappant les injustices du monde, gardant nos cœurs aussi froids que l'acier pour ceux qui feraient le mal, quelle que soit la place de révérence dans laquelle ils auraient pu se glisser."
 corinite.211.a:0 "Car nos boucliers protègent, et nos épées frappent juste !"

