 deluge.1.t:0 "La Pluie Frappe le Bâtiment de la Capitale"
 deluge.1.da:0 "Les cieux de [Root.Capital.GetName] étaient clairs récemment... jusqu'à ce qu'une lourde pluie rouge du Déluge Cramoisi frappe spécifiquement notre bâtiment de la capitale, épargnant le reste de la ville. Courtisans et gens du commun y voient le signe que les dieux ne sont pas satisfaits de notre façon de gouverner."
 deluge.1.db:0 "Les cieux de [Root.Capital.GetName] étaient clairs récemment... jusqu'à ce qu'une lourde pluie rouge du Déluge Cramoisi frappe spécifiquement notre bâtiment de la capitale, épargnant le reste de la ville. Cela doit signifier que Corin approuve notre gouvernance."
 deluge.1.a:0 "Les Dieux désapprouvent."
 deluge.1.b:0 "Corin nous a choisis !"
 deluge.1.c:0 "Corin ne peut combattre Adean alors elle doit nous attaquer."
 deluge.2.t:0 "Pluie Dévastatrice"
 deluge.2.d:0 "Alors que le Déluge Cramoisi continue, la vie de tous est perturbée. La pluie endommage les bâtiments, mais pire encore, cause une hystérie de masse dans les rues, dévastant notre province."
 deluge.2.a:0 "La guerre de Corin nous détruit."
 deluge.2.b:0 "Corin nous guidera à travers cette épreuve."
 deluge.2.c:0 "Ces pluies violentes sont une malédiction."
 deluge.3.t:0 "Frénésie de Flagellants Furieux"
 deluge.3.d:0 "Le Déluge Cramoisi pousse beaucoup de gens à la folie. Un petit groupe a commencé à se flageller dans les rues, poussant d'autres vers des actions radicales."
 deluge.3.a:0 "Des radicaux. Des fous !"
 deluge.3.b:0 "Ils cherchent à se repentir."
 deluge.3.c:0 "Ces flagellants insensés !"
 deluge.4.t:0 "Des Provinces se Convertissent au Corinisme"
 deluge.4.d:0 "Ayant ressenti le déluge féroce résultant de la guerre entre les dieux, le peuple de notre pays n'a pas eu d'autre choix que de se convertir au culte de Corin dans l'espoir que les pluies cessent."
 deluge.4.a:0 "Imbéciles traîtres."
 deluge.4.b:0 "D'autres ont vu la justice de Corin."
 deluge.4.c:0 "Problématique"
 deluge.5.t:0 "L'Héritier se Convertit au Corinisme"
 deluge.5.d:0 "Voir le Déluge Cramoisi de ses propres yeux a conduit [Root.Heir.GetTitle] $HEIR$ à embrasser la cause de Corin, et [Root.Heir.GetSheHe] refuse notre ordre de se reconvertir. Cela nous fait mauvaise figure et pourrait causer des problèmes quand [Root.Heir.GetSheHe] prendra la tête du pays."
 deluge.5.a:0 "[Root.Heir.GetSheHeCap] reste notre héritier."
 deluge.5.b:0 "Nous ne pouvons permettre qu'[Root.Heir.GetSheHe] hérite."
 deluge.5.c:0 "Pourquoi [Root.Heir.GetSheHe] abandonnerait nos ancêtres pour cela ?"
 deluge.5.e:0 "Nous ne pouvons permettre qu'[Root.Heir.GetSheHe] hérite."
 deluge.6.t:0 "Le Consort se Convertit au Corinisme"
 deluge.6.d:0 "Voir le Déluge Cramoisi de ses propres yeux a conduit [Root.Consort.GetTitle] [Root.Consort.GetName] à se convertir à la foi corinite."
 deluge.6.a:0 "Je l'aime quand même."
 deluge.6.b:0 "[Root.Consort.GetSheHeCap] est un traître tout comme Corin."
 deluge.6.c:0 "Je l'aime quand même."
 deluge.6.e:0 "Nous ne pouvons rester marié à un païen."
 deluge.7.t:0 "$MONARCH$ se convertit au Corinisme"
 deluge.7.da:0 "$MONARCH$ s'est, contre les souhaits du reste de $COUNTRY$, personnellement converti au corinisme. Une différence religieuse entre le $MONARCHTITLE$ et la cour comme celle-ci est un problème majeur."
 deluge.7.db:0 "[Root.Monarch.GetName] a capitulé devant les demandes de sa cour, se convertissant personnellement à la foi corinite. Enfin, la cour et le [Root.Monarch.GetTitle] sont à nouveau unis sous une foi commune."
 deluge.7.a:0 "Cela causera des troubles."
 deluge.7.b:0 "$MONARCH$ cherche à entraîner le reste du pays avec [Root.Monarch.GetHerHim]."
 deluge.7.c:0 "Cela causera des troubles."
 deluge.7.e:0 "$MONARCH$ entraîne le reste du pays avec [Root.Monarch.GetHerHim]."
 deluge.7.f:0 "Cela ne peut qu'être bénéfique."
 deluge.8.t:0 "Des Temples Saccagés !"
 deluge.8.d:0 "Dans le chaos du Déluge, plusieurs temples à travers notre domaine ont été saccagés. Les coupables ne peuvent dire si c'était au nom de Corin, d'Adean, ou simplement de la folie induite par le déluge. Le clergé a insisté pour que nous payions les réparations."
 deluge.8.a:0 "Ils devraient payer leurs propres réparations."
 deluge.8.b:0 "Pour un tel désastre, nous devons aider."
 deluge.9.t:0 "Image de Corin Peinte en Sang"
 deluge.9.d:0 "Un fermier près de $CAPITAL$ a rapporté avoir trouvé une image de Corin peinte par la pluie de sang dans son champ. Est-ce un signe des dieux ?"
 deluge.9.a:0 "Corin nous a maudits !"
 deluge.9.b:0 "Corin nous a bénis !"
 deluge.9.c:0 "Adean nous protège !"
 deluge.10.t:0 "Prédicateur Corinite Fougueux"
 deluge.10.d:0 "Un prédicateur est apparu à $PROVINCENAME$, prêchant avec grande ferveur sur la guerre des dieux et la justice de Corin, poussant les gens à agir pour Corin."
 deluge.10.a:0 "Des radicaux !"
 deluge.10.b:0 "Pour la Justice de Corin !"
 deluge.10.c:0 "Maudits Corinites"
 deluge.10.e:0 "Notre peuple ne sera pas converti par des mensonges."
 deluge.11.t:0 "Pluie Rouge Incessante"
 deluge.11.d:0 "Le Déluge Cramoisi fait plus que des dégâts directs. Pour $PROVINCENAME$, c'est une averse sans fin qui noie les récoltes et force les gens à rester à l'intérieur. Ceux qui sortent deviennent fous. Aucun travail n'est accompli."
 deluge.11.a:0 "Forcer les paysans à travailler"
 deluge.11.b:0 "Les aider à surmonter cette épreuve."
 deluge.11.c:0 "Les laisser se cacher de la tempête"
 deluge.12.t:0 "Les Croisés Corinites Arrivent !"
 deluge.12.d:0 "Une armée de vagabonds, de zélotes et d'aspirants hommes saints s'est soulevée et a attaqué [corinite_crusader_province.GetName] ! Ils arborent la bannière rouge d'une prétendue Croisade Corinite contre tous les dirigeants décadents de la Cour Régente."
 deluge.12.a:0 "Qu'ils viennent."
 deluge.13.t:0 "Chasses aux Sorcières"
 deluge.13.d:0 "Le Déluge Cramoisi est sans aucun doute une menace magique, quelque chose qui a offensé les dieux. À travers le pays, beaucoup de gens, qu'ils professent la foi corinite ou non, ont rassemblé des mages de toutes réputations et les ont brûlés sur le bûcher. En tant que loyaux serviteurs de [Root.Country.GetName], l'état $ESTATE_MAGES$ nous a demandé de les protéger contre d'autres attaques."
 deluge.13.a:0 "Nous ne pouvons aller contre la volonté du peuple."
 deluge.13.b:0 "Nous devons protéger nos sujets magiciens !"

