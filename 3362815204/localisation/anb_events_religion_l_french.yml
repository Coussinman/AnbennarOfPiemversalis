 corinite.302.t:0 "Choisir un Ordre pour Aider dans la Lutte Contre le Mal"
 corinite.302.d:0 "Corin enseigne qu'il appartient à chaque individu de faire sa part dans la lutte contre la tyrannie et le mal, et nombre de fidèles ont créé des organisations pour faire avancer la cause de Corin. Promouvoir officiellement l'un de ces ordres pourrait aider dans la lutte contre le mal.[GetBalgarOrderSummary][GetCorinOrderSummary][GetFalahOrderSummary][GetNathalyneOrderSummary]"
 balgar_order_summary:0 "\n\nLes Balgarites de la Forge-Dragon cherchent à émuler les grandes constructions militaires de leur dieu patron. Ils considèrent qu'il est de leur devoir d'utiliser leurs compétences pour alimenter la guerre de Corin."
 corin_order_summary:0 "\n\nZélotes Corinites est un terme générique désignant les zélotes corinites militants. Cette foule souhaite combattre le mal et convertir les incroyants par tous les moyens nécessaires, bien que leur manque d'organisation puisse souvent causer troubles et destruction."
 falah_order_summary:0 "\n\nLes Croisés Cramoisies sont un ordre de croisés dévoués à Falah. Ils considèrent qu'il est de leur devoir de guider leurs compagnons guerriers saints et d'apporter une direction à la croisade de Corin."
 nathalyne_order_summary:0 "\n\nLa Maison de Lumière applique les talents de Nathalyne à la lutte de Corin. Là où d'autres croisés combattent le mal qui montre son visage, ils cherchent à mettre en lumière le mal qui rôde dans l'ombre."
 corinite.302.a:0 "Nous promouvrons les Balgarites de la Forge-Dragon"
