 no_order_summary:0 ""
 corinite.300.t:0 "Choisir un Ordre pour Aider à Organiser les Fidèles"
 corinite.300.d:0 "Corin enseigne qu'il appartient à chaque individu de faire sa part dans la lutte contre la tyrannie et le mal, et nombre de fidèles ont créé des organisations pour faire avancer la cause de Corin. Promouvoir officiellement l'un de ces ordres pourrait nous aider à organiser les fidèles.[GetBeggaOrderSummary][GetDameOrderSummary][GetEsmaryalOrderSummary][GetNeratOrderSummary]"
 corinite.300.a:0 "Nous promouvrons les Moines de la Charité Tacite"
 begga_order_summary:0 "\n\nLes Moines de la Charité Tacite sont un ordre de moines itinérants ayant fait vœu de pauvreté au nom de Begga. Ils parcourent le pays en aidant quiconque a besoin d'aide."
 dame_order_summary:0 "\n\nLes Philosophes de la Nouvelle Lune sont un groupe d'érudits damiens cherchant à comprendre la nature du divin. Ils voient la Réforme Corinite comme une opportunité de rejeter les chaînes de la doctrine traditionnelle dans la quête des mystères divins."
 esmaryal_order_summary:0 "\n\nLes Douairières sont une petite secte de prêtresses d'Esmaryal qui considèrent comme leur mission de guider Corin vers un digne dirigeant de la Cour. On les trouve souvent comme conseillères des souverains corinites."
 nerat_order_summary:0 "\n\nLes Chevaliers-Tombeaux de Gallowspeak soulignent l'importance de l'ordre et de la justice de Nerat même au sein de la nouvelle Cour de Corin. Leur mission principale est de contenir ceux dont le zèle les conduit involontairement à commettre le mal et la destruction."
