 crimson_deluge_province:0 "Affectée par le Déluge Cramoisi"
 crimson_deluge_province_desc:0 "Cette province est occasionnellement frappée par de fortes pluies qui ressemblent à du sang, signe que Corin et Adean s'affrontent pour le Trône Régent."
 crimson_deluge_province_heavy:0 "Lourdement Affectée par le Déluge Cramoisi"
 crimson_deluge_province_heavy_desc:0 "Cette province est inondée par des pluies torrentielles qui ressemblent à du sang, signe que Corin et Adean s'affrontent pour le Trône Régent."

 ravelian.1.t:0 "La Société Ravélienne"
 ravelian.1.da:0 "La Société Ravélienne, un groupe informel d'universitaires et de réformistes qui se rassemblent pour discuter de toutes sortes de sujets à travers le prisme de la logique et de la raison plutôt que de la superstition, est venue officiellement demander un espace public en [Root.GetName].\n\nSoutenir leur présence en [Root.GetName] pourrait être bénéfique si nous souhaitons rester pertinents en ces temps modernes. Cependant, ils se sont avérés être des opposants vocaux de ce qu'ils considèrent comme injuste et faux, et pourraient devenir une épine indésirable contre notre État."
 ravelian.1.db:0 "Alors que la foi de Corin se répand à travers Cannor, parlant de l'injustice des dieux de la Cour Régente, une petite scission composée à l'origine de Corinites a commencé à réfléchir aux implications plus larges de défier le statu quo : quels autres secrets du monde existent, et quels autres mensonges et demi-vérités ont égaré le peuple ?\n\nS'appelant eux-mêmes la Société Ravélienne, du mot « Démêler », ce petit mais soudé groupe d'universitaires, de réformistes et de nobles libéraux souhaite trouver un lieu sûr pour le discours afin de discuter d'un large éventail de sujets avec le prisme de la raison et de la logique, plutôt que de la superstition."
 ravelian.1.dc:0 "La Société Ravélienne, un puissant groupe d'universitaires, de réformistes et de radicaux qui se rassemblent pour discuter de toutes sortes de sujets à travers le prisme de la logique, de la raison et de la vérité inébranlable, est venue officiellement demander un espace public en [Root.GetName]. Bien que l'incarnation initiale de la société fût réservée à l'élite éduquée, depuis leurs études du Fragment Divin, ils ont également commencé à accueillir les gens du commun et à aider aux œuvres de charité à travers leurs sphères d'influence.\n\nSoutenir leur présence en [Root.GetName] pourrait être bénéfique si nous souhaitons rester pertinents en ces temps modernes, et peut-être même aider les plus nécessiteux. Cependant, ils sont réputés pour être des opposants vocaux de ce qu'ils considèrent comme injuste et faux, parfois devenant trop zélés avec leurs croyances, ce qui pourrait en effet devenir une épine indésirable contre notre État."
 ravelian.1.dd:0 "La Société Ravélienne était un groupe d'universitaires et de réformistes cannoriens se concentrant sur l'examen du monde à travers le prisme de la logique et de la superstition. De nos jours, cependant, ils semblent avoir été saisis d'un zèle renouvelé que l'on ne voit que chez les plus dévots des clercs, peut-être en raison de l'influence d'un artefact précurseur sous leur étude connu sous le nom de Fragment Divin.\nLe Fragment Divin fut découvert ici même en Aelantir, et maintenant, de nombreux membres de la Société Ravélienne affluent pour établir des loges et des avant-postes de recherche en Aelantir.\n\nLes accepter pourrait éventuellement causer des bouleversements dans nos colonies, bien que leurs liens avec les riches de Cannor puissent apporter de grands bienfaits au développement de notre pays."
 ravelian.1.a:0 "Bienvenue aux Ravéliens en [Root.GetName]."
 ravelian.1.b:0 "Ils peuvent trouver un autre endroit pour se rassembler."
 ravelian.1.c:0 "Interdire toute future formation de société ravélienne dans tout le pays."
 ravelian.1.c.tt:0 "§YCela fermera également toutes les loges et chapitres ravéliens dans nos provinces.§!"
 ravelian.2.t:0 "Loge Régionale pour la Société Ravélienne"
 ravelian.2.d:0 "La Société Ravélienne a connu un grand succès en [Root.GetName], et ce qui était autrefois de modestes rassemblements dans de petites demeures ou des cafés s'est maintenant fréquemment répandu dans les rues en de grands débats et sphères publiques de conversation auxquelles même l'homme du commun peut assister et apprendre.\n\nLa Société nous a demandé s'ils peuvent acheter un grand bâtiment et établir une Loge, faisant de [Root.GetName] un quartier général régional pour toutes les affaires de la société."
 ravelian.2.a:0 "Ouvrir la Loge et prendre leur or !"
 ravelian.2.b:0 "Merci, mais non merci"
 ravelian.3.t:0 "Avènement du Rectorat Ravélien"
 ravelian.3.d:0 "L'influence de la Société Ravélienne a été omniprésente dans nos terres, et ces érudits sont passés d'un groupe cloîtré d'intellectuels à des leaders religieux communautaires qui ont élevé, soigné et instruit les gens du commun. En raison de la petite taille de notre État, les dirigeants de la loge régionale, soutenus par des représentants de la communauté, nous ont demandé de nous réformer en un nouvel État religieux appelé le Rectorat Ravélien."
 ravelian.3.a:0 "Devenir le Rectorat"
 ravelian.3.b:0 "Décliner poliment"
 ravelian_chapter_lodge_convert_tt:0 "Chaque province possédée avec un §YChapitre de la Société Ravélienne§! se convertira au §YRavélianisme§!.\nChaque province possédée avec une §YLoge de la Société Ravélienne§! se convertira au §YRavélianisme§! et sera le siège d'une Véridicale."
 ravelian_chapter_lodge_convert_nc_tt:0 "Chaque province possédée avec un §YChapitre de la Société Ravélienne§! se convertira au §YRavélianisme§!.\nChaque province possédée avec une §YLoge de la Société Ravélienne§! se convertira au §YRavélianisme§!."
 ravelian.4.t:0 "Avènement du Rectorat Ravélien"
 ravelian.4.d:0 "L'influence de la Société Ravélienne a été omniprésente dans nos terres, et ces érudits sont passés d'un groupe cloîtré d'intellectuels à des leaders religieux communautaires qui ont élevé, soigné et instruit les gens du commun. Leurs enseignements ont véritablement résonné avec le peuple [Root.GetAdjective] et sont devenus une cause populiste, beaucoup professant lire les pamphlets de la société quotidiennement, et même adhérant à leurs révélations et enseignements d'une religion fondée sur les attentes modernes de vérité et de raison.\n\nLa Société, avec le soutien du peuple, a demandé à [Root.Monarch.GetName] de leur permettre de créer un État Ravélien indépendant pour faciliter la création de la première religion véritablement organisée de Cannor. Avec un soutien populiste, ils ont également suggéré que notre [Root.Monarch.GetTitle] se convertisse à ce système de croyance déjà populaire qu'ils ont cultivé, connu sous le nom de « Ravélianisme »."
 ravelian.4.a:0 "Leur vendre le terrain et se convertir au Ravélianisme"
 ravelian.4.b:0 "Vendre le terrain, mais bannir leurs fidèles de notre royaume !"
 ravelian.4.c:0 "Je me demande quelle sera leur histoire ?"
 ravelian.4.e:0 "Jamais ! Refuser la pétition."
 ravelian.5.t:0 "Fondation de la Religion Ravélienne !"
 ravelian.5.d:0 "La Société Ravélienne était à l'origine un groupe d'intellectuels cherchant la raison et l'empirisme pour découvrir la vraie nature du monde. Avec leurs recherches sur le Fragment Divin il y a des décennies, la société a finalement découvert ce qu'ils prétendent être une vérité fondamentale dans le monde : qu'il n'y a qu'un seul Dieu, et que les elfes précurseurs ont volé la magie à Lui, Le tuant presque dans le processus. Avec leurs révélations, ils se sont rendus indispensables aux masses, les élevant et prenant soin d'elles quand les nations à travers Cannor ont échoué, et apportant l'espoir à une populace qu'un Dieu omnipotent et bienveillant existe, et qu'Il est bon : ce qui est bien loin des querelles dynastiques et des personnalités et croyances imparfaites de la Cour Régente et de la foi Corinite.\n\nLes adeptes de cette nouvelle foi appellent leurs cousins à suivre cette nouvelle religion, et à suivre les volontés de Dieu, pas les volontés des rois. La Société Ravélienne n'est plus, et à sa place est l'Église Ravélienne."
 ravelian.5.a:0 "La Vérité Vous Rendra Libres"
 ravelian.5.b:0 "Intéressant"
 ravelian.7.t:0 "Le Fragment Divin Volé !"
 ravelian.7.d:0 "Après avoir refusé sa demande d'étudier le Fragment Divin avec la Société Ravélienne, Torrieth, l'archéologue qui a découvert le fragment, a disparu dans la nuit et a emporté le Fragment Divin avec elle !\nElle est partie depuis longtemps maintenant, et seul le temps dira si quelque chose résultera jamais de sa folie."
 ravelian.7.a:0 "Cieux cendrés !"
 ravelian.9.t:0 "La Société Ravélienne Étudie le Fragment Divin"
 ravelian.9.da:0 "La Société Ravélienne et notre pays ont conjointement révélé au grand public l'existence du « Fragment Divin », un artefact précurseur qui abriterait les derniers fragments d'un dieu précurseur, ou d'un Dieu unique, et serait également la source de toute magie dans le Plan Matériel Primaire. Travaillant avec notre ancienne cheffe d'expédition, et maintenant principale érudite sur le fragment, l'archéologue elfe Torrieth, les Ravéliens voient maintenant ce fragment comme leur meilleur espoir de démêler les secrets de ce monde."
 ravelian.9.db:0 "La Société Ravélienne a révélé qu'ils ont acquis un artefact précurseur qu'ils appellent le « Fragment Divin », avec cette maudite voleuse Torrieth en plus ! Il est trop tard pour arrêter leur folie maintenant, et il semble que la Société Ravélienne dans son ensemble soit devenue obsédée par cet artefact tout comme Torrieth le fut ! Seule la folie peut en résulter !"
 ravelian.9.dc:0 "La Société Ravélienne a révélé qu'ils ont acquis un artefact précurseur qu'ils appellent le « Fragment Divin ». Cet éclat en forme de poing serait l'origine de toute magie dans le Plan Matériel Primaire (notre monde), et les elfes précurseurs auraient volé et disséminé la magie d'un dieu qu'ils avaient vaincu et lié dans ce fragment. Que ce soit vrai ou non, les murmures disent que les bruits aigus du fragment sont en fait un langage que la société a commencé à déchiffrer avec l'aide de la découvreuse originale du fragment, la célèbre archéologue elfe Torrieth.\n\nPas grand-chose d'autre ne résulte de cette révélation, bien qu'il semble que la Société Ravélienne dans son ensemble soit devenue éprise de cet artefact, car il semble maintenant être leur meilleur espoir de démêler les secrets de ce monde."
 ravelian.9.a:0 "Qui sait ce qui en résultera ?"
 ravelian.11.t:0 "Le [Root.ravelian_councils] Débat Ravélien : [Root.ravelian_councils_desc]"

 ravelian.11.da:0 "La Cour Régente croit que lorsque vous mourez, vous êtes jugé par Nerat, et selon que vous avez vécu selon les idéaux de votre divinité patronne détermine si vous allez en Enfer, servez pénitence dans les armées de Nerat contre l'Enfer, ou vivez votre vie dans un paradis bienheureux dans le plan divin respectif de votre divinité. Bien que la nature des Plans Infernaux et du Plan Fugitif de Nerat ait été confirmée par d'innombrables témoignages de démons liés dans des cercles d'invocation et de Faucheurs Rouges aperçus chassant les morts-vivants, c'est la nature des Plans Célestes qui a échappé à la majeure partie du monde moderne... jusqu'à maintenant.\n\nDe grandes recherches et incursions dans la liaison planaire ont permis à l'Église Ravélienne de contacter et de communiquer avec un grand nombre d'êtres célestes et ont discerné qu'ils sont eux aussi aussi perdus que nous. Leurs croyances et leur folklore sont tout aussi divers et enveloppés de mystère que les nôtres, mais une chose persiste : l'équivalent de leur fondateur ou créateur est mort, et leurs mythes d'origine contiennent tous une patrie ancestrale dont leur race est originaire.\n\nCette révélation, combinée à de nouvelles transcriptions du Fragment Divin et au recoupement des points communs des mythes dans les cultures et religions de notre monde, a conduit aux conclusions suivantes : le Paradis existe, mais ses portes sont closes et son emplacement oublié avec la quasi-mort du Dieu Unique. Le Plan Fugitif existe, mais pas de la manière que nous connaissons. Ce n'est pas un demi-plan associé au Plan des Ombres, mais plutôt un Domaine Fugitif, une entité politique qui existe au sein du Plan des Ombres lui-même. Là, les morts sont jugés mais pas par Nerat, mais par des anges célestes de la mort (vêtus de rouge). Non seulement cela, mais les pouvoirs des célestes et des infernaux fluctuent en fonction de la croyance en leurs créateurs. Puisque la croyance en un Dieu Unique a faibli, les pouvoirs des célestes aussi, expliquant leur absence dans le Plan Matériel Primaire.\n\nC'est avec cela que l'Église Ravélienne croit maintenant plus que jamais que révéler la vérité d'un Dieu Unique au monde est primordial, et qu'en restaurant la foi en Dieu, les portes du Paradis s'ouvriront et le salut pourra être atteint par tous, mortels et célestes.\n\nLe Débat Ravélien en question porte maintenant sur : comment atteindre le salut et renforcer Dieu en premier lieu ?\n\n§RDoctrine Zélote§!\nLa conversion n'est que la première étape. Le mythe de la Cour Régente d'émuler les idéaux de votre patron est la vérité. Dieu est bon et veut que nous soyons bons. Nous devons accomplir de Bonnes Œuvres pour l'église, nous-mêmes et les uns les autres si nous voulons vraiment renforcer Dieu.\n\n§BDoctrine Érudite§!\nC'est la vraie croyance et la compréhension seules qui renforcent Dieu. Non seulement connaître, mais véritablement comprendre la Vérité est ce dont la foi est faite, et en tant que tel, nous ne pouvons atteindre le vrai salut qu'en méditant sur les vérités qui nous ont été révélées !"

 ravelian.11.db:0 "Le dernier Débat Ravélien ayant établi la nécessité de convertir le plus de gens possible à la foi pour renforcer Dieu et assurer le salut de tous, le Second Débat Ravélien traite des affaires internes de l'église et de la meilleure façon d'y parvenir :\n\n§RDoctrine Zélote§!\nL'hérésie et l'ignorance volontaire sont répandues à travers le monde, et s'ils ne veulent pas embrasser la vérité par le débat et un esprit ouvert, alors ils doivent être sauvés par la force. L'Inquisition Ravélienne permettra à notre foi de se répandre comme un incendie et de sauver les ignorants d'eux-mêmes. Les inquisiteurs s'assureront également que ceux qui pratiquent la magie le font sous l'approbation de l'Église, car la magie est un don de Dieu et ne doit pas être gaspillée dans les arts sombres et les œuvres impies, à moins qu'ils ne souhaitent rejoindre les hérétiques sur le bûcher.\n\n§BDoctrine Érudite§!\nSi les païens et les hérétiques refusent d'entendre notre vérité, alors c'est l'échec de l'Église, pas la faute des non-convaincus. Les fausses conversions n'aideront pas à déverrouiller le Paradis. Nous devons maintenir un discours public et cordial avec eux en tout temps, et ouvrir nos esprits pour apprendre de leurs versions de la vérité, et peut-être un jour, nous atteindrons de nouvelles révélations ensemble !"

 ravelian.11.dc:0 "L'idée qu'il n'y a qu'un seul Dieu est étrange. Rarement les fois du monde nient l'existence de tous les autres dieux, et même les Bulwari disent que « tous les dieux sont morts sauf le nôtre », pas « tous les dieux n'existent pas sauf le nôtre ». En effet, la nature englobante et toute-puissante de Dieu a signifié que nous avons trouvé de nombreux points communs dans d'autres dieux pour les intégrer dans notre idée d'adorer le Dieu Unique. En examinant les figures divines à travers Halann de manière holistique, les érudits de l'église ont déterminé que les « dieux » mineurs, comme Surael, ne sont en fait que des facettes, ou aspects, du Dieu Unique. Car Dieu est Tout, et en tant que tel peut porter de nombreux visages.\n\nDe plus, les recherches sur le fonctionnement interne des figures divines à travers l'histoire comme l'avatar Corin ont révélé qu'elle, ainsi que d'autres avatars éminents, était imprégnée de pouvoirs d'un autre monde, et que si la magie est effectivement d'origine divine, alors elle n'est qu'une puissante mage dotée de la capacité naturelle de manier la magie, plutôt que de la contrôler et de la dompter comme le font les sorciers. Nous l'avons déclarée, elle et d'autres individus extraordinaires qui ont sans aucun doute reçu la providence divine (comme Aldresia en arrêtant la Peste Blanche) comme les premiers Saints de l'Église Ravélienne.\n\nAvec ces révélations, la question s'est posée de savoir comment aborder ce sujet en termes de conversion du reste du monde.\n\n§RDoctrine Zélote§!\nDe nombreuses cultures ont des figures héroïques et des dizaines de divinités. Nous devons utiliser la Sainteté comme une paume ouverte pour les accueillir dans le giron avec facilité, même si cela signifie assouplir nos restrictions sur la canonisation de nouveaux saints. Leurs héros sont nos saints, car Dieu travaille véritablement de manière mystérieuse, et si Dieu n'avait pas donné à ces figures de légende la providence divine alors assurément ils n'auraient pas été couronnés de succès ?\n\n§BDoctrine Érudite§!\nOuvrir notre foi pour accepter n'importe qui et tout le monde comme saints, et à Dieu ne plaise, comme aspects, est une moquerie des ambitions originales de la Société Ravélienne de démêler la vérité de ce monde. Nous devons scruter chaque saint, chaque aspect, chaque religion et chaque culture avec un œil rationnel. Nous ne devons pas craindre de contrarier et de détruire les chances de convertir le peuple si cela signifie éroder le cœur même de ce que nous croyons !"

 ravelian.11.dd:0 "L'Église a toujours soutenu la croyance que la magie est divine. C'est au fondement même du Péché Originel pour la foi, car les elfes précurseurs avaient été impatients et ont volé la magie à Dieu, au lieu d'attendre que Dieu leur accorde la magie quand le moment serait venu comme Il le fit avec les dragons.\n\nPendant très longtemps, la plupart des érudits ont été en désaccord avec cette idée que toute magie est divine, mais avec les avancées récentes dans la recherche sur la nature de la magie et le Fragment Divin, l'église a présenté une « Hypothèse de la Vraie Source de la Magie ». L'hypothèse est basée sur la théorie séculaire populaire de la « Magie Universelle » qui affirme que l'ancienne catégorisation de la magie en domaines comme divin, arcanique, bardique et runique est arbitraire, et était simplement une façon d'expliquer « comment » la magie était manipulée, plutôt que sa vraie nature. L'hypothèse ravélienne s'appuie sur cela et la combine avec les écritures existantes pour fournir suffisamment de preuves pour faire réfléchir même le plus acharné des sécularistes : il n'y a qu'un seul type de magie, mais ce type est divin, et Dieu est la vraie source de la magie !\n\nAvec ces révélations, l'attention de l'église s'est tournée vers l'utilisation de l'Artisanat Magique. Pendant longtemps, l'église a cru que l'Artisanat Magique était le grand égalisateur pour corriger les torts des elfes précurseurs, et permettait à tous, pas seulement à quelques-uns, de récolter les bénéfices de la magie. Les deux factions majeures de l'église ont proposé des positions conflictuelles sur l'avenir de l'Artisanat Magique dans la foi ravélienne.\n\n§RDoctrine Zélote§!\nLes grandes avancées dans l'Artisanat Magique ne sont pas seulement un moyen de corriger les péchés des elfes précurseurs, mais sont en fait le Décret de Dieu que *maintenant* est le moment de répandre Sa divinité à toutes Ses créations. Bien que tous ne puissent pas exploiter ou être dotés de magie, grâce à l'Artisanat Magique nous pourrions permettre au don divin de la magie d'être accessible à tous et chacun, qu'ils suivent actuellement nos croyances ou non. Cela devrait être fait quel qu'en soit le coût, et dès que possible, pour corriger les torts du passé.\n\n§BDoctrine Érudite§!\nLa magie devrait être partagée, oui, mais c'est à cause de la nature divine mais mystérieuse de la magie qu'elle devrait être partagée avec soin et vigilance. L'Artisanat Magique lui-même n'est pas seulement un travail saint mais un travail qui requiert beaucoup de temps, de patience et de délibération. Les bonnes œuvres que l'Artisanat Magique peut donner au monde doivent être équilibrées avec une méthodologie fortement scrutée et sanctifiée, et si cela signifie retenir de grandes avancées de la vie quotidienne pour s'assurer que c'est fait correctement, garder les dons de Dieu pour les fidèles uniquement, ou même retenir des méthodes et inventions plus sombres et interdites des masses pour leur propre sécurité, qu'il en soit ainsi."

 ravelian.11.a:0 "Que les Débats Ravéliens commencent !"
 ravelian.12.t:0 "Le [Root.ravelian_councils] Débat Ravélien est Terminé"
 ravelian.12.da:0 "Le Premier Débat Ravélien, portant sur la nature du paradis, de l'enfer et du salut, est terminé.\n\n§B(La Connaissance Démêlée sera réinitialisée à 0 % et pourra à nouveau être augmentée jusqu'à 100 %, déclenchant un autre Débat Ravélien)§!"
 ravelian.12.db:0 "Le Second Débat Ravélien, portant sur l'approche de l'église envers la conversion et le travail missionnaire, est terminé.\n\n§B(La Connaissance Démêlée sera réinitialisée à 0 % et pourra à nouveau être augmentée jusqu'à 100 %, déclenchant un autre Débat Ravélien)§!"
 ravelian.12.dc:0 "Le Troisième Débat Ravélien, portant sur les préceptes entourant la sainteté et les autres dieux en tant qu'aspects d'un Dieu Unique, est terminé.\n\n§B(La Connaissance Démêlée sera réinitialisée à 0 % et pourra à nouveau être augmentée jusqu'à 100 %, déclenchant un autre Débat Ravélien)§!"
 ravelian.12.dd:0 "Le Quatrième Débat Ravélien, portant sur la nature divine de la magie et le rôle de l'Artisanat Magique dans le monde, est terminé.\n\n§B(C'est le dernier Débat Ravélien.)§!"
 ravelian.12.a:0 "Excellent."
 UNFINISH_COUNCIL_OF_TRENT:0 "Un nouveau §YDébat Ravélien§! va commencer.\n"
 ravelian.13.t:0 "Le [Root.ravelian_councils] Concile Ravélien"
 ravelian.13.daa:0 "Vous avez une véridicale. Le Premier Concile Ravélien va commencer. Vous devriez donc voter."
 ravelian.13.dab:0 "Vous n'avez pas de véridicale. Le Premier Concile Ravélien va commencer."
 ravelian.13.dba:0 "Vous avez une véridicale et le Second Concile Ravélien va commencer. Vous devriez donc voter."
 ravelian.13.dbb:0 "Vous n'avez pas de véridicale et le Second Concile Ravélien va commencer."
 ravelian.13.dca:0 "Vous avez une véridicale et le Troisième Concile Ravélien va commencer. Vous devriez donc voter."
 ravelian.13.dcb:0 "Vous n'avez pas de véridicale et le Troisième Concile Ravélien va commencer."
 ravelian.13.dda:0 "Vous avez une véridicale et le Quatrième Concile Ravélien va commencer. Vous devriez donc voter."
 ravelian.13.ddb:0 "Vous n'avez pas de véridicale et le Quatrième Concile Ravélien va commencer."
 ravelian.13.a:0 "Nous avons une Véridicale, nous pouvons voter"
 ravelian.13.b:0 "Nous n'avons pas de Véridicale, nous ne pouvons qu'attendre et voir"
 ravelian.15.a1:0 "Le concile décide le Salut par les Bonnes Œuvres"
 ravelian.15.a2:0 "Le concile décide le Salut par la Méditation"
 ravelian.15.b1:0 "Le concile décide l'Inquisition Ravélienne"
 ravelian.15.b2:0 "Le concile décide la Conversion par le Discours"
 ravelian.15.c1:0 "Le concile décide la Prééminence des Saints"
 ravelian.15.c2:0 "Le concile décide la Scrutinisation des Aspects"
 ravelian.15.e1:0 "Le concile décide l'Artisanat Magique pour les Masses"
 ravelian.15.e2:0 "Le concile décide l'Artisanat Magique Sanctifié"
 ravelian.21.t:0 "La Société Ravélienne Fuit"
 ravelian.21.da:0 "La Société Ravélienne a fui de toutes les provinces que nous avons conquises. Ils pensent que leur intellectualisme est incompatible avec nos « manières non civilisées »."
 ravelian.21.db:0 "Les loges et chapitres de la Société Ravélienne ont été fermés dans toutes les provinces que nous avons conquises, en raison d'une interdiction préexistante de leur organisation."
 ravelian.21.a:0 "Bon débarras !"
 ravelian.21.b:0 "Bon débarras, mais ne m'informez plus de cela à l'avenir."
 tooltip_remove_ravelian_chapters:0 "Toutes les provinces conquises perdront les modificateurs de province §YLoge Ravélienne§! et §YSociété Ravélienne§!"
 ravelian.22.t:0 "Événement Caché"
 ravelian.22.d:0 "Événement Caché"
 ravelian.22.a:0 "Événement Caché"
 tooltip_enable_ravelian_epiphany_empire:0 "\nAvec la foi établie, les Ravéliens peuvent maintenant contester la position de l'Empire d'Anbennar sur sa Foi Officielle.\nL'§YIncident de l'Épiphanie Ravélienne§! sera disponible pour l'Empire d'Anbennar si une §Ymajorité de provinces§! au sein de l'empire se convertissent au §YRavélianisme§!."
 ravelian.23.t:0 "Le Nouvel État Ravélien"
 ravelian.23.d:0 "La profonde dévotion des Ravéliens a éveillé un désir d'un État indépendant gouverné par les Hauts Recteurs de l'Église. Comme notre nation a connu le plus grand afflux de convertis ravéliens, de larges pans de notre population ont exprimé leur soutien à l'idée d'un tel établissement et se sont maintenant tournés vers $MONARCH$ pour approbation."
 ravelian.23.a:0 "Refuser"
 ravelian.23.b:0 "Devenir le Rectorat"
 ravelian.24.t:0 "Le Nouvel État Ravélien"
 ravelian.24.d:0 "Il nous attriste vraiment de voir que les domaines du Haut-Rectorat ont presque tous disparu. La dévotion de notre nation à comprendre la Vérité fait de nous le candidat idéal pour établir un nouvel État Ravélien. $MONARCH$ devrait-il être mis à la tâche, ou devrions-nous simplement céder une province à nous pour former la base de l'État saint ?"
 ravelian.24.a:0 "Accepter"
 ravelian.24.b:0 "Refuser"
 ravelian.25.t:0 "Origines de la Foi"
 ravelian.25.d:0 "Avec l'essor du Ravélianisme, le site où le Fragment Divin fut découvert s'est transformé en un lieu de culte révéré pour les adeptes de la foi. Servant de destination ultime pour ceux sur le Chemin de la Vérité, des pèlerins de contrées lointaines affluent vers ce sol sacré cherchant l'illumination spirituelle et la communion avec le seul vrai Dieu. Ce qui était autrefois un simple site archéologique a maintenant évolué en un centre florissant de culte."
 ravelian.25.a:0 "Que leur voyage soit sûr"

 ravelian.101.t:0 "Traduction Précurseur"
 ravelian.101.d:0 "Un membre de la Société Ravélienne dans notre pays demande des fonds pour traduire un grand texte précurseur récemment découvert. Le contenu serait utilisé en premier lieu par notre pays, et le reste de Cannor saurait que nous finançons d'importantes recherches qui bénéficieront à tous à terme."
 ravelian.101.a:0 "Les financer"
 ravelian.101.b:0 "Refuser leur demande !"
 ravelian.102.t:0 "Tutorat Ravélien ?"
 ravelian.102.d:0 "Notre jeune héritier [Root.Heir.GetName] s'est récemment intéressé à la façon de penser de la Société Ravélienne, et nous a demandé si nous pouvions lui engager un tuteur pour le préparer au monde moderne à venir."
 ravelian.102.a:0 "Bien sûr"
 ravelian.102.b:0 "Je ne veux pas de leurs idées dans ta tête !"
 ravelian.103.t:0 "Découvertes Nouvelles"
 ravelian.103.d:0 "Un membre de la Société Ravélienne a récemment régalé notre cour de ses découvertes et théories. Tandis que certains à la cour sont devenus complètement absorbés par ses découvertes, d'autres apprécient simplement la folie et la passion que de tels érudits ont pour de telles trivialités. Néanmoins, la cour est impressionnée."
 ravelian.103.a:0 "Excellent !"
 ravelian.104.t:0 "La Société Ravélienne Investit à [ravelian_society_province.GetName]"
 ravelian.104.d:0 "Diverses entreprises et commerces à [ravelian_society_province.GetName] ont bénéficié d'un grand soutien de la Société Ravélienne locale."
 ravelian.104.a:0 "Les affaires prospèrent !"
 ravelian.105.t:0 "Perspicacité Ravélienne"
 ravelian.105.d:0 "Les membres de la Société Ravélienne voyagent régulièrement pour partager nouvelles et découvertes les uns avec les autres de tous les coins de Cannor, ce qui les rend généralement plus conscients des événements du monde que même l'érudit le mieux intentionné.\nUn membre de passage de la société a offert ses services pour devenir un élément permanent de votre cour pendant un temps, et disséminer sa perspicacité sur la façon de devenir un État plus moderne parmi vos courtisans... en échange de diverses distinctions pour ses efforts."
 ravelian.105.a:0 "Très bien"
 ravelian.105.b:0 "Nous n'avons pas besoin de votre aide !"
 ravelian.106.t:0 "Artificiers Ravéliens à [ravelian_society_province.GetName]"
 ravelian.106.d:0 "L'artisanat naissant de l'Artisanat Magique, c'est-à-dire le renforcement ou la création de nouveaux outils utilisant la magie et la technologie, a toujours été un favori de la Société Ravélienne. De nombreux artificiers éminents sont connus pour être membres de leurs chapitres ravéliens locaux, et un groupe de ces individus a apparemment investi à [ravelian_society_province.GetName] pour créer divers ateliers pour leurs recherches."
 ravelian.106.a:0 "Bien !"
 ravelian.107.t:0 "Des Pamphlets Ridiculisent le Clergé !"
 ravelian.107.d:0 "Les membres de la Société Ravélienne ont toujours été connus pour être des libres-penseurs, des radicaux et des non-conformistes, mais il semble que cela ait maintenant atteint un point critique.\nDes pamphlets mystérieux apparaissent du jour au lendemain lançant toutes sortes d'insultes contre $ESTATE_CHURCH$. Les rapports disent même qu'à un moment, il y avait un poème lyrique se moquant du Grand Prêtre !\n\nBien que le clergé soit clairement outragé, il semble que les pamphlets soient largement une œuvre comique contre les absurdités des coutumes cléricales."
 ravelian.107.a:0 "Les mots ne sont que des mots"
 ravelian.107.b:0 "Défendre $ESTATE_CHURCH$"
 ravelian.108.t:0 "[Root.Monarch.GetTitle] Invité à un Débat"
 ravelian.108.d:0 "La Société Ravélienne est connue pour parfois tenir des débats avec ceux de l'extérieur de la société, et maintenant il semble que [Root.Monarch.GetTitle] [Root.Monarch.GetName] ait été invité à un tel événement ! De nombreux membres de la cour y assistent également, et c'est devenu l'un des événements les plus attendus de la saison.\n\nSoyez averti, cependant, que la participation à l'événement est obligatoire : on doit débattre, pas écouter."
 ravelian.108.a:0 "Refuser d'y aller"
 ravelian.108.b:0 "Euh, je pense avoir fait quelques points décents..."
 ravelian.108.c:0 "Quelle soirée stimulante ! J'ai appris une chose ou deux !"
 ravelian.109.t:0 "La Société Ravélienne Ridiculise le Souverain"
 ravelian.109.d:0 "Pour beaucoup de ceux à l'extérieur, la Société Ravélienne semble être un groupe de quasi-intellectuels élitistes dont le seul but est de prétendre être meilleurs que tout le monde.\n\nIl semble que le groupe ait récemment eu [Root.Monarch.GetName] dans leur ligne de mire, répandant des rumeurs sur ses qualités embarrassantes."
 ravelian.109.a:0 "Euh, er, je ne parle pas comme, attendez. Si ? Ou, non..."
 ravelian.109.b:0 "Quels mots pittoresques ! Envoyez-leur notre appréciation !"
 ravelian.109.c:0 "« Un individu grossier et borné ?! » Gardes !"

 ravelian.200.t:0 "Des Gens du Commun Rejoignent les Ravéliens ?"
 ravelian.200.d:0 "La Société Ravélienne a toujours été connue comme réservée à l'élite intellectuelle, mais maintenant il semble qu'avec les rumeurs de leur acquisition de ce soi-disant « Fragment Divin », ils aient commencé à accueillir même le paysan le plus pauvre et non éduqué dans leurs rangs !\n\nLeur intégration dans les affaires de la société a éveillé la conscience publique à [ravelian_society_province.GetName], pour le meilleur ou pour le pire !"
 ravelian.200.a:0 "Intéressant..."
 ravelian.201.t:0 "Les Ravéliens Tiennent des Cours d'Alphabétisation"
 ravelian.201.d:0 "Beaucoup de gens plus pauvres en [Root.Country.GetName] n'ont jamais appris à lire ou écrire, ne comprenant que des mots et lettres de base... jusqu'à maintenant. Les Ravéliens ne se cachent plus dans leurs halls et chambres exclusifs pour discuter des secrets du monde, mais utilisent maintenant leur savoir pour aider l'homme du commun à avoir une vie meilleure. Des foules de ces étudiants potentiels ont créé des salles de classe improvisées sur les places et les marchés, écoutant attentivement leurs tuteurs ravéliens.\n\nBeaucoup ont déjà utilisé leurs nouvelles connaissances pour trouver un meilleur avenir, mais certains de vos officiels suggèrent que ce genre de pratique devrait être réservé à l'élite, à moins que vous ne vouliez une populace plus consciente et exigeante..."
 ravelian.201.a:0 "Laisser les cours continuer"
 ravelian.201.b:0 "Mettre fin à cela !"
 ravelian.202.t:0 "Les Ravéliens Aident les Nécessiteux"
 ravelian.202.d:0 "La guerre et la dévastation ont atteint [ravelian_society_province.GetName], mais il semble qu'un sauveur inattendu soit venu à notre aide.\nLa Société Ravélienne, au lieu de se cacher dans ses loges et domaines, a été vue fournissant aumônes et aide à ceux qui souffrent dans la province, et investissant une grande partie de ses propres ressources pour réparer les terres brisées. Il semble que ce nouveau Fragment Divin qu'ils étudient leur ait appris quelque chose sur la vraie contribution à la société quotidienne."
 ravelian.202.a:0 "Une surprise certes, mais bienvenue"
 ravelian.203.t:0 "Éveil de la Conscience Publique"
 ravelian.203.d:0 "Les Ravéliens se sont généralement gardés entre eux, mais il semble que le grand nombre de chapitres et de loges de la société dans notre pays ait conduit à un grand discours public sur un grand nombre de choses, des injustices du monde à l'inefficacité du gouvernement, en passant par des demandes accrues de tout et n'importe quoi, de l'autonomie à l'éducation et tout ce que la populace peut imaginer !"
 ravelian.203.a:0 "Les masses s'éveillent, semble-t-il"
 ravelian.204.t:0 "Action Sociale Ravélienne"
 ravelian.204.d:0 "Nous avons reçu des nouvelles d'une grande initiative de la Société Ravélienne pour investir dans l'une de nos provinces les plus pauvres. Bien que les officiels locaux aient accueilli favorablement ces efforts, il semble que la société gagne encore un autre point d'appui dans notre royaume, augmentant encore son influence..."
 ravelian.204.a:0 "Nous accueillons l'aide"
 ravelian.204.b:0 "Travailler contre cette action sociale"
 ravelian.205.t:0 "Mages Ravéliens"
 ravelian.205.d:0 "Bien que la Société Ravélienne soit connue pour son travail dans l'Artisanat Magique, beaucoup d'entre eux sont en fait des sorciers et mages talentueux à part entière. Avec leurs récentes explorations du Fragment Divin, nous avons reçu des nouvelles de l'état $ESTATE_MAGES$ dans notre pays que la société a lentement mais sûrement gagné du pouvoir au sein de l'état. Certains affirment que ces Ravéliens prétendent maintenant que la magie est en fait d'origine divine, et que les mages ont le devoir de s'assurer qu'elle soit maniée correctement. D'autres déclarent simplement que c'est un résultat naturel de la popularité croissante de la société en général..."
 ravelian.205.a:0 "Je suppose que la magie est un domaine d'érudition, après tout"
 ravelian.206.t:0 "Prédicateur de Charité... Ravélien ?"
 ravelian.206.d:0 "Hérésie !\n\nUn membre éminent de la Société Ravélienne a été accusé d'hérésie, affirmant que c'est le devoir de chaque homme et femme d'être bon et de veiller les uns sur les autres en premier lieu, plutôt que la dévotion spécifique aux idéaux de leur divinité patronne choisie. Ce « prédicateur » et ses fidèles ont même créé une charité locale et une soupe populaire pour aider les plus nécessiteux, mais le clergé n'est pas convaincu.\nLes clercs locaux ont dénoncé ce prédicateur comme hérétique, bien que le Ravélien affirme purement qu'il partage ses opinions."
 ravelian.206.a:0 "Arrêter cet « hérétique »"
 ravelian.206.b:0 "S'il aide les nécessiteux, qu'il en soit ainsi"
 ravelian.207.t:0 "Artificiers Ravéliens"
 ravelian.207.d:0 "La Société Ravélienne et les $ESTATE_ARTIFICERS$ ont, pendant longtemps, grandi main dans la main, avec de nombreux premiers artificiers appartenant à la société elle-même.\nCependant, ces dernières années depuis que la société a mis la main sur le Fragment Divin, un schisme lent mais constant semble être apparu dans les rangs des artificiers de notre royaume.\n\nCeux de tendance ravélienne affirment que l'Artisanat Magique est depuis trop longtemps laissé sans contrôle, et que nous devons traiter l'Artisanat Magique comme s'il était un travail saint, et explorer ce nouvel artisanat éthiquement comme le Magisterium le fit avec la magie. Les artificiers traditionnels se moquent simplement de cette pensée rétrograde.\n\nLes Ravéliens, clairement en infériorité numérique, ont demandé notre aide, en échange de leur loyauté."
 ravelian.207.a:0 "Soutenir les Artificiers Ravéliens"
 ravelian.207.b:0 "Les laisser régler cela entre eux"

 ravelian.301.t:0 "Recteurs Absents"
 ravelian.301.d:0 "Les recteurs de notre pays prennent fréquemment de longs congés pour s'engager avec la communauté intellectuelle ravélienne plus large plutôt que de s'occuper des fidèles. Bien qu'il soit vrai qu'une grande partie de la foi consiste à investiguer et découvrir la vérité derrière le monde, cela laisse aussi beaucoup de nos rectorats, nos églises, sans surveillance pendant de longues périodes."
 ravelian.301.a:0 "Continuer à permettre leurs absences"
 ravelian.301.b:0 "Les restreindre pour assurer le bon fonctionnement des rectorats."
 ravelian.302.t:0 "Recteurs Traîtres"
 ravelian.302.d:0 "Bien que les prêtres de la foi ravélienne soumettent leur autorité ultime au Haut-Rectorat, ils sont toujours censés maintenir des liens de loyauté envers l'État. Certains recteurs dans notre pays ont commencé à partager des connaissances avec des érudits de notre rival [rival_country.GetName]. Bien qu'ils disent que c'est sous le prétexte d'œuvres pieuses, certains à notre cour pourraient voir cela comme [rival_country.GetName] nous prenant des avancées technologiques."
 ravelian.302.a:0 "Pour le bien de la connaissance et de la croissance, permettre que cela continue."
 ravelian.302.b:0 "Arrêter cela avant qu'ils n'apprennent quoi que ce soit !"
 ravelian.303.t:0 "Des Recteurs Partagent des Informations d'un Rival"
 ravelian.303.d:0 "Des Recteurs Ravéliens d'un de nos rivaux, [From.GetName], ont rencontré nos propres Recteurs régulièrement pour le discours théologique habituel. Naturellement, cela a aussi conduit à un échange d'idées, en plus d'une fuite de connaissances et de secrets d'État, qui ont été aimablement transmis par nos loyaux Recteurs aux officiels [Root.GetAdjective] concernés."
 ravelian.303.a:0 "Comme c'est altruiste de leur part"
 ravelian.304.t:0 "Damestear pour la Recherche"
 ravelian.304.d:0 "La Damestear est une météorite qui tombe du ciel composée de pure magie brute. Le Haut-Rectorat, dans sa quête d'exploration de la nature de l'univers, a demandé la moitié de la production du gisement à [damestear_province.GetName] pour aider leurs efforts de recherche."
 ravelian.304.a:0 "Tout pour la Connaissance"
 ravelian.304.b:0 "La mine est nôtre"
 ravelian.305.t:0 "Recherche sur les Reliques Précurseurs"
 ravelian.305.d:0 "Les mystères des Elfes Précurseurs sont un sujet majeur de recherche à des fins religieuses pour l'Église Ravélienne, après tout, leur relique principale, le Fragment Divin, serait la dernière essence d'un Dieu Unique Véritable. Ces reliques peuvent nous donner un aperçu de ce qu'était la vie à l'époque de l'Empire Précurseur, et peut-être quelles connaissances longtemps oubliées ils détenaient jadis. Le Haut-Rectorat demande la moitié des reliques de [relics_province.GetName] pour cette noble recherche."
 ravelian.305.a:0 "Pour la sainte recherche !"
 ravelian.305.b:0 "Les utiliser nous-mêmes est trop précieux"
 ravelian.306.t:0 "Percée Ravélienne sur la Damestear"
 ravelian.306.d:0 "Des érudits ravéliens [Root.GetAdjective] expérimentant et explorant la nature de la Damestear enfouie dans notre pays ont découvert de nouvelles informations sur la nature de la Damestear !"
 ravelian.306.a:0 "Incroyable !"
 ravelian.307.t:0 "Découverte de Relique Précurseur"
 ravelian.307.d:0 "Des érudits ravéliens [Root.GetAdjective] étudiant les reliques dans notre pays ont annoncé un ensemble de nouvelles découvertes et théories sur les mystères de l'Empire Précurseur. Cela aidera certainement dans leur quête de la vérité."
 ravelian.307.a:0 "Excellent !"
 ravelian.308.t:0 "Débat Public Stimulant"
 ravelian.308.d:0 "Un grand débat public a été tenu par l'église ravélienne locale à [Root.Capital.GetCapitalName] hier. Bien que rien de grande importance n'ait été discuté ou révélé, la nature publique du débat a donné aux érudits ravéliens un ensemble diversifié de nouvelles perspectives pour réfléchir."
 ravelian.308.a:0 "Bien"
 ravelian.309.t:0 "Une Révélation Discrédite les Nôtres"
 ravelian.309.d:0 "L'Église Ravélienne est animée par la quête de révélations : un ensemble de nouvelles découvertes grandes et petites qui peuvent nous en dire un peu plus sur la nature du monde.\n\nUne telle révélation, bien que mineure, a discrédité les travaux d'érudits [Root.GetAdjective], les embarrassant devant la communauté savante."
 ravelian.309.a:0 "C'est ce que c'est"
 ravelian.309.b:0 "Influencer le Rectorat pour reconsidérer"
 ravelian.310.t:0 "Demande de Subvention de Recherche"
 ravelian.310.d:0 "On dit que les Ravéliens dévoués soit recherchent soit prient.\n\nDans ce cas, un petit groupe d'érudits a demandé un financement pour l'un de leurs nombreux sujets d'intérêt qui pourrait être clé pour mener au prochain grand Débat Ravélien."
 ravelian.310.a:0 "Soutenir la recherche locale"
 ravelian.310.b:0 "Non"
 ravelian.311.t:0 "La Thèse Sponsorisée Échoue"
 ravelian.311.d:0 "Des membres de l'État ont sponsorisé une recherche à soumettre au Haut-Rectorat... mais nous avons reçu des nouvelles que les résultats ont été mal reçus. Nos propres érudits ont investi beaucoup de temps, d'efforts et d'argent dans cette thèse et travaillent à fournir plus de preuves pour leurs découvertes, mais d'autres suggèrent que nous coupions simplement nos pertes et abandonnions cette proposition."
 ravelian.311.a:0 "Continuez à travailler, et elle sera acceptée à terme"
 ravelian.311.b:0 "Abandonner la thèse"
 ravelian.312.t:0 "Érudit Ravélien"
 ravelian.312.d:0 "L'Église Ravélienne est une grande partisane de l'éducation, il n'est donc pas surprenant qu'un tel savant, une personne d'origine [Root.GetAdjective], se soit fait connaître à nous !\n\nIls ont offert leurs services à notre cour, mais certains suggèrent que ce grand esprit pourrait très bien être envoyé au Haut-Rectorat pour augmenter notre influence là-bas."
 ravelian.312.a:0 "Les envoyer au Rectorat"
 ravelian.312.b:0 "Nous pourrions utiliser leur expertise !"


 ravelian.400.t:0 "Des Chercheurs Demandent une Escorte"
 ravelian.400.d:0 "Des Chercheurs Ravéliens vous ont demandé une aide militaire pour une affaire délicate : la recherche sur la nature des célestes. Ils ne font pas confiance aux aventuriers pour tenir parole ou suivre leurs ordres directement, et se sont donc tournés vers nous pour un soutien."
 ravelian.400.a:0 "Fournir une escorte."
 ravelian.400.b:0 "Ils peuvent le faire eux-mêmes."
 ravelian.401.t:0 "Des Ravéliens Ruinent des Lieux de Sépulture"
 ravelian.401.d:0 "Un groupe d'érudits ravéliens a été capturé et mis au pilori à [cemetery_province.GetName] pour avoir saccagé un cimetière voisin. Vos propres officiels confirment ces accusations, et l'endroit entier semble avoir été retourné et divers cadavres profanés !"
 ravelian.401.a:0 "Ils devaient avoir leurs raisons ?"
 ravelian.401.b:0 "Libérer les érudits."
 ravelian.402.t:0 "Une Expédition Ravélienne Demande des Fonds"
 ravelian.402.d:0 "Un groupe d'érudits ravéliens, dirigé par un Recteur éminent, en plus d'une poignée d'aventuriers nous demandent d'aider à financer leurs entreprises à l'étranger.\nIls prétendent chercher des connaissances concernant les plans d'existence, et d'autres sortes de balivernes qui n'ont aucune pertinence pour un [Root.Monarch.GetTitle]."
 ravelian.402.a:0 "Leur donner les fonds."
 ravelian.402.b:0 "Renvoyer le Recteur à l'Église."
 ravelian.402.c:0 "Envoyer quelques-uns de nos explorateurs avec eux !"
 ravelian.403.t:0 "Flagellants dans les Rues"
 ravelian.403.d:0 "L'Enfer est sur les lèvres des fidèles en [Root.GetName].\n\nDes foules de Ravéliens marchent dans les rues, se flagellant en repentance pour leurs péchés présumés. Les menant sont des prêtres, des Recteurs, affirmant que seul par des démonstrations publiques de la foi peut-on être vraiment libéré de ses péchés, et seulement alors peut-on s'élever au Paradis."
 ravelian.403.a:0 "Les laisser croire ce qu'ils croient."
 ravelian.403.b:0 "Disperser ces prophètes de malheur !"
 ravelian.404.t:0 "Un Débat sur l'Au-delà Cause la Panique"
 ravelian.404.d:0 "Une discussion très attendue sur la nature de l'au-delà, et ce que cela signifie vraiment d'aller au Paradis ou d'aller en Enfer, a suscité la peur à travers la nation.\nDe nombreux Ravéliens éminents participant au débat ont fait leurs propres commentaires contradictoires et incendiaires, et le manque d'accord et de clarté de la part même des plus grands érudits de [Root.Country.GetName] a causé de l'inquiétude pour l'homme du commun."
 ravelian.404.a:0 "La vérité doit toujours prévaloir !"
 ravelian.404.b:0 "Essayer d'apaiser les masses."

 ravelian.500.t:0 "Conversions Forcées"
 ravelian.500.d:0 "Nous avons reçu des rapports que la province de [Root.GetName] a été convertie de force à la foi ravélienne par une foule en colère et un recteur encore plus en colère. Seul un petit nombre de personnes sont mortes, et beaucoup ont été traînées dans les rues pour professer la foi ou être battues par la foule."
 ravelian.500.a:0 "Enfin ils voient la vérité."
 ravelian.500.b:0 "Remettre en question ces pratiques."
 ravelian.501.t:0 "La $ESTATE_BURGHERS$ Payée pour se Convertir"
 ravelian.501.d:0 "Nous avons reçu des nouvelles que plusieurs membres éminents de l'état $ESTATE_BURGHERS$ se sont vantés que l'Église Ravélienne leur a envoyé une grande somme de couronnes pour se convertir à la foi. Bien que ce qui est fait soit fait, cette corruption flagrante a donné une idée à l'un de nos conseillers les plus perspicaces : et si nous confisquions leurs gains mal acquis ? Après tout, nous devrions nous convertir par foi et raison, pas par l'argent."
 ravelian.501.a:0 "La religion fonctionne de manières mystérieuses..."
 ravelian.501.b:0 "Confisquer leurs gains mal acquis !"
 ravelian.502.t:0 "Débats de Conversion Universitaires"
 ravelian.502.d:0 "Il est venu à notre attention une tendance récente parmi nos collèges et universités, où des membres éminents de RavelSoc (la Société Ravélienne Universitaire locale) ont commencé à inviter d'autres étudiants à débattre de la nature de la religion et de l'existence d'un Dieu Unique Véritable. Plusieurs membres de la faculté sont devenus inquiets, en particulier en raison du fait que de nombreux étudiants ont débattu et se sont convertis peu après."
 ravelian.502.a:0 "Tant mieux pour eux."
 ravelian.502.b:0 "Envoyer un Recteur pour aider RavelSoc."
 ravelian.503.t:0 "Un Courtisan Convertit un Mage Éminent !"
 ravelian.503.d:0 "Les mages ont toujours été un lot capricieux, surtout en matière de religion, car ils sont souvent enclins à croire que leurs pouvoirs arcaniques sont un bon substitut à la foi.\nUn tel critique a été converti et a finalement embrassé la Vérité, grâce à l'influence persistante de nos courtisans ravéliens. Le mage en question est venu à [Root.Monarch.GetName] pour demander conseil sur la meilleure façon d'impacter la foi ravélienne."
 ravelian.503.a:0 "Travailler avec l'église pour influencer les $ESTATE_MAGES$."
 ravelian.503.b:0 "Leur esprit vif sera un atout pour trouver de nouvelles révélations."
 ravelian.504.t:0 "Pogrom Ravélien"
 ravelian.504.d:0 "Les fidèles se sont rassemblés en foules en colère et ont pris d'assaut d'importants quartiers de minorités religieuses à [Root.GetName], tuant de nombreux habitants et vandalisant de nombreuses propriétés.\n\nLa foule scande que selon une théorie selon laquelle « le Paradis ne sera déverrouillé que lorsque tous seront convertis à la foi », tuer les infidèles signifie que plus de gens sont de vrais croyants au total, donc assurément cela signifie que la foi est plus proche d'atteindre le salut ?"
 ravelian.504.a:0 "Imbéciles ignorants !"
 ravelian.504.b:0 "Cela me semble logique."

 ravelian.600.t:0 "Les Saints-Avatars et les Dieux-Saints Devraient-ils Être Égaux ?"
 ravelian.600.d:0 "La foi ravélienne croit que la plupart, sinon toutes les religions, sont simplement des aspects d'une seule vraie foi et d'un Dieu Unique Véritable. La Sainteté était un moyen de reconnaître les figures saintes dans la mythologie des potentiels convertis, et pour certains, un moyen astucieux d'étendre une main ouverte d'amitié à ceux qui pourraient être rebutés par l'idée d'une religion monothéiste qui nie l'existence des autres fois.\n\nUn récent débat, cependant, s'est déclenché entre nos propres croyants : est-il juste que les avatars, réincarnations divines des dieux de la Cour Régente, soient tenus au même rang et respect que ce qui étaient des divinités pleinement réalisées ? Un exemple est Ste Auci Dameris, Reine de Damérie et Ste Minara : Auci a été bien considérée comme un avatar de Dame (un aspect accepté de Dieu) et canonisée pour ses efforts pour amener les elfes à Cannor. Minara, cependant, a toujours été considérée comme une divinité mineure de la Cour Régente.\n\nLa position officielle de l'église est que tous les saints sont égaux, mais les recteurs en débattent depuis des mois maintenant !"
 ravelian.600.a:0 "Nous soutenons la position officielle."
 ravelian.600.b:0 "Peut-être y a-t-il plus à cela ?"
 ravelian.601.t:0 "Un « Saint » dans notre Dynastie"
 ravelian.601.d:0 "Un recteur hautement suspect mais incroyablement influent nous a mentionné l'autre jour qu'il aurait pu trouver des « preuves » qu'un des ancêtres de [Root.Monarch.GetName] pourrait avoir accompli assez de bonnes œuvres pour être canonisé comme saint.\n\n« Bien sûr, cette recherche est incroyablement coûteuse. Des fonds... supplémentaires pourraient être nécessaires », suggère-t-il."
 ravelian.601.a:0 "Oh, bien sûr."
 ravelian.601.b:0 "Nous attendrons d'autres révélations."
 ravelian.602.t:0 "Un Critique du Gouvernement Canonisé"
 ravelian.602.d:0 "Un critique éminent mais récemment décédé du gouvernement [Root.GetAdjective] a apparemment été canonisé par le Haut-Recteur !\n\nDe son vivant, il était une voix incroyablement vocale contre nos entreprises, et maintenant qu'il est saint, cela pourrait nous impacter négativement si nous laissons ses critiques s'envenimer."
 ravelian.602.a:0 "Les paroles d'un saint sont des paroles saintes."
 ravelian.602.b:0 "Étouffer l'affaire."
 ravelian.603.t:0 "Affrontement Entre les Fidèles"
 ravelian.603.d:0 "Le sujet de débat sur les lèvres des fidèles ravéliens a été l'idée des Aspects et des Saints, et lequel est le plus important. Tous les autres dieux sont-ils des Aspects ? Ou seulement certains d'entre eux ? Assurément, les dieux maléfiques comme le Sombre Malveillant du Bulwar ne peuvent être un aspect du Dieu Unique Véritable, qui est tout-bon ? Assurément, Agrados, qui a violé Halanna, ne peut faire partie de Dieu ?\n\nLes $ESTATE_CHURCH$ ont été dans une impasse à débattre de cela encore et encore et encore, et l'un de nos courtisans les plus perspicaces suggère que les laisser se distraire peut nous permettre d'augmenter notre contrôle sur les états."
 ravelian.603.a:0 "Essayer de médier."
 ravelian.603.b:0 "Les laisser se battre."
 ravelian.604.t:0 "Votre Dieu est Faux, Mon Bon Monsieur !"
 ravelian.604.d:0 "Des verres brisés, des jurons lancés. À de nombreuses occasions.\n\nNotre corps diplomatique est devenu connu comme des incendiaires et agitateurs, déclarant aux dignitaires étrangers de contrées lointaines que leurs croyances sont fausses et que leurs dieux sont inexistants.\nBien que cela puisse être vrai dans certains cas, la diplomatie requiert tact et grâce, pas des accusations directes."
 ravelian.604.a:0 "Mais, vos dieux SONT faux !"
 ravelian.604.b:0 "Laissons les prêtres déterminer ce qui est réel ou non."

 ravelian.700.t:0 "Un Artificier Distribue ses Inventions ?!"
 ravelian.700.d:0 "Un artificier renégat a été vu devant son atelier distribuant des schémas, des prototypes et des inventions incroyablement coûteuses à tout passant. Il affirme qu'il a finalement vu la Vérité et embrassé Dieu, et que Dieu exige que la magie soit accessible à tous, et pour ceux qui ne peuvent pratiquer la magie : l'Artisanat Magique est la meilleure alternative !\n\nLes $ESTATE_ARTIFICERS$ ne sont pas impressionnés. Cet artificier renégat était l'un de leurs meilleurs, et il distribue les secrets de la guilde !"
 ravelian.700.a:0 "L'Artisanat Magique appartient à tous."
 ravelian.700.b:0 "Aider les artificiers à le faire taire."
 ravelian.701.t:0 "Pogrom Ravélien d'Elfes"
 ravelian.701.d:0 "Les textes saints déclarent que les elfes précurseurs ont commis le Péché Originel en liant et vainquant Dieu pour voler Sa magie. Cette révélation a été sur les lèvres de nombreux prédicateurs de feu et de soufre ces derniers mois et maintenant cette rhétorique a pris un tour anti-elfique. Une foule de Ravéliens dévots a pris d'assaut des quartiers elfiques à [Root.GetName], massacrant les innocents au nom de Dieu.\n\nBien que les elfes précurseurs aient fait cela, le peuple elfique vivant à [Root.GetName] n'était pas responsable, par les enfers, la plupart des elfes ne pratiquent même pas la magie. Assurément, les péchés du père ne sont pas les péchés du fils ?"
 ravelian.701.a:0 "La foule a un point..."
 ravelian.701.b:0 "Les arrêter !"
 ravelian.702.t:0 "Travail d'Artisanat Magique Dénoncé par l'Église"
 ravelian.702.d:0 "Le domaine de l'Artisanat Magique repousse toujours de nouvelles frontières, et il semble que l'une de ces frontières ait encore été franchie.\nLes $ESTATE_CHURCH$ dans notre royaume ont dénoncé une invention récente des $ESTATE_ARTIFICERS$ et qualifient quiconque achète ou même parle de l'appareil d'hédonistes et de pécheurs."
 ravelian.702.a:0 "Soutenir les Artificiers."
 ravelian.702.b:0 "Soutenir la Dénonciation."
 ravelian.703.t:0 "Chef de Culte Magique : Hérétique ?"
 ravelian.703.d:0 "Toute magie serait venue de Dieu d'une manière ou d'une autre, et en tant que telle la magie est divine. Pour certains, cela a été utilisé pour promouvoir l'Artisanat Magique au bénéfice des masses, mais pour d'autres, en particulier ceux dotés de magie, cela a permis une aura d'attrait et de gravité qui égale l'Âge des Rois-Sorciers.\nUn tel individu a amassé un grand nombre de fidèles à [Root.GetName], se proclamant « Saint Vivant » et utilisant ses pouvoirs pour, il faut l'admettre, faire de bonnes œuvres.\nUn Inquisiteur du Rectorat est arrivé dans notre domaine, et conseille que nous agissions contre cet hérétique, car c'est un précédent dangereux de permettre aux mages de parader comme s'ils étaient des dieux."
 ravelian.703.a:0 "Leur envoyer quelque chose à quoi ils ne s'attendent pas..."
 ravelian.703.b:0 "Si la magie est divine, pourquoi pas ?"


