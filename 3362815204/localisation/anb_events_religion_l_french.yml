 nathalyne_order_tt:0 "§YChangements de province lors de l'établissement :§!\nGagnez §G1§! Effectifs de base dans §Ychaque province de l'État§!.\nRemplace le bien commercial §YEsclaves§! dans l'État par un nouveau bien commercial.\nGagnez §G-10§! années de séparatisme dans §Ychaque province de l'État§!.\n\n§YEffets permanents de province :§!\nModificateur d'effectifs locaux : §G+10,0 %§!\nAttrition pour les ennemis : §G+1,00§!\nBloque les raids esclavagistes\n\n§YChangements de pays lors de l'établissement :§!\n§G+25§! Progrès d'institution dans la capitale nationale."

