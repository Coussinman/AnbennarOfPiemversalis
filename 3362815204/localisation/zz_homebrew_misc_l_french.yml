 ArtificeArrestSerpentrot:0 "« L'Artificier est à moi ! » déclara [Root.Monarch.GetName], se tenant devant [Root.Monarch.GetHerHis] fidèle escorte de gardes du palais. « Je l'arrêterai moi-même ! » \n\nUne évacuation d'urgence du palais fut ordonnée après que [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] hommes eurent aperçu les nuages jaunâtres caractéristiques de la Pourriture-du-Serpent envahir les couloirs. Face à une arme aussi redoutable que la Pourriture-du-Serpent entre les mains de l'Artificier en Chef, tenter de l'affronter directement eût été un suicide. Mais [Root.Monarch.GetName] avait une solution : de sa poche, il tira le vieux chiffon nauséabond que l'Artificier en Chef lui-même lui avait remis en cas d'épidémie imprévue. Nouant le tissu fétide autour de sa bouche, [Root.Monarch.GetName] s'avança dans le gaz... et se sentit parfaitement bien. [Root.Monarch.GetSheHeCap] progressa vers le laboratoire, enjambant les corps des gardes et des goules éparpillés partout. \n\nL'Artificier en Chef avait disparu lorsque [Root.Monarch.GetName] pénétra dans le laboratoire ; la Pourriture-du-Serpent avait détourné l'attention de tous, lui permettant de s'échapper. [Root.Monarch.GetName] fouilla les lieux, ne trouvant que quelques chiffons humides et un bol de champignons écrasés. \n\nL'artificier s'était enfui, mais [Root.Monarch.GetName] n'avait nullement l'intention de le laisser revenir. De $CAPITAL_CITY$ jusqu'au dernier recoin du royaume, une rançon royale fut promise comme prime pour la capture de l'Artificier Fou, mort ou vif."
 ArtificeArrestBulletWorms:0 "« L'Artificier est à moi ! » déclara [Root.Monarch.GetName], se tenant devant [Root.Monarch.GetHerHis] fidèle escorte de gardes du palais. « Je l'arrêterai moi-même ! » \n\nChaque instant qui passait, un autre soldat était emporté en hurlant d'agonie. Des pustules sanglantes couvraient leur peau, et l'on pouvait deviner aux cris quand un autre Ver-Balle perçait l'épiderme ou brisait un os. [Root.Monarch.GetName] resta en première ligne de ce qui avait été les couloirs du palais, désormais occupés par les forces retranchées de l'artificier avec ordre de tirer à vue. Mais le traître ignorait une chose : l'existence d'un tunnel secret menant au laboratoire, dans lequel [Root.Monarch.GetName] rampa. \n\nL'Artificier en Chef était occupé à faire ses bagages lorsque [Root.Monarch.GetName] fit irruption, le prenant totalement au dépourvu. L'artificier brandit un pistolet, visa, et manqua complètement son tir avant d'être plaqué au sol. Une entaille précise plus tard, l'artificier gisait vaincu, son bras valide saignant abondamment. \n\n« Maudit... J'aurais vraiment dû m'entraîner davantage au tir. » L'artificier cracha. « Nous étions destinés à la grandeur, vous et moi. Mais voilà où nous en sommes. Que les feux de la damnation vous consument ! » L'artificier serra les mâchoires, et quelque chose craqua distinctement. Des flammes d'un bleu éclatant jaillirent sur tout son corps, consumant sa chair et ses vêtements jusqu'à ce que l'artificier ne soit plus qu'un squelette calciné. Un sentiment troublant envahit [Root.Monarch.GetName], et [Root.Monarch.GetSheHe] eut l'impression que l'artificier n'était pas véritablement mort. Peut-être qu'un verre de célébration apaiserait [Root.Monarch.GetHerHis] nerfs."
 ArtificeArrestNecrolyzer:0 "« L'Artificier est à moi ! » déclara [Root.Monarch.GetName], se tenant devant [Root.Monarch.GetHerHis] fidèle escorte de gardes du palais. « Je l'arrêterai moi-même ! » \n\nLes hurlements des damnés emplissaient les halls du palais tandis qu'une horde de goules mortes-vivantes assaillait [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] hommes. L'Artificier en Chef avait fait bon usage des ressources du [Root.GovernmentName], les retournant contre [Root.Monarch.GetName] dans cette bataille. Tandis que des dents jaunies claquaient contre les épées et les piques de la garde du palais, [Root.Monarch.GetName] bondit en avant, mettant des années d'entraînement martial dans chaque coup de [Root.Monarch.GetHerHis] lame. Et du coin de [Root.Monarch.GetHerHis] œil, [Root.Monarch.GetSheHe] l'aperçut. \n\nL'Artificier en Chef était pressé, vidant des étagères et fourrant des livres dans un sac qui ne s'étirait ni ne s'affaissait jamais. « Les Sangsuedens sont charmants à cette époque de l'année, peut-être devrais-je y aller d'abord et— » En apercevant [Root.Monarch.GetName], il jeta le sac sur son épaule et tendit la main vers un mousquet posé à proximité. [Root.Monarch.GetName] fut sur lui en un instant, et d'un seul coup l'artificier gisait vaincu, son bras valide saignant abondamment. \n\n« Maudit... Vous auriez pu simplement m'interdire de produire du Nécrolyseur, [Root.Monarch.GetName]. » L'artificier cracha. « Il y avait tant d'autres choses que nous aurions pu accomplir ensemble. Mais voilà où nous en sommes. Que les feux de la damnation vous consument ! » L'artificier serra les mâchoires, et quelque chose craqua distinctement. Des flammes d'un bleu éclatant jaillirent sur tout son corps, consumant sa chair et ses vêtements jusqu'à ce que l'artificier ne soit plus qu'un squelette calciné. Un sentiment troublant envahit [Root.Monarch.GetName], et [Root.Monarch.GetSheHe] eut l'impression que l'artificier n'était pas véritablement mort. Peut-être qu'un verre de célébration apaiserait [Root.Monarch.GetHerHis] nerfs."
 ArtificeArrestNone:0 "« L'Artificier est à moi ! » déclara [Root.Monarch.GetName], se tenant devant [Root.Monarch.GetHerHis] fidèle escorte de gardes du palais. « Je l'arrêterai moi-même ! » \n\nLes portes du laboratoire avaient été défoncées, gisant en éclats sur le sol. Des créations abominables fondirent sur [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] hommes, semblant servir de système de sécurité à l'artificier. [Root.Monarch.GetName] ignorait ce qu'elles pouvaient être, mais n'avait aucune intention de le découvrir. [Root.Monarch.GetSheHe] les abattit [Root.Monarch.GetHerselfHimself], piétinant leurs cadavres difformes avant d'apercevoir sa cible. \n\nL'Artificier en Chef était pressé, vidant des étagères et fourrant des livres dans un sac qui ne s'étirait ni ne s'affaissait jamais. En apercevant [Root.Monarch.GetName], il jeta le sac sur son épaule et saisit sa dague. [Root.Monarch.GetName] remarqua le reflet luisant d'un poison sur la lame. L'artificier frappa le premier, tentant une feinte contre [Root.Monarch.GetName], mais le $MONARCHTITLE$ n'était pas étranger aux combats. Après un bref échange, l'artificier gisait vaincu, son bras valide saignant abondamment. \n\n« Qu'Agrados vous maudisse, [Root.Monarch.GetName]. » L'artificier cracha. « Nous aurions pu nous entraider. Mais voilà où nous en sommes. Que les feux de la damnation vous consument ! » L'artificier serra les mâchoires, et quelque chose craqua distinctement. Des flammes d'un bleu éclatant jaillirent sur tout son corps, consumant sa chair et ses vêtements jusqu'à ce que l'artificier ne soit plus qu'un squelette calciné. Un sentiment troublant envahit [Root.Monarch.GetName], et [Root.Monarch.GetSheHe] eut l'impression que l'artificier n'était pas véritablement mort. Peut-être qu'un verre de célébration apaiserait [Root.Monarch.GetHerHis] nerfs."
 ArtificeStrikeDomination:0 "« Amenez-moi l'Artificier en Chef. » ordonna [Root.Monarch.GetName] à [Root.Monarch.GetHerHis] capitaine de la garde. « Ce sera fait. » répondit-il avant de s'en aller exécuter l'ordre. \n\n[Root.Monarch.GetName] attendit tard dans la nuit le retour du capitaine, arpentant le sol. Aucun bruit de lutte. L'Artificier en Chef n'était pas présent au dîner. Sûrement avait-il été capturé ? Oui, les gardes devaient simplement s'amuser dans les cachots, et d'un moment à l'autre— \n\n« Mon [Root.Monarch.GetTitle] » Le capitaine de la garde surgit de l'ombre. « C'est fait. » [Root.Monarch.GetName] sourit, s'approchant du capitaine... mais alors... \n\n« Et me voici. » L'Artificier en Chef apparut derrière le capitaine. « Mon [Root.Monarch.GetTitle], vous n'êtes guère le maître le plus subtil que j'aie servi. Quelle honte, me voilà contraint de fuir et de trouver quelqu'un de plus digne de mon œuvre. Et je dois dire que votre capitaine a lamentablement échoué à me capturer. Présentez vos excuses. » \n\n« Je vous présente mes excuses, mon [Root.Monarch.GetTitle] » Le capitaine parla sans réfléchir. [Root.Monarch.GetName] regarda de plus près, les yeux écarquillés. Les yeux du capitaine étaient vitreux comme des billes, symptôme évident d'une Potion de Domination. « Vous manquez d'ardeur, capitaine de la garde. » L'Artificier en Chef se plaça à ses côtés, lui tendant une dague. « Vous allez montrer à votre [Root.Monarch.GetTitle] à quel point vous êtes désolé en le tuant. C'est un ordre ! » Des années d'entraînement reprirent le dessus, et le capitaine bondit sur [Root.Monarch.GetName]."
 ArtificeStrikeNone:0 "« L'Artificier en Chef répondra de ses crimes, » déclara [Root.Monarch.GetName], « demain. Je dois y réfléchir cette nuit. Les libations de ce jour m'ont laissé... particulièrement las. » \n\nLorsque [Root.Monarch.GetName] s'éveilla, il ne pouvait plus bouger. Aucune entrave sur lui, ni coupures ni ecchymoses, [Root.Monarch.GetSheHe] était toujours dans [Root.Monarch.GetHerHis] lit avec les couvertures sur [Root.Monarch.GetHerHim]. Mais malgré tous [Root.Monarch.GetHerHis] efforts, [Root.Monarch.GetName] ne parvenait pas à remuer le moindre muscle. Que se passait-il ?! \n\n« Bonjour, mon [Root.Monarch.GetTitle]. » Une voix retentit, celle de l'Artificier en Chef. « J'espère que vous avez bien dormi. Moi, j'ai été fort occupé cette nuit. Un petit oiseau m'a dit que quelqu'un en avait après moi. Je voulais vous présenter ma dernière invention d'une autre manière, mais nous y voilà. » L'Artificier en Chef entra dans son champ de vision, tenant contre sa poitrine une fiole de liquide violet. « Je l'appelle la "Potion de Domination", mon [Root.Monarch.GetTitle]. Une part de base neutre, deux parts de tranquillisant pour orque, et un enchantement de votre serviteur. Quiconque boit ceci entre dans un léger état d'hypnose et peut recevoir des suggestions par commande vocale. Comme vous êtes allongé là en ce moment ! Et maintenant, vous allez me dire que c'est une invention excellente. » \n\n« C'est une invention excellente. » \n\n[Root.Monarch.GetName] n'avait pas prononcé ces mots lui-même, mais ils furent dits, et il écouta, impuissant. « Je suis ravi que vous soyez d'accord ! Mais hélas, le travail m'appelle. J'ai une voiture qui m'attend dehors, et un [Root.Monarch.GetTitle] à tuer. » L'Artificier en Chef sourit. « Mais attendez, ce n'est pas moi qui tuerai. C'est vous, n'est-ce pas ? » Une dague fut placée dans la main de [Root.Monarch.GetName]. \n\n« Tuez-vous, c'est un ordre. »"
 ArtificeEnchantmentYes:0 "Connaissez-vous la magie d'enchantement, mon [Root.Monarch.GetTitle] ? Oh, que dis-je, bien sûr que oui."
 ArtificeEnchantmentNo:0 "Connaissez-vous la magie d'enchantement, mon [Root.Monarch.GetTitle] ? Vous devriez vous documenter sur le sujet à l'occasion."
 ArtificeKhetgirlYes:0 "la Khet que l'Artificier en Chef avait fait de son assistante criait à l'aide, frappant et griffant inutilement le verre."
 ArtificeKhetgirlNo:0 "une assistante artificière criait à l'aide, martelant vainement le verre de ses poings."
 ArtificeKhetgirlDedYes:0 "C'était... rapide, dois-je dire. Je blâme les implants, ils affaiblissent le système immunitaire. Peu importe, cela ne faisait d'elle qu'un meilleur exemple."
 ArtificeKhetgirlDedNo:0 "Comme vous pouvez le constater, mon [Root.Monarch.GetTitle], la Pourriture-du-Serpent est rapide et mortelle."
