 CrackerBulwar:0 "En un instant, le berceau de l'humanité fut à jamais souillé. Une lumière immense engloutit la cité de $CAPITAL_CITY$, s'élançant vers les cieux et, l'espace d'un bref instant, éclipsant même la lumière de Surael. Puis la cité s'évanouit dans une explosion cataclysmique entendue et ressentie dans tout le Bulwar. Une destruction inimaginable jaillit de la cité désormais disparue, fracturant le sol et dispersant des vents de feu. Les grands fleuves du Suran et du Buranun changèrent de cours, inondant leurs berges et dévastant les terres les plus fertiles du Bulwar. Depuis le Salahad, une tempête de sable comme nulle autre engloutit le désert dans sa furie. Et au-dessus du chaos et de la mort, un présage des temps à venir : des nuages de cendres."
 CrackerGerudia:0 ""
 CrackerYnn:0 ""
 CrackerEordand:0 ""
 CrackerSerpentspine:0 "L'Échine-du-Serpent n'est pas réputée pour son activité volcanique, mais les observateurs à l'extérieur de la montagne jurèrent avoir vu celle-ci entrer en éruption et exploser, crachant des roches en fusion et les débris de ce qui fut jadis $CAPITAL_CITY$. À travers tout le Dwarovar, une chaleur ardente déferla le long des rails et fit cuire vifs ses habitants sur les pierres brûlantes. Les plus chanceux périrent plutôt écrasés par des effondrements et des bâtiments s'écroulant, tandis que des tremblements ébranlaient les montagnes. Ceux qui restent se terrent dans leurs forteresses, sachant pertinemment que peu importe la profondeur de leurs galeries, lorsqu'ils lèvent les yeux, ils ne voient plus que des cendres."
 CrackerEscann:0 ""
 CrackerForbiddenLands:0 ""
 CrackerWestCannor:0 ""
 CrackerDeepwoods:0 ""
 CrackerOther:0 "L'impensable s'est produit aujourd'hui. L'intégralité de $CAPITAL_CITY$ a été consumée dans une immense explosion d'énergie, n'épargnant personne et s'élevant jusqu'aux cieux. Partout en $COUNTRY$, de terribles séismes ont fracturé et dispersé le sol, balayé par des tempêtes tourbillonnantes et des inondations déferlantes, puis desséché par un feu dévorant. $COUNTRY$ ne fut pas la seule victime : la vague de destruction frappa sans pitié tous ceux qui se trouvaient sur son passage. \n\nÀ travers tout Halann, les grondements et répliques du Briseur de Halann purent être ressentis. Puis la plus grande crainte du monde se révéla. Un nuage sombre s'étendit sur le ciel, et là où le soleil brillait jadis, il n'y avait plus que des cendres."

