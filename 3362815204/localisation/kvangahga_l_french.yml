l_french:
 kvangahga_events.1:0 "Armements Ancestraux"
 kvangahga_events.1.t:0 "Armements Ancestraux"
 kvangahga_events.1.d:0 "Les artisans mystiques ont incorporé les os de nos morts honorés dans des armes et armures imprégnées de protections de résilience. La sagesse de bataille des ancêtres coule à travers ces armements, inspirant nos guerriers à des exploits de prouesse."
 kvangahga_events.1.a:0 "Gloire à Kvanga !"
 kvangahga_events.2:0 "Reliques Reconverties"
 kvangahga_events.2.t:0 "Reliques Reconverties"
 kvangahga_events.2.d:0 "La gloire de Kvanga nous est évidente mais nos frères du Xhazobkult peuvent avoir besoin d'être convaincus, peut-être que si nous leur montrons le pouvoir de Kvanga en recyclant leurs icônes profanes en nos reliques bénies cela aidera à faciliter la transition."
 kvangahga_events.2.a:0 "Gloire à Kvanga !"
 kvangahga_events.3:0 "Outils Reconditionnés"
 kvangahga_events.3.t:0 "Outils Reconditionnés"
 kvangahga_events.3.d:0 "Bon marché et abondants, les outils enchantés fabriqués à partir de ferraille et d'os permettront à nos artisans de construire des bâtiments pratiques et rentables pour loger la population croissante de Gnolls migrant vers nos terres pour une vie libre du Xhazobkult."
 kvangahga_events.3.a:0 "Gloire à Kvanga !"
 kvangahga_events.4:0 "Récupération d'Épaves"
 kvangahga_events.4.t:0 "Récupération d'Épaves"
 kvangahga_events.4.d:0 "Certains de nos artisans mystiques se sont mis à récupérer des épaves de navires tant sur la côte qu'au large pour des matériaux utilisables qui peuvent être reforgés pour fabriquer des navires bon marché et durables."
 kvangahga_events.4.a:0 "Gloire à Kvanga !"
 kvangahga_events.5:0 "Bijoux Recyclés"
 kvangahga_events.5.t:0 "Bijoux Recyclés"
 kvangahga_events.5.d:0 "Nous trouvons de la beauté dans les choses que d'autres considèrent comme des déchets, et nos artisans mystiques ont le don de transformer même la plus laide des ferrailles en œuvres d'art pour lesquelles des collectionneurs avertis paieront grassement."
 kvangahga_events.5.a:0 "Gloire à Kvanga !"
 kvangahga_events.6.t:0 "L'Épreuve de la Chaîne Reforgée"
 kvangahga_events.6.dd:0 "Quand Kvanga créa les gnolls, elle le fit à Son image, dès la naissance ils sont bénis par Sa griffe. Ceux qui ne sont pas ses enfants peuvent tout de même gagner sa faveur cependant. L'Épreuve de la Chaîne Reforgée est un rite sacré dans la foi Kvangahga qui permet aux non-gnolls de gagner la bénédiction de Kvanga et d'être vus comme égaux à Ses yeux.\n\nLes suppliants de l'épreuve doivent fabriquer une arme ou un outil qui sera utilisé dans une série de tests, que ce soit la chasse aux grandes bêtes, le combat de gladiateurs ou des jeux d'adresse et de précision.\n\nLes Épreuves ont lieu localement chaque année quand les artisans mystiques décrètent que les présages sont favorables, mais dans ce cas notre dirigeant a pris les choses en main directement et organisé une grande épreuve nationale pour trouver les meilleurs candidats à amener à sa cour. Il doit maintenant décider du thème de cette grande épreuve."

 #trial of the reforged chain options
 kvangahga_events.6.a:0 "L'Épreuve du Récupérateur"
 kvangahga_events.6.a.tt:0 "Récupérer et réutiliser est un acte des plus saints aux yeux de Kvanga, cette année notre dirigeant a décrété que chaque suppliant doit fouiller les terres désolées pour ses matériaux de forge, émulant les artisans mystiques d'antan"
 kvangahga_events.6.b:0 "L'Épreuve du Maître des Bêtes"
 kvangahga_events.6.b.tt:0 "Kvanga a donné aux gnolls la volonté et la puissance d'affirmer leur domination sur les bêtes sauvages, ceux qui cherchent sa bénédiction doivent démontrer qu'eux aussi peuvent contrôler les bêtes sauvages. Notre dirigeant a décrété que les suppliants doivent forger un crochet et des chaînes pour capturer et dompter une puissante bête des terres sauvages"
 kvangahga_events.6.c:0 "L'Épreuve du Corsaire"
 kvangahga_events.6.c.tt:0 "Prédateur et proie sont une partie naturelle du dessein de Kvanga. Ceux qui cherchent sa bénédiction doivent montrer qu'ils sont les premiers, pas les seconds. Notre dirigeant a décrété que les suppliants doivent forger une hache d'abordage vicieuse et piller les routes maritimes de nos ennemis"
 kvangahga_events.6.d:0 "L'Épreuve du Chasseur de Monstres"
 kvangahga_events.6.d.tt:0 "À travers nos terres il y a de nombreuses créatures viles qui sont notoirement difficiles à tuer à cause de leurs pouvoirs surnaturels, ces monstres se sont avérés une épine dans notre pied depuis un certain temps, ce sera une épreuve digne de les tuer au nom de Kvanga. Notre dirigeant a décrété que les suppliants doivent concourir en équipes pour fabriquer des armes capables de tuer ces créatures féroces"
 kvangahga_events.6.e:0 "L'Épreuve de l'Orfèvre"
 kvangahga_events.6.e.tt:0 "Créer quelque chose de valeur à partir des rebuts et déchets du monde est au cœur de ce que Kvanga attend de ses fidèles. Notre dirigeant a décrété que les suppliants doivent fabriquer un objet qui soit une vraie œuvre d'art en utilisant des bijoux cassés et des métaux précieux de mauvaise qualité"
 kvangahga_events.6.f:0 "L'Épreuve de l'Artilleur"
 kvangahga_events.6.f.tt:0 "Les armes à feu sont les armes de l'avenir, la combinaison de flammes rugissantes et de métal durci parle à quelque chose dans l'âme gnoll, une étincelle de la gloire de Kvanga. Au lieu des lames traditionnelles notre dirigeant a décrété que les suppliants doivent forger et utiliser des canons dans l'épreuve de cette année"
 kvangahga_events.6.g:0 "L'Épreuve de l'Alchimiste"
 kvangahga_events.6.g.tt:0 "Notre dirigeant a décrété que les suppliants doivent fabriquer à partir de verre une série d'outils alchimiques qui seront mis à l'épreuve avec d'étranges et dangereuses concoctions"
 kvangahga_events.6.h:0 "L'Épreuve de l'Artificier"
 kvangahga_events.6.h.tt:0 "Ce que les humains appellent l'Artisanat Magique est la plus grande expression de l'art Kvangahgan, avoir des suppliants créant des merveilles enchantées serait un excellent test, mais travailler avec la magie peut être dangereux et imprévisible. Notre dirigeant a décrété que les suppliants doivent forger un objet merveilleux enchanté de magie et le démontrer devant un panel des plus grands artisans mystiques de notre royaume"

 #pulse event
 kvangahga_events.7:0 "Des Cadavres comme Munitions ?"
 kvangahga_events.7.t:0 "Des Cadavres comme Munitions ?"
 kvangahga_events.7.d:0 "À l'Âge des Monstres, les gnolls Kvangahga étaient connus pour leurs tactiques de guerre non conventionnelles, incluant l'utilisation de corps en décomposition comme projectiles ou ingrédients alchimiques. La pratique la plus honnie, du moins parmi les ennemis des gnolls, était l'utilisation de cadavres pourris comme munitions, des restes putrides étant catapultés sur leurs ennemis pendant les sièges pour briser le moral ennemi.\n\nMaintenant, alors que [Root.Monarch.GetName] envisage de raviver cette pratique ancienne, la dissension s'élève au sein de la cour. Les prêtres-guerriers préconisent d'utiliser les corps des ennemis tombés, arguant que leur décomposition peut être exploitée pour améliorer nos engins de siège et infliger la terreur à nos adversaires. Vos généraux plus conventionnels, cependant, soutiennent que les béliers et tours de siège sont des outils de guerre plus efficaces. De telles tactiques macabres peuvent-elles vraiment égaler l'efficacité des armes conventionnelles ?"
 kvangahga_events.7.a:0 "Utiliser leurs corps. Nos ennemis nous serviront une dernière fois."
 kvangahga_events.7.b:0 "Il n'y a rien de mieux que l'acier."
 kvangahga_events.7.c:0 "Nos artificiers peuvent faire meilleur usage de leurs corps…"

 kvangahga_events.8:0 "Une Forteresse d'Os"
 kvangahga_events.8.t:0 "Une Forteresse d'Os"
 kvangahga_events.8.d:0 "D'un pas décidé, [Root.Monarch.GetName] entra dans la salle du conseil, commandant l'attention des conseillers rassemblés à l'intérieur. Le choc des idées qui avait résonné comme un feu de canon dans l'air se calma un moment avant que la cacophonie ne reprenne.\n\n« Ce sera glorieux », affirma le grand prêtre de la $CAPITAL$, ses mots imprégnés de certitude. « Dans la vie nos soldats se sont battus pour $COUNTRY$, et dans la mort ils le serviront également. »\n\nAu milieu des divagations du prêtre, l'architecte en chef objecta, son ton sévère. « Une mauvaise idée », mit-il en garde, ses mots courts résonnant de pragmatisme. « Les corps se décomposent avec le temps. Les os et la foi ne remplacent pas la pierre et le métal. »\n\nLe prêtre commença à parler à nouveau, jusqu'à ce que [Root.Monarch.GetName] lève la main. « Assez ! » déclara-t-il, sa voix exaspérée, coupant court à la dissension. « Ma décision est prise. »"
 kvangahga_events.8.a:0 "Le prêtre a raison. Nos tombés peuvent encore nous protéger."
 kvangahga_events.8.b:0 "L'architecte a raison. Amenez-le à ma cour."

 kvangahga_events.9:0 "Le Déchet de l'Un…"
 kvangahga_events.9.t:0 "Le Déchet de l'Un…"
 kvangahga_events.9.d:0 "Alors que nos artisans mystiques parcourent les terres de nos voisins pour troquer ou récupérer, ils trouvent souvent d'anciens champs de bataille. En de tels lieux, des armes et armures ont été abandonnées et laissées à rouiller et moisir, considérées comme des déchets inutiles par leurs anciens propriétaires. Nous savons mieux. Avec un peu de temps et d'effort ces armes peuvent être rendues fonctionnelles à nouveau et mises à bon usage. Après tout, le déchet de l'un…"
 kvangahga_events.9.a:0 "… est le trésor d'un autre gnoll. Nos marchands trouveront des acheteurs."
 kvangahga_events.9.b:0 "… est l'arsenal d'un autre gnoll."

 kvangahga_events.10:0 "Une Arme Bénie par Kvanga"
 kvangahga_events.10.t:0 "Une Arme Bénie par Kvanga"
 kvangahga_events.10.d:0 "Le tintement des marteaux et le raclement du ciseau et de la lime résonnent à travers l'atelier alors que [Root.Monarch.GetName] approche, le gnoll ratatiné penché sur une puissante enclume inscrite des runes sacrées de la foi Kvangahga.\n\n[Root.Monarch.GetName] a été informé de source sûre que le vieux mystique est le plus grand forgeron d'armes de l'époque et a fait le voyage jusqu'à cet atelier reculé pour commander une puissante arme bénie par la déesse elle-même. Maintenant qu'il se tient dans ce lieu sacré, il sait que quelque chose de vraiment remarquable sera forgé ce jour.\n\nSans un mot, l'ancien gnoll fait un geste vers deux paquets posés devant l'enclume, presque comme s'il savait que [Root.Monarch.GetName] viendrait. À gauche, une pile d'os blanchis chacun gravé de marques complexes. À droite, une collection d'objets métalliques cassés et cabossés d'un design depuis longtemps oublié, toujours aussi brillants que le jour où ils furent forgés.\n\n« Choisis » croasse l'artisan, d'une voix comme le grincement d'une tombe"
 kvangahga_events.10.a:0 "Je choisis les os des guerriers honorés."
 kvangahga_events.10.b:0 "Je choisis l'acier des forgerons anciens."
 kvangahga_events.10.c:0 "En fait je ne peux pas me le permettre…"

 kvangahga_events.11:0 "Les Os comme Instruments"
 kvangahga_events.11.t:0 "Les Os comme Instruments"
 kvangahga_events.11.d:0 "Bien que les bardes soient rares dans de nombreuses sociétés gnolles, ce n'est pas le cas pour les Kvangahga, qui voient leurs traditions de conteurs et leurs inventions musicales comme un travail sur lequel Kvanga elle-même sourit. Une troupe itinérante de bardes a demandé à troquer les os de nos guerriers récemment tombés pour en faire des instruments, qu'ils utiliseront dans une nouvelle représentation commémorant les grands guerriers gnolls du passé.\n\nCe serait sûrement un honneur pour les morts mais pourrait causer quelque contrariété parmi leur parenté, qui souhaite sans doute utiliser les os eux-mêmes. Comment devrions-nous gérer cette situation ?"
 kvangahga_events.11.a:0 "Donner les os aux bardes. Honorons nos morts."
 kvangahga_events.11.b:0 "Laisser les os à leur parenté. Respectons les vivants."

 kvangahga_events.12:0 "Une Cache de Trésors Anciens"
 kvangahga_events.12.t:0 "Une Cache de Trésors Anciens"
 kvangahga_events.12.d:0 "En fouillant une ancienne tombe, l'un de nos artisans mystiques a découvert un trésor d'artefacts enchantés de l'époque des Sultanats des Génies, qu'il a dûment offert à notre [Root.Monarch.GetTitle]. Ce serait un grand honneur pour [Root.Monarch.GetName] de reforger ces objets arcaniques lui-même, mais peut-être qu'en impliquant d'autres dans le processus nous pourrions en apprendre beaucoup sur les techniques utilisées par les anciens. Ou nous pourrions toujours les vendre au plus offrant, bien que cela sera probablement mal vu."
 kvangahga_events.12.a:0 "Kvanga sourit à [Root.Monarch.GetName] !"
 kvangahga_events.12.b:0 "Les secrets de ces artefacts devraient être partagés à travers $COUNTRYNAME$"
 kvangahga_events.12.c:0 "Ceux-ci rapporteront une jolie somme sur le marché…"

 kvangahga_events.13:0 "Une Cache de Trésors Chaotiques"
 kvangahga_events.13.t:0 "Une Cache de Trésors Chaotiques"
 kvangahga_events.13.d:0 "En fouillant une ancienne tombe, l'un de nos artisans mystiques a découvert un trésor d'artefacts enchantés de l'époque des Sultanats des Génies. Cependant, quand il retourna à son atelier pour commencer à bricoler les objets, une tempête de magies planaires chaotiques fut déchaînée sur la ville, causant des dévastations et remettant en question les compétences des artisans gnolls [Root.GetAdjective] !"
 kvangahga_events.13.a:0 "Allez aider les blessés !"
 kvangahga_events.13.b:0 "Blâmer [chaos_good_rival.GetName] pour le chaos !"
 kvangahga_events.13.c:0 "Peut-être pouvons-nous encore apprendre quelque chose de cela…"

 kvangahga_events.14:0 "Un Centre de Recyclage"
 kvangahga_events.14.t:0 "Créer un Centre de Recyclage"
 kvangahga_events.14.d:0 "Ce qui était autrefois un simple relais le long d'une de nos routes commerciales s'est récemment fait un nom comme centre de collecte et de distribution d'objets de récupération, attirant des artisans mystiques de près et de loin.\n\nLe gnoll responsable de ce centre de recyclage est un jeune prêtre qui se spécialise dans la création d'œuvres d'art à partir de matériaux de récupération, qui a initialement établi le centre pour collecter les matériaux de rebut des voyageurs. Nous pourrions féliciter ce gnoll, offrir de le soutenir financièrement, ou même lui offrir une place à notre cour ; un esprit si innovant nous servirait bien."
 kvangahga_events.14.a:0 "Ils suivent les Enseignements de Kvanga"
 kvangahga_events.14.b:0 "Pensez à ce qu'ils pourraient faire si nous leur donnions notre soutien."
 kvangahga_events.14.c:0 "Nous avons une place pour lui ici."

 kvangahga_events.15:0 "Les Artisans Mystiques Ont Besoin de Soutien"
 kvangahga_events.15.t:0 "Les Artisans Mystiques Ont Besoin de Soutien"
 kvangahga_events.15.d:0 "L'impensable s'est produit : nous n'avons plus de matériaux de récupération ! Nos prêtres sont venus à nous avec une supplique pour du soutien, affirmant qu'ils n'ont plus de matériaux recyclables et seront bientôt forcés de produire des biens à partir de matériaux neufs. Bien que les rites Kvangahga ne l'interdisent pas, ce n'est pas la manière préférée pour nos artisans mystiques de conduire leurs affaires et ce n'est pas vu comme un processus sacré de la même manière que l'utilisation de matériaux recyclables.\n\nIls demandent que nous importions des matériaux de récupération de nos voisins à prix coûtant ; bien que cela apaiserait les prêtres pour le moment, ce n'est pas strictement nécessaire d'un point de vue théologique. Comment devrions-nous procéder ?"
 kvangahga_events.15.a:0 "Acheter des épées et armures cassées de nos voisins."
 kvangahga_events.15.b:0 "Acheter des babioles et bijoux cassés de nos voisins."
 kvangahga_events.15.c:0 "Ils devront simplement attendre que les matériaux existants se détériorent !"

 kvangahga_events.16:0 "Le Cannibalisme Gnoll Effraie les Locaux"
 kvangahga_events.16.t:0 "Les Sujets Krah S'opposent au Traitement de Leurs Morts"
 kvangahga_events.16.d:0 "Alors que d'autres races sont dégoûtées à l'idée de consommer la chair d'humanoïdes, particulièrement leur propre parenté, pour nous gnolls Kvangahga c'est l'un des rites les plus sacrés. C'est un grand honneur de transmettre la sagesse et la force de votre chair à votre communauté.\n\nTristement, certains de nos sujets non-gnolls ne le voient pas de la même façon. Un membre particulièrement éminent de la communauté locale, qui avait passé l'Épreuve de la Chaîne Reforgée, est récemment décédé et a reçu le plein honneur de funérailles Kvangahga. Cela a causé l'indignation parmi sa parenté, qui demande à être autorisée à tenir ses propres rites funéraires."
 kvangahga_events.16.a:0 "Leurs opinions ne signifient rien. Ils font partie de $COUNTRY$."
 kvangahga_events.16.b:0 "Laissons les autres races insensées gérer leurs morts."
 kvangahga_events.16.c:0 "Nous sommes un État de nombreuses races et croyances."

 kvangahga_events.17:0 "Le Cannibalisme Gnoll Effraie les Alliés"
 kvangahga_events.17.t:0 "Vous Avez Fait QUOI avec Nos Morts ?"
 kvangahga_events.17.d:0 "Alors que d'autres races sont dégoûtées à l'idée de consommer la chair d'humanoïdes, particulièrement leur propre parenté, pour nous gnolls Kvangahga c'est l'un des rites les plus sacrés. C'est un grand honneur de transmettre la sagesse et la force de votre chair à votre communauté.\n\nTristement nos alliés ne le voient pas de la même façon. [tasty_ally.Get.Name] a envoyé un émissaire pour se plaindre après que des témoins ont vu nos troupes consommer les corps de leurs soldats tombés après une récente campagne. Nous leur avons assuré que c'était censé être un signe de respect, mais ils continuent d'être indignés par cette tournure des événements."
 kvangahga_events.17.a:0 "Très bien, je suppose que nous NE mangerons PAS leurs cadavres."
 kvangahga_events.17.b:0 "Imbéciles : ils ne comprennent tout simplement pas notre mode de vie."
 kvangahga_events.17.c:0 "Mais s'ils voyaient les choses de notre perspective…"
 kvangahga_events.17.e:0 "Manger les ambassadeurs"

 kvangahga_events.18:0 "Ce Gnoll a un Drôle de Goût…"
 kvangahga_events.18.t:0 "Ce Gnoll a un Drôle de Goût…"
 kvangahga_events.18.d:0 "Après une cérémonie funéraire pour un marchand particulièrement connu et notamment corpulent à [spoiled_merchant_area.GetName], plusieurs membres de la communauté sont tombés malades. Se régaler des morts honorés est important pour s'assurer que la force et la sagesse de leur chair sont transmises à la communauté, mais la sévérité de la moisissure et de la pourriture sur ce gnoll mort particulier rend le manger… indésirable. Nous pourrions envoyer l'armée pour aider à manger le gnoll, le laisser pourrir et contrarier les locaux, ou montrer l'exemple : manger le gnoll nous-mêmes."
 kvangahga_events.18.a:0 "Il doit être mangé. Envoyez l'armée pour aider."
 kvangahga_events.18.b:0 "C'est un signe de Kvanga. Ne mangez pas le marchand."
 kvangahga_events.18.c:0 "Un [Root.Monarch.GetTitle] montre l'exemple. Donnez-moi une fourchette."

 kvangahga_events.19:0 "Ce Gnoll a un Goût d'Alcool"
 kvangahga_events.19.t:0 "Une Cérémonie Funéraire Tourne Mal"
 kvangahga_events.19.d:0 "Nous avons reçu des nouvelles que les funérailles d'une célèbre maître-brasseuse gnoll connue pour son amour des spiritueux forts ont pris une tournure étrange. Selon la tradition, la communauté locale s'est rassemblée pour consommer sa chair et envoyer son âme à la forge de Kvanga, mais il semblerait que les activités de la maître-brasseuse dans la vie aient donné à sa chair les propriétés d'un alcool puissant, et les habitants de la ville sont devenus assez ivres. Les célébrations funéraires ont jusqu'ici duré plusieurs jours alimentés par l'alcool, et ne montrent aucun signe de s'arrêter !"
 kvangahga_events.19.a:0 "Une bénédiction de Kvanga !"
 kvangahga_events.19.b:0 "Laissons nos alliés goûter la dernière concoction de notre maître-brasseuse !"
 kvangahga_events.19.c:0 "Envoyez son corps à mon palais pour consommation !"

 kvangahga_events.20:0 "Xhazobkultistes à [demon_pact_province.GetName]"
 kvangahga_events.20.t:0 "Xhazobkultistes à [demon_pact_province.GetName]"
 kvangahga_events.20.d:0 "Depuis que le Premier Xhazobine forma son pacte démoniaque, il y a toujours eu ceux qui ont divergé de la Voie de Kvanga et cherché le pouvoir, malgré le mal qui tacherait ainsi leurs âmes.\n\nÀ [demon_pact_province.GetName], un Xhazobkult a relevé sa laide tête, cherchant à amener d'autres gnolls dans leur giron maléfique et se nourrissant de nos sujets non-humains. Devrions-nous tenter d'éradiquer cette hérésie par la force ou espérer qu'ils retournent à la chaleur de la forge de Kvanga en temps voulu ?"
 kvangahga_events.20.a:0 "Nous les refergerons."
 kvangahga_events.20.b:0 "Ils retourneront au bercail en temps voulu."
 kvangahga_events.20.c:0 "Nous sommes un peuple tolérant. Faisons d'eux un exemple."
 kvangahga_events.20.e:0 "Envoyez les inquisiteurs. Nous ferons d'eux un exemple."

 kvangahga_events.21:0 "Les Conséquences de la Démonologie."
 kvangahga_events.21.t:0 "Les Conséquences de la Démonologie."
 kvangahga_events.21.d:0 "Aussi fort que nous essayions de montrer à nos frères égarés la lumière et la chaleur de la forge de Kvanga, il y a ceux qui insistent pour continuer à risquer leurs âmes en trafiquant avec des démons. Un tel groupe a enlevé des serfs à [demon_pact_province.GetName] et a conduit un rituel sacrificiel brutal.\n\nEn cette occasion leur rituel a échoué horriblement : l'entité démoniaque qu'ils ont contactée est mécontente et un fléau surnaturel a frappé la région."
 kvangahga_events.21.a:0 "Ces imbéciles. Ils apprendront avec le temps."
 kvangahga_events.21.b:0 "Montrez-leur l'erreur de leurs voies."

 kvangahga_events.22:0 "Les Serfs Fuient les Rituels Démoniaques"
 kvangahga_events.22.t:0 "Les Serfs Fuient les Rituels Démoniaques"
 kvangahga_events.22.d:0 "Aussi fort que nous essayions de montrer à nos frères égarés la lumière et la chaleur de la forge de Kvanga, il y a ceux qui insistent pour continuer à risquer leurs âmes en trafiquant avec des démons. Un tel groupe a enlevé des serfs à [demon_pact_province.GetName] et a conduit un rituel sacrificiel brutal.\n\nLa population non-gnoll a fui la région en masse, cherchant refuge dans notre capitale et suppliant notre [Root.Monarch.GetTitle] d'aider leurs proches. Comment devrions-nous gérer cette situation ?"
 kvangahga_events.22.a:0 "Permettre aux serfs de se réfugier à la capitale. Nous traiterons le Xhazobkult plus tard."
 kvangahga_events.22.b:0 "Ces hérétiques doivent être punis. Envoyez nos prêtres défaire leur œuvre démoniaque"
 kvangahga_events.22.c:0 "Peut-être y a-t-il quelque chose dans ce Xhazobkult…"

 #modifiers
 ancestral_armaments:0 "Armements Ancestraux"
 hellfire_armaments:0 "Armements Infernaux"
