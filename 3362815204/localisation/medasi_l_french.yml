 medasi.2.t:0 "Le Medaka de $COUNTRY$"
 medasi.2.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Kuiika s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Sama, qui revendique une descendance de Kui de Kui par son fils aîné, et le Medawor de la Maison Ahmose, marchands habiles avec d'importants investissements dans les terres côtières nouvellement revendiquées de Kuiika."
 medasi.2.a:0 "Le Medawor, de la Maison Ahmose"
 medasi.2.b:0 "L'Efergezmu, de la Maison Sama"
 medasi.2.c:0 "Garder [Root.Monarch.GetName]"
 medasi.2.e:0 "Garder [Root.Monarch.GetName]"

 medasi.3.d:0 "Avec le décès du Medaka, le Conseil Satrapal d'Isagumze s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Alangba, guerriers accomplis et profondément ancrés dans les traditions des Ikilshebe, et le Medawor de la Maison Rakin, propriétaires des nombreuses fermes qui sont le socle de l'économie d'Isagumze."
 medasi.3.a:0 "Le Medawor, de la Maison Rakin"
 medasi.3.b:0 "L'Efergezmu, de la Maison Alangba"
 medasi.3.c:0 "Garder [Root.Monarch.GetName]"
 medasi.3.e:0 "Garder [Root.Monarch.GetName]"

 medasi.4.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Saqraxat s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Ikhoye et le Medawor de la Maison Intef."
 medasi.4.a:0 "Le Medawor, de la Maison Intef"
 medasi.4.b:0 "L'Efergezmu, de la Maison Ikhoye"
 medasi.4.c:0 "Garder [Root.Monarch.GetName]"
 medasi.4.e:0 "Garder [Root.Monarch.GetName]"

 medasi.5.d:0 "Avec le décès du Medaka, le Conseil Satrapal d'Iqhekabi s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Bira et le Medawor de la Maison Gesgol."
 medasi.5.a:0 "Le Medawor, de la Maison Gesgol"
 medasi.5.b:0 "L'Efergezmu, de la Maison Bira"
 medasi.5.c:0 "Garder [Root.Monarch.GetName]"
 medasi.5.e:0 "Garder [Root.Monarch.GetName]"

 medasi.6.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Zena s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Kaniri et le Medawor de la Maison Taarat."
 medasi.6.a:0 "Le Medawor, de la Maison Taarat"
 medasi.6.b:0 "L'Efergezmu, de la Maison Kaniri"
 medasi.6.c:0 "Garder [Root.Monarch.GetName]"
 medasi.6.e:0 "Garder [Root.Monarch.GetName]"

 medasi.7.d:0 "Avec le décès du Medaka, le Conseil Satrapal d'Imbushid s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Ndarumo, pieux serviteurs du culte de Mbenilitye, et le Medawor de la Maison Babhet, propriétaires des mines d'or d'Imbushid et proches parents de la famille la plus riche d'Imidkis, aujourd'hui décédée."
 medasi.7.a:0 "Le Medawor, de la Maison Babhet"
 medasi.7.b:0 "L'Efergezmu, de la Maison Ndarumo"
 medasi.7.c:0 "Garder [Root.Monarch.GetName]"
 medasi.7.e:0 "Garder [Root.Monarch.GetName]"

 medasi.8.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Kulugiash s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Kulugiash, célèbre pour ses guerriers experts dans le moule d'Ikhani lui-même, et le Medawor de la Maison Hitabir, propriétaires des nombreuses mines de fer de l'est de Kulugiash qui approvisionnent ses armées."
 medasi.8.a:0 "Le Medawor, de la Maison Hitabir"
 medasi.8.b:0 "L'Efergezmu, de la Maison Kulugiash"
 medasi.8.c:0 "Garder [Root.Monarch.GetName]"
 medasi.8.e:0 "Garder [Root.Monarch.GetName]"

 medasi.9.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Zuvavim s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Movuma, propriétaires de l'Armada des Voiles Solaires et amis des Vyzemby, et le Medawor de la Maison Dawyaw, commandants de la Marine du Vent d'Acier et anciens exécutants du contrôle commercial khétératan dans le Golfe de Kunolo."
 medasi.9.a:0 "Le Medawor, de la Maison Dawyaw"
 medasi.9.b:0 "L'Efergezmu, de la Maison Movuma"
 medasi.9.e:0 "Garder [Root.Monarch.GetName]"
 medasi.9.c:0 "Garder [Root.Monarch.GetName]"

 medasi.10.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Chibuswa s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Kunesha et le Medawor de la Maison Hashwar."
 medasi.10.a:0 "Le Medawor, de la Maison Hashwar"
 medasi.10.b:0 "L'Efergezmu, de la Maison Kunesa"
 medasi.10.c:0 "Garder [Root.Monarch.GetName]"
 medasi.10.e:0 "Garder [Root.Monarch.GetName]"

 medasi.11.d:0 "Avec le décès du Medaka, le Conseil Satrapal de Gomuvuri s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Asigareg, descendants de l'un des grands alliés Irsukuba de Kui qui ont depuis embrassé la culture Vurebindu, et le Medawor de la Maison Benrba, connus comme proches amis des mages de bataille Aramoole."
 medasi.11.a:0 "Le Medawor, de la Maison Benrba"
 medasi.11.b:0 "L'Efergezmu, de la Maison Asigareg"
 medasi.11.c:0 "Garder [Root.Monarch.GetName]"
 medasi.11.e:0 "Garder [Root.Monarch.GetName]"

 medasi.12.d:0 "Avec le décès du Kamedaw, le Conseil Satrapal de Samishesha s'est réuni pour décider qui héritera du trône. Nos deux candidats sont l'Efergezmu de la Maison Kitoko, qui cherche un retour aux normes fangaulanes, et le Medawor de la Maison Tophird, qui souhaite une intégration plus poussée dans Horashesh."
 medasi.12.a:0 "Le Medawor, de la Maison Tophird"
 medasi.12.b:0 "L'Efergezmu, de la Maison Kitoko"
 medasi.12.c:0 "Garder [Root.Monarch.GetName]"
 medasi.12.e:0 "Garder [Root.Monarch.GetName]"

 medasi.20.t:0 "Le Compromis Medasi"
 medasi.20.d:0 "Les Medasi de l'ouest de Sarhal n'ont guère été plus que des marionnettes du grand Empire de la Khétérata pendant des siècles. Si un Medasi faisait un pas de travers, les armées de la Khétérata marchaient vers le sud pour écraser les fauteurs de troubles. Cependant, cela fait cinq ans que la Khétérata a perdu le cours supérieur du Sorrow face aux hordes gnolles. Il est clair que le destin des Medasi est désormais entre leurs propres mains.\n\nLes Medasi fonctionnaient sur un système de partage du pouvoir. Un gouverneur khetiste, parfois originaire de la Khétérata mais plus souvent issu de la noblesse locale des Medawor, gouvernait en tandem avec la famille royale locale des Efergezmu. Cette structure est restée en place même après l'effondrement de la Khétérata, bien que personne ne soit satisfait du système actuel. Pour les Medawor, la perte d'autorité avec l'effondrement de la Khétérata est terrifiante. Ils pourraient perdre leurs positions de pouvoir et se retrouver persécutés en tant que khetistes étrangers si les Efergezmu parvenaient à rallier les paysans contre eux.\n\nCependant, une rumeur dangereuse se répand parmi les Efergezmu. Ils parlent de la perspective terrifiante de ce qui arriverait si les Medawor prenaient le contrôle total. Une nation gouvernée uniquement par ceux de foi khetiste, où toute culture et religion locale aurait été éradiquée. Ils appellent cet avenir redouté la Terreur de Kartakhet, où Horashesh serait une fois pour toutes forcé de devenir entièrement khetiste.\n\nPour l'instant, l'équilibre des pouvoirs reste dans un équilibre inconfortable. Mais si un seul Medasi gagnait trop en puissance, les questions sur l'avenir d'Horashesh deviendraient considérablement plus pressantes."
 medasi.20.a:0 "Apaiser les Medawor pour l'instant"
 medasi.20.b:0 "Calmer les craintes des Efergezmu"
 medasi.20.tooltip.a:0 "Si l'un des camps de la lutte de pouvoir Medawor contre Efergezmu atteint plus de 90 de pouvoir, nous pourrons réformer le Compromis Medasi et former une nouvelle nation"
 medasi.20.tooltip.b:0 "Si l'un des camps de la lutte de pouvoir Medawor contre Efergezmu atteint plus de 90 de pouvoir, nous pourrons réformer le Compromis Medasi et former une nouvelle nation"

 medasi.21.t:0 "Une Proposition Fructueuse"
 medasi.21.d:0 "La majorité de la richesse de [Root.GetName] est entre les mains de la riche noblesse khetiste. Leurs ancêtres étaient des colons de la Khétérata qui se sont emparés de vastes étendues des terres les plus précieuses par la force. À notre époque plus civilisée, ces descendants continuent de s'emparer de plus de terres et de pouvoir par des pots-de-vin plutôt que par la force, bien que cette méthode moins violente engendre toujours des conflits.\n\nC'est exactement ce qui vient de se passer à [Root.GetName]. Des colons khetistes ont commencé à clôturer de grandes portions de terre pour leur propre usage. Ces terres étaient utilisées par des fermiers pastoraux locaux depuis des générations, et ils se sont plaints auprès des Efergezmu de ce problème. Les khetistes insistent sur le fait qu'ils feront un usage bien plus fructueux de la terre, et ont le cadeau parfait pour adoucir l'affaire."
 medasi.21.a:0 "Je suis sûr que les khetistes feront bon usage de la terre"
 medasi.21.b:0 "Cette terre appartient aux fermiers locaux"

 medasi.22.t:0 "Ragoût de Chat"
 medasi.22.d:0 "Après une troisième mauvaise récolte consécutive, les habitants de [event_province.GetName] ont tourné leurs talents culinaires vers un nouvel animal : les chats. Avec une importante population de chats errants, le ragoût de chat est devenu le nouveau plat de choix pour une famille cherchant à manger de la viande au dîner. Les Medawor, qui considèrent le chat comme un animal sacré, exigent que vous fassiez quelque chose contre cette pratique barbare."
 medasi.22.a:0 "Qu'ils mangent des chats"
 medasi.22.b:0 "Réprimer cette pratique"

 medasi.23.t:0 "Accusations d'Empoisonnement"
 medasi.23.d:0 "L'un des Medawor les plus éminents est récemment décédé dans des circonstances mystérieuses, étant tombé violemment malade après le dîner un soir et décédant quelques heures plus tard malgré les meilleurs efforts de ses médecins. Sa famille accuse publiquement certains de ses rivaux politiques Efergezmu d'avoir orchestré son meurtre, affirmant qu'ils ont soudoyé l'un de leurs cuisiniers pour glisser du poison dans son dîner, et exigeant qu'ils soient arrêtés et punis pour leur crime.\n\nIls n'ont pas été en mesure de présenter des preuves concluantes de ce crime, et les Efergezmu affirment que la mort est probablement le résultat d'une maladie, l'un d'eux osant dire que les Medawor n'auraient pas à craindre les maladies locales s'ils retournaient simplement en Khétérata."
 medasi.23.a:0 "La famille a raison, arrêtez les meurtriers"
 medasi.23.b:0 "Sans preuves, nous ne pouvons rien faire"
 medasi.23.c:0 "Punir la famille pour diffamation"

 medasi.24.t:0 "Une Représentation Offensante"
 medasi.24.d:0 "Un poète et conteur itinérant renommé, dont l'affiliation aux Efergezmu est largement connue, a récemment commencé à interpréter un nouveau poème devenu controversé en raison de sa représentation des Medawor. Il se déroule dans une nation horasheshi fictive, Gulumuika, où les Medawor ont pris le contrôle total, établissant un règne tyrannique vil et supprimant les coutumes et traditions locales.\n\nLes personnages Medawor sont montrés comme des créatures bornées, lâches et cupides, interprétées par des danseurs portant des masques ressemblant à des félins monstrueux difformes. Les héros, en revanche, sont un groupe de nobles et héroïques guerriers Noukahi qui parviennent finalement à tuer le roi Medawor maléfique et à restaurer l'ordre traditionnel de Gulumuika.\n\nCe poème est devenu immensément populaire et il est fréquemment cité dans les cercles Efergezmu, mais les Medawor le considèrent comme une attaque directe contre leur peuple et nous demandent de l'interdire immédiatement."
 medasi.24.a:0 "C'est offensant, interdisez-le"
 medasi.24.b:0 "C'est un excellent poème"
 medasi.24.c:0 "Engagez-le pour écrire une suite"

 medasi.25.t:0 "Un Monument de Marbre"
 medasi.25.d:0 "Un éminent marchand Vyzemby nous a offert un grand bloc de marbre en guise de gratitude pour notre soutien dans l'une de ses entreprises commerciales. Trois des sculpteurs les plus éminents de [Root.GetName] se disputent le privilège d'être commissionnés pour créer une œuvre magnifique à partir de celui-ci. Cela a conduit à une compétition qui a pris des connotations politiques en raison du type de sculptures que ces artistes veulent créer.\n\nLe premier d'entre eux, membre d'une importante famille Medawor, veut transformer le marbre en une effigie d'Elikhet. Le second, un fervent adepte du Panthéon Noukahi, prévoit de sculpter le portrait de l'un des nombreux héros de la foi. Le troisième, peut-être le plus talentueux des trois, propose de façonner la pierre en un monument à l'unité de la nation.\n\nLes deux premiers sculpteurs ont trouvé un soutien financier dans leurs factions politiques respectives, qui offrent de payer la moitié de leurs dépenses et salaires, les rendant moins chers pour l'État à embaucher, mais il vaudrait peut-être la peine de payer un peu plus pour éviter d'alimenter le factionnalisme omniprésent."
 medasi.25.a:0 "Sculptez l'effigie d'Elikhet"
 medasi.25.b:0 "Sculptez le héros du Panthéon Noukahi"
 medasi.25.c:0 "Sculptez le monument à l'unité"
 medasi.25.e:0 "Nous n'en avons pas besoin, renvoyez la pierre au marchand"

 medasi.26.t:0 "Prédicateur Gênant"
 medasi.26.d:0 "La puissance croissante des Medawor a contrarié beaucoup de monde à [From.GetName]. L'un de ces mécontents, un prédicateur particulièrement charismatique de [event_province.GetName], a commencé à prononcer des sermons enflammés pour la population Noukahi locale, les exhortant à se soulever contre l'influence insidieuse des nobles khetistes pour défendre leurs traditions sacrées.\n\nLe prédicateur a acquis une grande popularité parmi les masses, et bien qu'il n'y ait pas encore eu d'incidents liés à ces sermons, les Medawor sont compréhensiblement inquiets."
 medasi.26.a:0 "Mettre fin aux sermons"
 medasi.26.b:0 "Laissez-le parler, il ne fait aucun mal"
 medasi.26.c:0 "Il dit la vérité ! Amenez-le à la cour"

 medasi.27.t:0 "Les Sermons Continuent"
 medasi.27.d:0 "Une tragédie a frappé [event_province.GetName] ! Les paysans locaux, motivés par les sermons du prédicateur Noukahi, sont passés à l'action contre ce qu'ils considéraient comme une influence étrangère perfide. Ils ont assailli les résidences des Medawor locaux, passant les nobles et leurs familles au fil de l'épée et s'emparant de leurs propriétés.\n\nLes Medawor sont outrés, et ils blâment notre inaction pour la mort de leurs frères. Ils exigent des représailles rapides contre la populace paysanne et la mise en œuvre de mesures fortes pour éviter que de telles tragédies ne se répètent à l'avenir. Quelle que soit la ligne de conduite que nous suivrons, cet acte tragique de violence déstabilisera certainement notre nation."
 medasi.27.a:0 "Écraser les paysans et protéger les Medawor"
 medasi.27.b:0 "Ce n'est qu'un incident isolé, de telles mesures ne sont pas nécessaires"
 medasi.27.c:0 "Ces paysans sont des héros ! Ils ont fait ce qui devait être fait"

 medasi.28.t:0 "Armées Privées des Medawor"
 medasi.28.d:0 "Se sentant en danger face aux troubles paysans, et ne trouvant pas de protection auprès de l'État, les Medawor ont commencé à engager des armées privées de mercenaires pour se protéger eux-mêmes et leurs propriétés. Allant de petites bandes de moins d'une centaine de soldats à des légions de milliers de guerriers entraînés, ces armées privées sont embarrassantes pour l'État, car elles semblent indiquer une incapacité ou une réticence à protéger ses propres citoyens, et suscitent également des inquiétudes quant à une éventuelle prise de contrôle violente de la nation par les Medawor.\n\nLes conseillers de la cour s'accordent unanimement sur le fait que le problème doit être traité, mais ils divergent quant à la méthode, certains préconisant que l'État offre une protection complète aux Medawor et leur accorde des concessions en échange du démantèlement volontaire des armées, tandis que d'autres estiment que les armées privées doivent être interdites et que tout Medawor qui refuse de se conformer doit être écrasé."
 medasi.28.a:0 "Nous aurions dû les protéger dès le départ"
 medasi.28.b:0 "Écrasez-les !"
 medasi.28.c:0 "Et si nous ne faisions rien en espérant que cela se résolve tout seul ?"

 medasi.29.t:0 "Un Bœuf Sacrificiel"
 medasi.29.d:0 "L'un des propriétaires terriens Medawor de notre pays possède un magnifique bœuf blanc, et en raison de problèmes économiques, il a récemment exprimé son intérêt à vendre la bête.\n\nUn temple local du Panthéon Noukahi a entamé des négociations avec lui pour acheter l'animal, offrant une somme d'argent significative, et bien que le noble ait été initialement plus que disposé à accepter, il a changé d'avis au dernier moment lorsqu'il a découvert que le bœuf deviendrait un sacrifice à l'un des dieux Noukahi, car cela va à l'encontre de ses croyances khetistes dévotes.\n\nCela a conduit le temple à demander l'intervention de l'État, nous demandant de forcer le propriétaire terrien à honorer la vente."
 medasi.29.a:0 "Il a le droit de faire ce qu'il veut de sa propriété"
 medasi.29.b:0 "Saisir le bœuf et le donner au temple"

 medasi.30.t:0 "Fuite d'un Futur Héros"
 medasi.30.d:0 "Un puissant Medawor avait arrangé un mariage entre son fils unique et la fille d'une autre famille Medawor. À quelques jours du mariage, le marié a choqué le pays en s'enfuyant de chez lui. Après une recherche rapide, nous l'avons trouvé en compagnie d'un aventurier de basse extraction. Il a abandonné la foi de sa famille en faveur du Panthéon Noukahi, et souhaite maintenant devenir un aventurier itinérant avec son partenaire. Le couple espère accomplir un jour suffisamment d'exploits pour être rappelé par les fidèles parmi les nombreux héros du Panthéon Noukahi.\n\nSon père est, bien sûr, furieux. Il nous demande de ramener son fils dans son foyer afin qu'il puisse être remis dans le droit chemin et que le mariage puisse avoir lieu. Il veut également que nous punissions son compagnon d'aventure pour sa responsabilité dans la conversion et la fuite de son fils. Faire cela, cependant, contrarierait sans doute à la fois les aventuriers de notre pays et notre église, qui sont tous deux ravis que le jeune homme veuille rejoindre leurs rangs."
 medasi.30.a:0 "Le renvoyer et punir son compagnon"
 medasi.30.b:0 "Leur objectif est noble, laissons-leur une chance de devenir des héros"

 medasi.31.t:0 "Une Feuille de Figuier en Guise de Raison"
 medasi.31.d:0 "Un noble Medawor a récemment acheté un terrain sur lequel il prévoyait de construire un grand palais. Cette intention s'est heurtée à un prêtre local, qui affirme qu'un figuier situé au milieu de la propriété est sacré. Il dit que l'arbre, qui en apparence n'est qu'un arbre ordinaire sans aucun élément distinctif, est le dernier lieu de repos d'un héros renommé de notre foi, et en tant que tel, il ne peut être coupé ou altéré de quelque manière que ce soit.\n\nLe noble conteste cette affirmation, arguant que l'arbre n'avait jamais reçu aucune forme de dévotion ou de pèlerinage avant qu'il n'annonce son intention de construire le palais. Il croit que le prêtre, qui est un fervent partisan des Efergezmu, a fabriqué une fausse histoire pour lui nuire en raison de rivalités politiques. L'histoire de ce supposé héros n'apparaît dans aucun de nos registres, et le seul qui semble se souvenir de l'importance de l'arbre est le prêtre. Cela ne prouve pas qu'il ment, car le héros pourrait simplement être une figure particulièrement obscure dont la mémoire s'est perdue au fil du temps.\n\nLaisser le Medawor couper l'arbre contrarierait certainement la population locale, mais certains de nos conseillers craignent que le forcer à le respecter créerait un précédent et compliquerait les futurs développements et constructions là où se trouvent des sanctuaires supposés."
 medasi.31.a:0 "Ce n'est qu'un figuier, laissez-le le couper"
 medasi.31.b:0 "Le figuier est sacré, il devra construire un palais plus petit"
 medasi.31.c:0 "Saisir ses terres et construire un grand sanctuaire"

 medasi.32.t:0 "Réparer les Relations"
 medasi.32.d:0 "Les relations entre [Root.Monarch.GetName] et les Efergezmu restent aussi tendues que jamais, mais certains progrès ont été réalisés avec différentes sections de la population paysanne. Le Panthéon Noukahi est une foi très désorganisée, avec de nombreux cultes et suivis différents dans ses rangs. Si nous pouvons réparer nos relations avec l'une de ces sectes, leurs fidèles nous aideront à unir le peuple sous notre règne."
 medasi.32.a:0 "Se lier d'amitié avec le Culte de Bodzak Zuvetva"
 medasi.32.b:0 "Se lier d'amitié avec le Culte d'Avo Zuvawok"
 medasi.32.c:0 "Se lier d'amitié avec le Culte de Kuikwiza"
 medasi.32.e:0 "Se lier d'amitié avec le Culte d'Ikhanilawuli"
 medasi.32.f:0 "Hors d'ici avec cette hérésie"

 medasi.33.t:0 "Temple à Elikhet"
 medasi.33.d:0 "La Pyramide d'Elikhet à Kheterat est un spectacle si grandiose qu'on dit qu'elle convertira quiconque la contemple à la foi khetiste. Un architecte élikhétiste local a présenté ses plans pour construire un temple en forme de pyramide à [event_province.GetName], et a déjà obtenu la moitié du financement avec le soutien des Medawor locaux. Ils ont juste besoin que nous fournissions l'or restant."
 medasi.33.a:0 "Ils ont notre soutien"
 medasi.33.b:0 "Nous ne pouvons pas nous permettre de tels luxes maintenant"

 medasi.34.t:0 "Ultimatum des Medawor"
 medasi.34.d:0 "Les Medawor n'ont cessé de gagner en puissance, en partie par la corruption, mais une grande partie grâce à nos propres actions. Un porte-parole des Efergezmu a délivré un ultimatum sévère. Soit nous inversons la puissance et l'influence croissantes des Medawor, soit nous risquons la Terreur de Kartakhet."
 medasi.34.a:0 "Ignorer l'avertissement"
 medasi.34.b:0 "Nous ne devons pas les irriter davantage"

 medasi.35.t:0 "Medawor Mécontents"
 medasi.35.d:0 "Les Medawor ont régulièrement perdu du pouvoir à [Root.GetName]. Ils ont constaté que de plus en plus, leur plus grande réserve de richesse n'a pas été en mesure d'acheter de l'influence auprès de ceux au pouvoir. Cela ne les a cependant pas empêchés d'essayer, et les signes indiquent qu'ils ont l'intention d'intensifier leurs efforts pour acheter de l'influence dans la gestion du pays. Nous pourrions intervenir maintenant pour empêcher cela, mais cela contrarierait encore davantage les Medawor."
 medasi.35.a:0 "Laissez-les jeter leur argent par les fenêtres"
 medasi.35.b:0 "Réprimer cette pratique"

 # state_song_xprt medasi events loc
 medasi.36.t:0 "Quartiers Medawor"
 medasi.36.d:0 "Les Medawor de [event_province.GetName], lassés de vivre parmi la population locale, ont demandé le droit de créer des quartiers résidentiels exclusifs et semi-autonomes. Permettre cela plairait aux Medawor dans leur ensemble et aiderait à développer l'économie locale, mais si nous refusons la proposition, nous pourrions gagner la bonne volonté des Efergezmu et une excuse pour réprimer l'autonomie à [event_province.GetName]."
 medasi.36.a:0 "L'autoriser"
 medasi.36.b:0 "Nous ne permettrons pas cela"

 medasi.37.t:0 "Réforme Agraire"
 medasi.37.d:0 "Depuis le déclin de la Khétérata, les Efergezmu de [event_province.GetName] réclament le démantèlement des vastes domaines détenus par la classe dirigeante khétératane. Accéder à cette demande plairait grandement aux Efergezmu, mais antagoniserait les Medawor et risquerait une perte de productivité. D'un autre côté, les Medawor ont offert un... « don » à l'État en échange de faire la sourde oreille aux plaintes des Efergezmu."
 medasi.37.a:0 "Redistribuer les terres"
 medasi.37.b:0 "Défendre les droits fonciers des Medawor"

 medasi.38.t:0 "Internationalisme Medawor"
 medasi.38.d:0 "Malgré l'effondrement de la Khétérata, de nombreuses familles Medawor ont maintenu des liens diplomatiques avec l'ancien pays. Si nous encourageons ces liens, nous pourrions gagner en prestige sur la scène mondiale, mais les Efergezmu pourraient voir cela comme une forme de trahison. Alternativement, nous pourrions encourager l'intégration locale, mais les Medawor n'apprécieront pas d'être coupés de leurs contacts."
 medasi.38.a:0 "Encourager l'internationalisme"
 medasi.38.b:0 "Se concentrer plutôt sur les Efergezmu"

 medasi.39.t:0 "Petits et Grands Unis"
 medasi.39.d:0 "Des graffitis à [event_province.GetName] ont commencé à apparaître représentant une petite figure représentant un halfelin et une grande figure représentant un [Root.GetAdjective] faisant équipe pour battre un chat. Les Medawor se sont offusqués du message très évident et demandent une répression de la population halfeline locale, qu'ils considèrent comme attisant les Efergezmu."
 medasi.39.a:0 "Réprimer les halfelins de [event_province.GetName]"
 medasi.39.b:0 "Ce ne sont que des paroles"

 medasi.40.t:0 "Auxiliaires Écailleux"
 medasi.40.d:0 "Un groupe d'hommes-lézards a proposé de s'installer à [event_province.GetName] comme exécutants pour les Medawor. Bien que cela puisse potentiellement mener à une intégration plus large et nous permettre de lever une armée plus importante, les Efergezmu seraient très offensés que des agents de sécurité privés hommes-lézards patrouillent dans les rues."
 medasi.40.a:0 "Accepter l'offre"
 medasi.40.b:0 "Les renvoyer"
 medasi.40.c:0 "Les tuer et vendre leurs peaux !"

 medasi_power_share:0 "Pouvoir des Medawor sur les Efergezmu"
 ability_anb_medasi_power_share:0 "Partage de Pouvoir Medasi"
 gomuvuri_aramoole_starting_bonus:0 "A sauvé Gomuvuri de l'agression kuiikane"

 #Country and province modifiers
 medawor_private_armies:0 "Armées Privées des Medawor"
 medawor_private_armies_desc:0 "Nous n'avons pas réussi à résoudre le problème des armées privées des Medawor, et en tant que telles, elles continueront d'être une épine dans le flanc de l'État."
 medasi_upset_temples:0 "Temples Mécontents"
 medasi_upset_temples_desc:0 "Nous avons offensé les temples du Panthéon Noukahi en refusant de prendre leur parti contre les Medawor, et ils ne sont pas disposés à nous le faire oublier de sitôt."
 medasi_sacred_tree_cut_down:0 "Arbre Sacré Abattu"
 medasi_sacred_tree_cut_down_desc:0 "Les fidèles du Panthéon Noukahi de cette province sont outrés par notre décision d'autoriser l'abattage de ce qu'ils affirment être un arbre sacré."
 medasi_respecting_shrines:0 "Respect des Sanctuaires"
 medasi_respecting_shrines_desc:0 "Dans ce pays, on prend un soin particulier à ne pas altérer les sanctuaires ou les lieux sacrés, limitant légèrement les constructions et le développement urbain."
 medasi_strictly_respecting_shrines:0 "Respect Strict des Sanctuaires"
 medasi_strictly_respecting_shrines_desc:0 "Ce pays prend des mesures strictes pour s'assurer qu'aucun sanctuaire ou lieu sacré n'est altéré, causant des difficultés significatives pour les constructions et le développement urbain."
 medawor_districts:0 "Quartiers Medawor"
 medawor_districts_desc:0 "Les Medawor locaux ont reçu la permission de vivre dans des quartiers résidentiels exclusifs."
 medawor_crackdown:0 "Répression de l'Autonomie Medawor"
 medawor_crackdown_desc:0 "Une répression nationale des communautés medawor autonomes a renforcé le contrôle de l'État sur les provinces."
 medasi_land_reform:0 "Troubles de la Réforme Agraire"
 medasi_land_reform_desc:0 "Les Medawor locaux sont en colère contre un programme visant à démanteler et redistribuer leurs domaines."
 medawor_international_ties:0 "Liens Internationaux des Medawor"
 medawor_international_ties_desc:0 "Les Medawor ont utilisé leurs liens internationaux pour améliorer les relations avec les pays voisins et faciliter la diffusion des idées."
 medasi_lizardfolk_auxiliaries:0 "Emploi d'Auxiliaires Hommes-Lézards"
 medasi_lizardfolk_auxiliaries_desc:0 "Une bande d'hommes-lézards sert comme auxiliaires militaires, renforçant notre armée nationale mais engendrant un certain mécontentement public."
 medasi_grateful_halfling:0 "Minorités Halfelines Reconnaissantes"
 medasi_grateful_halfling_desc:0 "Les halfelins de la province sont reconnaissants de la faveur que leur a accordée l'État."

