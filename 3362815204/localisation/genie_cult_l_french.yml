#Events
 genie_cult.3.t:0 "Menu du pouvoir du culte des génies"
 genie_cult.3.d:0 "Alimenter une incantation requiert un certain niveau de pouvoir de culte. Selon leurs effets et leur niveau de puissance, chaque incantation nécessite 1, 2, 3 ou 4 points de pouvoir de culte pour être disponible.\n\n Votre pouvoir de culte actuel est de [Root.genie_cult_power_counter.GetValue]."
 genie_cult.3.a:0 "Incantations de pouvoir (Coût 1)"
 genie_cult.3.ax:0 "Incantations de pouvoir (Coût 1)"
 genie_cult.3.b:0 "Incantations de charge (Coût 2)"
 genie_cult.3.bx:0 "Incantations de charge (Coût 2)"
 genie_cult.3.c:0 "Incantations de charge (Coût 3)"
 genie_cult.3.cx:0 "Incantations de charge (Coût 3)"
 genie_cult.3.dd:0 "Incantations de charge (Coût 4)"
 genie_cult.3.ddx:0 "Incantations de charge (Coût 4)"
 genie_cult.3.e:0 "Quitter ce menu"

 genie_cult.4.t:0 "Sélection d'incantations mineures"
 genie_cult.4.d:0 "Choisissez une incantation mineure. Chaque incantation coûte 1 de pouvoir de culte des génies. Votre pouvoir de culte actuel est de [Root.genie_cult_power_counter.GetValue]. Quelle incantation voulez-vous sélectionner ?"
 genie_cult.4.a:0 "Chaleur de vie"
 genie_cult.4.b:0 "Sables guides"
 genie_cult.4.c:0 "Retourner au menu précédent"

 genie_cult.5.t:0 "Sélection d'incantations intermédiaires"
 genie_cult.5.d:0 "Choisissez une incantation intermédiaire. Chaque incantation coûte 2 de pouvoir de culte des génies. Votre pouvoir de culte actuel est de [Root.genie_cult_power_counter.GetValue]. Quelle incantation voulez-vous sélectionner ?"
 genie_cult.5.a:0 "Roches lumineuses"
 genie_cult.5.b:0 "Armure retirée"
 genie_cult.5.c:0 "Ferveur guerrière"
 genie_cult.5.dd:0 "Retourner au menu précédent"

 genie_cult.6.t:0 "Sélection d'incantations majeures"
 genie_cult.6.d:0 "Choisissez une incantation majeure. Chaque incantation coûte 3 de pouvoir de culte des génies. Votre pouvoir de culte actuel est de [Root.genie_cult_power_counter.GetValue]. Quelle incantation voulez-vous sélectionner ?"
 genie_cult.6.a:0 "Perfection du foyer"
 genie_cult.6.b:0 "Éclaboussure d'émeraude"
 genie_cult.6.c:0 "Embrasement de gloire"
 genie_cult.6.dd:0 "Mur de feu"
 genie_cult.6.e:0 "Juste jugement"
 genie_cult.6.f:0 "Vents sacrés"
 genie_cult.6.g:0 "Restauration des arts déchus"
 genie_cult.6.h:0 "Chant des sirènes"
 genie_cult.6.i:0 "Retourner au menu précédent"

 genie_cult.7.t:0 "Sélection d'incantations suprêmes"
 genie_cult.7.d:0 "Choisissez une incantation suprême. Chaque incantation coûte 4 de pouvoir de culte des génies. Votre pouvoir de culte actuel est de [Root.genie_cult_power_counter.GetValue]. Quelle incantation voulez-vous sélectionner ?"
 genie_cult.7.a:0 "Préservation de la vie"
 genie_cult.7.b:0 "Bâtiments sacrés"
 genie_cult.7.c:0 "Lien rouge"
 genie_cult.7.dd:0 "Incantation de changement"
 genie_cult.7.e:0 "Émancipation renouvelée"
 genie_cult.7.f:0 "Façonnement d'un roi"
 genie_cult.7.g:0 "Globe-trotter"
 genie_cult.7.h:0 "Ébranleur de terre"
 genie_cult.7.i:0 "Tempête de sable divine"
 genie_cult.7.j:0 "Pouvoir d'une épitaphe"
 genie_cult.7.k:0 "Écorchement de l'esprit"
 genie_cult.7.l:0 "Rite ardimyien"
 genie_cult.7.m:0 "Retourner au menu précédent"

 genie_cult.8.t:0 "Préservation de la vie"
 genie_cult.8.d:0 "Boqorada Duqaddha, reine des mers du sud, nous a bénis des eaux de vie. Même nos soldats les plus grièvement blessés peuvent être épargnés des agonies de la mort et recevoir une seconde chance. Ils sont maintenant prêts à reprendre le service après s'être remis de leur épreuve."
 genie_cult.8.a:0 "Accueillons-les à nouveau dans nos rangs !"

 genie_cult.10.t:0 "Lien rouge"
 genie_cult.10.d:0 "Le grand éfrit phénix des jungles occidentales a daigné partager avec nous sa connaissance secrète de la flamme et des entraves. Grâce à elle, nous pouvons envelopper nos ennemis de chaînes forgées de flamme invisible, entravant leurs forces et nous permettant de défendre nos terres brûlées."
 genie_cult.10.a:0 "Qu'ils ressentent le brasier ardent de notre courroux !"

 genie_cult.11.t:0 "Tempête de sable divine"
 genie_cult.11.d:0 "Fidiya l'éclair a invoqué les vents abrasifs du Salahad pour soulever nos armées, leur permettant de marcher à la vitesse du vent puis de frapper avec la force d'une tempête."
 genie_cult.11.a:0 "Nous nous déplacerons aussi rapides et féroces que la tempête de sable !"

 genie_cult.12.t:0 "Un nouveau culte s'est répandu sur nos terres"
 genie_cult.12.d:0 "Nos compagnons adeptes du culte des génies ont commencé à vénérer un génie dont le culte n'existe pas encore sur nos terres. Grâce à nos relations cordiales, ils pourraient être persuadés de nous céder certaines reliques de ce culte, afin qu'il puisse trouver un nouveau foyer sur nos terres. Quel culte devons-nous chercher à établir dans notre royaume ?"
 genie_cult.12.a:0 "Obtenir l'accès au culte de Brasan !"
 genie_cult.12.b:0 "Obtenir l'accès au culte de Naqi !"
 genie_cult.12.c:0 "Obtenir l'accès au culte d'Al Dimiryat !"
 genie_cult.12.dd:0 "Obtenir l'accès au culte du Grand Sultan !"
 genie_cult.12.e:0 "Obtenir l'accès au culte de Hal'ail !"
 genie_cult.12.f:0 "Obtenir l'accès au culte de Fidiya !"
 genie_cult.12.g:0 "Obtenir l'accès au culte de Jannu !"
 genie_cult.12.h:0 "Obtenir l'accès au culte de Bishaaro !"
 genie_cult.12.i:0 "Obtenir l'accès au culte de Boqorada Duqaddha !"
 genie_cult.12.j:0 "Obtenir l'accès au culte de Darbanar !"
 genie_cult.12.k:0 "Obtenir l'accès au culte de Mansur & Malith !"

 genie_cult.101.t:0 "Établissement du culte de Brasan"
 genie_cult.101.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Brasan où il peut être vénéré comme il se doit. Lui qui libéra les Surakeši de l'oppression de ceux de son espèce qui furent corrompus par les Ténèbres et devinrent de cruels suzerains plutôt que de sages enseignants."
 genie_cult.101.a:0 "Nous honorerons sa noble mémoire et libérerons ceux qui sont enchaînés !"

 genie_cult.102.t:0 "Établissement du culte de Naqi"
 genie_cult.102.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Naqi où elle peut être vénérée comme il se doit. Elle qui guida les peuples de Khétapéra pendant des âges innombrables et leur enseigna les mystères de la flamme sacrée."
 genie_cult.102.a:0 "Nous chérirons les vérités sacrées qu'elle a révélées !"

 genie_cult.103.t:0 "Établissement du culte d'Al Dimiryat"
 genie_cult.103.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Al Dimiryat où il peut être vénéré comme il se doit. Lui qui régna sur les savanes occidentales avec sa sage fille Maymunah à ses côtés après la chute du Grand Sultan et protégea la Fangaula des invasions des géants."
 genie_cult.103.a:0 "Nous nous efforcerons d'être dignes de sa faveur !"

 genie_cult.104.t:0 "Établissement du culte du Grand Sultan"
 genie_cult.104.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour le Grand Sultan où il peut être vénéré comme il se doit. Lui qui fut le premier et unique souverain de tous les génies, qui unit son peuple et régna sur tous les coins du monde connu."
 genie_cult.104.a:0 "Nous tenterons d'imiter son règne exalté !"

 genie_cult.105.t:0 "Établissement du culte de Hal'ail"
 genie_cult.105.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Hal'ail où il peut être vénéré comme il se doit. Lui qui fut le seul génie maîtrisant l'art occulte de la prophétie, offrant aux suppliants méritants des aperçus de l'avenir."
 genie_cult.105.a:0 "Nous prierons pour gagner la faveur du tisseur de destins !"

 genie_cult.106.t:0 "Établissement du culte de Fidiya"
 genie_cult.106.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Fidiya où il peut être vénéré comme il se doit. Lui qui chevaucha puissamment sur son chariot d'argent tiré par le vent lui-même à travers toutes les terres de Madriamilak au Salahad et vainquit tous les adversaires sur son chemin."
 genie_cult.106.a:0 "Nous combattrons avec bravoure et puissance pour honorer son exemple !"

 genie_cult.107.t:0 "Établissement du culte de Jannu"
 genie_cult.107.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Jannu où il peut être vénéré comme il se doit. Lui qui explora au-delà de l'horizon le plus lointain et ramena les merveilles du monde dans son refuge montagneux."
 genie_cult.107.a:0 "Nous nous efforcerons de suivre ses traces et d'appréhender le monde avec un regard ouvert !"

 genie_cult.108.t:0 "Établissement du culte de Bishaaro"
 genie_cult.108.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Bishaaro où il peut être vénéré comme il se doit. Lui qui était si séduisant et aimé de tous qu'il dut se réfugier dans un splendide isolement, n'honorant que quelques élus de sa présence, au risque de submerger ceux aux esprits et cœurs faibles."
 genie_cult.108.a:0 "Nous suivrons son exemple et garderons nos frontières sécurisées !"

 genie_cult.109.t:0 "Établissement du culte de Boqorada Duqaddha"
 genie_cult.109.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Boqorada Duqaddha où elle peut être vénérée comme il se doit. Elle qui régna sur les mers du sud, protégeant la terre des dangers des profondeurs, accordant sa faveur aux marins dévots et courageux et punissant les méchants et les cupides."
 genie_cult.109.a:0 "Nous naviguerons bravement sur son domaine et chérirons les nombreux dons des mers !"

 genie_cult.110.t:0 "Établissement du culte de Darbanar"
 genie_cult.110.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Darbanar où il peut être vénéré comme il se doit. Lui qui régna sur tous les éfrits des jungles du sud et assura la prospérité des terres sous sa charge, ne s'inclinant que devant le Grand Sultan lui-même."
 genie_cult.110.a:0 "Nous tenterons de régner aussi sagement et de garder les terres aussi férocement qu'il le décréta !"

 genie_cult.111.t:0 "Établissement du culte de Mansur & Malith"
 genie_cult.111.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Mansur et sa compagne Malith où ils peuvent être vénérés comme il se doit. Eux qui cherchèrent à apporter paix et prospérité à une terre fracturée et furent payés en retour par la trahison et l'emprisonnement."
 genie_cult.111.a:0 "Nous tenterons d'honorer leur mémoire en cherchant à apporter paix et amitié !"

 genie_cult.112.t:0 "Établissement du culte d'Ardimya"
 genie_cult.112.d:0 "Nous avons réussi à rassembler suffisamment de précieuses reliques de l'ère révolue du règne des génies pour ériger des lieux de culte pour Ardimya où elle peut être vénérée comme il se doit. Elle qui mena son peuple vers sa nouvelle patrie, rendit le désert verdoyant et régna avec sagesse sur les terres portant son nom."
 genie_cult.112.a:0 "Nous gouvernerons ces terres aussi sagement et justement qu'elle le fit jadis !"