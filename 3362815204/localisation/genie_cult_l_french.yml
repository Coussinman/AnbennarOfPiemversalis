l_french:

#Cults
 ardimya_cult:0 "Culte d'Ardimya"
 ardimya_cult_desc:0 "Ô Ardimya, sainte-impératrice-qui-fut, bénis soient tes nombreux ouvrages. Accorde-nous ta bienveillance, favorise-nous de ta miséricorde. Pose à nouveau ton regard sur ces terres arides et inonde-les de tes dons comme aux temps anciens. Puisses-tu revenir parmi nous pour guider ton peuple éternellement !"
 brasan_cult:0 "Culte de Brasan"
 brasan_cult_desc:0 "Ô Brasan, grand briseur de chaînes, champion contre l'injustice, libérateur de toute l'humanité, protège-nous à nouveau des forces du mal comme tu le fis jadis. Accorde-nous ta force d'âme, montre-nous ta miséricordieuse bonté !"
 naqi_cult:0 "Culte de Naqi"
 naqi_cult_desc:0 "Ô Naqi, reine éternelle et hiérophante, accorde-nous la bénédiction de ton glorieux règne, laisse les fidèles se baigner dans ta sagesse. Puisses-tu révéler à nous, serviteurs indignes, les mystères de la flamme sacrée !"
 al_dimiryat_cult:0 "Culte d'Al Dimiryat"
 al_dimiryat_cult_desc:0 "Ô Al Dimiryat, suzerain légitime des savanes occidentales, grand sultan des vents, bénis-nous de dirigeants justes et capables, accorde-nous la volonté de fer pour vaincre tous nos ennemis et défendre nos terres !"
 grand_sultan_cult:0 "Culte du Grand Sultan"
 grand_sultan_cult_desc:0 "Ô Grand Sultan, celui-dont-le-nom-ne-peut-être-prononcé, le plus magnifique de tous les seigneurs, premier et dernier unificateur des génies, conquérant irrépressible, laisse-nous prendre part à ta gloire. Accorde-nous la force du bras et de la volonté pour régner sur tous les autres !"
 dakinshi_cult:0 "Culte de Hal'ail"
 dakinshi_cult_desc:0 "Ô rusé Hal'ail, maître des arts prophétiques, tisseur de destins, nous t'implorons de nous accorder un destin favorable. Puisses-tu nous bénir d'un grand destin que même nos ennemis ne pourront nier, que tes visions guident nos marins au long cours pour qu'ils rentrent sains et saufs chez eux."
 fidiya_cult:0 "Culte de Fidiya"
 fidiya_cult_desc:0 "Ô Fidiya rapide et honorable, plus grand cavalier de tout Sarhal, que ton chariot d'argent puisse de nouveau parcourir librement les terres. Prête-nous ta vitesse et ta grâce afin que nous puissions vaincre tous les adversaires croisant notre chemin !"
 jannu_cult:0 "Culte de Jannu"
 jannu_cult_desc:0 "Ô sage Jannu, le plus avisé de tous les génies, mène-nous aux confins les plus reculés du monde et emplis nos esprits de ton imagination féconde. Puissions-nous être bénis de voir la beauté cachée de ce monde comme tu l'as fait !"
 tanizuland_cult:0 "Culte de Bishaaro"
 tanizuland_cult_desc:0 "Ô délicieux Bishaaro, puisses-tu daigner quitter ton splendide isolement et nous honorer de nouveau de ta radieuse présence. Aide-nous à protéger nos amis du danger et à tenir nos ennemis éloignés de nos foyers."
 vyzemby_cult:0 "Culte de Boqorada Duqaddha"
 vyzemby_cult_desc:0 "Ô Boqorada Duqaddha, resplendissante reine des mers, nous implorons ta faveur. Puisses-tu calmer les vagues pour nos navires, bénir nos pêcheurs des trésors de la mer, guider nos marchands vers des ports sûrs et prospères."
 darbanar_cult:0 "Culte de Darbanar"
 darbanar_cult_desc:0 "Ô Darbanar, puissant Phénix des jungles occidentales, le plus féroce des guerriers, le plus rusé des souverains, accorde-nous ta force, bénis-nous d'esprits affûtés et laisse-nous triompher de nos adversaires !"
 horasesh_cult:0 "Culte de Mansur & Malith"
 horasesh_cult_desc:0 "Ô généreux Mansur, ô gracieuse Malith, que votre amour éternel trouve refuge dans les cœurs de nos voisins et rivaux, qu'aucune discorde ne trouble la paix de nos terres. Que Mansur soit enfin libéré et que vous soyez tous deux réunis pour nous bénir de votre largesse inégalée !"

#Decisions
 genie_cult_use_power_title:0 "Utiliser le pouvoir du culte des génies"
 genie_cult_use_power_desc:0 "Le pouvoir du culte des génies sert à renforcer les incantations. Les incantations disponibles dépendent des cultes qui ont été établis."

#Tooltips
 genie_cult_use_power_tt:0 "Ce pouvoir ne peut être utilisé qu'une fois tous les 5 ans"
 genie_cult_open_menu_tt:0 "Préparer une §YIncantation§! dans quelques jours"
 genie_cult_power_1_event_tt:0 "L'événement « §YIncantations de pouvoir (Coût 1)§! » se déclenche."
 genie_cult_power_2_event_tt:0 "L'événement « §YIncantations de charge (Coût 2)§! » se déclenche."
