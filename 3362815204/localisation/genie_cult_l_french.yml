 genie_cult_has_at_least_1_power_tt:0 "Avoir au moins 1 de pouvoir de culte des génies"
 genie_cult_has_at_least_2_power_tt:0 "Avoir au moins 2 de pouvoir de culte des génies"
 genie_cult_has_at_least_3_power_tt:0 "Avoir au moins 3 de pouvoir de culte des génies"
 genie_cult_has_at_least_4_power_tt:0 "Avoir au moins 4 de pouvoir de culte des génies"
 fire_wall_tt:0 "Toutes les provinces possédées avec des forts obtiennent « §YMur de feu§! » pendant 5 ans, conférant les effets suivants :\nAttrition pour les ennemis : §G+1,00§!\nAttrition maximale : §R+1,00§!\nEntretien local du fort : §R+25,0 %§!"
 due_judgement_tt:0 "Obtenir un conseiller aléatoire avec une réduction de 75 %"
 preservation_of_life_tt:0 "Rien ne se passera pendant un an. Puis chaque année, pendant 5 ans, vous gagnerez +5 000 effectifs et +1 000 marins."
 holy_buildings_tt:0 "[Root.GetName] obtient « §YBâtiments sacrés§! » pendant 5 ans.\n\nChaque fois qu'un §YTemple§! est construit, cette province obtient « §YBâtiments sacrés : Impôts§! » pendant 20 ans, conférant les effets suivants :\nModificateur d'impôts local : §G+10,0 %§!\n\nChaque fois qu'un §YAtelier§! est construit, cette province obtient « §YBâtiments sacrés : Production§! » pendant 20 ans, conférant les effets suivants :\nEfficacité de production locale : §G+10,0 %§!\n\nChaque fois qu'un §YTribunal§! est construit, cette province obtient « §YBâtiments sacrés : Révolte§! » pendant 20 ans, conférant les effets suivants :\nRévolte locale : §G-1,00§!\n\nChaque fois qu'une §YCaserne§! est construite, cette province obtient « §YBâtiments sacrés : Effectifs§! » pendant 20 ans, conférant les effets suivants :\nModificateur d'effectifs local : §G+10,0 %§!\n\nChaque fois qu'un §YMarché§! ou un §YChantier naval§! est construit, cette province obtient « §YBâtiments sacrés : Marins§! » pendant 20 ans, conférant les effets suivants :\nModificateur de marins local : §G+10,0 %§!"
 red_bind_tt:0 "Tous les ennemis en guerre obtiennent « §YLien rouge§! » pendant 3 mois, conférant les effets suivants :\nVitesse de mouvement : §R-40,0 %§!\n\nDix provinces possédées avec « §YTerre brûlée§! » obtiennent « §YLien rouge§! » pendant 1 an, conférant les effets suivants :\nBonus de dé du défenseur local : §G+1,00§!"
 renewed_emancipation_tt:0 "[Root.GetName] obtient « §YÉmancipation renouvelée§! » pendant 1 an.\n\nChaque province occupée pendant cette période confère l'effet suivant :\nGain de §G1 000§! effectifs.\n\nChaque bataille gagnée pendant cette période confère l'effet suivant :\nGain de §G5 000§! effectifs."
 making_of_a_king_adm_tt:0 "Si la légitimité est d'au moins §Y80§! :"
 making_of_a_king_dip_tt:0 "Si la réputation diplomatique est d'au moins §Y2§! :"
 making_of_a_king_mil_tt:0 "Si le prestige est d'au moins §Y70§! :"
 globetrotter_tt:0 "Tous les traits négatifs de [Root.Monarch.GetName] sont remplacés par de nouveaux traits, dont l'un est garanti bénéfique."
 earthshaker_tt:0 "Tous nos sièges en cours seront remportés, et les provinces obtiendront « §YTerre brûlée§! » pendant 5 ans."
 divine_sandstorm_tt:0 "[Root.GetName] obtient « §YTempête de sable divine : Mouvement§! » pendant 6 mois, conférant les effets suivants :\nVitesse de mouvement : §G+30,0 %§!\n\nAprès la fin de cet effet, [Root.GetName] obtient « §YTempête de sable divine : Choc§! » pendant 3 mois, conférant les effets suivants :\nDégâts de choc : §G+30,0 %§!"

