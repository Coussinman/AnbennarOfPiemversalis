 #Mt. Tsharab Monument stuff
 declare_zhutashsar: "Se Déclarer Zhutashsar"
 desc_declare_zhutashsar: "Le chemin pour devenir un Zhutashsar, un philosophe Mteibhar, a toujours été nébuleux. Certains furent reconnus de manière posthume, d'autres acquirent graduellement l'éminence de leur vivant. Mais se déclarer Zhutashsar est une action garantie pour enflammer une controverse intense et une opposition. Le faire en tant que dirigeant déstabilisera certainement le royaume. Les dirigeants-philosophes ont toujours été des figures polarisantes, et seuls les plus sages ont réussi à en tirer bénéfice."
 declare_zhutashsar_tt: "Le Dirigeant n'a PAS déjà utilisé '§YSe Déclarer Zhutashsar§!'"
 declare_zhutashsar_effect_tt: "Perd §R20§! Pouvoir Gouvernemental et perd §R1§! Stabilité"
 mteibhar_monastery_tsharab: "Monastère de Tsharabmazh"
 mteibhar_monastery_tsharab_desc: "---------------\nCe ne fut pas un hasard si le Mont Tsharab fut l'endroit où le héros Munakles entra pour la première fois dans les Mteibas. La présence de la montagne peut être ressentie par ceux dans les environs ; son immense spiritualité lui a valu le surnom de « Cœur des Devand ». Mais plus souvent ce sont les Devandi qui ont laissé leur marque sur l'âme de la montagne, et non l'inverse.\n\nCe fut à l'époque de Munakles que le Mont Tsharab fut développé pour la première fois, construit comme une balise et un point de rassemblement pour ses peuples divers. Ce fut à la fin de cet âge révolu que les moines déclarèrent d'abord la montagne sacrée, étendant lentement leur complexe monastique au fil des siècles, bien que le site trouvât un usage plus fréquent comme camp de guerre Chendhyan pour des gens comme Ultarlan. Au XIe siècle, le complexe était tombé entre les mains des Femezkhanz, devenant la capitale d'été pour les énigmatiques mages-prêtres des Mteibhar. Mais le jour des Femezkhanz s'est achevé, et leurs constructions, abandonnées il y a des décennies, sont tombées en délabrement.\n\nD'innombrables philosophes et grands hommes ont visité le Mont Tsharab, et d'innombrables autres viendront."
 mteibhar_monastery_tsharab_tt: "Donne accès à la capacité pour Mazhthramazh et Askaeorg '§YSe Déclarer Zhutashsar§!'"
 province_is_or_accepts_devandi_tt: "La Religion de §Y[Root.GetName]§! est soit §YAskaeorg§! soit §YMazhthramazh§! et est soit la Religion d'État, la Syncrétique ou l'Harmonisée du propriétaire."
 devandi.7.t: "Réflexions sur le Mont Tsharab"
 devandi.7.d: "« J'écoute les mots du conquérant Vaunsarlanbeg :\n\n'Poser le pied sur les pierres de Tsharabmazh, c'est se voir dans le contexte d'un millénaire. Mais je ne suis pas submergé par le passé ou le futur. J'apprends à aimer le présent, car je vois ma place dans la continuité intemporelle de l'histoire.'\n\nTrouver son chemin vers le sommet de la montagne est une tâche monumentale en soi, et une qui récompense les curieux. Un mauvais tournant, et je suis transporté en bas de la montagne vers un ancien cimetière des jours post-Munaklean. Je contemple les tombes : toutes portent des noms inconnus, mais elles doivent avoir été éminentes, comme l'indiquent leurs gravures altières.\n\nLe nom de l'une se distingue : SHOLANSHAZA YSTAERANAS ALA'ZHAMATHAN. Qui était cette personne ? Être Sholanshaz, le chef de l'ordre légendaire des mages-prêtres Femezkhanz Mteibhar, était une réalisation significative ; combien important ils ont dû être en leur temps ! Combien ambitieux ils ont dû être, comme c'était la nature de tous les Femezkhanz. Pourtant, malgré toutes mes recherches dans l'histoire Mteibhar, je n'ai aucun souvenir de cette figure supposément significative.\n\nUn sentiment de futilité s'empare de moi. Malgré leurs exploits, ils furent oubliés. Être rappelé est le désir secret que tous les grands hommes d'État trouvent en commun les uns avec les autres, après tout. Combien de grandes choses ai-je accomplies ! Pourtant il semble inévitable maintenant que dans quelques siècles je reposerai sans souvenir, comme ce fut le cas de ce Sholanshaz.\n\nJe reste assis en silence un moment, ressassant une question écrasante : Que dois-je faire ? »\n\n- Journaux de $MONARCH$, $YEAR$"
 devandi.7.a: "« Les historiens ne se souviennent jamais des grands administrateurs, mais le peuple si. »"
 devandi.7.b: "« Les futurs dirigeants apprécieront la richesse et l'influence que je créerai. »"
 devandi.7.c: "« Seuls les conquérants ont des monuments érigés en leur honneur ! »"
 devandi.8.t: "Se Déclarer Zhutashsar"
 devandi.8.desc: "Pendant des semaines, $MONARCH$ avait été en discussion secrète avec ses conseillers les plus proches. Se déclarer Zhutashsar, un titre accordé de manière posthume aux penseurs les plus prestigieux, était pratiquement sans précédent. Les risques étaient énormes : $MONARCH$ ferait certainement face à beaucoup d'examen et de scepticisme de la part des factions au sein de sa nation, où cela serait vu comme presque hérétique. Mais la récompense était tout aussi puissante, si leur déclaration trouvait un terrain solide : acceptation généralisée de quelle que soit la théorie proposée, et le prestige et l'autorité associés qui venaient avec le titre de Zhutashsar.\n\nAvec leurs conseillers incertains, la décision reposait sur la volonté de $MONARCH$."
 devandi.8.a: "L'adaptabilité et l'innovation de mon administration sont inégalées."
 devandi.8.b: "Je suis à la pointe de la diplomatie !"
 devandi.8.c: "Ma stratégie militaire n'a jamais perdu."
 devandi.8.d: "Peut-être que ce n'est pas juste..."

 #Government Reforms
 mteibhara.1.t: "Élections dans le Delath"
 mteibhara.1.desc.a: "Le Syrhana Delathan n'est convoqué que par nécessité dans la Confédération Delathine typique. Le passage malheureux du Rabulath $MONARCH$ est une telle occasion, cependant. Les élections ne sont pas une affaire plaisante pour les candidats potentiels, car la décision doit être unanime parmi les Delaths constituants. Trois des plus influents de notre royaume ont soumis leur candidature, et passeront le mois suivant à rallier le soutien parmi les Delaths."
 mteibhara.1.desc.b: "Dans le Delath Centralisé, c'est au Rabulath de choisir son successeur. Typiquement, le Rabulath doit passer des années à convaincre les influents de son royaume de son choix, et peut convoquer le Syrhana Delathan de nombreuses fois pour débattre de leur successeur. Pour le Rabulath d'ignorer ces formalités ne serait pas sans précédent, mais aurait certainement d'énormes conséquences politiques."
 mteibhara.1.a: "Il n'y a aucun doute, [mteibhar_candidate_a_@ROOT.GetName] doit régner !"
 mteibhara.1.b: "Il n'y a aucun doute, [mteibhar_candidate_b_@ROOT.GetName] doit régner !"
 mteibhara.1.c: "Il n'y a aucun doute, [mteibhar_candidate_c_@ROOT.GetName] doit régner !"
 mteibhara.1.d: "Ne causons pas de tumulte."

