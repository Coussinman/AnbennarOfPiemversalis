 #Government Reforms
 chendhyan_tribal_federation: "Fédération Tribale Chendhyan"
 chendhyan_tribal_federation_desc: "Les plaines de Chendhya ont été notre foyer pendant des millénaires, et c'est sur ces vastes plaines que notre credo est né : piller et combattre pour notre propre bien, briser les chaînes qui nous lient et courir libres à travers les terres. Bien que nous chérissions notre liberté sacrée, elle ne peut être absolue pour que nous fonctionnions comme société. Par conséquent, nous avons besoin d'un système en place pour organiser les raids et résoudre les conflits sur les trophées de raid, l'usage des pâturages et plus encore pour empêcher la dissolution de notre tribu dans l'anarchie. Ainsi, un conseil d'anciens, recruté parmi les clans, est formé pour discuter et débattre, et pour élire un grand dirigeant, l'Adezheg, avec l'autorité de décider pour la tribu, tant qu'il a le soutien des anciens."
 chendhyan_tribal_raiding_tt: "Active le Casus Belli §YRaid Tribal§! contre les pays voisins"
 chendhyan_federation_to_ezhudar: "Fédération vers Exhudar"
 chendhyan_federation_to_ezhudar_desc: "L'ambition bourgeonnante des Chendhyans doit être aiguisée et forgée en quelque chose de plus, quelque chose pour livrer le rêve d'innombrables générations à notre portée : la conquête de nos voisins détestés, les Taychendi. Cependant, pour que cela réussisse, cela nécessitera de grands changements à la fois dans la société Taychendi et la nôtre. Des règles plus formalisées de colonisation, des règles claires de pillage en temps de guerre et de tribut en temps de paix, et une vision claire pour l'avenir pour exploiter notre richesse amassée afin de devenir ce qui n'a été accompli qu'une fois durant le plus grand moment de notre histoire : un véritable Ezhudar."
 chendhya_uncolonize_po_tt: "\nActive l'Option de Paix §YReconquérir nos Terres§! lors de l'utilisation du Casus Belli §YRaid Tribal§!, qui §GDécolonise§! toutes nos provinces de §YTerre Tribale§! possédées par le pays ennemi"

