l_french:
 #Events
 devandi.1.t: "Âme Unificatrice de Nahrei"
 devandi.1.d: "La dernière cérémonie du festival de plusieurs semaines de l'Âme Unificatrice de Nahrei arrive juste à temps, car les [Root.GetAdjective] ont commencé à s'agiter. Ils ont passé le mois dernier en méditation profonde et introspection sur la nature du monde et leur place en son sein. La cérémonie commence et se termine par le Flyransh, ou « Danse des Fleurs », dans laquelle les [Root.GetAdjective] dansent autour d'un mât couronné de fleurs, chaque danseur s'approchant individuellement du mât central pour prier les âmes. Mais la vraie bénédiction du festival ne se voit qu'une fois le dernier Flyransh terminé. Ensuite, une sensation d'énergie emplit l'air, car chaque [Root.GetAdjective] est impatient d'appliquer ses apprentissages au monde."
 devandi.1.a: "Parfois il suffit d'un peu de gratitude."
 devandi.2.t: "Solide Fortitude"
 devandi.2.d: "[Root.Monarch.GetName] peut le sentir : la guerre est venue à [Root.GetName]. Autrefois, les conflits totaux étaient rares parmi les Devandi, mais les temps changent. Ainsi, [Root.Monarch.GetName] s'est mis à galvaniser l'armée de [Root.GetName] par un discours formidable, leur rappelant le grand don de liberté offert par le libérateur Munakles et leur devoir de le préserver face aux oppresseurs. Ensuite, [Root.Monarch.GetName] peut remarquer une différence petite mais substantielle dans le comportement des colonnes : les soldats se tiennent plus droits. Les conversations ont cessé, et chaque soldat a une lueur déterminée dans les yeux."
 devandi.2.a: "Notre cause est juste !"
 devandi.3.t: "Une Offrande"
 devandi.3.d: "Un prêtre de [Root.GetName] s'approche de l'autel taillé dans le bois avec une offrande aux âmes. Les Devandi ne sacrifient pas leur richesse ou leurs ressources brutes, car ils savent que les âmes sont trop sages pour accepter cela. Au lieu de cela, ils sacrifient leurs objets sentimentaux et souvenirs, aussi précieux soient-ils : c'est ce que le prêtre a placé sur l'autel sacré.\n\nAu cours de quelques heures, les objets sur l'autel s'évaporent et se désintègrent en poussière tandis que les [Root.GetAdjective] environnants offrent des prières de dernière minute murmurées aux âmes. La bénédiction des âmes est subtile : les prochaines récoltes sont un peu plus saines. Les ouvriers travaillent un peu plus dur. La nation de [Root.GetName] est un peu plus énergisée."
 devandi.3.a: "Remercions les Âmes !"
 devandi.4.t: "Sens Sismique"
 devandi.4.d: "[Root.Monarch.GetName] observe tandis que les géomanciens de [Root.GetName], connus sous le nom de Femezkhanz, parcourent les terres à la recherche de gemmes et pierres précieuses. La progression des Femezkhanz est rapide et silencieuse, car ils n'ont jamais besoin de s'arrêter pour creuser ou examiner le sol. Soudain, le groupe cesse sa démarche rapide, et [Root.Monarch.GetName] sourit tandis qu'ils dépêchent un messager. Les Femezkhanz, avec leur sens magique, ont presque certainement découvert une cache significative de minerai précieux sous leur emplacement. Dans la journée, un groupe de mineurs [Root.GetAdjective] zélés sera envoyé pour coloniser la zone. Alors que le porteur de message s'approche, [Root.Monarch.GetName] médite une dernière question : quel minéral cela pourrait-il être ?"
 devandi.4.a: "Espérons quelque chose de précieux."
 devandi.5.t: "Grand Pèlerinage"
 devandi.5.d: "La foi Mazhthramazh a plus d'un millénaire, mais ses enseignements sont intemporels. Les sages paroles de Munakles et les croyances animistes des Devandi sont transmises oralement et, en tant que telles, se sont dispersées à travers la Vallée. Ainsi, le but de chaque pèlerin est de voyager à travers la Vallée sacrée visitant chaque région pour apprendre ses histoires et aphorismes uniques, ainsi que visiter les sites sacrés informels de Mazhthramazh. C'est le voyage que [Root.Monarch.GetName] a entrepris, et au cours des prochaines semaines, avec une caravane de Femezkhanz, [Root.Monarch.GetSheHe] visitera tous, du village Mteibhar le plus rural aux monuments les plus fréquentés de Mzhaara."
 devandi.5.a: "Bénie soit la Vallée !"
 devandi.6.t: "Raid !"
 devandi.6.d: "La terre de [askaeorg_raid_target.GetName] est en flammes, car les Chendhyans sont passés. Les terres agricoles brûlent, et les établissements mineurs se tiennent silencieux et vides, ayant été pillés par les pillards. Il y eut très peu de résistance, car les cavaliers-félins sont bien trop rusés et rapides pour être capturés, et les habitants de [askaeorg_raid_target.GetName] trop effrayés pour s'engager. L'ancienne stratégie des Chendhyans, connue sous le nom de Qahliræ, comporte trois étapes : d'abord, ravager la campagne sans défense ; ensuite, piller les petits établissements ; puis, si l'ennemi est distrait, tenter de percer dans les cités pour causer davantage de chaos et prendre plus."
 devandi.6.a: "Ainsi va la vie !"

 #Religious Abilities
 unifying_soul_of_nahrei: "Âme Unificatrice de Nahrei"
 desc_unifying_soul_of_nahrei: "Le festival de l'Âme Unificatrice de Nahrei, malgré ce que son nom peut suggérer, n'est pas une brève célébration mais plutôt une période de plusieurs semaines d'introspection intense pour les Devandi. L'Âme Unificatrice de Nahrei est entrecoupée de festivals, chacun dédié à l'apprentissage et à la discussion d'un certain aspect de Nahrei, l'âme créatrice. La célébration porte son nom du festival final, connu sous le nom d'Âme Unificatrice. En appelant notre nation à cette célébration, nous pouvons leur donner une plus grande appréciation de ce monde et de ses possibilités."
 solid_fortitude: "Solide Fortitude"
 desc_solid_fortitude: "Le principe central dans les enseignements de Munakles est la liberté et la nécessité de sa préservation. Elle doit être protégée à tout prix, même si cela signifie attaquer en premier. En rappelant à nos guerriers l'énorme importance de leur combat, ils seront certainement plus féroces."
 a_sense_of_freedom: "Un Sentiment de Liberté"
 desc_a_sense_of_freedom: "Les Devandi croient que les temps de paix et de liberté ne sont que temporaires et qu'éventuellement ils affronteront à nouveau l'adversité. Ainsi, durant les périodes prospères, les dirigeants Devandi organisent souvent des célébrations nationales du sentiment de liberté dont leur peuple jouit."
 an_offering: "Une Offrande"
 desc_an_offering: "Les adeptes de la tradition de Munakles croient qu'ils doivent chercher un lien plus étroit avec les âmes de Halann, qui représentent typiquement un aspect du monde. Les Devandi offrent typiquement des possessions personnelles aux âmes en échange de guidance pour atteindre la liberté de l'esprit, du corps et de l'âme. Cependant, les dirigeants Devandi du passé n'ont pas hésité à demander des bénédictions matérielles aux âmes, bien sûr, lorsqu'ils sont prêts à payer le prix."
 bonds_of_the_world: "Liens du Monde"
 desc_bonds_of_the_world: "Nous avons tous été créés par les âmes, et nous avons tous été amenés à la sécurité et à la liberté par Munakles, qui nous enseigna à nous souvenir de notre héritage commun et de nos buts communs. En mettant l'accent sur l'unité, les dirigeants Devandi du passé ont relâché les tensions ainsi que les cordons de la bourse."
 seismic_sense: "Sens Sismique"
 desc_seismic_sense: "Les Femezkhanz sont la classe de mages des Mteibhar, qui sont magiquement harmonisés au sol de Halann. Ils sont capables de manipuler facilement la terre, mais ils sont particulièrement utiles aux Mteibhar en raison de leur capacité à sentir les minerais et métaux précieux. Les dirigeants influents exploitent souvent les Femezkhanz pour trouver des emplacements privilégiés pour la colonisation et l'excavation."
 plains_of_learning: "Plaines de l'Apprentissage"
 desc_plains_of_learning: "Les enseignements de Munakles mettent l'accent sur l'amélioration et l'adaptation plutôt que la tradition. En tant que tels, les dirigeants Mazhthramazh envoient souvent des délégations vers les nations voisines pour les examiner et apprendre d'elles."
 grand_pilgrimage: "Grand Pèlerinage"
 desc_grand_pilgrimage: "La vallée sacrée est vaste, et les enseignements de Mazhthramazh ne sont pas centralisés. Les régions individuelles portent leurs propres histoires, enseignements et interprétations uniques de la vision du monde Mazhthramazh. En visitant ou voyageant à travers les Mteibas, un dirigeant peut apprendre beaucoup."
 dance_of_the_flying_serpents: "Danse des Serpents Volants"
 desc_dance_of_the_flying_serpents: "On dit que lorsque les Chendhyans empiétèrent sur Taychend, à Armahadastir, ils adoptèrent la Danse des Serpents Volants native pour faire la paix avec les Taychendi. Finalement, la danse devint un moyen d'instaurer la paix et l'équilibre en temps de conflit."
 hunt_of_togetherness: "Chasse d'Union"
 desc_hunt_of_togetherness: "Les chasses sont le langage commun des Chendhyans ; elles sont intégrales à la vie quotidienne et un moyen facile de créer des liens ou de résoudre des différends. Les puissants dirigeants Chendhyans du passé ont utilisé les chasses tribales pour rallier leurs guerriers et soldats avant une guerre ou bataille."
 askaeorg_raid: "Raid !"
 desc_askaeorg_raid: "Il n'y a pas de meilleure exclamation de la foi Chendhyan que le raid. Tous les Chendhyans comprennent la passion et la droiture derrière l'acte d'attaquer ses voisins et de saisir leurs biens de valeur. C'est totalement juste, car la foi Askaeorg exige que ses fidèles préservent de manière proactive leur liberté."

