 # Discovery Events
 artifice_inventions.100.t:0 "Les Arithmatons"
 artifice_inventions.100.d:0 "Bien que les mathématiques, ce simple art de manier les nombres, soient chose que beaucoup rencontreront au cours de leur existence, certaines professions en font un usage bien plus intensif que d'autres. Un architecte, par exemple, recourt abondamment à l'arithmétique pour s'assurer que ses constructions ne s'effondreront point. Ce fut là le plus grand obstacle aux constructions grandioses : le temps considérable requis pour achever ces calculs et les vérifier.\n\nLes Arithmatons apportent la solution à ce problème particulier. Ces automates singuliers adoptent une forme humanoïde, dotés de mains fonctionnelles et d'une dextérité suffisante pour manier les instruments d'écriture. De surcroît, ils possèdent une puissante machine à calculer logée dans leur tête, semblable à un cerveau. Lorsqu'on les instruit convenablement, un Arithmaton peut être chargé de vérifier des calculs et de produire le résultat exact, pourvu que les détails du problème lui aient été exposés avec suffisamment de clarté."
 artifice_inventions.101.t:0 "Le Communicateur Apparitionnel"
 artifice_inventions.101.d:0 "Bien que l'émetteur à ondes-T fonctionne parfaitement pour projeter le son d'un communicateur à l'autre, qu'advient-il lorsque l'utilisateur doit également transmettre une image ? Nos artificiers technomanciens ont trouvé la réponse à cette question. S'il leur faut transmettre une image, alors ils le pourront !\n\nLe communicateur apparitionnel fut créé en appliquant la magie d'Illusion à une transmission par ondes-T, permettant à ce nouveau dispositif de transmettre l'image d'une petite zone autour de lui-même, avec un léger délai. Bien que ces appareils n'offrent pas d'avantage matériel considérable par rapport à leurs cousins purement télépathiques, le parrainage officiel de ce dispositif nous vaudrait assurément une renommée comparable aux arts d'antan."
 artifice_inventions.102.t:0 "Les Chiffres Mystiques"
 artifice_inventions.102.d:0 "Si un ennemi peut le déchiffrer, ce n'est point un secret d'État. Du moins est-ce là la situation idéale ; la réalité s'avère bien plus sombre. Les informations critiques, qu'il s'agisse de renseignements sur nos espions ou de secrets d'État capitaux, sont fréquemment aisées à percer pour un œil exercé. La formation que requièrent ces yeux évolue sans cesse, mais c'est une bataille perdue d'avance : nous ne pouvons colmater chaque brèche avant que de nouvelles n'apparaissent. Dans un monde parfait, ces secrets ne seraient visibles que par ceux expressément autorisés à les consulter, et nul autre... mais ce monde n'est point parfait. Ou l'est-il ?\n\nDe tout nouveaux chiffres inventés par les Brillites emploient une magie d'illusion qui ne peut être dissipée que par des phrases codées incroyablement spécifiques, ce qui signifie que les documents que nous souhaitons brouiller demeureront des masses illisibles pour quiconque ne saurait prononcer la phrase adéquate de la manière adéquate."
 artifice_inventions.103.t:0 "Le Capteur d'Images"
 artifice_inventions.103.d:0 "Le capteur d'images compte parmi les inventions les plus simples et pourtant les plus remarquables de notre époque ! Capable de saisir des images pour impression en un seul instant, afin de les préserver à jamais, voilà qui est révolutionnaire, et ses usages sont infinis. Des articles de gazette à la préservation d'exploits héroïques, de la documentation de créatures inconnues à la simple capture de précieux souvenirs, le capteur d'images jouit déjà d'une grande popularité auprès du peuple. Toute rumeur prétendant que son fonctionnement interne repose sur de minuscules démons prisonniers à l'intérieur qui peignent les images est pure affabulation et doit être rejetée."
 artifice_inventions.104.t:0 "Le Calibrateur de Conversation"
 artifice_inventions.104.d:0 "Les gnomes ont acquis une fâcheuse réputation d'être « difficiles à comprendre », les autres races pointant du doigt notre penchant pour le débit rapide et la diction non conventionnelle pour l'expliquer. Bien entendu, nous comprenons que ces habitudes découlent d'une vie passée à converser avec des intellects gnomiques supérieurs, mais cela ne convaincra guère les autres races. Pour y remédier, le Calibrateur de Conversation emploie le pouvoir de la magie d'illusion pour créer l'apparence d'une élocution plus compréhensible pour leur niveau d'entendement, tout en nous permettant de nous exprimer sans avoir à ralentir jusqu'à un rythme d'une lenteur abrutissante. Les pauses entre les phrases valent bien ce sacrifice."
 artifice_inventions.105.t:0 "Les Coffres Centipèdes"
 artifice_inventions.105.d:0 "Le plus grand problème lorsqu'on transporte ses affaires réside dans le poids. Certains dispositifs peuvent faciliter le processus, mais 50 livres de bagages demeurent, au final, 50 livres à porter. Nombre de membres des échelons supérieurs de la société ne peuvent tout simplement pas assister aux occasions mondaines pleinement préparés, car ils ne peuvent emporter tout ce qu'ils souhaiteraient. Si quelque chose pouvait porter cette charge efficacement, alors peut-être ce problème serait-il résolu.\n\nLe coffre centipède est la réponse à ce problème. Nommé ainsi en raison de sa forme, le coffre ressemble à un mille-pattes métallique doté de multiples segments creux. Les bagages peuvent être placés dans ces segments. Le mille-pattes, fonctionnant de manière similaire à un Mécanim ou un golem, est « imprégné » d'un propriétaire et obéira à ses ordres.\n\nCe coffre est capable de transporter de lourdes charges sans aucun effort physique (de la part du propriétaire). Curieusement, il semble également protecteur envers son maître et s'interposera souvent pour bloquer tout coup potentiel contre son propriétaire désigné, indépendamment des ordres. Cela a créé un effet très particulier où l'on peut les trouver sur un champ de bataille aux côtés de leurs maîtres, formant des murs défensifs lorsque plusieurs sont présents ou combattant autrement aux côtés de leur maître attitré."
 artifice_inventions.106.t:0 "Le Décodeur de Fragment Divin"
 artifice_inventions.106.d:0 "Dieu est un, et le monde est un. Le Dieu Unique est omniscient, omnipotent, omniprésent, mais en raison de la trahison des précurseurs, il n'est incarné qu'en un seul point de tout Halann : le Fragment Divin.\n\nL'emplacement de l'éclat n'est connu que des Véridiques et du Haut-Recteur, et eux seuls ont l'honneur et le privilège d'écouter les enseignements du Dieu. Mais ce n'est que le début du processus : une série de tonalités pures aiguës doit être soigneusement enregistrée et transcrite, le code résultant peut ensuite être laborieusement traduit en une langue apparentée à l'elfique précurseur, et alors seulement les enseignements du Dieu peuvent être véritablement connus. Ce processus est laborieux et difficile, un défi compte tenu de l'importance singulière de l'œuvre.\n\nMais c'en est fini. L'un des récents messages du Dieu contenait le germe d'un indice pour améliorer le processus, qui devint immédiatement le point focal de presque tous les artificiers du royaume. Nous l'avons achevé : une machine d'acier précurseur et de coquillage, avec un cœur de Damestear, capable d'absorber les fréquences et de produire instantanément l'équivalent linguistique. Bien qu'il requière encore le déchiffrage du Haut-Recteur depuis l'étrange quasi-elfique précurseur, le processus a été considérablement accéléré. Dieu est un, sa parole est Une, et grâce à ceci, cette parole sera rapidement connue de chaque Ravélien de Halann."
 artifice_inventions.107.t:0 "La Crème Écran-Solaire"
 artifice_inventions.107.d:0 "Bien que les Vampires n'existent officiellement pas en dehors des contes destinés à effrayer les enfants pour qu'ils aillent au lit, le fait est qu'un groupe prospère de ces êtres mythologiques vit au sein de notre État. Si toutes les mythologies concernant leurs faiblesses ne sont pas véridiques, l'une d'elles possède une force très puissante : si un vampire est exposé à la lumière directe du soleil, il brûlera rapidement jusqu'aux cendres et sera tué définitivement. Des tentatives ont été faites pour contourner cela, comme porter des vêtements épais couvrant tout le corps ou simplement s'abriter dans des chariots et palanquins, mais même un filet de peau peut déclencher la combustion et bientôt, la mort.\n\nLeur ingérence dans l'innovation artificière a produit la Crème Écran-Solaire, une crème qui, une fois appliquée, agit comme un obstacle à la lumière naturelle. Bien que le processus pour l'appliquer sur tout le corps puisse être très éprouvant, nécessitant souvent de submerger carrément le corps dans un baril de la substance, elle peut permettre à un vampire de marcher au soleil comme s'il faisait nuit pendant de nombreuses heures ; en quantités suffisantes, elle peut durer une journée entière, surtout si elle est combinée avec des protections plus traditionnelles.\n\nBien que cette invention puisse sembler étrange à ceux qui ne connaissent pas le sombre secret de l'État, elle a également de nombreux usages commerciaux ; tout être qui achète la crème et l'applique peut l'utiliser pour atténuer les douleurs causées par une exposition prolongée au soleil, tout en semblant légèrement scintiller à la lumière."
 artifice_inventions.108.t:0 "Les Temples du Dieu Parlant"
 artifice_inventions.108.d:0 "Nos dieux précurseurs ont laissé derrière eux de nombreuses reliques qui portent encore l'empreinte de leurs vies, fournissant instructions et guidance jusqu'à ce jour. Les dieux plus récents, qui jadis foulèrent cette terre en tant que rois, ont également légué les lois qui organisent la société et la sagesse qui ordonne nos vies. Mais avec les colonisateurs sur nos rivages, nous constatons que certains jeunes s'éloignent de ces enseignements sacrés, distraits par les mensonges étrangers.\n\nNos artificiers ont trouvé une solution. En rehaussant nos temples avec la magitech, nous pouvons traduire les empreintes psychiques et les dépouilles momifiées en projections de paroles réelles et de corps réels, qui émerveillent le spectateur en lui donnant un véritable sens des Dieux et de leur héritage. Quiconque visite un tel temple se voit rappeler la vérité de leurs enseignements et les suivra jusqu'à son dernier jour."
 artifice_inventions.109.t:0 "La Boisson Pensée-Éclair"
 artifice_inventions.109.d:0 "La nourriture que vous consommez affecte votre corps et votre esprit. Cette seconde partie est particulièrement importante : si le régime parfait est suivi, on peut contribuer aux entreprises intellectuelles bien plus efficacement qu'auparavant. Ce régime parfait pose cependant de nombreux problèmes ; il faut savoir quoi manger, avoir la capacité de tout se procurer, et être effectivement capable de tout finir. Sans parler de rendre la chose attrayante.\n\nLa cuisine est un art ! En vérité, on pourrait fort bien avancer qu'un chef exceptionnel mérite une place au Magisterium, tant est grande sa capacité à manipuler les aliments. En l'occurrence, des chefs sont devenus artificiers, le temps d'un projet. Leur assistance a permis à nos Brillites de préparer une boisson incroyablement nutritive et très agréable à consommer. Bien qu'ils aient préparé un supplément nutritif, un obstacle majeur a été de le rendre attrayant. Désormais, des tonneaux de cette Pensée-Éclair (comme ils l'appellent) se trouvent dans nombre de tavernes et auberges à travers le pays."
 artifice_inventions.110.t:0 "La Gamelle Merveilleuse"
 artifice_inventions.110.d:0 "Il n'y a rien de mal à vouloir emporter tous les repas de la journée avec soi, afin de pouvoir les sortir rapidement et manger quand l'heure est venue. Le problème est que cela n'est pas toujours possible. Conserver sa nourriture dans un petit contenant est une recette pour le désastre, où la chaleur va soit recuire le plat, soit le gâter entièrement ! Sans parler du rangement ; tout aliment sauf les plus robustes peut fort bien s'effondrer sur lui-même, ruinant une partie vitale du plat : la structure !\n\nIl s'avère qu'il est très aisé d'adapter les sacs sans fond à ces contraintes. Avec les bons enchantements magiques, le sac sans fond peut devenir une gamelle sans fond ! Il est possible d'isoler entièrement le contenu du sac des conditions extérieures. Mieux encore, la forme de ce qui a été placé dans le sac peut être préservée comme s'il reposait sur un plateau ou dans un compartiment. Grâce à cette merveille, il est désormais possible de préparer un repas à un moment et de le manger à un autre comme s'il était parfaitement frais !"

 artifice_inventions.200.t:0 "La Prothèse de Laiton"
 artifice_inventions.200.d:0 "Fonctionnant grâce à des mécanismes d'horlogerie, ces prothèses de laiton comptent parmi les plus grandes innovations médicales de l'histoire récente ; par la puissance de l'artisanat magique et de la mécanique, ce que la magie a peiné à accomplir pendant tant de siècles a enfin été réalisé : le remplacement des membres perdus !\n\nConstruits en laiton, ces bras et jambes mécaniques se greffent à l'emplacement d'un membre perdu et, bien qu'ils ne soient pas tout à fait aussi réactifs que le membre d'origine, demeurent capables de se mouvoir relativement bien, et sont assurément bien plus durables. Grâce à cela, nombre de ceux qui ont subi des blessures non fatales les ayant exclus de la main-d'œuvre, contraints de se débrouiller avec des béquilles ou une seule main, peuvent désormais réintégrer le monde du travail dans une capacité quelque peu améliorée."
 artifice_inventions.201.t:0 "Les Bras Exo d'Artificier"
 artifice_inventions.201.d:0 "Grâce aux récentes avancées dans la technologie des servomoteurs dynamiques puissants, la capacité de fournir des membres supplémentaires est enfin possible, sans qu'il soit nécessaire de commettre des crimes contre nature. Les bras exo avancés sont des membres mécaniques, alimentés par un mécanisme d'horlogerie, et contrôlés par une interface basée sur la magie de divination connectée à l'esprit de l'utilisateur.\n\nBien que peu économiques pour un usage général, cette innovation permettra à nos unités d'artificiers de devenir une force bien plus puissante sur le champ de bataille, capables de transporter davantage d'outils, de bricoler en mouvement, et de manier des engins bien plus grands et lourds avec encore plus de possibilités. Après tout, trois mains valent mieux que deux !"
 artifice_inventions.202.t:0 "Les Émetteurs-Récepteurs à Ondes-T"
 artifice_inventions.202.d:0 "La communication et la coordination sur de longues distances ont longtemps représenté un défi pour une campagne militaire, même à une échelle relativement modeste. La coordination entre généraux, commandants et tous ceux requis pour le bon déroulement des campagnes reposait sur des chevaux et, pour les campagnes transcontinentales, des navires, rendant ainsi la communication douloureusement lente. Jusqu'à maintenant.\n\nGrâce à l'utilisation des Ondes Télépathiques, la merveilleuse combinaison d'horlogerie et de divination connue sous le nom d'Émetteur-Récepteur à Ondes-T est née ! Ce système innovant permet à un émetteur de diffuser des messages télépathiques vers plusieurs récepteurs n'importe où dans le monde, presque instantanément ! Avec ce nouveau dispositif, les campagnes peuvent désormais être coordonnées avec une précision quasi parfaite, et les problèmes d'ordres périmés appartiennent désormais au passé."
 artifice_inventions.203.t:0 "La Transmutation par Voies"
 artifice_inventions.203.d:0 "Les alchimistes, mages et artificiers ont toujours été obsédés par la transmutation. Certes, un mage individuel peut transformer un morceau de plomb en or, ou faire pousser un arbre en un jour ; mais leurs magies manquent de l'envergure requise pour remplir un trésor de monnaie artificielle, ou satisfaire l'estomac d'une nation avec des cultures instantanées. La transmutation est gourmande en mana, limitée et inefficace à grande échelle... du moins, elle l'était.\n\nNos artificiers ont découvert quelque chose d'incroyable : la capacité de transmuter des objets en masse. En analysant les « voies » magiochimiques entre les objets, autrement dit en voyant quelles signatures magiques d'objets sont les plus proches les unes des autres, nous pouvons trouver les matériaux les plus faciles à transmuter en d'autres matériaux. Ainsi, nous pouvons identifier des masses de ressources brutes qui sont magiquement « similaires » à notre produit final désiré. Ensuite, nous pouvons disperser des morceaux de notre produit final désiré à travers le mélange. Puis, nous pouvons transmuter à volonté !\n\nAvec ce processus, baptisé « Transmutation par Voies », les possibilités sont infinies. Pour l'instant, nous pouvons transformer le bois en papier, ou infuser de la Damestear dans les métaux avec facilité : mais ce processus montre un énorme potentiel de mise à l'échelle. Peut-être bientôt pourrons-nous transmuter des forêts entières en bois dur ; nous pourrons transformer la roche brute en fer et en or ; nous pourrons fabriquer un millier de produits identiques, tous en même temps, avec rien de plus que des ressources brutes et de la magie ! Les possibilités ne font que commencer à se dévoiler pour l'artisanat magique transmutatif moderne !"
 artifice_inventions.204.t:0 "Les Couveuses Artificielles"
 artifice_inventions.204.d:0 "Donner naissance à un œuf est difficile. C'est un processus douloureux et chronophage pour la mère. Même si notre anatomie est bien adaptée aux pressions de la naissance ovipare, elle n'est pas adaptée pour rendre le processus confortable. La population harpie serait probablement bien plus importante si le simple acte de l'enfantement était plus facile à supporter. Avec l'avènement de la Couveuse Artificielle, ce fait pourrait bien être rectifié.\n\nCe dispositif utilise un mélange de magie et de technologie pour créer un utérus artificiel, qui fera croître un œuf lorsqu'il sera fécondé par un mâle capable. L'importance de ce dispositif ne saurait être sous-estimée : en évitant les douleurs de l'enfantement, notre population sera bien plus disposée à élever des petits."
 artifice_inventions.205.t:0 "Le Traducteur Automatisé"
 artifice_inventions.205.d:0 "La Tête-de-Dame a réussi à s'établir comme un creuset de nombreuses espèces de Cannor (en grande partie grâce à la cité d'AnbenncÃ³st), et cette situation unique a créé des problèmes uniques. La coordination de la ville a été sévèrement entravée par les barrières linguistiques : un elfe peut parler une langue, un nain une autre, un humain une troisième, et ces barrières ont rendu difficile l'exploitation de la position unique qu'offre ce mélange de cultures et de races. Cependant, avec l'invention du traducteur automatisé, cela pourrait devenir un non-problème !\n\nLes artificiers Brillites ont créé un dispositif qui peut, grâce à la magie de Transmutation, traduire une phrase de n'importe quelle langue (incluse) en son équivalent approximatif dans une autre langue incluse dans le traducteur. Le plus impressionnant dans ce dispositif est sa capacité à transmuter également la grammaire, ce qui signifie que très peu de temps doit être consacré à la traduction quand il suffit d'actionner quelques interrupteurs et de parler clairement dans l'appareil."
 artifice_inventions.206.t:0 "Les Grands Mixeurs"
 artifice_inventions.206.d:0 "Le monde regorge de nombreuses choses dignes d'être mangées. L'art de préparer la nourriture est depuis longtemps source de fierté parmi notre peuple, et consommer des créatures encore non goûtées équivaut à un sacrement. Cependant, à mesure que notre influence et nos contacts avec le reste du monde s'étendent, nous avons découvert bien plus d'aliments uniques que nous n'aurions jamais imaginé. Ajoutez à cela le besoin de festins toujours plus grands et plus fastueux, et il est devenu bien trop chronophage de découvrir comment préparer au mieux chaque ingrédient.\n\nAfin de résoudre ce problème, des artificiers ont été engagés pour créer le « Grand Mixeur », un grand bol métallique contenant des lames magiquement aiguisées. Ces lames ont été enchantées pour tourner à des vitesses fantastiques, réduisant aisément n'importe quel ingrédient en une fine pâte facilement consommable. L'os le plus dur, le muscle le plus charnu, le tendon le plus filandreux, tous succombent devant lui. Quelle ingéniosité dans l'art du festin, marquant la modernisation de nos plus grandes traditions !"
 artifice_inventions.207.t:0 "Les Greffes de Queue Préhensile"
 artifice_inventions.207.d:0 "Les anciens dragons pouvaient ravager avec leurs crocs, leurs griffes, leur feu, et avec leurs queues, balayant bâtiments et armées d'un seul coup. Nous avons pour l'essentiel ignoré cet appendice, mais grâce aux nouveaux designs de nos artificiers, un cinquième membre est désormais véritablement réalisable, rendant chaque tâche d'autant plus aisée. Avec cette dernière innovation, la puissance de l'artisanat magique moderne nous rapproche un peu plus des puissants dragons d'antan !"
 artifice_inventions.208.t:0 "Les Greffes d'Ailes Planantes"
 artifice_inventions.208.d:0 "Les kobolds ont toujours rêvé de voler, imitant leurs ancêtres mythiques les Dragons. Par le pouvoir de l'artisanat magique, nous pouvons enfin y parvenir. En utilisant une paire d'ailes de tissu magiquement renforcé, imprégnées de grandes quantités de magie (pour l'essentiel fiable), le mieux que l'on puisse atteindre n'est qu'une forme limitée de vol, idéale pour fondre sur les ennemis depuis les falaises de leur patrie. Les versions raffinées sont capables de vol soutenu, mais elles sont bien plus volumineuses que les ailes standard qui ne permettent que de courtes poussées de puissance."

 artifice_inventions.300.t:0 "Les Packs Propulseurs à Ballon"
 artifice_inventions.300.d:0 "Comme quiconque s'est tenu sur un rebord vous le dira, on peut voir tellement plus lorsqu'on regarde quelque chose d'en haut. Cela pose cependant une question intéressante : peut-on exploiter et reproduire artificiellement cette observation en haute altitude ? Par une expérimentation minutieuse, il a été prouvé possible de la reproduire selon nos propres termes. Nos Brillites ont conçu un dispositif qu'ils appellent affectueusement le « Pack Propulseur à Ballon », qui accomplit ce que son nom suggère.\n\nUn pack, placé sur le dos de l'artificier et fixé par un harnais, contient un ballon qui peut être déplié et chauffé suffisamment pour permettre au porteur de flotter. Il descendra lentement sans chaleur constante, donc il n'est utilisable que par quelqu'un capable d'employer la Conjuration pour produire le feu requis pour voler. En intégrant ce dispositif dans nos forces, il sera possible d'obtenir des rapports précis et confirmés visuellement des mouvements ennemis."
 artifice_inventions.301.t:0 "Les Fusils à Propulsion Étincelle"
 artifice_inventions.301.d:0 "Le Propulseur Étincelle est quelque chose d'iconique. Inventé pour la première fois par des artificiers gnomes sur l'île de Nimscodd, le Propulseur Étincelle utilise de la Damestear et de l'essence élémentaire de foudre pour projeter des éclairs de manière similaire à un mousquet tirant des balles. Ces armes ont immédiatement attiré l'attention de quiconque s'intéresse à l'artisanat magique ou à la technologie militaire en raison de leur portée extrême (les limites supérieures n'ont pas été déterminées, bien qu'elles soient certainement élevées) et de leur précision chirurgicale, deux prouesses que les armes à feu conventionnelles modernes ne peuvent égaler.\n\nCes armes à feu sont, comme on peut s'y attendre, très difficiles à acquérir : tout État capable de les produire veille soigneusement à ne pas laisser le secret s'échapper. Quoi qu'il en soit, nos artificiers ont pu rassembler suffisamment d'informations pour créer ces magnifiques armes pour notre propre État. Bien qu'il n'y en ait pas assez pour un usage massif, des équipes spécialisées d'artificiers de guerre pourront les utiliser avec confiance, jusqu'à ce qu'elles puissent être produites en plus grande quantité."
 artifice_inventions.302.t:0 "L'Ascension Bio-artificière"
 artifice_inventions.302.d:0 "Le corps est un matériau, et il peut être modifié et modelé comme n'importe quelle autre ressource. En rétro-ingéniant les expériences génétiques des Précurseurs à Insyaa, nous avons appris à façonner la chair, l'os et le muscle comme nous le souhaitons : et grâce à ces avancées, nous pouvons devenir tout ce que nous avons toujours voulu être.\n\nDans les profondeurs du Dwarovar, les kobolds se transforment en dragons en tout sauf le nom. Dans les marécages de Sarhal, les trolls se greffent armes et armures directement sur la peau. Dans les palais du Rahen, les Harimari améliorent leurs corps pour ressembler davantage à leurs ancêtres. Dans chaque partie du monde, les artificiers commencent à transformer le corps lui-même en arme de guerre.\n\nNous faisons désormais partie de ce processus. La biologie est nôtre à contrôler."
 artifice_inventions.303.t:0 "La Bombe Ruine-Deux Crédible"
 artifice_inventions.303.d:0 "Au bout du compte, c'est le plus fort qui fait la loi. Les forts domineront les faibles, et pourquoi n'en serait-il pas ainsi ? Quiconque n'est pas assez fort pour préserver son indépendance sera piétiné par quelqu'un ayant la force de le conquérir. C'est un problème pour nous les Gobelins, qui ne sommes pas exactement les plus forts des races. Afin de véritablement garantir notre indépendance, il faudrait quelque chose qui révolutionne la face de la politique, quelque chose qu'aucune force ne pourrait vaincre.\n\nBien que la capacité de créer cela soit bien au-delà de nos moyens, cela ne signifie pas que nos ennemis doivent le savoir. Pour eux, nous avons créé quelque chose que nous appelons la « Ruine 2.0 », un explosif capable de recréer le Jour-des-Cieux-Cendrés tel qu'il nous a été raconté. Si on nous attaque, ou si quelqu'un nous cherche des ennuis, nous l'utiliserons ! Ils n'ont pas besoin de savoir qu'en réalité elle n'est pas du tout aussi puissante."
 artifice_inventions.304.t:0 "Les Golems Gardiens Ancestraux"
 artifice_inventions.304.d:0 "L'idée d'une statue vivante, un golem, n'est pas une conception nouvelle, les premiers exemples étant ceux actifs à l'époque de l'antique Aul-Dwarov. Nos Brillites ont consacré le temps et les ressources de leur mécénat à reproduire de telles merveilles à l'ère moderne. À cette fin, ils ont partiellement réussi. Les Brillites ont réussi à créer un golem fonctionnel, généralement sculpté pour ressembler à un ancêtre décédé.\n\nNombre de nains qui voient ces statues les qualifient rapidement de « golems ancestraux », croyant que les esprits des ancêtres qu'ils représentent offriraient guidance au golem et l'utiliseraient pour protéger leurs descendants. L'idée de combattre aux côtés d'un ancêtre décédé suffit à pousser de nombreux nains à se battre jusqu'à la mort, et même si la mort ne vient pas, cela constitue une expérience profonde. Bien qu'ils soient trop coûteux pour servir de soldats, ces « golems ancestraux » pourraient conceivablement border les murs de tout centre religieux. Imaginez le choc d'un gobelin tentant de profaner un sanctuaire, pour découvrir que les objets mêmes qu'il cherchait à détruire le décapitent d'un seul coup !"
 artifice_inventions.305.t:0 "Les Masques de Chasse Artificiers"
 artifice_inventions.305.d:0 "L'élite qui fait ses preuves sur le terrain de lutte a toujours porté avec fierté et assurance les masques qu'elle a gagnés, sachant qu'ils tiennent les Veilleurs Silencieux à distance. Les étrangers ignorent peut-être que même ces masques moindres possèdent un enchantement, tout comme le Masque-Roi donné au plus grand confère la sagesse et le pouvoir nécessaires pour diriger notre peuple. Mais beaucoup de ces enchantements sont... pas si très utiles. La capacité de voir un gâteau dans la couleur que désire le porteur, la capacité d'entendre le mouvement d'un rat de jungle spécifique à des lieues de distance, un sens olfactif étrangement aiguisé pour la canne à sucre brûlante uniquement.\n\nMais c'en est fini. Les artificiers de notre peuple, ayant appris et récupéré des leçons de la Triarchie voisine, peuvent désormais améliorer ces masques. Le matériau est déjà bien adapté aux enchantements, ce qui facilite l'ajout de lentilles de vision lointaine, de sorts d'Oreilles de Hibou, et de trous d'aération filtrant les gaz toxiques. Tout lutteur gagnant un tel masque se verra accorder une telle panoplie d'enchantements, ainsi qu'une place obligatoire dans nos régiments d'artificiers, bien sûr, pour repousser les colonisateurs venus sur nos rivages."
 artifice_inventions.306.t:0 "Le Sérum de Super-soldat Avatar"
 artifice_inventions.306.d:0 "Tout le monde connaît les avatars, ces individus bénis d'un pouvoir divin pour une raison ou une autre. Tout le monde sait également qu'ils appartiennent aux légendes : il n'y en a pas eu depuis Corin elle-même. Le pouvoir d'un de ces avatars est vaste, et leurs prouesses au combat sont souvent inégalées. La question de longue date est de savoir comment ce pouvoir pourrait être correctement utilisé en temps de guerre, car un État capable de tourner les pouvoirs des dieux à son avantage pourrait triompher de n'importe qui d'autre.\n\nAprès quelques efforts, nos artificiers ont réussi à exploiter ce pouvoir, ou quelque chose de similaire. En imprégnant un liquide d'une magie de Transmutation incroyablement puissante et en y mélangeant de la Damestear, ils ont créé un sérum qui renforce rapidement un sujet (de préférence consentant) avec une force quasi divine. Ils sont capables de réagir plus vite, de se déplacer plus vite, et possèdent une force extraordinaire. Le seul problème avec ce sérum est qu'il semble « consumer » les utilisateurs, aboutissant généralement à une issue fatale après plusieurs semaines de pouvoir."
 artifice_inventions.307.t:0 "L'Exo-armure Motorisée Coddorran"
 artifice_inventions.307.d:0 "Les gnomes sont petits, chétifs, et pire que tout, faibles. Peu importe la puissance de l'esprit d'un gnome, rien de cela n'a d'importance quand un individu plus grand décide qu'il est au-dessus de tout reproche. Cette fois, nous pouvons nous assurer que cela n'arrive plus jamais.\n\nEncore mieux qu'un simple exosquelette, cette fois les Brillites ont mérité leur nom ! Ils ont créé une armure de plaques alimentée par la Damestear, capable d'utiliser la magie pour maintenir elle-même et son porteur intacts même après l'impact d'un boulet de canon, capable d'accueillir deux propulseurs étincelle montés dans les paumes, capable de décupler la force du porteur ! Cela peut être coûteux, mais qui se soucie du prix face à de tels avantages ?"
 artifice_inventions.308.t:0 "Les Lance-flammes à Feu Démoniaque"
 artifice_inventions.308.d:0 "Là où la Xhazobine allait, elle brûlait. On a toujours dit que les Gnolls tracent leurs racines à une gueule de feu, mais elle en était l'apothéose : brisant le Palais de Pierre d'Ekluzagnu avec une flamme si ardente qu'elle fit fondre une demi-lieue de montagne solide, vaporisant ceux qui se dressaient sur son chemin, et apportant une « Décennie de Flammes » au Bulwar.\n\nPeu ont jamais pu égaler son pouvoir démoniaque. Et nous ne pouvons prétendre qu'aujourd'hui, nos artificiers l'ont fait. Mais ils ont accompli la meilleure chose après : d'énormes armes cracheuses de flammes, qui nécessitent une demi-douzaine de gnolls pour les manœuvrer mais peuvent projeter du feu démoniaque et immoler nos ennemis. Castellos est mort, il n'y a plus de Dragon d'Argent qui pourrait renvoyer ces flammes contre nous, et bientôt tous nos Régiments d'Artificiers pourront émuler son pouvoir, et apporter une domination correspondante sur le champ de bataille."
 artifice_inventions.309.t:0 "Les Guerriers Génétiques Sang-de-Dragon"
 artifice_inventions.309.d:0 "Le nôtre est le sang des dragons. Le nôtre est l'héritage des dragons. Et le nôtre est le destin des dragons.\n\nCela est vrai pour chaque kobold qui vit sur ou dans la terre, mais peu se rapprochent autant de la réalisation de cette vérité que les régiments d'artificiers composés de Guerriers Génétiques Sang-de-Dragon. Un traitement spécial est effectué sur les œufs kobolds, une combinaison de rituel arcanique avec l'injection d'une petite quantité d'un élixir infusé de Damestear. Les kobolds qui en émergent grandissent deux fois plus vite que la normale et ont pleinement embrassé cet héritage draconique : ils peuvent produire des souffles à courte portée, ont des écailles aussi dures qu'une armure, et peuvent ravager avec croc, griffe et queue. Dès avant leur naissance, ces Guerriers Génétiques Sang-de-Dragon sont marqués pour la grandeur, et une place dans l'élite de nos armées."
 artifice_inventions.310.t:0 "Le Blindage en Écailles de Dragon"
 artifice_inventions.310.d:0 "Bien que l'essentiel de notre loyauté aille aux dragons chromatiques, certains individus ont toujours été intrigués par les dragons métalliques dont nous entendons des rumeurs. Leurs écailles seraient-elles encore plus dures que celles d'un dragon normal, équivalentes à une armure en soi ?\n\nUn artificier a pris cet intérêt et l'a transformé en obsession, qui a désormais porté ses fruits. Elle a enlevé quelques œufs et a plongé les nouveaux éclos encore et encore dans une étrange solution de dragon et de Damestear. Leurs écailles sont devenues dures, une preuve de concept évidente, et nous devrions nous assurer que nombre de la prochaine génération subissent le même processus afin de servir comme avant-garde d'élite dans notre armée."
 artifice_inventions.311.t:0 "Le Composé E++"
 artifice_inventions.311.d:0 "Avez-vous déjà mis le feu à de la poudre à canon ? Ça explose. Au début, c'était suffisant. D'une certaine manière, c'est toujours suffisant. Cependant, au fil des années, l'explosion que procure la poudre à canon est devenue de moins en moins satisfaisante. Ce n'est plus un tonnerre divin, c'est juste une autre curiosité éclair-boum-disparue. Alors que faut-il pour changer cela ? Plus de tonnerre !\n\nLes Brillites ont créé un nouveau composé qui, mélangé à la poudre à canon, la rend bien plus sensible et bien plus violente lorsqu'elle explose. C'est peut-être un peu plus risqué, mais qu'est-ce que cela comparé à la beauté de son fracas qui ébranle la terre ?"
 artifice_inventions.312.t:0 "Les Navires à Propulsion Kaydhano"
 artifice_inventions.312.d:0 "Les verriers d'Arpedifér ont longtemps vu les Vents de Mort comme plus qu'un fléau, saisissant l'opportunité dans le sable qu'ils soufflent pour façonner leur ornementé Potídhano, le Verre de Mort. Un artificier né dans ce kheion, cependant, a trouvé une opportunité encore plus prometteuse dans les Vents de Mort (quoique bien plus risquée).\n\nQuittant la cité pendant la tempête, vêtue de la tête aux pieds d'un équipement protecteur couvert d'enchantements, elle a pu récolter les sables alors qu'ils portaient encore leur magie mortelle. Stockée dans une boîte doublée de plomb, la magie ne se dissipe pas de la même manière et reste stockée pour un usage ultérieur. Une boîte remplie à ras bord de ce sable est donc une source d'énergie inestimable pour toute entreprise nécessitant une énergie magique à long terme, et a déjà trouvé un usage dans nos navires de guerre pour alimenter les canons étincelle Kherkan montés sur les derniers modèles Oktíkheioni."
 artifice_inventions.313.t:0 "Le Canon Berceuse"
 artifice_inventions.313.d:0 "Nos scaldes ont passé génération après génération à chanter les chants requis pour empêcher Elkaesal la Blanche de plonger le monde dans une nouvelle Ère de Gel. Mais alors que nous cherchons à maintenir ce noble devoir, des imbéciles ailleurs nous considèrent comme des cibles faciles, ignorant l'importance de notre labeur pour tous ceux qui vivent sur Halann.\n\nNos scaldes les plus entraînés ont pratiqué la magie de leurs poèmes-chants pendant des décennies, et aucun esprit mortel n'a de chance de résister à ce qui maintient une dragonne elle-même à distance. Travaillant avec nos artificiers pour amplifier leur voix sans perdre sa magie, nos nouveaux canons berceuses projettent ces sorts-sagas sur des lieues, endormant nos ennemis et rendant leur défaite inévitable."
 artifice_inventions.314.t:0 "Les Poings de Puissance"
 artifice_inventions.314.d:0 "Il existe de nombreuses voies vers un poing puissant pour tout adepte de la Voie Accrétive ou Transmutative. Il y a la méditation dans les Hauts Temples, qui peut focaliser l'âme pour canaliser le chi en frappes féroces. Il y a l'entraînement des Xia, techniques anciennes qui font d'une seule main une arme de destruction massive. Et maintenant, il y a la dernière invention de nos artificiers : les poings de puissance, des gantelets massifs forgés d'un alliage d'acier et de Damestear et cloutés de jade, qui confèrent la force de dizaines aux coups d'un seul.\n\nIl y a des protestations de sages errants et de maîtres d'arts martiaux, qui considèrent cela comme une insulte à leur art et leur héritage. Mais le [Root.Monarch.GetTitle] a déjà passé commande pour des centaines, et ils rendront nos régiments d'artificiers inarrêtables (même s'ils marcheront peut-être un peu plus lentement que d'habitude, sous le poids impressionnant des poings)."
 artifice_inventions.315.t:0 "Les Armements Rayon-Solaire"
 artifice_inventions.315.d:0 "Depuis l'éternité, Surael mène la lutte éternelle contre les forces des ténèbres, afin que nous puissions vivre dans Sa lumière. Aujourd'hui, Il nous fait un autre don : la capacité de canaliser Sa lumière afin de distribuer mort et destruction en quantités massives. Bien que les complexes réseaux de miroirs requis pour canaliser Son énergie soient coûteux, c'est une somme dérisoire comparée à l'émerveillement de canaliser toute Sa puissance en rayons étroits qui éradiquent tout sur leur passage."
 artifice_inventions.316.t:0 "Le Simulateur de Guerre"
 artifice_inventions.316.d:0 "Un arc, lorsqu'il est bandé, doit être décoché, sous peine de se briser sous la tension. Il en va de même pour une nation et un peuple organisés autour de l'armée qui doivent avoir des batailles pour se libérer. Et dans ces brefs intervalles entre les guerres, que d'autres pourraient considérer comme la « paix », seront en fait occupés par la préparation à la guerre.\n\nDans une innovation de nos artificiers asservis, ils ont utilisé des sorts d'enchantement altérant l'esprit pour créer une machine dans laquelle un soldat peut se brancher et voir son esprit transporté dans une dimension créée selon les spécifications de notre armée. Cette dimension ou « simulation » peut accueillir des milliers de soldats à la fois et peut simuler n'importe quel scénario de champ de bataille de notre choix sans besoin d'espace physique ni de préparatifs logistiques. Nos guerriers seront désormais entraînés pour toute bataille, toute escarmouche, toute confrontation."
 artifice_inventions.317.t:0 "Le Propulseur Arcanique"
 artifice_inventions.317.d:0 "Presque tous les enfants, à un moment donné, prétendent être un mage, imaginant qu'ils ont le pouvoir de simplement pointer leurs doigts vers quelque chose et de le faire exploser. Hélas, ce n'est (presque) toujours qu'un rêve. Mais quand ces enfants grandissent pour devenir des soldats, avec des propulseurs arcaniques dans leurs mains canalisant le pouvoir magique à travers un appareil d'acier en un tir concentré, ils le peuvent ! Toute surcharge magique résultant en des explosions localisées de Damestear est purement fortuite."
 artifice_inventions.318.t:0 "Le Générateur de Champ Antimagie"
 artifice_inventions.318.d:0 "La magie demeure une arme très mortelle sur le champ de bataille, c'est pourquoi nos artisans ont développé des dispositifs spéciaux pour amplifier les effets de la Damestear noire afin de projeter un « champ » qui affaiblit ou annule la magie."

 artifice_inventions.400.t:0 "Les Pierres de Communication"
 artifice_inventions.400.d:0 "La communication à longue distance a traditionnellement nécessité l'emploi de courriers ou d'animaux volants, tous deux coûteux à entretenir et notoirement peu fiables. Les pierres de communication sont un remplacement créé par l'artisanat magique pour faciliter la transmission des communications sur de longues distances à une vitesse instantanée, permettant à nos agents de se coordonner avec la capitale bien plus efficacement qu'auparavant. Bien que disponibles uniquement pour les membres les plus élitaires de la société, elles gagnent rapidement en popularité, et la possession d'une pierre de communication est déjà vue comme un signe de statut social."
 artifice_inventions.401.t:0 "Le Dispositif de Crieur sans Crieur"
 artifice_inventions.401.d:0 "L'institution ancienne du crieur public a longtemps été une méthode cruciale pour que les nouvelles, les informations et les décrets officiels se propagent facilement à travers la campagne. C'est un excellent système, mais il a quelques gros problèmes : les crieurs sont difficiles à organiser et peuvent déformer l'information lors de la transmission.\n\nHeureusement, grâce au pouvoir de l'artisanat magique, nous sommes devenus capables de retirer l'élément vivant du système et de le remplacer par de grandes machines portables capables d'enregistrer et de reproduire artificiellement des sons. Nous sommes sûrs que vous conviendrez que le chômage soudain des crieurs est un petit prix à payer au nom du progrès."
 artifice_inventions.402.t:0 "Les Miroirs Vivants"
 artifice_inventions.402.d:0 "Bien que le Communicateur Apparitionnel permette de communiquer une image avec le son, ses limitations sont sévères : il ne peut supporter qu'une communication individuelle (en termes de communicateurs) et nécessite des transmissions « en direct », entravant son potentiel à faire bien plus que de la communication individuelle. Mais à compter d'aujourd'hui, nos Technomanciens ont réussi à faire évoluer une fois de plus les communicateurs à Ondes-T, afin de créer un produit qu'ils nomment un « miroir vivant ».\n\nGrâce à une combinaison de sorts d'évocation et d'illusion, le Miroir Vivant peut recevoir des émissions depuis un emplacement central, capable de diffuser vers chaque Miroir Vivant sur sa fréquence, en couleur ! Même s'il ne s'agit que d'une conception approximative « avec beaucoup à perfectionner », il a connu une ascension fulgurante en popularité. L'absence de son exclut de nombreuses avenues, mais le texte affiché sur le Miroir est parfaitement lisible ; il existe déjà un marché florissant pour les pièces de théâtre et spectacles de scène diffusés."
 artifice_inventions.403.t:0 "Le Répulsif à Fées"
 artifice_inventions.403.d:0 "Bien que les Fées méritent notre respect et notre admiration, être étroitement lié à leur royaume comporte bien des... inconvénients. Ce sont des êtres capricieux avec très peu de considération pour ce que leurs malices causent aux autres êtres. Répondre à cela par la violence serait inutile ; cela fait partie de qui ils sont, tout comme notre affinité avec eux fait partie de nous. Même ainsi, un moyen de manipuler ces rencontres afin qu'elles ne se produisent qu'à nos conditions serait le bienvenu. Nous avons présenté ce problème aux Artificiers : Éloigner les Fées sans leur faire de mal.\n\nIls ont répondu à l'appel. Les Technomanciens ont, après des tests inlassables, préparé un spray qui agit comme une sorte de répulsif envers les Fées. Tout ce sur quoi ce spray est appliqué sera trouvé peu attrayant par les Fées, et donc elles auront tendance à l'ignorer. Ce n'est pas toujours efficace, mais cela fonctionne comme prévu assez souvent pour être fonctionnel."
 artifice_inventions.404.t:0 "Le Jeu des Khet"
 artifice_inventions.404.d:0 "Dans les temps anciens, les archives montrent que nombre de Khet, en temps de conflit, réglaient leurs différends non par le combat, risquant ainsi leurs vies immortelles, mais par un ancien jeu de stratégie. Ce jeu, impliquant des tablettes de pierre enchantées imprégnées d'images de monstres redoutables, prenait souvent la place de formes plus violentes de duel.\n\nAvec l'artisanat magique moderne, cet ancien jeu n'a plus besoin d'être limité aux seuls Khet et à leurs pierres ancestrales. En utilisant des techniques d'enchantement modernes sur de simples cartes, nous pouvons reproduire ce jeu à grande échelle pour les masses ! Non seulement cela aidera à garder nos citoyens les plus importants vivants et loyaux, plutôt que de mourir dans d'inutiles altercations physiques, mais cela maintiendra sûrement notre peuple plus paisible. Après tout, pourquoi se battraient-ils alors qu'ils peuvent plutôt s'engager dans cette méthode bien plus divertissante, et bien plus sûre, de résoudre les disputes ?"

 artifice_inventions.500.t:0 "L'Étal sans Vendeur"
 artifice_inventions.500.d:0 "Bien que cela puisse sembler un concept étrange, considérez un étal de marché qui ne nécessite pas de vendeur pour vendre des marchandises. On insérerait simplement des pièces, recevrait le produit désiré, puis poursuivrait son chemin. Pas de marchandage, pas de délai, pas d'apprentis requis. À la fin de la journée, son gardien réapprovisionnerait les marchandises et collecterait les bénéfices de leurs ventes. Les avantages sont considérables : les marchands peuvent vendre leurs marchandises sans avoir à négocier leurs coûts, les artisans peuvent vendre leurs produits tout en effectuant la fabrication proprement dite en même temps, et les clients peuvent faire leurs achats rapidement !\n\nCe concept a été la dernière invention des artificiers, une machine qui peut être configurée pour vendre toutes sortes de marchandises par divers moyens. Il pourrait sembler que cela n'aurait aucun avantage tangible pour l'État, mais c'est le cas ; la facilité accrue de faire des affaires permet aux gens d'accomplir davantage dans le même laps de temps, ce qui en soi augmente nos revenus d'un montant impressionnant."
 artifice_inventions.501.t:0 "Le Sort en Boîte"
 artifice_inventions.501.d:0 "La commercialisation de la magie a toujours été un sujet étrange ; les mages peuvent être enclins à vendre leurs services, mais ceux qui le font ont tendance à facturer des prix élevés pour quoi que ce soit de plus exigeant qu'un simple tour de passe-passe. Cependant, grâce au pouvoir de la technologie moderne, les sorts pré-lancés peuvent être préservés pendant de longues périodes, contenus dans des parchemins, eux-mêmes contenus dans des conteneurs spécialisés : le Sort en Boîte ! Désormais, un seul mage, spécialisé dans un seul sort, peut l'imprégner dans des centaines de parchemins à la fois, pour une distribution de masse. Enfin, la magie peut être expérimentée par tous, et à des prix bien inférieurs ; l'intermédiaire-mage étant enfin éliminé."
 artifice_inventions.502.t:0 "Les Charmes d'Extraction de Chi"
 artifice_inventions.502.d:0 "Le Chi. La force vitale, l'énergie qui circule à travers chaque être vivant, et beaucoup qui ne le sont pas. Il est fondamental à toutes les pratiques de la Voie Dévorante, celles bénignes comme celles qui le sont moins. Mais il est difficile à canaliser, et encore plus difficile à préserver, un problème pour quiconque souhaiterait exploiter sa puissance.\n\nLes imbéciles des Voies Accrétive et Transmutative acceptent cette contrainte et se limitent au seul Chi qu'ils peuvent créer intérieurement. Les jiangshi de Jinqiu drainent d'innombrables humains et ont encore soif de plus, les Oni exploitent d'anciens rituels, mais grâce à la dernière invention de nos artificiers, n'importe lequel de nos régiments d'artificiers peut avoir accès à tout le Chi nécessaire pour s'alimenter au combat.\n\nUne étrange petite boîte, apparemment une amulette mineure à l'œil non averti, contient un réseau complexe d'acier et de jade. Appliquée aux prisonniers ou aux troupes qui « se portent volontaires », elle draine leur Chi comme le feraient les jiangshi, mais plutôt que de transformer quelqu'un en créature mort-vivante, elle le stocke simplement pour un usage ultérieur (bien que cela prenne quelques heures). Une fois libéré, il alimente nos régiments d'artificiers vers de nouveaux sommets de puissance."
 artifice_inventions.503.t:0 "Le Prédicateur Météorologique"
 artifice_inventions.503.d:0 "Quelle que soit la cour, un simple fait de la vie est que le temps est éphémère, changeant et évoluant de manières imprévisibles. Bien que le temps puisse être façonné par les saisons, il reste difficile de dire quand les cieux permettront une activité ou une autre. Un navire pourrait couler à cause d'une averse surprise, ou un Snecboth pourrait être enseveli sous un blizzard qu'il n'avait aucun espoir de remarquer. La capacité de prédire le temps futur, même de manière imprécise, pourrait être un atout indiciblement précieux pour le commerce.\n\nEn utilisant notre connexion unique aux saisons, nos artificiers ont pu exploiter un mélange de magie féerique et de divination pour créer un dispositif capable de prédire le temps de la zone autour de lui, fournissant à l'utilisateur des lectures (pour l'essentiel) précises de la température et de choses comme la pluie ou la neige. Plus jamais un navire n'aura à s'inquiéter d'être pris au dépourvu dans une tempête, ou de manquer d'eau parce que les pluies ont failli et qu'il n'a pas pensé à en recueillir ailleurs."

 artifice_inventions.600.t:0 "Les Balles Vorpales"
 artifice_inventions.600.d:0 "Typiquement, une arme à feu utilise une balle, un objet métallique grossièrement sphérique conçu pour tuer celui qu'il transperce. Habituellement, cela fonctionne comme prévu, car l'armure fait peu pour empêcher l'une de ces balles de transpercer le porteur en raison de la haute vélocité du tir. Au fil du temps, les tirs bloqués par l'armure sont devenus un incident suffisamment récurrent pour ne plus pouvoir être nié. L'ébonacier, correctement préparé, peut supporter plusieurs tirs avant que sa structure ne soit endommagée. La création d'un projectile capable de percer efficacement cette armure est devenue nécessaire.\n\nLa Balle Vorpale semble prête à résoudre tous ces problèmes. Présentant une forme pointue expérimentale, la Balle Vorpale est capable de concentrer toute la force derrière son tir en un seul impact à la pointe, créant un impact bien plus puissant qu'une balle ordinaire. De plus, sa forme possède une qualité particulière qui lui permet de se déplacer plus rapidement dans l'air, améliorant ses chances d'atteindre la cible."
 artifice_inventions.601.t:0 "Les Golems de Guerre"
 artifice_inventions.601.d:0 "L'art de la fabrication de golems est un art raffiné mais laborieux, des golems touchés par les plans de la Fangaula aux anciens gardiens des forteresses naines en passant par les créations improvisées de mages errants, mais avec l'avènement de l'artisanat magique comme pratique, créer des golems, non, une armée de golems, est soudainement une réalité très pratique.\n\nBien que d'intelligence rudimentaire et seulement capables de traiter des commandes basiques, ils sont, plus important encore, capables de porter des coups puissants ! Avec suffisamment de Damestear, ces golems de guerre peuvent même charger les lignes ennemies à grande vitesse et les traverser comme un boulet de canon. De plus, ils seront capables d'attirer le feu loin de nos troupes, servant de couverture et couvrant même les retraites."
 artifice_inventions.602.t:0 "Les Baguetteuses"
 artifice_inventions.602.d:0 "Ressemblant à des pistolets et fusils à silex, ces baguetteuses remplacent la cartouche de papier habituelle par des parchemins de sort miniatures contenant des variantes spécialisées de sorts de champ de bataille courants. Les sorts populaires incluent les projectiles magiques, les boules de feu et les éclairs, mais en certaines occasions, la baguetteuse a été chargée de sorts de protection, créant un spectacle incroyablement étrange quand un tireur se tire dessus à bout portant pour l'appliquer ! Enfin, grâce au pouvoir de l'artisanat magique, la magie est accessible au soldat ordinaire !"
 artifice_inventions.603.t:0 "Les Boucliers Magiques Personnels"
 artifice_inventions.603.d:0 "Certains mages puissants aspirent à l'immortalité, sombrant souvent dans la folie dans le processus. Les plus avisés se contentent d'une immortalité fonctionnelle, s'entourant de boucliers magiques quasi impénétrables. Maintenant que nous avons découvert comment projeter de tels champs de manière stable via l'artisanat magique ; des sorts d'abjuration imprégnés dans des jauges de sorts mécaniques permettent d'ajuster la taille et la force du bouclier à volonté. Finis les jours des brèches dans l'armure, ou même du port d'armure tout court !"
 artifice_inventions.604.t:0 "Le Générateur de Champ Antimagie"
 artifice_inventions.604.d:0 "Un mage de combat peut valoir plusieurs fois son nombre au combat. Par des sorts de plus en plus destructeurs, on peut invoquer presque n'importe quoi, du feu aux morts-vivants. Cela peut finir par créer un surhomme par simple pedigree, leur sang leur permettant de massacrer de vastes sommes d'hommes « inférieurs ». Si nous pouvions éliminer cette magie, alors il serait très possible d'annuler les effets de la magie au combat, afin que tous les hommes puissent au moins mourir à égalité.\n\nLes Technomanciens ont créé un dispositif qui ressemble à une lampe. Lorsqu'il est alimenté par de la Damestear Noire, il projette un champ pas très différent de la lumière d'une lampe, capable d'annuler (ou, à mesure qu'on s'éloigne du dispositif, d'atténuer) les effets de la magie en son sein. Le dispositif est stationnaire et nécessite trop de temps d'installation pour être viable dans un contexte militaire, mais il est très utile pour s'assurer que certains points sont immunisés contre le vandalisme uniquement destructeur qu'un mage peut déchaîner."
 artifice_inventions.605.t:0 "Le Sérum de Rage Contrôlée"
 artifice_inventions.605.d:0 "Dans un combat, il est évident qu'un orque est à son meilleur quand il est en colère. Si vous pouvez en enrager un suffisamment, il semblera avoir oublié qu'il est mortel dans sa rage, survivant à tir après tir, s'engageant dans une brutalité désinvolte et la terminant avec une vitesse que nul ne pourrait égaler, et cela en fait un style de combat efficace, si incontrôlable. Il aurait été utilisé plus souvent par le passé s'il avait été plus facile de contrôler cette rage. Même dans le meilleur des cas, il est très difficile de faire entrer un orque de manière fiable dans une rage sanguinaire. Le laisser s'en prendre à l'ennemi peut aider à le calmer, mais le processus est lent et peut laisser l'armée incapable de répondre aussi rapidement.\n\nLe Sérum de Rage Contrôlée apporte la seule chose dont un berserker orque avait besoin : le contrôle. Un soldat commencera à sentir la chaleur de sa colère peu après l'injection (avec un délai suffisant pour le diriger correctement), et le dosage peut être modifié pour s'assurer qu'il se calme dès que sa fureur n'est plus nécessaire."
 artifice_inventions.606.t:0 "La Poudre Élémentaire"
 artifice_inventions.606.d:0 "Bien que nous ayons été la cible des armes à feu dans les éons passés par les Nains de Silex, nous sommes tombés amoureux au premier regard de ces glorieuses armes. Mais c'était il y a des années, et nous aspirons maintenant à de la nouveauté.\n\nIl ne suffit pas que les balles laissent des trous béants dans nos ennemis, pourquoi ne les enflamment-elles pas aussi ? Ou ne les gèlent-elles pas complètement ? Ou ne les électrocutent-elles pas ? Avec cette nouvelle poudre élémentaire, nous renouvellerons notre amour de longue date et le verrons atteindre de nouveaux sommets. Bien que le stockage soit devenu remarquablement plus dangereux, les résultats parlent d'eux-mêmes ; rien ne rend un soldat plus susceptible de battre en retraite que de voir ses camarades partir en fumée de nulle part !"
 artifice_inventions.607.t:0 "Le Tonique Héroïque Vernois"
 artifice_inventions.607.d:0 "Chaque homme et femme pouvant retracer sa lignée jusqu'aux anciens rois de Verne partage deux désirs : chevaucher une wyverne et devenir un héros. Si cette potion ne peut vous accorder de bestiole écaillée, une gorgée et vous devriez presque pouvoir voir votre nom s'inscrire dans les livres d'histoire."
 artifice_inventions.608.t:0 "Les Protections Runiques Veykoda"
 artifice_inventions.608.d:0 "Les Veykodan ont longtemps utilisé des runes pour fortifier leurs armures et leurs corps contre la lance perçante, l'épée tranchante, et même la balle rapide. Plus récemment, la pratique a également été émulée par les nains d'Argezvale, des tatouages runiques enchantant leur peau avec des propriétés similaires. Mais le processus de création de telles runes était laborieux, nécessitant une affinité étroite entre le mage qui les conçoit et le guerrier qui les reçoit, ainsi que l'inscription quasi calligraphique des designs eux-mêmes.\n\nUn technomancien, frustré par son incapacité à trouver un mage capable de créer un ensemble pour son usage (que veulent-ils dire, leur art artisanal ne convient pas à une blouse et tunique d'artificier ?), a trouvé un moyen de produire en masse l'écriture runique au lieu de s'appuyer sur l'artisanat sur mesure. Un mage peut travailler à créer ses designs sur une plaque de métal, qui devient ensuite la pièce maîtresse d'une forge d'estampage métallique qui l'alimente également avec une légère infusion de Damestear. Toute armure qui passe dessous peut être estampillée des designs runiques, et les protections fonctionnent presque aussi bien qu'une approche plus traditionnelle. Enfin, l'armure runique est accessible à tous, et le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a déjà passé une commande massive pour que nos régiments d'artificiers l'utilisent."
 artifice_inventions.609.t:0 "La Boîte sans Fond"
 artifice_inventions.609.d:0 "Pendant des siècles, le sac sans fond a été un équipement dont aucun aventurier ne pouvait se passer. Comment sinon transporteraient-ils tout leur butin ? Mais maintenant que nos artificiers ont découvert comment étendre ses principes à des boîtes plus grandes et plus robustes, il deviendra rapidement tout aussi indispensable pour les marchands engagés dans le commerce d'Aelantir à Haless. Car qu'y a-t-il de mieux qu'un sac sans fond ? Un sac sans fond que l'on peut empiler !"
 artifice_inventions.610.t:0 "Les Haricots de Croissance"
 artifice_inventions.610.d:0 "L'équipement agricole ne signifie rien si la terre elle-même est incompatible avec vos cultures. Souvent, le plus grand obstacle à l'agriculture est la terre utilisée : les conditions du sol, ainsi que le climat, peuvent condamner de nombreuses cultures si elles ne sont pas soigneusement gérées. Même si la nourriture peut pousser, ce n'est pas une garantie qu'elle poussera en abondance. Une pomme n'est guère de la nourriture si elle fait la moitié de la taille de votre main !\n\nLes haricots de croissance, nommés ainsi pour la forme particulière de leurs conteneurs, ne sont pas réellement des haricots. Le conteneur peut être frotté entre les mains, libérant une fine poudre qui améliore fortement le potentiel des cultures lorsqu'elle est appliquée régulièrement aux terres agricoles."
 artifice_inventions.611.t:0 "Le Déployeur de Projectiles Magiques"
 artifice_inventions.611.d:0 "Le premier sort que tout mage étudiant l'évocation apprend est le projectile magique de base. C'est leur gagne-pain, le fléau des ténèbres (sous forme de gobelin, de rat géant, ou même d'orque).\n\nCette forme d'artillerie mobile est quelque peu encombrante et compliquée, mais peut cracher des projectiles magiques non guidés sous une forme capable d'éliminer une douzaine de fantassins en quelques secondes. Nos forces ne peuvent plus être chargées et brisées ; quiconque oserait courrait simplement vers une tempête de puissance magique. Avec la puissance de feu de plus d'une centaine de mages novices combinée en une seule arme, nous avons transformé un simple quasi-tour de passe-passe en une véritable arme de guerre."
 artifice_inventions.612.t:0 "Les Boucliers Magiques Navals"
 artifice_inventions.612.d:0 "Les récentes avancées en artillerie ont fait des affrontements en mer des affaires furieuses, le feu de canon et de mage déchirant même les coques de bois les plus épaisses. Mais nos artificiers ont découvert un revêtement, imprégné de magie d'abjuration, qui permet de projeter un bouclier magique le long de n'importe quel navire, de la proue à la poupe. Malheureusement, les boucliers ne peuvent être maintenus en permanence, en raison du besoin de tirer en réponse, mais en abaissant rapidement, tirant, puis relevant les boucliers, nos défenses peuvent bientôt être impénétrables. Nos navires de guerre devraient désormais être capables de survivre à un bombardement complet d'un vaisseau ennemi, sans la moindre égratignure à montrer."

 artifice_inventions.700.t:0 "Les Teintures Curatives"
 artifice_inventions.700.d:0 "Depuis la mort d'Alaria la Main-de-Vie à la Bataille de Trialmount, la magie de guérison a pris du retard par rapport aux autres écoles. Mais là où la magie a échoué, l'artisanat magique peut aller bien au-delà.\n\nCes kits contiennent des potions uniques, des garrots auto-resserrants, et tout le nécessaire pour retirer un soldat du seuil de Nerat et le ramener sur le champ de bataille en quelques heures à peine. Le tout contenu dans un paquet léger et portable qui n'alourdit guère un soldat sur le champ de bataille, et pouvant être déployé avec peu ou pas de formation. À tout moment, n'importe quel soldat peut tout aussi facilement devenir un médecin !"
 artifice_inventions.701.t:0 "Les Locomotives à Propulsion Étincelle"
 artifice_inventions.701.d:0 "L'éprouvé animal de bât nous a bien servis depuis des temps immémoriaux. Jusqu'à tout récemment, il semblait être la perfection de son concept : entraîner un animal à porter de lourdes charges et les transporter rapidement. Le sélectionner jusqu'à ce qu'il puisse faire cela mieux que n'importe quel individu ne pourrait jamais le faire. Il s'avère que faire la même chose mais avec du métal et de la magie peut créer des résultats encore meilleurs.\n\nLes Mécanistes ont conçu un chariot qui ne nécessite aucun animal spécialement élevé pour le piloter, ne requérant que de la Damestear comme carburant. Il fonctionne de manière très similaire au fusil à Propulsion Étincelle, utilisant la Damestear et l'énergie élémentaire présente comme source d'énergie pour déplacer le chariot. Cela crée un dispositif qui, même sous charge extrême, peut transporter marchandises et personnes d'un endroit à un autre à une vitesse fulgurante, capable dans certains cas de faire un trajet plus de cinq fois dans le temps qu'il faudrait à un chariot traditionnel tiré par des animaux pour le faire une seule fois. Il ne peut être utilisé que sur des plateformes spécialisées en raison de cette vitesse extrême, sinon il se catapulterait dans le terrain et serait détruit.\n\nBien qu'encore à ses débuts, il ne devrait surprendre personne que ce dispositif révolutionnera le transport tel que nous le connaissons... peut-être en 1836 ?"
 artifice_inventions.702.t:0 "Les Bras de Fouisseur"
 artifice_inventions.702.d:0 "Tout kobold qui se respecte nourrit le désir d'établir son propre terrier et ses propres tunnels. Le problème est que cela est souvent bien plus facile à dire qu'à faire. Les conditions du sol, ainsi que l'effort requis pour déplacer de grandes quantités de terre, rendent très difficile pour un kobold la création d'un terrier digne de ce nom.\n\nLes artificiers Mécanistes, cependant, ont pris notre mécénat et l'ont utilisé pour créer une série de greffes de bras et de modifications artificielles collectivement connues sous le nom de « bras de fouisseur », capables de doubler, tripler, voire bien au-delà, d'améliorer la force des bras d'un kobold. Avec ceux-ci, un puissant tunnel est à portée de main pour tout kobold capable de subir les procédures requises."
 artifice_inventions.703.t:0 "La Vedette Rapide Divendancer"
 artifice_inventions.703.d:0 "Les hommes brillants et fous qui passent leur vie à tenter de faire le tour du Golfe de la Wyverne en un minimum de temps ont trouvé une amitié rapide avec les hommes brillants et fous qui se consacrent à l'artisanat magique. Pendant des générations, les embarcations ont été poussées à leurs limites, sacrifiant sécurité et durabilité dans la poursuite de la vitesse. Cela a évolué vers des catamarans ornementés sculptés dans le plus fin bois de Bahar et de Verkal Skomdihr, et un record flamboyant de sept heures, vingt minutes et trente-neuf secondes a été établi il y a tout juste trois ans par une Vernoise qui serait possédée par Corin elle-même.\n\nMais c'était avant, et nous nous tenons dans un monde nouveau maintenant. Lors de la plus récente Régate de Stingport, ce n'est pas la taille de la voile qui compte mais celle du moteur à l'arrière des navires, où des pépites de Damestear propulsent les embarcations à des vitesses jamais vues auparavant, de sorte que le maximum qu'un concurrent puisse faire est de s'accrocher et de diriger. Sans aucun doute nous verrons de nombreuses embarcations s'écraser sur les îles rocheuses qui parsèment la Queue de la Wyverne, et déjà le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a rédigé des lettres de condoléances aux familles de tout marin tué. Mais c'est ce qui doit être fait, au nom de la vitesse. Et si nous pouvons exploiter ne serait-ce qu'une fraction de leur maniabilité et de leurs designs pour nos propres navires, nos marines seront inégalées dans le Divenhal."
 artifice_inventions.704.t:0 "Les Griffes de Ferrailleurs"
 artifice_inventions.704.d:0 "Les Griffes de Ferrailleurs. Les gnolls sont traditionnellement des charognards et obtiennent une grande partie de leur approvisionnement en métal en démantelant d'anciens ouvrages métalliques inutilisés ou en arrachant les produits métalliques de ceux qu'ils pillent. Cela leur prend normalement pas mal de temps, des pieds-de-biche pour arracher les tôles, des scies à métaux pour tout démonter.\n\nCes Griffes de Ferrailleurs se portent comme des gants avec de longues griffes exagérées s'étendant le long des doigts et une armature remontant le bras jusqu'à l'épaule. Les griffes ont de petites lames de scie qui vibrent d'avant en arrière pour scier rapidement les morceaux de ferraille, et l'armature autour du bras renforce tout gnoll qui les porte, lui permettant de porter plus que la normale. Cela a considérablement accéléré le processus de pillage et a augmenté la productivité dans les cours de ferraille de manière significative. Les gnolls sont ainsi très recherchés par les propriétaires de forges et de cours de ferraille à travers Cannor et le Bulwar comme main-d'œuvre très efficace dans les étapes de pré-préproduction de la fabrication métallique."

 artifice_inventions.800.t:0 "Les Usines des Magnats Alimentées par l'Artisanat Magique"
 artifice_inventions.800.d:0 "C'est un spectacle courant de voir des usines dans les terres des peuples aléniques. Ces complexes sont dirigés par une classe sociale nommée les Magnats, dont le dévouement à l'industrie a créé le spectacle iconique du ciel divisé en morceaux par d'innombrables cheminées. Ces usines sont depuis longtemps louées pour leur efficacité, où l'innovation et la technologie de pointe se combinent pour produire plus de biens d'une qualité supérieure que jamais. Mais et si l'on pouvait aller encore plus loin ?\n\nLes Mécanistes ont conçu un certain nombre d'inventions plus modestes au cours de leur étude, pour la plupart alimentées par la Damestear. Celles-ci peuvent aller du générateur d'eau (qui fait gagner du temps en permettant d'invoquer l'eau sur place) au transporteur automatisé (qui utilise la Damestear pour « pousser » les objets le long d'une surface spécialisée), toutes pouvant grandement renforcer la productivité d'une usine en réduisant le temps requis pour produire des biens et le coût requis pour produire lesdits biens.\n\nBien sûr, les Magnats sont avant tout axés sur le profit. Ils sont, pour la plupart, réticents à s'éloigner de ce qu'ils savent fonctionner pour des inventions qui semblent non testées. Si nous devions parrainer ces inventions et nous assurer qu'elles ne coûtent pas une somme excessive aux Magnats, nous en serions sûrement récompensés en retour, tant en fonds qu'en marchandises."
 artifice_inventions.801.t:0 "Les Automates d'Entretien Urbain"
 artifice_inventions.801.d:0 "À travers notre royaume, de puissantes cités parsèment les rives des lacs et au-delà, s'élevant au-dessus des plaines majestueuses que nous appelons notre foyer. Nombre de ces cités contiennent de belles œuvres architecturales, de puissantes structures dominant nos rues, servant de puissants symboles de la force et de l'innovation triuniques. Le seul problème est que nombre de ces structures étaient coûteuses à entretenir lorsqu'elles ont été construites à l'origine, et avec l'âge, ce problème n'a fait qu'empirer.\n\nHeureusement, l'artisanat magique a la solution ! De minuscules machines d'horlogerie, conçues spécifiquement pour ressembler à des oiseaux indigènes, seront déployées afin de fournir en continu un entretien et des réparations à nos cités de manière économique, sans détoner dans la beauté que nous avons si soigneusement cultivée."
 artifice_inventions.802.t:0 "L'Obscurcisseur de Petits Caractères"
 artifice_inventions.802.d:0 "La plupart diraient que rédiger des contrats contenant d'énormes expansions de pouvoir enfouies dans des failles arcanes et des petits caractères est un art. Mais nos artificiers en ont maintenant fait une science, trouvant les styles d'écriture qui échappent le plus à la compréhension et la formulation la moins digeste par l'esprit intelligent. Du texte qui semble se transformer et changer de forme sous différentes lumières, aux polices qui font naturellement passer l'œil dessus, à la capacité de taper si petit que des clauses entières, et en fait des contrats entiers, peuvent être écrits dans l'espace d'un simple point !"
 artifice_inventions.803.t:0 "Les Constructeurs de Cités Préfabriquées"
 artifice_inventions.803.d:0 "Pendant mille ans, les gnomes ont dû se contenter de très peu d'espace. Du minuscule octroi territorial de Giberd aux marécages inondés de Portnamm, des îles exiguës de Nimscodd et des Éclats, nous avons rarement eu beaucoup de terrain physique. Malgré cela, nous avons toujours construit des métropoles et des monuments, car nous maîtrisons depuis longtemps l'art des constructions denses, efficaces et élevées. Nous avons creusé dans la terre pour dégager des étages supplémentaires, stabilisé nos fondations dans le socle rocheux, et empilé nos bâtiments avec des géométries parfaites. Avec la technologie moderne, notre capacité d'urbanisme n'a fait que s'améliorer ; jamais auparavant nous n'avions eu accès au fer, à l'acier ou au verre produits en masse. Mais aujourd'hui, nous faisons un pas glorieux vers une nouvelle ère de construction urbaine.\n\nPremièrement, produire en masse bois, poutres, fondations, briques, et plus encore. Deuxièmement, les enchanter pour qu'ils s'assemblent en formes particulières lorsqu'ils sont exposés à un sort de Fabrication automatisé. Troisièmement, inclure de la colle magique dans le processus de fabrication, pour assurer que les constructions restent stables. Quatrièmement, emballer tous ces articles dans de minuscules boîtes sans fond, facilement transportables n'importe où. Cinquièmement, répéter cela de très, très, très nombreuses fois. Sixièmement, apporter ces boîtes dans un emplacement vide et construire une cité entière apparemment à partir de rien.\n\nAvec ces Constructeurs de Cités Préfabriquées, nous pouvons construire des cités entières à l'avance, selon des plans établis, et avec une cohésion parfaite. Nous pouvons désormais développer nos terres comme jamais auparavant !"
 artifice_inventions.804.t:0 "Les Cultivateurs de Perles"
 artifice_inventions.804.d:0 "Le Bord-de-Perles n'est pas un nom arbitraire : il est nommé ainsi pour sa saison des huîtres, où l'on peut trouver des perles d'une qualité que nulle autre au monde ne pourrait jamais égaler. En théorie. La réalité s'avère bien différente : bien que les perles constituent toujours des produits précieux, leur valeur est entravée par une qualité qui n'est jamais tout à fait parfaite. Si, par quelque moyen, ces perles pouvaient avoir une haute qualité garantie, elles pourraient générer un profit bien supérieur ; les bonnes perles ne sont pas bon marché, après tout !\n\nLes Mécanistes ont conçu une création permettant plusieurs choses importantes. C'est un dispositif qui utilise la magie de transmutation pour imiter les conditions qui créent les perles en une fraction du temps. Bien qu'artificielles, il peut créer des perles parfaites (en supposant la bonne composition de composants) en quelques jours. Il peut également être utilisé loin de la côte, permettant aux perles d'être préparées et créées avec une qualité constante, et, plus important encore, d'être préparées toute l'année au lieu de pendant quelques mois seulement. Si seulement il pouvait en préparer plusieurs à la fois..."
 artifice_inventions.805.t:0 "Les Ascenseurs Ultra-rapides"
 artifice_inventions.805.d:0 "Dès qu'un nain apprend à creuser, on lui enseigne à se ménager un chemin pour remonter et sortir de son trou. Échelles et escaliers taillés sont courants, mais nous avons bien trop creusé au-delà de leur utilité dans l'expansion sans cesse croissante de nos Forteresses. C'en est arrivé au point où il pourrait falloir des semaines, voire des mois, pour remonter des profondeurs d'une forteresse jusqu'à sa surface. De nouveaux ascenseurs, cependant, devraient nous permettre de transporter marchandises et personnes du sommet au fond en quelques minutes seulement, accélérant considérablement la production et l'administration."
 artifice_inventions.806.t:0 "Le Vieillisseur de Vin"
 artifice_inventions.806.d:0 "L'une des tragédies de la vinification est que le vin doit souvent être vieilli pendant des mois, voire des années, avant d'atteindre son plein potentiel (et de maximiser son profit). Mais cette toute nouvelle invention, une sorte de produit chimique particulier, nous permet d'accélérer considérablement ce processus. Nous pouvons désormais passer du raisin à la bouteille en quelques semaines seulement !"
 artifice_inventions.807.t:0 "Les Teintures Curatives"
 artifice_inventions.807.d:0 "Notre Recherche en Artisanat Magique a abouti à une grande invention que notre pays peut désormais utiliser et dans laquelle se spécialiser si nous le désirons :\n\n"
 artifice_inventions.808.t:0 "Les Galions Célestes Commerciaux"
 artifice_inventions.808.d:0 "Depuis longtemps, le peuple regarde vers les cieux, si longtemps le domaine des mages et des dragons, rêvant lui-même du pouvoir de voler. Désormais, grâce au pouvoir de l'artisanat magique, et à la puissance de la vapeur et du gaz, les cieux sont ouverts à tous !\n\nDe puissants zeppelins parsèment les cieux, témoignages flottants de la puissance de l'industrie et de l'arcane. Capables de transporter un nombre incalculable de personnes et de marchandises sur de vastes distances rapidement et à moindre coût, transportant explorateurs et aventuriers jusqu'aux confins les plus reculés de Halann, et mettant tous les coins du monde à portée en quelques semaines de voyage seulement, plutôt qu'en mois.\n\nBien qu'ils ne soient pas du tout pratiques à des fins de combat, pouvant être facilement abattus par n'importe quel mage ou projectile, leur utilisation pour le transport de fournitures et de renforts est néanmoins prometteuse. Peut-être qu'un jour, les guerres se livreront entièrement dans les cieux ! Pour l'instant, cependant, nous devons nous contenter de simplement révolutionner notre économie, et laisser les questions des aéronefs sur le champ de bataille aux bricoleurs et rêveurs du futur."
 artifice_inventions.809.t:0 "Le Parchemin Auto-nettoyant"
 artifice_inventions.809.d:0 "Il est tout à fait possible d'effacer du texte d'un morceau de papier dans les bonnes circonstances, mais ces circonstances sont suffisamment spécifiques pour que l'effacement du texte soit l'exception plutôt que la règle. Cela peut rendre les erreurs et autres fautes administratives de base très coûteuses à corriger : si des statistiques sont rapportées de manière erronée, vous ne pouvez pas simplement les réviser rapidement et vous attendre à garder un document propre et lisible ! Il faut un document entièrement nouveau juste pour s'assurer que tout est correct.\n\nLes Mécanistes ont conçu un type unique de document pour soulager ces maux. C'est un morceau de quasi-papier. Bien qu'il ressemble au vrai, la texture du matériau est telle qu'il est possible d'effacer l'écriture avec une brosse spécialisée (afin de s'assurer que le texte n'est pas effacé accidentellement) et il apparaîtra comme si rien n'avait jamais été là !"
 artifice_inventions.810.t:0 "L'Irrigation à Haute Vélocité"
 artifice_inventions.810.d:0 "Quel est l'un des plus grands problèmes au Bulwar ? L'eau. L'eau, c'est la vie, quand la terre est aussi sèche que la nôtre. La nourriture peut nourrir un homme, mais cette nourriture ne pourrait jamais pousser si elle ne recevait pas une quantité d'eau appropriée. C'est, en fait, le pire facteur limitant de la croissance de notre population. Et bien que nous soyons bénis par Surael de deux grands fleuves, plus on s'éloigne d'une source d'eau, plus l'effort requis pour maintenir les cultures bien irriguées croît de manière exponentielle.\n\nLa réponse naturelle à cette question est de faciliter l'irrigation. Si l'eau peut être envoyée plus loin pour le même effort, alors bien plus de terres peuvent accueillir des cultures que jamais auparavant. C'est plus facile à dire qu'à faire. Mais désormais, c'est effectivement fait ! Les Mécanistes ont conçu une machine capable d'expulser l'eau à une vélocité bien supérieure aux sources traditionnelles, lui permettant d'atteindre bien plus loin depuis le même endroit. Arroser les cultures n'a jamais été aussi facile !"

 artifice_inventions.900.t:0 "Les Roquettes à Tête Chercheuse"
 artifice_inventions.900.d:0 "Être capable de tirer sur son ennemi, c'est bien beau, mais à quoi bon si rien ne le touche ? S'ils se déplaçaient assez vite, ils pourraient même esquiver chaque bombe lancée contre eux ! Cela ne pouvait évidemment pas convenir, et une roquette capable de pourchasser et de tuer tout ce sur quoi elle était tirée a toujours été un objectif clair, même si l'exécution était moins simple à mettre en pratique.\n\nPeu importe maintenant, car les Mécanistes ont enfin découvert comment fabriquer une roquette garantie de tuer tout ce sur quoi elle était visée. Grâce à une ingénierie minutieuse, ils ont conçu un explosif guidé par un Artificier de combat, capable d'effectuer de larges virages et de maintenir sa puissance mortelle bien après qu'une bombe ordinaire aurait touché le sol et explosé.\n\nImaginez un peu : un imbécile danse autour d'un missile rouge vif, et juste au moment où il se croit supérieur à la race gobeline, il fait demi-tour et la dernière chose qu'il voit est un rouge vif féroce le pourchassant !"
 artifice_inventions.901.t:0 "L'Exo-armure Colossale"
 artifice_inventions.901.d:0 "Nous sommes forts. Nous avons toujours été forts, dominant les races plus petites, balayant leur technologie par la force de nos coups même maintenant, mais « fort » ne signifie pas « parfait ». Bien que cela demande beaucoup de tirs, les armes plus petites peuvent certainement abattre l'un des nôtres, et leurs baïonnettes rendent bien plus difficile de briser leurs lignes. Si cette tendance s'était poursuivie, les plus petits auraient très bien pu nous briser sur leurs lignes infinies de feu et d'acier.\n\nMais ils ne le feront pas.\n\nEn alimentant une armure de métal avec de la Damestear, il a été possible de la rendre capable de bien plus que d'être une simple armure. Cette armure confère à nos soldats une force accrue, leur permettant de balayer l'infanterie inférieure en quelques larges coups. La magie en son sein les imprègne également de protection, leur permettant de charger l'infanterie inférieure et de les briser sans égard pour les balles ou même les tirs de canon. Si ce n'est pas la perfection, alors les possibilités sont illimitées."
 artifice_inventions.902.t:0 "Les Sous-marins G-U"
 artifice_inventions.902.d:0 "Il est vrai que les gnomes ne font pas exactement les meilleurs marins. Trop petits pour accomplir de nombreuses fonctions correctement, il serait logique que n'importe quelle puissance navale de Cannor puisse couler nos flottes et ravager nos terres si elle le choisissait. Afin d'empêcher cela, il est nécessaire d'innover sur nos navires. Nous aurions besoin de quelque chose qui change radicalement la face de la guerre navale afin d'assurer l'héritage de la Hiérarchie. Eh bien, laissez aux gnomes le soin d'inventer une innovation radicale !\n\nLe Sous-marin G-U (abréviation de Gnomes-Underwater, évidemment) est un type spécial de navire qui ne fonctionne pas par voile ou vent. Il est propulsé par la vapeur, l'utilisant pour actionner de grands moteurs à l'arrière du navire qui lui permettent de se déplacer. De plus, il est capable de se submerger grâce à un enchantement soigneux et à la transmutation, servant de vaisseau étanche capable de se déplacer sans être détecté par les navires de surface !\n\nBien que très coûteux à créer et à entretenir, ces navires sont virtuellement indétectables depuis la surface, rendant bien plus facile de s'en prendre aux vaisseaux ennemis sans méfiance."
 artifice_inventions.903.t:0 "Les Gyrocoptères"
 artifice_inventions.903.d:0 "Les récentes avancées technologiques ont créé des opportunités pour des machines dont même nos grands-pères n'auraient pas pu rêver. La puissance de la vapeur a ouvert la voie à un avenir où tout est possible avec les bonnes compétences en ingénierie. Grâce à notre mécénat, les Mécanistes ont conçu une machine au potentiel très intéressant : un dispositif qu'ils nomment le Gyrocoptère.\n\nLe concepteur principal du produit tire son inspiration du moment où il a vu une harpie nicher dans un nid montagneux, après quoi, de retour chez lui, il s'est immédiatement mis à reproduire un tel processus. Cependant, il n'a pas créé une machine volante à ailes. Il a créé quelque chose de mieux.\n\nLe Gyrocoptère utilise une combinaison de vapeur et d'énergie magique pour alimenter un rotor qui tourne à des vitesses extrêmes, permettant à l'opérateur d'atteindre le vol, où il peut diriger la machine en se penchant dans une direction ou une autre et en inclinant le véhicule. Ces machines peuvent être utilisées pour voler à une altitude telle qu'on pourrait traverser l'Échine-du-Serpent et rester en vie. Les usages militaires sont innombrables : du largage de grenades sur les ennemis à la reconnaissance de positions avec une facilité jamais possible auparavant, allant même jusqu'à un redéploiement limité de troupes."
 artifice_inventions.904.t:0 "L'Armure de Guerre en Platine"
 artifice_inventions.904.d:0 "Nous nains avons toujours été reconnus comme d'incroyables combattants malgré notre différence de taille comparée à nos ennemis habituels. Un orque pouvait être abattu en deux coups de hache comme n'importe quel autre, mais seul le second coup le tuait vraiment : un pour le mettre à genoux, un autre pour lui trancher la tête. Le temps perdu à devoir frapper deux fois nous préoccupait autant que nos ancêtres, qui ont lancé plusieurs expériences avec des dispositifs augmentant la taille afin de leur donner l'avantage au combat. Aucune forteresse n'a réussi mieux que Haraz Orldhûm, qui a pu déployer un certain nombre de ces armures de guerre même pendant la chute d'Aul-Dwarov.\n\nNos artificiers ont travaillé dur pour étudier ces designs et ont pu reproduire les méthodes utilisées pour les fabriquer. De plus, ils ont pu améliorer certaines parties du design et ont réussi à rationaliser les méthodes de production à un point tel que les armures peuvent être rendues bien plus largement disponibles qu'à n'importe quel moment de l'histoire. L'Armure de Guerre en Platine, comme on la surnomme (d'après la généreuse quantité de platine utilisée dans ces designs), est extrêmement durable et dispose d'une paire de haches de bataille extensibles, complétée par une série de fusils à chevrotines qui se déclenchent lors d'un coup de poing. En les utilisant, les nains peuvent avancer droit dans la mêlée, charger les lignes ennemies sans se soucier de leur propre sécurité personnelle et massacrer le lot, indemnes des tirs ou des baïonnettes. Les charges de cavalerie n'auront aucun effet non plus, car toute charge tentée fera simplement basculer le nain comme s'il était un mur de pierre.\n\nLes récits de nos ancêtres sont à nouveau à portée de main, et nous pourrions maintenant revivre les jours où les héros nains massacraient des armées entières !"
 artifice_inventions.905.t:0 "L'Exosquelette de Prédateur"
 artifice_inventions.905.d:0 "Il y a à peine quelques millénaires, nous étions des tigres, errant dans la jungle du Rahen et chassant avec crocs et griffes. Puis, suivant les traces de Harimar, nous sommes devenus des rois-philosophes, poursuivant sagesse et pouvoir ensemble. Grâce à ces puissantes fusions d'horlogerie et d'acier, nos muscles et nos griffes peuvent désormais être complétés par la puissance indomptable des machines, sautant par-dessus les lignes ennemies d'un seul bond, et déchirant même l'armure la plus solide d'un simple mouvement du poignet. Nous pouvons désormais revisiter nos voies les plus anciennes, et les utiliser pour apporter la ruine sur n'importe quel champ de bataille."
 artifice_inventions.906.t:0 "Les Mécas de Ferraille"
 artifice_inventions.906.d:0 "Le Méca de Ferraille. Une armure pilotée de fer de récupération avec une fournaise à charbon chauffée magiquement pour faire tourner le moteur. Seul un gobelin aurait pu concevoir un tel tas de ferraille et le faire fonctionner de manière si fiable.\n\nCe méca permettra à un gobelin entraîné de marcher sans entrave au combat, protégé par l'amalgame grossier de plaques d'acier et d'autres métaux récupérés, et maniant des accessoires de main massifs et interchangeables tels que de grandes lames de scie, des griffes acérées, des marteaux, tout ce que vous pouvez imaginer. Le simple élan d'un de ces engins chargeant les lignes ennemies, flammes jaillissant de l'avant, fumée s'échappant de l'arrière, ricanement joyeux de gobelin résonnant du sommet, suffira à briser n'importe quelle formation."
 artifice_inventions.907.t:0 "Les Engins de Guerre"
 artifice_inventions.907.d:0 "Au Taychend, la mobilité est tout. À quoi bon une armée si elle ne peut pas se déplacer d'un endroit à un autre, en temps voulu et efficace ? Cela n'est qu'amplifié par la nature du Taychend, où une grande partie du terrain est constitué de plaines plates où de nombreuses stratégies militaires non conventionnelles peuvent être appliquées. Les chars se sont avérés populaires par le passé, capables de se déplacer rapidement tout en permettant le combat si nécessaire. Il s'avère que ces chars ne sont tout simplement plus assez rapides.\n\nLes chevaux sont de puissantes créatures, mais ils ont des limitations très mortelles. Ils requièrent, comme toute chose, du repos et ne peuvent se déplacer à pleine vitesse pendant de longues périodes sans tomber raides morts. L'étape suivante est évidente : créer un cheval qui ne se soucie ni du repos ni de la nourriture, ou mieux encore, les retirer entièrement de l'équation. Cela a été accompli avec succès grâce à l'introduction du moteur à vapeur, permettant la création d'une machine qui utilise la Damestear en tandem avec un moteur pour produire de l'énergie par la chaleur.\n\nCela a conduit à la création de chars sans chevaux et même de grands chariots capables de se déplacer à des vitesses extrêmement élevées. En plus de cela, ces « véhicules » ont un autre avantage évident : ils peuvent être personnalisés bien plus qu'un char tiré par des chevaux. Des lunettes d'espionnage montées, une bordée d'armes à feu, une charrue montée à l'avant, un blindage sur tous les côtés, tout cela et plus encore est possible sur ces nouveaux véhicules.\n\nLa troupe ordinaire s'est presque (au figuré) piétinée pour avoir une chance d'utiliser l'un de ces véhicules pour (littéralement) piétiner l'ennemi."
 artifice_inventions.908.t:0 "Les Invocateurs de Vent"
 artifice_inventions.908.d:0 "Dans les plaines, une tempête de sable peut signifier bien des choses. Plus important encore, cependant, elle signifie à un intrus bipède qu'il ferait mieux de fuir, de peur que la horde centaure qui la soulève ne l'attrape. Elle peut aussi étouffer, le sable suffoquant presque quiconque n'a pas le bon sens d'essayer de l'éviter. Tout cela est fort bien, mais il se trouve aussi que ce sont des événements naturels, pas quelque chose que l'on peut créer. Jusqu'à maintenant.\n\nL'artisanat magique n'est guère un rôle de guerrier, mais il s'est avéré utile. Ce nouveau dispositif, nommé l'Invocateur de Vent, est capable de conjurer une tempête de sable quand quelqu'un doté de talent magique l'utilise. Les avantages sont évidents : pour ceux qui cherchent du sable ou de la poussière annonçant l'approche des Centaures, cela peut les distraire et détourner leur attention de la véritable direction de l'attaque. Mieux encore, cela peut aussi étouffer l'ennemi dans le sable, faisant de ceux qui ne peuvent pas se préparer au sable des plaines des cibles faciles."
 artifice_inventions.909.t:0 "Les Tourelles Portables"
 artifice_inventions.909.d:0 "La défense peut être une affaire délicate. Lorsqu'on est chargé suffisamment, par exemple par une horde orque, de nombreux soldats peuvent trouver difficile de rester en place et de défendre comme il se doit, même si cela les servirait mieux que de simplement fuir. Même quand un soldat doit défendre offensivement, dans le cas d'un siège, un manque de vigilance peut considérablement prolonger l'affaire en permettant aux approvisionnements de se faufiler vers les défenseurs.\n\nLes tourelles portables ont été introduites par les Mécanistes pour tenter de soulager ces problèmes. Elles consistent en plusieurs canons contenus dans un cadre métallique, capable de pivoter à 360 degrés. Comme leur nom l'indique, ces tourelles sont très faciles à déplacer : posées sous forme de boîte, et capables de se déplier à la forme correcte. Lorsqu'elles sont guidées par un artificier, ces tourelles peuvent combattre avec la force de plusieurs hommes sans la présence d'aucun."
 artifice_inventions.910.t:0 "Les Balles de Damestear Noire"
 artifice_inventions.910.d:0 "Pendant des siècles, les mages ont été une force quasi inarrêtable sur le champ de bataille. Capables de tuer des milliers de soldats d'un seul sort, et déviant la plupart des attaques non magiques avec les sorts de protection les plus simples. Désormais, la Damestear noire promet de tout changer.\n\nEn infusant les balles avec le minéral antimagique, elles peuvent percer les défenses qu'un mage pourrait tenter de créer. Plus jamais les mages ne resteront invincibles dans la guerre. Plus jamais le peuple ordinaire ne sera soumis aux caprices de la magie. À bas les mages ! À bas l'ancien ordre ! Longue vie au peuple, et longue vie à la puissance de la Damestear noire !"
 artifice_inventions.911.t:0 "Le Chargeur Automatique d'Artillerie"
 artifice_inventions.911.d:0 "Pendant des siècles depuis leur création, le plus grand facteur limitant l'utilisation de l'artillerie a été l'effort requis pour recharger les canons. Leur véritable puissance destructrice a été piégée derrière le poids des boulets de canon (pas une mauvaise chose lors du tir, mais terrible lors du chargement) et le long processus de nettoyage nécessaire pour s'assurer que le canon ne fasse pas long feu.\n\nPlus maintenant ! Les artificiers Mécanistes ont créé un dispositif alimenté par un mélange de vapeur et de magie qui remplace automatiquement le boulet de canon avec une fraction de l'effort requis de la part de l'équipe d'artillerie. Même si le canon devra encore être nettoyé de toute étincelle errante, ce sera bien plus facile à faire quand on n'a pas besoin de dépenser son endurance à charger une grosse boule de fer en plus."
 artifice_inventions.912.t:0 "Les Chars Prototypes"
 artifice_inventions.912.d:0 "L'idée de la cavalerie est peut-être aussi vieille que le temps lui-même. En montant à cheval, cavalier et monture peuvent devenir bien plus forts ensemble qu'ils ne l'étaient séparément. Cette idée, nous ont informés les artificiers, est là où ils ont commencé leur ingénierie : créer quelque chose que quelqu'un pourrait chevaucher et qui accomplirait sa conception mieux qu'un cheval ne le pourrait. Même ainsi, leur dernière découverte majeure n'est que vaguement liée à leur principe de départ et a même été créée par accident.\n\nL'énergie magique au sein de la Damestear peut être redirigée hors du matériau de nombreuses façons. Un artificier a fait une découverte accidentelle : comment rediriger l'énergie interne sous forme de chaleur. Cette chaleur, correctement dirigée, est capable de reproduire les conditions d'un moteur à vapeur avec une fraction de la taille et de l'effort. Avec cette taille réduite, il est plausible de l'utiliser comme source d'énergie pour des machines incroyablement complexes.\n\nAvec cette source d'énergie petite et très efficace, nos artificiers ont collaboré pour concevoir un véhicule qui, grâce à sa source d'énergie, peut se permettre d'être bien plus grand et plus lourd que la plupart des véhicules avant lui.\n\nC'est, en effet, une grande boîte de métal : alimentée par la Damestear, elle peut déplacer son grand poids et même arborer un canon, qu'un artilleur désigné peut opérer et tirer depuis une position protégée pivotant librement. Des propulseurs étincelle, des répéteurs et même des canons normaux peuvent également être tirés depuis le sommet de la machine de guerre, qui en a un monté à côté d'une trappe utilisée pour accéder à l'intérieur du dispositif. On peut également se tenir avec le corps partiellement hors de la machine pour tirer des armes légères sur les ennemis quand le canon principal est incapable de tirer. Grâce à son corps métallique, il peut dévier une grande partie des tirs de mousquet standard, lui permettant de fonctionner avec moins de prudence qu'il ne serait autrement requis."
 artifice_inventions.913.t:0 "Les Galions Célestes Militaires"
 artifice_inventions.913.d:0 "Bien que les guerres puissent être menées sur terre et sur mer, cela ne signifie pas que ce sont les seuls endroits où elles peuvent être livrées. Avec les récentes avancées technologiques, même le ciel lui-même pourrait accueillir les combats du futur. Être capable de voler nous accordera un avantage sans pareil sur les forces ennemies : comment surpasse-t-on un ennemi qui plane au-dessus de vous, et encore moins comment défendre ses possessions ?\n\nLa principale complication pour cette idée a été, bien sûr, le poids. Bien que nos artificiers aient pu préparer de nombreux designs fantastiques, très peu d'entre eux ont dépassé la phase de planification en raison des contraintes de leur poids ; sans une budgétisation soigneuse du poids, il serait incapable de décoller du sol. Même la magie ne peut que partiellement résoudre ce problème, car après un certain point, la consommation de Damestear devient si sévère qu'elle ne vaut tout simplement pas la peine d'être envisagée.\n\nEn utilisant plutôt la Damestear pour amplifier la magie d'Évocation, le design, en forme de vaisseau de ligne, est capable de reproduire les effets d'un ballon à air chaud dans un espace clos, créant des « poches » d'air qui permettent au navire de flotter lorsqu'elles sont montées le long des flancs. Celles-ci, combinées à une série d'hélices à vapeur et plusieurs grands ballons qui ressemblent davantage à des montgolfières, permettent au navire de transporter une quantité considérable de poids sans couler, et lui permettent de perdre plusieurs sources de portance sans commencer à descendre.\n\nCes navires, une fois équipés, sont capables de transporter une batterie de canons et les fournitures nécessaires pour les tirer. Les applications militaires sont évidentes : ces canons volants peuvent faire pleuvoir le feu sur un ennemi tout en s'avérant très difficiles à atteindre en retour."
 artifice_inventions.914.t:0 "La Culture Alimentaire Génétique"
 artifice_inventions.914.d:0 "Dire que la Culture Alimentaire Génétique serait la plus grande innovation agricole depuis le concept même de l'agriculture ne ferait peut-être que commencer à expliquer l'importance de cette innovation. Grâce au pouvoir de la biologie moderne et à la sagesse de la philosophie du Mécanisme, une méthode a été découverte permettant aux artificiers de modifier les propriétés fondamentales des espèces végétales. Des cultures résistantes à la sécheresse ou aux inondations, capables de produire des récoltes exceptionnelles à chaque fois, et d'un goût encore plus délicieux ne sont plus restreintes aux fantasmes des fermiers."

 #new
 artifice_inventions.1100.t:0 "Le Réparateur de Marché Victor.I.A.3"
 artifice_inventions.1100.d:0 "À l'échelle individuelle, l'économie est compliquée ; à l'échelle sociétale, c'est un cauchemar. Suivre chaque produit fabriqué, chaque personne imposée, chaque importation enregistrée, et chaque valeur fluctuante... cela peut être carrément impossible sans les bons instruments. Heureusement, cependant, nous avons maintenant conçu de tels instruments.\n\nLe Réparateur de Marché Victor.I.A.3 est une merveille de calcul. On peut lui fournir des volumes entiers de données, et il les tabulera en petites colonnes et rangées soignées. Il peut trier par moyennes, prédire les conditions futures du marché, et produire de magnifiques graphiques qui visualisent les fondamentaux de notre économie nationale. L'économie, avons-nous réalisé, est faite de mathématiques, et le Réparateur de Marché Victor.I.A.3 nous permet de comprendre ces mathématiques. Quelle invention pourrait inspirer plus d'émerveillement qu'une qui nous donne un aperçu des schémas inhérents à notre monde ?"
 artifice_inventions.1101.t:0 "Le Complexe-Capital de Batteries Arcaniques"
 artifice_inventions.1101.d:0 "La Damestear est une substance dangereuse, capable de manipuler à la fois l'inanimé et le vivant. Elle peut réagir à presque n'importe quel matériau, le contorsionnant en formes nouvelles et dangereuses ; elle peut muter les personnes exposées non seulement dans leurs corps, mais aussi leurs esprits et leurs âmes. Si nous distribuions simplement de la Damestear à travers notre capitale, nous pourrions certainement alimenter nos propulseurs étincelle, émetteurs-récepteurs à ondes-T, bras exo, traducteurs automatisés, et plus encore... mais seulement à un coût entièrement imprévisible. Et pourtant, pour poursuivre nos progrès dans le domaine des sciences magiques, c'est exactement ce que nous devons faire.\n\nHeureusement, nous avons inventé un moyen plus sûr d'alimenter nos artisanats magiques : le Complexe-Capital de Batteries Arcaniques. Pour le créer, nous induisons d'abord un champ thaumique capable d'activer les magies instables. Deuxièmement, nous enfermons ce champ dans de la porcelaine stabilisant la magie. Troisièmement, nous faisons passer de la Damestear à travers le champ. (ASSUREZ-VOUS QUE LES LIMITES DE PORCELAINE SONT ENTIÈREMENT STABILISÉES AVANT L'ÉTAPE TROIS !) Cela permet aux magies morphiques de la Damestear de s'épuiser dans un contexte sûr et contenu, la rendant sous une forme plus sûre et plus malléable. Quatrièmement, nous récupérons la Damestear, l'emballons dans des boîtiers de porcelaine (juste pour être sûrs), et l'exportons à travers la capitale !\n\nCe Complexe-Capital est incroyablement coûteux à exploiter, mais il nous fournit la Damestear stabilisée qui peut changer notre artisanat magique pour toujours. Avec la capacité d'étendre nos capacités d'artisanat magique tout en nous protégeant, l'avenir semble plus radieux que jamais !"
 artifice_inventions.1102.t:0 "Le Téléporteur vers le Plan d'Eau"
 artifice_inventions.1102.d:0 "Les voyages maritimes, surtout au-delà des tempêtes d'Insyaa ou des monstruosités occultes d'Aelantir, peuvent souvent prendre des mois ou des années. Maintenant, cependant, nous avons découvert quelque chose qui pourrait l'accélérer : simplement accéder à différents océans. Plus précisément, ceux du Plan d'Eau !\n\nLes Téléporteurs vers le Plan d'Eau, d'abord inventés par la Compagnie Commerciale Deranne (dans la Mer Ruinée, où les frontières entre les plans sont faibles), se sont avérés être une révolution dans le commerce et la navigation. Le Plan d'Eau correspond à notre plan matériel, mais avec des distances plus denses : donc si l'un de nos navires se téléporte vers ce plan, navigue un mille, puis revient dans notre plan, ils auront parcouru au moins deux fois plus loin ! De plus, la paix et la cohérence relatives du Plan d'Eau rendent cela facile à accomplir. Nous devons, bien sûr, calculer nos routes minutieusement à l'avance, et devons espérer que nos portails ne nous placent pas accidentellement à l'intérieur d'un autre navire, devant un iceberg, ou sur un cottage en bord de mer... mais ce sont tous de petits risques à supporter. Avec le Téléporteur vers le Plan d'Eau, nous n'avons pas à nous soucier des démons, ni des fées, ni des monstres d'outre-monde : seulement des élémentaires d'eau occasionnels, qui sont plutôt amicaux tant que nous n'essayons pas de pêcher pendant que nous y sommes. Au total, les mers sont nôtres à naviguer, et le commerce intercontinental n'a jamais été aussi facile !"
 artifice_inventions.1103.t:0 "Les Subterrènes"
 artifice_inventions.1103.d:0 "Imaginez, si vous le voulez bien, une foreuse. Imaginez-la creusant un tunnel. Maintenant, imaginez-la creusant plus profond que cela. Non, quatre fois cette profondeur. Cinq fois cette profondeur. Vingt fois cette profondeur !\n\nLe Subterrène est une merveille d'ingénierie, capable de creuser plus vite, mieux, et avec plus de stabilité que toute foreuse avant lui. Ces machines pilotées percent même le socle rocheux le plus profond, et placent des supports derrière elles pendant qu'elles creusent. Cela permet l'excavation de tunnels de qualité forteresse en une fraction du temps.\n\nAvec les Subterrènes, nous pouvons construire des complexes pour les trains sous nos cités ! Nous pouvons créer des bâtiments qui ne voient jamais le ciel ! Nous pouvons prendre chaque parcelle de terre que nous possédons et lui faire contenir quatre fois les bâtiments qu'elle contient actuellement ! Que ne peut-on accomplir avec un Subterrène ?!?"
 artifice_inventions.1104.t:0 "Les Transmetteurs Pensée-Pensée"
 artifice_inventions.1104.d:0 "Avez-vous déjà eu une pensée que vous ne pouviez pas tout à fait communiquer ? Vous êtes-vous déjà souvenu de l'air d'une chanson que vous ne pouviez pas exprimer, ou avez-vous eu un mot sur le bout de la langue mais n'avez pas pu le sortir ? Avez-vous déjà souhaité pouvoir échapper au labyrinthe de la communication, et simplement projeter vos pensées directement dans l'esprit des autres ? Non ? Eh bien, maintenant vous le pouvez !\n\nLe Transmetteur Pensée-Pensée a commencé un peu comme le Traducteur Automatisé, qui utilise le sort de Langues pour permettre la communication entre toutes les langues. Peu importe la qualité d'une traduction, cependant, de l'information est toujours perdue. Certaines langues ont des mots et des concepts que d'autres n'ont pas ; les différences de grammaire causent souvent des « bugs » dans les magies du sort ; les tournures de phrase ou métaphores sont maladroitement traduites à travers à la fois la langue et le contexte culturel. Dans l'ensemble, le Traducteur Automatisé a révolutionné le monde, mais il n'a pas rendu la communication parfaite.\n\nPour y remédier, les inventeurs du Transmetteur Pensée-Pensée sont allés plus loin. Avec lui, nous n'avons plus besoin de nous appuyer sur les « mots » du tout ! Au lieu de cela, le Transmetteur est connecté à l'esprit, au corps et à l'âme, et, en utilisant les voies télépathiques développées par l'Émetteur-Récepteur à Ondes-T, envoie directement des informations brutes aux autres personnes. Des idées entières, des concepts, des scènes et des souvenirs peuvent être envoyés, avec des détails vivants impliquant tous les sens. Désormais, des amis peuvent revivre les perspectives de l'autre sur le même événement ! Des amoureux peuvent se remémorer les temps passés ! Des ennemis peuvent véritablement expérimenter la rage rouge vif que leur adversaire ressent pour eux ! Toute communication est devenue plus simple et plus directe, car nous ne sommes plus limités par les mots !"
 artifice_inventions.1105.t:0 "Le Détecteur de Miracles 3000"
 artifice_inventions.1105.d:0 "Les peuples de Halann débattent souvent du divin. Il y a des questions d'existence (Le Panthéon Cannorien est-il réel ? Dagrin Barbe-Éternelle est-il un ancêtre ou un dieu ?), mais aussi celles de pouvoir (Un Khet peut-il tuer un Archifée ? Quelle religion a les paladins les plus forts ?) ou de moralité (Devrions-nous suivre les Grands Esprits ? Devrions-nous vendre nos âmes à la Cour Infernale ?). Ces questions ont semblé insolubles, et, pendant des siècles, philosophes et théologiens les ont débattues : mais ils n'ont plus à le faire. Avec le pouvoir de la science, nous avons à nous seuls répondu aux questions du divin !\n\nAvec notre nouveau Détecteur de Miracles 3000, la divinité a été résolue. Cette invention a calculé que notre(nos) dieu(x) sont non seulement réels, mais sont également les plus divins, les plus puissants, et les plus moraux à suivre. Nous soutenons ces conclusions avec des faits objectifs, bien sûr : le Créateur de Miracles a des sorties pour « divinité », « pouvoir » et « moralité », et tous ces facteurs sont les plus élevés pour notre religion particulière. La vraie foi est simplement celle avec la somme combinée la plus élevée de Points-Dieu, et cette religion est la nôtre ! Comment quiconque pourrait-il être en désaccord avec nos théologies, quand l'artisanat magique lui-même a confirmé que nous avons raison ?\n\nQue voulez-vous dire, « comment fonctionnent nos calculs » ? Je viens de vous le dire : le Créateur de Miracles 3000 calcule la divinité, le pouvoir et la moralité. Ne demandez pas comment nous calculons ces choses ; c'est pour les scientifiques de savoir, pas vous. Vous comprendriez, peut-être, si vous suiviez la vraie foi. Peut-être que si vous vous convertissiez, vous pourriez aussi comprendre..."
 artifice_inventions.1106.t:0 "Le Moteur d'Empire"
 artifice_inventions.1106.d:0 "Nous avons fabriqué un moteur qui fonctionne au Pouvoir. Ce n'est pas un moteur qui est « alimenté », il n'y a ni charbon, ni Damestear, qui lui permet de fonctionner, mais plutôt il est alimenté par le Pouvoir lui-même. En utilisant des sorts de Souhait du Bulwar, des reliques féériques des Bois-Profonds et d'Éordande, et des écritures runiques des nains et des géants, nous avons cristallisé le concept de Pouvoir sous forme physique. Notre Moteur d'Empire, assemblé en pièces à travers notre nation, est essentiellement un sort rituel grandiose sans précédent : il nous imprègne, nous, notre peuple, notre gouvernement et nos armées de Pouvoir, chaque jour de chaque année. Cela nous donne métaphysiquement la capacité de façonner le monde comme nous le souhaitons.\n\nOu, du moins, nous pensons l'avoir fait. Il est difficile de faire un test objectif pour savoir si nous avons invoqué le Pouvoir pour nous-mêmes. Il semble bien que nous l'ayons fait, cependant, n'est-ce pas ? Ne vous sentez-vous pas plus puissant ?"
 artifice_inventions.1107.t:0 "Le Mégacanon à Réacteur de Damestear"
 artifice_inventions.1107.d:0 "Contrairement au Propulseur Étincelle, qui utilise la Damestear comme catalyseur pour activer les énergies élémentaires, le Mégacanon canalise le mana dormant de la Damestear elle-même en un rayon d'une puissance incroyable. Une telle déflagration causerait normalement une explosion qui anéantirait toutes les troupes à proximité (les nôtres incluses), nous avons donc construit un boîtier de porcelaine isolant la magie autour du canon du Mégacanon. La porcelaine seule ne peut contenir cette arme, cependant ; elle peut être capable de dévier les composants magiques de chaque explosion, mais l'énergie cinétique briserait la porcelaine s'il n'y avait pas d'autre blindage. Par conséquent, le canon a été entouré de mithril léger, le seul matériau capable de contenir ce niveau de puissance de feu tout en restant mobile et utilisable. Enfin, tout le canon a été enchanté pour un meilleur contrôle du recul, une plus grande puissance de feu et une meilleure mobilité.\n\nAvec l'expertise de nos artificiers, ingénieurs, forgerons et artilleurs, nous avons transformé le mana lui-même en une arme de destruction massive. Nous n'avons pu construire qu'un seul Mégacanon à Réacteur de Damestear, mais nous n'avons pas besoin de plus d'un. Comment nos ennemis pourraient-ils possiblement nous affronter, quand nous pouvons les cibler avec quelque chose comme ça."
 artifice_inventions.1108.t:0 "Le Bureaucratiseur"
 artifice_inventions.1108.d:0 "« L'État fonctionne mieux comme une machine, méticuleusement ajustée et taillée », dit le vieil adage Penseur. Nous avons créé la machine qui fait la taille.\n\nLe Bureaucratiseur est une invention à laquelle nous avons permis de diriger notre gouvernance. Pour l'utiliser, nous alimentons des rapports de progression, des évaluations de travail, des scores de tests standardisés, et plus encore dans une boîte noire que peu comprennent. Derrière cette boîte se trouve un unique bureaucrate dont l'esprit a été temporairement vidé, de sorte qu'il ne détient plus de loyauté envers aucun dirigeant, parti politique, état, faction ou groupe d'intérêt. Avec clarté d'esprit, le Bureaucratiseur aide le bureaucrate impartial à choisir qui occupera les divers postes, et qui dirigera l'une de nos nombreuses subdivisions administratives. Avec seulement des critères objectifs à examiner, il n'y a aucune possibilité que le bureaucrate soit infecté par les émotions ou la loyauté personnelle !\n\nCertes, les souvenirs du bureaucrate ne reviennent pas toujours parfaitement après l'utilisation de la machine ; et, aussi certainement, nous avons déjà rencontré des problèmes avec des rapports falsifiés, des déclarations d'évaluation biaisées, ou d'autres incidents qui ont encore conduit à l'entrée de biais dans les rouages du Bureaucratiseur. Ces problèmes, cependant, peuvent être traités. Nous avons simplement besoin de les corriger, et nous aurons une invention parfaite qui résoudra les problèmes de gouvernance de manière permanente ! Nous vaincrons la subjectivité, et nous le ferons avec un cabinet gouvernemental que le Bureaucratiseur choisit pour nous !"
 artifice_inventions.1109.t:0 "Le Réseau Runique Mental"
 artifice_inventions.1109.d:0 "Le Réseau Runique Mental, d'abord innové par la grande ancienne forteresse de Verkal Ozovar, est une culmination moderne des magies d'enchantement. Nous avons installé des tours runiques finement ouvragées à travers notre nation, chacune gravée de runes de slogans patriotiques, d'hymnes nationalistes, d'histoires de nos dirigeants passés, et de poèmes de notre langue maternelle. Ces runes sont chacune connectées à l'inconscient spirituel de $COUNTRY$, et capturent ce que signifie véritablement faire partie de notre citoyenneté. En utilisant la magie spirituelle récoltée à Haless, nous activons les tours ; en les gardant actives, les runes des tours s'impriment dans les esprits de nos sujets. Notre culture partagée devient incontournable, et, avant longtemps, chaque citoyen de $COUNTRY$ ne peut s'empêcher de parler notre langue et de connaître nos histoires. Sans avoir à fournir le moindre effort, ils sont intégrés de manière transparente dans notre société !"
 artifice_inventions.1110.t:0 "Le Nexus de Négociation"
 artifice_inventions.1110.d:0 "Le Nexus de Négociation, d'abord imaginé dans le classique littéraire « Veuillez Créer le Nexus de Négociation », était envisagé comme une machine capable de déduire tout ce qu'une personne désire en écoutant son discours. Elle pourrait quantifier ces désirs, puis les comparer à ceux d'autres personnes. Ce faisant, elle résoudrait tous les conflits, tous les débats et tous les désaccords ; tous pourraient être mis d'accord quand le Nexus de Négociation déterminerait la meilleure marche à suivre. Par les chiffres, théorisait-on, tous les conflits pourraient être résolus !\n\nEn réalité, le Nexus de Négociation que nous avons créé fonctionne... légèrement différemment. Il s'avère que le langage est imprécis, donc notre Nexus fait un peu de lecture de pensée en plus de l'analyse de la parole. De plus, puisqu'il est difficile de quantifier les désirs, il doit y avoir un élément personnel. À ce titre, nous avons redirigé les sorties du Nexus vers nos diplomates et avocats. Bien sûr, puisqu'il serait injuste pour les intérêts de notre nation de laisser nos ennemis avoir accès à nos esprits, nous ne laissons que nos officiels voir les sorties du Nexus.\n\nDans l'ensemble, cependant, nous sommes certainement restés fidèles à la vision originale du Nexus de Négociation. En nous donnant tous les avantages possibles en diplomatie, tous les conflits peuvent être résolus !"
