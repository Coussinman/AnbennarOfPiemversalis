 artificers_over_artifice_capacity:0 "Dépassement de la Capacité Maximale d'Artisanat Magique"
 artifice_research_privilege:0 "Recherche d'Inventions"
 artifice_research_privilege_desc:0 "Les artificiers sont capables de découvrir des inventions merveilleuses que l'État peut exploiter. Il nous suffit de leur donner une impulsion."
 artifice_directed_research:0 "Recherche Dirigée"
 artifice_directed_research_desc:0 "Avec les artificiers sous contrôle de l'État, nous pouvons orienter leurs recherches vers des inventions aux spécifications exactes."
