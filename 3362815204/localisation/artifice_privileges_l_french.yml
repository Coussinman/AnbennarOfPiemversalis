l_french:

 # Privileges
 artifice_invention_research_privilege:0 "Recherche d'Inventions"
 artifice_invention_research_privilege_desc:0 "Les artificiers sont capables de découvrir des inventions merveilleuses que l'État peut exploiter à son avantage. Il nous suffit de leur donner une légère impulsion pour qu'ils se mettent à l'œuvre."
 artifice_invention_directed_research:0 "Recherche Dirigée"
 artifice_invention_directed_research_desc:0 "Désormais que les artificiers sont placés sous le contrôle de l'État, nous pouvons orienter leurs travaux vers des inventions répondant à des spécifications précises et adaptées à nos besoins."
 artifice_invention_portable_turrets:0 "Tourelles Portatives"
 artifice_invention_portable_turrets_desc:0 "Ces tourelles peuvent tenir leur position et poursuivre le combat là où un homme aurait pris la fuite. Elles sont capables de renforcer notre ligne de front et d'empêcher tout ravitaillement extérieur lors d'un siège."
 artifice_invention_sparkdrive_rifles:0 "Fusils Fulgurateurs"
 artifice_invention_sparkdrive_rifles_desc:0 "Les fusils fulgurateurs sont capables de projeter des éclairs sur leurs ennemis. Leur rareté empêche leur distribution aux troupes de ligne, à leur grande déception, mais ils sont confiés à des tireurs d'élite artificiers."
 artifice_invention_artificer_exo_arms:0 "Exo-Bras d'Artificier"
 artifice_invention_artificer_exo_arms_desc:0 "Des membres mécaniques alimentés par des mécanismes d'horlogerie et contrôlés par une interface de magie divinatoire reliée à l'esprit de l'utilisateur."
 artifice_invention_viewcatcher:0 "Capteur d'Images"
 artifice_invention_viewcatcher_desc:0 "Une machine portative capable de capturer des images pour impression en un seul instant, les préservant ainsi pour l'éternité."
 artifice_invention_vendorless_stall:0 "Étal Automatique"
 artifice_invention_vendorless_stall_desc:0 "En facilitant la propagation des étals automatiques, nous pouvons améliorer nos revenus en permettant aux gens de conclure davantage de transactions dans le même laps de temps."
 artifice_invention_sending_stones:0 "Pierres de Communication"
 artifice_invention_sending_stones_desc:0 "Ces pierres magiques, créées par l'artisanat magique, facilitent la transmission instantanée de communications sur de très longues distances."
 artifice_invention_vorpal_bullets:0 "Balles Vorpales"
 artifice_invention_vorpal_bullets_desc:0 "La balle vorpale utilise une forme effilée et des enchantements précis pour améliorer sa vitesse et sa capacité à percer les armures, augmentant ainsi la puissance de feu de nos armées."
 artifice_invention_war_golems:0 "Golems de Guerre"
 artifice_invention_war_golems_desc:0 "Des golems de pierre animés par la magie peuvent servir de force de choc efficace grâce à leur construction extrêmement résistante."
 artifice_invention_black_damestear_bullets:0 "Balles de Damestear Noire"
 artifice_invention_black_damestear_bullets_desc:0 "Fidèles à la brutalité caractéristique de l'École de la Machinerie, les balles de Damestear noire sont une invention simple mais dévastatrice. Ces balles ordinaires dotées d'un cœur de Damestear noire sont capables de percer la plupart des défenses magiques et de drainer le pouvoir des mages qu'elles atteignent."
 artifice_invention_brass_prosthesis:0 "Prothèses de Laiton"
 artifice_invention_brass_prosthesis_desc:0 "Fabriqués en laiton, ces bras et jambes mécaniques se greffent à l'emplacement d'un membre perdu. Bien qu'ils ne soient pas aussi réactifs que le membre original, ils permettent néanmoins des mouvements relativement fluides et sont assurément bien plus résistants."
 artifice_invention_crierless_crier_device:0 "Appareil de Crieur Automatique"
 artifice_invention_crierless_crier_device_desc:0 "De grandes machines portatives capables d'enregistrer et de reproduire artificiellement des sons, destinées à être diffusées dans les espaces publics."
 artifice_invention_spell_in_a_box:0 "Sort-en-Boîte"
 artifice_invention_spell_in_a_box_desc:0 "Des sorts pré-lancés et conservés sur de longues périodes, contenus dans des parchemins eux-mêmes rangés dans des réceptacles spécialisés."
 artifice_invention_t_wave_transceivers:0 "Émetteurs-Récepteurs à Ondes-T"
 artifice_invention_t_wave_transceivers_desc:0 "Les émetteurs-récepteurs à ondes-T permettent à tout soldat ou commandant équipé du dispositif de communiquer avec quiconque est relié à la même onde télépathique, permettant de coordonner les manœuvres militaires et même des campagnes entières comme jamais auparavant !"
 artifice_invention_living_mirrors:0 "Miroirs Vivants"
 artifice_invention_living_mirrors_desc:0 "Exercer une influence sur le commerce des miroirs vivants nous permettra de diffuser aisément de la propagande, tout en offrant une distraction efficace aux éventuels mécontents."
 artifice_invention_remedial_tinctures:0 "Teintures Curatives"
 artifice_invention_remedial_tinctures_desc:0 "Ces trousses contiennent des potions uniques, des garrots auto-serrants et tout le nécessaire pour arracher un soldat aux portes de Nerat et le renvoyer au combat en quelques heures à peine."
 artifice_invention_wandlocks:0 "Baguettefeux"
 artifice_invention_wandlocks_desc:0 "En remplaçant la cartouche de papier traditionnelle d'un fusil par un parchemin de sort spécialisé, des sorts simples peuvent désormais être lancés depuis le canon de l'arme, des projectiles magiques aux boules de feu, jusqu'aux soldats se tirant dessus eux-mêmes pour s'appliquer des sorts de protection !"
 artifice_invention_artillery_autoloader:0 "Chargeur Automatique d'Artillerie"
 artifice_invention_artillery_autoloader_desc:0 "Une machine qui recharge automatiquement un canon avec une intervention minimale de l'utilisateur. Cela réduit drastiquement les temps de rechargement, améliorant ainsi la puissance de feu de notre artillerie."
 artifice_invention_elemental_locomotives:0 "Locomotives Fulguratoires"
 artifice_invention_elemental_locomotives_desc:0 "Ce véhicule d'une rapidité stupéfiante peut accroître notre contrôle gouvernemental et améliorer nos capacités militaires grâce à sa faculté de déplacer personnes, marchandises et informations à des vitesses auparavant réservées aux rêves et aux délires."
 artifice_invention_pathway_transmutation:0 "Transmutation par Voies"
 artifice_invention_pathway_transmutation_desc:0 "Une innovation révolutionnaire dans le domaine de la transmutation. En analysant les « voies » magochimiques entre les objets, autrement dit en identifiant les signatures magiques les plus proches les unes des autres, nous pouvons transmuter de vastes quantités d'une substance en une autre. Les applications potentielles sont infinies."
 artifice_invention_commercial_sky_galleons:0 "Galions Célestes Commerciaux"
 artifice_invention_commercial_sky_galleons_desc:0 "De puissants zeppelins propulsés par la force de la vapeur et du gaz, ouvrant les cieux à tous et révolutionnant le commerce par la même occasion."
 artifice_invention_bioartificed_ascension:0 "Ascension Bio-Artificée"
 artifice_invention_bioartificed_ascension_desc:0 "La transmutation biologique de nos soldats en formes d'une puissance terrifiante. Les formes permanentes de dragons, de géants et bien d'autres sont désormais accessibles, sans même mentionner les possibilités plus simples : rendre la peau des soldats plus résistante, leurs muscles plus imposants et leurs corps plus aptes à résister à la douleur et au choc."
 artifice_invention_prototype_tanks:0 "Chars Prototypes"
 artifice_invention_prototype_tanks_desc:0 "De grandes machines de guerre métalliques peuvent remplacer de petits effectifs de cavalerie, améliorant notre puissance de feu de plusieurs ordres de grandeur."
 artifice_invention_personal_mageshields:0 "Boucliers Magiques Individuels"
 artifice_invention_personal_mageshields_desc:0 "Nous pouvons désormais projeter de manière stable des boucliers magiques pour protéger l'individu, permettant à nos artificiers de guerre d'ignorer les projectiles standards et les coups mortels."
 artifice_invention_military_sky_galleons:0 "Galions Célestes Militaires"
 artifice_invention_military_sky_galleons_desc:0 "Ces nouveaux vaisseaux volants sont capables de transformer radicalement la guerre telle que nous la connaissons, tirant depuis leurs positions élevées avec une efficacité redoutable."
 artifice_invention_apparitional_communicator:0 "Communicateur Apparitionnel"
 artifice_invention_apparitional_communicator_desc:0 "En parrainant une variante de l'émetteur à ondes-T qui transmet également des images en plus du son, nous pouvons améliorer notre prestige aux yeux du monde."
 artifice_invention_growth_beans:0 "Haricots de Croissance"
 artifice_invention_growth_beans_desc:0 "Les haricots de croissance agissent comme un engrais de très haute qualité, augmentant considérablement le volume des récoltes que nous pouvons taxer."
 artifice_invention_growth_beans_tt:0 "Chaque province possédée produisant des marchandises cultivables (céréales, cacao, sucre, vin, tabac, épices, encens, thé, café, champignons, fleur-serpent, coton, clous de girofle) obtient le bonus suivant :"
 artifice_invention_magic_missile_deployer:0 "Déployeur de Projectiles Magiques"
 artifice_invention_magic_missile_deployer_desc:0 "Ces canons d'artillerie légère, bien que complexes, peuvent tirer des centaines de projectiles magiques non guidés en quelques secondes, empêchant nos ennemis d'engager le combat rapproché."
 artifice_invention_arithmatons:0 "Arithmatons"
 artifice_invention_arithmatons_desc:0 "Les arithmatons peuvent effectuer des calculs bien plus rapidement et avec bien plus de précision que la plupart des hommes, simplifiant remarquablement de nombreux domaines nécessitant de lourdes mathématiques."
 artifice_invention_arcane_blaster:0 "Canon Arcanique"
 artifice_invention_arcane_blaster_desc:0 "Les canons arcaniques canalisent la puissance magique à travers un châssis d'acier en un trait concentré, offrant à nos artificiers de guerre une arme nouvelle et redoutable."
 artifice_invention_naval_mageshields:0 "Boucliers Magiques Navals"
 artifice_invention_naval_mageshields_desc:0 "Un revêtement imprégné de magie d'abjuration permet de projeter un bouclier magique le long de tout navire, de la proue à la poupe."
 artifice_invention_balloonboost_packs:0 "Propulseurs à Ballon"
 artifice_invention_balloonboost_packs_desc:0 "L'utilisation de propulseurs à ballon pour la reconnaissance permettra à nos chefs militaires de répondre aux mouvements ennemis bien plus efficacement qu'auparavant."
 artifice_invention_self_cleaning_parchment:0 "Parchemin Auto-Nettoyant"
 artifice_invention_self_cleaning_parchment_desc:0 "La capacité à corriger rapidement et facilement les erreurs de transcription dans les documents officiels rend les fonctions quotidiennes de l'État infiniment moins complexes."
 artifice_invention_gene_food_cultivation:0 "Culture Alimentaire Génétique"
 artifice_invention_gene_food_cultivation_desc:0 "Une méthode permettant aux artificiers de modifier les propriétés fondamentales des espèces végétales : résistance à la sécheresse ou aux inondations, et capacité à produire des récoltes exceptionnelles à chaque saison."
 artifice_invention_box_of_holding:0 "Coffre de Contenance"
 artifice_invention_box_of_holding_desc:0 "Des coffres robustes imprégnés de la magie des sacs sans fond traditionnels rendront l'expédition de marchandises sur de vastes distances d'une facilité déconcertante."
 artifice_invention_mystic_ciphers:0 "Chiffres Mystiques"
 artifice_invention_mystic_ciphers_desc:0 "De tout nouveaux chiffres magiques nous permettent d'élever notre secret à des niveaux inédits, rendant plus difficile que jamais l'identification de nos espions à l'étranger ou la découverte de secrets d'État."
 artifice_invention_wind_invokers:0 "Invocateurs de Vents"
 artifice_invention_wind_invokers_desc:0 "L'invocateur de vents peut conjurer des tempêtes de sable en un instant, masquant notre approche tout en affaiblissant l'ennemi."
 artifice_invention_chi_cultivation:0 "Charmes d'Extraction de Chi"
 artifice_invention_chi_cultivation_desc:0 "Un petit coffret doté d'un réseau complexe d'acier et de jade permet à nos régiments d'artificiers de drainer le chi de prisonniers et de « volontaires », puis de le libérer au combat."
 artifice_invention_great_processor:0 "Grand Broyeur"
 artifice_invention_great_processor_desc:0 "Un récipient métallique contenant des lames à rotation rapide, capable de transformer n'importe quel ingrédient en une délicieuse pâte comestible."
 artifice_invention_fey_spray:0 "Répulsif à Fées"
 artifice_invention_fey_spray_desc:0 "La capacité à éloigner les fées sans leur nuire est très prisée de ceux qui sont las de leurs espiègleries, et ce répulsif n'offense pas indûment ces êtres mystiques."
 artifice_invention_god_fragment_decoder:0 "Décodeur de Fragment Divin"
 artifice_invention_god_fragment_decoder_desc:0 "Un engin d'acier précurseur, de coquillages et de Damestear traduit rapidement les fréquences émises par le Fragment Divin en une variante d'elfique précurseur, nous permettant de comprendre les enseignements du Dieu Unique plus rapidement que jamais."
 artifice_invention_talking_god_temples:0 "Temples des Dieux Parlants"
 artifice_invention_talking_god_temples_desc:0 "Nos artificiers peuvent transformer les empreintes psychiques et les dépouilles momifiées de nos dieux en projections de leurs vraies voix et de leurs vrais corps, rendant l'évidence de leurs enseignements manifeste à quiconque en est témoin."
 artifice_invention_think_quik_drink_mix:0 "Mélange PenseVite"
 artifice_invention_think_quik_drink_mix_desc:0 "Parrainer l'utilisation du PenseVite améliorera notre administration, car un bureaucrate mieux nourri sera bien mieux équipé mentalement pour ses fonctions."
 artifice_invention_ancestral_golems:0 "Golems Gardiens Ancestraux"
 artifice_invention_ancestral_golems_desc:0 "Des statues vivantes dont la présence et l'apparence poussent les nains à combattre avec bien plus de férocité et d'ardeur, et qui sont elles-mêmes capables d'un combat basique pour défendre une zone donnée."
 artifice_invention_artifice_hunting_masks:0 "Masques de Chasse Enchantés"
 artifice_invention_artifice_hunting_masks_desc:0 "Enchanter les masques mineurs remportés dans nos arènes de lutte, puis conscrir leurs porteurs, confère à nos régiments d'artificiers la force et la discipline nécessaires pour conquérir les jungles et repousser les colonisateurs vers la mer."
 artifice_invention_antimagic_field_generator:0 "Générateur de Champ Antimagie"
 artifice_invention_antimagic_field_generator_desc:0 "Des dispositifs spéciaux amplifient les effets de la Damestear noire pour projeter un « champ » qui affaiblit ou annule la magie."
 artifice_invention_avatar_supersoldier_serum:0 "Sérum de Supersoldat Avatar"
 artifice_invention_avatar_supersoldier_serum_desc:0 "Le sérum de supersoldat Avatar, bien que généralement fatal à ses utilisateurs, confère à ceux qui y survivent des capacités comme une force et une agilité surnaturelles à déployer contre nos ennemis."
 artifice_invention_demonflame_flamethrowers:0 "Lance-Flammes Démoniaques"
 artifice_invention_demonflame_flamethrowers_desc:0 "Des armes massives projetant du feu démoniaque sur nos ennemis donneront à nos régiments d'artificiers une fraction de la puissance ignée des Xhazobines."
 artifice_invention_lullaby_cannon:0 "Canon Berceuse"
 artifice_invention_lullaby_cannon_desc:0 "Ces canons projettent les chants-sorts des scaldes sur des lieues, plongeant irrésistiblement les ennemis dans le sommeil."
 artifice_invention_sunbeam_armaments:0 "Armements Solaires"
 artifice_invention_sunbeam_armaments_desc:0 "Grâce à des réseaux complexes de miroirs, la lumière de Surael est concentrée en un rayon unique d'une intensité extrême, capable d'anéantir tous ceux qui oseraient s'opposer à Sa lumière."
 artifice_invention_power_fists:0 "Poings de Puissance"
 artifice_invention_power_fists_desc:0 "De massifs gantelets forgés d'un alliage d'acier et de Damestear, sertis de jade, permettent à chaque soldat artificier de frapper avec la force de centaines d'hommes, quoiqu'un peu plus lentement."
 artifice_invention_warfare_simulator:0 "Simulateur de Guerre"
 artifice_invention_warfare_simulator_desc:0 "À l'aide d'un sort d'enchantement partagé relié par machinerie, nos soldats peuvent entrer dans un monde simulé qui peut être modifié selon n'importe quel scénario militaire imaginable."
 artifice_invention_war_rigs:0 "Engins de Guerre"
 artifice_invention_war_rigs_desc:0 "Des chars et chariots sans chevaux hautement modifiables, capables de se déplacer à des vitesses sans précédent, et très populaires auprès du simple soldat. Contemplez !"
 artifice_invention_scrap_mechs:0 "Mécas de Ferraille"
 artifice_invention_scrap_mechs_desc:0 "Le méca de ferraille est une belle union d'acier de récupération et de feu à peine contrôlé. Ses moteurs permettront à nos gobelins de charger droit sur l'ennemi, l'acier les protégeant du danger, tandis que les armes massives déciment les lignes ennemies et sèment le chaos sur le champ de bataille."
 artifice_invention_predator_exoskeleton:0 "Exosquelette de Prédateur"
 artifice_invention_predator_exoskeleton_desc:0 "Des exosquelettes à mécanisme d'horlogerie fusionnés à nos crocs et griffes naturels permettent à nos artificiers de guerre de renouer avec leur héritage de tigre et de brutaliser quiconque ose leur résister."
 artifice_invention_platinum_warsuit:0 "Armure de Combat en Platine"
 artifice_invention_platinum_warsuit_desc:0 "La toute nouvelle armure de combat en platine rend nos régiments d'artificiers littéralement inébranlables au combat. Les salves ricochent et les charges de cavalerie nous heurtent comme un chariot heurterait un mur."
 artifice_invention_kaydhano_powered_vessels:0 "Vaisseaux à Propulsion Kaydhano"
 artifice_invention_kaydhano_powered_vessels_desc:0 "Stocker les sables des Vents de Mort alors qu'ils brillent encore de magies mortelles leur permet de conserver cette énergie, qui peut ensuite être utilisée pour propulser notre marine vers de nouveaux niveaux de domination sur les mers d'Alécande."
 artifice_invention_gyrocopters:0 "Gyrocoptères"
 artifice_invention_gyrocopters_desc:0 "Les gyrocoptères ajoutent une toute nouvelle dimension à la guerre, nous permettant d'accomplir des exploits jadis jugés impossibles."
 artifice_invention_eplusplus_compound:0 "Composé E++"
 artifice_invention_eplusplus_compound_desc:0 "Le composé E++ (abréviation d'Explosif Plus Plus) rend notre poudre à canon bien plus volatile, nous permettant de tirer plus fort au risque de parfois exploser également."
 artifice_invention_gu_boats:0 "Sous-Marins G-U"
 artifice_invention_gu_boats_desc:0 "Les sous-marins G-U peuvent s'approcher furtivement des navires ennemis, facilitant la course et le maintien des blocus : ils ne peuvent combattre ce qu'ils ne peuvent détecter !"
 artifice_invention_dragonscale_plating:0 "Blindage d'Écailles Draconiques"
 artifice_invention_dragonscale_plating_desc:0 "En plongeant des kobolds tout juste éclos dans un élixir draconique plus d'une centaine de fois, ils développent des écailles aussi dures que celles d'un dragon de mithril, du moins l'imaginons-nous."
 artifice_invention_giantshape_warframe:0 "Châssis de Combat Gigantesque"
 artifice_invention_giantshape_warframe_desc:0 "De grandes armures nous permettent de charger l'ennemi sans craindre son feu et de le balayer comme s'il n'était rien. Si seulement c'était moins coûteux…"
 artifice_invention_veykoda_rune_protections:0 "Protections Runiques Veykoda"
 artifice_invention_veykoda_rune_protections_desc:0 "Estampiller le métal de motifs runiques tout en y infusant une légère dose de Damestear permet la création en masse d'armures renforcées par les runes. Ce qui était autrefois réservé à une élite de guerriers veykoda est désormais accessible à nos troupes, les rendant quasi invulnérables au combat."
 artifice_invention_dragonblood_gene_warriors:0 "Guerriers Génétiques au Sang de Dragon"
 artifice_invention_dragonblood_gene_warriors_desc:0 "Un traitement spécial effectué sur les œufs de kobolds les fait grandir en embrassant pleinement leur héritage draconique, avec un destin parmi l'élite de nos armées."
 artifice_invention_chase_em_rockets:0 "Roquettes Poursuis-les"
 artifice_invention_chase_em_rockets_desc:0 "Les missiles guidés par artificiers augmentent drastiquement la précision de notre artillerie, en plus d'être extrêmement satisfaisants à observer."
 artifice_invention_vernman_hero_tonic:0 "Tonique du Héros Vernois"
 artifice_invention_vernman_hero_tonic_desc:0 "Cette nouvelle potion confère à tout homme la force et la bravoure des plus célèbres héros vernois !"
 artifice_invention_elemental_gunpowder:0 "Poudre Élémentaire"
 artifice_invention_elemental_gunpowder_desc:0 "La nouvelle poudre élémentaire permet à nos balles non seulement de déchiqueter la chair, mais aussi de geler, d'embraser, d'électrocuter et bien plus encore !"
 artifice_invention_coddorran_powered_exosuit:0 "Exosquelette Motorisé Coddorran"
 artifice_invention_coddorran_powered_exosuit_desc:0 "Nommé d'après le lieu de son invention, l'exosquelette coddorran est une armure de plates alimentée par la Damestear, équipée d'armements mortels dont des canons fulgurateurs montés sur les paumes."
 artifice_invention_controlled_rage_serum:0 "Sérum de Rage Contrôlée"
 artifice_invention_controlled_rage_serum_desc:0 "Un sérum spécial permettant aux berserkers orques de contrôler leur rage, atteignant systématiquement les sommets de la fureur pendant la bataille et se calmant rapidement après."
 artifice_invention_believable_ruin_bomb:0 "Bombe de Ruine Crédible"
 artifice_invention_believable_ruin_bomb_desc:0 "Nous pouvons assurer la sécurité de notre État en promettant mort et désespoir à quiconque oserait nous défier. Espérons qu'ils ne nous mettront pas au défi de le prouver…"
 artifice_invention_scrapperclaws:0 "Griffes de Ferrailleur"
 artifice_invention_scrapperclaws_desc:0 "Ces griffes exosquelettiques fixées au bras permettront aux gnolls de récolter les métaux de n'importe quelle source sans difficulté grâce aux lames de scie vibrantes, et de transporter bien plus qu'ils ne le pourraient autrement grâce à la force magiquement augmentée qu'elles procurent."
 artifice_invention_wonderous_lunchbox:0 "Gamelle Merveilleuse"
 artifice_invention_wonderous_lunchbox_desc:0 "Un sac sans fond modifié permet de conserver les aliments cuisinés presque parfaitement, aidant nos soldats à éviter la famine."
 artifice_invention_divendancer_speedboat:0 "Vedette Rapide Danse-Plongeon"
 artifice_invention_divendancer_speedboat_desc:0 "Nous pouvons emprunter les designs des navires à moteur qui filent autour du golfe de la Wyverne lors de la Régate de Port-Dard pour assurer à notre marine un niveau de performance tout aussi élevé."
 artifice_invention_burrower_arms:0 "Bras de Fouisseur"
 artifice_invention_burrower_arms_desc:0 "Des modifications et greffes sur les bras des kobolds augmentent leur force brachiale, leur permettant de mieux accomplir les tâches nécessitant un travail physique."
 artifice_invention_wine_ageifier:0 "Vieillisseur de Vin"
 artifice_invention_wine_ageifier_desc:0 "Un nouveau procédé chimique nous permet de passer du raisin à la bouteille en quelques semaines à peine, accélérant l'afflux de profits dans nos coffres."
 artifice_invention_wine_ageifier_tt:0 "Chaque province possédée produisant du §Yvin§! obtient le bonus suivant :"
 artifice_invention_conversation_calibrator:0 "Calibrateur de Conversation"
 artifice_invention_conversation_calibrator_desc:0 "Des dispositifs utilisant le pouvoir de la magie d'illusion pour créer l'apparence d'un discours plus compréhensible pour les non-gnomes."
 artifice_invention_centipedal_chests:0 "Coffres Centipèdes"
 artifice_invention_centipedal_chests_desc:0 "Des coffres vivants capables de se déplacer et de transporter des marchandises, trottinant sur une centaine de petites pattes, et farouchement loyaux à leurs propriétaires."
 artifice_invention_superfast_elevators:0 "Ascenseurs Ultra-Rapides"
 artifice_invention_superfast_elevators_desc:0 "De nouveaux ascenseurs nous permettent de transporter marchandises et personnes du sommet au fond d'une forteresse en quelques minutes seulement, accélérant considérablement la production et l'administration."
 artifice_invention_superfast_elevators_tt:0 "Chaque province de §Yforteresse§! possédée obtient le bonus suivant :"
 artifice_invention_pearl_cultivators:0 "Cultivateurs de Perles"
 artifice_invention_pearl_cultivators_desc:0 "De tout nouveaux dispositifs de culture permettront à notre État de préparer des perles artificielles d'une qualité bien supérieure aux perles naturelles, tout en prolongeant la période pendant laquelle nous pouvons les récolter efficacement."
 artifice_invention_pearl_cultivators_tt:0 "Chaque province côtière possédée produisant des §Ygemmes§! obtient le bonus suivant :"
 artifice_invention_soarwing_grafts:0 "Greffes d'Ailes Planantes"
 artifice_invention_soarwing_grafts_desc:0 "Ces greffes d'ailes permettent à leur utilisateur de réaliser le rêve du vol pour une durée limitée. Les kobolds les utilisent pour imiter les dragons d'antan, fondant des hauteurs pour tendre des embuscades aux ennemis au combat."
 artifice_invention_prehensile_tail_attachments:0 "Greffes de Queue Préhensile"
 artifice_invention_prehensile_tail_attachments_desc:0 "Nos queues peuvent désormais servir de troisième main, facilitant chaque tâche."
 artifice_invention_automated_translator:0 "Traducteur Automatique"
 artifice_invention_automated_translator_desc:0 "La création d'un traducteur automatique accessible réduit considérablement l'effort requis pour former des diplomates à nous représenter, nous permettant d'entretenir un corps diplomatique plus nombreux et plus compétent."
 artifice_invention_prefabricated_city_constructors:0 "Constructeurs de Cités Préfabriquées"
 artifice_invention_prefabricated_city_constructors_desc:0 "Des matériaux de construction produits en masse, des sorts de fabrication enchantés et des quantités industrielles de colle magique, le tout empaqueté dans des coffres de contenance. Une fois activés, les sorts de fabrication accomplissent le travail de construction de ces cités préfabriquées sans nécessiter de main-d'œuvre supplémentaire."
 artifice_invention_fine_print_obfuscator:0 "Obscurcisseur de Petits Caractères"
 artifice_invention_fine_print_obfuscator_desc:0 "Nos artificiers ont transformé l'art de rédiger des contrats compliqués en une science, trouvant les polices qui échappent le plus à la compréhension et les formulations les moins digestes pour les esprits intelligents."
 artifice_invention_weather_predicticator:0 "Prédicateur Météorologique"
 artifice_invention_weather_predicticator_desc:0 "De nouveaux dispositifs permettent à ceux qui y ont accès de prédire le temps, les protégeant des infortunes célestes."
 artifice_invention_artificial_egg_surrogates:0 "Œufs de Substitution Artificiels"
 artifice_invention_artificial_egg_surrogates_desc:0 "En utilisant le pouvoir de la gestation de substitution, nous pouvons accroître notre population. Cela nous permettra de recruter bien plus de soldats qu'auparavant."
 artifice_invention_city_maintenance_bots:0 "Automates d'Entretien Urbain"
 artifice_invention_city_maintenance_bots_desc:0 "De minuscules machines à mécanisme d'horlogerie, conçues spécifiquement pour ressembler aux oiseaux locaux, sont déployées pour assurer en permanence l'entretien et la réparation de nos cités à moindre coût, sans détonner dans la beauté que nous avons si soigneusement cultivée."
 artifice_invention_artifice_powered_magnate_factories:0 "Usines des Magnats"
 artifice_invention_artifice_powered_magnate_factories_desc:0 "Parrainer des usines utilisant des inventions alimentées par la Damestear enrichira considérablement les magnats, et nous par extension."
 artifice_invention_high_velocity_irrigation:0 "Irrigation à Haute Vélocité"
 artifice_invention_high_velocity_irrigation_desc:0 "Ce nouveau système d'irrigation permet d'arroser bien plus de terres agricoles pour le même effort, permettant à notre population de prospérer sous la lumière de Surael."
 artifice_invention_vg_musket_precursor_edition:0 "Mousquet VG : Édition Précurseur"
 artifice_invention_vg_musket_precursor_edition_desc:0 "Bien que les reliques précurseurs récupérées par la Guilde de Vanbury prennent de nombreuses formes, leurs légendaires mousquets sont uniformes : dans chacun, des reliques décomposées sont utilisées pour que les armes ne nécessitent presque aucun entretien tout en propulsant les balles avec une vitesse et une précision incroyables."
 artifice_invention_yingzhen_antibeacons:0 "Anti-Balises"
 artifice_invention_yingzhen_antibeacons_desc:0 "Des dispositifs qui perturberont l'efficacité d'autres inventions proches, comme les automates qui ont commencé à nous affliger."
 artifice_invention_sunblotter_cream:0 "Crème Bloque-Soleil"
 artifice_invention_sunblotter_cream_desc:0 "Parrainer la crème bloque-soleil nous vaudra de nombreux amis parmi les vampires, qui apprécieront grandement de pouvoir supporter le soleil, même temporairement."
 artifice_invention_honsai_reinforced_cannons:0 "Canons Renforcés"
 artifice_invention_honsai_reinforced_cannons_desc:0 "Nos artificiers ont inventé un moyen d'améliorer considérablement nos canons. Après avoir tapissé l'intérieur du canon de Damestear selon un motif spécial, le canon peut être tiré de manière conventionnelle, mais le boulet est propulsé à des vitesses bien supérieures à la normale. Les premiers prototypes, bien que modérément réussis, ne pouvaient être tirés qu'une seule fois en raison de la force pure déchirant le canon. C'est pourquoi les nouvelles versions sont également dotées d'un renforcement en Damestear à l'extérieur du fût, utilisant l'abjuration pour maintenir le canon et le revêtement intérieur intacts.\n\nLa vitesse extrêmement élevée des projectiles de ces canons renforcés signifie qu'un seul boulet peut traverser plusieurs murs d'affilée et dispose d'une portée bien supérieure à la plupart des canons que nous affrontons. Nos artilleurs jurent même que lorsque ces canons sont tirés droit vers le ciel, le boulet ne redescend pas."
 artifice_invention_honsai_instant_messages:0 "Messages Instantanés"
 artifice_invention_honsai_instant_messages_desc:0 "Un nouveau type d'artéfact est devenu extrêmement populaire parmi les segments les plus aisés de notre population : une tablette de communication. Cette innovation par rapport aux tablettes de cire, normalement utilisées uniquement pour l'entraînement à l'écriture ou la prise de notes, possède une couche doublée de Damestear derrière la cire qui détecte la pression exercée. Si deux tablettes sont réglées sur la même harmonisation, une tablette très éloignée de la première peut reproduire tout ce qui est inscrit sur l'autre. Cela permet de transmettre écrits, dessins, diagrammes ou tout ce qui est pratique.\n\nCe nouvel artéfact a été adopté avec enthousiasme par les marchands, administrateurs et généraux, mais aussi par les amis ou amants contraints de passer du temps loin l'un de l'autre. L'enthousiasme est nettement moindre chez les plus conservateurs, qui prétendent que ces artéfacts finiront par faire en sorte que les gens ne se parlent plus."
 artifice_invention_game_of_khet:0 "Jeu du Khet"
 artifice_invention_game_of_khet_desc:0 "Un ancien jeu pratiqué par les Khet, utilisant des tablettes de pierre ornées d'images de monstres redoutables. Désormais, grâce à l'artisanat magique, il peut être distribué sous forme de cartes parmi notre peuple, permettant aux puissants comme aux humbles de régler leurs différends par une forme de duel bien moins violente et bien plus divertissante."
 artifice_invention_market_mender:0 "Régulateur de Marché Victor.I.A.3"
 artifice_invention_market_mender_desc:0 "Une merveille de calculs qui peut absorber n'importe quelle quantité de données et produire des moyennes, des prévisions de marchés futurs, des taux d'imposition optimaux et bien plus encore. Le summum de la technologie des tableaux de données."
 artifice_invention_arcane_battery_capital_complex:0 "Complexe Central de Batteries Arcaniques"
 artifice_invention_arcane_battery_capital_complex_desc:0 "Une structure gigantesque qui produit et distribue des batteries de Damestear stabilisées pour l'ensemble de notre capitale. Chaque jour, elle absorbe et traite plus de Damestear qu'un roi-sorcier médiéval n'en aurait vu de toute sa vie."
 artifice_invention_plane_of_water_teleporter:0 "Téléporteur vers le Plan de l'Eau"
 artifice_invention_plane_of_water_teleporter_desc:0 "Des téléporteurs permettant aux navires d'entrer temporairement dans le Plan de l'Eau, facilitant les voyages dans un plan dont les distances sont bien plus courtes que les nôtres."
 artifice_invention_think_thought_transmitters:0 "Transmetteurs de Pensées"
 artifice_invention_think_thought_transmitters_desc:0 "Une machine qui s'attache à l'esprit, au corps et à l'âme, et projette directement des pensées vers d'autres personnes. Ces pensées dépassent les limites des simples « mots » : avec les transmetteurs de pensées, tout, des souvenirs aux émotions en passant par les schémas de réflexion, peut être exprimé sans langage !"
 artifice_invention_mirage_detector_3000:0 "Détecteur de Miracles 3000"
 artifice_invention_mirage_detector_3000_desc:0 "Un dispositif totalement objectif et factuel qui calcule les niveaux de « Divinité », « Puissance » et « Moralité » pour chaque religion du monde, et calcule la somme de ces trois valeurs en « Points-Dieu ». Il se trouve que la religion avec le plus grand nombre de « Points-Dieu »… est la nôtre ! N'est-ce pas formidable d'avoir raison sur le monde ?"
 artifice_invention_empire_engine:0 "Moteur d'Empire"
 artifice_invention_empire_engine_desc:0 "Un moteur qui utilise la magie de Souhait du Bulwar, l'écriture runique des nains et des géants, et des reliques féeriques de l'Éordande et des Bois-Profonds pour imprégner métaphysiquement votre nation du concept de « Puissance ». Ses inventeurs sont assez sûrs qu'il fonctionne : et même si ce n'était pas le cas, suffisamment de gens y croient pour qu'il fonctionne en pratique de toute façon."
 artifice_invention_subterrenes:0 "Subterrènes"
 artifice_invention_subterrenes_desc:0 "D'immenses véhicules-foreuses qui creusent des tunnels sous terre, plaçant des supports derrière eux à mesure qu'ils progressent dans la roche. Permet une construction souterraine à grande échelle bien plus importante, même pour les habitants de la surface."
 artifice_invention_bureaucratizer:0 "Le Bureaucratiseur"
 artifice_invention_bureaucratizer_desc:0 "Une machine qui transmet évaluations de performance, résultats de tests et rapports d'activité à un bureaucrate temporairement privé de mémoire. Sans loyautés ni contexte dont s'inspirer, le bureaucrate ne peut utiliser que les informations qui lui sont fournies pour déterminer qui sera nommé aux divers postes administratifs à travers notre nation."
 artifice_invention_runethought_network:0 "Réseau Runique de Pensée"
 artifice_invention_runethought_network_desc:0 "Un réseau de tours runiques, chacune gravée d'aspects de notre langue et de notre culture, est installé à travers notre nation. Une fois activées par les magies des esprits halessiens, ces tours imprègnent leurs runes dans l'esprit de nos citoyens. Chacun d'eux apprend notre langue, nos valeurs et nos idéaux, qu'il le veuille ou non."
 artifice_invention_negotiation_nexus:0 "Nexus de Négociation"
 artifice_invention_negotiation_nexus_desc:0 "Une machine qui lit les esprits et les comportements de toutes les parties dans une négociation, dresse la liste de ce que chaque personne désire, puis donne à nos négociateurs accès aux données analysées. Aide dans tous les types de négociations et de traités de paix."
 artifice_invention_damestear_reactor_megacannon:0 "Mégacanon à Réacteur de Damestear"
 artifice_invention_damestear_reactor_megacannon_desc:0 "Un canon construit en mithril et isolé de porcelaine, qui canalise le mana de la Damestear en un rayon d'une puissance inimaginable. L'évolution ultime du fulgurateur, capable de projeter des rayons d'énergie qui déciment des champs de bataille entiers."

