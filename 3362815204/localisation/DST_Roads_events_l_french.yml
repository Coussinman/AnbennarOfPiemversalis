l_french:
 building_early_road: "Chemin de Terre"
 building_early_road_desc: "§gAu fil du temps, les sentiers naturels ont évolué en chemins de terre. Il est essentiel d'en assurer l'entretien et d'y installer une signalisation pour garantir leur bon usage.§!\n\n"
 building_gravel_road: "Route Empierrée"
 building_gravel_road_desc: "§gLe gravier constitue une fondation supérieure pour les routes par rapport à la simple terre battue.§!\n\n"
 building_royal_road: "Route Pavée"
 building_royal_road_desc: "§gLes pavés représentent une fondation améliorée pour les routes, surpassant le gravier en termes de durabilité et d'attrait esthétique.§!\n\n"
 building_macadam_road: "Route Naine"
 building_macadam_road_desc: "§gLes routes naines marquent un bond considérable au-delà des simples pavés, incarnant les avancées en matière de construction routière mises au point par les diverses forteresses naines. Leur technique innovante consiste à superposer méthodiquement des pierres concassées, offrant non seulement une durabilité supérieure, mais également une surface remarquablement plus lisse et plus moderne.§!\n\n"
 building_railroad: "Chemins de Fer"
 building_railroad_desc: "§gL'avènement du chemin de fer a constitué une amélioration révolutionnaire par rapport aux routes naines traditionnelles, transformant radicalement la connectivité terrestre et permettant un acheminement plus rapide et plus efficace des marchandises comme des voyageurs.§!\n\n"
