 artificer_factions.1.t:0 "Restrictions des Technomanciens sur les Reliques Précurseurs"
 artificer_factions.1.d:0 "Les Reliques Précurseurs ont toujours été une denrée prisée, mais avec la fondation de l'artisanat magique, nous avons découvert que déconstruire ces reliques peut nous apprendre énormément sur la façon de maîtriser les magies et de les fondre dans des objets ordinaires. Comme leurs homologues traditionnels, les Technomanciens témoignent d'une grande révérence pour la signification historique et culturelle de ces reliques, et ne les déconstruisent que si c'est absolument nécessaire, ou s'ils sont certains de pouvoir les remonter.\n\nD'autres philosophies, en revanche, sont bien plus pragmatiques à ce sujet. Après tout, l'artisanat magique n'est-il pas l'avenir ? Si c'est le cas, pourquoi rester coincés à regarder le passé ? Les Mécanistes en particulier exigent que nous réduisions le commerce libre et culturel de ces reliques, que nous convertissions les sites de fouilles archéologiques en carrières, et que nous nous concentrions sur la recherche et l'extraction d'autant de reliques que possible pour une déconstruction immédiate."
 artificer_factions.1.a:0 "Nous devons traiter les reliques avec respect."
 artificer_factions.1.b:0 "Trouver autant de reliques que possible est la priorité."
 artificer_factions.2.t:0 "Des Sorciers et des Technomanciens"
 artificer_factions.2.d:0 "Alors que les Technomanciens traitent l'artisanat magique comme une nouvelle école de magie, beaucoup de Technomanciens le voient aussi comme la SEULE école de magie digne d'être apprise.\nAvec chaque avancée dans le domaine de l'artisanat magique, cela se confirme davantage, les Technomanciens sapant constamment les $ESTATE_MAGES$ traditionnels de notre pays, qui avaient par le passé offert des services similaires pour apporter des merveilles au profane. Ces Technomanciens vont même jusqu'à se proclamer les vrais successeurs de la magie, au grand désappointement de l'ancienne classe magique."
 artificer_factions.2.a:0 "Vis avec ton temps, vieillard !"
 artificer_factions.2.b:0 "Nous devons respecter les traditions."
 artificer_factions.3.t:0 "Invention Brillantiste embarrassante !"
 artificer_factions.3.d:0 "Les adeptes de la Philosophie des Inventions Brillantes sont officiellement connus comme Brillantistes... mais pour certains, on les appelle des savants fous.\n\nCela n'a jamais été aussi vrai qu'aujourd'hui, quand l'un de nos principaux artificiers Brillantistes a présenté son travail au [Root.Monarch.GetTitle] et à son cercle intérieur avant une grande démonstration. Ce fut un désastre. On dit que le génie n'est que de la folie avec une bonne image, et il semble que ce soit vrai. Sérieusement. Leur invention n'avait aucun sens. Du tout. Elle ne faisait pas ce qu'ils disaient qu'elle ferait. Et elle ressemblait à quelque chose venant d'une décharge !\n\nLes Mécanistes, toujours en quête de praticité, ont proposé une alternative. Quelque chose qu'ils préparaient en parallèle : c'est fiable, mais au cas où nous ne reconnaîtrions tout simplement pas l'invention des Brillantistes, nous n'impressionnerons pas autant que nous aurions pu."
 artificer_factions.3.a:0 "Les Mécanistes fiables sauvent la mise !"
 artificer_factions.3.b:0 "Je parie sur l'Invention Brillantiste."
 artificer_factions.4.t:0 "Magnats de l'Industrie"
 artificer_factions.4.d:0 "Les Mécanistes ne sont qu'une partie de ce monde en constante évolution. Les industriels, ou comme certains à Gawed les appellent, les Magnats, sont devenus des individus puissants, passant de simples marchands à princes-marchands. Ils possèdent des usines, traditionnelles comme alimentées par l'artisanat magique, souvent au-delà des frontières en tant que particuliers, et ont ainsi travaillé avec les Mécanistes de notre pays pour nous aider à nous ouvrir à un monde mercantile plus connecté."
 artificer_factions.4.a:0 "Nous n'avons pas besoin de leur aide"
 artificer_factions.4.b:0 "Faisons des concessions"
 artificer_factions.5.t:0 "Les Brillantistes fatigués de la guerre"
 artificer_factions.5.d:0 "Les Brillantistes sont connus pour leur inattention à tout ce qui dépasse la nouvelle invention ou le nouveau gadget, et la guerre de notre pays n'y échappe pas.\n\nAlors que les Brillantistes en sont venus à dominer les affaires de [Root.Country.GetName], beaucoup dans nos bureaux publics ont exprimé leurs inquiétudes concernant cette guerre. « Qui se soucie du gain », disent-ils. « Tout ce qui m'importe, c'est de retourner à mes recherches ! », s'écrient-ils.\n\nSi la plume est plus puissante que l'épée, il semble que [Root.Country.GetName] se soucie des clés à molette. Et les clés à molette ne se soucient que d'elles-mêmes."
 artificer_factions.5.a:0 "IL EST TEMPS D'ARRÊTER"
 artificer_factions.6.t:0 "Avancées à la pointe du progrès"
 artificer_factions.6.d:0 "Eurêka !\n\nLa forte influence de la Philosophie des Inventions Brillantes dans notre pays a porté ses fruits. Une période de grandes découvertes et de grandes idées est arrivée, et il est temps pour [Root.Country.GetName] de récolter les bénéfices de tels esprits inspirés."
 artificer_factions.6.a:0 "L'esprit sur la matière"
 artificer_factions.7.t:0 "Mes amis Technomanciens"
 artificer_factions.7.d:0 "La Philosophie de la Techno-Thaumaturgie est connue pour ses inventions visant à égaliser le domaine de la magie, permettant de l'exploiter dans des appareils et outils par le commun des mortels.\n\nCe qu'ils fournissent également, c'est le talent et l'aptitude politiques que leurs homologues mages traditionnels ont fournis aux nombreux dirigeants d'antan. L'influence des Technomanciens dans notre pays a abouti exactement à cela."
 artificer_factions.7.a:0 "Me connaître, te connaître"
 artificer_factions.8.t:0 "Investissements extérieurs"
 artificer_factions.8.d:0 "Les adeptes de la Philosophie du Mécanisme sont pragmatiques dans leurs inventions, mais aussi pragmatiques dans leur sens des affaires. Ils sont les titans de demain, et ils sont venus frapper à notre porte.\n\nLa domination des Mécanistes dans notre pays a suscité l'intérêt de ceux de l'étranger, qui ont promptement investi dans la croissance de notre pays."
 artificer_factions.8.a:0 "Les affaires sont florissantes !"
 artificer_factions.9.t:0 "Les Brillantistes excentriques refusent de coopérer"
 artificer_factions.9.d:0 "Les Brillantistes, toujours capricieux, toujours excentriques et toujours agaçants, sont encore partis bouder. Leur faction étant méprisée dans la direction du pays, beaucoup ont complètement perdu tout intérêt pour les affaires de l'État, retournant simplement à leurs ateliers pour travailler sur des projets personnels qui ne verront jamais le jour."
 artificer_factions.9.a:0 "Leur rappeler leurs obligations"
 artificer_factions.9.b:0 "Apaiser leurs égos"
 artificer_factions.10.t:0 "Les intrigues des Technomanciens portent leurs fruits"
 artificer_factions.10.d:0 "« Ces Technomanciens. Ne leur faites pas confiance. Ils sont comme des mages intrigants, mais plus intelligents. Parce qu'ils ont su évoluer avec leur temps. »\n\nEn effet. Les nombreuses intrigues, complots et demi-complots des Technomanciens ont lentement mais sûrement porté leurs fruits dans l'État. Finalement, vous réalisez que quelques Technomanciens sont apparus à la place de fonctionnaires qui ont récemment démissionné, mystérieusement disparu ou été bannis pour des fautes d'orthographe dans leurs thèses."
 artificer_factions.10.a:0 "Nous devons agir rapidement contre cela"
 artificer_factions.10.b:0 "C'est la politique, j'imagine"
 artificer_factions.11.t:0 "Les Mécanistes réclament des faveurs"
 artificer_factions.11.d:0 "Dans l'ancien conte de la Tortue et du Lièvre, les Mécanistes sont la tortue. Ils sont lents et réguliers. Résolus. Leur influence s'insinue profondément dans les fondations du pays.\n\nBesoin d'un mécanicien solide ? C'est un Mécaniste. Oh, vous avez besoin de quelqu'un pour concevoir un noyau robuste pour votre invention ? Envoyez une Pierre d'Envoi aux Mécanistes.\n\nIl semble que le moment est venu pour les Mécanistes de voir leurs faveurs remboursées, et ils ont tiré les ficelles pour gagner en force au sein de nos bureaux bureaucratiques."
 artificer_factions.11.a:0 "Attendez. Ce n'est pas ainsi que nous procédons ici."
 artificer_factions.11.b:0 "Si les gens veulent les aider, soit"
 artificer_factions.12.t:0 "Les Mécanistes exploitent la Damestear à ciel ouvert"
 artificer_factions.12.d:0 "La Damestear est de la magie brute condensée en pierre, et en tant que telle, incroyablement utile comme source d'énergie dans le domaine de l'artisanat magique.\n\nLes Mécanistes de notre royaume ont entrepris des initiatives pour extraire autant de Damestear que possible dans nos provinces. Les Brillantistes, capricieux comme toujours, se sont plaints qu'une telle extraction négligente ne fera que diminuer la qualité de la Damestear qu'ils récoltent, la rendant « pratiquement inutile » à leurs yeux."
 artificer_factions.12.a:0 "Nous devons récolter la Damestear avec soin."
 artificer_factions.12.b:0 "Une pierre est une pierre. Extrayez-la."

