 artifice_tier_emblem_tt:0 "[Root.getArtificeryLevel]\n----------------------------\n[Root.getArtificeryLevelProgress]"
 get_artificery_level_basic:0 "État des Artificiers naissant\n----------------------------\nNos artificiers commencent à s'organiser en guildes, compagnies et collectifs. Nos érudits se mettent à étudier les propriétés fondamentales de la magie.\n\nNous pouvons rechercher des inventions de §YRang I§!."
 get_artificery_level_advanced:0 "§GÉtat des Artificiers en croissance§!\n----------------------------\nDes écoles et des universités sont établies à travers le pays. Des inventions sont créées qui peuvent changer le monde. Les artificiers s'intègrent dans notre administration, notre armée et notre économie. Nous pouvons rechercher des inventions de §YRang I§! et §YRang II§!."
 get_artificery_level_expert:0 "État des Artificiers ascendant\n----------------------------\nNos inventions sont renommées à travers Halann. Les artificiers affluent vers nos universités pour apprendre ce que nous savons. Notre pays est dirigé autant par des inventeurs que par des bureaucrates. Nous comprenons la métaphysique de la magie elle-même.\n\nNous pouvons rechercher des inventions de §YRang I§!, §YRang II§! et §YRang III§!."
 get_artificery_level_none:0 "§RERREUR§! Essayez d'attendre un an, sinon contactez @Tators"

 get_artificery_progress_slow_1:0 "§YÉtant donné notre approche méthodique et délibérée de la recherche, passer au niveau suivant nécessite l'achèvement de 2 projets de recherche.§!\n\nActuellement, nous avons achevé §Y[Root.artifice_level_progress.GetValue]/2 (4 avant 1580)§! de ces projets."
 get_artificery_progress_slow_2:0 "§YÉtant donné notre approche méthodique et délibérée de la recherche, passer au niveau suivant nécessite l'achèvement de 2 projets de recherche.§!\n\nActuellement, nous avons achevé §Y0/2 (4 avant 1580)§! de ces projets."
 get_artificery_progress_normal_1:0 "§YEn suivant notre méthodologie de recherche standard, nous devons achever 3 projets de recherche pour progresser au niveau suivant.§!\n\nÀ ce jour, nous avons achevé avec succès §Y[Root.artifice_level_progress.GetValue]/3 (6 avant 1580)§! de ces projets."
 get_artificery_progress_normal_2:0 "§YEn suivant notre méthodologie de recherche standard, nous devons achever 3 projets de recherche pour progresser au niveau suivant.§!\n\nÀ ce jour, nous avons achevé avec succès §Y[Root.artifice_level_progress.GetValue]/3 (6 avant 1580)§! de ces projets."
 get_artificery_progress_fast_1:0 "§YEn adoptant notre approche de recherche rapide et sans entrave, nous devons entreprendre 6 projets de recherche pour passer au niveau suivant.§!\n\nActuellement, nous avons achevé §Y[Root.artifice_level_progress.GetValue]/6 (12 avant 1580)§! de ces projets."
 get_artificery_progress_fast_2:0 "§YEn adoptant notre approche de recherche rapide et sans entrave, nous devons entreprendre 6 projets de recherche pour passer au niveau suivant.§!\n\nActuellement, nous avons achevé §Y0/6 (12 avant 1580)§! de ces projets."
