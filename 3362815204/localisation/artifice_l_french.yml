 tec_brilliance:0 "Brillantistes"
 tec_brilliance_influence:0 "Influence de la Philosophie de la Brillance"
 tec_brilliance_FACTION_DESC:0 "La Philosophie des Inventeurs Brillants se concentre sur la création d'appareils ingénieux qui réalisent la promesse de synthèse entre magie et technologie. La préoccupation principale des Brillantistes (ou comme d'autres les appellent, des savants fous) est de continuer à faire avancer le domaine de l'artisanat magique, quel qu'en soit le prix. Pour eux, l'État est secondaire par rapport à leur travail."

 tec_technomancy:0 "Technomanciens"
 tec_technomancy_influence:0 "Influence de la Philosophie de Technomancie"
 tec_technomancy_FACTION_DESC:0 "La Philosophie de la Techno-Thaumaturgie voit l'artisanat magique simplement comme une autre école de magie, reproduisant souvent des sorts existants d'une manière nouvelle et accessible. Comme beaucoup de Technomanciens sont des mages, leur préoccupation principale fait écho à celle de leurs homologues traditionnels : un pays stable qui répond aux caprices de ses individus magiques."

 tec_mechanists:0 "Mécanistes"
 tec_mechanists_influence:0 "Influence de la Philosophie Mécaniste"
 tec_mechanists_FACTION_DESC:0 "La Philosophie du Mécanisme se concentre sur l'application de l'artisanat magique pour améliorer la fabrication à l'échelle industrielle. Les Mécanistes sont des ingénieurs pratiques et ont peu de patience pour les aspects les plus extravagants de l'artisanat magique. Leur préoccupation principale est un État fort qui peut investir considérablement dans son développement interne."

