 artifice_ivory_tools_enact_tt:0 "Toutes les Provinces d'Ivoire obtiennent §G-5 %§! de coût de développement."
 artifice_ivory_tools_tt:0 "Le modificateur '§YOutils d'Ivoire§!' est retiré de toutes les provinces ayant l'§YIvoire§! comme bien commercial."
 estate_artificers_monopoly_of_damestear:0 "Monopole de la Damestear"
 estate_artificers_monopoly_of_damestear_desc:0 "L'État a accordé aux Artificiers les droits de monopole sur la production de Damestear."

 estate_artificers_artificer_generals:0 "Les Généraux-Artificiers"
 estate_artificers_artificer_generals_desc:0 "Le règne du Mage-Guerrier sera terminé par le Général-Artificier : un officier individuel maniant concoctions, gadgets et innovations capables de renverser le cours de n'importe quelle bataille. Alors que les mages doivent compter sur la loterie de la naissance pour le talent magique, nous pouvons équiper les soldats les plus compétents avec les plus grandes inventions que nous pouvons rassembler !"
 estate_artificers_relic_fueled_artificery:0 "Récolte de Mana et d'Érudition"
 estate_artificers_relic_fueled_artificery_desc:0 "Si un artificier vous demande où le progrès est stocké, vous devez répondre : « Dans le mana et dans l'érudition. » Nous récoltons maintenant les deux comme des biens matériels : la Damestear comme mana sous forme physique, et les reliques comme savoir accumulé avec des maîtres de la magie depuis longtemps décédés. Cela nous permettra de rechercher beaucoup plus rapidement."
 estate_artificers_focus_on_quantity:0 "Le mieux est l'ennemi du bien"
 estate_artificers_focus_on_quantity_desc:0 "Nous avons fabriqué plus d'inventions que nous n'aurions jamais imaginé : tellement que nous ne pouvons pas toutes les utiliser à la fois. Par conséquent, en limitant notre mise en œuvre d'inventions particulièrement puissantes, nous pouvons produire en masse de nombreux petits avantages pour notre économie, société et armée. En nous concentrant sur de nombreux avantages « bons » pour notre pays, nous pouvons compenser la perte du sacrifice des rares « parfaits »."
 estate_artificers_gnommo_diplomacy:0 "Le Réseau Client du Gommo"
 estate_artificers_gnommo_diplomacy_desc:0 "Le Gommo International, en tant qu'organisation mondiale des artificiers, entretient des relations diplomatiques avec presque tous les pays de Halann. En échange de l'octroi de certains privilèges au Gommo au sein de notre État, comme une capacité limitée à posséder des terres et à collaborer avec nos artificiers, ils sont prêts à partager leurs contacts, traducteurs et émissaires avec nous !"
 estate_artificers_ravelian_emissaries:0 "Émissaires Ravéliens"
 estate_artificers_ravelian_emissaries_desc:0 "Avec la montée du Ravélianisme, il est de la plus haute importance que nous soyons tous unis, de peur que notre foi ne soit contestée comme la Cour Régente avant elle. En remplaçant nos diplomates par des Prêcheurs Ravéliens, nous gagnerons facilement la faveur et la confiance de nos frères dans la foi."
 estate_artificers_precursor_weapons:0 "Armes de Production de Masse"
 estate_artificers_precursor_weapons_desc:0 "Il y a une limite à la démocratisation complète de la magie par l'artisanat magique. La science magique peut être capable de faire des choses incroyables et mettre des armes enchantées entre les mains du peuple : mais sans les matériaux nécessaires pour produire ces armes, le pouvoir de l'artisanat magique est purement théorique. En maximisant notre acquisition de Damestear et de reliques, nous pouvons nous assurer que chaque soldat marche au combat avec un fusil artificié à la main."
 estate_artificers_porcelain_shields:0 "Boucliers de Porcelaine"
 estate_artificers_porcelain_shields_desc:0 "REPLACE_ME"
 estate_artificers_porcelain_shields_tt:0 "Ne fait rien actuellement, en attente de refonte de la Magie"
 estate_artificers_ivory_tools:0 "Transmetteurs d'Ivoire"
 estate_artificers_ivory_tools_desc:0 "L'ivoire fonctionne comme un « transmetteur » magique, reliant les composants d'artisanat magique les uns aux autres avec des pertes minimales en mana. En fournissant à nos artificiers nationaux l'ivoire nécessaire pour fabriquer ces « transmetteurs », nous pouvons créer des appareils magiques bien plus efficaces !"
 artifice_ivory_tools:0 "Outils d'Ivoire"
 estate_artificers_grant_production_rights:0 "Le Gommo Intranational"
 estate_artificers_grant_production_rights_desc:0 "Nous inspirant de l'organisation mondiale, nous avons organisé les artificiers, artisans et industriels naissants de [Root.GetTag.GetName] en « Gommos » bien à nous. Dirigées par les plus brillants esprits de notre pays, ces guildes du monde moderne créent, construisent et inventent avec une efficacité aveuglante, et nous rapportent des profits aveuglants. Nos artificiers peuvent réclamer une grande partie de ces profits pour eux-mêmes, mais un tel prix peut-il vraiment ternir notre grand progrès ?"
 estate_artificers_grand_exhibition_hall:0 "La Grande Exposition"
 estate_artificers_grand_exhibition_hall_desc:0 "Contrairement aux mages du passé, gardant jalousement leurs secrets de magie, ne les démontrant qu'occasionnellement pour impressionner ou effrayer le peuple, nous prévoyons d'ouvrir un grand Hall d'Exposition au public. Nous présenterons nos inventions et innovations au monde, partageant ainsi le savoir scientifique et recueillant un prestige international !"
 estate_artificery_gov_cap:0 "Artificiers dans l'Administration"
 estate_artificery_gov_cap_desc:0 "Nous ferons usage de l'ingéniosité des Artificiers pour renforcer notre bureaucratie."
 estate_artificers_trained_mage_hunters:0 "Le Projet Fléau-des-Mages"
 estate_artificers_trained_mage_hunters_desc:0 "Longtemps la terreur des Rois-Sorciers a ravagé les terres de Halann, leur immense pouvoir personnel rendant toute résistance significative futile. Cependant, avec l'avènement des nouvelles armes d'artificiers, nous sommes en mesure de former des chasseurs de mages qualifiés grâce au Projet Fléau-des-Mages. Les soldats les plus habiles sont sélectionnés et formés pour contrer les sorts et supprimer la magie, maniant les outils les plus récents conçus par les artificiers pour éliminer les mages sur le champ de bataille."
 trained_mage_hunters_tt:0 "Tant que nous sommes en guerre avec un Roi-Sorcier, nous obtiendrons les effets suivants :\nMoral terrestre : §G+10,0 %§!\nMoral naval : §G+10,0 %§!\nDiscipline : §G+5,0 %§!\nDégâts de choc reçus : §G-10,0 %§!"
 estate_artificers_focus_on_artificer_units:0 "Armées de la Nouvelle Guerre"
 estate_artificers_focus_on_artificer_units_desc:0 "De nombreuses batailles ont été gagnées par des hommes moins nombreux, mais mieux entraînés et mieux équipés. Dans cette nouvelle ère de guerre, il en sera de même. Nos ennemis peuvent être en mesure de déployer de grandes armées, mais ces armées tomberont devant les nôtres : car aucune quantité d'effectifs ne peut résister aux armes modernes, à la puissance de feu et à la logistique. En mettant l'accent sur la formation et l'équipement des artificiers pour le combat, nous pouvons saisir l'avantage sur le champ de bataille !"
 estate_artificers_development_tools:0 "L'Arsenal du Développement National"
 estate_artificers_development_tools_desc:0 "Contrairement aux tours de mages, qui ne profitent qu'aux domaines des sorciers individuels, nous offrons un éventail diversifié de nouveaux instruments pour favoriser la prospérité de notre nation entière. Ces outils de développement nécessiteront des investissements initiaux incroyables à produire, mais finiront par rapporter des dividendes."
 artifice_requires_artificery_only_mode_tt:0 "Nécessite le mode artisanat magique uniquement."
 artifice_requires_artificery_only_mode_add_tt:0 "Nécessite le mode artisanat magique uniquement et avoir au moins les Inventions de Rang 2 débloquées"
 estate_artificers_draft_artificers:0 "Régiments d'Artificiers à Financement Privé"
 estate_artificers_draft_artificers_desc:0 "Les régiments d'artificiers sont assez coûteux, en raison de l'équipement expérimental et onéreux qu'ils doivent entretenir. Si nous donnons aux artificiers plus d'influence au sein de notre cour, ils ne verront pas d'inconvénient à produire l'équipement nécessaire pour quelques régiments de temps en temps."

 estate_artificers_artificer_generals_decision_title:0 "Artificiers : Général-Artificier"
 estate_artificers_artificer_generals_decision_desc:0 "Nous obtiendrons un Général orienté Feu"
 estate_artificers_draft_artificers_decision_title:0 "Artificiers : Obtenir un financement privé d'Artificiers"
 estate_artificers_draft_artificers_decision_desc:0 "Nous compterons sur les relations de notre nation avec les artificiers, leur demandant de financer l'équipement pour de nouveaux régiments d'artificiers."
 estate_artificers_change_mode_decision_title:0 "[Root.reset_mode_title]"
 estate_artificers_change_mode_decision_desc:0 "[Root.reset_mode_desc]"
 artifice_reset_invite_mages_title:0 "Artificiers : Renforcer les Mages"
 artifice_reset_invite_mages_desc:0 "Les circonstances exigent que nous partagions le pouvoir avec les Mages."
 artifice_reset_invite_artificers_title:0 "Artificiers : Renforcer les Artificiers"
 artifice_reset_invite_artificers_desc:0 "Les circonstances exigent que nous partagions le pouvoir avec les Artificiers."
 artifice_research_tt:0 "Les Artificiers nous présenteront des options de recherche dans quelques jours."

 artifice_research.1.t:0 "S'engager pour le Progrès"
 artifice_research.1.d:0 "Machinistes, marchands, érudits, soldats, alchimistes, universitaires, banquiers et bureaucrates : tous réclament plus de financement pour les artificiers. Les inventeurs de notre pays languissent actuellement sans soutien de l'État, travaillant sur leurs propres projets et luttant pour gagner leur vie. Devons-nous leur injecter argent et subventions ? Devons-nous leur donner notre trésor, pourvu qu'ils inventent quelque chose pour nous en retour ?"
 artifice_research.1.a:0 "Finançons les artificiers !"
 artifice_research.1.b:0 "À la réflexion... cela n'en vaut peut-être pas le coût."
 artifice_research.2.t:0 "Conception Délibérative"
 artifice_research.2.d:0 "Les Techno-Thaumaturges, prêts (comme toujours) à débattre sans fin sur la meilleure façon de concevoir leur prochain miracle, viennent à nous avec une question. Avant de nous soumettre leurs nombreux projets potentiels, ils doivent savoir quels types d'inventions nous souhaitons les voir développer.\n\nHeureux comme toujours de délibérer et de travailler avec nos administrateurs, les Techno-Thaumaturges proposent les trois mêmes écoles d'étude que d'habitude : recherche industrielle, militaire ou sociétale. Laquelle choisissons-nous pour leur prochaine innovation ?"
 artifice_research.2.a:0 "Industrielle !"
 artifice_research.2.b:0 "Militaire !"
 artifice_research.2.c:0 "Sociétale !"
 artifice_research.3.t:0 "Un Choix d'Investissement"
 artifice_research.3.d:0 "Les plans débordent des bureaux de la capitale alors que des dizaines (sinon des centaines) d'inventeurs nous sollicitent pour soutenir leurs conceptions particulières. Heureusement pour nous, nous pouvons les ignorer pour la plupart : nous avons déjà choisi quelle organisation d'artificiers nous soutenons, et ils nous ont apporté une courte liste d'inventions qu'ils pourraient poursuivre. Dans quelle invention investissons-nous pour l'avenir prévisible ?"
