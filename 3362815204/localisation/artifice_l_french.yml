 artifice_events.1.t:0 "Recherche d'Invention d'Artificier"
 artifice_events.1.d:0 "Il existe trois grandes écoles de pensée, ou philosophies, dans l'approche de l'artisanat magique.\n\nLa Philosophie des Inventions Brillantes cherche à réaliser la promesse d'une véritable synthèse entre magie et technologie, fusionnant les deux pour créer des choses entièrement nouvelles et d'autant plus performantes. Les Brillantistes se voient à l'avant-garde de la science de l'artisanat magique, et il n'est pas surprenant que les inventions les plus audacieuses et ingénieuses proviennent des adeptes de cette philosophie. Leur invention la plus célèbre est le Fusil à Étincelles qui utilise l'essence élémentaire pour tirer des éclairs avec une précision de tireur d'élite.\n\nLa Philosophie de la Techno-Thaumaturgie voit l'artisanat magique comme une nouvelle école de magie, le traitant à travers le prisme du mysticisme pragmatique comme le ferait un sorcier ordinaire. Ils voient l'artisanat magique comme un outil pour combler le fossé entre l'arcane et le profane, utilisant souvent l'artifice pour reproduire des sorts sans nécessiter de rituels complexes ni de réactifs. Une telle invention est le Pistolet-Baguette, permettant de lancer des sorts depuis le canon d'un pistolet.\n\nLa Philosophie du Mécanisme rassemble des ingénieurs et artisans qui combinent l'artifice et le savoir-faire d'ingénierie traditionnelle pour repousser les limites de la machinerie. Les Mécanistes traitent typiquement les applications plus fantaisistes de l'artisanat magique avec dédain, croyant en un artisanat simple et efficace, surtout lorsqu'il peut aider à la production de masse. Les Mécanistes sont fiers que ce soient souvent leurs inventions qui révolutionnent la société, comme les Aéronefs.\n\nSoutenir l'une de ces philosophies déterminera quelle Invention les Artificiers engagés par notre État créeront pour nous. Qui soutiendrons-nous ?"
 artifice_events.1.a:0 "La Philosophie des Inventions Brillantes"
 artifice_events.1.b:0 "La Philosophie de la Techno-Thaumaturgie"
 artifice_events.1.c:0 "La Philosophie du Mécanisme"

 artifice_events.4.d:0 "Puisque les $ESTATE_ARTIFICERS$ de notre État sont directement contrôlés par nous, il n'y aura pas de querelles entre les philosophies de la Brillance, de la Techno-Thaumaturgie et du Mécanisme en ce qui concerne l'artisanat magique au bénéfice de l'État. Dans notre pays, ils travaillent comme un seul homme.\nNos Artificiers d'État peuvent être dirigés vers la recherche dans les domaines de :\n\nSociété et Commerce, créant des Inventions pour l'usage du commun des mortels ou poussant nos capacités économiques.\n\nIndustrie et État, créant des Inventions qui nous permettent d'industrialiser ou de moderniser notre État.\n\nGuerre et Armements, créant des Inventions pour le champ de bataille, des machines de guerre mortelles aux nouvelles armes pour nos soldats.\n\nQue sera-ce cette fois ?"
 artifice_events.4.dragon:0 "Puisque le [Root.GetDragon CommandName] contrôle directement tous les artificiers, il n'y aura pas de querelles entre les philosophies de la Brillance, de la Techno-Thaumaturgie et du Mécanisme en ce qui concerne l'artisanat magique au bénéfice de l'État. Dans notre pays, ils travaillent comme un seul homme.\nNos Artificiers d'État peuvent être dirigés vers la recherche dans les domaines de :\n\nSociété et Commerce, créant des Inventions pour l'usage du commun des mortels ou poussant nos capacités économiques.\n\nIndustrie et État, créant des Inventions qui nous permettent d'industrialiser ou de moderniser notre État.\n\nGuerre et Armements, créant des Inventions pour le champ de bataille, des machines de guerre mortelles aux nouvelles armes pour nos soldats.\n\nQue sera-ce cette fois ?"

