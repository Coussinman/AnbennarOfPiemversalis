 #Magic/Artificery Selection
 magic_artificery_setup.1.t:0 "L'Ère de l'Artisanat Magique"
 magic_artificery_setup.1.d:0 "Un mage-guerrier est réduit en cendres par un laser lointain. Un ouvrier robotique est alimenté par la Damestear et la graisse. Une relique ancienne est déconstruite et enfin comprise. En bref : érudits, ingénieurs, philosophes et inventeurs domestiquent la magie du monde. Puis ils placent ces magies dans des objets que n'importe qui peut utiliser.\n\nPartout dans le monde, l'ère de l'artisanat magique prend vie dans une étincelle. Pendant des siècles, les artificiers n'ont été vus que comme des curiosités : un étrange petit groupe de mages employés uniquement par les gnomes, puis les kobolds, puis les gobelins. Mais maintenant, alors que la fabrication de masse et la méthode scientifique s'emparent de Halann, les artificiers deviennent plus puissants que quiconque ne l'aurait imaginé. Avec la Damestear, les reliques, l'ivoire, la porcelaine, le fer, l'acier, le mithril et bien plus encore voyageant le long de vastes nouveaux réseaux commerciaux, des inventions sont créées qui ébranlent les sociétés magiques jusqu'à leur cœur. [Root.GetTag.GetName] doit maintenant déterminer sa place dans cette équation.\n\nPlusieurs approches possibles se présentent maintenant. La première est d'embrasser l'artisanat magique, de cesser tout mécénat officiel des mages dans notre société, et de plonger entièrement dans la science que nous croyons être l'avenir. Alternativement, nous pouvons rejeter ce nouvel art : au lieu de gaspiller notre surplus de Damestear et de reliques sur une vision fantasque de la modernité, nous pouvons utiliser ces ressources vitales pour renforcer nos mages. Ou, finalement, nous pouvons essayer de combiner les vertus des deux : nous investirions partiellement dans les mages et partiellement dans les artificiers, ne recevant les pleins avantages ni des uns ni des autres tout en leur permettant de coexister.\n\nNous sommes à la croisée des chemins, et nous devons prendre une décision permanente. Que choisit [Root.Monarch.GetName] ? Serons-nous une nation entièrement d'artificiers, entièrement de mages, ou un peu des deux ?"
 magic_artificery_setup.1.a:0 "Nous sommes une nation de mages, pas d'artificiers !"
 force_magic_only_tt:0 "Vous garderez l'état des mages à pleine puissance, et n'aurez pas l'état des artificiers."
 magic_artificery_setup.1.b:0 "Nous sommes une nation qui peut accueillir à la fois artificiers et mages !"
 force_mixed_tt:0 "Vous aurez les états des mages et des artificiers, mais les deux seront plus faibles que si vous vous étiez spécialisé dans l'un ou l'autre."
 magic_artificery_setup.1.c:0 "Nous sommes une nation d'artificiers, pas de mages !"
 force_artificery_only_tt:0 "Vous obtiendrez l'état des artificiers, et perdrez l'état des mages."
 magic_artificery_setup.1.g:0 "Nous sommes une nation de mages, pas d'artificiers !"
 magic_artificery_setup.1.e:0 "Nous sommes une nation qui peut accueillir à la fois artificiers et mages !"
 magic_artificery_setup.1.f:0 "Nous sommes une nation d'artificiers, pas de mages !"
 unlocked_mode_tt:0 "Des circonstances spéciales ont débloqué cette option."
 magic_artificery_setup.2.t:0 "La Constitution de l'Artisanat Magique de [Root.GetTag.GetName]"
 magic_artificery_setup.2.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] a officiellement déclaré que l'artisanat magique sera soutenu par l'État. Maintenant, nous devons déterminer ce que cela signifie réellement. Trois organisations, toutes rivalisant pour s'attirer les faveurs des nations à travers le monde, sollicitent [Root.GetTag.GetName] pour un soutien officiel. Elles promettent chacune des inventions et innovations dont nous ne pourrions jamais rêver : et chacune requiert un financement dont nous ne voulons pas rêver. Nous ne pouvons nous permettre d'en patronner qu'une seule, notre choix doit donc être fait avec soin.\n\nNotre première option, la Société des Inventeurs Brillants, sert de symbole prestigieux de tout l'artisanat magique. Ils font fi de la prudence, donnant à leurs membres « Brillantistes » une pleine liberté créative : et avec cette liberté, ils ont inventé les machines les plus emblématiques de Halann. Investissez en eux, et ils pourraient créer des technologies révolutionnaires comme le Moteur à Étincelles ou l'Émetteur-récepteur à Ondes-T... ou ils pourraient se laisser distraire et proposer quelque chose de totalement inutile. Travailler avec les Brillantistes, c'est faire confiance à quelque chose que vous ne pouvez pas contrôler.\n\nNotre deuxième option, les Techno-Thaumaturges, sont l'opposé : philosophes autant qu'inventeurs, ils voient l'artisanat magique simplement comme une branche plus scientifique de la magie traditionnelle. Investissez en eux, et ils étudieront en s'inspirant des mages, administrateurs et érudits. Travailler avec les Techno-Thaumaturges, c'est les voir travailler lentement, délibérément et consciencieusement sur ce que l'État veut qu'ils fassent.\n\nNotre troisième option, les Guildes Mécanistes, est une coalition lâche des artisans et ingénieurs de [Root.GetTag.GetName]. Investissez en eux, et ils rechercheront assez rapidement, et nous laisseront une quantité raisonnable de contrôle sur ce que leurs artificiers créent. Travailler avec les Mécanistes, c'est privilégier la praticité.\n\nAvec ces organisations en tête : qui [Root.Monarch.GetName] choisit-il de patronner et soutenir ?"
 magic_artificery_setup.2.a:0 "Les Brillantistes, pour une vitesse spontanée !"
 magic_artificery_setup_2_fast_tt:0 "La Société des Inventeurs Brillants peut rechercher une invention tous les 5 ans, mais vous aurez très peu de choix sur ce qu'ils inventent. §RNOTE : CETTE DÉCISION EST PERMANENTE !§!"
 magic_artificery_setup.2.b:0 "Les Mécanistes, pour des objectifs pratiques !"
 magic_artificery_setup_2_medium_tt:0 "Les Guildes Mécanistes peuvent rechercher une invention tous les 10 ans, et vous donnent un contrôle modéré sur ce qu'ils inventent. §RNOTE : CETTE DÉCISION EST PERMANENTE !§!"
 magic_artificery_setup.2.c:0 "Les Techno-Thaumaturges, pour une contemplation soignée !"
 magic_artificery_setup_2_slow_tt:0 "Les Techno-Thaumaturges peuvent rechercher une invention tous les 15 ans. Vous pourrez choisir quel type d'invention ils feront (société, militaire ou économique), puis vous pourrez choisir parmi de nombreuses options dans cette catégorie. §RNOTE : CETTE DÉCISION EST PERMANENTE !§!"
 magic_artificery_setup.2.e:0 "Le Commandement du Dragon"
 magic_artificery_setup.2.f:0 "Le Décombobulatorium"
 magic_artificery_setup_2_disco_tt: "Pas de contrôle, pas de direction, pur chaos ! Ils peuvent rechercher une invention tous les 5 ans"
 magic_artificery_setup.2.g:0 "Nous ne pouvons confier le privilège de l'artisanat magique qu'aux élus de Surael !"
 magic_artificery_setup_2_elf_tt:0 "Les Élus pourront rechercher une invention tous les 10 ans et vous donneront un contrôle modéré sur ce qu'ils recherchent."
 magic_artificery_setup.2.h:0 "Le Cadre d'Ingénierie Shuimu"
 organization_feiten_shuimu_cadre_tt:0 "Bien qu'organisation naissante n'ayant que récemment reçu faveur et confiance du [Root.Monarch.GetTitle], les responsabilités du Cadre d'Ingénierie Shuimu sont primordiales. Avant tout, leur mission est de maintenir notre flotte aérienne opérationnelle et de stimuler son développement, car nos ballons sont notre principal avantage sur nos rivaux. Les complexités et difficultés pour y parvenir ne peuvent être négligées, et nous devons veiller à ne pas surmener leurs capacités, sous peine de nous écraser et brûler sans cérémonie."
