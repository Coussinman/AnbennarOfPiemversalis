Khugra_The_Sapphire_of_Sarhal_title:0 "Khugra, le Saphir de Sarhal"
Khugra_The_Sapphire_of_Sarhal:0 "Khugra, le Saphir de Sarhal"
Khugra_The_Sapphire_of_Sarhal_desc:0 "--------------\nKhugra, que l'on nomme le Saphir de Sarhal, constitue le port principal des hommes-lézards et le lien vital qui relie l'ensemble de la région au monde extérieur. La cité s'élève à l'embouchure du fleuve Adzalaz, artère commerciale majeure qui unit les territoires intérieurs à la mer. D'imposantes plateformes de bois et des quais fortifiés, enduits de résine et de chitine de créatures marines, accueillent les navires chargés de marchandises exotiques. Les édifices de pierre, renforcés par des runes protectrices et des couches de laque, résistent au climat chaud et humide de ces contrées. Des passages étroits serpentent entre les bâtiments, menant aux marchés, aux docks et aux assemblées secrètes des alliances commerciales. \nKhugra se dresse au carrefour des trois forces dominantes de la région : les partis Rouge, Or et Vert. Leur influence imprègne chaque aspect de l'existence quotidienne : le Parti Rouge s'appuie sur les guerriers et les mercenaires, le Parti Or contrôle le négoce et les finances, tandis que le Parti Vert demeure lié aux prêtres et aux cultes de la nature. La cité maintient un équilibre délicat entre leurs intrigues, préservant ainsi son rôle de carrefour neutre du pouvoir et du commerce."

Zerat_war_academy_title:0 "Zerat, la Capitale du Nord"
Zerat_war_academy:0 "Zerat, la Capitale du Nord"
Zerat_war_academy_desc:0 "--------------\nZerat, établie sur les îles du gigantesque lac Lasadza, demeure le centre des tribus septentrionales des hommes-lézards depuis des temps immémoriaux. Cette cité militarisée constitue un bastion essentiel dans la lutte éternelle contre les Khétarques. En son cœur se dresse la Zatsarya la mieux préservée, une antique flèche dont les mécanismes fonctionnent partiellement, bien que des savoirs perdus empêchent son activation complète. Zerat est gouvernée par les Suprêmes Seigneurs de Guerre, et les vertus martiales imprègnent chaque aspect de l'existence. \nAu-delà de sa puissance militaire, la cité jouit d'une renommée considérable pour ses forgerons, ses alchimistes et ses rituels sacrés. Elle constitue une forteresse imprenable qui exerce sa domination sur tout le nord de la région."

Shargra_Artificery_guild_title:0 "Shargra, la tribu la plus novatrice"
Shargra_Artificery_guild:0 "Guilde d'Artisanat Magique de Shargra"
Shargra_Artificery_guild_desc:0 "--------------\nShangra représente la tribu la plus avancée des hommes-lézards, pionnière dans les technologies de l'artisanat magique. Ses membres sont dépourvus de griffes acérées et robustes, ce qui diminue leurs aptitudes au combat mais fait d'eux des artisans virtuoses du travail de précision. Au fil du temps, Shangra est devenue un havre pour les griffes-douces, qui y trouvent un lieu où leurs talents sont véritablement appréciés. La cité est dominée par les inventeurs, les artisans et les artificiers, car la force brute a cédé la place à l'intellect et à la maîtrise des arts."

serpent_palace_title:0 "Palais du Serpent de Shalazar"
serpent_palace:0 "Palais du Serpent de Shalazar"
serpent_palace_desc:0 "--------------\nShalazar est l'antique et majestueuse capitale orientale des hommes-lézards, établie sur les îles du lac Khusadza. Cette cité sacrée abrite les Nagas, des hommes-lézards serpentiformes dotés d'un immense potentiel magique. Elle constitue non seulement un centre de savoir magique et de traditions spirituelles, mais également le siège de l'autorité suprême du monde saurien. \nAu cœur de Shalazar se dresse le Palais du Serpent, résidence de tous les empereurs des hommes-lézards. Ce grandiose complexe, ceint de barrières magiques et de statues rituelles, sert depuis longtemps de centre décisionnel de l'empire. Ses salles sont ornées de colonnes sinueuses représentant les grands Nagas du passé, tandis que ses jardins intérieurs regorgent de plantes exotiques et de canaux où glissent gracieusement les serpents sacrés."

Great_Zatsarya_title:0 "Grande Zatsarya de Shalazar"
Great_Zatsarya:0 "Grande Zatsarya de Shalazar"
Great_Zatsarya_desc:0 "--------------\nSur le cap septentrional du lac s'élève le Grand Temple de Shalazar, l'un des plus anciens lieux de culte de l'empire. Au-dessus de ses ziggourats jumelles, les Naga-Hatesh, flottent des bannières fourchues multicolores symbolisant les nobles lignées des Nagas. \nÀ la base du temple repose le monolithe en ruines de la Zatsarya, relique d'une ère antique qui garde des secrets depuis longtemps oubliés. Durant des millénaires, le temple attira des pèlerins de tout Taneyas, mais il y a cinq siècles, Raktaiya Ashaktiz transforma sa salle orientale en un véritable musée de la vie ancienne. Il l'orna des restes fossilisés de poissons et de reptiles géants, exhumés dans les carrières de schiste d'Ashakani, et désormais le temple attire non seulement des prêtres, mais aussi des naturalistes, des alchimistes et des érudits venus de tous les horizons du monde."

guild_of_hydromancers_title:0 "Guilde des Hydromanciens de Karshyr"
guild_of_hydromancers:0 "Guilde des Hydromanciens de Karshyr"
guild_of_hydromancers_desc:0 "--------------\nLa Guilde des Hydromanciens de Karshyra est établie dans le cratère d'un volcan endormi, où les mages canalisent la puissance des eaux pour contrôler les mers, les pluies et les plantations sous-marines. Ils apaisent les tempêtes pour assurer une navigation sûre, invoquent la pluie pour les champs et créent des teintures rares dans les Maisons de Teinturerie. \nLeur magie garantit la prospérité de Karshirai, faisant de la guilde l'une des institutions les plus influentes de l'archipel. Ils sont vénérés comme les protecteurs des marins et des cultivateurs, et leur parole porte un poids considérable, même parmi les souverains."

Akhanekas_Fortress_against_curse_title:0 "Bouclier contre les Ténèbres"
Akhanekas_Fortress_against_curse:0 "Bouclier contre les Ténèbres"
Akhanekas_Fortress_against_curse_desc:0 "--------------\nAkhanekas constitue le dernier bastion des hommes-lézards, gardant la frontière contre les ténèbres rampantes de Yezel Mora. Ses murailles imposantes contiennent les trolls maudits, dont les volontés ont été brisées par les sinistres Guenaudes des marécages noircis. \nCes créatures implacables attaquent en vagues incessantes, cherchant à percer les défenses de la forteresse pour répandre leur corruption. Si Akhanekas venait à tomber, les hommes-lézards subiraient le même sort que les trolls : asservis à une volonté qui n'est pas la leur, enchaînés pour l'éternité au service de l'abîme."

Giantickin_Skeleton_title:0 "Squelette de Gigantickin"
Giantickin_Skeleton:0 "Squelette de Gigantickin"
Giantickin_Skeleton_desc:0 "--------------\nAlors qu'il menait des recherches dans les marécages, un druide mit au jour le squelette d'une massive créature antique et ressentit immédiatement une connexion primordiale avec ces ossements. Par un labeur inlassable, il réassembla les restes, stupéfiant les villageois avec une illusion de sa splendeur passée. La nouvelle de cette découverte se répandit rapidement, inspirant d'autres à rechercher des créatures similaires. Ces êtres titanesques, désormais appelés les gigantickin, demeurent insaisissables ; aucun n'a encore été trouvé vivant. Cependant, leurs squelettes sont devenus des symboles de puissance, influençant les armures militaires et les rituels. Les guerriers croient qu'en imitant ces créatures anciennes, ils peuvent hériter de leur force."

Slave_market_title:0 "§RLe Bazar de la Perle§"
Slave_market:0 "Le Bazar de la Perle"
Slave_market_desc:0 "--------------\nLe Bazar de la Perle est une merveille véritablement unique parmi les marchés, un lieu où le luxe et la cruauté s'entremêlent. Orné de détails provenant des quatre coins du monde, il incarne la splendeur architecturale du Boulevard, le raffinement de Sarhal, la grandeur du Rahen et le savoir-faire du Bomdan. En son centre même se trouve un mandala composé de 10 001 perles parfaites, dont l'éclat éblouissant a donné son nom à ce lieu renommé. \nCe marché n'est pas un simple lieu de commerce mais le cœur même du trafic d'esclaves de l'archipel. Ici se trouve le quartier général de la Guilde des Esclavagistes de Vanndiffa, qui supervise le flux de bétail humain à travers toute la région. Jour après jour, sous les voûtes du bazar, des accords sont conclus qui altèrent le destin de milliers d'âmes, des esclaves ordinaires à ceux dont la valeur se mesure en coffres d'or. \nCependant, la véritable attraction du Bazar de la Perle réside dans ses esclaves d'exception, des individus rares dont les talents ou la lignée les rendent très recherchés par les nobles, les temples et les puissants souverains. Lors des rares occasions où un tel esclave est mis aux enchères, la vente n'est pas seulement observée par les marchands, mais aussi par les émissaires des monarques, désireux d'assurer l'intégrité de la transaction ou de réclamer leur part des profits. Ces jours-là, la Salle des Échanges se remplit de l'élite de l'archipel, où, autour de coupes de vin épicé, se prennent des décisions qui façonnent non seulement des destins individuels, mais le sort de nations entières."

sosal_palace_title:0 "Académie de Guerre d'Aakhet"
sosal_palace:0 "Académie de Guerre d'Aakhet"
sosal_palace_desc:0 "--------------\nAu centre de la tradition martiale et arcanique d'Aramoole se dresse l'Académie de Guerre d'Aakhet, une institution légendaire où sont forgés les plus grands mages de bataille et généraux de la nation. Fondée par le puissant Aakhet lui-même, cette citadelle de guerre et de savoir garantit que seuls les individus les plus compétents, disciplinés et magiquement doués s'élèvent au commandement. \nBâtie de bronze enchanté et d'obsidienne, ses vastes salles regorgent de reliques des guerres passées, et ses terrains d'entraînement résonnent du fracas de l'acier et du rugissement de la magie élémentaire. Les aspirants mages de bataille subissent des épreuves éprouvantes, maîtrisant à la fois la lame et l'art des sorts sous le regard vigilant de seigneurs de guerre chevronnés. Seuls les plus forts en émergent, trempés par le feu et l'adversité, prêts à commander armées et nations. L'Académie sert également de cœur à la Stratocratie de Bronze d'Aramoole, où les prouesses militaires déterminent le pouvoir. Les généraux qui font leurs preuves sur le champ de bataille s'élèvent comme dirigeants, garantissant que l'État demeure toujours prêt pour la guerre. Dans ses chambres les plus profondes, les doctrines de bataille sont affinées, mêlant stratégie et sortilèges pour créer une machine de guerre invincible."

plaa_maat_title:0 "Les Plumes de Ma'at"
plaa_maat:0 "Les Plumes de Ma'at"
plaa_maat_desc:0 "--------------\nL'Ordre des Plumes de Ma'at est une sororité sacrée de guerrières harpies, vouées au service de Nirakhet, incarnation de l'ordre absolu et de la justice suprême. Leur foi est inébranlable, et leurs lames sont les instruments de sa volonté. \nLeur style de combat est un mélange de grâce aérienne et de discipline parfaite. Elles planent au-dessus du champ de bataille, fondant sur leurs ennemis avec précision et célérité, maniant des formations aussi acérées que leurs lames. Leurs tactiques reposent sur une coordination stricte, des frappes rapides et une croyance inébranlable en la justesse de leur cause. Elles ne combattent ni pour la gloire ni pour la conquête : leur devoir est sacré et absolu. \nLà où les Plumes de Ma'at apparaissent, l'anarchie se dissipe et la justice est restaurée. Elles ne répondent à aucun roi et ne marchent pas pour l'or ; elles agissent uniquement selon la loi éternelle de Nirakhet. Leur jugement est définitif, leur châtiment est prompt, car elles sont les porteuses de la vérité pure et immaculée."

Mazu_Makhara_title:0 "Mazu Makhara : la Matrice des Ombres"
Mazu_Makhara:0 "Mazu Makhara : la Matrice des Ombres"
Mazu_Makhara_desc:0 "--------------\nLà où le sable du désert rencontre les prairies calcinées, les vestiges croulants de Mazu Makhara s'élèvent telle une cicatrice oubliée sur la terre. Jadis un grand palais des djinns, ses salles sont depuis longtemps tombées en ruines, ensevelies sous le poids du temps. Désormais, des anneaux d'obsidienne dentelée ceignent son dôme effondré, et le sol est jonché des restes des occupants passés : reliques gnolles, outils brisés et ossements de ceux qui s'y sont attardés trop longtemps. \nMais Mazu Makhara n'est pas silencieux. Il vibre d'une énergie sombre et agitée, ses ruines imprégnées de pouvoir démoniaque. Des murmures résonnent à travers ses salles, promettant à la fois ruine et domination à ceux qui prêtent l'oreille. Depuis longtemps, les occultistes cherchent à s'emparer de ce lieu, attirés par sa pulsation sinistre. Ici, ils scellent des pactes avec l'invisible, forgeant des alliances avec des entités qui dépassent la compréhension mortelle. Ils l'appellent la Matrice des Ombres, car elle enfante le pouvoir aussi aisément qu'elle consume ceux qui s'aventurent trop loin. \nÀ présent, ils se présentent à nouveau devant nous, désireux de restaurer Mazu Makhara à un semblant de sa gloire passée. Ils souhaitent étendre la colonie à sa lisière, tisser sa magie dans la trame de leur domination grandissante. En retour, ils promettent une plus grande dévotion à leurs arts ténébreux, garantissant que les ruines ne se contenteront pas de ressurgir du passé, mais deviendront quelque chose de plus grand, de plus sombre, d'imparable."

Saikinoma_Citadel_of_the_Waves_title:0 "§dSaikinoma : Citadelle des Vagues§"
Saikinoma_Citadel_of_the_Waves:0 "§dSaikinoma : Citadelle des Vagues§"
Saikinoma_Citadel_of_the_Waves_desc:0 "--------------\nJadis, la cité de Zuvavim portait le nom de Saikinoma, l'une des grandes anánoma de Vizembi. Ces forteresses-coffres servaient non seulement d'abris mais aussi de centres de la culture halfeline, du commerce et du pouvoir. Saikinoma était le joyau parmi elles, gardant les mers méridionales et reliant les caravanes et les navires des confins les plus lointains du monde. \nCependant, les temps changèrent. Les humains vinrent en ces terres, et les anánoma tombèrent. De nombreux halfelins furent contraints de quitter leur patrie, mais certains demeurèrent, fusionnant avec les nouveaux maîtres et préservant leur héritage dans les navires, les marchés et les traditions maritimes. Au fil du temps, Zuvavim devint indépendante et grandit jusqu'à devenir une grande puissance commerciale et navale ; pourtant, l'ombre de Saikinoma plane encore sur ses rues, rappel de sa gloire passée."

Zirrbit_title:0 "Conclave des Jurés-des-Dunes"
Zirrbit:0 "Conclave des Jurés-des-Dunes"
Zirrbit_desc:0 "--------------\nAu milieu des sables mouvants et des vents brûlants, les mages gnolls du Conclave des Jurés-des-Dunes tissent leur magie en défiant la cruauté du désert. Rassemblés en cercles rituels sous le soleil et les étoiles, ils psalmodient des incantations oubliées, leurs griffes traçant des sigils de pouvoir dans la poussière. Leur objectif n'est pas la simple survie : ils recherchent la domination sur l'étendue aride, pour remodeler la terre elle-même. \nPar un labeur acharné, ils invoquent les eaux cachées, font jaillir la vie d'un sol stérile et taillent des sanctuaires d'ombre et de verdure là où rien ne devrait exister. Leur progression est lente, car le désert est un adversaire implacable, toujours affamé de reprendre ce qu'ils bâtissent. Pourtant, à chaque sort lancé et chaque grain de sable rendu fertile, leur vision se rapproche de la réalité. \nLes Jurés-des-Dunes conquériront-ils les terres désolées et forgeront-ils un paradis dans les dunes, ou les sables éternellement affamés engloutiront-ils leurs ambitions, comme ils l'ont fait pour tant d'autres avant eux ?"

Dakneender_city_title:0 "Dahvaral : carrefour des civilisations"
Dakneender_city:0 "Dahvaral : carrefour des civilisations"
Dakneender_city_desc:0 "--------------\nDahvaral se dresse au carrefour des civilisations. Ici, l'Orient rencontre l'Occident, et le Nord s'entrelace avec le Sud, créant un creuset de cultures, de traditions et de croyances. Située à l'intersection des plus grandes routes commerciales, elle est devenue un lieu où les caravanes chargées de soies rares, d'épices et de trésors croisent philosophes, érudits et pèlerins en quête de vérité. \nLa cité naquit d'une ancienne garnison militaire mais se transforma au fil du temps en un cœur de commerce, d'intrigues politiques et de quêtes spirituelles. Temples et dômes dédiés à différents dieux s'élèvent au-dessus de l'horizon, tandis que des prières en dizaines de langues emplissent l'air matinal. Les rues grouillent de voyageurs venus de contrées lointaines. Les grands marchés de Dahvaral regorgent des senteurs d'encens exotiques et des voix de marchands négociant le prix de l'ambre, des manuscrits rares et des artefacts anciens. \nMais Dahvaral ne se résume pas à l'or et au commerce. C'est une cité de sages, où les écoles philosophiques et les traditions religieuses s'entrecroisent. Au fil des siècles, deux grandes doctrines ont pris forme entre ses murs : les enseignements austères du Palais d'Or, qui exigent un service absolu à l'autorité, et la philosophie pragmatique du Turban de Soie, qui exalte l'accumulation des richesses et la construction au bénéfice de la société. Cependant, il n'y a pas de place pour le fanatisme à Dahvaral ; ici, la liberté de pensée est chérie, permettant à chacun de suivre sa propre voie, qu'elle soit celle d'un marchand, d'un moine ou d'un érudit."

first_empire_throne_title:0 "Trône du Premier Empire"
first_empire_throne:0 "Trône du Premier Empire"
first_empire_throne_desc:0 "--------------\nAu cœur de Sigilan, l'antique capitale de la Fangaula, se dresse le Grand Trône du Premier Empire, symbole de puissance, de tradition et de l'héritage indestructible des ancêtres. Ce monument, sculpté dans du bois noir et orné de motifs dorés, repose sur d'imposantes défenses d'éléphant, symbolisant la force de l'empire. Au-dessus du trône s'élève un dais de soie brodé d'argent, tandis qu'à sa base, deux chevaux blancs et des béliers rituels se tiennent en gardiens éternels contre les mauvais esprits et l'infortune. \nC'est ici, sur ce trône, que les plus grands souverains de la Fangaula ont façonné le destin de leur peuple. Chaque nouvel empereur subissait un rituel d'initiation sacré : le Grand Prêtre oignait son front avec l'huile de la corne mythique de l'Abada, une protection contre les poisons et les maladies, avant que le monarque ne prenne solennellement place au milieu des chants de la cour et de l'appel retentissant des tambours de guerre. C'était l'instant où la cour tout entière, l'armée et le peuple comprenaient que la Fangaula perdurait et que son héritage demeurait inébranlable. \nDésormais, le Grand Trône de Sigilan est devenu non seulement un symbole d'autorité mais aussi le cœur même de la politique impériale. Les ambassadeurs de contrées lointaines, des principautés montagnardes du nord aux royaumes des steppes du sud, inclinent la tête devant sa magnificence, sachant qu'ils se tiennent devant les véritables héritiers de cette terre."

Golcora_gold_mines_title:0 "§YAtelier Monétaire de Khétérata§"
Golcora_gold_mines:0 "§YAtelier Monétaire de Khétérata§"
Golcora_gold_mines_desc:0 "--------------\nL'Atelier Monétaire de Khétérata est le berceau de l'économie humaine, le plus ancien centre de frappe monétaire et le lieu de naissance de la puissance économique du plus ancien empire humain. C'est ici, au grand cœur de Khétérata, que furent frappées les premières pièces d'or, posant les fondations du commerce et de l'autorité. \nSelon la légende, Elikhet lui-même, fondateur de Khétérata et souverain divin de l'antiquité, créa personnellement les mines d'or dans les collines de Golkokra. Il guida les eaux du Chagrin-de-la-Mère pour qu'elles fendent la pierre et emportent la terre, révélant l'or le plus pur dont furent frappées les premières pièces. Ces pièces n'étaient pas un simple moyen d'échange : elles étaient la marque de la volonté divine, une garantie de force et de stabilité. \nD'énormes fourneaux de fonte crachent des flammes, tandis qu'innombrables ouvriers versent le métal en fusion dans les moules, créant un spectacle qui inspire la crainte respectueuse. Chaque coup de marteau résonne à travers les salles, où des inscriptions relatent les premiers accords commerciaux et les routes marchandes reliant Khétérata aux terres lointaines. \nCe monument rappelle que la richesse et la puissance de Khétérata ne reposent pas seulement sur la force de ses guerriers, mais aussi sur la sagesse de ses artisans, la grandeur de sa monnaie et l'héritage immortel de son créateur antique."

Throne_of_gnollkind_title:0 "Gnolllakaz : Forteresse des Gnolls"
Throne_of_gnollkind:0 "Gnolllakaz : Forteresse des Gnolls"
Throne_of_gnollkind_desc:0 "--------------\nLorsque Grizaka se proclama Impératrice des Gnolls, elle eut besoin d'une place forte qui symboliserait l'aube d'un nouvel ordre. Ainsi fut bâtie Gnolllakaz, une imposante forteresse sur les rives du Chagrin-de-la-Mère, première pierre angulaire du grand Konolkhatep. \nGnolllakaz n'était pas simplement une citadelle imprenable mais le cœur d'où les armées gnolles, sous les bannières de l'empereur, partaient conquérir Khétérata. Depuis ses murs furent lancées de grandes campagnes, attirant d'innombrables tributaires et captifs, formant les fondations de la Maison des Chaînes d'Or, où les esclaves impériaux administraient les vastes territoires du domaine grandissant. \nMais Gnolllakaz était plus qu'une forteresse de guerre : elle devint la Gardienne du Chagrin, un site sacré pour ceux qui vénéraient le Khet. Ici, les gnolls adoptèrent une tolérance singulière envers les diverses sectes du khétisme, assurant l'unité religieuse et la stabilité dans les terres nouvellement conquises. \nAu fil du temps, alors que les gnolls cessaient leurs raids sur Khétérata et consolidaient leur domination, Gnolllakaz devint un symbole de paix, des montagnes jusqu'à la mer. Les guerriers qui jadis apportaient la destruction patrouillaient désormais les routes, instaurant ordre et prospérité. Les bannières rouge profond, autrefois signes de terreur, devinrent un gage de sécurité et de bonne fortune pour les marchands et les voyageurs."

city_build_by_slaves_title:0 "Yetmesira : une cité bâtie sur les ossements"
city_build_by_slaves:0 "Yetmesira : une cité bâtie sur les ossements"
city_build_by_slaves_desc:0 "--------------\nYetmesira n'est pas une simple cité : c'est un monument à l'ambition, à la cupidité et à la soif insatiable de pouvoir. Bâtie par des esclaves pour leurs maîtres, elle s'éleva sur le sang et la souffrance de ceux qui ne vécurent jamais assez pour voir son achèvement. Les imposantes murailles de pierre qui gardent aujourd'hui ses rivages dissimulent une vérité sinistre : chaque brique, chaque colonne, chaque pont fut payé par la vie des asservis, ensevelis sous ses fondations. \nLa construction de Yetmesira débuta après la conquête des terres Fetengoni, lorsque des milliers de captifs furent conduits vers la côte. On leur promit la liberté une fois leur labeur accompli, mais aucun ne vécut assez longtemps pour la réclamer. Ceux qui succombaient à l'épuisement n'étaient pas simplement jetés : leurs corps étaient mêlés au mortier, leurs os réduits en poussière, leur sang scellant les fondations mêmes de la cité. \nAujourd'hui, Yetmesira prospère, ses marchés débordant d'or, d'épices et d'ivoire. Mais chaque pierre de ses rues murmure le passé. Ceux qui connaissent sa véritable histoire l'entendent au cœur de la nuit : les échos de pas enchaînés, les prières désespérées pour la liberté, et les murmures des morts, se mêlant au fracas des vagues."

Kiumbanda_Counsel_title:0 "Le Conseil de Kiumbanda"
Kiumbanda_Counsel:0 "Le Conseil de Kiumbanda"
Kiumbanda_Counsel_desc:0 "\nAu plus profond des quartiers du temple de Kiumbanda, parmi des murs gravés d'incantations anciennes, se dresse un monument symbolisant le pouvoir du savoir spirituel et le rôle inébranlable des prêtresses dans le gouvernement de l'État. Le Conseil de Kiumbanda est le cœur de la société, où les plus éminentes guérisseuses, devineresses et herboristes se rassemblent pour guider le destin de la cité et de ses dirigeants. \nAu centre du Conseil s'élève la Pierre d'Humilité, un monolithe d'obsidienne polie à la base duquel sont déposées des offrandes d'or, d'encens et de parchemins sacrés. Ici, richesse et titres n'ont aucune valeur : seuls comptent le savoir et la dévotion aux esprits. Le long des murs sont disposées des coupes remplies d'huile de lampe, dans lesquelles les têtes des initiées sont plongées, scellant leur lien avec le royaume des ancêtres. \nÀ l'entrée du temple se tiennent les prêtresses de Kiumbanda, vêtues de robes simples mais majestueuses. Elles n'acceptent pas de pièces, seulement des offrandes de sang et de sueur, de labeur et de loyauté. Nul commandement tonitruant n'est donné ici, nulle arme ne brille à la lueur des torches. Au lieu de cela, le Conseil gouverne la politique de la cité dans les murmures, façonnant le destin de nations entières par une persuasion subtile et des assemblées secrètes. \nPour les dirigeants de Kiumbanda, ce Conseil n'est pas simplement une assemblée de sages mais l'unique voie pour conserver le pouvoir. Ils ne peuvent régner sans la bénédiction des prêtresses. Un seul faux pas, et le silence s'abat sur les salles du Conseil, un silence qui annonce une chute inévitable."

Emerald_of_the_Seas_title:0 "L'Émeraude des Mers"
Emerald_of_the_Seas:0 "L'Émeraude des Mers"
Emerald_of_the_Seas_desc:0 "\nLorsque Jesak la Chercheuse-de-Dieux entra dans Karassk portant la grande émeraude, elle la déclara phare d'une voie nouvelle qui mènerait la cité vers la grandeur. Cette gemme, scintillant de toutes les teintes de la mer profonde, devint non seulement un symbole de l'ambition karassienne mais aussi la fondation de l'édifice le plus grandiose de la cité : le phare connu sous le nom d'Émeraude des Mers. \nPerché au sommet d'une falaise vertigineuse, ce phare se dresse comme un guide radieux pour les marins et un témoignage de la domination de Karassk sur les flots. Même dans les tempêtes les plus violentes, les capitaines affirment voir son éclat percer les ténèbres, les menant vers un havre sûr. \nMais l'Émeraude des Mers est bien plus qu'une simple aide à la navigation. C'est le cœur de la puissance maritime de Karassk, un phare de commerce et de prospérité qui éclipse tous ses rivaux. Les récits de son éclat ont voyagé bien au-delà des mers connues, attirant marchands, aventuriers et, inévitablement, ceux qui convoitent sa radiance. \nNombreux sont ceux qui murmurent que, par les nuits de tempête, la déesse Katesh elle-même peut être aperçue dans les profondeurs de l'émeraude, sa présence bénissant, ou avertissant, ceux qui osent prendre la mer. Et l'histoire se souvient bien du sort de ceux qui cherchèrent à dérober la gemme, pour disparaître sans laisser de trace sous les vagues implacables."

Order_of_the_Tidal_Scales_title:0 "Ordre des Écailles de la Marée"
Order_of_the_Tidal_Scales:0 "Ordre des Écailles de la Marée"
Order_of_the_Tidal_Scales_desc:0 "\nDans les profondeurs abyssales, là où la lumière du soleil n'ose s'aventurer, seuls les forts peuvent régner. Telle est la devise de l'Ordre des Écailles de la Marée, une fraternité d'élite de guerriers reptiliens qui ont maîtrisé à la fois l'art de la guerre et les secrets de la mer. \nL'Ordre trouve ses origines aux premiers jours du règne des Chercheurs-de-Dieux, lorsque les flottes de Karass cherchèrent pour la première fois la domination sur les flots. Confrontés aux pillards rusés de Sarchal et aux seigneurs pirates implacables de Kedwal, les dirigeants de Karass comprirent qu'ils avaient besoin de guerriers capables de frapper depuis les profondeurs, invisibles et imparables. Ainsi naquit l'Ordre, non pas comme de simples soldats, mais comme des chasseurs des abysses, des guerriers capables de disparaître sous les vagues et de réapparaître là où l'ennemi les attendait le moins. \nL'initiation dans l'Ordre est autant une sentence de mort qu'un honneur. Les nouvelles recrues subissent le Rite de l'Abîme, où elles sont jetées dans les grottes inondées sous Karass. Ceux qui reviennent portent les marques des profondeurs : leurs corps affinés par la mer, leurs écailles assombries par l'abîme, leurs esprits à jamais changés par ce qui rôde en contrebas. \nOn dit que Katesh elle-même a béni l'Ordre, leur accordant la Vision Née-des-Marées, un sens surnaturel des courants changeants de l'océan, leur permettant d'anticiper les mouvements ennemis comme si les vagues leur murmuraient des secrets. Vérité ou légende, les guerriers de l'Ordre sont craints à travers les mers, car ils ne combattent pas comme de simples mortels, mais comme des extensions de l'océan lui-même."

gnoll_gold_mines_title:0 "Mines de Golgnolla"
gnoll_gold_mines:0 "Mines de Golgnolla"
gnoll_gold_mines_desc:0 "Si la monnaie fut l'invention de l'antique Khétérata, alors l'esclavage est la sinistre création des gnolls. Et par une cruelle moquerie envers l'humanité, le lieu où la civilisation proclama jadis sa domination gît désormais entre les griffes des monstres. \n\nAutrefois sanctifiées par la main d'Elikhet lui-même, les collines dorées de Golcora étaient source de bénédiction et de prospérité. Mais ces jours ne survivent plus que dans des chroniques couvertes de poussière. Sous la domination gnoll, le berceau de l'or est devenu un enfer de chaînes et de sang. \n\nLà où jadis les artisans œuvraient au nom d'un dessein divin, désormais des esclaves, elfes, nains, humains et même gnolls, sont poussés dans les profondeurs de la terre, leurs cris perdus dans le claquement des fouets et le rugissement des fourneaux qui ne s'éteignent jamais. \n\nLes fonderies brûlent plus intensément que jamais, mais non plus pour l'art ou l'héritage : uniquement pour la cupidité. Les moules à pièces sont toujours emplis d'or, mais ils ne portent plus aucun symbole d'ordre, seulement les marques d'une domination sans merci. \nCe ne sont plus les mines d'Elikhet, mais une parodie pervertie de son don. Un monument non pas à l'héritage, mais à la souffrance. Ici, l'or n'est plus béni : il est saigné."
