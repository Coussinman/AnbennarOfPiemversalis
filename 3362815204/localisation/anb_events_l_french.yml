l_french:
 lilac_wars.1.t:0 "Perdants des Guerres Lilas"
 lilac_wars.1.d:0 "Les Guerres Lilas ne se sont achevées qu'il y a à peine un an et nos blessures sont encore fraîches. Nous avons combattu sous la bannière de la Lune, aux côtés de l'ancienne et très noble Maison de Silmuna, les Grands-Ducs de Damérie. Sous leur règne, la terre aurait enfin connu la paix, mais nous avons été vaincus à cause de la trahison de seigneurs impériaux égoïstes et traîtres."
 lilac_wars.1.a:0 "Nous faisions partie du Parti de la Lune perdant."
 lilac_wars.2.t:0 "Vainqueurs des Guerres Lilas"
 lilac_wars.2.d:0 "Les Guerres Lilas se sont achevées il y a un an et nous avons été victorieux ! Nous avons combattu sous la bannière de la Rose, défendant le droit souverain du trône Lorentais. Nous avons combattu pour maintenir l'équilibre dans Cannor et empêcher l'ancienne et décadente Maison de Silmuna de dominer la terre."
 lilac_wars.2.a:0 "Nous faisions partie du victorieux Parti de la Rose."

 viswall_capital.1.t:0 "Déplacer la Capitale à Mur-de-Vis"
 viswall_capital.1.d:0 "Enfin, nous avons péniblement reconquis les deux moitiés de la cité et nous sommes déclarés comme le nouveau Mur-de-Vis. Dans quelle moitié établirons-nous notre nouvelle capitale ?"
 flavor_viswall.1.a:0 "Mur-de-Vis-Nord"
 flavor_viswall.1.b:0 "Mur-de-Vis-Sud"

 castanorian_citadel.1.t:0 "Reconstruire Bal Vroren"
 castanorian_citadel.1.d:0 "Sur une butte, nichées entre les arbres, gisent les ruines longtemps abandonnées d'une forteresse de pierre blanche. Murs de pierre écroulés et tours creuses font des nids pour oiseaux, ours et vermine plus sinistre. Récemment, cette zone a été dégagée mais le donjon en ruines demeure désolé. Nos ingénieurs voient grand potentiel pour restaurer la forteresse à sa prouesse d'antan. Ils soutiennent que si nous reconstruisons cette forteresse, cela augmentera grandement le potentiel défensif du site. Nos ennemis se briseront sur de splendides murs blancs."
 castanorian_citadel.1.a:0 "La restaurer"
 castanorian_citadel.2.t:0 "Bal Vroren Reconstruite !"
 castanorian_citadel.2.d:0 "Après une année de construction, nous avons enfin restauré l'ancienne citadelle de Bal Vroren. Elle siège maintenant fièrement à son ancienne position et renforcera grandement nos défenses dorénavant."
 castanorian_citadel.2.a:0 "Splendide !"
 castanorian_citadel.3.t:0 "Reconstruire Bal Ouord"
 castanorian_citadel.3.d:0 "La ville de Bal Ouord a grandi autour d'une grande tour blanche. Bien qu'il ait toujours été su que cette tour faisait autrefois partie d'une forteresse encore plus grande. Les fondations sont encore là et elles sont encore solides. Nos ingénieurs voient grand potentiel pour restaurer la forteresse à sa prouesse d'antan. Ils soutiennent que si nous reconstruisons cette forteresse, cela augmentera grandement le potentiel défensif du site. Nos ennemis se briseront sur de splendides murs blancs."
 castanorian_citadel.3.a:0 "La restaurer"
 castanorian_citadel.4.t:0 "Bal Ouord Reconstruite !"
 castanorian_citadel.4.d:0 "Après une année de construction, nous avons enfin restauré l'ancienne citadelle de Bal Ouord. Elle siège maintenant fièrement à son ancienne position et renforcera grandement nos défenses dorénavant."
 castanorian_citadel.4.a:0 "Splendide !"
 castanorian_citadel.5.t:0 "Reconstruire Bal Mire"
 castanorian_citadel.5.d:0 "Perchées sur une petite île dans les marais, dominant la sinueuse rivière Alen, gisent les ruines d'une forteresse. Ses murs blancs se sont effondrés vers l'intérieur et ses tours sont renversées. Toutes sauf une. Même avec cette tour unique, c'est toujours une position magnifiquement défensive. Heureusement, les fondations sont solides et elles sont faites avec expertise. Nos ingénieurs voient grand potentiel pour restaurer la forteresse à sa prouesse d'antan. Ils soutiennent que si nous reconstruisons cette forteresse, cela augmentera grandement le potentiel défensif du site. Nos ennemis se briseront sur de splendides murs blancs."
 castanorian_citadel.5.a:0 "La restaurer"
 castanorian_citadel.6.t:0 "Bal Mire Reconstruite !"
 castanorian_citadel.6.d:0 "Après une année de construction, nous avons enfin restauré l'ancienne citadelle de Bal Mire. Elle siège maintenant fièrement à son ancienne position et renforcera grandement nos défenses dorénavant."
 castanorian_citadel.6.a:0 "Splendide !"
 castanorian_citadel.7.t:0 "Reconstruire la Citadelle-du-Nord"
 castanorian_citadel.7.d:0 "Au pied du puissant Trialmount, gardant les ruines des Épreuves de Castan, siège une forteresse en ruines. Connectée à la cité de Castonath par un aqueduc imposant depuis longtemps écroulé et brisé, les murs autrefois blanc-os de la Citadelle-du-Nord ont longtemps été colonisés par du lierre opportuniste et marqués par le passage du temps. Les fondations sont solides cependant, bâties pour durer d'une époque où les géants marchaient encore librement sur Halann elle-même. Nos ingénieurs voient grand potentiel pour restaurer la forteresse à sa prouesse d'antan. Ils soutiennent que si nous reconstruisons cette forteresse, cela augmentera grandement le potentiel défensif du site, et les ennemis se briseront sur de splendides murs blancs."
 castanorian_citadel.7.a:0 "La restaurer"
 castanorian_citadel.8.t:0 "La Citadelle-du-Nord Reconstruite !"
 castanorian_citadel.8.d:0 "Après une année de construction, nous avons enfin restauré la Citadelle-du-Nord, le siège des anciens empereurs Castanoriens. Elle siège maintenant fièrement à son ancienne position et renforcera grandement nos défenses dorénavant."
 castanorian_citadel.8.a:0 "Splendide !"
 castanorian_citadel.9.t:0 "Reconstruire Bal Dostan"
 castanorian_citadel.9.d:0 "Flanquées par des montagnes siègent les ruines d'une ancienne forteresse, sinistre en comparaison de sa gloire passée. Ayant été reconstruite encore et encore après de nombreuses invasions dans la région, elle s'élèvera une fois de plus d'entre les morts pour compléter la défense presque impénétrable que le terrain fournit."
 castanorian_citadel.9.a:0 "La restaurer"
 castanorian_citadel.10.t:0 "Bal Dostan Reconstruite !"
 castanorian_citadel.10.d:0 "Après une année de construction, nous avons enfin restauré l'ancienne citadelle de Bal Dostan. Elle siège maintenant fièrement à son ancienne position et renforcera grandement nos défenses dorénavant."
 castanorian_citadel.10.a:0 "Splendide !"

 castanorian_citadel.11.t:0 "Reconstruire une Citadelle Castanorienne"
 castanorian_citadel.11.desc:0 "Nous devons choisir une citadelle à restaurer !"
 castanorian_citadel.11.a:0 "Restaurer Bal Vroren !"
 castanorian_citadel.11.b:0 "Restaurer Bal Ouord !"
 castanorian_citadel.11.c:0 "Restaurer Bal Mire !"
 castanorian_citadel.11.d:0 "Restaurer la Citadelle-du-Nord !"
 castanorian_citadel.11.e:0 "Restaurer Bal Dostan !"

 golden_highway.1.t:0 "Construction de la Route Dorée dans [Root.GetName]"
 golden_highway.1.desc:0 "Le soleil brille intensément sur la route dans [Root.GetName]. Ses dalles dégagent un scintillement doré en fin d'après-midi alors que les premiers marchands commencent leurs voyages le long de cette merveille reconstruite. Elle est assez large pour que six hommes marchent de front et que deux chariots se croisent confortablement. C'est déjà un grand atout dans [Root.GetName] et pourtant ce n'est qu'un petit maillon d'une longue chaîne qui renforcera notre nation. Les générations futures s'émerveilleront de ces routes, comme nous nous en émerveillions au temps de Jaher."
 golden_highway.1.a:0 "C'est terminé !"

 gerudia.1.t:0 "Complots du Port des Pillards"
 gerudia.1.d:0 "Dans les années suivant l'interdiction du pillage par Bjarnrík, Revrhavn est devenu le port principal des pillards de la vallée de Dalr. Revrhavn était déjà le port préféré des Pillards, permettant de conserver légalement de vastes trésors. Bien qu'autorisé par une disposition de la couronne, beaucoup de Revrhavnois craignent que leur mode de vie soit menacé.\n\nUn conseil des Pillards, marchands et bourgeois les plus influents s'est réuni pendant l'invasion d'Obrtrol pour décider de ce qui peut être fait. Certains disent que nous devrions exiger directement autonomie et privilèges du Roi Sven II Bjarnnson, tandis que d'autres sont prudents et avertissent que l'antagoniser nous mènera à la ruine. Que devrions-nous faire, [Root.Monarch.GetTitle] ?"
 gerudia.1.a:0 "Confronter le Roi Sven II Bjarnnson, il doit entendre nos demandes !"
 gerudia.1.b:0 "Peut-être que ce n'est pas une bonne idée."
 gerudia.2.t:0 "Revrhavn Exige des Privilèges !"
 gerudia.2.d:0 "Des représentants de Revrhavn ont approché le Roi Sven II Bjarnnson, exigeant une protection accrue du mode de vie du pillage. Ils citent que le royaume de Bjarnrík a empiété sur leur mode de vie ancien et souverain, et ils pensent qu'ils peuvent oser faire de telles demandes en temps de guerre contre nos ennemis primordiaux, les Trolls. Ils ne savent guère qu'il est dans notre meilleur intérêt de maintenir des relations amicales avec les nations extérieures, et que le droit de Revrhavn au pillage est bien protégé sous nos lois et clauses.\n\nComment devrions-nous traiter ces insubordonnés, mon seigneur ?"
 gerudia.2.a:0 "Je signerai leurs demandes, nous avons besoin de leur soutien contre les Trolls."
 gerudia.2.b:0 "Ils ne valent pas mieux que les Trolls. Apportez-moi ma hache, maintenant !"
 gerudia.3.t:0 "Consulter les Skalds"
 gerudia.3.d:0 "Nos officiels sont arrivés dans la cité-temple de Skaldol et ont commencé à converser avec les Skalds sur ce qui peut être fait. Beaucoup de Skalds ont récité des contes anciens comme points de discussion ou même comme preuve directe de leur opinion, mais d'autres demeurent ancrés et conscients de la réalité politique affrontée. Nos représentants et les Skalds s'accordent que quelque chose doit être fait pour contenir les Orques Gris de Gueule-Gelée et combattre les peuples Aléniques, notamment les Gawedi. Certains suggèrent que le Conseil des Skalds devrait s'unir avec Bjarnrík comme au temps de Bera, tandis que d'autres prétendent qu'aucune autorité n'est au-dessus des Skalds et que leur indépendance est primordiale.\n\nQuelle proposition nos diplomates devraient-ils suggérer ? Selon la loi ancienne, les Skalds devraient être subordonnés au Konungr ; s'ils n'écoutent pas, alors ils perdent leur droit à leurs terres. La décision vous appartient, Konungr."
 gerudia.3.a:0 "Le Conseil des Skalds sera subordonné au Konungr."
 gerudia.3.b:0 "S'ils n'acceptent pas notre accord, nous les y forcerons !"
 gerudia.3.c:0 "Tout ce dialogue est épuisant, qu'il prenne fin !"
 gerudia.4.t:0 "Une Offre de Subordination"
 gerudia.4.d:0 "Le Conseil des Skalds a discuté en profondeur de l'opportunité de s'unifier avec Bjarnrík, préoccupé qu'en ces temps notre cité sainte risque de tomber aux mains Orques. Certains disent que notre sécurité réside mieux avec Bjarnrík, tandis que d'autres prétendent que nul n'a autorité sur les Skalds et que nous devrions rester indépendants. En tant que Maître Skald, vous avez la décision finale : que sera-t-elle ?"
 gerudia.4.a:0 "Jadis nous avons servi Bera contre les Trolls ; nous le ferons à nouveau."
 gerudia.4.b:0 "Nul n'a l'autorité de nous commander, pas même un Konungr !"
 gerudia.5.t:0 "Le Conseil des Skalds Accepte l'Offre"
 gerudia.5.d:0 "Avec grand soulagement, le Maître Skald et le Conseil ont accepté notre offre de protéger les Skalds en échange de leur subordination au Konungrdom de Bjarnrík. Toute la Gérudie peut se reposer tranquille maintenant que la cité sainte de Skaldol est en sécurité !"
 gerudia.5.a:0 "Portons un toast avec l'hydromel le plus fin !"
 gerudia.6.t:0 "Les Skalds Refusent notre Offre"
 gerudia.6.d:0 "Le Conseil des Skalds demeure défiant en ces temps : nul ne peut les commander, nul n'est au-dessus de la suprématie du Maître Skald. Ils ont demandé à nos diplomates de partir, poliment."
 gerudia.6.a:0 "Trahison, quels Skalds sont-ils pour me questionner !?"
 gerudia.7.t:0 "Bjarnrík Pousse ses Revendications"
 gerudia.7.d:0 "Les diplomates Bjarnríki ont réfléchi à notre discussion et ont décidé qu'ils ne valorisent pas notre décision. Prétendant que les Skalds doivent être subordonnés au Konungr, ils ont déclaré que notre Conseil est inapte à servir et que nos terres sont détenues illégitimement."
 gerudia.7.a:0 "Mais c'était une offre généreuse !"
 gerudia.8.t:0 "Principauté de Celmaldor"
 gerudia.8.d:0 "La belle cité de Maldarion le Navigateur pensait pouvoir unir les Hommes de l'Étendue pour arrêter notre expansion et prendre le Jotunsglotta, mais ils ont échoué. Leurs armées se sont rendues, la cité est nôtre. Cependant, ils détiennent toujours grande influence à travers les cités et flottes marchandes. Il pourrait être sage de leur accorder une certaine autonomie et d'utiliser leurs connexions, ou devrions-nous saisir leur port directement ? Les Gérudiens ont longtemps envié les quais étendus et magnifiques de Celmaldor, nos constructeurs navals impatients de les utiliser."
 gerudia.8.a:0 "Les actifs et connexions de Celmaldor nous serviront."
 gerudia.8.b:0 "Quels navires merveilleux pouvons-nous faire maintenant ?"
 gerudia.9.t:0 "L'Héritage de Derhilde Reine-des-Pillards"
 gerudia.9.d:0 "Il y a de nombreuses années que Deranne a été conquis et intégré, avec de nouvelles générations nées et élevées sous la Couronne de Bera. Le peuple Derranique était autrefois comme les Gérudiens avant de devenir une ombre des Lorentais, mais au cours de ces nouvelles générations, le peuple a commencé à adopter à nouveau ses racines Gérudiennes. Jadis et maintenant connus sous le nom de Talderraniques, ce pays est devenu une fois de plus partie intégrante de la culture Gérudienne."
 gerudia.9.a:0 "Un nouveau conte sera écrit pour cela !"
 gerudia.9.b:0 "Mais ils sont toujours Derraniques, non ?"
 gerudia.10.t:0 "Enfants de Henrik Fléau-des-Plongeons"
 gerudia.10.d:0 "Henrik Fléau-des-Plongeons conquit le Bord-de-Perles moderne de l'ancien Royaume Tretunique, un royaume coincé entre les royaumes alors chancelants de Lorent et Damérie. Son fils Harald fonda la dynastie Pearlman en épousant la locale Andarta Tretunis, dont la lignée continua jusqu'aux modernes síl na Trísfers. Les colons Pillards de cette terre devinrent les Bord-de-Perlois, et sont au fil du temps devenus de plus en plus comme leurs voisins Damériens. Après la récupération du royaume de Henrik, le peuple de cette terre a repris les pratiques de leur fondateur, devenant connus sous le nom de Perlatter."
 gerudia.10.a:0 "Que les fils de Henrik aient encore beaucoup d'enfants !"
 gerudia.10.b:0 "Ce ne sont que des Damériens aux têtes chauves !"
 gerudia.11.t:0 "Artificiers et Skalds"
 gerudia.11.d:0 "Le bourdonnement et le brassage des fourneaux menacent de dépasser les chants et chansons des Skalds en cet âge industriel. Les deux se voient mutuellement comme ennemis, soit comme réactionnaires soit comme radicaux, refusant de faire compromis. Les deux offrent une vision pour l'avenir de Bjarnrík : les Skalds souhaitent répandre les contes à travers le monde afin qu'Elkaesal ne se réveille jamais, et les Artificiers souhaitent se débarrasser des chaînes du passé et entrer dans un nouvel âge d'engrenages, de fumée et de fer."
 gerudia.11.a:0 "Les Skalds ne nous ont jamais fait défaut !"
 gerudia.11.b:0 "Maintenant est l'âge de l'industrie, pas des vieux contes !"
 gerudia.12.t:0 "La Couronne de Bera"
 gerudia.12.d:0 "Le Konungdomr de Bjarnrík a connu des temps plus stables et prospères. Dans l'extrême nord de Cannor, la Gérudie a toujours été un endroit froid et difficile à vivre. Tourmentés par des seigneurs de guerre régionaux pendant la majeure partie de l'histoire enregistrée, beaucoup de Gérudiens avaient migré outre-mer durant l'Ère de la Glace Noire. Cependant, avec le retour de Bera Bjarnsson en 882 AA, la Vallée de Dalr fut unie pour la première fois sous la Couronne de Bera. Sous son royaume, les régions disparates de la Vallée de Dalr furent forcées de coopérer pour la première fois.\n\nDurant l'ascension et la chute de Castanor Noir, Bjarnrík étendit son influence à travers la Mer de la Tombe du Géant. Seuls les efforts concertés des vaillants Hommes de l'Étendue arrêtèrent la conquête permanente de la côte méridionale, notre plus grande défaite étant aux mains des Gardiens-du-Serpent. Avec la coopération de Castanor Noir, le konungdomr fut capable d'envoyer guerriers et fauteurs de troubles indésirables outre-mer, et jouit de droits commerciaux et de pillage favorables jusqu'à la côte Bulwari. Cependant, avec la chute de Castanor Noir et la défaite du Roi-Sorcier, Bjarnrík se retrouva isolé et avec ses routes commerciales autrefois précieuses coupées.\n\nSans le soutien de Castanor Noir, le lien des régions de Bjarnrík commença à se défaire. Durant la Guerre des Ours, frère fut opposé à frère pour le trône, menaçant presque de mettre fin au règne de la dynastie Bjarnsson. À la fin, Totil Bjarnsson soutenu par Sidaett prit le trône du Konungr siégeant Gunnarr. Dès lors, l'autorité de la couronne déclina et se concentra plutôt dans les régions périphériques, principalement Sidaett et Revrhavn.\n\nDans une tentative de moderniser Bjarnrík et mettre fin à l'étranglement décentralisé, l'acte de pillage fut déclaré hors-la-loi au début du XVe siècle. Cependant, depuis le port de Revrhavn, le pillage est toujours permis, dû au pouvoir et richesse de longue date de ses capitaines. La moitié de Bjarnrík s'oppose au pillage et à la pratique de l'esclavage, tandis que d'autres en profitent. Et pendant ce temps, frère vole la terre du frère, et les Trolls continuent d'assassiner notre peuple et ravager la terre."
 gerudia.12.a:0 "Mal à l'aise repose la tête sur laquelle la couronne siège..."
 gerudia.13.t:0 "Couronne de Bera - Esclavage"
 gerudia.13.d:0 "Bien que le pillage ait été interdit dans la majeure partie de Bjarnrík, les pillards de Revrhavn sont toujours permis. Cela leur a accordé un monopole sur les biens volés, incluant les esclaves - peuples asservis.\n\nDes représentants de Sidaett et Varheim se sont manifestés pour protester contre l'acte d'esclavage. Ils le voient comme une pratique arriérée faite seulement par ceux qui ne peuvent guider leur peuple dans les tâches les plus humbles. Pendant ce temps, les Blodfjellers ont soutenu Revrhavn, dépendant eux-mêmes d'esclaves pour leurs mines."
 gerudia.13.a:0 "Il est temps de mettre fin à l'esclavage, une fois pour toutes !"
 gerudia.13.b:0 "Un peu de compensation devrait apaiser les tensions..."
 gerudia.13.c:0 "L'esclavage est la voie de nos ancêtres - je ne vois aucune raison que cela change !"
 gerudia.14.t:0 "Couronne de Bera - Raids de Trolls"
 gerudia.14.d:0 "Les étendues nord-occidentales de Bjarnrík bordent les traîtres Montagnes Dalrfjall. Les clans de Blodfjell et Sidaett ont acheté leur terre avec le sang de leurs ancêtres, et il ne passe pas un jour sans nouvelle d'un autre massacre et raid par les maudits trolls.\n\nBlodfjell et Sidaett sentent tous deux que leur rôle comme bouclier contre les trolls n'a pas été apprécié, et que leurs forteresses pourrissent même avant leurs morts. Ils appellent le Konungr à renouveler notre soutien envers eux et rassembler un grand trésor de guerre pour défendre à nouveau nos terres !"
 gerudia.14.a:0 "Blodfjell mérite notre aide !"
 gerudia.14.b:0 "Les Sidaetti méritent le plus notre soutien !"
 gerudia.14.c:0 "Pourquoi personne ne pense au trésor ?!"
 gerudia.15.t:0 "Couronne de Bera - Problèmes Maritaux"
 gerudia.15.d:0 "Tandis que le monde peine et que les guerres coûtent à leurs familles fils et filles, les nobles se querellent et potinent. Il est dit à la cour que la Drottning a été infidèle, et que le Konungsson n'est pas petit de l'ours.\n\nLes Sidaetti vous pressent de désavouer publiquement ces rumeurs comme fausseté. Cependant, quelque chose de doute persiste dans votre esprit. Mon fils et héritier pourrait-il être une folle avoine d'un autre homme ?\n\nCertains ont murmuré que peut-être votre propre bâtard est de plus grand sang royal, et que la maison de Sidaett devrait être écartée dans le déshonneur à la place d'une épouse plus fidèle."
 gerudia.15.a:0 "Que soient damnés eux et leurs rumeurs - elle est notre Drottning !"
 gerudia.15.b:0 "Je ne peux permettre la déloyauté dans ma propre maisonnée !"
 gerudia.15.c:0 "Renvoyer la mégère déloyale et sa progéniture ! La fille Frondvagr fera une fine Drottning !"
 gerudia.16.t:0 "Couronne de Bera - Conflit à Varheim"
 gerudia.16.d:0 "Une terre apparemment sauvage d'herbe balayée par le vent et de gens encore moins domptés, Varheim n'a plié qu'à contrecœur devant la Couronne de Bera. Leur histoire avec Bjarnland en est une remplie de mépris, mais pourtant aujourd'hui les héritiers de Torbjold vous pétitionnent.\n\nIls prétendent que Revrhavn a volé leur terre à travers l'installation de leurs capitaines pillards soi-disant retraités. Naturellement, les Revrhavnois nient cette allégation.\n\nLes Varheimers exigent que vous mettiez fin à cet empiétement et vol, et exigent aussi le droit de protéger leur propre autonomie."
 gerudia.16.a:0 "Je veux les Revrhavnois mêlards hors de Varheim !"
 gerudia.16.b:0 "Que les Varheimers sachent qu'ils ont le soutien total du Konungr pour défendre leurs terres !"
 gerudia.16.c:0 "Pourquoi devrais-je m'en soucier ? Les Revrhavnois devraient prendre ce qu'ils veulent."
 gerudia.17.t:0 "Couronne de Bera - Pillage"
 gerudia.17.d:0 "Enfin, il est clair que Bjarnrík ne peut rester dans un état d'interdiction hésitante du pillage. Pour les principautés de Cannor, nous ne sommes rien d'autre que des ombres à volonté faible de nos ancêtres qui laissent des voleurs piller leurs terres. Pour les Olavish, nous sommes vus comme lâches qui rejettent les voies de nos aïeux.\n\nLa maison de Sidaett est alignée avec la Couronne pour mettre fin à la pratique du pillage pour de bon. Varheim et Frostbrygja doivent encore se déclarer ouvertement, pourtant tous deux ont déjà suivi notre exemple de mettre fin au pillage. Revrhavn a vigoureusement défendu leur droit au pillage, prétendant que mettre fin à cela nous privera de tout ce qui nous rend Gérudiens. Les Blodfjellers secouent la tête à ce gâchis, insistant que nous devrions être unis pour traiter avec les Trolls, pas combattre entre nous."
 gerudia.17.a:0 "Dès maintenant, il n'y aura plus de protection pour les Pillards et leur engeance voleuse !"
 gerudia.17.b:0 "Notre contrat avec Revrhavn continuera de tenir, tant que je suis Konungr !"
 gerudia.20.t:0 "Couronne de Bera - Complots"
 gerudia.20.d:0 "Il est indéniable qu'il y a eu des tensions dans Bjarnrík dernièrement. Depuis les hautes salles de Konungrhavn, un dirigeant tyrannique a décidé de notre destin sans même un scrupule pour nos souhaits. Les clans se sont rassemblés : ils ne peuvent tolérer les décisions du Konungr, et nous pressent de lui montrer notre force !"
 gerudia.20.a:0 "Complotons la chute de l'Ours..."
 gerudia.20.b:0 "Non, nous resterons loyaux à la Couronne de Bera !"
 gerudia.21.t:0 "Couronne de Bera - Nuages d'Orage"
 gerudia.21.d:0 "Il n'y a eu que quelques mois depuis la dernière assemblée, mais ses effets ont été ressentis à travers Bjarnrík. Grognements et murmures prononcés dans le dos, haches ont été affûtées, et armées rassemblées. Il semble que tous ne sont pas heureux avec les proclamations du Konungr."
 gerudia.21.a:0 "Nouvelles des plus troublantes..."
 gerudia.21.b:0 "Accomplir le destin de Revrhavn..."
 gerudia.21.c:0 "Accomplir le destin de Sidaett"
 gerudia.21.dd:0 "Accomplir le destin de Blodfjell"
 gerudia.21.e:0 "Accomplir le destin de Varheim"
 gerudia.21.f:0 "Accomplir le destin de Frostbrygja"
 gerudia.22.t:0 "Couronne de Bera - Révolte !"
 gerudia.22.d:0 "En coulisses, des jarls mécontents de Bjarnrík ont rassemblé leurs ressources pour combattre contre la tyrannie du Konungr. Haches affûtées, boucliers levés, il est temps de reprendre ce qui est mérité et de démolir la corrompue Couronne de Bera !"
 gerudia.22.a:0 "Aux Armes !"
 gerudia.22.b:0 "En y réfléchissant bien..."
 gerudia.23.t:0 "Couronne de Bera - Révolte !"
 gerudia.23.d:0 "En coulisses, des jarls mécontents de Bjarnrík ont rassemblé leurs ressources pour combattre contre la tyrannie du Konungr. Les appels à la rébellion ont atteint vos chambres, vous invitant vous et votre peuple dans la quête pour la liberté. Haches affûtées, boucliers levés, il est temps de reprendre ce qui est mérité et de démolir la corrompue Couronne de Bera !"
 gerudia.23.a:0 "Aux Armes !"
 gerudia.23.b:0 "En y réfléchissant bien..."
 gerudia.24.t:0 "Couronne de Bera - Seconde Guerre des Ours"
 gerudia.24.d:0 "Traîtrise ! Écrit sur un parchemin taché de sang, les dissidents ont déclaré leur indépendance du Konungdomr ! Pas depuis la première Guerre des Ours n'ont tant renié l'autorité de la Couronne de Bera... et cela résulta en la déposition du konungr siégeant. Une chose est certaine : le Konungr doit restaurer l'autorité royale, et cela ne sera qu'avec sang versé et os brisés !"
 gerudia.24.a:0 "Par le Bras Unique et Brisé du Skald, je ne reposerai pas ma hache jusqu'à ce que les traîtres soient morts !"
 gerudia.25.t:0 "La Couronne de Bera - Brisée"
 gerudia.25.d:0 "Victoire ! Le trône de Konungrhavn siège vide, le lâche couronné tremblant de peur. Plus jamais la Couronne de Bera ne contrôlera nos clans, notre peuple. Notre futur est nôtre, à jamais !"
 gerudia.25.a:0 "Liberté des griffes de la bête enfin !"
 gerudia.26.t:0 "La Couronne de Bera - Ensanglantée"
 gerudia.26.d:0 "Victoire ! Les salles des traîtres sont nettoyées, leurs têtes prises. Les opinions des dissidents sont à jamais réduites au silence avec leurs lèvres silencieuses. Que cela soit un rappel pour tous - la Couronne de Bera est suprême !"
 gerudia.26.a:0 "Il n'y aura plus de place pour la dissidence à jamais !"
 gerudia.27.t:0 "La Fin du Royaume de Bera"
 gerudia.27.d:0 "Honte. Les traîtres ont saccagé Konungrhavn et forcé le Konungr à se cacher. La Couronne de Bera est sans signification, impuissante. Déjà nos vassaux se séparent, chaque jarl son propre suzerain. Bientôt il ne restera rien de Bjarnrík..."
 gerudia.27.a:0 "Notre emprise s'estompe..."
 gerudia.38.t:0 "La Seconde Guerre des Ours"
 gerudia.38.d:0 "Magnifiques nouvelles - nos ennemis dans Bjarnrik ont dégénéré en guerre civile ! Alors qu'un Bjarnrik uni était précédemment trop fort pour que nous envisagions même de l'attaquer, leur division nous présente une opportunité de traiter avec eux tous tant qu'ils sont divisés et faibles. Devrions-nous saisir cette opportunité de frapper les autres Gérudiens querelleurs, ou concentrer nos efforts sur le véritable ennemi à Konungrhavn ?"
 gerudia.38.a:0 "C'est le moment, nous les frapperons tous !"
 gerudia.38.b:0 "Vaincre Bjarnrik est tout ce qui nous intéresse."

 fey_alignment.1.t:0 "Don de la Nature Sauvage"
 fey_alignment.1.d:0 "Un beau jour durant votre promenade quotidienne à travers le bois privé, vous trouvez une vue des plus curieuses : quelques bols et sacs débordant de fruits mûrs et babioles dorées. Les objets sont en deux piles distinctes, l'une avec richesses scintillantes et l'autre avec biens couverts, voilés, secrets. Vous apercevez un petit parchemin entre les deux piles, élevé au-dessus du sol boueux sur un socle, le papier somptueux et doré. Une écriture chantante et arachnéenne décore la page :\n\n« Cher [Root.Monarch.GetName],\nUne belle journée à vous ! Nous n'oublions pas nos amis, et nous sommes vraiment désolés pour ce qui s'est passé la dernière fois ! Alors voici un cadeau pour vous, sans ficelles attachées, nous le jurons !\nAllez-y, ouvrez les boîtes, vous savez que vous voulez savoir ce qu'il y a dedans !\nChut, c'était moi qui était censé parler ! Ne les écoutez pas, allez-y et prenez quelques pièces, nous n'en avons pas besoin ! »"
 fey_alignment.1.a:0 "Tout ce qui brille est-il or ?..."
 fey_alignment.1.b:0 "Comment puis-je résister ?"
 fey_alignment.2.t:0 "Une Visite Surprise"
 fey_alignment.2.d:0 "Après une longue journée harassante, vous vous retirez dans vos quartiers personnels pour repos. À votre surprise, ils ne sont pas vides : un trio de nymphes se sont servies de votre vin et pain, faisant un beau désordre de vos quartiers autrefois somptueux.\n\n« Eh bien il était temps », appelle l'une d'elles après une longue gorgée de boisson, « ce n'est pas très poli de faire attendre les gens ! Dites, nous avons une proposition pour vous. Ce n'est pas juste que vous seul devriez profiter de telles délices, pourquoi ne pas organiser une grande fête pour tous ! Vous n'auriez pas à payer une seule pièce, nous fournirons tout ! Nous avons des breuvages très spéciaux, ils vont vraiment les réveiller, et peut-être qu'ils mettront même un peu plus d'entrain dans leurs vies quotidiennes ! »\n\nUne autre nymphe prend la parole, une plutôt morose. « Ce dont ils ont besoin n'est pas d'être égayés, ils ont besoin d'introspection lugubre ! Je leur donnerai quelque chose pour être tristes, ne vous inquiétez pas ! »"
 fey_alignment.2.a:0 "Un peu de manie en vaut la peine !"
 fey_alignment.2.b:0 "Peut-être pourraient-ils être calmés..."
 fey_alignment.3.t:0 "Un Cauchemar Sanglant"
 fey_alignment.3.d:0 "Vous vous réveillez avec un frisson, effrayé de quelque chose d'inconnu de vous. Il n'est pas rare d'être effrayé par l'obscurité et ce qui pourrait s'y tapir momentanément avant de reprendre contenance, mais il y a quelque chose cette nuit qui vous presse à la prudence. Vous levant de votre lit, vous atteignez une bougie et l'allumez. La maigre lumière aide peu, mais alors que vous cherchez, vous remarquez une ombre qui devrait être illuminée.\n\nUne voix vous appelle, froide et distante mais pourtant si proche. « Enfin réveillé. J'ai pensé qu'il serait approprié de vous informer de mes actions. Quelqu'un doit être tué, quelqu'un de grande valeur pour vous. Le sang et le meurtre sont ce qui me motive, mais ce qui rend vraiment ça amusant est de laisser quelqu'un choisir qui meurt. C'est votre choix : livrez-moi une victime, ou j'en choisirai une moi-même. »"
 fey_alignment.3.a:0 "La sécurité de mon royaume vaut une âme..."
 fey_alignment.3.b:0 "Absurde, je ne vous livre rien !"
 fey_alignment.4.t:0 "Questions de Loyauté"
 fey_alignment.4.d:0 "Par leur nature même, les Fées sont des êtres capricieux et inconstants. Embourbées dans des querelles et farces constantes les unes contre les autres, elles voient les mortels comme de simples pions qui doivent servir leurs buts changeants. En tant que dirigeant d'un pays puissant, elles attendent que vous leur promettiez votre loyauté."
 fey_alignment.4.a:0 "Je me dévoue aux Seelie"
 fey_alignment.4.b:0 "Je me dévoue aux Unseelie"
 fey_alignment.4.c:0 "Je ne m'inclinerai pas, pour personne !"
 fey_alignment.5.t:0 "Un Patron Contrarié"
 fey_alignment.5.d:0 "Pour des raisons inconnues de vous, les Fées qui vous appelaient autrefois allié et ami sont furieuses contre vous et exigent vos excuses pour vos graves méfaits. Toujours avides et possessives de tout ce qu'elles n'ont pas actuellement, elles exigent compensation exorbitante pour votre comportement outrageant. Bien que cela puisse les assouvir pour un instant, et qu'elles puissent se rappeler de ce cadeau pour un jour ou deux, les Fées changeront toujours leur opinion de vous."
 fey_alignment.5.a:0 "Je ferai n'importe quoi, donnerai n'importe quoi !"
 fey_alignment.5.b:0 "Je ne comprends toujours pas ce que j'ai fait de mal !?"
 fey_alignment.5.c:0 "Tenez regardez, prenez ce breuvage spécial que j'ai, vous l'aimerez !"
 fey_alignment.6.t:0 "Chercheur d'Attention"
 fey_alignment.6.d:0 "Les Fées sont connues pour leur comportement extravagant et aléatoire ; aujourd'hui une bande gloussante d'êtres magnifiques et horrifiants ont décidé de faire la fête avec vous, se servant de vos biens personnels. Cette joyeuse célébration est cependant écourtée, alors qu'une Fée particulièrement bruyante et spécialement narcissique entre à la fête.\n\n« Qui a pensé commencer les festivités sans moi ! Honte à vous, à vous tous ! », elle tourne son attention vers vous. « Vous là, serviteur, présentez-moi et servez-moi à boire ! »"
 fey_alignment.6.a:0 "Et qui êtes-vous ? Partez."
 fey_alignment.6.b:0 "Bien sûr, pourquoi ne nous rejoignez-vous pas ?"
 fey_alignment.7.t:0 "Faveur des Seelie"
 fey_alignment.7.d:0 "Les Seelie, amatrices de tout ce qui est joyeux et malicieux, vous sourient. Vous êtes notre animal de compagnie favori ! Il est grand temps que votre bon comportement soit récompensé : nous aimerions organiser une fête géante pour tous ! Eh bien, en fait pas tous, bien sûr nous n'allons pas gaspiller tout notre meilleur matériel juste avec vous. Dites-nous vos priorités, attendez-vous vraiment que nous prenions une décision ?"
 fey_alignment.7.a:0 "Des cadeaux pour tous sont des cadeaux pour moi !"
 fey_alignment.7.b:0 "Qu'ils fassent la fête et soient joyeux !"
 fey_alignment.8.t:0 "Approbation des Unseelie"
 fey_alignment.8.d:0 "Les Unseelie approuvent votre dévouement à la sauvagerie et l'honneur. Vous êtes désormais invité à notre prochaine chasse, mais d'abord une faveur de notre appréciation. Un pion puissant pourrait être vôtre, bien en phase avec l'art de verser le sang. Ou peut-être aimeriez-vous que vos hommes aient les sens des loups et la force des ours ?"
 fey_alignment.8.a:0 "Profondément loyal et profondément dangereux ? Comment puis-je dire non ?"
 fey_alignment.8.b:0 "Qu'est-ce qu'un peu d'orgueil face à la force d'un hibours ?"
 fey_alignment.9.t:0 "Vin sous les Saules"
 fey_alignment.9.d:0 "Sous les branches doucement balancées d'un grand saule, vous dînez de délices somptueux et vins fins en compagnie d'hommes et femmes magnifiques de loin. Ils disent que leurs cadeaux de nourriture et vin viennent de plus loin qu'eux, véritables raretés. Alors que le jour tire à sa fin et que les derniers rayons du soleil projettent des ombres sur les branches de saule, l'un de vos compagnons vous offre un dernier toast."
 fey_alignment.9.a:0 "Versez un peu de ce millésime, voulez-vous ?"
 fey_alignment.9.b:0 "Oh, j'ai vraiment assez mangé ce soir."
 fey_alignment.10.t:0 "Quelque Chose dans la Boisson..."
 fey_alignment.10.1:0 "Le matin après votre festin sous le saule est plaisant, comparé à d'autres gueules de bois que vous avez eues auparavant. Vous réfléchissez à votre vie jusqu'ici, et réalisez qu'il y a encore beaucoup plus à expérimenter. Qui savait que la vraie sagesse venait du vin ?"
 fey_alignment.10.2:0 "Vous vous réveillez le lendemain avec tête lourde et estomac nauséeux, comme un poids de plomb pesant et un tremblement de terre se rompant. Vous ne vous êtes jamais senti si malade de votre vie, chaque moment agonie... ça devait être le vin."
 fey_alignment.10.a:0 "Je ne savais pas que j'avais un tel talent pour l'art oratoire !"
 fey_alignment.10.b:0 "Malédiction, le vin a gonflé ma langue !"
 fey_alignment.10.c:0 "Je pourrais utiliser une autre nuit comme celle-ci..."
 fey_alignment.10.dd:0 "Bah, un autre désastre brouillon d'une soirée !"
 fey_alignment.10.e:0 "Donnez-m'en plus !"
 fey_alignment.10.f:0 "L'Hydromel Féerique devrait guérir mes maux !"
 fey_alignment.11.t:0 "Plus qu'un Mal d'Estomac..."
 fey_alignment.11.1:0 "Des quantités copieuses de nourriture sont toujours accompagnées de l'inconfort d'un mal d'estomac, mais vous vous sentez étrangement renforcé. Les viandes semblent vous avoir enhardi avec la force et l'esprit de la bête abattue. Qui savait qu'un tel pouvoir existait ?"
 fey_alignment.11.2:0 "Vous pouviez à peine croire combien vous avez mangé la nuit dernière, n'était-ce la douleur atroce que vous ressentez en vous, couplée au sentiment de vide et faim extrême. Vous vous sentez comme mourant de faim, mais essayez tant que vous le devez, vous ne pouvez plus manger. Quelque chose dans la nourriture la nuit dernière n'allait pas tout à fait bien."
 fey_alignment.11.a:0 "Je défie quiconque de me frapper !"
 fey_alignment.11.b:0 "Si... faible..."
 fey_alignment.11.c:0 "Je ne peux laisser personne connaître ce pouvoir..."
 fey_alignment.11.dd:0 "Quelqu'un doit payer pour cela !"
 fey_alignment.11.e:0 "À l'avenir, toute ma nourriture DOIT être préparée comme je le veux !"
 fey_alignment.11.f:0 "L'Hydromel Féerique devrait guérir mes maux !"
 fey_alignment.12.t:0 "Malédiction de l'Enfant"
 fey_alignment.12.d:0 "Vivant si proche de l'influence des Fées, il est attendu que la tragédie frappe plus souvent que les faveurs. Spécialement favorisés pour leurs méfaits sont les enfants aimés, car leurs farces affectent à la fois la cible et apportent chagrin à leur famille. Ce jour, elles ont choisi votre héritier pour leur amusement, causant grand deuil à tous, et plus important encore à vous."
 fey_alignment.12.a:0 "Que t'est-il arrivé !"
 fey_alignment.12.b:0 "Vite, bois ceci !"
 fey_alignment.13.t:0 "Retour de l'Enfant Perdu"
 fey_alignment.13.d:0 "Il y a de nombreuses années, l'héritier bien-aimé de votre royaume fut kidnappé par les fées... et maintenant ils reviennent, comme si aucun temps ne s'était écoulé, préservé dans les limbes des Fées. Ce serait normalement cause de célébration, mais cet enfant perdu prétend que leur position méritée d'héritier leur a été volée pendant leur absence, et exige qu'ils soient réinstaurés comme l'unique et véritable héritier !"
 fey_alignment.13.a:0 "Bienvenue de retour ! Bien sûr je sais qui vous êtes !"
 fey_alignment.13.b:0 "Je ne laisserai jamais quelque bâtard fugitif prendre ma nation !"
 fey_alignment.14.t:0 "Saison des Cadeaux"
 fey_alignment.14.d:0 "L'échange de cadeaux est un rituel ancien, impliquant le sacrifice d'une possession et la confiance que vous recevrez en bonté égale. Encore plus que les mortels, les Fées échangent des cadeaux avec une joie telle qu'elle ferait paraître les enfants statiques et mornes. Aujourd'hui vous avez reçu un cadeau anonyme. Il est coutumier que les cadeaux anonymes soient réciproqués en nature en déposant un cadeau propre dans les bois : ceux qui le méritent le recevront toujours."
 fey_alignment.14.a:0 "Les remercier pour le merveilleux cadeau."
 fey_alignment.14.b:0 "Il est approprié de rendre les cadeaux en nature."
 fey_alignment.15.t:0 "Réciprocité"
 fey_alignment.15.d:0 "Vous avez décidé de réclamer le cadeau pour vous-même sans rien donner en retour, allant contre les règles anciennes de conduite. Et quand les règles sont brisées, ceux qui les ont faites répondent joyeusement. Les Fées Seelie vous rappellent votre dette envers elles, exigeant bien plus que ce qui vous fut donné : la vie de votre enfant et héritier doit être la leur. Ou, vous pourriez vous humilier publiquement en admettant votre avarice, annonçant à tous que vous êtes quelqu'un qui ne peut jamais être digne de confiance et ne rend jamais en retour. Elles caquettent devant vous tandis que vous réfléchissez à cet horrible choix."
 fey_alignment.15.a:0 "Je suppose qu'un cadeau en nature est requis..."
 fey_alignment.15.b:0 "Quel genre de fou accepte un cadeau sans rendre en retour ?"
 fey_alignment.15.c:0 "Je suis sûr que vous aimeriez cette boisson à la place !"
 fey_alignment.16.t:0 "Une Demande d'Aumône"
 fey_alignment.16.d:0 "Les pauvres et sans-abri sont une constante dans chaque société, chaque jour une lutte pour leur survie, souvent vivants seulement grâce aux dons généreux des fortunés. Tandis que vous voyagez à travers la capitale avec votre suite, vous passez devant une autre âme malheureuse si semblable à toutes les autres, affligée par les misérables malédictions de maladie et malnutrition. Elle vous supplie pour charité de quelques pièces afin qu'elle puisse manger ce jour, sûrement pas une seconde pensée pour celui qui est décoré avec la richesse d'une nation. Vous remarquez que caché derrière ses haillons une amulette exquise qui vous appelle ; vous devez l'avoir !"
 fey_alignment.16.a:0 "Donner à la pauvre dame un peu d'argent."
 fey_alignment.16.b:0 "Qui est-elle pour même me regarder ?!"
 fey_alignment.16.c:0 "Gardes - saisissez son amulette !"
 fey_alignment.17.t:0 "Récompenses de la Générosité"
 fey_alignment.17.d:0 "Ceux qui font de bonnes actions ne sont pas récompensés en nature, mais savent que leurs actions ont apporté aisance à ceux qui ont le plus besoin d'aide. Mais aujourd'hui, la bonne action que vous avez faite sera récompensée, car cachée derrière l'illusion d'une pauvre mendiante était une Fée puissante et redoutable. Votre générosité sera récompensée ce jour par une potion des plus désirées ; un Hydromel Féerique qui peut vous protéger, une fois, de la colère des Fées et leurs complots. Elle ne peut être utilisée qu'une fois, mais vous vous rappellerez à jamais que votre générosité pourrait un jour sauver votre vie."
 fey_alignment.17.a:0 "Je prie de ne jamais avoir besoin de cela."

 silver_families.0.t:0 "Comment avez-vous même obtenu ceci ?"
 silver_families.0.d:0 "Ceci est un fichier factice."
 silver_families.0.a:0 "Comment ?"
 silver_families.1.t:0 "La Maison de Silmuna"
 silver_families.1.d:0 "La Maison de Silmuna est l'une des plus grandes des Familles d'Argent, originaire du mariage de Munas Chante-Lune, qui mena la Flotte Rémanente vers Cannor et plus tard dirigea la Ligue des Royaumes Libres contre le Roi-Sorcier, et Auci Damerid, la Reine de Damérie et avatar de la Dame : déesse de la récolte, connaissance et magie. Les Silmuna furent les Grands-Ducs de Damérie rejoignant l'Empire d'Anbennar, et furent la dynastie le plus fréquemment sur le trône impérial - certains voyaient même les Silmuna comme les seuls dirigeants légitimes d'Anbennar.\n\nLa dynastie fut détruite suivant les Guerres Lilas, quand le Grand-Duché de Damérie fut dissous après la victoire du Parti de la Rose et les Silmuna perdirent leurs territoires sauf pour une branche alignée à la Rose dans Wesdam. De la branche dynastique qui régna autrefois le Grand-Duché, seul Rogier Silmuna survécut comme Capitaine de la compagnie d'aventuriers Fils de Damérie. La Maison de Silmuna est connue pour son pouvoir magique, patronage des arts et ambition politique."
 silver_families.1.a:0 "Nous les rendrons fiers."
 silver_families.2.t:0 "La Maison de Siloriel"
 silver_families.2.d:0 "La Maison de Siloriel est l'une des plus grandes des Familles d'Argent, originaire du mariage d'Ioriel Rose-Rouge, diplomate en chef - et, après la mort de Munas Chante-Lune, dirigeante - de la Ligue des Royaumes Libres durant la Guerre du Roi-Sorcier, et Ruben Lorentis, Roi de Lorent. Sous la famille, Lorent devint l'un des royaumes les plus elfisés de Cannor, égalé seulement par le Grand-Duché de Damérie.\n\nLorent demeura indépendant de l'Empire d'Anbennar, bien qu'éventuellement un Siloriel parvint à être élu au trône impérial, déclenchant les Guerres Lilas. Cela résulterait en victoire pour le Parti de la Rose de Lorent, bien que plusieurs duchés sous maisons cadettes dans la Baie des Vins se sépareraient du contrôle du Royaume. La Maison de Siloriel est connue pour son acuité politique, traditions martiales et étiquette courtoise."
 silver_families.2.a:0 "Nous les rendrons fiers."
 silver_families.3.t:0 "La Maison de Silcalas"
 silver_families.3.d:0 "La Maison de Silcalas est l'une des Familles d'Argent, originaire du mariage de Calasandur le Magnifique, bâtisseur des châteaux elfiques magiques de Calasandur égalés seulement par les citadelles Castanoriennes construites par Balgar le Bâtisseur et Lisbet, une femme de la Couronne. La famille régna originellement le château de Calascandar, le plus hospitalier des châteaux de Calasandur, dans la Couronne-de-Dame mais furent plus tard élus comme Marquis d'Arbaran suivant la mort du dirigeant elfique original du marquisat.\n\nD'autres membres de la famille demeurent influents au sein de la république de Couronne-de-Dame, tandis qu'une maison cadette des Silcalas d'Arbaran règne le duché d'Exwes. Encore plus de membres de la famille peuvent être trouvés à travers Cannor, agissant souvent comme maîtres de guilde et artisans experts. La Maison de Silcalas est connue pour son artisanat expert, habileté financière et pure fécondité."
 silver_families.3.a:0 "Nous les rendrons fiers."
 silver_families.4.t:0 "La Maison de Silistra"
 silver_families.4.d:0 "La Maison de Silistra est l'une des Familles d'Argent, originaire du mariage d'Istralania Chante-Guerre, second commandant de Munas Chante-Lune et maréchal de la Ligue des Royaumes Libres et Sideric le Patient, un chevalier humain qui combattit dans la Guerre du Roi-Sorcier. La famille furent fermes partisans de la Maison de Silmuna, régnant le duché d'Istralore au sein du Grand-Duché de Damérie. Une autre branche règne aussi le comté de Seinathil en Esmarie, connus pour leurs talents musicaux plus que leurs capacités martiales.\n\nIls furent joueur majeur dans le Parti de la Lune durant les Guerres Lilas, et prirent quelque chose d'un rôle dirigeant en Damérie Orientale après la chute des Silmuna. La Maison de Silistra est connue pour sa loyauté, capacité de leadership et pure obstination."
 silver_families.4.a:0 "Nous les rendrons fiers."
 silver_families.5.t:0 "La Maison de Silnara"
 silver_families.5.d:0 "La Maison de Silnara est l'une des Familles d'Argent, originaire du mariage de Narawen la Vagabonde, une exploratrice célèbre qui cartographia la côte ouest de Sarhal, et Sidwaya, un prince touché-par-les-plans de Sarhal du Sud qui la rejoignit sur son voyage de retour vers Cannor. La famille règne sur le Royaume de Busilar, avec une branche ayant autrefois régné le Duché de Crodamie avant son intégration dans Arbaran, et ont forte rivalité avec les Silebor voisins. La Maison de Silnara est connue pour sa curiosité, agitation et habileté à naviguer terrains et eaux difficiles pareils."
 silver_families.5.a:0 "Nous les rendrons fiers."
 silver_families.6.t:0 "La Maison de Silebor"
 silver_families.6.d:0 "La Maison de Silebor est l'une des Familles d'Argent, originaire du mariage d'Eborian Eaux-Dorées, amiral en chef de la Ligue des Royaumes Libres et allié de Jaher durant la Libération de Corvurie, et une noble femme Tefori. La famille règne sur les Royaumes d'Eborthíl et Deshak et ont forte rivalité avec les Silnara voisins. La Maison de Silebor est connue pour sa perspicacité, poursuites mercantiles et leadership naval."
 silver_families.6.a:0 "Nous les rendrons fiers."
 silver_families.7.t:0 "La Maison de Silurion"
 silver_families.7.d:0 "La Maison de Silurion est l'une des Familles d'Argent, originaire du mariage d'Urion Lié-aux-Étoiles, dirigeant du complément de cavalerie de la Ligue des Royaumes Libres et Alvara Givre-d'Ébène, une princesse de Castanor. Démarrant comme propriétaires terriens mineurs en Escann, la famille finit par ascendre pour régner le royaume de Castellyr jusqu'à sa chute à la Marée Verte. La Maison de Silurion est connue pour sa chevalerie, bravoure et honnêteté."
 silver_families.7.a:0 "Nous les rendrons fiers."
 silver_families.8.t:0 "La Maison de Silgarion"
 silver_families.8.d:0 "La Maison de Silgarion est l'une des Familles d'Argent, originaire du mariage de Garion le Sage et Masilda la Devineresse, une célèbre magicienne Cardesti. La Maison de Silgarion est connue pour sa sagesse, habileté magique et poursuites savantes."
 silver_families.8.a:0 "Nous les rendrons fiers."
 silver_families.10.t:0 "Le Retour d'une Famille d'Argent ?"
 silver_families.10.desc:0 "Notre pays a été régné par une célèbre Famille d'Argent depuis la Guerre du Roi-Sorcier, et nous avons prospéré sous leur main guidante. Tandis que les années sont passées, une nouvelle dynastie s'est élevée au pouvoir dans le pays, pour le meilleur ou pour le pire.\n\nIl y a juste quelques jours, notre [Root.Monarch.GetTitle] a reçu un visiteur dans ses quartiers privés, avec une proposition intrigante. Les discussions se prolongèrent tard dans la nuit et [Root.Monarch.GetName] fait maintenant face à un choix difficile.\n\nLe représentant de la dynastie qui régnait autrefois notre pays proposa un accord. Si nous devions légitimer l'un d'eux comme notre héritier, leur nom renforcerait sûrement le trône. D'un autre côté, les autres héritiers de la famille $DYNASTY$ pourraient ne pas abandonner leur revendication au trône si facilement."
 silver_families.10.a:0 "Les $DYNASTY$ n'abandonneront pas le trône !"
 silver_families.10.b:0 "Que le sang d'Argent coule vrai."

 colonial_culture.1.t:0 "Naissance d'un Nouveau Peuple"
 colonial_culture.1.d:0 "Il n'y a pas longtemps, [Root.Country.GetName] n'était qu'un rêve pour un groupe de colons. Maintenant, [Root.Country.GetName] est devenu un état naissant par lui-même, et un qui a maintenant prouvé lui-même comme membre de la société mondiale.\n\nAvec l'affirmation d'une nouvelle nation vient le changement. Génération après génération naît sans même visiter la patrie [From.Culture.GetName]. Ils ne cherchent pas à couper leurs liens, mais à s'établir comme leur propre peuple indépendant."
 colonial_culture.1.a:0 "Embrasser le changement culturel."
 colonial_culture.1.b:0 "Le rejeter !"
 colonial_culture.1.c:0 "Yee-haw !"
 colonial_culture.2.t:0 "Culture Émergente dans les Colonies"
 colonial_culture.2.d:0 "Il n'y a pas longtemps, [Root.Country.GetName] n'était qu'un rêve pour un groupe de colons. Maintenant, [Root.Country.GetName] est devenu un état naissant par lui-même.\n\nGénération après génération naît sans même visiter la patrie [From.Culture.GetName]. Ils ne cherchent pas à couper leurs liens, mais à s'établir comme leur propre peuple indépendant."
 colonial_culture.2.a:0 "Embrasser le changement culturel."

 xiyun.1.t:0 "Le Successeur"
 xiyun.1.d:0 "Il est temps pour notre seigneur de choisir un héritier. En tant qu'eunuque, il est incapable d'engendrer un enfant propre, bien que cela ne l'empêche pas d'adopter un neveu pour l'élever comme son successeur choisi. Aujourd'hui, quelques-uns de ses parents ont approché le trône pour se présenter pour approbation, tout ce qui est requis maintenant est pour [Root.Monarch.GetName] de décider lequel d'eux est digne."
 xiyun.1.a:0 "Il montre grande sagesse."
 xiyun.1.b:0 "Il a un don pour les mots."
 xiyun.1.c:0 "Il est plutôt adepte de stratégie."

 akasik_flavour.1.t:0 "Le Prince de Khasa"
 akasik_flavour.1.d:0 "Quand le royaume de Khasa tomba en 1438, le dernier membre survivant de leur maison royale, un nourrisson du nom de Bashal Keskhasa, fut emmené par ses serviteurs de la capitale brûlante de son royaume vers un domaine royal niché dans les montagnes. Ils jurèrent allégeance à notre royaume en échange de protection contre les gnolls, et le jeune prince a grandi en un jeune homme fort et ambitieux. Aujourd'hui il a approché nos officiels dans la capitale avec une proposition radicale. Il note combien difficile fut la décision de couronner un monarque étranger roi de Deshak, et s'offre lui-même pour être notre dirigeant.\n\nC'est une demande plutôt audacieuse, et l'accepter mènerait sûrement à la guerre avec nos suzerains, bien que ce puisse être notre seule chance de liberté. De même, il semble avoir son cœur fixé sur ce pari, et nous ne sommes pas vraiment sûrs de ce qu'il prévoit de faire si nous le rejetons. Une autre option serait de refuser doucement son offre mais lui accorder le domaine de sa famille pour qu'il en fasse ce qu'il veut."
 akasik_flavour.1.a:0 "C'est un prince fou d'un royaume déchu, partez."
 akasik_flavour.1.b:0 "Peut-être est-il temps que le prince devienne roi."
 akasik_flavour.1.c:0 "Le refuser doucement, et lui accorder son domaine."
 akasik_flavour.2.d:0 "Le jeune prince de Khasa, emporté de son royaume tombant juste quelques mois après sa naissance en 1438, a grandi en un jeune homme fort et ambitieux, élevé dans le domaine de sa famille dans les montagnes d'Akasik et vassaux de nos fiefs à Deshak. Il est demeuré loyal, bien que vocal sur son déplaisir de notre règne sur son royaume adopté.\n\nAujourd'hui cependant, nous avons reçu rapports inquiétants qu'il a pétitionné nos officiels de l'autre côté de la mer pour le couronner roi des Desha, un acte qui non seulement saperait notre propre règne, mais nous traînerait sûrement en guerre. Bien que nous soyons confiants que nos sujets loyaux feront la bonne décision, il y a une suspicion lancinante qu'ils pourraient très bien accepter son offre et se rebeller."
 akasik_flavour.2.a:0 "Inquiétant"
 akasik_flavour.3.d:0 "Quand nous avons détruit le royaume de Khasa il y a des décennies, nous étions sûrs d'avoir traqué chaque dernier membre de leur famille royale, assurant qu'ils n'auraient pas de force derrière laquelle se rallier. Combien fut un choc pour nous alors, de trouver qu'un prince avait non seulement survécu, mais avait rassemblé une armée en tentative de raviver son royaume ruiné. Son armée balaya l'ancienne capitale, la saisissant en une nuit. Bien qu'il puisse avoir gagné cette victoire, c'est un petit prix à payer pour voir le dernier rejeton des Khasani écorché devant nous."
 akasik_flavour.3.a:0 "Nous corrigerons notre erreur bientôt."
 akasik_flavour.4.d:0 "Il n'y a eu que quelques décennies depuis que notre royaume fut détruit, ravagé par ces bêtes sauvages des sables. Ils nous pensaient vaincus, conquis... asservis. Ils croyaient nous avoir brisés. Aujourd'hui est le jour où nous leur prouvons le contraire. Le dernier prince de Khasa, le grand seigneur Bashal Keskhasa, est devenu le nouveau symbole de la liberté Khasani, un sauveur promis à nous par Mère Akasik elle-même pour nous mener hors de cette ère sombre. À la tête d'une armée de fiers guerriers Khasani, il est prêt à récupérer son royaume et sauver son peuple, quel qu'en soit le coût. Aujourd'hui, Khasa s'élève à nouveau."
 akasik_flavour.4.a:0 "Khasa Irtisi !"
 akasik_flavour.5.d:0 "Quand nous avons détruit le royaume de Khasa il y a des décennies, nous étions sûrs d'avoir traqué chaque dernier membre de leur famille royale, assurant qu'ils n'auraient pas de force derrière laquelle se rallier. Combien fut un choc pour nous alors, de trouver qu'un prince avait non seulement survécu, mais avait rassemblé une armée en tentative de raviver son royaume ruiné. Aujourd'hui il se tient à la tête d'une grande armée, leur promettant avec vitriol et grande énergie qu'il restaurera son royaume déchu et nous expulsera d'Akasik. Bien que ces puissent être promesses audacieuses, il apparaît plus que disposé à les soutenir avec acier et feu."
 akasik_flavour.5.a:0 "Le garçon a des dents."
 akasik_flavour.6.t:0 "Le Garçon à qui on Refusa"
 akasik_flavour.6.d:0 "Comme nous le savions, nos officiels ont refusé la proposition radicale du prince, l'expulsant de force de la capitale. Il semble avoir pris la nouvelle plutôt durement, rassemblant une grande armée de réfugiés Khasani furieux et brigands. Heureusement il semble que sa haine envers les gnolls soit plus grande que sa haine envers nous, car il a fait son intention d'envahir le royaume gnollique pour restaurer son royaume lui-même. Nous attendons avec impatience nouvelle de sa mort inévitable."
 akasik_flavour.6.a:0 "Bon débarras."
 akasik_flavour.7.t:0 "Le Garçon qui Serait Roi"
 akasik_flavour.7.d:0 "Dans un tournant choquant d'événements, les Desha ont accepté la demande du prince Khasani, le couronnant leur roi et prenant les armes contre nous. Le maudit usurpateur Bashal pousse déjà ses armées dans une frénésie avec discours vitrioliques, et tourne le peuple Desha dans son ensemble contre nous. Ce sera une affaire sanglante."
 akasik_flavour.7.a:0 "Traîtres ingrats !"
 akasik_flavour.8.t:0 "Le Garçon Roi"
 akasik_flavour.8.d:0 "Une décision entièrement inattendue fut prise par nos magistrats à Deshak. Tandis qu'ils ont refusé son offre de devenir roi, ils lui ont plutôt accordé le domaine de sa famille pour qu'il l'utilise comme il le veut. Bien que cela n'ait pu être prévu, ou même désiré, le temps seul dira ce qu'une telle décision apportera pour l'avenir."
 akasik_flavour.8.a:0 "Nous ne pouvons qu'attendre et observer."
 akasik_flavour.9.t:0 "Roi Bashal Ier de Khasa"
 akasik_flavour.9.d:0 "Le prince perdu de Khasa, Bashal Keskhasa, se tient victorieux sur les gnolls de Viakkoc. À travers son royaume gisent les signes de combat féroce, preuve qu'il a gagné son trône. Alors qu'il prend triomphalement son siège dans son palais ancestral à Khasa, il examine son royaume avec joie. Elle s'évanouit rapidement alors qu'il se rappelle ceux qui lui ont fait tort ainsi qu'à son peuple, les gnolls démoniaques et les Desha sans épine, pire encore les bâtards opportunistes à Eborthíl. La seule voie pour que le peuple Akasi prospère vraiment est sous la bannière de Khasa."
 akasik_flavour.9.a:0 "Khasa s'élève à nouveau."
 akasik_flavour.10.t:0 "Le Roi Improbable"
 akasik_flavour.10.d:0 "Incroyablement le jeune prince Bashal a atteint victoire sur les gnolls, rétablissant son puissant royaume et tournant ses yeux ailleurs. Notamment, vers nous, qu'il voit comme rivaux et lâches pour avoir refusé de le soutenir. Où qu'il mène son royaume, nous avons un nouveau et redoutable rival à Akasik."
 akasik_flavour.10.a:0 "Combien inattendu."
 akasik_flavour.11.t:0 "Le Roi de Khasa"
 akasik_flavour.11.d:0 "Nous savions que ce ne serait pas un exploit simple à accomplir, ce qui rend d'autant plus gratifiant que nous l'ayons fait. La bannière de Khasa vole à nouveau fièrement sur la capitale, dont les habitants ont acclamé et rugi en jubilation au retour du Prince Bashal. Sauf qu'aujourd'hui il n'est plus prince, aujourd'hui il devient roi, destiné à être le plus grand qu'Akasik ait jamais vu. Khasa était tombé loin, mais cela signifie simplement que nous avons plus loin pour nous élever."
 akasik_flavour.11.a:0 "Ce n'est que le commencement !"
 akasik_flavour.12.d:0 "Nous avons reçu nouvelle de Khasa, le jeune prince Bashal est devenu roi ! Dans un conflit digne de légende, il a vaincu les bêtes qui ont démoli son royaume et cruellement asservi son peuple. À travers Akasik il est vu comme légende vivante, le champion de Mère Akasik et le futur roi de tous les Akasi. Le temps seul dira quel genre de seigneur il sera."
 akasik_flavour.12.a:0 "Bien pour lui !"
 akasik_flavour.13.d:0 "Nous ne pouvions presque pas croire la missive quand elle arriva, cependant le sceau de Khasa est incontestable. L'audacieux jeune prince, qui s'est arrogamment présenté à Deshak pour saisir le trône, a plutôt réussi à récupérer son royaume. Bien qu'une grande partie d'Akasik le vénère comme sauveur et champion de leur déesse, il est clair que Khasa n'ira pas doucement dans cette bonne nuit."
 akasik_flavour.13.a:0 "Incroyable..."
 akasik_flavour.14.d:0 "Comment. Comment un prince perdu, banni de son royaume et élevé dans les montagnes a-t-il pu faire cela ? À travers Akasik nos camarades de meute gisent morts ou mourants, et peu de ceux qui restent sont sans cicatrices ou blessure grave. Tout le travail de Viakkoc le Puissant, défait en un instant. Une grande partie de la meute nous regarde maintenant avec confusion et haine, et l'avenir de Viakkoc est loin d'être certain."
 akasik_flavour.14.a:0 "Comment cela a-t-il pu arriver ?!"

 marlliande.1.t:0 "Élections à Marlliande"
 marlliande.1.d:0 "Il est temps pour l'Ár Calléin de choisir le prochain dirigeant de Marlliande, ou de simplement étendre le mandat de l'actuel."
 marlliande.1.a:0 "L'actuel $MONARCHTITLE$ nous a bien servi."
 marlliande.1.b:0 "Le noble Vilaéchi."
 marlliande.1.c:0 "L'émissaire Rósrholych."
 marlliande.1.e:0 "Le pionnier Drominar."
 marlliande.2.d:0 "Ce soir nous pleurons la perte de l'un des nôtres, le défunt $MONARCHTITLE$ a rencontré un destin inattendu avant que son mandat ne soit achevé. Le deuil doit venir plus tard cependant, pour maintenant nous devons élire notre prochain dirigeant."


 esuvrem.1.t:0 "Acier Enchanté d'Esuvrem"
 esuvrem.1.d:0 "Ayant étendu nos opérations de fouille à Esuvrem, nous avons découvert une autre section du vaste complexe palatial et un nouveau trésor d'acier enchanté à récupérer. Bien que l'acier lui-même soit utile, le véritable trésor est la Damestear que nous pouvons en extraire durant le processus de reforgeage qui peut alors être utilisée pour fabriquer des objets enchantés plus pratiques de notre propre création. Bien que cela ne durera sûrement pas éternellement, cette dernière prise nous gardera approvisionnés en Damestear pour un bon moment !"
 esuvrem.1.a:0 "Excellent !"

 elections.800.clanspeaker:0 "Notre Orateur-de-Clan $MONARCH$ a passé son mandat en fonction, et maintenant vient le temps pour un nouveau gobelin avec de nouvelles idées de prendre sa place. Trois candidats ont émergé comme meneurs dans l'élection, et le gagnant est..."

 elections.900.t:0 "Le Conseil des Technocrates"
 elections.900.desc:0 "Avec la fin du mandat de [Root.Monarch.GetName], la Machine de [Root.GetName] s'est réunie en conférence. Le prochain [Root.Monarch.GetTitle] sera maintenant choisi entre la Société des Inventeurs Brillants, les Techno-Thaumaturges et les Guildes Mécanistes. Des experts de chaque faction se sont assemblés à [Root.Capital.GetName], chacun proclamant être l'avenir du pays (et de l'artisanat magique lui-même).\n\nQui gagnera dans cette lutte pour le contrôle ?"
 elections.900.a:0 "[Root.Monarch.GetName] maintient le contrôle !"
 elections.900.b:0 "Le brillant Brillite bluffe brillamment !"
 elections.900.c:0 "Le Thaumaturge théorise technocratiquement !"
 elections.900.d:0 "Le magnat Mécaniste maîtrise la Machine !"

