 elections.901.t:0 "Le Conseil des Technocrates"
 elections.901.desc:0 "Avec la mort de notre [Root.Monarch.GetTitle], la Machine de [Root.GetName] s'est réunie en conférence. Le prochain [Root.Monarch.GetTitle] sera maintenant choisi entre la Société des Inventeurs Brillants, les Techno-Thaumaturges et les Guildes Mécanistes. Des experts de chaque faction se sont assemblés à [Root.Capital.GetName], chacun proclamant être l'avenir du pays (et de l'artisanat magique lui-même).\n\nQui gagnera dans cette lutte pour le contrôle ?"

 elections.902.t:0 "Le Choix des Technocrates"
 elections.902.desc:0 "Alors que nous sommes devenus une Technocratie, trois organisations ont pétitionné notre [Root.Monarch.GetTitle] pour rejoindre leurs rangs. Ce faisant, cela les renforcera, leur donnant un léger avantage dans les élections à venir. Qui [Root.Monarch.GetName] devrait-il venir soutenir publiquement ?"
 elections.902.a:0 "[Root.Monarch.GetName] rejoint les Brillites !"
 elections.902.b:0 "[Root.Monarch.GetName] rejoint les Techno-Thaumaturges !"
 elections.902.c:0 "[Root.Monarch.GetName] rejoint les Mécanistes !"