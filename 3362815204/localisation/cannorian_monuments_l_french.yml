WITCH_KING_REQUIREMENT: "Le souverain est un Roi-Sorcier"

cannorian_monuments_permanent_damestear: "Cette §YDamestear§! est §Ypermanente§! et ne s'épuisera pas avec le temps."

####################
#Alenic Frontier
####################

freecestir_mustering_grounds_title: "Champ de Rassemblement de Freecestir"
freecestir_mustering_grounds: "Champ de Rassemblement de Freecestir"
great_project_freecestir_mustering_grounds: "Champ de Rassemblement de Freecestir"
freecestir_mustering_grounds_desc: "Freecestir est une place d'importance capitale depuis le rôle décisif qu'elle joua dans la défaite du Roi-Sorcier. Sa position stratégique au carrefour entre l'Escann et le reste de Cannor en fait un lieu de rassemblement privilégié pour les armées (et les aventuriers) en quête de gloire en Escann et au-delà, ainsi qu'une étape pour le commerce entre les deux régions."

gawed_castle_gaweton_title: "Château de Gaweton"
gawed_castle_gaweton: "Château de Gaweton"
great_project_gawed_castle_gaweton: "Château de Gaweton"
gawed_castle_gaweton_desc: "Gaweton est la demeure traditionnelle des rois de Gawed depuis toujours. Bien que Gaweton ne soit pas aussi développée que Lorentainé au sud, elle demeure un puissant symbole de la légitimité perpétuée des rois gawedis."

####################
#Alenic Reach
####################

bayvic_grandest_city_of_the_reach_title: "Bayvic, la Plus Grande Cité de l'Étendue"
bayvic_grandest_city_of_the_reach: "Bayvic, la Plus Grande Cité de l'Étendue"
great_project_bayvic_grandest_city_of_the_reach: "Bayvic, la Plus Grande Cité de l'Étendue"
bayvic_grandest_city_of_the_reach_desc: "Bayvic est depuis longtemps une cité vaste et influente le long de l'Étendue Alénique, mais avec la récente invasion orque de l'Escann, elle a pris une ampleur encore plus considérable. Tout aspirant marchand ou conquérant ferait bien de respecter l'influence économique exercée par Bayvic."

celmaldor_icewind_palace_of_commerce_title: "Palais du Commerce des Vents-de-Glace"
celmaldor_icewind_palace_of_commerce: "Palais du Commerce des Vents-de-Glace"
great_project_celmaldor_icewind_palace_of_commerce: "Palais du Commerce des Vents-de-Glace"
celmaldor_icewind_palace_of_commerce_desc: "Après le débarquement des elfes à Celmaldor, l'un des plus grands clans elfiques, les Vents-de-Glace, finit par prendre le pouvoir et entreprit de développer la cité de Celmaldor en un véritable port de commerce, rival de ceux de l'Étendue Alénique et du Dalr. Au Palais du Commerce, le plus magnifique édifice construit par les Vents-de-Glace, les marchands celmaldoriens se réunissent pour discuter affaires et développement de la cité."

####################
#Businor
####################

eborthil_toref_citadel_title: "Citadelle de Toref"
eborthil_toref_citadel: "Citadelle de Toref"
great_project_eborthil_toref_citadel: "Citadelle de Toref"
eborthil_toref_citadel_desc: "L'Île de Tef pourrait être considérée comme une forteresse de par sa seule géographie naturelle, mais la Citadelle de Toref en fait un fait indiscutable. Bâtie dans l'Antiquité par les Khétératans à l'apogée de leur empire, puis améliorée par d'importants chantiers navals lors de la conquête castanorienne, la Citadelle de Toref rend toute attaque de l'Île de Tef exaspérante pour quiconque aspirerait à la conquérir."

####################
#Dalr
####################

bjarnrik_staple_port_of_konungrhavn_title: "Port d'Étape de Konungrhavn"
bjarnrik_staple_port_of_konungrhavn: "Port d'Étape de Konungrhavn"
great_project_bjarnrik_staple_port_of_konungrhavn: "Port d'Étape de Konungrhavn"
bjarnrik_staple_port_of_konungrhavn_desc: "Située à l'embouchure du fleuve Rafn, Konungrhavn a toujours été le port d'étape de Bjarnrik. Le commerce sur la Mer de la Tombe-du-Géant a oscillé d'est en ouest et inversement, dépassant rarement la Côte-du-Dragon en raison des mers dangereuses et de ceux qui les sillonnent."

####################
#Damescrown
####################

beepeck_the_largest_small_city_title: "Pic-des-Abeilles, la Plus Grande Petite Cité"
beepeck_the_largest_small_city: "Pic-des-Abeilles, la Plus Grande Petite Cité"
great_project_beepeck_the_largest_small_city: "Pic-des-Abeilles, la Plus Grande Petite Cité"
beepeck_the_largest_small_city_desc: "Le Pic-des-Abeilles et sa population halfeline font office de gardiens de la Tête-de-Dame, exerçant une influence considérable sur le commerce et les mouvements dans ses eaux. Le Pic-des-Abeilles est également l'une des cités les plus densément bâties de tout Halann, en raison de l'urbanisme halfelin consistant à empiler les maisons les unes sur les autres."

damescrown_grand_exchange_title: "Grand Marché de Damescrown"
damescrown_grand_exchange: "Grand Marché de Damescrown"
great_project_damescrown_grand_exchange: "Grand Marché de Damescrown"
damescrown_grand_exchange_desc: "Le Grand Marché est le plus vaste forum commercial d'Anbennar, surpassant même ceux d'Anbenncóst en choix et en magnificence. La CLSTC, la plus grande compagnie marchande au monde, a son siège à Damescrown en raison de l'importance commerciale exceptionnelle de la cité."

ara_temple_title: "Temple d'Ara"
ara_temple: "Temple d'Ara"
great_project_ara_temple: "Temple d'Ara"
ara_temple_desc: "Ara (également connue sous le nom de Dame Fortune) est la déesse du commerce et de la fortune. Ses fidèles furent responsables de la création de la première monnaie et du premier atelier monétaire humain, permettant à l'antique Castanor de s'affranchir de sa dépendance aux monnaies naines. Le plus grand temple d'Ara à Cannor se trouve dans la Tête-de-Dame, géographiquement entre les cités de Vertesk et Damescrown, à courte distance d'autres cités importantes."

####################
#Daravan's Folly
####################

nathalaire_city_of_pirates_title: "Nathalaire, Cité des Pirates"
nathalaire_city_of_pirates: "Nathalaire, Cité des Pirates"
great_project_nathalaire_city_of_pirates: "Nathalaire, Cité des Pirates"
nathalaire_city_of_pirates_desc: "Nathalaire est une cité renommée pour son patronage d'agents versés dans les arts de l'espionnage et du renseignement, ainsi que pour être un havre pour les pirates. La cité tient son nom de la déesse cannorienne Nathalyne, patronne et protectrice de la cité."

####################
#Dragon Coast
####################

nimscodd_academy_title: "Académie de Nimscodd"
nimscodd_academy: "Académie de Nimscodd"
great_project_nimscodd_academy: "Académie de Nimscodd"
nimscodd_academy_desc: "L'Académie de Nimscodd fut fondée à l'époque où la Hiérarchie Gnomique régnait encore en maîtresse incontestée sur la Côte-du-Dragon, avec un accent particulier sur l'ingénierie et l'Artisanat Magique. C'est ici, sur l'île de Nimscodd, que les secrets de l'Artisanat Magique furent percés pour la première fois."

portnamm_portroy_merchants_guild_title: "Guilde des Marchands de Portroy"
portnamm_portroy_merchants_guild: "Guilde des Marchands de Portroy"
great_project_portnamm_portroy_merchants_guild: "Guilde des Marchands de Portroy"
portnamm_portroy_merchants_guild_desc: "La Guilde des Marchands de Portroy à Portnamm est la principale organisation commerciale de Portnamm, et exerce une influence considérable sur la politique locale de la cité. Au-delà de Portnamm elle-même, la guilde est tristement célèbre pour ses tactiques impitoyables visant à maintenir son emprise commerciale sur les eaux environnantes."

kobildzan_kobildzex_guild_of_trapsmiths_title: "Guilde des Maîtres-Pièges de Kobildzex"
kobildzan_kobildzex_guild_of_trapsmiths: "Guilde des Maîtres-Pièges de Kobildzex"
great_project_kobildzan_kobildzex_guild_of_trapsmiths: "Guilde des Maîtres-Pièges de Kobildzex"
kobildzan_kobildzex_guild_of_trapsmiths_desc: "La Guilde Kobold des Maîtres-Pièges existe au sein des royaumes kobolds de la Côte-du-Dragon depuis de nombreuses années, mais n'a jamais eu de siège officiel. Au cœur des Hauteurs-du-Dragon, à Soxun Kobildzex, un hall de guilde leur permettant de pratiquer leur art sera édifié."

the_dragonhoard_title: "Le Trésor du Dragon"
the_dragonhoard: "Le Trésor du Dragon"
great_project_the_dragonhoard: "Le Trésor du Dragon"
the_dragonhoard_desc: "Les kobolds sont essentiellement de petits dragons. Les dragons, par leur nature même, aiment l'or. Où un dragon met-il tout l'or qu'il trouve ? Dans un trésor, bien sûr. Le plus grand trésor d'or de toutes les Profondeurs-du-Dragon (et peut-être de tout Cannor également) se trouve ici, à Soxun Kobildzex. Car la cupidité engendre la cupidité : plus le trésor grossit, plus le désir d'encore plus de richesses grandit avec lui."

####################
#East Dameshead
####################

anbenncost_imperial_palace_title: "Palais Impérial d'Anbenncóst"
anbenncost_imperial_palace: "Palais Impérial d'Anbenncóst"
great_project_anbenncost_imperial_palace: "Palais Impérial d'Anbenncóst"
anbenncost_imperial_palace_desc: "Anbenncóst est le cœur battant de l'Empire d'Anbennar, et le lieu où tout empereur doit se rendre pour être couronné. C'est la plus grande cité du monde en 1444, et la résidence de nombreux héros aventuriers accomplis. Anbenncóst abrite également l'Ordre des Chroniqueurs, un groupe d'érudits et d'historiens voués à collecter et consigner le monde dans leur encyclopédie."

moonhaven_port_munas_title: "Port Munas, la Petite Anbenncóst"
moonhaven_port_munas: "Port Munas, la Petite Anbenncóst"
great_project_moonhaven_port_munas: "Port Munas, la Petite Anbenncóst"
moonhaven_port_munas_desc: "Capitale de l'électorat elfique du Havre-Lunaire, Port Munas est située de manière à contrôler le commerce affluant vers la Tête-de-Dame. Bien qu'appartenant à l'électorat elfique, la cité partage davantage de traits culturels avec Anbenncóst au nord qu'avec le reste du Havre-Lunaire lui-même."

silvelar_silver_spires_title: "Flèches d'Argent de la Lune d'Argent"
silvelar_silver_spires: "Flèches d'Argent de la Lune d'Argent"
great_project_silvelar_silver_spires: "Flèches d'Argent de la Lune d'Argent"
silvelar_silver_spires_desc: "La Lune d'Argent est l'un des plus grands temples de la Dame, dont les flèches scintillent au soleil pour produire un effet des plus envoûtants — une illusion d'optique qui fait croire à ceux qui les contemplent qu'elles sont d'argent pur, martelé et façonné en lances perçant les nuages eux-mêmes. Son existence témoigne de l'industrie de la construction de Silvelar, qui permit le développement de la Lune d'Argent d'un simple temple à un grand monument — une entreprise de trois siècles, initiée par un prêtre elfe dont le nom demeure perdu dans les âges."

menibor_hall_of_the_gallant_title: "Le Hall des Vaillants"
menibor_hall_of_the_gallant: "Le Hall des Vaillants"
great_project_menibor_hall_of_the_gallant: "Le Hall des Vaillants"
menibor_hall_of_the_gallant_desc: "Le rêve de tout aventurier originaire de la Tête-de-Dame est de voir sa statue et son nom figurer dans les corridors sacrés du Hall des Vaillants, un vaste mémorial dédié aux héros ayant perdu la vie en combattant pour la gloire et la justice. Avec des noms et des bustes remontant à avant l'Éveil-du-Dragon, c'est l'édifice le plus connu et respecté de la cité."

damish_temple_moonmount_library_title: "La Bibliothèque du Mont-Lunaire"
damish_temple_moonmount_library: "La Bibliothèque du Mont-Lunaire"
great_project_damish_temple_moonmount_library: "La Bibliothèque du Mont-Lunaire"
damish_temple_moonmount_library_desc: "Le Mont-Lunaire abrite à la fois le célèbre Temple de la Lune Suprême et la Bibliothèque du Mont-Lunaire, cette dernière étant l'une des plus anciennes bibliothèques encore debout au monde, emplie de textes allant de l'histoire aux traités religieux, en passant par les tomes magiques et bien plus encore."

damish_temple_temple_of_the_highest_moon_title: "Temple de la Lune Suprême"
damish_temple_temple_of_the_highest_moon: "Temple de la Lune Suprême"
great_project_damish_temple_temple_of_the_highest_moon: "Temple de la Lune Suprême"
damish_temple_temple_of_the_highest_moon_desc: "Le Temple de la Lune Suprême est le plus grand temple de Cannor dédié à la déesse de la tolérance, des moissons et de la magie : la Dame. De par son emplacement, c'est également le temple le plus élevé de Cannor, situé près du sommet du Mont-Lunaire."

####################
#Esmaria
####################

telgeir_vanbury_steel_foundry_title: "Fonderie d'Acier de Vanbury"
telgeir_vanbury_steel_foundry: "Fonderie d'Acier de Vanbury"
great_project_telgeir_vanbury_steel_foundry: "Fonderie d'Acier de Vanbury"
telgeir_vanbury_steel_foundry_desc: "Telgeir abrite l'immense et influente Guilde Vanbury, une ancienne dynastie originaire de Gawed. Lorsque la dynastie s'installa dans sa demeure actuelle de 1444 à Telgeir, elle apporta avec elle ses traditions de forge et d'armurerie, aboutissant à ce qu'est aujourd'hui la Fonderie d'Acier de Vanbury."

giberd_academy_of_engineering_title: "Académie d'Ingénierie de Giberd"
giberd_academy_of_engineering: "Académie d'Ingénierie de Giberd"
great_project_giberd_academy_of_engineering: "Académie d'Ingénierie de Giberd"
giberd_academy_of_engineering_desc: "L'Académie d'Ingénierie de Giberd (techniquement l'Académie d'Ingénierie *Civile* de Giberd, mais le nom fut jugé trop long) a pour vocation d'enseigner aux citoyens de l'Empire les techniques et idées de l'artisanat gnomique, et de perfectionner les compétences de tous les artisans en devenir. De nombreuses avancées majeures en urbanisme sont nées à Giberd grâce à cette académie."

temple_of_ryala_title: "Temple de Ryala"
temple_of_ryala: "Temple de Ryala"
great_project_temple_of_ryala: "Temple de Ryala"
temple_of_ryala_desc: "Ryala est la fille vierge de Castellos, déesse de l'amour véritable, de la beauté, de la cour et de la chasteté. Son temple lui rend hommage et honore ses préceptes."

konwell_the_imperial_archives_title: "Les Archives Impériales"
konwell_the_imperial_archives: "Les Archives Impériales"
great_project_konwell_the_imperial_archives: "Les Archives Impériales"
konwell_the_imperial_archives_desc: "Siège traditionnel des Archives Impériales, la cité de Konwell a toujours été un haut lieu pour les érudits anbennariens, où les livres étaient à l'abri des incendies fréquents d'Anbenncóst."

seinathil_institute_of_song_title: "Institut du Chant de Seinathíl"
seinathil_institute_of_song: "Institut du Chant de Seinathíl"
great_project_seinathil_institute_of_song: "Institut du Chant de Seinathíl"
seinathil_institute_of_song_desc: "L'Institut du Chant de Seinathíl fut fondé par des créateurs exilés de l'Institut de Konwell, et constitue l'établissement de prédilection de tout aspirant barde de Cannor."

####################
#Forlorn Vale
####################

ibevar_temple_of_munas_title: "Temple de Munas"
ibevar_temple_of_munas: "Temple de Munas"
great_project_ibevar_temple_of_munas: "Temple de Munas"
ibevar_temple_of_munas_desc: "Les elfes d'Ibevar cherchent à bâtir leur temple prévu en l'honneur de Munas Chante-Lune, dieu du voyage, de la musique et des mers, qui sauva la Flotte du Vestige elfique et mit fin à leur périple de mille ans après la perte de leur patrie lors du Jour-des-Cieux-Cendrés."

####################
#Gerudian Coast
####################

urviksten_ebonsteel_armory_title: "Armurerie d'Acier d'ébène"
urviksten_ebonsteel_armory: "Armurerie d'Acier d'ébène"
great_project_urviksten_ebonsteel_armory: "Armurerie d'Acier d'ébène"
urviksten_ebonsteel_armory_desc: "Joyau d'Urviksten et jadis de Castanor-la-Noire, l'Armurerie d'Acier d'ébène est une vaste fonderie, forge et armurerie fournissant armes et armures de haute qualité forgées en Acier d'ébène, un métal sombre naturellement allié que l'on trouve dans tout Urviksten."

####################
#Inner Castanor
####################

hammerhome_artificers_guild_title: "Guilde des Artificiers de la Demeure-du-Marteau"
hammerhome_artificers_guild: "Guilde des Artificiers de la Demeure-du-Marteau"
great_project_hammerhome_artificers_guild: "Guilde des Artificiers de la Demeure-du-Marteau"
hammerhome_artificers_guild_desc: "En 1846, divers artificiers nains éminents tels que Kelgrim Kazdoran fondèrent la Guilde des Artificiers Nains à la Demeure-du-Marteau, en réponse à l'immense pression et influence des cercles d'artificiers gnomes cherchant à imposer leur façon de penser et d'inventer."

draculas_throne_title: "Trône du Roi-Sorcier"
draculas_throne: "Trône du Roi-Sorcier"
great_project_draculas_throne: "Trône du Roi-Sorcier"
draculas_throne_desc: "Nichmer, plus connu sous le nom de Roi-Sorcier, était un ancien conseiller d'origine korbaride de l'Empire de Castanor. Usant de magie noire, il asservit Castan l'Asservi et l'utilisa pour mener guerre contre le reste de Cannor, dans ce qui serait plus tard connu comme la Guerre du Roi-Sorcier. Avant que la guerre n'éclate toutefois, Nichmer fit ériger un trône grandiose pour lui-même à Castonath, un trône qui démontrerait son pouvoir en tant que nouveau et légitime souverain de Castanor."

####################
#Lencenor
####################

lorentaine_mage_academy_title: "Académie de Magie de Lorentainé"
lorentaine_mage_academy: "Académie de Magie de Lorentainé"
great_project_lorentaine_mage_academy: "Académie de Magie de Lorentainé"
lorentaine_mage_academy_desc: "Lorent a toujours abrité de nombreux mages et écoles de magie, mais aucune n'était entièrement sous le contrôle de la Couronne lorentaise jusqu'à ce que le roi de Lorent fasse bâtir une académie de magie royale dans la capitale de Lorent, Lorentainé."

lorent_new_adea_naval_school_title: "École Navale de Nouvelle-Adéa"
lorent_new_adea_naval_school: "École Navale de Nouvelle-Adéa"
great_project_lorent_new_adea_naval_school: "École Navale de Nouvelle-Adéa"
lorent_new_adea_naval_school_desc: "La Côte Voilée n'a jamais été particulièrement riche en ressources, mais sa position stratégique sur une voie maritime protégée avec un accès aisé aux mers intérieures et aux vagues du Lament en fait un emplacement idéal pour une académie navale formant la prochaine génération de capitaines et d'amiraux."

deranne_westport_gateway_to_aelantir_title: "Port-Ouest, Porte d'Aelantir"
deranne_westport_gateway_to_aelantir: "Port-Ouest, Porte d'Aelantir"
great_project_deranne_westport_gateway_to_aelantir: "Port-Ouest, Porte d'Aelantir"
deranne_westport_gateway_to_aelantir_desc: "Deranne possède de nombreux ports le long de son littoral pour les marchands, aventuriers et explorateurs, mais aucun n'est aussi éminent ou influent que Port-Ouest. Bien des Derannais espèrent utiliser les ressources et l'emplacement de Port-Ouest pour alimenter les explorations des ruines d'Aelantir, en quête de richesses et de gloire."

minara_temple_title: "Temple de Minara"
minara_temple: "Temple de Minara"
great_project_minara_temple: "Temple de Minara"
minara_temple_desc: "Déesse de l'amour (charnel), Minara aurait été élevée au rang de divinité par Ryala après que celle-ci eut été témoin et impressionnée par les talents amoureux de Minara. Son temple est dédié à, hum, des choses liées à l'ascension de Minara."

####################
#Not Cannorian
####################

koroshesh_grain_port_title: "Port Céréalier de Koroshesh"
koroshesh_grain_port: "Port Céréalier de Koroshesh"
great_project_koroshesh_grain_port: "Port Céréalier de Koroshesh"
koroshesh_grain_port_desc: "Le Port de Koroshesh est le lieu principal de toutes les exportations depuis l'Estuaire du Chagrin Maternel, et le point d'où le grain khétératan est expédié vers Cannor. Peu importe ce qui advient du Salahad Septentrional, le grain doit couler."

zornartakel_naval_harbor_title: "Chantier Naval de Zornartakel"
zornartakel_naval_harbor: "Chantier Naval de Zornartakel"
great_project_zornartakel_naval_harbor: "Chantier Naval de Zornartakel"
zornartakel_naval_harbor_desc: "Le Port Naval de Zornartakel à la Retraite de Baqtkhet est un vaste port militaire conçu comme une installation complète pour la construction de navires, la formation de marins et l'amarrage de fret. La position du Port Naval sur le côté sud de l'île d'Elzina offre une protection naturelle contre les tempêtes soudaines de la Mer d'Eliz, ou contre les flottes ennemies."

deshak_temple_of_the_elements_title: "Temple des Éléments"
deshak_temple_of_the_elements: "Temple des Éléments"
great_project_deshak_temple_of_the_elements: "Temple des Éléments"
deshak_temple_of_the_elements_desc: "Érigé par une antique civilisation inconnue bien avant la fondation de Deshak, le Temple des Éléments aurait été bâti sur le site où les Touchés-par-les-Plans vinrent à l'existence pour la première fois. Il demeure l'un des lieux de culte les plus éminents d'Akan."

aquatbar_great_library_title: "Grande Bibliothèque d'Aqatbar"
aquatbar_great_library: "Grande Bibliothèque d'Aqatbar"
great_project_aquatbar_great_library: "Grande Bibliothèque d'Aqatbar"
aquatbar_great_library_desc: "Lorsque les gobelins pénétrèrent pour la première fois dans Aqatbar, ils furent stupéfaits par la taille et le contenu de sa bibliothèque. La bibliothèque d'Aqatbar renferme une vaste collection de documents historiques, de textes scientifiques et religieux, de copies de littérature bulwari ancienne et contemporaine, et bien plus encore."

ekha_harbor_title: "Port d'Ekha"
ekha_harbor: "Port d'Ekha"
great_project_ekha_harbor: "Port d'Ekha"
ekha_harbor_desc: "Le peuple ekhan a toujours vécu et péri avec son existence tournée vers la mer, et le grand Port d'Ekha en est l'illustration. Les marins et navires ekhans ont toujours su prouver leur valeur."

dasmati_halls_of_reverence_title: "Halls de Révérence de Dasmati"
dasmati_halls_of_reverence: "Halls de Révérence de Dasmati"
great_project_dasmati_halls_of_reverence: "Halls de Révérence de Dasmati"
dasmati_halls_of_reverence_desc: "Les Halls de Révérence sont le lieu où le peuple maqeti inhumait ses anciens rois, honorés pour leurs exploits dans la lutte contre les esclavagistes gnolls qui les chassaient autrefois."

pyramids_of_khet_title: "Pyramides de Khet"
pyramids_of_khet: "Pyramides de Khet"
great_project_pyramids_of_khet: "Pyramides de Khet"
pyramids_of_khet_desc: "La Khétérata est une terre antique, plus ancienne que presque toutes les autres civilisations connues du continent cannorien. Les Pyramides de Khet, à courte distance de la grande métropole de Khétérat elle-même, ont émerveillé d'innombrables générations d'artistes et de penseurs du monde entier. Elles sont véritablement une merveille à contempler."

####################
#The Borders
####################

sorncell_deepwater_harbor_title: "Port en Eaux Profondes de Sorncell"
sorncell_deepwater_harbor: "Port en Eaux Profondes de Sorncell"
great_project_sorncell_deepwater_harbor: "Port en Eaux Profondes de Sorncell"
sorncell_deepwater_harbor_desc: "La cité côtière de Sorncell possède un excellent port en eaux profondes en usage continu depuis l'Antiquité. Les navires lourds et imposants, généralement des marchands ou des vaisseaux de guerre, pouvaient aisément entrer dans le port et accoster en sécurité. De plus, grâce à ce port naturel, l'économie locale de Sorncell s'est fortement développée autour de la construction navale et de la navigation."

####################
#South Castanor
####################

marrhold_the_feather_academy_title: "L'Académie de la Plume"
marrhold_the_feather_academy: "L'Académie de la Plume"
great_project_marrhold_the_feather_academy: "L'Académie de la Plume"
marrhold_the_feather_academy_desc: "Les griffons sont natifs des terres montagneuses autour de l'Échine-du-Serpent, et particulièrement des environs de Marrhold. Les peuples marrodiques sont le seul groupe d'humains de Cannor à avoir réussi à apprivoiser les griffons et appris à les chevaucher. Pour enseigner cet art à d'autres — principalement de Marrhold mais aussi des candidats prometteurs du reste de l'Escann — l'Académie de la Plume fut créée."

esthili_academy_of_magic_title: "Académie de Magie d'Esthíli"
esthili_academy_of_magic: "Académie de Magie d'Esthíli"
great_project_esthili_academy_of_magic: "Académie de Magie d'Esthíli"
esthili_academy_of_magic_desc: "L'Académie de Magie d'Esthíli est le principal établissement d'enseignement magique de tout l'Escann. Dans tout Cannor, seule l'Académie de Magie de Lorentainé peut rivaliser avec elle."

bladeskeep_title: "Garde-Lame"
bladeskeep: "Garde-Lame"
great_project_bladeskeep: "Garde-Lame"
bladeskeep_desc: "Garde-Lame est la demeure historique de l'Ordre des Gardiens-de-la-Lame et la capitale historique des Marches-des-Lames, et servit à la fois de base et de forteresse aux nombreux guerriers de la lame pendant des siècles au cours de la période médiévale de l'Escann."

####################
#Western Castanor
####################

ancardia_escanni_academy_of_war_title: "Académie de Guerre Escanni"
ancardia_escanni_academy_of_war: "Académie de Guerre Escanni"
great_project_ancardia_escanni_academy_of_war: "Académie de Guerre Escanni"
ancardia_escanni_academy_of_war_desc: "Fondée en 1630, l'École de Guerre d'Ancardie (rebaptisée Académie de Guerre Escanni en 1718) devint la plus importante académie militaire de tout Cannor. Les membres fondateurs de l'académie descendaient des Chevaliers Escannis de l'Œil de Saphir, qui dans l'Escann féodal protégeaient le royaume et combattaient en champions pour leur pays afin de régler les différends plutôt que par la guerre."

adenica_longlance_knights_academy_title: "Académie des Chevaliers Longuelance"
adenica_longlance_knights_academy: "Académie des Chevaliers Longuelance"
great_project_adenica_longlance_knights_academy: "Académie des Chevaliers Longuelance"
adenica_longlance_knights_academy_desc: "Caylen Longuelance — un nom synonyme de « héros » et de « chevalier » pour les nombreux enfants ayant grandi en écoutant les récits de ses actes honorables et de ses actions vaillantes durant la longue Guerre du Roi-Sorcier — est considéré par beaucoup comme le premier chevalier moderne. Ainsi, la fondation d'une académie en son nom, dédiée à l'enseignement de la conduite chevaleresque et des arts martiaux, est tout à fait raisonnable."

####################
#West Dameshead
####################

neckcliffe_the_imperial_dockyard_title: "Les Chantiers Navals Impériaux"
neckcliffe_the_imperial_dockyard: "Les Chantiers Navals Impériaux"
great_project_neckcliffe_the_imperial_dockyard: "Les Chantiers Navals Impériaux"
neckcliffe_the_imperial_dockyard_desc: "Depuis la fondation d'Anbennar, Neckcliffe est le port d'attache principal de la Marine Impériale en raison de son port naturel et de sa position stratégique."
