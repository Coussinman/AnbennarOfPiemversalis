 construct_cliff_passage_1_title:0 "Passage des Falaises-de-la-Ruine ([2095.GetName] - [1876.GetName])"
 construct_cliff_passage_1_desc:0 "L'immense cratère au centre d'Aelantir constitue une barrière naturelle redoutable. Son rebord, connu sous le nom de Falaises-de-la-Ruine, ne peut être franchi que par de périlleux sentiers naturels, ou à l'aide de systèmes de poulies dont la construction nécessite des jours entiers. Aucune de ces solutions n'est praticable pour un commerce constant ou pour le passage d'armées. En rassemblant suffisamment de ressources, nous pourrons bâtir un passage qui facilitera grandement les déplacements le long des falaises, et nous en serons les seuls maîtres."
