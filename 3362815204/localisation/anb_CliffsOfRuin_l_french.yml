 great_project_redrushes_climb:0 "Ascension des Joncs-Rouges"
 redrushes_climb:0 "Ascension des Joncs-Rouges"
 redrushes_climb_title:0 "L'Ascension des Joncs-Rouges"
 redrushes_climb_desc:0 "--------------\nAu cœur de la jungle de Cheshoshmar se trouve un sentier qui relie depuis des générations les tribus mayte du Haraf en surplomb. Infesté de serpents, de bêtes volantes et de chausse-trappes perfides au point d'être considéré par les Nés-des-Ruines locaux comme une épreuve de courage, l'« Ascension des Joncs-Rouges », tel que le sentier est connu, a désormais été déblayé, élargi et aménagé pour devenir bien plus sûr."
 great_project_spoorland_lift:0 "Ascenseur de Spoorland"
 spoorland_lift:0 "Ascenseur de Spoorland"
 spoorland_lift_title:0 "L'Ascenseur de Spoorland"
 spoorland_lift_desc:0 "--------------\nAu pied des chutes de la rivière du Passage, à la frontière des bois de la Baie-des-Trolls et des jungles de Neratican, se dresse une série d'ascenseurs à poulies bâtis avec l'aide des pionniers des prairies. Érigé sur le site de ce qui n'était à l'origine qu'une unique structure de fortune, l'Ascenseur de Spoorland est un ensemble d'élévateurs suffisamment larges et puissants pour hisser deux attelages chacun, les transportant depuis Spoorland en contrebas jusqu'au désert d'Epednan en surplomb et inversement."
 great_project_walkway_of_thorns:0 "Promenade des Épines"
 walkway_of_thorns:0 "Promenade des Épines"
 walkway_of_thorns_title:0 "La Promenade des Épines"
 walkway_of_thorns_desc:0 "--------------\nUne démonstration d'élégance lencori loin de ses terres d'origine, la Promenade des Épines est une plateforme métallique haute de plusieurs kilomètres longeant les Falaises-de-la-Ruine, opérant un demi-tour à mi-parcours. Les voyageurs peuvent s'émerveiller devant les fleurs et la flore soigneusement plantées tout au long de la Promenade, des roses lorentaises aux lys cramoisis de Marlliande, en passant par des espèces aelantiriennes telles que les baies blanches de Grebniesther et les safrans de Selphereg. Les propositions d'importer des tournesols mangeurs d'hommes de Rezankand ont toutefois été rejetées après quelques complications fâcheuses."
 great_project_arca_noruin:0 "Arca Noruin"
 arca_noruin:0 "Arca Noruin"
 arca_noruin_title:0 "Arca Noruin"
 arca_noruin_desc:0 "--------------\nSe dressant majestueusement sur le versant occidental des Larmes-de-Venaan, Arca Noruin est un vaste complexe castral bâti à proximité, mais non directement adjacent, des Falaises-de-la-Ruine. Son donjon, comptant une centaine d'étages et plusieurs tours attenantes, se relie au sommet au Plateau Ynnique par un pont-levis. Les jours de brouillard, il est impossible d'en apercevoir le faîte depuis le bas, ni de voir le sol depuis le sommet ; pour cette qualité pittoresque, il est aussi surnommé « Le Perce-Brume »."
 great_project_arca_venaan:0 "Arca Venaan"
 arca_venaan:0 "Arca Venaan"
 arca_venaan_title:0 "Arca Venaan"
 arca_venaan_desc:0 "--------------\nArca Venaan, plus qu'un édifice, est un chant d'amour à la race elfique. Tour en spirale du bleu-vert le plus lumineux, elle est ornée à l'extérieur de motifs floraux, de vagues et de nuages. Son intérieur est assez vaste pour abriter un atrium ouvert, au centre duquel s'élève un pilier de marbre sculpté de statues d'elfes illustres. Pour relier les hôtes et voyageurs au Plateau Ynnique, un large escalier en colimaçon épouse les murs de la tour, tournant et serpentant à mesure qu'il s'élève autour du pilier, jusqu'à l'étage supérieur parallèle aux Falaises-de-la-Ruine. Sur les murs, une fresque diagonale accompagne l'escalier, dépeignant des épisodes de l'histoire elfique depuis la Guerre des Chaînes Brisées, en passant par la Ruine d'Aelantir, jusqu'au débarquement de Munas et la redécouverte d'Aelantir par Endrallian en 1500 AA.\n\nBien que des érudits travaillent encore à percer les secrets de l'histoire elfique et qu'ils découvriront sans doute des inexactitudes dans certaines représentations de la fresque, nul ne peut nier sa puissance artistique : les visiteurs parcourent souvent la tour dans toute sa hauteur sans s'en rendre compte, tant ils sont absorbés par la contemplation de la fresque."
 great_project_arbeloch_ascensor:0 "Ascenseur d'Arbeloch"
 arbeloch_ascensor:0 "Ascenseur d'Arbeloch"
 arbeloch_ascensor_title:0 "L'Ascenseur d'Arbeloch"
 arbeloch_ascensor_desc:0 "--------------\nUne longue pente a été creusée directement dans les Falaises-de-la-Ruine pour permettre à une plateforme sur rail d'y circuler. Grâce à la force hydraulique captée de la rivière voisine, la plateforme monte et descend le long de son trajet de plusieurs kilomètres, se mouvant imperturbablement comme la main d'un géant. Bien qu'il ne soit ni le plus prestigieux ni le plus extravagant des passages des falaises, l'Ascenseur d'Arbeloch est le moyen le plus rapide et le plus sûr de les franchir, capable de hisser de lourdes cargaisons ou plusieurs régiments par voyage grâce à une prouesse d'ingénierie à la pointe du progrès."

 cancel_cliff_passage_title:0 "Annuler la construction du passage des Falaises"
 cancel_cliff_passage_desc:0 "Peut-être était-ce une mauvaise idée et devrions-nous rester de notre côté des Falaises. Peut-être avons-nous simplement besoin de cet argent. Ou peut-être possédons-nous déjà assez de passages. Quelle qu'en soit la raison, nous pouvons interrompre nos efforts à tout moment."

 CliffsOfRuin_events.1.t:0 "Le Passage est achevé"
 CliffsOfRuin_events.1.d:0 "Les années de labeur ont porté leurs fruits, car un passage relie désormais [1876.GetName] à [2095.GetName], permettant un voyage aisé et sûr à travers les Falaises-de-la-Ruine pour les armées comme pour les marchands."
 CliffsOfRuin_events.1.a:0 "Un grand succès ; poursuivons donc"
