 rebuild_golden_highway_yanshen_coast_desc:0 "Lorsque Jaher fit ses conquêtes du Bulwar jusqu'au Yanshen, il laissa dans son sillage une grande route. Elle permettait de transporter biens et armées avec célérité à travers tout son empire. De nos jours, la Route Dorée est tombée en décrépitude. Il serait toutefois judicieux de restaurer cette infrastructure. Ce sera un atout considérable pour le commerce et tous les bénéfices qui en découlent."
 golden_highway_yanshen_coast_started:0 "Section de la Route Dorée de la Côte du Yanshen restaurée"
 build_golden_highway_south_salahad_title:0 "Prolonger la Route Dorée vers le sud de Sarhal"
 build_golden_highway_south_salahad_desc:0 "En prolongeant la Route Dorée vers le sud, nous pourrons relier les riches terres le long de la Peine-de-la-Mère et le célèbre port de Kunolo au reste de son vaste réseau commercial. Ainsi, nos marchands récolteront les fruits d'un accès sans entraves aux épices exotiques, aux gemmes et autres denrées que recèle le sud de Sarhal."

 vanbury_guild_restore_the_foundry_title:0 "Restaurer la Fonderie de Ricardsport"
 vanbury_guild_restore_the_foundry_desc:0 "La Guilde de Vanbury est réputée dans le monde entier pour ses fonderies. Nous devrions restaurer la fonderie de Ricardsport."

 buy_orcish_slaves_for_colonies_title:0 "Encourager l'Esclavage Orque"
 buy_orcish_slaves_for_colonies_desc:0 "Après la Marée Verte, de nombreux orques furent vaincus et réduits en esclavage tant par les humains que par les orques eux-mêmes. Ces brutes assoiffées de sang sont peut-être robustes et dangereuses, mais elles se plient aisément à une démonstration de force... des travailleurs corvéables idéaux pour affronter les dangers inconnus d'Aelantir."
 stop_buying_orcish_slaves_title:0 "Décourager l'Esclavage Orque"
 stop_buying_orcish_slaves_desc:0 "Les esclaves orques sont trop dangereux et peu fiables. Nous devrions cesser d'en acheter et accorder à ceux actuellement asservis la possibilité de gagner leur liberté par le travail."

 liberate_slaves_title:0 "Libérer les Esclaves de Notre Pays"
 liberate_slaves_desc:0 "Puisque nous avons officiellement aboli l'esclavage dans notre royaume, nous disposons de la légitimité juridique pour poursuivre et éradiquer toute forme de servitude qui subsisterait en [Root.Country.GetName]."

 reform_maghargma_title:0 "Revendiquer le siège de Maghargma"
 reform_maghargma_desc:0 "L'antique cité de Maghargma repose entre nos mains, les anciens rois n'étant plus. Nous devons revendiquer l'autorité que confère la possession de cette magnifique forteresse et saisir le titre pour nous-mêmes !"
 unite_skurkokli_title:0 "Fonder le Skurkokli"
 unite_skurkokli_desc:0 "Depuis des éons, nos cousins du sud ont renié leurs racines, recevant tribut au lieu de piller et de se repaître de chair qu'ils n'avaient pas eu à arracher eux-mêmes d'une créature vivante. Quelle disgrâce ! Désormais, nous, les héritiers de notre antique culture, pouvons créer un véritable foyer pour les Ogres qui perpétue les coutumes de notre peuple ; les hordes du Skurkokli dévoreront le monde."
 found_vrilbesh_title:0 "Fonder le Royaume de Vrilbesh"
 found_vrilbesh_desc:0 "Le Clan de la Gueule-du-Bourbier a mené notre peuple à prospérer dans un paysage que la plupart évitent. Là où les humains, les orques, les gobelins et les nains qualifient notre foyer de « marécage putride », pour nous c'est un paradis. Nous devons nous organiser en un royaume uni pour repousser les intrus hors de nos marais, forgeant un puissant royaume qui jamais ne tombera !"

 institute_malacnar_stratocracy_title:0 "Instaurer la Stratocratie Malacnarienne"
 institute_malacnar_stratocracy_desc:0 "Dans ce monde chaotique de l'après-Déluge, seuls les plus vaillants guerriers et les plus habiles généraux sont capables d'imposer la loi, et nul ne le comprend mieux que Malacnar. Bien que notre administration ait maintes fois été violemment réduite à une simple bande de compagnons retranchés dans un hôtel de ville, si nous parvenons à retourner la fortune en notre faveur et à soumettre les faibles Dolindhans qui nous entourent, nous pourrons véritablement nous reforger en un royaume stratocratique dirigé par des guerriers, pour des guerriers."
 discontinue_iosahar_system_title:0 "Abolir le Système Iosahar"
 discontinue_iosahar_system_desc:0 "Le Système Iosahar de vassalité a permis à de nombreux chevaliers et seigneurs de s'élever et de défendre vaillamment notre patrie au fil des siècles ; cependant, à mesure que les temps évoluent, nos conseillers et administrateurs ont perçu l'urgente nécessité de centraliser l'armée et la propriété terrienne. À cette fin, nous entamerons un lent processus d'intégration de nos sujets les plus fidèles."
 yrw_council_decision_title:0 "Rassembler la Noblesse Ynnique pour un Conseil"
 yrw_council_decision_desc:0 "Après l'effondrement de l'Empire Ynnique, la société ynnique se caractérisait par une fluidité des lois et des croyances, chaque Iosahar (Gardien-du-Serment) régnant de manière quasi indépendante de son suzerain. Le système Iosahar garantissait que chaque ville et village disposât de vaillants chevaliers prêts à le défendre, au détriment du pouvoir du suzerain central.\n\nEn tant que suzerain, la première étape de la centralisation de notre pouvoir consistera à convoquer tous les principaux vassaux de notre domaine pour un conseil. Cela nous permettra d'accroître davantage notre influence et, si le Fleuve Ynn le veut, de finalement réformer notre religion."
 ynn_river_reformed_tooltip:0 "Nous avons pleinement réformé notre religion."

 vrorenmarch_march_release_title:0 "£icon_castanor_small_dragon£Recréer le Domaine de Vrorenmarch"
 vrorenmarch_march_release_desc:0 "Vrorenmarch était jadis la province septentrionale de l'Empire de Castan. Fondée sur l'antique citadelle de Bal Vroren, les récits d'antan content que Vrorenmarch résista au plus fort de l'invasion des géants en 400 av. A. et donna à l'empire le temps nécessaire pour se préparer et anéantir les derniers vrais géants. Dans l'histoire récente, Vrorenmarch n'a connu que des récits funestes, le plus célèbre étant la Tragédie de Bal Vroren, durant laquelle des milliers de réfugiés, cherchant abri face à l'Éveil-du-Dragon, moururent de froid durant la nuit. Leurs cadavres gelés jonchent encore la cour à ce jour."
 vrorenmarch_release_tooltip:0 "Vrorenmarch recevra toutes les terres détenues par nous ou nos vassaux dans l'Étendue Alénique et la Gérudie."
 dostanor_march_release_title:0 "£icon_castanor_small_dragon£Recréer le Domaine Dostanorien"
 dostanor_release_tooltip:0 "Dostanor recevra toutes les terres détenues par nous ou nos vassaux dans les régions de Dostanor, de la Folie-de-Daravan et d'Ourdia."
 dostanor_march_release_desc:0 "Dostanor est une région d'Escann nommée d'après Dostan l'Explorateur, compagnon de Castan. Le Domaine Dostanorien était un domaine de Castanor qui gouvernait cette région pour le compte de Castanor. Un Castanor restauré peut recréer le Domaine Dostanorien."

 uanced_nation_title:0 "Proclamer la République d'Uanced"
 uanced_nation_desc:0 "Peuple d'Uanced ! Pourquoi le fruit de votre labeur devrait-il garnir les festins des Barons et des Ducs dans leurs Hauts Palais ? Pourquoi ne point jouir vous-mêmes des fruits de votre travail ? Saisissez-les par la force ! Faites de vos fermes votre bien propre et récoltez les bénéfices de votre peine ! Vous n'avez rien à perdre que vos chaînes !"

 revoke_high_clans_title:0 "Révoquer les Hauts Clans"
 revoke_high_clans_desc:0 "Les Hauts Clans des Landes-de-l'Ouest se sont mis en infraction avec le trône, abusant de leur pouvoir pour s'enrichir tout en négligeant leur devoir de maintenir l'ordre parmi les Seigneurs-des-Landes. Ils ne méritent plus leur position, bien qu'il soit évident que les gens des landes seront loin d'être satisfaits de voir leur pouvoir leur être arraché."

 elizna_lighthouse_of_surael_title:0 "Ériger le Phare de Surael"
 elizna_lighthouse_of_surael_desc:0 "La cité de Koroshesh est le principal port où les marchandises de la Peine-de-la-Mère sont rassemblées et exportées à l'étranger, alimentant de vastes populations tant au Bulwar qu'en Cannor. Récemment, cependant, les conflits et l'instabilité ont entraîné un déclin du commerce, et le port n'a jamais semblé si morne. Il est temps de rénover le port et d'y ériger un phare glorieux qui puisse faire briller la lumière de Surael sur tous ceux qui sillonnent le Divenhal : que la Khétérata se dresse comme un phare de lumière dans l'océan de ténèbres."

 eordand_arakeprun_title:0 "Rénover Arakeprun"
 eordand_arakeprun_desc:0 "Les conflits internes entre les Éordandais ont malheureusement mené au déclin d'Arakeprun, la plus grande cité d'Éordande. Bâtie sur des ruines précurseures relativement intactes et restaurée grâce au savoir et à la puissance combinés des artefacts qu'ils nous ont légués, Arakeprun fut jadis un symbole resplendissant de renaissance. Mais là où ses temples académiques ont redécouvert un savoir perdu dans les âges, la cité elle-même s'est délabrée. Thésaurisées pour la recherche, les reliques précurseures qui avaient rebâti la cité n'ont pas été disponibles pour l'entretenir, et la Rébellion de l'Arbre-d'Or, en coupant Arakeprun de ses principaux sites de fouilles, n'a fait qu'aggraver le problème. L'Éordande étant désormais unifiée, il n'y a plus d'excuse : Arakeprun doit être restaurée et rénovée au-delà même de sa gloire passée !"

 suppress_eunuch_caste_title:0 "Réprimer les Eunuques"
 suppress_eunuch_caste_desc:0 "Les Eunuques du Yanshen représentent un bloc politique influent, distinct de l'État. Nous pouvons révoquer leurs privilèges et les réprimer en tant que force politique, éliminant ainsi un rival potentiel à l'autorité de notre gouvernement."

 reinstate_eunuch_caste_title:0 "Rétablir les Eunuques"
 reinstate_eunuch_caste_desc:0 "Bien que nous ayons eu des différends avec eux, les Eunuques ont servi comme administrateurs compétents durant une grande partie de l'histoire du Yanshen. Nous pouvons les accueillir de nouveau au sein de notre administration, nous permettant ainsi de tirer parti de leurs talents."
 eunuchs_return_tt:0 "[Root.GetName] obtient l'accès à l'ordre des §YEunuques§!."

 honsai_ghostemperor_decision_menu_title:0 "Menu de l'Empereur-Fantôme"
 honsai_ghostemperor_decision_menu_desc:0 "Affiche la volonté restante de l'Empereur-Fantôme et permet au joueur de choisir entre différentes options pour prolonger son existence."
 honsai_ghostemperor_debug_title:0 "Debug Menu for testing"
 honsai_ghostemperor_debug_desc:0 "Debug Menu for testing"

 call_in_degakheion_title:0 "Appeler Degakheion en renfort"
 call_in_degakheion_desc:0 "Appelle Degakheion dans nos guerres en cours. Nous ne pourrons pas le refaire avant 10 ans."

 end_the_warlord_era_title:0 "Mettre fin à l'Ère des Seigneurs de Guerre"
 end_the_warlord_era_desc:0 "Depuis plus d'un siècle, le peuple du Dakinshiland souffre du banditisme et de la prédation qui ravagent ces terres en l'absence de véritable autorité. En unissant le peuple une fois de plus, cette ère peut être révolue, et le Dakinshiland restauré dans sa prospérité."

 form_umoji_baashidi_title:0 "La Nouvelle Bannière Baashidi"
 form_umoji_baashidi_desc:0 "Pendant de nombreuses années, les Baashidi se sont fait la guerre pour des futilités. Beaucoup sont morts pour bien peu de gains. Durant le Dasr Sharaf, les parents de Baashi apprirent que la paix était préférable à la guerre. Leur âge d'or leur fit connaître la vie dans la prospérité, unis. Malheureusement pour eux, toute bonne chose a une fin, et la guerre revint dans le Jasiir Jadid.\n\nLa lueur de paix que les Baashidi connurent laissa une empreinte durable. À mesure qu'ils se modernisèrent, un mouvement national d'unification naquit parmi eux.\n\nDésormais... il semble que cet objectif ait été atteint.\n\nBaashidi Ha Noolato !"

 form_bwa_tanizu_title:0 "Tous sous la Mémoire"
 form_bwa_tanizu_desc:0 "Tous Tanizu. Tous sous la Mémoire. Rappelons au peuple de Sarhal qui sont ses ancêtres."
 federate_the_tanizu_title:0 "Fédérer les Tanizu"
 federate_the_tanizu_desc:0 "Fusionner l'administration de vos sujets Tanizu."
 become_spiritual_liege_title:0 "Devenir Suzerain Spirituel"
 become_spiritual_liege_desc:0 "Unir diplomatiquement les tribus Tanizu."

#MA General
 rending_appease_choice_title:0 "Qui devrions-nous apaiser ensuite ?"
 rending_appease_choice_desc:0 "Durée restante de la Déchirure : §G[4559.rendingMonthsLeft.GetValue]§! mois"
 rending_appease_choice_ttt:0 "Ouvre un menu pour choisir votre prochaine cible d'Apaisement."
 rending_appease_and_dominate_title:0 "Apaiser ou Dominer"
 rending_appease_and_dominate_desc:0 "§YAccomplir au moins 3 quêtes vous octroiera la récompense de l'esprit et l'apaisera, vous permettant de poursuivre la Déchirure.§!\n\n§GAccomplir 3 quêtes prolongera la Déchirure de 5 ans, 4 quêtes de 15 ans et les 5 quêtes de 25 ans.§!\n\nDurée restante de la Déchirure : §G[4559.rendingMonthsLeft.GetValue]§! mois\n\nCompteur de Grands Esprits pleinement satisfaits : §G[Root.dominationcountervar.GetValue]§!\n\n"
 rending_appease_and_dominate_tt:0 "§YAccomplir au moins 3 quêtes vous octroiera la récompense de l'esprit et l'apaisera, vous permettant de poursuivre la Déchirure.§!\n\n§GAccomplir 3 quêtes prolongera la Déchirure de 5 ans, 4 quêtes de 15 ans et les 5 quêtes de 25 ans.§!\n\nDurée restante de la Déchirure : §G[4559.rendingMonthsLeft.GetValue]§! mois\n\nCompteur de Grands Esprits pleinement satisfaits : §G[Root.dominationcountervar.GetValue]§!\n\n"
 lupulan_appeasement_tt:0 "Chaque province §Ytropicale§! ou de §Yjungle§! gagnera un emplacement de bâtiment supplémentaire, et si c'est votre premier apaisement, elle en gagnera deux."
 rending_debug_title:0 "Debug Menu - Removed after testing"
 rending_debug_desc:0 "TODO\n\nRemaining Rending duration: §G[4559.rendingMonthsLeft.GetValue]§! month"
 rending_appease_choice_tt:0 "Si vous contrôlez au moins une province dans le domaine spirituel d'un esprit non apaisé, vous pouvez lancer l'apaisement via cette décision."
 rending_quest_tt:0 "Ouvre le menu des quêtes. La décision met en surbrillance le §YDomaine Spirituel§! du §YGrand Esprit§! en cours d'apaisement."

#MA Quests
 rending_quest_title:0 "Menu des Quêtes de la Déchirure"
 rending_quest_desc:0 "Ouvre un menu pour accomplir les quêtes données par le grand esprit que vous tentez d'apaiser.\n\nDurée restante de la Déchirure : §G[4559.rendingMonthsLeft.GetValue]§! mois"
 rending_gehet_ketine_scorch_title:0 "Brûler le Domaine de Gehet Ketine"
 rending_gehet_ketine_scorch_desc:0 "Nous brûlerons toutes les demeures et tous les villages, nous salerons les terres et défricherons les jungles. Qu'il ne reste que le désert."
 rending_dhenbasana_delirium_title:0 "Le Délire de Dhenbasana"
 rending_dhenbasana_delirium_desc:0 "Le grand éléphant, Dhenbasana, a offert à notre État un... Bienfait, si l'on peut l'appeler ainsi. Pour mériter sa faveur, pour donner « le Plus Prodigieux Spectacle de tout Halann », il prétend pouvoir nous bénir de la folie nécessaire pour l'impressionner.\n\nAssurément, cela n'aura rien de dangereux."
 rending_dhenbasana_delirium_tt:0 "£yes£ Doit actuellement être en train d'apaiser Dhenbasana."
 rending_finding_phokhao_title:0 "Trouver Phokhao"
 rending_finding_phokhao_desc:0 "Contrairement aux autres grands esprits, le reclus Phokhao ne s'est pas encore manifesté au monde. Pour l'apaiser, nous devons entreprendre le long périple jusqu'aux montagnes de Phokhao et le convaincre de résider dans notre royaume."

#Gray Orc Unification
 unite_gray_orc_tribes_title:0 "Unir les Tribus Orques Grises"
 unite_gray_orc_tribes_desc:0 "Nous avons prouvé notre supériorité sur les autres tribus orques et sommes désormais prêts à revendiquer le Nord pour nous-mêmes."
 gray_orc_leader_of_the_gray_orcs:0 "Chef des Orques Gris"
 gray_orc_leader_of_the_gray_orcs_desc:0 "Il est temps de revendiquer le Col du Nord et la Gérudie pour les Orques Gris !"

#Raheni heroic realm
 draft_mercenary_general_title:0 "Recruter un Héros"
 draft_mercenary_general_desc:0 "Nous pourrions convaincre l'un des puissants chefs mercenaires de rejoindre l'armée et de servir directement le royaume !"
