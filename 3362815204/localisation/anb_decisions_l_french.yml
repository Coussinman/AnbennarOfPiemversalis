l_french:
 countytoduchy_independent_decision_title:0 "Devenir un Duché"
 countytoduchy_independent_decision_desc:0 "Nous sommes devenus trop grands et trop puissants pour demeurer un simple comté ; il nous faut un titre plus digne de notre envergure."
 countytoduchy_subject_decision_title:0 "Devenir un Duché"
 countytoduchy_subject_decision_desc:0 "Nous sommes devenus trop grands et trop puissants pour demeurer un simple comté ; il nous faut un titre plus digne de notre envergure."

 change_magic_organization_decentralized_title:0 "Décentraliser l'Ordre des Mages"
 change_magic_organization_decentralized_desc:0 "Les mages de ce pays seront organisés au sein de guildes autonomes agréées par l'État. Les guildes s'administrent elles-mêmes et forment leurs propres membres ; elles sont tenues de verser une dîme au gouvernement, mais ne disposent que d'un pouvoir limité pour lancer de grands sortilèges au service de l'État."
 change_magic_organization_centralized_title:0 "Centraliser l'Ordre des Mages"
 change_magic_organization_centralized_desc:0 "Les mages de ce pays existeront en tant qu'office d'État, à l'instar des tribunaux ou de l'armée. L'enseignement de la magie au sein d'institutions publiques sera encouragé, et les mages itinérants devront obtenir l'agrément de l'État avant d'être autorisés à exercer leur art."
 change_magic_organization_magisterium_title:0 "Remplacer l'Ordre des Mages par le Magisterium"
 change_magic_organization_magisterium_desc:0 "Le Magisterium, le gouvernement magique basé à Anbennar, prendra le contrôle des mages du pays. La communauté magique disposera des vastes ressources et pouvoirs du Magisterium, mais devra en retour servir les intérêts du Magisterium au sein du pays."
 expel_the_mages_title:0 "Expulser les Mages"
 expel_the_mages_desc:0 "Il est temps d'extirper cette tumeur maligne qui se nourrit de notre pays depuis des années. Expulsez les mages, les sorciers, les ensorceleurs, quel que soit le nom qu'on leur donne : je veux qu'ils disparaissent !"
 remove_mage_towers_tt:0 "Perd la §RTour de Mage§! dans §Ytoutes les provinces§!."
 welcome_the_mages_title:0 "Accueillir les Mages"
 welcome_the_mages_desc:0 "Nous devons de nouveau tirer parti des talents uniques et exceptionnels des sages magi. Qu'ils soient les bienvenus dans notre pays, et intégrons de nouveau leur savoir au sein de notre gouvernement !"
 abandon_our_piracy_title:0 "Renoncer à la Piraterie"
 abandon_our_piracy_desc:0 "Il semblerait que le moment soit venu d'abandonner définitivement le Jolly Roger."
 abolish_slavery_in_nathalaire_title:0 "Abolir l'Esclavage à Nathalaire"	#unused as its in general system
 abolish_slavery_in_nathalaire_desc:0 "Nous devons mettre un terme à nos pratiques inhumaines d'esclavage et adopter un mode de production plus éthique et plus rentable."

 rebuild_castanorian_citadel_title:0 "Reconstruire la Citadelle Castanorienne"
 rebuild_castanorian_citadel_desc:0 "Une antique citadelle castanorienne, jadis pilier des défenses de l'ancien empire, gît désormais en ruines. Restaurons-la dans toute sa gloire passée !"

 establish_lightbringers_title:0 "Fonder l'Ordre des Porteurs-de-Lumière"
 establish_lightbringers_desc:0 "D'autres confessions disposent d'un groupe organisé d'hommes et de femmes consacrés qui propagent la foi. Il est temps que nous suivions leur exemple et fondions le nôtre. L'Ordre des Porteurs-de-Lumière aura pour mission de veiller à ce que tous ceux qui résident sur nos terres suivent la vraie foi."
 establish_the_temple_of_azka_sur_title:0 "Fonder le Temple d'Azka-Sur"
 establish_the_temple_of_azka_sur_desc:0 "Le Culte du Soleil possède de nombreux temples grandioses dédiés à Surael ; cependant, ils sont tous consacrés à Jaher, aux elfes solaires ou à quelque autre croyance hérétique. Il est temps que nous érigions un grand temple à notre image dans une cité majeure du Bulwar. La forteresse du soleil sera le siège de ce Grand Temple du Jadd !"
 the_jadd_is_the_true_faith_title:0 "Le Jadd est la Vraie Foi"
 the_jadd_is_the_true_faith_desc:0 "Pendant longtemps, les Elfes Solaires ont exercé leur domination sur le Bulwar. Leur perversion des préceptes de Surael a régné sur la région. Aujourd'hui, grâce aux cieux, leur hérésie a été bannie du sous-continent et la vraie foi s'est révélée. C'est le Jadd qui est le véritable héritier de la Lumière de Surael !"
 the_jadd_reform_the_sun_cult_title:0 "Réformer le Culte du Soleil"
 the_jadd_reform_the_sun_cult_desc:0 "Nous tenons le Bulwar, cœur du Culte, et avec lui ses grands prêtres. Le moment est idéal pour les convaincre de la vérité du Jadd et les amener à amender leur proclamation selon laquelle les Elfes Solaires seraient les successeurs légitimes de Surael. Assurément, ils comprendront que tous les fidèles de la vérité sont les successeurs de Surael ?"

 orc_change_religion_corinite_title:0 "Embrasser une Nouvelle Foi ?"
 orc_change_religion_corinite_desc:0 "Le Grand Dookan créa notre race pour venger les torts que lui infligèrent les dieux et leurs enfants. Pourtant, nous avons échoué. Nous fûmes arrêtés par une seule femme humaine, Corin, qui parvint à vaincre Korgus Fils-de-Dookan, champion de notre dieu et notre chef. Après de longues années en surface, au contact d'autres races et d'autres croyances, nous avons commencé à douter de nos voies. Que nous réserve l'avenir ?"

 rebuild_golden_highway_bulwar_proper_title:0 "Restaurer la Route Dorée dans le Bulwar"
 rebuild_golden_highway_bulwar_proper_desc:0 "Lorsque Jaher fit ses conquêtes du Bulwar jusqu'au Yanshen, il laissa dans son sillage une grande route. Elle permettait de transporter biens et armées avec célérité à travers tout son empire. De nos jours, la Route Dorée est tombée en décrépitude. Il serait toutefois judicieux de restaurer cette infrastructure. Ce sera un atout considérable pour le commerce et tous les bénéfices qui en découlent."
 golden_highway_bulwar_proper_started:0 "Section de la Route Dorée du Bulwar restaurée"
 rebuild_golden_highway_far_bulwar_title:0 "Restaurer la Route Dorée dans le Bulwar Lointain"
