l_french:
 racial_misc.1.t:0 "Héritier demi-orque"
 racial_misc.1.d:0 "Votre nouvel héritier est un demi-orque.\n\nLes demi-orques sont le fruit d'une union entre humains et orques ou, plus rarement, entre elfes et orques. Initialement, la plupart des gens regardaient les demi-orques avec dégoût ou pitié, car ils semblaient combiner les pires aspects de leurs parents : les humains craignaient leur apparence menaçante, tandis que les orques méprisaient leur faiblesse. Le fait que la majorité des demi-orques durant la Marée Verte soient nés de violences, qu'elles fussent le fait des orques ou des humains, n'améliora guère leur réputation.\n\nMais les temps changèrent, et avec eux le regard porté sur les demi-orques. À l'avènement de l'Ère des Artificiers, les relations entre humains et orques s'étaient améliorées, les unions consenties entre eux étaient devenues bien plus courantes, et les demi-orques avaient fini par être reconnus comme incarnant le meilleur de leur double lignée."
 racial_misc.1.a:0 "On ne lutte pas contre la nature."
 racial_misc.2.t:0 "Héritier demi-elfe"
 racial_misc.2.d:0 "Votre nouvel héritier est un véritable demi-elfe.\n\nLes demi-elfes sont le fruit d'une union entre humains et elfes. Les demi-elfes ressemblent à des humains, à l'exception d'une légère pointe à leurs oreilles, et sont réputés posséder les meilleures qualités de leurs deux parents, équilibrant les ambitions téméraires des humains et la patience détachée des elfes. De nombreux nobles de Cannor se considèrent comme demi-elfes, mais leur sang elfique s'est fortement dilué au fil du temps, faute de nouveaux mariages avec des elfes."
 racial_misc.2.a:0 "Mieux que la somme de leurs parties."
 racial_misc.3.t:0 "Héritier humain"
 racial_misc.3.d:0 "Votre nouvel héritier est davantage humain qu'elfe.\n\nBien qu'encore considéré comme demi-elfe par la noblesse cannorienne, [Root.Heir.GetSheHe] ne vivra pas aussi longtemps qu'un véritable demi-elfe."
 racial_misc.3.a:0 "Cela devait arriver."
 racial_misc.4.t:0 "Héritière harpie"
 racial_misc.4.d:0 "Votre nouvelle héritière est une harpie. Être marié à une harpie présente ses avantages et ses inconvénients, le principal étant que les enfants qu'elle mettra au monde seront toujours des harpies, une race exclusivement féminine principalement établie au Bulwar."
 racial_misc.4.a:0 "Parfait !"
 harpy_heir_name:0 "[Root.Heir.GetName]"