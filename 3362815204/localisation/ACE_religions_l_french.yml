#Personal Deities
one_armed_skald: "Le Skalde"
one_armed_skald_desc: "Le Skalde Manchot de la Gérudie est une figure ancestrale vénérée comme un héros dans toute la Gérudie, et comme un membre de la Cour Régente par les Révériens.\nEn l'an 491, Il berça le Dragon de Glace Elkaesal le Blanc jusqu'au sommeil, mettant ainsi fin à l'Ère du Givre. Cet acte et d'autres interventions divines qui Lui sont attribuées L'ont solidement ancré dans le Culte Révérien, au grand dam de certains courtisans de la Cour Régente.\n\nPersonnalités alignées :\n§YPieux\nGuerrier Hardi\nMeneur Inspirant§!"
one_armed_skald_upgraded: "Le Skalde"
one_armed_skald_upgraded_desc: "Le Skalde Manchot de la Gérudie est une figure ancestrale vénérée comme un héros dans toute la Gérudie, et comme un membre de la Cour Régente par les Révériens.\nEn l'an 491, Il berça le Dragon de Glace Elkaesal le Blanc jusqu'au sommeil, mettant ainsi fin à l'Ère du Givre. Cet acte et d'autres interventions divines qui Lui sont attribuées L'ont solidement ancré dans le Culte Révérien, au grand dam de certains courtisans de la Cour Régente.\n\nPersonnalités alignées :\n§YPieux\nGuerrier Hardi\nMeneur Inspirant§!"

regent_court.2.s: "Le Skalde Manchot, Sauveur de la Gérudie"

favored_RC.400.t: "Favorisé par les Dieux : Le Skalde Manchot"
favored_RC.400.d: "Nombre de fidèles de la Cour Régente ressentent une affinité particulière avec l'un ou l'autre membre du panthéon, mais rares sont ceux qui vivent leur vie en dévots d'une seule divinité avant toutes les autres. Parmi ceux-là même, il est exceptionnel de trouver un individu dont le caractère et les actes reflètent en tout leur divinité tutélaire. De tels individus sont parfois appelés Émulants, et le clergé de [Root.GetName] a remarqué que la grande piété, la bravoure et l'attention portée aux Contes de [Root.Monarch.GetName] pourraient le désigner comme un exemplaire choisi du Skalde Manchot. Plusieurs clercs ont approché [Root.Monarch.GetTitle] pour recommander une dévotion religieuse plus poussée envers des aspects spécifiques du dieu, bien qu'il semble y avoir une division parmi les prêtres quant à la facette du portefeuille du Skalde Manchot à laquelle nous devrions consacrer notre temps.\n\nPasser nombre de vos heures éveillées en prière, étude et rituel détournerait votre attention de l'administration directe du royaume et nécessiterait de déléguer certaines responsabilités importantes, mais pourrait mener à une illumination spirituelle majeure. Poursuivrez-vous la sagesse des dieux, [Root.Monarch.GetTitle] ?"
favored_RC.400.a: "J'émulerai le Skalde Manchot, qui fut plus brave que tous."
favored_RC.400.b: "J'émulerai le Skalde Manchot, qui écoute chaque Conte."
favored_RC.400.c: "Je suis peut-être favorisé par Lui, mais je n'ai point le temps pour des années de contemplation religieuse."
favored_RC.401.t: "Émulant : L'Endormeur-de-Dragon"
favored_RC.401.d: "La quête de [Root.Monarch.GetName] pour émuler le Skalde Manchot, qui fut plus brave que tout homme avant ou après Lui, a été ardue par moments, car la plupart des monarques dirigent depuis l'arrière et envoient d'autres accomplir les tâches effrayantes... Mais pas [Root.Monarch.GetName]. Quand un loup-garou fut signalé dans les environs, cela sembla être l'occasion d'éprouver votre courage.\n Fouiller le donjon à la recherche d'une lame d'argent, rassembler potions et provisions, voyager jusqu'aux bois où la bête fut signalée, rien de cela ne requérait de bravoure, mais ce qui attendait devant, assurément ; un loup-garou de la taille d'un cheval, qui avait trois douzaines de morts à son actif. Vos gardes du corps, les aventuriers engagés et le guide local tremblent de peur, mais vous êtes la définition même de la bravoure, hache au poing vous chargez, un rugissement intrépide s'échappe de votre gorge, vos compagnons suivent avec un courage retrouvé."
favored_RC.401.a: "Nous avons tous notre propre Elkaesal à vaincre."
favored_RC.402.t: "Émulant : Le Premier Skalde"
favored_RC.402.d: "Le Skalde Manchot, qui après avoir sauvé la Gérudie aurait pu rester et régner comme la Divinité qu'Il est, choisit de partir, car Il avait d'autres desseins. Les paroles de sagesse qu'Il nous laissa nous enseignent maintes leçons, dont celle-ci : chaque conte mérite d'être narré. C'est pourquoi nous devons nous efforcer d'accueillir ceux qui pensent différemment, afin que nous puissions entendre leurs Contes, et que nos Skaldes apprennent ce qui doit être appris.\n\n [Root.Monarch.GetName] a invité diverses communautés de tout le royaume, écoutant leurs contes, comprenant comment leurs Contes les façonnent, tout comme les vôtres vous ont façonné."
favored_RC.402.a: "Véritablement, tous les Contes méritent d'être narrés."
ACE_one_armed_skald_temple_tt: "Skaldol recevra une amélioration du modificateur de province Temple du Skalde Manchot et une cathédrale sera construite."
RC_emulant_skald_1: "Émulant de l'Endormeur-de-Dragon"
RC_emulant_skald_2: "Émulant du Premier Skalde"

favored_RC.410.t: "Favorisé par les Dieux : Mère Akasik"
favored_RC.410.d: "Nombre de fidèles de la Cour Régente ressentent une affinité particulière avec l'un ou l'autre membre du panthéon, mais rares sont ceux qui vivent leur vie en dévots d'une seule divinité avant toutes les autres. Parmi ceux-là même, il est exceptionnel de trouver un individu dont le caractère et les actes reflètent en tout leur divinité tutélaire. De tels individus sont parfois appelés Émulants, et le clergé de [Root.GetName] a remarqué que la grande piété et les pouvoirs élémentaires de [Root.Monarch.GetName] pourraient le désigner comme un exemplaire choisi de Mère Akasik, ou Halanna.\n\nPlusieurs clercs ont approché [Root.Monarch.GetTitle] pour recommander une dévotion religieuse plus poussée envers des aspects spécifiques de la déesse, bien qu'il semble y avoir une division parmi les prêtres quant à la facette du portefeuille de Mère Akasik à laquelle nous devrions consacrer notre temps. Passer nombre de vos heures éveillées en prière, étude et rituel détournerait votre attention de l'administration directe du royaume et nécessiterait de déléguer certaines responsabilités importantes, mais pourrait mener à une illumination spirituelle majeure. Poursuivrez-vous la sagesse des dieux, [Root.Monarch.GetTitle] ?"
favored_RC.410.a: "J'émulerai Mère Akasik, qui protège son peuple avec constance"
favored_RC.410.b: "J'émulerai Mère Akasik, qui montre une immense compassion envers tous"
favored_RC.410.c: "Je suis peut-être favorisé par Elle, mais je n'ai point le temps pour des années de contemplation religieuse."
favored_RC.411.t: "Émulant : La Protectrice"
favored_RC.411.d: "Tandis que vous parcourez la route entre Deshak et Khasa, votre regard se porte sur la campagne, où d'innombrables paysans akasi et cannoriens travaillent côte à côte pour rendre à la terre sa prospérité.\nD'innombrables gens ont péri à cause des raids esclavagistes gnolls et dans les camps d'esclaves, mais les Akasi n'ont jamais perdu espoir et se sont battus pour conserver chaque parcelle de terre et la moindre lueur de liberté.\nLeur déesse a été leur phare d'espoir en ces temps cruels, une figure obstinément rebelle qui se dresse aussi fermement que les montagnes d'Akasik qu'elle incarne, toujours immuable et inébranlable.\nPour empêcher que davantage de souffrances ne surviennent, nous devons véritablement devenir de dignes guerriers de notre peuple.\nCeux qui sont bénis par le pouvoir des éléments comme vous ont le devoir de protéger les plus faibles."
favored_RC.411.a: "J'accomplirai mon devoir"
favored_RC.412.t: "Émulant : La Gardienne Bienveillante"
favored_RC.412.d: "Nombre de nobles fortunés vivent au-dessus de leurs sujets, détachés de leurs souffrances et de leurs soucis, n'agissant que lorsque cela sert leurs intérêts personnels.\nVous, en revanche, avez choisi une voie différente, la voie ardue qui traverse des montagnes de défis et d'épreuves.\nBeaucoup ont tenté d'emprunter ce même chemin escarpé et ont échoué, retombant dans une vie d'égoïsme et de négligence.\nPourtant, vous n'avez pas renoncé, vous continuerez à marcher et, finalement, au bout de cette route et au sommet de cette montagne que vous gravissez, vous pourrez vous reposer en contemplant d'en haut votre peuple vivre sans soucis, sans souffrances et plein d'espoir pour l'avenir, tout comme Mère Akasik vous observe et vous guide en cet instant même."
favored_RC.412.a: "Sous mon règne, tous prospéreront"
RC_emulant_akasik_1: "Émulant de la Protectrice"
RC_emulant_akasik_2: "Émulant de la Gardienne Bienveillante"

#Neratic Nerat nerat Kuradaz Kuradaznai
kuradaznai: "Kuradaznai"
kuradaznai_religion_desc: "Les Kuradaznai, signifiant « Ceux de Kuradaz », sont les fidèles de Kuradaz, la divinité de l'ancienne Milcorissia. En Langue Commune, on le nomme Nerat, et en Khétérata il prend le nom de Nirakhet. Il est le dieu de la Mort, de la Justice, du Devoir et de l'Ordre. Sa Déesse-Épouse Vaysora le complète, incarnant le Chaos, la Nature et la Création. Contrairement aux autres fois vénérant Nerat, les Kuradaznai accueillent la mort et voient la non-mort par la nécromancie comme un moyen de service éternel à Kuradaz. La vie n'est qu'une préparation à la mort et à votre service, soit dans l'au-delà du plan de l'ombre, soit en tant que mort-vivant sur Halann."
KURADAZNAI_CHURCH_ASPECTS_LONG: "Enseignements des Avatars"
KURADAZNAI_CHURCH_ASPECTS_SHORT: "Enseignements"
ACE_LIFERS: "Anciens-Vaysorans"
kuradaznai_aspect_morgurax: "Morgurax le Premier"
desc_kuradaznai_aspect_morgurax: "Morgurax le Premier, dont le nom signifie Justicier Pieux en milcori, fut le premier à atteindre la Lichéité en 1620 avant AA, devenant le premier Avatar de Kuradaz. Il régna de 1640 à 1158 avant AA et fonda la foi Kuradaznai et le Royaume de Milcorissia. Il posa également les fondations de l'ascension de toutes les futures Liches milcori en transmettant les informations nécessaires à l'accomplissement du rituel dans les Tablettes de Morgurax."
kuradaznai_aspect_morakzom: "Morakzom l'Unificateur"
desc_kuradaznai_aspect_morakzom: "Après que Morgurax eut accompli son passage de la non-vie à l'au-delà, une période de chaos s'abattit sur la Milcorissia. Nulle Liche n'était là pour prendre la place de Morgurax. Cet interrègne vit l'émergence d'innombrables seigneurs de guerre nécromanciens se disputant terres et Tablettes de Morgurax. Cette période vit une perte massive de territoire due au vil Conquérant Bisan, qui tailla son royaume dans les chairs de la Milcorissia. Cette période de discorde prit fin avec Morakzom, qui parvint à acquérir et étudier les Tablettes de Morgurax assez longtemps pour atteindre la Lichéité. Il écrasa l'État de Bisan et unifia les Rois Nécromanciens milcori, inaugurant un second âge d'or durant son règne de 1035 à 894 avant AA."
kuradaznai_aspect_morvezta: "Morvezta le Fléau-Lunaire"
desc_kuradaznai_aspect_morvezta: "Après l'ère de Morakzom survint un interrègne, durant lequel beaucoup tentèrent en vain d'accéder à la Lichéité et de devenir un Avatar de Kuradaz. Ce fut Morvezta qui en 759 avant AA parvint à atteindre la forme suprême de non-vie. Son service à Kuradaz en tant que Roi des Rois de Milcorissia vit la conquête de territoires correspondant aujourd'hui aux zones de Galéinn, Luna Centrale et la Boucle du Menibór. On dit que la Luna rougit du sang des guerriers adverses. Son règne et sa non-vie durèrent jusqu'en 539 avant AA."
kuradaznai_aspect_morlazar: "Morlazar le Diplomate"
desc_kuradaznai_aspect_morlazar: "Le règne de Morlazar de 483 avant AA à 1 AA fut tumultueux, car il dut faire face à l'Empire Castanorien. Le royaume de Kuradaz connut une contraction due aux incursions castanoriennes et à l'affaiblissement causé par les luttes intestines précédant son ascension. Il parvint à négocier une trêve avec les Castanoriens, gagnant ainsi son surnom, et assura la paix."
kuradaznai_aspect_xamarzu: "Xamarzu l'Innommable"
desc_kuradaznai_aspect_xamarzu: "Le règne de Xamarzu s'étendit de 1 à 524 AA. Il accomplit son devoir envers Kuradaz en rétablissant l'ordre après que le Jour-des-Cieux-Cendrés eut semé le chaos dans le monde, et on lui attribue la mort de Morvezta, tombé en disgrâce auprès de Kuradaz pour des raisons inconnues. Les origines de Xamarzu sont enveloppées de secret, d'où son surnom. Il guida la Milcorissia à travers la période troublée suivant les Cieux Cendrés, qui vit de nombreuses migrations tribales et la chute définitive de la Milcorissia en 524. Cet événement, connu sous le nom de Damnation Xamarzienne, vit Xamarzu livrer un ultime combat dans le Labyrinthe de Varlosen, tandis que le lâche Rhinn ordonnait l'effondrement de son entrée. Tout cela appartient cependant au passé, car Xamarzu est de retour, avide de vengeance."
kuradaznai_aspect_canrec: "Canrec le Profanateur"
desc_kuradaznai_aspect_canrec: "Canrec le Profanateur n'était pas Milcorissien, mais il fut une Liche et donc un Avatar de Kuradaz, qu'il le sût ou non. Il était l'un des acolytes de Nichmer le Roi-Sorcier. On crut Canrec terrassé lors de la Libération de Castanor, mais il survécut en réalité, et atteignit par la suite la sainte Lichéité et cultiva la Pestilence Blanche, une maladie nécromantique qui faillit purger tout Cannor de ses mécréants. Il passa ensuite dans l'au-delà lors de la Croisade Aldrésienne, qui fut la réponse aux hordes mortes-vivantes de la Pestilence Blanche."
kuradaznai_aspect_rewan: "Rewan IV Síl Eilísin"
desc_kuradaznai_aspect_rewan: "Rewan IV Síl Eilísin atteignit la Lichéité par les écrits de Morgurax, et est la Liche la plus occidentale de Cannor. Il fut Duc d'Eilísin entre 1648 et 1666 AA. Il fut injustement dépouillé de ses terres et de son titre pour son intérêt envers les arts nécromantiques."
kuradaznai_aspect_dak: "Dak Serre-Chaînes"
desc_kuradaznai_aspect_dak: "Le Chef de clan Dak Serre-Chaînes vécut sa vie à la tête d'une tribu de Gobelins dans la région de l'Arbre-de-Pierre de l'Échine-du-Serpent orientale. Il atteignit la Lichéité à un moment donné, vraisemblablement de manière entièrement indépendante des écrits de Morgurax. Son statut d'Avatar est contesté par certains élitistes humains, mais Kuradaz a un dessein pour tous."
kuradaznai_aspect_malazmur: "Malazmur le Fléau-des-Mages"
desc_kuradaznai_aspect_malazmur: "Malazmur le Fléau-des-Mages, aussi appelé « le Difforme » par les païens, est un dragon noir et une dracoliche, l'un des deux rejetons de Zaamalot le Noir. Éclos à Bal Mire aux côtés de son frère Vazmaar, Malazmur se révéla bien plus reclus que son frère, et les observations du dragon étaient exceptionnellement rares dans les temps anciens, la plupart survenant lors des infâmes assauts de Malazmur contre les tours de mages et les archives arcaniques, qui lui valurent son titre. Les détails et témoignages sur Malazmur et sa vie sont rares et parfois contradictoires, le dragon lui-même n'ayant évidemment laissé nulle biographie. Outre l'incident de Castonath sous le règne de son frère Vazmaar, qui confirma une grande partie des informations recueillies à son sujet, les récits les plus complets sur le dragon furent compilés par le Magistère Evin síl na Rhasthíl, qui chassa Malazmur sans succès dans les années 1300 et reconstitua les grandes lignes de sa vie. Tout ce que nous savons avec certitude, c'est que Malazmur atteignit la Lichéité, faisant de lui un Avatar de Kuradaz, même s'il fallut le lui rappeler."
kuradaznai_aspect_kaino: "Liche de l'Ombre Kaino"
desc_kuradaznai_aspect_kaino: "La première Liche de l'Ombre consignée dans l'histoire. À l'origine serviteur d'un coven de sorcières des marais de l'ombre qui lui enseignèrent les secrets de la nécromancie. Il combattit Aro le premier empereur, mais fut vaincu ; une tribu alliée de Kaino fut renommée par Aro pour porter le nom de la Liche et exilée dans la jungle du Dao Nako. Depuis lors, il a tenté de s'assurer un domaine à de nombreuses reprises. Il a eu des États naissants dans le Marais de l'Ombre à travers les âges et a plus récemment exercé son influence sur le peuple Kaino dans la jungle du Dao Nako. On croit qu'il désirait jadis l'extinction de tous les peuples pour mettre fin à la douleur et à la souffrance infinies de la vie, mais avec sa conversion aux Kuradaznai, il a retrouvé l'espoir."
kuradaznai_aspect_vaysora: "Déesse-Épouse Vaysora"
desc_kuradaznai_aspect_vaysora: "La Déesse-Épouse Vaysora était jadis une divinité rivale des anciens Milcorissiens, mais finit par devenir son Épouse Divine. Elle le complète admirablement, incarnant le Chaos, la Nature et la Création."