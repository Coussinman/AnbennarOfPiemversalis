l_french:

skaldhyrric_faith: "Foi Skaldhyrrique"
skaldhyrric_faith_religion_desc: "Fondée durant l'Éveil-du-Dragon, la Foi Skaldhyrrique est la religion dominante de la Gérudie. Ses fidèles croient que la récitation de contes magiques maintient Elkaesal le Blanc, le dragon qui plongea la Gérudie dans un hiver éternel, endormi et à distance."
ace_the_dragon_and_the_skald: "§YLe Dragon et le Skalde§!"
desc_ace_the_dragon_and_the_skald: "Le plus éminent des récits de la Foi Skaldhyrrique, Le Dragon et le Skalde retrace l'origine même de la foi. Il y a bien longtemps, au cinquième siècle, la Gérudie sombra dans un hiver profond à cause d'un dragon monstrueux connu sous le nom d'Elkaesal le Blanc. Un brave Skalde manchot s'aventura courageusement pour affronter la bête et la berça de son chant jusqu'au sommeil. Depuis lors, la Foi Skaldhyrrique récite ce conte pour rappeler à tous leur histoire et combien elle dépend des Skaldes.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YFerveur Skaldique§!, conférant §G+10 % de pouvoir ecclésiastique§! pendant 10 ans."
ace_voyage_of_the_north_raider: "§YLe Voyage de l'Écumeur du Nord§!"
desc_ace_voyage_of_the_north_raider: "Grand récit d'aventure maritime, le Voyage de l'Écumeur du Nord est le favori des explorateurs en quête de terres nouvelles. L'histoire narre le périple d'un navire nommé l'Écumeur du Nord, que les vents emportèrent sauvagement hors de sa route. Pendant des semaines, l'équipage erra en mer, puis se retrouva sur une terre vierge regorgeant de richesses. Ils rentrèrent chez eux chargés de trésors, mais hélas, jamais ils ne retrouvèrent le chemin de cette terre d'abondance.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YColons Gérudiens§!, conférant §G+15 % de portée coloniale§! pendant 10 ans."
ace_beralic_saga: "§YLa Saga de Bera§!"
desc_ace_beralic_saga: "Bera fut la fondatrice du Royaume de Bjarnrík, d'abord écumeuse acclamée, puis unificatrice de la vallée du Dalr. La Saga de Bera retrace le récit de son retour au pays, lorsqu'elle chassa les Trolls qui avaient ravagé sa terre natale. Avec les forces unies des jarls dalriques et des Skaldes, Bera vainquit Urgnak le Vil, bannissant à jamais les Trolls dans les Monts Dalrfjall.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YFils de Bera§!, conférant §G+5 % de capacité de combat d'infanterie§! pendant 10 ans."
ace_dirge_of_the_deep: "§YLe Thrène des Abysses§!"
desc_ace_dirge_of_the_deep: "Récit sombre mais galvanisant, le Thrène des Abysses est une commémoration des héros déchus de la Gérudie qui furent ensevelis en mer. Le Thrène se chante souvent lors des funérailles, mais on l'entend aussi dans les salles d'hydromel, où de robustes écumeurs aguerris détournent le regard de tristesse.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YLa Gloire Attend§!, conférant §G+1 de bonus de combat naval au large de nos côtes§! pendant 10 ans."
ace_treasure_of_the_golden_forest: "§YLe Trésor de la Forêt Dorée§!"
desc_ace_treasure_of_the_golden_forest: "Légende originaire de Naugsvol, le Trésor de la Forêt Dorée est un conte édifiant sur la quête de richesses. La Forêt Dorée est une clairière mythique, que l'on dit située par-delà les Monts du Repos-des-Titans, regorgeant de trésors en joyaux, fourrures et or. Maints aventuriers partirent à la recherche de cette forêt, mais nul ne la trouva jamais. Dans les cols montagneux, on retrouve des corps gelés, témoignage de l'insaisissabilité de la forêt. Le conte de la Forêt Dorée met en garde ceux qui aspirent à la fortune de ne point prendre de risques inconsidérés.\n--------------------------------------\nUne fois promulgué, notre capitale obtiendra §G+10 % de modificateur de biens produits§! pendant 10 ans."
ace_the_old_winter_lullaby: "§YL'Ancienne Berceuse d'Hiver§!"
desc_ace_the_old_winter_lullaby: "Favorite des jeunes parents, l'Ancienne Berceuse d'Hiver est un chant apaisant qui endort même les nourrissons les plus turbulents. Curieusement, la Berceuse se récite dans une langue que seuls les Skaldes comprennent, sur un ton menaçant et guttural. Certains supputent même qu'il s'agit du conte exact que le Skalde légendaire chanta au Dragon pour le plonger dans le sommeil.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YLa Gérudie Pleure§!, conférant §G+1 d'attrition pour les ennemis§! pendant 10 ans."
ace_gjalund_and_the_giantslayers: "§YGjalund et les Pourfendeurs de Géants§!"
desc_ace_gjalund_and_the_giantslayers: "Un récit qui précède même Le Dragon et le Skalde. Il y a bien longtemps, quand les Géants arpentaient la terre, rares étaient ceux qui osaient s'opposer à eux. Gjalund, cependant, prit sa hache et en pourfendit un grand nombre de sa propre main, inspirant beaucoup à suivre son exemple. Mais l'histoire de Gjalund trouva son terme lorsque le puissant Dragon déclencha son effroyable hiver. Avec ses guerriers les plus intrépides, Gjalund mourut de froid en campant dans le crâne d'un géant mort.\n--------------------------------------\nUne fois promulgué, nous obtiendrons §G15§! de tradition militaire."
ace_master_boat_builders_of_far_gerudia_beyond: "§YMaîtres Charpentiers de Navires§!"
desc_ace_master_boat_builders_of_far_gerudia_beyond: "Souvent récité par les charpentiers de marine et les navigateurs le long des nombreuses côtes de la Gérudie, les Maîtres Charpentiers de Navires de la Gérudie Lointaine et d'au-delà narre l'existence d'un immense chantier naval antique, bien au-delà des mers gelées de la Gérudie Lointaine. Ce chantier serait exploité par de petites silhouettes pâles vêtues de chaudes fourrures, mais le plus impressionnant réside dans les navires qu'elles produisent. D'immenses langskips dotés de proues brise-glace en acier massif sortiraient de ce chantier, construits dans un bois jamais vu auparavant.\n--------------------------------------\nUne fois promulgué, nous obtiendrons §G15§! de tradition navale."
ace_tale_of_leif_snaketongue: "§YLe Conte de Leiv Langue-de-Serpent§!"
desc_ace_tale_of_leif_snaketongue: "Leiv Langue-de-Serpent était un Gérudien ordinaire, né à Redgarhavn il y a bien des années. On le négligeait souvent, car il n'était point béni de force ni de courage au combat. Son don résidait dans la ruse et le pouvoir de persuasion de ses paroles. Leiv Langue-de-Serpent acheta un navire et recruta un équipage, à prix réduit bien entendu, et mit les voiles vers la Frontière Alénique. Là, il rencontra une étrange cité nommée Celmaldor, habitée par les Elfes Lunaires, entre tous les peuples. Avec le venin de sa langue, Leiv convainquit les Elfes de l'élire à la tête de leur république.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YRepousser les Limites§!, conférant §G-0,15 de corruption annuelle§! pendant 10 ans."
ace_castan_ebonfrost: "§YL'Épopée d'Ébongivre§!"
desc_ace_castan_ebonfrost: "Certains prétendent que le pouvoir est leur droit de naissance. Qu'une couronne se porte par ceux d'une noble lignée. Fadaises : le pouvoir se mérite par ceux qui s'en emparent. Le Castan Ébongivre débuta sa vie en simple roturier dans les confins d'Urviksten, alors tributaire du déclinant Castanor. Gunnar Ébongivre rejoignit un équipage d'écumeurs et gagna sa vie par des tâches tant banales que violentes. Les Ébongivre crurent en force et en gloire au fil des ans, participant et menant raids et mises à sac à travers la Tête-de-Dame et la mer de Divenhal. Mais leur plus grande aventure fut le larcin de Castanor lui-même : en dupant les Castanoriens pour qu'ils l'acceptent comme gouverneur de Vrorenmarch, il se fraya un chemin sanglant à travers les tendres Castanoriens et se couronna Castan."
ace_skcorin: "§YLe Sacrifice de Corin§!"
desc_ace_skcorin: "Tel un conte d'antan, la jeune Corin pourfendit le monstrueux Korgus Jour-Fatal. Bien qu'Escannaise, elle a mérité sa gloire de plein droit, à tel point que certains la proclament déesse. Si sa divinité est sujette à débat, son héroïsme ne l'est point. Tant les hérétiques que les traditionalistes de la Cour Régente ont tissé leurs propres récits de dieux et d'avatars : tissons le martyre de Corin dans notre propre recueil de contes afin de trouver un terrain d'entente avec eux.\n--------------------------------------\nUne fois promulgué, nous obtiendrons un CB Deus Vult contre un pays païen voisin aléatoire."
ace_elven_voyages: "§YLes Voyages Elfiques§!"
desc_ace_elven_voyages: "Depuis longtemps, les Gérudiens sillonnent les mers en quête de gloire et de fortune. Par-delà les mers occidentales, les Elfes ont séduit et subjugué les Cannoriens, et porté un coup décisif contre le Castanor Noir. Leurs voyages à travers les océans, récits d'un lointain passé, et querelles politiques ont façonné le cours des siècles écoulés. Médités et consignés par les Skaldes, les récits de la mythologie elfique et de leurs exploits se content dans toute la Gérudie.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YMagnificence Elfique§!, conférant §G-10 % de coût d'idées§! pendant 10 ans."
ace_ebonsteel: "§YEinherjar d'Acier-d'Ébène§!"
desc_ace_ebonsteel: "Derrière chaque héros se trouve son outil de prédilection. Hache et lance, bouclier et heaume, cor et marteau : les épopées se forgent par l'art de forgerons légendaires. Depuis les temps anciens, bien avant qu'Elkaesal le Blanc ne gèle la Gérudie, les anciens Gérudiens forgeaient un métal noir comme le ciel nocturne. Les guerriers revêtus d'acier-d'ébène pourfendaient le fer commun, leurs boucliers résistaient aux assauts, et des montagnes entières furent sculptées en statues dans les Monts du Repos-des-Titans. L'art de forger l'acier-d'ébène avait été perdu, jusqu'à présent.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YAcier Noir, Cœurs Intrépides§!, conférant §G-10 % d'entretien terrestre et +5 % de capacité de combat d'infanterie§! pour nos régiments d'infanterie d'acier-d'ébène pendant 10 ans."
ace_ambrstrond: "§YAnnales d'Ambrströnd§!"
desc_ace_ambrstrond: "Découvrant une terre nouvelle par-delà les mers occidentales, les Gérudiens établirent la colonie d'Ambrströnd le long du fleuve Hjora. Appelée Dalaire par les méridionaux, cette terre semblait presque familière : des pics glacés, de vastes étendues de forêts de pins et des fjords sinueux. Mais derrière cette façade accueillante se cachaient bien des dangers étranges : de la sève hallucinogène, un pergélisol à la magie sauvage et les Skraelings, toujours aux aguets. Les journaux de la jeune colonie furent publiés au pays en Gérudie et connurent un vif succès en tant que récits d'aventures palpitantes."
ace_olav: "§YLes Premiers Gérudiens§!"
desc_ace_olav: "Presque oublié dans les brumes du mythe, le conte d'Urvik et Olav est aussi ancien que la terre elle-même. Menant leur peuple vers le nord par-delà les Jotuntars, Urvik fonda le premier foyer gérudien dans les Montagnes du Givre-Noir : Urviksten. Forgeant armures et armes légendaires en acier-d'ébène, Urvik et son fils Olav se retrouvèrent bientôt la cible de Trolls envieux. Le Roc d'Urvik fut âprement défendu contre le monstrueux ennemi, et à la force de la lame d'acier-d'ébène et du feu, nous repoussâmes les bêtes jusqu'au Dalr ! Devenu homme à son tour, Olav succéda à son père et fonda Olavsborg, immortalisé comme le père fondateur d'Olavlund.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YLeçons des Premiers Gérudiens§!, conférant §G+0,005 % de professionnalisme militaire§! pendant 10 ans."
ace_gnomes: "§YDe Thralls à Maîtres§!"
desc_ace_gnomes: "Prêtez l'oreille au conte du petit peuple, les gnomes de la Côte-du-Dragon ! À l'Ère du Givre-Noir, ils furent amenés sur ces terres en simples thralls, peinant sous le regard de leurs maîtres. Mais la roue du destin tourne, et leur fortune avec elle. L'esprit aiguisé des gnomes ne pouvait être ignoré, et bientôt les jarls reconnurent leur valeur. N'étant plus de simples serviteurs, ils s'élevèrent au rang de majordomes et teneurs de comptes, dignes de confiance dans les salles du pouvoir. Ce conte répand l'espoir parmi les jeunes thralls et serfs, car il montre que le destin de nul homme n'est gravé dans la pierre. Même le plus humble peut s'élever, si ses dons trouvent le lieu et l'instant propices pour briller.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YLieux d'Éducation§!, conférant §G+0,25 d'innovation annuelle§! pendant 10 ans."
ace_blue_reach: "§YL'Église de la Fonte§!"
desc_ace_blue_reach: "Contemplez la Thednkerkja, l'Église de la Fonte, érigée pour la première fois à Coldmarket en l'an 502. On dit qu'elle se dresse sur la terre même où la glace céda son emprise pour la première fois, lorsque le redoutable Elkaesal sombra dans le sommeil. Aussi n'est-il pas surprenant que Coldmarket abrite le plus grand nombre de Gérudiens hors de leur patrie, unis par le givre et la foi. Cette grande église se dresse tel un témoignage vivant du lien entre notre peuple et les robustes gens du Blue Reach, symbole de sang partagé et d'histoire commune, forgé dans la glace fondue."
ace_anbenncost: "§YCité des Cités§!"
desc_ace_anbenncost: "Anbenncóst, la Cité de l'Unité, comme l'appellent les méridionaux, se dresse comme la plus puissante cité de tout le monde connu. Nulle cité de Gérudie, ni Bayvic ni Konungrhavn, ne peut rivaliser avec sa splendeur. Aujourd'hui, une nouvelle saga commence, écrite de nos propres mains. Nous surpassons Godrac l'Envahisseur, nous éclipsons les exploits d'Ébongivre. Nous, les fils de la Gérudie, forgerons un nouvel âge : l'Âge de Gloire ! Que le monde se souvienne de nos hauts faits, car nous graverons nos noms dans la pierre de l'histoire, plus éclatants et plus audacieux que tous ceux qui nous précédèrent.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YCœur de Cannor§!, conférant §G+5 % d'efficacité administrative§! pendant 10 ans."
ace_harpies: "§YPlumes Gelées§!"
desc_ace_harpies: "Que cela soit su de tous : la Gérudie ne rejette point les étrangers. Il y a quelques siècles, un groupe solitaire de harpies chercha refuge aux confins de la Frontière Gérudienne, fuyant le courroux des méridionaux, mais ne trouva que la bataille, assailli par des pillards trolls. Alors que leur perte était certaine, une bande de guerre gérudienne vint à leur secours, et ensemble ils repoussèrent les trolls. En reconnaissance, les Harpies jurèrent de combattre aux côtés des Gérudiens, reprenant le nord aux trolls et aux cultistes d'Elkaesal. Pendant les siècles suivants, les harpies nous guidèrent au combat, manœuvrant l'ennemi et sauvant les blessés d'une mort certaine, veillant depuis les cieux. À ce jour, les Harpies Járnklo veillent sur les guerriers d'Olavlund, secourant les héros du champ de bataille et les portant à Vængheim, où leurs blessures sont soignées et leur vaillance honorée.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YSecours des Cieux§!, conférant §G-5 % d'attrition terrestre§! pendant 10 ans."
ace_fall_of_drekiriki: "§YLa Chute de Drekiríki§!"
desc_ace_fall_of_drekiriki: "Drekiríki, le Royaume des Dragons, aussi connu comme le Royaume d'Oddansbay, était un Royaume Écumeur sur la Côte-du-Dragon. Leur capitale à Oddansbay et les terres cultivées environnantes furent des acquisitions durement conquises, résultat de féroces guerres contre les kobolds tribaux. Fondé en 803 AA durant l'Ère du Givre-Noir, le Royaume Écumeur fonctionnait comme une confédération lâche de capitaines de navires et de seigneurs de guerre alliés qui ambitionnaient de coloniser le reste de la Côte-du-Dragon. Cependant, ils se heurtèrent à une résistance incessante des Kobolds qui avaient arraché ces terres aux Gnomes désormais affaiblis. Quand les guerres du Castan Ébongivre débutèrent, rares furent ceux qui rejoignirent Drekiríki, faisant basculer l'équilibre des forces dans l'autre sens. Le royaume fut réduit à une cité-État et pendant des décennies tint les murs de ce qui est aujourd'hui Oddansbay, jusqu'à sa destruction définitive en 901 lorsque les Kobolds submergèrent la ville. Les Dreki survivants gagnèrent la proche Révérie, retournèrent en Gérudie ou reprirent l'écumage. Leurs récits de leur défense désespérée de Drekiríki, où chaque homme, femme et enfant monta sur les remparts, ne furent jamais oubliés.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YContes de Défense§!, conférant §G+25 % de taille de garnison§! pendant 10 ans."
ace_expedition_of_hallfred: "§YL'Expédition de Hallfred§!"
desc_ace_expedition_of_hallfred: "L'expédition menée par Hallfred Henriksson Fléau-de-Divenhal illustre comment les Hallfreders parvinrent au Brendrótaland, la Côte Aride. La preuve que tout ce qu'il faut pour changer l'histoire, c'est un seul Gérudien déterminé. Après avoir appareillé avec cinq navires depuis l'ancien monde, et en compagnie de quatre autres capitaines, il parvint à atteindre et coloniser Hallfredhavn, faisant montre de bravoure, de soif d'aventure et d'une grande aptitude maritime.\n--------------------------------------\nUne fois promulgué, nous obtiendrons §Y10 de Tradition Navale§!."
ace_burning_of_kykrskogr: "§YL'Incendie du Kykrskógr§!"
desc_ace_burning_of_kykrskogr: "Le Kykrskógr, aussi connu sous le nom d'Effelai, de Tswohvwoh'íi ou simplement de Jungle Vivante, est une entité vivante qui domina jadis l'ensemble de l'Effelai. Par les grands sacrifices des Oono'i, la Côte Aride, le Brendrótaland, a été libérée de son emprise. Ce Conte rappelle aux Hallfreders, aux colons gérudiens et aux Oono'i cette guerre légendaire et ce qui pourrait advenir si l'entité se réveillait.\n--------------------------------------\nUne fois promulgué, la §YTerre Brûlée§! remboursera le coût en §YPuissance Militaire§!."
ace_upgraded_burning_of_kykrskogr: "§YL'Incendie du Kykrskógr§!"
desc_ace_upgraded_burning_of_kykrskogr: "Le Kykrskógr, aussi connu sous le nom d'Effelai, de Tswohvwoh'íi ou simplement de Jungle Vivante, est une entité vivante qui domina jadis l'ensemble de l'Effelai. Par les grands sacrifices des Oono'i, la Côte Aride, le Brendrótaland, a été libérée de son emprise. De nouveaux efforts pour repousser le Kykrskógr plus loin encore se sont heurtés à la résistance féroce de thralls, de Skraelings, de bêtes et même des lianes de la jungle. Les leçons ancestrales du passé, combinées aux expériences plus récentes, guideront nos guerriers pour combattre avec férocité et user du feu dans toute sa mesure.\n--------------------------------------\nUne fois promulgué, la §YTerre Brûlée§! remboursera le coût en £mil£§YPuissance Militaire§!."
ace_jotunnheim: "§YJötunnheim§!"
desc_ace_jotunnheim: "En surmontant de multiples épreuves, les Hallfreders ont forgé un Empire dans le sud d'Aelantir. Nous avons combattu la mer, la faim, les Skeggmenn et les Blámenn. Les Contes de ces guerres sont consignés dans des pierres runiques sur les plages de Saltrsandr et transmis de bouche à oreille par chaque Hallfreder et loyal Langeyru. Un Empire bâti sur les cendres de Jötunnheim, le royaume jadis habité par les Géants. Leurs bâtiments gargantuesque, corps pétrifiés, murailles titanesques et projets primordiaux parsèment le continent et inspirent l'émerveillement.\n--------------------------------------\nUne fois promulgué, nous obtiendrons §Y100 £adm£de Puissance Administrative§!."
ace_upgraded_jotunnheim: "§YJötunnheim§!"
desc_ace_upgraded_jotunnheim: "En surmontant de multiples épreuves, les Hallfreders ont forgé un Empire dans le sud d'Aelantir. Nous avons combattu la mer, la faim, le Kykrskógr, les Skeggmenn et les Blámenn. Les Contes de ces guerres sont consignés dans des pierres runiques sur les plages de Saltrsandr et transmis de bouche à oreille par chaque Hallfreder et loyal Langeyru. Un Empire bâti sur les cendres de Jötunnheim, le royaume jadis habité par les Géants. Leurs bâtiments gargantuesque, corps pétrifiés, murailles titanesques et projets primordiaux parsèment notre empire et s'accompagnent de nos propres accomplissements gigantesques.\n--------------------------------------\nUne fois promulgué, nous obtiendrons §Y200 £adm£de Puissance Administrative§!."
ace_askel_reaverking: "§YLe Conte des Révériens§!"
desc_ace_askel_reaverking: "En 825, le Roi-Écumeur Askel accosta au Débarquement-des-Écumeurs, s'emparant des provinces les plus septentrionales du Royaume d'Iochand. Avec l'aide des gnomes, il exécuta par la suite un débarquement minutieusement planifié dans le bien défendu Col-des-Gnomes, contrôlé par le royaume alénique d'Eaglecrest. Les Aléniques n'eurent aucune chance et détalèrent, et c'est ainsi que le Royaume de Révérie fut fondé, servant de port sûr pour tous les écumeurs sur le chemin du retour vers la Gérudie.\n--------------------------------------\nUne fois promulgué, nous obtiendrons §Y20 de Réseau d'Espionnage§! chez chacun de nos §YRivaux§!."
ace_derhilde_reaverqueen: "§YL'Héritage de la Reine-Écumeuse§!"
desc_ace_derhilde_reaverqueen: "Derhilde la Reine-Écumeuse conquit l'ouest du Lencenor par vengeance pour son père, le Roi-Écumeur Rangvald, vaincu et tué lors de l'invasion initiale de 850. Elle devint finalement Haute Reine du Lencenor pour un bref temps après avoir pillé la capitale lencori de Lorentei. Bien que son peuple fût repoussé jusqu'au Deranne proprement dit après la mort de Derhilde, il parvint à se mêler aux Lencori autochtones, forgeant la culture derannique, nommée d'après leur Reine.\n--------------------------------------\nUne fois promulgué, chacun de nos sujets perdra §Y10 de désir de liberté§!."
ace_halfdal_the_hoarder: "§YÉcumeurs du Divenhal§!"
desc_ace_halfdal_the_hoarder: "Halfdal Henriksson, second fils du légendaire Henrik Fléau-de-Divenhal, nourrissait l'ambition de surpasser la fortune et la renommée de son défunt père. Quatre ans après la mort de ce dernier, il appela les autres Royaumes Écumeurs aux armes et lança l'invasion du dernier vestige de la République Damérienne : la république de Tef. Un an plus tard, les derniers irréductibles damériens se rendirent, marquant la proclamation du Royaume Écumeur de la Mer de Divenhal, la plus grande puissance navale de Cannor, de la Détresse-Maternelle et du Bulwar. Halfdal Henriksson avait accompli ses ambitions.\n--------------------------------------\nUne fois promulgué, nous obtiendrons le modificateur §YAmbitions de Halfdal§!, nous conférant §Y+25 % de butin provincial disponible§! pendant 10 ans, rendant nos raids plus lucratifs."
ace_henrik_divenscourge: "§YÉcumeurs Impériaux§!"
desc_ace_henrik_divenscourge: "Henrik Fléau-de-Divenhal était un écumeur dalrique qui fonda le Royaume de Bord-de-Perles en 879 après avoir conquis des terres au Royaume Trétunique en revenant de Divenhal vers la Gérudie. Son fils Harald épousa la princesse locale Andarta Tretunis, fondant la dynastie des Pearlman, qui serait l'une des plus éminentes dynasties de la politique impériale pour le millénaire à venir, tandis que son second fils Halfdal organisa sa propre flotte d'écumeurs et fonda le Royaume de Divenhal.\n--------------------------------------\nUne fois promulgué, nous perdrons §Y10 d'autonomie locale§! dans chacune de nos provinces."
ace_harpies_upgraded: "§YL'Âge de Fer§!"
desc_ace_harpies_upgraded: "L'Âge de Fer s'abat sur Cannor. Jadis réfugiées, les Harpies Járnklo sont parvenues à l'impensable : non seulement leur sagesse et leur prouesse au combat ont unifié la Gérudie, mais les redoutables Grandes Puissances cannoriennes ont plié le genou devant elles, l'une après l'autre. Véritablement, un exploit digne des plus hautes louanges !"



