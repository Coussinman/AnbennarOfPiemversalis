l_french:
 orc_slavery.1.t:0 "Esclaves Orques en Aelantir"
 orc_slavery.1.d:0 "Après la Marée Verte, de nombreux orques furent capturés et vendus comme esclaves tant par des aventuriers entreprenants que par les États orques naissants eux-mêmes aux royaumes civilisés de Cannor, des cités comme Vertesk en tirant grand profit. À l'Ère de l'Effilochage, les esclaves orques étaient devenus la norme parmi les empires coloniaux d'Aelantir, remplissant leurs plantations d'une main-d'œuvre corvéable et bon marché.\n\nNos gouverneurs coloniaux rapportent que la province de [Root.GetName] a constitué une minorité orque conséquente en raison de ce phénomène."
 orc_slavery.1.a:0 "Au travail !"
 orc_slavery.2.t:0 "L'Esclavage Orque Porte ses Fruits"
 orc_slavery.2.d:0 "Bien que l'esclavage soit un acte déplorable, nos esclaves orques de la province de [Root.GetName] ont grandement contribué au développement de la richesse et des infrastructures de la province."
 orc_slavery.2.a:0 "Tout va pour le mieux."
 orc_slavery.3.t:0 "Troubles parmi les Esclaves Orques"
 orc_slavery.3.d:0 "Les orques ne respectent que la force, dont les propriétaires de plantations de [Root.GetName] semblent cruellement manquer : leurs esclaves refusent désormais de travailler et saccagent leurs propres plantations ! Tandis qu'ils tentent de reprendre le contrôle de la situation, ils nous demandent conseil."
 orc_slavery.3.a:0 "Décimez promptement les rangs orques et enseignez-leur l'obéissance"
 orc_slavery.3.b:0 "Ramenez-les à l'ordre, mais tâchez de capturer les esclaves plutôt que de les tuer"
 orc_slavery.4.t:0 "Marché aux Esclaves Orques"
 orc_slavery.4.d:0 "Les esclaves orques sont véritablement l'épine dorsale d'Aelantir, et c'est pourquoi plusieurs propriétaires de plantations disposant d'un surplus d'esclaves ont proposé que nous établissions nos propres opérations commerciales locales à [Root.GetName] plutôt que de dépendre des importations cannoriennes."
 orc_slavery.4.da:0 "L'esclavage orque étant désormais interdit à Cannor, plusieurs propriétaires de plantations entreprenants disposant d'un surplus d'esclaves ont proposé que nous établissions nos propres opérations commerciales locales à [Root.GetName] afin de satisfaire notre demande et celle de nos voisins."
 orc_slavery.4.a:0 "Ouvrons boutique !"
 orc_slavery.4.b:0 "Vendez simplement vos esclaves excédentaires"

 orc_slavery.5.t:0 "Rapatriement par l'Esclavage"
 orc_slavery.5.d:0 "Les orques ont ravagé cette grande région et n'ont apporté avec eux que mort et destruction.\n\nAlors que la redécouverte d'Aelantir bat son plein, des marchands de la faction des Chercheurs-de-Fortune vendent des prisonniers orques comme travailleurs pour les colonies et ont suggéré que nous financions leurs opérations à [Root.GetName] en échange d'or et d'investissements.\n\nL'esclavage est condamnable, et Castan lui-même fut esclave... mais cela fait d'une pierre deux coups. Nous pouvons nous débarrasser des envahisseurs ET obtenir des fonds pour restaurer l'Escann..."
 orc_slavery.5.a:0 "Justice et Profit"
 orc_slavery.5.b:0 "C'est mal."
 orc_slavery.6.t:0 "Des Chaînes pour les Vaincus"
 orc_slavery.6.d:0 "Le fort dominera toujours le faible, et le faible s'inclinera toujours devant le fort.\n\nCertains de nos chefs sont connus pour vendre des orques vaincus et affaiblis de clans rivaux à des marchands efféminés qui prétendent les envoyer outre-mer. Ils nous demandent de soutenir leurs efforts et d'apporter la gloire à notre clan ainsi qu'une seconde chance pour nos frères de prouver leur force."
 orc_slavery.6.a:0 "Réduisez les faibles en esclavage. S'ils sont forts, ils triompheront."
 orc_slavery.6.b:0 "Nous devons être unis si nous voulons bâtir un nouveau foyer"
 orc_slavery.7.t:0 "L'Esclavage Orque Décline suite à l'Interdiction"
 orc_slavery.7.d:0 "Les puissances de Cannor ayant interdit la vente d'esclaves orques, il n'est plus rentable de capturer et de vendre des orques. Ceux qui demeurent en captivité ont été mis au travail en Escann comme travailleurs sous contrat, tandis que certains ont été entièrement libérés.\n\nCependant, les esclavagistes de [Root.GetName] nous demandent notre aide pour poursuivre ce commerce déclinant mais encore lucratif."
 orc_slavery.7.a:0 "Aidons-les"
 orc_slavery.7.b:0 "C'est ainsi que les choses se passent"
 orc_slavery.71.t:0 "Esclaves Orques Vendus suite à l'Édit d'Expulsion"
 orc_slavery.71.d:0 "Notre Édit d'Expulsion contre la race orque a forcé de nombreux esclavagistes à cesser leurs activités, beaucoup vendant leur stock en gros au premier acheteur. Les esclavagistes de [Root.GetName] ont fait faillite, mais au moins il y aura moins d'orques désormais."
 orc_slavery.71.a:0 "Bon débarras."
 orc_slavery.72.t:0 "Esclaves Orques Vendus suite à l'Édit de Purge"
 orc_slavery.72.d:0 "Notre Édit de Purge contre la race orque a forcé de nombreux esclavagistes à cesser leurs activités. Certains ont réussi à vendre leur stock, mais la plupart ont été contraints d'abattre et d'exécuter tous leurs esclaves restants par crainte d'être arrêtés. Les esclavagistes de [Root.GetName] ont fait faillite et sont légitimement mécontents de cette situation, mais au moins notre pays sera débarrassé des orques."
 orc_slavery.72.a:0 "Bon débarras."


 orc_slavery.8.t:0 "Vertesk, la Cité des Chaînes"
 orc_slavery.8.d:0 "Le premier fut un spectacle étrange : un obscur marchand escannien vendant des orques à la peau verte sur l'un de nos quais. Finalement, cependant, tout le quartier des docks en fut rempli.\n\nLes orques furent jadis une menace, mais ils sont désormais devenus une marchandise. Il semble que beaucoup en Aelantir outre-mer réclament à grands cris une main-d'œuvre bon marché et robuste qui ne soulève guère de scrupules moraux, Vertesk devenant bientôt l'épicentre de ce commerce. Après tout, ils ont envahi la surface, alors peut-être devraient-ils payer pour leurs crimes ? Pourquoi ne pas en tirer quelque profit ?"
 orc_slavery.8.a:0 "Justice pour l'Escann, Profit pour Nous"
 orc_slavery.8.b:0 "Castan était contre l'esclavage, nous aussi"
 orc_slavery.9.t:0 "Le Krahzate de Nathalaire"
 orc_slavery.9.d:0 "La redécouverte d'Aelantir a engendré une demande incroyable de main-d'œuvre pour les colonies : en l'occurrence, des orques.\n\nSi beaucoup à Cannor considèrent ce commerce comme répugnant, il a grandement prospéré dans la cité de Vertesk, et nombre de nos contacts dans le monde interlope ont commencé à vendre des esclaves parmi leurs marchandises volées dans les maisons de vente aux enchères de Nathalaire. En effet, nos liens à travers la Divenhal ont commencé à attirer des gnolls désireux de participer à ce nouveau commerce florissant, et ils ont établi un quartier esclavagiste gnoll officiel dans la cité : que les locaux appellent le « Krahzate », d'après le mot gnoll pour esclavagiste, « Krah »."
 orc_slavery.9.a:0 "L'esclavage est un commerce sombre, et nous œuvrons dans les ténèbres"
 orc_slavery.9.b:0 "Nous pratiquons le vol honorable, monsieur !"

 orc_slavery.10.t:0 "L'Esclavage Orque en Aelantir"
 orc_slavery.10.d:0 "La Marée Verte a déferlé avec un ennemi sans fin et sans remords pour les forces de Cannor, mais après le reflux vint une nouvelle opportunité. Un nouveau peuple, sans terre par nature et sauvage de naissance, mûr pour la cueillette.\n\nCes orques furent capturés et vendus tant par des marchands intrépides que par leurs propres congénères aux plantations du continent fraîchement redécouvert d'Aelantir, servant de fondation à l'économie florissante du continent jadis perdu."
 orc_slavery.10.a:0 "Rejoignons ce commerce"
 orc_slavery.10.b:0 "Nos colonies ne seront pas souillées par l'esclavage"

 orc_slavery.11.t:0 "La Cité des Chaînes n'est Plus"
 orc_slavery.11.d:0 "Les forces de Cannor, en particulier les marchands intrigants de la Tête-de-Dame, ont longtemps été envieuses de la grande puissance et de la richesse de Vertesk tirées de ses esclaves, et ont depuis interdit cette vente à Cannor.\n\nVertesk, ses stocks se tarissant, n'a eu d'autre choix que de se tourner vers d'autres sources de richesse. La Cité des Chaînes n'est plus, mais cela ne signifie pas que Vertesk doive mourir avec les orques qu'elle vendait autrefois.\n\nDésormais, Vertesk va..."
 orc_slavery.11.a:0 "...dicter les modes du Nord"
 orc_slavery.11.b:0 "...traiter en contrats, licites ou non"
 orc_slavery.11.c:0 "...produire des raffinements aléniques"
 orc_slavery.11.dd:0 "...ne pas fléchir. Les chaînes sont éternelles, légales ou non."

 orc_slavery.12.t:0 "L'Esclavage dans l'Ombre ?"
 orc_slavery.12.d:0 "Les forces de Cannor ont depuis interdit la vente d'esclaves à Cannor. Heureusement, les Nathalaireys sont habitués à gérer de telles affaires, et les coquins et contrebandiers de la cité flairent le profit dans la contrebande illicite, vivante ou non.\n\nPlusieurs membres du Conseil de l'Ombre suggèrent que nous nous concentrions sur d'autres secteurs d'activité, mais des membres éminents du Krahzate promettent des fortunes pour tous dans ce nouveau monde de l'esclavage illégal. Après tout, les plantations d'Aelantir sont toujours en manque, et les seigneurs du Rahen se sont tournés vers l'ouest pour un bétail plus intéressant."
 orc_slavery.12.a:0 "Une Cité dans les Ombres"
 orc_slavery.12.b:0 "Une Cité des Ombres a Besoin de Lumière"

 orc_slavery.13.t: "Afflux d'Esclaves Orques"
 orc_slavery.13.d: "Au cours des dernières décennies, marchands, fermiers et nobles de [luciande_slavery_target.GetName] ont acheté de grandes quantités d'esclaves orques. Cela a conduit à une augmentation massive des esclaves disponibles, renforçant les marchés aux esclaves locaux."
 orc_slavery.13.a: "Ils seront utiles plus tard"
 orc_slavery.13.b: "Établissons un marché aux esclaves officiel"

 orc_slavery.14.t: "Argent Vert"
 orc_slavery.14.d: "Les plantations sont une affaire lucrative, leurs propriétaires étant aussi riches et influents que les nobles le sont à Cannor. Leur richesse est devenue connue sous le nom d'argent vert, car elle pousse dans les champs grâce au labeur orque, dans un cycle sans fin de misère et de profit.\n\nLes planteurs de [Root.GetName] ont décidé d'étendre leurs activités, et donc leur influence, en achetant encore plus d'esclaves orques."
 orc_slavery.14.a: "Plus d'orques signifie plus de profits"
 orc_slavery.14.b: "Il semblerait que les orques surpassent désormais leurs maîtres en nombre à [Root.GetName]"

 orcish_slave_boom:0 "Essor de l'Esclavage Orque"
 orcish_slaves_in_colonies:0 "Esclaves Orques dans les Colonies"
 tooltip_orcish_slaves_in_colonies:0 "Active les §YÉvénements d'Esclavage Orque§! et permet la création de §YMinorités Orques§! dans vos provinces d'Aelantir.\n\n§YVous ne pourrez pas annuler ceci pendant 10 ans.§!"
 tooltip_no_orcish_slaves_in_colonies:0 "Empêche les §YÉvénements d'Esclavage Orque§! et la création de nouvelles §YMinorités Orques§! dans vos provinces d'Aelantir.\n\n§T(Cela ne supprime pas les minorités orques existantes ni les marchandises de traite esclavagiste ; pour ce faire, utilisez les décisions d'Expulsion/Purge et d'Abolition de l'Esclavage)§!\n\n§YVous ne pourrez pas annuler ceci pendant 10 ans.§!"
 orcish_slaves_in_colonies_cooldown:0 "Délai des Esclaves Orques dans les Colonies (10 ans)"