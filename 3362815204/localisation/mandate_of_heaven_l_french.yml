l_french:
 NO_EDICT_PLAIN:0 "Aucun Édit"
 INCREASE_THEIR_LD:0 "\n\nCela augmentera également leur §YDésir de Liberté§! de §R$LD$%§!."
 THEY_GET:0 "Ils obtiennent :\n"
 ISOLATIONISM_DIFFERENCE:0 "Ceci est à $DIF|Y$ de notre propre Isolationnisme, nous coûtant :\n$EFFECTS$\n"
 ISOLATIONISM_SAME:0 "Ceci est identique à notre propre Isolationnisme, nous donnant :\n$EFFECTS$\n"
 TRIBUTARY_NOT_HORDE_OR_EASTERN_RELIGION:0 "Seul l'Empereur Céleste, les pays du groupe religieux oriental et les pays avec un gouvernement de Nomades des Steppes peuvent établir des États Tributaires."
 TRIBUTARY_IS_TRIBUTARY:0 "Les Tributaires ne peuvent pas établir d'États Tributaires."
 TRIBUTARYTITLE:0 "Établir une Satrapie"
 TRIBUTARYDESC:0 "Leur suggérer de devenir une Satrapie sous notre domination."
 CANCELTRIBUTARYTITLE:0 "Annuler la Satrapie"
 CANCELTRIBUTARYDESC:0 "Annuler notre arrangement de Satrapie."
 TRIBUTARYNEWDESC:0 "Souhaitez-vous demander à $COUNTRY|Y$ de devenir votre §YSatrapie§! ?\nEn tant que leur Suzerain, vous pourrez exiger un tribut annuel de leur part sous forme de ¤, £adm£, £dip£, £mil£ ou £icon_manpower£.\nIls pourront toujours avoir des relations diplomatiques indépendantes avec d'autres pays.\nS'ils sont technologiquement moins avancés que nous, ils obtiendront une réduction de $EFFECT$ sur le coût des technologies."
 BREAKTRIBUTARYNEWDESC:0 "Souhaitez-vous cesser d'être une Satrapie de $COUNTRY$ ? Cela créera une trêve entre vos pays et affectera négativement les relations."
 TRIBUTARYREQDESC:0 "$ACTOR$ nous offre de devenir leur Satrapie."
 SELECT_TRIBUTE_TITLE:0 "Sélectionner le Tribut"
 OVERLORD_CHANGED_TRIBUTE_TYPE:0 "Notre suzerain §Y$OVERLORDNAME$§! exige désormais que nous envoyions §Y$NAME$§! comme Tribut chaque année."
 ONLY_TRIBUTARY_CAN_SEND_TRIBUTE:0 "Seuls les États Tributaires peuvent envoyer un Tribut."
 TRIBUTARYBREAKDESC:0 "Souhaitez-vous rompre notre arrangement de Satrapie avec §Y$COUNTRY$§! ?\nCela détériorera nos relations et créera une trêve entre nous pour les prochaines $TRUCE$ années."
 TRIBUTARYSUBJECTBREAKDESC:0 "Souhaitez-vous rompre notre arrangement de Satrapie avec §Y$COUNTRY$§! ?\nCela réduira notre stabilité de §R$STAB$§! et détériorera nos relations."
 TRIBUTARY_BREAK_TRUST:0 "Ils ne nous font plus confiance."
 TRIBUTARY_BREAK_THREATENED:0 "Ils sentent que nous devenons une menace pour eux."
 DEMAND_TRIBUTE_TYPE:0 "Exiger §Y$TYPE$§! comme Tribut."
 DEMAND_TRIBUTE_YEARLY_DESC:0 "Le Tribut attendu à la fin de cette année s'élèvera à $AMOUNT|Y$ $TYPE$."
 CURRENT_TRIBUTE_TYPE:0 "Nous exigeons §Y$TYPE$§! comme Tribut."
 ASKFORTRIBUTARYDESC:0 "Demander si vous pouvez devenir leur Satrapie."
 ASKFORTRIBUTARYNEWDESC:0 "Souhaitez-vous demander à $OVERLORD|Y$ si vous pouvez devenir leur §YSatrapie§! ?\nS'ils acceptent, ils pourront exiger que nous envoyions un tribut annuel sous forme de ¤, £adm£, £dip£, £mil£ ou £icon_manpower£.\nNous pourrons toujours avoir des relations diplomatiques indépendantes avec d'autres pays.\nSi $OVERLORD$ est technologiquement avancé par rapport à nous, nous obtiendrons une réduction de $EFFECT$ sur le coût des technologies."
 ASKFORTRIBUTARYTRADELEAGUEWARNING:0 "§RNous serons retirés de notre Ligue Commerciale !§!"
 ASKFORTRIBUTARYTITLE:0 "Devenir leur Satrapie"
 ASKTRIBUTARYDESC:0 "§Y$ACTOR$§! veut être notre §YSatrapie§!. S'ils acceptent, nous pourrons exiger qu'ils nous envoient un tribut annuel sous forme de ¤, £adm£, £dip£, £mil£ ou £icon_manpower£.\nIls pourront toujours avoir des relations diplomatiques indépendantes avec d'autres pays.\nS'ils sont technologiquement moins avancés que nous, ils obtiendront une réduction de $EFFECT$ sur le coût des technologies."
 ESTABLISHTRIBUTARYDESC:0 "§Y$ACTOR$§! veut que nous devenions leur §YSatrapie§!. Si nous acceptons, ils pourront exiger que nous leur envoyions un tribut annuel sous forme de ¤, £adm£, £dip£, £mil£ ou £icon_manpower£.\nNous pourrons toujours avoir des relations diplomatiques indépendantes avec d'autres pays.\nSi $ACTOR$ est technologiquement avancé par rapport à nous, nous obtiendrons une réduction de $EFFECT$ sur le coût des technologies."
 ESTABLISHTRIBUTARYTRADELEAGUEWARNING:0 "§RAccepter nous retirera de notre Ligue Commerciale !§!"
 ICON_TRIBUTARY:0 "Une offre de devenir une §YSatrapie§!"
 ICON_ASK_TRIBUTARY:0 "Une offre de devenir notre §YSatrapie§!"
 TRIBUTARY_MISSION_WAR_NAME:0 "$ORDER$$FIRST$ guerre pour le Tribut de $SECOND_NAME$"
 cb_force_satrapy:0 "Imposer une Satrapie"
 cb_force_satrapy_desc:0 "Nous les forcerons à devenir une Satrapie."
 cb_force_tributary_anb:0 "Imposer un Tributaire"
 cb_force_tributary_anb_desc:0 "Nous les forcerons à devenir un Tributaire."
 CB_ALLOWED_TRIBUTARY:0 "Satrapie Imposée"
 CONFIRM_SEND_TRIBUTE_TITLE:0 "Confirmer le Tribut Annuel"
 CONFIRM_SEND_TRIBUTE_DESC:0 "Notre Suzerain §Y$OVERLORD$§! exige que nous leur envoyions le Tribut de cette année sous forme de §Y$AMOUNT$§! $TYPE$.\nCe faisant, la Confiance entre nos nations augmentera de §Y$POS_TRUST$§!.\nRefuser perturbera nos relations et diminuera leur Confiance en nous de §Y$NEG_TRUST$§!."
 TRIBUTE_CANT_REFUSE_WHEN_TRUCE:0 "Nous ne pouvons pas refuser d'envoyer le Tribut à notre Suzerain tant que nous avons une Trêve avec eux."
 REFUSE:0 "Refuser !"
 CREATE_SUBJECT:0 "Faire de §Y$WHO$§! un $TYPE$.\n"
 REFUSED_CALL_FROM_TRIBUTARY_PENALTY:0 "Si nous refusons, nous perdrons $MANDATE|R$ de Mandat."
 tributary_state_behind_overlord_tech_adm:0 "Satrapie avec moins de niveaux totaux de Technologie Administrative que le Suzerain"
 tributary_state_behind_overlord_tech_dip:0 "Satrapie avec moins de niveaux totaux de Technologie Diplomatique que le Suzerain"
 tributary_state_behind_overlord_tech_mil:0 "Satrapie avec moins de niveaux totaux de Technologie Militaire que le Suzerain"
 CURRENT_HARMONY:0 "Harmonie"
 HARMONY_DESCRIPTION:1 "L'Harmonie religieuse de notre nation augmentera naturellement au fil du temps. Convertir des provinces et s'Harmoniser avec d'autres religions réduira notre Harmonie à court terme."
 CURRENT_HARMONY_VAL:0 "§YHarmonie : $VAL$§!\nChange de $CHANGE$ par an :\n"
 HARMONY_LOSS_FROM_CONV:0 "Cela diminue notre Harmonie de §R$VAL$§!."
 HARMONY_FROM_HARMONIZING:0 "Harmonisation avec $RELIGION$ : $VAL$"
 MISSIONARY_HARMONY_LOSS_DESC:1 "Convertir cette province diminuera l'Harmonie de §R$VAL$§!\n(§R$LOSS_PER_DEV$§! par Développement)."
 MODIFIER_YEARLY_HARMONY:0 "Augmentation Annuelle de l'Harmonie"
 low_harmony:0 "Harmonie Faible"
 high_harmony:0 "Harmonie Élevée"
 overlord_daimyo_at_peace:0 "Daimyos en paix"
 overlord_daimyo_same_isolationism:0 "Isolationnisme des Daimyos"
 HARMONIZE_WITH_RELIGION:0 "§YS'Harmoniser avec une Religion§!"
 HARMONIZE_DESC:0 "Les provinces avec des Religions Harmonisées sont tolérées comme si elles étaient §Y$NAME$§!.\nLes pays suivant l'une de vos Religions Harmonisées vous considéreront comme si vous suiviez cette religion."
 HARMONIZE_DESC_CURRENT:1 "Actuellement en Harmonisation avec §Y$RELIGION$§!\nProgrès : §Y$PROGRESS$§!\nAchèvement estimé : $DONE|Y$"
 HARMONIZE_GROUP_DESC_CURRENT:1 "Actuellement en Harmonisation avec le Groupe Religieux §Y$GROUP$§!.\nProgrès : §Y$PROGRESS$§!\nAchèvement estimé : $DONE|Y$"
 CANCEL_HARMONIZATION:0 "Annuler l'Harmonisation"
 estate_shangbang:0 "Shangbang"
 estate_gentry:0 "Shizu"
 gentry_dominance:0 "Dominance des Shizu"
 EST_VAL_CELESTIAL_EMPIRE:0 "Empire Céleste : §Y$VAL$%§!"
 desc_gentry_dominance:0 "Les Clans de la Noblesse Terrienne contrôlent totalement notre gouvernement et l'acceptation du trône impérial a été réduite à une simple formalité."
 tributary_smuggling_ring_subject:0 "Réseau de Contrebande"
 desc_tributary_smuggling_ring_subject:0 "Les produits de nos artisans sont si recherchés qu'un petit réseau s'est formé pour approvisionner les acheteurs dans le pays de notre suzerain. Ce n'est pas strictement légal et une grande partie du profit est sans doute siphonnée par divers fonctionnaires corrompus en chemin, mais c'est tout de même un avantage majeur pour l'économie de notre pays."
 tributary_smuggling_ring_overlord:0 "Afflux de Biens Exotiques"
 desc_tributary_smuggling_ring_overlord:0 "Bien que ce ne soit pas strictement légal, il y a un commerce non réglementé croissant de biens de luxe entre nous et l'un de nos tributaires."
 tributary_institution_influence:0 "Diffusion du Savoir"
 desc_tributary_institution_influence:0 "Notre relation tributaire nous permet d'apprendre une chose ou deux des hommes et femmes plus avancés du centre impérial."
 tributary_diplomatic_influence:0 "Influence Diplomatique"
 desc_tributary_diplomatic_influence:0 "Notre relation tributaire nous permet d'avoir une plus grande influence sur la politique internationale que nous n'en aurions autrement."
 tributary_diffusion_of_knowledge:0 "Diffusion des Connaissances"
 desc_tributary_diffusion_of_knowledge:0 "Notre réseau tributaire nous a permis d'attirer des idées et méthodes qui autrement mettraient plus de temps à atteindre nos frontières."
 tributary_overlord_trading_port:0 "Port Commercial Tributaire"
 desc_tributary_overlord_trading_port:0 "Cette province connaît une croissance économique car elle est le port d'attache des flottes tributaires locales. C'est également là qu'un grand nombre de marchandises du suzerain arrivent dans le pays et où la plupart des marchands du suzerain se sont installés."
 influential_tributary_network:0 "Influence Politique"
 desc_influential_tributary_network:0 "Notre réseau tributaire nous a marqués comme un État d'importance bien au-delà de nos frontières."
 tributary_overlord_refugees:0 "Installation de Réfugiés Politiques"
 desc_tributary_overlord_refugees:0 "Cette province connaît un essor économique dû à l'installation d'un groupe de réfugiés politiques compétents."
 tributary_mission_piracy:0 "Piraterie"
 desc_tributary_mission_piracy:0 "Les flottes tributaires sont assaillies par des pirates en haute mer. Cela nous fait perdre des revenus et a augmenté les coûts de surveillance des routes maritimes."
 tributary_gave_up_political_refugees:0 "A livré les Réfugiés Politiques"
 tributary_forced_brain_drain:0 "Migration Forcée de l'Élite"
 tributary_aiding_smugglers:0 "Aide aux Contrebandiers"
 tributary_stopped_smugglers:0 "Nous a aidés contre les Contrebandiers"
 tributary_soured_relations:0 "Incident Tributaire"
 tributary_impressive_overlord:0 "Impressionné par le Suzerain"
 tributary_same_overlord:0 "Dans la même Sphère Tributaire"
 forced_brain_drain:0 "A envoyé des Savants"
 tributary_harbored_criminals:0 "A hébergé des Criminels"
 tributary_harbored_criminals_refused_compensation:0 "Héberge des Criminels"
 tributary_paid_for_service:0 "Récompensé pour Loyauté"
 tributary_ungrateful_overlord:0 "Suzerain Ingrat"
 tributary_events.1.t:0 "La Diaspora [Root.GetAdjective]"
 tributary_events.1.d:0 "Notre relation tributaire avec [Root.Overlord.GetName] est certainement très souple, mais elle a tout de même ouvert un monde d'opportunités pour les fonctionnaires et entrepreneurs talentueux. Beaucoup en sont venus à considérer [Root.Overlord.Capital.GetCapitalName] comme la meilleure destination de carrière, et à chaque mission tributaire, davantage partent voir les merveilles de la capitale [Root.Overlord.GetAdjective].\nBien qu'il y ait eu initialement quelques inquiétudes que cela constitue une fuite de certaines des personnes les plus appréciées de notre pays, cela nous donne de l'influence dans le cercle plus large des pays autour de [Root.Overlord.GetName]. Les quelques personnes qui choisissent de revenir ont également une expérience précieuse que nous pouvons mettre à profit."
 tributary_events.1.a:0 "Mettons ces hommes de qualité à bon usage !"
 tributary_events.1.b:0 "C'est pour le bien du peuple [Root.GetAdjective]."
 tributary_events.2.t:0 "La Sphère [Root.Overlord.GetAdjective]"
 tributary_events.2.d:0 "En tant que partie de la sphère tributaire [Root.Overlord.GetAdjective], nous faisons de plus en plus partie du monde culturel [Root.Overlord.GetAdjective] plus large. La langue [Root.Overlord.Culture.GetName] peut être entendue dans les rues et même dans les hautes salles de [Root.Capital.GetCapitalName], et il y a une prise de conscience croissante de notre pays dans le [Root.Overlord.GovernmentName] de [Root.Overlord.GetName]."
 tributary_events.2.a:0 "Un bon moyen de se faire de nouveaux amis lointains."
 tributary_events.2.b:0 "Nos voisins seront impressionnés."
 tributary_events.3.t:0 "Capital Politique"
 tributary_events.3.d:0 "La protection d'un puissant [Root.Overlord.GovernmentName] est une aide non seulement contre les ennemis à l'étranger au sens militaire, c'est aussi un signal ferme et clair aux groupes politiques de notre [Root.GovernmentName]. Cela leur dit que notre [Root.Monarch.GetTitle] est sanctionné par le [Root.Overlord.Monarch.GetTitle] des [Root.Overlord.GetAdjective] et prête une partie de [Root.Overlord.Monarch.GetHerHis] splendeur à nous."
 tributary_events.3.a:0 "Cela mettra fin aux querelles mesquines !"
 tributary_events.3.b:0 "Cela nous permet d'apporter la paix à nos sujets."
 tributary_events.4.t:0 "Influence Impériale Croissante"
 tributary_events.4.d:0 "Bien que tous les pays ne méritent pas de faire partie de notre réseau tributaire, il devient de plus en plus clair que notre influence dans cette région est en hausse. Même les pays où nous avons peu, voire pas du tout, de pouvoir direct ressentent le besoin de se positionner activement selon les lignes directrices que nous fixons pour les pays de notre sphère. Dans de nombreuses cours, la langue [Root.Culture.GetName] est désormais considérée comme la langue de la diplomatie et de la culture, et notre [Root.Monarch.GetTitle] figure comme une autorité dans l'esprit des hommes et des femmes bien au-delà de nos frontières."
 tributary_events.4.a:0 "Nous devons utiliser cet élan pour accroître notre influence à l'étranger."
 tributary_events.4.b:0 "Capitalisons immédiatement sur cela pendant que nous le pouvons."
 tributary_events.5.t:0 "La Mission Tributaire [tributary_advanced_underling.GetAdjective]"
 tributary_events.5.d:0 "Avec la récente mission tributaire de [tributary_advanced_underling.GetName], nous n'avons pas seulement reçu des cadeaux précieux, nous sommes également entrés en contact avec des idées et des technologies différentes des nôtres. Il serait peut-être prudent de demander, très poliment, que les [tributary_advanced_underling.GetAdjective] nous fournissent plus de leurs meilleurs éléments afin que nous puissions faire leurs méthodes nôtres."
 tributary_events.5.a:0 "Le [Root.GovernmentName] peut toujours utiliser plus d'Eunuques."
 tributary_events.5.b:0 "Créons un quartier directement à [Root.Capital.GetCapitalName]."
 tributary_events.5.c:0 "Le peuple [Root.GetAdjective] est plus que capable de développer les choses par lui-même."
 tributary_events.6.t:0 "Marchands [Root.Overlord.GetAdjective]"
 tributary_events.6.d:0 "Un nombre accru de missions tributaires vers [Root.Overlord.GetName] a conduit le port de [tributary_trader_port.GetCapitalName] à devenir le principal point d'entrée pour les navires de notre suzerain. La province de [tributary_trader_port.GetName] a également commencé à attirer un plus grand nombre de marchands et d'aventuriers [Root.Overlord.GetAdjective], permettant à la région de prospérer davantage.\nCertains y voient sans doute un bon moyen d'éviter l'œil vigilant des douanes et des forces de l'ordre [Root.Overlord.GetAdjective], cependant. Encourager ces chercheurs de fortune prolongera probablement l'essor économique de [tributary_trader_port.GetName], mais cela pourrait ne pas être dans notre intérêt."
 tributary_events.6.a:0 "Accueillons ces immigrants."
 tributary_events.6.a.tt:0 "[Root.Overlord.GetName] sera contrarié s'ils découvrent que nous hébergeons des criminels."
 tributary_events.6.b:0 "Mieux vaut rester à l'écart de tout fauteur de troubles."
 tributary_events.7.t:0 "Abus du Statut Tributaire"
 tributary_events.7.d:0 "Il est venu à notre attention que le [tributary_criminal_country.Monarch.GetTitle] de [tributary_criminal_country.GetName] a hébergé un grand nombre de criminels, pirates et voleurs, leur donnant un port sûr près de nos intérêts. Cela nuit grandement à nos intérêts dans la région et nous a fait perdre la face auprès d'autres tributaires ainsi qu'auprès de notre propre cour."
 tributary_events.7.a:0 "Envoyez immédiatement une demande de cessation et de compensation !"
 tributary_events.7.b:0 "Hélas ! Il n'y a pas grand-chose que nous puissions faire."
 tributary_events.8.t:0 "Criminels Tributaires"
 tributary_events.8.d:0 "Des fonctionnaires [Root.Overlord.GetAdjective] nous accusent d'héberger des criminels économiques et de les protéger de la justice légitime du [Root.Overlord.GovernmentName]. Selon les [Root.Overlord.GetAdjective], nous leur permettons de continuer leurs activités illégales au sein de la sphère commerciale [Root.Overlord.GetAdjective]. Notre suzerain s'apprête maintenant à écraser ces opérations et nous a envoyé une ambassade exigeant que nous payions pour cela."
 tributary_events.8.a:0 "Éliminez les criminels !"
 tributary_events.8.b:0 "Permettre à quelques-uns de s'installer définitivement sur nos terres."
 tributary_events.9.t:0 "Administrer un Réseau Tributaire"
 tributary_events.9.d:0 "Nous avons reçu des plaintes du Ministère des Rites selon lesquelles le grand nombre de Missions Tributaires qui atteignent [Root.Capital.GetCapitalName] épuise leurs ressources. Recevoir les dignitaires étrangers de manière digne et même s'occuper des cadeaux qu'ils apportent devient une tâche de plus en plus grande et compliquée, et certains craignent que nos efforts diplomatiques en souffrent à court terme."
 tributary_events.9.a:0 "C'est le prix que nous payons pour l'influence."
 tributary_events.9.b:0 "Nous devons élargir le Ministère des Rites."
 tributary_events.10.t:0 "L'Incident de [ningbo_province.GetCapitalName]"
 tributary_events.10.d:0 "Une mission tributaire est plus qu'un voyage pour rendre hommage au [Root.GetTributaryOverlord], c'est aussi une occasion de commerce avec le [Root.GovernmentName] de [Root.GetName]. Cherchant à en tirer profit, il semble que des maisons nobles concurrentes de [ningbo_country.GetName] aient pris l'habitude d'envoyer leurs propres missions tributaires chez nous, prétendant représenter le [ningbo_country.Monarch.GetTitle] afin d'obtenir des avantages pour elles-mêmes dans la politique intérieure de [ningbo_country.GetName].\nCette fois, cependant, deux de ces missions sont arrivées en même temps à [ningbo_province.GetName], ce qui a fait éclater leurs conflits de chez eux en effusion de sang."
 tributary_events.10.a:0 "Restreindre le Commerce avec [ningbo_country.GetName]."
 tributary_events.10.b:0 "Assigner aux deux factions différentes Destinations de Tribut."
 tributary_events.11.t:0 "L'Incident de [ningbo_province.GetCapitalName]"
 tributary_events.11.d:0 "Nous avons reçu des nouvelles de [Root.Overlord.GetName] qu'ils imposent des restrictions sur le commerce étranger avec notre pays en raison de notre incapacité à empêcher les factions locales d'abuser du drapeau de mission tributaire pour leurs propres conflits mesquins. À moins que nous n'agissions de manière décisive, cela risque d'être un problème pour les années à venir."
 tributary_events.11.a:0 "Regrettable."
 tributary_events.11.b:0 "Compenser [Root.Overlord.GetName] pour le désagrément."
 tributary_events.12.t:0 "Tribut de [ningbo_country.GetName]"
 tributary_events.12.d:0 "Un ambassadeur de [ningbo_country.GetName] est arrivé avec un énorme cadeau en compensation des désagréments échangés à [ningbo_province.GetCapitalName]. Le [ningbo_country.Monarch.GetTitle] a traité très sévèrement ses subordonnés désobéissants et garantira désormais personnellement que la paix sera maintenue pour les futures missions tributaires."
 tributary_events.12.a:0 "Un choix prudent."
 tributary_events.12.a.tt:0 "[Root.GetName] recevra l'équivalent d'une année entière de revenus de [ningbo_country.GetName]."
 tributary_events.13.t:0 "Les Biens Exotiques de [exotic_tributary.GetName]"
 tributary_events.13.d:0 "Notre cour à [Root.Capital.GetCapitalName] s'émerveille du grand nombre de biens exotiques apportés par la mission tributaire de [exotic_tributary.GetName]. Des fonctionnaires et marchands entreprenants ont pris note de la demande pour ces articles et des alliances se forment déjà. Si nous n'agissons pas rapidement, il semble presque certain qu'un réseau de contrebande sera mis en place pour apporter plus de biens exotiques à la capitale."
 tributary_events.13.a:0 "L'autoriser mais s'assurer que nous obtenons une part !"
 tributary_events.13.b:0 "Nous devons imposer des réglementations strictes immédiatement."
 tributary_events.14.t:0 "Nouvelles Opportunités Commerciales"
 tributary_events.14.d:0 "Depuis que nous avons commencé à envoyer des tributs à [Root.Overlord.GetName], la demande pour les biens exotiques de nos artisans est assez élevée à [Root.Overlord.Capital.GetCapitalName]. Cela a conduit à la croissance d'un petit réseau commercial qui, bien que pas entièrement légal, a enrichi de nombreux fonctionnaires [Root.Overlord.GetAdjective] et marchands [Root.GetAdjective] entreprenants.\nAyant découvert l'ampleur de l'opération, le [Root.Overlord.Monarch.GetTitle] [Root.Overlord.GetAdjective] a maintenant imposé des réglementations beaucoup plus strictes pour arrêter ce qu'il considère comme de la contrebande illégale. Là où il y a de la demande, il est cependant difficile d'empêcher les gens d'essayer de faire du profit..."
 tributary_events.14.a:0 "Nous devons faire ce que nous pouvons pour aider le [Root.Overlord.Monarch.GetTitle]."
 tributary_events.14.b:0 "Il est temps de soutenir les entreprises du [Root.GovernmentName] de [Root.GetName]."
 tributary_events.15.t:0 "Demande [Root.Overlord.GetAdjective]"
 tributary_events.15.d:0 "Il semble que l'arrivée de nos missions tributaires à [Root.Overlord.Capital.GetCapitalName] ait été très favorablement reçue. Les biens exotiques que nos émissaires ont apportés ont conduit à une demande croissante de produits [Root.GetAdjective]. Bien que le commerce ne soit pas tout à fait légal, les autorités [Root.Overlord.GetAdjective] ont jusqu'ici fermé les yeux."
 tributary_events.15.a:0 "Quelle chance !"
 tributary_events.16.t:0 "Réfugiés Politiques"
 tributary_events.16.d:0 "Suite à une lutte de pouvoir perdue, un grand groupe de réfugiés politiques du [Root.Overlord.GovernmentName] [Root.Overlord.GetAdjective] a commencé à chercher refuge dans notre pays. Le conflit semble assez insignifiant pour que le camp vainqueur à [Root.Overlord.GetName] ne soit pas particulièrement intéressé par la recherche de leurs compatriotes en fuite, mais ils apprécieraient peut-être si nous leur livrions les réfugiés. D'un autre côté, ce sont des hommes et des femmes de quelque capacité, qui pourraient probablement faire beaucoup de bien dans notre pays si nous leur permettions de rester."
 tributary_events.16.a:0 "Nous pouvons leur faire de la place..."
 tributary_events.16.b:0 "Les renvoyer au centre impérial."
 tributary_events.17.t:0 "Eunuques Tributaires"
 tributary_events.17.d:0 "Avec l'arrivée des missions tributaires de cette année, un grand nombre d'eunuques ont rejoint nos rangs. Ces jeunes hommes ont été identifiés pour leurs capacités et après un minimum de préparation, ils ont été envoyés vivre une vie au service de notre [Root.Monarch.GetTitle].\nCertains serviront dans notre administration tandis que d'autres pourraient même s'élever à la position de ministres de confiance ou de chefs pour nos armées et marines."
 tributary_events.17.a:0 "Un tel dévouement est exemplaire."
 tributary_events.18.t:0 "Flotte Tributaire Assaillie par des Pirates"
 tributary_events.18.d:0 "L'arrivée régulière de flottes tributaires apportant des trésors de l'étranger sur nos côtes est à certains égards une tentation trop grande à ignorer pour ceux qui souhaitent faire fortune rapidement. Un groupe de pirates a commencé à cibler les missions tributaires et fait un bon profit sur les nombreux cadeaux destinés à notre [Root.Monarch.GetTitle]."
 tributary_events.18.a:0 "Détourner des ressources supplémentaires pour les protéger."
 tributary_events.18.b:0 "Notre marine en fera rapidement son affaire !"
 tributary_events.19.t:0 "Récompenser la Loyauté"
 tributary_events.19.d:0 "[tributary_loyal.GetName] est à bien des égards le modèle idéal d'un État tributaire. Leurs missions sont régulières et leur obéissance n'a jamais été remise en question.\nNotre système tributaire nous fournit des cadeaux et autres marques de respect de ceux à qui nous accordons notre protection, mais en plus de promettre de les défendre, nous sommes censés prendre soin d'eux d'autres manières également. Peut-être est-il temps de montrer que la loyauté sera récompensée ?"
 tributary_events.19.a:0 "Nous enverrons nos plus beaux cadeaux au [tributary_loyal.Monarch.GetTitle] !"
 tributary_events.19.b:0 "Malheureusement, nous ne pouvons pas nous permettre une telle frivolité."
 tributary_events.20.t:0 "[From.GetName] est disposé à chasser les Pirates"
 tributary_events.20.d:0 "Bien qu'ils aient promis d'aider à nettoyer la région, il est clair que [From.GetName] est devenu au fil du temps un repaire de Pirates majeur. Nous avons toujours su qu'ils sont des barbares et à peine dignes de notre confiance, mais les actions récentes du [From.Monarch.GetTitle] ont en fait rapproché nos pays."
 tributary_events.20.a:0 "Nous pouvons travailler avec cela."
 tributary_events.21.t:0 "[From.GetName] est un Repaire de Pirates"
 tributary_events.21.d:1 "Le [From.Monarch.GetTitle] de [From.GetName] a décidé de continuer à héberger un certain nombre de pirates bien connus. Lorsque nos fonctionnaires locaux ont exigé qu'ils nettoient leurs ports, le [From.Monarch.GetTitle] a refusé de se conformer."
 tributary_events.21.a:0 "Nous devons reconsidérer leur statut de Tributaire."
 tributary_events.22.t:0 "Loyauté Récompensée"
 tributary_events.22.d:0 "En tant que tributaire de longue date et fidèle de [Root.Overlord.GetName], nous avons reçu un énorme cadeau. Cela renforce notre règne intérieurement et remplira immensément nos coffres !"
 tributary_events.22.a:0 "C'est bon d'être reconnu."
 tributary_events.23.t:0 "Chercheurs de Fortune"
 tributary_events.23.d:0 "Bien que les missions tributaires annuelles vers [Root.Capital.GetCapitalName] apportent à la fois des cadeaux et des opportunités commerciales précieuses, elles sont aussi un moyen pour les hommes et femmes entreprenants des pays étrangers d'atteindre la cour [Root.GetAdjective]. Une fois ici, ils cherchent un emploi au service du [Root.Monarch.GetTitle], espérant une vie plus riche et meilleure."
 tributary_events.23.a:0 "C'est un pays d'opportunités."
 tributary_events.24.t:0 "Aventuriers [Root.Overlord.GetAdjective]"
 tributary_events.24.d:0 "En payant tribut au [Root.Overlord.Monarch.GetTitle] de [Root.Overlord.GetName], nous faisons partie de la sphère commerciale [Root.Overlord.GetAdjective] et les gens peuvent voyager librement entre nos pays. Parmi ceux qui profitent de cette opportunité se trouvent des chercheurs de fortune et des aventuriers de toute la région.\nCes personnes ont des compétences, une expérience et un parcours différents de la plupart dans notre propre royaume et pourraient apporter une contribution précieuse à notre cause."
 tributary_events.24.a:0 "Nous accueillons leur arrivée."
 tributary_events.25.t:0 "Des Factions [Root.Overlord.GetAdjective] s'Immiscent dans la Politique [Root.GetAdjective]"
 tributary_events.25.d:0 "Un certain nombre de familles influentes de [Root.Overlord.GetName] ont pris sur elles de rectifier le manque de confiance entre nos deux gouvernements. Elles espèrent renverser notre gouvernement en fournissant un soutien militaire et économique à l'opposition contre le [Root.Monarch.GetTitle] de leurs propres poches !\nLe [Root.Overlord.Monarch.GetTitle] de [Root.Overlord.GetName] pourrait probablement être convaincu de maîtriser ces francs-tireurs, mais le convaincre de nous écouter nécessitera un cadeau princier."
 tributary_events.25.a:0 "Les rebelles ne nous effraient pas."
 tributary_events.25.b:0 "Et un cadeau princier [Root.Overlord.Monarch.GetSheHe] aura !"
 tributary_events.26.t:0 "Raids de [Root.Overlord.GetName]"
 tributary_events.26.d:0 "En nous soumettant à payer tribut au [Root.Overlord.GovernmentName] de [Root.Overlord.GetName], nous avons également accepté que notre frontière reste ouverte. Un fait que notre population frontalière en est venue à abhorrer.\n\nLes provinces directement adjacentes à la horde ne sont jamais sûres, car des pillards peuvent apparaître à tout moment pour réclamer un tribut sous forme d'esclaves vivants. Des hommes et des femmes qui sont ensuite vendus sur les marchés de [Root.Overlord.Capital.GetCapitalName]. Notre peuple aspire au jour où nous pourrons nous défaire de ce joug, mais tant que nous craindrons les armées de [Root.Overlord.GetName], nous devrons endurer ces expéditions."
 tributary_events.26.a:0 "Un jour nous serons libres !"
 tributary_events.27.t:0 "Soutien de Factions [Root.Overlord.GetAdjective]"
 tributary_events.27.d:0 "Notre guerre contre les [other_tributary_country.GetAdjective] n'est pas passée inaperçue à [Root.Overlord.GetName]. Bien que le [Root.Overlord.Monarch.GetTitle] [Root.Overlord.Monarch.GetHerselfHimself] ne s'abaissera pas au niveau de nos conflits mesquins, il semble que certains membres de [Root.Overlord.Monarch.GetHerHis] cour n'aient pas de tels scrupules. Un puissant groupe d'intérêt est intéressé par notre succès et a fait des promesses de nous aider.\nBien sûr, rien n'est gratuit en ce monde. En retour, ils attendent quelques faveurs pour faire avancer leurs propres machinations politiques à la cour de [Root.Overlord.GetName]."
 tributary_events.27.a:0 "Excellent !"
 tributary_events.27.a.tt:0 "Cela mettra en colère [Root.Overlord.Monarch.GetHerHis] Altesse, le [Root.Overlord.Monarch.GetTitle] de [Root.Overlord.GetName]"
 tributary_events.27.b:0 "Nous ne nous mêlerons pas de la politique du [Root.Overlord.GovernmentName] [Root.Overlord.GetAdjective]."
 tributary_events.28.t:0 "Des Groupes [Root.Overlord.GetAdjective] Soutiennent [From.GetName] !"
 tributary_events.28.d:0 "Bien qu'il semble que ce soit sans sanction officielle, il est clair que des groupes d'intérêt [Root.Overlord.GetAdjective] ont agi pour aider les [From.GetAdjective] dans leur guerre contre nous. C'est méprisable, et nous nous serions attendus à ce que [Root.Overlord.GetName] ait un meilleur contrôle sur ses sujets !"
 tributary_events.28.a:0 "Horrible !"
 tributary_events.29.t:0 "[From.GetName] s'Immisce dans la Politique"
 tributary_events.29.d:0 "Il semble que notre [From.GovernmentName] tributaire, [From.GetName], ait offert de soutenir des factions politiques à notre cour en échange d'aide dans leur guerre contre notre autre Tributaire, [other_tributary_country.GetName]. Cela a nui à nos relations envers notre tributaire et met le [Root.Monarch.GetTitle] très en colère."
 tributary_events.29.a:0 "Barbares !"
 horde_slave_raid:0 "Frontière Pillée"
 desc_horde_slave_raid:0 "Notre suzerain horde a physiquement collecté un tribut vivant de nos zones frontalières, nuisant à notre économie et entravant la croissance de notre population."
 overlord_supported_our_enemies:0 "Le Suzerain s'est mêlé de notre guerre."
