 temple_of_confucius_modifier:0 "Temple de Confucius"
 desc_temple_of_confucius_modifier:0 "Le Temple de Confucius à Qufu est le plus grand et le plus renommé temple de Confucius. À l'origine la maison de Confucius lui-même, le temple est devenu en quelque sorte un lieu saint pour les voies confucéennes. De nombreux empereurs ont visité ce temple afin d'offrir des sacrifices à la mémoire de Confucius."
