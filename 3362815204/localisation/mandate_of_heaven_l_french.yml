 encountered_other_continent_tooltip:0 "A rencontré un pays d'un autre continent."
 encountered_christian_tooltip:0 "A rencontré des Chrétiens."
 shinto_incident_recent_tooltip:1 "Au moins 30 ans depuis le dernier incident."
 incident_neo_confucianism_title:1 "Néo-Confucianisme"
 incident_neo_confucianism_desc:0 "Le néo-confucianisme n'est pas nouveau au Japon, il s'est répandu depuis la Chine à l'époque de Kamakura et comme de nombreux aspects de la culture chinoise et est-asiatique plus large, il a rapidement pris racine. Sa perspective rationaliste est avant tout très bien adaptée pour renforcer l'autorité du souverain et si nous devions encourager son développement au Japon, nous pourrions créer un principe plus fort pour contrôler notre peuple."
 incident_nanban_title:0 "Commerce Nanban"
 incident_nanban_desc:0 "Des commerçants occidentaux sont arrivés dans nos terres, apportant des marchandises, des idées et même des armes que nous n'avions jamais vues auparavant. Ces étrangers manquent de manières et même d'hygiène, mais la façon dont nous gérons ces marchands pourrait bien avoir un impact durable sur notre société."
 incident_firearms_title:0 "Prolifération des Armes à Feu"
 incident_firearms_desc:0 "Les armes à poudre que les commerçants occidentaux ont apportées sur nos côtes sont clairement très dangereuses pour notre société. Alors que des variantes locales de ces fusils, les Tanegashima, commencent à être produites, il est clair qu'il y aura bientôt un grand approvisionnement en armes avec lesquelles même un paysan ordinaire peut vaincre le Samouraï le mieux entraîné."
 incident_spread_of_christianity_title:0 "Propagation du Christianisme"
 incident_spread_of_christianity_desc:0 "Des missionnaires porteurs de la parole d'une étrange religion occidentale sont arrivés sur nos côtes et leurs paroles ont touché une partie étonnamment grande de la population japonaise. Des congrégations chrétiennes se forment partout sur l'île et les convertis japonais convertissent eux-mêmes plus de leurs compatriotes chaque jour."
 incident_shogunate_authority_title:0 "Autorité Croissante du Shogunat"
 incident_shogunate_authority_desc:0 "Pendant des siècles, le Shogun, plutôt que l'Empereur, a été le vrai pouvoir au Japon. L'autorité du Shogunat n'a cependant pas été forte elle-même depuis longtemps. Il semble que notre actuel Shogun ait pris sur lui de changer cela, exigeant l'obéissance et renforçant les anciennes lois et traditions pour exercer un plus grand contrôle sur cette terre déchirée par la guerre."
 incident_ikko_shu_title:0 "Ikko-Ikki"
 incident_ikko_shu_desc:0 "Le Bouddhisme de la Terre Pure n'est pas une nouvelle religion pour notre île, pourtant pendant la guerre civile qui a ravagé le Japon, beaucoup plus ont afflué vers ses principes. Ce mouvement de groupe devient de plus en plus militarisé et leurs promesses de salut attirent fermiers, prêtres, moines et même nobles. L'autorité des traditions anciennes est remise en question par leur forte conviction."
 incident_wokou_title:0 "Pirates Wokou"
 incident_wokou_desc:0 "La relation entre la Chine, la Corée et le Japon a toujours été troublée. L'autorité déclinante de l'État central au Japon a conduit à la formation d'un grand nombre de sociétés de pirates, certaines même financées par des investissements extérieurs. Alors que nos ports sont utilisés par ces brigands des mers, nous devons prendre position sur cette piraterie."
 incident_urbanization_title:0 "Urbanisation"
 incident_urbanization_desc:0 "La société change rapidement alors que de plus en plus de personnes migrent de la campagne vers les grandes Cités-Châteaux du pays. Le pouvoir des anciennes guildes commerciales est en hausse et les propriétaires terriens se plaignent que les fermiers ne restent pas sur leurs parcelles."
 CONFIRM_HARMONIZATION:0 "Confirmer l'Harmonisation"
 CONFIRM_CANCEL_MISSIONARIES_DESC:0 "Cela causera l'arrêt du travail des Missionnaires dans les provinces suivantes :\n§Y$PROVS$§!.\n"
 CONFIRM_HARMONIZATION_DESC:2 "Pendant l'Harmonisation, l'Harmonie diminuera de $HARMONY|R$ par an.\n L'Harmonisation sera terminée le $MONTH_YEAR|Y$."
