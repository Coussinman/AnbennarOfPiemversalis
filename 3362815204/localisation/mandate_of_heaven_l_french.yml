 confucian_events.1.t:0 "Harmonisation des Fois Païennes"
 confucian_events.1.d:0 "Nos efforts pour intégrer nos sujets [pagan_province.Religion.GetName] ont finalement commencé à porter leurs fruits. Nos sujets païens ont commencé à accepter les idéaux du Confucianisme et nos fonctionnaires locaux ont également intégré des éléments de la religion et de la culture locales dans notre corpus confucéen plus large d'idéaux. Alors que des bureaucrates locaux entrent dans notre administration, les coutumes païennes ont dans une certaine mesure commencé à filtrer vers le haut. Même parmi les fonctionnaires éminents de [Root.Capital.GetCapitalName], on peut parfois trouver un petit autel dédié à un panthéon [pagan_province.Religion.GetName].\nLe Paganisme est devenu l'une des nombreuses religions de notre [Root.GovernmentName] confucéen."
 confucian_events.1.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.2.t:0 "Harmonisation du Christianisme"
 confucian_events.2.d:0 "Au fil du temps, nos sujets chrétiens se sont habitués à nos manières et ont adopté nos rites et nos idéaux administratifs supérieurs. Là où il y avait autrefois de la méfiance envers les classiques et notre système d'éducation et de gouvernance, il y a maintenant une compréhension généralisée. À leur tour, nos sujets chrétiens ont été accueillis et intégrés à notre [Root.GovernmentName], et certaines de leurs coutumes sont désormais les nôtres. À [Root.Capital.GetCapitalName], même certains des érudits confucéens les plus instruits peuvent être vus participant aux coutumes chrétiennes et visitant les églises chrétiennes."
 confucian_events.2.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.3.t:0 "Harmonisation de l'Islam"
 confucian_events.3.d:1 "L'Islam est une religion minoritaire dans nos terres depuis des siècles. Au fil du temps, cependant, elle est devenue une partie de plus en plus intégrée de notre société. Les idéaux islamiques ont été intégrés et harmonisés avec nos traditions, rites et méthodes, et nous avons pris le meilleur de ce que la religion avait à offrir pour le modeler à nos propres usages. Des érudits, médecins, marchands, fermiers et paysans islamiques peuvent être trouvés même dans les quartiers autour de [Root.Capital.GetCapitalName]. Tant qu'ils plient le genou devant notre [Root.Monarch.GetTitle], les fidèles d'Allah sont une partie intégrante de notre société."
 confucian_events.3.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.4.t:0 "Harmonisation des Religions Dharmiques"
 confucian_events.4.d:0 "La foi des peuples dharmiques a été entrelacée avec la nôtre pendant des millénaires, pourtant nos croyances ont divergé pendant presque aussi longtemps. Pendant longtemps, on a cru que là où nous louions la raison et l'apprentissage classique, ils s'efforçaient d'atteindre la diversité et un ancien pouvoir spirituel. Ces dernières années, cependant, nous nous sommes efforcés d'intégrer la société dharmique avec la nôtre et de faire correspondre leurs croyances avec nos traditions tout aussi fortes de philosophie et d'apprentissage. En regardant vers l'avenir, un avenir commun nous appelle où la diversité du panthéon dharmique peut être chérie avec les classiques confucéens. Ensemble, nous avons créé un nouvel ensemble plus fort de rites et de traditions pour un État plus fort et plus durable."
 confucian_events.4.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.5.t:0 "Harmonisation du Judaïsme"
 confucian_events.5.d:0 "Cela fait des siècles que les premiers Juifs sont arrivés dans notre pays, mais ce n'est que récemment que nous en avons eu un si grand nombre dans notre société. Dans une nouvelle fascination pour leur ancienne religion abrahamique, nous avons fait ce que nous pouvions pour les intégrer dans nos rites, traditions et éducation. Alors que nous nous sommes efforcés d'harmoniser les classiques confucéens avec les enseignements de la Torah, les philosophes, marchands, soldats et artisans juifs sont devenus des parties de plus en plus présentes de notre société. Finalement, alors que les traditions fusionnent, ces personnes sont devenues une pierre angulaire de notre [Root.GovernmentName]."
 confucian_events.5.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.6.t:0 "Harmonisation du Zoroastrisme"
 confucian_events.6.d:0 "Porteurs d'une tradition qui serait même plus ancienne que la nôtre, les Zoroastriens sont un peuple qui a vu son influence politique croître puis décliner. Il était clair que nous avions beaucoup à apprendre de ces enseignements, tout comme ils pouvaient apprendre beaucoup de notre tradition supérieure de raison, de justice et d'équité. Lorsque des communautés comme celle de [zoroastrian_province.GetName] sont devenues partie de notre [Root.GovernmentName], cela a permis à nos traditions de commencer une nouvelle phase d'harmonisation, fusionnant les anciens enseignements de Zoroastre avec ceux de Confucius. Nous sommes toujours un pays où les classiques sont appris et vécus, mais les Zoroastriens sont désormais une partie intégrante de notre société et dans une certaine mesure, leur sagesse est devenue la nôtre."
 confucian_events.6.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.7.t:0 "Harmonisation de la Foi Shinto"
 confucian_events.7.d:0 "Les Japonais ont au fil du temps incorporé à la fois les traditions de Confucius et de Bouddha dans leur propre ancienne foi Shinto, prenant ce qu'ils estimaient être les parties les plus vraies et les plus utiles des enseignements étrangers et les faisant leurs. À bien des égards, cela a à son tour rendu leur religion plus facile à incorporer et à harmoniser avec l'idéologie de [Root.GetName]. Au fil du temps, l'identité Shinto devient de moins en moins un problème et les adeptes Shinto peuvent être trouvés haut et bas dans la société [Root.GetAdjective], formant un nouveau groupe au sein de notre appareil gouvernemental complexe qu'un étranger aurait beaucoup de mal à distinguer du nôtre."
 confucian_events.7.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.8.t:0 "Harmonisation de la Foi Theravada"
 confucian_events.8.d:0 "Les Canons Pali du Bouddhisme Theravada sont à bien des égards une manière familière d'organiser la tradition et l'apprentissage pour nos élites confucéennes. Au fil du temps, ces collections de lois et de rites sont venues à être étudiées et intégrées au corpus que chaque membre éduqué et influent de notre société doit étudier et respecter. Les traditions ont été harmonisées et la communauté bouddhiste Theravada plus large nous considère comme leur égal, tout comme nous considérons les bouddhistes Theravada à l'intérieur de nos frontières comme une partie intégrante de notre [Root.GovernmentName]."
 confucian_events.8.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.9.t:0 "Harmonisation de la Foi Mahayana"
 confucian_events.9.d:0 "Il y a des siècles, les enseignements de Bouddha ont commencé à pénétrer nos terres et maintenant c'est l'une des religions les plus répandues à [Root.GetName]. Bien que nous tenions les classiques de l'apprentissage confucéen comme le principe directeur de notre [Root.GovernmentName], nous honorons également les traditions de Bouddha et l'aspiration à mettre fin au cycle éternel que beaucoup de nos sujets ressentent.\nVraiment, nous sommes un pays confucéen gouverné par un peuple de bouddhistes Mahayana."
 confucian_events.9.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.10.t:0 "Harmonisation du Bouddhisme Vajrayana"
 confucian_events.10.d:0 "Ceux de nos sujets qui sont de fervents adeptes des grands et mystérieux Lamas en sont de plus en plus venus à réaliser à quel point les enseignements de Confucius sont une idéologie utile. Là où ils utilisaient autrefois les traditions de la voie Vajrayana pour juger le monde, ils incorporent maintenant les mêmes classiques que nous. Les moines et nobles Vajrayana font désormais partie de notre gouvernement tant au sommet qu'à la base, et leurs traditions quelque peu sauvages et tantriques semblent avoir été apprivoisées par notre raison et notre apprentissage."
 confucian_events.10.a:0 "« Soumettre les gens de vertu, assimiler les gens avec l'illumination. »"
 confucian_events.21.t:0 "Héritage Confucéen"
 confucian_events.21.d:0 "Depuis l'occupation chinoise, la révérence envers Confucius et les idéaux confucéens est profondément ancrée dans notre société. Du culte de base de Confucius dans la religion populaire des gens du commun à l'admiration et l'étude des textes néo-confucéens à notre cour.\nBien que le clergé ne soit pas d'accord, certains diraient que nous sommes d'abord un pays confucéen et ensuite un pays bouddhiste Mahayana."
 confucian_events.21.a:0 "Nous sommes un peuple civilisé et révérons les Maîtres."
 confucian_events.21.b:0 "Le Confucianisme est intéressant, mais le Dai Viet est un pays bouddhiste."
