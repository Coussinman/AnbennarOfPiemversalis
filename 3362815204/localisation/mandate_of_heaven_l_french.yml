 ZERO_TRIBUTE:0 "Montant trop faible"
 celestial_empire_events.1.t:1 "La Fin du [From.GovernmentName] [From.GetAdjective]"
 celestial_empire_events.1.d:1 "Avec la chute de [From.Capital.GetCapitalName], les derniers vestiges de l'Empire de Chine ont été écrasés. Le Mandat du Ciel et l'ancienne administration confucéenne sont désormais clairement considérés comme des concepts défunts et la noblesse lettrée en tant que classe devra évoluer vers autre chose ou périr.\nBien que la mémoire de l'Empire vivra encore quelque temps, le [Root.GovernmentName] de [Root.GetName] sera à jamais rappelé comme les destructeurs du dernier [From.Monarch.GetTitle]."
 celestial_empire_events.1.a:0 "D'accord."
 celestial_empire_events.2.t:0 "Une Idéologie pour notre Empire"
 celestial_empire_events.2.d:0 "En assumant le manteau de la Chine Impériale, nous avons fait un pas dans une tradition ancienne. [Root.GetName] a hérité d'un certain nombre d'institutions, comme le système d'examens et le concept de mandat céleste, qui sont étroitement associées à la philosophie chinoise du Confucianisme.\nEn tant que nouvel Empire de Chine, c'est à nous de décider dans quelle mesure nous souhaitons intégrer cette idéologie avec la nôtre, mais embrasser la philosophie confucéenne aiderait probablement à la fois à gouverner le vaste empire que nous revendiquons maintenant et à renforcer notre Mandat dans l'esprit du public."
 celestial_empire_events.2.a:0 "Le [Root.Monarch.GetTitle] est le [Root.GetTributaryOverlord] !"
 celestial_empire_events.2.b:0 "Nous ne déshonorerons pas la foi [Root.Religion.GetName] de nos propres ancêtres !"
 celestial_empire_events.3.t:0 "Sinicisation"
 celestial_empire_events.3.d:0 "Le peuple [Root.Culture.GetName] en est de plus en plus venu à ressentir les nouvelles coutumes chinoises que nous avons introduites dans tout notre royaume, de la cour jusqu'au plus humble fonctionnaire provincial. En raison de cette méfiance croissante envers les impositions étrangères sur nos anciennes traditions et normes, certains remettent même ouvertement en question notre droit de gouverner."
 celestial_empire_events.3.a:0 "Ils apprendront avec le temps."
 celestial_empire_events.3.b:0 "Nous devons préserver notre héritage !"
 resistance_to_cultural_changes:0 "Déshonneur de nos Ancêtres"
 desc_resistance_to_cultural_changes:0 "Le peuple de cette province ressent que nous avons déshonoré les traditions de nos ancêtres dans notre sinicisation croissante de notre royaume. Cette aliénation croissante a résulté en une réticence à payer les impôts et un manque de soutien pour notre royaume."
 empire_of_china_in_name:0 "Empire de Chine de Nom"
 desc_empire_of_china_in_name:0 "Bien que nous ayons réussi à sécuriser le titre d'Empereur sur les Chinois, notre Empire en est un qui n'inclut guère de Chinois. Si nous devons être vus comme autre chose qu'un empereur étranger, nous devrons intégrer les Chinois comme partie de notre gouvernement."
 less_than_two_chinese_cultures_accepted_tooltip:0 "Accepte moins de 2 Cultures du Groupe Culturel Chinois."
 atleast_two_chinese_cultures_accepted_tooltip:0 "A au moins 2 Cultures Acceptées dans le Groupe Culturel Chinois."
 disaster_active_for_10_years_tooltip:0 "Le désastre est actif depuis 10 ans."
 empire_of_china_in_name.1.t:0 "Empereur de Chine de Nom"
 empire_of_china_in_name.1.d:0 "Bien que nous ayons obtenu une reconnaissance générale en tant que nouvel Empire de Chine, nous n'avons pas encore gagné le respect du peuple chinois. Notre grande dépendance envers des personnes étrangères, voire non civilisées, dans nos armées et notre administration remet en question le Mandat de notre dynastie.\nÀ moins que nous ne prenions des mesures pour devenir un véritable Empire Chinois, nous resterons un Empire de nom seulement et semblerons avoir perdu le Mandat du Ciel."
 empire_of_china_in_name.1.a:0 "Avec le temps, ils apprendront."
 empire_of_china_in_name.2.t:0 "Acceptation des Chinois"
 empire_of_china_in_name.2.d:0 "Nos efforts pour intégrer les Chinois dans l'État qui les gouverne ont porté leurs fruits et notre revendication au Mandat du Ciel n'est plus remise en question en raison de liens manquants avec le peuple lui-même. Comme beaucoup des conquérants étrangers que la Chine a vus au cours des siècles, notre Empire pourrait ne jamais être considéré comme véritablement chinois d'origine, mais c'est vraiment un Empire de Chine."
 empire_of_china_in_name.2.a:0 "Pour le Fils du Ciel !"
 empire_of_china_nomadic_border_events.1.t:0 "Frontière Nomade"
 empire_of_china_nomadic_border_events.1.d:0 "Les hordes puissantes aux frontières ont été une menace constante pour l'Empire de Chine tout au long de l'histoire. Avec la montée d'une autre Horde puissante à la frontière, notre peuple commence à douter que nous serons capables de les protéger. Le [Root.Monarch.GetTitle] qui ne garde pas les Hordes sous contrôle peut-il vraiment posséder le Mandat du Ciel ?\nSeul le temps le dira."
 empire_of_china_nomadic_border_events.1.a:0 "Pour le [Root.GetTributaryOverlord] !"
 empire_of_china_nomadic_border_events.2.t:0 "Ordre Restauré"
 empire_of_china_nomadic_border_events.2.d:0 "Avec nos frontières n'étant plus menacées par de puissantes Hordes, la terre peut prospérer, et notre règne n'est plus remis en question. Les critiques qui étaient autrefois dirigées vers le [Root.GetTributaryOverlord] se sont tues et l'Empire peut envisager une nouvelle ère de prospérité."
 empire_of_china_nomadic_border_events.2.db:0 "L'Empire de Chine est perdu. La ruine générale de notre nation autrefois puissante a fait des préoccupations que notre peuple avait autrefois à propos de la frontière nomade un souvenir lointain."
 empire_of_china_nomadic_border_events.2.a:0 "C'est la volonté des Cieux."
 empire_of_china_nomadic_border:0 "Frontière Nomade Non Gardée"
 empire_of_china_nomadic_border_tt:0 "Est une §YHorde§! et a §Y300§! de développement total propre et de sujets non-tributaires"
 eoc_nomadic_border_tooltip:0 "Développement Total d'au moins §Y300§!"
 shogunate_mechanic_explanation:0 "§MUn pays peut prendre le contrôle du Shogunat, et devenir le suzerain de tous les Sujets Daimyo, en prenant la province de Kyoto.§!"
 wokou_pirate_stronghold_indifferent:0 "Repaire de Pirates"
 desc_wokou_pirate_stronghold_indifferent:0 "Cette province abrite un repaire de pirates florissant hors de notre contrôle."
 wokou_pirate_stronghold_friendly:0 "Repaire de Pirates Ami"
 desc_wokou_pirate_stronghold_friendly:0 "Au grand dam de tous nos voisins, cette province abrite un repaire de pirates sous notre protection."
 wokou_pirate_stronghold_hostile:0 "Repaire de Pirates Hostile"
 desc_wokou_pirate_stronghold_hostile:0 "Une entreprise florissante a élu domicile dans cette province. Ils ne sont cependant pas le moins du monde intéressés à partager leur pouvoir sur les routes maritimes."
 desc_empire_of_china_nomadic_border:0 "La montée d'une puissante Horde à nos frontières jette une ombre sinistre sur nos prétentions à posséder le Mandat du Ciel. Si le royaume doit prospérer, nous devons pacifier la Frontière Nomade."
 wokou_closed_ending:0 "Côtes Pacifiées"
 desc_wokou_closed_ending:0 "Nous avons mis fin aux règnes des pirates le long des rivages et interdit à tous les pêcheurs de porter des armes."
 wokou_no_effort_ending:0 "Fin des Wokou"
 desc_wokou_no_effort_ending:0 "L'intense augmentation de l'activité pirate provenant de nos provinces a pris fin."
 wokou_turned_to_navy:0 "Pirates Devenus Marins"
 desc_wokou_turned_to_navy:0 "Nous avons donné du pouvoir aux chefs des bandes de pirates dans nos terres et imposé l'ordre en leur donnant des titres et une place dans notre hiérarchie. En conséquence, notre marine est plus forte que jamais."
 urbanization_in_order:0 "Société Ordonnée"
 desc_urbanization_in_order:0 "Nous avons fait de notre mieux pour préserver l'ordre et la tradition en cette période d'essor démographique urbain et d'urbanisation. Nous avons imposé des réglementations strictes sur qui peut déménager où ou exercer un type de travail spécifique. En conséquence, nous regardons vers l'avenir en tant que société unifiée, quoique légèrement stratifiée."
 urbanization_middle_road:0 "Urbanisation"
 desc_urbanization_middle_road:0 "Nos villes ont connu une croissance remarquable ces dernières décennies grâce à l'augmentation des rendements agricoles et à la migration rapide de la campagne vers les villes-châteaux sous notre contrôle."
 urbanization_social_mobility:0 "Mobilité Sociale"
 desc_urbanization_social_mobility:0 "La population de nos villes a augmenté rapidement alors que de plus en plus de personnes cherchent une nouvelle vie sous les murs de nos châteaux. Cela a rendu la mobilité sociale beaucoup plus dynamique et c'est une tendance que nous avons essayé d'accentuer par nos propres politiques."
 movement_restrictions:0 "Restrictions de Mouvement"
 desc_movement_restrictions:0 "Nous avons tenté de force d'empêcher notre peuple de se déplacer dans le royaume. Des registres ont été créés et le mouvement nécessite la permission de nos fonctionnaires."
 urban_growing_pains:0 "Croissance Incontrôlée"
 desc_urban_growing_pains:0 "Le grand afflux de personnes de la campagne vers cette ville lui sera probablement bénéfique à long terme, mais elle a actuellement des problèmes avec tout, de l'ordre à l'assainissement de base."
 support_of_ikkos:0 "Soutien des Ikko-Ikki"
 desc_support_of_ikkos:0 "Nous avons le soutien des fervents Ikko-Ikki, des communautés bouddhistes avec beaucoup d'autonomie et d'influence tant dans notre royaume que chez nos voisins."
 ikkos_empowered:0 "Villes-Temples"
 desc_ikkos_empowered:0 "Les Villes-Temples des Bouddhistes de la Terre Pure sont une caractéristique de notre royaume qui est là pour rester. Elles exercent une influence considérable dans notre royaume et contribuent grandement à la croissance de nouveaux centres urbains."
 ikkos_crushed:0 "Autorité Affirmée"
 desc_ikkos_crushed:0 "Nous avons écrasé les communautés de temples des Bouddhistes de la Terre Pure et nous sommes rétablis comme la seule autorité dans notre royaume."
 incident_end_dejima:0 "Ports Fermés"
 desc_incident_end_dejima:0 "Nous avons gardé de force les influences occidentales aussi restreintes et contrôlées que possible, loin des gens ordinaires du royaume. Bien que nous tolérions le commerce pour le profit, nous n'accepterons aucune de leurs idées subversives."
 incident_end_trade_with_west:0 "Commerce Occidental"
 desc_incident_end_trade_with_west:0 "Bien que nous ayons été prudents de le garder sous contrôle strict, nous bénéficions du commerce avec les pays maritimes européens dans notre région."
 incident_end_open_ports:0 "Afflux d'Idées Occidentales"
 desc_incident_end_open_ports:0 "Nous avons ouvert nos ports non seulement au commerce occidental mais aussi à la science et aux idées occidentales. Ce n'est qu'à travers une étude attentive que nous pouvons prendre les meilleures idées et les intégrer aux nôtres tout en laissant de côté les parties inférieures de leur société."
 neo_confucian_administration:0 "Administration Néo-Confucéenne"
 desc_neo_confucian_administration:0 "La montée de l'idéologie néo-confucéenne parmi les érudits et administrateurs de notre royaume a conduit à une révolution dans l'efficacité bureaucratique. En promouvant le mérite plutôt que la naissance, nous avons renforcé notre emprise sur la plupart de nos provinces."
 neo_confucianism_middle_road:0 "Diffusion du Savoir"
 desc_neo_confucianism_middle_road:0 "La montée de l'intérêt pour l'idéologie néo-confucéenne a conduit à une diffusion beaucoup plus grande des connaissances dans notre royaume. Bien que les idéaux changent, cette augmentation générale de l'alphabétisation et de l'intérêt philosophique a laissé une impression durable sur notre société."
 traditionalist_administration:0 "Traditionalisme"
 desc_traditionalist_administration:0 "Nous nous sommes dressés comme les forts défenseurs du traditionalisme et de l'honneur face à une application excessive du rationalisme dans l'appareil gouvernemental et dans la société en général. Le mérite est une grande chose, mais sans les anciens liens de tradition et de loyauté, un État ne peut pas fonctionner !"
 supported_loyal_retainers:0 "Soutien aux Vassaux Loyaux"
 desc_supported_loyal_retainers:0 "Face à la montée d'hommes nouveaux dans l'administration, nous avons choisi de montrer clairement que nous favorisons toujours les anciennes familles loyales qui nous ont toujours soutenus."
 shinto_rational_administration:0 "Méritocratie"
 desc_shinto_rational_administration:0 "Nous faisons ce que nous pouvons pour promouvoir le mérite dans notre bureaucratie au lieu d'attribuer des postes en fonction de la naissance."
 shinto_self_made_men:0 "Hommes Accomplis"
 desc_shinto_self_made_men:0 "Nous encourageons la lignée de nouveaux hommes accomplis qui sont montés au pouvoir dans notre État."
 shinto_support_for_court:0 "Soutien à la Cour Impériale"
 desc_shinto_support_for_court:0 "Nous patronnons les institutions de la Cour Impériale. Source de toute autorité céleste en ces terres."
 nanban_production_investments:0 "Investissements dans la Production"
 desc_nanban_production_investments:0 "Nous encourageons nos artisans à apprendre à fabriquer les biens exotiques que les occidentaux commercialisent maintenant dans nos ports."
 nanban_dependent_on_imports:0 "Dépendant des Importations"
 desc_nanban_dependent_on_imports:0 "Nous avons laissé la production de nombreux biens manufacturés à d'autres, laissant nos marchands combler la différence."
 rangaku_incident_modifier:0 "Rangaku"
 desc_rangaku_incident_modifier:0 "Nous avons encouragé l'étude des affaires occidentales. Bien que certains craignent que ce soit préjudiciable à la cohésion de notre société, d'autres soutiennent que les choses que nous pouvons apprendre de l'Occident sont si précieuses que nous ne pourrions pas nous permettre de faire autrement."
 perfecting_the_musket:0 "Perfectionner le Mousquet"
 desc_perfecting_the_musket:0 "Nos armuriers ont une réputation de fabricants de haute qualité, contrairement à la plupart des autres."
 guns_commonplace:0 "Prolifération des Armes à Feu"
 desc_guns_commonplace:0 "Les armes à feu sont maintenant si courantes que nos armées sont devenues assez compétentes dans leur utilisation. Nous avons consacré des ressources considérables à cette nouvelle technologie sans abandonner les traditions d'antan."
 traditional_warfare:0 "Un Exemple de Bushido"
 desc_traditional_warfare:0 "Nous avons perfectionné les manières traditionnelles et honorables tant de la guerre que du guerrier."
 firearm_restrictions:0 "Restrictions sur les Armes à Feu"
 desc_firearm_restrictions:0 "Nous avons fait de notre mieux pour limiter la propagation des armes à feu à nos seuls soldats professionnels."
 shinto_events.isolation.tt:0 "Ce choix vous orientera vers un résultat §YIsolationniste§! de l'§YIncident§! actuel."
 shinto_events.open.tt:0 "Ce choix vous orientera vers un résultat §YOuvert§! de l'§YIncident§! actuel."
 shinto_events.much.openness.tt:0 "Ce choix vous orientera fortement vers un résultat §YOuvert§! de l'§YIncident§! actuel."
 shinto_events.much.isolation.tt:0 "Ce choix vous orientera fortement vers un résultat §YIsolationniste§! de l'§YIncident§! actuel."
 shinto_events.middle_way.tt:0 "Ce choix vous orientera vers un résultat §YNeutre§! de l'§YIncident§! actuel."
 sashidashi_modifier:0 "Sashidashi Effectué"
 desc_sashidashi_modifier:0 "Sur ordre du Shogun, nous avons effectué un recensement de toutes les personnes et propriétés de notre royaume."
 shinto_local_christian_mission:0 "Mission Chrétienne Locale"
 desc_shinto_local_christian_mission:0 "Nous avons permis à une communauté chrétienne de se développer dans cette province. Bien que l'afflux accru de personnes et les institutions caritatives que les chrétiens apportent aideront la province à se développer, cela conduira également à des tensions religieuses accrues."
 pirate_fighting:0 "A combattu contre la Piraterie"
 pirate_haven:0 "Repaire de Pirates"
 christian_ruler:0 "Souverain Chrétien"
 desc_christian_ruler:0 "Bien que notre pays suive largement les voies Shinto, notre souverain a été baptisé et patronne le Christianisme dans la vie de cour."
 shinto_christian_decision_title:0 "Baptiser le Souverain"
 shinto_christian_decision_desc:0 "La communauté chrétienne dans nos terres devient de plus en plus forte et certains estiment que le temps est venu d'accueillir ce Dieu occidental à un niveau personnel. Si notre souverain se convertit au Christianisme, certains pourraient y voir un affront aux traditions, mais cela pourrait aussi apporter des avantages considérables."
 shinto_kirishitan_realm:0 "Royaume Kirishitan"
 desc_shinto_kirishitan_realm:0 "Les Chrétiens sont devenus courants dans notre royaume et à notre cour. Les membres de notre famille royale prient fréquemment le dieu chrétien et beaucoup de nos ministres sont maintenant chrétiens. Nous avons intégré cette foi étrangère avec nos traditions Shinto, Bouddhistes et Confucéennes."
 christianity_defeated:0 "Christianisme Vaincu"
 desc_christianity_defeated:0 "Nous avons défendu nos traditions indigènes et freiné la propagation subversive des idées chrétiennes parmi notre peuple."
 significant_christian_presence:0 "Présence Chrétienne Significative"
 desc_significant_christian_presence:0 "Le Christianisme est devenu l'une des religions du royaume, tout comme le Shintoïsme et le Bouddhisme, et bien que ces communautés religieuses ne soient encore qu'une minorité significative, cela a revitalisé l'échange d'idées et de philosophie dans notre royaume."
 rise_of_the_daimyo:0 "Montée d'un Daimyo"
 desc_rise_of_the_daimyo:0 "Nous avons affirmé notre propre force face aux tentatives croissantes de centralisation du Shogunat."
 growing_power_of_the_shogunate:0 "Pouvoir Croissant du Shogunat"
 desc_growing_power_of_the_shogunate:0 "Nous avons réussi à naviguer une voie médiane entre les loyalistes aveugles et les rebelles ouverts contre le Shogunat. En gardant notre espace de manœuvre, nous prospérerons."
 adherence_to_shogunate:0 "Adhésion au Shogunat"
 desc_adherence_to_shogunate:0 "Nous avons réussi à répondre aux exigences croissantes du Shogunat et sommes maintenant considérés comme parmi les Daimyo les plus honorables du Japon."
 shinto_religious_tensions:0 "Tensions Religieuses"
 desc_shinto_religious_tensions:0 "Nous permettons aux missionnaires chrétiens de répandre leur foi dans nos terres. Bien que beaucoup semblent séduits par cette nouvelle foi, d'autres la ressentent profondément."
 shinto_harsh_initial_stance_on_christianity:0 "Position Initiale Restrictive sur le Christianisme"
 desc_shinto_harsh_initial_stance_on_christianity:0 "Notre premier contact avec les missionnaires chrétiens ne s'est pas déroulé en leur faveur. Nous avons sévèrement limité toute activité missionnaire chrétienne dans notre royaume."
 in_defence_of_shintoism:0 "Position Dure sur les Missionnaires"
 desc_in_defence_of_shintoism:0 "Nous avons continué à suivre les conseils des traditionalistes, restreignant les Chrétiens de répandre leur foi dans notre royaume tout en honorant les voies de nos ancêtres."
 shinto_strenghtened_local_traders:0 "Artisans Shinto Renforcés"
 desc_shinto_strenghtened_local_traders:0 "Au lieu de permettre aux biens et artisans chrétiens d'inonder notre royaume, nous avons choisi de renforcer nos marchands locaux et membres de la foi."
 cadastral_survey_modifier:0 "Cadastre"
 desc_cadastral_survey_modifier:0 "Nous avons permis à notre suzerain d'effectuer un cadastre de notre royaume, augmentant son influence directe sur nos terres."
 nanban_port:0 "Port Nanban"
 desc_nanban_port:0 "Ce port est un centre de commerce avec les navires européens."
 nanban_trade_restrictions:0 "Restrictions Commerciales Nanban"
 desc_nanban_trade_restrictions:0 "Nous avons mis en place un certain nombre de restrictions strictes sur le commerce avec l'Occident."
 shinto_converted_to_christianity:0 "Japon Chrétien"
 desc_shinto_converted_to_christianity:0 "Nous avons changé la religion d'État du Japon en Christianisme, et nous obtenons maintenant le soutien des nombreuses minorités chrétiennes qui existent dans le pays."
 shinto_converted_to_mahayana:0 "Japon Bouddhiste"
 desc_shinto_converted_to_mahayana:0 "La religion d'État officielle du Japon est maintenant le Bouddhisme de la Terre Pure, et nous avons intégré les communes des Ikko-Ikki dans notre gouvernement autant que possible. Les minorités bouddhistes dans tout le Japon nous aident maintenant à faire la transition vers la terre de leurs rêves."
 shinto_incident_wokou_start.tt:0 "Cela déclenche l'Incident §YWokou§!."
 shinto_incident_urbanisation.tt:0 "Cela déclenche l'Incident §YUrbanisation§!."
 shinto_incident_ikko.tt:0 "Cela déclenche l'Incident §YIkko-Ikki§!."
 shinto_incident_confucianism.tt:0 "Cela déclenche l'Incident §YNéo-Confucianisme§!."
 shinto_incident_nanban.tt:0 "Cela déclenche l'Incident §YNanban§!."
 shinto_incident_tanegashima.tt:0 "Cela déclenche l'Incident §YProlifération des Armes à Feu§!."
 shinto_incident_kirishitan.tt:0 "Cela déclenche l'Incident §YChristianisme§!."
 shinto_incident_shogunate_authority.tt:0 "Cela déclenche l'Incident §YAutorité du Shogunat§!."
 shinto_events.1.t:0 "Les Pirates Wokou et le Commerce Bahan"
 shinto_events.1.d:0 "En temps d'incertitude, les pêcheurs et marins de ces terres ont souvent eu recours à la piraterie et au pillage des côtes de nos voisins. La dernière vague de transgressions s'est terminée par le traité de Kakitsu dans lequel certains Daimyo ont obtenu le droit d'envoyer un nombre réglementé d'expéditions commerciales vers des ports étrangers.\nLes temps et l'équilibre des pouvoirs sont cependant sujets au changement, et le « Commerce Bahan » est redevenu une occupation de plus en plus courante parmi nos sujets. Certains seigneurs ont eux-mêmes commencé soit à financer, soit à participer activement aux raids. Pendant ce temps, les victimes de ces pirates « Wokou » ont commencé à offrir des titres et des honneurs à ceux qui aident à arrêter le fléau."
 shinto_events.1.a:0 "Nous devons contrôler le Commerce Bahan nous-mêmes !"
 shinto_events.1.b:0 "Nous devons arrêter ces forbans !"
 shinto_events.2.t:0 "Réactions aux Wokou"
 shinto_events.2.d:0 "La piraterie et les raids ont continué à augmenter. Les participants vont des simples pêcheurs et petits seigneurs à ceux qui vivent sur les côtes étrangères ravagées elles-mêmes. Au fil du temps, de puissants intérêts, chez nous comme à l'étranger, ont commencé à patronner des chefs pirates prospères, et il semble que des repaires de pirates parsèment maintenant nos îles et nos côtes.\nMaintenant, les États voisins ont commencé à prendre des mesures beaucoup plus sévères. Ils se préparent à l'arrivée des pillards et traquent activement les chefs pirates. Notre [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself] a reçu des menaces claires d'envoyés étrangers selon lesquelles à moins que nous n'agissions avec force, ils considéreront nos navires comme des ennemis et présumeront qu'ils sont parmi les pirates."
 shinto_events.2.a:0 "Nous devrions chercher des fonds auprès d'investisseurs étrangers."
 shinto_events.2.b:0 "Nous pouvons fermer les yeux sur tout cela."
 shinto_events.2.b.tt:1 "Tous les pays à portée navale obtiennent §R-50§! d'Opinion envers §Y[Root.GetName]§!."
 shinto_events.2.c:0 "Aidons à protéger les pays étrangers."
 shinto_events.2.c.tt:1 "Tous les pays à portée navale obtiennent §G+50§! d'Opinion envers §Y[Root.GetName]§!."
 shinto_events.3.t:0 "Repaire de Pirates à [save_wokou_target.GetName]"
 shinto_events.3.d:0 "Les seigneurs de [save_wokou_target.GetName] sont devenus connus comme d'intrépides corsaires, et la loyauté et la richesse qu'ils commandent leur ont procuré une grande influence et pouvoir. Sur une île juste au large de la côte, un chef pirate particulièrement prospère a construit un repaire soutenu entièrement par ses expéditions. Abattre une telle forteresse coûterait probablement cher, mais il se moque de nos propres ambitions navales."
 shinto_events.3.a:0 "Que nous importe s'il vit de la richesse des étrangers ?"
 shinto_events.3.b:0 "Peut-être pourrait-il être fait serviteur de notre État..."
 shinto_events.3.c:0 "Nous devons arracher ces mauvaises herbes de notre jardin !"
 shinto_events.4.t:0 "Les Kaizokushu transformés en Suigun"
 shinto_events.4.d:0 "Au fil du temps, nous avons réussi à transformer les Wokou d'un groupe de pirates disparates et sans loi en une marine sous notre commandement. Les chefs ont été mis au service de notre [Root.Monarch.GetTitle] et ont reçu influence et pouvoir dans notre État. Les équipages et navires sous notre commandement sont maintenant une force professionnelle et expérimentée, capable de mener des raids, de combattre des batailles en mer et même d'effectuer des invasions à petite échelle en territoire étranger.\nDes villes tranquilles des [saved_neighbor.GetAdjective] aux ports hantés de [save_wokou_target.GetName], notre marine est crainte et respectée."
 shinto_events.4.a:0 "Nous avons transformé les pirates en Marins."
 shinto_events.5.t:0 "Fin des Wokou"
 shinto_events.5.d:0 "Beaucoup ont questionné notre ardeur à combattre le fléau des mers et des côtes. Certains diraient même que la piraterie et le pillage viennent naturellement à tous les pêcheurs [Root.GetAdjective] et que nous avons fermé les yeux sur cette pratique méprisable.\nAu fil du temps, cependant, nos voisins ont appris à surveiller leurs côtes et à traquer et faire des exemples de ceux qui rompraient la paix. La fréquence des raids Wokou a significativement diminué depuis la soudaine recrudescence il y a quelques années, laissant peu d'impact sur les [Root.GetAdjective]."
 shinto_events.5.a:0 "L'ordre est restauré."
 shinto_events.6.t:0 "Côtes Gardées"
 shinto_events.6.d:0 "Nos efforts acharnés pour contrôler les aspirants pirates, pillards et contrebandiers parmi notre population côtière ont abouti à une politique maritime presque entièrement transformée. Par décret du [Root.Monarch.GetTitle], tous les pêcheurs sont interdits de posséder des armes et tous les navires sont régulièrement fouillés. Des règles et réglementations strictes s'appliquent maintenant à tous ceux qui voudraient traverser les mers et nos nouvelles gardes-côtes nous permettent de fermer notre domaine. Les anciennes cibles des raids côtiers sont extatiques et nous ont en retour accordé de grands honneurs et récompenses pour les avoir aidés à maintenir la paix."
 shinto_events.6.a:0 "L'ordre est restauré."
 shinto_events.7.t:0 "Les Jokamachi"
 shinto_events.7.d:0 "Dans un monde de plus en plus hostile, la sécurité d'un château est à la fois une promesse de protection et d'emploi. Les Samouraïs abandonnent depuis des années leurs maisons de campagne pour les villes sous les murs des châteaux de leurs maîtres, accompagnés de marchands et d'artisans. Notre capitale, [Root.Capital.GetCapitalName], ne fait pas exception et sa croissance a été une source de préoccupation pour nos administrateurs.\nDe nouveaux fonds seront probablement nécessaires pour améliorer l'infrastructure si nous voulons minimiser des problèmes tels que les incendies et les maladies."
 shinto_events.7.a:0 "Ils auront ce qu'ils demandent."
 shinto_events.7.b:0 "Imposer des restrictions sur qui peut emménager à [Root.Capital.GetCapitalName]."
 shinto_events.8.t:0 "Les Paysans Migrent vers [Root.Capital.GetCapitalName]"
 shinto_events.8.d:0 "Alors que la population augmente à la campagne, la taille des parcelles de terre sous chaque fermier a diminué à chaque héritage. Bien que les rendements aient augmenté, certains fermiers sont toujours incapables de vivre de leur terre. Beaucoup sont venus vivre en ville à la place, accentuant les difficultés de croissance de [Root.Capital.GetCapitalName].\nLes propriétaires terriens se plaignent et nous implorent d'imposer plus d'ordre social. Ils suggèrent fortement que nous appliquions des lois pour entraver le mouvement des personnes au sein de notre royaume."
 shinto_events.8.a:0 "Décréter qu'aucun homme ne peut déménager sans permission."
 shinto_events.8.b:0 "Nous ne pouvons pas arrêter la croissance des villes."
 shinto_events.9.t:0 "Monopoles Commerciaux"
 shinto_events.9.d:0 "La croissance des villes a conduit les anciennes guildes commerciales Za de notre pays à augmenter rapidement leur pouvoir. La situation généralement chaotique dans notre royaume a également signifié qu'elles comptent de plus en plus sur leurs propres arrangements pour la sécurité. Les guildes ont maintenant lié temples, propriétaires terriens et samouraïs à leur cause. Mais elles ont aussi gagné des ennemis.\nCertains implorent notre [Root.Monarch.GetTitle] de prendre position contre les guildes et d'ouvrir l'économie à quiconque a des capacités. D'autres soutiennent que nous devrions au moins donner des monopoles et privilèges à d'autres que les guildes."
 shinto_events.9.a:0 "Nous abolirons les anciennes réglementations qui les nourrissent !"
 shinto_events.9.b:0 "Les monopoles fonctionnent bien, mais nous ne devrions pas les accorder sur la base de la tradition."
 shinto_events.9.c:0 "Nous devons protéger les arrangements de nos ancêtres."
 shinto_events.10.t:0 "Stabilité Sociale"
 shinto_events.10.d:0 "Afin de combattre la menace à l'ordre que notre société en urbanisation rapide a subi, nous avons imposé un ensemble de lois strictes. Ces règles et réglementations limitent la mobilité sociale et même physique non justifiée. De cette façon, nous avons réussi à préserver l'honneur et la stabilité qui ont maintenu notre société ensemble pendant de nombreuses années jusqu'à présent."
 shinto_events.10.a:0 "L'ordre est restauré."
 shinto_events.11.t:0 "Croissance des Classes Urbaines"
 shinto_events.11.d:0 "Notre royaume a traversé une période d'urbanisation rapide relativement intact. Des villes telles que [Root.Capital.GetCapitalName] sont maintenant tentaculaires et considérablement plus grandes qu'elles ne l'étaient. Une partie croissante de la population gagne maintenant sa vie du commerce, de l'artisanat ou même du service militaire plutôt que du travail de la terre elle-même."
 shinto_events.11.a:0 "Un temps prospère nous attend."
 shinto_events.12.t:0 "Mobilité Sociale"
 shinto_events.12.d:0 "La croissance démographique et l'urbanisation rapide ont apporté une mobilité sociale considérable à notre royaume. Nous avons encouragé ces tendances pour promouvoir une société dynamique, quoique peut-être instable. En regardant vers l'avenir, c'est en tant que royaume changé, où, en quelques générations, l'occupation la plus courante est passée du travail de la terre au travail dans l'administration, le commerce ou l'armée."
 shinto_events.12.a:0 "Les temps changent."
 shinto_events.13.t:0 "Bouddhisme de la Terre Pure"
 shinto_events.13.d:0 "En cette période de troubles, un nombre croissant de personnes se tournent vers la religion pour guidance et sécurité. Le Bouddhisme a existé côte à côte avec le Shintoïsme pendant longtemps, mais récemment le nombre d'adhérents a augmenté rapidement, plus de traditions bouddhistes trouvant également leur chemin dans la vie quotidienne du peuple [Root.GetAdjective].\nLa promesse apparente de salut et de mobilité sociale parmi les Bouddhistes de la Terre Pure attire un grand nombre. Partout dans notre royaume, de nouveaux temples ouvrent, financés par riches et pauvres."
 shinto_events.13.a:0 "Cette ferveur est inspirante ! Patronnons ces temples."
 shinto_events.13.b:0 "Il est difficile d'avoir quelque chose contre les fortes convictions des fidèles."
 shinto_events.13.c:0 "Soyons très restrictifs contre tout ce qui donne du pouvoir aux pauvres."
 shinto_events.14.t:0 "Jinaimachi"
 shinto_events.14.d:0 "Des communautés de fidèles, les Ikko-Ikki, ont commencé à se développer en petites villes autour des principaux temples bouddhistes du royaume. Ces villes ne sont pas seulement influentes dans un sens spirituel, elles commandent également leurs propres forces de défense composées de tout, des Samouraïs de petits propriétaires terriens aux fermiers et moines armés. Les communes Ikko-Ikki représentent une autorité parallèle non seulement au Shogunat mais à tout Daimyo contrôlant les terres environnantes.\nUne telle commune a surgi autour d'un temple à [ikko_province.GetName], et bien que nous puissions bénéficier de leur soutien, ce mélange puissant de ferveur religieuse, d'armes et d'autonomie constitue une menace pour l'autorité des Daimyo."
 shinto_events.14.a:0 "Nous devons saper ces nids de frelons."
 shinto_events.14.b:0 "Efforçons-nous de travailler avec ces armées de fidèles."
 shinto_events.14.c:0 "Autoriser la construction de plus de villes-temples."
 shinto_events.15.t:0 "Tensions Sociales"
 shinto_events.15.d:0 "Les Ikko-Ikki dans notre royaume sont devenus plus forts, plus nombreux et surtout plus audacieux. Nos fonctionnaires rapportent que parfois un collecteur d'impôts Ikki a déjà collecté quand ils arrivent dans un village, et les marchands ne se sentent plus en sécurité lorsqu'ils passent devant ces communautés. Les Ikko-Ikki sont maintenant si forts que beaucoup ont commencé à remettre en question leurs privilèges."
 shinto_events.15.b:0 "Ils ne peuvent pas s'étendre au-delà de leurs frontières actuelles."
 shinto_events.15.c:0 "Ce n'est que leur droit."
 shinto_events.15.a:0 "Le temps est venu d'écraser ces paysans !"
 shinto_events.16.t:0 "La Fin de l'Auto-Gouvernement Religieux"
 shinto_events.16.d:0 "Nous avons finalement réussi à freiner les Ikko-Ikki et les villes sous leur commandement. La paysannerie a été désarmée, et nos députés sont maintenant les seuls avec l'autorité de percevoir les péages, taxes et monter des défenses contre les étrangers."
 shinto_events.16.a:0 "L'ordre est restauré."
 shinto_events.17.t:0 "Autorité Parallèle"
 shinto_events.17.d:0 "Les communautés Ikko semblent être là pour rester. Bien que nous ayons essayé de sauvegarder notre propre autorité, nous avons également cédé des droits et privilèges considérables aux Jinaimachi, et il semble probable qu'elles continueront à jouer un rôle considérable dans notre société."
 shinto_events.17.a:0 "Amitabhaya."
 shinto_events.18.t:0 "Soutien des Ikko-Ikki"
 shinto_events.18.d:0 "Nous avons continuellement patronné la croissance des communautés de temples et nous en sommes donc venus à être associés aux Ikko-Ikki. Les dirigeants des communautés de temples bouddhistes peuvent avoir beaucoup d'influence dans notre société, mais ils sont aussi les fervents supporters de notre [Root.Monarch.GetTitle]."
 shinto_events.18.a:0 "Amitabhaya."
 shinto_events.19.t:0 "Guidance Morale en une Ère de Troubles"
 shinto_events.19.d:0 "Beaucoup des principaux Daimyo du Japon sont soit des hommes accomplis, soit dépendent de la loyauté de ceux qui le sont. Nos anciens codes moraux, cependant, soulignent l'importance de la lignée et de la loyauté et un ordre social basé autour de la Cour Impériale. Les érudits confucéens explorent maintenant les enseignements de Chu Hsi pour guidance dans la gouvernance de notre pays.\nCe nouvel intérêt pour le Néo-Confucianisme met l'accent sur les quatre livres plutôt que sur les classiques archaïques et tente de donner un code moral rationnel pour les dirigeants locaux et les hommes ordinaires."
 shinto_events.19.a:0 "Patronnons les institutions de la Cour Impériale."
 shinto_events.19.b:0 "Nous devrions nous efforcer d'attirer les penseurs de cette nouvelle branche de philosophie morale."
 shinto_events.20.t:0 "Naissance et Privilège"
 shinto_events.20.d:0 "La propagation des idéaux néo-confucéens dans notre société a conduit un certain nombre d'hommes d'origines humbles à s'élever à des positions d'influence intellectuelle. L'un des érudits les plus éminents de cette époque est lui-même le fils d'un Ronin, et avec d'autres érudits confucéens, il est déterminé à rendre l'apprentissage plus largement accessible à travers des conférences publiques et des livres écrits en langage simple.\nÀ bien des égards, c'est un défi à l'ancien ordre social, où l'apprentissage était un privilège réservé aux familles des bonnes lignées."
 shinto_events.20.a:0 "C'est une initiative que nous devons soutenir."
 shinto_events.20.b:0 "Nous ne pouvons pas permettre que l'ordre social soit menacé de cette façon !"
 shinto_events.21.t:0 "Méritocratie"
 shinto_events.21.d:0 "Depuis son jeune âge, [Root.Monarch.GetName] a étudié les textes confucéens et écouté des conférences néo-confucéennes. En tant que [Root.Monarch.GetTitle] de [Root.GetName], [Root.Monarch.GetSheHe] a maintenant la capacité de mettre beaucoup de ces principes philosophiques en œuvre. Un projet ambitieux serait d'éliminer ceux de peu de compétence qui détiennent de l'influence dans notre royaume uniquement sur la base de la naissance et des anciens liens de loyauté entre nos familles.\nBien sûr, nos vassaux loyaux verraient probablement cela comme de l'ingratitude et une hostilité injustifiée."
 shinto_events.21.a:0 "Le mérite devrait être le principe directeur."
 shinto_events.21.b:0 "Nous devons soutenir ceux qui nous sont loyaux."
 shinto_events.22.t:0 "Administration Néo-Confucéenne"
 shinto_events.22.d:0 "Nous avons cherché une nouvelle philosophie de gouvernement dans les enseignements de Chu Hsi et les traditions chinoises du Néo-Confucianisme. Des idéaux qui se sont avérés être une base solide, non seulement pour notre bureaucratie, mais pour notre société en général. La pensée rationnelle, une alphabétisation plus répandue et une concentration plus claire sur le mérite plutôt que la naissance ont permis aux [Root.GetAdjective] de construire un État plus fort en une ère de bouleversements."
 shinto_events.22.a:0 "D'accord."
 shinto_events.23.t:0 "Les Temps Changent"
 shinto_events.23.d:0 "Alors que le principal courant de philosophie était autrefois la transition des valeurs japonaises traditionnelles vers l'approche plus rationaliste des Chinois, l'attention des philosophes et érudits s'est maintenant déplacée vers la responsabilité individuelle. Trop d'accent sur l'intellect néglige les sentiments réels d'amour et d'empathie qui sont les fondements d'une société fonctionnelle.\nLes interprétations et discussions des Analectes continueront probablement. Ce faisant, cependant, un segment beaucoup plus large de la société peut participer grâce à l'alphabétisation maintenant répandue et à la familiarité avec les Classiques et les Livres."
 shinto_events.23.a:0 "D'accord."
 shinto_events.24.t:0 "Administration Traditionaliste"
 shinto_events.24.d:0 "Bien que nous ayons écouté de nouvelles interprétations d'érudits confucéens tels que Chu Hsi, nous n'avons pas perdu de vue les traditions anciennes de notre peuple. Nous avons prouvé que nous valorisons toujours la Cour Impériale et l'ancien système de titres et de loyautés que nos ancêtres maintenaient."
 shinto_events.24.a:0 "D'accord."
 shinto_events.25.t:0 "Arrivée des Commerçants Européens"
 shinto_events.25.d:0 "Avec l'arrivée de navires de l'ouest, nous voyons un afflux de marchandises très recherchées, non seulement d'Europe mais aussi des divers coins d'Asie que les commerçants occidentaux fréquentent. De grands navires deviennent une vue de plus en plus commune le long de nos côtes et, pour les Daimyo qui les accueillent, ils promettent de grandes richesses.\nLe capitaine d'un tel navire est récemment arrivé à [nanban_traders_here.GetName], demandant que nous leur permettions d'accoster périodiquement dans un port voisin pour commercialiser des marchandises occidentales."
 shinto_events.25.a:0 "Les encourager à en faire une escale permanente."
 shinto_events.25.b:0 "Nous appliquerons des règles strictes sur qui ils peuvent rencontrer ou avec qui faire des affaires."
 shinto_events.25.c:0 "Nous accepterons leurs marchandises mais n'offrirons aucune garantie pour l'avenir."
 shinto_events.26.t:0 "Duplicité parmi les Commerçants Européens"
 shinto_events.26.d:0 "Depuis l'arrivée des occidentaux, certains les ont regardés avec méfiance. Leurs poches sont profondes, leurs armes puissantes et, pour certains, leur culture semble fascinante. Ceux qui traitent avec ces commerçants, cependant, rapportent que les Européens complotent constamment les uns contre les autres. À peine une rencontre avec des émissaires étrangers se passe sans qu'ils ne nous avertissent de quelque complot ou stratagème de leurs adversaires. Il est clair que nous n'avons pas affaire à des hommes d'honneur.\nAlors qu'un nouveau groupe de commerçants demande que nous augmentions leurs privilèges, nos conseillers nous mettent en garde de considérer l'offre attentivement."
 shinto_events.26.a:0 "Nous leur permettrons d'étendre leur présence."
 shinto_events.26.b:0 "Limiter leur influence à quelques ports supplémentaires."
 shinto_events.26.c:0 "Leur commerce doit être limité à [nanban_traders_here.GetCapitalName]."
 shinto_events.27.t:0 "Rangaku"
 shinto_events.27.d:0 "Le comptoir commercial de [nanban_traders_here.GetName] a commencé à attirer non seulement des marchands mais aussi des érudits et intellectuels. Pour ces hommes, les livres que les étrangers apportent sont bien plus précieux que les marchandises qu'ils souhaitent vendre. L'étude de la science et de la culture occidentales, le Rangaku, devient une discipline à part entière, et selon les adeptes, nous avons beaucoup à apprendre. Beaucoup de clercs sont sceptiques, cependant, tout comme certains érudits confucéens."
 shinto_events.27.a:0 "Nous devons faire de notre mieux pour encourager la diffusion de la science occidentale."
 shinto_events.27.b:0 "Leur commerce doit être limité à [nanban_traders_here.GetCapitalName]."
 shinto_events.28.t:0 "Influence Étrangère"
 shinto_events.28.d:0 "Certains soutiennent que nous nous rendons trop dépendants des commerçants étrangers. Nos propres artisans ne sont sûrement pas moins doués que ceux de l'étranger, et au lieu de dépenser une fortune à importer des biens manufacturés du monde extérieur, nous pourrions en produire beaucoup. Nous pourrions alors profiter de leur revente, nous-mêmes.\nLe moment n'est pas venu d'arrêter entièrement le commerce, mais si nous mettons nos meilleurs artisans au travail, nous n'aurons peut-être plus besoin d'attendre l'arrivée du prochain navire de commerce avec autant d'anxiété."
 shinto_events.28.a:0 "Un excellent investissement !"
 shinto_events.28.b:0 "Il n'est pas nécessaire de tenter ce que d'autres font mieux."
 shinto_events.29.t:0 "Kaikoku ?"
 shinto_events.29.d:0 "La rencontre avec l'Occident a été une rencontre assez tumultueuse, et particulièrement pour les [Root.GetAdjective] ! Nos efforts pour accueillir les commerçants occidentaux nous ont apporté un aperçu sans précédent de la culture européenne et un bon accès à leurs marchandises. Des Kokujin entreprenants et d'autres influents ont commencé à envoyer leurs fils en Europe pour étudier les occidentaux de première main, essayant de découvrir autant que possible ce que nous pourrions utiliser chez nous."
 shinto_events.29.a:0 "D'accord."
 shinto_events.30.t:0 "Commerce avec l'Occident"
 shinto_events.30.d:0 "Au fil du temps, les gains du commerce avec l'Occident ont diminué par rapport à leur niveau initial élevé, mais l'afflux de marchandises et d'idées de ces voyageurs lointains change toujours notre société de ce qu'elle était. Seul le temps dira dans quelle mesure nous pourrions assimiler les idéaux de ces voyageurs lointains."
 shinto_events.30.a:0 "D'accord."
 shinto_events.31.t:0 "Sakoku ?"
 shinto_events.31.d:0 "Nous avons agi avec force pour limiter l'influence des Commerçants Occidentaux sur notre société. Bien que tenter de couper tous les contacts entièrement résulterait probablement en contrebande, nous avons restreint les commerçants à un seul port, et nous réglementons fortement leur interaction avec le monde en dehors de ce point de contact. De cette façon, nous pouvons participer aux marchandises (et aux armes) que nous souhaitons acquérir tout en limitant les risques de tentatives religieuses subversives ou de complots."
 shinto_events.31.a:0 "D'accord."
 shinto_events.32.t:0 "Armes à Feu"
 shinto_events.32.d:0 "Avec l'arrivée des commerçants occidentaux, les premières armes à feu portables sont arrivées dans notre royaume. Ces armes sont différentes de celles utilisées ici, et elles promettent de révolutionner la guerre si elles deviennent répandues. En acquérir suffisamment n'est pas aussi simple qu'il pourrait sembler, cependant. Les mousquets sont très demandés parmi ceux qui ont vu leur puissance, mais la perspective de ce qu'ils pourraient faire entre les mains de nos ennemis, ou même d'une communauté paysanne indisciplinée, est aussi assez troublante.\nAlors que nous commençons à produire et à instruire nos soldats dans l'utilisation de ces armes, nous devrons décider qui aura accès à ces armes et combien nous en fabriquerons."
 shinto_events.32.a:0 "La force par le nombre ! Produire autant que possible."
 shinto_events.32.b:0 "Nous en ferons juste assez pour une petite force d'hommes de confiance."
 shinto_events.33.t:0 "Diffusion des Armes à Feu"
 shinto_events.33.d:0 "Les mousquets à silex que les étrangers nous ont apportés se sont avérés plus faciles à produire en masse que nous n'aurions pu l'espérer. Alors que de plus en plus de nos troupes peuvent être équipées de ces armes, il est clair que nous ne pourrons pas limiter leur propagation ni à nos ennemis ni à l'homme du commun très efficacement. Si nous souhaitons vraiment diminuer les armes à feu en circulation, nous devrons agir très fermement bientôt."
 shinto_events.33.a:0 "Ce faisant, nous affaiblirions seulement nos armées."
 shinto_events.33.b:0 "Interdire entièrement l'utilisation des armes à feu pour les roturiers."
 shinto_events.34.t:0 "Évolution des Armes"
 shinto_events.34.d:0 "Avec la nouveauté des armes à feu qui s'estompe, il est devenu clair qu'elles ne sont pas aussi efficaces que leurs premiers partisans le prétendaient. Par l'entraînement, nous pourrions sûrement augmenter leur efficacité, et certains de nos forgerons ont également suggéré des moyens d'améliorer les armes elles-mêmes. D'autres soutiendraient que nous devrions consacrer le temps de nos forgerons et de nos soldats à des armes plus traditionnelles. Les armes de nos ancêtres semblent toujours les plus influentes dans les batailles, et nous ferions peut-être bien d'honorer leurs traditions."
 shinto_events.34.a:0 "Nous avons besoin de meilleures armes !"
 shinto_events.34.b:0 "L'Épée est plus puissante que le mousquet."
 shinto_events.35.t:0 "Une Révolution Militaire"
 shinto_events.35.d:0 "Depuis que les premiers mousquets à mèche ont commencé à apparaître dans nos terres, ils sont passés d'une nouveauté à l'une des armes les plus courantes en usage. Certains prétendent même que nous fabriquons plus et de meilleures armes que leurs pays d'origine. Cela a placé une arme dangereuse entre les mains de quiconque s'opposerait à notre règne, mais l'adoption rapide des armes a également fait de nos armées une force plus respectée que beaucoup d'autres."
 shinto_events.35.a:0 "D'accord."
 shinto_events.36.t:0 "Le Mousquet, une Arme et un Outil"
 shinto_events.36.d:0 "Depuis que les premiers mousquets à mèche ont commencé à apparaître dans nos terres, ils sont passés d'une nouveauté à l'une des armes les plus courantes en usage. Alors que la nouveauté s'est estompée et que d'autres dirigeants les ont adoptés, ces armes ne sont plus saluées comme une révolution sur le champ de bataille, mais elles restent avec les régiments qui se spécialisent dans leur utilisation.\nDans la vie civile, il est également devenu coutumier d'utiliser des mousquets pour les gardes et les chasseurs."
 shinto_events.36.a:0 "D'accord."
 shinto_events.37.t:0 "Le Pouvoir de l'Épée"
 shinto_events.37.d:0 "Plutôt que de consacrer toute notre énergie à l'utilisation et à la propagation des armes à feu, nous avons essayé de les limiter et d'encourager à la place l'utilisation de l'épée et de la lance. Les mousquets peuvent avec le temps devenir plus courants, mais pour l'instant nous croyons toujours que ces armes classiques apporteront gloire et honneur à notre royaume."
 shinto_events.37.a:0 "D'accord."
 shinto_events.38.t:0 "Dainichi ?"
 shinto_events.38.d:0 "Avec l'arrivée des Européens, nous sommes entrés en contact avec une nouvelle culture et une nouvelle religion. À certains égards, elle semble similaire à la nôtre, mais à d'autres, elle nous est complètement étrangère. Un groupe d'hommes est arrivé à [Root.Capital.GetCapitalName], essayant de prêcher l'évangile d'un dieu Kirishitan. Leur message semble très étrange, cependant, probablement dû à des traducteurs incompétents ou malveillants.\nDans leur empressement à obtenir le patronage de [Root.Monarch.GetName], les missionnaires sont apparus sans cadeaux et débitant des absurdités. C'est un grave manque de respect envers notre [Root.Monarch.GetTitle], pourtant certains avertiraient que ces maladresses signifient qu'ils ont désespérément besoin de notre aide."
 shinto_events.38.a:0 "Absurde ! Ils n'ont pas leur place ici !"
 shinto_events.38.b:0 "Nous leur permettrons de rester tant qu'ils se comportent bien."
 shinto_events.38.c:0 "Écoutons ce que leur Dieu peut nous enseigner."
 shinto_events.39.t:0 "Missions à [Root.Capital.GetCapitalName]"
 shinto_events.39.da:0 "Un groupe de Kirishitan est arrivé à la cour de [Root.Capital.GetCapitalName] aujourd'hui, demandant qu'on leur permette de créer une petite communauté de fidèles dans notre grande ville. Ils veilleraient alors sur les pauvres et enseigneraient à ceux qui voudraient écouter au sujet de leur dieu.\nLes Missionnaires offrent également de former notre propre [Root.Heir.GetName] dans les voies de Dieu, ainsi que dans les disciplines de la science chrétienne. Le clergé bouddhiste, ainsi que certains de nos Kokujin, nous mettent en garde, car ils estiment que c'est un affront à nos traditions anciennes tandis que les commerçants de notre royaume espèrent obtenir des accords commerciaux précieux avec les occidentaux si nous les laissons rester."
 shinto_events.39.db:0 "Un groupe de Kirishitan est arrivé à la cour de [Root.Capital.GetCapitalName] aujourd'hui, demandant qu'on leur permette de créer une petite communauté de fidèles dans notre grande ville. Ils veilleraient alors sur les pauvres de la ville et enseigneraient à ceux qui voudraient écouter au sujet de leur dieu.\nLe clergé bouddhiste, ainsi que certains de nos Kokujin, nous mettent en garde, car ils estiment que c'est un affront à nos traditions anciennes tandis que les commerçants de notre royaume espèrent obtenir des accords commerciaux précieux avec les occidentaux si nous les laissons rester."
 shinto_events.39.a:0 "[Root.Heir.GetName] sera heureux d'apprendre au sujet de leur dieu."
 shinto_events.39.b:0 "Nous pouvons leur permettre de répandre leur foi ici."
 shinto_events.39.c:0 "Nous devons défendre la foi de nos ancêtres !"
 shinto_events.40.t:0 "Privilèges Commerciaux"
 shinto_events.40.d:0 "Un groupe de missionnaires chrétiens a approché [Root.Monarch.GetName] avec une offre de détourner les grands navires de commerce de leur patrie vers nos ports, si nous leur permettons de créer une communauté côtière pour les convertis chrétiens. C'est une offre qui a une valeur considérable pour nos marchands."
 shinto_events.40.a:0 "Laissez-les venir !"
 shinto_events.40.b:0 "Nous ne pouvons pas permettre cela."
 shinto_events.41.t:0 "Lettre de Recommandation"
 shinto_events.41.d:0 "Les missions chrétiennes dans nos terres se sont bien comportées depuis qu'elles se sont installées ici. Elles respectent les lois et un nombre croissant d'hommes et de femmes ont commencé à voir la lumière de leur dieu. Leur chef a acquis une réputation d'excellent médiateur et ferait probablement un excellent ministre. Il a accepté cela à condition que nous écrivions une lettre de recommandation aux autres dirigeants mondains du Japon.\nBien sûr, nos vassaux plus traditionalistes verraient sa nomination comme une offense tant à la tradition qu'à eux-mêmes. Leur chef auto-proclamé voudrait probablement aussi prendre ses fonctions, bien que ses talents se situent dans d'autres domaines."
 shinto_events.41.a:0 "Écrire une lettre."
 shinto_events.41.b:0 "Nous ne pouvons pas faire cela."
 shinto_events.42.t:0 "Le Christianisme en Procès"
 shinto_events.42.d:0 "Nous avons été approchés par un grand nombre de nos Kokujin les plus estimés ainsi que par des dignitaires des communautés de temples dans nos terres. Ils exigent tous que nous enquêtions sur les qualités subversives du Christianisme. Ils estiment que cette religion étrangère détruit nos traditions et insulte nos ancêtres, et ils exigent que nous mettions la foi en procès, permettant à des hommes de confiance d'honneur et de qualité d'enquêter là-dessus."
 shinto_events.42.a:0 "Une inquisition ils auront, alors."
 shinto_events.42.a.tt:0 "Les résultats peuvent varier selon ce que l'inquisition trouve."
 shinto_events.42.b:0 "Ce n'est pas leur place. L'esprit ne peut pas raisonner sur la foi."
 shinto_events.42.b.tt:0 "Cela n'aura pas d'effet direct sur le résultat de cet incident."
 shinto_events.43.t:0 "La Nature de Dieu"
 shinto_events.43.d:0 "L'inquisition sur la nature du Christianisme a pris un tournant des plus choquants, car les juges eux-mêmes sont revenus demandant à être baptisés. L'un est un érudit néo-confucéen instruit et respecté, un autre un astronome respecté, et le dernier l'un de nos plus honorables vassaux Samouraïs. Comme ces hommes ont été sélectionnés comme piliers de la société, c'est un développement inattendu pour nous tous."
 shinto_events.43.a:0 "Nous devrons le permettre, alors."
 shinto_events.43.b:0 "Absurde ! Nous devons suivre les conseils de nos Kokujin !"
 shinto_events.44.t:0 "Christianisme Dénigré"
 shinto_events.44.d:0 "L'inquisition sur la nature du Christianisme a, sans surprise, abouti à ce que la religion soit jugée insuffisante en termes de respect et d'adhésion aux traditions de notre culture. Les hommes instruits et honorables que nous avons mis en charge de l'enquête ont déclaré que bien que la religion puisse sembler tentante, elle est en réalité un danger pour notre société."
 shinto_events.44.a:0 "C'est la terre des Dieux !"
 shinto_events.44.b:0 "Bien que nous respections leur jugement, les Chrétiens doivent rester."
 shinto_events.45.t:0 "Communauté Chrétienne Attaquée"
 shinto_events.45.d:0 "Les entrepôts des marchands chrétiens de [christian_port_event_target.GetName] ont pris feu plus d'une fois ce mois-ci, et bien que les Samouraïs locaux prétendent qu'il s'agit d'une série d'accidents malheureux, il semble clair que tout le monde n'est pas aussi favorablement disposé que nous envers l'arrivée des gaijin sur nos côtes."
 shinto_events.45.a:0 "Mener une enquête pour punir les auteurs."
 shinto_events.45.b:0 "Il y a peu que nous puissions faire contre les accidents."
 shinto_events.46.t:0 "Une Rupture avec la Tradition ?"
 shinto_events.46.d:0 "Ce n'est un secret pour personne que [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] lignée sont personnellement impliqués avec la foi chrétienne. Au fil du temps, le Christianisme en est venu à surpasser les traditions Shinto, Bouddhistes et Confucéennes du Japon, et c'est l'idéologie directrice de notre État. Maintenant que le Japon est une société plus unie et ordonnée, peut-être le temps est-il venu de compléter la transition et d'adopter le Christianisme comme religion de notre État ?"
 shinto_events.46.a:0 "Non, nous ne pourrions jamais tourner entièrement le dos à la tradition !"
 shinto_events.46.b:0 "Le temps du changement est venu."
 shinto_events.47.t:0 "Un Royaume Kirishitan"
 shinto_events.47.d:0 "Nous avons pris les adeptes du dieu chrétien sous notre aile et leur avons permis la protection de notre État. Où qu'ils aillent dans notre royaume, tout le monde sait que ces Chrétiens ont le droit de vivre, travailler et faire du prosélytisme. Les marchands chrétiens sont une vue commune dans nos villes, et à la cour, c'est devenu une religion de plus en plus commune parmi nos ministres et vassaux."
 shinto_events.47.a:0 "D'accord."
 shinto_events.48.t:0 "Présence Chrétienne Significative"
 shinto_events.48.d:0 "Bien que nous les ayons gardés sous surveillance, nous avons permis aux communautés chrétiennes de se développer dans nos terres, tout en protégeant leurs adeptes du mal. Cela nous a permis d'obtenir des accords commerciaux précieux avec leur patrie d'outre-mer, et nous a valu une réputation de royaume juste et équitable."
 shinto_events.48.a:0 "D'accord."
 shinto_events.49.t:0 "Christianisme Vaincu"
 shinto_events.49.d:0 "Nous avons réussi à subvertir les influences dangereuses du Christianisme dans notre société. Nous avons gardé leurs missionnaires à distance et fermé notre royaume à leurs adeptes, allant jusqu'à traquer tout adhérent suspecté à l'intérieur de nos frontières. En conséquence, nous sommes loués tant par nos vassaux que par le clergé Shinto et Bouddhiste de notre royaume comme le défenseur de la voie de nos ancêtres."
 shinto_events.49.a:0 "D'accord."
 shinto_events.50.t:0 "Le Shogunat de [Root.Overlord.GetName]"
 shinto_events.50.d:0 "Dans une tentative d'augmenter [Root.Overlord.Monarch.GetHerHis] autorité sur les Daimyo du Japon, [Root.Overlord.Monarch.GetName] a mené des cadastres à l'échelle nationale. Cela implique de mesurer et compter toutes les personnes, ressources et relations de propriété, et de les refaçonner selon [Root.Overlord.Monarch.GetHerHis] conception. C'est une tâche donnée par l'Empereur à notre Shogun, mais elle est utilisée pour renverser des relations de pouvoir de longue date.\nAujourd'hui, le temps d'un tel cadastre est venu pour le royaume de [Root.GetName]. Nous avons été approchés par les administrateurs de l'administration [Root.Overlord.GetAdjective] avec une proclamation stipulant que les fiefs accordés aux vassaux appartiennent ultimement à l'État, et que les vassaux détiennent des terres en fiducie pour le moment présent seulement."
 shinto_events.50.a:0 "Personne ne touchera à mon droit de collecter les impôts !"
 shinto_events.50.b:0 "Offrir d'effectuer un tel comptage et présenter le résultat à [Root.Overlord.Monarch.GetName]."
 shinto_events.50.c:0 "Accueillir les administrateurs [Root.Overlord.GetAdjective]."
 shinto_events.51.t:0 "La Question de la Résidence"
 shinto_events.51.d:0 "Le Shogun a fait savoir que l'Empereur exige notre présence près de la Cour Impériale. Résider dans notre propre cour à [Root.Capital.GetCapitalName] ne sera plus acceptable toute l'année, et il a été décrété que notre famille doit désormais résider à la Cour Impériale toute l'année. Bien que cela ait parfois déjà été le cas, cet ordre impérial nous laisse peu de place pour décider par nous-mêmes. [Root.Monarch.GetName] doit se rendre à la cour immédiatement ou faire face à de graves conséquences."
 shinto_events.51.a:0 "Faisons-le de bon cœur."
 shinto_events.51.b:0 "Les [Root.Overlord.GetAdjective] sont faibles et sans volonté."
 shinto_events.52.t:0 "Nomination à un Poste Impérial"
 shinto_events.52.d:0 "Le Bakufu a fait savoir que [Root.Monarch.GetName] est censé servir comme fonctionnaire impérial. Étant donné la sincérité de la demande, un refus serait hors de question, et pourrait même être vu comme un signe de rébellion ouverte et de déshonneur. C'est aussi clairement un moyen d'obtenir prestige et influence pour les [Root.GetAdjective], mais c'est un honneur dangereux. Le Shogunat [Root.Overlord.GetAdjective] a dernièrement remplacé les fonctionnaires à un rythme alarmant. Pas content de permettre à leurs supporters et vassaux loyaux d'occuper de hautes fonctions, ils renvoient maintenant ceux qui ne livrent pas les résultats que le Shogun attend. Pour certains, c'est un système de mérite, mais pour les nombreux fonctionnaires au service impérial, cela signifie une peur constante de l'examen minutieux."
 shinto_events.52.a:0 "Nous devons servir le Shogun et l'Empereur."
 shinto_events.52.b:0 "Nous ne pouvons pas participer à cette mascarade, refuser la nomination."
 shinto_events.52.b.tt:0 "[Root.Overlord.GetName] peut déclarer la guerre à [Root.GetName]."
 shinto_events.53.t:0 "Le Daimyo de [From.GetName] Refuse de Servir !"
 shinto_events.53.d:0 "Notre vassal, le [From.Monarch.GetTitle] des [From.GetAdjective] a refusé une convocation impériale pour servir comme fonctionnaire dans notre administration. Une faible excuse a été offerte, mais c'est un défi clair à notre autorité."
 shinto_events.53.a:0 "Nous devrons trouver quelqu'un d'autre alors."
 shinto_events.53.b:0 "Cela ne peut pas tenir, nous devons punir les [From.GetAdjective] !"
 shinto_events.54.t:0 "Les [Root.Overlord.GetAdjective] Reculent"
 shinto_events.54.d:0 "Prouvant [Root.Overlord.Monarch.GetHerselfHimself] être aussi faible que nous le soupçonnions, le Shogun de [Root.Overlord.GetName] a accepté de reculer de la demande de service. Ils ont envoyé l'ordre de remplir le poste que nous avons refusé à quelqu'un d'autre, mais leur autorité est sévèrement affaiblie car n'importe qui pouvait voir l'effet de notre refus."
 shinto_events.54.a:0 "Que leur faiblesse soit apparente à tous !"
 shinto_events.55.t:0 "Adhésion au Bakufu"
 shinto_events.55.d:0 "Notre politique de loyauté et d'acquiescement alors que le Shogunat renforce son emprise sur le Japon nous a valu la confiance et la loyauté de la Cour Impériale. Nous avons peut-être abandonné l'indépendance aux yeux de certains, mais nous avons également gagné des faveurs précieuses et une place parmi les familles dirigeantes d'un nouveau Japon."
 shinto_events.55.a:0 "Nous restons les serviteurs loyaux du Fils du Ciel."
 shinto_events.56.t:0 "Pouvoir Croissant du Shogunat"
 shinto_events.56.d:0 "Nous avons essayé de naviguer une voie médiane alors que le Shogunat tente de renforcer son emprise sur l'Empire. Bien que nous ne soyons pas comptés parmi les vassaux les plus déloyaux de l'Empereur, nous ne faisons pas non plus partie du groupe le plus proche de l'administration. Cela nous a permis de préserver notre indépendance tout en bénéficiant de la loi, de l'ordre et de la sécurité que les nouveaux temps apportent."
 shinto_events.56.a:0 "Nous continuerons à préserver notre marge de manœuvre."
 shinto_events.57.t:0 "Fragmentation du Pouvoir du Shogunat"
 shinto_events.57.d:0 "Notre politique d'affirmer activement notre indépendance et de nous appuyer sur une autorité locale alternative plutôt que de jouer le jeu des machinations du Shogunat nous a valu une réputation de Daimyo férocement indépendant et puissant. Notre parole porte le respect, et nos actions résonnent avec beaucoup de Daimyo et Kokujin au Japon qui souhaitent repousser les limites de leur vassalité. En sapant activement l'autorité impériale, nous construisons rapidement une base de pouvoir propre."
 shinto_events.57.a:0 "Les actes parlent plus fort que les mots."
 shinto_events.58.t:0 "Le Bouddha Amida"
 shinto_events.58.d:1 "Notre soutien de longue date aux Ikko-Ikki n'a pas été sans friction et dans de nombreuses situations, c'est comme s'il y avait deux autorités parallèles au Japon. Pourtant, les Ikko-Ikki n'auraient sans doute pas été aussi loin qu'ils l'ont été sans notre protection selon beaucoup.\nAvec les temps de guerre civile derrière nous, beaucoup s'attendent à ce que nous élevions les dirigeants des Ikko-Ikki à de hautes positions et rendions leur foi plus officiellement soutenue par l'État. Pour beaucoup, ce serait une grave insulte à nos anciennes traditions, cependant..."
 shinto_events.58.a:0 "Non, nous ne pouvons pas tourner entièrement le dos aux traditions de nos ancêtres."
 shinto_events.58.b:1 "Amitabhaya. Nous devons embrasser leurs croyances et les intégrer dans notre système juridique."
 shinto_events.58.c:1 "Amitabhaya. Leurs communes recevront pleine autorité."
 shinto_events.58.e:1 "Amitabhaya. Leur philosophie est saine, mais nous ne pouvons pas les laisser gouverner."
 MAX_TRIBUTE_REACHED:0 "\nUn Tributaire ne peut pas payer plus de $AMOUNT|Y$ $SYMBOL$ par an."
 CHANGE_TRIBUTE_COOLDOWN:0 "Vous ne pouvez changer de Tribut qu'une fois par mois. Vous pourrez le faire à nouveau le $UNTIL|Y$."
 SWITCH_HARMONIZATION_DESC:0 "Cela §Rannulera§! votre Harmonisation avec $CURRENT|Y$ (progression actuelle $PROGRESS|%|Y|0$).\n"
 meritocracy_events.1.t:0 "Examens Élargis"
 meritocracy_events.1.d:0 "Notre administration réclame plus de fonctionnaires que nos examens annuels ne peuvent produire. Certains de nos ministres ont suggéré que nous devrions augmenter le quota, permettant à plus de réussir afin de remplir nos rangs plus rapidement.\nLe Grand Secrétaire avertit, cependant, que nous risquons l'intégrité du processus d'examen lui-même si nous commençons à permettre à quiconque sauf les meilleurs de réussir les examens."
 meritocracy_events.1.a:0 "Augmenter le quota !"
 meritocracy_events.1.b:0 "Nous ne pouvons pas prendre ce risque."
 meritocracy_events.2.t:0 "Vertus du Système d'Examens"
 meritocracy_events.2.d:0 "Le système d'examens impériaux nous permet de nous assurer que tous les fonctionnaires ont été correctement instruits sur la meilleure façon d'administrer la Chine et que seuls ceux qui sont les plus aptes à cette tâche la font réellement.\nÀ certains moments, le système fonctionne mieux qu'à d'autres, cependant. Selon le Grand Secrétaire, nous avons eu une excellente année, avec peu d'incidents de mauvaise gouvernance nulle part dans l'empire et une bonne récolte de nouveaux candidats entrant en service."
 meritocracy_events.2.a:0 "Excellent !"
 meritocracy_events.3.t:0 "Nouveau Grand Secrétaire Principal"
 meritocracy_events.3.d:0 "Le Grand Secrétariat est l'agence centrale de coordination de notre gouvernement et bien qu'elle soit techniquement de rang inférieur à de nombreuses autres branches de l'administration, son rôle lui permet de contrôler les autres.\nUn nouveau Grand Secrétaire dynamique a assumé le rôle de plus ancien des six hommes en charge de l'agence avec un impact considérable sur tous les domaines du gouvernement."
 meritocracy_events.3.a:0 "Sa corruption se répandra dans toutes les parties de l'administration."
 meritocracy_events.3.b:0 "Son incompétence se répercutera sur tous les fonctionnaires."
 meritocracy_events.3.c:0 "Ses complots incessants nuiront au pays."
 meritocracy_events.3.dd:0 "Ses nombreux ennemis entraveront notre gouvernement."
 meritocracy_events.3.e:0 "Son efficacité se répercutera à tous les niveaux."
 meritocracy_events.3.f:0 "Son éthique se répandra dans toutes les parties de l'administration."
 meritocracy_events.3.g:0 "Son érudition savante est un exemple pour nous tous."
 meritocracy_events.3.h:0 "Sa loyauté sera une inspiration pour les autres."
 meritocracy_events.4.t:0 "Déclin du Système d'Examens"
 meritocracy_events.4.d:0 "Le Système d'Examens a bien servi les Empereurs de Chine pendant des siècles, en théorie il nous permet de nous assurer que seuls ceux des meilleures capacités seront sélectionnés pour agir comme fonctionnaires du [Root.Monarch.GetTitle].\nDernièrement, cependant, il est largement accepté que le niveau général des essais des candidats a diminué. Même le travail de l'optimus de cette année est bien pire que les échecs de certaines années selon les maîtres examinateurs."
 meritocracy_events.4.a:0 "Tout espoir est-il perdu pour cette génération ?"
 meritocracy_events.5.t:0 "Corruption dans le Système d'Examens"
 meritocracy_events.5.d:0 "La corruption croissante dans notre État a lentement mais sûrement commencé à ronger l'intégrité du système d'examens. Le Grand Secrétaire a présenté une suggestion sur la façon dont nous pourrions combattre cette tendance, purgeant les examens d'éléments corrompus.\nCertaines familles influentes auraient beaucoup à perdre à combattre la corruption dans le système cependant, et offriraient leur soutien à nous si nous fermions les yeux sur l'examen de leurs enfants."
 meritocracy_events.5.a:0 "Nous devons purger le système des abus !"
 meritocracy_events.5.b:0 "Nous pouvons fermer les yeux pour l'instant..."
 overlord_military_aid:0 "A envoyé un Soutien Militaire"
 overlord_military_mission:0 "Mission Militaire"
 desc_overlord_military_mission:0 "Notre suzerain nous a envoyé une mission militaire pour nous aider dans notre guerre actuelle avec leur rival. Ces hommes, expérimentés dans le domaine de la guerre et de la logistique militaire, nous aident grandement à maximiser l'efficacité de notre recrutement et à faciliter notre logistique militaire."
 tributary_events.30.t:0 "Tributaire en Guerre avec un Rival"
 tributary_events.30.d:0 "Notre tributaire, le [tributary_warring_rival.GovernmentName] de [tributary_warring_rival.GetName], est en guerre avec notre rival, [overlord_rival.GetName]. Puisqu'ils nous rendent un service important en affaiblissant notre adversaire, peut-être devrions-nous les soutenir en envoyant une mission militaire, composée de chefs militaires expérimentés et d'experts, pour la durée du conflit. Les soutenir avec des troupes ou un soutien monétaire, si nous pouvons nous le permettre, contribuerait également grandement à assurer la défaite de notre rival."
 tributary_events.30.a:0 "Nous devons envoyer tout ce que nous pouvons épargner !"
 tributary_events.30.b:0 "Apparemment [overlord_rival.Capital.GetCapitalName] est une merveilleuse destination de vacances..."
 tributary_events.30.c:0 "Ils pourraient bien avoir besoin de financement supplémentaire."
 tributary_events.30.e:0 "Juste la mission suffit."
 tributary_events.30.f:0 "Malheureusement, nous ne pouvons pas nous permettre d'envoyer de l'aide en ce moment."
 tributary_events.31.t:0 "Le Suzerain Envoie une Mission Militaire"
 tributary_events.31.d.a:0 "À la lumière de notre guerre actuelle avec le rival de notre suzerain, le [overlord_rival.GovernmentName] de [overlord_rival.GetName], on nous a envoyé une mission militaire pour nous aider dans nos efforts. Composée de chefs militaires expérimentés et d'experts dans les domaines du recrutement et de la logistique, cela sera sans doute d'une grande aide pour vaincre notre ennemi."
 tributary_events.31.d.b:0 "À la lumière de notre guerre actuelle avec le rival de notre suzerain, le [overlord_rival.GovernmentName] de [overlord_rival.GetName], on nous a envoyé une mission militaire et une grande donation à notre trésor de guerre pour nous aider dans nos efforts. Composée de chefs militaires expérimentés et d'experts dans les domaines du recrutement et de la logistique, cette mission sera sans doute d'une grande aide pour vaincre notre ennemi."
 tributary_events.31.d.c:0 "À la lumière de notre guerre actuelle avec le rival de notre suzerain, le [overlord_rival.GovernmentName] de [overlord_rival.GetName], on nous a envoyé une mission militaire et un contingent de troupes de remplacement pour nous aider dans nos efforts. Composée de chefs militaires expérimentés et d'experts dans les domaines du recrutement et de la logistique, cette mission sera sans doute d'une grande aide pour vaincre notre ennemi."
 tributary_events.31.d.d:0 "À la lumière de notre guerre actuelle avec le rival de notre suzerain, le [overlord_rival.GovernmentName] de [overlord_rival.GetName], on nous a envoyé une mission militaire, une grande donation à notre trésor de guerre, et un contingent de troupes de remplacement pour nous aider dans nos efforts. Composée de chefs militaires expérimentés et d'experts dans les domaines du recrutement et de la logistique, cette mission sera sans doute d'une grande aide pour vaincre notre ennemi."
 tributary_events.31.a:0 "Toute aide est la bienvenue !"
 tributary_events.32.t:0 "Mission Militaire Retirée"
 tributary_events.32.d:0 "Maintenant que la guerre est terminée, notre suzerain a jugé bon de retirer la mission militaire qui nous a été envoyée. Nous devrons à nouveau nous passer de leurs conseils."
 tributary_events.32.a:0 "Regrettable, même si c'était prévisible."
