 harmonization_classics_translated:0 "Classiques Traduits"
 desc_harmonization_classics_translated:0 "Dans un effort pour encourager les gens de province à approcher notre société civilisée, nous avons autorisé la traduction des Classiques de la Pensée dans leur langue. Ce faisant, nous avons dilué les idéaux purs de la Théorie du Tout, mais la synthèse de nos idées et des leurs nous a apporté une nouvelle compréhension."
 harmonization_classics_defended:0 "Classiques Défendus"
 desc_harmonization_classics_defended:0 "Nous avons activement travaillé contre la dilution de la Pensée simplement pour accommoder la philosophie provinciale. Pour devenir civilisés, ils doivent accepter qu'ils doivent devenir comme nous, et abandonner la notion absurde que nous pourrions devenir comme eux."
 harmonization_converted_minister:0 "Ministre Érudit"
 desc_harmonization_converted_minister:0 "L'un de nos ministres s'est beaucoup intéressé aux concepts politiques et philosophiques d'une religion étrangère. Nous lui avons donné libre cours pour poursuivre ces intérêts, scandalisant les érudits et fonctionnaires de la Pensée dans tout le pays."
 harmonization_local_rites_refused:1 "Rites Locaux Réprimés"
 desc_harmonization_local_rites_refused:1 "Nous avons traité très sévèrement les fonctionnaires locaux dans cet État après qu'ils aient tenté d'incorporer des rituels de souveraineté religieux locaux tout en pratiquant notre autorité."
 harmony_banned_book:0 "Roman Interdit"
 desc_harmony_banned_book:0 "Nous avons interdit un roman populaire pour avoir égaré notre peuple."
