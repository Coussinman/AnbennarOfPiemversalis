 aristocracy_ideas:0 "Idées aristocratiques"
 aristocracy_ideas_bonus:0 "Aristocratie accomplie"
 noble_knights:0 "Chevaliers nobles"
 noble_knights_desc:0 "Entretenir une cavalerie requiert un système économique capable de produire un grand nombre de chevaux excédentaires. Si nous garantissions les privilèges de notre classe noble, non seulement elle en serait fort satisfaite, mais elle accomplirait elle-même l'essentiel du travail nécessaire à la production des montures requises. Notre bouffon de cour résume cela ainsi : le service garantit les serfs."
 serfdom:0 "Servage"
 serfdom_desc:0 "Fantassin dans l'armée n'est guère la carrière dont quiconque rêvait, avec sa piètre nourriture, sa solde misérable et ses services médicaux quasi inexistants. Si nous attachions nos paysans à la terre, nous saurions exactement où chercher nos recrues."
 noble_officers:0 "Officiers nobles"
 noble_officers_desc:0 "Le choix de ceux qui commandent nos troupes est d'une importance capitale. Notre noblesse cherche à s'assurer que la préférence lui soit accordée. Cela lui donnera l'occasion de démontrer sa valeur en offrant l'acier froid à l'ennemi, et nous le lui permettrons."
 local_nobility:0 "Noblesse locale"
 local_nobility_desc:0 "La noblesse sait qu'elle est simplement supérieure au commun des mortels et accordera sa loyauté à ceux qui en sont dignes. Si nous confirmons ses privilèges, elle se souviendra naturellement de notre largesse et sera plus résistante aux inducements des puissances étrangères."
 international_nobility:0 "Noblesse internationale"
 international_nobility_desc:0 "Les relations internationales sont une affaire délicate. Certains affirment que la classe marchande, habituée à traiter avec les étrangers, est la plus apte à cette tâche. Ceux qui le disent ignorent les liens de parenté que nos familles nobles ont tissés au fil des ans ; ces liens devraient être mis à profit pour servir notre cause diplomatique."
 noble_resilience:0 "Connexions nobiliaires"
 noble_resilience_desc:1 "Les divers groupes de cavalerie de ce continent sont souvent dirigés par des nobles de moindre rang. En nouant des amitiés avec la noblesse, nous pouvons tirer parti de son réseau de contacts pour recruter des groupes de cavaliers plus nombreux et plus importants."
 military_traditions:0 "Traditions militaires"
 military_traditions_desc:0 "La pensée militaire évolue constamment, et nous veillons à ce que la nôtre évolue avec elle. En encourageant une tradition de service parmi notre noblesse, être un homme de rang, c'est être un homme qui a conquis la gloire sur le champ de bataille. Bien que la bravoure et autres vertus similaires soient toujours utiles, rien ne vaut de surpasser son ennemi pour faciliter la victoire."
 plutocracy_ideas:0 "Idées ploutocratiques"
 plutocracy_ideas_bonus:0 "Ploutocratie accomplie"
 tradition_of_payment:0 "Tradition de paiement"
 tradition_of_payment_desc:0 "Il est toujours tentant de retarder de quelques jours les paiements aux mercenaires ; après tout, on ne sait jamais quelles dépenses imprévues pourraient survenir. Nous ne ferons pas cela : nous paierons nos mercenaires exactement à temps, et les capitaines mercenaires le sauront et s'en souviendront."
 abolished_serfdom:0 "Abolition du servage"
 abolished_serfdom_desc:0 "Nous savons, par les récits de la République damérienne, qu'une armée citoyenne d'hommes libres est bien plus disposée à combattre que des hommes contraints. Nous devons accorder une relative liberté à notre paysannerie, et elle combattra pour défendre cette liberté."
 bill_of_rights:0 "Déclaration des droits"
 bill_of_rights_desc:0 "En accordant aux citoyens certains droits fondamentaux, nous réduisons la probabilité d'un soulèvement paysan."
 free_merchants:0 "Marchands libres"
 free_merchants_desc:0 "Dans les sociétés plus réactionnaires et attachées aux traditions, les hommes de commerce sont considérés comme inférieurs à ceux qui possèdent des terres. Pas chez nous : nous savons que la richesse est le pouvoir, quelle que soit son origine."
 free_subjects:0 "Sujets libres"
 free_subjects_desc:0 "Bien que rosser un serviteur puisse être satisfaisant, ce n'est pas la meilleure façon de le faire travailler plus dur. Un philosophe naturel a eu l'idée de faire du profit la motivation première des gens ; si nous remplaçons les rentes monétaires par des paiements en nature, nos paysans seront incités à produire davantage."
 humanist_tolerance:0 "Tolérance de croyance et de nature"
 humanist_tolerance_desc:0 "En œuvrant vers une société plus tolérante et en tentant de résoudre nos problèmes sociaux et religieux de manière plus rationnelle, le risque de troubles civils diminuera."
 emancipation:0 "Émancipation"
 emancipation_desc:0 "Pendant longtemps, nous avons restreint la propriété foncière à ceux que nous jugions suffisamment dignes de confiance. Si nous levions ces restrictions, la propriété foncière se consoliderait. Cela créerait à son tour un réservoir de main-d'œuvre saisonnière pour qui la vie militaire pourrait valoir la peine d'être poursuivie."
 dynamic_court:0 "Cour dynamique"
 dynamic_court_desc:0 "Une cour véritablement innovante est celle où toute personne peut s'élever et briller. Nous devons nous efforcer de veiller à ce que les vieilles traditions, la naissance ou la richesse ne soient pas un obstacle au développement de notre cour ni une barrière aux personnes talentueuses souhaitant chercher fortune au service de notre État."
 innovativeness_ideas:0 "Idées innovantes"
 innovativeness_ideas_bonus:0 "Innovation accomplie"
 patron_of_art:0 "Mécène des arts"
 patron_of_art_desc:0 "Notre quête d'une société culturellement cultivée commence ici. Nos merveilles artistiques passeront à l'histoire comme les plus admirables de cette ère."
 pragmatism:0 "Pragmatisme"
 pragmatism_desc:0 "Trop de pays laissent la perception de leur nation façonner leurs politiques. C'est insensé : si les mercenaires sont plus adaptés à nos besoins, nous les utiliserons plutôt que d'investir dans une coûteuse armée permanente."
 scientific_revolution:0 "Révolution scientifique"
 scientific_revolution_desc:0 "Nous devons œuvrer vers une révolution sociale et économique marquée par des inventions technologiques et un passage d'une société agricole à une société industrielle."
 knowledge_transfer:0 "Transmission du savoir"
 knowledge_transfer_desc:0 "Préserver l'expérience est la chose la plus importante qu'un pays puisse faire. Nous devons nous assurer que ceux qui servent au combat transmettent ce savoir aux jeunes recrues, par un système de mentorat."
 organised_recruiting:0 "Recrutement organisé"
 organised_recruiting_desc:0 "Jadis, lorsqu'un capitaine cherchait à recruter des hommes pour remplir son régiment, le processus était long, car peu de gens souhaitaient embrasser une mort certaine dans nos armées. Cependant, en appliquant les principes de la raison à ce problème, nous pourrons concevoir un système qui mettra les hommes en uniforme bien plus rapidement."
 optimism:0 "Optimisme"
 optimism_desc:0 "La victoire ne se gagne pas seulement sur le champ de bataille, mais aussi dans les salons. Notre avancement de la raison permet à notre peuple de surmonter les effets des revers temporaires et de se préparer plutôt à notre victoire inévitable."
 formalized_officer_corps:0 "Corps d'officiers formalisé"
 formalized_officer_corps_desc:0 "Traditionnellement, les officiers proviennent de la noblesse, mais nous n'avons pas tant de nobles, ce qui entraîne une pénurie d'officiers. Cependant, il y a en fait beaucoup de personnes de classe inférieure dans nos armées. Nous devrions envisager d'en promouvoir certains comme officiers professionnels."
 religious_ideas:0 "Idées religieuses"
 religious_ideas_bonus:0 "Dévotion accomplie"
 deus_vult:0 "Dieu le veut"
 deus_vult_desc:0 "Rejoignez le cri de guerre des croisades : « Dieu le veut ! » et écrasez les infidèles."
 missionary_schools:0 "Écoles missionnaires"
 missionary_schools_desc:0 "Bien qu'il ne manque pas de gens prêts à partir répandre la vraie foi, la plupart de ces personnes font plus de mal que de bien. Cependant, des écoles spécialisées pour former les missionnaires garantiront que nous ayons davantage de personnes capables non seulement de répandre la foi, mais aussi de réussir."
 church_attendance_duty:0 "Obligation d'assistance religieuse"
 church_attendance_duty_desc:0 "En adoptant une politique d'assistance obligatoire aux offices, l'accent mis sur les valeurs et croyances religieuses réduira indéniablement les coûts de maintien de l'ordre public."
 divine_supremacy:0 "Suprématie divine"
 divine_supremacy_desc:0 "Il est de la plus haute importance que nous débarrassions notre nation et ses frontières environnantes des infidèles qui infestent nos terres."
 devoutness:0 "Piété"
 devoutness_desc:0 "La religion est l'un des remparts les plus importants de notre pouvoir. Par des démonstrations publiques de piété de la part des gouvernants, les gouvernés suivront l'exemple. La croissance de la piété parmi notre peuple renforcera notre règne."
 religious_tradition:0 "Tradition religieuse"
 religious_tradition_desc:0 "La force de notre foi et les démonstrations publiques de piété et de culte sont admirées par les autres contrées, proches et lointaines. Cela se reflète dans le prestige et la gloire de notre royaume."
 ecumenism:0 "Œcuménisme"
 ecumenism_desc:0 "La question de savoir comment traiter les hérétiques du royaume est toujours délicate. Bien que la bonne vieille approche du fer et du feu finisse par résoudre la plupart des problèmes, la diplomatie peut également réussir. En encourageant le dialogue entre les diverses sectes, nous pouvons réduire les malentendus et promouvoir la paix dans le royaume."
 spy_ideas:0 "Idées d'espionnage"
 spy_ideas_bonus:0 "Espionnage accompli"
 privateers:0 "Corsaires"
 privateers_desc:0 "Mener la guerre contre le commerce ennemi repose au sommet de la première triade de la victoire. Nous encouragerons de vieux loups de mer à frapper le commerce ennemi."
 vetting:0 "Vérification des antécédents"
 vetting_desc:0 "Avec tant de postes lucratifs, nous constatons parfois que ceux qui dirigent notre administration sont susceptibles d'être corrompus par des puissances étrangères. Quelques simples vérifications d'antécédents élimineront les plus enclins à la corruption."
 rumourmongering:0 "Propagation de rumeurs"
 rumourmongering_desc:0 "Les ennemis sont vulnérables sur tous les fronts. Le poison versé dans la bonne oreille peut être aussi mortel que dix mille soldats. Nous devons être prêts à pratiquer tous les arts obscurs nécessaires pour vaincre."
 efficient_spies:0 "Espions efficaces"
 efficient_spies_desc:0 "La plupart des paysans vendraient leur propre mère pour de l'argent, mais trouver ceux qui peuvent faire quelque chose de vraiment utile est plus difficile. Par l'expérience, nous apprenons à séparer le bon grain de l'ivraie."
 shady_recruitment:0 "Recrutement clandestin"
 shady_recruitment_desc:0 "Notre capacité à identifier et à recruter parmi les classes les plus basses laisse beaucoup de gens incrédules quant au fait que c'est bien nous qui faisons ces choses. Ce qui est fort agréable."
 destabilising_efforts:0 "Efforts de déstabilisation"
 destabilising_efforts_desc:0 "Nos capacités en matière d'espionnage nous permettent de cibler la stabilité même de nos ennemis. Nous pouvons transformer leurs plus grands alliés en ennemis."
 espionage:0 "Espionnage"
 espionage_desc:0 "Nous permet de former davantage d'espions et ainsi d'augmenter nos chances d'obtenir des informations politiques et militaires sur nos ennemis."
 diplomatic_ideas:0 "Idées diplomatiques"
 diplomatic_ideas_bonus:0 "Diplomatie accomplie"
 foreign_embassies:0 "Ambassades étrangères"
 foreign_embassies_desc:0 "La diplomatie est un art délicat qui consiste à équilibrer plusieurs parties simultanément. Si nous maintenons des ambassades dans d'autres pays qui nous font rapport régulièrement, nous disposerons des informations nécessaires pour peser nos options."
 claim_fabrication:0 "Fabrication de revendications"
 claim_fabrication_desc:0 "Revendiquer quelque chose comme sien est facile ; persuader tout le monde que l'on a une revendication valide est bien plus difficile. En étendant notre réseau diplomatique, nous pouvons nous assurer que les personnes qui comptent sachent que cette revendication est nôtre."
 cabinet:0 "Cabinet"
 cabinet_desc:0 "En établissant un conseil exécutif, nous sommes en mesure de rassembler nos diplomates les plus compétents."
 adaptability:0 "Adaptabilité"
 adaptability_desc:0 "Il y a ce qui est nôtre et ce qui fait partie de notre domaine ancestral qui ne sera jamais cédé. Un peu de flexibilité ici permettra de considérer beaucoup plus de terres comme inaliénables, et si le pire devait arriver, le monde entier saura que notre croisade pour les récupérer sera juste."
 revolution_and_counter:0 "Révolution et contre-révolution"
 revolution_and_counter_desc:0 "Avec la politique de l'époque devenant plus polarisée et plus radicale, nous pourrions n'avoir d'autre choix que de faire la guerre aux gouvernements différents du nôtre. En adoptant cette idée, nous pouvons le faire sans frais."
 diplomatic_influence:0 "Influence diplomatique"
 diplomatic_influence_desc:0 "En nous concentrant sur la diplomatie, nous pouvons accroître le pouvoir que nous exerçons sur la scène diplomatique. Ce pouvoir peut nous gagner de nombreux amis."
 flexible_negotiation:0 "Négociation flexible"
 flexible_negotiation_desc:0 "On ne sait jamais exactement ce que l'on peut obtenir à la table des négociations, aussi devons-nous y entrer avec toutes les options ouvertes."
 agent_training:0 "Formation des agents"
 agent_training_desc:0 "Nous avons de nombreuses opérations secrètes planifiées mais manquons d'hommes pour les accomplir. Établir une méthode de formation pour nos espions aidera à renforcer le nombre d'agents disponibles pour les missions dangereuses."
 additional_loyalist_recruitment:0 "Recrutement de loyalistes supplémentaires"
 additional_loyalist_recruitment_desc:0 "Naturellement, il y a ceux qui résident sur les terres de nos sujets et qui comprennent le droit divin de notre règne. En recrutant et en aidant ces individus éclairés, nous pouvons renforcer notre emprise sur les nations sujettes."
 audit_checks:0 "Contrôles d'audit"
 audit_checks_desc:0 "Alors que nous cherchons à infiltrer d'autres nations, nous devons être vigilants quant à la propagation d'idées empoisonnées dans nos propres cours. Constituer une équipe d'audit pour s'assurer que nos ministres agissent dans l'intérêt de l'État aidera à déraciner certains éléments corrompus."
 offensive_ideas:0 "Idées offensives"
 offensive_ideas_bonus:0 "Offensive accomplie"
 grand_army:0 "Grande armée"
 grand_army_desc:0 "Nous permet de créer l'une des armées les plus grandes et les plus puissantes que le monde ait jamais vues."
 glorious_arms:0 "Armes glorieuses"
 glorious_arms_desc:0 "La vue de notre armée glorieuse et prestigieuse fera trembler de peur tous nos adversaires."
 bayonet_leaders:0 "Commandants à la baïonnette"
 bayonet_leaders_desc:0 "Des hommes bien menés suivront, aussi veillerons-nous à ce que nos officiers mènent depuis le front."
 battlefield_commisions:0 "Promotions sur le champ de bataille"
 battlefield_commisions_desc:0 "Nous permet de nous concentrer intensément sur les avancées militaires et ainsi d'accroître notre tradition militaire."
 improved_foraging:0 "Fourrage amélioré"
 improved_foraging_desc:0 "Traditionnellement, nous étions incapables de combattre efficacement dans des terres qui ne fournissaient pas beaucoup de nourriture. Cependant, nos troupes sont devenues plus habiles à se procurer de la nourriture, permettant à de plus grandes armées de combattre."
 improved_manuever:0 "Manœuvre améliorée"
 improved_manuever_new:0 "Portée de flanquement améliorée"
 improved_manuever_desc:0 "Utiliser les troupes sur le champ de bataille est une compétence vitale pour un bon commandant. La capacité de savoir où déplacer les troupes nous donnera un avantage."
 napoleonic_warfare:0 "Esprit de corps"
 napoleonic_warfare_desc:0 "Les armées traditionnelles comptaient sur une discipline féroce pour maintenir l'ordre dans les rangs ; cependant, en faisant appel à la fierté des unités, nous pouvons atteindre des niveaux de discipline encore plus élevés."
 shock_tactics:0 "Tactiques de choc"
 shock_tactics_desc:0 "Le combat n'est pas exclusivement un test des compétences et de l'équipement des armées sur le champ de bataille. C'est aussi une épreuve de la force psychologique des soldats. Les tactiques de choc mettent à l'épreuve cette résistance, car la plupart des troupes fuient à la vue de notre infanterie et de notre cavalerie chargeant dans la mêlée."
 melee_combat_training:0 "Entraînement au combat rapproché"
 melee_combat_training_desc:0 "Bien que le mousquet remplace de plus en plus l'épée sur le champ de bataille, il est indéniable que le combat finira par mener à une phase de mêlée où les hommes s'affrontent. Nos soldats seront bien versés dans les arts du combat rapproché pour vaincre l'ennemi."
 volley_fire:0 "Tir de salve"
 volley_fire_desc:0 "Le tir de salve est une tactique militaire simple qui organise le feu de chaque soldat en une seule salve de balles."
 fort_breaker:0 "Briseur de forteresses"
 fort_breaker_desc:0 "Les fortifications sont le fléau de tout pays expansionniste. Même s'il faut sacrifier la vie de tous nos hommes, aucune forteresse ne se dressera entre nous et notre victoire.\n« En avant ! Prenez d'assaut cette forteresse et conquérez-la pour votre général ! »"
 glory_on_the_battlefield:0 "Chercheur de gloire"
 glory_on_the_battlefield_desc:0 "La plupart des guerres de nos jours se gagnent en sécurisant des sièges et en occupant le territoire ennemi. Nous n'avons rien de tout cela ! Nous cherchons nos ennemis sur le champ de bataille et les vainquons au combat !"
 defensive_ideas:0 "Idées défensives"
 defensive_ideas_bonus:0 "Défense accomplie"
 engineer_corps:0 "Corps du génie"
 engineer_corps_desc:0 "Nous permet de rassembler les plus grands esprits que notre nation peut offrir dans le domaine de la technologie militaire et de profiter de leurs services inégalés."
 military_drill:0 "Exercice militaire"
 military_drill_desc:0 "Nous permet d'investir dans l'entraînement militaire et ainsi d'améliorer les formations de bataille, le maniement des armes et de renforcer le moral de notre armée."
 regimental_system:0 "Système régimentaire"
 regimental_system_desc:0 "En organisant nos armées en régiments liés à des zones géographiques distinctes, nous permettons à l'armée de s'enraciner dans la communauté. Ainsi, lorsque nous viendrons lever davantage de bataillons pour nos régiments, ils pourront être recrutés plus rapidement."
 defensive_mentality:0 "Mentalité défensive"
 defensive_mentality_desc:0 "Il y a ceux qui pensent que l'attaque est la meilleure forme de défense, mais c'est insensé : laissons-les venir à nous, puis frappons-les sur la contre-attaque. Nos troupes défendront avec ténacité et nos forteresses tiendront plus longtemps."
 superior_firepower:0 "Puissance de feu supérieure"
 superior_firepower_desc:0 "L'utilisation d'une puissance de feu massive pour désorganiser l'ennemi avant de porter le coup de grâce est l'une des forces de notre armée, et nous veillerons à ce que nos commandants le sachent."
 supply_trains:0 "Convois de ravitaillement"
 supply_trains_desc:0 "En campagne, l'attrition est notre pire ennemi ; l'essentiel est donc d'obtenir des hommes pour remplacer ces pertes le plus rapidement possible."
 national_conscripts:0 "Conscrits nationaux"
 national_conscripts_desc:0 "Augmente nos effectifs militaires en rendant obligatoire l'enrôlement des hommes pour le service militaire."
 until_the_last_man:0 "Jusqu'au dernier homme"
 until_the_last_man_desc:0 "Une bataille ne peut avoir que l'une de deux issues : la victoire totale ou la mort. Aucun de nos soldats ne battra en retraite tant qu'un seul homme du camp ennemi sera encore debout."
 improved_body_armor:0 "Protection corporelle améliorée"
 improved_body_armor_desc:0 "Bien que les armes de mêlée se démodent, elles restent néanmoins répandues. Grâce à des améliorations des uniformes et de l'armure de nos troupes, nous pouvons réduire la létalité de leurs armes de mêlée."
 terrain_defence:0 "Défense de terrain"
 terrain_defence_desc:0 "Un soldat ne peut guère faire pour éviter une balle sur un champ de bataille découvert. C'est pourquoi nos troupes doivent être observatrices de leur environnement et utiliser le terrain pour esquiver les tirs de salve ennemis."
 homeland_specialization:0 "Spécialisation du territoire national"
 homeland_specialization_desc:0 "Grâce à l'entraînement précis et spécialisé de nos hommes, tout combat sur un sol qui ressemble au nôtre est une victoire assurée."
 guerilla_warfare_defense:0 "Guérilla"
 guerilla_warfare_defense_desc:0 "Parfois, une force ennemie est trop écrasante pour être affrontée de front. Il est alors plus sage d'utiliser des tactiques de harcèlement pour affaiblir les envahisseurs avant que nos hommes ne puissent les vaincre pour de bon."
 relentless_charge:0 "Charge implacable"
 relentless_charge_desc:0 "Aucune bataille n'a été gagnée en restant assis à attendre que l'ennemi se détruise lui-même. Notre armée leur apportera le combat, peu importe avec quelle impétuosité nous devrons charger."
 ditch_defense:0 "Défense par fossés"
 ditch_defense_desc:0 "Alors que l'artillerie connaît de grandes améliorations, il est évident que nos fortifications doivent être modernisées. Grâce à l'utilisation de défenses par fossés, nous pouvons accroître considérablement l'efficacité de nos défenseurs."
 trade_ideas:0 "Idées commerciales"
 trade_ideas_bonus:0 "Commerce accompli"
 shrewd_commerce_practise:0 "Pratiques commerciales astucieuses"
 shrewd_commerce_practise_desc:0 "Nous permet d'utiliser des pratiques commerciales plus raffinées, donnant à nos marchands l'avantage sur nos concurrents."
 free_trade:0 "Libre-échange"
 free_trade_desc:0 "Les familles marchandes actuelles cherchent à s'assurer que les privilèges commerciaux restent leur prérogative exclusive, mais nous ne sommes pas disposés à le faire et permettrons la croissance de la classe marchande."
 merchant_adventures:0 "Aventures marchandes"
 merchant_adventures_desc:0 "Nous permet de tirer parti des nombreux marchands avides de gloire et de fortune, désireux d'offrir leurs services pour une chance de chercher et d'explorer de nouvelles routes commerciales."
 national_trade_policy:0 "Politique commerciale nationale"
 national_trade_policy_desc:0 "En adoptant une politique commerciale nationale, nous pouvons renforcer notre présence commerciale et accroître l'efficacité de notre commerce."
 overseas_merchants:0 "Marchands outre-mer"
 overseas_merchants_desc:0 "Pour développer le commerce, nous devons étendre les droits de citoyenneté aux personnes qui vivent à l'étranger, soutiennent notre commerce et sont de la bonne classe sociale."
 trade_manipulation:0 "Manipulation commerciale"
 trade_manipulation_desc:0 "À ces points de passage clés où le commerce pourrait aller dans un sens ou dans l'autre, la capacité d'y obtenir un avantage est essentielle à la croissance de nos revenus commerciaux."
 fast_negotiations:0 "Négociations rapides"
 fast_negotiations_desc:0 "Parfois, la clé pour conclure un accord commercial est d'être le plus rapide. Nous devons nous assurer que nos marchands soient capables de conclure l'affaire."
 economic_ideas:0 "Idées économiques"
 economic_ideas_bonus:0 "Économie accomplie"
 bureaucracy:0 "Bureaucratie"
 bureaucracy_desc:0 "Nous permet d'augmenter nos revenus fiscaux en adoptant un système administratif plus bureaucratique dirigé par des fonctionnaires d'État."
 organised_construction:0 "Construction organisée"
 organised_construction_desc:0 "Le besoin de moderniser l'infrastructure de notre gouvernement est une affaire coûteuse. Si nous structurons correctement le processus, nous pouvons le faire à moindre coût."
 smithian_economics:0 "Économie de marché libre"
 smithian_economics_desc:1 "En nous opposant au mercantilisme et en restreignant l'influence de l'État dans les affaires économiques, nous soutiendrons un marché libre qui augmentera notre efficacité de production globale.\nDéveloppement des manufactures : §G+1§!"
 national_bank:0 "Banque nationale"
 national_bank_desc:0 "En établissant une autorité centrale pour les affaires financières, nous aurons un meilleur contrôle sur l'économie de notre nation."
 debt_and_loans:0 "Dettes et emprunts"
 debt_and_loans_desc:0 "L'endettement est parfois simplement inévitable ; cependant, un marché de la dette organisé nous permettra d'émettre des emprunts à un taux d'intérêt plus bas."
 centralization:0 "Centralisation"
 centralization_desc:0 "Si nous centralisons l'État, nous trouverons plus facile de faire avancer les idées et l'agenda du centre sur les régions."
 nationalistic_enthusiasm:0 "Enthousiasme nationaliste"
 nationalistic_enthusiasm_desc:0 "Le soutien de nos troupes est vital pour la défense nationale. Grâce à notre excellente administration, nous sommes en mesure d'obtenir des remises généreuses sur nos approvisionnements."
 exploration_ideas:0 "Idées d'exploration"
 exploration_ideas_bonus:0 "Exploration accomplie"
 colonial_ventures:0 "Entreprises coloniales"
 colonial_ventures_desc:0 "Nous permet d'envoyer davantage de colons vers des terres inexplorées."
 quest_for_the_new_world:0 "Quête d'Aelantir"
 quest_for_the_new_world_desc:0 "Nous permet de rejoindre le nombre de nations déterminées à explorer le monde au-delà de leurs frontières ou de nous efforcer d'être la première nation à faire le tour du monde en entreprenant une quête pour trouver la patrie elfique perdue d'Aelantir."
 overseas_exploration:0 "Exploration outre-mer"
 overseas_exploration_desc:0 "Établir des colonies dans des terres lointaines est à peu près un voyage sans retour. Si d'étranges maladies nouvelles ne vous emportent pas, le temps qu'il faut pour faire voile vers la métropole signifie que vous ne rentrerez pas chez vous. Si nous rappelons aux gens les richesses potentielles, nous pouvons les encourager à chercher des terres plus lointaines."
 land_of_opportunity:0 "Terre d'opportunités"
 land_of_opportunity_desc:0 "En dépeignant les terres coloniales comme de nouvelles terres vierges où tout homme peut faire fortune, possiblement quelques femmes aussi, les gens émigreront plus vite vers les colonies. Ce qui signifie que la nation aura dépensé moins d'argent pour encourager les gens à y aller."
 vice_roys:0 "Vice-rois"
 vice_roys_desc:0 "Nous permet d'établir des vice-rois et ainsi d'améliorer l'administration de nos colonies et d'augmenter les revenus qu'elles génèrent."
 free_colonies:0 "Colonies libres"
 free_colonies_desc:0 "Seul un nombre limité de personnes est disposé à s'expatrier pour étendre notre grand empire colonial. Cependant, la promesse d'une parcelle de terre à cultiver, en pleine propriété, encouragera beaucoup plus de gens à chercher fortune à l'étranger. L'avantage, c'est qu'il y a suffisamment de terre pour tout le monde."
 global_empire:0 "Empire mondial"
 global_empire_desc:0 "Notre engagement envers notre empire colonial a changé l'attitude des gens envers les postes dans l'administration coloniale. Ce n'est plus un lieu pour les flibustiers qui cherchent à maximiser leur fortune, mais plutôt une carrière pour les plus brillants et les meilleurs. Cela se reflète dans nos impôts."
 naval_ideas:0 "Idées navales"
 naval_ideas_bonus:0 "Marine accomplie"
 superior_seamanship:0 "Navigation supérieure"
 superior_seamanship_desc:0 "Nous permet de transformer notre flotte en une force navale suprême avec des vaisseaux de haute qualité et des capitaines et marins hautement qualifiés."
 naval_glory:0 "Gloire navale"
 naval_glory_desc:0 "La vue de notre marine glorieuse et prestigieuse fera trembler de peur tous nos adversaires."
 grand_navy:0 "Grande marine"
 grand_navy_desc:0 "Nous permet de créer l'une des flottes les plus grandes et les plus puissantes que le monde ait jamais vues."
 sea_hawks:0 "Faucons des mers"
 sea_hawks_desc:0 "Nous permet de nous concentrer intensément sur les avancées militaires et ainsi d'accroître notre tradition navale."
 excellent_shipwrights:0 "Excellents charpentiers navals"
 excellent_shipwrights_desc:0 "En rassemblant les meilleurs constructeurs de navires que notre nation peut offrir, nous sommes en mesure de nous construire une flotte de vaisseaux modernes inégalés en matière d'artisanat et de maniabilité."
 naval_fighting_instruction:0 "Instructions de combat naval"
 naval_fighting_instruction_desc:0 "Permet à nos vétérans de la marine de concevoir de nouvelles méthodes pour améliorer l'efficacité de notre flotte lors des blocus."
 press_gangs:0 "Presse maritime"
 press_gangs_desc:0 "La vie en mer est dure et impitoyable, et tout le monde n'est pas enthousiaste à l'idée d'une carrière dans la marine. En légalisant l'enrôlement forcé des hommes ayant des habitudes maritimes, il sera plus facile d'équiper nos navires, accélérant ainsi le processus de mise en service des bâtiments."
 quality_ideas:0 "Idées de qualité"
 quality_ideas_bonus:0 "Qualité accomplie"
 quality_education:0 "Éducation de qualité"
 quality_education_desc:0 "Le moment le plus vital de l'existence d'une armée est juste après une bataille. Victoire ou défaite, les troupes épuisées sont les plus vulnérables. Nous devons nous assurer que nos troupes soient prêtes au combat avant l'opposition."
 finest_of_horses:0 "Les plus beaux chevaux"
 finest_of_horses_desc:0 "Comme ces troupes prennent le terrain avec assurance ! Comme cette cavalerie forme admirablement ! Regardez ces chevaux gris ! Qui sont ces fins cavaliers ? Ce sont de belles troupes."
 oak_forests_for_ships:0 "Forêts de chênes pour les navires"
 oak_forests_for_ships_desc:0 "Plus nos navires peuvent encaisser de punitions, plus ils peuvent en infliger. Assurons-nous d'avoir un approvisionnement prêt du meilleur chêne séché pour nos navires de guerre."
 private_to_marshal:0 "Du simple soldat au maréchal"
 private_to_marshal_desc:0 "Chaque simple soldat a un bâton de maréchal dans son sac. Enfin, peut-être pas exactement, mais pour ceux qui se distinguent au combat, la promotion et les récompenses suivront. Les troupes le savent et en sont inspirées."
 naval_drill:0 "Exercice naval"
 naval_drill_desc:0 "La confusion du combat peut rendre un navire de guerre inapte au service pendant longtemps. Un équipage bien entraîné récupérera bien plus vite qu'un équipage ordinaire."
 merchant_marine:0 "Marine marchande"
 merchant_marine_desc:0 "Que chaque navire marchand arbore notre pavillon marchand avec fierté et sache que notre marine sera toujours là pour le protéger en cas de besoin."
 massed_battery:0 "Batterie massive"
 massed_battery_desc:0 "Rassemblons notre artillerie en une seule grande batterie ; sa puissance destructrice percera un trou dans les lignes ennemies."
 quantity_ideas:0 "Idées de quantité"
 quantity_ideas_bonus:0 "Quantité accomplie"
 benefits_for_horseowners:0 "Avantages pour les propriétaires de chevaux"
 benefits_for_horseowners_desc:0 "La vie est bon marché, mais les chevaux coûtent cher. Si nous mettons en place un système d'avantages pour ceux qui possèdent des chevaux, nous en aurons davantage parmi lesquels choisir."
 the_old_and_infirm:0 "Les vieux et les infirmes"
 the_old_and_infirm_desc:0 "Les sergents vétérans sont parmi les hommes les plus méprisables et les plus corrompus imaginables, mais ces hommes restent utiles. Plutôt que de les laisser devenir mendiants dans nos rues, des hommes comme ceux-ci devraient être utilisés quand leur service prend fin. Faisons-en des sergents instructeurs et des intendants pour que leurs compétences uniques puissent être mises à profit."
 the_young_can_serve:0 "Les jeunes peuvent servir"
 the_young_can_serve_desc:0 "Quel âge un garçon doit-il avoir avant d'être un homme ? Quel âge doit-il avoir avant de pouvoir mourir pour son pays ? Certains dirigeants sont délicats ; nous, en revanche, sommes un boucher équitable."
 enforced_service:0 "Service obligatoire"
 enforced_service_desc:0 "Le principe du volontariat sous-tend toute la structure de notre armée. Parfois, il n'y a pas assez de volontaires. Nous devrions forcer les gens à se porter volontaires."
 ships_penny:0 "Sou du navire"
 ships_penny_desc:0 "Les navires coûtent cher ; ce que nous devons faire, c'est amener d'autres personnes à contribuer à leur financement. Le sou du navire en est un parfait exemple."
 standardized_artillery:0 "Artillerie standardisée"
 standardized_artillery_desc:0 "Chaque fondeur de fer garde jalousement ses secrets et ses techniques et fabrique chaque canon comme une pièce d'art sur mesure. Bien que cela puisse être bon pour leur ego, ce n'est pas la meilleure façon de commander des canons. Désormais, nous insisterons pour que chaque canon soit fabriqué selon nos propres spécifications exactes, et ce sera aussi beaucoup moins cher."
 mass_army:0 "Levée en masse"
 mass_army_desc:0 "Nous avons été, jusqu'à présent, très sélectifs quant à qui devrait servir comme soldat du rang dans notre armée. Nous ne prenions que les plus pauvres et les plus désespérés, essentiellement les gens que personne d'autre ne regretterait. Maintenant cependant, nous allons ouvrir les rangs à tout le monde, sauf aux riches."
 reinforcement_drafts:0 "Récupération de notre équipement"
 reinforcement_drafts_desc:0 "La mort est le destin de tout soldat loyal, et aucun homme ne peut être ramené d'entre les morts. Cependant, l'équipement que ces corps laissent sur le champ de bataille peut encore nous être utile. En envoyant une unité récupérer les armes et les uniformes sur le champ de bataille, nous pouvons sauver ces objets et rendre l'équipement du prochain groupe de corps plus efficace."
 mercenary_contracts:0 "Contrats mercenaires"
 mercenary_contracts_desc:0 "En établissant des contrats permanents avec certains capitaines mercenaires, nous pouvons nous assurer d'avoir toujours accès à un large réservoir de mercenaires sur lequel puiser, si besoin était."
 expansion_ideas:0 "Idées d'expansion"
 expansion_ideas_bonus:0 "Expansion accomplie"
 additional_colonists:0 "Colons supplémentaires"
 additional_colonists_desc:0 "Le nouveau monde est bien des choses, mais la plus importante est qu'il est vide. Enfin, personne d'important n'y vit en tout cas. En informant les gens des opportunités illimitées que nous avons dans le nouveau monde, nous encouragerons davantage de personnes à partir s'y installer."
 additional_merchants:0 "Marchands supplémentaires"
 additional_merchants_desc:0 "Les colonies ne servent à rien si nous ne ramenons pas les marchandises vers la métropole. Nous devons développer notre classe marchande pour garantir que cela se produise."
 faster_colonists:0 "Colons plus rapides"
 faster_colonists_desc:0 "On ne peut pas simplement envoyer des colons et s'attendre à ce qu'ils bâtissent une colonie. Il y a un processus chronophage de préparation de l'expédition avec tous les articles dont ils auront besoin pour survivre dans leur nouveau foyer. En nous appuyant sur l'expérience passée, nous pouvons accélérer ce processus."
 additional_diplomats:0 "Diplomates supplémentaires"
 additional_diplomats_desc:0 "La volonté d'étendre notre pays signifie que nous devons également étendre notre portée diplomatique. Nous devons nous assurer que notre service diplomatique dispose d'un personnel adéquat."
 improved_shipyards:0 "Chantiers navals améliorés"
 improved_shipyards_desc:0 "Pour défendre nos intérêts à travers le monde, nous aurons besoin d'une flotte puissante. Nous devons nous assurer que nos chantiers navals peuvent produire des navires aussi rapidement que possible pour remplacer les pertes que nous pourrions subir."
 experienced_diplomats:0 "Diplomates expérimentés"
 experienced_diplomats_desc:0 "Parfois, il suffit simplement que les gens croient que nous sommes puissants. Nous avons travaillé dur sur notre service diplomatique pour que notre parole porte un poids supplémentaire."
 competetive_merchants:0 "Marchands compétitifs"
 competetive_merchants_desc:0 "Pour ramener le commerce chez nous, nous devons être capables de battre la concurrence des autres pays. Nous devons nous assurer que notre système juridique leur donne tous les avantages possibles."
 administrative_ideas:0 "Idées administratives"
 administrative_ideas_bonus:0 "Administration accomplie"
 organised_mercenary_payment:0 "Paiements mercenaires organisés"
 organised_mercenary_payment_desc:0 "Les capitaines mercenaires sont des gens rusés. Ils tenteront de mettre deux commandants de la même armée en concurrence pour leurs services. Nous rationaliserons notre processus de recrutement mercenaire pour prévenir les abus des commandants et nous assurer d'être toujours dans la meilleure position de négociation."
 benefits_for_mercenaries:0 "Avantages pour les mercenaires"
 benefits_for_mercenaries_desc:0 "Les mercenaires chercheront toujours la meilleure affaire, nous devons donc nous assurer qu'ils restent avec nous. En veillant à bien traiter nos compagnies mercenaires, elles resteront loyales plus longtemps et nécessiteront moins de compensation monétaire directe."
 organised_mercenary_recruitment:0 "Recrutement mercenaire"
 organised_mercenary_recruitment_desc:0 "L'argent n'est pas la seule limite au recrutement de mercenaires. L'autre goulot d'étranglement est d'avoir des compagnies mercenaires qui souhaitent réellement servir avec nous. Nous devons donc nous assurer que notre système permette à chaque compagnie de nous rejoindre."
 bookkeeping:0 "Comptabilité"
 bookkeeping_desc:0 "Parfois l'argent manque et nous devons emprunter. Les prêteurs s'inquiètent toujours de ne pas être remboursés. En tenant des registres méticuleux, nous pourrons nous assurer que tout le monde soit payé, ce qui nous permettra de négocier des taux d'intérêt plus bas."
 administrative_efficiency_idea:0 "Efficacité administrative"
 administrative_efficiency_idea_desc:0 "La partie la plus importante de tout gouvernement est d'obtenir les bons conseils. Nous devons nous assurer d'être aussi inclusifs que possible en matière de conseillers afin de maximiser le nombre de points de vue différents qui nous sont présentés."
 resilient_state:0 "État résilient"
 resilient_state_desc:0 "Chaque État connaît des périodes difficiles. C'est alors que les mécontents ou les exclus estiment qu'il est temps de se rebeller. Si nous bâtissons une administration résiliente face à ces troubles, nous pourrons nous remettre bien plus rapidement de ce triste état de choses."
 war_cabinet:0 "Cabinet de guerre"
 war_cabinet_desc:0 "La guerre est le moment où le pays est le plus vulnérable ; les tensions des conflits peuvent sérieusement compromettre la capacité à gouverner. En nous assurant que les acteurs clés soient impliqués en temps de guerre, nous pouvons éviter ces tensions."
 ENG_ideas:0 "Idées anglaises"
 ENG_ideas_start:0 "Traditions anglaises"
 ENG_ideas_bonus:0 "Ambition anglaise"
 royal_navy:0 "Une marine royale"
 royal_navy_desc:0 "À partir d'environ 1495, la monarchie Tudor investit massivement non seulement dans les navires, mais aussi dans l'infrastructure pour les soutenir. Pour beaucoup, ce fut la fondation officielle de la marine royale."
 eltham_ordinance:0 "Les ordonnances d'Eltham"
 eltham_ordinance_desc:0 "Bien qu'elles n'aient pas été adoptées en l'an 1526, elles représentèrent la première tentative de rationalisation de la bureaucratie royale d'Angleterre, pour la rendre plus réactive et plus économique."
 secretaries_of_state:0 "Secrétaires d'État"
 secretaries_of_state_desc:0 "Le roi a toujours eu un serviteur royal responsable de la correspondance royale. Au milieu du XVIIe siècle, leur nombre commença à augmenter et ils devinrent des rouages importants de la machine gouvernementale, non seulement transmettant les décrets royaux mais disposant d'une autonomie administrative."
 navigation_acts:0 "Les Actes de Navigation"
 navigation_acts_desc:0 "Ces actes représentaient l'apogée du mercantilisme. Notre commerce sera transporté sur nos navires et arrivera d'abord dans nos ports où nous pourrons le taxer."
 eng_red_coats:0 "Tuniques rouges"
 eng_red_coats_desc:0 "La vie dans l'armée anglaise est éreintante et strictement réglementée, mais elle inculque à un homme un certain caractère. Leur flegme imperturbable et leur expertise avec les armes à feu mettent la peur au cœur de nos ennemis."
 british_bill_of_rights:0 "Déclaration des droits anglaise"
 british_bill_of_rights_desc:1 "Une vaste série de réformes axées sur les limites du pouvoir royal, en particulier sur le pouvoir judiciaire. Le monarque ne peut pas lever des armées de manière unilatérale, prescrire des châtiments cruels et inhabituels, ou interférer avec l'élection libre des membres du Parlement."
 GBR_ideas:0 "Idées britanniques"
 GBR_ideas_start:0 "Traditions britanniques"
 GBR_ideas_bonus:0 "Ambition britannique"
 gbr_acts_of_union:0 "Les Actes d'Union"
 gbr_acts_of_union_desc:0 "Les Actes d'Union unissent constitutionnellement les nations d'Angleterre et d'Écosse en une seule. Depuis un Parlement national unique, la nation entière sera gouvernée selon le même ensemble de lois et d'ordonnances, avec une armée et une économie communes."
 the_british_parliament:0 "Parlement de Grande-Bretagne"
 the_british_parliament_desc:0 "Nous avons une longue histoire de parlementarisme dans notre pays, et avec la création du Parlement de Grande-Bretagne, il est naturel que nous poursuivions les traditions des parlements anglais et écossais."
 british_industrialization:0 "Industrialisation précoce"
 british_industrialization_desc:0 "Les progrès rapides de la technologie créent des possibilités jamais rêvées auparavant. Les gens affluent vers les villes pour travailler dans de nouvelles usines hautement efficaces équipées de machines modernes stupéfiantes. La Grande-Bretagne doit être au cœur de cette révolution industrielle, car toute nation qui échoue à se moderniser sera balayée par celles qui le font."
 gbr_the_royal_society:0 "La Société royale"
 gbr_the_royal_society_desc:0 "La Société royale rassemble les plus grands esprits scientifiques de la nation et les pousse vers des sommets encore plus élevés de compréhension dans les nombreux domaines de la philosophie naturelle. En tant qu'institution de classe mondiale, elle conduira la Grande-Bretagne vers une nouvelle ère de pensée et d'expérimentation."
 reform_of_comission_buying:0 "Réforme de l'achat des commissions"
 reform_of_comission_buying_desc:0 "Le grand vieux duc d'York, nommé chef de l'armée en 1795, institua une série de réformes profondes dans l'armée britannique. Il améliora le sort des simples soldats et, plus important encore, établit des conditions strictes pour l'achat des promotions. Désormais, les officiers devront servir un minimum de temps au grade précédent avant de pouvoir acheter le suivant. Cela conduira à des officiers qui auront effectivement une idée approximative de ce qu'ils font."
 sick_and_hurt_board:0 "Le Conseil des malades et blessés"
 sick_and_hurt_board_desc:0 "Fondé en 1707, son rôle était d'assurer le bien-être des simples marins enrôlés dans la marine. Il apporta une série de réformes qui améliorèrent la santé des marins en service."
 british_merchant_navy:1 "Établir la marine marchande britannique"
 british_merchant_navy_desc:0 "Étant une nation insulaire, nous serons toujours dépendants de la mer pour le commerce. Nous devons donc promouvoir la marine marchande pour assurer la prospérité de notre commerce."
 britanna_rules_the_waves:0 "Britannia règne sur les flots"
 britanna_rules_the_waves_desc:0 "Règne, Britannia !\nBritannia règne sur les flots.\nLes Britanniques ne seront jamais, jamais, jamais des esclaves."
 AVE_ideas:0 "Idées angevines"
 AVE_ideas_start:0 "Traditions angevines"
 AVE_ideas_bonus:0 "Ambition angevine"
 angevin_decentralized_rule:0 "Gouvernance décentralisée"
 angevin_decentralized_rule_desc:0 "À l'époque de la dynastie Plantagenêt, l'administration de l'Empire angevin était gérée par des gouverneurs locaux et des parents du roi. Bien que cette décentralisation soit en antithèse avec le pouvoir royal, elle assurait une gouvernance harmonieuse des provinces d'Angleterre et de France."
 english_common_law:0 "Common law anglaise"
 english_common_law_desc:1 "Les territoires d'Angleterre sont gouvernés par des comtés et leurs shérifs respectifs. En imposant une loi commune à tous les résidents locaux, le processus de taxation ne présente guère de difficultés."
 lessons_of_the_anglo_french_wars:0 "Leçons des guerres anglo-françaises"
 lessons_of_the_anglo_french_wars_desc:0 "Même aux beaux jours du règne Plantagenêt, notre État a toujours été en conflit armé avec le royaume de France. Les leçons de toutes ces batailles ainsi que celles de la guerre de Cent Ans façonnent la discipline et la volonté de notre armée jusqu'à ce jour."
 the_many_thrones:0 "Les nombreux trônes des Plantagenêt"
 the_many_thrones_desc:0 "La dynastie Plantagenêt a détenu de nombreux trônes au fil des décennies. Le royaume d'Angleterre, seigneur d'Irlande, duc d'Aquitaine, de Normandie, de Bretagne et bien d'autres.\nLa dynastie a assuré un grand nombre d'héritiers afin de sécuriser et de maintenir les nombreux trônes. Nous suivrons leur exemple."
 reformed_angevin_infantry:0 "Infanterie angevine réformée"
 reformed_angevin_infantry_desc:0 "Durant la guerre de Cent Ans, notre royaume a utilisé l'archer anglais au long arc à son plein potentiel. Cependant, il y a toujours place à l'amélioration. Avec la formation de l'Union anglo-française, nous affinerons leurs techniques et les enseignerons à nos sujets français."
 seneschal_of_france:0 "Le sénéchal de France"
 seneschal_of_france_desc:0 "Le sénéchal est une position élevée occupée par un membre de la cour nommé par le roi. À l'époque des Plantagenêt, les territoires de France étaient gouvernés par les membres de la cour Plantagenêt."
 rule_of_the_plantagenet:0 "Règne des Plantagenêt"
 rule_of_the_plantagenet_desc:0 "Le royaume angevin est le résultat de la longue et fière lignée des Plantagenêt. La gloire de cette ancienne maison servira d'exemple aux dynasties à venir."
 EIC_ideas:0 "Idées de la Compagnie des Indes orientales"
 EIC_ideas_start:0 "Traditions de la Compagnie des Indes orientales"
 EIC_ideas_bonus:0 "Ambition de la Compagnie des Indes orientales"
 eic_governors_general:0 "Gouverneurs généraux des Indes"
 eic_governors_general_desc:0 "Le gouvernement de la Compagnie des Indes orientales est exercé par le gouverneur général, qui dirige les opérations de la compagnie sur le terrain."
 eic_indian_trade:0 "Commerce indien"
 eic_indian_trade_desc:0 "Le sous-continent indien regorge de plantations de marchandises très précieuses, telles que le thé ou l'opium, qui génèrent d'énormes profits pour la Compagnie."
 eic_chartered_merchants:0 "Marchands agréés"
 eic_chartered_merchants_desc:0 "La Compagnie a été fondée pour agréer tout marchand commerçant avec l'Inde, et tout marchand sans licence de la compagnie est passible de saisie de son navire et de sa cargaison."
 eic_presidency_armies:0 "Armées des présidences"
 eic_presidency_armies_desc:0 "Les présidences sont les divisions administratives de la Compagnie en Inde, et chacune dispose d'une armée dépendante, composée principalement de cipayes indiens avec quelques réguliers britanniques."
 eic_intercontinental_trade:0 "Commerce intercontinental"
 eic_intercontinental_trade_desc:0 "L'établissement de routes commerciales intercontinentales entre l'Extrême-Orient, l'Inde, l'Afrique et la Grande-Bretagne est l'activité principale de la Compagnie, qui génère d'importants revenus grâce à cette activité."
 eic_colonial_monopoly:0 "Monopole colonial"
 eic_colonial_monopoly_desc:0 "L'activité de la Compagnie en Inde crée les conditions d'un monopole naturel, résultant de l'agrément des affaires aux marchands et de l'extraction de rentes énormes avec des coûts d'exploitation très faibles."
 eic_colonial_exploitation:0 "Exploitation coloniale"
 eic_colonial_exploitation_desc:0 "La combinaison de capitaux d'investissement importants avec une main-d'œuvre à faible coût détermine l'expansion naturelle des plantations orientées vers l'exportation de marchandises comme moyen d'accroître encore la richesse de la Compagnie des Indes orientales."
 SWE_ideas:0 "Idées suédoises"
 SWE_ideas_start:0 "Traditions suédoises"
 SWE_ideas_bonus:0 "Ambition suédoise"
 kung_och_riksdag:0 "Kung och Riksdag"
 kung_och_riksdag_desc:0 "Les rois suédois dépendaient souvent de la coopération avec les États, en particulier avec la grande classe paysanne pour contrebalancer la noblesse. Sous le règne de Gustave Adolphe, cependant, un compromis historique fut conclu avec la noblesse, qui s'engagea à mettre loyalement ses ressources à la disposition de la nation en échange de nouveaux privilèges."
 swedish_steel:0 "Acier suédois"
 swedish_steel_desc:0 "Tandis que d'autres armées tirent des salves imprécises sur leurs ennemis, nous marcherons vers eux en rangs disciplinés, délivrerons une seule salve à bout portant, puis leur offrirons l'acier froid."
 hakkapelitta:0 "Les « Hakkapeliitta »"
 hakkapelitta_desc:0 "La Finlande est un endroit plutôt pauvre et arriéré, et le service dans l'armée suédoise offre aux gens d'excellentes opportunités d'avancement financier par le pillage. Une bonne équitation et des chevaux de haute qualité nous permettent de lever une cavalerie excellente et redoutée qui, selon nos ennemis, est invulnérable grâce à la sorcellerie."
 indelningsverket:0 "Indelningsverket"
 indelningsverket_desc:0 "Le système d'allocation suédois consistait en la division de la paysannerie en groupes de dix à des fins de recrutement. Ce système facilitait la recherche de personnes pour servir dans l'armée et leur organisation en unités."
 swedish_absolutism:0 "Absolutisme suédois"
 swedish_absolutism_desc:0 "L'absolutisme est la théorie selon laquelle un seul homme doit être aux commandes ; cet homme est le roi et il doit avoir la capacité de diriger le gouvernement sans être entravé par le conseil privé."
 produktplakatet:0 "Produktplakatet"
 produktplakatet_desc:0 "Le décret interdisait aux navires étrangers arrivant en Suède d'apporter des marchandises de pays autres que le leur ou de leurs colonies."
 union_and_security_act:0 "Acte d'union et de sécurité"
 union_and_security_act_desc:0 "L'Acte donna au roi le pouvoir exclusif de déclarer la guerre et la paix, abolit la plupart des privilèges nobles, et donna au roi le droit de déterminer le nombre de conseillers privés, lui permettant de l'abolir entièrement en fixant leur nombre à zéro."
 MOS_ideas:0 "Idées moscovites"
 MOS_ideas_start:0 "Traditions moscovites"
 MOS_ideas_bonus:0 "Ambition moscovite"
 gatherers_of_tribute:0 "Collecteurs de tribut"
 gatherers_of_tribute_desc:1 "Le joug tatar fut pendant longtemps une entrave sévère à la société russe, mais la Moscovie prospéra néanmoins car notre État avait le droit de collecter le tribut pour le Khan. Encore aujourd'hui, nous jouissons des avantages de l'organisation que nous avons bâtie pour remplir cette fonction."
 legacy_of_dmitriy_donskoi:0 "Héritage de Dimitri Donskoï"
 legacy_of_dmitriy_donskoi_desc:0 "Après des siècles à souffrir le joug tatar, Dimitri du Don fut capable de vaincre solidement les forces de la Horde d'Or. Nous devons chérir sa mémoire et ne plus jamais accepter de souffrir en silence."
 pomestnoe_voisko:0 "Pomestnoe Voisko"
 pomestnoe_voisko_desc:1 "En redistribuant des parcelles de terres confisquées à des cavaliers nobles, nous pouvons bâtir une nouvelle classe de soldats pour soutenir notre principauté."
 zasechnaya_cherta:0 "Zasetchnaïa Tcherta"
 zasechnaya_cherta_desc:0 "Afin de résister aux raids tatars, nos ancêtres ont toujours maintenu une ligne de forts étroitement positionnés et bien défendus. À mesure que notre État s'étend, nous devons continuer à étendre cette « ligne d'abattis » pour nous assurer de toujours pouvoir protéger notre peuple contre les attaques lointaines."
 descendants_of_byzantine_emperors:0 "Descendants des empereurs byzantins"
 descendants_of_byzantine_emperors_desc:0 "Nous sommes unis aux empereurs byzantins d'antan par des mariages et des alliances. Cela fait de nous les descendants d'une ancienne lignée impériale d'une grande influence et habileté, et favorisera nos ambitions politiques."
 seat_of_metropolitan_bishop:0 "Siège de l'évêque métropolitain"
 seat_of_metropolitan_bishop_desc:0 "Le peuple russe a besoin d'une ferme guidance religieuse. Nous avons historiquement eu une bonne coopération avec l'Église, et c'est une amitié dont nous pourrions tous deux bénéficier en l'élargissant. Si nous pouvons faire déplacer le siège de l'évêque métropolitain à Moscou, nous pourrons renforcer davantage les liens entre la foi orthodoxe russe et notre État."
 strength_of_the_boyars:0 "Force des boyards"
 strength_of_the_boyars_desc:0 "La classe des boyards est à bien des égards le fondement de l'entreprise impériale russe, mais tout comme nous devons renforcer les boyards, nous devons les contrôler. Nous devons à la fois protéger les sièges des boyards à la Douma et nous assurer qu'ils aient besoin de compter sur nous pour accroître leur influence."
 RUS_ideas:1 "Idées russes"
 RUS_ideas_start:1 "Traditions russes"
 RUS_ideas_bonus:1 "Ambition russe"
 land_of_the_rus:0 "Terre des Rus"
 land_of_the_rus_desc:0 "Après tout, toute terre appartient à la Mère patrie."
 life_long_conscription:0 "Conscription à vie"
 life_long_conscription_desc:0 "Afin de nourrir nos armées toujours croissantes, nous devons étendre les termes du service militaire pour qu'il devienne un engagement à vie. Cela offrira une mobilité sociale à ceux qui mèneraient autrement des vies dans des occupations moindres, et nous fournira une source fiable de soldats pour nos entreprises impériales."
 russian_artillery_yard:0 "Parc d'artillerie russe"
 russian_artillery_yard_desc:1 "Une puissance de feu supérieure est ce qui détermine les sièges d'aujourd'hui ainsi que les batailles rangées de demain. Nous devons construire un parc d'artillerie de pointe au cœur de notre pays, pour nous assurer que nos armées ne manquent jamais de canons ni de munitions."
 sudebnik:0 "Sudebnik"
 sudebnik_desc:0 "À la fin du XVe siècle, la décision fut prise de régulariser le code de lois qui avait été à l'origine une coutume avec de grandes variations régionales. En rationalisant le code et en augmentant le nombre d'infractions pour lesquelles nous pouvons infliger des amendes, nous améliorons l'administration et les revenus."
 the_streltsy:0 "Fonder les Streltsy"
 the_streltsy_desc:0 "Afin de nous assurer d'avoir une armée capable de défendre notre royaume, nous devons créer une armée permanente de troupes armées de mousquets pour compléter nos levées."
 opprichnina:0 "Opritchnina"
 opprichnina_desc:0 "La noblesse héréditaire est la plus grande menace pour notre contrôle de l'État. Nous devons briser leur pouvoir en réduisant la taille de leurs domaines et en donnant ces terres à des personnes qui nous sont d'abord loyales."
 abolish_the_mestnichestvo:0 "Abolir le Mestnitchestvo"
 abolish_the_mestnichestvo_desc:0 "Le Mestnitchestvo était un ancien système qui stipulait que les postes d'État devaient être offerts aux personnes en fonction de l'ancienneté de leur lignée. C'était problématique car cela ne prenait pas en compte l'aptitude du candidat. L'abolition de ce système améliorera la bureaucratie d'État en permettant les nominations au mérite."
 siberian_frontier:0 "Frontière coloniale"
 siberian_frontier_desc:0 "Les étendues lointaines de Sibérie nous appellent. Nous devons y ouvrir un chemin et laisser nos cosaques partir conquérir des terres pour le peuple russe."
 table_of_ranks:0 "La Table des rangs"
 table_of_ranks_desc:0 "L'abolition du Mestnitchestvo fut le premier pas pour rendre la bureaucratie d'État plus méritocratique. La Table des rangs codifia cela et rendit le service et la promotion dans l'armée conditionnels au service dans les grades inférieurs."
 curriculum_of_the_cadet_corps:0 "Élargir le programme du corps des cadets"
 curriculum_of_the_cadet_corps_desc:0 "Nous avons plus de cadets qu'il n'y a de postes d'officiers dans notre armée ; nous devrions utiliser le corps des cadets pour créer non seulement des officiers potentiels, mais aussi des scientifiques et des ingénieurs."
 SPA_ideas:0 "Idées espagnoles"
 SPA_ideas_start:0 "Traditions espagnoles"
 SPA_ideas_bonus:0 "Ambition espagnole"
 the_reconquista:0 "La Reconquista"
 the_reconquista_desc:0 "Pendant de longues années, nous avons mené la guerre contre le Maure. Cela nous a donné une discipline solide dont peu peuvent se vanter. Levez-vous, hommes de Castille, et montrez au monde votre détermination."
 spanish_inquisition:0 "L'Inquisition espagnole"
 spanish_inquisition_desc:0 "Personne ne s'y attendait."
 devout_catholisism:0 "Piété ravélienne"
 devout_catholisism_desc:0 "Notre foi est notre épée et notre bouclier. C'est seulement par la grâce de Dieu que nos triomphes dans la Reconquista nous ont été accordés. Nous devons toujours montrer notre dévotion à la sainte mère Église."
 inter_caetera:0 "Inter Caetera"
 inter_caetera_desc:0 "Le 4 mai 1493, Sa Sainteté nous accorda une bulle papale nous octroyant toutes les terres à l'ouest et au sud d'une ligne située à 100 lieues à l'ouest des îles des Açores. Nous appliquerons naturellement la volonté de Sa Sainteté."
 gold_fleet:0 "Flotte au trésor"
 gold_fleet_desc:0 "La richesse de notre empire attire tous les pirates et chacals existants. Nous mettrons en place un système de convois pour ramener les richesses chez nous et les protéger."
 spanish_armada:0 "Une armada espagnole"
 spanish_armada_desc:0 "La puissance de l'Espagne réside autant dans sa flotte que dans ses tercios redoutés. Nous veillerons à ce que notre marine ne manque de rien, de sorte que si jamais nous devions le faire, nous puissions envoyer une puissante armada."
 siglo_de_oro:0 "Siglo de Oro"
 siglo_de_oro_desc:0 "Un âge d'or s'ouvre pour l'Espagne, en peinture, architecture, musique et littérature. L'Espagne fait l'envie du monde. Cela laissera un héritage qui résonnera à travers le temps. Bien que je n'aime pas le livre sur l'homme qui combat les moulins à vent, je ne vois vraiment pas celui-là être lu par les générations futures."
 NED_ideas:0 "Idées néerlandaises"
 NED_ideas_start:0 "Traditions néerlandaises"
 NED_ideas_bonus:0 "Ambition néerlandaise"
 amsterdam_wisselbank:0 "Fonder la Wisselbank d'Amsterdam"
 amsterdam_wisselbank_desc:0 "Le problème avec la monnaie métallique était qu'il était virtuellement impossible de fabriquer des pièces de poids égal dans tous les ateliers monétaires. Cela rend le transfert de richesse, le sang vital du commerce, difficile. La Wisselbank échangeait la monnaie métallique contre du papier-monnaie d'Amsterdam qui devait être utilisé dans la ville pour les traites de plus de 600 florins. Cela créa un moyen d'échange dont tout le monde pouvait être confiant dans la valeur, facilitant les échanges."
 dutch_trading_spirit:0 "Esprit commercial néerlandais"
 dutch_trading_spirit_desc:0 "Chercher fortune outre-mer est aussi naturel pour un Néerlandais que brûler une sorcière l'est pour un Espagnol. Nous ne manquons pas d'âmes hardies prêtes à chercher fortune dans le commerce."
 polders:0 "Polders"
 polders_desc:0 "Les Pays-Bas sont très susceptibles aux inondations et, dans le temps agité du XIe au XIVe siècle, il y eut de multiples inondations menant à la création du Zuiderzee et salinisant également le sol des zones côtières. Nous avons maintenant la technologie pour récupérer des terres, permettant une agriculture plus productive."
 instructie_voor_de_admiraliteiten:0 "Instructie voor de Admiraliteiten"
 instructie_voor_de_admiraliteiten_desc:0 "« Ce jour commence une longue liste de victoires navales, qui rendront notre patrie à jamais illustre. »"
 revenue_stamps:0 "Timbres fiscaux"
 revenue_stamps_desc:0 "La taxation indirecte est le moyen le plus efficace de lever des impôts à cette époque. Les timbres fiscaux étaient des timbres apposés sur les documents juridiques (par exemple un contrat de vente) pour vérifier que l'impôt avait été payé. De tels documents n'auraient pas de valeur juridique sans lesdits timbres."
 embrace_humanism:0 "Embrasser l'humanisme"
 embrace_humanism_desc:1 "Depuis le grand philosophe Érasme, les Pays-Bas ont été le berceau de la philosophie humaniste. Il est temps d'embrasser cela comme partie intégrante de l'État."
 army_sappers:0 "Sapeurs de l'armée"
 army_sappers_desc:0 "Au bon vieux temps, les travaux de siège étaient creusés par des locaux réquisitionnés ; ces personnes n'étaient pas toujours enthousiastes à l'idée de faire ce travail. En faisant du creusement de telles tranchées le travail de l'armée, nous obtenons de meilleures tranchées, plus rapidement."
 platoon_fire:0 "Tir de peloton"
 platoon_fire_desc:0 "Le tir de salve standard impliquait que chaque rang délivre sa salve en une seule fois, dans le but de maximiser la puissance de feu. Les Néerlandais développèrent un système différent de tir par peloton, l'objectif étant qu'une partie du régiment tire toujours sur l'ennemi. Cela empêchait l'ennemi de se remettre des salves."
 DAN_ideas:0 "Idées danoises"
 DAN_ideas_start:0 "Traditions danoises"
 DAN_ideas_bonus:0 "Ambition danoise"
 dan_kalmar_union:0 "L'Union de Kalmar"
 dan_kalmar_union_desc:0 "En 1397, il fut décidé que les trois couronnes du Danemark, de Norvège et de Suède seraient détenues par un seul monarque. Depuis lors, elle a toujours été gouvernée par le monarque du Danemark. Il est de notre devoir de maintenir et de défendre cette union."
 dan_sound_dues:0 "Péages du Sund"
 dan_sound_dues_desc:0 "Établi en 1429, notre contrôle sur le passage entrant et sortant de la mer Baltique nous a permis d'exiger des péages élevés des navires étrangers traversant nos eaux. Ces péages du Sund représentent une grande partie de l'économie de notre pays."
 dan_the_kings_sea:0 "La mer du Roi"
 dan_the_kings_sea_desc:0 "Notre monarque ne règne pas seulement sur la terre, mais aussi sur une grande partie de la mer. Nous devons nous assurer d'avoir une marine suffisante pour défendre le territoire de Sa Majesté !"
 dan_royal_mercenaries:0 "Mercenaires royaux"
 dan_royal_mercenaries_desc:0 "Le cœur de notre armée est composé de mercenaires allemands bien entraînés. Nous devons nous assurer qu'ils soient bien équipés en leur fournissant des armes et des armures de l'arsenal royal."
 dan_naval_heroes:0 "Héros navals"
 dan_naval_heroes_desc:0 "Le roi Christian se tenait au pied du grand mât dans la brume et la fumée ;\nSon épée frappait si vite,\nÀ travers heaume et cervelle gothiques elle passait ;\nPuis chaque coque et mât hostiles sombrèrent,\nDans la brume et la fumée."
 dan_colonial_ventures:0 "Entreprises coloniales"
 dan_colonial_ventures_desc:0 "Du Groenland à l'Afrique, des Caraïbes à l'Inde, nous devons rejoindre la course aux colonies et nous garantir une place au soleil !"
 dan_danish_absolutism_idea:0 "Absolutisme danois"
 dan_danish_absolutism_idea_desc:0 "Il est devenu clair que les nobles de notre royaume sont incapables de remplir leurs devoirs. Notre monarque doit prendre le plein contrôle lui-même pour garantir la sécurité de notre royaume."
 vornedskab:0 "Vornedskab"
 vornedskab_desc:0 "Après la peste noire, nous fûmes contraints de prendre des mesures désespérées pour maintenir la noblesse danoise, et par extension le Danemark, en bonne forme. Ces lois, qui empêchent les paysans de quitter les domaines, ont la conséquence pratique de faciliter la recherche de recrues pour notre armée."
 old_naval_traditions:0 "Anciennes traditions navales"
 old_naval_traditions_desc:0 "Depuis bien avant l'époque de héros tels qu'Ivar le Désossé et Sven à la Barbe fourchue, les Danois ont toujours pris la mer. Cette affinité naturelle est une force qui peut être exploitée."
 rentekammer:0 "Fonder le Rentekammer"
 rentekammer_desc:0 "Le Rentekammer, ou Trésor, était un département spécialisé de l'État créé pour tenir les registres des transactions gouvernementales. Il prit également en charge la tâche d'estimer les revenus et dépenses futurs du gouvernement. Cela permit un meilleur contrôle des revenus gouvernementaux."
 klaedekammer:0 "Réorganiser le Klaedekammer"
 klaedekammer_desc:0 "À l'origine, il ne s'agissait que de la chambre aux étoffes du château de Copenhague, mais elle devint la partie de la machine administrative responsable du paiement des salaires, en particulier pour la flotte."
 expanded_dockyards:0 "Fonder le chantier naval de Copenhague"
 expanded_dockyards_desc:0 "La construction navale se pratiquait dans la région depuis des temps immémoriaux, mais ces efforts étaient saisonniers et ponctuels, basés sur la demande de navires et les sources de bois locales. Maintenant, nous allons réserver un terrain spécifique pour un chantier naval spécialisé et son administration."
 den_danske_lov:0 "Den Danske Lov"
 den_danske_lov_desc:0 "Il a fallu plusieurs décennies pour y parvenir, mais nous avons réussi à compiler un code de lois formel. Notre plus gros problème était que nous avions auparavant diverses lois locales et nationales qui non seulement se chevauchaient mais pouvaient être assez contradictoires. Maintenant, nous avons un système de justice unifié."
 religious_orthodoxy:0 "La liberté religieuse est l'athéisme"
 religious_orthodoxy_desc:0 "Les gens insensés qui prétendent au manteau des Lumières ne réalisent pas que la vraie illumination ne peut venir que de la Bible. Nous les empêcherons d'accéder au pouvoir et veillerons à ce que le Danemark reste libre."
 nordic_rulers_legacy:0 "Héritage des souverains nordiques"
 nordic_rulers_legacy_desc:0 "Le Danemark est depuis des siècles le dirigeant naturel du Nord. Nos puissants rois tirent leur lignée jusqu'à Knut le Grand et nos conquêtes à l'étranger sont connues de tous !"
 FRA_ideas:0 "Idées françaises"
 FRA_ideas_start:0 "Traditions françaises"
 FRA_ideas_bonus:0 "Ambition française"
 fra_taille:0 "La Taille"
 fra_taille_desc:0 "La Taille était un impôt foncier en France imposé sous l'Ancien Régime (période prérévolutionnaire). Il était prélevé sur la paysannerie française et était l'une des principales sources de revenus de la monarchie française. Le montant de l'impôt était basé sur la valeur de la terre, et était souvent mal vu par la paysannerie, qui estimait être injustement taxée. La Taille fut l'un des facteurs qui contribuèrent au déclenchement de la Révolution française en 1789, car la colère du peuple français contre le système fiscal alimenta la ferveur révolutionnaire."
 estates_general:0 "États généraux"
 estates_general_desc:0 "Les États généraux peuvent prétendre exister depuis 1303, mais progressivement au fil du temps, ils sont passés d'un conseil convoqué par le roi à une assemblée élue. Cela a donné aux États généraux, et aux impôts levés par eux, une plus grande légitimité."
 elan:0 "Élan !"
 elan_desc:0 "Cultiver la doctrine de l'attaque est la pièce maîtresse de l'armée. Nos hommes montrent un tel élan que nous avons un net avantage sur le champ de bataille."
 french_language_in_all_courts:0 "La langue française dans toutes les cours"
 french_language_in_all_courts_desc:0 "Pendant longtemps, le latin a été la lingua franca de Cannor, mais pour être honnête, c'est une langue morte. Nous devons trouver une nouvelle lingua franca, et rien ne dit lingua franca comme le français."
 native_trading_principles:0 "Principes de commerce avec les indigènes"
 native_trading_principles_desc:0 "La plupart des nations voient les indigènes comme de pauvres malheureux qui n'utilisent pas correctement la création de Dieu et devraient être déplacés. Nous les voyons comme de pauvres malheureux qui n'utilisent pas correctement la création de Dieu mais qui pourraient un jour rêver d'être Français. Cette distinction est importante."
 vauban_fortifications:0 "Fortifications de Vauban"
 vauban_fortifications_desc:0 "Ceci ne représente pas un changement radical dans la conception des fortifications ; le génie réside dans le placement des forteresses. En tirant le maximum parti des caractéristiques du terrain local, le même fort peut être bien plus difficile à prendre."
 the_philosophes:0 "Les philosophes"
 the_philosophes_desc:0 "En ces temps éclairés, nous pouvons nous vanter de certains des plus grands philosophes de notre époque. Ces penseurs produisent un flux constant de nouvelles idées et réflexions. Ces idées stimulent les progrès dans tous les domaines, des plus banals aux plus importants."
 liberty_egalite_fraternity:0 "Liberté, Égalité, Fraternité"
 liberty_egalite_fraternity_desc:0 "Tous les hommes étant égaux devant la loi de votre nouvel État, les personnes d'autres religions sont autorisées à participer pleinement à la machine d'État, ce qui donne un coup de pouce à ces provinces."
 TUR_ideas:0 "Idées ottomanes"
 TUR_ideas_start:0 "Traditions ottomanes"
 TUR_ideas_bonus:0 "Ambition ottomane"
 ghazi:0 "Ghazi"
 ghazi_desc:2 "Nos sultans soulignent leur rôle de ghazis, chefs de guerre contre les non-croyants. Les guerriers affluent donc sous notre bannière, cherchant à gagner richesse, gloire et salut dans le combat pour étendre la Demeure de l'Islam."
 timariot_system:0 "Système du Timar"
 timariot_system_desc:1 "L'Empire ottoman a développé un système de tenure féodale pour constituer et maintenir une force de cavalerie. Chaque Timariot était responsable de fournir de la cavalerie pour l'armée impériale en fonction de la quantité de terre qu'il détenait."
 autonmous_pashas:0 "Pachas autonomes"
 autonmous_pashas_desc:0 "Équilibrer les besoins locaux par rapport aux intérêts nationaux est la partie la plus difficile du gouvernement. Surtout avec la vitesse des communications, il peut falloir longtemps pour que les directives les plus basiques atteignent même des provinces relativement proches. Nous devons encourager les gouverneurs locaux vers plus d'autonomie pour nous assurer que les intérêts locaux soient servis."
 millets:1 "Kanunnames"
 millets_desc:1 "En établissant des codes de lois uniques dans chacune des provinces de notre empire, nous pouvons nous assurer que notre règne sera perçu comme équitable et juste. Ces livres de lois, connus sous le nom de Kanunname, prendront en considération les circonstances et traditions locales de chacune de nos provinces diverses et lointaines."
 lawcode_of_suleiman:0 "Le code de lois de Soliman"
 lawcode_of_suleiman_desc:0 "Les réformes juridiques de grande envergure de Soliman le Magnifique lui valurent d'être remémoré comme Soliman le Législateur dans l'histoire turque. Dans son code juridique, il couvrait tous les aspects du droit, y compris la fiscalité, l'éducation et la société."
 lawcode_of_suleiman_01:0 "Le code de lois de Soliman"
 lawcode_of_suleiman_01_desc:1 "Soliman est remémoré comme l'un des grands souverains de l'histoire : un soldat, un législateur et un réformateur. En fait, alors que l'Occident le connaît comme Soliman le Magnifique, dans sa patrie on l'appelle « le Législateur ». Au cœur de ses réformes se trouvait le réexamen du droit dynastique ottoman, le « Kanun », afin de le mettre en conformité avec la charia islamique."
 tulip_period:0 "Ère des tulipes"
 tulip_period_desc:0 "Symbolisée par la tulipe, la période (1718-1730) représenta une ère de réformes qui vit la première presse typographique en langue turque et une série de réformes pour stimuler l'industrie et le commerce."
 imperial_school_of_naval_engineering:0 "Fonder l'École impériale de génie naval"
 imperial_school_of_naval_engineering_desc:0 "Fondée en 1773, son objectif était de fournir à l'Empire ottoman une flotte plus avancée pour défendre les côtes."
 VEN_ideas:0 "Idées vénitiennes"
 VEN_ideas_start:0 "Traditions vénitiennes"
 VEN_ideas_bonus:0 "Ambition vénitienne"
 venetian_arsenal:0 "Arsenal de Venise"
 venetian_arsenal_desc:0 "Datant du XIIe siècle, l'Arsenal de Venise est le fondement sur lequel repose notre puissance. Pour nous assurer de rester puissants, nous devons étendre l'arsenal afin que davantage de navires puissent être produits."
 printing_industry:0 "Industrie de l'imprimerie"
 printing_industry_desc:0 "Depuis l'invention de la presse à imprimer, les habitants de Venise ont montré une aptitude à son utilisation. Nous devons encourager cette industrie car les bénéfices pour Venise sont manifestes."
 stato_da_mar:0 "Stato da Màr"
 stato_da_mar_desc:0 "Le commerce est le sang vital de Venise et la gestion de nos comptoirs commerciaux d'outre-mer est vitale pour nos intérêts commerciaux. En centralisant l'administration de ces terres en une seule unité, nous renforcerons notre commerce."
 state_inquisition:0 "Fonder l'Inquisition d'État"
 state_inquisition_desc:0 "L'Inquisition d'État est un panel de trois juges établi pour traiter les menaces à la sécurité intérieure. La petite taille du panel signifie qu'ils peuvent traiter rapidement les menaces et il ne leur faudra pas longtemps pour établir un réseau d'agents tant au pays qu'à l'étranger pour démasquer les traîtres."
 conscription:0 "Conscription navale"
 conscription_desc:0 "Aussi longtemps que Venise a existé, nos rameurs de galères ont été des hommes libres travaillant pour un salaire, mais une pénurie aiguë de main-d'œuvre rend plus difficile de trouver des hommes qualifiés pour faire le travail. Nous n'avons d'autre choix que de recourir à la conscription pour nos galères."
 defend_the_law:0 "Défendre la loi"
 defend_the_law_desc:0 "Il est venu à notre attention que certains membres du clergé se sont rendus coupables de délits mineurs. Nous allons défier les autorités ecclésiastiques et nous assurer que tous les citoyens soient égaux devant la loi."
 provveditori_ai_beni_inculti:0 "Fonder les Provveditori ai beni inculti"
 provveditori_ai_beni_inculti_desc:0 "Le département des ressources naturelles non cultivées fut créé pour aider au drainage des marécages et à l'irrigation des terres sèches. L'objectif est d'améliorer l'approvisionnement alimentaire de Venise."
 PRU_ideas:0 "Idées prussiennes"
 PRU_ideas_start:0 "Traditions prussiennes"
 PRU_ideas_bonus:0 "Ambition prussienne"
 kammergericht:0 "Fonder le Kammergericht"
 kammergericht_desc:0 "Afin de régulariser le contrôle de la Marche de Brandebourg, les premiers Hohenzollern remplacèrent la common law locale par le droit romain. Ils régulèrent davantage la justice en déplaçant la Cour suprême de la cour de l'Électeur (qui avait tendance à se déplacer) vers un emplacement fixe et central. Cela améliora simultanément la justice et réduisit le pouvoir des magnats locaux."
 divided_estates:0 "Diviser les États"
 divided_estates_desc:0 "Unis, les trois États forment un bloc efficace contre le pouvoir royal. Nous devons systématiquement opposer la noblesse aux autres États pour consolider notre contrôle."
 army_professionalism:0 "Professionnalisme de l'armée"
 army_professionalism_desc:0 "Remontant jusqu'à l'invasion perse de la Grèce, une armée disciplinée plus petite pouvait vaincre une plus grande si elle était mieux disciplinée et entraînée. Nous devons élever notre armée aux mêmes standards si nous voulons prospérer."
 noble_cadets:0 "Cadets nobles"
 noble_cadets_desc:0 "Bien que la noblesse résiste à cela, nous cherchons à faire de l'armée la carrière de choix des cadets de la noblesse. Nous commençons à les entraîner dès leur jeune âge, ce qui signifie que non seulement nous lions la noblesse à nous, mais nous créons aussi un corps d'officiers nobles formés pour l'avenir."
 goose_step:0 "Le pas de l'oie"
 goose_step_desc:0 "Bien qu'il paraisse plutôt étrange, le pas de l'oie a été spécifiquement développé pour s'assurer que nos hommes maintiennent leur ligne en avançant vers l'ennemi. Cela donne à nos armées un véritable avantage sur le champ de bataille."
 regimental_cantons:0 "Cantons régimentaires"
 regimental_cantons_desc:0 "Les paysans ne sont naturellement pas enthousiastes à l'idée d'une vie de service dans l'armée, ils ont donc tendance à fuir quand les recruteurs arrivent. Maintenant, nous donnons à chaque régiment un district de recrutement d'où tirer la main-d'œuvre. Chaque jeune est censé s'entraîner trois mois par an pour être prêt au service. Cela devrait assurer un approvisionnement plus régulier en effectifs pour les armées."
 religious_toleration:0 "Tolérance religieuse"
 religious_toleration_desc:1 "La stabilité intérieure est la clé de notre succès. Si nous souhaitons nous étendre en encourageant la tolérance des différentes religions, non seulement nous améliorons la stabilité intérieure, mais notre royaume deviendra un refuge pour ceux qui fuient la persécution ailleurs."
 POR_ideas:0 "Idées portugaises"
 POR_ideas_start:0 "Traditions portugaises"
 POR_ideas_bonus:0 "Ambition portugaise"
 afonsine_ordinances:0 "Ordonnances alphonsines"
 afonsine_ordinances_desc:0 "La croissance des privilèges aristocratiques est une menace pour l'autorité de la couronne. Nous allons empêcher cette croissance en faisant administrer la justice par des personnes nommées par la couronne plutôt que par la noblesse. Cela garantira que les intérêts de la couronne soient mis en premier."
 legacy_of_the_navigator:0 "Héritage du Navigateur"
 legacy_of_the_navigator_desc:1 "Henri le Navigateur était le troisième fils de Jean Ier du Portugal. Sachant qu'il ne serait jamais roi, il consacra sa vie à promouvoir l'exploration et l'art maritime, finançant des expéditions, rassemblant des connaissances sur les affaires navales et encourageant les progrès de la technologie navale. Cet héritage est toujours avec nous aujourd'hui et continue d'inspirer nos marins et amiraux à se surpasser."
 case_de_india:0 "Feitorias"
 case_de_india_desc:0 "Envoyons nos feitors dans tous les coins des continents orientaux et établissons notre pays comme la force commerciale dominante dans l'océan Indien. En créant un réseau de comptoirs commerciaux fortifiés le long des côtes de Sarhal et de l'Inde, nous pouvons dominer le commerce local sans dépenser de grandes ressources."
 the_bandeirantes:0 "Encourager les Bandeirantes"
 the_bandeirantes_desc:0 "Certains membres d'expéditions dans l'intérieur pour la chasse aux esclaves tomberaient sur des gisements d'or et d'autres métaux et pierres précieuses. Ces rumeurs encourageraient des âmes hardies à voyager vers nos colonies."
 royal_absolutism:0 "Absolutisme royal"
 royal_absolutism_desc:0 "Pendant trop longtemps, le pouvoir royal a été limité par les interventions insensées de la noblesse, dont les intérêts locaux étroits menacent le bien commun du royaume. Nous dissoudrons les Cortes et gouvernerons sans leur interférence."
 land_before_faith:0 "La terre avant la foi"
 land_before_faith_desc:0 "La Compagnie de Jésus, entre autres, a cherché à empêcher l'expansion de nos possessions coloniales en prétendant que cela interfère avec leur travail missionnaire. Des rumeurs plus sombres nous sont également parvenues selon lesquelles ils auraient incité les indigènes et pourraient même chercher à se tailler leur propre empire colonial. Cela va cesser ; les ordres religieux ne seront plus un obstacle à notre expansion."
 open_up_the_guilds:0 "Ouvrir les corporations"
 open_up_the_guilds_desc:0 "Les lois de pureté du sang (Limpieza de sangre) réservaient les meilleurs emplois à ceux qui pouvaient prouver qu'ils n'avaient pas d'ancêtres non chrétiens. Le problème est que certains des plus ambitieux et capables de notre pays se voient refuser des opportunités, ce qui freine notre pays. Nous devons les libérer."
 POL_ideas:0 "Idées polonaises"
 POL_ideas_start:0 "Traditions polonaises"
 POL_ideas_bonus:0 "Ambition polonaise"
 folwark_system:0 "Promouvoir le système des Folwarks"
 folwark_system_desc:0 "Le système des Folwarks était un système de production qui encourageait la production d'excédents agricoles. Les paysans étaient encouragés à y travailler soit par l'utilisation de rentes, soit par la contrainte. Il formerait le socle de l'économie polonaise."
 nihil_novi:0 "Nihil Novi"
 nihil_novi_desc:0 "C'était le principe selon lequel aucune loi ne pouvait être promulguée sans le plein soutien de la noblesse. Bien que cela agisse comme un frein au pouvoir royal, cela garantirait également que la République jouisse du soutien de la noblesse."
 peichota_wybraniecka:0 "Piechota Wybraniecka"
 peichota_wybraniecka_desc:0 "L'Infanterie choisie (Piechota Wybraniecka) était composée de conscrits réguliers tirés des paysans royaux. Le système fut développé pour permettre au royaume d'avoir une armée permanente d'infanterie."
 winged_hussars:0 "Hussards ailés"
 winged_hussars_desc:0 "Les hussards étaient à l'origine des troupes de cavalerie légère utilisées pour la reconnaissance, mais avec le déclin de l'ancienne armée féodale, nous sommes passés à des régiments professionnels. Les nouveaux hussards plus lourds en formeront le cœur. Les gens craindront bientôt les hussards ailés de Pologne."
 wojsko_komputoe:0 "Wojsko Komputowe"
 wojsko_komputoe_desc:0 "L'Armée computée (Wojsko Komputowe) était basée sur un budget annuel calculé (computé) et approuvé par la Diète. L'idée était de donner à la République une armée permanente stable pour la défense."
 foreign_section:0 "Fonder la Section étrangère"
 foreign_section_desc:0 "La Section étrangère (Cudzodziemski Autorament) était composée d'unités entraînées à la manière allemande et avait initialement des officiers allemands. Elles fournirent l'épine dorsale de la nouvelle armée polonaise, améliorant ses performances."
 focus_on_field_defences:0 "Se concentrer sur les défenses de campagne"
 focus_on_field_defences_desc:0 "Il n'y a rien de tel que de voir ses camarades mourir dans une terrible agonie pour vous faire vous demander si rester sur le champ de bataille est vraiment une si bonne idée. L'utilisation de fortifications de campagne peut donner l'illusion de protection et donner plus de cœur à nos troupes."
 HAB_ideas:0 "Idées autrichiennes"
 HAB_ideas_start:0 "Traditions autrichiennes"
 HAB_ideas_bonus:0 "Ambition autrichienne"
 imperial_ambitions:0 "Ambition impériale"
 imperial_ambitions_desc:0 "La chute de la Maison de Hohenstaufen en 1250 conduisit au chaos dans l'Empire et la Bulle d'Or de 1356 légalisa l'anarchie en la qualifiant de constitution. Cependant, en 1438, le titre impérial fut regagné par la très noble maison de Habsbourg depuis sa base de pouvoir en Autriche. L'Autriche doit conserver ce titre et chercher à réformer l'Empire pour le rendre à nouveau Saint, Romain et un Empire."
 military_border:0 "Frontière militaire"
 military_border_desc:0 "La défense de nos frontières est une question sérieuse, non pas tant comment le faire mais comment le payer. La solution que nous avons trouvée est de faire de généreuses concessions de terres sur la frontière pour constituer une classe militaire professionnelle. Non seulement cela garantira que notre frontière soit adéquatement défendue à un prix raisonnable, mais ces hommes seront également disponibles pour d'autres tâches."
 fugger_banks:0 "Banque Fugger"
 fugger_banks_desc:0 "Les Fugger sont une famille marchande de Souabe, qui à l'origine gagnait de l'argent avec le tissage et investissait habilement les bénéfices dans la terre. Accumulant leur pouvoir, ils sont maintenant l'une des maisons les plus riches de l'Empire. Nous devons obtenir un accès exclusif à leurs services de banquiers."
 habsburg_dominance:0 "Domination des Habsbourg"
 habsburg_dominance_desc:0 "Bella gerant alii, tu felix Austria, nube !"
 edict_of_restitution:0 "Édit de restitution"
 edict_of_restitution_desc:0 "Notre confesseur Guillaume Lamormaini a recommandé un petit travail de comptabilité qui mettra de l'ordre dans les affaires religieuses de notre royaume. Il n'y a pas de mal à cela, autant promulguer ce petit édit."
 austrian_court:0 "Cour autrichienne"
 austrian_court_desc:0 "Il n'y a rien en théorie qui nous empêche d'avoir plus de relations diplomatiques ; cependant, les maintenir nécessite du temps et des efforts. En rationalisant notre cour, nous pouvons nous assurer d'obtenir les informations dont nous avons besoin pour apaiser les susceptibilités froissées quand elles surviennent."
 hofkriegsrat:0 "Hofkriegsrat"
 hofkriegsrat_desc:0 "Essentiellement le ministère de la Guerre. C'est la bureaucratie permanente qui administre notre armée. L'un de ses travaux les plus importants est de savoir où se trouvent nos armées. De cette façon, les armées peuvent recevoir ce dont elles ont besoin, en particulier des hommes."
 CHI_ideas:1 "Idées des Grands Ming"
 CHI_ideas_start:1 "Traditions des Grands Ming"
 CHI_ideas_bonus:1 "Ambition des Grands Ming"
 repaired_great_wall:0 "Réparer la Grande Muraille"
 repaired_great_wall_desc:0 "La Grande Muraille originale était construite en pierre et en terre ; cependant, elle s'est avérée inadéquate pour arrêter les barbares du nord. Nous estimons devoir massivement moderniser la muraille, en utilisant des briques, pour maintenir les barbares hors de l'Empire du Milieu."
 revived_training_camps:0 "La renaissance des camps d'entraînement"
 revived_training_camps_desc:0 "Fondés à l'origine par l'empereur Yongle, ils stagnèrent dans les années 1430, mais il est temps de les relancer. L'entraînement spécialisé que nos troupes reçoivent est vital si nous voulons résister aux barbares que nous trouvons de tous côtés."
 inward_perfection:0 "Perfection intérieure"
 inward_perfection_desc:0 "Le monde extérieur n'offre rien à l'Empire du Milieu ; restons chez nous pour nous assurer qu'aucune de leurs idées dangereuses n'entre dans notre corps politique. Nous devons limiter nos contacts et maintenir l'Empire du Milieu stable."
 yellow_river_dykes:0 "Réparer les digues du fleuve Jaune"
 yellow_river_dykes_desc:0 "Le fleuve Jaune est le sang vital de l'Empire du Milieu ; il fournit certaines des terres agricoles les plus riches de l'Empire. Cependant, le fleuve est également sujet aux inondations. Nous devons nous assurer que les digues qui protègent les terres agricoles soient en parfait état."
 salt_monopoly:0 "Restaurer le monopole du sel"
 salt_monopoly_desc:0 "Le monopole du sel était autrefois l'un des plus grands revenus de l'État. Pourtant, les empereurs précédents ont jugé bon d'y mettre fin au nom du commerce. Il est temps de remettre le commerce du sel sous le contrôle de l'État."
 head_tax:0 "Instaurer la capitation"
 head_tax_desc:0 "Actuellement, nous attendons des paysans qu'ils fournissent du travail pour l'État, ce qui est préjudiciable à notre économie. Si nous abolissons cela et le remplaçons par une capitation, nous encouragerons davantage de personnes à participer à l'économie monétaire."
 the_eight_banners:0 "Créer les Huit Bannières"
 the_eight_banners_desc:0 "Si nous créons une armée professionnelle permanente, nous pouvons défendre le pays. La création d'une nouvelle armée professionnelle nous permettra de défendre le pays, et plus important encore, de créer un système qui régularise le recrutement."
 BAV_ideas:0 "Idées bavaroises"
 BAV_ideas_start:0 "Traditions bavaroises"
 BAV_ideas_bonus:0 "Ambition bavaroise"
 everlating_succeession:0 "Instituer la succession perpétuelle"
 everlating_succeession_desc:0 "La manière allemande veut que chaque fils reçoive une part de l'héritage de son père et que chaque fils puisse se faire appeler duc. Bien que cela semble un système juste et équitable, le problème est que les fils ne semblent jamais s'entendre sur ce qui constitue le juste et l'équitable, ce qui conduit au conflit. Désormais, le fils aîné recevra l'héritage complet."
 bavarian_purity_law:0 "Instaurer la loi de pureté bavaroise"
 bavarian_purity_law_desc:0 "Il y a un complot pour saper et corrompre tous nos précieux fluides corporels ; cela doit cesser. Désormais, la bière en Bavière sera pure et cela protégera le peuple."
 bavarian_state_orchestra:0 "Fonder l'Orchestre d'État de Bavière"
 bavarian_state_orchestra_desc:0 "Pour montrer au monde la grandeur de la Bavière, nous fonderons et soutiendrons l'un des plus beaux orchestres de Cannor. Chaque visiteur de notre cour s'émerveillera des performances virtuoses et portera la nouvelle près et loin de notre statut."
 geistlicher_rat:0 "Établir le Geistlicher Rat"
 geistlicher_rat_desc:0 "Le Geistlicher Rat est un conseil d'État séparé, distinct du conseil privé, traitant uniquement des affaires ecclésiastiques. L'objectif de ce conseil est d'assurer la discipline du clergé et de promouvoir la vraie foi dans tout le duché."
 brewmaster_general:0 "Devenir Grand Maître Brasseur"
 brewmaster_general_desc:0 "Afin d'améliorer les finances de la Bavière, nous allons établir un monopole sur la vente de bière forte. La bière doit d'abord être vendue aux facteurs du duc. Couplé aux monopoles sur le grain et le sel, les ventes de bière apporteront de solides revenus."
 professional_army:0 "Fonder une armée professionnelle"
 professional_army_desc:0 "Jusqu'à présent, l'armée de Bavière a été une combinaison de levées féodales et de régiments mercenaires. Cela ne suffira tout simplement pas ; les pays de premier rang à notre époque ont des armées professionnelles, et la Bavière en aura une aussi."
 royal_order_of_st_george:0 "Fonder l'Ordre royal de Saint-Georges pour la Défense de l'Immaculée Conception"
 royal_order_of_st_george_desc:1 "L'Ordre de la Jarretière, l'Ordre de la Toison d'Or, chaque grand État semble avoir un ordre de chevalerie qui lui est associé. La Bavière aussi en aura un. Non seulement cela montrera au monde l'importance de la Bavière, mais cela nous fournira également un outil de mécénat et aidera à faire revivre les idéaux de la chevalerie dans nos terres."
 PER_ideas:0 "Idées perses"
 PER_ideas_start:0 "Traditions perses"
 PER_ideas_bonus:0 "Ambition perse"
 the_qizilbash:1 "Les Qizilbash"
 the_qizilbash_desc:1 "Les Qizilbash, ou Têtes rouges, sont un mouvement militaire chiite prêt à combattre et mourir pour leurs convictions religieuses. Ils sont prêts à soutenir notre État et pourraient former le noyau de notre armée."
 persian_rug_production:0 "Encourager la production de tapis persans"
 persian_rug_production_desc:0 "La Perse est depuis longtemps célèbre pour sa fabrication de tapis et de carpettes. Cependant, lorsque les Mongols déferlèrent sur nos terres, il y eut une grande destruction. Pour que la Perse se relève, nous devons aussi recouvrer notre force économique. Il est temps d'encourager le rétablissement de nos forces ancestrales."
 the_ghulams:0 "Fonder les Ghulams"
 the_ghulams_desc:0 "Auparavant, notre armée dépendait fortement des levées féodales (Qizilbash) qui se sont avérées plus loyales envers elles-mêmes qu'envers le trône. Nous fonderons une armée permanente d'infanterie et de cavalerie professionnelles, dont la loyauté va d'abord au Shah, pour défendre le pays."
 improved_silk_road:0 "Améliorer la Route de la soie"
 improved_silk_road_desc:0 "Un système d'améliorations des routes et des ponts, un système de gardes pour protéger les routes (contre un petit impôt) et une chaîne de caravansérails pour fournir des étapes de repos. Tout cela aide les marchands qui traversent la Route de la soie et fournit également des revenus accrus pour l'État."
 encouraged_art:0 "Encourager l'art"
 encouraged_art_desc:0 "Il existe une immense tradition culturelle artistique dans les terres des Perses. Du point de vue gouvernemental, ce sont des choses que les gens veulent acheter. L'encouragement de l'art donnera à nos marchands plus de choses à vendre à l'étranger, stimulant la richesse de notre nation."
 promotion_of_irrigation:0 "Promotion de l'irrigation"
 promotion_of_irrigation_desc:0 "Si nous encourageons l'agriculture, nous augmenterons notre population et nous aurons donc plus d'effectifs pour notre armée."
 increased_crown_lands:0 "Augmenter les terres de la couronne"
 increased_crown_lands_desc:0 "Une grande partie de nos revenus provient des revenus agricoles. Au fil des ans, les terres de la couronne ont été remises à des partisans loyaux en guise de récompenses. Il est temps de commencer à récupérer ces terres afin de nous assurer de rester forts."
 BUR_Ideas:0 "Idées bourguignonnes"
 BUR_Ideas_start:0 "Traditions bourguignonnes"
 BUR_Ideas_bonus:0 "Ambition bourguignonne"
 golden_fleece:0 "L'Ordre de la Toison d'Or"
 golden_fleece_desc:0 "L'ordre allait devenir l'un des premiers ordres de chevalerie de Cannor. Être chevalier de la Toison d'Or est une marque de grand prestige et rejaillit favorablement sur nous."
 compagnies_ordonnance:0 "Les Compagnies d'ordonnance"
 compagnies_ordonnance_desc:0 "Créées à l'origine par la monarchie française pour régulariser le recrutement des troupes. Si nous introduisons cela en Bourgogne, nous rationaliserons le recrutement des troupes."
 bur_estates_general:0 "Promouvoir les États généraux"
 bur_estates_general_desc:0 "L'État de Bourgogne est une création féodale avec diverses parties jointes à la Bourgogne sous différentes conditions, ce qui a créé de fortes identités locales. En promouvant les États généraux, nous offrons un forum pour ces intérêts, donnant aux gens le sentiment d'appartenir davantage."
 reform_of_feudal_army:0 "Réforme de l'armée féodale"
 reform_of_feudal_army_desc:0 "L'armée traditionnelle se compose de levées féodales augmentées par des mercenaires. Cela n'est tout simplement plus efficace : nous devons moderniser notre armée. La création d'un noyau de professionnels renforcera notre armée."
 integrated_towns:0 "Intégrer les villes aux États généraux"
 integrated_towns_desc:0 "Les États généraux traditionnels sont très largement construits autour des intérêts du premier état (clergé) et du deuxième état (noblesse) ; les changements économiques ont renforcé le pouvoir du tiers état (tous les autres). Nous devons affiner la composition des États généraux pour accroître l'influence du tiers état sans empiéter indûment sur les droits des autres."
 freedom_of_worship:0 "Permettre la liberté de culte"
 freedom_of_worship_desc:0 "Bien que l'Église nous presse d'imposer une plus grande orthodoxie religieuse, les villes, invoquant la doctrine de l'humanisme de la Renaissance, ont plaidé pour une plus grande tolérance. Bien que nous ne puissions pas ignorer complètement le clergé, les villes sont tout simplement trop importantes pour être ignorées."
 bur_regimental_system:0 "Créer le système régimentaire"
 bur_regimental_system_desc:0 "Afin de faciliter un recrutement plus efficace pour nos armées, nous lions les régiments aux régions et rendons chaque région responsable de fournir des recrues à son régiment local. Cela rationalisera le processus de recrutement et se traduira par davantage d'effectifs disponibles."
 GEN_Ideas:0 "Idées génoises"
 GEN_Ideas_start:0 "Traditions génoises"
 GEN_Ideas_bonus:0 "Ambition génoise"
 reunited_genoa:0 "Réunifier la nation"
 reunited_genoa_desc:0 "Le traité de Turin, entre nous et Venise, en 1381, ressemblait sur le papier à un match nul. La perte dévastatrice de notre flotte conduisit à des luttes intestines entre diverses factions au sein du pays. Nous devons y mettre fin si Gênes doit se relever."
 lessons_of_chiogga:0 "Les leçons de Chioggia"
 lessons_of_chiogga_desc:0 "En 1380, notre flotte subit une lourde défaite aux mains des Vénitiens lors de la bataille de Chioggia. La paix de Turin qui en résulta a donné à Venise la domination du commerce de la Tête-de-Dame. Les galères vénitiennes, plus petites et plus maniables, se sont avérées supérieures aux nôtres ; nous devons y remédier."
 genoese_trade:0 "Reconstruire le commerce génois"
 genoese_trade_desc:0 "Venise est en position de force dans le commerce depuis bien trop longtemps ; nous devons nous assurer que nos marchands puissent reconquérir les marchés. Nous devons remanier notre système juridique pour garantir que nos familles marchandes puissent affronter les Vénitiens sur un pied d'égalité."
 the_genoese_arsenal:0 "Construire l'Arsenal génois"
 the_genoese_arsenal_desc:0 "Venise a commencé la construction de son arsenal en 1104, et depuis lors, Venise a joui d'un avantage en matière de construction navale. Gênes ne peut pas laisser cela perdurer ; nous devons avoir notre propre arsenal pour nous assurer de disposer nous aussi d'une flotte pour défendre nos intérêts."
 overhauled_bureaucracy:0 "Réformer la bureaucratie"
 overhauled_bureaucracy_desc:0 "Pour être franc, l'argent est le pouvoir. Si nous souhaitons rester un acteur de la Tête-de-Dame, nous en aurons besoin de plus pour soutenir notre flotte et notre armée. Nous devons donc réformer notre bureaucratie pour nous assurer de maximiser nos revenus."
 the_office_of_grand_admiral:0 "Établir le bureau du Grand Amiral"
 the_office_of_grand_admiral_desc:0 "Le sang vital de Gênes est le commerce, et le commerce repose sur une flotte. Nous devons nous assurer que notre flotte soit correctement administrée. La création d'un bureau du Grand Amiral responsable de l'administration de notre flotte garantira que notre flotte sera mieux gérée."
 standardisation_of_designs:0 "Standardisation des conceptions"
 standardisation_of_designs_desc:0 "Chaque chantier naval et même chaque constructeur a sa propre conception de navire. Bien qu'il s'agisse en pratique à peu près du même navire, ces petites différences signifient que l'approvisionnement en matériaux pour les navires devient plus chronophage. La création d'un bureau de conception pour fournir des plans standards à nos chantiers nous permettra d'accélérer la construction."
 SCO_Ideas:0 "Idées écossaises"
 SCO_Ideas_start:0 "Traditions écossaises"
 SCO_Ideas_bonus:0 "Ambition écossaise"
 break_the_black_douglas:0 "Briser les Douglas noirs"
 break_the_black_douglas_desc:0 "La famille Douglas a été richement récompensée pour son fier service durant nos guerres de liberté contre les Anglais haïs, mais maintenant elle se mêle trop des affaires de notre royaume. Nous avons maintenant assez de preuves de trahison ; ainsi leurs terres seront confisquées et deviendront partie du domaine royal."
 modernised_royal_scots_navy:0 "Moderniser la Marine royale écossaise"
 modernised_royal_scots_navy_desc:0 "Depuis les guerres d'Indépendance, nous avons cherché à développer notre marine. Auparavant, nous utilisions des obligations féodales pour fournir des flottes ; nous allons maintenant créer une flotte moderne appartenant au roi, basée dans notre nouveau port de Newhaven."
 reign_in_the_clans:0 "Maîtriser les clans"
 reign_in_the_clans_desc:0 "Les chefs de clan des parties septentrionales de notre royaume sont trop indociles au goût de la couronne. Si nous remplaçons les chefs actuels par des hommes qui nous sont loyaux, nous serons mieux à même d'exploiter la puissance des sauvages du nord pour nos armées."
 comets:0 "Des comètes ?"
 comets_desc:0 "Nous avons reçu récemment un nouveau tome qui est une lecture fort intéressante ; il s'intitule « De la vraie signification des comètes contre la vanité des astrologues ». J'ai décrété que tous dans le royaume devraient en connaître le contenu."
 royal_revenue:0 "Resserrer les revenus royaux"
 royal_revenue_desc:0 "Si nous voulons continuer à maintenir l'Écosse libre de toute servitude, nous devons avoir de l'argent. Il existe de nombreux domaines royaux, des profits de justice et des droits féodaux qui ne donnent tout simplement pas à la couronne ce qui lui revient de droit. Nous devons nous assurer de recevoir ce qui nous appartient légitimement."
 basilikon_doron:0 "Basilikon Doron"
 basilikon_doron_desc:0 "Du grec signifiant « don royal ». Il était coutumier pour le souverain actuel de préparer son héritier à la tâche de gouverner après lui. Le Basilikon Doron est l'essence distillée de toutes ces leçons consignées dans un manuel pratique pour tous les futurs souverains."
 act_of_revocation:0 "Promulguer l'Acte de révocation"
 act_of_revocation_desc:0 "Il est venu à notre attention que nos ancêtres ont jugé bon de donner illégalement des parties du domaine royal à notre noblesse. Or, il ne serait pas convenable de simplement reprendre ces terres, mais nous insisterons désormais pour que notre bien-aimée et loyale noblesse nous paie des rentes pour celles-ci."
 HUN_ideas:0 "Idées hongroises"
 HUN_ideas_start:0 "Traditions hongroises"
 HUN_ideas_bonus:0 "Ambition hongroise"
 hun_renaissanse_knowledge:0 "Un prince de la Renaissance"
 hun_renaissanse_knowledge_desc:0 "Les serfs considéraient leur roi comme un souverain juste car il les protégeait des exigences excessives et autres abus des magnats. Il était un véritable prince de la Renaissance, un chef militaire et administrateur accompli, un linguiste remarquable et un mécène éclairé des arts."
 bulwark_of_christianity:0 "Rempart de la chrétienté"
 bulwark_of_christianity_desc:0 "Avec la puissance turque déclinant au sud, il incombe au peuple du royaume de Hongrie de défendre la chrétienté contre la menace turque. Que l'on sache que nous ne reculerons pas devant notre devoir."
 found_the_black_army:0 "Fonder l'Armée noire"
 found_the_black_army_desc:0 "Inspirés par les écrits de Jules César, la Hongrie disposera d'un noyau de troupes professionnelles pour ses armées. Ces hommes seront si endurcis que nos ennemis qualifieront ces soldats d'armée noire."
 reformed_coinage:0 "Monnaie réformée"
 reformed_coinage_desc:0 "Pour payer notre nouvelle armée professionnelle, nous aurons besoin d'un flux régulier de revenus. Réformer la monnaie pour standardiser les poids rendra cela bien plus facile, car nous saurons combien les gens devront payer."
 curtailed_peasantry:0 "Restreindre la liberté de la paysannerie"
 curtailed_peasantry_desc:0 "La Hongrie n'est pas bénie de frontières naturelles sur lesquelles elle peut baser sa défense. La plaine sauvage qui amena jadis nos ancêtres ici était parfaite pour lancer des raids vers l'Ouest, pas pour la défense. Si la Hongrie doit être défendue, nous aurons besoin de ressources. Si nous acceptons de permettre à nos magnats d'attacher plus étroitement la paysannerie à la terre, ils veilleront à ce qu'elle travaille plus dur."
 strengthened_towns:0 "Renforcer les villes"
 strengthened_towns_desc:0 "La Hongrie a besoin de richesse pour croître et prospérer, et les villes en sont la clé. Si nous nous assurons que nos villes soient correctement protégées des nobles, elles continueront à apporter du commerce que nous pourrons taxer."
 hungarian_estates_general:0 "Créer les États généraux"
 hungarian_estates_general_desc:0 "Nous avons vu les États généraux utilisés dans d'autres pays européens et avons constaté les avantages de cela. Cela permet à toutes les parties de notre royaume de se sentir importantes. Que la Hongrie en ait un aussi."
 JAP_ideas:0 "Idées japonaises"
 JAP_ideas_start:0 "Traditions japonaises"
 JAP_ideas_bonus:0 "Ambition japonaise"
 unification_of_the_empire:0 "Unification de l'Empire"
 tosen_bugyo:0 "Tosen-bugyo"
 tosen_bugyo_desc:0 "Le Tosen-bugyo était un système établi pour aider à réguler le commerce d'outre-mer. Il a été développé non seulement pour faciliter le commerce mais aussi pour s'assurer que nous sachions où va le commerce. Cela encouragera non seulement le commerce mais garantira que nous obtenions notre juste part."
 higashiyama_culture:0 "Culture Higashiyama"
 higashiyama_culture_desc:0 "Construite autour de l'esthétique du bouddhisme zen, la culture Higashiyama voyait la beauté dans la simplicité. Elle vit le développement de la cérémonie du thé, de l'art floral, du théâtre et des arts. Cet épanouissement culturel apportait un grand prestige à ceux qui le pratiquaient et rejaillirait grandement sur nous."
 jap_unification_under_the_emperor:0 "Unification sous l'Empereur"
 jap_unification_under_the_emperor_desc:0 "Afin de donner à ce pays une fin définitive aux conflits internes, nous avons décidé d'unir la classe aristocratique sous l'Empereur et la classe guerrière sous le Shogun. L'Empereur règne maintenant sur le Japon comme dans l'ère ancienne, mais avec un gouvernement destiné à relever les défis de l'ère moderne."
 jap_modernization:0 "Modernisation"
 jap_modernization_desc:0 "Nous ne devons jamais manquer une occasion d'apprendre la technologie des autres. Les Occidentaux et les Chinois ont par le passé prouvé avoir de nombreuses idées et inventions qui nous manquent, et l'introduction rapide et l'adoption de celles-ci pour nos propres usages sont vitales pour notre survie."
 jap_maritime_legacy:0 "Héritage maritime"
 jap_maritime_legacy_desc:0 "Certains diraient que nos traditions maritimes sont celles de pêcheurs et de pirates plutôt que de marchands et de marines. Bien que rien ne soit plus éloigné de la vérité, il est vrai que nous avons un sens instinctif de la mer et des manœuvres navales. Formalisons cette expérience en doctrine navale et construisons une nouvelle marine digne de notre empire."
 jap_land_of_the_rising_sun:0 "Pays du Soleil levant"
 jap_land_of_the_rising_sun_desc:0 "Notre empire a une histoire longue et glorieuse. Notre tradition culturelle unique, nos soldats courageux et notre géographie inexpugnable nous rendent plus forts que beaucoup d'autres États de notre région. Maintenant que nous avons enfin atteint un royaume uni, le moment est venu pour le Pays du Soleil levant de prendre sa place parmi les grandes nations de ce monde !"
 jap_kaitakudan:0 "Kaitakudan"
 jap_kaitakudan_desc:0 "Puisque notre pays est petit et ne peut donc pas nourrir une grande population, nous devons motiver certains de nos citoyens à émigrer vers d'autres régions. Ces groupes de pionniers peuvent fonder de nouvelles colonies à l'étranger comme chez nous."
 jap_great_power_diplomacy:0 "Diplomatie de grande puissance"
 jap_great_power_diplomacy_desc:0 "Certains diraient que nous avons été un pays isolationniste par le passé, mais les temps changent. Nous avons besoin d'une politique étrangère plus active pour devenir une vraie grande puissance. Envoyons des missions et des ambassades dans le monde et faisons connaître aux autres pays la grandeur de notre nation !"
 reformed_land_holding:0 "Réforme de la tenure foncière"
 reformed_land_holding_desc:0 "Traditionnellement, les terres étaient évaluées selon leur taille, mais cela ne tenait pas compte du fait que toutes les terres ne sont pas identiques. Désormais, les terres seront évaluées selon la valeur du riz qui peut y être cultivé. Cela facilitera le contrôle que nos vassaux nous fournissent les troupes qu'ils sont censés fournir."
 sankin_kotai_title:0 "Sankin-kotai"
 sankin_kotai_desc:0 "Le Sankin-kotai est un système où nos loyaux vassaux alternent entre notre capitale et leurs terres. Lorsqu'ils sont dans notre capitale, ils sont naturellement censés afficher leur richesse, et ces coûts financiers les aideront à rester à l'écart des méfaits."
 sakoku:0 "Sakoku"
 sakoku_desc:0 "Nous allons restreindre tout le commerce à seulement quatre points d'entrée. Cela ne fera peut-être pas grand-chose pour notre commerce, mais ce que cela fera, c'est restreindre les influences étrangères, en particulier leurs missionnaires qui sont une menace pour notre stabilité."
 bakufu_chokkatsuchi:0 "Le bakufu Chokkatsuchi"
 bakufu_chokkatsuchi_desc:0 "Traditionnellement, nous aurions divisé nos terres entre les Daimyos, mais c'est un problème car cela crée des rivaux potentiels. Au lieu de cela, nos terres centrales seront gouvernées par des hommes de rang inférieur qui doivent leur nomination et leur loyauté à nous. Cela garantira que nous recevions notre dû."
 shinokosho_system:0 "Système Shinokosho"
 shinokosho_system_desc:0 "Pour nous assurer que chacun connaisse sa place, nous allons promouvoir un système de quatre classes : nobles, marchands, artisans et paysans. Cela nous permettra de nous assurer que chacun accomplit son devoir."
 MAM_ideas:0 "Idées mameloukes"
 MAM_ideas_start:0 "Traditions mameloukes"
 MAM_ideas_bonus:0 "Ambition mamelouke"
 red_sea_trade:0 "Commerce de la mer Rouge"
 red_sea_trade_desc:0 "Le commerce des épices remontant la mer Rouge étant une source clé de notre richesse, nous devons nous assurer de contrôler ce commerce. En utilisant une politique agressive consistant à menacer de brûler les ports de la mer Rouge que nous ne contrôlons pas s'ils acceptent les marchands d'épices, nous pouvons nous assurer de prendre la part du lion."
 monuments_to_greatness:0 "Monuments à notre grandeur"
 monuments_to_greatness_desc:0 "Construisons des monuments à notre grandeur à travers notre royaume ; que tous connaissent notre grandeur et notre puissance."
 purchase_new_mamelukes:0 "Acheter de nouveaux Mamelouks"
 purchase_new_mamelukes_desc:0 "Notre administration est peuplée de fonctionnaires routiniers trop occupés à comploter les uns contre les autres pour s'enrichir. Nous retournerons aux voies traditionnelles et ferons venir de nouveaux Mamelouks pour doter notre administration."
 mam_army_reform:0 "Réforme de l'armée"
 mam_army_reform_desc:0 "Notre victoire sur les Mongols est loin dans le passé, quand nous étions la première puissance militaire du monde. Les temps ont changé et nos armées ne sont plus ce qu'elles étaient. Il est temps d'améliorer l'entraînement de nos troupes pour nous assurer de ne pas prendre de retard."
 reform_fellah_system:0 "Réformer le système Fellah"
 reform_fellah_system_desc:0 "Depuis des temps immémoriaux, la base de l'économie égyptienne est le fermier Fellah qui cultive sa terre comme rien de plus qu'un esclave. Il est temps de réformer ce système pour nous assurer que nos agriculteurs aient une bonne incitation à produire davantage."
 reformed_succession:0 "Réforme de la succession"
 reformed_succession_desc:0 "La fière tradition turque de laisser les fils se battre pour la succession conduit à une certaine instabilité. Les infidèles de l'autre côté de l'eau s'y connaissent en la matière et veillent à ce que la succession soit plus claire et permette une plus grande stabilité. Nous ferons de même."
 mam_monopoly_ports:0 "Ports monopolistiques"
 mam_monopoly_ports_desc:0 "Pour nous assurer que notre commerce aille où nous le voulons (et ainsi le taxer), nous veillerons à ce que certains ports soient réservés à certaines marchandises. Nous assurerons bien sûr des conditions généreuses pour l'utilisation de ces ports, mais notre générosité sera plus que compensée par le commerce supplémentaire."
 NAP_ideas:0 "Idées napolitaines"
 NAP_ideas_start:0 "Traditions napolitaines"
 NAP_ideas_bonus:0 "Ambition napolitaine"
 academy_of_naples:0 "Fonder l'Académie de Naples"
 academy_of_naples_desc:0 "Pour nous assurer que la réputation des souverains de Naples soit correctement préservée pour la postérité, nous fonderons une Académie pour que des hommes de lettres écrivent convenablement sur nos exploits."
 consolidate_the_royal_domain:0 "Consolider le domaine royal"
 consolidate_the_royal_domain_desc:1 "Nous avons hérité d'une terre riche, mais nous sommes freinés dans notre prospérité par des lois et coutumes archaïques. Les souverains précédents se sont assurés d'harmoniser la naissance noble et la richesse dans notre royaume ; il nous appartient de mettre les réglementations à jour. En renforçant les cours baroniales et en consolidant les possessions foncières dans le royaume, nous créons une hiérarchie juridique plus claire. Dans les terres de la couronne et des bourgeois, nous renforcerons les villes comme centres de pouvoir et encouragerons la croissance du commerce et de l'artisanat."
 encouraged_city_living:0 "Encourager la vie citadine"
 encouraged_city_living_desc:1 "Nous avons hérité d'une belle ville de nos prédécesseurs. Nous devons continuer à embellir et améliorer cette métropole de la Méditerranée afin qu'elle puisse continuer à croître et prospérer. Nous ne pouvons pas nous contenter de réparer et d'entretenir le port et les bâtiments. Assurons-nous de pouvoir soutenir plus de gens en construisant des aqueducs, en drainant les zones humides et en pavant davantage de routes."
 crush_the_barons:0 "Écraser le pouvoir des barons"
 crush_the_barons_desc:0 "Les barons locaux exercent encore un grand degré de pouvoir sur la campagne napolitaine. Si nous voulons continuer à centraliser notre royaume, nous devons écraser le pouvoir de ces barons ou risquer qu'ils conspirent contre nous."
 academia_pontaniana:0 "Academia Pontaniana"
 academia_pontaniana_desc:0 "Depuis longtemps, Naples s'est efforcée d'être un centre d'apprentissage moderne, attirant les grands esprits de l'époque et répandant la lumière de la Renaissance. Sous la direction de Giovanni Pontano, ces cercles de discussion ont reçu structure et organisation. Il est tout à fait approprié que nous nommions l'académie d'après son industrieux dirigeant."
 expanded_arsenale:0 "Étendre l'Arsenal"
 expanded_arsenale_desc:0 "Depuis le XIVe siècle, l'Arsenal de Naples est le centre de notre production navale et notre principale installation navale. L'Arsenal doit cependant être agrandi et modernisé pour suivre les flottes hostiles de la Méditerranée. Étendons les aspects maritimes et navals de notre port et construisons un Arsenal plus efficace afin de maintenir une flotte plus grande et plus forte."
 city_of_artists:0 "Cité des artistes"
 city_of_artists_desc:0 "Par le mécénat des plus grands artistes du monde, tous verront la gloire de notre cité. Tous s'émerveilleront de la grandeur de nos peintres, poètes, chanteurs et acteurs. Que la culture napolitaine soit la mesure à laquelle les autres centres artistiques sont comparés."
 lazzaroni_support:0 "Les Lazzaroni et la monarchie"
 lazzaroni_support_desc:0 "Les Lazzaroni de Naples n'ont pas grand-chose, mais ils sont de fervents partisans de la monarchie et du caractère sacré de la règle héréditaire. Contrairement aux sans-culottes et autres membres du lumpenprolétariat, les Lazzaroni préféreraient mourir en défendant la monarchie plutôt que de voir le républicanisme exercer son emprise vénéneuse sur notre ancien royaume. Nous devons chercher à conserver leur soutien et combattre nos ennemis à l'étranger comme à l'intérieur avec leur aide."
 ARA_ideas:0 "Idées aragonaises"
 ARA_ideas_start:0 "Traditions aragonaises"
 ARA_ideas_bonus:0 "Ambition aragonaise"
 mercenary_princes:0 "Princes mercenaires"
 mercenary_princes_desc:0 "Coincés comme nous le sommes entre la Castille et la France, nous devons nous assurer d'avoir accès à des soldats. Laissons nos cadets servir comme capitaines mercenaires afin que nous ayons les contacts nécessaires pour engager des hommes si besoin."
 protection_of_coastlines:0 "Protection des côtes"
 protection_of_coastlines_desc:0 "La menace des corsaires barbaresques pillant nos côtes est bien réelle. Nous devons construire une flotte pour les protéger. Agrandissons nos chantiers navals pour nous assurer d'avoir les navires pour ce faire."
 ara_mediterranean_trade:0 "Commerce méditerranéen"
 ara_mediterranean_trade_desc:0 "Les cités italiennes se comportent comme si le commerce de la Méditerranée leur appartenait entièrement. Nous encouragerons les hommes de commerce à ramener ce commerce vers nos côtes."
 consolidation_of_the_estates:0 "Consolidation des États"
 consolidation_of_the_estates_desc:0 "L'Aragon est un royaume composite où chaque partie constituante a ses propres Cortes. C'est un système de gouvernement inefficace. Nous devons unir le royaume en un seul État avec des Cortes uniques pour gouverner plus efficacement."
 chartered_merchant_companies:0 "Compagnies marchandes à charte"
 chartered_merchant_companies_desc:0 "Nos marchands gaspillent leurs ressources à se faire concurrence entre eux plutôt qu'aux autres. C'est un gaspillage et nous devrions concentrer tous nos efforts à prendre le commerce aux autres peuples. Nous accorderons des chartes à des compagnies qui recevront des monopoles temporaires sur le commerce de certaines régions et dont le renouvellement dépendra du fait qu'elles donnent à la couronne ce qui lui revient de droit."
 ara_reformed_admin:0 "Réformer l'administration"
 ara_reformed_admin_desc:0 "Notre administration est très largement celle d'un État féodal. Si nous souhaitons transformer l'Aragon en un État moderne, nous devons mettre notre administration à jour."
 protection_of_the_little_folk:0 "Protéger les petites gens"
 protection_of_the_little_folk_desc:0 "Nos soldats voudront savoir que leurs proches seront pris en charge s'ils tombent au combat. L'Aragon fera son devoir et s'assurera que cela soit fait par un système de maisons de travail pour les orphelins des tombés."
 TIM_ideas:0 "Idées timourides"
 TIM_ideas_start:0 "Traditions timourides"
 TIM_ideas_bonus:0 "Ambition timouride"
 timurid_architecture:0 "Architecture timouride"
 timurid_architecture_desc:0 "Les grands monuments de nos ancêtres témoignent de notre grandeur. Nous devons encourager ce style d'architecture chez nos voisins afin que les gens se souviennent qui devraient être leurs vrais maîtres."
 the_mantle_of_the_great_khan:0 "Le manteau du Grand Khan"
 the_mantle_of_the_great_khan_desc:0 "La mort du fondateur éponyme de notre dynastie créa un vide de pouvoir qui conduisit des personnes qui auraient dû mieux savoir à viser le pouvoir. Cependant, par des mariages, nous avons consolidé notre prétention à descendre du Grand Khan lui-même, et le guerrier des steppes sait qui suivre."
 unleash_the_tiger:0 "Libérer le tigre"
 unleash_the_tiger_desc:0 "Tamerlan fit trembler le monde par ses conquêtes ; nous ferons de même. Nos ennemis seront les auteurs de leur propre calamité !"
 chagatai_literature:0 "Littérature tchaghataï"
 chagatai_literature_desc:0 "La langue tchaghataï des steppes orientales est bien plus digne d'être le véhicule des pensées et des idées de notre grande lignée que le persan ou l'arabe ne pourraient jamais l'être. Nous devons promouvoir l'usage de notre langue ancestrale et créer une nouvelle tradition littéraire timouride."
 riches_of_the_silk_road:0 "Contrôle de la Route de la soie"
 riches_of_the_silk_road_desc:0 "Tant que nous contrôlerons les terres de Transoxiane et de Samarcande, le commerce de la Route de la soie coulera sans entrave et la richesse de notre dynastie continuera de croître."
 timurid_renaissance:0 "Renaissance timouride"
 timurid_renaissance_desc:0 "Depuis l'époque de l'expansion timouride, nos terres ont attiré les plus grands artisans et sages de l'époque. Par un mécénat continu de l'art, de la science et de la littérature, nous avons fait de nos capitales à Hérat et Samarcande les joyaux les plus brillants du monde islamique."
 largest_mosque_in_the_world:0 "Construire la plus grande mosquée du monde"
 largest_mosque_in_the_world_desc:0 "Nous montrerons au monde à quoi ressemblent les monuments des vrais conquérants. Nous construirons la plus grande mosquée que le monde ait jamais vue, et ainsi les noms de notre dynastie résonneront à travers les âges."
 MUG_ideas:0 "Idées mogholes"
 MUG_ideas_start:0 "Traditions mogholes"
 MUG_ideas_bonus:0 "Ambition moghole"
 an_indian_padshah:0 "Un Padichah indien"
 an_indian_padshah_desc:0 "Notre royaume est devenu celui de nombreuses fois et cultures, et bien que nous soyons étrangers à ces terres, les traditions et valeurs de l'Inde nous parlent. Malgré leur riche culture, ces peuples semblent manquer d'un objectif commun. Nous devons nous efforcer de garantir que, indépendamment de la caste, de la religion ou de la culture, tous nos sujets aient des chances égales de servir notre grande maison."
 mansabdari_system:0 "Les systèmes Jagir et Mansabdari"
 mansabdari_system_desc:0 "Les concessions de terres sont problématiques et peuvent finir par encourager nos nobles à construire leurs propres petits États au sein de notre État. Créons un système strict de droits sur les revenus des terres plutôt que de concessions foncières en tant que telles. Le détenteur d'une telle concession temporaire devrait être en droit de percevoir des impôts et obligé de fournir des troupes aux armées impériales. Tous les autres devoirs politiques et administratifs devraient rester du ressort de la bureaucratie impériale."
 control_of_the_ulema:0 "Contrôle du clergé"
 control_of_the_ulema_desc:0 "Les Oulémas moghols sont trop facilement influencés par les tendances et la politique du monde extérieur à l'Inde. Rassemblons les hommes de foi les plus influents de nos terres et faisons-leur proclamer notre Padichah comme l'autorité suprême en toutes matières juridiques."
 mughal_ibadat_khana:0 "Ibadat Khana - Maison du culte"
 mughal_ibadat_khana_desc:0 "Rassemblons les plus érudits des hommes de toutes les fois et philosophies en un seul lieu et permettons-leur de débattre des meilleures façons pour les hommes de vivre et d'adorer."
 zabt_system:0 "Système Zabt"
 zabt_system_desc:0 "Ces terres dépendent bien trop des coutumes anciennes. En conséquence, les contrats et unités de revenus ne sont souvent pas organisés de la manière la plus efficace. En révoquant toutes les terres et en les plaçant sous contrôle impérial direct pendant un temps, nous pouvons entièrement réorganiser et réévaluer nos actifs. Cela augmentera considérablement l'efficacité de la collecte des impôts dans notre royaume."
 mughal_architecture:0 "Architecture moghole"
 mughal_architecture_desc:0 "Un grand empire exige des bâtiments monumentaux. Dans notre empire cosmopolite, les architectes créent déjà des bâtiments merveilleux qui émerveilleront les générations à venir. Notre dynastie devrait être à l'avant-garde de ce mouvement, créant de grandes œuvres d'un type que le monde n'a jamais vu."
 fatawa_e_alamgiri:0 "Fatawa-i-Alamgiri"
 fatawa_e_alamgiri_desc:0 "En créant une collection centrale de lois civiles que tous les sujets doivent suivre, nous pourrons nous assurer que la loi soit la même dans toutes les parties de notre royaume."
 HSA_ideas:0 "Idées hanséatiques"
 HSA_ideas_start:0 "Traditions de la Hanse"
 HSA_ideas_bonus:0 "Ambition de la Hanse"
 end_of_victual_brothers:0 "La fin des Frères des vivres"
 end_of_victual_brothers_desc:0 "Nous avons brisé les forces des Frères des vivres et poursuivi et traqué les survivants. Nous devons maintenant nous assurer qu'une telle force de pirates ne nous menace plus jamais. Nous ferons ce qu'il faut pour protéger notre commerce."
 strong_league_obligations:0 "Obligations de ligue renforcées"
 strong_league_obligations_desc:0 "La Ligue a toujours fonctionné selon une structure très décentralisée. C'était à la fois sa force et sa faiblesse. Resserrons les obligations des membres de la ligue dans leurs domaines de spécialisation, afin que nous soyons plus efficaces dans le commerce."
 hsa_shipbuilding:0 "Construction navale améliorée"
 hsa_shipbuilding_desc:0 "Pendant longtemps, la plupart des navires de la Baltique ont été construits par les villes hanséatiques, mais les temps nouveaux ont amené de nouveaux concurrents qui construisent des navires moins chers, mais naturellement inférieurs. Nous devons améliorer nos chantiers navals pour maintenir notre position de première puissance commerciale de la Baltique."
 reformed_hanstag:0 "Diète hanséatique réformée"
 reformed_hanstag_desc:0 "Jusqu'à présent, la Diète hanséatique a fonctionné selon un système où nous n'adoptions des règles que si personne n'y objectait. Cela fonctionnait bien quand nous étions la seule puissance commerciale de la Baltique. Nous devons passer à un système où une simple majorité suffit. Cela devrait améliorer la prise de décision tout en maintenant le soutien des villes."
 hanseatic_levy_system:0 "Système de levée hanséatique"
 hanseatic_levy_system_desc:0 "Chaque ville au sein de la ligue est censée fournir des levées en cas de guerre. Ce système ad hoc rend les campagnes militaires difficiles car les villes ne sont pas disposées à fournir des forces suffisantes. Nous devons réformer le système pour que les villes fournissent une plus grande part d'effectifs à la ligue."
 regularised_contribution:0 "Contributions régularisées"
 regularised_contribution_desc:0 "Les finances de la Ligue sont actuellement très largement gérées de manière ad hoc. Les villes contribuent soit en argent, soit en nature aux projets de la ligue. Ce n'est tout simplement pas suffisant pour que nous survivions dans le climat actuel. Bien que les villes soient libres de collecter la contribution à leur manière, il est vital que chaque ville fasse une contribution régulière."
 the_hansa_bank:0 "La Banque de la Hanse"
 the_hansa_bank_desc:0 "En utilisant le nouveau système de contribution, nous pouvons garantir une banque que les membres pourront utiliser. Appuyée par les ressources de la ligue, une lettre de crédit de la banque vaudra de l'argent comptant. Ceci, ainsi que d'autres instruments financiers, donnera à nos marchands un avantage sur les autres pays."
 MLO_ideas:0 "Idées milanaises"
 MLO_ideas_start:0 "Traditions milanaises"
 MLO_ideas_bonus:0 "Ambition milanaise"
 renaissance_prince:0 "Prince de la Renaissance"
 renaissance_prince_desc:0 "D'autres souverains en Italie peuvent faire semblant de soutenir la renaissance culturelle qui se manifeste devant nous ; que Milan en soit le centre sous notre mécénat."
 patron_of_music:0 "Mécène de la musique"
 patron_of_music_desc:0 "Les arts musicaux ont été tristement négligés par d'autres princes. Patronnons la musique pour la gloire de Dieu, et de nous-mêmes, et Milan brillera aussi."
 lowered_power_of_barons:0 "Réduire le pouvoir des barons"
 lowered_power_of_barons_desc:0 "L'art et la culture, c'est une chose, mais si nous souhaitons rester indépendants, nous aurons besoin d'argent. Pour cela, nous devons briser le pouvoir de la noblesse locale et nous assurer que plus d'argent afflue vers le centre."
 age_of_condottieri:0 "L'ère des condottieri"
 age_of_condottieri_desc:0 "Les mercenaires formant le pilier de tant d'armées, nous serions sages de nous assurer que nous aussi ayons des mercenaires sous la main. Assurons-nous que les capitaines mercenaires de passage soient chaleureusement accueillis à Milan afin qu'ils se souviennent de nous quand viendra le moment de les engager."
 encouragement_of_philosophers:0 "Encouragement des philosophes"
 encouragement_of_philosophers_desc:0 "Nous à Milan avons longtemps été des partisans de la pensée de la Renaissance. Nous devrions poursuivre cette tradition et étendre notre mécénat et construire des installations pour que les plus grands penseurs de toute l'Europe viennent ici."
 merchant_princes:0 "Princes marchands"
 merchant_princes_desc:0 "Les grandes cités côtières d'Italie ont depuis longtemps de grands réseaux commerciaux apportant richesse et puissance à leur porte. Milan n'est peut-être pas sur la côte, mais cela ne signifie pas que le duché de Milan ne peut pas aussi obtenir sa part. Que l'on sache que les hommes de richesse et de substance qui partiront ramener les richesses du monde seront regardés avec faveur à la cour de Milan."
 rulership_of_enlightened_principals:0 "Gouvernement par des principes éclairés"
 rulership_of_enlightened_principals_desc:0 "Avec l'encouragement des philosophes, de nouvelles théories et principes ont commencé à émerger. En structurant notre gouvernement selon ces principes, nous jouirons d'un plus grand soutien, au moins parmi ceux qui comptent vraiment."
 BYZ_ideas:0 "Idées byzantines"
 BYZ_ideas_start:0 "Traditions byzantines"
 BYZ_ideas_bonus:0 "Ambition byzantine"
 regulations_for_mercenaries:0 "Réglementations pour les mercenaires"
 regulations_for_mercenaries_desc:0 "Nous ne les aimons peut-être pas et ne voulons peut-être pas les utiliser, mais quand le besoin se fait sentir, nous pourrions être forcés de recourir aux mercenaires. Si nous établissons des normes sur ce que les mercenaires doivent apporter, nous pourrons les recruter plus rapidement, et donc moins cher."
 repopulation_of_countryside:0 "Repeuplement de la campagne"
 repopulation_of_countryside_desc:0 "La peste, la guerre et la guerre civile ont fait des ravages dans la campagne, la laissant dévastée et impropre à l'usage. Nous devons encourager des colons à s'installer dans la campagne pour la reconstruire comme base pour nos armées."
 byz_state_admin_reform:0 "Lancer la réforme administrative"
 byz_state_admin_reform_desc:0 "Notre système administratif est une relique d'une époque révolue. Nous devons le remanier et le préparer pour cette nouvelle ère moderne. Nous devons commencer par la fiscalité ; remplacer le système actuel par des employés gouvernementaux payés et promus au mérite nous rapportera plus d'argent sans taxer les paysans plus durement."
 byz_admin_power:0 "Pouvoir délégué"
 byz_admin_power_desc:0 "La plus grande faiblesse de notre système est le rôle de l'Empereur. L'Empereur autocratique et semi-divin a tant de pouvoir que cela encourage les guerres civiles. En déléguant plus d'autorité, nous découragerons les guerres civiles en réduisant la valeur du prix et rendrons les nobles plus satisfaits de rester dans le système avec le pouvoir qu'ils exerceront."
 merchant_class:0 "Classe marchande byzantine"
 merchant_class_desc:0 "La richesse et le pouvoir vont de pair ; jadis Constantinople était le centre du commerce de la Tête-de-Dame. Peut-être ne le redeviendra-t-elle jamais, mais cela ne devrait pas nous empêcher de nous assurer qu'elle devienne un centre plus important qu'elle ne l'est déjà."
 new_imperial_army:0 "La nouvelle armée impériale"
 new_imperial_army_desc:0 "Les grandes époques de l'histoire byzantine ont eu une grande armée, et celle-ci sera une grande époque. Réformons l'armée pour créer une nouvelle force plus disciplinée que jamais."
 ecumenical_patriarch:0 "Restaurer le Patriarche œcuménique"
 ecumenical_patriarch_desc:0 "Notre Sainte Église est depuis longtemps tombée en décadence. Restaurons la fonction à son ancienne gloire et ainsi revigorons l'Église."
 VIJ_ideas:0 "Idées de Vijayanagar"
 VIJ_ideas_start:0 "Traditions de Vijayanagar"
 VIJ_ideas_bonus:0 "Ambition de Vijayanagar"
 vij_promo_trade:0 "Promotion du commerce"
 vij_promo_trade_desc:0 "Nos terres se trouvent sur l'une des routes commerciales clés d'Est en Ouest. Nous devons nous assurer que nos zones portuaires soient sûres et sécurisées afin que les capitaines en visite s'arrêtent sur nos terres et que nous puissions ainsi les taxer."
 arab_horses:0 "Chevaux arabes"
 arab_horses_desc:0 "Les chevaux de la péninsule arabique sont de loin supérieurs aux races locales. Nous utiliserons nos connexions commerciales pour nous assurer d'avoir un approvisionnement régulier de ces chevaux pour nos troupes."
 harsh_penal_code:0 "Code pénal sévère"
 harsh_penal_code_desc:0 "Le roi maintient la loi en tuant. Établissons un nouveau code pénal sévère et, plus important encore, assurons-nous qu'il soit appliqué afin que notre peuple puisse se sentir en sécurité dans notre royaume."
 vij_tolerance:0 "Tolérance"
 vij_tolerance_desc:0 "Nous devrions avoir un royaume où les hommes peuvent jouir d'une telle liberté qu'ils peuvent aller et venir et vivre selon leur propre croyance."
 carnatic_music:0 "Musique carnatique"
 carnatic_music_desc:0 "Nous devons résister à l'invasion musulmane sur tous les fronts. Les traditions musicales des États du Nord montrent déjà des signes d'influences étrangères. C'est un blasphème car nous savons tous que la musique est un art divin qui provient des Devas et Devis eux-mêmes. Nous montrerons au peuple hindou qui les défend."
 adroit_diplomacy:0 "Diplomatie habile"
 adroit_diplomacy_desc:0 "Les nombreux envahisseurs de notre peuple hindou ont démontré maintes et maintes fois la même faiblesse : la tendance à se battre entre eux. Nous devons être prêts en tout temps à exploiter cela à nos propres fins."
 army_for_city_of_victory:0 "Une armée pour la Cité de la Victoire"
 army_for_city_of_victory_desc:0 "Pour que la Cité de la Victoire soit digne de son nom, nous devons nous assurer d'avoir une armée qui nous apporte des victoires. Assurons-nous que nos troupes soient entraînées et tirent fierté de leur rôle."
 AYU_ideas:0 "Idées d'Ayutthaya"
 AYU_ideas_start:0 "Traditions d'Ayutthaya"
 AYU_ideas_bonus:0 "Ambition d'Ayutthaya"
 white_elephant:0 "Éléphant blanc"
 white_elephant_desc:0 "Nous avons acquis un éléphant blanc ; c'est un présage très auspicieux et nous l'utiliserons à notre avantage. Avec ce prestige, nous l'utiliserons pour remanier la bureaucratie gouvernementale. En particulier, nous séparerons les rôles militaires et gouvernementaux pour nous assurer que ceux qui collectent l'argent nous l'envoient."
 corvee_system:0 "Le système de corvée"
 corvee_system_desc:0 "Tous les hommes à l'âge de 18 ans doivent être enregistrés auprès de leur chef local et cette information doit être transmise au gouvernement. Chaque citoyen mâle est éligible pour servir dans l'armée (Phrai Thaan) et nous nous assurerons qu'ils le fassent si nécessaire."
 ayu_foreign_mercenaries:0 "Mercenaires étrangers"
 ayu_foreign_mercenaries_desc:0 "Nous avons récemment vu un afflux de barbares de terres étrangères ; certains sont des marchands mais certains sont des hommes de guerre. Utilisons-les dans nos armées."
 ayu_embassies:0 "Ambassades"
 ayu_embassies_desc:0 "De nombreux marchands exercent leur commerce dans les eaux près de nos terres. Ainsi, nous connaissons de nombreux royaumes lointains. Nous devrions envoyer des ambassades dans ces terres afin de savoir ce qui se passe dans le monde."
 trading_links:0 "Promotion des liens commerciaux"
 trading_links_desc:0 "Avec notre large éventail de contacts à travers le monde, nous pouvons répandre la nouvelle de la sécurité de notre pays si vous êtes marchand. Qu'ils viennent sur nos terres plutôt que chez d'autres et nous en récolterons les bénéfices."
 personal_executions:0 "Exécutions personnelles"
 personal_executions_desc:0 "Il est tout à fait approprié que les gens voient notre engagement envers la justice ; désormais, le roi lui-même exécutera personnellement les criminels les plus odieux. Ainsi, les gens sauront que notre royaume est ordonné."
 phrai_luang:0 "Phrai Luang"
 phrai_luang_desc:0 "Le roi a décrété que tous les hommes libres soumis au service phrai sont devenus phrai luang, directement liés au roi, qui a ensuite distribué leurs services aux gouverneurs locaux. Cela signifiait que le roi possédait les services de toutes les personnes, et toutes les terres."
 NOR_ideas:0 "Idées norvégiennes"
 NOR_ideas_start:0 "Traditions norvégiennes"
 NOR_ideas_bonus:0 "Ambition norvégienne"
 nor_fishing:0 "Pêche encouragée"
 nor_fishing_desc:0 "Avec notre long littoral et nos sols pauvres, nous devrions encourager notre peuple à faire fortune en récoltant les richesses des océans."
 natural_seamanship:0 "Art nautique naturel"
 natural_seamanship_desc:0 "Avec la croissance de la pêche, nous avons également vu une croissance du nombre de marins dans notre royaume. Nous devrions en tirer parti pour notre marine car l'art nautique est tout aussi important que le navire lui-même."
 nor_shipbuilding:0 "Construction navale militaire"
 nor_shipbuilding_desc:0 "L'expansion de l'industrie de la pêche a également conduit à une expansion de la construction navale. Nous avons un réservoir prêt de charpentiers navals formés à portée de main pour étendre notre propre construction navale."
 call_of_our_forefathers:0 "L'appel de nos ancêtres"
 call_of_our_forefathers_desc:0 "Il y a longtemps, nos illustres ancêtres ont navigué et établi des colonies dans le Nord. Nos sagas nous disent même qu'ils ont atteint un nouveau monde et établi le Vinland. Nous devons suivre leurs pas."
 pioneer_spirit:0 "Esprit pionnier"
 pioneer_spirit_desc:0 "Jadis, notre peuple bravait les hautes mers pour établir des colonies sur des rivages lointains. Rallumons cet esprit chez notre peuple pour qu'il le fasse à nouveau."
 seize_the_opportunity:0 "Saisir l'opportunité"
 seize_the_opportunity_desc:0 "Le monde est plein de richesses pour ceux qui ont la volonté de les prendre. Prenons ce que nous pouvons du monde par le commerce plutôt que par le raid."
 write_new_sagas:0 "Écrire de nouvelles sagas"
 write_new_sagas_desc:0 "Les esprits vifs préservent le savoir\n...Connu depuis des temps anciens\nChanté au coucher du soleil\n...Les sagas sont notre héritage\nEncouragées par l'établissement\nChaque pays aura la sienne."
 OMA_ideas:0 "Idées omanaises"
 OMA_ideas_start:0 "Traditions omanaises"
 OMA_ideas_bonus:0 "Ambition omanaise"
 association_with_unbelievers:0 "Association avec les incroyants"
 association_with_unbelievers_desc:0 "Il y a ceux qui estiment que nous ne devrions pas du tout nous associer aux incroyants. Nous avons fait beaucoup pour réprimer cela, car c'est seulement en nous associant aux incroyants que nous pourrons commercer avec eux."
 local_merchant_preference:0 "Préférence pour les marchands locaux"
 local_merchant_preference_desc:0 "Théoriquement, un marchand peut être citoyen du monde, naviguant vers et depuis n'importe quels ports qui lui plaisent. Nous allons donner des avantages aux marchands locaux, par exemple la priorité pour le chargement et le déchargement des cargaisons, pour nous assurer que nos marchands aient toutes les incitations à ramener leurs produits chez nous."
 port_security_improvement:0 "Améliorations de la sécurité portuaire"
 port_security_improvement_desc:0 "Pour gagner de l'argent grâce au commerce, nous avons besoin que les cargaisons soient amarrées en toute sécurité dans nos ports. Nous devons nous assurer que les zones où les marchands se fréquentent soient des zones exemptes de petite criminalité."
 secured_timber_supplies:0 "Sécuriser les approvisionnements en bois"
 secured_timber_supplies_desc:0 "La péninsule arabique est célèbre pour beaucoup de choses ; ses forêts luxuriantes et verdoyantes n'en font pas partie. Pour que nous soyons la première puissance commerciale de l'océan Indien, nous devons nous assurer d'avoir des approvisionnements réguliers de bois importé dans nos ports pour soutenir la construction navale."
 end_of_shipbuilding_guilds:0 "Fin des corporations de construction navale"
 end_of_shipbuilding_guilds_desc:0 "Aussi longtemps que des navires ont été construits dans la péninsule arabique, il y a eu des corporations qui le contrôlent. Bien qu'elles aient pu rendre un service précieux en maintenant les traditions de construction navale en vie, elles sont maintenant un obstacle au progrès. Nous devons ouvrir la construction navale à tous les talents."
 skilled_captains:0 "Capitaines compétents"
 skilled_captains_desc:0 "Nous devons nous assurer que nos capitaines aient les plus hauts standards d'art nautique et de connaissances nautiques. En nous assurant qu'ils seront capables d'utiliser chaque avantage de maniabilité dans toutes les situations."
 expansion_of_trade_contacts:0 "Expansion des contacts commerciaux"
 expansion_of_trade_contacts_desc:0 "Nous devons nous assurer que nos marchands soient toujours bienvenus partout où ils vont. Ainsi, nous utiliserons tous les moyens possibles pour nous assurer que tous les dirigeants dont nous avons entendu parler accueillent nos marchands."
 KOR_ideas:1 "Idées coréennes"
 KOR_ideas_start:1 "Traditions coréennes"
 KOR_ideas_bonus:1 "Ambition coréenne"
 hanguel_alphabet:2 "L'Alphabet Hangeul"
 hanguel_alphabet_desc:0 "La langue coréenne est si fondamentalement différente du chinois que l'usage des caractères chinois rend illettrés tous ceux qui ne sont pas les plus hautement éduqués. Notre nouvel alphabet permettra à tout notre peuple de savoir lire et écrire."
 grand_code:0 "Grand Code d'Administration de l'État"
 grand_code_desc:0 "Afin d'assurer un gouvernement stable et approprié, nous codifierons précisément le fonctionnement de l'État. Ce sera la première constitution écrite de la Corée."
 hyanyak_system:0 "Système Hyang'yak"
 hyanyak_system_desc:0 "L'agriculture étant le socle de notre économie, la gestion des villages est primordiale. Nous établirons un système d'autogouvernance villageoise pour encourager l'esprit communautaire."
 geobukseon:0 "Geobukseon"
 geobukseon_desc:0 "La défense de notre littoral est capitale, et c'est dans ce but que nous avons développé le navire-tortue. Ces béhémoths lourdement blindés garantiront que nos flottes puissent protéger nos côtes."
 hopae_system:0 "Le Système Hopae"
 hopae_system_desc:0 "Le système Hopae est un système d'identification exigeant que tout Coréen porte une plaque indiquant son nom, son lieu de naissance, son statut et son lieu de résidence. Cela facilitera l'identification des personnes et leur localisation."
 kyujanggak:0 "Le Kyujanggak"
 kyujanggak_desc:0 "Pour assister l'administration de la Corée, nous créerons une immense bibliothèque royale servant de dépôt du savoir. Ainsi, nous chercherons à faire progresser la grande culture coréenne."
 kor_economy_reform:0 "Réforme économique"
 kor_economy_reform_desc:0 "Nous avons besoin d'une réforme globale du système fiscal et d'une ouverture des postes aux talents, afin que même les fils de concubines puissent gravir les échelons. Ces réformes rapporteront davantage d'argent à l'État."
 kor_uijeongbu:0 "Uijeongbu"
 kor_uijeongbu_desc:0 "L'Uijeongbu est le conseil d'État de la Corée et la plus haute instance du gouvernement. Dirigé par trois officiers, les Hauts Conseillers d'État, l'Uijeongbu est chargé de délibérer sur les nombreuses affaires de l'État."
 metal_movable_type:0 "Caractères Mobiles Métalliques"
 metal_movable_type_desc:0 "Les caractères mobiles sont une ancienne technologie d'impression utilisée pour la première fois par les Chinois il y a plusieurs siècles. Mais c'est l'ancienne dynastie de Goryeo qui utilisa les premiers caractères métalliques mobiles en 1377. Depuis lors, nous possédons le savoir pour imprimer des livres avec une efficacité sans pareille."
 choi_mu_seon_gunpower_engines:0 "Engins à Poudre de Choi Mu-seon"
 choi_mu_seon_gunpower_engines_desc:0 "Choi Mu-seon était un scientifique, inventeur, commandant militaire et père littéraire de la poudre à canon coréenne. Il acquit la connaissance de la production de poudre chinoise et la perfectionna durant les dernières années de la dynastie Joseon. Sa contribution à l'armée reste d'un grand service en Corée."
 korean_artisanery:0 "Artisanat coréen"
 korean_artisanery_desc:0 "L'art possède une longue tradition dans notre État. Ayant connu son âge d'or durant la dynastie Goryeo, l'artisanat de la péninsule coréenne demeure l'une des parties les plus honorées de notre culture."
 BOH_ideas:0 "Idées bohémiennes"
 BOH_ideas_start:0 "Traditions bohémiennes"
 BOH_ideas_bonus:0 "Ambition bohémienne"
 compacta_of_prague:0 "Compacts de Prague"
 compacta_of_prague_desc:0 "Les guerres hussites sont terminées et il est temps d'unir la nation. Que tout soit pardonné afin que le peuple tchèque puisse vivre en paix."
 boh_elective_monarchy:0 "Monarchie élective"
 boh_elective_monarchy_desc:0 "Depuis trop longtemps, la noblesse querelleuse de Bohême constitue un immense obstacle à l'autorité royale. Désormais, nous veillerons à ce que chaque nouveau monarque bénéficie du plein soutien des nobles avant son couronnement. Cela devrait éviter tout problème."
 wagenburg:0 "Wagenburg"
 wagenburg_desc:0 "Durant les guerres hussites, nos armées s'appuyaient sur des forteresses de chariots, qui nous permettaient de remporter des batailles que nous aurions dû perdre. Même si nous n'utilisons pas toujours de chariots, l'emploi de tireurs d'élite d'infanterie depuis des positions défensives deviendra la tactique de choix pour nos armées tchèques toujours invincibles."
 letter_of_majesty:0 "Lettre de Majesté"
 letter_of_majesty_desc:0 "Les guerres hussites ont laissé un héritage de divisions dangereuses sur les questions ecclésiastiques dans les terres tchèques. Si la Bohême doit prospérer, nous devons mettre fin à ce conflit diviseur et ramener l'ordre dans nos terres. Nous promulguerons une lettre de majesté dans nos royaumes accordant la liberté de conscience à tous."
 hussite_legacy:0 "Héritage hussite"
 hussite_legacy_desc:0 "Tandis que l'Église de Rome devient de plus en plus réactionnaire face aux défis théologiques, nous en Bohême sommes bien plus détendus à ce sujet. Cela nous rend plus ouverts aux idées nouvelles."
 kutnohorian_deal:0 "L'Accord de Kutná Hora"
 kutnohorian_deal_desc:0 "La noblesse restera toujours sensible concernant ses prérogatives, nous devons donc garantir que ses privilèges soient assurés à jamais."
 czech_nationalism:0 "Nationalisme tchèque"
 czech_nationalism_desc:0 "Le peuple tchèque a survécu à tout ce que le monde lui a infligé, nous avons prouvé notre résilience."
 ITA_ideas:0 "Idées italiennes"
 ITA_ideas_start:0 "Traditions italiennes"
 ITA_ideas_bonus:0 "Ambition italienne"
 no_a_geographical_construct:0 "Plus qu'une Expression Géographique"
 no_a_geographical_construct_desc:0 "Depuis la chute de l'Empire d'Occident, l'Italie a été dominée par des puissances étrangères et divisée en de nombreuses parties. Ces puissances qui nous dominaient ricanaient à l'idée d'une Italie unie. Eh bien, qui rit maintenant ? L'Italie s'est relevée."
 tradition_of_the_legion:0 "La Tradition des Légions"
 tradition_of_the_legion_desc:0 "À l'époque romaine, l'Italie dominait tout ce qui méritait d'être dominé dans le monde. L'Italie s'est relevée une fois encore et il est temps que les légions marchent à nouveau. Nos soldats seront constamment rappelés à la tradition de victoire dont ils ont hérité et régulièrement entraînés pour les aider à l'émuler. Les Mules de Marius reprendront le champ de bataille."
 mare_nostrum:0 "Mare Nostrum"
 mare_nostrum_desc:0 "L'Italie possède un long littoral vulnérable. Le protéger est notre plus haute priorité. Nous devons être comme Pompée le Grand et dominer ces mers pour que l'Italie soit en sécurité."
 office_of_censor:0 "L'Office des Censeurs"
 office_of_censor_desc:0 "Aux grands jours de la République romaine, les Censeurs avaient pour devoir de tenir une liste des citoyens aptes au service militaire. Nous aurons à nouveau des censeurs dont la tâche sera d'évaluer qui pourrait servir dans les nouvelles Légions."
 italian_tax_reform:0 "Réforme Fiscale Italienne"
 italian_tax_reform_desc:0 "L'Empire d'Occident cessa d'être efficace quand il n'eut plus la base fiscale pour soutenir ses armées. Nous devons nous assurer que cela n'arrive pas à la Nouvelle Rome qui a surgi tel un phénix des cendres de l'ancienne."
 heir_to_the_empire:0 "Héritière de l'Empire"
 heir_to_the_empire_desc:0 "L'Empire d'Anbennar a échoué à reprendre le manteau de l'Empire d'Occident, il est temps pour l'Italie de reprendre le flambeau et de refonder le grand Empire."
 path_to_citizenship:0 "Le Chemin vers la Citoyenneté"
 path_to_citizenship_desc:0 "La force de l'Empire romain était sa capacité à donner à ceux qu'il gouvernait l'envie de faire partie de l'Empire. Nous émulerons ce système pour que ceux qui font partie de nos domaines cherchent à devenir partie intégrante de notre empire."
 MCH_ideas:0 "Idées mandchoues"
 MCH_ideas_start:0 "Traditions mandchoues"
 MCH_ideas_bonus:0 "Ambition mandchoue"
 united_three_jurchens:0 "Unification des Trois Jurchens"
 united_three_jurchens_desc:0 "En unissant les trois tribus de Haixi, Jianzhou et des Jurchens Sauvages, nous pouvons fonder une véritable dynastie dominant la Mandchourie."
 the_manchu_alphabet:0 "Alphabet mandchou"
 the_manchu_alphabet_desc:1 "L'écriture jurchen créée par l'Empereur Aguda est perdue. Notre peuple doit utiliser des scribes mongols pour consigner chaque document, tandis que les Chinois Han et les Mongols illettrés pouvaient comprendre leurs langues respectives lues à voix haute. En convertissant et adaptant l'alphabet mongol, le nouvel alphabet mandchou sera adapté au peuple mandchou et facilitera l'administration."
 manchu_eight_banners:0 "Les Huit Bannières"
 manchu_eight_banners_desc:0 "En combinant notre armée tribale avec le système traditionnel de compagnies Niru, la force hautement organisée et centralisée des Huit Bannières est créée."
 link_with_the_mongol_dynasty:0 "Liens avec la Dynastie Mongole"
 link_with_the_mongol_dynasty_desc:1 "Épouser la princesse Borjigin de la Mongolie Chahar nous permet de commander plus facilement les redoutables cavaliers mongols."
 the_green_standard_army:0 "L'Armée de l'Étendard Vert"
 the_green_standard_army_desc:1 "Enrôlons les soldats et officiers mécontents de l'Armée Ming et établissons l'Armée de l'Étendard Vert pour maintenir le contrôle de nos territoires conquis."
 pigtail_or_death:0 "La Natte ou la Mort"
 pigtail_or_death_desc:0 "En exécutant les gens qui refusent de se raser les cheveux sur le devant de la tête et de tresser le reste en natte, la supériorité et la domination mandchoues sur tous les peuples conquis sont continuellement démontrées et rappelées même en temps de paix, ainsi nul n'osera se rebeller contre nous."
 the_chinese_rules:0 "Les Lois chinoises"
 the_chinese_rules_desc:1 "La manière chinoise d'administrer une nation est efficace et digne d'étude. En adoptant les lois chinoises et en intégrant les Mandchous dans les systèmes chinois, nous pourrons gouverner notre empire plus facilement."
 PAL_ideas:0 "Idées palatines"
 PAL_ideas_start:0 "Traditions palatines"
 PAL_ideas_bonus:0 "Ambition palatine"
 imperial_vicar_and_archsteward:0 "Vicaire Impérial et Archi-Intendant"
 imperial_vicar_and_archsteward_desc:0 "En tant que Vicaire Impérial et Archi-Intendant héréditaire de l'Empire d'Anbennar, nous jouissons de la bonne réputation conférée par notre rang impérial."
 heidelberg_university:0 "Université de Heidelberg"
 heidelberg_university_desc:0 "La Ruprecht-Karls-Universität Heidelberg est la plus ancienne université d'Allemagne. Elle a attiré des érudits de tout le continent et s'est développée en un centre culturel et académique. Grâce à cela, il nous est bien plus facile de découvrir des personnes de talent exceptionnelles et de les engager à notre cour."
 center_of_reformation_in_southern_germany:0 "Centre de la Réforme en Allemagne du Sud"
 center_of_reformation_in_southern_germany_desc:0 "Notre royaume est l'un des centres importants de la réformation religieuse et nous devons tirer avantage de cette position. En soutenant les factions réformatrices dans d'autres pays, nous pouvons affaiblir nos rivaux et ainsi nous renforcer..."
 bibliotheca_palatina:0 "Bibliotheca Palatina"
 bibliotheca_palatina_desc:0 "En unissant les collections de livres de la Stiftsbibliothek de l'Église du Saint-Esprit, de la Bibliothèque de l'Université de Heidelberg et d'autres bibliothèques de nos châteaux et de l'Abbaye de Lorsch, nous avons fondé la Bibliotheca Palatina, la bibliothèque la plus importante de la Renaissance allemande. Avec une telle réserve extraordinaire de connaissances, il est certain que la science et la philosophie progresseront plus vite dans nos terres."
 heidelberg_catechism:0 "Catéchisme de Heidelberg"
 heidelberg_catechism_desc:0 "Pour l'enseignement de la doctrine chrétienne réformée, le document confessionnel du Catéchisme de Heidelberg est publié sous notre commission. Le Catéchisme est adopté comme l'une des Trois Formes d'Unité par l'Église Réformée. Cet accomplissement nous aidera certainement à convertir davantage de personnes à la foi réformée."
 hortus_palatinus:0 "Hortus Palatinus"
 hortus_palatinus_desc:0 "Le Jardin du Palatinat fut commandé par Frédéric V, Électeur Palatin, en 1614, et devint bientôt célèbre à travers le continent comme la Huitième Merveille du Monde et le plus grand jardin Renaissance d'Allemagne."
 mannheim_school_of_orchestra:0 "École d'Orchestre de Mannheim"
 mannheim_school_of_orchestra_desc:0 "Nos seigneurs ont toujours été parmi les plus célèbres mécènes des arts, en particulier de l'orchestre. Sous notre patronage, Johann Stamitz et d'autres talents ont fondé la célèbre école de Mannheim."
 NOV_ideas:0 "Idées novgorodiennes"
 NOV_ideas_start:0 "Traditions novgorodiennes"
 NOV_ideas_bonus:0 "Ambition novgorodienne"
 northern_center_of_arts:0 "Centre Septentrional des Arts"
 northern_center_of_arts_desc:0 "La cité de Novgorod est un important centre culturel en Europe. Les récits épiques fondés sur un haut niveau d'alphabétisation, les belles icônes et les architectures grandioses accroissent le prestige de notre cité florissante et de la nation entière."
 city_of_churches:0 "Cité des Églises"
 city_of_churches_desc:0 "Plus de 80 églises orthodoxes à Novgorod, en particulier la Cathédrale Sainte-Sophie, comptent parmi les plus grands propriétaires terriens de la principauté. Avec leur richesse et leur prestige religieux, les Églises influencent la population dans de nombreux domaines, et nos citoyens sont plus pieux, d'une bonne manière."
 ivans_hundred:0 "La Centaine d'Ivan"
 ivans_hundred_desc:0 "Les chefs de la Centaine d'Ivan, notre guilde marchande locale, sont membres permanents du tribunal de commerce de Novgorod et du conseil dirigeant de la République de Novgorod. Avec leur présence en politique et les accords conclus entre eux et les nobles, le succès commercial de notre nation est assuré de perdurer."
 control_of_the_hanseatic_kontor:0 "Contrôle du Comptoir Hanséatique"
 control_of_the_hanseatic_kontor_desc:0 "Peterhof est une zone fermée de Novgorod où les marchands hanséatiques jouissent de privilèges commerciaux. Si nous pouvons accroître notre contrôle sur ces négociants indépendants, le commerce en mer Baltique sera encore plus facile et plus profitable."
 grand_dukes_army:0 "L'Armée du Grand-Duc"
 grand_dukes_army_desc:0 "Commander les troupes est le devoir le plus important du grand-duc. Sous sa forte autorité, nous pouvons mobiliser davantage de soldats."
 exploration_tradition:0 "Financer les Ouchkouïniks"
 exploration_tradition_desc:0 "Les pirates Ouchkouïniks, semblables aux Vikings, étaient un outil utile pour réprimer nos concurrents. Malheureusement, cela a été stoppé à cause d'une intervention étrangère, principalement de Moscou. Nous devrions recommencer à les financer et pousser ces activités de piraterie vers des mers plus lointaines pour rappeler à tous qui est le véritable maître du nord..."
 baltic_shipyard:0 "Chantier Naval de la Baltique"
 baltic_shipyard_desc:0 "Construisons un grand chantier naval sur la côte orientale de la mer Baltique et dominons le commerce maritime !"
 ETH_ideas:0 "Idées éthiopiennes"
 ETH_ideas_start:0 "Traditions éthiopiennes"
 ETH_ideas_bonus:0 "Ambition éthiopienne"
 solomonid_claim:0 "Revendication Salomonide"
 solomonid_claim_desc:0 "Les ancêtres de nos souverains descendent des monarques d'Axoum, de la lignée du Roi Salomon et de la Reine de Saba. Nous avons déposé les monarques Zagwé afin de légitimer notre règne et d'établir fermement que le royaume est restauré à sa dynastie légitime."
 nagusa_negast:0 "Negusa Nagast"
 nagusa_negast_desc:0 "Notre souverain est le roi des rois, l'héritier du lignage des rois d'Axoum ainsi que du premier souverain, Ménélik Ier, le fils du Roi Salomon et de la Reine de Saba. Tous nos rois descendent des Salomonides et la lignée de succession n'a pas besoin d'être de père en fils."
 hostile_borders:0 "Frontières Hostiles"
 hostile_borders_desc:0 "Notre grand royaume a été soumis à de nombreuses invasions étrangères et actions agressives. Nous avons repoussé de nombreuses tentatives de nos rivaux et ennemis pour s'emparer de notre antique royaume."
 diplomatic_demeanor:0 "Conduite Diplomatique"
 diplomatic_demeanor_desc:0 "Malgré les desseins de nos ennemis et rivaux sur notre nation, et parce que nous sommes la seule nation chrétienne entourée d'une mer d'infidèles, d'hérétiques et de polythéistes, nous sommes souvent au centre des intrigues politiques occidentales et orientales. Par conséquent, nous sommes disposés à faire des compromis pour obtenir un résultat plus favorable pour notre royaume."
 the_ark_of_the_covenant:0 "L'Arche d'Alliance"
 the_ark_of_the_covenant_desc:0 "Nous sommes la seule nation à abriter la sacrée Arche d'Alliance, après qu'elle fut emportée en secret par Ménélik Ier avec l'assistance divine il y a des milliers d'années. Elle est cachée à la vue du public, de peur qu'ils ne tentent de voler notre trésor national sacré. Des répliques de l'Arche sont placées dans chacune de nos églises pour rappeler que notre royaume est béni par Dieu."
 eth_expansionist_policy:0 "Politique Expansionniste"
 eth_expansionist_policy_desc:0 "Afin de sécuriser notre emprise sur nos terres, nous devons étendre notre hégémonie au-delà de notre domaine, les Hauts Plateaux éthiopiens. Nos ennemis autour de nous devraient apprendre à craindre les successeurs du Roi Salomon et les véritables gardiens de l'Arche d'Alliance."
 eth_reformed_armies:0 "Armées Réformées"
 eth_reformed_armies_desc:0 "Nos guerriers étaient souvent indisciplinés et se ruaient au combat sans aucune précaution. En adaptant les tactiques et méthodes de combat de nos voisins plus avancés, nous sommes capables de tenir la ligne et de combattre sur un pied d'égalité face à nos ennemis."
 DAI_ideas:0 "Idées du Dai Viêt"
 DAI_ideas_start:0 "Traditions du Dai Viêt"
 DAI_ideas_bonus:0 "Ambition du Dai Viêt"
 the_great_proclamation:0 "La Grande Proclamation"
 the_great_proclamation_desc:0 "Cette proclamation, Bình Ngô đại cáo, Grande Proclamation sur la Pacification des Wu, était un édit écrit en chinois classique par Nguyen Trãi, un ami proche de notre libérateur, Lê Lợi, en 1428. Elle annonce la pacification totale de nos anciens suzerains chinois Ming alors qu'ils acceptaient notre indépendance. Elle frapperait de terreur les cœurs des empereurs Ming, car ils ont échoué à honorer l'héritage de leur ancêtre, Zhu Yuanzhang, l'ancien Roi de Wu et fondateur de la dynastie Ming. Elle montre également nos traditions, notre ténacité et rappelle constamment que la droiture triomphe toujours. Elle est non seulement hautement appréciée pour invoquer la fierté nationale dans notre patrie, mais aussi connue pour ses qualités littéraires éloquentes."
 confucian_revival:0 "Renouveau Confucéen"
 confucian_revival_desc:0 "Après vingt ans de domination chinoise Ming, nous avons connu de nombreux bouleversements dans notre société. Après notre indépendance et reconnaissance par la Chine, nous avons institué de nombreux changements au niveau bureaucratique, incluant une réforme du système de fonction publique et du code juridique. Le nouveau gouvernement s'est avéré juste et efficace et représente une adaptation réussie du système confucéen chinois de gouvernement en dehors de la Chine."
 autonomous_villages:0 "Villages Autonomes"
 autonomous_villages_desc:0 "Bien que notre administration soit hiérarchisée et structurée, la bureaucratie ne s'étend pas au niveau villageois, car la plupart des villages sont gérés par des chefs de village et sont autonomes. En déléguant de nombreuses affaires domestiques aux villages eux-mêmes, nous pouvons nous concentrer davantage sur la défense de nos terres contre nos rivaux et ennemis. Nous pouvons garantir que nous maintenons le Mandat du Ciel, car les lois de l'empereur cèdent devant les coutumes du village."
 village_militia:0 "Milice Villageoise"
 village_militia_desc:0 "L'épine dorsale de notre armée est la paysannerie dévouée qui a servi à défendre nos frontières et a aidé à repousser les envahisseurs, contribuant même à de nombreuses victoires contre les Mongols, les Chinois et plus tard les Mandchous, ainsi qu'à notre conquête de la majeure partie de l'Indochine."
 don_dien:0 "Đồn Điền"
 don_dien_desc:0 "Ce système de colonisation agraire d'origine chinoise servait à occuper et arracher des provinces à nos rivaux voisins au sud et à l'ouest. Sous ce système, des colonies militaires étaient établies dans lesquelles soldats et paysans sans terre défrichaient une nouvelle zone et commençaient la production de riz sur la nouvelle terre. Ensuite, un village était établi autour de cette nouvelle zone et les soldats et paysans servaient de milice pour le défendre. Après trois ans, le village était incorporé au système administratif vietnamien, et une maison de réunion villageoise communale était construite. Les travailleurs avaient l'opportunité de partager les terres communales données par l'État à chaque village, le reste des terres appartenant à l'État. À mesure que chaque zone était défrichée et que de nouveaux villages étaient établis de cette manière, les soldats et paysans sans terre avançaient pour occuper et coloniser davantage de terres."
 thuan_thien:0 "Thuận Thiên"
 thuan_thien_desc:0 "Thuận Thiên, ou Volonté du Ciel, est le nom de l'épée légendaire maniée par notre libérateur, Lê Lợi. Car lorsqu'il brandissait l'épée, elle lui donnait la force de mille hommes pour finalement secouer le joug de la domination chinoise. Lê Lợi est considéré comme l'incarnation parfaite du dirigeant confucéen idéal, qui est juste, sage et capable. Tous les empereurs après Lê Lợi ont été mesurés à son standard et la plupart ont été trouvés insuffisants. Nos empereurs s'efforcent d'atteindre les idéaux du gouvernement confucéen, et l'ont fait contre toute attente pour honorer l'héritage de nos ancêtres. En implémentant profondément les principes confucéens dans notre gouvernement et en veillant à ce que le pays soit en harmonie en suivant tous les rituels appropriés du confucianisme, nous avons pleinement maintenu le Mandat du Ciel. Par conséquent, aucun prétendant rival ne peut oser contester notre règne car nous avons pleinement affirmé notre légitimité."
 literary_reform:0 "Réforme Littéraire"
 literary_reform_desc:0 "Pendant des siècles, nous avons utilisé le chinois classique pour écrire nos documents. Cependant, l'écriture utilisée pour écrire notre langue est le Chữ Nôm, une écriture native basée sur le Chữ Hán, l'écriture du chinois classique. Le Chữ Nôm n'était pas standardisé et peu utilisé comparé au chinois classique, d'où un besoin urgent de réforme pour nationaliser l'écriture à des fins administratives."
 SAV_ideas:0 "Idées savoyardes"
 SAV_ideas_start:0 "Traditions savoyardes"
 SAV_ideas_bonus:0 "Ambition savoyarde"
 repel_the_french:0 "Repousser les Français"
 repel_the_french_desc:0 "Cette terre a appartenu à la Maison de Savoie depuis qu'Humbert Ier prit le titre en 1032, mais les Français ont longtemps rêvé de suprématie italienne, et le chemin vers leur ambition passe directement par nos terres. Nous devons être prêts s'ils reviennent."
 the_shroud_of_turin:0 "Le Saint-Suaire de Turin"
 the_shroud_of_turin_desc:0 "Le linceul du Christ lui-même fut trouvé dans nos terres en l'an 1390 et depuis lors est demeuré l'artéfact le plus précieux de la Maison de Savoie. Exposons le Saint-Suaire de Turin et regardons les pèlerins affluer vers le Piémont, apportant leur richesse avec eux."
 sav_mercenary_tradition:0 "Tradition Mercenaire"
 sav_mercenary_tradition_desc:0 "Comme d'autres États italiens, nos petits domaines sont souvent contraints de s'appuyer sur des mercenaires en complément ou même en remplacement de notre armée régulière. Bien qu'ils soient des personnages peu recommandables, une relation à long terme fait des merveilles pour les dépenses."
 crush_the_vaudois:0 "Écraser les Vaudois"
 crush_the_vaudois_desc:0 "La Réforme fait peut-être rage dans toute la Chrétienté, mais dans nos terres un mouvement bien plus ancien nous menace : l'hérésie médiévale des Vaudois. Mettre les Vaudois à leur place apaisera les tensions religieuses dans nos terres."
 savoyard_flexibility:0 "Flexibilité Savoyarde"
 savoyard_flexibility_desc:0 "La Maison de Savoie n'a pas gouverné cette terre depuis le XIe siècle en ignorant le changement ; au contraire, nous avons développé une réputation d'opportunistes éhontés, toujours avides de trouver quelque nouvelle ouverture pour faire avancer notre État. Bien que répugnant aux yeux des traditionalistes, l'opportunisme a ses avantages."
 alpine_tolls:0 "Péages Alpins"
 alpine_tolls_desc:0 "Avoir un petit nombre de passages utilisables dans nos terres nous permet de taxer tout marchand essayant de traverser nos frontières le long des routes commerciales."
 savoyard_legitimacy:0 "Légitimité Savoyarde"
 savoyard_legitimacy_desc:0 "Notre ancêtre, Humbert aux Blanches Mains, fut créé Comte de Savoie par l'Empereur Henri II, à l'époque où la dynastie ottonienne régnait encore sur l'Empire. De nombreuses autres dynasties sont tombées en chemin, pourtant la Maison de Savoie d'Humbert perdure."
 SAX_ideas:0 "Idées saxonnes"
 SAX_ideas_start:0 "Traditions saxonnes"
 SAX_ideas_bonus:0 "Ambition saxonne"
 albertine_and_ernestine:0 "Lignées Albertine et Ernestine"
 albertine_and_ernestine_desc:0 "La dynastie Wettin avait deux branches majeures et une pléthore de branches mineures, et si l'une ne pouvait fournir d'héritier, les autres le feraient."
 meissner_porcelain:0 "Porcelaine de Meissen"
 meissner_porcelain_desc:0 "La Saxe fut le premier producteur européen de porcelaine, ce qui apporta richesse et prestige à la cour des Wettin."
 the_zwinger:0 "Le Zwinger"
 the_zwinger_desc:0 "Le Zwinger est un grand palais de Dresde, où de grandioses festins pouvaient être organisés pour impressionner les dignitaires étrangers."
 wittenberg_university:0 "Université de Wittenberg"
 wittenberg_university_desc:0 "L'université saxonne de Wittenberg est surtout célèbre pour avoir accueilli et protégé Martin Luther, et servit de point focal pour la pensée protestante."
 corpus_evangelicorum:0 "Corpus Evangelicorum"
 corpus_evangelicorum_desc:0 "La Saxe était un membre dirigeant des diverses ligues protestantes pour maintenir l'indépendance religieuse luthérienne, aboutissant au Corpus Evangelicorum sous domination saxonne."
 sax_principal_line:0 "La Lignée Principale"
 sax_principal_line_desc:0 "Le Duché de Saxe fut divisé de nombreuses fois, mais chaque lignée collatérale qui s'éteignait rendait sa richesse à la lignée principale."
 the_saxon_circle:0 "Le Cercle de Saxe"
 the_saxon_circle_desc:0 "La Saxe et la Prusse partageaient une position dans le Cercle de Haute-Saxe du Saint-Empire Romain, et quand l'armée impériale était assemblée, ils marchaient comme un seul homme. Cela garantit qu'une certaine discipline prussienne déteigne sur les troupes saxonnes."
 LIT_ideas:0 "Idées lituaniennes"
 LIT_ideas_start:0 "Traditions lituaniennes"
 LIT_ideas_bonus:0 "Ambition lituanienne"
 warlord_dukes:0 "Ducs Guerriers"
 warlord_dukes_desc:0 "En deux siècles remarquables de guerre acharnée, les ducs guerriers lituaniens ont réussi à unifier en un véritable État guerrier un pays qui n'était auparavant qu'une fédération lâche de tribus, à monter une résistance contre l'agression des ordres saints catholiques et à conquérir de vastes étendues de territoire à l'Est. Nos chefs militaires sont inspirés par ces accomplissements."
 auksine_laisve:0 "Auksinė Laisvė"
 auksine_laisve_desc:0 "Auksinė Laisvė, en lituanien Liberté Dorée, est un ensemble de lois et de privilèges qui place les nobles du pays au-dessus des autres classes, et souvent même au-dessus du pouvoir du monarque et du parlement. Arrivé en Lituanie depuis la Pologne, ce système unique augmentera leur loyauté envers la couronne, tant que le monarque ne tente pas de revenir sur la promesse de maintenir l'état doré de liberté pour la noblesse."
 magdeburg_laws:0 "Lois de Magdebourg"
 magdeburg_laws_desc:0 "L'une des conséquences de la dérive de la Lituanie vers l'ouest est l'introduction des lois urbaines allemandes dans de nombreuses zones urbaines du pays. Les lois de Magdebourg sous leur forme locale personnalisée régiront de nombreux aspects économiques et politiques de l'urbanisation du pays, de la planification urbaine au commerce et à la fiscalité."
 magnate_estates:0 "Domaines des Magnats"
 magnate_estates_desc:0 "Les magnats de Lituanie sont appelés « petits rois » pour leurs vastes domaines et armées privées. Défendant l'indivisibilité de leurs domaines et cherchant à maximiser leurs profits, ils développeront un système ressemblant à bien des égards à celui des latifundia de la Rome antique."
 lithuanian_hussars:0 "Hussards Lituaniens"
 lithuanian_hussars_desc:0 "Les Hussards Ailés sont la cavalerie lourde de la Lituanie autant que de la Pologne. Introduits dans les deux pays par les réformes d'Étienne Báthory, Roi de Pologne et Grand-Duc de Lituanie, ils resteront invaincus sur les champs de bataille d'Europe orientale pendant plus d'un siècle."
 statutes_of_lithuania:0 "Statuts de Lituanie"
 statutes_of_lithuania_desc:0 "Les Statuts de Lituanie sont un ensemble de trois réformes juridiques différentes qui rassemblent, unifient et mettent à jour les lois du royaume. Connus pour leurs châtiments sévères et l'introduction de la peine de mort, ils sont en ligne avec de nombreux codes pénaux occidentaux contemporains. Chaque crime est censé être puni de la même manière quelle que soit la classe de la personne qui le commet, mais en pratique de nombreux désavantages pour la paysannerie seront maintenus. Les Statuts lituaniens inspireront plus tard une réforme similaire en Russie."
 lithuanian_renaissance:0 "Renaissance Lituanienne"
 lithuanian_renaissance_desc:0 "La Lituanie connaît une Renaissance à la fin du XVe et au début du XVIe siècle. Inspirés par les idées de la Réforme et les influences italiennes, l'éducation, les arts, l'architecture et la littérature s'épanouiront durant cette ère. La langue lituanienne sera formulée sous sa forme écrite et les premières œuvres de littérature lituanienne seront créées."
 berber_ideas:0 "Idées berbères"
 berber_ideas_start:0 "Traditions berbères"
 berber_ideas_bonus:0 "Ambition berbère"
 ber_barbary_pirates:0 "Pirates Barbaresques"
 ber_barbary_pirates_desc:0 "Les pirates barbaresques étaient des pirates et corsaires qui opéraient depuis le nord de Sarhal, basés principalement dans les ports de Tunis, Tripoli et Alger. Le patronage de ces endurcis pillards des mers nous permettra de déployer une grande flotte."
 desert_warfare:0 "Guerre du Désert"
 desert_warfare_desc:0 "Les armées berbères étaient expertes en guérilla, utilisant pleinement le terrain inhospitalier du nord de Sarhal pour épuiser leurs adversaires avant de porter le coup fatal."
 trans_saharan_trade:0 "Commerce Transsaharien"
 trans_saharan_trade_desc:0 "Les caravanes des grandes routes sahariennes échangeaient le sel du nord de Sarhal contre des esclaves et de l'or des royaumes subsahariens. Bien que les routes aient décliné après l'établissement du commerce portugais en Sarhal occidental, elles restèrent une importante source de revenus jusqu'au XIXe siècle."
 corsairs:0 "Corsaires"
 corsairs_desc:0 "Comme de nombreux peuples côtiers à travers l'histoire, les Berbères complétaient la pêche et l'agriculture par la piraterie. Cela signifiait que les dirigeants du nord de Sarhal disposaient d'un large bassin d'hommes expérimentés dans lequel puiser lorsqu'ils avaient besoin de marins pour leurs flottes."
 tuareg_cavalry:0 "Cavalerie Touareg"
 tuareg_cavalry_desc:0 "Les guerriers touaregs montés sur des chameaux et armés de lances se sont avérés être une menace efficace contre la cavalerie régulière, en raison de l'effet désorientant et effrayant des chameaux sur les chevaux."
 dual_diplomacy:0 "Diplomatie Duale"
 dual_diplomacy_desc:0 "Les Sultans du nord de Sarhal pratiquaient une politique d'allégeances changeantes, s'alliant avec le Sultan ottoman un moment et avec les Chrétiens d'Ibérie le suivant, le tout dans le but de préserver leur indépendance."
 brothers_barbarossa:0 "Les Frères Barberousse"
 brothers_barbarossa_desc:0 "Corsaires au service du Sultan ottoman, Khayr ad-Din et Aruj Barberousse terrorisèrent la Divenhal chrétienne au début du XVIe siècle, battant l'Espagne dans de nombreux engagements navals grâce à leur utilisation efficace de la guerre de galères."
 indian_muslim_ideas:0 "Idées du Sultanat Indien"
 indian_muslim_ideas_start:0 "Traditions du Sultanat Indien"
 indian_muslim_ideas_bonus:0 "Ambition du Sultanat Indien"
 tolerate_idol_worshippers_i:0 "Tolérer les Adorateurs d'Idoles"
 tolerate_idol_worshippers_i_desc:0 "Le grand prophète Moïse nous a montré que l'adoration de la vache était une offense à Dieu. Les adorateurs d'idoles continuent de s'accrocher à leurs voies, mais Allah est compatissant et miséricordieux. Nous ferons notre devoir et veillerons à ce que tous nos sujets jouissent de notre protection et attendrons qu'ils viennent à Allah."
 persian_court:0 "Le Persan de Cour"
 persian_court_desc:0 "Nous devons nous assurer que tout notre peuple, quelle que soit son origine (bien que nous supposions naturellement que vous n'êtes pas pauvre), puisse comprendre ce que nous faisons et soit en mesure de communiquer ses préoccupations. Nous promouvrons donc la langue persane comme langue de cour, de littérature, de poésie, de culture et de science. Ainsi, tous les hommes qui souhaitent traiter avec nous sauront quelle langue apprendre."
 comphrehensive_land_survey:0 "Cadastre Exhaustif"
 comphrehensive_land_survey_desc:0 "Afin de savoir qui doit payer l'impôt, nous devons d'abord savoir qui possède quoi. Nous organiserons donc un cadastre exhaustif puis veillerons à le tenir à jour. Nous obtiendrons toujours l'impôt qui nous est dû."
 counting_the_people:0 "Recenser le Peuple"
 counting_the_people_desc:0 "Maintenant que nous savons qui possède quoi, la suite logique est d'avoir une idée de qui vit où. Cela nous permettra de savoir où chercher lorsque nous aurons besoin d'hommes pour servir dans nos armées."
 equality_under_law:0 "Égalité devant la Loi"
 equality_under_law_desc:0 "La croissance du commerce a mené à l'essor d'une classe marchande. Cependant, l'aristocratie terrienne traditionnelle aurait abusé de sa position et injustement approprié les gains des marchands. Cela doit cesser et désormais toutes les personnes suffisamment riches seront égales devant la loi."
 high_court_culture:0 "Haute Culture de Cour"
 high_court_culture_desc:0 "La promotion de la langue persane a au fil des années mené à une collection de grands poètes et écrivains utilisant cette langue pour créer des œuvres d'une sophistication et d'un art sans pareil. Les gens des pays voisins s'émerveillent de l'art de ces personnes et déjà une nouvelle génération se prépare à écrire des œuvres encore plus grandes."
 sultanate_bureaucracy:0 "Bureaucratie du Sultanat"
 sultanate_bureaucracy_desc:0 "La bureaucratie gouvernementale est une institution en soi et elle rend l'application de notre volonté inutilement compliquée. Nous devons réformer la bureaucratie pour nous assurer qu'elle réponde à notre volonté."
 horde_ideas:0 "Idées de la Horde"
 horde_ideas_start:0 "Traditions de la Horde"
 horde_ideas_bonus:0 "Ambition de la Horde"
 life_of_steppe_warrior:0 "La Vie d'un Guerrier des Steppes"
 life_of_steppe_warrior_desc:0 "La steppe aride est un lieu redoutable et impitoyable pour les non-préparés. Nous en tant que peuple sommes habitués à vivre dans les environnements les plus rudes et ainsi nos gens sont robustes et ont le don de survie. Nous veillerons à ce que tous nos soldats partagent ces expériences et soient ainsi capables de bien mieux survivre."
 horse_supplies:0 "Approvisionnement en Chevaux"
 horse_supplies_desc:0 "La guerre est plus dure pour les chevaux que pour les hommes. Nous devons nous assurer que notre redoutable cavalerie soit bien entretenue. Nous devons nous assurer d'avoir suffisamment de chevaux en tout temps pour garder nos armées fortes et ce à moindre coût."
 steppe_leaders:0 "Chefs des Steppes"
 steppe_leaders_desc:0 "En préservant nos anciennes traditions de chasse, nous nous assurons que nos armées soient menées par des hommes qui comprennent l'usage du cheval au combat. Cela conduira à un meilleur commandement."
 traditions_of_the_great_khan:0 "Traditions du Grand Khan"
 traditions_of_the_great_khan_desc:0 "Le Grand Khan fit trembler le monde par la férocité de ses cavaliers et l'ampleur de son ambition. Nous devons ramener ces traditions pour que nous aussi puissions faire trembler le monde devant nos armées."
 tradition_of_conquest:0 "La Tradition de Conquête"
 tradition_of_conquest_desc:0 "Conquérir des peuples peut être une affaire délicate, tout le monde n'est pas prêt pour notre gouvernement éclairé. Pourtant, nous avons découvert qu'il existe des moyens plus faciles que de bâtir une montagne de crânes pour intégrer des peuples dans notre empire. C'est quelque chose que nos ancêtres n'ont jamais appris."
 logistics_of_khan:0 "Logistique du Khan"
 logistics_of_khan_desc:0 "Les gens oublient que les conquêtes du Grand Khan furent autant le fruit d'une logistique supérieure que d'une force militaire supérieure. Nous devons émuler les techniques du Grand Khan tout en les adaptant à notre époque. Cela nous donnera une plus grande portée pour la conquête."
 glory_of_conquest:0 "La Gloire de la Conquête"
 glory_of_conquest_desc:0 "Qu'il soit connu qu'un garçon ne peut être un homme à moins d'avoir d'abord chevauché avec notre horde invincible, qu'il ne peut prendre épouse avant d'avoir souillé l'épouse d'un autre homme, qu'il n'est pas digne d'une yourte avant d'avoir brûlé celle d'un autre. Que le service dans nos armées soit la seule voie vers la virilité."
 horde_gov_ideas:1 "Idées de la Horde"
 horde_gov_ideas_bonus:0 "Ardeur de la Horde"
 horse_lords:0 "Seigneurs-Cavaliers"
 horse_lords_desc:0 "Nous écraserons nos ennemis et les verrons piétinés. C'est notre passé, c'est notre présent, c'est notre avenir."
 beyond_the_sun:0 "Par-delà le Soleil"
 beyond_the_sun_desc:0 "L'âge des Grandes Hordes n'est pas encore terminé. Nous avons appris des erreurs de nos ennemis et nous nous relèverons plus sages, plus forts. Toute la terre où le soleil vit et meurt doit être nôtre."
 mandate_of_the_khan:0 "Mandat du Khan"
 mandate_of_the_khan_desc:0 "Tel que notre chef commande, les dieux obéissent. L'unité de notre peuple vient de la loyauté envers notre grand chef. Seul un homme capable de courber le métal doré gisant sous une couronne sanglante est digne de notre dévotion."
 there_shall_be_no_grass:0 "Il n'y Aura Plus d'Herbe"
 there_shall_be_no_grass_desc:0 "Là où notre horde est passée, l'herbe ne poussera plus jamais, la terre ne nourrira plus nos ennemis, le jour et la nuit passeront et le sol restera silencieux, sans récoltes à moissonner. Certaines faims ne peuvent être évitées."
 horde_loyalty:0 "Loyauté de la Horde"
 horde_loyalty_desc:0 "La loyauté de notre peuple est incontestable. Aucune âme ayant vécu sous le règne prospère du khan ne songerait jamais à le quitter."
 watchers_of_the_silk_road:0 "Gardiens des Routes Caravanières"
 watchers_of_the_silk_road_desc:0 "Nous ne construisons pas, nous ne commerçons pas. Nous prenons ce dont nous avons besoin... et parfois plus. Nos guerriers ont gardé une surveillance attentive sur les marchands étrangers et leurs techniques, et nous connaissons maintenant les chemins les plus sûrs pour transporter nos biens."
 a_magnanimous_empire:0 "Un Empire Magnanime"
 a_magnanimous_empire_desc:0 "Le règne prospère de nos armées ensanglantées n'était pas seulement connu pour leur épée redoutable, mais aussi pour leur piété exceptionnelle envers ceux qui se sont sagement agenouillés devant lui. Ceux qui accueillent notre empire tolérant seront traités comme en faisant partie."
 theocracy_ideas:0 "Idées Divines"
 theocracy_ideas_start:0 "Traditions Divines"
 theocracy_ideas_bonus:0 "Ambition Divine"
 holy_order:0 "Ordre Sacré"
 holy_order_desc:0 "Seuls les plus purs de foi peuvent devenir fantassins dans l'armée du divin. Être pur d'esprit, d'âme et de corps exige non seulement un homme destiné au paradis mais aussi un guerrier supérieur. Ces soldats formeront le noyau d'une armée qui tiendra tête à quiconque ose nous attaquer."
 church_administration:0 "Administration Ecclésiastique"
 church_administration_desc:0 "Le clergé est une race très rare d'animaux en ces jours obscurs, étant presque universellement lettré. Cela fait des ecclésiastiques non seulement des gens capables de lire les écritures, mais aussi des administrateurs très efficaces."
 true_defender_of_the_faith:0 "Véritable Défenseur de la Foi"
 true_defender_of_the_faith_desc:0 "Nos châteaux sont nos églises et nous devons les défendre jusqu'au dernier. Nous tiendrons sur les murs en frères, au nom de notre Seigneur Jésus-Christ, et que nul homme ne fléchisse."
 turn_the_other_cheek:0 "Tendre l'Autre Joue"
 turn_the_other_cheek_desc:0 "Quand l'ennemi arrive, ne l'aidez pas car il est votre ennemi. Ne l'assistez pas, car il est votre adversaire. Ne lui offrez pas d'abri, car il est votre perte. Que nul n'apporte d'aide à l'ennemi, et tourne plutôt l'autre joue, comme nos dieux l'enseigneraient."
 onward_christian_soldiers:0 "En Avant, Soldats Pieux"
 onward_christian_soldiers_desc:0 "Que ce soit le devoir de tout soldat pieux, non pas de partir en guerre, mais de rester chez lui et de défendre la forteresse de la foi."
 render_unto_ceasar:0 "Rendre à César"
 render_unto_ceasar_desc:0 "Puis il leur dit : « Rendez donc à César ce qui est à César. »"
 no_witches:0 "Que Nul ne Tolère la Sorcière"
 no_witches_desc:0 "Sorcières et sorciers abondent. La vile influence de leurs covens est partout. C'est le devoir ultime de chaque citoyen d'assister la Suprême Sacrée Congrégation et l'Inquisition Universelle dans leur quête pour extirper cette pratique hideuse."
 default_ideas:0 "Idées Nationales"
 theocracy_gov_ideas:0 "Idées Divines"
 theocracy_gov_ideas_bonus:0 "Passion Divine"
 servants_of_god:0 "Les Liens de la Foi"
 servants_of_god_desc:0 "Seul un fou pense que quelque chose n'est pas réel parce qu'il ne peut le voir ou l'entendre. Le pouvoir du divin peut être vu dans le monde qui nous entoure, et il rassemble les fidèles, inspirés à l'unité et à une cause commune par un dessein sacré."
 by_the_grace_of_god:0 "Organiser les Paladins"
 by_the_grace_of_god_desc:0 "Les paladins ont longtemps été des errants, suivant l'appel sacré où qu'il les mène. Si nous pouvons intégrer ne serait-ce que quelques-uns de ces guerriers dans nos armées, leurs puissantes bénédictions et leur puissance de combat vaudront cent hommes normaux chacun, protégeant nos troupes du feu ennemi !"
 friends_in_high_places:0 "L'École du Monde"
 friends_in_high_places_desc:0 "Si nous pouvons encourager les membres de nos ordres militants à prendre le vœu d'errance ou à prêcher la foi en terres étrangères, ils peuvent apprendre davantage sur la route qu'ils ne le pourraient jamais à l'académie, et à moindre coût pour nous."
 flesh_is_weak:0 "Ferveur et Zèle"
 flesh_is_weak_desc:0 "Donnez à un homme un salaire, et il combattra. Donnez-lui certitude et inspiration, et il suivra. Mais donnez-lui la foi, et il croira ! Il n'y a pas de combattants plus féroces que ceux qui savent qu'ils se battent pour quelque chose de plus grand qu'eux-mêmes, et nul n'est plus grand que les dieux !"
 alpha_and_omega:0 "Le Bien et le Mal"
 alpha_and_omega_desc:0 "Le monde est un endroit compliqué, mais la foi donne des assurances. Les complications du monde mortel sont pour les mortels ; les dieux savent où se trouvent le bien et le mal."
 conviction_of_sin:0 "Protection Divine"
 conviction_of_sin_desc:0 "Le paladin peut combattre pour les fidèles, mais c'est l'humble clerc que l'homme du commun connaît le mieux. Nous devons nous assurer qu'il n'y ait pas de pénurie d'initiés ou de fonds pour eux ; c'est par le travail des clercs que notre peuple ressent véritablement la protection des dieux."
 martyrs:0 "Maisons de Guérison"
 martyrs_desc:0 "Ce n'est pas parce qu'il n'y a pas de magie de guérison qu'il n'y a pas de guérisseurs dans la foi ! Que les impies laissent leurs blessés pourrir et mourir ; les nôtres trouveront réconfort dans nos hôpitaux et cliniques, et retourneront au combat avec une force renouvelée, sachant que les dieux leur sourient !"
 default_ideas_start:0 "Traditions Nationales"
 default_ideas_bonus:0 "Ambition Nationale"
 increase_discipline:0 "Préserver nos Troupes"
 increase_discipline_desc:0 "Si nous devons survivre et prospérer dans ce monde impitoyable, nous avons besoin d'hommes et plus important encore, nous devons maximiser le nombre d'hommes que nous avons après les batailles. Un accent sur l'entraînement assurera que nos hommes vivent pour mourir un autre jour."
 increase_taxation:0 "Réforme Fiscale"
 increase_taxation_desc:0 "Il y a une chose à laquelle nous ne pouvons échapper : le besoin d'argent. Une réforme de notre système fiscal assurera que nous ayons l'argent dont nous avons besoin."
 cheaper_mercenaries:0 "Contrats Réglementés"
 cheaper_mercenaries_desc:0 "Les mercenaires sont plutôt mercenaires quand il s'agit de paiement. Si nous nous assurons que nos contrats sont correctement administrés et que le paiement est prompt, nous pourrons négocier de meilleures conditions."
 increased_trade_power:0 "Droit des Contrats"
 increased_trade_power_desc:0 "Nous étendons notre expérience contractuelle avec les mercenaires à un cadre plus général où tous les contrats auraient un fondement juridique. Savoir que votre partenaire commercial serait contraint de tenir parole a permis au commerce de croître et de prospérer."
 increased_manpower:0 "Levée Paysanne"
 increased_manpower_desc:0 "Les gens ne sont pas le problème, c'est de les trouver et de les mettre en uniforme. Un système de levées régulières auprès de nos paysans toujours consentants assurera que nous aurons plus de main-d'œuvre, même si ce n'est jamais assez."
 increased_trade_steering:0 "Statut Mercantile"
 increased_trade_steering_desc:0 "Traditionnellement, la terre était la seule marque de statut, car c'était par la terre que venaient richesse et pouvoir. Avec le renouveau du commerce, une nouvelle voie vers la richesse est apparue. Si nous nous assurons que la nouvelle classe mercantile reçoive une reconnaissance pour son succès chez nous, nous les encouragerons à rivaliser plus agressivement à l'étranger."
 increased_production_income:0 "Renforcement du Régime Foncier"
 increased_production_income_desc:0 "Si nous nous assurons que les droits de tenure foncière sont reconnus et renforcés, nous donnerons au détenteur actuel les incitations à améliorer sa terre et à augmenter la production."
 anatolian_beyliks_ideas:0 "Idées anatoliennes"
 anatolian_beyliks_ideas_start:0 "Traditions anatoliennes"
 anatolian_beyliks_ideas_bonus:0 "Ambition anatolienne"
 travelling_ozan:0 "L'Ozan Itinérant"
 travelling_ozan_desc:0 "Les Ozans chantent et jouent du saz, ils perpétuent les traditions de Yunus Emre, Kaygusuz Abdal et Pir Sultan. Grâce à ces bardes itinérants, de nombreuses histoires et épopées intéressantes ont prospéré à travers les années. Nous devrions les soutenir car ils font partie de notre culture."
 seljuq_marches:0 "Marches Seldjoukides"
 seljuq_marches_desc:0 "De nombreux beylicats turkmènes indépendants existaient déjà sous le Sultanat seldjoukide, particulièrement dans les zones frontalières, afin d'assurer la sécurité contre l'Empire byzantin."
 akinci_cavalry:0 "Cavalerie Akıncı"
 akinci_cavalry_desc:0 "Notre cavalerie légère partait souvent piller les terres infidèles voisines et parfois même s'y établissait. Historiquement, ils furent l'une des premières divisions à affronter l'armée adverse, attaquaient les routes commerciales pour couper l'approvisionnement et le transport ennemi. Connus pour leur courage au combat, non payés, ils vivaient et opéraient comme des pillards aux frontières."
 caravanserais:0 "Caravansérails"
 caravanserais_desc:0 "Nos caravansérails soutiennent le flux de commerce, d'informations et de personnes de la Chine jusqu'à Cannor à travers nos terres. En construire davantage le long de notre portion de la Route de la Soie assurera que nous en tirions davantage profit."
 anatolian_architecture:0 "Architecture Anatolienne"
 anatolian_architecture_desc:0 "Notre architecture s'épanouit alors que de nombreuses bibliothèques, caravansérails, hammams, madrassas et autres bâtiments sont construits dans des styles de plus en plus différents, aboutissant à des œuvres innovantes et originales."
 legacy_seljuqs_empire:0 "Héritage du Grand Empire Seldjoukide"
 legacy_seljuqs_empire_desc:0 "Depuis leurs terres natales près de la mer d'Aral, les Turcs Seldjoukides avancèrent au Xe siècle d'abord dans le Khorassan puis dans la Perse continentale avant de finalement conquérir l'Anatolie. Ils établirent un empire appelé plus tard le Grand Empire Seldjoukide et eurent de profonds effets sur le Proche-Orient. Nous sommes devenus assez forts pour proclamer notre État comme successeur de ce grand empire de nos ancêtres. Réjouissez-vous !"
 MAR_ideas:0 "Idées marathes"
 MAR_ideas_start:0 "Traditions marathes"
 MAR_ideas_bonus:0 "Ambition marathe"
 tradition_of_military_service:0 "Tradition du Service Militaire"
 tradition_of_military_service_desc:0 "Les cavaliers marathes ont une longue tradition de service comme « Bargirs » pour les sultanats du Deccan. La militarisation accrue du Deccan due aux nombreuses guerres menées dans la région a fait de notre cavalerie l'une des forces les plus dangereuses d'Inde."
 forts_of_maharashtra:0 "Forts du Maharashtra"
 forts_of_maharashtra_desc:0 "Dans ces terres vallonnées et densément boisées, maintenir de nombreux forts bien entretenus est une nécessité pour l'offensive comme pour la défense. Garder nos nombreux forts en bon état devrait être une priorité absolue."
 peasant_soldiers:0 "Soldats Paysans"
 peasant_soldiers_desc:0 "Les villages du Desh regorgent d'hommes capables qui seraient plus que disposés à servir dans nos armées. Entraînons et recrutons tous les locuteurs du marathi pour servir dans nos armées."
 office_of_the_peshwa:0 "Bureau du Peshwa"
 office_of_the_peshwa_desc:0 "Créons un bureau entièrement dédié à la gestion de notre État et de ses armées. Avec un ministre compétent à sa tête, le Peshwa, notre pays sera suffisamment polyvalent pour s'étendre rapidement et efficacement."
 encourage_ties_with_brahmin_financial_families:0 "Renforcer les Liens avec les Familles Financières Brahmanes"
 encourage_ties_with_brahmin_financial_families_desc:0 "Le secteur financier de notre État est dominé par des familles bancaires brahmanes. Intégrons-les davantage dans notre État en les engageant comme percepteurs d'impôts, en créant des règlements pour renforcer leurs droits et protéger leurs traditions. Nous aurons gagné la faveur de nos financiers ainsi qu'un accès à des administrateurs compétents et érudits."
 reform_the_bureaucracy:0 "Réformer la Bureaucratie"
 reform_the_bureaucracy_desc:0 "Un État en croissance a besoin d'une bureaucratie capable d'évaluer rapidement de nouvelles terres. Nous devons étendre et différencier notre bureaucratie, réexaminant toute demande de revenus et évaluant rapidement les besoins et la valeur des nouvelles terres."
 expand_maratha_navy:0 "Étendre la Marine Marathe"
 expand_maratha_navy_desc:0 "Les Occidentaux et les Musulmans ne peuvent être autorisés à dominer l'océan Indien. Nous devons nous efforcer d'étendre notre marine et de créer des bases navales viables le long de notre côte occidentale."
 TAU_ideas:1 "Idées birmanes"
 TAU_ideas_start:0 "Traditions birmanes"
 TAU_ideas_bonus:0 "Ambition birmane"
 legacy_of_the_pagan_dynasty:0 "Héritage de la Dynastie Pagan"
 legacy_of_the_pagan_dynasty_desc:0 "La dynastie Pagan fut le premier royaume établi par les Birmans. Si nous pouvons unifier leur terre le long de la rivière Ayeyarwady, les autres pays reconnaîtront que nous sommes les successeurs de l'ancien royaume de Pagan."
 mandala_system:0 "Système Mandala"
 mandala_system_desc:0 "La relation entre le seigneur et ses vassaux en Haless du Sud-Est est définie comme « mandala », le cercle. Tandis que le seigneur contrôle le pays depuis le centre, les vassaux auraient une plus grande indépendance. Si la relation personnelle entre nous et nos vassaux est bénéfique, alors nos tributaires nous paieront tribut et nous aideront aussi en fournissant des hommes en temps de guerre."
 nat_worship:0 "Culte des Nats"
 nat_worship_desc:0 "Les Nats sont des esprits birmans vénérés souvent conjointement avec la pratique bouddhiste. Les 37 Grands Nats et d'autres petits esprits sont adorés, surtout dans les zones rurales. Cette coutume religieuse populaire unit nos divers sujets."
 bayingyi:0 "Bayingyi"
 bayingyi_desc:0 "Les Européens ont commencé à apparaître dans notre royaume. Si nous les installons et leur accordons des terres, ces « Bayingyi » seront disposés à nous servir comme soldats de notre armée."
 chakravartin:0 "Chakravartin"
 chakravartin_desc:0 "Le Chakravartin est un souverain universel idéal dans l'hindouisme et le bouddhisme, celui qui règne éthiquement et avec bienveillance sur le monde entier. C'est un symbole non seulement de royauté et de leadership spirituels, mais aussi temporels."
 manu_kye_dhammathat:0 "Manu Kyè Dhammathat"
 manu_kye_dhammathat_desc:0 "Si nous compilons nos lois et coutumes existantes dans un nouveau livre de lois écrit en birman simple, ce Manu Kyè Dhammathat, le Livre de Loi de Manu Kyè, gagnera une énorme popularité parmi nos sujets."
 the_hluttaw:0 "Le Hluttaw"
 the_hluttaw_desc:0 "Le « Hluttaw », la libération royale, est le conseil central des ministres à notre cour. Ses branches fiscales, exécutives et judiciaires sont les organes administratifs de notre nation."
 rajput_ideas:0 "Idées rajpoutes"
 rajput_ideas_start:0 "Traditions rajpoutes"
 rajput_ideas_bonus:0 "Ambition rajpoute"
 clan_loyalties:0 "Loyautés Claniques"
 clan_loyalties_desc:0 "L'influence de notre clan s'étend bien au-delà de nos propres frontières. Nous sommes capables de puiser dans les Rajpoutes de notre clan de tout le nord de l'Inde pour remplir les rangs de nos armées."
 fortifying_rajputana:0 "Fortifier le Rajputana"
 fortifying_rajputana_desc:0 "Les terres du Rajputana peuvent être rudes et impitoyables. La seule façon d'obtenir un contrôle durable sur nombre de ces régions est par le contrôle des impressionnantes forteresses qui existent dans la région. La réparation, l'entretien et la construction de ces forts devraient être notre priorité."
 marwari_horses:0 "Chevaux Marwari"
 marwari_horses_desc:0 "Comme leurs maîtres, les chevaux de la cavalerie rajpoute sont méticuleusement entraînés pour performer sur le champ de bataille. On dit qu'un cheval Marwari ne peut quitter le champ de bataille que sous l'une de ces trois conditions : la victoire, la mort ou porter un maître blessé en lieu sûr. En prenant bien soin de ces êtres divins, nous assurons la domination éternelle de nos cavaliers sur les champs de bataille d'Inde."
 rajput_resistance:0 "Résistance Rajpoute"
 rajput_resistance_desc:0 "Les bardes rajpoutes racontent les histoires des nombreuses batailles de notre peuple contre les envahisseurs étrangers et comment nos ancêtres préféraient mourir plutôt que de s'avouer vaincus. Nous devons encourager cet esprit d'unité et donner aux bardes des raisons d'écrire de nouvelles ballades de bravoure face à la mort."
 rajput_painting_school:0 "Créer l'École de Peinture Rajpoute"
 rajput_painting_school_desc:0 "Les peintres rajpoutes jouissent déjà d'une excellente réputation. Nous devons encourager nos artistes à développer leurs compétences et à ajouter à la gloire de notre dynastie en créant une école de peinture particulière à notre État."
 rajput_martial_ethos:0 "Éthos Martial"
 rajput_martial_ethos_desc:0 "L'éducation et les traditions des guerriers rajpoutes assurent une large base pour recruter des officiers pour mener nos armées. Afin de capitaliser sur cela, nous devrions nous assurer que les opportunités de carrière abondent pour encourager tous ces jeunes hommes prometteurs à servir comme officiers tant dans nos propres armées qu'à l'étranger."
 marwari_trading_houses:0 "Maisons de Commerce Rajpoutes"
 marwari_trading_houses_desc:0 "Au fil des années, des marchands rajpoutes migrants ont parcouru les routes de l'Hindoustan. Ces entrepreneurs doivent être encouragés et incités à développer leurs entreprises. Bientôt, les membres de notre clan auront établi des maisons de commerce dans toute l'Inde."
 GRA_ideas:0 "Idées grenadines"
 GRA_ideas_start:0 "Traditions grenadines"
 GRA_ideas_bonus:0 "Ambition grenadine"
 people_of_the_book:0 "Gens du Livre"
 people_of_the_book_desc:0 "Nous croyons que Dieu, le très miséricordieux, s'est précédemment révélé à des prophètes antérieurs tels que Moïse et Jésus pour les Juifs et les Chrétiens. Ils devraient être autorisés à pratiquer librement leur foi."
 recover_al_andalus:0 "Reconquérir Al-Andalus"
 recover_al_andalus_desc:0 "Les États chrétiens basés dans le nord ont lentement étendu leur pouvoir sur le reste d'Al-Andalus sous la bannière de la reconquista. Le temps est venu de libérer nos frères andalous."
 beacon_of_learning:0 "Phare du Savoir"
 beacon_of_learning_desc:0 "Al-Andalus fut jadis un centre du savoir avec des érudits exceptionnels comme Ahmad Ibn Rushd, Abu Al Qasim et Muhammad Ibn Tufail. Nous devrions continuer cet état d'esprit de nos ancêtres."
 strait_of_gibraltar:0 "Détroit de Gibraltar"
 strait_of_gibraltar_desc:0 "Le détroit de Gibraltar, nommé d'après le grand général musulman Tariq ibn Ziyad, relie l'océan Atlantique à la mer Méditerranée et sépare l'Europe de l'Afrique. Si nous pouvons sécuriser notre contrôle de ce détroit étroit, le commerce sera plus profitable."
 alhambra:0 "L'Alhambra"
 alhambra_desc:0 "Nos poètes le décrivent comme une perle sertie d'émeraudes, en allusion à la couleur de ses bâtiments et des bois qui l'entourent. Sur une colline surplombant notre capitale, l'Alhambra est un exemple tentaculaire du génie andalou en architecture, design et ingénierie."
 moors:0 "Les Maures"
 moors_desc:0 "Combattez nos ennemis communs et les guerriers maures autour de la mer Méditerranée portant la bannière du croissant se rallieront autour de nous. Historiquement, les Maures étaient les habitants musulmans médiévaux d'Al-Andalus, du Maghreb, de la Septimanie et de la Sicile."
 successor_caliphate_cordoba:0 "Califat Successeur de Cordoue"
 successor_caliphate_cordoba_desc:0 "En 929, Abd al-Rahman III se proclama Calife de Cordoue et régna pendant un demi-siècle comme le souverain le plus puissant d'Ibérie. Aujourd'hui, notre État est devenu assez fort pour suivre ses traces et proclamer le titre de Calife, et déclarer notre État comme le Califat de Grenade. Il n'y a de conquérant que Dieu !"
 PAP_ideas:0 "Idées papales"
 PAP_ideas_start:0 "Traditions papales"
 PAP_ideas_bonus:0 "Ambition papale"
 ecclesiastical_primacy:0 "Primauté Ecclésiastique"
 ecclesiastical_primacy_desc:0 "Le Haut Recteur possède l'autorité souveraine pour établir le canon et la loi religieuse dans l'Église ravélienne. L'État partage une relation spéciale avec ceux qui se conforment à l'autorité ravélienne."
 papal_investiture_and_tithes:0 "Investiture Papale et Dîmes"
 papal_investiture_and_tithes_desc:0 "Vers Rome affluent les richesses de la Chrétienté cannorienne."
 glory_of_rome:0 "Gloire de Rome"
 glory_of_rome_desc:0 "Nous contrôlons la grande cité et l'ancienne capitale des Romains. Nous sommes les gardiens de leur merveilleuse tradition."
 donation_of_constantine:0 "Donation de Constantin"
 donation_of_constantine_desc:0 "La Donation de Constantin démontre notre autorité pour conférer le titre d'Empereur des Romains à quiconque nous choisissons. Elle peut aussi prouver que nous sommes plutôt doués pour falsifier des documents."
 centralize_the_states:0 "Centraliser les États"
 centralize_the_states_desc:0 "Nous consoliderons notre pouvoir dans les provinces papales en le saisissant des princes locaux."
 the_vatican_museums:0 "Les Musées du Vatican"
 the_vatican_museums_desc:0 "Des années de collecte et de donations ont fait de la Cité du Vatican le siège de nombreux musées. Nous avons accumulé l'une des collections d'art les plus impressionnantes de l'histoire."
 holy_father:0 "Le Saint-Père"
 holy_father_desc:0 "Être le Vicaire de Dieu pour les catholiques romains nous confère une certaine marge de manœuvre politique. La Bulle Papale, documents portant le sceau officiel du Pape, porte le poids de la parole même de Dieu. Par ces documents, des souverains ont été maudits et des continents entiers divisés."
 daimyo_ideas:0 "Idées du Daimyo"
 daimyo_ideas_start:0 "Sengoku Jidai"
 daimyo_ideas_bonus:0 "Ambition du Daimyo"
 bushido:0 "Bushido"
 bushido_desc:0 "« Jeunes garçons dans la forêt \n coupant les petits arbres \n rampent vers leur seigneur à genoux » \n \n L'idéal japonais traditionnel, le Bushido, la voie du guerrier samouraï, créa une atmosphère nationale de discipline et d'abnégation dans les classes guerrières moyennes et supérieures."
 bun_and_bu:0 "Le Bun et le Bu"
 bun_and_bu_desc:0 "« Le pinceau traverse le papier de riz fin \n le kanji coule noir et épais \n le sabre sur la chair blanche » \n \n Le concept de maîtrise de l'art et de la guerre joua un grand rôle dans la tradition du Bushido. Les maîtres militaires du Japon réalisèrent que les arts, tels que la peinture, l'arrangement floral et le jardinage, inspirent discipline et compréhension pratique chez les soldats. À l'époque d'Edo, le Japon aura une population hautement lettrée."
 honor_ancestors:0 "Honorer les Ancêtres"
 honor_ancestors_desc:0 "« Grand-mère dans la fumée \n grand-père sur les rochers \n bâtons noirs rougeoient et offrandes s'élèvent » \n \n Un homme doit sa vie à son seigneur et à ses ancêtres. Un homme qui honore ses ancêtres sera respecté tant des hommes que des seigneurs."
 five_rings:0 "Les Cinq Anneaux"
 five_rings_desc:0 "« Vers le ciel son cercle s'élève \n sa main gauche le soleil \n sa droite la lune » \n \n L'une des œuvres de littérature militaire les plus influentes jamais écrites, le livre de Miyamoto Musashi est tenu en aussi haute estime que L'Art de la Guerre de Sun Tzu."
 wandering_ronin:0 "Rônins Errants"
 wandering_ronin_desc:0 "« Dans la neige il tombe \n dernier morceau de pain en main \n au-dessus de sa tête la tour du seigneur se dresse » \n \n Les samouraïs sans maître du Japon sont prêts à obéir à nos ordres si nous choisissons de les inviter à notre service."
 daimyo_idea:0 "Armées du Daimyo"
 daimyo_idea_desc:0 "« Le daimyo siège dans le confort \n parfum de thé fleuri \n homme face contre le sol » \n \n Les vassaux seigneurs de guerre du Japon commandaient de grandes armées pour, et parfois contre, leurs seigneurs à Kyoto."
 honor_unto_death:0 "L'Honneur jusqu'à la Mort"
 honor_unto_death_desc:0 "« Doux champ vert \n fleurs roses s'épanouissent \n une vie au sabre cédera » \n \n La mort jouait un rôle clé dans la philosophie guerrière fanatique du Bushido. Les hommes donnaient et prenaient volontiers leur propre vie pour l'honneur et le respect. On disait que le Bushido lui-même signifiait accepter la mort, ou même la rechercher."
 SER_ideas:0 "Idées serbes"
 SER_ideas_start:0 "Traditions serbes"
 SER_ideas_bonus:0 "Ambition serbe"
 code_of_laws:0 "Code des Lois"
 code_of_laws_desc:0 "Un recueil de traductions de livres de loi byzantins grecs et de grandes œuvres de philosophie antique en langue serbe fut promulgué par Étienne Dušan le 21 mai 1349 à Skopje. Il servit d'inspiration pour le tout premier Code des Lois de Serbie."
 bastion_of_orthodoxy:0 "Bastion de l'Orthodoxie"
 bastion_of_orthodoxy_desc:0 "Avec l'Empire ottoman se profilant à l'horizon oriental et la majeure partie des Balkans soumise devant Baryaktar, la Serbie servira de dernier bastion balkanique de l'Orthodoxie, la continuation de la civilisation chrétienne orientale."
 home_of_hussars:0 "Patrie des Hussards"
 home_of_hussars_desc:0 "Bien que les formations de cavalerie légère en tant que concept soient une vieille idée romaine, les premiers hussards balkaniques, ou gusars (corsaires ou pirates) comme on les appelait, apparurent comme unités auxiliaires de l'Empire byzantin, recrutés principalement dans la Serbie sous domination byzantine aux Xe et XIe siècles. Même après le déclin de la puissance byzantine, cette tradition perdura et fut encore affinée dans les siècles suivants."
 alemannic_guard:0 "Garde Alémanique"
 alemannic_guard_desc:0 "Rétablissons la Garde Alémanique, la tradition d'une armée permanente composée principalement de nobles et de chevaliers allemands, seconds ou troisièmes fils avec peu d'espoir d'héritage, et rien d'autre qu'une carrière militaire comme perspective de vie."
 gold_mines:0 "Mines d'Or"
 gold_mines_desc:0 "Invitons la seconde vague de mineurs saxons depuis le Saint-Empire Romain pour s'établir en Serbie. Nous pouvons rouvrir les anciennes mines d'or qui avaient jadis fait du petit Despotat serbe le pays le plus riche d'Europe."
 mercenary_armies:0 "Armées de Mercenaires"
 mercenary_armies_desc:0 "Adoptons le concept d'une armée permanente composée principalement de mercenaires étrangers. C'est bien différent de la tradition séculaire des paysans levés, réduisant l'impact de la guerre sur l'économie serbe, en particulier l'agriculture."
 balkan_hajduks:0 "Haïdouks Balkaniques"
 balkan_hajduks_desc:0 "Contrairement à leurs homologues du nord en Hongrie, les Haïdouks de Serbie et des terres balkaniques voisines ont acquis une réputation plus infâme. Ces hommes vivaient la dure vie de brigands, toujours en danger, toujours en mouvement : s'en prenant aux routes mal défendues, tendant des embuscades aux collecteurs d'impôts turcs et aux marchands. Cependant, pendant les guerres, ces hommes expérimentés et endurcis remplissaient souvent les rangs des armées serbes, fournissant une excellente, quoique quelque peu indisciplinée, infanterie."
 ORI_ideas:0 "Idées d'Orissa"
 ORI_ideas_start:0 "Traditions d'Orissa"
 ORI_ideas_bonus:0 "Ambition d'Orissa"
 lord_of_elephants:0 "Seigneur des Éléphants"
 lord_of_elephants_desc:0 "Les chevaux sont étrangers à l'Orissa et les terres ici ne conviennent pas à leur élevage. Nos jungles, cependant, regorgent célèbrement d'éléphants. Dans les jungles denses de l'Inde orientale, une coopération tactique bien exécutée entre éléphants et infanterie peut être tout aussi mortelle qu'une cavalerie. Augmentons davantage la taille de notre corps d'éléphants et affinons leurs tactiques."
 servitor_of_jagganath:0 "Serviteur de Jagannath"
 servitor_of_jagganath_desc:0 "Le culte de Jagannath, le seigneur de l'univers, est ce qui unit ces terres. Les anciens souverains d'Orissa étaient considérés comme les fils de Jagannath. Notre dynastie actuelle n'est peut-être pas ses fils, mais nous devons certainement nous assurer d'imprimer à tous que notre souverain est le serviteur de Jagannath et que toute désobéissance à son égard équivaut à une trahison envers le seigneur Jagannath lui-même."
 parikshas:0 "Parikshas"
 parikshas_desc:0 "Les terres d'Orissa ont longtemps été divisées entre de nombreux petits princes. Cependant, le temps de ces Mandaleshvaras est révolu ! Nous devons prendre le contrôle de ces terres et nommer des gouverneurs régionaux, les Parikshas, au lieu de permettre à ces petits princes de diluer notre autorité impériale."
 refined_cloth_production:0 "Production de Tissus Raffinés"
 refined_cloth_production_desc:0 "L'Orissa est renommé pour ses textiles de haute qualité depuis les temps anciens. Encourageons davantage les guildes textiles d'Orissa à affiner leurs méthodes de production du fin tissu de Kalingam."
 patronize_temple_construction:0 "Patronage de la Construction de Temples"
 patronize_temple_construction_desc:0 "La gloire des dynasties passées se reflète dans la grandeur des temples qu'elles ont laissés. Nous devrions nous efforcer d'améliorer les nombreux grands complexes de temples dans nos terres et engager des architectes pour en construire de nouveaux afin de faire avancer le développement de l'architecture de Kalinga."
 encourage_salt_trade:0 "Encourager le Commerce du Sel"
 encourage_salt_trade_desc:0 "Le sel de haute qualité d'Orissa est demandé dans toute l'Inde. Faisons tout ce que nous pouvons pour encourager le commerce du sel afin de nous enrichir."
 heritage_of_the_sadhabas:0 "Héritage des Sadhabas"
 heritage_of_the_sadhabas_desc:0 "La tradition nous dit que nos ancêtres naviguèrent vers des rivages lointains en Indonésie, en Chine, en Perse et en Sarhal, mais aujourd'hui les mers sont dominées par des étrangers. Nous devrions étendre notre marine et reconquérir notre héritage maritime !"
 PUN_ideas:0 "Idées du Pendjab"
 PUN_ideas_start:0 "Traditions du Pendjab"
 PUN_ideas_bonus:0 "Ambition du Pendjab"
 breadbasket_of_india:0 "Grenier de l'Inde"
 breadbasket_of_india_desc:0 "Le Pendjab, la terre des cinq rivières, est l'une des régions les plus fertiles sur Terre. En plus de nous permettre d'exporter de la nourriture et du coton vers nos voisins, cela permet aussi à nos nombreuses villes de croître et encourage toutes sortes de productions spécialisées. Nous devons faire notre possible pour encourager la croissance de l'agriculture et pour défendre nos fermiers contre les bandits et brigands des zones adjacentes."
 encourage_indo_persian_trade:0 "Encourager le Commerce Indo-Persan"
 encourage_indo_persian_trade_desc:0 "Situé à la frontière la plus occidentale de l'Inde, le Pendjab a toujours été au carrefour des échanges économiques et culturels entre l'Inde et la Perse. L'ancienne Grand Trunk Road, qui relie l'Inde orientale au monde persan, traverse nos terres avant de monter dans les cols afghans. Ces cols sont, cependant, infestés de pillards tribaux et de bandits. Nous devrions encourager le trafic le long de cette route ancienne et vibrante et faire tout ce qui est en notre pouvoir pour veiller au bien-être de ces marchands en construisant des caravansérails et en patrouillant ces routes."
 punjabi_textile_industry:0 "Industrie Textile du Pendjab"
 punjabi_textile_industry_desc:0 "Le Pendjab est un centre majeur de production textile. Le tissu de nos tisserands est spécialement fabriqué pour les marchés de tout Haless et Cannor, et nos tisserands sont parmi les plus productifs d'Inde."
 foundation_of_the_khalsa:0 "Le Khalsa"
 foundation_of_the_khalsa_desc:0 "Le Sikhisme, une religion native du Pendjab, se développe rapidement dans nos terres. Les membres de cette foi viennent de toutes les castes et de tous les milieux et défendront leur État quelle que soit leur ancienne profession."
 gurmukhi_script:0 "Adopter l'Écriture Gurmukhi Standardisée"
 gurmukhi_script_desc:0 "Nous devrions adopter une écriture standardisée au lieu des nombreuses différentes actuellement en usage dans nos terres."
 strength_of_the_misls:0 "Force des Misls"
 strength_of_the_misls_desc:0 "Le système administratif des États Misl du Pendjab leur permet de déployer d'impressionnantes forces de cavalerie. En temps de besoin, nous pouvons faire appel à ces forces pour combattre un ennemi commun."
 reforming_the_punjabi_army:0 "Réforme de l'Armée du Pendjab"
 reforming_the_punjabi_army_desc:0 "Les voies de nos ancêtres étaient saines et nous ont bien servis au fil des années. Cependant, pour que nos armées continuent de triompher sur les champs de bataille, nous devons viser à créer une force plus professionnelle. En étudiant la façon dont les pays lointains organisent leurs armées et en adaptant leurs méthodes quand c'est prudent, nous pourrons créer une armée pendjabi plus efficace tout en conservant les qualités uniques de notre système militaire actuel."
 RAG_ideas:0 "Idées ragusaines"
 RAG_ideas_start:0 "Traditions ragusaines"
 RAG_ideas_bonus:0 "Ambition ragusaine"
 ordo_marinaritiae:0 "Ordo Marinaritiae"
 ordo_marinaritiae_desc:0 "Depuis des siècles, notre peuple traite des affaires maritimes et avec de nouvelles réglementations comme l'Ordo Marinaritiae, nous posons de bonnes bases pour l'avenir de Raguse."
 center_of_trade:0 "Centre de Commerce"
 center_of_trade_desc:0 "Notre capitale est la porte des Balkans et de l'Orient, un lieu de commerce de métaux, de sel et d'épices. Grâce à nos exemptions fiscales pour les biens abordables, notre capitale restera un centre de commerce pour les années à venir."
 patronage:0 "Patronage"
 patronage_desc:0 "Nos affaires maritimes et notre commerce terrestre ont un succès significatif sous le patronage de Constantinople. En leur payant un tribut symbolique, nous pouvons maintenir notre indépendance et recevoir des avantages commerciaux. Historiquement, en 1481, Raguse passa sous protection ottomane en payant un tribut accru de 12 500 couronnes. À tous autres égards, Raguse était virtuellement indépendante."
 ragusan_arsenal:0 "Arsenal Ragusain"
 ragusan_arsenal_desc:0 "Les navires sont nécessaires tant pour notre propre protection que pour soutenir nos vastes réseaux commerciaux à travers la Divenhal. Une forte présence navale fera de Raguse l'une des principales puissances maritimes du monde."
 port_gruz:0 "Port de Gruž"
 port_gruz_desc:0 "L'ancien chantier naval situé à Raguse ne pouvait satisfaire les grandes exigences de nos affaires maritimes. Par conséquent, la construction d'un nouveau chantier naval à Port Gruž a commencé. Historiquement, en 1525, un chantier naval majeur fut construit à Port Gruž ainsi que des chantiers plus petits ailleurs pour répondre à la demande."
 non_bene_pro_toto_libertas_venditur_auro:0 "Non Bene Pro Toto Libertas Venditur Auro"
 non_bene_pro_toto_libertas_venditur_auro_desc:0 "Approximativement traduit : la Liberté ne se vend pas bien pour tout l'or du monde. Emprunté à l'histoire d'Ésope sur un loup qui préférait être libre et affamé plutôt qu'être gras et esclave. C'est le serment que nous faisons à Raguse."
 palace_of_the_rector:0 "Palais du Recteur"
 palace_of_the_rector_desc:0 "Le palais du Recteur est le siège de notre gouvernement et la résidence de notre Prince. Historiquement, le recteur détenait une influence considérable, cependant, le vrai pouvoir était entre les mains de trois conseils tenus par la noblesse."
 german_ideas:0 "Idées allemandes"
 german_ideas_start:0 "Traditions allemandes"
 german_ideas_bonus:0 "Ambition allemande"
 zunft:0 "Zunft"
 zunft_desc:0 "Des guildes spécifiques à chaque type d'artisanat sont fondées pour assurer la qualité des produits et former les jeunes artisans."
 fruhlings_und_herbstmesse:0 "Frühlings- und Herbstmesse"
 fruhlings_und_herbstmesse_desc:0 "Certaines villes reçoivent le droit spécial d'ouvrir des foires à chaque printemps et automne. Ces marchés saisonniers sont assez attractifs pour les marchands étrangers."
 reichskreis:0 "Reichskreis"
 reichskreis_desc:0 "Les terres allemandes sont regroupées en cercles régionaux. Leurs fonctions sont de maintenir la paix locale avec des forces communes, de collecter les impôts impériaux et de coordonner les opinions pour la Diète Impériale et la Chambre Impériale de Justice."
 polizeiordnung:0 "Polizeiordnung"
 polizeiordnung_desc:0 "Les seigneurs et villes allemands promulguent des lois concernant la vie quotidienne de leurs gens pour assurer la paix locale et la moralité publique."
 cuius_regio_eius_religio:0 "Cuius Regio, Eius Religio"
 cuius_regio_eius_religio_desc:0 "Les seigneurs allemands ravéliens et protestants ont un droit exclusif de contrôler les affaires religieuses dans leurs domaines selon le principe « Tel prince, telle religion »."
 thurn_und_taxis:0 "Thurn und Taxis"
 thurn_und_taxis_desc:0 "La Maison de Thurn und Taxis a été pionnière du service postal allemand, un réseau complexe de communication qui couvre diverses régions cannoriennes et toute l'Allemagne."
 residenzstadt:0 "Residenzstadt"
 residenzstadt_desc:0 "Les ducs allemands établissent leurs résidences dans les villes et gouvernent le pays de là. Ainsi, les villes deviennent non seulement des centres administratifs et économiques, mais aussi de nombreux bâtiments culturels sont construits par leurs monarques."
 RYU_ideas:0 "Idées ryukyuanes"
 RYU_ideas_start:0 "Traditions ryukyuanes"
 RYU_ideas_bonus:0 "Ambition ryukyuane"
 ryu_chinese_investiture:0 "Investiture Chinoise"
 ryu_chinese_investiture_desc:0 "Depuis les premiers jours où Ryukyu était divisé, la Chine a reconnu les privilèges de notre droit de gouverner et est disposée à nous assister pour renforcer notre nation."
 reform_the_ryukyuan_religion:0 "Réforme de la Religion Ryukyuane"
 reform_the_ryukyuan_religion_desc:0 "La religion d'Okinawa est un grand mélange de religions asiatiques et anciennes. Elle constitue du polythéisme, du culte des ancêtres et des éléments d'animisme. Elle est unique par son accent sur les femmes comme majorité du clergé. Nous pouvons établir une hiérarchie formelle de prêtresses, incluant une position de grande prêtresse, pour nous assurer que les besoins spirituels de l'île soient satisfaits."
 ryu_shuri_castle:0 "Château de Shuri"
 ryu_shuri_castle_desc:0 "Le Château de Shuri est le palais du Royaume de Ryukyu sur la grande île d'Okinawa. Ses terrains incluent plusieurs sites de fierté nationale, dont la célèbre porte Shureimon. Shisaa yaibin mi !"
 ryu_maritime_com:0 "Commercialisme Maritime"
 ryu_maritime_com_desc:0 "Les Chinois nous ont donné accès à des navires de commerce. Par ces moyens, nos flottes navigueront jusqu'au nord vers la Corée, et vers des terres lointaines au sud, telles que la Malaisie, Sumatra et le Siam."
 ryu_sign_trade_agreements:0 "Signer des Accords Commerciaux"
 ryu_sign_trade_agreements_desc:0 "Grâce à notre position amicale et à nos excellentes relations avec de nombreuses autres nations, elles, en particulier les Chinois, ont décidé de nous accorder le libre commerce dans leurs ports en nous offrant des accords commerciaux. De nombreux articles de commerce peuvent être trouvés dans nos terres, de la laque japonaise aux céramiques émaillées chinoises et même de l'ivoire indien et de l'encens arabe."
 ryu_national_academy:0 "Académie Nationale"
 ryu_national_academy_desc:0 "Dans les âges passés, nous avons envoyé nombre de nos meilleurs et plus brillants pour être éduqués par les Chinois dans leur académie nationale, car ils ont fixé un quota pour que les Ryukyuans y étudient. Maintenant que nous avons construit une Académie Nationale à nous, nous pouvons investir davantage dans les améliorations technologiques."
 ryu_the_three_mountains:0 "Les Trois Montagnes"
 ryu_the_three_mountains_desc:0 "Dans le rêve fiévreux du roi, il vit les trois montagnes au-dessus d'une grande sphère, et sur elle, sous nos majestueuses montagnes, chaque cité de l'homme et chaque tribu d'hommes. Yamapikarya ! Mais n'était-ce qu'un rêve fou ?"
 bengali_ideas:0 "Idées bengalies"
 bengali_ideas_start:0 "Traditions bengalies"
 bengali_ideas_bonus:0 "Ambition bengalie"
 ganges_brahmaputra_confluence:0 "Confluence du Gange et du Brahmapoutre"
 ganges_brahmaputra_confluence_desc:0 "Le puissant Gange et le Brahmapoutre ont voyagé loin pour se mêler et s'étendre dans le Delta du Bengale, canalisant commerce et négoce dans leur sillage. Pendant des milliers d'années, la zone autour du delta a été un lieu naturel pour l'échange facile de biens et d'idées."
 rice_fields:0 "Les Rizières Infiniment Productives du Bengale"
 rice_fields_desc:0 "Nous Bengalis sommes principalement des mangeurs de riz, et les précipitations et le sol de la région se prêtent à une production massive de surplus de riz, les puissantes rivières chargées de limon et la mousson permettant trois saisons distinctes de croissance et de récolte par an."
 hindu_sufi_syncretism:0 "Syncrétisme Hindou-Soufi Bengali"
 hindu_sufi_syncretism_desc:0 "Au-delà des frontières orientales du monde islamique, des mystiques soufis sont venus s'installer sur des concessions de terre ou communier avec la nature au Bengale, se mêlant à la population hindoue. La coopération a conduit à des réclamations de terres extensives dans les zones forestières et marécageuses et a aidé à introduire de nouvelles formes syncrétiques de musique, peinture, danse et sculpture reflétées dans les temples et sanctuaires construits durant cette période."
 mustard_oil_ilish_mach:0 "Huile de Moutarde et Ilish Mach"
 mustard_oil_ilish_mach_desc:0 "Les guerres peuvent incendier les greniers et les marchés. Le temps peut flétrir ou écraser les récoltes dans les champs. Les éléphants et les fourmis peuvent essayer de manger ce que nous avons planté. Donnez-nous un peu d'huile, cependant, et nos rivières poissonneuses nous donneront la nourriture que nous Bengalis désirons le plus !"
 jute_production:1 "Production de Jute"
 jute_production_desc:0 "Originaire de notre région, le jute est une fibre végétale longue, douce et brillante qui peut être filée en corde, natte ou fil grossier et résistant. Très demandé pour sa résilience et son poids relativement léger, nous pouvons bénéficier de sa culture et de sa production."
 opium_fields:0 "Champs d'Opium du Bengale"
 opium_fields_desc:0 "Qu'est-ce que c'est ? Les gens nous donneront de l'or et de l'argent pour nos fleurs !? L'opium de notre région est hautement prisé et facilement cultivé, commandant deux fois le prix de tout autre opium dans le monde. Que le commerce commence !"
 bengali_renaissance:0 "La Renaissance Bengalie"
 bengali_renaissance_desc:0 "La Renaissance bengalie qui eut lieu dans cette région fut une réaction à la rencontre et à l'impact des Européens arrivant non seulement pour le commerce, mais pour l'étude, l'art et l'érudition. La Renaissance bengalie mêla les enseignements hindous du passé avec l'éducation, la politique et le droit occidentaux, ainsi qu'une refonte de la culture bengalie. Cela mena à un épanouissement des arts et des sciences."
 TIB_ideas:0 "Idées tibétaines"
 TIB_ideas_start:0 "Traditions tibétaines"
 TIB_ideas_bonus:0 "Ambition tibétaine"
 vajrayana_buddhism:0 "Bouddhisme Vajrayana"
 vajrayana_buddhism_desc:0 "Notre peuple est uni dans notre vision unique du monde représentée à travers notre forme Foudre du Bouddhisme. Elle guide notre gouvernance même et notre vie quotidienne selon des schémas familiers et attendus, du plus humble serf au plus haut lama."
 bon_influence:0 "Influence Bön"
 bon_influence_desc:0 "Les vestiges de la foi Bön originelle et indigène exercent toujours une influence au Tibet, à la fois en concurrence et en fusion avec la voie Vajrayana du Bouddhisme. Les présences divines ou divinités Bön sont incorporées dans la construction même des maisons des gens, les transformant en effet en un château (dzongka) contre les forces malveillantes à l'extérieur. Les Dieux, Élémentaux, Démons et Esprits féroces et inspirants contrastent fortement avec le serein Bouddha."
 yaks:0 "Yaks !"
 yaks_desc:0 "Les yaks domestiqués sont élevés par notre peuple depuis des milliers d'années, cultiver et améliorer notre connaissance de leur élevage ne les rendra que plus utiles. En plus de tirer des charrues et de pouvoir les monter, ils nous donnent leur lait, leur fibre et leur viande, et portent de lourdes charges à travers la neige profonde. Leurs déjections séchées sont un combustible important, utilisé dans tout le Tibet, et est souvent le seul combustible disponible sur le haut Plateau tibétain sans arbres. Leur beurre est un ingrédient du thé au beurre que les Tibétains consomment en grandes quantités, et est aussi utilisé dans les lampes et transformé en sculptures de beurre utilisées dans les festivités religieuses. Leur usage s'étend toujours avec notre connaissance et notre ingéniosité."
 way_of_virtue:0 "La Voie de la Vertu"
 way_of_virtue_desc:0 "Dgelugspa, aussi connue comme la secte du Chapeau Jaune, est une école du Bouddhisme Vajrayana se concentrant sur les principes de la compassion universelle comme orientation spirituelle fondamentale. Fondée à la fin du XIVe siècle, les Dgelugspa sont devenus l'école bouddhiste prééminente au Tibet depuis la fin du XVIe siècle."
 potala_palace:0 "Palais du Potala"
 potala_palace_desc:0 "La construction du Palais du Potala commença en 1645, sous la direction de Lobsang Gyatso, le Grand Cinquième Dalaï-Lama. S'élevant à mille pieds au-dessus du fond de la vallée à Lhassa, avec des murs de pierre mesurant seize pieds d'épaisseur à la base, ce palais fortifié occupe une place impressionnante. Dans ses treize étages, ce centre du gouvernement compte plus de 1 000 pièces, 10 000 sanctuaires et 200 000 statues."
 way_of_ancients:0 "La Voie des Anciens"
 way_of_ancients_desc:0 "Nyingma, aussi connue comme l'École des Anciennes Traductions, est la plus ancienne école du Bouddhisme Vajrayana, incorporant le mysticisme et les divinités locales partagées par la religion Bön pré-bouddhiste. Historiquement, la tradition Nyingma est unique parmi les écoles en ce que ses partisans n'ont jamais détenu le pouvoir politique, et donc ses pratiquants étaient principalement retirés des machinations politiques du Tibet, se concentrant sur l'austérité, le célibat et le mysticisme. Leur présence, cependant, cultive la discipline dans notre société et nous maintient en accord avec nos racines."
 pale_earth:0 "L'École de la Terre Pâle"
 pale_earth_desc:0 "L'École de la Terre Pâle, ou Sakya, du Bouddhisme Vajrayana, tire son nom du paysage gris unique des Collines de Ponpori dans le sud du Tibet près de Shigatse, où le Monastère de Sakya, le premier monastère de cette tradition, fut construit par Khon Konchog Gyalpo (1034-1102) en 1073. La tradition Sakya fut fondée à la fin du XIe siècle par Drogmi, un célèbre érudit et traducteur qui avait étudié à l'Université de Vikramashila en Inde. Cette école est connue pour son penchant studieux et académique et ses collèges produisent les esprits les plus curieux du Tibet."
 dravidian_ideas:0 "Idées de l'Inde du Sud"
 dravidian_ideas_start:0 "Traditions de l'Inde du Sud"
 dravidian_ideas_bonus:0 "Ambition de l'Inde du Sud"
 merchants_of_southern_india:0 "Marchands de l'Inde du Sud"
 merchants_of_southern_india_desc:0 "De la côte de Malabar à celle de Coromandel, l'histoire de l'Inde du Sud est étroitement liée au commerce outre-mer. Ces terres attirent toutes sortes de marchands d'ouest et d'est pour rivaliser et coopérer avec nos propres groupes marchands tels que les Nanadesis itinérants ou les marchands Chetti qui voyagent à l'étranger pour établir leurs firmes commerciales dans des ports lointains. Nous ne devons cependant pas tenir ces marchands pour acquis. En établissant des ports et des villages exempts de taxes et de péages, nous pouvons persuader les marchands nationaux et étrangers de garder leurs bases d'opérations dans nos terres plutôt que chez nos voisins. Créons de tels sanctuaires et regardons les marchands affluer vers nos cités."
 water_tanks_and_canals:0 "Réservoirs d'Eau et Canaux"
 water_tanks_and_canals_desc:0 "L'Inde du Sud abrite de nombreuses régions fertiles comme celles le long des bassins du Krishna et du Kaveri. Cependant, de nombreuses zones n'ont pas cette chance. Les temps récents ont aussi vu une migration croissante dans nos terres depuis le nord, beaucoup de ces nouveaux sujets ont tendance à s'installer dans les régions plus sèches où ils n'auront pas à rivaliser avec les établissements existants. Dans de nombreux cas, ces régions pourraient aussi être assez productives si un certain nombre d'investissements dans des canaux et des réservoirs d'eau pouvaient être faits. En garantissant que ceux qui investissent dans ces choses aient une part garantie dans les revenus accrus de la zone, nous pourrions rapidement et à moindre coût encourager un tel développement dans nos terres."
 south_indian_mercenaries:0 "Mercenaires de l'Inde du Sud"
 south_indian_mercenaries_desc:0 "La situation politique cosmopolite et militarisée de l'Inde du Sud attire toutes sortes de mercenaires. Outre les groupes indigènes Telugu, Kannada et Tamouls, les cavaliers Marathes, les cavaliers Persans ou Turanis, les artilleurs Turkomans, les Mavales et les Berads rivalisent tous pour servir dans nos armées. Entre autres choses, cette concurrence signifie que l'embauche de ces groupes est moins chère qu'elle ne l'aurait été autrement."
 polygar_system:0 "Système Polygar"
 polygar_system_desc:0 "Le paysage politique de l'Inde du Sud est plein d'anciennes chefferies et dépendances petites mais bien enracinées sur lesquelles les autorités centrales ont un contrôle limité. Bien que prendre le contrôle de toutes ces zones serait un processus ardu et long, nous pourrions plutôt tenter d'insérer des gens loyaux envers nous dans les hiérarchies locales. Avec un mandat royal pour créer, améliorer et défendre des établissements fortifiés, ces nouveaux chefs s'appuieraient sur une autorité conférée par l'État plutôt que sur d'anciennes traditions. Ces nouveaux détenteurs du pouvoir nous permettront d'exercer un bien plus grand contrôle sur notre arrière-pays et s'avéreront une source de troupes bien plus fiable que les anciennes chefferies ne l'ont jamais été."
 patronage_of_temples:0 "Patronage des Grands Temples"
 patronage_of_temples_desc:0 "Si le caractère d'un vrai roi est son patronage des temples et des communautés religieuses dans ses terres, alors il y a eu de nombreux grands souverains en Inde du Sud. De grandes cités-temples comme Tirupati ou Madurai témoignent d'un patronage royal extensif. En effet, ces temps récents ont vu ces complexes de temples devenir encore plus grands et monumentaux, les complexes de temples du sud de l'Inde dépassant à bien des égards ceux que l'on peut trouver dans le nord de l'Inde. Afin d'être à la hauteur des attentes placées sur nous en tant que souverains, nous devrions patronner les communautés de temples dans nos terres et nous assurer qu'elles communiquent adéquatement la grandeur de notre dynastie."
 south_indian_literature:0 "Littérature de l'Inde du Sud"
 south_indian_literature_desc:0 "Rassemblons les grands poètes et écrivains de cet âge à notre cour. Les grandes œuvres produites sous notre patronage seront remémorées pour les siècles à venir !"
 merchant_capitalists:0 "Capitalistes Marchands"
 merchant_capitalists_desc:0 "Avec les liens entre l'ouest, l'est et l'extrême-est qui se renforcent, une nouvelle classe de marchands prospères a commencé à émerger. Ces individus riches exercent un contrôle sur la production, l'expédition et le financement autour de l'océan Indien. Des capitalistes marchands comme ceux-ci sont maintenant la principale force motrice derrière le développement du commerce dans nos terres et bien que leur influence croissante puisse sembler alarmante (tout comme leur volonté d'investir dans des compagnies commerciales étrangères), leurs activités sont aussi très bénéfiques pour notre pays."
 ASS_ideas:0 "Idées assamaises"
 ASS_ideas_start:0 "Traditions assamaises"
 ASS_ideas_bonus:0 "Ambition assamaise"
 buranjis:0 "Les Buranjis"
 buranjis_desc:0 "Tous nos rois descendent du grand Sukaphaa qui fonda notre royaume en 1228 après son long voyage en Assam. Swargdeo Sukaphaa fut aussi le premier de nos souverains à réaliser le grand besoin de documentation pour les générations futures et c'est lui qui fit créer le premier « Magasin qui enseigne aux ignorants » ou Buranji. Grâce à celui-ci et aux autres Buranjis créés tout au long de l'histoire de notre royaume, nous connaissons bien l'histoire de notre peuple et il n'est pas difficile d'identifier les nombreux héritiers de Sukaphaa."
 wet_rice_cultivation:0 "Riziculture Irriguée"
 wet_rice_cultivation_desc:0 "Quand nos ancêtres Tai arrivèrent pour la première fois en Assam, les terres qui leur étaient disponibles étaient des marais et des marécages. Ils réalisèrent rapidement que ces terres n'étaient pas aussi productives qu'elles pourraient l'être. L'utilisation des techniques de riziculture irriguée de notre ancienne patrie nous a permis de prospérer dans une zone que d'autres trouvaient trop pauvre pour s'en soucier. Bien que nous ne soyons plus restreints aux marais du Haut-Assam, la riziculture reste l'épine dorsale de notre économie."
 river_warfare:0 "Guerre Fluviale"
 river_warfare_desc:0 "Le terrain assamais et la rivière Brahmapoutre en particulier sont nos plus grands alliés contre les envahisseurs étrangers. Toute armée étrangère qui souhaite avancer le long de la rivière Brahmapoutre devra endurer les pluies de l'été, auquel moment elle devra prendre grand soin de ne pas être coupée de ses lignes d'approvisionnement le long de la rivière. En nous préparant à des tactiques de guérilla, en assaillant les lignes d'approvisionnement des envahisseurs et en pillant leurs réserves, nous pouvons nous assurer qu'un ennemi risque d'être coupé en terres très hostiles avec la famine et les maladies épidémiques faisant leur tribut."
 reform_paik_system:0 "Réforme du Système Paik"
 reform_paik_system_desc:0 "Depuis que notre peuple est arrivé ici au XIIIe siècle, nous avons fait usage d'un système de corvée inspiré de nos racines sud-est halessiennes. Les Paiks sont utilisés pour la défense, la construction civile et la production militaire et font partie intégrante de notre royaume. Cependant, à mesure que notre pays grandit, ce système a besoin de restructuration. Un réexamen approfondi de tous les devoirs Paik, des quotas Paik et un nouveau système hiérarchique clair pour les officiers du système créeront un système résilient qui sera d'une grande aide pour nous contre toute menace étrangère."
 process_of_appeal:0 "Processus d'Appel"
 process_of_appeal_desc:0 "En raison de l'organisation hiérarchique de notre société, il est important que nous soyons vus comme faisant respecter la justice dans nos terres et que nos sujets sentent qu'ils jouissent de la protection de l'État. En utilisant le système Paik, nous pouvons créer une chaîne d'appels des officiers inférieurs jusqu'aux ministres du roi."
 ahom_land_survey:0 "Cadastre"
 ahom_land_survey_desc:0 "Nous avons observé que nos voisins occidentaux ont conçu un système administratif ambitieux où toutes les terres sont régulièrement arpentées pour mieux évaluer leur valeur. Nous devrions introduire des mesures similaires ici. En invitant des arpenteurs de l'ouest et en formant les nôtres à leurs méthodes, nous pourrions être en mesure d'augmenter substantiellement nos revenus fiscaux. Nous devons aussi désormais faire des arpentages renouvelés régulièrement pour tenir compte des tendances changeantes de l'économie et de la démographie."
 ahom_diplomacy:0 "Diplomatie Ahom"
 ahom_diplomacy_desc:0 "Notre pays tire une grande partie de sa force des vieilles traditions et de l'exploitation maximale des ressources à l'intérieur de nos frontières. Il est temps, cependant, de regarder vers l'extérieur et de voir ce que d'autres parties du monde peuvent nous offrir. En instituant des positions officielles spécifiquement pour la diplomatie et en encourageant les échanges avec d'autres royaumes, nous pourrions à la fois enrichir notre culture et trouver de nouveaux alliés contre nos ennemis locaux."
 gujarati_ideas:1 "Idées des Principautés du Gujarat"
 gujarati_ideas_start:1 "Traditions des Principautés du Gujarat"
 gujarati_ideas_bonus:1 "Ambition des Principautés du Gujarat"
 garba:0 "Garba !"
 garba_desc:0 "Originaire du culte de la déesse hindoue Ambaji par les femmes à travers la danse, notre peuple a affiné une nouvelle forme de danse très gracieuse appelée le Garba. Les bases de la danse sont le chant et les battements de mains rythmiques en formation circulaire. Aujourd'hui, nos hommes et femmes se rassemblent pour utiliser cette danse pour célébrer toute occasion avec grande ferveur, se réunissant en communauté et portant des tenues somptueusement brodées. Tous ensemble, jeunes et vieux, paysans et princes, Musulmans et Hindous, dansant en un cercle toujours grandissant."
 jain_routes:0 "Connexions Jaïnes"
 jain_routes_desc:0 "Le Jaïnisme est un ancien mode de vie, mis dans sa forme actuelle par Mahavira (599 av. J.-C. - 527 av. J.-C.). Depuis mille ans, le Gujarat est le bastion de la communauté et de la foi jaïnes, avec de nombreux sites saints et temples. Les dynasties royales ont patronné la religion, formant une communauté commune avec les Hindous. Les invasions musulmanes de l'est, par Mahmoud de Ghazni (1001) et Muhammad Ghori (1175), ont opprimé la communauté jaïne, vandalisant les temples ou les convertissant en mosquées, ainsi que brûlant les bibliothèques jaïnes. Cependant, les Jaïns du Gujarat ont survécu, se sont adaptés et ont prospéré, utilisant leurs connexions avec les communautés jaïnes à travers le monde pour servir de centre tant pour la foi que pour le commerce."
 gujarati_lipi:0 "Gujarati Lipi"
 gujarati_lipi_desc:0 "À la fin du XVIe siècle, le Gujarati Lipi, une nouvelle écriture et système d'écriture fut développé. Il fut développé par des intérêts mercantiles et devint aussi connu comme l'écriture saraphi (banquiers), vaniasai (marchands) ou mahajani (négociants), en raison de son association avec le commerce. Son usage se répandit rapidement dans tout le Gujarat, le Kutch et le Sindh, pour représenter ces langues, étudier le Sanskrit et fut adopté par la Communauté Zoroastrienne pour écrire l'Avestan. Elle fournit un système d'écriture commun pour de nombreuses communautés différentes, les liant ensemble et facilitant l'unité et une identité commune."
 merchant_diaspora:0 "Diaspora Marchande du Gujarat"
 merchant_diaspora_desc:0 "Il n'y a nulle part où notre peuple ne commerce ! Sur chaque rivage, notre peuple poursuit le commerce, suivant les vents alizés... nos flottes naviguent de-ci de-là cherchant de nouvelles opportunités. Nos marchands connaissent l'art et la valeur de faire de bons et solides navires avec un budget de marchand."
 spice_trade:0 "Centre du Commerce de l'Océan Indien"
 spice_trade_desc:0 "En raison de la nature des vents de mousson commerciaux et de sa position géographique, le Gujarat a longtemps servi de centre de tout le commerce de l'océan Indien allant vers l'est. Le Gujarat est un intermédiaire essentiel dans le commerce est-ouest, entre la mer Rouge, l'Égypte et Malacca : les marchands gujaratis étaient d'importants intermédiaires apportant des épices des îles Moluques ainsi que de la soie de Chine, puis les vendant aux Égyptiens et aux Arabes."
 western_factors:0 "Les Marchands Étrangers Établissent des Comptoirs"
 western_factors_desc:0 "Suivant les Arabes et les Portugais au début du XVIIe siècle, la Compagnie britannique des Indes orientales établit un comptoir dans les terres du Gujarat en 1614. De nombreux étrangers de l'ouest viennent dans nos terres pour acheter nos biens en gros en quantités toujours plus grandes... cela ne peut avoir qu'un bon résultat ! N'est-ce pas ?"
 guj_africa:0 "La Diaspora Gujarati Descend sur Sarhal"
 guj_africa_desc:0 "Le début du XIXe siècle vit des dizaines de milliers de Gujaratis s'installer en Sarhal pour travailler comme intermédiaires mercantiles entre les puissances coloniales et les populations indigènes avec lesquelles ils avaient déjà des relations commerciales. Notre peuple établit des communautés commerciales permanentes et envoie la richesse chez nous."
 TUS_ideas:0 "Idées toscanes"
 TUS_ideas_start:0 "Traditions toscanes"
 TUS_ideas_bonus:0 "Ambition toscane"
 birthplace_of_the_renaissance:0 "Berceau de la Renaissance"
 birthplace_of_the_renaissance_desc:0 "Florence a longtemps été la capitale culturelle de la Toscane. Avec le regain d'intérêt pour le monde classique, un Prince avisé peut attirer les nouveaux penseurs pour le bénéfice de tous."
 tuscan_condottieri:0 "Condottieri"
 tuscan_condottieri_desc:0 "Les conflits entre cités-États ont donné naissance à des compagnies de mercenaires. Assurons-nous qu'elles sachent que notre bourse est pleine et encourageons leur présence en temps de besoin."
 tuscan_banking:0 "Banque Toscane"
 tuscan_banking_desc:0 "De l'Angleterre à Naples, tous connaissent nos banquiers. Notre Florin d'or a financé tout, de la Guerre de Cent Ans aux nouvelles industries."
 tuscan_arts:0 "Mécène des Arts"
 tuscan_arts_desc:0 "Avec l'abolition de la république et l'introduction du Duché héréditaire, nous devons montrer la gloire de la Toscane. De nombreuses grandes œuvres seront commandées à la gloire de Dieu et du Duc."
 porto_franco:0 "Porto Franco"
 porto_franco_desc:0 "Afin d'attirer plus de commerce, nous avons déclaré le port de Livourne port franc. Il n'y aura pas de droits sur les biens échangés ici et les habitants pourront pratiquer leur culte comme ils le souhaitent."
 tuscan_administrative_reforms:0 "Réformes Administratives"
 tuscan_administrative_reforms_desc:0 "Pour cimenter nos libertés religieuses et réformer notre administration, nous ne permettrons plus au clergé de participer à notre administration civique."
 tuscan_grand_duchy:0 "Ambition Territoriale"
 tuscan_grand_duchy_desc:0 "Le Saint-Père lui-même a déclaré son soutien à nos ambitions territoriales. Pour unir les régions du centre de l'Italie, nous devrons lever des armées permanentes de nos propres roturiers."
 USA_ideas:0 "Idées américaines"
 USA_ideas_start:0 "Traditions américaines"
 USA_ideas_bonus:0 "Ambition américaine"
 freedom_of_religion:0 "Liberté de Religion"
 freedom_of_religion_desc:0 "Le Congrès ne fera aucune loi concernant l'établissement d'une religion, ou interdisant son libre exercice..."
 usa_bill_of_rights:0 "Déclaration des Droits"
 usa_bill_of_rights_desc:0 "...ou restreignant la liberté de parole, ou de la presse ; ou le droit du peuple de se réunir pacifiquement, et de présenter des pétitions au Gouvernement pour la réparation de ses griefs."
 empire_of_liberty:0 "Empire de la Liberté"
 empire_of_liberty_desc:1 "Les gens dans nos terres jouissent de libertés inégalées ailleurs."
 lessons_of_valley_forge:0 "Leçons de Valley Forge"
 lessons_of_valley_forge_desc:0 "Dans les moments les plus sombres, la résolution d'une nation est mise à l'épreuve et forgée dans les feux de l'adversité."
 workshop_of_the_world:0 "Atelier du Monde"
 workshop_of_the_world_desc:0 "Les artisans libres sont des artisans productifs, donc aucun artisan n'est aussi productif que les nôtres."
 shining_city_on_a_hill:0 "Cité Brillante sur la Colline"
 shining_city_on_a_hill_desc:0 "Naturellement, notre République naissante est vue comme une inspiration pour toute la race humaine, ce qui est comme il se doit."
 manifest_destiny:1 "Destinée Manifeste"
 manifest_destiny_desc:1 "C'est le droit de naissance de cette nation américaine de s'étendre d'une mer brillante à l'autre."
 SWI_ideas:0 "Idées suisses"
 SWI_ideas_start:0 "Traditions suisses"
 SWI_ideas_bonus:0 "Ambition suisse"
 the_swiss_confederation:0 "La Confédération Suisse"
 the_swiss_confederation_desc:0 "En 1291, les cantons de Schwyz, Uri et Unterwald s'unirent pour échapper à l'héritage des Habsbourg, et depuis lors, eux et les autres cantons ont été résolus à résister aux incursions étrangères sur notre autonomie au sein de l'Empire. Néanmoins, nous ne sommes toujours pas un pays à proprement parler mais une alliance ou confédération de cantons avec une politique militaire coordonnée pour protéger nos privilèges. Ce modèle décentralisé aide à maintenir notre royaume réactif et stable."
 swiss_mercenaries:0 "Mercenaires Suisses"
 swiss_mercenaries_desc:0 "Combien de rois ont eu raison de crier « Faites venir les Suisses » chaque fois qu'il y avait une tentative d'assassinat ? De la Garde Suisse qui protège Sa Sainteté à Rome aux mercenaires suisses servant comme auxiliaires et gardes du corps dans la plupart des cours de la Chrétienté, les mercenaires suisses ont prouvé leurs capacités légendaires. Peut-être que nos fils natifs nous feront une réduction pour travailler dans nos cours ?"
 alpine_defensiveness:0 "Défense Alpine"
 alpine_defensiveness_desc:0 "Tout au long de la fin du XIIIe et du XIVe siècle, nous avons constamment repoussé les incursions des Habsbourg (et, souvent, par extension, impériales) dans nos terres. Nos puissants soldats ont joué un rôle majeur dans cela, mais le terrain rude et difficile de notre patrie montagneuse a rendu l'invasion tout aussi difficile."
 oasis_of_peace_and_prosperity:0 "Oasis de Paix et de Prospérité"
 oasis_of_peace_and_prosperity_desc:0 "Même lorsque la plus horrible des guerres fait rage, il y a généralement peu de raisons d'impliquer la Suisse : après tout, les deux camps ont besoin de leurs mercenaires suisses, et aucun ne veut en être coupé. Peut-être que si la paix est prospérité, nous devrions nous concentrer davantage sur la paix."
 swiss_tolerance:0 "Tolérance Suisse"
 swiss_tolerance_desc:0 "La Réforme menace de déchirer notre pays. Certaines provinces rejoignent le mouvement Protestant, d'autres la Réforme, et d'autres encore restent ravéliennes. Notre terre est ravagée par la violence et la confusion. Pourquoi devons-nous nous entretuer pour la transsubstantiation et la prédestination quand nous pourrions transformer notre patrie montagneuse en un royaume à nouveau uni ?"
 haven_for_refugees:0 "Refuge pour les Réfugiés"
 haven_for_refugees_desc:0 "D'autres pays se débarrassent de mécontents politiques et d'auteurs dont les textes critiquant leurs gouvernements sont interdits à l'étranger. Certaines de ces figures sont assez intéressantes, et quel mal nous ferait-il de les laisser critiquer leurs patries depuis la sécurité de leur nouveau refuge alpin ? Nous établirons une tradition de la Suisse comme terre où les exilés peuvent parler librement."
 clockwork:0 "Horlogerie"
 clockwork_desc:0 "Certains sots pensent que l'horlogerie n'est que pour les horloges. Quand on observe le pouvoir des engrenages rotatifs qui s'enclenchent, il est évident que l'horlogerie peut faire à peu près tout ce que l'on veut : peut-être que le Créateur de l'Univers lui-même a remonté l'existence comme une horloge et a laissé les engrenages tourner seuls, égrenant les siècles. Quoi qu'il en soit, les horlogers suisses sont les plus grands maîtres de l'art de l'horlogerie qui existent, hormis Dieu Lui-même bien sûr."
 irish_ideas:0 "Idées irlandaises"
 irish_ideas_start:0 "Traditions irlandaises"
 irish_ideas_bonus:0 "Ambition irlandaise"
 irish_endurance:0 "Endurance Irlandaise"
 irish_endurance_desc:0 "Des décennies de maladie et de famine ont principalement chassé les envahisseurs anglais de nos terres. Pendant ce temps, le peuple irlandais devient d'autant plus fort de ses expériences éprouvantes. Oui, il n'y a pas d'homme plus fort sur la verte terre de Dieu qu'un Irlandais !"
 the_clanns:0 "Les Clans"
 the_clanns_desc:0 "Les clans d'Irlande forment un corps politique fort pour la gestion des terres et des familles. Dans les plus petites familles, le chef de clan élu est chargé de maintenir la famille et de protéger ses terres. La terre et le leadership se transmettent par le système électoral familial de la Tanistrie. Parmi les clans royaux, le haut-roi symbolique d'Irlande est élu, créant un lien d'union entre les familles irlandaises."
 more_than_irish:0 "Plus Irlandais que les Irlandais"
 more_than_irish_desc:0 "Les envahisseurs normands ont chaleureusement embrassé les traditions irlandaises ; tellement qu'on disait qu'ils prenaient des airs d'être « Plus Irlandais que les Irlandais ». La nature même de notre culture est contagieuse, et pendant des siècles encore, des hommes embrasseront notre mode de vie."
 innefectual_overlords:0 "Suzerains Inefficaces"
 innefectual_overlords_desc:0 "Le gouvernement anglais à Dublin et leurs marionnettes du Parlement irlandais ont été affaiblis à la suite des nombreux conflits de l'Angleterre dans la Guerre de Cent Ans et la Guerre des Roses. Leur influence n'a plus aucune emprise sur les vrais seigneurs d'Irlande, et c'est maintenant le moment de frapper pour notre indépendance."
 foreign_nationals:0 "Nationaux Étrangers"
 foreign_nationals_desc:0 "En 1487, le seigneur irlandais John de la Pole, Comte de Lincoln, invita une armée de Bourgogne à Dublin pour soutenir le couronnement du prétendant anglais yorkiste Lambert Simnel. L'Irlande ferait une belle base de résistance contre le continent anglais, et garderait à jamais les occupants potentiels à distance. Nous pourrions aussi un jour gagner de puissants soutiens, comme le Royaume d'Espagne."
 loyal_catholics:0 "Fidèles Ravéliens"
 loyal_catholics_desc:0 "Tandis que les Anglais peuvent peiner et tournoyer dans les vents de la Réforme, le peuple irlandais dans son ensemble est déterminé à rester sous l'aile de son seigneur le Haut Recteur."
 unconquerable_ireland:0 "Irlande Invincible"
 unconquerable_ireland_desc:0 "Aucun seigneur anglais n'a pu contenir longtemps la volonté des Irlandais. Malgré tous les efforts, rébellion après rébellion a germé pour tenter de déplacer la domination anglaise. Insurrection après insurrection surgira sur leur chemin, et l'Irlande ne sera jamais vraiment la leur. Et, tandis qu'ils navigueront loin de nos terres, nous influencerons davantage la résistance contre les impérialistes protestants sur notre flanc oriental."
 ire_gallowglasses:0 "Septs Gallowglass Nationalisés"
 ire_gallowglasses_desc:0 "Autrefois bandes de mercenaires dispersées, les Gallowglasses sont consolidés en une armée nationale. Leur expérience institutionnelle est presque inégalée, et leurs septs sont les fondations parfaites pour des régiments."
 ire_abundant_harvests:0 "Récoltes Abondantes"
 ire_abundant_harvests_desc:0 "Maintenant que les propriétaires anglais cupides et négligents ont été chassés d'Irlande, nos fermiers sont enfin capables de gérer leurs produits en paix. Les maladies des cultures et les échecs de récolte sont traités comme des affaires d'importance critique pour l'État plutôt que comme des préoccupations périphériques d'une colonie insignifiante."
 SON_ideas:0 "Idées songhaï"
 SON_ideas_start:0 "Traditions songhaï"
 SON_ideas_bonus:0 "Ambition songhaï"
 gold_to_salt_trade:0 "Commerce Or contre Sel"
 gold_to_salt_trade_desc:0 "Certains disent que le sel vaut son poids en or... peut-être serait-il plus exact de dire que l'or vaut son poids en sel. Quoi qu'il en soit, en échangeant ces deux commodités, nous avons établi des réseaux commerciaux florissants."
 independence_from_mali:0 "Indépendance du Mali"
 independence_from_mali_desc:0 "Pendant de nombreuses années, nous étions sujets du Sultanat du Mali. Alors que le pouvoir du Mali s'est affaibli, le nôtre a grandi, et nous pouvons maintenant prétendre être pleinement indépendants de la suzeraineté malienne. Prenons des mesures pour nous assurer que nous le restions."
 jihad_against_the_pagans:0 "Djihad contre les Païens"
 jihad_against_the_pagans_desc:0 "Malgré les meilleurs efforts de siècles de sultanats sunnites, Sarhal occidental est toujours infesté par la menace des païens animistes. En levant la bannière du djihad, nous pouvons purifier nos terres des infidèles et étendre nos frontières en même temps."
 sankore_madrassah:0 "Madrassa de Sankoré"
 sankore_madrassah_desc:0 "On nous a dit que l'école de la Mosquée de Sankoré est le plus grand centre d'apprentissage de tout Sarhal. Qui pourrait être surpris si c'est vrai, voyant des sages d'Arabie lointaine et du Maghreb ici argumentant sur les points les plus fins de philosophie et de religion ?"
 the_hajj:0 "Le Hajj"
 the_hajj_desc:0 "Comme Mansa Musa du Mali le fit jadis, nos souverains peuvent aussi voyager à La Mecque, accomplissant le cinquième pilier de l'Islam en portant de l'or comme symbole de notre richesse et puissance. Comme le Mali jadis, faisons que le monde s'émerveille de la richesse et de la grandeur du Songhaï."
 sharia:0 "Charia"
 sharia_desc:0 "La Loi Sacrée que le Prophète utilisa pour gouverner Médine devrait être la fondation inébranlable des lois que nous utilisons pour diriger notre société. En réformant notre code pénal pour refléter les enseignements du Prophète, nous apporterons harmonie et justice à notre société."
 trans_sahara_trade:0 "Commerce Transsaharien"
 trans_sahara_trade_desc:0 "Nos marchands rapportent fréquemment des choses fascinantes des cours du nord de Sarhal. Peut-être serait-il possible de leur faire rapporter encore plus de bibelots fascinants ?"
 BRI_ideas:0 "Idées bretonnes"
 BRI_ideas_start:0 "Traditions bretonnes"
 BRI_ideas_bonus:0 "Ambition bretonne"
 legacy_of_breton_independence:0 "Héritage de l'Indépendance Bretonne"
 legacy_of_breton_independence_desc:0 "La Bretagne n'a jamais fait partie de la France. Bien que nous ayons été ravagés par les Francs, les Vikings et les Anglais dans le passé, nous avons, jusqu'ici, maintenu notre identité en tant que peuple à part. Que tous nos voisins sachent que la Bretagne restera libre, le dernier foyer des vraies traditions gauloises."
 estates_of_brittany:0 "Les États de Bretagne"
 estates_of_brittany_desc:0 "Convoqués pour la première fois au XIVe siècle, les États de Bretagne permettaient aux hommes libres de tous les échelons de la société, même le Tiers État, de partager leurs griefs et de présenter des pétitions au Duc pour réparation. En convoquant les États, nous pouvons évacuer une partie de la tension dans nos terres."
 breton_march:0 "Marche Bretonne"
 breton_march_desc:0 "Les anciens rois de Francie appelaient la frontière militarisée entre leurs terres et la Bretagne la Marche Bretonne. À l'époque, ils voulaient qu'elle nous tienne à l'écart. Ravivons les fortifications de la Marche Bretonne, cette fois pour tenir nos ennemis à l'écart."
 breton_catholicism:0 "Ravélianisme Breton"
 breton_catholicism_desc:0 "Les Français peuvent avoir prétendu être la « fille aînée de l'Église » depuis les jours de Clovis, mais leur observance est sporadique et leur fidélité à Rome n'est évidente que quand cela leur convient. Le Breton ne cache pas sa vénération de la Bienheureuse Vierge ni sa loyauté aux enseignements de Sa Sainteté et de la seule vraie Église Ravélienne."
 protect_the_coastline:0 "Protéger le Littoral"
 protect_the_coastline_desc:0 "La Bretagne est particulièrement exposée au danger d'invasion par les mers, car notre pays contient plus que la quantité habituelle de littoral. Nous avons besoin d'un nombre et d'un approvisionnement adéquats de navires pour nous empêcher de tomber aux mains d'envahisseurs étrangers."
 league_of_the_public_weal:0 "Ligue du Bien Public"
 league_of_the_public_weal_desc:0 "Nous devons nous tourner vers d'autres puissances afin de protéger notre indépendance du pouvoir centralisé, que ce soit en Angleterre ou en France. La langue dorée du diplomate fait autant pour nous défendre que les canons de nos troupes."
 catholicon:0 "Le Ravélianon"
 catholicon_desc:0 "En 1464, Jehan Lagadeuc écrivit le premier dictionnaire trilingue, qui contenait des mots en latin, breton et français. Ce livre étonnant fut le premier dictionnaire en langue bretonne ou française. En distribuant des copies du Ravélianon, nous pouvons montrer que le breton est tout autant une langue majeure que le français."
 malayan_ideas:0 "Idées des Sultanats Malais"
 malayan_ideas_start:0 "Traditions des Sultanats Malais"
 malayan_ideas_bonus:0 "Ambition des Sultanats Malais"
 indian_ocean_trade:0 "Commerce de l'Océan Indien"
 indian_ocean_trade_desc:0 "Le commerce lucratif emmène nos marchands aussi loin que la Chine, l'Hindoustan, l'Arabie, et même les côtes swahilies. Les richesses à saisir attirent de plus en plus de nos enfants vers la vie mercantile."
 sufi_legacy:0 "Héritage Soufi"
 sufi_legacy_desc:0 "Dans nos terres, l'Islam s'est répandu pacifiquement par l'émulation des nobles exemples des saints soufis. Que l'incroyant adore ce qu'il veut, nous sommes plus préoccupés par le développement de la meilleure relation personnelle avec Allah que nous pouvons."
 mal_spice_islands:0 "Îles aux Épices"
 mal_spice_islands_desc:0 "La muscade, le clou de girofle, l'humble poivre noir... chaque grain vaut son poids en or aux yeux de ceux maudits avec des cuisines nationales moins épicées. Le caractère désirable de nos épices à l'étranger a aussi augmenté leur valeur chez nous."
 classical_malay:0 "Malais Classique"
 classical_malay_desc:0 "Nous avons créé une riche tradition littéraire et culturelle dans une langue sophistiquée comportant des mots et phrases empruntés à des langues allant de l'arabe et du persan au chinois, qui devient rapidement la lingua franca de la région, permettant une communication plus facile des idées étrangères vers notre terre."
 trading_fleets:0 "Flottes Commerciales"
 trading_fleets_desc:0 "Les navires de nos marchands se rentabilisent lors de leurs vastes missions commerciales, ce qui signifie que c'est moins cher quand nous devons les convertir en navires de guerre en temps de guerre."
 heirs_of_pasai:0 "Héritiers de Pasai"
 heirs_of_pasai_desc:0 "Le Sultanat de Pasai, fondé au XIIIe siècle, fut le premier royaume musulman de notre région. Depuis ces jours, nous avons étendu la parole du Prophète dans tout cet archipel. Réfléchissons au chemin parcouru."
 settle_the_islands:0 "Coloniser les Îles"
 settle_the_islands_desc:0 "Les autres îles de cet archipel ont aussi besoin de ressentir les bienfaits d'une domination musulmane éclairée. En les colonisant, nous accédons à leurs riches biens et ils accèdent aux paroles du Prophète. Quoi de plus juste ?"
 arabian_ideas:0 "Idées arabes"
 arabian_ideas_start:0 "Traditions arabes"
 arabian_ideas_bonus:0 "Ambition arabe"
 arab_indian_ocean_trade:0 "Commerce de l'Océan Indien"
 arab_indian_ocean_trade_desc:0 "Nos marins sont allés jusqu'aux côtes swahilies et aussi loin que l'Hindoustan et même les terres malaises. Nous pouvons jouer un rôle critique dans le flux de marchandises entre ces riches régions."
 arabian_horses:0 "Chevaux Arabes"
 arabian_horses_desc:0 "Tout cavalier a entendu dire que les meilleurs chevaux sont les chevaux arabes, et qui a un plus grand approvisionnement de ces beautés que nous ? Mettons quelques-uns de nos meilleurs chevaux à l'étalon et regardons-nous produire un approvisionnement constant des plus grands chevaux connus de l'homme."
 land_of_the_prophet:0 "Terre du Prophète"
 land_of_the_prophet_desc:0 "Les gens de nos terres furent les premiers à entendre les paroles du Prophète Mahomet, que la paix soit sur lui. Chaque jour nous pouvons voir des clans et des tribus descendant de gens qui vivaient à son époque et entendirent ses paroles. Bien que l'Islam puisse se répandre loin et large jusqu'aux confins de la Terre, n'oubliez jamais qu'il a commencé dans cette sainte oasis de foi."
 spreading_the_prophets_word:0 "Répandre la Parole du Prophète"
 spreading_the_prophets_word_desc:0 "Il n'y a de dieu qu'Allah, Mahomet est Son messager. Maintenant, tous les hommes devraient connaître ces paroles saintes, mais un nombre choquant demeure encore dans l'état pitoyable d'ignorance de l'Islam. Nos missionnaires sont prêts à répandre les paroles du Prophète."
 bedouin_traders:0 "Marchands Bédouins"
 bedouin_traders_desc:0 "Il n'y a pas beaucoup de frontières artificielles nettement délimitées en Arabie, et même s'il y en avait, les Bédouins les ignoreraient. Bien que les voyages nomades bédouins à travers nos terres et vers d'autres comportent des risques, cela facilite aussi un accès facile au commerce dans toute la région, car les nomades bédouins ne connaissent pas de tarifs d'importation ni d'embargos commerciaux."
 arab_clan_loyalties:0 "Loyautés Claniques"
 arab_clan_loyalties_desc:0 "Notre peuple est divisé en de nombreux clans et tribus. Si nous pouvons nous assurer que tous les chefs de clan servent notre État, nous aurons une source précieuse de commandants et de pillards bédouins expérimentés qui ne peut être surestimée."
 coffea_arabica:0 "Coffea Arabica"
 coffea_arabica_desc:0 "Nous entendons que les Européens ne peuvent se passer de cette ancienne boisson des nôtres. Les cafés fleurissent dans tout Cannor et, bien qu'ils aient tenté de le planter ailleurs, le café original d'Arabie sera toujours le meilleur et le plus désirable."
 arabia:0 "Arabie"
 arabia_desc:0 "Bien que l'Arabie ait de nombreux clans, tribus et pays différents, tous partagent l'usage de la langue arabe, elle forme la caractéristique unificatrice de tous les Arabes. Sous un leadership fort, nous pouvons unir toutes les terres arabes sous un seul drapeau et un seul souverain."
 latin_ideas:0 "Idées italiennes"
 latin_ideas_start:0 "Traditions italiennes"
 latin_ideas_bonus:0 "Ambition italienne"
 italian_renaissance:0 "Renaissance Italienne"
 italian_renaissance_desc:0 "L'Italie est le berceau de la Renaissance, dans ces terres le savoir du monde antique a été exploré et ses idéaux sont renés. Nos philosophes, artistes, auteurs et universités restent à l'avant-garde de l'érudition cannorienne."
 italian_condottieri:0 "Condottieri Italiens"
 italian_condottieri_desc:0 "Les nombreuses guerres des cités-États italiennes ont attiré une foule d'entrepreneurs militaires ou Condottieri de près et de loin. Si jamais nous désirons entrer en guerre, trouver des bandes de mercenaires disposées à combattre pour nous ne sera pas difficile."
 italian_aristocracy:0 "Aristocratie Italienne"
 italian_aristocracy_desc:0 "Chaque pouce de terre italienne a été âprement disputé pendant des générations. Au fil des siècles, les nombreuses revendications des diverses maisons nobles ont été méticuleusement documentées, falsifiées et disputées. Tout envahisseur étranger aurait bien du mal à faire des revendications crédibles sur ces terres, et encore moins à les intégrer réellement et à contrôler les diverses parties en leur sein."
 tracee_italienne:0 "Trace Italienne"
 tracee_italienne_desc:0 "L'arrivée du canon a changé à jamais les champs de bataille et les sièges d'Italie et nos anciennes fortifications médiévales ne sont plus tout à fait à la hauteur de la tâche. Les ingénieurs italiens ont récemment été les pionniers d'un nouveau style de forteresses avec d'épais remparts de terre et des fossés. Au lieu d'entretenir nos murs obsolètes, nous devrions construire de telles fortifications car elles sont plus adaptées à la guerre moderne."
 high_renaissance_art_and_architecture:0 "Art et Architecture de la Haute Renaissance"
 high_renaissance_art_and_architecture_desc:0 "Toute la Chrétienté regarde avec envie les cours italiennes débordant de certains des meilleurs architectes, artistes et poètes de notre époque. Nous devons prendre soin d'étendre notre patronage assez largement pour qu'aucun de ces talents n'ait à être gaspillé dans les cours barbares hors de la péninsule."
 italian_diplomacy:0 "Diplomatie Italienne"
 italian_diplomacy_desc:0 "Les cités-États italiennes ont une longue histoire de relations diplomatiques et de traditions. Nous serions sages de l'utiliser pour faire avancer nos ambitions internationales. La réputation et l'expérience de nos ambassadeurs nous permettront de grandement étendre notre influence hors de nos frontières."
 commedia_del_arte:0 "Commedia dell'Arte"
 commedia_del_arte_desc:0 "Une nouvelle forme de théâtre d'improvisation est devenue courante dans les terres italiennes. Diverses compagnies de théâtre voyagent et se produisent sur des scènes temporaires avec le peuple et la noblesse comme spectateurs. En parrainant certaines des meilleures compagnies et en nous assurant qu'elles se produisent pendant les carnavals et autres festivités, nous gagnerions sans aucun doute la gratitude de nos sujets."
 NAJ_ideas:0 "Idées du Nejd"
 NAJ_ideas_start:0 "Traditions du Nejd"
 NAJ_ideas_bonus:0 "Ambition du Nejd"
 bedouin_poets:0 "Poètes Bédouins"
 bedouin_poets_desc:0 "Le voyage constant sur les dunes et les collines sous le soleil battant et implacable peut mettre un homme d'humeur poétique, où il réfléchit aux batailles livrées, aux amours perdues, et aux voyages entrepris il y a longtemps et comment les pas qu'il fait ont été faits par ses ancêtres des siècles auparavant. Leurs poèmes, évocateurs de victoires passées et de gloires perdues, encourageront nos hommes à combattre dix fois plus fort."
 hanbali_school_ni:0 "École Hanbalite"
 hanbali_school_ni_desc:0 "Nos ancêtres ont longtemps adhéré à l'école la plus stricte de jurisprudence islamique fondée par Ahmad ibn Hanbal au IXe siècle, et ses interdictions strictes contre tout ce qui ressemble de près ou de loin à l'idolâtrie et son engagement envers un code rigoureux de conduite islamique apportent l'harmonie à notre société."
 ships_of_the_desert:0 "Navires du Désert"
 ships_of_the_desert_desc:0 "Un homme pieux connaît les quatre-vingt-dix-neuf noms d'Allah, mais seul le chameau connaît le centième, c'est pourquoi ils ont toujours l'air si suffisants. Le chameau, le puissant navire du désert, a rendu possible notre mode de vie nomade pendant des siècles en transportant des marchandises à travers le désert sans piste. Si vous pouvez supporter l'odeur du chameau et son sourire suffisant, regardez-le prouver sa valeur de nombreuses fois."
 bedouin_raiders:0 "Pillards Bédouins"
 bedouin_raiders_desc:0 "Depuis avant les jours du Prophète, les Bédouins sont experts dans l'art du raid. Une armée peut marcher sur son estomac, mais elle ne marchera pas loin quand nos pillards prendront la nourriture directement de la bouche de l'armée par des saisies rapides de leurs lignes d'approvisionnement. Reculez et laissez les pillards faire leur travail et regardez l'envahisseur mourir de soif."
 arabian_horsemanship:0 "Art Équestre Arabe"
 arabian_horsemanship_desc:0 "L'homme qui monte pour le plaisir ou l'occupation militaire n'a aucune idée de ce qu'est le vrai art équestre. Le Bédouin monte pour commercer, pour manger, pour vivre. Il ne devrait surprendre personne qu'en plus des meilleurs chevaux, l'Arabie produise les meilleurs cavaliers."
 unite_the_tribes:0 "Unir les Tribus"
 unite_the_tribes_desc:0 "Notre façon peu organisée de gérer nos affaires a ses avantages. Peut-être pourrions-nous permettre aux tribus de continuer à pourvoir à l'entretien de leurs propres soldats et cavaliers tout en les réunissant dans une force militaire plus moderne orientée vers l'extérieur plutôt que vers l'intérieur ?"
 enforce_tawhid:0 "Imposer le Tawhid"
 enforce_tawhid_desc:0 "« Si l'un d'entre vous adore Mahomet, vous devez savoir que Mahomet est mort. Mais ceux d'entre vous qui adorent Allah, qu'il soit connu qu'Allah est vivant et ne peut mourir. » Les sanctuaires au Prophète et à ses Compagnons font une moquerie des sages paroles d'Abu Bakr. Ceux qui adorent à ces sanctuaires sont coupables de shirk, d'élever l'Homme au niveau de louange que seul Allah mérite. Si nous détruisons ces sanctuaires, nous imposerons le vrai tawhid, ou monothéisme, dans toute notre terre et purifierons cette sainte oasis de foi de la pollution de l'idolâtrie."
 HED_ideas:0 "Idées du Hedjaz"
 HED_ideas_start:0 "Traditions du Hedjaz"
 HED_ideas_bonus:0 "Ambition du Hedjaz"
 custodian_of_the_two_holy_cities:0 "Gardien des Deux Villes Saintes"
 custodian_of_the_two_holy_cities_desc:1 "Notre peuple se sent particulièrement lié aux lieux saints de La Mecque et Médine, le berceau de l'Islam. Leur lieu d'origine leur confère le sentiment d'être un peuple élu et leur procure aussi un statut spécial aux yeux de nombreux autres Musulmans."
 hed_red_sea_trade:0 "Commerce de la Mer Rouge"
 hed_red_sea_trade_desc:0 "Avec le commerce des épices remontant la mer Rouge, nous devons nous assurer de prendre part à ce commerce lucratif."
 sharifs_of_mecca:1 "Chérifs"
 sharifs_of_mecca_desc:1 "La ville la plus sainte de l'Islam est gouvernée par nos Chérifs qui sont des descendants d'une longue et honorable lignée. Historiquement, le Chérif était chargé de protéger les villes et d'assurer la sécurité des pèlerins accomplissant le Hajj."
 hed_desert_warfare:0 "Guerre du Désert"
 hed_desert_warfare_desc:0 "Le terrain inhospitalier du désert arabique a rendu nos guerriers plus forts et capables d'épuiser notre ennemi avant de porter le coup fatal."
 cradle_of_gold:0 "Berceau de l'Or"
 cradle_of_gold_desc:0 "Le Mahd adh Dhahab, aussi connu comme le Berceau de l'Or, est la zone d'extraction d'or près de notre ville de Médine. Nous devons nous assurer de mieux utiliser cette mine au profit de notre peuple."
 hajj:0 "Hajj"
 hajj_desc:0 "Le pèlerinage du Hajj est l'un des cinq piliers de l'Islam, qui doit être accompli par tout Musulman en bonne santé qui peut se le permettre au moins une fois dans sa vie. Des pèlerins du monde entier viendront dans nos terres pour accomplir leur devoir religieux."
 successor_to_the_caliphate:0 "Successeur du Califat"
 successor_to_the_caliphate_desc:0 "Le Hedjaz était jadis au centre du Califat sous la direction des quatre premiers califes : Abu Bakr as-Siddîq, Omar ibn Al-Khattâb, Uthmân ibn Affân et Alî ibn Abî Tâlib. Nous sommes redevenus assez puissants pour proclamer le titre de Calife et notre État comme successeur du Califat. Dieu est Grand !"
 NPL_ideas:0 "Idées népalaises"
 NPL_ideas_start:0 "Traditions népalaises"
 NPL_ideas_bonus:0 "Ambition népalaise"
 divya_upadesh:0 "Le Divya Upadesh"
 divya_upadesh_desc:0 "Le Divya Upadesh énonçait neuf principes qui formaient le cœur de la vie politique et nationale népalaise ainsi que des lignes directrices pour une politique étrangère réussie. Bien qu'il n'ait été écrit qu'au XVIIIe siècle, il encapsulait des siècles de pensées népalaises sur la gouvernance, la guerre et la paix. En suivant ces principes, le Népal a pu éviter la subversion des empires voisins et des Occidentaux maraudeurs."
 land_of_peaks:0 "Terre des Sommets"
 land_of_peaks_desc:0 "Notre peuple vit et meurt sans jamais perdre de vue les grands sommets qui nous entourent. Nous connaissons les collines et les montagnes comme notre poche. Même les Dieux se sont établis sur les hauteurs. Nous garderons toujours à l'esprit l'importante leçon que nous avons apprise... construire nos forts pour tirer avantage de l'environnement."
 valleys_united:0 "Nos Vallées Unies"
 valleys_united_desc:0 "Le Népal fut unifié juste avant notre époque par Jayasthiti Malla (qui régna de 1382 à 1395), qui unit les vallées, imposa l'ordre à travers elles et émit une monnaie universelle. Non seulement un maître militaire, Jayasthiti Malla rédigea la première codification complète de la loi au Népal, basée sur le dharma des anciens textes hindous. Toutes les diverses principautés et tribus des collines répondront maintenant à notre appel."
 rajput_refugees:0 "Réfugiés Rajpoutes"
 rajput_refugees_desc:0 "Les invasions islamiques du XIVe siècle ont laissé des dommages étendus dans les plaines au sud, et de nombreuses familles nobles rajpoutes ont été déposées et ont fui vers nos montagnes pour tenter de se rétablir comme propriétaires terriens. Accordons-leur des terres et exploitons leurs expériences de combat et leurs traditions guerrières."
 royal_kumari:0 "La Kumari Royale"
 royal_kumari_desc:0 "Les rois Malla consolidèrent leur position en prétendant être des réincarnations du dieu hindou Vishnu et en établissant le culte de la Kumari, dans lequel une jeune fille était désignée comme incarnation vivante de la Déesse de la Guerre, Durga, dont le rôle était de bénir le règne des Malla lors d'une célébration annuelle. Après la chute des Rois Malla, cette tradition continua avec d'autres dynasties au Népal. Oignons une nouvelle Kumari pour inspirer notre peuple !"
 gurkha_recruits:0 "Les Gurkhas"
 gurkha_recruits_desc:0 "Les Gurkhas sont un peuple tribal principalement des collines du centre-ouest et de l'est du Népal. Ce sont des combattants féroces et nous avons constaté que les inclure comme irréguliers dans nos armées nous apporte un grand succès sur le champ de bataille. Leur nom dérive du saint guerrier hindou Guru Gorakhnath, et leur cri de guerre est Jaya Mahakali, Ayo Gorkhali ! (Gloire à la Grande Kali, Les Gurkhas approchent !) Finalement, les prouesses militaires de nos Gurkhas seront craintes dans le monde entier."
 envelopment_and_blockade:0 "Enveloppement et Blocus"
 envelopment_and_blockade_desc:0 "Le Roi Prithvi Narayan Shah (1723-1775) réunifia le Népal et élimina ses ennemis un par un en bloquant les routes commerciales et en assiégeant les vallées morceau par morceau. Sa stratégie militaire s'avéra efficace dans les collines et montagnes du Népal, gardant les armées rivales affamées de ravitaillements et incapables de se rassembler en une force qui pourrait le submerger dans une bataille rangée."
 KNI_ideas:0 "Idées des Chevaliers Hospitaliers"
 KNI_ideas_start:0 "Traditions des Chevaliers Hospitaliers"
 KNI_ideas_bonus:0 "Ambition des Chevaliers Hospitaliers"
 defense_of_the_faith:0 "Défense de la Foi"
 defense_of_the_faith_desc:0 "Nous avons été chassés d'Acre et nous avons été chassés de Chypre, mais l'Ordre de l'Hôpital de Saint-Jean ne reculera plus. Dans les temps païens, un Colosse montait la garde sur le port de Rhodes, mais aujourd'hui les plus grandes fortifications que le monde ait jamais connues ont pris la garde."
 assistance_to_the_suffering:0 "Assistance aux Souffrants"
 assistance_to_the_suffering_desc:0 "L'Ordre est nommé les Chevaliers Hospitaliers pour une raison : nous étions à l'origine la force protectrice d'un hôpital de pèlerins à Jérusalem. Bien que Jérusalem soit perdue aux mains des Sarrasins, nous fournissons toujours une aide médicale à ceux qui en ont besoin, y compris nos braves chevaliers, qui retournent avec entrain sur le champ de bataille beaucoup plus vite que la plupart des armées."
 the_tongues_of_knights:0 "Les Langues des Chevaliers"
 the_tongues_of_knights_desc:0 "Il y a des membres de l'Ordre de toute la Chrétienté latine. Ici une voix allemande, là un chant français, partout une prière latine. Nos hommes viennent des terres de chaque couronne de la Chrétienté latine et ont plus de facilité à leur demander d'aider à nous défendre contre l'ennemi sarrasin."
 reconquista_of_the_sea:0 "Reconquista de la Mer"
 reconquista_of_the_sea_desc:0 "Dans nos affrontements fréquents avec les redoutables corsaires des menaces turques et barbaresques, l'idée nous est venue que les corsaires pourraient avoir la bonne idée concernant le pillage et la piraterie maritime de la côte, mais qu'ils dirigent leurs prédations vers les mauvaises cibles. La piraterie peut être un péché vil en temps de paix, mais en temps de guerre c'est connu comme « guerre de course » et c'est sûrement tout autre chose, n'est-ce pas ?"
 ecumenical_defenders_of_christendom:0 "Défenseurs Œcuméniques de la Chrétienté"
 ecumenical_defenders_of_christendom_desc:0 "La Réforme a nui à notre cause car les chevaliers allemands et scandinaves ont commencé à murmurer des questions sur la nature de l'Hostie de Communion, mais la menace toujours présente du Turc a une façon de faire paraître de tels différends mineurs. Peut-être devrions-nous nous concentrer sur la défense du royaume et débattre de théologie une fois que la menace sarrasine sera en sécurité à distance ?"
 scourge_of_the_corsairs:0 "Fléau des Corsaires"
 scourge_of_the_corsairs_desc:0 "Le célèbre corsaire turc Khayr ad-Din Barberousse combattit de nombreux affrontements légendaires contre les Chevaliers, mais Barberousse n'était guère le seul corsaire que nous ayons rencontré. Les raids et pillages turcs de tout le sud de Cannor, tolérés par les États barbaresques et financés par les Turcs, doivent cesser. Les Chevaliers feront leur travail de protection des marins innocents à tout prix."
 crusader_tradition:0 "Tradition des Croisés"
 crusader_tradition_desc:0 "Des Chevaliers de notre Ordre étaient présents dans les guerres contre Saladin. Des Chevaliers de notre Ordre ont combattu pour la défense du dernier avant-poste croisé d'Outremer, Acre. Si un Chevalier de l'Ordre a besoin d'inspiration pour des actes héroïques, il n'a qu'à regarder les exploits que les Chevaliers de l'Ordre de l'Hôpital de Saint-Jean ont accomplis dans le passé. Le nom Chevaliers Hospitaliers est vraiment éternel, tout comme notre courage légendaire au combat."
 KON_ideas:0 "Idées du Kongo"
 KON_ideas_start:0 "Traditions du Kongo"
 KON_ideas_bonus:0 "Ambition du Kongo"
 kongolese_tax_exchange:0 "Système Fiscal Kongolais"
 kongolese_tax_exchange_desc:0 "Plutôt qu'une ferme fiscale peu fiable, pourquoi ne pas taxer directement l'intermédiaire ? Les aristocrates taxent les paysans, nous taxons les aristocrates. Ils peuvent soit payer en nature par du bétail et des tributs agricoles, soit payer dans notre ancienne monnaie de nzimbu, de précieux coquillages cauris."
 election_of_manikongos:0 "Élection des Manikongos"
 election_of_manikongos_desc:0 "Notre chef, le Mwene Kongo, ou comme les étrangers sur nos côtes l'appellent, le Manikongo, a été sélectionné par un comité d'anciens qui auraient pu choisir n'importe quel membre de sa famille. D'autres pays peuvent s'appuyer sur des coutumes comme la primogéniture, mais notre façon s'assure qu'il y a un héritier disponible, même si le fils de l'ancien souverain peut parfois en vouloir du fait de ne pas accéder au trône."
 imported_european_weaponry:0 "Armement Cannorien Importé"
 imported_european_weaponry_desc:0 "Les Européens sont venus à nous, mais beaucoup de leurs coutumes ne nous intéressent pas. Aussi puissants soient-ils, nous n'avons pas besoin de leurs lois. Cependant, nous avons besoin de leurs armes à feu. Commerçons afin de remplacer les arcs et flèches traditionnels de notre peuple par une nouvelle tradition, les mousquets."
 diplomacy_with_european_monarchs:0 "Diplomatie avec les Monarques Cannoriens"
 diplomacy_with_european_monarchs_desc:0 "Il n'y a rien qu'un souverain couronné apprécie plus qu'échanger des mots avec le souverain exotique d'une terre lointaine, une terre trop éloignée pour être un adversaire naturel. Peut-être que nos correspondants lointains peuvent nous protéger d'autres monarques étrangers plus avides."
 triangle_trade:0 "Le Commerce Triangulaire"
 triangle_trade_desc:0 "Le commerce triangulaire apporte des armes chez nous, prend des esclaves de chez nous vers les Amériques, et ramène des produits agricoles des Amériques vers Cannor. Ces armes nous permettent de conquérir plus de tribus rivales et de gagner encore plus de captifs à vendre aux Européens pour nous donner les fonds pour acheter encore plus d'armes ! Certains ont dit que le commerce triangulaire est immoral, mais ils changeront d'avis quand ils verront nos nouveaux mousquets et combien d'esclaves de plus nous pouvons capturer avec eux et combien de mousquets de plus nous pouvons acheter avec le produit."
 foreign_demand_for_slaves:0 "Demande Étrangère d'Esclaves"
 foreign_demand_for_slaves_desc:0 "De temps en temps, un rapport inquiétant fait surface que des Européens trop zélés ont kidnappé l'un de nos nobles et l'ont envoyé à un sort pire que la mort, un horrible voyage enchaîné et une vie courte et affreuse dans une plantation de sucre. Prenons des mesures pour garder les Européens satisfaits de notre approvisionnement en captifs étrangers pour garder notre propre peuple à l'abri des horreurs de l'esclavage. Si nous continuons à mener ces raids d'esclaves sur les autres tribus de Sarhal, cela gardera notre propre peuple en sécurité et apportera les revenus pour garder notre royaume fort et notre propre peuple hors des chaînes."
 defend_against_the_colonists:0 "Se Défendre contre les Colons"
 defend_against_the_colonists_desc:0 "Nous avons tenté de traiter pacifiquement avec de multiples nations cannoriennes dans l'espoir que leurs bonnes relations avec nous empêcheraient les autres de nous conquérir, mais l'un des lions qui nous encercle pourrait un jour mordre. Nous devons renforcer notre armée si nous voulons avoir un espoir de repousser les Européens si la guerre vient un jour."
 colonial_ideas:0 "Idées Coloniales"
 colonial_ideas_start:0 "Traditions Coloniales"
 colonial_ideas_bonus:0 "Ambition Coloniale"
 founding_fathers:0 "Pères Fondateurs"
 founding_fathers_desc:0 "Tous ces politiciens, soldats et diplomates qui ont joué un rôle influent dans l'établissement de leur nation, en gagnant l'indépendance de leur pays et en créant un nouveau système de gouvernance."
 continental_trade:0 "Commerce Continental"
 continental_trade_desc:0 "Bien que les colonies d'Aelantir aient dû importer beaucoup de produits manufacturés, elles sont aussi devenues un fournisseur majeur de matières premières pour le marché cannorien."
 religious_outposts:0 "Avant-postes Religieux"
 religious_outposts_desc:0 "Répandre le christianisme en Aelantir en convertissant les peuples indigènes était une priorité surtout de l'Église Ravélienne, et allait souvent de pair avec les intérêts commerciaux dans le processus de colonisation d'Aelantir."
 free_thinkers:0 "Libres Penseurs"
 free_thinkers_desc:0 "Les idées que la liberté de pensée et la liberté d'expression sont le droit de tout homme étaient fortes dans les colonies. Que sans cela, il ne pourrait y avoir de chose telle que la liberté publique."
 colonial_militia:0 "Milice Coloniale"
 colonial_militia_desc:0 "En l'absence de garnisons régulières, les milices coloniales jouaient un rôle important dans les conflits locaux et les raids frontaliers contre les tribus indigènes et autres colonies. Composées de citoyens mâles adultes qui devaient souvent fournir leurs propres armes et équipements."
 new_frontiers:0 "Nouvelles Frontières"
 new_frontiers_desc:0 "Le mouvement pour pousser la frontière coloniale de plus en plus loin à l'intérieur des terres en Aelantir, en établissant tout, des petites stations commerciales aux établissements complets avec de grandes zones de terres cultivées."
 liberty_heroes:0 "Héros de la Liberté"
 liberty_heroes_desc:0 "Beaucoup des dirigeants des guerres d'indépendance d'Aelantir ne possédaient pas seulement les compétences militaires nécessaires mais aussi le charisme nécessaire pour encourager le moral et tenir ensemble l'armée et être un leader inspirant pour le peuple."
 client_ideas:0 "Idées de l'État Client"
 client_ideas_start:0 "Traditions de l'État Client"
 client_ideas_bonus:0 "Ambition de l'État Client"
 client_self_rule:0 "Autonomie"
 client_self_rule_desc:0 "Notre Suzerain nous a accordé une autonomie considérable, nous permettant de gérer plus efficacement les affaires locales avant qu'elles ne deviennent un problème."
 foreign_tax_collectors:0 "Shérifs Étrangers"
 foreign_tax_collectors_desc:0 "Nos shérifs sont des étrangers qui peuvent ignorer de nombreuses restrictions imposées à la collecte des impôts par l'élite locale. Cela nous permet de lever plus de revenus."
 fortified_borders:0 "Frontière Fortifiée"
 fortified_borders_desc:0 "Notre nation est une frontière fortifiée contre les ennemis de notre Suzerain, qui a beaucoup investi dans nos fortifications pour s'assurer qu'elles puissent résister à l'artillerie moderne."
 mercantile_privileges:0 "Privilèges Mercantiles"
 mercantile_privileges_desc:0 "Notre nation jouit de privilèges étendus dans le contrôle du trafic frontalier et des droits de douane, nous permettant d'exercer plus de contrôle sur le commerce transitant par nos terres."
 mercenary_recruitment_center:0 "Centres de Recrutement"
 mercenary_recruitment_center_desc:0 "Les villes de notre nation abritent de nombreux centres de recrutement où notre suzerain lève des mercenaires pour combattre ses guerres. Nous pouvons en bénéficier en utilisant certains de ces mercenaires pour notre propre armée."
 magnate_landowners:0 "Magnats Étrangers"
 magnate_landowners_desc:0 "En distribuant des domaines à des nobles étrangers disposés à s'installer dans notre nation, nous pouvons créer une aristocratie loyale à nos propres intérêts et augmenter nos revenus agricoles."
 foreign_advisors_client:0 "Conseillers Étrangers"
 foreign_advisors_client_desc:0 "En accueillant des conseillers de la cour de notre Suzerain, nous pouvons apprendre comment mieux administrer notre propre nation."
 MAL_ideas:0 "Idées maliennes"
 MAL_ideas_start:0 "Traditions maliennes"
 MAL_ideas_bonus:0 "Ambition malienne"
 restore_malian_suzerainity:0 "Restaurer la Suzeraineté Malienne"
 restore_malian_suzerainity_desc:0 "L'Empire du Mali a toujours été une affaire décentralisée, une collection de villes prêtant allégeance à un Mansa dont les principales fonctions étaient de protéger les routes entre elles et de les défendre contre les bandits, les pillards et les envahisseurs. Certains de nos vassaux ont senti le sang dans l'eau et ont profité de notre période de faiblesse au début du XVe siècle pour mettre fin à toute prétention de vassalité. Nous devons d'abord leur rappeler l'autorité légitime du Mansa si nous voulons que notre Empire retrouve sa gloire d'antan."
 gold_of_bure:0 "Or de Bouré"
 gold_of_bure_desc:0 "Les champs aurifères jumeaux de Bambouk et Bouré sont renommés comme les plus grands gisements d'or dont quiconque ait jamais entendu parler, et ils sont nôtres. Les mines d'or de Bouré produisent une richesse fantastique qui a célèbrement déstabilisé toute l'économie de l'Égypte par l'inflation quand Mansa Moussa s'y rendit. Notre économie, cependant, est habituée à un afflux constant d'or et est plus difficile à faire gonfler."
 reclamation_of_land:0 "Reconquête des Terres"
 reclamation_of_land_desc:0 "Le Sahara ne reste pas au même endroit... il peut croître et décroître selon les précipitations, et la bande habitable connue sous le nom de Sahel où nous résidons peut s'étendre ou rétrécir en conséquence. Une grande sécheresse pourrait rendre une grande partie de notre royaume un désert inutile, un ajout au Sahara où personne ne règne sauf la mort. Cependant, lors des bonnes années, nous pourrions récupérer une partie des terres marginales du Sahara et les rendre à nouveau productives."
 mandinka_warrior_spirit:0 "Esprit Guerrier Mandingue"
 mandinka_warrior_spirit_desc:0 "Qu'ils soient païens ou musulmans, les hommes mandingues ont été les plus grands combattants que le Sahel ait jamais vus. Le courage de nos troupes est admirable, tout comme leur fierté. Quand le Mansa lève une armée, non seulement c'est la plus grande de tout le Sahel, c'est la meilleure."
 lost_fleet_of_abubukari_ii:0 "Flotte Perdue d'Abubakari II"
 lost_fleet_of_abubukari_ii_desc:0 "Vers 1312, le Mansa Abubakari II quitta son trône pour naviguer en exploration des limites de l'océan. Ni lui ni sa flotte ne furent jamais revus, au grand soulagement de son successeur, Mansa Moussa. Comme Abubakari le pensait jadis, peut-être y a-t-il de la valeur à voir les limites de l'océan. Contrairement à quand il l'essaya, cependant, cette fois le Mansa restera chez lui."
 seek_new_markets_for_salt:0 "Chercher de Nouveaux Marchés pour le Sel"
 seek_new_markets_for_salt_desc:0 "Dans notre royaume, le sel vaut son prix en or. Au sud de nous, dans les grandes forêts des Ashanti et des Yoruba, le sel vaut considérablement plus que l'or. Heureusement pour nous, nous avons nos propres réserves de sel et assez d'or pour en obtenir un approvisionnement infini. Peut-être pourrions-nous trouver encore plus de marchés de gens pour qui le sel est plus précieux que l'or ?"
 west_african_slave_trade:0 "Commerce d'Esclaves de Sarhal Occidental"
 west_african_slave_trade_desc:0 "Même avant que notre Empire n'existe, le grand Wagadou, l'Empire du Ghana qui nous précéda, vendait des esclaves à travers le désert aux Arabes, et nous avons suivi cet exemple toutes ces années, fournissant au monde arabe une vaste quantité d'esclaves. Maintenant les Européens réclament un nombre encore plus grand d'esclaves pour travailler dans leurs possessions dans le soi-disant Aelantir. Nous avons eu peu de rapports, mais la quantité d'esclaves qu'ils demandent est vraiment stupéfiante et ils reviennent sans cesse, parfois même en pillant nos côtes et en enlevant nos sujets. Le temps est venu d'imposer l'ordre sur le commerce des esclaves et de restreindre les Européens à des ports commerciaux sélectionnés où ils achèteront, pas voleront, des esclaves."
 native_ideas:0 "Idées Indigènes"
 native_ideas_start:0 "Traditions Indigènes"
 native_ideas_bonus:0 "Ambition Indigène"
 adopt_clan_totems:0 "Adopter les Totems de Clan"
 adopt_clan_totems_desc:0 "Chaque clan devrait être sous la protection d'un totem animal, décrivant mieux la place de chaque clan au sein de notre société."
 the_little_war:0 "La Petite Guerre"
 the_little_war_desc:0 "Plutôt que de nous engager dans la guerre les uns contre les autres, nous devrions encourager notre peuple à diriger ses énergies vers un jeu cérémoniel utilisant de nombreux rituels de la guerre, mais où le but est de contrôler une balle avec des bâtons."
 clan_mothers:0 "Mères de Clan"
 clan_mothers_desc:0 "Nous devrions écouter la sagesse des mères de nos clans, qui cultivent les champs. Qu'elles aient une voix dans le gouvernement de la tribu et le choix de nos chefs !"
 counting_coups:0 "Compter les Coups"
 counting_coups_desc:0 "En reconnaissant certains actes sur le champ de bataille comme des « coups » dignes d'être racontés et célébrés, nous pouvons encourager nos jeunes hommes à montrer plus de bravoure alors qu'eux aussi tentent de gagner renommée et gloire."
 war_and_peace_chiefs:0 "Chefs de Guerre et de Paix"
 war_and_peace_chiefs_desc:0 "Comme les devoirs sont répartis parmi le peuple, nous devrions aussi chercher à établir une tradition de chefs qui sont uniquement responsables des affaires de guerre, et qui peuvent à leur tour rapidement rassembler les meilleurs guerriers de notre peuple."
 storytelling_tradition:0 "Tradition de Contes"
 storytelling_tradition_desc:0 "En honorant et respectant nos grands conteurs, nous pouvons nous assurer que les traditions et idées de notre peuple sont transmises de génération en génération."
 great_winter_hunts:0 "Grandes Chasses d'Hiver"
 great_winter_hunts_desc:0 "Quand le froid mordant arrive sur notre terre, nos villages et champs ne peuvent plus subvenir à nos besoins. À ce moment, nous devons rester mobiles à la recherche de terrains de chasse où nous pouvons encore trouver de la nourriture."
 HUR_ideas:0 "Idées huronnes"
 HUR_ideas_start:0 "Traditions huronnes"
 HUR_ideas_bonus:0 "Ambition huronne"
 birchback_canoes:0 "Canoës en Écorce de Bouleau"
 birchback_canoes_desc:0 "En utilisant des canoës en écorce de bouleau plus légers plutôt que les canoës en bois d'orme plus lourds de nos cousins iroquois, nous pouvons mieux profiter des voies navigables et du portage d'Amérique du Nord, élargissant grandement notre capacité à diriger le flux du commerce."
 feast_of_the_dead:0 "Festin des Morts"
 feast_of_the_dead_desc:0 "C'est une tradition parmi notre peuple que les morts ne peuvent être inhumés dans la fosse funéraire communale avant qu'un Festin des Morts ne soit tenu. Alors, et seulement alors, peuvent-ils atteindre la terre au-delà de l'endroit où le soleil se couche. Nous devons préserver cette cérémonie à tout prix."
 harsh_justice:0 "Justice Sévère"
 harsh_justice_desc:0 "Nous ne devrions pas tolérer le meurtre ou d'autres crimes parmi notre peuple. Ceux qui le feraient devraient non seulement être tués à leur tour, mais devraient être laissés à mourir de faim, ou subir une punition tout aussi douloureuse."
 great_lakes_trade:0 "Commerce des Grands Lacs"
 great_lakes_trade_desc:0 "Nous occupons une position unique au carrefour de nombreuses routes commerciales, entre un grand nombre de tribus. Nous devrions exploiter cette position pour devenir les marchands experts d'Amérique du Nord."
 missionary_welcome:0 "Accueil des Missionnaires"
 missionary_welcome_desc:0 "Il y a ceux qui viendraient dans notre terre pour prêcher la foi de leur peuple et nous parler davantage de leur monde. Il serait sage de notre part de les accueillir, et de laisser ceux qui voudraient les écouter les écouter."
 hire_allied_warriors:0 "Engager des Guerriers Alliés"
 hire_allied_warriors_desc:0 "Nous devrions compenser notre manque de nombre en utilisant notre influence diplomatique pour convaincre les villages de tribus amies de nous prêter certains de leurs guerriers."
 eldest_children:0 "Enfants Aînés"
 eldest_children_desc:0 "Grâce à notre position unique d'intermédiaires, nous avons l'opportunité de nous établir comme chefs parmi toute alliance en Amérique du Nord ! Nous devrions saisir cette opportunité à tout prix !"
 IRO_ideas:0 "Idées iroquoises"
 IRO_ideas_start:0 "Traditions iroquoises"
 IRO_ideas_bonus:0 "Ambition iroquoise"
 kainerekowa:0 "Kainerekowa"
 kainerekowa_desc:0 "Nous devons toujours honorer le grand don de Hiawatha et du Grand Pacificateur, la Grande Loi de la Paix, qui unit nos cinq nations sous un but unique, et nous donna nos règles de gouvernance."
 keepers_of_the_western_door:0 "Gardiens de la Porte Occidentale"
 keepers_of_the_western_door_desc:0 "À l'ouest, les Seneca nous gardent contre les intrusions de nos ennemis. Ils sont de loin les membres les plus nombreux de notre confédération, et nous devrions exploiter ces nombres pour nous permettre de déployer de plus grandes armées."
 keepers_of_the_eastern_door:0 "Gardiens de la Porte Orientale"
 keepers_of_the_eastern_door_desc:0 "À l'est, les Mohawks se tiennent à cheval sur les grandes rivières menant à la mer et sont en position de permettre ou d'empêcher d'autres tribus de commercer. Nous devrions exploiter cette position à notre avantage économique."
 keepers_of_the_fire:0 "Gardiens du Feu"
 keepers_of_the_fire_desc:0 "Au cœur même de notre terre, les Onondaga maintiennent la flamme vivante. Nous devrions maintenir une tradition de choisir notre chef, le Tadodaho, parmi leur peuple, car ils sont les maîtres du compromis entre les moitiés orientale et occidentale de notre peuple."
 mourning_wars:0 "Guerres de Deuil"
 mourning_wars_desc:0 "C'est une tradition de longue date de notre peuple d'adopter les guerriers capturés dans la tribu. Mais pour reconstituer nos effectifs et assurer notre capacité de conquête, nous devrions chercher à adopter non seulement des guerriers individuels, mais des tribus entières parmi les Iroquois."
 warriors_unity:0 "Unité des Guerriers"
 warriors_unity_desc:0 "Nous ne sommes peut-être pas la plus grande tribu en termes de nombre, mais nos structures tribales solides nous accordent quelque chose que les autres n'ont pas : l'unité ! Nos guerriers combattent comme des frères, et se tiennent ensemble sur le champ de bataille. Tant que nous maintenons cette tradition, nous ne pouvons perdre !"
 the_four_kings:0 "Les Quatre Rois"
 the_four_kings_desc:0 "Nous devrions déléguer certains de nos chefs pour visiter la patrie lointaine de nos amis et alliés, renforçant ainsi cette amitié."
 CHICK_ideas:0 "Idées chickasaws"
 CHICK_ideas_start:0 "Traditions chickasaws"
 CHICK_ideas_bonus:0 "Ambition chickasaw"
 moundbilders_legacy_CHE:0 "Héritage des Bâtisseurs de Tertres"
 moundbilders_legacy_CRE:0 "Héritage des Bâtisseurs de Tertres"
 moundbilders_legacy:0 "Héritage des Bâtisseurs de Tertres"
 moundbilders_legacy_desc:0 "Avant nous, il vivait dans ces terres un peuple qui construisait de grandes cités-tertres. Ils ont disparu maintenant, mais leurs tertres demeurent, et nous pouvons beaucoup apprendre en les étudiant et en les utilisant pour la construction de notre propre ville."
 moundbilders_legacy_CHE_desc:0 "Avant nous, il vivait dans ces terres un peuple qui construisait de grandes cités-tertres. Ils ont disparu maintenant, mais leurs tertres demeurent, et nous pouvons beaucoup apprendre en les étudiant et en les utilisant pour la construction de notre propre ville."
 moundbilders_legacy_CRE_desc:0 "Avant nous, il vivait dans ces terres un peuple qui construisait de grandes cités-tertres. Ils ont disparu maintenant, mais leurs tertres demeurent, et nous pouvons beaucoup apprendre en les étudiant et en les utilisant pour la construction de notre propre ville."
 nighttime_raids:0 "Raids Nocturnes"
 nighttime_raids_desc:0 "Ces ennemis qui osent s'aventurer dans nos terres ne doivent jamais pouvoir se reposer. Nous devons frapper pendant qu'ils tentent de dormir, endommager leurs provisions, et nous assurer qu'ils quittent notre terre pour ne jamais revenir."
 slave_raids:0 "Raids d'Esclaves"
 slave_raids_desc:0 "Nous sommes puissants, et nous sommes de mortels guerriers, mais nous avons peu de biens commerciaux dans nos terres. Nos voisins, cependant, sont toujours disposés à payer pour des captifs à mettre au travail. En pillant les ennemis et en prenant des captifs à vendre, nous pouvons grandement augmenter notre richesse."
 swan_feathers_mantle:0 "Manteau de Plumes de Cygne"
 swan_feathers_mantle_desc:0 "Le Manteau de Plumes de Cygne est une marque de grand prestige parmi notre peuple. Nous devrions nous assurer que nos chefs le méritent toujours !"
 spartans_of_miss:0 "Spartiates du Bas-Mississippi"
 spartans_of_miss_desc:0 "Les voyageurs dans nos terres nous parlent d'un ancien royaume qui valorisait les prouesses militaires au-dessus de toute autre marque de statut, comme nous le faisons. Nous devons nous efforcer pour qu'à l'avenir, notre nom soit également remémoré !"
 unconqured_and_unconquerable:0 "Invaincus et Invincibles"
 unconqured_and_unconquerable_desc:1 "Nos Anciens ne peuvent plus combattre, mais nous pouvons bénéficier de leur expérience car ils n'ont jamais été vaincus."
 lessons_of_ackia:0 "Leçons d'Ackia"
 lessons_of_ackia_desc:0 "Dans notre patrie traditionnelle, la ville fortifiée d'Ackia garde les chemins menant à nos autres établissements. Nous devrions toujours nous efforcer de nous en souvenir, et d'installer de puissantes villes fortifiées là où elles peuvent interdire l'accès à notre patrie aux ennemis."
 tolerance_idea:0 "Tolérance"
 tolerance_idea_desc:0 "Adopter une vue plus tolérante envers les religions minoritaires dans notre pays augmentera grandement notre unité religieuse."
 benign_diplomats:0 "Diplomates Bienveillants"
 benign_diplomats_desc:0 "En étant plus soigneux dans la sélection et l'éducation de nos diplomates, nous augmenterons grandement nos chances d'exercer notre influence et d'établir une position favorable dans d'autres pays."
 CHE_ideas:0 "Idées cherokees"
 CHE_ideas_start:0 "Traditions cherokees"
 CHE_ideas_bonus:0 "Ambition cherokee"
 massacre_of_the_anikutani:0 "Massacre des Ani-Kutani"
 massacre_of_the_anikutani_desc:0 "Nous ne devons jamais oublier le clergé corrompu que nous avons jadis laissé régner sur nous, et nous ne devons jamais oublier les batailles que nous avons menées pour les détruire. Ne laissons jamais un tel groupe régner sur nous à nouveau."
 red_chiefs:0 "Chefs Rouges"
 red_chiefs_desc:0 "En organisant les membres plus jeunes et plus belliqueux de la tribu sous la direction d'un Chef Rouge, assisté d'éclaireurs, d'hommes-médecine et d'un conseil de guerre tiré des sept clans, nous pouvons grandement améliorer notre capacité à nous rassembler en temps de guerre."
 cherokee_adaptability:0 "Adaptabilité Cherokee"
 cherokee_adaptability_desc:0 "À mesure que nous grandissons, nous rencontrerons de nombreuses nouvelles personnes et de nouvelles idées. Nous ne devons jamais nous fermer à ces idées, mais au contraire nous devons chercher à les intégrer dans le fonctionnement de notre peuple, améliorant le gouvernement, les méthodes de guerre et même les méthodes de communication."
 ghigau:0 "Ghigau"
 ghigau_desc:0 "Parfois, des femmes sortent de leurs rôles normaux et se distinguent sur le champ de bataille. Ces femmes devraient être nommées au rang de Femmes Bien-Aimées, ou Ghigau, recevoir un siège votant au Conseil des Chefs, et recevoir la responsabilité du sort des prisonniers de guerre."
 mountainous_isolation:0 "Isolement Montagneux"
 mountainous_isolation_desc:0 "Notre position, au cœur d'une terre de montagnes et de passes étroites, rend difficile pour les ennemis d'atteindre notre terre et de conquérir nos villes."
 cherokee_emperor:0 "Empereur Cherokee"
 cherokee_emperor_desc:0 "En élisant l'un de nos chefs comme notre représentant parmi les étrangers, nous pouvons grandement améliorer notre capacité à négocier et à conclure des accords avec eux."
 MOVE_TRADE_PORT_ALREADY_TRADE_PORT:0 "Votre Ville Commerciale Principale est déjà située dans ce nœud."
 MOVE_TRADE_PORT_ONLY_CITY:0 "Vous ne pouvez déplacer votre port commercial que vers une ville complète."
 MOVE_TRADE_PORT_CORE:0 "Vous ne pouvez déplacer votre port commercial que vers une province légitimée."
 MOVE_TRADE_PORT_AT_WAR:0 "Vous ne pouvez pas déplacer votre port commercial en guerre."
 MOVE_TRADE_PORT_DIPLOMATIC:0 "Vous avez besoin de §Y$POWER$§!£dip pour déplacer votre port commercial."
 MOVE_TRADE_PORT_NOT_OUR_PROV:0 "Vous devez posséder et contrôler $NAME|Y$ pour y déplacer votre port commercial."
 KUR_ideas:0 "Idées de Courlande"
 KUR_ideas_start:0 "Traditions de Courlande"
 KUR_ideas_bonus:0 "Ambition de Courlande"
 legacy_of_sword_brethren:0 "Héritage des Frères de l'Épée"
 legacy_of_sword_brethren_desc:0 "Le Duché de Courlande est établi sur les terres du Schwertbrüderorden, les Frères Livoniens de l'Épée. Notre premier duc était le Grand Maître et notre noblesse, les chevaliers de l'Ordre. Les nobles se convertirent au Protestantisme et l'Ordre se sécularisa, mais la forteresse des Chevaliers Chrétiens se dresse fermement."
 privilegium_gotthardinum:0 "Privilegium Gotthardinum"
 privilegium_gotthardinum_desc:0 "Bien que notre peuple soit principalement letton, la majorité de notre classe dirigeante est, cependant, allemande. Il devient donc nécessaire d'assurer le pouvoir de nos nobles. Le privilège émis par Gotthard Kettler, le premier duc de Courlande et Sémigalie, permet à nos propriétaires terriens d'asservir la paysannerie indigène sur leurs terres et leur accorde un haut pouvoir juridique, cela renforcera effectivement notre autorité."
 duchy_of_mercantilism:0 "Duché du Mercantilisme"
 duchy_of_mercantilism_desc:0 "Notre pays peut être petit, mais certainement pas insignifiant, le Duché de Courlande était parmi les États commerçants les plus importants autour de la mer Baltique. Nous devrions pousser cela un cran plus loin. En promouvant la politique mercantiliste, nous pouvons forger notre nation en une vraie puissance dans la région !"
 booming_manufacture:0 "Manufacture Florissante"
 booming_manufacture_desc:0 "Le mercantilisme florissant et une agriculture prospère contribuent au développement de l'industrie. Nous ne sommes peut-être pas l'usine du monde, mais nos produits sont dans tout Cannor : nous pouvons produire des ancres et des canons, des briques et des tuiles préparées, du verre et du tissu et encore plus, les navires construits à Goldingen, Libau et Windau sont vendus en Angleterre et en France. Une telle économie prospère ne pourra certainement qu'être bonne pour nous..."
 couronian_colonization:0 "Colonisation Courlandaise"
 couronian_colonization_desc:0 "La découverte du Nouveau Monde a apporté des changements qui ne peuvent être ignorés sur notre continent. C'est une ère d'opportunités et nous ne devons pas rester en arrière ! Avec notre richesse, nous pouvons soutenir une flotte considérable, qui est la clé de l'exploration et de la colonisation et ainsi garantir nos intérêts outre-mer et la prospérité de tout notre pays."
 palaces_of_mitau:0 "Palais de Mitau"
 palaces_of_mitau_desc:0 "Le Palais de Mitau est le plus grand manoir de style baroque des États baltes, aux côtés du palais d'été de Ruhenthal, ce sont aussi probablement les palais les plus impressionnants de la région. Conçus par le célèbre architecte Bartolomeo Rastrelli, ces magnifiques bâtiments nous apporteront certainement une bonne renommée."
 promote_the_curonian_kings:0 "Promouvoir les Rois Curoniens"
 promote_the_curonian_kings_desc:0 "Les Rois Curoniens sont les descendants des anciens chefs curoniens. À l'époque de l'Ordre Livonien, ils jouissaient d'une série de privilèges et servaient dans l'armée en temps de guerre. Après la fondation du Duché, ils perdirent certains de leurs privilèges et furent écartés du service militaire. Peut-être devrions-nous les promouvoir à nouveau, afin que notre pays puisse tirer le meilleur parti de ces descendants de féroces guerriers."
 humanist_ideas:0 "Idées de Tolérance"
 humanist_ideas_bonus:0 "Tolérance Complète (Idées)"
 local_traditions:0 "Traditions Locales"
 local_traditions_desc:0 "Gouverner une grande nation signifie régner sur de nombreux peuples divers, chacun avec ses propres coutumes et traditions. En incorporant ces traditions dans notre code officiel de lois, nous créons une population heureuse et loyale."
 indirect_rule:0 "Règle Indirecte"
 indirect_rule_desc:0 "Parfois la meilleure façon d'amener les gens à faire ce que vous voulez est de leur laisser croire qu'ils font leurs propres choix. Un tel système de règle indirecte réduira les troubles dans les provinces nouvellement acquises."
 cultural_ties:0 "Liens Culturels"
 cultural_ties_desc:0 "Différentes cultures ont différentes coutumes, et pour une raison quelconque ont tendance à résister aux tentatives d'en haut de changer lesdites coutumes. Nous pouvons transformer cette faiblesse en force en incorporant les chefs locaux dans notre système de gouvernement et en les faisant exécuter notre volonté d'une manière qui leur soit acceptable."
 benevolence:0 "Bienveillance"
 benevolence_desc:0 "Notre nation est un bastion de tolérance et d'illumination. En nous assurant que toutes les autres nations le sachent, nous pouvons favoriser de meilleures relations à l'étranger."
 influence_ideas:0 "Idées d'Influence"
 influence_ideas_bonus:0 "Influence Complète"
 establish_cadet_branches:0 "Établir des Branches Cadettes"
 establish_cadet_branches_desc:0 "L'héritage peut être une affaire délicate. En définissant clairement les rôles et droits de notre dynastie à travers des Branches Cadettes, nous pouvons assurer une ligne de succession plus stable."
 tribute_system:0 "Système de Tribut"
 tribute_system_desc:0 "Renforçons nos revenus en établissant un système formalisé de tribut annuel de nos vassaux."
 integrated_elites:0 "Élites Intégrées"
 integrated_elites_desc:0 "En amenant l'élite dirigeante de nos nations sujettes dans notre gouvernement, nous pouvons considérablement faciliter le processus d'intégration de leurs provinces."
 state_propaganda:0 "Propagande d'État"
 state_propaganda_desc:0 "Comme pour un homme, la réputation d'une nation est tout, et l'établissement d'un service de propagande officiel assurera que notre bon nom n'est pas sali par les mensonges de nos ennemis."
 postal_service:0 "Service Postal"
 postal_service_desc:0 "Avec les communications telles qu'elles sont, il est difficile de s'assurer que nos dépêches diplomatiques arrivent en temps voulu. Créer un réseau de bureaux de poste et de relais de courriers facilitera la transmission de notre voix dans les terres lointaines."
 marcher_lords:0 "Seigneurs des Marches"
 marcher_lords_desc:0 "En accordant une autonomie considérable aux vassaux dans les régions frontalières, ces « Seigneurs des Marches » seront en mesure de lever de grandes armées militaires pour nous soutenir dans nos guerres."
 maritime_ideas:0 "Idées Maritimes"
 maritime_ideas_bonus:0 "Maritime Complet"
 boarding_parties:0 "Équipes d'Abordage"
 boarding_parties_desc:0 "En enseignant à nos officiers de marine à mener des actions d'abordage contre les navires ennemis, nous pouvons gagner un avantage dans le combat naval même en combattant des flottes ennemies supérieures."
 improved_rams:0 "Éperons Améliorés"
 improved_rams_desc:0 "Le concept d'équiper les navires de guerre d'éperons remonte à des milliers d'années, mais de grandes avancées en métallurgie ont été faites depuis et nous devrions en profiter pour créer des éperons plus robustes."
 naval_cadets:0 "Cadets de Marine"
 naval_cadets_desc:0 "En promouvant la marine comme choix de carrière pour les seconds et troisièmes fils de la noblesse, nous pouvons créer un corps professionnel d'officiers de marine pour superviser nos équipes de canonniers."
 copper_bottoms:0 "Coques Cuivrées"
 copper_bottoms_desc:0 "Le bois peut être le matériau idéal pour la construction navale, mais il a tendance à se détériorer avec le temps. En équipant nos navires d'un revêtement de cuivre sous la ligne de flottaison, nous pouvons réduire cette détérioration, leur permettant de mieux supporter les longs voyages."
 escort_ships:0 "Corvettes"
 escort_ships_desc:0 "Les corvettes étaient une classe de petits navires de guerre conçus pour escorter les vaisseaux amis et harceler l'ennemi, comptant sur la vitesse et la manœuvrabilité plutôt que sur la puissance de feu massive."
 national_arsenal:0 "Arsenal National"
 national_arsenal_desc:0 "En établissant un arsenal national où nos navires de guerre peuvent être construits et entretenus selon des normes uniformes, nous pouvons déployer une marine plus grande."
 garrison_conscription:0 "Garnisons Conscrites"
 garrison_conscription_desc:0 "En conscrivant nos jeunes hommes valides pour nos garnisons, nous pouvons nous assurer d'avoir assez d'hommes pour défendre nos frontières."
 expanded_supply_trains:0 "Trains de Ravitaillement Élargis"
 expanded_supply_trains_desc:0 "Investir plus de ressources dans nos trains de ravitaillement permettra à notre armée d'opérer pendant de plus longues périodes en terre hostile."
 sheltered_ports:0 "Ports Abrités"
 sheltered_ports_desc:0 "C'est un fait malheureux que les navires ont tendance à être endommagés pendant la bataille, et tout aussi malheureux que les dommages sont rarement réparables en mer. Pour atténuer ce problème, nous créerons un système de ports abrités le long de notre littoral où nos navires pourront se réparer."
 diplomatic_corps:0 "Corps Diplomatique"
 diplomatic_corps_desc:1 "Par l'établissement d'un Corps Diplomatique professionnel, nous nous assurons que les leçons des diplomates seniors sont transmises à la jeune génération."
 civil_servants:0 "Fonction Publique"
 civil_servants_desc:0 "En établissant une Fonction Publique de jeunes bureaucrates enthousiastes, nous nous assurerons de pouvoir nous adapter rapidement aux nouvelles avancées en administration et gouvernance."
 free_cities:0 "Villes Libres"
 free_cities_desc:0 "Donner à nos villes l'auto-gouvernance en matière de commerce nous permettra d'ouvrir de nouvelles routes commerciales rentables."
 inquisition:0 "Inquisition"
 inquisition_desc:0 "Établir une Inquisition sanctionnée par l'État pour maintenir la pureté religieuse de notre population en déracinant les hérétiques et les blasphémateurs."
 central_indic_ideas:1 "Idées gond"
 central_indic_ideas_start:0 "Traditions gond"
 central_indic_ideas_bonus:1 "Ambition gond"
 securing_defenses_central_indic:0 "Sécuriser nos Défenses"
 securing_defenses_central_indic_desc:0 "Beaucoup considéreraient le contrôle des collines et jungles du Gondwana, du Jharkhand et des Garjats comme une tâche intimidante et il est vrai que maintenir notre royaume uni n'est pas toujours facile.\nLa clé pour y parvenir réside dans le contrôle et l'entretien des nombreux petits forts qui parsèment ces régions.\nEn sécurisant la loyauté des chefs en contrôle de ces forts, et en nous assurant qu'ils ont ce dont ils ont besoin pour les maintenir en bon état, nous pouvons être sûrs de pouvoir résister même à des ennemis assez puissants."
 tribal_religion_central_indic:0 "Religion Tribale"
 tribal_religion_central_indic_desc:0 "Le système de croyance de notre peuple est divers et peut-être un peu peu orthodoxe. Bien que nous adorions nombre des mêmes dieux que nos voisins des plaines, nous adorons aussi des esprits, des dieux des arbres et des dieux animaux. Nous devrions embrasser cette diversité et être vus comme soutenant toutes les diverses fois de nos sujets."
 tigers_and_elephants_central_indic:0 "Tigres et Éléphants"
 tigers_and_elephants_central_indic_desc:0 "L'Éléphant et le Tigre commandent le respect dans toute l'Inde. De nombreux souverains chercheraient à utiliser ces animaux comme symboles de leur pouvoir royal. On dit même que certains rois voyageraient loin et traverseraient de nombreuses épreuves pour obtenir des éléphants pour leurs écuries royales.\nCe qui est un symbole pour ces souverains lointains fait partie de notre vie quotidienne. Dans ces terres, de telles bêtes, et d'autres tout aussi puissantes, errent en grand nombre. Notre peuple les connaît bien et beaucoup adorent des dieux sous la forme de tigres, de cobras ou des arbres mêmes de ces jungles. Tout étranger ferait bien de réfléchir à deux fois avant de risquer la colère de tels dieux ou de ceux qui les adorent."
 flexible_caste_central_indic:0 "Système de Castes Flexible"
 flexible_caste_central_indic_desc:0 "La caste en tant que structure rigide n'a jamais fait partie intégrante de notre société et beaucoup dans notre royaume nieraient appartenir à une caste quelconque. Être pragmatique et flexible sur ces choses permet à notre État d'absorber plus facilement même les groupes de personnes les plus divers."
 raiding_the_plains_central_indic:0 "Piller les Basses Terres"
 raiding_the_plains_central_indic_desc:0 "Nos forts ne nous protègent pas seulement des envahisseurs, ils sont aussi d'excellents points d'où lancer des attaques sur les caravanes commerciales ou les villes des plaines. En utilisant notre connaissance de nos terres pour tromper et tendre des embuscades à nos adversaires, nous pouvons vaincre des ennemis plus forts qu'il ne serait autrement possible."
 ancient_roots_central_indic:0 "Racines Anciennes"
 ancient_roots_central_indic_desc:0 "Bien que nous n'ayons peut-être pas les grandes cérémonies des cours cosmopolites des grandes villes de l'Inde, nous avons nos propres traditions de royauté. Certaines de ces traditions remontent sûrement aux vénérables royaumes qui nous ont précédés dans ces terres comme les Haihayas de Tripura ou les rois Naga de Barasuru.\nIl y a de la force dans la tradition tout comme il y en a dans la nouveauté. Nos traditions de cour commandent le respect de notre peuple et ne sont pas simplement destinées à mettre les dignitaires étrangers à l'aise."
 formalize_relations_with_cheifs_central_indic:0 "Formaliser les Relations avec les Chefs"
 formalize_relations_with_cheifs_central_indic_desc:0 "Nous commandons le respect et la loyauté des nombreux chefs qui contrôlent les forts dans notre royaume mais il est grand temps de remplacer ces loyautés personnelles par une relation plus formalisée. Quand les chefs seront tous liés plus directement à l'État et reconnaîtront leurs obligations envers lui, nous aurons beaucoup plus de facilité à les taxer et à les contrôler."
 PRO_ideas:0 "Idées provençales"
 PRO_ideas_start:0 "Traditions provençales"
 PRO_ideas_bonus:0 "Ambition provençale"
 memory_of_angevin_claims:0 "Mémoire des Revendications Angevines"
 memory_of_angevin_claims_desc:0 "Après l'effondrement des ambitions des Hohenstaufen de dominer la Chrétienté au XIIIe siècle, en 1264 Sa Sainteté Urbain IV retira sagement les titres de Roi de Naples et de Sicile du portefeuille des Hohenstaufen et les conféra à notre ancêtre Charles d'Anjou, qui saisit aussi le titre de Roi d'Albanie par ses propres mérites. Les perfides Aragonais, citant leur mariage dans la lignée des Hohenstaufen, nous volèrent la Sicile en 1282 et ont récemment achevé leur violation de la volonté papale en usurpant le titre de « Roi de Naples » en 1442 à notre Bon Roi René. L'héritage de Charles d'Anjou est tombé bas, mais nous nous souvenons des vastes possessions de nos ancêtres et de leurs revendications s'étendant jusqu'en Albanie et Jérusalem."
 revive_house_of_anjou:0 "Raviver la Maison d'Anjou"
 revive_house_of_anjou_desc:0 "La ligne aînée de la Maison d'Anjou s'éteignit en 1435 quand la Reine Jeanne II de Naples décéda. Longue vie à notre ligne cadette, la Maison de Valois-Anjou, fusion des deux plus grandes maisons de France ! Par la fusion de deux dynasties, le sang royal d'Hugues Capet coule deux fois. Avec un peu de travail et de planification, le trône rusé de nos ancêtres angevins et la valeur militaire de nos ancêtres Valois peuvent s'unir pour rendre la Maison de Valois-Anjou plus grande que l'une ou l'autre."
 composite_monarchy:0 "Monarchie Composite"
 composite_monarchy_desc:0 "La monarchie composite est un terme technique pour un royaume qui contient différentes parties qui sont gouvernées par leurs propres codes juridiques et traditions mais sont néanmoins unies sous une seule couronne. Peut-il y avoir une meilleure description pour les royaumes angevins ? Il fut un temps où notre famille devait gouverner des terres de l'Anjou à l'Albanie. Aujourd'hui, notre portée peut être quelque peu réduite, mais les devoirs d'un Duc de Lorraine, d'un Duc de Bar, d'un Duc d'Anjou et d'un Comte de Provence sont considérablement différents même quand tous ces titres sont détenus par le même homme. Par notre flexibilité à diriger des royaumes très différents vers un but commun, nous apaisons nos sujets et créons un tout qui est bien plus grand que la somme de ses parties."
 tarascon_castle:0 "Château de Tarascon"
 tarascon_castle_desc:0 "Achevé en 1449 par le Bon Roi René, cette forteresse est l'une des plus puissantes de toute la Chrétienté et est l'un des plus beaux exemples d'architecture militaire de notre époque. Utilisez-la comme forteresse, comme arsenal, comme prison, ou simplement comme château récréatif pour un souverain ayant besoin de relaxation."
 public_weal:0 "Bien Public"
 public_weal_desc:0 "Nous ne sommes pas sujets des Valois de Paris. Parfois, cependant, nous sentons que Paris a oublié nos anciens privilèges. Peut-être que si nous faisons cause commune avec d'autres nobles essayant de se libérer de l'emprise de Paris, nous trouverons la force du nombre nécessaire pour conserver nos prérogatives."
 toulon_dockyard:0 "Chantier Naval de Toulon"
 toulon_dockyard_desc:0 "Notre terre est un port naturel de la Divenhal. Les anciens Grecs réalisèrent la valeur de Marseille quand ils la colonisèrent sous le nom de Massalia à l'aube de la mémoire. Tandis que Marseille peut rester le grand centre commercial, Toulon ferait un endroit parfait pour un chantier naval, un arsenal naval et une base de départ pour une flotte pour notre grand pays."
 provencal_quilting:0 "Piqûre Provençale"
 provencal_quilting_desc:0 "L'une des choses qui distingue notre langue du français est l'usage de « oc » au lieu de « oui » pour oui. Cela peut être observé à toute heure du jour par des gens criant « Oc ! Oc ! » quand on leur présente la chance de posséder des boutis, des courtepointes matelassées. Ces pièces distinctives du patrimoine de Provence peuvent être trouvées n'importe où à Cannor et leur qualité fait se pâmer les étrangers. Tout comme les possessions angevines ont toujours été une courtepointe de différents peuples et héritages mais restent un tout distinctif, le boutis est une glorieuse métaphore de notre beau pays."
 MDI_ideas:0 "Idées de Mogadiscio"
 MDI_ideas_start:0 "Traditions de Mogadiscio"
 MDI_ideas_bonus:0 "Ambition de Mogadiscio"
 mdi_indian_ocean_trade:0 "Commerce de l'Océan Indien"
 mdi_indian_ocean_trade_desc:0 "Le commerce de l'océan Indien emmène nos marchands aussi loin que l'Arabie, l'Hindoustan, la Malaisie et même la Chine. Continuons à soutenir nos marchands pour que nous puissions augmenter notre profit de ce commerce lucratif."
 somali_sailors:0 "Marins Somaliens"
 somali_sailors_desc:0 "Nos marins connaissent les moussons de la région, et les utilisent pour se lier aux villes portuaires de l'océan Indien et de la mer Rouge. Ils ont aussi développé une façon compréhensible de définir les îles de l'océan Indien dans leur portée de navigation. Ils nommeraient les archipels ou groupes d'îles d'après l'île la plus importante du point de vue somalien."
 mdi_east_african_gold_trade:0 "Commerce d'Or de Sarhal Oriental"
 mdi_east_african_gold_trade_desc:0 "Historiquement, les marchands somaliens de Mogadiscio établirent une colonie au Mozambique pour extraire l'or des mines de Sofala et contrôlèrent le commerce d'or de Sarhal oriental pendant plusieurs siècles."
 city_of_mogadishu:0 "Cité de Mogadiscio"
 city_of_mogadishu_desc:0 "Ibn Battûta fut extrêmement impressionné lors de sa visite au XIVe siècle par la splendeur de Mogadiscio. Vasco de Gama, qui passa par Mogadiscio au XVe siècle, nota que c'était une grande ville avec des maisons de quatre ou cinq étages et de grands palais en son centre et de nombreuses mosquées avec des minarets cylindriques."
 mogadishan_currency:0 "Monnaie de Mogadiscio"
 mogadishan_currency_desc:0 "Afin de faciliter le commerce régional, nous devrions commencer à frapper nos propres pièces, une démarche qui aura pour effet de centraliser notre hégémonie commerciale."
 horn_of_africa:0 "Corne de l'Afrique"
 horn_of_africa_desc:0 "De l'Inde et de l'Arabie, les navires marchands viennent jeter l'ancre dans notre belle ville, comme le premier port naturel de la Corne de l'Afrique pour commercer et prendre des provisions dans leur voyage vers Sarhal oriental."
 toob_benadir:0 "Toob Benadir"
 toob_benadir_desc:0 "Historiquement, Mogadiscio était le centre d'une industrie textile florissante connue sous le nom de toob benadir, spécialisée pour les marchés d'Égypte."
 TRE_ideas:0 "Idées de Trébizonde"
 TRE_ideas_start:0 "Traditions de Trébizonde"
 TRE_ideas_bonus:0 "Ambition de Trébizonde"
 komnenoi_in_exile:0 "Comnènes en Exil"
 komnenoi_in_exile_desc:0 "Les vrais empereurs de l'Empire Romain d'Orient, la lignée d'Alexis Ier qui sauva l'empire après que ses prédécesseurs nous eurent menés au bord de la destruction à Manzikert, ont vécu dans des circonstances réduites ici à Trébizonde après que nous fûmes chassés de Constantinople par Isaac Ange en 1185. Les usurpateurs nicéens connus sous le nom de Paléologues prétendent maintenant être empereurs, mais le monde sait que les héritiers légitimes de l'Empire Byzantin reviendront pour expulser tant les usurpateurs que les Turcs un jour."
 pontic_mountains:0 "Montagnes Pontiques"
 pontic_mountains_desc:0 "Tout comme les Alpes séparent les Français et les Italiens, les Montagnes Pontiques séparent notre dernier bastion grec en Anatolie des Turcs qui ont saisi le Plateau Anatolien. Le Pont a toujours été plus grec que le reste de l'Anatolie... peut-être que l'héritage du grand Mithridate d'antan inspirera nos guerriers et frappera autant de peur chez les Turcs qu'il le fit chez les Romains ?"
 legacy_of_the_alexiad:0 "Héritage de l'Alexiade"
 legacy_of_the_alexiad_desc:0 "La Princesse Anne Comnène, la fille du père de notre lignée, Alexis Ier Comnène, écrivit L'Alexiade, une biographie de son père qui est stupéfiante par sa complexité et sa capacité à évaluer ses actions. Peut-être que du bien peut sortir d'idées peu orthodoxes comme laisser une femme éduquée écrire l'histoire ?"
 komnenoi_princesses:0 "Princesses Comnènes"
 komnenoi_princesses_desc:0 "Anne Comnène a peut-être été la première fille extraordinaire d'un Empereur Comnène, mais elle ne fut pas la dernière. Des souverains à travers l'Europe veulent la légitimité de la lignée d'Alexis Ier dans leurs propres familles et nos princesses sont devenues l'une de nos principales exportations. Même les souverains turcs épousent nos filles, et ainsi nous avons gagné des yeux et des oreilles dans chaque cour qui compte."
 the_lessons_of_the_fourth_crusade:0 "Les Leçons de la Quatrième Croisade"
 the_lessons_of_the_fourth_crusade_desc:0 "Isaac Ange, qui déposa notre lignée en 1185, fut lui-même déposé et aveuglé, et, sous prétexte de remettre le vieux fou aveugle sur le trône, les Vénitiens saccagèrent la Ville du Désir du Monde en 1204. Nous avons utilisé l'effondrement de l'autorité d'Ange pour saisir Trébizonde et tenter de ressusciter notre empire. Si votre ennemi bien plus grand fait face à l'infortune et à une invasion extérieure, c'est le moment de frapper."
 terminus_of_the_silk_road:0 "Terminus de la Route de la Soie"
 terminus_of_the_silk_road_desc:0 "Même quand cette ville s'appelait Trapézonte dans les brumes de l'Antiquité, les anciens Grecs pouvaient voir combien c'était un emplacement utile, le point où la route terrestre à travers l'Asie rencontre la route maritime qui mène à la Méditerranée. Au temps des Khans, nous devînmes célèbres comme point terminal de la grande Route de la Soie, alors que la richesse de la Chine et de l'Inde passait par Trébizonde en route vers l'Europe. Il n'y a pas de raison de ne pas essayer de garder une partie de la richesse qui passe."
 greek_scholars_abroad:0 "Érudits Grecs à l'Étranger"
 greek_scholars_abroad_desc:0 "Dans le monde antique, tout homme éduqué digne de respect était éduqué par un tuteur grec, et maintenant, alors que les Turcs menacent chaque ville grecque de la Méditerranée, de plus en plus d'érudits de Grèce entrent dans la ligne de travail de leurs ancêtres à l'étranger. Beaucoup de ces hommes éminents ont des sympathies pour la cause des Comnènes et pourraient être persuadés de nous donner des rapports précis des événements à l'étranger."
 swahili_ideas:0 "Idées swahilies"
 swahili_ideas_start:0 "Traditions swahilies"
 swahili_ideas_bonus:0 "Ambition swahilie"
 swa_indian_ocean_trade:0 "Commerce de l'Océan Indien"
 swa_indian_ocean_trade_desc:0 "Dans nos cités-États sur la côte swahilie, nous pouvons commercer avec des gens d'Arabie, d'Hindoustan et même de la lointaine Chine, puis vendre leurs marchandises exotiques profondément à l'intérieur des terres au cœur de Sarhal, nous plaçant dans une position très lucrative."
 monsoon_season:0 "Saison des Moussons"
 monsoon_season_desc:0 "Grâce au cycle de la mousson, parfois il est très facile pour les navires d'aller vers l'est dans l'océan et d'autres fois, le voyage vers l'ouest est facilité, permettant un flux constant et prévisible de commerce qui est aussi fiable que le temps. Nos capitaines doivent tout de même piloter les vaisseaux dans ces tempêtes, bien sûr."
 great_mosque_of_kilwa:0 "Grande Mosquée de Kilwa"
 great_mosque_of_kilwa_desc:0 "La culture swahilie est un mélange de traditions, de langue et de valeurs arabes et bantoues, et quand nous avons embrassé l'Islam, nous avons construit quelque chose d'unique en Afrique ou en Arabie. La grande mosquée fut sculptée dans le corail et inspire l'admiration et l'émerveillement chez les voyageurs de tous les coins du monde."
 indian_ocean_melting_pot:0 "Creuset de l'Océan Indien"
 indian_ocean_melting_pot_desc:0 "Les cités-États swahilies sont toujours des affaires passionnantes. On ne sait jamais si on trouvera un marin omanais, un capitaine gujarati, un marchand d'épices malais, ou même un brave marchand de la mystérieuse Île de la Lune, Madagascar. Certains marins viennent avec des récits de nouvelles idées excitantes mises en œuvre dans leurs terres, et nous pouvons essayer leurs expériences nous-mêmes."
 recruit_the_unbelievers:0 "Recruter les Incroyants"
 recruit_the_unbelievers_desc:0 "Malheureusement, les peuples de l'intérieur n'ont pas encore entendu la parole qu'il n'y a de Dieu que Dieu, mais même les incroyants ont foi dans le pouvoir de la pièce d'or. Les richesses de notre terre peuvent les attirer à servir sous notre bannière... peut-être un jour cela les inspirera-t-il même à vivre sous notre Prophète."
 ivory_trade:0 "Commerce de l'Ivoire"
 ivory_trade_desc:0 "Les Européens sont de nouveaux invités dans notre marché et leur goût pour l'ivoire est vraiment remarquable. Ce doit être une commodité rare là d'où ils viennent. Les éléphants sont abondants et il est peu probable qu'ils manquent jamais, donc nous continuerons à récolter leurs défenses pour la faim insatiable de nos clients en ivoire."
 familiar_presence_abroad:0 "Présence Familière à l'Étranger"
 familiar_presence_abroad_desc:0 "Y a-t-il un port dans l'océan Indien où l'on ne peut pas entendre le swahili parlé quelque part dans les chantiers navals ? C'est douteux : nos marchands ont navigué dans chaque coin de l'océan. En conséquence, les gens s'attendent à voir des Swahilis dans leurs sociétés et nos ambassadeurs ont plus de facilité à s'établir."
 javan_ideas:0 "Idées javanaises"
 javan_ideas_start:0 "Traditions javanaises"
 javan_ideas_bonus:0 "Ambition javanaise"
 candi_shrines:0 "Sanctuaires Candi"
 candi_shrines_desc:0 "Pour tendre vers une société plus tolérante, nous devons permettre aux autres religions de pratiquer leur culte en paix. Les Sanctuaires Candi ont une double fonction permettant aux Hindous et aux Bouddhistes d'adorer ensemble, créant un plus grand sens d'harmonie religieuse. Si nous pouvons continuer cette politique avec d'autres religions, nous pouvons assurer l'unité religieuse."
 indianization:0 "Indianisation"
 indianization_desc:0 "Notre contact par le commerce avec le peuple indien a influencé notre façon de penser. Notre art, notre architecture et notre culture ont tous grandi des échanges culturels avec nos partenaires commerciaux, en continuant une relation avec d'autres comme celle que nous avons appréciée avec les Pala, de nouvelles pensées et idées seront plus facilement intégrées dans notre royaume."
 dharmasastra:0 "Dharmashastra"
 dharmasastra_desc:0 "Le Dharmashastra est une tradition importante concernant la loi religieuse hindoue. Avec ces principes établis, notre religion s'est répandue plus largement."
 pan_asian_trade:0 "Commerce Pan-Halessi"
 pan_asian_trade_desc:0 "Notre économie repose sur des liens commerciaux s'étendant de l'Inde à l'ouest et de la Chine au nord, en trouvant de nouveaux marchés à exploiter et de nouveaux partenaires commerciaux, nous pouvons faire croître davantage notre économie."
 bi_yearly_harvest:0 "Récolte Bi-Annuelle"
 bi_yearly_harvest_desc:0 "Nos terres fertiles et nos pratiques d'irrigation avancées assurent que nous pouvons récolter deux fois par an au lieu de la traditionnelle fois. Cela renforce encore la production du royaume."
 modernized_shipbuilding:0 "Techniques de Construction Navale Modernisées"
 modernized_shipbuilding_desc:0 "Comme notre dépendance au commerce maritime continue, nous devons reconcevoir les navires pour les rendre plus viables, en imitant le design occidental montré dans leurs navires de commerce, nous pouvons améliorer nos chantiers navals et construire des navires moins chers que jamais."
 terracotta_banking:0 "Système Bancaire en Terre Cuite"
 terracotta_banking_desc:0 "Les Sangliers en Terre Cuite étaient une partie intégrante de l'économie Majapahit, une forme précoce de banque, qui aurait pu évoluer en un système de taxation et de revenus à part entière."
 CRO_ideas:0 "Idées croates"
 CRO_ideas_start:0 "Traditions croates"
 CRO_ideas_bonus:0 "Ambition croate"
 hrvatski_ban:0 "Ban Croate"
 hrvatski_ban_desc:0 "Depuis les premières périodes de notre État, Ban a été le titre des dirigeants locaux et des détenteurs de charges en Croatie. Historiquement, l'institution du ban a continué sous diverses formes jusqu'au XXe siècle."
 pearl_of_the_adriatic:0 "Perle de l'Adriatique"
 pearl_of_the_adriatic_desc:0 "La ville de Split a toujours été un point focal du réseau commercial méditerranéen vénitien en rapide expansion. Maintenant revenue fermement sous contrôle croate, nous pouvons prospérer de leur statut de marchands et utiliser la richesse générée par le commerce pour faire avancer nos objectifs d'un État croate unifié et fort."
 granary_of_croatia:0 "Grenier de la Croatie"
 granary_of_croatia_desc:0 "La Slavonie, aussi connue comme le grenier de la Croatie, est la région agricole la plus fertile de nos terres. Elle est située entre la rivière Sava au sud et les rivières Drava et Danube au nord et à l'est. Nous devons nous assurer de mieux utiliser cette région pour la prospérité de notre peuple."
 antemurale_christianitatis:0 "Antemurale Christianitatis"
 antemurale_christianitatis_desc:0 "Nous avons reçu un message que Sa Sainteté à Rome a appelé la Croatie un Rempart de la Chrétienté pour notre lutte contre les païens. Qu'il soit connu qu'aucun païen ne passera facilement sur le sol croate."
 the_sabor:0 "Le Sabor"
 the_sabor_desc:0 "Le Sabor, sous ses diverses formes, a représenté l'identité et les opinions de notre peuple depuis les conseils nationaux du IXe siècle. Historiquement, le Sabor de Cetin tenu en 1527 fut un événement décisif d'importance pour l'extension et la confirmation de l'État croate."
 croatian_renaissance:0 "Renaissance Croate"
 croatian_renaissance_desc:0 "Notre soutien à la pensée de la Renaissance porte ses fruits, Dubrovnik et d'autres villes dalmates sont devenues le centre d'une Renaissance croate, qui produisent, en plus des œuvres d'art et de science, une littérature extensive qui aura une influence durable sur le développement de la langue littéraire croate."
 pandurs:0 "Pandours"
 pandurs_desc:0 "Les Pandours sont une unité de tirailleurs au service de Vienne et ont acquis la réputation d'être des soldats courageux, audacieux et impitoyables. Mettons-les au service de la Croatie."
 CYP_ideas:0 "Idées chypriotes"
 CYP_ideas_start:0 "Traditions chypriotes"
 CYP_ideas_bonus:0 "Ambition chypriote"
 king_of_jerusalem:0 "Roi de Jérusalem"
 king_of_jerusalem_desc:0 "En 1291, le dernier bastion des possessions continentales du Royaume de Jérusalem tomba aux mains du sultan mamelouk Baybars, mais nous n'avons jamais oublié que pendant les cent dernières années du Royaume de Jérusalem, tous les rois légitimes ont été des Lusignan. Même maintenant, plus de cent ans en exil, de nouveaux rois Lusignan sont connus pour naviguer vers la Terre Sainte au cœur de la nuit pour être couronnés en secret dans notre royaume passé et futur."
 frankish_crusaders:0 "Croisés Francs"
 frankish_crusaders_desc:0 "Ce n'est pas une coïncidence si les Sarrasins appellent collectivement les peuples de la Chrétienté les Francs : la présence française dans les Croisades a été critique depuis les premiers jours. L'esprit des rois croisés comme Philippe II Auguste et Saint Louis IX n'est pas absent à Chypre : notre propre Roi Pierre saisit héroïquement une partie de la côte anatolienne. Prouvons que nous avons encore ce feu en nous."
 commandaria_wine:0 "Vin de Commandaria"
 commandaria_wine_desc:0 "Au lendemain de la Troisième Croisade, Philippe II Auguste de France tint un concours pour déterminer le meilleur vin du monde. Cela surprend-il quiconque que notre Commandaria se révéla l'Apôtre des Vins dans cette plus grande des compétitions ? La Commandaria est ancienne et tout aussi savoureuse qu'elle l'était il y a des centaines d'années. Même les Turcs ont développé un goût pour elle, malgré leur supposée abstinence d'alcool."
 lusignan_diplomacy:0 "Diplomatie des Lusignan"
 lusignan_diplomacy_desc:0 "Quel roi de la Chrétienté ne convoite pas le titre de Roi de Jérusalem ? Malheureusement, beaucoup l'ont revendiqué malgré notre détention continue du titre, mais d'autres nous respectent assez pour souhaiter infuser leurs propres dynasties du sang des Lusignan pour se rapprocher de la Terre Sainte en nom et en esprit. Ce dernier réduit de la Chrétienté en Orient ne peut survivre sans l'aide occidentale, donc nous devons en profiter."
 cypriot_fortifications:0 "Fortifications Chypriotes"
 cypriot_fortifications_desc:0 "De très, très nombreuses puissances ont balayé Chypre au fil des siècles, et les Croisés n'ont aucun désir d'être simplement un dans une succession de propriétaires. Partout où l'on regarde, cette île est fortifiée avec les plus beaux exemples de châteaux et fortifications médiévaux, preuve que nous sommes ici pour rester, au grand dam des Turcs et des Grecs locaux."
 repel_the_corsairs:0 "Repousser les Corsaires"
 repel_the_corsairs_desc:0 "Les souvenirs des légendaires frères Barberousse qui tourmentèrent la Méditerranée orientale à la fin du XVe et au début du XVIe siècle sont vifs, mais ils n'étaient que les plus célèbres des nombreux corsaires qui sont le fléau du voyage maritime méditerranéen. Notre marine doit gagner la force de se mesurer à ces flibustiers sur leur propre terrain."
 raid_turkish_commerce:0 "Piller le Commerce Turc"
 raid_turkish_commerce_desc:0 "Peut-être que les frères Barberousse, brutes qu'ils étaient, ont trouvé une stratégie valable. Nous pouvons utiliser notre position critique en Méditerranée orientale pour lancer des raids sans restriction sur les vaisseaux turcs et récolter les récompenses économiques de leur richesse. Les pirates peuvent être les ennemis de toutes les nations, mais les corsaires sont simplement des hommes d'affaires sous contrat, n'est-ce pas ?"
 NAV_ideas:0 "Idées navarraises"
 NAV_ideas_start:0 "Traditions navarraises"
 NAV_ideas_bonus:0 "Ambition navarraise"
 dorretxeak_towers:0 "Dorretxeak"
 dorretxeak_towers_desc:0 "Les fortifications de la Navarre médiévale ont pris la forme de châteaux-tours cubiques en pierre à plusieurs étages, qui surplombaient les terres qu'ils étaient construits pour protéger. Ils servent de résidences aux nobles et sont un point de défense important lors des invasions ennemies."
 navarrese_company:0 "Compagnie Navarraise"
 navarrese_company_desc:0 "Les rois de Navarre ont une tradition de recruter des compagnies de mercenaires pour faire leur travail. La plus célèbre de ces compagnies, la soi-disant Compagnie Navarraise, était un groupe de mercenaires recrutés dans les terres de Gascogne et de Navarre et est connue pour ses succès dans les combats et la sécurisation de terres en Grèce."
 intrepid_pioneers:0 "Pionniers Intrépides"
 intrepid_pioneers_desc:0 "Notre emplacement favorable sur la côte atlantique nous permet de participer facilement aux efforts de colonisation en Aelantir. Notre petit royaume entouré d'États plus grands ne peut espérer s'étendre que dans des terres lointaines outre-mer."
 transatlantic_whaling:0 "Chasse à la Baleine Transatlantique"
 transatlantic_whaling_desc:0 "La chasse à la baleine basque a des centaines d'années de traditions. Les spécialistes basques sont souvent utilisés par d'autres pays qui souhaitent développer et améliorer leurs pêcheries. Nous devrions capitaliser sur cette expertise et étendre nos entreprises baleinières avec des avant-postes des deux côtés de l'Atlantique."
 crosspyrenean_trade:0 "Commerce Trans-Pyrénéen"
 crosspyrenean_trade_desc:0 "En plus du commerce de la Navarre qui coule vers l'Aragon et la Castille, nous devrions aussi chercher à ouvrir les routes à travers les Pyrénées. Cela nous permettra non seulement de profiter du flux de biens commerciaux dans les deux directions, mais apportera aussi en Navarre les idées bourgeoises modernes de la France contemporaine."
 royal_basque_society:0 "Société Royale Basque"
 royal_basque_society_desc:0 "L'Euskalerriaren Adiskideen Elkartea, la Société Royale Basque des Amis du Pays fut fondée pour encourager le développement de l'économie, de la culture et de la science basques. Fondée avec les profits de la Compagnie Royale Guipuzcoane de Caracas, monopoliste du commerce avec le Venezuela à l'époque, elle bénéficiera grandement au pays dans les années à venir."
 end_of_fueros:0 "Fin des Fueros"
 end_of_fueros_desc:0 "Nous ne pouvons plus permettre aux anciennes lois de la terre de fragmenter et de désorganiser notre État. La Navarre moderne et tournée vers l'avenir doit centraliser tout le pouvoir avec le gouvernement, débarrassée des vestiges des anciennes lois et autonomies."
 AZT_ideas:0 "Idées aztèques"
 AZT_ideas_start:0 "Traditions aztèques"
 AZT_ideas_bonus:0 "Ambition aztèque"
 flower_wars:0 "Guerres Fleuries"
 flower_wars_desc:0 "Le maintien de notre empire, et du monde, nécessite un flux constant de captifs. Ce n'est qu'à travers un état de guerre constant que nous pouvons nous assurer d'avoir accès à un tel approvisionnement. Le monde ne peut se permettre la paix."
 sustaining_the_gods:0 "Sustenter les Dieux"
 sustaining_the_gods_desc:0 "Les dieux ont donné vie au monde par leur propre sacrifice, et c'est par nos sacrifices que nous les sustentons et leur permettons de maintenir le monde. Si nous devions arrêter, les conséquences seraient terribles."
 telpochcalli:0 "Telpochcalli"
 telpochcalli_desc:0 "En instituant un réseau de maisons de la jeunesse, des écoles où l'éducation et la formation militaire sont obligatoires pour les jeunes des classes inférieures, nous nous assurons que notre armée ne manque jamais de nouvelles recrues."
 eagles_and_jaguars:0 "Aigles et Jaguars"
 eagles_and_jaguars_desc:0 "Fraternités sacrées de guerriers, les chevaliers Aigles et les Guerriers Jaguars sont le sommet de nos forces combattantes. La pensée d'être un jour comptés parmi eux inspire de nombreux jeunes guerriers à tenter les actes de bravoure qui leur vaudraient l'admission."
 imperial_tribute:0 "Tribut Impérial"
 imperial_tribute_desc:0 "Les villes de l'empire envoient chaque année de grandes caravanes portant des plumes exotiques, des minéraux rares, des bijoux et des coquillages, et d'autres trésors à notre capitale pour être ajoutés au trésor impérial, nous apportant une grande richesse."
 floating_gardens:0 "Jardins Flottants"
 floating_gardens_desc:0 "Les étonnantes îles artificielles que nous avons appris à construire dans le lac de Mexico ne sont pas seulement un grand exploit architectural, mais une grande source de production agricole, nourrissant notre capitale."
 pochtecayotl:0 "Pochtecayotl"
 pochtecayotl_desc:0 "Les marchands voyagent loin, vers des provinces au-delà même de la portée de notre autorité, et vers des souverains qui nous défient. Si ces marchands devaient, peut-être, aussi nous servir d'yeux et d'oreilles, quels secrets pourrions-nous apprendre ?"
 DAH_ideas:0 "Idées du Dahomey"
 DAH_ideas_start:0 "Traditions du Dahomey"
 DAH_ideas_bonus:0 "Ambition du Dahomey"
 children_of_the_panther:0 "Enfants de la Panthère"
 children_of_the_panther_desc:0 "Notre ancienne légende dit que notre lignée royale descend de l'union d'une princesse et d'une panthère. Ce récit ancien ne peut qu'accroître notre prestige et notre renommée parmi nos voisins."
 slave_hunts:0 "Chasses aux Esclaves"
 slave_hunts_desc:0 "En pillant nos voisins, nous obtenons des esclaves qui peuvent non seulement être employés économiquement ou échangés avec nos voisins, mais qui peuvent aussi être mis au service de notre armée. De cette façon, nous augmentons le nombre d'hommes que nous pouvons appeler aux armes."
 migan_and_mehu:0 "Migan et Mehu"
 migan_and_mehu_desc:0 "Le Migan et le Mehu sont les deux ministres principaux de nos rois. L'un supervise le nord, l'autre le sud ; l'un supervise la justice, l'autre le commerce. Ensemble, ils apportent paix et prospérité à notre terre."
 lagredis:0 "Lagredis"
 lagredis_desc:0 "En introduisant un certain nombre de jeunes nobles efféminés dans le harem royal et en les présentant comme des épouses royales, nous pouvons leur donner la liberté d'agir incognito comme les yeux et les oreilles du roi, surtout en matière d'intrigues de palais."
 the_amazons:0 "Les Amazones"
 the_amazons_desc:0 "Jadis un corps de chasseurs d'éléphants, les Mino, « nos mères » en fon, sont devenus une partie légendaire de notre armée. Réputées pour leur discipline, leur efficacité et leur bravoure, la présence de cette unité entièrement féminine de gardes du corps royaux inspire le reste de nos troupes."
 the_yovogan:0 "Le Yovogan"
 the_yovogan_desc:0 "Alors que de plus en plus d'étrangers viennent sur nos côtes, il est nécessaire d'établir un nouveau poste dans notre gouvernement pour étudier leurs façons et apprendre leurs secrets, afin que nous puissions en bénéficier."
 palaces_of_abomey:0 "Palais d'Abomey"
 palaces_of_abomey_desc:0 "Un vaste complexe palatial dans notre capitale serait un signe certain de notre puissance pour tous ceux qui oseraient la défier."
 siberian_ideas:0 "Idées sibériennes"
 siberian_ideas_start:0 "Traditions sibériennes"
 siberian_ideas_bonus:0 "Ambition sibérienne"
 siberian_hunt_north:0 "Chasseurs du Nord"
 siberian_hunt_north_desc:0 "Nos terres sont vastes et pleines de dangers où un étranger ignorant se perdrait et finirait par mourir, mais nous savons mieux."
 siberian_fur_trade:0 "Commerce de Fourrure Sibérien"
 siberian_fur_trade_desc:0 "Les étrangers peuvent nous offrir une variété de biens en échange de notre fourrure sibérienne. Par conséquent, nous devrions utiliser ce commerce de fourrures comme une clé pour apporter plus de prospérité à notre peuple."
 siberian_enslave_captives:0 "Asservir les Captifs"
 siberian_enslave_captives_desc:0 "Les nombreux esclaves qui ont été capturés pendant les raids travailleront pour le bénéfice de notre peuple jusqu'à leur mort !"
 siberian_backwoods:0 "Arrière-Pays Sibérien"
 siberian_backwoods_desc:0 "Nos établissements ne sont pas entourés de murs solides, mais ils sont bien cachés au fond de nos vastes terres, où aucun étranger n'est jamais venu."
 siberian_land_bought_with_blood:0 "Terre Achetée avec le Sang"
 siberian_land_bought_with_blood_desc:0 "Qu'y a-t-il de mieux que la chasse ? Seul piller avec succès nos voisins gênants est le chemin de la gloire !"
 siberian_raids:0 "Raids Réussis"
 siberian_raids_desc:0 "Les chefs forts sont toujours au centre de l'attention. Un raid réussi signifie plus de volontaires pour le prochain."
 siberian_hunting_expansion:0 "Expansion de la Chasse"
 siberian_hunting_expansion_desc:0 "La chasse est une partie vitale de la survie de notre peuple. En étendant nos zones de chasse et en établissant de nouveaux établissements, nous pourrions obtenir plus de fourrure."
 AJU_ideas:0 "Idées de l'Ajuuraan"
 AJU_ideas_start:0 "Traditions de l'Ajuuraan"
 AJU_ideas_bonus:0 "Ambition de l'Ajuuraan"
 aju_maritime_enterprise:0 "Entreprise Maritime"
 aju_maritime_enterprise_desc:0 "Depuis les temps anciens, nos ancêtres étaient un lien important dans la Corne de l'Afrique reliant le commerce de la région au reste du monde. Nos marins et marchands étaient les principaux fournisseurs d'épices et de divers produits de luxe. Nous devrions continuer à soutenir ce réseau commercial rentable et maintenir les contacts maritimes avec l'Arabie, l'Hindoustan, la Perse, l'Égypte et aussi loin que la Chine."
 istunka_tournament:0 "Tournoi Istunka"
 istunka_tournament_desc:0 "Historiquement, l'Istunka était un tournoi annuel développé dans l'État Ajuuraan, et fut centralisé au XIXe siècle sous le Sultanat de Geledi. L'événement consiste en plusieurs équipes s'affrontant dans un combat simulé."
 gareen_imams:0 "Imams Gareen"
 gareen_imams_desc:0 "Bien que la Maison de Gareen fût la dynastie héréditaire régnante de l'État Ajuuraan, ils revendiquaient la suprématie et la légitimité religieuse sur les autres groupes de la Corne de l'Afrique."
 aju_muslim_migrations:0 "Migrations Musulmanes"
 aju_muslim_migrations_desc:0 "Des musulmans d'Hindoustan, d'Al-Andalus, d'Arabie et de Perse viennent s'installer dans nos villes côtières. Certains cherchent refuge à cause de l'instabilité dans leurs régions, d'autres viennent pour faire des affaires ou pour des raisons religieuses. En raison de leur forte tradition d'apprentissage, ils enrichiront nos terres et nous les emploierons comme conseillers et commandants."
 aju_hydraulic_empire:0 "Empire Hydraulique"
 aju_hydraulic_empire_desc:1 "En monopolisant les ressources en eau des rivières Jubba et Shebelle, nous avons fermement en main le contrôle de la taxation et de l'agriculture dans cette région."
 aju_expelling_the_infidel:0 "Expulser l'Infidèle"
 aju_expelling_the_infidel_desc:0 "Nous avons reçu des nouvelles que les villes de nos frères swahilis au sud ont été saccagées et pillées par les infidèles portugais. Ces Occidentaux gênants ne s'arrêteront pas avant d'avoir subjugué le reste de Sarhal oriental. Nous devrions nous préparer et montrer une résistance féroce !"
 aju_received_assistance:0 "Assistance Ottomane"
 aju_received_assistance_desc:0 "Nos armes traditionnelles comme l'épée, la lance et l'arc ne suffisent plus dans notre lutte contre les Portugais. En maintenant de bonnes relations avec nos frères turcs, nous pourrions recevoir une assistance sous forme d'armes à feu et de canons qui seront bien plus efficaces pour traiter avec ces infidèles."
 BOS_ideas:0 "Idées bosniaques"
 BOS_ideas_start:0 "Traditions bosniaques"
 BOS_ideas_bonus:0 "Ambition bosniaque"
 heretic_teachings:0 "Enseignements Hérétiques"
 heretic_teachings_desc:0 "Depuis le haut Moyen Âge, la Bosnie a été un havre de paix pour toutes sortes d'hérétiques. Acceptés et largement laissés à eux-mêmes dans les arrière-pays reculés de la Bosnie, ces petits groupes ont prospéré en communautés et monastères entiers, apportant des connaissances oubliées et mystérieuses de toute l'Europe. Alors que les croisades et les inquisitions déracinaient un à un tous les défis de Rome. Même des siècles de persécution par l'Église catholique et l'Église orthodoxe serbe n'ont pas réussi à les vaincre, car l'Église bosniaque prospère à ce jour, elle continuera ses études de textes longtemps oubliés."
 per_aspera_ad_astra:0 "Per Aspera ad Astra"
 per_aspera_ad_astra_desc:0 "En se couronnant Roi des Serbes, et de Bosnie et du Littoral et des Terres Occidentales, et accepté par l'Église orthodoxe serbe comme le seul champion capable de remplacer la dynastie Nemanjić déclinante, le roi bosniaque Tvrtko a scellé le cours de l'État bosniaque ainsi que fixé son ambition ultime : l'héritage de l'Empire serbe. Mais ce faisant, il a aussi revendiqué des terres possédées par de puissants princes, un affront qui ne sera pas facilement oublié. Le chemin vers les étoiles est plein d'épreuves."
 empower_bosnian_nobility:0 "Renforcer la Noblesse Bosniaque"
 empower_bosnian_nobility_desc:0 "L'histoire de la Bosnie médiévale a été celle d'un équilibre éternel entre ses souverains et leurs nobles. Pressés de l'extérieur à la fois par Rome et la Hongrie désireuses de conquérir les terres bosniaques, les souverains de Bosnie ont dû se proclamer nominalement catholiques, afin d'empêcher les croisades contre leurs domaines. Mais en même temps, pratiquement toute leur noblesse resta fidèle à l'indigène et à la fois à Rome et à l'Église orthodoxe serbe, l'Église bosniaque hérétique. Cela signifiait que régner sur la Bosnie était un jeu perpétuel d'équilibre, un jeu que seuls les maîtres pouvaient jouer et vivre pour le raconter. Dans ce jeu des trônes, soit vous gagnez, soit vous mourez."
 italian_connections:0 "Connexions Italiennes"
 italian_connections_desc:0 "La proximité de l'Italie et le fait de régner sur des parties de la mer Adriatique a toujours signifié une chose pour la Bosnie, la plupart de ses routes mènent à Rome d'une façon ou d'une autre. Mais voilà le truc, ça va aussi dans l'autre sens."
 land_of_princes:0 "Terre de Princes"
 land_of_princes_desc:0 "En leur cœur, les terres de Bosnie sont une collection de petits duchés et principautés, certains ayant des racines remontant à des siècles. Vassaux historiques d'empires et de royaumes étrangers, les terres bosniaques ne serviront plus jamais aucun maître."
 flexible_diplomacy:0 "Diplomatie Flexible"
 flexible_diplomacy_desc:0 "En raison de sa position entre le marteau et l'enclume, l'Occident et l'Orient, les villes de Rome et de Constantinople, la Bosnie doit s'adapter pour prospérer. Tandis que pour certains maintenir de bonnes relations avec des terres lointaines est une question de luxe et de prestige, pour la Bosnie c'est une question de survie."
 over_hills_through_woods:0 "Par-dessus les Collines et à Travers les Bois"
 over_hills_through_woods_desc:0 "Située dans la partie la plus rude de la péninsule balkanique, la Bosnie est un pays dominé par des montagnes, des collines et des vallées fluviales sans infrastructure significative ni réseau routier. Certains disent que traverser les Alpes avec une armée est plus facile que traverser la Bosnie pendant les hivers, car au moins une personne l'a fait. Les hivers bosniaques ne sont pas aussi cléments. Tous ceux qui entrent dans ses collines et forêts périront !"
 MOL_ideas:0 "Idées moldaves"
 MOL_ideas_start:0 "Traditions moldaves"
 MOL_ideas_bonus:0 "Ambition moldave"
 first_dismounting:0 "Premier Démontage"
 first_dismounting_desc:0 "La légende du premier démontage, le « descalecat », raconte l'histoire de Dragos, un noble valaque dont la chasse à un aurochs le mena à chevaucher dans les terres de Moldavie. Impressionné par la beauté du royaume, il le choisit pour sa nouvelle patrie et s'y installa avec son peuple. La tête d'aurochs devint son étendard princier."
 razesi_peasants:0 "Paysans Razesi"
 razesi_peasants_desc:0 "Contrairement aux États féodaux occidentaux, en Moldavie le servage est moins courant et il reste un grand groupe de paysans libres, les razesi, qui soit possèdent des terres eux-mêmes soit travaillent dans les domaines des boyards. Ces paysans libres s'avèrent être de précieuses recrues et forment l'épine dorsale de nos armées."
 upper_boyars:0 "Boyards Supérieurs"
 upper_boyars_desc:0 "Les boyards supérieurs, les vlastelin, sont la classe la plus élevée de la société moldave. Ils sont exemptés de tous les impôts payés au Hospodar, mais ont le devoir de fournir un certain nombre de guerriers proportionnel au nombre de villages qu'ils possèdent."
 moldavia_hospodar:0 "Hospodar de Moldavie"
 moldavia_hospodar_desc:0 "Inspirés par la façon byzantine de diriger l'État, les Hospodars moldaves détiennent bien plus de pouvoir sur leurs sujets que la plupart des souverains féodaux occidentaux. Le Hospodar peut condamner même ses boyards les plus puissants à la destitution, la confiscation des fortunes et même la décapitation si telle est sa volonté."
 moldavia_metropoly:0 "Métropole de Moldavie"
 moldavia_metropoly_desc:0 "L'Orthodoxie moldave s'est révélée résistante aux influences étrangères, elle a survécu à l'invasion mongole et a rejeté les missionnaires catholiques hongrois. La Métropole de Moldavie, l'église orthodoxe autonome du royaume, ne travaille pas seulement sans relâche pour préserver la foi orthodoxe, ses églises et monastères sont aussi des centres d'apprentissage, d'art et de culture."
 vlach_shepherds:0 "Valaques"
 vlach_shepherds_desc:0 "Les habitants bergers des montagnes des Carpates, les Valaques, sont un groupe de population intrinsèquement difficile à influencer qui résiste à tout changement et chérit les vieilles traditions balkaniques. En temps de trouble, ils nous ancrent dans notre passé nous rappelant qui nous sommes et qui nous avons été."
 moldavian_trade:0 "Commerce Moldave"
 moldavian_trade_desc:0 "Les nouvelles lois fiscales et les privilèges commerciaux accordés par le Hospodar aux marchands étrangers se sont avérés une source inestimable d'avantages économiques. Combinés avec le développement des centres de commerce et les forts qui les gardent, ils assureront les forts liens commerciaux de la Moldavie à travers la région."
 pacific_northwest_ideas:0 "Idées du Pacifique Nord-Ouest"
 pacific_northwest_ideas_start:0 "Traditions du Pacifique Nord-Ouest"
 pacific_northwest_ideas_bonus:0 "Ambition du Pacifique Nord-Ouest"
 great_whale_hunts:0 "Grandes Chasses à la Baleine"
 great_whale_hunts_desc:0 "Les baleines sont parmi les prises les plus prisées du Pacifique Nord-Ouest. L'immense animal pourrait facilement détruire même l'un de nos grands canoës creusés, envoyant les chasseurs à une tombe aquatique. Seuls les plus grands guerriers pouvaient accomplir un tel exploit."
 dugout_canoes:0 "Canoës Creusés"
 dugout_canoes_desc:0 "Les grandes forêts du Pacifique Nord-Ouest abritent d'immenses arbres. Creusés, ils deviennent d'énormes canoës qui peuvent transporter des guerriers par centaines, ou des biens commerciaux dans des voyages lointains."
 totem_poles:0 "Mâts Totémiques"
 totem_poles_desc:0 "Depuis longtemps maintenant, notre peuple a sculpté les grands arbres de la forêt en immenses mâts racontant l'histoire et l'héritage de nos clans et familles et démontrant les capacités de nos artisans aux visiteurs."
 potlatch_feast:0 "Festin du Potlatch"
 potlatch_feast_desc:0 "Les festins Potlatch sont une occasion de grande célébration parmi les peuples de nos terres. Le don de cadeaux précieux, qui doit être égalé en valeur par les clans rivaux au prochain potlatch, est au cœur de notre vie économique et culturelle."
 legacy_of_raven:0 "Héritage du Corbeau"
 legacy_of_raven_desc:0 "Corbeau, le créateur du monde et de l'humanité, était un maître de la ruse et de la tromperie. Nous devrions apprendre de sa façon, et devrions, nous aussi, employer la ruse et la tromperie contre nos ennemis."
 salmon_migrations:0 "Migrations de Saumons"
 salmon_migrations_desc:0 "Chaque automne, d'immenses bancs de saumons remontent les grandes rivières de notre terre pour se reproduire dans les lacs d'eau douce. En récoltant de ces grandes migrations, nous pouvons éloigner la faim pendant les longs mois d'hiver."
 noble_castes:0 "Castes Nobles"
 noble_castes_desc:0 "Contrairement à la plupart des autres peuples d'Amérique du Nord, nous comptons sur une hiérarchie complexe de castes, des esclaves en bas aux aristocrates, chefs et chamans, au sommet."
 hausa_ideas:0 "Idées haoussa"
 hausa_ideas_start:0 "Traditions haoussa"
 hausa_ideas_bonus:0 "Ambition haoussa"
 heirs_of_bayajida:0 "Héritiers de Bayajida"
 heirs_of_bayajida_desc:0 "Le grand prince-guerrier Bayajida voyagea de terres lointaines jusqu'au pays Haoussa, où il épousa la reine Daura. Les descendants de leur union forment la grande lignée royale des grandes villes du pays Haoussa, et ils se souviennent des liens qui les unissent."
 regnal_chronicles:0 "Chroniques Royales"
 regnal_chronicles_desc:0 "Nous devrions enregistrer l'histoire de nos rois et leurs exploits dans de grandes chroniques, afin qu'ils puissent être transmis à travers les générations et toujours remémorés."
 sarakunan_babba:0 "Sarakunan Babba"
 sarakunan_babba_desc:0 "Bien que nos villes soient divisées, elles font toutes partie d'un réseau complexe où chacune a un rôle à jouer. Pour Kano et Rano, ce rôle, qui profite à tout le pays Haoussa, est celui des « Rois de l'Indigo ». Leur production de cette teinture des plus précieuses profite à tout le pays Haoussa."
 sarakunan_kasuwa:0 "Sarakunan Kasuwa"
 sarakunan_kasuwa_desc:0 "Les biens de tout le pays Haoussa affluent vers les vastes villes marchandes de Daura et Katsina, les « Rois du Marché ». Tout le pays Haoussa est bienvenu pour commercer dans leurs marchés, et les flux constants de biens apportent la richesse à beaucoup parmi les Haoussa."
 sarkin_yaki:0 "Sarkin Yaki"
 sarkin_yaki_desc:0 "Alors que nous faisons face à la menace toujours présente de nos ennemis, nous devrions toujours nous souvenir de la vigilance de Gobir, le Roi de la Guerre. Ils montent la garde contre les envahisseurs du désert, protégeant toutes les villes haoussa des menaces dans cette direction."
 sarkin_bayi:0 "Sarkin Bayi"
 sarkin_bayi_desc:0 "Les besoins constants de notre peuple en plus de main-d'œuvre nécessitent un flux d'esclaves. Il incombe à Zazzau, le Roi des Esclaves, de maintenir un flux constant d'esclaves vers toutes les grandes villes du pays Haoussa, nous assurant de ne jamais manquer des gens pour créer et construire."
 borno_refugees:0 "Réfugiés du Borno"
 borno_refugees_desc:0 "Les temps troublés dans les terres à l'est ont amené de nombreux réfugiés dans nos terres. D'eux, nous pouvons apprendre beaucoup des nouvelles connaissances des royaumes au-delà de nos frontières, pour la plus grande gloire de notre terre."
 TAR_ideas:0 "Idées tarasques"
 TAR_ideas_start:0 "Traditions tarasques"
 TAR_ideas_bonus:0 "Ambition tarasque"
 copperworking:0 "Travail du Cuivre"
 copperworking_desc:0 "Nos artisans ont commencé à fabriquer des outils à partir du métal trouvé dans nos terres. Si nous devions maîtriser cet art, cela nous donnerait un avantage considérable sur nos voisins."
 no_mercy:0 "Pas de Pitié"
 no_mercy_desc:0 "En étant impitoyables envers ceux qui refusent nos ouvertures amicales, nous pouvons nous assurer que peu de gens ne font jamais, jamais cette erreur."
 merchant_officials:0 "Marchands-Officiels"
 merchant_officials_desc:0 "Les marchands sont parmi les plus hauts officiels de l'empire. Cela leur permet d'apporter des rapports sur les événements dans des terres lointaines, et d'apporter la richesse directement à l'empereur et en son nom."
 war_bonfires:0 "Feux de Guerre"
 war_bonfires_desc:0 "Un réseau d'établissements frontaliers reliés ensemble par d'immenses feux de joie pour permettre à l'alerte de se répandre rapidement, nous permettra de répondre rapidement à toute nouvelle menace."
 fortified_frontier:0 "Frontière Fortifiée"
 fortified_frontier_desc:0 "Avec les puissants empires à nos frontières cherchant constamment à conquérir notre terre, nous devons maintenir des forteresses redoutables pour assurer que leurs assauts ne portent pas de fruits. C'est seulement ainsi que nous pouvons garder notre terre en sécurité."
 otomi_settlements:0 "Établissements Otomi"
 otomi_settlements_desc:0 "Les Otomi qui vivent au nord-ouest sont désireux de s'installer dans notre terre. Si nous devions leur permettre de le faire en échange de leur contribution à la défense de l'empire, nous gagnerions des hommes précieux pour nos armées."
 tarascan_assmilation:0 "Assimilation Tarasque"
 tarascan_assmilation_desc:0 "Par une réinstallation soigneuse de notre peuple dans les zones nouvellement conquises, et en nous assurant que la langue purépecha est la langue commune de l'empire, nous pouvons rapidement placer ces régions lointaines sous le plein contrôle impérial, loyales envers nous."
 AIR_ideas:0 "Idées de l'Aïr"
 AIR_ideas_start:0 "Traditions de l'Aïr"
 AIR_ideas_bonus:0 "Ambition de l'Aïr"
 taghlamt:0 "Le Taghlamt"
 taghlamt_desc:0 "Des gisements de sel du désert aux grandes villes du pays Haoussa et aux pâturages de l'Aïr, vont les grandes caravanes de dix mille chameaux, portant une grande richesse. Notre royaume s'enrichit de cela."
 cross_of_agades:0 "Croix d'Agadès"
 cross_of_agades_desc:0 "Quand un enfant atteint l'âge adulte, il devrait recevoir de son père une croix d'argent, marquant les quatre directions cardinales, pour symboliser sa liberté d'aller où il lui plaît."
 legacy_of_tin_hinan:0 "Héritage de Tin-Hinan"
 legacy_of_tin_hinan_desc:0 "L'histoire de notre peuple commence avec la grande Reine Tin-Hinan, qui nous mena vers le sud depuis le Tafilalet. Les traditions qu'elle commença doivent perdurer sous le règne de notre Amenokal."
 blue_people:0 "Le Peuple Bleu"
 blue_people_desc:0 "Les teintures indigo de notre voile tachent nos visages. Parmi notre peuple, cette teinte bleue en est venue à être vue comme un signe du prestige et de l'aisance du porteur."
 inadan_castes:0 "Castes Inadan"
 inadan_castes_desc:0 "En gardant dans l'échelon supérieur de nos sociétés des castes de forgerons et d'autres artisans hautement qualifiés, nous nous assurons que les arts et métiers de notre peuple seront toujours valorisés."
 nomadic_traditions:0 "Traditions Nomades"
 nomadic_traditions_desc:0 "Les peuples de l'Aïr ont longtemps été nomades. Nous avons erré sur la terre brûlée par le soleil du désert, de point d'eau en point d'eau. Même maintenant, alors que tout change et que nous construisons une ville pour notre peuple, nous ne devons pas oublier nos racines."
 ineslemen_teachings:0 "Enseignements des Ineslemen"
 ineslemen_teachings_desc:0 "Une caste parmi notre peuple s'est consacrée à instruire notre peuple dans les voies d'une meilleure adhésion à l'Islam. Leur influence croissante a aidé à renforcer la foi de notre peuple."
 mossi_ideas:0 "Idées Mossi"
 mossi_ideas_start:0 "Traditions Mossi"
 mossi_ideas_bonus:0 "Ambition Mossi"
 riale_and_yennenga:0 "Rialé et Yennenga"
 riale_and_yennenga_desc:0 "Le récit de notre fondation remonte à la princesse mamprussi Yennenga et au chasseur mandé Rialé. Nous chérissons et perpétuons leur héritage, car c'est par eux que nous avons accédé au pouvoir."
 mossi_cavalry_raids:0 "Raids de Cavalerie"
 mossi_cavalry_raids_desc:0 "Depuis le temps de nos ancêtres, les cavaliers ont été l'instrument de nos conquêtes. Le tonnerre de leurs sabots à travers les prairies du Sahel répand la terreur chez nos ennemis et nous a permis de remporter maintes victoires."
 nyonnyonse_vassals:0 "Vassaux Nyonnyonsé"
 nyonnyonse_vassals_desc:0 "À mesure que nous conquérons de nouvelles terres, nous rencontrons des peuples dont le destin est d'être gouvernés par nous. Nous devons les intégrer comme une composante essentielle de notre société, une caste de puissants vassaux chargés de protéger et d'entretenir la terre."
 nakomse:0 "Les Nakomsé"
 nakomse_desc:0 "Tout pouvoir émane de l'Empereur, et seuls ses parents doivent le détenir. La noblesse doit être choisie pour servir en son nom, parmi ceux de ses parents en qui il peut avoir confiance."
 land_of_the_ancestors:0 "Terre des Ancêtres"
 land_of_the_ancestors_desc:0 "La terre n'est pas simple propriété ou poussière ; elle est notre lien avec les grands hommes qui nous ont précédés. Depuis les terres meilleures de l'au-delà, ils veillent sur nous, et nous ne devons jamais laisser ce lien se rompre."
 honoring_the_masks:0 "Honorer les Masques"
 honoring_the_masks_desc:0 "Nos masques détiennent un pouvoir. Ils président aux funérailles et aux cérémonies, pour garantir que ceux que nous souhaitons honorer le soient dignement."
 friday_court:0 "La Cour du Vendredi"
 friday_court_desc:0 "Le souverain a un devoir envers son peuple. Il n'est pas libre de s'absenter de sa présence, pas même pour venger une insulte faite à sa personne ou récupérer les symboles volés de son règne ; car son devoir premier est de tenir cour et d'écouter les requêtes de ses sujets."
 fulani_jihad_ideas:0 "Idées du Djihad Peul"
 fulani_jihad_ideas_start:0 "Traditions Peules"
 fulani_jihad_ideas_bonus:0 "Ambition Peule"
 wandering_scholars:0 "Érudits Itinérants"
 wandering_scholars_desc:0 "Des communautés de sages de l'Islam et de marabouts vivent parmi nos terres, offrant les enseignements de la Foi à tous ceux qui veulent bien écouter, répandant la seule vraie foi parmi notre peuple."
 unrighteous_kings:0 "Rois Impies"
 unrighteous_kings_desc:0 "Si le roi est musulman, sa terre est terre de musulmans. Si le roi est un mécréant, alors sa terre est terre de mécréants, sans discussion. Nous ne devons jamais nous laisser ruiner par des mécréants."
 fulani_jihads:0 "Djihads Peuls"
 fulani_jihads_desc:0 "Trop longtemps les peuples de notre terre ont peiné sous des dirigeants qui, tout en professant être musulmans, honorent les ancêtres et pratiquent des rituels polythéistes. Plus jamais ! L'étendard de l'Islam doit toujours flotter au-dessus de celui des royaumes terrestres."
 imams_and_emirs:0 "Imams et Émirs"
 imams_and_emirs_desc:0 "Seuls les guerriers fidèles qui ont œuvré à faire avancer la cause de l'Islam, et les érudits savants, sont dignes de gouverner dans notre société. Ils sont des exemples à suivre pour tous."
 islamic_scholarship:0 "Érudition Islamique"
 islamic_scholarship_desc:0 "Si le peuple doit suivre la voie de l'Islam, il doit connaître la voie de l'Islam. En encourageant la diffusion de l'alphabétisation et de l'érudition parmi les hommes et les femmes, nous faisons avancer la cause de l'Islam."
 community_of_the_faithful:0 "Communauté des Fidèles"
 community_of_the_faithful_desc:0 "Notre Empire unit sous ses bannières des peuples de centaines d'origines. Ils parlent une multitude de langues, viennent de toutes les directions de l'horizon, mais chacun dans sa propre langue honore le prophète, nous liant ensemble."
 caliph_in_africa:0 "Le Calife en Sarhal"
 caliph_in_africa_desc:0 "Les fidèles doivent être guidés, et ceux qui prétendent en des terres lointaines être le calife ont failli à leur devoir. Ayons un calife sur nos terres, et que tous les fidèles se tournent vers lui pour être guidés."
 mesoamerican_ideas:0 "Idées Mésoaméricaines"
 mesoamerican_ideas_start:0 "Traditions Mésoaméricaines"
 mesoamerican_ideas_bonus:0 "Ambition Mésoaméricaine"
 olmec_legacy:0 "Héritage Olmèque"
 olmec_legacy_desc:0 "Avant que notre peuple n'arrive, les Olmèques, un peuple fier et ancien, vivaient en ces terres. Les traditions qu'ils ont laissées perdurent encore, et d'eux nous avons beaucoup à apprendre sur l'organisation de la société et les manières de gouverner notre peuple."
 altepetl:0 "Altepetl"
 altepetl_desc:0 "L'organisation sociale de notre terre repose sur l'existence de la cité-État, qu'elle soit le Nuu mixtèque, le Cah maya ou l'Altepetl nahuatl. Leurs productions et le commerce entre elles forment des liens qui sont le cœur de la vie économique de notre monde."
 ball_game:0 "Le Jeu de Balle"
 ball_game_desc:0 "Au cœur de la vie sociale de notre terre se trouve le jeu de balle, où les joueurs s'efforcent de maintenir la balle dans le terrain de jeu en la frappant avec leurs hanches. C'est à la fois une alternative rituelle à la guerre et une part majeure de la vie religieuse."
 feathered_serpent:0 "Le Serpent à Plumes"
 feathered_serpent_desc:0 "Une légende répandue à travers nos terres parle du Serpent à Plumes. Bien que cette figure soit multiple pour de nombreux peuples, Quetzalcoatl chez les Nahuas, Kukulkan chez les Mayas ou Q'uq'umatz chez les Kichés, elle est une source d'unité à travers notre terre."
 ritual_bloodletting:0 "Saignée Rituelle"
 ritual_bloodletting_desc:0 "Dans de nombreuses cultures de notre terre, il est considéré comme convenable que le souverain utilise la scarification et la saignée comme moyen de rendre hommage aux dieux. En maintenant cette tradition, nous affirmons notre droit de gouverner."
 pyramid_architecture:0 "Architecture Pyramidale"
 pyramid_architecture_desc:0 "Les vastes pyramides de pierre qui dominent notre paysage font partie de nos traditions architecturales depuis les temps révolus de Teotihuacan, Tikal, Copan et Palenque. Nous n'avons pas oublié l'art de bâtir des pyramides, et nous aussi pouvons construire de tels édifices."
 obsidian_and_jade:0 "Obsidienne et Jade"
 obsidian_and_jade_desc:0 "Ces pierres précieuses des hautes terres comptent parmi les biens les plus prisés de notre peuple. Nous devons aller loin et chercher de nouvelles sources, pour nous assurer de n'en jamais manquer."
 KAR_ideas:0 "Idées Karamanides"
 KAR_ideas_start:0 "Traditions Karamanides"
 KAR_ideas_bonus:0 "Ambition Karamanide"
 mehmet_bey_firman:0 "Firman de Mehmet Bey"
 mehmet_bey_firman_desc:0 "Le Vizir Mehmet Ier promulgua un décret stipulant : « À partir de ce jour, dans les couvents de derviches, au conseil, à l'assemblée et sur les places, aucune autre langue que le turc ne sera parlée. » Les Seldjoukides en Anatolie avaient auparavant utilisé le persan en littérature et l'arabe dans le gouvernement et les sciences, mais les Turkmènes ne comprenaient pas ces langues."
 karamanid_cavalry:0 "Cavalerie Karamanide"
 karamanid_cavalry_desc:0 "Nous devons veiller à ce que notre cavalerie soit bien entretenue, car une bonne équitation et des chevaux de haute qualité nous permettront de lever une cavalerie redoutée."
 kar_seize_the_opportunity:0 "Saisir l'Occasion"
 kar_seize_the_opportunity_desc:0 "Depuis la fondation de notre État, nous avons fait face à des menaces de tous côtés. Pour préserver notre indépendance contre les Mamelouks d'Égypte, les héritiers d'Osman Bey et les nomades de l'Est, et pour accroître nos possessions à leurs dépens, nous devons user de diplomatie, de mariages et d'apaisement."
 karamanid_architecture:0 "Architecture Karamanide"
 karamanid_architecture_desc:0 "Nous avons commencé à bâtir un vaste réseau de mosquées, de hammams, de caravansérails et d'écoles pour la prospérité de notre peuple. Ces bâtiments représenteront certaines des constructions les plus distinctives et impressionnantes de toute la région."
 home_of_the_whirling_dervishes:0 "Patrie des Derviches Tourneurs"
 home_of_the_whirling_dervishes_desc:0 "Notre cité de Konya est le foyer des disciples de Mevlana, connus sous le nom de Derviches Tourneurs en raison de leur pratique de tournoyer comme forme de souvenir de Dieu. Le rituel symbolique est accompli en tournant sur le pied gauche en cercle autour de leur chef, qui est le seul à tournoyer autour de son propre axe. Les derviches portent une robe blanche symbolisant la mort, un large manteau noir symbolisant la tombe et un haut bonnet brun symbolisant la pierre tombale."
 true_heirs_seljuk_empire:0 "Véritables Héritiers de l'Empire Seldjoukide"
 true_heirs_seljuk_empire_desc:0 "Alors que nous sommes devenus assez forts pour proclamer notre État comme le successeur du grand empire de nos ancêtres. Qu'il soit su dès ce jour que nous sommes les chefs des Turcs et les véritables héritiers de l'empire seldjoukide !"
 MON_ideas:0 "Idées Monténégrines"
 MON_ideas_start:0 "Traditions Monténégrines"
 MON_ideas_bonus:0 "Ambition Monténégrine"
 mon_idea_1:0 "Héritage de Dioclée"
 mon_idea_1_desc:0 "La légendaire Dioclée fut le premier État slave du Sud de style médiéval à se libérer de la puissance de l'Empire byzantin. Petit et composé principalement de terres montagneuses rudes, Dioclée fut le foyer de grands généraux et de superbes embusqueurs. De nombreuses armées byzantines périrent dans ses gorges et ses vallées fluviales étroites."
 mon_idea_2:0 "Métropole du Monténégro"
 mon_idea_2_desc:0 "Les Monténégrins ont historiquement été membres de l'Église orthodoxe serbe mais gouvernés par un Métropolite qui leur est propre. Ainsi fut créée la Métropole du Monténégro et du Littoral, une position que nous devons réaffirmer et rappeler à nos voisins."
 mon_idea_3:0 "Société Clanique"
 mon_idea_3_desc:0 "Traditionnellement, la société monténégrine a toujours été divisée en clans ou maisons couvrant toute la campagne. Peu de choses étaient considérées comme plus sacrées que la prouesse physique et la bravoure parmi les hommes de ces clans, ce qui en fait une source superbe et enthousiaste de main-d'œuvre d'infanterie."
 mon_idea_4:0 "Gusars des Balkans"
 mon_idea_4_desc:0 "La côte balkanique de la péninsule sur toute la longueur de la mer Adriatique a une très longue tradition de piraterie, remontant au haut Moyen Âge. Des générations d'hommes ont passé toute leur carrière comme Gusars ou pirates, interceptant et pillant les navires marchands italiens malchanceux, avant de disparaître dans des criques côtières cachées."
 mon_idea_5:0 "L'Appel de la Mer"
 mon_idea_5_desc:0 "Avoir un littoral significatif a toujours signifié que les peuples des divers États monténégrins faisaient partie de la communauté méditerranéenne et cannoréenne plus large. Le commerce, les échanges et les idées sont tous connus pour être venus de la mer et ramenés au pays par les marins expérimentés."
 mon_idea_6:0 "Réforme Fiscale"
 mon_idea_6_desc:0 "À travers l'histoire, nos clans se sont appuyés sur un système de collecte d'impôts improvisé, basé principalement sur les besoins réels du jour. Mais véritablement, si notre État doit rejoindre la famille des pays cannoréens modernes, nous devons réformer notre système fiscal et en imposer un plus fiable et équitable."
 mon_idea_7:0 "Čojstvo i Junaštvo"
 mon_idea_7_desc:0 "Un code moral suprême de la société monténégrine dictant les normes ultimes de comportement de l'homme en toutes matières : Humanité et Valeur Courageuse. Profondément enraciné dans notre société, c'est une grande source d'honneur, de courage et d'enthousiasme pour notre peuple, de ne jamais craindre, fuir la bataille ou faiblir, et au contraire toujours affronter l'ennemi, aussi puissant soit-il."
 RMN_ideas:0 "Idées Roumaines"
 RMN_ideas_start:0 "Traditions Roumaines"
 RMN_ideas_bonus:0 "Ambition Roumaine"
 flexible_recruiting:0 "Recrutement Flexible"
 flexible_recruiting_desc:0 "Les terres roumaines ont été envahies maintes fois. Les paysans roumains ont appris que rien de bon ne vient des étrangers et défendront leur terre jusqu'au dernier homme."
 skilled_commanders:0 "Commandants Habiles"
 skilled_commanders_desc:0 "Les capitaines roumains ont depuis longtemps appris que leur allié le plus fort est la terre pour laquelle ils combattent. Que ce soit dans les forêts, les marais ou les vallées étroites et les montagnes, de nombreux ennemis ont été vaincus par des attaques surprises en des lieux inattendus."
 scorch_the_land_and_poison_the_wells:0 "Brûler les Terres et Empoisonner les Puits"
 scorch_the_land_and_poison_the_wells_desc:0 "Dans les plaines boisées roumaines, seuls les natifs savent vivre de la terre. Aucun ennemi ne récoltera une culture roumaine ni ne boira l'eau d'un puits roumain pour vivre et combattre un autre jour !"
 latin_island:0 "Île Latine"
 latin_island_desc:0 "Cela fait longtemps que nous avons été coupés de nos frères latins. Aucun de nos voisins ne parle notre langue et peu honorent nos traditions, mais nous chérissons toujours notre héritage latin."
 rom_peasant_soldiers:0 "Soldats Paysans"
 rom_peasant_soldiers_desc:0 "Les soldats roumains ont besoin de très peu lorsqu'ils défendent leur patrie. Ce ne sont pas des mercenaires, mais plutôt des paysans défendant leurs foyers ; tant qu'ils ont de la nourriture et des armes, les salaires importent peu."
 phanariote_traders:0 "Marchands Phanariotes"
 phanariote_traders_desc:0 "Les Phanariotes ont apporté bien des maux aux Principautés danubiennes, mais nul ne peut nier leurs capacités de marchands. Leurs connexions commerciales avec Constantinople nous servent bien."
 phanariote_taxes:0 "Impôts Phanariotes"
 phanariote_taxes_desc:0 "Les Phanariotes grecs ont apporté avec eux de Constantinople un nouveau système de collecte des impôts. Nos revenus fiscaux ont augmenté de façon spectaculaire."
 ATH_ideas:0 "Idées Athéniennes"
 ATH_ideas_start:0 "Traditions Athéniennes"
 ATH_ideas_bonus:0 "Ambition Athénienne"
 dominus_athenarum:0 "Dominus Athenarum"
 dominus_athenarum_desc:0 "Seigneur d'Athènes : le titre historique utilisé par le premier dirigeant autoproclamé des terres de l'Attique et de la Béotie, Othon de la Roche."
 athenian_openeness:0 "Ouverture Athénienne"
 athenian_openeness_desc:0 "La nature même de notre pays, ancienne domination croisée sur des terres, un peuple et une culture étrangères, a forcé nos dirigeants par le passé à développer une acceptation naturelle de ce qui est différent de leur propre culture. C'est une capacité que nous devons continuer à nourrir et préserver pour les générations futures de notre peuple."
 athenian_pragmatism:0 "Pragmatisme Athénien"
 athenian_pragmatism_desc:0 "La domination étrangère sur Athènes va et vient. Ils soumettent Athènes, et Athènes s'agenouille. Mais avec le temps, ils partent tous pour retourner d'où ils venaient. Après quoi Athènes se relève toujours, indomptable en esprit et en nature, un témoignage de l'impact de la Quatrième Croisade."
 revive_the_latin_greece:0 "Raviver la Grèce Latine"
 revive_the_latin_greece_desc:0 "L'Empire latin a peut-être disparu, mais l'esprit de la Grèce latine vit encore en chaque membre de notre peuple. Tout comme l'esprit de la Grèce latine vit en notre peuple, les idées de notre ancienne patrie aussi : le désir d'une plus grande innovation, de commerce et d'une plus grande gloire."
 latin_contracts:0 "Contrats Latins"
 latin_contracts_desc:0 "Faisant partie à la fois du monde ravélien et latin, nous avons des connexions et un accès à diverses cours cannoriennes. Ces influences nous permettent de trouver facilement une oreille sympathique en temps de besoin. Cela nous donne un accès facile à ceux qui sont désireux de prendre l'épée pour nous protéger en échange d'or."
 archbishop_of_athens:0 "Préserver l'Archevêque d'Athènes"
 archbishop_of_athens_desc:0 "Le siège de l'Archevêque d'Athènes était l'un des archevêchés les plus culturellement distincts de l'Église Ravélienne. Particulièrement après la chute de l'Empire latin. Mais qu'importe, nous avons toujours considéré cela comme une grande source d'inspiration et de fierté. Le seul bastion de la culture latine, agissant comme un phare lumineux de la Seule Église. Même si des voix dans les couloirs sombres de Rome murmurent des rumeurs de dissolution de l'archevêché, nous resterons fermes dans notre foi et notre résolution."
 athenian_army_reform:0 "Réforme de l'Armée Athénienne"
 athenian_army_reform_desc:0 "Pendant très longtemps, nos prédécesseurs ont dû compter sur une combinaison d'une petite armée domestique complétée par plusieurs compagnies de mercenaires latins. Bien que compétente pour nos besoins défensifs, une telle force s'est avérée trop petite et trop coûteuse pour correspondre à nos ambitions. Il est temps de remodeler notre armée sur celles de nos cousins en Italie et en Cannor occidental. Nous devons étudier, apprendre et appliquer les tactiques modernes de guerre pour propulser nos ambitions en avant."
 GOT_ideas:0 "Idées Gotlandaises"
 GOT_ideas_start:0 "Traditions Gotlandaises"
 GOT_ideas_bonus:0 "Ambition Gotlandaise"
 rebuild_visby:0 "Reconstruire Visby"
 rebuild_visby_desc:0 "Longtemps notre chère île et capitale ont été en proie aux conflits et à la malchance. Visby est tombée en décrépitude et destruction, et si nous espérons un jour nous sortir de la boue, nous devons restaurer la cité."
 invite_mercenaries_to_visby:0 "Inviter des Mercenaires à Visby"
 invite_mercenaries_to_visby_desc:0 "Le problème d'être une seule île est que nous avons à peine assez d'hommes pour nous défendre contre ceux qui nous prendraient pour proie. Cependant, cela peut être remédié par des mercenaires. Si nous persuadions les mercenaires d'établir leur quartier général à Visby, nous pourrions nous assurer d'avoir toujours au moins quelques compagnies sous la main pour nous défendre."
 expand_visby_dockyard:0 "Agrandir le Chantier Naval de Visby"
 expand_visby_dockyard_desc:0 "Nous sommes à la merci de la mer ici sur Gotland. Si nous souhaitons survivre en tant que nation, nous devons nous assurer d'avoir un mur de bois contre nos ennemis, et pour nous en assurer, nous devrions agrandir le chantier naval de Visby."
 rebuild_the_trade:0 "Reconstruire le Commerce"
 rebuild_the_trade_desc:0 "Durant le long règne de la piraterie sur Gotland, le commerce a presque cessé d'affluer vers nos rivages. Nous devons inverser cela et reconstruire nos connexions commerciales. Le commerce doit couler !"
 gutnish_merchant_adventurers:0 "Marchands Aventuriers Gotlandais"
 gutnish_merchant_adventurers_desc:0 "Même depuis l'Âge des Vikings, Gotland a été habitée par des marchands audacieux, voyageant au loin pour commercer et rapporter des marchandises exotiques sur l'île."
 gutnish_merchant_navy:0 "Marine Marchande Gotlandaise"
 gutnish_merchant_navy_desc:0 "Aussi dépendants du commerce que nous le sommes, il serait prudent de s'assurer que nos marchands fonctionnent aussi comme notre marine. Ainsi, nous devons armer convenablement nos vaisseaux marchands et non seulement protéger notre commerce mais aussi notre île."
 found_visby_bank:0 "Fonder la Banque de Visby"
 found_visby_bank_desc:0 "Les banques sont des outils très utiles si l'on souhaite gagner de l'argent, et Cannor en a vu plusieurs apparaître. Nous devrions naturellement suivre la tendance et nous assurer d'avoir un accès sûr aux prêts en fondant une banque à Visby."
 FIN_ideas:0 "Idées Finlandaises"
 FIN_ideas_start:0 "Traditions Finlandaises"
 FIN_ideas_bonus:0 "Ambition Finlandaise"
 expand_viborg:0 "Agrandir Viborg"
 expand_viborg_desc:0 "La forteresse de Viborg se trouve sur la frontière orientale la plus extrême de la Finlande face au royaume russe. Pendant des siècles, elle a prouvé sa valeur comme défense contre ceux qui voudraient attaquer la nation finlandaise et un obstacle pour tout envahisseur. En agrandissant la forteresse, nous rendrions la situation encore pire pour nos ennemis."
 the_fourth_estate:0 "Le Quatrième État"
 the_fourth_estate_desc:0 "La Finlande s'est toujours appuyée sur son quatrième état, les paysans libres, pour la prospérité du royaume. La classe paysanne a, tout au long de l'histoire de la Finlande, souvent été assez puissante pour défier les nobles et parfois même le roi lui-même."
 settle_middle_finland:0 "Coloniser le Centre de la Finlande"
 settle_middle_finland_desc:0 "Durant le XVIe siècle, la Finlande connut une croissance substantielle de la zone colonisée par la population agricole, et ce développement fut activement soutenu par la couronne. Bien que bénéfique à long terme, cela déplaça aussi les populations locales samis et caréliennes, menant à des conflits."
 found_turun_akatemia:0 "Fonder la Turun Akatemia"
 found_turun_akatemia_desc:0 "En 1640, la Turun Akatemia fut fondée sur suggestion du Comte Per Brahe par la Reine Christina de Suède. C'est aujourd'hui la première et donc la plus ancienne université de Finlande."
 hakkapelitta_fin:0 "Les Hakkapeliitta"
 hakkapelitta_fin_desc:0 "Les Hakkapeliitta étaient la redoutable cavalerie finlandaise que Gustave Adolphe employa durant la Guerre de Trente Ans. Le nom Hakkapeliitta est une modification finlandaise des noms que les soldats de l'Empire d'Anbennar leur donnèrent, provenant de leur cri de guerre « Hakkaa päälle ! », soit « Frappez dessus ! » ou « Abattez-les ! ». Les Hakkapeliitta étaient craints pour leurs attaques soudaines et sauvages qui terrorisaient l'ennemi jusqu'à la soumission."
 the_white_death:0 "La Mort Blanche"
 the_white_death_desc:1 "Préparez une invasion de printemps si vous souhaitez conquérir la Finlande, car vous ne souhaitez pas ressentir l'étreinte mortelle et glaciale de l'hiver finlandais."
 anjala_conspiracy:0 "La Conspiration d'Anjala"
 anjala_conspiracy_desc:0 "Un moment charnière dans la construction de la Nation finlandaise fut la Conspiration d'Anjala. Elle survint suite à la guerre du Roi suédois Gustave III avec la Russie en 1788. Considérant le roi comme un tyran et mécontents de la guerre, de nombreux officiers finlandais signèrent la note de Liikkala et la firent parvenir à la Tsarine Catherine la Grande. Les officiers condamnaient la guerre dans la note et la déclaraient illégale, demandant la restauration des frontières finlandaises selon le Traité de Nystad. Quand le Roi Gustave III apprit cela, il ordonna à ses officiers de combattre jusqu'au dernier homme, mais au lieu de céder, les officiers s'unirent pour publier la Déclaration d'Anjala dans laquelle ils assumaient la responsabilité, critiquaient l'attaque contre la Russie et notaient qu'ils défendraient la patrie si Catherine la Grande refusait l'offre de paix."
 ALB_ideas:0 "Idées Albanaises"
 ALB_ideas_start:0 "Traditions Albanaises"
 ALB_ideas_bonus:0 "Ambition Albanaise"
 all_lands_under_skanderbeg:0 "Toutes les Terres sous Skanderbeg"
 all_lands_under_skanderbeg_desc:0 "Né dans une famille noble albanaise, Skanderbeg passa environ vingt ans au service de l'Empire ottoman. Après avoir déserté l'armée ottomane en 1443, à la bataille de Niš, il allait inciter et mener le peuple albanais dans une rébellion de vingt ans contre les Turcs envahisseurs. L'une de ses plus grandes réalisations fut d'être la première personne à unir les tribus albanaises dispersées et fragmentées en une force combattante efficace dont le seul but était une Albanie libre de dirigeants étrangers."
 land_of_ambushers:0 "Terre d'Embusqueurs"
 land_of_ambushers_desc:0 "Telle est la géographie de l'Albanie, remplie de basses terres fertiles et de collines, entourée de montagnes imposantes et de terrain rocheux. Pendant des siècles, le peuple albanais se cachait dans ces collines rocheuses quand ses ennemis venaient. Cependant, Skanderbeg changea tout cela ; plus jamais notre peuple ne fuirait et ne se cacherait, plus jamais nous ne leur permettrions de détruire nos foyers et de saler nos fermes. Nous tendrons nos pièges, placerons nos hommes et attendrons que l'ennemi vienne à nous. Les armées ottomanes marcheront hardiment dans les vallées et les gorges de notre patrie, pour n'être que repoussées, retournant à Konstantiniyye la queue entre les jambes."
 kingdom_of_albania:0 "Royaume d'Albanie"
 kingdom_of_albania_desc:0 "Depuis des âges, nos terres ont été divisées et gouvernées par des étrangers. Notre peuple n'a jamais eu le désir ou l'opportunité de créer son propre État, gouverné par des Albanais. Mais la marée de l'histoire change. Alors que les puissants empires autour de nous s'effondrent, et que leur influence sur nous décline, nous avons l'opportunité de briser les chaînes qui nous retiennent et de forger notre propre destin."
 hit_and_run:0 "Frappe et Fuite"
 hit_and_run_desc:0 "L'Albanie n'est pas un pays particulièrement grand ou puissant. Cela ne signifie pas que nous ne combattrons pas quand des envahisseurs étrangers viendront voler nos terres. Nous avons des siècles d'expérience à repousser les envahisseurs et une compréhension fantastique de la meilleure façon d'utiliser le terrain de nos terres à notre avantage lorsque nous combattons ces envahisseurs. Nous ne suivons pas les tactiques militaires traditionnelles et ne faisons pas marcher nos hommes dans les vallées pour leur faire affronter l'ennemi de front ; nous prenons les collines, confondons l'ennemi, utilisons notre infanterie pour les attirer, tandis que notre cavalerie cachée prend leur arrière exposé à revers. Avant qu'ils ne réalisent ce qui les a frappés, nous nous évanouissons dans les airs, attendant la prochaine fois qu'ils marcheront dans notre patrie."
 land_of_eagles:0 "Terre des Aigles"
 land_of_eagles_desc:0 "Le jour où les Kastrioti levèrent pour la première fois notre drapeau, orné de l'aigle bicéphale, le mythe, et notre nation, naquirent. L'Aigle Noir vole encore, et continuera de le faire aussi longtemps que l'Albanie existera."
 albanian_tolerance:0 "Tolérance Albanaise"
 albanian_tolerance_desc:0 "En raison des turbulences dans la région, les terres et les peuples d'Albanie se sont retrouvés gouvernés par de nombreux suzerains différents. À cause de ces nombreux suzerains, les Albanais sont devenus très accueillants et tolérants envers les Étrangers. L'Albanie est l'un des très rares endroits où les adeptes du Christianisme, tant orthodoxe que ravélien, et les Musulmans arrivent à vivre côte à côte dans une paix totale."
 break_the_princes:0 "Briser le Pouvoir des Princes"
 break_the_princes_desc:0 "Notre Terre était divisée et gouvernée par des princes locaux, qui étaient préoccupés par leur propre avancement. Si nous voulons créer un État moderne, nous devons nous débarrasser de ces princes et imposer une volonté et un règne centraux uniques pour aider à guider notre peuple vers un avenir plus brillant."
 PLT_ideas:0 "Idées de Polotsk"
 PLT_ideas_start:0 "Traditions de Polotsk"
 PLT_ideas_bonus:0 "Ambition de Polotsk"
 heritage_of_the_rus:0 "Héritage de la Rus'"
 heritage_of_the_rus_desc:0 "Polotsk est l'une des plus anciennes cités de Cannor oriental. Elle était l'un des centres les plus importants de la Rus' de Kiev, et posséder la cité conférait un grand prestige à son propriétaire. Cependant, pour nous, la possession de Polotsk serait un tremplin dans notre désir et notre ambition de restaurer la Rus'."
 cultural_center:0 "Centre Culturel"
 cultural_center_desc:0 "En plus d'être l'un des trois centres politiques les plus importants de la Rus' de Kiev, Polotsk servait aussi de carrefour pour la culture et la religion. Bastion du christianisme orthodoxe en Cannor oriental, Polotsk abrite la Cathédrale Sainte-Sophie, qui hébergeait de nombreuses belles œuvres d'art médiéval et d'artisanat."
 land_of_strongholds:0 "Terre de Forteresses"
 land_of_strongholds_desc:0 "Située au cœur de Cannor oriental, Polotsk a eu le malheur d'être située entre des rivaux majeurs de tous côtés. Il était courant de voir des armées traverser nos terres en route vers ailleurs. Pour nous protéger au cas où nous deviendrions une cible, notre peuple a construit de nombreuses couches de murs et de remparts pour nous défendre."
 trade_hub:0 "Carrefour Commercial"
 trade_hub_desc:0 "En raison de notre emplacement central en Cannor oriental, nos terres étaient fréquemment le théâtre de nombreuses batailles et guerres. Ces guerres amenèrent marchands et profiteurs dans notre cité, et aidèrent à créer un flux constant de commerce pour notre peuple. Au fil des années, des routes commerciales commencèrent à se former autour de Polotsk, et maintenant la plupart du commerce qui se dirige vers Moscou ou Novgorod passe d'abord par chez nous."
 legacy_of_the_werewolf_prince:0 "Héritage du Prince Loup-Garou"
 legacy_of_the_werewolf_prince_desc:0 "Vseslav de Polotsk fut l'un des princes les plus accomplis de notre histoire. Il combattit et mit à sac le riche Duché de Novgorod et fut même proclamé Grand Prince de Kiev par ses paysans. Vseslav livra de nombreuses batailles contre les Princes voisins, et bien qu'il ne pût pas toujours vaincre, son règne engendra une époque de grande prospérité à Polotsk."
 diplomatic_initiative:0 "Initiative Diplomatique"
 diplomatic_initiative_desc:0 "Bien que l'histoire de notre principauté soit pleine de princes et d'armées héroïques, la vérité est que nous sommes un petit royaume entouré de géants. Pour que notre nation survive et continue de prospérer, nous devons forger des relations avec autant de pays que possible. Notre seule chance de survie est d'obtenir des alliés puissants et d'espérer que notre pure audace suffira à faire réfléchir nos voisins à leurs plans de conquête."
 forest_of_europe:0 "Forêt de Cannor"
 forest_of_europe_desc:0 "Bien avant que nos ancêtres ne s'installent ici, ces terres étaient couvertes de forêts anciennes et de marais. Comme elles étaient abondantes en bois, notre peuple y construisit son foyer. Depuis ces temps, nous nous sommes appuyés sur la forêt pour nous fournir les matériaux et la subsistance dont nous avons besoin pour survivre. Quand nos foyers furent saccagés, pillés et brûlés jusqu'au sol par des tribus rivales, nous nous tournâmes vers la forêt qui nous avait fournis et protégés et utilisâmes ses bienfaits pour reconstruire rapidement tout ce que nous avions perdu."
 PRM_ideas:0 "Idées Permiennes"
 PRM_ideas_start:0 "Traditions Permiennes"
 PRM_ideas_bonus:0 "Ambition Permienne"
 capital_of_prikamye:0 "Capitale du Prikamié"
 capital_of_prikamye_desc:0 "Notre capitale, Tcherdyne, est l'une des plus anciennes cités de cette partie de la Sibérie. Mentionnée dans de nombreuses sources différentes, des sagas norroises aux chroniques arabes, Tcherdyne a toujours été le centre naturel de notre région de la rivière Kama."
 the_old_traditions:0 "Les Anciennes Traditions"
 the_old_traditions_desc:0 "Même si notre peuple a été christianisé dans et autour des principaux centres de nos terres, beaucoup aux confins s'accrochent encore à l'ancienne religion et aux voies de nos ancêtres. Si nous devons créer un pays fort, un équilibre entre notre nouvelle et notre ancienne religion doit être maintenu. Nous sommes trop peu nombreux pour permettre à ces choses de nous diviser."
 the_great_perm:0 "Grande Permie"
 the_great_perm_desc:0 "La route principale de cette région est la rivière Kama, et notre capitale Tcherdyne jouit des richesses que les marchands de cette rivière nous apportent."
 warriors_of_taiga:0 "Guerriers de la Taïga"
 warriors_of_taiga_desc:0 "Dans le grand Nord, au-delà de toutes les anciennes cités et kremlins de la Rus', s'étend la terre des forêts boréales : pins, épicéas et mélèzes règnent sur ce royaume enneigé en maîtres suprêmes et incontestés. Entre ces arbres, nos guerriers voyagent, inégalés dans leur connaissance et compréhension des lois de la taïga. Sur nos terres, aucune armée ne nous trouvera ni ne nous attrapera jamais, à moins que nous ne le voulions."
 turkic_mercenaries:0 "Mercenaires Turcs"
 turkic_mercenaries_desc:0 "Pendant des siècles, divers peuples turcs sont venus sur les terres autour de nous, et avec le temps, beaucoup ont migré ailleurs. Guerriers capables et forts, ces hommes sont inégalés dans l'art de la guerre de cavalerie et pour une pièce serviront comme superbe cavalerie mercenaire."
 komi_tolerance:0 "Tolérance Komi"
 komi_tolerance_desc:0 "Notre peuple se souvient encore de jours pas si lointains où il avait une autre religion. Bien que la plupart aiment maintenant ce nouveau Dieu que les Rus' nous ont apporté, nous ne méprisons pas nos frères qui s'accrochent aux voies de la nature dont les esprits nous entourent encore dans les profondeurs de nos forêts."
 permian_army_reform:0 "Réforme de l'Armée Permienne"
 permian_army_reform_desc:0 "En tant que peuple de chasseurs et marchands semi-nomades, notre peuple s'est appuyé pendant des siècles principalement sur des mercenaires turcs et les serviteurs personnels de notre souverain pour combattre et protéger ces terres. Cependant, les temps changent et des rumeurs de nouvelles façons de combattre nous sont parvenues de Cannor. Si nous devons dépasser nos humbles débuts et devenir des membres égaux de la famille des pays cannoréens modernes, nous devons réformer notre armée et créer une force permanente capable de protéger nos foyers. Il vaut mieux prévenir que guérir, après tout."
 ASH_ideas:0 "Idées Ashanti"
 ASH_ideas_start:0 "Traditions Ashanti"
 ASH_ideas_bonus:0 "Ambition Ashanti"
 ash_idea_1:0 "Conseil des Anciens"
 ash_idea_1_desc:0 "Le dirigeant de notre terre devrait être l'autorité finale, mais il ne devrait pas avoir un pouvoir illimité. En fin de compte, sa loyauté va à l'État et, s'il faillit à l'État, le conseil des anciens devrait avoir le pouvoir de le contrôler."
 ash_idea_2:0 "Les Forts aux Esclaves"
 ash_idea_2_desc:0 "Des étrangers sont venus sur notre terre cherchant à commercer des esclaves, de l'ivoire et de l'or. Nous devrions leur donner ces choses en échange d'obtenir les biens et technologies qu'eux seuls peuvent produire."
 ash_idea_3:0 "La Coalition Akan"
 ash_idea_3_desc:0 "Nous devrions nous appuyer sur le soutien des cités et États akans voisins pour assister nos propres troupes dans la guerre contre nos ennemis. De cette façon, nous pouvons étendre notre pouvoir."
 ash_idea_4:0 "Le Tabouret d'Or"
 ash_idea_4_desc:0 "Le Tabouret d'Or détient l'âme de notre nation, descendu du ciel par le prêtre et conseiller du premier Asantehene. Celui qui s'y assoit, règne."
 ash_idea_5:0 "Coalition Centralisée"
 ash_idea_5_desc:0 "Maintenant que nous avons formé une coalition de nos voisins, nous devons unir et centraliser cette coalition, concentrant l'autorité sur la personne du roi d'Ashante. De cette façon, nous pouvons mener des centaines de milliers d'hommes au combat."
 ash_idea_6:0 "Réformes d'Osei Kwadwo"
 ash_idea_6_desc:0 "Nous devons établir une véritable administration nationale, au service du roi, pour nous assurer que notre royaume soit bien gouverné, et que nous tirions la plus grande force de chacun des villages sous notre règne."
 ash_idea_7:0 "Armée Nationale"
 ash_idea_7_desc:0 "Nous sommes un seul peuple, et nous avons une seule armée. En intégrant des troupes de tout l'empire et des peuples conquis dans l'armée, nous assurons mieux leur intégration dans la société ashante et augmentons leur acceptation de notre règne."
 guajiro_ideas:0 "Idées Arawaks"
 guajiro_ideas_start:0 "Traditions Arawaks"
 guajiro_ideas_bonus:0 "Ambition Arawak"
 guajiro_warrior_culture:0 "Culture Guerrière"
 guajiro_warrior_culture_desc:0 "Nous sommes un peuple de guerriers, et notre société est façonnée vers cette fin : la guerre. Ceux qui ne peuvent pas combattre travaillent les champs et approvisionnent les guerriers."
 guajiro_land_cultivation:0 "Culture de la Terre"
 guajiro_land_cultivation_desc:0 "Contrairement à nos voisins, qui préfèrent le mode de vie de chasseurs-cueilleurs, notre peuple a maîtrisé le concept de travailler la terre. Pourquoi errer à la recherche de nourriture, quand on peut la cultiver juste devant chez soi, et nourrir cent fois plus de gens en même temps ?"
 orinoco_trade:0 "Commerce de l'Orénoque"
 orinoco_trade_desc:0 "Le bassin de l'Orénoque est la ligne de vie de toute notre région. Le puissant fleuve est aussi un excellent moyen de communication entre villages distants et communautés de pêcheurs, une autoroute marchande parfaite pour le commerce amazonien."
 tribal_tolerance:0 "Tolérance Tribale"
 tribal_tolerance_desc:0 "Sans culture unique ni ensemble de coutumes, notre peuple a développé un vif sens de l'émerveillement pour tout ce qui est différent. Les marchands de contrées lointaines sont considérés comme une bonne fortune, et toute coutume différente n'est pas un problème."
 guajiro_raiders:0 "Pillards Arawaks"
 guajiro_raiders_desc:0 "Les pillards arawaks sont célèbres pour leur capacité à mener des attaques éclair contre des ennemis non avertis."
 guajiro_enemy_of_my_enemy:0 "L'Ennemi de Mon Ennemi"
 guajiro_enemy_of_my_enemy_desc:0 "Ce n'est pas parce que je ne te connais pas que je ne peux pas combattre mes ennemis à tes côtés."
 guajiro_jungle_warfare:0 "Guerre de Jungle"
 guajiro_jungle_warfare_desc:0 "Les jungles et les terrains accidentés qui feraient frémir la plupart de terreur sont ce que nous appelons notre foyer."
 MPC_ideas:0 "Idées Mapuches"
 MPC_ideas_start:0 "Traditions Mapuches"
 MPC_ideas_bonus:0 "Ambition Mapuche"
 mpc_idea_1:0 "Pucaras Mapuches"
 mpc_idea_1_desc:0 "Un réseau de forts de pierre parsemé à travers nos terres devrait nous fournir les moyens de repousser nos ennemis et de remporter des victoires à la guerre."
 mpc_idea_2:0 "Massues Clava"
 mpc_idea_2_desc:0 "Les massues de guerre traditionnelles de nos chefs servent de symbole de la prouesse masculine. Brandissons-les haut, pour rappeler à nos guerriers leur propre bravoure !"
 mpc_idea_3:0 "Tactiques Mapuches"
 mpc_idea_3_desc:0 "Nous devons être flexibles et adaptables à la guerre, observant et apprenant de nos ennemis. De cette façon, même avec un armement inférieur, nous pouvons espérer remporter la victoire contre n'importe quel ennemi."
 mpc_idea_4:0 "Tissage Mapuche"
 mpc_idea_4_desc:0 "Il n'y a pas d'art plus prestigieux parmi notre peuple que le tissage ; un art transmis de mère en fille par la seule observation. Une femme qui maîtrise l'art du tissage commandera une dot bien plus grande, et nos tissus nous donnent des biens à échanger avec nos voisins."
 mpc_idea_5:0 "Ngillatun"
 mpc_idea_5_desc:0 "Les cérémonies de prières collectives aident à lier notre peuple ; et sont l'une des grandes forces de notre communauté."
 mpc_idea_6:0 "Parlements de Paix"
 mpc_idea_6_desc:0 "Bien que la guerre soit un outil puissant, nous ne devrions pas refuser l'ouverture diplomatique de nos voisins. Tenir de grands parleys, ou parlements, avec les conquérants potentiels peut bien éviter la guerre complètement."
 mpc_idea_7:0 "Ruxafe"
 mpc_idea_7_desc:0 "De la richesse que nos ennemis nous cèdent en échange de la paix, nous pouvons tirer beaucoup de métaux précieux. Apprendre à travailler l'argent en bijoux et ornements augmenterait grandement le prestige de notre peuple. Nous devons former des orfèvres dès maintenant !"
 HAM_ideas:0 "Idées Hambourgeoises"
 HAM_ideas_start:0 "Traditions Hambourgeoises"
 HAM_ideas_bonus:0 "Ambition Hambourgeoise"
 hamburg_republic:0 "République Bourgeoise"
 hamburg_republic_desc:0 "Jamais nos Bourgeois ne craindront la tyrannie d'un Roi ! Les Bourgeois de Hambourg ne permettront pas que leur Ville Libre tombe sous un régime aristocratique."
 walls_of_hamburg:0 "Murailles de Hambourg"
 walls_of_hamburg_desc:0 "Un trait caractéristique de notre cité est les grandes murailles englobant l'intégralité de Hambourg. Ces murailles, toujours vigilantes, protégeront les citoyens de la guerre et des conflits."
 first_constitution:0 "Première Constitution de Hambourg"
 first_constitution_desc:0 "Le Rezeß est un compromis entre le sénat et les citoyens créé après les problèmes causés entre Hein Brandt et Jean IV de Saxe-Lauenbourg. Nous avons maintenant un ensemble de droits définis qui accompagnent le fait d'être un Bourgeois de la cité."
 johanneum:0 "École du Johanneum"
 johanneum_desc:0 "La première école de Hambourg, ravivant les anciennes pensées classiques et les langues du latin et du grec ancien. Avec l'éducation, nous ferons naître une génération nouvelle et plus forte de jeunes esprits pour servir la cité !"
 berenberg_bank:0 "Banque Berenberg"
 berenberg_bank_desc:0 "La première banque marchande en existence, experte à aider les marchands à développer leur commerce et produire encore plus de revenus. Avoir cette prestigieuse banque dans notre cité aidera certainement la cité elle-même."
 elbe_shipyards:0 "Chantiers Navals de l'Elbe"
 elbe_shipyards_desc:0 "L'une des principales industries à Hambourg est ses chantiers navals. Maintenant que la cité s'est étendue de l'autre côté de l'Elbe, l'opportunité s'est présentée d'agrandir considérablement notre construction navale."
 hanseatic_city:0 "Cité Hanséatique"
 hanseatic_city_desc:0 "Hambourg est l'un des trois membres fondateurs de la Ligue Hanséatique et possède ses propres liens solides avec tous les anciens membres et partenaires hanséatiques."
 INC_ideas:0 "Idées Incas"
 INC_ideas_start:0 "Traditions Incas"
 INC_ideas_bonus:0 "Ambition Inca"
 machu_picchu:0 "Machu Picchu"
 machu_picchu_desc:0 "Signifiant « Vieux Pic », le Machu Picchu fut construit vers 1450 au nord-ouest de Cusco, au Pérou. Il est situé sur une crête de montagne, à 2 430 mètres au-dessus du niveau de la mer près de la Vallée Sacrée. On pense que la cité fut construite comme domaine pour Pachacuti, le souverain de Cusco."
 mitma:0 "Obligations Accrues"
 mitma_desc:0 "Pour entreprendre de grands projets de construction dans le passé, nos dirigeants ont dû respecter les anciennes traditions en invitant chaque petit chef de notre empire à la capitale afin de les couvrir de cadeaux et de tenir de somptueux festins. À mesure que notre État grandit, cependant, ce n'est plus une façon idéale d'entreprendre ces projets. Fournir de la main-d'œuvre et des matériaux pour la construction devrait être un devoir de chaque chef dans nos terres."
 quipu:0 "Quipu"
 quipu_desc:0 "C'est un système qui utilise des nœuds sur des cordes pour stocker de l'information. Les nœuds représentent un nombre de zéro à neuf qui peut être utilisé pour stocker des quantités ou pour la comptabilité. Les nœuds peuvent aussi servir à référencer des logogrammes sur la même corde. Les nœuds indiquent quelle syllabe du logogramme utiliser et en combinant plus de cordes, on peut alors former des phrases."
 drafted_hatun_runas:0 "Hatun Runas Enrôlés"
 drafted_hatun_runas_desc:0 "Les hatun runas étant les hommes du commun de l'empire. Un homme sur cinquante sera choisi pour servir dans l'armée dès son vingt-cinquième anniversaire et pendant les sept années suivantes. Cela fournit une armée nombreuse et professionnelle qui est plus disciplinée que nos adversaires."
 mita_system:0 "Système de Mit'a"
 mita_system_desc:0 "De l'âge de quinze à cinquante ans, tous les hommes sont tenus de travailler sous le système de mit'a. Cela signifie qu'ils serviront pendant une période de l'année comme main-d'œuvre gratuite pour le gouvernement. Le travail est régulé de sorte qu'il n'entre pas en conflit avec la possibilité de chacun de subvenir aux besoins de sa famille."
 llama_michis:0 "Michis à Lamas"
 llama_michis_desc:0 "Les lamas ont de nombreuses fonctions dans notre société. Ils servent de bêtes de somme, de sacrifices, fournissent de la viande, de la laine et leur fumier est utilisé comme fertilisant. En contrôlant l'élevage et l'utilisation des lamas par des michis ou bergers gouvernementaux, nous assurons que la population de lamas est strictement surveillée. Cela permettra une augmentation de la population de lamas."
 tambo:0 "Relais Tambo"
 tambo_desc:0 "Notre système routier est l'épine dorsale de notre empire. Pour le plus grand bénéfice de notre armée et de notre administration, nous érigerons des relais Tambo le long de toutes les routes principales. Ces relais seront construits à une journée de marche les uns des autres et fourniront abri et provisions aux voyageurs."
 CHM_ideas:0 "Idées Chimu"
 CHM_ideas_start:0 "Traditions Chimu"
 CHM_ideas_bonus:0 "Ambition Chimu"
 chm_idea_1:0 "Irrigation Inter-Vallées"
 chm_idea_1_desc:0 "En construisant de grands canaux reliant les sources d'eau des vallées de notre patrie, nous pouvons grandement améliorer nos techniques d'irrigation et la productivité de notre terre."
 chm_idea_2:0 "Ciudadelas"
 chm_idea_2_desc:0 "Les enceintes royales doivent être des cités bien défendues et fortifiées, chacune d'entre elles. En nous assurant que les ennemis doivent mener une terrible bataille pour les atteindre, nous garantissons que notre empire restera protégé."
 chm_idea_3:0 "Héritage Divisé"
 chm_idea_3_desc:0 "Il ne convient pas que le fils qui hérite du royaume hérite aussi de toute la richesse de son père, ou de la maison du mort. Que la richesse aille à d'autres parents, et que le mort conserve sa maison tandis que le nouveau roi bâtit son propre palais."
 chm_idea_4:0 "Vigilance de la Lune"
 chm_idea_4_desc:0 "La Déesse Lune Si est la gardienne de toute propriété. Nous devrions suivre sa voie, et être vigilants face aux complots et aux voleurs dans les ténèbres."
 chm_idea_5:0 "Relocalisations d'Artisans"
 chm_idea_5_desc:0 "Il ne convient pas que nos terres conquises aient de meilleurs artisans et hommes sages que la capitale. Les plus grands talents et esprits de l'empire doivent être amenés à Chan Chan pour nous servir directement."
 chm_idea_6:0 "Économie Spécialisée"
 chm_idea_6_desc:0 "À mesure que notre empire grandit, nous devons passer d'un système où chaque village pourvoit à tous ses besoins à un système qui redistribue la richesse de tous à travers l'empire, et où tous produisent ce qu'ils produisent le mieux."
 chm_idea_7:0 "La Mit'a"
 chm_idea_7_desc:0 "Les batailles rituelles que notre peuple menait jadis appartiennent au passé. C'est maintenant le temps des grandes armées et des conquêtes. En décrétant que tous les hommes doivent devoir et labeur au roi, nous pouvons les contraindre au service militaire."
 MCA_ideas:0 "Idées Muiscas"
 MCA_ideas_start:0 "Traditions Muiscas"
 MCA_ideas_bonus:0 "Ambition Muisca"
 mca_idea_1:0 "Zipa et Zaque"
 mca_idea_1_desc:0 "Pour mieux diriger notre peuple, un souverain devrait superviser les régions septentrionales, et un autre les régions méridionales. De cette façon, chacun sera mieux à même de surveiller les terres sous son autorité."
 mca_idea_2:0 "El Dorado"
 mca_idea_2_desc:0 "Pour honorer les Dieux, le Zipa doit se baigner chaque année dans le lac de Guatavita, couvert de poussière d'or. De cette façon, l'or devient un sacrifice aux Dieux, et un signe de notre puissance."
 mca_idea_3:0 "Lutte des Gueches"
 mca_idea_3_desc:0 "Le titre de guerrier Gueches devrait être donné aux champions de nos jeux de lutte. Ceux-ci, qui ont prouvé leur supériorité sur tous les autres, sont une véritable inspiration pour nos jeunes guerriers."
 mca_idea_4:0 "Le Conte de Bochica"
 mca_idea_4_desc:0 "Le grand héros Bochica, qui mit fin au grand déluge en créant les Chutes de Tequendama et qui punit Huitaca et Chibchacum, reste une inspiration pour notre peuple, afin qu'il s'efforce aussi d'être des héros."
 mca_idea_5:0 "Troc d'Émeraudes"
 mca_idea_5_desc:0 "Les magnifiques gemmes vertes de notre terre sont l'envie et le désir de tous ceux qui les connaissent. Et, pour nous, elles sont si abondantes qu'elles servent d'objets de troc."
 mca_idea_6:0 "Agriculture en Terrasses"
 mca_idea_6_desc:0 "Pour tirer le maximum de l'espace limité des hauts plateaux, nous avons développé l'agriculture en terrasses et de meilleures techniques d'irrigation."
 mca_idea_7:0 "Droit Coutumier"
 mca_idea_7_desc:0 "Bien que le Zipa et le Zaque règnent, leur règne est contraint par d'anciennes coutumes, et leur rôle est de maintenir et d'appliquer ces coutumes, non pas simplement d'imposer leurs caprices."
 CYA_ideas:0 "Idées Chachapoyas"
 CYA_ideas_start:0 "Traditions Chachapoyas"
 CYA_ideas_bonus:0 "Ambition Chachapoya"
 cya_idea_1:0 "Guerriers des Nuages"
 cya_idea_1_desc:0 "Nous sommes une lignée fière et ancienne de guerriers. Nous devons toujours maintenir cet héritage, afin que les autres craignent de nous attaquer."
 cya_idea_2:0 "Héritage de Kuelap"
 cya_idea_2_desc:0 "Notre immense forteresse de Kuelap est un exploit presque inégalé à travers les Andes. L'exemple architectural qu'elle donne doit être maintenu."
 cya_idea_3:0 "Forteresses des Sommets"
 cya_idea_3_desc:0 "Nos cités et forteresses se trouvent au sommet d'immenses montagnes, bien au-delà des nuages. Elles présentent un obstacle redoutable à quiconque chercherait à nous envahir."
 cya_idea_4:0 "Diplomatie Féminine"
 cya_idea_4_desc:0 "Il peut être sage, parfois, de confier les missions diplomatiques délicates non pas aux guerriers ou aux rois, mais aux femmes de notre peuple qui sont plus susceptibles de gagner l'oreille des souverains ennemis."
 cya_idea_5:0 "Endurance Chachapoya"
 cya_idea_5_desc:1 "Même quand nos hommes ne peuvent plus combattre et nos femmes ne peuvent plus être utilisées pour la diplomatie, tous deux continuent encore à servir notre peuple avec leur expérience."
 cya_idea_6:0 "Purunmachus"
 cya_idea_6_desc:0 "Pour honorer nos morts, nous devrions leur construire de grands sarcophages d'argile, dans les montagnes reculées et sur les grandes falaises, où ils seront mis au repos."
 cya_idea_7:0 "Forêts de Nuages"
 cya_idea_7_desc:0 "L'immense forêt tropicale des hautes Andes amazoniennes forme une couche terrifiante de défense autour de nos foyers, où embuscades et menaces naturelles attendent les armées errantes."
 TEU_ideas:0 "Idées Teutoniques"
 TEU_ideas_start:0 "Traditions Teutoniques"
 TEU_ideas_bonus:0 "Ambition Teutonique"
 teu_idea_1:0 "Réformer l'Armée"
 teu_idea_1_desc:0 "Les chevaliers allemands, vétérans de croisades et d'innombrables guerres cannoriennes, ne sont tout simplement pas assez nombreux pour rester la base de nos armées. Nous devons maintenant réorganiser l'armée pour ouvrir la voie à des régiments levés localement, capables de remplacer les chevaliers sur le champ de bataille."
 teu_idea_2:0 "Recruter des Paysans"
 teu_idea_2_desc:0 "Il est devenu clair pour nous que nous ne pouvons plus compter sur des volontaires étrangers pour remplir les rangs de notre armée. Aussi expérimentés et précieux qu'ils puissent être. Au lieu de cela, un système qui nous permettrait de lever nos sujets, Allemands et non-Allemands, doit être développé."
 teu_idea_3:0 "Ajuster nos Tactiques d'Infanterie"
 teu_idea_3_desc:0 "Les batailles cannoriennes contemporaines ont prouvé que l'âge de l'infanterie est sur le point de commencer. Il est maintenant temps de développer de nouvelles tactiques, d'adopter la pique et de réformer notre concept médiéval d'infanterie auxiliaire en la force combattante principale de nos futures armées."
 teu_idea_4:0 "Assumer l'Autorité Religieuse"
 teu_idea_4_desc:0 "Mettre fin à la pratique de l'autonomie religieuse lâche des évêques locaux au sein de notre royaume. Toutes les questions religieuses, de l'imposition à la conversion des locaux, seront désormais des affaires d'État."
 teu_idea_5:0 "Étendre les Marches"
 teu_idea_5_desc:0 "Accorder l'autonomie aux gouverneurs locaux de nos régions frontalières et réformer leurs terres en marches. Ces terres spéciales paieront moins d'impôts à l'État en échange d'une obligation de maintenir la plus haute préparation au combat en temps de guerre comme en temps de paix. Cela devrait nous fournir une flexibilité militaire substantielle à peu de frais."
 teu_idea_6:0 "Promouvoir les Évêques Prussiens"
 teu_idea_6_desc:0 "Accorder davantage de droits et privilèges à nos évêques prussiens, assurant leur loyauté en toutes matières."
 teu_idea_7:0 "Un État, Une Religion"
 teu_idea_7_desc:0 "Réserver tous les postes d'État uniquement à ceux de notre religion. Les hérétiques et les païens ne sont plus les bienvenus dans notre royaume."
 BUL_ideas:0 "Idées Bulgares"
 BUL_ideas_start:0 "Traditions Bulgares"
 BUL_ideas_bonus:0 "Ambition Bulgare"
 bul_idea_1:0 "Confirmer les Boyards Bulgares"
 bul_idea_1_desc:0 "Comme c'était la norme pour les peuples slaves de Cannor oriental, l'institution de l'aristocratie des boyards était courante parmi les Bulgares dans pratiquement toutes les itérations de leur État. Maintenant, avec les Ottomans enfin partis et notre peuple libre, nous devons renouveler les anciennes traditions et structurer notre société comme elle l'était jadis."
 bul_idea_2:0 "Extirper les Hérésies"
 bul_idea_2_desc:0 "Des siècles de luttes religieuses ainsi que des suzerains païens ont laissé une marque sur notre peuple. Nous devons extirper toutes ces doctrines dangereuses car la force réside dans l'unité."
 bul_idea_3:0 "L'Unité avant les Querelles"
 bul_idea_3_desc:0 "Maintenant que nous sommes de nouveau libres, nous devons nous assurer que la noblesse bulgare ne place jamais ses propres querelles mesquines au-dessus de l'intérêt commun de notre peuple. Plus jamais la Bulgarie ne tombera dans la nuit comme elle l'a fait avant les Ottomans ! Unis, nous reprendrons la place qui nous revient de droit."
 bul_idea_4:0 "Réformer l'Armée"
 bul_idea_4_desc:0 "L'âge médiéval est passé et nous nous trouvons maintenant dans un monde nouveau et audacieux dominé par la poudre à canon, les cavaliers légers pillards de l'est et les engins de siège qui peuvent réduire les plus hauts murs en tas de décombres. Nous devons nous adapter à ces changements et nous assurer que nos armées sont compétentes et assez nombreuses pour faire face à tous les défis, d'où qu'ils viennent."
 bul_idea_5:0 "Réformer l'Église Bulgare"
 bul_idea_5_desc:0 "L'Église orthodoxe bulgare est la première Église autocéphale orthodoxe slave. Autrefois source de grande fierté et puissance, elle fut dégradée durant la conquête byzantine de la Bulgarie et son déclin continua durant nos luttes internes et sous le joug ottoman. De nouveau libres, le peuple bulgare retrouvera l'Église bulgare comme pilier principal de sa société. Comme elle l'était jadis, ainsi sera-t-elle de nouveau."
 bul_idea_6:0 "Flexibilité Militaire"
 bul_idea_6_desc:0 "À cheval entre le monde des steppes, le monde islamique et Cannor occidental, la Bulgarie fait face à des défis militaires comme peu d'autres pays en Cannor. Non seulement doit-elle rester compétitive contre de nombreux aspirants conquérants, mais elle doit conserver son expertise à combattre dans pratiquement tous les types de terrain : des steppes aux plaines et basses terres, en passant par les forêts, collines et montagnes. Nos ancêtres n'ont jamais craint ces défis, ils se sont levés pour les affronter avec un succès et une grâce légendaires, et nous ferons de même."
 bul_idea_7:0 "Troisième Rome"
 bul_idea_7_desc:0 "L'âge d'or de Rome est révolu. Tout comme le puissant empire est tombé, ses successeurs grecs sont tombés aussi. Il appartient maintenant à la Bulgarie d'utiliser notre position en Cannor au cœur de l'une des plus grandes intersections de routes commerciales du continent, ainsi que nos liens royaux avec le trône byzantin, pour revendiquer l'héritage de la Troisième Rome. Que les autres usurpateurs et prétendants à l'Est craignent le Nouveau Tsarat Bulgare, ressuscité des cendres tel un phénix."
 KIE_ideas:0 "Idées Kiéviennes"
 KIE_ideas_start:0 "Traditions Kiéviennes"
 KIE_ideas_bonus:0 "Ambition Kiévienne"
 mother_of_all_cities:0 "Mère de Toutes les Cités"
 mother_of_all_cities_desc:0 "Pendant des siècles, l'antique cité de Kiev a été la « mère de toutes les cités de la Rus' » et « une véritable perle dans la couronne de la Rus' ». Bien que dans sa riche histoire elle ait été mise à sac et ravagée d'innombrables fois, elle reste l'une des plus belles et significatives cités de Cannor oriental."
 heritage_of_rus:0 "Héritage de la Rus'"
 heritage_of_rus_desc:0 "La Ruthénie est le cœur de l'ancienne Rus' de Kiev, et au sein de ce cœur se trouve Kiev, le lieu vers lequel toutes les routes mènent. Avec Kiev entre nos mains, la restauration de la Rus' elle-même n'est qu'à un pas."
 fending_off_the_invaders:0 "Repousser les Envahisseurs"
 fending_off_the_invaders_desc:0 "Depuis des âges, des nomades barbares de la steppe ont pénétré les terres de la Rus' en pillant et brûlant nos villes et forts, même Kiev elle-même à maintes occasions. Eh bien, plus jamais. Nous bâtirons des murs si hauts et larges que même le plus puissant des Khans ne les franchira jamais."
 chernozem_land:0 "Tchernozem"
 chernozem_land_desc:0 "Le Tchernozem ruthène est le morceau de terre le plus fertile de tout Cannor. Si nous parvenons à assurer la paix dans nos terres et à empêcher les envahisseurs de détruire nos récoltes, nous pouvons devenir le plus grand exportateur de grain de Cannor, apportant d'innombrables fortunes à notre patrie."
 center_of_orthodox_church:0 "Centre de l'Église Orthodoxe"
 center_of_orthodox_church_desc:0 "C'est à Kiev même que le baptême de la Rus' commença. Pendant des années et des siècles, malgré tous les jeux politiques et les prétentions prétentieuses de nos frères du nord, Kiev reste encore le centre incontestable de l'Église orthodoxe de Cannor oriental."
 support_local_traders:0 "Soutenir les Marchands Locaux"
 support_local_traders_desc:0 "En introduisant et soutenant des marchés saisonniers et des foires dans nos cités, nous visons à développer un réseau commercial fort et stable au sein de notre pays, un réseau qui attirera même les étrangers sur nos terres et élargira notre accès aux marchés lointains."
 centralized_rule:0 "Un Seul pour les Gouverner Tous"
 centralized_rule_desc:0 "La grande et puissante Rus' de Kiev, autrefois centrée dans notre propre cité, s'effondra en d'innombrables petites principautés, se battant sans fin entre elles, se chamaillant et inconscientes du fait que de plus grands royaumes les regardaient et les considéraient mûres pour la cueillette. Plus jamais nous ne permettrons cela. Notre nouveau pays éliminera toute idée d'autonomie et maintiendra sans pitié la prise la plus ferme sur tous nos anciens domaines. Centralisés, nous resterons unis sans égaux."
 NAX_ideas:0 "Idées Naxiennes"
 NAX_ideas_start:0 "Traditions Naxiennes"
 NAX_ideas_bonus:0 "Ambition Naxienne"
 maritime_state:0 "État Maritime"
 maritime_state_desc:0 "De la mer vinrent nos ancêtres italiens pour gouverner cette terre, et de la mer vient notre puissance encore aujourd'hui. Le duché de Naxos, étendu sur la plupart des Cyclades, a toujours été un pays regardant vers les mers et leurs vagues incessantes. Si nous devons rester forts et unis, c'est sur la mer que repose notre avenir."
 naxos_rules_the_waves:0 "Naxos Règne sur les Flots"
 naxos_rules_the_waves_desc:0 "Pour beaucoup, une marine puissante est une question de prestige. Pour nous, une marine puissante est une question vitale de notre survie même. Avec des fiefs éparpillés sur des dizaines d'îles, le seul moyen de maintenir la communication entre les parties de notre domaine passe par la mer."
 archipelago_of_opportunities:0 "Archipel d'Opportunités"
 archipelago_of_opportunities_desc:0 "Les eaux autour de nos îles ont toujours été traîtresses pour les marins et les navires, particulièrement ceux transportant de riches marchandises. Une attaque éclair par des galères équipées d'hommes hautement expérimentés qui ont passé toute leur vie dans ces eaux se terminerait par leur disparition plus vite que leur proie ne réaliserait ce qui s'est passé."
 legacy_of_crusaders:0 "Héritage des Croisés"
 legacy_of_crusaders_desc:0 "Bien que nous gouvernions des terres habitées principalement par de loyaux sujets grecs orthodoxes, nous nous souvenons encore d'où nous venons : l'Italie. Le sang de nos ancêtres croisés coule encore dans nos veines, un héritage dont nous et nos cousins italiens nous souvenons encore."
 archipelago_feudalism:0 "Féodalisme de l'Archipel"
 archipelago_feudalism_desc:0 "Quand nous arrivâmes pour la première fois sur ces terres, il y eut une rencontre plutôt unique de civilisations : le système byzantin de la pronoia rencontra de plein fouet le concept de féodalisme de Cannor occidental. Quelque chose d'étrange et de beau se produisit alors : tout cela se mélangea et s'assembla, créant un mélange unique de traditions orientales et occidentales, un système qui fonctionne parfaitement pour les Grecs comme pour les Latins."
 latin_roots:0 "Racines Latines"
 latin_roots_desc:0 "Alors que notre ancienne patrie d'Italie traverse la Renaissance avec un progrès technologique comme jamais auparavant, beaucoup de ces idées nouvelles et parfois dangereuses, mais souvent brillantes, nous parviennent. Avoir des cousins éloignés paie après tout."
 naxian_ambitions:0 "Ambition Naxienne"
 naxian_ambitions_desc:0 "Bien que l'Empire latin, foyer de nos anciens suzerains féodaux, ait disparu, l'héritage latin des croisés vit encore à travers nous. Bien que petit, notre bastion de culture et de religion occidentales tient bon. Nous sommes une petite terre, mais nos ambitions de restaurer un Empire disparu depuis longtemps sont grandes."
 TUA_ideas:0 "Idées Tapuias"
 TUA_ideas_start:0 "Traditions Tapuias"
 TUA_ideas_bonus:0 "Ambition Tapuia"
 ge_hunter_gatherers:0 "Chasseurs-Cueilleurs"
 ge_hunter_gatherers_desc:0 "Depuis l'aube des temps, notre peuple a vécu une vie d'harmonie avec la nature. Toujours en mouvement, toujours à la recherche des fruits fournis par la jungle autour de nous. Notre société est comme la vie elle-même : toujours changeante et jamais au même endroit trop longtemps."
 ge_home_of_fisherfolk:0 "Patrie des Pêcheurs"
 ge_home_of_fisherfolk_desc:0 "Bien que nos terres soient dominées par des jungles sans fin et des collines basses, même celles-ci doivent s'incliner devant la plus puissante force de la nature : l'eau. Les rivières sculptent notre paysage, non seulement en reliant nos communautés distantes mais aussi en fournissant à notre peuple eau et poisson. Pendant des générations, nous avons vécu de ces eaux, et avec grande fierté nous affirmons qu'en matière de pêche, nous n'avons pas d'égal."
 yam_growers:0 "Cultivateurs d'Ignames"
 yam_growers_desc:0 "Bien que notre peuple ait toujours été principalement chasseur-cueilleur, l'igname est une exception à cette règle. Un légume commun, originaire des forêts tropicales d'Amérique du Sud et assez facile à cultiver, l'igname est la nourriture de réserve que notre peuple cultive pour toujours avoir quelque chose sur quoi se rabattre."
 ge_mithology:0 "Terre de Mythologie"
 ge_mithology_desc:0 "La mythologie de notre peuple est plus qu'un simple récit d'histoires, c'est un mode de vie en soi. D'innombrables histoires sur le bien et le mal, les héros, les guerriers et les sages du passé mais aussi les animaux, comme le jaguar, le plus sacré de tous, sont transmises de génération en génération."
 ge_jaguar_warriors:0 "La Voie du Jaguar"
 ge_jaguar_warriors_desc:0 "Le Jaguar a toujours été l'animal le plus sacré pour notre peuple. Insaisissable, intelligent, puissant et inspirant la crainte, il est l'incarnation de toutes les valeurs de notre mythologie. Un exemple suprême pour nos guerriers à imiter.\nNe jamais être vu, à moins de le vouloir, ne jamais avoir peur, car dans les nuits de la jungle, tu es la chose la plus dangereuse. Quand tu attaques, frappe si vite que ta proie ne sache jamais ce qui l'a frappée, et finalement, une fois que c'est fait, disparais dans les profondeurs infinies de la jungle.\nTelle est la voie du jaguar."
 ge_establish_trade:0 "Ouvrir des Routes Commerciales"
 ge_establish_trade_desc:0 "Aussi loin que nous nous souvenions, notre peuple a vécu dans des communautés dispersées le long des berges d'innombrables rivières de jungle. Beaucoup de ces petits villages de pêcheurs et communautés n'ont jamais eu de contact les uns avec les autres. Cela change maintenant. Notre peuple commence à voyager par les rivières et à commercer avec leurs cousins et parents éloignés. Avec ce commerce, nos idées et notre mythologie peuvent se répandre."
 ge_unite_the_tribes:0 "Unir les Tribus"
 ge_unite_the_tribes_desc:0 "Des rumeurs et des murmures arrivent le long des rivières. Des histoires d'un homme blanc venant sur nos rivages de l'autre côté des Mers Infinies et d'une terre lointaine. Des villages entiers au sommet de grands bateaux de bois remplis d'hommes avec des bâtons de feu. Partout où ils viennent, la mort suit bientôt. Si nous devons survivre à ce défi, contrairement à tout autre jamais rencontré par notre peuple, nous devons rassembler tous nos villages et communautés et nous préparer à agir comme un seul."
 POM_ideas:0 "Idées Poméranien­nes"
 POM_ideas_start:0 "Traditions Poméranien­nes"
 POM_ideas_bonus:0 "Ambition Poméranienne"
 pom_idea_1:0 "Héritage des Pirates"
 pom_idea_1_desc:0 "Étant un réseau affairé de commerce lucratif, la mer Baltique, et donc la côte nord-allemande, a toujours été un très bon endroit pour la piraterie. Si bien que même les dirigeants de ces petits pays y participaient souvent, plus ou moins ouvertement. Il n'y a rien de tel que de voler beaucoup d'or à l'un de vos rivaux."
 pom_idea_2:0 "Marchands Poméraniens"
 pom_idea_2_desc:0 "Les Poméraniens ont une longue tradition de navigation à travers la mer Baltique à la recherche de havres sûrs pour leurs navires et marchandises. De nombreux étrangers ont entendu parler de nous, de Novgorod à Constantinople."
 pom_idea_3:0 "Ports du Nord"
 pom_idea_3_desc:0 "Les ports poméraniens sont situés à un excellent emplacement stratégique, ce qui nous donne un avantage naturel pour étendre notre influence sur le commerce au sein de la mer Baltique."
 pom_idea_4:0 "Liberté Religieuse"
 pom_idea_4_desc:0 "Étant principalement intéressés par le commerce et les opportunités commerciales lointaines, nous n'avons ni le temps ni le désir de nous engager dans de mesquines querelles religieuses avec nos frères chrétiens."
 pom_idea_5:0 "Contrats de Mercenaires"
 pom_idea_5_desc:0 "Nos nombreux contacts commerciaux nous ont permis d'établir d'excellentes relations avec une multitude d'étrangers. Notre bonne réputation nous permettra d'engager leurs mercenaires à de meilleurs tarifs que d'habitude."
 pom_idea_6:0 "Dominer la Baltique"
 pom_idea_6_desc:0 "À mesure que la puissance et l'influence poméranienne grandissent, notre emprise sur la mer Baltique aussi. Bientôt elle sera Mare Nostrum, guère plus qu'un étang poméranien. Une autoroute pour notre commerce."
 pom_idea_7:0 "Marine Allemande"
 pom_idea_7_desc:0 "Nous tâcherons de construire la plus grande marine de toute l'Allemagne !"
 KAZ_ideas:0 "Idées Kazanes"
 KAZ_ideas_start:0 "Traditions Kazanes"
 KAZ_ideas_bonus:0 "Ambition Kazane"
 kaz_idea_1:0 "Tolérance des Steppes"
 kaz_idea_1_desc:0 "La steppe est si vaste que nous n'entendons pas les prières des païens."
 kaz_idea_2:0 "Héritage Tribal"
 kaz_idea_2_desc:0 "Dans la mer d'herbe, les concepts de légitimité et de justification de conquête deviennent sans importance. Dans la steppe, les mauvaises nouvelles ne voyagent pas du tout car personne n'entend les cris des vaincus."
 kaz_idea_3:0 "Société Guerrière"
 kaz_idea_3_desc:0 "Un homme n'est un homme, et une femme une femme, que tant qu'ils peuvent monter et combattre. Dans la steppe, tout le monde est un guerrier, car seuls les plus coriaces survivent. La steppe ne pardonne pas."
 kaz_idea_4:0 "Héritage de la Grande Horde"
 kaz_idea_4_desc:0 "La tradition orale est la base de notre société. Il y a longtemps, disent nos anciens, un jeune garçon s'éleva de rien pour devenir le Khan des Khans et conquit le monde entier en un simple clin d'œil d'une vie. Le monde tremble encore de son nom et il apprendra de nouveau à craindre les steppes."
 kaz_idea_5:0 "Guerre des Steppes"
 kaz_idea_5_desc:0 "Depuis l'aube des temps, quand nos ancêtres ne savaient rien du Dieu unique et de son Prophète, la guerre des steppes tournait autour d'une chose : l'unité d'un cheval et d'un homme. Dans la steppe, ils deviennent un, une seule vie et une seule force combattante. Aucune armée n'a jamais réussi à battre les tactiques de frappe et fuite de la steppe, même le puissant Iskender tomba devant nous."
 kaz_idea_6:0 "Se Sédentariser"
 kaz_idea_6_desc:0 "Le temps est venu d'abandonner notre mode de vie nomade et de nous installer comme le font les Occidentaux. Nous bâtirons des murs puissants qui ne tomberont jamais."
 kaz_idea_7:0 "Mettre Fin à la Domination Occidentale"
 kaz_idea_7_desc:0 "Pendant très longtemps, nos tribus ont commercé avec des marchands russes et occidentaux, laissant ces étrangers prendre la plupart des profits. Maintenant, le temps est venu pour nous de revendiquer notre propre présence dans les grands centres de commerce occidentaux et orientaux !"
 ARM_ideas:0 "Idées Arméniennes"
 ARM_ideas_start:0 "Traditions Arméniennes"
 ARM_ideas_bonus:0 "Ambition Arménienne"
 apostolic_church:0 "Église Apostolique"
 apostolic_church_desc:0 "L'Arménie fut la première nation à établir le christianisme comme religion d'État en 301. Le sentiment d'avoir la première église nationale au monde nous apporte une immense fierté en notre nation. Notre foi religieuse nous a aidés à maintenir notre identité et notre espoir, notamment grâce à Saint Mesrop Machtots et son alphabet arménien, qui révolutionna le destin de notre peuple. Ce fut une étape fondamentale dans le renforcement de l'État arménien et de son identité."
 land_reclamation:0 "Reconquête des Terres"
 land_reclamation_desc:0 "L'Arménie a été ravagée par la guerre pendant des siècles et déchirée par ses voisins. En réclamant nos terres perdues et en les rendant aptes à l'habitation, tout en restaurant les églises et forteresses ruinées, nous pouvons assurer une emprise plus forte sur nos terres et améliorer la vie de nos citoyens."
 border_nation:0 "Nation Frontalière"
 border_nation_desc:0 "L'Arménie, depuis les temps anciens, a souvent été un champ de bataille entre des nations plus grandes pendant des siècles. Même après avoir retrouvé notre souveraineté, il est souvent difficile de maintenir une position neutre. Il est difficile de satisfaire tout le monde, mais c'est faisable."
 melikdom_organization:0 "Organisation des Mélikats"
 melikdom_organization_desc:0 "En tant que l'un des rares bastions d'un État arménien indépendant, l'Arménie était gouvernée par des suzerains féodaux appelés méliks, alors que l'ancien système nakharar s'effondrait. La relation entre les méliks et leurs subordonnés était celle d'un officier commandant militaire et d'un officier subalterne, et non celle d'un seigneur féodal et d'un serf. Les paysans étaient souvent autorisés à posséder des terres, étaient libres et possédaient des biens."
 sygnakhs:0 "Sygnakhs"
 sygnakhs_desc:0 "Les sygnakhs sont des structures militaires en Arménie pour les organisations de recrutement, les systèmes de fortification, les balises de signalisation et le soutien logistique. Habituellement, chaque mélik avait son propre sygnakh, mais les plus grands sygnakhs sont partagés par différents méliks. Établir de tels sygnakhs nous permet de rassembler nos troupes plus efficacement."
 nakharar_titles:0 "Titres Nakharar"
 nakharar_titles_desc:0 "Affaiblie par de nombreuses invasions et les réformes juridiques des rois, la structure nakharar resta pratiquement inchangée pendant de nombreux siècles et fut finalement éliminée durant les invasions mongoles au XIIIe siècle. Restaurer le despotisme féodal est hors de question, mais raviver l'ancien titre de nos nobles encouragerait la fierté nationale."
 end_of_armenian_diaspora:0 "Fin de la Diaspora Arménienne"
 end_of_armenian_diaspora_desc:0 "Notre peuple a été dispersé au loin, sans foyer où retourner. Le renouveau de la nation arménienne devrait encourager une grande partie de nos compatriotes d'outre-mer à retourner dans leur mère patrie !"
 WLS_ideas:0 "Idées Galloises"
 WLS_ideas_start:0 "Traditions Galloises"
 WLS_ideas_bonus:0 "Ambition Galloise"
 cynulliad:0 "Cynulliad"
 cynulliad_desc:0 "Owain Glyndŵr convoqua le premier Parlement, ou Cynulliad, à Machynlleth en 1404. Là, il déclara sa vision d'un État gallois indépendant avec un parlement et une église galloise séparée."
 bardic_literature:0 "Littérature Bardique"
 bardic_literature_desc:0 "En ravivant nos anciennes traditions poétiques, nous pouvons espérer résister à l'épreuve du temps. Les meilleures guerres ne se gagnent pas souvent avec l'épée, mais avec la poésie et la prose aussi. Un renouveau des traditions bardiques nous permettrait aussi de raviver l'eisteddfod, un grand rassemblement auquel étaient invités poètes et musiciens de tout le pays. Le vainqueur de l'eisteddfod annuel se voit accorder un siège au conseil du seigneur. Nos poètes ont maintenu vivant l'esprit gallois et leurs chants nous inspireront."
 cyfraith_hywel:0 "Cyfraith Hywel"
 cyfraith_hywel_desc:0 "Des voix s'élèvent pour raviver le droit traditionnel gallois de Hywel le Bon et l'ancien système des cantrefi pour gouverner le Pays de Galles, chacun étant divisé en plusieurs commotes. Ceux-ci étaient d'une importance particulière dans l'administration du droit. Chaque cantref avait sa propre cour, qui était une assemblée des uchelwyr, les nobles, les principaux propriétaires terriens du cantref."
 unbennaeth_prydain:0 "Unbennaeth Prydain"
 unbennaeth_prydain_desc:0 "« La Monarchie de Bretagne » était un ancien poème gallois qui servit d'hymne national aux nombreux royaumes gallois médiévaux. Bien que la composition spécifique soit maintenant perdue, elle racontait vraisemblablement les exploits des anciens rois des Bretons. Raviver une nouvelle forme de cette composition attiserait la fierté nationale."
 economic_revival:0 "Renouveau Économique"
 economic_revival_desc:0 "Le Pays de Galles avait plusieurs problèmes pour devenir une puissance économique. Il était restreint par son emplacement périphérique, sa topographie principalement montagneuse, ses mauvaises communications et sa population clairsemée. En encourageant le développement du commerce et des ports, ainsi que l'exploitation de riches gisements minéraux, nous pouvons stimuler de nouvelles avancées non seulement en économie, mais aussi en technologie."
 prifysgolion_cymru:0 "Prifysgolion Cymru"
 prifysgolion_cymru_desc:0 "Owain Glyndŵr projetait d'établir deux universités au Pays de Galles, une dans le nord et une dans le sud. En encourageant les arts académiques, nous pouvons espérer que notre grande nation sera un centre d'apprentissage."
 welsh_church:0 "Église Galloise"
 welsh_church_desc:0 "L'église galloise était indépendante des autres églises, avec sa propre structure ecclésiastique. Nous sommes un peuple chrétien bien avant que les Romains ne quittent les côtes de Bretagne et ne nous abandonnent. Notre terre est la terre de nombreux saints chrétiens et avec un fort héritage de chrétienté celtique."
 west_african_ideas:0 "Idées Ouest-Sarhalyennes"
 west_african_ideas_start:0 "Traditions Ouest-Sarhalyennes"
 west_african_ideas_bonus:0 "Ambition Ouest-Sarhalyenne"
 west_african_idea_1:0 "Tradition des Griots"
 west_african_idea_1_desc:0 "Les conteurs, chanteurs de louanges, poètes et musiciens de notre peuple, les griots, sont des enseignants et des conseillers. Nous devrions les écouter, et nous assurer que leurs connaissances et leurs voies sont transmises aux nouvelles générations de griots."
 west_african_idea_2:0 "Caravanes de Sel"
 west_african_idea_2_desc:0 "Chaque année, de grandes caravanes de sel traversent la terre depuis les mines du désert. Le précieux pain de poudre blanche qu'elles nous apportent permet la conservation des aliments."
 west_african_idea_3:0 "Noix de Kola"
 west_african_idea_3_desc:0 "La boisson de l'arbre à kola est d'une valeur essentielle dans nos anciennes coutumes. Nous devons nous assurer de n'en jamais manquer."
 west_african_idea_4:0 "Ancêtres et Croissant"
 west_african_idea_4_desc:0 "Du nord sont venus des étrangers prêchant des croyances étrangères et des marchands adorateurs de ces fois. Au sud, les adeptes des anciennes voies de notre peuple demeurent encore. Nous devons nous efforcer d'établir l'équilibre entre ces groupes, et nous assurer que tous deux se trouvent représentés dans les voies de notre État."
 west_african_idea_5:0 "Écuries Royales"
 west_african_idea_5_desc:0 "Il est inacceptable pour un souverain de régner sans posséder de grands destriers comme marque de son pouvoir. Nous devons nous assurer d'avoir toujours accès à un approvisionnement en chevaux !"
 west_african_idea_6:0 "Le Grand Fleuve"
 west_african_idea_6_desc:0 "De grands fleuves comme le Niger et la Volta définissent une grande partie du continent sarhalyen, accélérant considérablement le transport et les voyages. Nous devrions adopter ces grands fleuves comme moyens de transport."
 west_african_idea_7:0 "Maintenir les Petits Rois"
 west_african_idea_7_desc:0 "Bien que nous soyons naturellement les véritables grands rois, il peut y avoir d'autres rois, qui devraient régner sous notre autorité. Laissons-les gouverner leur propre peuple et leurs propres villages, qu'ils connaissent le mieux, en notre nom."
 andean_ideas:0 "Idées Andines"
 andean_ideas_start:0 "Traditions Andines"
 andean_ideas_bonus:0 "Ambition Andine"
 andean_idea_1:0 "Nœuds Parlants"
 andean_idea_1_desc:0 "En utilisant des arrangements de cordes et de nœuds pour enregistrer l'information, nous pouvons grandement faciliter l'administration de nos terres et l'enregistrement des informations vitales."
 andean_idea_2:0 "Réseau de Routes de Montagne"
 andean_idea_2_desc:0 "Pour faciliter la redistribution des biens, un grand réseau de routes de montagne reliant les vallées éloignées entre elles et traversant les gorges profondes est nécessaire. Construisons-le."
 andean_idea_3:0 "Larmes du Soleil"
 andean_idea_3_desc:0 "Bien que les aventuriers de terres lointaines rêvent de trouver de l'or secret sur les sentiers de montagne haut dans les Andes, pour nous le métal jaune a une valeur plus artistique et sacrée que simplement économique."
 andean_idea_4:0 "Élevage de Lamas"
 andean_idea_4_desc:0 "Les vastes troupeaux de lamas de nos terres nous fournissent des tissus pour nous vêtir, de la viande pour nous nourrir et des bêtes de somme pour porter nos fardeaux. Ils sont véritablement inestimables."
 andean_idea_5:0 "Ornements Monumentaux"
 andean_idea_5_desc:0 "Des vastes tracés de lignes dans les déserts de Nazca aux structures gravées, notre terre abrite de nombreux témoignages immenses de notre travail."
 andean_idea_6:0 "Cités Cachées"
 andean_idea_6_desc:0 "Dans une terre de pics immenses et de forêts tropicales impénétrables, beaucoup de nos cités sont presque inaccessibles aux étrangers. Elles pourraient facilement rester cachées pendant des siècles, oubliées du monde."
 andean_idea_7:0 "Musique de Zampoña"
 andean_idea_7_desc:0 "Les airs envoûtants des flûtes de notre patrie et la musique qu'elle produit sont une véritable marque distinctive de notre peuple, et devraient être encouragés."
 aymaran_ideas:0 "Idées Aymaras"
 aymaran_ideas_start:0 "Traditions Aymaras"
 aymaran_ideas_bonus:0 "Ambition Aymara"
 aym_idea_1:0 "Héritage de Tiwanaku"
 aym_idea_1_desc:0 "Nous nous souvenons des nombreuses idées et notions que nous avons héritées de l'ancien empire de Tiwanaku, sur les rives du lac Titicaca."
 aym_idea_2:0 "Guérison Yatiri"
 aym_idea_2_desc:0 "Les Yatiri sont notre lien avec le monde des esprits de la nature et des ancêtres. Marqués et frappés par la foudre, ils sont ainsi appelés à leurs destins de gardiens des rites de guérison. Nous devrions suivre leur sagesse."
 aym_idea_3:0 "Production de Chu'uqi"
 aym_idea_3_desc:0 "Là où le maïs pousse mal sur les hauts plateaux de notre terre, nous avons appris à nous appuyer plutôt sur les racines tubéreuses hautement nutritives d'une plante locale. Avec une production accrue, nous pouvons nourrir notre peuple et nos guerriers avec une nourriture facile à entretenir."
 aym_idea_4:0 "Cultiver les Danses Aymaras"
 aym_idea_4_desc:0 "Les danses animées de notre peuple, au son du roseau de pipe, sont une marque distinctive de notre culture. Nous devrions les encourager et les développer sous toutes leurs nombreuses formes."
 aym_idea_5:0 "Les Rites du Tinku"
 aym_idea_5_desc:0 "Les grands combats rituels tenus en l'honneur de Pachamama, la déesse de la terre, non seulement lui plaisent, mais garantissent que nos hommes maintiennent constamment leur esprit combatif."
 aym_idea_6:0 "Encourager la Chal'lla"
 aym_idea_6_desc:0 "Les rites nécessaires d'action de grâce à la déesse de la Terre rassemblent notre peuple et apportent la paix à la terre. Nous devons nous assurer qu'ils ne soient jamais oubliés."
 aym_idea_7:0 "Devoirs de l'Ayni"
 aym_idea_7_desc:0 "Notre société est construite sur un système de commerce et de devoirs réciproques, où chaque membre a un devoir envers l'ensemble."
 tupi_ideas:0 "Idées Tupis"
 tupi_ideas_start:0 "Traditions Tupis"
 tupi_ideas_bonus:0 "Ambition Tupi"
 patrilinear_society:0 "Parenté Agnatique"
 patrilinear_society_desc:0 "Contrairement aux tribus faibles et tremblantes qui nous entourent, notre peuple a toujours eu une vision claire de l'avenir ainsi qu'un ensemble strict de lois qui régulent notre société. Les fils porteront les noms de leurs pères, tout comme leurs pères l'ont fait avant eux, et ce faisant, l'héritage de nos ancêtres vivra éternellement."
 two_tribes_myth:0 "Les Deux Tribus"
 two_tribes_myth_desc:0 "Le mythe des Deux Tribus vit encore dans la mémoire de nos Sages. Les histoires racontent que Tupis et Guaranis étaient un seul peuple il y a de nombreuses générations. Un fait qui pourrait bénéficier à nos deux peuples à l'avenir."
 warrior_tribes:0 "C'est un Bon Jour pour Mourir"
 warrior_tribes_desc:0 "Notre peuple est avant tout composé de guerriers. Nous n'avons pas toujours vécu sur ces terres que nous habitons maintenant. Nous sommes venus d'un lieu oublié depuis longtemps pour rencontrer les précédents occupants de ces vallées. Ces tribus faibles ne sont plus, mais les Tupis tiennent encore. Plus forts que jamais et regardant toujours vers des horizons lointains, nos guerriers ne craignent rien et prisent une mort glorieuse au combat par-dessus tout."
 splash_and_burn:0 "Brûlis"
 splash_and_burn_desc:0 "Bien que notre peuple soit composé de guerriers renommés des jungles, quand nous sommes arrivés pour la première fois sur ces terres, nous avons apporté avec nous une autre invention, une qui n'avait rien à voir avec les affaires militaires et pourtant une qui nous a permis de gagner la domination sur toutes ces terres, vainquant et déplaçant leurs précédents occupants : l'Agriculture. Alors que nos ennemis vivent principalement comme chasseurs et cueilleurs, toujours en mouvement d'un endroit à l'autre, notre peuple mène une vie sédentaire, cultivant des récoltes qui nourrissent des centaines de plus. Le brûlis est une méthode d'agriculture itinérante qui a permis à notre peuple de défricher d'immenses étendues de terre pour les ouvrir à la plantation."
 cultivate_the_land:0 "Cultiver la Terre"
 cultivate_the_land_desc:0 "La Jungle est un environnement difficile pour y vivre, surtout si votre peuple souhaite cultiver sa nourriture et non vivre de la terre. Défricher les jungles est donc l'une des tâches les plus importantes pour notre société si elle doit survivre et prospérer. Nous devons organiser notre peuple de telle sorte que nous puissions employer de grandes forces de travail d'hommes valides pour effectuer ces travaux chaque fois qu'un besoin se présente."
 head_hunters:0 "Chasseurs de Têtes"
 head_hunters_desc:0 "Conquérir des terres aux peuples plus faibles est l'essence même de notre tribu. Ce mode de vie a créé un code guerrier unique selon lequel capturer et non tuer l'ennemi est la plus haute forme de bravoure et de valeur. Cela a rendu notre peuple célèbre pour sa maîtrise de la capture de personnes vivantes, une compétence qui peut être utile à beaucoup de ces nouveaux venus blancs qui ont débarqué sur nos rivages."
 wall_builders:0 "Bâtisseurs de Murs"
 wall_builders_desc:0 "Contrairement aux autres tribus de la région amazonienne, le peuple Tupi pratique la construction de grandes palissades de bois autour de leurs établissements permanents. D'énormes murs de bois protégeraient de nombreuses maisons d'une seule tribu, créant ainsi des communautés uniques dans cette partie du monde."
 CUA_ideas:0 "Idées Charruas"
 CUA_ideas_start:0 "Traditions Charruas"
 CUA_ideas_bonus:0 "Ambition Charrua"
 cua_idea_1:0 "Voies des Chasseurs-Cueilleurs"
 cua_idea_1_desc:0 "Notre culture est encore une culture de chasseurs-cueilleurs nomades. Notre structure et nos établissements ne sont pas construits pour la permanence, mais plutôt pour offrir un refuge temporaire avant que nous ne bougions à nouveau."
 cua_idea_2:0 "Héritage des Pampas"
 cua_idea_2_desc:0 "Comme nos cousins des Pampas, nous restons un peuple semi-nomade, et ainsi nous sommes toujours prêts à bouger quand le monde l'exige de nous."
 cua_idea_3:0 "Guerre aux Bolas"
 cua_idea_3_desc:0 "Nous avons depuis longtemps maîtrisé l'art des bolas pour la chasse. En les utilisant à la guerre, nous pouvons entraver et même briser les os des ennemis, en faisant des proies faciles pour nos guerriers."
 cua_idea_4:0 "Adoption du Cheval"
 cua_idea_4_desc:0 "Notre peuple a appris les voies des bêtes apportées d'outre-mer par les visiteurs, et nous avons trouvé dans le cheval un puissant allié dans la vie quotidienne comme à la guerre."
 cua_idea_5:0 "Résister aux Conquistadors"
 cua_idea_5_desc:0 "Nous ne devrions pas permettre à des soi-disant explorateurs et autres visiteurs de traverser notre terre. Au lieu de cela, nous devrions leur tendre des embuscades depuis les ombres et nous assurer qu'aucun d'entre eux n'échappe."
 cua_idea_6:0 "Garra Charrúa"
 cua_idea_6_desc:0 "La défaite peut être certaine, mais nous n'abandonnerons pas. La ténacité demeurera, et nous lutterons jusqu'au bout à la recherche d'une victoire impossible."
 cua_idea_7:0 "Les Derniers Charrúas"
 cua_idea_7_desc:0 "Même si nous devions mourir, même s'il ne restait de nous que des statues et des histoires, nous laisserons notre trace dans l'histoire."
 GUA_ideas:0 "Idées Guaranis"
 GUA_ideas_start:0 "Traditions Guaranis"
 GUA_ideas_bonus:0 "Ambition Guarani"
 gua_idea_1:0 "Apaisement des Pomberos"
 gua_idea_1_desc:0 "Les esprits semblables à des gobelins des forêts doivent être apaisés avec des offrandes constantes de miel et d'autres aliments pour qu'ils ne volent pas nos enfants."
 gua_idea_2:0 "Poterie Guarani"
 gua_idea_2_desc:0 "Les urnes de céramique que nous utilisons dans nos rites funéraires nécessitent un grand savoir-faire. Nous devrions aussi tourner cet artisanat vers des activités économiques."
 gua_idea_3:0 "Échos d'Iguazu"
 gua_idea_3_desc:0 "Les grandes chutes d'Iguazu dans notre terre sont au cœur de nombreuses légendes, et les échos des chutes sont dit contenir le son de nombreuses batailles passées, rappelant la longue histoire de notre peuple."
 gua_idea_4:0 "Conversions Jésuites"
 gua_idea_4_desc:0 "Alors que des gens de royaumes lointains viennent sur notre terre prêcher de nouveaux dieux, beaucoup de notre peuple ont commencé à les écouter. Nous devrions les accueillir."
 gua_idea_5:0 "Établissements de Missions"
 gua_idea_5_desc:0 "Alors que des missionnaires arrivent dans nos terres de royaumes lointains, nous devrions nous rassembler près de leurs églises. De cette façon, non seulement nous apprenons leurs voies, mais nous rassemblons aussi nos nombres."
 gua_idea_6:0 "Repousser les Bandeirantes !"
 gua_idea_6_desc:0 "Les raids constants d'esclaves par les bandeirantes sont une menace toujours présente pour notre peuple, avec déjà bien trop de gens emmenés en esclavage par les bandits. Nous devons nous armer et préparer nos défenses pour les repousser !"
 gua_idea_7:0 "Armements Royaux"
 gua_idea_7_desc:0 "Nous devrions demander à nos alliés missionnaires de faire pression sur les rois de Cannor pour le droit d'obtenir des armes à feu en grandes quantités, et un entraînement militaire par des soldats vétérans."
 LXA_ideas:0 "Idées du Lan Xang"
 LXA_ideas_start:0 "Traditions du Lan Xang"
 LXA_ideas_bonus:0 "Ambition du Lan Xang"
 lao_ethnic_diversity:0 "Diversité Ethnique Laotienne"
 lao_ethnic_diversity_desc:0 "Le bassin du Mékong forme l'artère politique et économique du Royaume du Lan Xang. Cette terre riche et fertile sillonnée de rivières a attiré de nombreux peuples différents à migrer à travers ces régions au fil des siècles, résultant en un pays uniquement divers de traditions et cultures mélangées."
 lxa_elephant_cavalry:0 "Cavalerie d'Éléphants"
 lxa_elephant_cavalry_desc:0 "Bien que les éléphants aient été utilisés dans d'autres régions du monde à la guerre, nulle part ils n'ont été utilisés en tel nombre qu'en Asie du Sud-Est. Le Royaume du Lan Xang alignait jusqu'à deux mille éléphants dans certaines campagnes, faisant de ces animaux une composante clé de la tradition militaire de la région."
 court_history_of_lang_xang:0 "Chroniques de la Cour du Lan Xang"
 court_history_of_lang_xang_desc:0 "L'institution des chroniques de cour joue un rôle important dans la préservation de la mémoire culturelle du peuple laotien et nous permet de tracer une ligne de continuité entre notre mythologie culturelle et la situation politique actuelle. Cela peut être très utile dans de nombreuses situations, du soutien à la dynastie régnante à la justification d'alliances ou de guerres."
 lxa_white_elephant:0 "L'Éléphant Blanc"
 lxa_white_elephant_desc:0 "Tout comme dans de nombreuses autres parties de l'Asie, l'Éléphant Blanc est une figure culturelle et religieuse très puissante dans la vie quotidienne du Lan Xang. Si un tel événement rare et inhabituel était découvert dans nos terres, il deviendrait un puissant symbole de nos souverains, une preuve de la bénédiction divine de leurs décisions et de leur règne en général."
 flowering_of_culture:0 "Épanouissement de la Culture"
 flowering_of_culture_desc:0 "Bien que notre État soit né des conquêtes militaires de nos ancêtres et vive aujourd'hui en grande partie grâce aux prouesses militaires de leurs fils, nous ne devons pas oublier que chaque guerre doit avoir une raison ou risquer de devenir un gaspillage inutile de vies. Maintenant que nous avons accompli tant par la force de nos armes, il est temps de nous tourner vers nos esprits brillants et de soutenir un épanouissement de la culture, de la religion et d'autres belles choses de la paix."
 merchants_of_vientiane:0 "Marchands de Vientiane"
 merchants_of_vientiane_desc:0 "La Cité de Vientiane a toujours été le carrefour commercial de notre État. Géographiquement, elle est située dans une position presque parfaite pour ouvrir à la fois le commerce fluvial et la communication avec les terres voisines. Vientiane est cependant aussi située dans un endroit extrêmement difficile à défendre. Pour permettre à notre commerce d'exister et de prospérer, nous devons apprendre à construire des murs à la fois plus hauts et plus solides que dans toute autre partie de notre État pour protéger la richesse qui bénéficie tant à notre peuple."
 renaissance_of_lan_xang:0 "Renaissance du Lan Xang"
 renaissance_of_lan_xang_desc:0 "Situé au cœur même de l'Asie du Sud-Est, le Lan Xang est le carrefour naturel de nombreuses cultures différentes. Plus notre État devient fort et glorieux, plus les érudits, marchands et voyageurs de lieux lointains arriveront, apportant avec eux de nouvelles idées et de nouvelles connaissances."
 caucasus_ideas:0 "Idées Caucasiennes"
 caucasus_ideas_start:0 "Traditions Caucasiennes"
 caucasus_ideas_bonus:0 "Ambition Caucasienne"
 crossroads_of_cultures:0 "Carrefour des Cultures"
 crossroads_of_cultures_desc:0 "Les montagnes du Caucase ont toujours été une immense barrière naturelle dominant le paysage sur des centaines de kilomètres. Du côté nord, les collines descendent lentement vers la mer d'herbe sans fin connue comme la Steppe, et du côté sud, d'innombrables rivières creusent des vallées à travers les hautes terres qui descendent vers les riches contrées de Perse. Les rumeurs de ces richesses infinies ont toujours attiré les peuples de la Steppe et beaucoup d'entre eux traversent les montagnes caucasiennes pour les atteindre."
 alan_mercenaries:0 "Mercenaires Alains"
 alan_mercenaries_desc:0 "Les Alains ont toujours vécu dans les plaines steppiques de l'autre côté de la chaîne caucasienne. Guerriers habiles et coriaces, ces cavaliers des steppes font des troupes auxiliaires superbes et des mercenaires d'une compétence inégalée."
 caucasus_hit_and_run:0 "Frappe et Fuite"
 caucasus_hit_and_run_desc:0 "La nature du terrain caucasien a toujours dicté le rythme de la guerre dans nos terres. Les vallées fluviales étroites, les ravins et les hautes terres présentent tous des opportunités parfaites pour l'embuscade ainsi que des goulots d'étranglement où l'on peut arrêter même les plus grandes armées avec très peu d'hommes. Nos ancêtres savaient très bien comment tirer parti de ces faits et les leçons de leurs victoires et défaites vivent encore, transmises d'une génération à l'autre."
 persian_poetry:0 "Poésie Persane"
 persian_poetry_desc:0 "Même dans les régions reculées du Caucase, vous pouvez trouver de forts bastions de culture persane. Bien que leurs empires ne soient plus, l'héritage culturel du peuple persan vit encore à travers leur culture et leur poésie."
 highland_khans:0 "Khans des Hautes Terres"
 highland_khans_desc:0 "Au fil des siècles, notre peuple a été vassal de nombreuses fois à divers empires du sud. Même maintenant, de nombreuses puissances montantes regardent encore vers le Caucase avec avidité dans les yeux, désireuses de restaurer leur pouvoir sur notre région. Mais plus jamais. Nos dirigeants ne seront pas des gouverneurs et de simples princes, vassaux et tributaires d'autres. Désormais, des Khans parmi les égaux sans personne au-dessus d'eux régneront sur ces terres !"
 eastern_influence:0 "Influence Orientale"
 eastern_influence_desc:0 "Nos terres sont situées à un carrefour de cultures et de civilisations. De nombreuses fois à travers l'histoire, nous avons observé des armées de l'ouest et de l'est traverser nos terres vers leur bataille finale, nous permettant d'observer de nombreuses traditions militaires différentes dans le feu même de la bataille. Peu peuvent surpasser et surprendre notre compréhension aiguë de toutes les choses de nature militaire."
 caucasus_cavalry_armies:0 "Armées de Cavalerie"
 caucasus_cavalry_armies_desc:0 "Des rumeurs se répandent de l'ouest que l'âge de la Cavalerie Lourde est révolu. Absurdité. Que tous ceux qui font de telles affirmations viennent devant nous et affrontent la puissante charge de notre cavalerie. S'ils l'osent."
 CIR_ideas:0 "Idées Circassiennes"
 CIR_ideas_start:0 "Traditions Circassiennes"
 CIR_ideas_bonus:0 "Ambition Circassienne"
 horsemen_of_the_steppe:0 "Cavaliers de la Steppe"
 horsemen_of_the_steppe_desc:0 "À travers la grande steppe, notre ancienne patrie, de nombreux peuples vagabondent. Ces nomades sont un peuple coriace menant des vies presque entièrement sur le dos de leurs chevaux robustes. Ils peuvent constituer une superbe force de cavalerie."
 merchants_of_genoa:0 "Marchands de Gênes"
 merchants_of_genoa_desc:0 "Il y a des siècles, des marchands d'une terre lointaine appelée Italie arrivèrent sur nos rivages. Gagnant progressivement de plus en plus d'influence sur notre terre et notre peuple, ils ont ouvert un marché entièrement nouveau pour nos produits."
 circassian_grain:0 "Commerce de Grain Circassien"
 circassian_grain_desc:0 "Alors que nos établissements côtiers sont tombés un par un sous l'influence des marchands génois, le flux de gens allant et venant des mers vers nos terres a augmenté. Lentement, des villages de pêcheurs ont grandi pour devenir des villes et cités commerciales florissantes. C'est un excellent marché pour tout le grain que nous pouvons produire."
 franciscan_missionaries:0 "Missionnaires Franciscains"
 franciscan_missionaries_desc:0 "Quand les marchands italiens arrivèrent pour la première fois dans nos terres, le commerce n'était pas la seule chose qu'ils apportèrent avec eux. Bientôt, des missionnaires catholiques de l'Ordre Franciscain vinrent dans nos terres et un accord fut conclu avec la noblesse circassienne permettant à l'Église catholique d'étendre son influence religieuse sur toutes les terres circassiennes."
 adyghe_beauty:0 "Beauté Adyguéenne"
 adyghe_beauty_desc:0 "La beauté de nos femmes est bien connue, et leur réputation s'est répandue même dans des terres lointaines. De nombreux souverains des mondes chrétien et musulman trouveraient leurs épouses parmi elles."
 steppe_diplomats:0 "Diplomates des Steppes"
 steppe_diplomats_desc:0 "Même si les vents de l'histoire de notre peuple changent, et les religions et coutumes avec, l'Ordre Franciscain qui est arrivé ici il y a des siècles a été maintenu en vie. Dotés de terres et protégés par rois et khans, les Franciscains circassiens sont devenus une question de prestige pour tout aspirant dirigeant de la steppe. Sur des centaines de kilomètres dans toutes les directions, vous ne trouverez personne de plus éduqué ou versé dans les langues de Cannor."
 circassian_religious_flexibility:0 "Flexibilité Religieuse"
 circassian_religious_flexibility_desc:0 "Juste au carrefour de l'histoire, la Circassie est une terre qui a été conquise de nombreuses fois. Envahie tantôt du Caucase, tantôt des steppes orientales, tantôt des plaines occidentales et même de la mer, nos terres ont vu d'innombrables peuples différents aller et venir. Finalement, ils partent tous, mais certains laissent des idées précieuses derrière eux."
 KHI_ideas:0 "Idées de Khiva"
 KHI_ideas_start:0 "Traditions de Khiva"
 KHI_ideas_bonus:0 "Ambition de Khiva"
 horde_legacy:0 "Héritage de la Horde"
 horde_legacy_desc:0 "Il y a une longue tradition dans les steppes de combattre à cheval. Les enfants sont mis en selle avant de savoir marcher et le cheval peut presque sembler faire partie d'eux. En préservant ces anciennes traditions, nous nous assurons que nos armées sont menées par des hommes qui comprennent l'utilisation du cheval turkmène au combat."
 deserts_of_khiva:0 "Déserts de Khiva"
 deserts_of_khiva_desc:0 "Selon les légendes de nos ancêtres, Khiva fut fondée par Sem, le fils du prophète Noé, alors qu'il creusait un puits au milieu du désert. Les gens qui burent l'eau de ce puits crièrent « Kheyvak », eau douce. Sans cette eau, soit la chaleur extrême pendant les jours, soit le froid extrême des nuits de Khiva coûtera la vie à quiconque dans cette région."
 oasis_of_merv:0 "Oasis de Merv"
 oasis_of_merv_desc:0 "L'oasis de Merv est stratégiquement située dans le désert du Karakoum et pendant des siècles elle a formé un quartier général militaire essentiel et une étape le long de la Route de la Soie. Nous devons nous efforcer de contrôler et maintenir cette oasis bien afin d'en faire usage comme nos ancêtres l'ont fait."
 djuma_mosque:0 "Mosquée Djuma"
 djuma_mosque_desc:0 "La « Mosquée du Vendredi » de Khiva n'a pas d'équivalent en Asie centrale avec son plafond plat et ses plus de deux cents colonnes. Ces colonnes sont décorées avec les meilleurs motifs de sculpture du Khorezm provenant de l'ancienne capitale au fond de l'Amou-Daria."
 amu_darya:0 "Amou-Daria"
 amu_darya_desc:0 "Vous savez que vous approchez de Khiva quand vous traversez le légendaire fleuve Amou-Daria. Situé au croisement des rivières Vakhch et Pandj, ce fleuve majeur coule à travers les déserts de Khiva et se jette dans la mer d'Aral. Avec la découverte d'or sur ses berges, l'Amou-Daria pourrait attirer des expéditions non désirées dans nos terres."
 ichan_qala:0 "Ichan Qal'a"
 ichan_qala_desc:0 "Aussi connue comme la forteresse intérieure de Khiva, l'Ichan Qal'a était le dernier lieu de repos des caravanes avant de traverser le désert vers la Perse. Elle a été construite selon nos anciennes traditions de construction de villes, un exemple sublime de l'architecture musulmane de ces terres."
 great_powers_diplomacy:0 "Diplomatie des Grandes Puissances"
 great_powers_diplomacy_desc:0 "Chaque jour qui passe, l'ours russe au Nord, le lion britannique à l'Est et le chat persan au Sud atteignent nos frontières. Pour garantir notre indépendance face à ces grandes puissances, nous devons trouver des alliés et un moyen de dresser nos ennemis les uns contre les autres."
 BAH_ideas:0 "Idées Bahmanides"
 BAH_ideas_start:0 "Traditions Bahmanides"
 BAH_ideas_bonus:0 "Ambition Bahmanide"
 gharbians:0 "Gharbiens"
 gharbians_desc:0 "Couper les liens avec Delhi pour fonder notre propre royaume il y a près de cent ans a aussi coupé notre accès aux hommes, biens et technologies des parties du nord de l'Inde dominées par les musulmans. Comme notre État manque de toute forme d'aristocratie musulmane établie, nous sommes dans une situation précaire et pourrions finir entièrement à la merci des nobles hindous locaux.\nHeureusement, notre réputation nous précède. Les contes des richesses du Deccan sont racontés et re-racontés dans tout le monde musulman et de nombreux bâtisseurs de fortune ambitieux cherchent à faire le voyage maritime vers nos ports. En utilisant les vastes richesses de l'Inde pour attirer des Occidentaux talentueux, des Gharbiens, à notre cour, nous pouvons nous assurer que notre pays ne manquera jamais d'hommes capables pour mener nos armées, collecter nos impôts et gouverner nos sujets."
 legacy_of_gisu_daraz:0 "Héritage de Gisu Daraz"
 legacy_of_gisu_daraz_desc:0 "L'Inde en général et le sultanat bahmanide en particulier ont une histoire comme centre des enseignements soufis. Les efforts de nos sultans pour attirer et patronner des cheikhs soufis, tels que le grand Muhammad Gisu Daraz de partout dans le monde, témoignent de la piété et de la grande force spirituelle de nos monarques et de notre cour.\nL'État adoptant les concepts soufis de souveraineté spirituelle et la nature inclusive des enseignements soufis eux-mêmes aidera à créer un environnement où les diverses fois religieuses des Gharbiens et des natifs du Deccan peuvent se mélanger et prospérer sans conflits ni querelles improductives."
 dakani_language:0 "Langue Dakani"
 dakani_language_desc:0 "Le Deccan est une région de nombreuses langues et cultures. Le grand afflux d'Iraniens, Touraniens, Afghans et Arabes dans ces terres a encore accentué la nature cosmopolite de notre État. Bien qu'historiquement la langue persane ait rempli les besoins de nos prédécesseurs, un nouveau mélange de langues locales ainsi que de persan et d'arabe est devenu de plus en plus courant. Nous devrions adopter cette langue dakani à notre cour et encourager son usage parmi nos poètes et administrateurs."
 karimis:0 "Karimis"
 karimis_desc:0 "Pendant des siècles, le commerce indo-égyptien a été géré par des groupes de marchands et capitaines basés en Égypte connus sous le nom de Karimis. Instrumentale dans les affaires quotidiennes du commerce de l'Océan Indien, cette organisation marchande est maintenant à la fois riche et puissante. Des côtes tamoules aux cités portuaires swahilies jusqu'aux cités portuaires égyptiennes au-delà du Golfe d'Aden, sultans, nobles et roturiers viennent tous acheter des biens exotiques ou emprunter de l'argent pour leurs projets aux Karimis.\nCette organisation a récemment pris un intérêt très actif pour notre État et nous ne pouvons que gagner à cultiver davantage notre relation avec elle."
 takht_e_firoza:0 "Takht-e-Firoza"
 takht_e_firoza_desc:0 "La première chose que tout invité dans notre salle d'audience royale remarque est le Trône de Turquoise de notre dynastie. Cette pièce unique de mobilier royal nous fut originellement offerte par le Raja Telugu vaincu Kapaya et elle est de bien des façons le symbole ultime de notre dynastie. Exquis et splendidement unique, il incarne les richesses du Deccan et la combinaison inhabituelle de styles qui est la marque de notre État cosmopolite."
 bahmani_primogeniture:0 "Primogéniture Bahmanide"
 bahmani_primogeniture_desc:0 "Notre pratique inhabituelle de toujours passer le trône au fils aîné du dirigeant actuel a parfois créé une certaine instabilité dans notre royaume alors que des régents avides de pouvoir et des nobles opportunistes n'ont initialement montré que peu d'hésitation à essayer de profiter d'un dirigeant enfant ou à soutenir la revendication d'un parent envieux au trône. Maintenant cependant, la pratique est fermement institutionnalisée et quand le moment de la succession arrive, ils sont très peu à s'opposer au véritable héritier de notre dynastie."
 madrasa_of_mahmud_gawan:0 "Grande Madrasa du Deccan"
 madrasa_of_mahmud_gawan_desc:0 "Pendant de nombreuses années maintenant, notre État a drainé des hommes capables du monde musulman plus large tout en incorporant aussi le meilleur des États qui nous ont précédés. Cela a créé une riche culture cosmopolite, deccanie, qui n'est ni entièrement persane, arabe, marathe, telugu ni kannada par nature. Créer une madrasa majeure dans notre capitale servirait à faire avancer le développement de l'érudition deccanie et permettrait au monde de voir la grandeur de notre État."
 JAJ_ideas:0 "Idées Siddi"
 JAJ_ideas_start:0 "Traditions Siddi"
 JAJ_ideas_bonus:0 "Ambition Siddi"
 goma:0 "Goma"
 goma_desc:0 "Bien que notre peuple ne puisse plus être considéré comme culturellement africain, nous n'avons pas oublié les coutumes de nos ancêtres. Le Goma, une danse sacrée au tambour construite sur le mélange des styles et rythmes indo-islamiques et africains, est un exemple parfait de la façon dont nous sommes venus à accepter les voies de ces terres tout en les faisant nôtres. C'est la voie Siddi."
 siddi_seamanship:0 "Art de la Navigation Siddi"
 siddi_seamanship_desc:0 "L'une des premières tâches de nos ancêtres esclaves était de naviguer les navires de leurs ravisseurs à travers l'Océan Indien. Bien que nous soyons maintenant libres, nous portons encore leur héritage et notre peuple est renommé pour son grand art de la navigation."
 fortress_of_janjira:0 "Forteresse Insulaire Imprenable"
 fortress_of_janjira_desc:0 "Notre maîtrise de la mer signifie que chaque île rocheuse est une base potentielle pour les navires et les troupes de notre royaume. Fortifions l'île rocheuse que nous appelons maintenant notre capitale si fortement que pour tout étranger, il semblera que la forteresse émerge de la mer elle-même."
 siddi_diaspora:0 "La Diaspora Siddi"
 siddi_diaspora_desc:0 "Entraînés dès leur jeune âge pour devenir des marins, soldats et administrateurs experts, nos ancêtres furent autrefois arrachés à leurs foyers natifs en Afrique orientale. Maintenant, ils équipent navires, bureaux et forts autour de l'Inde et de la Perse, dévouant leurs vies à servir des maîtres de stature et d'importance variables. Alors que le nom de notre État voyage, cependant, un certain nombre d'anciens esclaves voyagent dans l'autre direction pour atteindre le seul royaume Siddi du monde. Un lieu à appeler foyer."
 siddi_diplomacy:0 "Diplomatie Siddi"
 siddi_diplomacy_desc:0 "Notre royaume est un étrange petit poisson dans le grand étang des États indiens. Il est vital pour notre survie que nous maintenions une diplomatie active envers tous nos voisins. Nous ne devons jamais être sans alliés et nous ne devons jamais nous permettre d'être incertains des intentions de nos voisins."
 siddi_konkani_trade:0 "Commerce du Konkan"
 siddi_konkani_trade_desc:0 "Patrie de ports commerciaux animés tels que Thana, Chaul ou Goa, le nerf vital de la côte du Konkan est le réseau commercial de l'Océan Indien. En faisant bon usage des atouts navals à notre disposition, nous pouvons nous assurer que nous devenons aussi riches que le marchand le plus riche qui paie nos péages."
 siddi_expansion_of_navy:0 "Expansion de la Marine"
 siddi_expansion_of_navy_desc:0 "Contrôler la mer a toujours été ce que nous Siddis faisons le mieux et notre marine est l'une des plus fines de l'Océan Indien. À mesure que l'influence de notre royaume grandit, nous devons nous assurer que notre marine grandit aussi. La qualité seule ne gagnera pas le jour quand les marines des puissances cannoriennes essaieront de perturber le commerce de cette région."
 JNP_ideas:0 "Idées de Jaunpur"
 JNP_ideas_start:0 "Traditions de Jaunpur"
 JNP_ideas_bonus:0 "Ambition de Jaunpur"
 jnp_purbias:0 "Purbias"
 jnp_purbias_desc:0 "Depuis la chute de Kannauj au IXe siècle, cette région a été le foyer d'un grand nombre de communautés Rajputs. Connus sous le nom de Purbias, ces Rajputs orientaux ne sont pas une partie aussi dominante de la société que leurs cousins au Rajputana et mènent un mode de vie légèrement différent. Au lieu d'une vie à cheval, les Purbias ont choisi de semer les champs et de protéger leurs établissements à pied. C'est donc avec grande joie que les Purbias accueillirent l'avènement de l'arme à feu sur le sous-continent indien. Avec les armes à poudre, ils sont devenus tout aussi dangereux à pied que leurs cousins occidentaux à cheval. Envoyons nos recruteurs dans ces villages pour faire bon usage de cette expertise gratuite."
 shiraz_e_hind:0 "Shiraz-i Hind"
 shiraz_e_hind_desc:0 "Depuis les jours de notre premier Sultan indépendant, nos dirigeants ont fait tout leur possible pour encourager les érudits, hommes saints, poètes et artistes à venir s'installer dans notre belle cité. Située au carrefour des routes commerciales du nord de l'Inde, et avec des cités saintes telles que Varanasi et Prayag à proximité, cela n'a pas été une tâche difficile et en conséquence Jaunpur est maintenant un environnement intellectuel florissant."
 jnp_sants_and_sufis:0 "Sants et Soufis"
 jnp_sants_and_sufis_desc:0 "Le nord de l'Inde a toujours été un aimant pour les enseignants religieux et avec l'avènement des royaumes islamiques indépendants, cette tradition a été perpétuée par les enseignants soufis et les poètes Sant. Là où l'un représente une approche éduquée du mysticisme islamique, l'autre a ses racines parmi les castes inférieures, remettant souvent en question le besoin de rituels et de clercs dans l'ensemble. Avec les Gourous plus traditionnels, ces mystiques offrent un exutoire pour la plupart des convictions religieuses et dans cette diversité, notre région a trouvé une certaine stabilité."
 jaunpuri_architecture:0 "Architecture de Jaunpur"
 jaunpuri_architecture_desc:0 "Une tâche prioritaire pour les Sultans du royaume nouvellement né de Jaunpur était de créer un style architectural qui leur soit propre, quelque chose pour marquer leur rupture avec le Sultanat de Delhi et avec les dynasties antérieures. Dans une région aussi riche en ressources et en styles architecturaux existants que notre royaume, cela s'est avéré plus facile que quiconque l'aurait imaginé."
 jnp_gangetic_plain:0 "Plaine du Gange"
 jnp_gangetic_plain_desc:0 "La plaine du Gange et de ses affluents est de bien des façons le cœur du nord de l'Inde. Extrêmement fertile et densément peuplée, cette région est la source d'une grande partie des biens manufacturés du sous-continent. Les nombreuses routes commerciales qui sillonnent la région transportent ensuite ces biens vers les endroits lointains qui les demandent, de la Perse à la Chine et finalement même à Cannor."
 jnp_hindusthani_classical_music:0 "Musique Classique Hindoustanie"
 jnp_hindusthani_classical_music_desc:0 "Peut-être la plus fine des formes d'art que notre État en est venu à patronner est la tradition de musique classique du nord de l'Inde. Nos Sultans ont eux-mêmes à la fois composé des Ragas et contribué directement au développement de ce genre musical."
 modernization_of_jaunpuri_army:0 "Modernisation de l'Armée"
 modernization_of_jaunpuri_army_desc:0 "Les anciennes coutumes et traditions nous retiennent. Réorganisons notre armée, créons de nouveaux systèmes de recrutement et engageons des instructeurs étrangers pour entraîner nos hommes de manière plus moderne. Jadis, les Purbias constituaient l'infanterie la plus efficace et moderne de l'Inde ; nous devons veiller à ce que cet ordre des choses soit restauré."
 jerusalem_ideas:0 "Idées de Jérusalem"
 jerusalem_ideas_start:0 "Traditions de Jérusalem"
 jerusalem_ideas_bonus:0 "Ambition de Jérusalem"
 crown_of_thorns:0 "Couronne d'Épines"
 crown_of_thorns_desc:0 "Le premier roi de Jérusalem refusa de porter une couronne d'or et d'être appelé roi au même endroit où le Christ porta une couronne faite d'épines."
 latin_patriarch:0 "Patriarche Latin"
 latin_patriarch_desc:0 "La Papauté veut installer un Patriarche à Jérusalem pour lui permettre d'exercer plus de contrôle sur les terres saintes. Cela fonctionne très bien pour nous car cela nous donne plus de contrôle sur la Papauté elle-même."
 frontier_state:0 "État de Frontière"
 frontier_state_desc:0 "Jérusalem a toujours été en première ligne de la Chrétienté contre les païens. Nous nous sommes habitués à être constamment en guerre et nos soldats sont constamment entraînés pour être prêts pour l'invasion ou la croisade."
 land_of_the_heathen:0 "Terre des Païens"
 land_of_the_heathen_desc:0 "La terre de Jérusalem est remplie de païens, nous devons corriger leur tort et les convertir à la seule vraie foi !"
 crusader_aristocracy:0 "Aristocratie Croisée"
 crusader_aristocracy_desc:0 "Les nobles de notre nation sont endurcis par les croisades et habitués à mener la charge contre les ennemis de l'Église. Cette expérience se voit clairement sur le champ de bataille."
 crusader_castles:0 "Châteaux des Croisés"
 crusader_castles_desc:0 "Plusieurs châteaux ont été construits dans toutes les terres saintes en préparation des guerres futures, nous sommes prêts à défendre au nom du Christ !"
 cosmopolitan_nobility:0 "Noblesse Cosmopolite"
 cosmopolitan_nobility_desc:0 "Nous ne sommes peut-être pas l'un des plus anciens royaumes, mais la plupart de notre noblesse vient de dynasties cosmopolites et ainsi nous avons des racines très profondes et des connexions avec Cannor quand il s'agit de questions de diplomatie."
 KHM_ideas:0 "Idées Khmères"
 KHM_ideas_start:0 "Traditions Khmères"
 KHM_ideas_bonus:0 "Ambition Khmère"
 preah_ko_preah_keo:0 "Preah Ko Preah Keo"
 preah_ko_preah_keo_desc:0 "Notre royaume fut jadis grand et notre capitale était l'envie de tous nos voisins. Puis les Thaïs vinrent et nous prirent tout. Le conte populaire du roi thaï et des jumeaux Preah Ko et Preah Keo garantit que notre peuple n'oublie jamais ce que nous avions et avons maintenant perdu."
 khm_theravada:0 "Bouddhisme Theravada"
 khm_theravada_desc:0 "Les traditions de l'ancien empire khmer ne nous seront plus d'aucune utilité. Notre peuple s'est de plus en plus tourné vers le Bouddhisme Theravada pratiqué par beaucoup de nos voisins et il est peut-être temps que l'État aussi embrasse pleinement cette religion."
 khm_cham_migration:0 "Migration Cham"
 khm_cham_migration_desc:0 "Le peuple cham, navigateur, a subi des pressions et beaucoup cherchent un nouveau foyer à l'étranger. Nous devrions accueillir ces marins et marchands habiles dans notre société afin de bénéficier de leur expertise."
 khm_river_trade:0 "Commerce Fluvial"
 khm_river_trade_desc:0 "Les rivières de nos terres fournissent un excellent moyen de transporter les divers biens rares qui peuvent être récoltés dans les régions forestières de notre pays vers les ports près des mers. Développons le commerce fluvial et regardons notre royaume prospérer."
 khm_european_mercenaries:0 "Mercenaires Cannoréens"
 khm_european_mercenaries_desc:0 "Les Cannoréens ont des armes et des tactiques qui ne ressemblent à rien de ce que nous avons vu. Invitons des mercenaires cannoréens dans notre pays pour protéger notre roi et pour introduire les armes à feu dans nos armées."
 khm_restore_angkor:0 "Restauration d'Angkor"
 khm_restore_angkor_desc:0 "Bien que la grande cité d'Angkor ne puisse jamais être la grande capitale qu'elle fut jadis, les souvenirs meurent difficilement. Notre royaume est un État très différent maintenant, mais en rénovant la cité, nous pouvons encore restaurer une partie de la fierté de notre peuple."
 khm_modern_navy:0 "Une Marine Khmère Moderne"
 khm_modern_navy_desc:0 "Nous ne pouvons pas permettre à d'autres de dominer les mers et de contrôler le commerce dont notre royaume dépend. Créons une force nouvelle et moderne capable d'affronter n'importe quel pirate ou marine rivale en Asie du Sud-Est."
 ZAZ_ideas:0 "Idées Zaporogues"
 ZAZ_ideas_start:0 "Traditions Zaporogues"
 ZAZ_ideas_bonus:0 "Ambition Zaporogue"
 zaz_fort_builders:0 "Bâtisseurs de Forts Rapides"
 zaz_fort_builders_desc:0 "Tout dans la société zaporogue tourne autour du militaire et le militaire est le principal métier de notre peuple. Toujours prêts à être en mouvement, que ce soit pour fuir un ennemi plus puissant, ou pour rapidement nous déplacer et revendiquer une meilleure terre, notre peuple a au fil du temps, et par nécessité, développé une capacité à toujours rester mobile. Certains construisent leurs murs hauts et épais, nous construisons nos forts rapidement."
 zaz_hetmanate:0 "Hetmanat"
 zaz_hetmanate_desc:0 "Tous seront égaux et aucun au-dessus d'aucun autre. Alors que Cannor se demande comment un État sans aristocrates peut exister, notre peuple jouit d'une liberté sans pareille."
 zaz_steppe_riders:0 "Cavaliers des Steppes"
 zaz_steppe_riders_desc:0 "La Steppe est un endroit particulier et traître pour vivre et quand il s'agit de mourir, la variété de choix est infinie quand vous êtes sans cheval. Quand vous entrez dans la Mer d'Herbe Infinie, votre cheval cesse d'être un animal ou une propriété, et devient véritablement une partie de vous. Tout comme votre corps ne peut survivre sans cœur ni foie, dans les steppes il ne survivra certainement pas sans cheval."
 zaz_cossack_hit_and_run:0 "Frappe et Fuite"
 zaz_cossack_hit_and_run_desc:0 "La steppe peut être séduisante avec ses aspirants conquérants. Comme un mirage, elle peut vous donner la fausse impression d'abondance et d'opportunité, mais seuls ceux qui connaissent bien cette terre peuvent jamais espérer y survivre. Dans nos steppes, c'est nous qui choisirons le moment de combattre."
 zaz_classy_diplomacy:0 "Diplomatie Brutale"
 zaz_classy_diplomacy_desc:0 "Bien que la qualité batte généralement la quantité, la quantité a aussi une qualité qui lui est propre. Notre peuple peut être un peu rude, ou plutôt quelque peu dépourvu de raffinement, mais personne ne devrait douter de sa capacité à s'exprimer douloureusement clairement."
 zaz_zaporzhian_tolerance:0 "Tolérance des Steppes"
 zaz_zaporzhian_tolerance_desc:0 "La steppe zaporogue est beaucoup de choses pour beaucoup de gens. Mais la seule chose qu'elle est pour tous est la promesse de liberté, sans égale dans le monde connu. Ici, il n'y a pas de nobles, d'église ou de rois qui règnent, et seulement Dieu et les cieux au-dessus de vous, aussi loin que l'œil peut voir."
 zaz_army_first:0 "L'Armée d'Abord"
 zaz_army_first_desc:0 "La plupart des pays lèvent des armées en recrutant des paysans, certains pays engagent des mercenaires pour mener leurs guerres à leur place. Notre État est notre armée."
 shan_ideas:0 "Idées Shan"
 shan_ideas_start:0 "Traditions Shan"
 shan_ideas_bonus:0 "Ambition Shan"
 shan_fortified_cities:0 "Cités Fortifiées"
 shan_fortified_cities_desc:0 "Quand d'autres peuples s'installèrent dans les collines, les Shan choisirent de construire des cités fortifiées dans les vallées. Depuis ces vallées, notre règne s'est étendu au loin et maintenant les peuples des collines sont nos sujets."
 shan_wet_rice:0 "Riziculture Irriguée"
 shan_wet_rice_desc:0 "La riziculture irriguée est le meilleur moyen de tirer le maximum des terres shan. Grâce à cette technique, les vallées shan peuvent soutenir une population bien plus grande qu'il ne serait autrement possible."
 sao_pha:0 "Sao Pha"
 sao_pha_desc:0 "Connus sous le nom de Saopha, ou seigneurs du ciel, les dirigeants shan et leurs vénérables dynasties commandent le respect de tous leurs sujets. Malgré cela, un dirigeant shan idéal ne devrait pas être distant de sa population et la tradition dicte que nos dirigeants parcourent la terre pour apprendre eux-mêmes les opinions de leurs sujets."
 shan_control_of_the_gem_trade:0 "Contrôle du Commerce de Gemmes"
 shan_control_of_the_gem_trade_desc:0 "De grandes quantités de rubis, d'ambre, de saphirs et de jade quittent ces terres chaque année pour les marchés exigeants de Chine et d'Inde. Nous devons protéger et contrôler ces caravanes et profiter de cet ancien commerce."
 shan_raiders:0 "Pillards"
 shan_raiders_desc:0 "À travers des guerres constantes entre les petits États et chefferies shan, nos guerriers sont devenus expérimentés et endurcis au combat. Pendant que nous nous battions entre nous, nos voisins sont devenus riches et faibles. S'unir pour piller les terres étrangères serait bien plus profitable que de continuer ces luttes internes."
 shan_chronicles:0 "Chroniques Shan"
 shan_chronicles_desc:0 "Traditionnellement, tout État shan d'importance garde ses propres archives et des chroniqueurs royaux ont suivi nos ancêtres aussi loin que le début de notre dynastie. Avec le temps, cependant, les chroniques vieillissent. En copiant et préservant les annales de nos prédécesseurs, nous nous assurons que rien n'est oublié."
 shan_expansionism:0 "Expansionnisme"
 shan_expansionism_desc:0 "À mesure que notre population grandit, les terres que nous contrôlons sont devenues trop rares pour bien la soutenir. Plutôt que de risquer une escalade de violence domestique alors que les ressources deviennent rares, nous devrions créer une armée plus grande et nous étendre aux dépens de nos voisins."
 settling_the_interior:0 "Coloniser l'Intérieur"
 settling_the_interior_desc:0 "Bien que nous ayons peuplé la côte et la région autour des rivières et des lacs depuis un certain temps, il y a encore de vastes terres à l'ouest qui attendent d'être colonisées par notre peuple. Nous devons nous assurer que c'est notre peuple qui fait siennes les terres qui attendent."
 CAN_ideas:0 "Idées Canadiennes"
 CAN_ideas_start:0 "Traditions Canadiennes"
 CAN_ideas_bonus:0 "Ambition Canadienne"
 singing_lumberjacks:0 "Bûcherons Chantants"
 singing_lumberjacks_desc:0 "Nos bûcherons ont de nombreuses traditions. L'une d'elles est leurs chansons légendaires, qui leur permettent de travailler plus efficacement et ainsi de produire plus de bois pour l'exportation. Le bois qu'ils produisent permet aussi à notre gouvernement de se procurer plus de bois à moindre prix, permettant à notre marine d'être plus grande et moins coûteuse."
 the_hudson_bay_company:0 "La Compagnie de la Baie d'Hudson"
 the_hudson_bay_company_desc:0 "La Compagnie de la Baie d'Hudson est peut-être l'aspect le plus important de notre histoire. Nos racines reposent dans une tradition marchande et nous devrions continuer à la soutenir en encourageant les gens à devenir marchands."
 the_maritimes:0 "Les Maritimes"
 the_maritimes_desc:0 "Les mers au large de notre côte orientale sont connues pour leurs tempêtes légendaires et leurs conditions brutales. Cela endurcit nos jeunes marins et produit une tradition d'excellence militaire navale."
 the_quebec_act:0 "L'Acte de Québec"
 the_quebec_act_desc:0 "L'Acte de Québec accorda de grandes libertés religieuses aux Catholiques romains intégrés à notre nation par la Conquête. Nous sommes un modèle de tolérance religieuse dans notre Nouveau Monde."
 legacy_of_the_empire:0 "Héritage de l'Empire"
 legacy_of_the_empire_desc:0 "Bien que nous soyons maintenant libres, nos liens avec notre ancienne mère patrie et ses dépendances sont encore forts. Cela donne à nos marchands un avantage pour amener les richesses d'Aelantir dans nos coffres."
 the_forests_of_canada:0 "Les Forêts du Canada"
 the_forests_of_canada_desc:0 "Les vastes forêts vierges trouvées dans notre nation permettent à notre gouvernement de se procurer le bois nécessaire pour construire des navires à un prix inférieur à celui des autres États. Nous pouvons construire plus de navires à moindre coût."
 QUE_ideas:0 "Idées Québécoises"
 QUE_ideas_start:0 "Traditions Québécoises"
 QUE_ideas_bonus:0 "Ambition Québécoise"
 coureurs_des_bois:0 "Coureurs des Bois"
 coureurs_des_bois_desc:0 "Les coureurs des bois sont légendaires ici et à l'étranger pour leur capacité à voyager sur de vastes distances dans le cœur du continent et à traiter avec les autochtones pour obtenir plus de fourrures. Bien qu'ils concurrencent les voyageurs officiels, ils permettent à plus des précieuses fourrures de notre terre d'atteindre le marché et d'être vendues."
 fortifications_of_quebec:0 "Fortifications de Québec"
 fortifications_of_quebec_desc:0 "Les vallées fluviales sont vitales pour notre État à la fois comme moyens de transport et car elles sont les foyers de nos communautés agricoles. Nous devons fortifier ces vallées afin de protéger notre peuple."
 the_seigneurial_system:0 "Le Système Seigneurial"
 the_seigneurial_system_desc:0 "Le système foncier de notre nation a été dominé par les seigneurs depuis les premières colonisations par nos ancêtres. Dirigeant un système de type féodal, ils sont devenus enracinés dans les politiques de notre nation et nous permettent d'extraire plus d'impôts du peuple."
 relations_with_natives:0 "Relations avec les Premières Nations"
 relations_with_natives_desc:0 "Nos fils ont épousé leurs filles et ainsi, nous sommes devenus un avec de nombreuses tribus autochtones. Nous devons maintenant maintenir ces relations, cela a poussé chacun de nos diplomates à faire le travail de plusieurs hommes."
 college_of_quebec:0 "Le Collège de Québec"
 college_of_quebec_desc:0 "Le collège de Québec fut le premier à être établi dans le Nouveau Monde en dehors du Mexique. La tradition d'apprentissage sauvegardée ici permet à notre nation d'être à la pointe du progrès technologique."
 commissions_for_noble_sons:0 "Commissions pour les Fils Nobles"
 commissions_for_noble_sons_desc:0 "Les Ordres Saints de l'église ne sont pas intéressés à accueillir les fils cadets de la noblesse, ainsi ils sont souvent attirés par une carrière militaire. C'est bien, car cela garantit que nous avons toujours des généraux prêts et capables de mener nos armées."
 jesuit_missions:0 "Missions Jésuites"
 jesuit_missions_desc:0 "Les divers ordres religieux, mais les Jésuites en particulier, ont fait leur devoir d'apporter la vraie foi aux païens autour de nous. Nous considérons comme notre devoir, étant une nation de fidèles, de nous assurer qu'ils aient toute opportunité de mener à bien leur travail avec succès."
 MEX_ideas:0 "Idées Mexicaines"
 MEX_ideas_start:0 "Traditions Mexicaines"
 MEX_ideas_bonus:0 "Ambition Mexicaine"
 rebuilding_mexico:0 "Reconstruire le Mexique"
 rebuilding_mexico_desc:0 "Cortés veilla à ce que les temples aux dieux païens des Aztèques soient détruits durant la conquête de ces terres. Il nous incombe de convertir les ruines des temples en maisons de culte pour Dieu. Les matériaux de construction étant déjà présents, le travail sera sûrement moins coûteux."
 the_republic_of_indians:0 "La République des Indiens"
 the_republic_of_indians_desc:0 "La République des Indiens fut le produit d'une étude systématique des cultures et langues autochtones. Nous réalisons que nous gagnerons plus à tolérer la diversité culturelle de cette terre qu'à imposer les traditions cannoriennes à la population."
 peace_by_purchase:0 "La Paix par l'Achat"
 peace_by_purchase_desc:0 "Les terres désertiques sauvages et indomptées au nord sont le foyer de clans farouchement indépendants et militairement habiles. Nous pouvons dépenser beaucoup d'efforts, de temps et de richesses à essayer de les écraser avec nos puissantes armées, mais ne serait-il pas plus sage d'acheter simplement leur coopération et de les assimiler pacifiquement ?"
 casa_de_las_campanas:0 "Casa de las Campanas"
 casa_de_las_campanas_desc:0 "Le Mexique est une terre de premières. La Casa de las Campanas fut la première presse à imprimer du Nouveau Monde, nous permettant de diffuser plus facilement des idées nouvelles."
 repartimiento:0 "Repartimiento"
 repartimiento_desc:0 "Modelé sur la corvée de France, le repartimiento est un système où nous recevons de la main-d'œuvre de la population paysanne du Mexique. Comme cela fait partie de leur devoir, nous pouvons ne leur payer que peu ou rien pour leur travail pendant cette période, ce qui augmente nos profits de production."
 heroes_of_the_revolution:0 "Héros de la Révolution"
 heroes_of_the_revolution_desc:0 "Durant notre lutte pour l'indépendance, nos généraux se sont distingués admirablement sur le champ de bataille. Les tactiques de choc utilisées par eux dans notre lutte pour la liberté ont été étudiées par nos généraux, qui sont maintenant plus adeptes dans ce domaine de la guerre."
 grito_de_delores:0 "Grito de Dolores"
 grito_de_delores_desc:0 "Mes enfants, vous libérerez-vous ? Récupérerez-vous les terres volées il y a trois cents ans à vos ancêtres par les Espagnols haïs ? Nous devons agir immédiatement... Défendrez-vous votre religion et vos droits en vrais patriotes ? Vive Notre-Dame de Guadalupe ! Mort au mauvais gouvernement ! Mort aux gachupines !"
 TRA_ideas:0 "Idées Transylvaines"
 TRA_ideas_start:0 "Traditions Transylvaines"
 TRA_ideas_bonus:0 "Ambition Transylvaine"
 unio_trium_nationum:0 "Unio Trium Nationum"
 unio_trium_nationum_desc:0 "L'Unio Trium Nationum était une alliance établie en 1438 par les trois États transylvains. La noblesse hongroise, les marchands saxons et les Sicules militaires libres. L'union était un pacte dirigé contre la paysannerie, dont beaucoup étaient roumains. Cette alliance aurait un impact durable et inattendu sur l'histoire de notre peuple."
 torda_salt_mines:0 "Mines de Sel de Torda"
 torda_salt_mines_desc:0 "Dans les riches mines de Torda, le sel fut extrait pour la première fois durant l'Antiquité. La mine a depuis produit du sel de table et apporté une grande richesse à la région grâce à la production de ce bien commercial très prisé. Nous devons nous assurer de faire plus usage de cette mine au bénéfice de la Transylvanie."
 transylvanian_saxons:0 "Saxons de Transylvanie"
 transylvanian_saxons_desc:0 "Au XIIe siècle, le Roi hongrois Géza II invita les Allemands à s'installer et défendre la région transylvaine relativement peu peuplée. Ces « Saxons de Transylvanie » développèrent rapidement leurs régions, rendirent le sol arable, améliorèrent les méthodes agricoles et exploitèrent les zones contenant des métaux précieux et des gisements de sel."
 decree_of_torda:0 "Décret de Torda"
 decree_of_torda_desc:0 "Le Roi Louis Ier de Hongrie séjourna brièvement en Transylvanie et à la demande des nobles locaux émit un décret accordant aux nobles transylvains des privilèges supplémentaires en leur permettant de lier la paysannerie roumaine à leurs terres."
 patent_of_toleration:0 "Édit de Tolérance"
 patent_of_toleration_desc:0 "L'Édit de Torda, aussi connu comme l'« Édit de Tolérance », fut l'une des premières tentatives de garantir la liberté religieuse en Cannor, après le début de la Réforme. L'église Unitarienne Réformée suivit la notion de tolérance religieuse établie par cet Édit."
 unitarian_zeal:0 "Zèle Unitarien"
 unitarian_zeal_desc:0 "L'église Unitarienne est un mouvement de Réforme commencé en même temps en Transylvanie et en Pologne. L'adoption de cette nouvelle branche de la Réformation progresse très rapidement dans nos terres, surtout après l'Édit de Tolérance."
 anti_habsburg_policies:0 "Politiques Anti-Habsbourg"
 anti_habsburg_policies_desc:0 "Georges Ier Rákóczi, prince de Transylvanie, essaya de renforcer sa position contre les prétendants rivaux aux terres transylvaines, les Habsbourg, en rejoignant les Suédois dans la Guerre de Trente Ans contre l'Empereur autrichien d'Anbennar. Il occupa avec succès la Haute-Hongrie et assiégeait Brno quand le sultan ottoman lui ordonna de cesser les hostilités contre les Habsbourg."
 SUK_ideas:0 "Idées de Sukhothai"
 SUK_ideas_start:0 "Traditions de Sukhothai"
 SUK_ideas_bonus:0 "Ambition de Sukhothai"
 birthplace_of_a_culture:0 "Berceau d'une Culture"
 birthplace_of_a_culture_desc:0 "Sukhothai pourrait être considéré comme le premier royaume thaï indépendant. Sri Indraditya et son frère auraient pris la cité des mains des Mon en 1239 ; de là, le royaume s'étendit aussi loin au nord que Luang Prabang et aussi loin au sud que Chaiya."
 akson_thai:0 "Akson Thai"
 akson_thai_desc:0 "Originellement basée sur l'ancien alphabet khmer, l'écriture thaïe serait devenue distincte durant le règne de Ram Khamhaeng. Avoir une langue écrite unique a aidé notre peuple à se développer comme culture unique."
 sawankalok_ware:0 "Céramique de Sawankalok"
 sawankalok_ware_desc:0 "Le Roi Ram Khamhaeng est crédité d'avoir apporté les compétences de la céramique de Chine et d'avoir posé les fondations d'une industrie de céramique solide dans le Royaume de Sukhothai. En conséquence, Sukhothai a été l'un des principaux exportateurs de céramique connue sous le nom de « céramique de Sawankalok » vers des régions aussi lointaines que le Japon et la Chine. Durant le règne de Khamhaeng, ce commerce était la principale source de revenus du royaume."
 wat_si_sawai:0 "Wat Si Sawai"
 wat_si_sawai_desc:0 "Sukhothai est connue pour ses nombreux grands temples tels que le Wat Si Sawai, la foi de notre peuple est forte."
 father_governs_children:0 "Le Père Gouverne les Enfants"
 father_governs_children_desc:0 "Les rois de Sukhothai sont renommés pour leur connexion étroite avec l'homme du commun. Que notre peuple vive libre et heureux sous la lumière guide de leurs souverains majestueux et célestes."
 ramkhamhaeng_stele:0 "Stèle de Ramkhamhaeng"
 ramkhamhaeng_stele_desc:0 "La majeure partie de l'histoire du royaume de Sukhothai primitif provient des inscriptions sur la Stèle de Ramkhamheang ; tandis que nos voisins peuvent essayer de prétendre que cette pièce sacrée du patrimoine n'est qu'une forgerie, ils ne sont que des fous. La Stèle de Ramkhamhaeng est une pièce sacrée du patrimoine et une qui prouve certainement notre place dans l'histoire."
 suk_war_elephants:0 "Éléphants de Guerre"
 suk_war_elephants_desc:0 "Les Éléphants de Guerre dominaient les champs de bataille de la région du Nusantara ; habituellement, les vainqueurs des guerres sont décidés simplement par qui en a le plus. Heureusement, notre nation a longtemps eu une histoire de puissants Éléphants de Guerre, les bêtes fournissant une grande aide durant les conquêtes de Ramkhamhaeng."
 chinese_ideas:0 "Idées Chinoises"
 chinese_ideas_start:0 "Traditions Chinoises"
 chinese_ideas_bonus:0 "Ambition Chinoise"
 keju_examination:0 "L'Examen Keju"
 keju_examination_desc:0 "L'Examen Impérial Keju est un moyen efficace de promouvoir des hommes sages à notre cour pour servir notre nation. Nos ancêtres l'utilisent depuis des siècles et nous serions imprudents de ne pas adopter ce système nous-mêmes."
 scholar_gentry:0 "Gentry Lettrée"
 scholar_gentry_desc:0 "La gentry lettrée est composée de gentilshommes confucéens hautement éduqués et est le pilier de notre nation. Ces hommes ne sont pas seulement moralement exceptionnels mais aussi des maîtres inégalés de la politique et de l'administration."
 order_of_four_occupations:0 "Ordre des Quatre Occupations"
 order_of_four_occupations_desc:0 "La Gentry, la Paysannerie, les Artisans et les Marchands sont les quatre classes de base qui sont essentielles pour maintenir une société correctement ordonnée. En renforçant l'ordre de ces classes, nous pouvons nous assurer que notre pays peut vivre en harmonie et prospérité."
 nation_of_rites_and_etiquette:0 "Nation de Rites et d'Étiquettes"
 nation_of_rites_and_etiquette_desc:0 "L'Empire du Milieu est la seule vraie civilisation au monde. La chose clé qui nous rend ainsi est les étiquettes et les rites de nos ancêtres. Tant que nous maintiendrons correctement les cérémonies et les rites, les cieux seront satisfaits et notre destin sera assuré."
 firearm_training:0 "Entraînement aux Armes à Feu"
 firearm_training_desc:0 "Bien que la poudre à canon n'ait pas été inventée originellement pour faire des armes, il a été clairement prouvé que les armes à feu ont leur utilité. Nous devrions équiper et entraîner nos troupes avec des armes à feu et former une armée moderne invincible."
 son_of_heaven:0 "Fils du Ciel"
 son_of_heaven_desc:0 "Notre Empereur est le Fils du Ciel, l'homme qui détient le mandat céleste ; ainsi nous l'affirmons, et ainsi notre peuple le croit."
 middle_kingdom:0 "Empire du Milieu"
 middle_kingdom_desc:0 "Zhongguo, l'Empire du Milieu, est plus qu'un nom ; il reflète la réputation extraordinaire de notre civilisation unique ; tant que nous serons vus comme l'Empire du Milieu, les étrangers nous respecteront et écouteront ce que nous avons à dire."
 nine_garrisons_of_the_great_wall:0 "Neuf Garnisons de la Grande Muraille"
 nine_garrisons_of_the_great_wall_desc:0 "Pour nous défendre contre les barbares vicieux, simplement réparer la Grande Muraille elle-même ne suffira pas. Les Neuf Garnisons sont des villes de garnison militarisées le long de la Muraille qui non seulement aideront à défendre les passes importantes mais amélioreront aussi la situation logistique générale de la frontière nord."
 revived_three_grand_divisions:0 "Raviver les Trois Grandes Divisions"
 revived_three_grand_divisions_desc:0 "Dans les forces spéciales d'élite fondées par l'Empereur Yongle, la Division du Moteur Divin se spécialisait dans les armes à feu, la Division des Trois Mille dans le combat monté et la Division des Cinq Camps dans l'entraînement de l'infanterie pour exécuter des manœuvres tactiques. Ce système stagna dans les années 1450 mais maintenant le temps est venu de le raviver. Les forces d'élite de notre armée impériale sont vitales si nous devons résister aux barbares qui nous entourent."
 single_whip_law:0 "Loi du Fouet Unique"
 single_whip_law_desc:0 "La collecte des impôts peut sembler une chose facile mais pour un empire énorme comme le nôtre, c'est en fait une tâche extrêmement compliquée. En convertissant la plupart des obligations envers le gouvernement central, des impôts par tête aux obligations de travail de la paysannerie ou aux tributs des fonctionnaires locaux, en un seul paiement en argent à un niveau basé sur la population et les terres cultivées dans chaque préfecture, l'effort nécessaire pour la collecte des impôts est réduit et nos revenus augmenteront."
 the_red_cannon:0 "Le Canon Rouge"
 the_red_cannon_desc:0 "Les barbares aux cheveux roux de Cannor sont peut-être non civilisés et mal élevés, mais ils savent comment fabriquer de l'artillerie et des armes à feu de bonne qualité. Importer et dupliquer leurs armes améliorera notre armée et la rendra bien plus efficace contre les envahisseurs barbares."
 WBG_ideas:0 "Idées de Wurtzbourg"
 WBG_ideas_start:0 "Traditions de Wurtzbourg"
 WBG_ideas_bonus:0 "Ambition de Wurtzbourg"
 legacy_of_imperial_diets:0 "Héritage des Diètes Impériales"
 legacy_of_imperial_diets_desc:0 "Dans les temps passés, l'évêque de Wurtzbourg accueillit de nombreuses Diètes Impériales dans sa cité et servit de facilitateur entre l'Empereur et ses sujets. Nous devrions raviver cette tradition et chercher ceux qui écouteraient nos conseils."
 duke_in_franconia:0 "Duc en Franconie"
 duke_in_franconia_desc:0 "L'Empereur Barberousse donna à l'évêque de Wurtzbourg le titre ducal. Bien qu'il ne lui ait donné aucun pouvoir sur les terres franconiennes, nous pouvons utiliser ce titre pour élever l'évêque au-dessus de tous les autres."
 franconian_circle:0 "Cercle Franconien"
 franconian_circle_desc:0 "Le cercle franconien est le foyer de nombreux chevaliers féroces ; si nous leur offrons une place dans nos armées, notre cavalerie sera imbattable !"
 independent_counts:0 "Comtes Indépendants"
 independent_counts_desc:0 "Nous partageons nos terres avec plusieurs comtes qui sont indépendants. Puisque nous n'avons aucun pouvoir sur eux, nous devrions travailler avec eux pour trouver un compromis et prévenir les conflits entre nous."
 cassation_of_monasteries:0 "Fermeture des Monastères"
 cassation_of_monasteries_desc:0 "Il y a de nombreux monastères dans nos terres qui sont presque vides ; si nous les fermons et prenons leurs terres, nous gagnerons une source de revenus précieuse."
 franconian_wine:0 "Vin Franconien"
 franconian_wine_desc:0 "Notre vin est l'un des meilleurs de l'Empire ; nous devrions soutenir nos viticulteurs en leur fournissant assez de terres à travailler."
 baroque_artists:0 "Artistes Baroques"
 baroque_artists_desc:0 "Nous construisons une magnifique résidence à Wurtzbourg ; engageons les meilleurs architectes et artistes pour la rendre plus grande que tout autre palais construit pour un évêque dans l'Empire d'Anbennar."
 CEY_ideas:0 "Idées Cinghalaises"
 CEY_ideas_start:0 "Traditions Cinghalaises"
 CEY_ideas_bonus:0 "Ambition Cinghalaise"
 gabadagam:0 "Gabadagam"
 gabadagam_desc:0 "Le troc est encore le moyen d'échange le plus courant sur notre île, mais les villages Gabadagam contrôlés par l'État sont tenus de faire leurs paiements de revenus en espèces. Comme l'État est le plus grand propriétaire terrien et le détenteur de la plupart des villages les plus riches, cela stimule le développement et la monétisation de notre économie."
 sinhalese_sandesas:0 "Sandesas Cinghalais"
 sinhalese_sandesas_desc:0 "Les poèmes Sandesa tournent généralement autour d'un messager, souvent un oiseau, apportant des nouvelles du sort d'un roi ou d'un autre héros à une divinité. Depuis les jours du royaume de Gampola, ce genre a prospéré sur notre île. Nous devons continuer à patronner et développer le genre afin qu'il puisse atteindre son plein potentiel."
 pearl_of_the_indian_ocean:0 "Perle de l'Océan Indien"
 pearl_of_the_indian_ocean_desc:0 "Pendant des centaines d'années, notre île a été une grande source de Perles de haute qualité. La recherche de ce produit prestigieux a amené des marchands de tout l'Océan Indien et du monde chinois sur nos rivages."
 cey_centre_of_learning:0 "Centre d'Apprentissage"
 cey_centre_of_learning_desc:0 "Au fil des siècles, le Bouddhisme est devenu assez marginalisé dans les régions des pèlerinages bouddhistes classiques et des universités du nord de l'Inde. En tant que lieu de la dent sacrée et pays avec l'une des traditions bouddhistes les plus anciennes et les plus fortes, notre île est l'un des principaux centres d'apprentissage bouddhiste. Cette position peut être très utile lorsqu'on traite avec les nombreux princes et rois du sud de Haless qui sont soit eux-mêmes bouddhistes, soit ont des sujets bouddhistes."
 cey_cinnamon:0 "Développer le Commerce de la Cannelle"
 cey_cinnamon_desc:0 "La vraie Cannelle ne pousse que sur notre île et est très recherchée dans le monde entier. Nous devons agir pour développer la production et la distribution de Cannelle afin qu'elle puisse devenir une source majeure de revenus pour notre État."
 cey_growth_of_new_castes:0 "Croissance de Nouvelles Castes"
 cey_growth_of_new_castes_desc:0 "Le monde du sud de Haless est un endroit en constante évolution ; l'arrivée de Chrétiens et d'Arabes ainsi que la conquête musulmane d'une grande partie de l'Inde a résulté en un afflux de nouvelles personnes sur notre île. Les nouvelles castes formées par ces nouveaux venus telles que les Salagamas, Duravas ou Karavas sont toutes venues à s'occuper des secteurs nouveaux et en développement de notre économie plutôt que de l'agriculture traditionnelle qui occupe la plupart de notre population."
 sinhalese_guerilla_warfare:0 "Guérilla Cinghalaise"
 sinhalese_guerilla_warfare_desc:0 "Notre île est bien adaptée à la guérilla. En adoptant les armes occidentales et en développant les tactiques cinghalaises traditionnelles, nous pouvons faire de notre pays un cauchemar à envahir et à contrôler."
 CND_ideas:0 "Idées Candarides"
 CND_ideas_start:0 "Traditions Candarides"
 CND_ideas_bonus:0 "Ambition Candaride"
 genoese_connections:0 "Connexions Génoises"
 genoese_connections_desc:0 "Les Génois ont établi un vaste réseau commercial de colonies dans le Divenhal et les mers Noires. En maintenant des relations étroites avec la République de Gênes, nous serons en mesure d'avoir un accès facile aux marchés cannoréens."
 candarid_literature:0 "Réforme Littéraire Candaride"
 candarid_literature_desc:0 "Grâce au soutien de nos Beys, de nombreuses œuvres littéraires turques ont émergé, comme le Kitâb Miftâh-ün-Nur, un livre sur de nombreuses maladies, particulièrement celles de l'œil. Historiquement, la dynastie Candar a contribué au développement du turc comme langue littéraire et était renommée pour son mécénat envers les hommes de lettres."
 ismail_bey_complex:0 "Complexe d'Ismail Bey"
 ismail_bey_complex_desc:0 "Construit en 1451 sur une butte le long de la rivière, le complexe d'Ismail Bey comprenait plusieurs bâtiments comme un hospice, une mosquée, un mausolée, un collège, un imaret et des bains. On dit que vues de loin, les formes géométriques sur la porte du mausolée reflétaient le visage d'Ismail Bey."
 anatolian_center_of_learning:0 "Centre Anatolien d'Apprentissage"
 anatolian_center_of_learning_desc:0 "Notre soutien aux divers scientifiques et artistes à la cour porte ses fruits alors que nos terres sont devenues un centre d'apprentissage en Anatolie. De nombreux Émirs et Beys sont envieux de nos réalisations en science, architecture et art."
 candar_corps:0 "Héritage du Corps de Candar"
 candar_corps_desc:0 "Assigné à garder les palais et les chefs d'État, le Corps de Candar consistait en des hommes spécialement entraînés. L'un d'eux était Semseddin Yaman Candar, qui servit dans l'armée du Sultan Seldjoukide Masud II et fut récompensé par la région d'Eflani pour ses services, où il fonda la principauté de Candar."
 sinop_shipyard:0 "Chantier Naval de Sinop"
 sinop_shipyard_desc:0 "Pour défendre nos intérêts autour de la Mer Noire et dominer le commerce maritime, nous devons agrandir notre principal chantier naval afin d'avoir les navires pour le faire. Historiquement, au XVIe siècle, l'ancienne tradition de construction navale de Sinop fut promue en une industrie à grande échelle, transformant la cité en un centre florissant de commerce et de construction navale. En 1571 seulement, 25 grands navires de guerre furent produits dans le chantier naval de Sinop."
 kure_copper_mine:0 "Mine de Cuivre de Küre"
 kure_copper_mine_desc:0 "Les mines de cuivre de Küre sont connues pour leurs gisements de cuivre de qualité, prises une fois par les héritiers d'Osman Bey, maintenant elles nous appartiennent de nouveau. Nous devons nous assurer de faire plus usage de ces mines au bénéfice de notre peuple."
 BRZ_ideas:0 "Idées Brésiliennes"
 BRZ_ideas_start:0 "Traditions Brésiliennes"
 BRZ_ideas_bonus:0 "Ambition Brésilienne"
 governorate_general:0 "Gouvernorat Général"
 governorate_general_desc:0 "L'arrivée des gouverneurs généraux améliora grandement l'administration de notre nation et leurs politiques fournissent encore un exemple de comment tirer le maximum d'impôts de notre population."
 research_of_nassau:0 "Recherches de Jean de Nassau"
 research_of_nassau_desc:0 "Jean de Nassau, un gouverneur de l'une des colonies établies au Brésil, fit venir les meilleurs botanistes et scientifiques de Cannor pour aider à faire avancer nos connaissances en étudiant notre flore et notre faune."
 mines_of_minas_gerais:0 "Mines du Minas Gerais"
 mines_of_minas_gerais_desc:0 "L'or des mines du Minas Gerais est suffisant pour défier celui de Saba, et avec le temps nos administrateurs ont appris à gérer les prix gonflés qui accompagnent ce don."
 halting_foreign_incursions:0 "Stopper les Incursions Étrangères"
 halting_foreign_incursions_desc:0 "De nombreuses nations étrangères ont tenté d'établir leurs propres colonies sur nos belles côtes. Nos braves soldats ont acquis beaucoup d'expérience à les repousser et sont prêts à le faire encore si nécessaire."
 entradas_and_bandeiras:0 "Entradas et Bandeiras"
 entradas_and_bandeiras_desc:0 "Nos intrépides explorateurs ont fait de grands efforts pour explorer les profondeurs du continent. Leurs cartes et relevés nous permettront d'étendre plus proprement notre influence jusqu'à nos frontières légitimes."
 inconfidencia_mineira:0 "Inconfidência Mineira"
 inconfidencia_mineira_desc:0 "Les membres du soulèvement déjoué de l'Inconfidência Mineira sont rappelés avec tendresse par tous comme des héros nationaux et peuvent être désignés comme des exemples guides dans les moments difficiles."
 old_seat_of_the_empire:0 "Siège de l'Empire"
 old_seat_of_the_empire_desc:0 "Quand nos anciens maîtres coloniaux furent exilés de leur patrie, ils choisirent notre nation comme leur siège. Avec les grands palais qui furent construits vient une plus grande légitimité et le droit de forger notre propre empire."
 vindhyan_ideas:0 "Idées Vindhyennes"
 vindhyan_ideas_start:0 "Traditions Vindhyennes"
 vindhyan_ideas_bonus:0 "Ambition Vindhyenne"
 bundelkhandi_rajput_connections:0 "Connexions Rajputs"
 bundelkhandi_rajput_connections_desc:0 "Avant la conquête islamique, le nord de l'Inde était dominé par d'énormes royaumes et fédérations Rajputs et bien que peu de tels royaumes notables subsistent maintenant en dehors du Rajputana, les Rajputs sont encore une force avec laquelle compter parmi la noblesse du nord de l'Inde. La classe dirigeante de notre royaume ne fait pas exception à cette règle et bien que peu considéreraient le Bundelkhand ou le Baghelkhand comme faisant partie du Rajputana, notre héritage Rajput est encore chéri et les liens avec d'autres dynasties Rajputs en Inde sont encore forts."
 forts_of_bundelkhand:0 "Forts des Vindhyas"
 forts_of_bundelkhand_desc:0 "Nos ancêtres savaient que c'est une région naturellement bien adaptée aux fortifications et dans le Bundelkhand ou le Baghelkhand vous trouverez un fort sur chaque colline. Nous devons nous efforcer de maintenir cet héritage en construisant et réparant les nombreux forts de nos terres, des énormes fortifications comme Gwalior jusqu'au dernier petit fort de colline de la jungle."
 bundelkhandi_sacred_land:0 "Une Terre Sacrée"
 bundelkhandi_sacred_land_desc:0 "Bien que négligé depuis la conquête musulmane, le complexe de temples de Khajuraho avec ses plus de 80 temples témoigne de la piété des dirigeants qui nous ont précédés. Nous devons nous efforcer d'imiter nos prédécesseurs et construire de grands temples dans nos terres. Que les pèlerins qui cherchent nos terres trouvent les temples impressionnants qu'ils méritent à leurs destinations plutôt que des sanctuaires négligés."
 bundeli_kalam:0 "Bundeli Kalam"
 bundeli_kalam_desc:0 "Les Dirigeants de ces terres ont toujours été des mécènes des arts et de la littérature. Patronnons les artistes et écrivains locaux pour la plus grande gloire de notre dynastie."
 untamed_bundelkhand:0 "Terres Indomptées"
 untamed_bundelkhand_desc:0 "C'est une terre de collines et de forêts. Malgré la proximité de la plaine du Gange et de ses vastes cités, nos terres abritent des tigres sauvages et des chefferies tribales ainsi que les forts et cités de notre royaume. Au fil des années, cela a permis à notre État de rester plus ou moins indépendant même lorsqu'il était bordé par des voisins forts et apparemment supérieurs."
 bundelkhandi_diamonds:0 "Mines de Diamants"
 bundelkhandi_diamonds_desc:0 "Nous avons entendu des contes de grandes richesses cachées dans ces terres sous forme de pierres précieuses. Nous devons rechercher la source de ces rumeurs et créer des mines appropriées dans lesquelles ces diamants peuvent être méthodiquement extraits de la terre."
 candella_legacy:0 "Héritage Candella"
 candella_legacy_desc:0 "Sous la dynastie Candella, le Bundelkhand, ou Jejakabhukti, était autrefois le centre d'un grand royaume du nord de l'Inde qui s'étendait le long des Vindhyas au sud jusqu'à et incluant la majeure partie de la plaine centrale du Gange. Certains ont sûrement oublié mais nous n'oublierons jamais ; reprenons les titres de nos ancêtres et assurons-nous que le monde connaisse notre place légitime."
 kurdish_ideas:0 "Idées Kurdes"
 kurdish_ideas_start:0 "Traditions Kurdes"
 kurdish_ideas_bonus:0 "Ambition Kurde"
 kurdish_warriors:0 "Guerriers des Montagnes"
 kurdish_warriors_desc:0 "Même si nous avons l'habitude de nomadiser dans les plaines, nous ne sommes jamais loin de nos chères montagnes. Là, nous trouvons toujours un refuge, et là nous combattons le plus durement en temps de guerre. Aussi loin que nous nous souvenions, jamais un envahisseur n'a traversé nos terres sans s'en repentir."
 kurdish_tribes:0 "Tribus Kurdes"
 kurdish_tribes_desc:0 "La société kurde est fortement influencée par le tribalisme. Un bon dirigeant kurde conclut des accords avec les diverses tribus et clans car ils sont vitaux pour notre succès militaire."
 kurdish_diplomacy:0 "Diplomatie Active"
 kurdish_diplomacy_desc:0 "Entourées de plus grands ennemis, les principautés kurdes ont toujours dû maintenir une politique étrangère active dans toutes les directions. Certains appelleraient cela jouer sur les deux tableaux, nous appelons cela la survie."
 kurdish_mercenaries:0 "Mercenaires Kurdes"
 kurdish_mercenaries_desc:0 "Les Mercenaires Kurdes ont servi comme irréguliers dans les armées des puissances environnantes pendant des siècles ; si le besoin s'en fait sentir, nous ne manquerons jamais de guerriers."
 gorani_literature:0 "Littérature Gorani"
 gorani_literature_desc:0 "Patronnons la poésie et la littérature dans les langues du peuple kurde telles que le sorani ou le gorani. C'est notre devoir de nous assurer que ces langues survivent et se développent."
 legacy_of_the_kurdish_dynasties:0 "Héritage des Dynasties Kurdes"
 legacy_of_the_kurdish_dynasties_desc:0 "Au fil des siècles, il y a eu de nombreux États et dynasties kurdes dans cette région. Cultivons nos liens avec ces ancêtres et créons une culture de cour basée sur leurs traditions plutôt que d'essayer d'imiter nos voisins turcs et persans."
 li_gora_gawiri_kurd_misilman:0 "Li Gora Gawirî Kurd Misilman e"
 li_gora_gawiri_kurd_misilman_desc:0 "« Comparé à l'infidèle, le Kurde est un Musulman ». En raison de la vie dans une région religieusement très mixte avec de forts mouvements chiites et soufis ainsi qu'une communauté yézidie florissante, les dirigeants kurdes ont une tradition de pragmatisme en matière de religion d'État et en conséquence du maintien de cet héritage, notre État a moins de problèmes avec les tensions religieuses."
 CAB_ideas:0 "Idées Caribes"
 CAB_ideas_start:0 "Traditions Caribes"
 CAB_ideas_bonus:0 "Ambition Caribe"
 cab_river_trade:0 "Commerce Fluvial"
 cab_river_trade_desc:0 "La richesse de l'Orénoque et de ses nombreux affluents a toujours été ce qui nourrit notre peuple. Embrassons le commerce fluvial et faisons ce que nous pouvons pour protéger les nombreux marchands qui voyagent le long de la côte jusqu'à l'embouchure du grand fleuve afin que nous ne manquions jamais des beaux produits qu'ils nous apportent."
 cab_poison_warfare:0 "Guerre Empoisonnée"
 cab_poison_warfare_desc:0 "Bien que nous puissions manquer des armes plus sophistiquées de certains de nos voisins, notre peuple connaît ces terres et où les nombreux poisons que nous utilisons pour la chasse et la guerre peuvent être trouvés. Une flèche empoisonnée peut être tout aussi mortelle qu'un tir de mousquet ; assurons-nous donc de toujours avoir cette arme disponible pour nos guerriers."
 cab_resistance_to_the_pailantipo:0 "Résistance aux Pailanti'po"
 cab_resistance_to_the_pailantipo_desc:0 "De contrées lointaines, les Pailanti'po sont venus en quête de richesses le long de nos côtes, remontant les fleuves autour desquels nous vivons. Ces étrangers n'ont d'autre intention que de réduire notre peuple en esclavage et de piller nos richesses. Nous devons faire preuve de détermination dans notre résistance contre les Pailanti'po, ou faire face à l'extermination de notre peuple."
 cab_rainforests_of_guyana:0 "Forêts pluviales de Guyane"
 cab_rainforests_of_guyana_desc:0 "Les forêts pluviales de Guyane regorgent de vie. Outre les esprits Imawale des forêts, jaguars, anacondas, tarentules et une myriade d'autres animaux vivent parmi nous ; pour qui les connaît, ils ne représentent guère de danger direct. Pour un envahisseur, cependant, les forêts pluviales de Guyane peuvent sembler une forteresse, et les animaux sauvages ses défenseurs."
 cab_carib_seafaring:0 "Navigateurs Caraïbes"
 cab_carib_seafaring_desc:0 "Il y a bien des siècles, nos ancêtres entreprirent un grand voyage pour coloniser les îles des Caraïbes. Embrassons cet héritage et tentons de retrouver nos parents perdus."
 cab_religious_syncretism:0 "Syncrétisme religieux"
 cab_religious_syncretism_desc:0 "Les représentants de dieux lointains foulent désormais nos terres, et nombre de leurs paroles sont à la fois justes et convaincantes. Abandonner entièrement les dieux anciens ne semble guère sage, cependant, et beaucoup parmi notre peuple ont déjà commencé à vénérer le nouveau dieu aux côtés des anciens."
 cab_integrate_the_garifuna_returners:0 "Intégrer les Garifunas"
 cab_integrate_the_garifuna_returners_desc:0 "Nombre de nos parents éloignés des îles reviennent sur le continent. Accueillons-les, ainsi que tous ceux qui chercheraient une nouvelle vie sur la terre ferme, au sein de notre société."
 BEN_ideas:0 "Idées béninoises"
 BEN_ideas_start:0 "Traditions béninoises"
 BEN_ideas_bonus:0 "Ambition béninoise"
 ben_curb_the_uzama:0 "Brider les Uzama"
 ben_curb_the_uzama_desc:0 "Durant son règne, le roi Ewuare le Grand a réformé le gouvernement du Bénin, révoquant le droit des chefs locaux, les Uzama, de désigner un roi de leur choix, pour le remplacer par un système de primogéniture, soit l'héritage par le fils aîné."
 ben_isiatua:0 "Isiatua"
 ben_isiatua_desc:0 "Les guerres menées par le Bénin tournent principalement autour des sièges. La stratégie consistant à détruire ou couper les approvisionnements en nourriture et en eau de l'ennemi pour forcer une reddition est un élément crucial de l'art de la guerre béninois."
 ben_appointment_of_the_onotueyevbo:0 "Nomination des Onotueyevbo"
 ben_appointment_of_the_onotueyevbo_desc:0 "Les Onotueyevbo sont des représentants du roi qui servent de relais judiciaires entre le souverain et les villages. Ils sont également chargés de collecter le tribut."
 ben_the_walls_of_benin:0 "Les murailles du Bénin"
 ben_the_walls_of_benin_desc:0 "Le Bénin s'enorgueillit de grandes fortifications : les murailles de la cité de Bénin sont les deuxièmes plus vastes au monde, et le réseau de remparts entourant les domaines à l'extérieur de la cité constitue l'ouvrage de terrassement le plus étendu au monde."
 ben_guilds:0 "Guildes du Bénin"
 ben_guilds_desc:0 "Un système organisé de guildes forme une partie de l'ossature économique du royaume du Bénin. Ces guildes produisent les outils et les armes requis par l'État, ou des artisanats et sculptures destinés au commerce."
 ben_adoption_of_benin_customs:0 "Adoption des coutumes béninoises"
 ben_adoption_of_benin_customs_desc:0 "Alors que le Bénin passe d'une politique d'expansion militaire à une politique de consolidation, nombre d'États conquis ou soumis adoptent les titres et structures sociales béninois, s'intégrant ainsi à notre État."
 ben_regulation_of_trade:0 "Régulation du commerce"
 ben_regulation_of_trade_desc:0 "Au Bénin, seuls les représentants du roi sont autorisés à commercer avec les Européens. Cela a contraint tout le commerce avec Cannor à passer par les canaux royaux, permettant à l'État de conserver une plus grande part des profits."
 SHL_ideas:0 "Idées holsteinoises"
 SHL_ideas_start:0 "Traditions holsteinoises"
 SHL_ideas_bonus:0 "Ambition holsteinoise"
 limes_saxoniae:0 "Limes Saxoniae"
 limes_saxoniae_desc:0 "Au fil des siècles, le Holstein a été une région frontalière, et depuis l'époque du Danevirke ou de la Digue saxonne jusqu'à aujourd'hui, il a toujours été dans l'intérêt de quiconque contrôle cette région de la fortifier."
 between_a_kingdom_and_the_empire:0 "Entre un royaume et l'Empire"
 between_a_kingdom_and_the_empire_desc:0 "Situé à la frontière même de l'Empire d'Anbennar et du royaume de Danemark, notre État est à la fois danois et allemand. Cette double identité a bien servi notre pays à travers les âges et signifie que si notre indépendance venait à être menacée, nous aurions toujours quelqu'un vers qui nous tourner."
 holsteins:0 "« Ewich Tosamende Ungedelt »"
 holsteins_desc:0 "Bien que le traité de Ribe stipule que ces terres doivent rester indivises, nous avons une longue tradition consistant à résoudre les disputes successorales en partageant nos terres du Holstein. Cette pratique assure la stabilité et la pérennité de notre État, et nous ne serions pas sages de la changer."
 kieler_umschlag:0 "Kieler Umschlag"
 kieler_umschlag_desc:0 "Depuis 1431, le Kieler Umschlag, une foire franche, attire marchands et négociants de toutes les riches cités d'Allemagne du Nord et de la mer Baltique vers nos terres."
 reunifications_of_holstein:0 "Réunification des terres holsteinoises"
 reunifications_of_holstein_desc:0 "De nombreuses parties de notre nation sont divisées entre divers propriétaires fonciers. Consolidons les terres du Holstein et créons un État plus fort et plus unifié."
 trade_of_two_seas:0 "Le commerce des deux mers"
 trade_of_two_seas_desc:0 "Depuis des centaines d'années, le Schleswig et le Holstein sont au centre de l'attention des marchands de toute la Baltique et de la mer du Nord, car ils contrôlent la route terrestre la plus courte entre les deux mers. Encourageons ce commerce comme alternative à la route du Kattegat-Skagerrak."
 danish_protest_pigs:0 "Cochons de protestation danois"
 danish_protest_pigs_desc:0 "L'équilibre entre les cultures danoise et allemande dans notre État est fragile, et si nous venions à passer sous la domination de quelqu'un qui réprimerait l'une de ces identités, nous résisterions. Même si cela signifie recourir à l'agressivité passive, comme utiliser notre expertise en élevage pour créer un cochon aux motifs rappelant le bien-aimé Dannebrog."
 BRE_ideas:0 "Idées brémoises"
 BRE_ideas_start:0 "Traditions brémoises"
 BRE_ideas_bonus:0 "Ambition brémoise"
 lex_saxonum:0 "Lex Saxonum"
 lex_saxonum_desc:0 "Le diocèse de Brême trouve ses racines au VIIIe siècle, lorsque Charlemagne soumit les Saxons et décréta que tous devaient se convertir à la chrétienté et que les églises devaient être protégées."
 memories_of_verden:0 "Souvenirs de Verden"
 memories_of_verden_desc:0 "Depuis son introduction violente, le respect pour les institutions chrétiennes est profondément enraciné dans ces terres."
 deep_pockets:0 "Bourses bien garnies"
 deep_pockets_desc:0 "Les terres de l'Empire sont souvent dévastées par de longues guerres et des conflits internes. Un État comme le nôtre serait sage de garder une bourse bien remplie et de l'utiliser généreusement pour détourner les armées pillardes ailleurs."
 free_imperial_city_of_bremen:0 "Ville libre impériale de Brême"
 free_imperial_city_of_bremen_desc:0 "Brême s'est établie comme ville libre impériale en 1186 et a obtenu l'immédiateté impériale en 1646. Ce statut a protégé la cité et permis à son économie de prospérer."
 vegesack:0 "Port de Vegesack"
 vegesack_desc:0 "La Weser s'envase et le transport maritime a de plus en plus de mal à atteindre les ports de notre État. Il a été suggéré qu'un port artificiel pourrait être créé à Vegesack, plus au nord, pour permettre au commerce maritime d'atteindre plus facilement notre cité."
 bremish_walls:0 "Murailles brémoises"
 bremish_walls_desc:0 "Brême a été assiégée dans presque chaque guerre concevable menée en Allemagne du Nord. Les murs, portes et fossés de Brême n'ont pas toujours suffi à repousser les envahisseurs potentiels, mais au fil des siècles, ils nous ont bien servis. Étendons ces fortifications avec des bastions et autres nouvelles inventions en la matière, et elles continueront à le faire pendant des centaines d'années encore."
 foundation_of_bremerhaven:0 "Fondation de Bremerhaven"
 foundation_of_bremerhaven_desc:0 "Le port de Vegesack, au nord de Brême, est devenu de plus en plus un nouveau centre pour notre navigation et notre construction navale. Ici, des entrepreneurs innovants comme Johanne Lange ont commencé à appliquer les nouvelles techniques de construction navale de l'ère moderne ; certains parlent même d'un navire mû par la vapeur. Cependant, pour favoriser le développement maritime brémois, nous devons fonder une cité entièrement nouvelle à l'embouchure même du fleuve, afin que l'accès à l'océan soit totalement libre."
 HES_ideas:0 "Idées hessoises"
 HES_ideas_start:0 "Traditions hessoises"
 HES_ideas_bonus:0 "Ambition hessoise"
 break_the_hessian_estates:0 "Briser le pouvoir des États"
 break_the_hessian_estates_desc:0 "Un souverain fort ne peut permettre aux États d'entraver son pouvoir. Nous devons briser définitivement le pouvoir des États afin de pouvoir entreprendre tous les objectifs que nous jugeons appropriés."
 marburg_university:0 "Université de Marbourg"
 marburg_university_desc:0 "L'éducation est importante, et de nombreuses universités allemandes n'accueilleront que les gens aisés ou ceux de foi ravélienne. Fondons une nouvelle université qui vise à être libre de ces contraintes, pour le plus grand bien de nos sujets."
 welcome_reformers:0 "Accueillir les Réformateurs"
 welcome_reformers_desc:0 "Partout à Cannor et dans les terres allemandes, les Réformateurs débattent et réinventent la foi chrétienne. Accueillons ces hommes érudits afin qu'ils puissent débattre librement sous notre protection."
 let_in_religious_emigrants:0 "Accueillir les émigrés religieux"
 let_in_religious_emigrants_desc:0 "De nombreux pays à travers Cannor se sont débarrassés de certains de leurs meilleurs talents simplement parce qu'ils appartenaient à l'une des diverses nouvelles foi chrétiennes. Profitons de leur erreur et accueillons tous ceux qui cherchent une nouvelle patrie."
 modernization_of_the_hessian_army:0 "Modernisation de l'armée hessoise"
 modernization_of_the_hessian_army_desc:0 "Les armées de Cannor évoluent sans cesse, et un État en Allemagne devra rester à jour ou faire face à sa fin. Modernisons nos armées et adoptons les meilleures idées en matière d'entraînement, d'équipement et de tactique que nous puissions trouver."
 hessian_mercenaries_idea:0 "Mercenaires hessois"
 hessian_mercenaries_idea_desc:0 "Une armée moderne coûte cher, et l'entraînement, aussi rigoureux soit-il, ne remplace pas l'expérience réelle. Permettons à d'autres États de louer des unités entières de nos forces afin qu'elles acquièrent une véritable expérience du combat même en temps de paix, mais surtout afin que nous puissions plus facilement payer leur équipement et leur nourriture."
 hessian_economic_reforms:0 "Réformes économiques"
 hessian_economic_reforms_desc:0 "Le monde change, et au sein de nos frontières se trouvent de nombreuses personnes ayant des idées pour améliorer notre économie. Donnons-leur la liberté d'entreprendre leurs projets audacieux afin que notre pays puisse posséder les plus belles manufactures et forges."
 MUN_ideas:0 "Idées de Münster"
 MUN_ideas_start:0 "Traditions de Münster"
 MUN_ideas_bonus:0 "Ambition de Münster"
 mun_great_procession:0 "Grande procession"
 mun_great_procession_desc:0 "Chaque année depuis la grande peste de 1382, qui tua près de 8 000 habitants, et le grand incendie de 1383, nous organisons une grande procession. Elle témoigne de notre repentance pour nos péchés et de notre dévotion envers Dieu."
 mun_erbmanner:0 "Erbmänner"
 mun_erbmanner_desc:0 "Les « Erbmänner » de Münster sont la noblesse de notre grande cité. Ils sont les seuls à posséder le droit de vote passif, et si nous élisons un évêque issu de ces hommes, nous pouvons être sûrs de la loyauté de toutes les familles nobles de notre évêché."
 mun_founding_of_monestaries:0 "Fondation de monastères"
 mun_founding_of_monestaries_desc:0 "En ces temps de réforme, nous devons défendre le ravélianisme dans l'évêché en invitant les Jésuites et en encourageant la fondation de monastères pour les anciens ordres. Certains de ces monastères formeront d'excellents missionnaires pour nos desseins."
 mun_cities_of_peace:0 "Cités de la paix"
 mun_cities_of_peace_desc:0 "La paix de Westphalie fut signée à Münster et Osnabrück. Les traités mirent fin à la guerre de Trente Ans dans l'Empire d'Anbennar et établirent pleinement l'indépendance de la République hollandaise.\nEn promouvant nos cités comme lieu idéal pour les négociations diplomatiques, nous sommes assurés d'acquérir une grande renommée à travers tout Cannor."
 mun_soldiers:0 "Soldats des armées impériales"
 mun_soldiers_desc:0 "Il est de notre devoir de maintenir une armée puissante afin de prévaloir contre nos voisins protestants. Les soldats de l'armée impériale sont parfaits pour nos objectifs. Ce sont des soldats bien entraînés et aguerris, prêts à défendre notre grand évêché contre les nations hérétiques."
 mun_bommen_berend:0 "Bommen Berend"
 mun_bommen_berend_desc:0 "En raison du bombardement intense des cités assiégées à l'aide de mortiers, le prince-évêque Christoph Bernhard von Galen a acquis le surnom de « Bommen Berend ». Faisons de ce choix d'armes la ligne directrice de nos généraux désormais."
 mun_support_of_schools:0 "Soutien aux écoles"
 mun_support_of_schools_desc:0 "L'éducation de notre peuple est l'épine dorsale de notre État. Les écoles de notre royaume sont parmi les plus anciennes de tout Cannor. Construisons de nouvelles écoles et engageons de nombreux enseignants pour offrir une éducation abordable à notre peuple."
 NOL_ideas:0 "Idées northumbriennes"
 NOL_ideas_start:0 "Traditions northumbriennes"
 NOL_ideas_bonus:0 "Ambition northumbrienne"
 nol_secure_percy_rule:0 "Assurer le pouvoir des Percy"
 nol_secure_percy_rule_desc:0 "Cette terre a été gouvernée par la famille Percy pendant des siècles, et ils sont devenus synonymes de celle-ci. Les Percy resteront un pilier de ce royaume indépendant et seront une force puissante pour la monarchie northumbrienne."
 nol_memory_of_hegemony:0 "Le souvenir de l'hégémonie northumbrienne"
 nol_memory_of_hegemony_desc:0 "Avant la création de l'Angleterre, la Northumbrie était un royaume indépendant qui, au VIIe siècle, obtint la suzeraineté sur le nord de l'Angleterre. Il nous appartient de rendre justice à nos ancêtres et de restaurer leur hégémonie."
 nol_cradle_of_british_christianity:0 "Berceau du christianisme britannique"
 nol_cradle_of_british_christianity_desc:0 "Bien qu'il ne soit pas le premier endroit de Bretagne à avoir été converti au christianisme, le royaume de Northumbrie est celui où il s'est le plus fermement enraciné. Des saints y ont établi leur demeure, et le monastère de Lindisfarne fut un centre chrétien majeur des premiers temps. Cultivons cet héritage en tant que centre pour les vrais croyants des îles Britanniques."
 nol_land_of_castles:0 "Une terre de châteaux"
 nol_land_of_castles_desc:0 "Le Northumberland possède la plus grande concentration de châteaux de toutes les îles Britanniques. Refortifiés et modernisés, ils nous protégeront de nos ennemis."
 nol_lindisfarne_gospels:0 "Évangiles de Lindisfarne"
 nol_lindisfarne_gospels_desc:0 "En plus d'être un centre religieux, le monastère de Lindisfarne était réputé pour sa production de manuscrits de haute qualité, comme les Évangiles de Lindisfarne. Que cet héritage nous inspire à de futures réalisations culturelles !"
 nol_literary_and_philosophical_society:0 "La Société littéraire et philosophique"
 nol_literary_and_philosophical_society_desc:0 "Outre nos fortes racines religieuses, le Northumberland voit également émerger un essor de l'innovation. La Société littéraire et philosophique en est un centre, et nous espérons qu'elle nous apportera de nombreuses innovations à l'avenir."
 nol_coals_to_newcastle:0 "Porter du charbon à Newcastle"
 nol_coals_to_newcastle_desc:0 "Alors que l'ère industrielle se lève, il est devenu évident que le Northumberland recèle d'importants gisements de charbon. Des pratiques minières plus efficaces et le développement du grand port de Newcastle nous permettront d'exploiter pleinement cette ressource."
 ARK_ideas:0 "Idées arakanaises"
 ARK_ideas_start:0 "Traditions arakanaises"
 ARK_ideas_bonus:0 "Ambition arakanaise"
 ark_mrauk_u_dynasty:0 "Dynastie de Mrauk U"
 ark_mrauk_u_dynasty_desc:0 "Avec l'ascension de Min Saw Mon sur le trône arakanais, une nouvelle ère a commencé. Notre dynastie royale a des liens remontant loin dans le passé, mais le déplacement de notre capitale à Mrauk-U promet de grandes choses nouvelles pour notre royaume et notre peuple. La Chronique arakanaise racontera pour toujours cette histoire de notre lignée et de notre peuple aux descendants futurs."
 ark_rohingya_immigrants:0 "Immigrants Rohingya"
 ark_rohingya_immigrants_desc:0 "Le sultanat du Bengale est un voisin influent, tant culturellement et économiquement que comme force militaire dans notre région. En tant que royaume voisin, nous serions sages d'intégrer tout immigrant bengali dans notre société et d'ouvrir nos esprits à leurs idées et à leur foi."
 ark_bengal_bay_trade:0 "Commerce du golfe du Bengale"
 ark_bengal_bay_trade_desc:0 "Le golfe du Bengale est un riche carrefour commercial autour duquel tout dans cette région gravite, et la position de l'Arakan est très proche de son centre. Nous devons tirer profit de cette position et faire tout notre possible pour encourager le rôle croissant de l'Arakan dans le commerce international."
 ark_magh_and_ferenghi:0 "Magh et Ferenghi"
 ark_magh_and_ferenghi_desc:0 "Les riches ports de commerce du delta du Bengale regorgent de proies faciles pour les pirates. Cela a attiré des aventuriers de nos terres ainsi que de contrées lointaines comme l'Inde ou même Cannor. Nous devrions accueillir ces pirates et leur permettre d'utiliser notre pays comme base pour leurs raids sur les ports de nos ennemis."
 ark_buddhist_sultans:0 "Sultans bouddhistes"
 ark_buddhist_sultans_desc:0 "L'Arakan n'a jamais été une nation musulmane, pourtant le monarque s'est paré du titre de Sultan. S'assurer que nous agissons comme partie intégrante du monde indo-persan plus large et suivre la culture de cour de nos voisins musulmans peut s'avérer fort bénéfique."
 ark_muslim_advisers:0 "Conseillers musulmans"
 ark_muslim_advisers_desc:0 "Le Sultan prend conseil auprès de musulmans ayant eu de l'expérience dans les cours de l'Inde. Chercher d'éminents courtisans à l'étranger ne peut qu'apporter de bonnes choses."
 ark_trade_contracts_ark:0 "Contrats commerciaux arakanais"
 ark_trade_contracts_ark_desc:0 "Des contrats commerciaux complexes conclus avec d'autres nations donnent une impression de sophistication et encouragent les marchands étrangers à commercer dans nos cités."
 THU_ideas:0 "Idées thuringiennes"
 THU_ideas_start:0 "Traditions thuringiennes"
 THU_ideas_bonus:0 "Ambition thuringienne"
 thu_partition_of_leipizg:0 "Le partage de Leipzig"
 thu_partition_of_leipizg_desc:0 "Notre branche de la maison de Wettin, la lignée Ernestine, et nos rivaux de la lignée Albertine, sont parvenus à un accord pour diviser nos terres pacifiquement. Nous sommes les souverains légitimes de Thuringe !"
 thu_erfurt_fortifications:0 "Fortifications d'Erfurt"
 thu_erfurt_fortifications_desc:0 "Faisons de la grande ville-forteresse d'Erfurt les fortifications les plus solides de toute l'Allemagne. Beaucoup d'armées sont venues pour conquérir, mais peu y sont parvenues."
 thu_protector_of_reformers:0 "Protecteur des Réformateurs"
 thu_protector_of_reformers_desc:0 "Notre lignée est renommée pour avoir été la protectrice du grand réformateur Martin Luther quand d'autres cherchaient à le faire taire. Cannor sait que nous n'étouffons pas la pensée hétérodoxe."
 thu_university_of_jena:0 "Université Salana"
 thu_university_of_jena_desc:0 "Nous devrions nous efforcer de faire de la nouvelle université de Jena un grand nouveau phare du savoir à travers toute l'Allemagne ! Ces étudiants sont l'avenir de notre pays ; encourageons-les à penser librement et passionnément afin de faire progresser la société. Quelques cicatrices de duel sont un faible prix à payer pour de grandes idées."
 thu_saxon_duchies:0 "Les duchés saxons"
 thu_saxon_duchies_desc:0 "En raison du grand nombre de mâles dans la branche Ernestine des Wettin, divers duchés ont été séparés à chaque génération pour les membres cadets de la dynastie. Mais, inversement, cela signifie que lorsqu'une lignée s'éteint, il y a toujours des héritiers dans un duché frère pour prendre la relève, avec un minimum de complications ou d'interférences extérieures."
 thu_weimar_clacissicism:0 "Classicisme de Weimar"
 thu_weimar_clacissicism_desc:0 "La cité de Weimar est devenue l'un des grands centres des Lumières en Allemagne. Des écrivains et artistes renommés tels que Goethe et Schiller font désormais de Weimar leur demeure. Avec de si célèbres personnages vivant ici, nous deviendrons célèbres à travers tout Cannor comme centre du savoir et de la culture !"
 thu_expansive_marriage_policies:0 "Politique matrimoniale expansive"
 thu_expansive_marriage_policies_desc:0 "Avec tant de branches, notre lignée des Wettin dispose généralement de nombreux jeunes seigneurs et dames disponibles sur le marché des mariages royaux. D'autres peuvent railler que nous ne sommes que le « haras de Cannor », mais nous savons que les mariages royaux sont parmi les plus grands atouts disponibles dans la diplomatie de notre époque."
 BTI_ideas:0 "Idées de Semien"
 BTI_ideas_start:0 "Traditions de Semien"
 BTI_ideas_bonus:0 "Ambition de Semien"
 bti_legacy_of_queen_judith_desc:0 "La légende de Judith, la reine qui anéantit l'Empire d'Axoum menaçant nos terres il y a cinq siècles, est à jamais la preuve de nos capacités militaires. Restaurons les armées de Gudit pour protéger l'ancien héritage de Beta Israel ! Nous sommes peu nombreux mais nous sommes forts, car nous sommes le Peuple Élu."
 bti_legacy_of_queen_judith:0 "Héritage de la reine Judith"
 bti_mountain_kingdom:0 "Royaume de la montagne"
 bti_mountain_kingdom_desc:0 "Les montagnes de Semien nous ont bien servis dans les nombreuses guerres contre des voisins plus puissants. En organisant nos défenses autour de ces fortifications naturelles, nous pouvons grandement accroître l'efficacité de nos défenses."
 bti_kebra_nagast:0 "Kebra Nagast"
 bti_kebra_nagast_desc:0 "Le Kebra Nagast, ou La Gloire des Rois, est un récit du XIVe siècle relatant les origines de la lignée salomonienne des empereurs d'Éthiopie. Le texte, dans sa forme actuelle, a au moins 700 ans et contient un récit de la façon dont la reine de Saba rencontra le roi Salomon et comment l'Arche d'Alliance arriva en Éthiopie. C'est l'histoire ancienne décrivant la naissance de Beta Israel et notre grand héritage, et nous ne le laisserons pas périr."
 bti_builders_and_artists:0 "Bâtisseurs et artisans"
 bti_builders_and_artists_desc:0 "Nos voisins chrétiens et musulmans ont décrété que les Juifs ne peuvent pas posséder de terres dans leurs royaumes. Cela a conduit nombre de nos frères et sœurs de foi à adopter de nouvelles vocations. À travers l'Éthiopie, les hommes de Beta Israel travaillent comme bâtisseurs tandis que les femmes décorent châteaux et églises. En encourageant certains de ces hommes et femmes à s'installer sur nos terres, libres d'oppression, nous pouvons tirer profit de l'étroitesse d'esprit de nos voisins."
 bti_gideon_dynasty:0 "Dynastie Gédéon"
 bti_gideon_dynasty_desc:0 "La nôtre est une sainte dynastie de rois et de descendants privilégiés de Tsadok, jadis grand prêtre sous le règne du roi David et du roi Salomon. Les descendants de Tsadok gouvernent le royaume de Semien et le peuple de Beta Israel depuis des siècles, combattant vaillamment quiconque souhaite nous détruire. Notre droit sur cette terre est indiscutable."
 bti_lost_tribe:0 "Tribu perdue de Beta Israel"
 bti_lost_tribe_desc:0 "Les Juifs vivent en petites communautés à travers le monde entier, servant comme artisans, conseillers, banquiers, marchands, érudits et mercenaires ; ils doivent savoir qu'il existe un endroit au monde où ils peuvent être véritablement libres et en sécurité. Encourageons les Juifs de toutes les régions voisines à s'installer dans notre pays."
 bti_haskalah:0 "Haskalah"
 bti_haskalah_desc:0 "Les Lumières transforment les cours de Cannor à jamais, et les intellectuels juifs ont joué un rôle important dans ce processus. Intégrons les Lumières juives dans notre société et récoltons les bénéfices de la sécularisation, des études de la langue hébraïque et de l'histoire juive."
 LNA_ideas:0 "Idées de Lan Na"
 LNA_ideas_start:0 "Traditions de Lan Na"
 LNA_ideas_bonus:0 "Ambition de Lan Na"
 lna_legacy_of_mangrai:0 "Héritage de Mangrai"
 lna_legacy_of_mangrai_desc:0 "Avant sa mort par la foudre, le légendaire roi Mangrai créa la plupart des institutions de notre royaume. Nous nous efforçons toujours de suivre son exemple."
 lna_million_ice_paddies:0 "Un million de rizières"
 lna_million_ice_paddies_desc:0 "Tout comme un Pan-Na est mille rizières, un Lan-Na en est un million. Une nation ainsi bénie fournit aisément toute la nourriture et la richesse dont elle a besoin."
 lna_waters_of_the_naga:0 "Eaux du Naga"
 lna_waters_of_the_naga_desc:0 "On dit que les eaux du fleuve Mae Kong ont leur origine dans un grand serpent bienveillant. Quelle que soit la vérité, elles procurent à notre royaume une grande fertilité et abondance."
 lna_the_white_elephant:0 "L'éléphant blanc"
 lna_the_white_elephant_desc:0 "La moitié de la relique de Sumanathera fut portée par un éléphant blanc jusqu'au sommet de la montagne, où il s'arrêta et mourut. C'est là que le roi ordonna instantanément la construction d'un grand temple."
 lna_red_and_black:0 "Vassaux rouges et noirs"
 lna_red_and_black_desc:0 "Notre royaume reçoit depuis longtemps le tribut de royaumes plus petits à l'est et au sud. Nous pouvons lentement les assimiler sous notre contrôle."
 lna_elephant_charge:0 "Charge d'éléphants"
 lna_elephant_charge_desc:0 "Les éléphants sont une arme de guerre puissante, et nous serions sages de les utiliser pour disperser et détruire les armées de nos ennemis."
 lna_dynastic_spread:0 "Expansion dynastique"
 lna_dynastic_spread_desc:0 "Nous devons faire tout notre possible pour entrelacer nos grandes familles avec les dynasties des États voisins. Cela nous aidera à atteindre nos objectifs et nous vaudra de précieuses amitiés à long terme."
 PGR_ideas:0 "Idées de Pagarruyung"
 PGR_ideas_start:0 "Traditions de Pagarruyung"
 PGR_ideas_bonus:0 "Ambition de Pagarruyung"
 pgr_tantric_legacy:0 "Héritage tantrique"
 pgr_tantric_legacy_desc:0 "Le fondateur du royaume de Pagarruyung fut Adityawarman, cousin du roi de l'Empire Majapahit. Des nombreuses inscriptions qu'il laissa derrière lui, notre peuple a hérité de sa dévotion au bouddhisme ésotérique. Nous devons veiller à ce que son grand héritage perdure alors que l'influence des sultanats musulmans se répand parmi ces îles."
 pgr_gold_trade:0 "Commerce de l'or"
 pgr_gold_trade_desc:0 "Notre royaume prospère grâce à l'exportation de l'or, à une politique avisée et aux connexions commerciales de nos marchands dans l'archipel. Nombre de Minangkabau ont travaillé comme négociants intermédiaires pour l'empire Srivijaya, Aceh ou Malacca. Le commerce coule dans nos veines."
 pgr_istano_basa:0 "Istano Basa"
 pgr_istano_basa_desc:0 "L'Istano Basa Pagarruyung, notre palais royal, est construit dans le style architectural vernaculaire traditionnel Minangkabau du Rumah Gadang. C'est le centre de notre État et de toute notre culture, la preuve du droit éternel de la dynastie de Pagarruyung sur ces terres, et il sera notre cœur pendant des siècles."
 pgr_rajo_tigo_selo:0 "Rajo Tigo Selo"
 pgr_rajo_tigo_selo_desc:0 "Le pouvoir royal de l'Istano Basa Pagarruyung a été divisé entre trois rois régnants reconnus : le Roi du Monde (Raja Alam), le Roi de l'Adat (Raja Adat), et le Roi de la Religion (Raja Ibadat). Collectivement, ils sont appelés les Rois des Trois Sièges (Rajo Tigo Selo). Leur coopération assure notre forte position diplomatique dans le monde civilisé, contrairement à d'autres sauvages qui seraient gouvernés par un seul chef tyrannique !"
 pgr_high_education:0 "Haute éducation"
 pgr_high_education_desc:0 "Notre peuple n'est pas aussi nombreux que celui de Java, mais nous sommes très influents car il n'y a rien de plus important que l'éducation dans notre culture. En plus d'être réputés comme marchands, les Minang produisent certains des poètes, hommes d'État et érudits les plus influents d'Indonésie ; l'adaptation aux nouvelles techniques est la clé de la grandeur de Pagarruyung."
 pgr_rumah_gadang:0 "Rumah Gadang"
 pgr_rumah_gadang_desc:0 "Notre architecture traditionnelle et les fonctions du Rumah Gadang reflètent la culture et les valeurs des Minangkabau. Un Rumah Gadang sert de résidence, de salle pour les réunions familiales et pour les activités cérémonielles ; ses riches ornements et son aspect splendide en font le symbole de Pagarruyung et de nos capacités architecturales."
 pgr_matrilinear_culture:0 "Culture matrilinéaire"
 pgr_matrilinear_culture_desc:0 "L'Adat Perpatih est une combinaison de pratiques et de règles de vie pour le peuple Minangkabau. Les biens et la terre se transmettent de mère en fille, tandis que les affaires religieuses et politiques sont de la responsabilité des hommes. La tradition protège l'honneur et la dignité de l'Adat Perpatih de sorte que, aussi pauvre qu'une femme Adat Perpatih puisse être, elle sera toujours prise en charge. Cela garantit que notre société n'est pas divisée par de mesquins conflits."
 CMI_ideas:0 "Idées Miao"
 CMI_ideas_start:0 "Traditions Miao"
 CMI_ideas_bonus:0 "Ambition Miao"
 cmi_sacrificing_to_the_spirits:0 "Sacrifices aux esprits"
 cmi_sacrificing_to_the_spirits_desc:0 "Dans notre culture, les traditions anciennes sont toujours vivaces. Sacrifions vin, viande et riz pour renforcer la foi de notre peuple dans le culte vertueux de nos ancêtres, des esprits et des dieux de la nature."
 cmi_dragon_boats:0 "Fêtes des bateaux-dragons"
 cmi_dragon_boats_desc:0 "Nos fêtes annuelles des bateaux-dragons suivent une ancienne tradition. Organisées par les chefs de clan et les monarques pour être des occasions aussi splendides et exquises que possible, elles font oublier à notre peuple ses chagrins."
 cmi_unity_of_the_tribes:0 "Unité des tribus"
 cmi_unity_of_the_tribes_desc:0 "Les Miao sont divisés en plusieurs tribus à peine maintenues ensemble par notre culture, langue et histoire communes. Souder ensemble les Hmong, Li, Yao, et les Miao blancs, rouges, bleus et noirs permettrait de coordonner nos armées bien plus efficacement."
 cmi_miao_silver:0 "Argent Miao"
 cmi_miao_silver_desc:0 "Les Miao sont des orfèvres renommés, ayant mis au point une technique de forge basée sur un alliage d'argent spécifique dont nous gardons jalousement le secret. Nos célèbres bijoux nous aideront à répandre notre renommée."
 cmi_customary_marriage_laws:0 "Lois matrimoniales coutumières"
 cmi_customary_marriage_laws_desc:0 "Nos traditions dictent qu'aucun Miao ne peut se marier en dehors de sa tribu. Bien que cela réduise la liberté de l'individu, nos liens intra-tribaux sont renforcés et maintenus par cette pratique."
 cmi_mountain_retreats:0 "Refuges montagnards"
 cmi_mountain_retreats_desc:0 "La plupart des Miao vivent dans des régions très montagneuses. Nous devrions être capables d'utiliser le terrain et notre connaissance de celui-ci pour nous protéger contre les assauts ennemis."
 cmi_legacy_of_the_miao_rebellions:0 "Héritage des rébellions Miao"
 cmi_legacy_of_the_miao_rebellions_desc:0 "Les Miao ont toujours été un peuple rebelle ; nous avons prouvé notre valeur en tant que guerriers puissants et courageux dans nos nombreux soulèvements contre nos suzerains chinois. Nous devrions utiliser l'expérience acquise lors de nos entreprises passées."
 CAT_ideas:0 "Idées catalanes"
 CAT_ideas_start:0 "Traditions catalanes"
 CAT_ideas_bonus:0 "Ambition catalane"
 cat_consulate_of_the_sea:0 "Consulat de la Mer"
 cat_consulate_of_the_sea_desc:0 "« Les coutumes maritimes de Barcelone », universellement connues sous le nom de « Livre du Consulat de la Mer », sont un recueil de coutumes et d'ordonnances maritimes collectées au cours des XIVe et XVe siècles. Ce livre remarquable est l'un des premiers recueils de droit maritime et un témoignage des fortes traditions maritimes et juridiques de notre peuple."
 cat_consell_de_cent:0 "Consell de Cent"
 cat_consell_de_cent_desc:0 "Depuis 1265, le Conseil des Cent est la structure fondamentale du gouvernement municipal de Barcelone. L'autorité municipale repose sur trois conseillers élus par un conseil de cent individus."
 cat_catalan_constitutions:0 "Constitution de Catalogne"
 cat_catalan_constitutions_desc:0 "Bien que notre pays soit jeune, ses institutions reposent sur des siècles d'habitudes juridiques et administratives. Perpétuant les anciennes traditions du droit romain, les Constitutions de Catalogne ont été promulguées par les Corts catalanes depuis 1283."
 cat_fortifying_catalonia:0 "Fortifier la Catalogne"
 cat_fortifying_catalonia_desc:0 "La Catalogne a de nombreuses menaces et ennemis potentiels. La côte a souvent subi les attaques des pirates barbaresques, et à travers les Pyrénées, des invasions ont souvent été lancées au cœur de la région catalane. Nous devons faire tout notre possible pour fortifier notre pays afin d'assurer la sécurité de notre jeune État et tirer le meilleur parti de la géographie locale."
 cat_miquelets:0 "Miquelets"
 cat_miquelets_desc:0 "En temps de guerre, il est coutumier que des groupes de Catalans prennent les armes. Ces groupes, connus sous le nom de Miquelets, sont entretenus au niveau paroissial plutôt que par les gouvernements central ou provinciaux. Comme ils sont appelés au devoir par le son de la cloche du village (Someten), ils sont aussi fréquemment appelés « Somatenes », et bien que certains les considèrent comme de simples bandits, ils sont toujours prêts à défendre les terres catalanes contre les étrangers, des Turcs et Français aux Castillans qui se permettent de s'appeler « Espagnols »."
 cat_lliures_morts:0 "« Lliures o Morts »"
 cat_lliures_morts_desc:0 "« Viurem lliures o morirem » (Nous vivrons libres ou nous mourrons) est la devise de l'armée catalane et est imprimée sur les drapeaux noirs qu'elle porte. Guidés par ces mots, nos hommes endureront, même inférieurs en nombre et sans alliés, pour la liberté de leur peuple."
 cat_catalan_forges:0 "Forges de Catalogne"
 cat_catalan_forges_desc:0 "Jadis, nos ancêtres ont été les pionniers de nouvelles techniques de fonte du fer dans les Pyrénées. Nous devons à nouveau nous efforcer d'être à la pointe de l'avancement métallurgique et encourager les nouvelles techniques ainsi que l'établissement de forges dans nos terres."
 laotian_ideas:0 "Idées laotiennes"
 laotian_ideas_start:0 "Traditions laotiennes"
 laotian_ideas_bonus:0 "Ambition laotienne"
 lao_phra_lak_phra_lam:0 "Phra Lak Phra Lam"
 lao_phra_lak_phra_lam_desc:0 "L'épopée nationale de notre peuple raconte l'histoire des deux frères Phra Lak et Phra Ram et est omniprésente dans notre culture, des danses et représentations théâtrales aux chansons, peintures, sculptures ou manuscrits. Les deux frères sont l'incarnation du leadership moral, de l'éthique, de l'abnégation et de la vie conforme au Dharma, et restent le modèle par excellence pour chaque membre de notre peuple, des paysans aux souverains eux-mêmes."
 lao_nithan_khun_borom:0 "Nithan Khun Borom"
 lao_nithan_khun_borom_desc:0 "L'ancêtre légendaire de notre peuple, Khun Borom, fut envoyé par son père Indra, le roi des dieux, pour être le souverain des peuples Tai. Khun Borom régna sur les peuples Tai pendant 25 ans et leur enseigna l'usage de nouveaux outils et d'autres arts. Khun Borom divisa ensuite le royaume Tai entre ses sept fils, donnant à chacun une portion du royaume à gouverner. Ainsi naquit le Laos, et cette ascendance divine nous distingue des autres peuples."
 lao_satsana_phi:0 "Satsana Phi"
 lao_satsana_phi_desc:0 "Les Phi sont les dieux tutélaires de notre peuple. La croyance en ces esprits ancestraux perdure aux côtés de religions comme le bouddhisme et l'hindouisme dans nos terres, et ce syncrétisme renforce notre État et sa capacité à abriter des citoyens de nombreuses fois."
 lao_elephant_cavalry:0 "Cavalerie d'éléphants laotienne"
 lao_elephant_cavalry_desc:0 "Bien que les éléphants aient été utilisés dans d'autres régions du monde à la guerre, nulle part ils ne sont utilisés en aussi grand nombre qu'ici. Au Laos, ils sont l'élément clé de la guerre et leur nombre atteint les milliers, nous permettant de porter des charges dévastatrices même dans les jungles denses de Haless du Sud-Est."
 lao_southern_silk_road:0 "Route de la Soie méridionale"
 lao_southern_silk_road_desc:0 "Les Lao vivent au centre des routes commerciales terrestres en Haless du Sud-Est. Au sud, le commerce descend le Mékong jusqu'à Vientiane. Au nord et au nord-ouest, les routes commerciales terrestres de Birmanie et de Lan Na passent vers le Yunnan, où elles rejoignent la Route de la Soie méridionale chinoise. Nous devons capitaliser sur ces richesses et bâtir un État capable de prospérer grâce au commerce qui nous est apporté."
 lao_hill_warriors:0 "Guerre des collines laotiennes"
 lao_hill_warriors_desc:0 "Notre peuple vit sur les hautes terres entre royaumes dangereux et innombrables ; si nous ne sommes pas prêts à défendre notre patrie avec férocité, nous serons facilement soumis par d'autres."
 CHA_ideas:0 "Idées Cham"
 CHA_ideas_start:0 "Traditions Cham"
 CHA_ideas_bonus:0 "Ambition Cham"
 cha_my_son_temples:0 "Mémoire des temples de My Son"
 cha_my_son_temples_desc:0 "Le grand complexe de temples de nos ancêtres à My Son fait partie des traditions et cérémonies royales depuis des siècles. Lorsque les temples nous furent perdus au profit de forces extérieures, ils tombèrent en décrépitude et en ruine. Aujourd'hui, leur mémoire est un symbole de ce que notre civilisation a jadis accompli et de ce à quoi nous devons aspirer."
 cham_seafaring_people:0 "Un peuple de marins"
 cham_seafaring_people_desc:0 "Le commerce maritime et fluvial est l'épine dorsale de notre économie. Nos marins font naturellement partie des réseaux commerciaux de l'océan Indien, chinois ainsi que malais, et c'est aussi par bateau que nous apportons les richesses des régions supérieures de notre pays. Un système de puits le long de la côte assure que tant nos marchands que les marchands étrangers ne sont jamais loin de pouvoir se réapprovisionner en cette ressource vitale."
 cha_indian_influences:0 "Connexions sud-indiennes"
 cha_indian_influences_desc:0 "Par notre culture et notre histoire, notre peuple est lié à l'Inde et au monde indien plus large. Notre familiarité avec leur culture est d'une grande aide lorsque nous traitons avec les marchands et négociants maritimes tamouls et télougous de Haless du Sud-Est."
 cha_che_man_legacy:0 "Héritage de Che Man"
 cha_che_man_legacy_desc:0 "Bien que nous ayons été repoussés vers le sud par les Dai Viet, on dit que notre peuple a jadis coopéré avec eux. Visons à nouveau mettre de côté nos différends, ou du moins à trouver de nouveaux amis pour nous protéger."
 cha_agarwood:0 "Bois d'agar"
 cha_agarwood_desc:0 "Les navires qui sillonnent nos fleuves nous apportent le rare bois d'agar si recherché à l'étranger. Nous devons faire tout notre possible pour maintenir ce monopole et nous assurer que nous sommes la seule source des variétés les plus fines."
 cha_resisting_foreign_rule:0 "Résister à la domination étrangère"
 cha_resisting_foreign_rule_desc:0 "Notre peuple est entouré de tous côtés par différentes religions, cultures et sociétés. Bien que nous ayons prospéré dans ces circonstances par le passé, on dit que beaucoup souhaitent désormais notre disparition. Nous devons fortifier nos cités et être préparés à tout ce que nos ennemis pourraient nous réserver."
 cha_cham_migrations:0 "Migrations Cham"
 cha_cham_migrations_desc:0 "Notre peuple s'est trouvé de plus en plus marginalisé dans nombre des régions jadis sous contrôle du Champa. En conséquence, ils migrent maintenant vers de nouvelles terres. Pour certains, la diaspora Cham a signifié s'installer en terres khmères ; d'autres partent vers les îles. Bien que ce ne soit pas un mouvement organisé de population, si nous leur offrons des lieux où s'établir, ils préféreront certainement le faire sous notre protection plutôt que de partir vers les terres de nos voisins."
 BAD_ideas:0 "Idées badoises"
 BAD_ideas_start:0 "Traditions badoises"
 BAD_ideas_bonus:0 "Ambition badoise"
 bad_hot_springs:0 "Sources chaudes"
 bad_hot_springs_desc:0 "Notre nation doit son nom aux sources chaudes, célèbres depuis l'époque romaine. Ceux qui viennent se baigner dans les eaux apaisantes repartent revigorés et ragaillardis."
 bad_zahringen:0 "Héritage de la maison de Zähringen"
 bad_zahringen_desc:0 "Depuis aussi longtemps que quiconque s'en souvienne, nos terres ont été gouvernées par l'ancienne maison de Zähringen, dont la lignée remonte presque aux origines de l'Empire. Le titre de margrave des Zähringen, supérieur à celui de simple comte, est un titre que nos souverains maintiennent fièrement à ce jour."
 bad_small_nation_diplomacy:0 "Diplomatie active"
 bad_small_nation_diplomacy_desc:0 "Bade a toujours été un petit État, souvent fragmenté par les différentes branches de la maison régnante. Au fil des années, nous avons appris que la seule façon de nous maintenir face aux grandes puissances est une diplomatie active."
 bad_cuius_regio_euis_religio:0 "Cuius Regio, Eius Religio"
 bad_cuius_regio_euis_religio_desc:0 "Les différents membres de notre dynastie régnante ont pris des positions différentes dans la Réforme. Alors que ce genre de chose a déchiré d'autres États, les membres des différentes branches de la famille margraviale ont, dans leur sagesse, décidé qu'une attitude générale de « vivre et laisser vivre » serait la meilleure voie pour Bade, même si nous nous chamaillons de temps en temps."
 bad_reuiniting_the_nation:0 "Réunification de Bade"
 bad_reuiniting_the_nation_desc:0 "Pendant longtemps, les différentes branches de notre maison ont régné sur différentes parties de Bade. Maintenant, cependant, une seule lignée survit, réunifiant la région et la rendant forte et entière à nouveau !"
 bad_expanding_the_nation:0 "Expansion diplomatique"
 bad_expanding_the_nation_desc:0 "Il est bon d'avoir des amis haut placés ! Par une diplomatie habile et en jouant une puissance contre une autre, nous pourrions réussir à annexer d'énormes quantités de terres autour de nous. Il est temps de saisir cette opportunité et de multiplier par cinq la taille et la population de notre nation !"
 bad_grand_duchy:0 "Grand-duché de Bade"
 bad_grand_duchy_desc:0 "Avec nos ambitions vient le besoin d'un titre plus grand. Proclamons le Grand-Duché de Bade et revendiquons notre place légitime au-dessus des nombreux comtes, margraves et ducs d'Allemagne."
 SDY_ideas:0 "Idées Sadiyan"
 SDY_ideas_start:0 "Traditions Sadiyan"
 SDY_ideas_bonus:0 "Ambition Sadiyan"
 sdy_land_of_glory:0 "Terre de gloire"
 sdy_land_of_glory_desc:0 "Sadiya a prospéré dans cette région en tant que royaume depuis que le grand Birpal a fondé notre pays. Bien que notre peuple ne soit pas originaire d'ici, nous avons fait de cette région notre foyer, et notre histoire ici remonte bien plus loin que celle de nos voisins Ahom. C'est notre terre et nous la défendrons jusqu'au dernier homme ou femme ; la mort avant le déshonneur."
 sdy_crossroad_of_religions:0 "Carrefour des religions"
 sdy_crossroad_of_religions_desc:0 "Notre pays se situe à l'axe du Tibet, de la Birmanie et de l'Inde, et l'influence de tous ces voisins se fait sentir ici. Haut dans les régions montagneuses que nous contrôlons se trouvent des monastères bouddhistes, tandis que les religions animistes prospèrent encore parmi les tribus des collines. La plupart des Sutiya eux-mêmes ont cependant adopté la religion hindoue de nos voisins du sud. Notre État est habitué à abriter de nombreuses fois différentes, et cette force nous permet de prospérer dans cette région hétérogène."
 sdy_hills_and_jungles:0 "Collines et jungles"
 sdy_hills_and_jungles_desc:0 "Dominé par des collines, des forêts et les hautes montagnes de l'Himalaya oriental, notre pays est une beauté rare pour certains, mais une ligne de défense inhospitalière pour d'autres. Émerveillons-nous de ce qui est nôtre et défendons-le en même temps en construisant des fortifications qui tirent parti de nos défenses naturelles."
 sdy_temples:0 "Temples de Sadiya"
 sdy_temples_desc:0 "La nature est une force puissante dans cette région, toujours prête à reprendre ce qui n'est pas entretenu. Un État fort doit construire et maintenir de grands temples et monuments, pour plaire aux dieux et montrer la gloire de notre pays à notre peuple et aux étrangers."
 sdy_dihang:0 "Dihang"
 sdy_dihang_desc:0 "Les eaux du grand fleuve Dihang ont parcouru un long chemin pour nous atteindre avant de tourner vers le sud-ouest dans les régions basses où il est connu sous le nom de Brahmapoutre. Le fleuve est à la fois une source de nourriture, d'eau et de transport. Il lie la vallée ensemble et nous permet de voyager plus loin en une journée que nous ne pourrions l'espérer autrement."
 sdy_army_reform:0 "Réformer les armées de Sadiya"
 sdy_army_reform_desc:0 "Certains prétendent que c'est de nous que les Chinois ont jadis appris l'existence de la poudre à canon. Si c'est vrai, ce n'est pas un héritage que nous avons mal géré. Adoptons les tactiques des nations de l'extrême ouest et faisons de notre infanterie la partie la plus forte de notre armée."
 sdy_black_tea:0 "Thé noir"
 sdy_black_tea_desc:0 "Le thé est une plante indigène de cette partie du monde, et nos terres sont idéalement adaptées pour le cultiver. Avec l'arrivée de marchands étrangers tant en Inde qu'en Chine, la demande pour cette plante a augmenté de façon astronomique. Donnons aux marchands étrangers ce qu'ils cherchent et investissons dans de grandes plantations de thé dans notre pays."
 MLB_ideas:0 "Idées de Manipur"
 MLB_ideas_start:0 "Traditions de Manipur"
 MLB_ideas_bonus:0 "Ambition de Manipur"
 mlb_sanamahism:0 "Sanamahisme"
 mlb_sanamahism_desc:0 "Ni les influences brahmaniques ni bouddhistes n'ont jamais gagné beaucoup d'adeptes ici. Le peuple de Manipur est fermement enraciné dans la foi de nos ancêtres avec leurs plus de 360 divinités. Cette religion ancienne ne nous vaudra peut-être pas beaucoup d'amis dans un monde de castes, de moines et de grandes communautés religieuses, mais dans ces collines, nos traditions nous donnent de la force."
 mlb_martial_traditions:0 "Traditions martiales"
 mlb_martial_traditions_desc:0 "En tant que petit État de vallée entouré de voisins plus grands, nous avons toujours dû nous engager pleinement dans la guerre sous peine d'être détruits. Les rois et reines de Manipur se sont toujours tenus prêts à mener nos armées sur le champ de bataille contre nos ennemis Shan ou Kachar."
 mlb_kingdom_of_the_meitei:0 "Royaume des Meitei"
 mlb_kingdom_of_the_meitei_desc:0 "Contrairement à la plupart des États de cette région, le royaume de Manipur a des racines remontant à des millénaires. Nos légendes et mythes racontent les histoires de rois qui ont uni les Meitei, les Nagas et d'autres tribus de cette région pour fonder le cœur de ce qui est notre État aujourd'hui."
 mlb_mayek:0 "Mayek"
 mlb_mayek_desc:0 "Là où d'autres ont recherché le confort des écritures et traditions littéraires largement répandues, notre royaume a plutôt cultivé l'écriture ancienne de nos ancêtres. Les traditions littéraires manipuriennes nous sont distinctement propres et ne reflètent ni celles des Shan à l'est ni celles des Bengalis à l'ouest."
 mlb_unite_the_hill_tribes:0 "Unir les tribus des collines"
 mlb_unite_the_hill_tribes_desc:0 "Les collines et vallées de Manipur ont toujours été assez diverses, et un grand nombre de chefs mineurs détiennent le pouvoir sur diverses constellations tribales. Unissons nos régions, par la force si nécessaire, pour créer un État manipurien plus fort et plus unifié."
 mlb_bengali_influence:0 "Influence bengalie"
 mlb_bengali_influence_desc:0 "Bien que notre royaume ait toujours rejeté les influences extérieures plus fortes, peut-être le moment est-il venu de cultiver des liens plus étroits avec l'ouest. Un nombre croissant de notre peuple a déjà embrassé la religion hindoue aux côtés de la foi de nos ancêtres, et apprendre l'écriture et la langue de nos voisins ne peut qu'aider à accroître notre influence dans la région."
 mlb_far_reaching_diplomacy:0 "Diplomatie de grande envergure"
 mlb_far_reaching_diplomacy_desc:0 "Il est bon de tenir ferme contre les envahisseurs, mais un État sans amis ne peut survivre éternellement. Cherchons de nouveaux alliés parmi les pays de l'extrême ouest et tentons de les impliquer et de les mêler à la politique de cette région pour servir nos desseins."
 somali_ideas:0 "Idées somaliennes"
 somali_ideas_start:0 "Traditions somaliennes"
 somali_ideas_bonus:0 "Ambition somalienne"
 somali_maritime_heritage:0 "Héritage maritime"
 somali_maritime_heritage_desc:0 "Depuis des temps immémoriaux, les navires somaliens ont voyagé vers des marchés lointains, de la péninsule arabique, de la côte swahilie et de l'Égypte jusqu'à l'Inde, la Perse ou même plus loin. Le long des côtes de Sarhal, un grand nombre de cités maritimes somaliennes ont prospéré et prospèrent encore aujourd'hui, perpétuant cet héritage."
 somali_qalqads:0 "Qalqads"
 somali_qalqads_desc:0 "Le meilleur moyen d'être en sécurité dans un monde aussi dangereux que celui-ci est de construire un mur. Un certain nombre de forts judicieusement placés à travers notre royaume aideront à défendre nos ports contre les pirates occidentaux et nos établissements contre les vagues de pasteurs nomades de l'intérieur."
 somali_clans:0 "Clans somaliens"
 somali_clans_desc:0 "Bien que la loyauté de tous nos sujets envers l'État soit indubitablement grande, il existe un lien qui va au-delà des frontières que certains voudraient tracer sur les cartes. Nous pouvons toujours compter sur nos membres de clan pour nous soutenir, comme ils comptent sur nous pour les soutenir. Qu'ils résident à l'intérieur de nos frontières ou non, ils sont une ressource supplémentaire à laquelle puiser en temps de besoin."
 somali_offensive_warfare:0 "Guerre offensive"
 somali_offensive_warfare_desc:0 "L'islam est loin d'être une religion jeune dans cette région, mais il n'est pas aussi fermement enraciné que dans certaines autres régions du monde. De puissants royaumes chrétiens sont venus menacer notre État par le passé, et avec l'arrivée de navires chrétiens occidentaux le long des côtes de Sarhal oriental, il semble que certaines mesures de précaution soient nécessaires. Tournons-nous vers le monde musulman plus large pour son expertise et son équipement. Que nos armées soient aussi redoutables que celles de l'Empire ottoman."
 somali_indian_ocean_trade:0 "Commerce de l'océan Indien"
 somali_indian_ocean_trade_desc:0 "L'océan Indien est à bien des égards une grande sphère économique. La demande d'esclaves dans le Deccan indien ou de notre abondant encens au Yémen dicte les conditions de notre économie. Considérons sagement nos politiques concernant ce commerce afin que nous puissions nous enrichir plutôt que de risquer que les marchands se tournent vers les ports de nos voisins."
 somali_corsairs_of_the_red_sea:0 "Corsaires de la mer Rouge"
 somali_corsairs_of_the_red_sea_desc:0 "Nous ne sommes pas les seuls à nous intéresser aux richesses de l'océan Indien et de la mer Rouge. Qu'il s'agisse de pirates occidentaux ou de corsaires arabes, tous cherchent à profiter du commerce dont nous vivons. Nous devons relever ce défi et encourager nos propres corsaires à porter le combat chez l'ennemi."
 somali_perso_arab_influx:0 "Afflux arabe et persan"
 somali_perso_arab_influx_desc:0 "Certains en sont venus à considérer nos terres comme un refuge lorsque leurs patries sombrent dans des conditions de plus en plus chaotiques. Mettons l'accent sur cette tendance et essayons d'attirer les précieux talents du monde musulman plus large vers nos frontières où ils peuvent être mis à profit."
 PEG_ideas:0 "Idées de Pégou"
 PEG_ideas_start:0 "Traditions de Pégou"
 PEG_ideas_bonus:0 "Ambition de Pégou"
 peg_riches_of_pegu:0 "Richesses de Pégou"
 peg_riches_of_pegu_desc:0 "À l'embouchure de l'Irrawaddy, nos ports sont les entrepôts naturels de tous les biens de la Haute-Birmanie. Joyaux, rubis, éléphants, teck, musc et autres marchandises précieuses sont expédiés à travers nos ports vers la Chine, l'Inde et même plus loin à l'ouest. Les richesses de notre grande cité sont telles que le reflet du plus petit éclat de lumière sur nos tissus et murs dorés peut aveugler le voyageur imprudent la nuit."
 peg_martabans:0 "Martabans"
 peg_martabans_desc:0 "Notre pays est célèbre pour les vases et jarres que nous produisons à partir de l'argile et du sable de nos berges. Les vases Martaban sont utilisés dans tout Haless du Sud-Est, à terre comme sur les navires, pour stocker l'eau nécessaire aux longs voyages."
 peg_dhammazedi_pyatton:0 "Dhammazedi Pyatton"
 peg_dhammazedi_pyatton_desc:0 "Nos souverains sont fiers d'être toujours justes et prudents lorsqu'ils dispensent la justice de l'État. À cette fin, ils se forment tous pleinement dans toutes les matières relatives au droit et à la religion, et leurs sages jugements sont devenus largement connus ici et à l'étranger. Créons des recueils de ces jugements afin que même les tribunaux locaux les plus éloignés puissent bénéficier de la sagesse du trône."
 peg_rammanadesa:0 "Ramannadesa"
 peg_rammanadesa_desc:0 "L'histoire du peuple Môn dans cette région remonte à plus de mille ans. Les Môn ou Raman ont vécu ici bien avant nombre des groupes qui chercheraient maintenant à contrôler la région. Cherchons l'inspiration dans les anciennes légendes de notre pays et chérissons nos traditions ancestrales."
 peg_dynamic_warfare:0 "Guerre dynamique"
 peg_dynamic_warfare_desc:0 "Nos traditions militaires nous ont bien servis au fil des ans, mais il y a des choses que nous pourrions apprendre des étrangers. Invitons des officiers étrangers de près et de loin. De la France aux États Shan plus proches, il y a des techniques et des armes que nous n'avons pas encore maîtrisées et que nous ferions bien d'incorporer."
 peg_buddhist_traditions:0 "Royauté bouddhiste"
 peg_buddhist_traditions_desc:0 "La monarchie Môn a toujours été fortement liée aux traditions Theravada de notre peuple, et dans ce pays, même un moine peut devenir roi. N'oublions jamais cette force historique et faisons tout notre possible pour maintenir le moral de notre communauté religieuse, sous peine d'être déposés comme souverains indignes."
 peg_mon_diaspora:0 "Diaspora Môn"
 peg_mon_diaspora_desc:0 "Au fil des siècles de luttes pour le paysage fluvial de la Basse-Birmanie, nombre de Môn ont fui vers d'autres parties de Haless. Les marchands, soldats et moines Môn jouent un rôle dans la politique intérieure de nombre de nos voisins, et maintenant que nous avons consolidé notre emprise sur les terres ancestrales Môn, nous pouvons utiliser leur influence à notre avantage."
 KUT_ideas:1 "Idées bornéennes"
 KUT_ideas_start:1 "Traditions bornéennes"
 KUT_ideas_bonus:1 "Ambition bornéenne"
 kut_earliest_indic_state:0 "Plus ancien État indien"
 kut_earliest_indic_state_desc:0 "Comme la plupart des États parmi ces îles, nous avons des liens anciens avec le sous-continent indien. Notre royaume est réputé être l'un des plus anciens royaumes indiens existants qui surgirent jadis sur toutes ces îles. Chérissant ces traditions brahmaniques, nous sommes toujours chez nous dans tous les grands ports d'Inde, et les voyageurs et marchands du sous-continent sont toujours les bienvenus parmi nous."
 kut_muslim_trading_communities:0 "Communautés marchandes musulmanes"
 kut_muslim_trading_communities_desc:0 "La foi islamique s'est répandue comme une traînée de poudre dans notre région, tant par les conversions le long des côtes que par l'arrivée de marchands venus de loin. Afin de prospérer dans cette région, nous devons accueillir ces nouveaux venus et éviter d'aliéner ceux qui se convertissent comme ceux qui ne le font pas."
 kut_riches_of_borneo:0 "Richesses de Bornéo"
 kut_riches_of_borneo_desc:0 "Depuis des siècles, les marchands viennent de Chine et d'Inde en quête des richesses de ces forêts. Ivoire, teck, perles, jade et bois médicinaux peuvent tous être trouvés en abondance ici. Nous devons surveiller étroitement ce commerce afin de le contrôler et de le taxer sagement."
 kut_anti_piracy_measures:0 "Mesures anti-piraterie"
 kut_anti_piracy_measures_desc:0 "Les pirates deviennent de plus en plus audacieux dans leurs raids, et certains ont même commencé à remonter dans les deltas où se situent nos ports de commerce les plus précieux. Nous devons agir de manière décisive contre cette menace en renforçant nos fortifications, en déplaçant une partie de nos richesses encore plus à l'intérieur des terres et en patrouillant nos côtes."
 kut_encourage_immigration:0 "Encourager l'immigration"
 kut_encourage_immigration_desc:0 "Cet archipel a connu sa part de guerres et de changements politiques brutaux au fil des ans, et avec l'arrivée de navires et de colons cannoréens dans cette région, cela n'a fait qu'augmenter. Combiné à la grande facilité avec laquelle on peut se déplacer entre ces îles, il y a une migration constante de personnes d'une île à l'autre. Notre État a toujours prospéré en laissant entrer les étrangers ; accueillons ceux qui souhaitent s'installer ici et assignons-leur des lieux pour vivre."
 kut_consolidation_of_kutai:0 "Consolidation de Kutai"
 kut_consolidation_of_kutai_desc:0 "Bien que nous soyons devenus l'État dominant de la côte de Kutai, il existe un certain nombre d'autres royaumes où notre peuple vit dans diverses principautés et royaumes. Unissons le peuple Kutai en un seul royaume avec des règles centrales fortes que tous doivent suivre."
 kut_subdue_the_inlands:0 "Soumettre l'intérieur des terres"
 kut_subdue_the_inlands_desc:0 "De nombreuses parties des forêts et des montagnes de l'intérieur sont hors de notre contrôle, avec diverses constellations tribales et micro-États professant la vassalité quand cela leur convient. Étendons notre autorité sur ces peuples et formalisons notre relation une fois pour toutes."
 sulawesi_ideas:0 "Idées de Sulawesi"
 sulawesi_ideas_start:0 "Traditions de Sulawesi"
 sulawesi_ideas_bonus:0 "Ambition de Sulawesi"
 sulawesi_intra_asian_trade:0 "Réseau commercial intra-halessi"
 sulawesi_intra_asian_trade_desc:0 "Bien que notre île ne soit guère plus qu'une escale sur le chemin des marchands de terres plus riches et plus influentes, nous bénéficions grandement du trafic intense de navires de commerce qui sillonnent ces îles. Les marchands chinois, indiens ou javanais fréquentent tous nos ports, et plus nous les rendons attractifs, plus notre importance dans ce réseau grandit."
 sulawesi_bajau:0 "Les Bajau"
 sulawesi_bajau_desc:0 "Toutes les îles de Haless du Sud-Est sont fréquentées par les Bajau, bien que personne ne se souvienne plus de leur origine. Connus par les leurs sous le nom de Sama, les Bajau passent toute leur vie sur leurs bateaux et vivent du commerce et des raids sur les différents ports des îles qui nous entourent. Encourageons ces marins naturels à venir dans nos ports pour vendre leurs marchandises et reconstituer leurs stocks afin que nous puissions nous enrichir de leurs voyages et apprendre leurs secrets."
 sulawesi_prau:0 "Le Prau"
 sulawesi_prau_desc:0 "Un Prau est un type de navire local à cette partie du monde, et les plus célèbres d'entre eux proviennent de nos terres. Bien que variant en taille et en forme, ces navires nous permettent de déplacer rapidement de grandes quantités de marchandises et de personnes le long de nos côtes et entre les îles de l'archipel."
 sulawesi_unification:0 "Unification de Sulawesi"
 sulawesi_unification_desc:0 "Au sein de nos terres, un grand nombre de petits souverains exercent leur pouvoir, et bien qu'ils nous reconnaissent tous comme leur « frère aîné » et supérieur parmi les égaux, la perpétuation de la prétention que le pouvoir peut être partagé cause plus de tensions qu'elle n'en vaut la peine. Unifions pleinement ces terres et récoltons les fruits du contrôle direct des parties agricoles et maritimes de l'île."
 sulawesi_learning_from_outsiders:0 "Encourager la diffusion des idées"
 sulawesi_learning_from_outsiders_desc:0 "Afin de tirer le meilleur parti de notre situation, nous devons nous efforcer d'apprendre de nos voisins. Il y a des idées et des concepts dans tout Haless du Sud-Est que nous ferions bien d'étudier et d'adapter à notre propre société. Envoyons nos hommes les plus doués à l'étranger pour étudier les voies des Chinois, des Européens et des peuples des autres îles. Interrogeons également tout étranger fréquentant nos ports pour obtenir de nouvelles idées. Si ce que nous apprenons s'avère utile, nous devons créer des concepts similaires adaptés aux besoins de notre propre peuple."
 sulawesi_entrepot:0 "Entrepôt commercial"
 sulawesi_entrepot_desc:0 "Des puissances extérieures voudraient contrôler le commerce de ces îles et nous forcer tous à utiliser exclusivement leurs ports. Ils visent à tirer le maximum de profit de chaque article vendu, et leur influence menace d'étouffer l'ancien réseau commercial de notre région. Ouvrons nos propres ports aux marchands de toutes nationalités, rivalisant avec les étrangers en offrant des prix bien plus bas."
 sulawesi_assymetrical_warfare:0 "Résistance asymétrique"
 sulawesi_assymetrical_warfare_desc:0 "Cet archipel est idéal pour les raids et les pirates, et les montagnes et forêts de l'intérieur offrent d'aussi bonnes opportunités de rendre la vie amère à un envahisseur étranger. En tant qu'autochtones de cette région, nous pouvons mieux utiliser ces faits que la plupart, et nous devrions le faire pour contrer les incursions hostiles des puissances étrangères."
 mayan_ideas:0 "Idées mayas"
 mayan_ideas_start:0 "Traditions mayas"
 mayan_ideas_bonus:0 "Ambition maya"
 mayan_sacred_cenote:0 "Le Cénote sacré"
 mayan_sacred_cenote_desc:0 "Bien que Chichén Itzá soit une ruine abandonnée, son cénote reste l'un de nos sites les plus sacrés. Le puits est une entrée vers l'au-delà, et les sacrifices rituels qui y sont accomplis ont plus de pouvoir que ceux accomplis ailleurs."
 mayan_building_traditions:0 "Traditions de construction"
 mayan_building_traditions_desc:0 "Depuis des temps immémoriaux, nous avons bâti d'immenses cités et de grandes pyramides dans une terre de jungle hostile."
 mayan_ancient_feuds:0 "Querelles ancestrales"
 mayan_ancient_feuds_desc:0 "Xiu, Cocom et Itzá ont été pendant de nombreuses ères les maisons régnantes du peuple maya au Yucatán. Leur lutte, et les nombreuses trahisons les uns envers les autres, ont laissé derrière elles un riche héritage de querelles et d'offenses en attente de règlement."
 mayan_shipwreck_survivors:0 "Survivants de naufrages"
 mayan_shipwreck_survivors_desc:0 "Des étrangers ont commencé à échouer sur nos rivages, prétendant avoir traversé la mer dans de grands bateaux ailés, avant d'en tomber. Certains se sont mariés parmi notre peuple et sont devenus des conseillers honorés de nos souverains."
 mayan_kuchkabal:0 "Kuchkabal"
 mayan_kuchkabal_desc:0 "Depuis avant la chute de Mayapán, notre terre a été divisée en provinces. Bien qu'elles soient maintenant devenues des zones autonomes, elles restent un moyen efficace d'administrer le territoire."
 mayan_remote_isolation:0 "Isolement reculé"
 mayan_remote_isolation_desc:0 "Certaines de nos villes sont si profondément enfouies dans la jungle qu'elles sont effectivement hors de portée des ennemis, les rendant bien plus difficiles à conquérir."
 mayan_caste_war:0 "Guerre des castes"
 mayan_caste_war_desc:0 "Nous ne devons tolérer, ne serait-ce qu'un instant, la domination étrangère sur notre peuple. Peu importe combien de temps nous devrons attendre, nous nous soulèverons à nouveau pour chercher notre liberté."
 KIC_ideas:0 "Idées K'iche"
 KIC_ideas_start:0 "Traditions K'iche"
 KIC_ideas_bonus:0 "Ambition K'iche"
 kic_blessings_of_tohil:0 "Bénédictions de Tohil"
 kic_blessings_of_tohil_desc:0 "Notre dieu tutélaire est le seigneur du ciel. Par lui viennent la pluie et le soleil qui rendent notre terre fertile, et qui nous protègent de la famine."
 kic_ilokab:0 "Traditions Ilo'kab"
 kic_ilokab_desc:0 "La lignée Ilo'kab a longtemps fourni des guerriers à notre peuple, et leurs traditions de combat ont été affinées au maximum en conséquence. Nous avons la chance d'avoir de tels combattants à nos côtés."
 kic_wealth_of_tamub:0 "Richesse des Tamub"
 kic_wealth_of_tamub_desc:0 "Le commerce et la production ont longtemps été le souci de la lignée Tamub. Ils ont beaucoup appris des voies du commerce, et grâce à eux, nous pouvons grandement enrichir notre nation."
 kic_titulos:0 "Títulos"
 kic_titulos_desc:0 "En enregistrant les noms et les hauts faits de nos glorieux ancêtres, nos maisons nobles peuvent assurer leur droit de gouverner et la puissance de notre nation."
 kic_kiqabs_vengeance:0 "Vengeance de K'iq'ab"
 kic_kiqabs_vengeance_desc:0 "Notre peuple chante encore le récit de la vengeance de notre seigneur K'iq'ab, qui nous mena dans une grande bataille aux côtés de nos alliés Kaqchikel pour venger le meurtre de son père par les traîtres K'oja."
 kic_popul_vuh:0 "Popol Vuh"
 kic_popul_vuh_desc:0 "Nous avons consigné notre histoire depuis l'aube de la création jusqu'à ce jour même, afin qu'elle perdure au-delà de notre temps."
 moluccan_ideas:0 "Idées moluquoises"
 moluccan_ideas_start:0 "Traditions moluquoises"
 moluccan_ideas_bonus:0 "Ambition moluquoise"
 moluccan_spice_islands:0 "Les îles aux épices"
 moluccan_spice_islands_desc:0 "Depuis des milliers d'années, les clous de girofle, la muscade, le bois de santal et autres épices de nos îles ont atteint les tables les plus raffinées de Cannor, de Chine, d'Inde et de Perse. Ce long voyage comporte de nombreuses étapes, mais il commence ici, parmi nos îles et les sources d'épices incroyablement productives qu'elles représentent."
 moluccan_cultural_heritage:0 "Héritage culturel commun"
 moluccan_cultural_heritage_desc:0 "Bien que la diversité soit grande parmi les îles aux épices, il existe certains mythes et traditions connus parmi les peuples de toutes ces îles. Ces récits nous aident à identifier les vrais souverains et donnent à notre royaume grandissant sa légitimité."
 moluccan_dominance_over_the_outer_islands:0 "Domination sur les îles extérieures"
 moluccan_dominance_over_the_outer_islands_desc:0 "À première vue, il nous manquerait la population et les terres pour tenir tête aux autres États. Ce que nous avons, cependant, c'est un réseau de ports et d'îles loyaux s'étendant loin dans l'archipel qui nous entoure. Toutes ces îles nous soutiendront et nous permettront de contrôler leur production d'épices. Cependant, pour tirer pleinement parti de cette influence, nous devons étendre et faire respecter ce réseau et centraliser le pouvoir de nos îles centrales."
 moluccan_agents_of_trade:0 "Agents du commerce"
 moluccan_agents_of_trade_desc:0 "À travers ces îles, dans les nombreuses baies, ports et embouchures de rivières, il y a des marchandises et des tributs à collecter. Envoyons un certain nombre d'agents commerciaux permanents pour veiller à nos intérêts dans les différentes parties de l'archipel et maintenir notre monopole sur les précieuses marchandises que nous exportons ensuite vers le reste du monde."
 moluccan_four_kingdoms:0 "Quatre royaumes"
 moluccan_four_kingdoms_desc:0 "Il y avait jadis quatre royaumes dans les îles de Maluku, et même si tous ne subsistent pas, ils continuent de jouer un rôle important tant dans les cérémonies royales de notre peuple que comme légende commune autour de laquelle se rassembler en temps de difficultés."
 moluccan_ally_papuan_raiders:0 "Alliance avec les Papous"
 moluccan_ally_papuan_raiders_desc:0 "Tout au long des siècles, les Papous ont attaqué les îles et les navires de cette région. Avec la présence cannoréenne croissante dans la région, cependant, nous devons mettre ces choses derrière nous et nous unir contre les forces extérieures hostiles."
 moluccan_pragmatic_diplomacy:0 "Diplomatie pragmatique"
 moluccan_pragmatic_diplomacy_desc:0 "S'il est vrai que les Européens semblent indignes de confiance, ils sont également traîtres les uns envers les autres. Cherchons à nous allier ces nouveaux venus quand cela nous convient et à les écarter quand leur aide n'est plus requise."
 LDK_ideas:0 "Idées du Ladakh"
 LDK_ideas_start:0 "Traditions du Ladakh"
 LDK_ideas_bonus:0 "Ambition du Ladakh"
 ldk_two_kingdoms:0 "Les deux royaumes du Ladakh"
 ldk_two_kingdoms_desc:0 "Jadis, le Ladakh était divisé en deux royaumes gouvernés par deux frères. Un jour, quand un monarque digne sera né de l'une des lignées, ces royaumes seront à nouveau unis et une nouvelle dynastie victorieuse guidera notre peuple vers l'avenir."
 ldk_fortified_mountain_cities:0 "Cités montagnardes fortifiées"
 ldk_fortified_mountain_cities_desc:0 "Notre pays a vu des ennemis aller et venir. Du grand Empire tibétain au grand royaume Karkota du Cachemire sous Lalitaditya, jusqu'aux pillards islamiques qui nous hantent maintenant. Les montagnes qui sont notre foyer sont cependant aussi nos châteaux. Fortifions davantage les défenses naturelles que nous possédons et ne craignons plus jamais envahisseur ou pillard."
 ldk_wool_from_the_roof_of_the_world:0 "Laine du toit du monde"
 ldk_wool_from_the_roof_of_the_world_desc:0 "Haut au-dessus du reste du monde, le plateau du Ladakh semble avoir peu à offrir comparé aux plaines fertiles de l'Inde ou même aux cités marchandes du bassin du Tarim. Depuis aussi longtemps que quiconque s'en souvienne, cependant, les nomades Changpa sont passés et repassés sur nos terres, faisant paître leurs chèvres Changpa qui donnent la laine la plus fine imaginable, une denrée très recherchée par tous nos voisins."
 ldk_great_monasteries:0 "Construction de grands monastères"
 ldk_great_monasteries_desc:0 "Nos liens religieux avec le Tibet ont rendu notre société plus forte que nos voisins musulmans et hindous qui voudraient contrôler nos terres pour taxer notre commerce et voler notre laine. Renforçons encore la foi en construisant de grands monuments, des Gompas et des monastères dans ces hautes montagnes et en soutenant les ordres monastiques chaque fois que nous le pouvons."
 ldk_la_dvags_rgyal_rabs:0 "La dvags rgyal rabs"
 ldk_la_dvags_rgyal_rabs_desc:0 "En consignant les destins des monarques qui nous ont précédés, nous pouvons être sûrs que le monde n'oubliera jamais les origines de notre dynastie victorieuse. Même dans un temps éloigné du nôtre, nous pouvons être sûrs que nos chroniques royales garderont vivante la mémoire de notre royaume."
 ldk_kingdom_united:0 "Un royaume uni"
 ldk_kingdom_united_desc:0 "Afin d'éviter les conflits et la discorde entre les nombreux fils de nos monarques, nous devons écouter les conseils des sages Lamas de nos monastères. Un seul fils doit être autorisé à hériter de la couronne, tandis que ses frères peuvent venir diriger chacun l'un des nombreux monastères de notre pays. De cette façon, la famille pourra mettre à profit son potentiel au lieu de le gaspiller en querelles de succession."
 ldk_far_away_traders:0 "Inviter les marchands lointains"
 ldk_far_away_traders_desc:0 "La laine que notre royaume exporte a acquis une renommée de plus en plus grande à l'étranger. Nous avons reçu des lettres de l'empereur de Chine ainsi que du tsar russe. Nous devrions mettre à profit la renommée que nos chèvres nous ont apportée et encourager le commerce étranger afin de nous enrichir."
 ZIM_ideas:0 "Idées Mutapa"
 ZIM_ideas_start:0 "Traditions Mutapa"
 ZIM_ideas_bonus:0 "Ambition Mutapa"
 zim_mwenemutapa:0 "Mwenemutapa"
 zim_mwenemutapa_desc:0 "Le déclin du Grand Zimbabwe a engendré l'instabilité politique, et des chefs locaux autonomes ont prospéré dans son sillage. En tant que princes des peuples conquis, il nous incombe de maintenir une armée puissante afin d'imposer l'unité sur ces terres brisées."
 zim_rekindling_the_royal_fires:0 "Raviver les feux royaux"
 zim_rekindling_the_royal_fires_desc:0 "Pour que nos chefs subordonnés prouvent leur loyauté devant nous et devant les dieux, ils doivent chaque année voyager jusqu'à la capitale pour raviver leur feu local à l'aide du nôtre. Une fois l'année écoulée, notre armée éteindra leur feu et ils devront entreprendre un nouveau voyage."
 zim_mutapa_architecture:0 "Architecture Mutapa"
 zim_mutapa_architecture_desc:0 "Notre État faisait jadis partie de l'empire du Grand Zimbabwe, et bien que son déclin soit maintenant derrière nous, nous chérissons toujours certaines de ses traditions. C'est du Grand Zimbabwe que nous avons hérité le style et la technique que nous utilisons pour construire nos maisons de pierre et nos cités fortifiées, ce qui nous a permis de contrôler ce plateau si efficacement."
 zim_spokesman_before_the_dead:0 "Porte-parole devant les morts"
 zim_spokesman_before_the_dead_desc:0 "Notre souverain n'est pas seulement notre dirigeant au sens temporel, mais on attend aussi de lui qu'il parle en notre nom devant les esprits des morts. Avant toute campagne ou récolte, il communiquera notre respect et nos besoins aux esprits de nos ancêtres par des cérémonies ou des danses. Sans un grand souverain pour entretenir les tombes royales et maintenir un contact étroit avec nos morts, les choses pourraient très vite mal tourner pour notre pays."
 zim_elected_administrators:0 "Administrateurs élus"
 zim_elected_administrators_desc:0 "Traditionnellement, tous les administrateurs importants, même au niveau local, ont été nommés parmi la famille royale élargie. Cependant, à mesure que notre empire a grandi et mûri, il est temps que nous puisions dans le savoir local de nos sujets et leur permettions d'élire leurs propres administrateurs."
 zim_curva:0 "Curva"
 zim_curva_desc:0 "Avec l'arrivée de nouveaux marchands dans la région du Zambèze, nous devons nous assurer que notre autorité est respectée. Quiconque souhaite faire du commerce ici et emporter notre précieux or et ivoire vers d'autres rivages doit d'abord être approuvé par notre souverain et nous payer la taxe Curva afin d'obtenir le libre accès. En cas de retard de paiement, toutes les marchandises étrangères seront confisquées par l'État Mutapa."
 zim_controlling_the_mutapan_riches:0 "Contrôler les richesses Mutapa"
 zim_controlling_the_mutapan_riches_desc:0 "Les voyageurs occidentaux ont nommé notre terre Ophir, et les mines d'or du plateau ainsi que le contrôle du commerce du Zambèze ont suscité bien des envieux au fil des siècles. Étendons un contrôle plus direct sur ces terres et les ressources sous notre autorité, et évitons les incursions des étrangers cupides comme des potentats locaux."
 BAL_ideas:0 "Idées baloutches"
 BAL_ideas_start:0 "Traditions baloutches"
 BAL_ideas_bonus:0 "Ambition baloutche"
 bal_natural_defences:0 "Défenses naturelles"
 bal_natural_defences_desc:0 "Comme toute armée depuis l'époque d'Alexandre l'a appris, nos terres peuvent être assez hostiles aux envahisseurs extérieurs. Des montagnes entrecoupées de passes traîtresses, des déserts et des collines attendent tout ennemi, et la population elle-même est habituée à utiliser ce terrain à son avantage pour tendre des embuscades et décimer tout groupe armé ayant l'intention de traverser ces terres."
 bal_hani_and_sheh_mureed:0 "Hani et Sheh Mureed"
 bal_hani_and_sheh_mureed_desc:0 "Nous vivons à une époque d'opportunités et de défis. L'impact de nos décisions est tel que des ballades et légendes s'écrivent déjà sur les héros et guerriers de cette ère. Agissons conformément au code baloutche et donnons à ceux qui viendront après nous un idéal auquel aspirer pour les générations à venir."
 bal_khan_of_the_baloch:0 "Khan des Baloutches"
 bal_khan_of_the_baloch_desc:0 "Les Baloutches sont un peuple fier mais divisé. Habitués à jouir de la liberté de l'indépendance, nous sommes peut-être freinés par notre manque d'unité. Nommons notre souverain Khan de tous les Baloutches et unissons-nous derrière une cause commune. Nos voisins ne seront plus jamais en sécurité."
 bal_reorganization_of_the_army:0 "Réorganisation de l'armée"
 bal_reorganization_of_the_army_desc:0 "Les loyautés tribales sont fortes dans nos terres, et à bien des égards, essayer de les supplanter par la loyauté envers notre État peut être un exercice vain. Au lieu d'essayer de créer une armée comme celle de nos voisins indiens ou persans, travaillons avec le système que nous avons. Chaque tribu majeure devrait être tenue responsable de créer et maintenir une armée selon nos normes et de payer les expéditions que nous ordonnons. En retour, nous renforcerons leur autorité sur les tribus mineures sous leur contrôle."
 bal_control_of_the_overland_trade:0 "Contrôler le commerce terrestre"
 bal_control_of_the_overland_trade_desc:0 "Nous contrôlons une région considérée comme dangereuse voire intraversible par beaucoup, et les pillards de nos terres ont pendant des millénaires rançonné les marchands des régions environnantes. Pourtant, il est possible de traverser le Baloutchistan et le Makran de Kaboul au Sindh, et nous connaissons les passes et les chemins à travers les montagnes et les déserts. Ouvrons nos routes aux marchands et taxons-les pour notre protection."
 bal_chiefs_and_landlords:0 "Chefs et propriétaires terriens"
 bal_chiefs_and_landlords_desc:0 "Traditionnellement, les chefs tribaux, souvent élus au sein de leurs clans, contrôlent les terres et leur production dans cette région. Il est temps de créer un système plus efficace où nous nommons un chef pour agir comme propriétaire terrien en notre nom. De cette façon, nous savons qui est responsable et où se situent ses loyautés, et nous pouvons contrôler la production à un degré bien supérieur à aujourd'hui."
 bal_baluch_leadership:0 "Commandement baloutche"
 bal_baluch_leadership_desc:0 "Nos troupes ont acquis une solide réputation en combattant comme mercenaires ou alliés dans les armées d'autres nations en Perse ou dans le sous-continent. Utilisons leur expérience et leurs nouveaux contacts pour faire émerger une nouvelle génération d'officiers professionnels et compétents."
 ORL_ideas:0 "Idées orléanaises"
 ORL_ideas_start:0 "Traditions orléanaises"
 ORL_ideas_bonus:0 "Ambition orléanaise"
 orl_brothers_of_kings:0 "Monsieur d'Orléans"
 orl_brothers_of_kings_desc:0 "Depuis 1344, le duché d'Orléans est traditionnellement donné au second fils du roi de France. La maison d'Orléans n'est seconde qu'après la maison de France elle-même et pourrait même un jour l'éclipser."
 orl_maid_of_orleans:0 "La Pucelle d'Orléans"
 orl_maid_of_orleans_desc:0 "Si le siège d'Orléans nous a appris une chose, c'est qu'une seule pucelle peut changer le cours de l'histoire. Nous ne restreindrons plus les femmes de mener nos armées au combat si elles peuvent inspirer nos soldats à remporter la victoire."
 orl_saffron_of_boynes:0 "Safran de Boynes"
 orl_saffron_of_boynes_desc:0 "L'Orléanais détient tous les atouts pour redevenir un centre de production majeur, après guerres et dévastations : non seulement sa position est un avantage pour le commerce, mais la fertile plaine de Beauce promet un avenir prospère. Bientôt, Boynes sera la capitale du safran de Cannor, sinon du monde, et les marchands afflueront de pays lointains pour acheter la précieuse épice."
 orl_chateaux_of_the_loire_valley:0 "Châteaux de la vallée de la Loire"
 orl_chateaux_of_the_loire_valley_desc:0 "Certains souverains ont mis longtemps avant de vraiment découvrir cette évidence : nulle part en France le temps n'est plus agréable, ni le paysage plus beau et paisible qu'ici. Le secret éventé, de magnifiques nouveaux palais sont construits ici, les châteaux de la Loire, montrant à la fois la puissance de leurs propriétaires et les grands talents de nos architectes."
 orl_faith_and_devotion:0 "Foi et dévotion"
 orl_faith_and_devotion_desc:0 "C'est la foi qui a renversé le cours de la guerre de Cent Ans, et c'est donc la foi qui guidera le bon peuple d'Orléans. De notre cathédrale à notre université, la théologie devrait être enseignée et débattue."
 orl_calvin_and_moliere:0 "Calvin et Molière"
 orl_calvin_and_moliere_desc:0 "Orléans est fidèle à ceux qui l'aiment, et rebelle aux côtés de ceux qui pensent qu'aucune autorité n'est garantie. De Jeanne d'Arc, la pucelle d'Orléans, à Jean Calvin qui étudia le droit ici et rejeta ensuite toute autorité papale, ou Jean-Baptiste Poquelin qui prit plus tard le nom de Molière et se moqua constamment dans ses pièces de toute forme d'hypocrisie en religion ou en société, les enfants d'Orléans ont marqué le monde de leur empreinte."
 ORM_ideas:0 "Idées d'Ormuz"
 ORM_ideas_start:0 "Traditions d'Ormuz"
 ORM_ideas_bonus:0 "Ambition d'Ormuz"
 orm_a_vast_emporium:0 "Un vaste emporium"
 orm_a_vast_emporium_desc:0 "On a dit qu'Ormuz est « un vaste emporium où se trouvaient des peuples et des marchandises de toute description provenant de toutes les régions du monde » ou que « Si le monde entier était un anneau d'or, Ormuz en serait le joyau ». Depuis des siècles, les marchands viennent sur nos îles pour vendre et acheter leurs marchandises, et avec le temps, notre royaume est devenu synonyme de la richesse qu'ils apportent."
 orm_protecting_the_islands:0 "Protéger les îles"
 orm_protecting_the_islands_desc:0 "Bien que Qeshm et Ormuz ne soient peut-être pas les endroits les plus hospitaliers pour servir de base à un royaume, elles sont plus sûres que le littoral, souvent pillé ou attaqué par ceux qui convoitent nos richesses. Construisons de solides forteresses sur ces îles pour protéger ce qui est nôtre et ceux qui viendraient commercer avec nous."
 orm_moqarrariya:0 "Réformer la Moqarrariya"
 orm_moqarrariya_desc:0 "Depuis des temps immémoriaux, nous avons payé les peuples du littoral pour leur protection et pour nous permettre d'accéder à l'eau douce et à la nourriture supplémentaires dont nous avons besoin. Remplaçons cette ancienne institution par une relation plus efficace et formelle."
 orm_far_reaching_diplomacy:0 "Diplomatie de grande envergure"
 orm_far_reaching_diplomacy_desc:0 "Un royaume insulaire doit chercher des amis et des alliés au loin. Recherchons ceux qui nous soutiendraient parmi les ennemis de ceux qui tenteraient de nous subjuguer."
 orm_secure_trading_monopoly:0 "Maintenir le monopole commercial"
 orm_secure_trading_monopoly_desc:0 "Nous avons acquis notre position non seulement en nous assurant que ceux qui commercent dans notre port sont en sécurité ici et en chemin, mais aussi en éliminant ou en surenchérissant sur notre concurrence. Nous devons adopter une politique constante de surveillance des ports de commerce autour du golfe Persique pour nous assurer que nul n'ose tenter de nous surpasser."
 orm_develop_qeshm_and_ormuz:0 "Développer Qeshm et Ormuz"
 orm_develop_qeshm_and_ormuz_desc:0 "Qeshm et Ormuz peuvent sembler inhospitalières et arides, pourtant les îles ont toujours eu une certaine richesse propre : le fer et le sel peuvent tous deux être obtenus ici, et tant que de l'eau et de la nourriture supplémentaires sont apportées du continent, elles peuvent accueillir des cités. Il est temps que nous dépensions une partie de nos richesses pour rendre ce centre de notre royaume plus durable."
 orm_ormuzi_navy:0 "Expansion navale d'Ormuz"
 orm_ormuzi_navy_desc:0 "Pêcheurs, marchands et même pirates ont toujours fréquenté nos îles, et notre État a également entretenu des flottes considérables. Il est cependant grand temps que nous créions une marine plus grande et plus moderne, digne de la réputation de notre royaume comme centre du golfe Persique."
 greek_ideas:0 "Idées grecques"
 greek_ideas_start:0 "Traditions grecques"
 greek_ideas_bonus:0 "Ambition grecque"
 greek_orthodox_faith:0 "Foi orthodoxe grecque"
 greek_orthodox_faith_desc:0 "L'Église grecque se dresse comme la plus ancienne et la plus prestigieuse de toutes les églises orthodoxes, et notre foi chrétienne a toujours été l'une des choses les plus importantes pour unir notre peuple durant les temps difficiles et ardus. Chérissons notre héritage chrétien et trouvons la force dans notre foi."
 greek_maritime_heritage:0 "Héritage maritime"
 greek_maritime_heritage_desc:0 "Depuis des millénaires, le peuple grec a parcouru la mer Divenhal, et bien que des puissances étrangères soient venues dominer la région politiquement, les capitaines et marins grecs constituent encore une part importante de leurs flottes. Tirons de leur expérience ainsi que de celle des pirates, contrebandiers et pêcheurs grecs de toute la région pour créer une marine puissante pour notre État."
 greek_klephtic_irregulars:0 "Recrutement des Klephtes"
 greek_klephtic_irregulars_desc:0 "Les années ardues d'occupation étrangère, tant sous les Francs que sous les Turcs, virent naître une résistance acharnée parmi la population grecque. Certains groupes finirent par se réfugier dans les montagnes et y poursuivirent une résistance violente à l'occupation étrangère. Ces « voleurs » peuvent maintenant être intégrés dans notre armée comme un bras irrégulier efficace, prêts à frapper nos ennemis avec ferveur et expérience."
 greek_phanariotes:0 "Diaspora grecque"
 greek_phanariotes_desc:0 "Les hommes instruits et pleins de ressources sont toujours demandés, et en conséquence, nombre de nos compatriotes ont au fil des siècles émigré pour servir dans les cours de pays de tout Cannor oriental et méridional. Avec un État grec indépendant à nouveau existant, nous pouvons convaincre un certain nombre de ces nationaux grecs de revenir sur les terres de leur enfance ou de leurs ancêtres."
 greek_strengthen_control_over_the_trade_routes:0 "Contrôler le commerce de la Divenhal"
 greek_strengthen_control_over_the_trade_routes_desc:0 "De Rome à Venise et plus tard l'Empire ottoman, beaucoup ont cherché à contrôler le commerce entre l'Est et l'Ouest en conquérant la Grèce et les îles grecques de la Divenhal orientale. En tant qu'État grec indépendant, c'est notre devoir et notre héritage de contrôler ce commerce pour nous-mêmes plutôt que de permettre à d'autres de s'enrichir de notre position stratégique."
 greek_philhellenism:0 "Philhellénisme"
 greek_philhellenism_desc:0 "La Grèce fut jadis le berceau de la civilisation occidentale, et nos ancêtres sont encore révérés à travers tout Cannor. Faisons bon usage de cette réputation pour obtenir les précieuses alliances dont nous avons besoin pour croître."
 greek_enlightenment:0 "Lumières grecques"
 greek_enlightenment_desc:0 "Nos ancêtres furent de grands penseurs, hommes d'État et philosophes, et leurs idées demeurent de solides fondations de pensée rigoureuse à ce jour. Combinons notre fort héritage intellectuel avec le nouvel idéal des Lumières qui a envahi les cours de Cannor. Cela nous permettra de développer des idées d'État et de réformer la langue grecque pour l'adapter à l'ère moderne."
 KGR_ideas:0 "Idées de Kangra"
 KGR_ideas_start:0 "Traditions de Kangra"
 KGR_ideas_bonus:0 "Ambition de Kangra"
 kgr_katoch_lineage:0 "Lignée Katoch"
 kgr_katoch_lineage_desc:0 "Peu d'États peuvent revendiquer un héritage aussi ancien que le nôtre. Les Katoch ont régné pendant des milliers d'années, vu passer Alexandre ou Tamerlan, et continuent de jouer un rôle important à tous égards dans notre pays."
 kgr_riches_of_the_kangra_valley:0 "Richesses de la vallée de Kangra"
 kgr_riches_of_the_kangra_valley_desc:0 "Les légendes racontent que la tête du démon Jalandhara tomba dans la vallée de Kangra après une bataille avec Shiva. Bien qu'entourée de collines arides et de hautes montagnes, notre patrie est verte et luxuriante. La vallée de Kangra nous permet de soutenir une population bien plus grande que notre taille et notre emplacement ne l'indiqueraient, mais c'est aussi une cible tentante pour tout conquérant potentiel."
 kgr_martial_heritage:0 "Héritage martial"
 kgr_martial_heritage_desc:0 "Les traditions martiales de notre peuple remontent loin, et bien que nos cousins dans les États Rajputs au sud soient peut-être plus célèbres, nous avons prouvé maintes fois que nous pouvons rendre la vie très misérable à un envahisseur. Tout le monde finit par partir."
 kgr_hill_forts:0 "Contrôle des forts de colline"
 kgr_hill_forts_desc:0 "Notre État fut jadis bâti autour du puissant fort de Kangra et du contrôle sur les zones environnantes que sa position stratégique permettait. Efforçons-nous de contrôler et d'entretenir tous les forts importants de cette région plus large et de contrôler nos zones environnantes de la même manière."
 kgr_strengthen_the_mountain_trade:0 "Renforcer le commerce montagnard"
 kgr_strengthen_the_mountain_trade_desc:0 "Non loin au sud se trouvent les plaines fertiles du Pendjab, et pourtant les vastes montagnes et glaciers du Ladakh, du Tibet et des sommets himalayens sont également assez proches. Ces régions apparemment différentes ont cependant besoin les unes des autres. Du nord viennent de précieux produits lainiers que les méridionaux sont prêts à payer cher ; le nord a des besoins plus simples mais désire tout de même nombre des produits plus luxueux que le sud peut fournir."
 kgr_pahari_paintings:0 "Peinture Pahari"
 kgr_pahari_paintings_desc:0 "Ces montagnes offrent paix, calme et un paysage inspirant à ceux qui en ont besoin ; à d'autres, elles offrent une protection contre ceux qui ont quelque chose à craindre des gens des basses terres. Invitons et patronnons les peintres talentueux de cette époque, offrons-leur refuge et laissons notre paysage montagnard les inspirer à créer de plus grandes œuvres d'amour et de nos histoires divines."
 kgr_tigers_of_the_himalayas:0 "Tigres de l'Himalaya"
 kgr_tigers_of_the_himalayas_desc:0 "Avec le temps, notre État fait face à de nouvelles menaces ; les noms et religions de ceux qui voudraient occuper nos terres peuvent différer au fil du temps, mais qu'ils soient Sikhs, Ghurkhas, Timourides ou Hellènes, nous devons être capables de nous défendre. Créons une nouvelle armée s'appuyant sur la base de la guerre de montagne que nous connaissons si bien, mais avec un apport sain de nouvelles idées des divers peuples qui convoitent nos terres."
 KAS_ideas:0 "Idées yarkandaises"
 KAS_ideas_start:0 "Traditions yarkandaises"
 KAS_ideas_bonus:0 "Ambition yarkandaise"
 kas_northern_silk_road:0 "Route de la Soie septentrionale"
 kas_northern_silk_road_desc:0 "Depuis aussi longtemps que quiconque s'en souvienne, des flots de marchandises ont traversé le bassin du Tarim, de cité-oasis en cité-oasis, reliant la vaste sphère économique de Haless oriental et de la Chine à celle de la Transoxiane et de la Perse. Soie, épices, coton, tapis, tabac et bien d'autres marchandises qui passent par nos terres atteignent finalement les cours de Cannor ou les palais des empereurs chinois. Nous devons garder ces marchands en sécurité à tout prix, car nous ne serions rien sans eux, et leur voyage est à la fois dangereux et ardu."
 kas_altishahr:0 "Altishahr"
 kas_altishahr_desc:0 "Le Taklamakan est peut-être inhospitalier, mais nos cités prospèrent autour des oasis le long de ses frontières ainsi que près du fleuve Tarim. La vie n'est peut-être pas aussi facile ici que dans les basses terres de l'Inde ou de la Chine, mais le blé, le maïs et le coton poussent assez bien. Les noms qui décrivent notre région, Haute-Tartarie, Altishahr, Kachgarie ou Xinjiang, évoquent des images de beauté légendaire et de bonne vie chez ceux qui les connaissent."
 kas_tarikh_i_rashidi:0 "Tarikh-i-Rashidi"
 kas_tarikh_i_rashidi_desc:0 "Notre culture est urbaine, mais notre isolement aux confins du monde signifie que peu ont entendu parler de notre histoire ou de notre langue. Efforçons-nous d'écrire l'histoire de notre peuple et de nos cités afin que le monde puisse apprendre la vie ici, dans l'un des coins les plus reculés, mais centralement importants, du monde."
 kas_empower_the_khojas:0 "Renforcer les Khodjas"
 kas_empower_the_khojas_desc:1 "Parmi les membres les plus révérés de notre société se trouvent les Khodjas, hommes dévots descendant du Prophète ou des quatre premiers califes. Des récits parlent de Khodjas inspirant la conversion de grands seigneurs mongols et de Lamas se prosternant devant la puissance islamique. Nous avons toujours fait des plus dévots d'entre nous nos dirigeants, et les Khodjas sont donc déjà des acteurs influents de notre État. Renforçons-les davantage et voyons jusqu'où leurs capacités et leur foi pure peuvent nous mener."
 kas_holy_warriors:0 "Guerriers saints"
 kas_holy_warriors_desc:0 "Bien que nous ayons toujours accueilli des marchands de toutes les fois et cultures, nous ne devons jamais oublier que notre force militaire vient de la pureté de notre foi. Étendons-nous dans les régions environnantes tant pour répandre la vraie foi que pour acquérir des régions qui rendraient notre patrie plus facile à défendre."
 kas_black_and_white_mountain:0 "Montagne Noire et Montagne Blanche"
 kas_black_and_white_mountain_desc:0 "Nous ne devons pas laisser de mesquines rivalités diviser notre État ! Pendant trop longtemps, notre peuple a été divisé entre les Aqtaglikh, peuple de la Montagne Blanche, et les Qarataghlik, peuple de la Montagne Noire. Si nous pouvons unir le Noir et le Blanc, le nord et le sud, notre pays se relèvera fort à nouveau."
 kas_encourage_tarim_trade:0 "Encourager le commerce du Tarim"
 kas_encourage_tarim_trade_desc:0 "Pendant des siècles, voire des millénaires, les marchands ont bravé le périlleux voyage pour atteindre nos cités désertiques. Que ce soit par le Taklamakan, la Route des Abricots du Baltistan ou les glaciers du Ladakh, ils ont tous fini par arriver à Yarkand, Kachgar ou l'une de nos autres grandes cités. Les temps changent cependant, et le flot constant de marchands diminue, car avec l'ouverture des routes maritimes d'est en ouest, beaucoup ne jugent plus le long voyage terrestre valable. Agissons de manière décisive pour protéger le commerce terrestre en abolissant toutes taxes ou droits directs."

 LUX_ideas:0 "Idées luxembourgeoises"
 LUX_ideas_start:0 "Traditions luxembourgeoises"
 LUX_ideas_bonus:0 "Ambition luxembourgeoise"
 lux_imperial_legacy:0 "Héritage impérial"
 lux_imperial_legacy_desc:0 "Il n'y a pas si longtemps, la maison de Luxembourg fournissait régulièrement ses empereurs à l'Empire d'Anbennar. Le fait que notre petite nation accédait souvent à la gouvernance d'un si vaste empire nous donne une renommée bien au-delà de ce qu'un pays de notre taille pourrait normalement espérer."
 lux_ardennes:0 "Les Ardennes"
 lux_ardennes_desc:0 "Le terrain accidenté et vallonné de notre nation le rend difficile à envahir ; en effet, de nombreuses armées choisissent simplement de le contourner pour éviter de tenter de traverser la région, et les pertes que cela impliquerait."
 lux_moselle_trade:0 "Le commerce de la Moselle"
 lux_moselle_trade_desc:0 "La Moselle coule le long de notre frontière orientale. Orientons le commerce local le long de celle-ci afin de mieux contrôler le commerce de la région."
 lux_fortress:0 "La forteresse de Luxembourg"
 lux_fortress_desc:0 "Le grand château au centre de notre capitale est reconnu comme l'une des plus belles fortifications du monde. Peu d'armées envisageraient même d'assiéger une fortification aussi redoutable. Alors que nous étendons notre influence sur d'autres régions, assurons-nous de construire des fortifications aussi imposantes que celle qui garde notre foyer."
 lux_spanish_road:0 "Le Chemin espagnol"
 lux_spanish_road_desc:0 "La grande route militaire connue sous le nom de Chemin espagnol traverse nos terres. Faisons bon usage de cette circonstance dans nos propres entreprises militaires pour renforcer nos armées plus efficacement !"
 lux_grand_duchy_of_luxembourg:0 "Le Grand-Duché de Luxembourg"
 lux_grand_duchy_of_luxembourg_desc:0 "Notre grand État a une longue et prestigieuse histoire et est désormais l'un des plus respectés dans les régions française comme allemande. Même dans l'éventualité incroyable où nous passerions sous domination étrangère, notre titre serait l'un des plus prestigieux de leurs possessions. Soulignons cela convenablement en proclamant le duché originel de Luxembourg comme Grand-Duché, désormais l'un des nombreux grands titres portés par nos souverains."
 lux_rivals_rivals_everywhere:0 "Des rivaux de tous côtés"
 lux_rivals_rivals_everywhere_desc:0 "Notre position entre la France, les Pays-Bas et les États allemands signifie que nous devons maintenir une diplomatie très active. Nous devons entretenir de bonnes relations avec tous, tout en les surveillant de près."
 telugu_ideas:0 "Idées télougou"
 telugu_ideas_start:0 "Traditions télougou"
 telugu_ideas_bonus:0 "Ambition télougou"
 yor_telugu_warrior_aristocrats:0 "Aristocrates guerriers télougou"
 yor_telugu_warrior_aristocrats_desc:0 "Notre État repose sur les traditions de générations de guerriers télougou avant nous. Des hommes qui ont combattu au service de nombreux grands empires indiens et ont plus récemment constitué l'aristocratie de l'ancien Empire Kakatiya. Cela garantit un approvisionnement constant de guerriers et de capitaines capables pour nos armées, quoi que l'avenir nous réserve."
 yor_patronize_telugu_literature:0 "Patronner la littérature télougou"
 yor_patronize_telugu_literature_desc:0 "Depuis les premiers souverains Reddy, la royauté et la littérature ont été entrelacées parmi notre peuple. On attend de nos souverains qu'ils soient eux-mêmes érudits et auteurs, et qu'ils patronnent les grands poètes et auteurs de notre époque."
 yor_kakatiya_legacy:0 "Héritage Kakatiya"
 yor_kakatiya_legacy_desc:0 "Il n'y a pas si longtemps, l'empire Kakatiya gouvernait ces terres, avec son aristocratie télougou et son mépris pour les strictes hiérarchies de caste de certains de nos voisins ; il reste un modèle auquel notre État peut aspirer. Il y a de précieuses leçons à tirer de l'État Kakatiya, et nous devons les emporter avec nous en façonnant nos propres politiques dans le présent."
 yor_great_forts_of_the_east:0 "Grandes forteresses de l'Est"
 yor_great_forts_of_the_east_desc:0 "Un certain nombre de grandes forteresses dans les Ghâts orientaux gardent nos terres contre les invasions des puissances des hauts plateaux. Nous devons garder ces bastions bien entretenus et à jour, sous peine de gaspiller l'épine dorsale de nos défenses."
 yor_legend_of_prataparudra:0 "Légende de Prataparudra"
 yor_legend_of_prataparudra_desc:0 "Le dernier souverain Kakatiya, Prataparudra II, mourut en tant que prisonnier des forces du Sultanat qui soumirent son royaume. Selon certains, cependant, il survécut et accorda à ses vassaux le droit de fonder de nouveaux royaumes, comme notre État. Promouvons cette légende et faisons-la écrire afin que les générations futures puissent connaître les racines de notre grand État."
 yor_diamond_mines_of_kollur:0 "Mines de diamants de Kollur"
 yor_diamond_mines_of_kollur_desc:0 "L'Andhra abrite certaines des plus grandes mines de diamants du monde. Au fil des siècles, ces grandes mines ont été la source tant de la majorité des diamants connus dans le monde que de grandes pierres comme le Koh-i-Noor. Il est cependant temps que nous modernisions nos grandes mines et prenions soin de les développer à leur plein potentiel."
 yor_encourage_coromandel_trade:0 "Encourager le commerce de Coromandel"
 yor_encourage_coromandel_trade_desc:0 "La côte de Coromandel a toujours été source de richesse avec ses grands ports animés et ses nombreux marchands venus de pays lointains. L'un des anciens souverains Reddy d'Andhra a sagement essayé de maintenir les réglementations sur le commerce de Coromandel au minimum, stimulant grandement la croissance de nos ports. Réinstaurons cette politique à l'ère moderne et réduisons les réglementations commerciales afin de permettre aux marchands une plus grande liberté."
 LON_ideas:0 "Idées léonaises"
 LON_ideas_start:0 "Traditions léonaises"
 LON_ideas_bonus:0 "Ambition léonaise"
 lon_heritage_of_the_reconquista:0 "Héritage de la Reconquista"
 lon_heritage_of_the_reconquista_desc:0 "Pendant des centaines d'années, notre royaume a combattu pour étendre la domination chrétienne en Ibérie, une bataille que nous avons ensuite poursuivie en tant que partie de la couronne de Castille. Cela nous a laissé un pays riche en traditions martiales et en officiers aguerris."
 lon_leonese_cortes:0 "Cortes léonaises"
 lon_leonese_cortes_desc:0 "Les Cortes de León furent l'un des plus anciens, sinon le plus ancien, parlement du monde. Les droits et traditions anciens de notre parlement sont une force pour tout souverain souhaitant chercher conseil ou aide auprès de ses sujets."
 lon_conquistadores:0 "Conquête d'Aelantir"
 lon_conquistadores_desc:0 "À l'autre bout du monde se trouvent des royaumes païens aux richesses indicibles. Notre génération d'aventuriers léonais cherche à faire fortune au nom de la vraie foi outre-mer, tout comme leurs ancêtres ont forgé leur réputation pendant la Reconquista en Ibérie."
 lon_school_of_salamanca:0 "École de Salamanque"
 lon_school_of_salamanca_desc:0 "La prestigieuse université de Salamanque est devenue le centre d'une nouvelle école de jurisprudence ainsi que de pensée philosophique et économique. Patronnons les hommes savants de l'École de Salamanque et faisons bon usage de leurs interprétations cohérentes du Droit naturel, de la Propriété et des Droits naturels de l'Homme."
 lon_expand_navy:0 "Étendre la marine léonaise"
 lon_expand_navy_desc:0 "Les marins asturiens nous ont pendant des siècles prêté leur expérience et leurs traditions maritimes. Il est cependant temps de moderniser et d'étendre la marine léonaise. Nous devons créer de véritables bases navales le long de la côte et commencer la construction d'une grande nouvelle marine permanente."
 lon_patronize_leonese_language:0 "Patronner la langue léonaise"
 lon_patronize_leonese_language_desc:0 "Pendant de nombreuses années durant notre union avec la Castille, la langue léonaise a perdu du terrain face au castillan. Bien que nous ayons inversé cette tendance, il reste encore beaucoup à faire. Nous devons publier une grammaire léonaise officielle et nous assurer que la langue est utilisée à tous les niveaux de notre administration. De plus, patronnons ceux qui peuvent développer la langue : les grands écrivains, acteurs et poètes de notre nation."
 lon_nationalism:0 "Nationalisme léonais"
 lon_nationalism_desc:0 "Des Castillans aux Français, nombreux ont été les peuples déterminés à conquérir notre peuple et à réprimer notre culture. En temps de guerre, nous devons résister à l'occupation étrangère à tout prix, les armes à la main ; cela est aussi vrai pour nos forces professionnelles que pour les guérilleros qui protègent les terres au-delà des lignes de front."
 CYI_ideas:0 "Idées Yi"
 CYI_ideas_start:0 "Traditions Yi"
 CYI_ideas_bonus:0 "Ambition Yi"
 cyi_strengthen_yi_caste_system:0 "Renforcer le système de castes Yi"
 cyi_strengthen_yi_caste_system_desc:0 "Traditionnellement, notre société est composée de cinq castes. Les Zimo règnent en tant que seigneurs, les Yi Noirs (Nuohe) dirigent en tant qu'aristocratie, les Yi Blancs (Qunuo) sont des hommes libres, les Ajia servent comme serfs et les Xiaxi sont nos esclaves. En renforçant ce régime, nous pouvons assurer une stabilité durable pour notre pays."
 cyi_deep_in_mountains:0 "Au cœur des montagnes"
 cyi_deep_in_mountains_desc:0 "Les montagnes autour de nous sont notre défense naturelle, et nous devons développer des stratégies et des tactiques qui en tirent parti. Pour nous, c'est notre foyer ; pour les envahisseurs, ce sera leur tombe."
 cyi_chain_of_zimo_domains:0 "Chaîne des domaines Zimo"
 cyi_chain_of_zimo_domains_desc:0 "Contrairement aux nombreuses tribus dispersées autour de nous, nos domaines sont reliés les uns aux autres. Avec une telle chaîne de domaines et d'établissements, nous avons de meilleures opportunités de manœuvre, des connexions plus fortes, et nos seigneurs locaux pourront se soutenir mutuellement plus efficacement."
 cyi_solar_calendar:0 "Calendrier solaire Yi"
 cyi_solar_calendar_desc:0 "Beaucoup d'étrangers tendent à nous voir comme des sauvages. Une telle ignorance et arrogance nous consterne ! Notre système de calendrier solaire est simple à comprendre et donc un outil utile en agriculture. Les imbéciles qui se croient meilleurs que nous peuvent garder leurs calculs compliqués tandis que nous diffusons notre calendrier supérieur dans nos terres."
 cyi_promote_bimoism:0 "Promouvoir le Bimoïsme"
 cyi_promote_bimoism_desc:0 "Les Bimo, « maîtres des écritures », sont les chamans-prêtres de notre peuple. Ils officient aux naissances, funérailles, mariages et fêtes, prenant soin de la vie spirituelle de notre peuple. Nous devrions les promouvoir ainsi que leurs rites et défendre nos croyances contre tous les cultes étrangers."
 cyi_renovate_skyward_tombs:0 "Rénover les Tombes célestes"
 cyi_renovate_skyward_tombs_desc:0 "Les grandes Tombes célestes sont les lieux de repos de nos rois et chefs ancestraux. Ces pyramides gigantesques sont une preuve de notre autorité continue sur les terres que nous gouvernons encore. Nous devons rénover ces tombes pour assurer que leur héritage perdure et faire taire quiconque remettrait en question notre pouvoir."
 cyi_children_of_the_black_tiger:0 "Enfants du Tigre Noir"
 cyi_children_of_the_black_tiger_desc:0 "Nous sommes les enfants du Tigre Noir. Tout comme le tigre est le suzerain de toutes les bêtes, nous sommes le suzerain naturel de tous les royaumes humains !"
 NZH_ideas:0 "Idées de Nijni Novgorod"
 NZH_ideas_start:0 "Traditions de Nijni Novgorod"
 NZH_ideas_bonus:0 "Ambition de Nijni Novgorod"
 nzh_at_the_confluence_of_two_giants:0 "Au confluent des géants"
 nzh_at_the_confluence_of_two_giants_desc:0 "Les fleuves ont toujours été la ligne de vie des terres russes. Et ainsi nos ancêtres ont bâti une cité puissante au confluent de deux des fleuves peut-être les plus importants de l'ancienne Russie : la Volga et l'Oka. Située entre la richesse des anciennes terres et les vastes richesses inexplorées des étendues orientales inconnues, notre cité grandit jusqu'à rivaliser avec Moscou elle-même. Nous ne pouvons que louer nos ancêtres pour leur vision."
 nzh_crossroads_of_nations:0 "Carrefour des nations"
 nzh_crossroads_of_nations_desc:0 "Construire sa maison près de la route peut apporter à la fois richesse et désastre. Il en va de même pour les fleuves traîtres de Russie. Un jour vous pouvez accueillir un marchand de fourrures, et le lendemain des pirates peuvent brûler votre maison. Ce qui compte, c'est de ne jamais abandonner. Si votre maison est brûlée, vous en construirez une nouvelle, plus grande, à sa place. Si vos murs sont abattus, vous les reconstruirez plus hauts. Quelles que soient les épreuves, nous endurerons."
 nzh_issue_land_reforms:0 "Promulguer des réformes agraires"
 nzh_issue_land_reforms_desc:0 "Située à la frontière des terres russes et des steppes infinies avec leurs pillards, les provinces de Nijni Novgorod n'ont jamais été aussi organisées que l'intérieur russe. Les vastes forêts et les villages reculés ont engendré un esprit plus autonome parmi notre peuple. Il est cependant temps d'établir un système de taxation fiable et prévisible, afin d'apporter la loi et l'ordre même dans les régions les plus reculées sous notre domination."
 nzh_citadel_of_russia:0 "Citadelle de Russie"
 nzh_citadel_of_russia_desc:0 "Depuis sa naissance, Nijni Novgorod s'est lentement développée comme une cité fortifiée protégeant l'intérieur russe des pillards, qu'il s'agisse de pirates fluviaux ou de conquérants terrestres. Notre cité a été détruite et endommagée d'innombrables fois par chaque aspirant envahisseur de la Rus', mais Nijni a toujours enduré et grandi. Des murs et des citadelles de pierre dominent maintenant notre belle cité, et nous veillerons à ce que leur force perdure à travers les âges."
 nzh_open_up_the_river_trade:0 "Ouvrir le commerce fluvial"
 nzh_open_up_the_river_trade_desc:0 "Contrairement à d'autres principautés de l'ancienne Rus', Nijni n'a jamais été la plus peuplée, ni celle avec les terres les plus fertiles, ni même avec les marchands les plus actifs. Mais aucune des autres anciennes cités de Russie n'a ce que nous avons : des fleuves. Si nous parvenons à établir — et à dominer — le commerce fluvial, nous pourrions effectivement relier les vastes richesses des terres tatares et de Sibérie aux anciens centres de Russie, faisant de notre cité le centre le plus important de toutes les Russies."
 nzh_russian_ambition:0 "Ambition russe"
 nzh_russian_ambition_desc:0 "Pendant des siècles, les autres principautés russes nous ont regardés avec condescendance ou convoitise, considérant notre cité comme une ville frontalière insignifiante. Mais plus maintenant. Nijni se lèvera pour défier la beauté et la splendeur de toutes. Même Moscou et Novgorod nous regarderont avec envie. Qu'ils regardent. Nous leur donnerons de quoi contempler."
 nzh_expand_to_the_east:0 "Vers l'Est !"
 nzh_expand_to_the_east_desc:0 "Depuis aussi longtemps que nous nous souvenons, nos terres ont été pillées par divers peuples vivant dans la mer infinie d'herbe de l'autre côté de nos forêts et champs. Tandis que nos frères de l'ouest complotent et intriguent les uns contre les autres, pourquoi devrions-nous rester oisifs ? Chevauchons dans la steppe et créons un nouvel ordre, avec notre grand État au sommet."
 SMI_ideas:0 "Idées sami"
 SMI_ideas_start:0 "Traditions sami"
 SMI_ideas_bonus:0 "Ambition sami"
 smi_land_of_the_midnight_sun:0 "Pays du soleil de minuit"
 smi_land_of_the_midnight_sun_desc:0 "Nul ne peut prétendre connaître le nord de la Scandinavie aussi bien que nous, mais ses montagnes, rivières et forêts profondes peuvent paraître assez hostiles à certains. Nous ferons bon usage de notre connaissance du terrain qui nous entoure et rendrons la vie aussi misérable que possible à tout envahisseur méridional."
 smi_protect_the_herds:0 "Protection des troupeaux de rennes"
 smi_protect_the_herds_desc:0 "L'élevage de rennes est l'une des parties les plus importantes du mode de vie sami ainsi qu'une pierre angulaire de notre économie. Il est impératif que nous fassions tout notre possible pour protéger nos troupeaux et les terres qu'ils utilisent."
 smi_regulate_southern_trade:0 "Réguler le commerce avec les Méridionaux"
 smi_regulate_southern_trade_desc:0 "Les royaumes méridionaux voudraient réglementer nos contacts avec eux. Des Birkarls spécialement désignés ont traditionnellement eu le monopole du commerce sami et ont même été chargés de collecter des taxes auprès de notre peuple. Il est temps que nous commencions à dicter les termes de cette relation et à créer nos propres réglementations commerciales."
 smi_encourage_growth_of_the_winter_market:0 "Encourager la croissance du Marché d'hiver"
 smi_encourage_growth_of_the_winter_market_desc:0 "Notre peuple vit dans une région très étendue, et les hivers nordiques peuvent être à la fois longs et froids. Créons un grand marché commun dans un emplacement central où les représentants de tous les Samis sous notre contrôle et des régions voisines peuvent se rassembler. Ici le commerce peut prospérer même durant les nuits d'hiver les plus sombres, et ici le thing peut se réunir pour régler les affaires communes."
 smi_defend_noaidi_traditions:0 "Défendre les traditions Noaidi"
 smi_defend_noaidi_traditions_desc:0 "Les anciennes traditions chamaniques des Noaidi n'ont cessé de reculer vers le nord devant les missionnaires chrétiens du sud. Protégeons les Noaidi et promouvons leurs traditions comme partie intégrante de notre État. Quoi que l'avenir réserve à la foi de nos sujets, ces traditions font partie de nos racines."
 smi_living_of_the_land:0 "Vivre de la terre"
 smi_living_of_the_land_desc:0 "Notre peuple vit de la terre depuis des siècles. Par la pêche, la chasse et la cueillette. C'est une expertise qui peut s'avérer utile lors de longues campagnes, même en terres étrangères."
 smi_standardized_literary_language:0 "Standardiser la langue littéraire"
 smi_standardized_literary_language_desc:0 "Le peuple sami ne parle peut-être pas une seule langue, mais notre État pourrait certainement bénéficier d'une langue littéraire commune. Il y a eu des tentatives de standardiser une telle langue par divers étrangers, mais il est grand temps que nous en créions une nous-mêmes selon nos propres besoins."
 nubian_ideas:0 "Idées nubiennes"
 nubian_ideas_start:0 "Traditions nubiennes"
 nubian_ideas_bonus:0 "Ambition nubienne"
 nubian_nile:0 "Le Nil"
 nubian_nile_desc:0 "Comme l'Égypte en aval, nous sommes une terre dépendante du Nil et de ses affluents. Notre agriculture tire le meilleur parti des champs fertiles inondés par les fleuves qui traversent nos terres."
 nubian_heritage:0 "Héritage nubien"
 nubian_heritage_desc:0 "Des ruines des anciens royaumes nubiens aux traditions juridiques et religieuses encore vivantes des royaumes nubiens médiévaux, notre peuple est enraciné dans un riche héritage d'une civilisation ancienne. En allant de l'avant, ne gaspillons pas les acquis du passé, mais faisons plutôt bon usage des traditions juridiques et sociales de nos ancêtres."
 nubian_sahara:0 "Guerriers du désert du Sahara"
 nubian_sahara_desc:0 "Depuis les temps anciens, nous sommes connus comme une nation de guerriers féroces. Beaucoup sont venus du sud de l'Égypte ou des montagnes d'Éthiopie en pensant nous conquérir, mais peu ont eu le moindre succès."
 nubian_long_distance_trade:0 "Encourager le commerce à longue distance"
 nubian_long_distance_trade_desc:0 "Certains qualifieraient notre pays d'isolé, pourtant les marchands de pays lointains ont toujours cherché et trouvé nos cités. Des Romains des temps anciens aux Italiens, Arabes et Turcs d'aujourd'hui. Encourageons le commerce à longue distance dans toutes les directions."
 nubian_religious_struggles:0 "Unité religieuse nubienne"
 nubian_religious_struggles_desc:0 "La Nubie est le foyer de chrétiens et de musulmans ainsi que d'animistes et d'autres religions traditionnelles. Contrairement à certaines parties du monde, ces fois ne se sont pas bien entendues. Cette région vient de traverser une période très tumultueuse où les conversions et les migrations ont distordu l'ancien équilibre religieux, peut-être pour toujours. Maintenant que la situation semble s'être stabilisée, il est temps de répandre la parole de notre religion d'État et de promouvoir une culture religieuse commune et unifiée parmi notre peuple une fois pour toutes."
 nubian_desert_cavalry:0 "Cavalerie du désert"
 nubian_desert_cavalry_desc:0 "Le meilleur moyen de contrôler les grandes étendues du désert est d'être mobile. Nous devons former et entretenir une cavalerie efficace afin de nous défendre et de nous étendre dans ces terres."
 nubian_fortified_strongholds:0 "Bastions fortifiés"
 nubian_fortified_strongholds_desc:0 "Bien que toutes nos terres ne soient pas désertiques, elles sont entourées par le désert et dans une certaine mesure divisées par lui. Créons une chaîne de fortifications pour lier nos terres ensemble et défendre les routes commerciales transsahariennes ainsi que les cataractes du Nil elles-mêmes contre les brigands, les rebelles et les envahisseurs étrangers."
 MAZ_ideas:0 "Idées mazovienne"
 MAZ_ideas_start:0 "Traditions mazovienne"
 MAZ_ideas_bonus:0 "Ambition mazovienne"
 maz_piast_legacy:0 "Héritage Piast"
 maz_piast_legacy_desc:0 "Les princes de Mazovie sont parmi les derniers descendants vivants de la dynastie Piast, qui a uni et gouverné la Pologne pendant des siècles. Nous n'hésitons pas à rappeler cet héritage chaque fois que notre prestige ou notre légitimité sont remis en question."
 maz_frontier:0 "Frontière mazovienne"
 maz_frontier_desc:0 "Pendant longtemps, la Mazovie était à la frontière de la chrétienté, avec des païens au nord et à l'est. Aujourd'hui, nos ennemis prétendent être encore plus ravéliens que nous, mais ils désirent toujours nos terres. Nos frontières doivent toujours être bien protégées, nos forts bien entretenus et nos troupes bien entraînées, car il n'y a pas de région que l'ennemi traversera avant d'atteindre nos fortifications."
 maz_between_monk_eagle_and_purse:0 "Entre le moine, l'aigle et la bourse"
 maz_between_monk_eagle_and_purse_desc:0 "Si nous voulons préserver notre indépendance, nous avons besoin d'un service diplomatique bien formé. Les ducs de Mazovie ont souvent été médiateurs entre la couronne polonaise et l'Ordre Teutonique, et nous avons une tradition de négociation réussie d'alliances et de préservation de notre pays des ambitions de nos voisins."
 maz_szlachta_zasciankowa:0 "Szlachta Zaściankowa"
 maz_szlachta_zasciankowa_desc:0 "Ils vivent peut-être dans des manoirs de paysans, ils ne possèdent parfois qu'un huitième d'un seul village et parfois ils ne peuvent pas se permettre un cheval — mais ils sont nobles, et ils constituent un pourcentage important de la population mazovienne. Nous devons accepter que nobilitatis Polonis est aequalis, et faire bon usage de ces hommes comme officiers subalternes et dragons."
 maz_mazovian_lawmaking:0 "Législation mazovienne"
 maz_mazovian_lawmaking_desc:0 "Comme la Mazovie a toujours joui d'un certain degré d'autonomie, parfois même d'indépendance vis-à-vis du reste de la Pologne, nos lois diffèrent assez de celles suivies dans le reste des terres polonaises. En mettant par écrit et en confirmant nos propres ensembles de lois, nous renforçons notre État et réaffirmons notre statut unique."
 maz_sejmy_i_sejmiki:0 "Sejmy i Sejmiki"
 maz_sejmy_i_sejmiki_desc:0 "À travers de longues et furieuses disputes, la noblesse polonaise gouverne sa patrie. Comme de nombreux nobles n'ont pas les moyens de voyager loin régulièrement, la position de la Mazovie est parfaite pour organiser les diètes conjointes des terres polonaises et lituaniennes. Nous pouvons fièrement affirmer que ce sont nos nobles qui font les rois plutôt que les rois qui réglementent la noblesse."
 maz_emporium:0 "Emporium central"
 maz_emporium_desc:0 "Le commerce est ce qui remplit nos coffres et fait grandir nos cités. La position de la Mazovie lui permet de contrôler une grande partie du commerce de notre région, car tant le commerce polono-lituanien que le flux de céréales de Ruthénie vers le nord passent par nos terres. Encourageons les marchands à utiliser notre pays comme le grand Emporium des terres polonaises."
 GAL_ideas:0 "Idées galiciennes"
 GAL_ideas_start:0 "Traditions galiciennes"
 GAL_ideas_bonus:0 "Ambition galicienne"
 gal_way_of_st_james:0 "Le Chemin de Saint-Jacques"
 gal_way_of_st_james_desc:0 "L'un des plus grands chemins de pèlerinage de la chrétienté mène à la cathédrale de Saint-Jacques-de-Compostelle en Galice. Le sanctuaire de l'apôtre Jacques attire des étrangers du monde entier connu, mais leur or parle la même langue à nos coffres."
 gal_la_bella:0 "Galicia la Bella"
 gal_la_bella_desc:0 "Contrairement aux terres arides et broussailleuses du sud, le paysage de Galice est dominé par les montagnes et une pluie incessante. Les Galiciens eux-mêmes sont presque aussi inhospitaliers aux envahisseurs que le terrain, comme beaucoup d'étrangers l'ont réalisé. Que nul n'ose mettre le pied sur notre terre !"
 gal_rein_in_the_cities:0 "Maîtriser les cités"
 gal_rein_in_the_cities_desc:0 "Les derniers siècles ont été dominés par des conflits sanglants entre la noblesse et l'Église d'un côté, et les bourgeois urbains de l'autre. Durant les pires années, de nombreuses cités ont été indépendantes en tout sauf en nom de la couronne galicienne. En écrasant ces oligarques mesquins, la paix et l'ordre reviendront dans le royaume."
 gal_shipyards:0 "Chantiers navals galiciens"
 gal_shipyards_desc:0 "L'Atlantique est une maîtresse dure, et seuls les vaisseaux les plus solides peuvent survivre à son étreinte éprouvante. Les navires galiciens ont toujours été réputés pour leur robustesse. Avec un patronage supplémentaire de la Couronne, ces chantiers navals peuvent continuer à façonner des navires redoutables capables de résister aux vagues et aux canons."
 gal_santiago_y_cierra:0 "Santiago y Cierra !"
 gal_santiago_y_cierra_desc:0 "« Santiago y Cierra ! » (Saint-Jacques et charge !) était le cri de ralliement des croisés espagnols contre les Maures pendant la Reconquista. C'est en Galice que les restes sacrés de Saint-Jacques furent trouvés, alors qu'il soit su que l'Apôtre tient notre peuple en estime particulière. La victoire et la gloire n'attendent que les audacieux, et nul n'est plus audacieux que les Galiciens !"
 gal_sailors_of_the_cantabrian_sea:0 "Marins de la mer Cantabrique"
 gal_sailors_of_the_cantabrian_sea_desc:0 "Il faut un marin courageux pour se lancer dans les eaux traîtresses de la mer Cantabrique et du golfe de Gascogne. Mais même les conditions météorologiques les plus rudes du monde connu n'ont pas refroidi l'amour de la Galice pour l'océan. Après l'épreuve de tempêtes innombrables, la flotte galicienne ne craint plus les simples boulets et sabres d'abordage."
 gal_irmandinos:0 "Irmandinos"
 gal_irmandinos_desc:0 "Le paysan galicien est également légendaire pour sa robustesse et son tempérament rebelle. En enrôlant les membres des « confréries » de bandits dans notre armée, nous pouvons obtenir un noyau dur de soldats endurcis et expérimentés. Nos classes nobles en ont assez de voir leurs manoirs brûler de toute façon."
 NEV_ideas:0 "Idées nivernaises"
 NEV_ideas_start:0 "Traditions nivernaises"
 NEV_ideas_bonus:0 "Ambition nivernaise"
 nev_forges_of_nivernais:0 "Forges du Nivernais"
 nev_forges_of_nivernais_desc:0 "Jules César lui-même admirait le talent des forgerons du centre de la Gaule. Le minerai de fer dans le sol, les vastes forêts profondes et inhabitées, les grandes rivières offrent toutes les conditions nécessaires à cette industrie qui n'a pas eu d'égal en France depuis cette époque lointaine."
 nev_nivernais_legal_traditions:0 "Commentaire sur la Coutume du Pays et Duché de Nivernais"
 nev_nivernais_legal_traditions_desc:0 "Rassemblons toutes les lois traditionnelles de notre royaume et créons un commentaire mis à jour pour pouvoir adapter les lois, coutumes et règlements du Nivernais afin qu'ils correspondent mieux à l'ère moderne."
 nev_faience_production:0 "Production de faïence"
 nev_faience_production_desc:0 "La ville de Nevers est bénie d'une abondance d'argile et de marne, et dans le Morvan d'un accès à un bois de chauffage sans fumée, tandis que la Loire assure que les produits peuvent être facilement transportés en amont et en aval vers les riches cités le long de celle-ci. Utilisons ces conditions favorables au maximum et encourageons ceux formés à l'art de la production de faïence à s'installer ici. Notre État sera la capitale de la faïence de France."
 nev_the_best_of_france:0 "Vrais Français"
 nev_the_best_of_france_desc:0 "Nos hommes sont robustes et nos femmes vigoureuses. Comment pourrait-il en être autrement ? La cuisine du Nivernais forge un caractère solide, tout comme le mauvais temps de notre province. Seuls de vrais Français pourraient vivre ici et travailler les champs, les forges ou les forêts de notre pays."
 nev_bridges_of_the_loire:0 "Ponts de la Loire"
 nev_bridges_of_the_loire_desc:0 "Le majestueux fleuve Loire est comme un cheval fougueux, capable du plus grand calme ou de la plus dévastatrice fureur. Au fil des années, beaucoup ont essayé de le dompter en érigeant de solides ponts de bois ou de pierre à Decize, Nevers ou La Charité, mais ils ont toujours dû être reconstruits après la prochaine grande crue. Bien que ce soit la source de nombre des chagrins de la région, cela nous a appris à composer avec les forces de la nature, une leçon que tout envahisseur devrait payer bien plus cher."
 nev_morvan_wet_nurses:0 "Nourrices du Morvan"
 nev_morvan_wet_nurses_desc:0 "Tout le monde sait que les meilleures nourrices se trouvent en Nivernais, et au fil des ans, ces femmes ont nourri de nombreux enfants tant chez elles qu'à l'étranger. Des grands empereurs et rois aux fils et filles de fermiers à la maison, les nourrices du Morvan produisent des enfants forts qui deviennent ensuite des adultes forts. Nous devons veiller à ne jamais oublier comment élever des hommes et des femmes forts, car un pays n'est aussi prospère que ses habitants."
 nev_greatest_palace_of_the_loire:0 "Le plus grand palais de la vallée de la Loire"
 nev_greatest_palace_of_the_loire_desc:0 "Le monde doit voir notre pays pour le grand lieu qu'il est, le premier des régions françaises et le Cœur de Cannor. Rénovons les anciennes fortifications de Nevers pour en faire le plus grand palais que cette région ait jamais vu."
 french_culture_ideas:0 "Idées ducales françaises"
 french_culture_ideas_start:0 "Traditions ducales françaises"
 french_culture_ideas_bonus:0 "Ambition ducale française"
 french_men_of_trade:0 "Hommes de commerce"
 french_men_of_trade_desc:0 "Les rois de France ont toujours su que les hommes des provinces sont les mieux placés pour dicter les politiques commerciales du royaume, car notre peuple est maître dans l'art du commerce. La France est idéalement située, au carrefour de l'Atlantique et de la Divenhal, entre l'Angleterre et les cités italiennes ainsi que l'Allemagne et la péninsule Ibérique. La richesse du monde coule à travers nos terres !"
 french_renaissance_palaces:0 "Palais Renaissance"
 french_renaissance_palaces_desc:0 "Nos ancêtres avaient l'habitude de se protéger dans des châteaux lourdement fortifiés. Avec l'avènement de la Renaissance, cependant, le prestige et le pouvoir ne reposent plus sur de telles forteresses. Construisons plutôt des palais magnifiquement décorés pour montrer notre prospérité et notre splendeur aux autres Français et aux étrangers."
 french_qui_ruit_et_lethum:0 "Qui Ruit Et Lethum"
 french_qui_ruit_et_lethum_desc:0 "Des régions humides d'Angleterre aux régions arides de Terre Sainte, nos ancêtres chevaliers ont combattu vaillamment à cheval. S'ils nous voyaient aujourd'hui, ils se moqueraient peut-être de nos fraises et de nos dentelles, mais sous ce magnifique vernis, nous exerçons toujours la « furor gallicus » et nul ne peut nous résister sur le champ de bataille !\nQue nos mousquetaires soient au champ de bataille moderne ce que les chevaliers français furent aux guerres médiévales. Tous craindront la puissance de nos armées !"
 french_religious_conviction:0 "Conviction religieuse"
 french_religious_conviction_desc:0 "Notre peuple a toujours cru qu'il fallait défendre fermement sa cause. Quand l'opinion du peuple français est arrêtée, nul ne peut nous empêcher de l'exprimer. Que nous soyons du côté du pape ou contre lui, nous devons rester fermes dans nos convictions !"
 french_cuisine:0 "Cuisine française"
 french_cuisine_desc:0 "La France est pour beaucoup connue comme le pays de la bonne cuisine. Chaque province est réputée pour ses vins, ses plats, ses fromages et ses gâteaux, et c'est un proverbe avéré ici que la bonne cuisine forge le bon caractère. Comme notre région abrite certains des mets les plus délicieux, sa réputation va au-delà de celle de nombreuses autres régions de France. Nous devons chérir et préserver nos traditions culinaires et renforcer notre identité régionale."
 french_enlightenment:0 "Lumières françaises"
 french_enlightenment_desc:0 "La culture française et la langue française sont les vecteurs des idées de l'ère moderne. Alors que les Lumières se répandent de cour en cour, le respect pour toutes les choses françaises se répand aussi. Il serait cependant faux de présumer qu'il s'agit strictement d'une diffusion des idées et valeurs parisiennes. À mesure que le français devient la langue de toutes les cours, livres et pièces, notre influence se répand dans le monde entier avec elle."
 french_la_petite_nation:0 "La Petite Nation"
 french_la_petite_nation_desc:0 "Les étrangers parlent toujours de la France comme du pays à un seul roi. Cela peut être vrai, mais cela ne signifie en aucune façon que le roi est seul à entreprendre quoi que ce soit de positif pour nos compatriotes français. Les provinces françaises ont leur vie propre, et que ce soit sous l'autorité royale ou de manière plus autonome, elles sont capables de produire des hommes forts et de belles épouses, de grands philosophes, artistes et hommes de savoir. Paris nous importe peu dans les affaires quotidiennes. Nous devons défendre notre propre peuple, car nous sommes les vrais Français et sans nous, la région française serait à la fois plus faible et plus fade."
 MED_ideas:0 "Idées de Medri Bahri"
 MED_ideas_start:0 "Traditions de Medri Bahri"
 MED_ideas_bonus:0 "Ambition de Medri Bahri"
 med_kings_of_the_sea:0 "Rois de la mer"
 med_kings_of_the_sea_desc:0 "Le souverain de notre État est connu sous le nom de « Bahr Negasi » ou Roi de la Mer, et le contact avec la mer Rouge et son flux de commerce et de personnes a toujours été une caractéristique déterminante de notre histoire."
 med_ancient_christian_traditions:0 "Héritage chrétien"
 med_ancient_christian_traditions_desc:0 "En 328 apr. J.-C., le premier évêque d'Axoum fut nommé par le Grand Recteur d'Alexandrie. Beaucoup de choses se sont passées depuis ce jour, mais nous tenons toujours à notre foi chrétienne et nous tournons vers Alexandrie et l'Éthiopie pour notre guidance religieuse. Sauvegardons les traditions chrétiennes de nos ancêtres et intégrons les ordres monastiques dans notre société."
 med_diplomatic_flexibility:0 "Flexibilité diplomatique"
 med_diplomatic_flexibility_desc:0 "Notre base de pouvoir traditionnelle n'est pas aussi grande que celle de certains de nos voisins. Il est impératif que nous ne liions pas diplomatiquement notre pays à un seul de nos voisins. Au contraire, nous devons être prêts à conclure des accords avec quiconque nécessaire pour nous protéger des ennemis chrétiens et musulmans."
 med_strengthen_central_rule:0 "Renforcer le pouvoir central"
 med_strengthen_central_rule_desc:0 "Quand l'État vacille, les anciens locaux influents, les Shimagile, sont toujours prêts à intervenir et à assumer la responsabilité de la gestion quotidienne de leurs provinces. Alors que nous nous efforçons de centraliser notre pouvoir, cependant, peut-être est-il temps de laisser ces anciens soit assumer des postes dans notre administration, soit se retirer pour être remplacés par des fonctionnaires nommés par le gouvernement."
 med_independent_traditions:0 "Traditions d'indépendance"
 med_independent_traditions_desc:0 "Au fil des siècles, nous avons de temps en temps dû accepter des suzerains étrangers en raison de circonstances diplomatiques hors de notre contrôle. Une fois notre société rétablie, cependant, nous n'avons jamais hésité à chasser tous les fonctionnaires étrangers et à lever nos propres bannières en rébellion. Que nous combattions les Éthiopiens au sud ou les empires musulmans au nord, nous devons être prêts à défendre jusqu'au dernier morceau de notre terre."
 med_strengthen_red_sea_trade:0 "Promouvoir le commerce de la mer Rouge"
 med_strengthen_red_sea_trade_desc:0 "Le commerce de transit des épices n'est plus ce qu'il était, et bien que les produits de Sarhal et d'Arabie eux-mêmes attirent encore des marchands lointains, nos fortunes semblent avoir décliné avec la diminution de la route des épices de la mer Rouge. Nous devons nous appuyer sur nos forces et, au lieu de regretter ce qui fut, il est temps de réorienter nos politiques commerciales pour nous concentrer pleinement sur le flux de marchandises d'Éthiopie et du Soudan."
 med_princely_ambitions:0 "Ambition princière"
 med_princely_ambitions_desc:0 "L'ère des princes est sur nous, et il est temps que nous réalisions notre plein potentiel en tant que puissance dans cette région. Étendons notre État aux dépens de nos voisins. Nous ne devons pas laisser les traditions anciennes ou les allégeances nous entraver, car si nous ne saisissons pas les terres et le pouvoir que nous pouvons, quelqu'un d'autre le fera."
 CDL_ideas:0 "Idées de Dali"
 CDL_ideas_start:0 "Traditions de Dali"
 CDL_ideas_bonus:0 "Ambition de Dali"
 cdl_renovate_the_city_of_jumie:0 "Rénover la cité de Jumie"
 cdl_renovate_the_city_of_jumie_desc:0 "La cité de Jumie, maintenant plus connue sous le nom de Dali, a toujours été la capitale de notre pays et le centre de notre pouvoir. Nous devons la rénover et l'agrandir, non seulement pour montrer notre respect pour cette ancienne cité, mais aussi pour démontrer notre richesse. Une capitale puissante suffira à notre peuple pour nous reconnaître comme le successeur légitime de l'ancien royaume de Nanzhao."
 cdl_tea_horse_route:0 "La Route du thé et des chevaux"
 cdl_tea_horse_route_desc:0 "Le thé est produit en grande quantité dans notre pays, et seuls les plus ignorants le verront simplement comme « une boisson agréable ». Pendant des siècles, nos voisins ont importé cette importante marchandise de chez nous, et parfois ils sont prêts à payer cher pour ces biens convoités. En renforçant notre contrôle sur la route du thé et des chevaux, nous aurions une emprise ferme sur tout le thé et serions en mesure de dominer ce commerce."
 cdl_confucian_influences:0 "Influences confucéennes"
 cdl_confucian_influences_desc:0 "Bien que n'étant pas un État confucéen en soi, nous vivons près des terres des Han et savons bien avec quelle efficacité ils peuvent diriger leur pays. C'est un avantage considérable que nous ne devrions pas ignorer ; en adoptant leurs théories politiques, nous serions en mesure de renforcer notre État."
 cdl_buddhas_teachings:0 "Enseignements de Bouddha"
 cdl_buddhas_teachings_desc:0 "Le bouddhisme Theravada est une influence considérable dans nos terres en tant que foi dominante dans toute la région où nous vivons. Cela peut être un outil puissant pour nous. En promouvant les enseignements Theravada, nous pouvons pacifier les peuples sous notre domination ainsi que ceux qui seront bientôt gouvernés par nous."
 cdl_benzhu_worship:0 "Culte de Benzhu"
 cdl_benzhu_worship_desc:0 "Les Ngel Zex, ou Benzhu dans la langue des Han, sont les dieux patrons locaux vénérés par certains de notre peuple. Le Benzhuisme a un panthéon de nombreux ancêtres déifiés, de héros divins et de puissants dieux de la nature. Les gens prient ces dieux pour de bonnes récoltes ou la santé. Toute tentative d'interdire ou de limiter une telle foi serait ridicule, car la pratique du culte de Benzhu peut maintenir notre société très stable. Nous devrions non seulement tolérer cette pratique, mais aussi la promouvoir dans les nombreux villages et petits établissements sous notre contrôle."
 cdl_rice_terraces:0 "Rizières en terrasses"
 cdl_rice_terraces_desc:0 "Notre terre est fertile, mais malheureusement aussi accidentée. Pour construire une grande nation, nous devons surmonter le terrain montagneux autour de nous. Nous devrions encourager les terrasses afin que plus de terres puissent être cultivées et plus de gens nourris."
 cdl_dian_bronze:0 "Bronze du Dian"
 cdl_dian_bronze_desc:0 "Notre pays est riche grâce à ses terres fertiles, mais il y a une autre grande fortune en notre possession sous la forme de riches mines de cuivre. Les mines sous notre contrôle produisent des minerais de haute qualité et en grande quantité ; nous devons faire bon usage de cet avantage et développer la production de ce cher métal."
 JMN_ideas:0 "Idées de Jan Mayen"
 JMN_ideas_start:0 "Traditions de Jan Mayen"
 JMN_ideas_bonus:0 "Ambition de Jan Mayen"
 polarized_nation:0 "Nation polarisée"
 polarized_nation_desc:0 "Notre nation est faite d'opposés polaires entre les gouvernants et les gouvernés. Notre élite a peu en commun avec nos sujets, différant grandement en langue, régime alimentaire, coutumes, apparence et même habitudes de sommeil en hiver. Afin d'assurer notre domination continue, nous devrons être tolérants envers leurs façons étranges."
 keeping_our_bearings:0 "Garder le cap"
 keeping_our_bearings_desc:0 "Lorsqu'on traverse les froides mers du nord, il est important d'avoir des navigateurs habiles, afin de ne pas perdre notre cap ou d'oublier les meilleurs spots de chasse sur la glace."
 grizzly_terrain:0 "Terrain redoutable"
 grizzly_terrain_desc:0 "Jan Mayen est froid et rude, et ses natifs ne sont pas amicaux envers ceux d'autres races plus faibles et plus petites. Nous pouvons utiliser cela à notre avantage si jamais nous sommes envahis."
 of_noble_bearing:0 "De noble prestance"
 of_noble_bearing_desc:0 "La fière lignée de nos monarques, se tenant bien plus haut sur deux pattes que les souverains de toute autre nation sur Terre, devrait être évidente pour tous !"
 come_bearing_gifts:0 "Venir avec des présents"
 come_bearing_gifts_desc:0 "Bien que nous soyons habitués à obtenir ce que nous voulons par la peur, il est parfois nécessaire d'employer la diplomatie quand on traite avec d'autres pays. Un généreux cadeau de poisson cru et de viande de phoque fera des merveilles pour dégeler des relations gelées."
 expand_the_bearocracy:0 "Étendre la bearocratie"
 expand_the_bearocracy_desc:0 "Notre empire a grandi, et sa classe dirigeante peut à peine suivre les demandes de tous nos sujets. Pour continuer à administrer notre pays efficacement, nous devrons attirer plus d'administrateurs talentueux des terres du nord où ils résident actuellement."
 the_right_to_bear_arms:0 "Le droit de porter les armes"
 the_right_to_bear_arms_desc:0 "Nous sommes une race de guerriers naturels, et pour nous, le droit de porter les armes est le droit le plus précieux de tous !"
 TRT_ideas:0 "Idées de Tirhut"
 TRT_ideas_start:0 "Traditions de Tirhut"
 TRT_ideas_bonus:0 "Ambition de Tirhut"
 trt_brahmin_kings:0 "Rois brahmanes"
 trt_brahmin_kings_desc:0 "Nos terres ont une longue histoire de préservation stricte du savoir brahmane. En effet, même nos souverains sont de la caste brahmane. Continuons à sauvegarder et soutenir les brahmanes Mithila et leurs écoles de sanskrit."
 trt_gateway_to_india:0 "Porte de l'Inde"
 trt_gateway_to_india_desc:0 "À travers les siècles, Tirhut a été un carrefour pour les marchands. Pour prospérer, Tirhut doit accueillir et protéger tous, des riches marchands transportant leurs marchandises le long de la Grand Trunk Road entre le Bengale et Kaboul aux nombreux baniyas voyageant entre leurs boutiques au Népal et leurs boutiques au Bihar. Même les petits Paikars qui vendent diverses choses le long de nos routes doivent être protégés par notre État."
 trt_scholars_and_poets:0 "Érudits et poètes"
 trt_scholars_and_poets_desc:0 "C'est le devoir de tout souverain vertueux de maintenir un grand nombre de poètes et d'érudits à la cour. Traditionnellement, cela a été particulièrement vrai dans nos terres, et de nombreux hommes et lignées célèbres ont prospéré ici. Nous devons ouvrir nos bras à tous les hommes de savoir, des « Pandits chantant l'essence des Védas aux Munshis exaltés par le savoir persan »."
 trt_purbias:0 "Purbias"
 trt_purbias_desc:0 "Les Purbias de Tirhut ont adopté l'usage des armes à feu tôt, et aujourd'hui, ils sont connus tant pour leur habileté au tir que pour leur compétence dans la production de poudre à canon elle-même. Faisons de ce groupe le noyau de notre bras d'infanterie et créons une armée forte et moderne."
 trt_river_landscape:0 "Paysage fluvial"
 trt_river_landscape_desc:0 "Un grand nombre d'affluents du Gange sillonnent notre pays. Des fleuves comme le Kosi, Gandak, Mahananda ou Bagmati arrosent nos terres et fournissent le transport à nos marchands. Parfois, cependant, ils sont aussi un grand obstacle. Les grandes pluies peuvent parfois inonder de vastes zones de notre État, répandant des maladies, détruisant des routes et nuisant à nos cultures. En tant que natifs de ces terres, c'est quelque chose que nous avons appris à gérer. Un envahisseur, en revanche, pourrait facilement se retrouver dans une situation bien plus difficile."
 trt_tirhuta:0 "Tirhuta"
 trt_tirhuta_desc:0 "Jadis, la poésie, les chansons et même les œuvres savantes étaient produites dans la langue maithili et l'écriture Tirhuta. Assurons-nous une fois encore que la langue de notre région devienne le vecteur de notre culture."
 trt_indigo:0 "Indigo et cultures de rente"
 trt_indigo_desc:0 "Une multitude de lacs dans nos terres ainsi que la qualité de notre sol et de notre climat font de Tirhut un lieu idéal pour la culture de nombreuses cultures de rente si recherchées en Occident. Développons la culture de l'indigo et du sucre afin de nous enrichir de leurs coûteuses fantaisies."
 ROM_ideas:0 "Idées romaines"
 ROM_ideas_start:0 "Traditions romaines"
 ROM_ideas_bonus:0 "Ambition romaine"
 roman_legions:0 "Les Légions romaines"
 roman_legions_desc:0 "Les Légions de Rome, à leur apogée, étaient considérées comme l'une des plus belles forces de combat que le monde ait jamais vues. Avec la renaissance de l'Empire, ses armées doivent une fois encore aspirer à rien de moins que ce niveau d'excellence martiale."
 pax_romana:0 "Pax Romana"
 pax_romana_desc:0 "Le droit romain brille comme un phare dans une mer de tourments, et les peuples des provinces peuvent reposer tranquilles sachant que la paix et l'ordre ont été restaurés dans tout l'Empire."
 imperium_sine_fine:0 "Imperium Sine Fine"
 imperium_sine_fine_desc:0 "Rome est une fois de plus un « Empire sans fin » et les ailes dorées de l'Aquila impériale s'étendent sur toujours plus de provinces. Heureusement, les fonctionnaires romains peuvent s'appuyer sur des siècles de tradition dans l'intégration efficace de nouvelles terres."
 roman_architecture:0 "Architecture romaine"
 roman_architecture_desc:0 "L'architecture célébrée de la Rome antique est revenue à la mode, et de nouveaux travaux publics impressionnants sont érigés dans les cités de tout l'Empire. Une nouvelle ère de Merveilles construites par l'homme est sur nous."
 legacy_of_rome:0 "Héritage de Rome"
 legacy_of_rome_desc:0 "Même après la chute de l'Empire d'Occident, l'héritage de Rome a continué à Cannor, et nombre de ses États successeurs étaient désespérés de revendiquer une partie de son ancienne gloire pour eux-mêmes. Maintenant, alors que l'Empire romain renaît de ses cendres tel le légendaire phénix, beaucoup ne peuvent s'empêcher de regarder avec admiration."
 spqr:0 "S.P.Q.R."
 spqr_desc:0 "Pour le Sénat et le Peuple de Rome ! Le Sénat impérial n'exerce peut-être pas autant de pouvoir politique que du temps de l'ancienne République, mais il fournit toujours aux citoyens de l'Empire un sentiment de représentation qui était tout simplement inouï dans la plupart des sociétés féodales."
 imperial_bureaucracy:0 "Bureaucratie impériale"
 imperial_bureaucracy_desc:0 "Administrer efficacement un grand empire composé d'une myriade de provinces et de cultures très différentes est une tâche monumentale. Cela a été accompli quand la Rome antique était à l'apogée de sa puissance, mais nous avons dû réapprendre nombre de ces leçons et les adapter pour mieux convenir au monde moderne."
 MNS_ideas:0 "Idées de Thomond"
 MNS_ideas_start:0 "Traditions de Thomond"
 MNS_ideas_bonus:0 "Ambition de Thomond"
 mns_fierce_rivalry:0 "Rivalité féroce"
 mns_fierce_rivalry_desc:0 "L'Irlande est une terre divisée entourée d'aspirants conquérants et de ceux qui l'utiliseraient pour mener leurs propres conflits. Si nous voulons être libres, nous devons chercher des amis et des alliés. Après tout, l'ennemi de mon ennemi est mon ami. Même si c'est un Écossais."
 mns_subdue_the_clans:0 "Soumettre les clans"
 mns_subdue_the_clans_desc:0 "À travers les siècles, les clans ont été la base de notre société et de notre culture en temps de paix, et une source de force en temps de guerre. Cependant, une nouvelle ère est maintenant sur nous, où ces mêmes clans pourraient être la force qui nous fait tomber et désunit notre peuple et nos efforts. Afin de survivre dans ce nouveau monde, nous devons nous défaire de certaines traditions de l'ancien et changer nos façons de faire."
 mns_cios_dubh:0 "Imposer le Cios Dubh"
 mns_cios_dubh_desc:0 "La royauté sur l'Irlande a toujours été un rêve et une ambition de nos souverains. Sur notre île, il y a de nombreuses façons d'étendre son influence et sa domination. Mais quelle autre méthode vaut mieux que de forcer son rival à payer le Cios Dubh — le privilège ultime d'être protégé par les armes de Thomond ?"
 mns_foreign_contracts:0 "Contrats étrangers"
 mns_foreign_contracts_desc:0 "À mesure que notre pouvoir et notre influence grandissent, notre ambition aussi. Afin de soumettre le reste des souverains irlandais et d'imposer notre domination, nous devons établir des contacts avec les centres militaires de Cannor, des endroits où nous pouvons engager des hommes de guerre expérimentés, un marteau que nous pouvons utiliser pour forger une Irlande unifiée au cas où le charme et la diplomatie ne suffiraient pas."
 mns_pasture_of_ireland:0 "Pâturages d'Irlande"
 mns_pasture_of_ireland_desc:0 "Il y a de nombreuses façons pour un homme d'être riche dans la vie. Nous avons été bénis avec les meilleurs pâturages de cette île, et maintenant la taille de notre bétail fait l'envie de toute l'Irlande."
 mns_thmond_army_reform:0 "Réforme de l'armée de Thomond"
 mns_thmond_army_reform_desc:0 "Rares sont ceux qui peuvent rivaliser avec nos prouesses au combat ou notre courage à affronter l'ennemi sur le champ de bataille. Mais pendant des siècles, les idées et concepts militaires ont dû voyager longtemps et loin pour nous atteindre d'ailleurs. Il est maintenant temps de maîtriser nos propres voies et de réformer notre armée pour qu'elle ne soit pas une simple application des idées de quelqu'un d'autre, mais une armée faite à notre image pour servir nos propres besoins."
 mns_overseas_ambition:0 "Ambition outre-mer de Thomond"
 mns_overseas_ambition_desc:0 "Pendant des générations, nos dirigeants ont rêvé d'une Irlande unifiée. Et aussi grand que soit ce rêve, l'Irlande n'est encore qu'une petite île, un caillou dans une mer de rochers. Non, nos nouvelles générations rêvent d'un rêve bien plus grand. Celui d'une terre vierge intouchée à l'ouest au-delà de la mer, une terre où nous pouvons établir une nouvelle Irlande, un pays sans rivaux."
 SLN_ideas:0 "Idées de Sligo"
 SLN_ideas_start:0 "Traditions de Sligo"
 SLN_ideas_bonus:0 "Ambition de Sligo"
 sln_promote_the_trade:0 "Promouvoir le commerce"
 sln_promote_the_trade_desc:0 "Située au milieu d'une grande route commerciale irlandaise, Sligo est parfaitement positionnée pour être un carrefour commercial de toute l'île. À cette fin, nous devons établir des contacts commerciaux avec nos voisins et laisser le commerce couler."
 sln_rebuild_the_castle_of_sligo:0 "Reconstruire le château de Sligo"
 sln_rebuild_the_castle_of_sligo_desc:0 "Pendant des siècles, de nombreux envahisseurs sont venus sur nos terres cherchant le contrôle du château stratégiquement important de Sligo. Tant de fois ce vieux fort a été réparé puis à nouveau détruit que nous ne sommes même plus sûrs aujourd'hui où se trouvent les principales ruines, même si des parties en sont encore debout. Quoi qu'il en soit, ce vieux fort est un symbole pour notre peuple. Si nous pouvons le reconstruire, nous pouvons transformer cette puissante renaissance d'une légende en un Nouvel Espoir pour eux."
 sln_galic_meets_norman:0 "Carrefour culturel"
 sln_galic_meets_norman_desc:0 "Sligo a été un point de rencontre de diverses cultures depuis des siècles. Certains venaient en paix, d'autres en conquérants, mais au final, ils ont tous laissé quelque chose derrière eux. C'est à nous, leurs descendants, d'embrasser cet héritage et de construire un avenir qui célèbre nos origines."
 sln_a_different_way:0 "Une voie différente"
 sln_a_different_way_desc:0 "Alors que nous avons regardé nos voisins se quereller et mener leurs petites guerres pour des questions triviales pendant des siècles, notre peuple a réalisé que déplacer les pions aux yeux de tous n'était pas la seule façon de faire. En utilisant nos contacts ainsi que notre influence commerciale, nous pouvions non seulement déplacer les pions, mais jouer un jeu entièrement différent, que seuls quelques-uns pouvaient voir."
 sln_study_the_norman_traditions:0 "Étudier les traditions normandes"
 sln_study_the_norman_traditions_desc:0 "La position de Sligo est à la fois une bénédiction et une malédiction. Sa position nous permet d'ouvrir notre terre au commerce maritime, mais comme nos ancêtres l'ont appris à leurs dépens, elle invite aussi toutes sortes d'aspirants conquérants venus par la mer à nos murs. Ainsi, pour assurer la sécurité de notre peuple, nous devons nous adapter, étudier les techniques terrestres et maritimes de nos ennemis et apprendre à les appliquer."
 sln_sligo_rules_the_waves:0 "Ambition navale de Sligo"
 sln_sligo_rules_the_waves_desc:0 "L'influence sur l'Irlande et une richesse sans pareille parmi nos voisins sont de belles ambitions dans la vie. Elles ont bien servi nos ancêtres. Mais c'est une ère nouvelle. Des rumeurs de nouvelles terres découvertes à l'ouest nous parviennent, et peut-être est-il temps pour nous de rejoindre le groupe exclusif de nations capables de naviguer les mers et de chercher gloire et richesses dans des terres lointaines."
 sln_pragmatism:0 "Le pragmatisme avant tout"
 sln_pragmatism_desc:0 "De notre temps, nous avons accompli de nombreuses choses glorieuses : nous avons bâti un réseau commercial florissant. Nous avons navigué les mers près et loin. Nous avons rencontré des gens nouveaux et intéressants. Et nous avons commercé avec eux."
 DMS_ideas:0 "Idées de Desmond"
 DMS_ideas_start:0 "Traditions de Desmond"
 DMS_ideas_bonus:0 "Ambition de Desmond"
 dms_the_land_of_castles:0 "La terre des châteaux"
 dms_the_land_of_castles_desc:0 "Depuis les premiers jours du royaume de Desmond, nos ancêtres savaient que le meilleur moyen de maîtriser une terre était d'être omniprésent. Et ainsi, ils construisirent des châteaux, des manoirs et d'autres grands bâtiments qui se dressent fièrement à ce jour. Et ainsi, nous perpétuons cette tradition aujourd'hui. Une leçon bien apprise."
 dms_cadet_lines:0 "Lignées cadettes"
 dms_cadet_lines_desc:0 "Famille. La famille ne change jamais. Surtout quand il s'agit de noblesse. Mais pourquoi devrions-nous craindre nos lignées familiales cadettes comme le reste de Cannor ? Notre propre parenté ? Non, au lieu de la peur, des intrigues et des complots, nous les utiliserons, découperons la terre, distribuerons des titres, des manoirs et des châteaux, étendrons la famille royale et créerons une présence dans chaque recoin sombre de notre royaume."
 dms_gaelic_bastion:0 "Bastion gaélique"
 dms_gaelic_bastion_desc:0 "De nombreux aspirants envahisseurs sont venus sur nos terres cherchant pillage et gloire facile. Mais tous se sont brisés contre le royaume de Desmond. Haut et fier, notre peuple se dresse contre tous les périls et malgré tout, telle est notre voie. Le plus fort bastion gaélique."
 dms_the_munster_ambition:0 "L'ambition de Munster"
 dms_the_munster_ambition_desc:0 "L'ancien royaume de Munster n'est plus depuis longtemps, ses terres divisées, et son autorité presque entièrement diminuée. Mais son héritage et sa gloire vivent encore dans les fières lignées dynastiques de Desmond, ses vrais fils et héritiers. Non, nous n'oublierons jamais, et un jour nous reprendrons les terres de Munster."
 dms_fierce_independence:0 "Indépendance farouche"
 dms_fierce_independence_desc:0 "Nos ancêtres ont tenu tête aux envahisseurs et conquérants d'innombrables fois. Même en temps de grande souffrance et de perte, notre royaume a enduré contre toutes les tempêtes et survécu jusqu'à ce jour. Là où de nombreux seigneurs d'Irlande se sont inclinés et ligués pour survivre, les fiers fils et filles de Desmond se sont tenus seuls. Indépendants et sans maîtres jusqu'au bout."
 dms_promote_the_clture_of_service:0 "Promouvoir la culture du service"
 dms_promote_the_clture_of_service_desc:0 "La vie n'a jamais été facile sur notre terre. Il faut être dur simplement pour survivre, et il faut un cœur de guerrier pour réussir. Des talents très appréciés et souvent recherchés parmi les nations belliqueuses de Cannor. Au lieu de regarder nos fils se battre entre eux pour des terres souvent sans valeur, encourageons-les à sortir dans le monde et à chercher le service militaire et une vie d'honneur et de gloire."
 dms_inner_perfection:0 "Perfection intérieure"
 dms_inner_perfection_desc:0 "Pendant des siècles, les royaumes de Cannor ont traversé guerres et épreuves, se forgeant en nations puissantes et empires coloniaux. Notre plus grande réussite ? Non seulement survivre aux origines les plus humbles, mais prospérer au milieu de tout cela, contre toute attente. Que pourrait-on vraiment demander de plus ?"
 african_great_lakes_ideas:0 "Idées interlacustres"
 african_great_lakes_ideas_start:0 "Traditions interlacustres"
 african_great_lakes_ideas_bonus:0 "Ambition interlacustre"
 source_of_the_nile:0 "Source du Nil"
 source_of_the_nile_desc:0 "Les Grands Lacs qui nourrissent notre peuple de poisson et arrosent leurs champs sont recherchés par beaucoup. Cherchant une vie meilleure, un flot constant de peuples nomades vient s'installer à l'intérieur de nos frontières. Si nous pouvons intégrer ces peuples nilotiques dans notre pays, nous ne manquerons jamais de la main-d'œuvre dont nous avons besoin pour nous étendre."
 heirs_of_kitara:0 "Héritiers de Kitara"
 heirs_of_kitara_desc:0 "La légende nous dit que tous les Grands Lacs étaient jadis contrôlés par le puissant empire de Kitara. C'est notre tâche de réunir ce qui fut jadis brisé et de revendiquer notre héritage légitime en tant que vrais héritiers de Kitara."
 no_illegitimate_children:0 "Pas d'enfants illégitimes"
 no_illegitimate_children_desc:0 "Depuis des temps immémoriaux, notre peuple croit que tout fils peut hériter du père. Par la pratique de la polygamie, toute femme qui porte l'enfant de notre souverain peut être mariée à la famille royale et sa progéniture faite héritière royale."
 cwezy_religion:0 "Lignées sacrées"
 cwezy_religion_desc:0 "Tout comme la légende nous dit que ces terres furent jadis unies sous Kitara et le grand héros Ruhinda, nous sommes unis par une croyance en un ensemble commun de tabous et un panthéon commun. Bien que différents esprits soient honorés par différents clans et différents royaumes, nous avons tous un passé commun. Nous devons protéger les familles qui entretiennent nos sanctuaires et temples. D'autres nous jugeront selon la façon dont nous traitons ces lignées, et ils peuvent maudire ceux qui les irritent."
 emitwe:0 "Emitwe"
 emitwe_desc:0 "Assembler des groupes de raid de manière ad hoc a peut-être bien fonctionné pour nos ancêtres, mais il est grand temps de créer un système pour maintenir une force militaire plus permanente. Parmi les nombreuses grandes lignées de notre royaume, nous choisirons les plus honorables pour servir comme nos soldats pour les générations à venir. En échange de privilèges spéciaux, ces hommes seront stationnés dans des camps le long de nos frontières et s'entraîneront pour les guerres inévitables à venir."
 unity_of_clans:0 "Unité des clans"
 unity_of_clans_desc:0 "Chacun des royaumes des Grands Lacs est composé d'un certain nombre de clans, transcendant souvent les frontières politiques pour lesquelles nous avons tant lutté. Nous devons nous assurer d'avoir le soutien des centaines de clans au sein de notre royaume afin de pouvoir nous tenir unis face à nos ennemis."
 development_of_clientship:0 "Développement du clientélisme"
 development_of_clientship_desc:0 "L'Ubugabire, les relations personnelles de client et de patron, sont le fondement sur lequel une grande partie de notre société a été construite. Formalisons ces relations et rendons-les politiques plutôt que personnelles. Un système sur lequel l'État lui-même peut puiser la loyauté plutôt que le souverain personnellement. Ce système de privilèges et d'autorité administrative permettra à notre État de croître tout en gérant efficacement les nouvelles terres que nous conquérons."
 MRA_ideas:0 "Idées Maravi"
 MRA_ideas_start:0 "Traditions Maravi"
 MRA_ideas_bonus:0 "Ambition Maravi"
 mra_fresh_perspectives:0 "Perspectives nouvelles"
 mra_fresh_perspectives_desc:0 "Nous sommes bien équipés pour résoudre les nombreux problèmes et conflits de longue date des peuples autour du lac Malawi. Notre peuple est relativement nouveau venu dans ces terres et nous ne sommes pas liés par des traditions anciennes ou des idées préconçues de ce qui est possible. Notre flexibilité est notre force et nous permettra de dominer les autres puissances de cette région."
 mra_mlira_cult:0 "Culte de Mlira"
 mra_mlira_cult_desc:0 "Une fois par an, nous invitons les chefs de toutes les lignées royales affiliées à nous dans notre capitale pour accomplir le rituel de Mlira, le grand esprit qui jadis guida nos ancêtres vers ce pays. En allumant les feux autour du lac Malawi, nous affirmons la position des chefs afin que nous puissions célébrer nos liens mutuels."
 mra_fertile_land:0 "Une terre fertile"
 mra_fertile_land_desc:0 "Les terres autour de la pointe sud du lac Malawi sont fertiles et bien adaptées pour nourrir un État en expansion. Notre population croissante assure un flux constant de nouvelles recrues pour nous aider à réaliser nos ambitions politiques."
 mra_ivory_trade:0 "Commerce de l'ivoire Maravi"
 mra_ivory_trade_desc:0 "Traditionnellement, tous les marchands d'ivoire convergent à l'extrémité sud du lac Malawi. De là, leurs marchandises sont envoyées au sud le long des systèmes fluviaux du Shire et du Zambèze avant d'être reprises par le système de distribution des États commerciaux swahilis. Nous avons une excellente position pour contrôler ce commerce et développer la région commerciale du lac Malawi."
 mra_serving_abroad:0 "Servir à l'étranger"
 mra_serving_abroad_desc:0 "L'esprit aventurier de notre peuple a rendu nos guerriers et marchands connus bien au-delà de nos frontières. Dans chaque village entre le lac Malawi et la mer, des Maravi peuvent être trouvés servant comme soldats ou intermédiaires dans les lucratifs commerces de l'or ou de l'ivoire. Nous devrions encourager nos hommes à chercher fortune à l'étranger afin que leur expérience puisse bénéficier à notre pays."
 mra_chimanga_ndi_moyo:0 "Chimanga Ndi Moyo"
 mra_chimanga_ndi_moyo_desc:0 "La présence toujours croissante des marchands occidentaux a apporté au moins une bonne chose. Le maïs est une culture d'Aelantir, mais il est très bien adapté à nos terres et à nos besoins. Nous devons faire tout notre possible pour encourager la diffusion de la culture du maïs, car « le maïs, c'est la vie »."
 mra_control_of_the_slave_trade:0 "Contrôle du commerce des esclaves"
 mra_control_of_the_slave_trade_desc:0 "Bien que les esclaves ne soient pas nouveaux dans cette région, les expéditions d'esclavagistes occidentaux sont devenues de plus en plus audacieuses dans les terres que nous contrôlons, ne laissant aucun homme, femme ou enfant en sécurité. Des étrangers s'infiltrent dans notre pays dans une tentative de le dépouiller de sa marchandise la plus précieuse. Nous ne pouvons pas nous permettre de laisser cette attaque contre notre autorité sans réponse !"
 ANT_ideas:0 "Idées Antemoro"
 ANT_ideas_start:0 "Traditions Antemoro"
 ANT_ideas_bonus:0 "Ambition Antemoro"
 ant_tampon_tany:0 "S'unir aux Tompon-Tany"
 ant_tampon_tany_desc:0 "Autant que nous chérissons nos racines, nous sommes complètement isolés en tant que seul État musulman de Madagascar. Afin de survivre et de prospérer ici, nous devons continuer à nous mêler et à nous intégrer aux anciens maîtres de cette terre, les Tompon-Tany, formant une nouvelle identité dans une nouvelle terre."
 ant_sorabe:0 "Sorabe"
 ant_sorabe_desc:0 "Nos ancêtres ont apporté avec eux une riche tradition scribale arabe sur cette île, que nous avons maintenant commencé à utiliser pour créer des textes en malgache. Instituons des offices spéciaux pour protéger et honorer notre héritage ancien ainsi que les scribes qui font du malgache une langue littéraire."
 ant_andrianoni:0 "Fonction de l'Andrianoni"
 ant_andrianoni_desc:0 "Notre pays est dominé par quatre clans aristocratiques : les Anteoni, les Antemahazo, les Anteisambo et les Zafikasinambo. L'équilibre des pouvoirs entre ces quatre groupes change constamment, mais ils visent tous à créer un État plus puissant pour nous tous. Nous devons choisir notre dirigeant, l'Andrianoni, parmi l'un de ces quatre clans et laisser leur compétition pour ce titre stimuler leurs ambitions pour notre pays."
 ant_ombiasa:0 "Ombiasa"
 ant_ombiasa_desc:0 "Notre pays produit un plus grand nombre de spécialistes qualifiés que nous ne pouvons utiliser. Cela a conduit un grand nombre d'hommes à quitter nos terres pour chercher un emploi ailleurs sur l'île. Encourageons cette tendance et bénéficions d'une réputation de pays de savoir. Aucun souverain malgache ne sera sans un conseiller Ombiasa Antemoro."
 ant_religious_control:0 "Contrôle religieux"
 ant_religious_control_desc:0 "Peu de sociétés malgaches sont aussi informées des rituels religieux appropriés que nous. Faisons de ce savoir notre arme pour créer une société plus forte et plus saine. En faisant des règles religieuses la loi de notre peuple, nous pouvons renforcer notre unité et diminuer l'influence des étrangers au sein de nos frontières."
 ant_slave_trade:0 "Renforcer le contrôle sur le commerce des esclaves"
 ant_slave_trade_desc:0 "La demande d'esclaves des États commerciaux swahilis croît de jour en jour. Nos liens religieux et culturels avec le monde plus large de l'océan Indien font de nous les intermédiaires idéaux pour ce commerce. Encourageons ceux qui cherchent à amener des esclaves malgaches à le faire depuis nos ports et à faire leurs affaires sur nos marchés."
 ant_unify_political_and_religious_power:0 "Unifier le pouvoir politique et religieux"
 ant_unify_political_and_religious_power_desc:0 "Traditionnellement, le pouvoir politique dans notre pays repose sur les clans aristocratiques tandis que le pouvoir sur les aspects spirituels de notre peuple est divisé entre quatre clans sacerdotaux. Si nous pouvions réussir à unir ces deux fonctions, le haut clergé et la fonction d'Andrianoni, nous atteindrions un contrôle sans précédent sur l'État Antemoro."
 malagasy_ideas:0 "Idées malgaches"
 malagasy_ideas_start:0 "Traditions malgaches"
 malagasy_ideas_bonus:0 "Ambition malgache"
 malagasy_fortify_coastline:0 "Fortifier le littoral"
 malagasy_fortify_coastline_desc:0 "Les marchands swahilis et arabes sont impatients de nous vendre de l'or et de commercer contre du tissu, des esclaves et du bétail, mais tous ceux qui cherchent nos ports n'ont pas de bonnes intentions. Nous devons toujours garder les fortifications de nos villes portuaires à jour afin qu'elles puissent résister aux raids d'outre-mer ainsi qu'aux invasions depuis le centre de l'île."
 malagasy_zafivolemena:0 "Zafivolamena"
 malagasy_zafivolemena_desc:0 "Les souverains de notre peuple tracent tous leur ascendance jusqu'aux Maroserana, une grande lignée qui a donné des rois à un grand nombre des États de cette île. L'origine des Maroserana reste un mystère, mais leur autorité est incontestée, tout comme leur capacité à conduire le commerce avec les continentaux pour acquérir l'or rouge que nous tenons pour sacré."
 malagasy_pirate_ports:0 "Ports de pirates"
 malagasy_pirate_ports_desc:0 "Le commerce maritime a toujours été la principale force motrice dans cette région, et là où vont les marchands, les pirates suivent toujours. Alors que les navires cannoréens ont commencé à maîtriser l'océan Indien, leur richesse flottante a attiré un nombre croissant de chercheurs de fortune. Protégeons ces pirates pour une modeste rétribution. Il est juste que nous puissions tirer quelque profit des richesses qui autrement ne feraient que passer devant nous."
 malagasy_raid_warfare:0 "Traditions martiales"
 malagasy_raid_warfare_desc:0 "Les peuples de l'intérieur ont été élevés dans la crainte de nos guerriers et de leurs raids constants. Construisons sur cette tradition de guerre et créons une armée forte prête à se lever quand nous en avons besoin."
 malagasy_sacred_law:0 "Loi sacrée"
 malagasy_sacred_law_desc:0 "Nos rois sont les gardiens des reliques sacrées Dady dont découle toute autorité dans nos terres. Les liens étroits de la famille royale avec ces esprits sacrés de nos ancêtres en font les idéaux pour agir comme autorité locale dans les villages que nous contrôlons. Nous devons faire appliquer la loi sacrée et nous assurer que toutes les positions de pouvoir restent avec nos princes royaux."
 malagasy_foreign_traders:0 "Contrôle des marchands étrangers"
 malagasy_foreign_traders_desc:0 "Notre État contrôle le littoral de l'une des parties les plus fréquentées du réseau commercial de l'océan Indien, et il est naturel qu'un grand nombre de marchands d'un large éventail de cultures résident à l'intérieur de nos frontières. Ce que nous ne pouvons pas risquer, cependant, c'est que ces marchands établissent leurs propres sociétés à côté de la nôtre. Nous devons intégrer de force toutes les communautés marchandes étrangères et nous assurer qu'elles réalisent à quel point elles dépendent de notre protection."
 malagasy_permanent_taxation_system:0 "Système de taxation permanent"
 malagasy_permanent_taxation_system_desc:0 "Traditionnellement, nous nous sommes appuyés sur une collecte irrégulière et périodique des revenus pour financer notre État. La force des armes et l'autorité religieuse ont toujours assuré que cela fonctionnait assez bien. Si notre État doit croître, cependant, le moment est venu de créer un système de taxation permanent plus efficace et fiable."
 MIR_ideas:0 "Idées d'Imerina"
 MIR_ideas_start:0 "Traditions d'Imerina"
 MIR_ideas_bonus:0 "Ambition d'Imerina"
 mir_unify_inlands:0 "Unifier les royaumes de l'intérieur"
 mir_unify_inlands_desc:0 "Les hauts plateaux de Madagascar sont divisés entre de nombreux petits princes, se chamaillant constamment entre eux. Notre première priorité doit être d'unir ces terres et de faire obéir leurs petits souverains, que ce soit par la diplomatie et les mariages ou par la force et la conquête."
 mir_twelve_sampys:0 "Les Douze Sampys d'Imerina"
 mir_twelve_sampys_desc:0 "Traditionnellement, chaque village de notre royaume est protégé par une puissante idole Sampy. Avec la création d'un plus grand royaume d'Imerina, cependant, c'est une coutume inutilement provinciale. Ordonnons à tous les chefs d'apporter leurs Sampys dans notre capitale. Les douze Sampy les plus puissants protégeront désormais le royaume entier, tandis que tous les autres Sampys devront être détruits !"
 mir_intensive_rice_cultivation:0 "Culture intensive du riz"
 mir_intensive_rice_cultivation_desc:0 "Les hauts plateaux centraux de cette île sont idéaux pour la riziculture irriguée et sont utilisés pour la culture du riz depuis plus longtemps que quiconque s'en souvienne. Nous devons continuer à étendre les travaux d'irrigation pour créer des rizières dans toutes les terres sous notre contrôle, sécurisant les marais et marécages et construisant des terrasses partout où c'est possible."
 mir_fortify_highlands:0 "Fortifier les hauts plateaux"
 mir_fortify_highlands_desc:0 "Les hauts plateaux de Madagascar sont à bien des égards une ligne de défense naturelle contre les peuples des côtes, mais notre pays manque d'un vrai bastion. En fortifiant les collines centrales autour de notre capitale, en creusant des fossés hadivory et des tranchées hadifetsy et en créant de véritables portes de pierre pour bloquer les envahisseurs, nous pouvons utiliser correctement nos défenses naturelles."
 mir_reform_the_nobility:0 "Réformer les Andriana"
 mir_reform_the_nobility_desc:0 "Depuis des siècles, la classe noble des Andriana nous a bien servis. À mesure que notre royaume grandit et se modernise, cependant, il y a plusieurs façons de faire servir ces nobles plus efficacement. Divisons les familles nobles en sous-castes avec différentes tâches. Nous devrions également renforcer l'autorité de nos détenteurs de fiefs et leur capacité à lever des impôts en notre nom."
 mir_unified_legal_system:0 "Réformer le système juridique"
 mir_unified_legal_system_desc:0 "Une seule loi doit régner sur cette terre. Créons un code de lois commun à tous les peuples sous notre contrôle. Il doit y avoir des règles sévères pour ceux qui enfreindraient les règles de la société. Que quiconque se tourne vers notre souverain pour la justice."
 mir_foloalinday:0 "Foloalindahy"
 mir_foloalinday_desc:0 "Un grand pays nécessite une grande armée. L'impôt traditionnel de travail que tous nos sujets doivent fournir nous donne un excellent terrain de recrutement pour une force nouvelle, plus grande et mieux équipée. Armés des meilleures armes que notre État puisse fournir, les Foloalindahy, « les 100 000 », seront notre première défense ainsi que notre force offensive la plus féroce."
 BTS_ideas:0 "Idées Betsimisaraka"
 BTS_ideas_start:0 "Traditions Betsimisaraka"
 BTS_ideas_bonus:0 "Ambition Betsimisaraka"
 bts_people_of_the_coast:0 "Peuple de la côte"
 bts_people_of_the_coast_desc:0 "La côte occidentale de Madagascar est couverte de forêts tropicales et d'un grand nombre de petits États avec leurs chefs indépendants. Que ce soit en soignant leur bétail ou en partant naviguer en haute mer, notre peuple est tellement habitué à son indépendance que tout conquérant trouverait difficile, voire impossible, d'intégrer cette région dans un royaume plus grand. Pour chaque établissement, il y a un nouveau groupe de guerriers prêts à défendre farouchement ce qui est à eux."
 bts_indivisable_many:0 "Les nombreux indivisibles"
 bts_indivisable_many_desc:0 "Pendant trop longtemps, notre peuple a été divisé en une myriade de petits États gouvernés par de petits souverains locaux. Nous devons unir toutes les chefferies à l'intérieur de nos frontières et forcer tous les chefs à vraiment plier le genou devant une seule personne. Nous devons devenir les nombreux indivisibles, Betsimisaraka, pas seulement de nom."
 bts_gifts_and_hostages:0 "Cadeaux et otages"
 bts_gifts_and_hostages_desc:0 "Bien que notre peuple soit maintenant uni, plier le genou devant un suzerain commun n'a pas été facile pour eux. En convoquant tous les chefs subordonnés dans la capitale, nous pouvons les employer comme prestigieux envoyés royaux Ompanghalalan. Certains appelleraient cela une politique de prise d'otages ; nous voyons simplement cela comme un moyen de rappeler à notre peuple épris d'indépendance ses loyautés."
 bts_european_pirate_settlements:0 "Communautés de pirates cannoréens"
 bts_european_pirate_settlements_desc:0 "Bien que notre côte ait toujours attiré un bon nombre de pirates, nous voyons maintenant un nombre croissant de boucaniers cannoréens cherchant à s'enrichir des richesses de l'océan Indien. Ces hommes ont besoin de ports sûrs et beaucoup ont déjà commencé à s'installer sur nos terres, se mariant avec la population locale. Nous devrions accueillir ces nouveaux venus et leurs navires, renforçant notre propre pouvoir en haute mer."
 bts_royal_justice:0 "Justice royale"
 bts_royal_justice_desc:0 "Notre pays reste divisé en un grand nombre de chefferies, avec des lois et des coutumes différant d'un établissement à l'autre. Instituons un droit pour chacun de nos sujets de se tourner vers la plus haute justice au lieu de leurs chefs locaux. De cette façon, nous pouvons garantir l'uniformité du droit à l'intérieur de nos frontières et résoudre plus facilement les conflits entre habitants de différentes cités."
 bts_european_diplomacy:0 "Diplomatie cannoréenne"
 bts_european_diplomacy_desc:0 "Nos ports occidentaux sont très attractifs pour les nombreuses puissances cannoréennes qui souhaitent maintenant contrôler l'océan Indien. Nous bénéficierions grandement de tels amis puissants. Approchons ces puissances maritimes et concluons des accords avec elles pour l'utilisation de notre littoral dans leurs entreprises navales."
 zambezi_ideas:0 "Idées du Zambèze"
 zambezi_ideas_start:0 "Traditions du Zambèze"
 zambezi_ideas_bonus:0 "Ambition du Zambèze"
 zambezi_warrior_culture:0 "Culture guerrière"
 zambezi_warrior_culture_desc:0 "Notre société chérit les guerriers habiles par-dessus tout. Bien que nous ayons souvent reconnu des suzerains étrangers, nous avons toujours gagné notre droit à l'autonomie en menant l'expansion de leur royaume. Mais de grands guerriers peuvent être trouvés en de nombreux endroits. Plutôt que de rivaliser avec les tribus environnantes, ouvrons nos bras aux guerriers habiles où que nous les trouvions. De cette façon, nous n'aurons pas à craindre des adversaires féroces comme les Zimba cannibales, car ils combattront pour nous plutôt que contre nous."
 zambezi_maravi_influences:0 "Influences Maravi"
 zambezi_maravi_influences_desc:0 "L'État Kalonga Maravi a apporté de nombreuses nouvelles innovations dans cette région, et nous nous sommes souvent retrouvés dans son ombre, politiquement et technologiquement. Adopter les idées Maravi les plus utiles permettrait à notre État de croître et de se développer."
 zambezi_control_the_zambezi_trade:0 "Contrôle du commerce du Zambèze"
 zambezi_control_the_zambezi_trade_desc:0 "Le fleuve Zambèze est l'artère de tout le commerce de cette région. Sur ce fleuve, l'ivoire est apporté du nord et de l'ouest vers les ports de commerce océaniques à l'est. Toutes les puissances locales ont un intérêt naturel à contrôler ce commerce, mais peu ont un accès au fleuve aussi naturel que nous. Faisons tout notre possible pour exclure tout autre État du commerce du Zambèze et les forcer à nous utiliser comme intermédiaires pour tout commerce entre les cités côtières et les hauts plateaux sarhali."
 zambezi_strengthen_the_chieftaincies:0 "Renforcer les chefferies"
 zambezi_strengthen_the_chieftaincies_desc:0 "Traditionnellement, le niveau d'autorité le plus bas et peut-être le plus influent dans notre pays a été les conseils des anciens du village. Cela a peut-être bien fonctionné pour préserver les anciennes coutumes dans les sociétés locales, mais si notre État doit croître, nous devons plutôt renforcer les chefs locaux, créant une classe de personnes capables d'agir de manière plus rapide et plus dynamique tout en étant responsables directement devant notre souverain."
 zambezi_centralizing_the_mbona_cult:0 "Centraliser le culte de Mbona"
 zambezi_centralizing_the_mbona_cult_desc:0 "L'eau est essentielle à la croissance de tout ce qui vit. Le sanctuaire de l'esprit du faiseur de pluie Mbona est peut-être le centre spirituel le plus important de nos terres. Ici, le grand esprit parle aux vivants à travers ses épouses successives. Promouvons le culte de Mbona et assurons-nous que le pouvoir de nomination de nouvelles épouses pour l'esprit appartient à notre souverain."
 zambezi_wealth_of_the_shire_valley:0 "Richesse de la vallée du Shire"
 zambezi_wealth_of_the_shire_valley_desc:0 "La vallée du fleuve Shire est la source d'une grande partie de la richesse de notre peuple. Ici, le précieux tissu Machila est produit, et de cette région, nous pouvons exporter du sel et du fer. Ces denrées peuvent être mises à profit pour attacher plus étroitement à nous les petits souverains moins fortunés. Une fois qu'ils dépendent de nous pour ces produits vitaux, nous pouvons commencer à les rapprocher de notre cercle de subordonnés."
 zambezi_loyal_local_representatives:0 "Représentants loyaux"
 zambezi_loyal_local_representatives_desc:0 "Les terres que nous conquérons doivent être gouvernées. Bien qu'il puisse être nécessaire de préserver initialement l'autorité des souverains locaux, nous devons nous assurer de compter sur des personnes de confiance. Chaque fois que cela est possible, nous devons promouvoir des représentants locaux issus de nos propres lignées cadettes plutôt que des dynasties locales."
 congolese_minor_ideas:0 "Idées kongolaises"
 congolese_minor_ideas_start:0 "Traditions kongolaises"
 congolese_minor_ideas_bonus:0 "Ambition kongolaise"
 congolese_minor_isolated_lands:0 "Le bassin du fleuve Kongo"
 congolese_minor_isolated_lands_desc:0 "La position de notre cœur de territoire loin de la côte, avec une large ceinture de savane et seulement le fleuve Kongo pour aider au transport, rend difficile pour un envahisseur d'établir des lignes d'approvisionnement convenables. Même un envahisseur technologiquement plus avancé devrait y réfléchir à deux fois avant d'envahir notre pays."
 congolese_minor_elephant_hunts:0 "Chasses à l'éléphant"
 congolese_minor_elephant_hunts_desc:0 "Les déprédations des grands troupeaux d'éléphants contre nos terres ne peuvent être ignorées. Les batailles contre eux offrent à notre jeunesse une excellente occasion de prouver leur valeur."
 congolese_minor_aristocratic_merit:0 "Mérite aristocratique"
 congolese_minor_aristocratic_merit_desc:0 "Pour assurer que le pouvoir reste entre les mains de l'aristocratie, nous devrions nous efforcer de nommer les meilleurs et les plus brillants de nos nobles aux postes qui leur conviennent le mieux, plutôt que de favoriser les liens familiaux."
 congolese_minor_intiation_rites:0 "Rites d'initiation"
 congolese_minor_intiation_rites_desc:0 "Le passage des garçons à l'âge adulte est un événement qui doit être marqué par des cérémonies solennelles. À travers ces rites, quiconque peut devenir un véritable membre de la tribu et gonfler nos rangs."
 congolese_minor_aggressive_migrations:0 "Migration agressive"
 congolese_minor_aggressive_migrations_desc:0 "Par le passé, divers groupes ont quitté ces terres et créé des royaumes dans d'autres parties de Sarhal. En envoyant non seulement des armées, mais aussi des colons pour vivre dans les terres conquises, nous pouvons grandement renforcer notre nation."
 congolese_minor_subordinate_chiefs:0 "Chefs subordonnés"
 congolese_minor_subordinate_chiefs_desc:0 "Nul ne peut gouverner seul. Mieux vaut avoir des chefs subordonnés sous notre suzeraineté suprême pour gérer les affaires locales, et les laisser à leur tour nous rendre hommage."
 congolese_minor_ivory_trade:0 "Le commerce de l'ivoire"
 congolese_minor_ivory_trade_desc:0 "Aussi éloignés que nous soyons des réseaux commerciaux mondiaux en expansion, il y a toujours eu ceux qui étaient prêts à nous payer pour les grandes défenses des éléphants que nous tuons. Nous devrions encourager ce commerce et le réguler à notre avantage."
 TBK_ideas:0 "Idées Tumbuka"
 TBK_ideas_start:0 "Traditions Tumbuka"
 TBK_ideas_bonus:0 "Ambition Tumbuka"
 tbk_central_melting_pot:0 "Creuset central"
 tbk_central_melting_pot_desc:0 "À l'extrémité nord du lac Malawi, notre État est au carrefour de divers groupes migrants. Un grand nombre de clans étrangers s'installent ou passent par nos terres, apportant souvent de nouveaux matériaux et coutumes avec eux. Bien que l'arrivée de groupes comme les Kyungu ou les Mwaulambyas ne se soit pas faite sans friction, les intégrer peut certainement être à notre avantage."
 tbk_healthy_priest_kings:0 "Rois-prêtres en bonne santé"
 tbk_healthy_priest_kings_desc:0 "Jadis, les peuples d'ici vénéraient des serpents divins. Maintenant qu'ils ont les Kyungus pour les guider, ils honorent plutôt nos ancêtres. En tant que leur représentant vivant, le Roi est un dieu parmi les hommes et la santé de notre royaume dépend de lui. Nous devons donc le protéger et le renforcer autant que possible, et dans l'éventualité impensable où il attraperait une quelconque maladie, nous devons être prêts à l'étouffer afin qu'un autre Kyungu puisse prendre sa place."
 tbk_office_of_the_mulwa:0 "Fonction du Mulwa"
 tbk_office_of_the_mulwa_desc:0 "Bien que notre peuple ait de plus en plus adopté le culte ancestral de notre famille régnante, nous avons besoin d'un plus grand contrôle sur la manière et le moment où ils pratiquent leur culte. Instituons un office responsable de notre sanctuaire principal auquel les gardiens de tous les autres sanctuaires doivent répondre. Par des rituels régularisés, tous les prêtres et chefs doivent venir dans notre capitale pour professer leur loyauté envers leurs souverains."
 tbk_inter_african_trade:0 "Commerce inter-sarhali"
 tbk_inter_african_trade_desc:0 "Bien que les gens et les marchandises aient toujours circulé entre la région Luba de Sarhal central et la région côtière de Sarhal oriental, cela s'est fait principalement directement vers les royaumes du sud, avec le Zambèze comme nœud principal du réseau commercial. Récemment, cependant, les peuples Yao se sont de plus en plus impliqués dans le transport de marchandises entre nos terres et la côte, et un nombre croissant de nos propres marchands apportent maintenant ivoire, esclaves, tissus, perles et coquillages mphande entre la côte et le bassin du fleuve Kongo. Embrassons ce nouveau développement et saisissons notre place comme nouvel entrepôt de Sarhal oriental."
 tbk_break_the_power_of_the_makambala:0 "Briser le pouvoir des Makambala"
 tbk_break_the_power_of_the_makambala_desc:0 "Les Makambala sont les prêtres-administrateurs qui aident à diriger notre royaume. Ils assistent l'héritier qui succède et s'assurent qu'aucun prétendant au trône ne subsiste. Avec le temps, cependant, leur influence et leur soif de pouvoir ont grandi. Il est temps que nous freinions leur pouvoir et supprimions leur droit de tuer les princes ou les rois royaux. Ce n'est que lorsque le pouvoir sera fermement entre les mains de notre Kyungu que notre pays pourra véritablement grandir et prospérer."
 tbk_welcome_the_swahili_merchants:0 "Accueillir les marchands swahilis"
 tbk_welcome_the_swahili_merchants_desc:0 "Un nombre croissant de marchands swahilis ont commencé à s'installer sur nos terres en raison du commerce terrestre croissant entre nos terres et les cités côtières. Les Swahilis ont une bien plus longue expérience de participation au réseau commercial de l'océan Indien, et nous pourrions bien profiter de leur expérience. Nous devrions à la fois permettre et encourager cette tendance comme moyen de développer notre réseau commercial, indépendamment de toute animosité de notre propre communauté marchande."
 KUB_ideas:0 "Idées Kuba"
 KUB_ideas_start:0 "Traditions Kuba"
 KUB_ideas_bonus:0 "Ambition Kuba"
 kub_journey_of_enlightenment:0 "Voyage d'illumination"
 kub_journey_of_enlightenment_desc:0 "Selon la tradition, notre fondateur entreprit un grand voyage d'illumination vers des terres à l'ouest avant d'unir notre peuple. Nous devons nous efforcer d'apprendre de son exemple et d'étudier le monde qui nous entoure afin d'apprendre comment l'utiliser au mieux."
 kub_children_of_woot:0 "Enfants de Woot"
 kub_children_of_woot_desc:0 "Woot, qui donna leurs noms aux animaux, est notre lointain ancêtre et nous sommes ses enfants. Nous lui devons d'être les intendants des terres et de prendre soin de son héritage."
 kub_people_of_ornaments:0 "Peuple des ornements"
 kub_people_of_ornaments_desc:0 "Nos artisans sont renommés au loin, et on dit qu'ils ne peuvent laisser une surface non décorée. Tirons le meilleur parti de cette réputation et répandons leur travail partout où nous allons."
 kub_usurpation_of_the_chiefs:0 "Usurpation des chefs"
 kub_usurpation_of_the_chiefs_desc:0 "La tradition rapporte que notre fondateur usurpa le pouvoir d'un chef local pour commencer à construire sa puissance. Comme lui, nous devons être astucieux et prêts à utiliser des moyens indirects pour atteindre nos objectifs."
 kub_ngesh_dancers:0 "Danse Ngesh"
 kub_ngesh_dancers_desc:0 "Les masques associés à nos mascarades représentent souvent les esprits Ngesh des terres qui nous entourent. En les canalisant, nous canalisons leur agressivité et leur imprévisibilité, des outils inestimables en temps de guerre."
 kub_ndop_statue:0 "Statue Ndop"
 kub_ndop_statue_desc:0 "Lorsqu'un nouveau roi est oint, les sculpteurs de la cour créent une unique statue de lui, son Ndop. Constamment modifiée pour refléter la vie du Roi, elle conservera sa force vitale à sa mort. De son vivant, elle peut le représenter et servir de symbole de son pouvoir tant spirituel que temporel."
 kub_courtly_competition:0 "Compétition de cour"
 kub_courtly_competition_desc:0 "Une bonne noblesse est une noblesse préoccupée. Il y a tant de titres de cour dans nos royaumes que certains disent que la moitié de nos hommes en ont un. Assurons-nous que les membres de notre cour passent plus de temps à rivaliser les uns avec les autres pour l'attention et la visibilité plutôt qu'à menacer notre pouvoir."
 LUB_ideas:0 "Idées Luba"
 LUB_ideas_start:0 "Traditions Luba"
 LUB_ideas_bonus:0 "Ambition Luba"
 lub_bamfumus:0 "Bamfumus"
 lub_bamfumus_desc:0 "Établissons une cour noble pour assister le roi dans l'apport de la loi et de l'ordre sur la terre, créant un gouvernement plus stable pour ses successeurs."
 lub_royal_village_shrines:0 "Sanctuaires royaux de village"
 lub_royal_village_shrines_desc:0 "Quand un roi meurt, le village d'où il a exercé sa royauté devrait devenir un sanctuaire dédié à son existence désormais divine. De cette façon, nous assurons que le respect convenable pour la royauté puisse être maintenu."
 lub_bambudye:0 "Bambudye"
 lub_bambudye_desc:0 "En créant une société secrète répandue sur nos terres pour maintenir et préserver notre tradition culturelle, nous permettons à notre nation de mieux survivre aux marées du temps et de la fortune."
 lub_kasala_tradition:0 "Encourager la tradition Kasala"
 lub_kasala_tradition_desc:0 "La poésie en vers libres, chantée et récitée, peut être utilisée pour évoquer un large éventail de sentiments. Avant une bataille, elle peut inspirer le courage chez nos guerriers, et à cette fin, nous devrions toujours l'utiliser en temps de guerre."
 lub_lukasa_boards:0 "Tablettes Lukasa"
 lub_lukasa_boards_desc:0 "Les Bambudye ont maîtrisé l'usage des tablettes Lukasa de perles colorées. En utilisant des ensembles spécifiques de couleurs, de formes et d'idéogrammes, ils peuvent faciliter la mémorisation d'informations et nous permettre de mieux comprendre la configuration de notre terre et son histoire."
 lub_mbidi_kiluwe:0 "Récits de Mbidi Kiluwe"
 lub_mbidi_kiluwe_desc:0 "Notre pays fut fondé par le grand héros Mbidi Kiluwe, un chasseur et un forgeron. Assurons-nous que ses récits ne soient jamais oubliés et que notre peuple soit toujours rappelé à l'importance de ces professions dans nos terres."
 lub_mulopwe_prestige:0 "Prestige du Mulopwe"
 lub_mulopwe_prestige_desc:0 "En tant que plus grand royaume de notre région, les rois moindres nous admirent et souhaitent apprendre de nous. De nombreuses petites dynasties à l'étranger revendiquent même nos terres comme leur propre origine. Cette influence diplomatique peut être un outil aussi puissant que nos armes."
 LND_ideas:0 "Idées Lunda"
 LND_ideas_start:0 "Traditions Lunda"
 LND_ideas_bonus:0 "Ambition Lunda"
 lnd_great_family:0 "La grande famille"
 lnd_great_family_desc:0 "La tradition dicte qu'aucun fils ne doit se retourner contre son père et aucun neveu contre son oncle. En incorporant tant les chefs conquis que ceux qui nous rejoignent dans la famille royale comme membres cadets, nous renforçons les liens d'allégeance entre nous et nos terres nouvellement conquises."
 lnd_perpetual_kingship:0 "Royauté perpétuelle"
 lnd_perpetual_kingship_desc:0 "Bien que le corps de notre Roi puisse mourir, le Roi lui-même ne peut jamais mourir. Au contraire, le titulaire devient son prédécesseur, prenant son nom, ses liens de parenté et sa personnalité. De cette façon, nous assurons la continuité éternelle de notre royaume."
 lnd_tukwata:0 "Établir les Tukwata"
 lnd_tukwata_desc:0 "Toutes les parties du royaume ne sont pas aussi heureuses de payer tribut que d'autres. Pour faire face à ce fait, nous devrions établir un ordre de fonctionnaires dont le rôle est de parcourir le royaume avec des forces militaires pour assurer le respect du tribut."
 lnd_overnight_army:0 "Une armée du jour au lendemain"
 lnd_overnight_army_desc:0 "Notre capitale et nos cités sont construites sur le modèle des camps de nuit de l'armée. Elles ont des ailes, des avant-gardes et des fronts. En assurant que la pensée militaire soit partout dans notre vie quotidienne, nous améliorons notre préparation à la guerre."
 lnd_warrior_migrations:0 "Migrations guerrières"
 lnd_warrior_migrations_desc:0 "Quand notre roi envoie une armée en guerre, il envoie aussi un général pour déplacer ses ennemis, les remplaçant par un nouveau royaume subordonné de sujets Lunda."
 lnd_rukonkesh:0 "La Rukonkesh"
 lnd_rukonkesh_desc:0 "La Reine-Mère, la Rukonkesh, devrait être chargée de gérer les affaires locales de la cour afin que le souverain, le Mwant Yav, puisse se concentrer sur des tâches plus importantes."
 lnd_lord_of_vipers:0 "Seigneur des vipères"
 lnd_lord_of_vipers_desc:0 "Le titre de notre souverain, le Mwant Yav, se traduit littéralement par « Seigneur des Vipères », incarnant qu'il représente la paix et la guerre, la prospérité comme la destruction. Il est un ami puissant pour ceux qui se tiendront à ses côtés — et un ennemi mortel pour ceux qui s'opposeraient à lui."
 RZW_ideas:0 "Idées de Butua"
 RZW_ideas_start:0 "Traditions de Butua"
 RZW_ideas_bonus:0 "Ambition de Butua"
 rzw_legacy_of_zimbabwe:0 "Héritage du Zimbabwe"
 rzw_legacy_of_zimbabwe_desc:0 "Avec la chute du Grand Zimbabwe, de nombreuses traditions et coutumes ont été perdues. Le Mutapa a bâti un nouveau type d'État, indépendant de l'héritage séculaire de ces terres. Notre peuple, en revanche, a choisi de s'accrocher aux anciennes traditions ; nous construisons encore des bâtiments de pierre qui laissent les étrangers admiratifs et nous chérissons encore ce qui fut."
 rzw_strict_gold_regulations:0 "Réglementations strictes du commerce de l'or"
 rzw_strict_gold_regulations_desc:0 "L'agriculture et le commerce nous apportent ce dont nous avons besoin pour notre vie quotidienne, mais la principale exportation de notre pays reste l'or abondant que l'on trouve partout sur le plateau du Zimbabwe. Bien que de telles richesses soient une bénédiction pour notre État, ce métal peut aussi être assez dangereux s'il n'est pas fermement contrôlé. Notre État doit strictement réglementer tout commerce et propriété de l'or afin d'éviter les influences destructrices des chercheurs de fortune ou des intermédiaires cupides."
 rzw_empowering_the_rozwi:0 "Renforcer les Rozwi"
 rzw_empowering_the_rozwi_desc:0 "Une faction puissante a commencé à croître dans nos terres, montrant une forte loyauté envers leur chef et une insatisfaction quant à leur sort sur le plateau du Zimbabwe. Les Rozwi, ou « destructeurs », sont des combattants disciplinés prêts à unifier les peuples Shona et à créer un nouveau type d'État. Si nous ne les embrassons pas, nous pourrions bien nous retrouver submergés contre notre volonté."
 rzw_hierarchical_tax_organization:0 "Organisation fiscale hiérarchique"
 rzw_hierarchical_tax_organization_desc:0 "Le Mutapa confiait à chaque chef subordonné le soin d'apporter ses impôts à leur capitale. Nous ne pouvons imaginer coutume plus inefficace. Créons plutôt un système cohérent de collecte fiscale hiérarchique où chaque personne transmettra les richesses vers le haut, vers les coffres de l'État, de manière organisée et efficace. L'armée doit aussi parfois agir comme un bras de la bureaucratie royale pour s'assurer qu'aucun de nos sujets n'oublie ce qui nous est dû."
 rzw_discipline_and_traning:0 "Entraînement régulier"
 rzw_discipline_and_traning_desc:0 "La discipline, la préparation et l'entraînement sont ce qui gagne les batailles. Dans cette optique, nos commandants ont commencé avec succès à mettre au point de nouvelles tactiques élaborées et une nouvelle organisation de l'armée. Faisons bon usage de ces innovations en divisant nos guerriers en régiments, puis laissons-les s'entraîner régulièrement avec leurs arcs, assagaies, poignards et haches. La pratique leur permettra aussi de combattre en formation sans peur, défaisant des ennemis bien plus nombreux."
 rzw_mwari_cult:0 "Culte monothéiste"
 rzw_mwari_cult_desc:0 "Nos voisins superstitieux croient qu'ils sont protégés par des divinités naturelles ou leurs propres ancêtres. Nous, en revanche, avons vu la grandeur de Mwari, le dieu unique qui créa le monde à partir de rien. Quand il parle, les montagnes tremblent et notre souverain est son oracle. Répandons le culte de Mwari parmi tous les peuples afin que tous puissent voir l'autorité divine de notre souverain."
 rzw_vashambadzi:0 "Vashambadzi"
 rzw_vashambadzi_desc:0 "Le commerce intracontinental croissant, avec des marchandises circulant du bassin central du fleuve Kongo aux cités commerciales de Sarhal oriental, des Grands Lacs et des hauts plateaux du Zimbabwe, a grandement enrichi les Vashambadzi, notre communauté marchande indigène. Soutenons ce groupe par-dessus tous les autres en interdisant aux commerçants swahilis ainsi qu'aux chercheurs de fortune cannoréens de commercer à l'intérieur de nos frontières."
 MLW_ideas:0 "Idées Malvi"
 MLW_ideas_start:0 "Traditions Malvi"
 MLW_ideas_bonus:0 "Ambition Malvi"
 mlw_rajputs_of_malwa:0 "Les Rajputs de Malwa"
 mlw_rajputs_of_malwa_desc:0 "Malwa fut le siège de plus d'un grand royaume Rajput d'antan, et même sous la domination musulmane, les Rajputs restent très influents en tant que propriétaires terriens et nobles. Au lieu de nous battre contre eux pour l'autorité, nous devrions renforcer les clans Rajput dans nos terres et encourager les soldats Purbia à servir dans nos armées. Les Rajputs sont d'excellents guerriers et la coopération pourrait apporter de grandes choses tant à eux qu'à nous."
 mlw_nimatnama:0 "Art et architecture Malvi"
 mlw_nimatnama_desc:0 "Un grand nombre de nos nobles ont cependant commencé à commander aux artisans indiens locaux, mêlant les modes indiennes et persanes. Plutôt que d'essayer d'imiter Samarcande, Chiraz ou Delhi, nous devrions favoriser ce nouveau style indo-musulman en employant les meilleurs esprits, voix et mains des mondes persanisé et indien. Commandons des livres de cuisine, des Kalpa Sutras et de grandes pièces d'architecture profane, et profitons des fruits des peintres et chanteurs Malvi, et laissons les autres essayer de conserver la culture de nos ancêtres."
 mlw_surat_delhi_route:0 "Protéger la route commerciale Delhi-Surat"
 mlw_surat_delhi_route_desc:0 "Les ports du Gujarat sont parmi les plus grands du monde, et de grandes quantités de marchandises du nord de l'Inde passent par nos terres pour les atteindre. Des milliers de pèlerins entrent aussi sur nos terres chaque année en direction de la mer d'Arabie et des Villes saintes de La Mecque et Médine. En tant que maîtres de la principale route commerciale entre la mer et les riches plaines du nord de l'Inde, c'est notre devoir de défendre tous les marchands et pèlerins."
 mlw_fortified_strongholds:0 "Bastions fortifiés"
 mlw_fortified_strongholds_desc:0 "Bien que riche, notre cœur de territoire sur le plateau de Malwa est aussi ouvert aux attaques de toutes les directions. Nous devons garder nos cités avec de grandes citadelles, construites pour résister à tout attaquant et pour contrôler les routes commerciales et de pèlerinage qui sillonnent notre pays. Utilisons toutes les richesses que nous possédons pour faire de la grande citadelle de Mandu le modèle à suivre pour tous. Belle et imprenable."
 mlw_black_soil:0 "Sols noirs"
 mlw_black_soil_desc:0 "Contrairement aux régions environnantes, le sol et le climat du plateau de Malwa se prêtent très bien à la production agricole et à la culture de cultures de rente comme le sucre, l'indigo ou l'opium. Notre position sur la route entre la plaine indo-gangétique et la mer rend aussi l'exportation des marchandises que nous produisons très efficace."
 mlw_reliance_on_jain_bankers:0 "Banquiers jaïns"
 mlw_reliance_on_jain_bankers_desc:0 "Nos prédécesseurs ont sagement rompu les liens avec les faibles Sultans de Delhi après que Tamerlan eut mis à sac leur capitale en 1398. Malwa est maintenant indépendant, mais nos liens étroits avec le reste du monde persanisé ont aussi été grandement affaiblis. Si notre État doit croître, nous devons puiser dans les talents locaux à la place. Les banquiers et marchands jaïns dirigent l'économie du plateau de Malwa bien avant notre arrivée ici, et en nous alliant à ces groupes puissants, notre État peut se débarrasser de la dernière dépendance envers ceux qui voudraient nous contrôler."
 mlw_malwa_opium:0 "Opium de Malwa"
 mlw_malwa_opium_desc:0 "Très recherché tant pour ses usages médicinaux que récréatifs, l'opium est l'une des exportations les plus célèbres du plateau de Malwa. En raison de la présence croissante de marchands étrangers en Inde occidentale, nous avons remarqué une augmentation marquée de la demande récemment. Les cultivateurs de pavot essaient déjà d'augmenter leur production ; nous serions sages d'assouplir les réglementations commerciales pour leur permettre de diffuser leur produit plus efficacement."
 PAT_ideas:0 "Idées de Pattani"
 PAT_ideas_start:0 "Traditions de Pattani"
 PAT_ideas_bonus:0 "Ambition de Pattani"
 pat_pepper:0 "Production de poivre"
 pat_pepper_desc:0 "Pattani est célèbre pour ses poivres et ses bois tropicaux. En continuant à développer cette production, nous pouvons progressivement devenir une force significative sur le marché halessi et rivaliser avec Aceh, la Sonde et Malacca."
 pat_china_sea:0 "Commerce de la mer de Chine méridionale"
 pat_china_sea_desc:0 "Les restrictions commerciales chinoises entravent le commerce maritime dans tout Haless du Sud-Est. Les marchands de Pattani sont devenus habiles à contourner ces restrictions, apportant la richesse de la Chine aux ports de notre Sultanat."
 pat_smuggling_networks:0 "Réseaux de contrebande"
 pat_smuggling_networks_desc:0 "En collusion avec les marchands portugais et chinois, nous pouvons créer un réseau de contrebandiers qui pourrait être utilisé pour espionner et influencer les nations rivales."
 lian_dao_qian_band:0 "Bande de Lian Dao-Qian"
 lian_dao_qian_band_desc:0 "Des bandes de pirates mécontents ont commencé à s'installer à Pattani. Utilisons leurs connaissances et leur expérience pour perturber le commerce maritime et enrichir notre nation."
 pat_entrepot:0 "Entrepôt"
 pat_entrepot_desc:0 "Notre État est un maillon vital des routes commerciales reliant la Chine, le Siam et l'Inde. Promouvons notre rôle d'entrepôt et encourageons les marchands de Chine à vendre leurs marchandises à Pattani, où nous pouvons les stocker jusqu'à ce qu'elles soient vendues aux marchands se dirigeant vers l'ouest."
 protection_private_property:0 "Protection de la propriété privée"
 protection_private_property_desc:0 "La sécurité de nos ports est ce qui fait de Pattani un lieu attrayant pour vivre et commercer. Assurons à chaque homme ou femme que leur propriété est à l'abri du vol ou de la saisie."
 pat_canals:0 "Infrastructure de canaux"
 pat_canals_desc:0 "Une capitale saine est vitale pour notre pays. Construisons un nouveau réseau de canaux pour fournir de l'eau fraîche dans toutes nos grandes cités. Cela assurera la croissance future de nos cités et de notre nation."
 KAF_ideas:0 "Idées de Kaffa"
 KAF_ideas_start:0 "Traditions de Kaffa"
 KAF_ideas_bonus:0 "Ambition de Kaffa"
 kaf_kingdom_of_coffee:0 "Royaume du café"
 kaf_kingdom_of_coffee_desc:0 "Les effets revigorants du café sont connus depuis longtemps par notre peuple car la plante pousse à l'état sauvage sur nos terres. Bien que nous ne puissions prétendre produire autant de grains précieux que certains de nos voisins, le nom de notre royaume se répand maintenant à travers le globe partout où la boisson kaffane est adoptée, et nulle part la variété des grains n'est aussi grande qu'ici."
 kaf_minjo_usurpation:0 "Usurpation Minjo"
 kaf_minjo_usurpation_desc:0 "Notre royaume moderne fut fondé lorsque le clan Minjo usurpa le pouvoir de la dynastie Mato. Bien qu'étrangers venus d'une terre du nord, les Minjo réussirent à prendre le contrôle pacifiquement des rois d'antan, et à ce jour, nous révérons ce développement ainsi que le bracelet et l'anneau royaux qu'ils apportèrent avec eux. Tous les clans parmi le peuple kaffan doivent se tenir unis si nous voulons prospérer."
 kaf_kaffan_highlands:0 "Hauts plateaux kaffans"
 kaf_kaffan_highlands_desc:0 "Les hauts plateaux kaffans sont parmi les plus fertiles du sud de l'Éthiopie. Bien que le contact avec les grandes sphères commerciales du Nil et de l'océan Indien reste quelque peu une épreuve, les trois récoltes par an que les riches terres de Kaffa peuvent assurer nous garantissent l'autosuffisance."
 kaf_autonomous_kings:0 "Rois autonomes"
 kaf_autonomous_kings_desc:0 "La stabilité de Kaffa repose sur la force de nos clans et notre capacité à intégrer de nouveaux clans. Le monde extérieur est un monde de tourmente et de conflit, et avec le temps, de plus en plus de clans chrétiens sont venus jouir de notre protection. En permettant aux clans majeurs comme les Bosho, Hindata, Koijo ou Gurabo de garder des rois subordonnés aux nôtres, nous pouvons assurer que chacun d'eux travaillera pour l'amélioration de notre royaume."
 kaf_strengthen_ties_with_ethiopian_church:0 "Renforcer les liens avec l'Église éthiopienne"
 kaf_strengthen_ties_with_ethiopian_church_desc:0 "Notre christianisme est celui des frontières. Très peu de monastères existent parmi ces montagnes, et peu parmi le peuple de Kaffa ont eux-mêmes rencontré un missionnaire chrétien. Néanmoins, le rite chrétien et ses traditions sont ce qui cimente le pouvoir de notre monarchie. Nous devons nous efforcer de renforcer nos liens avec les peuples chrétiens au nord et les inviter à fonder des monastères dans nos terres. Les rituels chrétiens devraient faire partie intégrante de chaque cérémonie royale."
 kaf_king_of_kings:0 "Roi des rois"
 kaf_king_of_kings_desc:0 "Nous avons bâti un royaume de nombreux peuples, et notre souverain est le maître de nombreux Rois. Le temps est venu d'utiliser l'organisation construite par nos ancêtres pour étendre et unifier tous les rois mineurs sous la domination de notre Atio, le Roi des Rois."
 kaf_kaffan_exports:0 "Réforme commerciale"
 kaf_kaffan_exports_desc:0 "Le café, l'or, les esclaves et le coton sont des marchandises précieuses, mais le plateau kaffan se trouve quelque peu isolé des principales routes commerciales de Sarhal oriental. Si nous ne pouvons pas faire venir les marchands à nous, nous devons apporter nos marchandises à eux. Par l'expansion militaire et de nouvelles lois visant à faciliter le flux des marchandises, nous pouvons prendre notre place légitime parmi les nations commerçantes de la région."
 CEP_ideas:0 "Idées ioniennes"
 CEP_ideas_start:0 "Traditions ioniennes"
 CEP_ideas_bonus:0 "Ambition ionienne"
 cep_frankokratia:0 "Francocratie"
 cep_frankokratia_desc:0 "À la suite de la quatrième croisade, de grandes parties des possessions anciennement byzantines tombèrent aux mains des Francs latins et des Italiens. Depuis lors, les îles Ioniennes ont été gouvernées par des familles napolitaines et vénitiennes. Avec le temps, les coutumes et la langue italiennes se sont de plus en plus mêlées aux nôtres, et sous domination étrangère, nous avons réussi à éviter l'expansionnisme turc sur le continent grec."
 cep_angelokastroi:0 "Châteaux des anges"
 cep_angelokastroi_desc:0 "En construisant l'Angelokastro, ou Château des Anges, les Byzantins réalisèrent l'importance de fortifier ces îles. Les Francs et les Italiens qui vinrent après eux ont continué à construire un grand nombre de châteaux et de forts ici, et avec tant de regards avides posés sur nos possessions, nous ferions bien de poursuivre cette tradition. Construisons un solide système de forts et de ports fortifiés afin que nous puissions utiliser l'environnement de ces belles mais rudes îles à notre avantage. Italien, Turc ou Grec, quiconque souhaite conquérir ce qui est nôtre devrait savoir qu'il y a un prix élevé à payer."
 cep_settling_the_islands:0 "Peupler les îles"
 cep_settling_the_islands_desc:0 "Nos belles îles sont idéalement situées au croisement entre la Grèce et l'Italie et à l'embouchure de l'Adriatique. Elles sont aussi bénies d'une économie locale florissante fondée sur les olives, les raisins secs et le poisson. Néanmoins, nous avons une pénurie de population significative, surtout en dehors des îles majeures de Corfou, Zante et Céphalonie. Faisons savoir aux peuples du continent, italiens comme grecs, que nous accueillons les nouveaux venus qualifiés et qu'il y a des fortunes à faire dans ces belles terres."
 cep_gate_to_the_adriatic:0 "Porte de l'Adriatique"
 cep_gate_to_the_adriatic_desc:0 "En raison de leur position unique, nos îles agissent comme une porte vers les riches cités commerciales de l'Adriatique en général et vers les marchands vénitiens en particulier. De nombreuses familles vénitiennes influentes ont une représentation de longue date ici en raison des précieux raisins de Corinthe et olives que nous produisons, mais c'est notre position stratégique qui nous permettra de véritablement profiter de leur présence. Les péages et les tarifs assureront que nous profiterons autant que possible des riches navires qui passent constamment par nos eaux."
 cep_govian_arsenal:0 "Expansion navale"
 cep_govian_arsenal_desc:0 "Nous sommes positionnés pour contrôler l'Adriatique, mais pour ce faire, nous devons rivaliser avec les grandes puissances navales de la Divenhal. Il ne manque pas de marins ou de capitaines expérimentés sur nos îles, mais le nombre de galères que d'autres peuvent lancer contre nous est intimidant. Créons un arsenal sur le modèle de l'Arsenale Nuovo de Venise pour produire des navires de guerre en masse. Ce n'est qu'ainsi que nous pourrons créer une flotte de guerre capable de défendre nos foyers."
 cep_entrepot_of_eastern_med:0 "Entrepôt de la Divenhal orientale"
 cep_entrepot_of_eastern_med_desc:0 "Les marins ioniens ont toujours fréquenté les ports de la mer Noire au Levant, et nous avons longtemps profité de notre position entre l'est et l'ouest. Avec le développement de notre marine et la croissance de notre économie, cependant, les marchands locaux se sont de plus en plus organisés en compagnies pour investir dans ces entreprises commerciales. Certaines familles contrôlent maintenant des centaines de petits navires qui font régulièrement escale dans les ports de Roumélie et d'Anatolie, de Crète, de Chypre, de Syrie, d'Égypte et des nombreux ports de commerce de la péninsule italienne. Nous devons faire tout notre possible pour encourager davantage ces entrepreneurs en abolissant les règles, réglementations et tarifs contraignants et en accommodant leur commerce."
 cep_ionian_academy:0 "Académie ionienne"
 cep_ionian_academy_desc:0 "Bien que certains disent que les îles Ioniennes sont trop influencées par les divers étrangers qui les ont gouvernées au fil des siècles, elles sont aussi l'un des plus anciens États grecs indépendants existants. Prenons le flambeau en tant qu'État grec de premier plan et établissons une université moderne ouverte à tous les érudits grecs. Sous notre protection, les grands esprits de la nation grecque instruiront une nouvelle génération d'intellectuels helléniques."
 LOR_ideas:0 "Idées lorraines"
 LOR_ideas_start:0 "Traditions lorraines"
 LOR_ideas_bonus:0 "Ambition lorraine"
 lor_vosges:0 "Les Vosges"
 lor_vosges_desc:0 "Attaquer la Lorraine signifie traverser le désert montagneux des Vosges, une région que toute armée trouverait très difficile à traverser. Planifions nos défenses en conséquence et visons à toujours tirer le meilleur parti de l'environnement local."
 lor_mines_of_lorraine:0 "Mines de Lorraine"
 lor_mines_of_lorraine_desc:0 "Notre terre est bénie de nombreux gisements de minerai de fer, faisant de nous un centre de production d'armes et d'autres travaux métallurgiques. Nous devons encourager cette industrie métallurgique à prospérer et viser à devenir le premier producteur d'armes de notre région."
 lor_lotharingia:0 "Lotharingie"
 lor_lotharingia_desc:0 "Notre pays est la continuation directe du royaume de Francie médiane, connu sous le nom de Lotharingie d'après son souverain Lothaire, petit-fils de Charlemagne. Son royaume s'étendait de la mer du Nord à l'Italie, séparant ce qui deviendrait la France et l'Allemagne. Avec un tel héritage, il nous est facile de trouver des revendications oubliées sur des territoires que nous ne gouvernons pas actuellement."
 lor_between_great_powers:0 "Diplomatie flexible"
 lor_between_great_powers_desc:0 "Notre pays se trouve à l'extrême bord de l'Empire d'Anbennar, avec une France avide juste à l'ouest. Les terres gouvernées par la Bourgogne nous encerclent au nord et au sud, et ils désirent unir leurs terres en annexant les nôtres. Afin de maintenir notre indépendance, nous devons être habiles en diplomatie, de peur que l'un ou l'autre ne prenne le contrôle de nous, ou que nous soyons broyés entre les meules."
 lor_two_languages:0 "Deux langues, une terre"
 lor_two_languages_desc:0 "Nous sommes une nation divisée par la langue ; beaucoup de notre peuple parle français, tandis qu'un grand nombre parle allemand. Afin de présenter un front unifié au monde, nous devons travailler ensemble comme un seul, malgré nos différences linguistiques."
 lor_three_bishoprics:0 "Trois-Évêchés"
 lor_three_bishoprics_desc:0 "Dispersés parmi nos territoires se trouvent les Trois Évêchés de Metz, Toul et Verdun. Ces États ne sont pas facilement annexables car leur indépendance est garantie par un certain nombre de traités anciens et prestigieux. Nous devrions plutôt concentrer nos efforts sur une coopération étroite avec l'Église et ses princes temporels pour le bien de tous."
 lor_place_stanislas:0 "Place Stanislas"
 lor_place_stanislas_desc:0 "Rénovons notre capitale pour en faire un exemple brillant d'urbanisme moderne, un grand projet digne de notre État ambitieux. Afin de lier l'ancien et le nouveau, nous devons créer une grande place monumentale, un lieu où chaque visiteur peut s'émerveiller de notre grandeur."
 WUR_ideas:0 "Idées wurtembergeoise"
 WUR_ideas_start:0 "Traditions wurtembergeoise"
 WUR_ideas_bonus:0 "Ambition wurtembergeoise"
 wur_estates_of_wurtemberg:0 "États du Wurtemberg"
 wur_estates_of_wurtemberg_desc:0 "Nous avons décidé de permettre aux notables de notre royaume de se réunir dans une assemblée bicamérale connue sous le nom d'États du Wurtemberg. Bien que cela réduise quelque peu le pouvoir absolu du souverain, cela permettra inversement une meilleure gouvernance du royaume."
 wur_swabian_league:0 "Ligue souabe"
 wur_swabian_league_desc:0 "Bien que le duché de Souabe soit depuis longtemps passé dans l'histoire, son nom reste une puissante force d'unité dans la région. Les diverses principautés, villes libres, terres ecclésiastiques et autres petits États de la région se sont associés dans une ligue de défense mutuelle. En tant que l'un des plus grands États de Souabe, assumons le rôle de chef naturel de cette ligue en temps de guerre."
 wur_poor_conrad:0 "Armer Konrad"
 wur_poor_conrad_desc:0 "Nous ne sommes guère le seul État d'Allemagne à être en proie à des révoltes paysannes de temps à autre. Alors que les paysans révoltés sont rapidement écrasés et leurs préoccupations ignorées, celles de la petite noblesse et des bourgeois ne sont pas si facilement rejetées. Peut-être devrions-nous étendre les droits du peuple suffisamment pour le garder heureux et moins enclin aux rébellions désagréables."
 wur_swabian_circle:0 "Cercle de Souabe"
 wur_swabian_circle_desc:0 "Les Cercles impériaux doivent superviser les questions de défense, de fiscalité et d'autres tâches administratives dans l'empire. Le Wurtemberg est un État naturel pour être l'un des directeurs du cercle « souabe », ce qui signifie qu'en temps de guerre, nous sommes en mesure de convoquer et de diriger les troupes de la région."
 wur_grosse_kirchenordnung:0 "Grosse Kirchenordnung"
 wur_grosse_kirchenordnung_desc:0 "Il est temps de mieux organiser l'Église dans notre État. Avec cette « Grosse Kirchenordnung », nous rendrons non seulement l'Église plus efficace, mais nous la lierons plus étroitement à notre État."
 wur_ludwigsburg:0 "Ludwigsburg"
 wur_ludwigsburg_desc:0 "Il est temps pour notre nation de construire un grand palais pour exhiber la grandeur du Wurtemberg au monde."
 wur_reichsdeputationshauptschluss:0 "Reichsdeputationshauptschluss"
 wur_reichsdeputationshauptschluss_desc:0 "Les centaines de petits États qui composent l'Empire sont un cauchemar bureaucratique, en plus de rendre les cartes si désordonnées. L'Empereur et la Diète impériale prévoient de supprimer ces États minuscules, les fusionnant dans les États plus grands — comme nous, par exemple. Profitons-en en revendiquant autant que possible !"
 SLO_ideas:0 "Idées slovaques"
 SLO_ideas_start:0 "Traditions slovaques"
 SLO_ideas_bonus:0 "Ambition slovaque"
 slo_rudohorie:0 "Rudohorie"
 slo_rudohorie_desc:0 "De la Wallonie à l'ouest à la Pologne à l'est, des mineurs et métallurgistes habiles sont attirés par les Monts Métallifères slovaques. Nous devons accueillir ces talents étrangers car le développement de l'industrie minière est l'épine dorsale même de notre économie."
 slo_universitas_istropolitana:0 "Universitas Istropolitana"
 slo_universitas_istropolitana_desc:0 "La région des Carpates manque cruellement d'institutions d'enseignement supérieur. Créons une grande université danubienne, comme signe de notre confiance retrouvée et pour éviter de dépendre d'érudits, de juristes et de bureaucrates étrangers. Des hommes de savoir afflueront à nos frontières, non pour nous servir mais pour former une nouvelle génération d'administrateurs pour notre grand pays."
 slo_golden_kremnica:0 "Kremnica dorée"
 slo_golden_kremnica_desc:0 "Alors que les sources d'or et d'argent se raréfient dans le Cannor continental, les montagnes de Kremnica restent l'un des premiers centres de production d'or au monde. Si nous nous assurons que les grands bourgeois de Kremnica sont toujours pourvus et que la mine et la monnaie restent actives, nous constaterons que nous ne manquerons jamais de métaux précieux."
 slo_land_of_castles:0 "Pays des châteaux"
 slo_land_of_castles_desc:0 "Certains disent que nous avons plus de châteaux par personne que toute autre région au monde, mais étant donné nos nombreux voisins puissants, qui peut nous en blâmer ? Nous devons être fidèles à cet héritage et ne jamais laisser une frontière sans garde ni nos châteaux sous-effectifs. C'est sûrement le meilleur moyen de sauvegarder notre indépendance dans un monde dangereux !"
 slo_town_air_liberates:0 "L'air de la ville libère"
 slo_town_air_liberates_desc:0 "Traditionnellement, les ligues de cités des montagnes des Carpates ont avidement veillé sur les intérêts des élites cosmopolites en leur sein. Leurs privilèges ont grandi sous roi après roi, et les villes minières sont devenues de plus en plus riches et arrogantes. En stipulant que chaque ligue fournisse à l'État un certain nombre de mousquets, de canons et d'autres équipements pour notre défense, nous pouvons à la fois nourrir notre industrie d'armement croissante et augmenter notre armée permanente."
 slo_literary_language:0 "Langue littéraire slovaque"
 slo_literary_language_desc:0 "Dans leur empressement à répandre la parole de la Réforme dans nos terres, les protestants ont commencé à traduire le catéchisme, la Bible, les hymnes et divers pamphlets en langue slovaque. Désireux de riposter, les communautés ravéliennes ont aussi commencé à défendre une langue écrite slovaque propre. Bien que ce schisme religieux semble devoir diviser notre société pendant quelque temps, leur détermination assurera que la langue slovaque sera bientôt aussi littéraire que toute autre langue slave. Nous devons faire tout notre possible pour renforcer ce développement au profit du peuple slovaque."
 slo_slovak_national_awakening:0 "Réveil national slovaque"
 slo_slovak_national_awakening_desc:0 "L'Esprit des Lumières déferle sur Cannor. Désireux de répandre la lumière du savoir au peuple slovaque, certains de nos plus grands esprits fondent des académies et tentent de codifier la langue slovaque. Ayant longtemps été résignés à servir des maîtres étrangers, le peuple slovaque s'éveille maintenant pour prendre sa place comme le premier parmi les Slaves de Cannor central. Le temps est venu pour un nouvel Empire de Grande-Moravie !"
 GLH_ideas:0 "Idées de la Horde d'Or"
 GLH_ideas_start:0 "Traditions de la Horde d'Or"
 GLH_ideas_bonus:0 "Ambition de la Horde d'Or"
 glh_legacy_of_the_golden_horde:0 "Héritage de la Horde d'Or"
 glh_legacy_of_the_golden_horde_desc:0 "Le monde tremblera, car nous avons réunifié la Horde d'Or ! Nous étions l'une des principales composantes de l'empire de Gengis Khan et la principale force politique de Cannor oriental et des Steppes pendant des siècles. Renaissante, la Horde d'Or s'efforcera de forger l'empire qui fut perdu et d'unir les Hordes de Haless central."
 glh_perso_mongol_administration:0 "Administration perso-mongole"
 glh_perso_mongol_administration_desc:0 "Nos ancêtres ont affiné le système administratif mongol au fil des siècles, mais ils n'ont pas hésité à incorporer les idées et méthodes des cultures qu'ils ont soumises. Notre système d'administration est en partie basé sur des traditions remontant au grand Gengis Khan lui-même et en partie sur ce que nous avons adopté des Persans et des bureaucrates musulmans dans les terres conquises. Si notre Horde d'Or renaissante doit prospérer et continuer à s'étendre, nous devons être prêts à bâtir un empire sur une adoption pragmatique."
 glh_tatar_traditions:0 "Traditions tatares"
 glh_tatar_traditions_desc:0 "Notre empire n'est peut-être plus gouverné à cheval, mais nos armées le sont toujours. Au fil des siècles, nous sommes restés fidèles à nos origines, assurant que peu peuvent égaler l'habileté de nos cavaliers. En allant de l'avant et en adoptant de nouvelles technologies et tactiques lorsque nécessaire, nous construisons sur la solide organisation et la tradition martiale de l'Empire mongol."
 glh_secure_the_trade_routes:0 "Sécuriser les routes commerciales"
 glh_secure_the_trade_routes_desc:0 "Toutes les richesses de ce monde ne proviennent pas des terres sous notre domination. Le commerce est la source de toute richesse, et la Horde d'Or a toujours protégé les marchands. En assurant la sécurité de quiconque souhaite faire passer des marchandises par notre pays, nous pouvons garantir un flux constant de fourrures, d'artisanat chinois, de soie, d'épices et d'autres nécessités vers nos cités. Qu'ils choisissent de nous vendre leurs marchandises ou non, leur simple présence générera de la richesse pour notre peuple."
 glh_populating_the_steppes:0 "Peupler les steppes"
 glh_populating_the_steppes_desc:0 "Tout comme nous apportons la destruction à nos ennemis, nous devons apporter la paix aux nombreux qui résident à l'intérieur de nos frontières. Avant le malheur de Tamerlan, Saraï et les cités de la Horde d'Or étaient jadis l'envie du monde. Que ce soit le modèle pour toutes nos cités. En maintenant la paix intérieure et en encourageant les hommes et femmes talentueux de tout notre empire à planifier et peupler de nouvelles et grandes cités, nous apprivoiserons les steppes."
 glh_religious_pragmatism:0 "Pragmatisme religieux"
 glh_religious_pragmatism_desc:0 "La doctrine restrictive et inflexible n'a jamais réussi à gagner beaucoup de fidèles parmi les hordes tatares. Quand le grand Öz Beg Khan adopta l'islam, c'est l'islam des cheikhs soufis et non des qadis zélés qu'il invita dans ses terres. Des siècles de tradition et de loyauté sont ce sur quoi nous construirions notre État. La religion a un rôle à jouer, mais nous préférerions voir notre pays prospérer plutôt que s'effondrer dans la lutte pour assurer que tous partagent une foi commune."
 ANS_ideas:0 "Idées d'Ansbach"
 ANS_ideas_start:0 "Traditions d'Ansbach"
 ANS_ideas_bonus:0 "Ambition d'Ansbach"
 ans_land_of_the_hohenzollerns:0 "Terre des Hohenzollern"
 ans_land_of_the_hohenzollerns_desc:0 "Bien que la famille Hohenzollern soit surtout connue pour être électeurs de Brandebourg, la famille est d'abord devenue célèbre en Franconie. Le statut des Hohenzollern comme burgraves de Nuremberg a permis à la dynastie de se placer en position d'acquérir le Brandebourg. Bien que la branche d'Ansbach soit une branche cadette, notre terre reste l'un des premiers titres notables de la famille, et les Hohenzollern ont laissé une marque claire sur notre État."
 ans_restore_the_burgraviate:0 "Restaurer notre héritage"
 ans_restore_the_burgraviate_desc:1 "Les principautés sœurs d'Ansbach et de Bayreuth sont le résultat de la division du burgraviat de Nuremberg. Beaucoup des territoires disputés entre les deux furent annexés à la Ville libre de Nuremberg. Nous devons nous efforcer de réunir le burgraviat et être prêts à faire la guerre contre Nuremberg pour regagner la suzeraineté sur nos terres légitimes."
 ans_plassenburg:0 "Plassenburg"
 ans_plassenburg_desc:0 "Après les sièges et l'usure générale, le château de Plassenburg est dans un triste état. Reconstruisons le château pour en faire l'un des plus splendides palais de l'Empire. Les fortifications doivent être assez vastes pour résister à plusieurs armées, et ses commodités assez impressionnantes pour un roi !"
 ans_franconian_reformers:0 "Réformateurs franconiens"
 ans_franconian_reformers_desc:0 "Après avoir écouté le témoignage de Luther à la Diète de Worms, notre Margrave nous implore d'être parmi les premiers à embrasser la Réforme. Nous devons maintenir une correspondance étroite avec le réformateur et abriter d'autres partisans de la Réforme qui ont besoin de notre assistance. Avec d'autres souverains, nous pouvons unir les protestants de l'Empire autour d'articles de foi communs. Notre influence sur la Réforme est ce pour quoi notre État sera connu."
 ans_protestant_exiles:0 "Exilés protestants"
 ans_protestant_exiles_desc:0 "Offrons l'asile aux protestants fuyant les guerres de religion de la Contre-Réforme. Combiné à des réformes administratives et sociales, un afflux de nouvelles personnes pour peupler des terres ouvertes ou ravagées par la guerre permettra à notre État de s'épanouir et de se remettre rapidement de la destruction causée par de longs conflits."
 ans_wolf_of_ansbach:0 "Le loup d'Ansbach"
 ans_wolf_of_ansbach_desc:0 "On dit que la ville d'Ansbach fut jadis attaquée par un loup mangeur d'hommes. Nos citoyens superstitieux crurent que le loup était l'esprit vengeur du bourgmestre récemment décédé réincarné. Ce loup-garou fut finalement chassé de la forêt et tué. Soulagés d'avoir vaincu leurs peurs, les locaux coupèrent le museau du loup, l'habillèrent de vêtements d'homme avec un masque et une perruque, et le pendirent à la potence. Bien que bizarre pour certains, cette confrontation audacieuse avec leur plus grande peur est ce qui marque notre peuple, et nous devrions lui permettre d'être notre source d'inspiration pour l'avenir. Nous devons laisser les auteurs, poètes et érudits éclairer cette histoire et faire apprendre à chaque enfant dès son plus jeune âge."
 ans_dragoons_of_ansbach:0 "Dragons d'Ansbach"
 ans_dragoons_of_ansbach_desc:0 "Auf, Ansbach-Dragoner !\nAuf, Ansbach-Bayreuth !\nSchnall um deinen Säbel\nund rüste dich zum Streit !"
 OKA_ideas:0 "Idées d'Odoïev"
 OKA_ideas_start:0 "Traditions d'Odoïev"
 OKA_ideas_bonus:0 "Ambition d'Odoïev"
 oka_heirs_of_chernigov:0 "Héritiers de Tchernigov"
 oka_heirs_of_chernigov_desc:0 "Nos souverains sont descendants de saint Michel de Tchernigov et notre pays faisait partie de la Grande Principauté de Tchernigov. Cet héritage nous établit comme les héritiers de l'un des plus grands États de Russie."
 oka_dynamic_diplomacy:0 "Diplomatie dynamique"
 oka_dynamic_diplomacy_desc:0 "Notre position entre le Grand-Duché de Lituanie, le Grand-Duché de Moscou et la Horde d'Or nous oblige à compter sur la diplomatie. Nous n'avons pas d'autre choix que de maîtriser l'art des traités, des accords et des pactes pour assurer notre existence."
 oka_strengthen_our_tatar_ties:0 "S'engager dans les liens tatares"
 oka_strengthen_our_tatar_ties_desc:0 "Maintenir de bonnes relations avec les Tatares a été impératif pour notre survie et a, avec le temps, renforcé notre État. Nous devons continuer à surveiller de près la politique des Hordes. S'ils nous voient comme un partenaire précieux et une partie fonctionnelle de leur économie, nous pouvons tirer profit de leur domination sur les Steppes."
 oka_safeguard_agnatic_seniority:0 "Sauvegarder la primogéniture agnatique"
 oka_safeguard_agnatic_seniority_desc:0 "De nombreuses principautés russes ont changé leurs systèmes d'héritage pour un gain pratique perçu. Nous préférerons sauvegarder la tradition et rester fidèles à notre système éprouvé — la primogéniture agnatique. Nous savons, comme nos ancêtres, qu'il n'y a pas de pire destin qu'une régence noble due à l'absence d'héritier."
 oka_cities_of_the_upper_oka_valley:0 "Cités de la haute vallée de l'Oka"
 oka_cities_of_the_upper_oka_valley_desc:0 "Notre Grand-Duché dans la haute vallée de l'Oka peut sembler petit à certains, mais les cités d'Odoïev, Novosil, Belyov et Vorotynsk sont faites d'un peuple fort et robuste. En temps de guerre, tout citoyen sera obligé de pourvoir à notre armée."
 oka_fortification_efforts:0 "Efforts de fortification"
 oka_fortification_efforts_desc:0 "La ligne de défense de la Zasetchnaïa Tcherta a protégé les États russes des nomades des steppes et d'autres menaces. Pendant des siècles, nos cités ont fait partie intégrante de cette ligne, nous laissant une grande expérience pratique en fortification, pièges et abattis. Avec la menace directe disparue, nous pouvons utiliser ces connaissances pour développer notre agence de fortification comme nulle autre."
 oka_strengthen_the_oka_river_trade:0 "Renforcer le commerce fluvial de l'Oka"
 oka_strengthen_the_oka_river_trade_desc:0 "Le fleuve Oka est l'une des plus anciennes routes commerciales de Russie. De notre vallée fluviale, nous pouvons atteindre la Volga, et par là, nous pouvons atteindre le Don et la mer d'Azov ou la Caspienne. Les riches terres de Perse sont ainsi facilement à notre portée. Nos marchands visitent régulièrement ces riches terres étrangères pour vendre les produits pour lesquels nous sommes célèbres tout en important soie, épices et toutes les marchandises exotiques connues de l'homme."
 GHR_ideas:0 "Idées de Garhwal"
 GHR_ideas_start:0 "Traditions de Garhwal"
 GHR_ideas_bonus:0 "Ambition de Garhwal"
 ghr_52_garhs:0 "Héritage des 52 Garhs"
 ghr_52_garhs_desc:0 "Jadis, notre royaume était divisé en 52 États indépendants. Chaque État avait son propre garh, une forteresse autour de laquelle l'État était organisé. Notre ancêtre, Kanakpal, passa 60 ans à unir et intégrer ces États-forteresses dans notre royaume. À ce jour, nous employons les leçons apprises et notre État continue de reposer sur notre capacité à nous adapter pour accueillir de nouveaux ajouts à notre État."
 ghr_himalayan_kingdom:0 "Royaume himalayen"
 ghr_himalayan_kingdom_desc:0 "Avec l'Himalaya infranchissable dans notre dos, nous ne pouvons céder un pouce de notre terre à aucun envahisseur. Pourtant, les montagnes elles-mêmes sont un moyen de défense. À Garhwal, chaque vallée a au moins un fort et nos citoyens sont toujours prêts à accueillir un envahisseur l'épée à la main."
 ghr_rani_karnavati:0 "Diplomatie martiale"
 ghr_rani_karnavati_desc:0 "En tant que petit État à la périphérie de la plaine indo-gangétique, nos ennemis ont toujours pu mobiliser des armées bien plus grandes. Nous devons donc combattre deux fois plus férocement pour qu'il soit su que tout envahisseur devra payer très cher une tentative de conquête. Le message doit être clair : nous ne montrerons aucune pitié ! Au mieux, un envahisseur peut s'attendre à récupérer les nez de ses soldats."
 ghr_land_of_serene_beauty:0 "Terre de beauté sereine"
 ghr_land_of_serene_beauty_desc:0 "Situé au pied de l'Himalaya, le nôtre est un pays de véritable beauté naturelle. Notre peuple en est très fier, et la grâce sereine des montagnes suffit à pacifier même les dissidents les plus sauvages."
 ghr_source_of_the_ganges:0 "Source du Gange"
 ghr_source_of_the_ganges_desc:0 "La source du fleuve sacré du Gange se trouve dans notre royaume. Cela fait de notre royaume un lieu saint et nous vaut le respect et la gratitude des peuples de l'Inde."
 ghr_land_of_the_gods:0 "Protéger la terre des dieux"
 ghr_land_of_the_gods_desc:0 "Notre royaume est béni d'un grand nombre de temples et de monastères. Pendant des siècles, les pèlerins sont venus ici cherchant l'illumination et la solitude. Nous devons embrasser et encourager cette partie de notre héritage et veiller à toujours protéger ceux qui cherchent nos sanctuaires."
 ghr_crossroad_of_faiths:0 "Carrefour des fois"
 ghr_crossroad_of_faiths_desc:0 "Contrairement à beaucoup de nos voisins, notre pays est petit et les ressources sont peu nombreuses. Nous avons dû apprendre à faire la paix les uns avec les autres, quels que soient les dieux que nous prions. Hindous, Jaïns, Bouddhistes, Sikhs et Musulmans sont tous parmi nos sujets, et nous devons faire de notre mieux pour limiter toute friction que ce mélange peut causer."
 DTT_ideas:0 "Idées de Dithmarse"
 DTT_ideas_start:0 "Traditions de Dithmarse"
 DTT_ideas_bonus:0 "Ambition de Dithmarse"
 dtt_resistance_against_feudalism:0 "Résistance au féodalisme"
 dtt_resistance_against_feudalism_desc:0 "Tandis que les paysans de Cannor sont liés aux chaînes du féodalisme, les peuples de Dithmarse maintiennent leur indépendance. Nos voisins ont longtemps souhaité soumettre notre peuple, le forçant dans la cruauté du féodalisme. Nos paysans ne seront sujets qu'au bon berger et non aux serviteurs à gages de tyrans étrangers !"
 dtt_kirchspiele:0 "Kirchspiele"
 dtt_kirchspiele_desc:0 "Dans les terres de Dithmarse, les fonctions d'État sont largement supervisées par les nombreuses paroisses qui parsèment ces terres. Tandis que les princes et rois qui nous entourent gouvernent depuis des châteaux fortifiés, notre peuple administre les terres par les temples sacrés sous le mandat divin de Dieu."
 dtt_trade_missions:0 "Missions commerciales"
 dtt_trade_missions_desc:0 "L'indépendance et la richesse de Dithmarse reposent depuis longtemps sur l'activité commerciale à l'étranger. De la Baltique à la mer du Nord, nos marchands sont les bienvenus partout où ils accostent, et travaillent sans relâche pour apporter plus de richesses à nos propres rivages."
 dtt_expert_wreckers:0 "Experts naufrageurs"
 dtt_expert_wreckers_desc:0 "On dit que quand les récoltes échouent ou que les prises des pêcheurs sont maigres, beaucoup de nos paysans endossent le manteau de la piraterie. Nous ne pourrions jamais admettre ou cautionner de telles actions, mais c'est notre coutume de récupérer les cargaisons maritimes restantes et de récupérer les navires abandonnés par les victimes de la piraterie."
 dtt_levees:0 "Fortifier le littoral"
 dtt_levees_desc:0 "Pendant des siècles, de grandes inondations et des tempêtes ont dévasté nos terres, balayant des établissements entiers sous la mer. Pour nous protéger contre cette menace, il est vital que nous construisions des digues face à la mer et que nous continuions nos efforts pour toujours reconstruire ce qui est perdu."
 dtt_ecclesiacstiacl_order:0 "Ordres ecclésiastiques"
 dtt_ecclesiacstiacl_order_desc:0 "De nombreux ordres religieux existent dans nos territoires, servant fidèlement leur dieu et aidant à guider nos peuples pour vivre leur vie conformément aux enseignements du Seigneur. À mesure que nous continuons à étendre notre influence, nous devrions chérir cet héritage et continuer à faire des ordres une partie intégrante de notre État."
 dtt_free_farmers:0 "Fermiers libres"
 dtt_free_farmers_desc:0 "Les fermiers de Dithmarse ne sont pas obligés de donner le produit de leur labeur et de leur travail à de petits seigneurs. Cela signifie que tout produit supplémentaire peut être utilisé par nos fermiers eux-mêmes et assure que notre peuple sera toujours plus riche que les sujets exploités de nos voisins."
 HTK_ideas:0 "Idées Hatakeyama"
 HTK_ideas_start:0 "Traditions Hatakeyama"
 HTK_ideas_bonus:0 "Ambition Hatakeyama"
 HTK_kanrei_candidate:0 "Candidat au Kanrei"
 HTK_kanrei_candidate_desc:0 "Le clan Hatakeyama appartient aux trois sous-branches Ashikaga qui sont traditionnellement nommées au poste de Kanrei. Pour cette raison, notre nom a porté plus de prestige que la plupart dans le Shogunat."
 HTK_indomitable_generals:0 "Généraux indomptables"
 HTK_indomitable_generals_desc:0 "Certains considèrent nos chefs de clan comme des fauteurs de troubles rebelles en raison de nos nombreux conflits avec d'autres daimyos. C'est cependant un signe de notre résilience. Nous ne nous rendrons jamais et nous battrons pour ce qui est nôtre même si le Shogun lui-même s'opposait à nous !"
 HTK_mount_koya:0 "Mont Koya"
 HTK_mount_koya_desc:0 "Le Mont Koya est un lieu saint pour les religions japonaises depuis les temps anciens. Le temple Kongobu-ji et d'autres institutions religieuses sur cette montagne prient traditionnellement pour la santé et la sécurité de nos souverains, comme ils ont prié pour ceux qui sont venus avant nous."
 HTK_retainers:0 "Vassaux Hatakeyama"
 HTK_retainers_desc:0 "Nos fiefs sont répartis sur tout le pays et les chefs de clan ne peuvent pas tout gouverner eux-mêmes. Nous devons plutôt nommer des hommes de mérite pour gouverner nos territoires et agir comme les mains, les yeux et les oreilles de notre souverain."
 HTK_wakae_castle:0 "Château de Wakae"
 HTK_wakae_castle_desc:0 "Notre administration a toujours été centrée sur le château de Wakae, une forteresse située entre plusieurs cités commerciales clés. À mesure que nous nous étendons, continuons à créer des centres fortifiés d'administration et d'économie sur tout notre territoire."
 HTK_clan_unification:0 "Unifier le clan"
 HTK_clan_unification_desc:0 "Des sous-branches comme les Bishu et les Soshu se sont battues entre elles pour le trône de notre clan pendant des décennies, causant de graves troubles politiques et de l'instabilité. Nous devons unifier ces clans une fois pour toutes et nous assurer qu'ils ne causent plus de problèmes à l'avenir."
 HTK_saiku_shu:0 "Saika-shu"
 HTK_saiku_shu_desc:0 "Si nous devons maîtriser l'usage des armes à feu, nous devons apprendre de ceux qui ont perfectionné leur usage. Dans nos terres, les mercenaires Saika-shu sont réputés pour leur maîtrise de telles armes et seraient un excellent exemple à suivre pour nos armées."
 IMG_ideas:0 "Idées Imagawa"
 IMG_ideas_start:0 "Traditions Imagawa"
 IMG_ideas_bonus:0 "Ambition Imagawa"
 IMG_claim_to_shogunate:0 "Revendication du Shogunat"
 IMG_claim_to_shogunate_desc:0 "En raison de nos liens étroits avec la famille du Shogun, nous avons une bonne revendication pour endosser le manteau du Shogun si la lignée principale devait périr. Même si le Bakufu semble en sécurité maintenant, nous devons nous assurer que nul n'oublie ce qui est notre droit de naissance."
 IMG_supreme_ruler_of_tokaido:0 "Contrôle du Tokaido"
 IMG_supreme_ruler_of_tokaido_desc:0 "Le Tokaido ou « Le Circuit de l'Est » est l'emplacement de la route commerciale la plus importante entre le Japon central et oriental. Faisons tout notre possible pour exercer le contrôle sur cette région afin de pouvoir contrôler l'économie de toute la région."
 IMG_history_of_imagawa:0 "Histoire des Imagawa"
 IMG_history_of_imagawa_desc:0 "Notre clan a un passé glorieux que tous devraient avoir l'opportunité de connaître. Compilons l'histoire complète de notre clan et de notre peuple, avec des récits des hauts faits passés pour servir d'exemple à nos fils et voisins."
 IMG_revised_clan_law:0 "Lois de clan révisées"
 IMG_revised_clan_law_desc:0 "Nous avons besoin d'une loi de clan forte et claire pour nous assurer que nous pouvons gouverner nos sujets, qu'ils soient vassaux ou roturiers, équitablement et efficacement. En compilant toutes les lois et édits, nous assurerons une structure de clan durable. L'« Imagawa-Kana-Mokuroku » sera la collection de lois la plus significative du Japon."
 IMG_triple_alliance:0 "Triple alliance"
 IMG_triple_alliance_desc:0 "Parfois, le meilleur moyen de vaincre un ennemi est d'en faire un ami. Sécuriser nos flancs par le mariage ne fera pas que pacifier nos ennemis et nous gagner de nouveaux alliés en même temps, mais assurera que nous pourrons finalement les dominer par le sang également."
 IMG_mount_fuji:0 "À l'ombre du Mont Fuji"
 IMG_mount_fuji_desc:0 "Le Mont Fuji est célèbre comme le plus beau paysage de tout le Japon et a été décrit par de grands poètes depuis les temps anciens. En prenant au sérieux le rôle de gardiens de cette montagne, notre clan bénéficie de sa réputation."
 IMG_march_to_kyoto:0 "Marche sur Kyoto"
 IMG_march_to_kyoto_desc:0 "Le Japon et Kyoto sont enlisés dans le chaos politique. En tant que proches parents des Shoguns précédents, c'est notre obligation et notre droit de garder l'Empereur et le Shogun. Nous devons saisir notre place à la tête du Shogunat avant que d'autres clans ne saisissent l'opportunité !"
 AMA_ideas:0 "Idées Amago"
 AMA_ideas_start:0 "Traditions Amago"
 AMA_ideas_bonus:0 "Ambition Amago"
 ama_omi_genji:0 "Omi-Genji"
 ama_omi_genji_desc:0 "Nos ancêtres appartenaient jadis au clan Genji, de la famille Minamoto. Ils ont servi les deux Shogunats comme guerriers et fonctionnaires, et cette tradition de service loyal coule dans le sang de notre peuple."
 ama_izumo_shugo:0 "Shugo d'Izumo"
 ama_izumo_shugo_desc:0 "Les terres montagneuses d'Izumo sont riches en minerai de fer et sont célèbres pour leurs armures, lances et épées de haute qualité. Nous devrions chérir cet héritage et nous assurer que le simple fait que quelque chose ait été fait à Izumo devienne une marque de qualité connue de tout guerrier."
 ama_gassan_toda_castle:0 "Bastions fortifiés"
 ama_gassan_toda_castle_desc:0 "Même vaincus au combat, un château fort permet à nos armées de se retirer et de récupérer. Avec un certain nombre de châteaux forts dans ces terres, nous serons en mesure de contrôler les champs de bataille du Japon. Faisons de notre forteresse principale de Gassan-Toda un exemple que nous cherchons à reproduire dans toutes les provinces qui tombent sous notre domination."
 ama_coastal_trade:0 "Dominer le commerce côtier"
 ama_coastal_trade_desc:0 "La route maritime est un moyen sous-estimé de transporter des marchandises à travers le Japon. Nous devons transformer nos pêcheurs et marchands locaux en commerçants maritimes."
 ama_kizuki_shrine:0 "Kizuki"
 ama_kizuki_shrine_desc:0 "Nous sommes les gardiens du sanctuaire de Kizuki, le lieu où le premier Empereur du Japon est né. Le sanctuaire est révéré mais il a souffert au fil des ans. Assurons-nous que le sanctuaire de Kizuki soit toujours bien entretenu et que nous protégions tous les pèlerins."
 ama_iwami_ginzan:0 "Iwami Ginzan"
 ama_iwami_ginzan_desc:0 "La plus grande mine d'argent du Japon se trouve dans notre royaume. Développer et protéger cette source de richesse sera une pierre angulaire non seulement de notre propre politique économique mais même de celle de tout l'archipel."
 ama_ten_brave_warriors:0 "Dix braves guerriers"
 ama_ten_brave_warriors_desc:0 "Nos guerriers ont toujours chéri la loyauté par-dessus toutes les autres vertus et n'abandonneraient jamais notre cause même face à une défaite certaine. Honorons les dix meilleurs d'entre eux comme exemple à suivre pour tous, un exemple pour maintenir le moral haut pour tous ceux qui combattent pour nous."
 HSK_ideas:0 "Idées Hosokawa"
 HSK_ideas_start:0 "Traditions Hosokawa"
 HSK_ideas_bonus:0 "Ambition Hosokawa"
 hsk_kanrei:0 "Kanrei"
 hsk_kanrei_desc:0 "Notre clan est celui qui occupe traditionnellement le plus souvent le titre de Kanrei. Cette position nous donne le pouvoir d'agir pour le Shogunat et nous donne du pouvoir dans la politique japonaise."
 hsk_branches_and_retainers:0 "Branches et vassaux"
 hsk_branches_and_retainers_desc:0 "Nos parents et vassaux possèdent plusieurs riches provinces du Japon central et ils sont très loyaux envers le chef de clan. Par l'harmonie interne, notre clan sera parmi les plus puissants du royaume."
 hsk_sakai_city:0 "Cité de Sakai"
 hsk_sakai_city_desc:0 "Tandis que Kyoto a décliné pendant les guerres civiles, la cité de Sakai est devenue l'une des plus riches du Japon. En entretenant de bonnes relations avec les marchands de Sakai, nous pouvons renforcer notre économie."
 hsk_leader_of_eastern_army:0 "L'Armée de l'Est"
 hsk_leader_of_eastern_army_desc:0 "La guerre civile déchire le Japon. Levons une glorieuse armée de l'est et noyons les forces de l'ouest sous nos troupes."
 hsk_ashigaru:0 "Ashigaru"
 hsk_ashigaru_desc:0 "Si nous devons lever une armée de la taille nécessaire pour prévaloir en ces temps, nous devons dramatiquement augmenter la portion Ashigaru de nos forces. Des nombres massifs de fantassins légèrement armés nous permettront de surmonter nos ennemis."
 hsk_yamabushi:0 "Yamabushi"
 hsk_yamabushi_desc:0 "Les Yamabushi, pèlerins et moines suivant le Shugendo, voyagent d'État en État. Comme beaucoup de nos propres membres de clan sont dévoués au Shugendo, nous devrions nous efforcer de faire des Yamabushi nos informateurs sur les relations étrangères."
 hsk_horeki_reform:0 "Réforme Horeki"
 hsk_horeki_reform_desc:0 "Il est important de rester fort en temps de guerre, mais en temps de paix, nous devons construire une société forte avec des institutions durables de gouvernement, d'éducation et d'économie.\nL'âge de la destruction est terminé ; c'est maintenant le temps de la construction !"
 UES_ideas:0 "Idées Uesugi"
 UES_ideas_start:0 "Traditions Uesugi"
 UES_ideas_bonus:0 "Ambition Uesugi"
 ues_kanto_kanrei:0 "Kanto Kanrei"
 ues_kanto_kanrei_desc:0 "Notre clan a été assigné au poste de Kanto Kanrei, l'adjoint du Kamakura Kubo, gouverneur du Japon oriental. Notre tâche est d'aider le Kubo à gouverner cette région sauvage, mais aussi de réprimer toute inclination qu'il pourrait avoir à se révolter contre le Shogunat."
 ues_yamanouchi_and_ogigayatsu_branches:0 "Branches Yamanouchi et Ogigayatsu"
 ues_yamanouchi_and_ogigayatsu_branches_desc:0 "Les maisons des Yamanouchi et des Ogigayatsu sont deux branches importantes de la famille Uesugi et de son domaine. Tant que les deux lignées sont amicales, notre clan restera fort. Nous devons faire tout notre possible pour éviter l'inimitié entre nos frères."
 ues_kamakura_office:0 "Bureau de Kamakura"
 ues_kamakura_office_desc:0 "Kamakura est la cité politique la plus importante de la région du Kanto. C'est aussi le bureau central de l'ancien Shogunat, et la cité n'a pas complètement perdu sa fonction politique depuis. En tant que protecteurs de Kamakura, nous sommes vus comme les maîtres du Kanto. Utilisons cette position au maximum pour attirer des guerriers à notre cause."
 ues_dragon_of_echigo:0 "Dragon d'Echigo"
 ues_dragon_of_echigo_desc:0 "Notre clan a cultivé un esprit de courage et de justice qui ferait craindre nos ennemis sur le champ de bataille. Nous devons faire savoir au monde la force de nos chefs de clan. Tous craindront et respecteront le Dragon d'Echigo."
 ues_nokizaru:0 "Nokizaru"
 ues_nokizaru_desc:0 "Les Ninja Nokizaru opèrent depuis nos terres et sont loyaux à notre cause. Ils ne sont peut-être pas le groupe le plus célèbre du Japon, mais il y a peu de doute sur leurs capacités. Intégrons les opérations secrètes des Nokizaru dans nos plans et opérations militaires chaque fois que possible ; ils sont impatients d'exécuter la volonté de notre Seigneur."
 ues_agakita_shu:0 "Agakita-shu"
 ues_agakita_shu_desc:0 "Depuis les jours du Bakufu de Kamakura, nos terres du nord ont été le foyer des « Agakita Shu » ou Bande du Nord d'Agano. Un groupe d'hommes forts locaux très indépendants d'esprit de clans de tout le Japon. Ils ne sont peut-être pas les plus faciles à gérer en tout temps, mais cette région est un bon terreau pour des samouraïs habiles."
 ues_denkoku_no_ji:0 "Denoku no Ji"
 ues_denkoku_no_ji_desc:0 "Le temps est venu pour la réforme, et pour réformer notre société, nous devons rester fidèles au « Denoku no Ji » — la voie du monarque.\n\n« 1. Notre pays doit être hérité des pères aux fils. Rien ne devrait être considéré comme la propriété des monarques.\n2. Notre peuple appartient aussi au pays. Il n'est pas le bien des monarques.\n3. Les monarques sont là pour servir le pays et le peuple, et non l'inverse. »"
 YMN_ideas:0 "Idées Yamana"
 YMN_ideas_start:0 "Traditions Yamana"
 YMN_ideas_bonus:0 "Ambition Yamana"
 ymn_descendant_of_nitta:0 "Descendant de Nitta"
 ymn_descendant_of_nitta_desc:0 "Nous sommes descendants du clan Nitta, le plus grand rival de l'ancienne famille Ashikaga. Pour certains, ce serait une preuve de notre loyauté tandis que pour d'autres, cela fait de nous un candidat d'opposition naturel. Nous devons utiliser habilement cette lignée dans les nombreuses ouvertures politiques de cette époque."
 ymn_grand_shugo:0 "Grand Shugo"
 ymn_grand_shugo_desc:0 "Au zénith dans le passé, notre chef de clan a été assigné au Shugo de 11 provinces, presque 1/6 du Japon ! Nous devons récupérer nos provinces et continuer à accomplir l'objectif politique ultime de nos ancêtres !"
 ymn_mediate_succession_disputes:0 "Arbitrer les disputes de succession"
 ymn_mediate_succession_disputes_desc:0 "Alors que beaucoup des autres clans Shugo se querellent entre eux sur qui est l'héritier légitime de qui, ils se tournent vers nous pour aider à arbitrer leurs disputes. Ce faisant, nous pouvons gagner plus d'alliés et de contacts, sans parler de déstabiliser nos rivaux."
 ymn_leader_of_western_army:0 "L'Armée de l'Ouest"
 ymn_leader_of_western_army_desc:0 "Forgeons une grande armée occidentale pour unir les États querelleurs du Japon. La bravoure et les généraux habiles avec des soldats bien entraînés forceront facilement les orientaux à s'agenouiller !"
 ymn_acquisition_of_torinin:0 "Acquisition du Torin'in"
 ymn_acquisition_of_torinin_desc:0 "Bien que ce soit une victoire purement symbolique, notre acquisition réussie du sanctuaire de la famille Hosokawa pour notre propre clan est un grand coup de pouce au moral, et servira à rappeler à notre famille ce que nous pouvons accomplir lorsque nous sommes unis."
 ymn_reunification_of_branches:0 "Réunification des branches Yamana"
 ymn_reunification_of_branches_desc:0 "Alors que le Japon entre dans une nouvelle période, nous ne pouvons plus maintenir nos anciennes méthodes de gouvernance. Les branches de notre famille qui ont été assignées à d'autres provinces sont devenues trop autonomes et rebelles. Nous devons les réunifier par tous les moyens possibles et apporter l'ordre à notre royaume !"
 ymn_isolated_heartland:0 "Cœur de territoire isolé"
 ymn_isolated_heartland_desc:0 "Nos terres natales de Tajima et Inaba sont montagneuses et isolées. Heureusement, cela signifie aussi qu'elles seront difficiles à atteindre pour tout aspirant conquérant. Construisons nos défenses autour des forces naturelles de notre géographie et faisons regretter à tout attaquant d'avoir jamais tourné ses regards avides vers nos possessions."
 DTE_ideas:0 "Idées Date"
 DTE_ideas_start:0 "Traditions Date"
 DTE_ideas_bonus:0 "Ambition Date"
 dte_oshu_shugo:0 "Shugo d'Oshu"
 dte_oshu_shugo_desc:0 "En tant que clan honorable remontant au début de la période Kamakura, nous avons une forte revendication pour gouverner toute la province d'Oshu. Heureusement pour nous, ce que couvre exactement Oshu n'est pas bien défini."
 dte_expansion_trhough_marriages:0 "Expansion par les mariages"
 dte_expansion_trhough_marriages_desc:0 "Parfois, rallier des clans à notre famille est plus facile par le mariage et l'adoption que par les lances et les épées. Marier nos filles et offrir nos fils surnuméraires à l'adoption assurera que nous pouvons nous étendre tranquillement sans attirer trop d'attention."
 dte_renga_group:0 "Groupe Renga"
 dte_renga_group_desc:0 "Bien que notre domaine soit loin de Kyoto, nous sommes impatients des dernières tendances culturelles de la capitale impériale. Un mouvement récent est le Renga, une forme de poésie collaborative qui exige que les créateurs maîtrisent les strophes et d'autres règles de la littérature japonaise. S'entraîner à cela peut rafraîchir notre pensée, la rendant prête pour de nouvelles innovations."
 dte_dragon_corps:0 "Corps du Dragon"
 dte_dragon_corps_desc:0 "Nous devons activement chercher des moyens d'incorporer les armes occidentales dans notre armée. Des unités mobiles armées d'arquebuses devraient constituer le corps d'élite de notre armée, nous permettant d'apporter de nouvelles armes et techniques là où elles sont le plus nécessaires. Par la puissance de feu moderne, nous dominerons le champ de bataille."
 dte_red_seal_ships:0 "Navires au Sceau Rouge"
 dte_red_seal_ships_desc:0 "Commander une série de navires construits à la manière occidentale pour transporter notre commerce à travers les mers nous mettra en bonne position pour dominer les marchés et mieux diriger le flux des marchandises."
 dte_keicho_embassy:0 "Ambassade Keicho"
 dte_keicho_embassy_desc:0 "Nous sommes excellemment positionnés pour atteindre les terres des occidentaux, non pas en allant vers l'ouest, mais en traversant l'océan Pacifique à notre est. Cherchons la patrie des marchands Nanban, cherchant des alliances, de la technologie et des accords commerciaux plus lucratifs."
 dte_intensive_domain_development:0 "Développement intensif du domaine"
 dte_intensive_domain_development_desc:0 "Le temps rigoureux et la géographie montagneuse font du Tohoku une région pauvre aux yeux de beaucoup. Il y a cependant un grand potentiel d'amélioration de nos terres. En fondant de nouvelles villes, en encourageant et protégeant le commerce, en construisant des voies navigables et en augmentant les terres cultivées, nous pouvons substantiellement améliorer notre cœur de territoire. En abolissant les péages et taxes étouffants, nous pouvons aussi rendre nos sujets riches et la région prospère."
 SHN_ideas:0 "Idées Shoni"
 SHN_ideas_start:0 "Traditions Shoni"
 SHN_ideas_bonus:0 "Ambition Shoni"
 shn_vice_minister_of_dazaifu:0 "Vice-ministre du Dazai-fu"
 shn_vice_minister_of_dazaifu_desc:0 "L'histoire du clan Shoni à Kyushu commença quand notre chef fut nommé vice-ministre du Dazai-fu dans la province de Chikuzen. Cette institution est le centre diplomatique et militaire de la région, et nous gouvernons traditionnellement le nord de Kyushu comme représentants des Empereurs."
 shn_defender_against_mongols:0 "Défenseur du Japon"
 shn_defender_against_mongols_desc:0 "En tant que famille de samouraïs de premier plan dans le nord de Kyushu, nous avons bravement combattu contre deux invasions mongoles à la fin du XIIIe siècle. Les gens disent que les dieux japonais nous ont sauvés, mais ce sont en fait nos hommes qui ont combattu pour le Japon !\nSi le besoin s'en fait sentir, nous nous lèverons une fois de plus pour défendre Kyushu et le royaume dans son ensemble contre les envahisseurs extérieurs."
 shn_diplomacy_through_tsushima:0 "Diplomatie par Tsushima"
 shn_diplomacy_through_tsushima_desc:0 "L'un de nos vassaux, le clan So de l'île de Tsushima, a une riche expérience des négociations avec la Corée. De cette façon, nous avons toujours pu garder un canal ouvert vers l'extérieur, même en temps où les relations officielles étaient interdites."
 shn_nagasaki_city:0 "Cité de Nagasaki"
 shn_nagasaki_city_desc:0 "Le nord de Kyushu est plein de bons ports pour le commerce étranger, mais Nagasaki dans la province de Hizen est sans doute le meilleur endroit de tous. Faisons de cette cité notre porte principale vers l'Occident."
 shn_bear_of_hizen:0 "Ours de Hizen"
 shn_bear_of_hizen_desc:0 "Les terres de Hizen abritent de nombreux guerriers féroces. Certains, comme le chef de la famille Ryuzoji, ont gagné des épithètes pour leurs prouesses. Assurons-nous que les hommes de qualité peuvent toujours s'élever dans nos rangs et que nous tirons le meilleur parti de la réputation féroce de nos hommes."
 shn_hagakure:0 "Hagakure"
 shn_hagakure_desc:0 "En ces temps difficiles, il est important d'avoir un principe directeur. Le Hagakure est une théorie sur le Bushido qui se concentre sur la façon dont nous devrions vivre et mourir."
 shn_nabeshima_reform:0 "Réforme Nabeshima"
 shn_nabeshima_reform_desc:0 "Les famines, les maladies et autres catastrophes naturelles restent une menace constante pour notre économie et notre stabilité politique. Dans notre royaume, la famille Nabeshima a été pionnière d'une façon de contrer ces problèmes en introduisant de nouvelles technologies de l'Occident. Nous serions sages d'apprendre d'eux et d'intégrer de nouvelles technologies et méthodologies pour sauvegarder notre royaume pour les temps à venir."
 OGS_ideas:0 "Idées Ogasawara"
 OGS_ideas_start:0 "Traditions Ogasawara"
 OGS_ideas_bonus:0 "Ambition Ogasawara"
 ogs_shinano_shugo:0 "Shugo de Shinano"
 ogs_shinano_shugo_desc:0 "Le clan Ogasawara appartient à une ancienne sous-branche des Genji et gouverne la province de Shinano en tant que Shugo. Cette terre est montagneuse et inhospitalière pour certains. Pour notre peuple, cependant, elle fait depuis longtemps partie intégrante de leur défense contre les étrangers.\nPortons cette expérience avec nous partout où vont nos armées et assurons-nous toujours d'obtenir de bonnes informations locales pour tirer le meilleur parti du terrain dans n'importe quelle région où nous combattons."
 ogs_suwa_taisha:0 "Suwa Taisha"
 ogs_suwa_taisha_desc:0 "Le Suwa Taisha près du lac Suwa est l'un des plus anciens sanctuaires du Japon, et très adoré pas seulement à Shinano. Son festival le plus important, l'Onbashira-matsuri, prouve la bravoure de notre peuple alors qu'il transporte les bûches sacrées de la montagne au sanctuaire."
 ogs_kiso_uma:0 "Kiso-uma"
 ogs_kiso_uma_desc:0 "Les chevaux de la région de Kiso sont nos amis uniques. Ils ne sont pas grands comme les chevaux arabes et ne courent pas vite comme les mongols. Ce qu'ils ont, c'est une grande endurance pour survivre dans les hautes montagnes."
 ogs_unification_of_ten_kori:0 "Unification des Kori"
 ogs_unification_of_ten_kori_desc:0 "La province de Shinano est divisée en dix Kori, chacun gouverné par une famille de samouraïs indépendante. Nous devons unir les terres de ces seigneurs déloyaux pour utiliser pleinement leurs ressources."
 ogs_ogasawara_ryu:0 "Ogasawara-ryu"
 ogs_ogasawara_ryu_desc:0 "Les styles traditionnels ont une grande valeur dans notre société. Nous avons formalisé le système des arts martiaux et de l'étiquette. Notre école de bonnes manières devrait être apprise par chaque samouraï."
 ogs_improvment_of_nakasendo:0 "Améliorer le Nakasendo"
 ogs_improvment_of_nakasendo_desc:0 "La Route Centrale des Montagnes, « Nakasendo », est l'une des routes les plus importantes entre le Japon central et oriental. Nous devons construire des villes, des auberges et des châteaux le long de cette route montagneuse pour lier les régions ensemble."
 ogs_zenkoji:0 "Zenko-ji"
 ogs_zenkoji_desc:0 "Un grand pèlerinage se trouve dans nos terres, mais le temps et les guerres n'ont pas été cléments envers ses bâtiments et institutions. Nous devons restaurer le temple et montrer à notre peuple une attitude convenable et respectueuse envers les religions traditionnelles japonaises."
 OTM_ideas:0 "Idées Otomo"
 OTM_ideas_start:0 "Traditions Otomo"
 OTM_ideas_bonus:0 "Ambition Otomo"
 otm_domination_of_northern_kyushu:0 "Unir les clans"
 otm_domination_of_northern_kyushu_desc:0 "Il y a de nombreux clans hostiles et forts avec de braves guerriers dans notre région. Nous devons unir les petits seigneurs de ces terres et joindre leurs armées aux nôtres !"
 otm_lord_of_bungo:0 "Seigneur de Bungo"
 otm_lord_of_bungo_desc:0 "Le clan Otomo est le Shugo de Bungo depuis l'ère Kamakura. Ces terres sont connues pour leurs sols très fertiles et les riches récoltes de cette région nous permettent de nourrir des armées plus grandes que beaucoup d'autres Daimyos."
 otm_brave_retainers:0 "Vassaux loyaux"
 otm_brave_retainers_desc:0 "Nous avons de nombreux vassaux issus des sous-branches de notre clan et d'autres familles anciennes et indépendantes d'esprit. Bien qu'ils soient en quelque sorte un groupe indépendant d'esprit, ils montrent encore la plus grande dévotion à notre clan et un zèle à le voir prospérer. Vraiment, nous sommes bénis d'avoir de tels fidèles."
 otm_nanban_trade:0 "Accueillir le commerce Nanban"
 otm_nanban_trade_desc:0 "D'autres peuvent rejeter les étrangers comme des barbares, mais nous reconnaissons les avantages du commerce avec eux. Qu'il soit su qu'ils seront toujours les bienvenus dans nos ports, et nous serons en mesure d'étendre notre réseau commercial plus loin que nos rivaux."
 otm_christian_conversion:0 "Convertis chrétiens"
 otm_christian_conversion_desc:0 "Nos interactions croissantes avec les étrangers ont attiré l'intérêt de beaucoup dans notre clan vers la foi chrétienne. Les chrétiens ont de nombreux protecteurs puissants parmi nos seigneurs et vassaux, et peu sont aussi zélés que les convertis récents. Faisons bon usage de ces convertis chrétiens, quelle que soit la route que notre propre royaume prenne, et utilisons leur influence et leur zèle pour faire avancer notre cause."
 otm_tensho_embassy:0 "Ambassade Tensho"
 otm_tensho_embassy_desc:0 "Alors que nous renforçons davantage nos liens avec l'Occident, beaucoup ont suggéré que nous fassions quelque chose d'inédit et envoyions une ambassade pour en apprendre plus sur nos nouveaux amis, leur technologie, leurs idées et leur mode de vie, et espérons trouver aussi de nouveaux alliés.\nNous ne devons jamais reculer devant les coutumes ou idées étrangères, car beaucoup peuvent être mises à profit dans notre propre patrie."
 otm_kunikuzushi:0 "Kunikuzushi"
 otm_kunikuzushi_desc:0 "Un grand canon est entré dans notre arsenal, et ses effets sont dévastateurs ; capable de réduire des fortifications et des formations entières en quelques tirs. Ces armes sont rapidement devenues connues sous le nom de « Kunikuzushi », destructeur de provinces, et nous devrions en fondre autant que possible afin de triompher sur le champ de bataille."
 OUC_ideas:0 "Idées Ouchi"
 OUC_ideas_start:0 "Traditions Ouchi"
 OUC_ideas_bonus:0 "Ambition Ouchi"
 ouc_descendant_of_baekje:0 "Descendant de Baekje"
 ouc_descendant_of_baekje_desc:0 "Notre chronique dit que nous sommes descendants du prince Imseong de l'ancien royaume de Baekje dans la péninsule coréenne. Cette légende nous permet une position prestigieuse dans Haless oriental."
 ouc_korea_trade:0 "Commerce coréen"
 ouc_korea_trade_desc:0 "Notre position géographique nous a laissés comme le Daimyo le plus actif pour commercer avec la Corée. Le ginseng et d'autres marchandises exotiques sont pratiquement monopolisés par nos marchands. Nous devons faire tout notre possible pour conserver cette position favorable et l'utiliser pour surpasser tout parvenu qui nous défierait."
 ouc_fight_against_wokou:0 "Protéger contre la piraterie"
 ouc_fight_against_wokou_desc:0 "Afin de maintenir de bonnes relations avec la Chine et la Corée pour nos marchands, nous devons patrouiller constamment la mer de Chine orientale. Tant que les pirates et les contrebandiers sont courants dans ces eaux, les étrangers ne nous feront pas confiance et pourraient agir contre nous. Si nous les aidons, en revanche, nous gagnerons des faveurs, des titres et du prestige dans les cours étrangères."
 ouc_hakata_city:0 "Les marchands de la cité de Hakata"
 ouc_hakata_city_desc:0 "Hakata est un port commercial clé du Japon occidental depuis la période Heian. Les marchands de cette cité naviguent tant vers la Corée et la Chine que bien au-delà de la mer de Chine méridionale et même vers Haless du Sud-Est. Nous devons faire bon usage de leur réseau commercial afin d'étendre notre influence sur les réseaux commerciaux de Haless oriental."
 UTN_ideas:0 "Idées Utsunomiya"
 UTN_ideas_start:0 "Traditions Utsunomiya"
 UTN_ideas_bonus:0 "Ambition Utsunomiya"
 utn_fujiwara_descendant:0 "Descendant des Fujiwara"
 utn_fujiwara_descendant_desc:0 "La généalogie dit que les ancêtres du clan Utsunomiya étaient à l'origine membres de la famille Fujiwara à Kyoto. Cette parenté avec une famille si ancienne et révérée est quelque chose que nous pouvons encore utiliser sous forme de connexions diplomatiques avec la Cour impériale et les autres clans."
 utn_legacy_of_nasu_no_yoichi:0 "Héritage de Nasu no Yoichi"
 utn_legacy_of_nasu_no_yoichi_desc:0 "Shimotsuke fut jadis la patrie de Nasu no Yoichi, qui fut l'archer le plus épique de l'ancienne guerre de Genpei. À ce jour, les guerriers de Shimotsuke apprennent son école de tir à l'arc."
 utn_barrier_of_shirakawa:0 "Barrière de Shirakawa"
 utn_barrier_of_shirakawa_desc:0 "Shirakawa no Seki est une barrière majeure du Tokaido. Utilisons cette porte vers la région du Tohoku comme point de contrôle pour le contrôle des marchandises et des personnes."
 utn_cadet_branches_in_western_japan:0 "Branches cadettes au Japon occidental"
 utn_cadet_branches_in_western_japan_desc:0 "Les membres de la famille Utsunomiya ont des branches presque partout au Japon. Certaines d'entre elles sont plus puissantes que d'autres, et au Japon occidental, leur connaissance de la guerre navale peut bénéficier à la branche principale du clan."
 utn_annexation_of_oyama_clan:0 "Unifier les terres de Shimotsuke"
 utn_annexation_of_oyama_clan_desc:0 "D'autres clans comme les Oyama ont remis en question notre domination sur Shimotsuke au fil des ans. Nous devons briser ces groupes et transformer ces anciens ennemis en vassaux loyaux. Une fois qu'ils se seront rendus, nous serons plus puissants unis que nous ne l'avons jamais été divisés."
 utn_mediator_of_kanto:0 "Médiateur du Kanto"
 utn_mediator_of_kanto_desc:0 "En tant que l'un des plus anciens clans du Kanto, nous avons une connaissance aiguë de la politique de cette région et avons agi comme médiateurs entre différentes factions à de nombreuses reprises. De cette façon, nous savons aussi comment étendre notre territoire efficacement sans provoquer la haine et la peur des autres..."
 utn_mount_nikko:0 "Mont Nikko"
 utn_mount_nikko_desc:0 "Depuis l'ère ancienne, le Mont Nikko est un site saint célèbre pour le Shugendo, l'ascétisme de montagne qui mêle Shinto et Bouddhisme. Même le plus puissant des Shoguns doit aimer cette montagne et désirer y construire un sanctuaire privé."
 ouc_mercantile_diplomacy:0 "Diplomatie mercantile"
 ouc_mercantile_diplomacy_desc:0 "Le commerce a été une entreprise profitable pour notre clan. Mais nous ne devons jamais cesser de chercher plus d'opportunités pour étendre la portée de nos marchands. Si cela signifie passer par les canaux appropriés et payer le tribut nécessaire, c'est ce que nous devons faire. D'un autre côté, si ce qui est requis est une diplomatie souterraine et une prise de décision dynamique, alors nous ne devons pas hésiter à agir non plus. Tout ce qui nous donne une position favorable sur de nouveaux marchés doit être considéré !"
 ouc_welcome_missionaries:0 "Accueillir les Occidentaux"
 ouc_welcome_missionaries_desc:0 "À mesure que notre réseau commercial commence à s'étendre, nous entrons en contact avec plus d'étrangers et plus de fois. Quelle que soit leur croyance, leur monnaie est bonne, et nous devrions donc être aussi ouverts à leurs idées que nécessaire pour sécuriser leur commerce."
 ouc_retainer_factions:0 "Factions de vassaux"
 ouc_retainer_factions_desc:0 "Au sein de notre clan, nos vassaux sont divisés entre deux groupes : les administrateurs et les militaristes. Les deux ont leur utilité, mais nous devrions veiller à ne pas favoriser un côté de trop afin de garder les deux sous contrôle. De cette façon, nous pouvons récolter les bénéfices de leur saine compétition."
 ASK_ideas:0 "Idées Ashikaga"
 ASK_ideas_start:0 "Traditions Ashikaga"
 ASK_ideas_bonus:0 "Ambition Ashikaga"
 ask_head_of_the_genji:0 "Chef des Genji"
 ask_head_of_the_genji_desc:0 "Nous avons été reconnus comme le chef de toutes les branches Minamoto et de tous les samouraïs du Japon après l'extinction de la lignée de Minamoto Yoritomo. Le leadership de notre clan s'accompagne de hautes attentes de prouesse martiale, et le succès sur le champ de bataille sera vu comme confirmant notre valeur."
 ask_defender_of_the_imperial_court:0 "Défenseurs de la Cour impériale"
 ask_defender_of_the_imperial_court_desc:0 "Quand le Shogunat de Kamakura tomba, nous avons gardé l'Empereur et la Cour impériale en sécurité. Cela nous a valu une position à l'avant-garde de tous les clans du Japon, en tant que véritable protecteur de l'Empire et des traditions de la cour."
 ask_bugyoshu_and_hokushu:0 "Bugyoshu et Hokoshu"
 ask_bugyoshu_and_hokushu_desc:0 "Nous devons renforcer les fonctionnaires de l'empire tels que les magistrats Bugyoshu et les commandants Hokoshu, aux dépens des Daimyos volontaires et souvent rebelles qui en sont venus à dominer le royaume. Une bureaucratie forte sera parfois la seule chose qui se tient entre nous et une guerre civile ouverte."
 ask_reform_shogun_shugo_system:0 "Réformer le système Shogun-Shugo"
 ask_reform_shogun_shugo_system_desc:0 "Les daimyos Shugo sont des vassaux importants pour le Shogunat, mais ils se sont aussi avérés trop indépendants et déloyaux. Nous devons réformer ce système et les placer tous plus fermement sous notre contrôle."
 TKI_ideas:0 "Idées Toki"
 TKI_ideas_start:0 "Traditions Toki"
 TKI_ideas_bonus:0 "Ambition Toki"
 tki_genji_in_mino:0 "Genji de Mino"
 tki_genji_in_mino_desc:0 "En tant que chef des Genji à Mino, nous avons dirigé d'autres samouraïs locaux depuis le XIIe siècle. Notre domaine occupe une position stratégique à partir de laquelle contrôler les régions voisines."
 tki_ranjatai:0 "Ranjatai"
 tki_ranjatai_desc:0 "Le Ranjatai est considéré comme un trésor impérial et est normalement enfermé dans le temple Todai-ji. Seules très peu de personnes sont autorisées par l'Empereur à avoir un petit morceau de ce bois d'agar parfumé, et notre chef de clan appartient à ce petit cercle. Un honneur qui rejaillit sur tout le clan."
 tki_banner_of_balloonflower:0 "Bannière de la campanule"
 tki_banner_of_balloonflower_desc:0 "Les clans puissants de Mino se rassemblent sous notre Kikyo-mon pour s'unir contre les invasions étrangères. L'harmonie interne est l'une des choses les plus importantes pour défendre son foyer !"
 tki_inabayama_castle:0 "Châteaux stratégiques"
 tki_inabayama_castle_desc:0 "Tout comme le château d'Inabayama nous permet de contrôler les routes de montagne de Mino, nous devons nous efforcer d'établir de puissants châteaux dans les provinces que nous conquérons afin d'avoir toujours l'avantage stratégique et tactique."
 tki_peculation_of_aristocrat_mannors:0 "Détournement des domaines"
 tki_peculation_of_aristocrat_mannors_desc:0 "Nous avons traditionnellement été chargés de surveiller les domaines des aristocrates de Kyoto. En ces temps de conflit, cependant, sécuriser les revenus de ces familles peut être assez difficile. Comme nous sommes ceux qui saignent pour protéger ces domaines, il est juste que nous en prenions aussi la propriété directe."
 tki_saito_family:0 "L'innovation avant la tradition"
 tki_saito_family_desc:0 "Nous sommes à l'aube d'une ère où l'innovation doit être valorisée plus haut que la tradition. Certains l'ont réalisé depuis longtemps tandis que d'autres sont réticents à suivre. Imitons ceux qui montrent la voie, comme la famille Saito, au lieu d'être laissés désespérément en arrière."
 tki_flood_control_of_three_rivers:0 "Contrôle des inondations"
 tki_flood_control_of_three_rivers_desc:0 "Dans notre province natale, les trois grands fleuves de Kiso, Nagara et Ibi causent souvent de graves inondations dans nos rizières. Nous devrions contrôler ces cours d'eau et augmenter la fertilité de nos terres dans toutes les provinces sous notre domination."
 STK_ideas:0 "Idées Satake"
 STK_ideas_bonus:0 "Ambition Satake"
 STK_ideas_start:0 "Traditions Satake"
 stk_hitachi_genji:0 "Genji de Hitachi"
 stk_hitachi_genji_desc:0 "Nous sommes l'un des plus anciens Genji de la région du Kanto, et avons combattu pour la gloire du clan dans le Japon oriental même avant que Minamoto no Yoritomo ne fonde le Shogunat de Kamakura."
 stk_suppression_of_ikki:0 "Répression des Ikki"
 stk_suppression_of_ikki_desc:0 "Bien que nous soyons nommés Shugo de Hitachi, les seigneurs locaux ont organisé une coalition Ikki contre nous. Nous devons leur rappeler qui est le souverain légitime de cette terre."
 stk_kashima_jingu:0 "Kashima Jingu"
 stk_kashima_jingu_desc:0 "Kashima Jingu est l'un des trois sanctuaires les plus importants du Kanto. Ce sanctuaire vénère Takemikazuchi qui est le dieu du tonnerre et des épées, et aussi connu comme le patron du sumo. La garde de ce sanctuaire renforce la détermination de nos armées."
 stk_mito_castle:0 "Pouvoir central fort"
 stk_mito_castle_desc:0 "Nous avons choisi de construire nos centres d'administration là où ils ont le meilleur accès aux cités et aux routes commerciales. Nous préférons construire notre gouvernement autour de centres politiques et économiques plutôt que de forteresses puissantes."
 stk_man_of_fidelity:0 "Réputation honorable"
 stk_man_of_fidelity_desc:0 "Notre clan est connu pour respecter hautement la foi, le droit et la vertu. Bien que cela puisse entraîner quelques difficultés car nous nous laissons ouverts aux intrigues, c'est une attitude qui nous vaut le respect et la loyauté de beaucoup."
 stk_eastern_coalitions:0 "Coalitions orientales"
 stk_eastern_coalitions_desc:0 "Que ce soit contre les Hojo, les Date ou tout autre intrus dans le Kanto ou le Tohoku, nous avons toujours fait du bon travail en nous présentant comme une tierce partie raisonnable à laquelle d'autres clans peuvent se rattacher pour se protéger des envahisseurs. Cette tradition de coalitions orientales nous servira bien tant que nous nous assurerons que les clans qui comptent sur nous n'aient jamais à s'inquiéter de leur protection."
 stk_dual_administration:0 "Double administration"
 stk_dual_administration_desc:0 "Notre système d'administration est assez unique et ingénieux. Au lieu de permettre à notre maison d'être continuellement prise dans des disputes de succession, nous les évitons en établissant une domination territoriale pour les branches cadettes avec la stipulation d'une alternance du pouvoir. Cela nous permet d'exercer un contrôle effectif sur notre domaine tout en évitant les révoltes inutiles."
 AKT_ideas:0 "Idées Ando"
 AKT_ideas_start:0 "Traditions Ando"
 AKT_ideas_bonus:0 "Ambition Ando"
 akt_march_of_akita:0 "Marche d'Akita"
 akt_march_of_akita_desc:0 "Notre fief d'Akita dans le nord de la province de Dewa était l'ancienne zone frontalière du Japon face aux « barbares » du nord. La frontière du Japon s'est étendue loin dans le Nord, mais l'esprit de nos ancêtres vit toujours dans notre sang."
 akt_foothold_in_hokkaido:0 "Commerce Aïnou"
 akt_foothold_in_hokkaido_desc:0 "Nous sommes parmi les premiers Japonais à avoir fondé des comptoirs commerciaux à Hokkaido. Des Aïnous, nous pouvons accéder à des marchandises exotiques mais aussi aux connaissances qu'ils acquièrent grâce à leurs liens avec Haless continental."
 akt_clan_unification:0 "Unification du clan"
 akt_clan_unification_desc:0 "En raison de l'installation de certains de nos membres de clan très loin, nous avons besoin de développer des moyens de communication rapides et sûrs. Nous devons investir dans des moyens de combler la distance entre les branches de notre clan afin d'être sûrs d'agir toujours comme un seul."
 akt_expansion_of_trade_posts:0 "Expansion commerciale"
 akt_expansion_of_trade_posts_desc:0 "Nos colonies à Hokkaido se sont avérées utiles, mais nous aurions plus à gagner en essayant activement de monopoliser tout le commerce du nord. Assurons-nous d'avoir des marchands et des comptoirs dans chaque port important du nord du Japon !"
 akt_ainu_campaigns:0 "Intégration d'autres cultures"
 akt_ainu_campaigns_desc:0 "Notre expérience avec nos sujets aïnous indisciplinés et indépendants d'esprit nous a bien équipés pour gérer l'intégration de cultures étrangères. Nous devons nous assurer que, quelle que soit leur origine, tous nos sujets savent toujours clairement qui est le partenaire dominant dans notre relation."
 akt_true_shogun_of_oshu:0 "Vrai Shogun d'Oshu"
 akt_true_shogun_of_oshu_desc:0 "Dans l'ancien temps, nos chefs de clan se présentaient comme le Shogun d'Oshu. Avec la chute d'un autre Shogun à Kyoto, cette revendication est de nouveau rappelée. Assurons-nous d'être vus comme la puissance suprême du nord par tous les moyens disponibles."
 akt_adoption_system:0 "Système d'adoption"
 akt_adoption_system_desc:0 "Nous vivons dans une société polygame, mais même ainsi, la mauvaise santé et d'autres événements défavorables peuvent parfois menacer notre ligne de succession. Introduire un système d'adoption dans la loi du clan garantirait la transition sans heurts du pouvoir entre nos chefs de clan."
 CBA_ideas:0 "Idées Chiba"
 CBA_ideas_start:0 "Traditions Chiba"
 CBA_ideas_bonus:0 "Ambition Chiba"
 cba_lineage_of_taira:0 "Lignée Taira"
 cba_lineage_of_taira_desc:0 "Le clan Chiba est une ancienne branche des Heishi (Taira) de la fin de la période Heian. Ce clan est reconnu comme l'une des huit factions puissantes de la région du Kanto et nous donne plus de pouvoir et d'influence que notre situation politique n'indiquerait autrement."
 cba_dream_of_masakado:0 "Rêve de Masakado"
 cba_dream_of_masakado_desc:0 "Taira no Masakado, un grand guerrier et proche parent de notre clan à l'époque ancienne, essaya jadis de devenir l'Empereur du Japon oriental. Masakado ne put malheureusement accomplir son ambition, mais son rêve de créer un nouveau pays pour les samouraïs devrait être notre guide en tout temps."
 cba_coalition_with_kamakura_kubo:0 "Coalition avec le Kamakura Kubo"
 cba_coalition_with_kamakura_kubo_desc:0 "Le Kamakura Kubo, le plus haut député du Shogunat Ashikaga dans la région du Kanto, a perdu son pouvoir pendant les récentes guerres civiles. Cependant, son influence politique conserve encore une certaine importance. Nous devrions déclarer notre intention d'aider le Kubo et utiliser son prestige pour notre propre expansion !"
 cba_sakura_kadan:0 "Sakura Kadan"
 cba_sakura_kadan_desc:0 "Nous ne sommes pas seulement de braves soldats, mais aussi des hommes de sophistication et de culture. Les réunions de poètes à notre château de Moto-Sakura peuvent nous aider à explorer l'esprit de la logique et de l'harmonie."
 cba_katori_jingu:0 "Katori Jingu"
 cba_katori_jingu_desc:0 "Katori Jingu dans la province de Shimousa vénère un dieu pour les guerriers japonais des anciennes conquêtes Ezo. Ainsi, ce sanctuaire est aussi adoré par de nombreux maîtres appartenant à l'école Katori d'arts martiaux. Nous devrions exploiter ce fait pour l'amélioration de nos propres samouraïs."
 cba_irrigation_of_southern_kanto:0 "Irrigation du Kanto méridional"
 cba_irrigation_of_southern_kanto_desc:0 "De grandes parties de nos domaines sont des zones marécageuses qui ne soutiendraient pas une agriculture intensive. Les développements technologiques récents dans le domaine de l'irrigation, cependant, nous permettent de cultiver de nouveaux champs et de drainer les marais quand nécessaire. Entreprenons un grand projet de développement des terres sous notre contrôle pour l'amélioration de l'économie."
 cba_naval_reform:0 "Réforme navale"
 cba_naval_reform_desc:0 "Notre longue côte rend une marine faible dangereuse. Nous devons réformer notre marine pour nous assurer qu'elle est à jour et que nos marins sont bien entraînés. Les mers seront notre force au lieu d'une menace constante pour notre pouvoir."
 SMZ_ideas:0 "Idées Shimazu"
 SMZ_ideas_start:0 "Traditions Shimazu"
 SMZ_ideas_bonus:0 "Ambition Shimazu"
 smz_satsuma_hayato:1 "Satsuma Hayato"
 smz_satsuma_hayato_desc:0 "Depuis l'ère ancienne, les hommes de la province de Satsuma étaient connus comme de braves soldats. Nous respectons aussi cette tradition, et l'entraînement militaire est en fait une partie importante de notre vie quotidienne."
 smz_satsunan_school:0 "École Satsunan"
 smz_satsunan_school_desc:0 "L'école Satsunan était à l'origine un lieu où les fils de la noblesse apprenaient les préceptes du néo-confucianisme. Avec le temps, elle s'est étendue à l'enseignement de la conduite appropriée tant sur le champ de bataille qu'en dehors, ainsi que les bases des arts de la chevalerie. Notre patronage continu de cette école assurera que nous avons un grand réservoir de samouraïs bien éduqués et disciplinés pour mener notre domaine à la gloire."
 smz_reunion_of_three_provinces:0 "Réunion des trois provinces"
 smz_reunion_of_three_provinces_desc:0 "Nous sommes le Shugo de trois provinces (Satsuma, Osumi et Hyuga) dans le sud de Kyushu, mais notre influence politique sur ce royaume est de facto très faible. Réunissons ce que la guerre civile a déchiré et recréons un puissant royaume de Kyushu."
 smz_tsurinobuse:0 "Tsurinobuse"
 smz_tsurinobuse_desc:0 "Le Tsurinobuse, « attirer et embusquer », est notre tactique la plus efficace qui nous permet de battre des ennemis supérieurs en nombre. Nous devons en faire une tactique centrale de nos armées et surprendre les commandants bornés des autres clans."
 smz_tanegashima:0 "Tanegashima"
 smz_tanegashima_desc:0 "Les Occidentaux qui débarquèrent d'abord sur l'île de Tanegashima apportèrent avec eux des armes nouvelles et intéressantes. Les arquebuses comme celles-ci deviennent un spectacle de plus en plus commun dans tout le Japon, mais nulle part elles n'ont été disponibles aussi longtemps qu'ici."
 smz_ryukyu_trade:0 "Commerce d'Okinawa"
 smz_ryukyu_trade_desc:0 "Ryukyu a un rôle vital dans le commerce international en mer de Chine orientale, mais leur âge d'or est venu et passé. Nous devrions nous efforcer d'apprendre de leur succès et de leurs erreurs et sécuriser une position similaire pour nous-mêmes."
 smz_early_westernization:0 "« Occidentalisation » précoce"
 smz_early_westernization_desc:0 "Grâce à des contacts fréquents et précoces avec les pays occidentaux, nous avons beaucoup appris sur les technologies et idées étrangères. Sur cette base, nous pouvons effectuer des réformes dans l'économie, l'industrie et l'éducation pour nous aider à prendre un avantage sur les autres clans japonais."
 ITO_ideas:0 "Idées Ito"
 ITO_ideas_start:0 "Traditions Ito"
 ITO_ideas_bonus:0 "Ambition Ito"
 ito_gokenin_family:0 "Famille Gokenin"
 ito_gokenin_family_desc:0 "Nos ancêtres ont aidé Minamoto no Yoritomo pendant la fondation du Shogunat de Kamakura. En récompense de cette contribution, nous avons été classés comme son Gokenin et avons reçu le fief dans la province de Hyuga. C'est un honneur dont peu de familles à Kyushu jouissent."
 ito_alliance_with_tsuchimochi_clan:0 "Unifier le domaine Ito"
 ito_alliance_with_tsuchimochi_clan_desc:0 "Toutes les familles de nos terres ne sont pas nos ardents partisans. Les Tsuchimochi sont puissants et conservent encore leur indépendance. Nous devons sécuriser leur soutien et ajouter leur puissance à la nôtre si nous voulons dominer les champs de bataille japonais."
 ito_land_of_gods_landing:0 "Terre de l'atterrissage des dieux"
 ito_land_of_gods_landing_desc:0 "Selon la mythologie japonaise, notre patrie est considérée comme le premier endroit au Japon où les ancêtres divins des Empereurs japonais ont atterri. La glorieuse conquête de la Famille impériale commença sur cette terre et constitue un excellent exemple à suivre pour nous."
 ito_anti_shugo_movement:0 "Mouvement anti-Shugo"
 ito_anti_shugo_movement_desc:0 "Le style de gouvernement Shugo est dépassé et donne du pouvoir aux faibles simplement sur la base de leur lignée ! Faisons fi de la prétention d'être inférieurs au Shugo et laissons plutôt notre force et notre capacité parler d'elles-mêmes !"
 ito_network_of_fourtyeight_fortifications:0 "Réseau de quarante-huit fortifications"
 ito_network_of_fourtyeight_fortifications_desc:0 "Afin de nous défendre correctement, nous devons construire un système de fortifications où chaque château peut toujours soutenir le suivant. Il ne peut y avoir aucun « angle mort » dans notre ligne défensive !"
 ito_sympathy_to_christians:0 "Sympathie pour les nouvelles fois"
 ito_sympathy_to_christians_desc:0 "Certains de nos membres de famille se sont assez attachés à la foi chrétienne étrangère. Nous devons bien sûr nous assurer que cela est inoffensif pour les religions traditionnelles, mais tant qu'il n'y a pas de mal pour nous, il n'y a aucune raison d'interdire aux gens de choisir leur propre foi."
 ito_foresty_development:0 "Développement de la foresterie"
 ito_foresty_development_desc:0 "Le cèdre des grandes forêts de notre domaine est d'une qualité particulièrement bonne. Nous devrions soutenir cette industrie pour qu'elle se développe afin que nous puissions utiliser le bois dans nos projets."
 ISK_ideas:0 "Idées Isshiki"
 ISK_ideas_start:0 "Traditions Isshiki"
 ISK_ideas_bonus:0 "Ambition Isshiki"
 isk_shugo_of_tango:0 "Shugo de Tango"
 isk_shugo_of_tango_desc:0 "Nous sommes le Shugo de Tango, la porte de Kyoto dans le San'in-Do et une terre de grande importance économique."
 isk_minister_of_samurai_dokoro:0 "Ministre du Samurai-Dokoro"
 isk_minister_of_samurai_dokoro_desc:0 "Le clan Isshiki est l'un des quatre clans puissants qui sont traditionnellement nommés à la tête de l'armée et de la police dans le Samurai-Dokoro. C'est donc notre responsabilité, et notre privilège, de maintenir la paix à Kyoto et dans d'autres zones importantes."
 isk_bridge_of_heaven:0 "Pont du Ciel"
 isk_bridge_of_heaven_desc:0 "Ama no Hashidate est une fine bande de terre entre les deux côtés de la baie de Miyazu. C'est l'un des trois plus beaux paysages du Japon et de nombreux aristocrates visitent notre territoire pour voir cette merveille de la nature. Des poètes célèbres ont aussi loué sa beauté et ce faisant apportent du prestige à notre nom."
 isk_reclaim_old_territories:0 "Reprendre les anciens territoires"
 isk_reclaim_old_territories_desc:0 "Nos anciennes possessions ont été perdues à cause des caprices de Shoguns hostiles. Nous nous souvenons encore quand notre clan exerçait un pouvoir considérable dans ces terres, cependant, et nous ne devons pas abandonner notre revendication sur tout ce que nous avons jadis gouverné."
 isk_inadome_gunnery:0 "Artillerie Inadome"
 isk_inadome_gunnery_desc:0 "L'un de nos clans vassaux a réussi à avoir une bonne maîtrise de la meilleure façon d'utiliser les armes à feu. Suivons leur exemple et faisons entraîner nos soldats avec ces nouvelles armes et construisons sur les tactiques des Inadome."
 isk_upgrade_roads:0 "Améliorer le réseau routier"
 isk_upgrade_roads_desc:0 "C'est notre devoir de maintenir les routes de notre domaine et c'est aussi dans notre intérêt d'avoir un accès facile aux grandes cités du royaume. Ces routes seront utilisées non seulement par les marchands et les voyageurs, elles assureront aussi que nos troupes peuvent marcher rapidement d'une partie de notre royaume à l'autre."
 isk_port_development:0 "Étendre nos ports"
 isk_port_development_desc:0 "Nous avons plusieurs bons ports naturels dans nos terres qui jusqu'à présent sont restés sous-développés. Étendons, fortifions et améliorons ces emplacements afin que de nouvelles cités puissent grandir le long de notre littoral."
 TTI_ideas:0 "Idées Tsutsui"
 TTI_ideas_start:0 "Traditions Tsutsui"
 TTI_ideas_bonus:0 "Ambition Tsutsui"
 tti_warrior_monk:0 "Moines guerriers"
 tti_warrior_monk_desc:0 "Le clan Tsutsui était initialement une famille de roturiers, jusqu'à ce que le temple Kofukuji nous nomme à un rang de moines administratifs. Nos activités, cependant, ne sont pas limitées à la sphère religieuse et nous combattons aussi bravement que tous les guerriers."
 tti_winner_of_eikyo_civil_war:0 "Vainqueur de la guerre civile d'Eikyo"
 tti_winner_of_eikyo_civil_war_desc:0 "Notre défaite des clans Ochi ou Toichi dans la guerre civile d'Eikyo nous a jadis établis comme le clan principal dans cette région. Le souvenir de cette victoire est encore très vivant et les gens partout nous respectent pour ce grand accomplissement."
 tti_kasuga_shrine:0 "Sanctuaire Kasuga"
 tti_kasuga_shrine_desc:0 "Kasuga Jinja au pied du Mont Mikasa se dresse depuis des siècles et est souvent patronné tant par les Empereurs que par les plus nobles aristocrates. La garde de ce complexe apporte grand honneur et prestige à notre clan."
 tti_mountainous_province:0 "Guerre de montagne"
 tti_mountainous_province_desc:0 "Notre patrie est enclavée et montagneuse. Cela nous a habitués à combattre dans des circonstances où d'autres hésiteraient à aller, et avec le temps nos armées sont devenues plus résilientes aux terrains difficiles que celles des autres Daimyos."
 tti_nara_city:0 "La capitale du sud"
 tti_nara_city_desc:0 "Il y a des siècles, Nara fut nommée la capitale du sud du Japon et à ce jour elle abrite de nombreux temples et sanctuaires prestigieux. Bien que Kyoto soit maintenant la capitale incontestée du royaume, Nara reste une cité d'importance politique et économique et elle confère à notre règne une crédibilité et une légitimité dont les autres Daimyos ne peuvent que rêver."
 tti_wise_opportunist:0 "Sages opportunistes"
 tti_wise_opportunist_desc:0 "Nous devons rester lucides et observer les conflits de nos nombreux voisins plutôt que de nous impliquer à la première occasion. Par une manœuvre prudente, nous pouvons assurer notre survie et nous étendre lentement en ces temps politiques dangereux."
 tti_kofukuji_temple:0 "Tradition et innovation"
 tti_kofukuji_temple_desc:0 "Bien qu'il soit ancien, le temple Kofukuji dans nos terres a fonctionné comme un centre culturel et innovant pendant des siècles. En respectant la tradition tout en étant ouverts à l'intégration de nouvelles idées, nous pouvons mener notre Clan à la grandeur."
 KKC_ideas:0 "Idées Kikuchi"
 KKC_ideas_start:0 "Traditions Kikuchi"
 KKC_ideas_bonus:0 "Ambition Kikuchi"
 kkc_disinguished_family_in_kyushu:0 "Famille distinguée"
 kkc_disinguished_family_in_kyushu_desc:0 "Contrairement à d'autres clans puissants à Kyushu, la famille Kikuchi s'est installée avant l'établissement du Shogunat de Kamakura. D'autres familles vont et viennent mais nous avons vécu, et vivrons sur cette île pour tous les temps."
 kkc_land_of_fire:0 "Terre de feu"
 kkc_land_of_fire_desc:0 "Nos terres ont été appelées les Terres de Feu depuis l'âge de la mythologie quand l'Empereur Keiko vit des taches de feu mouvantes inexpliquées dans ce qui deviendrait notre royaume. Ces feux étranges peuvent encore être observés au large de la côte parfois et ont laissé notre pays avec une réputation mystique."
 kkc_aso_schrine:0 "Sanctuaire Aso"
 kkc_aso_schrine_desc:0 "Aso Jinja est le sanctuaire le plus important de la province de Higo, et son grand prêtre a une position de grande influence politique. Intégrer cette fonction à notre famille par adoption nous permettrait d'acquérir une autorité religieuse significative."
 kkc_resistance_against_foreign_intervention:0 "Fortifier le domaine"
 kkc_resistance_against_foreign_intervention_desc:0 "Nos riches terres sont une cible attrayante pour les voisins avides. Nous devons donc consolider et fortifier nos terres pour les rendre aussi peu appétissantes que possible pour les envahisseurs étrangers."
 kkc_religious_coexistence:0 "Coexistence religieuse"
 kkc_religious_coexistence_desc:0 "Nous avons toujours été proches de l'afflux de nouvelles traditions et religions et avons au fil du temps appris la valeur d'être tolérants envers les nouvelles coutumes. Tentons de trouver un moyen d'harmoniser les anciennes et nouvelles religions."
 kkc_three_chief_retainers:0 "Trois vassaux en chef"
 kkc_three_chief_retainers_desc:0 "Nous avons la chance d'avoir comme forts partisans les familles Akahoshi, Jo et Kumabe. Nous avons peut-être été trop indulgents avec eux pour cette raison par le passé cependant. Nous devons abolir leur pouvoir et leur influence individuels afin qu'ils puissent devenir une partie plus fiable et loyale de notre structure de clan."
 kkc_kumamoto_castle:0 "Bastion central"
 kkc_kumamoto_castle_desc:0 "La récente rénovation et construction au château de Kumamoto définit la tendance pour la façon dont nous devrions gouverner les cités sous notre contrôle en tout temps. Un château fort et imprenable fournit la sécurité nécessaire à la croissance économique et politique."
 KNO_ideas:0 "Idées Kono"
 KNO_ideas_start:0 "Traditions Kono"
 KNO_ideas_bonus:0 "Ambition Kono"
 kno_shugo_of_iyo:0 "Shugo d'Iyo"
 kno_shugo_of_iyo_desc:0 "Depuis la fin de la période Heian au XIIe siècle, nous avons été la plus grande puissance navale dans la mer intérieure de Seto, et notre marine puissante est la façon dont nous avons acquis le titre de Shugo de cette province."
 kno_oyamazumi_shrine:0 "Sanctuaire Oyamazumi"
 kno_oyamazumi_shrine_desc:0 "Le dieu de la guerre du sanctuaire Oyamazumi est adoré par de nombreux grands samouraïs japonais. En tant que défenseur du sanctuaire, nous jouissons d'une réputation de résilience au combat attribuée au patronage divin."
 kno_integration_of_cadet_branches:0 "Intégration des branches cadettes"
 kno_integration_of_cadet_branches_desc:0 "Nous avons une longue histoire de conflits internes et d'opposition au chef de clan. Nous devons pacifier et intégrer complètement les branches mineures et renforcer notre emprise sur le clan."
 kno_ruler_of_inland_sea:0 "Domination de la mer intérieure"
 kno_ruler_of_inland_sea_desc:0 "La mer intérieure de Seto a une importance particulière pour les routes commerciales du Japon et maintenir la dominance navale ici peut faire ou défaire notre clan. Nous devons nous assurer d'avoir toujours une marine forte pour contrôler le commerce maritime."
 kno_yuzuki_castle:0 "Château de Yuzuki"
 kno_yuzuki_castle_desc:0 "Notre clan a été béni par un château fort et bien placé autour duquel notre administration, notre économie et nos activités militaires peuvent être planifiées. Cela nous a permis de construire une structure administrative en paix que nous pouvons utiliser bien au-delà des frontières de notre domaine original."
 kno_trade_with_asian_continent:0 "Commerce avec Haless continental"
 kno_trade_with_asian_continent_desc:0 "Notre emprise sur le commerce intérieur est forte mais il y a des fortunes à faire sur le continent aussi. Poursuivons la richesse de Haless continental et enrichissons-nous des opportunités qui attendent de l'autre côté de la mer."
 kno_murakami_suigun:0 "Murakami Suigun"
 kno_murakami_suigun_desc:0 "Le clan Murakami est bien connu comme le Suigun, « marine ». Intégrons-les pleinement dans notre propre clan et envoyons ces redoutables corsaires régner sur les Sept Mers !"
 RFR_ideas:0 "Idées Nanbu"
 RFR_ideas_start:0 "Traditions Nanbu"
 RFR_ideas_bonus:0 "Ambition Nanbu"
 rfr_genji_in_the_north:0 "Genji du Nord"
 rfr_genji_in_the_north_desc:0 "Nous sommes à l'origine une branche cadette des Kai-Genji, et notre fondateur a reçu un fief dans la province d'Oshu au XIIe siècle en récompense de services loyaux au Shogunat de Kamakura. Depuis lors, nous nous sommes accoutumés à cette région avec son hiver rigoureux, et savons comment utiliser ces conditions dans nos stratégies et tactiques."
 rfr_owner_of_nine_gates:0 "Propriétaire des « Neuf Portes »"
 rfr_owner_of_nine_gates_desc:0 "Mutsu a neuf « Portes » d'où les gens des temps anciens envoyaient des chevaux à Kyoto. La tradition de l'élevage de chevaux continue et nous devrions la cultiver car elle nous permet de lever de la cavalerie plus facilement que beaucoup de nos voisins."
 rfr_connection_with_kyoto:0 "Connexion avec Kyoto"
 rfr_connection_with_kyoto_desc:0 "Nous savons qu'une bonne relation avec les factions puissantes à Kyoto est vitale pour notre clan et donc nous devons faire de grands efforts pour maintenir des liens étroits avec la capitale impériale. Notre patrie lointaine ne doit pas nous rendre isolés."
 rfr_downfall_of_rebllious_vassals:0 "Chute des vassaux rebelles"
 rfr_downfall_of_rebllious_vassals_desc:0 "Nous ne pouvons pas permettre à des vassaux rebelles tels que les Tsugaru ou Kunohe de détenir le pouvoir dans nos terres. Nous devons écraser les aspirations de ces familles et une fois pour toutes établir qui est le chef de notre clan."
 rfr_morioka_castle:0 "Réforme de centralisation"
 rfr_morioka_castle_desc:0 "À mesure que notre territoire grandit, nous devons être ouverts à adapter notre administration quand cela est nécessaire. Comme nous l'avons prouvé quand nous avons construit notre nouvelle capitale à Morioka, les lois, les traditions et même l'ancienne capitale elle-même ne doivent pas être autorisées à se dresser entre nous et notre montée au pouvoir."
 rfr_chosonji_temple:0 "Temple Chosonji"
 rfr_chosonji_temple_desc:0 "Depuis la période Heian, Chosonji a été le plus important temple d'Oshu de l'ancien clan Fujiwara. Bien que leur chute rapide nous enseigne la fugacité de la vie humaine, nous ne devrions pas oublier combien ils ont pu devenir braves et riches quand ils gouvernaient le nord du Japon. Faisons de l'ascension des Fujiwara notre guide alors que nous affrontons les temps difficiles du Sengoku Jidai."
 rfr_fight_against_famines:0 "Vaincre les famines"
 rfr_fight_against_famines_desc:0 "En raison des vents froids de la fin de l'automne et des neiges abondantes jusqu'au début du printemps, notre peuple souffre souvent de graves famines et de la faim. Nous devons constituer des réserves de nourriture et examiner comment nous pouvons améliorer les terres sous notre contrôle pour contrer les catastrophes futures."
 TKD_ideas:0 "Idées Takeda"
 TKD_ideas_start:0 "Traditions Takeda"
 TKD_ideas_bonus:0 "Ambition Takeda"
 tkd_leader_of_kai_genji:0 "Chef des Kai Genji"
 tkd_leader_of_kai_genji_desc:0 "Nous sommes une branche honorable des Genji à Kai. Nous n'appartenons pas directement à la lignée du Shogun actuel, mais notre clan a une histoire plus riche et des guerriers plus braves que ces nouveaux venus."
 tkd_river_dams:0 "Shugo des barrages fluviaux"
 tkd_river_dams_desc:0 "Kai est une province montagneuse avec de nombreux cours d'eau rapides qui causent souvent de graves inondations dans nos rizières. Nous devons contrôler ces rivières pour rendre l'agriculture plus commode et efficace."
 tkd_information_network:0 "Réseau d'information"
 tkd_information_network_desc:0 "Bien que notre territoire soit plutôt géographiquement isolé, avec peu de connexions vers d'autres régions, nous ne manquons pas de sources d'information. Notre système de communication bien organisé avec des feux de signalisation et des postes de chevaux, et nos ninjas habiles, nous permettent de surpasser la plupart dans le domaine du renseignement."
 tkd_kurokawa_gold_mine:0 "Mine d'or de Kurokawa"
 tkd_kurokawa_gold_mine_desc:0 "La découverte d'or dans les montagnes de Kurokawa nous permettra de maintenir de bonnes relations avec nos voisins et ennemis si nous le choisissons."
 tkd_koshu_hatto:0 "Koshu Hatto"
 tkd_koshu_hatto_desc:0 "Koshu Hatto, les « lois de la province de Kai », nous permettront de réformer notre structure de clan et d'améliorer la vie quotidienne de notre peuple. Ces nouvelles lois garantiront que non seulement nos vassaux mais même nos propres chefs doivent s'abstenir de verdicts arbitraires. Si nous faisons quelque chose de mal, chacun devrait pouvoir pointer l'erreur et nous rappeler de respecter la loi telle qu'elle est écrite."
 tkd_twentyfour_generals:0 "Vingt-quatre généraux"
 tkd_twentyfour_generals_desc:0 "De forts leaders seront une sauvegarde plus fiable pour un domaine que n'importe quel nombre de châteaux forts. Nos généraux doivent s'entraîner dur pour leur futur travail sous la direction de notre chef, le « Tigre de Kai », pour assurer la qualité de notre leadership."
 tkd_koyo_gunkan:0 "Koyo Gunkan"
 tkd_koyo_gunkan_desc:0 "Finalement, l'ère de la guerre sera terminée et il nous restera les souvenirs de nos ancêtres victorieux. Nous devrions faire écrire ces histoires pour les générations à venir, afin que nos vies puissent servir d'exemple de comment vivre et combattre en honorable samouraï."
 SBA_ideas:0 "Idées Shiba"
 SBA_ideas_start:0 "Traditions Shiba"
 SBA_ideas_bonus:0 "Ambition Shiba"
 sba_chief_of_military_office:0 "Tradition du service militaire"
 sba_chief_of_military_office_desc:0 "Les chefs de clan des Shiba sont traditionnellement nommés à la tête du bureau militaire à la Cour impériale. Bien que ce poste aujourd'hui ne signifie qu'une position honorable sans aucun service militaire envers l'Empereur, les gens attendent encore de grandes choses de notre capacité militaire et interpréteront toute victoire, aussi mineure soit-elle, comme un signe de nos prouesses."
 sba_shugo_of_three_provinces:0 "Shugo de trois provinces"
 sba_shugo_of_three_provinces_desc:0 "Nous détenons traditionnellement Echizen, Owari et Totomi. Ces terres nous permettent de nous enrichir grâce aux rizières et aux ateliers des artisans les plus habiles du Japon."
 sba_consolidation_of_kanrei_position:0 "Consolidation de la position de Kanrei"
 sba_consolidation_of_kanrei_position_desc:0 "Nous sommes l'un des clans qui détiennent traditionnellement la position de Kanrei. Cela confère un grand prestige et une grande influence à notre Clan et le ferait encore plus si nous pouvions réussir à avoir une emprise plus ferme sur sa nomination."
 sba_atsuta_shrine:0 "Sanctuaire Atsuta"
 sba_atsuta_shrine_desc:0 "Le sanctuaire Atsuta dans la province d'Owari est le foyer de l'épée légendaire la plus célèbre, l'un des trois trésors impériaux sacrés, Kusanagi no Tsurugi. Cette arme sainte attire des guerriers de tout le royaume et notre garde de celle-ci apporte du courage au cœur de nos fidèles."
 sba_access_to_northern_japan:0 "Liens avec Oshu"
 sba_access_to_northern_japan_desc:0 "La province d'Oshu est notre deuxième patrie et est la source du nom de notre clan. Nous devons utiliser nos liens avec Oshu pour sécuriser les forts chevaux de guerre de cette région."
 sba_shiba_retainers:0 "Contrôler les vassaux Shiba"
 sba_shiba_retainers_desc:0 "Nous avons des vassaux talentueux mais ambitieux tels que les Oda, Asakura et Kai dans notre royaume divisé. Ces familles peuvent aussi parfois être la cause de faction dans notre royaume, cependant, et nous serions sages de les contrôler. Une supervision étroite et des récompenses suffisantes pourraient faire de ces familles les plus grands atouts de notre règne."
 sba_mogami_family:0 "Famille Mogami"
 sba_mogami_family_desc:0 "Le clan Mogami dans la province de Dewa est l'une de nos branches cadettes les plus puissantes. Tout comme les autres samouraïs de cette région enneigée du nord du Japon, ils ont prouvé qu'ils étaient des soldats durs et braves. Recrutons les Mogami dans nos armées et déchaînons la terreur du nord sur les méridionaux dociles qui nous entourent."
 YUA_ideas:0 "Idées du Grand Yuan"
 YUA_ideas_start:0 "Traditions du Grand Yuan"
 YUA_ideas_bonus:0 "Ambition du Grand Yuan"
 yua_da_zai_qian_yuan:0 "Da Zai Qian Yuan"
 yua_da_zai_qian_yuan_desc:0 "Kubilai Khan, l'Empereur Shizu du Grand Yuan Ulus, a nommé notre incomparable empire d'après cette célèbre phrase du I-Ching Tuanzhuan, satisfait de son caractère propice et approprié. Nous avons enfin commencé à être à la hauteur de ce nom à nouveau en réclamant l'héritage du Grand Yuan.\n\n« Vaste est le Qian Yuan, le céleste, le primordial, la nation dominante de tout ce qui est sous le ciel ! »\n"
 yua_pax_mongolica:0 "Pax Mongolica"
 yua_pax_mongolica_desc:0 "La pacification de la Mongolie, de la Chine, du Tibet et de toutes les autres parties du Grand Empire Yuan, permit jadis une croissance économique sans précédent. Maintenant que nous avons réclamé l'héritage Yuan, nous devrions aussi être à la hauteur du nom et protéger tous ceux qui sont à l'intérieur de nos frontières. Que le commerce circule librement, sous la protection bienveillante du Grand Khagan et de ses parents.\n"
 yua_a_savage_kingdom_holy_and_enchanted:0 "Un royaume sauvage saint et enchanté"
 yua_a_savage_kingdom_holy_and_enchanted_desc:0 "Les nations plus faibles craignent notre puissance et nous nomment sauvages. Pourtant elles convoitent une force telle que la nôtre et s'émerveillent de notre grandeur tout en soupirant de leur propre lâcheté. Portons fièrement le nom de « Sauvage » ; nul n'excelle en férocité comme les fils du Grand Khan.\n"
 yua_the_three_teachings_and_nine_schools_respected:0 "Les Trois Enseignements et Neuf Écoles tous respectés"
 yua_the_three_teachings_and_nine_schools_respected_desc:0 "L'Empire Yuan n'est pas une simple nation de conquête. Nous apprenons de nos sujets et nous efforçons d'améliorer notre règne. Toutes les écoles et branches de la philosophie chinoise doivent être révérées. Nous devons acquérir la sagesse de ces maîtres comme la nôtre et l'utiliser pour maintenir ensemble et étendre un Empire digne de son nom.\n"
 yua_keshik_and_weijun:0 "Keshik et Weijun"
 yua_keshik_and_weijun_desc:0 "En tant que Seul Khagan de toutes les Hordes, notre souverain devrait être accompagné de ses Keshiktens, et en tant que Fils du Ciel sur l'Empire du Milieu, il doit être défendu par les Weijun, les Gardes impériaux. Ils sont les deux ailes de notre chef et s'équilibreront mutuellement comme factions dans notre État.\n"
 yua_sino_mongol_administration:0 "Administration sino-mongole"
 yua_sino_mongol_administration_desc:0 "Les Chinois ont une longue et stable tradition de gouvernement qui pourrait bien nous servir. Cependant, pour maintenir un empire aussi grand que le nôtre, nous ne devons pas nous laisser aveugler par les idéaux chinois de méritocratie et de service. Le gouvernement mongol met l'accent sur la loyauté et la fiabilité et a une longue tradition d'emploi d'hommes capables de tout l'empire.\nNous devrions nous efforcer de trouver un équilibre doré entre les traditions mongoles et chinoises afin de créer un gouvernement hybride qui soit tout aussi capable de gouverner les hauts plateaux du Tibet, les vastes Steppes et la grande étendue de la Chine elle-même.\n"
 yua_a_thousand_miles_as_if_at_home:0 "Mille lieues comme chez soi"
 yua_a_thousand_miles_as_if_at_home_desc:0 "Le Grand Ulus du Yuan était jadis universellement loué pour son extraordinaire système routier. Le long de ses routes bien gardées, il était possible de voyager sans effort sur de vastes distances. Nous devrions nous efforcer de recréer cet héritage si nous voulons gouverner un empire aussi vaste que celui de Kubilai Khan.\n"
 city_upon_a_hill:0 "Cité sur la colline"
 city_upon_a_hill_desc:0 "Nous sommes entrés dans une alliance avec Dieu pour coloniser Aelantir. Nous serons une Cité sur la colline, avec les yeux du monde sur nous, un modèle pour toutes les futures colonies."
 BLO_ideas:0 "Idées de Beloozero"
 BLO_ideas_start:0 "Traditions de Beloozero"
 BLO_ideas_bonus:0 "Ambition de Beloozero"
 blo_martial_heritage:0 "Héritage martial"
 blo_martial_heritage_desc:0 "Les anciens souverains de Beloozero, eux-mêmes issus de certaines des plus anciennes et plus belles familles de Russie, se sont mariés avec les descendants du Grand Gengis Khan. Bien que ses parents ne soient plus sur notre trône, ils constituent encore une partie influente de notre noblesse. Nous devons chérir notre passé martial et créer une armée digne d'un Khan russe."
 blo_monastic_traditions:0 "Traditions monastiques"
 blo_monastic_traditions_desc:0 "Fondés à la fin du XIVe siècle, les monastères de Kirillo-Belozersky et de Ferapontov sont les plus grands et pour beaucoup les plus prestigieux monastères de toute la Rus'. L'influence de ces moines et de la grandeur des monastères eux-mêmes assurent que peu n'ont pas entendu notre nom prononcé avec vénération."
 blo_strengthen_local_lineages:0 "Renforcer les lignées locales"
 blo_strengthen_local_lineages_desc:0 "Jadis, les fières familles de Beloozero se sont fait un nom bien au-delà de nos frontières. Aujourd'hui, beaucoup de la classe dirigeante sont des descendants de nobles moscovites ; traditionnellement, les souverains de Moscou ont même nommé leurs fils pour gouverner nos belles terres. Nous devons nous efforcer de limiter l'influence étrangère et à la place faire de notre mieux pour promouvoir les vénérables familles de Beloozero."
 blo_control_the_northern_trade:0 "Commerce du Nord"
 blo_control_the_northern_trade_desc:0 "L'emplacement même de la principauté de Beloozero se prête au contrôle du commerce du nord. Depuis Beloozero, nous pouvons contrôler les lacs et les rivières qui constituent les lignes de transport de la Russie du Nord, de la Sibérie et de la Carélie."
 blo_officers_of_beloozero:0 "Officiers de Beloozero"
 blo_officers_of_beloozero_desc:0 "Par le passé, certains ont qualifié notre État de petit et se sont moqués de ses humbles origines. Pourtant, que ce soit en tant que principauté indépendante ou en tant que rouage dans la machinerie d'un État beaucoup plus grand, nous avons toujours été capables de rassembler un leadership de qualité pour mener même les plus grandes armées de notre époque. Les Officiers de Beloozero viennent d'une longue tradition de service militaire et nous devons faire de notre mieux pour préserver cet esprit et le transfert de connaissances entre les générations."
 blo_winter_warfare:0 "Guerre boréale"
 blo_winter_warfare_desc:0 "La principauté de Beloozero de nos ancêtres a été construite dans un environnement nordique et, pour certains, rude. Dès le début, nous nous sommes appuyés sur les rivières et les lacs de cette terre pour transporter tout, des marchandises aux armées, et nous sommes tout à fait habitués à tirer le meilleur parti du terrain sous notre contrôle. Même à mesure que notre État grandit, nous devons nous assurer que toutes les troupes de Beloozero sont correctement entraînées pour tirer le meilleur parti du terrain dans lequel elles combattent et que tous les sujets de Beloozero sont correctement préparés pour rendre la vie infernale à tout envahisseur."
 blo_scientific_patronage:0 "Patronage scientifique"
 blo_scientific_patronage_desc:0 "Le développement technologique et le patronage des arts sont quelque chose pour lequel beaucoup de nos anciens princes ont été connus. C'est une tradition que nous devrions chérir car c'est ce qui a permis à notre État de rester pertinent dans un monde en mutation. Le temps est venu d'institutionnaliser les dépenses pour l'avancement scientifique."
 RSO_ideas:0 "Idées de Rostov"
 RSO_ideas_start:0 "Traditions de Rostov"
 RSO_ideas_bonus:0 "Ambition de Rostov"
 rso_unification_of_rostov:0 "Réunification de Rostov"
 rso_unification_of_rostov_desc:0 "Nos ancêtres ont gaspillé leur héritage et vendu une partie de notre royaume à des souverains étrangers. Nous ne devons épargner aucun effort pour reprendre ces régions aux souverains de Moscou ou à toute autre famille qui a pris le contrôle de territoires qui devraient nous appartenir de droit."
 rso_ancient_heritage:0 "Héritage ancien"
 rso_ancient_heritage_desc:0 "Notre grande cité remonte à la fondation même des États russes dans cette région. Peu d'États subsistent maintenant avec un passé aussi long et glorieux, mais les Tatares ont brisé notre influence politique. Avec le joug qui recule enfin, nous devons de nouveau nous élever pour être à la hauteur de notre passé en tant que fondateurs des États russes."
 rso_ecclesiastical_center:0 "Centre ecclésiastique"
 rso_ecclesiastical_center_desc:0 "En tant que foyer des influents Évêques de Rostov, notre cité a une emprise ferme sur les âmes du peuple russe. Nous devons travailler avec l'Église en tout temps et quand nous le pouvons, nous devrions l'aider à accroître son influence. En œuvrant pour l'élévation de nos évêques au rang de Métropolites de toute la région, nous pouvons accroître leur influence et assurer leur soutien pour les années à venir."
 rso_entrepot_of_russia:0 "Entrepôt de Russie"
 rso_entrepot_of_russia_desc:0 "Rostov a toujours été l'une des principales villes de marché de sa région. À mesure que notre influence grandit, celle de nos marchands aussi. Assurons-nous que nous avons leurs intérêts à cœur quand nous promulguons de nouvelles lois et stipulations afin de maintenir notre emprise sur le commerce de ces terres."
 rso_rostov_kremlin:0 "Architecture de Rostov"
 rso_rostov_kremlin_desc:0 "Notre cité ne vit plus à la hauteur de son nom comme l'un des centres les plus anciens et les plus influents de Russie. Embarquons-nous dans un programme de construction de monuments pour qu'il soit clair pour quiconque visite notre belle cité quel endroit formidable elle est. Un Kremlin moderne et une grande Cathédrale ne sont que les premières étapes pour montrer l'influence, l'ingéniosité et surtout la richesse des souverains de Rostov."
 rso_political_influence:0 "Influence politique"
 rso_political_influence_desc:0 "Qu'elle soit dominée par des évêques ou des princes, notre cité a toujours été au centre des développements politiques dans les terres russes. Cette longue histoire d'influence politique nous a donné une tradition de diplomatie que nous devons maintenir."
 rso_rostov_enamel:0 "Émaux de Rostov"
 rso_rostov_enamel_desc:0 "Dernièrement, des ateliers pour la production d'émaux populaires ont commencé à surgir dans tout notre royaume. La demande pour ces belles pièces d'art est grande mais elles sont aussi tout à fait possibles à produire en grands nombres. Nous devrions encourager la croissance de cette industrie et prendre toute connaissance que nous pouvons en tirer pour l'appliquer à d'autres moyens de production dans notre royaume."
 MVA_ideas:0 "Idées moraves"
 MVA_ideas_start:0 "Traditions moraves"
 MVA_ideas_bonus:0 "Ambition morave"
 mva_margraviate:0 "Margraviat de Moravie"
 mva_margraviate_desc:0 "Le Margraviat de Moravie et les privilèges de la diète morave remontent au XIIe siècle. Ce titre nous donne une grande influence dans la région car des rois ou même des empereurs ont rivalisé pour la bonne volonté des états moraves pendant des siècles."
 mva_religious_refuge:0 "Sanctuaire religieux"
 mva_religious_refuge_desc:0 "Quand les terres de la couronne de Bohême furent envahies par l'hérésie hussite, nous avons ouvert nos bras aux réfugiés ravéliens et nous devrions nous efforcer d'abriter quiconque est persécuté par une telle persécution religieuse."
 mva_cities_of_moravia:0 "Cités de Moravie"
 mva_cities_of_moravia_desc:0 "La Moravie est une terre riche au carrefour entre la Bohême et l'Autriche. Cela a permis à nos bourgeois de prospérer et tant Brno qu'Olomouc sont devenus des centres commerciaux influents à part entière. Nous devons faire tout notre possible pour tirer le meilleur parti de cette position stratégique et pour renforcer les intérêts de nos bourgeois et artisans."
 mva_land_of_vinyards:0 "Terre des vignobles"
 mva_land_of_vinyards_desc:0 "Depuis plus de mille ans, les collines de Moravie sont utilisées pour produire nos vins célèbres. Nous devons continuer à protéger nos vignobles et à promouvoir le vin morave auprès de nos voisins."
 mva_german_quarters:0 "Quartiers allemands"
 mva_german_quarters_desc:0 "Notre proximité avec les régions allemandes a conduit à une longue histoire de coopération étroite et d'intégration avec la sphère politique et économique allemande. Il n'y a guère de cité morave majeure qui n'ait pas un quartier allemand."
 mva_jesuit_university:0 "Université jésuite"
 mva_jesuit_university_desc:0 "Les Jésuites font un travail admirable pour la contre-réforme et sont à bien des égards à l'avant-garde de l'éducation et de l'élaboration d'arguments théologiques. Invitons les Jésuites à commencer des séminaires et à créer des universités dans nos terres."
 mva_legacy_of_great_moravia:0 "Héritage de la Grande-Moravie"
 mva_legacy_of_great_moravia_desc:0 "Il y a des siècles, bien avant les puissances actuelles qui dominent maintenant Cannor, cette région était toute soumise à la Grande-Moravie. Nous devons chérir cet héritage et construire un nouvel empire pour le peuple morave."
 EST_ideas:0 "Idées estoniennes"
 EST_ideas_start:0 "Traditions estoniennes"
 EST_ideas_bonus:0 "Ambition estonienne"
 est_brotherhood_of_blackheads:0 "Confrérie des Têtes-Noires"
 est_brotherhood_of_blackheads_desc:0 "Depuis un siècle maintenant, la Confrérie des Têtes-Noires, composée de marchands célibataires, d'armateurs et d'étrangers, a pris sur elle de protéger les bourgeois estoniens. Nous devrions renforcer nos liens avec la Confrérie afin de pouvoir compter sur eux dans les années à venir."
 est_baltic_cooperation:0 "Liens baltiques"
 est_baltic_cooperation_desc:0 "Les côtes de l'Estonie ont attiré des marins étrangers pendant des siècles. Le long des rivages baltiques, notre pays abrite des Danois, des Suédois et des Allemands. Embrassons notre héritage maritime et efforçons-nous de devenir une puissance maritime avec laquelle il faut compter."
 est_academia_gustaviana:0 "Une académie estonienne"
 est_academia_gustaviana_desc:0 "Fondons une académie pour l'avancement des connaissances, des lois et de la théologie estoniennes afin de rivaliser avec d'autres centres d'apprentissage cannoréens."
 est_baltic_trade:0 "Commerce baltique"
 est_baltic_trade_desc:0 "Les marchands baltiques ont longtemps dominé nos cités et nos exportations sont toutes outre-mer. Nous devons continuer à renforcer nos liens historiques avec l'organisation commerciale baltique, tout en favorisant aussi les commerçants, armateurs et entrepreneurs estoniens qui essaient maintenant de se tailler leur propre niche dans la région."
 est_castles_of_estonia:0 "Châteaux d'Estonie"
 est_castles_of_estonia_desc:0 "L'Ordre livonien a couvert notre pays d'un réseau serré de châteaux afin de nous défendre contre les païens et les Russes. Cela nous a bien servis mais les défenses doivent être entretenues. En tant que petit peuple entouré de voisins hostiles, nous ferions bien de poursuivre l'héritage livonien et de maintenir et étendre la ligne défensive dont nous avons hérité."
 est_estophilia:0 "Estophilie"
 est_estophilia_desc:0 "Les érudits étrangers des Lumières ont finalement réalisé la grandeur de la langue et de la culture estoniennes. Bien qu'ils soient sûrement en retard pour découvrir ce que nous avons toujours su, nous ne devrions pas hésiter à profiter de leur fascination."
 est_national_awakening:0 "Ärkamisaeg"
 est_national_awakening_desc:0 "Un mouvement pour promouvoir la langue littéraire estonienne parmi tous les Estoniens, qu'ils soient à l'intérieur de nos frontières ou vivant sous domination étrangère. Russes, Suédois, Allemands, Lituaniens et autres peuples ont essayé de garder notre peuple dans l'obscurité trop longtemps. Il est temps que nous réclamions notre place au soleil et il est temps que le monde lise nos pensées et nos ordres en langue estonienne."
 TPR_ideas:0 "Idées de Tripura"
 TPR_ideas_start:0 "Traditions de Tripura"
 TPR_ideas_bonus:0 "Ambition de Tripura"
 tpr_rajmala:0 "Rajmala"
 tpr_rajmala_desc:0 "Peu peuvent se vanter d'une lignée aussi grande que la nôtre, car nous sommes descendants de la lune, Chandra, lui-même. Commandons une grande généalogie pour commémorer nos liens avec la dynastie lunaire et pour décrire l'histoire de notre peuple."
 tpr_adaptive_administration:0 "Administration adaptative"
 tpr_adaptive_administration_desc:0 "Notre royaume se trouve à la frontière des royaumes hindous, tribaux et musulmans, et ces États ont tous quelque chose à offrir en termes de force administrative. Nous devons nous efforcer d'adapter nos pratiques à ce qui convient le mieux aux parties disparates de notre royaume. Dans les plaines, nous nommerons directement des gouverneurs comme le font les musulmans, mais dans les collines tribales, nous nous appuierons sur les chefs féodaux traditionnels qui tiennent la terre."
 tpr_religious_syncretism:0 "Syncrétisme religieux"
 tpr_religious_syncretism_desc:0 "Bien que notre Royaume ait vénéré Shiva et d'autres dieux hindous pendant des siècles, beaucoup de nos sujets pratiquent aussi des coutumes tribales et même musulmanes. Nous avons appris que, si nous voulons prospérer, nous devons être flexibles et ne pas laisser les questions de culte entraver la vraie royauté."
 tpr_extended_army_control:0 "Contrôle militaire étendu"
 tpr_extended_army_control_desc:0 "Un grand pouvoir doit être confié aux commandants de nos armées pour qu'ils puissent réussir, pourtant il y a un danger à leur donner trop de pouvoir. Nous devons nous efforcer de diviser la responsabilité de nos forces armées entre plusieurs généraux et ministres spécialisés en qui nous avons confiance, plutôt que de risquer qu'une seule personne ait le contrôle total."
 tpr_appointment_of_missips:0 "Nomination des Missips"
 tpr_appointment_of_missips_desc:0 "Les chefs de village sont responsables de la collecte des impôts et de la mise en œuvre locale des décrets royaux, et ont servi notre royaume fidèlement pendant des siècles. À mesure que nous grandissons, cependant, le besoin de superviser ces chefs de village grandit aussi. Nommons des hommes de confiance comme « Missips » pour superviser les représentants locaux et assurer un meilleur contrôle central sur nos provinces."
 tpr_strenghten_local_defences:0 "Renforcer les défenses locales"
 tpr_strenghten_local_defences_desc:0 "Beaucoup de nos fermiers se plaignent d'être harcelés par des raids de l'intérieur tribal. Créons des défenses locales pour protéger notre peuple des caprices des pillards, des bandits et des armées ennemies en maraude. Une campagne paisible est une campagne qui peut devenir riche et profitable."
 HAN_ideas:0 "Idées hanovriennes"
 HAN_ideas_start:0 "Traditions hanovriennes"
 HAN_ideas_bonus:0 "Ambition hanovrienne"
 han_niedersachsicher_reichskreis:0 "Niedersächsischer Reichskreis"
 han_niedersachsicher_reichskreis_desc:0 "Le Cercle de Basse-Saxe administre et coordonne les États dans notre partie de l'Empire d'Anbennar. En travaillant en son sein, nous pouvons unir les princes contre les menaces extérieures, tout en renforçant notre propre emprise sur les riches terres de Basse-Saxe."
 han_weser_renaissance:0 "Renaissance de la Weser"
 han_weser_renaissance_desc:0 "Notre région est riche et beaucoup ont de l'argent à dépenser pour de grands bâtiments et des œuvres d'art. Le long de toute la rivière Weser, nous voyons de beaux châteaux construits dans la nouvelle architecture de notre ère. Nous devons embrasser la renaissance de la Weser et créer de grands bâtiments pour éclipser ceux de nos inférieurs."
 han_shutzenfest:0 "Schützenfest"
 han_shutzenfest_desc:0 "Hanovre a grand besoin d'hommes talentueux pour protéger et étendre nos domaines. Tenons des foires annuelles pour identifier les tireurs d'élite les plus habiles de nos terres. De cette façon, nous pouvons assurer à la fois les revenus de nos marchands locaux et un bon approvisionnement en recrues en même temps."
 han_herrenhausen_gardens:0 "Jardins de Herrenhausen"
 han_herrenhausen_gardens_desc:0 "Un grand État comme le nôtre mérite une grande capitale. Les jardins du château de Herrenhausen, à Hanovre, sont déjà célèbres. Étendons-les et construisons-les pour être une merveille vraiment unique de notre grande capitale, une qui attirera des voyageurs curieux de près et de loin."
 han_strengthen_the_meiertum:0 "Renforcer le Meiertum"
 han_strengthen_the_meiertum_desc:0 "Hanovre a toujours eu une classe forte de fermiers riches pour tenir la noblesse en échec. Les « Meiers » hanovriens ont au fil du temps étendu leurs droits de contrôle sur la terre au point de les rendre presque héréditaires. Faisons ce dernier pas et profitons de permettre aux Meiers de prospérer."
 han_hanoverian_chancery:0 "Chancellerie hanovrienne"
 han_hanoverian_chancery_desc:0 "Nos liens internationaux nous ont conduits à avoir une présence constante dans les capitales étrangères. Nous devrions créer une institution permanente pour gérer nos ambassades dans les capitales d'autres États afin d'améliorer à la fois la capacité et l'efficacité de nos diplomates."
 han_kings_legion:0 "Légion du Roi"
 han_kings_legion_desc:0 "Par le passé, nos armées ont subi des défaites cuisantes aux mains des soldats prussiens et français. Nous devons construire une armée nouvelle et plus forte, déterminée à restaurer la gloire de Hanovre et à apprendre des erreurs passées."
 AKK_ideas:0 "Idées Aq Qoyunlu"
 AKK_ideas_start:0 "Traditions Aq Qoyunlu"
 AKK_ideas_bonus:0 "Ambition Aq Qoyunlu"
 akk_white_sheep:0 "Le Mouton Blanc"
 akk_white_sheep_desc:0 "Les Aq Qoyunlu, ou le Mouton Blanc, font remonter leur lignée à Bayandor Khan, le chef de l'une des vingt-quatre tribus Oghuz et le petit-fils d'Oghuz Khagan lui-même. Le sang dans nos veines est celui de vrais guerriers et fait de nous les leaders prédestinés de tous les autres peuples."
 akk_unite_the_federation:0 "Unir les clans"
 akk_unite_the_federation_desc:0 "Pendant de nombreuses années, cela a été à notre grand détriment que nous n'avons pas pu régler les disputes de succession de notre fédération. Nous devons régler les disputes des fils du Mouton Blanc et nous unir comme un seul. Après des décennies de guerre, peu pourront se dresser devant nous si nous travaillions simplement ensemble à la place."
 akk_turko_iranian_bureaucracy:0 "Bureaucratie turko-iranienne"
 akk_turko_iranian_bureaucracy_desc:0 "L'Iran peut sembler mûr pour une armée telle que la nôtre. Il est facile à conquérir et à maintenir sous contrôle. Cependant, si nous devons extraire une quelconque forme de revenu de nos nouveaux sujets, nous devrons compter non seulement sur nos élites militaires. Il n'y a aucune raison que les anciennes familles administratives de ces terres ne continuent pas à accomplir leur travail. Embrassons les anciennes traditions de la bureaucratie iranienne, tant que nous faisons clairement comprendre que la puissance militaire réside dans les armées du Mouton Blanc."
 akk_apanages:0 "Apanages dynastiques"
 akk_apanages_desc:0 "Les tribus de notre confédération sont tenues ensemble par la loyauté envers notre grand souverain, mais il y a de nombreux conflits au sein de ce groupe disparate de partisans. Si nous voulons éviter de nous fragmenter pour des conflits tribaux mesquins, nous devrions nous efforcer de garder toutes les terres conquises directement au sein de notre famille régnante, plutôt que parmi les chefs qui nous soutiennent."
 akk_expansive_diplomacy:0 "Diplomatie expansive"
 akk_expansive_diplomacy_desc:0 "Notre royaume se trouve à un carrefour entre les empires de la Méditerranée et ceux du Grand Iran. À bien des égards, cette région est une région de peu d'amis et de nombreux ennemis. Si nous devons trouver des alliés, nous devrons chercher bien loin, peut-être même parmi les royaumes chrétiens de l'extrême occident."
 akk_religious_pragmatism:0 "Pragmatisme religieux"
 akk_religious_pragmatism_desc:0 "Ce sont des temps dangereux et beaucoup se tournent vers des sectes millénaristes pour des réponses. Nous devons faire tout notre possible pour freiner l'extrémisme religieux dans nos terres, tout en travaillant également avec les sectes derviches plus organisées auxquelles appartiennent beaucoup de guerriers turkmènes. En choisissant soigneusement qui allier et qui combattre, nous pouvons construire un État plus fort, un État qui aura l'allégeance des Derviches sans le chaos que l'extrémisme religieux peut apporter."
 akk_qanun_nama_ye_hasan:0 "Qanun-nama-ye Hasan"
 akk_qanun_nama_ye_hasan_desc:0 "La source de la richesse d'une terre est sa population. Les terres sous notre contrôle ont cependant souffert de siècles de guerre. Nous devons protéger nos sujets urbains et ruraux des raids et de la coercition arbitraires. Au lieu de cela, nous devons construire et appliquer un ensemble de lois pour rendre la vie et l'accumulation de richesses dans notre royaume sûres et valables. Nous nous enrichirons à mesure que nos sujets prospèrent."
 reform_the_diwan:0 "Réformer le Diwan"
 reform_the_diwan_desc:0 "Nous avons la chance d'être servis par des administrateurs persans loyaux et bien éduqués qui ont perfectionné l'art de gouverner pendant des générations. Malheureusement, cependant, une charge héréditaire est une charge qui peut avec le temps stagner et manquer d'innovation.\nEn réduisant le nombre de charges héritées à chaque génération, nous pouvons nous assurer que nous récompensons non seulement la loyauté, mais aussi la capacité. Les administrateurs capables doivent accéder à de hautes positions quelle que soit la famille dont ils viennent."
 KHO_ideas:0 "Idées de Khorasan"
 KHO_ideas_start:0 "Traditions de Khorasan"
 KHO_ideas_bonus:0 "Ambition de Khorasan"
 kho_land_of_the_rising_sun:0 "Terre du Soleil Levant"
 kho_land_of_the_rising_sun_desc:0 "Avec de grands déserts, de hautes montagnes et de grandes communautés tribales, le Khorasan peut sembler un endroit inhospitalier. Pourtant, c'est ici, au carrefour de l'Asie centrale, de l'Iran et de l'Inde, que de nombreux empires ont choisi de baser leurs capitales. Sous Shah Rukh, la région a prospéré dans une relative stabilité, et des marchés de Hérat aux sanctuaires de Mashad, nous nous sommes bâti une réputation comme foyer de grands érudits et de cités prospères."
 kho_rein_in_the_turko_mongol_emirs:0 "Contrôler les émirs turko-mongols"
 kho_rein_in_the_turko_mongol_emirs_desc:0 "La majorité de nos armées est encore composée des tribus que Tamerlan a amenées avec lui dans cette région. En organisant ces troupes de manière plus centralisée que son prédécesseur, Tamerlan a renforcé son pouvoir militaire, mais il a aussi fait de ces émirs turko-mongols des hommes très puissants à part entière. Là où il était capable de commander leur loyauté par la gratitude personnelle et les mariages, nous devons gagner leur soutien de manières plus durables."
 kho_princely_appanages:0 "Apanages princiers"
 kho_princely_appanages_desc:0 "Un royaume aussi divers et géographiquement divisé que le Khorasan peut être difficile à maintenir ensemble. Souvent, les gouverneurs provinciaux devront agir rapidement et avec peu de chance de demander instruction au centre. Il est essentiel que nous ayons des gouverneurs en qui nous pouvons avoir confiance tant en termes de loyauté que de capacité.\nLa pratique timuride et gengiskhanide de placer les princes de la dynastie dans de telles positions nous servirait probablement bien. Chaque gouverneur sera motivé pour tirer le meilleur parti de sa position s'il a l'espoir d'hériter lui-même du trône."
 kho_irrigation_network:0 "Canaux d'irrigation"
 kho_irrigation_network_desc:0 "L'agriculture a un coût élevé au Khorasan ; la terre est sèche et il n'y a pas de grandes rivières à proprement parler. Nos administrateurs persans suggèrent que si nos cités doivent atteindre leur plein potentiel, nous devrons investir dans un grand nombre de travaux d'irrigation et de canaux. Avec assez d'eau, même les fruits les plus rares peuvent être cultivés de Hérat à Mashad et nous pouvons construire des jardins qui feront envie à toute l'Asie."
 kho_dynastic_chronicles:0 "Chroniques dynastiques"
 kho_dynastic_chronicles_desc:0 "Le Khorasan a une longue histoire comme centre d'apprentissage savant, et notre emprise sur cette terre est nouvelle et non testée. Finançons les grands scribes de l'époque, leur permettant de composer les plus grandes chroniques de notre âge, établissant fermement notre maison comme la dynastie principale de Perse orientale."
 kho_great_sheiks_of_khorasan:0 "Grands Cheikhs de Khorasan"
 kho_great_sheiks_of_khorasan_desc:0 "Ces terres abritent de nombreux sanctuaires, ordres et lignées soufis. Les grands Cheikhs prennent souvent une part active dans la vie sociale et politique de notre société, et leur influence s'étend loin au-delà de nos frontières. Même les souverains lointains de l'Inde patronnent les Cheikhs khorasaniens des Soufis Chisti ou Naqshbandi, et de grands Sultans envoient des lettres espérant attirer nos sages à leurs cours."
 kho_protect_the_caravan_routes:0 "Protéger les routes caravanières"
 kho_protect_the_caravan_routes_desc:0 "Entre l'Oxus, l'Inde et l'Iran, le Khorasan est une région de grande importance pour le commerce longue distance. La Route de la Soie passe par là, reliant Samarcande à l'Iran et à la Méditerranée, et est rejointe à Hérat par la Grand Trunk Road depuis l'Inde.\nCe long voyage est périlleux et ardu pour de nombreux marchands cependant. En jurant de protéger tous les marchands traversant nos terres et en construisant des caravansérails réguliers le long des routes commerciales, nous pouvons grandement limiter les risques et probablement attirer encore plus de richesses vers nos grandes cités."
 TRS_ideas:0 "Idées de Transoxiane"
 TRS_ideas_start:0 "Traditions de Transoxiane"
 TRS_ideas_bonus:0 "Ambition de Transoxiane"
 trs_mawarannahr:0 "Mawarannahr, la terre au-delà du Fleuve"
 trs_mawarannahr_desc:0 "La Transoxiane, la terre au-delà de l'Amou-Daria, ou Oxus, est connue depuis les jours du grand Alexandre de Macédoine comme la fin de la culture persane. Nos terres sont là où l'Iran finit et où le Touran commence, un royaume de grandes cités, mais aussi dominé par des tribus turko-mongoles.\nPlus récemment, la Transoxiane était le point de départ de l'Empire de Tamerlan et elle reste la base de nombreux clans qui ont soutenu sa quête de pouvoir. Comme Tamerlan l'a montré, nous pourrions faire de grandes choses tant que nous les maintenons unis."
 trs_threshold_of_paradise:0 "Seuil du Paradis"
 trs_threshold_of_paradise_desc:0 "Bien qu'il fût loin d'être le premier conquérant à venir en Transoxiane, Tamerlan fit de la région le centre de son Empire et il apporta des trésors, des artistes, des bâtisseurs et des artisans du monde entier dans sa grande capitale de Samarcande. Nous devons nous efforcer de maintenir cet héritage et de continuer à embellir ce joyau entre les cités. Des cours de Castille aux palais de Pékin, tous convoiteront la cité dorée sur la Route de la Soie."
 trs_adept_diplomacy:0 "Diplomatie habile"
 trs_adept_diplomacy_desc:0 "Par l'éducation et l'entraînement, nos souverains acquièrent les vertus de la grande royauté, mais il n'y a pas d'école qui enseignera comment survivre dans le climat politique de Transoxiane. Depuis les jours de Tamerlan, jeunes princes, oncles et cousins ont comploté les uns contre les autres pour le droit de gouverner cette région. Quand l'un de nos princes atteint l'âge adulte et réussit à prendre les rênes du pouvoir, nous pouvons être sûrs qu'il est, si rien d'autre, assez habile en espionnage et en politique.\nSi notre royaume doit jamais être libre de cette atmosphère empoisonnée, nous devons mettre fin à de telles luttes intestines, nous efforçant de surpasser une fois pour toutes les rejetons moindres de la famille."
 trs_turkoman_cannoneers:0 "Canonniers turkmènes"
 trs_turkoman_cannoneers_desc:0 "Bien qu'il faille encore longtemps avant de déterminer des batailles dans les terres ouvertes de Transoxiane, la poudre à canon promet de changer la guerre dans ses fondements mêmes. Les canonniers turcs se sont déjà fait un nom en Inde et en Iran. Le temps est venu de s'assurer que ces talentueux hommes de guerre ne quittent jamais nos terres. Mettons les armuriers les plus habiles au travail et créons le plus grand bras d'artillerie d'Asie centrale."
 trs_scientific_patronage:0 "Patronage scientifique"
 trs_scientific_patronage_desc:0 "Notre royaume abrite certains des plus grands esprits de cette ère. De grands penseurs, philosophes, écrivains, artistes et astronomes. Si nous devons vraiment bénéficier de leur brillance, cependant, nous devons oser leur donner les outils pour viser plus haut. Construisons de grandes œuvres et bâtiments au nom de la science. Nous fournirons des observatoires astronomiques, des bibliothèques et tout le patronage dont les esprits aspirants pourraient avoir besoin.\n\n« Les religions montent et tombent, les empires s'effritent en poussière, mais les œuvres de la science sont pour tous les temps. »"
 trs_entrepot_of_the_silk_road:0 "Entrepôt de la Route de la Soie"
 trs_entrepot_of_the_silk_road_desc:0 "Bien que de nombreux endroits bénéficient d'être des points de transit pour la Route de la Soie, nous sommes au centre de l'un de ses plus grands entrepôts. D'est en ouest, les marchands connaissent la réputation de Boukhara et Samarcande, et sont prêts à traverser les déserts du bassin du Tarim et de l'Iran ou les grandes steppes du nord, pour pouvoir vendre leurs marchandises ici, rapportant chez eux notre soie, notre papier et tous les produits exotiques qu'ils peuvent trouver ici.\nNotre richesse dépend du maintien de la paix. Sans Tamerlan, et Gengis Khan avant lui, beaucoup trouvent cela trop dangereux à entreprendre. Nous devons nous efforcer de protéger tous les marchands dans nos terres et de négocier le droit de passage pour tous les marchands longue distance qui cherchent nos marchés."
 QOM_ideas:0 "Idées Ajami"
 QOM_ideas_start:0 "Traditions Ajami"
 QOM_ideas_bonus:0 "Ambition Ajami"
 qom_jibal:0 "Jibal"
 qom_jibal_desc:0 "Quand les Arabes vinrent jadis en Perse, ils nommèrent notre région Jibal, les montagnes, car les nombreuses montagnes des chaînes du Zagros et de l'Alborz sont ce qui la définit. À la frontière occidentale du Grand Iran, la région est la porte entre les États du Caucase turc et le Grand Iran.\nPourtant Jibal n'est pas que montagnes, car dans les bassins se trouvent un certain nombre des plus anciennes et des plus grandes cités d'Iran et entre ces bassins, des cols et des routes relient la population urbaine de notre Empire. Comme les empires avant nous, des anciens Mèdes aux Timurides, nous devons fortifier les cols et patrouiller les routes aussi bien que possible, car ils sont la ligne de vie de notre État."
 in_honor_of_ali:0 "En l'honneur d'Ali"
 in_honor_of_ali_desc:0 "Qu'ils se considèrent sunnites ou chiites, la grande majorité de nos sujets honorent les Imams, la famille de Mahomet et même Ali. Bien que cette conviction soit considérée comme une faiblesse par certains érudits de la loi, c'est quelque chose qui unit notre peuple, qu'ils soient mystiques soufis, sunnites ordinaires, Alévis ou Chiites duodécimains."
 qom_legacy_of_the_ilkhans:0 "Héritage des Ilkhans"
 qom_legacy_of_the_ilkhans_desc:0 "Pendant des centaines d'années, l'Iran et le Caucase ont été dominés par des guerriers turcs. Ils ont constitué la fondation militaire d'un certain nombre d'États tels que ceux de l'Ilkhanat, des Seldjoukides ou plus récemment des Timurides. Ajam se trouve au centre même de la grande région turco-persane, et pour cette raison c'est ici que les Ilkhans ont jadis construit leur capitale à Sultaniyya. Aujourd'hui les Ilkhans sont partis depuis longtemps mais leurs monuments et leurs traditions demeurent ; à Sultaniyya leur mausolée témoigne encore de l'empire qui fut.\nSi nous voulons dominer cette région, nous devons embrasser les idéaux de royauté de l'Ilkhanat et gagner la loyauté des guerriers turcs qui y demeurent encore."
 qom_persian_language_and_court_culture:0 "Langue persane et culture de cour"
 qom_persian_language_and_court_culture_desc:0 "La haute culture persane reste une constante à travers les âges, peu importe quels conquérants vont et viennent. L'Iran est tombé de nombreuses fois, mais à la fin c'est la langue et la culture persanes qui se répandent dans leurs pays d'origine. De l'Anatolie à Samarcande, et même au Bengale, c'est la langue de Hafez et Rumi qui ouvrira des portes aux marchands, politiciens et érudits."
 qom_tribes_of_iraq_e_ajam:0 "Tribus d'Iraq-e Ajam"
 qom_tribes_of_iraq_e_ajam_desc:0 "Ces terres ont été surnommées Iraq-e Ajam, ou Iraq étranger, par les étrangers et sont dominées par des citadins persans et des guerriers turcs amenés par les Mongols, les Seldjoukides et les Timurides. À la périphérie des grands établissements, cependant, un grand nombre de groupes de nomades et de semi-nomades traverse et peuple la région, Arabes, Turkmènes, Baloutches, Kalaj et Bédouins. Certains sont ici depuis des siècles, d'autres sont arrivés plus récemment, tous ont traditionnellement été largement livrés à eux-mêmes. Nous devrions utiliser ces groupes dans nos défenses, car nul ne connaît mieux la campagne persane qu'eux."
 qom_shahanshah:0 "Shahanshah"
 qom_shahanshah_desc:0 "À ce jour, l'héritage de l'Empire perse vit sous la forme du titre royal Shah, utilisé par les souverains persanisés partout. Nous devons unir tout le peuple iranien sous notre souverain, Shahanshah, le Roi des Rois."
 FRS_ideas:0 "Idées de Fars"
 FRS_ideas_start:0 "Traditions de Fars"
 FRS_ideas_bonus:0 "Ambition de Fars"
 frs_land_of_the_persians:0 "Terre des Persans"
 frs_land_of_the_persians_desc:0 "Dans de nombreux pays, Perse et Persans, dérivés de Fars et Farsis, sont les noms utilisés pour désigner tout l'Iran. Si important a été notre impact sur la culture et l'économie de cette région. Des contreforts des monts Zagros aux côtes du Golfe Persique, les terres de Fars abritent certaines des plus anciennes et des plus célèbres cités des Iraniens et de la culture iranienne."
 frs_center_of_religion_and_philosophy:0 "Centre de religion et de philosophie"
 frs_center_of_religion_and_philosophy_desc:0 "Pendant des siècles, le Fars et Chiraz ont été un centre vibrant de philosophie, de théologie et de culture, attirant les grands penseurs de son époque de tout le monde persanisé et islamique. Nous ne devons pas gaspiller cet héritage ; continuons à patronner les arts, la littérature et la théologie afin de continuer à briller comme le joyau le plus brillant de Perse."
 frs_diplomatic_prudence:0 "Prudence diplomatique"
 frs_diplomatic_prudence_desc:0 "Là où d'autres régions ont été promptes à soutenir de nouveaux conquérants en ascension, ou promptes à se rendre avec des armées devant leurs murs, le Fars a souvent favorisé une approche plus prudente et équilibrée. La clé de la survie dans un monde dangereux n'est pas de se rendre dès que nous sommes menacés, mais ce n'est pas non plus de chercher un combat dont nous ne savons pas encore qui va gagner. À mesure que de nouveaux prétendants à la suprématie en Perse vont et viennent, nous considérerons soigneusement nos options. Notre peuple sera là longtemps après que tous les nouveaux venus seront partis, qu'ils gagnent ou perdent leurs conflits mesquins."
 frs_shirazi_wine:0 "Étendre la production de vin"
 frs_shirazi_wine_desc:0 "La légende dit que c'est en Perse que le vin fut jadis découvert. Une fille, ayant perdu la faveur du roi Jamshid, but le jus de raisin fermenté pour mettre fin à ses jours. Au lieu de cela, elle trouva le secret du vin et en peu de temps il se répandit depuis la cour royale.\nLe vin est produit et consommé en Perse depuis des millénaires, mais nul ne peut rivaliser avec ceux faits à partir des excellents raisins cultivés sur les pentes en terrasses des monts Zagros dans le Fars. La réputation du vin de Chiraz s'est répandue bien au-delà des frontières et est très demandée même en Inde et en Europe.\nNous devons étendre notre système d'irrigation et faire tout ce que nous pouvons pour augmenter notre production de vin, tout en commercialisant nos produits très recherchés sur les marchés étrangers."
 frs_shirazi_school:0 "École de Chiraz"
 frs_shirazi_school_desc:0 "En tant que centre d'apprentissage, il n'est peut-être pas étonnant que les ateliers du Fars soient devenus célèbres pour la grande production de livres et de peintures miniatures. Des maîtres peintres et des relieurs célèbres se sont toujours installés dans nos cités et ont joui de notre protection.\nL'école de Chiraz ne peut fleurir qu'avec un soutien généreux pour créer plus de livres, cependant, et c'est quelque chose que nous devons fournir si nous ne voulons pas être éclipsés par les relieurs et peintres indiens ou azerbaïdjanais."
 frs_integrate_the_qashqai:0 "Intégrer les Qashqais"
 frs_integrate_the_qashqai_desc:0 "Bien que le Fars abrite de nombreux Persans sédentaires, de grandes cités et industries, il est aussi peuplé de grands groupes de tribus nomades. Les Qashqais et d'autres groupes ont souvent été en désaccord avec les citadins, conduisant à des conflits coûteux entre les deux qui ne bénéficient pas au royaume.\nNous devons intégrer les Qashqais et leur donner une place dans nos cités tout en garantissant leurs droits d'utiliser la terre pour le pâturage. En retour, nous demandons que notre souverain soit consulté pour la nomination de nouveaux Ilkhans, leurs chefs traditionnels."
 frs_capital_for_an_empire:0 "Une capitale pour un Empire"
 frs_capital_for_an_empire_desc:0 "Avec sa proximité des routes commerciales du golfe, sa grande importance pour la culture persane et sa relative sécurité contre les ennemis de notre peuple, le Fars est un endroit idéal à partir duquel gouverner un État perse. Inspirons-nous des grands Empires avant nous et créons une capitale digne de ce nom. Nous devons étendre et rénover chaque partie de la capitale, construire de nouveaux canaux pour l'irrigation, des bains publics, des bazars, des murs de cité, des places, des palais, des mosquées, des madrassas et des jardins.\nQue tous ceux qui le souhaitent puissent s'y installer, car ce sera la plus grande capitale que l'homme ait jamais vue !"
 LRI_ideas:0 "Idées Lurs"
 LRI_ideas_start:0 "Traditions Lurs"
 LRI_ideas_bonus:0 "Ambition Lurs"
 lri_kingdom_in_the_zagros_mountains:0 "Royaume dans les monts Zagros"
 lri_kingdom_in_the_zagros_mountains_desc:0 "Le peuple Lur de notre État habite une région que beaucoup trouveraient inhospitalière. En fait, les monts Zagros ont été vus comme une barrière entre l'Iran et la Mésopotamie pendant des siècles. Cela ne nous dérange pas car la plupart de notre peuple est habitué à une vie nomade, cependant, déplaçant leurs moutons à travers les pentes et les cols comme ils le souhaitent."
 lri_jadda_ye_atabak:0 "Jadda-ye Atabak"
 lri_jadda_ye_atabak_desc:0 "Quand le Royaume de Malamir gouvernait cette région, ils utilisèrent leur pouvoir pour tailler une grande route dans les montagnes, améliorant grandement la facilité avec laquelle le commerce pouvait être mené à travers le Zagros tout en prenant leur propre part pour l'entretien.\nAujourd'hui le Royaume de Malamir n'existe plus, car Shah Rukh l'a écrasé dans les années 1420, mais la route demeure. Nous devons apprendre des Atabaks et ne pas laisser leur route se perdre. En continuant à assurer son entretien, nous assurons que nous pouvons fournir un service précieux à nos voisins et que nous ne manquerons jamais d'argent."
 lri_haven_for_dissenters:0 "Un havre pour les dissidents"
 lri_haven_for_dissenters_desc:0 "La vie nomade de la plupart de nos sujets peut être attirante pour certains. Il y a de nombreux groupes, tant nomades que sédentaires, pour lesquels il n'y a plus de place dans les vastes plaines de Mésopotamie ou les vallées d'Iran. Des gens qui se sont retrouvés du côté perdant des guerres, qui ont été déplacés pour faire place à l'irrigation ou qui ont été jugés trop indisciplinés pour rester quand le pouvoir central s'est étendu.\nNous devrions ouvrir nos bras à ces gens et leur permettre de s'installer comme nouvelles tribus dans nos montagnes. Personne ne sera aussi déterminé à défendre leurs nouvelles maisons que ceux qui ont tout perdu."
 lri_popular_religion:0 "Religion populaire"
 lri_popular_religion_desc:0 "Bien que nous sachions que tous parmi notre peuple sont de bons musulmans, il n'est pas toujours clair que les sages érudits des plaines seraient d'accord avec cette évaluation. Peu ici parlent ou lisent l'arabe et beaucoup vivent dans un relatif isolement du monde extérieur. Entre notre vénération des sanctuaires locaux, les emamzadas (descendants des Imams) et la prévalence de sectes syncrétiques comme le Yarsanisme, cela frapperait probablement les plus érudits des Oulémas comme assez troublant. Pourtant cette ouverture à la variété est aussi une force, car il est difficile d'imaginer un peuple que nous aurions du mal à intégrer dans notre société pour des raisons religieuses."
 lri_looms_of_the_lurs:0 "Métiers à tisser des Lurs"
 lri_looms_of_the_lurs_desc:0 "Certains diraient que notre tissu n'est pas aussi sophistiqué que les tissus de soie des gens des plaines, mais la laine que nos moutons fournissent nous permet de créer des textiles à la fois robustes et beaux pour lesquels il y a une forte demande bien au-delà de nos propres terres."
 lri_rise_of_the_lurs:0 "Ascension des Lurs"
 lri_rise_of_the_lurs_desc:0 "La vie dans les montagnes n'est pas toujours facile. Notre peuple est dur et fort, ayant enduré une vie en terrain difficile, défendant leurs troupeaux contre les pillards et résistant aux attaques d'envahisseurs étrangers quand nécessaire. Au fil des siècles, nous avons aussi agi comme faiseurs de rois et aidé divers prétendants dans le royaume perse.\nMaintenant le temps est venu de nous lever pour nous-mêmes, de saisir les terres autour de nous et de former une armée capable de détruire celles des faibles sédentaires."
 lri_foreign_trade:0 "Liens commerciaux étrangers"
 lri_foreign_trade_desc:0 "Peut-être vaut-il mieux chercher des alliés au loin plutôt que dans notre voisinage immédiat. Nous détenons dans nos terres un certain nombre de ressources que les Compagnies des Indes européennes désirent, et beaucoup de leurs agents ont déjà exprimé un intérêt pour une coopération plus poussée. Forgeons des alliances avec les royaumes européens et garantissons la sécurité de leurs marchands en échange de leur protection et de leur patronage."
 QAR_ideas:0 "Idées Qara Qoyunlu"
 QAR_ideas_start:0 "Traditions Qara Qoyunlu"
 QAR_ideas_bonus:0 "Ambition Qara Qoyunlu"
 qar_black_sheep:0 "Le Mouton Noir"
 qar_black_sheep_desc:0 "Nous sommes la confédération du Mouton Noir. Notre lignée remonte aux grands Khans Oghuz et nos guerriers ont fait trembler le monde. Jadis nous avons baissé la tête devant les Ilkhans et Tamerlan, mais nous sommes maintenant indépendants et plus forts que jamais, prêts à prendre la direction de tous les clans turcs d'Iran, d'Anatolie et du Caucase."
 qar_governor_of_azerbaijan:0 "Gouverneur d'Azerbaïdjan"
 qar_governor_of_azerbaijan_desc:0 "Bien que beaucoup de nos campagnes militaires contre nos suzerains timurides nous aient donné une expérience précieuse, le gain le plus important fut peut-être le titre de gouverneur timuride, donné par Shah Rukh à Jahan Shah afin de l'aider à pacifier notre peuple. Ce que Shah Rukh n'a pas réalisé, c'est que cela nous permet de revendiquer la légitimité de Tamerlan, qui a jadis vaincu et conquis tous les États du Caucase. Ce nouvel honneur nous donne une plateforme pour construire une emprise durable sur le Caucase, l'Azerbaïdjan et peut-être un jour même la Perse."
 qar_dynamic_warfare:0 "Guerre dynamique"
 qar_dynamic_warfare_desc:0 "Notre région s'est avérée périlleuse pour de nombreux envahisseurs. Les montagnes, déserts, plaines et forêts du Caucase et de l'Iran nécessitent une adaptation rapide aux circonstances locales et un œil aiguisé pour les avantages stratégiques et tactiques. Notre guerre prolongée contre d'autres fédérations turcomanes et les Timurides nous a permis de perfectionner une forme dynamique de guerre, mêlant raids, grandes guerres de manœuvre et batailles rangées."
 qar_freedom_with_responsibility:0 "Liberté avec responsabilité"
 qar_freedom_with_responsibility_desc:0 "Un souverain vraiment grand est celui qui sait déléguer. Nous avons soumis un grand nombre d'États sur une gamme large et diverse de climats et de paysages. Si notre empire doit grandir, nous devons apprendre à donner du pouvoir aux petites dynasties locales qui se rendent à notre domination, leur permettant de taxer leur propre peuple et de lever leurs propres armées à notre service."
 qar_patron_of_iranian_culture:0 "Patron de la culture iranienne"
 qar_patron_of_iranian_culture_desc:0 "En tant que conquérants de l'Iran et de l'Irak, nous avons hérité des cités et des palais des grands empires avant nous. Si nous voulons survivre et prospérer dans cette région, nous devons ajouter nos propres monuments et architecture aux leurs et patronner les érudits persanisés de nos peuples sujets."
 qar_irrigation_and_public_works:0 "Irrigation et travaux publics"
 qar_irrigation_and_public_works_desc:0 "Des siècles de guerre, depuis l'invasion mongole, ont laissé les terres d'Iran et de Mésopotamie dévastées. De grands travaux d'irrigation qui garantissaient jadis le bien-être de nos sujets ont été détruits et l'agriculture est otage des caprices des saisons.\nÀ court terme, nous devons constituer des réserves de grain pour pouvoir aider notre peuple en cas de besoin. Pour assurer l'avenir, cependant, nous devons restaurer ce qui a été ruiné et reconstruire les travaux publics qui permettront aux terres Qara Qoyunlu d'être fertiles et productives à nouveau."
 MHR_ideas:0 "Idées Mahri"
 MHR_ideas_start:0 "Traditions Mahri"
 MHR_ideas_bonus:0 "Ambition Mahri"
 mhr_lands_of_frankincense_and_the_khareef:0 "Terres de l'encens et du Khareef"
 mhr_lands_of_frankincense_and_the_khareef_desc:0 "Bien que nos terres puissent sembler pauvres et arides pour certains, elles ont été bénies de deux façons importantes. La première est que nous produisons une grande partie de l'encens et de la myrrhe légendaires qui sont demandés par les nombreux peuples du monde.\nLa seconde est la mousson saisonnière, ou Khareef, avec sa brume caractéristique. Elle assure que la terre est verte et même luxuriante pendant une partie de l'année. Sans cette eau, notre État ne pourrait pas exister tel que nous le connaissons."
 mhr_mercenary_traditions:0 "Traditions mercenaires"
 mhr_mercenary_traditions_desc:0 "Les Mahra sont dans cette région depuis longtemps. Selon certains, nous sommes ici plus longtemps que tous les autres groupes du sud de l'Arabie. Nous avons cependant souvent été un partenaire moindre de voisins plus grands. Les soldats Mahri ont servi dans les armées du Yémen ou d'Oman et nos mercenaires sont ce qui nous a fait un nom à l'étranger plutôt que nos propres armées."
 mhr_mahra_tribes:0 "Les tribus Mahra"
 mhr_mahra_tribes_desc:0 "Notre langue est différente de beaucoup d'autres parlées dans cette péninsule ; beaucoup font même une différence entre les Mahri et les Arabes. Quoi qu'il en soit, notre peuple descend des fils du grand Mahra bin Haydan bin Qahtan bin Yarub. Depuis des temps immémoriaux, notre peuple a été divisé en deux groupes. Les Banu Sar contrôlent le pays Mahra côtier tandis que les Banu Shahawih contrôlent l'intérieur.\nSi nous voulons prospérer, nous devons unir les tribus de l'intérieur et les tribus côtières. Car les deux groupes sont nécessaires tant pour défendre qu'étendre notre pays."
 mhr_pilots_of_the_arabian_sea:0 "Pilotes de la mer d'Arabie"
 mhr_pilots_of_the_arabian_sea_desc:0 "Nous avons navigué sur les eaux de la mer d'Arabie pendant des centaines d'années et peu de capitaines connaissent les eaux aussi bien que nous. Il y a des communautés Mahri des cités swahilies d'Afrique de l'Est aux banlieues animées du Caire ou de Bassora. Notre héritage maritime a rendu nos marins très recherchés non seulement pour équiper des navires, mais aussi comme pilotes précieux pour guider des navires de toutes nations à travers des eaux dangereuses ou inconnues."
 mhr_camels:0 "Chameaux Mahra"
 mhr_camels_desc:0 "Les Chameaux de Mahra sont célèbres bien au-delà de nos propres frontières. Ils étaient prisés par les Califes d'antan et les poètes anciens, comme Abu Tammam, ont chanté les louanges de leurs noms. On nous a même dit que dans des pays lointains, le nom même de Mahri ou « Méhari » est devenu synonyme de chameau de selle.\nLes chameaux Mahri ont servi pèlerins, marchands et pillards pendant des siècles. À mesure que notre État s'étend et se modernise, nous devons continuer à maintenir les anciennes traditions d'élevage et de garde qui nous ont permis de favoriser des bêtes de somme aussi polyvalentes."
 mhr_book_of_navigation:0 "Livre de navigation"
 mhr_book_of_navigation_desc:0 "L'habileté et l'expérience de nos navigateurs sont connues de Zanzibar à Timor, mais nous ne pouvons pas risquer que des secrets commerciaux meurent avec un seul homme. Nous devrions faire compiler à nos meilleurs navigateurs un nouveau manuel de navigation. À jour et sans secrets gardés, pour le bénéfice des générations futures de marins."
 mhr_rein_in_the_chiefs:0 "Contrôler les chefs"
 mhr_rein_in_the_chiefs_desc:0 "Traditionnellement, une grande partie du pouvoir dans notre société a été entre les mains des « Mukaddams », chefs qui contrôlent les diverses communautés de l'intérieur, tandis que nos Sultans ont passé une grande partie de l'année sur l'île de Socotra. Cela peut parfois conduire à des effusions de sang internes inutiles et même à de nouveaux conflits avec nos voisins.\nIl est temps que nous intervenions pour contrôler les chefs ou, si besoin, les remplacer par des serviteurs plus loyaux."
 YEM_ideas:0 "Idées yéménites"
 YEM_ideas_start:0 "Traditions yéménites"
 YEM_ideas_bonus:0 "Ambition yéménite"
 yem_al_yaman:0 "Al-Yaman, l'Arabie heureuse"
 yem_al_yaman_desc:0 "Depuis les temps anciens, le Yémen est connu comme l'Arabie heureuse. Là où une grande partie de la péninsule est stérile, déserte et sèche, le Yémen a été béni d'un climat de plateau doux, de précipitations et de bonnes terres agricoles. Des cités côtières de la basse Tihama aux terres agricoles en terrasses des hauts plateaux yéménites, notre pays est prospère et arable."
 yem_control_of_the_red_sea:0 "Contrôle de la mer Rouge"
 yem_control_of_the_red_sea_desc:0 "Chaque année, un nombre considérable de navires sillonnent les océans Arabique et Indien pour acheminer épices, coton, soie, gemmes, encens, esclaves et autres denrées fort prisées entre l'Égypte et l'Inde. Pour accomplir ce périple, ils doivent franchir le Bab-el-Mandeb, un détroit étroit entre nos côtes et l'Afrique. Nous devons tirer pleinement parti de la puissance que nous confère notre position, tant en protégeant les nombreux navires marchands dans nos eaux qu'en leur faisant acquitter le prix de cette protection."
 yem_yemeni_architecture:0 "Architecture Yéménite"
 yem_yemeni_architecture_desc:0 "Les souverains du Yémen à travers les siècles ont tous souhaité laisser leur empreinte sur cette terre, et ils ont rarement manqué de ressources. Il est temps que nous mettions notre fortune à profit pour édifier de grands ouvrages d'irrigation, construire nos propres madrasas et forteresses, afin de rivaliser avec les dynasties d'antan. Qu'aucun visiteur ne doute qu'il est arrivé dans le plus impressionnant des pays d'Arabie."
 yem_uniting_yemeni_tribes:0 "Unification des Tribus Yéménites"
 yem_uniting_yemeni_tribes_desc:0 "L'arrière-pays yéménite, les hautes terres et même les plaines côtières abritent une multitude de puissants chefs tribaux. Nombre de ces clans peuvent lever de redoutables groupes de guerriers qui ont prouvé leur capacité à repousser les envahisseurs étrangers au fil des siècles ; cependant, ils sont tout aussi susceptibles de se retourner contre nos propres percepteurs.\nIl est temps d'unir véritablement ces tribus belliqueuses pour forger une population loyale, unie contre nos ennemis communs plutôt que morcelée en groupes désorganisés, perpétuellement soucieux de défendre leur propre autonomie."
 yem_promoting_yemeni_trade_ports:0 "Promotion des Ports Marchands Yéménites"
 yem_promoting_yemeni_trade_ports_desc:0 "Depuis des siècles, les marchands yéménites appareillent de ports tels que Zabid, Moka ou Aden, et certaines dynasties ont même établi leurs capitales dans ces cités côtières. Les pluies et le sol ont fait du Yémen un pays prospère, mais c'est le commerce qui soutient notre richesse. Nous devons appuyer nos négociants et marchands en toutes circonstances, car sans eux notre État serait de peu de conséquence."
 yem_foreign_embassies:0 "Ambassades Étrangères"
 yem_foreign_embassies_desc:0 "Notre position en ce monde est fort enviable, ce qui signifie que nous attirerons toujours l'attention indésirable de pays proches et lointains. Il est temps de mettre à profit la richesse et l'influence que nous avons bâties pour obtenir des alliances et des garanties des grandes puissances de ce monde, afin de préserver nos positions tant sur terre que sur mer."
 RAS_ideas:0 "Idées Rassides"
 RAS_ideas_start:0 "Traditions Rassides"
 RAS_ideas_bonus:0 "Ambition Rasside"
 ras_living_imam:0 "L'Imam Vivant"
 ras_living_imam_desc:0 "Là où d'autres chiites attendent un Imam caché ou se dissimulent parmi les sunnites, les soufis ou d'autres hérésies, notre peuple suit l'Imam zaïdite. Il est notre guide dans le domaine temporel comme spirituel, et lui et ses descendants nous guideront toujours contre l'infidèle, l'hérétique ou tout autre ennemi qui croiserait notre route."
 ras_yemeni_highlands:0 "Hautes Terres du Yémen"
 ras_yemeni_highlands_desc:0 "Le Yémen a toujours eu la réputation d'être la partie la plus fertile et la plus heureuse d'Arabie, et c'est la vérité. Rares sont les endroits de cette péninsule possédant d'aussi bonnes terres agricoles ou autant de précipitations. Les hautes terres yéménites que nous appelons notre foyer sont particulièrement tempérées et accueillantes à bien des égards ; ici, nous pouvons cultiver tant la nourriture que les fameux plants de café de notre peuple."
 ras_unite_rassid_state:0 "Un État Rasside Unifié"
 ras_unite_rassid_state_desc:0 "Depuis trop longtemps, les descendants de notre dynastie se sont combattus pour la direction de notre État. Il est temps de trouver un chef puissant capable de rassembler les fidèles rassides et de nous mener à la victoire contre les ennemis étrangers comme contre les tribus dissidentes."
 ras_mountain_strongholds:0 "Forteresses de Montagne"
 ras_mountain_strongholds_desc:0 "Dans notre défiance envers les souverains temporels qui cherchent à contrôler notre pays, nous avons souvent dû bâtir de solides structures défensives. Les hautes terres yéménites ont toujours été parsemées d'installations défensives, des grandes forteresses aux petites tours. Cette attitude de vigilance constante est une vertu que nous devons emporter avec nous tandis que nous nous étendons vers les basses terres et autres régions. Nous devons toujours demeurer vigilants et prêts à défendre ce qui est nôtre."
 ras_salt_in_water:0 "Comme le Sel dans l'Eau"
 ras_salt_in_water_desc:0 "On raconte qu'un commandant étranger déclara jadis que les troupes envoyées au Yémen « fondraient comme le sel se dissout dans l'eau ». Si cela témoigne de l'hostilité que cette terre peut opposer à tout envahisseur extérieur, c'est aussi un objectif que nous devons poursuivre. Unissons notre peuple et œuvrons tous ensemble pour vaincre tout envahisseur. Unis, rien ne nous serait impossible !"
 ras_secure_trade_monopolies:0 "Garantir les Monopoles Commerciaux Yéménites"
 ras_secure_trade_monopolies_desc:0 "Tout comme nous contrôlons la source de la majeure partie du café mondial, nous sommes dans une position unique pour contrôler le commerce de la mer Rouge ainsi que le commerce terrestre en Arabie. Cette source de richesse doit être exploitée."
 MSY_ideas:0 "Idées Musha'sha'"
 MSY_ideas_start:0 "Traditions Musha'sha'"
 MSY_ideas_bonus:0 "Ambition Musha'sha'"
 msy_fervent_millenarianism:0 "Millénarisme Fervent"
 msy_fervent_millenarianism_desc:0 "Les Musha'sha' savent que Sayyid Muhammad ibn Falah est l'incarnation du Mahdi, et c'est selon sa volonté que nous avons taillé un État pour les justes en ces terres. Nous sommes fortifiés par notre foi et l'exaltation mystique qui nous permettent d'accomplir des actes extraordinaires au nom de sa radieuse dynastie. La fin est proche et il est temps que le monde apprenne à suivre les enseignements des Musha'sha' !"
 msy_messianic_legacy:0 "Héritage Messianique de Muhammad ibn Falah"
 msy_messianic_legacy_desc:0 "Répandre la parole de Sayyid Muhammad et de ses descendants est plus qu'une mission pour les Musha'sha', c'est notre devoir. Nous devons éclairer tous ceux que nous venons à gouverner ainsi que porter la parole aux sujets opprimés de nos voisins."
 msy_swamp_warfare:0 "Guerre des Marécages"
 msy_swamp_warfare_desc:0 "La région autour du Chatt al-Arab jusqu'au golfe Persique est un labyrinthe de rivières, de marais et d'îles que tout envahisseur trouvera fort difficile à contrôler ou même à traverser. Utiliser le terrain à notre avantage a été la voie des guerriers Musha'sha' depuis la fondation de notre État, et trouver des moyens d'exploiter cette expérience tandis que nous nous étendons nous permettra de continuer à vaincre des ennemis qui sembleraient plus puissants que nous."
 msy_arabistan:0 "Arabistan"
 msy_arabistan_desc:0 "Le message des Musha'sha' a toujours résonné parmi les justes, mais il exerce une influence particulièrement forte parmi les tribus arabes d'Irak et du nord de l'Arabie. Le soutien dont nous jouissons de ces tribus est une force que nous devrions mettre à profit tant pour gouverner que pour étendre notre influence."
 msy_house_united:0 "Une Maison Unie"
 msy_house_united_desc:0 "Bien que notre État ait parcouru un long chemin depuis sa fondation par Muhammad ibn Falah, nous demeurons les porteurs de son héritage, et ses descendants restent d'une importance capitale pour le gouvernement Musha'sha'. Au fil des ans, cependant, sa dynastie s'est agrandie et beaucoup de temps et d'énergie se perdent en intrigues, factionalisme et complots entre les branches et leurs divers partisans. Réglons ces différends une fois pour toutes et établissons une succession claire pour la direction de la famille."
 msy_outward_pragmatism:0 "Pragmatisme Extérieur"
 msy_outward_pragmatism_desc:0 "Avoir des amis est une nécessité dans un monde hostile. Nos convictions religieuses font qu'il est peu probable que quiconque nous considère autrement que comme des hérétiques, ce qui peut rendre difficile de trouver des partenaires parmi nos voisins. Nous ne devons donc pas craindre de faire tout notre possible pour cultiver de bonnes relations avec les États plus puissants de notre voisinage."
 msy_sufis_shias_middle_east:0 "Soufis et Chiites du Moyen-Orient"
 msy_sufis_shias_middle_east_desc:0 "Il y a de nombreux chiites dans les terres d'Iran et d'Irak qui ont dû mener des vies secrètes pendant des siècles, attendant que le Mahdi se révèle enfin. Et même parmi ceux qui se considèrent sunnites, certains, sages de leurs années de pratiques soufies, montrent un grand intérêt pour les nouveaux enseignements des Musha'sha'. Invitons ces hommes et ces femmes en nos terres ; certains feront sans doute progresser notre théologie tandis que d'autres nous aideront à développer les terres que nous contrôlons désormais."
 SIS_ideas:0 "Idées Sistanaises"
 SIS_ideas_start:0 "Traditions Sistanaises"
 SIS_ideas_bonus:0 "Ambition Sistanaise"
 sis_lake_hamun:0 "Lac Hamoun"
 sis_lake_hamun_desc:0 "Depuis les hauts sommets de l'Hindou Kouch, les rivières Helmand, Khash Rud, Farah Rud et Harut Rud convergent toutes vers le lac Hamoun et la dépression du Goud-i Zirah. Cela crée un type particulier de plaine irriguée qui diffère des déserts et montagnes environnants. Le lac, qui contiendrait la semence de Zoroastre, a été impératif pour le bien-être de notre peuple au fil des siècles, tant comme centre d'irrigation que pour actionner nos moulins à eau."
 sis_saffarid_legacy:0 "Héritage Saffaride"
 sis_saffarid_legacy_desc:0 "Pendant deux cents ans, le Sistan fut la base de la dynastie saffaride ; surmontant les gouverneurs tahirides du califat abbasside, ils furent capables de tailler un empire en Perse orientale. Bien que l'Empire saffaride n'ait pas duré longtemps, la dynastie démontra la force que le peuple du Sistan peut posséder. Nous devrions nous efforcer d'imiter nos ancêtres saffarides et nous souvenir que ce qui ressemble à une province lointaine est en réalité les germes d'un empire."
 sis_subjugation_of_tribes:0 "Soumission des Tribus"
 sis_subjugation_of_tribes_desc:0 "Nous contrôlons les forts et les cités du Sistan, mais dans les montagnes, collines et déserts qui entourent notre État vivent de nombreuses tribus qui mènent une existence presque entièrement indépendante de notre autorité. Nous devons soumettre les tribus de ces régions, tant pour préserver la paix dans les basses terres que pour étendre notre contrôle sur les hautes terres."
 sis_loyal_service:0 "Service Loyal"
 sis_loyal_service_desc:0 "Le temps du Sistan en tant que grand empire fut peut-être bref, mais pendant des siècles nous avons fourni des armées et des chefs pour les guerres des Ilkhans, des Kartes et des Timourides. Nous devons fièrement préserver cette tradition de service dans nos rangs tandis que nous tirons profit de l'expérience acquise dans les guerres des puissances étrangères."
 sis_overland_trade_routes:0 "Routes Commerciales Terrestres"
 sis_overland_trade_routes_desc:0 "Nous contrôlons des points importants sur les routes terrestres entre l'Afghanistan, le Khorasan et l'Iran — des terres qui ont historiquement souvent été considérées comme dangereuses par les marchands, certains osant les traverser malgré les périls qu'elles présentent. Nous devrions créer un réseau de points d'étape bien gardés pour les caravanes et faire tout notre possible pour protéger tout marchand dans notre royaume. De cette façon, nous pouvons encourager le commerce de transit à croître et attirer davantage de richesses dans notre royaume."
 sis_chronicles_of_sistan:0 "Chroniques du Sistan"
 sis_chronicles_of_sistan_desc:0 "À travers les siècles, les dynasties du Sistan ont souvent jugé sage de chronicler leur propre histoire en tant que souverains de la province. C'est une tradition avisée que nous devrions suivre. À la différence d'eux, cependant, nous ferions bien de d'abord compiler toutes les anciennes histoires du Sistan afin de créer une nouvelle grande œuvre sur l'histoire de ce royaume depuis les temps anciens jusqu'à aujourd'hui."
 sis_scholars_of_sistan:0 "Érudits du Sistan"
 sis_scholars_of_sistan_desc:0 "Le Sistan fut jadis un centre de culture, de religion et d'érudition. Nous devrions de nouveau aspirer à ces qualités. En invitant des érudits, en fondant des écoles, des mosquées et des œuvres de charité, nous pouvons restaurer la réputation de ce qui fut autrefois, au bénéfice général de notre peuple et de notre gouvernement."
 caspian_ideas:0 "Idées Caspiennes"
 caspian_ideas_start:0 "Traditions Caspiennes"
 caspian_ideas_bonus:0 "Ambition Caspienne"
 caspian_riches_of_tabarestan:0 "Les Richesses du Tabarestan"
 caspian_riches_of_tabarestan_desc:0 "Entouré de montagnes de tous côtés, le Tabarestan longe tout le littoral caspien. C'est une région douce et humide, idéale pour la riziculture, avec certaines des plus anciennes cités de la région iranienne. En temps de guerre et de bouleversements, le Tabarestan est aussi souvent laissé en paix grâce à sa position protégée, et possède donc une population importante par rapport à sa taille. Cette paix relative et ces établissements anciens ont également fait de tous les pays du Tabarestan des étapes importantes sur la Route de la Soie, nous permettant de bénéficier des riches réseaux commerciaux transasiatiques."
 caspian_time_of_turmoil:0 "Une Époque de Troubles"
 caspian_time_of_turmoil_desc:0 "Tout autour de nous, de grands royaumes s'effondrent. Nous avons vu des princes timourides se battre pour les vestiges détruits de leur héritage ancestral, tandis que des tribus turques combattent dans les montagnes d'Azerbaïdjan. Le millénarisme s'empare des peuples dans toute la Perse et beaucoup prennent les armes contre leurs anciens souverains. Si nous voulons survivre en une telle époque de troubles, nous devons former une armée solide qui nous soit propre, composée des soldats locaux qui depuis des générations ont vu les conquérants étrangers aller et venir. Il est temps que nous ne pensions plus seulement à nous défendre, mais à frapper ceux qui sinon nous dévoreront certainement."
 caspian_silk:0 "Soie Caspienne"
 caspian_silk_desc:0 "Le littoral caspien est une terre de forêts, de zones humides et de rizières, mais surtout c'est une terre de plantations de vers à soie et de mûriers. En tant que patrie de son propre type de mûrier et première région à avoir cultivé les vers à soie en Iran, nous avons maintenant une tradition de production de soie remontant à près d'un millénaire. La soie produite dans nos cités est célèbre non seulement en Iran et au Khorasan ; elle est bien connue dans les cités d'Italie, de France et d'Allemagne, qui cherchent toutes à importer autant de cette denrée rare qu'elles peuvent en obtenir. La seule limite à ce que leurs marchands achètent chez nous est la quantité que nous pouvons produire. Il existe cependant des moyens de rendre l'activité de production de soie encore plus efficace. Développons la production de soie afin de nous enrichir tandis que nos tisserands habillent le monde."
 caspian_sea_trade:0 "Protéger le Commerce Caspien"
 caspian_sea_trade_desc:0 "Un nombre croissant de navires hostiles met en péril notre commerce maritime en mer Caspienne. Qu'il s'agisse de pays étrangers ou de pirates, nous ne pouvons jamais tolérer que d'autres s'en prennent au commerce qui fait vivre notre pays. Bien qu'une marine complète ne soit peut-être pas possible en mer Caspienne, nous devons être prêts à construire un certain nombre de navires pour patrouiller cette grande mer intérieure à tout prix, même si cela signifie faire venir des constructeurs navals de pays fort lointains."
 caspian_unite_minor_states:0 "Unir les États du Tabarestan"
 caspian_unite_minor_states_desc:0 "Il existe de nombreux pays qui ont fait de cette région leur foyer ; même au sein de nos frontières, il y a un certain nombre de souverains locaux de dynasties anciennes qui jouissent d'un haut degré d'autonomie. Nous ne pouvons permettre que cela continue plus longtemps ; nous devons réduire les châteaux de ces princes locaux et mettre des gens de confiance à la tête de l'administration des terres."
 caspian_safe_haven:0 "Un Havre de Paix"
 caspian_safe_haven_desc:0 "Cette région a souvent été un refuge pour des gens de différentes cultures et religions. Cheikhs, seigneurs de guerre ou marchands peuvent tous y trouver leur place. C'est peut-être pour cette raison que le Tabarestan a acquis une population si hétérogène. Parmi les petits États de la côte tabarestane vivent aussi bien des sunnites et des zoroastriens que des chiites nizârites, zaïdites et ja'farites. Cela est à bien des égards grâce à la protection des montagnes qui nous entourent.\nLa meilleure façon d'œuvrer pour la paix, cependant, est de se préparer à la guerre. Nous devons construire de solides forteresses pour garder les cols qui traversent les montagnes qui nous protègent, et maintenir de fortes garnisons à portée de main pour protéger la liberté dont nous jouissons."
 caspian_promote_foreign_trade:0 "Promouvoir le Commerce Étranger"
 caspian_promote_foreign_trade_desc:0 "En tant qu'étape sur la Route de la Soie, notre pays a longtemps prospéré grâce au commerce, et les marchands d'Arménie, d'Inde, de Russie ou d'autres contrées lointaines sont un spectacle fréquent dans nos cités. Nous ferions bien de faciliter davantage le commerce en construisant plus de caravansérails et en invitant les nombreux marchands qui traversent encore cette région à s'installer et à faire leur vie dans nos cités."
 RUM_ideas:0 "Idées de Roum"
 RUM_ideas_start:0 "Traditions de Roum"
 RUM_ideas_bonus:0 "Ambition de Roum"
 rum_abul_fath:0 "Abou al-Fath"
 rum_abul_fath_desc:0 "Nous avons des ennemis dans toutes les directions, rendant une armée puissante une nécessité pour un État tel que le nôtre. Fort heureusement, nous ne sommes pas un peuple faible. Des irréguliers gazis et des pillards akindjis aux sipahis de l'Empire ottoman, le monde a appris à connaître la puissance militaire du peuple turc. Bâtissons une armée digne d'un empire, en nous inspirant de partout où la compétence militaire peut être trouvée tout en puisant dans les forces et les expériences de ceux qui nous ont précédés."
 rum_king_of_the_east_and_west:0 "Sultan al-Charq wa al-Gharb"
 rum_king_of_the_east_and_west_desc:0 "Depuis la chute de Roum, le peuple turc a été divisé, servant de petits beys du Bosphore aux montagnes du Kurdistan. C'était notre devoir de restaurer l'héritage des sultans seldjoukides de Roum et d'unir les Turcs anatoliens. Notre ambition, cependant, doit être bien plus haute que cela. Les Turcs seldjoukides régnèrent jadis sur l'un des plus grands empires connus de l'homme ; il est évident pour quiconque contemple notre empire que la restauration de cet État est désormais notre destinée, de même que la reconquête des terres romaines jadis gouvernées depuis ce qui est maintenant notre cœur."
 rum_shahanshah:0 "Chah-en-Chah"
 rum_shahanshah_desc:0 "Roum n'était pas seulement un État anatolien mais aussi un État qui honorait fortement les traditions persanes de royauté, particulièrement alors que la Perse elle-même tombait aux mains des conquérants mongols. Sous les sultans qui nous ont précédés, la culture persane s'est épanouie et les poètes et érudits persans ont trouvé leur mécénat. Des hommes tels que Najm al-Din Razi, Qane'i Tusi, Baha' al-Din Walad et Rumi lui-même firent leur foyer sous la protection de Roum, et les sultans eux-mêmes étaient versés dans la littérature et la poésie persanes.\nNous devons chérir notre héritage persan autant que notre héritage turc et aspirer à faire de notre patrie un parangon de la culture persane, la première des nations islamiques."
 rum_sultan_of_rum:0 "Sultan de Roum"
 rum_sultan_of_rum_desc:0 "Les sultans de Roum régnaient sur les peuples d'Anatolie, musulmans et chrétiens. C'est sous leur règne que l'islam devint la religion dominante dans la région, mais leurs politiques acceptaient tous les sujets, invitant souvent même des chrétiens des terres voisines à rechercher le domaine de Roum. Nous ferions bien d'apprendre de leur exemple."
 rum_sulan_al_bahrayn:0 "Sultan al-Bahrayn"
 rum_sulan_al_bahrayn_desc:0 "Comme les sultans de Roum du passé, nous devons établir une marine forte et durable capable de résister tant aux pirates chrétiens qu'aux flottes d'autres musulmans. La capacité de contrôler et de s'étendre sur la Méditerranée et de protéger nos côtes sera l'un des principaux défis de notre empire."
 rum_sultan_al_muazzam:0 "Al-Sultan al-Muazzam"
 rum_sultan_al_muazzam_desc:0 "Les plus grands des sultans requièrent des monuments et des édifices grandioses. Faisons des terres de Roum l'envie du monde islamique, avec des mosquées, des madrasas, des caravansérails, des jardins, des canaux et des palais sans pareils. Par le mécénat architectural, nous pouvons créer un héritage durable et unique pour notre dynastie."
 rum_protector_of_dar_al_islam:0 "Protecteur du Dar al-Islam"
 rum_protector_of_dar_al_islam_desc:0 "Nos prédécesseurs furent toujours prêts à défendre les justes et à combattre la propagation des sectes hérétiques. Nous aussi devons faire tout notre possible pour promouvoir les formes pures du culte religieux et limiter l'influence des souverains hérétiques qui tenteraient autrement de séduire et d'égarer les fidèles."
 ARL_ideas:0 "Idées d'Ardabil"
 ARL_ideas_start:0 "Traditions d'Ardabil"
 ARL_ideas_bonus:0 "Ambition d'Ardabil"
 arl_safavid_order:0 "L'Ordre Safavide"
 arl_safavid_order_desc:0 "Ardabil est le lieu où Safi al-din Ardabili vécut et œuvra. Son sanctuaire continue d'être le centre politique et militaire de la Safaviyya ou Ordre safavide, un puissant ordre mystique toujours dirigé par ses successeurs. Les Safavides exercent une forte influence sur toute la politique tant à Ardabil que dans les pays environnants, et tant que nous travaillerons étroitement avec eux, leur ferveur religieuse nous permettra de vaincre des ennemis bien supérieurs en nombre."
 arl_qizilbash:0 "Les Qizilbash"
 arl_qizilbash_desc:0 "Qu'ils professent être chiites ou non, l'islam mystique et le soutien à Ali sont répandus parmi les tribus turkmènes d'Iran, d'Anatolie et du Caucase. Les Safavides ont rapidement gagné un fort soutien parmi ces groupes et beaucoup affluent désormais sous leurs bannières. Se nommant eux-mêmes « Qizilbash » ou « Têtes Rouges », d'après leurs chapeaux rouges caractéristiques, ils pourraient être le noyau d'une nouvelle armée, prête à combattre et à mourir pour le chef des Safavides."
 arl_shiite_leadership:0 "Chef de tous les Chiites"
 arl_shiite_leadership_desc:0 "Des sectes millénaristes ont commencé à surgir partout dans les terres iraniennes, mais nous savons que nos cheikhs sont les seuls souverains chiites légitimes au monde. Nous devons répandre la parole des cheikhs d'Ardabil et forcer tout maître chiite sur le territoire sous notre contrôle à accepter qu'ils ne sont que des délégués de notre autorité messianique."
 arl_conversion_of_the_masses:0 "Conversion des Masses"
 arl_conversion_of_the_masses_desc:0 "Depuis longtemps, cette région a été un mélange hétérodoxe de religions, où l'honneur d'Ali et celui des califes sunnites coexistaient. Nous devons montrer aux égarés la voie juste en définissant clairement ce qu'est un culte approprié, et en agissant pour limiter l'influence sunnite de nos ennemis parmi au moins les classes populaires, en punissant ceux qui ne se conforment pas si nécessaire."
 arl_religious_war:0 "Guerre Sainte"
 arl_religious_war_desc:1 "Les ennemis de notre État sont nombreux, mais nous avons aussi le soutien de chiites, d'alévis et d'ordres soufis bien au-delà de nos frontières. Travaillons ensemble avec ces éléments afin qu'aucun empire sunnite ne puisse se sentir trop en sécurité face aux armées des fidèles."
 arl_amili_mujtahids:0 "Mujtahids Amilis"
 arl_amili_mujtahids_desc:0 "Les chiites ont toujours été une minorité dans le monde musulman et, hormis le califat fatimide il y a des siècles, il n'y a pas eu de gouvernements chiites majeurs. Cela signifie que contrairement aux nombreuses dynasties sunnites qui ont régné sur cette région avant nous, nous ne disposons pas d'un cadre juridique et institutionnel complet sur lequel nous appuyer. Pour que notre État grandissant prospère, nous devons faire tout notre possible pour créer nos propres institutions durables pour le droit et l'administration chiites.\nInvitons des érudits religieux chiites étrangers, tels que les Amilis du Levant, pour nous aider à façonner un cadre durable pour notre État."
 arl_shahs_of_iran:0 "Chahs d'Iran"
 arl_shahs_of_iran_desc:0 "Ce qui commença comme une secte religieuse à Ardabil est maintenant prêt à revendiquer la suzeraineté sur toutes les terres iraniennes. Le temps est venu de prendre notre place légitime parmi les grandes nations de ce monde, et les empires perses qui nous ont précédés."
 geo_legacy_of_saint_nino:0 "Héritage de Sainte Nino"
 geo_legacy_of_saint_nino_desc:0 "La Géorgie possède l'une des plus anciennes églises chrétiennes au monde, dont les racines remontent à la christianisation de la région par Sainte Nino, il y a plus d'un millénaire. À travers les siècles, l'Église géorgienne a servi de force unificatrice de plus en plus importante dans tous les États géorgiens jusqu'à l'unification du pays sous la dynastie Bagrationi. Depuis lors, l'Église a servi d'élément central de la culture géorgienne, face à l'influence byzantine ainsi que mongole ou musulmane. Avec peu d'autres royaumes chrétiens restants dans cette région et avec les loyautés fragmentées au sein de la Géorgie aujourd'hui, l'Église a encore un rôle important à jouer en tant que force unificatrice contre les étrangers."
 geo_dasturlamali:0 "Dasturlamali"
 geo_dasturlamali_desc:0 "La Géorgie a traversé une période tumultueuse au cours des derniers siècles depuis l'invasion mongole. Parfois divisée et avec une influence croissante de la noblesse locale, et sous des pressions extérieures changeantes, l'ancien système féodal géorgien a été de facto rendu obsolète à certains égards, ou du moins partiellement abandonné. Il est temps de créer ordre et régulation parmi la noblesse et le peuple géorgiens. Nous devrions créer une nouvelle œuvre de règles, de directives et de règlements, détaillant les obligations des sujets et des nobles envers le roi et l'État. Une base juridique solide pour les organes de notre royaume est la seule voie à suivre."
 SME_ideas:0 "Idées du Samtskhe"
 SME_ideas_bonus:0 "Ambition du Samtskhe"
 SME_ideas_start:0 "Traditions du Samtskhe"
 sme_atabegs_of_samtskhe:0 "Atabegs du Samtskhe"
 sme_atabegs_of_samtskhe_desc:0 "Le Samtskhe est à bien des égards une terre frontalière culturelle et religieuse, là même où le christianisme et l'islam se rencontrent dans le Caucase, et où Turcs, Arméniens, Mongols, Grecs et Turkmènes se mêlent et vivent côte à côte. Cela a été la source de nombreux conflits dans notre passé, mais cela a aussi rendu notre État différent des autres parties de la Géorgie. Le fait que nos souverains utilisent le titre turc d'Atabeg n'est qu'un signe de notre différence avec les autres parties de la Géorgie."
 sme_proactive_diplomacy:0 "Diplomatie Proactive"
 sme_proactive_diplomacy_desc:0 "Bien que faisant partie de la Géorgie, le Samtskhe a été largement indépendant pendant des siècles. Cela a exigé une conscience constante de la politique en Géorgie ainsi qu'une diplomatie très active avec les grands empires que nous avons côtoyés. Des Mongols et Ilkhans à Tamerlan, nos souverains se sont toujours assurés d'avoir un canal direct avec ceux qui détiennent le plus de pouvoir. De même, nous avons, quand nécessaire, joué un rôle actif dans la politique intérieure du royaume de Géorgie, tant en nous mêlant des luttes de succession qu'en nous alliant à la dynastie royale, quand cela nous convenait. Nous ferions bien de maintenir cette tradition, car l'avenir de notre petit État en dépend. Qu'il ne soit jamais dit que nous avons trop peu fait ou agi sans renseignements suffisants."
 sme_fortresses_of_samtskhe:0 "Forteresses du Samtskhe"
 sme_fortresses_of_samtskhe_desc:0 "Notre pays est une zone frontalière montagneuse qui a servi de rempart contre les envahisseurs étrangers de la Géorgie à maintes reprises. C'est pourquoi nous avons appris à construire de solides forteresses et à être prêts pour une guerre défensive prolongée. Cet héritage est quelque chose que nous devons nous efforcer de maintenir à tout prix ; les forteresses du Samtskhe doivent être bien entretenues, garnies et approvisionnées, car les envahisseurs étrangers ne sont pas une possibilité mais une certitude."
 sme_independent_ambitions:0 "Ambitions d'Indépendance"
 sme_independent_ambitions_desc:0 "Qu'ils soient musulmans ou chrétiens, géorgiens, turcs ou iraniens, le Samtskhe a souvent dû s'incliner devant des rois et sultans étrangers. Afin de créer un État et une économie durables, nous devons bâtir nos propres institutions, qui perdureront quel que soit celui qui convoite nos terres pour l'instant. Émettons notre propre monnaie et nos propres lois, et patronnons nos propres théologiens et écrivains."
 sme_protect_trade_routes:0 "Protéger les Routes Commerciales"
 sme_protect_trade_routes_desc:0 "Notre position au carrefour de la Géorgie, de l'Anatolie, de l'Arménie et de l'Azerbaïdjan signifie également qu'un grand nombre de marchands cherchent à traverser nos terres. Les raids constants des tribus nomades, cependant, font que beaucoup doutent maintenant de la sécurité de nos routes. Nous devons défendre correctement toutes les routes et auberges de marchands sur nos terres, en veillant à ce que le commerce puisse affluer dans notre État sans entrave."
 sme_frontier_warriors:0 "Guerriers des Marches"
 sme_frontier_warriors_desc:0 "Le Caucase a depuis longtemps été façonné par des empereurs nomades, et les pâturages du Samtskhe ont attiré de nombreux membres de tribus à s'installer sur nos terres. Nous ne devons pas laisser cela compromettre la stabilité de notre royaume, mais plutôt conclure des accords avec les tribus afin qu'elles puissent participer à nos ambitions militaires."
 sme_sacred_land:0 "Une Terre Sacrée"
 sme_sacred_land_desc:0 "Les terres du Samtskhe abritent des lieux à la fois sacrés et vénérés parmi le peuple géorgien. Le monastère troglodytique de Vardzia, l'antique église d'Atskouri avec son icône miraculeuse de la Vierge Marie, le monastère d'Antcha avec son icône Anchiskhati, comptent parmi les lieux saints les plus significatifs dont nous avons la garde. En protégeant et en administrant l'Église du Samtskhe, séparée de celle de Géorgie, nous nous assurons que notre peuple reste uni même face à l'adversité."
 SRV_ideas:0 "Idées du Shirvan"
 SRV_ideas_start:0 "Traditions du Shirvan"
 SRV_ideas_bonus:0 "Ambition du Shirvan"
 srv_khalwati_order:0 "L'Ordre Khalwati"
 srv_khalwati_order_desc:0 "Le dirigeant de la confrérie soufie Khalwati à Bakou, Sayyid Yahya Bakuvi, est de loin le maître le plus influent de l'ordre. Ce chef charismatique a fait passer l'ordre d'un petit mouvement à des milliers de membres. L'influence de Yahya Bakuvi et de ses disciples est grande sur notre État, et leur foi est liée à la nôtre."
 srv_fortresses_of_shirvan:0 "Forteresses du Shirvan"
 srv_fortresses_of_shirvan_desc:0 "Le Shirvan a maintenu son existence pendant des siècles grâce à l'utilisation rigoureuse de fortifications, de murailles et de châteaux. Les empereurs vont et viennent, mais les châteaux et forts de nos montagnes nous gardent en sécurité dans la victoire comme dans la défaite."
 srv_tribesmen_of_the_caucasus:0 "Tribus du Caucase"
 srv_tribesmen_of_the_caucasus_desc:0 "Notre peuple possède une longue et fière tradition martiale, ayant combattu Mongols, Timourides, Qizilbash et Tatars. En apprenant de ces expériences et en absorbant leurs meilleures qualités, nos armées sont devenues encore plus fortes. Pour faire avancer nos propres ambitions en ces temps de troubles, nous devons nous efforcer d'être encore plus forts que les États qui voudraient nous soumettre."
 srv_persianate_patronage:0 "Mécénat Persan"
 srv_persianate_patronage_desc:0 "Les Shirvanshah furent pendant des siècles célèbres pour leur mécénat de la haute culture, des arts et de la poésie persans. La région iranienne a depuis été entièrement transformée par des empereurs tels que Tamerlan ou Djahan Shah, pourtant la langue et la culture persanes restent ce qui lie cette région. Invitons poètes, érudits et écrivains de tout le monde persan à notre capitale, et rétablissons la renommée de la cour du Shirvan."
 srv_caspian_trade:0 "Commerce Caspien"
 srv_caspian_trade_desc:0 "Des marchandises coûteuses d'Italie comme du Bengale trouvent facilement leur chemin vers nos ports caspiens, car la mer Caspienne est un point de transit majeur pour le commerce à longue distance via Bakou, Astrakhan et les cités du Tabarestan. Nous devons veiller à ce que ces marchands aient tout ce dont ils ont besoin, tant en termes de sécurité que de confort, et soutenir notre propre communauté marchande afin de continuer à puiser dans la richesse du monde."
 srv_shirvani_architecture:0 "Architecture Shirvanaise"
 srv_shirvani_architecture_desc:0 "Depuis le règne d'Ibrahim Ier, nos souverains se sont lancés dans l'utilisation de notre richesse pour construire de grandes œuvres architecturales. Les mosquées, mausolées, palais, hammams, pavillons et monuments de notre dynastie montreront au monde la grandeur des Shirvanshah."
 srv_merchants_of_baku:0 "Marchands de Bakou"
 srv_merchants_of_baku_desc:0 "La cosmopolite Bakou, sur les rives de la mer Caspienne, a toujours attiré des marchands de loin. Comme c'est courant dans le Caucase et en Iran, beaucoup de ces marchands sont arméniens, mais il y a aussi un grand groupe d'Indiens qui viennent commercer et visiter le temple du feu d'Ateshgah, où sept feux brûlent du sol sans fin. Afin d'inciter ces marchands étrangers à s'installer sur nos terres, nous devrions les encourager à patronner et agrandir ce temple et ses puits de pétrole."
 ALH_ideas:0 "Idées d'Al-Hassa"
 ALH_ideas_start:0 "Traditions d'Al-Hassa"
 ALH_ideas_bonus:0 "Ambition d'Al-Hassa"
 alh_desert_warfare:0 "Guerre du Désert"
 alh_desert_warfare_desc:0 "Notre peuple est venu du désert pour légitimement prendre le contrôle d'al-Hassa aux faibles Jarwanides et aux cupides marchands d'Ormuz. Pourtant d'autres tribus du désert, telles que les Dawasir, convoitent maintenant ce qui est nôtre. S'il est important que nous embrassions la nouvelle nature maritime de notre État, nous ne devons jamais oublier notre passé bédouin, ou d'autres tribus du désert pourraient nous déplacer aussi rapidement que nous avons arraché ce prix à nos prédécesseurs."
 alh_lord_of_the_eastern_bedouin:0 "Seigneur des Bédouins de l'Est"
 alh_lord_of_the_eastern_bedouin_desc:0 "Nous avons parcouru un long chemin depuis que nous avons pris le contrôle d'Al-Hassa et de Hofuf. Nous ne devons cependant jamais oublier que cet honneur ne nous appartient pas seuls. En tant que seigneur de l'Est, c'est notre devoir d'effectuer de fréquents pèlerinages aux villes saintes, apportant la richesse sous notre contrôle aux Chérifs afin que tous puissent voir que les justes contrôlent désormais Al-Hassa."
 alh_pearls_of_the_persian_gulf:0 "Perles du Golfe Persique"
 alh_pearls_of_the_persian_gulf_desc:0 "Les cités portuaires sous notre contrôle sont les principaux ports de pêche aux perles de l'océan Arabique, et très probablement du monde entier. La richesse que cela nous apporte est ce qui attira jadis les capitaines d'Ormuz sur cette côte, et sans elle il n'est pas certain que notre État existerait du tout. Nous devons à tout prix protéger et patronner les industries de la pêche aux perles, car sans elles le flux constant d'argent et de soie de l'est se tarirait instantanément."
 alh_fortify_the_coastline:0 "Fortifier le Littoral"
 alh_fortify_the_coastline_desc:0 "Les cités marchandes d'Arabie orientale sont celles où nous gagnons notre subsistance. Les cités elles-mêmes, cependant, sont vulnérables. Des navires étrangers pourraient facilement fondre sur le littoral et prendre nos marchands en otage. C'est ainsi que jadis les Ormuzis en vinrent à contrôler notre pays, et c'est ainsi que Turcs et Portugais menacent de le faire à l'avenir.\nNous ferions bien de construire de solides fortifications de pierre dans nos principaux ports, afin de protéger la richesse de nos marchands."
 alh_entrepot_of_india:0 "Entrepôt de l'Inde"
 alh_entrepot_of_india_desc:0 "Si la pêche aux perles a rendu nos ports célèbres, c'est peut-être le commerce des chevaux qui amène le plus de navires d'Inde sur nos côtes. Les chevaux arabes sont très demandés dans toute l'Asie du Sud et l'Iran, et les ports d'Al-Hassa sont la principale source pour le commerce maritime de cette denrée. Les tribus du désert nous apportent un approvisionnement constant de fins chevaux de guerre que nous envoyons ensuite sur les meilleurs champs de bataille de l'Inde."
 alh_a_modern_navy:0 "Une Marine Moderne"
 alh_a_modern_navy_desc:0 "Un nombre croissant de navires chrétiens ont été aperçus dans le golfe Persique dernièrement, menaçant nos navires et nos ports. Pour combattre ce nouvel ennemi, cependant, nous aurons besoin de construire une marine nouvelle et moderne. Apprenons de ceux qui ont déjà combattu les chrétiens sur mer et invitons des constructeurs navals et des marins turcs à s'installer dans notre pays."
 alh_legacy_of_rahmah_ibn_jabir:0 "Héritage de Rahmah ibn Jabir"
 alh_legacy_of_rahmah_ibn_jabir_desc:0 "Pour un pays tel que le nôtre, prendre le commandement des voies maritimes est d'une importance vitale. Nous ne devons pas hésiter à employer les loups de mer et les pirates, car ils ont une expérience et des compétences bien au-delà de la plupart des capitaines, et connaissent nos eaux mieux que quiconque."
 HDR_ideas:0 "Idées du Hadramaout"
 HDR_ideas_start:0 "Traditions du Hadramaout"
 HDR_ideas_bonus:0 "Ambition du Hadramaout"
 hdr_death_has_come:0 "La Mort Est Venue"
 hdr_death_has_come_desc:0 "Bien que le nom soit ancien et enveloppé de légende, beaucoup prétendent que le nom Hadramaout signifie « la Mort est venue ». Étant donné la nature hostile de ce paysage, ce serait au moins approprié. Montagnes, déserts et étendues extrêmement arides composent la majeure partie du Hadramaout, et son peuple est habitué à défendre ce qu'il possède par tous les moyens. Sans le littoral plus accueillant, il serait difficile d'imaginer une terre plus rude, et plus difficile à soumettre."
 hdr_tribes_of_hadramut:0 "Tribus du Hadramaout"
 hdr_tribes_of_hadramut_desc:0 "Les tribus Kathiri du Hadramaout ne sont cependant pas unies, et la terre risque d'être fracturée et faible la prochaine fois qu'un étranger souhaite franchir nos frontières. Faisons venir des renforts des profonds déserts pour aider à régler ce conflit tribal une fois pour toutes. La tribu Yafii a déjà commencé à migrer dans la région et constituerait une force solide et loyale."
 hdr_hawtas:0 "Hawtas"
 hdr_hawtas_desc:0 "Notre histoire est celle d'une guerre et d'une hostilité constantes, mais aucune société ne peut perdurer sans paix. C'est pour cette raison que nos ancêtres ont commencé la coutume de délimiter des hawtas, des zones entièrement dépourvues de violence, respectées par toutes les tribus et autorités."
 hdr_encouraging_the_incense_trade:0 "Encourager le Commerce de l'Encens"
 hdr_encouraging_the_incense_trade_desc:0 "Bien que peut-être moins lucrative que par le passé, la production et l'exportation d'encens reste la principale source de revenus pour notre peuple. Les ports de Shihr et Mukalla servaient jadis de principaux ports pour l'exportation de cette denrée, non seulement de nos terres mais aussi du Dhofar et de Qishn voisins. Développons nos ports et encourageons le commerce de l'encens afin de pouvoir à nouveau aspirer à être le principal exportateur d'encens au monde."
 hdr_sailors_of_the_indian_ocean:0 "Marins de l'Océan Indien"
 hdr_sailors_of_the_indian_ocean_desc:0 "Les Hadramis ne sont pas seulement d'excellents guerriers des déserts mais possèdent aussi une longue tradition de navigation hauturière. Certains rejoignent les équipages des nombreux navires étrangers qui fréquentent nos ports, tandis que d'autres construisent leurs propres boutres et partent commercer et s'établir loin de chez eux. L'avenir de notre État repose sur ce commerce maritime, et nous devons encourager les capitaines et marins locaux pour le bien de notre nation."
 hdr_hadramhi_diaspora:0 "Diaspora Hadramie"
 hdr_hadramhi_diaspora_desc:0 "À l'exception du littoral, le Hadramaout est une terre chaude et sèche, avec peu de précipitations et de très mauvaises possibilités pour toute forme d'agriculture. Il n'est pas étonnant que le peuple hadrami ait depuis des générations cherché fortune de l'autre côté de la mer d'Arabie. Il existe des communautés hadramies en Inde, en Indonésie, au Hedjaz et le long de la côte est-africaine. Beaucoup finissent par rentrer chez eux, apportant avec eux l'expérience et les compétences acquises dans des terres lointaines à notre État."
 hdr_distant_diplomacy:0 "Diplomatie Lointaine"
 hdr_distant_diplomacy_desc:0 "Il y a de nombreuses puissances navales intéressées par des ports amis en mer d'Arabie, même si elles préféreraient ne détenir aucune terre ici. Cherchons des alliances avec les grandes puissances de l'est et de l'ouest, des pays aux ambitions navales cherchant un État ami parmi les nombreux sultanats maritimes de l'orient."
 HSN_ideas:0 "Idées Ayyoubides"
 HSN_ideas_start:0 "Traditions Ayyoubides"
 HSN_ideas_bonus:0 "Ambition Ayyoubide"
 hsn_citadels_and_fortesses:0 "Citadelles et Forteresses"
 hsn_citadels_and_fortesses_desc:0 "Loin d'être une métropole animée, la forteresse rocheuse de Hisn Kayfa est un antique bastion dans les montagnes kurdes. Des forteresses taillées dans le roc comme celle-ci ont servi les tribus kurdes depuis des générations, et nous ferions bien d'apprendre de leurs expériences. La valeur d'un château bien entretenu ne saurait être surestimée ; cela est aussi vrai sur les rives du Tigre que dans la grande cité du Caire ou les collines de Palestine."
 hsn_ayyubid_heritage:0 "Héritage Ancestral"
 hsn_ayyubid_heritage_desc:0 "Nos ancêtres régnèrent jadis sur un grand empire, s'étendant sur toute la Syrie, la Haute-Mésopotamie, l'Égypte et le Hedjaz. Bien qu'il ne reste plus grand-chose de cet empire, notre nom commande encore le respect parmi les tribus kurdes que nous gouvernons à présent. Si nous pouvons rallier ces guerriers à notre cause, nous pourrions encore nous efforcer de reconstruire ce qui nous fut pris par des esclaves traîtres."
 hsn_righteousness_of_the_faith:0 "Droiture de la Foi"
 hsn_righteousness_of_the_faith_desc:0 "Notre grand ancêtre, Salah ad-Din, éleva notre famille à la grandeur par son refus absolu de tout compromis avec la droiture de sa foi. Il renversa les califes fatimides et leur État chiite, et il vainquit les croisés chrétiens au Levant.\nNotre époque est à nouveau une période de troubles religieux avec le chiisme en essor. Nous devons reprendre le manteau du grand conquérant et être une force pour les justes au Moyen-Orient."
 hsn_elite_warriors:0 "Guerriers d'Élite"
 hsn_elite_warriors_desc:0 "Les armées de cavalerie turques dominent les champs de bataille du Moyen-Orient, qu'il s'agisse des mamelouks hautement entraînés, des sectaires chiites Qizilbash ou de la cavalerie sipahi des Turcs anatoliens. Recrutons nous aussi parmi les masses de guerriers nomades qui parcourent ces terres, et affrontons nos ennemis à armes égales."
 hsn_rise_of_the_eagle:0 "L'Essor de l'Aigle"
 hsn_rise_of_the_eagle_desc:0 "Le temps est venu de reprendre ce qui fut jadis perdu par nos ancêtres. Agissons maintenant pour reprendre l'empire qui fut autrefois le nôtre, et pour créer un solide bastion sunnite contre les infidèles, les chiites et les traîtres au Moyen-Orient."
 hsn_strenghten_central_authority:0 "Renforcer l'Autorité Centrale"
 hsn_strenghten_central_authority_desc:0 "Il était jadis dans les usages de notre famille de partager les fruits de notre succès entre nos proches. Cependant, cette politique a aussi affaibli le sultanat de bien des manières, semant des graines de discorde parmi nous. Cette fois, nous suivrons plutôt d'autres administrations impériales de cette région, et créerons une autorité centrale forte pour superviser toutes les concessions de terres."
 hsn_state_economics:0 "Économie d'État"
 hsn_state_economics_desc:0 "Nos ancêtres comprirent que pour qu'un empire prospère, ses souverains doivent être capables de maintenir la paix et de garantir la protection de leurs sujets. Certaines parties de l'économie sont alors mieux laissées aux citoyens privés, tandis que d'autres pourraient être avantageusement contrôlées par nos ministres. Le commerce, l'industrie et le négoce permettront à notre empire de s'épanouir."
 KTB_ideas:0 "Idées Kitabatake"
 KTB_ideas_start:0 "Traditions Kitabatake"
 KTB_ideas_bonus:0 "Ambition Kitabatake"
 ktb_unification_of_ise:0 "Unification d'Ise"
 ktb_unification_of_ise_desc:0 "Du riche sud au nord densément peuplé et urbanisé, nous avons réussi à étendre notre contrôle sur l'ensemble de la province d'Ise. Cela nous permettra d'utiliser le plein potentiel des ressources de la province pour la croissance future de l'influence de notre clan."
 ktb_blessing_of_amaterasu:0 "Bénédiction d'Amaterasu"
 ktb_blessing_of_amaterasu_desc:0 "En tant que gardiens du plus saint des sanctuaires du Japon à Ise, nous sommes bénis par la déesse du soleil et de l'univers. Nous devons nous montrer dignes de la tâche de maintenir et de prendre soin de ce trésor national. Cela nous vaudra le respect du peuple japonais."
 ktb_southern_court:0 "Partisans de l'Empereur"
 ktb_southern_court_desc:0 "Bien que la branche impériale ait perdu son influence politique, nous sommes toujours connus comme d'ardents partisans de la Cour du Sud. Cette réputation de service loyal au monarque lui-même montrera au monde que nous sommes plus honorables et dignes de confiance que beaucoup des maisons inférieures qui dominent maintenant le Japon."
 ktb_kuki_suigun:0 "Kuki Suigun"
 ktb_kuki_suigun_desc:0 "À Shima, les Kuki ont maintenu une puissante marine ; nous ferions bien d'intégrer cette force dans la nôtre et de construire sur leurs expériences. En renforçant les vassaux Kuki, nous pourrons dominer les mers du Japon."
 ktb_men_of_quality:0 "Hommes de Qualité"
 ktb_men_of_quality_desc:0 "Peu des anciennes familles aristocratiques survivront en cette ère de daimyos et d'hommes forts autodidactes. En tant que l'une des rares familles fortes d'antan, nous devons nous battre pour les anciens idéaux. Il est temps de montrer au monde que la qualité n'est pas seulement une question d'opportunisme mais aussi de naissance et de traditions."
 ktb_iga_ryu:0 "Iga-Ryu"
 ktb_iga_ryu_desc:0 "La célèbre école de ninjas Iga-Ryu exerce une grande influence dans les terres sous notre contrôle ; nous devrions nous assurer que nos intérêts s'alignent avec les leurs et veiller à intégrer leurs services dans nos plans et ambitions politiques."
 ktb_the_march_of_kitabatake_akiee:0 "La Marche de Kitabatake Akiie"
 ktb_the_march_of_kitabatake_akiee_desc:0 "Notre honorable ancêtre Kitabatake Akiie prouva que par la détermination, même la marche du Tohoku au centre du Japon peut être entreprise en peu de temps. Nous devons apprendre de nos ancêtres et entraîner nos armées à des manœuvres rapides afin de pouvoir nous déplacer rapidement d'un front à l'autre si la situation l'exige."
 MAS_ideas:0 "Idées de Madyas"
 MAS_ideas_start:0 "Traditions de Madyas"
 MAS_ideas_bonus:0 "Ambition de Madyas"
 mas_hinalliwood:0 "Hinilawod"
 mas_hinalliwood_desc:0 "Depuis des temps immémoriaux, notre peuple a maintenu vivante l'épopée de 29 000 vers du Hinilawod. Elle raconte l'histoire des grands aventuriers et dieux de notre peuple et enseigne génération après génération la valeur de la famille, de l'honneur, de la dignité et de la bravoure. De cette façon, notre héritage se transmet même lorsque nous intégrons les coutumes et récits de peuples étrangers aux nôtres."
 mas_legacy_of_panai:0 "Héritage de Panai"
 mas_legacy_of_panai_desc:0 "À l'époque de Srivijaya, notre peuple régnait sur le royaume constitutif de Panai dans la lointaine Sumatra. Pendant des siècles, ils luttèrent pour garder les eaux de Srivijaya libres de navires hostiles et de pirates. Finalement, quand l'empire tomba aux mains d'envahisseurs étrangers, nos ancêtres refusèrent de courber la tête devant ces nouveaux maîtres et migrèrent plutôt vers les îles que nous occupons maintenant. Les traditions de notre peuple font encore de nous d'excellents marins et de farouches guerriers indépendants."
 mas_articles_of_the_confederation:0 "Articles de la Confédération"
 mas_articles_of_the_confederation_desc:0 "Notre État, le Madyas, est une confédération de trois territoires souverains gouvernés par le conseil Datu Paiburong, avec le rôle de commandant en chef choisi par élection parmi eux. De cette façon, nous avons toujours un chef pour notre défense commune et nous pouvons maintenir le centre politique pertinent pour la politique de notre peuple."
 mas_masters_of_maritime_warfare:0 "Maîtres de la Guerre Maritime"
 mas_masters_of_maritime_warfare_desc:0 "Notre fort héritage maritime a rendu notre État redouté sur les mers ouvertes. Afin de garder notre commerce à l'abri de ceux qui voudraient voler notre richesse, nous devons exercer une pression constante sur les flottes étrangères, qu'elles soient musulmanes, chinoises ou de l'un des nombreux royaumes indianisés. Certains appelleraient cela de la piraterie, mais c'est leur faute de ne pas avoir correctement protégé les leurs."
 mas_kinaduatan:0 "Kinadatuan"
 mas_kinaduatan_desc:0 "À travers les âges, notre société a maintenu les familles Datu divinement sanctionnées au pouvoir. Dans leur sang coule la mission et le talent pour un gouvernement juste et prospère. La tradition recèle beaucoup de pouvoir. Si nous voulons prospérer, nous devons préserver les droits du Kinadatuan tout en adaptant ces structures sociales au monde et à un empire en développement."
 mas_riches_of_the_visayas:0 "Richesses des Visayas"
 mas_riches_of_the_visayas_desc:0 "Les îles Visayas sont réputées fertiles. Même si toutes n'abritent pas de grandes cités, le riz et la viande produits ici nourrissent des établissements aussi lointains que Manille et Tondo. De telles ressources sont une grande force pour un empire en croissance tel que le nôtre. En fournissant soutien et protection contre les raiders maritimes, nous pouvons favoriser la croissance de tous nos domaines."
 mas_expand_the_shipbuilding_sector:0 "Développer le Secteur de la Construction Navale"
 mas_expand_the_shipbuilding_sector_desc:0 "Pour le commerce, la pêche et la guerre, les navires ont été partie intégrante du peuple Madja-as depuis que ces îles sont peuplées. La connaissance et l'expérience que nous avons en construction navale sont sans égales parmi nos voisins, et tandis que nous modernisons nos marines, nous devrions nous appuyer sur ces traditions. Choisissons des constructeurs navals éminents pour étudier la construction navale dans les nombreux ports où nous accostons et intégrer le meilleur de ce qu'ils ont à offrir dans nos propres projets."
 ODA_ideas:0 "Idées Oda"
 ODA_ideas_start:0 "Traditions Oda"
 ODA_ideas_bonus:0 "Ambition Oda"
 oda_rakuichi_rakuza:0 "Rakuichi et Rakuza"
 oda_rakuichi_rakuza_desc:0 "Partout au Japon, les anciennes guildes Za sont devenues assez influentes pour étouffer de nombreuses formes d'entreprise. Avec leurs armées privées, elles sont aussi un affront à notre autorité directe. Abolissons leurs monopoles et supprimons les péages et les ports ou cités fermés. Les marchés et guildes libres, rakuichi et rakuza, mettront fin à l'influence des Za et permettront à notre commerce de s'épanouir."
 oda_tenka_fubu:0 "Tenka Fubu"
 oda_tenka_fubu_desc:0 "Stabiliser nos propres possessions nous a donné une base solide pour une expansion future dans ce qui ne peut être décrit que comme un royaume chaotique. Faisons de l'unification et de la pacification du Japon la mission de notre clan ; unifier le monde ne peut se faire que par la force des armes."
 oda_generals:0 "Généraux Oda"
 oda_generals_desc:0 "L'obsession de la naissance et du privilège a rendu ce pays faible, et la montée de puissants daimyos autodidactes à travers le royaume a clairement prouvé l'inutilité de telles notions. Tirons-en la leçon et laissons le succès et le talent être le principe directeur pour qui devrait s'élever au commandement de nos armées. Un leadership fort est une nécessité pour une expansion rapide."
 oda_azuchi_castle:0 "Forteresses Influentes"
 oda_azuchi_castle_desc:0 "Le Japon est à bien des égards un pays de châteaux, et partout nous pouvons voir la croissance des Jokamachi, les villes-châteaux. C'est par la construction de châteaux puissants que l'on peut affirmer son influence tant sur le domaine politique que sur les routes vitales pour les campagnes militaires. C'est un enseignement que nous devons prendre à cœur. De la cour impériale à nos propres vassaux, c'est par les châteaux que nous nous assurons qu'ils sont constamment rappelés à notre présence et notre pouvoir. En tout temps, nous devons prioriser la réduction des châteaux ennemis et l'érection des nôtres dans des emplacements stratégiques."
 oda_triple_firing:0 "Tir en Trois Lignes"
 oda_triple_firing_desc:0 "L'avènement des armes à feu a révolutionné, et continuera de révolutionner, la guerre dans l'archipel japonais ; en maîtrisant ces nouvelles armes, nous pouvons dominer n'importe quel champ de bataille. Afin d'augmenter leur cadence de tir, nos mousquetaires formeront des rangs, permettant à l'un de tirer pendant que deux autres rechargent."
 oda_patronization_of_the_west:0 "Patronage de l'Occident"
 oda_patronization_of_the_west_desc:0 "Les missionnaires occidentaux ont apporté de nombreuses idées et techniques dans notre pays et, contrairement aux anciennes associations bouddhistes, ils n'ont pas de liens préexistants avec des propriétaires terriens corrompus ou des cités rebelles. Nous devrions accueillir les Occidentaux dans nos cités et examiner les avantages qu'ils peuvent apporter à notre cour."
 oda_kenchi:0 "Kenchi"
 oda_kenchi_desc:0 "Notre royaume est à bien des égards un patchwork de petits manoirs et fiefs. Un aperçu de leur vraie valeur, et dans beaucoup de cas même de qui possède quelle parcelle de terre, est presque impossible à obtenir. Entreprenons un grand relevé cadastral pour examiner ces terres en détail et créer un nouveau système de taxation et d'obligations qui puisse alors être à la fois efficient et équitable."
 TKG_ideas:0 "Idées Tokugawa"
 TKG_ideas_bonus:0 "Ambition Tokugawa"
 TKG_ideas_start:0 "Traditions Tokugawa"
 tkg_mikawa_bushi:0 "Bushi de Mikawa"
 tkg_mikawa_bushi_desc:0 "Les bushi de Mikawa sont célèbres dans toute la région pour leur bravoure et leur résilience. Même face à une défaite totale, nous pouvons compter sur nos armées pour ne jamais se rendre."
 tkg_strengthen_the_sekisho_network:0 "Renforcer le Réseau des Sekisho"
 tkg_strengthen_the_sekisho_network_desc:0 "Un réseau de barrières à portes, les Sekisho, protège traditionnellement les points importants des provinces, tant contre les attaques que contre l'importation illicite de marchandises interdites. En cette époque chaotique, certains ont choisi de commencer à supprimer ces barrières dans leurs domaines pour favoriser le flux des marchandises et renforcer le commerce. C'est un objectif louable mais qui comporte un risque considérable. Nous devons plutôt renforcer le réseau des Sekisho, pour entraver la contrebande de marchandises, d'armes à feu et de personnes. La sécurité est plus importante que tout gain monétaire."
 tkg_hatamoto:0 "Hatamoto"
 tkg_hatamoto_desc:0 "Des milliers de Hatamoto, les porte-bannières, servent directement sous notre seigneur. Avec des propriétés minuscules qui leur sont propres, leur destin est lié au nôtre et leur loyauté envers notre clan est plus forte que celle de tout vassal opportuniste des autres daimyos japonais."
 tkg_metsuke:0 "Metsuke"
 tkg_metsuke_desc:0 "L'effondrement de l'autorité impériale à travers le Japon a conduit à la montée d'hommes forts locaux dans tout le royaume. Avec les anciennes structures sociales ne garantissant plus l'état de droit, cependant, la corruption s'est aussi répandue dans de nombreuses parties de la société. Afin de restaurer la stabilité, nous devons créer un groupe de fonctionnaires gouvernementaux, les Metsuke, ayant pour devoir de surveiller tous les daimyos de la cour impériale."
 tkg_matsudaira_branches:0 "Branches Matsudaira"
 tkg_matsudaira_branches_desc:0 "Notre clan n'est qu'une branche sur le tronc Matsudaira de nos ancêtres. Tandis que nous nous étendons, nous pouvons compter sur les autres branches Matsudaira pour garnir les forteresses et les provinces stratégiquement importantes directement."
 tkg_toshogu:0 "Toshogu"
 tkg_toshogu_desc:0 "Construisons un sanctuaire pour déifier le fondateur de notre clan. Le Toshogu sera le sanctuaire le plus glorieux de l'histoire japonaise, et sa présence sera un rappel non seulement de notre glorieuse ascendance mais aussi de notre adhésion aux valeurs traditionnelles shinto."
 tkg_famine_policies:0 "Politiques contre la Famine"
 tkg_famine_policies_desc:0 "L'objectif de tout souverain doit être d'enrichir le peuple et de le protéger des désastres et de la famine. En créant un système de réserves alimentaires, de contrôles des prix et de réductions d'impôts temporaires, nous pouvons nous assurer que notre royaume peut faire face à tous les problèmes que l'avenir pourrait nous réserver."
 luzon_ideas:0 "Idées de Luçon"
 luzon_ideas_start:0 "Traditions de Luçon"
 luzon_ideas_bonus:0 "Ambition de Luçon"
 luzon_barangay:0 "État Barangay"
 luzon_barangay_desc:0 "Dispersé dans de petites cités portuaires et sur de nombreuses îles, notre État dépend de la mer pour son existence même. Notre société est construite pour soutenir le commerce à longue distance, et tout, de l'organisation de l'agriculture aux lois et traditions, reflète ce fait."
 luzon_conquest_of_paradise:0 "Conquête du Paradis"
 luzon_conquest_of_paradise_desc:0 "Notre archipel est un paradis pour certains, mais il n'est pas sans dangers. Les forêts tropicales et les maladies tropicales peuvent dissuader les envahisseurs, et parfois la meilleure défense, ce sont nos îles elles-mêmes. Face à une défaite certaine, nous avons traditionnellement employé des tactiques de terre brûlée et laissé la terre combattre les envahisseurs pour nous."
 luzon_sino_philippine_trade:0 "Commerce Sino-Philippine"
 luzon_sino_philippine_trade_desc:0 "Luçon et particulièrement notre position dans le delta de la rivière Pasig nous ont permis de développer des ports prospères pour l'importation de marchandises chinoises dans l'ensemble de l'archipel. Les marchandises chinoises arrivent régulièrement à Tondo où elles peuvent ensuite être redistribuées aux nombreux ports et îles des Philippines."
 luzon_tagalog_syncretism:0 "Syncrétisme Tagalog"
 luzon_tagalog_syncretism_desc:0 "Bien que nous n'ayons jamais cessé d'adorer les dieux de nos ancêtres, nous n'avons jamais vu de raison de rejeter les fois étrangères. Parmi notre peuple, nous honorons les dieux des fois brahmaniques, côte à côte avec le dieu des mahométans et des bouddhistes."
 luzon_sailors:0 "Marins de Luçon"
 luzon_sailors_desc:0 "Tous les marins ne servent pas sur nos propres navires ; certains cherchent un emploi parmi les nombreux États belligérants d'Asie du Sud-Est. Les marins de Luçon peuvent être trouvés sur des navires de guerre de Brunei à Aceh. L'expérience que ces hommes acquièrent à l'étranger est quelque chose dont nous pouvons ensuite tirer profit dans nos propres entreprises maritimes. Encourageons tous nos jeunes hommes à chercher fortune à l'étranger afin qu'ils puissent revenir plus tard, expérimentés et endurcis."
 luzon_a_safe_haven:0 "Un Havre de Paix"
 luzon_a_safe_haven_desc:0 "Notre royaume est assez proche pour profiter d'un flux de marchandises chinoises, japonaises et sud-est asiatiques, mais trop éloigné pour être à leur portée. Cela fait de nous une destination désirable pour beaucoup qui, pour quelque raison que ce soit, souhaitent abandonner leur patrie. Invitons ces gens sur notre terre afin que nous puissions bénéficier de leurs compétences et de leur expertise."
 luzon_expand_the_sugar_production:0 "Développer la Production de Sucre"
 luzon_expand_the_sugar_production_desc:0 "L'une des cultures les plus recherchées dans ces terres est le sucre que nos ancêtres cultivent depuis des siècles. Dans un monde plus interconnecté, cette culture de rente pourrait nous apporter une richesse encore plus grande. Développer la production de sucre, par l'assèchement des terres comme aux dépens d'autres cultures, permettra à notre économie d'atteindre de nouveaux sommets."
 BTU_ideas:0 "Idées de Butuan"
 BTU_ideas_start:0 "Traditions de Butuan"
 BTU_ideas_bonus:0 "Ambition de Butuan"
 btu_indianized_society:0 "Société Indianisée"
 btu_indianized_society_desc:0 "Cela fait maintenant plus de mille ans que notre peuple est entré en contact avec l'hindouisme et les traditions brahmaniques. Depuis lors, nous avons fait de cette religion la nôtre et nous sommes fermement ancrés dans une plus large « indosphère » de pays et de peuples. Certains, comme Srivijaya et Majapahit, ont même formé de grands empires maritimes dans cette région. Butuan reste une partie ferme de cette communauté et un membre du monde indianisé plus large."
 btu_northern_nusantara:0 "Nusantara Septentrional"
 btu_northern_nusantara_desc:0 "C'est une vieille vérité que les mers connectent plutôt qu'elles n'entravent, et nulle part cela n'est plus vrai que dans la région malaise ou indonésienne au sens large. Alors que l'intérieur de la plupart des îles peut être hostile et non colonisé, les côtes sont couvertes d'établissements portuaires connectés dans un réseau de commerce constant. Nous sommes à la limite nord de Nusantara, comme cette région est souvent appelée, et bien que cela nous offre une certaine protection, cela signifie aussi que nous devons agir plus résolument pour attirer les guildes commerciales étrangères et les capitaines marchands. Faisons connaître les richesses de notre île à tous ceux qui voudraient écouter, et assurons-nous que l'ivoire, l'or et les perles de Butuan sont aussi célèbres qu'ils le méritent."
 btu_butuan_trade_connections:0 "Connexions Commerciales de Butuan"
 btu_butuan_trade_connections_desc:0 "S'il est vrai que les marchands étrangers ont cherché nos ports depuis des siècles, nous avons aussi une communauté marchande prospère qui nous est propre. Les marchands de Butuan sont courants dans tout l'archipel malais et certains voyagent aussi loin que la Perse et le Japon. Même en nous promouvant comme entrepôt pour les marchands étrangers, nous devons aussi soutenir nos propres entrepreneurs et capitaines afin de ne jamais avoir à vivre à la merci des guerres et de la politique de terres lointaines."
 btu_butuan_goldwork:0 "Orfèvrerie de Butuan"
 btu_butuan_goldwork_desc:0 "L'orfèvrerie de nos artisans a attiré la renommée dans de nombreuses cours, et le travail de nos artisans peut être trouvé même dans les trésors de la Chine impériale. De nombreux souverains étrangers seraient flattés de posséder de tels objets, et ces ouvrages raffinés pourraient s'avérer un excellent outil pour la diplomatie. Nous devons toujours avoir quelques-uns de ces objets précieux en réserve afin d'impressionner et d'apaiser tout émissaire, sultan ou roi étranger."
 btu_balangay:0 "Balangay"
 btu_balangay_desc:0 "Les navires à voile Balangay ont bien servi notre peuple à travers les âges, nous permettant de nous déplacer rapidement tant en remontant les rivières vers l'intérieur qu'en longeant les côtes des nombreuses îles de notre région. Cela a établi notre peuple non seulement comme d'excellents constructeurs navals, mais leur utilisation courante a aussi fait de la plupart de nos sujets des marins accomplis dès leur plus jeune âge. Tandis que nous étendons notre influence, nous devrions continuer à encourager la construction et la diffusion du Balangay comme moyen de communication constante entre nos établissements."
 btu_protect_the_coastlines:0 "Protéger les Côtes"
 btu_protect_the_coastlines_desc:0 "La richesse attire la jalousie, et les États maritimes concurrents ont toujours essayé de piller nos côtes et d'attaquer nos navires. Nous devons construire une forte puissance navale pour nous opposer aux raids violents des îles du sud, pour protéger notre peuple et pour surpasser leur commerce."
 btu_long_range_diplomacy:0 "Diplomatie à Longue Distance"
 btu_long_range_diplomacy_desc:0 "Les routes commerciales autrefois sûres d'Asie du Sud-Est sont devenues de plus en plus dangereuses au fil des ans. Il y en a beaucoup qui préféreraient piller plutôt que commercer, et maintenant même des puissances lointaines peuvent projeter leur pouvoir dans notre zone immédiate. Nous devons nous adapter à ce monde changeant en trouvant des amis et des alliés dans des endroits éloignés, ou périr aux mains des nouveaux et anciens ennemis de notre peuple."
 CEB_ideas:0 "Idées de Cebu"
 CEB_ideas_start:0 "Traditions de Cebu"
 CEB_ideas_bonus:0 "Ambition de Cebu"
 ceb_lumayas_ambition:0 "L'Ambition de Lumaya"
 ceb_lumayas_ambition_desc:0 "Jadis, l'Empire Chola s'étendait du pays tamoul en Inde aux nombreuses îles de Nusantara. Au sommet de leur puissance, les Cholas envoyèrent Lumaya, un jeune prince de leur dynastie, pour établir un État dans les îles du nord. Au lieu de rester soumis à des seigneurs lointains, le jeune prince décida de créer une petite principauté qui lui soit propre. L'indépendance de Cebu, l'État qu'il fonda des centaines d'années plus tard, est un témoignage de son ambition."
 ceb_chola_legacy:0 "Héritage Chola"
 ceb_chola_legacy_desc:0 "Nos racines, en tant que ramification de la puissante dynastie tamoule Chola, signifient que nous avons une tradition de royauté qui dépasse la plupart des royaumes de cette région. Nous ne sommes peut-être plus en contact direct avec les peuples de l'Inde, mais nous construisons toujours sur les traditions impériales des Cholas et leur État."
 ceb_protect_against_the_magalos:0 "Se Protéger contre les Magalos"
 ceb_protect_against_the_magalos_desc:0 "Depuis de nombreuses années maintenant, nos îles sont en proie à des esclavagistes étrangers qui pillent nos établissements et volent les personnes valides parmi notre peuple. Nous devons agir fermement et agressivement contre tout signe de raiders étrangers, et être prêts à employer tous les moyens nécessaires, même brûler notre propre terre, pour dissuader ou vaincre ces pillards."
 ceb_pacify_the_islands:0 "Pacifier les Îles"
 ceb_pacify_the_islands_desc:0 "Certaines îles qui sont nominalement sous notre contrôle sont devenues la base de pirates et de bandits malveillants. Nous devons nettoyer ces nids de pirates et pacifier toutes les terres sous notre contrôle pour être en mesure de développer les terres sous notre domination."
 ceb_place_for_trading:0 "« Le Lieu du Commerce »"
 ceb_place_for_trading_desc:0 "Notre position au milieu de l'archipel des Visayas nous permet d'agir comme un centre de commerce central, tout en nous donnant de bonnes bases navales pour protéger notre commerce et harceler notre concurrence. Construisons sur cet avantage et développons nos opérations de corsaires, faisant de notre port le choix évident pour les capitaines des mers des Visayas."
 ceb_befriend_the_europeans:0 "Se Lier d'Amitié avec les Européens"
 ceb_befriend_the_europeans_desc:0 "Des navires européens ont commencé à arriver dans notre archipel, et ces royaumes chrétiens semblent avoir une tradition maritime et martiale égale à la nôtre. Nous devrions chercher à nous lier d'amitié avec ces souverains étrangers et coopérer avec leurs guerriers pour soumettre nos rivaux locaux."
 ceb_expansion_of_the_capital:0 "Agrandir la Capitale"
 ceb_expansion_of_the_capital_desc:0 "En tant que capitale insulaire, Cebu est idéalement située pour gouverner un royaume maritime, et à mesure que notre influence croît, la cité elle-même a aussi grandi. Pour encourager davantage la croissance de Cebu, nous devons combattre les maladies tropicales et adopter un plan urbain moderne. Il est temps de montrer au monde ce que pourrait être une métropole insulaire."
 mindanao_ideas:0 "Idées de Mindanao"
 mindanao_ideas_start:0 "Traditions de Mindanao"
 mindanao_ideas_bonus:0 "Ambition de Mindanao"
 mindanao_an_islamicized_barangay:0 "Un Barangay Islamisé"
 mindanao_an_islamicized_barangay_desc:0 "Les marchands, soufis et marins musulmans sont devenus de plus en plus courants dans les eaux de Nusantara au cours des cent dernières années. Nous devrions intégrer ces nouveaux venus dans notre royaume et rejoindre la société des sultanats maritimes musulmans. En rendant hommage tant à ce nouveau dieu qu'aux anciens dieux de nos ancêtres, nous pouvons être sûrs d'avoir le soutien des cieux ainsi que de notre peuple en tout temps."
 mindanao_unite_the_datus:0 "Unir les Datus"
 mindanao_unite_the_datus_desc:0 "Il existe un grand nombre de Datus, de chefs, de stature et d'influence variées au sein de nos frontières. Beaucoup exercent un degré d'autonomie bien plus grand que nous ne le souhaiterions. Faisons rentrer dans le rang ces petits chefs et faisons-les tous venir régulièrement dans notre capitale pour participer aux cérémonies de royauté de notre dynastie."
 mindanao_protect_the_riches_of_mindanao:0 "Protéger les Richesses de Mindanao"
 mindanao_protect_the_riches_of_mindanao_desc:0 "L'île qui est notre foyer est aussi une grande source de richesse. L'or, les perles, le sucre et la cannelle sont tous des produits exotiques qui attirent des marchands de royaumes lointains et même de continents éloignés. Nous ne devons pas laisser l'accès à ces marchandises partir trop facilement. Protégeons nos artisans et marchands d'épices et donnons-leur le soutien dont ils ont besoin pour prospérer et profiter de la présence des marchands étrangers."
 mindanao_moro_sailors:0 "Marins Moros"
 mindanao_moro_sailors_desc:0 "Le peuple Moro de Mindanao et de Sulu est célèbre pour être d'habiles marins et experts en guerre navale. Pourtant, il y en a beaucoup qui prétendraient dominer ces eaux. Nous devrions construire une flotte nouvelle et puissante pour notre État, équipée par les nombreux marins Moros sous notre contrôle."
 mindanao_fortify_our_ports:0 "Fortifier Nos Ports"
 mindanao_fortify_our_ports_desc:0 "Nous vivons dans un monde dangereux, où esclavagistes et pirates sont une menace constante pour tout établissement côtier. Si cela ne suffisait pas, l'arrivée de navires occidentaux signale l'aube d'une nouvelle ère, avec de nouveaux ennemis. Nous devons toujours être préparés aux attaques hostiles et fortifier tous les ports importants avec de la pierre et des canons."
 mindanao_guerilla_warfare:0 "Guérilla"
 mindanao_guerilla_warfare_desc:0 "Ils sont nombreux à vouloir s'emparer de nos cités et villages contre notre volonté. Ces étrangers prétendent qu'ils souhaitent nous convertir ou « s'installer » sur nos terres. Nous devons résister à toutes ces tentatives et être prêts à utiliser la terre elle-même contre tout envahisseur."
 mindanao_pirates_of_mindanao:0 "Pirates de Mindanao"
 mindanao_pirates_of_mindanao_desc:0 "La présence hostile croissante sur les mers ouvertes a ruiné beaucoup de nos capitaines. Nous devons résister à ceux qui voudraient imposer des tarifs et des réglementations sur notre navigation et nous engager plutôt de tout cœur dans la contrebande et la piraterie quand c'est nécessaire. En donnant refuge à ceux qui sont pourchassés pour piraterie, nous pourrions aussi accroître nos activités pour à nouveau chasser ceux qui voudraient limiter notre accès aux mers."
 ANU_ideas:0 "Idées Aïnous"
 ANU_ideas_start:0 "Traditions Aïnoues"
 ANU_ideas_bonus:0 "Ambition Aïnoue"
 anu_chasi:0 "Chasi"
 anu_chasi_desc:0 "Depuis des générations, notre peuple a compté sur l'utilisation de fortifications au sommet des collines pour se défendre en temps de guerre ou de troubles. Au fil du temps, des centaines de ces forts simples ont été érigés sur toute l'île d'Ezo, assurant que nous avons des points forts à partir desquels nous pouvons nous défendre où que les envahisseurs puissent frapper."
 anu_riches_of_the_sea:0 "Richesses de la Mer"
 anu_riches_of_the_sea_desc:0 "Un peuple qui peut récolter les richesses des mers ne manquera jamais de nourriture ni de ressources. Les grandes baleines du Pacifique sont une énorme source de richesse et de nourriture, et notre peuple chasse et capture ces grandes bêtes depuis des siècles. On dit que tant que le Dieu de la mer est de notre côté, notre société prospérera."
 anu_southern_traders:0 "Marchands du Sud"
 anu_southern_traders_desc:0 "À bien des égards, le royaume japonais au sud est divisé et replié sur lui-même, et pourtant il possède de nombreux biens et ressources qui nous font défaut. Bien qu'il reste nécessaire de surveiller ces gens du sud attentivement, nous devrions laisser leurs marchands commercer avec nos communautés afin que nous puissions profiter de leur richesse."
 anu_heirs_of_jomon:0 "Héritiers de Jomon"
 anu_heirs_of_jomon_desc:0 "Les Aïnous ont vécu dans cette région pendant des milliers d'années. Bien avant que les habitants actuels du nord de Honshu ne mettent le pied dans cette région, notre peuple y vivait et y faisait sa vie. Cette ascendance est quelque chose que nous devons fièrement maintenir et ne pas manquer d'imprimer sur tous les gens du sud que nous pourrions croiser."
 anu_hunters_and_warriors:0 "Chasseurs et Guerriers"
 anu_hunters_and_warriors_desc:0 "En tant que chasseurs et pisteurs, nous sommes bien habiles à utiliser le terrain à notre avantage. Ce bagage, ainsi qu'une expertise répandue en poisons et pièges, est quelque chose que nous devrions emporter avec nous tandis que nous étendons notre domaine. Les ennemis faisant face à nos guerriers devront endurer non seulement une guerre ouverte mais une guérilla lente et mortelle."
 anu_yukar:0 "Yukar"
 anu_yukar_desc:0 "Le peuple Aïnou a toujours trouvé force et guidance dans les sagas orales Yukar. Des contes sacrés qui peuvent être récités pendant des heures, comme celui de Kutune Shirka, connectent notre génération actuelle avec notre passé et servent d'inspiration pour tous à suivre. Tandis que notre royaume se modernise et s'adapte aux réalités changeantes du monde, nous devons préserver et chérir cet héritage afin que tous puissent connaître nos dieux et les héros de notre passé."
 anu_fierce_resistance:0 "Résistance Farouche"
 anu_fierce_resistance_desc:0 "Beaucoup rêveraient de devenir les maîtres de notre peuple, envoyant leurs propres hommes pour construire des cités et des fortifications sur nos terres. Nous devons nous unir comme un seul contre de tels envahisseurs et les repousser dans la mer. Nous ne pouvons rester les bras croisés tandis que des étrangers tentent d'éteindre notre société, comme il advint de nos ancêtres à Honshu."
 HJO_ideas:0 "Idées Hojo"
 HJO_ideas_start:0 "Traditions Hojo"
 HJO_ideas_bonus:0 "Ambition Hojo"
 hjo_legacy_of_the_kamakura_shogunate:0 "Héritage du Shogunat de Kamakura"
 hjo_legacy_of_the_kamakura_shogunate_desc:0 "Le nom de notre clan, Hojo, vient de la célèbre famille qui occupa héréditairement la position de Shikken (« Régent ») dans l'ancien Shogunat de Kamakura. Nous ne sommes peut-être pas leurs descendants directs, mais le pouvoir de leur nom nous donne encore une influence spéciale parmi les samouraïs de la région du Kanto."
 hjo_night_combat:0 "Combat Nocturne"
 hjo_night_combat_desc:0 "En utilisant des tactiques clandestines, nos armées ont vaincu de façon écrasante des forces bien plus importantes. Nos soldats et généraux sont hautement compétents pour utiliser l'espionnage afin de planifier des attaques dans l'obscurité. Tant que personne ne peut anticiper où nous frapperons, nos troupes auront un avantage sur n'importe quelle armée ennemie."
 hjo_effective_administration:0 "Réformer l'Administration"
 hjo_effective_administration_desc:0 "Bâtissons une nouvelle bureaucratie dirigée par des bureaucrates talentueux et soutenue par un système postal efficace. Avec un large accès à la documentation, nos administrateurs seront toujours en mesure de prendre des décisions éclairées et d'intégrer correctement les nouvelles terres."
 hjo_tokusei:0 "Tokusei"
 hjo_tokusei_desc:0 "C'est notre devoir en tant que seigneur de notre peuple de ne jamais les taxer au-delà de leurs moyens, et d'être prêts à réduire la pression économique sur eux en temps de crise ou de famine. Que nul ne puisse remettre en question le « Règne Bienveillant » du clan Hojo."
 hjo_castles_of_hojo:0 "Châteaux des Hojo"
 hjo_castles_of_hojo_desc:0 "L'établissement de notre clan dans l'imprenable château d'Odawara est ce qui nous a permis de bâtir notre royaume malgré nos origines modestes. Nous devons continuer à utiliser de solides forteresses dans notre domaine, en érigeant de nouvelles et en restaurant les châteaux conquis à la première occasion. Ce n'est qu'en contrôlant les châteaux qu'un royaume contrôle véritablement une terre."
 hjo_unification_of_kanto:0 "Unification du Kanto"
 hjo_unification_of_kanto_desc:0 "Le Kanto est le berceau des samouraïs, et la région possède un riche potentiel économique pour nourrir plus de soldats et de chevaux. Avec nos terres du Kanto véritablement unies et consolidées, nous serons en mesure de faire plus librement usage de ces ressources."
 hjo_council_in_odawara:0 "Conseil à Odawara"
 hjo_council_in_odawara_desc:0 "Parfois, il est plus important de prendre la bonne décision que d'en prendre une rapidement. Par le conseil à Odawara, les dirigeants et vassaux de notre clan peuvent se réunir pour discuter des questions importantes. Adhérer à cette méthode nous permettra d'éviter les erreurs coûteuses et les décisions prises avec trop peu d'informations."
 CSK_ideas:0 "Idées Chosokabe"
 CSK_ideas_start:0 "Traditions Chosokabe"
 CSK_ideas_bonus:0 "Ambition Chosokabe"
 csk_ichiryo_gusoku:0 "Ichiryo Gusoku"
 csk_ichiryo_gusoku_desc:0 "Nous avons créé un système, « Ichiryo Gusoku », par lequel nous laissons tant les samouraïs que les paysans cultiver en temps de paix et combattre en temps de guerre. De cette façon, nous favorisons un sentiment d'unité ainsi qu'une expérience militaire chez tous les hommes. Le fait que ce système allège aussi largement le besoin de payer un entretien est un autre avantage pour notre clan."
 csk_seven_clans_of_tosa:0 "Sept Clans de Tosa"
 csk_seven_clans_of_tosa_desc:0 "Notre province natale de Tosa est divisée entre sept puissants clans. Si nous voulons pouvoir nous étendre davantage, nous devons tous nous unir. Ils nous aideront à nous élever, et en retour nous accroîtrons leur pouvoir."
 csk_unification_of_shikoku:0 "Unification de Shikoku"
 csk_unification_of_shikoku_desc:0 "Shikoku est considérée comme une terre pauvre et isolée par le reste du Japon, où rien d'important ne se passe. Laissons-les continuer à penser cela et négliger notre unification de l'île jusqu'à ce qu'il soit trop tard."
 csk_100_article_code:0 "Code des Cent Articles"
 csk_100_article_code_desc:0 "Réformer les lois de nos terres et établir des paramètres stricts pour nos soldats assurera que notre armée, aussi mal équipée ou petite soit-elle, sera toujours redoutée."
 csk_expand_the_navy:0 "Développer la Marine"
 csk_expand_the_navy_desc:0 "Le Japon est une nation insulaire et pour y prospérer, une marine forte est nécessaire. Tosa est un endroit idéal pour commencer la construction d'une armada qui nous soit propre."
 csk_god_of_arts:0 "Dieu des Arts"
 csk_god_of_arts_desc:0 "Le fondateur de notre clan, Hata no Kawakatsu, était hautement admiré comme le dieu patron de tous les arts, des danses traditionnelles au théâtre. Notre clan doit être à la hauteur de son héritage s'il veut gagner le respect du peuple japonais."
 csk_active_support_of_temples:0 "Soutien aux Temples"
 csk_active_support_of_temples_desc:0 "Notre royaume abrite de nombreuses sectes bouddhistes, chacune avec ses propres traditions et son histoire. Nous devons nous efforcer de respecter tous ces mouvements également et de leur accorder notre patronage. De cette façon, nous pouvons nous assurer d'avoir leur soutien en retour au lieu de risquer d'être entraînés dans des rivalités."
 MRI_ideas:0 "Idées Mori"
 MRI_ideas_start:0 "Traditions Mori"
 MRI_ideas_bonus:0 "Ambition Mori"
 mri_descendant_of_oe_hiromoto:0 "Descendants d'Oe Hiromoto"
 mri_descendant_of_oe_hiromoto_desc:0 "Oe Hiromoto, un érudit et homme politique qui contribua grandement à l'établissement du Shogunat de Kamakura, fut le fondateur de notre clan. À ce jour, son esprit vit encore dans notre clan et nous sommes fiers de maintenir une administration efficace."
 mri_leader_of_kokujin_ikki:0 "Chef des Kokujin Ikki"
 mri_leader_of_kokujin_ikki_desc:0 "La structure de notre clan est basée sur des alliances traditionnelles de samouraïs locaux, appelés Kokujin Ikki. En construisant sur cette solidarité, nous pouvons rapidement mobiliser une grande armée."
 mri_diplomatic_intrigues:0 "Intrigues Diplomatiques"
 mri_diplomatic_intrigues_desc:0 "Notre clan n'est pas aussi influent et répandu que certains autres au Japon. Si nous voulons réussir, nous devons proactivement construire des accords et des alliances avec d'autres daimyos. Nul n'est si puissant qu'il n'ait pas d'ennemis, et avec assez de nombre nous pourrions accomplir n'importe quoi."
 mri_three_arrows:0 "Trois Flèches"
 mri_three_arrows_desc:0 "Un clan ne peut être fort que s'il est uni. C'est pourquoi nous devons toujours nous souvenir de la légende des trois flèches, telle qu'elle fut enseignée par Mori Takamoto à ses fils. Une flèche se brise facilement, mais trois à la fois peuvent résister même à la force des hommes les plus forts."
 mri_hiroshima_castle:0 "Hiroshima"
 mri_hiroshima_castle_desc:0 "À mesure que notre clan grandit, nous avons besoin d'une capitale digne, protégée par un château puissant. Construisons la cité d'Hiroshima pour qu'elle soit le plus grand établissement de notre domaine, avec un château qui soit l'envie du Shogun lui-même."
 mri_itsukushima_shrine:0 "Itsukushima"
 mri_itsukushima_shrine_desc:0 "En tant que gardiens de l'île-sanctuaire d'Itsukushima, nous avons un devoir particulier envers la Déesse de la Mer. En veillant à ce que ces sanctuaires ne manquent de rien, nous pouvons être sûrs d'avoir la faveur de Benzaiten dans toutes les affaires maritimes."
 mri_hagi_ware:0 "Céramique de Hagi"
 mri_hagi_ware_desc:0 "Nous sommes devenus célèbres pour la poterie que nos artisans de Hagi produisent. La céramique de Hagi est largement préférée pour les cérémonies du thé pour son style et sa qualité exquis, et son exportation devient une affaire majeure."
 ASA_ideas:0 "Idées Asakura"
 ASA_ideas_start:0 "Traditions Asakura"
 ASA_ideas_bonus:0 "Ambition Asakura"
 asa_hidden_diplomacy:0 "Diplomatie Secrète"
 asa_hidden_diplomacy_desc:0 "Ayant émergé d'origines plus humbles que beaucoup d'autres daimyos, notre clan ne peut pas compter sur d'anciens amis et contacts de la même manière. Si nous voulons réussir dans la réalité impitoyable du Japon de l'époque Sengoku, nous devrons adopter une approche flexible et rusée de la diplomatie."
 asa_echizen_paper:0 "Papier d'Echizen"
 asa_echizen_paper_desc:0 "Echizen abrite des artisans de toutes sortes. Aucun art n'est aussi hautement considéré que celui de la fabrication du papier, cependant. En encourageant et en investissant dans les maîtres d'Echizen, nous pouvons nous assurer que le papier d'Echizen devienne le type le plus recherché du pays."
 asa_ichijodani_city:0 "Cité d'Ichijodani"
 asa_ichijodani_city_desc:0 "L'emplacement protégé de notre capitale, Ichijodani, tout en étant proche des ports et des routes terrestres vers d'autres importantes cités japonaises, lui confère une capacité unique à prospérer en cette période de bouleversements et de troubles. Construisons sur nos avantages naturels et faisons tout notre possible pour attirer le flux de réfugiés qui quittent la vie à Kyoto."
 asa_teach_of_asakura_soteki:0 "Asakura Soteki"
 asa_teach_of_asakura_soteki_desc:0 "Asakura Soteki, le plus grand général de l'histoire de notre clan, a laissé une leçon importante pour tous les samouraïs. La victoire doit être poursuivie à tout prix ; c'est la seule chose qui définit un guerrier."
 asa_seventeen_clan_code:0 "Code des Dix-Sept Articles du Clan"
 asa_seventeen_clan_code_desc:0 "Notre code de clan avec dix-sept articles définit la relation entre le seigneur et les vassaux. Il stipule la nécessité de prêter attention aux besoins des gens du commun et de mener une vie simple sans excès."
 asa_control_of_buddhist_sects:0 "Contrôle des Sectes Bouddhistes"
 asa_control_of_buddhist_sects_desc:0 "Outre la populaire secte Ikko, Echizen abrite de nombreux temples importants de différentes sectes comme le temple Eiheiji de la secte Soto et le temple Heisenji de la secte Tendai. Si nous pouvions les contrôler tous et établir une paix confessionnelle dans la province, nous aurions les fondements d'une politique religieuse idéale pour tout notre territoire."
 asa_legacy_of_emperor_keitai:0 "Héritage de l'Empereur Keitai"
 asa_legacy_of_emperor_keitai_desc:0 "Il y a de nombreux siècles, l'empereur Keitai utilisa Echizen pour lancer sa guerre afin de s'emparer du trône impérial. Comme lui, nous ne devons pas hésiter à projeter notre puissance au-delà de nos frontières et à lancer des invasions dans les royaumes voisins quand la situation l'exige."
 KID_ideas:0 "Idées de Kildare"
 KID_ideas_start:0 "Traditions de Kildare"
 KID_ideas_bonus:0 "Ambition de Kildare"
 kid_lords_of_ireland:0 "Lords Députés"
 kid_lords_of_ireland_desc:0 "Par des mariages et alliances stratégiques avec les familles gaéliques et anglo-irlandaises, les souverains de Kildare maintiennent un degré d'influence sur toute l'île d'Irlande inégalé par aucun de leurs rivaux. Tel est leur pouvoir que les monarques anglais successifs les ont nommés Lords Députés sur l'île."
 kid_ear_of_the_king:0 "Langues d'Argent"
 kid_ear_of_the_king_desc:0 "Malgré des trahisons répétées envers la couronne, les FitzGerald de Kildare réussissent toujours à se sortir d'affaire par la parole, rentrant chez eux avec un pardon et une promotion."
 kid_silken_finery:0 "Thomas le Soyeux"
 kid_silken_finery_desc:0 "Quand Thomas FitzGerald renonça à son allégeance au roi d'Angleterre, il le fit accompagné de sa suite de galloglass en armure, parés de franges de soie sur leurs casques. Quand Thomas hésita dans sa ligne de conduite, un barde irlandais lui récita un poème, appelant le Seigneur Soyeux à venger la mort de son père."
 kid_royal_irish_army:0 "Armée Royale Irlandaise"
 kid_royal_irish_army_desc:0 "Les forces envoyées par le Roi d'Angleterre pour soumettre les Irlandais peuvent facilement être réutilisées par la Pairie. En offrant simplement une meilleure solde, le comté de Kildare pourrait commander une force considérable de soldats anglais."
 wizard_earl:0 "Le Comte Magicien"
 wizard_earl_desc:0 "Le 11ème Comte de Kildare passa de nombreuses années à l'étranger, étudiant et apprenant beaucoup du monde. Quand il rentra chez lui, il apporta avec lui un vif intérêt pour l'alchimie. Tel était son savoir que ses voisins le surnommèrent le comte magicien, car on pensait qu'il possédait des pouvoirs magiques."
 the_curragh:0 "Équitation du Curragh"
 the_curragh_desc:0 "Les vastes plaines ouvertes du Curragh ont longtemps été utilisées comme lieu de rassemblement pour les forces armées, mais en font aussi un site populaire pour les courses de chevaux et, plus tard, l'entraînement des chevaux."
 kid_architects_of_nation:0 "Un Nouveau Siège pour les FitzGerald"
 kid_architects_of_nation_desc:0 "Le siège ancestral des FitzGerald à Carton House est grandiose, mais nos fortunes se sont améliorées dernièrement. Nous avons dressé des plans pour une résidence encore plus grandiose, qui pourrait servir non seulement de siège familial mais aussi de cour du Comte."
 TYR_ideas:0 "Idées de Tyrone"
 TYR_ideas_start:0 "Traditions de Tyrone"
 TYR_ideas_bonus:0 "Ambition de Tyrone"
 tyr_chief_of_irish_kings:0 "Chef des Rois Irlandais"
 tyr_chief_of_irish_kings_desc:0 "Les O'Neill établirent leur contrôle sur la plus grande partie de l'Ulster, devenant les plus puissants des seigneurs gaéliques. Un futur monarque offrit au chef de famille une livrée, le déclarant « chef des rois irlandais »."
 tyr_o_neill_mor:0 "L'O'Neill Mór"
 tyr_o_neill_mor_desc:0 "Le chef choisi de la famille O'Neill reçoit le titre d'O'Neill Mór. Le titre n'est pas héréditaire, mais quelle que soit la branche de la famille dont l'O'Neill Mór est issu, tous lui doivent fidélité."
 tyr_tanistry:0 "Tanistrie"
 tyr_tanistry_desc:0 "Tandis que de nombreux seigneurs gaéliques acceptèrent la pratique anglaise de primogéniture, le peuple de Tyrone maintint la pratique Brehon de tanistrie. Comme un nouveau souverain était élu par les hommes libres du clan, il pouvait s'attendre à être bien soutenu face à tout prétendant."
 tyr_arming_people:0 "Armer le Peuple"
 tyr_arming_people_desc:0 "Tandis que la plupart des seigneurs irlandais comptent sur les services d'un petit nombre de mercenaires écossais ou de professionnels irlandais, les souverains de Tyrone arment et entraînent tous les hommes sous leur autorité."
 tyr_catholic_diplomacy:0 "Diplomatie Catholique"
 tyr_catholic_diplomacy_desc:0 "Alors que la propagation de la Réforme accroît les tensions en Irlande, les seigneurs de Tyrone cherchent l'aide de souverains catholiques à l'étranger."
 tyr_ambush_warfare:0 "Guerre d'Embuscade"
 tyr_ambush_warfare_desc:0 "Leurs ennemis les surpassent en nombre et disposent de meilleures armes et d'un meilleur entraînement, mais les hommes de Tyrone sont des maîtres de la guerre irrégulière. Ils utilisent les collines, forêts et tourbières de leur patrie à leur avantage ultime, harcelant leurs ennemis pendant leur marche et les attirant dans des pièges. Les monarques anglais sont de plus en plus frustrés alors que leurs armées et leur trésor disparaissent dans les contrées sauvages d'Irlande."
 tyr_wild_geese:0 "Les Oies Sauvages"
 tyr_wild_geese_desc:0 "Les conflits constants entre Tyrone et les Anglais ont produit une population de jeunes hommes bien formés aux arts de la guerre. Certains partent pour le continent, où ils trouvent un emploi comme mercenaires. Connus sous le nom d'Oies Sauvages, ces régiments se retrouvent souvent à combattre les Anglais une fois de plus, mais sous un autre drapeau."
 TRY_ideas:0 "Idées de Tyrconnell"
 TRY_ideas_start:0 "Traditions de Tyrconnell"
 TRY_ideas_bonus:0 "Ambition de Tyrconnell"
 try_fisher_king:0 "Le Roi Pêcheur"
 try_fisher_king_desc:0 "Le chef du clan O'Donnell en vint à être connu sur le continent comme le Roi Pêcheur, en raison de l'exportation de poisson en échange de vin sur les marchés de La Rochelle."
 try_fort_foreigners:0 "Fort des Étrangers"
 try_fort_foreigners_desc:0 "Les O'Donnell construisirent un château sur les ruines d'un fort viking et le nommèrent Château de Donegal. Décrit comme le fort le plus solide d'Irlande, il présentait un obstacle formidable à tout ennemi menaçant Tyrconnell."
 try_religious_patrons:0 "Mécènes Religieux"
 try_religious_patrons_desc:0 "Les souverains de Tyrconnell sont de grands soutiens de l'Église, payant de nombreux bénéfices religieux et soutenant une abbaye franciscaine."
 try_patricks_purgatory:0 "Le Purgatoire de Saint Patrick"
 try_patricks_purgatory_desc:0 "On raconte que lorsque Saint Patrick vint au Lough Derg, Dieu lui révéla une caverne sur une île au milieu du lac. Cette caverne était l'entrée du purgatoire, et Saint Patrick y emmena les non-croyants afin qu'ils puissent témoigner du ciel et de l'enfer par eux-mêmes. Le Purgatoire de Patrick est devenu un important lieu de pèlerinage, attirant les fidèles de toute l'Europe."
 try_lessons_knockavoe:0 "Leçons de Knockavoe"
 try_lessons_knockavoe_desc:0 "Les hommes de Tyrconnell sont souvent largement surpassés en nombre par leurs rivaux. Pour compenser, ils maîtrisent l'élément de surprise pour vaincre leurs ennemis, les attaquant alors qu'ils établissent leur camp ou même lors de raids nocturnes. Avant que leurs adversaires n'aient le temps de former leurs rangs, l'armée de Tyrconnell est sur eux."
 try_land_of_exiles:0 "Terre d'Exilés"
 try_land_of_exiles_desc:0 "Les O'Donnell donnent asile à de nombreux nobles et prêtres gaéliques qui ont perdu leurs terres aux mains d'agresseurs étrangers. Ainsi la maison royale de Tyrconnell est-elle bien servie par de nombreux médecins, ecclésiastiques et guerriers notables de grande compétence et renommée."
 try_scottish_ties:0 "Liens Écossais"
 try_scottish_ties_desc:0 "Quand des luttes intestines menacèrent de déchirer Tyrconnell, Calvagh O'Donnell chercha de l'aide en Écosse, où il rencontra les Campbell. Il revint avec une force de Highlanders et quelques pièces d'artillerie, lui donnant la force d'assurer son emprise sur la province. Les O'Donnell peuvent se tourner à nouveau vers leurs alliés écossais à l'avenir pour obtenir un avantage dans leurs luttes."
 MCM_ideas:0 "Idées du Munster"
 MCM_ideas_start:0 "Traditions du Munster"
 MCM_ideas_bonus:0 "Ambition du Munster"
 mcm_basque_fishermen:0 "Pêcheurs de la Mer du Nord"
 mcm_basque_fishermen_desc:0 "Les pêcheurs basques, espagnols et portugais viennent profiter des vastes zones de pêche au large de nos côtes. Quand ils arrivent dans nos ports, ils apportent avec eux du fer, du vin et d'autres marchandises, et quand la pêche est mauvaise, ils remplissent leurs cales de peaux et de laine de nos marchés."
 mcm_brave_and_faithful:0 "Les Braves et les Fidèles"
 mcm_brave_and_faithful_desc:0 "Aux braves et aux fidèles, rien n'est difficile. La devise familiale des McCarthy a inspiré le peuple du Munster à travers les âges, les aidant à garder la foi tout au long des guerres brutales qui ont ravagé leur patrie."
 mcm_hill_raiders:0 "Pillards des Collines"
 mcm_hill_raiders_desc:0 "Face à un ennemi supérieur, les Gaëls du Munster se retirent dans les collines. Ils harcèlent alors leur ennemi par une série constante de raids, ciblant leurs approvisionnements, brûlant les villages et détruisant les récoltes, jusqu'à ce que l'ennemi soit forcé de se retirer ou de mourir de faim."
 mcm_spanish_ties:0 "Liens Espagnols"
 mcm_spanish_ties_desc:0 "Les Irlandais du sud partagent depuis longtemps des liens étroits, tant économiques que politiques, avec le peuple d'Espagne. Alors que leurs luttes mutuelles contre les Anglais s'intensifient, ces liens se renforcent. De nombreux jeunes hommes du Munster servent dans les armées espagnoles, apprenant les arts de la guerre."
 mcm_fairer_shores:0 "Rivages plus Cléments"
 mcm_fairer_shores_desc:0 "Les terres du Munster sont rudes, avec un sol pauvre et des hivers désagréables. La chance de se faire une nouvelle vie dans les colonies attire beaucoup. Il n'y a jamais de pénurie de volontaires heureux de traverser l'Atlantique."
 mcm_pirate_haven:0 "Repaire de Pirates"
 mcm_pirate_haven_desc:0 "Basés au port de Crookhaven, ils s'en prennent aux navires du Nouveau Monde se dirigeant vers les ports hollandais et anglais. Les autorités locales sont heureuses de fermer les yeux, car les pirates apportent la richesse des Amériques sur la côte sud de l'Irlande."
 mcm_enemies_everywhere:0 "Ennemis de l'Intérieur"
 mcm_enemies_everywhere_desc:0 "Les ennemis du clan MacCarthy complotent dans tous les coins du monde, même au sein de notre propre cour. Nous devons assurer le patriotisme de nos sujets par une investigation rigoureuse."
 LEI_ideas:0 "Idées du Leinster"
 LEI_ideas_start:0 "Traditions du Leinster"
 LEI_ideas_bonus:0 "Ambition du Leinster"
 legacy_of_palladius:0 "Héritage de Palladius"
 legacy_of_palladius_desc:0 "Le Leinster fut parmi les premières parties de l'Irlande à être christianisées. Saint Palladius arriva au Leinster au début du Ve siècle pour servir comme premier évêque d'Irlande, précédant Saint Patrick. La province est parsemée de monastères et d'abbayes, dont certains remontent aux temps anciens."
 lei_black_rent:0 "La Rente Noire"
 lei_black_rent_desc:0 "Les Gaëls du Leinster exigent un tribut des villes anglo-normandes le long de la côte sud et, occasionnellement, des colons anglais du Pale. Ce tribut est connu sous le nom de « cíos dubh », la rente noire. Le défaut de paiement signifie simplement que les Gaëls prennent le tribut par la force, avec le fardeau supplémentaire de vies perdues et de maisons et récoltes brûlées."
 lei_geraldine_league:0 "La Ligue Geraldine"
 lei_geraldine_league_desc:0 "Avec la Réforme se répandant comme une traînée de poudre en Europe, le Leinster doit relever le défi. Nous formerons une Ligue de nations prêtes à défendre la vraie foi contre tout hérétique qui tenterait d'imposer sa religion à l'Irlande."
 lei_enemy_of_enemy:0 "Le Sujet de Mon Ennemi Est Mon Ami"
 lei_enemy_of_enemy_desc:0 "Les souverains du Leinster ont toujours cherché à cultiver des liens avec les sujets mécontents de leurs voisins, afin de mieux assurer leur propre position. Un rebelle à l'étranger trouvera toujours une oreille sympathique, et peut-être des armes, un abri, un entraînement et de l'argent, au Leinster."
 lei_strong_cunning:0 "Qui n'Est Pas Fort Doit Être Rusé"
 lei_strong_cunning_desc:0 "Bien que leurs ennemis soient généralement mieux équipés en armes à feu et en artillerie, les guerriers du Leinster sont habiles à utiliser le terrain pour protéger leur avance et s'approcher au corps à corps, ou pour couvrir leur retraite alors qu'ils fuient pour combattre un autre jour."
 lei_long_memories:0 "Longues Mémoires"
 lei_long_memories_desc:0 "Le peuple du Leinster se souvient des nombreuses injustices perpétrées contre lui par ses ennemis. Cela renforce sa détermination à poursuivre le combat, à venger les morts et à punir les coupables."
 lei_military_academy:0 "Académie Militaire de Ballinacore"
 lei_military_academy_desc:0 "Les O'Byrne de Ballinacore se sont mis à former les hommes de Wicklow aux arts continentaux de la guerre. Ils cherchent à renforcer leurs forces de cavalerie et de kerns avec des piquiers et des arquebusiers, afin de pouvoir affronter leurs ennemis en bataille rangée."
 CNN_ideas:0 "Idées de Clanricarde"
 CNN_ideas_start:0 "Traditions de Clanricarde"
 CNN_ideas_bonus:0 "Ambition de Clanricarde"
 cnn_14_tribes:0 "Les Quatorze Tribus"
 cnn_14_tribes_desc:0 "La cité de Galway est dominée par quatorze riches familles marchandes, connues sous le nom des quatorze tribus. Leur concurrence et leurs rivalités constantes les poussent à rechercher des profits toujours plus grands, et par conséquent Galway est devenue un port marchand florissant."
 cnn_fire_and_sword:0 "Par le Fer et le Feu"
 cnn_fire_and_sword_desc:0 "Les terres de Clanricarde sont contrôlées par de nombreuses familles et factions différentes. Les souverains de Clanricarde ont appris que le meilleur moyen d'affirmer leur autorité est par la force. Villages, villes et châteaux brûlent afin que la famille régnante puisse se sentir en sécurité dans son pouvoir."
 cnn_sea_people:0 "Peuple de la Mer"
 cnn_sea_people_desc:0 "Les terres du Connemara, sur les côtes occidentales du Connacht, sont particulièrement pauvres pour l'élevage ou l'agriculture, mais les habitants ont appris à vivre de la mer. Prenant la mer dans leurs currachs et leurs hookers, ils fournissent à Clanricarde une source disponible de marins compétents."
 cnn_irish_hobby:0 "Hobbies Irlandais"
 cnn_irish_hobby_desc:0 "Le terrain rude et vallonné du Connemara constitue un bon terrain d'élevage pour le Hobby irlandais, une race de cheval bien adaptée au type de guerre d'escarmouche employé par les Gaëls."
 cnn_catholicism:0 "Bastion Catholique"
 cnn_catholicism_desc:0 "Quels que soient les mensonges racontés par les hérétiques de la Réforme, le peuple de Clanricarde restera toujours loyal envers Sa Sainteté."
 cnn_hell_or_connacht:0 "L'Enfer ou le Connacht"
 cnn_hell_or_connacht_desc:0 "Les guerriers de Clanricarde viennent de certaines des terres les moins hospitalières d'Irlande. S'engager dans un siège, loin de chez eux, ne leur fait guère peur, car ils sont habitués à arracher leur subsistance à un territoire plus hostile."
 cnn_lord_presidency:0 "La Présidence Seigneuriale"
 cnn_lord_presidency_desc:0 "L'établissement de la position de Lord Président du Connacht a contribué à mettre de l'ordre dans les terres de Clanricarde. Là où auparavant les disputes entre familles éminentes aboutissaient à des raids et des vendettas, le Lord Président agit désormais comme un arbitre neutre."
 ORD_ideas:0 "Idées d'Ormond"
 ORD_ideas_start:0 "Traditions d'Ormond"
 ORD_ideas_bonus:0 "Ambitions d'Ormond"
 ord_english_service:0 "Service Anglais"
 ord_english_service_desc:0 "Les comtes d'Ormond sont connus pour combattre à l'étranger, s'impliquant dans les querelles dynastiques des Anglais. L'expérience acquise sur le champ de bataille leur est fort utile pour résoudre les différends plus près de chez eux."
 ord_courts_of_europe:0 "Les Cours de Cannor"
 ord_courts_of_europe_desc:0 "Alors que la plupart des seigneurs anglo-irlandais et gaéliques d'Irlande ne s'éloignent guère de leur île, les seigneurs d'Ormond sont bien familiers des cours de Cannor, étant amis des rois et servant comme ambassadeurs sur le continent."
 ord_wool_earl:0 "Le Comte de la Laine"
 ord_wool_earl_desc:0 "Les souverains d'Ormond possèdent de vastes domaines en Angleterre. Telle est leur richesse que le Comte d'Ormond est parfois appelé le Comte de la Laine, pour les fortunes gagnées par ce commerce."
 ord_locals_in_line:0 "Tenir les Locaux en Respect"
 ord_locals_in_line_desc:0 "Les Gaëls sont un peuple indiscipliné, enclin à la rébellion contre leurs supérieurs. Ils ont besoin d'une main ferme pour les tenir en respect."
 ord_irish_rivalries:0 "Rivalités Irlandaises"
 ord_irish_rivalries_desc:0 "Beaucoup jalousent notre succès. Nous devons être vigilants, car nos ennemis saisiront toute occasion de nous abattre et ne se limitent pas aux moyens honorables pour ce faire."
 ord_subdue_irish:0 "Art du Siège Irlandais"
 ord_subdue_irish_desc:0 "Les armées d'Ormond ont une grande expérience pour abattre les donjons et forteresses de leurs voisins gaéliques et anglo-irlandais."
 ord_build_on_success:0 "Enracinement de la Dynastie Butler"
 ord_build_on_success_desc:0 "La famille Butler est bien établie. Assurés de notre position, nous pouvons commencer à construire pour l'avenir, afin que nos descendants contemplent ce que nous avons bâti et se souviennent de nous."
 highland_scottish_ideas:0 "Idées des Highlanders"
 highland_scottish_ideas_bonus:0 "Ambition des Highlanders"
 highland_scottish_ideas_start:0 "Traditions des Highlanders"
 hsc_the_wallace:0 "Le Wallace"
 hsc_the_wallace_desc:0 "Nous chantons un homme de très illustre renom,\nDe noble sang qui règne en cette région,\nEt dorénavant je poursuivrai mon récit,\nDe William Wallace dont vous avez ouï."
 hsc_highland_clans:0 "Les Clans des Highlands"
 hsc_highland_clans_desc:0 "Les clans des Highlands sont un peuple querelleur. Autant qu'ils se ressentent les uns les autres, ils ressentent encore plus la perspective d'envahisseurs étrangers régnant sur leurs terres ancestrales. Bien sûr, quand la menace d'invasion étrangère est passée, les clans reprendront leurs querelles intestines. Il ne peut y en avoir qu'un."
 hsc_storm_the_castle:0 "Prendre le Château d'Assaut"
 hsc_storm_the_castle_desc:0 "Quels que soient les problèmes qui surviennent dans les Highlands, peu peuvent être résolus sans à un moment donner l'assaut à un château. Notre expérience en ces matières remonte à des générations et constitue une compétence hautement transférable."
 hsc_episcopalianism:0 "Épiscopalisme"
 hsc_episcopalianism_desc:0 "Il existe de nombreuses idées concurrentes sur la façon dont l'Église des Highlands devrait être structurée et quelles doctrines devraient être adoptées suite à l'avènement de la Réforme. Nous avons choisi de conserver le modèle hiérarchique de l'épiscopat, qui permet à la fois une structure claire pour les procédures ecclésiastiques et un degré d'indépendance doctrinale pour les ecclésiastiques."
 hsc_highland_charge:0 "Charge des Highlands"
 hsc_highland_charge_desc:0 "Les armes à poudre ont révolutionné le champ de bataille, et les guerriers des Highlands doivent s'adapter. Une nouvelle tactique de choc agressive a été développée par nos généraux. Nos soldats courront, de préférence en descente, droit dans la première salve ennemie, tirant en avançant. Après avoir tiré, ils dégaineront des armes plus traditionnelles et engageront la mêlée. La vitesse requise pour cette tactique nécessite cependant que nos guerriers portent très peu de vêtements."
 hsc_arming_act:0 "L'Acte d'Armement"
 hsc_arming_act_desc:0 "Nos oppresseurs voudraient confisquer nos armes pour nous priver de la capacité de résister. L'Acte d'Armement exige que tous les Highlanders possèdent et s'entraînent avec une arme à feu."
 hsc_ossian:0 "Ossian"
 hsc_ossian_desc:0 "Le renouveau romantique de la culture gaélique est illustré par une collection de poèmes écrits sous le pseudonyme d'« Ossian ». Ils racontent d'anciens contes folkloriques qui rappellent aux Highlanders leur passé légendaire."
 FLY_ideas:0 "Idées d'Offaly"
 FLY_ideas_start:0 "Traditions d'Offaly"
 FLY_ideas_bonus:0 "Ambition d'Offaly"
 fly_galloglas:0 "Les Galloglass"
 fly_galloglas_desc:0 "Les mercenaires Galloglass constituent une portion considérable des forces combattantes irlandaises. Bien qu'ils soient souvent des Écossais gaéliques, beaucoup d'entre eux se sont installés en Irlande et ont trouvé un emploi rémunérateur comme gardes du corps et soldats auprès des clans."
 fly_gracious_hosts:0 "Hospitalité Irlandaise"
 fly_gracious_hosts_desc:0 "Quelle que soit sa provenance, un étranger peut toujours trouver refuge à Offaly. Une longue tradition d'hospitalité et de tolérance engendre une culture de respect parmi les voyageurs et les rois également."
 fly_trade_shannon:0 "Commerce Fluvial"
 fly_trade_shannon_desc:0 "Serpentant depuis la montagne de Cuilcagh jusqu'à la mer, le fleuve Shannon favorise une petite économie de commerce en aval. Le peuple d'Offaly est bien exercé à tirer le meilleur parti de la configuration naturelle du terrain."
 fly_clonmacnoise:0 "La Crainte de Dieu"
 fly_clonmacnoise_desc:0 "Fondé par Saint Ciarán, et situé au cœur même de nos terres, le monastère de Clonmacnoise a, depuis près d'un millénaire, répandu la parole de Notre Seigneur au peuple d'Offaly. En l'établissant comme lieu de pèlerinage, nous accroissons notre considération aux yeux du Seigneur."
 fly_tower_houses:0 "Maisons-Tours"
 fly_tower_houses_desc:0 "Les maisons-tours d'Offaly peuvent être vues, se découpant sur le ciel du soir, à travers tout notre royaume. Des centaines, voire des milliers d'entre elles se trouvent dans toute l'Irlande, souvent construites par des seigneurs mineurs pour se prémunir des raids des voisins et résister aux invasions étrangères. En subventionnant la construction de davantage d'entre elles, la défense de notre nation ne sera plus jamais mise en question."
 fly_family_affair:0 "Une Affaire de Famille"
 fly_family_affair_desc:0 "La politique de succession à Offaly pouvait souvent devenir fort violente en effet. Les contestations du pouvoir étaient écrasées de manière rapide et sanglante, afin qu'un message soit envoyé à quiconque oserait se considérer comme roi."
 fly_buannacht:0 "Les Buannacht"
 fly_buannacht_desc:0 "En soutien aux Galloglass, de nombreux clans gaéliques lèvent des levées de Kerns. Souvent mal formés et mal équipés, il est maintenant devenu coutume de remplacer ces soldats dépassés par les Buannacht : des soldats professionnels de haut calibre et de redoutable réputation."
 ULS_ideas:0 "Idées de l'Ulster"
 ULS_ideas_start:0 "Traditions de l'Ulster"
 ULS_ideas_bonus:0 "Ambition de l'Ulster"
 uls_clan_connections:0 "Connexions avec les Highlands"
 uls_clan_connections_desc:0 "La noblesse d'Ulster a des liens de mariage et d'ascendance avec le Clan Donald dans les Highlands écossais. On peut toujours compter sur les Donald pour prêter leur expertise à l'Ulster."
 uls_peerage:0 "Pairie de l'Ulster"
 uls_peerage_desc:0 "La plupart des seigneurs d'Ulster font au moins nominalement partie du système de pairie irlandaise, par lequel les propriétaires terriens irlandais jurent allégeance à la Couronne anglaise. Bien que cela signifie peu en pratique, nous portons ces titres avec fierté."
 civilist_of_irishry:0 "Civilisateur des Irlandais"
 civilist_of_irishry_desc:0 "La noblesse d'Ulster prend grand soin de paraître respectable aux yeux de ses homologues anglais. Cela lui a valu un certain respect dans les cours européennes."
 rapparee:0 "Rapparees"
 rapparee_desc:0 "Les Rapparees sont une bande nouvellement formée de combattants de guérilla ayant leurs origines dans les kerns irlandais. En tant que soldats irréguliers, ils sont capables de harceler les forces ennemies alors qu'elles traversent notre pays."
 catholic_ascendency:0 "Ascendance Catholique"
 catholic_ascendency_desc:0 "On ne peut permettre à la Réforme de prendre pied en Irlande. Les non-catholiques devraient être exclus des charges publiques et désavantagés de toutes les manières que l'État peut gérer pour décourager l'hérésie."
 uls_defenders:0 "Les Défenseurs"
 uls_defenders_desc:0 "Une société secrète s'est formée en Ulster sous le nom de Défenseurs. Leur but est d'assurer la loyauté et la solidarité des catholiques à travers l'Irlande, en combattant la persécution par les protestants."
 uls_last_redoubt:0 "Dernier Bastion d'Irlande"
 uls_last_redoubt_desc:0 "Une grande partie de l'Irlande est à la merci des armées anglaises. L'Ulster est l'un des derniers bastions de l'indépendance irlandaise, et doit être préparé à combattre jusqu'au dernier homme pour la préserver."
 CRN_ideas:0 "Idées Cornouaillaises"
 CRN_ideas_start:0 "Traditions Cornouaillaises"
 CRN_ideas_bonus:0 "Ambition Cornouaillaise"
 crn_stannary_parliaments:0 "Parlements Stannaires"
 crn_stannary_parliaments_desc:0 "Les mineurs d'étain de Cornouailles maintiennent depuis longtemps leurs droits juridiques spéciaux. Ceux-ci incluent l'exemption fiscale et les droits exclusifs de prospection, mais surtout le droit de n'être jugés que devant une Cour Stannaire avec un jury composé de leurs confrères mineurs. Un Parlement Stannaire supervise et révise ces droits, gardant la population minière productive et satisfaite."
 crn_cornish_rebels:0 "Rebelles Cornouaillais"
 crn_cornish_rebels_desc:0 "Le peuple cornouaillais est prompt à se soulever contre l'oppression et la mauvaise gouvernance. Les armées hostiles entrant sur leurs terres reçoivent un accueil peu amical."
 crn_prayer_book_traditionaliism:0 "Traditionalisme du Livre de Prières"
 crn_prayer_book_traditionaliism_desc:0 "Fermiers, mineurs et propriétaires terriens sont tous extrêmement réticents à accepter des changements aux livres de prières religieux. Beaucoup se plaignent que les livres de prières écrits en anglais excluent une partie significative de la population qui ne parle que le cornique, bien que d'autres fassent remarquer qu'ils ne pouvaient pas non plus lire les anciennes prières en latin. Quoi qu'il en soit, une attitude traditionaliste envers la religion imprègne la société cornouaillaise et la soude ensemble."
 crn_pirates_of_penzance:0 "Pirates de Penzance"
 crn_pirates_of_penzance_desc:0 "Oh, bien mieux vivre et mourir\nSous le vaillant pavillon noir que j'arbore,\nQue jouer un rôle moralisateur,\nAvec un cœur et une tête de pirate."
 crn_royalist_army:0 "Armée Royaliste Cornouaillaise"
 crn_royalist_army_desc:0 "Toujours de fidèles monarchistes, le peuple cornouaillais est prompt à se rallier à la défense de la couronne contre les révolutionnaires républicains. Malgré la population relativement faible de la Cornouailles, elle peut lever une levée étonnamment importante de soldats déterminés prêts à combattre pour le Roi et la patrie."
 crn_gear_rout:0 "La Déroute Organisée"
 crn_gear_rout_desc:0 "Même si nous perdons la guerre, assez d'entre nous fuiront probablement le champ de bataille pour vivre et combattre un autre jour."
 crn_arthurian_romanticism:0 "Romantisme Arthurien"
 crn_arthurian_romanticism_desc:0 "Un regain d'intérêt récent pour la culture celtique a créé un intérêt pour la légende arthurienne. Le château de Tintagel serait le lieu de conception du Roi Arthur, et sert de point focal d'une identité celtique renouvelée en Cornouailles."
 KOI_ideas:0 "Idées de Mann"
 KOI_ideas_start:0 "Traditions de Mann"
 KOI_ideas_bonus:0 "Ambition de Mann"
 mann_tynwald:0 "Haute Cour du Tynwald"
 mann_tynwald_desc:0 "Le Tynwald est la haute cour de Mann. La Chambre des Clés, dirigée par les familles les plus puissantes de Mann, agit comme un jury national qui donne des conseils sur les questions juridiques. Cependant, à mesure que l'État s'agrandit, ses besoins administratifs se multiplient. Le Tynwald doit devenir une institution permanente, semblable à un parlement avec le pouvoir de rédiger de nouvelles lois."
 mann_stanleys:0 "Les Stanley"
 mann_stanleys_desc:0 "La dynastie Stanley a inauguré une ère de paix et de prospérité pour le peuple de Mann. Leur habileté diplomatique assure la sécurité de l'île contre les menaces tant politiques que militaires envers notre souveraineté."
 mann_kings:0 "Rois de Mann"
 mann_kings_desc:0 "Malgré sa taille, Mann est reconnu comme un royaume de jure. Mais qu'est-ce qu'un royaume sans terre ? Nous devons en acquérir davantage."
 mann_act_of_settlement:0 "L'Acte d'Établissement"
 mann_act_of_settlement_desc:0 "Il est temps de régler définitivement le statut de la propriété paysanne sur Mann. L'Acte garantira les droits fondamentaux des citoyens et deviendra une base pour le développement futur de notre constitution."
 mann_and_the_isles:0 "Mann et les Îles"
 mann_and_the_isles_desc:0 "Dans les siècles passés, Mann était le cœur d'un grand royaume qui s'étendait à travers la mer d'Irlande. Il est temps de raviver la tradition de la construction navale afin de restaurer cet empire."
 mann_burn_the_heretic:0 "Brûler l'Hérétique"
 mann_burn_the_heretic_desc:0 "La sorcellerie et l'hérésie sont des dangers toujours présents pour les fidèles. Ne souffrez pas que la sorcière et l'hérétique vivent."
 mann_act_of_revestment:0 "L'Acte de Réinvestiture"
 mann_act_of_revestment_desc:0 "Il y a trop de petits nobles détenant des titres mineurs et retenant les rentes de leurs terres. L'Acte de Réinvestiture révoquera ces titres afin que le monarque puisse gouverner plus directement."
 MTH_ideas:0 "Idées de Meath"
 MTH_ideas_start:0 "Traditions de Meath"
 MTH_ideas_bonus:0 "Ambition de Meath"
 mth_parliament_of_ireland:0 "Parlement d'Irlande"
 mth_parliament_of_ireland_desc:0 "Quand les Anglais furent expulsés de Dublin, ils laissèrent derrière eux une institution appelée le Parlement d'Irlande. Destiné à être un instrument pour nous subjuguer, nous l'utiliserons plutôt pour organiser nos efforts de résistance à un retour de la domination anglaise."
 mth_englishtown:0 "Quartier Anglais"
 mth_englishtown_desc:0 "Autrefois connu comme le Quartier Irlandais et un ghetto pour les Irlandais natifs à Dublin, nous avons renversé la situation. Le quartier est maintenant réservé aux Anglais qui restent, forcés là de s'intégrer au nouvel ordre."
 mth_the_cess:0 "La Cess"
 mth_the_cess_desc:0 "La Cess est un impôt spécial destiné à l'entretien des garnisons extraordinaires nécessaires pour garder nos villes en sécurité. Le peuple en veut à cet impôt, mais comprend sa nécessité."
 mth_trinity_college:0 "Trinity College"
 mth_trinity_college_desc:0 "L'Irlande manque d'une institution d'enseignement supérieur. Une université catholique à Dublin mettrait l'Irlande sur la carte académique."
 mth_siege_mentality:0 "Mentalité de Siège"
 mth_siege_mentality_desc:0 "Le peuple de Dublin et de Meath a dû endurer de nombreux sièges au fil des ans. Nous comprenons comment y survivre et comment y résister."
 FRI_ideas:0 "Idées Frisonnes"
 FRI_ideas_start:0 "Traditions Frisonnes"
 FRI_ideas_bonus:0 "Ambition Frisonne"
 fri_coastal_industry:0 "Industrie Côtière"
 fri_coastal_industry_desc:0 "Alors que le commerce commence à s'épanouir en mer du Nord, notre importance dans la région s'accroît également. L'habileté naturelle de notre peuple pour la navigation s'avérera fort utile dans les années à venir."
 fri_upstalsboom_league:0 "La Ligue d'Upstalsboom"
 fri_upstalsboom_league_desc:0 "Le rêve frison d'un véritable républicanisme a connu de nombreux revers. Depuis le XIIe siècle, nous avons lutté contre le féodalisme ; peut-être est-il temps maintenant de constitutionnaliser nos idéaux."
 fri_zuiderzee_settlements:0 "Les Digues du Zuiderzee"
 fri_zuiderzee_settlements_desc:0 "D'horribles inondations ont frappé la côte de la Frise depuis des temps immémoriaux. Nos ingénieurs ont fait un travail si remarquable pour renforcer les vastes digues et remblais qui retiennent la mer que nous croyons qu'ils sont parmi les meilleurs au monde."
 fri_flooding_polders:0 "Inonder les Polders"
 fri_flooding_polders_desc:0 "Le paysage de la Frise est parsemé de champs clos artificiellement irrigués appelés polders, depuis des siècles. Ce n'est que récemment que nous avons réalisé leur superbe potentiel pour combattre l'invasion. En ouvrant les vannes, nous pouvons rendre notre territoire pratiquement impénétrable."
 fri_mennonism:0 "Différence d'Opinion"
 fri_mennonism_desc:0 "Alors que le débat en Europe devient de plus en plus enflammé concernant le Divin, nous nous efforçons de promouvoir notre héritage de tolérance, de compréhension et d'amitié."
 fri_brothers_arms:0 "Frères d'Armes"
 fri_brothers_arms_desc:0 "Les Pays-Bas ont été assiégés, attaqués et conquis maintes et maintes fois au cours de l'histoire. Il devient rapidement évident que nous devons tendre la main à nos frères et rester fermes dans notre résolution mutuelle de garder notre propriété à nous."
 fri_dutch_courage:0 "Courage Hollandais"
 fri_dutch_courage_desc:0 "Les soldats étrangers font souvent remarquer la bravoure de nos troupes. Que leur bravoure soit causée par des rations de genièvre comme le croient les étrangers, ou par notre superbe régime d'entraînement, ce n'est pas clair."
 UTR_ideas:0 "Idées d'Utrecht"
 UTR_ideas_start:0 "Traditions d'Utrecht"
 UTR_ideas_bonus:0 "Ambition d'Utrecht"
 utr_devotio_moderna:0 "Devotio Moderna"
 utr_devotio_moderna_desc:0 "Initialement l'œuvre de Gerard Groote, natif d'Utrecht, le mouvement de la Dévotion Moderne appelle à une approche simple et pieuse de la vie. Ces valeurs doivent être promues en ces temps d'incertitude, de peur que nous n'oubliions nos humbles origines."
 utr_ex_cathedra:0 "Ex Cathedra"
 utr_ex_cathedra_desc:0 "Utrecht a, pendant de nombreux siècles, été le siège très influent d'un Prince-Évêque. Dernièrement, la voix d'Utrecht a été noyée par la clameur des services de lèvres sycophantes de ceux qui voudraient s'attirer les bonnes grâces de Dieu. En émettant une proclamation nationale en faveur de notre héritage divin, nous réaffirmons notre statut dans le royaume de Dieu."
 utr_fortified_town:0 "Cité Fortifiée"
 utr_fortified_town_desc:0 "Les murailles d'Utrecht résistent à tout ce que nos ennemis peuvent leur opposer. Nos ingénieurs artisans s'assurent que notre héritage tient, et tiendra, bien dans le futur."
 utr_vaartse_rijn:0 "Le Vaartse Rijn"
 utr_vaartse_rijn_desc:0 "Ce canal relie Utrecht au Hollandse IJssel, et apporte avec lui toutes sortes de commerce étranger. En étendant le réseau de canaux tributaires autour d'Utrecht, et en fait, du reste de notre pays, nous ouvrons un marché florissant à notre population."
 utr_city_churches:0 "Cité des Églises"
 utr_city_churches_desc:0 "Les nombreuses églises d'Utrecht témoignent de notre position favorable dans l'Église. Néanmoins, une nouvelle ère de construction d'églises est sur nous : posons les fondations !"
 utr_cultural_resilience:0 "Résilience Culturelle"
 utr_cultural_resilience_desc:0 "Aucune invasion ni occupation étrangère n'a émoussé le désir de chaque citoyen d'Utrecht d'être libre. Nous remarquons que nos frères des Pays-Bas partagent nombre des mêmes croyances et valeurs que nous : peut-être est-il temps d'étendre la main de l'amitié ?"
 utr_enlightenment_masses:0 "Lumières pour les Masses"
 utr_enlightenment_masses_desc:0 "En cette ère de merveilles, l'éducation de notre peuple est d'une importance capitale. Des universités et des écoles surgissent d'Est en Ouest. Embrassons ce savoir pour l'amélioration de l'Homme."
 FLA_ideas:0 "Idées Flamandes"
 FLA_ideas_start:0 "Traditions Flamandes"
 FLA_ideas_bonus:0 "Ambition Flamande"
 fla_cloth:0 "Drap Flamand"
 fla_cloth_desc:0 "L'industrie drapière flamande fait l'envie du monde. Des marchands viennent de loin pour vendre leur laine en Flandre, où nous fabriquons le drap de la meilleure qualité."
 fla_land_reclamation:0 "Poldérisation"
 fla_land_reclamation_desc:0 "Les Pays-Bas sont très susceptibles aux inondations, mais nous avons maintenant la technologie pour récupérer ces terres sur l'océan."
 fla_beeldenstorm:0 "Beeldenstorm"
 fla_beeldenstorm_desc:0 "De nouvelles idées inspirent une fureur iconoclaste parmi le peuple de Flandre. Une « tempête des statues » est en cours, alors que les réformateurs détruisent les icônes et les images hérétiques."
 fla_painters:1 "Innovation Flamande"
 fla_painters_desc:1 "La Flandre a historiquement été à l'avant-garde des avancées technologiques et culturelles. Nous devons continuer à patronner les inventeurs, les artistes et les écrivains pour maintenir notre avantage sur les autres nations."
 fla_ship_building:0 "Chantiers Navals de la Mer du Nord"
 fla_ship_building_desc:0 "Comme la Flandre possède certaines des plus grandes cités portuaires d'Europe, il est normal qu'elle possède certains des plus grands chantiers navals d'Europe. Pouvoir utiliser des artisans locaux réduit considérablement les coûts d'acquisition de nouvelles flottes marchandes."
 fla_university:1 "Universitaires Flamands"
 fla_university_desc:1 "La Flandre abrite de nombreuses institutions d'enseignement académique. Les érudits flamands ouvrent la voie dans le domaine de la philosophie naturelle."
 fla_noose_bearers:0 "Porteurs de Cordes"
 fla_noose_bearers_desc:0 "Nous avons subi une grande humiliation sous des suzerains étrangers. Forcés de jurer publiquement fidélité avec des cordes autour du cou, nos braves patriotes ont croisé les doigts et juré de ne plus jamais permettre que la Flandre soit humiliée."
 BRB_ideas:0 "Idées Brabançonnes"
 BRB_ideas_start:0 "Traditions Brabançonnes"
 BRB_ideas_bonus:0 "Ambition Brabançonne"
 brb_charter_of_liberty:0 "Charte de Liberté"
 brb_charter_of_liberty_desc:0 "En 1354, le duc Jean III de Brabant accorda une Joyeuse Entrée aux citoyens du Brabant. Les six libertés spécifiques détaillaient les pouvoirs exacts dont disposaient l'Église, les villes et les nobles."
 brb_marsh_warfare:0 "Guerre des Marais"
 brb_marsh_warfare_desc:0 "Le terrain des Pays-Bas est dominé par les marais et autres terrains défavorables. En entraînant nos généraux à mieux s'adapter au terrain hostile, nous pouvons avoir plus de succès sur le champ de bataille."
 brb_palace_coudenberg:0 "Palais du Coudenberg"
 brb_palace_coudenberg_desc:0 "Le vieux château du Coudenberg est devenu obsolète. À sa place, nous devrions construire un grand palais qui sera l'envie des Pays-Bas. Il aura de vastes ailes, des décorations somptueuses, et sera aménagé même pour des réceptions royales."
 brb_sugar_capital:0 "Capitale du Sucre d'Europe"
 brb_sugar_capital_desc:0 "Anvers est devenue la capitale du sucre d'Europe, important la majeure partie de l'approvisionnement du continent et abritant l'une des plus grandes populations de raffineurs compétents pour le fabriquer et l'expédier."
 brb_antwerp_banking:0 "Banques d'Anvers"
 brb_antwerp_banking_desc:0 "Anvers abrite les banques les plus riches et les plus influentes en dehors de l'Italie. Nous prêtons non seulement aux marchands et aux nobles mais aux gouvernements de grands États."
 brb_religious_tolerance:0 "Tradition de Tolérance"
 brb_religious_tolerance_desc:0 "La tolérance religieuse est une tradition dans le duché de Brabant. Les crypto-juifs sont les bienvenus ici, tout comme les nombreuses sectes émergentes de la Réforme."
 brb_generality_lands:0 "Terres de la Généralité"
 brb_generality_lands_desc:0 "Si le Brabant doit faire partie de quelque chose de plus grand, il doit être administré directement par l'État en tant que terres de la Généralité plutôt qu'être gouverné par des nobles ou des bourgeois locaux."
 LIE_ideas:0 "Idées de Liège"
 LIE_ideas_start:0 "Traditions de Liège"
 LIE_ideas_bonus:0 "Ambition de Liège"
 lie_guild_democracy:0 "Démocratie des Guildes"
 lie_guild_democracy_desc:0 "Les guildes de Liège se sont unies en ces temps de troubles pour apporter l'ordre à la cité. Chaque homme qui rejoint une guilde a voix égale dans ses assemblées, et chaque guilde a voix égale dans la décision collective."
 wars_of_liege:0 "Les Guerres de Liège"
 wars_of_liege_desc:0 "Liège se trouve impliquée dans de nombreux conflits. Peu importe combien de défaites elle subit ou combien de fois la cité est réduite en cendres, le peuple de Liège se regroupera et reprendra le combat une fois de plus."
 lie_religious_devotion:0 "Dévotion Religieuse"
 lie_religious_devotion_desc:0 "Le règne des Princes-Évêques assure la dévotion religieuse des sujets, tandis que le règne du Pape assure la piété du Prince-Évêque lui-même."
 lie_wittelsbach_bishops:0 "Évêques Wittelsbach"
 lie_wittelsbach_bishops_desc:0 "La noble maison des Wittelsbach est à la fois prestigieuse et vaste. Ceux parmi eux qui prennent la soutane devraient être invités à servir comme Princes-Évêques à Liège. Bien que cela nous mêlerait aux politiques dynastiques des princes allemands, cela améliorerait aussi notre capacité à mener des affaires diplomatiques dans les cours impériales."
 lie_prince_bishop_palace:0 "Le Palais du Prince-Évêque"
 lie_prince_bishop_palace_desc:0 "L'ancien palais n'est qu'une ruine brisée, indigne d'un souverain moderne. Notre Prince-Évêque doit avoir un palais égal à celui de tout autre prince du Saint-Empire romain."
 lie_literary_society:0 "Société Littéraire"
 lie_literary_society_desc:0 "Les sociétés littéraires font fureur en Europe ces jours-ci. Liège doit avoir la sienne, pour la promotion de l'alphabétisation et de la culture dans notre nation."
 lie_rights_of_man:0 "Déclaration des Droits de l'Homme et du Citoyen"
 lie_rights_of_man_desc:0 "Étroitement inspirée des documents révolutionnaires français, la Déclaration des Droits établit une liste radicale de droits inaliénables pour nos citoyens."
 GEL_ideas:0 "Idées de Gueldre"
 GEL_ideas_start:0 "Traditions de Gueldre"
 GEL_ideas_bonus:0 "Ambition de Gueldre"
 gel_county_duchy:0 "Élévation Féodale"
 gel_county_duchy_desc:0 "La Gueldre a été élevée par l'Empereur d'un simple comté à un magnifique duché. La Gueldre est ainsi reconnue comme l'un des États les plus éminents des Pays-Bas."
 gel_hanseatic:0 "Villes Hanséatiques"
 gel_hanseatic_desc:0 "Les rivières qui traversent la Gueldre apportent avec elles une abondance de commerce. Il n'est pas étonnant qu'un nombre extraordinaire de villes sur notre territoire soient membres de la Ligue hanséatique. Ces villes hanséatiques apportent une contribution vitale aux coffres du duché."
 gel_defy_burgundy:0 "Défiance de la Domination Étrangère"
 gel_defy_burgundy_desc:0 "Qu'ils soient ducs de Bourgogne ou rois d'Espagne, le peuple de Gueldre utilise tous les moyens à sa disposition pour expulser les souverains étrangers de ses terres. Notre indépendance farouche face à l'adversité cimente notre droit de gouverner."
 gel_rivers:0 "Maîtriser les Rivières"
 gel_rivers_desc:0 "Alors que d'autres États des Pays-Bas luttent contre l'avancée de l'océan, la Gueldre affronte ses rivières. Le risque perpétuel d'inondation nous a forcés à développer une tradition d'ingénierie fluviale qui contrôle l'écoulement de l'eau à travers nos terres."
 gel_gelderland_wars:0 "Les Guerres de Gueldre"
 gel_gelderland_wars_desc:0 "La Gueldre n'est pas étrangère aux conflits militaires, et ses armées sont à nouveau prêtes à étendre nos frontières par la force. Nos motivations bien sûr ne sont pas purement expansionnistes : nous cherchons aussi à défendre les Pays-Bas contre l'empiètement des rois étrangers."
 gel_looting:0 "Le Pillage comme Paiement"
 gel_looting_desc:0 "Il est toujours difficile de rassembler les fonds pour payer les soldats. Comme alternative au paiement par l'État, de nombreux soldats et mercenaires sont prêts à accepter plutôt le droit de piller la terre de toutes les richesses qu'ils trouvent au cours de leurs campagnes."
 gel_diplomatic_expansion:0 "Négociations Territoriales"
 gel_diplomatic_expansion_desc:0 "La conquête pure et simple est la méthode la plus simple pour revendiquer de nouveaux territoires, mais il y a beaucoup à dire aussi pour une approche diplomatique. Par des mariages stratégiques et des prêts d'argent, notre royaume s'est étendu de possessions mineures en Haute-Gueldre à sa taille actuelle. La Hollande et Utrecht ont emprunté plus à notre trésor abondant qu'ils ne pouvaient rembourser, et nous avons obtenu Nimègue et la Veluwe en garantie. Nous devons obtenir plus de terres en suivant cet exemple."
 EFR_ideas:0 "Idées de Frise Orientale"
 EFR_ideas_start:0 "Traditions de Frise Orientale"
 EFR_ideas_bonus:0 "Ambition de Frise Orientale"
 efr_chiefs:0 "Chefs de Frise Orientale"
 efr_chiefs_desc:0 "La Frise orientale a jusqu'à présent survécu sans devenir une société féodale. La famille Cirksena a récemment gagné le pouvoir sur la région, mais une grande partie de la terre est encore gouvernée de facto par les anciens chefs. En conservant des aspects de l'ancien système tribal, la transition vers un État moderne sera facilitée."
 efr_saxon_feud:0 "La Querelle Saxonne"
 efr_saxon_feud_desc:0 "Plusieurs souverains féodaux revendiquent notre terre comme la leur, parmi eux les ducs de Saxe et les comtes d'Oldenbourg. Nos luttes avec nos voisins allemands laissent une impression durable sur notre tradition militaire."
 efr_religious_thought:0 "Centre de Pensée Religieuse"
 efr_religious_thought_desc:0 "Les nombreuses théologies de la Réforme trouveront un foyer en Frise orientale. Bien que ce soit peut-être un effort voué à l'échec, nous devrions tenter de découvrir si un terrain d'entente pacifique pourrait exister entre le catholicisme et les idéaux de la Réforme."
 efr_dutch_migrants:0 "Migrants Hollandais"
 efr_dutch_migrants_desc:0 "En instituant, ou en maintenant, une large gamme de libertés religieuses et économiques, nous pourrions attirer un grand nombre de migrants hollandais dans nos cités. Parmi eux se trouvent de riches marchands et de sages philosophes qui seraient certainement utiles à l'État."
 efr_mennonism:0 "Refuge des Mennonites"
 efr_mennonism_desc:0 "Même les sectes réformées les plus radicales devraient être les bienvenues dans notre capitale, Emden. Parmi ces sectes se trouve un groupe anabaptiste inhabituel dirigé par le prédicateur Menno Simmons. Ces « Mennonites » prêchent la paix et la compréhension, deux qualités que l'État serait sage d'adopter lui-même."
 efr_city_autonomy:0 "Bourgeois Autonomes"
 efr_city_autonomy_desc:0 "Les bourgeois de la cité réclament l'autonomie depuis de nombreuses années maintenant. Nous avons été réticents à accéder à leurs demandes, mais peut-être est-il temps de considérer les avantages de villes plus autonomes."
 efr_emden_company:0 "La Compagnie d'Emden"
 efr_emden_company_desc:0 "Il est enfin devenu viable de lancer des missions commerciales vers la lointaine Chine. La Frise orientale doit être parmi les nations prêtes à exploiter ses richesses en fondant une compagnie commerciale."
 AAC_ideas:0 "Idées d'Aix-la-Chapelle"
 AAC_ideas_start:0 "Traditions d'Aix-la-Chapelle"
 AAC_ideas_bonus:0 "Ambition d'Aix-la-Chapelle"
 aac_charlemagne_capital:0 "Capitale de Charlemagne"
 aac_charlemagne_capital_desc:0 "Charlemagne lui-même tenait cour au Palais d'Aix-la-Chapelle, et depuis lors la cité a accueilli le couronnement impérial. Bien que le palais soit maintenant en ruines, à sa place nous avons construit un impressionnant Hôtel de Ville qui continue d'être le lieu du banquet de couronnement."
 aac_free_city:0 "Ville Libre d'Empire"
 aac_free_city_desc:0 "Depuis que l'Empire a cessé d'être gouverné directement depuis Aix-la-Chapelle, la cité a détenu le statut d'immédiateté impériale. La cité est autonome, ses dirigeants ne répondent qu'à l'Empereur lui-même."
 aac_spa:0 "Ville Thermale"
 aac_spa_desc:0 "Aix-la-Chapelle est parmi les villes thermales les plus renommées d'Europe. Les supposées propriétés curatives de l'eau rendent les thermes de la cité populaires tant parmi les citoyens que les visiteurs étrangers."
 aac_guilds:0 "Guilde et Gouvernement"
 aac_guilds_desc:0 "Comme de nombreuses cités en Allemagne, les guildes ont une influence sur la gouvernance. À Aix-la-Chapelle, leur influence a tellement grandi que le conseil dirigeant a été forcé d'incorporer les guildes dans le gouvernement lui-même, de sorte que les intérêts industriels sont toujours au premier plan des décisions politiques."
 aac_expel_heretics:0 "Expulser les Fonctionnaires Hérétiques"
 aac_expel_heretics_desc:0 "Alors que les fonctionnaires de la cité passent du catholicisme aux diverses sectes réformées et inversement, nous devons décider d'une foi unique pour la cité et expulser tout fonctionnaire qui ne s'y conforme pas."
 aac_baroque:0 "Architecture Baroque"
 aac_baroque_desc:0 "Il y a de nombreux grands bâtiments à Aix-la-Chapelle qui sont tombés en ruine par la guerre et la négligence. Cela présente une opportunité de reconstruire dans de nouveaux styles architecturaux. Le style baroque est devenu particulièrement influent, et serait une excellente inspiration pour la rénovation de l'Hôtel de Ville."
 aac_congresses:0 "Congrès d'Aix-la-Chapelle"
 aac_congresses_desc:0 "Alors que la poussière retombe après une grande guerre en Europe, les dirigeants doivent venir à la table de paix pour résoudre les conflits. Il n'y a pas de meilleur endroit que la capitale de Charlemagne pour accueillir ces conférences internationales qui apporteront sûrement une nouvelle ère de paix en Europe."
 KLE_ideas:0 "Idées de Clèves"
 KLE_ideas_start:0 "Traditions de Clèves"
 KLE_ideas_bonus:0 "Ambition de Clèves"
 kle_walled_cities:0 "Cités Fortifiées"
 kle_walled_cities_desc:0 "Nos murailles ont repoussé les envahisseurs auparavant. Tant qu'elles sont bien entretenues, elles devraient continuer à défendre efficacement nos villes."
 kle_cleves_mark:0 "Clèves et Mark"
 kle_cleves_mark_desc:0 "Les duchés de Clèves et de Mark sont devenus unis par une union personnelle qui a résisté à l'épreuve du temps. Notre droit de gouverner les deux duchés est fermement établi."
 kle_reformers:0 "Ardents Réformateurs"
 kle_reformers_desc:0 "Clèves est dédié à faire avancer la vraie foi en réformant les doctrines et institutions dépassées et hérétiques."
 kle_marriages:0 "Mariages Stratégiques"
 kle_marriages_desc:0 "Le mariage a traditionnellement été le moyen le plus sûr de sceller une alliance avec une puissance étrangère. En ces temps difficiles, nous devons nous assurer de marier nos filles sagement et aux alliés potentiels les plus résolus."
 kle_united_duchies:0 "Duchés Unis"
 kle_united_duchies_desc:0 "Consolider les titres féodaux empêche la fragmentation du royaume par héritage. Des plans ont été élaborés pour l'union formelle des duchés de Juliers, Clèves et Berg, ce qui devrait servir d'exemple pour notre expansion future."
 kle_educated_duisburg:0 "Duisbourg Éduqué"
 kle_educated_duisburg_desc:0 "La cité de Duisbourg sera renommée pour sa population éduquée. Nous devrions inviter des cartographes prometteurs tels que Mercator et Corputius pour cartographier le monde, et établir des académies pour faire avancer les sciences."
 kle_renovate_swan_castle:0 "Militariser le Schwanenburg"
 kle_renovate_swan_castle_desc:0 "Le Schwanenburg a subi une série de rénovations largement cosmétiques au fil des ans. Son emplacement cependant est stratégique, et il y a un potentiel pour que le château devienne une véritable fortification militaire, garnie par le village qui se trouve dans son ombre."
 tau_elephant_battles:0 "Guerre Éléphantesque"
 tau_elephant_battles_desc:0 "Les jungles denses d'Asie du Sud-Est sont difficiles à traverser pour les chevaux, et nous avons donc traditionnellement entraîné des éléphants comme montures pour nos plus grands commandants. Nous devons agrandir les Écuries Royales afin de pouvoir aligner des centaines de ces puissantes bêtes dans nos armées."
 tau_organized_campaigns:0 "Campagnes Militaires Organisées"
 tau_organized_campaigns_desc:0 "Pour atteindre nos ennemis, nous devons souvent parcourir de grandes distances à travers un terrain hostile. Nous devons planifier nos campagnes longtemps à l'avance, en nous assurant d'être bien approvisionnés et que les conditions dans les camps ne favorisent pas la maladie ou la désertion. Avec ces préparatifs en place, nous marcherons nos armées vers le Siam et au-delà !"
 AVA_ideas:0 "Idées d'Ava"
 AVA_ideas_start:0 "Traditions d'Ava"
 AVA_ideas_bonus:0 "Ambition d'Ava"
 ava_rajadhiraja:0 "Rajadhiraja"
 ava_rajadhiraja_desc:0 "Nous avons pris le titre de Rajadhiraja, Roi des Rois, car de nombreux petits souverains rendent hommage à notre dynastie. En gagnant le respect de tout le peuple birman, nos armées grossiront de recrues prêtes à servir le Roi."
 ava_bamar_literature:0 "Patronner la Littérature Birmane"
 ava_bamar_literature_desc:0 "Il est de tradition de patronner les œuvres littéraires en langue pali, prestigieuse qu'elle est dans les cercles bouddhistes. Cependant, nous ne devons pas négliger de patronner notre vernaculaire birman natif également. Une forte tradition littéraire enrichira notre culture de cour et inspirera nos dirigeants."
 ava_hill_tribes:0 "Recruter parmi les Tribus des Collines"
 ava_hill_tribes_desc:0 "Les collines à l'est d'Ava abritent de nombreuses tribus disparates et belliqueuses. Bien qu'elles tentent parfois imprudemment de se battre contre nous, nous devrions convaincre ces tribus par les mots ou par l'argent qu'il serait préférable de combattre sous notre bannière."
 ava_shan_in_line:0 "Tenir les Shan en Respect"
 ava_shan_in_line_desc:0 "Les nombreux Mongs Shan sont une épine constante dans notre flanc. Ils cherchent à usurper notre autorité et à retenir le tribut légitimement dû à chaque occasion. Il est temps d'exercer un plus grand contrôle sur les clans qui nous rendent hommage."
 ava_provincial_governors:0 "Réfréner les Gouverneurs Provinciaux"
 ava_provincial_governors_desc:0 "Nous accordons trop de latitude à nos gouverneurs provinciaux. Bien trop souvent ils ont conspiré pour le trône ou manqué à fournir les soldats qui nous sont dus. Nous instituerons un système rigoureux par lequel nous récompenserons uniquement nos serviteurs les plus loyaux avec des gouvernorats, chacun nommé directement par le Roi."
 DEC_ideas:0 "Idées du Deccan"
 DEC_ideas_start:0 "Traditions du Deccan"
 DEC_ideas_bonus:0 "Ambition du Deccan"
 dec_diwan_funding:0 "Financer le Diwan"
 dec_diwan_funding_desc:0 "Divisons nos terres en trois parts égales. L'une ira à l'État lui-même, pour prendre soin de nos souverains et du trésor, l'une appartiendra à la noblesse et aux autres détenteurs de pouvoir, et le dernier tiers devrait être entièrement dédié au financement des besoins du Diwan. De cette façon, nous nous assurons que tous les projets d'infrastructure sont entièrement payés sans taxer les autres revenus de l'État."
 dec_foreign_trade_privileges:0 "Privilèges pour les Marchands Étrangers"
 dec_foreign_trade_privileges_desc:0 "Les ports du Deccan attirent des marchands du monde entier et c'est de ce commerce qu'une grande partie de notre richesse dérive. Nous devons faire tout notre possible pour sauvegarder la relation entre nous et les marchands étrangers qui investissent régulièrement dans notre État et viennent redistribuer nos marchandises."
 dec_empower_paigah:0 "Renforcer les Paigah"
 dec_empower_paigah_desc:0 "Certaines familles ont rendu de plus grands services que d'autres. Nous devons récompenser nos partisans les plus ardents et leur accorder de grandes libertés au sein de notre État. De cette façon, nous aurons une faction de partisans enracinée toujours prête à contribuer à notre cause avec des hommes, des officiers et des administrateurs."
 dec_modernize_the_sarf_e_khas:0 "Moderniser le Sarf-e-Khas"
 dec_modernize_the_sarf_e_khas_desc:0 "Bien que nos troupes aient un fier héritage en matière militaire remontant au XIVe siècle, nous devons aussi être ouverts à évoluer avec notre temps. Invitons tous les étrangers qui ont des idées que nous pouvons utiliser pour moderniser nos armées. L'exercice, la discipline et les manœuvres rapides sont l'avenir et seront le seul moyen de battre les ennemis que nous affronterons dans le futur."
 dec_jewels_of_the_nizams:0 "Joyaux des Nizams"
 dec_jewels_of_the_nizams_desc:0 "Le Deccan est une terre de grandes richesses et pendant des siècles les mines sous notre contrôle ont été la plus grande, voire la seule, source de diamants majeurs dans le monde entier. Aspirons à montrer ces richesses au monde, afin qu'il soit toujours conscient de la splendeur de notre cour. Émeraudes, perles, diamants, rubis et toutes autres sortes de pierres seront bientôt synonymes de la mention de notre nom."
 dec_encourage_industries:0 "Encourager la Croissance des Industries"
 dec_encourage_industries_desc:0 "Notre terre est riche en matières premières mais n'a pas la même concentration de centres manufacturiers que dans le nord. Utilisons les fonds de l'État pour encourager la croissance de l'entreprise privée afin que nous ayons bientôt un secteur florissant de produits raffinés nous-mêmes, que nous pourrons ensuite exporter par les grands ports de commerce que nous contrôlons déjà."
 DLH_ideas:0 "Idées de Delhi"
 DLH_ideas_start:0 "Traditions de Delhi"
 DLH_ideas_bonus:0 "Ambition de Delhi"
 dlh_afghan_nobility:0 "Noblesse Afghane"
 dlh_afghan_nobility_desc:0 "Une grande partie de la noblesse de Delhi est issue des rangs des Pachtounes afghans, un peuple avec une longue histoire de conquête et de règne dans le nord de l'Inde. Bien que parfois un obstacle politique, leurs compétences martiales sont incontestables."
 dlh_suppress_rebellion:0 "Réprimer la Rébellion"
 dlh_suppress_rebellion_desc:0 "Il existe de nombreuses sources potentielles de rébellion : la noblesse afghane, la population hindoue et les Rajputs mécontents peuvent tous devenir des menaces pour notre nation. La meilleure politique pour faire face à de telles menaces est de les réprimer violemment avant qu'elles n'éclatent en désastre."
 dlh_expansionism:0 "Restaurer l'Empire de Delhi"
 dlh_expansionism_desc:0 "Le Sultanat de Delhi englobait jadis presque toute l'Inde. Il doit renaître !"
 dlh_textile_innovation:0 "Promouvoir l'Innovation dans la Production Textile"
 dlh_textile_innovation_desc:0 "L'industrie textile florissante à Delhi fait de notre nation un centre d'innovation technologique pour l'industrie. En tant qu'adopteurs précoces de l'égreneuse à coton et du rouleau à engrenage hélicoïdal, nous connaissons l'importance de rester à la pointe en ces matières. Nous devons maintenant nous assurer que le rouet est adopté aussi largement que possible."
 dlh_reconquest:0 "Réintégrer les Anciennes Provinces"
 dlh_reconquest_desc:0 "Le Sultanat de Delhi, autrefois vaste, a perdu la plupart de ses anciennes possessions, mais nous n'avons pas oublié les moyens de les administrer. Alors que nous œuvrons à restaurer notre gloire passée, nous rappellerons aux souverains locaux leurs devoirs envers le Sultan."
 dlh_grand_trunk:0 "Protéger la Grand Trunk Road"
 dlh_grand_trunk_desc:0 "La Grand Trunk Road s'étend de Kaboul en Afghanistan à la côte du Bengale. Beaucoup des cités commerçantes les plus importantes le long de sa route font partie de notre Empire, et il nous incombe donc de veiller à ce que la Route soit bien entretenue et libre de brigandage."
 dlh_throne_of_india:0 "Le Trône de l'Inde"
 dlh_throne_of_india_desc:0 "Pendant des siècles, chaque grand empire indien a été gouverné depuis Delhi. C'est le siège des conquérants, et notre droit de naissance. Tous doivent savoir que Delhi est à nouveau le foyer du souverain légitime de toute l'Inde !"
 BHA_ideas:0 "Idées Bharaties"
 BHA_ideas_start:0 "Traditions Bharaties"
 BHA_ideas_bonus:0 "Ambition Bharatie"
 bha_modernized_war_elephants:0 "Tactiques d'Éléphants de Guerre Modernisées"
 bha_modernized_war_elephants_desc:0 "Avec la prévalence croissante de l'artillerie sur le champ de bataille, nous avons raison de réévaluer nos tactiques d'éléphants de guerre. Nous devons équiper tant nos éléphants que leurs mahouts d'une armure suffisante, étendre leur utilisation dans la logistique militaire, et considérer leurs applications dans le domaine de la poliorcétique."
 bha_united_india:0 "Unir le Sous-Continent"
 bha_united_india_desc:0 "Les nombreux peuples, cultures, langues et nations qui composent le sous-continent indien seront unis ; notre diversité nous donnera de la force."
 bha_sanskrit_golden_age:0 "Âge d'Or de la Littérature Sanskrite"
 bha_sanskrit_golden_age_desc:0 "La littérature sanskrite est en déclin depuis les conquêtes islamiques des siècles passés. Il est temps de raviver nos traditions textuelles les plus anciennes, de les présenter à de nouvelles générations d'érudits et de promouvoir une société alphabétisée à travers notre nation."
 bha_indian_army:0 "Armée Indienne"
 bha_indian_army_desc:0 "Une seule armée marchant sous une seule bannière, une force militaire disciplinée portant un seul uniforme : telle est notre vision pour l'armée indienne."
 bha_ganga:0 "Ganga"
 bha_ganga_desc:0 "De nombreux hindous vénèrent le fleuve Gange comme une déesse, apportant pureté et rédemption aux fidèles. Nous implorons les pèlerins de visiter les berges du fleuve pour se baigner dans les eaux sacrées. Par Ganga, notre nation est purifiée."
 bha_rocketry:0 "Développer la Technologie des Fusées"
 bha_rocketry_desc:0 "Les fusées à coque de fer n'ont pas encore été largement adaptées à des fins militaires, pourtant leur puissance explosive a sûrement des applications tactiques. Nous devrions expérimenter avec cette technologie et la tester sur le champ de bataille."
 bha_brahmin_administration:0 "Administration Brahmane"
 bha_brahmin_administration_desc:0 "Les Brahmanes ont longtemps été impliqués dans l'administration de l'État à travers l'Inde. Il est temps d'institutionnaliser leur rôle dans la bureaucratie. Cela cimentera à la fois leur pouvoir dans l'État et dans la société, tout en s'assurant que les Brahmanes comprennent que leur rôle est administratif plutôt que politique."
 HIN_ideas:0 "Idées Hindoustanies"
 HIN_ideas_start:0 "Traditions Hindoustanies"
 HIN_ideas_bonus:0 "Ambition Hindoustanie"
 hin_sepahi:0 "Sipahi"
 hin_sepahi_desc:0 "Négliger l'importance des soldats d'infanterie a été la perte de nombreux aspirants conquérants en Inde. Nous devons nous assurer que notre infanterie Sipahi est équipée des armes à feu les plus efficaces et formée aux tactiques les plus modernes."
 hin_indian_empire:0 "Ambition Impériale Indienne"
 hin_indian_empire_desc:0 "Aucun souverain, qu'il soit musulman, hindou, bouddhiste ou jaïn, n'a jamais réussi à conquérir l'intégralité de l'Inde. Nous serons les premiers souverains universels de l'Inde !"
 hin_peacock_throne:0 "Le Trône du Paon"
 hin_peacock_throne_desc:0 "Un grand souverain doit avoir un grand trône. Orné de toutes sortes de pierres précieuses sous le soleil et inscrit des noms de nos monarques exaltés, le Trône du Paon est véritablement splendide."
 hin_industrialization:0 "Proto-Industrialisation"
 hin_industrialization_desc:0 "Les conditions de l'économie indienne sont idéales pour une expansion industrielle rapide. À mesure que de nouvelles technologies deviennent disponibles pour la production, particulièrement dans l'industrie textile, notre État panindien peut s'assurer qu'elles sont adoptées rapidement."
 hin_gunpowder_empire:0 "Empire de la Poudre"
 hin_gunpowder_empire_desc:0 "La maîtrise de la guerre à la poudre est la clé de la maîtrise de l'Inde. Nos canons et mousquets doivent inspirer une telle peur dans le cœur de nos ennemis qu'ils ne voudront pas nous affronter directement sur le champ de bataille. Quand la bataille est engagée, nos tactiques devraient se concentrer sur causer le plus grand nombre possible de victimes et le chaos dans les rangs ennemis."
 hin_persianate_court:0 "Culture de Cour Persane"
 hin_persianate_court_desc:0 "La langue persane et les coutumes de cour sont devenues les plus politiquement et académiquement importantes du monde musulman. Notre propre nation a adopté avec enthousiasme ces coutumes, et ce faisant nous avons attiré de nombreux conseillers compétents et éduqués parlant persan dont les services à notre administration ne peuvent être sous-estimés."
 hin_sufism:0 "Patronner les Missionnaires Soufis"
 hin_sufism_desc:0 "Les princes musulmans du monde entier se font concurrence pour attirer les plus sages maîtres soufis. À mesure que notre renommée a grandi, plus de ces soufis nous ont rejoints. Des villes sont fondées là où ils s'installent, souvent dans des régions auparavant inhospitalières, et les populations locales sont inspirées à se convertir à l'islam par la sagesse des soufis."
 RJP_ideas:0 "Idées du Rajputana"
 RJP_ideas_start:0 "Traditions du Rajputana"
 RJP_ideas_bonus:0 "Ambition du Rajputana"
 rjp_imperial_legacy:0 "Héritage Impérial"
 rjp_imperial_legacy_desc:0 "Nous avons ravivé les ambitions impériales des Rajputs et repris Kannauj et Avanti, formant à nouveau l'empire qui régnait jadis sur tout le nord de l'Inde. Maintenant, des guerriers Rajputs de toute la région affluent sous nos bannières, prêts à mourir pour la cause commune."
 rjp_land_of_petty_princes:0 "Roi des Petits Princes"
 rjp_land_of_petty_princes_desc:0 "Pendant des siècles, les royaumes Rajputs ont été divisés en une myriade de petits royaumes, se combattant les uns les autres plus que nos ennemis communs. Avec les nombreux princes du Rajputana maintenant unis sous une seule bannière, prêts à servir un seul souverain commun, nous serons une force irrésistible."
 rjp_purbia_legacy:0 "Héritage Purbia"
 rjp_purbia_legacy_desc:0 "Les artilleurs Rajputs ont une réputation dans toute l'Inde et ont parfois été incorporés dans de nombreuses armées de sultanats et de royaumes également. Maintenant que nous avons uni les royaumes Rajputs, l'expérience qu'ils ont avec les armes à feu nous permettra de construire un nouveau type d'armée centrée sur l'utilisation des mousquets, des roquettes et des canons."
 rjp_protectors_of_the_dharma:0 "Protecteurs du Dharma"
 rjp_protectors_of_the_dharma_desc:0 "Peu ont résisté aux invasions extérieures de l'Inde autant que les royaumes Rajputs d'antan. Nous sommes maintenant le nouveau rempart de notre foi, prêts à défendre le sous-continent contre ceux qui voudraient imposer leur règne et leur foi à notre peuple."
 rjp_expanded_artillery_arm:0 "Branche d'Artillerie Étendue"
 rjp_expanded_artillery_arm_desc:0 "Les sièges sont ce qui gagne les guerres. Nous devons expérimenter des moyens de créer des canons plus gros et meilleurs pour abattre les nombreux forts de nos ennemis en Inde et en dehors."
 rjp_monumental_architecture:0 "Architecture Monumentale"
 rjp_monumental_architecture_desc:0 "Un nouvel empire requiert un nouveau style. Nous devons construire sur l'architecture monumentale classique du Rajputana et de Kannauj impérial pour créer un nouveau style digne de notre empire grandissant."
 NAG_ideas:0 "Idées de Nagpur"
 NAG_ideas_start:0 "Traditions de Nagpur"
 NAG_ideas_bonus:0 "Ambition de Nagpur"
 nag_unite_gonds_and_garjats:0 "Unir les Gonds et les Garjats"
 nag_unite_gonds_and_garjats_desc:0 "Les tribus fractionnées de Gonds et de Garjats qui habitent l'Inde centrale doivent être unies sous notre règne. Les vieilles querelles et chamailleries doivent prendre fin afin que nous puissions atteindre nos objectifs communs."
 nag_harsh_terrain:0 "Exploiter le Terrain Hostile"
 nag_harsh_terrain_desc:0 "Une grande partie de notre territoire est difficile à traverser pour les armées, et encore plus pour y livrer bataille. Nos propres guerriers connaissent cette région depuis des siècles et savent comment l'exploiter à leur avantage."
 nag_send_for_artisans:0 "Faire Venir des Artisans"
 nag_send_for_artisans_desc:0 "Nagpur est une nouvelle cité, un nouveau royaume. Nous devons faire venir des artisans et des architectes de tous les coins de l'Inde pour développer nos palais, nos infrastructures et nos temples afin de mettre Nagpur sur la carte."
 nag_light_cav:0 "Tactiques de Choc de Cavalerie Légère"
 nag_light_cav_desc:0 "La cavalerie lourde et les canons encombrants constituent une grande partie de nombreuses armées indiennes. En employant des régiments de cavalerie légère, nous pouvons facilement déborder et distancer nos ennemis, causant de grands dégâts là où ils s'y attendent le moins."
 nag_cultivating_the_forest:0 "Cultiver la Forêt"
 nag_cultivating_the_forest_desc:0 "Les forêts denses de l'Inde centrale ne sont pas exactement renommées pour leurs terres agricoles fertiles. Nous devons néanmoins nous assurer de pouvoir cultiver assez de nourriture et extraire assez de richesse de nos terres. Il est temps de commencer à défricher la forêt pour faire place à notre expansion."
 nag_invite_maratha_warriors:0 "Inviter des Guerriers Marathes"
 nag_invite_maratha_warriors_desc:0 "Les guerriers Marathes ont surgi de leurs terres natales du Maharashtra. Beaucoup de leurs généraux offrent leurs services et leurs armées aux souverains qu'ils jugent dignes. Nous devrions courtiser ces généraux pour attirer une nouvelle caste militaire dans notre nation."
 nag_no_cb_best_cb:0 "Expansion Injustifiée"
 nag_no_cb_best_cb_desc:0 "Nos ennemis sont faibles et nous sommes forts. Ils contrôlent des terres riches que nous désirons pour nous-mêmes. Quelle raison de plus nous faudrait-il pour prendre tout ce qu'ils ont ?"
 deccani_muslim_ideas:0 "Idées des Sultanats du Deccan"
 deccani_muslim_ideas_start:0 "Traditions des Sultanats du Deccan"
 deccani_muslim_ideas_bonus:0 "Ambition des Sultanats du Deccan"
 dec_legacy_of_bahmanis:0 "Héritage du Sultanat Bahmani"
 dec_legacy_of_bahmanis_desc:0 "Les Bahmani sont déchus de leur ancienne gloire, mais leur héritage perdure. D'eux nous avons hérité nombre des institutions de l'État, notre culture de cour et nos traditions martiales. Nous devons démontrer que nous sommes leurs vrais successeurs en honorant ces traditions."
 dec_deccani_identity:0 "Promouvoir l'Identité Régionale du Deccan"
 dec_deccani_identity_desc:0 "Une révolution culturelle est en cours dans notre nation. Nous distançant des empires persans du nord, nous embrassons et promouvons avec enthousiasme les cultures locales du Deccan. Nous sommes même allés jusqu'à adopter les langues du Deccan pour les comptes officiels de l'État."
 dec_brahmin_administrators:0 "Nommer des Administrateurs Brahmanes"
 dec_brahmin_administrators_desc:0 "Ignorer les services que les Brahmanes pourraient nous offrir serait insensé. Ils nous seraient fort utiles employés dans la bureaucratie d'État, tant que nous ne leur accordons pas trop d'influence."
 dec_habshis:0 "Acheter des Habshis"
 dec_habshis_desc:0 "Les Habshis, soldats-esclaves éthiopiens, peuvent être achetés en grand nombre auprès des marchands arabes qui fréquentent nos marchés. Loin d'être de simples chairs à canon, les Habshis constitueront l'élite de nos soldats d'infanterie. Les Habshis qui démontrent leur loyauté et leurs prouesses martiales devraient être récompensés par le pouvoir et des responsabilités, car qui mieux pour garder le Sultan que celui qui lui doit tout ?"
 dec_bargi_giri:0 "Bargi Giri"
 dec_bargi_giri_desc:0 "La cavalerie légère marathe hautement mobile sera d'une grande utilité si nous nous trouvons en guerre avec les armées lourdes en canons du nord de l'Inde. Ces cavaliers sont capables de piller la terre et de s'échapper avant que nos ennemis puissent rassembler une force pour les repousser, ou même de désactiver les canons ennemis lors d'audacieuses attaques de flanc."
 dec_marathi_cultivators:0 "Renforcer les Liens avec les Cultivateurs Marathes"
 dec_marathi_cultivators_desc:0 "Tout comme nous avons accueilli les guerriers Marathes dans nos rangs, nous devrions aussi accueillir ceux qui travaillent la terre. Les Marathes ont des liens forts avec les communautés paysannes que nous devons exploiter pour nous assurer que la terre est productive."
 dec_marathi_habshi_state:0 "État Conjoint Marathe-Habshi"
 dec_marathi_habshi_state_desc:0 "L'ancienne division politique entre les Occidentaux et les Deccanis est terminée, les deux factions s'étant épuisées par leurs luttes intestines. Le vide de pouvoir qui en résulte a été comblé par nos soldats-esclaves Habshis et par les Marathes de plus en plus influents. Leur pouvoir conjoint assurera la force et la survie continues de notre nation."
 nepalese_minor_ideas:0 "Idées des Principautés Népalaises"
 nepalese_minor_ideas_start:0 "Traditions des Principautés Népalaises"
 nepalese_minor_ideas_bonus:0 "Ambition des Principautés Népalaises"
 nep_kashmiri_traders:0 "Inviter des Marchands Cachemiris"
 nep_kashmiri_traders_desc:0 "Les marchands du Cachemire ont des connexions étendues qui s'étendent à travers l'Inde, le Tibet et la Perse. Nous devons convaincre certains d'entre eux de visiter notre cour afin d'être mieux informés des marchés étrangers et de la façon dont ils pourraient être exploités."
 nep_new_festivals:0 "Instituer de Nouveaux Festivals"
 nep_new_festivals_desc:0 "Il ne suffit pas d'honorer les dieux en construisant des temples ; nous devons aussi les célébrer publiquement en organisant des festivals réguliers en leur nom. Les divinités les plus dignes de notre affection sont Indra, le Roi du Ciel, et Kumari, la déesse vivante qui s'incarne sous la forme d'une jeune fille. En plus de servir les dieux, ces festivals seront aussi populaires parmi le peuple."
 nep_kavindra:0 "Kavindra"
 nep_kavindra_desc:0 "Notre souverain adoptera le titre de Kavindra, « Roi des Poètes ». Tout le peuple du Népal sera ému par ses œuvres."
 nep_construct_temples:0 "Poursuivre la Construction de Temples"
 nep_construct_temples_desc:0 "Chaque souverain successif de notre nation continue l'héritage de son prédécesseur en poursuivant la tradition de construction de temples. Qu'il s'agisse d'agrandir des temples existants, de financer le développement de nouveaux, ou d'introduire de nouveaux styles architecturaux, nos souverains doivent continuer à honorer les dieux."
 nep_seize_mountain_passes:0 "S'Emparer des Cols de Montagne"
 nep_seize_mountain_passes_desc:0 "Le terrain montagneux du Népal force les armées à marcher par certains cols si elles souhaitent atteindre leur destination en sécurité et rapidement. Nous devons identifier chaque route probable vers notre nation, nous emparer du territoire et fortifier les cols afin que nos ennemis ne puissent pas entrer sans subir de lourdes pertes."
 nep_judicial_reforms:0 "Mettre en Œuvre des Réformes Judiciaires"
 nep_judicial_reforms_desc:0 "Les lois de notre nation ont jusqu'à présent été désorganisées, appliquées de manière inégale et arbitraires. Il est temps de mettre en œuvre un code de lois simple, juste et facilement applicable."
 nep_end_division_of_domains:0 "Mettre Fin à la Division des Domaines"
 nep_end_division_of_domains_desc:0 "Les domaines des princes népalais n'ont cessé de rétrécir alors que leurs terres sont divisées entre ses fils à la mort du roi. Nous devons instituer une ligne de succession claire et unique pour garder notre royaume unifié."
 MER_ideas:0 "Idées de Mewar"
 MER_ideas_start:0 "Traditions de Mewar"
 MER_ideas_bonus:0 "Ambition de Mewar"
 mer_rajput_heartland:0 "Cœur du Rajput"
 mer_rajput_heartland_desc:0 "Mewar est à la fois le cœur géographique et politique de la culture Rajput. Les Rajputs dans toute l'Inde se tournent vers nous pour obtenir des conseils et un ancrage dans nos traditions séculaires."
 mer_victory_tower:0 "Construire la Tour de la Victoire"
 mer_victory_tower_desc:0 "Dans notre capitale, nous construirons une tour imposante qui dominera le paysage. Ornée d'icônes des dieux et d'inscriptions relatant nos nobles exploits, la Tour de la Victoire sera un symbole de notre quête sans fin de gloire."
 mer_kumbhalgarh:0 "Le Fort de Kumbhalgarh"
 mer_kumbhalgarh_desc:0 "Chittorgarh reste notre fort le plus grand et le plus vital, mais nous ne devons pas négliger les défenses du reste du royaume. Nous devons engager les architectes les plus habiles pour concevoir des forts imprenables à travers notre royaume, en commençant par le site stratégique de Kumbhalgarh. Les murs immensément longs qui seront nécessaires pour protéger la zone en font un projet ambitieux, mais notre détermination à défendre notre peuple assurera qu'il soit réalisé."
 mer_city_of_lakes:0 "Cité des Lacs"
 mer_city_of_lakes_desc:0 "Guidés par les bénédictions d'un sage ermite, nos souverains ont décidé qu'il est temps de construire une magnifique nouvelle capitale pour notre nation. En utilisant des barrages pour contrôler le flux des rivières, nous créerons plusieurs lacs artificiels d'où nous pourrons tirer de l'eau douce pour Udaipur, justement nommée la Cité des Lacs."
 mer_recall_purbias:0 "Rappeler les Purbias"
 mer_recall_purbias_desc:0 "Les Rajputs se sont répandus dans tout le nord de l'Inde dans leur quête de gloire pour leur clan. Il est temps de leur rappeler leur devoir envers leur patrie ancestrale ; nous enverrons le message que tous les Rajputs loyaux devraient venir servir à Mewar."
 mer_firearm_drilling:0 "Exercices Obligatoires aux Armes à Feu"
 mer_firearm_drilling_desc:0 "De nombreux soldats Rajputs sont devenus experts dans l'utilisation des armes à feu personnelles. Nous devons mettre ces vétérans endurcis au travail pour former la prochaine génération de soldats plutôt que de risquer la perte de leur expertise au combat. Tous nos soldats doivent être formés aux tactiques d'armes à feu avant qu'on attende d'eux qu'ils affrontent nos ennemis en première ligne."
 mer_reorganized_rajput_regiments:0 "Régiments Rajputs Réorganisés"
 mer_reorganized_rajput_regiments_desc:0 "Les structures claniques traditionnelles sont une excellente base pour un système régimentaire modernisé. Les hiérarchies existantes basées sur la parenté et la loyauté inconditionnelle peuvent être facilement traduites en une chaîne de commandement organisée et formelle."
 BNG_ideas:0 "Idées du Sultanat du Bengale"
 BNG_ideas_start:0 "Traditions du Sultanat du Bengale"
 BNG_ideas_bonus:0 "Ambition du Sultanat du Bengale"
 bng_combat_piracy:0 "Combattre la Piraterie Côtière"
 bng_combat_piracy_desc:0 "Les pirates ont infesté les eaux de la baie du Bengale depuis trop longtemps. Nous devons protéger les marchands en route vers nos ports en découvrant et en éliminant les repaires de pirates le long de la côte d'Arakan."
 bng_habshi_generals:0 "Promouvoir les Généraux Habshis"
 bng_habshi_generals_desc:0 "Les soldats-esclaves abyssins achetés sur les marchés arabes jouent un rôle significatif comme soldats d'infanterie d'élite. Ceux qui excellent en tant que chefs recevront des niveaux de commandement plus élevés, tandis que ceux qui démontrent une loyauté exceptionnelle constitueront la garde du palais."
 bng_conquest_of_the_gangetic_plain:0 "Conquête de la Plaine Gangétique"
 bng_conquest_of_the_gangetic_plain_desc:0 "À l'ouest se trouvent les terres fertiles et peuplées de la plaine indo-gangétique. Les sultans du Bengale ont longtemps convoité ses grandes cités et sa vaste richesse, mais ce n'est que maintenant, alors qu'une nouvelle génération ambitieuse de généraux monte au pouvoir, que notre ambition a des chances de devenir réalité. Nous devons faire tout notre possible pour préparer nos forces pour la conquête à venir."
 bng_rupees:0 "Commencer la Frappe de Roupies"
 bng_rupees_desc:0 "L'absence d'une monnaie standardisée largement adoptée freine le développement du commerce indien. En tant que l'une des premières puissances économiques du sous-continent, nous sommes bien placés pour commencer la frappe d'une nouvelle monnaie d'argent avec des poids standards, que nous appellerons la roupie."
 bng_clearing_the_delta:0 "Défricher le Delta"
 bng_clearing_the_delta_desc:0 "Le delta du Bengale contient une immense étendue de terres potentiellement très profitables qui restent inexploitées en raison d'une épaisse couverture forestière. Nous devons subventionner les efforts pour défricher les forêts afin de faire place à de nouvelles terres agricoles, des cités et des comptoirs commerciaux."
 bng_bengali_industrialization:0 "Industrialisation Bengalie"
 bng_bengali_industrialization_desc:0 "Le Bengale est dans une position unique en Inde pour commencer une révolution sans précédent. Nous sommes prêts à exploiter les nouveaux développements dans nos industries textiles et de construction navale déjà de classe mondiale. Commençons une révolution industrielle !"
 bng_attract_sufis:0 "Attirer des Érudits Soufis"
 bng_attract_sufis_desc:0 "Les Soufis ont longtemps été des innovateurs de la pensée islamique ainsi que de sages conseillers. Si nous souhaitons être une voix de premier plan dans l'avenir du monde islamique, nous devons patronner des loges soufies et convaincre les plus sages de leur ordre de s'installer dans notre domaine."
 GUJ_ideas:0 "Idées du Sultanat du Gujarat"
 GUJ_ideas_start:0 "Traditions du Sultanat du Gujarat"
 GUJ_ideas_bonus:0 "Ambition du Sultanat du Gujarat"
 guj_trading_outposts:0 "Établir de Nouveaux Ports de Commerce"
 guj_trading_outposts_desc:0 "La proximité de la côte ouest de l'Inde avec l'Arabie ouvre des opportunités commerciales. Les marchands étant aussi inconstants qu'ils le sont, nous n'avons pas besoin de conquérir des comptoirs commerciaux existants pour attirer leur attention. Si nous établissons nos propres comptoirs commerciaux et adoptons des politiques favorables aux marchands étrangers, ils peuvent être persuadés de faire affaire avec nous plutôt qu'avec nos rivaux."
 guj_kathiawari_horses:0 "Chevaux Kathiawaris"
 guj_kathiawari_horses_desc:0 "Les chevaux élevés sur la péninsule de Kathiawar sont particulièrement adaptés à la guerre du désert. Ils sont capables d'endurer une chaleur torride, ne nécessitent qu'un minimum de nourriture, et sont capables d'endurer des voyages sur de grandes distances. Nous devons nous assurer qu'il y a toujours assez de ces destriers pour que nos cavaliers montent au combat."
 guj_jain_bankers:0 "Refuge pour les Banquiers Jaïns"
 guj_jain_bankers_desc:0 "Les Jaïns continuent d'être persécutés dans une grande partie de l'Inde, mais ils trouveront un refuge dans les royaumes gujaratis. Un traitement équitable de la communauté jaïne nous a valu le respect des riches familles de banquiers jaïns, qui sont prêtes à offrir des taux d'intérêt favorables à notre nation."
 guj_rajput_dynasties:0 "Dynasties Rajputs"
 guj_rajput_dynasties_desc:0 "Les clans Rajputs se sont enracinés dans la politique gujaratie. Leurs coutumes et querelles anciennes sont souvent une source de tension, mais ils nous confèrent aussi de la crédibilité en tant que nation pertinente pour le monde politique plus large."
 guj_protect_dwarkadhish_temple:0 "Protéger le Temple de Dwarkadhish"
 guj_protect_dwarkadhish_temple_desc:0 "L'un des sites de pèlerinage les plus importants de la foi hindoue, le temple de Dwarkadhish est dédié au dieu Krishna. Quel que soit son gardien actuel, tous les royaumes gujaratis ont la responsabilité de s'assurer qu'il n'est pas mis à sac ou pillé par des envahisseurs étrangers. Remplir ce devoir assure la foi et la loyauté continues de nos sujets hindous."
 guj_ashapura_mata:0 "Ashapura Mata"
 guj_ashapura_mata_desc:0 "Le culte de la déesse Ashapura Mata est presque exclusif au Gujarat. Elle est considérée comme la divinité gardienne de la région, et donc le respect doit lui être rendu si nous souhaitons que notre règne soit perçu comme légitime par le peuple gujarati."
 guj_african_trade:0 "Étendre les Routes Commerciales vers l'Afrique"
 guj_african_trade_desc:0 "Les marchands gujaratis ont établi des routes commerciales qui s'étendent aux confins de l'Asie. Certains ont même trouvé leur chemin jusqu'en Afrique de l'Est, où ils commercent l'ivoire, l'or et les esclaves. Nous devons nous assurer que les richesses de l'Afrique trouvent leur chemin dans nos coffres."
 garjati_ideas:0 "Idées Garjaties"
 garjati_ideas_start:0 "Traditions Garjaties"
 garjati_ideas_bonus:0 "Ambition Garjatie"
 garjati_ancient_mandalas:0 "Anciens Mandalas"
 garjati_ancient_mandalas_desc:0 "Pendant des siècles, le pays Garjat a été divisé en un certain nombre de Mandalas, et bien que leur origine soit maintenant un mystère lointain, ils restent les points centraux auxquels beaucoup des plus petites tribus et États de cette région sont loyaux. Quel que soit celui qui a conquis ou s'est étendu en Orissa ou dans le pays Garjat, ces structures rendent le règne à la fois plus efficace et moins conflictuel qu'il ne le serait autrement."
 garjati_tribal_feudatories:0 "Feudataires Tribaux"
 garjati_tribal_feudatories_desc:0 "Le paysage politique des Garjats peut sembler difficile à comprendre pour certains. Nous sommes capables de faire appel à des troupes d'une zone bien plus large que notre étendue géographique ne l'indiquerait à première vue, car il y a des feudataires loyaux envers nous dans tout ce pays."
 garjati_extend_tanks_and_reservoirs:0 "Étendre les Réservoirs et Citernes"
 garjati_extend_tanks_and_reservoirs_desc:0 "Toutes les terres sous notre contrôle ne pourraient pas être qualifiées de fertiles et adaptées à l'agriculture, surtout si on les comparait aux basses terres du delta du Mahanadi ou à la plaine indo-gangétique. C'est pourquoi rois et princes ont pendant des siècles dépensé l'argent qu'ils avaient pour la construction de grandes citernes et réservoirs.\nNous devons poursuivre cette tradition et investir ce que nous pouvons dans de telles choses, en nous assurant de pouvoir avoir un secteur agricole productif même dans des terres comme celles-ci."
 garjati_jungle_warfare:0 "Guerre de Jungle"
 garjati_jungle_warfare_desc:0 "Le pays Garjat est différent de nombreuses parties du sous-continent en ce qu'il est plus sauvage et moins colonisé. Jungles et collines couvrent toute la région et la cavalerie traditionnelle y est beaucoup moins utile. Au lieu de cela, nous avons développé notre propre mode de guerre, reposant sur des raids à petite échelle, des éléphants et une bonne connaissance d'une terre difficile à reconnaître. À mesure que nous nous étendons, nous devons adapter ces compétences à de nouvelles zones, sans jamais oublier que par de telles tactiques même une petite armée peut vaincre un ennemi beaucoup plus grand."
 garjati_jagannath_cult:0 "Culte de Jagannath"
 garjati_jagannath_cult_desc:0 "Nos terres sont en général plus ouvertes aux diverses religions et cultes que beaucoup d'autres, mais le culte de Jagannath, le « Seigneur de l'Univers », transcende foi et temps. Cette divinité nous a protégés, nous et nos ancêtres, pendant de nombreuses générations, et bien que certains puissent trouver notre culte quelque peu hétérodoxe, il unifie toute la région comme une seule."
 garjati_patronize_economic_growth:0 "Patronner la Croissance Économique"
 garjati_patronize_economic_growth_desc:0 "Certains prétendraient que le pays Garjat n'est pas riche, mais il y a en fait un grand nombre de ressources naturelles sous notre contrôle. Il y a peu d'endroits aussi abondants en bon bois d'œuvre que les collines de notre peuple, et pendant de nombreuses années ce fut la principale exportation de cette région. Nous devons encourager la croissance et l'efficacité de l'industrie du bois et capitaliser davantage sur l'un de nos plus grands atouts."
 SND_ideas:0 "Idées du Sindh"
 SND_ideas_start:0 "Traditions du Sindh"
 SND_ideas_bonus:0 "Ambition du Sindh"
 snd_enduring_dynasty:0 "Dynastie Samma Durable"
 snd_enduring_dynasty_desc:0 "La dynastie Samma du Sindh a résisté à l'épreuve du temps. Faisant remonter leur descendance à de légendaires guerriers Rajputs, ils ont enduré le règne des sultans de Delhi pendant plus d'un siècle. Maintenant que Delhi s'est effondrée, les ambitions de la dynastie Samma peuvent enfin être réalisées."
 snd_bab_ul_islam:0 "Bab ul Islam"
 snd_bab_ul_islam_desc:0 "En tant que l'un des premiers en Inde à accepter la parole du Prophète, les souverains du Sindh portent le devoir de répandre la sagesse du Coran au peuple. Le long du fleuve Indus, nous avons déjà réussi dans cette tâche, mais maintenant nous devons regarder au-delà de nos frontières pour de nouveaux kafirs à convertir."
 snd_gujarati_connections:0 "Renforcer les Connexions Gujaraties"
 snd_gujarati_connections_desc:0 "Les fortunes de notre nation sont liées tant politiquement qu'économiquement à celles du Gujarat. Nous devons développer des liens forts avec les marchands les plus influents du Gujarat pour nous assurer que nous extrayons le profit maximum du commerce tant dans la mer d'Arabie que le long du fleuve Indus."
 snd_makli_necropolis:0 "Agrandir la Nécropole de Makli"
 snd_makli_necropolis_desc:0 "La nécropole de Makli est le site de la tombe du Cheikh Jamali, un saint soufi renommé. Depuis sa mort, les souverains de Thatta ont commencé une tradition de construction de nouveaux tombeaux pour eux-mêmes sur la colline de Makli dans l'espoir que la proximité avec le saint vénéré améliorera leur position auprès d'Allah. Nous devons continuer à ajouter de nouveaux monuments à la nécropole."
 snd_end_judicial_corruption:0 "Mettre Fin à la Corruption Judiciaire"
 snd_end_judicial_corruption_desc:0 "Il est venu à notre attention que les autorités judiciaires acceptent des paiements des plaignants et des défendeurs pour obtenir des verdicts favorables. Ils prétendent qu'ils sont forcés de le faire pour augmenter leurs maigres revenus. Après examen, il semble que nous sous-payons effectivement ces autorités. Une augmentation générale des salaires des fonctionnaires devrait réduire les cas de corruption dans notre gouvernement."
 snd_oversee_rise_of_thatta:0 "Superviser l'Essor de Thatta"
 snd_oversee_rise_of_thatta_desc:0 "La cité de Thatta a le potentiel d'être un grand centre de culture et de commerce. Nous devons investir dans ses infrastructures, son économie et ses institutions religieuses."
 snd_recruit_baloch_tribesmen:0 "Recruter des Guerriers Baloutches"
 snd_recruit_baloch_tribesmen_desc:0 "Les tribus du Baloutchistan ont été à la fois ennemies et alliées du Sindh pendant des générations, leurs allégeances changeant avec les sables. Nous devrions approcher certaines des tribus avec une offre : nous les paierons bien pour combattre pour nous, tant que les tribus resteront en termes amicaux avec notre nation."
 malabari_ideas:0 "Idées Malabaries"
 malabari_ideas_start:0 "Traditions Malabaries"
 malabari_ideas_bonus:0 "Ambition Malabarie"
 malabari_cultural_melting_pot:0 "Creuset Culturel"
 malabari_cultural_melting_pot_desc:0 "Depuis des milliers d'années, cette région a été l'un des plus anciens centres commerciaux du monde. Des épices ont été exportées vers l'Égypte ancienne et la Perse, les empires de Chine, la Rome impériale et bien d'autres endroits. En conséquence, cette région abrite aussi une grande variété de peuples, de fois et de cultures. Chrétiens, juifs, zoroastriens, bouddhistes et bien d'autres ont coexisté ici pendant des centaines, voire des milliers d'années."
 malabari_kerala_school:0 "Patronner l'École du Kerala"
 malabari_kerala_school_desc:0 "Nous devons nous assurer que les esprits brillants de notre peuple reçoivent les moyens et le patronage appropriés pour s'épanouir. Au cours des dernières années, toute une nouvelle génération de mathématiciens et d'astronomes a commencé à explorer et à décrire le monde. Leurs traités bénéficieront aux générations futures longtemps après leur mort."
 malabari_trade_factors:0 "Comptoirs Commerciaux"
 malabari_trade_factors_desc:0 "Les marchands étrangers ont toujours fait partie de notre société, mais avec l'avènement d'une route maritime entre l'Inde et l'Europe, un certain nombre de compagnies commerciales occidentales cherchent maintenant à établir des factoreries sur nos terres.\nAccueillons ces nouveaux venus et encourageons le commerce direct entre nos ports et le grand marché européen !"
 malabari_mapilla_sailors:0 "Marins Mapillas"
 malabari_mapilla_sailors_desc:0 "La communauté musulmane dans nos terres remonte à de nombreux siècles et à l'arrivée de marchands et de marins d'Arabie et d'Iran sur nos côtes, et bien qu'ils fassent maintenant partie intégrante de notre société, beaucoup restent de très bons marins et combattants.\nNous devons faire bon usage de cette communauté et les employer dans notre marine de guerre et notre marine marchande également. Nous n'avons peut-être pas les effectifs pour égaler certaines des grandes puissances navales, mais grâce à des manœuvres habiles et une bonne utilisation de la géographie côtière, nous pouvons encore infliger de lourdes pertes à tout adversaire."
 malabari_control_inland:0 "Contrôler l'Intérieur"
 malabari_control_inland_desc:0 "Notre nation est historiquement très dépendante du commerce maritime, et c'est donc là que notre contrôle est le plus grand. L'intérieur, cependant, est gouverné par un certain nombre de chefs plus ou moins loyaux, souvent dotés d'une grande liberté en échange de leur service en temps de besoin. Nous devons resserrer cet arrangement, formaliser leurs obligations et affirmer un contrôle direct sur les zones les plus importantes."
 malabari_land_of_elephants:0 "Terre des Éléphants"
 malabari_land_of_elephants_desc:0 "Les éléphants du Kerala ont longtemps été considérés comme particulièrement nobles, et ici, plus que dans toute autre partie de l'Inde, ils ont une place spéciale dans la société, la royauté et la religion. Nous devons prendre soin de ces géants bienfaiteurs comme nous prenons soin de nos sujets humains. Qu'on ne dise pas que nous maltraitons ceux dont nous dépendons."
 DHU_ideas:0 "Idées du Dhundhar"
 DHU_ideas_start:0 "Traditions du Dhundhar"
 DHU_ideas_bonus:0 "Ambition du Dhundhar"
 dhu_improve_amer_fort:0 "Améliorer le Fort d'Amer"
 dhu_improve_amer_fort_desc:0 "Le fort d'Amer est tombé en ruine. En tant que siège de notre gouvernement et fortification la plus importante de notre nation, il doit être rénové de toute urgence. Ce faisant, le palais bénéficierait aussi d'une touche de grandeur."
 dhu_seek_protection_of_great_powers:0 "Chercher la Protection des Grandes Puissances"
 dhu_seek_protection_of_great_powers_desc:0 "Le Dhundhar fait face à des menaces de nombreuses directions. Seuls, nous sommes vulnérables, mais grâce à une diplomatie habile, nous pouvons nous faire de puissants amis. Nous devrions chercher à nous marier dans les dynasties des grandes puissances et nous assurer une place dans le nouveau monde qu'elles construisent."
 dhu_restore_hindu_ceremonies:0 "Restaurer les Cérémonies Hindoues"
 dhu_restore_hindu_ceremonies_desc:0 "Plusieurs cérémonies hindoues ont été négligées à travers l'Inde pendant des siècles. Pourquoi avons-nous oublié l'Ashvamedha, le sacrifice du cheval ? Nous croyons-nous si purs que nous n'avons pas besoin d'accomplir les rituels du feu Vajapeya ? Ces traditions doivent être renouvelées immédiatement."
 dhu_foundation_of_jaipur:0 "Fonder la Cité de Jaipur"
 dhu_foundation_of_jaipur_desc:0 "Le Rajasthan manque d'une cité véritablement grande. Étant donné les conditions difficiles dans la région, il n'est pas difficile de voir pourquoi les souverains précédents ont été incapables de créer une capitale véritablement impressionnante. Notre ambition, cependant, est plus grande, nos architectes plus habiles, et notre connaissance du commerce plus complète. Nous fonderons Jaipur dans la province du Dhundhar, et elle sera le joyau de tout le Rajasthan."
 dhu_battles_in_foreign_lands:0 "Batailles en Terres Étrangères"
 dhu_battles_in_foreign_lands_desc:0 "Notre service aux puissants empereurs emmène nos généraux aux confins de l'Inde. Ils reviennent ayant combattu dans des batailles glorieuses et sanglantes, rapportant avec eux sagesse et expertise."
 dhu_astronomical_education:0 "Éducation Astronomique"
 dhu_astronomical_education_desc:0 "Nos astronomes prennent un temps scandaleux pour déterminer des questions aussi simples que quand serait le moment le plus propice pour un homme de commencer un grand voyage. Clairement, notre nation a un besoin urgent d'éducation en matières astronomiques. Nous devons financer la construction de nombreux nouveaux observatoires et patronner l'enseignement de l'astronomie au plus grand nombre possible de notre peuple."
 dhu_recruit_from_the_pindari:0 "Mercenaires Pindaris"
 dhu_recruit_from_the_pindari_desc:0 "Les cavaliers Pindaris font de curieux mercenaires, car ils préfèrent être payés non pas en pièces mais en droit de pillage. Embaucher ces hommes ne nous rendra pas populaires auprès de ceux dont nous pillons les terres, mais leur efficacité ne peut être niée. Ils ont une habileté particulière pour fourager la terre, améliorant notre capacité à approvisionner nos armées."
 MYS_ideas:0 "Idées de Mysore"
 MYS_ideas_start:0 "Traditions de Mysore"
 MYS_ideas_bonus:0 "Ambition de Mysore"
 mys_unification_of_mysore:0 "Unification de Mysore"
 mys_unification_of_mysore_desc:0 "Le plateau de Mysore, autrefois connu sous le nom de Gangavadi d'après une ancienne dynastie, a abrité de puissants royaumes depuis aussi longtemps que quiconque se souvienne. Aujourd'hui, il abrite à la fois les Uddiyars et les Ummaturs ainsi que de nombreux autres groupes. Nous devons unir tous ces groupes et viser à nous étendre ensemble dans les hautes terres du Deccan."
 mys_patronize_kannada_literature:0 "Patronner la Littérature Kannada"
 mys_patronize_kannada_literature_desc:0 "En tant que principale cour Kannada, nous avons attiré de nombreux grands poètes et auteurs de la belle langue Kannada. Nous devons patronner et répandre la littérature et les pièces Kannada, agissant comme le principal bienfaiteur de la culture du peuple du Karnataka."
 mys_religious_tolerance:0 "Tolérance Religieuse"
 mys_religious_tolerance_desc:0 "Nous ne devons pas nous laisser entraîner dans les conflits religieux. Quiconque peut servir l'État de Mysore doit avoir une place dans notre pays. Si nous pouvons gagner la loyauté de tous nos sujets, et pas seulement ceux de la vraie foi, alors nous aurons une base solide sur laquelle nous tenir en tant que puissance expansionniste. Faisons des dons généreux aux lieux saints de toutes les religions sur notre territoire et encourageons l'attribution de charges indépendamment de la foi du détenteur."
 mys_reform_silk_industry:0 "Réformer l'Industrie de la Soie"
 mys_reform_silk_industry_desc:0 "Bien que l'économie de Mysore soit forte à bien des égards, nous envions les industries de la soie du Bengale et du Gujarat. Le meilleur moyen d'améliorer et de soutenir notre production nationale pourrait être d'envoyer des agents étudier comment les autres ont réussi, puis de mettre en œuvre des réformes pour imiter ces choses à notre manière. Combiné à l'excellent savoir-faire de nos propres artisans, cela devrait permettre à notre économie de prospérer."
 mys_rockets:0 "Fusées !"
 mys_rockets_desc:0 "L'utilisation des fusées n'est pas nouvelle en Inde, mais les progrès récents en métallurgie et en chimie nous ont permis de pionnier l'utilisation des fusées au combat rapproché. En équipant nos troupes de cette nouvelle arme, et en nous assurant de pratiquer régulièrement leur utilisation, nous aurons un avantage sur tout champ de bataille, siège ou embuscade."
 mys_reform_mysorean_army:0 "Réformer l'Armée de Mysore"
 mys_reform_mysorean_army_desc:0 "Personne ne peut remettre en question le courage ou l'armement du soldat de Mysore, et pourtant il y a des domaines où nous pourrions nous améliorer pour nos forces armées. Envoyons des officiers étudier dans des pays étrangers afin qu'ils puissent observer quelles innovations les autres emploient sur le champ de bataille. L'exercice, la discipline et la coordination sont tous des domaines dans lesquels nous pourrions adopter les méthodes des puissances étrangères, tout en les adaptant aux réalités d'un champ de bataille indien."
 mys_dynamic_diplomacy:0 "Diplomatie Dynamique"
 mys_dynamic_diplomacy_desc:0 "Aucun pays ne peut exister isolément, et un royaume comme le nôtre peut attirer de nombreux rivaux avides. Il est temps de chercher des alliés outre-mer, car il semble que peu de nos voisins voudraient contribuer davantage à notre montée en puissance."
 RIG_ideas:0 "Idées de Riga"
 RIG_ideas_start:0 "Traditions de Riga"
 RIG_ideas_bonus:0 "Ambition de Riga"
 rig_legacy_of_bishop_albert:0 "Héritage de l'Évêque Albert"
 rig_legacy_of_bishop_albert_desc:0 "L'évêque Albert a fondé Riga en 1201, établissant nombre de ses institutions. En établissant la cité non seulement comme un centre de commerce et d'échanges, l'évêque Albert a également assuré que Riga serait une cité de foi."
 rig_monopoly_rights:0 "Droits de Monopole"
 rig_monopoly_rights_desc:0 "Des traités ont longtemps stipulé que tout le commerce en Livonie doit passer par Riga. Alors que les frontières changent et que les anciens accords sont oubliés, nous devons nous assurer que nos monopoles commerciaux sont protégés."
 rig_hanseatic_port:0 "Port Hanséatique de Riga"
 rig_hanseatic_port_desc:0 "Riga est reconnue comme un port hanséatique, et de nombreux marchands riches et influents l'appellent leur foyer. Nous devrions tirer parti de l'expertise mercantile de la Ligue lorsque nous élaborons nos politiques économiques."
 rig_denounce_witchcraft:0 "Dénoncer la Sorcellerie"
 rig_denounce_witchcraft_desc:0 "Nous devons toujours être à l'affût des sorcières qui se cachent parmi nous. Leur influence malveillante peut être trouvée presque partout en ces temps troublés : cette vieille femme apparemment fragile, ce sinistre chat noir, même la statue de la Vierge ne doit pas échapper à nos yeux vigilants. Mais attendez, cette statue vient-elle de me regarder ? Voyons si elle flotte !"
 rig_free_city:0 "Cité Libre de Riga"
 rig_free_city_desc:0 "Nous ne pouvons pas compter uniquement sur la Hanse et les ordres chevaleresques pour nous protéger. Des émissaires devraient être envoyés aux princes allemands et même à l'Empereur lui-même pour garantir les libertés de Riga."
 rig_fortify_riga:0 "Fortifier Riga"
 rig_fortify_riga_desc:0 "Riga n'est pas étrangère à devoir endurer un siège. Mais avec la probabilité de plus de conflits à venir, nous devrions prendre des mesures pour fortifier la cité contre quels que soient les ennemis qui pourraient marcher vers nous."
 rig_restore_brothers_of_the_sword:0 "Restaurer les Frères de l'Épée"
 rig_restore_brothers_of_the_sword_desc:0 "Les Frères Livoniens de l'Épée sont tombés bien bas depuis leur création. C'est notre devoir de raviver cet ordre chevaleresque et de le réformer en une armée digne de la faveur de Dieu."
 CRI_ideas:0 "Idées de Crimée"
 CRI_ideas_start:0 "Traditions de Crimée"
 CRI_ideas_bonus:0 "Ambition de Crimée"
 cri_genghisid_legacy:0 "Héritage Gengiskhanide"
 cri_genghisid_legacy_desc:0 "Nos ancêtres ont chevauché avec Gengis Khan alors qu'il ravageait le monde connu. Nous avons maintenu nos traditions militaires vivantes et continué à être gouvernés par des Khans qui revendiquent une descendance de la lignée gengiskhanide."
 cri_slavers:0 "Esclavagistes de la Steppe"
 cri_slavers_desc:0 "Il y a une fortune à faire dans le commerce des esclaves : les chrétiens imprudents qui tombent entre nos mains rapportent un prix élevé sur les marchés turcs, arabes et persans."
 cri_ruthenian_raids:0 "Mener des Raids en Ruthénie"
 cri_ruthenian_raids_desc:0 "Nous devons continuer à mener des raids au cœur de la Ruthénie. Bien que la région soit plus démunie qu'elle ne l'était au temps de Gengis Khan, nous sommes habiles à extraire pillage et tribut des villageois terrifiés."
 cri_despoilers:0 "Pillards"
 cri_despoilers_desc:0 "Nos raids frappent rapidement et sans avertissement. Totalement incapables d'anticiper nos attaques, nos ennemis se recroquevilleront sûrement devant nous."
 cri_free_cattle_grazing:0 "Pâturage Libre"
 cri_free_cattle_grazing_desc:0 "Nous n'imposons aucune restriction aux agriculteurs pastoraux pour le pâturage de leurs grands troupeaux de chevaux et de bétail. Les éleveurs sont libres de vaquer à leurs occupations comme ils le souhaitent, capables de traverser la steppe en sécurité et de commercer librement."
 cri_settle_the_steppes:0 "Coloniser la Steppe de Crimée"
 cri_settle_the_steppes_desc:0 "Il est temps que nous établissions des établissements plus permanents. Nous devrions identifier des emplacements appropriés pour établir ces colonies, en prenant soin de tenir compte du flux commercial et du terrain le plus défendable."
 cri_allow_nogai_protectorates:0 "Accepter les Protectorats Nogaïs"
 cri_allow_nogai_protectorates_desc:0 "Plusieurs des tribus nogaïs à l'ouest recherchent notre protection. Nous devrions les prendre sous notre aile, garantissant la sécurité de leur peuple en échange de leur service militaire."
 CHR_ideas:0 "Idées de Tchernihiv"
 CHR_ideas_start:0 "Traditions de Tchernihiv"
 CHR_ideas_bonus:0 "Ambition de Tchernihiv"
 chr_legacy_of_the_old_principality:0 "Héritage de l'Ancienne Principauté"
 chr_legacy_of_the_old_principality_desc:0 "Tchernihiv était autrefois la plus grande principauté de la Rus' de Kiev, et la deuxième en importance politique après Kiev elle-même. Nous ne sommes pas étrangers à l'administration de terres qui s'étendent bien au-delà de notre capitale."
 chr_cossack_regiments:0 "Aligner des Régiments Cosaques"
 chr_cossack_regiments_desc:0 "Nous devons nous adapter à la nouvelle réalité des steppes : l'influence croissante des Cosaques. Nous devons conclure des accords avec eux qui garantissent leur autonomie tout en assurant leur service militaire à l'État."
 chr_regimental_barracks:0 "Agrandir les Casernes Régimentaires"
 chr_regimental_barracks_desc:0 "Pour loger à la fois nos soldats natifs et les régiments cosaques que nous employons, nous devons agrandir nos casernes régimentaires et mettre en œuvre un système formel de recrutement."
 chr_konotop_fortress:0 "Forteresse de Konotop"
 chr_konotop_fortress_desc:0 "Nous devons construire une nouvelle forteresse le long des berges de la rivière Konotopka. Ce sera un bastion moderne, utilisant les dernières techniques d'ingénierie et un modèle pour nos futurs efforts de fortification."
 chr_local_councils:0 "Conseils de Gouvernance Locale"
 chr_local_councils_desc:0 "Les besoins de chaque localité dans notre royaume peuvent différer énormément, et il peut être difficile de les administrer avec une politique commune. Nous devrions encourager les conseils locaux à se gouverner dans une certaine mesure afin qu'ils puissent répondre à leurs propres besoins."
 chr_renovate_transfiguration_cathedral:0 "Rénover la Cathédrale de la Transfiguration"
 chr_renovate_transfiguration_cathedral_desc:0 "En tant que structure la plus ancienne restante dans la cité, la cathédrale de la Transfiguration est un rappel des gloires passées ainsi qu'un symbole de notre foi durable. La cathédrale devrait être rénovée, symbolisant un renouveau de nos ambitions et de notre dévouement spirituel."
 chr_cultivate_the_east_dniepr:0 "Dompter les Prairies"
 chr_cultivate_the_east_dniepr_desc:0 "La rive gauche du Dniepr pourrait être le grenier de l'Europe, si seulement les prairies sauvages pouvaient être domptées. Nous devons investir dans la culture de la région afin que son plein potentiel puisse être réalisé."
 ILK_ideas:0 "Idées Ilkhanides"
 ILK_ideas_start:0 "Traditions Ilkhanides"
 ILK_ideas_bonus:0 "Ambition Ilkhanide"
 ilk_restored_ilkhanate:0 "Ilkhanat Restauré"
 ilk_restored_ilkhanate_desc:0 "L'Ilkhanat fut originellement établi pour sécuriser le règne mongol sur la Perse en 1256. Beaucoup de ceux qui ont cherché à régner sur la Perse depuis ont cherché la légitimité en revendiquant une descendance de Gengis Khan, mais notre nation est un véritable renouveau du premier Ilkhanat. Personne ne peut remettre en question notre droit de régner."
 ilk_persian_language_at_court:0 "Langue Persane à la Cour"
 ilk_persian_language_at_court_desc:0 "Promouvoir une seule langue pour l'usage à la cour et au sein de la bureaucratie d'État présente des avantages évidents. Beaucoup de nos élites ont déjà adopté le persan comme seconde langue, le reconnaissant comme une langue prestigieuse et généralement comprise dans tout le monde musulman."
 ilk_yam_networks:0 "Le Yam"
 ilk_yam_networks_desc:0 "Gengis Khan a établi un système de relais, de réseaux d'approvisionnement et de collecte de renseignements à employer à travers l'Empire mongol pour alléger les fardeaux de gouverner un empire s'étendant sur des milliers de kilomètres. Nous devrions restaurer le Yam afin que nos armées et nos envoyés puissent voyager efficacement à travers le royaume."
 ilk_mongol_peace:0 "Paix Mongole"
 ilk_mongol_peace_desc:0 "Ceux qui se soumettent volontairement à l'Ilkhan peuvent être sûrs qu'ils jouiront de sa protection. À mesure que se répand la nouvelle de notre règne bienveillant et tolérant, la résistance à nos conquêtes diminuera sûrement."
 ilk_patronize_observatories:0 "Patronner les Observatoires"
 ilk_patronize_observatories_desc:0 "La première incarnation de l'Ilkhanat a fortement patronné l'étude des cieux, finançant des observatoires et invitant des astronomes renommés à la cour. Nous devrions imiter l'amour de nos ancêtres pour les sciences en restaurant les anciens observatoires."
 ilk_favor_sufism:0 "Favoriser le Soufisme"
 ilk_favor_sufism_desc:0 "Quand nos ancêtres se sont convertis à l'islam, ils ont préféré les enseignements mystiques des érudits soufis à la politique sectaire des oulémas conventionnels. Nous devrions inviter de tels érudits à la cour et promouvoir une politique tolérante envers tous les musulmans dans notre royaume."
 ilk_recruit_turkoman_gunners:0 "Recruter des Artilleurs Turcomans"
 ilk_recruit_turkoman_gunners_desc:0 "Il serait insensé d'ignorer les services offerts par les soldats turcomans qui ont commencé à s'installer dans notre royaume. Les armes à feu portatives sont l'avenir de la guerre, et ces Turcomans ont maîtrisé cet art."
 cossack_ideas:0 "Idées Cosaques"
 cossack_ideas_start:0 "Traditions Cosaques"
 cossack_ideas_bonus:0 "Ambition Cosaque"
 cossacks_escaped_serfs:0 "Serfs Évadés"
 cossacks_escaped_serfs_desc:0 "Beaucoup parmi les Cosaques sont nés dans le servage. Fatigués de l'oppression féodale, ils ont fui leurs maîtres et cherché des vies de liberté dans les steppes. Nous devons continuer à accueillir les serfs évadés dans notre société."
 cossacks_hetmanate:0 "Hetmanat Cosaque"
 cossacks_hetmanate_desc:0 "Il n'y a pas de rois ou de khans parmi les Cosaques. Notre Hetman peut être notre plus haut commandant militaire, mais dans les affaires d'État et de société, il est simplement le premier parmi ses égaux. Le pouvoir politique réside dans la Rada, notre assemblée législative et militaire, dans laquelle tous les Cosaques peuvent avoir leur mot à dire."
 cossacks_insults:0 "Insultes Méprisantes"
 cossacks_insults_desc:0 "Une insulte mordante est souvent plus efficace qu'une missive soigneusement rédigée. Nous savons qui sont nos ennemis, et nous n'avons pas peur de leurs armées. Ainsi nous ne devrions pas hésiter à leur dire d'aller se faire voir !"
 cossacks_military_society:0 "Société Militaire"
 cossacks_military_society_desc:0 "Il n'y a presque pas de division entre la société civile et militaire parmi les Cosaques. Notre nation est une Hôte, définie par son peuple plutôt que par la terre que nous contrôlons, et son peuple est composé de guerriers. Nous devons nous assurer que les divisions militaires répondent correctement à nos besoins administratifs à mesure que l'Hôte s'agrandit."
 cossacks_free_the_serfs:0 "Libérer les Serfs"
 cossacks_free_the_serfs_desc:0 "Aucun homme ne devrait souffrir la tyrannie dans un royaume cosaque. Quand nous conquérons de nouveaux territoires, les serfs, paysans et esclaves qui s'y trouvent doivent être libérés immédiatement et intégrés dans notre grande Hôte."
 cossacks_registered:0 "Registres Cosaques"
 cossacks_registered_desc:0 "À mesure que les rangs de notre Hôte gonflent, nous devons tenir compte de la force de chaque régiment, de leurs effectifs et de leur niveau d'approvisionnement. Un registre centralisé nous permettra de soutenir les besoins de tous les Cosaques."
 pirate_ideas:0 "Idées Piratiques"
 pirate_ideas_start:0 "Traditions Piratiques"
 pirate_ideas_bonus:0 "Ambition Piratique"
 pirates_plunder:0 "Pillage !"
 pirates_plunder_desc:0 "La République Pirate vit et meurt par la quantité de butin que nous pouvons ramener dans nos ports. Prenons tout ce qui n'est pas cloué ! À bien y réfléchir, prenons aussi tout ce qui est cloué. Et les clous !"
 pirates_bucanneers_ideas:0 "Boucaniers"
 pirates_bucanneers_ideas_desc:0 "Nous recrutons parmi les désespérés et les parias. Les nations soi-disant « civilisées » réduisent régulièrement en esclavage ceux qu'elles considèrent comme leurs inférieurs et enrôlent de force leurs propres compatriotes dans le service militaire. Ceux qui échappent aux liens de la tyrannie trouvent un foyer dans notre République."
 pirates_sail_in_consort:0 "Naviguer en Conserve"
 pirates_sail_in_consort_desc:0 "Un seul chasseur est facilement déjoué ou dominé par les armes en haute mer. Quand nous naviguons en conserve, nous pouvons utiliser notre nombre à grand avantage tactique."
 pirates_elected_quartermasters:0 "Quartiers-Maîtres Élus"
 pirates_elected_quartermasters_desc:0 "Les quartiers-maîtres sur un navire pirate sont des représentants élus de l'équipage. Ils défendent les besoins de l'équipage auprès du capitaine et agissent comme contrepoids à son autorité souvent arbitraire."
 pirate_bays:0 "Baies Pirates"
 pirate_bays_desc:0 "Notre littoral est parsemé de criques cachées et de baies défendables que nous pouvons utiliser pour attirer les chasseurs de pirates en herbe dans une embuscade mortelle."
 pirate_life_of_liberty:0 "Vie de Liberté"
 pirate_life_of_liberty_desc:0 "Les libertés dont nous jouissons en tant qu'hommes libres font l'envie des paysans, esclaves et conscrits qui peinent pour le profit de leurs supérieurs. Nos contrebandiers devraient commencer à distribuer de la propagande pour attiser leur ressentiment dans l'espoir qu'ils se soulèveront et rejoindront notre cause."
 pirates_religious_apathy:0 "Apathie Religieuse"
 pirates_religious_apathy_desc:0 "Qu'importe quel dieu les pirates vénèrent ? Leurs âmes sont probablement damnées de toute façon."
 factories:0 "Factoreries"
 factories_desc:0 "Les factoreries étaient principalement des comptoirs commerciaux fortifiés établis dans des zones côtières au large. Ceux-ci offraient la sécurité tant aux marchands qu'à la population locale contre les forces hostiles qui perturberaient notre commerce."
 general_colonization_law:0 "Loi Générale de Colonisation"
 general_colonization_law_desc:0 "En adoptant une loi permettant la libre circulation des peuples étrangers vers nos colonies, nous attirerons certainement un éventail plus large de futurs colons."
 empiricism:0 "Empirisme"
 empiricism_desc:0 "Avec la recherche du savoir viennent aussi de nombreuses fausses idées. Ce n'est qu'avec des preuves et notre expérience du monde autour de nous que nous pouvons prouver ou réfuter que ce qui est devant nous est en fait vrai."
 print_culture:0 "Culture de l'Imprimé"
 print_culture_desc:0 "C'est par l'échange d'idées que nous progressons en tant que société. Les mots des plus grands esprits de nos générations doivent être écrits et partagés avec leurs pairs."
 merchant_traditions:0 "Traditions Marchandes"
 merchant_traditions_desc:0 "Notre nation a une longue histoire de commerce maritime avec un réseau de marchands qui s'étend bien au-delà de l'horizon. L'excellence de notre marine marchande et son audace à naviguer sur des mers que d'autres éviteraient sont bien connues."
 buffer_states:0 "États Tampons"
 buffer_states_desc:0 "Pour éviter les guerres entre nous et un puissant rival, établir un État tampon entre nous est non seulement mutuellement bénéfique mais impératif pour la stabilité de la région."
 camp_followers:0 "Suiveurs de Camp"
 camp_followers_desc:0 "Se déplacer à travers les terres avec une force comme la nôtre est une grande tâche. Heureusement, à mesure que l'armée grossit, le train de suiveurs de camp qui fournit et entretient l'armée grossit aussi."
 grand_banquets:0 "Grands Banquets"
 grand_banquets_desc:1 "Les dignitaires étrangers adorent l'occasion de participer à la haute société et aux festivités qui l'accompagnent. La grandeur de notre société est connue de loin."
 CAS_ideas:0 "Idées Castillanes"
 CAS_ideas_start:0 "Traditions Castillanes"
 CAS_ideas_bonus:0 "Ambition Castillane"
 spa_casa_de_contracion:0 "Casa de Contratación"
 spa_casa_de_contracion_desc:0 "Nous devons étendre la portée de la Maison du Commerce des Indes. Nos agents coloniaux doivent avoir une présence dans chaque partie du monde pour assurer le bon fonctionnement de notre empire."
 spa_cortes:0 "Maîtriser les Cortes"
 spa_cortes_desc:0 "Chaque royaume constitutif du domaine espagnol a ses propres cortes, une assemblée des éléments les plus puissants de la société dans la région. Il y a souvent des tensions entre la Couronne et les Cortes sur des questions telles que la fiscalité et l'autonomie régionale. Nous devons maîtriser ces institutions afin qu'elles servent principalement la Couronne plutôt que leurs propres intérêts."
 cabildos:0 "Cabildos"
 cabildos_desc:0 "Représentant les intérêts des cités, les conseils « Cabildos » ont une grande variété de fonctions et de devoirs. Ils sont responsables à la fois de défendre les intérêts de la cité auprès de la Couronne et de nombreux aspects de la gouvernance locale. Nous devons continuer à établir des Cabildos dans les cités nouvellement fondées ou nouvellement conquises, particulièrement dans le Nouveau Monde où le besoin d'institutions castillanes est ressenti le plus sévèrement."
 infantas:0 "Infantes"
 infantas_desc:0 "Les princes et princesses de la Couronne sont parmi nos atouts les plus précieux. Ils peuvent être envoyés comme envoyés royaux, mariés pour sécuriser des alliances, ou nommés comme régents quand le besoin s'en fait sentir. Il est important que nous nous assurions que les reins de notre monarque continuent à porter des fruits."
 salamanca_scholars:0 "École de Salamanque"
 salamanca_scholars_desc:0 "Basée à l'Université de Salamanque, les intérêts de l'École couvrent des domaines aussi divers que la théologie, l'économie et la philosophie politique. En tant que l'une des principales écoles de pensée du monde catholique, sa présence enracinée en Castille assure que notre nation est toujours à l'avant-garde des affaires intellectuelles."
 nueva_planta:0 "Nueva Planta"
 nueva_planta_desc:0 "Il est temps d'affirmer la véritable autorité royale dans le royaume : sous un ensemble unique de lois et une langue commune, une Castille renouvelée et centralisée nommera directement les fonctionnaires et consacrera le règne absolu du monarque."
 MOR_ideas:0 "Idées Marocaines"
 MOR_ideas_start:0 "Traditions Marocaines"
 MOR_ideas_bonus:0 "Ambition Marocaine"
 mor_powerful_viziers:0 "Vizirs Puissants"
 mor_powerful_viziers_desc:0 "Les vizirs du Maroc détiennent un pouvoir exceptionnel au sein de l'État. Bien qu'indubitablement efficaces pour administrer notre nation, nous devons prendre garde qu'ils ne cultivent pas des ambitions pour un pouvoir encore plus grand."
 mor_marabouts:0 "Marabouts Soufis"
 mor_marabouts_desc:0 "Plusieurs groupes d'enseignants soufis ont fait du Maroc leur foyer. Nous devons nous assurer d'accommoder ces hommes saints et de prendre leurs enseignements à cœur."
 mor_pirate_republics:0 "Protéger les Républiques Pirates"
 mor_pirate_republics_desc:0 "Composées de réfugiés et d'opportunistes, une multitude d'établissements pirates ont surgi sur la côte marocaine. Nous devrions prendre ces pirates sous notre aile afin qu'ils puissent harceler nos ennemis sur l'eau."
 mor_fleet:0 "Défendre le Littoral"
 mor_fleet_desc:0 "Le Maroc a de nombreux ennemis qui pourraient lancer une invasion depuis la mer. Nous devons construire une flotte assez grande et puissante pour repousser les envahisseurs étrangers, qu'ils soient conquérants chrétiens ou corsaires musulmans."
 mor_slave_soldiers:0 "Soldats Esclaves"
 mor_slave_soldiers_desc:0 "Malheureusement, nous ne pouvons pas toujours faire confiance à nos soldats pour nous servir loyalement. En créant une armée d'esclaves, cependant, la loyauté cesse d'être une préoccupation pertinente."
 mor_curb_power_of_the_tribes:0 "Réfréner le Pouvoir Tribal"
 mor_curb_power_of_the_tribes_desc:0 "Les tribus nomades qui traversent nos terres sont nos sujets nominaux, mais aussi une source régulière de discorde et de dissidence. Nous devons réfréner leur pouvoir et les mettre fermement en ligne avec les politiques de l'État."
 TUN_ideas:0 "Idées Tunisiennes"
 TUN_ideas_start:0 "Traditions Tunisiennes"
 TUN_ideas_bonus:0 "Ambition Tunisienne"
 tun_catalan_guard:0 "Garde Catalane"
 tun_catalan_guard_desc:0 "Nous avons engagé un important contingent de mercenaires catalans pour protéger le Sultan. En tant que soldats expérimentés sans enjeu dans la politique tunisienne, on peut compter sur eux pour nous servir loyalement tant que nous continuons à bien les payer."
 tun_attract_foreign_pirates:0 "Attirer des Pirates Étrangers"
 tun_attract_foreign_pirates_desc:0 "Ce ne sont pas seulement les ghazis, les réfugiés et les pêcheurs qui sont attirés par la piraterie : l'attrait du profit peut attirer même nos ennemis chrétiens vers la profession."
 tun_board_of_captains:0 "Conseil des Capitaines"
 tun_board_of_captains_desc:0 "Les corsaires ne doivent plus mener leurs affaires de manière désorganisée et décentralisée. Il est temps d'établir un Conseil des Capitaines dirigé par l'État pour organiser et réguler l'activité pirate sur notre côte."
 tun_export_monopolies:0 "Monopoles d'Exportation"
 tun_export_monopolies_desc:0 "À mesure que l'intérieur rural de notre nation s'intègre mieux avec la côte urbaine, plus de marchandises trouvent leur chemin vers les ports tunisiens. Nous devons monopoliser les exportations de ces marchandises afin que les profits bénéficient à l'État."
 tun_caliphate:0 "Califat Tunisien"
 tun_caliphate_desc:0 "Bien que les sultans de Tunis se soient longtemps présentés comme les califes de l'islam, ce titre a rarement été pris au sérieux par les autres musulmans. Nous devons démontrer notre piété afin que nos frères de foi nous voient comme un véritable califat."
 barbary_pirate_ideas:0 "Idées des Corsaires Barbaresques"
 barbary_pirate_ideas_start:0 "Traditions des Corsaires Barbaresques"
 barbary_pirate_ideas_bonus:0 "Ambition des Corsaires Barbaresques"
 galley_slaves:0 "Galériens"
 galley_slaves_desc:0 "Tous les esclaves que nous capturons ne sont pas vendus en Orient : beaucoup sont destinés à servir sur les galères, assurant une réserve prête de marins pour ramer nos navires."
 vengeful_refugees:0 "Réfugiés Vengeurs"
 vengeful_refugees_desc:0 "Alors que les musulmans et les Morisques sont expulsés par les chrétiens d'Ibérie, des réfugiés fuient vers le Maghreb. Ces réfugiés ne sont pas du tout contents d'être déplacés et acceptent avec empressement l'occasion de profiter de leur chute."
 mazmorras:0 "Mazmorras"
 mazmorras_desc:0 "Les princes chrétiens racontent de sombres histoires sur nos cachots, les redoutées Mazmorras. Ici nous gardons nos captifs les plus précieux, ceux qui ont des membres de famille riches avec l'argent pour payer leur retour en sécurité. Les conditions typiques dans les Mazmorras assurent que les rançons sont payées rapidement."
 barbary_slave_trade:0 "La Traite des Esclaves Barbaresques"
 barbary_slave_trade_desc:0 "Le raid est une occupation particulièrement profitable pour les pirates de la côte barbaresque en raison du prix élevé que les esclaves chrétiens peuvent atteindre sur les marchés turcs et arabes."
 barbary_fortified_strongholds:0 "Bastions Pirates Fortifiés"
 barbary_fortified_strongholds_desc:0 "Un bastion pirate doit être fortifié contre les attaques par terre et par mer. Nous devons construire des défenses pour nos cités pour repousser les envahisseurs."
 heirs_of_al_andalus:0 "Héritiers d'Al-Andalus"
 heirs_of_al_andalus_desc:0 "Parmi ceux qui fuient la Reconquista en Espagne se trouvent les anciens princes et princesses d'Al-Andalus, le grand empire musulman qui s'étendait jadis sur presque toute l'Ibérie. Ces nobles sont désireux de restaurer leurs royaumes perdus par tous les moyens nécessaires."
 barbary_board_of_captains:0 "Conseil des Capitaines"
 barbary_board_of_captains_desc:0 "Nous devons établir un conseil de nos capitaines les plus habiles pour guider et réguler la piraterie et la traite des esclaves dans notre nation."
 TEX_ideas:0 "Idées Texanes"
 TEX_ideas_start:0 "Traditions Texanes"
 TEX_ideas_bonus:0 "Ambition Texane"
 lone_star_state:0 "L'État de l'Étoile Solitaire"
 lone_star_state_desc:0 "Le Texas se tient comme une nation indépendante, s'enorgueillissant de son autosuffisance et de son individualisme."
 tex_revolution:0 "Révolution Texane"
 tex_revolution_desc:0 "Nous avons combattu durement pour notre indépendance, et nous sommes prêts à combattre jusqu'à la mort contre quiconque menacerait notre liberté."
 cotton_plantations:0 "Plantations de Coton"
 cotton_plantations_desc:0 "Les champs fertiles du Texas offrent d'excellentes terres pour les plantations de coton : colons, esclaves, immigrants et fermiers viennent de loin pour travailler les nouvelles terres. Si nous en tirons avantage, nous pouvons exporter cette précieuse culture dans le monde entier en un rien de temps."
 vaqueros:0 "Vaqueros"
 vaqueros_desc:0 "Les Vaqueros sont les agriculteurs pastoraux montés des Amériques, et c'est un mode de vie qui a une place spéciale dans notre culture. Ces « cowboys » sont des travailleurs robustes, adaptés au terrain et habiles en équitation. Ils sont très fiers de leur habileté à maîtriser le bétail et les chevaux."
 tex_native_frontiers:0 "Nation Frontalière"
 tex_native_frontiers_desc:0 "En tant qu'État à la frontière, nous sommes confrontés à de dangereux adversaires amérindiens. Si nous voulons garder notre peuple en sécurité, il est important de maintenir une force de combat efficace et mobile."
 tejanos:0 "Tejanos"
 tejanos_desc:0 "En tant qu'ancienne province du Mexique, le Texas n'a jamais complètement abandonné ses racines : les Texans-Mexicains, ou Tejanos, font très certainement partie intégrante de la culture vibrante de notre État, contribuant à une abondance de nourritures, de musique, de langue et de traditions."
 adelsverin:0 "Adelsverein"
 adelsverin_desc:0 "Dans le sillage des troubles et des révolutions en Europe, les Allemands fuient vers le nouveau monde en masse cherchant stabilité et sécurité. Le Mainzer Adelsverein promouvra l'établissement de communautés allemandes s'installant au Texas, ainsi que leur intégration dans notre nation."
 ASU_ideas:0 "Idées Asturiennes"
 ASU_ideas_start:0 "Traditions Asturiennes"
 ASU_ideas_bonus:0 "Ambition Asturienne"
 asu_reconquista:0 "Reconquista"
 asu_reconquista_desc:0 "Les anciennes terres asturiennes ont été divisées entre des royaumes espagnols parvenus. Elles doivent toutes être ramenées dans le giron asturien."
 asu_camino_de_santiago:0 "Chemin de Saint-Jacques"
 asu_camino_de_santiago_desc:0 "Nous sommes les gardiens de la sainte route de pèlerinage, le Chemin de Saint-Jacques. C'est notre devoir de nous assurer que les voyageurs pieux peuvent passer en sécurité à travers nos terres pour atteindre le site sacré de Saint-Jacques-de-Compostelle."
 asu_aristocracy:0 "Aristocratie Asturienne"
 asu_aristocracy_desc:0 "La haute société asturienne a des racines anciennes et des poches profondes. Nous devrions nous assurer qu'elle a une place honorée dans notre nation."
 asu_colonialism:0 "Voyage vers le Nouveau Monde"
 asu_colonialism_desc:0 "Les financiers asturiens sont désireux de commencer à investir dans les colonies du Nouveau Monde. Nous devrions établir nos propres entreprises coloniales pour maximiser le profit."
 asu_millenarian_revival:0 "Renouveau Millénariste"
 asu_millenarian_revival_desc:0 "Ce sont des temps sombres, et les présages de l'apocalypse sont clairs à voir. C'est un signe que nous devons renouveler notre foi quotidiennement et nous dédier à répandre la parole du Seigneur jusqu'aux confins de la Terre."
 asu_unify_the_provinces:0 "Unifier les Provinces"
 asu_unify_the_provinces_desc:0 "Les divisions administratives au sein des Asturies et de la Cantabrie sont terriblement inefficaces. Les provinces doivent être consolidées en districts plus centralisés pour aider à l'administration de la justice et à la levée des troupes."
 asu_early_industrialism:0 "Industrialisme Précoce"
 asu_early_industrialism_desc:0 "Nous avons découvert d'amples sources de charbon dans les collines des Asturies. Nous devrions tirer avantage des nouvelles avancées en machinerie et utiliser nos ressources naturelles pour stimuler nos industries manufacturières."
 ADU_ideas:0 "Idées Andalouses"
 ADU_ideas_start:0 "Traditions Andalouses"
 ADU_ideas_bonus:0 "Ambition Andalouse"
 adu_stand_against_the_reconquista:0 "Résister à la Reconquista"
 adu_stand_against_the_reconquista_desc:0 "Dans le sillage de l'effondrement des Almohades, les royaumes chrétiens ont saisi l'occasion de conquérir la majeure partie de l'Ibérie pour eux-mêmes. Mais ils n'ont pas entièrement réussi : nous devons leur résister !"
 adu_taifa_adminstration:0 "Administration des Taifas"
 adu_taifa_adminstration_desc:0 "L'Ibérie était autrefois divisée entre plusieurs puissantes taifas musulmanes qui administraient leurs domaines de manière autonome. Nous devrions restaurer ces taifas pour alléger le fardeau d'administrer notre royaume en expansion."
 adu_ahl_uhl_dhimma:0 "Ahl ul-Dhimma"
 adu_ahl_uhl_dhimma_desc:0 "Bien que nous ayons repoussé les rois chrétiens, beaucoup de leurs anciens sujets ne suivent pas notre foi. Nous démontrerons notre bienveillance en leur accordant la tolérance et le respect qui furent refusés aux musulmans sous le règne chrétien."
 adu_legacy_of_ibn_arabi:0 "Héritage d'Ibn Arabi"
 adu_legacy_of_ibn_arabi_desc:0 "Les œuvres d'Ibn Arabi, un érudit et mystique renommé du XIIIe siècle, jouissent d'une popularité renouvelée en Al-Andalus. Notre royaume redevient un centre d'érudition islamique, une tendance que nous devrions prendre toutes les mesures pour promouvoir."
 adu_jund_settlements:0 "Établissements Jund"
 adu_jund_settlements_desc:0 "Notre expansion est menée par une forme de colonialisme militaire appelé le système jund, dans lequel des bandes de guerriers reçoivent des terres nouvellement conquises à gouverner et à coloniser. La perspective de récompense est un puissant motivateur pour le recrutement, assurant qu'il n'y a jamais de pénurie de main-d'œuvre dans nos régiments."
 adu_expeditionary_sentiment:0 "Sentiment Expéditionnaire"
 adu_expeditionary_sentiment_desc:0 "Nous avons entendu des récits de marins portugais capturés au sujet d'un Nouveau Monde à l'ouest, abondant en or et en argent. Nous devrions organiser nos propres expéditions à travers l'océan et voir par nous-mêmes si ces rumeurs sont vraies."
 adu_al_awasim:0 "Al-Awasim"
 adu_al_awasim_desc:0 "Il est d'une importance vitale que notre frontière avec les royaumes chrétiens soit fortement fortifiée. Une chaîne de forteresses sera érigée sur les frontières afin qu'aucun ennemi ne puisse passer sur notre territoire sans endurer un siège coûteux."
 NRM_ideas:0 "Idées Normandes"
 NRM_ideas_start:0 "Traditions Normandes"
 NRM_ideas_bonus:0 "Ambition Normande"
 nrm_norman_conquest:0 "Conquérants"
 nrm_norman_conquest_desc:0 "La conquête coule dans le sang normand depuis que Rollon le Viking s'est établi jarl de Normandie. Notre peuple a une façon d'acquérir de nouvelles terres sans risquer la colère de leurs nouveaux voisins."
 nrm_norman_philosophers:0 "Philosophes Normands"
 nrm_norman_philosophers_desc:0 "L'école normande de philosophie est renommée dans toutes les terres françaises pour son refus de traiter en absolus, rendant les conseillers normands très recherchés."
 nrm_channel_islands:0 "Les Îles Anglo-Normandes"
 nrm_channel_islands_desc:0 "En raison de leur histoire unique, les îles Anglo-Normandes ont leur propre ensemble de lois. En expérimentant avec d'habiles réformes fiscales là-bas, nous devrions pouvoir faire quelque profit pour l'État."
 nrm_viking_explorers:0 "Descendants de Navigateurs"
 nrm_viking_explorers_desc:0 "Nos ancêtres ont atteint le Vinland à travers l'Atlantique. Nous garderons leurs traditions vivantes de notre temps et atteindrons le Nouveau Monde."
 nrm_viking_raids:0 "Raids Vikings"
 nrm_viking_raids_desc:0 "Nous n'avons pas bâti notre fortune en cultivant ou en commerçant, nous l'avons fait en payant le prix du fer."
 nrm_naval_invasion:0 "Invasion Navale"
 nrm_naval_invasion_desc:0 "Aucune forteresse n'est imprenable. Tant que nos navires peuvent les atteindre, nous devrions pouvoir obtenir une reddition rapide."
 nrm_great_commanders:0 "Grands Commandants"
 nrm_great_commanders_desc:0 "Bien qu'ils n'aient jamais atteint le rang de capitaine, les commandants de Normandie sont encore les meilleurs que la Terre puisse produire."
 PIS_ideas:0 "Idées Pisanes"
 PIS_ideas_start:0 "Traditions Pisanes"
 PIS_ideas_bonus:0 "Ambition Pisane"
 pis_restore_the_pisan_navy:0 "Restaurer la Marine Pisane"
 pis_restore_the_pisan_navy_desc:0 "Jadis notre glorieuse flotte dominait la Méditerranée. Maintenant que nous sommes libres des tyrans florentins, nous reprendrons notre position légitime en Mare Nostrum."
 pis_the_leaning_tower:0 "La Tour Penchée"
 pis_the_leaning_tower_desc:0 "Ils ont tous ri de notre tour. Maintenant elle est considérée comme une merveille, et des gens du monde entier viennent la voir. Qui rit maintenant ?"
 pis_the_university_of_pisa:0 "L'Université de Pise"
 pis_the_university_of_pisa_desc:0 "L'une des universités les plus anciennes d'Italie et d'Europe, l'Université de Pise a toujours été l'une des institutions les plus significatives tant pour l'enseignement que pour la recherche."
 pis_urbanization_effort:0 "Effort d'Urbanisation"
 pis_urbanization_effort_desc:0 "Malgré notre glorieuse histoire et les efforts de notre peuple, la cité de Pise n'a toujours pas tout à fait atteint le niveau de développement de nombreuses cités moins renommées. Il est temps de corriger cela."
 pis_anziani_del_popolo:0 "Anziani del Popolo"
 pis_anziani_del_popolo_desc:0 "Le Conseil des Anciens fut initialement fondé pour apaiser la rivalité entre les familles Della Gherardesca et Visconti. Il a pris le contrôle de la Commune et a gouverné la république pendant plus de 50 ans."
 pis_maritimes_legacy:0 "Héritage Maritime"
 pis_maritimes_legacy_desc:1 "Pendant des siècles, Pise fut l'une des puissances dominantes de la Méditerranée, contrôlant le commerce et répandant son influence. N'étant plus que l'ombre de la grande puissance que Pise était jadis, son héritage est toujours là. Pise se souvient."
 pis_fund_the_masnada:0 "Financer la Masnada"
 pis_fund_the_masnada_desc:1 "Pour protéger notre nation bien-aimée, nous avons besoin d'une armée. Pour construire une armée, nous avons besoin d'hommes. Avec une somme d'argent appropriée, nous pouvons convaincre certaines des compagnies libres locales de s'enrôler dans notre milice."
 AKS_ideas:0 "Idées Axoumites"
 AKS_ideas_start:0 "Traditions Axoumites"
 AKS_ideas_bonus:0 "Ambition Axoumite"
 aks_stellae_builders:0 "Bâtisseurs de Stèles"
 aks_stellae_builders_desc:0 "L'ancien Empire axoumite était célèbre pour les nombreuses stèles qu'ils ont construites. Nous avons hérité de cette tradition, afin que les glorieux accomplissements de notre nation soient largement connus."
 aks_legacy_of_king_kaleb:0 "Héritage du Roi Kaleb"
 aks_legacy_of_king_kaleb_desc:0 "Le roi Kaleb fut le plus grand souverain que notre nation ait jamais eu. Pendant son règne, les anciennes frontières de l'Empire axoumite se sont étendues plus loin que jamais auparavant. Son héritage vit en nous, et nous nous étendrons encore plus loin."
 aks_persian_revenge:0 "Vengeance Perse"
 aks_persian_revenge_desc:0 "Les guerres contre la Perse il y a longtemps ont couvert notre pays de honte avec sa défaite la plus écrasante. Il est temps de se venger."
 aks_christianity_stronghold:0 "Bastion du Christianisme"
 aks_christianity_stronghold_desc:0 "Bien qu'étant complètement entouré par d'autres religions, l'Empire axoumite est resté un refuge pour les chrétiens pendant des siècles. Nous continuerons à être forts dans la foi."
 aks_mediterranean_contacts:0 "Contacts Méditerranéens"
 aks_mediterranean_contacts_desc:0 "L'Empire axoumite a toujours été très connecté avec les pays méditerranéens, y compris la Grèce et l'Empire romain. Cela a permis un grand flux d'informations."
 aks_trade_hub:0 "Carrefour Commercial"
 aks_trade_hub_desc:0 "Notre nation a toujours été un carrefour pour le commerce, connectant la Méditerranée aux routes indiennes, commerçant spécialement l'ivoire, l'or et le sel. Le flux commercial est fort dans notre pays."
 aks_coin_minting:0 "Frappe de Monnaie"
 aks_coin_minting_desc:0 "Nous avons toujours été riches en sources d'or, ce qui nous a permis de produire notre propre système monétaire. Avec cela, nous pouvons mieux réguler notre économie."
 GZI_ideas:0 "Idées du Zimbabwe"
 GZI_ideas_start:0 "Traditions du Zimbabwe"
 GZI_ideas_bonus:0 "Ambition du Zimbabwe"
 gzi_stone_masonry:0 "Maçonnerie de Pierre"
 gzi_stone_masonry_desc:0 "Le Zimbabwe a toujours été célèbre pour ses techniques de maçonnerie, venant de l'ancien royaume de Mapungubwe. Nos maçons sont inégalés."
 gzi_ivory_trade:0 "Commerce de l'Ivoire"
 gzi_ivory_trade_desc:0 "Notre nation est riche en éléphants et en ivoire, et il y a une longue tradition de commerce de l'ivoire à travers notre région."
 gzi_gold_deposits:0 "Gisements d'Or"
 gzi_gold_deposits_desc:0 "Nous avons beaucoup de gisements d'or dans notre pays qui attendent d'être exploités. Nous pouvons en tirer beaucoup de richesse si nous les exploitons."
 gzi_zimbabwes_walls:0 "Les Murs du Zimbabwe"
 gzi_zimbabwes_walls_desc:0 "Les murs massifs de nos cités témoignent de notre force, et sont une sérieuse dissuasion pour quiconque oserait essayer de les conquérir."
 gzi_lay_of_the_land:0 "Configuration du Terrain"
 gzi_lay_of_the_land_desc:0 "Nos terres ont toujours été une source de mystère pour nos voisins. Nous sommes les seuls à les connaître vraiment, et nous pouvons utiliser cela à notre avantage."
 gzi_tributary_system:0 "Système Tributaire"
 gzi_tributary_system_desc:0 "Le Zimbabwe a toujours eu une tradition d'avoir beaucoup de petits pays lui payant tribut. C'est un excellent moyen d'augmenter notre propre richesse."
 gzi_zimbabwe_birds:0 "Oiseaux du Zimbabwe"
 gzi_zimbabwe_birds_desc:0 "Les oiseaux de pierre produits par nos artisans sont célèbres partout, et personne n'est capable de reproduire leur qualité et leur beauté."
 KIT_ideas:0 "Idées Kitariennes"
 KIT_ideas_start:0 "Traditions Kitariennes"
 KIT_ideas_bonus:0 "Ambition Kitarienne"
 kit_legacy_of_the_gods:0 "Héritage des Dieux"
 kit_legacy_of_the_gods_desc:0 "Il est connu que notre souverain est un descendant direct des Dieux. En tant que tel, il ne peut y avoir aucun doute sur notre droit divin de régner."
 kit_empire_of_the_light:0 "Empire de la Lumière"
 kit_empire_of_the_light_desc:0 "Nous sommes l'Empire du Soleil, l'Empire de la Lune, l'Empire de la Lumière. Nous ferons briller notre lumière sur tous."
 kit_memory_of_aksum:0 "Mémoire d'Axoum"
 kit_memory_of_aksum_desc:0 "Quand l'ancien empire d'Axoum est tombé, nous nous sommes élevés, mais nous gardons encore une partie de sa mémoire vivante, pour ne pas tomber nous-mêmes."
 kit_lakes_dominance:0 "Domination des Lacs"
 kit_lakes_dominance_desc:0 "Toutes les régions autour des lacs nous appartiennent de droit, et personne ne peut s'y opposer."
 kit_bachwezi_earthworks:0 "Ouvrages de Terre Bachwezi"
 kit_bachwezi_earthworks_desc:0 "Les Bachwezi ont toujours été des maîtres de la construction de terrassements, nos techniques de construction sont enviées par tous nos voisins."
 kit_nile_conquest:0 "Conquête du Nil"
 kit_nile_conquest_desc:0 "La vallée du Nil sera nôtre, comme elle l'a déjà été une fois, et personne ne devrait pouvoir contester ce fait."
 kit_rich_history:0 "Riche Histoire"
 kit_rich_history_desc:0 "Notre histoire et nos légendes sont riches, et certainement quiconque les entend sera convaincu que la nôtre est la nation destinée à régner."
 NBI_ideas:0 "Idées Nubiennes"
 NBI_ideas_start:0 "Traditions Nubiennes"
 NBI_ideas_bonus:0 "Ambition Nubienne"
 nbi_our_land:0 "Notre Terre"
 nbi_our_land_desc:0 "Ceci a toujours été notre terre depuis des temps immémoriaux. Notre peuple a toujours vécu ici peu importe la montée et la chute des pays autour de nous, et nous ne tomberons pas."
 nbi_religious_friction:0 "Friction Religieuse"
 nbi_religious_friction_desc:0 "Nous avons continué à être un bastion du christianisme même si autour de nous d'autres religions s'étendaient. Nous restons forts dans nos croyances et il en sera de même pour tous ceux sous notre domination."
 nbi_desert_knowledge:0 "Connaissance du Désert"
 nbi_desert_knowledge_desc:0 "Le désert est notre habitat natal, comment pourrions-nous ne pas le connaître ? Nous vivons confortablement avec sa présence, et pouvons le traverser avec facilité."
 nbi_military_strength:0 "Force Militaire"
 nbi_military_strength_desc:0 "Notre peuple a toujours été célèbre pour sa force et ses prouesses au combat. Les soldats nubiens ont vu des champs de bataille partout dans le monde."
 nbi_nile_control:0 "Contrôle du Nil"
 nbi_nile_control_desc:0 "Le Nil est l'artère principale de notre pays, et il nous permet non seulement un commerce extensif mais aussi une grande productivité agricole."
 nbi_christian_ties:0 "Liens Chrétiens"
 nbi_christian_ties_desc:0 "Nous avons toujours été un exemple pour les nations chrétiennes autour de nous. Même quand les musulmans sont venus frapper, nous n'avons pas faibli, et nos frères dans la foi peuvent être assurés que nous les protégerons."
 nbi_egyptian_relations:0 "Relations Égyptiennes"
 nbi_egyptian_relations_desc:0 "Notre nation a historiquement toujours été liée à l'Égypte. À travers elle, nous avons eu accès aux anciens Grecs et Romains, et à travers elle sont aussi venus les musulmans. À travers l'Égypte sont toujours venues de grandes sources de nouvelles et d'informations."
 ADA_ideas:0 "Idées Adalites"
 ADA_ideas_start:0 "Traditions Adalites"
 ADA_ideas_bonus:0 "Ambition Adalite"
 ada_our_infinite_struggle:0 "Notre Lutte Infinie"
 ada_our_infinite_struggle_desc:0 "Pendant des siècles, musulmans et chrétiens se sont affrontés dans la Corne de l'Afrique pour la suprématie sur le camp adverse. En tant que chefs naturels des musulmans, nous devons être le fer de lance qui apportera à notre foi la victoire sur les païens."
 ada_a_monarchial_imamate:0 "Un Imamat Monarchique"
 ada_a_monarchial_imamate_desc:0 "La séparation de l'État et de la foi n'existe pas dans notre tradition, mais les deux travaillent ensemble comme un seul. Notre dirigeant est à la fois notre souverain et notre plus haut imam, car la foi est inséparable du règne comme le règne l'est de la foi. Seul un homme dévot peut nous apporter la prospérité."
 ada_zeila_and_harar:0 "Zeila et Harar"
 ada_zeila_and_harar_desc:0 "L'une au bord de la mer et l'autre dans les montagnes, Zeila et Harar représentent les plus grandes sources de richesse et de culture de notre pays. Leur force en tant que centres de commerce et d'éducation enrichit non seulement nos coffres, mais aussi notre esprit et nous rapproche de Dieu."
 ada_mujahiduir_cavalry:0 "Cavalerie Mujahidun"
 ada_mujahiduir_cavalry_desc:0 "Depuis des générations, notre peuple a élevé les meilleurs chevaux de la région qui nous feront gagner le Jihad contre les chrétiens. Cette cavalerie s'appelle les Mujahidun et ils sont les plus beaux et les plus braves exemples de chevaux et de cavaliers."
 ada_unite_the_clans:0 "Unir les Clans"
 ada_unite_the_clans_desc:0 "En tant que Somaliens, notre organisation traditionnelle a été divisée en clans, et ces clans en sous-clans. Cette division mène à la compétition et aux luttes intestines, et seuls nos ennemis en bénéficient. Le temps de s'unir comme un seul et de mettre fin à nos différences est venu."
 ada_yahu_yahu:0 "Yahu Yahu"
 ada_yahu_yahu_desc:0 "Quand nous combattons les chrétiens, nous crions Yahu Yahu pour remplir nos cœurs de courage et celui de l'ennemi de peur. L'âme du lâche ne peut y résister, et comme ils n'ont pas Allah à leurs côtés, ils fuient toujours en montrant leur nature."
 ada_embrace_the_cannons:0 "Adopter les Canons"
 ada_embrace_the_cannons_desc:0 "Notre royaume fut le premier à adopter les canons comme outil commun sur les champs de bataille de la Corne de l'Afrique, et cela nous a donné un grand avantage sur nos ennemis. Nous ne devrions pas laisser cet atout se gaspiller et l'utiliser contre nos ennemis."
 JOL_ideas:0 "Idées du Djolof"
 JOL_ideas_start:0 "Traditions du Djolof"
 JOL_ideas_bonus:0 "Ambition du Djolof"
 jol_legacy_of_ndiadiane_ndiaye:0 "Héritage de Ndiadiane Ndiaye"
 jol_legacy_of_ndiadiane_ndiaye_desc:0 "Au commencement, il y avait six royaumes qui se faisaient concurrence. Ils étaient petits et faibles, jusqu'à ce qu'un Ndiadiane Ndiaye apparaisse et nous unisse tous sous une seule bannière. Les royaumes originaux existaient toujours, mais travaillaient ensemble sous la direction du Bour."
 jol_adherents_of_islam:0 "Adhérents de l'Islam"
 jol_adherents_of_islam_desc:0 "Une grande partie de notre peuple sont des incroyants, mais les rênes du pays sont tenues par des hommes dévots, des musulmans craignant Dieu. C'est parce qu'Allah est à nos côtés que notre combat est juste et équitable."
 jol_tribute_of_the_five_kingdoms:0 "Le Tribut des Cinq Royaumes"
 jol_tribute_of_the_five_kingdoms_desc:0 "Depuis les temps de Ndiadiane Ndiaye, le Bour a été le roi du Djolof, et les royaumes de Baol, Cayor, Saloum, Sine et Waalo lui ont payé tribut en reconnaissance de sa position de chef de tous. Nous étendrons ce système à toute autre nation qui s'agenouillera devant nous."
 jol_ambassadors_abroad:0 "Ambassadeurs à l'Étranger"
 jol_ambassadors_abroad_desc:0 "En raison de la visite constante de marchands étrangers sur nos côtes, nous avons appris combien le monde est grand. Notre peuple, naturellement curieux, a développé cet esprit d'aventure et de nombreux voyageurs volontaires se sont levés, nous donnant un stock abondant de possibles ambassadeurs parmi lesquels choisir."
 jol_qadi_tribunals:0 "Tribunaux des Cadis"
 jol_qadi_tribunals_desc:0 "Il n'y a pas de loi plus juste que la loi de Dieu, mais seuls les hommes peuvent s'assurer que d'autres hommes suivent les doctrines de l'islam comme ils le devraient. Pour cette tâche, nous avons sélectionné les meilleurs cadis, ou magistrats, pour guider notre peuple sur le chemin correct de la foi et de la dévotion comme l'enseigne la charia."
 jol_wolof_griots:0 "Griots Wolofs"
 jol_wolof_griots_desc:0 "Notre histoire est riche en contes, histoires, chansons et poèmes, et c'est le travail des célèbres griots wolofs de les collecter et de les préserver. Nos souverains ont largement utilisé ces griots pour amuser notre peuple et leur faire connaître notre grandeur, afin qu'ils puissent nous rendre l'amour que nous avons pour eux."
 jol_paying_the_waref:0 "Payer le Waref"
 jol_paying_the_waref_desc:0 "Dans notre royaume, la plupart des gens ne possèdent pas la terre qu'ils cultivent. Pour cultiver cette terre, les fermiers dans les villages à travers le pays paient une rente ou waref aux propriétaires fonciers. Ce n'est qu'en maintenant ce système bien établi que nous pouvons assurer la prospérité de notre nation."
 ZUL_ideas:0 "Idées Zoulous"
 ZUL_ideas_start:0 "Traditions Zoulous"
 ZUL_ideas_bonus:0 "Ambition Zouloue"
 zul_confederacy_of_clans:0 "Confédération de Clans"
 zul_confederacy_of_clans_desc:0 "Aux premiers jours de notre royaume, nous étions une confédération de plusieurs clans. Bien que nous visions un État plus centralisé de nos jours, la tradition des différents clans ayant un certain degré de souveraineté demeure."
 zul_the_ukubuthwa:0 "L'Ukubuthwa"
 zul_the_ukubuthwa_desc:0 "L'Ukubuthwa est un système de cérémonies d'initiation qui assure le renouvellement constant des recrues. Chaque classe d'âge, c'est-à-dire un groupe de jeunes hommes du même âge, est incorporée dans le même régiment. Ces régiments fonctionnent comme gardiens du troupeau national, messagers du grand roi et policiers domestiques. À travers ce système, ces hommes apprennent les bases du service militaire dès leur jeune âge, les préparant au service réel dans l'armée plus tard."
 zul_the_impi_warriors:0 "Les Guerriers Impi"
 zul_the_impi_warriors_desc:0 "Dans notre langue, Impi signifie guerre ou combat, mais désigne aussi les gens rassemblés pour cela, car pour nous il n'y a pas de distinction entre les guerriers et l'acte de guerre. Ils sont un et le même. Au début, ces groupes étaient plutôt désorganisés, mais grâce aux réformes du roi Shaka, ils sont systématisés et constituent une force redoutable."
 zul_zulu_expansion:0 "Expansion Zouloue"
 zul_zulu_expansion_desc:0 "Au début du XIXe siècle, le sud de l'Afrique a vu notre expansion rapide sur d'autres terres grâce à notre supériorité militaire. C'est par la force que nous mettrons ces terres à genoux."
 zul_warrior_culture:0 "Culture Guerrière"
 zul_warrior_culture_desc:0 "Les Zoulous ont toujours été belliqueux et agressifs car ce sont de bonnes qualités à avoir pour nous. Cela nous a aussi élevés comme maîtres de notre région. C'est grâce à ces traits que nos guerriers sont pleins de confiance en la victoire, au point d'être intrépides."
 zul_shaka_reforms:0 "Réformes de Shaka"
 zul_shaka_reforms_desc:0 "La grandeur de Shaka n'était pas seulement limitée aux réformes militaires, mais elle a aussi montré la voie pour devenir un État moderne et efficace. Nous prendrons ses idées et apporterons une ère de prospérité et de richesse pour notre peuple."
 zul_conquest_through_patronage:0 "Conquête par le Patronage"
 zul_conquest_through_patronage_desc:0 "Toute expansion ne doit pas se faire par la guerre. Bien que la nôtre ait été une trajectoire météorique par le combat, nous ne sommes pas fermés à l'idée de laisser d'autres tribus nous rejoindre de bon gré et bénéficier de la gloire partagée que nous pouvons obtenir ensemble."
 horn_of_african_punt_legend:0 "La Légende du Pays de Pount"
 horn_of_african_punt_legend_desc:0 "Bien que certains considèrent le Pays de Pount comme un mythe, cela ne change pas le fait que nous sommes son État successeur. Tout comme le Pays de Pount, nous transporterons nos marchandises vers les endroits les plus éloignés de ce monde."
 horn_of_african_aksumite_legacy:0 "Héritage Axoumite"
 horn_of_african_aksumite_legacy_desc:0 "La Corne de l'Afrique abritait jadis le célèbre Empire axoumite. Avec le temps, son influence s'est amenuisée, et finalement il a été remplacé par l'Éthiopie. Pourtant, son héritage vit dans notre culture jusqu'à ce jour."
 horn_of_african_highland_cultivation:0 "Culture des Hauts Plateaux"
 horn_of_african_highland_cultivation_desc:0 "Les régions proches de la péninsule arabique sont rarement connues pour leur sol fertile ou leur climat tempéré. Pourtant nous vivons ici, dans les grands hauts plateaux de la Corne de l'Afrique, voisins de la péninsule désertique. Notre peuple a adapté son mode de vie et cultive cette région montagneuse."
 horn_of_african_oromon_warriors:0 "Guerriers Oromos"
 horn_of_african_oromon_warriors_desc:0 "Les Oromos ont vécu dans la Corne de l'Afrique bien plus longtemps qu'on pourrait s'y attendre. La plupart des gens se souviennent d'eux pour leur immigration au cœur de la Corne. Ce qui est moins connu, c'est leur férocité et leur force au combat."
 horn_of_african_religious_melting_pot:0 "Peuple Religieux"
 horn_of_african_religious_melting_pot_desc:0 "La Corne de l'Afrique abrite plusieurs religions différentes très proches les unes des autres. Même si les États mènent des guerres de religion les uns contre les autres, ce n'est une surprise pour personne que notre peuple interagisse avec les païens de manière plus pacifique, et adopte même des éléments de religions étrangères dans la leur."
 horn_of_african_cushitic_language:0 "Langue Couchitique"
 horn_of_african_cushitic_language_desc:0 "Les langues couchitiques sont largement parlées dans la Corne et les différents États de la région sont plus qu'heureux d'utiliser cette langue pour la diplomatie."
 horn_of_african_religious_defensive_nature:0 "Nature Défensive"
 horn_of_african_religious_defensive_nature_desc:0 "Notre peuple est bien trempé. Nous sommes d'une nature sincèrement défensive et le terrain de notre région natale soutient cet état d'esprit."
 OYO_ideas:0 "Idées d'Oyo"
 OYO_ideas_start:0 "Traditions d'Oyo"
 OYO_ideas_bonus:0 "Ambition d'Oyo"
 oyo_yoruba_origin_story:0 "Histoire des Origines Yorubas"
 oyo_yoruba_origin_story_desc:0 "L'histoire des origines d'Oyo est faite de légendes et de mythes. Selon nos histoires d'origine traditionnelles, le monde a été formé par le fils d'Olorun, qui a répandu la terre dans l'eau, qui a ensuite formé notre monde, et Oyo."
 oyo_oduduwa_mythos:0 "Mythologie d'Oduduwa"
 oyo_oduduwa_mythos_desc:0 "Nos traditions parlent d'un grand héros, qui est un grand ancêtre yoruba et le premier roi d'Oyo : Oduduwa. Selon nos histoires orales, il fut le premier homme à marcher sur ce monde, tandis que d'autres traditions suggèrent qu'il s'est échappé de La Mecque et a fondé notre royaume. Quelle que soit la vérité, son héritage culturel est notre patrimoine."
 oyo_ile_ife_protector:0 "La Cité des 401 Divinités"
 oyo_ile_ife_protector_desc:0 "Ile-Ife est la grande cité des 401 divinités. C'est notre devoir de répandre son influence religieuse et de la protéger des païens."
 oyo_balnce_of_power:0 "Équilibre des Pouvoirs"
 oyo_balnce_of_power_desc:0 "L'Alaafin, le souverain d'Oyo, est tenu en échec par l'Oyo Mesi. Si l'Alaafin devait jamais aller trop loin dans l'abus de pouvoir, l'Oyo Mesi a le droit et le devoir de forcer le souverain à abdiquer, le plus souvent par un suicide rituel."
 oyo_the_oyo_cavalry:0 "La Cavalerie d'Oyo"
 oyo_the_oyo_cavalry_desc:0 "Notre armée est construite sur le dos solide de notre cavalerie. Nous devrions nous assurer d'y avoir un accès permanent pour renforcer notre armée."
 oyo_emporium_of_the_south:0 "Emporium du Sud"
 oyo_emporium_of_the_south_desc:0 "Les musulmans contrôlent le commerce du Nord en Afrique de l'Ouest, mais ils n'ont guère de côtes avec lesquelles travailler. Nous, en revanche, nous en avons ! Nous sommes l'emporium du sud et sommes la connexion commerciale entre l'Europe et l'Afrique."
 oyo_feudal_unity:0 "Unité Féodale"
 oyo_feudal_unity_desc:0 "Notre État est très décentralisé par l'utilisation d'États tributaires et de vassaux. Par une combinaison d'octroi d'autonomie aux provinces tout en obtenant la reconnaissance de l'autorité impériale, nous pouvons assurer la stabilité et l'unité de notre royaume."
 SOM_ideas:0 "Idées Somaliennes"
 SOM_ideas_start:0 "Traditions Somaliennes"
 SOM_ideas_bonus:0 "Ambitions Somaliennes"
 SOM_land_of_punt:0 "Pays de Pount"
 SOM_african_silk_road:0 "Route de la Soie Africaine"
 SOM_african_minting:0 "Frappe Africaine"
 SOM_zeila_and_berbera:0 "Zeila et Berbera"
 SOM_blue_nile:0 "Le Nil Bleu"
 SOM_indian_merchants:0 "Marchands Indiens"
 SOM_faithful_to_allah:0 "Fidèles à Allah"
 SOM_land_of_punt_desc:0 "D'anciennes structures pyramidales, des mausolées, des cités en ruines et des murs de pierre trouvés en Somalie sont la preuve d'une ancienne civilisation sophistiquée connue sous le nom de Pount qui a autrefois prospéré dans la péninsule somalienne."
 SOM_african_silk_road_desc:0 "La soie indienne/chinoise et la cannelle étaient également exportées à des prix bien plus élevés vers l'Afrique du Nord, et à leur tour le Proche-Orient et l'Europe, ce qui faisait du commerce de la soie et de la cannelle un générateur de revenus très profitable, surtout pour les marchands somaliens par les mains desquels de grandes quantités étaient expédiées à travers d'anciennes routes maritimes et terrestres. La route maritime était souvent plus rapide que les routes terrestres et cela avait un prix premium."
 SOM_african_minting_desc:0 "Les Somaliens maintenaient un vaste réseau commercial, dominaient le commerce régional de l'or, qui à son tour frappait sa propre monnaie, et ont laissé un vaste héritage architectural. Les pièces frappées étaient considérées comme parmi les plus précieuses dans les régions d'Arabie et d'Afrique du Nord."
 SOM_zeila_and_berbera_desc:0 "Les seuls ports maritimes d'importance sur cette côte sont Zeila et Berbera, le premier est une colonie arabe, dépendante de Moka, mais Berbera est indépendante de tout pouvoir étranger. C'est, sans en avoir le nom, le port le plus libre du monde, et la place commerciale la plus importante de tout le golfe d'Arabie et de la Corne de l'Afrique."
 SOM_blue_nile_desc:0 "Le Nil Bleu prend sa source au lac Tana en Éthiopie. Le fleuve coule généralement vers le sud avant d'entrer dans un canyon d'environ 400 km de long, à environ 30 km du lac Tana, qui est un obstacle formidable pour le voyage et la communication entre les États-nations de la Corne de l'Afrique. Nous sommes l'un des rares à savoir comment naviguer jusqu'à l'endroit où le Nil Bleu rencontre le Nil Blanc, et coule vers l'Égypte."
 SOM_indian_merchants_desc:0 "Pendant des siècles, les marchands indiens ont apporté de grandes quantités de cannelle du Sri Lanka et d'Indonésie en Somalie et en Arabie. On dit que c'était le secret le mieux gardé des marchands somaliens et des Arabes du Golfe dans leur commerce avec le monde européen."
 SOM_faithful_to_allah_desc:0 "Le christianisme et l'islam coexistent dans cette région. De nombreux chrétiens et musulmans de nos terres décrivent les membres de l'autre foi comme tolérants et honnêtes. Étant des gens du Livre, nous savons que dans leur cœur, ils sont finalement fidèles à Allah et peuvent aider à les guider sur leur chemin vers le salut."
 ISR_ideas:0 "Idées Israéliennes"
 ISR_ideas_start:0 "Traditions Israéliennes"
 ISR_ideas_bonus:0 "Ambition Israélienne"
 end_of_diaspora:0 "Fin de la Diaspora"
 end_of_diaspora_desc:0 "Pendant longtemps, le peuple d'Israël a vécu dispersé à travers l'Europe et le Moyen-Orient, mais maintenant, avec notre propre nation, cela a enfin pris fin !"
 national_myths_restored:0 "Mythes Nationaux Restaurés"
 national_myths_restored_desc:0 "Maintenant unis, nous pouvons à nouveau regarder les mythes qui définissent notre culture, en particulier raviver notre roi guerrier David et l'utiliser pour aiguiser notre armée !"
 return_home:0 "Retour au Foyer"
 return_home_desc:0 "Avec quelque chose que le peuple juif peut maintenant appeler son foyer, beaucoup d'entre eux migrent de nouveau vers Jérusalem et notre économie et notre production explosent avec l'augmentation de la population."
 jewish_trade_tradition:0 "Tradition Commerciale Juive"
 jewish_trade_tradition_desc:0 "Nous avons une longue tradition de commerce partout dans le monde, de Shanghai à Reykjavík. Les Radhanites sont un exemple parfait de cette fière tradition."
 pious_people:0 "Peuple Pieux"
 pious_people_desc:0 "Dans la longue histoire des Juifs, nous avons dû endurer beaucoup. Mais quels que soient les défis auxquels nous faisons face, nous ne perdrons jamais la foi en Dieu !"
 people_of_exile:0 "Peuple de l'Exil"
 people_of_exile_desc:0 "Étant plus habitués à voyager en raison de notre histoire, notre peuple a assez facilement à coloniser de nouvelles terres."
 the_chosen_people:0 "Le Peuple Élu"
 the_chosen_people_desc:0 "Les Juifs sont le peuple élu de Dieu, avec sa volonté divine nous ne perdrons plus jamais Israël au profit de nos anciens ennemis."


 #1.35 New Idea Group Additions by Big Boss


 infrastructure_ideas:0 "Idées d'Infrastructure"
 infrastructure_ideas_bonus:0 "Infrastructure Complète"
 efficient_construction_plans:0 "Plans de Construction Efficaces"
 efficient_construction_plans_desc:0 "Notre planification efficace autour de la construction nous permet de terminer les commandes de travaux sans rogner sur les coûts."
 expanded_infrastructure_network:0 "Réseau d'Infrastructure Étendu"
 expanded_infrastructure_network_desc:0 "Le réseau routier au sein de notre nation est une partie vitale de notre épanouissement commercial et administratif. À ce titre, nous devrions veiller à l'améliorer et à l'entretenir."
 merchant_passes:0 "Laissez-Passer Marchands"
 merchant_passes_desc:0 "En accordant des laissez-passer aux individus qui souhaitent mener des affaires commerciales, nous attirerons plus de personnes vers les activités commerciales tout en leur fournissant une sécurité juridique."
 state_efficiency:0 "Complexes d'Infrastructure Locale"
 state_efficiency_desc:1 "Malgré notre concentration sur l'échelle nationale des affaires, nous ne devons pas négliger de nous occuper de nos législateurs et baillis d'État locaux."
 fort_logistics:0 "Logistique de Fortification"
 fort_logistics_desc:0 "En ordonnant notre système de fortifications de manière appropriée tant au niveau de la construction que de la logistique, nous pouvons économiser quelques pièces sur son entretien à long terme."

 ###
 court_ideas:0 "Idées de Cour"
 court_ideas_bonus:0 "Cour Complète"
 recognize_hierarchy:0 "Hiérarchie Reconnue"
 recognize_hierarchy_desc:0 "Les États au sein de notre royaume doivent reconnaître le chef de l'État comme la voix finale de l'autorité au sein de notre cour."
 tranquil_coordination:0 "Coordination Tranquille"
 tranquil_coordination_desc:0 "Notre grand pays ne progressera et n'évoluera que si tous les membres du gouvernement se coordonnent de manière ordonnée."
 long_echo:0 "Long Écho"
 long_echo_desc:0 "L'influence que porte notre correspondance est sans précédent. Un simple mot de notre chef d'État suffit à avilir et à endommager le prestige des dynasties les plus illustres."
 palace_of_splendor:0 "Palais de Splendeur"
 palace_of_splendor_desc:0 "Aucun souverain ne peut être orné de gloire et de splendeur sans commander une cour immaculée et magnifique."
 welcoming_ceremonies:0 "Cérémonies d'Accueil"
 welcoming_ceremonies_desc:0 "Nous séduirons les dignitaires entrants avec des cérémonies élaborées et des démonstrations de pouvoir, de richesse et de prospérité."
 respected_authority:0 "Autorité Respectée"
 respected_authority_desc:1 "Notre autorité porte le poids de la grandeur de notre souverain. À ce titre, elle apporte avec elle certitude, prestige et un air de supériorité.\nRéduction de l'Impact sur l'Absolutisme Maximum des Privilèges : §G-20,0 %§ !"
 court_embassies:0 "Ambassades de Cour"
 court_embassies_desc:0 "Établir des postes de communication diplomatique entre nous et nos alliés est un ajout vital à l'influence de notre cour."


 ### No need for the rest of loc since it's using stuff
 ### from the old ideas etc, hence why some entries are missing here
 mercenary_ideas:0 "Idées de Mercenariat"
 mercenary_ideas_bonus:0 "Mercenariat Complet"
 war_council:0 "Conseil de Guerre"
 war_council_desc:0 "Établir un conseil dédié aux affaires de guerre, afin de raffiner et d'améliorer nos capacités militaires."
 nation_of_war:0 "Nation de Guerre"
 nation_of_war_desc:0 "Nos soldats ne sont pas découragés par l'applaudissement tonitruant du canon et du mousquet, le chant des épées et des lances qui s'entrechoquent."
 expanded_contracts:0 "Contrats Étendus"
 expanded_contracts_desc:0 "Mettre en place une manière standardisée de gérer les contrats de mercenaires et militaires qui fournit des filets de sécurité pour nos soldats et la promesse de soins post-guerre."
 seasoned_veterans:0 "Vétérans Aguerris"
 seasoned_veterans_desc:1 "Employer des vétérans aguerris dans nos rangs est un facteur nécessaire quand il s'agit de subir des pertes et une exposition prolongée aux éléments de la guerre et de la mort.\nLes compagnies de mercenaires ne réduisent plus le §YProfessionnalisme Militaire§! lors de l'embauche"


 ###New Ideas Additions###
 efficient_mining:0 "Exploitation Minière Efficace"
 efficient_mining_desc:1 "Émettre un décret pour raffiner chaque aspect de l'exploitation minière des métaux dans notre domaine, afin de réguler sa présence sur nos marchés.\nRéduction de l'Inflation du Remboursement de Prêt : §G-0,05§ !"
 regulation_bureau:0 "Bureau de Régulation"
 regulation_bureau_desc:0 "Un corps législatif dont la juridiction implique le maintien et la promotion des lois liées à l'inflation ainsi que l'administration locale de nos provinces."
 administrative_council:0 "Conseil Administratif"
 administrative_council_desc:0 "Établir un conseil dédié aux affaires d'administration, afin de raffiner et d'améliorer nos capacités bureaucratiques."
 cultural_regulations:0 "Régulations Culturelles"
 cultural_regulations_desc:0 "En prenant bien soin des nombreux peuples au sein de notre nation, nous pouvons accélérer leur intégration dans nos rangs bureaucratiques et atteindre une société stable."
 stable_government:0 "Gouvernement Stable"
 stable_government_desc:0 "Une main ferme à la barre de notre gouvernement ne sert qu'à assurer aux nombreux éléments de nos rangs que le pays se porte bien et prospère."
 local_rule:0 "Gouvernance Locale"
 local_rule_desc:0 "Assigner des responsabilités administratives aux bureaucrates locaux nous permet de réduire une grande partie de la paperasserie bureaucratique impliquée dans la supervision des affaires locales."
 rightful_conquest:0 "Conquête Légitime"
 rightful_conquest_desc:0 "Par droit de royauté noble, les terres autour de notre domaine appartiennent à notre illustre famille. Nul ne niera notre droit de naissance à être les souverains de notre domaine !"


