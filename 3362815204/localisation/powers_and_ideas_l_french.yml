 ideagroups.2000.t:0 "Routes de Campagne en Délabrement"
 ideagroups.2000.d:0 "Récemment, notre réseau d'infrastructure est tombé en délabrement. Ayant un besoin urgent d'entretien, les routes présentent maintenant de nombreuses mauvaises surprises pour les marchands et paysans voyageurs, car elles sont pleines de trous et ont été jugées dangereuses. Prendre en charge leur réparation coûtera certainement quelques-uns de nos administrateurs mais néanmoins amenderra la situation."
 ideagroups.2000.a:0 "Hélas, certains devront payer..."
 ideagroups.2000.b:0 "Nous n'avons pas besoin de routes !"
 ideagroups.2001.t:0 "La Marée Montante Soulève Tous les Bateaux"
 ideagroups.2001.d:0 "Alors que nos travaux d'amélioration de l'infrastructure de notre nation avancent, nous avons remarqué une hausse visible du niveau de vie de notre peuple, comme un sous-produit direct de nos efforts pour les élever et leur fournir de meilleures installations. Cela a eu un impact extrêmement bénéfique sur leur productivité et leur prospérité."
 ideagroups.2001.a:0 "Prospérité pour moi et pour toi !"
 ideagroups.2002.t:0 "Pièce de Théâtre à la Cour"
 ideagroups.2002.d:0 "Les lumières s'assombrissent alors que les acteurs montent sur scène. Des costumes élaborés, l'odeur de fruits exotiques et une performance mémorable ne sont que quelques-uns des spectacles culturels de [Root.Monarch.GetName], offerts en abondance à travers notre pays. Vraiment, notre nation est actuellement le centre de la mode, de la culture et de l'attention grâce à nos grandes politiques concernant notre cour et sa position prestigieuse dans nos affaires."
 ideagroups.2002.a:0 "[Root.Monarch.GetName] n'est qu'un amateur d'art moyen !"
 ideagroups.2003.t:0 "[Root.Monarch.GetName] Embarrasse Spectaculairement la Cour"
 ideagroups.2003.d:0 "Trébuchant sur sa robe, [Root.Monarch.GetName] halète alors que la robe l'enveloppe, dégringolant les escaliers du trône et devant les bottes des dignitaires et nobles venus en visite. Cette image comique n'est rien d'autre que l'étalage de notre chef d'État, qui se relève dans une tentative défaite d'essayer de convaincre les présents que ses mouvements ne sont que des plaisanteries dans un effort pour détendre l'atmosphère..."
 ideagroups.2003.a:0 "Oh non..."
 ideagroups.2003.c:0 "Bref."
 ideagroups.2004.t:0 "Le Bon Mercenaire"
 ideagroups.2004.d:0 "Il est vrai que de nombreux hommes de guerre sont sur notre livre de paie. Cependant, malgré notre utilisation fréquente de ces soldats, aucun n'a pillé plus que sa juste part ni ne s'est livré à des effusions de sang ou à d'autres actes de guerre. C'est un fait dont nous sommes fermement fiers, malgré le fait d'être une nation qui se concentre sur l'emploi de ces mercenaires. En conséquence, de nombreux peuples conquis acclament joyeusement à la vue de nos bannières alors qu'elles entrent dans les cités étrangères !"
 ideagroups.2004.a:0 "Nous ne sommes que de doux conquérants !"
 ideagroups.2005.t:0 "Les Chefs Militaires Se Plaignent"
 ideagroups.2005.d:0 "Les discussions au sein de nos commandements militaires ont fait place aux cris et aux plaintes ouvertes sur la direction que nous avons choisi de donner à nos forces. De nombreux généraux parmi nous ont fait part de préoccupations concernant notre dépendance excessive aux hommes engagés, déclarant qu'on ne peut pas compter sur eux pour servir notre pays d'abord, avant leurs poches."
 ideagroups.2005.a:0 "Ils ont raison."
 ideagroups.2005.b:0 "Que savent-ils ?"
 ideagroups.2010.t:0 "Cartes Routières Imprécises"
 ideagroups.2010.d:1 "Nos cartes se sont avérées de peu de valeur. Les routes de notre pays sont imprécises, et nos troupes ont du mal à manœuvrer à travers notre infrastructure."
 ideagroups.2010.a:0 "C'est ainsi"
 ideagroups.2010.b:0 "Remplacez ces cartes immédiatement"
 ideagroups.2011.t:0 "Fournitures de Construction Insuffisantes"
 ideagroups.2011.d:0 "Nos ouvriers rapportent que nos fournitures pour nos constructions sont épuisées. Nous devons commander les ressources nécessaires pour les bâtiments de l'extérieur."
 ideagroups.2011.a:0 "Oh non"
 ideagroups.2020.t:0 "Développement de [event_province.GetName] ralenti"
 ideagroups.2020.d:0 "La cité de [event_province.GetName] montre un grand potentiel pour devenir l'un des joyaux de [Root.GovernmentName]. Cependant, même la plus grande capacité de développement n'épargne pas une province des complications. Les bourgeois de [event_province.GetName] manquent des moyens pour promouvoir l'expansion de leur lieu en raison du manque d'administration."
 ideagroups.2020.a:0 "Leur cité peut attendre"
 ideagroups.2020.b:0 "Investir dans leur développement"
 ideagroups.2021.t:0 "Essor Économique en [Root.Capital.GetRegionName]"
 ideagroups.2021.d:0 "[Root.Capital.GetRegionName] ; le foyer même de notre capitale et cœur de notre [Root.GovernmentName] traverse une période de richesse et de prospérité. Nous pouvons utiliser cette opportunité pour promouvoir l'essor économique de toute la région."
 ideagroups.2021.a:0 "Une excellente époque pour vivre en [Root.Capital.GetRegionName]"
 ideagroups.2021.b:0 "Investir dans la zone de la capitale à la place"
 ideagroups.2006.t:0 "Un Architecte Talentueux"
 ideagroups.2006.d:0 "Les cités de [Root.GetUsableName] grandissent. À ce titre, elles ont besoin de grands architectes qui gèrent la conception et la construction des nombreux nouveaux bâtiments.\nUn tel visionnaire architectural talentueux est arrivé à la cour il n'y a pas longtemps."
 ideagroups.2006.a:0 "Cet architecte concevra les cités de demain"
 ideagroups.2006.b:0 "Il y a de meilleurs architectes ailleurs"
 ideagroups.2007.t:0 "Urbanisation à [event_province.GetName]"
 ideagroups.2007.d:0 "Paysans, artisans, ouvriers et autres hommes du peuple commun déménagent vers la ville de [event_province.GetName]. La province est en cours d'urbanisation active."
 ideagroups.2007.a:0 "S'assurer que ces nouveaux venus paient leurs impôts"
 ideagroups.2007.b:0 "Ce sera une aubaine pour la production locale"
 ideagroups.2007.c:0 "Plus d'effectifs est toujours le bienvenu"
 ideagroups.2008.t:0 "Défis Administratifs"
 ideagroups.2008.d:0 "À mesure que les métropoles de notre [Root.GovernmentName] grandissent, les défis administratifs auxquels l'État doit faire face augmentent aussi. La gestion des cités de plus en plus puissantes nécessite une attention bureaucratique, qui ne peut pas être utilisée pour administrer de nouveaux territoires."
 ideagroups.2008.a:0 "Juste un problème temporaire"
 ideagroups.2008.b:0 "Investir dans nos bureaux"
 ideagroups.2009.t:0 "Bonne Gestion des Cités"
 ideagroups.2009.d:0 "Les bourgeois de nos cités ont exprimé leur gratitude envers nous pour notre bonne gestion de leurs cités."
 ideagroups.2009.a:0 "Le peuple est heureux"
 ideagroups.2012.t:0 "Réunion du Grand État"
 ideagroups.2012.d:0 "Une tradition de notre cour, les membres puissants et influents de l'État se sont à nouveau rassemblés à la cour [Root.GetAdjective]. La journée est passée à résoudre les questions de cour et de pays tandis que la nuit se termine par un festival de cour cérémoniel. La réunion de cette année a été un grand succès car [Root.Monarch.GetTitle] a été loué par ses sujets."
 ideagroups.2012.a:0 "Quelle journée agréable"
 ideagroups.2013.t:0 "Chaos à la Cour"
 ideagroups.2013.d:0 "Bien qu'elle ait commencé de manière très prometteuse, la réunion du Grand État de cette année est un désastre complet. L'organisation de la cour n'était pas rigoureuse et de nombreux invités qui ont des vendettas les uns contre les autres ont été invités dans la même salle. On n'a pas prêté attention à [Root.Monarch.GetTitle] car les puissants et influents des états étaient trop occupés avec leurs propres querelles mesquines."
 ideagroups.2013.a:0 "Quel fiasco"
 ideagroups.2014.t:0 "Refuge d'un Noble [noble_origin_country.GetAdjective]"
 ideagroups.2014.d:0 "Tous les membres de la noblesse ne l'ont pas aussi bien que [Root.GetNobilityName]. Un noble étranger, sa famille et ses serviteurs, ont été exilés de [noble_origin_country.GovernmentName] de [noble_origin_country.GetUsableName]. Ses raisons pour son bannissement sont un mystère pour nous alors qu'il demande asile à notre cour."
 ideagroups.2014.a:0 "Accordez-lui sa demande"
 ideagroups.2014.a.tt:0 "Le noble mystérieux fera partie de la cour royale."
 ideagroups.2014.b:0 "Refusez-le"
 ideagroups.20140.t:0 "Le Noble se Révèle"
 ideagroups.20140.desc.a:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nIl s'avère que cet homme n'est autre que l'héritier banni du trône [From.GetAdjective] lui-même. Il est de la famille royale [From.Dynasty.GetName] et a été banni afin que [From.Monarch.GetName] puisse accéder au trône. Le dynaste n'a exprimé aucun intérêt pour le trône et a transféré toute forme de prétention qu'il avait à [Root.Monarch.GetTitle] [Root.Monarch.GetName] en remerciement pour notre hospitalité."
 ideagroups.20140.a:0 "Nous utiliserons cette prétention sagement"
 ideagroups.20140.desc.b:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nIl s'avère que cet homme n'est autre qu'un politicien banni de [From.GetName]. Initialement destiné à être exécuté, l'ancien ministre s'est à peine échappé avec la vie sauve. Depuis, il est devenu un membre de confiance de la cour. En remerciement pour notre hospitalité, il nous accorde des documents qui justifieraient la subjugation totale de [From.GetName]."
 ideagroups.20140.b:0 "Nous utiliserons cette prétention sagement"
 ideagroups.20140.desc.c:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nSous le couvert de la nuit, le noble étranger s'est introduit dans le trésor de notre État. Le lendemain matin, aucune trace du voleur ni de ses complices ne peut être trouvée."
 ideagroups.20140.c:0 "Mes Couronnes !"
 ideagroups.20140.desc.d:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nLe noble s'avère être maudit par une puissance supérieure. Où qu'il aille, la malchance le suit. [From.Monarch.GetTitle] de [From.GetName] est fatigué de gérer cet homme malchanceux.\nÀ la chance du noble, [Root.Monarch.GetName] a plus de patience."
 ideagroups.20140.d:1 "Tant qu'il ne touche à rien, c'est bon..."
 ideagroups.20140.desc.e:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nAu milieu d'une de nos réunions militaires de [Root.Monarch.GetTitle], le noble est entré dans la salle et a prétendu avoir des stratégies contre nos ennemis qui dépassent la compréhension de nos généraux. Bien que le tollé ait été grand, il a prouvé son point de vue et se révèle être un général [From.GetAdjective] qui a été banni pour ses stratégies audacieuses."
 ideagroups.20140.e:0 "Il dirigera nos troupes"
 ideagroups.20140.desc.f:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nAu milieu d'une de nos réunions militaires de [Root.Monarch.GetTitle], le noble est entré dans la salle et a prétendu avoir des stratégies contre nos ennemis qui dépassent la compréhension de nos généraux. Bien que le tollé ait été grand, il a prouvé son point de vue et se révèle être un amiral [From.GetAdjective] qui a été banni pour ses stratégies audacieuses."
 ideagroups.20140.f:0 "Il dirigera nos navires"
 ideagroups.20140.desc.g:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nAu fil des jours, le noble s'est révélé très talentueux dans les arts de la gestion de l'État. Apparemment, il était auparavant l'un des hauts conseillers du trône [From.GetAdjective], mais en raison de conflits avec son ancien [From.Monarch.GetTitle], il a été forcé de fuir."
 ideagroups.20140.g:0 "Il nous servira comme notre propre homme d'État"
 ideagroups.20140.desc.h:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nAu fil des jours, le noble s'est révélé très talentueux dans les arts de la diplomatie et des négociations. Apparemment, il était un diplomate brillant de [From.GetUsableName], mais en raison de conflits avec son ancien [From.Monarch.GetTitle], il a été forcé de fuir."
 ideagroups.20140.h:0 "Il nous servira comme notre propre diplomate"
 ideagroups.20140.desc.i:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\n\nAu fil du temps, le noble est devenu ami avec [Root.Monarch.GetTitle] lui-même. Il se révèle habile dans les affaires d'administration, de diplomatie et militaires, et est en général bien reçu à la cour.\nComme [Root.Monarch.GetName] n'a toujours pas d'héritier approprié au trône, le choix n'est pas trop difficile de sélectionner le noble comme prochain dans l'ordre de succession."
 ideagroups.20140.i:0 "Qu'il mène [Root.GetUsableName] vers un avenir meilleur"
 ideagroups.20140.desc.j:1 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\n\nAu fil du temps, le noble est devenu ami avec [Root.Monarch.GetTitle] lui-même. Il se révèle habile dans les affaires d'administration, de diplomatie et militaires, et est en général bien reçu à la cour. Sa piété est une inspiration pour ceux qui suivent sa parole et son zèle pour [Root.GetUsableName] n'est égalé que par sa croyance en sa foi. Il montre un grand potentiel pour être le prochain [Root.Monarch.GetTitle]..."
 ideagroups.20140.j:0 "Qu'il mène [Root.GetUsableName] vers un avenir meilleur"
 ideagroups.20140.desc.k:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\n\nAu fil du temps, le noble est devenu ami avec [Root.Monarch.GetTitle] lui-même. Il se révèle habile dans les affaires d'administration, de diplomatie et militaires, et est en général bien reçu à la cour.\nEntre-temps, une rumeur vile sur la compétence de [Root.Monarch.GetName] se répand au sein de [Root.GovernmentName]. Il est clair que [Root.Monarch.GetTitle] perd tout soutien de bienfaiteurs tandis que le noble gagne de plus en plus de soutien pour l'élection..."
 ideagroups.20140.k:0 "Qu'il mène [Root.GetUsableName] vers un avenir meilleur"
 ideagroups.20140.desc.l:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nLa nuit dernière était paisible. [Root.Monarch.GetTitle] dormait dans ses appartements, protégé par des gardes. Personne n'aurait pu savoir que ces hommes avaient été remplacés par les alliés du noble...\nL'attaque est venue rapidement, inaperçue et mortelle. Notre [Root.Monarch.GetTitle] est mort !"
 ideagroups.20140.l:0 "Ce n'était pas un noble mais un assassin !"
 ideagroups.20140.desc.m:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\nAu fil des jours, le noble a rassemblé des informations sur quiconque entre ou sort de la cour. Secret par nature, il lui a fallu des mois pour se révéler comme l'ancien maître espion de [From.GetUsableName]. Ses connaissances sur les affaires étrangères [From.GetAdjective] l'ont forcé à fuir."
 ideagroups.20140.m:0 "Il nous servira comme notre propre maître espion"
 ideagroups.20140.desc.n:0 "Depuis que cet homme est apparu à la cour [Root.GetAdjective], il a été un mystère pour notre propre classe d'élite. Personne ne connaît son nom ni n'a pu trouver d'informations sur cet homme secret.\nJusqu'à aujourd'hui...\n\n"
 ideagroups.20140.desc.zzz:0 "Apparemment, le noble est un vieil homme et un fou."
 ideagroups.20140.zzz:0 "Pas étonnant qu'il ait été exilé."
 ideagroups.2015.t:0 "Étalage de Décadence"
 ideagroups.2015.d:0 "L'économie de [Root.GetUsableName] vit l'un de ses pires moments de l'histoire [Root.GetAdjective]. Pourtant, [Root.Monarch.GetTitle] et ses conseillers les plus fiables profitent des festivals à la cour tandis que le peuple [Root.GetAdjective] n'a pas accès au pain."
 ideagroups.2015.a:0 "Qu'ils mangent de la brioche."
 ideagroups.2016.t:0 "Envie pour notre Cour"
 ideagroups.2016.d:0 "Notre cour regorge de gloire et de prestige. À tel point qu'elle est l'objet de l'envie de nombreux monarques et souverains."
 ideagroups.2016.a:0 "L'envie est la plus haute forme de flatterie"
 ideagroups.2017.t:0 "Cour Ayant Besoin de Rénovation"
 ideagroups.2017.d:1 "Au fil des ans, la cour royale de [Root.GetUsableName] a beaucoup servi mais peu été entretenue. Ce qui était autrefois le joyau de la culture [Root.GetAdjective] n'est maintenant qu'une source de honte."
 ideagroups.2017.a:0 "Tant qu'elle est fonctionnelle, elle est dans un état suffisant"
 ideagroups.2017.b:0 "Rénover la cour immédiatement"
 ideagroups.2025.t:0 "Tactiques Militaires des Mercenaires"
 ideagroups.2025.d:0 "Avec notre utilisation intensive d'unités de mercenaires, notre commandement militaire a commencé à prendre des notes de ces soldats de fortune. Leur professionnalisme est une inspiration pour nos généraux."
 ideagroups.2025.a:0 "Et ils disent que ces mercenaires ne servent à rien. Peuh."
 ideagroups.2026.t:0 "Un Mercenaire comme Conseiller"
 ideagroups.2026.d:0 "Tous les mercenaires ne cherchent pas à gagner leur vie sur le champ de bataille pour toujours. Un vieux vétéran et ancien commandant d'une des compagnies de mercenaires a rejoint la cour [Root.GetAdjective] et offre ses services comme conseiller à [Root.Monarch.GetTitle]."
 ideagroups.2026.a:0 "Un homme de son talent est toujours le bienvenu."
 ideagroups.2027.t:0 "De Nouveaux Soldats Rejoignent les [excited_mercs.GetName]"
 ideagroups.2027.d:1 "[Root.GetName] est hautement considéré parmi les capitaines mercenaires pour notre réputation de payer les soldats mercenaires à temps et aux taux convenus. Un afflux de soldats de fortune étrangers a rejoint les [excited_mercs.GetName], espérant trouver un travail stable sous notre emploi."
 ideagroups.2027.a:0 "Plus d'hommes combattant de notre côté est toujours une vue bienvenue."
 ideagroups.2028.t:0 "La Réputation d'un Mercenaire"
 ideagroups.2028.d:0 "[Root.GetUsableName] utilise des compagnies de mercenaires en grande quantité pour les tâches militaires. Bien que ces soldats de fortune accomplissent le devoir pour lequel ils sont payés, leur réputation est au mieux discutable. Malheureusement, cette réputation s'étend à nous car les ambassadeurs étrangers commencent à nous voir aussi honorables que n'importe quel condottiere."
 ideagroups.2028.a:0 "Il n'y a pas de honte à utiliser des mercenaires."


 #Modifiers and Tooltips
 road_maintenance_modifier:0 "Entretien des Routes"
 desc_road_maintenance_modifier:0 "Les provinces subissent un entretien des routes. L'infrastructure est une partie vitale de la productivité de notre nation."
 no_road_maintenance_modifier:0 "Routes Abyssales"
 shared_prosperity_modifier:0 "Prospérité Partagée"
 embarassing_display_modifier:0 "Étalage Embarrassant"
 great_reputation_modifier:0 "Grande Réputation"
 shift_on_military_affairs_modifier:0 "Changement sur les Affaires Militaires"
 usual_conduct_tt:0 "La cour de [Root.Monarch.GetName] est habituée aux démonstrations d'excentricité et en rira donc simplement"
 mercenary_leadership:0 "Direction Mercenaire"
 desc_mercenary_leadership:0 "L'élévation d'un général mercenaire au rang de conseiller de la cour [Root.GetAdjective] apporte de nombreux avantages pour nos compagnies de mercenaires. À ce titre, leur moral pour notre cause est inégalé."
 negative_mercenary_reputation:0 "Réputation d'un Mercenaire"
 desc_negative_mercenary_reputation:0 "Notre déploiement d'unités de mercenaires pour nos conflits a laissé une tache sur notre réputation. Apparemment, nous sommes aussi honorables que n'importe quel condottiere double-jeu."
