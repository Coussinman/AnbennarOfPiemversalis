 racial_pop_misc.2.d:0 "Le mélange d'humains et d'orques à [racial_pop_province_target.GetName] a conduit à l'émergence d'une minorité demi-orque conséquente. Ces nouvelles gens combinent la puissance physique brute de leur sang orque avec la détermination et la volonté d'adaptation de l'humanité, et constitueront sans aucun doute une minorité importante dans la province."
