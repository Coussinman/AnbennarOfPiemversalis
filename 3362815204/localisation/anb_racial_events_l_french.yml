 racial_pop_events_centaur.14.d:0 "En l'an [GetYear], [Root.Monarch.GetTitle] [Root.Monarch.GetName] a officiellement proclamé que tous les centaures sur les terres de [Root.Country.GetName] devaient être tués à vue.\n\nLes centaures de [Root.Country.GetName] n'ont d'autre choix que de fuir le pays."
 racial_pop_events_centaur.14.a:0 "Commencer la Purge"
 racial_pop_events_centaur.15.t:0 "Révocation de l'Expulsion des Centaures"
 racial_pop_events_centaur.15.d:0 "Le gracieux [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.Country.GetName] a révoqué l'édit d'expulsion contre la race centaure.\n\nLes centaures pourront désormais s'installer et migrer vers [Root.Country.GetName]."
 racial_pop_events_centaur.15.a:0 "Mettre fin à l'Expulsion"
 racial_pop_events_centaur.16.t:0 "Fin de la Purge des Centaures"
 racial_pop_events_centaur.16.d:0 "Le très miséricordieux [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.Country.GetName] a ordonné la fin de la purge du peuple centaure.\n\nLes centaures pourront désormais s'installer et migrer vers [Root.Country.GetName], s'ils l'osent."
 racial_pop_events_centaur.16.a:0 "Mettre fin à la Purge"
 racial_pop_events_centaur.17.t:0 "Minorité Centaure Expulsée"
 racial_pop_events_centaur.17.d:0 "En raison de l'Édit d'Expulsion, les minorités centaures vivant dans la province de [racial_pop_province_origin.GetName] ont commencé à partir en masse, laissant derrière eux tout ce qu'ils ne pouvaient pas emporter."
 racial_pop_events_centaur.17.a:0 "Bon débarras !"
 racial_pop_events_centaur.17.b:0 "Ils ont laissé beaucoup de choses derrière eux..."
 racial_pop_events_centaur.18.t:0 "Majorité Centaure Expulsée"
 racial_pop_events_centaur.18.d:0 "[racial_pop_province_origin.GetName] était une province à majorité centaure jusqu'à ce que l'Édit d'Expulsion soit promulgué. De ce fait, un grand nombre de centaures ont commencé à quitter la province, ce qui finira par réduire leur race à une minorité."
 racial_pop_events_centaur.18.a:0 "Allez, ouste !"
 racial_pop_events_centaur.19.t:0 "Minorité Centaure Purgée"
 racial_pop_events_centaur.19.d:0 "Des cris de terreur émanent de [racial_pop_province_origin.GetName] alors que la population centaure locale est massacrée tant par les autorités que par la population locale."
 racial_pop_events_centaur.19.a:0 "Bon débarras."
 racial_pop_events_centaur.19.b:0 "Assurez-vous qu'ils soient tous tués."
 racial_pop_events_centaur.20.t:0 "Majorité Centaure Purgée"
 racial_pop_events_centaur.20.d:0 "Les cadavres deviennent un spectacle courant à [racial_pop_province_origin.GetName] alors que la population centaure autrefois dominante est tuée à vue par les forces [Root.Country.GetAdjective]."
 racial_pop_events_centaur.20.a:0 "Enfin débarrassés d'eux !"
 racial_pop_events_centaur.21.t:0 "Les Centaures Fuient le Pays"
 racial_pop_events_centaur.21.d:0 "En raison des récents ordres de purger la race centaure au sein de [Root.Country.GetName], de nombreux centaures de [racial_pop_province_origin.GetName] ont fui leurs foyers."
 racial_pop_events_centaur.22.t:0 "La Majorité Centaure Fuit le Pays"
 racial_pop_events_centaur.22.d:0 "La province de [racial_pop_province_origin.GetName] a été hâtivement vidée en raison des ordres de purger la race centaure."
 racial_pop_events_centaur.23.t:0 "Les Centaures Persécutés Causent des Troubles"
 racial_pop_events_centaur.23.d:0 "La persécution de la race centaure, qu'il s'agisse d'expulsion ou de purge, a conduit à de nombreuses émeutes et troubles généraux à [racial_pop_province_origin.GetName]."
 racial_pop_events_centaur.23.a:0 "Maudits soient-ils !"

##################
# Ogre Events
##################
 racial_pop_events_ogre.1.t:0 "Arrivée de Migrants Ogres"
 racial_pop_events_ogre.1.d:0 "Les migrants ogres de [origin_province.GetName] sont récemment arrivés et se sont installés sur nos terres. Ils nous fourniront une main-d'œuvre, une base fiscale et leur expertise dans les métiers : voilà une aubaine pour notre nation !"
 racial_pop_events_ogre.1.a:0 "Bienvenue à [destination_province.GetName] !"
 racial_pop_events_ogre.2.t:0 "Migrants Ogres Bloqués !"
 racial_pop_events_ogre.2.d:0 "Les récentes tentatives de la population ogre de [origin_province.GetName] de migrer vers notre nation ont été stoppées par les efforts de leur patrie. Qu'ils ne puissent simplement pas se résoudre à laisser partir une source fiscale précieuse, ou que cela ait été fait par malveillance, reste à voir..."
 racial_pop_events_ogre.2.a:0 "Quelle perfidie !"
 racial_pop_events_ogre.3.t:0 "Le Peuple Ogre Émigre Ailleurs"
 racial_pop_events_ogre.3.d:0 "Que ce soit en raison de mauvais traitements, d'opportunités économiques ou simplement d'une meilleure compatibilité, un grand nombre d'ogres de [origin_province.GetName] sont partis pour [destination_province.GetName] dans l'espoir d'une nouvelle vie."
 racial_pop_events_ogre.3.a:0 "Bonne chance à [From.GetName] !"
 racial_pop_events_ogre.3.b:0 "Arrêtez-les ! Ce sont nos sujets légitimes !"
 racial_pop_events_ogre.4.t:0 "La Minorité Ogre Croît"
 racial_pop_events_ogre.4.d:0 "Que ce soit par croissance naturelle ou par un afflux constant de migrants ou d'esclaves, la population de la minorité ogre à [Root.GetName] a augmenté."
 racial_pop_events_ogre.4.a:0 "Plus on est de fous, plus on rit ?"
 racial_pop_events_ogre.5.t:0 "La Minorité Ogre se Disperse"
 racial_pop_events_ogre.5.d:0 "En raison de mauvais traitements, de troubles ou de dévastation, la population des minorités ogres à [Root.GetName] s'est dispersée vers les provinces et cités voisines, diminuant l'importance de cette communauté dans les affaires de l'État."
 racial_pop_events_ogre.5.a:0 "Les minorités ogres à [Root.GetName] ont diminué en taille"
 racial_pop_events_ogre.6.t:0 "Migration Interne de la Minorité Ogre"
 racial_pop_events_ogre.6.d:0 "Une tendance récente montre que des ogres tentent de se déplacer de [origin_province.GetName] vers [destination_province.GetName]. Que ce soit en raison de troubles ou du chaos à [origin_province.GetName] ou de meilleures opportunités et conditions de vie à [destination_province.GetName], si nous n'agissons pas, la population de la minorité ogre de [destination_province.GetName] augmentera."
 racial_pop_events_ogre.6.a:0 "Encourageons et finançons cette migration"
 racial_pop_events_ogre.6.b:0 "Laissons-les faire comme bon leur semble"
 racial_pop_events_ogre.6.c:0 "Empêchons toute migration supplémentaire"
 racial_pop_events_ogre.7.t:0 "Inviter des Ogres de Nos Voisins ?"
 racial_pop_events_ogre.7.d:0 "Que ce soit en raison de mauvais traitements, de difficultés économiques ou simplement d'incompatibilité, une opportunité s'offre à nous d'encourager la migration d'ogres depuis la province de [origin_province.GetName] de notre voisin vers notre province de [destination_province.GetName]. Il suffirait d'un peu de diplomatie pour huiler les rouages de l'État."
 racial_pop_events_ogre.7.a:0 "Invitons les migrants ogres, nous pourrions utiliser leur aide"
 racial_pop_events_ogre.7.b:0 "Laissons-les faire comme ils l'entendent, mais ne nous en mêlons pas"
 racial_pop_events_ogre.7.c:0 "Absolument pas ! Fermons-leur nos frontières !"
 racial_pop_events_ogre.10.p:0 "Ce sont des ogres, tout comme nous, et leur présence sera une aubaine sans réserve"
 racial_pop_events_ogre.10.t:0 "Réfugiés Ogres de [From.GetName]"
 racial_pop_events_ogre.10.d:0 "Des ogres fuyant les persécutions de [From.GetName] ont commencé à se masser à nos frontières, cherchant refuge et un nouveau foyer."
 racial_pop_events_ogre.10.a:0 "Laissons-les entrer, ils ont déjà assez souffert"
 racial_pop_events_ogre.10.b:0 "Ils devront travailler pour mériter leur place dans nos frontières"
 racial_pop_events_ogre.10.c:0 "Il n'y a pas de place pour vous ici !"
 racial_pop_events_ogre.11.t:0 "Réfugiés Ogres de [From.From.GetName]"
 racial_pop_events_ogre.11.d:0 "Des réfugiés fatigués et épuisés fuyant les persécutions de [From.From.GetName] se massent à nos frontières. Ils semblent désespérés de trouver un nouveau foyer et n'accepteront pas un refus."
 racial_pop_events_ogre.11.a:0 "Laissons entrer ces pauvres âmes !"
 racial_pop_events_ogre.11.b:0 "Exploitons leur désespoir et utilisons-les comme main-d'œuvre bon marché"
 racial_pop_events_ogre.11.c:0 "Empêchons leur entrée par la force, si nécessaire"
