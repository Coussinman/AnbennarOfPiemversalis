 racial_pop_events_kobold.23.t:0 "Les Kobolds Persécutés Causent des Troubles"
 racial_pop_events_kobold.23.d:0 "La persécution de la race kobold, qu'il s'agisse d'expulsion ou de purge, a conduit à de nombreuses émeutes et troubles généraux à [racial_pop_province_origin.GetName]."
 racial_pop_events_kobold.23.a:0 "Maudits soient-ils !"
 racial_pop_events_kobold.100.t:0 "Envoyer des Kobolds en Aelantir"
 racial_pop_events_kobold.100.d:0 "Alors que la colonisation d'Aelantir bat son plein, l'un de nos conseillers a soumis une proposition : utiliser certaines de nos minorités raciales pour accélérer la fondation d'avant-postes et de cités dans le nouveau monde. L'adaptabilité des kobolds et leur nombre considérable sont parfaits pour cet usage, et ce n'est pas comme s'ils nous manqueraient ici.\nCependant, un débat agite notre gouvernement quant à l'opportunité d'offrir des incitations financières pour encourager l'émigration, ou plutôt de simplement les forcer à partir pour Aelantir."
 racial_pop_events_kobold.100.1:0 "Donnons-leur un peu d'argent."
 racial_pop_events_kobold.100.2:0 "Jetons-les sur un bateau."

