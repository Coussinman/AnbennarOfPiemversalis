 racial_pop_misc.4.t:0 "Diplomates Surchargés !"
 racial_pop_misc.4.d:0 "De-ci de-là, de-là de-ci. Vos diplomates travaillent à un rythme effréné, triant des dossiers et fouillant les étagères. Leurs assistants passent en courant, portant plusieurs pots de la boisson favorite de chacun. Vous apercevez un diplomate enfilant hâtivement des vêtements de rechange alors qu'il monte dans une voiture pour être expédié vers quelque contrée étrangère. On dit qu'un jour au service de [Root.Monarch.GetTitle] [Root.Monarch.GetName] équivaut à une année à la cour d'un roi moindre, et comment en serait-il autrement ? En vérité, un spectacle aussi grandiose apporte prestige, efficacité et splendeur à [Root.Monarch.GetTitle] ! Un assistant accourt, portant dans ses mains un document commandé par nul autre que [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself]. Le titre : Durabilité des Conditions de Travail au Département des Relations Diplomatiques. La conclusion : non."
 racial_pop_misc.4.a:0 "Très bien, allégeons la charge de travail"
 racial_pop_misc.4.b:0 "Il doit bien y avoir un moyen de maintenir notre rythme actuel ?"

