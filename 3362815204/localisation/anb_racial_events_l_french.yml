 racial_pop_events_debug.1.a:0 "§RVous ne pouvez pas Expulser/Purger votre propre race, la race de votre dirigeant, ou celle qui constitue le gros de votre armée§!"
 racial_pop_events_debug.1.tooltip:0 "Vous avez soit le modificateur §YAdministration Raciale§! soit §YArmée Raciale§! de cette race."
 racial_pop_events_debug.1.b:0 "À la réflexion..."
 racial_pop_events_debug.1.c:0 "§RDésigner un Intérêt Racial (un autre Intérêt Racial est déjà actif)§!"
 racial_pop_events_debug.1.d:0 "Désigner un Intérêt Racial"
 racial_pop_events_debug.1.e:0 "Retirer l'Intérêt Racial"
 racial_pop_events_debug.2.tooltip:0 "Tous les pays dirigés par la race expulsée obtiendront §R-100§! §YOpinion§! envers vous."
 racial_pop_events_debug.3.tooltip:0 "Tous les pays dirigés par la race purgée obtiendront §R-200§! §YOpinion§! envers vous."
 racial_pop_events_debug.4.tooltip:0 "\nChaque province avec une §YMajorité§! ou §YMinorité§! Raciale gagnera §R2-15§! §YAgitation§! selon leur taille."
 racial_pop_events_debug.5.tooltip:0 "Les événements liés à l'§YExpulsion§! de cette race se produiront désormais."
 racial_pop_events_debug.6.tooltip:0 "Les événements liés à la §YPurge§! de cette race se produiront désormais."
 racial_pop_events_debug.7.tooltip:0 "Les événements liés à l'§YExpulsion§! de cette race cesseront désormais.\n\nLes pays dirigés par la §YRace Anciennement Expulsée§! obtiendront une §YOpinion§! décroissante de §R-100§! envers vous."
 racial_pop_events_debug.8.tooltip:0 "Les événements liés à la §YPurge§! de cette race cesseront désormais.\n\nLes pays dirigés par la §YRace Anciennement Purgée§! obtiendront une §YOpinion§! décroissante de §R-100§! envers vous."

