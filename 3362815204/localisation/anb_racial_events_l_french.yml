 racial_pop_events_ruinborn.5.d:0 "En raison de mauvais traitements, de troubles ou de dévastation, la population des minorités nées-des-ruines à [Root.GetName] s'est dispersée vers les provinces et cités voisines, diminuant l'importance de cette communauté dans les affaires de l'État."
 racial_pop_events_ruinborn.5.a:0 "Les minorités nées-des-ruines à [Root.GetName] ont diminué en taille"
 racial_pop_events_ruinborn.6.t:0 "Migration Interne de la Minorité Née-des-Ruines"
 racial_pop_events_ruinborn.6.d:0 "Une tendance récente montre que des nés-des-ruines tentent de se déplacer de [origin_province.GetName] vers [destination_province.GetName]. Que ce soit en raison de troubles ou du chaos à [origin_province.GetName] ou de meilleures opportunités et conditions de vie à [destination_province.GetName], si nous n'agissons pas, la population de la minorité née-des-ruines de [destination_province.GetName] augmentera."
 racial_pop_events_ruinborn.6.a:0 "Encourageons et finançons cette migration"
 racial_pop_events_ruinborn.6.b:0 "Laissons-les faire comme bon leur semble"
 racial_pop_events_ruinborn.6.c:0 "Empêchons toute migration supplémentaire"
 racial_pop_events_ruinborn.7.t:0 "Inviter des Nés-des-Ruines de Nos Voisins ?"
 racial_pop_events_ruinborn.7.d:0 "Que ce soit en raison de mauvais traitements, de difficultés économiques ou simplement d'incompatibilité, une opportunité s'offre à nous d'encourager la migration de nés-des-ruines depuis la province de [origin_province.GetName] de notre voisin vers notre province de [destination_province.GetName]. Il suffirait d'un peu de diplomatie pour huiler les rouages de l'État."
 racial_pop_events_ruinborn.7.a:0 "Invitons les migrants nés-des-ruines, nous pourrions utiliser leur aide"
 racial_pop_events_ruinborn.7.b:0 "Laissons-les faire comme ils l'entendent, mais ne nous en mêlons pas"
 racial_pop_events_ruinborn.7.c:0 "Absolument pas ! Fermons-leur nos frontières !"
 racial_pop_events_ruinborn.10.p:0 "Ce sont des nés-des-ruines, tout comme nous, et leur présence sera une aubaine sans réserve"
 racial_pop_events_ruinborn.10.t:0 "Réfugiés Nés-des-Ruines de [From.GetName]"
 racial_pop_events_ruinborn.10.d:0 "Des nés-des-ruines fuyant les persécutions de [From.GetName] ont commencé à se masser à nos frontières, cherchant refuge et un nouveau foyer."
 racial_pop_events_ruinborn.10.a:0 "Laissons-les entrer, ils ont déjà assez souffert"
 racial_pop_events_ruinborn.10.b:0 "Ils devront travailler pour mériter leur place dans nos frontières"
 racial_pop_events_ruinborn.10.c:0 "Il n'y a pas de place pour vous ici !"
 racial_pop_events_ruinborn.11.t:0 "Réfugiés Nés-des-Ruines de [From.From.GetName]"
 racial_pop_events_ruinborn.11.d:0 "Des réfugiés fatigués et épuisés fuyant les persécutions de [From.From.GetName] se massent à nos frontières. Ils semblent désespérés de trouver un nouveau foyer et n'accepteront pas un refus."
 racial_pop_events_ruinborn.11.a:0 "Laissons entrer ces pauvres âmes !"
 racial_pop_events_ruinborn.11.b:0 "Exploitons leur désespoir et utilisons-les comme main-d'œuvre bon marché"
 racial_pop_events_ruinborn.11.c:0 "Empêchons leur entrée par la force, si nécessaire"
 racial_pop_events_ruinborn.12.t:0 "Tolérance & Politiques Nés-des-Ruines\n"
 racial_pop_events_ruinborn.12.d:0 ""
 racial_pop_events_ruinborn.13.t:0 "L'Expulsion des Nés-des-Ruines"
 racial_pop_events_ruinborn.13.d:0 "En l'an [GetYear], [Root.Monarch.GetTitle] [Root.Monarch.GetName] a officiellement promulgué un édit d'expulsion contre tous les nés-des-ruines sur les terres de [Root.Country.GetName].\n\nDe gré ou de force, la population née-des-ruines de [Root.Country.GetName] devra désormais chercher un nouveau foyer ailleurs."
 racial_pop_events_ruinborn.13.a:0 "Commencer l'Expulsion"
 racial_pop_events_ruinborn.14.t:0 "La Purge des Nés-des-Ruines"
 racial_pop_events_ruinborn.14.d:0 "En l'an [GetYear], [Root.Monarch.GetTitle] [Root.Monarch.GetName] a officiellement proclamé que tous les nés-des-ruines sur les terres de [Root.Country.GetName] devaient être tués à vue.\n\nLes nés-des-ruines de [Root.Country.GetName] n'ont d'autre choix que de fuir le pays."
 racial_pop_events_ruinborn.14.a:0 "Commencer la Purge"
 racial_pop_events_ruinborn.15.t:0 "Révocation de l'Expulsion des Nés-des-Ruines"
 racial_pop_events_ruinborn.15.d:0 "Le gracieux [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.Country.GetName] a révoqué l'édit d'expulsion contre la race née-des-ruines.\n\nLes nés-des-ruines pourront désormais s'installer et migrer vers [Root.Country.GetName]."
 racial_pop_events_ruinborn.15.a:0 "Mettre fin à l'Expulsion"
 racial_pop_events_ruinborn.16.t:0 "Fin de la Purge des Nés-des-Ruines"
 racial_pop_events_ruinborn.16.d:0 "Le très miséricordieux [Root.Monarch.GetTitle] [Root.Monarch.GetName] de [Root.Country.GetName] a ordonné la fin de la purge du peuple né-des-ruines.\n\nLes nés-des-ruines pourront désormais s'installer et migrer vers [Root.Country.GetName], s'ils l'osent."
 racial_pop_events_ruinborn.16.a:0 "Mettre fin à la Purge"
 racial_pop_events_ruinborn.17.t:0 "Minorité Née-des-Ruines Expulsée"
 racial_pop_events_ruinborn.17.d:0 "En raison de l'Édit d'Expulsion, les minorités nées-des-ruines vivant dans la province de [racial_pop_province_origin.GetName] ont commencé à partir en masse, laissant derrière eux tout ce qu'ils ne pouvaient pas emporter."
 racial_pop_events_ruinborn.17.a:0 "Bon débarras !"
 racial_pop_events_ruinborn.17.b:0 "Ils ont laissé beaucoup de choses derrière eux..."
 racial_pop_events_ruinborn.18.t:0 "Majorité Née-des-Ruines Expulsée"
 racial_pop_events_ruinborn.18.d:0 "[racial_pop_province_origin.GetName] était une province à majorité née-des-ruines jusqu'à ce que l'Édit d'Expulsion soit promulgué. De ce fait, un grand nombre de nés-des-ruines ont commencé à quitter la province, ce qui finira par réduire leur race à une minorité."
 racial_pop_events_ruinborn.18.a:0 "Allez, ouste !"
 racial_pop_events_ruinborn.19.t:0 "Minorité Née-des-Ruines Purgée"
 racial_pop_events_ruinborn.19.d:0 "Des cris de terreur émanent de [racial_pop_province_origin.GetName] alors que la population née-des-ruines locale est massacrée tant par les autorités que par la population locale."
 racial_pop_events_ruinborn.19.a:0 "Bon débarras."
 racial_pop_events_ruinborn.19.b:0 "Assurez-vous qu'ils soient tous tués."
 racial_pop_events_ruinborn.20.t:0 "Majorité Née-des-Ruines Purgée"
 racial_pop_events_ruinborn.20.d:0 "Les cadavres deviennent un spectacle courant à [racial_pop_province_origin.GetName] alors que la population née-des-ruines autrefois dominante est tuée à vue par les forces [Root.Country.GetAdjective]."
 racial_pop_events_ruinborn.20.a:0 "Enfin débarrassés d'eux !"
 racial_pop_events_ruinborn.21.t:0 "Les Nés-des-Ruines Fuient le Pays"
 racial_pop_events_ruinborn.21.d:0 "En raison des récents ordres de purger la race née-des-ruines au sein de [Root.Country.GetName], de nombreux elfes nés-des-ruines de [racial_pop_province_origin.GetName] ont fui leurs foyers."
 racial_pop_events_ruinborn.22.t:0 "La Majorité Née-des-Ruines Fuit le Pays"
 racial_pop_events_ruinborn.22.d:0 "La province de [racial_pop_province_origin.GetName] a été hâtivement vidée en raison des ordres de purger la race née-des-ruines."
 racial_pop_events_ruinborn.23.t:0 "Les Nés-des-Ruines Persécutés Causent des Troubles"
 racial_pop_events_ruinborn.23.d:0 "La persécution de la race née-des-ruines, qu'il s'agisse d'expulsion ou de purge, a conduit à de nombreuses émeutes et troubles généraux à [racial_pop_province_origin.GetName]."
 racial_pop_events_ruinborn.23.a:0 "Maudits soient-ils !"

