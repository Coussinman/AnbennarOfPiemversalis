 loc_md_age_of_discovery: "§YÈre des Découvertes§!\nÀ l'aube de l'ère moderne, de nouveaux continents sont cartographiés tandis que la société féodale cède lentement la place à des États centralisés. Pour un État entreprenant, cette ère peut voir la fondation d'un empire mondial.\n----------\n(Active les Conflits Religieux.)\nC'est l'ère de départ."
 loc_md_age_of_reformation: "§YÈre de la Réformation§!\nD'est en ouest, c'est l'ère de la conviction religieuse, des débats et des mouvements de masse. À Cannor, le protestantisme s'enracine tandis que le millénarisme s'empare du Bulwar et le syncrétisme religieux façonne la société de Rahen.\n----------\n(Active les Conflits Religieux.)\nCette ère commence lorsque la religion §YProtestante§! existe depuis §Y120§! mois."
 loc_md_age_of_absolutism: "§YÈre de l'Absolutisme§!\nAlors que les gouvernements arrachent le pouvoir absolu dans leurs pays à d'autres parties, ils peuvent désormais se consacrer à la construction d'Empires. C'est l'ère de l'État, des souverains et de leurs armées.\n----------\n(Active les mécaniques d'Absolutisme.)\nCette ère commence lorsque l'institution §YCommerce Mondial§! est établie depuis §Y120§! mois."
 loc_md_age_of_revolutions: "§YÈre des Révolutions§!\nLa remise en question des droits, de l'autorité et du monde lui-même pendant les Lumières a conduit au rejet de l'Ancien Régime. Alors que l'Absolutisme cède la place à la Révolution, les royaumes pourraient devoir faire place aux Républiques.\n----------\n(Active les mécaniques d'Absolutisme.)\nCette ère commence lorsque l'institution §YLumières§! est établie depuis §Y120§! mois."


