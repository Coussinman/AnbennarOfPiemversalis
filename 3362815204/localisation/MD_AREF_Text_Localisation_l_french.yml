 # -------------------------------------------------------------------------------------------------------------
 # Age Painting Descriptions
 # -------------------------------------------------------------------------------------------------------------

 pic_age_of_discovery_desc: "L'Arrivée de Jaher à Bulwar, Artiste Inconnu\n\nDésireux d'établir de nouvelles routes commerciales vers les marchés lucratifs de l'est, les explorateurs cannoriens lancèrent de nombreuses expéditions cherchant un moyen de contourner les terres hostiles. Parmi ceux-ci, les navigateurs de la Tête-de-Dame furent les premiers à cartographier les côtes lointaines de Sarhal et d'Aelantir.\n\nPour le siècle suivant, les grandes puissances maritimes de Cannor se partagèrent le monde, établissant des colonies et des comptoirs commerciaux sur tous les continents. La Réformation et l'augmentation de la puissance maritime dans les pays du nord verraient à ce que ces revendications ne soient pas permanentes."
 pic_age_of_reformation_desc: "Les Débats Théologiques, Artiste Inconnu\n\nDebout dans une assemblée impériale devant l'empereur, les officiers de l'église et une foule enthousiaste, le réformateur refusa de se rétracter de ses écrits et plaça son espoir dans les dieux.\n\nL'empereur émit un édit, le qualifiant d'hérétique notoire. Craignant pour sa vie, un noble allié le cacha dans un château où il commença à traduire les textes sacrés. Malgré l'interdiction de l'empereur sur ses idées, la nouvelle foi se répandrait sur une grande partie de Cannor et diviserait le continent pour les siècles à venir."
 pic_age_of_absolutism_desc: "Le Couronnement du Roi, Artiste Inconnu\n\nLe couronnement marque la restauration de la monarchie qui avait été perturbée par les guerres civiles opposant les forces parlementaires aux forces royalistes."
 pic_age_of_revolutions_desc: "La Traversée du Fleuve, Artiste Inconnu\n\nAprès des mois de défaites majeures, y compris la perte de la capitale, un général traverse le fleuve avec ses soldats pour surprendre les forces ennemies tenant une ville voisine.\n\nCette manœuvre mena à une victoire décisive qui aida à mobiliser les révolutionnaires qui finirent par remporter la guerre."
 pic_age_of_imperialism_desc: "L'Entrée d'État, Artiste Inconnu\n\nLes grandes puissances conservèrent le contrôle sur leurs vastes empires coloniaux. Des célébrations de style impérial proclamaient les familles royales comme empereurs de leurs dominations lointaines."
 pic_age_of_industrialization_desc: "L'Usine, Artiste Inconnu\n\nLes 18e et 19e siècles virent un changement technologique massif qui contrastait fortement avec les millénaires précédents. L'avènement des usines changea le monde et rendit les biens beaucoup moins chers et plus faciles à produire, ouvrant la voie au monde moderne."


