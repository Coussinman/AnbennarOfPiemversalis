l_french:
 unraveling.0.t:0 "La Redécouverte d'Aelantir"
 unraveling.0.d:0 "La toute première confirmation de l'existence d'Aelantir advint le jour même de sa mort. Le Jour-des-Cieux-Cendrés a certes déchiré Aelantir, mais depuis l'arrivée de la Flotte des Vestiges elfique à Cannor au cours de l'An Mil, les récits de cette patrie légendaire n'ont cessé d'enflammer l'imagination des idéalistes et des explorateurs du monde entier. Depuis lors, beaucoup ont tenté de naviguer vers l'ouest et ont échoué… jusqu'à présent.\n\nAelantir a été redécouvert."
 unraveling.0.a:0 "Quels secrets nous réserve la patrie perdue du peuple elfique ?"

 unraveling.1.t:0 "La Fresque de Castellar"
 unraveling.1.d:0 "Nos aventuriers en Aelantir ont fait une découverte incroyable, aux implications glaçantes.\n\nSous un ancien temple précurseur s'étend un vaste hall de fresques, remarquablement intact malgré la ruine du reste du complexe. Ces fresques semblent dépeindre l'histoire entière de la civilisation elfique, y compris des événements tels que la Guerre des Chaînes Brisées, qui vit la chute des dragons et la libération des elfes asservis, ainsi que la plus récente Guerre des Deux. Ces chroniques visuelles étoffent le maigre savoir sur la civilisation précurseur qui survécut au millénaire des elfes en mer, et seront assurément d'un intérêt considérable pour la Guilde des Chroniqueurs. Mais elles sont de peu d'importance immédiate comparées aux événements représentés dans la dernière fresque du hall.\n\nManifestement gravé d'une main moins raffinée que les autres fresques, le panneau final dépeint une scène de destruction et de ruine absolues : une immense boule de feu s'élevant du centre d'un continent, faisant pleuvoir pierres et éclairs sur la terre. Sur un côté, on distingue un homme descendant des nuages ; il brandit un sceptre d'une main et étend l'autre bras dans un effort pour contenir l'explosion, tandis que la foudre converge vers lui. Le bras tendu se termine par un moignon au lieu d'une main, et un grand manteau argenté couvre son flanc gauche, dissimulant partiellement sa jambe manquante. Les inscriptions de l'artiste ont été partiellement traduites, et nos érudits pensent qu'elles désignent la figure comme Castellar, Dieu du Ciel, tandis que l'explosion est simplement intitulée « La Fin ».\n\nCette gravure est de toute évidence une représentation de la Ruine d'Aelantir, peut-être réalisée par quelqu'un qui en fut témoin et survécut assez longtemps pour dessiner ce qu'il avait vu, consacrant ses derniers instants à transmettre un récit des événements aux générations futures. Si ce qui est gravé ici est véridique, alors le dieu elfique du ciel, Castellar, tenta d'arrêter la catastrophe qui causa la Ruine, mais au vu de l'état d'Aelantir, il échoua.\n\nNous nous retrouvons avec davantage de questions que de réponses. Seul un sot pourrait ignorer la similitude de nom, d'apparence et de domaine entre Castellar et Castellos, le dieu régnant de la Cour Régente. Si Castellar et Castellos ne font qu'un, et si Castellar a tenté d'empêcher la Ruine d'Aelantir sans y parvenir… qu'est-il advenu de lui ? Nous n'avons aucun moyen de le savoir, mais le débat sur la véracité des événements dépeints dans ces fresques et leurs implications pour notre société fait déjà rage parmi les érudits qui étudient le temple. Que faisons-nous de ce savoir que nous avons mis au jour ?"
 unraveling.1.a:0 "Cela change tout. Le monde doit savoir ce que nous avons découvert !"
 unraveling.1.b:0 "Nous ne disposons que d'un tableau incomplet. Gardons ces découvertes secrètes pour l'instant."

 unraveling.2.t:0 "La Fresque de Castellar : la fuite !"
 unraveling.2.d:0 "Bien que nous ayons tenté de garder secrète notre découverte de la Fresque de Castellar, il apparaît que quelqu'un, peut-être l'un des aventuriers impliqués dans l'expédition initiale, peut-être l'un de nos érudits, a divulgué et vendu un catalogue très complet des informations trouvées dans le complexe du temple à l'Ordre des Chroniqueurs, vraisemblablement contre une coquette récompense. Ceux-ci, à leur tour, ont promptement imprimé et diffusé nos documents officiels et les estampages des fresques auprès des érudits de tout Cannor, et malgré nos meilleurs efforts pour empêcher l'information de se propager, elle se répand comme un feu de forêt à travers les halls universitaires et les cercles d'élite de Halcann. À Lorentaine et Gaweton, à Anbenncóst et Celmaldor, et même dans les ruines de Castonath, les rumeurs commencent à enfler : les elfes Précurseurs ont vu Castellos mourir, et ont consigné ce qu'ils ont vu afin que nous sachions."
 unraveling.2.a:0 "Les dieux seuls savent comment cela changera notre monde."

 unraveling.3.t:0 "La Fresque de Castellar"
 unraveling.3.d:0 "Des nouvelles d'Aelantir sont arrivées, largement diffusées par l'Ordre des Chroniqueurs et proclamées par les crieurs tellumites dans chaque grande cité : dans un temple précurseur en ruines, une fresque aux implications glaçantes.\n\nUne scène de destruction et de ruine absolues : une immense boule de feu s'élevant du centre d'un continent, faisant pleuvoir pierres et éclairs sur la terre. Sur un côté, on distingue un homme descendant des nuages ; il brandit un sceptre d'une main et étend l'autre bras dans un effort pour contenir l'explosion, tandis que la foudre converge vers lui. Le bras tendu se termine par un moignon au lieu d'une main, et un grand manteau argenté couvre son flanc gauche, dissimulant partiellement sa jambe manquante. Les inscriptions de l'artiste ont été partiellement traduites, et nos érudits pensent qu'elles désignent la figure comme Castellar, Dieu du Ciel, tandis que l'explosion est simplement intitulée « La Fin ».\n\nLes documents de découverte et les estampages des fresques se sont répandus à travers tout Cannor, se propageant comme un feu de forêt dans les halls universitaires et les cercles d'élite de Halcann. À Lorentaine et Gaweton, à Anbenncóst et Celmaldor, et même dans les ruines de Castonath, les rumeurs commencent à enfler : les Elfes Précurseurs ont vu Castellos mourir, et ont consigné ce qu'ils ont vu afin que nous sachions."
 unraveling.3.a:0 "Peut-être [Root.Monarch.GetTitle] [Root.Monarch.GetName] devrait-il laisser son sceptre derrière lui…"
 unraveling.3.b:0 "Balivernes ! Castellos règne et demeure le Seigneur de tous !"
 unraveling.3.c:0 "Que recèle encore Aelantir ?"


 unraveling.4.t:0 "Le Sceptre Brisé"
 unraveling.4.d:0 "Au cours de notre exploration continue de la patrie elfique perdue, nous avons découvert de nombreuses ruines, non seulement des elfes précurseurs, mais aussi des divers groupes de Nés-des-Ruines qui rebâtirent dans le sillage de la Ruine d'Aelantir. L'une de nos expéditions les plus récentes vers l'intérieur des terres a mis au jour un petit sanctuaire en ruines, qui semble avoir été édifié par un groupe de Nés-des-Ruines depuis longtemps disparu. Dans le saint des saints au cœur de ce sanctuaire, nos explorateurs ont découvert un tabernacle de pierre finement ouvragé contenant un unique objet : un bâton d'environ six pieds de long, taillé dans un seul bloc de pierre blanche et coiffé d'un orbe bleu massif à l'une de ses extrémités. L'autre extrémité se termine par ce qui semble avoir été autrefois une grande gemme à facettes, mais ce n'est plus le cas : il ne reste que de minuscules éclats cristallins.\n\nNos érudits ont longuement débattu de l'origine et de la nature de ce bâton. L'analyse préliminaire de l'aura magique persistant sur l'objet indique qu'il fut jadis utilisé pour de puissantes magies d'abjuration, mais guère plus n'a pu en être déduit. Au cours de l'une de ces discussions, le prêtre de l'expédition fit remarquer que le bâton ressemblait à une version agrandie du sceptre de Castellos : le fût blanc et la sphère bleue présentaient une apparence similaire à son symbole sacré, bien que la tête à ailettes de la Verge de Souveraineté soit absente de l'artefact trouvé dans le sanctuaire.\n\nSans la Fresque de Castellar, ceci ne serait qu'une curiosité de plus dans la longue liste de curiosités qui nous ont accueillis depuis le début de notre exploration d'Aelantir. Mais si la fresque est exacte et que Castellos périt en contenant la destruction du Jour-des-Cieux-Cendrés… ne pourrait-ce être son véritable sceptre ? Les magies qui y persistent encore sont de nature protectrice, et la ressemblance est bien plus que fortuite… mais il gît brisé, sans aucun espoir de réparation. Qu'est-ce que cela pourrait impliquer au sujet de Castellos lui-même ?"
 unraveling.4.a:0 "Peut-être [Root.Monarch.GetTitle] devrait-il laisser son sceptre derrière lui…"
 unraveling.4.b:0 "Quelle découverte intéressante. Du moins, si nous nous en souciions."

 unraveling.5.t:0 "CASTELLOS EST MORT"
 unraveling.5.d:0 "Des pamphlets se répandent à travers Cannor et le Divenhal comme un feu de forêt, les affirmations qui y figurent plus incendiaires que les braises les plus ardentes : Castellos, le dieu régnant de la Cour Régente, est mort.\n\nPubliés par l'Ordre des Chroniqueurs, ces imprimés détaillent des fresques situées dans une ancienne ruine précurseur, contenant de vastes gravures dépeignant tout le cours de la civilisation précurseur. La dernière de ces fresques semble avoir été réalisée après la Ruine d'Aelantir et dépeint une divinité nommée Castellar, connue des Cannoriens sous le nom de Castellos, tentant en vain d'empêcher la catastrophe. Des copies de la fresque sont imprimées au verso de chaque pamphlet afin que tous puissent contempler la fin du dieu du ciel, et les crieurs tellumites clament ces mots depuis les toits : Castellos est Mort.\n\nOutre ces pamphlets qui se propagent à toute allure, un groupe radical d'apprentis mages au sein du Magisterium, convaincus de la véracité des affirmations des Chroniqueurs, ourdit un complot visant à s'emparer de la Tour d'Adráil et à utiliser ses propriétés d'amplification magique et sa position au milieu de la Tête-de-Dame pour projeter l'image de la fresque sur les nuages, à la vue de tous. Il y a quelques jours à peine, l'image de Castellar vacillant devant la dévastation de la Ruine d'Aelantir apparut dans le ciel du soir, le scintillement de la fresque contre les nuages donnant presque l'illusion de la foudre arrachant la main tendue de Castellar. Les comploteurs furent promptement appréhendés et expulsés par le Magisterium, mais il n'est point possible de défaire ce qu'ils ont accompli, nul moyen pour la population des États impériaux d'effacer de leur mémoire l'image projetée sur les nuages.\n\nLe choc et la colère suscités par la révélation des Chroniqueurs se sont répercutés à travers tout Halcann : beaucoup accusent les Chroniqueurs de mentir et exigent des mesures contre eux, tandis que d'autres défendent la réputation irréprochable des Chroniqueurs comme étant au-dessus de tout reproche. D'autres encore réclament des réponses aux chefs religieux, dont la plupart sont tout aussi bouleversés que leurs fidèles. Les divers clercs du panthéon offrent des réponses différentes au fil d'un flot de lettres échangées en toute hâte, tandis que les grands prêtres tentent d'apaiser la situation. Pendant ce temps, la question de l'exactitude du rapport des Chroniqueurs hante les esprits du clergé, car si ce rapport est exact, alors depuis toutes ces années, la Cour Régente était gouvernée par un dieu mort."
 unraveling.5.a:0 "Il est difficile de ne pas avoir le sentiment que le monde entier se disloque autour de nous…"
 unraveling.5.b:0 "Voilà la preuve des enseignements du Culte du Soleil."
 unraveling.5.c:0 "Un nouveau souverain règne : Kazraiel s'élèvera."
 unraveling.5.e:0 "Le sort des autres dieux nous importe peu, car Corin est notre déesse."

 unraveling.6.t:0 "Le Onzième Concile Panthéonique"
 unraveling.6.d:0 "Les fidèles de Balgar ont un penchant pour les tombeaux magnifiques ; les adeptes de Munas sont confiés aux vagues ; ceux de la Dame sont inhumés à la lumière de la lune. Mais quelles funérailles accorde-t-on à un Dieu ?\n\nVoilà l'une des nombreuses questions auxquelles le Onzième Concile Panthéonique de la Cour Régente s'est donné pour mission de répondre. Chaque grand prêtre de chaque temple a pris connaissance de la fresque de Castellar, par reproduction magique ou en se rendant en Aelantir pour la contempler en personne. Ils ont vu, et l'un ou deux ont même touché, son sceptre brisé. Et ils ont été témoins de ce que la majeure partie de Cannor en est venue à croire en sa mort, sans même un murmure des Dieux pour la contester.\n\nLes représentants assemblés de chaque Dieu s'attendaient à la discorde concernant la mort de Castellos, événement sans précédent dans l'histoire de la Cour, mais il n'y en eut guère. Même le propre représentant de Castellos, un vieux réfugié castellyrien, éprouva davantage de soulagement d'avoir enfin une réponse à la question qui avait tourmenté son âme pendant des décennies : pourquoi le Dragon d'Argent n'était pas revenu.\n\nLe débat a plutôt porté sur ce qui devait advenir ensuite. Le droit successoral cannorien traditionnel désignerait son fils, Adean, pour monter sur le trône. Mais cela s'enracinait dans les traditions du pays favori de Castellos, Castanor. Avec sa disparition, avec la chute de cet ancien Empire, cette tradition s'applique-t-elle encore à la cour des Dieux ?\n\nLes fidèles de Corin, menés par Dominic de Gallowspeak, désormais blanchi par plus de neuf décennies d'âge, mais toujours membre de son cercle, chroniqueur de ses enseignements, porte-parole de ses vérités, défendent une autre position. Ils affirment que la succession devrait évidemment se fonder sur le mérite, un concours dans lequel l'Héroïne de la Marée Verte excelle assurément. De surcroît, elle a hérité de l'héritage d'Agrados, le frère de Castellos, et dispose ainsi d'une prétention dynastique. Les prêtres de la mère d'Adean (Esmaryal) et de sa sœur (Ryala) s'empressent de soutenir le Dieu de la Chevalerie et de la Droiture ; nombre d'autres, en particulier les prêtres de Nathalyne et de Falah, n'en sont pas si certains.\n\nCe débat fait rage depuis des semaines, et pourrait se prolonger des semaines encore. Mais sur un point au moins, l'accord est unanime : Castellos est bel et bien mort. Tout Cannor, tout Halann, le pleurera. Et le monde ne sera plus jamais le même."
 unraveling.6.a:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName], et tout [Root.GetName], observeront les rites de deuil."
 unraveling.6.b:0 "Il est mort depuis des millénaires, en vérité ; il est temps de regarder devant soi et non en arrière !"
 unraveling.6.c:0 "La Cour est divisée ; le moment est venu de frapper."

 unraveling.10.t:0 "Castellos est mort ?"
 unraveling.10.d:0 "Lorsque nous avons pris le contrôle de [Root.GetName], nous avons découvert des archives décrivant un temple empli de fresques de pierre dépeignant l'histoire entière de la civilisation elfique. La dernière de ces fresques portait le titre sinistre de « La Fin » et représente un homme descendant des nuages, brandissant un sceptre d'une main et tentant de contenir une vaste explosion de l'autre. Les notes incomplètes de l'artiste désignent la figure comme Castellar, Dieu du Ciel, et d'après ces notes ainsi que d'autres documents retrouvés sur le site, le créateur de la fresque semble croire que Castellar périt dans l'explosion.\n\nAvant de nous parvenir, les documents étaient déjà passés entre les mains de dizaines de soldats, d'érudits et de civils, et un nombre non négligeable d'entre eux commencent à discuter des implications de ces écrits. Ce n'est qu'une question de temps avant que les rumeurs ne deviennent de notoriété publique."
 unraveling.10.a:0 "À ce stade, il ne semble guère possible de contenir les rumeurs."

