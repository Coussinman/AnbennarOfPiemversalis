l_french:
 suhans_praxis_events.1.t:0 "Libération des Sexes"
 suhans_praxis_events.1.d:0 "« Nous ne bâtissons point le Palais Doré pour notre propre confort ! C'est la forme et l'institution au sein de laquelle nous devons chercher ensemble la Purtara, non la simple demeure d'un Prabhi ! Allez interroger l'époux paresseux sur sa théologie, et vous entendrez que lui est réservé le dekhana, la constatation, et à son épouse la pichka, la poursuite. C'est dire qu'il décide ce qui doit être fait et qu'elle l'accomplit…\n\n« Laissez-moi répéter : sur le chemin de la Purtara, il n'est point de faux pas plus profond que d'entraver le voyage d'autrui. Je vous ai dit ceci du marchand d'esclaves, et je le dis aussi de l'esclavagiste domestique mille fois plus répandu, dont les victimes, perversement, sont sa propre famille. Nous oublions à nos risques et périls que seuls ceux qui posent les briques vivront dans ce Palais particulier. »"
 suhans_praxis_events.1.a:0 "Oraison Quinze, Sardiphadin"
 suhans_praxis_events.2.t:0 "Diplomatie des Gourous"
 suhans_praxis_events.2.d:0 "« À travers Haless, nous possédons à juste titre un grand respect pour ceux qui se cloîtrent et cherchent la sagesse. Vous autres Teleni êtes un peu ainsi ici, peut-être, avec votre cité de cloîtres ! Mais même Balris disait que le moine doit descendre de la montagne. Vous savez tous que nous mourons, renaissons et vivons de nouveau, que nous vivons des myriades de vies sur notre route vers la Purtara. Il est aussi important d'emplir nos vies d'expériences que de méditer sur elles.\n\n« Imaginez que je n'eusse jamais quitté Guhe. Pour commencer, je ne serais point ici avec vous, la tête ruisselante de sueur à cause du délicieux phaal d'Anjar… Je serais plus petit, et pas seulement au tour de taille. Il est vrai que nous ne pouvons être une terre de seuls mendiants, et vous êtes tous bien trop honorables pour vivre en parasites comme je l'ai fait… mais même la ville voisine possède son propre mélange de phaal, et quel dommage de vivre sans y goûter. »"
 suhans_praxis_events.2.a:0 "Oraison Quatre-vingt-dix-neuf, Khabtei Teleni"
 suhans_praxis_events.3.t:0 "Horizons de l'Esprit"
 suhans_praxis_events.3.d:0 "« Charmante Kharta, la plus spirituelle d'entre nous ! Toujours vous parlez comme si je n'avais point d'amour pour ce lieu, comme si je ne comprenais point le désir de se terrer dans les grandes bibliothèques pour n'en jamais ressortir. Pour les esprits irrépressiblement curieux tels que nous, voici la véritable capitale du Rahen.\n\n« Vous croyez que je cherche à mettre fin au philosophe, à détruire sa pertinence et son importance dans la culture halessi. C'est précisément l'inverse qui est vrai ! L'Atma n'est point le grain, épuisé lorsqu'il est distribué depuis le grenier. Concevez un instant la Visvatma florissante de myriades de millions lettrés, main dans la main le long du Nitikamarja. Souvenez-vous de la sagesse des Ghankhedeni, qui nous enseignent que celui qui ouvre la porte est remémoré pour son accueil. »"
 suhans_praxis_events.3.a:0 "Oraison Quarante-trois, Rayavhashapal"
 suhans_praxis_events.4.t:0 "Zèle Paradigmatique"
 suhans_praxis_events.4.d:0 "« Il est une maladie au cœur des harimari. Nous sommes des compétiteurs naturels, et nous en sommes venus à croire que nul autre ne peut s'élever sans notre propre déclin. Souvent je me suis assis dans les demeures de caporaux, généralement invité par leurs épouses, et l'on m'a demandé comment j'attendais que nous, harimari, conservions le pouvoir, fissions la guerre, sans la force et la prouesse conférées par la Griffe Intacte.\n\n« À cela je demande : que reste-t-il du domaine d'Harimar ? Nul harimari ne règne sur mon lieu de naissance, et ce n'est point faute de prouesse martiale. Ce que nous, harimari, continuons de manquer, c'est le pouvoir de la croyance pour vaincre l'autorité, l'unité paradoxale d'une masse grouillante d'individus dont l'atma, pour un instant universel, afflue vers un seul point.\n\n« C'est une leçon que les harimari apprendront, ou nous périrons. »"
 suhans_praxis_events.4.a:0 "Oraison Dix-neuf, Tujgal"
 suhans_praxis_events.5.t:0 "Débattre de la Nature de la Praxis"
 suhans_praxis_events.5.d:0 "« L'Œil Étoilé qui se tourne vers les cieux doit aussi scruter l'intérieur. C'est ce principe agaçant de la rumination, la "sagesse du ruminant" dont nous autres érudits parlons sans cesse. Mais mes amis, nous ne parlons que de la vache, que vous, fermiers, connaissez mieux que quiconque…\n\n« Ceux qui, dans leur peur atavique, fuient la dispute ont déjà fracturé la vérité multiple du Darsanasara. Ils ont arraché un lambeau d'une tapisserie et prétendent tenir encore l'ensemble, et pire encore, ils ne vous laissent point lire le morceau qu'ils détiennent ! Je vous le dis : ne respectez point ceux qui refusent d'argumenter pour leurs convictions. »"
 suhans_praxis_events.5.a:0 "Oraison Six, Kranakol"
 suhans_praxis_events.6.t:0 "Tous Marchent sur le Nitikamarja"
 suhans_praxis_events.6.d:0 "« Comme il est embarrassant de trouver tant de sagesse profonde dans la métaphore solaire bulwari, pour ensuite s'empêtrer dans le rituel et le protocole spécifiques du Rahen tel quelque sénéchal tatillon. Le Nitikamarja n'est point un jeu de dés. Nous ne pouvons additionner nos points et nos chances en espérant franchir quelque seuil numérique imaginaire vers la Purtara !\n\n« La possibilité qui terrifie les philosophes est celle-ci : que quelque part dans le trou le plus sombre de l'Échine-du-Serpent, une hobgobeline incapable d'écrire son propre nom ait décollé les couches de son âme, révélé sa Radiance et soit entrée dans la Purtara. Que vous l'ayez fait, ou votre épouse, et qu'eux, malgré toute leur vantée discipline érudite, ne l'aient point fait. »"
 suhans_praxis_events.6.a:0 "Oraison Vingt-six, Parusapa"
 suhans_praxis_events.7.t:0 "Promouvoir le Long Chemin"
 suhans_praxis_events.7.d:0 "« Dans cette cité je pleure ; dans cette cité j'espère. Il y a vingt ans, lorsque Keo m'invita ici pour la première fois, lui qui se cache là-bas près de cette statue, je vis le carrefour juste à côté de la maison des douanes, sur le chemin descendant vers les Marches de Baashidi. Les maisons de la Ceinture Orange, de la Griffe Intacte et de l'Œil Étoilé se toisaient mutuellement, et au quatrième coin du carrefour ? Une taverne, bien sûr…\n\n« Le nôtre est le chemin vers la porte de la taverne. Derrière elle nous trouvons ami, ennemi, sauvage ; le pitoyable et l'enrageant. Chacun a quelque chose à nous enseigner. »"
 suhans_praxis_events.7.a:0 "Oraison Soixante-dix, Sramaya"
