 COUNTRY_HISTORY_BATTLE_NAVAL_4:0 "Un événement important de la guerre fut la bataille de $NAME$ où la flotte $ATTACKER$, menée par $ATTACKING_COMMANDER$, attaqua $DEFENDING_COMMANDER$ et sa flotte $DEFENDER$. La flotte $ATTACKER$ forte de $ATTACKER_SIZE$ navires $ATTACKER_RESULT$ et les $DEFENDER_SIZE$ navires $DEFENDER$ $DEFENDER_RESULT$."
