 temples_FACTION_DESC:2 "Les Commanderies sont le système des généraux et commandants des armées impériales. Désireux de prouver leur valeur et leur loyauté, ils cherchent à promouvoir la guerre plutôt que la diplomatie afin de monter en grade.\n\n§YGagne de l'influence grâce à une stabilité positive et à la tradition militaire. Perd de l'influence à cause de l'épuisement de guerre.§!"
