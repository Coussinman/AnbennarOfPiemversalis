 bukharan_nation_title:0 "Former Boukhara"
 bukharan_nation_desc:0 "Abandonner la steppe sauvage pour les anciennes cités établies de la Route de la soie en Transoxiane nous permettra de nous installer dans des terres dont les noms seuls évoquent une fabuleuse richesse, mais si nous poussons si loin au sud dans les terres colonisées, nos cousins sauvages du nord n'accepteront plus notre autorité."
 arab_nation_title:0 "Former l'Arabie"
 arab_nation_desc:0 "Pendant des centaines d'années, les Arabes ont été divisés, mais nous nous souvenons quand le Prophète Mahomet, que la paix soit sur lui, nous a tous organisés en une seule oumma, une communauté de fidèles qui transcendait l'affiliation tribale. Aujourd'hui, nous avons surmonté la désunion et retrouvé l'unité qui a triomphé au temps du Prophète et uni l'Arabie !"
 tibetan_nation_title:0 "Former la nation tibétaine"
 tibetan_nation_desc:0 "Le plateau tibétain fut jadis uni sous un empire s'étendant au-delà de ses limites. En rassemblant à nouveau le peuple tibétain, nous pouvons raviver cet héritage."
