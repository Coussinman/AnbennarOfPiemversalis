 build_refinery_title:0 "Construire une raffinerie à $PROVINCENAME$"
 build_refinery_desc:0 "$PROVINCENAME$ est idéale pour construire une raffinerie ; l'économie de la province bénéficierait grandement de sa construction."
 build_wharf_title:0 "Construire une manufacture d'équipement naval à $PROVINCENAME$"
 build_wharf_desc:1 "De grands progrès ont été accomplis dans le domaine des techniques de production, mais nous n'avons pas encore adopté ces changements. $PROVINCENAME$ est idéale pour construire une manufacture d'équipement naval ; l'économie de la province bénéficierait grandement de sa construction."
 build_plantations_title:0 "Construire des plantations à $PROVINCENAME$"
 build_plantations_desc:0 "De grands progrès ont été accomplis dans le domaine des techniques de production, mais nous n'avons pas encore adopté ces changements. $PROVINCENAME$ est idéale pour des plantations ; l'économie de la province bénéficierait grandement de leur création."
 build_tradecompany_title:1 "Construire un comptoir commercial à $PROVINCENAME$"
 build_tradecompany_desc:1 "De grands progrès ont été accomplis dans le domaine des techniques de production, mais nous n'avons pas encore adopté ces changements. $PROVINCENAME$ est idéale pour un comptoir commercial ; l'économie de la province bénéficierait grandement de sa construction."
 build_weapons_title:0 "Construire une manufacture d'armes à $PROVINCENAME$"
 build_weapons_desc:1 "De grands progrès ont été accomplis dans le domaine des techniques de production, mais nous n'avons pas encore adopté ces changements. $PROVINCENAME$ est idéale pour construire une manufacture d'armes ; l'économie de la province bénéficierait grandement de sa construction."
 build_textile_title:0 "Construire une manufacture textile à $PROVINCENAME$"
 build_textile_desc:1 "De grands progrès ont été accomplis dans le domaine des techniques de production, mais nous n'avons pas encore adopté ces changements. $PROVINCENAME$ est idéale pour construire une manufacture textile ; l'économie de la province bénéficierait grandement de sa construction."
 build_marketplace_title:0 "Construire un marché à $PROVINCENAME$"
 build_marketplace_desc:0 "Le commerce mondial devient de plus en plus interconnecté, mais nous n'avons pas encore adopté le commerce mondial comme institution. $PROVINCENAME$ est idéale pour construire un marché ; notre économie bénéficierait grandement de sa construction."
 build_trade_depot_title:0 "Construire un dépôt commercial à $PROVINCENAME$"
 build_trade_depot_desc:0 "Le commerce mondial devient de plus en plus interconnecté, mais nous n'avons pas encore adopté le commerce mondial comme institution. $PROVINCENAME$ est idéale pour construire un dépôt commercial ; notre économie bénéficierait grandement de sa construction."
 build_stock_exchange_title:0 "Construire une bourse à $PROVINCENAME$"
 build_stock_exchange_desc:0 "Le commerce mondial devient de plus en plus interconnecté, mais nous n'avons pas encore adopté le commerce mondial comme institution. $PROVINCENAME$ est idéale pour construire une bourse ; notre économie bénéficierait grandement de sa construction."
 build_university_title:0 "Construire une université à $PROVINCENAME$"
 build_university_desc:0 "Le mouvement des Lumières se répand à travers le monde, mais nous ne l'avons pas encore adopté. Pour améliorer notre savoir, nous devrions doter $PROVINCENAME$ d'une université."
 construct_army_title:0 "Créer une armée pour notre nation"
 construct_army_desc:0 "Notre armée n'est que l'ombre de ce que notre nation attend. Nous devons recruter davantage de soldats dans notre armée permanente, ou nous serons une proie facile pour nos rivaux."
 construct_navy_title:0 "Créer une flotte digne de ce nom"
 construct_navy_desc:0 "Notre marine n'est que l'ombre de ce que notre nation attend. Nous devons construire davantage de navires, sinon nos côtes seront vulnérables aux pirates et aux invasions ennemies."
 infiltrator_in_the_veridical_office:0 "Infiltrateur"
 desc_infiltrator_in_the_veridical_office:0 "Selon l'un de vos conseillers les plus proches, un espion a réussi à infiltrer le Sacré Collège des Véridiques."
 religious_restriction:0 "Restrictions religieuses"
 desc_religious_restriction:0 "Des mesures ont été prises pour restreindre la liberté religieuse."
 prussian_nation_general_title:0 "Se réformer en Prusse"
 prussian_nation_general_desc:0 "Les terres jadis conquises et germanisées par l'Ordre Teutonique auront toujours besoin de protection contre des voisins rapaces. Si l'Ordre faillit à ce devoir, nous pouvons prendre sa place et inaugurer une nouvelle ère de prospérité et de discipline prussienne."
 missionary_falls_ill:0 "Le missionnaire tombe malade"
 desc_missionary_falls_ill:0 "Le missionnaire que nous avons envoyé à $PROVINCENAME$ est tombé malade. Tous les travaux sur la nouvelle église sont au point mort, et sans ses conseils, les chances de convertir les habitants sont plutôt minces."
 missionary_failure:0 "Échec missionnaire"
 desc_missionary_failure:0 "Il s'avère bien plus difficile que prévu de convertir les habitants de $PROVINCENAME$. Bien que quelques-uns aient montré un intérêt certain au début, la majorité ne semble guère disposée à embrasser une nouvelle religion."
 religious_tensions:0 "Tensions religieuses"
 desc_religious_tensions:0 "Les habitants de $PROVINCENAME$ refusent d'accepter la prédication de nos missionnaires."
 SHIP_NO_PATROL:0 "Aucune flotte n'a patrouillé ici récemment."
 PATROL_COUNTER:0 "Cette zone maritime a été récemment patrouillée, et nous ne nous attendons pas à l'arrivée de pirates avant au moins §Y$NUM$§W jour(s)."
 fabricate_claims_desc:0 "La création de plusieurs documents falsifiés pourrait étayer nos revendications légitimes sur leur trône. Le succès nous donnera un casus belli temporaire."
 imperial_government_vassal:0 "Royaume client"
 imperial_government_ruler_vassal:0 "Roi"
 L_LESS_THAN:0 "moins de"
 L_AT_LEAST:0 "au moins"
 get_foothold_in_china_title:0 "S'implanter au Yanshen !"
 get_foothold_in_china_desc:0 "L'immense richesse du Cathay a attiré vos marchands. Ils vous appellent à soutenir leurs efforts en obtenant un port d'où commercer."
 establish_colony_mission_title:0 "Coloniser $PROVINCENAME$"
 establish_colony_mission_desc:0 "Nous devons établir une colonie à $PROVINCENAME$ pour accroître la gloire et la richesse de notre nation."
 founding_father:0 "Père fondateur"
 desc_founding_father:0 "Nous avons dans cette province un étrange radical qui prêche des idées politiques ridicules selon lesquelles les colons comprendraient mieux le gouvernement local que nous."
 loyalist_stronghold:0 "Bastion loyaliste"
 desc_loyalist_stronghold:0 "Cette province est pleine de vrais Tories convaincus, loyaux au gouvernement légitime ; ils doivent être protégés."
 ANY_CORE_STARTS:0 "Tout pays ayant des revendications"
 advancement_of_true_religion_act_title:0 "Adopter la loi sur l'avancement de la vraie religion"
 advancement_of_true_religion_act_desc:0 "Faire de la lecture de notre sainte bible par les serviteurs et autres une infraction légale ; réserver ce droit aux clercs et aux nobles."
 blasphemy_act_title:0 "Adopter la loi sur le blasphème"
 blasphemy_act_desc:0 "Déclarer le blasphème un délit de droit commun et ainsi faire du mépris ou de la moquerie envers Dieu, Jésus ou les Saintes Écritures sous quelque forme que ce soit une infraction légale."
 act_of_uniformity_title:0 "Adopter l'Acte d'uniformité"
 act_of_uniformity_desc:0 "Faire un pas de plus vers une Église unifiée en imposant la fréquentation de l'église et en fixant l'ordre des services et des prières à utiliser dans le Livre de la prière commune."
 suffragan_bishop_act_title:0 "Adopter la loi sur les évêques suffragants"
 suffragan_bishop_act_desc:0 "Améliorer l'administration en autorisant la nomination d'évêques suffragants pour les responsabilités épiscopales."
 conventicle_act_title:0 "Adopter la loi sur les conventicules"
 conventicle_act_desc:0 "Décourager les non-conformistes en interdisant toute forme d'assemblée religieuse de plus de cinq personnes autres que celles approuvées par l'Église établie."
 declaration_of_indulgence_title:0 "Adopter la Déclaration d'indulgence"
 declaration_of_indulgence_desc:0 "Suspendre toutes les lois pénales pour les membres d'autres religions que l'Église établie et leur accorder la liberté de culte public et le droit d'accéder aux charges militaires et civiles."
 test_act_title:0 "Adopter la loi du Test"
 test_act_desc:0 "Exclure tous les non-membres de l'Église établie de toute charge militaire ou civile ; réserver ce privilège aux membres qui ont reçu la communion selon les rites appropriés de notre Église nationale."
 dissolution_of_the_monasteries_title:0 "Adopter la loi sur la dissolution des monastères"
 dissolution_of_the_monasteries_desc:0 "Accroître le contrôle et le pouvoir du monarque en autorisant la confiscation de tout bien ecclésiastique dont le revenu annuel est inférieur à une certaine valeur."
 popery_act_title:0 "Adopter la loi sur le Haut-Rectorat"
 popery_act_desc:0 "Prendre des mesures pour réduire l'influence ravélienne en offrant de l'argent à quiconque accepte de témoigner contre un prêtre ou évêque ravélien appréhendé alors qu'il célébrait des services religieux."
 the_advancement_of_true_religion_act:0 "Loi sur l'avancement de la vraie religion"
 desc_the_advancement_of_true_religion_act:0 "Désormais, seuls les clercs, les nobles et autres personnages respectés sont autorisés à lire notre sainte bible."
 the_blasphemy_act:0 "Loi sur le blasphème"
 desc_the_blasphemy_act:0 "Nous avons déclaré le blasphème un délit de droit commun, faisant ainsi du mépris ou de la moquerie envers Dieu, Jésus ou les Saintes Écritures sous quelque forme que ce soit une infraction légale."
 the_act_of_uniformity:0 "Acte d'uniformité"
 desc_the_act_of_uniformity:0 "Des mesures supplémentaires ont été prises vers une Église unifiée en imposant la fréquentation de l'église et en fixant l'ordre des services et des prières à utiliser dans le Livre de la prière commune."
 the_suffragan_bishop_act:0 "Loi sur les évêques suffragants"
 desc_the_suffragan_bishop_act:0 "Nous avons amélioré l'administration en autorisant la nomination d'évêques suffragants pour les responsabilités épiscopales."
 the_conventicle_act:0 "Loi sur les conventicules"
 desc_the_conventicle_act:0 "Toute forme d'assemblée religieuse de plus de cinq personnes autres que celles approuvées par l'Église établie est interdite."
 the_declaration_of_indulgence:0 "Déclaration d'indulgence"
 desc_the_declaration_of_indulgence:0 "Toutes les lois pénales pour les membres de religions autres que l'Église établie ont été suspendues."
 the_test_act:0 "Loi du Test"
 desc_the_test_act:0 "Seuls les membres de l'Église établie qui ont reçu la communion selon les rites appropriés sont autorisés à occuper une charge militaire ou civile."
 the_dissolution_of_the_monasteries:0 "Dissolution des monastères"
 desc_the_dissolution_of_the_monasteries:0 "Tout bien ecclésiastique dont le revenu annuel est inférieur à une certaine valeur est désormais considéré comme propriété du gouvernement."
 the_popery_act:0 "Loi sur le Haut-Rectorat"
 desc_the_popery_act:0 "Une certaine somme d'argent est offerte à quiconque accepte de témoigner contre un prêtre ou évêque ravélien appréhendé alors qu'il célébrait des services religieux."
 OPEN_MARKET_LOW_REL_DESC:0 "Nous devons avoir des relations d'au moins 50 avec eux."
