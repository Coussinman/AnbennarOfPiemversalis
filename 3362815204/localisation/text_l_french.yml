 tut_1c_30:0 "L'onglet culture"
 tut_1c_31:0 "En haut de l'écran s'affichent les niveaux de tradition culturelle, navale et militaire de votre pays. En dessous se trouvent les boutons pour chaque type de conseiller. En dépensant de la tradition, vous pouvez recruter les conseillers dont vous avez besoin, qui seront ensuite disponibles à l'embauche dans la vue de la cour. La compétence de votre nouveau conseiller dépend de votre niveau de tradition."
 tut_1c_32:0 "En dessous se trouvent plusieurs décisions culturelles qui peuvent être utilisées pour augmenter votre tradition culturelle ; certaines ont également d'autres effets."
 tut_1c_33:0 "L'onglet missions et décisions"
 tut_1c_34:0 "En haut de cet onglet, vous avez des informations sur votre mission actuelle ; vous n'êtes pas obligé de compléter la mission, mais le faire donnera à votre pays certains bonus. En bas, vous avez plusieurs décisions nationales qui peuvent être prises pour obtenir certains avantages."
