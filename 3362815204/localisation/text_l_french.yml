 tsardom_legacy:0 "Tsarat"
 tsardom_legacy_desc:0 "Cet État est le gardien de l'héritage impérial romain et de l'Église orthodoxe. En tant que Tsar de toutes les Russies, notre souverain est le véritable suzerain des peuples slaves orientaux."
 tsardom_desc:0 "Cet État est le gardien de l'héritage impérial romain et de l'Église orthodoxe. En tant que Tsar de toutes les Russies, notre souverain est le véritable suzerain des peuples slaves orientaux."
 principality_desc:0 "Cet État possède un système de gouvernement qui a évolué dans les années suivant la chute de Kiev et sous la pression des incursions constantes des expéditions de tribut tatares. La famille régnante peut exercer un grand pouvoir, mais la succession par ancienneté et les apanages princiers peuvent mener à de longs conflits internes."
