 time_of_troubles:0 "Temps des Troubles"
 time_of_troubles_desc:0 "Une période de problèmes sociaux et économiques, notre nation lutte contre la famine et la guerre ainsi que l'opposition à l'Église et à l'aristocratie."
 revolution:0 "Révolution"
 desc_revolution:0 "Des décennies d'oppression féodale, de difficultés économiques et d'intolérance religieuse ont pesé sur notre nation et le désir de liberté de la population menace sérieusement notre monarchie."
 peasant_war:0 "La Guerre des Paysans"
 desc_peasant_war:0 "Les demandes non satisfaites de la paysannerie pour des amendements économiques, religieux et politiques ont conduit à des révoltes violentes éclatant dans notre nation."
 religious_intolerance:0 "Intolérance religieuse"
 desc_religious_intolerance:0 "Les luttes religieuses, certaines plus violentes que d'autres, étaient très courantes à cette époque et des révoltes surgissaient régulièrement."
 religious_tolerance:0 "Tolérance religieuse"
 desc_religious_tolerance:0 "À une époque tourmentée par les luttes religieuses, les efforts pour faire la médiation entre ces différents groupes religieux ne firent que se compliquer."
 decreased_morale:0 "Moral diminué"
 desc_decreased_morale:0 "La tension mentale de la guerre, la négligence financière et l'instabilité politique ont finalement forcé le gouvernement à réviser ses dépenses de guerre."
 domestic_improvements:0 "Améliorations intérieures"
 desc_domestic_improvements:0 "La tension mentale de la guerre, la négligence financière et l'instabilité politique ont finalement forcé le gouvernement à se concentrer sur ses problèmes intérieurs."
 enforce_serfdom:0 "Renforcer le servage"
 desc_enforce_serfdom:0 "Les efforts accrus pour contrôler le statut juridique et économique des paysans drainent les forces du peuple commun et le mécontentement grandit parmi les classes inférieures de la société."
 restrict_serfdom:0 "Restreindre le servage"
 desc_restrict_serfdom:0 "Des plans pour améliorer les conditions des serfs et éventuellement abolir le servage sont à l'étude."
 disarmament:0 "Désarmement"
 desc_disarmament:0 "La tension mentale de la guerre, la négligence financière et l'instabilité politique ont finalement forcé le gouvernement à réviser ses dépenses de guerre."
 support_monarch:0 "Soutenir notre monarque"
 desc_support_monarch:0 "Malgré le nombre de tentatives d'assassinat et de tendances révolutionnaires infectant notre nation, notre monarque a récemment reçu un soutien surprenant."
 oppose_monarch:0 "S'opposer à notre monarque"
 desc_oppose_monarch:0 "L'indécision et la mauvaise administration de notre monarque ont conduit le peuple à remettre en question son droit de régner et les conspirations à se multiplier."
 alleviate_population:0 "Soulager la population"
 desc_alleviate_population:0 "Les mauvaises récoltes généralisées ont laissé notre peuple avec très peu, ou rien à manger, mais des mesures ont été prises pour soulager leur souffrance."
 starvation:0 "Famine"
 desc_starvation:0 "Les mauvaises récoltes généralisées ont laissé notre peuple avec très peu, ou rien à manger, mais nous n'avons pas de ressources pour les aider."
 suppress_free_thinkers:0 "Supprimer les libres penseurs"
 desc_suppress_free_thinkers:0 "Pour éviter davantage d'instabilité, nous devons faire taire les discussions que nos philosophes ont sur la réforme sociale."
 bureaucratic_expansion:0 "Expansion bureaucratique"
 desc_bureaucratic_expansion:0 "Malgré les accusations de corruption au sein de notre gouvernement, des plans sont élaborés pour étendre davantage la bureaucratie."
 bureaucratic_reduction:0 "Réduction bureaucratique"
 desc_bureaucratic_reduction:0 "Des tentatives pour réduire notre gouvernement pléthorique et corrompu ont été mises en place."
 fight_inflation:0 "Combattre l'inflation"
 desc_fight_inflation:0 "Pour venir à bout de notre économie mal gérée et éviter une crise économique, toutes les ressources ont été concentrées sur le renforcement de notre monnaie."
 mint_money:0 "Frapper monnaie"
 desc_mint_money:0 "La guerre, les mauvaises récoltes étendues et notre économie mal gérée ont pavé la voie à une banqueroute. Notre monnaie perd rapidement sa valeur et le pouvoir d'achat monétaire devient de plus en plus limité."
 financial_disaster:0 "Désastre financier"
 desc_financial_disaster:0 "Même si notre planification financière a désespérément besoin d'être révisée, nous avons décidé de ne pas réduire les dépenses de guerre."
 support_troops:0 "Soutenir les troupes"
 desc_support_troops:0 "La recherche militaire et l'introduction de la poudre à canon ont plus ou moins rendu nos anciennes forces armées obsolètes. Nous avons décidé de leur fournir une aide financière car elles peuvent encore nous être utiles."
 obsolete_forces:0 "Forces obsolètes"
 desc_obsolete_forces:0 "La recherche militaire et l'introduction de la poudre à canon ont plus ou moins rendu nos anciennes forces armées obsolètes. Nous avons décidé qu'une réforme s'impose."
 peasant_negotiation:0 "Négociation avec les rebelles"
 desc_peasant_negotiation:0 "La Guerre des Paysans a commencé comme plusieurs petits soulèvements mais s'est rapidement propagée au-delà des frontières provinciales. Nous tentons actuellement de négocier avec eux pour restaurer l'ordre."
 isolate_rebels:0 "Isoler les rebelles"
 desc_isolate_rebels:0 "La Guerre des Paysans a commencé comme plusieurs petits soulèvements mais s'est rapidement propagée au-delà des frontières provinciales. Notre seul espoir est de les isoler et de les écraser."
 suppress_minority:0 "Supprimer la minorité"
 desc_suppress_minority:0 "Le conflit culturel grandissant dans notre nation a atteint son point d'ébullition. Nous avons décidé de supprimer les rebelles une fois pour toutes."
 rebel_negotiation:0 "Négociation avec les rebelles"
 desc_rebel_negotiation:0 "Le conflit culturel grandissant dans notre nation a atteint son point d'ébullition. Nous avons décidé d'entamer des négociations diplomatiques pour résoudre cela une fois pour toutes."
 army_reform:0 "Réforme de l'armée"
 desc_army_reform:0 "Notre armée subit une révision approfondie. L'exercice régulier a été introduit et, bien que les officiers soient toujours issus de la noblesse, les paysans et les citadins sont désormais enrôlés dans les autres rangs."
 naval_reform:0 "Réforme navale"
 desc_naval_reform:0 "Notre marine subit une révision approfondie. Cela aidera à stimuler le moral de nos troupes et à augmenter notre efficacité."
 military_reform:0 "Réforme militaire"
 desc_military_reform:0 "La structure militaire de notre nation, tant navale que terrestre, subit une révision approfondie. L'exercice régulier a été introduit et, bien que les officiers soient toujours issus de la noblesse, les paysans et les citadins sont désormais enrôlés dans les autres rangs."
 western_influences:0 "Influences occidentales"
 desc_western_influences:0 "Avec l'aide de conseillers étrangers, nous avons réussi à entamer une vaste réforme culturelle et militaire pour mieux correspondre à l'avancement de l'Occident."
 resist_western_influences:0 "Résister aux influences occidentales"
 desc_resist_western_influences:0 "Des conseillers étrangers ont proposé des réformes culturelles et militaires pour occidentaliser notre pays, mais nous n'y voyons aucun avantage."
 diplomatic_negotiation:0 "Négociation diplomatique"
 desc_diplomatic_negotiation:0 "De nombreux représentants influents de plusieurs colonies affectées par nos politiques nationales se sont réunis et nous craignons que si nos négociations diplomatiques échouent, ils retournent toutes les colonies contre nous."
 trade_investment:0 "Investissement commercial"
 desc_trade_investment:0 "Notre commerce avec les indigènes s'est avéré très profitable et l'économie de la colonie a atteint de nouveaux sommets, nous permettant d'investir davantage dans le commerce."
 disregard_natives:0 "Ignorer les indigènes"
 desc_disregard_natives:0 "Le mauvais traitement des peuples indigènes, combiné à des maladies auparavant inconnues, a rapidement décimé la population mais nous ne pouvons rien y faire."
 aid_natives:0 "Aider les indigènes"
 desc_aid_natives:0 "Le mauvais traitement des peuples indigènes, combiné à des maladies auparavant inconnues, a rapidement décimé la population mais nous avons fait un effort pour les aider dans leur souffrance."
 expand_colonial_territory:0 "Étendre les terres coloniales"
 desc_expand_colonial_territory:0 "La pression politique et économique au pays a fait place à une augmentation soudaine du nombre de personnes cherchant une vie meilleure dans de riches terres inexplorées, nécessitant plus de terres et nous forçant ainsi à étendre nos frontières."
 restrict_colonial_expansion:0 "Restreindre l'expansion coloniale"
 desc_restrict_colonial_expansion:0 "La pression politique et économique au pays a fait place à une augmentation soudaine du nombre de personnes cherchant une vie meilleure dans de riches terres inexplorées nécessitant plus de terres, mais nous n'avons pas les ressources nécessaires disponibles actuellement."
 export_restrictions:0 "Restrictions d'exportation"
 desc_export_restrictions:0 "Les colons ont imposé une interdiction sur les marchandises importées pour protéger leur économie locale. Pour contrer cela, nous restreignons nos exportations vers les colonies."
 military_reinforcement:0 "Renfort militaire"
 desc_military_reinforcement:0 "Les colons ont imposé une interdiction sur les marchandises importées pour protéger leur économie locale. Nous renforçons notre armée pour régler le problème."
 convert_heretics:0 "Convertir les hérétiques"
 desc_convert_heretics:0 "Malgré des tentatives rigoureuses pour éradiquer l'hérésie, la population de certaines provinces est fortement attachée à sa foi et résiste à la conversion, mais des mesures appropriées ont été prises pour résoudre la situation."
 military_funding:0 "Financement militaire"
 desc_military_funding:0 "La politique des dernières années n'a pas eu les effets escomptés et, au lieu de restaurer l'ordre et d'unir la nation, les actions du gouvernement ont encore agité la population ; cela ne nous laisse pas d'autre choix que d'utiliser la force militaire."
 military_funding2:0 "Financement militaire"
 desc_military_funding2:0 "Nous avons réussi à augmenter notre production agricole, permettant une croissance de la population et des hommes que nous pouvons recruter pour nos troupes."
 disorder:0 "Désordre"
 desc_disorder:0 "L'incapacité du gouvernement à faire face à la crise nationale a permis à de nouvelles insurrections de surgir et de déstabiliser notre nation."
 cut_military_investments:0 "Réduire les investissements militaires"
 desc_cut_military_investments:0 "Avec la découverte de continents auparavant inconnus et l'établissement de nouvelles routes commerciales, une nouvelle ère maritime est née. Notre importance en tant que nation commerçante diminue, nous forçant à réguler nos dépenses militaires."
 cut_trade_investments:0 "Réduire les investissements de production"
 desc_cut_trade_investments:0 "Avec la découverte de continents auparavant inconnus et l'établissement de nouvelles routes commerciales, une nouvelle ère maritime est née. Notre importance en tant que nation commerçante diminue, nous forçant à réguler nos dépenses de production."
 cut_government_investments:0 "Réduire les investissements gouvernementaux"
 desc_cut_government_investments:0 "Avec la découverte de continents auparavant inconnus et l'établissement de nouvelles routes commerciales, une nouvelle ère maritime est née. Notre importance en tant que nation commerçante diminue, nous forçant à réguler nos dépenses gouvernementales."
 debt_funding_plan:0 "Plan de financement de la dette"
 desc_debt_funding_plan:0 "Administrer un si vaste empire nécessite une planification économique étendue et la nomination indispensable d'un bon trésorier. Avec son aide, nous avons introduit un plan de financement pour la dette nationale du pays."
 tax_reform:0 "Réforme fiscale"
 desc_tax_reform:0 "Administrer un si vaste empire nécessitait une planification économique étendue, la nomination d'un bon trésorier était donc vitale. Il a introduit plusieurs réformes économiques, y compris un système fiscal plus équitable."
 naval_improvements:0 "Améliorations navales"
 desc_naval_improvements:0 "Grâce à l'immense richesse rapportée de nos colonies à Aelantir, nous pouvons investir davantage dans une puissante force navale."
 naval_disarmament:0 "Désarmement naval"
 desc_naval_disarmament:0 "Malgré l'immense richesse nous revenant de nos colonies aelantiriennes, nous n'avons pas réussi à créer une puissante force navale. La décision a été prise d'abandonner l'idée de suprématie navale."
 tax_reduction:0 "Réduction fiscale"
 desc_tax_reduction:0 "Des impôts élevés, combinés à des différences culturelles et religieuses, causaient souvent du mécontentement parmi les citoyens. Dans les cas les plus extrêmes, cela menait à des rébellions qui avaient parfois des effets durables et drastiques."
 church_functions:0 "Cessation des fonctions ecclésiastiques"
 desc_church_functions:0 "Les familles nobles se voyaient souvent accorder le contrôle des terres ecclésiastiques, et des nominations étaient faites dans de nombreux États en échange de contributions financières aux efforts de la couronne. La couronne perdait bien sûr le contrôle de certains revenus de cette façon."
 reduced_taxes_off:0 "Revenus fiscaux réduits"
 desc_reduced_taxes_off:0 "Les familles nobles se voyaient souvent accorder le contrôle des terres ecclésiastiques, et des nominations étaient faites dans de nombreux États en échange de contributions financières aux efforts de la couronne. La couronne perdait bien sûr le contrôle de certains revenus de cette façon."
 obscurantism:0 "Obscurantisme"
 desc_obscurantism:0 "En tant que réponse typique à différents types de problèmes, l'obscurantisme était un comportement fréquent dans la plupart des nations au moins jusqu'à ce que le Siècle des Lumières apparaisse dans les nations occidentales les plus avancées du continent cannorien."
 exceptional_year:0 "Année exceptionnelle"
 desc_exceptional_year:0 "De temps en temps, un excellent environnement commercial combiné à de bonnes récoltes pouvait devenir une bénédiction pour la base fiscale de la nation, générant des revenus plus élevés pour le royaume."
 monetary_benefits:0 "Avantages monétaires"
 desc_monetary_benefits:0 "La pression démographique, économique et politique au pays a fait place à des augmentations soudaines du nombre de personnes cherchant une vie meilleure dans de riches terres inexplorées. Les hommes d'affaires recherchaient également de plus en plus l'aventure et la richesse dans le commerce outre-mer."
 plague:0 "Peste"
 desc_plague:0 "Les épidémies au début de l'ère moderne étaient bien plus meurtrières que les guerres ou même la famine. Des maladies, comme la variole ou la grippe, qui avec la médecine moderne sont relativement inoffensives, faisaient un lourd tribut chaque fois qu'elles frappaient, surtout parmi les nourrissons."
 trade_disaster:0 "Désastre commercial"
 desc_trade_disaster:0 "Les compagnies commerciales étaient souvent fondées sur des actions hautement spéculatives. De grandes sommes de richesse pouvaient être perdues lorsqu'elles échouaient, ce qui causait également une perte de confiance dans le gouvernement."
 medical_evolution:0 "Évolution médicale"
 desc_medical_evolution:0 "Au XVIe siècle, les États commencèrent à augmenter le nombre de médecins et à réglementer et superviser leur formation dans les universités."
 trade_income_increase:0 "Augmentation des revenus commerciaux"
 desc_trade_income_increase:0 "Les couronnes accordaient souvent aux compagnies commerciales les droits exclusifs de trafiquer des marchandises dans une région. Ces monopoles étaient accordés en échange d'un paiement forfaitaire et de revenus continus des commerçants."
 trade_income_loss:0 "Perte de revenus commerciaux"
 desc_trade_income_loss:0 "Le commerce était fortement réglementé à cette époque mais malgré cela, les marchés n'étaient pas fixes. Parfois, les marchands essayaient d'entrer sur de nouveaux marchés ou de vendre de nouvelles marchandises, mais exigeaient généralement des tarifs nouveaux ou plus élevés pour arrêter leurs concurrents."
 tax_income_loss:0 "Perte de revenus fiscaux"
 desc_tax_income_loss:0 "Les rois devaient garder leurs nobles indisciplinés en ligne par de nombreuses méthodes. L'une des plus courantes était l'argent sonnant et trébuchant. Les nobles exigeaient des pensions accrues en échange de la renonciation à certains droits envers le roi."
 tax_income_boost:0 "Augmentation des revenus fiscaux"
 desc_tax_income_boost:0 "Lorsque la couronne ne pouvait pas ou ne voulait pas payer en espèces les nobles, elle leur accordait à la place des privilèges pour collecter des revenus spéciaux dont ils pouvaient tirer un bon profit."
 scientific_evolution:0 "Évolution scientifique"
 desc_scientific_evolution:0 "La réputation de notre conseiller scientifique a atteint bien au-delà de nos frontières ; notre gouvernement excelle vraiment dans le domaine scientifique."
 land_investment:0 "Investissement terrestre"
 desc_land_investment:0 "La réputation de notre conseiller militaire a atteint bien au-delà de nos frontières. Notre armée excelle vraiment dans le domaine militaire."
 naval_investment:0 "Investissement naval"
 desc_naval_investment:0 "La réputation de notre conseiller naval a atteint bien au-delà de nos frontières. Notre nation excelle vraiment dans le domaine militaire."
 trading_investment:0 "Investissement commercial"
 desc_trading_investment:0 "La réputation de notre trésorier a atteint bien au-delà de nos frontières. Notre nation excelle vraiment dans le domaine du commerce."
 government_investment:0 "Investissement gouvernemental"
 desc_government_investment:0 "La réputation de notre homme d'État a atteint bien au-delà de nos frontières. Notre gouvernement a vraiment de la chance de l'avoir."
 reduced_stability_cost:0 "Coût de stabilité réduit"
 desc_reduced_stability_cost:0 "La réputation de l'un de nos artistes a atteint bien au-delà de nos frontières. Notre nation excelle vraiment dans le domaine artistique."
 trade_company:0 "Compagnie commerciale"
 trade_company_benefits:0 "Avantages de la compagnie commerciale"
 desc_trade_company_benefits:0 "Le désir de notre monarque de jouer un rôle dominant dans le commerce mondial contemporain nous a conduits à fonder notre première Compagnie du Rahen Oriental."
 reform_tensions:0 "Tensions de réforme"
 desc_reform_tensions:0 "Un long débat sur la question de savoir si notre pays devrait subir une vaste réforme ou non a finalement été rejeté. Il a été conclu qu'une telle restructuration serait trop sévère."
 colonial_tensions:0 "Tensions coloniales"
 desc_colonial_tensions:0 "De nombreux représentants influents de plusieurs colonies affectées par nos politiques nationales se sont réunis et nous craignons qu'ils trouvent une cause commune et retournent toutes les colonies contre nous."
 hanseatic_league:0 "Ligue hanséatique"
 desc_hanseatic_league:0 "La Ligue hanséatique fut formée en 1241 et était une association mercantile de villes commerçantes de la région baltique. À son apogée, la ligue comprenait plus de cent villes."
 hanseatic_league_declines:0 "Déclin de la Ligue hanséatique"
 desc_hanseatic_league_declines:0 "Les changements politiques et le manque d'organisation interne ont finalement mis la Ligue hanséatique à genoux. Les accords diplomatiques furent rompus et le commerce fut fermé pour de nombreux États de l'association."
 morale_boost:0 "Stimulation du moral"
 desc_morale_boost:0 "La guerre civile qui a englouti notre nation draine le moral de nos troupes. Des mesures économiques ont été prises pour arrêter cela."
 deserters:0 "Déserteurs"
 desc_deserters:0 "La guerre civile qui a englouti notre nation draine le moral de nos troupes, mais nous n'avons pas de ressources économiques pour arrêter cela."
 battle_preparations:0 "Préparatifs de bataille"
 desc_battle_preparations:0 "Des préparatifs sont en cours pour une bataille finale afin de mettre fin à la guerre civile qui a ravagé notre pays trop longtemps."
 sound_toll:0 "Péage de l'Øresund"
 desc_sound_toll:0 "Le péage du détroit de l'Øresund fut introduit en 1429 par Éric de Poméranie. Ce péage nous permet de collecter un droit de passage de tous les navires de marchandises étrangers traversant notre détroit."
 bosphorous_sound_toll:0 "Péage du Bosphore"
 desc_bosphorous_sound_toll:0 "Nous contrôlons actuellement le commerce de la mer Noire. Tous les navires de marchandises étrangers traversant le détroit du Bosphore sont tenus de payer un droit de passage."
 east_indian_trade_route:0 "Route commerciale du Rahen Oriental"
 desc_east_indian_trade_route:0 "Nos explorateurs ont réussi à voyager autour du Cap de Bonne-Espérance, établissant une nouvelle route commerciale pour le négoce. Cette découverte ouvre la voie à des opportunités commerciales très lucratives."
 non_catholic_rome:0 "La Conquête de Rome"
 desc_non_catholic_rome:1 "L'ancienne cité de Rome, siège du chef de l'Église ravélienne, est une cible de choix pour la conquête."
 catholic_rome:0 "L'Occupation de Rome"
 desc_catholic_rome:1 "Occuper Rome en tant que Ravélien ne pouvait que provoquer l'indignation générale."
 papal_subjugation:0 "Assujettissement du Haut-Rectorat"
 desc_papal_subjugation:0 "Nous avons assujetti les terres des États Ravéliens. Cela nuit à notre réputation aux yeux des autres Ravéliens."
 IS_HRE_EMPEROR:0 "§Y$RULERNAME$§W de §Y$NAME$§W est l'Empereur d'Anbennar."
 HRE_ELECTOR:0 "§Y$NAME$§W est un Électeur dans l'Empire d'Anbennar. Ils soutiendraient actuellement le souverain de §Y$VOTE$§W comme empereur, si l'actuel venait à mourir."
