 restore_holy_see_desc:0 "Le Haut-Recteur ne contrôle actuellement pas Rome. Nous, en tant que nation la plus ravélienne, devons rectifier ce vil blasphème. Conquérons Rome et donnons la cité à la voix de Dieu sur terre !"
 solidify_our_papal_relations_title:0 "Consolider nos relations avec le Rectorat"
 solidify_our_papal_relations_desc:0 "Nous sommes un État ravélien convenable, mais nos relations avec le Haut-Recteur ne sont pas des meilleures. Comme le Haut-Rectorat exerce un pouvoir considérable, il serait sage d'améliorer la situation. Si nous n'agissons pas, d'autres, tenus en plus haute estime, pourraient dire du mal de nous au Haut-Recteur."
