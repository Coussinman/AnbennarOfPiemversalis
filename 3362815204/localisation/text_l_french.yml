 convert_province_mission_desc:0 "$PROVINCENAME$ ne suit pas la vraie foi. Nous devons y envoyer nos missionnaires pour les convertir, ou leurs âmes seront perdues à jamais."
 force_convert_mission_title:0 "Convertir $COUNTRY$"
 force_convert_mission_desc:0 "$COUNTRY$ a suivi la foi $COUNTRY_RELIGION$ bien trop longtemps. C'est notre mission sacrée de les convertir à la vraie foi. Par l'épée !"
