 BUILDINGSLEDGER_BUILDINGS_TEMPLE_S:0 "Temples"
 BUILDINGSLEDGER_BUILDINGS_TEMPLE_L:0 "Pour chaque province que vous avez avec un temple, vous obtenez une réduction du coût pour augmenter la stabilité. Les provinces avec un temple ont une coche verte."
 BUILDINGSLEDGER_BUILDINGS_WORKSHOP_S:0 "Ateliers"
 BUILDINGSLEDGER_BUILDINGS_WORKSHOP_L:0 "Un atelier augmente le revenu fiscal d'une province. Les provinces avec des ateliers sont marquées d'une coche verte."
 BUILDINGSLEDGER_BUILDINGS_REGIMENTAL_CAMP_S:0 "Camps régimentaires"
 BUILDINGSLEDGER_BUILDINGS_REGIMENTAL_CAMP_L:0 "Les camps régimentaires augmentent le nombre total de troupes qu'une province peut supporter et approvisionner et réduisent également le temps de recrutement. Les provinces avec des camps régimentaires ont une coche verte."
 BUILDINGSLEDGER_BUILDINGS_SHIPYARD_S:0 "Chantiers navals"
 BUILDINGSLEDGER_BUILDINGS_SHIPYARD_L:0 "Un chantier naval augmente le nombre d'unités navales que vous pouvez supporter et réduit le temps nécessaire pour construire des navires. Vous ne pouvez construire des chantiers navals que dans les provinces côtières. Les provinces avec une coche verte ont déjà des chantiers navals."
 BUILDINGSLEDGER_BUILDINGS_CONSTABLE_S:0 "Connétables"
 BUILDINGSLEDGER_BUILDINGS_CONSTABLE_L:0 "Une province avec un connétable a des revenus fiscaux directs considérablement augmentés et une légère augmentation de l'agitation locale. Les provinces avec des coches vertes ont des connétables."
 BUILDINGSLEDGER_BUILDINGS_COURTHOUSE_S:0 "Tribunaux"
 BUILDINGSLEDGER_BUILDINGS_COURTHOUSE_L:0 "Une province avec un tribunal obtient une réduction de l'agitation locale. Les provinces avec un tribunal sont marquées d'une coche verte."
 BUILDINGSLEDGER_BUILDINGS_MARKETPLACE_S:0 "Places de marché"
 BUILDINGSLEDGER_BUILDINGS_MARKETPLACE_L:0 "Une place de marché augmente à la fois la croissance démographique et le revenu commercial d'une province. Les provinces avec une place de marché sont marquées d'une coche verte."
 BUILDINGSLEDGER_BUILDINGS_TAX_ASSESSOR_S:0 "Assesseurs fiscaux"
 BUILDINGSLEDGER_BUILDINGS_TAX_ASSESSOR_L:0 "Les assesseurs fiscaux réduisent l'inflation dans une province. Une coche verte indique qu'un assesseur fiscal est déjà présent."
 BUILDINGSLEDGER_BUILDINGS_WAR_COLLEGE_S:0 "Écoles de guerre"
 BUILDINGSLEDGER_BUILDINGS_WAR_COLLEGE_L:0 "Les écoles de guerre donnent une augmentation annuelle de la tradition militaire. Les écoles de guerre ne peuvent pas être construites dans les provinces qui ont un amirauté. Les coches vertes indiquent les provinces avec des écoles de guerre."
