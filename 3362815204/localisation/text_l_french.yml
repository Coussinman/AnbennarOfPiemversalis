 COTLEDGER_COT_AUTOSEND_S:0 "Envoi automatique des marchands"
 COTLEDGER_COT_AUTOSEND_L:2 "Vous pouvez définir les priorités d'envoi automatique des marchands ici. Une croix indique qu'un marchand ne doit pas être envoyé à un centre de commerce particulier, et vous pouvez également définir la priorité pour qu'un centre de commerce reçoive des marchands automatiquement."
