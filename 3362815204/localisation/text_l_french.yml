 MIL_VIEW_TYPE_DESCR:0 "L'unité préférée de notre pays est le type d'unité qui peut être recruté dans nos provinces légitimées. D'autres nations qui contrôlent l'une de nos provinces légitimées peuvent également y recruter notre unité préférée. Lorsque l'unité préférée est changée, le type d'unité subit une baisse temporaire de moral due à la réorganisation."
