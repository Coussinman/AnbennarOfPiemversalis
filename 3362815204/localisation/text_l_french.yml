 strengthen_the_bushido_title:0 "Le code du Bushido"
 strengthen_the_bushido_desc:0 "Les voies de nos guerriers doivent être guidées en tout temps par une saine philosophie de vertu et de conduite appropriée. Loyauté, honneur et obéissance, telle est la voie du Bushido. Renforcez notre tradition militaire, et notre royaume sera respecté dans tout le Japon."
 support_the_kabuki_title:0 "Le théâtre Kabuki"
 support_the_kabuki_desc:0 "Un nouveau style de représentation dramatique basé sur la danse déferle sur le pays et gagne en popularité chaque jour. Soutenez la tradition d'écriture théâtrale du Kabuki, et notre famille sera connue comme mécène des arts."
 the_red_seal_ships_title:0 "Les navires au Sceau Rouge"
 the_red_seal_ships_desc:0 "Certains de nos marchands ont commencé à pratiquer le commerce longue distance en utilisant un nouveau type de navires marchands blindés. En renforçant notre propre classe marchande, cela pourrait être l'occasion d'apprendre de précieuses leçons maritimes."
 strengthen_the_shinobi_title:0 "Renforcer les shinobi"
 strengthen_the_shinobi_desc:0 "Les shinobi sont une caste vêtue de noir composée d'espions, d'assassins et de guerriers opérant dans tout le Japon. En établissant un cercle de shinobi bien financé, nous pouvons protéger famille, clan et Han."
 the_divine_wind_title:0 "Le Vent Divin"
 the_divine_wind_desc:0 "De nombreuses années se sont écoulées depuis que le Vent Divin a repoussé une armée mongole envahissante loin du Japon, sauvant ainsi la mère patrie de l'invasion étrangère. À l'avenir, peut-être devrions-nous être mieux préparés ?"
