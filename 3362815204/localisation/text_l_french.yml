 AUTOSEND_PRIORITIES_LONG:0 "Pour chaque centre de commerce, vous pouvez définir une priorité pour l'envoi automatique des marchands. Une croix rouge indique qu'aucun marchand ne sera envoyé, la priorité peut ensuite être définie sur trois niveaux. Rouge est le plus bas, jaune est la priorité moyenne, tandis que vert est la priorité haute."
 LEDGER_SHORTCUT_LONG:0 "La page des centres de commerce dans le registre vous permet de gérer l'envoi des marchands pour tous les centres de commerce connus. Vous pouvez soit envoyer des marchands manuellement, soit définir des priorités pour l'envoi automatique. Il y a une option supplémentaire pour activer ou désactiver l'envoi automatique selon votre situation."
