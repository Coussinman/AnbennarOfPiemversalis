 tut_miss_19_hint:0 "Pour envoyer un marchand à un nœud commercial, cliquez sur une province qui envoie sa production à ce nœud, puis cliquez sur le bouton pour accéder à la vue du nœud commercial. Les marchands sont envoyés en cliquant sur le bouton d'envoi avec une icône de marchand."
