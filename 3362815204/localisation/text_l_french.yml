 over_extension:0 "Surextension"
 over_extension_val:0 "Surextension : $VAL|%0$"
 desc_over_extension:0 "Notre glorieuse nation a grandi si rapidement que notre administration a du mal à tout garder sous contrôle. Nous devons ralentir et consolider notre emprise sur toutes ces nouvelles terres, décentraliser, ou même libérer certains pays comme vassaux."
 support_south_german_organ_tradition_title:0 "La tradition de l'orgue sud-allemand"
 support_south_german_organ_tradition_desc:0 "La tradition de l'orgue sud-allemand était une école de compositeurs d'orgue allemands, dont le travail était largement inspiré des traditions italiennes antérieures, apprises par les Allemands lors d'études sous des maîtres italiens. Connue pour ses préludes improvisés, chaconnes et passacailles, la musique des organistes sud-allemands est quelque chose que nous pourrions envisager de soutenir."
 south_german_organ_tradition:0 "La tradition de l'orgue sud-allemand"
 desc_south_german_organ_tradition:0 "De Pachelbel à Johann Kaspar Kerll, la musique des orgues sud-allemands se fait entendre dans tout $COUNTRY$"
