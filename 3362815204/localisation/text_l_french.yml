 defeat_rebels_mission_title:0 "Écraser les rebelles"
 defeat_rebels_mission_desc:0 "Notre pays est ravagé par les rebelles, nous devons reprendre le contrôle total de notre territoire. Éradiquez tous les rebelles !"
