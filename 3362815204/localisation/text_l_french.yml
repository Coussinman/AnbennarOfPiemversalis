 expanded_bureaucracy:0 "Bureaucratie étendue"
 desc_expanded_bureaucracy:0 "On dit que les lois engendrent davantage de lois, et nulle part cela n'est plus vrai que dans les couloirs sacrés de l'administration publique. Nos magistrats ont étendu la bureaucratie dans la capitale, et nous en avons désormais davantage. Si cela aide l'administration à s'étendre, ce n'est pas sans inconvénients. Une fois établie, une classe administrative ne se dissoudra jamais d'elle-même."
 expand_bureaucracy_title:0 "Étendre la bureaucratie"
 expand_bureaucracy_desc:0 "On dit que les lois engendrent davantage de lois, et nulle part cela n'est plus vrai que dans les couloirs sacrés de l'administration publique. Avec notre priorité nationale sur la capitale, nous pouvons demander à nos fonctionnaires d'étendre la bureaucratie nationale."
 CURRENT_EMPEROR:0 "§Y$RULERNAME$§W est l'Empereur"
 formalize_measures_title:0 "Formaliser les échelles, poids et mesures"
 formalize_measures_desc:0 "Avez-vous déjà essayé de convertir des perches en piques, et réalisé en cours de route que vous aviez perdu un nombre ? Des maux de tête ? Des nuits blanches ? Plus maintenant ! Notre bureaucratie propose de formaliser le système des poids et mesures. En plus d'augmenter nos revenus grâce à des transactions plus efficaces, cette réforme rendra également la population plus satisfaite de notre règne, en apprenant qu'elle ne paie pas ses impôts sur des balances truquées."
