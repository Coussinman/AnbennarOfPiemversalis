 HAVE_MORE_TOTAL_CARDINALS_THAN:0 "Total de véridicals d'au moins "
 get_minor_cash_reserve_title:0 "Accumuler de l'argent"
 get_minor_cash_reserve_desc:0 "Un prince sage devrait observer de telles règles, et ne jamais rester oisif en temps de paix, mais augmenter ses ressources avec industrie de manière à ce qu'elles puissent être disponibles en temps d'adversité, de sorte que si la fortune vient à changer, elle le trouve préparé à résister à ses coups."
