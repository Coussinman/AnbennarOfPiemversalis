 WORLD_YEAR:0 "Le monde en $YEAR$ AA"
 NEWWORLD_NAME:0 "Un Nouveau Monde !"
 NEWWORLD_DESC:0 "En 1492, Cristóbal Colón avait réussi à convaincre Isabel Ire de Castille qu'une nouvelle route vers l'Orient pouvait être trouvée en naviguant vers l'Ouest. Il était sur le point de découvrir un Nouveau Monde entier. Guidez-le vers celui-ci et apportez à la Castille une richesse fantastique en explorant, conquérant et colonisant un immense empire."
 LEAGUE_OF_CAMBRAI_NAME:0 "Guerre de la Ligue de Cambrai"
 LEAGUE_OF_CAMBRAI_DESC:0 "La Guerre de la Sainte Ligue (ou la Guerre de la Ligue de Cambrai) fut menée entre 1508 et 1516. Le Haut-Recteur Jules II cherchait à renforcer la position des États Ravéliens en Italie et voulait donc freiner la position de Venise au Nord. Pour ce faire, le Haut-Recteur créa la Ligue de Cambrai, composée de Louis XII de France, de l'Empereur Maximilien Ier de l'Empire habsbourgeois, de Ferdinand Ier d'Espagne et de lui-même."
 EIGHTY_YEARS_WAR_NAME:0 "Guerre de Quatre-Vingts Ans"
 EIGHTY_YEARS_WAR_DESC:0 "La Guerre de Quatre-Vingts Ans (1568-1648) fut la révolte des Néerlandais contre le roi d'Espagne. L'Espagne réussit initialement à supprimer la rébellion. En 1572 cependant, les rebelles conquirent Den Briel et la rébellion ressurgit. Dans les années suivantes, les provinces du Nord devinrent, d'abord de facto puis officiellement en 1648, indépendantes sous le nom de Provinces-Unies des Pays-Bas."
 THIRTY_YEARS_WAR_NAME:0 "Guerre de Trente Ans"
 THIRTY_YEARS_WAR_DESC:0 "La Guerre de Trente Ans fut une série de conflits menés entre 1618 et 1648, principalement sur les provinces de l'Allemagne actuelle. Le conflit découlait de frictions religieuses entre l'empereur ravélien et les États protestants de l'Empire d'Anbennar, mais il en vint plus tard à englober la plupart des grands pays cannoriens."
 SPANISH_SUCCESSION_NAME:0 "Guerre de Succession d'Espagne"
 SPANISH_SUCCESSION_DESC:0 "Le dernier roi Habsbourg d'Espagne, Charles II, mourut en 1701. Le roi maladif avait légué toutes ses possessions à Philippe d'Anjou, petit-fils du roi français Louis XIV. Cela signifiait une potentielle superpuissance franco-espagnole au centre de Cannor. C'était quelque chose que l'Autriche, l'Angleterre et la République néerlandaise ne voulaient pas voir se produire. Les pièces étaient en place pour encore une autre grande guerre cannorienne, menée non seulement sur le continent cannorien, mais aussi sur les mers du monde et dans le nord d'Aelantir. Historiquement, la guerre se termina par le Traité d'Utrecht en 1714, où Philippe fut effectivement reconnu comme roi d'Espagne après avoir renoncé à ses prétentions dans la ligne de succession française."
 QUADRUPLE_ALLIANCE_NAME:0 "Guerre de la Quadruple Alliance"
 QUADRUPLE_ALLIANCE_DESC:0 "La Guerre de la Quadruple Alliance commença comme conséquence des prétentions de Philippe V en Italie. Les prétentions furent contestées par la France, la Grande-Bretagne et les Pays-Bas et, en conséquence, ils formèrent une alliance. Plus tard, en raison de l'invasion de la Sardaigne par l'Espagne, l'Autriche rejoignit également l'alliance."
 SEVEN_YEARS_WAR_NAME:0 "Guerre de Sept Ans"
 SEVEN_YEARS_WAR_DESC:0 "La Guerre de Sept Ans fut l'un des plus grands conflits de son temps. Concernant principalement la Prusse et les Habsbourg au début, mais engageant bientôt la France et la Russie du côté autrichien et la Grande-Bretagne du côté prussien."
 USA_NAME:0 "Guerre d'Indépendance aelantirienne"
 USA_DESC:0 "Également connue sous le nom de Guerre révolutionnaire aelantirienne. La guerre éclata en 1775, l'une des principales raisons étant les politiques économiques imposées par la monarchie britannique à ses colonies en Aelantir. Au fur et à mesure que la guerre progressait, les colonies obtinrent le soutien de l'Espagne et de la France, ce qui finit par avoir un impact majeur sur l'issue de la guerre."
