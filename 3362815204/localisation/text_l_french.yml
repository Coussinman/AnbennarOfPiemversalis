 infiltrate_administration:0 "Infiltrer l'administration"
 infiltrate_administration_desc:0 "Introduire des espions dans la bureaucratie ennemie pour découvrir leurs activités (lève le brouillard de guerre)."
 REMOVE_FOW:0 "Lever le brouillard de guerre sur $COUNTRY$ pendant $MONTHS$ mois."
 RENAME_PROV_EFF:0 "$OLD$ renommée en §Y$NEW$§W.\n"
 make_st_petersburg_capital_title:0 "Faire de Saint-Pétersbourg la capitale"
 make_st_petersburg_capital_desc:0 "En tant qu'État plus orienté vers l'Occident, la Russie doit avoir sa capitale à l'ouest, et Saint-Pétersbourg sera notre glorieux phare !"
 establish_siberian_frontier_title:0 "Partir vers l'est en Sibérie !"
 establish_siberian_frontier_desc:0 "La Sibérie est vaste et immense, et nous ne l'avons pas encore entièrement cartographiée. Nous pourrions parrainer une personne courageuse pour mener une expédition plus loin dans ces vastes richesses, et peut-être même fonder une nouvelle cité."
 establish_russian_patriarchate_title:0 "Établir le patriarcat russe"
 establish_russian_patriarchate_desc:0 "Constantinople n'est plus le bastion et le rempart de la chrétienté. Nous devons reprendre le flambeau et établir une troisième Rome."
 russian_patriarchate:0 "Patriarcat russe"
 desc_russian_patriarchate:0 "Le patriarcat russe procure force et foi à notre peuple. Il permettra à la nation de surmonter des épreuves plus dures que tout autre État."
 IS_NOT_CAPITAL:0 " n'est pas la province capitale"
 IS_CAPITAL:0 " est la province capitale"
 total_occupation:0 "Provinces nationales occupées"
 total_blockaded:0 "Ports nationaux bloqués"
 WAR_EXHUASTION_LABEL:0 "Épuisement de guerre"
 WE_MODIFIED_BY:0 "Il est modifié chaque mois par "
 christian_mecca:0 "La conquête de La Mecque"
 desc_christian_mecca:0 "Nous avons conquis la ville sainte de La Mecque, le site sacré de l'islam, au nom du Christ."
 jerusalem_held:0 "La conquête de Jérusalem"
 desc_jerusalem_held:0 "Nous contrôlons la Ville Sainte de Jérusalem, tenue pour sacrée par les musulmans, les juifs et les chrétiens."
 mahayana_louyang:0 "Conquête de Luoyang"
 desc_mahayana_louyang:0 "Nous contrôlons le Temple du Cheval Blanc de Luoyang, le plus ancien temple bouddhiste de Chine et l'un des sites sacrés les plus importants du bouddhisme mahayana en dehors de l'Inde."
 coptic_alexandria:0 "Conquête d'Alexandrie"
 desc_coptic_alexandria:0 "Nous contrôlons Alexandrie, siège du pape copte et de la plus grande communauté chrétienne d'Orient."
 vajrayana_lhasa:0 "Conquête de Lhassa"
 desc_vajrayana_lhasa:0 "Nous contrôlons les sites sacrés du Tibet, qui abritent certains des monastères les plus anciens et les plus importants du bouddhisme vajrayana."
 theravada_kotte:0 "Conquête des temples lankais"
 desc_theravada_kotte:0 "Nous contrôlons les sites sacrés de Lanka, qui abritent certains des monastères les plus anciens et les plus vénérés du bouddhisme theravada, ainsi que la sainte dent de Bouddha."
 hindu_varanasi:0 "La conquête de Varanasi"
 desc_hindu_varanasi:0 "Nous contrôlons la ville sainte de Varanasi, la cité la plus sacrée de l'hindouisme."
 buddhist_bodh_gaya:0 "La conquête de Bodh Gaya"
 desc_buddhist_bodh_gaya:0 "Nous contrôlons Bodh Gaya, tenue pour sacrée par tous les bouddhistes."
 mayan_chichen_itza:0 "La conquête de Chichén Itzá"
 desc_mayan_chichen_itza:0 "En réformant la religion maya et en restaurant le pèlerinage à Chichén Itzá, nous avons pris le contrôle d'un lieu tenu pour sacré par tous les fidèles de notre religion."
 inti_lima:0 "Conquête de Pachacamac"
 desc_inti_lima:0 "Nous contrôlons l'oracle de Pachacamac, tenu pour sacré par tous les fidèles de la foi Inti."
 nahuatl_cholula:0 "Conquête de Cholula"
 desc_nahuatl_cholula:0 "Nous contrôlons les temples de Cholula, tenus pour sacrés par tous les fidèles de la foi nahuatl."
 sikh_amritsar:0 "La conquête d'Amritsar"
 desc_sikh_amritsar:0 "Nous contrôlons la ville sainte d'Amritsar, tenue pour sacrée par les sikhs du monde entier."
 rely_on_polish_hussars_title:0 "S'appuyer sur les hussards polonais"
 rely_on_polish_hussars_desc:0 "Les vastes étendues des steppes font de la cavalerie le type d'unité le plus logique pour constituer notre armée. Nous avons constaté l'efficacité des mercenaires hongrois comme hussards et estimons que la République bénéficierait d'unités indigènes similaires."
 polish_hussars:0 "S'appuyer sur les hussards polonais"
 desc_polish_hussars:0 "Nous avons décidé de favoriser la cavalerie pour nos armées, ce qui a rendu la levée d'unités de cavalerie bien moins coûteuse."
 move_capital_to_warsawa_title:0 "Déplacer la capitale à Varsovie"
 move_capital_to_warsawa_desc:0 "Avec l'incorporation du duché de Mazovie, Varsovie est devenue le siège de la Diète. Peut-être serait-il sage d'y déplacer le siège du gouvernement royal afin de mieux collaborer avec la noblesse ?"
 desc_venetian_arsenal:0 "L'immense Arsenal Novissimo est une merveille à contempler, c'est l'un des plus grands complexes de construction navale de Méditerranée. Il permet de construire des galères bien moins cher qu'ailleurs."
 expand_venetian_arsenal_title:0 "Agrandir l'Arsenal vénitien"
 expand_venetian_arsenal_desc:0 "L'Arsenal de Venise existe depuis le XIIe siècle et est même utilisé dans l'Enfer de Dante pour décrire l'enfer : 'Comme à l'arsenal des Vénitiens, tout l'hiver bout une poix gluante pour calfater leurs navires malades et déchirés.' Cependant, nous nous demandons s'il n'est pas temps d'agrandir l'arsenal."
 move_the_court_to_versailles_title:0 "Déplacer la cour à Versailles"
 move_the_court_to_versailles_desc:0 "Les terres autour du petit village de Versailles ont longtemps été d'excellentes terres de chasse, le petit pavillon de chasse a été progressivement agrandi en un château d'aspect grandiose. N'est-il pas désormais convenable d'en faire le siège du gouvernement français ?"
 enact_edict_de_nantes_title:0 "Promulguer l'édit de Nantes"
 enact_edict_de_nantes_desc:0 "Le royaume était si déchiré par d'innombrables factions et sectes que le plus légitime de tous les partis était le moins nombreux. Dieu nous a donné la force de résister à cette tempête, nous avons enfin surmonté les vagues et gagné notre port de salut : la paix pour notre État."
 revoke_edict_de_nantes_title:0 "Révoquer l'édit de Nantes"
 revoke_edict_de_nantes_desc:0 "Nous avons déterminé que nous ne pouvions rien faire de mieux que de révoquer entièrement ledit édit de Nantes, avec les articles spéciaux qui lui font suite, ainsi que tout ce qui a été fait depuis en faveur de ladite religion."
 edict_de_nantes:0 "Édit de Nantes"
 desc_edict_de_nantes:0 "Contenant 92 articles, 56 articles secrets et deux brevets, l'édit de Nantes fut un règlement complet des problèmes religieux qui tourmentaient la France. Bien qu'aux yeux de beaucoup, ce ne fût qu'une solution temporaire au problème."
 say_the_state_is_me_title:0 "Je suis l'État"
 say_the_state_is_me_desc:0 "Ayant reçu le droit de régner par la grâce de Dieu et de Dieu seul, nous ne devrions pas permettre que nos droits divins soient limités par d'autres hommes, inférieurs."
 the_state_is_me:0 "L'État c'est moi"
 desc_the_state_is_me:1 "Bien que certains considèrent la citation attribuée à Louis XIV comme apocryphe, elle résume en quelque sorte la nature de la monarchie absolue. Le monarque ne devrait être limité ni par la tradition, ni par les privilèges locaux, ni par la noblesse. Au contraire, en tant que premier parmi ses pairs, il doit être le seul commandant du navire de l'État."
 MODIFIER_DIPLO_SKILL:0 "Réputation diplomatique"
 establish_habsburg_dominance_title:0 "Établir la domination des Habsbourg"
 establish_habsburg_dominance_desc:0 "Bella gerant alii, tu felix Austria nube"
 desc_habsburg_dominance:0 "La dynastie des Habsbourg s'est enfin établie comme la dynastie la plus prestigieuse d'Europe. Quand nos diplomates se présentent, on les écoute."
 WARE_EFFECTS:1 "§YL'épuisement de guerre§! a les effets suivants :\n"
 devshirme_system_title:0 "Étendre le système du devshirme"
 devshirme_system_desc:0 "En enrôlant de jeunes hommes des terres nouvellement conquises, nous avons considérablement amélioré l'efficacité de notre processus de recrutement. Étendons et perfectionnons davantage ce système à mesure que notre État grandit."
 janissary_event_tooltip_devs:0 "L'événement §YLes Janissaires§! se produira dans §Y12 ans§!"
 provincial_system_title:0 "Adopter le système de gouvernement provincial"
 provincial_system_desc:0 "Nommer des gouverneurs provinciaux, ou 'Beys', peut certainement améliorer l'administration des impôts, mais avec moins de contrôle direct sur nos provinces, il y a aussi la possibilité que des gouverneurs ambitieux passent la plupart de leur temps à s'adonner aux intrigues et aux querelles internes."
 provincial_taxation_system_title:0 "Introduire le système de taxation provinciale"
 provincial_taxation_system_desc:0 "En établissant un système permanent de taxation provinciale, nous pourrons optimiser considérablement les gains pour le trésor."
 LEDGER_TARIFFS:0 "Droits de douane"
 the_devshirme_system:0 "Système du devshirme"
 desc_the_devshirme_system:1 "De la fin du XIVe au milieu du XVIIe siècle, la dynastie ottomane acquit des esclaves pour sa maison par la pratique du devshirme. Des enfants non-musulmans soigneusement choisis, généralement des chrétiens des Balkans ruraux âgés de 12 à 14 ans, étaient envoyés vivre avec des familles turques pour apprendre le turc et les règles de l'islam avant d'être amenés dans la capitale impériale. La plupart rejoignaient les janissaires, une armée permanente d'infanterie entraînée sous une discipline stricte, tandis que ceux qui montraient des aptitudes particulières au commandement et à l'intellect étaient directement intégrés à la maison du sultan comme pages, où ils étaient éduqués et, s'ils réussissaient, pouvaient être promus aux plus hauts rangs de l'élite militaro-administrative ottomane. Leur subsistance dépendant du souverain, ces esclaves, appelés kul, faisaient preuve d'une intense loyauté et furent essentiels à l'établissement du contrôle centralisé de la dynastie ottomane sur l'empire."
 the_provincial_system:0 "Système de gouvernement provincial"
 desc_the_provincial_system:0 "En nommant des gouverneurs provinciaux, nous avons amélioré l'administration des impôts, mais aussi rendu plus probable que des gouverneurs ambitieux passent la plupart de leur temps à s'adonner aux intrigues et aux querelles internes."
 promote_national_merchants_title:0 "Promouvoir les marchands nationaux"
 promote_national_merchants_desc:0 "Concentrer tous les efforts sur la promotion des marchands nationaux pour accroître leur efficacité et leur compétitivité en échange de quelques réductions fiscales."
 national_merchants:0 "Marchands nationaux"
 desc_national_merchants:0 "En concentrant tous les efforts sur la promotion des marchands nationaux, nous avons accru leur efficacité et leur compétitivité ; malheureusement, nos recettes fiscales en pâtissent."
 CURRENT_POSITION:0 "Position actuelle"
 reparations_of_the_great_wall_title:0 "Réparation de la Grande Muraille"
 reparations_of_the_great_wall_desc:0 "Des portions de la Grande Muraille ont un besoin urgent de réparations importantes. Dans son état actuel, elle n'offre pas une protection suffisante pour nos provinces septentrionales."
 great_wall_reparations:0 "Réparations de la Grande Muraille"
 desc_great_wall_reparations:0 "Des portions de la Grande Muraille ont subi d'importantes réparations pour protéger nos frontières septentrionales."
 assimilate_province_title:0 "Assimiler la province"
 assimilate_province_desc:0 "Encourager les habitants de cette province à adopter la culture principale de notre État et ses coutumes."
 FOW_IS_NOT_LIFTED:0 "Le brouillard de guerre n'est pas levé"
 FOW_IS_LIFTED:0 "Le brouillard de guerre est levé"
 HAVE_GLOBAL_FLAG:0 "Possède le drapeau global "
 HAVE_NOT_GLOBAL_FLAG:0 "Ne possède PAS le drapeau global "
 middle_east:0 "Le Moyen-Orient"
 central_asia:0 "Haless Central"
 MODIFIER_ADDED:2 "$WHERE$ obtient '$WHAT|Y$' $TIME$, donnant les effets suivants :\n$EFFECT$\n\n"
 MODIFIER_ADDED_TIME_FOREVER:0 "jusqu'à la fin de la partie"
 MODIFIER_ADDED_TIME_DURATION:0 "pendant $DURATION|Y$"
 MODIFIER_ADDED_TIME_DATE:0 "jusqu'au $DATE|Y$"
 promote_printing_industry_title:0 "Promouvoir l'industrie de l'imprimerie"
 promote_printing_industry_desc:0 "Bien que l'imprimerie n'ait pas été inventée ici, les gens voient déjà son potentiel. Si des personnes plus conservatrices, comme l'Église, pensent que l'imprimerie est l'outil de Satan, d'autres pensent que Venise en bénéficierait si nous la soutenions."
 desc_printing_industry:0 "La capacité de produire en masse la parole écrite est en quelque sorte une arme à double tranchant. Elle a encouragé l'innovation et le progrès technologique, mais elle donne aussi aux gens des idées étranges qui ne sont pas toujours utiles."
 enact_stato_da_mar_title:0 "Promulguer le 'Stato da Mar'"
 enact_stato_da_mar_desc:0 "Venise fait face dans deux directions : nous avons nos intérêts politiques en Italie du Nord et nos intérêts commerciaux en Méditerranée. Pour garantir la protection de nos intérêts commerciaux, nous devrions scinder notre administration en deux et confier nos intérêts commerciaux au Stato da Mar."
 desc_stato_da_mar:0 "Le Stato da Mar est le terme officiel désignant les possessions vénitiennes hors d'Italie. L'organisation administrative de ces terres est entièrement orientée vers le contrôle maritime et le commerce ; les marchands en ressentent les bénéfices."
 allow_fuggers_title:0 "Accorder aux Fugger le contrôle financier"
 allow_fuggers_desc:0 "La fondation en 1397 de la banque Médicis plaça cette famille influente au centre de la banque européenne ; cependant, des prêts imprudents ont mis la banque sous pression et de nouvelles familles fortunées apparaissent à sa place. La famille Fugger, une riche famille souabe du textile, nous a offert ses services."
 desc_fugger_banks:0 "En échange de certaines concessions féodales, la famille Fugger nous a accordé ses services. Cela nous permet de lever des fonds bien plus rapidement et à moindre coût que nos adversaires."
 establish_hofkriegsrat_title:0 "Établir le Hofkriegsrat"
 establish_hofkriegsrat_desc:0 "Le Hofkriegsrat fut établi en 1556 par Ferdinand Ier, responsable du recrutement et de l'approvisionnement en munitions et nourriture pour les troupes, ainsi que de l'entretien des places fortes."
 desc_hofkriegsrat:0 "Le Hofkriegsrat fut établi en 1556 par Ferdinand Ier, responsable du recrutement et de l'approvisionnement en munitions et nourriture pour les troupes, ainsi que de l'entretien des places fortes."
 desc_spanish_inquisition:0 "Personne ne s'y attendait"
 establish_spanish_inquisition_title:0 "Établir l'Inquisition espagnole"
 establish_spanish_inquisition_desc:0 "Un pays qui prie ensemble reste uni ; le royaume d'Espagne est un ensemble de plusieurs États avec le monarque comme seule force unificatrice. Nous devons garantir l'orthodoxie religieuse si nous voulons maintenir le pays uni."
 commission_gold_fleet_title:0 "Créer la flotte d'or"
 commission_gold_fleet_desc:0 "Le Nouveau Monde offre de vastes opportunités à ceux qui savent les saisir ; les plus importantes appartiennent à la couronne. Un système régulier de convois pour le transport des marchandises serait non seulement plus facile à défendre, mais aussi plus facile à taxer."
 desc_gold_fleet:0 "Bien que plus célèbre pour son transport d'or et d'argent du Nouveau Monde, la flotte du trésor était en fait un système de convois qui acheminait une myriade de marchandises du Nouveau Monde."
 establish_afonsine_ordinances_title:0 "Établir les ordonnances alphonsines"
 establish_afonsine_ordinances_desc:0 "Dans tout État bâti durant l'ère féodale, la noblesse terrienne détient un grand pouvoir et ses intérêts ne sont pas toujours les nôtres. Si nous souhaitons vraiment poursuivre la voie de l'expansion navale, nous devons restreindre ses privilèges."
 desc_afonsine_ordinances:0 "En termes simples, il s'agissait de remplacer la noblesse par des fonctionnaires royaux pour administrer la justice. Mais à un niveau plus profond, elles exprimaient l'importance de la couronne (et de l'autorité centrale) face aux nobles (et aux intérêts locaux)."
 remember_the_navigator_title:0 "Se souvenir du Navigateur"
 remember_the_navigator_desc:0 "Henri le Navigateur (né en 1394) était le troisième enfant de Jean Ier de Portugal. Sachant qu'il ne serait jamais roi, il consacra sa vie à encourager l'exploration et la navigation portugaises. Cela légua au Portugal un héritage considérable."
 desc_legacy_of_the_navigator:0 "Les efforts du prince Henri le Navigateur pour promouvoir la navigation et l'exploration au Portugal se font encore sentir aujourd'hui."
 the_societas_jesu:0 "La Societas Jesu"
 desc_the_societas_jesu:0 "Les jésuites sont les troupes de choc du renouveau catholique. Spécialement formés aux techniques de conversion au catholicisme, ils constituent une force puissante pour convaincre païens et hérétiques de voir la lumière."
 institute_the_societas_jesu_title:0 "Instituer la Societas Jesu"
 institute_the_societas_jesu_desc:0 "Sa Sainteté a approuvé un nouvel ordre missionnaire appelé la Compagnie de Jésus. Cependant, sans soutien royal, il ne prospérera pas ; devons-nous soutenir les jésuites ?"
 use_highland_charge_title:0 "Utiliser la charge des Highlands"
 use_highland_charge_desc:0 "Depuis l'époque de William Wallace, les troupes des Highlands chargent avec une intrépidité dévastatrice. Cependant, l'utilisation croissante des armes de jet rend la charge massive plus dangereuse ; nous devrions utiliser une charge en ordre beaucoup plus dispersé et laisser le montagnard prouver au monde qu'il vaut au moins 10 hommes des basses terres, probablement plus."
 highland_charge:0 "Charge des Highlands"
 desc_highland_charge:0 "Une charge en ordre dispersé de féroces, mais pas tout à fait aussi disciplinés, fantassins des Highlands. Correctement employée, certains la considéraient comme inarrêtable."
 establish_british_merchant_navy_title:0 "Établir la marine marchande britannique"
 establish_british_merchant_navy_desc:0 "Étant une nation insulaire, nous dépendrons toujours de la mer pour le commerce. Nous devons donc promouvoir la marine marchande pour assurer la prospérité de notre commerce."
 acknowledge_britanna_rules_the_waves_title:0 "Chanter 'Britannia Rules the Waves'"
 acknowledge_britanna_rules_the_waves_desc:0 "Rule Britannia !\nBritannia règne sur les flots.\nLes Britanniques ne seront jamais, jamais, jamais esclaves."
 establish_the_wooden_wall_title:0 "Établir la flotte comme notre mur de bois"
 establish_the_wooden_wall_desc:0 "Si nous voulons défendre notre île, nous devons avoir une flotte. Établissons la flotte comme notre mur de bois."
 NOCOLLANDLOCKED:0 "Cette province est enclavée et n'est adjacente à aucune de nos provinces pleinement développées."
 WARTAX_TIP_DELAYED:0 "Les impôts de guerre dureront §Y$DURATION$§! ans."
 WARTAX_STOP_TIP:0 "Nous pouvons cesser de prélever les impôts de guerre."
 STOP_WARTAXES:0 "Arrêter les impôts de guerre"
 form_kingdom_of_prussia_title:0 "Former le royaume de Prusse"
 form_kingdom_of_prussia_desc:0 "Il n'y a qu'un seul roi dans l'Empire, le roi de Bohême. En même temps, nos terres de Prusse ne font pas historiquement partie de l'Empire ; proclamons-nous roi en Prusse pour refléter notre statut plus élevé que les autres électeurs."
 bg_decision_taken:0 "$MONARCHNAME$ $ADJECTIVE2$ $WHICH$."
 bg_dec_tak_1_1:0 "a sagement décidé de"
 bg_dec_tak_1_2:0 "a décidé de"
 bg_dec_tak_1_3:0 "a suivi les conseils de la cour pour"
 bg_dec_tak_1_4:0 "a sagement pris la décision de"
 bg_dec_tak_1_5:0 "a décidé, contre tout bon sens, de"
 FE_LUCK:0 "Nations chanceuses"
 LUCK_HISTORICAL:0 "Historique"
 LUCK_RANDOM:0 "Aléatoire"
 LUCK_NONE:0 "Aucune"
 desc_indelningsverket:0 "Le système suédois d'attribution divisait la paysannerie en groupes de 10 à des fins de recrutement. Ce système facilitait la recherche de personnes pour servir dans l'armée et leur organisation en unités."
 create_indelningsverket_title:0 "Créer l''Indelningsverket'"
 create_indelningsverket_desc:0 "Afin de mieux lever des hommes pour la guerre, le système de recrutement doit être réorganisé en un système où chaque canton est responsable de fournir un homme pour l'armée en temps de guerre. Cela signifie que nous savons exactement où trouver des hommes pour l'armée, ce qui facilite le recrutement."
 institute_the_absolutism_title:0 "Instituer l'absolutisme"
 institute_the_absolutism_desc:0 "Nous devons donner à notre gouvernement un fondement philosophique. Si nous promouvons la doctrine de l'absolutisme, la noblesse nous soutiendra davantage."
 use_finnish_cavalry_title:0 "Utiliser la cavalerie finlandaise"
 use_finnish_cavalry_desc:0 "La Finlande est un endroit assez pauvre et arriéré ; le service dans l'armée suédoise offre d'excellentes opportunités d'enrichissement par le pillage. Cela nous permet de lever une cavalerie excellente et redoutée que nos ennemis prétendent invulnérable grâce à la sorcellerie, bien que nous n'en soyons pas certains à 100 %."
 finnish_cavalry:0 "Hakkapeliitta"
 desc_finnish_cavalry:0 "'A horribile Haccapaelitorum agmine libera nos, Domine'"
 use_swedish_steel_title:0 "Utiliser l'acier suédois"
 use_swedish_steel_desc:0 "Tandis que d'autres armées tirent des salves imprécises sur leurs ennemis, nous marcherons sur eux en rangs disciplinés, délivrerons une seule salve à bout portant, puis leur donnerons l'acier froid."
 desc_swedish_steel:0 "'Bet Kind, bet Kind, morgen kommt der Schwede'"
 DIPLO_SKILL_IMPACT:0 "Lors des négociations diplomatiques avec d'autres pays, ceci est également modifié de §Y$VALUE$§W, en raison de..."
