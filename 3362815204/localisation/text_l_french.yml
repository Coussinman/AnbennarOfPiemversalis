 counter_reformation:0 "Contre-Réforme"
 desc_counter_reformation:0 "Nous avons embrassé la Contre-Réforme pour défendre la foi ravélienne et Sa Sainteté le Haut-Recteur. (Si nous choisissons un jour les idées nationales '§YŒcuménisme§W' ou '§YLiberté, égalité, fraternité§W', nous perdrons ce bonus.)"
 join_the_counter_reformation_title:0 "Embrasser la Contre-Réforme"
 join_the_counter_reformation_desc:0 "Sa Sainteté le Haut-Recteur a appelé à un effort considérable pour contrer le mouvement protestant. Avec l'aide de l'ordre jésuite nouvellement fondé, nous extirperons et purgerons ces viles hérésies. Outre des missionnaires plus nombreux et plus efficaces, le protestantisme et la foi réformée auront plus de mal à se répandre dans notre royaume. (Si nous choisissons un jour les idées nationales '§YŒcuménisme§W' ou '§YLiberté, égalité, fraternité§W', nous perdrons ce bonus.)"
