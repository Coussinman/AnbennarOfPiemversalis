 thalassocracy:0 "Thalassocratie"
 desc_thalassocracy:0 "Thalassocratie, le règne par la mer. Le nôtre est un peuple dont les vies sont vécues avec, par et pour la mer. Notre empire s'étend bien au-delà de notre patrie et jusqu'à des colonies lointaines dans notre Outremer étendu, nos terres au-delà des mers. De côte en côte, nos drapeaux flottent sur les navires voguant sur l'écume salée. La mer est froide, mais nous en avons fait notre foyer. Que personne ne nous défie dans notre élément naturel."
 confirm_thalassocracy_title:0 "Confirmer la thalassocratie"
 confirm_thalassocracy_desc:0 "En confirmant notre thalassocratie, notre règne par la mer, nous recevrons d'immenses bonus pour notre marine, nous propulsant dans une position de domination inégalée sur les océans."
 confirm_thalassocracy_a_tt:1 "§Y[Root.GetName]§! est la puissance commerciale la plus forte à §Y[1298.GetName]§!, §Y[1295.GetName]§!, §Y[341.GetName]§!, §Y[1293.GetName]§! et §Y[1110.GetName]§!."
 confirm_thalassocracy_b_tt:0 "§Y[Root.GetName]§! est la puissance commerciale la plus forte à §Y[45.GetName]§!, §Y[1926.GetName]§!, §Y[1269.GetName]§!, §Y[1975.GetName]§! et §Y[33.GetName]§!."
 confirm_thalassocracy_c_tt:1 "§Y[Root.GetName]§! est la puissance commerciale la plus forte à §Y[1308.GetName]§!, §Y[137.GetName]§!, §Y[358.GetName]§!, §Y[1320.GetName]§! et §Y[377.GetName]§!."
 confirm_thalassocracy_d_tt:0 "§Y[Root.GetName]§! est la puissance commerciale la plus forte à §Y[1448.GetName]§!, §Y[4346.GetName]§!, §Y[1334.GetName]§!, §Y[504.GetName]§! et §Y[1340.GetName]§!."
 confirm_thalassocracy_e_tt:0 "§Y[Root.GetName]§! est la puissance commerciale la plus forte à §Y[1343.GetName]§!, §Y[1365.GetName]§!, §Y[1361.GetName]§!, §Y[1357.GetName]§! et §Y[1397.GetName]§!."
 boom_economy:0 "Économie florissante"
 desc_boom_economy:0 "Notre coupe déborde ! L'économie est florissante !"
 restore_currency_title:0 "Restaurer la monnaie"
 restore_currency_desc:0 "La solidité de notre monnaie faisait jadis l'envie du monde, mais nos dépenses inflationnistes ont fait chuter sa valeur, et les marchands étrangers ne l'acceptent plus aussi volontiers qu'autrefois. $MONARCHTITLE$, nous vous implorons, restaurez la monnaie."
 implement_gold_standard_title:0 "Instaurer l'étalon-or"
 implement_gold_standard_desc:0 "Que d'autres nations dévaluent leurs monnaies autant qu'elles le veulent : la nôtre sera indexée sur la valeur durable de l'or pur, et sera reconnue à travers le monde comme un moyen d'échange de confiance. Prenez garde, cependant, à ne pas rompre les confiances établies."
 gold_standard:0 "Étalon-or"
 desc_gold_standard:0 "Puisque notre monnaie est indexée sur la valeur durable de l'or, nous connaissons moins d'inflation."
 separation_of_powers:0 "Séparation des pouvoirs"
 desc_separation_of_powers:0 "Nous avons adopté une séparation constitutionnelle limitée des pouvoirs, étendant l'indépendance du législatif par rapport à la couronne. Le peuple apprécie ses libertés nouvellement acquises, et notre administration est devenue plus efficace."
 formalize_separation_of_powers_title:0 "Formaliser la séparation des pouvoirs"
 formalize_separation_of_powers_desc:0 "En adoptant une réforme constitutionnelle limitée, définissant et délimitant les offices et branches du gouvernement, ainsi que leurs relations internes, nous pouvons augmenter notre efficacité administrative, ainsi que l'approbation publique de notre règne, toujours évidemment de droit divin."
 cult_of_reason:0 "Culte de la Raison"
 desc_cult_of_reason:0 "Dieu est mort. Dieu reste mort. Et c'est nous qui l'avons tué. Comment nous consoler, nous les meurtriers des meurtriers ? Ce qui était le plus saint et le plus puissant de tout ce que le monde a possédé jusqu'ici a saigné sous nos couteaux."
 go_cult_of_reason_title:0 "Culte de la Raison"
 go_cult_of_reason_desc:0 "Les anciens dieux et leurs fausses idoles tombent dans tout le monde civilisé. Le peuple de $COUNTRY$, si longtemps maintenu dans les chaînes de l'ignorance, s'éveille à un nouveau monde courageux ! Dieu est mort, et tout est permis."
 relief_from:0 "Délivré du mal"
 desc_relief_from:0 "Le pays a été délivré d'un grand mal."
