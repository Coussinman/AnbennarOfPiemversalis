 COUNTRY_HISTORY_HEADER:0 "L'histoire de $COUNTRY$"
 COUNTRY_HISTORY_BATTLE:0 "La bataille de $NAME$ fut peut-être le point décisif. $ATTACKER_SIZE$ hommes $ATTACKER$ affrontèrent $DEFENDER_SIZE$ $DEFENDER$. Les $ATTACKER$ $ATTACKER_RESULT$ et les $DEFENDER$ $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_1:0 "Un événement important de la guerre fut la bataille de $NAME$ où les forces $ATTACKER$, menées par $ATTACKING_COMMANDER$, attaquèrent $DEFENDING_COMMANDER$ et ses forces $DEFENDER$. L'armée $ATTACKER$ forte de $ATTACKER_SIZE$ hommes $ATTACKER_RESULT$ et les $DEFENDER_SIZE$ défenseurs $DEFENDER$ $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_2:0 "La bataille la plus décisive de la guerre fut quand $ATTACKER_SIZE$ hommes, menés par le $ATTACKER$ $ATTACKING_COMMANDER$, $ATTACKER_RESULT$ en attaquant l'armée $DEFENDER$ forte de $DEFENDER_SIZE$ hommes, menée par $DEFENDING_COMMANDER$, qui $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_3:0 "La guerre fut pratiquement décidée quand $ATTACKING_COMMANDER$ affronta $DEFENDING_COMMANDER$ à la bataille de $NAME$. $ATTACKER_SIZE$ soldats $ATTACKER$ $ATTACKER_RESULT$ en combattant les $DEFENDER_SIZE$ soldats $DEFENDER$ $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_4:0 "Les historiens parlent de comment les $ATTACKER$ combattirent les $DEFENDER$ à la bataille de $NAME$, menés par le $ATTACKER$ $ATTACKING_COMMANDER$, $ATTACKER_RESULT$ en combattant l'armée $DEFENDER$ forte de $DEFENDER_SIZE$ hommes, menée par $DEFENDING_COMMANDER$, qui $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_A_NO_COMMANDER:0 "Ce qui décida la guerre fut la bataille de $NAME$ quand $ATTACKER_SIZE$ $ATTACKER$ affrontèrent l'armée $DEFENDER$ forte de $DEFENDER_SIZE$ hommes, menée par $DEFENDING_COMMANDER$, qui $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_D_NO_COMMANDER:0 "La bataille la plus décisive de la guerre fut quand $ATTACKER_SIZE$ hommes, menés par le $ATTACKER$ $ATTACKING_COMMANDER$, $ATTACKER_RESULT$ en attaquant l'armée $DEFENDER$ forte de $DEFENDER_SIZE$ hommes, qui $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_NAVAL:0 "Un événement important de la guerre fut la bataille de $NAME$ où la flotte $ATTACKER$ attaqua la flotte $DEFENDER$. La flotte $ATTACKER$ forte de $ATTACKER_SIZE$ navires $ATTACKER_RESULT$ et les $DEFENDER_SIZE$ navires $DEFENDER$ $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_NAVAL_1:0 "Un événement important de la guerre fut la bataille de $NAME$ où la flotte $ATTACKER$, menée par $ATTACKING_COMMANDER$, attaqua $DEFENDING_COMMANDER$ et sa flotte $DEFENDER$. La flotte $ATTACKER$ forte de $ATTACKER_SIZE$ navires $ATTACKER_RESULT$ et les $DEFENDER_SIZE$ navires $DEFENDER$ $DEFENDER_RESULT$."
 COUNTRY_HISTORY_BATTLE_NAVAL_2:0 "Un événement important de la guerre fut la bataille de $NAME$ où la flotte $ATTACKER$, menée par $ATTACKING_COMMANDER$, attaqua $DEFENDING_COMMANDER$ et sa flotte $DEFENDER$. La flotte $ATTACKER$ forte de $ATTACKER_SIZE$ navires $ATTACKER_RESULT$ et les $DEFENDER_SIZE$ navires $DEFENDER$ $DEFENDER_RESULT$."
