 # ANBENNAR: below edited for species/gender neutrality
 sheriff_desc:0 "Le prévôt du comté était à l'origine chargé de s'assurer que les serfs travaillaient correctement pour leur seigneur. Le shérif est responsable de la collecte des impôts, et un bon shérif rapportera des revenus bien meilleurs."
 high_judge_desc:0 "Le grand juge est un magistrat expérimenté, versé dans le droit. Grâce à sa capacité à garantir que les lois sont appliquées de manière cohérente et juste, le peuple est plus satisfait sous notre règne."
 alderman_desc:0 "L'échevin est un administrateur travailleur qui a débuté dans le gouvernement local. Sa position élevée permet au gouvernement des zones locales de fonctionner plus efficacement, ce qui entraîne une plus grande production."
 colonel_desc:0 "Le colonel était un commandant supérieur de capitaines mercenaires. Son expérience nous permet de recruter des mercenaires à moindre coût."
 collector_desc:0 "Le percepteur a commencé sa carrière en collectant les droits de douane dans un port. Il a progressivement gravi les échelons de l'administration et utilise désormais son expérience pour nous assurer de collecter davantage de revenus de nos colonies d'outre-mer."
 master_of_mint_desc:0 "Le maître de la monnaie s'assure que les pièces sont frappées selon les normes correctes. Quand un grand administrateur dirige un atelier monétaire local, les gens ont davantage confiance dans la valeur de l'argent."
 banker_desc:0 "Le banquier est un individu expérimenté dans le monde mystique de la finance. Grâce à ses contacts, il peut s'assurer de trouver les prêts les moins chers pour aider à financer le gouvernement."
 lord_proprietor_desc:0 "Le seigneur propriétaire dirige une compagnie à charte responsable de la colonisation du Nouveau Monde. Ses compétences encouragent davantage de gens à émigrer vers nos colonies en quête d'une nouvelle vie et fortune."
 pioneer_desc:0 "Le pionnier est un spécialiste de l'établissement de nouvelles entreprises coloniales, bien qu'il ne semble jamais être celui qui en profite finalement. Cependant, ses compétences aident certainement à établir de nouvelles colonies."
 grand_admiral_desc:0 "Les marins se battent toujours mieux quand ils sentent qu'ils sont bien dirigés. Le grand amiral fournit un commandement au plus haut niveau qui se diffuse dans toute la marine."
 naval_organiser_desc:0 "Bien qu'il soit peu probable de le voir sur le gaillard d'arrière menant ses troupes à des exploits audacieux, les capitaines de notre flotte apprécient le travail discret que ce marin terrien accomplit. S'assurer que l'administration à terre fonctionne sans heurts permet à nos navires d'être correctement entretenus et soutenus."
 navigator_desc:0 "Un marin qui a vécu de nombreux longs voyages, le navigateur sait ce dont un navire a besoin pour passer de longs mois en mer."
 rear_admiral_desc:0 "Traditionnellement le troisième commandant de la flotte qui commandait le navire le plus à l'arrière de la colonne. Le contre-amiral sait ce qu'il faut pour être un grand commandant et peut sélectionner des amiraux qui excelleront dans le commandement de flotte."
 privateer_desc:0 "Le corsaire est un quasi-pirate qui a maintes fois pillé le commerce ennemi pour son propre bénéfice et celui de la couronne. Il sait exactement ce qu'il faut pour mettre l'ennemi à genoux."
 sergeant_major_general_desc:0 "Traditionnellement le commandant non-noble le plus haut gradé de l'armée, le sergent-major général est un vétéran aguerri avec un œil pour repérer un bon commandant. Avec ses sages conseils, nous pouvons identifier précocement les officiers prometteurs."
 army_organiser_desc:0 "Diriger une armée moderne n'est pas une tâche facile. Au bon vieux temps, on rassemblait simplement ses nobles et leurs suites pour aller se battre. De nos jours, il faut organiser les choses, et quiconque peut faire cela vaut son pesant d'or."
 commandant_desc:0 "Maître instructeur, le commandant s'attelle à la tâche de s'assurer que nos troupes sont correctement entraînées avec zèle. Vu le nombre de plaintes que font les hommes du rang, il fait du bon travail."
 quartermaster_desc:0 "Maintenir nos troupes approvisionnées en munitions, nourriture et surtout en chair à canon fraîche est un travail important. Soyez toujours reconnaissant d'avoir un bon quartier-maître dans votre administration."
 recruitmaster_desc:0 "Trouver des corps pour remplir les uniformes peut parfois être un travail difficile ; le maître recruteur connaît toutes les astuces et s'assurera que personne qui devrait servir ne puisse y échapper."
 fortification_expert_desc:0 "Défendre des fortifications devient une science en soi, bien que les experts prétendent que c'est davantage une forme d'art. Pour tirer le moindre avantage des fortifications, les procédures défensives doivent être constamment mises à jour, et l'ingénieur militaire est la personne idéale pour ce travail."
 ambassador_desc:0 "Les ambassadeurs sont des diplomates qui ont beaucoup voyagé, qui connaissent bien les subtilités des cours étrangères et peuvent nous donner l'avantage dans les négociations importantes."
 inquisitor_desc:0 "Ayant acquis de l'expérience à débusquer ceux qui ne suivent pas l'orthodoxie appropriée de la foi, l'inquisiteur peut utiliser ses talents pour repérer ceux qui se comportent étrangement au gouvernement."
 grand_captain_desc:0 "Les soldats se battent toujours mieux quand ils sentent qu'ils sont bien dirigés. Le grand capitaine fournit un commandement au plus haut niveau qui se diffuse dans toute l'armée."
 sheikh_ul_islam_title:0 "Établir le poste de Cheikh ul-Islam"
 sheikh_ul_islam_desc:0 "Instituer un nouveau poste à confier à ceux qui ont une connaissance approfondie du Livre de Dieu pour s'assurer que la conduite du gouvernement est conforme à la loi islamique."
 the_sheikh_ul_islam:0 "Cheikh ul-Islam"
 desc_the_sheikh_ul_islam:0 "Un nouveau poste a été institué pour s'assurer que la conduite du gouvernement est conforme à la loi islamique."
 the_khalifah_title:0 "Adopter le titre de Calife"
 the_khalifah_desc:0 "Conférer le titre de Calife au Sultan pour démontrer son importance non seulement en tant que dirigeant politique mais aussi en tant que chef spirituel."
 khalifah:0 "Calife"
 desc_khalifah:0 "Le titre de Calife a été conféré au Sultan pour démontrer son importance non seulement en tant que dirigeant politique mais aussi en tant que chef spirituel."
 denouncement_of_sect_practices_title:0 "Dénonciation des pratiques sectaires"
 denouncement_of_sect_practices_desc:0 "Condamner toute forme de pratique sectaire et déclarer tous les pratiquants hérétiques."
 sect_practices:0 "Dénonciation des pratiques sectaires"
 desc_sect_practices:0 "Toute forme de pratique sectaire est considérée comme un comportement hérétique."
 monastic_education_title:0 "Éducation monastique"
 monastic_education_desc:0 "Améliorer les compétences en lecture et en calcul en promouvant un système d'éducation monastique à l'échelle nationale."
 monastic_education_system:0 "Éducation monastique"
 desc_monastic_education_system:0 "Un accent accru a été mis sur l'établissement d'un système d'éducation monastique pour améliorer l'alphabétisation et le calcul."
 anti_christian_edict_title:0 "Édit anti-chrétien"
 anti_christian_edict_desc:0 "Prévenir toute possible atteinte à l'autorité que le christianisme pourrait causer en publiant un édit pour expulser tous les missionnaires chrétiens et exiger que tous les convertis renoncent à leur nouvelle foi."
 the_anti_christian_edict:0 "Édit anti-chrétien"
 desc_the_anti_christian_edict:0 "Un édit a été publié pour expulser tous les missionnaires chrétiens."
 islamic_centre_of_scholarly_title:0 "Centre islamique d'érudition"
 islamic_centre_of_scholarly_desc:0 "Diriger tous vos efforts vers la création d'un centre islamique d'érudition et de culte en promouvant les études académiques de l'islam et en soutenant l'établissement de bibliothèques locales."
 islamic_scholarly_centre:0 "Centre islamique d'érudition"
 desc_islamic_scholarly_centre:0 "Tous nos efforts sont dirigés vers l'établissement d'un centre islamique d'érudition et de culte."
 superintendents_title:0 "Surintendants"
 superintendents_desc:0 "Établir un nouveau poste à confier à un surintendant, similaire en nature à celui occupé par un évêque, mais au lieu d'être nommé par l'archevêque, le surintendant sera nommé par le monarque et sera donc plus susceptible d'être loyal envers la couronne."
 superintendent_office:0 "Surintendants"
 desc_superintendent_office:0 "Nous avons établi un nouveau poste de surintendants, similaire en nature aux postes occupés par les évêques, mais au lieu d'être nommé par l'archevêque, le surintendant est nommé par le monarque et est donc plus susceptible d'être loyal envers la couronne."
 TOFARAWAYTOCOLONISE:0 "Cette province est à plus de $MAX$ de notre province revendiquée non bloquée la plus proche avec un port."
 religious_migration:0 "Migration religieuse"
 desc_religious_migration:0 "Une minorité religieuse a fui notre patrie pour créer une colonie dans le Nouveau Monde. Ils sont dévoués à leur propre religion et n'écouteraient aucun missionnaire."
 improved_fortifications:0 "Fortifications améliorées"
 desc_improved_fortifications:0 "Les fortifications locales ici ont été considérablement améliorées et offrent une excellente défense contre tout siège."
 jizya_tax_title:0 "Introduire la Jizya"
 jizya_tax_desc:0 "Introduire un impôt par tête, la 'Jizya', pour les sujets non-musulmans qui sera prélevé en fonction des biens qu'ils possèdent."
 per_capita_tax:0 "Jizya"
 desc_per_capita_tax:0 "Un impôt par tête, la 'Jizya', a été introduit pour les sujets non-musulmans et sera prélevé en fonction des biens qu'ils possèdent."
 ibadat_khana_title:0 "Établir une Ibadat Khana"
 ibadat_khana_desc:0 "Encourager le débat théologique en établissant une 'Maison du culte' pour que philosophes, dirigeants et autres érudits en matière de religion puissent discuter des questions religieuses concernant toutes les religions que nous connaissons."
 house_of_worship:0 "Ibadat Khana"
 desc_house_of_worship:0 "Une 'Maison du culte' a été établie pour encourager les philosophes, dirigeants et autres érudits en matière de religion à discuter des questions religieuses concernant à la fois l'hindouisme et l'islam."
 din_i_illahi_title:0 "Introduire le Din-i Illahi"
 din_i_illahi_desc:0 "Réduire les troubles sociaux causés par les désaccords religieux entre nos sujets en introduisant une nouvelle doctrine religieuse qui tentera de fusionner les pensées principales de l'islam avec l'hindouisme."
 divine_faith:0 "Din-i Illahi"
 desc_divine_faith:0 "Une nouvelle doctrine religieuse a été introduite qui tente de fusionner les pensées principales de l'islam avec l'hindouisme."
 anti_muslim_edict_title:0 "Édit anti-musulman"
 anti_muslim_edict_desc:0 "Protéger notre religion nationale de toute influence islamique en empêchant les missionnaires de franchir nos frontières."
 muslim_resistance:0 "Édit anti-musulman"
 desc_muslim_resistance:0 "Nous n'autorisons aucun missionnaire musulman à franchir nos frontières nationales."
 acceptance_of_religious_sects_title:0 "Accepter les sectes religieuses"
 acceptance_of_religious_sects_desc:0 "Viser l'établissement d'une société tolérante où les citoyens sont autorisés à pratiquer la religion de leur choix et où les sectes et autres sont autorisées à suivre les pratiques qu'elles jugent appropriées."
 religious_sect_tolerance:0 "Tolérance des sectes religieuses"
 desc_religious_sect_tolerance:0 "Notre but est d'établir une société tolérante où les citoyens sont autorisés à pratiquer la religion de leur choix et où les sectes et autres sont autorisées à suivre les pratiques qu'elles jugent appropriées."
 haridasa_movement_title:0 "Soutenir le mouvement Haridasa"
 haridasa_movement_desc:0 "Soutenir le mouvement spirituel Haridasa dans ses efforts pour promouvoir l'école philosophique dualiste de Madhvacharya par opposition aux idéaux non-dualistes d'Adi Shankara."
 the_haridasa_movement:0 "Soutien au mouvement Haridasa"
 desc_the_haridasa_movement:0 "De l'argent est actuellement investi pour soutenir le mouvement Haridasa dans ses efforts pour promouvoir l'école philosophique dualiste de Madhvacharya par opposition aux idéaux non-dualistes d'Adi Shankara."
 divination_title:0 "Encourager la divination"
 divination_desc:0 "Faire de la divination une base fondamentale de notre société, qu'elle soit utilisée pour chasser les mauvais esprits ou obtenir des informations des dieux concernant les sacrifices et les maladies."
 godly_inspiration:0 "Divination"
 desc_godly_inspiration:0 "La divination sert de base fondamentale à notre société, qu'elle soit utilisée pour chasser les mauvais esprits ou obtenir des informations des dieux concernant les sacrifices et les maladies."
 CW_WARNALLIES2:0 " $ENEMY$ est allié avec $COUNTRY$."
