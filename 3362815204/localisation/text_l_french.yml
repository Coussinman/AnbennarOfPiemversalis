 improve_key_defensive_position_small_title:0 "Améliorer les défenses à $PROVINCENAME$"
 improve_key_defensive_position_small_desc:0 "Les habitants de $PROVINCENAME$ craignent que leurs défenses soient inadéquates face à une possible invasion. Ils supplient que les fortifications soient améliorées."
 improve_key_defensive_position_medium_title:0 "Créer une forteresse à $PROVINCENAME$"
 improve_key_defensive_position_medium_desc:0 "La province frontalière de $PROVINCENAME$ pourrait devenir un champ de bataille clé dans une future guerre. Nos généraux croient qu'une amélioration majeure des fortifications est vitale pour que nous soyons préparés."
 improve_key_defensive_position_hard_title:0 "Faire de $PROVINCENAME$ une forteresse imprenable !"
 improve_key_defensive_position_hard_desc:0 "La forteresse de $PROVINCENAME$ était à un moment la merveille de l'époque, cependant, de nos jours elle semble distinctement obsolète. Nous devrions prioriser la modernisation de cette forteresse."
 get_control_of_naval_supplies_title:0 "Production nationale de fournitures navales"
 get_control_of_naval_supplies_desc:0 "Si nous voulons maintenir notre flotte, nous devons avoir un accès sécurisé aux fournitures navales. Faire moins serait mettre la sécurité de notre pays en danger."
 liquor_act_title:0 "Adopter l'acte sur les spiritueux"
 liquor_act_desc:0 "Introduire des réglementations pour la vente de gin en imposant des frais de licence pour tout détaillant de gin et leur interdire de vendre à des marchands non autorisés."
 joint_stock_companies_act_title:0 "Adopter l'acte sur les sociétés par actions"
 joint_stock_companies_act_desc:0 "Empêcher les petites entreprises non agréées de concurrencer la Compagnie des Indes orientales en interdisant les sociétés par actions non autorisées."
 merchant_shipping_act_title:0 "Adopter l'acte sur la marine marchande"
 merchant_shipping_act_desc:0 "Imposer une limite à la responsabilité d'un armateur concernant les marchandises endommagées ou perdues en raison de vol, détournement ou incendie."
 witchcraft_act_title:0 "Adopter l'acte sur la magie réglementée"
 witchcraft_act_desc:0 "Qu'ils la méprisent, la convoitent ou la craignent, peu à Halann n'apprécient pas l'importance de la magie, et notre loi devrait faire de même. Fixons précisément dans le droit commun un ensemble de limites et de réglementations pour tous ceux qui pratiquent la magie."
 education_act_title:0 "Adopter l'acte sur l'éducation"
 education_act_desc:0 "Améliorer l'administration de la justice en adoptant le principe de l'éducation obligatoire pour ceux qui doivent gouverner notre système juridique."
 abolish_slavery_act_title:0 "Adopter l'acte d'abolition de l'esclavage"
 abolish_slavery_act_desc:0 "Adopter un acte pour interdire l'esclavage et proscrire la traite des esclaves dans toute la nation."
 judiciary_act_title:0 "Adopter l'acte judiciaire"
 judiciary_act_desc:0 "Établir un système judiciaire national qui sera responsable de l'administration et de l'interprétation de la loi au nom du souverain ou de l'État."
 combination_act_title:0 "Adopter l'acte de coalition"
 combination_act_desc:0 "Prendre toutes les mesures possibles pour prévenir les grèves en interdisant la formation de coalitions illégales, de syndicats professionnels et de syndicats ouvriers."
