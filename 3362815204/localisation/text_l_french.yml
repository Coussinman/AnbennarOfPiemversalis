 liberum_veto_title:0 "Instituer le Liberum Veto"
 liberum_veto_desc:0 "Notre noblesse est venue nous voir avec une proposition intéressante. Si nous leur accordions le Liberum Veto, ils nous donneraient en retour un soutien substantiel pendant la guerre actuelle. Bien que leur offre soit très généreuse, certains de nos conseillers suggèrent que cela pourrait n'être que le début des ennuis. En fait, bien qu'ils se fâchent si nous les refusons, ils profiteront certainement de toute faiblesse future que nous montrons pour exiger d'autres concessions."
 indian_trade_company_title:0 "Fonder la Compagnie des Indes orientales"
 indian_trade_company_desc:0 "Notre intérêt pour une Compagnie de Rahen oriental est principalement basé sur les espoirs et ambitions suscités par les énormes revenus produits par les premières entreprises d'autres compagnies. En même temps, il y a aussi un désir de la part de $MONARCH$ de jouer un rôle dominant dans le commerce mondial contemporain, un désir qui n'est pas nécessairement approuvé de tout cœur par les marchands locaux de notre pays."
 own_port_province_in_far_east_tooltip:0 "Possédez une province portuaire en Inde, au Yanshen, au Japon ou aux Indes orientales."
