 anti_tax_rebels_title:0 "Paysan"
 anti_tax_rebels_name:0 "Paysans de $COUNTRY$"
 anti_tax_rebels_desc:0 "Les insurgés paysans en ont assez de l'oppression et des impôts écrasants. Ils sont mal équipés et entraînés, rassemblant principalement de l'infanterie."
 revolutionary_rebels_title:0 "Révolutionnaire"
 revolutionary_rebels_name:0 "Révolutionnaires de $COUNTRY$"
 revolutionary_rebels_desc:0 "Les rebelles révolutionnaires veulent renverser le régime, qu'ils considèrent comme corrompu et profondément injuste. Ils croient en leur cause et sont menés par des bourgeois et des officiers militaires désabusés."
 heretic_rebels_title:0 "Hérétique"
 heretic_rebels_name:0 "Hérétiques $HERETIC$"
 heretic_rebels_desc:0 "Les rebelles hérétiques épousent une interprétation différente de la Foi et sont prêts à mourir pour leur cause. Ils rassemblent souvent un noyau de soldats entraînés qui ont été conquis par les croyances hérétiques."
 religious_rebels_title:0 "Religieux"
 religious_rebels_name:0 "Zélotes $RELIGION$"
 religious_rebels_desc:0 "Les fanatiques religieux ont tendance à se soulever dans les provinces contrôlées par des nations d'une foi différente. Ils cherchent à répandre leur foi et à frapper tous les mécréants."
 nationalist_rebels_title:0 "Séparatistes"
 nationalist_rebels_name:0 "Séparatistes de $INDEP$"
 nationalist_rebels_desc:0 "Les rebelles séparatistes veulent la liberté pour leur peuple. Ils sont bien dirigés et équipés, mais auront tendance à rester dans les provinces de leur propre culture."
 noble_rebels_title:0 "Noble"
 noble_rebels_name:0 "Rebelles nobles de $COUNTRY$"
 noble_rebels_desc:0 "Les rebelles nobles sont mécontents de leur monarque, généralement en raison de réformes libérales. Ils alignent des troupes professionnelles avec une grande proportion de cavalerie."
 colonial_rebels_title:0 "Colonial"
 colonial_rebels_name:0 "Séparatistes de $INDEP$"
 colonial_rebels_desc:0 "Les séparatistes coloniaux sont fatigués d'années d'inégalité et de mauvaise gestion, cherchant l'indépendance de leur lointaine nation mère."
 patriot_rebels_title:0 "Patriote"
 patriot_rebels_name:0 "Patriotes $CULTURE$"
 patriot_rebels_desc:0 "Les rebelles patriotes rêvent d'unification avec leurs parents culturels sous un drapeau libre. Attention, car les provinces qu'ils prennent peuvent faire défection."
 russian_nation_title:0 "Former la nation russe"
 russian_nation_desc:0 "Par la conquête et la diplomatie, la Russie a réussi à se transformer d'une simple colonie en une principauté dominante. Après plusieurs expéditions orientales, les hordes mongoles ont finalement été soumises et un État russe centralisé, gouverné sous la suzeraineté du Tsar, émerge. Les influences de l'Europe occidentale nous aident à moderniser et réformer notre nation et le style d'éducation occidental est adopté."
 netherlands_nation_title:0 "Former la nation néerlandaise"
 netherlands_nation_desc:0 "Les Néerlandais émergent comme l'une des puissances navales et coloniales les plus capables d'Europe. Les opportunités commerciales lucratives, localement et outre-mer, ont entraîné une évolution rapide du pays vers l'un des premiers pays capitalistes du monde."
 spanish_nation_title:0 "Former la nation espagnole militairement"
 spanish_nation_desc:0 "L'expansion mondiale dans les zones nouvellement découvertes et l'établissement de colonies transforment l'Espagne en l'une des nations les plus puissantes et les plus riches de notre époque. Les explorateurs espagnols se déplacent constamment vers de nouvelles terres et étendent nos frontières. D'immenses quantités d'or et d'argent sont ramenées dans notre patrie, remplissant les coffres de notre Trésor d'État."
 english_nation_title:0 "Former la nation anglaise"
 english_nation_desc:0 "Le commerce a longtemps été un fondement de la politique nationale anglaise. En étendant notre influence au-delà des frontières et en contrôlant son développement politique intérieur, nous avons réussi à devenir l'une des principales puissances européennes. Notre expansion coloniale devient un facteur majeur dans la promotion de la croissance économique de notre nation, renforçant notre position dans les affaires mondiales."
 french_nation_title:0 "Former la nation française"
 french_nation_desc:0 "Cette année marquera le début d'une période évolutive pour notre nation. Les anciennes voies féodales commenceront à céder la place à une nation plus moderne et centralisée. Bien que luttant financièrement en raison de projets mal calculés et de campagnes militaires, nous avons réussi à nous transformer en l'une des puissances les plus dominantes d'Europe."
 italian_nation_title:0 "Former la nation italienne"
 italian_nation_desc:0 "En tant que cœur de la Renaissance, notre nation s'épanouit culturellement. Nous venons d'entrer au début de ce qui ressemble à une rébellion artistique prolongée, en particulier dans le domaine de l'architecture et de la littérature. L'évolution culturelle n'aide cependant pas notre pays à maintenir la paix à l'intérieur de nos frontières. Notre pays est continuellement frappé par des États étrangers cherchant le pouvoir et le gain territorial."
 german_nation_title:0 "Former la nation allemande"
 german_nation_desc:0 "Indépendamment de l'absence d'une autorité centrale forte, notre nation prospère. La Ligue hanséatique, formée par des centaines de villes du nord de l'Allemagne, a contribué à la prospérité de notre nation. La croissance intellectuelle, combinée au commerce maritime et terrestre, a également contribué à stimuler le développement et à transformer notre pays en un centre de fabrication prospère."
 persian_nation_title:0 "Former la nation perse"
 persian_nation_desc:1 "Les terres de Perse ont toujours été le siège d'empires puissants depuis l'époque de Cyrus le Grand. Il est temps pour $MONARCH$ de reconquérir cette gloire légitime et le titre de Shah d'Iran, car plusieurs des régions voisines ont été conquises et la possibilité d'une nation iranienne ressuscitée ne semble plus si absente."
 mughal_nation_title:0 "Former l'Empire moghol"
 mughal_nation_desc:0 "$MONARCH$ a commencé à poser les fondations de son nouvel empire. Bien qu'inférieures en nombre, ses troupes bien disciplinées ont réussi à remporter plusieurs victoires décisives contre les sultans de l'Inde. La bataille de $CAPITAL$ est devenue la première grande victoire d'une série d'expansions territoriales et, avec le temps, l'empire des Moghols pourrait s'étendre sur la plus grande partie du plateau indien."
 irish_nation_title:0 "Former la nation irlandaise"
 irish_nation_desc:0 "Pendant des décennies, l'Angleterre a tenté de subjuguer la population irlandaise et de prendre le contrôle de l'île. Unir les terres irlandaises sous un seul drapeau pourrait être notre seule chance de les repousser."
 british_nation_title:0 "Former la nation britannique"
 british_nation_desc:0 "En unifiant notre développement politique intérieur et en étendant notre influence au-delà de nos frontières, nous serons en mesure de renforcer notre position dans les affaires mondiales et de nous transformer en l'une des principales puissances européennes, l'Empire britannique."
 eastern_westernisation_title:0 "Occidentaliser"
 eastern_westernisation_desc:0 "Après diverses excursions à travers l'Europe occidentale, $MONARCH$ est plus déterminé que jamais que des réformes occidentalisées extensives doivent être mises en œuvre pour combattre l'arriération de notre pays. Des travailleurs qualifiés et des scientifiques sont ramenés chez nous dans un effort pour occidentaliser la nation et la rendre plus moderne. L'armée subit une réorganisation extensive ainsi que les techniques de production et agricoles."
 muslim_westernisation_title:0 "Occidentaliser"
 muslim_westernisation_desc:0 "$MONARCH$ est devenu connu non seulement comme un grand conquérant mais aussi comme un grand consolidateur et réformateur. Son règne compétent a posé les bases de la modernisation de notre pays. Il est un grand admirateur de l'avancement de l'Occident et, avec l'aide de conseillers étrangers, il a commencé une vaste réforme culturelle et militaire."
 rotw_westernisation_title:0 "Occidentaliser"
 rotw_westernisation_desc:0 "Des explorateurs et des colons étrangers de toute l'Europe ont progressivement colonisé une partie de plus en plus grande de notre pays. De nouvelles maladies combinées à l'esclavage et à l'exploitation ont anéanti une grande partie de notre population, déchirant nos icônes et valeurs culturelles en morceaux et promouvant les pensées et idées occidentales pour les remplacer."
 no_mission_title:0 "Pas de mission"
 no_mission_desc:0 "Nous n'avons actuellement aucune mission active."
 conquer_core_title:0 "Reconquérir $PROVINCENAME$"
 conquer_core_desc:0 "Depuis des temps immémoriaux, $PROVINCENAME$ a légitimement appartenu à notre grande nation. Nos espions rapportent que la population aspire à nous rejoindre et que dans chaque foyer des drapeaux et des armes sont cachés au cas où nos troupes arriveraient pour les libérer de leurs oppresseurs."
