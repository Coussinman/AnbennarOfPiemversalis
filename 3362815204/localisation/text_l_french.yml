 renovatio_title:0 "Unifier Anbennar"
 renovatio_desc:0 "Réaliser le rêve : unir les États disparates de l'Empire en un État-nation."
 establish_gaituguiliu_decision_title:2 "Introduire le Gaituguiliu"
 establish_gaituguiliu_decision_emperor:2 "Introduire le Gaituguiliu"
 establish_gaituguiliu_decision_desc:1 "Les chefs indigènes dans les préfectures reculées, aussi appelés Tusi, sont des dirigeants héréditaires de minorités locales. Ces chefs peuvent sembler utiles de temps à autre grâce à leurs liens avec les habitants, mais se sont fréquemment révélés être un risque pour la stabilité régionale à long terme. En les remplaçant progressivement par des fonctionnaires réguliers nommés par le gouvernement central, maintenir la tranquillité au niveau régional deviendra plus facile."
 seaban_decision_title:1 "Réformer le Seaban"
 seaban_decision_emperor:1 "Réformer le Seaban"
 seaban_decision_desc:1 "Les mers et les océans apportent des troubles : piraterie, contrebande, parfois même les usurpateurs se cachent derrière les vagues et les marées, mais le commerce maritime apporte aussi fortune et découvertes. Afin de laisser la richesse et les nouvelles innovations entrer dans notre grand royaume, nous devrions réformer nos règlements du Seaban."
 reform_land_tax_decision_title:2 "Déléguer les Zongdu"
 reform_land_tax_decision_emperor:2 "Déléguer les Zongdu"
 reform_land_tax_decision_desc:2 "L'immensité de notre royaume est absolue et sans égale ; cependant, le réguler est ardu. Créons donc la position de Zongdu, un vice-roi supervisant plus d'une province. Ils dirigeront les affaires provinciales en tant que représentants de l'Empereur, afin que les affaires moins cruciales n'aient pas à être rapportées à la Cité Interdite."
 military_governors_decision_title:2 "Établir le Lifan Yuan"
 military_governors_decision_emperor:2 "Établir le Lifan Yuan"
 military_governors_decision_desc:2 "Pour gérer les nombreux sujets et États mineurs des régions périphériques au sein et au-delà de la frontière impériale, le ministère des Rites est désormais considéré comme insuffisant et inapproprié. Nous devons établir un bureau qui se concentre sur les relations avec eux."
 centralizing_top_government_decision_title:2 "Remodeler la bureaucratie"
 centralizing_top_government_decision_emperor:2 "Remodeler la bureaucratie"
 centralizing_top_government_decision_desc:2 "Réorganiser le Guanzhi, les rangs bureaucratiques, n'est pas seulement faire une rupture symbolique avec la dynastie incompétente qui nous a précédés : en réajustant les structures politiques de l'Empire, notre pouvoir sera concentré et notre régime deviendra solide comme une forteresse d'or aux douves bouillonnantes."
 vassalize_tributaries_decision_title:1 "Élever le statut de tributaire"
 vassalize_tributaries_decision_emperor:1 "Élever le statut de tributaire"
 vassalize_tributaries_decision_desc:0 "L'Empire Céleste est suzerain de plusieurs États tributaires qui reconnaissent notre supériorité. Si la plupart des barbares resteront étrangers à nos idéaux, d'autres tributaires s'efforcent de se rapprocher de la grandeur du Ciel. C'est le devoir de l'Empereur d'élever ceux qui nous apaisent le plus."
 vassalize_tributaries_decision_tt:0 "L'Empereur de Chine peut utiliser le Mandat pour élever un État tributaire en vassal direct."
 vassalize_tributaries_decision_ct:0 "L'Empereur de Chine ne peut plus élever les tributaires en vassaux."
