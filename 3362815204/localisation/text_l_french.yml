 schwarze_reiterDESCR:0 "Les Cavaliers Noirs (pour la couleur de leur armure) sont des cavaliers équipés chacun de deux pistolets et d'une épée, portant souvent une cuirasse pour protection. Ils furent utilisés par de nombreux États allemands aux XVIe et XVIIe siècles. Utilisant les armes à feu comme armes principales, ils rompirent avec la tradition médiévale des chevaliers toujours équipés de lances. Au combat, ils tiraient leurs pistolets sur la ligne ennemie, puis tentaient une charge et un combat au corps à corps pour mettre en déroute les soldats ennemis."
