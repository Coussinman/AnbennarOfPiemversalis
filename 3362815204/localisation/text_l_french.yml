 HEAVY_LOSSES:0 "perdirent la plupart de leurs forces"
 SOME_LOSSES:0 "subirent quelques pertes"
 NO_LOSSES:0 "furent presque indemnes"
 sought_after_bachelor:0 "Parti recherché"
 desc_sought_after_bachelor:0 "Les cours du monde considèrent notre monarque comme un parti attrayant pour le mariage."
 a_woman_scorned:0 "Femme bafouée"
 desc_a_woman_scorned:0 "L'enfer n'a pas de fureur comparable à celle d'une femme bafouée. La reine n'est guère contente de vous, et, par une étrange coïncidence, des rumeurs assez étranges et méchantes à votre sujet ont commencé à circuler dans les cours étrangères."
 GUARANTNEWDESC:0 "Souhaitez-vous proclamer une garantie pour $COUNTRY$ ? Nous serons appelés à la guerre contre tout pays qui les attaque."
 GUARANTDESC:0 "En garantissant leur indépendance, nous serons appelés à la guerre contre tout pays qui les attaque."
 WARNNEWDESC:0 "Souhaitez-vous envoyer un avertissement à $COUNTRY$ ? Cela nous appellera à la guerre s'ils attaquent l'un de nos pays voisins."
 WARNDESC:0 "Leur envoyer un avertissement nous appellera à la guerre s'ils attaquent l'un de nos voisins."
 SUPPLY_CORE:0 "Revendication :"
 UNIT_ENABLE_PATROL_NEW:0 "§YCommencer la patrouille§!"
 UNIT_DISABLE_PATROL_NEW:0 "§YArrêter la patrouille§!"
 endorse_renaissance_philosophy_title:0 "Soutenir la philosophie de la Renaissance"
 endorse_renaissance_philosophy_desc:0 "Toi, sans limite ni borne, tu peux choisir pour toi-même les limites et les bornes de ta nature. Nous t'avons placé au centre du monde afin que tu puisses contempler tout le reste du monde.'\n\n--Mirandole, Piccolo -- 'De la dignité de l'homme'"
 blooming_renaissance:0 "Renaissance florissante"
 desc_blooming_renaissance:0 "La Renaissance s'épanouit en $COUNTRY$ ! Dans tous les coins de chaque rue de chaque cité, nos citoyens quittent leurs sombres masures médiévales et émergent dans les mondes ensoleillés de la dignité humaine et de la responsabilité civique."
 support_baroque_music_title:0 "Soutenir la musique baroque"
 support_baroque_music_desc:0 "Seul le Tout-Puissant sait quel talent artistique a été gaspillé par manque d'argent, de nourriture et d'amour. Aidez les compositeurs en difficulté de $COUNTRY$ par votre mécénat, et ils vous le rendront."
 the_sound_of_music:0 "Musique baroque"
 desc_the_sound_of_music:0 "Les temps peuvent être éprouvants et difficiles, mais nos sujets trouveront toujours réconfort et consolation dans la musique qui a commencé à résonner même dans les ruelles les plus sombres de notre royaume. De Bach à Händel, $COUNTRY$ vibre au son de la musique !"
 way_of_tea:0 "La Voie du thé"
 desc_way_of_tea:0 "Dans la chaleur d'un millier de maisons de thé, notre peuple trouve repos et détente, servis avec une touche de divin et des tasses de thé fumantes."
 develop_way_of_tea_title:0 "La Voie du thé"
 develop_way_of_tea_desc:0 "Bien que le thé soit cultivé au Japon depuis au moins le IXe siècle, l'esthétique plus raffinée du Chanoyu, la Voie du thé, ne s'est pleinement développée que durant les premières parties du XVe siècle. Mi-cérémonie religieuse, mi-tradition culturelle, la Voie du thé pourrait devenir une partie intégrante de notre héritage culturel."
 develop_diwani_script_title:0 "Écriture Diwani"
 develop_diwani_script_desc:0 "Style cursif de calligraphie arabe, originaire de l'Empire ottoman des XVe et XVIe siècles, l'écriture Diwani fut ainsi nommée pour son usage prévu sur les décrets royaux émis par le divan ottoman, le cabinet de l'État ottoman. Renforçons notre règne en proclamant nos édits, et la parole de Dieu, dans les harmonies de la calligraphie."
 diwani_script:0 "L'écriture Diwani"
 desc_diwani_script:0 "Tous nos édits et décrets sont émis dans le style d'une calligraphie élaborée, et le peuple nous respecte pour cela"
 support_dutch_masters_title:0 "Âge d'or de la peinture hollandaise"
 support_dutch_masters_desc:0 "La République hollandaise, récemment calviniste, récemment indépendante, et avec de forts courants sous-jacents de pensée et philosophie humanistes, avait à la fin du XVIe siècle posé les bases philosophiques d'une rupture avec les traditions et idéaux artistiques établis de la vieille Europe catholique. Portés par la richesse provenant du commerce en développement via Amsterdam, nous pourrions aider à inaugurer un Âge d'or pour la peinture hollandaise"
 dutch_masters:0 "L'Âge d'or de la peinture hollandaise"
 desc_dutch_masters:0 "Nous soutenons financièrement les maîtres hollandais de la peinture en Hollande"
 charter_guild_of_st_luke_title:0 "Établir une guilde de Saint-Luc"
 charter_guild_of_st_luke_desc:0 "Saint Luc, le saint patron des artistes, prêtait souvent son nom aux guildes d'artistes en Europe occidentale, la plus célèbre, peut-être, à Anvers. Établir une guilde ici en $COUNTRY$ pourrait être un peu coûteux, mais le bénéfice culturel sera visible par tous. Développer la bureaucratie de la guilde renforcera également notre tradition bureaucratique native."
 guild_of_st_luke:0 "La Guilde de Saint-Luc"
 desc_guild_of_st_luke:0 "Le saint patron des artistes tient sa main sur notre pays. Les artistes de la guilde de Saint-Luc produisent des chefs-d'œuvre pour renforcer notre tradition culturelle !"
 hold_the_last_jousting_tournament_title:0 "Le dernier tournoi de joute"
 hold_the_last_jousting_tournament_desc:0 "Nous le sentons dans le vent. Bientôt notre élite équestre ne sera plus qu'un rêve souvenu, alors que la tradition chevaleresque s'éteint devant l'assaut de la modernité. Le monde change, mais pour l'instant, une dernière fois : Que les chevaliers de $COUNTRY$ chevauchent !"
 the_last_joust:0 "Le dernier tournoi de joute"
 desc_the_last_joust:0 "Bien que les chevaliers puissent encore rester une partie de notre armée pendant quelque temps, les traditions chevaleresques qu'ils ont maintenues si longtemps s'éteignent."
 NOCLAIMLESSER:0 "Vous ne pouvez pas revendiquer de trônes en tant que partenaire mineur d'une union personnelle."
 florentine_school:0 "Soutien à l'école florentine"
 desc_florentine_school:1 "L'école florentine était une école d'art italienne, peut-être plus célèbre pour son style naturaliste et ses fresques murales, née du travail d'artistes comme Donatello, Michel-Ange et Brunelleschi. [Root.GetName] soutient ces artistes, et le monde le sait."
 support_florentine_school_title:0 "Soutenir l'école florentine"
 support_florentine_school_desc:0 "En raison de notre notoriété relative, nous sommes en position de soutenir les artistes italiens de l'école florentine. Être perçus comme mécènes de l'art international aidera certainement nos efforts de propagande."
 court_byzantine_refugees_title:0 "Réfugiés byzantins"
 court_byzantine_refugees_desc:0 "Mon seigneur, Byzance est tombée aux mains des Sarrasins. Le dernier bastion de l'Empire romain, la cité de Constantin, est désormais aux mains des Turcs. Alors que la chrétienté vacille sous le choc, des réfugiés byzantins affluent vers les cités et cours d'Europe, apportant avec eux d'anciens manuscrits de savoir classique, des traités d'Aristote, Platon et Galien, et une connaissance approfondie du latin et du grec. Inviter ces réfugiés en $COUNTRY$ pourrait donner un élan considérable à nos propres efforts dans les domaines de la culture et de la science."
 byzantine_influx:0 "Afflux byzantin"
 desc_byzantine_influx:0 "Une proclamation est partie de notre pays, à travers toute l'Europe, que les enfants perdus de la cité de Constantin sont invités à chercher refuge et une nouvelle vie dans nos cités. Ils apportent avec eux une compréhension de la civilisation classique qui aide notre recherche."
 commission_epic_to_monarch_title:0 "Épopée nationale"
 commission_epic_to_monarch_desc:0 "Nos sujets se sont mis à raconter des contes et légendes sur $RANDOM_OLD_MONARCH$. La légende dit qu'à l'heure la plus sombre de $COUNTRY$, il reviendra dans notre nation et la délivrera du mal. Quelle que soit la vérité de cette affirmation, nous pourrions l'utiliser dans notre propagande."
 epic_to_monarch:0 "Épopée nationale"
 desc_epic_to_monarch:0 "Une épopée a été écrite en hommage à l'un de nos anciens rois, racontant sa vie et sa légende."
 enlightenment_movement:0 "Liberté, Égalité, Fraternité"
 desc_enlightenment_movement:0 "Comme une puissante torche, apportant la lumière de la raison même dans les coins les plus sombres de l'ancien et du nouveau monde, les Lumières balaient le monde. Avec la science, la raison, et une foi inébranlable dans le potentiel de l'humanité comme arme, elles promettent de flétrir les vieilles couronnes et croix, et de libérer l'homme. Étant le souverain éclairé qu'il est, [Root.Monarch.GetName], bien sûr, soutient cela."
 support_enlightenment_movement_title:0 "Liberté, Égalité, Fraternité"
 support_enlightenment_movement_desc:0 "Comme une puissante torche, apportant la lumière de la raison même dans les coins les plus sombres de l'ancien et du nouveau monde, les Lumières balaient le monde. Soutenir ce mouvement mènera sans doute à des avancées en science et philosophie, mais les notions du mouvement sur la liberté humaine et les droits inaliénables de l'homme pourraient causer une certaine ferveur rebelle dans notre pays."
 commedia_dellarte:0 "Commedia dell'Arte"
 desc_commedia_dellarte:0 "Originellement développée en Italie et en France, la 'Commedia dell'Arte' était une forme populaire de théâtre en Europe entre le XVIe et le XVIIIe siècle. Bien que ses origines puissent être retracées aux conventions théâtrales grecques et romaines, la Commedia dell'arte était néanmoins une innovation originale, peut-être mieux connue pour ses personnages types comme 'Arlequin' et 'Pantalon'."
 support_commedia_dellarte_title:0 "Représentations de Commedia dell'Arte"
 support_commedia_dellarte_desc:0 "Oyez, oyez ! Lâchez Pantalon, Arlequin, et tous les autres personnages types de la Commedia dell'Arte traditionnelle sur votre population sans méfiance, et regardez-les être divertis par les pitreries et les bouffonneries. Une bonne comédie peut faire oublier à quiconque pendant un moment que leur vie quotidienne se consume à trimer sous le joug de souverains tyranniques. En plus, c'est amusant !"
 military_modernization_muslim_title:0 "Modernisation militaire"
 military_modernization_muslim_desc:0 "Nous avons réussi à mettre notre vie culturelle au niveau de nos puissants voisins. Nous portons leurs vêtements, pratiquons leurs coutumes, et certains d'entre nous parlent même leurs langues. Le vrai défi, l'armée, demeure cependant."
 military_modernization_eastern_title:0 "Modernisation militaire"
 military_modernization_eastern_desc:0 "Nous avons réussi à mettre notre vie culturelle au niveau de nos puissants voisins. Nous portons leurs vêtements, pratiquons leurs coutumes, et certains d'entre nous parlent même leurs langues. Le vrai défi, l'armée, demeure cependant."
 military_modernization_western_title:0 "Modernisation militaire"
 military_modernization_western_desc:0 "Nous avons réussi à mettre notre vie culturelle au niveau de nos puissants voisins. Nous portons leurs vêtements, pratiquons leurs coutumes, et certains d'entre nous parlent même leurs langues. Le vrai défi, l'armée, demeure cependant."
 action_and_reaction:0 "Action et réaction"
 desc_action_and_reaction:0 "À chaque action correspond une réaction égale et opposée. Nous avons radicalement réformé l'une des institutions les plus fondamentales du pays, et des intérêts puissants au sein de notre royaume conspirent désormais pour défaire ces changements. Tenez bon et traversez la tempête."
 tribal_rebels_title:0 "Rebelles tribaux"
 tribal_rebels_name:0 "Tribus de $COUNTRY$"
 tribal_rebels_desc:0 "Les rebelles tribaux cherchent à établir leur propre règne à la place du nôtre, car ils perçoivent une faiblesse en nous."
 tribal_rebels_army:0 "Armée tribale"
 cossack_rebels_title:0 "Rebelles Orachav"
 cossack_rebels_name:0 "Orachav de $COUNTRY$"
