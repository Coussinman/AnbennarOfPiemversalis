 CONVERT_RULER_IRO:1 "§YConfie le commandement des armées au dirigeant§!\nCela fera de lui un général, lui permettant ainsi de commander des armées."
 CONVERT_RULER_DRO:0 "Un dirigeant commandant les armées au combat a plus de risques de périr. Cet événement peut avoir des effets néfastes, tels qu'un conseil de régence ou une position d'infériorité dans une union personnelle. De plus, sa mort sur le champ de bataille ne serait pas considérée par la population comme de bon augure."
 CONVERT_RULER_NOT_POSSIBLE_IRO:1 "Notre dirigeant a déjà été fait commandant."
 CONVERT_RULER_NOT_POSSIBLE_DRO:0 "Nous avons déjà nommé général notre dirigeant. Il ne faut pas oublier qu'un dirigeant commandant des armées au combat a plus de risques de mourir. Cet événement peut avoir des effets néfastes, tels qu'un conseil de régence ou une position d'infériorité dans une union personnelle. De plus, sa mort sur le champ de bataille ne serait pas considérée par la population comme de bon augure."
 CONVERT_RULER_NOT_POSSIBLE_2_IRO:1 "Dans notre pays, une femme peut régner mais ne peut devenir générale."
 CONVERT_RULER_NOT_POSSIBLE_2_DRO:1 "Notre pays est dirigé par une femme, mais elle ne peut pas conduire les troupes au combat sans avoir la doctrine ou la politique qui l'y autorise."
 CONVERT_RULER_NOT_POSSIBLE_3_IRO:0 "Notre pays est dirigé par un conseil de régence, aussi n'y a-t-il aucun souverain à placer à la tête des armées."
 CONVERT_RULER_NOT_POSSIBLE_3_DRO:0 "Un conseil de régence gouverne le pays, car notre souverain est toujours mineur. Nous ne pourrons pas faire de lui un général tant qu'il ne sera pas assez âgé pour commander une armée."
