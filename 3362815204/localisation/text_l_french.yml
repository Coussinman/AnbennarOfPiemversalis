 REVOKE_EXCOMMUNICATETITLE:0 "Lever l'excommunication"
 EXCOMMUNICATEREVOKEDESC:0 "Souhaitez-vous révoquer l'excommunication de $MONARCH$ ?"
 REVEXCOMMUNICATEDESC:0 "L'excommunication permet aux autres nations ravéliennes de leur déclarer la guerre sans subir les pertes normales de stabilité pour avoir la même religion ou manquer de Casus Belli."
 NOT_EXCOMMUNICATED:0 "Leur dirigeant n'est pas excommunié !"
 vassalize_mission_header:0 " "
 vassalize_mission_title:0 "Vassaliser $COUNTRY$"
 vassalize_mission_desc:0 "Nous entretenons de bonnes relations et avons de forts liens dynastiques avec $COUNTRY$, cependant, ils sont très faibles. Nous devons étendre notre protection sur eux et les faire nous reconnaître comme leur suzerain."
 GC_NAME:0 "La Grande Campagne"
 GC_DESC:0 "Nous sommes en l'an 1399 et c'est le tumulte partout. La guerre de Cent Ans fait rage à l'ouest, le conquérant Tamerlan sème la terreur à l'est. L'Empire byzantin s'accroche à quelques enclaves seulement. La gloire est là pour ceux qui peuvent saisir l'opportunité."
 FALL_OF_BYZANS_NAME:0 "La Chute de Byzance"
 FALL_OF_BYZANS_DESC:0 "L'Empire ottoman a conquis la 'Cité du Désir du Monde' et pousse déjà plus loin dans les Balkans. À l'Ouest, la grande Reconquista atteint son apogée, tandis que d'autres nations se préparent à prendre leur place sur la scène de l'histoire."
 revolutionary_empire_ruler_female:0 "Impératrice"
 increase_spices_trade_header:0 " "
 increase_spices_trade_title:0 "Augmenter notre contrôle des épices"
 increase_spices_trade_desc:0 "Nous rapportons déjà de riches cargaisons d'épices, mais notre peuple en veut plus. Maintenant nos marchands d'épices nous pressent de sécuriser encore plus de sources d'épices."
 conquer_a_port_header:0 " "
 conquer_a_port_title:0 "Obtenir un accès à la mer par $PROVINCENAME$"
 conquer_a_port_desc:0 "Notre nation enclavée rate les opportunités commerciales et les provinces coloniales. Pour accomplir notre destinée, nous devons avoir un port, de préférence $PROVINCENAME$."
