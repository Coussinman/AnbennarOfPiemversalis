 central_america:0 "Amérique centrale"
 the_baltics:0 "Les pays baltes"
 revoke_restraint_of_appeals_title:0 "Révoquer la restriction des appels"
 revoke_restraint_of_appeals_desc:0 "Révoquer la loi précédemment adoptée donnant au roi l'autorité juridique finale en toutes matières religieuses et restaurer ces droits au Haut-Recteur."
 colonial_expansion_title:0 "Expansion coloniale"
 colonial_expansion_desc:0 "Promouvoir l'expansion coloniale en introduisant un programme de réinstallation."
 agricultural_cultivation_title:0 "Culture agricole"
 agricultural_cultivation_desc:0 "Maximiser la production agricole en déplaçant l'attention des petites fermes vers l'établissement de grandes plantations."
 navigation_act_title:0 "Adopter l'acte de navigation"
 navigation_act_desc:0 "Imposer des restrictions sur l'utilisation de navires étrangers en matière de commerce et promouvoir l'utilisation de navires nationaux."
 importation_act_title:0 "Adopter l'acte d'importation"
 revocation_of_restraint_of_appeals:0 "Révocation de la restriction des appels"
 desc_revocation_of_restraint_of_appeals:0 "Le Haut-Recteur a retrouvé sa position d'autorité juridique finale en toutes matières religieuses."
