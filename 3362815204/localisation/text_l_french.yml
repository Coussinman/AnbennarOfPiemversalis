 LEDGER_LAND_DISCIPLINE:0 "Discipline terrestre"
 LEDGER_CANT_BUILD_THIS:0 "Votre niveau technologique actuel ne vous permet pas de construire ce bâtiment"
 ledger_temple:0 "Chaque province de votre empire augmente le coût que vous payez pour augmenter la stabilité. Un temple réduira ce coût chaque mois. Les meilleures provinces pour construire des temples sont celles de haute valeur éloignées de vos frontières."
 ledger_workshop:0 "Une province avec un atelier recevra une augmentation des revenus fiscaux. Divers autres modificateurs augmenteront et diminueront les revenus fiscaux d'une province ; le bonus de l'atelier est appliqué avant le modificateur supplémentaire ; il est préférable de les construire dans les provinces à hauts impôts."
 ledger_regimental_camp:0 "Les camps régimentaires augmentent à la fois les effectifs d'une province et la vitesse de recrutement des régiments. Ceux-ci sont mieux construits dans les provinces avec beaucoup d'effectifs."
 ledger_shipyard:0 "Les chantiers navals augmentent la vitesse à laquelle les navires sont construits dans une province. Mieux construits dans les provinces à haute valeur fiscale ou les provinces où vous pensez construire beaucoup de navires."
 ledger_constable:0 "Un prévôt augmente à la fois les revenus fiscaux et le mécontentement dans une province. Le bénéfice maximum est obtenu dans les provinces avec les revenus fiscaux les plus élevés. Les tribunaux réduiront l'augmentation du mécontentement causée par un prévôt et sont donc utiles à construire dans les provinces avec un prévôt. Les prévôts augmentent également le bonus des ateliers."
 ledger_courthouse:0 "Une province avec un tribunal reçoit une réduction du mécontentement local. Les tribunaux sont utiles dans toutes les provinces, mais le sont particulièrement dans les provinces à haute valeur fiscale car les augmentations du mécontentement réduisent les revenus fiscaux."
 ledger_tax_assessor:0 "Les bureaux des impôts réduisent l'inflation dans tout votre empire. Même si vous n'avez pas d'inflation, ils valent la peine d'être construits car vous pourrez frapper de la monnaie plus tard et ensuite réduire l'inflation. Les bureaux des impôts sont mieux construits dans les provinces éloignées des ennemis."
 ledger_customs_house:0 "Une douane donne une petite augmentation du revenu fiscal total d'une province. Comme l'augmentation du revenu fiscal est si faible, les douanes sont mieux construites dans les provinces avec des revenus fiscaux élevés."
 ledger_fort1:0 "Construire un fort dans une province augmentera le temps nécessaire à l'ennemi pour conquérir une province par siège. Cela donnera également plus de temps à vos armées pour réagir aux révoltes."
 IDEA_NOT_FULLFILL_PREQUES:0 "Vous ne remplissez pas les conditions préalables pour obtenir cette idée."
