 improve_reputation_mission_title:0 "Réduire la surextension !"
 improve_reputation_mission_desc:0 "Nous nous sommes étendus bien trop rapidement et avons accumulé une surextension considérable. Nous devons consolider nos acquis et œuvrer à la réduire, sous peine de faire face à de graves conséquences."
 generic_annex_vassal_mission_title:0 "Intégrer [Root.GetName] à notre pays"
 generic_annex_vassal_mission_desc:0 "[Root.GetName] est un vassal de notre pays, mais nous devons l'intégrer plus étroitement à notre société. Une annexion diplomatique serait notre meilleure option."
 annex_minor_mission_title:0 "Rayer [Root.GetName] de la carte !"
 annex_minor_mission_desc:0 "Ce minuscule État voisin a l'outrecuidance de prétendre à l'indépendance. Cela doit être rectifié immédiatement. Annexez $COUNTRY$ et rayez-les de la carte."
 improve_relations_mission_title:0 "Améliorer les relations avec $COUNTRY$"
 improve_relations_mission_desc:0 "Nos relations avec nos voisins se sont trop dégradées, nous devons rectifier cela et réparer nos liens."
 get_an_alliance_mission_title:0 "Former une alliance avec $COUNTRY$"
 get_an_alliance_mission_desc:0 "Nous devons former davantage d'alliances, et une alliance avec $COUNTRY$ devrait nous être bénéfique."
