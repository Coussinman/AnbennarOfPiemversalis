 cultural_shift_title:0 "Accepter le changement culturel"
 cultural_shift_desc:0 "L'identité culturelle de l'élite dirigeante est en train de changer, car notre héritage $PRIMARY_CULTURE$ perd progressivement du terrain face à la langue et aux traditions de $CAPITAL$."
 scandinavian_nation_title:0 "Former la nation scandinave"
 scandinavian_nation_desc:0 "Depuis des siècles innombrables, les royaumes du Nord ont été divisés et enfermés dans des luttes de pouvoir intestines. Les tentatives précédentes d'union ont finalement échoué, pour le plus grand plaisir de leurs voisins européens. Même ainsi, la vision d'une union durable reste une possibilité tentante..."
 imperial_government:0 "Empire"
 imperial_government_ruler:0 "Empereur"
 imperial_government_ruler_female:0 "Impératrice"
 ON_MISSION:0 "A la mission "
 establish_spanish_carribean_header:0 " "
 establish_spanish_carribean_title:0 "Établir une présence dans les Caraïbes"
 establish_spanish_carribean_desc:0 "Les natifs des îles ici aux Indes sont à la fois païens et possèdent de l'or, c'est notre devoir de leur apporter la lumière de la foi et d'enrichir la couronne."
 discover_spanish_main_header:0 " "
 discover_spanish_main_title:0 "Découvrir le continent !"
 discover_spanish_main_desc:0 "Nos explorateurs n'ont pas encore trouvé les Indes, nous croyons que d'immenses et riches terres se trouvent au sud et à l'ouest. Nous devons les trouver pour la gloire de notre pays."
 establish_spanish_main_header:0 " "
 establish_spanish_main_title:0 "Établir des colonies sur le continent !"
 establish_spanish_main_desc:0 "Nous avons découvert de riches terres avec de nouvelles opportunités, nos explorateurs ont entendu des récits selon lesquels le légendaire El Dorado se trouverait quelque part ici, nous devons donc revendiquer ces terres."
 the_spanish_main:0 "Les Indes occidentales espagnoles"
 italian_region:0 "Région italienne"
 the_low_countries:0 "Les Pays-Bas"
 spanish_netherlands:0 "Pays-Bas espagnols"
 establish_spanish_la_plata_header:0 " "
 establish_spanish_la_plata_title:0 "Coloniser le continent sud"
 establish_spanish_la_plata_desc:0 "Nous avons découvert la région de La Plata, elle a de riches terres et un port naturel parfait. Nous devons revendiquer ces terres pour la couronne."
 discover_la_plata_header:0 " "
 discover_la_plata_title:0 "Découvrir La Plata"
 discover_la_plata_desc:0 "Nos navigateurs ont entendu des récits de riches terres quelque part au sud. Nous devons trouver ces terres avant les autres."
 conquer_zapotecs_header:0 " "
 conquer_zapotecs_title:0 "Les sauvages Zapotèques doivent être détruits !"
 conquer_zapotecs_desc:0 "Les Zapotèques sont un groupe de brutes non civilisées qui pratiquent de vils rituels comme le cannibalisme et le sacrifice d'enfants, nous devons leur apporter la lumière de la civilisation et de l'inquisition."
 no_surrender_to_the_dutch_header:0 " "
 no_surrender_to_the_dutch_title:0 "Pas de concessions aux Néerlandais"
 no_surrender_to_the_dutch_desc:0 "Les Néerlandais continuent de mener une guerre illégale contre nos territoires aux Pays-Bas, nous devons tenir ferme contre leurs avancées et défendre nos territoires loyaux."
 bring_the_dutch_back_to_catholisism_header:0 " "
 bring_the_dutch_back_to_catholisism_title:0 "Ramener les Néerlandais à la foi catholique"
 bring_the_dutch_back_to_catholisism_desc:0 "Les Néerlandais continuent de s'accrocher à leurs croyances hérétiques, nous devons les ramener dans le sein aimant de la seule vraie église. Par l'épée si nécessaire."
 spanish_netherlands_should_be_catholic_header:0 " "
 spanish_netherlands_should_be_catholic_title:0 "Arrêter le protestantisme aux Pays-Bas"
 spanish_netherlands_should_be_catholic_desc:0 "Des rapports nous sont parvenus que nos sujets dans nos provinces aux Pays-Bas se sont éloignés de notre sainte église. Notre Inquisiteur Général croit qu'ils s'attendront à ce que l'Inquisition les persuade de revenir à la vraie foi."
 castille_aragon_relations_header:0 "Nos nobles suggèrent"
 castille_aragon_relations_title:0 "Bonnes relations avec l'Aragon"
 castille_aragon_relations_desc:0 "Nos voisins de l'est parlent la même langue et devraient être comme des frères pour nous. Leur famille royale devrait avoir des liens profonds avec la nôtre, et nous devons entretenir de bonnes relations."
 spanish_portugese_relations_header:0 "Nos nobles suggèrent"
 spanish_portugese_relations_title:0 "Bonnes relations avec le Portugal"
 spanish_portugese_relations_desc:0 "Nos voisins de l'ouest parlent la même langue et devraient être comme des frères pour nous. Leur famille royale devrait avoir des liens profonds avec la nôtre, et nous devons entretenir de bonnes relations."
 mediterranean_christian_fleet_header:0 " "
 mediterranean_christian_fleet_title:0 "Détruire la domination navale turque"
 mediterranean_christian_fleet_desc:0 "L'infidèle Turc a créé une flotte massive, si cela continue sans contrôle, la Méditerranée tombera sous sa domination. Nous devons construire plus de galères pour que l'Espagne puisse remplir son rôle désigné par Dieu de défenseur de la chrétienté."
 no_territory_to_france_header:0 " "
 no_territory_to_france_title:0 "Arrêter les Français"
 no_territory_to_france_desc:0 "Aucune terre espagnole ne devrait jamais être gouvernée depuis Paris. Nous ne déposerons pas nos armes tant que chaque province n'aura pas été récupérée des Français."
 THREATENEDBY:0 "Se sent menacé par $LIST$."
 recover_negative_stability_header:0 " "
 recover_negative_stability_title:0 "Rétablir la stabilité négative"
 recover_negative_stability_desc:0 "La confiance en notre gouvernement est faible et le peuple se sent rebelle. Rétablissons cela pour ramener la paix chez nous."
 improve_economical_mismanagement_header:0 " "
 improve_economical_mismanagement_title:0 "Rembourser nos emprunts"
 improve_economical_mismanagement_desc:0 "Nous avons vécu au-dessus de nos moyens et accumulé d'énormes dettes, pour le bien de la nation nous devrions mettre nos finances sur une base plus solide."
 recover_from_warexhaustion_header:0 " "
 recover_from_warexhaustion_title:0 "Nous devons nous remettre des guerres"
 recover_from_warexhaustion_desc:0 "Une longue période de guerre a laissé notre nation épuisée, le peuple aspire à la paix. Laissons la nation profiter des bienfaits de la paix."
 buildup_manpower_reserves_header:0 " "
 buildup_manpower_reserves_title:0 "Nos réserves d'effectifs doivent se reconstituer."
 buildup_manpower_reserves_desc:0 "Les fermes sont abandonnées, car tous les jeunes hommes ont été enrôlés dans nos armées. Relâchons le recrutement et laissons le pays se développer."
 german_region:0 "Région allemande"
 scandinavian_region:0 "Région scandinave"
 EXCOM_SAME_RULER:0 "Nous ne pouvons pas excommunier notre propre dirigeant."
 reclaim_mecca_header:0 " "
 reclaim_mecca_title:0 "Reprendre La Mecque aux infidèles"
 reclaim_mecca_desc:0 "Notre cité la plus sainte a été conquise par l'infidèle. Ceux qui se sont soumis à la volonté d'Allah crient pour sa libération."
 IS_IN_COLONIAL_RANGE:0 "$NAME$ est accessible par les colons §Y$ADJ$§!."
