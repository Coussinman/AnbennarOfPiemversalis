 restless_kami_desc:0 "Daimyo, les kami de notre Han natal sont devenus agités en raison du manque de stabilité de notre royaume et de notre insistance à maintenir notre attention nationale loin de notre capitale. Déplacez l'attention nationale vers la capitale, et les esprits nous seront à nouveau favorables."
