 plutocratic_administration_desc:0 "Dans les pays économiquement dépendants du commerce, la probabilité que les marchands exigent reconnaissance politique et pouvoir augmente. Avec la capitale de notre pays située dans un nœud commercial lucratif, et avec une classe marchande établie en place, nous pouvons former une ligue commerciale pour mieux servir les intérêts économiques de notre nation."
