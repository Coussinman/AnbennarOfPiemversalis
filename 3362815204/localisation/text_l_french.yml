 construct_grand_fleet_header:0 "Notre fierté nationale exige que nous"
 construct_grand_fleet_title:0 "Construire une grande flotte"
 construct_grand_fleet_desc:0 "En tant que puissance navale, nous devons avoir une flotte assez grande pour défendre nos côtes. Nous devons construire plus de vaisseaux de ligne."
 rule_the_seas_header:0 "Notre fierté nationale exige que nous"
 rule_the_seas_title:0 "Dominer les mers"
 rule_the_seas_desc:0 "Aucune autre nation ne devrait avoir une flotte plus grande que la nôtre ! Nous devons augmenter la taille de notre flotte jusqu'à ce que nous ayons le plus de vaisseaux de ligne."
 iberian_peninsula:0 "Péninsule ibérique"
 finish_reconquista_header:0 " "
 finish_reconquista_title:0 "Achever la Reconquista !"
 finish_reconquista_desc:0 "Tant qu'il y aura encore une cité en Hispanie gouvernée par les infidèles, nous ne pourrons pas arrêter notre sainte mission ! Nous devons libérer toute la péninsule ibérique des Maures !"
 no_truce_with_the_moors_header:0 " "
 no_truce_with_the_moors_title:0 "Pas de trêve avec le Maure"
 no_truce_with_the_moors_desc:0 "C'est notre sainte mission de chasser les Maures d'Hispanie, et être en paix avec eux est un affront à Dieu. Nous devons déclarer la guerre à Grenade immédiatement, sinon nous serons condamnés comme pécheurs."
 spain_must_be_christian_header:0 " "
 spain_must_be_christian_title:0 "L'Espagne doit être chrétienne"
 spain_must_be_christian_desc:0 "Il y a encore des Maures suivant la foi musulmane en Hispanie. Ils doivent être convertis ou chassés, Dieu n'acceptera rien de moins. Ces nouveaux convertis contribueront volontiers à notre Sainte Église."
 continue_reconquista_header:0 " "
 continue_reconquista_title:0 "Poursuivre la Reconquista"
 continue_reconquista_desc:0 "Nous devons sécuriser l'Hispanie en établissant une présence de l'autre côté de la mer au sud. Quelques cités chrétiennes là-bas devraient constituer une protection sûre pour notre royaume."
 the_carribean:0 "Les Caraïbes"
 spain_discover_america_header:0 "Nouvelles possibilités"
 spain_discover_america_title:0 "Nous pouvons aller vers l'ouest jusqu'aux Indes"
 spain_discover_america_desc:0 "Bien qu'il y ait de vastes étendues d'océan, les vents favorisent le voyage vers l'ouest. Nos navigateurs croient qu'ils peuvent atteindre les Indes, s'ils reçoivent le soutien approprié."
 conquer_incas_header:0 " "
 conquer_incas_title:0 "Les Incas ont de l'or !"
 conquer_incas_desc:0 "Là-bas se trouve le Pérou avec ses richesses.\nIci, le Panama et sa pauvreté.\nChoisissez, chaque homme, ce qui sied le mieux à un brave Castillan.\n— Francisco Pizarro"
 conquer_aztecs_header:0 " "
 conquer_aztecs_title:0 "Les Aztèques doivent être sauvés !"
 conquer_aztecs_desc:0 "Nos prêtres s'inquiètent du salut éternel des Aztèques, ils doivent être amenés à adorer notre Seigneur et Sauveur. Non nobis, Domine, Domine, non nobis, Domine. Sed nomini, sed nomini, tuo da gloriam."
 construct_shipyard_header:0 "Notre marine a besoin que nous"
 construct_shipyard_title:0 "Construire un chantier naval"
 construct_shipyard_desc:0 "Notre nation manque d'un chantier naval approprié, où nous pouvons construire les flottes dont nous avons tant besoin. Nous avons maintenant la technologie pour en construire un, et nous devrions mettre ce savoir en action."
 RIVALSWITH:0 "Considère $LIST$ comme des rivaux naturels."
