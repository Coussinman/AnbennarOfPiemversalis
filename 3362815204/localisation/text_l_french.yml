 ha_xantican_warriorDESCR:0 "Notre nouvelle 'arme à feu' tire son nom de Xantico, déesse du feu et des volcans. Armés de Xantis, nos guerriers sont plus efficaces que jamais."
 ha_reformed_xantican_warriorDESCR:0 "L'expérience avec les Xantis nous a conduits à la conclusion qu'un plus grand volume de feu pourrait être obtenu en ayant plusieurs rangées de guerriers Xanti qui tirent leurs armes puis reculent, permettant au rang suivant de tirer pendant que le précédent recharge."
 ha_xiuhtecuhtli_soldierDESCR:0 "Xiuhtecuhtli, seigneur des volcans, est l'homonyme de nos armes à feu plus grandes et plus puissantes. Avec une plus grande portée et une plus grande puissance de frappe, elle est bien plus mortelle que le Xanti."
 ha_xiuhtecuhtlian_infantryDESCR:0 "Entraînée à mieux utiliser la portée du Xiuhtecuhtli, l'infanterie Xiuhtecuhtlienne est maîtresse de la guerre à distance."
 ha_xolotiDESCR:0 "Une révolution dans la conception des armes à feu a eu lieu. Contrairement aux anciens modèles, qui utilisaient une mèche allumée pour tirer, le Xoloti utilise un percuteur mécanique tenant un morceau d'obsidienne pour créer une étincelle qui déclenche l'arme. Plus rapide à recharger et moins sujet aux ratés, il n'est pas surprenant que cette arme tire son nom de Xolotl, seigneur de la foudre et de la mort."
 ha_foreign_influenced_infantryDESCR:0 "Bien que l'invention aztèque des armes à feu ait changé la guerre pour toujours, elles sont désormais largement utilisées dans le monde entier par de nombreuses nations. En étudiant les tactiques et les forces d'autres nations et en incorporant les meilleures parties dans nos propres forces armées, il devrait être possible de toutes les surpasser."
 ha_reformed_influenced_infantryDESCR:0 "D'autres contacts et expériences avec des forces armées étrangères nous ont conduits à la conclusion que notre armée a été trop préoccupée par le feu offensif. L'entraînement futur mettra davantage l'accent sur la transition rapide entre des formations dispersées qui peuvent éviter le feu à distance et des formations denses qui peuvent engager le combat au corps à corps quand nécessaire."
 ha_reformed_xolotiDESCR:0 "Les tactiques du Xoloti réformé sont un mélange parfait d'idéaux locaux et étrangers, plus grand que la somme de leurs parties. Bien que le feu massif de Xoloti reste leur tactique préférée, le combat au corps à corps ne leur fait pas peur non plus."
 high_american_horsemenDESCR:0 "L'arrivée des chevaux suite au contact avec Cannor a conduit à une adoption limitée de leur utilisation dans la guerre."
 high_american_rifle_cavalryDESCR:0 "Des versions plus petites et plus légères du Xiuhtecuhtli donnent à ces cavaliers la capacité de dévaster facilement les adversaires armés pour le corps à corps."
 high_american_hussarDESCR:0 "Cavalerie légère spécialisée dans les raids et les tactiques de harcèlement."
 high_american_swarmDESCR:0 "La cavalerie d'essaim est une cavalerie en ordre dispersé armée de Xoloti légers qui utilise des tactiques de feu de harcèlement pour désorganiser l'ennemi avant de charger. Leur ordre dispersé les rend moins vulnérables au feu ennemi."
 high_american_dragoonDESCR:0 "Le dragon américain est armé d'épées et de Xoloti de taille normale. Bien qu'ils puissent engager le combat au corps à corps à cheval, ils préfèrent de loin mettre pied à terre et prendre l'ennemi sous leur feu."
