 house_of_trade_title:0 "Établir une maison de commerce"
 house_of_trade_desc:0 "Minimiser la corruption et la contrebande en établissant une agence gouvernementale qui contrôlera tout le commerce colonial et la colonisation en matière de taxes, de routes commerciales et de droit commercial."
 mining_act_title:0 "Adopter l'acte minier"
 mining_act_desc:0 "Augmenter l'efficacité en permettant aux entreprises privées de gérer tous les aspects de l'exploitation minière sans aucune implication gouvernementale, sauf en ce qui concerne la taxation bien sûr."
 enlist_privateers_title:0 "Engager des corsaires"
 enlist_privateers_desc:0 "Mandater des corsaires pour perturber le commerce étranger en leur permettant de passer au-delà de nos frontières nationales à la recherche de navires ennemis ou de navires appartenant à d'autres nations considérées comme non fiables."
 naval_convoy_system_title:0 "Établir un système de convois navals"
 naval_convoy_system_desc:0 "Adopter un système de convois pour les navires transportant de l'or et d'autres marchandises exotiques de nos colonies pour empêcher les pirates et les corsaires de perturber notre commerce."
 colonial_restrictions_title:0 "Restrictions coloniales"
 colonial_restrictions_desc:0 "Augmenter le contrôle sur vos colonies en imposant des règles strictes en matière de commerce et de production."
 anti_piracy_act_title:0 "Adopter l'acte anti-piraterie"
 anti_piracy_act_desc:0 "Augmenter sévèrement les peines pour l'acte de piraterie afin de résoudre les problèmes toujours croissants qu'il cause."
 land_recruiting_act_title:0 "Adopter l'acte de recrutement"
 land_recruiting_act_desc:0 "Un acte de recrutement obligerait les hommes valides sans aucun moyen de revenu à s'enrôler pour le service et augmenterait ainsi considérablement le nombre de régiments."
