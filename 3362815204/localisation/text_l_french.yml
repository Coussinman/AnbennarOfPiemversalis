 tribal_succession_crisis:0 "Crise de succession tribale"
 desc_tribal_succession_crisis:0 "Notre tribu gouverne une vaste région et c'était tout simplement trop grand pour que notre chef soit partout. De puissants sous-chefs ont émergé dans certaines zones et estiment maintenant qu'ils sont des prétendants au trône."
 recover_abysmal_prestige_title:0 "Rétablir un prestige abyssal"
 recover_abysmal_prestige_desc:0 "Notre royaume est tombé si bas que même les rats nient nous avoir jamais visités. Nous devons rehausser notre pays aux yeux du monde pour pouvoir marcher la tête haute à nouveau."
 improve_prestige_title:0 "Améliorer notre prestige !"
 improve_prestige_desc:0 "Notre État n'est pas très prestigieux et en tant que tel, les pays qui devraient nous admirer nous méprisent. Nous devons faire ce qu'il faut pour nous restaurer à notre position légitime."
