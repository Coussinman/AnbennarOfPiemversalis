 halberd_infantry:0 "Infanterie de hallebardiers"
 halberd_infantryDESCR:0 "Unités d'infanterie équipées de hallebardes, des hampes surmontées de fers de hache et de pointes. Les hallebardes entrèrent en usage régulier aux XIVe et XVe siècles et furent principalement développées pour combattre plus efficacement les troupes lourdement armurées."
 chevauchee:0 "Chevauchée"
 chevaucheeDESCR:0 "La chevauchée était composée de petits groupes de cavalerie légère principalement utilisés pour les raids et le pillage. Cette tactique fut employée avec succès durant la Reconquista et la guerre de Cent Ans."
 bardiche_infantry:0 "Infanterie de bardichiers"
 bardiche_infantryDESCR:0 "Unités d'infanterie équipées de longues haches d'armes, les 'bardiches', de tailles et formes variées, couramment employées par les pays d'Europe orientale."
 druzhina_cavalry:0 "Cavalerie de drujina"
 druzhina_cavalryDESCR:0 "Unités de cavalerie équipées de haches de combat qui formaient le cœur de nombreuses armées d'Europe orientale. En temps de paix, les drujinas servaient le plus souvent de gardes du corps ou se chargeaient de la collecte des tributs."
 muslim_cavalry_archers:0 "Archers à cheval musulmans"
 muslim_cavalry_archersDESCR:0 "Archers montés légers et rapides souvent déployés contre les chevaliers cavaliers bien plus lents et lourdement équipés."
