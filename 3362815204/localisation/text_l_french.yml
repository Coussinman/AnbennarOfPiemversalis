 noreligion:0 "Aucune religion"
 noreligion_religion_desc:0 "Cette région n'a pas de population et donc pas de religion."
 animism_religion_desc:1 "L'animisme est la croyance que le monde est habité par de nombreux êtres spirituels surnaturels, sans séparation entre les mondes profane et spirituel. Les esprits peuvent habiter tout, des montagnes à la foudre, selon la localisation des fidèles.\nDans Anbennar, la religion animiste est utilisée comme étiquette pour un large éventail de croyances, d'Aelantir à Sarhal ou Insyaa."
 norse_pagan_reformed_religion_desc:0 "La religion nordique est le système de croyances polythéiste traditionnel des peuples scandinaves.\nEn 1444, la religion nordique avait disparu depuis longtemps et n'existe dans aucune province ni aucun pays."
 jewish_religion_desc:1 "La plus ancienne religion abrahamique du jeu, le judaïsme s'appuie sur la Torah et les traditions et écritures du peuple juif remontant à plus de 3 000 ans.\nAu début du jeu, la foi juive est une foi minoritaire dans la plupart du monde et n'existe que dans les deux provinces de Semien et Dembiya en Éthiopie."
 zoroastrian_religion_desc:1 "La religion zoroastrienne est la foi traditionnelle des peuples iraniens et de l'ancien Empire perse. Les zoroastriens sont monothéistes et suivent les enseignements du prophète Zoroastre.\nAu début du jeu, le zoroastrisme est en déclin depuis des siècles après la conquête islamique de l'Iran et, à part une concentration autour de la province de Yazd, ils n'existent qu'en tant que minorités en Inde et en Perse, non représentés dans le jeu."
 ibadi_religion_desc:0 "L'ibadisme est revendiqué par ses adeptes comme étant plus ancien que l'islam sunnite et chiite, mais est loin d'être aussi populaire. Les ibadites insistent sur une adhésion stricte à une interprétation de l'islam et de la charia qu'ils considèrent comme plus ancienne et plus orthodoxe.\nDans le jeu, les ibadites n'existent en majorité qu'à Oman et autour de l'oasis de Mzab en Afrique du Nord."
 sikhism_religion_desc:0 "Le sikhisme est la foi fondée par Guru Nanak au tournant du XVIe siècle au Pendjab. Religion monothéiste, le sikhisme est né dans une région où l'islam et l'hindouisme se mêlent, mais est à bien des égards différent des deux.\nAucune province ni pays ne commence avec la religion sikh dans le jeu, mais elle apparaîtra probablement quelques décennies après le début."
 buddhism_religion_desc:1 "Comme toutes les branches bouddhistes, le Theravada découle des enseignements de Gautama Bouddha au Ve siècle avant notre ère. Les adeptes du bouddhisme Theravada s'appuient sur les Canons Pali pour les conseils religieux et juridiques, et l'accent est mis sur les devoirs monastiques et l'atteinte du statut d'Arhat ou l'illumination.\nDans le jeu, le bouddhisme Theravada est principalement pratiqué au Sri Lanka et en Asie du Sud-Est."
 vajrayana_religion_desc:1 "Également connu sous le nom de bouddhisme tantrique ou même lamaïsme, le Vajrayana est une branche du bouddhisme où l'objectif des adeptes est de devenir un Bodhisattva par l'utilisation de techniques tantriques. On croit que l'illumination ne peut être atteinte simplement par l'étude solitaire, mais doit être enseignée par un maître.\nDans le jeu, le bouddhisme Vajrayana est principalement pratiqué au Tibet et dans une certaine mesure dans les steppes d'Asie du Nord."
 mahayana_religion_desc:1 "Le Mahayana est la branche la plus largement pratiquée du bouddhisme. L'objectif de ses adeptes est d'atteindre l'illumination, voire la bouddhéité.\nDans le jeu, seul le Dai Viet commence en tant que bouddhiste Mahayana car de nombreux pays où il était dominant sont plutôt classés comme confucéens."
 catholic_religion_desc:1 "Le Ravélianisme est le nom d'une tradition chrétienne enracinée dans l'ancien rite latin qui reconnaît le Haut-Recteur comme chef de la chrétienté.\nEn 1444, le Ravélianisme est l'Église chrétienne dominante en Europe occidentale et septentrionale, mais sera probablement fragmenté par le protestantisme et le réformisme durant la Réforme."
 confucianism_religion_desc:1 "Le confucianisme est le terme désignant les philosophies du philosophe Confucius du Ve siècle avant notre ère, mettant l'accent sur le développement personnel et l'importance du bon gouvernement.\nDans le jeu, la Chine et la Corée commencent comme pays confucéens, avec une certaine propagation parmi les États Jurchen en Mandchourie."
 hinduism_religion_desc:1 "L'hindouisme est le terme désignant un large éventail de traditions polythéistes indiennes avec un panthéon commun.\nL'une des plus anciennes religions du jeu, l'hindouisme existe principalement en Inde et dans certaines parties de l'Asie du Sud-Est où il a perdu du terrain face au bouddhisme et à l'islam."
 orthodox_religion_desc:1 "La tradition chrétienne orthodoxe trouve ses racines dans le rite grec et se considère comme plus proche des idéaux chrétiens originels que le Ravélianisme. Les Églises orthodoxes rejettent l'idée du Haut-Recteur et sont au contraire divisées en plusieurs Églises présidées par des patriarches.\nDans le jeu, une grande partie de l'Europe de l'Est est de religion orthodoxe."
 protestant_religion_desc:1 "Le protestantisme couvre un large éventail de traditions religieuses commençant par les enseignements de Martin Luther durant la Réforme. Ils réagissent contre plusieurs conventions qui se sont développées au fil du temps dans l'Église ravélienne et contre l'idée même d'un recteur.\nDans le jeu, le protestantisme couvre principalement les pays inspirés des enseignements de Luther et qui ont formé des Églises d'État."
 reformed_religion_desc:0 "Le réformisme couvre un large éventail de traditions religieuses inspirées par des hommes comme Jean Calvin ou John Knox. Apparaissant généralement plus tard que les religions classées comme protestantes, la religion réformée rejette également l'autorité rectorale et veut revenir aux règles des Écritures, mais contrairement aux protestants, elle adopte plusieurs idées perçues comme plus radicales, comme la prédestination et l'iconoclasme, et ne formera pas d'Églises d'État."
 shamanism_religion_desc:1 "Le fétichisme couvre un très large éventail de religions indigènes africaines. Ces religions présentent souvent une vénération des ancêtres, l'usage de la magie et de la médecine traditionnelle.\nDans le jeu, la majeure partie de l'Afrique est classée comme fétichiste."
 shiite_religion_desc:1 "Les musulmans chiites soutiennent que le successeur légitime du prophète Mahomet en tant que calife et imam était son cousin et gendre Ali. Les chiites croient qu'un certain nombre d'imams ont succédé à Ali et attendent toujours la venue de son successeur final.\nDans le jeu, l'islam chiite est présent en Iran, au Yémen et comme religion minoritaire dans certains sultanats indiens."
 shinto_religion_desc:1 "Le shintoïsme est l'ancienne religion ethnique du Japon qui, au fil des siècles, en est venue à coexister avec le confucianisme et le bouddhisme sur les îles japonaises.\nDans le jeu, tout le Japon commence shintoïste pour signifier le mélange particulier de bouddhisme, de shintoïsme et d'autres traditions du peuple japonais."
 sunni_religion_desc:1 "L'islam sunnite soutient que le successeur légitime du prophète Mahomet était son beau-père Abu Bakr.\nEn tant que religion de la majorité des musulmans du monde, l'islam sunnite est présent du Maroc à l'Indonésie et est l'une des plus grandes religions du jeu."
 totemism_religion_desc:1 "La croyance totémiste enseigne que chaque individu a une parenté spirituelle avec un animal, le totem. Ceux qui partagent un animal totem forment des clans et se considèrent comme une famille.\nDans le jeu, le totémisme est la religion d'État de tous les États autochtones d'Amérique du Nord et est présent dans la majeure partie du continent nord-américain."
 coptic_religion_desc:1 "Le christianisme copte est une branche de la chrétienté qui suit le rite alexandrin et répond au patriarche d'Alexandrie.\nAvec la chute de l'Égypte aux mains des musulmans il y a des centaines d'années, le patriarche est contrôlé par un État non chrétien, la religion copte ne survivant comme foi majoritaire qu'en Éthiopie et en Nubie."
 tengri_pagan_reformed_religion_desc:1 "Tengri est la divinité principale de l'une des plus anciennes religions chamaniques turques ou mongoles.\nDans le jeu, cette religion couvre une grande variété de chamanismes sibériens et mandchous pratiqués par les États qui commencent dans le nord de Haless."
 inti_religion_desc:0 "La religion Inti couvre un large éventail de fois andines disparates avec de nombreuses caractéristiques communes. Inti est le nom du dieu solaire que l'empire inca a promu au-dessus de tous les autres Huacas locaux.\nDans le jeu, la majeure partie des Andes commence avec la religion Inti."
 nahuatl_religion_desc:1 "La religion Nahuatl est un ensemble de traditions polythéistes mésoaméricaines. Bien que le panthéon et de nombreux concepts soient assez similaires à la religion maya, les Nahuas ou Aztèques accordent une importance bien plus grande à la nécessité de sacrifices humains pour survivre à chaque nouveau cycle cosmique.\nDans le jeu, la majeure partie de la région autour du Mexique central moderne commence avec la religion Nahuatl."
 mesoamerican_religion_religion_desc:1 "La religion maya couvre un ensemble de traditions polythéistes mésoaméricaines héritées des anciennes civilisations mayas. Bien que les noms diffèrent, le panthéon et de nombreuses traditions sont assez similaires à la religion Nahuatl.\nDans le jeu, la péninsule du Yucatan et les anciennes terres de la Ligue de Mayapan commencent avec la religion maya."
 chinaware:0 "Porcelaine"
 chinawareDESC:0 "La porcelaine représente divers produits exotiques tels que les céramiques et les tapis. Originaires des cités le long de la Kharunyana, ces produits de luxe de grande valeur commandent un prix élevé sur le marché et sont également désignés par le raccourci : Yana."
 cloth:0 "Tissu"
 clothDESC:0 "Le tissu représente les diverses étoffes et vêtements fabriqués à partir de laine et de lin. Plus tard, le coton, importé du Rahen et d'Aelantir, devint un matériau majeur pour le tissu."
 coffee:0 "Café"
 coffeeDESC:0 "Le café fut découvert à Sarhal et la culture du café eut d'abord lieu dans le sud du Bulwar. Depuis le Salahad, le café se répandit au Businor au XVIIe siècle, puis fut introduit dans le reste de Cannor."
 copper:0 "Cuivre"
 copperDESC:0 "Le cuivre inclut également d'autres métaux non ferreux comme le plomb et l'étain. Le cuivre était le composant principal du bronze et était essentiel dans la production précoce des canons."
 cotton:0 "Coton"
 cottonDESC:0 "Le coton était originaire du centre de Haless mais ne fut pas largement utilisé à Cannor avant son introduction dans les colonies aelantiriennes et son utilisation comme complément ou substitut bon marché mais de qualité à la laine dans l'industrie vestimentaire de la fin du XVIIIe siècle."
 fish:0 "Poisson"
 fishDESC:0 "Le poisson était l'un des aliments les plus basiques pour la population cannorienne à cette époque, car la viande était plus qu'un luxe pour la grande majorité. Les pêcheurs fournissaient également le vivier de base pour le recrutement des marines marchandes et militaires de la plupart des nations."
 fur:0 "Fourrure"
 furDESC:0 "Les fourrures étaient l'un des éléments de base des vêtements de haute qualité et chauds. Les peaux de toutes sortes d'animaux étaient fournies initialement depuis la Gérudie et la Frontière Alénique, mais de plus en plus depuis le nord d'Aelantir où les castors seraient le prix de choix au moins jusqu'à la fin du milieu du XVIIIe siècle."
 gold:0 "Or"
 goldDESC:0 "L'or et l'argent étaient la base de toutes les monnaies officielles à Cannor. Les grandes mines d'or et d'argent d'Aelantir centrale et méridionale mettraient fin à la grande crise monétaire qui avait frappé Cannor le siècle précédent. Cependant, un usage malavisé de cette grande richesse pourrait mener à l'inflation et à la ruine."
 grain:0 "Céréales"
 grainDESC:0 "Les céréales représentent les denrées alimentaires végétales qui constituaient le régime de base des humains et des animaux. Leur manque menait toujours à des révoltes et des émeutes. D'autres céréales et denrées végétales seraient plus tard complétées par les tomates, le maïs et même les pommes de terre d'Aelantir, offrant un choix plus large tant en alimentation qu'en variétés de production agricole."
 iron:0 "Fer"
 ironDESC:0 "Le fer représente non seulement le fer, mais aussi d'autres métaux ferreux et la production d'alliages comme l'acier. Le fer formait la base de l'industrie métallurgique et était largement utilisé dans la production d'armes et d'autres équipements militaires."
 ivory:0 "Ivoire"
 ivoryDESC:0 "L'ivoire était l'une des principales exportations de Sarhal en dehors des esclaves. Il était très recherché par les Cannoriens pour son utilisation dans divers produits manufacturés tels que la coutellerie, les cadeaux, les petites œuvres d'art, le mobilier, etc."
 naval_supplies:0 "Fournitures navales"
 naval_suppliesDESC:0 "Les fournitures navales représentent tout ce qui est nécessaire à la construction navale, du bois de base au goudron, aux cordages, au lin, aux voiles et à divers autres matériaux. La Gérudie était initialement le principal fournisseur jusqu'à ce que le nord d'Aelantir devienne une source alternative d'approvisionnement au début du XVIIIe siècle. L'expansion coloniale vers Aelantir visait en partie à sécuriser l'approvisionnement de ces biens vitaux."
 salt:0 "Sel"
 saltDESC:0 "Le sel est essentiel à la vie humaine. De plus, c'était le moyen le plus courant de conserver les aliments pour les longs mois d'hiver. Il était soit minéral, extrait des mines de Cannor central, soit naturel, issu de la production de marais salants par évaporation le long des côtes ensoleillées."
 slaves:0 "Esclaves"
 slavesDESC:0 "Les esclaves étaient une marchandise depuis l'Antiquité, mais la demande augmenta fortement à la fin du XVIe siècle lorsque les esclaves offrirent l'une des sources de main-d'œuvre les moins chères pour les plantations cannoriennes à Aelantir."
 spices:0 "Épices"
 spicesDESC:0 "Les épices étaient connues à Cannor depuis les temps anciens, principalement pour leur valeur médicinale et leur capacité à améliorer le goût des aliments. Le poivre, le gingembre, la noix de muscade, le piment, la cannelle, etc. venaient en partie de Sarhal mais surtout du Rahen et de Haless, pour être échangés à Koroshesh ou aux autres terminus des grandes routes caravanières. Le désir cannorien d'un approvisionnement moins cher et plus direct constituait la motivation principale des tout premiers voyages de découverte vers l'ouest."
 sugar:0 "Sucre"
 sugarDESC:0 "Le sucre était utilisé non seulement comme édulcorant mais aussi pour la conservation des aliments. La canne à sucre était le seul moyen connu d'obtenir du sucre à cette époque et avait été cultivée initialement dans certaines îles divenhali. Mais le système de plantation intensif en main-d'œuvre à Aelantir, en particulier dans les Îles Ruinées, déplacerait bientôt les principales sources de production outre-mer."
 tea:0 "Thé"
 teaDESC:0 "Le thé était une boisson de luxe importante produite principalement au Yanshen et à Aelantir, utilisée dans les rituels religieux ou sociaux. On dit que la variété à petites feuilles de thé popularisée par la Damérie arriva sur le continent avec la Flotte du Reste elfique, tandis que la plus commune à grandes feuilles était cultivée au Yanshen et au Rahen. Les origines du thé restent disputées, les elfes prétendant que leurs ancêtres précurseurs l'apportèrent au Yanshen, mais les érudits yan modernes croient le contraire, que les anciens elfes précurseurs le volèrent de leur Yanshen natal pour le planter à Aelantir."
 tobacco:0 "Tabac"
 tobaccoDESC:0 "Le tabac était largement inconnu à Cannor jusqu'à son arrivée d'Aelantir à la fin du XVIe siècle. Il devint rapidement une mode pour les classes supérieures qui pouvaient se le permettre et assura la croissance économique rapide et profitable des colonies lorentaises en Amérique du Nord, ainsi que de la Baie-des-Trolls indépendante. Personne ne savait ce qu'ils mettaient dedans, mais ils ne pouvaient simplement pas s'arrêter de fumer."
 wine:0 "Vin"
 wineDESC:0 "Le vin fait à partir de raisins fermentés était produit depuis des temps immémoriaux dans les parties méridionales de Cannor et constituait encore un élément essentiel du régime quotidien. Il n'était pas considéré comme un produit de luxe mais servait probablement de bienvenu soulagement pour des centaines face à un régime autrement monotone. En plus des raisins, des boissons alcoolisées pouvaient être préparées à partir d'une grande variété d'autres cultures. Les boissons les plus puissantes, comme la Noire du Dwarovar, étaient fabriquées par les nains."
 wool:0 "Laine"
 woolDESC:0 "La laine provenait principalement des moutons qui paissaient sur les terres marginales non adaptées à d'autres formes d'agriculture. Avant l'utilisation du coton, c'était la principale matière première pour les vêtements."
 cocoa:0 "Cacao"
 cocoaDESC:0 "Le cacao était utilisé comme stimulant par les souverains Nés-des-Ruines depuis le début du Moyen Âge. Il fut popularisé à Cannor au début du XVIe siècle lorsque les Businorais l'importèrent de leurs colonies aelantiriennes. Le cacao devint un luxe apprécié des riches."
 tropical_wood:0 "Bois exotique"
 tropical_woodDESC:0 "Utilisé pour tout, des pièces d'échecs au mobilier de haute qualité, les bois exotiques ont toujours été considérés comme une marchandise coûteuse et exclusive. Bien que beaucoup de ces types de bois soient nouveaux sur le marché cannorien, la demande augmenta rapidement et le trafic d'acajou, de teck, d'ébène ou d'autres bois rares devint bientôt une activité majeure."
 dyes:0 "Teintures"
 dyesDESC:0 "Depuis aussi longtemps que les textiles sont tissés, il y a eu un marché pour les teintures fines. Durant la fin du Moyen Âge, des teintures coûteuses comme l'indigo valaient une fortune en raison de l'éloignement de leur source au Rahen.\n\nLorsque le monde s'ouvrit, les teintures devinrent plus faciles à obtenir, tant grâce aux possibilités de les produire à Aelantir qu'à l'accessibilité accrue du marché raheni. Néanmoins, les teintures restèrent rares et au début du XIXe siècle, lorsque les plantations de teinture du Rahen tombèrent aux mains des Cannoriens, une véritable ruée vers l'or s'ensuivit."
 silk:0 "Soie"
 silkDESC:0 "La plus fine de toutes les étoffes de l'Orient était la soie produite au Rahen et dans l'est de Haless. Bien que moins emblématiques que les épices, les profits de la soie et des tissus de coton finement tissés éclipseraient bientôt ceux du commerce des épices pour les Compagnies cannoriennes du Rahen oriental.\nEn raison de la demande croissante, des tentatives furent également faites pour produire le matériau localement dans la Cannor mercantiliste, avec des degrés de succès très variés."
 incense:0 "Encens"
 incenseDESC:0 "Répandre de la fumée et du parfum par la combustion de matières est courant dans les pratiques cérémonielles depuis des siècles. L'oliban, le bois d'agar, le bois de santal, la myrrhe et d'autres biens adaptés à cet usage ne se trouvent qu'en peu d'endroits et leur diffusion faisait partie intégrante de la formation de réseaux commerciaux tels que la Route Dorée ou la Route de l'Encens, au nom approprié."
 livestock:0 "Bétail"
 livestockDESC:0 "Depuis l'aube de l'histoire, le soin des animaux domestiques a été l'une des principales occupations de l'humanité. Le bétail inclut tout, des vaches et chevaux dans les riches régions agricoles aux troupeaux des pasteurs dans les grandes plaines et déserts du monde."
 glass:0 "Verre"
 glassDESC:1 "Le verre est apprécié depuis des siècles comme matériau utile pour l'art, l'architecture ou simplement la fabrication de récipients pour l'usage quotidien. Finalement, à mesure que les techniques de fabrication du verre s'améliorèrent, le verre devint également crucial pour le domaine scientifique de l'optique, les lentilles de verre étant utilisées dans la fabrication de lunettes, télescopes et une pléthore d'autres appareils aux applications variées, de la navigation maritime aux sciences naturelles."
 paper:0 "Papier"
 paperDESC:0 "Le papier est une nécessité pour tous les types de comptabilité avancée, d'administration et de diffusion des connaissances, et le processus de sa production fut originellement conçu dans l'est de Haless puis se répandit lentement dans tous les coins de l'Ancien Monde. Bien supérieur aux autres types de matériaux d'écriture tels que le parchemin, la production à grande échelle de papier nécessite un ensemble spécialisé de compétences et d'équipements, en faisant une marchandise rare et recherchée."
 gems:0 "Gemmes"
 gemsDESC:0 "Depuis les temps les plus reculés, des pierres telles que les rubis, saphirs, diamants, émeraudes, jade ou perles ont été utilisées dans la joaillerie et les tenues cérémonielles. Pendant des siècles, la seule source de diamants au monde était les légendaires mines d'Arg-Ôrdstun. Bien que toutes les pierres précieuses ne soient pas aussi rares, elles sont toutes des marchandises très recherchées."
 coal:0 "Charbon"
 coalDESC:0 "Le charbon a une longue histoire comme source de combustible, mais ce n'est qu'avec l'invention et la diffusion de la machine à vapeur pratique que la demande explosa. Alors que la Révolution industrielle balayait Cannor, l'utilisation et l'exportation ou l'importation de charbon devinrent une activité majeure et une partie intégrante d'une économie moderne."
