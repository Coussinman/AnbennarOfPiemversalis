 promote_neo_confucianism_title:0 "Promouvoir le néo-confucianisme"
 promote_neo_confucianism_desc:0 "Soutenir les idées philosophiques du penseur néo-confucéen Zhu Xi concernant la connaissance et l'action, avec un accent prononcé sur le raisonnement logique et la cohérence."
 neo_confucianism:0 "Néo-confucianisme"
 desc_neo_confucianism:0 "Nous soutenons fermement les idées néo-confucéennes de Zhu Xi concernant la connaissance et l'action, avec un accent prononcé sur le raisonnement logique et la cohérence."
 reject_taoism_title:0 "Dénoncer le néo-confucianisme"
 reject_taoism_desc:0 "Plaider pour un retour à l'école confucéenne orthodoxe et dénoncer les idéaux et croyances néo-confucéens et taoïstes."
 denounce_taoism:0 "Dénoncer le néo-confucianisme"
 desc_denounce_taoism:0 "Nous avons décidé de promouvoir les philosophies confucéennes orthodoxes et de dénoncer les idéaux et croyances néo-confucéens et taoïstes."
 sunday_school_title:0 "Établir des écoles du dimanche"
 sunday_school_desc:0 "Fournir une éducation en matières religieuses et morales aux enfants des pauvres en établissant des écoles du dimanche."
 sunday_schools:0 "Écoles du dimanche"
 desc_sunday_schools:0 "Des écoles du dimanche ont été établies pour améliorer l'alphabétisation et les connaissances en matières religieuses et morales pour les enfants des pauvres."
