 steppe_horde_legacy:1 "Horde des steppes"
 steppe_horde_legacy_desc:1 "Une forme de gouvernement où un souverain ou un chef militaire dirige une confédération tribale, avec des Casus Belli permanents contre tous les voisins et des troupes plus efficaces dans les plaines."
