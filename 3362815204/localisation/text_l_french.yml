 OL_COT_DESC:0 "Ce nœud commercial vaut un total de §Y$TOTAL$§W¤ chaque année. Nos §Y$NUM$§W marchands prennent §Y$VALUE$§W¤ de cela."
 HOSTILE_RELATIONLEDGER_EMBARGO_LEFT_L:0 "Ce sont les pays que nous interdisons actuellement de nos nœuds commerciaux. Ils ne peuvent plus envoyer de marchands et leurs marchands actuels ne gagnent pas de revenus. De plus, toutes nos provinces qui fournissent des revenus commerciaux aux nœuds commerciaux que nous ne possédons pas ne fourniront pas de revenus à ces pays. En général, les pays ne sont pas bien disposés envers les nations qui interdisent leurs marchands. Un embargo commercial est un acte hostile et les pays que nous interdisons auront automatiquement un Casus Belli contre nous."
 HOSTILE_RELATIONLEDGER_EMBARGO_RIGHT_L:0 "Ce sont les pays qui nous interdisent de leurs nœuds commerciaux. Nous ne pouvons plus envoyer de marchands à leurs nœuds commerciaux. De plus, toutes leurs provinces qui fournissent des revenus commerciaux à un nœud commercial qu'ils ne possèdent pas ne nous fourniront pas de revenus. Nous considérons un embargo commercial comme un acte hostile et nous avons un Casus Belli contre tout pays qui ose nous embarquer."
 PW_CENTER_OF_TRADE:0 "Nœud commercial"
 PW_VALUE_OF_TRADE:0 "Valeur totale du commerce"
 tut_1b_39:0 "À droite de la vue de province, près des pièces, se trouve la production économique de la province. En dessous se trouve la ressource principale de la province et sa production. Toutes les ressources produites sont envoyées à un nœud commercial où n'importe quelle nation peut envoyer des marchands pour concourir pour une part du profit. Cliquer sur le bouton du nœud commercial vous amène à la sous-vue du nœud commercial."
