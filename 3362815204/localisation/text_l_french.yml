 enact_ottoman_tolerance_desc:0 "Nous comptons un grand nombre de non-musulmans dans notre royaume. Si nous leur accordions davantage d'autonomie dans leurs affaires, ils seraient plus enclins à se soumettre à notre autorité. Cependant, cela rendra l'administration un peu plus difficile."
 desc_ottoman_tolerance:0 "Nous avons adopté une politique de plus grande tolérance envers les non-musulmans du royaume. Tant qu'ils paient leurs impôts, ils peuvent prier comme bon leur semble."
 make_constantinople_capital_title:0 "Faire de Constantinople la capitale"
 make_constantinople_capital_desc:0 "La glorieuse cité que nous avons récemment conquise fera une splendide capitale pour notre nation. Constantinople est la plus grande cité du monde, et notre gouvernement la rendrait encore plus puissante."
