 amass_wealth_header:0 "Nos finances sont mauvaises. Nous devrions"
 amass_wealth_title:0 "Remplir nos coffres"
 amass_wealth_desc:0 "Nos conseillers nous ont convaincus des avantages d'une grande réserve d'or. Amasser des richesses maintenant assurera notre succès en temps de crise."
 conquer_core_header:0 "La vengeance sera nôtre ! Nous devons"
 reclaim_jerusalem_header:0 "L'Église vous a confié une quête sacrée :"
 reclaim_jerusalem_title:0 "Reconquérir la Cité Sainte"
 reclaim_jerusalem_desc:0 "C'est une offense intolérable pour tout vrai chrétien que la cité de notre Seigneur soit entre des mains infidèles. Comme les braves croisés d'antan, nous devons rassembler une puissante armée et chasser les païens de Jérusalem !"
