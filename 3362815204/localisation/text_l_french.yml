 CW_WARN_LOSE_SUBJECT:0 "\nSi nous acceptons, $WHO|Y$ ne sera plus notre $SUBJECTTYPE$."
 more_tariffs:0 "Davantage de droits de douane"
 desc_more_tariffs:0 "Les gens trouvent beaucoup plus difficile de faire passer des marchandises en contrebande sans nous payer notre dû."
 sheriff_boost:0 "Shérif extraordinaire"
 desc_sheriff_boost:0 "L'administration dans nos comtés fonctionne extraordinairement bien"
 high_judge_boost:0 "Grand juge brillant"
 desc_high_judge_boost:0 "Justice est faite"
 alderman_boost:0 "Échevin compétent"
 desc_alderman_boost:0 "Grâce à notre échevin, nous parvenons à percevoir nos revenus."
 colonel_boost:0 "Colonel magistral"
 desc_colonel_boost:0 "Notre excellent colonel s'assure que nous obtenons les meilleures conditions pour le recrutement de mercenaires."
 master_of_mint_boost:0 "Le Maître de la Monnaie"
 desc_master_of_mint_boost:0 "Grâce à notre maître de la monnaie, notre peuple a une confiance inhabituellement élevée dans la valeur de notre argent."
 banker_boost:0 "Grand banquier"
 desc_banker_boost:0 "Notre grand banquier utilise ses compétences pour trouver ceux qui nous prêteront au moindre coût."
 lord_proprietor_boost:0 "Très splendide seigneur propriétaire"
 desc_lord_proprietor_boost:0 "Les récits des richesses que nos compagnies coloniales à charte accumulent se sont répandus loin, et encore plus d'âmes courageuses cherchent fortune dans le Nouveau Monde."
 grand_admiral_boost:0 "Glorieux grand amiral"
 desc_grand_admiral_boost:0 "Notre grand amiral s'assure que chaque homme fera son devoir."
 naval_organiser_boost:0 "Organisateur naval brillant"
 desc_naval_organiser_boost:0 "Notre flotte connaît une période d'organisation sans précédent."
 navigator_boost:0 "Navigateur expérimenté"
 desc_navigator_boost:0 "Nos marins naviguent plus loin que d'habitude, leur courage fortifié par notre navigateur talentueux."
 rear_admiral_boost:0 "Contre-amiral compétent"
 desc_rear_admiral_boost:0 "Notre contre-amiral démontre ses compétences supérieures pour identifier les jeunes officiers talentueux."
 privateer_boost:0 "Corsaire aguerri"
 desc_privateer_boost:0 "Nos corsaires mènent leurs loups de mer endurcis avec une vigueur inhabituelle en ce moment."
 sergeant_major_general_boost:0 "Commandant expérimenté"
 desc_sergeant_major_general_boost:0 "Notre armée fonctionne si bien que les meilleurs hommes rejoignent nos rangs comme officiers, nous donnant une capacité de commandement inégalée."
 grand_captain_boost:0 "Un Capitaine véritablement Grand !"
 desc_grand_captain_boost:0 "Ô Capitaine ! mon Capitaine ! lève-toi et entends les cloches\nLève-toi, pour toi le drapeau est hissé, pour toi le clairon sonne."
 army_organiser_boost:0 "Organisateur militaire brillant"
 desc_army_organiser_boost:0 "La machine militaire n'a jamais été aussi bien rodée, l'héritage d'un homme brillant à sa tête."
 commandant_boost:0 "Chef inspirant"
 desc_commandant_boost:0 "Nos armées récoltent les fruits de notre concentration acharnée sur l'entraînement."
 quartermaster_boost:0 "Quartier-maître compétent"
 desc_quartermaster_boost:0 "Les talents d'organisation supérieurs de notre quartier-maître font fonctionner le service d'approvisionnement de nos armées à son efficacité maximale."
 recruitmaster_boost:0 "Maître recruteur extraordinaire"
 desc_recruitmaster_boost:0 "Notre maître recruteur a mis le système de recrutement sur de bons rails"
 fortification_expert_boost:0 "Grande réflexion défensive"
 desc_fortification_expert_boost:0 "Nos grands esprits militaires ont réfléchi à la manière de défendre les forteresses."
 inquisitor_boost:0 "Sécurité nationale"
 desc_inquisitor_boost:0 "Cependant, je crains de ne pouvoir révéler plus de détails."
 ambassador_boost:0 "Grande réputation diplomatique"
 desc_ambassador_boost:0 "La réputation de notre diplomatie s'étend au loin, tout le monde veut nous écouter."
 IS_NOT_COLONIAL:0 "N'est pas un pays colonial"
 IS_COLONIAL:0 "Est un pays colonial"
 colonial_patriot_rebels_title:0 "Patriote colonial"
 colonial_patriot_rebels_name:0 "Patriotes coloniaux"
 colonial_patriot_rebels_desc:0 "Les rebelles patriotes coloniaux sont impatients de se libérer de leurs maîtres distants et oppressifs. Plutôt que de chercher une autonomie complète, ils visent à libérer des provinces au nom d'une colonie voisine nouvellement indépendante. Attention, car les provinces qu'ils prennent pourraient faire défection."
 colonial_patriot_rebels_army:0 "Armée coloniale"
 advaita_movement_title:0 "Soutenir le mouvement Advaita"
 advaita_movement_desc:0 "Soutenir le mouvement spirituel Advaita dans ses efforts pour promouvoir les idéaux non-dualistes d'Adi Shankara par opposition à l'école philosophique dualiste de Madhvacharya."
 the_advaita_movement:0 "Soutien au mouvement Advaita"
 desc_the_advaita_movement:0 "Nous avons décidé de soutenir le mouvement Advaita dans ses efforts pour promouvoir les idéaux non-dualistes d'Adi Shankara par opposition à l'école philosophique dualiste de Madhvacharya."
 religious_sacrifice_title:0 "Sacrifices religieux"
 religious_sacrifice_desc:0 "Faire des sacrifices religieux d'animaux et des saignées une pratique courante dans notre société pour plaire aux dieux."
 religious_sacrifices:0 "Sacrifices religieux"
 desc_religious_sacrifices:0 "Les sacrifices religieux d'animaux et les saignées pour plaire aux dieux sont une pratique courante dans notre société."
 vision_quest_title:0 "Introduire la quête de vision"
 vision_quest_desc:0 "Introduire la pratique des rites d'initiation pour les adolescents afin qu'ils trouvent une direction spirituelle et fassent le passage de l'enfance à l'âge adulte."
 rite_of_passage:0 "Rite de passage"
 desc_rite_of_passage:0 "Nous avons introduit des rites d'initiation pour les adolescents afin qu'ils trouvent une direction spirituelle et fassent le passage de l'enfance à l'âge adulte."
 enforce_heritage_title:0 "Imposer notre héritage"
 enforce_heritage_desc:0 "Notre foi est la voie honorée de nos ancêtres. Nous ne pouvons pas permettre aux religions étrangères d'empiéter sur nos traditions."
 enforcing_heritage:0 "Imposer notre héritage"
 desc_enforcing_heritage:0 "Nous honorons et nous souvenons de nos ancêtres, et nous ne permettrons pas aux religions étrangères d'empiéter sur nos traditions."
 church_tax_title:0 "Introduire les impôts ecclésiastiques"
 church_tax_desc:0 "Améliorer les revenus en permettant à l'Église de prélever certains impôts sur les paysans."
 church_taxes:0 "Impôt ecclésiastique"
