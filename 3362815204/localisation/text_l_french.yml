 bureaucrats_FACTION_DESC:2 "Le corps des administrateurs promus par le système d'examens impériaux. Brillants érudits confucéens, ces hommes sont les diplomates et bureaucrates de l'Empire. Ils promeuvent des politiques visant à bâtir un Empire stable et puissant.\n\n§YGagne de l'influence à cause de la surextension et de la banqueroute.§!"
