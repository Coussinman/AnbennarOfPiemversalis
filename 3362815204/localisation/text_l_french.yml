 faster_ships:0 "Construction navale accélérée"
 desc_faster_ships:0 "Notre décision d'embrasser l'idée d'une grande marine a donné un élan à nos industries de construction navale."
 slower_ships:0 "Construction navale ralentie"
 desc_slower_ships:0 "Malgré notre décision d'embrasser l'idée d'une grande marine, notre industrie de construction navale semble souffrir."
 naval_developments:0 "Développements navals"
 desc_naval_developments:0 "Grâce à notre supériorité maritime, nous développons des moyens toujours plus nouveaux et meilleurs d'améliorer notre marine."
 naval_hubris:0 "Orgueil naval"
 desc_naval_hubris:0 "Notre supériorité maritime nous a donné une flotte capable de dominer les mers, et un soupçon d'orgueil s'installe. Ne vous inquiétez pas, cela ne nous rattrapera jamais."
 blockade_tactics:0 "Tactiques de blocus améliorées"
 desc_blockade_tactics:0 "Notre utilisation des instructions de combat naval nous a permis de développer des tactiques de blocus encore meilleures, du moins jusqu'à ce que nos ennemis apprennent à les contrer."
 slipping_standards:0 "Standards de blocus en déclin"
 desc_slipping_standards:0 "Notre utilisation des instructions de combat naval a amélioré la capacité globale de blocus de nos forces, mais il semble qu'un peu de complaisance s'installe."
 naval_technical_developments:0 "Développements techniques navals"
 desc_naval_technical_developments:0 "Nos excellents constructeurs navals développent des navires toujours plus nouveaux et meilleurs pour notre flotte."
 concerned_shipwrights:0 "Constructeurs navals inquiets"
 desc_concerned_shipwrights:0 "Des problèmes avec nos chantiers navals empêchent nos excellents constructeurs navals de fonctionner aussi bien qu'ils le devraient normalement."
 recruits_flock:0 "Les recrues affluent sous les étendards"
 desc_recruits_flock:0 "Notre politique de conscription nationale fait affluer les recrues sous les étendards."
 resist_conscription:0 "Conscription résistée"
 desc_resist_conscription:0 "Habituellement, notre politique de conscription nationale produit encore plus d'hommes pour l'armée. Cependant, en ce moment, la conscription est résistée."
 grander_army:0 "Armée plus grandiose"
 desc_grander_army:0 "Notre Grande Armée semble encore plus grandiose que d'habitude. Les autres pays regardent notre armée avec envie."
 less_grand_army:0 "Armée moins grandiose"
 desc_less_grand_army:0 "Notre Grande Armée suscite habituellement l'envie des nations voisines, mais en ce moment, personne ne semble s'en soucier."
 military_improvements:0 "Améliorations militaires"
 desc_military_improvements:0 "Notre excellent entraînement militaire a conduit à des améliorations dans notre pensée militaire."
 military_complacency:0 "Complaisance militaire"
 desc_military_complacency:0 "Notre entraînement militaire nous a donné une armée superbe que tout le monde craint. Cela a conduit nos officiers supérieurs à croire que notre armée ne peut tout simplement pas être améliorée."
 adventuring_merchants:0 "Marchands aventuriers"
 desc_adventuring_merchants:0 "Nos marchands aventuriers s'aventurent plus que d'habitude, ce qui signifie que notre commerce rapporte encore plus de profits qu'auparavant."
 poor_merchants:0 "Marchands en difficulté"
 desc_poor_merchants:0 "Habituellement, nos marchands aventuriers partent et ramènent des richesses du monde entier ; en ce moment, ils ne font pas aussi bien qu'ils le devraient."
 out_of_date_commerce:0 "Pratiques commerciales dépassées"
 desc_out_of_date_commerce:0 "Nos pratiques commerciales avisées ont donné à nos marchands un réel avantage ; cependant, en ce moment, ils ne performent pas aussi bien qu'ils le devraient."
 excellent_administration:0 "Administration excellente"
 desc_excellent_administration:0 "Nos vice-rois font un travail remarquable, améliorant nos revenus de nos provinces d'outre-mer."
 corrupt_viceroys:0 "Vice-rois corrompus"
 desc_corrupt_viceroys:0 "Malheureusement, certains de nos vice-rois récemment nommés croient que lorsqu'ils ont un office à profit sous la couronne, la partie profit est la plus importante."
 production_improvements:0 "Améliorations de la production"
 desc_production_improvements:0 "Avec notre décision d'embrasser l'idée de l'économie de marché libre, notre peuple continue d'expérimenter de nouvelles et meilleures méthodes de production."
 production_stifled:0 "Production étouffée"
 desc_production_stifled:0 "Notre décision d'embrasser l'économie de marché libre a conduit à des améliorations de la production ; cependant, nous avons subi une vague de conservatisme qui freine les améliorations."
 successful_bureaucracy:0 "Bureaucratie efficace"
 desc_successful_bureaucracy:0 "Nos bureaucrates font mieux que d'habitude, ce qui conduit à de meilleurs revenus fiscaux."
 corrupt_bureaucracy:0 "Bureaucratie corrompue"
 desc_corrupt_bureaucracy:0 "Actuellement, certains de nos hauts bureaucrates sont trop occupés à remplir leurs propres poches pour se concentrer sur leurs tâches."
 trade_policy_working:0 "Politique commerciale efficace"
 desc_trade_policy_working:0 "Notre politique commerciale nationale est actuellement plus efficace que d'habitude."
 trade_policy_failing:0 "Politique commerciale défaillante"
 desc_trade_policy_failing:0 "Notre politique commerciale nationale ne fonctionne pas très bien en ce moment."
 enhanced_spies:0 "Espions améliorés"
 desc_enhanced_spies:0 "Notre système d'espionnage fonctionne mieux que d'habitude, ce qui signifie que nos espions sont encore plus efficaces."
 spy_defections:0 "Défections d'espions"
 desc_spy_defections:0 "Notre système d'espionnage connaît actuellement des difficultés car certains de nos espions font défection pour travailler pour d'autres nations."
 cabinet_dynamism:0 "Dynamisme du cabinet"
 desc_cabinet_dynamism:0 "Avec les bons membres se complétant mutuellement, notre cabinet se révèle plus efficace que d'habitude."
 government_corruption:0 "Corruption gouvernementale"
 desc_government_corruption:0 "Notre gouvernement de cabinet est rempli d'hommes encore plus corrompus que d'habitude ; à cause de cela, notre gouvernement est moins efficace."
 minority_prospers:0 "Minorité prospère"
 desc_minority_prospers:0 "Notre décision d'accorder la déclaration des droits a permis à nos groupes minoritaires de prospérer dans notre nation."
 missionary_zeal:0 "Zèle missionnaire"
 desc_missionary_zeal:0 "Notre nation étant fondée sur le principe de suprématie divine, nos missionnaires se sentent plus zélés que d'habitude."
 land_boost:0 "Essor terrestre"
 desc_land_boost:0 "Notre révolution scientifique produit des bénéfices supplémentaires car notre recherche militaire progresse encore plus vite."
 naval_boost:0 "Essor naval"
 desc_naval_boost:0 "Notre marine ressent particulièrement les bénéfices de notre révolution scientifique en ce moment."
 production_boost:0 "Essor de la production"
 desc_production_boost:0 "À mesure que notre révolution scientifique avance, l'agriculture et l'exploitation minière en ressentent les bénéfices."
 government_boost:0 "Essor gouvernemental"
 desc_government_boost:0 "Notre révolution scientifique bénéficie actuellement particulièrement à nos réflexions sur le gouvernement."
 trade_boost:0 "Essor commercial"
 desc_trade_boost:0 "Notre révolution scientifique a déclenché une vague de curiosité ; les gens sont particulièrement désireux d'explorer de nouveaux moyens de commerce."
 revolution_suffers:0 "La révolution souffre"
 desc_revolution_suffers:0 "Une vague de conservatisme a ralenti la révolution scientifique."
 serf_exploitation:0 "Exploitation des serfs"
 desc_serf_exploitation:0 "Notre politique favorisant le servage a permis aux propriétaires terriens d'exploiter leurs serfs encore plus que d'habitude."
 happy_people:0 "Population heureuse"
 desc_happy_people:0 "Notre politique favorisant les sujets libres plutôt que le servage a satisfait la population."
 land_focus:0 "Priorité terrestre"
 desc_land_focus:0 "Notre concentration globale sur le terrestre a fait souffrir notre marine."
 naval_focus:0 "Priorité navale"
 desc_naval_focus:0 "Notre décision de nous concentrer sur le naval a fait souffrir nos forces terrestres."
 lack_of_protection:0 "Manque de protection"
 desc_lack_of_protection:0 "Notre poursuite de politiques de libre-échange a laissé nos marchands inquiets du manque de soutien et de protection de la part du gouvernement."
 innovation_wave:0 "Vague d'innovation"
 desc_innovation_wave:0 "Nos politiques innovantes ont conduit à l'entrée de nouvelles idées dans notre royaume."
 centralised_state:0 "État centralisé"
 desc_centralised_state:0 "Nos politiques centralisées ont produit des revenus fiscaux supplémentaires."
 happy_provinces:0 "Provinces heureuses"
 desc_happy_provinces:0 "Nos politiques décentralisées signifient que les provinces locales fournissent des contributions supplémentaires au trésor."
 unhappy_merchants:0 "Marchands mécontents"
 desc_unhappy_merchants:0 "Notre politique favorisant l'aristocratie rend beaucoup de nos marchands plutôt mécontents."
 excellent_vintage:0 "Excellent cru"
 desc_excellent_vintage:0 "Un vignoble local a produit un vin d'une qualité extraordinaire ; notre peuple est satisfait."
 poor_uniforms:0 "Uniformes de mauvaise qualité"
 desc_poor_uniforms:0 "Certains de nos fournisseurs de tissus ont fourni des uniformes de qualité inférieure à l'armée. Cela a baissé le moral."
 salt_crisis:0 "Crise du sel"
 desc_salt_crisis:0 "Des rumeurs de crise dans notre production de sel ont inquiété la population."
 good_supplies:0 "Bons approvisionnements"
 desc_good_supplies:0 "Nos fournitures navales ont été d'une qualité exceptionnellement haute, nous permettant de produire des navires moins chers."
 poor_copper:0 "Cuivre de mauvaise qualité"
 desc_poor_copper:0 "Nos mines de cuivre ne produisent pas un cuivre d'aussi bonne qualité que d'habitude ; la production d'artillerie souffre à cause de cela."
 poor_iron:0 "Fer de mauvaise qualité"
 desc_poor_iron:0 "Nos mines de fer produisent un fer de moins bonne qualité que d'habitude. Le recrutement d'unités d'armée devient plus coûteux à cause de cela."
 epidemic:0 "Épidémie"
 desc_epidemic:0 "Une épidémie a balayé notre population locale, réduisant le nombre disponible pour l'exportation."
 storms:0 "Tempêtes"
 desc_storms:0 "Des tempêtes ont frappé nos manufactures de porcelaine. Cela réduira la quantité disponible pendant quelques années."
 harvest_fails:0 "Récoltes ratées"
 desc_harvest_fails:0 "La récolte a échoué dans cette région, réduisant la production d'épices."
 counter_revolution:0 "Contre-révolution"
 desc_counter_revolution:1 "Un gouvernement révolutionnaire se déchaîne sur le continent. Notre noblesse estime que nous sommes prêts et disposés à lui faire la guerre, mais ce n'est pas le cas. La propagande révolutionnaire se répand dans notre nation, sapant notre gouvernement, tandis que les autres puissances mondiales nous croient faibles. Écoutons-nous le parti de la guerre ?"
 vive_la_revolution:0 "Vive la Révolution"
 desc_vive_la_revolution:0 "Notre gouvernement révolutionnaire mène une guerre contre les puissances hostiles à notre cause. Le peuple se rallie à la cause et nos armées font preuve d'élan révolutionnaire."
 reaction:0 "Réaction"
 desc_reaction:0 "Nous menons le combat sacré contre les révolutionnaires sans dieu. L'Église et l'État soutiennent pleinement notre cause et les autres pays admirent notre démonstration de force."
 PENALTY_SHADOW_KINGDOM:0 "Choisir de rester dans l'Empire entraînera des pénalités de prestige et une augmentation du mécontentement."
 submission_to_emperor:0 "Soumission à l'Empereur"
