 LEDGER_REVOLTRISK:0 "Mécontentement"
 LEDGER_UNREST:0 "Mécontentement"
 LEDGER_BORDER_PROVINCE:0 "Province frontalière"
 COMBAT_DISCIPLINE:0 "Discipline"
