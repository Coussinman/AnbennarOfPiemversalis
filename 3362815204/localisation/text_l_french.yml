 adal_guerilla_warfareDESCR:0 "Petits groupes de guerriers des collines est-africaines employant des tactiques de guérilla pour harceler leur ennemi."
 adal_gunpowder_warfareDESCR:0 "Guerriers africains de l'Est armés de mousquets et possédant d'assez bonnes tactiques défensives."
 african_clubmenDESCR:0 "Massiers traditionnels indigènes, à l'origine de tous les guerriers."
 african_hill_warfareDESCR:0 "Guerriers des collines avec d'assez bonnes compétences défensives adaptées au climat des collines africaines."
 african_spearmenDESCR:0 "Guerriers tribaux utilisant des lances comme arme principale et des boucliers en bois pour la défense."
 african_western_franchise_warfareDESCR:0 "Guerriers africains pleinement adaptés à la guerre occidentale."
 afsharid_reformedDESCR:0 "Cavalerie de chameaux armée de mousquets sous le règne de Nader Shah. Il était considéré par certains comme l'un des plus habiles chefs militaires de Perse."
 afsharid_reformed_infantryDESCR:0 "Troupes d'infanterie armées de mousquets sous le règne de Nader Shah. Il était considéré par certains comme l'un des plus habiles chefs militaires de Perse."
 algonkin_tomahawk_chargeDESCR:0 "Ces guerriers étaient une amélioration du guerrier des plaines de base. Bien que moins efficaces en combat de choc que le guerrier des plaines réformé, leur barrage mortel de projectiles donnait à ces unités une puissance de frappe supplémentaire."
 ali_bey_reformed_infantryDESCR:0 "Troupes de cavalerie servant sous le général mamelouk Ali Bey qui rétablit l'État mamelouk en 1770."
 american_western_franchise_warfareDESCR:0 "Ces troupes attaquent avec un élan maximum et sans se soucier de leurs propres pertes. Ces unités peuvent être redoutables à l'offensive, mais peuvent être punies par une tactique plus défensive."
 anglofrench_lineDESCR:0 "Les tactiques d'infanterie de ligne cherchaient à trouver un équilibre entre attaque et défense et ne se spécialisaient dans aucune des deux. Cependant, cette infanterie était plus forte au feu et au choc. Leur objectif était d'utiliser les salves de mousquets pour désorganiser l'ennemi avant qu'il ne puisse charger, en particulier s'il s'agissait principalement d'une force d'action de choc."
 archipelago_frigateDESCR:0 "Un navire à deux mâts équipé de canons pour les eaux peu profondes, mis en service au milieu du XVIIIe siècle."
 asian_arquebusierDESCR:0 "L'adoption des armes à feu fut assez lente dans certaines régions de Haless mais graduellement l'arc commença à céder la place. L'arquebuse fut introduite au XVIe siècle et permit aux unités d'infanterie un taux de feu beaucoup plus élevé bien que moins précis."
 asian_musketeerDESCR:0 "Armées asiatiques équipées de mousquets plus légers et maniables, remplaçant l'ancienne arquebuse."
 austrian_grenzerDESCR:0 "Après la conquête de la Hongrie et de la Croatie au XVIIIe siècle, l'Autriche forma un nouveau type d'unité appelé Grenzer (ce qui signifie Frontaliers) pour défendre les frontières de leurs terres nouvellement conquises contre les Ottomans. Les hommes étaient recrutés dans la population locale et recevaient des terres en échange de leur service militaire. Les régiments Grenzer étaient considérés comme de l'infanterie légère. Ils combattaient principalement dans un rôle d'escarmouche mais pouvaient également fonctionner comme infanterie de ligne."
 austrian_hussarDESCR:0 "Pendant longtemps en Cannor occidental, la cavalerie était le prince du champ de bataille. Les chevaliers lourdement blindés délivraient des charges de cavalerie meurtrières. Cependant à l'Est, des adversaires comme les Turcs ottomans, issus d'une tradition steppique, avaient une cavalerie plus légèrement armée plus adaptée à l'escarmouche. Ces unités montrèrent leur valeur à la bataille d'Adrianople quand la dernière grande croisade (avec la crème de la noblesse latine) fut brisée par la cavalerie légère ottomane et les Janissaires. Pour contrer cela, l'armée hongroise avait plusieurs unités appelées Hussards qui étaient une cavalerie plus légère plus adaptée au combat contre leurs adversaires ottomans. Cependant les unités qui arrivèrent d'abord en Occident n'étaient pas les légers Hussards hongrois, mais les plus lourds Hussards ailés polonais qui étaient un mélange de cavalerie orthodoxe et de cavalerie légère de raid."
 austrian_jaegerDESCR:0 "En Allemagne au XVIIIe siècle, un nouveau type d'infanterie légère apparut, appelé Jäger (Chasseurs). Les Jäger étaient utilisés pour la reconnaissance et l'escarmouche. Au début, ils étaient recrutés parmi les chasseurs, gardes-chasse et forestiers. La plupart d'entre eux étaient d'excellents tireurs et étaient donc souvent utilisés comme tireurs d'élite, pouvant infliger de grandes pertes parmi les officiers ennemis. Plus tard, Jäger devint un nom générique pour tous types d'infanterie légère. Les troupes Jäger étaient souvent engagées comme mercenaires par d'autres nations, comme la Grande-Bretagne qui les utilisa dans la Révolution américaine."
 austrian_tercioDESCR:0 "Le Tercio, ou Carré Espagnol, était une formation mixte de piquiers et de mousquetaires développée par le général espagnol Gonzalo Fernandez de Cordoba. La victoire des armées espagnoles à Pavie (1525) conduirait à sa domination du champ de bataille cannorien pendant 100 ans. Les premiers Tercios contenaient entre 50 et 70 % de piquiers. Cependant, les Tercios évoluaient encore et par expérimentation, on découvrit que le nombre de piquiers requis pouvait être réduit. Ces tercios tardifs pouvaient avoir aussi peu que 25 % de piquiers, conduisant à une augmentation massive de la puissance de feu de la formation."
 austrian_white_coatDESCR:0 "Ayant ses débuts sur la frontière militaire habsbourgeoise combattant les armées ottomanes basées sur la cavalerie. Les Habits Blancs étaient entraînés et équipés principalement pour résister aux charges de cavalerie. Ils n'étaient pas aussi efficaces contre l'infanterie équipée de mousquets ou à l'offensive, mais restaient utiles contre les armées fortement basées sur la cavalerie."
 aztec_gunpowder_warfareDESCR:0 "L'introduction des armes à poudre dans le nouveau monde par les Cannoriens ne changea pas les tactiques globales de la guerre du nouveau monde, seulement la technologie utilisée. Le mousquetaire des collines resta une unité principalement défensive, mais les tactiques utilisées causaient plus de dommages au moral ennemi que le guerrier des montagnes."
 aztec_hill_warfareDESCR:0 "Le robuste guerrier des collines n'était pas immunisé contre le changement technologique. Avec de nouvelles armes et tactiques, ces soldats commencèrent à évoluer d'une unité offensive vers une unité qui accordait une plus grande importance à la défense. Cependant, le principal moyen de victoire de l'unité était de frapper le moral de l'ennemi."
 aztec_tribal_warfareDESCR:0 "Sur le haut plateau du Mexique, l'Empire aztèque fut fondé. La dynamique de la culture aztèque nécessitait des conquêtes militaires continues et les unités militaires commencèrent à évoluer vers des unités d'attaque spécialisées, qui accordaient également une grande valeur à l'endurance au combat."
 bantu_gunpowder_warfareDESCR:0 "Guerriers africains du Sud armés de mousquets et possédant d'assez bonnes tactiques offensives."
 bantu_plains_warfareDESCR:0 "Guerriers des plaines avec de bonnes compétences offensives adaptées au climat des plaines africaines."
 bantu_tribal_warfareDESCR:0 "Un guerrier tribal traditionnel sud-africain armé d'une lance et d'un bouclier caractéristique, excellant dans les stratégies offensives."
 barqueDESCR:0 "La barque était un petit navire à voiles, originellement utilisé pour le commerce. Les adapter pour la guerre fournit une alternative plus petite et plus rapide aux plus grandes caraques."
 british_squareDESCR:0 "Pendant la guerre de Succession d'Autriche, l'Autriche faisait face à une défaite sérieuse. La Silésie avait déjà été perdue au profit de la Prusse et la défaite totale n'était pas loin. Afin d'aider à renverser le cours de la bataille, des unités irrégulières de la frontière militaire furent amenées sur les principaux champs de bataille pour aider les armées impériales en difficulté. L'ordre dispersé de l'infanterie était révolutionnaire sur le champ de bataille cannorien. Cependant, il y avait ceux qui rejetaient totalement le concept de tirailleur et optaient pour des tactiques linéaires rigides. Baptisée Infanterie en Carré en raison de la formation qu'elle adoptait lors de la défense contre la cavalerie. C'étaient des unités étroitement disciplinées entraînées à tirer leurs mousquets à un rythme élevé et à tirer par peloton, ce qui signifiait qu'au lieu d'utiliser le style de salve unique et de rechargement pendant le combat, ces unités avaient toujours un peloton déchargeant leurs mousquets. Le feu en vagues mortel pouvait briser tout assaut. Cependant, les tactiques linéaires rigides rendaient ces unités moins mobiles et plus défensives."
 british_hussarDESCR:0 "À mesure que la cavalerie se spécialisait davantage, le hussard commença à évoluer. L'unité de hussards devint moins semblable au hussard polonais qui était d'abord entré dans la guerre cannorienne et plus semblable à l'original hongrois. La capacité des troupes légères et mobiles à trouver l'ennemi, le harceler, submerger ses positions d'artillerie et, quand ils étaient battus, les poursuivre."
 british_redcoatDESCR:0 "L'Habit Rouge a ses origines dans l'armée britannique, où la petite taille de l'armée signifiait qu'il était important de ménager vos ressources. Entraînées et formées pour résister aux attaques de feu, ces troupes comptaient sur leur pure endurance pour rester dans le combat."
 chambered_demi_cannonDESCR:0 "Le XVIe siècle vit non seulement des améliorations dans la maniabilité de l'artillerie mais aussi dans les tentatives de standardisation de la taille et du poids des pièces d'artillerie."
 defensive_chambered_demi_cannonDESCR:0 "Le XVIe siècle vit non seulement des améliorations dans la maniabilité de l'artillerie mais aussi dans les tentatives de standardisation de la taille et du poids des pièces d'artillerie."
 chinese_dragoonDESCR:0 "Essentiellement un fantassin, utilisant simplement le cheval pour le transport. Il n'était pas rare d'utiliser ces troupes pour des missions de reconnaissance."
 chinese_footsoldierDESCR:0 "Fantassins traditionnels de rang inférieur portant une armure légère et armés d'une lance ou d'une épée."
 chinese_longspearDESCR:0 "Troupes d'infanterie équipées de longues lances particulièrement efficaces contre les unités de cavalerie chargeant."
 chinese_steppeDESCR:0 "Archers à cheval armés d'arcs composites réputés pour leur précision et leur portée. Ils étaient parfois aussi équipés de lances leur permettant de charger l'ennemi après que les arcs aient fait leur travail."
 early_carrackDESCR:0 "La caraque primitive fut le premier navire cannorien capable de naviguer sur les hautes mers de la Complainte d'Uelos. La conception de ce navire médiéval tardif combinait les caractéristiques des drakkars gérudiens et des navires marchands bulwariens. Il était moins maniable que la caravelle, mais en raison de sa plus grande taille, il pouvait transporter des provisions pour de longs voyages, des cargaisons pour le commerce, et des canons pour l'autodéfense."
 carrackDESCR:0 "La conception de la caraque, un navire médiéval tardif, combinait les caractéristiques des drakkars gérudiens et des navires marchands bulwariens. Elle était moins maniable que la caravelle, mais en raison de sa plus grande taille, elle pouvait transporter des provisions pour de longs voyages, des cargaisons pour le commerce, et des canons pour l'autodéfense. Certaines caraques comme le navire damérien 'Supplique de Riannón' pesaient plus de 1 000 tonnes, avaient de grands châteaux avant et arrière, et pouvaient être considérées comme les plus grands navires de guerre de leur temps."
 caravelDESCR:0 "La caravelle était un petit navire très maniable qui pouvait naviguer avec une grande précision lors de longs voyages de découverte. Bien que les conceptions variaient, elle était intrinsèquement inspirée de la construction navale elfique, une caravelle avait une voile de misaine, une grande voile carrée et une voile d'artimon latine. Sa plus petite taille limitait le nombre de canons à bord, mais cela signifiait aussi que ce navire léger pouvait explorer les eaux côtières peu profondes et les estuaires. Endral l'Explorateur utilisa célèbrement une caravelle lors de ses voyages de la fin du XVe siècle et du début du XVIe siècle."
 chebeckDESCR:0 "Un petit navire à deux ou trois mâts largement utilisé dans le Divenhal à partir du XVIe siècle."
 coehorn_mortarDESCR:0 "Inventé par l'ingénieur ancardien Albert síl Moreced au XVIIe siècle. Un mortier plus petit avec le canon fixé à un angle de 45 degrés. La seule façon de changer la portée du tir était de déplacer la pièce ou d'utiliser des charges de poids différents."
 defensive_coehorn_mortarDESCR:0 ""
 cogDESCR:0 "Un navire de commerce à un mât originaire du nord de Cannor."
 creek_arquebusierDESCR:0 "L'arquebusier Creek était un descendant du guerrier au tomahawk. Bien qu'avec plus d'accent sur le choc et la cohésion que l'arquebusier amérindien. Ces unités avaient toujours une inclination offensive mais leurs tactiques n'étaient pas aussi dévastatrices pour le moral ennemi que l'arquebusier amérindien et le mousquetaire offensif."
 culverinDESCR:0 "Canons à assez long canon développés aux XVIe et XVIIe siècles. Ils étaient réputés pour leurs capacités de tir à longue portée mais en même temps pas très précis pour atteindre leur cible."
 durrani_dragoonDESCR:0 "Troupes de cavalerie légère composées principalement de mercenaires afghans sous le règne d'Ahmad Shah Abdali, plus tard Durrani."
 durrani_rifled_musketeerDESCR:0 "Unités d'infanterie afghanes servant sous Ahmad Shah Abdali, père de la dynastie Durrani au milieu du XVIIIe siècle."
 durrani_swivelDESCR:0 "Unités de cavalerie montées avec des canons à pivot hautement portables sur leur dos, permettant aux troupes de tirer par-dessus leur propre infanterie."
 dutch_mauricianDESCR:0 "Au XVIe siècle, le mousquet (une arme à feu portable) devint courant, mais ils étaient très lents à recharger. Les tacticiens militaires déployaient typiquement les mousquetaires en formations pour maximiser la puissance de feu. Les mousquets étaient ainsi disposés en lignes (douze, huit ou six de profondeur). Quand le premier rang tirait, il se déplaçait vers l'arrière pour recharger, après quoi le rang suivant tirait. Cela maximisait la puissance de feu des mousquets du XVIe siècle et surmontait leur inconvénient de rechargement lent. Ce fut Maurice de Nassau qui fut le pionnier de l'utilisation de ces formations de mousquets et l'enseigna aux troupes néerlandaises pendant la Guerre de Quatre-Vingts Ans. Son développement de la stratégie et des tactiques militaires fit de l'armée néerlandaise la plus moderne de Cannor."
 early_frigateDESCR:0 "Avec le commerce outre-mer croissant, il y avait un besoin d'un navire d'escorte rapide pour assurer un voyage sûr. Les premières frégates furent développées pour cela. C'étaient des navires de guerre plus petits et plus fins avec un pont de canons, et fournissaient une protection contre la piraterie dans les eaux dangereuses."
 east_asian_spearmenDESCR:0 "Fantassins de rang inférieur armés de lances en bois."
 eastern_bowDESCR:0 "Archers à cheval constituant la principale force militaire de l'armée orientale."
 eastern_knightsDESCR:0 "Comme leurs homologues en Occident, les chevaliers orientaux représentaient le summum de la technologie militaire, issus de la noblesse qui pouvait se permettre d'entretenir des chevaux et était hautement entraînée. La charge de cavalerie décida de nombreuses batailles à cette époque."
 eastern_medieval_infantryDESCR:0 "Recrutée parmi les serfs et autres communautés paysannes, cette infanterie mal armée et mal entraînée ne sera pas d'une grande utilité au combat. Cependant, pourquoi gaspiller la noblesse dans des assauts dangereux sur des forteresses ?"
 eastern_militiaDESCR:0 "Recrutée parmi les serfs et autres communautés paysannes, cette infanterie mal armée et mal entraînée ne sera pas d'une grande utilité au combat. Cependant, pourquoi gaspiller la noblesse dans des assauts dangereux sur des forteresses ?"
 eastindiamanDESCR:0 "Navire marchand appartenant à la Compagnie du Rahen Oriental."
 east_mongolian_steppeDESCR:0 "Archers à cheval équipés d'arcs composites distingués par leur grande vitesse et puissance."
 ethiopian_guerilla_warfareDESCR:0 "Petits groupes de guerriers des montagnes nord-africaines employant des tactiques de guérilla pour harceler leur ennemi."
 ethiopian_gunpowder_warfareDESCR:0 "Guerriers africains du Nord armés de mousquets et possédant des tactiques défensives supérieures."
 ethiopian_mountain_warfareDESCR:0 "Guerriers des montagnes avec de bonnes compétences défensives adaptées au climat des montagnes africaines."
 fluteDESCR:0 "Un cargo développé à la Couronne-de-Dame au XVIe siècle, il fut construit pour maximiser l'espace de cargaison et l'efficacité de l'équipage. Et il devint l'un des navires les plus couramment utilisés aux XVIe et XVIIe siècles. La conception standard n'était pas armée mais en cas de besoin, il pouvait être armé de canons et servir de navires auxiliaires."
 french_carabinierDESCR:0 "Les carabiniers apparurent pour la première fois au XVIe siècle et étaient un type de cavalerie lourde qui avait beaucoup en commun avec les cuirassiers. Ils portaient également une armure de protection, bien que légèrement moins qu'un cuirassier. La principale différence entre eux était leur armement. L'arme principale des carabiniers était la carabine, parfois aussi appelée arquebuse, une courte arme à feu à rouet. En plus de la carabine, ils étaient également armés de pistolets et d'une épée."
 french_caracolleDESCR:0 "À la fin du XVIe et au début du XVIIe siècle, la formation de combat la plus courante pour la cavalerie cannorienne occidentale était la caracole, qui pouvait être employée de deux façons. Avec la première méthode, le premier rang de la formation de cavalerie chargeait frontalement contre l'ennemi, les cavaliers tirant leurs armes à une portée de 30 à 50 pas. Puis ils faisaient demi-tour et retournaient à l'arrière de la formation pour devenir le dernier rang. Le rang suivant chargerait de la même manière, tirerait sur l'ennemi et retournerait à l'arrière. Avec cette formation, le premier rang était toujours en train de charger tandis que les autres rangs chargeaient et attendaient leur tour de charger. Une autre méthode était de charger en file indienne, tirant quand les ennemis étaient sur leur droite puis continuant dans un mouvement circulaire, tout en rechargeant et retournant reformer les lignes dans une attaque continue."
 french_cuirassierDESCR:0 "Les cuirassiers étaient un type de cavalerie lourde qui émergea à la fin du XVe siècle. Ce type de cavalerie était blindé de la tête jusqu'aux genoux. Son corps était protégé par un plastron, la cuirasse dont ils tiraient leur nom. Le plastron était conçu pour résister non seulement au tir d'un pistolet mais aussi à celui d'une balle tirée d'un mousquet. Ils étaient armés de pistolets à rouet, de lances et d'épées. Les cuirassiers étaient principalement utilisés comme cavalerie de choc et furent en service pendant presque toute la période couverte par ce jeu."
 french_bluecoatDESCR:0 "Ayant ses origines dans les armées françaises de Louis XIV. L'infanterie aux Habits Bleus affiche un élan particulier à l'attaque. Parfait pour les dirigeants qui croient que l'offensive triomphera toujours de la défensive."
 french_dragoonDESCR:0 "Au XVIIe siècle, un nouveau type de cavalerie appelé dragons fut créé. Les dragons étaient essentiellement de l'infanterie qui se transportait à cheval. Le nom dragon vient de l'arme qu'ils portaient, un type court de mousquet ou carabine, appelé dragon. Les dragons étaient largement utilisés par toutes les nations cannoriennes, principalement parce qu'ils étaient moins chers que la cavalerie normale."
 french_impulseDESCR:0 "Pendant la guerre de Succession d'Autriche, l'Autriche faisait face à une défaite sérieuse. La Silésie avait déjà été perdue au profit de la Prusse et la défaite totale n'était pas loin. Afin d'aider à renverser le cours de la bataille, des unités irrégulières de la frontière militaire furent amenées sur les principaux champs de bataille pour aider les armées impériales en difficulté. L'utilisation de l'infanterie en ordre dispersé était révolutionnaire sur le champ de bataille cannorien. La solution la plus extrême était l'unité de guerre d'impulsion. Ces unités mettaient en avant un nuage de tirailleurs dont le tir constant désorganisait et démoralisait l'ennemi avant que la charge en masse de l'infanterie en colonne ne délivre le coup de grâce."
 frigateDESCR:0 "Avec le temps, la frégate évolua. Elle devint plus grande et lourdement armée, parfois avec deux ponts de canons. La combinaison de vitesse et de puissance de feu de la frégate signifiait qu'elle pouvait distancer tout navire avec plus de canons et surpasser en armes tout navire plus rapide."
 gaelic_free_shooterDESCR:0 "Le développement de meilleures armes à feu força un changement de tactique pour les mercenaires gaéliques. Ces guerriers endurcis attendaient maintenant la première salve de l'ennemi puis déchaînaient leur charge irrésistible."
 gaelic_galloglaighDESCR:0 "Les galloglaigh étaient des bandes de mercenaires des Hébrides qui mélangeaient les styles de guerre gaéliques et nordiques traditionnels avec grand effet. Comme de nombreux guerriers gaéliques avant eux, les galloglaigh utilisaient la hache de bataille à deux mains, mais étaient également bien blindés dans le style nordique avec des cottes de mailles et des casques. Ils apparurent en Irlande à partir du milieu du XIIIe siècle et devinrent rapidement des guerriers très recherchés au service des grands chefs irlandais, jusqu'au XVIe siècle. Les galloglaigh combattaient aux côtés de leurs suivants dans ce qu'on appelait un 'spar', composé du guerrier, de son kern (un écuyer gaélique armé d'une pique ou d'un javelot) et de son garçon de chevaux (armé d'un arc court ou d'une gerbe de dards). Collectivement, ces spars se regroupaient en bandes de guerre, ou Corrughadh, qui pouvaient compter plus d'une centaine de membres. Les galloglaigh étaient craints par les Anglais car, bien qu'ils ne fassent pas le poids contre une lourde armée médiévale en terrain découvert, ils se révélaient une force mortelle dans les petites confrontations rapprochées. En conséquence, ils étaient souvent utilisés par les seigneurs irlandais comme troupes de choc dans des situations d'embuscade. Ces guerriers hébridais connurent également le succès sur le champ de bataille ouvert, notamment à Bannockburn en 1314."
 gaelic_mercenaryDESCR:0 "À mesure que l'armement à poudre et les techniques d'exercice se répandaient à travers Cannor, les méthodes traditionnelles de guerre écossaises et irlandaises commencèrent à devenir obsolètes, le temps des bandes de guerre et des galloglaigh touchait à sa fin. Cependant, les mercenaires écossais et irlandais étaient toujours craints comme combattants, surtout par les armées anglaises envahisseuses. Ceux qui s'adaptèrent aux nouvelles techniques étaient hautement valorisés pour leur bravoure et leur courage, notamment les Redshanks d'Écosse et les Buanadha (hommes cantonnés) d'Irlande. Après le XVIe siècle, de nombreux mercenaires écossais et irlandais pouvaient également être trouvés dans les armées de tout Cannor, notamment pendant la Guerre de Trente Ans."
 galleassDESCR:0 "La galéasse était une adaptation de la grande galère marchande pour contrer l'utilisation croissante des navires de guerre. Plus grande que la galère, la galéasse avait environ 32 paires de rames, chaque rame maniée par jusqu'à cinq hommes. En réponse à l'armement et aux flancs plus hauts des navires de guerre, la galéasse avait des châteaux avant et arrière et des ponts de canons au-dessus des rameurs. Ce poids supplémentaire signifiait qu'elle devait aussi plus compter sur les voiles, et était plus lente et moins maniable que les galères. Comme la galère, la galéasse sortit de l'usage régulier avec l'introduction de navires de guerre hauturiers plus avancés, mais resta utile dans les eaux peu profondes jusqu'au XVIIIe siècle."
 galleonDESCR:0 "Un grand navire à voiles généralement à trois mâts, originellement conçu comme navire de guerre mais utilisé plus tard principalement pour le commerce et le négoce."
 galleyDESCR:0 "Avec des racines remontant aux navires anciens de l'antiquité, la galère resta le premier choix pour la guerre navale du Divenhal jusqu'au XVIe siècle. La galère était principalement propulsée par des rames, généralement environ 25 paires maniées par jusqu'à trois hommes chacune. Cela signifiait qu'elle était moins dépendante du vent que les navires à voiles, et sa maniabilité en faisait un adversaire redouté. Finalement, la galère sortit de l'usage régulier avec l'introduction de navires de guerre hauturiers plus avancés, mais resta utile dans les eaux peu profondes jusqu'au XVIIIe siècle."
 germanized_pikeDESCR:0 "Quand les Goths vainquirent les Romains à la bataille d'Adrianople, cela annonça une nouvelle ère dans la guerre cannorienne. La cavalerie devint la force dominante sur le champ de bataille et l'infanterie reléguée à fournir une base autour de laquelle la cavalerie pouvait manœuvrer. Les victoires anglaises dans la Guerre de Cent Ans, bien qu'avec des armées d'infanterie, reposaient sur des tactiques défensives. Cependant, les piquiers suisses de la fin du XVe siècle donnèrent à nouveau à l'infanterie un rôle offensif. Cela fut rapidement remarqué par les pays de Cannor oriental et des mercenaires allemands furent invités à enseigner ces nouvelles tactiques."
 han_bannerDESCR:0 "Troupes d'infanterie Ming armées de mousquets qui furent incorporées dans le système de bannières créé à l'origine par les Mandchous au XVIIe siècle."
 heavy_frigateDESCR:0 "Navires à deux ponts portant normalement environ 40 canons."
 houfniceDESCR:0 "On croit que les obusiers modernes tirent leur nom de l'artillerie Houfnice développée par les Marcheurs de la Marée Verte au XVe siècle. Ces canons à canon court étaient montés sur des chariots et utilisés sur le champ de bataille pour tirer des boulets et des boîtes à mitraille sur la horde orque en soutien de l'infanterie."
 huron_arquebusierDESCR:0 "Le guerrier au tomahawk mettait fortement l'accent sur les tactiques de feu même avant l'introduction de la poudre. Adoptant les avantages de ces armes, l'arquebusier amérindien mit fortement l'accent sur le feu offensif et la cohésion au combat. Il n'était pas aussi efficace dans l'action de choc que le mousquetaire offensif."
 inca_mountain_warfareDESCR:0 "À mesure que de nouvelles armes et tactiques devenaient disponibles, les robustes guerriers des montagnes commencèrent à s'améliorer. Ces guerriers accordaient toujours une grande importance à la défense, comptant sur leur endurance pour la victoire. Les améliorations de l'armure et de l'entraînement rendaient la victoire sur ces unités une entreprise difficile."
 irish_chargeDESCR:0 "Les descendants linéaires des mercenaires gaéliques des époques antérieures. Ces unités mettaient un maximum d'accent sur les charges d'infanterie pour tuer et terrifier leurs ennemis. Leur charge pouvait être plus dévastatrice que la cavalerie de l'époque, les rendant redoutables à l'attaque."
 iroquois_rifle_scoutDESCR:0 "L'éclaireur au fusil est une unité spécialisée dans le harcèlement de l'ennemi. Cette unité peut ne pas durer aussi longtemps au combat qu'une unité plus disciplinée. Cependant, ces guerriers sont d'excellents tireurs et leur prouesse au fusil peut causer des dommages sérieux à l'ennemi."
 italian_condottaDESCR:0 "Condotta est le mot italien pour 'contrat' et il était utilisé pour décrire les unités mercenaires qui combattaient principalement en Italie pour les diverses cités-états. Les chefs d'un régiment de Condotta étaient appelés Condottiere. Les plus célèbres parmi eux étaient Sir John Hawkwood, Francesco Sforza et Bartolomeo Colleoni. Les Condotta n'étaient pas très loyaux envers leurs employeurs, changeant souvent de camp en raison d'une meilleure paye. Quand les Condotta combattaient entre eux, ils faisaient aussi des accords pour ne pas trop se faire de mal et la guerre en Italie devint souvent une sorte de théâtre. Les régiments Condotta étaient composés de chevaliers blindés et d'infanterie lourde et légère et d'arbalétriers. Les Condotta avaient un monopole sur la guerre en Italie, ce qui signifiait qu'ils utilisaient encore d'anciennes armes et tactiques quand les autres armées cannoriennes avaient déjà adopté une infanterie composée de mousquetaires et de piquiers."
 japanese_archerDESCR:0 "Les archers asiatiques étaient la force la plus importante dans les batailles asiatiques de cette époque. Les arcs étaient typiquement faits de bambou mais généralement plus longs que les arcs cannoriens."
 japanese_footsoldierDESCR:0 "Les fantassins étaient la forme la plus basse de guerriers dans la hiérarchie de l'époque. Ils étaient composés de roturiers et de nobles de basse classe, et formaient l'ossature de l'armée du souverain. Au début, les fantassins n'étaient que des mercenaires et des aventuriers, payés avec des biens pillés, mais plus tard ils devinrent un élément central de l'armée du seigneur local. À mesure que les batailles, les guerres et la taille des armées devenaient plus complexes, ils étaient vigoureusement entraînés pour pouvoir tenir bon contre les forces ennemies venant à leur rencontre. Les fantassins étaient principalement armés de lances mais certains portaient des épées/katanas et d'autres étaient utilisés pour faire fonctionner les machines de guerre, tout en étant équipés de divers arcs. Les fantassins avaient généralement une armure légère, composée de plaques de cuir cousues ensemble ou d'un mélange d'armures en cuir et en fer/cuivre. Cela les rendait plus agiles sur le champ de bataille mais parfois vulnérables contre leurs adversaires. Dans les périodes ultérieures, les fantassins reçurent également des armes à feu."
 japanese_samuraiDESCR:0 "Les samouraïs étaient les nobles de l'époque au Japon. Samouraï signifiait 'servir'. Ils étaient bien éduqués et extrêmement bien entraînés au combat. Ils combinaient leur combat avec les arts et la littérature comme passe-temps. Les samouraïs étaient gouvernés par un code appelé Bushido signifiant 'Voie du Guerrier'. Si leur seigneur mourait ou perdait une guerre, ils devaient commettre le Seppuku (suicide assisté) dans le cadre du Code Bushido. Le samouraï devait faire la même chose et suivre son maître dans l'au-delà. Le samouraï était un adversaire redouté sur le champ de bataille car hautement entraîné dans les arts du combat. Il pouvait manier un katana avec grande habileté ou utiliser le yumi (arc long japonais) à cheval ou à pied."
 large_cast_bronze_mortarDESCR:0 "Les plus grands canons de l'époque étaient si énormes qu'ils nécessitaient des centaines d'hommes et de bœufs pour les déplacer. Ils avaient une immense puissance de destruction mais ne pouvaient tirer qu'un nombre limité de fois pendant la journée en raison des difficultés de chargement et de visée de ces bêtes."
 large_cast_iron_bombardDESCR:0 "Une version plus grande de la bombarde standard. Cette pièce d'artillerie de siège cannorienne ancienne était conçue pour lancer des objets lourds sur les défenses ennemies. Un exemple notable de grande bombarde est le Souffle de Malliath, qui fut envoyé en cadeau par le Hiérarque Mordibam Quintain de Nimscodd au Grand Maître Lothane Bluetusk du Corintar en 1453. Bien qu'elles fussent des armes dévastatrices, les plus grandes bombardes mettaient longtemps à refroidir après chaque tir, ce qui signifiait qu'elles étaient d'une utilité limitée sur le champ de bataille et restaient principalement destinées aux sièges."
 leather_cannonDESCR:0 "Le canon de cuir fut d'abord utilisé par les armées du Grand Croisé corinite Malabec d'Annistoft pendant les Guerres Corinites. L'artillerie cannorienne à cette époque était trop grande et lourde pour être mobile sur un champ de bataille, et n'était vraiment utilisée que pendant les sièges. L'introduction d'un canon plus léger et mobile permit aux Corinites de manœuvrer leur artillerie pour répondre aux mouvements de l'ennemi et leur donna un avantage tactique distinct sur leurs ennemis. Malheureusement, le canon de cuir utilisé par les Corinites avait une faiblesse particulière qui le rendait hautement impraticable. Composé d'un tube de cuivre étroit recouvert de lanières de cuir et de corde, son enveloppe causait une surchauffe dangereuse du canon pendant une utilisation continue. Néanmoins, le canon de cuir marqua le début du développement de l'artillerie légère de campagne et du concept d'apporter une puissance de feu lourde à l'ennemi."
 defensive_leather_cannonDESCR:0 ""
 mali_tribal_warfareDESCR:0 "Un guerrier tribal traditionnel nord-africain armé d'une lance et d'un bouclier caractéristique excellant quelque peu plus dans les stratégies défensives."
 mamluk_archerDESCR:0 "Les guerriers esclaves non musulmans, capturés enfants et entraînés à combattre pour leurs maîtres islamiques, constituaient une portion essentielle du système militaire du monde islamique. Le tir à l'arc n'était pas seulement partie de leur entraînement militaire mais consommait aussi une grande partie de leurs loisirs, faisant d'excellentes unités d'archers."
 mamluk_cavalry_chargeDESCR:0 "Les guerriers esclaves non musulmans, capturés enfants et entraînés à combattre pour leurs maîtres islamiques, constituaient une portion essentielle du système militaire du monde islamique. Les tactiques de cavalerie et l'équitation devinrent partie intégrante de leur entraînement plus tard, à mesure qu'ils devenaient adeptes des croyances islamiques."
 mamluk_duelDESCR:0 "Infanterie spécialisée dans le combat singulier, utilisant les épées comme arme de choix principale."
 mamluk_musket_chargeDESCR:0 "Malgré la résistance initiale à leur égard, les mousquets furent finalement ajoutés à la charge de cavalerie traditionnelle au XVIIIe siècle."
 manchu_bannerDESCR:0 "Unité de cavalerie légère appartenant au système militaire des Bannières développé par les Mandchous au début du XVIIe siècle. Le système était conçu pour organiser la population civile et militaire en divisions militaires."
 maya_forest_warfareDESCR:0 "Le guerrier forestier continua à s'améliorer à mesure que de nouvelles technologies et tactiques devenaient disponibles. Conservant son équilibre entre attaque et défense, il continua à s'améliorer dans les deux domaines."
 maya_guerilla_warfareDESCR:0 "Ces unités ne dureront pas aussi longtemps au combat que les autres unités de guérilla, mais elles compensent en étant plus efficaces à l'offensive. Échangeant l'endurance contre la capacité d'infliger des dommages supplémentaires à l'ennemi."
 maya_gunpowder_warfareDESCR:0 "Le mousquetaire forestier resta fidèle aux tactiques qui l'avaient servi à l'ère pré-poudre. L'équilibre entre attaque et défense resta, mais maintenant l'introduction des armes à poudre par les Cannoriens les rendait simplement plus mortels."
 maya_tribal_warfareDESCR:0 "Les forêts et jungles d'Amérique centrale étaient le foyer de la civilisation maya. Le terrain n'était pas aussi ouvert que plus au nord, donnant plus d'avantages au défenseur. Ici, des unités militaires évoluèrent qui convenaient aussi bien à l'attaque qu'à la défense, bien que ne se spécialisant dans aucune des deux."
 merchantmanDESCR:0 "Un grand navire cargo utilisé pour le transport de marchandises."
 mexican_guerilla_warfareDESCR:0 "La guérilla centre-américaine se spécialise dans les attaques pour épuiser le moral ennemi. Bien qu'infligeant plus de pertes que la guérilla sud-américaine, ils sont aussi légèrement plus faciles à épuiser."
 mongol_bowDESCR:0 "Troupes d'infanterie légère couramment utilisées dans la première étape d'une bataille. Leur but était d'arroser les troupes adverses de flèches, abaissant ainsi leur moral avant que la force principale n'attaque."
 mongolian_bowDESCR:0 "Unités de cavalerie spécialisées dans les techniques d'embuscade. Elles attendaient leurs ennemis en embuscade, les attaquant par surprise puis se retiraient rapidement avant que l'ennemi n'ait le temps de se regrouper."
 mongol_steppeDESCR:0 "Archers à cheval équipés d'arcs composites distingués par leur grande vitesse et puissance."
 mongol_swarmDESCR:0 "Archers à cheval spécialisés dans les attaques en essaim, où l'objectif était de submerger leurs ennemis en attaquant en masse."
 steppe_riders:0 "Cavaliers des steppes"
 steppe_ridersDESCR:0 "Sur les vastes étendues de la steppe, l'arme de cavalerie resterait dominante bien plus longtemps que dans d'autres régions. Comme cela était principalement dû à la mobilité extrême possible sur ce terrain, les troupes montées continueraient à être plutôt légèrement armées même après l'introduction des armes à poudre. Avant l'introduction des armes à feu plus légères, les arcs, épées et lances légères restaient l'arme de choix pour la cavalerie des steppes de la Crimée à la Mandchourie."
 steppe_lancers:0 "Lanciers des steppes"
 steppe_lancersDESCR:0 "Les tactiques traditionnelles des steppes avec des archers à cheval et des lanciers continuèrent à dominer les champs de bataille, les raids dans les terres colonisées fournissant à la fois des armes plus modernes et la connaissance pour en faire usage."
 steppe_mounted_raiders:0 "Raiders à cheval des steppes"
 steppe_mounted_raidersDESCR:0 "Avec le temps, le développement des armes à feu et les tactiques pour en faire usage s'améliorèrent. Bien qu'elles ne surpassent pas les armes traditionnelles des cavaliers des steppes, les armes à feu deviendraient bientôt partie intégrante de la guerre montée des steppes. À mesure que les canons devenaient plus légers et plus petits, certains pouvaient également être apportés à dos de cheval pour être utilisés dans les frontières toujours changeantes des plaines."
 steppe_cavalry:0 "Cavalerie des steppes"
 steppe_cavalryDESCR:0 "La cavalerie des steppes continuerait à exceller dans les raids, l'escarmouche et la reconnaissance, et de nombreux pays sédentaires aux frontières des steppes en viendraient à employer des Cosaques, des Tatars et d'autres cavaliers des steppes à ces fins. Les coutumes libres des steppes resteraient de bien des façons dans de telles unités, mais dans une certaine mesure leur existence contribua à un changement d'organisation et à un mouvement vers une structure d'armée plus moderne."
 steppe_uhlans:0 "Uhlans des steppes"
 steppe_uhlansDESCR:0 "Avec le temps, les armées des steppes en vinrent à moins compter sur le pillage pour couvrir leurs coûts d'opération et plus sur la solde d'un commandement centralisé. Leurs tactiques reposaient toujours sur la mobilité et les armes légères comme les pistolets et les lances, et en terrain ouvert ils pouvaient encore être assez meurtriers pour une force sédentaire non préparée, mais au lieu de dominer le champ de bataille seuls, ils agissaient maintenant souvent comme complément à d'autres types de troupes comme les hussards ou même l'infanterie."
 steppe_raiders:0 "Raiders des steppes"
 steppe_raidersDESCR:0 "Bien qu'elles fassent une entrée précoce, les armes à feu furent lentes à faire une grande différence dans les steppes en raison de la nature mobile de la guerre. La cavalerie continuerait à être l'arme dominante pour les armées des steppes tout au long du début de l'ère moderne avant que les armes à feu ne soient rendues plus légères et plus précises. Les couteaux et les épées resteraient longtemps l'arme de choix au combat rapproché pour l'infanterie des steppes."
 steppe_footmen:0 "Fantassins des steppes"
 steppe_footmenDESCR:0 "La nature mobile de la guerre des steppes signifiait toujours que l'infanterie serait désavantagée par rapport à la cavalerie en termes de mobilité, et dans les grands paysages ouverts, cela signifiait que de nombreuses tactiques d'infanterie sédentaire seraient bien moins viables dans les plaines. Pour contrer cela, l'infanterie des steppes formait fréquemment des forts de chariots au combat, ce qui leur permettait une mobilité protégée sur le champ de bataille. Protégée par les forts de chariots, l'infanterie pouvait utiliser des armes à feu et des arcs tout en restant à l'abri des attaques de cavalerie."
 steppe_musketeers:0 "Mousquetaires des steppes"
 steppe_musketeersDESCR:0 "Pour être efficace dans les steppes, l'infanterie continuait à créer des forts mobiles sur les champs de bataille d'où des mousquets et des canons plus légers pouvaient être dirigés contre l'ennemi sans risque que les chocs de cavalerie de la cavalerie légère des steppes ne brisent leurs formations. Des soldats légèrement armés faisaient aussi des raids plus profondément en territoire ennemi en utilisant des bateaux le long des grands fleuves des plaines."
 steppe_infantry:0 "Infanterie des steppes"
 steppe_infantryDESCR:0 "Avec les canons et les armes à feu devenant plus légers et plus précis, les forts de chariots des steppes pouvaient être utilisés plus offensivement. Le fort entier se déplaçait à l'unisson vers des positions défensives d'où ils pouvaient déchaîner une grêle de feu de mousquets et de canons. À mesure que la bataille se développait, la cavalerie était alors déchaînée de l'intérieur du fort sur l'ennemi en fuite. Les canons utilisés étaient de petit calibre de sorte qu'ils pouvaient être apportés à dos de cheval avec l'armée alors qu'elle se déplaçait sur les steppes."
 steppe_rifles:0 "Fusiliers des steppes"
 steppe_riflesDESCR:0 "Bien que les bases de la guerre des steppes n'aient pas changé, l'évolution générale de la guerre conduirait avec le temps à plusieurs développements dans les armées des hordes. À mesure que les puissances sédentaires repoussaient les frontières des steppes libres, fortifiant des zones autrefois nomades et créant leurs propres régiments de Cosaques, de Tatars et similaires, les pays des steppes eux-mêmes en viendraient souvent à être dominés par et à adopter les meilleures armes et les idées plus organisées de leurs voisins."
 reformed_steppe_rifles:0 "Fusiliers des steppes réformés"
 reformed_steppe_riflesDESCR:0 "À la fin du XVIIIe siècle, les armées des steppes avaient à bien des égards traversé des transitions similaires à celles des militaires à l'ouest. Bien que la guerre resterait plus mobile que dans les régions sédentaires, l'équipement et l'organisation évoluèrent pour ressembler davantage aux armées permanentes. La mobilité et la dépendance à d'anciennes tactiques telles que les raids et les attaques surprises utilisant des bateaux continueraient cependant à être employées régulièrement jusqu'au XIXe siècle."
 muscovite_caracolleDESCR:0 "Avec la découverte qu'une infanterie étroitement formée pouvait résister à l'action de choc de la cavalerie, et que l'utilisation d'armes à poudre infligerait un terrible tribut à l'attaquant, de nouvelles tactiques de cavalerie étaient nécessaires. L'une des premières fut la caracole (ou spirale) où la cavalerie utilisait le feu pour perturber les formations d'infanterie avant de tenter une charge. Développée en Occident au XVIe siècle, elle se répandit rapidement vers l'est."
 muscovite_cossackDESCR:0 "La cavalerie cosaque évoluait régulièrement avec le temps. Plutôt que d'être une force de cavalerie de choc comme les nouveaux hussards plus lourds, ils se spécialisaient dans l'escarmouche et utilisaient des pistolets pour désorganiser l'ennemi."
 muscovite_musketeerDESCR:0 "Avec l'utilisation à grande échelle des armes à poudre sur les champs de bataille de Cannor oriental, de nouvelles unités commencèrent à être développées pour en tirer avantage. Ayant ses origines dans les Streltsy de Moscovie, ces unités évoluèrent en unités armées de mousquets qui mettaient leur accent principal sur l'attaque plutôt que sur la défense."
 muscovite_soldatyDESCR:0 "L'introduction du tercio dans la guerre cannorienne orientale fut accueillie par ceux qui voyaient le tercio comme trop défensif et qui croyaient que l'infanterie devrait être employée plus offensivement. L'infanterie Soldaty remplit ce rôle."
 native_indian_archerDESCR:0 "Les peuples chasseurs-cueilleurs apprirent tôt à valoriser un homme avec une bonne visée avec son arc. En temps de paix, cela pouvait faire la différence entre famine et survie ; en temps de guerre, défaite ou victoire."
 native_indian_mountain_warfareDESCR:0 "Certains des guerriers les plus coriaces des Amérindiens étaient les peuples des montagnes. Souvent poussés dans les montagnes par des ennemis plus forts, ils devaient être coriaces pour survivre."
 native_clubmenDESCR:0 "Le massier indigène est à l'origine de tous les guerriers : prendre quelque chose de dur, frapper votre adversaire."
 native_indian_tribal_warfareDESCR:0 "Avec le rassemblement des indigènes en tribus, protégeant souvent des zones spécifiques, il évolua souvent un état de guerre endémique. Le sentier de la guerre était un moyen de prouver votre valeur, et souvent un rite de passage pour les jeunes hommes."
 niger_kongolese_forest_warfareDESCR:0 "Guerriers forestiers avec d'assez bonnes compétences offensives et défensives adaptées au climat des forêts africaines."
 niger_kongolese_guerilla_warfareDESCR:0 "Petits groupes de guerriers forestiers d'Afrique centrale employant des tactiques de guérilla pour harceler leur ennemi."
 niger_kongolese_gunpowder_warfareDESCR:0 "Guerriers africains de l'Ouest armés de mousquets et possédant d'assez bonnes tactiques défensives et offensives."
 niger_kongolese_tribal_warfareDESCR:0 "Un guerrier tribal traditionnel d'Afrique centrale armé d'une lance et d'un bouclier caractéristique. Combattant équilibré, bon pour les stratégies offensives et défensives."
 ottoman_azabDESCR:0 "Les Azabs étaient soit des unités d'infanterie légère employées comme archers, soit des fantassins équipés d'épées et de boucliers spécialisés dans le combat rapproché."
 ottoman_janissaryDESCR:0 "Unités d'infanterie composées à l'origine d'esclaves et de prisonniers de guerre qui formaient le corps principal des gardes et protecteurs personnels du Sultan."
 ottoman_lancerDESCR:0 "Le sultan ottoman, Selim III, commença son règne en conduisant une réforme militaire approfondie. Une unité de cavalerie plus occidentalisée, armée d'une lance, remplaça la cavalerie existante."
 ottoman_new_modelDESCR:0 "Le sultan ottoman, Selim III, commença son règne en conduisant une réforme militaire approfondie. Un nouveau type de troupe d'infanterie occidentalisée fut conçu pour remplacer les janissaires qui avaient constitué la force la plus significative de l'armée ottomane pendant si longtemps."
 ottoman_nizami_cedidDESCR:0 "Une infanterie musulmane réformée, influencée par les écoles et tactiques cannoriennes occidentales. Ces guerriers adoptèrent des uniformes et des armes cannoriens et implémentèrent également des stratégies militaires occidentales dans leur entraînement."
 ottoman_musellemDESCR:0 "Unité de cavalerie légère composée le plus souvent de mercenaires étrangers."
 ottoman_reformed_janissaryDESCR:0 "À la fin du XVIIe siècle, les janissaires, avec les sipahis, constituaient le corps principal des unités militaires du monde musulman occidental."
 ottoman_reformed_spahiDESCR:0 "À la fin du XVIIe siècle, les janissaires, avec les sipahis, constituaient le corps principal des unités militaires du monde musulman occidental."
 ottoman_sekbanDESCR:0 "Unité d'infanterie provinciale composée de paysans devenus soldats."
 ottoman_spahiDESCR:0 "Une unité de cavalerie d'élite musulmane assez similaire aux chevaliers de Cannor."
 ottoman_timariotDESCR:0 "Une unité de cavalerie servant directement sous le Sultan. Le Timariot recevait un morceau de terre en échange de ses services, mais il devait également apporter son propre équipement et ses propres serviteurs en temps de guerre."
 ottoman_toprakli_dragoonDESCR:0 "Une unité de cavalerie provinciale équipée d'un sabre ou d'une carabine et bien connue pour ses compétences équestres."
 ottoman_toprakli_hit_and_runDESCR:0 "Une unité de cavalerie légère connue pour sa mobilité et sa vitesse. Ils étaient généralement la première division à attaquer l'armée adverse en implémentant une tactique de frappe et retrait."
 ottoman_yayaDESCR:0 "Une infanterie d'archers musulmane également connue sous le nom de Piyade. Les troupes Yaya étaient principalement composées de mercenaires et toujours en attente et étaient donc souvent très bien payées pour leurs services militaires."
 pedreroDESCR:0 "Canons relativement légers comparés aux coulevrines, utilisant des boulets de pierre comme munitions en raison de leur légèreté par rapport aux boulets de fer."
 persian_cavalry_chargeDESCR:0 "Troupes de cavalerie équipées d'épées à lame fine, fortement courbes, à une main. Plus efficaces dans les charges contre l'infanterie ou les troupes de cavalerie sans armure."
 persian_footsoldierDESCR:0 "Fantassin de rang inférieur généralement armé d'une épée."
 persian_rifleDESCR:0 "Pendant l'ère Qajar, l'armée perse subit d'importantes réformes occidentalisantes. Avec l'aide de conseillers étrangers, les troupes furent entraînées aux stratégies et technologies militaires occidentales."
 persian_shamshirDESCR:0 "Infanterie équipée d'épées à lame fine, fortement courbes, à une main. Plus efficace contre l'infanterie ou la cavalerie ne portant pas d'armure."
 peruvian_guerilla_warfareDESCR:0 "La guérilla sud-américaine est un adversaire coriace. Bien qu'ils n'infligent pas beaucoup de dommages à l'opposition, cela peut prendre longtemps pour épuiser ces unités."
 polish_hussarDESCR:0 "Le hussard original était une unité de cavalerie légère conçue principalement pour l'escarmouche. Cependant, le champ de bataille exigeait que les unités soient mieux blindées et plus lourdes. Ainsi le hussard évolua, menant finalement aux célèbres hussards ailés."
 polish_musketeerDESCR:0 "Avec la propagation croissante des armes à poudre, la question de ce que l'infanterie armée de mousquets devait faire sur le champ de bataille fut bientôt soulevée. En Pologne, il se développa une école de pensée selon laquelle les mousquetaires devaient être utilisés comme une arme défensive pour soutenir la cavalerie."
 polish_tercioDESCR:0 "Bien que le tercio en vînt à dominer les champs de bataille cannoriens, il était initialement trop lent pour être utile sur les champs de bataille plus ouverts dominés par la cavalerie de Cannor oriental. Cependant, à mesure que la composante de pique du tercio diminuait, lui donnant plus de puissance de feu, il devint plus utile sur les champs de bataille orientaux."
 polish_winged_hussarDESCR:0 "À l'époque médiévale, les chevaliers montés avaient dominé le champ de bataille médiéval mais furent ensuite remplacés par des mousquetaires et des piquiers. Au XVIIe siècle, les forces de cavalerie étaient encore utilisées pour un effet de surprise dans les batailles, mais avaient souvent peu de chances contre des piquiers disciplinés. Par conséquent, les forces de cavalerie étaient peu utilisées en Cannor occidental. En Cannor oriental avec ses vastes steppes, la cavalerie restait très importante. Les hussards ailés y jouaient un rôle clé. Les Polonais développèrent un excellent sabre courbé (le 'palasz'), sélectionnèrent des chevaux spécialement pour leur vitesse et leur endurance et ils portaient des lances de six mètres qui pouvaient percer l'armure d'un piqueur. Les hussards ailés devinrent une cavalerie lourdement blindée qui mena d'innombrables actions victorieuses contre une variété d'ennemis. Ils jouèrent un rôle clé dans la légendaire levée du siège turc de Vienne par Jean Sobieski en 1683. Jean Sobieski envoya quatre groupes de cavalerie hussarde dans une charge furieuse qui brisa la ligne de bataille turque, les dispersant dans la confusion. Cette victoire des hussards ailés polonais vit Jean Sobieski salué comme le 'sauveur de Vienne'."
 prussian_uhlanDESCR:0 "Les premiers uhlans furent créés au début du XVIIIe siècle. Ils étaient utilisés principalement pour la reconnaissance pour la cavalerie plus lourdement blindée, ainsi qu'assignés aux escarmouches. Plus tard au XVIIIe siècle, ils devinrent une partie essentielle de la structure militaire en raison de leur armure légère les rendant rapides et agiles sur le champ de bataille et pour leur haute valeur de choc contre leurs ennemis, ce qui dans certains cas renversa le cours des batailles. Les uhlans étaient une bonne alternative aux grandes armées d'infanterie car ils étaient non seulement frappants mais aussi plus rentables. Cela permettait aux nations plus petites avec moins de main-d'œuvre de mener un combat efficace, car les armées à pied étaient également plus lentes que leurs homologues montées."
 prussian_drillDESCR:0 "Les soldats exercés étaient des soldats qui avaient été vigoureusement entraînés, de sorte qu'ils savaient exactement quoi faire dans une situation de combat. Ils étaient également moins susceptibles de rompre les rangs en combattant l'ennemi. Un exemple serait les soldats exercés prussiens. Ils étaient parmi les soldats les mieux entraînés et équipés au monde à l'époque. Ils étaient très disciplinés et bien entraînés pour presque toute situation. Leur réputation était si bonne que les colonies américaines avaient demandé que des instructeurs d'exercice prussiens soient envoyés pour entraîner les colons afin qu'ils puissent combattre les Britanniques."
 pueblo_ambushDESCR:0 "Dans le terrain accidenté des contreforts des Rocheuses, de nouvelles tactiques construites autour de l'embuscade commencèrent à se développer. Ces unités n'avaient pas l'endurance de l'infanterie de montagne mais elles blessaient le moral des ennemis avec leurs tactiques d'embuscade."
 qizilbash_cavalry_unitDESCR:0 "Unités de cavalerie, armées de lance, d'épée ou d'arc, facilement reconnaissables à leur coiffe rayée rouge et or, portée pour exprimer leur dévotion à la division Duodécimaine de l'islam chiite."
 reformed_asian_cavalryDESCR:0 "Cavalerie asiatique occidentalisée plus adaptée aux tactiques et stratégies occidentales."
 reformed_asian_musketeerDESCR:0 "Infanterie asiatique occidentalisée équipée de mousquets et plus adaptée aux tactiques et stratégies occidentales."
 reformed_manchu_rifleDESCR:0 "Une armée développée sous la dynastie Qing après la conquête mandchoue de Yanshen. L'armée constituait l'essentiel des opérations militaires et était composée principalement de soldats chinois Han."
 royal_mortarDESCR:0 "Au XVIIIe siècle, l'utilisation de l'artillerie sur le champ de bataille devint plus répandue. Les troupes étaient maintenant capables de déplacer leurs canons de campagne avec beaucoup plus d'aisance et de vitesse."
 defensive_royal_mortarDESCR:0 ""
 russian_cossackDESCR:0 "Les Cosaques restèrent partie intégrante des armées cannoriennes orientales. Bien que ni aussi disciplinées ni aussi efficaces dans la charge que la cavalerie lourde. Ces unités légères se spécialisaient dans les raids et le tir isolé pour perturber leurs adversaires."
 russian_cuirassierDESCR:0 "Le cuirassier tire son nom de la cuirasse, un plastron porté par les unités de cavalerie les plus lourdes. Brandissant une épée lourde plutôt qu'un sabre léger, ces unités sont redoutables quand elles chargent. Généralement soutenues par des unités de cavalerie équipées de carabines pour leur donner une puissance supplémentaire, ces unités ajoutent une puissance de choc à toute armée."
 russian_massDESCR:0 "Les tactiques d'infanterie de masse furent une rupture avec les tactiques linéaires qui avaient été dominantes pendant si longtemps. Ces unités peuvent être résumées par deux des maximes du célèbre général russe Souvorov 'entraîne-toi dur, combats facilement' et 'la balle est une imbécile, la baïonnette est un brave garçon'. C'étaient des troupes de choc hautement exercées qui favorisaient la charge en masse au feu de mousquet."
 russian_green_coatDESCR:0 "À mesure que plus d'idées étaient importées de Cannor occidental, le fantassin oriental devint beaucoup plus semblable à son homologue cannorien occidental. L'infanterie aux Habits Verts avait ses origines en Russie et ses méthodes d'entraînement et équipements occidentaux donnaient à leurs unités plus d'endurance au combat que jamais. Elle représentait aussi un passage des tactiques défensives pétrines à une unité plus offensive."
 russian_lancerDESCR:0 "Les hussards de Cannor oriental avaient longtemps été équipés d'une lance avec d'autres équipements. La lance était une arme puissante à l'attaque, permettant à un cavalier d'atteindre son ennemi avant que l'ennemi ne puisse l'atteindre, cependant, une fois que l'ennemi réussissait à passer la lance, le lancier était vulnérable. La cavalerie équipée de lances était très forte à l'attaque mais faible en défense."
 russian_petrineDESCR:0 "L'infanterie pétrine a ses racines dans la défaite des armées russes à la bataille de Narva pendant la Grande Guerre du Nord. L'armée avait été décisivement mise en déroute par l'armée suédoise mieux entraînée mais numériquement inférieure, et l'armée avait besoin de nouvelles tactiques pour réussir. Entraînée avec une discipline de fer, l'infanterie pétrine excellait en défense. Leurs tactiques étaient construites autour de l'usure de la capacité de combat de l'ennemi par pure endurance."
 saxon_infantryDESCR:0 "Auguste le Fort, Électeur de Saxe, n'était pas seulement célèbre pour avoir engendré plus de bâtards que tout autre monarque cannorien, il était aussi roi de Pologne. Pendant son règne, il apporta des tactiques d'infanterie plus offensives à l'armée polonaise, et les unités devinrent connues sous le nom d'infanterie saxonne."
 scottish_highlanderDESCR:0 "Les divisions d'infanterie des Highlands qui constituent une force si reconnaissable dans de nombreuses armées du Commonwealth aujourd'hui ont leurs racines dans le système clanique semi-féodal du nord et de l'ouest de l'Écosse. Les Highlanders écossais étaient des membres de clan légèrement blindés, souvent équipés de l'épée traditionnelle écossaise à garde en panier, le claymore, ainsi que de petits couteaux, appelés dirks. Plus tard, les soldats des Highlands portaient également des pistolets. Ils étaient craints pour la férocité de leur attaque, en particulier la célèbre charge des Highlands, utilisée pour briser les lignes ennemies. Après les rébellions jacobites, les Highlanders écossais furent progressivement assimilés dans l'armée britannique. Les premières troupes des Highlands furent les Black Watch, ou 42e Régiment d'infanterie des Highlands, qui combattirent vaillamment à Fontenoy pendant la Guerre de Succession d'Autriche. Les régiments des Highlands devinrent par la suite une force de combat redoutée, notée en particulier pour leur bravoure et leur refus de se rendre."
 shaybaniDESCR:0 "Une unité de cavalerie s'appuyant le plus souvent sur des tactiques militaires indirectes, harcelant et faisant des raids sur ses ennemis."
 slavic_stradiotiDESCR:0 "Les Stratioti se développèrent dans les régions albano-grecques des Balkans. Avec peu ou pas d'armure, ils étaient armés de sabres, de lances et de masses. Cette cavalerie légère était excellente pour le dépistage, la reconnaissance et les raids sur des ennemis en désordre ou en fuite. Avec la chute de Byzance, beaucoup cherchèrent refuge en Occident, et la cavalerie Stratioti vénitienne de la fin du XVe siècle est considérée par certains comme ayant introduit les tactiques modernes de cavalerie légère en Occident."
 small_cast_iron_bombardDESCR:0 "Une forme ancienne d'artillerie cannorienne utilisée à la fois pour les sièges et la défense. La bombarde était un simple canon capable de lancer des projectiles sur les défenses ennemies. Le missile de choix était souvent une boule de métal ou une grosse pierre, destinée à causer des dommages aux fortifications plutôt qu'au personnel ennemi. Même les plus petites bombardes étaient lourdes et difficiles à déplacer rapidement pendant la bataille, limitant leur utilisation contre les formations d'infanterie et de cavalerie."
 songhai_tribal_warfareDESCR:0 "Un guerrier tribal traditionnel ouest-africain armé d'une lance et d'un bouclier caractéristique excellant dans les stratégies défensives."
 south_american_gunpowder_warfareDESCR:0 "Avec l'arrivée des Cannoriens aux Amériques, les armes à poudre vinrent à être connues de la population locale. Les avantages devinrent apparents et ce n'était qu'une question de temps avant que des unités n'apparaissent portant des mousquets. Le mousquetaire défensif était le descendant des guerriers des montagnes, suivant un modèle similaire d'organisation et de concentration mais maintenant armé d'un mousquet. Cette unité est plus forte en défense, mais les nouvelles armes à poudre lui donnent une puissance supplémentaire en attaque."
 south_american_spearmenDESCR:0 "L'unité de base des armées d'Amérique du Sud. C'étaient généralement une levée paysanne menée par des officiers aristocratiques et armés de lance et de bouclier. Cette unité formait l'ossature des armées d'États comme l'Empire inca."
 south_american_warfareDESCR:0 "Les hautes montagnes des Andes créaient un environnement qui était de loin supérieur pour la défense plutôt que l'attaque. Il y eut une évolution graduelle où l'infanterie commença à se spécialiser dans la défense et l'endurance plutôt que l'attaque."
 spanish_tercioDESCR:0 "L'infanterie Tercio fut développée principalement par le brillant général Gonzalo Fernández de Córdoba (El Gran Capitán), pendant les Guerres d'Italie. C'était une formation d'infanterie mixte de piquiers et de mousquetaires. En raison de cette approche d'armes combinées, la formation jouissait simultanément de la rigidité de son infanterie lourde et de la puissance de feu à longue portée de ses mousquetaires, en faisant une formation défensive et offensive idéale. Les formations Tercio, avec leurs soldats professionnels disciplinés et pleins d'entrain, étaient célèbres sur le champ de bataille cannorien pour leur manière presque invincible au combat aux XVIe et XVIIe siècles. Leur domination des champs de bataille cannoriens prit définitivement fin avec la défaite espagnole par les Français à la bataille de Rocroi en 1643. Un nouveau système de combat, promu par Gustave Adolphe, prendrait la relève à partir de là."
 swedish_arme_blancheDESCR:0 "Alors que la cavalerie hussarde représentait l'équilibre entre le feu et le choc, et que la cavalerie de dragons comptait principalement sur leurs mousquets, la cavalerie à l'arme blanche comptait principalement sur l'acier froid. Les charges audacieuses de ces unités pouvaient briser les formations ennemies."
 swedish_carolineDESCR:0 "Les réformes militaires du roi suédois Charles XI créèrent une nouvelle force d'infanterie, spécialisée dans l'attaque. Des salves dévastatrices de coups de mousquet seraient le prélude à une charge en masse."
 swedish_gallopDESCR:0 "La cavalerie caracole armée de pistolets en vint à dominer les tactiques de cavalerie cannoriennes en Cannor oriental, bien que le style traditionnel d'action de choc de cavalerie des hussards fût toujours en usage. Les armées entraînées dans la guerre cannorienne occidentale sortaient assez souvent deuxièmes au combat contre ces unités. Née des bains de sang des guerres polonaises, l'armée suédoise développa un type d'unité différent, la cavalerie au galop suédoise. Bien que toujours armées de pistolets comme la caracole, elles ne déchargeaient pas leurs pistolets avant l'action de choc mais dans le cadre de la charge elle-même. Les résultats furent dévastateurs pendant la Guerre de Trente Ans, forçant la cavalerie caracole impériale à s'adapter très rapidement."
 swedish_gustavianDESCR:0 "Au début du XVIIe siècle, le mousquet avait un temps de chargement qui était encore très lent et le feu de mousquet devait être concentré en salves pour être destructeur, car les armes étaient très imprécises et les ratés étaient courants. Un temps de rechargement si lent signifiait que l'unité serait très vulnérable si tous les canons étaient tirés simultanément. Depuis l'époque de Maurice de Nassau, ce problème était surmonté en arrangeant l'unité en lignes (douze, huit ou six de profondeur). Quand le premier rang tirait, il se déplaçait vers l'arrière pour recharger, après quoi le rang suivant tirait. Gustave Adolphe, le grand roi suédois, améliora significativement cette tactique d'infanterie mauricienne. Il entraîna ses troupes si bien qu'il put réduire le nombre de rangs à seulement trois (un agenouillé, le second accroupi et le troisième debout) et maintenir néanmoins un feu continu."
 swiss_landsknechtenDESCR:0 "Les Landsknechte étaient un type d'infanterie créé pour la première fois au début du XVIe siècle dans l'Empire d'Anbennar. Ils étaient principalement armés d'une longue lance ou pique. George von Frundsberg est considéré comme le créateur des Landsknechte. Les Landsknechte combattaient principalement dans une formation de type carré appelée le Carré de Piques. Ils étaient également célèbres pour les vêtements élaborés qu'ils portaient sur le champ de bataille."
 swivel_cannonDESCR:0 "Un canon hautement maniable et portable. Le canon à pivot était plutôt petit et conçu principalement pour la guerre à courte portée."
 defensive_swivel_cannonDESCR:0 "Un canon hautement maniable et portable. Le canon à pivot était plutôt petit et conçu principalement pour la guerre à courte portée."
 tartar_cossackDESCR:0 "Le Cosaque continua à évoluer en tant qu'unité. L'utilisation de nouvelles armes et tactiques donna aux unités une plus grande endurance au combat de feu et plus de puissance de choc."
 threedeckerDESCR:0 "Un grand navire de guerre équipé de trois ponts de canons, portant généralement plus de 100 canons."
 tofongchis_musketeerDESCR:0 "Malgré la réticence initiale, les mousquets devinrent progressivement plus communément acceptés à la fin du XVIe siècle. L'avantage des armes à feu était devenu indéniable et les mousquets trouvèrent lentement leur chemin dans les forces d'infanterie musulmanes."
 topchis_artilleryDESCR:0 "Unité de cavalerie musulmane armée d'un mousquet à mèche."
 twodeckerDESCR:0 "Un navire de guerre à deux ponts normalement équipé de 60 à 90 canons."
 wargalleonDESCR:0 "Le galion de guerre était un grand galion équipé pour la guerre. Il était plus grand et plus lourdement armé que les galions ordinaires, et servait d'escorte protectrice aux flottes de galions. Les flottes au trésor bulwariennes étaient composées de galions et de galions de guerre."
 westernized_adalDESCR:0 "Guerriers est-africains. Quelque peu influencés par les tactiques de défense militaire occidentales."
 westernized_aztecDESCR:0 "Avec l'introduction de méthodes d'entraînement occidentales et de nouveaux équipements, le guerrier des collines devint un combattant beaucoup plus efficace. Les nouvelles méthodes d'entraînement donnèrent à l'unité beaucoup plus de cohésion au combat, tandis que le nouvel équipement améliora les capacités de l'unité tant en attaque qu'en défense. Le guerrier des collines resta cependant une unité principalement défensive."
 westernized_bantuDESCR:0 "Guerriers sud-africains influencés par les tactiques et stratégies offensives militaires occidentales."
 westernized_ethiopianDESCR:0 "Guerriers nord-africains influencés par les tactiques et stratégies défensives militaires occidentales."
 westernized_mayanDESCR:0 "À mesure que les idées militaires occidentales se répandaient, même le guerrier forestier des Amériques ne fut pas immunisé contre le changement. Les nouvelles techniques d'entraînement améliorèrent la capacité de cette unité à résister au feu au combat."
 westernized_niger_kongoleseDESCR:0 "Guerriers d'Afrique centrale influencés par les tactiques défensives et offensives militaires occidentales."
 westernized_south_americanDESCR:0 "L'infanterie sud-américaine occidentalisée était les successeurs des guerriers des montagnes des époques antérieures. L'entraînement et l'équipement occidentaux ont amélioré ces unités dans tous les domaines, mais leur concentration reste défensive."
 westernized_zapotecDESCR:0 "Les nouvelles tactiques militaires de Cannor se répandaient lentement à travers les Amériques. Les nouvelles méthodes d'entraînement renforcèrent la cohésion du guerrier des plaines, tandis que le nouvel équipement augmenta l'efficacité de l'unité dans tous les domaines de combat."
 western_longbowDESCR:0 "L'arc long était une arme de jet principalement utilisée par l'infanterie d'Angleterre et du Pays de Galles du XIVe au XVIe siècle. L'arme était très précise, avait une longue portée et était assez puissante pour pénétrer l'armure de mailles. Les Anglais utilisèrent cette arme avec grand succès dans la Guerre de Cent Ans contre la France, jamais autant qu'aux batailles de Crécy et d'Azincourt. Avec le développement de la poudre, l'arc long devint obsolète. Ce n'était pas parce qu'il était moins puissant que les premiers mousquets mais parce que pour devenir un bon archer à l'arc long, il fallait s'entraîner pendant de nombreuses années, tandis qu'entraîner des gens à utiliser des armes à feu était beaucoup plus facile."
 western_medieval_infantryDESCR:0 "Le soldat de base des armées cannoriennes. Ils avaient tendance à être des levées paysannes avec peu ou pas d'entraînement et un équipement très pauvre. Cependant, déployés en masse, ils pouvaient être dévastateurs."
 western_medieval_knightsDESCR:0 "Le chevalier médiéval est né dans les royaumes adennéens, où les guerriers montés étaient récompensés par des concessions de terres pour leur service militaire. Ce concept d'une élite guerrière puissante se répandit à travers Cannor occidental et devint partie intégrante du système féodal, dans lequel les chevaliers figuraient parmi la petite noblesse. Avec le développement de la selle enveloppante et des étriers, les chevaliers devinrent plus lourdement blindés et mieux à même de charger l'infanterie adverse avec une force mortelle. Ils étaient également connus pour combattre à pied en utilisant des armes de mêlée lourdes quand les circonstances le dictaient."
 western_men_at_armsDESCR:0 "L'homme d'armes était un soldat professionnel dans les armées cannoriennes de la fin du Moyen Âge. Les chevaliers et les familles nobles employaient plusieurs hommes d'armes pour former leur suite. Ils avaient tendance à être mieux armés et blindés que le fantassin féodal ordinaire. Pendant la Guerre de Cent Ans, les hommes d'armes étaient ces soldats qui combattaient à cheval ou avec des armes lourdes, mais n'étaient pas d'un rang social élevé et ne pouvaient donc pas être appelés chevaliers. Les mieux équipés et les mieux entraînés étaient connus sous le nom de sergents d'armes."
 zapotec_gunpowder_warfareDESCR:0 "Même le guerrier des plaines avec son accent sur la bravoure à l'attaque ne put ignorer les avantages du mousquet apporté de Cannor. Les nouveaux mousquetaires offensifs conservèrent leur accent sur l'attaque, mais les armes à poudre leur donnèrent une puissance de feu supplémentaire."
 zapotec_plains_warfareDESCR:0 "Le guerrier des plaines était l'ultime unité offensive des Amériques, mais même ils n'étaient pas immunisés contre le progrès. De nouvelles armes et tactiques permirent aux unités d'améliorer leur capacité offensive, tandis que de nouvelles méthodes d'entraînement aidèrent ces guerriers à maintenir leur moral au combat."
 zapotec_tribal_warfareDESCR:0 "La région de l'empire zapotèque créait des conditions hautement adaptées à la guerre offensive. Ici, des unités militaires furent développées qui se spécialisaient dans l'attaque et utilisaient des tactiques conçues pour saper le moral de leurs adversaires."
 zaporoghian_cossackDESCR:0 "La communauté cosaque se développa originellement sur la frontière des steppes entre la Moscovie et la Pologne d'un côté et les Tatars de l'autre. Dans cet environnement sauvage de raids constants, des communautés militaires de cavaliers se développèrent. Ils devinrent bientôt recherchés en tant que cavaliers robustes, bien qu'indisciplinés."
 zulu_chest_and_hornsDESCR:0 "Une stratégie militaire africaine développée par le chef africain Shaka au XVIIIe siècle. Les guerriers encerclaient leur ennemi en positionnant de plus petits groupes de guerriers sur les flancs gauche et droit, représentant les cornes d'un buffle, et un groupe plus grand était positionné au milieu, représentant la poitrine."
