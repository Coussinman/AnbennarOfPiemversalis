 FE_AI_AGGRESSIVENESS_DESC:0 "La §YDifficulté de l'IA§! détermine le niveau de compétence et le comportement des nations IA"
 FE_AI_AGGRESSIVENESS_DESC2:0 "§YFacile§! : L'IA joue à un niveau de compétence réduit et réagit moins durement à l'agression et à la vulnérabilité du joueur.\n§YNormal§! : L'IA joue à son plein niveau de compétence et traitera les nations du joueur et de l'IA de la même manière.\n§YDifficile :§! L'IA joue à son plein niveau de compétence et réagit plus durement à l'agression et à la vulnérabilité du joueur."
