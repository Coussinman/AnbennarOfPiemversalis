 school_establishment_act_title:0 "Adopter l'acte d'établissement scolaire"
 school_establishment_act_desc:0 "Promouvoir l'éducation en établissant des écoles financées par l'État et supervisées par l'Église."
 close_foreign_trade_title:0 "Fermer le commerce étranger"
 close_foreign_trade_desc:0 "Minimiser les influences occidentales en restreignant le nombre de comptoirs commerciaux autorisés à être exploités par des commerçants étrangers et promouvoir des règles plus strictes pour le commerce étranger et le travail missionnaire dans l'ensemble."
 chinese_nation_title:0 "Réformer l'administration chinoise"
 chinese_nation_desc:0 "Nous avons modernisé la nation et seule notre administration reste fermement enracinée dans le passé. Il est temps de mettre fin à l'ère de la politique factionnelle et de construire une Chine plus forte."
 benign_neglect_title:0 "Négligence bienveillante"
 benign_neglect_desc:0 "Améliorer les relations coloniales en accordant à vos colonies une certaine autonomie gouvernementale."
 the_school_establishment_act:0 "L'acte d'établissement scolaire"
 desc_the_school_establishment_act:0 "L'éducation est promue par l'établissement d'écoles financées par l'État, supervisées par l'Église."
 condemn_western_influences:0 "Condamner les influences occidentales"
 desc_condemn_western_influences:0 "Des règles strictes ont été adoptées concernant le commerce étranger et le travail missionnaire."
