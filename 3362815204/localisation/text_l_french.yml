 sabotage_reputation_desc:0 "Répandre des mensonges et de fausses rumeurs sur notre ennemi pour tenter de nuire à sa réputation."
 incite_against_merchant_desc:0 "Inciter à plusieurs querelles et désaccords pour tenter de perturber l'efficacité commerciale de nos ennemis."
 spy_ring_infiltration_desc:0 "Infiltrer les forces d'espionnage ennemies pour brouiller les informations et s'assurer que leur gouvernement ne reçoit aucun renseignement sensible."
 support_revolt_desc:0 "S'allier secrètement avec les rebelles qui tourmentent notre ennemi, nous permettant ainsi de prêter une aide financière sans que notre nation soit officiellement associée à la révolte en cours."
 comission_privateer_desc:0 "Recruter un pirate bien connu. Nous le mettrons à bon usage quand le moment opportun se présentera."
