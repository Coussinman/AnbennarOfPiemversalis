 establish_carribean_colony_header:0 " "
 establish_carribean_colony_title:0 "Établir une colonie dans les Caraïbes"
 establish_carribean_colony_desc:0 "Il y a de riches opportunités à trouver dans les terres des Caraïbes, nous devons y prendre pied ou voir d'autres s'en emparer."
 establish_usa_colony_header:0 " "
 establish_usa_colony_title:0 "Fonder une colonie en Amérique de l'Est"
 establish_usa_colony_desc:0 "Nos marchands ont fondé une compagnie pour commercer avec les richesses des Amériques, et ils demandent la protection royale pour assister leurs activités."
 establish_canada_colony_header:0 " "
 establish_canada_colony_title:0 "Établir une présence au Canada"
 establish_canada_colony_desc:0 "Les terres froides du nord du Canada ont des richesses inexploitées, nous devons y fonder une colonie et prendre notre part."
 eastern_usa:0 "Côte est américaine"
 canada:0 "Canada"
 lousiana:0 "Louisiane"
 conquer_neighbour_title:0 "Conquérir $PROVINCENAME$"
 conquer_neighbour_desc:0 "Nous devons conquérir toutes les terres qui constitueraient un ajout précieux à notre nation, sinon les gens ne nous prendront pas au sérieux."
 improve_relations_with_rival_header:0 " "
 improve_relations_with_rival_title:0 "Réparer les relations avec $COUNTRY$"
 improve_relations_with_rival_desc:0 "Nos actions ont conduit à une détérioration des relations avec certains de nos voisins. Nous devrions chercher à renforcer les liens avec $COUNTRY$."
 earn_more_from_trade_header:0 "Les bourgeois exigent que nous"
 earn_more_from_trade_title:0 "Nous devrions nous appuyer davantage sur les revenus commerciaux"
 earn_more_from_trade_desc:0 "Nos marchands estiment que notre pays ne soutient pas le commerce comme il le devrait. Ils exigent donc que nous augmentions le montant des revenus que nous tirons du commerce."
 discover_mission_header:0 " "
 discover_mission_title:0 "Découvrir $PROVINCENAME$"
 discover_mission_desc:0 "Des rumeurs ont atteint notre pays sur les riches terres de $PROVINCENAME$. Nos navigateurs demandent le soutien de l'État pour une expédition visant à les découvrir et à les revendiquer pour notre pays. Nous croyons qu'elles seraient dans $REGIONNAME$ en $CONTINENTNAME$."
 royal_marriage_mission_header:0 " "
 royal_marriage_mission_title:0 "Mariage royal avec $COUNTRY$"
 royal_marriage_mission_desc:0 "Pour renforcer notre dynastie, nous devons étendre nos liens dynastiques. Notre noblesse estime qu'il serait avantageux pour nous d'obtenir un mariage royal avec $COUNTRY$."
