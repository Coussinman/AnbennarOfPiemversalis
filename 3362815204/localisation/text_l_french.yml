 REVOLUTIONARY_FRANCE_NAME:0 "France révolutionnaire"
 REVOLUTIONARY_FRANCE_DESC:0 "La fuite de Louis XVI à Varennes sapa sa crédibilité et ouvrit la voie à la formation de la République de France en 1792. Craignant que la ferveur révolutionnaire ne se propage dans leurs pays, les autres monarques européens appelèrent à la guerre contre le nouveau gouvernement révolutionnaire. Menez la France révolutionnaire dans sa lutte pour s'affirmer face à une puissante coalition de puissances européennes."
 THE_FRENCH_REVOLUTION_NAME:0 "La Révolution française"
 THE_FRENCH_REVOLUTION_DESC:0 "L'une des périodes les plus importantes de l'histoire cannorienne commença le 14 juillet avec la prise de la Bastille. Cet événement serait le premier d'une série de tentatives pour renverser la dynastie des Bourbons et mettre fin à la monarchie absolue qui régnait alors sur la France. Menez le combat contre les rebelles révolutionnaires alors que la France entre dans l'une de ses phases les plus tumultueuses."
 mixed_order_infantry:0 "Infanterie en ordre mixte"
 mixed_order_infantryDESCR:0 "Une unité d'assaut d'infanterie originellement équipée de grenades et le plus souvent déployée lors des sièges. Au cours du XVIIIe siècle, les grenadiers en vinrent à considérer la baïonnette comme leur arme de prédilection au détriment des grenades."
 napoleonic_lancers:0 "Lanciers latins"
 napoleonic_lancersDESCR:0 "La crème de la crème de l'armée napoléonienne. Bien que leurs lances les rendaient moins agiles, ces troupes de cavalerie étaient de redoutables adversaires lorsqu'elles chargeaient directement leurs ennemis."
 napoleonic_square:0 "Carré napoléonien"
 napoleonic_squareDESCR:0 "Un corps d'infanterie formé en une formation rectangulaire serrée avec la cavalerie et l'artillerie à l'intérieur de ses côtés. Cette formation était bien adaptée contre les attaques de cavalerie mais naturellement elle résistait moins bien aux attaques d'artillerie."
 open_order_cavalry:0 "Chasseur latin"
 open_order_cavalryDESCR:0 "Unités de cavalerie montée spécialisées dans les escarmouches et renommées pour leurs compétences de tir."
 eastern_carabinier:0 "Carabinier oriental"
 eastern_carabinierDESCR:0 "Essentiellement un fantassin monté portant un mousquet court ou un fusil également connu sous le nom de carabine. Leur capacité à mettre pied à terre et combattre à pied leur permettait une grande flexibilité au combat."
 eastern_skirmisher:0 "Tirailleur oriental"
 eastern_skirmisherDESCR:0 "Petites unités de cavalerie flexibles constamment en mouvement et spécialisées dans les combats improvisés, non freinées par l'infanterie et l'artillerie plus lentes."
 eastern_uhlan:0 "Uhlan oriental"
 eastern_uhlanDESCR:0 "Une unité de cavalerie légère le plus souvent équipée d'une lance, d'un pistolet ou d'un sabre. L'avantage tactique des uhlans résidait dans leur agilité et leur vitesse, et ils étaient souvent employés par diverses armées cannoriennes."
 muslim_dragoon:0 "Dragon musulman"
 muslim_dragoonDESCR:0 "Un soldat monté utilisant son cheval comme moyen de transport mais combattant à pied."
 muslim_mass_infantry:0 "Infanterie de masse musulmane"
 muslim_mass_infantryDESCR:0 "Un bataillon composé d'au moins un millier de fantassins le plus souvent armés de mousquets et déployés en formation carrée. En maintenant un carré serré, cette formation pouvait résister même à l'attaque de cavalerie la plus ambitieuse."
 asian_mass_infantry:0 "Infanterie de masse asiatique"
 asian_mass_infantryDESCR:0 "Un bataillon composé d'au moins un millier de fantassins le plus souvent armés de mousquets et déployés en formation carrée. En maintenant un carré serré, cette formation pouvait résister même à l'attaque de cavalerie la plus ambitieuse."
 asian_charge_cavalry:0 "Cavalerie de charge asiatique"
 asian_charge_cavalryDESCR:0 "Une unité de cavalerie utilisant des tactiques de choc en chargeant son ennemi à pleine vitesse, exerçant une force maximale."
 flying_battery:0 "Batterie volante"
 flying_batteryDESCR:0 "Une stratégie fortement axée sur la vitesse et la mobilité : l'artillerie se déplaçait vers un point du champ de bataille, déchargeait ses munitions, puis se relocalisait rapidement vers le prochain point d'attaque en succession rapide."
 defensive_flying_battery:0 "Batterie volante défensive"
 defensive_flying_batteryDESCR:0 "Une stratégie fortement axée sur la vitesse et la mobilité : l'artillerie se déplaçait vers un point du champ de bataille, déchargeait ses munitions, puis se relocalisait rapidement vers le prochain point d'attaque en succession rapide."
