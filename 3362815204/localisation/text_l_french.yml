 MILACC_OFFER_REQ_DESC:0 "$COUNTRY$ nous propose un accès militaire. Accepter nous permettra de déplacer nos armées sur son territoire."
 revolutionary_republic_reform_desc:0 "La république révolutionnaire représente le gouvernement de la nation par un petit exécutif soutenu par une chambre de députés élus. La propagande révolutionnaire donne aux armées défendant la révolution un moral solide, et le principe d'égalité produit de forts dirigeants."
 revolutionary_republic_legacy:0 "République révolutionnaire"
 revolutionary_republic_legacy_desc:0 "La république révolutionnaire représente le gouvernement de la nation par un petit exécutif soutenu par une chambre de députés élus. La propagande révolutionnaire donne aux armées défendant la révolution un moral solide, et le principe d'égalité produit de forts dirigeants."
 revolutionary_empire_reform_desc:0 "L'Empire révolutionnaire est une forme de gouvernement légèrement plus conservatrice où un dirigeant unique gouverne en consultant une chambre de députés. Ce gouvernement peut mobiliser une grande quantité d'effectifs, et chaque soldat porte un bâton de maréchal dans son havresac."
