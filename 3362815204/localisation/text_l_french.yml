 subjugate_burgundy_title:0 "L'héritage bourguignon"
 subjugate_burgundy_desc:0 "La Bourgogne se trouve à la frontière entre l'Empire et la France. Le destin de ce duché est d'une importance vitale pour nous. Nous devons nous assurer que la maison de Habsbourg ait son mot à dire sur son sort si le pire devait arriver."
 no_ottomans_in_eastern_balkans_title:0 "Repousser le Turc"
 no_ottomans_in_eastern_balkans_desc:0 "Le contrôle des Turcs sur les Balkans orientaux est une trop grande menace pour l'Autriche pour qu'il reste. Nous devons prendre le contrôle de certaines de ces terres pour notre propre sécurité."
 no_ottomans_in_western_balkans_title:0 "Sécuriser la frontière militaire"
 no_ottomans_in_western_balkans_desc:0 "Avec le redoutable Turc encore solidement retranché dans les Balkans occidentaux, nous devons les repousser pour sécuriser la frontière militaire."
 austria_spain_relations_title:0 "La relation avec l'Espagne"
 austria_spain_relations_desc:0 "La position périphérique de l'Espagne en Europe en fait un partenaire attrayant pour l'Autriche, en cas de menaces de la France. Nous devons nous assurer que nous entretenons de solides relations avec l'Espagne et les cimenter par un mariage."
 austria_burgundy_relations_title:0 "Sécuriser la frontière impériale"
 austria_burgundy_relations_desc:0 "Les terres françaises sont à la fois riches et populeuses, quiconque les contrôle constitue une menace pour l'Empire. Nous devons aider à défendre la frontière impériale en renforçant notre relation avec la Bourgogne."
 austria_bavaria_relations_title:0 "Protéger les terres ancestrales"
 austria_bavaria_relations_desc:0 "Au nord des terres ancestrales de la dynastie des Habsbourg se trouve la menace potentielle du duché de Bavière. Nous devons renforcer nos relations avec eux pour nous assurer qu'ils ne deviennent pas un ennemi."
 no_territory_to_the_ottomans_title:0 "Pas de terres autrichiennes au Turc"
 no_territory_to_the_ottomans_desc:0 "Il est impératif pour notre sécurité et notre prestige qu'aucune terre faisant partie de l'Autriche ne soit détenue par le Turc. Nous devons combattre jusqu'à ce que toutes les terres soient nôtres."
 hegemony_over_north_italy_title:0 "Nos revendications sur l'Italie du Nord"
 hegemony_over_north_italy_desc:0 "Nous avons de solides revendications sur des terres en Lombardie. La majesté de notre dynastie exige que nous fassions valoir ces revendications."
 annex_bohemia_title:0 "La fin de la Bohême"
 annex_bohemia_desc:0 "Le royaume de Bohême a accepté la suzeraineté de la famille des Habsbourg, mais les conseillers estiment que ce n'est pas suffisant pour la sécurité de notre royaume. Nous devons placer la Bohême fermement sous notre contrôle."
 annex_hungary_title:0 "Protéger les Hongrois"
 annex_hungary_desc:0 "Le royaume de Hongrie a accepté notre suzeraineté, mais avec la situation dans les Balkans étant ce qu'elle est, nous estimons que la Hongrie est encore trop vulnérable. Nous devons convaincre la noblesse hongroise que c'est seulement par l'union avec l'Autriche que nous serons assez forts pour prévaloir."
 protect_belgium_from_the_french_title:0 "Défendre les Pays-Bas."
 protect_belgium_from_the_french_desc:0 "Nos possessions aux Pays-Bas sont menacées par les Français. Nous devons sécuriser notre position et les chasser des Pays-Bas."
 protect_hungary_from_the_ottomans_title:0 "Protéger la Hongrie des Ottomans."
 protect_hungary_from_the_ottomans_desc:0 "C'est notre devoir de nous assurer que les provinces de Hongrie ne soient pas sous le joug ottoman !"
 protect_italy_from_the_french_title:0 "Garder les Français hors d'Italie."
 protect_italy_from_the_french_desc:0 "L'Italie du Nord est l'une des routes les plus évidentes pour une invasion de l'Autriche par l'ouest. La sécurité de la monarchie exige qu'il n'y ait pas de paix tant qu'une seule province est sous contrôle français."
 protect_italy_from_the_french_republic_title:0 "Protéger l'Italie des forces révolutionnaires."
 protect_italy_from_the_french_republic_desc:0 "Les hordes infâmes de la France révolutionnaire menacent de submerger l'Italie du Nord. C'est notre devoir sacré de nous assurer que cela n'arrive pas. Aucune province en Italie du Nord ne doit être autorisée à rester aux mains des révolutionnaires et de leur régime jacobin."
 RULER_IS_MALE:0 "Le dirigeant est un homme"
 RULER_IS_FEMALE:0 "Le dirigeant est une femme"
 NUMBER_OF_COLONISTS:0 "Colons"
 LESS_THAN:0 "Moins de"
 AT_LEAST:0 "Au moins"
 NUMBER_OF_DIPLOMATS:0 "Diplomates"
 NUMBER_OF_MISSIONARIES:0 "Missionnaires"
 NUMBER_OF_MERCHANTS:0 "Marchands"
 DEFENSIVENESS:0 "Défense de fort"
 PEACE_WILL_ACCEPT:0 "Ils accepteraient cette offre."
 PEACE_WILL_NOT_ACCEPT:0 "Ils n'accepteraient pas cette offre."
 NO_WAR_ON_OTHER_VASSALS:0 "Vous ne pouvez pas déclarer la guerre au sujet d'un autre pays."
 reconquer_breda_title:0 "Capturer Breda"
 reconquer_breda_desc:0 "La forteresse de Breda se dresse comme un poignard pointé vers le cœur des Pays-Bas. Tant qu'elle sera sous domination espagnole, nous ne serons jamais en sécurité, elle doit être reprise."
 the_netherlands_discover_the_carribean_title:0 "Découvrir les Caraïbes"
 the_netherlands_discover_the_carribean_desc:0 "Nous avons entendu des rumeurs merveilleuses sur les richesses des Indes occidentales. Pour que le peuple néerlandais prospère, nous devons les trouver afin de pouvoir revendiquer notre part."
 dutch_colony_in_the_carribean_title:0 "Coloniser les Caraïbes"
 dutch_colony_in_the_carribean_desc:0 "Les îles des Caraïbes offrent des opportunités de richesse pour le gentilhomme ayant la volonté de les acquérir et la main-d'œuvre pour les exploiter. Nous avons exactement ce type de gentilshommes."
 the_netherlands_discover_north_america_title:0 "Découvrir l'Amérique du Nord"
 the_netherlands_discover_north_america_desc:0 "Nous avons entendu parler de vastes terres dans la partie nord d'une région appelée les Amériques. Nous devons partir voir si ces rumeurs sont vraies."
 dutch_colony_in_north_america_title:0 "Coloniser l'Amérique du Nord"
 dutch_colony_in_north_america_desc:0 "Les vastes terres vierges des Amériques sont pratiquement vides. C'est notre devoir de les peupler au nom de Dieu et pour la gloire de la Hollande."
 dutch_colony_in_south_africa_title:0 "Coloniser l'Afrique du Sud"
 dutch_colony_in_south_africa_desc:0 "Des récits sur l'immense or qu'on peut trouver dans les parties méridionales de l'Afrique ont atteint notre capitale. Pour que les Pays-Bas soient forts, nous devons établir une base en Afrique du Sud et voir si nous pouvons l'utiliser pour obtenir notre part."
 dutch_colony_in_indonesia_title:0 "Coloniser les Indes orientales"
 dutch_colony_in_indonesia_desc:0 "Les Indes orientales sont le centre de la production mondiale d'épices, une grande richesse attend la nation qui développera le commerce des épices. Les épices doivent couler !"
 dutch_colony_in_brazil_title:0 "Coloniser la Guyane"
 dutch_colony_in_brazil_desc:0 "Les terres de Guyane sont rudes et impitoyables mais, en utilisant notre supériorité et avec la volonté de Dieu, nous pouvons apprivoiser ces terres pour la gloire des Pays-Bas."
 the_netherlands_discover_australia_title:0 "Découvrir l'Australie"
 the_netherlands_discover_australia_desc:0 "Nous avons entendu parler d'un vaste continent au sud des Indes orientales. Nos navigateurs demandent le soutien du gouvernement pour aller découvrir ces terres et les revendiquer pour la Hollande."
 dutch_control_of_taiwan_title:0 "Contrôler Formose"
 dutch_control_of_taiwan_desc:0 "L'île de Formose occupe une position stratégiquement importante pour le commerce avec la Chine. Nous bénéficierions grandement si nous pouvions acquérir la possession de l'île."
 embrace_the_reformation_title:0 "Embrasser les enseignements de Calvin"
 embrace_the_reformation_desc:0 "La force croissante de l'Église réformée néerlandaise, basée sur les enseignements de Calvin, est évidente. Nous devrions en faire l'église établie."
 take_malacca_from_portugal_title:0 "Prendre Malacca au Portugal"
 take_malacca_from_portugal_desc:0 "Malacca se trouve à la porte des Indes orientales. Quiconque contrôle cela contrôle le commerce des épices. Nous devons le prendre aux Portugais."
 take_ceylon_from_portugal_title:0 "Libérer Ceylan"
 take_ceylon_from_portugal_desc:0 "L'île de Ceylan se trouve au centre de la route commerciale de l'océan Indien. Pour s'assurer que le commerce puisse circuler librement vers Amsterdam, nous devons la libérer du Portugal."
 establish_trade_in_indonesian_cot_title:0 "Établir le commerce dans les Indes orientales"
 establish_trade_in_indonesian_cot_desc:0 "Nos marchands estiment qu'ils ratent les opportunités du commerce des épices des Indes orientales. La VOC demande le soutien du gouvernement pour établir le commerce néerlandais dans la région."
 conquer_ireland_title:0 "Conquérir l'Irlande"
 conquer_ireland_desc:1 "Historiquement connus comme 'Les Ennemis Irlandais de Sa Majesté', la population gaélique d'Irlande a longtemps été en dehors de la domination anglaise. Il est temps qu'ils soient mis au pas."
 conquer_scotland_title:0 "Conquérir l'Écosse"
 conquer_scotland_desc:0 "Édouard Ier, Scottorum Malleus, avait vu la sagesse de sécuriser notre royaume en soumettant les Écossais. Nous devons faire de même."
 vassalize_scotland_title:0 "Vassaliser l'Écosse"
 vassalize_scotland_desc:0 "Le royaume d'Écosse est un problème perpétuel, leur tendance à s'allier avec la France et à créer des troubles sur la frontière nord devient gênante. Nous devons nous assurer que les seigneurs écossais poursuivent une ligne plus pro-anglaise."
 england_discovers_north_america_title:0 "Découvrir la côte est américaine"
 england_discovers_north_america_desc:0 "Nous avons entendu dire que nos pêcheurs, qui naviguent loin dans l'océan à la poursuite de la morue, ont aperçu une terre. Nous devons voir quelles terres nous pouvons nouvellement trouver."
 england_discovers_the_carribean_title:0 "Découvrir les Caraïbes"
 england_discovers_the_carribean_desc:0 "Il y a eu beaucoup de discussions sur les îles riches des Indes occidentales. Le Parlement fait pression sur la couronne pour financer une expédition afin d'établir la vérité de ces affirmations."
 conquer_indian_coastal_province_title:0 "Prendre pied dans le commerce indien"
 conquer_indian_coastal_province_desc:0 "D'honorables messieurs de la Compagnie des Marchands de Londres commerçant avec les Indes orientales ont demandé à la couronne de soutenir leurs efforts. Si certaines terres étaient acquises pour servir de bases aux activités commerciales de la compagnie, cela pourrait apporter des revenus utiles à la couronne."
 english_colony_in_australia_title:0 "Problèmes de prison"
 english_colony_in_australia_desc:0 "Nos prisons débordent de criminels de tous types. Pour faire de la place, nous pourrions libérer ces individus dangereux dans la société. Si seulement il y avait un autre endroit où les mettre ?"
 establish_trade_in_american_cot_title:1 "Commerce américain"
 establish_trade_in_american_cot_desc:0 "La Compagnie de la Baie d'Hudson fait pression sur le parlement pour soutenir l'établissement du commerce dans les Amériques. Nous devrions soutenir cette entreprise."
 monopolize_british_cot_title:0 "Notre argent part à l'étranger"
 occupy_paris_title:0 "Occuper Paris"
 occupy_paris_desc:0 "Nos efforts pour faire valoir notre revendication légitime sur le trône de France continuent. Notre position, aux yeux du reste de la chrétienté, serait renforcée si nous pouvions prendre le contrôle de Paris."
 conquer_normandie_and_caux_title:0 "Récupérer la Normandie"
 conquer_normandie_and_caux_desc:0 "Philippe II de France a traîtreusement pris la Normandie à son véritable propriétaire, le bon roi Jean. Nous devons récupérer le duché au nom de la Justice."
 conquer_aquitaine_title:0 "Conquérir l'Aquitaine"
 conquer_aquitaine_desc:0 "Les riches terres d'Aquitaine étaient autrefois le joyau de la couronne des terres du roi d'Angleterre. C'est notre devoir de nous assurer qu'il en soit de nouveau ainsi."
 HAVE_LESS_TOTAL_PORTS_THAN:0 "Avoir moins de ports au total que "
 HAVE_MORE_TOTAL_PORTS_THAN:0 "Avoir plus de ports au total que "
 HAS_NO_PORTS:0 "$COUNTRY$ n'a pas de ports."
 WE_HAVE_NO_PORTS:0 "Nous n'avons pas de ports."
 ARMIES_IN:0 "Armées dans"
 ANY_ELECTOR_STARTS:0 "N'importe quel électeur de l'Empire d'Anbennar"
 THE_CAPITAL_IS:0 "La capitale est "
 THE_CAPITAL_IS_NOT:0 "La capitale n'est pas "
 restore_byzantine_empire_title:0 "Restaurer l'Empire byzantin"
 restore_byzantine_empire_desc:0 "Le glorieux Empire byzantin n'est plus, mais tant qu'il y aura des Grecs à Constantinople, il y a espoir de résurrection. Nous pouvons prendre sa place en esprit, mais nous ne pouvons pas prendre son nom à moins de nous en montrer dignes..."
 annex_orleans_title:0 "Annexer Orléans"
 annex_orleans_desc:0 "Le duc d'Orléans a poursuivi une politique semi-indépendante pendant trop longtemps. Si près de Paris, nous devrions faire attention et intégrer ses domaines dans le cœur de la France."
 annex_provence_title:0 "Annexer la Provence"
 annex_provence_desc:0 "Le duc de Provence a poursuivi une politique semi-indépendante pendant trop longtemps. Il est temps de le mettre au pas."
 annex_auvergne_title:0 "Annexer l'Auvergne"
 annex_auvergne_desc:0 "Le duché d'Auvergne est situé stratégiquement au centre de la France. Nous devons l'intégrer pleinement dans le royaume de France."
 annex_bourbonnais_title:0 "Annexer le Bourbonnais"
 annex_bourbonnais_desc:0 "Le duché du Bourbonnais est situé stratégiquement au centre de la France. Nous devons l'intégrer pleinement dans le royaume de France."
 louvre_expansion_title:0 "Reconstruction du Louvre"
 louvre_expansion_desc:0 "La forteresse du Louvre n'est plus nécessaire pour défendre Paris. Pour rehausser notre gloire, nous devrions la transformer en Grande Galerie."
 annex_alsace_title:0 "Annexer l'Alsace"
 annex_alsace_desc:0 "La forteresse de Strasbourg défend l'un des principaux points de passage sur le Rhin supérieur. Pour aider à défendre la France, nous devons avancer notre frontière jusqu'au Rhin et nous assurer que nous, et personne d'autre, contrôlons cette forteresse."
 french_colony_in_the_carribean_title:0 "Établir des bases dans les Caraïbes"
 french_colony_in_the_carribean_desc:0 "La Compagnie des Îles de l'Amérique demande un soutien financier dans sa quête d'établir des bases commerciales dans les îles des Caraïbes. La France peut-elle refuser une telle demande ?"
 defend_france_against_england_title:0 "L'Angleterre doit être chassée de France"
 defend_france_against_england_desc:0 "Pendant trop longtemps, les belles terres de France ont été polluées par la présence des Rosbifs. L'honneur de la France exige que notre sol en soit libéré."
 recover_aquitaine_title:0 "Récupérer l'Aquitaine"
 recover_aquitaine_desc:0 "Notre longue guerre avec l'Angleterre a permis au roi d'Angleterre de s'établir en Aquitaine, indépendamment de la France. Nous devons récupérer ces provinces qui ont été séparées de la France."
 conquer_milan_title:0 "Conquérir Milan"
 conquer_milan_desc:0 "Pour nous assurer que notre position en Italie du Nord est protégée, nous devons étendre nos possessions pour inclure Milan."
 annex_genoa_title:0 "Annexer Gênes"
 annex_genoa_desc:0 "Le port de Gênes et son arrière-pays se trouvent trop près de la côte méditerranéenne française, nous devrions les incorporer dans notre royaume pour protéger notre côte méditerranéenne."
 establish_national_guard_title:0 "Établir la Garde nationale"
 establish_national_guard_desc:0 "Nous sommes de plus en plus préoccupés par la menace de désordre civil dans la région autour de Paris. Nous devrions établir la Garde nationale afin que des troupes puissent être rapidement organisées pour réprimer tout désordre."
 france_the_united_states_relations_title:0 "Améliorer les relations avec les États-Unis"
 france_the_united_states_relations_desc:0 "La jeune république des États-Unis est l'allié parfait que la France recherche pour l'hémisphère occidental. Améliorons nos relations avec eux."
 annex_lorraine_title:0 "Annexer la Lorraine"
 annex_lorraine_desc:0 "Le duché de Lorraine est tout simplement trop stratégiquement important pour permettre aux ducs une quelconque latitude dans leur politique. La France doit avoir le contrôle total du duché."
 defend_the_netherlands_title:0 "La frontière naturelle"
 defend_the_netherlands_desc:0 "Le contrôle espagnol des Pays-Bas reste une menace stratégique pour la France. Nous devons pousser notre frontière à sa position naturelle sur le Rhin pour nous assurer que la France est correctement défendue."
 anglo_portuguese_relations_title:0 "Relations luso-anglaises"
 anglo_portuguese_relations_desc:0 "Les bonnes relations avec l'Angleterre sont au cœur de la politique portugaise depuis 1373. Il serait sage de renforcer ces liens."
 castilian_portuguese_relations_title:0 "Relations castillanes"
 castilian_portuguese_relations_desc:0 "Notre relation avec notre voisin la Castille a toujours été importante pour nous. Nous estimons que c'est maintenant le moment de nouveaux efforts pour renforcer les liens entre nous et la Castille."
 spanish_portuguese_relations_title:0 "La question espagnole"
 spanish_portuguese_relations_desc:0 "La formation de l'Espagne a radicalement changé l'équilibre des pouvoirs dans la péninsule ibérique. Pour que le Portugal prospère, nous devrions nous assurer que nous sommes en bons termes avec notre grand voisin."
 portugal_discovers_the_azores_title:0 "Découvrir les Açores !"
 portugal_discovers_the_azores_desc:0 "Nous avons entendu des rumeurs d'îles dans l'Atlantique ouest qui pourraient servir de base pour de futures opportunités d'exploration. Envoyons des navires pour enquêter."
 portugal_discovers_madeira_title:0 "Découvrir Madère"
 portugal_discovers_madeira_desc:0 "Un marin naufragé a rapporté des nouvelles d'un archipel dans les mers au sud du Portugal. Envoyons des navires vers le sud pour enquêter."
 portugal_discovers_the_west_african_coast_title:0 "Nous devons nous aventurer plus au sud"
 portugal_discovers_the_west_african_coast_desc:0 "Nos explorateurs croient que l'Afrique ne s'étend que peu plus au sud et que bientôt nous pourrons contourner et trouver le royaume du Prêtre Jean. Une fois que nous aurons obtenu une alliance avec le royaume, nous pourrons balayer les Maures hors de la Terre Sainte."
 portuguese_colony_in_west_africa_title:0 "Nous avons besoin de bases"
 portuguese_colony_in_west_africa_desc:0 "Il semble que l'Afrique s'étende plus au sud que nous ne le pensions d'abord, si nous voulons contourner l'Afrique, nous devons avoir des bases pour que nos navires puissent se ravitailler."
 conquer_tangiers_title:0 "Conquérir Tanger"
 conquer_tangiers_desc:0 "Notre devoir envers la chrétienté est clair, nous devons conquérir Tanger pour défendre la chrétienté contre l'infidèle."
 conquer_ceuta_title:0 "Conquérir Ceuta"
 conquer_ceuta_desc:0 "Notre devoir envers la chrétienté est clair, nous devons conquérir Ceuta pour défendre la chrétienté contre l'infidèle."
 portugal_discovers_south_america_title:0 "Aller vers l'ouest"
 portugal_discovers_south_america_desc:0 "Les vents et les courants favorisent l'expansion vers l'ouest. Nos explorateurs croient que de riches terres se trouvent juste au-delà de l'horizon."
 portuguese_brazil_title:0 "Le Brésil portugais"
 portuguese_brazil_desc:0 "Nous avons découvert les riches terres du Brésil. Le territoire a déjà été divisé en Capitaineries Héréditaires et les capitaines demandent le soutien de la couronne pour lancer leurs efforts."
 brazil_belongs_to_portugal_title:0 "Le Brésil est portugais"
 brazil_belongs_to_portugal_desc:0 "Les Castillans ont pris des terres qui avaient été offertes au Portugal par le Saint-Père lui-même. Nous devons prendre ce qui est nôtre de droit."
 brazil_to_portugal_title:0 "Le Brésil est portugais"
 brazil_to_portugal_desc:0 "Les Espagnols ont pris des terres qui avaient été offertes au Portugal par le Saint-Père lui-même. Nous devons prendre ce qui est nôtre de droit."
 portugal_discovers_india_title:0 "Pousser vers l'Inde"
 portugal_discovers_india_desc:0 "Bien que nous ne trouvions aucun signe du royaume du Prêtre Jean, nous pouvons porter un coup aux Maures en arrachant le commerce des épices entre leurs mains. Nous devons trouver les Indes pour que nous puissions faire notre part pour défendre la chrétienté."
 portuguese_control_of_indian_province_title:0 "Établir une base en Inde"
 portuguese_control_of_indian_province_desc:0 "Pour exploiter pleinement les opportunités commerciales dans l'Inde nouvellement découverte, nous serions sages de nous emparer d'au moins un port et de son arrière-pays pour servir de base."
 portugal_discovers_indonesia_title:0 "Découvrir les îles aux épices"
 portugal_discovers_indonesia_desc:0 "Nous avons entendu des récits selon lesquels les îles aux épices se trouvent quelque part à l'est. Des hommes audacieux sont déjà prêts à y naviguer, tout ce dont ils ont besoin est un certain soutien de la couronne."
 portuguese_colony_in_indonesia_title:0 "Établir une présence dans les îles aux épices"
 portuguese_colony_in_indonesia_desc:0 "Les îles aux épices sont plus grandes et plus prospères que nous ne l'avions rêvé. Pour que le Portugal accomplisse sa destinée, il doit y établir des bases."
 establish_trade_in_indonesian_cot_por_title:0 "Établir un pied dans le commerce des épices."
 establish_trade_in_indonesian_cot_por_desc:0 "La Casa da Índia a demandé l'aide du gouvernement pour établir une présence portugaise dans le commerce des épices. Ce commerce lucratif aide les dirigeants musulmans à payer les armées qui menacent la chrétienté. C'est notre devoir chrétien de diriger une partie de ce commerce vers le Portugal."
 portugal_discovers_the_far_east_title:0 "En avant vers Cathay"
 portugal_discovers_the_far_east_desc:0 "Depuis le retour de Marco Polo, nous avons entendu parler des merveilleuses richesses de Cathay. Nous devons établir exactement où cela se trouve."
 fund_the_taj_mahal_title:0 "Financer le Taj Mahal"
 fund_the_taj_mahal_desc:0 "Notre grand empereur souhaite un tombeau épique pour sa bien-aimée épouse. Nous devons remplir le trésor et avoir un grand artiste sous la main pour réaliser ses souhaits."
 vassalize_golcanda_title:0 "Vassaliser Golconde"
 vassalize_golcanda_desc:0 "Golconde est la seule source de diamants au monde. La majesté de l'empereur conquérant exige que le Padshah Ghazi reçoive sa juste part."
 vassalize_gondwana_title:0 "Vassaliser Gondwana"
 vassalize_gondwana_desc:0 "Le plateau du Gondwana n'est pas particulièrement attrayant à conquérir. Cependant, les dirigeants devraient reconnaître la maîtrise du grand empereur moghol."
 defend_the_mughal_borders_title:0 "Défendre la frontière"
 defend_the_mughal_borders_desc:0 "Nous ne pouvons pas permettre aux Persans de prendre pied en Afghanistan. Nous devons défendre ces provinces à tout prix."
 mughal_break_the_persian_border_title:0 "Briser l'Empire perse"
 mughal_break_the_persian_border_desc:0 "Pour sécuriser notre frontière occidentale une fois pour toutes, nous devons suivre les traces du légendaire Tamerlan. Nous devons tout balayer devant nous et reconquérir ces terres."
 conquer_khandesh_title:0 "Conquérir Khandesh"
 conquer_khandesh_desc:0 "L'État de Khandesh ne peut pas être autorisé à rester indépendant. Nous devons le conquérir en urgence."
 annex_berar_title:0 "Annexer Berar"
 annex_berar_desc:0 "Berar contrôle certaines des routes commerciales terrestres les plus importantes. Nous devrions placer cette région sous notre contrôle."
 vassalize_orissa_title:0 "Vassaliser Orissa"
 vassalize_orissa_desc:0 "Nos voisins d'Orissa sont bien trop indépendants à notre goût. Nous devons nous assurer qu'ils lient leurs politiques plus étroitement aux nôtres."
 defeat_england_title:0 "Vaincre l'Angleterre"
 defeat_england_desc:0 "Les Anglais sont venus remplacer l'empereur. Déjà leur influence se fait sentir dans toute l'Inde. Nous devons les chasser une fois pour toutes."
 defend_timurid_lands_title:0 "Défendre les terres timourides"
 defend_timurid_lands_desc:0 "La dynastie parvenue des Chaybanides prétend être les vrais descendants de Gengis Khan. Nous devons montrer au monde que ce n'est pas vrai, pas un centimètre de terre ne doit être cédé."
 defend_timurid_lands_against_persia_title:0 "Bloquer l'avancée safavide"
 defend_timurid_lands_against_persia_desc:0 "Les Safavides chiites hérétiques cherchent à étendre leur contrôle aux dépens de l'Empire timouride. Nous devons prouver que nous sommes de dignes héritiers de Tamerlan et les bloquer."
 timurid_break_the_persian_border_title:0 "Sur les traces de Tamerlan"
 timurid_break_the_persian_border_desc:0 "La conquête des terres perses par Tamerlan a contribué à établir notre dynastie. Maintenant, nous devons à nouveau avancer pour nous assurer que notre dynastie reste en sécurité."
 conquer_sivas_title:0 "Conquérir Sivas"
 conquer_sivas_desc:0 "Les sultans parvenus de Roum refusent de reconnaître notre supériorité. Nous devons mener la grande horde vers l'ouest en Asie Mineure et leur montrer qui commande."
 annex_the_jalayrids_title:0 "Conquérir les Djalaïrides"
 annex_the_jalayrids_desc:0 "Le sultan djalaïride refuse à nouveau de reconnaître la supériorité du royaume timouride. Nous devons les conquérir une fois de plus et nous assurer qu'ils ne se relèvent jamais."
 vassalize_the_akkoyunlu_title:0 "Vassaliser Aq Qoyunlu"
 vassalize_the_akkoyunlu_desc:0 "Le grand Khan Tamerlan a généreusement accordé aux Turcs du Mouton Blanc des terres en récompense de leur fidèle service. Cependant, ils se sont révélés déloyaux et doivent être punis."
 vassalize_the_qara_qoyunlu_title:0 "Vassaliser Qara Qoyunlu"
 vassalize_the_qara_qoyunlu_desc:0 "Les Turcs du Mouton Noir ont été conquis par Tamerlan et leur Khan s'est enfui à la cour des sultans mamelouks d'Égypte. Maintenant, il est revenu et a essayé de se tailler un khanat indépendant. Le parvenu doit être puni."
 vassalize_georgia_title:0 "Vassaliser la Géorgie"
 vassalize_georgia_desc:0 "Pour être honnête, les troupes commencent à s'ennuyer de devoir piller et saccager les infidèles de Géorgie à nouveau, il n'y a tout simplement plus rien à piller. Forçons le roi géorgien à s'incliner devant le grand sultan et trouvons de nouveaux endroits à piller."
 subjugate_tver_title:0 "Conquête de Tver"
 subjugate_tver_desc:0 "Des nouvelles nous sont parvenues que les princes de Tver ont comploté contre la sainte mère Russie et l'orthodoxie. Ils semblent prêts à vendre la Russie aux catholiques ou aux musulmans et nous ne savons pas ce qui est pire. Conquérons leurs terres et assurons-nous qu'elles soient une fois pour toutes sous le contrôle d'un État russe responsable."
 annex_yaroslavl_title:0 "Annexer Iaroslavl"
 annex_yaroslavl_desc:0 "Pour nous assurer que la mère Russie ne tombe plus jamais sous le joug tatar, nous devons unir les principautés russes. Iaroslavl est bien trop fragile pour rester seul, ils doivent être défendus par la Moscovie."
 annex_ryazan_title:0 "Annexer Riazan"
 annex_ryazan_desc:0 "Le grand-prince de Riazan semble avoir une relation très étroite avec certains des khans au sud. Cela ne doit pas être autorisé à continuer."
 russia_discovers_eastern_siberia_title:0 "Découvrir la Sibérie orientale"
 russia_discovers_eastern_siberia_desc:0 "Nos explorateurs ont découvert des terres riches en fourrures et même de l'or dans les vastes étendues sauvages de Sibérie. Il y a des rumeurs de terres encore plus riches à l'est, nos explorateurs cosaques demandent de l'aide pour que tout appartienne à la mère Russie."
 access_to_the_baltic_sea_title:0 "Fenêtre sur l'Occident"
 access_to_the_baltic_sea_desc:0 "Nous craignons que la Russie soit laissée pour compte par les autres États d'Europe, nous ne devons pas rester arriérés. La Russie doit acquérir une côte sur la Baltique pour servir de fenêtre sur l'Occident."
 russian_colony_in_east_siberia_title:0 "Coloniser la Sibérie orientale"
 russian_colony_in_east_siberia_desc:0 "Nos explorateurs ont ouvert les vastes terres inexploitées de la Sibérie orientale. Nous devons y établir des forts pour sécuriser notre contrôle."
 russia_discovers_western_siberia_title:0 "La Russie revendique la Sibérie occidentale"
 russia_discovers_western_siberia_desc:0 "À l'ouest se trouvent les terres de Sibérie. Nos aventuriers cosaques n'attendent que de les revendiquer. Finançons-les et rappelons au monde que tout cela appartient à la mère Russie."
 russian_colony_in_west_siberia_title:0 "Établir des forts en Sibérie occidentale"
 russian_colony_in_west_siberia_desc:0 "Nous avons commencé à chasser les Tatars de Sibérie, pour renforcer notre emprise sur ces régions, nous devons établir des forts pour qu'elles puissent être placées sous contrôle russe."
 annex_the_qasim_khanate_title:0 "Annexer le khanat de Qasim"
 annex_the_qasim_khanate_desc:0 "Jusqu'à présent, il convenait à nos desseins de permettre la poursuite de l'existence du khanat de Qasim. Maintenant, cependant, ces terres doivent revenir à la mère Russie."
 defend_russia_against_the_mongols_title:0 "Défendre les Russes contre les Tatars."
 defend_russia_against_the_mongols_desc:0 "Le fléau tatar menace la sainte mère Russie. Nous devons nous assurer qu'aucun vrai Russe ne soit sous le joug tatar."
 cross_the_mongol_border_title:0 "Revendiquer les steppes"
 cross_the_mongol_border_desc:0 "Nous devons porter le combat aux Tatars de la Horde d'Or. Nous devons planter la bannière de la Russie dans leur cœur des steppes parce que tout cela appartient à la mère Russie."
 annex_novgorod_title:0 "Annexer Novgorod"
 annex_novgorod_desc:0 "Les boyards de Novgorod ont accepté le commandement du grand-prince de Moscovie, mais ils conservent encore certaines notions d'indépendance. Nous devons les placer fermement sous le contrôle de la Moscovie."
 russia_partitions_poland_title:0 "Conquérir la Pologne orientale"
 russia_partitions_poland_desc:0 "Les armées polonaises contrôlent une grande partie des terres russes. L'État polonais est à la fois faible et inapte à gouverner les fiers peuples ruthène et biélorusse, et d'autres pays en sont également venus à cette conclusion. Il est grand temps que nous agissions avant que la Pologne ne soit partagée entre nos rivaux."
 russia_partitions_lithuania_title:0 "Vaincre la Lituanie"
 russia_partitions_lithuania_desc:0 "Les armées lituaniennes contrôlent une grande partie des terres russes. L'État lituanien est à la fois faible et inapte à gouverner les fiers peuples ruthène et biélorusse, et d'autres pays en sont également venus à cette conclusion. Il est grand temps que nous agissions."
 CANCEL_MISSION:0 "Annuler la mission"
 CANNOT_CANCEL_MISSION_IRO:0 "Nous ne pouvons pas annuler cette mission avant le §Y$DATE$§W."
 CANCEL_MISSION_IRO:0 "Nous pouvons annuler cette mission, mais cela nous coûtera §R$PRESTIGE$§W de prestige, et nous ne pourrons pas en annuler une autre pendant les cinq prochaines années."
 conquer_finland_title:0 "Conquérir la Finlande"
 conquer_finland_desc:0 "La Suède reste un danger pour les terres de la sainte mère Russie. Pour protéger la Russie une fois pour toutes, nous devons conquérir la Finlande pour servir de tampon."
 subjugate_crimea_title:0 "Subjuguer la Crimée"
 subjugate_crimea_desc:0 "Les Tatars de Crimée ont été autorisés à sévir dans les steppes pendant trop longtemps, il est temps pour la Troisième Rome de leur montrer qui est le maître."
 subjugate_kazan_title:0 "Subjuguer Kazan"
 subjugate_kazan_desc:0 "La ville de Kazan se trouve sur les routes commerciales clés le long de la Volga. Pour que la Russie prospère, elle doit appartenir à la mère Russie."
 subjugate_the_siberian_khanate_title:0 "Subjuguer le khanat de Sibérie"
 subjugate_the_siberian_khanate_desc:0 "Nos aventuriers cosaques rapportent que le khanat de Sibérie est faible et divisé. Si le grand Tsar donne l'ordre d'attaquer, ils s'assureront que toutes leurs terres appartiendront à la mère Russie."
 subjugate_astrakhan_title:0 "Subjuguer Astrakhan"
 subjugate_astrakhan_desc:0 "La ville d'Astrakhan se trouve sur les rives de la mer Caspienne. Le contrôle de cette ville signifie que la mère Russie contrôlera le commerce de la région."
 control_medina_title:0 "Protéger Médine"
 control_medina_desc:0 "Médine est la deuxième ville la plus sainte de l'Islam et le site du tombeau du Prophète lui-même doit être protégé. Seul le grand sultan ottoman est capable de le faire."
 control_mecca_title:0 "Défendre le pèlerinage"
 control_mecca_desc:0 "Le saint pèlerinage à La Mecque est l'un des devoirs sacrés qu'un musulman peut accomplir. Les caravanes de pèlerins sont constamment menacées par les nomades locaux, nous devons établir le contrôle de la région pour nous assurer qu'ils sont protégés."
 vassalize_candar_title:0 "Vassaliser Candar"
 vassalize_candar_desc:0 "L'Éclair fut le premier sultan à chercher à placer les beys d'Anatolie sous contrôle ottoman. Par la guerre ou la ruse, le bey de Candar doit reconnaître notre supériorité."
 annex_candar_title:0 "Annexer Candar"
 annex_candar_desc:0 "Bien que le bey de Candar ait sagement décidé de reconnaître la supériorité du sultan, il y a encore ceux qui avertissent qu'il pourrait se révéler déloyal. Plaçons ces terres sous notre contrôle."
 vassalize_karaman_title:0 "Vassaliser Karaman"
 vassalize_karaman_desc:0 "Le bey de Karaman prétend outrageusement être au moins l'égal du sultan ottoman en raison du mariage de leur famille avec la fille de Mourad Ier. Nous devons montrer à ce parvenu qui est le plus important."
 annex_karaman_title:0 "Annexer Karaman"
 annex_karaman_desc:0 "Ayant mis au pas le beylicat de Karaman en nous assurant qu'ils reconnaissent le sultan comme leur suzerain, il est maintenant temps de mettre fin à leurs prétentions une fois pour toutes. Nous devons absorber le beylicat dans l'Empire proprement dit."
 vassalize_dulkadir_title:0 "Vassaliser Dulkadir"
 vassalize_dulkadir_desc:0 "Dulkadir se trouve à la frontière entre l'Asie Mineure et la Syrie. Sa position stratégique signifie que le sultan ottoman ne peut pas ignorer cet État par ailleurs mineur. Nous devons les attirer dans notre orbite."
 retake_smyrna_title:0 "Conquérir Smyrne"
 retake_smyrna_desc:0 "Le beylicat d'Aydin a imprudemment décidé de se libérer du contrôle du sultan. Nous devons leur montrer notre force et les conquérir."
 muslim_asia_minor_title:0 "Convertir l'infidèle"
 muslim_asia_minor_desc:0 "Les terres d'Anatolie sont au cœur même de l'Empire où le sultan tire le plus grand pourcentage de ses ressources. Après la défaite écrasante de nos forces par Tamerlan il y a quelques décennies, beaucoup des beylicats locaux ont retrouvé leur force et leur indépendance. Nous devons consolider notre emprise sur l'Asie Mineure et reconquérir ce qui a été perdu."
 vassalize_the_mameluks_title:0 "Abattre les Mamelouks"
 vassalize_the_mameluks_desc:0 "L'Égypte abritait autrefois les Fatimides chiites et nous croyons qu'encore aujourd'hui leur hérésie chiite a encore un soutien officiel en Égypte. Nous devons faire plier le genou du sultan mamelouk devant nous pour nous assurer qu'il reste sur le droit chemin."
 annex_egypt_title:0 "Annexer l'Égypte"
 annex_egypt_desc:0 "Le sultan mamelouk reste un adversaire dangereux et pourrait bien être entaché de l'hérésie chiite. Nous devons utiliser tous les moyens nécessaires pour mettre fin à son indépendance."
 take_kaffa_title:0 "Conquérir Caffa"
 take_kaffa_desc:0 "La forteresse de Caffa a longtemps été utilisée par des pirates chrétiens pour piller la mer Noire. Pour empêcher cela, nous devons contrôler cette ville."
 control_halland_title:0 "Contrôler Halland"
 control_halland_desc:0 "Le contrôle danois sur Halland est un problème sérieux pour le royaume de Suède. Sa position constitue à la fois une menace pour la navigation suédoise essayant de quitter la Baltique et peut servir de base aux armées danoises pour ravager le sud de la Suède. Cette situation ne peut être tolérée."
 control_estonia_title:0 "Contrôler l'Estonie"
 control_estonia_desc:0 "Notre long littoral signifie que la sécurité de notre royaume dépend fortement du contrôle de la mer Baltique. Les ports estoniens doivent être placés sous contrôle suédois."
 control_latvia_title:0 "Conquérir la Livonie"
 control_latvia_desc:0 "La Livonie et sa ville portuaire clé de Riga sont vitales pour contrôler le commerce baltique. Nous avons besoin de ces terres pour notre sécurité."
 control_gotland_title:0 "Conquérir Gotland"
 control_gotland_desc:0 "Gotland occupe une position stratégique clé au centre de la mer Baltique. Pour que la Suède reste une grande puissance, elle doit passer sous contrôle suédois."
 annex_norway_swe_title:0 "Défendre la Norvège"
 annex_norway_swe_desc:0 "Heureusement, nous avons pu placer la Norvège sous notre protection, mais les seigneurs locaux ne coordonnent pas correctement leur défense avec la Suède. Des mesures doivent être prises."
 no_territory_to_denmark_title:0 "Pas de terres au Danemark"
 no_territory_to_denmark_desc:0 "Le lâche roi danois a saisi des terres qui nous appartiennent de droit. Nous ne devons pas nous reposer tant que la Suède ne sera pas à nouveau entière."
 reconquer_finland_title:0 "Récupérer la Finlande"
 reconquer_finland_desc:0 "Bien qu'Ivan ait pu conquérir la Finlande par des tactiques lâches, nous vaincrons une fois de plus l'ours redouté. C'est maintenant notre chance de libérer toute la Finlande et de la rendre à un gouvernement civilisé."
 swedish_colony_in_north_america_title:0 "La Suède dans le Nouveau Monde"
 swedish_colony_in_north_america_desc:0 "Des nouvelles se sont répandues sur les découvertes en Amérique du Nord. La Suède ne doit pas manquer les avantages que les colonies apportent."
 fortify_the_eastern_border_title:0 "Fortifier la frontière orientale"
 fortify_the_eastern_border_desc:0 "Avec l'avancée de la Russie ayant atteint les frontières de la Finlande, nous devons investir dans l'amélioration des fortifications là-bas."
 colonize_lapland_title:0 "Apporter la civilisation aux Lapons"
 colonize_lapland_desc:0 "Les Lapons du nord de la Suède sont malheureusement arriérés car ils ne sont ni suédois ni chrétiens. C'est notre devoir de les rendre les deux."
 control_jylland_title:0 "Porter la guerre sur la rive sud."
 control_jylland_desc:0 "Nous sommes impliqués dans une guerre avec le Danemark, pour la gagner nous devons leur porter le combat. Marchons avec nos armées à travers la Baltique et prenons le contrôle du Jutland."
 colonize_iceland_title:0 "Coloniser l'Islande"
 colonize_iceland_desc:0 "Les grandes colonies vikings d'Islande ont connu des temps difficiles et sont maintenant désertées. Ramenons l'esprit pionnier de nos ancêtres et rétablissons-les."
 retake_scania_title:0 "Récupérer la Scanie"
 retake_scania_desc:0 "La Scanie a toujours fait partie du royaume de Danemark, mais le roi parvenu de Suède l'a revendiquée pour lui-même. Nous devons libérer les vrais Danois du joug suédois."
 retake_halland_title:0 "Récupérer Halland"
 retake_halland_desc:0 "La conquête suédoise de Halland les a mis trop près de Copenhague. Nous devons les chasser et reprendre ce qui est nôtre de droit."
 denmark_slesvig_holstein_relations_title:0 "Améliorer les relations avec le Holstein"
 denmark_slesvig_holstein_relations_desc:0 "La politique danoise a toujours été préoccupée par le sort du duché impérial de Holstein. Nous devons améliorer nos relations avec eux."
 denmark_oldenburg_relations_title:0 "Améliorer les relations avec Oldenbourg"
 denmark_oldenburg_relations_desc:0 "La maison royale danoise a longtemps eu des liens étroits avec les dirigeants d'Oldenbourg. Une amélioration des relations est depuis longtemps nécessaire."
 vassalize_norway_title:0 "Protéger la Norvège"
 vassalize_norway_desc:0 "Avec la fin de l'Union de Kalmar, la Norvège a été laissée faible et sans défense. C'est notre devoir en tant que vrai monarque norvégien de les placer sous la protection danoise."
 annex_norway_title:0 "L'héritage de Kalmar"
 annex_norway_desc:0 "L'Union de Kalmar a fait du roi danois le seul vrai roi de Norvège, bien que l'union se soit depuis dissoute, nous attendions l'opportunité de restaurer le roi danois à sa place légitime. L'opportunité est maintenant."
 defend_denmark_title:0 "Défendre le Danemark"
 defend_denmark_desc:0 "Depuis la fin de l'Union de Kalmar, la province rebelle de Suède a continué à nier au roi danois sa place légitime. Par des guerres injustifiées contre leur souverain légitime, ils ont capturé du territoire danois. La couronne danoise ne peut céder aucune partie du Danemark à eux."
 danish_controlled_cot_title:0 "Commerce danois"
 convert_ezochi_to_shintoism_title:0 "Leur montrer la voie shinto"
 convert_ezochi_to_shintoism_desc:0 "Nous regrettons que les peuples de Kamikawa persistent encore dans leurs traditions païennes, nos prêtres demandent humblement du soutien pour leur montrer la voie. Cela apportera symétrie et perfection au pays du soleil levant, comme la perfection d'une fleur de cerisier qui tombe."
 conquer_southern_korea_title:0 "Conquérir la Corée"
 conquer_southern_korea_desc:0 "Les dirigeants parvenus de Corée prétendent qu'en raison de leur mandat du Ciel, ils sont en fait supérieurs à l'empereur japonais. Nous devons lancer une invasion et prendre la partie sud pour pouvoir punir une telle arrogance à l'avenir."
 monopolize_japanese_cot_desc:0 "Pendant trop longtemps, les Gai-Jin ont eu trop de contrôle sur notre commerce. Le Fils du Ciel croit qu'il serait sage de prendre le contrôle de notre propre commerce."
 annex_the_mongol_khanate_title:0 "Détruire les faux empereurs"
 annex_the_mongol_khanate_desc:0 "La horde mongole barbare prétend être le vrai empereur Yuan de Chine, mais l'Empire du Milieu ne peut avoir qu'un seul empereur. Nous devons détruire ces parvenus une fois pour toutes."
 ming_oirat_relations_title:0 "Relations avec les Oïrats"
 ming_oirat_relations_desc:0 "La horde oïrate continue de piller nos frontières occidentales, endommageant parfois même la grande muraille elle-même. Nous devrions améliorer les relations avec eux pour les encourager à porter leurs raids ailleurs."
 vassalize_tibet_title:0 "Reconquérir le Tibet"
 vassalize_tibet_desc:0 "Les empereurs Yuan ont fait s'incliner les dirigeants tibétains devant l'Empire du Milieu, il est temps de leur faire faire de même à nouveau."
 annex_tibet_title:0 "Incorporer le Tibet"
 annex_tibet_desc:0 "L'administration tibétaine ne suit pas les lignes confucéennes appropriées et est donc inutilement chaotique. Nous devons apporter l'ordre aux terres en les incorporant à la Chine."
 colonize_taiwan_title:0 "Coloniser Taïwan"
 colonize_taiwan_desc:0 "L'île de Taïwan est peu peuplée de sauvages non civilisés, nous devrions ouvrir ces terres à la colonisation chinoise."
 colonize_deren_title:0 "Avancer jusqu'au fleuve Noir"
 colonize_deren_desc:0 "Le sacré fleuve Noir, bien que nous ayons entendu dire que certains peuples non civilisés l'appellent le fleuve Amour, est une frontière convenable pour nous. Nous devrions établir des colonies pour avancer notre frontière."
 china_discovers_india_title:0 "Découvrir l'Inde"
 china_discovers_india_desc:0 "Bien que la plupart des gens semblent satisfaits de l'explication que nos soies partent vers des terres barbares, certains de nos eunuques plus curieux souhaitent en savoir plus. Ils demandent du soutien pour envoyer une expédition vers cet endroit appelé l'Inde."
 conquer_danzig_title:0 "Récupérer Dantzig"
 conquer_danzig_desc:0 "Au traité de Kalisz, nous avons convenu que la région autour de Dantzig serait détenue par l'Ordre Teutonique sous la couronne polonaise. Récemment, ils ont été négligents dans leurs devoirs, nous devons donc récupérer ce qui est nôtre de droit."
 poland_mazovia_relations_title:0 "Relations avec la Mazovie"
 poland_mazovia_relations_desc:0 "La décision du roi Boleslas III de diviser la Pologne entre ses fils a annoncé une longue période de fragmentation pour le royaume polonais. Bien que la Pologne soit maintenant largement réunifiée, le duché de Mazovie reste encore indépendant, nous devrions améliorer nos relations avec eux."
 vassalize_mazovia_title:0 "Vassaliser la Mazovie"
 vassalize_mazovia_desc:0 "Le duché de Mazovie doit être ramené dans le giron polonais. Il est essentiel que le duc reconnaisse à nouveau la suzeraineté de la couronne polonaise."
 annex_mazovia_title:0 "Réincorporer la Mazovie"
 annex_mazovia_desc:0 "Nous devons ramener la Pologne à sa gloire d'antan. Le duché de Mazovie doit être une fois de plus une partie intégrante de la Pologne."
 conquer_smolensk_title:0 "Conquérir Smolensk"
 conquer_smolensk_desc:0 "La grande forteresse de Smolensk est la porte d'entrée de la Lituanie. Pour protéger la République, nous devons avoir cette forteresse."
 retake_podolia_title:0 "Repousser le Turc"
 retake_podolia_desc:0 "Le Turc a avancé dans les parties méridionales de la République. Nous ne pouvons pas permettre cela et devons les repousser."
 poland_lithuania_relations_title:0 "Relations polono-lituaniennes"
 poland_lithuania_relations_desc:0 "Avec la mort du dernier Piast royal, Casimir le Grand, la politique de la Pologne a été de chercher des liens dynastiques forts avec la Lituanie. Récemment, ceux-ci ont été négligés, nous devons les renouveler."
 annex_lithuania_title:0 "Fonder la République"
 annex_lithuania_desc:0 "La Pologne et la Lituanie ont entretenu des liens étroits pendant de nombreuses années. Maintenant, la noblesse appelle à l'Union de Lublin pour réunir les deux nations en une seule République."
 retake_minsk_title:0 "Reprendre Minsk"
 retake_minsk_desc:0 "Les Russes ont pris Minsk, cette forteresse ne peut pas être autorisée à rester entre leurs mains. Elle doit être reprise."
 fortify_the_southern_border_title:0 "Fortifier la frontière sud"
 fortify_the_southern_border_desc:0 "Les Habsbourg sont dangereusement proches de notre frontière sud. Nous devons améliorer les fortifications là-bas pour protéger la Pologne."
 defend_polands_western_border_title:0 "Défendre la frontière occidentale"
 defend_polands_western_border_desc:0 "Pas un centimètre de sol polonais ne devrait appartenir aux vils Prussiens !"
 defend_polands_northern_border_title:0 "Défendre la frontière nord"
 defend_polands_northern_border_desc:0 "Pas un centimètre de sol polonais ne devrait appartenir aux vils Russes."
 vassalize_navarra_title:0 "Vassaliser la Navarre"
 vassalize_navarra_desc:0 "Les royaumes de Castille et de France jettent des regards envieux sur les terres de Navarre. Il serait désastreux pour l'Aragon si ces terres tombaient aux mains de l'un ou l'autre, nous devons donc être proactifs."
 conquer_sardinia_title:0 "Notre droit sur la Sardaigne"
 conquer_sardinia_desc:0 "Le Saint-Père a accordé à Jacques le Juste le royaume de Sardaigne en 1297. Nous n'avons jamais oublié ce généreux don et il est temps de revendiquer ce qui est nôtre."
 diplo_annex_sicily_title:0 "Annexer la Sicile"
 diplo_annex_sicily_desc:0 "Depuis que Pierre III a chassé le duc d'Anjou de Sicile, le royaume a été à nos yeux une partie légitime de l'Aragon. Il est temps maintenant de réaffirmer ces droits."
 diplo_annex_naples_title:0 "Annexer Naples"
 diplo_annex_naples_desc:0 "Bien que le roi de Naples ait sagement accepté notre suzeraineté, son indépendance continue n'est plus souhaitable."
 conquer_naples_title:0 "Conquérir Naples"
 conquer_naples_desc:0 "Le roi de Naples insiste imprudemment qu'il est le vrai roi de Sicile. C'est inacceptable pour nous, Naples doit donc être conquise."
 defend_kaffa_title:0 "Défendre Caffa"
 defend_kaffa_desc:0 "Nous sommes en guerre avec les Turcs ottomans, nous devons nous assurer de ne pas perdre nos bases en mer Noire. Caffa doit être défendue."
 retake_kaffa_title:0 "Reprendre les possessions de Crimée"
 retake_kaffa_desc:0 "La perte de Caffa n'est qu'un revers temporaire. Nous considérons toujours cette province comme nôtre et nous devons donc la reprendre."
 conquer_hainaut_title:0 "Conquérir le Hainaut"
 conquer_hainaut_desc:0 "Depuis le mariage entre la fille de Philippe le Hardi, Marguerite de Bourgogne, et Guillaume de Hainaut, nous avons un intérêt fort pour ces terres. Le moment est maintenant venu pour nous de les prendre."
 conquer_brabant_title:0 "Conquérir le Brabant"
 conquer_brabant_desc:0 "Le duc de Brabant rivalise avec la Bourgogne pour la domination des Pays-Bas. Sa prétention d'être le successeur du duc de Basse-Lorraine est assez arrogante et nous devons lui donner une leçon."
 conquer_luxemburg_title:0 "Conquérir le Luxembourg"
 conquer_luxemburg_desc:0 "Le duché de Luxembourg sera un bel ajout aux terres bourguignonnes. Réduisant la distance entre nos provinces bourguignonnes et nos possessions dans les Pays-Bas."
 conquer_liege_title:0 "Conquérir Liège"
 conquer_liege_desc:0 "L'évêché de Liège devrait vraiment être contrôlé par le duc le plus puissant de la région, c'est-à-dire nous. Une fois que nous serons le seigneur lige, nous sommes sûrs que les cœurs de la région se rallieront à nous."
 vassalize_lorraine_title:0 "Vassaliser la Lorraine"
 vassalize_lorraine_desc:0 "Le duché de Lorraine se trouve entre les deux moitiés du royaume bourguignon. Nous devons nous assurer que nous avons libre accès à ces terres et qu'elles ne tombent pas aux mains de quelqu'un d'autre (comme le roi de France)."
 reach_the_mississippi_title:0 "Le vieux fleuve"
 reach_the_mississippi_desc:0 "Le fleuve Mississippi est l'artère par laquelle tout le commerce de l'intérieur de l'Amérique du Nord circule. Si nous voulons garder notre indépendance, nous devons avoir accès à ce fleuve."
 the_united_states_france_relations_title:0 "Relations avec la France"
 the_united_states_france_relations_desc:0 "Les États-Unis ont besoin d'amis pour croître et prospérer, nous estimons que la meilleure option est une solide relation avec la France. Améliorons nos relations avec eux."
 the_united_states_rev_france_relations_title:0 "Frères d'armes"
 the_united_states_rev_france_relations_desc:0 "La France a finalement renversé sa monarchie corrompue et institué une république bien pensante. Avec notre vision commune du monde, nous devrions être amis."
 tobacco_factory_title:0 "Manufacture de tabac"
 tobacco_factory_desc:0 "Pour que notre jeune république prospère, nous devons développer le commerce car c'est le sang vital de toute nation."
 connect_brandenburg_and_prussia_title:0 "Relier le Brandebourg et la Prusse"
 connect_brandenburg_and_prussia_desc:0 "Pour mieux protéger notre vassal de Prusse, nous devons être mieux placés pour les protéger. Nous devons avoir un corridor de terre nous reliant à eux."
 connect_the_prussian_lands_title:0 "Expansion prussienne"
 connect_the_prussian_lands_desc:0 "Ayant uni le Brandebourg à la Prusse, nous avons maintenant le problème de comment défendre les deux moitiés de notre royaume. Pour faire de notre royaume une unité plus défendable, nous devons conquérir toute la Prusse et pas seulement les parties actuellement sous notre contrôle."
 conquer_swedish_pomerania_title:0 "Conquérir la Poméranie suédoise"
 conquer_swedish_pomerania_desc:0 "De droit, la Poméranie aurait dû faire partie du Brandebourg, pourtant les Suédois ont insisté pour en prendre une part. Nous devons faire valoir nos droits et expulser la Suède de terres qui nous appartiennent légitimement."
 conquer_hinterpommern_title:0 "La succession poméranienne"
 conquer_hinterpommern_desc:0 "Nous avons des droits de succession sur le duché de Poméranie. Bien qu'il ne soit pas sage d'essayer d'obtenir toute la Poméranie pour le moment, nous devrions nous assurer que personne n'oublie nos droits en en prenant une partie."
 brandenburg_prussia_relations_title:0 "Relations avec la Prusse"
 brandenburg_prussia_relations_desc:0 "La défense de notre frontière orientale peut être renforcée avec les bons alliés. En raison de leur emplacement et de nos liens culturels, renforcer les relations avec l'État de Prusse est une mesure logique."
 prussia_brandenburg_relations_title:0 "Relations avec le Brandebourg"
 prussia_brandenburg_relations_desc:0 "Notre proximité avec des États puissants signifie que nous devons avoir des amis. Le Brandebourg, en raison de sa position et de nos liens culturels étroits, est le candidat parfait."
 vassalize_prussia_title:0 "Vassaliser la Prusse"
 vassalize_prussia_desc:0 "La Prusse semble faible et vulnérable, mais nos liens historiques signifient que nous devrions faire quelque chose à ce sujet. Devenons suzerain de la Prusse pour pouvoir les protéger."
 annex_prussia_title:0 "Annexer la Prusse"
 annex_prussia_desc:0 "Le moment est maintenant venu d'envisager d'incorporer pleinement la Prusse dans les domaines du Brandebourg."
 brandenburg_breaks_free_from_poland_title:0 "Se libérer de la Pologne"
 brandenburg_breaks_free_from_poland_desc:0 "Il ne convient pas à la dignité de l'électeur de Brandebourg d'accepter la suzeraineté polonaise. Cette situation doit prendre fin."
 prussia_breaks_free_from_poland_title:0 "Se libérer de la Pologne"
 prussia_breaks_free_from_poland_desc:0 "Pour que la Prusse ducale prospère, nous devons nous libérer des chaînes que le roi de Pologne a placées sur nous."
 prussia_partitions_poland_title:0 "Conquête de la Grande-Pologne"
 prussia_partitions_poland_desc:0 "La Pologne est faible et la Russie souhaite continuer à la dominer, pour accepter cette situation, nous devons être compensés par des terres polonaises."
 conquer_ratibor_title:0 "Conquérir Ratibor"
 conquer_ratibor_desc:0 "Nous avons des revendications sur la Silésie, que nous devons faire reconnaître par la famille des nations européennes. Pour y parvenir, nous devons sécuriser Ratibor."
 subjugate_westphalia_title:0 "Subjuguer la Westphalie"
 subjugate_westphalia_desc:0 "Le royaume de Westphalie a été créé, cela incluait plusieurs petites zones qui étaient considérées comme des parties légitimes de la Prusse. En utilisant ces terres comme prétexte, nous pouvons acquérir toute la Westphalie."
 conquer_ferrara_title:0 "Reconquérir Ferrare"
 conquer_ferrara_desc:0 "Pour leur soutien loyal pendant notre lutte avec les empereurs, nous avons accordé à la maison d'Este le duché de Ferrare comme fief papal. Cependant, il est maintenant temps de récupérer ces terres !"
 conquer_ancona_title:0 "Incorporation d'Ancône"
 conquer_ancona_desc:0 "Pendant les guerres ruineuses entre la papauté et l'empereur, Ancône est devenue un bastion du parti gibelin impérialiste. Bien que techniquement un fief papal, elle est virtuellement indépendante depuis lors, maintenant, cependant, nous pouvons concentrer notre attention sur sa récupération pour les États pontificaux."
 annex_avignon_title:0 "Mettre fin au schisme occidental"
 annex_avignon_desc:0 "Pendant le grand schisme, l'antipape soutenu par le parti français a été installé à Avignon. Si nous gouvernons Avignon, notre revendication d'être le seul vrai chef de la seule vraie foi ne sera pas mise en doute."
 catholic_italy_title:0 "Combattre l'hérésie"
 catholic_italy_desc:0 "Une promesse de sauf-conduit n'est pas contraignante lorsqu'elle est donnée à un hérétique, l'empereur aurait dû essayer de brûler Luther quand il en avait l'occasion. Maintenant, ses enseignements hérétiques se sont répandus en Italie, cela doit être éradiqué."
 academy_in_rome_title:0 "Prince de la Renaissance"
 academy_in_rome_desc:0 "Pour être un vrai prince selon le moule de la Renaissance, nous devons transformer Rome en un havre pour les plus grands artistes. À cette fin, nous devrions devenir mécènes d'une Académie des Beaux-Arts."
 conquer_orkney_title:0 "Revendiquer les Orcades"
 conquer_orkney_desc:0 "Les Orcades, situées là où elles sont, ont une importance stratégique pour la couronne écossaise. Nous avons maintenant une raison légitime de revendiquer ces terres, nous devons la saisir."
 scotland_france_relations_title:0 "La Vieille Alliance"
 scotland_france_relations_desc:0 "Tant qu'il y aura une Angleterre, l'Écosse sera menacée, nous avons longtemps maintenu une sorte d'alliance avec la France pour nous protéger contre eux. Il est temps de renouveler la Vieille Alliance."
 scottish_war_against_england_title:0 "Honorer la Vieille Alliance"
 scottish_war_against_england_desc:0 "La France est une fois de plus en guerre avec notre ennemi ancestral, les Anglais. Nous devons une fois de plus porter le combat contre l'Angleterre."
 scottish_control_title:0 "Avancer la frontière"
 scottish_control_desc:0 "Pour protéger l'Écosse, nous devons avancer la frontière vers le sud et prendre le Northumberland pour servir de tampon."
 scottish_defense_title:0 "Défendre la nation"
 scottish_defense_desc:0 "Nous ne pouvons pas céder un mètre de terre écossaise à l'ennemi anglais. Nous devons combattre jusqu'à ce que l'Angleterre réalise cela."
 bavaria_austria_relations_title:0 "Amitié avec les Habsbourg"
 bavaria_austria_relations_desc:0 "Les familles Wittelsbach et Habsbourg ont été en compétition l'une avec l'autre pour l'influence dans le sud-ouest de l'Allemagne. Cependant, nous aurions les mains plus libres si nous entretenions de bonnes relations avec les Habsbourg."
 hungary_austria_relations_title:0 "Relations autrichiennes"
 hungary_austria_relations_desc:0 "Nos relations avec notre voisin du nord ont parfois été un peu difficiles. Cependant, pour libérer nos mains dans les Balkans, nous devrions améliorer notre relation avec l'Autriche."
 hungary_transylvania_relations_title:0 "Relations transylvaniennes"
 hungary_transylvania_relations_desc:0 "La Transylvanie est censée être un vassal de la Hongrie. Cependant, avec notre relation, ils sont plus susceptibles d'être notre ennemi, réparons nos relations avec eux."
 vassalize_transylvania_hun_title:0 "Ramener la Transylvanie dans le giron"
 vassalize_transylvania_hun_desc:0 "La Transylvanie a oublié qu'elle est censée faire partie de la Hongrie. Le seigneur de Transylvanie doit plier le genou devant la couronne hongroise."
 conquer_the_banat_title:0 "Conquérir le Banat"
 conquer_the_banat_desc:0 "Le Banat se trouve sur la route d'avancée la plus probable de toute force turque cherchant à envahir la Hongrie. Cette province doit former la première ligne de notre défense."
 retake_croatia_title:0 "Libérer la Croatie"
 retake_croatia_desc:0 "Les Turcs ont avancé jusqu'à la province historique de Croatie. Nous devons les repousser."
 lithuania_poland_relations_title:0 "Relations polonaises"
 lithuania_poland_relations_desc:0 "En 1386, le grand-duc Jogaila prit la décision d'embrasser le catholicisme, il aligna également la Lituanie avec la Pologne. Nous devons redécouvrir ces liens historiques et renforcer notre amitié avec la Pologne."
 conquer_samogitia_title:0 "Récupérer la Samogitie"
 conquer_samogitia_desc:0 "Les terres de Samogitie sont une partie historique de la Lituanie qui nous a été cruellement prise par les chevaliers teutoniques. Nous devons restaurer cette province au grand-duché."
 retake_chernigov_title:0 "Récupérer Tchernigov"
 retake_chernigov_desc:0 "La prétention de la Moscovie d'être le seul véritable héritier de la Rus' de Kiev est assez impudente. Nous devons avancer une fois de plus au-delà du Dniepr et reconquérir Tchernigov pour la Lituanie."
 retake_smolensk_title:0 "Libérer Smolensk"
 retake_smolensk_desc:0 "La forteresse de Smolensk se dresse comme la porte d'entrée de la Lituanie, sans laquelle les hordes russes peuvent déferler vers l'ouest à volonté. Nous devons récupérer cette forteresse en priorité."
 subjugate_aquileia_title:0 "Subjuguer Aquilée"
 subjugate_aquileia_desc:0 "Le patriarche d'Aquilée était autrefois l'un des États les plus puissants de la péninsule italienne. Maintenant, ses jours de gloire sont passés et Venise devrait le supplanter."
 conquer_friuli_title:0 "Conquérir le Frioul"
 conquer_friuli_desc:0 "La ville de Venise, de par sa situation, est assez à l'abri des attaques. Cependant, pour ne pas être à la merci du paysage politique italien changeant, nous devons étendre nos possessions terrestres."
 conquer_brescia_title:0 "Avancer dans la vallée du Pô"
 conquer_brescia_desc:0 "La forteresse de Brescia est la ville la plus importante de l'est de la Lombardie. Pour protéger les possessions vénitiennes des riches États lombards, nous devons contrôler cette région."
 conquer_verona_title:0 "S'étendre dans la 'Terra Ferma'"
 conquer_verona_desc:0 "Nous devons étendre nos possessions sur le continent italien, et où demandez-vous ? Dans la belle Vérone, où nous situons notre scène."
 conquer_istria_title:0 "Défendre le commerce vénitien"
 conquer_istria_desc:0 "L'Adriatique est l'artère le long de laquelle tout le commerce vénitien circule. Pour la défendre, nous devons établir une chaîne de bases le long de la côte pour que notre flotte puisse opérer."
 defend_crete_title:0 "Défendre la Crète"
 defend_crete_desc:0 "Le Turc avance une fois de plus en Méditerranée, notre base en Crète nous permet de harceler leur commerce en Égée. Nous devons nous assurer que la Crète reste entre nos mains."
 retake_crete_title:0 "Reprendre la Crète"
 retake_crete_desc:0 "L'île de Crète formait un maillon clé dans la chaîne de bases que nous avons pour défendre Venise de l'Est. Nous devons reprendre cette île pour que la république soit vraiment en sécurité."
 bohemia_silesia_relations_title:0 "Relations silésiennes"
 bohemia_silesia_relations_desc:0 "En 1327, les ducs de Silésie ont accepté Jean l'Aveugle comme leur suzerain. Cependant, nous ne voyons pas vraiment beaucoup de signes d'amitié, nous devons donc améliorer nos relations."
 diplo_annex_silesia_title:0 "Incorporer la Silésie"
 diplo_annex_silesia_desc:0 "En 1335, le roi polonais Casimir III a accepté que la Bohême était les dirigeants légitimes de la Silésie. Nous avons accepté un grand degré d'indépendance de nos ducs silésiens, mais maintenant la situation exige que nous fassions de la Silésie une partie intégrante de la Bohême."
 bohemia_hungary_relations_title:0 "Relations avec la Hongrie"
 bohemia_hungary_relations_desc:0 "Depuis que Venceslas III, le dernier roi Přemyslide de Bohême, a également été acclamé roi de Hongrie, les destins des deux royaumes ont été entrelacés. Il est temps de renforcer nos liens avec eux."
 defend_bohemia_against_hungary_title:0 "Pas un pouce aux Hongrois"
 defend_bohemia_against_hungary_desc:0 "Nous devons nous assurer qu'aucun sol bohémien ne soit possédé par la Hongrie."
 bohemia_austria_relations_title:0 "Relations avec les Habsbourg"
 bohemia_austria_relations_desc:0 "Les Habsbourg d'Autriche ont parfois été un voisin intéressant à avoir. Voyons si nous pouvons améliorer les relations avec eux."
 improved_relations_with_electors_title:0 "Améliorer les relations avec l'électeur de $COUNTRY$"
 improved_relations_with_electors_desc:0 "Le système électif de l'Empire d'Anbennar est parfois un vrai problème. Récemment, nous avons remarqué que nous ne sommes pas aussi populaires que nous pourrions l'être auprès de l'électeur de §Y$COUNTRY$§W. Pour nous assurer que notre dynastie reste empereur, nous devons renforcer nos liens."
 become_emperor_title:0 "Devenir empereur"
 become_emperor_desc:0 "Nous avons été bénis avec la dignité électorale parmi les princes de l'Empire. Cependant, si nous pouvions améliorer les relations avec d'autres électeurs, le trône impérial pourrait être à notre portée."
 naval_recruiting_act_title:0 "Adopter l'acte de recrutement naval"
 naval_recruiting_act_desc:0 "Une marine puissante dépend de marins robustes et capables. Un acte de recrutement obligerait les hommes valides sans aucun moyen de revenu à s'enrôler pour le service naval et augmenterait ainsi le nombre de marins disponibles."
 militia_act_title:0 "Adopter l'acte de milice"
 militia_act_desc:0 "Déclarer le roi et le roi seul comme le chef suprême des forces militaires. Le seul droit de la milice, à tous égards qu'il s'agisse d'ordonner ou de disposer, repose entre les mains du roi."
 statute_of_monopolies_title:0 "Déclarer le statut des monopoles"
 statute_of_monopolies_desc:0 "Encourager la croissance économique en promouvant le libre-échange et la libre circulation des biens entre les nations commerçantes et condamner les monopoles et les restrictions gouvernementales."
 licensing_of_the_press_act_title:0 "Adopter l'acte de licence de la presse"
 licensing_of_the_press_act_desc:0 "En adoptant des règles et des réglementations strictes concernant l'impression et les presses à imprimer, il sera non seulement possible de minimiser la quantité de textes traîtres et abusifs dans notre société, mais aussi de fournir un degré de contrôle plus élevé sur les masses."
 tenures_abolition_act_title:0 "Adopter l'acte d'abolition des tenures"
 tenures_abolition_act_desc:0 "Fixer un montant fixe de compensation pour le monarque et supprimer les divers types de tenures militaires et agricoles dues à la couronne."
 court_of_wards_and_liveries_title:0 "Adopter l'acte du tribunal des pupilles et livrées"
 court_of_wards_and_liveries_desc:0 "Établir un tribunal des pupilles et livrées qui sera responsable de l'administration de la collecte des impôts et des droits féodaux. Le tribunal traitera également toutes les questions liées à la tutelle et à la livrée."
 dissolution_act_title:0 "Adopter l'acte de dissolution"
 dissolution_act_desc:0 "Empêcher les rois d'exercer un contrôle absolu sur leurs royaumes sans le consentement du Parlement en exigeant que les membres du Parlement soient convoqués au moins une fois tous les trois ans."
 statue_in_restraint_of_appeals_title:0 "Déclarer le statut de restriction des appels"
 statue_in_restraint_of_appeals_desc:0 "Rétrograder officiellement le Haut-Recteur et élever le roi au rang d'autorité juridique finale en toutes matières religieuses."
