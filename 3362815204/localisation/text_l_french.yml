 WARTAX_CANT_STOP_TIP:0 "Nous prélevons déjà les impôts de guerre jusqu'au "
 more_merchants:0 "Recrutement de marchands"
 desc_more_merchants:0 "Tous nos efforts sont actuellement concentrés sur le recrutement de davantage de marchands"
 efficienct_merchants:0 "Efficacité accrue des marchands"
 desc_efficienct_merchants:0 "Tous nos efforts sont actuellement concentrés sur l'amélioration de l'efficacité de nos marchands"
 local_trade_focus:0 "Priorité au commerce local"
 desc_local_trade_focus:0 "Nous avons décidé de concentrer tous nos efforts sur le développement de notre commerce local"
 global_trade_focus:0 "Priorité au commerce d'outre-mer"
 desc_global_trade_focus:0 "Nous avons décidé de concentrer tous nos efforts sur le développement du commerce d'outre-mer"
 military_focus:0 "Priorité militaire"
 desc_military_focus:0 "La plupart des recherches sont actuellement orientées vers l'amélioration de notre armée ; malheureusement, la recherche commerciale en pâtit."
 trade_focus:0 "Priorité commerciale"
 desc_trade_focus:0 "La plupart des recherches sont actuellement orientées vers l'amélioration de notre commerce ; malheureusement, la recherche militaire en pâtit."
 establish_bank_of_amsterdam_title:0 "Établir la Banque d'Amsterdam"
 establish_bank_of_amsterdam_desc:0 "Le nerf du commerce est la valeur de la monnaie, et les pièces ne valent pas toujours ce qu'elles prétendent valoir. La Banque d'Amsterdam propose d'émettre des billets de banque à valeur garantie ; cela pourrait aider."
 bank_of_amsterdam:0 "Banque d'Amsterdam"
 desc_bank_of_amsterdam:0 "Dans l'Europe de la Renaissance, la monnaie des petits États consistait en grande partie en devises des nations voisines. Afin de remédier à cette situation, une banque fut fondée en 1609 sous la protection de la ville d'Amsterdam. Cette banque recevait d'abord les monnaies étrangères et locales à leur valeur réelle, intrinsèque, déduisait un petit frais de frappe et de gestion, et créditait les clients dans ses livres pour le reste."
 india_trade_co:0 "Compagnie des Indes orientales"
 desc_india_trade_co:0 "L'octroi d'un monopole sur le commerce avec les Indes orientales a permis à nos marchands de négocier d'une seule voix, améliorant nos accords commerciaux. Cela garantit également que nous savons exactement qui rapporte les marchandises, ce qui nous permet de mieux percevoir nos taxes."
 dutch_india_trade_co:0 "Vereenigde Oost-Indische Compagnie"
 desc_dutch_india_trade_co:0 "La VOC a donné aux marchands néerlandais une voix unique en ce qui concerne le commerce avec les lucratifs marchés des Indes orientales. Cela a amélioré notre capacité à négocier des concessions commerciales et à fonder des bases pour promouvoir notre commerce."
 found_voc_title:0 "Fonder l'Oost-Indische Compagnie"
 found_voc_desc:0 "Une compagnie de marchands demande aux États généraux un monopole de 21 ans pour mener des activités coloniales en Asie. Ces régions sont potentiellement très riches, mais ils ont besoin du monopole car les risques sont très élevés."
 POLICY_TRIGGER:0 "$SLIDER$ $DIRECTION$ $VALUE$.\n"
 trade_and_production_cutbacks:0 "Réductions du commerce et de la production"
 desc_trade_and_production_cutbacks:0 "Nous avons dû réduire les coûts du commerce et de la production pour soutenir notre armée"
 military_cutbacks:0 "Réductions militaires"
 desc_military_cutbacks:0 "Nous avons dû réduire les coûts militaires pour soutenir la production et le commerce"
 short_term_boost:0 "Stimulation à court terme"
 desc_short_term_boost:0 "Les impôts ont été considérablement augmentés pour améliorer l'état de notre trésor"
 long_term_boost:0 "Stimulation à long terme"
 desc_long_term_boost:0 "Les impôts ont été légèrement augmentés pour améliorer l'état de notre trésor"
 attrition_mod:0 "Dû à l'attrition"
 CANT_FIRE_ADVISOR:0 "Nous avons récemment engagé ce conseiller et ne pouvons pas le renvoyer avant le "
 WCRD_EMPEROR:0 "Ils font partie de l'Empire, et nous en sommes l'Empereur."
 decreased_military_funding:0 "Financement militaire réduit"
 desc_decreased_military_funding:0 "Nous réduisons actuellement les dépenses militaires."
 even_spread_of_investments:0 "Répartition équilibrée des investissements"
 desc_even_spread_of_investments:0 "Malgré les désaccords au parlement, il a été décidé que tous les domaines technologiques recevraient un financement supplémentaire."
 MERCENARY_COST:0 "Coût des mercenaires"
 financial_arguments:0 "Débats financiers"
 desc_financial_arguments:0 "Notre parlement a quelques difficultés à décider d'accepter ou de rejeter la réforme financière proposée il y a quelque temps"
 emergency_plan:0 "Plan d'urgence"
 desc_emergency_plan:0 "Certaines mesures ont été prises pour prévenir une contre-révolution"
 bothersome_parliament:0 "Parlement gênant"
 desc_bothersome_parliament:0 "Notre parlement semble avoir quelques difficultés à comprendre qui dirige notre gouvernement."
 desc_golden_fleece:0 "Pretium Laborum Non Vile"
 establish_golden_fleece_title:0 "Établir l'Ordre de la Toison d'Or"
 establish_golden_fleece_desc:0 "Notre duc a été élu à l'ordre anglais de la Jarretière, mais a dû décliner pour ne pas offenser le roi de France. Cependant, nous pouvons créer notre propre ordre de chevalerie avec des règles similaires et l'appeler l'Ordre de la Toison d'Or."
 create_the_compagnies_ordonnance_title:0 "Créer les Compagnies d'ordonnance"
 create_the_compagnies_ordonnance_desc:0 "Si nous établissions un ensemble de règles codifiant exactement ce qui est requis pour fournir des troupes à notre armée, cela rationaliserait le recrutement des mercenaires et rendrait le processus moins coûteux."
 desc_compagnies_ordonnance:0 "La codification de ce qui était exactement requis pour soutenir 100 chevaliers dans l'armée ; ces blocs de 700 hommes formeraient la base des futures compagnies."
 the_staple_port:0 "Le port de l'étape"
 desc_the_staple_port:0 "Nous avons accordé à Calais les droits exclusifs d'importer la laine anglaise sur le continent. Cela a considérablement augmenté les revenus du port."
 the_theme_system:0 "Le système des thèmes"
 desc_the_theme_system:0 "Un système administratif civil et militaire qui offrait des terres en échange d'un engagement au service militaire. Cela signifie que nous n'avons pas à recourir à la conscription, ce qui facilite le recrutement."
 desc_vornedskab:0 "Les Danois introduisirent le 'Vornedskab', ou servage comme on l'appelle en français, relativement tard par rapport au reste de l'Europe. Cependant, il fut assez efficace et important pour façonner l'État danois."
 adopt_vornedskab_title:0 "Adopter le Vornedskab"
 adopt_vornedskab_desc:0 "Le problème avec l'imposition des gens est qu'il faut vraiment savoir où ils se trouvent pour les taxer efficacement. Si nous décrétons qu'aucun paysan ne peut quitter son lieu de naissance sans la permission du propriétaire terrien, cela faciliterait leur imposition."
 desc_den_danske_lov:0 "La Danske Lov fut introduite pour avoir un ensemble codifié de lois commun à tout le royaume. Cela garantissait que la loi était la même dans toutes les parties du Danemark."
 sign_den_danske_lov_title:0 "Signer la 'Den Danske Lov'"
 sign_den_danske_lov_desc:0 "Au fil des ans, diverses lois et décrets se sont accumulés. Dans l'intérêt d'une administration efficace, il serait préférable de les codifier en un corpus unique de lois afin que chacun connaisse ses droits."
 move_capital_to_delhi_title:0 "Déplacer la capitale à Delhi"
 move_capital_to_delhi_desc:0 "Pour être honnête, notre capitale actuelle ne convient pas à un monarque aussi glorieux que le nôtre. Déplaçons le siège du gouvernement vers le joyau de l'Inde, Delhi, afin que tous sachent combien nous sommes grands."
 UNIT_DETACH_BLOCKADE:0 "§YDétacher pour le blocus§!"
 UNIT_DETACH_BLOCKADE_NO_RETREAT:0 "Impossible de détacher une flotte en retraite."
 UNIT_DETACH_BLOCKADE_TOO_FEW:0 "Pas assez de navires à détacher."
 UNIT_DETACH_BLOCKADE_ONLY_TRANSPORTS:0 "Il est impossible de faire un détachement quand il n'y a que des transports dans la flotte."
 UNIT_DETACH_BLOCKADE_NO_MOTHBALL:0 "Impossible de détacher une flotte en réserve."
 UNIT_DETACH_BLOCKADE_IN_PORT:0 "Impossible de détacher au port."
 UNIT_DETACH_BLOCKADE_LOW_CAPACITY:0 "La flotte est trop faible pour faire un détachement."
 UNIT_DETACH_BLOCKADE_NOT_BLOCKADING:0 "La flotte ne bloque aucun port."
