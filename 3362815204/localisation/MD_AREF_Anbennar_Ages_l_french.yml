l_french:

 age_of_revolutions_desc: "Les découvertes précurseurs alliées à l'ingéniosité gnome ont forgé un avenir où la magie est servile et domestiquée. Les pouvoirs de l'ancienne classe magique sont désormais largement accessibles, et un nouveau monde avec un peuple éclairé est en train de naître."


 loc_md_age_of_discovery: "§YÈre de la Marée Verte§!\nLe monde entier tremble alors que des centaines de milliers d'orques déferlent de l'Échine-du-Serpent. Cette ère de bouleversements appelle à l'émergence d'un État-nation unifié contre les forces barbares du mal.\n----------\n(Active les Conflits Religieux.)\nC'est l'ère de départ."

 loc_md_age_of_reformation: "§YÈre de l'Effilochement§!\nAvec la Redécouverte d'Aelantir viennent les secrets des elfes précurseurs, et avec eux, les secrets du monde. D'est en ouest, les érudits cherchent à percer les mystères du passé, inaugurant une ère d'exploration et de réformation.\n----------\n(Active les Conflits Religieux.)\nCette ère commence lorsque l'année est au moins §Y1560§! OU qu'une découverte majeure en Aelantir a été faite..."

 loc_md_age_of_absolutism: "§YÈre des Rois-Sorciers§!\nLa fin de la Marée Verte annonce une nouvelle ère forgée par la guerre et obscurcie par les cultes de la personnalité... mais que se passe-t-il lorsque la magie n'est plus contrôlée ? Que se passe-t-il dans un pays où les règles de l'Ancienne Société n'ont plus cours ?\n----------\n(Active les mécaniques d'Absolutisme.)\nCette ère commence lorsque l'institution §YCommerce Mondial§! est établie depuis §Y120§! mois."

 loc_md_age_of_revolutions: "§YÈre des Artificiers§!\nLes découvertes précurseurs alliées à l'ingéniosité gnome ont forgé un avenir où la magie est servile et domestiquée. Les pouvoirs de l'ancienne classe magique sont désormais largement accessibles, et un nouveau monde avec un peuple éclairé est en train de naître.\n----------\n(Active les mécaniques d'Absolutisme.)\nCette ère commence lorsque l'institution §YLumières§! est établie depuis §Y120§! mois."

 obj_md_is_emperor_desc: "Être empereur d'Anbennar, ou former votre propre Empire !"

 obj_md_humanism_religious: "Tolérance ou Religieux"
 obj_md_humanism_religious_desc: "Adopter pleinement soit le groupe d'idées Tolérance, soit Religieux."

