 loc_md_reformation_bonus_info: "----- §YAccomplissement d'Objectifs§! -----\nConvertir des Provinces : §G-10 % Entretien des Missionnaires§!\nRègne Théocratique : §G+1 Réputation Diplomatique§!\nConversion Forcée : §G+1 % Force Missionnaire§!\nTolérance ou Religion : §G+10 % Unité Religieuse§!\nAvoir des Vassaux : §G+1 Prestige et Légitimité§!\nRevendiquer la Route : §G+1 Prestige et Légitimité§!\nUnité Religieuse : §G-2 Agitation Globale§!\nDeux Continents : §G+5 % Pouvoir et Efficacité Commerciale§!\nEmpire en Expansion : §G+5 % Pouvoir et Efficacité Commerciale§!\nAuditer le Gouvernement : §G-10 % Coûts des Conseillers§!\n\nNote : Certains objectifs ne sont pas disponibles pour votre nation."
 loc_md_revolutions_bonus_info: "----- §YAccomplissement d'Objectifs§! -----\nÊtre Empereur : §G+5 Absolutisme Maximum§!\nEmpire Colonial : §G+10 % Pouvoir et Efficacité Commerciale§!\nConquérir l'Échine : §G+10 % Pouvoir et Efficacité Commerciale§!\nNation Multiculturelle : §G+1 Réputation Diplomatique§!\nUniversités Multiples : §G-2,5 % Tous les Coûts de Pouvoir§!\nGrand Chef Militaire : §G+10 % Manpower et Marins§!\nArmée Disciplinée : §G+1 Chef Gratuit, -20 % Coût des Chefs§!\nApprovisionnement Nouveau Monde : §G+10 % Pouvoir et Efficacité Commerciale§!\nMarchés Multiples : §G+10 % Pouvoir et Efficacité Commerciale§!\n\nNote : Certains objectifs ne sont pas disponibles pour votre nation."