###misc

 ancestor_worship:0 "Culte des Ancêtres"
 ancestor_worship_religion_desc:0 "Les Nains possèdent une grande histoire semi-mythologisée de divers héros, rois et ancêtres remontant à leur création par Halanna la Terre-Mère dans les grottes de l'Arbre-de-Pierre. On dit qu'une salle de cent conteurs ne pourrait narrer l'intégralité du folklore nain même avec cent ans pour le faire, et chaque forteresse possède ses propres récits conservés dans des archives soigneusement entretenues. À une époque, ces récits faisaient partie d'une croyance plus vaste en un panthéon nain, mais la plupart des nains ont perdu la foi en leurs dieux il y a longtemps, lors de la chute d'Aul-Dwarov, tandis que l'effondrement de ce grand empire n'a laissé derrière lui que davantage de tragédies et de récits de grandeur. Bien que les grands ancêtres soient vénérés et révérés, ils ne sont pas des dieux : ils sont des rappels de ce que la simple ingéniosité, le courage et la sagesse nains peuvent accomplir. Inspirés par les héros d'antan, de nombreux nains tournent leurs regards vers le Dwarovar, le Foyer-de-Tous-les-Nains, afin de reconquérir l'histoire et les terres qu'ils ont perdues."
 ancestor_worship_blessings:0 "Enseignements Ancestraux"
 pick_ancestor_worship_blessing:0 "Choisir un Enseignement"

