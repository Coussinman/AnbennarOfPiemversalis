 ###major events
 ancestor_worship.1.t:0 "Krummul le Pourfendeur d'Orques"
 ancestor_worship.1.d:0 "Après avoir redécouvert Gor Vazumbrog, des récits nous sont parvenus concernant un grand nain. Connu sous le nom de Krummul le Pourfendeur d'Orques, il tint la ligne contre les invasions orques dans le Segbandal, et s'aventura même à la surface pour aider les humains du Bulwar contre une incursion orque venue de Hul-Jorkad. Après son trépas, les nains de l'ancien Segbandal l'élevèrent à une position de grand honneur sur leurs autels, en tant que l'un des Grands Ancêtres."
 ancestor_worship.1.a:0 "Nous ferons de même."
 ancestor_worship.1.tooltip:0 "§YLe Livre des Rancunes Naines de Krummul le Pourfendeur d'Orques§! est désormais disponible comme §YEnseignement Ancestral§! !"
 ancestor_worship.2.t:0 "Balgar le Bâtisseur"
 ancestor_worship.2.d:0 "Cela fait bien longtemps que nous n'avons pas eu de contacts véritables avec les humains de Cannor. Maintenant que la voie vers l'Escann est de nouveau ouverte, nous avons entendu des récits extraordinaires sur les merveilles qu'un nain y a accomplies. Balgar, au service de l'Empire de Castanor, a conçu plusieurs châteaux prodigieux et une muraille impressionnante qui s'étend tout autour des parties intérieures de Castanor. Les nains de Cannor l'ont accepté comme l'un des Grands Ancêtres sur leurs autels."
 ancestor_worship.2.a:0 "Il est difficile de ne pas comprendre pourquoi."
 ancestor_worship.2.tooltip:0 "§YLes Quinze Étapes de Construction de Balgar le Bâtisseur§! sont désormais disponibles comme §YEnseignement Ancestral§! !"
 ancestor_worship.3.t:0 "Murri le Briseur de Géants"
 ancestor_worship.3.d:0 "Nous avions entendu parler d'une guerre où les nains de Khugdihr combattirent aux côtés des humains de Castanor contre les géants. Cela nous avait toujours semblé lointain, cependant, et nous n'avions pas entendu les grands récits qui furent forgés dans ce conflit. Le plus grand d'entre eux est de loin celui de Murri le Briseur de Géants, dont on dit qu'il tua des dizaines de géants de sa propre lame. Après son trépas, on lui accorda une place sur les autels en tant que nouveau Grand Ancêtre."
 ancestor_worship.3.a:0 "Et nous ferons de même."
 ancestor_worship.3.tooltip:0 "§YLe Code de Combat de Murri le Briseur de Géants§! est désormais disponible comme §YEnseignement Ancestral§! !"


 ###flavor events

 ancestor_worship.100.t:0 "Un Nouvel Ancêtre Vénéré"
 ancestor_worship.100.d:0 "Notre précédent [Root.Monarch.GetTitle] fut une grande personne de son vivant, et après son trépas, les chroniques de sa vie sont maintenant rédigées. Certains nains l'ont déjà ajouté à leurs autels domestiques, mais était-il suffisamment digne de son vivant pour être ajouté aux autels publics ?"
 ancestor_worship.100.1:0 "Il sera inscrit dans les annales ancestrales."
 ancestor_worship.100.2:0 "Bon, mais pas assez."

 ancestor_worship.101.t:0 "Archives Exhumées"
 ancestor_worship.101.d:0 "Nos efforts continus pour approfondir [Root.Province.GetName] ont par hasard mis au jour d'anciennes archives datant des jours d'Aul-Dwarov. Nos Gardiens de Pierre ont copié avec enthousiasme les pages en décomposition, et mis à jour certaines de nos propres archives."
 ancestor_worship.101.1:0 "Un autre fragment de notre histoire récupéré !"
 ancestor_worship.101.2:0 "Il est temps de remettre certaines archives en ordre."

 ancestor_worship.102.t:0 "Archives Contradictoires"
 ancestor_worship.102.d:0 "On a récemment découvert que différentes archives historiographiques d'un ancêtre vénéré se contredisent, ce qui a conduit à un débat houleux entre différentes factions des Gardiens de Pierre. Bien que ce ne soit pas vraiment notre affaire d'intervenir, le débat commence à interférer avec leurs autres devoirs."
 ancestor_worship.102.1:0 "Nous devons prendre la décision à leur place."
 ancestor_worship.102.2:0 "Laissons-les discuter, ils finiront par s'épuiser."
 ancestor_worship.102.3:0 "Fascinant, et où avez-vous dit que les versions divergent ?"

 ancestor_worship.103.t:0 "Guerriers Inspirés"
 ancestor_worship.103.d:0 "Il existe de nombreux récits de nains continuant à combattre malgré des chances impossibles et une mort certaine. Ce sont des récits solennels et beaux, nous honorons ces ancêtres qui tombèrent pour la défense de leurs forteresses et de leurs clans. Mais l'histoire de Krummul était différente. Krummul nous montre que parfois, malgré des chances apparemment impossibles, nous pouvons vaincre. Les récits de Krummul inspirent l'espoir."
 ancestor_worship.103.1:0 "Nous aspirons à sa force."
 ancestor_worship.103.2:0 "Nous sommes honorés d'avoir hérité de sa force."

 ancestor_worship.104.t:0 "Construction Inspirée"
 ancestor_worship.104.d:0 "Chaque forteresse est une merveille d'ingénierie, un témoignage de l'ingéniosité et du savoir-faire nains. Mais la plupart des nains admettront à contrecœur que certaines des plus impressionnantes réalisations de l'ingénierie naine se trouvent hors des montagnes. Les merveilles de Balgar sont une inspiration pour beaucoup, et ses styles sont même imités dans les forteresses du Dwarovar."
 ancestor_worship.104.1:0 "Puissent nos murs être aussi solides que les siens."
 ancestor_worship.104.2:0 "Nous qui demeurons honorons la mémoire du Bâtisseur."

 ancestor_worship.105.t:0 "Agriculture Inspirée"
 ancestor_worship.105.d:0 "Certains nains insensés pensent que Quila la Moissonneuse n'a pas sa place parmi les Grands Ancêtres, la dénigrant comme « une simple fermière ». Tout nain qui connaît son histoire, cependant, sait à quel point son travail a fondamentalement transformé le Dwarovar. Après que les travaux d'irrigation de Quila furent mis en œuvre, le Val-du-Serpent passa de la capacité de nourrir Amldihr à celle de nourrir chaque forteresse avec des surplus considérables. Quila inaugura une ère d'abondance et de prospérité pour Aul-Dwarov jamais vue auparavant."
 ancestor_worship.105.1:0 "Croissez et prospérez !"
 ancestor_worship.105.2:0 "Par élévateur et écluse, l'eau jusqu'aux étagères."

 ancestor_worship.106.t:0 "Spéléologie Inspirée"
 ancestor_worship.106.d:0 "Quand Urist le Spéléologue naquit, Grozumdihr et Ovdal Kanzad étaient les forteresses les plus orientales du Dwarovar. Ce fut Urist qui découvrit le passage vers la région orientale de l'Arbre-de-Pierre, et plus tard dans sa vie il voyagea par la surface pour explorer les cavernes de la chaîne de montagnes qui allait devenir les Mines-de-Jade. Pas moins de cinq forteresses seraient finalement construites sur la base des cartes détaillées qu'Urist dressa lors de ses aventures, et sa soif d'exploration a toujours inspiré le peuple nain depuis lors."
 ancestor_worship.106.1:0 "Creusez plus loin, découvrez chaque secret."
 ancestor_worship.106.2:0 "Apportez la lumière là où jamais elle n'a brillé."

 ancestor_worship.107.t:0 "Invention Inspirée"
 ancestor_worship.107.d:0 "De tous les Grands Ancêtres, Mellegar l'Inventeur fut sans aucun doute le plus controversé de son vivant, s'attirant les critiques pour ses affirmations extravagantes et ses conceptions étranges, même dans sa forteresse natale d'Orlghelovar. Avec le temps, cependant, alors que la science prouvait ses affirmations une par une et que ses conceptions, bien que pas toujours pratiques, fonctionnaient parfaitement, il fut institué comme Grand Ancêtre longtemps après sa mort. Un bon rappel que parfois, le savoir établi est simplement erroné, et que le fou brisant les conventions sacrées est exactement ce dont on avait besoin."
 ancestor_worship.107.1:0 "Innovation naine !"
 ancestor_worship.107.2:0 "Poussons la science naine vers de nouveaux sommets... euh, profondeurs."

 ancestor_worship.108.t:0 "Beuverie Inspirée"
 ancestor_worship.108.d:0 "Hehogrim le Diligent est surtout célèbre pour ses inventions et ses conceptions de forteresses, mais son aptitude aux festins et à la boisson n'est pas loin derrière. De son vivant, il fut un exemple éclatant de la façon dont un nain peut boire et festoyer tout en accomplissant de grandes choses. Levons une chope à Hehogrim !"
 ancestor_worship.108.1:0 "hshhooo qu'chque j'dischais c'pas une bonne bièèèère cha ?"
 ancestor_worship.108.2:0 "y'aaa queeelqu'un quiii veut naager dansss la fontainnne ?"

 ancestor_worship.109.t:0 "Législation Inspirée"
 ancestor_worship.109.d:0 "Gimron le Législateur n'a aucun récit palpitant écrit à son sujet. Pourtant, il est tout autant honoré avec grande révérence. Gimron dirigea la réécriture des Lois Fondamentales du Dwarovar dans le sillage de la Guerre de la Gemme Sanglante, dans un effort pour panser les profondes blessures que la guerre civile avait causées. Chaque nain a des devoirs et des droits qu'aucun roi ou chef de clan ne peut lui retirer par orgueil ou soif de gloire. La vraie justice n'est pas seulement punition. C'est guérison."
 ancestor_worship.109.1:0 "Un solide précédent pour nos lois."
 ancestor_worship.109.2:0 "Les mots doivent parfois lier aussi dur que la pierre."

 ancestor_worship.110.t:0 "Chasse Inspirée"
 ancestor_worship.110.d:0 "Les nains sont de petite stature comparés à la plupart des races du monde, mais notre taille cache une force et une constitution que peu peuvent égaler. Les nains sont des membres respectés des groupes d'aventuriers et des guildes à travers Halann, que ce soit comme guerriers ou mages runiques : chaque nain est bien plus que sa taille. Aucun nain n'a jamais mieux incarné cela que Murri le Briseur de Géants, et il n'est pas étonnant que ses récits restent toujours populaires parmi notre population."
 ancestor_worship.110.1:0 "À la prochaine génération de tueurs de géants."
 ancestor_worship.110.2:0 "Grâce à des œuvres comme les siennes, le Dwarovar est un lieu plus lumineux."

 ancestor_worship.111.t:0 "Zèle Inspiré"
 ancestor_worship.111.d:0 "Dagrin Barbe-Éternelle est considéré comme le plus grand parmi les ancêtres, ses récits se comptant par dizaines. Il est considéré comme le père fondateur de la race naine, et la dagrite qui relie tout le Dwarovar par les rails est nommée en son honneur. C'est lui qui fit de nous un peuple de récits."
 ancestor_worship.111.1:0 "Et ses récits nous conterons !"
 ancestor_worship.111.2:0 "Comme nos rails, telles des racines les récits se propagent !"

 ancestor_worship.112.t:0 "Autres Récits"
 ancestor_worship.112.d:0 "Les conteurs ont toujours été le principal moyen par lequel les jeunes nains découvrent notre histoire et acquièrent le respect de leurs ancêtres. Récemment, cependant, de plus en plus de conteurs incluent également des récits venus d'au-delà du Dwarovar, racontant les exploits héroïques des humains, des elfes, et d'autres. Nos Gardiens de Pierre sont peu satisfaits de cela, et demandent que nous payions les conteurs du royaume pour qu'ils se concentrent sur notre propre histoire."
 ancestor_worship.112.1:0 "Les conteurs ont toujours été libres de choisir leurs récits."
 ancestor_worship.112.2:0 "Notre peuple ne doit pas être privé de son histoire."

 ancestor_worship.113.t:0 "Ancien Mausolée"
 ancestor_worship.113.d:0 "Le dégagement d'un ancien tunnel effondré a révélé le mausolée perdu d'un ancêtre localement vénéré, ce qui a ravivé l'intérêt pour les récits le concernant. Les Gardiens de Pierre ont sauté sur l'occasion pour en tirer profit, finançant la restauration du mausolée de leur propre poche."
 ancestor_worship.113.1:0 "Merveilleux !"

 ancestor_worship.114.t:0 "L'Ancêtre du Dirigeant Célébré"
 ancestor_worship.114.d:0 "Chaque clan a ses propres ancêtres vénérés avec leurs propres jours fériés. L'un de ces jours fériés est aujourd'hui, et il se trouve que c'est celui d'un ancêtre du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Bien que les célébrations aient été prévues pour être privées, les Gardiens de Pierre suggèrent que nous utilisions une partie de nos fonds pour une grande célébration à laquelle tous nos sujets pourraient participer."
 ancestor_worship.114.1:0 "Une bonne excuse pour un bon festin !"
 ancestor_worship.114.2:0 "Je suis sûr qu'ils ne se soucient pas vraiment de cet obscur ancêtre des nôtres."

 ancestor_worship.115.t:0 "Un Chef de Clan Érige un Autel"
 ancestor_worship.115.d:0 "Un chef de clan influent finance un autel public dédié à lui-même. Cela s'est avéré assez controversé parmi nos Gardiens de Pierre, en partie parce qu'il n'a joué de rôle notable dans aucun récit, mais surtout parce qu'il n'est même pas encore mort. Ils nous supplient de mettre fin à la construction."
 ancestor_worship.115.1:0 "Je suppose que nous pouvons être motivés à ignorer cela"
 ancestor_worship.115.2:0 "Cessez ce sacrilège ou je ferai de vous un ancêtre sur-le-champ !"

 ancestor_worship.116.t:0 "Un Étranger Digne"
 ancestor_worship.116.d:0 "Des récits d'une grande personne de [noble_ancestor_border_prov.GetName] se sont répandus parmi notre peuple, car elle a vécu à nos côtés et accompli de grands exploits. Depuis son trépas, certains nains l'ont même ajoutée à leurs autels domestiques. Cela a conduit à un certain différend parmi nos Gardiens de Pierre. Presque chaque autel honore également des nains qui ne sont pas réellement des ancêtres, donc un manque de lignée directe ne devrait pas empêcher la vénération. Mais la vénération d'un non-nain devrait-elle être incorporée dans les écritures ?"
 ancestor_worship.116.1:0 "Il n'était pas nain, mais il était noble comme l'un des nôtres."
 ancestor_worship.116.2:0 "Seuls les nains peuvent être vénérés."
 ancestor_worship.116.3:0 "Être nain n'est pas une question de barbe ou de sang, c'est un mode de vie."

 ancestor_worship.117.t:0 "Le Jour de Tous les Ancêtres"
 ancestor_worship.117.d:0 "Le Jour de Tous les Ancêtres a lieu chaque année, mais certaines années il y a plus de fonds pour une plus grande célébration, ou simplement plus besoin de se souvenir des récemment disparus. Tous les nains qui le peuvent se rassemblent avec leurs clans ou leurs familles pour rendre hommage aux ancêtres, qu'ils soient morts il y a longtemps ou récemment. Cela se fait en allumant des bougies aux autels et aux tombes, et en échangeant des récits sur les ancêtres. Le Jour de Tous les Ancêtres est un jour de deuil et de narration rituelle, mais aussi un jour pour retrouver de vieux amis, apaiser les rivalités, et assurer à chaque nain que lui aussi sera honoré."
 ancestor_worship.117.1:0 "Et pour une fois, personne ne finira la nuit dans le caniveau."

 ancestor_worship.118.t:0 "Tombe d'un Ancêtre Détruite"
 ancestor_worship.118.d:0 "Les tombes sont le plus souvent construites en dehors des forteresses, afin de préserver l'espace pour les vivants. Cela a cependant l'inconvénient qu'il n'est pas facile de toutes les garder en sécurité. Le Dwarovar n'a jamais été sûr en dehors des portes d'une forteresse, et récemment, des monstres en maraude ont gravement profané la tombe de nos ancêtres. Que ce soient des ettins, des minotaures ou quelque autre grande créature, le résultat est le même, et beaucoup de maçonnerie naine soigneusement travaillée gît en ruines."
 ancestor_worship.118.1:0 "Maudites bêtes !"
 ancestor_worship.118.2:0 "Nous la reconstruirons alors."
 ancestor_worship.118.3:0 "Une bonne occasion de la rendre bien plus grandiose."


