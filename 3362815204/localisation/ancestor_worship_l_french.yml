 HOLY_SITE_4119_DESC:0 "Amldihr, signifiant Portes de l'Assemblée, fut le lieu où l'empire unifié d'Aul-Dwarov fut fondé. C'est là que le Dwarovkron fut forgé pour unifier tout le peuple nain, et son district d'Amlharaz fut le lieu de réunion de la Haute Assemblée des Forteresses pour conseiller son porteur. Elle se trouvait également au centre des grandes fermes en terrasses de surface du Val-du-Serpent, donnant au Haut-Roi la capacité de nourrir tous ses sujets pour qu'ils se sustentent dans les sombres profondeurs de la montagne."
 HOLY_SITE_4311_DESC:0 "Grônstunad était une forteresse bien plus jeune que nombre des prestigieuses forteresses de l'ouest, mais elle allait en éclipser beaucoup en richesse et en prestige. Aussi éloignée qu'elle fût du centre impérial d'Aul-Dwarov, elle fut relativement épargnée lors de la Guerre de la Gemme Sanglante. Quand Amldihr et une grande partie de l'ouest tombèrent face à l'invasion orque, Grônstunad était en position de devenir la nouvelle capitale naine. À cette fin, l'Empire de Jade fut fondé, visant à préserver les royaumes orientaux d'Aul-Dwarov et finalement reconquérir l'ouest. Il ne durerait pas. Encore plus de querelles intestines entre les forteresses restantes ouvrirent la porte à une dévastatrice invasion hobgobeline, et toutes les Mines-de-Jade passeraient bientôt sous le contrôle du Commandement hobgobelin."
 HOLY_SITE_2931_DESC:0 "Er-Natvir n'était pas seulement l'une des forteresses centrales du Dwarovar, mais aussi le carrefour d'où partaient tous les rails. Toutes les marchandises transitant vers et depuis la capitale passaient par cette forteresse, et les archives commerciales, témoignage de l'organisation naine, contenaient des informations sur les marchandises transitant par la forteresse depuis avant même que les rails ne soient posés. La chute d'Er-Natvir au début de l'invasion orque s'avérerait être un catalyseur de l'effondrement du reste d'Aul-Dwarov, car les rails laissés sans entretien entravèrent gravement les déplacements entre forteresses."
 HOLY_SITE_4078_DESC:0 "Nommée d'après le nain Hehogrim le Diligent qui la conçut, Hehodovar est connue comme la première forteresse. Bien que le peuple nain ait été créé dans l'Arbre-de-Pierre, c'est à Hehodovar que la civilisation naine a véritablement commencé. Située en plein milieu du Dwarovar, elle servit de capitale de facto précoce du peuple nain, d'où des efforts furent déployés pour construire d'autres forteresses dans le Dwarovar Central et au-delà. Son rôle de centre culturel diminuerait avec le temps, et à l'époque de l'unification d'Aul-Dwarov, elle était devenue un lieu des arts pratiques de l'artisanat et de la construction."
 HOLY_SITE_2963_DESC:0 "Hul-Jorkad était une forteresse sans grande importance... jusqu'au jour où un sombre fléau émergea de ses profondeurs. Ces bêtes furent nommées d'après la forteresse elle-même, mais pour le reste du monde, elles étaient connues sous un nom plus simple : les Orques. Plus mortelle que les gobelins qui avaient infesté les montagnes, la menace orque apporta la ruine aux nains. Le peuple nain perdit sa domination sur les montagnes, et forteresse après forteresse périrait sous la menace orque."
 HOLY_SITE_4093_DESC:0 "Arg-Ôrdstun fut toujours l'une des forteresses les plus riches, les plus prestigieuses et les plus puissantes de l'Échine-du-Serpent, et bien que son monarque n'eût officiellement pas de rang supérieur à tout autre, Arg-Ôrdstun régnait effectivement sur toute l'Atteinte-du-Serpent en tout sauf le nom. La source de cette richesse et de ce pouvoir était les mines de diamants les plus productives de toute l'Échine-du-Serpent, qui étaient essentielles tant pour l'ornementation que pour la fabrication d'outils. Durant la Guerre de la Gemme Sanglante, Arg-Ôrdstun mena les forteresses rebelles contre le Haut-Roi d'Aul-Dwarov, afin de maintenir son prestige face à l'affront perçu de l'ajout de la gemme de Rubis au Dwarovkron."
 HOLY_SITE_4269_DESC:0 "Le culte de l'ancien Panthéon Nain fut largement abandonné avec la chute d'Aul-Dwarov, mais la révérence envers Halanna demeura parmi de nombreux nains. On dit qu'Halanna créa les premiers nains à Graine-de-Terre, et perfectionna Halann pour que les nobles races du monde y vivent dessus et dedans. On dit qu'Halanna finit par se retirer dans le Plan de la Terre depuis le lieu même où elle créa le peuple nain, et les cavernes de Graine-de-Terre comptent encore parmi les plus belles de toute l'Échine-du-Serpent grâce à cela."
