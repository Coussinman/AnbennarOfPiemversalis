l_french:
 witch_king.0.t:0 "L'Ascension d'un Roi-Sorcier"
 witch_king.0.d:0 "[Root.Monarch.GetName] s'est fait connaître comme un puissant praticien de la magie, affranchi des entraves des anciennes lois et réglementations, ou comme les sycophantes d'Anbenncóst le nomment : un Roi-Sorcier.\n\nLa communauté internationale voit [Root.Monarch.GetName] comme un dirigeant assoiffé de pouvoir à la tête d'un État paria, un proscrit des cercles diplomatiques du monde...\n\n...mais qu'importe ?\n\nUn lion ne se soucie guère de l'opinion des moutons."
 witch_king.0.a:0 "Agenouillez-vous devant moi !"
 witch_king.1.t:0 "La Mort d'un Roi-Sorcier"
 witch_king.1.d:0 "Le [Root.Monarch.GetTitle] est mort !\n\nDes murmures de liberté se répandent à travers [Root.Country.GetName], tandis que la lumière de l'espoir fait entrevoir une nouvelle direction possible pour [Root.Country.GetName].\nLe royaume de terreur perdurera-t-il sous un digne successeur ? Des seigneurs de guerre ambitieux chercheront-ils à combler le vide de pouvoir laissé par une telle puissance ? Ou bien la liberté triomphera-t-elle enfin pour libérer les peuples opprimés ?"
 witch_king.1.a:0 "Un digne successeur se lève"
 witch_king.1.b:0 "Nous devons garder le contrôle de l'État, quoi qu'il en coûte"
 witch_king.1.c:0 "La liberté pour tous les peuples !"

 witch_king.2.t:0 "Le [This.Monarch.GetTitle] Maléfique Renversé"
 witch_king.2.d:0 "[This.Monarch.GetName] a été vaincu et son empire brisé !\n\nDes murmures de liberté se répandent à travers [This.Country.GetName], tandis que la lumière de l'espoir fait entrevoir une nouvelle direction possible pour [Root.Country.GetName].\nLe royaume de terreur perdurera-t-il sous un digne successeur ? Des seigneurs de guerre ambitieux chercheront-ils à combler le vide de pouvoir laissé par une telle puissance ? Ou bien la liberté triomphera-t-elle enfin pour libérer les peuples opprimés ?"
 witch_king.2.a:0 "Nous devons garder le contrôle de ce qui reste"

 witch_king.3.t:0 "[From.Monarch.GetName] Renversé"
 witch_king.3.d:0 "Grâce à nos actes vertueux, [From.Monarch.GetName] a été vaincu et son empire brisé !\n\nCela marquera assurément l'aube d'une ère nouvelle pour [From.Country.GetName]."
 witch_king.3.a:0 "Des légendes seront contées sur nos exploits de ce jour !"

 witch_king.4.t:0 "L'Ascension d'un Prince-Sorcier"
 witch_king.4.d:0 "À l'annonce que [imperial_witch_king.Monarch.GetName] a choisi de se proclamer Roi-Sorcier, l'empire est ébranlé. Assurément l'empereur ne permettra pas à ses sujets de faire de telles déclarations audacieuses ?"
 witch_king.4.a:0 "Il a perdu le droit de régner."
 witch_king.4.b:0 "Nous nous contenterons de le dénoncer."

 witch_king.5.t:0 "Ascension d'un Prince-Sorcier en [imperial_witch_king.GetName]"
 witch_king.5.d:0 "À l'annonce que [imperial_witch_king.Monarch.GetName] s'est proclamé Roi-Sorcier, l'empereur a déclaré la guerre pour le déposer. En tant que première autorité magique de l'empire, il est de notre responsabilité d'aider l'empereur dans cette cause."
 witch_king.5.a:0 "Nous nous joindrons à l'empereur."
 witch_king.5.b:0 "Nous avons d'autres préoccupations."

 incident_witch_prince:0 "Ascension d'un Prince-Sorcier dans l'empire"
 incident_witch_prince_member_alert:0 "[imperial_witch_king.Monarch.GetName] se proclame Roi-Sorcier, et par ses actes il a prouvé l'être véritablement. L'empereur ne peut coexister avec des Rois-Sorciers car cela constitue un défi à son autorité. La pression monte pour les éliminer."
 incident_witch_prince_emperor_alert:0 "[imperial_witch_king.Monarch.GetName] se proclame Roi-Sorcier, et par ses actes il a prouvé l'être véritablement. L'empereur ne peut coexister avec des Rois-Sorciers car cela constitue un défi à son autorité. La pression monte pour les éliminer."
 magisterium_may_join_war_tt:0 "Le Magisterium sera invité à se joindre à notre guerre, mais pourrait refuser."

 shirked_imperial_responsibility:0 "A failli à ses Responsabilités Impériales"
 cowardly_emperor:0 "Empereur Couard"
 denounced_witch_king:0 "Dirigeant Hors-la-Loi"

 witch_king.7.t:0 "La Doctrine Noire"
 witch_king.7.d:0 "« Sur la question de la divinité, l'avis du clergé est erroné. Un dieu n'est pas simplement un être céleste distant, mais plutôt un être capable de percevoir le chaos magique qui lie le monde. Par conséquent, si un mage suffisamment puissant peut plier le chaos de la magie à sa volonté, il doit alors être considéré comme un dieu ascendant. »\n- Adelar síl na Whistlehill\n\nLes écrits d'Adelar, l'un des nombreux mages nés-du-déluge apparus en Escann durant le Déluge Cramoisi, avaient été interdits dans le sillage des nombreuses guerres de Cannor, alors que des mages dissidents les utilisaient pour justifier guerre et atrocités. Pourtant ses écrits ont survécu dans le florissant commerce clandestin de livres, rassemblés en un seul tome connu sous le nom de La Doctrine Noire.\n\nAyant obtenu une copie traduite de La Doctrine Noire, [This.Monarch.GetName] comprend désormais pourquoi elle fut interdite : la peur. Cette même peur qui a poussé ses voisins à le qualifier de Roi-Sorcier. C'était la peur de la vérité : qu'[This.Monarch.GetSheHe] était si au-dessus de tous les autres qu'[This.Monarch.GetSheHe] était effectivement un dieu.\n\nMais pas en [This.GetName]. Ici, où [This.Monarch.GetName] règne sans partage, il ne peut y avoir qu'une seule vérité."
 witch_king.7.a:0 "Je suis la Vérité !"
 witch_king.7.b:0 "Je n'abandonnerai pas ma foi."