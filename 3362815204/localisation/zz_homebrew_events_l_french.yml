 gamer_move_start_title:0 "Autoriser l'usage indiscriminé du Gaz de Pourriture-du-Serpent"
 gamer_move_start_desc:0 "Tout homme, femme ou enfant en territoire ennemi pourrait être un adversaire. Mieux vaut tous les gazer, par précaution."
 gamer_move_end_title:0 "Restreindre l'usage du Gaz de Pourriture-du-Serpent"
 gamer_move_end_desc:0 "La Pourriture-du-Serpent est un fléau que nul ne souhaiterait à son pire ennemi. Nous devons cesser cette cruauté gratuite, de peur de l'attirer sur nous-mêmes."
