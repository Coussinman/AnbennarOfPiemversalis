 homebrew_reminder.1.t:0 "Une Exception aux Règles"
 homebrew_reminder.1.d:0 "Bonjour, si vous lisez ceci, c'est que vous êtes entré en possession de provinces nécessitant la construction de forts pour l'arbre de missions d'un pays. Ces provinces, Vieux Dwarovar, Khugsland et Fin-de-Logr, peuvent accueillir des forts sans pénalité ; n'hésitez donc pas à les fortifier !"
 homebrew_reminder.1.1:0 "Parfait."
 homebrew_reminder.2.t:0 "Une Exception aux Règles"
 homebrew_reminder.2.d:0 "Bonjour, si vous lisez ceci, c'est que vous êtes entré en possession des Murs Blancs de Castanor ou de Castonath elle-même. Puisque ces provinces ont des arbres de missions qui leur sont liés, elles peuvent accueillir des forts sans pénalité ; n'hésitez donc pas à les fortifier !"
 homebrew_reminder.2.1:0 "Parfait."
 homebrew_reminder.3.t:0 "Une Exception aux Règles"
 homebrew_reminder.3.d:0 "Bonjour, si vous lisez ceci, c'est que vous êtes entré en possession de provinces nécessitant la construction de forts pour l'arbre de missions d'un pays. Ces provinces, Nathwoud et Bradnath, peuvent accueillir des forts sans pénalité ; n'hésitez donc pas à les fortifier !"
 homebrew_reminder.3.1:0 "Parfait."
 homebrew_reminder.4.t:0 "Une Exception aux Règles"
 homebrew_reminder.4.d:0 "Bonjour, si vous lisez ceci, c'est que vous jouez Aelnar. Puisque l'une de vos missions requiert de prendre les Idées Religieuses, vous pouvez choisir entre les Idées Religieuses et la Suprématie Elfique. N'oubliez pas : vous ne pouvez en choisir qu'une seule !"
 homebrew_reminder.4.1:0 "Parfait."
 homebrew_reminder.5.t:0 "Une Exception aux Règles"
 homebrew_reminder.5.d:0 "Bonjour, si vous lisez ceci, c'est que vous êtes entré en possession de provinces nécessitant la construction de forts pour l'arbre de missions d'Azkare. Ces provinces, listées dans l'arbre de missions, peuvent accueillir des forts sans pénalité ; n'hésitez donc pas à les fortifier !"
 homebrew_reminder.5.1:0 "Parfait."
 homebrew_reminder.6.t:0 "Une Exception aux Règles"
 homebrew_reminder.6.d:0 "Bonjour, si vous lisez ceci, c'est que vous êtes entré en possession de l'État d'Amldihr ; il serait judicieux d'y construire des forts. Ces provinces peuvent accueillir des forts sans pénalité ; n'hésitez donc pas à les fortifier !"
 homebrew_reminder.6.1:0 "Parfait."
 homebrew_reminder.7.t:0 "Une Exception aux Règles"
 homebrew_reminder.7.d:0 "Bonjour, si vous lisez ceci, c'est que vous êtes entré en possession de provinces nécessitant la construction de remparts pour l'arbre de missions d'un pays. Ces provinces, Ijenmyfor, Kotierontol, Qarvetarqan et Firanyalen, peuvent accueillir forts et remparts sans pénalité ; n'hésitez donc pas à les fortifier !"
 homebrew_reminder.7.1:0 "Parfait."

 homebrew_spy.1.t:0 "Notre Armée Sabotée !"
 homebrew_spy.1.d:0 "Terrible nouvelle ! Des agents ennemis ont été aperçus incendiant nos dépôts militaires et répandant la désinformation au sein de notre commandement. Nous faisons tout notre possible pour traquer ces agents, mais d'ici là, notre capacité militaire est affaiblie."
 homebrew_spy.1.1:0 "Malédiction !"
 homebrew_spy.2.t:0 "Notre Marine Sabotée !"
 homebrew_spy.2.d:0 "Terrible nouvelle ! Des agents ennemis ont été aperçus incendiant nos chantiers navals et répandant la désinformation au sein de notre commandement naval. Nous faisons tout notre possible pour traquer ces agents, mais d'ici là, notre capacité navale est affaiblie."
 homebrew_spy.2.1:0 "Malédiction !"
 homebrew_spy.3.t:0 "Nos Ingénieurs Sabotés !"
 homebrew_spy.3.d:0 "Terrible nouvelle ! Des agents ennemis ont été aperçus détruisant notre équipement de siège et compromettant nos défenses. Nous faisons tout notre possible pour traquer ces agents, mais d'ici là, notre capacité militaire est affaiblie."
 homebrew_spy.3.1:0 "Malédiction !"
 homebrew_spy.4.t:0 "Notre Économie Sabotée !"
 homebrew_spy.4.d:0 "Terrible nouvelle ! Des agents ennemis ont été repérés au sein de notre administration, détournant des fonds et compliquant notre développement économique. Nous faisons tout notre possible pour traquer ces agents, mais d'ici là, notre capacité économique est affaiblie."
 homebrew_spy.4.1:0 "Malédiction !"
 homebrew_spy.5.t:0 "Tout Est Saboté !"
 homebrew_spy.5.d:0 "Terrible nouvelle ! Partout où nous regardons, nous découvrons de nouveaux agents ennemis perturbant nos opérations. De notre armée à notre marine, en passant par notre économie, nous sommes attaqués par ceux qui se cachent dans l'ombre. Nous faisons tout notre possible pour traquer ces agents, mais d'ici là, nos capacités sont affaiblies."
 homebrew_spy.5.1:0 "Malédiction !"
 homebrew_spy.6.t:0 "Assassinat !"
 homebrew_spy.6.d:0 "La terreur s'est emparée de notre cour aujourd'hui, car $MONARCH$ a été découvert mort dans ses appartements ! Une enquête approfondie a révélé que le coupable n'était pas un seul homme, mais un vaste réseau d'agents ennemis et d'officiels mécontents conspirant contre l'État. Ces traîtres ont été châtiés, mais il faudra de nombreuses années pour se remettre de la perte de notre grand souverain."
 homebrew_spy.6.1:0 "La nation est en deuil."
 homebrew_spy.7.t:0 "Assassinat !"
 homebrew_spy.7.d:0 "Personne à la cour de $MONARCH$ n'a dormi la nuit dernière, car les gardes ont été appelés et ont poursuivi l'assassin potentiel de $MONARCH$. $MONARCH$ a survécu, mais non sans avoir subi de graves blessures qui marqueront à jamais [Root.Monarch.GetHerHis] corps."
 homebrew_spy.7.1:0 "L'attentat contre ma vie m'a laissé défiguré et mutilé."
 homebrew_spy.8.t:0 "Assassinat !"
 homebrew_spy.8.d:0 "La nuit dernière, $MONARCH$ a été réveillé par le bruit des gardes poursuivant un assassin. Le tueur était venu en $COUNTRY$ pour assassiner $MONARCH$, mais par un coup du sort, il a tué l'un de ses conseillers à la place. $MONARCH$ a eu la chance d'échapper avec [Root.Monarch.GetHerHis] vie."
 homebrew_spy.8.1:0 "Grâces soient rendues aux étoiles !"
 homebrew_spy.9.t:0 "Assassinat !"
 homebrew_spy.9.d:0 "$MONARCH$ s'est réveillé la nuit dernière au son d'un homme trébuchant et tombant juste devant [Root.Monarch.GetHerHis] lit. L'assassin en herbe fut rapidement appréhendé par $MONARCH$ et [Root.Monarch.GetHerHis] gardes, avouant l'existence d'une conspiration entière visant la vie de $MONARCH$. $MONARCH$ devra redoubler de vigilance à l'avenir."
 homebrew_spy.9.1:0 "Un espion ennemi à ma cour ?"
 homebrew_spy.10.t:0 "Mouvements Indépendantistes en [Root.GetName]"
 homebrew_spy.10.d:0 "Des rapports inquiétants signalent que des partisans de l'indépendance reçoivent un soutien étranger des ennemis de [hb_overlord.GetName]. Notre suzerain devra prendre garde à empêcher cette situation de dégénérer."
 homebrew_spy.10.1:0 "Les loyalistes ont le soutien de [hb_capital.GetName]... n'est-ce pas ?"

 homebrew_idea.1.t:0 "Urbanisation de Masse"
 homebrew_idea.1.d:0 "Notre industrie florissante s'est fait un nom, et la promesse de nouveaux emplois a attiré des foules de paysans des campagnes vers les portes de nos cités. Cette vague d'urbanisation pourrait rendre nos villes plus grandes que jamais, si nous capitalisons sur cette tendance."
 homebrew_idea.1.1:0 "« Développons ! »"
 homebrew_idea.2.t:0 "La Tyrannie du Patron d'Usine"
 homebrew_idea.2.d:0 "Dans notre société en voie d'industrialisation, l'État accorde de nombreuses faveurs aux industrieux patrons d'usine qui ont permis l'essor manufacturier de notre pays. Cependant, l'un de ces patrons a été découvert exploitant injustement sa main-d'œuvre. Pire encore, il ne nous verse même pas de pots-de-vin ! Si nous le laissons tranquille, ses pratiques commerciales resteront incontrôlées, mais le forcer à quitter ses terres nécessitera quelques bakchichs..."
 homebrew_idea.2.1:0 "Une usine est une goutte d'eau dans l'océan, laissons faire."
 homebrew_idea.2.2:0 "Cette usine vaut tous les bakchichs nécessaires !"
 homebrew_idea.2.3:0 "Ce tyran est un ennemi du peuple ! Envoyez l'armée !"
 homebrew_idea.3.t:0 "L'Incendie de l'Usine de [province_factory_fire.GetName]"
 homebrew_idea.3.d:0 "Nous n'avons jamais attendu que les conditions de travail prennent le pas sur la productivité ; c'est ainsi que fonctionnent les usines. Cependant, une tragédie a frappé une usine textile de [province_factory_fire.GetName] aujourd'hui : 40 ouvriers ont brûlé vifs dans un incendie, 60 autres sont morts asphyxiés, et 50 de plus ont péri en se jetant dans le vide, faisant de cet accident le plus meurtrier de l'histoire industrielle de [Root.GetAdjective]. La cause en est le patron de l'usine, qui avait verrouillé toutes les portes pour empêcher les pauses non autorisées. Cette démonstration flagrante de négligence a rempli les rues de [province_factory_fire.GetName] de manifestants et d'endeuillés, exigeant justice pour les victimes. Peut-être devrions-nous les écouter ?"
 homebrew_idea.3.1:0 "Dispersez les manifestants, et remettez-les au travail !"
 homebrew_idea.3.2:0 "Il est grand temps d'instituer de nouvelles normes de sécurité."
 homebrew_idea.3.3:0 "Traduisez le patron en justice ! Les travailleurs du monde connaîtront la justice !"
 homebrew_idea.3.4:0 "Les Mécanistes savent comment faire fonctionner une usine ; laissez-leur le soin."
 homebrew_idea.4.t:0 "Nouveau Recensement"
 homebrew_idea.4.d:0 "Une cité en croissance est vouée à dissimuler de nouveaux contribuables et conscrits. Grâce à notre dernier recensement, nous pouvons taxer notre population plus efficacement."
 homebrew_idea.4.1:0 "Payez !"
 homebrew_idea.5.t:0 "Capitaine d'Industrie"
 homebrew_idea.5.d:0 "C'est par la simple motivation du gain personnel que de nombreux patrons d'usine et entreprises manufacturières ont vu le jour. Alors que les feux de l'industrie s'embrasent en [Root.GetName], un homme en particulier a amassé une fortune grâce à ses affaires, et par son intérêt personnel continu, il continue d'alimenter l'industrialisation de [Root.GetName] à un rythme toujours plus soutenu."
 homebrew_idea.5.1:0 "Il est clairement digne d'assister la cour !"
 homebrew_idea.5.2:0 "Plus il s'enrichit, plus nous nous enrichissons."
 homebrew_idea.6.t:0 "Boom de Productivité"
 homebrew_idea.6.d:0 "Nos politiques d'industrialisation rapide commencent à porter leurs fruits. Une usine de [province_production_boom.GetName] rapporte des niveaux de productivité sans précédent, alimentés par une main-d'œuvre bon marché et des subventions étatiques."
 homebrew_idea.6.1:0 "« Les affaires sont florissantes. »"
 homebrew_idea.6.2:0 "Peut-être que les Coopératistes peuvent faire durer ce boom temporaire."
 homebrew_idea.7.t:0 "Pénuries de Main-d'Œuvre"
 homebrew_idea.7.d:0 "À mesure que notre nation développe son industrie, il devient de plus en plus clair à quel point notre main-d'œuvre est une ressource précieuse. Avec chaque nouvelle entreprise, chaque nouvelle usine, la concurrence pour les heures de travail s'intensifie. Les patrons commencent à suggérer que $COUNTRY$ devrait faire quelque chose : prolonger la journée de travail d'une heure, abaisser l'âge minimum d'un an, tout ce qu'il faut pour augmenter le flux de corps vers les usines. Ces politiques feraient certainement croître notre industrie, mais pourraient bien entraîner un déclin de l'éducation dans notre génération."
 homebrew_idea.7.1:0 "Bien entendu !"
 homebrew_idea.7.2:0 "Laissons le marché se réguler lui-même."
 homebrew_idea.8.t:0 "Dévaluation"
 homebrew_idea.8.d:0 "Nous avons joui de la grande richesse que notre industrie nous a permis d'acquérir, car notre capacité de production nous a permis d'établir un contrôle monopolistique sur les marchés locaux. Cependant, une faiblesse se présente dernièrement : nous produisons trop. Il n'y a qu'un nombre limité de clients disposés à acheter nos marchandises, et alors que nous continuons d'inonder l'économie mondiale de produits bon marché, nous avons dû continuellement baisser nos prix pour affronter la concurrence. À ce rythme, des usines commenceront à fermer et nous ferons face à une crise mineure du chômage."
 homebrew_idea.8.1:0 "Regrettable, mais inévitable"
 homebrew_idea.8.2:0 "Rachetez nos surplus, frappez plus de monnaie s'il le faut !"
 homebrew_idea.9.t:0 "Opportunités pour les Artificiers"
 homebrew_idea.9.d:0 "Alors que des avancées en Artisanat Magique sont réalisées à travers Halann, on nous rappelle sans cesse qu'un artificier travaille au mieux entouré du bourdonnement des machines et du smog d'une cité moderne. L'accent mis par notre pays sur l'industrie a nourri un environnement propice à l'épanouissement de l'Artisanat Magique, et les artificiers de notre cour sont plus qu'heureux de nous rendre des services en retour."
 homebrew_idea.9.1:0 "Profitons de leur bonne volonté"
 homebrew_idea.10.t:0 "Une Classe Moyenne Puissante"
 homebrew_idea.10.d:0 "L'accent mis par notre pays sur l'industrie a créé une classe moyenne puissante, reconnaissante de ses récentes opportunités accrues. Gouverneurs locaux et guildes ont offert à $MONARCH$ une bourse de couronnes, dans l'attente de richesses futures... pour eux et pour $MONARCH$, bien sûr."
 homebrew_idea.10.1:0 "Je ne refuserai pas cela."

 homebrew_idea.11.t:0 "Délier les Langues"
 homebrew_idea.11.d:0 "Trahison. C'était le mot que $MONARCH$ se répétait en [Root.Monarch.GetHerHis] esprit tandis qu'il descendait les escaliers de pierre vers les cachots du château. Le Maître-Espion avait été informé d'un complot contre $COUNTRY$ plus tôt cette semaine, et maintenant, après une descente, l'un des supposés conspirateurs était détenu sous $CAPITAL_CITY$. \n\nLe tortionnaire devait retrouver $MONARCH$ au pied des escaliers, mais à la place, [Root.Monarch.GetSheHe] trouva l'Artificier en Chef. « Mon $MONARCHTITLE$ », commença-t-il, « je suis heureux de voir que vous prenez la sécurité de votre royaume avec le plus grand sérieux. J'ai appris qu'un interrogatoire allait avoir lieu. Puis-je être d'une quelconque aide ? Je ne vous décevrai pas. »"
 homebrew_idea.11.1:0 "« Vous, un tortionnaire ? »"
 homebrew_idea.12.t:0 "Artisanat Magique Infâme"
 homebrew_idea.12.d:0 "Depuis que l'Artificier en Chef s'était vu attribuer une chambre dans le palais royal, il y avait installé un laboratoire pour son usage personnel. $MONARCH$ n'était pas étranger aux requêtes étranges et exorbitantes des membres de [Root.Monarch.GetHerHis] cour, mais [Root.Monarch.GetSheHe] ne pouvait réprimer le sentiment que quelque chose n'allait pas. L'Artificier en Chef manquait ses repas, d'étranges événements survenaient la nuit, et le personnel d'entretien avait connu de mystérieuses disparitions deux fois cette année. $MONARCH$ était disposé à fermer les yeux, mais comment le faire aujourd'hui alors qu'une odeur de mort s'échappait de la porte du laboratoire ? \n\nEntrant sans y être invité, $MONARCH$ vit l'Artificier en Chef s'affairant sur une table d'instruments, alimentant un poêle en bois frais, et prenant des mesures sur... est-ce un cadavre ?! \n\n« Oh, mon $MONARCHTITLE$ », dit l'Artificier en Chef en levant les yeux de son travail. « Quelle surprise. Je crains que mon dernier ouvrage soit encore en phase d'essai. » Il murmura quelques mots dans ses mains avant d'allumer magiquement le feu du poêle. « Je peux vous montrer, si vous le souhaitez. Cependant, j'ai besoin de temps pour que les ingrédients bouillent. En attendant, souhaitez-vous entendre une histoire ? »"
 homebrew_idea.12.1:0 "« J'espère que c'est une bonne histoire. »"
 homebrew_idea.13.t:0 "Retour de l'Étranger"
 homebrew_idea.13.d:0 "$MONARCH$ était intrigué par la lettre d'invitation de [Root.Monarch.GetHerHis] Artificier en Chef, prétendant avoir fait une nouvelle percée dans la fabrication d'armes. Il ne s'était jamais intéressé aux armes jusqu'à présent ; qu'est-ce qui avait pu provoquer ce changement ? $MONARCH$ haussa les épaules, termina [Root.Monarch.GetHerHis] tasse de café importé d'Aelantir, et commença [Root.Monarch.GetHerHis] journée par une visite au laboratoire. \n\nL'Artificier en Chef était très excité à l'arrivée de $MONARCH$. « Mon $MONARCHTITLE$ », dit-il, « je vois que vous avez reçu ma lettre. Je dois m'excuser de ne pas avoir été à vos côtés ces dernières années ; comme vous le savez certainement, j'étais occupé à explorer les contrées sauvages d'Insyaa avec quelques collègues. L'expédition ne devait durer que quatre ou cinq ans, mais quand notre navire a fait naufrage, nous avons été bloqués sur le continent une année de plus avant de pouvoir regagner la civilisation. Le pauvre Jamison n'a pas survécu, mais c'est grâce à lui que nous n'avons pas péri de faim. » Avant que $MONARCH$ ne puisse prendre la parole, l'artificier s'enfonça plus avant dans le laboratoire, passant devant les cages de sujets Nécrolysés et liés par Loyala, jusqu'à un petit coffret de bois verni. \n\nL'artificier enfila délicatement une paire de gants de cuir avant d'ouvrir le coffret et d'en extraire le contenu. « Les grandes bêtes d'Insyaa ont des physiologies remarquables », commença-t-il. « Saviez-vous que les indigènes les vénèrent comme des divinités vivantes ? Elles ressemblent davantage à un incendie de forêt qu'à des créatures ordinaires. Et, après une rencontre fortuite, je suis entré en possession d'un remarquable échantillon de tissu. Je dois dire que le sang de celle-ci possède des propriétés véritablement fascinantes. Que diriez-vous, mon $MONARCHTITLE$, si je vous apprenais que cette créature particulière possède deux glandes salivaires ? L'une fonctionne normalement, mais l'autre a une propriété particulière. » \n\nL'artificier tient dans sa main une petite coupe de salive épaisse et visqueuse. Il se dirige ensuite vers son établi, où $MONARCH$ le regarde prendre une balle de mousquet avec des pinces et la tremper dans le crachat. « Au contact d'une chair chaude et vivante, la salive réagit, durcissant et emprisonnant de l'air ou du liquide dans de petites bulles ; la taille de cette "tumeur" varie, et elle présente toujours des propriétés adhésives extrêmes. Mon hypothèse actuelle est que la bête utiliserait sa salive comme agent de cautérisation, léchant littéralement ses blessures pour les refermer. Cependant, nous pouvons utiliser cette salive pour bien plus qu'un simple bandage. »"
 homebrew_idea.13.1:0 "« Où voulez-vous en venir ? »"
 homebrew_idea.14.t:0 "Vers à Balle"
 homebrew_idea.14.d:0 "L'Artificier en Chef tenait la balle de mousquet souillée de ses mains gantées, souriant pour lui-même tandis qu'il sortait un trousseau de clés et s'approchait des cages. « Toi là-bas, avance ! » aboya-t-il au sujet de test le plus proche, que $MONARCH$ nota être un humain Nécrolysé. Le sujet avait une apparence hideuse : sa peau pâle et meurtrie collait à ses os, avec plusieurs blessures par balle non cicatrisées, et ce qui fit vraiment reculer $MONARCH$, c'étaient les tumeurs. Des excroissances gonflées, de la taille d'une couronne standard d'Anbennar à celle d'un poing fermé, parsemaient cette chair putride et élevaient ses couleurs putréfiées au-dessus des os du sujet en un affront à la nature. \n\nL'artificier immobilisa le sujet d'un ordre et plaça délicatement la balle de mousquet sur son épaule exposée. Immédiatement, un film brillant recouvrit la balle de plomb, s'étendant sous les yeux de $MONARCH$ tandis qu'il prenait une teinte sanguine. Il grandit, encore et encore, des bulles sanglantes croissant et se divisant les unes des autres, jusqu'à ce que l'écume se stabilise et qu'il ne reste qu'une boule rouge et mousseuse collée au sujet, presque aussi grande que les plaies émergeant en dessous. L'artificier agrippa la boule et tira, démontrant les propriétés adhésives de la salive, jusqu'à ce que la chair Nécrolysée prouve sa faiblesse et que l'épaule du sujet soit arrachée, toujours fermement collée à la mousse. $MONARCH$ ne chercha pas à voir à quoi ressemblaient les plaies du sujet en dessous ; [Root.Monarch.GetSheHe] se contenta de lever le pouce tandis qu'il cherchait quelque chose pour soulager [Root.Monarch.GetHerHis] nausée. \n\n« Mes excuses, mon $MONARCHTITLE$ », dit l'artificier. « J'oublie parfois que tout le monde ne peut apprécier l'étude de la nature comme moi. Je vous assure cependant que mes "Vers à Balle" peuvent semer un chaos indicible chez l'ennemi. Quel chirurgien de campagne a jamais traité des blessures pareilles ? Quel homme peut combattre avec une tumeur pareille dans son organisme ? » Derrière lui, le sujet Nécrolysé frissonna avant de s'effondrer au sol. « Par exemple ! J'ai dû re-nécrolyser ce corps tous les deux ou trois tirs de test. Mon $MONARCHTITLE$, les corps Nécrolysés encaissent normalement deux fois plus de blessures par balle avant de succomber. Je crois que les Vers à Balle pourraient nous faire gagner des guerres entières ! » \n\nL'artificier tapota le dos de $MONARCH$ tandis qu'[Root.Monarch.GetSheHe] finissait de vomir. « Bien sûr, de tels miracles ne sauraient se produire sans une nouvelle expédition en Insyaa... et votre mécénat, mon $MONARCHTITLE$. »"
 homebrew_idea.14.1:0 "« Uurf... J'y réfléchirai... »"
 homebrew_idea.15.t:0 "L'Artificier Fou"
 homebrew_idea.15.d:0 "« À l'aide ! Par les dieux, que quelqu'un nous aide ! » \n\n$MONARCH$ accourut en panique, accompagné de plusieurs de [Root.Monarch.GetHerHis] gardes royaux tandis qu'ils se précipitaient vers le bruit. Là, dans le laboratoire de l'Artificier en Chef, se dressait un appareil qu'[Root.Monarch.GetSheHe] n'avait jamais vu auparavant. Un mur de verre épais divisait une section de la pièce, créant un sceau hermétique. De l'intérieur, [Root.GetArtificeKhetgirl] Et de l'autre côté, l'Artificier en Chef se tenait derrière un panneau de contrôle avec des conduits et des tuyaux s'enfonçant dans le mur. « Ah, mon $MONARCHTITLE$ », dit l'Artificier en Chef en remarquant $MONARCH$, « je vois que je dois insonoriser cette chambre d'essai. Pardonnez ce tumulte, je ne faisais qu'... enseigner à cette inutile assistante les conséquences de ses actes. »\n\n« Il est fou ! » hurla l'assistante. « Il va me tuer ! Je n'ai rien fait pour mériter cela ! » \n\n« Cette mécréante », commença l'Artificier en Chef, « a été surprise ce matin en train de brûler mes notes de recherche, compilant l'œuvre de toute ma carrière. Mon $MONARCH$, un artificier ne peut vivre sans savoir. Si elle devait s'en tirer impunément, je maudirais les dieux et tout [Root.GetName] pour m'avoir trahi. Je vous en supplie, mon $MONARCHTITLE$, que le châtiment soit à la mesure du crime. J'ai une nouvelle invention que j'aimerais vous présenter, et quel meilleur châtiment pour le vol de savoir que d'être utilisé dans sa poursuite ? »"
 homebrew_idea.15.1:0 "« ...Très bien. Procédez. »"
 homebrew_idea.15.2:0 "« Vous êtes fou, ex-Artificier en Chef. Gardes ! »"
 homebrew_idea.16.t:0 "Gaz de Pourriture-du-Serpent"
 homebrew_idea.16.d:0 "« Merci. » L'Artificier en Chef examina le panneau de contrôle devant lui avant de tirer une manette. Le son de vapeur sifflante emplit la pièce, et au-delà du mur de verre, $MONARCH$ remarqua un mouvement. Un conduit qu'[Root.Monarch.GetSheHe] n'avait pas vu auparavant s'ouvrit brusquement, et au bruit de son claquement, l'assistante artificière se remit à frapper contre le verre. « Bande de fous ! Il va tous nous tuer ! » L'Artificier en Chef fronça les sourcils un instant, avant de se diriger prestement vers une armoire et d'en sortir une pile de chiffons humides. Il en tendit un à $MONARCH$. « Il vaut mieux garder ceci sur vous, mon $MONARCHTITLE$. Au cas où. » $MONARCH$ le renifla une fois et le tendit promptement à un garde. \n\nDes conduits, un gaz jaunâtre maladif commença à suinter, s'étalant sur le sol. « Je suis sûr que vous avez entendu parler de la grande peste qui frappa l'Échine-du-Serpent, mon $MONARCH$ », commença l'Artificier en Chef. « On l'appelle la Pourriture-du-Serpent, et elle tua sans merci. Des générations entières furent perdues en quelques années. L'épidémie finit par disparaître, comme toujours, bien sûr. Mais voyez-vous, mon $MONARCH$, elle peut être recréée. » \nL'assistante frappait contre le verre comme une Harimari enragée, les yeux grands comme des soucoupes. « La Pourriture-du-Serpent a une propriété particulière : elle ne peut se propager au-delà de l'Échine-du-Serpent. J'ai fait quelques recherches et j'ai découvert que la raison tenait à l'air. Les propriétés de l'air dans l'Échine-du-Serpent sont différentes de partout ailleurs, en faisant le seul endroit où la Pourriture-du-Serpent peut naturellement se développer. » Plus de gaz s'écoula dans la chambre, atteignant la taille de l'assistante, et tandis qu'elle devenait de plus en plus désespérée, $MONARCH$ sursauta au son du verre craquant. \n\n« J'ai donc émis l'hypothèse qu'avec un échantillon de l'air, une pincée d'engrais et un peu de magie de transmutation, je pourrais recréer la Pourriture-du-Serpent hors de son habitat naturel. La Pourriture-du-Serpent resterait dans le gaz, et serait libérée sur nos ennemis au moment opportun. Observez. » L'Artificier en Chef regarda sans remords tandis que le gaz continuait de monter. L'assistante frappait contre le verre encore et encore, mais ce n'était pas suffisant, et tandis qu'elle inspirait, une couleur putride se répandit dans ses veines. En quelques minutes, l'assistante s'était effondrée, sa peau boursouflée et suintant de pus. « [Root.GetArtificeKhetgirlDed]. Pour votre sécurité, j'ai pris la liberté d'ajouter un colorant. La peste elle-même peut être stockée dans un coffre-fort, et peut être introduite dans de l'air pré-mélangé de l'Échine-du-Serpent via une version plus compacte de ce que nous avons ici. N'importe quel soldat pourrait porter ceci au combat. » L'Artificier en Chef hésita. « Bien sûr, on ne peut confier des munitions aussi dangereuses à n'importe quel novice. Mieux vaut laisser cela à des experts formés. » Il tira une autre manette, évacuant le gaz de la chambre et hors de vue."
 homebrew_idea.16.1:0 "« [Root.GetSerpentrotReaction] »"
 homebrew_idea.17.t:0 "L'Artificier en Fuite"
 homebrew_idea.17.d:0 "Le pays est en deuil à l'annonce de la mort inattendue de $MONARCH$. Le palais était en émoi aujourd'hui, après la découverte du corps de $MONARCH$ et de plusieurs autres morts dans le laboratoire de l'Artificier en Chef. Pire encore, les rapports suggèrent que la cause du décès n'est autre que la Pourriture-du-Serpent. Le laboratoire a été mis en quarantaine jusqu'à nouvel ordre, et des primes sont placées sur la tête de l'Artificier en Chef disparu. Une question demeure, cependant... comment diable une épidémie de Pourriture-du-Serpent a-t-elle pu se produire ici même à $CAPITAL_CITY$ ?"
 homebrew_idea.17.1:0 "Le pays est en deuil."
 homebrew_idea.18.t:0 "Nécrolyseur"
 homebrew_idea.18.d:0 "« J'ai travaillé pour plus de gens que vous ne le pensez, mon $MONARCHTITLE$. Je dois admettre que mon goût du voyage m'a parfois forcé à utiliser mes compétences pour m'affranchir de la servitude auprès de plusieurs personnes, rois, seigneurs de guerre et despotes confondus. J'ai dû un jour gagner ma liberté en travaillant pour un éminent vampire ; j'ai été enchanté pour ne jamais prononcer son nom, bien sûr. Mais des mésaventures comme celles-ci peuvent ouvrir des portes dont on ignorait l'existence. Saviez-vous, mon $MONARCHTITLE$, que les vampires obtiennent la jeunesse éternelle en se nourrissant du sang d'autrui ? Une fois, mon ancien maître décida de me raconter comment le sang de certaines races était plus puissant que celui d'autres, comment il pouvait satisfaire sa faim plus longtemps. Le sang avait un pouvoir spécial qui lui était propre, que seul le vampire pouvait exploiter. J'en fus inspiré. J'appris alors que la magie peut être piégée et contenue non seulement dans les machines et les sorts, mais aussi dans nos corps mêmes. Pourquoi les artificiers devraient-ils se limiter aux écrous et aux boulons, quand il existe chair et os ? Ainsi, après avoir gagné ma liberté, et lui avoir échangé quelques-uns de mes secrets contre un tonneau de sang elfique... » \n\nUn sifflement de vapeur interrompit la concentration de l'Artificier en Chef. « Ah oui, c'est prêt ! » Il retira un pot de bouillon infect du poêle, versant son contenu dans une fiole. « Ceci est ma dernière incursion dans l'inconnu. L'art de la nécromancie, la magie interdite, est un secret jalousement gardé par les liches et les rois-sorciers. Eh bien, mon $MONARCHTITLE$, j'ai développé une alternative. » \n\nL'Artificier en Chef s'approcha du corps sur la table, puant la mort. Sans cérémonie, il força le breuvage dans sa gorge sans vie, massant sa trachée ce faisant. « Relever les morts », commença l'Artificier en Chef, « requiert que le cœur batte, que les poumons respirent, que l'esprit s'éveille, et de l'énergie pour s'alimenter. Ma dernière invention, le Nécrolyseur, peut accomplir tout cela. » Pour prouver ses dires, il attendit quelques instants. Du ventre gonflé du cadavre, un grondement gargouillement s'échappa, et $MONARCH$ put brièvement voir une bioluminescence en dessous. Dans un sursaut, les yeux du sujet s'ouvrirent. Il ne prononça pas de mots, seulement des gémissements et des grognements tandis qu'il découvrait le monde autour de lui. « Un succès fantastique ! » s'exclama l'Artificier en Chef. « Le Nécrolyseur entraîne une perte d'intelligence, entre autres choses, mais il devrait comprendre le Commun. Hé, toi ! Salue ton $MONARCHTITLE$ ! » Le mort-vivant grogna, regarda $MONARCH$, et agita faiblement une main. « Parfait. Avec votre approbation, je peux produire en masse le Nécrolyseur pour un usage militaire. Tous ces corps pourrissant sur les champs de bataille peuvent être mis à bon usage, il vous suffit de donner le mot. »"
 homebrew_idea.18.1:0 "« Les morts ne reposeront pas tant que nous n'aurons pas vaincu. »"
 homebrew_idea.19.t:0 "L'Artificier en Chef"
 homebrew_idea.19.d:0 "Avec l'adoption récente de l'Artisanat Magique par $COUNTRY$, il est devenu nécessaire de nommer un Artificier en Chef, quelqu'un qui puisse représenter les artificiers à la cour et les gérer au nom de $MONARCH$. Pour ce faire, $MONARCH$ a organisé une foire, invitant des artificiers de tout $COUNTRY$ et d'ailleurs à présenter leurs travaux et à concourir pour les faveurs du $MONARCHTITLE$. Cependant, tous échouèrent à impressionner, ne montrant que des jouets mécaniques et des gadgets que $MONARCH$ avait vus des dizaines de fois auparavant. \n$MONARCH$ était sur le point de clore les festivités du jour quand un retardataire apparut devant lui. Un énigmatique jeune homme humain, vêtu à la mode d'Esmarie tout à fait inappropriée pour son travail, présenta une table vide, une trousse à outils et un assistant nerveux. « Mon $MONARCHTITLE$ », commença-t-il, « c'est un honneur d'être ici en votre présence. Je comprends que vous recherchez un artificier talentueux. Je vous assure, j'ai ce qu'il vous faut. » \n\nL'artificier fit signe à son assistant. « Dis bonjour, Jamison. » L'assistant inclina maladroitement la tête. « Jamison a ses propres problèmes, mon $MONARCHTITLE$. Voyez-vous, il a récemment été refusé d'une académie de magistères pour cause de faible affinité avec la magie. Il aurait pu décider de passer la prochaine décennie de sa vie plongé jusqu'aux genoux dans des tomes poussiéreux, et être encore surpassé par un jeune Sang-d'Argent. Au lieu de cela, il m'a cherché. Voyez-vous, mon $MONARCHTITLE$, je cherchais un sujet volontaire pour mon dernier chef-d'œuvre. » L'artificier sortit une petite boîte, et à l'intérieur se trouvait ce qui ressemblait à un petit morceau de fer, pas plus gros qu'un grain de raisin. « Je suis sûr que vous savez que l'Artisanat Magique est un mariage de magie et de machine, mon $MONARCHTITLE$. Mais ne sommes-nous pas tous des machines, nous aussi ? Laissez-moi vous montrer, avec une chirurgie ! » \n\nL'artificier lança une illusion, coupant les sens de Jamison tandis qu'il était placé sur la table. \nLes minutes suivantes furent un tourbillon, tandis que $MONARCH$ regardait avec une curiosité morbide l'artificier installer Jamison sur la table et commencer à inciser la base de son cou. En plein jour, l'artificier exposa la colonne vertébrale de son assistant et y plaça la boîte de fer. Il pressa fermement la boîte dans la plaie ouverte, l'ajustant très légèrement, avant de refermer la chair et de la cautériser avec un feu magique. $MONARCH$ put distinguer un léger renflement sous la peau brûlée, et tandis que l'artificier se penchait pour vérifier l'état de l'assistant, un renflement similaire était visible sur son propre cou. \nJamison se réveilla après plusieurs minutes, et contre toute attente put lancer des sorts rivalisant avec ceux d'un elfe."
 homebrew_idea.19.1:0 "...Vous êtes engagé."
 homebrew_idea.19.2:0 "...Vous êtes un imposteur."
 homebrew_idea.19.3:0 "...Jamison, c'est bien cela ? Oubliez l'académie, j'ai un travail pour vous ici même."
 homebrew_idea.20.t:0 "Un Artificier Immortel ?"
 homebrew_idea.20.d:0 "L'Artificier en Chef est un serviteur loyal de $COUNTRY$ depuis des décennies maintenant, mais une ombre semblait le suivre où qu'il aille. Il y avait quelque chose chez cet homme qui troublait profondément $MONARCH$ : il ne vieillissait jamais. Durant toutes ses années au service du précédent $MONARCHTITLE$, l'Artificier en Chef n'avait pas pris une seule ride. Il ne pouvait être humain ! Était-ce un homoncule ? Non, les homoncules sont magiquement inertes ; s'il en était un, il n'aurait pas pu éblouir la cour hier avec sa magie d'illusion. La question tourmentait $MONARCH$, ainsi que d'autres membres de [Root.Monarch.GetHerHim] cour, et un jour [Root.Monarch.GetSheHe] rassembla son courage pour confronter l'Artificier en Chef."
 homebrew_idea.20.1:0 "« Dites-moi tout. »"
 homebrew_idea.20.2:0 "À la réflexion, laissons dormir les chiens qui dorment."
 homebrew_idea.20.3:0 "Il doit être coupable de quelque chose ! Arrêtez-le !"
 homebrew_idea.21.t:0 "Secret de Fabrication"
 homebrew_idea.21.d:0 "$MONARCH$ quitta le laboratoire de l'Artificier en Chef avec un nouveau fardeau sur [Root.Monarch.GetHerHis] épaules. À sa demande, l'Artificier en Chef lui avait révélé son secret, mais sous plusieurs conditions, dont l'une était de ne jamais dire à quiconque quelles étaient ces conditions. L'artificier avait ouvert un manuel de termes et conditions à la simple suggestion de révéler son secret ! Néanmoins, $MONARCH$ apprit tout, chaque détail, et [Root.Monarch.GetSheHe] n'osa laisser personne d'autre connaître cette terrible vérité. Car qui aurait pu savoir que l'Artificier en Chef... ? \n\n« Souviens-toi des conditions, $MONARCH$ », murmura $MONARCH$ à [Root.Monarch.GetHerselfHimself]. « Souviens-toi des conditions. »"
 homebrew_idea.21.1:0 "« Au moins, j'ai appris une chose ou deux. »"
 homebrew_idea.22.t:0 "Dites-le moi, tout simplement !"
 homebrew_idea.22.d:0 "$MONARCH$ quitta le laboratoire de l'Artificier en Chef d'un pas rageur. [Root.Monarch.GetSheHe] n'avait rien appris ! L'Artificier en Chef, à sa demande, s'était lancé dans d'interminables histoires et textes sans intérêt ; $MONARCH$ s'était à peine donné la peine de lire la moitié des mots. De toute évidence, les obstacles que $MONARCH$ devrait franchir ne valaient pas la satisfaction de [Root.Monarch.GetHerHis] curiosité."
 homebrew_idea.22.1:0 "« Au diable tout cela ! »"
 homebrew_idea.23.t:0 "Savoir Aliénant"
 homebrew_idea.23.d:0 "$MONARCH$ quitta le laboratoire de l'Artificier en Chef dans les bras de l'artificier, des paroles incohérentes sortant de [Root.Monarch.GetHerHis] bouche. L'Artificier en Chef expliqua plus tard à une cour très en colère que $MONARCH$ avait bu une potion sans sa permission, et qu'en conséquence $MONARCH$ avait subi un grave épisode mental. Quand la poussière retombera et que $MONARCH$ se rétablira, il n'aura aucun souvenir de ce qui s'est passé dans le laboratoire de l'Artificier en Chef... et l'artificier restera à [Root.Monarch.GetHerHis] service."
 homebrew_idea.23.1:0 "« Ouiii, il y a tellement de couleeeeurs ! »"
 homebrew_idea.24.t:0 "Quelque Chose de Louche"
 homebrew_idea.24.d:0 "Le palais fut plongé dans la frénésie aujourd'hui, à la découverte du corps inanimé de $MONARCH$ dans le laboratoire de l'Artificier en Chef. $MONARCH$ survécut à l'incident, mais non sans blessures. De la tête, $MONARCH$ avait été transformé en poisson ! Presque personne à $CAPITAL_CITY$ ne peut regarder $MONARCH$ désormais sans éclater de rire, lui qui fut contraint de passer [Root.Monarch.GetHerHis] journées la tête sous l'eau. L'Artificier en Chef ne fut plus jamais revu, et ceux qui peuvent comprendre $MONARCH$ affirment qu'[Root.Monarch.GetSheHe] n'a aucun souvenir de l'attaque, et aucune idée d'où l'agresseur a pu fuir."
 homebrew_idea.24.1:0 "« Gloub ? »"
 homebrew_idea.25.t:0 "L'Arrestation de l'Artificier en Chef"
 homebrew_idea.25.d:0 "[Root.GetArtificeArrest]"
 homebrew_idea.25.1:0 "« Justice est faite. »"
 homebrew_idea.26.t:0 "L'Anguille Insaisissable"
 homebrew_idea.26.d:0 "$MONARCH$ fit appel à [Root.Monarch.GetHerHis] gardes du palais pour arrêter l'Artificier en Chef. Quelles horreurs ils affrontèrent, $MONARCH$ l'ignorait, mais après une heure de lutte prolongée, la nouvelle lui parvint : l'artificier avait échappé à la capture. Privé d'une victoire satisfaisante, $MONARCH$ se contenta de placer des primes sur l'artificier à travers tout [Root.GovernmentName]."
 homebrew_idea.26.1:0 "Malédiction !"
 homebrew_idea.27.t:0 "Lourdes Pertes"
 homebrew_idea.27.d:0 "$MONARCH$ fit appel à [Root.Monarch.GetHerHis] gardes du palais pour arrêter l'Artificier en Chef. Quelles horreurs ils affrontèrent, $MONARCH$ l'ignorait, mais les trains constants de gardes blessés, puis de milices locales, le mirent mal à l'aise. Finalement, après plusieurs heures, la poussière retomba, pour révéler que l'artificier avait disparu. $MONARCH$ fut laissé humilié après une telle démonstration de la part de sa propre garde palatiale."
 homebrew_idea.27.1:0 "« Cet homme est plus dangereux que nous le pensions. »"
 homebrew_idea.28.t:0 "Frappe Préventive"
 homebrew_idea.28.d:0 "[Root.GetArtificeStrike]"
 homebrew_idea.28.1:0 "$MONARCH$ ouvre la bouche, mais ne peut crier."
 homebrew_idea.29.t:0 "Opposition à Núrael"
 homebrew_idea.29.d:0 "« Mon $MONARCHTITLE$, je dois protester ! » L'Artificier en Chef se tenait devant la cour, plaidant sa cause. « Pourquoi devez-vous ainsi me lier les mains, avec ce bout de papier signé par des étrangers qui n'ont cure des préoccupations de [Root.GetName] ? » Dans sa main, il présentait la copie de [Root.GetName] de la Convention de Núrael. L'une de ses principales stipulations est l'application d'un code moral dans le développement de l'Artisanat Magique. \n\n« Je me tiens devant vous aujourd'hui en gardien du savoir. C'est le devoir solennel d'un artificier de dompter l'indomptable, d'avancer vers des frontières inconnues et de percer les mystères de Halann. Mon $MONARCH$, je ne peux accomplir cela avec ces restrictions ! Si seulement vous me donniez une chance, je pourrais vous montrer à quel point ces charlatans de Núrael sont insensés ! »"
 homebrew_idea.29.1:0 "« Vous soulevez un bon point, Artificier en Chef. »"
 homebrew_idea.29.2:0 "Apaiser ses inquiétudes"
 homebrew_idea.29.3:0 "S'opposer à la Convention de Núrael ? Voilà motif à arrestation !"
 homebrew_idea.30.t:0 "Le Grondement du Triomphe Scientifique"
 homebrew_idea.30.d:0 "Aujourd'hui, l'Artificier en Chef présente à $MONARCH$ sa dernière invention. Ses complexités échappent à $MONARCH$, mais avec quelques couronnes supplémentaires pour graisser les rouages, l'Artificier en Chef pourrait la rendre encore plus remarquable."
 homebrew_idea.30.1:0 "« Vos inventions sont assez bonnes comme ça. »"
 homebrew_idea.30.2:0 "« Taisez-vous et prenez mon argent ! »"
 homebrew_idea.31.t:0 "La Foudre Est-Elle un Instrument ?"
 homebrew_idea.31.d:0 "L'un des artificiers de [Root.GetName] s'est présenté à la cour aujourd'hui avec une performance fascinante. Portant un Fusil à Étincelles modifié, l'artificier l'a déchargé dans un conducteur métallique, ajustant un cadran sur le côté du fusil ce faisant. Le résultat fut un arc de foudre changeant de tonalité, et avec l'habileté de l'artificier, il joua une partition destinée à un violon. Si on lui accordait les fonds pour développer cette invention, [Root.GetName] pourrait voir la naissance d'un instrument de musique entièrement nouveau."
 homebrew_idea.31.1:0 "Financez-le !"
 homebrew_idea.31.2:0 "Recommandez-le à quelqu'un qui peut se l'offrir"
 homebrew_idea.32.t:0 "Dépassés par le Progrès"
 homebrew_idea.32.d:0 "L'utilisation accrue de l'Artisanat Magique par [Root.GetName] n'est pas passée inaperçue auprès de ses traditionalistes. Les développements dans l'art de la guerre arrivent toujours, mais jamais l'armée de [Root.GetName] n'a vu de nouvelles additions survenir aussi rapidement. Ce flux rapide d'innovations et de nouvel équipement signifie que de nombreux officiers obtiennent leur diplôme pour découvrir que leur formation est devenue obsolète."
 homebrew_idea.32.1:0 "Le futur, c'est maintenant, vieillard."
 homebrew_idea.32.2:0 "L'armée d'aujourd'hui passe avant l'armée de demain."
 homebrew_idea.33.t:0 "Loyala"
 homebrew_idea.33.d:0 "« Torture ? Mon $MONARCHTITLE$, jamais de la vie ! » L'Artificier en Chef rit doucement. « Ne faisons pas attendre notre invité. » \n\nLe conspirateur les attendait tous deux enchaîné, les bras liés et assis sur l'unique chaise du cachot. « Voilà un nouveau visage », dit-il en jaugeant l'Artificier en Chef. « Je ne pensais pas que l'autre abandonnerait si facilement. » L'Artificier en Chef ne lui prêta aucune attention, fouillant plutôt dans un sac qu'il portait. « [Root.GetArtificeEnchantment] Bien sûr, les praticiens compétents sont rares ; si nous en avions un sous la main, ce traître parlerait déjà. C'est pourquoi j'aimerais vous présenter l'une de mes inventions. » \n\nDe son sac, l'Artificier en Chef révéla une bouteille de verre contenant un liquide rose bouillonnant. « C'est assez simple. Un peu d'eau, du tranquillisant orque, quelques herbes sélectionnées, et un sort d'enchantement appliqué pendant la cuisson. Obtenir ces herbes a impliqué une rencontre avec une fée et plusieurs chèvres, mais c'est une histoire pour une autre fois. » Il tourna son attention vers l'homme enchaîné, débouchant la bouteille et en faisant tourbillonner le contenu. « Ce que vous devez savoir, c'est que cette potion contient les mêmes effets que la magie d'un enchanteur, et place le buveur dans un état de suggestibilité. Alors, traître, bois ! » L'homme enchaîné n'avait guère les moyens de résister, et après une brève lutte, la potion fut forcée dans sa gorge. Un moment passa, puis un autre, l'homme toussant et crachant du rose sur sa chemise, avant qu'il ne devienne soudain calme, et que ses yeux se voilent comme des perles. Une carte lui fut présentée et, sans hésitation, il indiqua les lieux de réunion des conspirateurs. \n\n« J'espère que cela prouve l'efficacité de ma nouvelle potion, mon $MONARCHTITLE$. Je pense que je l'appellerai... Loyala, un nom digne d'un tel outil. Avec votre mécénat, je pourrais facilement obtenir les matériaux nécessaires pour en produire davantage. Encore une chose, mon $MONARCHTITLE$. » L'Artificier en Chef dégaina une dague et se tourna vers le conspirateur. L'homme était un désastre, ses yeux vitreux versant des larmes et ses lèvres tremblantes implorant de l'aide. L'artificier défit ses liens, ses membres devenus mous, et mit la dague dans sa main. « Une dernière expérience, traître », déclara l'Artificier en Chef. « Tue-toi. » Dans un éclair d'acier, le conspirateur plongea la dague dans sa propre gorge, s'étouffant dans son propre sang. $MONARCH$ et [Root.Monarch.GetHerHis] Artificier en Chef le laissèrent là, le sang séchant sur le sol froid."
 homebrew_idea.33.1:0 "« ...Dois-je demander pour la fée et les chèvres ? »"
 #homebrew_idea.34 and .35, the original Khetgirl events, were cut due to it not sitting right with me. I've moved the events and localizations to .38 through .40, and made the funni mirror a prerequisite to fit the invention's more silly nature
 homebrew_idea.36.t:0 "L'Information, c'est le Pouvoir"
 homebrew_idea.36.d:0 "Ces temps-ci, il semble que l'Artificier en Chef travaille plus dur que jamais. Peut-être n'est-ce qu'une mode passagère. Peut-être sait-il qu'il y a de plus en plus d'artificiers à concurrencer chaque jour qui passe. $MONARCH$ fut particulièrement alarmé quand, un jour, l'Artificier en Chef apparut et prit ses repas avec un bandage ensanglanté couvrant la moitié de son visage. L'artificier n'en fit pas un spectacle, mais néanmoins $MONARCH$ le suivit après leur repas pour l'interroger. « Mon $MONARCHTITLE$ », dit l'Artificier en Chef, « je vous assure, tout va bien. Ce bandage... ce n'est qu'un développement mineur. Venez, laissez-moi vous montrer quelque chose. » \n\nLes deux entrèrent dans le laboratoire. Quelques outils récemment utilisés, une pile de chiffons ensanglantés et des plaques d'acier carrées attirèrent l'attention du $MONARCHTITLE$, mais l'Artificier en Chef lui indiqua un autre coin. Là, une presse à imprimer se dressait, entièrement assemblée et avec des caractères déjà en place. Mais les caractères semblaient... étranges. « J'ai acheté ceci la semaine dernière à un marchand nain », dit l'Artificier en Chef. « Saviez-vous, mon $MONARCHTITLE$, que les nains pratiquent la magie en écrivant des runes ? Chaque rune, un mot de pouvoir, peut soit être prononcé pour être lancé, soit gravé dans un objet pour transmettre ses propriétés magiques. Des choses fascinantes. De plus, cette Presse à Runes naine est l'avancée la plus récente des nains en Artisanat Magique. En broyant de la Damestear en poudre et en l'introduisant dans la presse, vous pouvez imprimer une rune sur du papier sans aucun mage impliqué ! Et voici le plus intéressant : les runes sont personnalisables. En ayant leur pouvoir localisé dans le mot écrit, la magie runique peut accomplir des tâches complexes et être modifiée d'une manière à laquelle la magie arcanique n'est tout simplement pas adaptée. » \n\n« J'ai été inspiré, mon $MONARCHTITLE$. La magie runique, contrairement à la magie cannorienne, est basée sur le mot écrit. Le mot écrit, c'est l'information. Et si la magie runique pouvait avoir un autre type de déclencheur ? Des runes qui s'activent si la température devient trop élevée ? Des runes qui s'activent si elle n'a pas été élevée depuis un certain temps ? Eh bien, un réseau de runes suffisamment complexe pourrait simuler cette conversation même, mon $MONARCHTITLE$ ! Soyez assuré, j'ai une idée que je m'efforce de concrétiser. J'ai juste besoin de plus de temps, pour confirmer ma théorie et assembler une nouvelle invention. »"
 homebrew_idea.36.1:0 "« Très bien. »"
 homebrew_idea.36.2:0 "« Puis-je voir les plans de cette Presse à Runes ? »"
 homebrew_idea.37.t:0 "Yeux-de-Nain"
 homebrew_idea.37.d:0 "Alors que le $MONARCHTITLE$ entrait dans le laboratoire de l'Artificier en Chef pour vérifier son travail, [Root.Monarch.GetSheHe] fut surpris par un bruit de gazouillis en passant la porte. Au centre de la pièce, un piédestal métallique s'illumina d'une myriade de lettres, certaines écrites en Nain, d'autres en Commun. Et tandis que $MONARCH$ entrait, plusieurs sorts d'illusion jaillirent du sommet du piédestal, épelant le mot « BIENVENUE » en lettres fantaisistes. « Mon $MONARCHTITLE$ ! » s'exclama l'Artificier en Chef, surgissant d'un recoin. « Je dois admettre que j'espérais tester ceci sur le concierge. Quoi qu'il en soit, nous y voilà ! Mon dernier travail sur la magie runique ! » Il frotta un doigt sur l'une des lettres du piédestal, l'assombrissant. « Je dois dire que travailler avec l'ancienne langue naine fut un défi unique ; j'ai encore beaucoup à apprendre de leur grammaire. Mais peu importe, il y a autre chose que j'ai mélangé à ceci ! » L'Artificier en Chef posa sa paume sur le piédestal. Juste au-dessus de sa paume, un autre sort d'illusion projeta l'image d'une seconde main désincarnée. « La magie d'illusion est une chose amusante, mon $MONARCHTITLE$. Elle est souvent associée à la distorsion de la réalité, de l'information ; c'est l'antithèse de la magie runique. Mais il n'en est pas obligatoirement ainsi. L'œil nu ne peut comprendre ce qu'une rune perçoit, mais la magie d'illusion peut créer une abstraction. Un artificier compétent comme moi peut aussi inclure de la magie de divination, et élargir la portée de ce qu'une rune peut détecter. Ce piédestal peut vous scanner et créer une représentation précise de votre squelette. Mais il y a un dernier ingrédient qui rend ma dernière invention si utile ! » \n\nL'Artificier en Chef attira l'attention de $MONARCH$ sur son propre visage, un visage que $MONARCH$ avait tenu pour acquis. L'œil droit de l'artificier avait disparu, et à sa place une sphère d'acier était nichée. Là où une pupille aurait dû être, une rune faiblement lumineuse pivotait et observait son environnement. « La portabilité est un grand avantage, mon $MONARCHTITLE$, c'est pourquoi je me suis assuré de pouvoir compresser la complexité de ces runes en quelque chose de plus petit. Un avantage unique à en faire votre œil est que c'est plus efficace : vous n'avez pas besoin d'un sort d'illusion pour projeter une image, vous pouvez simplement tromper votre cerveau pour qu'il voie l'image ! Ces "Yeux-de-Nain" sont bien plus complexes que mes inventions précédentes, mais je vous assure qu'ils peuvent être produits à plus grande échelle. Je conseillerais seulement à mon $MONARCHTITLE$ de réserver leur installation à des chirurgiens formés. »"
 homebrew_idea.37.1:0 "« Vous avez l'œil pour ce genre de choses. »"
 homebrew_idea.38.t:0 "Fabriquer un Khet"
 homebrew_idea.38.d:0 "« Mes expériences concernant les Khet ? » L'Artificier en Chef regarda $MONARCH$ avec surprise. « Comment avez-vous... ? Eh bien, mon $MONARCHTITLE$, je ne vous aurais pas cru si doué en subterfuge. Je suppose que je pourrais vous divulguer mes découvertes sur le sujet. » \n\n« Je me souviens avoir étudié les Khet il y a... un certain temps. Je travaillais sur commission d'un riche mécène ; je suis désolé, mon $MONARCHTITLE$, mais je suis tenu de garder l'identité de mes clients secrète. C'était un adorateur d'Elikhet, la divinité patronne du peuple Khet, et il cherchait une solution au manque de nombres des Khet. Ma première approche fut une simple potion de fertilité, mais il y eut une complication imprévue. Les Khet sont de nature divine, ce qui est jusqu'ici ma seule explication au fait que mes drogues n'ont eu aucun effet sur eux. Et puis il y a leur malédiction. Saviez-vous, mon $MONARCHTITLE$, que les Khet sont contraints de retourner dans leur patrie de Khétérata ? Emmener un Khet hors de sa patrie le fait entrer en transe et tout faire pour revenir. J'ai essayé d'obtenir un spécimen moi-même, mais dès que son bateau quitta le port, il sauta par-dessus bord et se noya. » \n\nMa deuxième tentative pour augmenter la population Khet prit une approche différente. Si je ne peux les faire se reproduire plus vite, que ce soit par la fertilité ou la disposition, alors je n'aurais qu'à les créer artificiellement. J'ai temporairement déplacé mes opérations en Khétérata, et me suis mis au travail pour étudier l'anatomie des Khet. Le travail fut très lent, mon $MONARCHTITLE$ ; les locaux ne se souciaient pas de mes efforts et je n'étais pas le bienvenu dans leurs temples. L'anatomie des Khet est aussi d'une complexité trompeuse ; on ne peut simplement coudre un chat sur un humain et considérer l'affaire réglée. » $MONARCH$ se demanda pourquoi l'Artificier en Chef en était venu à une telle conclusion. « Hélas, j'ai dû rapporter mon échec à mon client. Il n'était pas content, bien sûr, mais il n'y avait pas grand-chose que je pouvais faire. »\n\nL'Artificier en Chef rumina cette dernière phrase. « Cela dit, mon $MONARCHTITLE$, beaucoup de temps s'est écoulé depuis. Je pense avoir encore mes notes sur les Khet quelque part. Si cela vous agrée, je pourrais appliquer mes dernières inventions pour clore définitivement cette expérience. »"
 homebrew_idea.38.1:0 "« Une goutte de Nécrolyseur peut faire des merveilles. »"
 homebrew_idea.38.2:0 "« L'anatomie des Khet pourrait être mieux comprise grâce à un Œil-de-Nain. »"
 homebrew_idea.38.3:0 "« Poursuivre cela ne nous apporte rien de bon. »"
 homebrew_idea.39.t:0 "Le Monstre de l'Artificier"
 homebrew_idea.39.d:0 "$MONARCH$ a vu des chats errer dans le palais plus souvent ces derniers temps. Depuis qu'[Root.Monarch.GetSheHe] avait donné le feu vert, l'Artificier en Chef travaillait d'arrache-pied à appliquer son art pour réaliser la naissance d'un Khet artificiel. Plusieurs mois se sont écoulés depuis ; peut-être est-il temps de demander un rapport de progrès ? \n\nL'odeur de la mort accueillit $MONARCH$ alors qu'[Root.Monarch.GetSheHe] entrait dans le laboratoire. Un chat couvert de cicatrices passa entre [Root.Monarch.GetHerHis] jambes et s'enfuit. Devant $MONARCH$ se trouvait un spectacle terriblement familier, avec des corps de sujets de test remplissant une pile de cages et attendant l'expérimentation. L'Artificier en Chef était affairé à sa table d'opération, avant de remarquer $MONARCH$. \n\n« Mon $MONARCHTITLE$ », commença-t-il, « veuillez excuser l'odeur, elle est inévitable quand on travaille avec le Nécrolyseur. Ses usages surpassent ses inconvénients, je vous l'assure. Venez par ici, une seconde. » L'Artificier en Chef fit de la place, révélant son dernier travail. Sur la table d'opération, un corps humain nu gisait décapité, et cousu à sa tête se trouvait une tête de chat surdimensionnée sentant vaguement le cornichon. « La beauté du Nécrolyseur est qu'il supprime le rejet des corps étrangers par l'organisme. Avec un peu de nourriture et de temps, ce spécimen pourrait naturellement rattacher la tête au reste du corps. Il reste la question du cerveau, mais cela peut être résolu plus tard. Et si nous réveillions celui-ci ? » \n\nL'Artificier en Chef tira une fiole de Nécrolyseur de sa ceinture et versa son contenu dans la gorge de la créature. Les effets furent immédiats, ses muscles se contractant brièvement avant qu'elle ne prenne une inspiration. La créature restait là, la poitrine se soulevant et s'abaissant, avant qu'un gargouillement impie ne s'échappe de sa bouche. Elle roula hors de la table, $MONARCH$ et l'Artificier en Chef reculant tandis qu'elle rampait sur le sol de pierre. La créature tenta de se lever, se mettant sur un genou, avant qu'un écœurant déchirement de chair ne se fasse entendre et que sa tête ne se détache. Elle s'effondra avec un bruit de succion, des fluides noirs s'écoulant du cou de la chose et faisant regretter à $MONARCH$ d'avoir un nez. \n\n« ...Je vois », commença l'Artificier en Chef à ramasser les parties du corps sur le sol. « Je crains de devoir dire que le Nécrolyseur a aussi un effet secondaire : la dégradation de toutes les fonctions corporelles. J'ai essayé de corriger cela, mais la formule ne fonctionne tout simplement pas sans sacrifier l'intégrité corporelle. Mon $MONARCHTITLE$, je pense que l'expérience, non, le projet entier, est un échec. »"
 homebrew_idea.39.1:0 "« Apportez-moi un seau. »"
 homebrew_idea.40.t:0 "Implants Khet"
 homebrew_idea.40.d:0 "Le palais a été béatement paisible depuis que l'Artificier en Chef s'est attelé à la construction d'un Khet. $MONARCH$ n'a pas été réveillé au milieu de la nuit par un cri de terreur, et [Root.Monarch.GetSheHe] n'a pas eu besoin de se boucher le nez en passant devant le laboratoire. On aurait presque dit que cet homme énigmatique avait disparu de la surface de Halann. Cependant, des progrès étaient encore accomplis, car il y a tout juste un mois, $MONARCH$ avait aperçu un tract proposant des emplois aux locaux dans le cadre d'un « essai public ». Il était temps de rendre visite à l'Artificier en Chef. \n\nUn spectacle particulier accueillit $MONARCH$ lors de [Root.Monarch.GetHerHis] visite, avec un paysan somnolent s'éloignant avec un bonnet de laine et frottant une pièce dans sa main. À l'intérieur, l'Artificier en Chef nettoyait ses outils du sang, et parlait à un autre étranger portant un bonnet similaire avant de remarquer $MONARCH$. « Mon $MONARCHTITLE$ », commença-t-il, « justement la personne que je voulais voir. Je crois que vous voudrez voir ceci. Retirez votre bonnet ! » Aussitôt, l'étrangère retira son bonnet. « Je lui ai administré un peu de Loyala en guise d'anesthésique », expliqua l'Artificier en Chef, « ne vous inquiétez pas, elle est parfaitement inoffensive et a reçu l'instruction de prendre plus de Loyala d'elle-même. Plus important encore, mon $MONARCHTITLE$, j'ai fait une percée. » $MONARCH$ pouvait maintenant voir que le crâne de la femme était rasé de près, une fine couche de cheveux interrompue par des plaques carrées de calvitie. Et sur ces plaques de peau nue, se trouvaient deux lambeaux de peau et de cartilage, ressemblant à des oreilles de chat. \n\n« La magie de transmutation est remarquablement sous-utilisée », dit l'Artificier en Chef. « La plupart des praticiens passent leur carrière entière courbés sur des cultures dans un champ. Mais voyez-vous, mon $MONARCHTITLE$, c'est exactement ce qui la rend si utile. Avec un sort, vous pouvez faire pousser les choses ! Pourquoi s'arrêter aux cultures, quand on peut faire pousser du bétail ? Et quand vous pouvez transformer un veau en vache en une semaine, pourquoi s'arrêter à en faire une vache ordinaire ? Un transmutateur peut changer une vie d'un geste de la main, et ils gaspillent ce pouvoir à faire pousser un arbre ! » L'Artificier en Chef tenait l'une des oreilles de chat de la femme dans sa main. « Mais pas moi, mon $MONARCHTITLE$. Voyez-vous, vous pouvez utiliser la magie de transmutation pour muter un corps, le faire développer ce qu'il ne développe normalement pas. Bien sûr, un mage imprudent vous ferait simplement mourir d'un cancer. Il y a de nombreux détails pour faire croître une partie du corps, qu'un mage normal devrait dépenser d'innombrables sorts et traitements répétés pour faire fonctionner. C'est pourquoi j'ai inclus une touche de magie runique naine, ici. » Il passa un doigt le long du crâne rasé de la femme, traçant le contour de deux bosses contre nature sous sa peau. « Des implants Khet, mon $MONARCHTITLE$. En programmant des minuteries et des conditions pour la magie de transmutation, je peux faire créer en toute sécurité à un corps des excroissances comme ces fausses oreilles. Je suis confiant que cela pourrait être recalibré pour transmuter entièrement la tête en celle d'un Khet, mais... » L'Artificier en Chef prit un moment pour apprécier son œuvre. « Je dois dire, je pense que je préfère juste ajouter les oreilles. C'est plus esthétique, mon $MONARCHTITLE$. »"
 homebrew_idea.40.1:0 "« Un développement fascinant. »"
 #dear god why did I do this many for one idea group

 homebrew_idea.41.t:0 "Un Miroir Magique"
 homebrew_idea.41.d:0 "Les mages du royaume se sont présentés devant $MONARCH$ pour lui offrir une opportunité unique. Ils apportent avec eux un miroir magique, dit refléter à celui qui le regarde des images mystiques et exotiques. On dit que c'est différent pour chaque observateur. $MONARCH$ voudra-t-il tenter sa chance ?"
 homebrew_idea.41.1:0 "« Quel mal y a-t-il à jeter un coup d'œil ? »"
 homebrew_idea.41.2:0 "« Oh non, il pourrait être maudit ! »"
 homebrew_idea.41.3:0 "« J'ai déjà vu tout ce qu'il a à offrir. »"
 homebrew_idea.41.4:0 "« Les Technomanciens adoreraient mettre la main dessus. »"
 homebrew_idea.42.t:0 "Mage Renommé"
 homebrew_idea.42.d:0 "Nos politiques de promotion du statut des mages au sein de [Root.GetName] ont porté leurs fruits, et un mage compétent est arrivé à $CAPITAL_CITY$ cherchant une position à la cour de $MONARCH$."
 homebrew_idea.42.1:0 "« Mais certainement ! »"
 homebrew_idea.43.t:0 "Un Mage de Guerre Apparaît"
 homebrew_idea.43.d:0 "Tout général ou tacticien expérimenté vous dira que la magie est une force puissante sur le champ de bataille. Un mage ordinaire peut pulvériser des adversaires bien plus grands que lui avec la magie d'évocation, bloquer lames et tirs avec la magie d'abjuration, et employer des tactiques non conventionnelles avec la magie d'illusion. Tout cela est multiplié par dix avec les Mages de Guerre, des mages rares et extraordinairement puissants qui traversent les champs de bataille comme une force de la nature imparable et peuvent retourner le cours d'une bataille à eux seuls. Aujourd'hui, l'un de ces Mages de Guerre s'est présenté devant $MONARCH$, offrant ses services... mais à un salaire démesurément supérieur à quiconque d'autre dans l'armée de [Root.GetName]."
 homebrew_idea.43.1:0 "Payez-le autant qu'il veut !"
 homebrew_idea.43.2:0 "Non, notre trésor ne sert pas les caprices d'un seul homme."
 homebrew_idea.44.t:0 "Une Faveur des Mages"
 homebrew_idea.44.d:0 "Le traitement préférentiel de notre pays envers l'élite magique les a mis en dette envers nous. En gage de bonne foi, les mages se sont rassemblés pour offrir à $MONARCH$ une faveur : quel que soit le sort qu'[Root.Monarch.GetSheHe] désire, ils l'exécuteront avec une plus grande efficacité."
 homebrew_idea.44.1:0 "Nous devrions utiliser ce don avec sagesse."
 homebrew_idea.45.t:0 "Abjurateur Reclus"
 homebrew_idea.45.d:0 "La pratique de la magie d'abjuration peut être décrite comme l'art de tenir les choses éloignées de soi. À cet égard, un certain mage de [Root.GetAdjective] l'a pris à cœur, fermant ses portes à tous ceux qui le cherchent. Cela ne nous concernerait pas, si ce mage n'était pas également particulièrement doué en magie d'abjuration, et pourrait nous être d'une grande utilité s'il s'ouvrait simplement à nous."
 homebrew_idea.45.1:0 "Faites-lui quelques concessions."
 homebrew_idea.45.2:0 "Laissez-le dans son trou."
 homebrew_idea.46.t:0 "Mages Faux-Monnayeurs"
 homebrew_idea.46.d:0 "La magie de transmutation, l'art de transformer quelque chose en autre chose, a toujours attiré les apprentis mages avec une promesse singulière : la richesse. Si c'est non magique et se trouve naturellement, vous pouvez engager un transmutateur pour le fabriquer, et cela inclut les métaux précieux comme les gemmes, les diamants et surtout l'or. Cette pratique, cependant, est extrêmement illégale, car tout marchand peut attester des problèmes que pose le simple fait d'imprimer plus d'argent. Illégale ou non, de nouveaux rapports indiquent que ces « mages faux-monnayeurs » ont été aperçus en [Root.GetName], et sont même allés jusqu'à solliciter la cour pour une reconnaissance officielle."
 homebrew_idea.46.1:0 "Exigez une part de leurs profits en échange de protection."
 homebrew_idea.46.2:0 "Chassez ces imbéciles cupides de [Root.GetName]"
 homebrew_idea.47.t:0 "Magistères et Loyauté"
 homebrew_idea.47.d:0 "En tant que magistères, nos mages ont des liens étroits avec le Magisterium, la tête officielle de la société des mages de Cannor. Ces liens étrangers viennent avec des avantages, l'approbation officielle menant à une classe de mages puissants. Cependant, une question demeure toujours quant à où se situe vraiment la loyauté de ces magistères. Peut-être quelques « rappels » s'imposent-ils ?"
 homebrew_idea.47.1:0 "Mieux vaut garder le Magisterium de notre côté."
 homebrew_idea.47.2:0 "Les mages doivent apprendre qu'ils ne sont pas au Magisterium, ils sont en [Root.GetName]."
 homebrew_idea.48.t:0 "Mirages et Illusions"
 homebrew_idea.48.d:0 "Aujourd'hui, un mage d'illusion compétent s'est présenté à la cour pour offrir ses services. Normalement, la magie d'illusion a très peu d'applications pratiques, et de nombreux mages n'étudient la magie d'illusion que comme école secondaire. Des mages comme celui-ci, cependant, peuvent déformer les perceptions et jouer des tours à l'esprit avec une telle habileté qu'ils rivalisent avec les espions et assassins des guildes organisées."
 homebrew_idea.48.1:0 "Un allié utile."
 homebrew_idea.49.t:0 "Chasses aux Liches"
 homebrew_idea.49.d:0 "La nécromancie, l'art interdit de manipuler la vie, est si méprisée que la moindre preuve de sa pratique peut suffire à condamner la carrière d'un mage. Cela a engendré une récente vague de paranoïa et d'accusations parmi nos mages, alors qu'une série de « Chasses aux Liches » les voit se pointer du doigt et parfois même fabriquer des preuves que d'autres pratiquent la nécromancie. Des centaines de mages se sont retrouvés injustement jugés et condamnés, et des centaines d'autres vivent dans la peur d'être les prochains."
 homebrew_idea.49.1:0 "Mettons fin à cette injustice !"
 homebrew_idea.49.2:0 "Des liches ? En $COUNTRY$ ? Pourchassez-les !"
 homebrew_idea.50.t:0 "Une Question d'Aptitude"
 homebrew_idea.50.d:0 "L'accent mis par notre pays sur la promotion de la pratique de la magie a fait merveille, mais a aussi ignoré une question importante : qu'en est-il des non-mages ? Administrateurs, diplomates et officiers sont mécontents tandis que les mages continuent de recevoir un traitement préférentiel. Si cela continue, nous devons nous attendre à une sérieuse division entre l'élite magique et tous les autres."
 homebrew_idea.50.1:0 "Bien, la magie est tout."
 homebrew_idea.50.2:0 "Nous pouvons faire quelques concessions."

 homebrew_idea.51.t:0 "Démonstérisation ?"
 homebrew_idea.51.d:0 "Avec notre adoption des vertus monstrueuses, nous avons accumulé suffisamment de respect et d'influence parmi nos pairs pour faire passer des réformes radicales. Avec le monde qui évolue de plus en plus vite, un nouveau $COUNTRY$ « démonstérisé » pourrait être ce dont nous avons besoin pour nous faire un nom."
 homebrew_idea.51.1:0 "La civilisation est une inévitabilité."
 homebrew_idea.51.2:0 "Non, notre devoir est envers notre peuple, pas envers les étrangers."
 homebrew_idea.52.t:0 "Orques de Guerre"
 homebrew_idea.52.d:0 "Parmi notre population orque, deux frères jumeaux se distinguent. Les frères, G'Orc et M'Orc, sont connus dans leur communauté locale comme des guerriers sans égal et rivaux. M'Orc, le plus intelligent des deux frères, peut abattre un homme en frappant son point faible, tandis que G'Orc, le plus fort, préfère simplement traverser tout cuir ou armure qui lui résiste. Ces deux orques se sont présentés aujourd'hui à notre cour, chacun se vantant de sa propre puissance tout en dénigrant l'autre. Si nous en recrutons un, il transmettra assurément ses tactiques à ceux qu'il mènera au combat. Qui soutenons-nous ?"
 homebrew_idea.52.1:0 "Astucieusement Brutal"
 homebrew_idea.52.2:0 "Brutalement Astucieux"
 homebrew_idea.53.t:0 "Une Chasse Singulière"
 homebrew_idea.53.d:0 "Les harpies, étant monogenrées, sont connues pour enlever des partenaires et les ramener à leur nid. Ce n'est pas différent en $COUNTRY$, mais dernièrement, des partenaires de plus en plus étranges font leur apparition. Là où l'on s'attendrait à de pauvres âmes arrachées au bord d'une route, on trouve à la place des érudits instruits, des missionnaires dévoués, des marchands cherchant à nouer des contacts, et même l'amateur de sensations fortes occasionnel. Cet afflux inattendu de partenaires consentants a aidé non seulement à garder les partenaires indisciplinés sous contrôle, mais aussi à augmenter le flux d'informations et d'idées à $CAPITAL_CITY$."
 homebrew_idea.53.1:0 "Un développement intéressant."
 homebrew_idea.53.2:0 "Les partenaires devraient réserver leurs conversations à l'oreiller."
 homebrew_idea.54.t:0 "Magnats d'Arrière-Cour"
 homebrew_idea.54.d:0 "Les gobelins ont récemment acquis la réputation de construire et de coloniser des villes à une vitesse folle, dont [gobbo_industrialize.GetName] est le meilleur exemple. Leur afflux chaotique d'urbanisation et de proto-industrialisation laisse leurs quartiers dans un désordre complet, avec des bâtiments violant les règles de sécurité et des gobelins trop enthousiastes construisant leurs propres fourneaux et ateliers dans leurs arrière-cours. Si cela continue, cette expansion mènera certainement à des oublis et des failles dans notre perception fiscale... mais pourrait avoir un impact durable sur la taille de nos cités."
 homebrew_idea.54.1:0 "Laissez-les continuer."
 homebrew_idea.54.2:0 "Nous devons restaurer l'ordre !"
 homebrew_idea.55.t:0 "Pouvoir Absolu, Méfiance Absolue"
 homebrew_idea.55.d:0 "Dernièrement, $MONARCH$ s'est senti mal. Il a vu des choses, des visions d'un traître à [Root.Monarch.GetHerHis] cour. Mais qui cela pourrait-il être ? $MONARCH$ ne pourra dormir tant qu'un coupable n'aura pas été trouvé, et un coupable SERA trouvé."
 homebrew_idea.55.1:0 "« Les gouverneurs, ce sont eux les coupables ! »"
 homebrew_idea.55.2:0 "« Ces maudits diplomates, c'est sûrement eux ! »"
 homebrew_idea.55.3:0 "« L'armée, ils en veulent à ma tête ! »"
 homebrew_idea.55.4:0 "« Je suis entouré d'ennemis ! »"
 homebrew_idea.56.t:0 "Prisonniers de Guerre"
 homebrew_idea.56.d:0 "Il peut être difficile d'acquérir de bons esclaves. Certains sont trop faibles, d'autres meurent de maladie, et plus encore s'échappent simplement de captivité. L'état de guerre du pays, cependant, a conduit à une opportunité de collecter des prisonniers de guerre et de les vendre comme main-d'œuvre servile. En tant qu'anciens soldats, ces prisonniers sont forts et résistants, et d'une qualité supérieure. Si nous approuvons ce développement, nous pouvons étendre nos réseaux d'esclavagistes et d'acheteurs."
 homebrew_idea.56.1:0 "Pourquoi travailler, quand vos ennemis peuvent travailler pour vous ?"
 homebrew_idea.56.2:0 "Notre population gnoll adorerait cela !"
 homebrew_idea.56.3:0 "Non, nous ne devrions pas nous abaisser à de tels niveaux."
 homebrew_idea.57.t:0 "Aventuriers en $COUNTRY$"
 homebrew_idea.57.d:0 "Notre pays a été infesté d'aventuriers dernièrement. Cherchant à tuer notre peuple en tant que professionnels, amateurs de sport ou justiciers, ces soi-disant « héros » pillent et ravagent la campagne. Les milices locales n'ont jusqu'ici pas pu les arrêter, mais peut-être qu'une intervention officielle pourrait faire l'affaire ?"
 homebrew_idea.57.1:0 "Levez les bannières ! Ils regretteront d'avoir blessé notre peuple !"
 homebrew_idea.57.2:0 "Ils partiront d'eux-mêmes."
 homebrew_idea.58.t:0 "Escarmouches Frontalières"
 homebrew_idea.58.d:0 "Les frontières peuvent être difficiles à distinguer, et certains de notre peuple se sont mis à migrer au-delà des limites nationales. Cela a provoqué un incident, car des soldats de [Root.GetAdjective] viennent d'attaquer un voisin indépendamment du commandement de notre armée. [homebrew_border_skirmish.GetName] exige des excuses officielles de notre part, et a mobilisé des troupes en préparation de la guerre. Que devons-nous faire ?"
 homebrew_idea.58.1:0 "S'ils cherchent le combat, ils ont choisi la mauvaise armée !"
 homebrew_idea.58.2:0 "Sûrement, il existe une solution pacifique ?"
 homebrew_idea.59.t:0 "Tradition Monstrueuse"
 homebrew_idea.59.d:0 "L'héritage long et important de nos peuples n'est pas passé inaperçu en $COUNTRY$. Un récent festival a été tenu pour célébrer notre histoire, et ce fut un moment d'unité culturelle."
 homebrew_idea.59.1:0 "Nous sommes [Root.GetAdjective]"
 homebrew_idea.60.t:0 "Du Balai, les Vieilleries ?"
 homebrew_idea.60.d:0 "$COUNTRY$ tient profondément à son héritage monstrueux, mais cela a conduit à un problème : qu'en est-il de notre armée ? Les tactiques d'antan commencent à céder la place aux nouvelles armes de guerre, mais nos généraux et officiers sont encore formés à combattre comme leurs ancêtres le faisaient. Des débats au sein de la cour de [Root.GetAdjective] ont commencé à s'enflammer sur cette question, et sur la nécessité de pousser pour une armée modernisée."
 homebrew_idea.60.1:0 "Nous pouvons être tout aussi brutaux et sauvages avec des fusils qu'avec de l'acier !"
 homebrew_idea.60.2:0 "Rejeter la technologie, retourner au primitif."

 homebrew_idea.61.t:0 "Un $CAPITAL_CITY$ Cosmopolite"
 homebrew_idea.61.d:0 "L'Empire d'Anbennar a une longue histoire d'échanges multiculturels et multiraciaux. Ce n'est pas différent en $COUNTRY$, dont les politiques de tolérance raciale ont attiré une vague de migrants extérieurs vers la capitale $CAPITAL_CITY$. Une minorité grandissante pourrait conduire à une prospérité partagée, mais cela en vaut-il vraiment la peine pour $CAPITAL_CITY$ ?"
 homebrew_idea.61.1:0 "Ils sont toujours les bienvenus à $CAPITAL_CITY$"
 homebrew_idea.61.2:0 "$CAPITAL_CITY$ a déjà assez de problèmes comme ça."
 homebrew_idea.62.t:0 "La Question Humaine"
 homebrew_idea.62.d:0 "L'écrasante majorité des citoyens de l'Empire d'Anbennar sont des humains. Définis au mieux par leur ingéniosité et leur sociabilité, ce n'est pas une exagération de dire que les humains sont le ciment qui maintient l'empire ensemble. Il est donc de la plus haute importance de considérer la position des humains au sein de $COUNTRY$, et de se rappeler que leurs électeurs dans l'empire sont vivement intéressés par la promotion des droits humains."
 homebrew_idea.62.1:0 "Nous pouvons faire quelques concessions."
 homebrew_idea.62.2:0 "N'essayons pas de changer le statu quo."
 homebrew_idea.63.t:0 "La Question Halfeline"
 homebrew_idea.63.d:0 "Les halfelins l'ont eu difficile. Nés d'une plus petite stature, sans grande nation à appeler leur foyer, leurs rêves d'indépendance sont réprimés par le confort de la nourriture et de la compagnie dans des duchés et royaumes qui ne se soucient guère d'eux. Mais peut-être que nos belles terres de $COUNTRY$ pourraient les accueillir à bras ouverts ? L'électeur halfelin de l'empire garde un œil sur ses protégés, et remarquerait certainement tout changement dans nos politiques."
 homebrew_idea.63.1:0 "Les halfelins sont les bienvenus en $COUNTRY$ !"
 homebrew_idea.63.2:0 "Qu'ils soient le problème de quelqu'un d'autre."
 homebrew_idea.64.t:0 "La Question Elfique"
 homebrew_idea.64.d:0 "Les elfes à longue vie sont peu nombreux, mais puissants. En effet, certains d'entre eux ont vécu pour voir à la fois la naissance d'Anbennar et la fin de la Marée Verte. Leur fierté et leur arrogance sont à la mesure de leur talent magique et de leurs siècles d'expérience ; être simplement associé à un elfe est un grand honneur parmi les Anbennariens. Ce même prestige pourrait être nôtre, si nous accordions aux elfes de plus grands privilèges en $COUNTRY$. Leur électeur impérial apprécierait certainement le geste."
 homebrew_idea.64.1:0 "Un elfe est un allié puissant à avoir."
 homebrew_idea.64.2:0 "Souvenez-vous de l'Âge des Masques !"
 homebrew_idea.65.t:0 "La Question Naine"
 homebrew_idea.65.d:0 "S'il y a un trou dans le sol, il y a de fortes chances qu'un nain l'ait creusé. Travailleurs et obstinés, les nains font remonter leur histoire à la chute d'Aul-Dwarov, et ont depuis gagné une réputation de forgerons et d'artisans au sein d'Anbennar. Un nain n'oublie jamais une dette ; nous pouvons les mettre en dette envers nous en effaçant leurs emprunts et en accordant des allègements fiscaux aux nains. Leur électeur impérial apprécierait certainement le geste."
 homebrew_idea.65.1:0 "Nous pourrions avoir besoin de travailleurs comme eux."
 homebrew_idea.65.2:0 "La dernière chose dont nous avons besoin, ce sont des nains chassant les entreprises locales."
 homebrew_idea.66.t:0 "La Question Gnomique"
 homebrew_idea.66.d:0 "Les gnomes sont ce à quoi beaucoup pensent d'abord en entendant le mot « artificier ». Bien que la Hiérarchie Gnomique soit tombée depuis des siècles, les gnomes ne partagent pas l'attitude défaitiste des halfelins, et ont canalisé leurs frustrations dans leur travail pour créer des merveilles technologiques. En ces temps changeants, l'ingéniosité gnomique devient plus précieuse que jamais, et leur donner une place parmi notre intelligentsia ferait bonne impression aux gnomes de l'empire."
 homebrew_idea.66.1:0 "Nous pourrions avoir besoin de nouveaux esprits dans notre cabinet."
 homebrew_idea.66.2:0 "Les gnomes sont sans importance dans la politique anbennarienne"
 homebrew_idea.67.t:0 "La Question Semi-Elfique"
 homebrew_idea.67.d:0 "Une qualité remarquable des humains est leur volonté et leur capacité de se reproduire avec tout ce qui a deux jambes. Les semi-elfes sont le résultat de ce trait, nés du désir d'avoir une progéniture douée pour la magie dans un empire dominé par de puissants mages. La noblesse semi-elfique est un trait définissant d'Anbennar depuis des siècles, et nous ferions bien de favoriser ces hommes puissants. Le Magisterium est particulièrement intéressé par les droits des semi-elfes, et nous regarderait favorablement si nous promouvions leur acceptation."
 homebrew_idea.67.1:0 "Le sang d'argent brille le plus fort."
 homebrew_idea.67.2:0 "Nous devrions regarder vers l'avenir, pas le passé."
 homebrew_idea.68.t:0 "Débat Impérial"
 homebrew_idea.68.d:0 "Une longue tradition de l'Empire d'Anbennar est l'élection de l'empereur parmi les électeurs. Mais les élections concernent aussi des affaires plus locales, et dans l'une des cours de $COUNTRY$, il y a eu un différend concernant une loi que l'empereur a récemment adoptée. Un vote a été pris, et tous conviennent que $COUNTRY$ devrait s'opposer à cette loi devant les hautes cours de justice."
 homebrew_idea.68.1:0 "Nous devrions résister et soutenir l'empereur."
 homebrew_idea.68.2:0 "Le peuple a parlé, nous nous opposerons à l'empereur"
 homebrew_idea.69.t:0 "Assurer la Couronne Impériale"
 homebrew_idea.69.d:0 "Le statut de $COUNTRY$ en tant qu'Empereur d'Anbennar est assuré, pour l'instant. Cependant, le système d'élection d'un nouvel empereur à la mort du précédent laisse toujours une question en suspens : et si personne ne votait pour nous une seconde fois ? Si le Trône de la Colombe doit être assuré, nous devons garantir la loyauté des électeurs, par tous les moyens nécessaires. Un conseiller a approché $MONARCH$ avec une idée : une exemption fiscale. Si l'empereur récompensait les électeurs et princes pour leur loyauté avec un allègement fiscal, les coffres impériaux pourraient se vider, mais notre avenir sera plein et radieux."
 homebrew_idea.69.1:0 "Les amis valent plus que l'argent."
 homebrew_idea.69.2:0 "Non, le trésor ne pourrait se le permettre."
 homebrew_idea.70.t:0 "Ligue Marchande à [homebrew_cot_event.GetName]"
 homebrew_idea.70.d:0 "[homebrew_cot_event.GetName] est une province riche et prospère au sein de $COUNTRY$, et sa position dans les routes commerciales locales en a fait un lieu attrayant pour les marchands. Cependant, dernièrement, une ligue de marchands indépendants s'est installée et menace notre propre contrôle sur les affaires de la ville. Bien sûr, nous pourrions permettre à ces parvenus de poursuivre leurs activités, car notre traitement d'eux gagnerait sans doute la faveur de l'électeur impérial Couronne-de-Dame. Mais pouvons-nous risquer nos propres réseaux commerciaux ?"
 homebrew_idea.70.1:0 "La richesse est faite pour être partagée."
 homebrew_idea.70.2:0 "Chassez ces marchands de [homebrew_cot_event.GetName] !"
 homebrew_idea.71.t:0 "Tisser une Toile Décadente"
 homebrew_idea.71.d:0 "La politique impériale est déroutante au mieux. Les terres d'un prince peuvent être dispersées en diverses enclaves, une seule cité peut avoir plus de poids politique qu'un duché entier, des guerres sont menées pour des raisons incompréhensibles, et au-dessus de tout cela un empereur traîne ses sujets, hurlant et se débattant. À travers une telle tourmente, nos diplomates ont prouvé maintes et maintes fois leur capacité à apaiser les tensions et à forger de nouvelles alliances à l'intérieur et à l'extérieur de l'empire, un avantage que nous ferions bien d'utiliser en ces temps changeants."
 homebrew_idea.71.1:0 "Dans le chaos, il y a des opportunités."

 homebrew_idea.72.t:0 "Une Rancune Ravivée"
 homebrew_idea.72.d:0 ""
 homebrew_idea.72.1:0 "Sûrement, cela a assez duré ?"
 homebrew_idea.72.2:0 "« Nous ne sommes pas en colère. Vraiment. »"
 homebrew_idea.72.3:0 "Dénoncer ouvertement leurs actions."
 homebrew_idea.72.4:0 "« ÇA VA DIRECT DANS LE LIVRE ! »"

