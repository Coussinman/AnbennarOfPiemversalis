 #events
 homebrew.1.t:0 "Bienvenue dans Homebrew"
 homebrew.1.d:0 "Bienvenue dans Homebrew, un sous-mod pour Anbennar. Avant de commencer, permettez-moi de vous présenter quelques détails importants.\n\nCertaines idées de ce mod ajoutent directement des modificateurs à vos provinces. Afin de minimiser les pertes de performance, toutes ces idées incluent une décision à prendre lorsque vous adoptez l'idée. Veuillez comprendre cette limitation ; j'espère que vous apprécierez néanmoins les effets que ces idées ont à offrir.\n\nLes économies ont été ajustées pour tenir compte de tous les modificateurs présents dans Homebrew et Anbennar en général. Les choses coûteront plus cher que d'habitude, et la réserve de soldats sera légèrement plus rare. Vous ne devriez sentir la différence qu'après le début de partie. Veuillez en tenir compte dans la gestion de votre budget.\n\nHomebrew a été créé dans le but de rendre Anbennar plus amusant et intéressant à jouer. Alors amusez-vous bien !"
 homebrew.1.1:0 "C'est parti !"
 homebrew.4.t:0 "La Convention de Núrael"
 homebrew.4.d:0 "Tandis que la foi ravélienne se répand à travers Cannor, un cercle d'artificiers de renommée mondiale est invité à se réunir dans le lieu de rencontre neutre de Núrael. Là, pendant deux mois, les grands esprits de Halann se sont rencontrés et ont débattu de l'avenir de l'art naissant de l'Artisanat Magique. Bien des sujets furent discutés et disputés, mais tous les présents s'accordèrent sur un point : l'Artisanat Magique est à son pire lorsqu'il outrepasse les limites de la morale. Avec l'approbation du Haut-Rectorat, les artificiers de Núrael ont rédigé un contrat à signer par tous les hommes et femmes de bonne volonté pratiquant l'Artisanat Magique, s'engageant à préserver la bonne réputation des artificiers partout et à ne jamais sacrifier leur intégrité morale au nom du progrès. Quiconque refusera de signer ce contrat sera vilipendé par la communauté mondiale."
 homebrew.4.1:0 "De nouvelles normes se développent"
 homebrew.4.2:0 "Les règles sont plutôt des « recommandations »."
 homebrew.5.t:0 "La Convention de Núrael"
 homebrew.5.d:0 "Aujourd'hui, un messager est arrivé à la cour, portant un document et une plume. Il représentait le cercle d'élite des artificiers, venus ensemble créer la Convention de Núrael. Si $MONARCH$ la signe, on attendra de [Root.Monarch.GetHerHim] qu'il respecte les principes énoncés, notamment l'interdiction de pratiques jugées « immorales ». La convention bénéficie du soutien du Haut-Rectorat lui-même, et si $MONARCH$ refuse d'apposer sa signature, [Root.GetName] se retrouvera diplomatiquement isolé."
 homebrew.5.1:0 "Signez !"
 homebrew.5.2:0 "Les règles sont plutôt des « recommandations »."
 homebrew.6.t:0 "Mise à jour des Fortifications Avancées"
 #WIP stuff, nothing to see here
 homebrew.32.t:0 "Pointer le Briseur de Halann"
 homebrew.32.d:0 "Tandis que conseillers et officiels de la cour se pressent autour de $MONARCH$, le suppliant de reconsidérer, [Root.Monarch.GetSheHe] contemplait la grande super-arme : le Briseur de Halann. Proclamé « grand finale » par l'Artificier en Chef, le Briseur a été décrit comme un explosif capable d'infliger une « soumission absolue » à l'ennemi. Et en ces temps de guerre, $COUNTRY$ a besoin de tout avantage possible. Le Briseur n'a pas été testé, c'est vrai, mais quand l'Artificier en Chef a-t-il jamais déçu $MONARCH$ ? Assurément, les rapports concernant son §Raura sinistre§W ne sont pas inquiétants. Il ne reste qu'à choisir quelle pauvre âme en sera la cible."
 homebrew.32.1:0 "« Commençons par eux. »"
 homebrew.32.2:0 "« Ces gens sont notre cible la plus pressante. »"
 homebrew.32.3:0 "« Procédez. »"
 homebrew.32.4:0 "« Je dois reconsidérer cela. »"
