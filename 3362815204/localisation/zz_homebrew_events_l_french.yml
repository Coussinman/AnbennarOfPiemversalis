 homebrew_idea.105.1:0 "Hum, quelle iconographie particulière"
 homebrew_idea.105.2:0 "Non... C'EST...?!"
 homebrew_idea.106.t:0 "Une Lecture Intéressante"
 homebrew_idea.106.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\n« Selon toutes les lois connues de l'aviation, il n'y a aucun moyen pour qu'une abeille puisse voler. Ses ailes sont trop petites pour soulever son petit corps grassouillet du sol. L'abeille, bien sûr, vole quand même. Car les abeilles ne se soucient pas de ce que les humains pensent impossible. » \n\nCet en-tête était la préface de ce qui devait être la dernière pièce d'un barde. $MONARCH$ poursuivit sa lecture avec un léger amusement, des mots défilant sur la surface du miroir retraçant l'histoire d'une abeille aventureuse visitant une maison humaine. La pièce était un peu absurde dans son concept, mais c'était exactement ce dont $MONARCH$ avait besoin pour égayer [Root.Monarch.GetHerHis] journée."
 homebrew_idea.106.1:0 "« Comme c'est amusant. »"
 homebrew_idea.106.2:0 "« Nous devrions commander une pièce basée sur ce script ! »"
 homebrew_idea.107.t:0 "La Carte Vous Regarde en Retour"
 homebrew_idea.107.d:0 "Sur la surface chatoyante du miroir, une image apparut. $MONARCH$ scruta le miroir... et recula d'horreur. \n\nLa cour de $COUNTRY$ était en émoi tandis que $MONARCH$ racontait ce qu'il avait vu. Sûrement, cela ne pouvait être vrai ? Sûrement, quand $MONARCH$ avait regardé dans un miroir, un géant colossal ne l'avait pas regardé en retour ? $MONARCH$ est devenu reclus depuis, divaguant sur « le développement paradoxal » et comment le libre arbitre est un mythe. Vraiment, $MONARCH$ est mentalement troublé."
 homebrew_idea.107.1:0 "« Le monde doit connaître cette révélation ! »"
 homebrew_idea.107.2:0 "« Oh, à quoi bon tout cela ? »"
 homebrew_idea.107.3:0 "« Une vie comme celle-ci... ne vaut pas la peine d'être vécue »"
 homebrew_idea.108.t:0 "Artisanat Magique Infâme"
 homebrew_idea.108.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\nLes couleurs et formes tourbillonnantes formèrent l'image d'un laboratoire. D'un côté, un homme seul travaillait ses outils : scies, aiguilles et teintures. Au mur, un croquis représentait l'un des Khet, un être divin ressemblant à un humain avec une tête de chat. À côté de son croquis, était écrit : « EN FAIRE PLUS. » \n\nSoudain, une face de chat masqua le miroir. Elle renifla l'air, et se lécha les babines avant de retourner à ses affaires et de s'éloigner au trot. $MONARCH$ pouvait maintenant remarquer de nombreux chats errant dans le laboratoire, certains examinant l'homme tandis que d'autres griffaient furieusement la porte. Dans un coin, des piles de cages de fer contenaient encore plus de chats, et... autre chose. Un humain décapité gisait recroquevillé dans l'une des cages, nu et marqué d'incisions et de points de suture sur tout le corps. $MONARCH$ pouvait voir des touffes de fourrure émergeant de manière hasardeuse de l'une des lésions, emmêlées et sales. D'autres cages contenaient d'autres créatures, des chats qu'on ne pouvait appeler chats, car ils avaient des traits indéniablement non félins. Un chat marchait sur des pattes grêles et sans poil se terminant par des pieds humains. Un autre était suspendu au plafond de sa cage avec ses quatre mains humaines. Un autre gisait immobile, son corps ancré au sol par une tête humaine cousue à son cou.\n\nL'homme se leva de son travail, et c'est alors que $MONARCH$ put distinguer son dernier affront à la nature : un bébé humain mort, sa tête ouverte et remplie de morceaux de métal et de céramique. L'homme s'approcha de l'un des chats intacts, lança un sort dessus, et sans aucune hésitation lui coupa les oreilles avec un couteau. Il retourna ensuite vers l'enfant mort, et commença à fixer les oreilles fraîchement coupées dans l'ouverture de la tête. \n\n$MONARCH$ n'en pouvait plus, et ordonna que le miroir soit emporté."
 homebrew_idea.108.1:0 "Qu'est-ce que je viens de voir, par Halann ?"
 homebrew_idea.108.2:0 "Je dois avertir le Khétarque de ce blasphème !"
 homebrew_idea.108.3:0 "...Était-ce l'Artificier en Chef ?"
 homebrew_idea.109.t:0 "La Vie Palpitante de l'École de Magie"
 homebrew_idea.109.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\nDans ce qui doit être une académie de magistères fictive, se trouve l'histoire d'un jeune apprenti mage. Ce mage, célèbre pour avoir survécu à une rencontre avec le « Roi Tyran » durant son enfance, étudie maintenant dans une école aux normes de sécurité si basses que $MONARCH$ est étonné que personne n'ait jamais déposé de plainte. Après avoir traversé les mesures de sécurité discutables de l'école (qui échouent toutes à arrêter un apprenti de première année), le mage se retrouve face à face avec le Roi Tyran, avant qu'un deus ex machina magique ne l'emporte loin du danger."
 homebrew_idea.109.1:0 "« Une histoire pour enfants, sans doute. »"
 homebrew_idea.109.2:0 "« Le Magisterium ne permettrait jamais une école comme celle-là ! »"
 homebrew_idea.109.3:0 "« Cette école viole tant de nos réglementations ! »"
 homebrew_idea.110.t:0 "Créatures de la Nuit"
 homebrew_idea.110.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\nSur sa surface, le miroir montra un festin décadent disposé et occupé par des nobles de diverses origines. Dans leur château, bien au-delà des politiques du royaume et des querelles purulentes des classes inférieures, ces hommes et femmes riaient et colportaient tout en se délectant de leurs repas. Mais oh, quel genre de repas était-ce ! Car les hommes buvaient dans des verres de sang, et une femme appela un serveur pour lui mordre le cou. Ces gens étaient des vampires ! Et là, suspendu au-dessus d'une cheminée, $MONARCH$ put distinguer un blason. C'était celui de Sil Vivin, la famille qui régnait sur le Royaume de Corvurie et le Duché d'Ashiande. Soudain, l'un des fêtards tourna la tête vers $MONARCH$, une expression confuse sur le visage. Puis, le miroir s'assombrit."
 homebrew_idea.110.1:0 "« Sûrement est-ce quelque cauchemar tordu ? »"
 homebrew_idea.110.2:0 "« Nous savons maintenant ce qu'ils sont vraiment ! »"
 homebrew_idea.110.3:0 "« Quoi, ils ont fait la fête sans m'inviter ? »"
 homebrew_idea.111.t:0 "Ergotages Historiques"
 homebrew_idea.111.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir pendant des heures. \n\nLe miroir raconta à $MONARCH$ une histoire, ce qui devait être un drame d'époque se déroulant durant la Guerre du Roi-Sorcier. L'intrigue ne correspond pas à ce que $MONARCH$ avait appris dans [Root.Monarch.GetHerHis] manuels d'histoire. D'une part, les elfes n'étaient pas déjà établis à Cannor avant la guerre, mais $MONARCH$ pouvait excuser cela pour élargir le casting de personnages. Mais ensuite l'histoire montre le Roi-Sorcier Nichmer conspirant avec des orques, et un halfelin de toutes les races trouvant le phylactère de Nichmer. Nichmer n'a jamais eu de phylactère. Néanmoins, ces écarts flagrants ne suffisent pas à empêcher $MONARCH$ de regarder l'histoire jusqu'à sa fin. Cependant, cela laissa une question en suspens : ces inexactitudes doivent-elles être prises au sérieux ?"
 homebrew_idea.111.1:0 "« Quelques libertés artistiques valent une bonne histoire ! »"
 homebrew_idea.111.2:0 "« L'intégrité historique est prioritaire ! »"
 homebrew_idea.112.t:0 "La Perle Maudite"
 homebrew_idea.112.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir pendant des heures. \n\nLe miroir conta une aventure légère le long de la Mer des Ruines d'Aelantir. Là, où les cartes sont incomplètes et la chasse aux Reliques Précurseurs bat son plein, un capitaine pirate et un forgeron partirent en voyage pour sauver une belle demoiselle des griffes d'un équipage pirate, maudit par une Magie Précurseur à une éternité de non-mort. Des péripéties s'ensuivent, les pirates maléfiques sont vaincus, et le pirate héroïque (si un tel être pouvait exister) échappa au bras armé de la loi."
 homebrew_idea.112.1:0 "« Qui aurait cru que la piraterie pouvait être si romantique ? »"
 homebrew_idea.112.2:0 "« Ce sont des pirates, ils méritent la potence quoi qu'il arrive. »"
 homebrew_idea.113.t:0 "" #placeholder for future ideas
 homebrew_idea.113.d:0 ""
 homebrew_idea.113.1:0 ""
 homebrew_idea.113.2:0 ""
