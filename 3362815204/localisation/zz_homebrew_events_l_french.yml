 #pricechange events
 damestear.6.t:0 "Production Croissante de Damestear"
 damestear.6.d:0 "Depuis plus d'un millénaire, la Damestear est une ressource inestimable pour l'art des sorts et l'Artisanat Magique. Son extrême rareté a fait flamber son prix, avec des économies construites autour de son commerce et des nations entrant en guerre dans le seul but de sécuriser un gisement de cet or bleu. \n\nMais maintenant... il y en a tellement. Que ce soit à cause d'une nation ou de plusieurs, des réglementations accrues sur l'offre et le commerce de la Damestear ont conduit à des quantités sans précédent utilisées. Il y en a tellement à disposition, même, que les gens commencent à douter de sa valeur."
 damestear.6.1:0 "L'offre et la demande ? Dans mon jeu de peinture de carte ?"
 damestear.7.t:0 "Demande Croissante de Damestear"
 damestear.7.d:0 "Artificiers et Rois-Sorciers ont une chose en commun : un besoin de Damestear. Avec les deux montant en importance à Cannor, la demande pour l'or bleu a dramatiquement augmenté et a fait des vagues sur les marchés mondiaux. Cette période verra la Damestear atteindre des prix sans précédent, tandis que les fournisseurs peinent à suivre les quantités massives importées vers Cannor."
 damestear.7.1:0 "C'est là que les gros profits commencent à affluer."