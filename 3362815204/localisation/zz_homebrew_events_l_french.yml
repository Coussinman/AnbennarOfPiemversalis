 homebrew.52.t:0 "Guildes en Faillite"
 homebrew.52.d:0 "Depuis l'adoption récente du Commerce Mondial, des guildes marchandes organisées ont fait des investissements conjoints dans nos réseaux commerciaux à l'étranger. Cependant, cette tendance récente a aussi produit une génération de négociants inexpérimentés faisant des investissements imprudents et se rabattant sur les assurances en cas d'échec. Cela a culminé dans une récente bulle économique, où de nombreux marchands se sont endettés pour investir dans une compagnie commerciale surévaluée, mais en réalité quasi sans valeur. Cette faillite massive a submergé les assureurs, et notre classe marchande risque désormais une contraction soudaine."
 homebrew.52.1:0 "Renflouez-les"
 homebrew.52.2:0 "Qu'ils se débrouillent"
