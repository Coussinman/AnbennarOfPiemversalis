 homebrew_idea.101.t:0 "Dans une Contrée Lointaine, Très Lointaine"
 homebrew_idea.101.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir pendant des heures. \n\nLe miroir raconta à $MONARCH$ une histoire, datant d'avant les elfes précurseurs, dans une contrée bien au-delà de tout endroit de Halann. Là, le miroir conta un drame tandis qu'une grande guerre était menée avec une technologie avancée, entre Mages de Guerre et Mechanim, orchestrée par un homme assoiffé de pouvoir usurpant le contrôle. L'histoire n'a pas de fin heureuse, son apogée étant un duel entre deux Mages de Guerre, anciennement maître et élève, croisant leurs épées magiques sur fond de volcan rugissant. L'élève fut abattu, et ne survécut qu'avec l'aide d'un Artisanat Magique avancé, l'histoire se terminant sur la promesse d'une suite."
 homebrew_idea.101.1:0 "« Quel spectacle fascinant ! »"
 homebrew_idea.101.2:0 "« Hé, avez-vous vu ces épées ? J'en veux une ! »"
 homebrew_idea.101.3:0 "« Faites venir mes amiraux, j'ai un nouveau design de navire pour eux. »"
 homebrew_idea.101.4:0 "« Avez-vous déjà entendu la tragédie de Dark Plagueis le Sage ? »"
 homebrew_idea.101.5:0 "« Je vois clair dans les mensonges des mages ! »"
 homebrew_idea.102.t:0 "L'Amour Ne Connaît Pas de Frontières"
 homebrew_idea.102.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\nDans un lieu non identifié, un rassemblement discret se réunit devant un autel dédié à un dieu que $MONARCH$ ne put reconnaître. Des cloches sonnaient, des oiseaux chantaient, c'était une joyeuse affaire. Un prêtre humain se tenait sur un piédestal, attendant que la mariée et le marié descendent l'allée. Le mariage se déroula comme prévu, les deux échangèrent leurs vœux, et lorsqu'ils se tournèrent l'un vers l'autre pour s'embrasser, $MONARCH$ réalisa quelque chose. La mariée était une Hobgobeline ! Là, un homme humain et une femme hobgobeline s'embrassèrent passionnément, le public les applaudissant. C'était un spectacle touchant."
 homebrew_idea.102.1:0 "« Je croyais que de telles relations ne se trouvaient que dans les mythes ! »"
 homebrew_idea.102.2:0 "« Faites venir un médecin, je dois oublier ce que je viens de voir. »"
 homebrew_idea.103.t:0 "Chanson d'Engagement"
 homebrew_idea.103.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\nUn barde aux cheveux roux apparut sur la surface du miroir, accompagné d'un groupe invisible jouant d'instruments que $MONARCH$ n'avait jamais entendus auparavant. Le barde se mit à chanter, d'amour et d'abandon, promettant à $MONARCH$ qu'il ne recourrait jamais à ce dernier. Il était évident que ce barde était très pratiqué, et avait toute une troupe de danseurs pour le soutenir, mais après enquête, $MONARCH$ ne put trouver aucune preuve de l'existence de ce barde."
 homebrew_idea.103.1:0 "« Sa chanson vivra dans ma mémoire. »"
 homebrew_idea.103.2:0 "« Mais pourquoi ? Pourquoi m'a-t-il abandonné ? »"
 homebrew_idea.104.t:0 "Sombre Prophétie"
 homebrew_idea.104.d:0 "Sur la surface chatoyante du miroir, des images vacillèrent et commencèrent à se mouvoir d'elles-mêmes tandis que des sons se faisaient entendre. $MONARCH$ regarda avec intérêt, contemplant le miroir. \n\nUn nuage sombre s'installa dans le miroir tandis que $MONARCH$ assistait à de terribles atrocités. Des foyers furent incendiés, des nations ravagées, et des peuples rassemblés dans un sinistre château, pour ne plus jamais être revus. Une nouvelle image apparut, celle d'un nuage sombre au-dessus des terres d'Aelantir, encerclant Dalaire. Et en dessous, dans son ombre, complotait un peuple vil et méprisable, avec de terribles desseins de conquête et d'éradication. Ils s'appelaient eux-mêmes... les Elfes Stellaires."
 homebrew_idea.104.1:0 "Les prophéties ne sont pas réelles... n'est-ce pas ?"
 homebrew_idea.104.2:0 "Nous devons agir sur cette prophétie !"
 homebrew_idea.104.3:0 "Propagande sans fondement ! Je veux que ce miroir soit brisé !"
