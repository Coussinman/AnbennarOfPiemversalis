 rakk_castle_title: "§RRakkabuttai — le Col de Sang§!"
 rakk_castle: "§RRakkabuttai — le Col de Sang§!"
 rakk_castle_desc: "§R« Même si les murs tombent, l'esprit de Rakkabuttai combattra jusqu'à la dernière lame. »§! \n\nAux confins de la frontière occidentale du Taychend se dresse Rakkabuttai, antique forteresse taillée dans les falaises du col montagneux qui servit jadis de route d'invasion principale aux hordes chendhyennes. Ici, la Confrérie de la Cape Sanglante prêta un serment éternel de protéger leur patrie contre tous ceux qui oseraient la menacer. Les bannières rouge sang flottant depuis ses remparts devinrent des symboles non seulement de crainte, mais de résolution, de discipline et d'une prouesse militaire inflexible. \n\nPlus qu'une forteresse, Rakkabuttai fut un bastion, une forge de guerriers et un rappel vivant du prix de la vigilance. Ses casernes abritaient des milliers d'hommes, ses arsenaux regorgeaient d'acier kheionai, et ses tours surveillaient les steppes à l'affût des bandes guerrières en approche. Durant des siècles, nul ennemi ne put la prendre par la force ou la ruse, et chaque pierre du col est imbibée du sang de ceux qui tentèrent."
