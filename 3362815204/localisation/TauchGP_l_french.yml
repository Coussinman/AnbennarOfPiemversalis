####################
#taichik
####################

 Assakadail_isl_title: "Sanctuaire d'Assakadail"
 Assakadail_isl: "Sanctuaire d'Assakadail"
 Assakadail_isl_desc: "--------------\nAssakadail est une île sacrée, profondément vénérée par les Chendhyens. C'est ici que le légendaire Munakles guida pour la première fois les réfugiés Devand loin de leurs maîtres Précurseurs, au cœur du Taychend. Au cours de leur périple vers la vallée de Mteibas, c'est sur cette île même qu'une division fatidique parmi ses disciples donna naissance aux nombreuses tribus qui jamais ne se réuniraient. \n\nAu sein du grand sanctuaire d'Askalyn, Munakles et ses compagnons trouvèrent refuge avant la venue de la Ruine. Là, il consacra de nouveau sa lame enchantée, Saerasyar, jurant qu'elle ne servirait plus jamais le mal. Depuis cet instant, Assakadail se dresse comme un symbole de sacrifice, de libération et d'unité spirituelle pour tous les Chendhyens. \n\nL'île est toujours gardée par les Durasyar, gardiens de la mémoire et de la sagesse accumulées par les sages et chamans elfiques au fil des générations. Pour eux, ce lieu est un rappel solennel du prix de la liberté. \n\nPourtant, pour d'autres, Assakadail n'est point un sanctuaire, mais une cicatrice. De cette île s'éleva le cri de liberté qui mena les Chendhyens à incendier la moitié du Taychend. Pour ceux qui se souviennent des flammes, Assakadail ne représente pas un lieu saint, mais la marque de la rébellion, de la trahison, et la cible légitime de représailles."

 Kannalulthe_city_title: "Grande Cité-Barrage de Kannalulthe"
 Kannalulthe_city: "Grande Cité-Barrage de Kannalulthe"
 Kannalulthe_city_desc: "--------------\nLa Grande Cité-Barrage de Kannalulthe se dresse comme l'un des plus grands accomplissements du Second Empire Gophiran, témoignage vivant de son ambition et de sa grandeur. Bâtie à l'origine comme un humble fort sur le fleuve menant à Gophira, Kannalulthe devint rapidement le cœur économique du Taychend. Maisons de commerce, esclavagistes, artisans et négociants affluèrent vers la cité, avides de se rapprocher du centre du pouvoir impérial. Elle s'étendit promptement, devenant la capitale de facto et surpassant même Nanru Nakar en taille et en population. Son architecture, murs cyclopéens et arches monumentales, temples et statues grandioses, et bien sûr l'immense barrage qui donna son nom à la cité, inspira des générations d'architectes et de bâtisseurs. \n\nBien que la cité tombât sous le règne d'Erradal le Tonnerre Rouge, qui la rasa dans un accès de cruauté et d'orgueil, Kannalulthe connaît aujourd'hui une seconde naissance. Le grand barrage se dresse de nouveau, intact, le quartier intérieur a été restauré, et l'anneau manufacturier extérieur reprend vie."

 kaintt: "Débloque une décision pour restaurer les systèmes d'irrigation de Kannalulthe."
 kainulu_sos_1_title: "Restauration de Kannalulthe : les Premières Eaux"
 kainulu_sos_2_title: "Restauration de Kannalulthe : les Grands Champs"
 kainulu_sos_1_desc: "Avec la restauration du grand barrage, Kannalulthe a recouvré son âme : l'eau. Retenue par des milliers de tonnes de pierre, le fleuve sacré coule désormais sous le contrôle de nos ingénieurs et prêtres, alimentant les canaux antiques et irriguant les plaines alluviales oubliées. Autour de la cité, les champs se forment à nouveau, et avec eux, les premiers camps de travail. Des esclaves, rassemblés de tous les coins de l'empire, sont conduits aux berges du fleuve pour creuser les canaux, déblayer la vase et insuffler la vie aux terres qui jadis nourrissaient tout le Taychend."
 kainulu_sos_2_desc: "À mesure que le réseau d'irrigation s'étend, Kannalulthe devient non seulement une merveille architecturale, mais le cœur d'une puissance agricole. Des vallées entières, autrefois arides et craquelées, refleurissent de nouveau. Les intendants d'État et les contremaîtres d'esclaves étendent le réseau de camps de travail, transformant la plaine alluviale du fleuve en source d'abondance inépuisable. À chaque nouvelle récolte et chaque champ labouré, l'Empire fait un pas de plus vers la reconquête de la gloire du Second Âge Gophiran."
 Kannalulthe_city_2: "Ouvrages d'Irrigation Restaurés"
 Kannalulthe_city_2_desc: "Les antiques canaux de Kannalulthe charrient de nouveau leurs eaux. Avec la première vague de restauration achevée, les terres cultivables s'étendent et les revenus fiscaux croissent, tandis que le barrage commence à recouvrer son héritage de source vitale du Taychend."
 Kannalulthe_city_3: "Cœur de l'Empire Alluvial"
 Kannalulthe_city_3_desc: "La pleine puissance du barrage de Kannalulthe a été restaurée. De vastes champs irrigués entourent désormais la cité, et l'agriculture servile assure un flot abondant de richesses. La cité n'est plus seulement renaissante : elle prospère."

 Whiteharbour_title: "Port-Blanc, Bastion des Exilés"
 Whiteharbour: "Port-Blanc, Bastion des Exilés"
 Whiteharbour_desc: "--------------\nPort-Blanc, cœur scintillant d'Oremvand, ne naquit point dans la gloire, mais dans le désespoir. Elle s'éleva de l'exil, de la peur et de la volonté inébranlable d'une seule femme. Ici, à l'embouchure du fleuve Donzaern, la Princesse Taneliata, meneuse de la Faction Blanche brisée, jeta l'ancre avec les vestiges de son peuple après avoir fui Nagar Vyéchei. Rejetés par tous les ports méridionaux et pourchassés par les Pourpres triomphants, ils firent un ultime pari : non sur des murs de pierre, mais sur la solidité de ceux de bois. \n\nLe bastion qui couronne aujourd'hui les falaises dominant le port commença comme une tour de guet, assemblée à la hâte à partir de bois d'épaves et de rochers épars. Ce fut le premier bouclier de la Faction Blanche, et c'est de là que Taneliata porta un coup décisif lorsque la flotte ennemie arriva pour achever ce qu'elle avait commencé. Des navires marchands reconvertis en vaisseaux de guerre, des tactiques inattendues et le défi des condamnés permirent aux exilés de remporter une victoire impossible. \n\nDes cendres de cette bataille naquit Oremvand. De ce bastion, Port-Blanc grandit pour devenir le plus grand carrefour commercial de la côte méridionale. L'ancien refuge fut transformé en le plus puissant port à l'est de Nagar Vyéchei, berceau de générations d'amiraux renommés. \n\nMais Port-Blanc n'est pas simplement un monument à la victoire. C'est le creuset où l'identité d'Oremvand fut forgée. Ici, les Festvristani marchands, les Yodhanpiri navigateurs et les mercenaires chendhyens aguerris s'unirent, formant une alliance tripartite qui, durant des siècles, protégea la cité contre la guerre, la rébellion et la conquête."

 Royakottar_ruin_title: "Cité-Ruine de Royakottar"
 Royakottar_ruin: "Cité-Ruine de Royakottar"
 Royakottar_ruin_desc: "--------------\nLà où se dressait jadis la Citadelle Calcinée d'Acier, redoutable bastion de l'Empire Précurseur, s'élève aujourd'hui Royakottar, fusion monstrueuse de métal, de brique et d'ambition. Il y a des siècles, réfugiés et récupérateurs affluèrent ici, fuyant le feu stellaire qui consuma l'ancien monde, attirés par l'appât des reliques enfouies sous l'acier tordu et les cendres. De ce cimetière de titans naquit une nouvelle cité, vivante de fumée, de forges et de l'éternelle faim du pouvoir oublié. \n\nQuatre familles règnent désormais sur les ruines tels des seigneurs féodaux d'un âge révolu. Les Kattyva écument les terres à la recherche d'antiques récupérations. Les Vustarin reforgent les reliques perdues en armes et en merveilles. Les Ursibadur se vautrent dans le vice et le crime sous les lampes vacillantes des artificiers. Les Nymkorai troquent les reliques comme monnaie d'échange, leurs caravanes étendant l'influence de Royakottar à travers tout le Taychend. Chaque brique de la cité est scellée par l'ambition, chaque mur plaqué des ossements de l'ancien monde. \n\nRoyakottar n'est point une cité ordinaire. C'est un royaume de récupérateurs, une forge du génie interdit, un monument à la survie par la ruse et le feu. La gouverner, c'est danser avec les fantômes, et risquer de devenir l'un d'entre eux."

 nagar_vye_title: "Voûtes d'Uyas Enret"
 nagar_vye: "Voûtes d'Uyas Enret"
 nagar_vye_desc: "--------------\nDans les profondeurs souterraines, là où résonnaient jadis le cliquetis des pioches et les hurlements de milliers d'esclaves, capturés lors de raids ou vendus en servitude via les marchés impitoyables des républiques de seigneurs de guerre, ne résonnent plus que le grattement des plumes et le froissement du parchemin. Lorsque les veines dorées d'Uyas Enret se tarirent, Nagar Vyéchei ne creusa pas plus profond. Au lieu de cela, le réseau isolé de galeries fut reconverti en quelque chose de bien plus durable : des voûtes pour l'or même qui fut jadis extrait de leurs parois. Ironie du sort, en vérité. \n\nAinsi naquit la première et plus ancienne banque de l'histoire du Taychend, institution d'une sophistication surprenante, considérant qu'elle émergea des cendres de l'ascension d'un seigneur de guerre. Alimentée par son système financier et son contrôle sur le seul port en eaux profondes de toute la région, Nagar Vyéchei devint bientôt le cœur battant du commerce d'esclaves, le second métier du Taychend, juste après la guerre elle-même. \n\nDans une contrée où la guerre est un commerce et les esclaves une monnaie, le port prospère, et les anciennes mines se remplissent de nouveau, non de minerai, mais de tributs. Les voûtes s'enfoncent plus profond, les registres s'épaississent, et le flot d'or devient une marée à laquelle nul souverain ne peut résister. \n\nTout l'or afflue vers Uyas Enret. Et nul n'ose demander où il va."

 Hakar_Mlerek_pal_title: "Vanetavanem — la Demeure Perçant-les-Cieux"
 Hakar_Mlerek_pal: "Vanetavanem — la Demeure Perçant-les-Cieux"
 Hakar_Mlerek_pal_desc: "--------------\nÀ l'intersection de l'ambition et de l'antiquité, là où les hauteurs sud-orientales de Nakar Mlerek rencontrent les terres centrales de Nanru Nakar, s'élève Vanetavanem, la Demeure Perçant-les-Cieux, palais monolithique de pierre étincelante et d'héritage mythique. Bâti dans les derniers jours du Liandarchat mais porté à sa pleine gloire sous Pelozhil et ses descendants, Vanetavanem ne servit pas simplement de siège à la lignée des Mudalaar : il fut la clé de voûte d'une civilisation. \n\nPlus qu'une résidence royale, Vanetavanem ancrait jadis un nœud du réseau de téléportation de la Cité Volante de Tacenie, et au plus profond de ses voûtes scellées reposent des reliques de cette antique sorcellerie, vibrant encore d'une intention à demi réduite au silence. Sa façade est austère, sculptée dans une pierre immense et sans ornement, mais au-delà des murs extérieurs se déploient des halls d'une opulence inimaginable : marbre bleu de Parakhachend, fresques de plafond peintes par les maîtres errants de Katelparai, tapis tissés par les clans de soie des marchés intérieurs de Mlerek. \n\nChaque mur raconte une histoire, chaque corridor tenait jadis audience : tributs des provinces lointaines, héritages des dynasties brisées, et symboles de loyauté ou de conquête trouvèrent tous leur place en ces lieux. Dans sa salle du trône aux voûtes élevées, jadis appelée le Hall des Trois Échos, des générations de Mudalaar siégèrent en jugement, jusqu'au jour où elle résonna pour la dernière fois, avec la mort du héros modéré Ebenant. \n\nMême en ruine ou sous occupation, Vanetavanem tint bon, revendication de légitimité, symbole de résilience, et finalement, lors de la formation du Triple Pacte, le cœur politique défiant du Sud. Ici, des émissaires négocièrent, des armées prêtèrent serment, et des destinées s'entrelacèrent."

 merc_mavik_one: "§RGuerriers du Mavihanavao§!"
 merc_mavik: "§RVétérans du Mavihanavao§!"
 Nakar_Kilaiek_str_title: "Mavihanavao — la Voie des Guerriers"
 Nakar_Kilaiek_str: "Mavihanavao — la Voie des Guerriers"
 Nakar_Kilaiek_str_desc: "--------------\nLe Mavihanavao, la « Voie des Guerriers », traverse le cœur de Nakar Kriadvai : non pas simplement une rue ou un quartier militaire, mais une vaste machine de guerre de pierre et d'acier. C'est un moteur vivant de conquête et de défi. De l'Arsenal de Teshalanine, où sont forgées les armes des armées Nakari, à la Forteresse de Varelrudu, centre de commandement de la Garde de la Cité, jusqu'aux ateliers de siège dont les conceptions ont brisé d'innombrables cités, le Mavihanavao est l'épicentre de la doctrine militaire Mudaliar. \n\nSes ruelles résonnent du fracas des lames d'entraînement, ses places accueillent des duels de prestige, et ses arènes vibrent de combats sanglants où les guerriers font leurs preuves devant des foules rugissantes. Même le marché aux esclaves à la lisière du quartier est un rouage de cette machine, où les captifs de guerre sont échangés pour financer les campagnes futures. \n\nPourtant, le Mavihanavao n'est pas seulement le lieu où les armées sont forgées : c'est là que les idéologies s'aiguisent. C'est ici qu'émergea la doctrine du Droit de la Lame : la croyance que l'autorité ne vient pas du lignage, mais de la victoire. De ces pierres marchèrent non seulement des généraux, mais des bâtards qui deviendraient héritiers, et des rebelles qui fonderaient des dynasties."

 Nakar_Kriadvai_nizh_title: "Profondeurs de Kriadvai"
 Nakar_Kriadvai_nizh: "Profondeurs de Kriadvai"
 Nakar_Kriadvai_nizh_desc: "--------------\nBien au-dessous des rues de Nanru Nakar, au-delà des lanternes vacillantes de la Ville-Basse et jusque dans les antiques galeries scellées des profondeurs, s'étend le complexe enténébré connu uniquement sous le nom des Profondeurs de Kriadvai. Ce n'est ni un palais, ni une forteresse, ni même un siège traditionnel du pouvoir : c'est quelque chose de bien plus dangereux, un lieu où la vérité et l'influence s'achètent, se négocient, s'archivent et s'ensevelissent. \n\nNé au lendemain de la guerre civile et raffiné au fil de générations d'intrigues, les Profondeurs sont le cœur invisible de la Triple Alliance. Dans ses halls tortueux, jadis anciens tunnels de stockage et voûtes ruinées d'empires oubliés, se trouve le Hall des Affaires Silencieuses, chambre de conseil clandestine où informateurs, diplomates, syndicats et cultes se réunissent dans une unité murmurée. Ici, les assassinats se planifient avec la même précision que les accords commerciaux, et les trahisons se cartographient avec cartes et registres. \n\nLes Profondeurs servent de noyau administratif aux vastes réseaux de renseignement et diplomatiques de Kriadvai. Des dossiers détaillant les secrets de souverains étrangers côtoient d'antiques reliques récupérées dans les Galeries Souterraines, et chaque corridor vibre d'enchantements destinés à faire taire, tromper ou tuer. \n\nNulle âme ne pénètre dans les Profondeurs sans y être conviée. Mais ceux qui y parviennent, ceux à qui les Mudaliar ou le cultuel Na'Sendali accordent le passage, se retrouvent en compagnie de courtiers du pouvoir murmurant dont l'influence s'étend bien au-delà des murs de la cité. Tandis que les Mlerek gèrent la diplomatie avec couronnes et ambassades, et que les Kilaiek commandent armées et rues, les Kriadvai règnent dans l'ombre, équilibrant les branches rivales de la famille Mudaliar, assurant la coopération et guidant subtilement le destin de Nanru Nakar elle-même. \n\nPlus qu'un grand édifice, les Profondeurs de Kriadvai sont une institution : le gouvernement de l'ombre de Nanru Nakar, le système nerveux d'une cité oscillant perpétuellement entre l'effondrement et l'ascension. Contrôler les Profondeurs, c'est connaître les secrets, façonner les alliances et, peut-être, décider qui régnera sur l'âge prochain."

 Urvand_mine_title: "Cité d'Opulence"
 Urvand_mine: "Cité d'Opulence"
 Urvand_mine_desc: "--------------\nS'élevant au sommet des falaises balayées par les vents des hautes terres de Larankarha, la cité d'Urvand se dresse comme un témoignage doré de l'ambition, du sacrifice et du pouvoir. Née dans la rébellion et le feu, elle fut bâtie par les esclaves affranchis de Merialeth l'Affranchisseuse, jadis captive dans les mines, puis libératrice et reine qui mit fin à la tyrannie d'une lame magique et forgea un nouveau destin pour son peuple. \n\nDans les profondeurs sous ses tours étincelantes, les mines s'étendent à l'infini, veines d'or qui ne se sont jamais taries. Durant des siècles, criminels et esclaves ont peiné dans les ténèbres oppressantes, alimentant l'essor d'un empire. Et au-dessus : palais de pierre, dômes dorés, rues pavées de richesse. Urvand n'est pas simplement une cité ; c'est un symbole. \n\nPourtant, derrière chaque mur resplendissant se cache l'ombre. La richesse d'Urvand dissimule la vérité brutale du labeur qui la soutient. C'est une cité de contradictions : magnificence bâtie sur la misère, ordre forgé par la force. Néanmoins, régner sur Urvand, c'est régner sur la perception. Quel plus grand pouvoir qu'une cité si radieuse qu'elle fait ressembler l'obéissance au destin ?"

 Fateweaver_title: "La Tisseuse de Destin"
 Fateweaver: "La Tisseuse de Destin"
 Fateweaver_desc: "--------------\nDans les profondeurs sous les antiques pierres de Korrimutren, au cœur caché d'une ruine Précurseur longtemps ensevelie, flottent les restes squelettiques de Kanelethiel la Tisseuse de Destin. Son corps, suspendu dans les airs par des câbles dorés miroitant d'une lueur arcanique, repose au centre d'une relique immense et insondable. On dit que ceux qui possèdent le don de la véritable divination peuvent toucher ses ossements antiques et entendre sa voix, un murmure d'au-delà du temps, révélant des aperçus de l'avenir avec une clarté terrifiante. \n\nPour les Taychendi, elle est plus qu'une prophétesse : c'est une héroïne divine, une présence sacrée dont les paroles ont façonné des siècles. Son culte, mené par l'énigmatique Porteur-de-Fil, rassemble les plus fins oracles et voyants de la région, et son sanctuaire à Korrimutren est devenu un lieu de pèlerinage sacré. Ici, les quémandeurs viennent implorer des visions, scruter les brumes du destin, et parfois, trouver leur propre perte. Car la relique n'est pas sans danger : pour les indignes ou les mal préparés, son pouvoir est mortel. \n\nLa Tisseuse de Destin n'est point une relique passive des âges révolus. Ses prophéties ont déclenché des guerres, brisé des empires et forgé de nouveaux royaumes à partir des cendres. C'est elle qui prédit la chute du Premier Empire Gophiran, et c'est sa révélation qui accorda à Laskaris le Conquérant une certitude de victoire liée au destin, et de mort. Certains prétendent qu'elle peut énoncer l'instant exact où un souverain périra, leur accordant un sombre bouclier d'immortalité : une volonté inébranlable par la connaissance parfaite de leur fin. Mais un tel don peut être une malédiction. Connaître son destin, c'est en être enchaîné."

 tkachuk.t: "La Prophétie de la Tisseuse de Destin"
 tkachuk.d: "Devant vous se dresse la Tisseuse de Destin, oracle flétrie enchâssée d'os et d'argent, ses orbites rougeoyant des braises du temps oublié. Cette antique relique ne parle point, et pourtant sa présence agite les vents du destin. Ceux qui osent solliciter son conseil peuvent entrevoir un fragment de l'avenir à venir. Mais sa guidance n'est jamais sans prix, et le chemin qu'elle révèle marquera à jamais votre âme et votre royaume. Choisissez le fil du destin que vous voudriez tirer, et il sera tissé dans la tapisserie de votre règne."

 tkachuk.0.a: "Démêler le Fil de la Clairvoyance"
 tkachuk.0.b: "Murmurer au Voile de l'Accord"
 tkachuk.0.c: "Invoquer le Présage Cramoisi"

 adm_prophecy_1: "Trame Dorée"
 adm_prophecy_1_desc: "Je vois devant moi une tapisserie dorée, sans défaut, sans nœud ni imperfection. Chaque fil de votre vie trouvera sa place, chaque chemin sera rendu droit. Là où d'autres hésitent, vous marcherez avec certitude. Les destins de beaucoup afflueront vers vous comme des rivières vers la mer. Dans ce grand ordre, la prospérité fleurira."
 adm_prophecy_2: "Lumière Paisible"
 adm_prophecy_2_desc: "Une lumière douce perce les nuages, tendre, sans ombre. Votre peuple trouvera la paix, et la terre livrera ses fruits sans conflit. Nul tonnerre, nulle tempête, seulement la croissance, régulière et sûre, comme la course du soleil à travers le ciel."
 adm_prophecy_3: "Demeure sur Sol Ferme"
 adm_prophecy_3_desc: "Je vous vois au seuil d'une demeure où tout est à sa juste place. Votre volonté ne sera point imposée, mais accueillie. Bien qu'humble au commencement, cette demeure deviendra forteresse, chaque pierre scellée par la confiance."
 adm_prophecy_4: "Poussière et Fil"
 adm_prophecy_4_desc: "Votre destin n'est point encore tissé, mais le métier est prêt. Beaucoup dépend de votre main et de la patience avec laquelle vous tisserez. Je vois le premier fil, délicat, mais inflexible."
 adm_prophecy_5: "Enchevêtrement de l'Oubli"
 adm_prophecy_5_desc: "Un autre a tissé avant vous, et les fils sont emmêlés. Cette prophétie ne parle point de ruine, mais de confusion. Un piège se cache, non par malice mais par faux pas. Même les élus ne sont pas épargnés par le poids de ce qui fut perdu."

 dip_prophecy_1: "Langue d'Argent"
 dip_prophecy_1_desc: "Votre voix coule aussi aisément que l'eau à midi. Les rois écoutent, les orgueilleux inclinent la tête. Les liens se renforcent, et la loyauté afflue vers vous comme la marée attirée par la lune. Votre pouvoir ne réside point dans l'épée, mais dans la parole."
 dip_prophecy_2: "Chaînes de Soie"
 dip_prophecy_2_desc: "Je vois bannières et voiles flottant en loyauté. Vous ne commandez point, ils suivent. Alliés et vassaux trouveront leur ancre en vous, et votre main s'étendra loin, non par la force, mais par une majesté discrète."
 dip_prophecy_3: "Murmure d'Accord"
 dip_prophecy_3_desc: "Dans des salles obscures et secrètes, des accords se forment sans besoin de paroles. Votre pouvoir ne brille point mais s'accroche comme le lierre à la pierre ancienne. Lentement et sûrement, la colline devient vôtre."
 dip_prophecy_4: "Fils Convergents"
 dip_prophecy_4_desc: "De nombreuses bannières se rassemblent, liées non par la loi, mais par le destin. Leur force deviendra la vôtre, non par les ordres, mais par l'unité. Une convergence silencieuse, inévitable et profonde."
 dip_prophecy_5: "La Parole Brisée"
 dip_prophecy_5_desc: "Le fil se rompt, une promesse oubliée ou dénaturée. Là où jadis votre voix inspirait, elle sème désormais le doute. Prenez garde : même l'argent se ternit lorsqu'il se reflète dans des yeux méfiants."

 mil_prophecy_1: "L'Étendard Ardent"
 mil_prophecy_1_desc: "Je vois une bannière ceinte de flammes, portée haut au-dessus d'une armée qui ne faiblit point. Là où marchent vos armées, la peur prend racine et le courage défaille. Votre volonté frappera comme le tonnerre, prompte et sûre, et nul ne se dressera devant elle."
 mil_prophecy_2: "La Marée de Fer"
 mil_prophecy_2_desc: "Une marée d'acier avance sous un ciel rouge sang. Bien que le feu faiblisse, ses braises brûlent avec constance. Vos guerriers ne connaissent point la retraite, et votre nom se répand comme la fumée avant la bataille. Vous n'êtes point la tempête : vous en êtes l'écho."
 mil_prophecy_3: "Échos de l'Épée"
 mil_prophecy_3_desc: "Le fracas des lames s'éloigne, mais le souvenir demeure. Vos soldats marchent par devoir, non par le feu. Le tranchant s'émousse, mais la main reste ferme. Ce qui fut jadis fureur devient résolution."
 mil_prophecy_4: "Cendres dans le Vent"
 mil_prophecy_4_desc: "Le feu est passé, ne laissant que cendres et bannières fanées. Mais même maintenant, la discipline tient : le tambour bat encore, faible mais ininterrompu. Si la force s'en est allée, la structure demeure."
 mil_prophecy_5: "Le Heaume Vide"
 mil_prophecy_5_desc: "Je vois un heaume sans guerrier, la forme sans la force. La puissance jadis promise se retourne maintenant contre vous, comme la flamme dévore la main qui la portait. Prenez garde : une couronne de fer n'apporte nulle victoire si le cœur qu'elle coiffe a failli."

 tkach_title: "Invoquer la Tisseuse de Destin"
 tkach_desc: "Dans les profondeurs sous les pierres de Korrimutren repose le sanctuaire de Kanelethiel la Tisseuse de Destin, suspendue dans une antique relique Précurseur. En offrant un sacrifice digne, notre souverain peut communier avec sa présence persistante et recevoir une vision de son chemin destiné.\n\nSeuls ceux que le destin n'a point encore touchés peuvent oser le chercher. Prenez garde : la connaissance du destin n'est point sans prix."

 unlock_merc_mavik_tt: "Débloque la compagnie de mercenaires §YVétérans du Mavihanavao§! au recrutement"
 up_merc_mavik_tt: "Améliore la compagnie de mercenaires §YVétérans du Mavihanavao§!"
 has_unlocked_merc_mavik: "A débloqué la compagnie de mercenaires §YVétérans du Mavihanavao§!."
