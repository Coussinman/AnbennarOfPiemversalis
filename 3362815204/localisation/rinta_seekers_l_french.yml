 rinta_seeker_events.305.t: "Événement d'ouverture"
 rinta_seeker_events.305.desc: "Les Adeen, les soldats esclaves appartenant à l'État des Baashidi qui servent comme artilleurs et marines de leurs armées, ont gagné en influence alors que les forces armées des États Baashidi ont commencé à se moderniser. Ils ont atteint un niveau d'influence où ils réfléchissent à leur place en tant que groupe significatif au sein de la société Baashidi, et il incombe à l'État de médier cette transition. Une période tumultueuse attend les Baashidi, car pour une faction aussi militarisée que les Adeen, une telle négociation sera certainement violente."
 rinta_seeker_events.305.a: "Ils trouveront leur place ou y seront forcés."

 rinta_seeker_events.306.t: "Mages Adeen"
 rinta_seeker_events.306.desc: "Les Adeen possédant des capacités magiques sont une irrégularité, et il n'y a pas de précédent établi sur la façon dont ils devraient être gérés. Sous le statu quo, les Adeen doués de magie restent propriété de l'État, et l'usage de leur magie est géré au cas par cas. Leurs capacités ne sont généralement mises à profit qu'en temps de guerre, et tout mage Adeen qui semble dangereusement puissant est rapidement éliminé. Maintenir cette position, cependant, ne ferait qu'augmenter les tensions avec les Adeen, surtout les mages potentiellement puissants cachés parmi leurs rangs, tout en aliénant nos guildes de Mages, qui convoitent cette source de talent potentiel. Alternativement, leur propriété pourrait être transférée directement aux guildes, leur donnant plus de pouvoir et les apaisant, mais encore une fois mettant les Adeen en colère. Enfin, ces Adeen doués pourraient être affranchis purement et simplement, afin de choisir librement leurs chemins en tant qu'individus éclairés."
 rinta_seeker_events.306.a: "Ces Adeen magiquement doués sont toujours les serviteurs de l'État."
 rinta_seeker_events.306.b: "Ils sont sous la juridiction de la Maison de l'Exorcisme."
 rinta_seeker_events.306.c: "Ils devraient être libres d'utiliser leurs capacités dans la quête de la vérité."

 rinta_seeker_events.307.t: "Foi des Adeen"
 rinta_seeker_events.307.desc: "Il n'y a pas de perspective religieuse standard parmi les Adeen, avec certaines de leurs factions internes adoptant une Vision du Savoir beaucoup plus étroite ou plus large que la société en général, et beaucoup parmi leurs rangs pratiquent encore des éléments de leurs croyances natives. Nos Mwalim et Darwiiz sont tous deux intéressés à guider les Adeen vers l'illumination par la connaissance, et des membres des deux groupes ont établi des cercles d'étude, des groupes rituels, et de forts suivis personnels parmi différentes factions des Adeen. Pourtant maintenant un conflit ouvert a éclaté parmi les Adeen sur la question, diminuant sérieusement leur utilité en tant que force de combat unifiée. Les Adeen croient généralement qu'ils ont le droit de régler la question entre eux, mais des Mwalim influents croient que l'État devrait intervenir en leur nom, tandis que leurs homologues Darwiiz s'opposent à une restriction du droit de l'individu à chercher la vérité par lui-même, qu'il soit Adeen ou non. Ils affirment plutôt que si nous leur permettons de prêcher librement parmi les Adeen, les soldats deviendront des guerriers zélés inspirés par leur foi."
 rinta_seeker_events.307.a: "Laisser la question aux Adeen eux-mêmes."
 rinta_seeker_events.307.b: "Imposer l'unité de perspective."
 rinta_seeker_events.307.c: "Sanctionner les activités des Darwiiz."

 rinta_seeker_events.308.t: "Richesse des Adeen"
 rinta_seeker_events.308.desc: "Dans de nombreux cas, les Adeen ont pu tirer parti de leurs compétences pour s'engager dans une sorte d'activité économique lorsqu'ils ne sont pas en service actif. Bien que leur emploi soit généralement à petite échelle, comme vendeurs ou petits commerçants, certains Adeen ont réussi à amasser une richesse significative. Ces Adeen riches préfèrent embaucher au sein de leurs propres rangs, surtout ceux qui partagent leur ascendance, une pratique qui a rendu nos marchands Baashidi de plus en plus agités. Ils affirment que les esclaves ne devraient même pas pouvoir détenir une telle richesse personnelle, et que la capacité des Adeen à le faire nuit à leurs positions traditionnelles sur nos marchés. Certains ont même affirmé que des Adeen riches ont utilisé leurs employés comme exécuteurs armés pour entraver violemment l'activité des marchands libres."
 rinta_seeker_events.308.a: "Confisquer la richesse des Adeen et fermer leurs entreprises !"
 rinta_seeker_events.308.b: "Interdire aux Adeen d'embaucher d'autres Adeen, mais leur permettre de continuer à opérer."
 rinta_seeker_events.308.c: "Permettre aux Adeen de continuer sans restriction."

 rinta_seeker_events.309.t: "Terres des Adeen"
 rinta_seeker_events.309.desc: "Traditionnellement, si les Adeen ont eu droit à des terres, c'était sous la forme de Halqa, des rassemblements communautaires autonomes sur des terres contrôlées par leur propriétaire, la couronne. Des Adeen vétérans, atteignant la fin de leur aptitude au service militaire actif, ont soumis une pétition à la couronne pour qu'ils reçoivent des terres une fois atteint un point avancé de leur carrière, afin qu'ils puissent se préparer eux et leurs familles pour leur retraite du service. Notre noblesse s'est immédiatement et vigoureusement opposée à un tel système, affirmant qu'il établirait une nouvelle classe héréditaire de propriétaires terriens qui bouleverserait totalement la hiérarchie traditionnelle."
 rinta_seeker_events.309.a: "Refuser, mais mettre de côté des fonds supplémentaires pour la retraite des Adeen."
 rinta_seeker_events.309.b: "Accepter, mais seulement pour des concessions foncières temporaires non héréditaires."
 rinta_seeker_events.309.c: "Accepter, les Adeen qui ont servi longtemps et bien gagneront des terres."
 rinta_seeker_events.309.d: "Refuser catégoriquement, les privilèges de la noblesse seront respectés."

 rinta_seeker_events.310.t: "Les Adeen demandent l'autonomie à Bada Bilad"
 rinta_seeker_events.310.desc: "Malgré la définition d'une politique plus claire concernant les Adeen dans notre pays, les tensions entre eux et entre eux et les autres classes sociales de notre royaume continuent de s'enflammer en conflits violents. Il semble que chaque jour de nouvelles querelles soient portées à la cour pour arbitrage : litiges fonciers, désaccords commerciaux, controverses religieuses, et simples altercations violentes. Une faction dirigeante au sein des Adeen a apporté au $MONARCHTITLE$ une solution radicale : accorder à nos Adeen une mesure d'auto-gouvernance sur l'île de Bada Bilad. Ils promettent de continuer à servir loyalement dans nos armées, et d'être éternellement reconnaissants pour l'opportunité de s'administrer eux-mêmes sous notre règne bienveillant. D'autres conseillers s'empressent cependant de s'opposer, affirmant que les Adeen devraient plutôt être liés plus étroitement à la main ferme de l'État, et que leur accorder une quelconque mesure d'autonomie bouleverserait inévitablement leur longue tradition de servitude. Les Adeen sont résolus, déclarant que leur offre de compromis est finale, et si elle est refusée, nos Adeen pourraient se soulever dans leur ensemble contre nous."
 rinta_seeker_events.310.a: "Leur accorder cette faveur, cela apaisera les tensions et assurera leur loyauté future."
 rinta_seeker_events.310.b: "Refuser l'offre des Adeen, ce sont des esclaves et ils resteront des esclaves."
 rinta_seeker_events.310.c: "Diriger leur révolution pour la dignité et l'autonomie !"

 rinta_seeker_events.311.t: "Les Adeen de Bada Bilad demandent de l'aide"
 rinta_seeker_events.311.desc: "Les Adeen de Maakhibkhii ont demandé notre soutien ! Ils se sont rebellés contre leurs anciens maîtres, cherchant à établir leur propre société libre sur l'île de Bada Bilad. Aider leur cause nous débarrasserait certainement de nos propres problèmes avec nos Adeen, et leurs émissaires ont promis d'assurer la loyauté future de nos Adeen s'ils sont victorieux."
 rinta_seeker_events.311.a: "Nous les aiderons dans leur révolte."
 rinta_seeker_events.311.b: "Leur cause ne nous intéresse pas."
 rinta_seeker_events.311.c: "Cette braise de rébellion doit être étouffée avant qu'elle ne devienne un brasier."

 rinta_seeker_events.312.t: "Fin de la crise des Adeen (Victoire de l'indépendance)"
 rinta_seeker_events.312.desc: "Rarement les rébellions évitent l'échec. Plus rarement encore assurent-elles un changement positif et durable pour ceux au nom desquels elles sont lancées. Mais aujourd'hui les Adeen de Maakhibkhii se tiennent fiers et victorieux, ayant enfin regagné une certaine mesure de contrôle sur leur propre destin. Leurs parents encore tenus en servitude à travers les États Baashidi ne jouissent peut-être pas de la même liberté qu'eux maintenant, mais leur royaume insulaire deviendra un phare brillant pour tous les Adeen, offrant un aperçu d'un avenir plus radieux. Il est certainement vrai que la vague actuelle d'agitation des Adeen s'est apaisée avec la sécession de Maakhibkhii, et un sentiment de normalité est revenu à la société Baashidi, du moins pour l'instant."
 rinta_seeker_events.312.a: "Écrivons maintenant notre propre histoire."
 rinta_seeker_events.312.b: "Nos Adeen seront reconnaissants du rôle que nous avons joué."
 rinta_seeker_events.312.c: "Ces esclaves insolents connaîtront à nouveau leur place, mais pas encore."
 rinta_seeker_events.312.d: "Une conclusion intéressante à ce chapitre tumultueux."

 rinta_seeker_events.313.t: "Fin de la crise des Adeen (Victoire du suzerain)"
 rinta_seeker_events.313.desc: "Une plume est posée sur le papier, des mains sont serrées, des déclarations faites. Avec cela, les avenirs d'innombrables vies sont relégués à une dégradation ignominieuse. Un avenir où ces soldats-esclaves pourraient vivre avec au moins un minimum de liberté a été brièvement entrevu, mais il s'est évanoui dans l'obscurité avec l'échec de la sécession de Maakhibkhii. Ces Adeen qui ont mené la rébellion, s'ils n'ont pas été tués dans les combats, ont servi d'exemples, afin que leurs compatriotes n'oublient plus jamais leur place. Avec l'effondrement de Maakhibkhii, la vague d'agitation des Adeen qui avait envahi la société Baashidi a également pris fin, ses dernières onces d'énergie dépensées dans les soubresauts frénétiques d'un rêve impossible."
 rinta_seeker_events.313.a: "Hélas, nos efforts pour attiser leur flamme furent vains."
 rinta_seeker_events.313.b: "Enfin, nous pouvons mettre fin à ce sordide chapitre de chaos."
 rinta_seeker_events.313.c: "Nos propres Adeen savent maintenant mieux que d'imiter leurs cousins."

 rinta_seeker_events.315.t: "Œil Spirale Céleste"
 rinta_seeker_events.315.desc: "Les Ilmada sont les yeux les plus puissants de l'histoire, dit-on offerts directement par les génies aux clans humains pour leur service envers leurs domaines. Ilmada signifie lui-même « Œil d'Honneur », avec son occurrence si rare que ses porteurs sont enregistrés avec une révérence presque divine dans l'histoire.\n Le dernier porteur connu d'un Ilmada était Nasiiye, un grand mage aux yeux d'un violet profond, spiralant vers des pupilles jaunes. Avec ces yeux, il voyait le passé, le présent et l'avenir. Il prédisait des jours meilleurs si seulement les gens suivaient son regard. Ceux qui choisirent de le rejoindre furent appelés ses Abshirites. Le peuple le voyait comme un héros du destin, portant la bannière des pauvres et des riches. Seuls les esprits étroits des érudits de Baddabi parlèrent contre sa parole, et finirent par escalader dramatiquement les tensions couvantes en le faisant exécuter lors de son pèlerinage vers la ville de Qasri Aqoon. Ses yeux furent perdus ce jour-là, supposés être gardés par les rois de Baddabi comme un trésor d'un triomphe creux.\n Les Abshirites se retrouvèrent finalement soumis comme esclaves, punis pour avoir répandu leur parole de paix à des oreilles souillées sourdes à leur message, tout cela dans l'espoir qu'ils pourraient encore atteindre la tranquillité de leur vivant. De ces Abshirites asservis, les Adeen se sont coalisés, avec des anciens enseignant secrètement aux nouveaux venus dans leurs rangs la doctrine Abshirite de plus en plus déformée et l'objectif ultime : Une société vraiment égale se rassemblant à Bada Bilad, tous coulant ensemble vers la tranquillité.\n La main sinistre du destin tisse un grand règlement de comptes, une tempête parfaite. Nasiiye a peut-être prévu tout cela, ou peut-être était-ce vraiment juste la conséquence inévitable de l'avidité et de la cruauté mortelles.\n À la fin, importe-t-il d'où il venait, ou de qui il est né ? Ces choses n'ont jamais semblé importer aux foules à qui il parlait. Peut-être que ce bouleversement est là où tout a mené.\n Car enfin, un nouveau prophète nous est né. Béni de ces yeux spirales sacrés, pupilles jaunes au centre, tombant toujours vers la singularité.\nIl sauvera les pauvres, et sauvera les riches. Néanmoins, la tranquillité aura un prix élevé pour tous ; mais à la fin, tout cela en vaudra la peine.\n Il a vu le passé, le présent et l'avenir - notre route est claire.\n « Isha… vous pouvez m'appeler Isha. C'est le nom qui m'a été donné par mes ravisseurs. Avec le temps, il deviendra le nom du salut. »"
 rinta_seeker_events.315.a: "« C'est dans ces yeux… Je le sais. »"

 rinta_seeker_events.351.t: "Escarmouche factionnelle"
 rinta_seeker_events.351.desc: "Bien que les Adeen soient unis dans leur désir d'une plus grande reconnaissance au sein de la société, beaucoup dans leurs rangs divers sont divisés sur la façon d'atteindre cet objectif. Certains adoptent une position plus radicale tandis que d'autres croient en un pragmatisme graduel, et certains ne défendent que leur groupe ethnique aux dépens de tous les autres. Ces motivations multiples mènent souvent au conflit, et le conflit au sein d'une force de combat professionnalisée tourne souvent à la violence. Des escarmouches entre deux factions concurrentes sont devenues violentes dans $PROVINCE$, nécessitant une réponse officielle."
 rinta_seeker_events.351.a: "Envoyer les réguliers pour rétablir l'ordre."
 rinta_seeker_events.351.b: "Laisser chaque camp s'épuiser."

 rinta_seeker_events.352.t: "Officier assassiné"
 rinta_seeker_events.352.desc: "Des Adeen radicaux semblent avoir assassiné un officier noble de la Maison de la Puissance, affirmant leur propre prééminence dans les affaires militaires, et mettant notre noblesse en fureur. Ils demandent une enquête approfondie sur la question, pour trouver le tueur et le traduire en justice, ou au moins faire un exemple de quelqu'un pour discipliner les soldats esclaves indisciplinés. Faire cela mettrait certainement les Adeen en colère, mais laisser tomber l'affaire ne ferait qu'enflammer davantage nos nobles."
 rinta_seeker_events.352.a: "Mener une enquête impitoyable et imposer la discipline."
 rinta_seeker_events.352.b: "Éviter de remuer le pot, la noblesse devra s'en remettre, éventuellement."

 rinta_seeker_events.353.t: "Refus de s'entraîner"
 rinta_seeker_events.353.desc: "Des rapports de nos casernes et forts ont atteint la cour parlant d'une unité d'Adeen refusant catégoriquement de s'entraîner ou d'accomplir leurs devoirs, tout en posant des exigences pour être traités avec la dignité accordée aux soldats réguliers. Les officiers locaux se sont trouvés impuissants à mettre fin à ces sottises, les mutins restant fermes face à la punition normale. Ils se tournent vers la couronne pour direction, de peur que la situation ne se transforme en une révolte à part entière."
 rinta_seeker_events.353.a: "Exécuter les meneurs, et remettre leurs suiveurs au pas à coups de fouet."
 rinta_seeker_events.353.b: "Accepter quelques demandes mineures, et redistribuer les affectations pour briser le groupe."

 rinta_seeker_events.354.t: "Sécession locale"
 rinta_seeker_events.354.desc: "Un petit groupe d'Adeen s'est retiré dans leur Halqa, refusant catégoriquement de reconnaître toute souveraineté ou autorité extérieure sur les leurs. Une telle pratique est généralement réservée aux protestations dans des affaires graves d'irrespect, comme le meurtre de l'un des leurs par un propriétaire. Dans ce cas cependant, ils affirment répondre à des transgressions commises contre l'ensemble des Adeen, et au manque persistant d'autonomie malgré leur service loyal. Ils exigent une reconnaissance de leurs demandes justifiées et un statut approprié à leur influence. Nous pouvons essayer d'ignorer ce groupe, espérant que leur acte reste isolé, ou l'étouffer dans l'œuf avant que leur action ne se répande."
 rinta_seeker_events.354.a: "Prendre d'assaut le campement et le brûler."
 rinta_seeker_events.354.b: "Permettre cela tant que les tensions sont élevées."

 rinta_seeker_events.355.t: "Les Radicaux prennent les armes"
 rinta_seeker_events.355.desc: "Un groupe d'Adeen furieux a porté leurs demandes de reconnaissance et de respect en tant que partie vitale de la société Baashidi dans la rue, prenant les armes et déclarant la révolte contre l'autorité de notre souverain !"
 rinta_seeker_events.355.a: "Cela ne peut être autorisé à se répandre. Abattez ces radicaux immédiatement !"

