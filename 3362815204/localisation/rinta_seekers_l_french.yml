 rinta_seeker_events.200.t: "Caché"
 rinta_seeker_events.200.desc: "Ne regardez pas"
 rinta_seeker_events.200.a: "Nooon"

 rinta_seeker_events.201.t: "Redécouverte du Viscus"
 rinta_seeker_events.201.desc: "Il y a plus de mille ans, Almadhab le Doré et Alahmar le Rouge se rebellèrent contre leur mère, Ardimya la Grande. Les deux sang-mêlés savaient qu'ils ne pouvaient pas résister à la force illimitée d'un génie pur, qu'ils seraient écrasés pour leur simple incapacité à être nés de sang pur. C'était le prix d'avoir un père humain, après tout.\n\nAinsi, pour égaliser les chances, ils décidèrent de plonger profondément dans les arts sombres : de la nécromancie aux proportions inconcevables. Ils teignirent les dunes du désert en rouge avec des sacrifices à l'occulte pendant une grande période, tout cela dans l'espoir de forger une arme assez grande pour détruire ce qu'ils méprisaient.\n\nFinalement, ils réussirent à créer le Viscus du Désert : un marteau et un clou imprégnés d'une énergie si profondément hostile à la vie que le simple fait de frapper le marteau sur le clou dans la surface de la terre brisait les frontières entre l'enfer et la terre. Leur échec fut dans le maniement : ils furent immédiatement plongés dans cette fissure de leur propre création, bannis de notre royaume. Bien qu'Ardimya ait réussi à contenir la brèche de la réalité à l'époque, quand elle se dissipa, elle fut laissée à s'envenimer. Qeyikul vint bientôt ravager Ardimya, échangeant foyers et vies contre sang et carnage.\n\nAujourd'hui, nous pourrions peut-être réparer l'erreur de ces parents, en faisant ce qu'ils n'ont pas pu. Nous étudierons les outils qu'ils ont faits et apprendrons à les utiliser correctement. Ces magies ne sont pas à prendre à la légère, souillées d'impureté et de haine pour les vivants, mais elles peuvent être maîtrisées. Nous fermerons la brèche pour de bon, et sauverons le Jasiir Doog."
 rinta_seeker_events.201.a: "Nous sauverons Ardimya."

 rinta_seeker_events.202.t: "Le Retour de la Conférence des Mages"
 rinta_seeker_events.202.desc: "Des conversations sombres et des murmures de confusion résonnaient dans les grandes salles du Kaniisad à Qasri Aqoon. Les Mwalim et les Darwiiz se demandaient pourquoi ils avaient été convoqués, avec la promesse d'une « révélation ».\n\nLeurs inquiétudes furent apaisées dès que le Grand Mwalim Yableh dégaina le Viscus, faisant surgir une puissance si profonde, si immense que sa présence fit frissonner même les plus sages des Mages.\n\nLes sujets de conversation se tournèrent immédiatement vers une idée : Pouvons-nous maintenant fermer le maudit gouffre au milieu du Jasir Doog ? Pouvons-nous sauver Ardimya ?\n\n« Nous ne savons pas comment nous pouvons, ou SI nous pouvons… mais s'il n'y avait pas une chance de faire honneur à nos ancêtres, je ne vous aurais pas convoqués ici. Si nous surmontons les rivalités amères et les désaccords mesquins, nous pouvons restaurer le Jasiir Doog à sa gloire passée. Nous serons débarrassés des Qeyikul. »\n\nDes acclamations sur les perspectives de gloire et la fin du mal éclatèrent dans la salle. Les gens seraient sauvés. Les gens seraient libres."
 rinta_seeker_events.202.a: "Maintenant, commençons."
 rinta_seeker_events.202_tt: "Un nouveau mage chaque jour aura la possibilité de manier la relique. Pendant qu'ils étudient la relique, assurez-vous de gérer votre utilisation. Si vous ne pouvez pas faire preuve de retenue, attendez-vous à de graves conséquences."

 rinta_seeker_events.203.t: "Stocker le mal"
 rinta_seeker_events.203.desc: "Le confinement d'une relique aussi puissante que le Viscus du Désert semble de plus en plus impossible. Ses effets sur l'environnement et les gens autour se sont avérés… négatifs… c'est le moins qu'on puisse dire. La Conférence des Mages a proposé de multiples solutions au cours de l'année passée pour tenter de trouver comment empêcher les effets du Viscus de se propager.\n\nToutes se sont avérées futiles. Une seule des quelques solutions proposées restantes a attiré l'attention de nombreux mages encore disposés à poursuivre le stockage de la relique :\n\n« Un contre-sort géant. »\n\nLes Grands Mwalim présents ont tous froncé les sourcils aux paroles du jeune Darwiiz Angad. Le doute s'est répandu dans la salle au début, mais certains ont considéré l'idée, et ont finalement accepté : C'était probablement la meilleure solution. L'opposition a affirmé que cela ruinerait l'environnement où elle serait stockée, tout comme à Kafwah, tout comme à Mashan, tout comme à Daroor. Angad a parlé à nouveau :\n\n« Personne ne peut vraiment savoir ce qui se passera tant que le sort ne tombera pas, et même alors, nous pouvons avoir autant de temps que nécessaire pour nous y préparer. Gardez-le dans une boîte, au-dessus des sables, et faites maintenir le sort jusqu'à ce que nous devions le transporter à nouveau. »"
 rinta_seeker_events.203.a: "Scellez-le"
 rinta_seeker_events.203.b: "ba"

 rinta_seeker_events.204.t: "La Fin de la relique"
 rinta_seeker_events.204.desc: "Il y a dix ans, des démons ont brûlé les terres des anciens empires d'Ardimya. Une terre détruite par dépit. Une guerre laide avec des conséquences supportées par des descendants non impliqués. Quel genre de conte insensé est-ce là ?\n\nQuelqu'un doit en écrire la fin.\n\nAlors que la fin approche, et que les magies noires ont été complètement étudiées, la coalition de mages se sent prête à mettre fin au cauchemar, et à sauver Ardimya.\n\nLes caravanes marchent…\n\nmarchent…\n\nLes jours finissent… cloches et glas du massacre.\n\nmarchent…\n\nLes jours commencent… cloches et glas du massacre.\n\nAprès tant de sacrifice, la fin de nombreux démons, la perte de nombre de nos amis, les mages commencent leur rituel…"
 rinta_seeker_events.204.a: "Ce qui vient ensuite changera le destin."

 rinta_seeker_events.205.t: "Ardimya sauvée"
 rinta_seeker_events.205.desc: "« Qu'en pensez-vous ? » demande la Mwalim Sana à une mère Wattoi.\n\n« En tant que femme vous-même, je pense que vous comprendrez mieux si je le mets ainsi : Je n'aurais pas vécu une année de plus. Je n'aurais pas pu m'occuper de mes enfants. Je n'aurais pas pu vieillir et regarder ma famille. Je ne sais pas me battre. Je sais fouiller, bien sûr… mais ces démons ont… AVAIENT… un fort sens de la vie. Ils savaient que vous étiez là. Ils savaient où vous n'étiez pas. Fouiller ne signifie rien si vous ne pouvez pas vous battre. Ceux qui le pouvaient vivaient à peine plus longtemps que moi. »\n\nElle se tourna vers son mari, « Quel âge ai-je ? »\n\n« Je pense que tu es là depuis que le sombre Jalaal est mort. »\n\n« Vingt-six ans alors. Pouvez-vous imaginer cela ? » Elle se tourne vers Sana. « Je préparais mes funérailles, ou ce qui arriverait quand je mourrais. Je dois maintenant faire face à la découverte de ce que signifie vieillir. »\n\nLa femme offre un sourire sincère. Une larme roule sur sa joue.\n\n« Merci. Merci cent fois, non, mille fois. Je suis sûre que tout le monde ici vous dira la même chose. Vous avez sauvé nos terres. Votre générosité ne sera jamais oubliée. »\n\nElle tapote la tempe de sa tête.\n\n« Nous nous souvenons. Nous avons gardé nos traditions et cultures vivantes malgré tout ce qui s'est passé. Nous nous souviendrons. Nous le ferons. »\n\nSana sourit…"
 rinta_seeker_events.205.a: "Nous vivons pour servir."

 rinta_seeker_events.206.t: "Le Retour d'Almadhab"
 rinta_seeker_events.206.desc: "Tout n'est qu'une farce. L'espoir était un mensonge. La magie et la sagesse de la relique étaient une vérité mal comprise. En fin de compte, tout cela s'est retourné contre le Conseil des Mages.\n\nCe que nous avons appris, ou ce que nous avons FAIT, selon ce que quelques Wattoi ont décrit, était un rituel : non pas pour fermer le trou, mais pour ressusciter quelqu'un de là.\n\nIls parlaient comme des pécheurs qui avaient vu Dieu face à face :\n\n« Il sentait le soufre, un trou béant dans sa poitrine. »\n\n« À quoi pensaient-ils… ils nous avaient promis mieux… »\n\nUn homme tremblait dans le coin ; une femme criait, le visage brûlé :\n\n« Il parlait d'un ton que je ne peux même pas décrire. Comment menace-t-on quelqu'un avec une voix si apaisante ? »\n\nLe chef de clan des Wattoi fixait au loin intensément. Lui aussi avait abandonné le camp, laissant quelqu'un d'autre diriger le reste des Wattoi.\n\n« Il est revenu, et il m'a dit de dire aux dirigeants du monde : Soumettez-vous, ou faites face à l'exécution. »\n\nBrutalement simple, brutalement honnête, brutalement vrai.\n\nÀ la fin, Almadhab l'aura probablement aussi."
 rinta_seeker_events.206.a: "Viens donc, Seigneur de l'Enfer."
 rinta_seeker_events.206.b: "Jouer Alefisol"

 rinta_seeker_events.207.t: "Nos ruines profanées"
 rinta_seeker_events.207.desc: "Tout n'est plus en ruines"
