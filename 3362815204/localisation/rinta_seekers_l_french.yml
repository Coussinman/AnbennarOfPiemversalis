 rinta_seeker_events.1.t:0 "Un Darwiiz errant"
 rinta_seeker_events.1.desc:0 "Un Darwiiz errant s'est présenté à la cour de [Root.Monarch.GetName]. Les Darwiiz, en tant que praticiens ruraux de la sorcellerie et de la canalisation, n'apparaissent pas souvent dans les cours royales et les villes de la haute société. Ce Darwiiz demande l'hospitalité, cherchant un endroit où séjourner. Il promet de récompenser l'hospitalité de [Root.Monarch.GetName] en canalisant ses magies pour apporter la prospérité au royaume de [Root.Monarch.GetName]. Si d'un côté les Darwiiz sont bien respectés parmi le peuple, dans les cours de la haute société leur conseil est souvent moins estimé que les idées d'un Mwalim. Au final, [Root.Monarch.GetName] décide de…"
 rinta_seeker_events.1.a:0 "Accorder l'hospitalité au Darwiiz à la cour"
 rinta_seeker_events.1.b:0 "Lui fournir un endroit où dormir en dehors de la cour"
 rinta_seeker_events.1.c:0 "Préparer un festin, prouvons notre foi en le Darwiiz !"
 rinta_seeker_events.1.d:0 "Faire bannir cet homme de notre cour !"

 rinta_seeker_events.2.t:0 "Le Concours de poésie"
 rinta_seeker_events.2.desc:0 "Dans le cadre d'un festival local mineur, un concours de poésie se tient à [Root.Capital.GetName], avec une multitude de participants talentueux. À chaque tour de la compétition, les participants ont été mis au défi de produire un vers sur différents aspects de notre religion, comme le premier Chercheur de Rinta Kabil Hadni ou certaines constellations, et le thème de la finale est les nombres sacrés. Il ne reste que deux finalistes, chacun ayant l'occasion de déclamer son vers devant la cour pour être jugé par le [Root.Monarch.GetTitle]. Le premier est un Mwalim érudit, vêtu de belles robes brodées de motifs géométriques complexes aux couleurs riches. Son vers est techniquement parfait : la somme totale des syllabes de chaque ligne créant une séquence complexe de nombres premiers et son contenu capturant avec justesse la signification de la numérologie dans de nombreuses facettes de la vie Baashidi. Le second concurrent est un Darwiiz modeste, pieds nus et vêtu de haillons. Le vers qu'il récite est simple dans sa beauté, exprimant une vérité transcendante reliant les nombres sacrés à la grandeur du monde naturel et de ses habitants. Les deux concurrents ayant terminé, il revient au [Root.Monarch.GetTitle] de décider du vainqueur."
 rinta_seeker_events.2.a:0 "Le poème du mystique illustre l'essence de notre foi"
 rinta_seeker_events.2.b:0 "Le poème de l'érudit est inégalé dans son excellence !"

 rinta_seeker_events.3.t:0 "Livres de sagesse"
 rinta_seeker_events.3.desc:0 "Lors d'une fouille archéologique récente, certains livres d'érudits anciens ont été trouvés en assez bon état. Le seul problème est qu'ils semblent avoir été placés là volontairement. Celui qui a abandonné les livres est également supposé être la raison pour laquelle les livres que nous avons trouvés avaient été recouverts de divagations insensées. En examinant les livres, il semble qu'ils pourraient encore être restaurés dans une certaine qualité cependant, car les textes écrits par ces érudits sont encore visibles. Nous pourrions prendre le temps de tenter de retirer l'encre, restaurant les manuscrits originaux dans la meilleure qualité possible, mais cela nous coûtera une bonne partie d'argent. Avec un peu de chance, les textes restaurés nous fourniront une connaissance plus large du monde."
 rinta_seeker_events.3.a:0 "Faisons-le !"
 rinta_seeker_events.3.b:0 "Non"

 rinta_seeker_events.20.t:0 "Le Conte de Nasiiye"
 rinta_seeker_events.20.desc:0 "Nasiiye du Divin était un prophète du 13ème siècle qui promouvait des idées de paix et de liberté pour les démunis, espérant une ère où la mort deviendrait un passé lointain. Il était peut-être mieux connu pour ses yeux violets, qui possédaient des pouvoirs mystiques incluant la vision du futur. Comme il était doué en magie, il utilisait ses pouvoirs pour aider ceux qui se remettaient des diverses guerres et sécheresses qui avaient ravagé son pays natal de Beeragga. Sa parole se répandit au loin, et on disait qu'une fois que Nasiiye traversait les frontières vers d'autres pays, la tranquillité arrivait à ses côtés. Cela fit malheureusement de lui une cible pour ceux qui combattaient dans les conflits, et ainsi, lorsqu'il fit une visite à Baddabi pour répandre sa parole, il fut assassiné. À ce jour, Nasiiye est resté populaire parmi le peuple, et ceux qui voient sa parole comme vérité trouvent attristant que [Root.Monarch.GetName] n'ait pas pris d'action pour rectifier les méfaits du passé et honorer Nasiiye comme représentant de l'idéologie mystique des Chercheurs de Rinta. Ils demandent que quelque chose soit fait pour honorer son héritage."
 rinta_seeker_events.20.a:0 "Fournir un temple en son honneur pour que le peuple puisse en profiter"
 rinta_seeker_events.20.b:0 "Construire une statue dans notre capitale pour que le peuple puisse en profiter"
 rinta_seeker_events.20.c:0 "Ne rien faire"

 rinta_seeker_events.21.t:0 "Esprits Premiers"
 rinta_seeker_events.21.desc:0 "Dans le Habab Zar, on croit que certains esprits, les Esprits Premiers, sont si puissants qu'ils reviennent dans notre monde après leur première vie, se liant à l'existence matérielle pour accomplir leurs agendas parfois ésotériques. Cette croyance a toujours été controversée pour les Chercheurs de Rinta, qui croient que les raffinés et les érudits échappent au monde physique pour toujours : la réincarnation de telles âmes savantes implique une ignorance troublante et un attachement retenu, ne correspondant pas aux grands sages de l'histoire. De tels conflits sont courants dans cette foi, car là où il y a des Chercheurs de Savoir, il y a aussi ceux qui tiennent fermement aux croyances du Habab Zar.\n\nRécemment, un noble très riche avec de nombreuses connexions à travers notre pays a péri. En raison de sa foi dans la religion Habab Zar, beaucoup l'ont appelé un Esprit Premier, et comme une âme forte et robuste. Cela a apporté le trouble à la communauté locale, car ceux qui suivent la foi des Chercheurs de Rinta considèrent cela comme un acte d'hérésie et de culte démoniaque. Ils exigent que la famille renonce à son statut d'Esprit Premier. Ils viennent maintenant à la salle royale pour laisser [Root.Monarch.GetName] mettre fin au débat une fois pour toutes. La famille supplie et implore que leur parent conserve un titre sacré pour eux, et offre une compensation monétaire.\n\nQue doit faire [Root.Monarch.GetName] ?"
 rinta_seeker_events.21.a:0 "Forcez-les à cesser d'utiliser de tels concepts hérétiques !"
 rinta_seeker_events.21.b:0 "Laissez-les faire ce qu'ils souhaitent"

 rinta_seeker_events.22.t:0 "Expédition de connaissance"
 rinta_seeker_events.22.desc:0 "Un petit groupe de Darwiiz a appelé à une expédition dans une partie non documentée de nos terres. Généralement, les Darwiiz voyageraient eux-mêmes avec une petite expédition, mais en cette occasion, les Darwiiz se trouvent dans le besoin d'un soutien du gouvernement en raison de la supposée dureté du terrain. Beaucoup considèrent cela comme une perte de temps, car on dit que la terre est non rentable, avec rien de plus que de la terre en dessous.\n\nLes Darwiiz restent pleins d'espoir, l'appelant « Une inquisition de l'esprit à travers la cartographie de nouvelles terres. »"
 rinta_seeker_events.22.a:0 "Financer l'expédition !"
 rinta_seeker_events.22.b:0 "Donnez-leur la part du lion !"
 rinta_seeker_events.22.c:0 "On pourrait en apprendre plus en restant chez nous"

 rinta_seeker_events.40.t:0 "Croyances halfelins"
 rinta_seeker_events.40.desc:0 "Les halfelins furent parmi les premiers peuples étrangers à adopter la foi des Chercheurs de Rinta dans leurs vies. Depuis lors, ils ont prospéré dans leurs études. Fait assez intéressant, les Vyzemby ont commencé à mélanger leur ancienne foi avec les croyances des Chercheurs de Rinta. Beaucoup considèrent cela injuste, tandis que d'autres sont intrigués et voient cela comme la façon Vyzemby d'étudier la connaissance. On dit à [Root.Monarch.GetName] qu'une décision est nécessaire pour s'assurer que ces légères tensions ne s'enveniment pas davantage."
 rinta_seeker_events.40.a:0 "Laissez-les tranquilles"
 rinta_seeker_events.40.b:0 "Ils sont égarés. Aidons-les."
 rinta_seeker_events.40.c:0 "Ils doivent apprendre à adopter nos façons d'apprendre"

 rinta_seeker_events.41.t:0 "Visiteurs à la cour"
 rinta_seeker_events.41.desc:0 "En se promenant dans les jardins du palais aujourd'hui, [Root.Monarch.GetName] tomba sur trois hommes assis à une table de jardin, absorbés dans une conversation sur la valeur de leurs religions respectives. Le premier essayait d'élucider les vertus de la Haute Philosophie, tandis qu'un autre décrivait le pouvoir d'un dieu vivant sous la forme du Khet, et le dernier expliquait la juste guidance de la Voie Transmutative. Le trio ne se disputait pas exactement, mais chacun tenait fermement à sa croyance en la véracité de suivre sa propre foi. [Root.Monarch.GetName] fit signe à ses conseillers de s'arrêter et d'écouter comment la conversation continua pendant plusieurs minutes avant de poursuivre leur chemin."
 rinta_seeker_events.41.a:0 "L'ordre décrit par la Haute Philosophie semble le plus harmonieux"
 rinta_seeker_events.41.b:0 "Le Khétiste présente un argument convaincant"
 rinta_seeker_events.41.c:0 "Le suiveur de la Voie Transmutative n'est certainement pas égaré"
 rinta_seeker_events.41.d:0 "Notre propre foi englobe toute la connaissance nécessaire pour connaître le monde"

 rinta_seeker_events.42.t:0 "Une Frénésie de danse"
 rinta_seeker_events.42.desc:0 "Des rapports ont atteint notre cour concernant un groupe de Darwiiz à [event_province.GetName] qui ont commencé à danser. Cela ne serait pas extraordinaire, n'était-ce le fait que la danse est particulièrement excentrique, et dure depuis plusieurs jours complets à ce stade. De nombreux citoyens locaux sont également devenus captivés, rejoignant la danse aux côtés des mystiques. C'est devenu un sujet de préoccupation, et plusieurs sont même tombés morts d'épuisement après leur danse continue."
 rinta_seeker_events.42.a:0 "Faire détenir les pratiquants par la garde locale"
 rinta_seeker_events.42.b:0 "Il n'est que juste de laisser la danse continuer"
 rinta_seeker_events.42.c:0 "Nous devons être témoins de cette bénédiction en personne !"

 rinta_seeker_events.43.t:0 "L'Orgueil de la connaissance"
 rinta_seeker_events.43.desc:0 "Récemment, un conseiller talentueux s'est fait remarquer à la cour, et a commencé à se vanter de ses accomplissements. Ce conseiller prétend être le plus sage dans une variété d'études, et espère utiliser ces compétences pour servir son peuple. Bien que de nombreux citoyens le trouvent être un gouverneur attrayant qui promet le changement, d'autres ne voient en lui qu'un homme arrogant avec peu pour prouver ses affirmations. Souvent, ceux qui souffrent d'arrogance et déforment la connaissance du monde sont forcés à l'exil, lourdement amendés, ou même reçoivent un châtiment physique. Malgré leur orgueil, ce conseiller semble montrer un talent latent pour certaines tâches à la cour. Peut-être que son ego peut être tourné vers quelque chose de plus utile ?"
 rinta_seeker_events.43.a:0 "Gardons-le, il est trop utile, défauts mis à part."
 rinta_seeker_events.43.b:0 "C'en est assez !"

 rinta_seeker_events.60.t:0 "Conflit dans les rues"
 rinta_seeker_events.60.desc:0 "Dans un pays où Mwalim et Darwiiz sont censés œuvrer en tandem, il n'est que naturel que nombre de leurs idéaux opposés entrent en conflit. Un épisode indigne a rendu cela clair ces derniers jours, avec des Darwiiz et des Mwalim se lançant dans des disputes parfois presque physiques dans la rue au sujet d'un débat actuel d'une controverse inhabituelle. De nombreux citoyens ont été témoins du manque de professionnalisme des supposés plus grands esprits du pays, et sont profondément déçus. Nous devons agir pour nous assurer que cela ne se reproduise pas."
 rinta_seeker_events.60.a:0 "Favoriser les Mwalim"
 rinta_seeker_events.60.b:0 "Ne prendre aucun parti"
 rinta_seeker_events.60.c:0 "Favoriser les Darwiiz"

 rinta_seeker_events.61.t:0 "Érudits divisés"
 rinta_seeker_events.61.desc:0 "Il n'est pas fréquent que des cercles de Mwalim ressentent le besoin de solliciter un dirigeant séculier pour leur avis sur une question de pratique religieuse, car ils règlent généralement les débats au sein de leurs propres associations savantes. Cependant, la communauté résidente de Mwalim dans notre capitale est arrivée à un désaccord sur la pratique religieuse appropriée qui semble si insoluble qu'ils ont sollicité l'opinion du souverain comme source ultime de la loi dans le royaume. Lorsque le sujet du débat est présenté au [Root.Monarch.GetTitle], il est impossiblement ésotérique et théorique, laissant la plupart de la cour entièrement perplexe. À la fin de tout cela, les deux camps regardent le [Root.Monarch.GetTitle] avec attente..."
 rinta_seeker_events.61.a:0 "Ils nous font perdre notre temps en venant ici avec ces sottises !"
 rinta_seeker_events.61.b:0 "Payer pour qu'ils rencontrent d'autres érudits régionaux pour résoudre le débat"
 rinta_seeker_events.61.c:0 "S'en remettre à votre conseiller sur le sujet"
 rinta_seeker_events.61.d:0 "Expliquer une raison profonde pour laquelle un camp a raison"

 rinta_seeker_events.62.t:0 "Contemplation des étoiles"
 rinta_seeker_events.62.desc:0 "Tard hier soir, le [Root.Monarch.GetTitle] s'est retrouvé à contempler les étoiles, réfléchissant à la configuration des constellations du ciel, quand il fut soudainement frappé par la réalisation d'un motif complexe caché au plus profond des positions des étoiles. Il se précipita pour esquisser une copie du motif afin de pouvoir examiner de plus près sa signification mais, après une nuit d'étude frénétique, ne put rien déchiffrer de notable. À cela, l'intendant de la cour proposa de convoquer un individu érudit qui serait en mesure de fournir une perspective alternative."
 rinta_seeker_events.62.a:0 "Amenez-moi le Mwalim le plus savant de l'observatoire le plus proche"
 rinta_seeker_events.62.b:0 "Seul un vrai mystique peut discerner la vérité cachée de cette observation"

 rinta_seeker_events.80.t:0 "Études à l'étranger"
 rinta_seeker_events.80.desc:0 "La foi des Chercheurs de Rinta enseigne à ses adeptes de rechercher la connaissance. Notre peuple l'a fait, mais beaucoup cherchent à poursuivre cela encore plus loin. De plus en plus de nos jeunes ont décidé d'étudier à l'étranger, dans l'espoir de ramener les connaissances qu'ils apprennent et de les transmettre. Cela nous laisse sans main-d'œuvre, car des personnes valides voyagent loin de nos terres. Notre [Root.Monarch.GetTitle] doit agir pour décider s'il faut arrêter cette tendance ou la laisser continuer dans l'espoir de bons retours."
 rinta_seeker_events.80.a:0 "Qu'il en soit ainsi"
 rinta_seeker_events.80.b:0 "Restreindre cela à ceux qui en sont dignes uniquement."
 rinta_seeker_events.80.c:0 "Ne les laissez pas partir !"

 rinta_seeker_events.81.t:0 "Étudiants de retour"
 rinta_seeker_events.81.desc:0 "Les étudiants de la foi des Chercheurs de Rinta sont constamment à la recherche de connaissances, même si cela signifie partir étudier à l'étranger. Récemment, nous avons eu un afflux massif d'étudiants revenant et apportant des connaissances de tout Sarhal et même plus loin. L'un des plus notables d'entre eux est un jeune érudit qui revient d'études à Tianlou. Il apporte avec lui de nombreuses nouvelles idées, dont certaines ont intrigué même les plus grands esprits de notre pays.\n\nMalheureusement pour nous, ces idées viennent avec certains aspects mystiques que beaucoup considèrent frauduleux et hérétiques. L'érudit affirme que c'est simplement la nature de ce qu'il a appris, et qu'il y a des preuves que ses idées sont correctes. Beaucoup sont divisés sur l'acceptation de ces enseignements ou sur le renvoi de cet érudit à Haless pour conférer avec d'autres hérétiques."
 rinta_seeker_events.81.a:0 "Laissez-le rester"
 rinta_seeker_events.81.b:0 "Chassez-le !"
 rinta_seeker_events.81.c:0 "Gardez-le, mais assurez-vous qu'il ne dise rien de trop fou"

 rinta_seeker_events.82.t:0 "Une Découverte déconcertante"
 rinta_seeker_events.82.desc:0 "Aujourd'hui, un héraut a apporté à la cour des nouvelles des découvertes d'une expédition en territoire homme-lézard. En s'enfonçant profondément dans un temple homme-lézard, ils sont tombés sur un glyphe qui ressemblait exactement à l'une des géométries les plus sacrées, le cercle à 8 segments entouré de triangles tournés vers l'intérieur. L'œuvre est si distinctement de style Baashidi qu'il semble qu'elle n'aurait pas pu être faite par un autre groupe, pourtant elle porte le même niveau d'usure que les glyphes anciens environnants. La découverte a mystifié les érudits chez nous, certains la proclamant comme un signe de la vérité intemporelle de nos enseignements. Quoi qu'il en soit, ils se sont mis à chercher toute explication logique quant à l'existence du glyphe."
 rinta_seeker_events.82.a:0 "La logique est inutile, il suffit de méditer sur ce qui n'est qu'une autre émanation de la vérité"
 rinta_seeker_events.82.b:0 "Cette géométrie a une signification très particulière, si nous équipons une équipe pour étudier les glyphes environnants, ils montreront probablement que le glyphe était utilisé pour exprimer un concept similaire."
 rinta_seeker_events.82.c:0 "Faire mener une enquête par certains membres de notre cour ; si nous approfondissons la géométrie elle-même, la connexion sous-jacente sera certainement révélée"

 rinta_seeker_events.100.t:0 "Études parrainées par le gouvernement"
 rinta_seeker_events.100.desc:0 "Récemment, une organisation célèbre de Mwalim d'un collège a demandé un financement gouvernemental pour une étude qu'ils mènent. Ils déclarent qu'ils cherchent à utiliser l'argent pour se plonger dans de nouvelles expériences et idées par l'expansion de l'école. De nombreux Mwalim ont montré leur soutien à cette idée, malgré son prix. Que devons-nous faire ?"
 rinta_seeker_events.100.a:0 "Leur faire un don généreux"
 rinta_seeker_events.100.b:0 "Leur faire un petit don"
 rinta_seeker_events.100.c:0 "Nous dépensons trop d'argent !"

 rinta_seeker_events.101.t:0 "Dirigeants savants"
 rinta_seeker_events.101.desc:0 "Les dirigeants parmi les Baashidi ont souvent prouvé qu'ils comptaient parmi les plus savants du monde. Malheureusement pour [Root.Monarch.GetName], les gens ont commencé à douter de [Root.Monarch.GetHerHis] connaissance. Un groupe de Mwalim s'est présenté à [Root.Monarch.GetName] à la cour, l'antagonisant. C'est évidemment une hérésie du plus haut degré, mais [Root.Monarch.GetName] craint que s'[Root.Monarch.GetSheHe] les chasse de [Root.Monarch.GetHerHis] présence, cela confirmera leurs croyances. Que doit faire [Root.Monarch.GetName] ?"
 rinta_seeker_events.101.a:0 "Peut-être qu'un « don » les ferait taire ?"
 rinta_seeker_events.101.b:0 "Je ne suis peut-être pas le plus sage, mais je suis toujours disposé à apprendre."

 rinta_seeker_events.102.t:0 "Temps d'étude"
 rinta_seeker_events.102.desc:0 "[Root.Monarch.GetName] est souvent considéré comme un souverain assez studieux. Il s'est intéressé à de nombreux sujets différents. Malheureusement pour [Root.Monarch.GetHerHim], les obligations du pouvoir exercent une pression sur le temps dont un souverain dispose. Cela a visiblement eu un effet sur [Root.Monarch.GetName], qui semble avoir envie de se plonger dans une nouvelle étude.\n\nCela s'est accentué récemment : avec [Root.Monarch.GetHerHis] obligations occupant l'intégralité de la journée, [Root.Monarch.GetSheHe] a confié de plus en plus d'entre elles à [Root.Monarch.GetHerHis] conseillers. Des amis proches de [Root.Monarch.GetName] l'ont vu lire de la littérature, tandis que [Root.Monarch.GetHerHis] conseillers ont mal géré le pays, et ont même accepté des pots-de-vin pour agir sans la permission de [Root.Monarch.GetName] ! Que devrait-on faire ?"
 rinta_seeker_events.102.a:0 "Nous avons besoin d'un dirigeant, pas d'un lecteur."
 rinta_seeker_events.102.b:0 "La modération est la clé."
 rinta_seeker_events.102.c:0 "Laissez [Root.Monarch.GetName] faire ce qu'[Root.Monarch.GetSheHe] veut"

 rinta_seeker_events.103.t:0 "Stagnation dans les Demeures du Savoir"
 rinta_seeker_events.103.desc:0 "Une grande partie de notre société savante est organisée en associations techniques et académiques, et des guildes locales d'architectes, d'astronomes, de mathématiciens et autres peuvent être trouvées dans les villes de tout le royaume. Ces guildes sont dirigées par des corps de leurs individus les plus érudits, qui ont étudié et pratiqué pendant des décennies avant d'occuper leurs postes. Pourtant, l'avancement dans les guildes peut souvent être déterminé autant par son aptitude sociale que par sa capacité intellectuelle, et toute une génération d'érudits compagnons commence à appeler à une réforme systémique, de peur qu'ils ne fassent sécession des guildes et ne menacent leur croissance continue. Ces jeunes universitaires affirment que leurs homologues âgés ne sont plus dynamiques dans les méthodes par lesquelles ils cherchent à rationaliser la nature de Halann, et sont devenus stagnants dans leur recherche de connaissance. Ils prétendent eux-mêmes représenter un nouveau dynamisme intellectuel qui peut apporter une nouvelle vie aux guildes mourantes, si seulement leurs compétences pouvaient être correctement reconnues. Alors que les tensions montent, des membres des deux camps font appel au [Root.Monarch.GetTitle] pour soutenir leurs objectifs."
 rinta_seeker_events.103.a:0 "Ces jeunes ne réalisent pas que comprendre Halann requiert une profondeur d'étude et de patience."
 rinta_seeker_events.103.b:0 "Pour vraiment faire progresser notre étude, il doit être nécessaire de se réorganiser occasionnellement."


