 rinta_seeker_events.250.t: "Le Progrès nécessite des tests"
 rinta_seeker_events.250.desc: "Les mages nous sollicitent constamment, souhaitant tester les capacités du Viscus du Désert. Récemment cependant, dans notre précipitation à trouver une solution au problème du gouffre béant en Ardimya, certains mages ont commencé à sentir que l'environnement autour d'eux est devenu résonant avec une vibrance enivrante.\n\nPour beaucoup, il est devenu clair que la perversité du Viscus a commencé à se répandre comme un gaz empoisonné. Les mages qui manient actuellement l'outil croient qu'ils sont proches d'une découverte importante et souhaitent continuer leurs tests malgré les risques. De nombreux Mwalim et Darwiiz craignent le pire résultat, et supplient que le Viscus soit relocalisé."
 rinta_seeker_events.250.a: "Continuez, nous prierons pour que rien de mal n'arrive."
 rinta_seeker_events.250.b: "Attendons quelques semaines."
 rinta_seeker_events.250.c: "La sécurité d'abord !"

 rinta_seeker_events.251.t: "Le Clou sans le marteau"
 rinta_seeker_events.251.desc: "Le Viscus des Damnés est actuellement testé par quelques mages en dehors de toute zone de population importante. Après une variété de tests et de gadgets, ils désirent tester les capacités spécifiques à la fois du Marteau et du Clou. Ils ont demandé la permission de séparer les outils pour une période prolongée afin de mener des tests individuels.\n\nIls affirment que cela permettrait le double de tests, car chaque partie de la relique pourrait être profondément analysée.\n\nD'autres parmi le conseil affirment que cette forme conservatrice de test n'aura aucun effet ; le marteau sans le clou est non fonctionnel. Ils n'ont pas d'effet l'un sans l'autre. Plus ils se rapprochent, plus leur magie est puissante. Quand ils se touchent, leur résonance s'achève.\n\nComment devons-nous décider ?"
 rinta_seeker_events.251.a: "Oui"
 rinta_seeker_events.251.b: "NON"

 rinta_seeker_events.252.t: "Répliquer un fragment de magie"
 rinta_seeker_events.252.desc: "Certains Darwiiz sont venus au Conseil des Mages pour discuter de la possibilité de reproduire les conditions possibles entourant la création du Viscus. Beaucoup de mages semblent perplexes quant à la façon dont cela pourrait se produire, avant qu'un Darwiiz ne parle :\n\n« Nos voyages à travers les terres nous ont permis d'avoir un peu plus d'aperçu sur ce qui s'est passé il y a deux mille ans. D'après les tablettes et les parchemins que nous avons collectés, il semble que le rituel soit reproductible dans une certaine mesure. Avec ces informations, nous pourrions essayer de faire et défaire quelque chose avec les mêmes magies qu'Almadhab. Ce n'est peut-être qu'une partie, et nous devrons peut-être revenir de nombreuses fois, mais c'est l'une de nos meilleures options. »\n\nLes murmures disparaissent alors que la foule s'oriente lentement vers un accord, jusqu'à ce qu'un autre Darwiiz aux côtés du premier parle.\n\n« Nous devons vous rappeler cependant, ce sont des Magies Noires. Il est difficile d'être sûr des effets qui pourraient s'ensuivre si nous essayons de faire cela. Je crois cependant de tout cœur que si nous avons le soutien de quelques mages pour nous aider à contenir les dégâts, si quoi que ce soit devait mal tourner… alors ces expériences pourraient nous apprendre comment défaire le vide en Ardimya. »\n\nLe débat résonne dans la salle, mais en fin de compte, la dernière voix à parler est la vôtre.\n\nAlors que vous ouvrez la bouche, quelques mots résonnent dans toute la salle."
 rinta_seeker_events.252.a: "Allez-y."
 rinta_seeker_events.252.b: "Faites simplement de l'ingénierie inverse sur une autre relique similaire."
 rinta_seeker_events.252.c: "Ne prenons pas ce risque."

 rinta_seeker_events.253.t: "Succès en magies"
 rinta_seeker_events.253.desc: "Après des semaines d'étude du processus de création de reliques avec les mêmes magies noires qu'Almadhab et Alahmar, les résultats ont été présentés à la cour des mages :\n\n« Nous avons réussi à fabriquer un outil capable d'invoquer des bêtes sombres du plan de l'ombre. Ce n'est pas aussi puissant que le Viscus, mais c'est quelque chose… »\n\n« C'*était* quelque chose. Nous l'avons également défait. »\n\nLa foule de mages acclame. Une grande bataille gagnée dans la guerre contre l'infernal. Sauver Ardimya semble plus proche que jamais."
 rinta_seeker_events.253.a: "Continuons alors !"

 rinta_seeker_events.254.t: "Échec en magies"
 rinta_seeker_events.254.desc: "Les Darwiiz qui sont partis apprendre comment faire et défaire le mal du Viscus ne sont pas revenus. Tout ce que nous avons entendu est le récit tragique dans les collines lointaines d'un lieu inconnu, les détails changeant chaque jour.\n\nUne explosion mystique ici, ou là, se terminant toujours par « il ne reste rien ».\n\nSi les Darwiiz avaient été moins avares de ne pas laisser suivre leur chemin, alors peut-être aurions-nous pu les sauver. Malheureusement, ils sont restés fidèles à leur idéologie contre vents et marées.\n\n« Nous avons perdu de grands mages aujourd'hui pour une expérience stupide. Désormais, soyons plus prudents lorsque nous approchons les Magies Noires… s'il vous plaît ? Rappelez-vous qu'on ne peut pas négocier avec elles, mais qu'elles peuvent être tentées par notre ignorance. »"
 rinta_seeker_events.254.a: "Nous prions pour que cela ne se reproduise jamais."

 rinta_seeker_events.255.t: "Progrès en magies noires"
 rinta_seeker_events.255.desc: "« Alors que nous étudions dans le domaine de tout ce qui est haï du mystique, nous avons beaucoup appris. Les cours de toutes les nations sous la foi des Chercheurs de Rinta ont grandement assisté le Conseil des Mages dans la poursuite de leurs objectifs. Moi, [Root.Monarch.Getname] ai consacré beaucoup de temps à apprendre sur les activités des mages et leurs travaux. Espérons que d'autres souverains puissent montrer un niveau similaire de dévouement pour mettre fin à cette menace. Il n'y aura plus de démons dans nos patries ! »\n\nLe Conseil des Mages s'enthousiasme du discours de [Root.Monarch.Getname]. Ils se retirent du podium central, et au coucher du soleil font déjà des préparatifs pour quitter Qasri Aqoon.\n\n[Root.Monarch.Getname] se tourne vers son conseiller le plus fidèle et commence à parler :\n\n« Akooson ? »\n\n« Oui mon seigneur ? »"
 rinta_seeker_events.255.a: "Comment puis-je continuer à aider la campagne ?"
 rinta_seeker_events.255.b: "Nous pouvons être un peu égoïstes… non ?"

 rinta_seeker_events.256.t: "Environnements ouverts"
 rinta_seeker_events.256.desc: "Nos efforts pour réparer le tort fait par Almadhab il y a de nombreuses années ont attiré une certaine attention mondiale. Un filet de voyageurs internationaux est venu au Jasiir Jadid, cherchant notre conseil. À leur entrée dans nos salles, ils ont demandé s'ils pouvaient aider au projet. Des mages de Cannor, Haless, et même des Plaines-Interdites ont apporté des babioles et des artefacts censés avoir un pouvoir assez grand pour arrêter le débordement de l'infernal dans le plan matériel primaire.\n\nLe Conseil des Mages éclate en discussion…\n\n« Ils peuvent nous aider ! »\n\n« Ils vont entacher notre travail, cela leur prendra trop de temps pour s'adapter ! »\n\n« Nous pouvons leur enseigner ! »\n\n« Ils ne sauront pas… »\n\nEncore et encore…\n\nJusqu'à ce qu'une décision soit finalement prise."
 rinta_seeker_events.256.a: "Peut-être que quelque chose de bon en sortira ?"
 rinta_seeker_events.256.b: "Notre travail est NOTRE travail."

 rinta_seeker_events.257.t: "Profaner des ruines"
 rinta_seeker_events.257.desc: "Une ruine à [rinta_ruin_found.GetName] a été trouvée contenant un parchemin parlant du potentiel magique d'Almadhab et d'Alahmar. En tant que demi-génies, ils étaient déjà extrêmement puissants dans leur capacité à exaucer des vœux. En tant que mages, ce pouvoir était encore amplifié à des hauteurs inatteignables même par les mages conventionnels les plus exceptionnels ; l'écart entre eux et nous était presque aussi monumental que la distance entre les extrémités de la terre. Chaque parchemin qu'ils ont laissé derrière eux fournit au Conseil des Mages une fraction de leur pouvoir ; chacun nous rapproche d'un pas de la fin de cette folie.\n\n[rinta_ruin_found.GetName] s'est montré méfiant de laisser des entités extérieures entrer dans leur pays pour cela, mais avec un peu de persuasion, le Conseil des Mages est sûr qu'ils peuvent être tentés de nous permettre d'enquêter sur les ruines. Ce qui est plus inquiétant est la perspective que l'accumulation de la résonance innée de ce parchemin avec les Magies Noires pourrait affecter l'environnement environnant. Seul le temps dira quels effets la profanation de cette ruine peut apporter."
 rinta_seeker_events.257.a: "Regardons plus en profondeur."
 rinta_seeker_events.257.b: "Nous prenons ce que nous avons."
 rinta_seeker_events.257.c: "Profanation complète"

 rinta_seeker_events.258.t: "L'Occurrence sauvage"
 rinta_seeker_events.258.desc: "Les magies noires sont intrinsèquement chaotiques. Elles vont et viennent en lignes irrégulières, laissant des marques partout où leur présence est ressentie. Le travail actuel effectué par le Conseil des Mages pour étudier le Viscus a entraîné des marques apparaissant à la population générale : de vastes flèches d'obsidienne, des statues rituelles de bêtes, des champs de maïs de toutes les couleurs, des formes de montagnes impossibles se formant.\n\nLes magies noires sont aussi chaotiques que possible. Nous ne pouvons que prier pour que les effets nous bénissent avec quelque chose… ou au moins ne nous fassent pas de mal."
 rinta_seeker_events.258.a: "Qu'est-ce que c'est cette fois…"

 rinta_seeker_events.259.t: "Purifier le mal"
 rinta_seeker_events.259.desc: "Avec tous les tests effectués, il est normal que les magies noires laissent derrière elles une présence maléfique partout où elles sont utilisées. Nous essayons d'atténuer leurs effets autant que possible, mais le Conseil des Mages ne peut faire que tant face à la colère brute du perfide et du corrompu.\n\nAvec le temps cependant, nous pouvons prévaloir. Les efforts de nombreux mages ont permis à [rinta_tarrem1.GetCapitalName] d'être purifiée de ses effets néfastes. Espérons que pour les autres zones affligées par cette maladie, nous pourrons bientôt éliminer la présence de l'infernal."
 rinta_seeker_events.259.a: "Bénis soient les corrompus guéris par notre main."

 rinta_seeker_events.260.t: "Villages sous l'Infernal"
 rinta_seeker_events.260.desc: "De récentes expériences à [rinta_tarrem1.GetCapitalName] ont entraîné des villes environnantes affectées par la présence de l'infernal. Les gens sont devenus fous, voyant des démons ou entendant des voix. Personne ne souhaite quitter sa maison, croyant que c'est le retour des dieux. Le Conseil des Mages, inquiet du chaos qu'une telle percée infernale pourrait apporter si elle se répand, débat entre eux sur ce qu'il devrait faire. Cinq cents mages donnent chacun leurs propres propositions, se chamaillant sur la question de savoir si cela peut être géré, ou si cela vaut même leur temps.\nUn Mage de [rinta_tarrem1.GetCapitalName] prend la parole :\n« Mon peuple a peur. Peur de quoi ? Nous ne pouvons pas permettre que cela se répande à cause de notre dévouement à mettre fin au Viscus et à l'Infernal. Nous perdons de vue l'objectif principal : mettre fin à la souffrance des gens. Nous ne pouvons pas simplement échanger une souffrance contre une autre ! Nous ne pouvons pas laisser plus d'innocents porter le fardeau ! »"
 rinta_seeker_events.260.a: "Aidons-les."
 rinta_seeker_events.260.b: "Nous ne pouvons pas nous le permettre."

 rinta_seeker_events.261.t: "Le Mal se lève"
 rinta_seeker_events.261.desc: "L'utilisation excessive du Viscus a causé une résonance de Magies Infernales à travers notre pays. Des observations de goules et de démons ont été signalées des sommets de montagnes aux plaines. Tout le monde est tendu, sachant que le mal a commencé à rôder dans leur région.\n\nNous devons empêcher toute propagation supplémentaire de cette contamination. Que cela soit une leçon."
 rinta_seeker_events.261.a: "MAL !!!!"

 rinta_seeker_events.262.t: "Quelque chose ne va pas"
 rinta_seeker_events.262.desc: "L'une de nos provinces récemment conquises signale des événements étranges sur presque tout le territoire. Nos conseillers soupçonnent que cela est lié à une étrange « résonance » qui peut être ressentie à travers la province."
 rinta_seeker_events.262.a: "Nous ne pouvons qu'observer."

 rinta_seeker_events.263.t: "Le Mal jaillit des provinces de résonance"
 rinta_seeker_events.263.desc: "Malheur ! Les armées de l'enfer se sont levées de la résonance particulière dans nos provinces, mais il ne semble pas qu'elles soient agressives envers nous pour le moment."
 rinta_seeker_events.263.a: "Peut-être devrions-nous observer encore davantage."

