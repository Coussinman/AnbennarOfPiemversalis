 #Events (Some stuff here is temporary, should be evaluated before release -Ditto)
 treasurefleet.0.t: "Débogage Initial"
 treasurefleet.0.d: "Ceci permet d'initier le modificateur de province déclenché qui lance la chaîne d'événements au début de chaque décennie."
 treasurefleet.0.a: "N'oubliez pas de boire de l'eau."

 treasurefleet.1.t: "Départ de la Flotte du Trésor"
 treasurefleet.1.d: "L'aube d'une nouvelle décennie se lève, et avec elle la puissante Flotte du Trésor se prépare à lever l'ancre une fois de plus."
 treasurefleet.1.a: "Un voyage commence..."

 treasurefleet.2.t: "Comment Traiter avec les Pirates"
 treasurefleet.2.d: "Dans le périlleux voyage que la Flotte du Trésor entreprend à travers un continent entier, aucun danger n'est plus sérieux que les pirates qui écument les mers du sud. La Flotte sollicite nos conseils sur la manière de gérer la situation, voire sur l'opportunité même de prendre ce risque."
 treasurefleet.2.a: "Soudoyez les pirates."
 treasurefleet.2.a2: "Payez-les, j'ai des conseils..."
 treasurefleet.2.b: "Essayez de vous faufiler."
 treasurefleet.2.b2: "Faufilez-vous, j'ai des conseils..."
 treasurefleet.2.c: "Essayez de les combattre."
 treasurefleet.2.c2: "Combattez-les, j'ai des conseils..."
 treasurefleet.2.e: "N'y allez pas, c'est trop dangereux."

 treasurefleet.3.t: "La Flotte du Trésor à Moduk"
 treasurefleet.3.d: "La Flotte du Trésor est arrivée à [Root.GetName], apparemment surprise par notre occupation de la région. Historiquement, elle s'y arrêtait comme escale sur sa route vers Haless, et souhaiterait continuer à rencontrer les habitants. Bien que les progrès en construction navale aient rendu cette escale superflue, ils la considèrent désormais comme une tradition et s'offenseraient si nous les rejetions."
 treasurefleet.3.a: "La tradition est la tradition, ils sont les bienvenus !"
 treasurefleet.3.b: "Ce port est le nôtre, et ses habitants nos sujets !"

 treasurefleet.4.t: "Déterminer l'Issue de Nakseseom"
 treasurefleet.4.d: "cet événement est masqué (peut-être pas à des fins de test)"
 treasurefleet.4.a: "pourquoi êtes-vous ici"

 treasurefleet.5.t: "Flotte du Trésor Surprise à Nakseseom"
 treasurefleet.5.d1: "Chaque décennie, une puissante flotte venue du nord-ouest passe au large de notre île sacrée de Nakseseom. Il leur arrive d'oser y débarquer pour s'emparer d'artefacts qu'ils revendent comme bibelots. Nous venons de recevoir des rapports indiquant que cela s'est reproduit, et les rares habitants de l'île nous demandent de nous préparer à les repousser à leur retour."
 treasurefleet.5.d2: "Chaque décennie, une puissante flotte venue du nord-ouest passe au large de l'île de Nakseseom. Il leur arrive d'y débarquer pour s'emparer d'artefacts qu'ils revendent comme bibelots. Nous venons de recevoir des rapports indiquant que cela s'est reproduit, et les rares habitants de l'île nous demandent de nous préparer à les repousser à leur retour."
 treasurefleet.5.a: "Ils ne profaneront pas notre île sacrée !"
 treasurefleet.5.b: "Très bien, cela nous donne un prétexte pour couper leur approvisionnement."
 treasurefleet.5.c: "Nous devrions plutôt leur vendre ces artefacts !"

 treasurefleet.6.t: "Flotte du Trésor Interceptée"
 treasurefleet.6.d: "La Flotte du Trésor s'est approchée de nos rivages en espérant un pillage facile. Au lieu de cela, elle a essuyé des tirs de canon et a dû battre en retraite. Les reliques de l'île ne leur appartiennent pas."
 treasurefleet.6.a: "Espérons qu'ils ont retenu la leçon."

 treasurefleet.7.t: "Passage devant Onman"
 treasurefleet.7.d: "cet événement est masqué (peut-être pas à des fins de test)\nceci ajoutera le Port Visité, c'est correct car cela fonctionne aussi comme 'ignoré'"
 treasurefleet.7.a: "pourquoi êtes-vous encore là"

 treasurefleet.8.t: "La Flotte du Trésor visite [Root.GetName]"
 treasurefleet.8.d21: "La Fédération-des-Lacs compte un ensemble de cités splendides, et les ports où la Flotte du Trésor fait escale sont nombreux. Pourtant, bien des marins jureraient que Jiantsiang est unique. Ce n'est pas la ville qu'ils citeraient (bien que ses temples et ses murailles soient impressionnants), mais les habitants : c'est le seul endroit, le seul moment, où la plupart verront jamais un harimari, lorsqu'ils accostent à Jiantsiang.\n\nLa soie y est splendide, les pots-de-vin nécessaires pour faciliter le commerce, considérables. Mais ce sont les marchands menant les négociations avec autant de férocité que leurs griffes qui marquent la visite, et les visages sévères des harimari resteront dans l'esprit du capitaine bien après que les navires auront repris la mer."
 treasurefleet.8.d31: "[Root.GetName] occupe une place particulière dans le cœur des marins de la Flotte du Trésor, car c'est ici qu'ils retrouvent les leurs. Des cousins éloignés se réunissent, et les foules se rassemblent pour écouter des récits de la Fédération ou simplement s'émerveiller devant ces navires exotiques. Les riches marchands natifs de la cité invitent leurs homologues à des banquets et de grands échanges de savoir maritime.\n\nBien que [Root.GetName] ne soit pas la cité la plus riche que la Flotte visite, c'est celle que ses marins attendent avec le plus d'impatience."
 treasurefleet.8.d32: "Un arc-en-ciel scintillant et mouvant chatoie au-dessus de la Porte des Lumières tandis que la Flotte du Trésor passe en dessous. Des explosifs colorés, les « feux d'artifice », sont déployés pour célébrer la visite décennale de la Flotte. Les citoyens de [Root.GetName] se sont toujours surpassés pour accueillir leurs parents d'outre-mer, mais avec les richesses d'Aelantir affluant désormais vers [Root.GetName], la magnificence des festivités est sans pareille.\n\nLes navires de [Root.Owner.GetName] visitant désormais fréquemment la patrie de la Flotte, beaucoup considèrent le commerce proprement dit comme une formalité. La cité entière entre en période de fête jusqu'au moment où la Flotte lève l'ancre vers d'autres ports."
 treasurefleet.8.d41: "Le ciel est couvert, bien que les vagues soient calmes. À un demi-mille en arrière, une petite jonque à grande voile rouge flotte, à bord de laquelle un homme de haute taille peint tranquillement la scène devant lui.\n\nEt quelle scène, tandis que la Flotte du Trésor entre au port ! Les toits rouges de Tianlou se confondent, mais les Hauts Temples se dressent tels des montagnes dentelées. Du coin de l'œil, la timonière jure apercevoir d'étranges émanations bleutées. Pourtant, la plupart des marins voient « simplement » un édifice immense, imposant, magnifique. Seul le marchand le plus obsédé par le profit pense encore au commerce à faire dans les vastes marchés sous les Temples, à l'achat des traités des eunuques et à toutes les marchandises qui descendent le Yanhe. Pour la plupart, l'approche de Tianlou ne sera qu'émerveillement."
 treasurefleet.8.d51: "Tandis que la Flotte du Trésor navigue le long de la bien nommée Côte-aux-Méduses, elle traverse sans effort un banc de milliers de méduses, leur suspension insouciante à peine perturbée par le tirant d'eau profond et les larges coques de la Flotte. La nuit, les méduses s'illuminent d'un bleu bioluminescent pâle. La Flotte du Trésor apparaît comme de petits points d'obscurité, des étoiles inversées sur la toile de la mer. La « soupe » de méduses s'épaissit à mesure que la Flotte approche, annonçant l'arrivée dans la baie de Feiten et enfin, la vue de l'embouchure du fleuve qui charrie vers l'océan les nutriments des terres intérieures rendant possibles ces immenses proliférations de méduses.\n\nLa cité de Feiten elle-même est relativement récente, selon les standards de Yanshen. Simple bourgade de pêcheurs avant l'invasion de Jaher, elle a bénéficié des vagues de réfugiés et d'une industrie baleinière florissante. Feiten est une nouvelle escale pour la Flotte du Trésor. Ce n'est le port favori d'aucun capitaine, en raison de l'odeur omniprésente de baleine en décomposition et des installations sous-développées de la cité. Mais ces considérations pâlissent face aux opportunités commerciales qu'offre Feiten."
 treasurefleet.8.d52: "Plus que toute autre cité, Feiten a embrassé le potentiel de l'huile de baleine. Le jaune boueux caractéristique de centaines de lampes et bâtiments alimentés à l'huile de baleine embrase l'obscurité, phare guidant la Flotte du Trésor à son arrivée. Ce n'est qu'à l'aube, lorsque la puissance des lampes cède la place aux rayons du soleil, que l'autre merveille de Feiten se révèle : des dizaines de montgolfières, les vaisseaux préférés de l'élite marchande de la cité. Elles s'élèvent dans le ciel, leurs enveloppes gonflées par l'air chaud produit par l'huile de baleine. Des banderoles rouges, ressemblant aux tentacules d'une méduse, se déploient lentement dans l'aube brumeuse, projetant de longues ombres sur la cité en contrebas. Bien que la plupart des marins ne puissent lire la calligraphie dorée ornant les banderoles, ils devinent que les mots indiquent à quelle maison ou à quel individu appartient chaque ballon.\n\nBien que la puissance marchande de Feiten repose encore sur sa flotte maritime, les ballons permettent un transport bien plus rapide et pratique pour les marchandises légères de grande valeur, comme certaines épices rahenis dont la puissance pourrait s'estomper lors d'un long voyage en mer. Ces produits exotiques, ainsi que le catalogue toujours croissant de produits dérivés de la chasse à la baleine, constituent désormais les principales exportations de Feiten, et la Flotte du Trésor est plus qu'heureuse d'en profiter."
 treasurefleet.8.d53: "Alors que la plupart des autres ports le long de la route de la Flotte du Trésor peuvent être embrassés d'un regard de gauche à droite, ce n'est pas le cas de Feiten. Avec l'avènement de la technologie des dirigeables, Feiten a enfin commencé à conquérir les flancs escarpés et les falaises abruptes qui avaient entravé sa croissance si longtemps. Ce qui ressemble à des centaines de dirigeables de différentes tailles et conceptions encombre l'espace aérien au-dessus de la cité, perchés comme des oiseaux marins nichant sur les collines.\n\nL'arrivée de la Flotte du Trésor provoque une clameur de petits véhicules aériens personnels se détachant de leurs amarres et fonçant vers le port, tous avides d'être les premiers à atteindre la Flotte. Les marchandises pourront être transférées des soutes des dirigeables vers la Flotte plus tard. D'abord, il y a des négociations à mener !"
 treasurefleet.8.d61: "En longeant la jungle, les marins de la Flotte du Trésor entendent un son unique : la musique zyujyut. Bien que la plupart des jardins de thé soient plus à l'intérieur des terres, le parfum puissant des jardins de thé côtiers zyujyut est un phare pour les marins à l'accostage. Tandis que marchands et négociants échangent leurs biens, nombre d'hommes de la flotte se rendent aux Faateng flottant sur les rivières pour profiter des commodités qui leur manquaient en mer. Le port étant une construction assez récente, il est devenu une merveille moderne que les marins aspirent souvent à revoir après avoir repris la mer vers leurs foyers."
 treasurefleet.8.d81: "Deux choses attirent le regard quand la Flotte du Trésor approche de Keoaden : les mines qui couronnent chacune des nombreuses collines de la cité, et le temple Nha Nuhoanha. Certes, la cité possède des marchés, des maisons et des quais, mais ils semblent ternes comparés aux deux caractéristiques qui définissent ce port prétendant être le joyau de Thidinkai.\n\nSeul un dixième environ des vastes mines de gemmes est visible à l'œil nu, même en approchant de la cité, tant elles creusent sous terre à la recherche de nouveaux filons d'émeraude, de rubis et de saphir. Pourtant, elles se font remarquer : chaque colline riche en gemmes est surmontée d'un fort trapu arborant une multitude de bannières, garantissant la sécurité de leur production (même contre les employés des mines).\n\nLe grand Nha Nuhoanha, en revanche, impressionne même les marins les plus aguerris. Certains peuvent ressentir un éclair d'agacement, sachant que les plus belles gemmes de la cité ornent les reines pétrifiées qui reposent à l'intérieur, et qu'ils doivent se contenter des gemmes de moindre qualité. Mais la plupart le contemplent avec une admiration (sinon une révérence) rivalisant avec celle des habitants de Keoaden. Quelques marins doivent surveiller les quais pour amarrer, d'autres sont peut-être sous le pont à se reposer avant la nuit à venir. Mais pour tous les autres, le Nha Nuhoanha est tout ce qu'ils voient tandis que la Flotte du Trésor entre au port."
 treasurefleet.8.d131: "Ce voyage est le plus long de la Flotte du Trésor, et les marins sont las lorsqu'ils contournent le cap aride de Dvipaskaya pour approcher du plus grand port du sud-est du Rahen. Ils sont encore à de nombreux milles quand une faible lueur devient visible sur la côte lointaine. Un novice pourrait craindre que la cité soit en feu, mais à mesure que la flotte approche, la véritable origine de cette lumière devient claire.\n\nC'est le soleil ardent du Rahen, se reflétant sur les toits plaqués or des nombreux palais de Sarkhashabid. Bien que moins nombreuses que celles qui parsèment la plaine de Dhenbasana, ces vastes demeures compensent largement par leur magnificence. Après tout, elles abritent certains des Rahenis les plus fervents adeptes de l'école du Turban de Soie, qui cherchent à émuler les Hauts Dieux en devenant aussi riches que possible.\n\nAlors que la flotte approche du port et que les palais grandissent à vue d'œil, d'autres éléments attirent également le regard : le marbre importé de loin depuis Shazstundihr, poli jusqu'à briller, le bois sombre coupé des Bois-Profonds, qui semble encore émettre une faible lueur. Ce n'est qu'en accostant aux quais que les taudis portuaires deviennent visibles, où les basses castes survivent tant bien que mal. Ce sont eux qui livreront les marchandises déchargées ici, mais n'en consommeront aucune. Après tout, la Flotte du Trésor ne traite qu'avec l'élite harimari de Sarkhashabid (et peut-être quelques castes moyennes particulièrement entreprenantes)."
 treasurefleet.8.d: "Poursuivant son voyage décennal à travers les mers orientales de Haless, la Flotte du Trésor fait escale ici dans les ports de [Root.GetName]. Nos marchandises seront vendues, les leurs seront achetées, et l'économie locale prospère pendant quelques précieuses semaines avant que la Flotte ne reparte."
 treasurefleet.8.a: "Une autre visite profitable !"

 treasurefleet.9.t: "Déterminer l'Issue Pirate"
 treasurefleet.9.d: "cet événement est masqué (peut-être pas à des fins de test)"
 treasurefleet.9.a: "pourquoi êtes-vous ici"

 treasurefleet.10.t: "Pirates Soudoyés"
 treasurefleet.10.d1: "La Flotte du Trésor est entrée dans nos eaux durant son voyage et nous a versé un tribut pour garantir son passage."
 treasurefleet.10.d2: "La Flotte du Trésor est entrée dans nos eaux durant son voyage et nous a versé un tribut pour garantir son passage. Cependant, nombre de nos équipages ont trouvé leurs officiers charismatiques et amicaux, et leur ont accordé un tarif réduit."
 treasurefleet.10.a: "Telle est la nature lucrative du commerce."

 treasurefleet.11.t: "Les Pirates Interceptent la Flotte"
 treasurefleet.11.d1: "La Flotte du Trésor est entrée dans nos eaux durant son voyage et a tenté de se faufiler sans payer. Heureusement, nous l'avons interceptée et contrainte à nous céder une généreuse part de ses richesses acquises."
 treasurefleet.11.d2: "La Flotte du Trésor est entrée dans nos eaux durant son voyage et a tenté de se faufiler sans payer. Ils avaient presque réussi avant qu'un de nos navires éclaireurs ne remarque leurs voiles exotiques et nous alerte. Nous les avons alors interceptés et contraints à nous céder une généreuse part de leurs richesses acquises."
 treasurefleet.11.a: "Ils n'auront peut-être pas autant de chance la prochaine fois."

 treasurefleet.12.t: "Les Pirates Battent la Flotte"
 treasurefleet.12.d1: "La Flotte du Trésor est entrée dans nos eaux durant son voyage et a tenté de forcer le passage à coups de canon quand nous avons voulu prélever notre juste tribut. Malheureusement pour eux, ils n'avaient pas la puissance de feu nécessaire contre nos navires préparés. Ils n'ont échappé que grâce à la robustesse de leurs coques conçues pour la haute mer."
 treasurefleet.12.d2: "La Flotte du Trésor est entrée dans nos eaux durant son voyage et a tenté de forcer le passage à coups de canon quand nous avons voulu prélever notre juste tribut. Ils se sont battus vaillamment, et leurs puissants vaisseaux ont dispersé nombre des nôtres. Mais leur défaite ne fait que prouver notre suprématie sur ces eaux."
 treasurefleet.12.a: "Le pavillon noir règne sur ces eaux !"

 treasurefleet.13.t: "La Flotte du Trésor visite [Root.Owner.GetName] à [Root.GetName]"
 treasurefleet.13.d: "Lumières scintillantes, feux d'artifice explosifs, thés locaux et marchandises de tout l'Est de Haless attendent la Flotte du Trésor à [Root.GetName]. Même les festivités des années passées pâlissent en comparaison de la splendeur et de la richesse déployées lors de la visite de la Flotte dans ce port devenu sa seconde patrie.\n\nLargement considéré comme l'événement commercial de la décennie à Haless, voire dans le monde entier, des marchandises de tous horizons trouvent leur chemin vers les nombreuses boutiques bordant les nombreuses rues que les marchands arpentent. Ce qui n'était autrefois que quelques semaines de réjouissances demeure, mais s'accompagne désormais de mois entiers de commerce et de diplomatie.\n\nCe n'est qu'après six mois que les nombreuses voiles de la Flotte du Trésor se hissent à nouveau, reprenant la mer sous l'escorte cérémonielle des plus beaux navires que [Root.Owner.GetName] puisse offrir. Bien que le départ ait traditionnellement lieu de jour, les lumières guide sont réglées à leur intensité maximale et restent visibles pour les marins une dernière fois cette nuit-là, pour un dernier adieu à la Porte des Lumières."
 treasurefleet.13.a: "La richesse est plus grande quand elle est partagée en famille."


 treasurefleet.20.t: "La Flotte du Trésor Concurrence les Marchands Locaux"
 treasurefleet.20.d: "Les visites de la Flotte du Trésor à [Root.GetName] sont un phénomène connu. Cependant, avec le long intervalle entre les visites, les marchands locaux se retrouvent souvent pris au dépourvu et finissent généralement surclassés en négociation par la flotte étrangère. Humiliés et embarrassés, ils ont pétitionné le gouvernement pour expulser les marchands étrangers du port de [Root.GetName]."
 treasurefleet.20.a: "Ils auraient dû être préparés !"
 treasurefleet.20.b: "Soutenons les marchands locaux."

 treasurefleet.21.t: "La Flotte du Trésor Demande des Réparations"
 treasurefleet.21.d: "Lors de la visite régulière de la Flotte du Trésor à [Root.GetName], nos marins ont remarqué que la Flotte avait subi des dommages durant ses voyages. Leurs propres marins l'ont confirmé et demandent si nous avons les moyens de réparer leurs navires. En tant qu'hôtes, on pourrait attendre de nous que nous assumions les frais, mais l'occasion de faire travailler nos propres marins sur leurs magnifiques navires ne se présente pas souvent..."
 treasurefleet.21.a: "Très bien, réparons leurs navires !"
 treasurefleet.21.b: "Malheureusement, nous ne pouvons nous permettre cette dépense."
 treasurefleet.21.c: "Nous avons les fournitures nécessaires pour aider !"

 treasurefleet.22.t: "La Flotte du Trésor Attire le Commerce à [Root.GetName]"
 treasurefleet.22.d: "Bien que la Flotte du Trésor ne visite [Root.GetName] qu'une fois par décennie, son impact sur l'économie locale est profond. La seule connaissance de ces visites attire d'autres marchands vers la cité, curieux de savoir quelles marchandises uniques amènent cette prestigieuse flotte marchande au port chaque décennie. Dans un cycle auto-entretenu, la réputation de [Root.GetName] comme « Port de la Flotte du Trésor » attire le commerce de près et de loin."
 treasurefleet.22.a: "Un merveilleux développement."

 treasurefleet.23.t: "La Flotte du Trésor Cherche du Fer"
 treasurefleet.23.d: "Les terres lointaines d'où vient la Flotte du Trésor sont réputées être une contrée d'abondance, avec certaines des plus belles étoffes, gemmes taillées et verreries qu'on ne peut obtenir que de ces vaisseaux. Cependant, une chose leur fait notoirement défaut : le fer, un métal vital pour les moyens de la guerre. Ils ont offert une jolie somme pour les réserves de notre armée à [Root.GetName]."
 treasurefleet.23.a: "Nous sommes toujours heureux de conclure un marché !"
 treasurefleet.23.b: "Refusons. Nous avons nous-mêmes besoin de ces réserves."
 treasurefleet.23.c: "Pas besoin de déranger les casernes, nos mines suffisent !"

 treasurefleet.24.t: "La Flotte du Trésor Apporte des Conflits Religieux"
 treasurefleet.24.d: "Lorsque la Flotte du Trésor a débarqué à [Root.GetName]"
 treasurefleet.24.a: "Confinons les combats à leurs navires !"
 treasurefleet.24.b: "Leur richesse nous importe, pas leur foi."
 treasurefleet.24.c: "Ils respecteront notre foi dans nos ports !"

 treasurefleet.25.t: "Un Passager Clandestin Particulier"
 treasurefleet.25.d: "L'arrivée de la Flotte du Trésor est toujours un jour excitant à [Root.GetName]. Des marins venus d'une terre lointaine, avec leurs manières exotiques et leurs récits extraordinaires, attirent toujours les regards.\nMais cette année, l'équipage qui a débarqué compte un membre supplémentaire à quatre pattes qui a mis les tavernes du port en ébullition. Un centaure, membre d'une race mi-humaine mi-cheval parcourant les vastes plaines proches de la patrie de la Flotte du Trésor, a apparemment réussi à se glisser à bord de l'un des plus grands navires. Il fut rapidement découvert une fois la flotte en mer, car son amour de la mer n'est égalé ni par sa tolérance à celle-ci, ni par ses talents de marin.\nBien qu'il soit un piètre marin, son enthousiasme naïf a charmé tout l'équipage, qui nous demande maintenant de lui offrir une place dans notre marine, craignant pour sa sécurité s'ils le ramenaient aux ports d'attache."
 treasurefleet.25.a: "Qu'il prenne la mer et explore les étendues encore inconnues de l'océan !"
 treasurefleet.25.b: "Bien sûr, bienvenue à bord, marin."
 treasurefleet.25.c: "S'il veut notre hospitalité, il devra accomplir une tâche pour laquelle il est vraiment doué."

 treasurefleet.90.t: "Déterminer le Prochain Port"
 treasurefleet.90.d: "cet événement est masqué (peut-être pas à des fins de test)"
 treasurefleet.90.a: "tout ceci sera 'immédiat' plus tard"

 treasurefleet.91.t: "Déterminer l'Événement de Port"
 treasurefleet.91.d: "cet événement est masqué (peut-être pas à des fins de test)"
 treasurefleet.91.a: "l'immédiat devrait déclencher un événement ici"

 treasurefleet.93.t: "Rapports de la Flotte du Trésor"
 treasurefleet.93.d: "À mesure que notre nation s'étend, nous avons incorporé plusieurs ports que la célèbre Flotte du Trésor visite. Cependant, nous avons peu besoin de suivre de près les rares événements de ces ports.\n\n§R(Cette décision est permanente.)§!"
 treasurefleet.93.a: "Absurde, je veux entendre chaque récit !"
 treasurefleet.93.b: "Tant que le commerce arrive, peu m'importent les détails..."


 treasurefleet.100.t: "Préparation du Retour de la Flotte"
 treasurefleet.100.d: "cet événement est masqué (peut-être pas à des fins de test)"
 treasurefleet.100.a: "pourquoi êtes-vous ici"

 treasurefleet.101.t: "Pris en Flagrant Délit de Pillage"
 treasurefleet.101.d: "Les peuples de Nakseseom ont eu vent des incursions de la Flotte sur l'île et ont préparé des défenses pour l'arrêter s'ils le peuvent. La Flotte est puissante mais ne peut mener une véritable invasion. Elle serait donc contrainte de battre en retraite si elle était prise."
 treasurefleet.101.a: "Le risque n'en vaut pas la chandelle."
 treasurefleet.101.b: "Poursuivons l'effort, rien de ce qui vaut la peine d'être vendu n'est gratuit !"


 treasurefleet.102.t: "La Flotte Rentre à Zurkanrek"
 treasurefleet.102.d: "Après plus d'un an de navigation, la grande Flotte du Trésor revient de son voyage à travers le continent. Elle apporte d'immenses richesses à [5226.GetName], et par extension à nous. Des marchandises de tout Haless arrivent à la Porte Orientale, et ces richesses sont échangées à travers toute la Fédération."
 treasurefleet.102.a: "Bon retour, marins fatigués."

 treasurefleet.103.t: "La Flotte Accueillie à Nakseseom"
 treasurefleet.103.d: "Les peuples de Nakseseom ont eu vent des incursions de la Flotte sur l'île, mais leur suzerain se soucie peu des pratiques de l'île et nous a informés que la Flotte est la bienvenue pour visiter et commercer pour les reliques qu'elle cherche à revendre. Bien que cela puisse ôter un peu de frisson à l'entreprise, cela éliminera tout risque de conflit."
 treasurefleet.103.a: "Ainsi le commerce prospère !"

