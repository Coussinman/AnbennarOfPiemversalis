 #Province Modifiers
 JY_LF_activator: "Flotte du Trésor Prête !"
 JY_LF_countdown: "Port d'Attache de la Flotte du Trésor"
 JY_LF_countdown_desc: "Chaque décennie, la célèbre §mFlotte du Trésor§! quitte Zurkanrek pour commercer avec les terres au-delà de l'horizon. À son retour, elle rapporte des richesses considérables de l'étranger, ainsi que des récits sur les coutumes locales."
 JY_LF_port: "Port de la Flotte du Trésor"
 JY_LF_port_desc: "Chaque décennie, la célèbre §mFlotte du Trésor§! aborde les rivages de Haless depuis une contrée lointaine. Bien que les visites ne durent que quelques semaines, l'essor temporaire de l'économie est notable."
 JY_LF_trading: "Commerce avec la §mFlotte du Trésor§!"
 JY_LF_visited: "Port Visité"
 JY_LF_visited_desc: "Ceci n'est visible qu'à des fins de test. Ce marqueur indique que la province ne sera pas visitée deux fois. Il devrait être retiré une fois que la Flotte sera retournée à Zurkanrek."
 JY_LF_sell_relics: "Vente de Reliques à la Flotte"
 JY_LF_sell_relics_desc: "En violation flagrante de la volonté des habitants, le contrôleur de l'île a choisi de vendre les artefacts présents à la §mFlotte du Trésor§!."

 #Tooltips
 JY_LF_P_bribe_t: "La §mFlotte du Trésor§! soudoiera les pirates, réduisant les profits finaux mais garantissant un passage sûr."
 JY_LF_P_sneak_t: "La §mFlotte du Trésor§! tentera de se faufiler discrètement au-delà des pirates."
 JY_LF_P_fight_t: "La §mFlotte du Trésor§! tentera de forcer le passage en combattant les pirates."
 JY_LF_P_nah_t: "La §mFlotte du Trésor§! fera demi-tour avant d'entrer dans les eaux infestées de pirates."

 JY_LF_P_bribed_t: "La §mFlotte du Trésor§! nous a soudoyés pour garantir son passage."
 JY_LF_P_caught_t: "Nous avons contraint la §mFlotte du Trésor§! à nous payer après l'avoir interceptée."
 JY_LF_P_beaten_t: "Nous avons vaincu la §mFlotte du Trésor§! au combat."

 JY_LF_bribed_P_t: "Nous avons §Ysoudoyé§! les pirates, réduisant nos profits mais garantissant notre sécurité."
 JY_LF_snuck_P_t: "Nous avons réussi à nous §Gfaufiler§! au-delà des pirates."
 JY_LF_caught_P_t: "Nous avons été §Rinterceptés§! par les pirates alors que nous tentions de nous faufiler. Nous avons dû payer pour notre sécurité."
 JY_LF_beat_P_t: "Nous avons §Gréussi à combattre§! les pirates."
 JY_LF_lost_P_t: "Nous avons été §Rvaincus§! par les pirates, subissant de lourds dégâts."

 JY_LF_watchful: "Nous guetterons la §mFlotte du Trésor§! à l'avenir et lui infligerons des dégâts si nous l'interceptons."
 JY_LF_invited: "Nous permettrons à la §mFlotte du Trésor§! d'acquérir des reliques de l'île."

 JY_LF_P_weak_t: "Les pirates sont relativement faibles. Nous aurions de meilleures chances en les combattant."
 JY_LF_P_weaker_t: "Les pirates sont très faibles. Nous aurions de bonnes chances en les combattant."

 JY_LF_damage: "La §mFlotte du Trésor§! est §Rendommagée§!."
 JY_LF_fix: "La §mFlotte du Trésor§! est réparée."
 JY_LF_damaged: "La §mFlotte du Trésor§! a été endommagée durant son voyage et utilisera ses revenus pour les réparations. (15 couronnes par niveau de dégâts subis)"
 JY_LF_not_damaged: "La §mFlotte du Trésor§! n'a subi aucun dommage durant son voyage."

 JY_LF_som_loot_t: "La §mFlotte du Trésor§! a acquis avec succès des reliques de Nakseseom."
 JY_LF_som_nope_t: "La §mFlotte du Trésor§! ne cherchera plus d'artefacts à Somyonhong."
 JY_LF_som_yep_t: "La §mFlotte du Trésor§! continuera de chercher des artefacts à Nakseseom."
 JY_LF_som_permit_t: "La §mFlotte du Trésor§! commercera paisiblement pour obtenir des artefacts de Nakseseom."

 JY_LF_no_natives: "Commerce avec Moduk refusé"
 JY_LF_tuuchuweg_trade: "La §mFlotte du Trésor§! a gagné quelques couronnes supplémentaires en commerçant avec Moduk."

 JY_LF_expected_yield: "La §mFlotte du Trésor§! lève l'ancre. Nous espérons gagner §Y[5226.JY_LF_yield.GetValue]§! ¤ par port visité."
 JY_LF_cash: "La §mFlotte du Trésor§! a commercé avec §Y[5226.JY_LF_ports.GetValue]§! ports et a rapporté §G[5226.JY_LF_total.GetValue]§! ¤."

 JY_LF_three_ports: "La §mFlotte du Trésor§! visitera ses autres ports sous notre contrôle, mais sans événements supplémentaires."
 JY_LF_wants_news_t: "Tous les événements concernant la §mFlotte du Trésor§! continueront d'être reçus."
 JY_LF_wants_no_news_t: "Seul le premier événement concernant la §mFlotte du Trésor§! chaque décennie sera notifié. Les autres se dérouleront en arrière-plan sans incident."
 JY_LF_wants_no_news_Y15_t: "Le port de §Y[4907.GetName]§! recevra toujours des événements, tant que la §YPorte des Lumières§! aura été construite."

 JY_LF_expansion_t: "La §mFlotte du Trésor§! visitera désormais §Y[4962.GetName]§!, §Y[4701.GetName]§!, §Y[4570.GetName]§!, §Y[4420.GetName]§!, §Y[4380.GetName]§!, §Y[4367.GetName]§!, §Y[4362.GetName]§! et §Y[2913.GetName]§!."

 #Institution Tooltips
 JY_LF_renaissance_l: "La §mFlotte du Trésor§! découvrira la §YRenaissance§! et la diffusera dans son port d'attache."
 JY_LF_new_world_i_l: "La §mFlotte du Trésor§! découvrira le §YColonialisme§! et le diffusera dans son port d'attache."
 JY_LF_printing_press_l: "La §mFlotte du Trésor§! découvrira l'§YImprimerie§! et la diffusera dans son port d'attache."
 JY_LF_global_trade_l: "La §mFlotte du Trésor§! découvrira le §YCommerce Mondial§! et le diffusera dans son port d'attache."
 JY_LF_manufactories_l: "La §mFlotte du Trésor§! découvrira les §YManufactures§! et les diffusera dans son port d'attache."
 JY_LF_enlightenment_l: "La §mFlotte du Trésor§! découvrira les §YLumières§! et les diffusera dans son port d'attache."
 JY_LF_industrialization_l: "La §mFlotte du Trésor§! découvrira l'§YIndustrialisation§! et la diffusera dans son port d'attache."

 JY_LF_spread: "La §mFlotte du Trésor§! a découvert un nouveau concept à Haless."
 JY_LF_taught: "Nous avons appris des voyages de la §mFlotte du Trésor§!."

 JY_LF_l_renaissance: "La §mFlotte du Trésor§! connaît désormais la §YRenaissance§! et la diffusera à Haless là où elle n'est pas encore présente."
 JY_LF_l_new_world_i: "La §mFlotte du Trésor§! connaît désormais le §YColonialisme§! et le diffusera à Haless là où il n'est pas encore présent."
 JY_LF_l_printing_press: "La §mFlotte du Trésor§! connaît désormais l'§YImprimerie§! et la diffusera à Haless là où elle n'est pas encore présente."
 JY_LF_l_global_trade: "La §mFlotte du Trésor§! connaît désormais le §YCommerce Mondial§! et le diffusera à Haless là où il n'est pas encore présent."
 JY_LF_l_manufactories: "La §mFlotte du Trésor§! connaît désormais les §YManufactures§! et les diffusera à Haless là où elles ne sont pas encore présentes."
