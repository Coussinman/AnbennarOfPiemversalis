 JY_LF_port_Y15_mono: "Grand Port de la Flotte du Trésor"
 JY_LF_port_Y15_mono_desc: "Chaque décennie, la célèbre §mFlotte du Trésor§! vient à Haless depuis la Fédération. Alors qu'elle visitait autrefois de nombreux ports à travers l'Est de Haless, elle a concentré ses efforts ici, où elle trouve toutes les marchandises qu'elle recherche."

 JY_LF_Y15_monopoly: "Nous avons reçu toutes nos marchandises de l'Est de Haless de nos amis de §Y[Y15.GetName]§!. Cela compte comme §Y10§! ports."

