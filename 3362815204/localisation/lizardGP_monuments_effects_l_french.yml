l_french:

lizard_precursor_relics: "Découverte d'une ancienne Zatsarya !"
lizard_precursor_relics_desc: "Une ancienne Zatsarya contenant des inventions intactes des Hommes-Lézards Précurseurs a été découverte lorsque des chasseurs d'artefacts ont détecté une étrange résonance magique dans les ruines abandonnées. Les portes pétrifiées n'ont cédé qu'après un décodage complexe des sceaux par des artificiers de Shangra. À l'intérieur, les mécanismes semblaient avoir été laissés hier à peine : des artefacts complexes luisant faiblement et un mystérieux monolithe. De nombreux dispositifs restent fonctionnels, mais leur fonction est perdue. Les chercheurs étudient prudemment cette trouvaille, réalisant que la Zatsarya pourrait redéfinir la compréhension de l'héritage des Hommes-Lézards."

lizard_damestear: "Les Nagas ont invoqué la Damestear !"
lizard_damestear_desc: "Au plus profond du sanctuaire étoilé de Shalazar, les mages nagas accomplissent l'« Invocation de la Veine Astrale ». Rassemblés sous une ancienne carte céleste, ils alignent leur magie avec les mouvements des cieux, traçant des constellations dans une poussière d'étoiles scintillante. Au paroxysme du rituel, le Grand Prêtre ouvre un chemin à travers le voile cosmique, attirant un flux de Damestear, une essence cristallisée d'énergie stellaire pure. Si elle est correctement contenue dans des sceaux enchantés, la Damestear coule sans fin, alimentant sorts et forges arcaniques. Mais un seul faux pas pourrait déchirer le tissu de l'espace, consumant les invocateurs dans un maelström astral."

Vanslave.6.t:0 "§RCommerce de Chair§"
Vanslave.6.d:0 "Les cris des infortunés et le cliquetis des chaînes sont un son bien trop familier dans le grand port de Van. Autrefois réputé pour ses perles et ses marchandises exotiques, il est désormais tristement célèbre comme le cœur battant du commerce des esclaves de l'archipel. Ici, marchands bulwari, esclavagistes raghamideshi et seigneurs de guerre garudas se rassemblent pour inspecter leur cargaison vivante, marchandant des vies comme de simples marchandises. Avec la demande toujours croissante de main-d'œuvre dans les mines, les flottes et les domaines de terres lointaines, les prix ont grimpé en flèche, et le commerce n'a jamais été aussi lucratif."
Vanslave.6.a:0 "La merveilleuse puanteur du profit !"
Vslave_trade:0 "§RCommerce de Chair§"
vslave_tooltip:0 "Le prix des esclaves augmentera de §G100%§!"

allow_palace_decision_title: "Engager un Mage de Bataille"
allow_palace_decision_desc: "La puissance d'Aramoole réside dans l'union de la magie et de la guerre. Dans les halls de l'Académie, de nouveaux talents ont émergé, des guerriers capables de mener nos armées à la victoire. Nous pouvons convoquer l'un des plus fins mages de bataille pour commander nos forces, abattant nos ennemis par le sort et par la lame."

warmage_tooltip1:0 "Accorde l'accès à la décision d'engager un mage de bataille comme si le souverain était un mage puissant avec compétence militaire = 1."
warmage_tooltip2:0 "Accorde l'accès à la décision d'engager un mage de bataille comme si le souverain était un mage puissant avec compétence militaire = 3."
warmage_tooltip3:0 "Accorde l'accès à la décision d'engager un mage de bataille comme si le souverain était un mage puissant avec compétence militaire = 5."

sosal_palace_tier_1: "Peut engager un mage de bataille"
sosal_palace_tier_2: "Peut engager un mage de bataille puissant"
sosal_palace_tier_3: "Peut engager un mage de bataille d'élite"

harpy_monument_3_tier_event.1.t:0 "Plumes de Ma'at – L'Ordre Renaît"
harpy_monument_3_tier_event.1.d:0 "Les guerriers survivants des Plumes de Ma'at se sont présentés à notre cour avec une proposition audacieuse. Jadis, ils se dressaient comme le bouclier inébranlable de Khetet, protégeant leurs semblables de tous ceux qui les menaçaient. Mais après la chute de la Khétérata, leur ordre fut brisé, dispersé aux quatre vents. Pourtant, leur discipline, leur maîtrise de la guerre et leur foi inébranlable restent aussi fortes que jamais.\nGrâce à nos efforts, les Plumes de Ma'at se relèveront, attirant de nouvelles recrues et restaurant leurs traditions perdues. Là où ne restaient que des vestiges épars, un ordre fier et prospère se dressera à nouveau, florissant sous notre direction. Leur esprit combatif inspirera nos soldats, et leur légende perdurera pour les générations à venir.\nÀ présent, ils offrent plus qu'un simple service : ils proposent de remodeler notre armée à leur image. Leurs frappes rapides, leurs manœuvres coordonnées et leurs doctrines de combat ancestrales pourraient devenir le fondement d'une nouvelle tradition militaire. Si nous acceptons, nos armées ne feront pas que se renforcer ; nous ferons le premier pas vers la reconquête de nos terres perdues.\nEmbrasserons-nous leur héritage et forgerons-nous une armée guidée par la sagesse des Plumes de Ma'at ? Ou refuserons-nous, laissant leur ordre sombrer dans l'obscurité ?"
harpy_monument_3_tier_event.1.a:0 "Nous adopterons leurs doctrines militaires !"
harpy_monument_3_tier_event.1.b:0 "Notre armée est déjà assez puissante."

guardian_palace_cooldown: "Impossible d'engager un mage de bataille"

merc_mmwarlock: "Esclavagistes sorciers"

warlockpkk_trade_power: "Main-d'Œuvre Maudite"
warlockpkk_trade_power_desc: "Les travailleurs de cette province ne se fatiguent plus, ne se reposent plus. Les sorciers de Mazu Makhara les ont liés par la magie noire, les transformant en une main-d'œuvre parfaite. La production prospère, le commerce fleurit... mais combien de temps peuvent-ils endurer avant que quelque chose ne cède ?"

warlockpkk_cooldown: "Pacte Récent avec les Sorciers"
warlockpkk_cooldown_desc: "Le sombre accord avec les sorciers de Mazu Makhara est encore frais dans nos mémoires. Leur magie a remodelé notre main-d'œuvre, mais un tel pouvoir n'est pas sans conséquences. Pour l'instant, les sorciers sont satisfaits... mais ils reviendront quand le moment sera venu, exigeant davantage."

warlockpkk_event.2.t:0 "§VMarchandage Ténébreux§"
warlockpkk_event.2.d:0 "Dans une chambre faiblement éclairée, illuminée seulement par la lueur sinistre de sceaux arcaniques, un représentant des sorciers de Mazu Makhara se tient devant nous. Sa voix est froide mais persuasive :\n « Nous savons ce que vous cherchez : richesse, pouvoir, prospérité. Nous pouvons vous accorder tout cela... pour presque rien. »\nIl fait une pause, laissant les mots faire leur effet avant de continuer.\n « Nos maîtres tissent des sorts qui transforment le labeur en travail sans fin, l'ouvrage en perfection infatigable. Vous obtiendrez des travailleurs qui ne se fatiguent jamais, ne faiblissent jamais, ne se plaignent jamais. En retour, nous prendrons ceux dont vous n'avez plus besoin, ceux qui ne sont qu'un fardeau pour votre nation. Vous ne perdez rien de valeur, et pourtant vous gagnez une prospérité illimitée. »\nC'est une offre tentante. Du travail gratuit, une productivité sans fin. Mais quel prix devra vraiment être payé à la fin ?"
warlockpkk_event.2.a:0 "§VNous acceptons votre marché§"
warlockpkk_event.2.b:0 "Nous ne nous souillerons pas avec de telles pratiques"

warlock_decision_title:0 "Pacte Ténébreux avec les Sorciers"
warlock_decision_desc:0 "Les sorciers de Mazu Makhara nous ont offert une opportunité sans pareille. Avec leur magie, ils peuvent remodeler notre main-d'œuvre en quelque chose de bien plus efficace : des travailleurs qui ne se fatiguent jamais, ne résistent jamais, ne s'arrêtent jamais. Tout ce qu'ils demandent en retour, c'est ce que nous rejetterions de toute façon.\nEn acceptant leur offre, notre économie prospérera, et notre production atteindra de nouveaux sommets. Mais une fois ce chemin emprunté, il pourrait ne plus y avoir de retour en arrière."

warlockpkk_yes: "Accorde l'accès à la décision de changer le bien commercial de la province en esclaves, fournissant un puissant bonus de production."
warlockpkk_tlt:0 "Accorde l'accès à la décision de changer le bien commercial de la province en esclaves et donne un puissant bonus provincial"

warlockpkk_event.3.t:0 "Marchandage Ténébreux"
warlockpkk_event.3.d:0 "Les sorciers de Mazu Makhara nous ont approchés avec une proposition sinistre. Ils nous offrent un marché que beaucoup trouveraient abject, mais indéniablement profitable. En échange d'un approvisionnement régulier en esclaves, ils nous promettent une main-d'œuvre efficace et infatigable, sans coût ni fardeau. Le choix nous appartient : accepter leur offre et en récolter les bénéfices, ou la rejeter et maintenir notre intégrité morale, si de telles choses ont encore un sens en ces temps."
warlockpkk_event.3.a:0 "Accepter le marché"
warlockpkk_event.3.b:0 "Rejeter leur offre"

warlockpkk_offer:0 "3 provinces produisant du grain ou du bétail changeront leur bien commercial en esclaves et gagneront un puissant bonus provincial."

half_chgs.4.t:0 "Héritage de Saikinoma"
half_chgs.4.d:0 "Avec leur arrivée à Zuvavim, les halfelins n'ont pas seulement ravivé la mémoire de l'ancienne Saikinoma, mais ont aussi offert leur expertise en administration d'État. Leur connaissance du commerce, de la diplomatie et des routes maritimes pourrait grandement bénéficier à la nation, pourtant beaucoup d'entre eux s'opposent à la stricte discipline militaire et à l'autorité centrale. La question demeure : jusqu'où Zuvavim devrait-il aller dans leur intégration à sa gouvernance ?"
half_chgs.4.a:0 "§GLeur accorder une place dans l'élite dirigeante§"
half_chgs.4.b:0 "§pLimiter leur rôle à l'économie et au commerce§"
half_chgs.4.c:0 "§RNous ne pouvons risquer une influence étrangère§"

vyz_privileges_tt: "Change la culture de la province en amezatany et l'accepte sans perdre d'emplacement de culture"

halfling_integration_mon: "Élite halfeline intégrée"
halfling_integration_mon_desc: "Nous avons accordé aux halfelins une place dans l'élite dirigeante"
halfling_trade_focus: "Marchands halfelins"
halfling_trade_focus_desc: "Le rôle des halfelins dans notre pays est celui de marchands"
halfling_exclusion: "Halfelins exclus"
halfling_exclusion_desc: "Nous excluons les halfelins de la vie du pays"

karshyrrr.7.t:0 "Bienfaits des Marées"
karshyrrr.7.d:0 "Une fois de plus, les Hydromanciens de Karshyra ont démontré leur maîtrise des eaux, portant cette fois leur attention sur les humbles mollusques qui produisent des teintures rares et précieuses. En manipulant soigneusement les courants océaniques, la température et la salinité, ils ont créé des conditions parfaites pour que ces créatures prospèrent, menant à une augmentation sans précédent de leur nombre.\nLes pêcheurs et plongeurs sont les premiers à le remarquer, revenant à terre avec des prises dépassant de loin leurs attentes. Les Maisons de Teinture se préparent déjà à étendre leur production, et les marchands attendent avec impatience une envolée des exportations. À travers les villages côtiers de Karshyra, les célébrations éclatent : un nouveau témoignage de la capacité des Hydromanciens non seulement à commander les mers, mais à guider leur peuple vers la prospérité."
karshyrrr.7.a:0 "Nous sommes bénis !"

karrsk_marin_one: "Punisseurs"
karrsk_marin_one_desc: "Les Fusiliers Marins Karassiens commencent leur parcours comme guerriers d'élite, ayant subi un entraînement brutal au milieu de tempêtes incessantes et de batailles en mer. Ils sont moins vulnérables aux dégâts de choc, et leur moral sur le champ de bataille est renforcé. Ces soldats savent canaliser leur force au corps à corps, infligeant des coups mortels à leurs ennemis."
karrsk_marin_two: "Vétérans de la Mer Mosaïque"
karrsk_marin_two_desc: "Au deuxième niveau, les Fusiliers Marins Karassiens deviennent encore plus aguerris, leur endurance et leurs compétences de combat affinées par de brutales confrontations. Ils reçoivent désormais moins de dégâts des attaques de choc et de feu, et leurs dégâts de choc au combat sont significativement augmentés. Leur moral est plus résilient, leur permettant de tenir des positions et de frapper rapidement leurs adversaires."
karrsk_marin_three: "Diables de la Mer"
karrsk_marin_three_desc: "Au troisième niveau, les Fusiliers Marins Karassiens deviennent des légendes vivantes, de véritables « Diables de la Mer », dont les prouesses au combat sont inégalées. Ces soldats d'élite ne subissent presque aucun dégât des attaques de choc ou de feu, et leur moral reste inébranlable dans les batailles les plus féroces. Leur capacité à infliger des dégâts de choc atteint des sommets sans précédent, et les ennemis craignent de les affronter au combat, sachant qu'ils ne peuvent résister à une telle force implacable."

destr_mint_title: "Profaner l'Hôtel de la Monnaie de Golcora"
destr_mint_desc: "L'ancien Hôtel de la Monnaie de Golcora, jadis un site sacré de commerce et de richesse divine, se dresse encore : intact, inviolé, non réclamé par notre espèce. C'est un symbole de l'arrogance et de l'ordre humains. Détruisons leur héritage doré et refaçonnons-le à notre image : une forteresse de chaînes, de flammes et d'or sans fin, arraché au dos des esclaves."
destr_mint_tooltip: "Remplacer l'ancien Hôtel de la Monnaie de Golcora par un complexe minier aurifère gnoll."
revv_mint_title: "Restaurer l'Hôtel de la Monnaie de Golcora"
revv_mint_desc: "Les feux de Golcora ne brûlent plus pour la cruauté : ils brûlent à nouveau avec un dessein. L'héritage monstrueux de la cupidité gnolle peut être défait. Que les halls de l'hôtel de la monnaie résonnent à nouveau du son de la pièce frappant la pièce, non des cris des enchaînés. Nous restaurerons ce lieu à ce qu'il fut jadis : un témoignage de l'ordre, du commerce et de l'artisanat divin."
revv_mint_tooltip: "Reconstruire l'ancien Hôtel de la Monnaie de Golcora, restaurant sa grandeur originelle."
