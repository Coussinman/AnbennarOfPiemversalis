 escanni_wars_50_years:0 "Les §YGuerres de Consolidation§! d'Escann sont actives depuis §Y50 ans§!."

 escanni_wars_emigration_disallowed:0 "Émigration interdite"
 desc_escanni_wars_emigration_disallowed:0 "Le propriétaire de cette province a interdit à ses sujets de la quitter. En conséquence, les habitants ne sont guère satisfaits."

 escanni_wars_massacred_province:0 "Province massacrée"
 desc_escanni_wars_massacred_province:0 "Cette province a été massacrée par une nation maléfique. Le peu qui subsiste mettra des décennies à redevenir viable."

 escanni_wars_escanni_famine:0 "Grande Famine d'Escann"
 desc_escanni_wars_escanni_famine:0 "La famine frappe tout Escann de plein fouet. Ce pays en subit les pires effets : des villages entiers s'éteignent tandis que les cités ne sont plus que des bourgs. À ce stade, nombre de paysans considèrent les nobles comme une source de nourriture viable."

 escanni_wars_lessened_escanni_famine:0 "Grande Famine d'Escann atténuée"
 desc_escanni_wars_lessened_escanni_famine:0 "La famine frappe tout Escann. Ce pays est parvenu, à grands frais, à en atténuer les pires effets. Des milliers meurent de faim, mais au moins le pays importe des vivres et établit des soupes populaires pour aider où il le peut."

 escanni_wars_mercs:0 "Vétérans de l'Ouest"
 desc_escanni_wars_mercs:0 "La nation est devenue un pôle d'attraction pour les mercenaires de tout Cannor. Dans un tel environnement, nous pouvons être certains d'en avoir pour notre argent avec des vétérans en quête d'une nouvelle aventure."

 escanni_wars_vassal_garrison:0 "Garnison du vassal"
 desc_escanni_wars_vassal_garrison:0 "Notre réserve de main-d'œuvre connaît quelques pénuries, car nous devons en détacher une partie pour aider à garnir notre nouveau vassal jusqu'à ce qu'il s'accoutume à ses nouveaux suzerains."

 escanni_wars_unified_market:0 "Marché Unifié"
 desc_escanni_wars_unified_market:0 "Nous percevons l'intégralité des revenus du marché unifié de tout Escann. Nous avons décidé de les verser dans notre trésorerie pour un usage futur."

 escanni_wars_bankrolled_army:0 "Armée financée"
 desc_escanni_wars_bankrolled_army:0 "Avec tout l'argent que nous tirons du commerce escannien, nous avons décidé de le consacrer à l'entretien de notre grande armée pour la défense nationale."

 escanni_wars_developing_escann:0 "Développement d'Escann"
 desc_escanni_wars_developing_escann:0 "Avec tout l'argent que nous tirons du commerce escannien, nous avons décidé de le consacrer à l'amélioration des infrastructures et au bien-être des civils, afin de nous renforcer sur le long terme."
