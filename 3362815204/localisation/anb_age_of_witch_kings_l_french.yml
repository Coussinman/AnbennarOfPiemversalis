 escanni_wars_escanni_peace:0 "Paix escannienne"
 escanni_wars_escanni_emperor:0 "Empereur escannien"

 escanni_wars.300.t:0 "Des réfugiés fuient notre pays"
 escanni_wars.300.d:0 "[Root.GetName] a connu des jours meilleurs. Depuis le début des guerres, des batailles se sont livrées dans les champs et des armées d'invasion ont pillé les villages alentour pour se ravitailler, laissant dans leur sillage des maisons en flammes, du bétail abattu et des paysans assassinés. En conséquence, les survivants ont rassemblé les maigres biens qui leur restaient et formé une caravane.\n\nLa missive arrivée de nos frontières ce matin n'aurait pas dû nous surprendre. Mais au lieu du rapport habituel d'une escarmouche ou d'un raid, les gardes locaux décrivent une caravane massive se dirigeant vers l'ouest, vers les ports de la Tête-de-Dame. Lorsqu'ils furent arrêtés, les émigrants expliquèrent que leurs fermes et villages de [Root.GetName] avaient été incendiés et qu'au lieu de mourir de faim ou d'être tués par des bandits, ils préfèrent gagner la Baie-des-Trolls, où ils espèrent une vie meilleure. Nous pourrions tenter de les arrêter et de les renvoyer dans leurs bourgs, mais ils tenteront clairement de forcer le passage quoi qu'il advienne, car ils n'ont plus rien à perdre."
 escanni_wars.300.a:0 "Laissons-les partir, nous avons une guerre à mener."
 escanni_wars.300.b:0 "Arrêtez-les ! Ce sont nos sujets !"

 escanni_wars.301.t:0 "Le Massacre de [Root.GetName]"
 escanni_wars.301.d:0 "La scène qui se déroule à [Root.GetName] relève du cauchemar, inédite depuis la Marée Verte. Des villages et des bourgs entiers ont été rasés, l'armée d'invasion faisant preuve d'un mépris flagrant pour la vie des civils, voire se délectant de leur massacre. Avec une férocité inédite depuis Nichmer ou Korgus, ils ont taillé les civils jusqu'à l'os, n'épargnant ni homme, ni femme, ni enfant. Leur armée poursuit sa marche, ne laissant que la mort dans son sillage."
 escanni_wars.301.a:0 "Maudits soient-ils tous !"
 escanni_wars.301.b:0 "Leur erreur !"

 escanni_wars.302.t:0 "La Grande Famine d'Escann"
 escanni_wars.302.d:0 "La guerre fait rage à travers Escann depuis des années. Jusqu'à présent, hormis l'absence béante de jeunes hommes enrôlés dans l'armée depuis chaque village, la vie des civils loin des lignes de front restait supportable, quoique difficile. [Root.Monarch.GetTitle] [Root.Monarch.GetName] a décidé aujourd'hui de faire une promenade hors de sa résidence. Ce qu'il découvre n'est rien de moins qu'une tragédie. Partout dans la capitale, des civils agonisent de faim dans les rues, squelettes ambulants drapés d'un reste de chair. Une famille pleure la mort de son enfant, gisant sans vie devant leur maison. Les prix du pain au marché sont exorbitants, les petits commerçants guère plus gras que les gens du peuple.\n\nLes seuls qui ne meurent pas de faim sont les nobles et les riches, quoique leur sort soit loin d'être enviable. Même ceux qui firent fortune en dominant le commerce de denrées et de marchandises à travers Escann vers les cités, et qui étaient fabuleusement riches, ferment désormais leurs échoppes.\n\nLes ravages de la guerre, de Castonath à Escin, ont réduit la production céréalière à une fraction de ce qu'elle était, et il ne nous reste plus qu'à nous disputer les miettes.\n\nNous ne pouvons guère enrayer la famine, mais nous pouvons imposer un contrôle des prix et indemniser les marchands pour atténuer les souffrances. Autrement, nous pouvons laisser le peuple en supporter le poids, au risque de sa colère."
 escanni_wars.302.a:0 "Nous n'y pouvons rien."
 escanni_wars.302.b:0 "Il nous faut atténuer la famine ! Contraignons les marchands à baisser les prix et nous compenserons les coûts !"

 escanni_wars.303.t:0 "Experts militaires de l'Ouest"
 escanni_wars.303.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] soupire tandis que ses généraux actuels se disputent sans relâche autour de la table de conférence sur la voie à suivre. Malgré leur expérience, nos tactiques sont devenues stériles, faute d'idées nouvelles, ce que démontre clairement un général proposant de perfectionner l'armée en la faisant s'entraîner avec des armes chargées, tandis qu'une autre suggère tout simplement de ne payer les soldats qu'après leurs victoires.\n\nCes deux généraux, quoique très instruits en tactique [Root.GetAdjective], ont l'esprit étroit. Il est évident que l'armée a besoin d'un coup de fouet, mais il semble qu'il nous faille un angle nouveau, des idées qui ne s'enseignent pas dans nos académies de guerre. Il nous faut quelqu'un de l'extérieur.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] se lève et lève les mains. Il déclare : « Tous les deux, faites vos bagages. Avec effet immédiat, vous êtes congédiés. » Tandis que les deux généraux grognent en se faisant escorter par les gardes, [Root.Monarch.GetTitle] [Root.Monarch.GetName] se tourne vers le scribe présent et dit : « Monsieur, je veux que vous envoyiez un message à toutes les cours de l'Ouest pour trouver quelqu'un de plus compétent que ces deux bougres. Assurément, Lorent, Gawed ou même Verne a de meilleurs généraux prêts à être employés. »\n\nLe scribe acquiesce et quitte la salle avec son message, croisant les généraux congédiés sur leur chemin.\n\nDeux mois se sont écoulés depuis que [Root.Monarch.GetTitle] [Root.Monarch.GetName] a lancé son appel aux experts militaires de l'Ouest. Les portes de la salle du trône s'ouvrent, révélant un professionnel d'âge mûr qui ajuste sa veste et s'approche du trône. Le professionnel s'agenouille et explique qu'il gaspillait son temps à entraîner des armées dans sa patrie et qu'il est venu ici pour laisser sa marque dans l'histoire.\n\nSe redressant, [Root.Monarch.GetTitle] [Root.Monarch.GetName] le regarde et dit :"
 escanni_wars.303.a:0 "« Envoyez celui-ci au front. »"
 escanni_wars.303.b:0 "« Vous devriez organiser mon armée. »"

 escanni_wars.304.t:0 "Des vétérans rejoignent nos rangs"
 escanni_wars.304.d:0 "Le capitaine Adran observe ses troupes durant leur entraînement quotidien. Les soldats semblent plus jeunes que d'ordinaire, à peine sortis de l'adolescence et pourtant déjà prêts à mourir pour leur pays. Il soupire, se résignant à envoyer encore plus d'hommes dans le broyeur.\n\nIl s'apprête à mettre fin à l'entraînement du jour lorsqu'il remarque un régiment d'hommes en marche. Ils ont de forts accents anbennariens ; leur chef explique qu'ayant terminé un contrat dans leur pays, ils sont venus en Escann pour combattre dans notre guerre. Adran sourit, sachant qu'il peut désormais démissionner sans culpabilité. La seule question est de savoir s'il veut les laisser combattre à la place des gamins qu'il entraîne, ou s'il préfère qu'ils prennent son poste afin d'utiliser ses économies pour embarquer avec sa femme et son fils sur le prochain navire pour Aelantir. Il s'assied à son bureau et trempe une plume dans un encrier.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] reçoit la lettre du capitaine Adran concernant ces vétérans et la démission immédiate du capitaine. Il réfléchit à ces vétérans et se demande s'il serait préférable de profiter des contrats avantageux ou d'engager leurs capitaines pour former de futurs officiers."
 escanni_wars.304.a:0 "La guerre est un commerce, et les affaires sont florissantes !"
 escanni_wars.304.b:0 "Nous pouvons tirer parti de leur expertise pour améliorer nos propres généraux."

 escanni_wars.305.t:0 "Union Orque"
 escanni_wars.305.d:0 "Au cours du siècle et demi écoulé depuis la fin de la Marée Verte, l'histoire n'a guère été clémente envers nous autres orques. Malgré notre supériorité physique sur les humains, il nous manquait les armes et l'or pour combattre une humanité résolue à nous arrêter. La pique et le mousquet mirent fin à la Marée Verte. Depuis, nous avons perdu des terres, été expédiés outre-mer comme esclaves, et nous en sommes à nos dernières forces.\n\n[Root.GetName] est peut-être la seule exception, ayant réussi à survivre et à se maintenir à l'avant-garde d'Escann, rivalisant avec les plus puissants des royaumes aventuriers. Nous avons compris que la raison pour laquelle les aventuriers repoussèrent la Marée Verte ne tenait pas à la force brute, mais à la magie et à la technologie, alliées à des cités et des villages capables de fournir des centaines de milliers d'hommes pour nous combattre. Nous avons tiré les leçons des humains, abandonnant nos coutumes monstrueuses pour devenir aussi forts qu'eux. Nous avons bâti une économie, modernisé notre armée et commencé à nous sédentariser, nous donnant la puissance de redevenir les plus forts.\n\n[junior_orc.GetName], en revanche, n'a pas eu cette chance. Son histoire n'est qu'une succession de guerres perdues malgré son ardeur au combat, ne devant sa survie qu'à la grâce de ses voisins. Aujourd'hui, cependant, il a reconnu que son pays n'en a plus pour longtemps.\n\n[junior_orc.Monarch.GetName] a approché [Root.Monarch.GetName] avec une offre. Il propose de devenir un partenaire subalterne dans une union avec nous, offrant de nous remettre les rênes du pouvoir afin que nous nous proclamions patrie des orques de tout Escann. [junior_orc.Monarch.GetName] explique que parmi les orques restants en Escann, c'est en nous qu'il place sa confiance, et il préférerait que [Root.Monarch.GetName] porte le flambeau de la civilisation orque.\n\nC'est une offre remarquable, avec toutefois le léger inconvénient de ne pas disposer d'un contrôle immédiat. Si nous acceptons, leurs structures de gouvernance restent intactes et nous exerçons un contrôle moins direct. Nous avons toujours la possibilité de refuser et de simplement prendre leur pays par la force, en éliminant l'intermédiaire."
 escanni_wars.305.a:0 "Nous acceptons pour le bien de la race orque."
 escanni_wars.305.b:0 "Hah ! J'aimerais plutôt voir sa tête quand je le lui prendrai de toute façon !"

 escanni_wars.306.t:0 "Une Demande de Protection"
 escanni_wars.306.d:0 "Tandis que la guerre fait rage à travers Escann, des nations disparaissent de la face de Halann. Un siècle et demi de souveraineté s'évanouit en quelques années, et les frontières changent à chaque escarmouche. Les héritages de plusieurs compagnies d'aventuriers ont été effacés à mesure que les amitiés se défaisaient. En ces circonstances, seuls les plus forts survivront.\n\nDe toute évidence, l'une des puissances mineures à nos frontières, [protection_requested.GetName], estime ne pas être assez forte pour survivre. Son souverain, [protection_requested.Monarch.GetTitle] [protection_requested.Monarch.GetName], a approché notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] avec une offre. En échange de subsides pour rembourser sa dette et de soldats pour garder son territoire, il prêterait serment de vassalité. C'est une bonne offre, mais nous pourrions toujours conserver cette proposition et l'utiliser comme appui légitime pour revendiquer l'intégralité de [protection_requested.GetName] comme nôtre."
 escanni_wars.306.a:0 "Nous n'avons même pas eu à nous battre pour cela !"
 escanni_wars.306.b:0 "J'aimerais mieux le posséder entièrement."

 escanni_wars.307.t:0 "Marché Unifié"
 escanni_wars.307.d:0 "La vie commence à retrouver son cours normal en Escann. Les morts sont enterrés, les champs labourés, et les forges refroidies tandis qu'un sous-continent entier panse ses plaies. À présent, nous commençons à voir les fruits de cette unification nouvelle.\n\nTandis que [Root.Monarch.GetTitle][Root.Monarch.GetName] tient audience, le ministre des finances du pays entre dans la salle du trône, ses vêtements assez somptueux pour rivaliser avec les plus belles robes de la noblesse. Il s'agenouille devant le trône et déclare : « Mon suzerain, le commerce est florissant à travers Escann. Depuis que vous avez unifié le sous-continent, nous observons des développements remarquables. Les droits de douane qui restreignaient la production et nous isolaient des riches champs d'Ionntras ou des montagnes fertiles de Gulenhyl ont disparu, et désormais l'alliage de Steelhyl peut être utilisé par les forgerons de Castonath pour créer des outils d'une qualité exceptionnelle. »\n\nIl reprend son souffle avant de poursuivre : « Nos revenus ont considérablement augmenté, car nous pouvons désormais exporter nos produits supérieurs à travers tout Cannor et le monde. Malgré ces signes prometteurs, l'Étendue et l'Empire nous ont tous deux interdit l'accès à leur pays, prétendument en réponse à la menace que nous représentons pour leurs propres marchés en les inondant de nos marchandises. Je suis certain qu'avec le temps, vous saurez les convaincre du contraire. »\n\nTandis que le ministre des finances se retire, [Root.Monarch.GetTitle] [Root.Monarch.GetName] doit prendre une décision. Les coffres de la nation débordent et ce serait du gaspillage de les laisser dormir. On pourrait dépenser cet argent à améliorer les routes, normaliser les unités de mesure et réduire certaines taxes de vente. Renforcer l'armée pour affronter les nouveaux rivaux de la nation est également une option sensée. Enfin, investir dans des projets intérieurs pour rendre les cités plus prospères et améliorer la vie du peuple pourrait rapporter davantage encore à long terme.\n\nQuel que soit le choix fait, [Root.GetName] entrera dans une ère nouvelle et prospère."
 escanni_wars.307.a:0 "Voici venir les richesses !"
 escanni_wars.307.b:0 "Utilisons cet argent pour financer l'armée."
 escanni_wars.307.c:0 "Utilisons cet argent pour développer nos terres."

