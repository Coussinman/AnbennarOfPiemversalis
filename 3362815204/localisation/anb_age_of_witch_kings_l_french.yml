l_french:
 # Escanni Wars
 escanni_wars.1.t:0 "Les Guerres de Consolidation d'Escann"
 escanni_wars.1.d:0 "Escann a connu bien des formes de guerre au fil des millénaires, qui ont copieusement abreuvé sa terre de sang. Il y eut la croisade de Castan II Fléau-des-Bêtes contre les Bois-Profonds, qui réduisit de vastes forêts en cendres et massacra d'innombrables centaures, satyres et autres créatures féeriques. Il y eut la Guerre du Roi-Sorcier, lorsque la puissance elfique naissante se heurta aux redoutables magies de Nichmer et de ses acolytes. Et bien sûr, il y eut la Marée Verte, qui broya des nations historiques en décombres, des peuples fiers en réfugiés, et de grandes cités en ruines. Mais Escann n'a jamais connu de guerre comme celle-ci.\n\nCe ne sera point une croisade, nul combat du « bien » contre le « mal ». C'est une guerre de frère contre frère, de voisin contre voisin. Il n'est point de guerre plus violente, point de guerre plus vicieuse.\n\nBientôt, une terre qui n'avait que récemment recommencé à entendre les crieurs tellumites verra leur voix remplacée par la cacophonie sinistre et destructrice des canonnades. Les ingénieurs chargés de rebâtir Castonath et les cités à travers le pays se tourneront vers la conception de nouvelles fortifications et pièces d'artillerie.\n\nTous les Escanniens ne redoutent pas les horreurs de la guerre, cependant. Dans de hautes tours et de grands palais, les Rois-Sorciers se rêvent rivaux de Nichmer en personne, bientôt maîtres de tout Escann, que dis-je, de tout Cannor (mais naturellement, toute conquête de ce genre doit commencer par §RCastonath§!). Les marchands de Vertesk et de Nathalairey livrent déjà les dernières armes de Telgeir et de la Côte-du-Dragon en venant chercher des esclaves orques. Et, bien entendu, le nombre de capitaines aventuriers s'offrant au plus offrant a augmenté de manière spectaculaire, les vétérans aguerris ne manquant pas pour rejoindre ces armées de mercenaires."
 escanni_wars.1.a:0 "Le sang et la bataille nous attendent."
 escanni_wars_tt:0 "§YLes belligérants des grandes guerres escanniennes auront accès à des mercenaires venus d'au-delà d'Escann.§!\n\nLe Casus Belli §YGuerre de Consolidation§! devient §Gdisponible.§!\n\nLes §YGuerres de Consolidation§! prendront fin au bout de §Y50 ans§! ou si un pays contrôle les régions de §YCastanor Intérieur, Castanor Méridional et Castanor Occidental§! ainsi que les zones de §YWhistlevale et Cursewood§!.\n\nContrôler §Y100 provinces§! en Escann vous permettra de choisir une §Trécompense de consolidation§! une fois les §YGuerres de Consolidation§! terminées."

 escanni_wars.2.t:0 "Fin des Guerres de Consolidation"
 escanni_wars.2.d:0 "La Guerre du Roi-Sorcier s'acheva lors de la Bataille décisive du Mont-des-Épreuves. C'était un rituel en accord avec l'époque : un tournoi d'hommes et d'elfes sélectionna une poignée des personnages les plus éminents de Cannor pour gravir la montagne, affronter ses épreuves et terrasser Nichmer. Quelques-uns périrent lors du tournoi, bien davantage durant l'ascension, mais en fin de compte, brandissant §OCalindal, la Lame Étincelante§!, Clarimonde d'Oldhaven terrassa le mage noir et mit fin à son règne.\n\nMais nous ne vivons plus en ces temps-là. L'honneur, la chevalerie, autant de mots dont le sens s'est corrompu au fil des siècles écoulés depuis ces hauts faits. Les Guerres de Consolidation d'Escann ne s'achèvent pas par un tournoi ; à vrai dire, elles ne s'achèvent par aucun événement particulier. C'est peut-être ainsi que se déroulait l'histoire jadis, mais ce n'est point la nature de notre chaos présent.\n\nPeut-être la terre est-elle enfin gorgée de sang et ne peut en absorber davantage. Peut-être les soldats sont-ils épuisés, des générations entières abandonnées sur le champ de bataille. Peut-être est-ce simplement la vue de [escanni_wars_victor.Monarch.GetName] de [escanni_wars_victor.GetName] se tenant au sommet de la plus haute flèche de Castonath, proclamant à tous le commencement d'une ère nouvelle. Quel que soit l'élément que désigneront les historiens futurs, nous ne savons pour l'instant qu'une chose : les Guerres de Consolidation sont terminées. Et, au moins pour le plus bref des instants, la paix régnera."
 escanni_wars.2.dunclear:0 "La Guerre du Roi-Sorcier s'acheva lors de la Bataille décisive du Mont-des-Épreuves. C'était un rituel en accord avec l'époque : un tournoi d'hommes et d'elfes sélectionna une poignée des personnages les plus éminents de Cannor pour gravir la montagne, affronter ses épreuves et terrasser Nichmer. Quelques-uns périrent lors du tournoi, bien davantage durant l'ascension, mais en fin de compte, brandissant §OCalindal, la Lame Étincelante§!, Clarimonde d'Oldhaven terrassa le mage noir et mit fin à son règne.\n\nMais nous ne vivons plus en ces temps-là. L'honneur, la chevalerie, autant de mots dont le sens s'est corrompu au fil des siècles écoulés depuis ces hauts faits. Les Guerres de Consolidation d'Escann ne s'achèvent pas par un tournoi ; à vrai dire, elles ne s'achèvent par aucun événement particulier. C'est peut-être ainsi que se déroulait l'histoire jadis, mais ce n'est point la nature de notre chaos présent.\n\nPeut-être la terre est-elle enfin gorgée de sang et ne peut en absorber davantage. Peut-être les soldats sont-ils épuisés, des générations entières abandonnées sur le champ de bataille. Peut-être même le plus hautain des Rois-Sorciers s'est-il lassé de ces affrontements stériles. Quel que soit l'élément que désigneront les historiens futurs, nous ne savons pour l'instant qu'une chose : les Guerres de Consolidation sont terminées. L'idée qu'elles aient eu un « vainqueur » prête à rire. Et, au moins pour le plus bref des instants, la paix régnera."
 escanni_wars.2.dcontrol:0 "La Guerre du Roi-Sorcier s'acheva lors de la Bataille décisive du Mont-des-Épreuves. C'était un rituel en accord avec l'époque : un tournoi d'hommes et d'elfes sélectionna une poignée des personnages les plus éminents de Cannor pour gravir la montagne, affronter ses épreuves et terrasser Nichmer. Quelques-uns périrent lors du tournoi, bien davantage durant l'ascension, mais en fin de compte, brandissant §OCalindal, la Lame Étincelante§!, Clarimonde d'Oldhaven terrassa le mage noir et mit fin à son règne.\n\nMais nous ne vivons plus en ces temps-là. L'honneur, la chevalerie, autant de mots dont le sens s'est corrompu au fil des siècles écoulés depuis ces hauts faits. Les Guerres de Consolidation d'Escann ne s'achèvent pas par un tournoi, mais elles s'achèvent bel et bien avec un vainqueur incontestable. Un seul [escanni_wars_victor.Monarch.GetWomanMan] se tient triomphant au-dessus de tous les Rois-Sorciers prétendants ; un seul pays a surpassé tous les autres : [escanni_wars_victor.GetName]. Aujourd'hui, [escanni_wars_victor.Monarch.GetTitle] [escanni_wars_victor.Monarch.GetName] se tient au sommet de la plus haute tour de Castonath et proclame à tous une vérité qu'ils connaissent déjà : une ère nouvelle est advenue en Escann. Les Guerres de Consolidation d'Escann sont terminées, et pour l'heure, la paix régnera. Mais ce qui adviendra ensuite appartiendra à [escanni_wars_victor.GetName]."
 escanni_wars.2.a:0 "La paix, la paix bénie. Le temps est venu de compter les morts."
 escanni_wars_end_tt:0 "§YLes mercenaires venus d'au-delà d'Escann ne seront plus disponibles.§!\n\nLe Casus Belli §YGuerre de Consolidation§! sera §Rdésactivé.§!"

 escanni_wars.3.t:0 "Une Nouvelle Puissance en Escann"
 escanni_wars.3.d:0 "Castanor débuta comme une puissance modeste, centrée sur la cité balbutiante de Castonath. Castan le Progéniteur n'était au mieux qu'un seigneur de guerre local, même s'il avait le voyant du Chemin-Guide pour l'assister, et était suffisamment talentueux pour unir les Castanites derrière lui. Puis, en l'espace d'une génération, Castan II « Fléau-des-Bêtes » menait une croisade contre les Bois-Profonds. Quelques générations encore, et Castanor dominait Cannor, rivalisant seulement avec la Hiérarchie Gnomique et la République Damérienne.\n\nIl semble qu'une autre puissance en Escann ait suivi cette voie : [Root.GetName]. Émergeant des cendres de la Marée Verte, par la diplomatie et la puissance militaire, ils ont rapidement assuré leur emprise sur une vaste portion de la région. Leur autorité sur Escann est désormais incontestable, même si quelques poches résistent encore.\n\nUne question demeure : que feront-ils ensuite ? Suivront-ils les pas du sage Castan IV « le Bâtisseur-de-Royaumes » ? Du sanguinaire Castan IX « le Querelleur » ? Ou s'inspireront-ils davantage de Nichmer, le Roi-Sorcier ? Seul l'avenir le dira."
 escanni_wars.3.a:0 "Tout Halann observera et attendra."

 escanni_wars.10.t:0 "Dominant en Escann"
 escanni_wars.10.d:0 "Castanor enjambait jadis tout Escann, tout Cannor. Puis il chuta, et dans son sillage, de petits royaumes s'élevèrent. Puis ceux-ci chutèrent à leur tour, s'effritant devant la Marée Verte, et il ne resta que la dévastation.\n\nMais c'en est fini. De bribes, nous avons forgé l'acier. De braises, nous avons allumé un incendie. De modestes bandes d'aventuriers et de royaumes-vestiges, nous avons créé une puissance qui domine tout Escann, et les rares recoins du royaume qui résistent encore à notre autorité tomberont bien assez tôt. Les Guerres de Consolidation sont terminées, et nous avons vaincu.\n\nIl est temps désormais d'élargir notre regard, notre ambition. Où porterons-nous nos yeux ensuite ?"
 escanni_wars.10.dbypass:0 "Castanor enjambait jadis tout Escann, tout Cannor. Puis il chuta, et dans son sillage, de petits royaumes s'élevèrent. Puis ceux-ci chutèrent à leur tour, s'effritant devant la Marée Verte, et il ne resta que la dévastation.\n\nMais c'en est fini. De bribes, nous avons forgé l'acier. De braises, nous avons allumé un incendie. De modestes bandes d'aventuriers et de royaumes-vestiges, nous avons créé une puissance qui domine tout Escann, et les rares recoins du royaume qui résistent encore à notre autorité tomberont bien assez tôt. Bien que cela soit vrai depuis des décennies, la chose s'est désormais cristallisée en un fait indéniable.\n\nIl est temps désormais d'élargir notre regard, notre ambition. Où porterons-nous nos yeux ensuite ?"
 escanni_wars.10.a:0 "Notre trône est agréable. Le Trône de la Colombe d'Anbennar le sera davantage encore, et il nous revient de droit."
 usurp_emperorship_choice_tt:0 "§R[Root.GetName]§! obtient le Casus Belli §YUsurper la Couronne Impériale§! contre l'§YEmpire d'Anbennar§! pour §Y25 ans§!.\nCela nous permettra de faire la guerre à l'§YEmpereur§! et à tous les §YÉlecteurs§! pour le §YTrône de la Colombe§!. Si nous l'emportons, nous deviendrons immédiatement §YEmpereur§!, imposerons la §YSouveraineté Héréditaire§! dans l'EoA, et obtiendrons un important bonus d'§YAutorité Impériale§!."
 escanni_wars.10.b:0 "Nous devons nous refondre à l'image du premier et du plus grand des empires humains : Castanor !"
 escanni_wars.10.c:0 "Proclamons un nouvel empire infernal en Escann, la Grande Terre : Moredhal !"
 escanni_wars.10.e:0 "Le temps de la magie est advenu. Proclamons le Domaine-Noir !"
 escanni_wars.10.f:0 "Tant qu'un recoin de Halann ne voit pas la lumière de Corin, il existe une ombre où le mal peut se terrer. Notre œuvre n'est pas achevée."
 escanni_wars.10.y:0 "Rassemblons les armées, aiguisons les lames, que Halann tremble devant nous !"
 escanni_wars.10.z:0 "Nous avons reconquis la gloire brisée d'Escann. À présent, nous devons la voir prospérer sous notre règne."

 no_more_blademarches_blade_tt:0 "Nous perdrons notre droit de revendiquer Calindal."
 escanni_wars_black_demesne_tooltip:0 "Une décision pour former le §YDomaine-Noir§! est déverrouillée."

 escanni_wars.11.t:0 "Le Nouvel Empereur"
 escanni_wars.11.d:0 "Anbennar signifie l'unité. L'unité signifie Anbennar. Tel fut le rêve du Grand Sommet d'Aranthíl, lorsque des mages forgèrent la paix parmi les seigneurs de guerre querelleurs de l'interrègne post-jexisien. Que les peuples de la Tête-de-Dame puissent s'unir, puissent choisir la paix plutôt que la guerre, la prospérité plutôt que le bain de sang.\n\nMais dès le commencement, cette paix était tissée de mensonges. Maintenue par la seule force des mages, elle dégénéra rapidement en Guerres de Domination. Puis vinrent les Guerres Lilas, première, deuxième, troisième et quatrième. Aujourd'hui, il semble qu'une guerre de plus ait pris fin. Un nouvel Empereur s'assied sur le Trône de la Colombe, une nouvelle dynastie à ajouter à toutes celles qui l'ont disputé au fil des siècles.\n\nÀ Anbenncóst, [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] reçoit la couronne et le sceptre, les mêmes que portèrent jadis Riannón Silmuna, les mêmes que tint Lothane síl Wex III. Les Électeurs observent ; tous connaissent le sort qui les attendrait s'ils osaient protester. Le premier acte de l'Empereur est de déclarer la couronne héréditaire, ne devant jamais quitter la lignée des [Root.Monarch.Dynasty.GetName]. [Root.UsurpEmperorDynasty]\n\nAinsi s'ouvre un nouveau chapitre dans l'histoire d'Anbennar, dans l'histoire de tout Halann."
 escanni_wars.11.a:0 "C'était inévitable."
 dynastySilmuna:0 "Ce qui aurait dû être, ce qui faillit advenir n'eût été la trahison et l'envie, est enfin devenu la vérité de l'Empire."
 dynastyNotSilmuna:0 "Voilà qui montrera aux Silmunas comment on s'y prend !"

 escanni_wars.12.t:0 "Appel aux armes"
 escanni_wars.12.d:0 "Un parvenu escannien a proclamé que le Trône de la Colombe lui revenait de droit, en tant qu'héritier de toute la gloire d'Escann. C'est proprement absurde, et nous avons été appelés à nous ranger aux côtés de l'Empereur pour lui démontrer qu'Anbennar signifie l'unité, et que cette unité est indestructible."
 escanni_wars.12.a:0 "Aux armes !"
 escanni_wars.12.b:0 "Bah, en avons-nous vraiment quelque chose à faire ?"

 escanni_wars.20.t:0 "Une Crise d'Identité"
 escanni_wars.20.descWar:0 "Pour [Root.Monarch.GetName], les jours suivant la fin des Guerres de Consolidation d'Escann sont emplis d'ennui. Un ennui joyeux, certes, car sous le règne de [Root.Monarch.GetName], [Root.GetName] trône désormais au sommet de tout Escann, mais de l'ennui tout de même. Plus de nuits blanches, obsédé par les mouvements d'armées et les lignes de front. Plus de repas dans l'angoisse, se demandant si un mage ennemi percerait les défenses magiques pour faire irruption dans la salle en un éclair de destruction. L'esprit libre de vagabonder, [Root.Monarch.GetName] se surprend à penser souvent à Castanor, le premier et le plus grand des empires humains de Cannor. Comment quiconque pourrait-il être à la hauteur d'un tel héritage ?\n\nDéchargé des responsabilités de la guerre, [Root.Monarch.GetName] passe de plus en plus de temps à déambuler entre les bustes de marbre et les statues de pierre de l'Allée-du-Panthéon de Castonath. Le silence relatif du quartier, que beaucoup utilisent comme refuge contre les clameurs incessantes des marchands et le murmure sourd du reste de la cité, était au contraire assourdissant pour [Root.Monarch.GetName], laissant pensées importunes et doutes s'engouffrer sans entraves. Des doutes, sur la nature du pouvoir, sur l'avenir de [Root.GetName], entre autres. Et ainsi, [Root.Monarch.GetName] chercha sagesse et discernement en marchant entre les scènes à jamais figées des Castans d'antan.\n\nComment ces figures quasi mythiques forgèrent-elles Castanor en un empire s'étendant sur tout un continent ? Comment assurèrent-elles la prospérité de leur peuple ? Comment apportèrent-elles la civilisation à tout Cannor sans interruption durant tant de siècles, à travers d'innombrables périodes de guerre et de conflit, de la Xhazobine gnoll démoniaque aux derniers soubresauts des puissants Géants se brisant contre les murs de Castanor, en passant par l'avènement destructeur de Zaamalot le Noir durant l'Éveil-du-Dragon, noircissant Castonath elle-même sous le feu draconique ?"
 escanni_wars.20.descBypass:0 "Castanor, le plus grand de tous les empires humains de Cannor, s'enorgueillissait d'apporter la civilisation aux terres autrefois sauvages de Cannor. Sous Castan II « Fléau-des-Bêtes », les Bois-Profonds, gangrenés par la féerie, furent réduits de moitié, permettant aux établissements humains de croître et de prospérer. Sous Castan VI « Fléau-des-Géants », les derniers géants meurtriers furent chassés de la frontière septentrionale. Les Castans suivants ajoutèrent davantage de terres sous leur règne éclairé, dont les conséquences se font encore sentir en ceci qu'une grande partie de Cannor parle encore quelque variante du Commun. Comment une nation pourrait-elle être à la hauteur d'un tel héritage ?\n\n[Root.Monarch.GetName] passe de plus en plus de temps à déambuler entre les bustes de marbre et les statues de pierre de l'Allée-du-Panthéon de Castonath. Le silence relatif du quartier, que beaucoup utilisent comme refuge contre les clameurs incessantes des marchands et le murmure sourd du reste de la cité, était au contraire assourdissant pour [Root.Monarch.GetName], laissant pensées importunes et doutes s'engouffrer sans entraves. Des doutes, sur la nature du pouvoir, sur l'avenir de [Root.GetName], entre autres. Et ainsi, [Root.Monarch.GetName] chercha sagesse et discernement en marchant entre les scènes à jamais figées des Castans d'antan.\n\nComment ces figures quasi mythiques forgèrent-elles Castanor en un empire s'étendant sur tout un continent ? Comment assurèrent-elles la prospérité de leur peuple ? Comment apportèrent-elles la civilisation à tout Cannor sans interruption durant tant de siècles, à travers d'innombrables périodes de guerre et de conflit, de la Xhazobine gnoll démoniaque aux derniers soubresauts des puissants Géants se brisant contre les murs de Castanor, en passant par l'avènement destructeur de Zaamalot le Noir durant l'Éveil-du-Dragon, noircissant Castonath elle-même sous le feu draconique ?"
 escanni_wars.20.a:0 "Il nous faut méditer là-dessus…"
 escanni_wars_reflecting_on_past_castans:0 "Méditations sur Castanor et les Castans d'Antan"
 desc_escanni_wars_reflecting_on_past_castans:0 ""

 escanni_wars.21.t:0 "Les Épreuves Abandonnées de Castan"
 escanni_wars.21.desc:0 "La réponse à la grandeur et à la longévité de Castanor, [Root.Monarch.GetName] en était venu à le croire de manière obsessionnelle, résidait dans les mystérieuses Épreuves de Castan. Bien des détails restent vagues, peut-être perdus au gré des caprices du temps, mais les récits s'accordent sur quelques points. Les Épreuves étaient une tradition instaurée par Castan II « Fléau-des-Bêtes », cherchant à marcher dans les pas du Progéniteur. Après avoir gravi le Mont-des-Épreuves comme Castan le Progéniteur l'avait fait, Fléau-des-Bêtes ajouta sa propre épreuve que tout futur Castan devrait accomplir, et ainsi la tradition se perpétua, chaque Castan successif ajoutant son propre défi. Ce n'est qu'en prouvant sa valeur dans ces Épreuves toujours plus complexes que l'on pouvait prouver sa dignité de devenir le prochain Castan.\n\nTout cela prit fin avec la Guerre du Roi-Sorcier et l'ultime Bataille du Mont-des-Épreuves. Beaucoup affirment que les énergies magiques et les forces destructrices déchaînées par la bataille ont à jamais souillé le Mont-des-Épreuves. À tout le moins, la bataille rendit la montagne inaccessible durant des années. Les récits de pièges magiques encore actifs, de poches d'énergie sombre, et même d'échos des apparitions spectrales du Roi-Sorcier lui-même tinrent la plupart à l'écart, même tandis que Castellyr et Escann commençaient à se consolider et à prospérer dans les siècles suivants. Pour le commun des mortels, le Mont-des-Épreuves et les Épreuves de Castan sont depuis longtemps entrés dans l'histoire, chassés de la conscience collective par des événements tels que la Marée Verte et les Guerres de Consolidation d'Escann.\n\n[Root.Monarch.GetName] ne s'en satisfit point. Assurément, certaines des Épreuves auraient survécu. Assurément, des siècles auraient dissipé les pires dangers résiduels du Mont-des-Épreuves. Et surtout, affronter les Épreuves ouvrirait assurément l'esprit de [Root.Monarch.GetName] à la sagesse et au discernement des plus grands Castans, rien qu'en suivant leurs traces !\n\nEntre-temps, le Mont-des-Épreuves était envahi par la végétation. La Route de la Gloire tombait en ruines, nombre des sentiers menant aux différentes Épreuves avaient été engloutis par les racines voraces des arbres, et la Citadelle Nord n'était plus que l'ombre d'elle-même sans l'ancien aqueduc pour l'alimenter. Avant que quiconque puisse tenter à nouveau les Épreuves de Castan, il fallait les reconquérir sur le temps et la nature sauvage. Pendant ce temps, [Root.Monarch.GetName] pourrait consacrer tout son temps à étudier jusqu'au moindre détail chacun des Castans et à se préparer aux épreuves."
 escanni_wars.21.a:0 "Accordons la priorité absolue à la restauration des épreuves !"

 escanni_wars.22.t:0 "Les Épreuves de Castan, restaurées !"
 escanni_wars.22.desc:0 "Enfin, la restauration des Épreuves de Castan était achevée ! Avant que [Root.Monarch.GetName] ne puisse se réjouir outre mesure, cependant, un petit contingent des patriciens de Castonath, ayant eu vent de l'achèvement de la restauration, se présenta. Certaines factions et familles patriciennes se montrent plus protectrices de l'histoire et de l'héritage castanorien que d'autres, et celle-ci appartenait clairement à l'une de ces familles qui tirent une immense fierté de faire remonter leur lignée directement aux tout premiers Castanites. Orgueilleux et hautains comme à l'accoutumée, ils firent rapidement connaître leurs intentions : ils souhaitaient dissuader [Root.Monarch.GetName] de tenter les Épreuves. Ils mirent [Root.Monarch.GetName] en garde contre les dangers que représentent les Épreuves, les conséquences de raviver une telle tradition à l'époque moderne, et par-dessus tout, de souiller l'héritage de Castanor. Selon eux, seuls ceux descendant du sang du Vieux Castanor peuvent régner, ce qui signifie que seuls ceux partageant le sang des Castanites originels peuvent devenir Castan. Ils citent les Proclamations de Castan, qui stipulent :\n« Désormais, tous ceux qui m'ont suivi et qui ont enduré avec moi seront connus comme MON peuple : les Castanites, et les successeurs de notre royaume seront de votre sang et de votre sang seul. »\n\n[Root.Monarch.GetName] balaya cela d'un revers de main, bien entendu, car la proclamation n'avait-elle pas été violée par Castan Givre-d'Ébène et ses successeurs, qui étaient tous gérudiens ?"
 escanni_wars.22.a:0 "N'en tenons pas compte. Passons maintenant au plus difficile : réussir les épreuves…"
 escanni_wars_form_castanor_unlocked_tt:0 "Nous débloquerons la possibilité de tenter les Épreuves de Castan et de reformer Castanor à tout moment"

 escanni_wars.30.t:0 "Domination des Sociétés"
 escanni_wars.30.d:0 "Avec la proclamation de Moredhal, la place des sociétés secrètes dans notre État s'est enracinée. Elles ne sont plus véritablement secrètes ; libérées du besoin de se dissimuler, elles recrutent et agissent désormais ouvertement comme les unités politiques fondamentales de notre nation."
 escanni_wars.30.a:0 "Notre destinée est manifeste."

 escanni_wars.200.t:0 "Escann sur la voie de la réunification"
 escanni_wars.200.d:0 "Depuis l'Exode Castanite, lorsque les Castanites brisèrent leurs chaînes et fuirent en quête de liberté et de terres nouvelles, Escann a été le théâtre de conflits funestes. Ce fut d'abord Castan le Progéniteur et sa campagne contre les gnolls, à l'issue de laquelle il unifia Escann pour la première fois. Puis, plus tard, vinrent d'autres Castans, qui tous étendirent les frontières de Castanor au-delà d'Escann. Des années de paix et de stabilité suivirent les expansions, mais elles ne durèrent pas éternellement. Vinrent d'abord les multiples Guerres de Domination, où la Hiérarchie Gnomique, la République Damérienne et Castanor livrèrent plusieurs guerres entre eux. Puis, en 470 AA, survint l'Éveil-du-Dragon, au cours duquel les dragons s'éveillèrent et Escann se fractura pour la première fois depuis son unification sous la bannière de Castanor. En l'an 978 AA, Nichmer le Roi-Sorcier asservit le dernier empereur du Dernier Empire de Castan, qui sous la domination gérudienne en était venu à être connu sous le nom de Castanor Noir, et à l'issue de la Guerre du Roi-Sorcier qui s'ensuivit, Escann fut brisé en une multitude de petits États.\n\nL'effondrement total d'Escann advint sous la bannière de Dookanson et d'une masse sans fin d'orques déferlant de l'Échine-du-Serpent, qui ravagea les quelques États d'Escann encore debout. Seule la mort de Korgus Dookanson de la main de Corin parvint à briser la marée et à offrir à Escann une nouvelle chance. Les combats ne cessèrent pas pour autant, et au lieu de s'affronter aux orques, les aventuriers se battirent désormais aussi entre eux pour se tailler de nouveaux États-nations pour eux-mêmes et leurs compagnies. À présent, au sortir de ces graves troubles, Escann est enfin sur la voie d'une nouvelle unification sous une seule bannière."
 escanni_wars.200.a:0 "[Root.GetName] réunifiera Escann !"
 escanni_wars_bypass_tt:0 "Escann sera à nouveau uni si un pays contrôle §YCastanor Intérieur, Castanor Méridional et Castanor Occidental§! ainsi que les zones de §YWhistlevale et Cursewood§!"

