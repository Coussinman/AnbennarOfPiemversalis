 #Castonath Wonders
 castonath_wonders.1.t:0 "Appartements Impériaux achevés"
 castonath_wonders.1.d:0 "Si la majeure partie du Palais Impérial est utilisable, d'importantes rénovations doivent être effectuées dans l'enceinte du palais et les bâtiments avoisinants de la Haute-Ville si nous voulons y établir notre centre de pouvoir autour de la Cour Splendide. Les Appartements Impériaux finiront par héberger la majorité de la noblesse du royaume et quiconque souhaite gagner les faveurs de [Root.Owner.Monarch.GetTitle]."
 castonath_wonders.1.a:0 "Votre nouvelle demeure vous attend !"

 castonath_wonders.2.t:0 "Tous les chemins mènent à la Cour Splendide"
 castonath_wonders.2.d:0 "Castonath fut jadis le cœur de l'humanité, et le cœur de toute civilisation. Grâce à nos rénovations du Palais Impérial et aux appartements, bâtiments et structures attenants construits et restaurés, nous sommes désormais mieux à même de consolider l'État tout en maintenant la noblesse occupée par la version moderne du pain et des jeux castanoriens : des bals splendides et des jeux de salon."
 castonath_wonders.2.a:0 "GOUVERNEMENT DIRECT DEPUIS CASTONATH !"

 castonath_wonders.3.t:0 "Démolition des taudis du Vieux Bazar"
 castonath_wonders.3.d:0 "Durant la plus grande partie de l'histoire récente, le Grand Bazar était connu sous le nom de « Vieux Bazar », l'un des taudis les plus mal famés de Castonath. Par une combinaison de pots-de-vin, d'incitations au départ et de force militaire, nous sommes parvenus à déloger la plupart des anciens occupants, ainsi qu'à démanteler toute construction qu'ils avaient ajoutée au complexe. Le vrai travail commence maintenant : rénover et restaurer la structure antique elle-même."
 castonath_wonders.3.a:0 "Du balai !"

 castonath_wonders.4.t:0 "Le Grand Bazar : inauguration"
 castonath_wonders.4.d:0 "Fanfares et foule se rassemblent tandis que [Root.Owner.Monarch.GetName] coupe le ruban pour rouvrir le Grand Bazar.\n\nDes clients venus du monde entier sont venus s'émerveiller devant la structure rénovée : un immense complexe pouvant accueillir plus d'une centaine de boutiques et d'échoppes, toutes abritées des intempéries. Si seul le cœur du Grand Bazar a été occupé par un premier ensemble de commerces, de nombreuses autres galeries commerciales seront bientôt disponibles à la location."
 castonath_wonders.4.a:0 "Les affaires sont florissantes."

 castonath_wonders.5.t:0 "Ruines de la Forge-du-Dragon déblayées"
 castonath_wonders.5.d:0 "Lorsque la Marée Verte enfonça les portes de Castonath, les Forgerons-de-Balgar tinrent bon pendant plus d'un an au sommet de la Forge-du-Dragon et de ses créneaux adjacents. Cependant, la menace orque finit par devenir trop grande et les Forgerons-de-Balgar embrasèrent la Forge-du-Dragon, détruisant une grande partie de la fonderie et de la structure d'origine pour empêcher les orques de s'en servir.\n\nMaintenant que nous avons déblayé les décombres et les destructions, nous pouvons enfin nous atteler à restaurer les mécanismes internes de la forge."
 castonath_wonders.5.a:0 "Ils ont vraiment fait des ravages."

 castonath_wonders.6.t:0 "La Forge-du-Dragon reconstruite"
 castonath_wonders.6.d:0 "Alliant les dernières innovations en métallurgie tout en respectant la conception naine d'origine, les flammes de la Forge-du-Dragon peuvent à nouveau être aperçues dans la ligne d'horizon de Castonath. Des milliers de forgerons, d'artisans et même d'artificiers affluent vers la forge et les quartiers environnants. L'une des premières lignes de production de la Forge-du-Dragon a déjà expédié son premier lot d'armes produites en série, prêtes à être utilisées par les armées de [Root.Owner.GetName]."
 castonath_wonders.6.a:0 "Une Flamme Ravivée"

 castonath_wonders.10.t:0 "Des orques dans les ruines"
 castonath_wonders.10.d:0 "Castonath est une vaste cité. Une cité bâtie pour un empire s'étendant sur tout un continent, et à ce titre, nombre de ses quartiers n'ont toujours pas été entièrement fouillés et repeuplés. Dans [Root.GetName], nous sommes tombés sur une tribu d'orques jusque-là inconnue, tapie dans ces ruines. En étant découverts, ils ont massacré l'équipe de travail et se sont mis à semer le chaos à travers le quartier !"
 castonath_wonders.10.a:0 "De la vermine !"

 castonath_wonders.11.t:0 "Effondrement de ruines"
 castonath_wonders.11.d:0 "S'il est une chose qui ne manque pas à Castonath, c'est bien la pierre. Et dans [Root.GetName], une partie d'un bâtiment antique s'est effondrée sur les ouvriers qui le déblayaient. Le peuple s'inquiète pour sa sécurité et les veuves des ouvriers exigent des réparations pour les défunts."
 castonath_wonders.11.a:0 "On peut les remplacer."
 castonath_wonders.11.b:0 "Indemnisons leurs veuves."

 castonath_wonders.12.t:0 "Artefact antique découvert"
 castonath_wonders.12.d:0 "Un artefact castanorien antique a été retrouvé dans les ruines en cours de déblaiement à [Root.GetName]. Sa vente devrait contribuer à compenser les coûts de construction de [Root.CastonathWonder]."
 castonath_wonders.12.a:0 "Magnifique !"

 castonath_wonders.13.t:0 "Ouvriers mécontents de leur paie"
 castonath_wonders.13.d:0 "Les ouvriers de [Root.GetName] travaillant à la construction de [Root.CastonathWonder] ont exigé une augmentation après avoir constaté les sommes dépensées pour le chantier."
 castonath_wonders.13.a:0 "Ils ne méritent rien de plus."
 castonath_wonders.13.b:0 "Augmentons leur paie."

 castonath_wonders.14.t:0 "Matériaux de mauvaise qualité"
 castonath_wonders.14.d:0 "Nous avons décelé des défauts dans les matériaux livrés pour la construction de [Root.CastonathWonder]. Il nous faudra acheter de nouveaux matériaux pour les remplacer."
 castonath_wonders.14.a:0 "Achetons de nouveaux matériaux."

 castonath_wonders.15.t:0 "Beauté inattendue"
 castonath_wonders.15.d:0 "Une section de [Root.CastonathWonder] a été bâtie avec une beauté surpassant toutes les attentes. Elle deviendra un lieu prestigieux pour accueillir dignitaires étrangers et envoyés, afin de leur présenter les derniers développements de notre projet."
 castonath_wonders.15.a:0 "C'est un spectacle à couper le souffle."

 build_splendid_court_title:0 "Édifier la Cour Splendide"
 build_splendid_court_desc:0 "Dans les années 1670, le Royaume de Núrcestir rénova le Palais Impérial délabré de Castonath, et en moins d'un an, il devint le siège du gouvernement. Par la suite, la maison royale, d'une immense influence, s'y installa et ouvrit ses portes à tout courtisan et noble désireux de jouir des grâces de la couronne. Cela permit à Núrcestir de consolider l'État tandis que la noblesse était distraite par des bals splendides et des jeux de salon."
 castonath_splendid_court:0 "La Cour Splendide"
 desc_castonath_splendid_court:0 "La Cour Splendide est le nom donné au Palais Impérial rénové et à ses terrains royaux, y compris des appartements pour les courtisans. Elle est conçue non seulement pour abriter un empire, mais aussi pour divertir et unifier un empire sous un seul souverain et un seul gouvernement."

 build_grand_bazaar_title:0 "Édifier le Grand Bazar"
 build_grand_bazaar_desc:0 "Le Grand Bazar était un immense marché couvert au centre du Quartier Bas de Castonath. À l'apogée de l'Empire de Castan, il regorgeait de marchands proposant des biens venus des confins les plus reculés de l'empire et d'au-delà, au point que l'on pouvait y trouver des marchandises provenant du lointain Yanshen. Sous le Dernier Empire de Castan, la majeure partie du Bazar fut reconvertie en un vaste bidonville, mais quelques patriciens conservent encore les anciens plans, prêts à être utilisés si nous nous trouvons en position de lui restituer sa gloire d'antan."
 castonath_grand_bazaar:0 "Le Grand Bazar"
 desc_castonath_grand_bazaar:0 "Un immense marché couvert et complexe commercial capable d'accueillir des centaines de commerces et de boutiques. Un véritable temple du négoce."

 build_dragonforge_title:0 "Reconstruire la Forge-du-Dragon"
 build_dragonforge_desc:0 "La Forge-du-Dragon fut bâtie par Balgar le Bâtisseur pour produire armes et armures destinées aux légions castanoriennes d'antan. Après la chute de Castanor, l'Ordre des Forgerons-de-Balgar, les prêtres-artisans qui vénéraient Balgar, en fit sa demeure, jusqu'à la Marée Verte, lorsque l'ordre détruisit une grande partie de la forge pour empêcher la machine de guerre de Korgus Dookanson de s'en servir."
 castonath_dragonforge:0 "La Forge-du-Dragon"
 desc_castonath_dragonforge:0 "L'une des merveilles de Balgar le Bâtisseur, la Forge-du-Dragon produisait jadis les armes des légions de Castanor. La Forge-du-Dragon est une fonderie massive qui trône sur l'une des collines naturelles de Castonath (depuis longtemps recouverte de pierre). Au sommet de la forge se dresse une immense tête de dragon que l'on peut voir cracher le feu lorsque de grandes cargaisons de métal y sont fondues."

 building_castonath_preparation:0 "Préparation de la Merveille"
 building_castonath_build:0 "Construction de la Merveille"

