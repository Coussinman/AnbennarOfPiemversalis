 #events
 cardesti_events.5.t:0 "L'Arrivée des Cardesti"
 cardesti_events.5.d:0 "Le peuple nomade des Cardesti, célèbre pour ses talents de divination, son artisanat et ses traditions bardiques, est originaire des lointaines plaines fluviales verdoyantes du Rahen, près du puissant fleuve Kharunyana. Ce peuple possède une longue histoire de voyages à travers le monde et nulle part où s'établir, mais il n'en fut pas toujours ainsi.\n\nAyant fui les ravages causés par les conquêtes d'Harimar, les Cardesti voyagèrent vers l'ouest à travers le Bulwar pour atteindre le Dominion castanorien de Dostanor. Accueillis pour s'y établir, les Cardesti développèrent bientôt leurs communautés et leur artisanat, pour être de nouveau contraints à la fuite après avoir été accusés d'être à l'origine de la Folie-de-Daravan et d'avoir égaré le roi Daravan, lui-même à demi cardesti.\n\nMenant une vie nomade durant de longues années, les Cardesti trouvèrent une nouvelle chance de s'établir sur une terre qu'ils pourraient appeler leur, sous le règne de la puissante voyante Dunicha, qui les vit coloniser le Val Abandonné. Jadis favorite parmi l'élite castanorienne, Dunicha la « Reine Augure » mena l'État de la Grande Cardest à la prééminence à travers les Marches et Dostanor, mais fut abandonnée par ses alliés lors de l'ascension de Castan Givre-d'Ébène, qui envahit les terres cardesti. Trahie par certains des siens, qui conclurent un accord pour échapper à la guerre et reprendre leur errance nomade, la Reine Augure maudit de son dernier souffle les forêts de sa patrie et les descendants de ses parents perfides, déclarant :\n\n« Vous et votre sang serez à jamais prisonniers de mes terres, et nul Homme de l'Au-delà n'appellera jamais mes terres son foyer. Et à mon sang de l'Au-delà, une malédiction éternelle et maléfique. On vous a offert un lieu où enraciner vos vies, mais vous avez fui vers les terres sauvages. Et fuir vous continuerez, car quiconque de mon sang osera prendre racine se flétrira et périra en moins d'une quinzaine. »\n\nLa Malédiction de la Reine empoisonna la terre et son peuple : le Val Abandonné demeura inhabitable jusqu'à ce que les elfes d'Ibevar se révèlent immunisés contre la malédiction qui avait empêché les Castanoriens de recoloniser la Grande Cardest. Les Cardesti, quant à eux, furent condamnés à errer pour toujours, incapables de demeurer au même endroit plus de deux semaines, sous peine de se flétrir et de périr dans d'atroces souffrances. Ainsi voyagent-ils, contraints au mouvement, maudits et rarement accueillis avec confiance par les peuples sédentaires de Cannor, aspirant à un foyer mais toujours sur les routes."
 cardesti_events.5.a:0 "Nous verrons comment ils s'en tirent."

 cardesti_events.6.t:0 "L'Assemblée des Cardesti"
 cardesti_events.6.d:0 "Un important groupe de nomades cardesti a franchi nos frontières et pénétré dans notre domaine. Ces gens sont un peuple singulier : ayant maîtrisé l'art magique de la divination, leurs diseurs de bonne aventure sont fort populaires auprès de ceux qui peuvent s'offrir leurs services. De surcroît, en tant que voyageurs expérimentés, ils ont acquis des techniques artisanales uniques et leurs bardes sont hautement prisés. Cependant, le contraste marqué entre les coutumes en vigueur à [Root.GetName] et celles des Cardesti pourrait s'avérer source de troubles à l'avenir…"
 cardesti_events.6.a:0 "Laissons-les vaquer à leurs affaires, pour le moment…"
 cardesti_events.6.b:0 "Qu'ils vivent en paix, et chargeons mes conseillers de gérer les futures migrations."

 cardesti_events.7.t:0 "La Diseuse de Bonne Aventure cardesti"
 cardesti_events.7.d:0 "Un membre de la communauté migrante cardesti actuellement établie à [Root.GetName] s'est fait connaître grâce à des prédictions successives et exactes d'événements futurs, anticipant des faits importants tels que des tempêtes de pluie imminentes ou des attaques de monstres, et même des choses plus modestes et personnelles, comme de savoir si un couple de jeunes mariés aura un fils ou une fille. Grâce à un mélange de talent magique et de millénaires d'expérience transmis par leurs prédécesseurs, les Cardesti jouissent d'une grande renommée dans le domaine de la divination. Peut-être le [Root.Owner.Monarch.GetTitle] a-t-il quelques questions auxquelles il souhaiterait des réponses ?"
 cardesti_events.7.a:0 "Superstitions absurdes !"
 cardesti_events.7.b:0 "Voyons ce que l'avenir nous réserve !"
 cardesti_events.7.c:0 "Voyons si nos visions concordent !"
 cardesti_events.7.1:0 "Vous me dites donc que l'équipe précédente conservera son titre de champion ?"
 cardesti_events.7.e:0 "Voilà une excellente occasion d'apprendre !"
 cardesti_events.7.f:0 "Y a-t-il quelqu'un de spécial dans mon avenir ?"
 cardesti_events.7.g:0 "Dois-je renforcer ma garde personnelle ?"
 cardesti_random_advisor_tt:0 "Obtenir un conseiller de compétence §Y1§!, d'héritage §Y[Root.Culture.GetName]§!, suivant §Y[Root.Religion.GetName]§! à [Root.Country.GetName]. Ce conseiller coûte §G25 %§! moins cher à employer."

 cardesti_events.8.t:0 "Les artisans cardesti surpassent les guildes locales"
 cardesti_events.8.d:0 "Ayant acquis des connaissances auprès de divers maîtres étrangers au cours de leurs voyages, les forgerons cardesti sont très compétents et innovants lorsqu'il s'agit de créer des ouvrages et des bibelots de grande qualité. Récemment, un représentant de la guilde des forgerons de [Root.GetName] s'est présenté à la cour pour déposer une plainte concernant les forgerons cardesti installés dans un petit campement aux abords de la ville. Le messager de la guilde affirme que les Cardesti leur volent leurs clients et perturbent les prix fixés par la guilde. Ils exigent que nous prenions des mesures immédiates et que nous punissions leurs pratiques « illégales »."
 cardesti_events.8.a:0 "Nous devons protéger l'économie locale."
 cardesti_events.8.b:0 "Pourquoi n'apprendriez-vous pas une chose ou deux des Cardesti ?"
 cardesti_events.8.c:0 "Envoyons quelques artisans talentueux étudier les techniques cardesti !"
 cardesti_events.8.1:0 "Coopérez, ou vous paierez tous le double d'impôts !"
 cardesti_events.8.e:0 "Profitons de cette occasion pour acquérir les commerces locaux."

 cardesti_events.9.t:0 "Les Cardesti demandent protection"
 cardesti_events.9.d:0 "Un nomade horrifié a demandé une audience urgente auprès du [Root.Owner.Monarch.GetTitle] ! Il affirme que leur ancien, un puissant devin, a prédit qu'une populace locale enragée attaquerait leur campement dans un avenir proche. Le messager est à genoux, implorant quelques soldats pour protéger leur camp et empêcher cette atrocité. Cependant, un conseiller à proximité murmure à l'oreille de [Root.Owner.Monarch.GetName] que si nous accédons à cette requête, nous risquons de nous aliéner la population locale en accordant un traitement de faveur aux Cardesti étrangers."
 cardesti_events.9.a:0 "Envoyons-leur quelques soldats disponibles !"
 cardesti_events.9.b:0 "Nos soldats sont nécessaires ailleurs…"
 cardesti_events.9.c:0 "Envoyons un avertissement au gouverneur local et ordonnons-lui de disperser la foule !"
 cardesti_events.9.1:0 "Envoyons une escouade arrêter les conspirateurs potentiels !"

 cardesti_events.10.t:0 "Contes populaires et superstitions"
 cardesti_events.10.d:0 "La paysannerie illettrée est connue pour ses superstitions absurdes, et il semble que cette fois, les Cardesti soient au premier plan de la suspicion populaire à [Root.GetName]. Les habitants accusent les Cardesti d'user de magie interdite pour altérer l'avenir et attirer le malheur sur la province. Le gouverneur local nous a envoyé une lettre, avertissant le [Root.Owner.Monarch.GetTitle] qu'une présence prolongée des Cardesti pourrait engendrer davantage de troubles et d'agitation."
 cardesti_events.10.a:0 "Êtes-vous sot ? Ils ne font que célébrer une fête."
 cardesti_events.10.b:0 "Mieux vaut prévenir que guérir ; demandons-leur de partir."
 cardesti_events.10.c:0 "Rassurons les habitants : les Cardesti sont inoffensifs."

 cardesti_events.11.t:0 "Bardes cardesti"
 cardesti_events.11.d:0 "Ayant parcouru la quasi-totalité des contrées civilisées de Cannor, les Cardesti ont développé une solide tradition bardique. Certains de leurs chants les plus prisés traitent de l'amour, du destin et de leurs innombrables voyages. Un groupe de bardes cardesti a récemment acquis une grande renommée après d'impressionnantes représentations dans les tavernes les plus fréquentées de [Root.GetName] : leurs chants sont apparemment si envoûtants que certains membres de notre cour ont exprimé le souhait de les voir se produire devant le [Root.Owner.Monarch.GetTitle]. Les bardes se sont empressés de manifester leur disponibilité, à condition que nous les rémunérions en conséquence."
 cardesti_events.11.a:0 "Voilà qui promet d'être divertissant !"
 cardesti_events.11.b:0 "L'économie, bon sang !"
 cardesti_events.11.c:0 "Invitons les états et organisons une grande représentation !"
 cardesti_events.11.1:0 "Pourquoi ne pas les parrainer et tirer profit de leurs mélodies ?"
 cardesti_events.11.e:0 "Qu'ils composent un chant épique à notre gloire !"
 cardesti_events.11.f:0 "J'ai déjà entendu cela…"

 cardesti_events.12.t:0 "La Nuit de Feu approche"
 cardesti_events.12.d:0 "Un puissant devin cardesti nous a envoyé un message, avertissant la cour qu'un incendie dévastateur s'abattra sur [Root.GetName]. Les Cardesti affirment qu'il est impossible de savoir quand exactement cet événement se produira, mais ils sont certains que l'incendie aura lieu et détruira d'importants bâtiments de la ville. Avec quel sérieux devrions-nous prendre cet avertissement ?"
 cardesti_events.12.a:0 "Guettez les alarmes et évacuez les bâtiments dès que possible."
 cardesti_events.12.b:0 "Utilisons des matériaux de qualité supérieure pour rendre les bâtiments plus résistants au feu."
 cardesti_events.12.c:0 "Prévenez les occupants."
 cardesti_events.12.1:0 "C'est vague et ce n'est qu'une tentative d'attirer l'attention ; ignorons-le."
 cardesti_events.12.e:0 "Engageons la guilde des mages locale pour protéger la zone."
 cardesti_events.12.f:0 "Engageons la guilde des artificiers locale pour protéger la zone."

 cardesti_events.13.t:0 "La Nuit de Feu !"
 cardesti_events.13.d:0 "L'incendie est là ! Un immense nuage de fumée recouvre désormais [Root.GetName] ; il semble que d'importants édifices de la cité aient été touchés et que les zones résidentielles environnantes soient également menacées. Le devin cardesti nous avait prévenus !"
 cardesti_events.13.a:0 "Cieux cendrés !"

 cardesti_events.14.t:0 "Un criminel cardesti appréhendé"
 cardesti_events.14.d:0 "La Malédiction de la Reine Augure, souvent appelée la malédiction des Cardesti, est célèbre dans tout Cannor : après un laps de temps déterminé, les Cardesti doivent lever leur campement et poursuivre leur route, s'établissant ailleurs, avant de repartir de nouveau. Si cette migration n'est pas pratiquée en temps voulu et régulièrement, la malédiction se déclenche et consume la vie de ses sujets : les pauvres Cardesti qui n'ont pas poursuivi leur errance.\n\nAujourd'hui, une affaire criminelle particulière est portée à notre attention : un membre de la communauté cardesti a été surpris en train de commettre un délit mineur. En temps normal, quelques mois de cachot suffiraient à enseigner à ce genre de délinquants l'erreur de leurs actes, mais en l'occurrence, la peine de prison équivaut à une condamnation à mort, et nos juristes débattent pour savoir s'il faut appliquer la lettre de la loi ou émettre un édit spécial."
 cardesti_events.14.a:0 "Appliquons la lettre de la loi."
 cardesti_events.14.b:0 "Accordons au Cardesti un pardon spécial."
 cardesti_events.14.c:0 "Faisons régulièrement transférer le prisonnier d'une geôle à l'autre."
 cardesti_events.14.1:0 "Le Cardesti doit fournir une compensation financière."

 cardesti_events.15.t:0 "Évasion"
 cardesti_events.15.d:0 "Le prisonnier cardesti a réussi à s'évader de notre garde et à fuir la province. Le geôlier rapporte que les autres Cardesti sont les principaux responsables de cet événement. Cette évasion enhardira sans nul doute les autres détenus et criminels."
 cardesti_events.15.a:0 "Mais comment… ?"

 cardesti_events.16.t:0 "Le Flétrissement"
 cardesti_events.16.d:0 "Ce fut une longue nuit, plus longue que d'ordinaire. Au début, le nouveau détenu ne voulait pas se taire, quoi que mes compagnons et moi fassions. Le bougre de Cardesti hurlait et nous suppliait de le libérer, pour sa vie, et, eh bien, nous n'y prêtâmes guère attention au début : juste une racine qui s'habitue au pourrissement, comme d'habitude. Au bout d'un moment, quelques heures j'imagine, les hurlements cessèrent, et je me suis dit : « Tiens, le nouveau en a eu assez et s'est endormi, tant mieux pour lui », alors j'ai fermé les yeux quelques minutes. La chose suivante que je sus, c'est qu'il y avait de nouveau des cris. Je me levai pour regarder, mais cette fois ce n'était pas le Cardesti. Je reconnus mon camarade qui patrouillait le cachot ; je me précipitai donc pour voir ce qui, au nom de tous les enfers, pouvait bien se passer, car il n'était pas du genre à s'effrayer facilement. Je le trouvai sur le cul, le doigt pointé vers la cellule du nouveau, le bras tremblant, essayant de dire quelque chose mais n'émettant que des claquements de dents. Alors j'empoignai ma matraque et m'approchai pour regarder… et ce que je vis… le Cardesti… le voyageur était en train de pourrir. Le même gaillard était vivant et entier quelques heures plus tôt, mais à présent c'était un cadavre boursouflé, on aurait dit la gangrène, plus infect que les feux de l'enfer. Sa mâchoire pendait, sa gorge était béante. Pardonnez la description crue, mais ça me hante encore. Sa bouche et sa gorge s'étaient détachées. C'est sans doute pour ça que les hurlements avaient cessé. Jamais vu pareil spectacle : quelque chose avait rongé le corps et l'âme du pauvre bougre, le décomposant… Je le vois encore quand je ferme les yeux. J'ai sorti le corps, on l'a enterré. Pauvre bougre. Au moins, maintenant, il a un dernier lieu de repos. »\n\n — Extrait du journal du geôlier de la prison de [Root.Province.GetName] après l'incident cardesti de l'an [GetYear]"
 cardesti_events.16.a:0 "Repose en paix."

 cardesti_events.17.t:0 "Volontaires cardesti"
 cardesti_events.17.d:0 "Un groupe de Cardesti valides s'est porté volontaire pour rejoindre l'armée. Notre logistique actuelle n'est pas adaptée aux relocalisations constantes nécessaires pour accommoder leur « situation particulière » : la malédiction des Cardesti, qui impose à ses sujets de se déplacer fréquemment sous peine de voir leur vie se consumer jusqu'au néant."
 cardesti_events.17.a:0 "Organiser des transferts périodiques entre garnisons."
 cardesti_events.17.b:0 "Remercions-les pour le geste et déclinons."
 cardesti_events.17.c:0 "Excellente occasion d'instaurer de nouveaux exercices en terrain varié !"

 cardesti_events.18.t:0 "Une Flamme Vacillante"
 cardesti_events.18.d:0 "L'amour est une flamme. Tantôt il est chaleureux et réconfortant, tantôt violent et destructeur. On peut le contenir, le réprimer, ou le laisser croître jusqu'à ce qu'il consume tout.\n\nLa comparaison entre l'amour et le feu n'est pas un concept nouveau, mais la poésie des Cardesti a un penchant particulier pour ce rapprochement. Une ballade d'amour cardesti sans au moins quelque mention d'étincelle, de cendres, de fournaise ou de toute autre métaphore ardente n'est guère une ballade du tout, du moins pour les bardes les plus traditionalistes.\n\nSi l'un de ces bardes devait composer un chant sur les événements de ces derniers jours, la métaphore de choix serait celle d'une flamme vacillante. Une petite flamme, sur une petite chandelle, posée sur une table drapée de fineries, menacée d'être étouffée à tout instant. Un noble [Root.Owner.Culture.GetName], éperdument amoureux d'un jeune Cardesti. Un amour réciproque, bien que les deux ne se connaissent que depuis à peine une semaine.\n\nComme toute bonne histoire d'amour, elle n'est pas dépourvue de drame : le Cardesti, maudit sans qu'il y soit pour rien à errer sans cesse ; et le noble [Root.Owner.Culture.GetName], prêt à renoncer à son héritage pour le suivre. Et la famille de ce noble amant, qui refuse de voir son nom sali, son héritage terni, son rejeton les abandonner.\n\nCette chandelle vacillante d'amour se retrouve entre les mains de [Root.Owner.Monarch.GetName], les amants sollicitant la bénédiction de leur souverain. Comment cette ballade devra-t-elle s'achever ?"
 cardesti_events.18.a:0 "Un récit tragique, un amour refusé."
 cardesti_events.18.b:0 "Un récit amer-doux, un amour séparé."
 cardesti_events.18.c:0 "Un récit moral, un amour austère."
 cardesti_events.18.1:0 "Un récit joyeux, un amour triomphant."

 cardesti_events.19.t:0 "Une Ballade Ardente"
 cardesti_events.19.d:0 "Un conte je vous narre en cette nuit,\nd'amants privés, leur amour interdit ;\nune passion ardente, brûlante flamme,\nfrappée par la tragédie qu'ourdissent les grands.\n\nL'un d'entre eux ne pouvait rester,\nnon de son gré, car un jour de plus\nà demeurer, et maudit il serait\npar ce qui afflige tous les Cardesti.\n\nL'autre un noble, de sang [Root.Culture.GetName],\ndont le cœur le jeune Cardesti prit,\net qui prit du jeune son cœur en retour,\nmais le suivre, c'est par sa famille être banni.\n\nSes affaires dans sa malle le noble empaqueta,\net se prépara à partir à cheval,\nmais on lui dit que s'il entreprenait ce voyage,\nnoms et titres il devrait abandonner.\n\nMais à la veille du départ des Cardesti,\nle noble en appela au cœur de son [Root.Monarch.GetTitle],\net devant un amour si pur et si vrai,\nque peut faire d'autre un [Root.Monarch.GetTitle] ?\n\nEt ainsi à la lueur de l'aube,\nles amants chevauchèrent, n'étant plus éplorés,\nune tendre étreinte, main dans la main,\nnoble nom partagé, vrais héritiers de leur terre !"
 cardesti_events.19.a:0 " L'amour brûle vif à [Root.GetName]"

 cardesti_events.20.t:0 "Apprendre d'un Voyageur"
 cardesti_events.20.d:0 "On rapporte qu'une foule de gens à [Root.GetName] se rassemble près du campement cardesti local pour écouter leurs récits et conférences. Ces Cardesti content leurs voyages, s'expriment en langues étrangères, parlent de nouvelles inventions dans d'autres contrées de Cannor et expliquent d'étranges coutumes d'ailleurs. Peut-être leurs récits intéresseraient-ils aussi notre [Root.Owner.Monarch.GetTitle] ?"
 cardesti_events.20.a:0 "Invitons-les à la cour ; voyons s'ils ont quelque chose d'utile à partager !"
 cardesti_events.20.b:0 "Leurs mensonges propagent l'hérésie, le défaitisme et la désertion ! Mettez-y fin immédiatement !"
 cardesti_events.20.c:0 "Encourageons ces rassemblements !"
 cardesti_events.20.1:0 "Ces « nouvelles idées » n'apporteront que de nouveaux ennuis."
 cardesti_events.20.e:0 "Nous devrions nous concentrer sur des affaires plus urgentes."