l_french:
 damestear:0 "Damestear"
 damestearDESC:0 "Connue sous de nombreux noms à travers Halann, la damestear se trouve dans des gisements météoritiques qui s'abattent généralement sur le monde au cours du dixième mois, la Chute-des-Larmes. On dit qu'elle est constituée de magie brute à l'état pur ; la damestear est le sang vital de la praxis magique, elle amplifie les sortilèges et ceux qui les lancent, et rehausse la puissance des armes et des armures. \n\nAu cours des siècles suivants, la damestear allait devenir le fondement des merveilles technologiques de l'Artisanat Magique. Farouchement convoitée, sa rareté est souvent aussi centrale dans le conflit entre Mages et Artificiers que la lutte entre l'ancien pouvoir et le nouveau."

 damestear.2.t:0 "Le gisement de Damestear s'amenuise"
 damestear.2.d:0 "Le fait fondamental concernant la damestear est qu'il n'y en a jamais assez pour tout le monde, un principe qui vient de se rappeler à nous une fois de plus. Une délégation de [This.GetName] se tord les mains d'angoisse aux portes des appartements de notre souverain, se querellant en murmures sifflants pour savoir qui aura la charge d'annoncer la funeste nouvelle. Bientôt, la vérité éclate : les réserves d'or bleu de la province ont dépassé leur apogée, le gisement de [This.GetName] ayant été dramatiquement épuisé. \n\nL'inquiétude se répand parmi l'élite de notre société, dont la prospérité et la puissance dépendent si souvent de la damestear, à l'idée de se retrouver bientôt à la merci d'étrangers pour assurer leur approvisionnement. Nous ne pouvons que prier pour que le gisement puisse être ménagé jusqu'à une Chute-des-Larmes particulièrement généreuse."
 damestear.2.a:0 "Voilà qui augure mal pour notre nation."

 damestear.3.t:0 "Découverte d'un ancien gisement de Damestear"
 damestear.3.d:0 "Une lueur étrange brillait faiblement à travers la roche même, baignant les visages curieux de sa teinte cyan. L'endroit avait été choisi pour un agréable déjeuner champêtre, et les langues déliées firent bientôt en sorte que la nouvelle du signe révélateur de la damestear attirât les regards de toute notre nation sur ces pierres usées par le temps. \n\nAlors que nombre d'habitants de [This.GetName] s'enthousiasment devant les perspectives d'un gisement si généreux de damestear, dont les richesses rejailliront sur leurs terres, des murmures de dissension courent dans la brise, nourris par la crainte des bouleversements à venir. Bientôt, le poing de notre nation se refermera sur [This.GetName], veillant à ce que la damestear trouve le chemin de mains dignes de confiance et méritantes."
 damestear.3.a:0 "Saisissons la damestear, saisissons le jour !"

 damestear.4.t:0 "Météorite de Damestear"
 damestear.4.d:0 "En un éclair, le ciel s'embrase d'une clarté aussi vive que le plein midi, une lumière cyan aveuglante qui découpe le paysage en ombres tranchées. Tandis que des yeux hagards scrutent à travers les fenêtres et que les premiers roucoulements et croassements de l'aube résonnent au-dehors, un fracas assourdissant déchire le monde en deux. Ceux qui s'étaient simplement détournés, la tête enfouie dans leurs oreillers, sont brutalement arrachés au sommeil. Les moins fortunés sont criblés d'éclats de verre et de pierres soulevées, agrippant leurs oreilles ensanglantées dans l'agonie. \n\nLa fumée convulsive et tourbillonnante du cratère s'élève en une colonne vers le ciel, encore imprégnée de cette pure lueur cyan, et révèle dans sa clarté l'origine du tumulte. Gisant immobile dans la plaie qu'elle a ouverte, telle la balle d'un mousquet déchirant la chair, se trouve une manne au-delà de toute espérance. Cette météorite, phénomène rare et hors saison en cette période de l'année, est principalement composée de damestear, mûre et prête comme un fruit qui implore qu'on le cueille."
 damestear.4.d1:0 "En un éclair, le ciel s'embrase d'une clarté aussi vive que le plein midi, une lumière cyan aveuglante qui découpe le paysage en ombres tranchées. Tandis que des yeux hagards scrutent à travers les fenêtres et que les premiers roucoulements et croassements de l'aube résonnent au-dehors, un fracas assourdissant déchire le monde en deux. Ceux qui s'étaient simplement détournés, la tête enfouie dans leurs oreillers, sont brutalement arrachés au sommeil. Les moins fortunés sont criblés d'éclats de verre et de pierres soulevées, agrippant leurs oreilles ensanglantées dans l'agonie. \n\nLa fumée convulsive et tourbillonnante du cratère s'élève en une colonne vers le ciel, encore imprégnée de cette pure lueur cyan, et révèle dans sa clarté l'origine du tumulte. Gisant immobile dans la plaie qu'elle a ouverte, telle la balle d'un mousquet déchirant la chair, se trouve une manne au-delà de toute espérance. Il s'agit d'une météorite de damestear, mûre et prête comme un fruit qui implore qu'on le cueille.\n\nMais cette chute n'est point le fruit du hasard : c'est la pluie de météores annuelle de la Chute-des-Larmes, et bien que les impacts de météorites de damestear d'une telle envergure soient loin d'être courants, les habitants savent que d'autres de ces précieux bolides zébreront le ciel dans les jours à venir. Levant les yeux vers le firmament tumultueux, ils ne peuvent que s'interroger sur les autres trésors, et les autres périls, que la pluie de météores leur réserve."
 damestear.4.d2:0 "En un éclair, le ciel s'embrase d'une clarté aussi vive que le plein midi, une lumière cyan aveuglante qui découpe le paysage en ombres tranchées. Tandis que des yeux hagards scrutent à travers les fenêtres et que les premiers roucoulements et croassements de l'aube résonnent au-dehors, un fracas assourdissant déchire le monde en deux. Ceux qui s'étaient simplement détournés, la tête enfouie dans leurs oreillers, sont brutalement arrachés au sommeil. Les moins fortunés sont criblés d'éclats de verre et de pierres soulevées, agrippant leurs oreilles ensanglantées dans l'agonie. \n\nLa fumée convulsive et tourbillonnante du cratère s'élève en une colonne vers le ciel, encore imprégnée de cette pure lueur cyan, et révèle dans sa clarté l'origine du tumulte. Gisant immobile dans la plaie qu'elle a ouverte, telle la balle d'un mousquet déchirant la chair, se trouve une manne au-delà de toute espérance. Il s'agit d'une météorite de damestear, mûre et prête comme un fruit qui implore qu'on le cueille.\n\nMais tandis que le peuple commence à saisir toute l'ampleur du spectacle, son attention est arrachée de la terre vers les cieux. Car cette chute n'est point un phénomène isolé, mais fait partie d'une pluie de météores plus vaste, envoyée des firmaments par la Comète de l'Œil de l'Oracle, qui ne passe qu'une fois tous les 111 ans. Et avec elle vient la promesse de richesses indicibles, et de dangers inimaginables."
 damestear.4.a:0 "Qui domine la damestear domine le monde."

 damestear.5.t:0 "Gisement de Damestear épuisé"
 damestear.5.d:0 "Mille malédictions sur ce jour funeste ! Jadis grouillante de mineurs et d'érudits, d'experts de toutes les disciplines magiques, la grande mine de damestear de [This.GetName] a sombré dans les ténèbres ; plus la moindre lueur de cet éclat cyan qui autrefois s'élevait vers les cieux à travers les nuits les plus noires. Nous avons creusé profondément, avidement, et dépouillé entièrement la province de sa ressource la plus vitale, celle qui avait relégué toute autre considération au second plan. \n\nLa panique et la contestation grondent dans les salles de nos élites, qui s'éveillent à la réalité d'une position dans le monde devenue bien plus précaire et incertaine, à la lumière de ce que nous avons perdu. Quoi qu'il advienne pour remplacer l'industrie que la damestear avait engendrée, notre nation sera bien plus pauvre de son absence."
 damestear.5.a:0 "Et maintenant, que fait-on ?"

