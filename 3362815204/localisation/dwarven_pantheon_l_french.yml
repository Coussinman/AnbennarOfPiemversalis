 ###Aspects
 dagrin_adm_aspect:0 "§DDagrin Barbe-Éternelle§!"
 desc_dagrin_adm_aspect:0 "Dagrin et son culte sont des facettes étendues et quasi omniprésentes de notre pays. En tant que dieu principal, Dagrin est censé diriger avec sagesse et prévoyance, et donc il doit être fait confiance pour faire ce qui est le mieux, même si les autres dieux ne le voient pas immédiatement. La même chose est attendue du dirigeant de Halann, où il guide et le reste suit, lui faisant confiance pour les guider sur le bon chemin.\n\n§DRituel :§! Dagrin nous bénit de stabilité, les divinités mineures nous béniront avec divers autres bonus."
 dagrin_dip_aspect:0 "§DDagrin Barbe-Éternelle§!"
 desc_dagrin_dip_aspect:0 "La vénération de Dagrin Barbe-Éternelle est parmi nos plus grandes priorités, mais le Clergé de Dagrin ne le tient pas en plus haute estime que les autres dieux du Panthéon. Beaucoup des temples les plus significatifs dédiés à Dagrin possèdent des alcôves et sanctuaires dédiés à tous les autres dieux du Panthéon. Même dans les zones rurales, la plupart des temples dédiés à Dagrin comportent des alcôves pour les clergés qui ne peuvent pas se permettre un temple complet. Un dirigeant, mortel ou divin, doit prendre soin de tous ses sujets.\n\n§DRituel :§! Dagrin nous bénit de stabilité, les divinités mineures nous béniront avec divers autres bonus."

 anvelind_dip_aspect:0 "§DAnvelind Vierge-du-Foyer§!"
 desc_anvelind_dip_aspect:0 "Anvelind, étant une déesse de la justice, fournit non seulement un jugement équitable mais aussi de sages conseils. Beaucoup des esprits les plus sages qui cherchent à conseiller notre dirigeant ont entrepris de lire les enseignements d'Anvelind. L'une des leçons les plus significatives qu'elle transmet est l'importance de ne pas laisser la corruption et l'avidité prendre le dessus sur soi-même.\n\n§DRituel :§! Anvelind dissoudra les rébellions actives, les divinités mineures inculqueront loyauté et contrôle dans notre royaume."
 anvelind_mil_aspect:0 "§DAnvelind Vierge-du-Foyer§!"
 desc_anvelind_mil_aspect:0 "Anvelind, tout comme la justice, est une maîtresse stricte. Cependant, ses lois sont impartiales, et tous sont censés s'y conformer. Nos guerriers maintiennent leur honneur et leur droiture même dans les circonstances les plus difficiles, sachant que leurs actions seront évaluées et récompensées, ou pénalisées en conséquence.\n\n§DRituel :§! Anvelind dissoudra les rébellions actives, les divinités mineures inculqueront loyauté et contrôle dans notre royaume."

 durvorazir_adm_aspect:0 "§DDurvorazir§!"
 desc_durvorazir_adm_aspect:0 "L'église de Durvorazir ne comprend pas seulement des acolytes mais aussi des Prêtres-Maçons et tailleurs de pierre en exercice qui visent à manifester la volonté de leur dieu de manière tangible. Ces individus sont généralement engagés ou reçoivent une allocation de nourriture et boisson en échange de leur vaste connaissance et compétences, transmises méticuleusement de maître à apprenti au sein de l'église de Durvorazir. Leurs services sont très demandés, car leur capacité à étendre et optimiser les cavernes et infrastructures existantes est cruciale pour toute société bien développée.\n\n§DRituel :§! Durvorazir améliorera les cavernes de notre royaume, les divinités mineures les béniront d'effets supplémentaires."
 durvorazir_mil_aspect:0 "§DDurvorazir§!"
 desc_durvorazir_mil_aspect:0 "La pierre est un matériau délicat mais remarquablement adaptable qui peut être façonné pour divers usages par ceux qui sont habiles à la travailler. Cela inclut la création de dispositifs sinistres comme les meurtrières, les fosses, les tunnels qui s'effondrent et autres constructions défensives et périlleuses. Ne vous y trompez pas ; les Prêtres-Maçons de Durvorazir sont tout aussi disposés à utiliser cette facette de leur art que les aspects plus constructifs.\n\n§DRituel :§! Durvorazir améliorera les cavernes de notre royaume, les divinités mineures les béniront d'effets supplémentaires."

 margurz_dip_aspect:0 "§DMargurz§!"
 desc_margurz_dip_aspect:0 "Dans les moments les plus difficiles, Margurz est toujours présent avec une pinte en main, offrant d'aider à noyer ses chagrins. Que ce soit à cause de la ruine financière, de la destruction d'une forge chérie, ou de la perte d'un être cher, Margurz et ses prêtres sont là pour aider à lever un verre en souvenir et prendre une gorgée pour oublier.\n\n§DRituel :§! Margurz renforce notre dirigeant en supprimant les personnalités négatives, les divinités mineures renforceront davantage la cour."
 margurz_mil_aspect:0 "§DMargurz§!"
 desc_margurz_mil_aspect:0 "Margurz n'est pas seulement le dieu de l'alcool mais aussi le dieu de la médecine, ce qui fait de lui le patron des herboristes, médecins, chirurgiens et barbiers. Avec le vaste savoir accumulé par ses prêtres sur le corps nain et les spiritueux analgésiques qu'ils peuvent concocter, Margurz et ses serviteurs mortels sont en excellente position pour aider ceux qui ont été blessés sur le champ de bataille à récupérer et retrouver leur forme de combat. Ou, encore plus crucial, à un état jugé « vivant » par leurs proches.\n\n§DRituel :§! Margurz renforce notre dirigeant en supprimant les personnalités négatives, les divinités mineures renforceront davantage la cour."

 miradeth_dip_aspect:0 "§DMiradeth Chercheuse-de-Terre§!"
 desc_miradeth_dip_aspect:0 "Des routes commerciales doivent être forgées à travers les cavernes et tunnels de l'Échine-du-Serpent afin que les caravanes marchandes puissent traverser en sécurité les passages infestés de gobelins pour atteindre les colonies frontalières. Beaucoup recherchent les bénédictions de Miradeth à cette fin, car on croit qu'elle guide leur caravane vers la sécurité et la prospérité.\n\n§DRituel :§! Miradeth nous révélera une nouvelle expédition si nous sommes dans l'Échine-du-Serpent, sinon elle nous bénira de stabilité. Les divinités mineures amélioreront notre groupe d'expédition et révéleront quelques connaissances."
 miradeth_mil_aspect:0 "§DMiradeth Chercheuse-de-Terre§!"
 desc_miradeth_mil_aspect:0 "Traverser les cavernes est une tâche ardue, avec de nombreux méandres et impasses qui peuvent s'avérer fatales pour quiconque, y compris une armée entière. Ainsi, beaucoup d'éclaireurs et rangers considèrent Miradeth comme leur patronne, et certains sont si dévoués qu'ils deviennent des acolytes ordonnés de sa foi. Avec des siècles de connaissances accumulées, ils s'assurent que le chemin le plus rapide et le plus sûr est celui qui est emprunté.\n\n§DRituel :§! Miradeth nous révélera une nouvelle expédition si nous sommes dans l'Échine-du-Serpent, sinon elle nous bénira de stabilité. Les divinités mineures amélioreront notre groupe d'expédition et révéleront quelques connaissances."

 azmirethazin_adm_aspect:0 "§DAzmirethazin§!"
 desc_azmirethazin_adm_aspect:0 "Azmirethazin n'est second qu'à Dagrin lui-même, et sa foi et son symbole peuvent être trouvés dans chaque atelier, forge et foyer d'artisan. En tant que Dieu de la Forge et maître de toute la métallurgie, beaucoup s'efforcent de reproduire la vitesse et la qualité de ses créations pour des raisons à la fois pratiques et pieuses.\n\n§DRituel :§! Azmirethazin inspire notre peuple à prendre les armes, les divinités mineures enhardiront davantage notre peuple."
 azmirethazin_dip_aspect:0 "§DAzmirethazin§!"
 desc_azmirethazin_dip_aspect:0 "En plus de son rôle de maître forgeron, Azmirethazin sert aussi de main divine et exécuteur de la volonté et des jugements de sa sœur, Anvelind. En temps de paix, beaucoup de gardes et soldats maintiennent un sanctuaire communal en son honneur dans leurs casernes, espérant recevoir sa bénédiction lorsqu'ils traitent avec les mécontents.\n\n§DRituel :§! Azmirethazin inspire notre peuple à prendre les armes, les divinités mineures enhardiront davantage notre peuple."

 argezenna_adm_aspect:0 "§DDame Argezenna§!"
 desc_argezenna_adm_aspect:0 "Dame Argezenna, épouse et première création d'Azmirethazin, est connue comme la Gardienne d'Acier. Ses adeptes cherchent à promouvoir l'unité et l'harmonie au sein de l'État et de la race naine dans son ensemble. De plus, les Vierges d'Acier, un groupe de prêtresses, organisent souvent des missions pour aider les pauvres et les malheureux dans les territoires nouvellement conquis.\n\n§DRituel :§! Argezenna purgera les monstres de nos terres, les divinités mineures tenteront de réduire les dommages collatéraux."
 argezenna_mil_aspect:0 "§DDame Argezenna§!"
 desc_argezenna_mil_aspect:0 "Les Vierges d'Acier sont le clergé le plus éminent de Dame Argezenna. Elles sont connues pour être des guerrières-prêtresses et des tueuses de monstres, tout comme leur déesse patronne. Ces prêtresses sont souvent recherchées pour leur habileté dans les attaques fulgurantes contre la faune dangereuse et les habitants des profondeurs.\n\n§DRituel :§! Argezenna purgera les monstres de nos terres, les divinités mineures tenteront de réduire les dommages collatéraux."

 auirikus_adm_aspect:0 "§DAuirikus§!"
 desc_auirikus_adm_aspect:0 "Le travail d'Auirikus et de ses fidèles mortels est celui de héros méconnus : les administrateurs dévoués et les gestionnaires de stock qui restent tard pour terminer l'inventaire. Les prêtres d'Auirikus sont souvent eux-mêmes des administrateurs de haut rang, cherchant à aider à la stabilité et l'organisation que leur dieu exige, jusque dans le moindre détail.\n\n§DRituel :§! Auirikus accélérera le creusement de notre capitale ou approfondira instantanément une forteresse passive, les divinités mineures renforceront le royaume de multiples façons."
 auirikus_dip_aspect:0 "§DAuirikus§!"
 desc_auirikus_dip_aspect:0 "Bien que beaucoup considèrent Auirikus comme un dieu inaccessible, c'est loin d'être la vérité. Le bâton ne doit être utilisé que lorsque nécessaire, et la carotte apporte plus d'amis et d'alliés que le fouet d'un tyran. Un appareil aussi vaste que la bureaucratie des dieux ne peut être dirigé par la menace de violence, et il en va de même pour celui de ce monde.\n\n§DRituel :§! Auirikus accélérera le creusement de notre capitale ou approfondira instantanément une forteresse passive, les divinités mineures renforceront le royaume de multiples façons."

 urisazirn_adm_aspect:0 "§DUrisazirn Main-de-Mithril§!"
 desc_urisazirn_adm_aspect:0 "Les Nains sont différents des autres races en ce qui concerne la magie. Au lieu d'être imprégnée de mysticisme, elle est imprégnée de tradition, comme toute autre pratique naine. Les Prêtres-Runiques d'Urisazirn sont les principaux praticiens de la magie, sous forme de Forge Runique et autres Ouvrages Runiques. De nombreuses merveilles et prodiges ont émergé de l'atelier d'un Prêtre-Runique qui peuvent accomplir toute tâche imaginable.\n\n§DRituel :§! Urisazirn accorde des connaissances magiques si notre dirigeant est un mage, sinon il renforcera nos mages. Les divinités mineures lanceront un sort mineur."
 urisazirn_mil_aspect:0 "§DUrisazirn Main-de-Mithril§!"
 desc_urisazirn_mil_aspect:0 "Les Ouvrages Runiques sont appréciés non seulement pour leur valeur artistique, mais aussi pour leur capacité pratique. Cela, les Prêtres-Runiques d'Urisazirn le savent bien, car une lame dont le tranchant est indiscutable, ou un plastron dont la protection est sans faille, est très appréciée en effet.\n\n§DRituel :§! Urisazirn accorde des connaissances magiques si notre dirigeant est un mage, sinon il renforcera nos mages. Les divinités mineures lanceront un sort mineur."

 dolurazan_adm_aspect:0 "Dolurazan"
 desc_dolurazan_adm_aspect:0 "Dolurazan est le dieu nain des Forgerons, et son culte est illustré dans la création d'armes et d'armures, et autres biens de guerre utiles. C'est lui qui fabriqua les armes et armures des dieux, et beaucoup de ses fidèles cherchent à reproduire ne serait-ce qu'un petit fragment de cette qualité divine."
 dolurazan_mil_aspect:0 "Dolurazan"
 desc_dolurazan_mil_aspect:0 "Beaucoup de dévots de Dolurazan cherchent à s'assurer que leur armure est la plus solide et la plus résistante. Ils testent extensivement leurs créations les unes contre les autres et étudient les techniques de leurs confrères dévots dans un effort pour créer les défenses les plus fiables et robustes."

 derzobrazan_adm_aspect:0 "Derzobrazan"
 desc_derzobrazan_adm_aspect:0 "Derzobrazan est la déesse naine des orfèvres, ces métallurgistes qui forgent l'argent, le platine, l'or et autres matériaux similaires. L'un de ses préceptes est de ne rien gaspiller, et rien en effet n'est gaspillé dans un atelier où l'un de ses favoris supervise les ouvriers. Les métaux précieux sont extraits des fissures et crevasses avec des pinces et des brosses, et les nains secouent leurs vêtements pour s'assurer que pas même une seule particule ne s'échappe."
 derzobrazan_dip_aspect:0 "Derzobrazan"
 desc_derzobrazan_dip_aspect:0 "Beaucoup des fidèles de Derzobrazan ne sont pas seulement des orfèvres, mais aussi des marchands qui cherchent à vendre l'artisanat de leurs compatriotes et le font avec grande ferveur. En affaires, bien sûr, le cadeau exceptionnel occasionnel est tout aussi, sinon plus important qu'une bonne affaire, et ainsi les cadeaux de bijoux ne sont pas rares."

 bervinazan_adm_aspect:0 "Bervinazan"
 desc_bervinazan_adm_aspect:0 "Bervinazan est la déesse des métaux de base tels que le cuivre, l'étain, le plomb, l'étain fin, le bronze, le laiton et similaires. De plus, beaucoup de ses prêtres travaillent comme urbanistes, cherchant des endroits pour installer de la statuaire coulée ou dans des fonderies de canons où ils œuvrent à perfectionner les armes qui y sont créées. Par conséquent, cela les rend aussi très habiles dans la question militaire de trouver le meilleur moyen d'abattre des cibles, y compris les fortifications ennemies."
 bervinazan_mil_aspect:0 "Bervinazan"
 desc_bervinazan_mil_aspect:0 "Dans les fonderies enfumées, les disciples de Bervinazan travaillent parmi la chaleur brûlante du bronze fondu, regardant canon après canon être extrait de leur moule et nettoyé, poli et préparé pour la sale industrie de la guerre. De nombreuses améliorations mineures sont apportées à ce stade par des processus bien gardés, mais l'augmentation de puissance destructrice qui en résulte est indéniable."

 karazlov_dip_aspect:0 "Karazlov"
 desc_karazlov_dip_aspect:0 "Karazlov était jadis un poète et érudit mortel qui fut élevé à la divinité comme récompense pour une performance qui émut les dieux eux-mêmes aux larmes. Bien qu'aucune chose semblable ne se soit produite de mémoire d'homme, beaucoup de nos diplomates gardent des sanctuaires mobiles et des livres de prières personnels à Karazlov dans un effort pour avoir son aide dans les négociations."
 karazlov_mil_aspect:0 "Karazlov"
 desc_karazlov_mil_aspect:0 "Les premières impressions sont importantes, et elles peuvent souvent dicter un changement dans le statu quo. Bien que nous ne puissions pas officiellement envoyer tout notre corps diplomatique pour annoncer de tels changements, quelques faveurs à l'Église de Karazlov peuvent améliorer l'humeur des pays étrangers concernant nos conquêtes sans révéler notre implication."

 grimthar_adm_aspect:0 "Grimthar"
 desc_grimthar_adm_aspect:0 "Grimthar est le dieu nain du travail du bois et de la sculpture sur bois, y compris la menuiserie. Son histoire bien connue de fraternité et de camaraderie avec Margurz a fait que les deux groupes d'adeptes restent proches l'un de l'autre encore aujourd'hui. Leur relation sert d'exemple pour toute la société naine d'être excellents les uns envers les autres."
 grimthar_dip_aspect:0 "Grimthar"
 desc_grimthar_dip_aspect:0 "Le bois est un matériau inhabituel dans la société naine, mais les prêtres et fidèles de Grimthar le traitent avec exactement la même révérence et le même respect qu'un nain accorderait à tout autre matériau. Les standards ? Exigeants. La qualité ? Sans égale."

 verdrik_adm_aspect:0 "Verdrik Azirkra"
 desc_verdrik_adm_aspect:0 "Verdrik Azirkra est le patron des ingénieurs, architectes et contremaîtres. Tout comme leur dieu, l'art se trouve dans la froide beauté utilitaire des ponts, routes et autres travaux publics et privés. Le gaspillage n'est pas toléré, et tout sera utilisé, sinon maintenant, alors plus tard, pour la multitude d'autres grands projets que les fidèles cherchent à achever."
 verdrik_mil_aspect:0 "Verdrik Azirkra"
 desc_verdrik_mil_aspect:0 "Selon les fidèles de Verdrik Azirkra, il y a de la beauté dans tout, y compris dans une fortification. Remparts et fossés s'élèvent et s'abaissent en murs et portes imposants qui scellent des sections entières de cavernes, complétés par des meurtrières, des fosses et bien plus encore. Le but pratique de ces fortifications est ce qui les rend véritablement belles."

 thyrfen_adm_aspect:0 "Thyrfen Mains-d'Or"
 desc_thyrfen_adm_aspect:0 "Thyrfen, la plus grande reine que l'ancienne Amldihr ait jamais possédée, était connue pour sa piété et sa prévoyance. Elle était aimée de tous, et ses prêtres fournissaient fréquemment des aumônes aux pauvres, de l'aide aux malades et soignaient les blessés. Quand l'État soutenait ces efforts, beaucoup vivaient mieux qu'ils ne l'avaient fait depuis des années."
 thyrfen_mil_aspect:0 "Thyrfen Mains-d'Or"
 desc_thyrfen_mil_aspect:0 "Thyrfen fut celle qui initia le grand exploit d'ingénierie qui transforma le Val-du-Serpent en la terre agricole fertile qu'elle était à l'apogée d'Aul-Dwarov. Avec cette transformation, la nourriture devint abondante, et les fidèles de Thyrfen la rationnaient sagement, comme c'est encore fait aujourd'hui en sa mémoire."

 werdun_adm_aspect:0 "Werdûn Œil-de-Diamant"
 desc_werdun_adm_aspect:0 "Pour les fidèles de Werdûn, aucune histoire ne pourrait être plus prestigieuse que celle d'un nain qui fut mis au défi par ses pairs et récompensé de la divinité par les dieux, ainsi que de la main d'une déesse. Cette histoire de romance et d'audace a capturé le cœur de notre peuple."
 werdun_dip_aspect:0 "Werdûn Œil-de-Diamant"
 desc_werdun_dip_aspect:0 "Werdûn Œil-de-Diamant est considéré comme le fondateur de la tradition des Nains de Grenat d'échanger des gemmes entre deux amoureux. Bien que le grenat qu'il partagea avec Dezobrazan ait été historiquement remplacé par les gemmes lumineuses trouvées près d'Ovdal Lodhum, l'histoire reste encore inspirante et a résonné même au-delà de nos frontières."

 lorgrim_dip_aspect:0 "Lorgrim"
 desc_lorgrim_dip_aspect:0 "Lorgrim, vagabonde par nature et par choix, est favorisée par les diplomates et les voyageurs. Son clergé est similaire, sans temples formels mais parcourant plutôt l'Échine-du-Serpent pour accomplir leurs devoirs. Beaucoup de ceux qui les rencontrent lors de leurs voyages demandent souvent une bénédiction pour des voyages sûrs et un trajet rapide vers leur destination, avec l'espoir que ce ne soit pas leur dernier."
 lorgrim_mil_aspect:0 "Lorgrim"
 desc_lorgrim_mil_aspect:0 "Traiter avec l'Échine-du-Serpent requiert de la flexibilité. Ceux qui ne peuvent pas s'adapter et naviguer à travers les tunnels risquent de se perdre ou pire, nécessitant la guidance directe de Lorgrim. Un avertissement ou un présage observé avant la bataille peut sauver des milliers en les alertant d'une embuscade imminente ou d'une caverne instable."

 lorgram_adm_aspect:0 "Lorgram"
 desc_lorgram_adm_aspect:0 "Contrairement à beaucoup de fois, le Panthéon Nain offre la promesse d'une vie après la mort passée parmi ses amis et sa famille dans les halls de Dagrin. Là, on est emmené dans les Sous-Halls pour expérimenter soit la punition soit la récompense, selon ce que Lorgram, le Gardien des Morts, a déterminé."
 lorgram_dip_aspect:0 "Lorgram"
 desc_lorgram_dip_aspect:0 "Lorgram est le dieu des morts, mais il n'est pas le dieu de la Mort, comme les étrangers le comprennent souvent mal. Ses prêtres non seulement enregistrent les noms des défunts mais aussi leurs exploits afin que leur impact sur notre monde ne soit pas oublié avec le passage du temps, le plus grand des ennemis."

 grobilazk_dip_aspect:0 "Grobilazk"
 desc_grobilazk_dip_aspect:0 "Grobilazk, en tant que divinité, n'a pas de prêtres, mais il y a certainement ceux qui tentent de s'attirer les faveurs du dieu pour quelque dessein dérangé. Trouver ces individus est une tâche difficile, et beaucoup de nains se mettent ardemment au travail pour découvrir si leurs voisins et amis possèdent secrètement un sanctuaire ou deux. Habituellement, ils sombrent dans la folie et la paranoïa, mais parfois ils trouvent quelque chose d'utile."
 grobilazk_mil_aspect:0 "Grobilazk"
 desc_grobilazk_mil_aspect:0 "Pour beaucoup, Grobilazk est vu comme une divinité perfide et capricieuse, et même s'ils sont censés détester les nains, on croit aussi qu'ils prospèrent dans le chaos, souvent trouvé dans le chaos d'un siège. Ainsi, un commandant cherchera à mettre fin à un siège et prendre la fortification aussi rapidement que possible, dans un effort pour garder le regard de Grobilazk loin de leurs troupes et d'eux-mêmes."