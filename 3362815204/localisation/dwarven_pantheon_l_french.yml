 ###ritual events

 dwarven_pantheon_ritual_has_dolurazan_tooltip:0 "\n§YDolurazan§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_derzobrazan_tooltip:0 "\n§YDerzobrazan§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_bervinazan_tooltip:0 "\n§YBervinazan§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_karazlov_tooltip:0 "\n§YKarazlov§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_grimthar_tooltip:0 "\n§YGrimthar§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_verdrik_tooltip:0 "\n§YVerdrik Azirkra§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_thyrfen_tooltip:0 "\n§YThyrfen Mains-d'Or§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_werdun_tooltip:0 "\n§YWerdûn Œil-de-Diamant§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_lorgrim_tooltip:0 "\n§YLorgrim§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_lorgram_tooltip:0 "\n§YLorgram§! nous accorde en outre la bénédiction suivante :"
 dwarven_pantheon_ritual_has_grobilazk_tooltip:0 "\n§YGrobilazk§! nous accorde en outre la bénédiction suivante :"

 dwarven_pantheon_argezenna_purge_effect_tooltip:0 "Sera §Rpurgé§! !"
 dwarven_pantheon_ritual_urisazirn_grimthar_tooltip:0 "Toutes les provinces produisant des §YCéréales§!, du §YVin§!, des §YÉpices§!, du §YThé§!, du §YCafé§!, du §YCacao§!, du §YCoton§!, du §YSucre§!, du §YTabac§!, des §YClous de girofle§!, de l'§YEncens§!, des §YBois exotiques§! ou de la §YFleur-Serpent§! recevront §Y« Bénédiction de Grimthar : Croissance végétale »§! pendant 5 ans, conférant les effets suivants :\nProduction locale de marchandises : §G+1,00§!"

 dwarven_pantheon_no_target:0 "Puisqu'il n'existe aucune cible éligible pour l'effet de notre §DDivinité Majeure§!, nous recevrons ce qui suit :"

 dwarven_pantheon.1.t:0 "Père des Montagnes"
 dwarven_pantheon.1.d:0 "Le palais du [Root.Monarch.GetTitle] est silencieux aujourd'hui, alors même qu'une foule immense s'est rassemblée pour observer la cérémonie sur le point de se dérouler.\n\n[Root.Monarch.GetName] apparaît, mais il n'y a pas d'acclamations. Le silence est primordial. Le premier chariot d'alcool est amené, suivi du [Root.Monarch.GetTitle], qui sans un mot et assisté de plusieurs prêtres de Dagrin, perce le premier tonneau massif d'au moins cinq mètres de haut, marqué du symbole de Dagrin. Une file désordonnée se forme, chaque participant tenant une chope. Les boissons seront distribuées toute la journée, ici à [Root.Capital.GetName] et dans tout le pays, tandis que la boisson bénie de Dagrin est distribuée par le clergé de Dagrin."
 dwarven_pantheon.1.a:0 "Cul sec ! Avec respect, bien entendu."

 dwarven_pantheon.2.t:0 "Maîtresse de la Justice"
 dwarven_pantheon.2.d:0 "Le marteau s'abat tandis que le capitaine corrompu rejoint son magistrat conspirateur dans les Halls des Morts, où Dagrin s'assurera certainement qu'ils souffrent pour leur corruption et leur abus de pouvoir. C'est la troisième exécution tenue par le clergé d'Anvelind à [Root.Capital.GetName] en une semaine, tandis que dans tout le royaume des procès similaires sont organisés, autorisés par [Root.Monarch.GetName]. Ceux-ci doivent être supervisés par le clergé d'Anvelind dans un effort pour aider à résoudre les révoltes et troubles endémiques à travers le pays."
 dwarven_pantheon.2.a:0 "L'heure du marteau."

 dwarven_pantheon.3.t:0 "Sculpteur des Cavernes"
 dwarven_pantheon.3.d:0 "Un prêtre de Durvorazir lourdement équipé soulève la pioche et frappe la paroi, observant la roche s'effriter. Les gravats tombent, et une rafale d'air froid jaillit tandis que l'air vicié de la caverne isolée est renouvelé pour la première fois depuis peut-être des millénaires. Un autre emplacement prometteur pour étendre l'industrie est découvert grâce aux efforts des prêtres de Durvorazir dans l'exploration et l'excavation de cavernes inédites. Ailleurs dans le pays, des efforts similaires sont entrepris comme gestes de bonne foi par divers temples au Dieu-Maçon dans un effort pour accroître la production de pierre. Une bonne granite est une granite divine, après tout."
 dwarven_pantheon.3.a:0 "Je pensais à de nouveaux comptoirs..."

 dwarven_pantheon.4.t:0 "Purificateur du Corps"
 dwarven_pantheon.4.d:0 "[Root.Monarch.GetName] renifle la concoction offerte par le Grand Prêtre de Margurz. L'odeur d'alcool masque les effluves les plus offensantes, mais [Root.Monarch.GetName] a tout de même un haut-le-cœur. « Êtes-vous certain, » demande-t-il, « que je doive consommer ceci ? »\n\nLe Grand Prêtre hoche la tête. « C'est une partie essentielle du rituel. Vous devez le consommer, puis compter à rebours depuis 100. » Le [Root.Monarch.GetTitle] prend la concoction à contrecœur et commence à compter, perdant conscience à 93. « Excellent ! » s'écrie le Grand Prêtre en se tournant vers un acolyte proche. « Vous ! Apportez-moi la scie. Nous avons neuf heures, selon les textes, avant qu'il ne se réveille. »\n\nUn jour plus tard, malgré un mal de crâne carabiné et un crâne rasé, [Root.Monarch.GetName] déclare ne s'être jamais senti aussi bien."
 dwarven_pantheon.4.a:0 "Mais pourquoi est-ce que je sens du pain brûlé ?"

 dwarven_pantheon.5.t:0 "Exploratrice des Profondeurs"
 dwarven_pantheon.5.d:0 "La prêtresse de Miradeth baisse la tête, se faufilant sous le plafond bas et tenant sa torche haut, observant la scène devant elle. Le passage tortueux sentait le danger, la mort, mais aussi la fortune et les richesses. La carte récupérée était authentique, et elle l'avait prouvé. « Nous pouvons rentrer maintenant, » se tourna-t-elle vers ses compagnons derrière elle. « Nous avons confirmé que c'est ici. »\n\nQuelques jours plus tard, le message à [Root.Monarch.GetName] arriva par la main d'une prêtresse de Miradeth, contenant un rapport confirmé d'un nouveau site d'expédition."
 dwarven_pantheon.5.d2:0 "Le prêtre de Miradeth baisse la tête, tandis qu'il jette la bouteille dans le trou, la regardant disparaître dans l'obscurité. Cinq. Dix. Quinze secondes passent avant que le son du verre n'émerge du trou. Puis, il se tourne vers la foule, levant la tête pour parler : « Je consacre cette mine au nom de Miradeth Chercheuse-de-Terre, et puisse la récolte qu'elle apporte être abondante et riche ! » La foule rugit, les échos du son se faisant entendre à des lieues tandis que tous célèbrent l'accomplissement de la bénédiction."
 dwarven_pantheon.5.a:0 "Préparons une expédition !"
 dwarven_pantheon.5.b:0 "Frappons la Terre !"

 dwarven_pantheon.6.t:0 "Dieu de la Forge"
 dwarven_pantheon.6.d:0 "[Root.Monarch.GetName] fut réveillé par le son strident des cors et le martèlement des enclumes, ce qui était déroutant, considérant que la forge la plus proche était éloignée de ses appartements. À l'extérieur du palais, une procession arriva portant une bannière avec le symbole d'Azmirethazin. Avec elle se trouvaient des chariots remplis à ras bord d'armures et d'armements, tandis qu'une variété de forgerons travaillaient encore pour s'assurer que chaque pièce d'équipement était conforme aux normes. Il y avait assez d'équipement pour armer quatre régiments d'infanterie, au minimum, et assez de nains suivant la procession pour les équiper ; chaque volontaire désireux de porter un si bel ouvrage, et disposé à renoncer aux frais de recrutement par-dessus le marché."
 dwarven_pantheon.6.a:0 "Qu'attendons-nous ? Enrôlez-les !"

 dwarven_pantheon.7.t:0 "Pourfendeuse de Monstres"
 dwarven_pantheon.7.d:0 "Le paysage rural est silencieux tandis qu'un prêtre d'Argezenna vêtu d'acier traque les ténèbres. Il n'est qu'un parmi tant d'autres, cherchant les monstres dans l'obscurité qui résident encore dans les lieux au-delà de la lumière civilisée de [Root.Country.GetName]. Sa tâche est sacrée, et la pourriture fétide qu'il repère devant lui dans un campement délabré est sa prochaine cible. Il fait signe aux soldats à sa gauche et à sa droite, et ils allument leurs torches et dégainent leurs armes.\n\nCes créatures ont choisi de se cacher comme des rats, elles mourront donc comme des rats."
 dwarven_pantheon.7.a:0 "La maladie doit être purgée."


 dwarven_pantheon.8.t:0 "Organisateur des Dieux"
 dwarven_pantheon.8.d:0 "Le clerc fatigué soulève une autre pile de papiers et commence à les trier, murmurant une prière à Auirikus en le faisant. L'audit du budget d'excavation de notre pays était bien avancé, et c'était la dernière pile à examiner. En triant les papiers, il repère une anomalie, suivie de plusieurs autres. Quand l'information parvient à [Root.Monarch.GetName], l'histoire complète est claire : plusieurs individus haut placés prélevaient leur part dans plusieurs endroits clés. Le clergé d'Auirikus a proposé d'assister dans des examens complémentaires pour une modique somme. Bien que coûteux, cela libérerait indubitablement une immense quantité de ressources pour les excavations de la forteresse, et pourrait même nous permettre de poursuivre ces individus corrompus."
 dwarven_pantheon.8.a:0 "Les forteresses ne se creusent pas toutes seules."
 dwarven_pantheon.8.b:0 "§T[auirikus_target1.GetName]§!"
 dwarven_pantheon.8.c:0 "§T[auirikus_target2.GetName]§!"
 dwarven_pantheon.8.e:0 "§T[auirikus_target3.GetName]§!"
 dwarven_pantheon.8.f:0 "§T[auirikus_target4.GetName]§!"
 dwarven_pantheon.8.g:0 "§T[auirikus_target5.GetName]§!"

 dwarven_pantheon.9.t:0 "Seigneur des Runes"
 dwarven_pantheon.9.d:0 "Une délégation de prêtres-runiques d'Urisazirn est arrivée à [Root.Capital.GetName] aujourd'hui, apportant avec elle des chariots chargés d'artefacts magiques et d'ouvrages runiques de leur propre création. Ils ont présenté quelques pièces et livres en cadeau à [Root.Monarch.GetName], tandis que le reste fut vendu à divers nobles, guildes de mages et praticiens indépendants pour renflouer les coffres de l'église. Cette distribution massive d'objets magiques renforcera indubitablement l'influence des lanceurs de sorts de notre pays dans un avenir prévisible, ou du moins jusqu'à ce que les objets soient inévitablement perdus ou endommagés par mauvais usage ou malchance."
 dwarven_pantheon.9.a:0 "Nous en ferons bon usage."


 ###deity discovery events
 dwarven_pantheon.30.t:0 "Dagrin Barbe-Éternelle"
 dwarven_pantheon.30.d:0 "Dagrin Barbe-Éternelle, le Père des Montagnes, le Premier Maçon, et d'innombrables autres titres, fut le premier nain. Halanna, la déesse de la création, le façonna dans la caverne de Graine-de-Terre, où il l'assista pour tailler les premières chambres souterraines sous les racines de pierre. Il demeure le parangon de tous les rois nains, gouvernant leurs royaumes avec soin paternel, sagesse et justice. Bien que vénéré comme le premier ancêtre dans le Culte des Ancêtres, dans l'ancien Panthéon Nain il était aussi le patriarche d'un vaste clan de dieux, dont beaucoup seront certainement redécouverts avec le temps..."
 dwarven_pantheon.30.a:0 "Notre Père, enfin retrouvé."

 dwarven_pantheon.31.t:0 "Anvelind Vierge-du-Foyer"
 dwarven_pantheon.31.d:0 "Sculptée de pure essence élémentaire, destinée à être l'égale et la compagne de Dagrin lorsque Halanna réalisa qu'un seul individu ne pouvait sculpter le monde lui-même. Anvelind est la matriarche divine, c'est elle qui juge les dieux et maintient l'ordre dans leur cour. Traditionnellement, ses prêtres sont législateurs et juges, qui cherchent à reproduire sa justice dans les Halls de Dagrin, sous la terre."
 dwarven_pantheon.31.a:0 "Notre Mère, le Foyer ravivé"

 dwarven_pantheon.32.t:0 "Durvorazir Barbe-Éternelle"
 dwarven_pantheon.32.d:0 "Premier fils de Dagrin et Anvelind, Durvorazir maîtrisa l'art de tailler la pierre en blocs et briques dès sa dixième année, et dans ses efforts pour orner et étendre les halls de la demeure de son père, sculpta de nombreuses grandes cavernes dans une soif de maîtrise de son art, n'exigeant rien de moins que la perfection de lui-même dans son métier choisi."
 dwarven_pantheon.32.a:0 "Premier Maçon, Ciseau taillé."

 dwarven_pantheon.33.t:0 "Margurz Maître-Brasseur"
 dwarven_pantheon.33.d:0 "Deuxième fils de Dagrin et Anvelind, Margurz était fasciné par les créatures et plantes de la nature sauvage créées par les Voyageurs et les Primordiaux. Cherchant des moyens d'utiliser celles trouvées au-dessus et en dessous de la terre, Margurz gagna le titre de Maître de la Bière et des Herbes en découvrant le processus de fermentation, et en créant les premières merveilles culinaires et alcoolisées des Nains, ainsi qu'en découvrant les propriétés médicinales des herbes et de l'alcool comme conséquence de ses illuminations antérieures."
 dwarven_pantheon.33.a:0 "Premier Brasseur, levons nos verres !"

 dwarven_pantheon.34.t:0 "Miradeth Chercheuse-de-Terre"
 dwarven_pantheon.34.d:0 "Première fille de Dagrin et Anvelind, Miradeth grandit émerveillée par les prodiges de son frère et chercha à l'aider de toutes les manières possibles. Pour cela, elle sollicita l'aide de son oncle Azmirethazin, et il lui fournit le premier outil conçu non pour façonner la pierre mais pour la briser. Pioche en main, elle creusa de grandes cavernes dans la terre, empilant les gravats haut pour former les premières vraies montagnes. Elle alimenta la forge d'Azmirethazin avec le métal extrait des débris et laissa la pierre à Durvorazir pour qu'il en fasse ce qu'il souhaitait."
 dwarven_pantheon.34.a:0 "Première Mineuse, frappons la Terre !"

 dwarven_pantheon.35.t:0 "Azmirethazin Gardien-de-la-Forge"
 dwarven_pantheon.35.d:0 "Frère de Dagrin et façonné d'une pierre différente par Halanna, Azmirethazin est le patron de tous les forgerons et métallurgistes. Il est également connu pour dispenser la justice de sa sœur Anvelind, brandissant son puissant marteau de forge, Mae'nalenlier. Ses œuvres sont réputées sans égales, bien que certains disent que les objets façonnés par son petit-neveu, Urisazirn, rivalisent ou même surpassent sa qualité."
 dwarven_pantheon.35.a:0 "Premier Forgeron, Forge ravivée"

 dwarven_pantheon.36.t:0 "Dame Argezenna"
 dwarven_pantheon.36.d:0 "La première création d'Azmirethazin dans sa forge fut Argezenna, forgée de Magnétite, de Cendre d'Os et d'Az. C'est elle qui enseigna à Azmirethazin les secrets de la forge et ensemble ils parcoururent le monde pour collecter les matériaux nécessaires à la création d'une forge digne des dieux. C'est durant ce voyage qu'elle devint connue comme la Pourfendeuse de Monstres et Gardienne d'Acier pour ses efforts vaillants à protéger Azmirethazin, incluant l'abattage d'une wyrm ancestrale pour voler sa flamme et alimenter leur forge. Au cours de leur voyage, les deux tombèrent amoureux et travailleraient en tandem dans les Halls de Dagrin."
 dwarven_pantheon.36.a:0 "Première Pourfendeuse, Lame reforgée."

 dwarven_pantheon.37.t:0 "Auirikus, Main de Dagrin"
 dwarven_pantheon.37.d:0 "Jadis un nain mortel durant la fin de l'Ère de la Forge, Auirikus s'éleva à la divinité après que Dagrin eut déterminé que son domaine devenait trop vaste pour qu'il le gère seul. Cherchant un gérant sage et compétent, Dagrin choisit Auirikus comme son intendant pour s'assurer que tout dans son royaume se déroule comme il se doit, et que toutes les tâches soient accomplies à la lettre et dans l'esprit. Auirikus remplit ses devoirs, inspirant la crainte dans le cœur de ceux trouvés insuffisants dans leurs efforts et rejetant le travail bâclé ou incomplet comme un affront à Dagrin. Ceux qui excellaient dans leurs tâches recevaient récompenses et louanges en abondance."
 dwarven_pantheon.37.a:0 "Premier Intendant, Critiques rappelées."

 dwarven_pantheon.38.t:0 "Urisazirn Main-de-Mithril"
 dwarven_pantheon.38.d:0 "Premier fils de Durvorazir, Urisazirn ne possédait pas la même force que son père et son grand-père, mais son esprit était plus affûté que la lame la plus tranchante forgée par la main d'Azmirethazin. Il valorisait la connaissance et la sagesse, et consultait souvent Halanna. Dans les temps anciens, les disputes entre Géants et Dragons laissaient les Nains piétinés, et bien que l'Acier et le Mithril aient aidé à repousser les deux, ce n'était pas suffisant. Voyant cela, il développa un moyen de canaliser la magie latente dans la terre elle-même, la canalisant en une forme de langage capable d'exploiter la magie à la place d'un Nain. Ce fut le premier Ouvrage Runique, et l'histoire de la civilisation naine en fut changée à jamais."
 dwarven_pantheon.38.a:0 "Premier Forgeur de Runes, Mémoire restaurée"

 dwarven_pantheon.39.t:0 "Dolurazan Main-de-Fer"
 dwarven_pantheon.39.d:0 "Fils unique d'Azmirethazin et Argezenna, Dolurazan apprit la maîtrise des métaux noirs tels que le fer forgé et coulé, l'acier, l'adamantine et le titane. Avec le temps, il créa les armes et armures des dieux et de leurs serviteurs durant l'Ère de Guerre. Pendant les Guerres du Brisement des Géants, l'un de ses bras fut tranché par un parent Géant de Feu lors de sa capture. Sa sœur, Derzobrazan, le libéra de captivité et forgea un nouveau bras en remplacement. Dolurazan est considéré comme le patron de tous les forgerons de fer, et nombre de nos forgerons maintiennent désormais de petits sanctuaires en son honneur dans leurs forges."
 dwarven_pantheon.39.a:0 "Forgeron, le fer est chaud"

 dwarven_pantheon.40.t:0 "Derzobrazan Chevelure-d'Or"
 dwarven_pantheon.40.d:0 "Fille d'Azmirethazin et Argezenna, Derzobrazan apprit la maîtrise de tous les métaux nobles, tels que le platine, l'argent, l'or et tous les autres, y compris le Mithril. Elle confectionna les bijoux des dieux, et ses œuvres furent chantées en louanges et légendes par beaucoup. Même les Géants et les Dragons l'imploraient pour ses chefs-d'œuvre. Bien qu'une wyrm vile l'eût enlevée durant l'Ère de Désolation, elle fut abattue par Dagrin lui-même, et la peau de la bête argentée devint le manteau qui lui est souvent associé. Derzobrazan est la patronne de tous les forgerons nobles, et des statues d'argent à son effigie ornent de nombreux halls de guildes de joailliers ou d'orfèvres."
 dwarven_pantheon.40.a:0 "Maîtresse du Mithril !"

 dwarven_pantheon.41.t:0 "Bervinazan Cœur-de-Bronze"
 dwarven_pantheon.41.d:0 "Bervinazan, la seconde fille d'Azmirethazin et Argezenna, apprit la maîtrise de tous les métaux de base, tels que le cuivre, l'étain, le plomb, l'étain fin, le bronze, le laiton et d'autres de leur espèce. Ses talents artistiques étaient inégalés, et elle pouvait créer des statues réalistes, voire vivantes, à partir des métaux et alliages de son domaine. Ses créations servaient de gardes magnifiques, et durant l'Ère de Diminution, quand les Enfants de Setzovar tentèrent de voler les métaux précieux de la terre, ce furent ses œuvres d'art qui les empêchèrent d'habiter ce qui deviendrait le Roc-du-Roi. Elle est révérée comme la patronne de tous les forgerons communs, et son effigie se trouve souvent dans les statues ou sculptures de leurs halls de guilde."
 dwarven_pantheon.41.a:0 "Brillant laiton et bronze..."

 dwarven_pantheon.42.t:0 "Karazlov Appeleur-de-Montagnes"
 dwarven_pantheon.42.d:0 "Karazlov était à l'origine un nain ordinaire doué pour la parole et le chant. Sa performance était si enchanteresse qu'elle captura le cœur des Divins, qui le récompensèrent de la divinité sous Dagrin. Il fut envoyé dans le monde au-delà des demeures montagnardes pour agir comme les yeux et les oreilles de Dagrin. Karazlov devint l'ambassadeur de Dagrin et négocia traités et échanges avec des parents éloignés, tels que les Géants et la progéniture d'Aesanna et Setzovar, les Dragons. Il joua un rôle crucial dans la négociation de la paix à la fin des Guerres du Brisement des Géants. Les diplomates de notre société voyagent désormais avec son symbole sur eux, car on croit qu'il confère un avantage supplémentaire lors des négociations."
 dwarven_pantheon.42.a:0 "Une fois encore, nous appelons l'Appeleur-de-Montagnes."

 dwarven_pantheon.43.t:0 "Grimthar Sculpteur-de-Bois"
 dwarven_pantheon.43.d:0 "Lorsque les premiers arbres émergèrent, ce fut Grimthar qui observa depuis les halls de montagne et vit leur valeur. Il parcourut les forêts naissantes, s'enseignant à les façonner et les sculpter en formes complexes et apprenant leurs usages. Il enseigna même à Margurz quelles parties des arbres pouvaient être transformées en alcool, et créa des tonneaux pour lui permettre de mieux fermenter et conférer des saveurs nouvelles et intéressantes à ses créations. Grâce à la pétition de Margurz et à son propre talent, Grimthar reçut la divinité et devint un ami proche de Margurz. Aujourd'hui, beaucoup de nos brasseurs maintiennent un petit sanctuaire qui lui est dédié dans leurs brasseries pour instiller un esprit de camaraderie dans leur distillation."
 dwarven_pantheon.43.a:0 "Taillons le chêne pour brasser l'avoine !"

 dwarven_pantheon.44.t:0 "Verdrik Azirkra"
 dwarven_pantheon.44.d:0 "Deuxième fils de Durvorazir, Verdrik n'était pas comme son frère plus érudit. Il se concentrait sur les aspects pratiques et physiques de la vie. Il transformait la pierre en blocs et les blocs en bâtiments. Pour lui, l'art était la froide praticité de la pierre qu'il posait, exprimée en arcs et murs de forteresse. Il se spécialisa dans l'ingénierie, construisant des ponts enjambant les gouffres et des routes traversant les cavernes. On dit qu'il était le patron personnel de Hehogrim le Diligent et l'inspira à créer Hehodovar. Néanmoins, de nombreux bâtisseurs de l'antique Hehodovar dédiaient leurs œuvres à son nom, même si son clergé ailleurs serait moins satisfait de certaines libertés prises."
 dwarven_pantheon.44.a:0 "Un pont bien conçu est divin."

 dwarven_pantheon.45.t:0 "Thyrfen Mains-d'Or"
 dwarven_pantheon.45.d:0 "Ancienne reine d'Amldihr, d'avant le règne d'Aul-Dwarov, Thyrfen Mains-d'Or est réputée être celle qui initia le grand exploit d'ingénierie qui transforma le Val-du-Serpent en la terre agricole fertile qui permettrait, avec le temps, à Amldihr de forger l'Empire d'Aul-Dwarov. Pieuse et dévouée aux dieux, elle ne prit pas d'époux et n'enfanta pas, même alors que sa forteresse devenait prospère et riche grâce aux céréales du Val. Juste au moment où son règne atteignait son apogée, on dit que Margurz lui-même la prit pour épouse, descendant des Halls de Dagrin et l'emportant devant toute sa cour."
 dwarven_pantheon.45.a:0 "Gloire à Mains-d'Or !"

 dwarven_pantheon.46.t:0 "Werdûn Œil-de-Diamant"
 dwarven_pantheon.46.d:0 "À l'origine joaillier de l'antique Ovdal Lodhum, Werdûn Œil-de-Diamant fut mis au défi par ses pairs de tailler une gemme qui captiverait les dieux par son art. Après un long et éprouvant voyage à travers l'Arbre-de-Pierre et retour, il retourna à Ovdal Lodhum et présenta un grenat taillé à ses pairs. Ils lui dirent que son pendant était en possession de Dezobrazan elle-même. Après cette déclaration, il disparut, et le temple d'Ovdal Lodhum dédié à elle contenait une nouvelle mosaïque représentant le mariage de Werdûn et Dezobrazan. En tant que patron de la cour et de l'amour, de nombreux jeunes nains recherchaient sa bénédiction pour des mariages heureux."
 dwarven_pantheon.46.a:0 "L'amour est éternel."

 dwarven_pantheon.47.t:0 "Lorgrim la Marcheuse-Lointaine"
 dwarven_pantheon.47.d:0 "Un jour, Lorgrim la Marcheuse-Lointaine apparut pleinement divine, annonçant la fin de l'Ère de la Forge aux côtés de son frère Lorgram. Lorsque la Mort entra dans le monde, elle rassembla les âmes des Nains, tandis que Dagrin restait stupéfait alors que les plus anciens de son peuple s'affaiblissaient soudainement et périssaient du monstre connu sous le nom de Vieillesse et Maladie."
 dwarven_pantheon.47.a:0 "Marche loin, Marcheuse-Lointaine."

 dwarven_pantheon.48.t:0 "Lorgram Gardien-des-Morts"
 dwarven_pantheon.48.d:0 "Apparaissant pleinement divin un jour, l'arrivée de Lorgram Gardien-des-Morts annonça la fin de l'Ère de la Forge aux côtés de sa sœur, Lorgrim. Lorsqu'il apparut, il commença à s'assurer que les âmes des morts étaient emmenées dans les halls de Dagrin et organisées selon leurs compétences et vertus de leur vivant. Ici, dans les profondeurs, il agit comme gardien et custode, s'assurant que les morts sont récompensés ou punis en conséquence."
 dwarven_pantheon.48.a:0 "Puissions-nous être jugés dignes."

 dwarven_pantheon.49.t:0 "Grobilazk le Tordu"
 dwarven_pantheon.49.d:0 "Grobilazk est un vestige d'un âge précédent, une époque où le Vide envahit la Création. Lorsque le Vide se retira, Grobilazk resta. Cependant, Grobilazk était une créature couarde et méprisait ses maîtres. Il fut pris dans le souffle purificateur des Primordiaux lorsqu'ils purifièrent les Voyageurs du Vide, et en conséquence, fut ancré à ce monde. Il s'efforça de rester discret, afin de ne pas attirer l'attention des sept êtres qui régnaient sur la Création. Lorsque les Sept commencèrent à créer des races à leur image, Grobilazk fit de même et créa les premiers gobelinoïdes. En conséquence, la race naine a été tourmentée par ces êtres tout au long de l'histoire."
 dwarven_pantheon.49.a:0 "Celui-là ne me plaît pas."




 ####Rediscovery and disaster

 dwarven_pantheon_speed_tooltip:0 "Une progression rapide vers l'§YAzirnûk§! nous permettra de nous convertir plus tôt et de réclamer le §Ybonus du premier converti§! !\n"
 dwarven_pantheon_slow_tooltip:0 "Une progression plus lente vers l'§YAzirnûk§! nous permet de découvrir plus de §YDivinités§! avant la conversion\n"
 dwarven_pantheon_finish_rediscovery_tooltip:0 "Nous allons §Gachever§! la §YRedécouverte§!"
 dwarven_pantheon_last_chance_tooltip:0 "Ce sera notre dernière chance de nous convertir au Panthéon Nain"



 dwarven_pantheon.100.t:0 "Les Anciens Dieux"
 dwarven_pantheon.100.d:0 "Tandis que notre reconquête du Dwarovar se poursuit, nous découvrons de plus en plus de symboles, d'œuvres et de temples dédiés à l'ancien Panthéon Nain. Cela a provoqué un regain d'intérêt pour ces objets et lieux de la part de nombreux individus. Pour ceux qui s'y intéressent, le but est purement érudit. En effet, quelques individus ont, après avoir vécu ce qui ne peut être décrit que comme des expériences profondes, déclaré se sentir plus proches que jamais de leur histoire ancienne.\n\nBien que certains Gardiens-des-Pierres disent que c'est le début d'une sérieuse dégradation spirituelle, beaucoup d'autres ne sont pas préoccupés par les actions de quelques fous et érudits."
 dwarven_pantheon.100.a:0 "Les querelles des fous ne nous concernent pas."

 dwarven_pantheon.101.t:0 "Pierres à garder"
 dwarven_pantheon.101.d:0 "Ce qui commença avec une poignée d'érudits et un murmure de voix est devenu un bourdonnement constant. Alors que notre reconquête se poursuit, de nombreux Gardiens-des-Pierres sont en émoi car l'un des leurs a officiellement rompu les rangs et commencé à se plonger dans des études impliquant l'ancien Panthéon, après avoir découvert un tome partiellement lisible concernant les dieux et leur relation avec notre peuple."
 dwarven_pantheon.101.a:0 "Peut-être pourrais-je en obtenir une copie ?"
 dwarven_pantheon.101.b:0 "Ils nous ont abandonnés. Cessez. Cela. Immédiatement."

 dwarven_pantheon.102.t:0 "Ancien et nouveau"
 dwarven_pantheon.102.d:0 "Il y a longtemps, à l'époque d'Aul-Dwarov, nos ancêtres vénéraient l'ancien Panthéon qui comprenait de nombreux dieux. Cependant, lorsqu'Aul-Dwarov tomba, nos ancêtres crurent que les dieux les avaient abandonnés et abandonnèrent par conséquent leur foi. Mais alors que nous continuons à reconquérir notre foyer ancestral, il y a ceux qui souhaitent raviver l'ancienne foi, malgré les objections des Gardiens-des-Pierres. Ils proposent que peut-être ce furent nos ancêtres qui abandonnèrent les dieux à la place. Les Gardiens-des-Pierres exigent que nous autorisions le bûcher de ces individus considérés comme hérétiques pour un tel blasphème. Nous ne pouvons plus éviter de prendre parti. Une action doit être entreprise."
 dwarven_pantheon.102.a:0 "Peut-être les avons-nous abandonnés..."
 dwarven_pantheon.102.tooltip:0 "Nous commencerons le processus de redécouverte du Panthéon Nain"
 dwarven_pantheon.102.b:0 "S'ils ne se rétractent pas, ils brûleront."


 dwarven_pantheon.103.t:0 "Dagrin Barbe-Éternelle"
 dwarven_pantheon.103.d:0 "Dagrin Barbe-Éternelle était le dieu principal de l'ancien Panthéon. Alors que nous commençons à reconstituer son histoire à partir de tomes archaïques, de parchemins desséchés et de temples abandonnés, une certaine ferveur s'est emparée d'un groupe d'aventuriers qui ont offert leurs services pour explorer les ruines abandonnées d'un grand temple dédié à Dagrin avant les groupes plus officiels, dans un effort pour accélérer notre progression. Tout ce qui est requis est notre autorisation de le faire."
 dwarven_pantheon.103.a:0 "Nous devons en savoir plus. Laissez-les chercher."
 dwarven_pantheon.103.b:0 "Nous faisons cela correctement, ou pas du tout."

 dwarven_pantheon.104.t:0 "Nain ou Dieu"
 dwarven_pantheon.104.d:0 "La nature de Dagrin Barbe-Éternelle a été un sujet contesté. Il est le modèle auquel tout roi nain aspire : sage, juste, et gouvernant avec instinct paternel sur tout son royaume. Bien que dans le Culte des Ancêtres, il soit loué comme le premier ancêtre, dans l'ancien Panthéon, il était aussi le patriarche d'un vaste clan d'autres dieux, que nous sommes sûrs de redécouvrir avec le temps. Fait intéressant, les deux points de vue le placent comme la première création de Halanna la Mère-Terre, la primordiale de la Terre, et son enfant préféré. Cela pose toujours la question : est-il vraiment un dieu ou simplement un progéniteur favorisé ?"
 dwarven_pantheon.104.a:0 "Un dieu, bien sûr !"
 dwarven_pantheon.104.b:0 "Nous devrions en débattre soigneusement..."

 dwarven_pantheon.105.t:0 "Thyrfen Mains-d'Or"
 dwarven_pantheon.105.d:0 "Nous avons récupéré un livre de rituels et prières complet dédié à l'un des dieux ! Une ancienne reine d'Amldihr, Thyrfen Mains-d'Or, d'avant le règne d'Aul-Dwarov, était réputée être celle qui initia le grand exploit d'ingénierie qui transforma le Val-du-Serpent en la terre agricole fertile qui permettrait, avec le temps, à Amldihr de forger l'Empire d'Aul-Dwarov. Pieuse et dévouée aux dieux elle-même, elle ne prit pas d'époux et n'enfanta pas, même alors que sa forteresse devenait prospère et riche grâce aux céréales du Val. Juste au moment où son règne atteignait son apogée, on dit que Margurz lui-même, probablement un autre dieu, la prit pour épouse, émergeant des Halls de Dagrin et l'emportant devant toute sa cour."
 dwarven_pantheon.105.a:0 "Nous devons en savoir plus."
 dwarven_pantheon.105.b:0 "Doucement, ne soyons pas pressés."

 dwarven_pantheon.106.t:0 "Anvelind Vierge-du-Foyer"
 dwarven_pantheon.106.d:0 "Après beaucoup d'efforts, nous avons rassemblé suffisamment d'informations pour comprendre un autre dieu. Anvelind Vierge-du-Foyer fut sculptée de pure essence élémentaire et destinée à être l'égale et la compagne de Dagrin lorsque Halanna réalisa qu'un seul individu, aussi puissant soit-il, ne pouvait façonner le monde seul. Dans l'ancien Panthéon, Anvelind est considérée comme la matriarche divine, et c'est elle qui juge les dieux et maintient l'ordre dans leur cour. Ses prêtres sont traditionnellement des législateurs et des juges qui cherchent à imiter sa nature juste sous la terre."
 dwarven_pantheon.106.a:0 "Justice divine ? Utile !"
 dwarven_pantheon.106.b:0 "Justice divine ? Inquiétant..."

 dwarven_pantheon.107.t:0 "Lorgrim"
 dwarven_pantheon.107.d:0 "Nous avons reconstitué suffisamment d'informations sur un autre dieu. Lorsque la Mort entra dans le monde et mit fin à l'Ère de la Forge, Lorgrim et son frère jumeau apparurent soudainement. Le rôle de Lorgrim était de rassembler les âmes des Nains tandis que Dagrin restait stupéfait alors que les plus anciens de son peuple s'affaiblissaient soudainement et périssaient des monstres connus sous le nom de Vieillesse et Maladie. Lorgrim parcourut le monde, rassemblant les nains morts et les amenant aux soins de son frère jumeau encore à découvrir."
 dwarven_pantheon.107.a:0 "Peut-être pourrait-elle nous guider aussi ?"
 dwarven_pantheon.107.b:0 "Quelles sont les implications de cela ?"

 dwarven_pantheon.108.t:0 "Lorgram"
 dwarven_pantheon.108.d:0 "Nous avons reconstitué suffisamment d'informations sur un autre dieu. Lorsque la Mort entra dans le monde à la fin de l'Ère de la Forge, Lorgram et sa sœur jumelle apparurent soudainement. Lorgram commença à s'assurer que les âmes des morts étaient emmenées dans les halls de Dagrin et organisées en zones basées sur leurs compétences et vertus de leur vivant. Ici dans les profondeurs, il agit comme gardien et custode, s'assurant que les morts sont récompensés ou punis en conséquence."
 dwarven_pantheon.108.a:0 "Intéressant, poursuivons !"
 dwarven_pantheon.108.b:0 "Intéressant, à un rythme régulier..."

 dwarven_pantheon.109.t:0 "Dieux Jumeaux"
 dwarven_pantheon.109.d:0 "Avec la découverte de Lorgrim et Lorgram, une question s'est posée qui tourmenta sans doute les théologiens de l'ancienne foi. La question est : d'où venaient Lorgrim et Lorgram ? Même les anciens nains ne le savaient pas. Chaque autre dieu que nous avons découvert jusqu'ici a une origine définie, mais ces deux-là sont simplement apparus. Cela a perturbé un certain nombre d'érudits qui exigent que nous suspendions nos études pendant un temps pour considérer correctement les implications possibles que ce manque d'origine pourrait causer dans la société dans son ensemble."
 dwarven_pantheon.109.a:0 "Peu importe, continuons à chercher d'autres dieux."
 dwarven_pantheon.109.b:0 "Peut-être devrions-nous..."

 dwarven_pantheon.110.t:0 "Divinité oubliée"
 dwarven_pantheon.110.d:0 "Grande nouvelle ! Après des efforts d'excavation, de recherche et de reconstruction considérables, nous avons mis au jour un temple dédié à un dieu majeur de l'ancien panthéon. Le temple est en relativement bon état et contient une pléthore d'objets pouvant être étudiés et restaurés. Une équipe d'experts a compilé un résumé approximatif de leurs découvertes afin de partager leur découverte avec le monde."
 dwarven_pantheon.110.a:0 "Très utile, continuez le bon travail !"
 dwarven_pantheon.110.b:0 "Très utile, continuez à un rythme régulier."

 dwarven_pantheon.111.t:0 "Les nombreux dieux du Panthéon"
 dwarven_pantheon.111.d:0 "Après beaucoup d'excavation, de recherche et de reconstruction, nous avons découvert le temple d'un dieu mineur du panthéon en relativement bon état, rempli d'objets pour l'étude et la restauration. Une équipe d'experts a préparé un résumé approximatif de leurs découvertes dans un effort pour diffuser leur découverte."
 dwarven_pantheon.111.a:0 "Utile, continuez le bon travail !"
 dwarven_pantheon.111.b:0 "Utile, continuez à un rythme régulier."

 dwarven_pantheon.112.t:0 "Préparé"
 dwarven_pantheon.112.d:0 "Beaucoup de nos conquérants et érudits croient que nous avons récupéré assez de dieux pour commencer une vénération appropriée d'un panthéon reconstitué. Cependant, beaucoup admettent aussi qu'il reste des lacunes significatives dans leurs connaissances, et certains suggèrent de reporter la conversion officielle jusqu'à ce qu'elles soient comblées. Quoi qu'il en soit, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a le dernier mot sur le fait de changer officiellement ou non pour la foi de nos ancêtres au lieu de notre foi ancestrale."
 dwarven_pantheon.112.a:0 "Pour les dieux !"
 dwarven_pantheon.112.b:0 "Et s'il y en avait plus ?"

 dwarven_pantheon.113.t:0 "Fin du voyage"
 dwarven_pantheon.113.d:0 "Avec un autre dieu mineur découvert, beaucoup de nos plus éminents experts sur le Panthéon sont devenus le clergé naissant du Panthéon des divers dieux que nous avons redécouverts. En effet, même le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a décidé qu'il est maintenant temps de se convertir officiellement. Dans une grande cérémonie, [Root.Monarch.GetName] jura à Dagrin de gouverner avec sagesse et grand leadership et fut confirmé par tous les grands prêtres des clergés officiellement rétablis du Panthéon."
 dwarven_pantheon.113.a:0 "Enfin, c'est terminé."



 ###disaster
 dwarven_pantheon_rediscovery:0 "Azirnûk"
 dwarven_pantheon_rediscovery_end_tooltip:0 "Nous avons surmonté le grand bouleversement causé par notre conversion"

 dwarven_pantheon.200.t:0 "L'Éveil Divin"
 dwarven_pantheon.200.d:0 "La tourmente engloutit le pays. Notre décision d'abandonner le Culte des Ancêtres a bouleversé ou enragé des portions significatives de l'État, de l'armée et de la population civile dans son ensemble. Des fanatiques du Culte des Ancêtres ont commencé à agiter pour une rébellion ouverte, et manifestement, certains individus envisagent certainement cette possibilité, s'ils ne s'y préparent pas déjà secrètement. Ce sera certainement une période de tourmente sans précédent. Car il s'agit d'une lutte quasi inédite dans la société naine : une lutte de foi."
 dwarven_pantheon.200.a:0 "Ainsi cela commence."

 dwarven_pantheon.201.t:0 "Le Panthéon Nain"
 dwarven_pantheon.201.d:0 "Nous avons reçu des nouvelles qu'une autre nation a achevé sa redécouverte du Panthéon avant nous. Beaucoup décrient notre prudence et notre manque de hâte comme une occasion manquée de prouver notre piété et notre foi. D'autres utilisent cela comme une opportunité pour exiger que nous retournions au seul vrai chemin que nos ancêtres ont parcouru et ne nous soucions pas de révérer des dieux qui avaient abandonné notre race auparavant. Bien sûr, là où le [Root.Monarch.GetTitle] marche, la plupart suivront."
 dwarven_pantheon.201.d2:0 "Une autre nation a abandonné le Culte des Ancêtres et s'est tournée vers le Panthéon. Cela a conduit au mécontentement, car certains exigent maintenant que nous adoptions aussi le culte du Panthéon. D'autres exigent que nous restions fidèles au seul vrai chemin que nos ancêtres ont parcouru et ne nous soucions pas de révérer des dieux qui avaient abandonné notre race auparavant. Bien sûr, là où le [Root.Monarch.GetTitle] marche, la plupart suivront."
 dwarven_pantheon.201.a:0 "Malédiction."
 dwarven_pantheon.201.b:0 "Le Panthéon éclairera notre avenir."
 dwarven_pantheon.201.c:0 "Nous resterons fidèles à nos ancêtres."

 dwarven_pantheon.202.t:0 "Les Gardiens-des-Pierres"
 dwarven_pantheon.202.d:0 "Les Gardiens-des-Pierres, les prêtres traditionnels du Culte des Ancêtres, ont longtemps été une partie importante de notre pays. Cependant, avec notre conversion officielle au Panthéonisme, les communautés qu'ils représentent et le pouvoir qu'ils possédaient autrefois sont devenus de plus en plus marginalisés. Maintenant, plusieurs représentants se sont présentés à nous, exigeant que si nous ne voulons pas « revenir au bercail », nous devons formellement émettre une série de concessions plutôt humiliantes, comme les laisser pratiquer leur culte en paix, entre autres."
 dwarven_pantheon.202.a:0 "Nous ferons amende honorable."
 dwarven_pantheon.202.b:0 "Ils s'en remettront."


 dwarven_pantheon.203.t:0 "Guerrier ancestral"
 dwarven_pantheon.203.d:0 "L'un de nos commandants militaires mineurs, un individu au futur militaire très prometteur, pour le moins, a été révélé comme faisant partie d'un complot pour renverser [Root.Monarch.GetName] et rétablir le Culte des Ancêtres. Au lieu de se rendre pacifiquement, il a rassemblé un grand nombre de partisans de l'armée et de la milice locale et a lancé une rébellion bien armée avant l'heure prévue. Heureusement, les autres soutiens n'ont pas saisi l'occasion de frapper."
 dwarven_pantheon.203.a:0 "Pourquoi ne pouvez-vous pas entendre raison ?"

 dwarven_pantheon.204.t:0 "Nos ancêtres"
 dwarven_pantheon.204.d:0 "Une grande partie du problème pour les gens qui restent dévoués au Culte des Ancêtres est la peur, peut-être pas nécessairement infondée, que les exploits, efforts et récits de leurs ancêtres soient mis de côté et oubliés, tout comme les dieux vers lesquels beaucoup de leurs amis et famille se tournent maintenant l'ont été. Nous pourrions certainement apaiser ces inquiétudes, mais ce ne serait ni indolore ni bon marché. Cependant, les ignorer ou, pire, les rejeter entièrement conduirait probablement à davantage de troubles."
 dwarven_pantheon.204.a:0 "Non vénérés, mais toujours honorés."
 dwarven_pantheon.204.b:0 "Ils restent dans notre passé."

 dwarven_pantheon.205.t:0 "Cour divisée"
 dwarven_pantheon.205.d:0 "Le chaos de l'Éveil Divin n'a pas épargné notre cour, avec beaucoup en nos murs refusant de se tourner vers le Panthéon. Les débats et discours sont omniprésents, et les intrigues de cour, dangereuses même dans les meilleurs moments, sont devenues mortelles. Les pires contrevenants des deux côtés n'en éprouvent aucune honte. Quelque chose doit être fait, et rapidement. L'un de nos conseillers les plus proches suggère d'organiser un grand débat théologique, suivi d'un festin, pour calmer les tensions et aider à exprimer les griefs. Un autre suggère l'approche pratique de simplement bannir les adhérents du Culte des Ancêtres de notre cour. Aucune option ne sera sans coût, que ce soit en or ou en sang."
 dwarven_pantheon.205.a:0 "Un festin pour le corps, l'esprit et l'âme, dites-vous ?"
 dwarven_pantheon.205.b:0 "Chassez-les. Tous."

 dwarven_pantheon.206.t:0 "Dagrin Barbe-Éternelle"
 dwarven_pantheon.206.d:0 "La découverte que Dagrin Barbe-Éternelle est à la fois un ancêtre des Nains et un dieu a déclenché un intense débat théologique sur ce que cela signifie pour notre race. Certains se demandent si cela implique que nous sommes divins d'une certaine manière. Si oui, avons-nous toujours été divins ou avons-nous perdu notre divinité à un moment dans le passé lointain ? D'un autre côté, si nous n'avons jamais été divins, cela signifie-t-il que Dagrin n'est pas vraiment un dieu ? Et qu'est-ce qui, précisément, définit un dieu en premier lieu ? Bien que des interprétations officielles aient été publiées, ces questions ont ajouté une autre couche de complexité à l'éveil religieux en cours de notre peuple."
 dwarven_pantheon.206.a:0 "Je n'avais pas prévu cela."

 dwarven_pantheon.207.t:0 "Successeur mécontent"
 dwarven_pantheon.207.d:0 "La conversion de notre dirigeant n'a pas seulement brisé des liens politiques et religieux, mais aussi des liens familiaux. L'héritier de notre nation a été vu s'associant avec divers individus et groupes pro-Ancêtres. Que ce soit une tentative malavisée de réconciliation ou une insulte délibérée envers [Root.Monarch.GetName], le résultat reste le même : mécontentement de tous les côtés pour une raison ou une autre, laissant [Root.Monarch.GetName] furieux."
 dwarven_pantheon.207.a:0 "Pourquoi êtes-vous ainsi."

 dwarven_pantheon.208.t:0 "Prophètes de malheur"
 dwarven_pantheon.208.d:0 "Un culte de fidèles du Culte des Ancêtres a émergé et coordonne des activités à travers notre pays. Plusieurs prédicateurs ont investi les rues, répandant des messages de malheur et de désespoir, avertissant que nous abandonnerons le Panthéon en temps de troubles tout comme nos ancêtres nains antiques l'ont fait, et que notre nation tombera tout comme Aul-Dwarov l'a fait. Néanmoins, nous en avons appréhendé la plupart et les avons mis aux fers. Nous devrions publier une déclaration pour répondre à ces inquiétudes et rassurer le peuple."
 dwarven_pantheon.208.a:0 "Nous sommes plus forts qu'ils ne l'étaient"
 dwarven_pantheon.208.b:0 "Nous pourrions honnêtement revenir en arrière"

 dwarven_pantheon.209.t:0 "Foi étrangère"
 dwarven_pantheon.209.d:0 "Un groupe de nains adorateurs du Panthéon venus de l'étranger ont commencé à critiquer nos pratiques et notre vénération, soulignant l'absence d'un dieu qu'ils croient essentiel. Leurs tentatives de « corriger » nos pratiques ont mis en fureur plusieurs officiels religieux, et la nouvelle se répand rapidement, causant des troubles dans son sillage."
 dwarven_pantheon.209.a:0 "Exaspérant."

 dwarven_pantheon.210.t:0 "Épée contre les ténèbres"
 dwarven_pantheon.210.d:0 "Malgré les troubles au pays, un groupe de nains a commencé à se rassembler pour chasser les gobelins et orques dans nos frontières. Ce n'est pas une pratique inhabituelle, mais ce qui rend ce cas unique est que ce groupe de vétérans endurcis recherche la bénédiction de notre [Root.Monarch.GetTitle] pour quitter nos frontières et apporter la mort aux ennemis de notre race par un rituel qu'eux seuls peuvent accomplir. Envoyer une bande de vétérans bien armés dans une mission aussi dangereuse est une décision difficile à prendre, même en temps de paix, mais pendant cette période de troubles, certains pourraient le voir comme une opportunité ou, pire encore, un signe de faiblesse."
 dwarven_pantheon.210.a:0 "Que leurs lames frappent juste."
 dwarven_pantheon.210.b:0 "Ils doivent rester, on a besoin d'eux ici."

 dwarven_pantheon.211.t:0 "Écriture sur les murs"
 dwarven_pantheon.211.d:0 "En déblayant une vieille section de la forteresse, un tavernier nain surpris a découvert une chapelle complètement intacte dédiée à l'un des dieux du Panthéon en agrandissant sa cave à légumes. Déjà, beaucoup font la queue devant son estaminet pour prendre une pinte et s'émerveiller de l'artisanat de nos ancêtres. Dans un geste de bonne foi, il a accordé à beaucoup de notre clergé l'accès pour enregistrer et restaurer le temple à sa fonction. Un résumé a déjà été préparé pour la consultation du [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 dwarven_pantheon.211.a:0 "Par la barbe de Dagrin !"

 dwarven_pantheon.212.t:0 "La couronne brisée"
 dwarven_pantheon.212.d:0 "Alors que nous nous efforçons de reconquérir à la fois notre foyer ancestral et notre foi, nous nous trouvons au seuil d'une nouvelle ère pour les Nains. Un espoir renouvelé a émergé de restaurer l'Empire d'Aul-Dwarov depuis longtemps perdu. Cependant, un élément crucial doit être sécurisé avant que toute revendication de souveraineté puisse être faite : le Dwarovkron. Cela a conduit à une demande croissante de s'assurer que nous, et nous seuls, possédions toutes les pièces. Certains fidèles du Culte des Ancêtres ont pris offense de cet appel à l'action et l'ont transformé en insulte, suggérant que nous nous croyons plus légitimes qu'eux. Il est impératif que nous communiquions un message clair et sans ambiguïté à toutes les parties impliquées, mais quel devrait être ce message ?"
 dwarven_pantheon.212.a:0 "Nous, pas eux, refergerons ce qui fut brisé."
 dwarven_pantheon.212.b:0 "Ce n'est qu'une couronne, nous n'en avons pas besoin."

 dwarven_pantheon.250.t:0 "Rage ancestrale"
 dwarven_pantheon.250.d:0 "Plus le temps passe, plus il semble que la minorité toujours croissante de fidèles du Culte des Ancêtres devient plus bruyante et plus dangereuse. À [event_province.GetName], un groupe est même allé jusqu'à agresser et massacrer toute une chapelle de Panthéonistes sans défense avec des pioches et autres instruments de mine, avec l'intention de détruire le temple comme un affront aux ancêtres. Finalement, la garde locale a réussi à s'introduire et à tuer ou capturer les responsables. Cependant, cela apporte peu de réconfort aux familles des tués et aux survivants."
 dwarven_pantheon.250.a:0 "Pourquoi doivent-ils être ainsi ?"

 dwarven_pantheon.251.t:0 "Pillards opportunistes"
 dwarven_pantheon.251.d:0 "Dans l'obscurité du Dwarovar, il y a des yeux qui nous observent depuis les ténèbres. Nos ennemis ancestraux voient nos querelles mesquines et rient, sachant que ce sont des conflits comme ceux-ci qui leur donnent une opportunité. Une bande a profité de cette opportunité. Un groupe de gobelins a frappé profondément derrière nos lignes défensives et pillé [event_province.GetName] avant de se fondre dans l'obscurité. Pour aggraver les choses, les représentants locaux des deux communautés du Culte des Ancêtres et du Panthéon se blâment maintenant mutuellement d'avoir laissé entrer les gobelins dans la zone pour attaquer les fidèles de leur camp respectif."
 dwarven_pantheon.251.a:0 "Je suis entouré d'imbéciles !"

 dwarven_pantheon.252.t:0 "Avidité impie"
 dwarven_pantheon.252.d:0 "Un certain nombre de nains fidèles du Culte des Ancêtres à [event_province.GetName] ont commencé à pratiquer des prix exorbitants ou à refuser purement et simplement d'acheter ou de vendre aux Panthéonistes. Cette action semble être menée par de nombreux commerçants locaux et même des guildes entières. En conséquence, cela a paralysé l'économie locale car des industries critiques ne peuvent plus acquérir les matériaux nécessaires et sont forcées d'importer d'ailleurs dans le pays. Bien que les taxes légèrement plus élevées impliquant le transport et l'importation de matériaux puissent apporter quelque réconfort aux locaux, au moins l'État peut tirer quelque profit de cette situation."
 dwarven_pantheon.252.a:0 "Quelle terrible affaire..."

 dwarven_pantheon.253.t:0 "Bataille de foi"
 dwarven_pantheon.253.d:0 "Les combats font rage dans les rues de [event_province.GetName] alors que de petites bagarres de taverne et des affrontements de rue occasionnels ont explosé comme un fût de bière forte mis à feu. Des blocs entiers de [event_province.GetName] sont tenus par un camp ou l'autre, tandis que des individus sont forcés de fuir leurs maisons vers des zones où leur choix religieux est préféré ou risquent d'être exécutés par des bandes de zélotes. La garnison locale est assiégée, avec des fidèles du Culte des Ancêtres sous le commandement d'un démagogue charismatique qui appelle à l'exécution de [Root.Monarch.GetName]."
 dwarven_pantheon.253.a:0 "C'est très mauvais."

 dwarven_pantheon.299.t:0 "Enfin éveillé"
 dwarven_pantheon.299.d:0 "Comme un feu mourant, le chaos de l'Éveil Divin a finalement commencé à se calmer, se transformant en braises et cendres alors que notre nation s'est finalement installée dans un nouveau statu quo. Les fidèles du Culte des Ancêtres restants ont fini par accepter que [Root.Monarch.GetName] a embrassé le Panthéon de nos ancêtres et ne reviendra pas à leurs anciennes pratiques. Bien que nous ayons aussi accepté ce changement, nos rivaux et ennemis n'ont pas été oisifs."
 dwarven_pantheon.299.a:0 "Que nos ennemis tremblent."
 dwarven_pantheon.299.b:0 "Il y a encore plus à trouver."
 dwarven_pantheon.299.tooltip:0 "Des §YDivinités§! supplémentaires peuvent être découvertes en §Ycreusant des Forteresses§! jusqu'au §Yniveau quatre§! et par §Ypropagation passive§!\n\nLes effets de §YRituel§! des §DDivinités Majeures§! peuvent être consultés dans leurs §Ydescriptions§!"



 ##misc events
 dwarven_pantheon.300.t:0 "Le Panthéon Nain"
 dwarven_pantheon.300.d:0 "Le déclin et la chute d'Aul-Dwarov ont laissé notre forteresse isolée et à la dérive dans un monde changeant. Bien que d'autres aient vacillé, nous n'avons pas abandonné notre foi. Néanmoins, notre isolement n'a pas été sans pertes. De nombreuses divinités avaient leurs prêtres et temples dirigés par des prêtres envoyés des forteresses de l'Échine-du-Serpent pour assurer la bonne observance des rites. Avec le changement des temps et la chute d'Aul-Dwarov, nous fûmes forcés de nous occuper nous-mêmes de ces sanctuaires et d'accomplir ces rituels. Finalement, les ressources et la main-d'œuvre limitées nous ont forcés à abandonner ces rituels pour notre survie. Mais les temps changent à nouveau. Le monde s'éveille, et les anciens dieux rappellent leur peuple au bercail. Nous répondrons à l'appel une fois que nous aurons compris comment. De nombreux clans conservent encore des rituels et tomes étranges qui pourraient nous aider à rétablir le culte de ces dieux oubliés."
 dwarven_pantheon.300.a:0 "Venez, vous tous les fidèles."
 dwarven_pantheon.300.tooltip:0 "Des §YDivinités§! supplémentaires seront débloquées au fil du temps\nLes effets de §YRituel§! des §DDivinités Majeures§! peuvent être consultés dans leurs §Ydescriptions§!"

 dwarven_pantheon.301.t:0 "Culte renouvelé"
 dwarven_pantheon.301.d:0 "Après beaucoup d'efforts, nous avons réussi à récupérer suffisamment de rites et rituels appropriés qui ont été conservés par des clans individuels et des tomes oubliés. En conséquence, leur culte a finalement été ravivé, et le premier temple consacré à leur vénération a été consacré conformément aux rites appropriés après des siècles de silence. De nombreux aspirants affluent maintenant vers le temple, cherchant à rejoindre le nouveau clergé ou simplement à offrir prières et dons pour s'assurer que leur foi ne soit plus oubliée."
 dwarven_pantheon.301.a:0 "Gardez-moi une place."

 dwarven_pantheon.302.t:0 "Le Panthéon grandit"
 dwarven_pantheon.302.d:0 "Après beaucoup d'efforts, nous avons réussi à récupérer suffisamment de livres rituels, œuvres d'art et tomes liés à la théologie pour établir avec confiance de nouveaux temples et nommer de nouveaux prêtres pour un autre dieu oublié du panthéon. En conséquence, nous avons achevé le premier temple à cette divinité nouvellement rappelée à [Root.Capital.GetName], avec l'espoir qu'il sera le premier de beaucoup à venir dédiés à cette divinité."
 dwarven_pantheon.302.a:0 "Gardez-moi une place."




