 eordellon.5.t:0 "Les Hérésies Saisonnières"
 eordellon.5.d.normal:0 "Les elfes d'Éordande suivent les Fées des cours saisonnières : Printemps, Été, Automne et Hiver. Il fut un temps où nous aurions pu être unis dans ce culte, mais ce n'est plus le cas aujourd'hui, chaque saison ayant ses propres fidèles dévoués, ainsi que l'accent d'Eordellon sur « l'équilibre saisonnier », quelle que soit leur interprétation.\nCette division se reflète également dans la façon dont les fées traitent avec nous, car aucun d'entre nous n'est considéré comme assez durable ou important pour que les plus puissantes d'entre elles daignent traiter avec nous, hormis le patronage occasionnel d'individus spécifiques.\nPour remédier à cela, nous devrons trouver des moyens d'accroître notre prestige parmi les fées, ainsi qu'éliminer la concurrence."
 eordellon.5.d.convert:0 "Nous avons récemment changé la cour que nous suivons, ou cessé de suivre une saison spécifique. Bien que notre importance parmi les Fées dans leur ensemble n'ait pas diminué, nos anciens influenceurs pourraient avoir besoin d'être convaincus de nous parler à nouveau."
 eordellon.5.a:0 "Nous nous élèverons au-dessus des autres."

 eordellon.6.t:0 "Kobolds Touchés-par-les-Fées"
 eordellon.6.d:0 "Depuis plusieurs décennies maintenant, des kobolds vivent sur nos terres. Durant ce temps, leur inclination à vénérer les dragons les a menés à graviter vers les dragons féeriques. Les dragons féeriques ont accueilli cette dévotion positivement, considérant souvent les kobolds comme leurs compagnons de jeu préférés. De nombreux kobolds ont même abandonné leurs anciennes identités culturelles, se nommant désormais touchés-par-les-fées en l'honneur de leurs patrons féeriques. Bien que l'impact sur notre nation ait été minimal, certains voient cette relation comme un excellent exemple de relation idéale avec les fées."
 eordellon.6.a:0 "Au moins, ils sont adorables."

 eordellon.8.t:0 "L'Ambassade est Achevée"
 eordellon.8.d:0 "Notre ambassade auprès des fées est enfin achevée. Bien que nous ayons dû faire des choix difficiles et des compromis pour la construire, l'ambassade se dresse maintenant comme un conduit par lequel nous pouvons communiquer avec les fées selon les besoins. Bien sûr, tous nos choix ont influencé notre relation avec les fées, et la façon dont nous sommes susceptibles d'interagir avec elles à l'avenir. De même, nos expériences nous ont donné une nouvelle compréhension et une nouvelle vision des fées, et ont mis notre relation avec elles sous un nouveau jour. La nature de cette relation est :"
 eordellon.8.a:0 "Une de coopération mutuelle et de respect."
 eordellon.8.b:0 "Une de loyauté et de soumission aux fées."
 eordellon.8.c:0 "Une d'indifférence et d'influence limitée."

 eordellon.9.t:0 "Une Fée Mineure Veut un Colifichet"
 eordellon.9.d:0 "Une histoire classique se répète tandis que notre ambassade auprès des fées progresse vers son achèvement. Des fées mineures, comme des lutins ou des nymphes, se sont intéressées à certaines possessions et objets de valeur, exigeant que ces objets leur soient remis. Le problème devient assez courant pour qu'une politique concrète pour ces demandes et les futures soit établie. Quelle ligne de conduite devrions-nous adopter ?"
 eordellon.9.a:0 "Donnons simplement aux fées tout ce qu'elles demandent."
 eordellon.9.b:0 "Offrons-leur plutôt quelques babioles brillantes mais inutiles."
 eordellon.9.c:0 "Créons des taux d'échange standard, et laissons les fées troquer ce qu'elles veulent."

 eordellon.10.t:0 "Les Élémentaires Sèment le Chaos"
 eordellon.10.d:0 "Les élémentaires, par leur nature même, sont des créatures volatiles, enclines à causer la destruction partout où elles vont. C'est particulièrement vrai pour les structures construites par les elfes, comme notre ambassade en développement et la colonie autour d'elle. Voir l'ambassade détruite en hébergeant des élémentaires serait déjà assez grave, mais les dommages aux communautés environnantes seraient encore plus sévères. Comment devrions-nous aborder ce problème avant qu'il ne s'aggrave ?"
 eordellon.10.a:0 "Nous devons demander aux élémentaires de rester hors de notre colonie."
 eordellon.10.b:0 "Investissons dans des structures renforcées capables de résister aux élémentaires."
 eordellon.10.c:0 "Nos mages peuvent sûrement trouver une solution, mettons-les au travail."

 eordellon.11.t:0 "C'est la Fête"
 eordellon.11.d:0 "Nous avons récemment remarqué une diminution marquée des progrès sur l'ambassade, et même sur divers projets autour d'elle. Après une légère enquête, le coupable est simple : des satyres, des nymphes et des dryades ont organisé des fêtes avec nos ouvriers, interrompant tout travail. Nous devons trouver un moyen de gérer cela si nous voulons que quoi que ce soit soit accompli."
 eordellon.11.a:0 "Envoyez les autorités pour forcer ces fainéants à retourner au travail !"
 eordellon.11.b:0 "Laissons faire. Les fêtes devront bien finir un jour."
 eordellon.11.c:0 "Formalisons l'arrangement avec des temps de fête obligatoires pour les ouvriers."

 eordellon.12.t:0 "Une Fée Exige un Traitement Spécial"
 eordellon.12.desc:0 "Une fée s'identifiant comme un individu très important a formulé des exigences ridicules concernant notre ambassade en développement ces derniers temps. Logements spéciaux, fêtes somptueuses, serviteurs personnels : la liste continue. Bien que ces demandes ne soient guère au-delà de notre capacité à les satisfaire, elles constitueraient une dépense supplémentaire, et une que nous pourrions ne pas vouloir payer. Mais bien sûr, mécontenter une fée est chose dangereuse... que devrions-nous faire ?"
 eordellon.12.a:0 "Apaisons-la simplement, nous n'avons pas besoin d'ennuis."
 eordellon.12.b:0 "Ne lui donnons rien !"
 eordellon.12.c:0 "Un peu de magie devrait la remettre à sa place."
 eordellon.12.d:0 "Nous servons une archifée, faisons appel à elle pour de l'aide !"

 eordellon.13.t:0 "Le Vieil Homme des Archives Vient en Visite"
 eordellon.13.d:0 "Notre construction d'ambassade en cours a attiré l'attention du Vieil Homme des Archives, une archifée particulièrement respectée parmi les fidèles de la Cour du Printemps. Son intérêt dépasse la simple curiosité, cependant : il nous a demandé des livres, ainsi qu'un espace alloué pour qu'il puisse mener ses travaux. Ce n'est guère surprenant, considérant qu'il représente beaucoup en matière de connaissance et d'apprentissage, particulièrement pour ceux qui se tournent vers le passé pour guidance.\n\nLe Vieil Homme ne peut simplement être refusé d'emblée, de peur d'encourir le courroux d'une archifée et de ses fidèles. De plus, lui plaire pourrait nous apporter de grands avantages, si nous sommes prêts à en assumer la dépense. Comment devrions-nous satisfaire sa demande ?"
 eordellon.13.a:0 "Agrandissons nos bibliothèques et accordons-lui un accès complet, à lui et ses fidèles."
 eordellon.13.b:0 "Accordons-lui l'accès à tout livre au sein de nos frontières."
 eordellon.13.c:0 "Achetons-lui simplement quelques livres et qu'on en finisse."

 eordellon.14.t:0 "Le Kraken Cherche de la Compagnie"
 eordellon.14.d:0 "Avec les travaux sur notre ambassade progressant bien, nous avons attiré l'attention du Kraken, une archifée particulièrement respectée par les fidèles de la Cour de l'Été. Il a demandé l'accès à notre ambassade afin de pouvoir interagir avec tous ceux qui pourraient traverser ses halls. Ce serait une demande triviale à satisfaire, n'était-ce un problème : le Kraken est lié à l'eau, et notre ambassade est sur terre.\n\nBien sûr, nous ne pouvons simplement rejeter la demande du Kraken. C'est, après tout, une archifée, et très respectée parmi les fidèles de la Cour de l'Été. La question est, comment allons-nous le satisfaire ?"
 eordellon.14.a:0 "Agrandissons les ports voisins et relions notre ambassade à eux."
 eordellon.14.b:0 "Assignons un détachement de mages aux besoins du Kraken."
 eordellon.14.c:0 "Construisons une série de canaux pour que toutes les fées aquatiques puissent venir visiter !"

 eordellon.15.t:0 "Le Chevalier du Crépuscule Veut un Duel"
 eordellon.15.d:0 "Notre travail sur l'ambassade nous a valu l'attention du Chevalier du Crépuscule, une archifée qui a embrassé la cause de la Cour de l'Automne et cherche à redresser les torts en général. Heureusement, il n'a pas de querelle avec nous : il désire simplement un duel captivant pour tester notre valeur. Il y a plusieurs façons dont nous pourrions satisfaire cette demande, bien sûr, et le Chevalier du Crépuscule ne semble pas particulièrement difficile.\n\nCela dit, il ne peut simplement être ignoré non plus. Le faire serait un immense manque de respect, et causerait sans doute plus de problèmes qu'un duel n'en vaut. En même temps, apaiser le Chevalier du Crépuscule pourrait gagner sa faveur, surtout si nous lui offrons un bon combat. Comment devrions-nous aborder cela ?"
 eordellon.15.a:0 "Je le défierai moi-même en duel !"
 eordellon.15.b:0 "Réservons un espace dans l'ambassade pour des tournois."
 eordellon.15.c:0 "Accordons-lui une académie pour former des duellistes en herbe."

 eordellon.16.t:0 "Le Chef du Cœur-d'Hiver Demande l'Hospitalité"
 eordellon.16.d:0 "Tandis que notre ambassade progresse vers son achèvement, elle nous a valu l'intérêt du Chef du Cœur-d'Hiver, une archifée particulièrement respectée parmi les fidèles de la Cour de l'Hiver. Il a exprimé sa satisfaction quant à l'idée de notre ambassade, et nous a demandé d'organiser un grand festin pour que tous se sentent les bienvenus. Il a offert de l'aide pour la préparation de la nourriture, mais la tâche globale d'organiser le festin nous incombe.\n\nBien sûr, ce n'est pas simplement une suggestion polie, et refuser le Chef du Cœur-d'Hiver serait incroyablement imprudent. De même, lui plaire par notre hospitalité pourrait le faire nous regarder favorablement. Comment devrions-nous aborder la conduite de ce festin ?"
 eordellon.16.a:0 "Achetons les mets les plus luxueux que nous puissions nous permettre !"
 eordellon.16.b:0 "Achetons autant de nourriture que possible pour que tous puissent manger à satiété."
 eordellon.16.c:0 "Peut-être le Chef du Cœur-d'Hiver peut-il aider à conserver notre nourriture pour un festin plus long ?"

 eordellon.17.t:0 "La Reine Sans-Trône Arrive"
 eordellon.17.pelomar:0 "Notre ambassade en développement a reçu une visiteuse des plus auspicieuses. La Reine Sans-Trône, souveraine du Dromandrod, archifée et patronne de notre royaume, est apparue pour nous honorer de sa présence. Mais elle ne vient pas simplement voir l'ambassade, comme elle l'a clairement fait savoir. En effet, elle a demandé avec insistance des nouvelles de nos progrès dans l'unification d'Éordande sous notre règne.\n\nC'est par son mandat que nous sommes tenus de maintenir l'équilibre saisonnier, et par sa grâce que nous avons droit à toute l'Éordande. Mais cela ne signifie pas que nous n'avons pas eu à lutter pour affirmer cette autorité. Avec l'attention de sa majesté si directement sur nous, nous pouvons espérer quelque bienfait si nos progrès lui plaisent. Cela dit, si nous avons manqué à notre objectif, son apparition est sûre de motiver notre royaume à tous les niveaux à renouveler ses efforts. Que devons-nous lui dire ?"
 eordellon.17.notpelomar:0 "Notre ambassade en développement a reçu une visiteuse des plus auspicieuses. La Reine Sans-Trône, souveraine du Dromandrod, archifée et patronne de Pelomar, est apparue pour nous honorer de sa présence. Cependant, sa visite a un but, et un que certains dans notre royaume pourraient trouver inconvenant. Elle a exigé que nous pliions le genou devant Pelomar et reconnaissions une fois pour toutes leur autorité sur toute l'Éordande.\n\nBien sûr, nous pouvons toujours refuser cette demande, même au risque d'offenser une grande alliée du peuple Peitar. Certains de nos conseillers ont même suggéré que la Reine Sans-Trône pourrait être persuadée de nous permettre d'usurper la place de Pelomar, si nous avons réussi à démontrer notre supériorité sur eux à ce stade. Quelle devrait être notre réponse ?"
 eordellon.17.newclaiment:0 "Notre ambassade en développement a reçu une visiteuse des plus auspicieuses. La Reine Sans-Trône, souveraine du Dromandrod, archifée et patronne de Pelomar, est apparue pour nous honorer de sa présence. Malgré plusieurs commentaires obliques et réprobateurs sur notre destruction de Pelomar, incluant une félicitation pour avoir « audacieusement redéfini ce que signifie prêter serment », elle ne semble pas être venue nous punir. En effet, elle a demandé comment nous progressons dans l'accomplissement du mandat de Pelomar d'unifier l'Éordande.\n\nCeux d'entre nous qui peuvent ravaler leur fierté et voir au-delà de la légère moquerie voient cela pour ce que c'est vraiment. La Reine Sans-Trône nous a investis de la mission de Pelomar d'unifier et de régner sur l'Éordande, avec toute la responsabilité que cela implique. Bien sûr, avec de grandes responsabilités peuvent venir de grands pouvoirs. Même si nous luttons encore pour réaliser ce rêve, notre nouveau mandat inspirerait probablement une grande ferveur parmi notre peuple. Que devrons-nous lui rapporter ?"
 eordellon.17.a:0 "Nous nous soumettrons à Pelomar, votre majesté."
 eordellon.17.b:0 "Pelomar a échoué. Nous prendrons leur place."
 eordellon.17.c:0 "Nous progressons bien, votre majesté."
 eordellon.17.d:0 "Ce n'est... pas aussi fluide que nous le souhaiterions."
 eordellon.17.e:0 "C'est déjà accompli."

 eordellon.18.t:0 "Méfaits des Dragons Féeriques"
 eordellon.18.d:0 "Malgré leur apparence superficiellement mignonne, les dragons féeriques peuvent être assez dangereux. Ils sont enclins à la malice, et sont étonnamment forts. Bien que cela n'ait pas encore causé de problèmes sérieux pour nous, certains parents ont commencé à se plaindre de l'activité des dragons féeriques. Plus précisément, ces parents croient que leurs enfants sont négativement influencés par les dragons féeriques, et pourraient même être mis en danger par eux. Nous avons reçu assez de plaintes pour que cela mérite au moins une réponse. Bien sûr, étant des fées, simplement refuser des compagnons de jeu aux dragons féeriques serait très imprudent. Que devrions-nous faire à la place ?"
 eordellon.18.a:0 "Pourquoi ne pas inviter des kobolds à jouer avec eux ?"
 eordellon.18.b:0 "Ils ne font que jouer, dites aux parents de se calmer."
 eordellon.18.c:0 "Assignons des serviteurs pour divertir les dragons féeriques à la place."

 eordellon.19.t:0 "Des Guenaudes Arrivent à l'Ambassade"
 eordellon.19.desc:0 "Bien que de nombreuses fées soient au mieux des créatures capricieuses, elles sont souvent assez faciles à comprendre et à apaiser. C'est rarement le cas avec les guenaudes. Elles sont à la fois incroyablement puissantes et enclines à un comportement malveillant, et on peut leur attribuer de nombreux malheurs personnels à travers l'Éordande. Malheureusement, il semble qu'un groupe de guenaudes ait remarqué notre ambassade naissante, et soit arrivé exigeant reconnaissance et respect. Une réponse est nécessaire, avant qu'elles ne causent de graves problèmes pour nous et notre peuple."
 eordellon.19.a:0 "Envoyez l'armée pour les chasser."
 eordellon.19.b:0 "Je les chasserai moi-même."
 eordellon.19.c:0 "Faites que nos mages les repoussent."
 eordellon.19.d:0 "Négocions avec les guenaudes les plus raisonnables parmi elles."
 eordellon.19.e:0 "Accueillons-les, bien sûr !"

 eordellon.22.t:0 "Les Guenaudes Prennent leur Dû"
 eordellon.22.d:0 "Il y a dix ans, nous avons conclu un pacte avec des Guenaudes, une décision qui peut sembler insensée rétrospectivement. Bien que nous ayons gagné une grande force, un prix doit être payé, et bien que nous aurions pu le faire plus tôt, elles semblent être venues collecter par elles-mêmes, que nous le voulions ou non."
 eordellon.22.a:0 "Malédiction."

