 eordellon.3.t:0 "Festival"
 eordellon.3.spring:0 "Notre dévotion particulière au Printemps ces derniers temps a inspiré un festival entièrement dédié à cette saison. Tandis qu'innombrables fleurs commencent à éclore, beaucoup sont cueillies et rassemblées en une grande exposition de la générosité printanière. Amis et famille se réunissent, souvent pour la première fois depuis des mois, et savourent la douce chaleur et la brise fraîche de la saison. Pique-niques et festins sont monnaie courante, et l'atmosphère est généralement à la jubilation et à l'abondance."
 eordellon.3.summer:0 "Notre dévotion particulière à l'Été ces derniers temps a inspiré un festival entièrement dédié à cette saison. Cela a inclus de nombreuses fêtes organisées le long des plages de notre nation, avec nombre de nos citoyens profitant d'une baignade relaxante ou d'une promenade en bateau pour se rafraîchir de la chaleur estivale. La nourriture étant encore abondante et pléthorique, ces fêtes sont fort bien pourvues. Partout, l'ambiance est à l'optimisme insouciant et à l'espièglerie."
 eordellon.3.autumn:0 "Notre dévotion particulière à l'Automne ces derniers temps a inspiré un festival entièrement dédié à cette saison. Les communautés se rassemblent pour rendre grâce du répit entre les saisons chaudes et l'emprise de l'Hiver, et pour profiter de la compagnie les uns des autres en plein air. Tandis que les feuilles commencent à tourner et à tomber, beaucoup sont collectées et utilisées comme décoration, que ce soit pour les foyers ou comme offrandes aux fées. En général, c'est un temps de gratitude et de préparation aux défis à venir."
 eordellon.3.winter:0 "Notre dévotion particulière à l'Hiver ces derniers temps a inspiré un festival entièrement dédié à cette saison. Bien que les éléments puissent en faire une perspective ardue, les familles se rassemblent néanmoins pour profiter de la compagnie les unes des autres autour de la chaleur de leurs feux. Des cadeaux sont échangés, et la nourriture mise de côté pour l'occasion est savourée généreusement. Si le temps le permet, certains enfants sortent même jouer dans la neige. Malgré toutes les épreuves que l'Hiver peut apporter, notre peuple ressent désormais un sentiment de résilience et de proximité qu'aucune autre saison ne peut vraiment offrir."
 eordellon.3.eordellon:0 "Notre dévouement à l'équilibre des quatre saisons ces derniers temps a inspiré un festival dédié à ce concept même. Les célébrations présentent souvent un mélange d'éléments, des fleurs du Printemps et de la jubilation de l'Été, à la gratitude de l'Automne et à la réflexion de l'Hiver. Les festins également sont souvent un mélange des meilleurs mets que chaque saison peut offrir. Malgré le mélange apparemment éclectique d'éléments et d'honneurs, l'expérience entière devient une de cohésion, d'unité et de compréhension. Non seulement pour les quatre saisons, mais les uns pour les autres."
 eordellon.3.default:0 "Malgré l'absence d'influence spécifique sur notre pensée saisonnière ces derniers temps, nous pouvons toujours célébrer. Quelles que soient les épreuves que nous rencontrons, ou les bienfaits dont nous jouissons, il y a toujours quelque chose dont se réjouir, et toujours des occasions de se réunir et de faire la fête. Nous ne devons jamais oublier que l'unité prend de nombreuses formes, et bien qu'elles ne soient pas toutes aussi distinctives ou grandioses, elles n'en sont pas moins importantes."
 eordellon.summer.festival.tooltip.1:0 "Gagnez 1 année de revenus commerciaux"
 eordellon.summer.festival.tooltip.2:0 "Gagnez 2 années de revenus commerciaux"
