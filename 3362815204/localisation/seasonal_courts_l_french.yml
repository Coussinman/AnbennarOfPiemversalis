 eordellon.4.eordellon.one.tt:0 "Pour nous affirmer comme le véritable $MONARCHTITLE$ d'Éordande, nous devons contrôler la capitale des cours hérétiques.\nStatut :\n[Root.tag_own_gemradcurt]\n[Root.tag_own_arakeprun]\n[Root.tag_own_murdkather]\n[Root.tag_own_einnsag]\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.eordellon.two.tt:0 "Pour étendre l'influence des cours saisonnières, nous devons posséder §Y5§! provinces de religion §JEordellon§! soit dans l'§YYnn§! soit dans les §YBois-Profonds§!\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.spring.one.tt:0 "Pour approfondir notre connaissance de nos Précurseurs, nous devons posséder §Y8 provinces à reliques Précurseurs§! directement ou via nos sujets.\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.spring.two.tt:0 "Pour montrer au monde que nous pouvons nourrir un empire, nous devons produire §Y30§! unités de §YCéréales§!\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.summer.one.tt:0 "Pour montrer nos ambitions reclamationnistes, nous devons posséder (directement ou via nos sujets) §Y5§! provinces à §YHaraf§!\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.summer.two.tt:0 "Pour montrer que l'été ne finit jamais dans notre empire, nous devons posséder directement ou via nos sujets §Y5§! provinces en dehors d'§YHaraf§!, de l'§YYnn§!, des §YBois-Profonds§!, des §YTerres Brisées§! et de l'§YÉordande§!\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.autumn.one.tt:0 "Pour achever notre croisade, nous devons nous assurer qu'aucun pays suivant la Cour de l'Hiver n'existe encore, et que toutes les provinces colonisées de la Cour de l'Hiver sont converties, ou autrement parvenir à un arrangement avec leurs fidèles.\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.autumn.two.tt:0 "Pour montrer notre prouesse militaire au monde, nous devons vaincre une puissance cannorienne.\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.winter.one.tt:0 "Pour mettre fin à la croisade automnale, nous devons nous assurer qu'aucun pays suivant la Cour de l'Automne n'existe encore et que toutes les provinces colonisées de la Cour de l'Automne sont converties, ou autrement parvenir à un arrangement avec leurs fidèles.\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"
 eordellon.4.winter.two.tt:0 "Pour montrer au monde notre hospitalité, nous devons accepter §Y3§! cultures non §MNés-des-Ruines§!, chacune de races différentes.\n--------------------------------------------------------------\nUne fois cela accompli, nous obtiendrons ce qui suit :"

