l_french:
 #original
 homebrew_highseas_ideas:0 "§B***§W Idées de Haute Mer §B***§W"
 homebrew_highseas_ideas_desc:0 "Nous avons concentré nos ambitions navales sur les eaux profondes."
 homebrew_highseasfleet:0 "Flotte de Haute Mer"
 homebrew_highseasfleet_desc:0 "Projeter notre marine en haute mer nous a enseigné bien des choses sur la vie des marins."
 homebrew_seaelftutelage:0 "Tutelle des Elfes Marins"
 homebrew_seaelftutelage_desc:0 "Les Elfes Marins ont vécu sur de grands navires pendant plus d'un millénaire, repoussant leurs ennemis grâce à leurs puissants vaisseaux de guerre. Nous devrions solliciter leur savoir en matière de construction navale."
 homebrew_fingeronthepulse:0 "L'Œil sur l'Horizon"
 homebrew_fingeronthepulse_desc:0 "Avec nos yeux et nos oreilles tournés vers les flots, nous sommes en position d'exploiter tout marchand complaisant en mer... et de savoir quand les nôtres sont en danger."
 homebrew_marineracademies:0 "Académies de Marins"
 homebrew_marineracademies_desc:0 "En fondant des écoles publiques pour les futurs marins, nous pouvons former un vivier croissant de matelots disponibles et d'industries navales."
 homebrew_feywood:0 "Importations de Bois Féerique"
 homebrew_feywood_desc:0 "Alors que les caravanes marchandes établissent le contact avec les Bois-Profonds, la connaissance du bois enchanté des elfes sylvestres parvient à nos cours. En achetant ce « bois féerique », nos navires deviendront hautement résistants au feu ennemi."
 homebrew_merchantnavy:0 "Marine Marchande"
 homebrew_merchantnavy_desc:0 "Notre marine a toujours joué un rôle dans la protection du commerce outre-mer, et est devenue particulièrement efficace pour contrôler le flux des marchandises locales."
 homebrew_signalspells:0 "Mages au Pied Marin"
 homebrew_signalspells_desc:0 "L'emploi de mages sur nos navires a accru à la fois leur puissance de feu et leur capacité à transmettre des informations. Les signaux de pavillons peuvent être remplacés par certains sorts, ou rendus complètement obsolètes par l'usage d'un sort de communication."
 homebrew_amphibious_ideas:0 "§B***§W Idées Amphibies §B***§W"
 homebrew_amphibious_ideas_desc:0 "Nous avons concentré nos ambitions navales sur le littoral."
 homebrew_orcishrowmen:0 "Rameurs Orques"
 homebrew_orcishrowmen_desc:0 "Le commerce d'esclaves orques ne servait pas exclusivement les propriétaires de plantations. En employant des esclaves orques sur nos galères, nous pouvons utiliser leur force musculaire exceptionnelle et propulser nos navires plus vite que jamais, sans coût pour nos marins professionnels."
 homebrew_marinepropoganda:0 "Propagande des Fusiliers Marins"
 homebrew_marinepropoganda_desc:0 "Qu'est-ce que tu viens de dire sur moi, petite vermine ? Sache que j'ai été diplômé premier de ma promotion chez les Fusiliers Marins de Munas, que j'ai participé à de nombreux raids secrets sur Gnollakaz, et que j'ai plus de 300 victimes confirmées. Je suis formé à la guerre kobold et je suis le meilleur tireur d'élite de toutes les forces armées d'Eborthil. Tu n'es rien pour moi qu'une cible de plus. Je vais t'éliminer avec une précision jamais vue sur Halann, retiens bien mes paroles."
 homebrew_overseasprojection:0 "Capacité d'Invasion"
 homebrew_overseasprojection_desc:0 "« Vos mers sont sans défense, l'ami. Si faciles à piller. » \n§GDébloque le Casus Belli d'Invasion Côtière§W"
 homebrew_merchantsfriend:0 "Extorsion des Marchands"
 homebrew_merchantsfriend_desc:0 "Nombre de négociants utilisent les repères côtiers pour guider leurs routes commerciales. Notre présence le long de ces côtes a accru notre implication dans la protection de ces marchands, qui nous doivent désormais leur sécurité."
 homebrew_boardingparties:0 "Équipes d'Abordage"
 homebrew_boardingparties_desc:0 "Pourquoi affronter les canons d'un navire de guerre quand on peut combattre sur son pont ? En formant des équipes d'abordage spécialisées, nous pouvons traiter le combat naval comme une invasion terrestre et capturer des navires au passage."
 homebrew_coastalformations:0 "Plans de Bataille Côtiers"
 homebrew_coastalformations_desc:0 "Les eaux peu profondes du littoral recèlent des rochers dangereux et autres obstacles. En enseignant ces eaux à nos capitaines, nos navires peuvent mieux naviguer hors de danger et échapper à un ennemi en poursuite."
 homebrew_marineracademies2:0 "Académies de Marins"
 homebrew_marineracademies2_desc:0 "En fondant des écoles publiques pour les futurs marins, nous pouvons former un vivier croissant de matelots disponibles et d'industries navales."

 #replacements for vanilla
 religious_ideas:0 "*** Idées Religieuses ***"
 encourage_prosperity:0 "Encourager la Prospérité"
 encourage_prosperity_desc:0 "Une terre prospère est une terre riche, mais atteindre la prospérité est une tâche en soi. Nous devrions encourager la croissance des développements locaux, et nous en enrichir d'autant."
 new_taxation:0 "Nouveaux Impôts"
 new_taxation_desc:0 "Il y a toujours quelque chose en construction ou en entretien, quelque chose de nouveau que l'État peut taxer. Avant d'entreprendre d'autres réformes, nous devons graisser les rouages avec de l'argent, et nous savons exactement comment l'obtenir."
 reform_provincial_admin:0 "Réforme de l'Administration Provinciale"
 reform_provincial_admin_desc: "À mesure que notre royaume s'étend, il devient de plus en plus difficile de communiquer avec nos confins. Nous devrions réformer l'administration de ces provinces et les soumettre à notre autorité."
 relentless_assault:0 "Assaut Implacable"
 relentless_assault_desc:0 "La meilleure stratégie est de perturber celle de l'adversaire. Par conséquent, il faut attaquer, attaquer, encore attaquer !"
 widespread_recruitment:0 "Recrutement Agressif"
 widespread_recruitment_desc:0 "Notre armée a toujours besoin de recrues fraîches. En diffusant de la propagande et en augmentant les incitations, nous pouvons en rallier davantage à nos bannières."
 fish_in_a_barrel:0 "Comme des Poissons dans un Tonneau"
 fish_in_a_barrel_desc:0 "En gardant notre sang-froid et en laissant l'ennemi nous repousser, nous pouvons l'attirer à portée de nos canons."
 siege_artillery: "Tactiques de Siège"
 siege_artillery_desc: "Assiéger une forteresse est une affaire longue et coûteuse. Notre commandement devrait prendre toutes les mesures possibles pour empêcher qu'un siège soit levé."
 mercenary_cores: "Noyaux de Mercenaires"
 mercenary_cores_desc: "Nous ne devrions pas être assez orgueilleux pour ignorer les impressionnantes bandes de héros et d'aventuriers dans nos frontières. Si la force de nos hommes venait à faiblir, nous pouvons compter sur leur aide."
 depth_defense: "Défense en Profondeur"
 depth_defense_desc: "Notre abondance de recrues fraîches donne à nos généraux une marge de manœuvre face aux pertes dévastatrices."
 bullandhorns: "Tactique des Cornes de Taureau"
 bullandhorns_desc: "Grâce à notre supériorité numérique, nous pouvons fixer les armées ennemies avec notre force principale tandis que les régiments de cavalerie les prennent en tenaille de tous côtés."
 lumber_yards: "Scieries"
 lumber_yards_desc: "En développant notre industrie du bois, nous pouvons construire notre marine à moindre coût."
 racial_tolerance: "Tolérance Raciale"
 racial_tolerance_desc: "Pourquoi une minorité devrait-elle être persécutée, non pour le contenu de son caractère mais pour la couleur de sa peau et les péchés de ses pères ? Nous devons abandonner nos rancœurs."
 homebrew_pu_war:0 "Lutte Dynastique"
 homebrew_pu_war_desc:0 "Notre dynastie est contenue dans nos frontières. À travers le monde, qu'ils soient souverains ou bâtards, les membres de notre dynastie exercent une influence étrangère et sont en position d'assurer le pouvoir de leur mère-patrie. Tout ce que nous avons à faire, c'est mettre les choses en mouvement. \n§GDébloque le Casus Belli de Guerre de Réunification contre quiconque partage votre dynastie.§W"
 hb_expanded_ranks:0 "Horizons Élargis"
 hb_expanded_ranks_desc:0 "Élargir nos connexions et programmes étrangers accroîtra nos capacités diplomatiques."
 homebrew_more_covert:0 "Depuis les Ombres"
 homebrew_more_covert_desc:0 "Tous les problèmes ne peuvent être résolus par des sourires, des civilités ou l'honnêteté. Nous devons étendre nos méthodes pour saper nos ennemis."
 homebrew_colonial_boom:0 "Ruée Coloniale"
 homebrew_colonial_boom_desc:0 "Les nouvelles terres attirent forcément des colons, qui peuvent rapidement établir de nouvelles cités et colonies sans investissement supplémentaire de l'État. Une exploitation appropriée nous permettra de développer nos colonies bien plus efficacement. \nAccorde Coût de Construction : §G-10 %§W et Production de Marchandises : §G+10 %§W dans les nouvelles colonies pendant 50 ans"
 homebrew_chartering:0 "Octroi de Terres"
 homebrew_chartering_desc:0 "Une terre est une terre, qu'elle soit peuplée ou non, et les méthodes d'attribution de nouveaux titres et de nomination de nouveaux officiels ne diffèrent guère de l'intégration d'un peuple conquis."
 homebrew_puppeteer:0 "Marionnettiste"
 homebrew_puppeteer_desc:0 "Un vassal ne sert pas toujours au mieux les intérêts de l'État, mais avec les mesures appropriées, nous pouvons lui faire faire ce que nous voulons sans qu'il s'en aperçoive.\nLes Vassaux et États Clients peuvent être convertis en Dominions, qui sont §Tplus loyaux et offrent plus d'interactions§! mais §One peuvent pas être intégrés§!\nCombiné avec §YSphère d'Influence§!, accorde §YLimite de Domaine : §G+1§W"
 homebrew_sphere:0 "Sphère d'Influence"
 homebrew_sphere_desc:0 "Qu'est-ce que c'est, l'ère victorienne ? \nLes Vassaux et États Clients peuvent être convertis en Dominions, qui sont §Tplus loyaux et offrent plus d'interactions§! mais §One peuvent pas être intégrés§!\nCombiné avec §YMarionnettiste§!, accorde §YLimite de Domaine : §G+1§W"
 homebrew_soft_power:0 "Puissance Douce"
 homebrew_soft_power_desc:0 "La force d'une nation ne se mesure pas à ses armées ou sa richesse, mais à sa capacité d'influence sur les autres."
 homebrew_co_prosperity:0 "Co-Prospérité"
 homebrew_co_prosperity_desc:0 "En établissant la prospérité de nos sujets, nous pouvons à notre tour nous enrichir. \n§TDébloque les améliorations de sujets pour les Dominions§!\n(§YImpérialisme§! ou §YIdées d'Influence§! sont nécessaires !)"
 hb_disaster_relief:0 "Secours aux Sinistrés"
 hb_disaster_relief_desc:0 "Atténuer ou éviter la dévastation nécessite le stockage et la distribution de ressources, domaine dans lequel notre administration excelle."

 #replacements for IV
 staatsverwaltung5:0 "Exigences de Loyauté"
 staatsverwaltung5_desc:0 "La coopération des factions politiques de notre pays devrait être notre préoccupation première. Une maison divisée ne peut tenir."
 staatsverwaltung6:0 "Réseaux de Communication"
 staatsverwaltung6_desc:0 "Sans réseaux de communication adéquats, une province de notre royaume peut facilement falsifier quelques chiffres et donner moins au gouvernement que prévu. Nous devrions y remédier."
 homebrew_central_states:0 "Centres Administratifs"
 homebrew_central_states_desc:0 "En organisant l'administration locale en centres régionaux, nous pouvons mieux gérer notre royaume. \n§GGagnez un point de développement aléatoire§! dans chaque province d'un État lors de la centralisation."
 assimilation1: "Programme de Peuplement"
 assimilation1_desc: "La plupart des peuples préfèrent rester dans leur communauté locale et demeurer divisés. Pour assurer notre diversité culturelle et raciale, nous devrions encourager les nouvelles familles à migrer à l'intérieur de notre pays."
 more_immigrants:0 "Creuset des Peuples"
 more_immigrants_desc:0 "Notre nation est devenue une destination pour l'immigration étrangère, que leurs raisons soient de chercher une nouvelle vie ou de fuir l'ancienne. \n§WDébloque l'immigration longue distance de races §Tintégrées§W depuis les nations que vous connaissez§W\n§OLes Races Souterraines ne reçoivent des immigrants que des nations partageant votre religion§W"
 #more immigrants has been suspended until further notice, in practice all it does is drown your country in goblin immigrants
 homebrew_multiracial_draft:0 "Remplacements Rapides"
 homebrew_multiracial_draft_desc:0 "Les divers peuples de nos terres sont désireux de les défendre, et afflueront volontiers sous nos étendards."
 homebrew_melting_pot:0 "Creuset des Peuples"
 homebrew_melting_pot_desc:0 "Nous ne serions pas la nation que nous sommes sans notre diversité raciale. Notre société cosmopolite ne peut que gagner à l'arrivée de nouvelles races et cultures. \nLes minorités §GCoexistantes§W et §Tintégrées§W sont traitées comme s'il y avait une petite minorité §Tintégrée§W supplémentaire. Ceci n'a aucun inconvénient. \n§YLa race de votre culture principale n'est pas affectée. Les modificateurs sont invisibles pour votre confort.§W"
 nationalismus1: "Propagande Ciblée"
 nationalismus1_desc: "Aucun vrai fils de notre nation ne refusera l'appel aux armes."
 homebrew_x_for_xians:0 "Acquisition d'Espace Vital"
 homebrew_x_for_xians_desc:0 "Il n'y a qu'une quantité limitée de terres pour notre peuple, et certaines sont jalousement gardées par des citoyens de seconde classe. En éliminant ces indésirables de nos terres, nous pouvons introduire de nouveaux colons et les mener à la prospérité. \nLes actions du §TMenu Racial§W ne coûtent pas de points de monarque, et la purge ne supprime pas le développement. §GGagnez un point de développement aléatoire§W chaque fois qu'une minorité diminue."
 imperialismus4: "Dîme Impériale"
 imperialismus4_desc: "Tout citoyen de notre empire doit savoir que ses libertés sont un privilège qui doit être remboursé en nature. \n§TDébloque les améliorations de sujets pour les Dominions§!"
 stehendesheer6: "Intégration de l'Artificerie"
 stehendesheer6_desc: "En perfectionnant nos forces par un entraînement rigoureux, nous pouvons élargir nos corps de soldats d'élite équipés d'artificerie de pointe, capables de combattre comme nulle autre armée."
 soldnerheer0: "§O***§W Idées d'Héroïsme §O***§W"
 soldnerheer0_desc: "Les bandes de mercenaires parcourant nos terres exigent un salaire élevé, mais ce n'est pas pour rien qu'on les appelle des héros."
 soldnerheer1: "Héritiers Légitimes"
 soldnerheer1_desc: "Il est étonnamment courant de voir des héritiers exilés ou perdus de longue date prendre l'épée et travailler comme mercenaires. Si nous employions ces héritiers, nous pourrions justifier nos conquêtes comme « portant l'héritier légitime au pouvoir ». Bien sûr, leurs titres restaurés impliquent de nous servir."
 soldnerheer2: "Contrats Révisés"
 soldnerheer2_desc: "Nous sommes habitués à traiter avec les aventuriers, et nous maîtrisons mieux l'art de négocier et marchander avec eux que les autres nations."
 soldnerheer3: "Quêtes Épiques"
 soldnerheer3_desc: "En tant que mécène croissant des guildes d'aventuriers, nous pouvons rapidement faire appel à leur aide et recruter des groupes de mercenaires qui se lancent dans des quêtes données par l'État."
 soldnerheer4: "Guildes d'État"
 soldnerheer4_desc: "Pourquoi limiter la gestion des aventuriers à des guildes indépendantes ? En prenant le contrôle, nous pouvons éviter de payer leurs « frais d'exploitation » excessifs."
 soldnerheer5: "Héros Résidents"
 soldnerheer5_desc: "Notre réputation nous précède, et désormais chaque jour des bandes de héros audacieux et renommés affluent vers notre pays. \n§GDébloque de nouvelles Compagnies de Mercenaires§W"
 soldnerheer6: "Héros de Guerre"
 soldnerheer6_desc: "Notre armée a appris à favoriser l'expérience du combat plutôt que les exercices répétitifs, et promeut rapidement les hommes aux compétences de commandement exceptionnelles."
 soldnerheer7: "Héroïsme Professionnel"
 soldnerheer7_desc: "Pourquoi nos bandes de héros et notre armée professionnelle ne s'uniraient-elles pas sous un même but ? Certains héros combattent si souvent pour nous qu'ils font déjà pratiquement partie de notre armée. \n§GRecruter des mercenaires ne coûte pas de Professionnalisme§W avec la réforme gouvernementale §YContrats d'Aventuriers§!"
 wehrpflicht1: "Travail Forcé"
 wehrpflicht1_desc: "Notre vaste surplus de main-d'œuvre peut non seulement être dépensé comme chair à canon, mais comme force de travail étatique.\n§GDébloque une décision pour dépenser de la £icon_manpower£ afin d'achever la construction de bâtiments§!\n§GAvec les Idées de §BHaute Mer §Gou §BAmphibies §Gterminées, vous pouvez utiliser des £icon_sailors£ dans les provinces avec port\n§YLe coût est modifié par le bâtiment, le coût de construction, la vitesse de construction et la progression existante§!\n"
 hb_no_step_back:0 "Pas un Pas en Arrière !"
 hb_no_step_back_desc:0 "Nos punitions rigoureuses pour la désertion et le refus d'ordres ont rendu nos hommes plus dévoués à leurs armées."
 wehrpflicht4: "Leçons du Passé"
 wehrpflicht4_desc: "Nous devons reconnaître pourquoi nous conscrivons et nous appuyons sur les assauts de masse."
 waffenqualitat5: "Armes Exotiques"
 waffenqualitat5_desc: "Notre encouragement à la fine forge d'armes a permis à notre pays de produire des armes uniques et de grande valeur, souvent prisées par la noblesse étrangère."
 waffenqualitat6: "Entraînement de Qualité"
 waffenqualitat6_desc: "Les armes de haute qualité ne valent que par ceux qui les manient. Nous devrions promouvoir l'entraînement aux armes parmi nos forces, afin de toujours combattre à notre maximum."
 hb_glorious_display:0 "Acier Étincelant"
 hb_glorious_display_desc:0 "Nos armes sont du plus haut calibre, frappant de terreur le cœur de nos ennemis."
 festung5: "Guerre Kobold"
 festung5_desc: "Nommée d'après les pionniers de la guerre asymétrique, la Guerre Kobold souligne l'importance de la « petite guerre » par rapport aux batailles rangées."
 festung6: "Chariots Blindés"
 festung6_desc: "Les batailles rangées n'ont pas à se livrer en terrain découvert ; nous devrions transformer nos convois en fortifications mobiles."
 festung7: "Fortifications Avancées"
 festung7_desc: "Les châteaux et forteresses d'antan ne suffisent plus en ces temps. Nous devons innover et créer les fortifications les plus puissantes du monde ! \nLes forts sont §Grenforcés§W selon leur Niveau de Fort\nLes forts sont protégés contre la magie de siège\n§OLes forts coûtent plus d'entretien au niveau 4 et au-delà§W"
 kriegsproduktion2: "Compagnies de Soutien Élargies"
 kriegsproduktion2_desc: "Une armée ne vaut que par le soutien dont elle dispose. Avec une production plus rapide d'équipement de soutien, nous pouvons déployer des forces plus spécialisées."
 kriegsproduktion3: "Liquidation"
 kriegsproduktion3_desc: "Les actifs fixes sont précieux, mais rigides. En encourageant la liquidation, nous pouvons déplacer nos actifs plus efficacement. \nDétruire des bâtiments accorde soit §G33 %§W de leur coût de base, soit leur coût de construction local, selon la valeur la plus basse."
 kriegsproduktion6: "Production Accélérée"
 kriegsproduktion6_desc: "Nos lignes de production deviennent de plus en plus efficaces, et nos techniques se répandent également dans les industries commerciales."
 militarismus1: "Aux Armes !"
 militarismus1_desc: "Avant de pouvoir entreprendre d'autres réformes militaires, nous devons les rallier à notre cause."
 militarismus3: "Centres de Recrutement"
 militarismus3_desc: "Nos campagnes de recrutement militaire ont été désorganisées et décentralisées, jusqu'à maintenant. \nEffectifs dans les provinces avec une Caserne ou des Champs d'Entraînement : §G+200 / +400§W"
 militarismus4: "Dans la Mêlée"
 militarismus4_desc: "L'abondance d'armes et d'hommes fournis par notre pays a rendu nos généraux plus audacieux au combat."
 militarismus6: "Dépôts d'Armes"
 militarismus6_desc: "Grâce à notre infrastructure, nous pouvons équiper et approvisionner des armées plus grandes que jamais. \nLimite de Forces Terrestres dans les provinces avec un Camp Régimentaire ou un Centre de Conscription : §G+0,33 / +0,66§W"
 militarismus7: "Mages Militarisés"
 militarismus7_desc: "Nous avons augmenté les rangs de nos soldats réguliers, mais nous ne devons pas oublier les mages vivant dans notre pays. Enrôlons-les dans nos rangs et renforçons notre puissance de feu. \nConstruire des Tours de Mage accorde Dégâts de Choc : §G+1,5 %§W\nCet effet plafonne à §G+15 %§W.§W"
 shock1: "Assaut Soudain"
 shock1_desc: "Si nos ennemis comptent sur le pilonnage de l'artillerie et le feu, nous devons avancer vite et les submerger rapidement pour minimiser nos pertes."
 shock3: "Enthousiasme Noble"
 shock3_desc: "Notre élite guerrière est impatiente de prendre le champ de bataille, et est prête à payer son propre équipement."
 shock4: "Récits d'Héroïsme"
 shock4_desc: "« Je suis un hussard, je suis un Caehn, je suis un misérable Wexonard, mettant en déroute Silmuna à la Damestear. Je suis un Jaddari sous le soleil, je suis un Escanni en fuite, je suis un cavalier, intemporel à jamais. »"
 zentra1: "Planification Centrale"
 zentra1_desc: "En concentrant nos développements internes dans des emplacements clés, nous pouvons accélérer la croissance globale.\nÉtendre l'Infrastructure accorde Production de Marchandises : §G+5 %§! et Effectifs : §G+10 %§! §RCe bonus est divisé par deux pour les forteresses naines !§! \n§YÉtendre l'infrastructure dans votre zone de capitale remboursera §G50§! Pouvoir Administratif une fois par province.§!"
 zentra2: "Avantage du Terrain"
 zentra2_desc: "Notre concentration sur nos terres centrales nous a appris comment y combattre au mieux."
 zentra3: "Développement Métropolitain"
 zentra3_desc: "Notre expertise en développement urbain a conduit à de nouvelles innovations architecturales et à une meilleure qualité de vie."
 #\nDevelopment cost in provinces with 25+ development: §G-25%§W \n§YDwarven Holds only receive development cost §G-10%§W
 zentra6: "Administration Centrale"
 zentra6_desc: "Notre État centralisé nous permet de gouverner nos provinces très efficacement. Cependant, cela rendra l'intégration future de terres plus pesante pour la bureaucratie."
 hb_enforce_mercantilism:0 "Imposer le Mercantilisme"
 hb_enforce_mercantilism_desc:0 "En augmentant le contrôle gouvernemental sur le commerce, nous pouvons mieux gérer le flux de marchandises à travers le royaume."
 dezentra1: "Gouverneurs Locaux"
 dezentra1_desc: "En déléguant le pouvoir de l'autorité centrale aux gouverneurs locaux, nous pouvons assurer leur loyauté."
 dezentra5: "Grand État"
 dezentra5_desc: "La tradition d'« expansion » de notre État nous a rendus plus efficaces dans l'acquisition de nouvelles terres."
 aristo4: "Primauté des Mages"
 aristo4_desc: "Dans notre État théocratique, l'importance accrue du sang magique a permis à l'élite magique de s'élever à la proéminence dans nos cours."
 aristo5: "Bénir les Canons"
 aristo5_desc: "« Je bénis les canons en terre d'Anbennar »"
 republik4: "Nouveaux Penseurs"
 republik4_desc: "C'est grâce au système républicain de mandats et d'élections que des esprits jeunes et frais peuvent accéder au pouvoir et instituer des réformes plus rapidement que d'autres gouvernements."
 republik7: "Histoire de la Fédération"
 republik7_desc: "En étudiant l'histoire de la Fédération-des-Lacs, nous pouvons apprendre de leur gestion étatique et de leur capacité à maintenir unis leurs membres disparates."
 propaganda1: "Transitions en Douceur"
 propaganda1_desc: "Avec un usage approprié de la propagande d'État, nous pouvons balayer les détails sous le tapis et maintenir les transferts de pouvoir simples aux yeux de l'observateur extérieur."
 propaganda6: "Revendications Anciennes"
 propaganda6_desc: "Notre propagande peut s'étendre à la justification de nos guerres, en faisant valoir nos revendications existantes et en en inventant d'autres au fur et à mesure."
 generalstab7: "Corps d'Officiers Élargi"
 generalstab7_desc: "Une armée digne de ce nom nécessite de nombreux chefs capables remplissant de nombreux rôles. En encourageant son expansion, nous pouvons rapidement améliorer notre armée. \nTradition Militaire en recrutant des généraux : §G+2§W \nTradition Navale en recrutant des amiraux : §G+3§W"
 imperialismus7: "Sous Notre Aile"
 imperialismus7_desc: "Les pauvres sots qui nous entourent seraient mieux lotis dans notre empire : ils ne le savent simplement pas encore.\n§GCasus Belli§W pour vassaliser les voisins de moins de 150 de développement"
 homebrew_efficient_state_laws:0 "Législateurs Efficaces"
 homebrew_efficient_state_laws_desc:0 "En lisant les petits caractères et en s'assurant que les choses sont bien faites du premier coup, nos législateurs réduisent les dépenses de fonctionnement de l'État."
 homebrew_wildcard:0 "Joker"
 homebrew_wildcard_desc:0 "Les sociétés ne sont jamais vraiment immuables ; nous ferions bien d'en tirer profit. \n§GAccorde un bonus de votre choix§W. Dix ans après avoir choisi un bonus, §Gvous pouvez le changer pour un autre§W.\n§OChanger votre bonus coûte soit des points de monarque, soit est aléatoire§W."
 formation0: "§P***§! Idées Stratégiques §P***§!"
 formation0_desc: "Les guerres ne se gagnent pas par la violence aveugle ; nos généraux l'apprendront."
 formation0_bonus:0 "Stratégie Complète"
 hb_repositioning:0 "Exercices de Marche"
 hb_repositioning_desc:0 "Les conditions de combat idéales s'obtiennent souvent en surpassant l'ennemi en vitesse et en positionnement. En entraînant régulièrement nos armées à des déplacements plus rapides, nous pouvons mieux obtenir l'avantage du terrain."
 hb_decisive_victory:0 "De la Déroute au Massacre"
 hb_decisive_victory_desc:0 "C'est à la fin d'une bataille, quand les lignes se brisent et que les lâches fuient, que l'armée victorieuse est la plus capable de tuer l'ennemi et de transformer une petite victoire en coup décisif. \n\n§GAprès avoir gagné une bataille, inflige des pertes supplémentaires à l'armée ennemie.§! §YLes pertes supplémentaires peuvent être augmentées par une cavalerie puissante, des dégâts de choc élevés, le lancement de magie de guerre et la technologie militaire.§!"
 hb_slow_and_steady:0 "Lentement mais Sûrement"
 hb_slow_and_steady_desc:0 "Les forts ennemis sont une mesure de progression en guerre, qu'il faut préserver. \n\nAssiéger avec succès un fort ennemi accorde « §YLentement mais Sûrement§! » pendant 2 ans, donnant les effets suivants :/nNiveau de Fort : §G+1§!\n\nCombiné avec Fortifications Avancées, accorde en plus :\nDéfensivité : §G+25 %§!"
 hb_fob:0 "Bases Opérationnelles Avancées"
 hb_fob_desc:0 "Nos armées comprennent la valeur de consolider nos gains et de construire des tremplins vers les terres ennemies. \n\n§GDébloque une décision pour construire des forts temporaires en territoire occupé§!"
 hb_battlebards:0 "Bardes de Bataille"
 hb_battlebards_desc:0 "Les signaux et la communication sur le champ de bataille se font souvent par des sons puissants, une tâche que nos bardes estimés accomplissent en plus du soutien moral."
 hb_diplo_extension:0 "Moyens Alternatifs"
 hb_diplo_extension_desc:0 "En ces temps changeants, la notion de guerre comme affaire d'honneur et de démonstration de prouesse a cédé la place à une mentalité plus pragmatique : c'est une extension de la politique et des affaires. Nos voisins feraient bien de s'en souvenir avant de rejeter nos propositions."
 hb_relentless:0 "Persévérance"
 hb_relentless_desc:0 "Une défaite aux mains de l'ennemi n'est pas la fin d'une guerre. On n'est vaincu que lorsqu'on refuse de continuer à se battre."
 hb_objective_warfare:0 "Guerre par Objectifs"
 hb_objective_warfare_desc:0 "Nous devons être conscients que chaque guerre a un objectif, et que gagner l'objectif nous fait gagner la guerre."
 hb_silver_lining:0 "Lueur d'Espoir"
 hb_silver_lining_desc:0 "Certains disent que rien de bon ne peut sortir d'une défaite. En leur rappelant ce qu'une défaite peut nous apporter, en mal comme en bien, nous pouvons renforcer notre enthousiasme guerrier."
 hb_magical_tournaments:0 "Organiser des Tournois Magiques"
 hb_magical_tournaments_desc:0 "En organisant des tournois de prouesse magique, nous pouvons mieux repérer les mages de grand potentiel\n§TPermet aux Mages de Guerre d'apparaître. La chance augmente avec le privilège des Académies de Mages de Guerre§!"

 #replacements for AL
 AIG_serpentspine_ideas:0 "§P***§! Idées de l'Échine-du-Serpent §P***§!"
 AIG_dwarven_citadels:0 "Citadelles Naines"
 AIG_dwarven_citadels_desc:0 "Construites sur des générations d'ingénierie naine, les forteresses et défenses parsemant l'Échine-du-Serpent sont renommées pour leur défensibilité. \nNiveau de Fort : §G+1§W sur les forts dans l'Échine-du-Serpent"
 AIG_serpentsbeat:0 "Rythme du Serpent"
 AIG_serpentsbeat_desc:0 "La musique populaire des jours d'Aul-Dwarov est connue pour ses rythmes entraînants et ses percussions puissantes, et des chansons comme « Aimes-tu mon Chariot » sont des succès parmi nos équipes de rails.\nVitesse de mouvement sur les Routes Naines possédées : §G+20 %\n"
 AIG_push_them_back:0 "Souvenirs de la Perte"
 AIG_push_them_back_desc:0 "L'Échine-du-Serpent conserve de nombreux documents et reliques de conflits, datant de l'époque où Aul-Dwarov régnait. Cette riche histoire militaire éduquera notre propre armée."
 AIG_smart_armor:0 "Peau de Mithril"
 AIG_smart_armor_desc:0 "D'une simple gorgée d'une drogue expérimentale et très coûteuse, un soldat peut s'infuser d'un sort d'abjuration. Tant qu'il dure, le sort peut concentrer ses effets protecteurs où l'utilisateur le souhaite, ou réagir par réflexe à toute blessure pour prévenir d'autres dommages. \nDégâts de Choc et de Feu reçus pour les Régiments d'Artificiers : §G-5 %§W"
 #Try University of Giberd! I could break the Heirarch in two... with my bare hands! Don't fuck with this artificer!
 AIG_bionic_implants:0 "Implants Bioniques"
 AIG_bionic_implants_desc:0 "Nos Artificiers de Guerre ont bricolé avec la bioingénierie dernièrement, et ont commencé à s'altérer eux-mêmes et leurs frères d'armes. Avec des implants bioniques de pointe, ils font des soldats terriblement puissants. Malheureusement, tous les artificiers n'ont pas de licence médicale, et le processus a un taux de mortalité élevé.\nDiscipline pour les Régiments d'Artificiers : §G+5 %§W"
 AIG_emergency_exit:0 "Sortie de Secours"
 AIG_emergency_exit_desc:0 "Aucun artificier n'est satisfait de mourir sur un champ de bataille, et ils ont donc conçu de nombreux moyens d'évacuer une situation qui se détériore pour soigner leurs blessures. Ces actes de préservation faciliteront le réentraînement et la réorganisation de nos forces.\nDéclin de l'Entraînement pour les Régiments d'Artificiers : §G-10 %§W \nAttrition Terrestre pour les Régiments d'Artificiers : §G-15 %§W"
 AIG_evocation_drones:0 "Drones d'Évocation"
 AIG_evocation_drones_desc:0 "En implémentant une artificerie avancée, un sort peut être lancé dans un endroit et sortir par l'extrémité d'une machine dans un autre. Avec des équipes dédiées alimentant les câbles et entretenant ces appareils, nos meilleurs mages peuvent voir la bataille sans jamais risquer leur vie.\nChoc d'Infanterie pour les Régiments d'Artificiers : §G+0,15§W"
 AIG_m_missile:0 "Traité sur la Magie d'Évocation"
 AIG_m_missile_desc:0 "Le Projectile Magique sait où il est à tout moment. Il le sait car il sait où il n'est pas."
 AIG_prospector_mages:0 "Mages Prospecteurs"
 AIG_prospector_mages_desc:0 "L'artificerie est coûteuse, nécessitant de la précieuse Damestear et de rares Reliques Précurseurs. En employant des Scrutateurs pour évaluer nos terres et lire les étoiles, nous pouvons découvrir des filons de Damestear ou des reliques enterrées depuis longtemps que nous n'aurions pas pu trouver autrement. \n§GChance accrue d'apparition de Damestear et de Reliques Précurseurs§W"
 AIG_magisterium_ties:0 "Liens avec le Magisterium"
 AIG_magisterium_ties_desc:0 "Nous avons toujours respecté et soutenu le rôle des magistères dans notre pays, et cela se reflète sur notre position internationale. Veuillez comprendre que si le Magisterium a choisi cette idée, c'est qu'il est devenu sénile."
 AIG_battlemage_battalions:0 "Bataillons de Mages de Guerre"
 AIG_battlemage_battalions_desc:0 "Tout avantage tactique en guerre doit être exploité, et quel plus grand avantage avons-nous que la puissance et la loyauté de nos célèbres mages de guerre ?"
 AIG_meritocratic_mages:0 "Magie Administrative"
 AIG_meritocratic_mages_desc:0 "La magie est de plus en plus courante dans notre élite administrative, rendant le fonctionnement de notre État bien meilleur. Peu importe s'ils exigent plus de financement pour leurs projets favoris ?"
 AIG_scrying_magic:0 "Magie de Scrutation"
 AIG_scrying_magic_desc:0 "La magie n'est pas toujours utilisée à des fins destructrices ; elle peut servir à espionner des individus ou influencer des cours. Bien sûr, cela n'est pas gratuit."
 AIG_mage_officers:0 "Officiers Mages"
 AIG_mage_officers_desc:0 "Les mages de guerre chevronnés dans nos rangs ont commencé à recevoir des promotions, gagnant des grades dans notre commandement militaire. Leur expérience dans la direction de nos forces magiques ne doit pas être sous-estimée, mais peut-être devrions-nous nous demander ce que sont ces nouveaux « frais militaires »..."
 AIG_loyal_mages:0 "Tradition Ancienne"
 AIG_loyal_mages_desc:0 "Les mages ont toujours occupé une position de pouvoir dans la société, ce qui a entraîné une stabilité accrue dans la nôtre."
 AIG_mage_archives:0 "Études Privées"
 AIG_mage_archives_desc:0 "L'éducation est la préoccupation première de tout mage qui se respecte, et notre souverain dispose de toutes les ressources du pays pour sa propre quête de savoir.\nExpérience d'Étude Magique : §G+25 %§W"
 AIG_wizard_tax:0 "L'Impôt Magique"
 AIG_wizard_tax_desc:0 "Nous ne patronnons pas l'élite magique sans attendre quelque chose en retour. Bien qu'ils puissent se plaindre, les mages de notre royaume paieront volontiers une petite taxe pour le privilège de travailler ici."
 AIG_scriers:0 "Cape et Baguette"
 AIG_scriers_desc:0 "La magie ne se définit pas simplement par le lancement de boules de feu ou l'érection de forteresses magiques. La magie a aussi une touche plus douce, déformant la perception d'un homme ou le soumettant à la séduction d'un mage. En intégrant la magie à nos réseaux d'espions, ils fonctionneront plus efficacement que les autres."
 AIG_archmage:0 "Repousser les Limites"
 AIG_archmage_desc:0 "La quête incessante du savoir porte ses fruits pour ceux qui veulent faire l'effort.\nLa compétence §YLégendaire§! en magie confère des bonus uniques"
 AIG_war_economy:0 "Économie de Guerre"
 AIG_war_economy_desc:0 "Personne n'est surpris d'apprendre que notre nation repose sur le commerce d'esclaves et de butin. En effet, nous excellons dans ce que nous faisons."
 AIG_conquered_bureaucrats:0 "Bureaucrates Conquis"
 AIG_conquered_bureaucrats_desc:0 "Nous mentirions si nous disions que nos bureaucrates sont efficaces. En fait, il semble qu'installer notre propre race comme administrateurs ne fait que renforcer la haine de nos peuples conquis. Employer à la place des membres loyaux de leur race facilitera la gouvernance."
 AIG_brain_drain:0 "Fuite des Cerveaux"
 AIG_brain_drain_desc:0 "Nous ne sommes pas une société de penseurs, mais nous sommes assez malins pour savoir que certains de nos sujets sont plus intelligents que nous. Laissés seuls, ces intellectuels pourraient inciter à la rébellion et aux troubles. Mais si nous les relocalisons, nos sujets seront moins capables de nous défier."
 AIG_slave_trade:0 "Commerce d'Esclaves"
 AIG_slave_trade_desc:0 "Notre économie est en partie alimentée par les esclaves, capturés lors de raids et comme prisonniers de guerre."
 AIG_cult_of_personality:0 "Culte de la Personnalité"
 AIG_cult_of_personality_desc:0 "Notre société monstrueuse a nécessité la culture de grands chefs. Les faibles sont battus, tués et oubliés. Les forts survivent, ils exigent le respect de leurs pairs, et leurs sujets implorent leur poigne de fer. Voilà ce que signifie régner."
 AIG_factory_towns:0 "Villes-Usines"
 AIG_factory_towns_desc:0 "Les incitations accrues à travailler dans les usines ont conduit à une vague d'urbanisation centrée sur nos centres de production.\n\nCoût de Développement dans les provinces avec des Manufactures §G-7,5 %§W"
 AIG_artificer_grants:0 "Ingéniosité des Artificiers"
 AIG_artificer_grants_desc:0 "Les artificiers ont toujours été vus comme un groupe étrange autrefois, mais maintenant leurs idées deviennent de plus en plus pertinentes dans ce monde nouveau et audacieux. Les faux maîtres magiques d'antan ne sont plus là pour entraver notre progrès vers un avenir meilleur, mais leurs infrastructures sont restées. Utilisons l'ingéniosité de nos Artificiers pour les adapter à notre usage ! \n\nDouble le bonus de Capacité d'Artificerie des Reliques Précurseurs\n§GPermet de construire des Tours de Mage sans la Classe des Mages"
 AIG_steam_power:0 "Puissance à Vapeur"
 AIG_steam_power_desc:0 "On a toujours su que la combustion de carburant génère de la puissance, mais ce n'est que récemment que nous avons pu l'exploiter à une telle échelle. Nous ne devons pas oublier que ces nouveaux moteurs peuvent être installés et utilisés sur nos navires, augmentant leur vitesse et les rendant plus efficaces au combat."
 AIG_sending_stone_proliferation:0 "Prolifération des Pierres d'Envoi"
 AIG_sending_stone_proliferation_desc:0 "De nouvelles innovations nous ont conduits à un moyen moins cher et plus rapide d'acquérir de nouvelles pierres d'envoi, élargissant ainsi le potentiel de notre corps diplomatique et de nos réseaux d'espions."
 AIG_defecit_spending:0 "Dépenses Déficitaires"
 AIG_defecit_spending_desc:0 "Par les dieux, qui aurait cru que l'industrialisation était si coûteuse ! N'ayez crainte, car cela a aussi été une expérience transformatrice pour nos banques et prêteurs, et maintenant nous pouvons mieux gérer un budget négatif."
 AIG_labor_exploitation:0 "Exploitation de la Main-d'Œuvre"
 AIG_labor_exploitation_desc:0 "C'est un fait connu que plus un emploi est proche d'une administration, plus il est facile à contrôler et réguler. Et maintenant, avec les paysans affluant dans nos villes et nos industries, nous avons beaucoup d'emplois à... réguler. Bien sûr, nos politiques pourraient rendre plus difficile le passage d'un homme de l'usine à la caserne, mais c'est un problème pour l'avenir."
 AIG_mechanized_logistics:0 "Logistique Mécanisée"
 AIG_mechanized_logistics_desc:0 "Le grondement des moteurs est omniprésent partout où nos armées marchent. Avec des voitures sans chevaux transportant désormais hommes et fournitures à des vitesses révolutionnaires, nos armées peuvent utiliser la nouvelle philosophie de la « guerre éclair » pour submerger nos ennemis."
 AIG_mining_regulations:0 "Réglementations Minières"
 AIG_mining_regulations_desc:0 "Les métaux et matériaux précieux sont un phare pour les fauteurs de troubles cherchant à faire fortune rapidement. En réglementant nos pratiques minières et en freinant l'exploitation, nous pouvons prévenir l'inflation et l'épuisement des mines. \nEmpêche la Damestear et les Reliques Précurseurs de s'épuiser\n§OLa protection est levée sur les provinces avec plus de §G10§! de production de base§!"
 AIG_rural_industries:0 "Industries Rurales"
 AIG_rural_industries_desc:0 "Dans les terres sauvages, la terre est bon marché et les entreprises locales peuvent prospérer sans opposition. Nous devrions profiter des opportunités d'investissement dans ces terres. \nEmplacements de Bâtiments en terrain accidenté : §G+1§! \nCoût de Construction en terrain accidenté : §G-5 %§!"
 AIG_emergency_responders:0 "Garde Nationale"
 AIG_emergency_responders_desc:0 "Les colonies ont souvent compté sur des équipes locales pour répondre aux urgences. Grâce à notre infrastructure améliorée, nous pouvons envoyer notre Garde Nationale pour aider lors des crises locales, où qu'elles soient."
 AIG_elven_supremacy_ideas:0 "*** Idées de Suprématie Elfique ***"
 AIG_elven_forebears:0 "Se Souvenir des Aïeux"
 AIG_elven_forebears_desc:0 "Notre peuple a une histoire longue et complexe, remontant aux jours où les elfes dominaient le monde ancien."
 AIG_reclaiming_birthright:0 "Reconquérir Notre Héritage"
 AIG_reclaiming_birthright_desc:0 "Mais pourquoi le passé devrait-il rester dans le passé ? Nous devrions concentrer nos efforts sur la restauration des anciennes valeurs de la race elfique, et nous assurer que tous nos peuples suivent le seul vrai ordre."
 AIG_ethnic_primacy:0 "Destinée Manifeste"
 AIG_ethnic_primacy_desc:0 "En soutenant un programme de repeuplement, nous pouvons compenser les faibles taux de fertilité des elfes et accélérer l'intégration des royaumes nouvellement conquis."
 AIG_seniority_rule:0 "Règle de l'Ancienneté"
 AIG_seniority_rule_desc:0 "Les elfes sont connus de tous comme la race la plus longévive de Halann. Avec des vies aussi longues que les nôtres, nos souverains ont tout le temps du monde pour consolider leur règne et parfaire leurs devoirs."
 AIG_legionary_ideas:0 "§P***§! Idées Légionnaires §P***§!"
 AIG_holy_orders:0 "Leçons de Jaher"
 AIG_holy_orders_desc:0 "Le Nouveau Culte du Soleil s'est répandu comme une traînée de poudre, alors que Jaher, l'Elfe Solaire, était proclamé réincarnation du dieu solaire bulwari Surakel. En utilisant les cultes et religions locaux de la même manière, nous aussi pouvons mieux répandre notre foi."
 AIG_religious_wars:0 "Guerres de Religion"
 AIG_religious_wars_desc:0 "L'histoire récente du Bulwar est celle d'une lutte religieuse, où chaque homme valide est censé combattre pour son salut. \n§GGagnez de la £icon_manpower£ chaque fois que vous convertissez une province à votre religion (300 £icon_manpower£ par point de développement)§!"
 AIG_expand_elven_conscription:0 "Conscription de Chair à Canon"
 AIG_expand_elven_conscription_desc:0 "Nous devons lutter pour la victoire, et nous devons purger les indésirables de nos terres. Pourquoi ne pas faire d'une pierre deux coups et forcer nos inférieurs à servir comme soldats de première ligne ? Nos officiers peuvent se plaindre de leur manque de discipline, mais ils ne se plaindront pas quand ils auront besoin de corps frais."
 AIG_sun_elf_battlemages:0 "Mages de Guerre Solaires"
 AIG_sun_elf_battlemages_desc:0 "Lorsque les elfes solaires débarquèrent en 1001 AA, leurs rangs de mages hautement qualifiés éclipsaient tous les autres, et furent déterminants dans la libération de l'humanité des gnolls. Nous ne devons jamais oublier l'importance de la magie sur le champ de bataille."
 AIG_imperial_cities:0 "Industrie Urbaine"
 AIG_imperial_cities_desc:0 "Depuis sa création, Anbennar a été un centre de civilisation. Ses étendues urbaines se trouvent à chaque coin, et sont une fondation importante pour la croissance future de l'industrie anbennariène. \nMarchandises produites en terrain Urbain et dans les Forteresses Naines : §G+0,75§W"
 AIG_racial_representation:0 "Représentation Raciale"
 AIG_racial_representation_desc:0 "Anbennar ne tient pas pour acquis le sens de son nom. Chaque minorité raciale au sein de l'empire a un État la représentant, qui promeut son égalité et assure une représentation légale."
 AIG_boat_party_diplo:0 "Invités des Fêtes Fluviales"
 AIG_boat_party_diplo_desc:0 "Les Seigneurs des Rivières d'Esmarie sont connus pour organiser de somptueuses fêtes à bord de barges qui descendent le fleuve Esmar. En envoyant des représentants, nous pouvons mieux côtoyer les élites étrangères et échanger des informations avec nos contacts."
 AIG_dameshead_trade:0 "Commerce de la Tête-de-Dame"
 AIG_dameshead_trade_desc:0 "Nommée d'après son apparence sur une carte, la Tête-de-Dame abrite des navires transportant des marchandises de tout Cannor et au-delà, et est souvent appelée les terres les plus riches de tout Halann. Accéder à ce réseau commercial lucratif nous profiterait grandement."
 AIG_citadel_research:0 "Rénovation des Citadelles"
 AIG_citadel_research_desc:0 "Les anciennes citadelles construites par les ingénieurs castanoriens parsèment les confins d'Anbennar, projetant une ombre imposante sur tout envahisseur potentiel. En étudiant et rénovant ces châteaux, nous pouvons étendre leur philosophie de conception à nos propres fortifications."
 AIG_efficient_beaurocracy:0 "Unification d'Anbennar"
 AIG_efficient_beaurocracy_desc:0 "Pendant des siècles, l'Empire d'Anbennar est resté un État décentralisé, mais cela n'a conduit qu'à des conflits internes et des divisions religieuses. Qu'est Anbennar sans son unité ? Pour ramener Anbennar du bord de la destruction, nous devons centraliser notre administration et unifier les princes querelleurs de l'empire."



