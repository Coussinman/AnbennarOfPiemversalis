 settlements:1 "Colonies [Root.GetAdjective]"
 settlements_desc:0 "De petits groupes de colons de la métropole, principalement les femmes et enfants des hommes de la Compagnie, font leur foyer à la Colonie. Des communautés de notre propre culture rendent le développement de la zone plus aisé.\n"
