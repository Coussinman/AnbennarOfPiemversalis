 estate_maratha:0 "Marathes"
 estate_maratha_desc:0 "Bien qu'à l'origine ce terme désignait tous les peuples parlant le marathe, les Marathes se sont définis comme une caste de guerriers. On trouve les Marathes tant dans leur patrie natale du Maharashtra qu'au-delà, en quête d'opportunités de service militaire distingué."
 estate_jains:0 "Jaïns"
 estate_jains_desc:0 "Le jaïnisme n'est plus une foi dominante ou politiquement favorisée en Inde, mais les Jaïns sont loin d'être insignifiants. Ils ont trouvé une niche dans le prêt d'argent et la bureaucratie qui en fait un atout pour tout État leur accordant son patronage."
 estate_vaisyas:0 "Vaishyas"
 estate_vaisyas_desc:0 "Dans les écritures védiques, la caste des Vaishyas regroupe les travailleurs et agriculteurs de statut relativement bas. Ils se sont depuis diversifiés vers des professions plus lucratives ; marchands, artisans, hommes d'argent, ils sont le sang vital du commerce indien."
 estate_rajput:0 "Rajputs"
 estate_rajput_desc:0 "Les Rajputs sont une ancienne caste de guerriers honorables et de nobles fiers. Bien que la terre rude du Rajasthan soit le cœur de leur pouvoir, la noblesse rajpute se retrouve dans tout le nord de l'Inde et de nombreux grands Rajas revendiquent une ascendance rajpute."
 estate_brahmins_desc:0 "Les Brahmanes sont la caste sacerdotale de l'hindouisme. Ils sont les gardiens des cérémonies et des écritures, car peu de non-Brahmanes sont instruits dans la littérature sanskrite. Ils commandent un grand respect tant des hindous que des non-hindous, et prennent parfois des rôles dans le gouvernement."
