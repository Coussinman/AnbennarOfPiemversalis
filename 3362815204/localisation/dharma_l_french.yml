 district_desc:0 "Les colons de notre patrie ont étendu leur communauté pour englober tout un District dans une cité locale. Leur présence améliore grandement notre capacité de développement urbain dans la zone.\n"
 townships:1 "Canton [Root.GetAdjective]"
 townships_desc:0 "Le Canton est une colonie sur des rivages étrangers habitée entièrement par des natifs de notre patrie. Ils génèrent une grande demande de biens et de main-d'œuvre locale qui attire ceux qui commercent dans ces produits vers la zone.\n"
