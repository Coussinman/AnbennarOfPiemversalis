 alert_has_free_policy_delayed:1 "Vous pouvez promulguer des Politiques gratuitement dans les catégories suivantes :\n$LIST$"
 bah_mission_events.1.t:0 "La Chute de Vijayanagar"
 bah_mission_events.1.d:0 "La chute de la Cité de la Victoire, Vijayanagar, à l'issue d'une confrontation décisive avec les sultans [Root.GetAdjective], a envoyé une onde de choc à travers le Deccan.\nLe pillage de la cité aurait pris plusieurs jours et, bien qu'elle demeure l'une des plus grandes agglomérations de la région, il semble peu probable qu'elle redevienne jamais la métropole qu'elle fut jadis."
 bah_mission_events.1.a:0 "Au vainqueur revient le butin."
 bah_missions.1.d_VIJ_existed:0 "La chute de la Cité de la Victoire, Vijayanagar, à l'issue d'une confrontation décisive où les sultans [Root.GetAdjective] l'emportèrent, a envoyé une onde de choc à travers le Deccan.\nLe pillage de la cité aurait pris plusieurs jours et, bien qu'elle demeure l'une des plus grandes agglomérations de la région, il semble peu probable qu'elle redevienne jamais la métropole qu'elle fut jadis.\nBien que l'État de Vijayanagar conserve le pouvoir sur des parties de son ancien domaine, nombre de ses capitaines subordonnés et vassaux cherchent désormais protection ailleurs, une cause plus digne à servir.\nCela semble marquer la fin de l'empire que les Sangama fondèrent jadis."
 bah_mission_events.2.t:0 "Chute de Vijayanagar"
 bah_mission_events.2.d:0 "En perdant notre capitale ancestrale, la Cité de la Victoire elle-même, nous avons prouvé à tous nos sujets que nous ne sommes pas dignes de gouverner ces terres. La confiance pourrait peut-être être reconstruite avec le temps, mais pour l'instant un grave sentiment d'insubordination a commencé à se répandre dans notre royaume."
 bah_mission_events.2.a:0 "Nous nous relèverons !"
 bah_mission_events.3.t:0 "La Chute de Delhi"
 bah_mission_events.3.d:0 "Bien que Delhi soit à bien des égards la capitale incontestée du nord de l'Inde, elle a également connu de nombreux conquérants. Les Sultans Bahmani, jadis sujets d'un empire basé dans cette même cité, se sont maintenant ajoutés à la liste des conquérants. Tandis que la cité brûle, les soldats bahmani collectent leur butin. Les trésors sont vidés et les monuments abattus, pour être transportés et reconstruits à [Root.Capital.GetCapitalName]."
 bah_mission_events.3.a:0 "Le Sud se lève."
 mer_mission_events.1.t:0 "La Chute de Delhi"
 mer_mission_events.1.d:0 "Delhi est la cité que les sultanats musulmans ont fait leur capitale en Inde, mais elle fut jadis une cité gouvernée par des Rajputs. Lorsque les armées de Mewar fondirent sur l'antique cité, il semble qu'ils aient trouvé plus important de marquer la fin de la domination des Sultanats.\nBien que le pillage ne soit pas comparable à celui lors de la chute de la cité face aux armées de Timour, des monuments ont été abattus et des trésors pillés. La chute de Delhi marque un changement majeur dans la politique indienne ; seul le temps dira ce qui adviendra ensuite."
 mer_mission_events.1.a:0 "Excellent..."
 STABHIT_FROM_DISASTER:0 "§R-§!$STABHIT|R$§R :§! Stabilité due à $DISASTER|Y$"
 STABHIT_ON_DECLARE_WAR_DISASTER:0 "Stabilité lors de la Déclaration de Guerre : §R-§!$STABHIT|R$"
 brahmins_estate_events.1.t:0 "Révolte des Brahmanes de [Root.GetName]"
 brahmins_estate_events.1.d:0 "En réponse à la réduction des propriétés des Brahmanes, les fidèles hindous de la province se sont soulevés pour protéger les Brahmanes de nos soldats."
 brahmins_estate_events.1.a:0 "Soit."
 brahmins_estate_events.2.t:0 "Les Brahmanes Exigent des Postes Formalisés à la Cour"
 brahmins_estate_events.2.d:0 "Les Brahmanes aspirent souvent au pouvoir temporel autant qu'à la simple autorité spirituelle. Ils sont devenus très influents récemment en [Root.Country.GetName], et de nombreux postes importants dans l'administration sont désormais occupés par des Brahmanes. S'étant installés confortablement dans leurs grandes fonctions, ces Brahmanes ont approché le [Root.Monarch.GetTitle] avec une série d'exigences. Ils demandent que certains postes administratifs soient confiés aux Brahmanes par la loi, que les coutumes brahmanes deviennent obligatoires à la cour, et même que plusieurs des plus hautes fonctions ministérielles soient détenues par des familles brahmanes de façon héréditaire. Si outrageantes que soient ces exigences, l'influence des Brahmanes est telle que refuser pourrait sérieusement entraver notre capacité à gouverner."
 brahmins_estate_events.2.a:0 "Accepter leur autorité."
 brahmins_estate_events.6.b:0 "Rejeter leurs exigences et réduire leur pouvoir temporel."
 EST_VAL_ACCEPTED_BRAHMIN_AUTHORITY:0 "Brahmanes Enracinés à la Cour : §Y$VAL$%§!"
 EST_VAL_REJECTED_BRAHMIN_AUTHORITY:0 "Autorité Brahmane Rejetée : §Y$VAL$%§!"
 EST_VAL_FALL_OF_VJ:0 "Chute de Vijayanagar"
 brahmins_estate_events.2.b:0 "Les Brahmanes devraient retourner à leurs prières."
 brahmins_estate_events.3.t:0 "Brahmanisme"
 brahmins_estate_events.3.d:0 "Le sentiment public parmi les hindous de [Root.Country.GetName] s'est tourné vers le brahmanisme, l'idée que la caste brahmane doit être respectée et révérée comme autorité tant spirituelle que temporelle. Les Brahmanes gardent jalousement leur monopole sur l'éducation sanskrite, conservant comme leur domaine exclusif la capacité de prêcher les Védas. Leur autorité sociale et religieuse les rend puissants, et les excellentes relations de [Root.Monarch.GetName] avec la caste sacerdotale aident à maintenir un ordre social stable dans tout [Root.Country.GetName]."
 brahmins_estate_events.3.a:0 "Excellent."
 brahmins_estate_events.4.t:0 "Avancement de la Caste Brahmane"
 brahmins_estate_events.4.d:0 "Les Brahmanes de [Root.Country.GetName] sont un pouvoir montant. Ils ont rallié le soutien populaire de la population hindoue grâce à leur position de caste sacerdotale ordonnée par les dieux, et occupent plusieurs positions clés au sein de l'administration [Root.GetAdjective]."
 brahmins_estate_events.4.a:0 "Soit."
 EST_VAL_BRAHMIN_ADVANCE:0 "Avancement des Brahmanes : §Y$VAL$%§!"
 EST_VAL_BRAHMIN_DECLINE:0 "Déclin des Brahmanes : §Y$VAL$%§!"
 brahmins_estate_events.5.t:0 "Déclin du Pouvoir des Brahmanes"
 brahmins_estate_events.5.d:0 "Plus que toute autre caste, l'influence des Brahmanes dépend de leur réputation auprès des fidèles hindous. Il a été difficile de déterminer une cause précise, mais ils en sont venus à être perçus moins comme les gardiens de la doctrine védique et plus comme des intrigants riches et corrompus. Combiné à des manœuvres politiques maladroites et au manque de faveur aux yeux du [Root.Monarch.GetTitle], les Brahmanes ont perdu pouvoir et influence."
 brahmins_estate_events.5.a:0 "Soit."
 brahmins_estate_events.6.t:0 "Les Brahmanes Incitent à la Rébellion Populaire"
 brahmins_estate_events.6.d:0 "Les relations de l'État avec la caste brahmane ont atteint un point de rupture. Les Pujaris condamnent ouvertement [Root.Monarch.GetName] lors des cérémonies et les familles brahmanes refusent de coopérer au gouvernement de nos sujets hindous. Un récent faux pas religieux de la part du [Root.Monarch.GetTitle] a fait basculer la simple indignation en rébellion ouverte. Les Brahmanes ont incité le peuple à se soulever contre notre règne !"
 brahmins_estate_events.6.a:0 "Soit."
 brahmins_estate_events.7.t:0 "Les Brahmanes Aliènent les Marchands à [brahmin_trade_province.GetName]"
 brahmins_estate_events.7.d:0 "La cité de [brahmin_trade_province.GetCapitalName] est un important carrefour commercial régional pour [Root.Country.GetName]. Elle est souvent visitée par des marchands musulmans du Gujarat, d'Arabie et de Perse, et [brahmin_trade_province.GetName] a profité de solides connexions commerciales avec ces marchands.\n\n[brahmin_trade_province.GetName] en est venue à être administrée par un groupe de clercs brahmanes dont l'influence s'est fait sentir à tous les niveaux de la société. Ils ont promulgué une série de politiques et créé une atmosphère sociale loin d'être amicale du point de vue des marchands musulmans en visite. En conséquence, nombre de ces marchands aliénés ont décidé de porter leurs affaires ailleurs. [brahmin_trade_province.GetName] risque de perdre son statut de carrefour commercial si quelque chose n'est pas fait pour attirer le commerce vers la cité."
 brahmins_estate_events.7.a:0 "Les troubles des marchands de basse caste ne nous concernent pas."
 brahmins_estate_events.7.b:0 "Confier la cité à des dirigeants plus soucieux des relations commerciales."
 EST_VAL_BRAHMIN_TRADE:0 "Contrôle des Carrefours Commerciaux : §Y$VAL$%§!"
 EST_VAL_BRAHMIN_TRADE_STOPPED:0 "Contrôle des Carrefours Commerciaux : §Y$VAL$%§!"
 brahmins_estate_events.8.t:0 "Un Peshwa Brahmane ?"
 brahmins_estate_events.8.d:0 "Un Brahmane s'est révélé être un administrateur hautement compétent et a gagné l'oreille du [Root.Monarch.GetTitle]. Bien que les Brahmanes soient depuis longtemps enracinés dans la bureaucratie de [Root.Country.GetName], il est rare que les Brahmanes aient un rôle explicitement politique, même dans les cours des nations hindoues.\nLa nomination de ce Brahmane comme Peshwa, la plus haute fonction ministérielle nommée, est une perspective attrayante. Bien que les Brahmanes de tout [Root.Country.GetName] saisiraient l'occasion d'accroître leur influence, cela assurerait à nos sujets hindous que nous avons leurs meilleurs intérêts à cœur."
 brahmins_estate_events.8.a:0 "Nommer le Brahmane."
 brahmins_estate_events.8.b:0 "Nommer un noble à la place."
 brahmins_estate_events.8.c:0 "Nommer un marchand prometteur de caste Vaishya."
 EST_VAL_BRAHMIN_PESHWA:0 "Peshwa Brahmane : §Y$VAL$%§!"
 EST_VAL_VAISYA_PESHWA:0 "Peshwa Vaishya : §Y$VAL$%§!"
 EST_VAL_NOBLE_PESHWA:0 "Peshwa Noble : §Y$VAL$%§!"
 brahmins_estate_events.9.t:0 "Mouvements Religieux Non-Brahmanes"
 brahmins_estate_events.9.d:0 "Les Brahmanes ont traditionnellement eu un monopole sur l'autorité religieuse hindoue, mais occasionnellement des mouvements religieux émergent qui défient le brahmanisme. De tels mouvements deviennent populaires dans tout [Root.Country.GetName] malgré les efforts brahmanes pour les supprimer. Les promoteurs de la religion populaire soutiennent que les Brahmanes ont effacé les marques sacrées de leurs fronts et abandonné leurs responsabilités spirituelles pour occuper des sièges de pouvoir temporel et dispenser l'injustice aux pauvres. Ils déclarent que la dévotion désintéressée est le seul chemin vers le salut, une vertu qui peut être atteinte par tout hindou suffisamment fervent.\n\nUn groupe de Brahmanes influents a approché le [Root.Monarch.GetTitle] pour implorer son aide à restaurer la confiance publique dans l'autorité brahmane et supprimer les mouvements hindous non-brahmanes."
 brahmins_estate_events.9.a:0 "Permettre aux Brahmanes d'imposer l'orthodoxie."
 brahmins_estate_events.9.b:0 "Encourager les mouvements religieux populaires."
 non_brahmin_tooltip:1 "Une fraction de toutes les provinces §YHindoues§! possédées, à peu près égale à la part foncière de l'état des §YBrahmanes§!, obtient §Y« Orthodoxie Brahmane Imposée »§! pendant §Y15 ans§!, donnant les effets suivants :\nAgitation Locale : §R+5,00§!\nChangement Mensuel d'Autonomie : §G-0,05 %§!"
 brahmins_estate_events.9.b.tt:2 "Une fraction de toutes les provinces §YHindoues§! possédées, à peu près égale à la part foncière de l'état des §YBrahmanes§!, obtient §Y« Mouvements Religieux Non-Brahmanes »§! pendant §Y15 ans§!, donnant les effets suivants :\nAgitation Locale : §G-5,00§!\nChangement Mensuel d'Autonomie : §R+0,05 %§!"
 brahmins_estate_events.10.t:0 "Troubles au Fort de [brahmin_fort_province.GetName]"
 brahmins_estate_events.10.d:0 "La cour de [Root.Country.GetName] s'est trouvée embourbée dans un conflit entre le [Root.Monarch.GetTitle] et les castes militaires. Dans le sillage de ces tensions croissantes, la question de l'intendance des forts a attiré notre attention. Le fort de [brahmin_fort_province.GetName], actuellement tenu par un général particulièrement contentieux, se trouve dans une province où les Brahmanes gagnent leur propre influence.\n\nPrévoyant le potentiel d'éclatement des tensions en hostilités, il pourrait être sage de transférer le contrôle de ce fort important du général contentieux aux Brahmanes. Bien que moins habiles que les militaires en matière de siège, les Brahmanes sont au moins loyaux au [Root.Monarch.GetTitle]. Alternativement, le général pourrait être persuadé de changer d'attitude en échange du maintien de ses privilèges à [brahmin_fort_province.GetName]."
 brahmins_estate_events.10.a:0 "Remettre le fort aux Brahmanes."
 brahmins_estate_events.10.b:0 "Laisser les nobles garder le fort, tant qu'ils restent loyaux."
 brahmins_estate_events.11.t:0 "Le Statut des Brahmanes en [Root.Country.GetName]"
 brahmins_estate_events.11.d:0 "En tant que nation musulmane, les $ESTATE_CHURCH$ s'attendent à ce que notre gouvernement soit conforme à la doctrine [Root.Religion.GetName]. Les païens devraient être dépouillés de leur influence sociale, devraient payer l'impôt de la jizya, et ne devraient certainement pas être autorisés à occuper des positions de pouvoir dans l'administration.\n\nIl a été difficile de se conformer à leurs exigences de piété stricte cependant, étant donné que tant de nos sujets suivent la foi hindoue et vénèrent la caste sacerdotale brahmane. Même parmi les nations musulmanes en Inde, les Brahmanes occupent communément des positions dans la bureaucratie d'État et aident le [Root.Monarch.GetTitle] dans la gouvernance locale. Pour beaucoup à la cour, négliger les avantages de la loyauté brahmane serait une grande folie.\n\n[Root.Country.GetName] doit considérer sagement la voie qu'elle souhaite emprunter concernant son traitement des Brahmanes, et en effet de la population hindoue dans son ensemble."
 brahmins_estate_events.11.a:0 "Permettre aux Brahmanes de servir comme bureaucrates."
 brahmins_estate_events.11.b:0 "Tenir les Brahmanes à l'écart du gouvernement."
 brahmins_estate_events.11.c:0 "Briser le pouvoir des Brahmanes dans la société."
 EST_VAL_BRAHMIN_MUSLIM_GOV:0 "Bureaucratie Brahmane : §Y$VAL$%§!"
 EST_VAL_NO_BRAHMIN_MUSLIM_GOV:0 "Brahmanes Exclus de la Bureaucratie : §Y$VAL$%§!"
 EST_VAL_BRAHMINS_MIDDLEGROUND:0 "Accommodement avec les Brahmanes : §Y$VAL$%§!"
 EST_VAL_BRAHMIN_ORTHODOXY:0 "Orthodoxie Brahmane : §Y$VAL$%§!"
 EST_VAL_NONBRAHMIN_MOVEMENTS:0 "Mouvements Religieux Non-Brahmanes : §Y$VAL$%§!"
 EST_VAL_BRAHMIN_FORT:0 "Fort Brahmane : §Y$VAL$%§!"
 vaisyas_estate_events.1.t:0 "Révolte des Vaishyas de [Root.GetName]"
 vaisyas_estate_events.1.d:0 "Consternés par la perte de leurs privilèges, les Vaishyas de la province de [Root.GetName] ont pris les armes contre nous !"
 vaisyas_estate_events.1.a:0 "Soit."
 vaisyas_estate_events.2.t:0 "Banditisme Social"
 vaisyas_estate_events.2.d:0 "Une série de problèmes sociaux et économiques en [Root.Country.GetName] a conduit à une éruption de banditisme de grand chemin dans tout le royaume. Le banditisme est devenu si prolifique que certaines cités n'ont pas reçu une seule caravane commerciale depuis des mois.\n\nPlusieurs chefs bandits sont vus comme des héros populaires par la population locale, résistant bravement au règne de l'État parasite de [Root.Country.GetName], fondant de nouvelles villes frontalières et recrutant la main-d'œuvre locale. Attirant dans leurs rangs hindous et musulmans, distillateurs de toddy et forgerons, les bandits ont obtenu un large soutien.\n\nUne confrontation militaire directe avec les bandits résoudrait le problème immédiat si nous pouvions les déloger de leurs forts de fortune. Cependant, le problème risque de resurgir si nous n'abordons pas les facteurs sociaux et économiques qui rendent les bandits puissants et populaires."
 vaisyas_estate_events.2.a:0 "Tuez-les tous !"
 vaisyas_estate_events.2.b:0 "Aborder les causes sociales du banditisme."
 vaisyas_estate_events.3.t:0 "Les Vaishyas Prospèrent en [Root.Country.GetName]"
 vaisyas_estate_events.3.d:0 "La caste Vaishya occupe une position privilégiée et favorisée en [Root.Country.GetName]. En tant qu'épine dorsale de notre économie, l'expertise des Vaishyas en toutes matières mercantiles et industrieuses est une grande bénédiction pour notre nation. Grâce à notre patronage et à leur fortune croissante, les Vaishyas ont développé l'industrie locale à [thriving_vaisyas_province.GetName]."
 vaisyas_estate_events.3.a:0 "Excellent."
 vaisyas_estate_events.4.t:0 "Développements dans la Production Textile"
 vaisyas_estate_events.4.d:0 "L'industrie textile du sous-continent indien est sans rivale. De vastes plantations cultivent soie et coton, alimentant de puissantes manufactures qui produisent d'innombrables millions de mètres de tissu. Planteurs, tisserands, teinturiers, marchands et même princes nobles créent un réseau complexe et organisé de travail, de production et de commerce. Un tel marché commercial florissant est naturellement un terrain idéal pour l'innovation. Grâce à notre sage délégation de l'industrie à la caste Vaishya, [Root.Country.GetName] se trouve à l'avant-garde des nouveaux développements dans la production textile."
 vaisyas_estate_events.4.a:0 "Excellent."
 EST_VAL_TEXTILE_VAISYAS:0 "Avancées dans la Production Textile : §Y$VAL$%§!"
 vaisyas_estate_events.5.t:0 "Avancement de la Caste Vaishya"
 vaisyas_estate_events.5.d:0 "Les Vaishyas sont de caste relativement basse selon les écritures védiques, mais ce rang théorique ne reflète pas toujours leur véritable influence. Dans tout [Root.Country.GetName], les Vaishyas ont vu leur fortune augmenter et leur statut s'améliorer en pratique sinon en théorie."
 vaisyas_estate_events.5.a:0 "Soit."
 vaisyas_estate_events.6.t:0 "Déclin de la Caste Vaishya"
 vaisyas_estate_events.6.d:0 "Les Vaishyas, la caste des commerçants et agriculteurs, ont toujours lutté pour exercer une influence politique et sociale dans la société souvent rigidement hiérarchique de l'Inde. Ces dernières années, leur lutte a été vaine, et leur influence dans tout [Root.Country.GetName] est réduite."
 vaisyas_estate_events.6.a:0 "Soit."
 EST_VAL_VAISYAS_ADVANCE:0 "Avancement de la Caste Vaishya : §Y$VAL$%§!"
 EST_VAL_VAISYAS_DECLINE:0 "Déclin de la Caste Vaishya : §Y$VAL$%§!"
 vaisyas_estate_events.7.t:0 "Le Statut de la Caste Vaishya"
 vaisyas_estate_events.7.d:0 "Les limites de la caste se font sentir et se voient le plus explicitement lors des occasions rituelles. Les Brahmanes occupant le devant de la scène pour les cérémonies, leur statut de chefs de la hiérarchie spirituelle est rendu clair à tous les participants. Les Kshatriyas, guerriers et princes, font leurs propres démonstrations de pouvoir et de statut.\n\nSouvent négligés sont les Vaishyas, nos commerçants et artisans. Cherchant à avancer leur condition, les représentants des guildes vaishyas ont demandé que les membres suffisamment estimés de leur caste soient autorisés à monter en palanquin et à souffler dans des conques lors de certaines cérémonies. Accorder leur demande contrarierait les Brahmanes rigides, mais nous gagnerait la faveur des Vaishyas."
 vaisyas_estate_events.7.a:0 "Promouvoir l'avancement social pour les Vaishyas."
 vaisyas_estate_events.7.b:0 "Les castes inférieures devraient connaître leur place."
 EST_VAL_VAISHYA_MOBILITY:0 "Restrictions de caste assouplies : §Y$VAL$%§!"
 EST_VAL_VAISHYA_MOBILITY_BRAHMINS:0 "Restrictions de caste assouplies : §Y$VAL$%§!"
 EST_VAL_CASTE_DISCRIMINATION:0 "Restrictions de caste appliquées : §Y$VAL$%§!"
 EST_VAL_CASTE_DISCRIMINATION_BRAHMINS:0 "Restrictions de caste appliquées : §Y$VAL$%§!"
 vaisyas_estate_events.8.t:0 "Commerce de Biens de Luxe"
 vaisyas_estate_events.8.d:0 "[Root.Country.GetName] est devenue renommée pour son commerce de marchandises de haute valeur telles que les épices, les pierres précieuses et les soies fines. Des marchands viennent de terres lointaines pour acheter des biens que nous produisons en abondance, mais qui pour eux sont des luxes exotiques.\n\nLa clé de notre succès dans ces industries a été notre patronage de diverses guildes dont les membres sont issus de la caste Vaishya. Nos investissements se sont avérés rentables jusqu'ici, et il va de soi que de nouveaux investissements continueront à produire de plus grandes richesses. Nous devrions déterminer laquelle de nos industries de biens de luxe est la plus importante pour [Root.Country.GetName] et concentrer nos efforts sur l'avancement des guildes concernées."
 vaisyas_estate_events.8.a:0 "Les diamants sont éternels."
 vaisyas_estate_events.8.b:0 "Les épices sont le sang vital de notre nation."
 vaisyas_estate_events.8.c:0 "Les soies ont toujours été rentables."
 VAISYA_GUILDS_PROMOTED:0 "Promotion des Guildes : §Y$VAL$%§!"
 vaisyas_estate_events.9.t:0 "Les Guildes Formulent des Exigences Politiques"
 vaisyas_estate_events.9.d:0 "[Root.Monarch.GetName] a accordé de nombreux privilèges et concessions aux guildes marchandes vaishyas. Exerçant un pouvoir presque sans contrôle sur l'économie de la nation, elles sont devenues une force avec laquelle compter dans la politique [Root.GetAdjective].\n\nSentant une opportunité d'accumuler encore plus de pouvoir, les plus puissantes de ces guildes ont envoyé une ambassade à [Root.Capital.GetName] avec une série de recommandations politiques polies mais insistantes. Nos conseillers financiers voient un certain mérite commercial à ces politiques, mais notent qu'elles impliquent d'accorder un degré scandaleux d'autonomie aux provinces où les guildes sont les plus puissantes, en faisant essentiellement des princes-marchands. Refuser ces exigences mettrait grandement les guildes en colère, bien que cela contribuerait beaucoup à réduire leur pouvoir."
 vaisyas_estate_events.9.a:0 "Accorder les privilèges."
 vaisyas_estate_events.9.b:0 "Refuser les privilèges."
 EST_VAL_VAISYA_GUILD_PRIVILEGES:0 "Privilèges des Guildes : §Y$VAL$%§!"
 EST_VAL_VAISYA_NO_PRIVILEGES:0 "Privilèges des Guildes Refusés : §Y$VAL$%§!"
 vaisyas_estate_events.10.t:0 "Stagnation et Sécheresse à [drylands_province.GetName]"
 vaisyas_estate_events.10.d:0 "Le Plateau du Deccan est une terre sèche et rude, nécessitant un investissement régulier dans ses colonies frontalières pour être rentable pour l'État. Des décennies de négligence et une série de sécheresses inattendues à [drylands_province.GetName] ont conduit à de mauvaises récoltes, un déclin constant des revenus fonciers, et une tendance à la migration loin des terres arides vers les riches cités de la côte.\n\nLa situation à [drylands_province.GetName] pourrait cependant être inversée par la construction de canaux et de réservoirs, assurant suffisamment d'eau pour permettre à la population de croître et à l'agriculture de s'étendre. Bien que cela mettrait fin à la stagnation à [drylands_province.GetName], cela détournerait notre attention de nos établissements commerciaux côtiers. Nous devons considérer ce qui est le plus précieux pour nous à l'heure actuelle."
 vaisyas_estate_events.10.a:0 "Construire des réservoirs et canaux pour restaurer [drylands_province.GetName]"
 vaisyas_estate_events.10.b:0 "Nos cités côtières sont bien plus rentables."
 vaisyas_estate_events.11.t:0 "Société Mercantile"
 vaisyas_estate_events.11.d:0 "La société [Root.GetAdjective] devient de plus en plus préoccupée par le commerce, l'industrie et le profit que par les entreprises martiales. De nombreux nobles, en particulier dans les rangs des castes guerrières kshatriyas, craignent que notre nation ne devienne molle et mal préparée à la guerre, les Princes préférant se consacrer au commerce plutôt qu'aux études militaires. Les représentants de la caste Vaishya soutiennent non seulement que la guerre est mauvaise pour les affaires, mais qu'une nation sans coffres pleins ne peut pas faire la guerre efficacement. Nous devons décider si nous promouvons une société mercantile ou martiale."
 vaisyas_estate_events.11.a:0 "Tendre vers une société plus mercantile."
 vaisyas_estate_events.11.b:0 "Promouvoir une société guerrière."
 VAISYA_MERCANTILE_SOCIETY:0 "Société Mercantile : §Y$VAL$%§!"
 VAISYA_MARTIAL_SOCIETY:0 "Société Martiale : §Y$VAL$%§!"
 rajputs_estate_events.1.t:0 "Soulèvement des Rajputs de [Root.GetName]"
 rajputs_estate_events.1.d:0 "Les Rajputs refusent d'accepter la confiscation de leurs biens à [Root.GetName] et se sont soulevés contre nous !"
 rajputs_estate_events.1.a:0 "Soit."
 rajputs_estate_events.2.t:0 "Pouvoir Montant des Rajputs"
 rajputs_estate_events.2.d:0 "Les Rajputs ont vu leur influence augmenter en [Root.Country.GetName]. Les machinations d'une aristocratie bien connectée, un fort sentiment d'identité de clan, et une réputation croissante de guerriers indomptables ont tous contribué à leur pouvoir montant. Nous pouvons nous attendre à ce que les Rajputs jouent un plus grand rôle dans les affaires [Root.GetAdjective] dans un avenir immédiat."
 rajputs_estate_events.3.t:0 "Pouvoir Déclinant des Rajputs"
 rajputs_estate_events.3.d:0 "Une série de luttes intestines provoquées par des querelles entre groupes de parenté a affaibli l'influence rajpute en [Root.Country.GetName]. Incapables ou peu désireux de consacrer toute leur attention aux affaires politiques ou militaires [Root.GetAdjective], leur influence à la cour a beaucoup souffert."
 rajputs_estate_events.4.t:0 "Alliances Matrimoniales avec les Rajputs"
 rajputs_estate_events.4.d:0 "La parenté est d'une importance capitale pour les clans rajputs, et en tant que tel il n'y a pas de meilleure façon de cimenter leur loyauté qu'en forgeant des alliances matrimoniales. Plusieurs des thakurs rajputs les plus puissants ont offert de marier leurs filles à notre lignée en échange d'une garantie qu'ils continueront à détenir leurs terres et titres ancestraux. Bien que certains parmi les dirigeants rajputs considèrent cela comme un acte de sublimation inacceptable, ceux qui ont offert des liens matrimoniaux le font avec des plans pour avancer leur position à la cour."
 rajputs_estate_events.4.a:0 "Qu'ils nous considèrent comme des parents."
 rajputs_estate_events.4.b:0 "Nous n'avons pas besoin de leur amitié."
 rajputs_estate_events.5.t:0 "Un Rejeton Rajput Cherche un Nouveau Territoire"
 rajputs_estate_events.5.d:1 "Le pouvoir rajput en Inde repose sur des siècles de conquête, de colonisation et d'établissement de terres au-delà de leur base de pouvoir au Rajasthan. Un rejeton particulièrement audacieux et ambitieux d'un clan notable est apparu à la cour en quête d'améliorer le prestige de sa parenté. Approchant le [Root.Monarch.GetTitle], il demande la permission de s'établir à [rajput_scion_province.GetName], où il fondera une nouvelle ville. Il promet en échange d'accepter le règne de l'État [Root.Country.GetAdjective] et de lever une armée en notre soutien chaque fois que nécessaire."
 rajputs_estate_events.5.a:0 "L'autoriser à prendre le contrôle de la province et fonder une nouvelle colonie."
 rajputs_estate_events.5.b:0 "Nous pouvons administrer ces terres parfaitement bien nous-mêmes."
 rajputs_estate_events.6.t:0 "Les Rajputs Formulent des Exigences"
 rajputs_estate_events.6.d:0 "Les nobles rajputs en sont venus à surpasser en nombre et en rang toute autre noblesse à la cour [Root.GetAdjective]. Ils connaissent bien le pouvoir qu'ils exercent sur nos armées et notre administration, et ont exploité ce pouvoir pour exiger des concessions extrêmes aux nobles rajputs et à leurs territoires. Nos tentatives de réduire leur pouvoir par des moyens subtils ont eu peu d'effet, et nous devons donc envisager une action drastique ; soit nous acceptons que les Rajputs sont une loi en soi, soit nous les dépouillons de leurs rangs nobiliaires pour restaurer l'équilibre à la cour."
 rajputs_estate_events.6.a:0 "Nous les laisserons se gouverner eux-mêmes, pour l'instant."
 rajputs_estate_events.6.b:0 "Réduire leur pouvoir, dépouiller les chefs de leur rang et titre !"
 rajputs_estate_events.7.t:0 "Intégration de la Noblesse Rajpute"
 rajputs_estate_events.7.d:0 "Les nobles rajputs sont une vue commune à la cour de [Root.Country.GetName], bien qu'il devienne de plus en plus difficile de les distinguer des autres courtisans qui ont élu domicile à [Root.Capital.GetName]. Les Rajputs à la cour se sont complètement intégrés à la société aristocratique [Root.GetAdjective], allant jusqu'à apprendre la langue persane, observer l'étiquette courtoise [Root.GetAdjective], et accompagner personnellement [Root.Monarch.GetName] partout où [Root.Monarch.GetSheHe] va. Cela conduit à la perte d'une voix distinctement rajpute à la cour, ces nobles étant devenus plus préoccupés par leur avancement personnel que par les intérêts de la communauté rajpute."
 rajputs_estate_events.7.a:0 "Encourager l'intégration."
 rajputs_estate_events.7.b:0 "Décourager l'intégration."
 rajputs_estate_events.8.t:0 "La Rébellion Rajpute"
 rajputs_estate_events.8.d:0 "Les relations entre [Root.Country.GetName] et les clans rajputs ne pourraient guère être pires. La marginalisation des nobles rajputs et la négligence des soldats rajputs a créé une atmosphère de ressentiment et de méfiance qui menace maintenant d'éclater en conflit violent. Bien qu'il soit devenu traditionnel pour le [Root.Monarch.GetTitle] de nommer formellement les chefs de clan rajputs, dans l'état de crise actuel notre candidat préféré a été unanimement rejeté par ses futurs sujets. Les Rajputs de [Root.Country.GetName] exigent maintenant le droit de nommer leur propre direction, et d'être laissés à gouverner leurs propres affaires dans les provinces qu'ils contrôlent. Ils sont prêts à installer leur chef choisi par la force si nous insistons à maintenir notre emprise sur la politique dynastique."
 rajputs_estate_events.8.a:0 "Nous devons éviter le conflit. Leur accorder l'autonomie."
 rajputs_estate_events.8.b:0 "Les forcer à accepter notre règne."
 rajputs_estate_events.9.t:0 "Dharma Rajput"
 rajputs_estate_events.9.d:0 "La pierre angulaire de l'identité rajpute est leur Dharma, qu'ils tirent des conseils moraux de leurs écrits bardiques. Chaque chef rajput doit placer la parenté au-dessus de tout, s'entourant d'une fraternité de guerriers et de conseillers partageant tous une descendance d'un ancêtre patrilinéaire. Les soldats rajputs doivent combattre et mourir au service de leurs maîtres ; rien d'autre qu'une loyauté absolue n'est acceptable.\n\nPlutôt que de tenter de supprimer ces valeurs et structures de pouvoir traditionnelles rajputes, [Root.Country.GetName] les a encouragées, les harmonisant avec le service à l'État et à [Root.Monarch.GetName]. Les Rajputs ne voient aucune contradiction entre leur Dharma et leur devoir envers nous."
 rajputs_estate_events.9.a:0 "Excellent."
 rajputs_estate_events.10.t:0 "Les $ESTATE_CHURCH$ Exigent des Conversions Rajputes"
 rajputs_estate_events.10.d:0 "Le service rajput à l'État [Root.GetAdjective] est fondé sur l'entente tacite que les Rajputs devraient être autorisés à pratiquer leur religion hindoue traditionnelle et ne faire face à aucune pénalité pour avoir refusé de se convertir à l'islam.\nLes chefs des $ESTATE_CHURCH$ sont récemment devenus particulièrement insistants sur notre adhésion à la Charia, exigeant que nous pressions les chefs rajputs de se convertir et pénalisions les nobles hindous en restreignant leurs rangs et privilèges.\nBien qu'un petit nombre de nobles rajputs se soient convertis, l'écrasante majorité est indignée par les actions des $ESTATE_CHURCH$. Ils ont pétitionné le [Root.Monarch.GetTitle] pour une garantie immédiate de tolérance religieuse, exigeant que leurs traditions et coutumes soient respectées par la loi."
 rajputs_estate_events.10.a:0 "Garantir la tolérance religieuse et réprimander les $ESTATE_CHURCH$."
 rajputs_estate_events.10.b:0 "Presser les nobles rajputs de se convertir à [Root.Religion.GetName]."
 rajputs_estate_events.11.t:0 "La Diaspora Aristocratique Rajpute"
 rajputs_estate_events.11.d:0 "La noblesse rajpute s'est répandue loin et largement au fil des siècles, mais un fort sentiment d'identité de parenté crée une culture aristocratique commune. Les chefs rajputs connaissent leur statut et leur histoire par rapport aux autres Rajputs sur de nombreuses générations.\n\nNos conseillers, parmi lesquels de nombreux Rajputs, suggèrent que ces liens pourraient être exploités au bénéfice de [Root.Country.GetName]. Le plus évidemment, les chefs rajputs loyaux envers nous pourraient agir comme ambassadeurs auprès des Rajputs des nations voisines, améliorant notre réputation dans les cours étrangères. Une option plus rusée serait d'exploiter d'anciennes rancunes parmi les Rajputs comme moyen de revendiquer un territoire étranger."
 rajputs_estate_events.11.a:0 "Établir des liens diplomatiques."
 rajputs_estate_events.11.b:0 "Exploiter les querelles ancestrales."
 rajputs_estate_events.11.c:0 "Ignorer ces suggestions."
 EST_VAL_RAJPUTS_ADVANCE:0 "Avancement des Rajputs : §Y$VAL$%§!"
 EST_VAL_RAJPUTS_DECLINE:0 "Déclin des Rajputs : §Y$VAL$%§!"
 EST_VAL_RAJPUT_MARRIAGES:0 "Alliances Matrimoniales Rajputes : §Y$VAL$%§!"
 EST_VAL_RAJPUT_MARRIAGES_REFUSED:0 "Refus de Se Marier dans les Familles Rajputes : §Y$VAL$%§!"
 EST_VAL_RAJPUT_SCION:0 "Terres Accordées au Rejeton Rajput : §Y$VAL$%§!"
 EST_VAL_RAJPUT_SCION_DENIED:0 "Terres Refusées au Rejeton Rajput : §Y$VAL$%§!"
 EST_VAL_RAJPUT_INTEGRATION:0 "Intégration de la Noblesse Rajpute : §Y$VAL$%§!"
 EST_VAL_RAJPUT_INTEGRATION_DISCOURAGED:0 "Intégration de la Noblesse Rajpute Découragée : §Y$VAL$%§!"
 EST_VAL_RAJPUTS_ACCOMODATED:0 "Succession Clanique Autonome : §Y$VAL$%§!"
 EST_VAL_RAJPUT_REVOLT:0 "Chef Rajput Nommé par Décret : §Y$VAL$%§!"
 EST_VAL_RAJPUT_HINDUISM:0 "Hindouisme Rajput Respecté : §Y$VAL$%§!"
 EST_VAL_RAJPUT_CONVERTS:0 "Conversions Rajputes Encouragées : §Y$VAL$%§!"
 EST_VAL_RAJPUT_CONNECTIONS:0 "Réseau Diplomatique Rajput : §Y$VAL$%§!"
 EST_VAL_RAJPUTS_CURTAILED:0 "Rajputs Réduits à la Cour : §Y$VAL$%§!"
 EST_VAL_RAJPUT_CONCESSIONS:0 "Concessions Accordées aux Nobles Rajputs : §Y$VAL$%§!"
 jains_estate_events.1.t:0 "Révolte des Jaïns de [Root.GetName]"
 jains_estate_events.1.d:0 "Malgré leurs principes pacifistes, la population jaïne locale de la province de [Root.GetName] a pris les armes contre nous suite à la révocation de leurs privilèges !"
 jains_estate_events.1.a:0 "Soit."
 EST_VAL_JAINS_ADVANCE:0 "Avancement de la Communauté Jaïne : §Y$VAL$%§!"
 EST_VAL_JAINS_DECLINE:0 "Déclin de la Communauté Jaïne : §Y$VAL$%§!"
 jains_estate_events.2.t:0 "L'Influence Jaïne S'étend"
 jains_estate_events.2.d:0 "De nombreux Jaïns influents ont trouvé un foyer à la cour de [Root.Country.GetName]. Ascètes, banquiers et marchands jaïns ont tous l'oreille du [Root.Monarch.GetTitle]. Il y a même des rumeurs que [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself] aurait participé à des rituels jaïns. Bien qu'une petite minorité religieuse, les Jaïns gagnent du pouvoir en politique et dans la société."
 jains_estate_events.3.t:0 "L'Influence Jaïne Décline"
 jains_estate_events.3.d:0 "Les Jaïns se retrouvent à nouveau en manque de capital social. Des ascètes éminents ont réussi à se faire exiler de la cour suite à une série de désaccords religieux et politiques, et les marchands jaïns voient leur fortune décliner. L'influence jaïne est en déclin."
 jains_estate_events.3.a:0 "Accepter"
 jains_estate_events.4.t:0 "Les Jaïns Résistent à la Persécution"
 jains_estate_events.4.d:0 "La communauté jaïne de [Root.Country.GetName] est devenue totalement déloyale suite à de nombreux actes de manque de respect et de persécution par l'État. La situation a été grandement aggravée par un acte de sacrilège scandaleux. Un de nos gouverneurs [Root.Religion.GetName] a marché dans un temple jaïn, abattu une vache, et profané les nez de toutes les icônes à l'intérieur. Refusant d'accepter davantage de persécution, la communauté jaïne a résolu de s'opposer à notre gouvernement. Leurs méthodes de résistance sont peu orthodoxes mais efficaces ; plutôt que de se soulever en rébellion violente, ils boycottent les institutions de l'État, refusent les prêts et rejettent toute participation au gouvernement. Notre dépendance envers la communauté jaïne est devenue une vulnérabilité condamnable."
 jains_estate_events.4.a:0 "Au moins ils sont pacifistes."
 jains_estate_events.5.t:0 "Les Prêteurs Jaïns Réclament leurs Dettes"
 jains_estate_events.5.d:0 "Plusieurs guildes vaishyas éminentes ont accumulé des dettes substantielles envers des familles de banquiers jaïns. Refusant de payer, les représentants de ces guildes ont pétitionné le [Root.Monarch.GetTitle] pour l'annulation de leur dette. Ils soutiennent que leurs finances seront ruinées s'ils sont forcés de continuer à effectuer des paiements, bien que les prêteurs jaïns rétorquent que leur incapacité à payer est due à leur propre mauvaise gestion. Comment devons-nous gérer ce différend ?"
 jains_estate_events.5.a:0 "Les guildes doivent payer leur dette."
 jains_estate_events.5.b:0 "Les Jaïns doivent annuler la dette."
 jains_estate_events.5.c:0 "Nous réglerons la dette nous-mêmes."
 EST_VAL_JAINS_PAYMENT:0 "Dettes Jaïnes Remboursées : §Y$VAL$%§!"
 EST_VAL_JAINS_PAYMENT_DENIED:0 "Dettes Jaïnes Annulées : §Y$VAL$%§!"
 jains_estate_events.6.t:0 "Banquiers Jaïns et Brahmanes"
 jains_estate_events.6.d:0 "Alors que [Root.Country.GetName] compte généralement sur les familles de banquiers jaïns pour financer les prêts d'État, les Jaïns sont loin d'être les seuls financiers du royaume. Plusieurs familles brahmanes pratiquent également la banque. Les représentants de ces Brahmanes plaident en faveur de leurs services plutôt que des Jaïns. Bien qu'ils ne puissent offrir les mêmes taux d'intérêt bas, ils soulignent que la confiance du peuple hindou dans le leadership brahmane correspondra à une confiance accrue dans l'économie [Root.GetAdjective]."
 jains_estate_events.6.a:0 "Les banquiers jaïns nous ont parfaitement bien servis."
 jains_estate_events.6.b:0 "Favorisons les Brahmanes à la place."
 jains_estate_events.7.t:0 "Un Don Généreux des Jaïns"
 jains_estate_events.7.d:0 "L'État [Root.GetAdjective] s'est allié à plusieurs familles jaïnes fortunées. Elles ont reçu des positions dans l'administration, le contrôle des sites de pèlerinage jaïns, et un traitement préférentiel dans le système fiscal. Notre généreux patronage a enfin porté ses fruits ; elles nous ont offert les services d'un certain nombre de financiers qualifiés pour aider notre administration, et ont fait un don important à nos coffres. Les rouages de l'État fonctionnent maintenant aussi harmonieusement que jamais."
 jains_estate_events.7.a:0 "Comme c'est généreux."
 EST_VAL_JAINS_PREFERRED_BANKERS:0 "Banquiers Jaïns Préférés : §Y$VAL$%§!"
 EST_VAL_BRAHMINS_PREFERRED_BANKERS:0 "Banquiers Brahmanes Préférés : §Y$VAL$%§!"
 EST_VAL_JAIN_ADMINISTRATION:0 "Jaïns dans l'Administration : §Y$VAL$%§!"
 jains_estate_events.8.t:0 "Paryushana"
 jains_estate_events.8.d:0 "Paryushana marque la période la plus sainte du calendrier religieux jaïn. C'est un temps de jeûne, d'austérité et d'absolution. Les membres de la communauté jaïne utilisent ce temps pour la prière, la méditation et demander pardon à leurs semblables.\nLes ministres jaïns employés dans l'administration [Root.GetAdjective] ont pétitionné l'État pour demander que l'abattage des animaux soit interdit pendant la durée de Paryushana. Bien que ce soit une proposition coûteuse pour nos bouchers, il a été suggéré que l'État pourrait compenser la perte de profit."
 jains_estate_events.8.a:0 "Interdire l'abattage animal pour Paryushana."
 jains_estate_events.8.b:0 "Nous ne ferons pas de concessions aux fois païennes."
 jains_estate_events.9.t:0 "Le Jaïnisme en Procès"
 jains_estate_events.9.d:0 "Bien que les religions païennes puissent être tolérées, il n'y a pas de place en [Root.Country.GetName] pour les kafirs qui ne croient en aucun Dieu. Les $ESTATE_CHURCH$ ont accusé les Jaïns d'être des kafirs, des non-croyants en Dieu, et ont tenu un débat devant le [Root.Monarch.GetTitle] pour régler la question.\n\nLes $ESTATE_CHURCH$ soutiennent que les Jaïns ne croient pas en un être pur, sans forme physique, immuable, sans péché, émancipé de la renaissance, sans passion, indépendant, destructeur de péchés, et architecte de toute joie. Cette conception de Dieu, arguent-ils, est partagée entre musulmans et hindous mais absente chez les Jaïns.\n\nLes moines jaïns présents au débat réfutent vivement ce point de vue. Optant pour la flexibilité, ils avancent une multitude de doctrines jaïnes pour démontrer leur théisme, du culte de Jina au concept même de Dharma.\n\nEn fin de compte, il revient au [Root.Monarch.GetTitle] de décider du sort du jaïnisme en [Root.Country.GetName]. Nous devons considérer quel argument nous trouvons le plus convaincant."
 jains_estate_events.9.a:0 "Les Jaïns sont théistes, comme nous."
 jains_estate_events.9.b:0 "Les Jaïns sont des kafirs, ils ne croient en aucun Dieu."
 EST_VAL_JAINS_ARE_THEISTS:0 "Jaïns Reconnus comme Théistes : §Y$VAL$%§!"
 EST_VAL_JAINS_ARE_KHAFIRS:0 "Jaïns Dénoncés comme Kafirs : §Y$VAL$%§!"
 jains_estate_events.10.t:0 "Les Jaïns Exigent des Concessions Religieuses"
 jains_estate_events.10.d:0 "Les représentants de la communauté jaïne [Root.GetAdjective] apparaissent devant le [Root.Monarch.GetTitle] avec une proposition : cimenter le statut du jaïnisme dans l'État et la société en échange de la loyauté indéfectible de la communauté. Ils entendent atteindre ce statut par la promulgation de politiques accordant des concessions religieuses. Celles-ci incluraient l'interdiction de l'abattage animal, la fin de la confiscation des biens des défunts, l'abolition des taxes religieuses, et la libération des prisonniers politiques ayant des liens avec des familles jaïnes éminentes.\n\nCes propositions ont été accueillies avec indignation par le clergé [Root.Religion.GetName], et risquent d'être impopulaires dans tout le royaume. Il est peut-être temps de rompre notre alliance étroite avec les Jaïns."
 jains_estate_events.10.a:0 "Accepter les concessions."
 jains_estate_events.10.b:0 "Ils sont allés trop loin. Il est temps de couper les ponts."
 EST_VAL_JAIN_RELIGIOUS_CONCESSIONS:0 "Concessions Religieuses Majeures : §Y$VAL$%§!"
 EST_VAL_JAIN_RELIGIOUS_CONCESSIONS_DENIED:0 "Concessions Religieuses Refusées : §Y$VAL$%§!"
 jains_estate_events.11.t:0 "Le Service de [Root.jain_advisor.GetName]"
 jains_estate_events.11.d:0 "[Root.jain_advisor.GetName], un riche homme d'État de foi jaïne, a longtemps été un proche allié et confident de [Root.Monarch.GetName]. À travers des années de service à la nation [Root.GetAdjective], [Root.jain_advisor.GetName] a prouvé non seulement qu'il est loyal au-delà de tout reproche, mais aussi qu'il est un administrateur et stratège militaire qualifié. [Root.jain_advisor.GetName] serait le mieux à même de continuer à servir l'État si nous lui accordions formellement le titre de Peshwa, la fonction de premier ministre."
 jains_estate_events.11.a:0 "Faire de [Root.jain_advisor.GetName] le Premier Ministre."
 jains_estate_events.11.b:0 "Nommer [Root.jain_advisor.GetName] avec un titre inférieur à la place."
 EST_VAL_JAIN_PESHWA:0 "Peshwa Jaïn : §Y$VAL$%§!"
 EST_VAL_JAIN_PESHWA_REFUSED:0 "Conseiller Jaïn Privé de Fonction : §Y$VAL$%§!"
 marathas_estate_events.1.t:0 "Révolte des Marathes de [Root.GetName]"
 marathas_estate_events.1.d:0 "Les Marathes refusent d'accepter la confiscation de leurs biens à [Root.GetName] et se sont soulevés contre nous !"
 marathas_estate_events.1.a:0 "Soit."
 marathas_estate_events.2.t:0 "Un Poète Marathe Questionne l'Autorité Brahmane"
 marathas_estate_events.2.d:0 "Un grand poète a émergé parmi le peuple marathe. Salué comme un saint vivant, le poète prêche l'égalité devant les dieux et le défi des restrictions de caste. Il écrit des Brahmanes :\n\n« Les serviteurs de Vishnou n'ont pas de caste,\nLa science des Védas le décrète ainsi.\nLequel de vos livres a sauvé les déchus ?\nJe n'en connais aucun. »\n\nSoutenant qu'un homme n'est que aussi chaste que sa propre foi et mettant l'accent sur le salut personnel plutôt que sur les observances rituelles, ses enseignements ont mis en colère les Brahmanes de [Root.Country.GetName]. Ils exigent que le poète doive noyer ses œuvres dans la rivière et présenter des excuses formelles pour son hétérodoxie."
 marathas_estate_events.2.a:0 "Encourager le poète."
 marathas_estate_events.2.b:0 "Forcer le poète à s'excuser."
 EST_VAL_MARATHI_POET:0 "Poésie Anti-Brahmane : §Y$VAL$%§!"
 EST_VAL_MARATHI_POET_APOLOGY:0 "Excuses Poétiques : §Y$VAL$%§!"
 marathas_estate_events.3.t:0 "Tactiques Bargir"
 marathas_estate_events.3.d:0 "Face à un ennemi qui déploie une artillerie puissante, nos conseillers marathes proposent l'adoption d'une tactique qui les a bien servis par le passé. Nommée « bargi-giri » par les envahisseurs du nord d'après le terme marathe pour cavaliers, c'est une forme de guérilla qui privilégie les manœuvres de flanc de cavalerie hautement mobile. Les chevaux plus petits et plus légers favorisés par les Deccanis sont idéaux pour de telles missions, capables de surpasser en manœuvre l'artillerie encombrante, les éléphants et la cavalerie lourde."
 marathas_estate_events.3.a:0 "Une stratégie judicieuse."
 EST_VAL_BARGIRS:0 "Bargirs Enrôlés : §Y$VAL$%§!"
 marathas_estate_events.4.t:0 "Des Chevaux pour les Bargirs"
 marathas_estate_events.4.d:0 "Les Bargirs, cavaliers marathes à l'emploi de [Root.Country.GetName], ont traditionnellement leurs chevaux fournis par leur patron. Ces derniers mois, une baisse des montures disponibles et une hausse conséquente des prix ont rendu cela financièrement intimidant. L'État pourrait procurer les chevaux nécessaires à un coût accru, mais si le prix s'avère inacceptable, nous pourrions devoir demander aux Bargirs d'assumer eux-mêmes le coût."
 marathas_estate_events.4.a:0 "L'État fournira les chevaux."
 marathas_estate_events.4.b:0 "C'est trop cher, ils doivent acheter leurs propres destriers."
 marathas_estate_events.5.t:0 "Militarisation de la Société Marathe"
 marathas_estate_events.5.d:0 "Les Marathes apportent avec eux une culture martiale endurcie aux terres qu'ils gouvernent. Ils maintiennent des liens étroits avec la paysannerie et les castes inférieures, favorisant une vision égalitaire plutôt qu'une croyance en la valeur inhérente de la noblesse. Contrairement à de nombreuses armées indiennes, qui tirent généralement leur main-d'œuvre des rangs de la noblesse, les Marathes lèvent des légions de soldats-paysans qualifiés dans la guérilla. Bien que non dotés de l'excellence d'une naissance noble et illustre, leur expérience martiale les rend supérieurs aux troupes faciles et efféminées de nos ennemis."
 marathas_estate_events.5.a:0 "Plus d'hommes pour l'armée."
 EST_VAL_MARATHA_MILITARIZATION:0 "Société Militarisée : §Y$VAL$%§!"
 marathas_estate_events.6.t:0 "La Militarisation Crée des Pénuries de Récoltes"
 marathas_estate_events.6.d:0 "La militarisation croissante de la société marathe a des inconvénients écologiques. Là où la paysannerie cultivait jadis les champs, elle peut maintenant gagner facilement des richesses en servant la moitié de l'année comme soldats. Les pénuries de main-d'œuvre plus une demande croissante de chevaux de guerre rendent l'agriculture traditionnelle difficile et non rentable, rendant la terre plus vulnérable aux famines. Beaucoup se tournent vers le pastoralisme ; le bétail peut être gardé avec une main-d'œuvre plus réduite, peut être conduit dans les forêts pendant une sécheresse, ou caché dans des ravins en temps de guerre. Il peut être nécessaire de réduire la militarisation à [maratha_farming_province.GetName], bien que la paysannerie risque de mal recevoir cette nouvelle."
 marathas_estate_events.6.a:0 "Nous devons l'accepter."
 marathas_estate_events.6.b:0 "Dire aux paysans de retourner à leurs champs."
 marathas_estate_events.6.c:0 "Amener des paysans sans terre pour cultiver les récoltes."
 EST_VAL_STOPPED_MILITARIZING_MARATHA:0 "Démilitarisation des Terres Agricoles : §Y$VAL$%§!"
 marathas_estate_events.7.t:0 "Les Marathes Développent des Goûts Coûteux"
 marathas_estate_events.7.d:0 "Les campagnes de [Root.Country.GetName] en Inde ont apporté la gloire aux Marathes à qui nous confions la direction de notre armée. Nombre de ces soldats rentrent chez eux avec un nouveau goût pour les luxes de la culture persanisée ; les soies bengalies, les peintures de style persan, les œuvres élaborées de laiton et d'argent sont maintenant en forte demande. Comme les Marathes exercent une grande influence en [Root.Country.GetName], la noblesse marathe a approché le [Root.Monarch.GetTitle] pour demander le patronage d'État de ces arts et l'acquisition de biens exotiques."
 marathas_estate_events.7.a:0 "Un peu de culture n'a jamais fait de mal à personne."
 marathas_estate_events.7.b:0 "Nous ne financerons pas la décadence persane."
 EST_VAL_MARATHA_LUXURIES:0 "Goûts Coûteux : §Y$VAL$%§!"
 EST_VAL_MARATHAS_DENIED_LUXURIES:0 "Luxes Refusés : §Y$VAL$%§!"
 marathas_estate_events.8.t:0 "Palkhis et le Culte de Vithoba"
 marathas_estate_events.8.d:0 "Une tradition de pèlerinage centrée autour du Culte de Vithoba est devenue populaire parmi les Marathes. Ces processions sont connues sous le nom de palkhis, se produisant simultanément dans de nombreuses colonies marathes en Inde et culminant au temple de Vithoba à Pandharpur. Les palkhis font partie de la tradition égalitaire marathe ; tous les Marathes quelle que soit leur caste marchent côte à côte, emportant avec eux les simples sandales d'un Poète-Saint vénéré.\n\nCertains parmi les Brahmanes voient ces mouvements spirituels non-hiérarchiques comme une menace pour leur autorité religieuse. Ils cherchent à obtenir une mesure de contrôle sur les palkhis afin qu'ils puissent être intégrés au culte hindou orthodoxe conformément à leur interprétation du rituel védique."
 marathas_estate_events.8.a:0 "Les palkhis resteront entre les mains du peuple."
 marathas_estate_events.8.b:0 "Formaliser l'événement avec la direction des Brahmanes."
 palkis.tooltip:1 "Une fraction de toutes les provinces §YHindoues§! possédées, à peu près égale à la part foncière de l'état des §YMarathes§!, obtient §Y« Palkhis Populaires »§! pendant §Y20 ans§!, donnant les effets suivants :\nAgitation Locale : §G-3,00§!\nCoût de Développement Local : §G-5,0 %§!\nDévastation Mensuelle : §G-0,03§!"
 EST_VAL_BRAHMIN_PALKHIS:0 "Palkhis Dirigés par les Brahmanes : §Y$VAL$%§!"
 marathas_estate_events.9.t:0 "Pouvoir Déclinant des Marathes"
 marathas_estate_events.9.d:0 "L'influence des Marathes en [Root.Country.GetName] a décliné récemment. Les querelles dynastiques et la désorganisation ont distrait de nombreux dirigeants marathes de leurs devoirs envers le [Root.Monarch.GetTitle], et en tant que tel ils exercent un moindre pouvoir à la cour."
 marathas_estate_events.9.a:0 "Soit."
 marathas_estate_events.10.t:0 "Influence Montante des Marathes"
 marathas_estate_events.10.d:0 "La caste militaire marathe n'a cessé de monter en puissance ces derniers temps. Leur service martial et leurs conseils leur ont valu une place de privilège en [Root.Country.GetName]."
 marathas_estate_events.10.a:0 "Soit."
 EST_VAL_MARATHA_ADVANCE:0 "Avancement des Marathes : §Y$VAL$%§!"
 EST_VAL_MARATHA_DECLINE:0 "Déclin des Marathes : §Y$VAL$%§!"
 marathas_estate_events.11.t:0 "Déloyauté des Marathes"
 marathas_estate_events.11.d:0 "Les relations de [Root.Country.GetName] avec les Marathes se sont détériorées à un niveau dangereux. Indignés par une série de politiques et de décisions militaires défavorables, leurs dirigeants ont exigé un contrôle local beaucoup plus grand des provinces que nous leur avons confiées et un assouplissement de leurs devoirs envers l'État. Si nous refusons, ils ont menacé de lever une armée pour faire appliquer leurs exigences."
 marathas_estate_events.11.a:0 "Nous ne pouvons pas risquer de les mettre davantage en colère."
 marathas_estate_events.11.b:0 "On ne peut pas leur permettre d'abandonner leurs devoirs."
 EST_VAL_MARATHAS_EXTORTED_RIGHTS:0 "Carte Blanche pour les Marathes : §Y$VAL$%§!"
 EST_VAL_MARATHAS_DENIED_RIGHTS:0 "Exigences Marathes Refusées : §Y$VAL$%§!"
 mug_mission_events.1.t:0 "Un Vice-Roi pour le Deccan ?"
 mug_mission_events.1.d:0 "Le Deccan est une région immense et son administration nous freine à bien des égards. Certains soutiendraient que la meilleure façon de gouverner efficacement la vaste étendue de l'Inde du Sud est de déplacer toute notre cour vers le vieux fort de Daulatabad.\nD'autres suggèrent une solution plus simple. Nous pourrions nommer un vice-roi pour gouverner toute la région à notre place, nous libérant pour nous étendre ailleurs."
 mug_mission_events.1.a:0 "Nous gouvernerons l'empire depuis le sud."
 mug_mission_events.1.b:0 "Nommons un vice-roi du Deccan."
 mug_mission_events.1.b.tt:0 "§RCela libérera toutes vos provinces du sud de l'Inde en tant que vassal très loyal.§!"
 mug_mission_events.2.t:0 "Chute de Golconde"
 mug_mission_events.2.d:0 "Alors que le commandant de Golconde se rend aux armées [Root.GetAdjective], il remet également le trésor gardé dans les murs du fort légendaire. Des diamants de toutes tailles, beaucoup d'entre eux avec leurs propres noms, ont été rapidement expédiés vers le trésor de [Root.Capital.GetCapitalName].\nLe plus grand marché de diamants du monde est maintenant entre les mains [Root.GetAdjective]..."
 mug_mission_events.2.a:0 "Brillant."
