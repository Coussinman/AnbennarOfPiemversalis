 local_venture:0 "Entreprise Locale"
 local_quarter:0 "Quartier Local"
 local_quarter_desc:0 "Les hommes de la Compagnie ont établi un périmètre défensif qui peut être facilement approvisionné en cas de siège.\n"
 permanent_quarters:0 "Quartiers Permanents"
 permanent_quarters_desc:0 "Les défenses de la Compagnie dans cette zone ont été améliorées, créant une position véritablement fortifiée. Une garnison complète de soldats de la Compagnie peut être entretenue pour défendre nos investissements.\n"
 officers_mess:0 "Mess des Officiers"
 officers_mess_desc:0 "Des quartiers d'habitation appropriés ont été créés pour les officiers de la Compagnie, d'où ils peuvent commander nos efforts militaires dans la zone.\n"
 company_warehouse:0 "Entrepôt de la Compagnie"
 company_warehouse_desc:0 "L'Entrepôt de la Compagnie nous permet de commencer à exploiter les ressources locales de la zone. C'est un lieu pour stocker et gérer les marchandises que nous achetons et vendons dans la zone.\n"
 company_depot:0 "Dépôt de la Compagnie"
 company_depot_desc:0 "Un Entrepôt à plus grande échelle, le Dépôt de la Compagnie domine le paysage économique de la zone. De grandes quantités de marchandises sont administrées ici par nos logisticiens.\n"
 admiralty_desc:0 "La structure de commandement naval de la Compagnie est basée à l'Amirauté. De là, nos officiers de marine peuvent administrer efficacement un plus grand nombre de navires marchands.\n"
 brokers_office:0 "Bureau du Courtier"
 brokers_office_desc:0 "Le Bureau du Courtier est la base des opérations pour négocier des accords commerciaux avec les producteurs locaux. Notre empressement à acheter des biens exotiques encourage les producteurs locaux à développer leurs opérations.\n"
 brokers_exchange:0 "Bourse du Courtier"
 brokers_exchange_desc:0 "Le commerce par et avec la Compagnie est devenu le centre de la production locale grâce à l'expansion de la Bourse du Courtier. La production dans la zone explose car notre volonté d'acheter des biens locaux est presque sans limites.\n"
 property_appraiser:0 "Évaluateur Immobilier"
 property_appraiser_desc:0 "La Compagnie a un besoin insatiable d'acheter de nouvelles terres outre-mer. L'Évaluateur Immobilier nous permet d'obtenir ces terres au prix le plus bas possible, augmentant notre capacité à contrôler le flux commercial dans la zone.\n"
 company_garrison:0 "Garnison de la Compagnie"
 harbor:0 "Port"
 foreign_influence:0 "Influence Étrangère"
 company_administration:0 "Administration de la Compagnie"
 company_administration_desc:0 "L'Administration de la Compagnie fonctionne essentiellement comme un petit gouvernement. Chargée de nombreuses tâches, parmi les plus importantes assignées à l'Administration figure le recrutement local dans les rangs de la Compagnie.\n"
 military_administration:0 "Administration Militaire"
 military_administration_desc:0 "Grâce à une Administration Militaire, la Compagnie est capable de lever des armées privées parmi la population locale. À mesure que le pouvoir de la Compagnie augmente, elle commence à fonctionner presque comme un État militarisé à part entière.\n"
 governor_general_mansion:0 "Résidence du Gouverneur Général"
 governor_general_mansion_desc:0 "Toute illusion de gouvernance indigène est dissipée avec l'établissement de la Résidence du Gouverneur Général. L'administration du Gouverneur Général fait clairement comprendre que la Compagnie n'est pas une simple guilde de marchands, mais plutôt le véritable pouvoir politique dans cette région.\n"
