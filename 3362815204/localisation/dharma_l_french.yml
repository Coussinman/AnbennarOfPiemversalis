 CANNOT_UPGRADE_RANK_DISALLOWED_BY_REFORMS:0 "Vos Réformes Gouvernementales empêchent une amélioration vers le rang suivant."
 monsoon_events.1.t:0 "Mousson Extrême dans [severe_monsoon_province.GetAreaName]"
 monsoon_events.1.d:1 "La météo de la Mousson de [GetYear] a été bien plus sévère que prévu dans [severe_monsoon_province.GetAreaName]. Les vents puissants et les fortes pluies ont causé des dommages extrêmes aux colonies rurales et urbaines. Un effort de secours coûteux sera nécessaire pour réparer une partie des dommages, bien qu'il faudra du temps pour que [severe_monsoon_province.GetAreaName] se remette pleinement."
 monsoon_events.1.a:0 "Organiser un effort de secours."
 monsoon_events.1.b:0 "Quelle tragédie."
 monsoon_events.2.t:0 "Les Pluies Font Défaut dans [monsoon_failure_province.GetAreaName]"
 monsoon_events.2.d:0 "Les pluies saisonnières attendues n'ont pas réussi à arriver dans [monsoon_failure_province.GetAreaName]. Une période de sécheresse a commencé, et la famine suivra probablement alors que les récoltes échouent."
 monsoon_events.2.a:0 "Ce sont des temps difficiles."
 monsoon_events.3.t:0 "Les Pluies Apportent la Fertilité à [good_monsoon_province.GetAreaName]"
 monsoon_events.3.d:0 "Les pluies saisonnières ont apporté la prospérité à [good_monsoon_province.GetAreaName], n'étant ni trop légères ni trop sévères. Alors que l'agriculture prospère, le peuple s'enrichit et la richesse dans la zone a augmenté."
 monsoon_events.4.t:0 "La Famine de [company_drought_province.GetAreaName]"
 monsoon_events.4.d:0 "Le règne de la [company_drought_province.TradeCompany.GetName] a transformé le paysage agricole de [company_drought_province.GetAreaName]. Là où les champs cultivaient jadis de la nourriture pour la population locale, la Compagnie exige maintenant qu'ils se concentrent fortement sur les cultures de rente. Cette politique à courte vue visant un profit immédiat s'est retournée contre nous alors qu'une sécheresse particulièrement sévère a saisi [company_drought_province.GetAreaName]. Incapable de cultiver assez de nourriture pour nourrir le peuple, la Compagnie porte une grande responsabilité dans la famine et la famine à venir."
 monsoon_events.4.a:0 "Les profits avant les gens."
 monsoon_events.5.t:0 "Pluie des Pruniers"
 monsoon_events.5.d:0 "Les pruniers fleurissent au printemps\nLes pluies apportent grande abondance\nNos fermiers prospèrent"
 plum_rain_tooltip:0 "Les provinces dans la zone §Y[plum_rains_province.GetAreaName]§! produisant des §YCéréales§!, du §YVin§!, du §YThé§!, ou des §YÉpices§! obtiennent §Y« Pluie des Pruniers »§! pendant §Y5 ans§!, donnant les effets suivants :\nEfficacité de Production Locale : §G+20,0 %§!"
