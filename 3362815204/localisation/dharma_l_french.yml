 dutch_republic.33.t:1 "Assemblée [Root.GetAdjectiveCap] Abolie"
 dutch_republic.33.d1:0 "Après des années de chamailleries, de conflits internes et de législation retardée, tous ont convenu que quelque chose doit être fait concernant l'état de l'Assemblée.\n\nL'ancienne Maison de [Root.Monarch.Dynasty.GetName], qui pendant des années a bûché son temps, a, dans une manœuvre parfaitement synchronisée, conduit un projet de loi abolissant entièrement l'assemblée, et rétablissant [Root.Monarch.GetName] sur le trône de [Root.GetName]."
 dutch_republic.33.d2:1 "Des années de conflit interne au sein de l'Assemblée [Root.GetAdjectiveCap] ont commencé à peser sur l'esprit national de [Root.GetName]. L'opinion populaire montante contre l'Assemblée a fait sortir de nombreux opposants vocaux parmi nos citoyens.\n\nEnfin, un concurrent se dresse au-dessus de ses adversaires, renversant le peu d'opposition restante dans l'Assemblée, et rétablissant les glorieuses traditions de [Root.GetName]."
