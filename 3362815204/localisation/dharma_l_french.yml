 FREE_POLICIES_DESC:2 "Les Politiques sont de puissants modificateurs pour votre pays qui dureront jusqu'à ce que vous choisissiez de les retirer. Nous pouvons en maintenir certaines gratuitement, ensuite elles coûteront du pouvoir de monarque mensuel. Nous pouvons en obtenir davantage grâce aux idées et aux réformes gouvernementales."
