 #events

 cannor_religious_flavour.1.t:0 "Le Festival des Vœux"
 cannor_religious_flavour.1.d:0 "Le Festival des Vœux est arrivé. Ryala, la bienheureuse déesse de l'amour et de la beauté, est honorée par ces joyeuses festivités. Un renouvellement des vœux entre amants, tant en privé qu'en public, est suivi d'une procession desdits couples à travers les rues de notre capitale. Revêtus de leurs plus beaux atours, les couples dévoués, jeunes et vieux, riches et pauvres, sont acclamés par les badauds lors de cette célébration de la divine bénédiction d'amour de Ryala. Ce défilé réjouit le cœur de tous nos sujets aussi sûrement que le festin qui s'ensuit remplit leurs ventres. Le festival offre à [Root.Monarch.GetName] l'occasion propice de se montrer à [Root.Monarch.GetHerselfHimself] comme un parangon de dévotion pour [Root.Monarch.GetHerHis] peuple. Comment le souverain devrait-il célébrer ?"
 cannor_religious_flavour.1.a:0 "Renouveler vos vœux devant la cour, en symbole d'amour."
 cannor_religious_flavour.1.b:0 "Offrir un somptueux festin aux amoureux."
 cannor_religious_flavour.1.c:0 "Célébrer en privé."
 cannor_religious_flavour.1.e:0 "En tant que dévot de Ryala, notre amour est partagé avec tous."

 cannor_religious_flavour.2.t:0 "Célébration de la Beauté"
 cannor_religious_flavour.2.d:0 "Tandis qu'elle gravissait les marches de l'estrade improvisée, l'océan de regards apparemment infini faillit la faire tomber à genoux. Luttant contre la faiblesse qui parcourait ses jambes, elle maintint sa démarche exercée, gracieuse et résolue.\n\nC'était le moment.\n\nC'était la Célébration de la Beauté de la Divine Ryala, sa chance de prouver sa vertu au monde entier.\n\nLe reste de la journée passa dans un brouillard. La représentation. L'attente. La sélection des Élues du Temple.\n\nEt voilà qu'elle vivait sa nouvelle vie. On l'avait jugée digne d'une place parmi les rangs du Temple de Ryala. L'une de ces quelques femmes chaque année jugées dignes de servir à la fois leur peuple et leur foi. Les femmes qui remportaient cet honneur ne restaient pas toujours derrière les portes du temple ; certaines s'élevaient vers des sommets plus hauts encore."
 cannor_religious_flavour.2.a:0 "Que notre souverain la prenne à son service."
 cannor_religious_flavour.2.b:0 "Elle ferait une parfaite conseillère."
 cannor_religious_flavour.2.c:0 "Cette femme pourrait bien être un avatar de Ryala en personne !"
 cannor_religious_flavour.2.e:0 "Les femmes doivent se soutenir dans le monde d'aujourd'hui."

 cannor_religious_flavour.3.t:0 "Les Afflictions de l'Amour Perdu"
 cannor_religious_flavour.3.d:0 "« Depuis des temps immémoriaux, les rites nuptiaux de Ryala sont tenus pour sacrés. Présidées par un membre du clergé et formelles dans leur structure, les cérémonies d'union sous les auspices de Ryala symbolisaient le plus grand engagement que l'on puisse prendre envers autrui. Un engagement si profondément ancré dans les traditions ancestrales que souiller ces rites est un affront à la décence commune elle-même. Or, il semble que l'effronterie de ces nouveaux adorateurs de Corin ne connaisse point de bornes, car ils ont délaissé ces cérémonies séculaires. » — Dominic de Badeben, Traités du Schisme de l'Amour Perdu\n\n« Pfft, qui sont-ils pour nous dicter notre conduite ? Je l'aime et elle m'aime, un point c'est tout ! Que valent des vœux guindés et des génuflexions à triple reprise, ou je ne sais quels rituels assommants, quand notre amour est dans nos cœurs ? Nous sommes mariés quand même, peu importe ce qu'un prêtre pompeux pourrait en dire ! » — Devan de Charwic, tel que consigné le jour de son mariage\n\nLe Schisme de l'Amour Perdu est le nom donné au débat théologique entourant les rites du mariage. Ces controverses se sont désormais étendues à [Root.GetName] ; comment devrions-nous les traiter ?"
 cannor_religious_flavour.3.a:0 "La beauté et l'amour doivent être accessibles à tous, quelles que soient les circonstances."
 cannor_religious_flavour.3.b:0 "Modifier les rites serait un affront à Ryala elle-même !"

 cannor_religious_flavour.4.t:0 "La Sororité Cirésienne"
 cannor_religious_flavour.4.d:0 "La Sororité Cirésienne a débuté comme une société secrète de femmes interprétant la féminité de Ryala comme un rejet de la structure patriarcale de la Cour Régente. Avec la foi corinite qui porte une divinité féminine au premier plan du panthéon, cette société autrefois clandestine a commencé à prêcher ses idées subversives au grand jour. Des témoignages affirmant que l'expérience féminine est essentielle à la véritable compréhension de notre foi et que le divin féminin est entravé par les rôles sociaux traditionnels se sont propagés comme une traînée de poudre dans la province de [event_province.GetName]. Ces concepts ont particulièrement trouvé écho chez la couche intermédiaire de nos sujets. Épouses et filles de marchands, de médecins et d'hommes de loi sont désormais convaincues qu'elles ne devraient plus être cantonnées à l'éducation des enfants et aux tâches domestiques, et perturbent l'ordre établi dans certaines des professions les plus productives de nos terres."
 cannor_religious_flavour.4.a:0 "Mettre fin à ces divagations."
 cannor_religious_flavour.4.b:0 "Soutenir cette cause louable."

 cannor_religious_flavour.5.t:0 "Les Balgarites du Feu-Dragon"
 cannor_religious_flavour.5.d:0 "Balgar le Bâtisseur, le nain devenu dieu qui nous offrit des merveilles telles que les Murailles de Castanor, a de nouveau tourné son regard vers la guerre. Avec Corin à la tête de la Cour Régente, de nouvelles machines de guerre sont nécessaires pour propager la vraie foi, et Balgar a fait don de machines d'une ingéniosité terrifiante à ses loyaux adeptes du Feu-Dragon. Ces fidèles de Balgar ont vu la justesse de la cause de Corin et ont consacré leurs prouesses d'ingénierie à répandre sa vérité. Doivent-elles prendre la forme d'engins de siège, ou se tourner vers des préoccupations plus domestiques ?"
 cannor_religious_flavour.5.a:0 "Déployons leur dernière machine de guerre."
 cannor_religious_flavour.5.b:0 "Orienter leur ingéniosité vers la construction plutôt."
 cannor_religious_flavour.5.c:0 "Recruter le chef balgarite pour nos armées."

