####################
#Custom Tooltips
####################

dwarven_monuments_can_use_tooltip_dig_level_2_or_higher: "Possède au moins le §YNiveau de Forage 2 : Forteresse Souterraine§!, ou au moins §Y50 de Développement§!"
dwarven_monuments_can_use_tooltip_dig_level_3_or_higher: "Possède au moins le §YNiveau de Forage 3 : Forteresse Caverneuse§!, ou au moins §Y60 de Développement§!"
dwarven_monuments_can_use_tooltip_dig_level_4_or_higher: "Possède au moins le §YNiveau de Forage 4 : Forteresse Extérieure§!, ou au moins §Y70 de Développement§!"
dwarven_monuments_can_use_tooltip: "§Y[Root.GetName]§! appartient soit à une §YRace Souterraine§!, soit possède une §YMinorité Raciale Souterraine§! en §GCoexistence§! ou §TIntégrée§!"
dwarven_monuments_can_use_tooltip_marrhold: "§Y[Root.GetName]§! appartient soit à une §YRace Souterraine§!, soit à une culture §YEscanni§!"
dwarven_monuments_can_use_tooltip_strongbellow_academy: "La §YProvince§! appartient soit à une §YRace Souterraine§!, soit possède une §YRace Souterraine§! en §GCoexistence§! ou §TIntégrée§!, soit appartient à une culture originaire de §Yl'Empire d'Anbennar§!"

dwarven_monuments_permanent_damestear: "La Damestear de cette province est §Ypermanente§! et ne s'épuisera pas avec le temps."

####################
#Western Dwarovar
####################

kronium_throne_title: "Le Trône de Kronium"
kronium_throne: "Le Trône de Kronium"
great_project_kronium_throne: "Le Trône de Kronium"
kronium_throne_desc: "Le Trône de Kronium est le symbole physique de l'autorité du Haut-Roi et de sa souveraineté sur l'ensemble de l'Échine-du-Serpent."

amlharaz_assembly_title: "Haute Assemblée d'Amlharaz"
amlharaz_assembly: "Haute Assemblée d'Amlharaz"
great_project_amlharaz_assembly: "Haute Assemblée d'Amlharaz"
amlharaz_assembly_desc: "Amlharaz est l'antique lieu de réunion de l'ancien Empire Nain. La Haute Assemblée d'Amlharaz, ou plus exactement d'Aul-Dwarov lui-même, était l'endroit où les premiers rois nains se rencontraient pour négocier la paix et conduire la diplomatie entre leurs forteresses."

hall_of_the_ancestors_title: "Hall des Ancêtres"
hall_of_the_ancestors: "Hall des Ancêtres"
great_project_hall_of_the_ancestors: "Hall des Ancêtres"
hall_of_the_ancestors_desc: "Avant la chute d'Aul-Dwarov, le Hall des Ancêtres abritait tout le savoir de tous les nains. Le qualifier de bibliothèque serait presque un euphémisme, car à son apogée, il surpassait toutes les autres bibliothèques de Halann par la richesse, l'ampleur et la profondeur de ses connaissances."

fortress_of_verkal_vazkron_title: "Forteresse de Verkal Vazkron"
fortress_of_verkal_vazkron: "Forteresse de Verkal Vazkron"
great_project_fortress_of_verkal_vazkron: "Forteresse de Verkal Vazkron"
fortress_of_verkal_vazkron_desc: "Verkal Vazkron était l'une des forteresses légendaires du Roc-du-Roi qui résista au siège d'Amldihr pendant de nombreuses décennies, bien qu'elle finît par tomber aux mains des orques envahisseurs en 5888 av. A., après que tous les défenseurs nains eurent péri lors d'une ultime résistance pour protéger le Roc-du-Roi."

er_natvir_railyard_title: "Gare de Triage d'Er-Natvir"
er_natvir_railyard: "Gare de Triage d'Er-Natvir"
great_project_er_natvir_railyard: "Gare de Triage d'Er-Natvir"
er_natvir_railyard_desc: "On dit que tous les rails du Dwarovar mènent à Er-Natvir. La Gare de Triage des Nains Dagrites est à bien des égards le cœur des Montagnes de l'Échine-du-Serpent, plus encore qu'Amldihr. Un transport rapide et efficace était crucial pour l'Empire Nain, non seulement pour le mouvement et l'approvisionnement logistique des armées naines, mais aussi pour le Dwarovstapola, le service postal et de livraison nain. Après la chute d'Er-Natvir aux mains des orques en 5934 av. A., la capacité des Nains à répondre rapidement aux incursions orques dans le Dwarovar Occidental fut gravement compromise."

kozenad_brothel_title: "Lupanars de Verkal Kozenad"
kozenad_brothel: "Lupanars de Verkal Kozenad"
great_project_kozenad_brothel: "Lupanars de Verkal Kozenad"
kozenad_brothel_desc: "Les dépravés du Dwarovar : Verkal Kozenad est célèbre pour ses nombreux lupanars et les « dames de l'appel d'opale »."

mithradhum_academy_title: "Académie des Pourfendeurs de Gobelins"
mithradhum_academy: "Académie des Pourfendeurs de Gobelins"
great_project_mithradhum_academy: "Académie des Pourfendeurs de Gobelins"
mithradhum_academy_desc: "Après que le célèbre général de l'armée mithradûmique Thorin Pourfendeur de Gobelins eut pris sa retraite du commandement militaire, il chercha à s'assurer que les leçons apprises au cours de sa longue carrière militaire ne seraient pas perdues à sa mort. Dans la forteresse de Mithradûm, il fonda l'Académie des Pourfendeurs de Gobelins, où il forma personnellement de nombreux officiers et soldats en devenir à être aussi mortels et tenaces au combat que le mithril lui-même."

orldhum_estates_title: "Domaines Nobles de Haraz Orldhûm"
orldhum_estates: "Domaines Nobles de Haraz Orldhûm"
great_project_orldhum_estates: "Domaines Nobles de Haraz Orldhûm"
orldhum_estates_desc: "Les façonneurs de platine : de nombreux nobles nains et Hauts-Rois d'Aul-Dwarov étaient originaires de Haraz Orldhûm. Les Nains de Platine ont un long passé de belligérance envers tous, y compris les autres nains. De tous les divers peuples nains, ceux de Haraz Orldhûm sont les plus royaux et les plus obstinés."

khugdihr_bank_title: "Banque d'Asra de Khugdhir"
khugdihr_bank: "Banque d'Asra de Khugdhir"
great_project_khugdihr_bank: "Banque d'Asra de Khugdhir"
khugdihr_bank_desc: "Khugdhir est une forteresse célèbre pour sa Banque d'Asra, fondée par Fognir Asra après qu'il eut récupéré la Gemme d'Asra. La Banque d'Asra possède des succursales dans tout Halann, d'Anbenncost jusqu'à Tianlou dans l'extrême orient de Haless."

orlazam_food_silos_title: "Silos Alimentaires d'Orlazam"
orlazam_food_silos: "Silos Alimentaires d'Orlazam"
great_project_orlazam_food_silos: "Silos Alimentaires d'Orlazam"
orlazam_food_silos_desc: "La position d'Orlazam en tant que principale forteresse naine surplombant le riche et fertile Val-du-Serpent en a fait un lieu essentiel pour la collecte et la distribution de nourriture, particulièrement pour l'armée. Les voies ferrées entre Orlazam et Er-Natvir, la Gare de Triage de l'empire, comptent parmi les rails les plus rapides et de la plus haute qualité de tout le Dwarovar, en raison de l'importance du Val-du-Serpent dans l'approvisionnement de l'armée et des forteresses. Une armée marche sur son estomac, après tout."

ramvault_mines_title: "Mines de Razstunad"
ramvault_mines: "Mines de Razstunad"
great_project_ramvault_mines: "Mines de Razstunad"
ramvault_mines_desc: "Les Nains d'Acier-du-Bélier d'Orlazam furent les inventeurs et créateurs de la cavalerie de béliers naine. Bien qu'ils aient commencé comme bûcherons et fermiers des frontières vivant dans et autour du Val-du-Serpent, ce sont les Mines de Raztunad qui fournirent l'acier-du-bélier crucial utilisé par leur cavalerie de béliers."

vazhatun_observatory_title: "Observatoire de Dûr-Vazhatun"
vazhatun_observatory: "Observatoire de Dûr-Vazhatun"
great_project_vazhatun_observatory: "Observatoire de Dûr-Vazhatun"
vazhatun_observatory_desc: "Dûr-Vazhatun est le foyer des nains académiques et philosophes, savants, studieux et curieux. Contrairement aux autres forteresses naines, les Nains de Saphir de Dur-Vazhatûn aiment le grand air et l'observation du ciel nocturne. Dur-Vazatûn abrite également le plus haut sommet des Montagnes de l'Échine-du-Serpent, sur lequel les Nains ont construit un immense observatoire pour contempler les étoiles."

krakdhumvror_hold_title: "Forteresse Gelée de Krakdûmvror"
krakdhumvror_hold: "Forteresse Gelée de Krakdûmvror"
great_project_krakdhumvror_hold: "Forteresse Gelée de Krakdûmvror"
krakdhumvror_hold_desc: "Krakdûmvror est une forteresse froide et ancienne fondée par les exilés et criminels de l'Empire Nain. La forteresse moderne de Krakdumvror trouve ses racines dans Verkal Midjurdr Kralt, une place forte originellement construite pour protéger le Dwarovar contre les Géants de Glace des temps jadis."

jorkad_aqueduct_title: "Aqueducs de Hul-Jorkad"
jorkad_aqueduct: "Aqueducs de Hul-Jorkad"
great_project_jorkad_aqueduct: "Aqueducs de Hul-Jorkad"
jorkad_aqueduct_desc: "Comme le remarqua un jour un célèbre ouvrier nain, il n'existe aucun phénomène social ou organisation qui ne repose pas, en fin de compte, sur l'infrastructure hydraulique. Hul-Jorkad fut la première forteresse de l'Empire Nain à tomber aux mains des orques, et une fois qu'elle fut tombée, le manque d'eau scella le destin de la majorité des forteresses, celles qui dépendaient de Hul-Jorkad pour leur approvisionnement en eau. On pourrait raisonnablement arguer, comme l'ont fait de nombreux nains après la chute, que si n'importe quelle autre forteresse, absolument n'importe laquelle hormis Hul-Jorkad, était tombée aux mains des envahisseurs, la race naine aurait peut-être pu survivre face à l'assaut des orques."

sedadhum_mining_settlement_title: "Colonie Minière de Sedadhûm"
sedadhum_mining_settlement: "Colonie Minière de Sedadhûm"
great_project_sedadhum_mining_settlement: "Colonie Minière de Sedadhûm"
sedadhum_mining_settlement_desc: "Relativement récente par rapport à sa forteresse d'origine, Sedadhûm est une expansion des Nains de Quartz de Krakdûmvror visant à exploiter l'Enclume du Géant depuis la sécurité relative du réseau de grottes intérieur. Bien que les opérations initiales de prospection et d'arpentage aient indiqué que d'importantes quantités de mithril se trouvaient probablement dans la zone, les attaques continues de bandes de pillards orques et d'essaims de gobelins ont forcé les Nains de Quartz à se replier dans leur forteresse, du moins pour le moment."

####################
#Serpentsreach
####################

gor_burad_fireglass_forge_title: "Ghelebûr Krakdhûm"
gor_burad_fireglass_forge: "Ghelebûr Krakdhûm"
great_project_gor_burad_fireglass_forge: "Ghelebûr Krakdhûm"
gor_burad_fireglass_forge_desc: "Ghelebûr Krakdhûm, également connue sous le nom de Forge du Verre de Feu, est la source de la principale exportation de Gor Bûrad : le verre. En utilisant la lave du volcan, la forge produit de magnifiques œuvres d'art en obsidienne et de grandes quantités de verre."

shaztundihr_marble_gate_title: "La Porte de Marbre"
shaztundihr_marble_gate: "La Porte de Marbre"
great_project_shaztundihr_marble_gate: "La Porte de Marbre"
shaztundihr_marble_gate_desc: "La Porte de Marbre de Shaztundihr est une œuvre remarquable d'architecture et d'ingénierie naines. Composée de blocs monolithiques géants de marbre, chaque battant est estimé peser plus de 1 500 tonnes. Méticuleusement entretenues, les gravures et décorations à la surface de la porte témoignent du savoir-faire des tailleurs de pierre Nains de Marbre de Shazstun."

verkal_skomdihr_warding_gate_title: "La Porte de Protection"
verkal_skomdihr_warding_gate: "La Porte de Protection"
great_project_verkal_skomdihr_warding_gate: "La Porte de Protection"
verkal_skomdihr_warding_gate_desc: "Officiellement connue sous le nom de « Citadelle qui Protège contre les Bois », la caractéristique principale de Verkal Skomdihr était sa porte circulaire ornée de gemmes (qui est également l'emblème de la forteresse). On dit que la porte était protégée par d'antiques magies runiques et gemmiques afin de préserver la forteresse de l'influence malveillante des fées. Outre la Porte de Protection, Verkal Skomdihr est également connue pour être le berceau des schémas des armes à silex. Si Ovdal Kanzad a perfectionné les canons et l'artillerie, ce sont les Nains de Silex qui ont perfectionné les armes légères de l'Empire Nain."

arg_ordstun_great_clast_shafts_title: "Grands Puits Clastiques d'Arg-Ôrdstun"
arg_ordstun_great_clast_shafts: "Grands Puits Clastiques d'Arg-Ôrdstun"
great_project_arg_ordstun_great_clast_shafts: "Grands Puits Clastiques d'Arg-Ôrdstun"
arg_ordstun_great_clast_shafts_desc: "Un voyage à travers la forteresse caverneuse d'Arg-Ôrdstun révèle au voyageur plusieurs puits circulaires massifs perçant la roche jusqu'à des profondeurs insondables. Un système de poulies complexe déplace les marchandises de haut en bas, tandis que les ateliers nains s'affairent entre les niveaux. Tels sont les incroyables Grands Puits Clastiques d'Arg-Ordstun."

ovdal_lodhum_tunnel_of_love_title: "Le Tunnel de l'Amour"
ovdal_lodhum_tunnel_of_love: "Le Tunnel de l'Amour"
great_project_ovdal_lodhum_tunnel_of_love: "Le Tunnel de l'Amour"
ovdal_lodhum_tunnel_of_love_desc: "Avant la chute de l'Empire Nain, Ovdal Lohum était connue comme la capitale de la romance du Dwarovar. Entre autres choses, les Nains de Grenat construisirent leur célèbre tunnel de l'amour à partir d'une ancienne voie ferrée, qui devint rapidement l'attraction la plus populaire d'Ovdal Lodhum."

orlghelovar_great_waterfall_title: "La Grande Cascade d'Orlghelovar"
orlghelovar_great_waterfall: "La Grande Cascade d'Orlghelovar"
great_project_orlghelovar_great_waterfall: "La Grande Cascade d'Orlghelovar"
orlghelovar_great_waterfall_desc: "Chef-d'œuvre d'ingénierie, le hall central d'Orghelovar à son apogée était célèbre pour la cascade en son sein, qui emplissait la salle d'une brume agréable dont on disait qu'elle pouvait apaiser même le plus courroucé des nains. La cascade était alimentée par une source souterraine qui était l'origine d'une rivière, et sa construction originale nécessita de nombreuses années de labeur."

####################
#Middle Dwarovar
####################

verkal_gulan_golden_delve_title: "La Fouille Dorée"
verkal_gulan_golden_delve: "La Fouille Dorée"
great_project_verkal_gulan_golden_delve: "La Fouille Dorée"
verkal_gulan_golden_delve_desc: "La forteresse de Verkal Gulan repose sur un immense gouffre traversé d'innombrables veines d'or, ce qui en fait la mine d'or la plus profonde de l'Échine-du-Serpent. Bien qu'en état de délabrement en 1444 ap. A., la Fouille Dorée à son apogée approvisionnait Aul-Dwarov en la majorité de ses pièces frappées avant l'effondrement de l'empire."

seghdihr_home_of_the_seg_band_title: "Foyer de la Bande de Seg"
seghdihr_home_of_the_seg_band: "Foyer de la Bande de Seg"
great_project_seghdihr_home_of_the_seg_band: "Foyer de la Bande de Seg"
seghdihr_home_of_the_seg_band_desc: "L'une des compagnies de mercenaires les plus notoires et impitoyables de Cannor, la Bande de Seg (une corruption de Segbandal, qui signifiait Alliance Méridionale que Seghdir avait dirigée) acquit sa notoriété en servant comme hommes de main sous les ordres des Elfes Solaires lorsque la forteresse était partagée entre l'Empire du Phénix et le Segbandal."

hehodovar_school_of_architecture_title: "École d'Architecture de Hehodovar"
hehodovar_school_of_architecture: "École d'Architecture de Hehodovar"
great_project_hehodovar_school_of_architecture: "École d'Architecture de Hehodovar"
hehodovar_school_of_architecture_desc: "La première forteresse, et la forteresse des bâtisseurs. Hehodovar est célèbre pour son école d'architecture, qui à son apogée était l'établissement de référence dans tout Halann pour l'enseignement de la conception et de la construction de bâtiments, bien qu'avec un *léger* parti pris connu des professeurs en faveur des styles nains."

gor_vazumbrog_the_vaulthold_title: "La Forteresse-Coffre"
gor_vazumbrog_the_vaulthold: "La Forteresse-Coffre"
great_project_gor_vazumbrog_the_vaulthold: "La Forteresse-Coffre"
gor_vazumbrog_the_vaulthold_desc: "À l'époque de l'antique Aul-Dwarov, Gor Vazumbrog n'était seconde qu'à Mithradum en matière d'importance militaire et de sécurité du Dwarovar, en raison du grand nombre de reliques et de tomes arcaniques enfermés au plus profond de ses coffres de titane. Seul un appel du Haut-Roi d'Amldihr lui-même pouvait ouvrir un coffre de titane, et cela se faisait rarement, car une grande partie de ce qui était scellé l'était pour de bonnes raisons."

gor_ozumbrog_the_topaz_throne_title: "Le Trône de Topaze"
gor_ozumbrog_the_topaz_throne: "Le Trône de Topaze"
great_project_gor_ozumbrog_the_topaz_throne: "Le Trône de Topaze"
gor_ozumbrog_the_topaz_throne_desc: "Bien que jamais aussi puissant que le Trône de Kronium du Haut-Roi d'Amldhir, le Trône de Topaze est un symbole du pouvoir des Anciens Rois de Gor Ozumbrog avant que la chute de la forteresse lors de l'effondrement de l'Empire Nain ne conduise à sa destruction quasi totale."

####################
#Tree of Stone
####################

earthseed_title: "Graine-de-Terre"
earthseed: "Graine-de-Terre"
great_project_earthseed: "Graine-de-Terre"
earthseed_desc: "Graine-de-Terre est le lieu où la déesse de la terre Halanna aurait créé les Nains à partir de la roche de l'Échine-du-Serpent. C'est le site le plus sacré et le plus vénéré par tous les Nains, particulièrement ceux qui résident au sein même de l'Échine-du-Serpent."

ovdal_kanzad_cannon_foundry_title: "Fonderie de Canons de Kanzad"
ovdal_kanzad_cannon_foundry: "Fonderie de Canons de Kanzad"
great_project_ovdal_kanzad_cannon_foundry: "Fonderie de Canons de Kanzad"
ovdal_kanzad_cannon_foundry_desc: "Les canons et l'artillerie sont la spécialité des Nains d'Ambre d'Ovdal Kanzad. Bricolant sans cesse différents métaux et alliages pour produire les canons et obus les plus puissants et les plus performants de leur fonderie, on en viendrait presque à plaindre les gobelins et les orques de l'autre côté du champ de bataille."

grozumdhir_green_gate_title: "La Porte Verte"
grozumdhir_green_gate: "La Porte Verte"
great_project_grozumdhir_green_gate: "La Porte Verte"
grozumdhir_green_gate_desc: "La Porte Accueillante, ou « Porte Verte » de Grozumdhir, est une porte massive ornée de pierres de péridot, et l'origine du nom de la forteresse. Au-dessus de la porte sont inscrits les mots « Tous les amis des nains sont les bienvenus ». De nos jours, des humains de Rahen, ainsi que des érudits harimari et même quelques Elfes Solaires et du Désert se sont installés dans les niveaux extérieurs de Grozumdhir, en faisant l'une des forteresses les plus cosmopolites du Dwarovar."

ovdal_az_an_grand_lake_ballroom_title: "La Grande Salle de Bal du Lac"
ovdal_az_an_grand_lake_ballroom: "La Grande Salle de Bal du Lac"
great_project_ovdal_az_an_grand_lake_ballroom: "La Grande Salle de Bal du Lac"
ovdal_az_an_grand_lake_ballroom_desc: "Taillée dans la pierre par Magun le Sculpteur, la Grande Salle de Bal du Lac est une source de fierté pour les nains d'Ovdal Az-An. Polie jusqu'à avoir l'éclat d'un miroir, la piste de danse ressemble à un lac lumineux et immobile tandis que les nains de la forteresse glissent silencieusement à sa surface lors de leurs danses. Par quelque technique ou astuce inconnue de Magun lui-même lors de la construction de la salle de bal, la surface n'est jamais altérée par l'usage."

hul_as_krakazol_breweries_title: "Brasseries de Hul-az-Krakazol"
hul_as_krakazol_breweries: "Brasseries de Hul-az-Krakazol"
great_project_hul_as_krakazol_breweries: "Brasseries de Hul-az-Krakazol"
hul_as_krakazol_breweries_desc: "Les Nains d'Améthyste de Hul-az-Krakazol étaient célèbres pour leur brassage. On dit qu'ils furent le peuple qui découvrit à l'origine le processus de fermentation de l'alcool. Forts de centaines d'années d'améliorations, les brasseurs de Krakazol sont renommés pour leurs saveurs uniques, leur qualité et leur puissance."

####################
#Jade Mines
####################

tuwad_dhumakon_gardens_title: "Jardins de Tuwad-Dhûmakon"
tuwad_dhumakon_gardens: "Jardins de Tuwad-Dhûmakon"
great_project_tuwad_dhumakon_gardens: "Jardins de Tuwad-Dhûmakon"
tuwad_dhumakon_gardens_desc: "Les Jardins de Tuwad-Dhûmakon comptent parmi les jardins aménagés les plus magnifiques de l'Échine-du-Serpent. Entretenus par les Nains d'Émeraude pendant près d'un millénaire avant la chute, les Jardins de Tuwad-Dhûmakon sont réputés pour apaiser et revigorer même les nains les plus tendus."

gronstunad_trade_halls_title: "Halls Marchands de Grônstunad"
gronstunad_trade_halls: "Halls Marchands de Grônstunad"
great_project_gronstunad_trade_halls: "Halls Marchands de Grônstunad"
gronstunad_trade_halls_desc: "Grônstunad était jadis le centre d'un empire commercial nain qui prospéra même alors que la majeure partie d'Aul-Dwarov s'effondrait. Bien que l'occupation de la forteresse par les hobgobelins militaristes ait transformé Grônstunad en l'ombre de son ancienne gloire, le potentiel de retrouver sa grandeur passée subsiste encore dans ses halls."

verkal_dromak_mage_academy_title: "Académie des Mages de Verkal Dromak"
verkal_dromak_mage_academy: "Académie des Mages de Verkal Dromak"
great_project_verkal_dromak_mage_academy: "Académie des Mages de Verkal Dromak"
verkal_dromak_mage_academy_desc: "Verkal Dromak abrite bon nombre de praticiens des arts arcaniques, dont beaucoup sont versés dans la divination plutôt que dans la magie runique plus traditionnelle de la plupart des autres nains arcanistes. Ces mages restent généralement entre eux, mais quelques-uns mettent leurs talents au service de la forteresse pour sonder les rêves des ennemis et des dissidents."

vurdriz_andriz_bastion_title: "Bastion de Vûrdriz-Ândriz"
vurdriz_andriz_bastion: "Bastion de Vûrdriz-Ândriz"
great_project_vurdriz_andriz_bastion: "Bastion de Vûrdriz-Ândriz"

emerald_spire_title: "La Flèche d'Émeraude"
emerald_spire: "La Flèche d'Émeraude"
great_project_emerald_spire: "La Flèche d'Émeraude"
emerald_spire_desc: "La Flèche d'Émeraude est l'une des formations les plus magnifiques de l'Échine-du-Serpent. Une énorme grotte calcaire, s'étendant sur des lieues à travers le sol, centrée sur sa flèche éponyme. Un grand pilier d'émeraude, la flèche serait l'aorte du cœur de Halanna."

####################
#Not In Serpentspine
####################

marrhold_gate_to_the_serpentspine_title: "Marrhold, Porte de l'Échine-du-Serpent"
marrhold_gate_to_the_serpentspine: "Marrhold, Porte de l'Échine-du-Serpent"
great_project_marrhold_gate_to_the_serpentspine: "Marrhold, Porte de l'Échine-du-Serpent"
marrhold_gate_to_the_serpentspine_desc: "Marrhold est une ancienne forteresse naine, mais elle a depuis longtemps été abandonnée par les nains en raison d'un malheureux effondrement de tunnel. Désormais, des humains aléniques résident dans et autour de l'ancienne forteresse, reconstruite et occupée par eux depuis 492 ap. A."

ovdal_tungr_port_hold_title: "Forteresse-Port d'Ovdal Tûngr"
ovdal_tungr_port_hold: "Forteresse-Port d'Ovdal Tûngr"
great_project_ovdal_tungr_port_hold: "Forteresse-Port d'Ovdal Tûngr"
ovdal_tungr_port_hold_desc: "Les Nains de Cuivre d'Ovdal Tûngr se distinguent parmi tous les nains de Halann, pas seulement ceux de l'Échine-du-Serpent, par leur aptitude et leur habileté inhabituelles en mer. Alors que la plupart des nains éprouvent une grande aversion, voire une peur des vastes étendues d'eau, les Nains de Cuivre prouvent que cette peur n'est guère génétique chez la race naine, et comptent parmi les meilleurs marins de tout le Bulwar et de Cannor."

rubyhold_academy_title: "Institut d'Humanités de la Forteresse-de-Rubis"
rubyhold_academy: "Institut d'Humanités de la Forteresse-de-Rubis"
great_project_rubyhold_academy: "Institut d'Humanités de la Forteresse-de-Rubis"
rubyhold_academy_desc: "L'Institut d'Humanités de la Forteresse-de-Rubis est une institution dédiée à l'étude des humains et des sociétés humaines. Fondé lorsque les humains commencèrent à s'installer dans la région de la Tête-de-Dame, les érudits nains de l'Institut étudient minutieusement les humains depuis plus d'un millénaire. Des sujets tels que les méthodes de construction humaines, la conduite des guerres par les humains, l'organisation de leurs sociétés et la religion humaine sont autant de thèmes fascinants sur lesquels les nains intelligents et studieux de l'Institut ont soigneusement compilé des archives pendant des milliers d'années."

verkal_ozovar_phokhao_citadel_title: "Citadelle de Phokhao"
verkal_ozovar_phokhao_citadel: "Citadelle de Phokhao"
great_project_verkal_ozovar_phokhao_citadel: "Citadelle de Phokhao"
verkal_ozovar_phokhao_citadel_desc: "Les Nains Verdoyants de l'est résident dans leur citadelle de montagne depuis la chute de Grônstunad, gardant les richesses de leur montagne et dominant les terres de Hinphat."

silverforge_strongbellow_academy_title: "Académie de Métallurgie Grondfort"
silverforge_strongbellow_academy: "Académie de Métallurgie Grondfort"
great_project_silverforge_strongbellow_academy: "Académie de Métallurgie Grondfort"
silverforge_strongbellow_academy_desc: "Durant la 4e Guerre Lilas, les armées naines de Forgelune cherchaient de nouveaux moyens de combattre les puissantes armées dominées par la cavalerie alignées par Lorent et ses alliés, ayant subi de lourdes pertes face à elles sur le terrain. Cette tâche fut confiée à un nain nommé Grun Grondfort, qui, après des décennies d'exploration des armements nains anciens dans l'Échine-du-Serpent, développa de nouvelles batteries de fusils et d'artillerie pour les armées de Forgelune. Un centre d'enseignement supérieur au sein de la forteresse de Forgelune porte désormais son nom en son honneur."