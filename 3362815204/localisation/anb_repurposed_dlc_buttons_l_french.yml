 #kobold
 DLC_race_kobold_blue_TOOLTIP_INSTANT:0 "§YRace principale : Kobold§!"
 LANDING_race_kobold_blue_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_kobold_blue_FLAVOR_TEXT:0 "Les Kobolds sont une race §ySouterraine§! qui ressemble à de petits dragons humanoïdes sans ailes, et sont de ce fait présumés apparentés aux dragons, voire créés par eux. Bien que largement considérés comme faibles et lâches, les prouesses mécaniques des kobolds avec les pièges mortels sont bien connues. Cette ingéniosité explique pourquoi certains kobolds ont une affinité particulière pour l'§yArtisanat Magique§!."
 DLC_race_kobold_green_TOOLTIP_INSTANT:0 "§YRace principale : Kobold§!"
 LANDING_race_kobold_green_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_kobold_green_FLAVOR_TEXT:0 "Les Kobolds sont une race §ySouterraine§! qui ressemble à de petits dragons humanoïdes sans ailes, et sont de ce fait présumés apparentés aux dragons, voire créés par eux. Bien que largement considérés comme faibles et lâches, les prouesses mécaniques des kobolds avec les pièges mortels sont bien connues. Cette ingéniosité explique pourquoi certains kobolds ont une affinité particulière pour l'§yArtisanat Magique§!."
