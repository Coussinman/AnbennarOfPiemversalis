 LANDING_race_kobold_gold_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_kobold_gold_FLAVOR_TEXT:0 "Les Kobolds sont une race §ySouterraine§! qui ressemble à de petits dragons humanoïdes sans ailes, et sont de ce fait présumés apparentés aux dragons, voire créés par eux. Bien que largement considérés comme faibles et lâches, les prouesses mécaniques des kobolds avec les pièges mortels sont bien connues. Cette ingéniosité explique pourquoi certains kobolds ont une affinité particulière pour l'§yArtisanat Magique§!."

 #elven
 DLC_race_wood_elven_TOOLTIP_INSTANT:0 "§YRace principale : Elfe§!"
 LANDING_race_wood_elven_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_wood_elven_FLAVOR_TEXT:0 "Les Elfes Sylvestres sont les descendants d'une expédition elfique lunaire perdue dans les Bois-Profonds. Ayant passé plus de mille ans piégés dans le Royaume Féerique au-delà du Voile Verdoyant, ils sont devenus culturellement et biologiquement distincts du reste du peuple elfique.\n\nLes Elfes Sylvestres ont une §yLongue Vie§! et possèdent, comparé à leurs cousins elfiques, une espérance de vie plus courte d'environ §y250§! ans."
 DLC_race_desert_elf_TOOLTIP_INSTANT:0 "§YRace principale : Elfe§!"
 LANDING_race_desert_elf_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_desert_elf_FLAVOR_TEXT:0 "Les Elfes sont célèbres pour leur beauté et leur affinité avec la magie. Originaires d'Aelantir, leur civilisation s'effondra lors d'un événement connu sous le nom de Jour-des-Cieux-Cendrés, provoquant une diaspora de leur race. Les Elfes se sont depuis divisés en plusieurs groupes tels que les Elfes Lunaires, descendants des elfes qui suivirent Munas Chante-Lune jusqu'à Cannor, et les Elfes Solaires, qui suivirent Jaher jusqu'au Bulwar.\n\nLes Elfes ont une §yLongue Vie§! et une espérance de vie d'environ §y400§! ans."

 #halfling
 DLC_race_vyzemby_halfling_TOOLTIP_INSTANT:0 "§YRace principale : Halfelin§!"
 LANDING_race_vyzemby_halfling_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_vyzemby_halfling_FLAVOR_TEXT:0 "Les Halfelins sont une petite race originaire du Petit-Pays à Cannor et de Fahvanosy à Sarhal, connue pour son esprit, sa jovialité et son goût de l'aventure, en plus d'une expertise agricole et culinaire exemplaire. Dans les temps anciens, les halfelins sarhaliens se sont étendus sur le continent de Sarhal mais ont été repoussés vers les îles de Fahvanosy il y a plus de deux mille ans, en raison des migrations humaines."

 #lizardfolk
 DLC_race_lizardfolk_ashhana_TOOLTIP_INSTANT:0 "§YRace principale : Saurien§!"
 LANDING_race_lizardfolk_ashhana_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_lizardfolk_ashhana_FLAVOR_TEXT:0 "Les Sauriens sont une race fière et industrieuse des jungles de Sarhal. Ils sont quelque peu isolés du reste de Halann, se méfiant à la fois des autres races et les uns des autres. Leur apparence varie grandement, allant de svelte et agile à massif et crocodilien. Cependant, tous partagent des peaux écailleuses aussi résistantes qu'une armure, et des griffes qui servent d'armes naturelles."

