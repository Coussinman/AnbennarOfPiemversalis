 #orcs
 DLC_race_gray_orc_TOOLTIP_INSTANT:0 "§YRace principale : Orque§!"
 LANDING_race_gray_orc_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_gray_orc_FLAVOR_TEXT:0 "Les Orques sont une race forte et très résistante qui valorise hautement les prouesses martiales individuelles. Ils viennent de l'Échine-du-Serpent où ils ont détruit de nombreuses forteresses naines, et ont récemment envahi l'Escann dans ce qu'on appelle la Marée Verte. Leur respect indéfectible de la force les pousse à suivre des individus puissants, qu'ils soient orques ou non."
