l_french:

 #base races buttons
 DLC_race_centaur_TOOLTIP_INSTANT:0 "§YRace principale : Centaure§!"
 race_centaur_desc:0 "Ce pays est dirigé par une majorité de Centaures"
 LANDING_race_centaur_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_centaur_FLAVOR_TEXT:0 "Les Centaures sont un peuple guerrier et nomade. Ils habitent les Plaines-Interdites depuis leur exode d'Escann il y a plus de deux mille ans. De la taille jusqu'en haut, leur apparence est extrêmement similaire à celle d'un humain normal ; de la taille jusqu'en bas, ils possèdent le torse et les jambes d'un cheval."

 DLC_race_dwarven_TOOLTIP_INSTANT:0 "§YRace principale : Nain§!"
 race_dwarven_desc:0 "Ce pays est dirigé par une majorité de Nains"
 LANDING_race_dwarven_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_dwarven_FLAVOR_TEXT:0 "Les Nains sont une race §ySouterraine§! de petite taille mais robuste, connue pour leurs grandes barbes, leur entêtement et leur habileté dans le travail du métal et de la pierre. Bâtisseurs originels des forteresses souterraines de l'Échine-du-Serpent, de nombreux nains au fil des millénaires se sont établis à la surface. Cela est dû au déclin de leur ancien empire, Aul-Dwarov, et à la chute de nombreuses forteresses aux mains des orques, des gobelins et de l'orgueil nain.\n\nLes Nains ont une §yLongue Vie§! et une espérance de vie d'environ §y200§! ans."

 DLC_race_elven_TOOLTIP_INSTANT:0 "§YRace principale : Elfe§!"
 race_elven_desc:0 "Ce pays est dirigé par une majorité d'Elfes"
 LANDING_race_elven_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_elven_FLAVOR_TEXT:0 "Les Elfes sont célèbres pour leur beauté et leur affinité avec la magie. Originaires d'Aelantir, leur civilisation s'effondra lors d'un événement connu sous le nom de Jour-des-Cieux-Cendrés, provoquant une diaspora de leur race. Les Elfes se sont depuis divisés en plusieurs groupes tels que les Elfes Lunaires, descendants des elfes qui suivirent Munas Chante-Lune jusqu'à Cannor, et les Elfes Solaires, qui suivirent Jaher jusqu'au Bulwar.\n\nLes Elfes ont une §yLongue Vie§! et une espérance de vie d'environ §y400§! ans."

 DLC_race_gnollish_TOOLTIP_INSTANT:0 "§YRace principale : Gnoll§!"
 race_gnollish_desc:0 "Ce pays est dirigé par une majorité de Gnolls"
 LANDING_race_gnollish_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_gnollish_FLAVOR_TEXT:0 "Les Gnolls sont une race bestiale carnivore qui ressemble à des hyènes humanoïdes. Ils sont connus pour vénérer des démons et leurs sociétés tendent à être caractérisées par les luttes intestines et le fratricide. Originaires des déserts de Sarhal, ils ont récemment réenvahi l'est du Bulwar et imposé leur domination sur plusieurs pays humains."

 DLC_race_gnomish_TOOLTIP_INSTANT:0 "§YRace principale : Gnome§!"
 race_gnomish_desc:0 "Ce pays est dirigé par une majorité de Gnomes"
 LANDING_race_gnomish_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_gnomish_FLAVOR_TEXT:0 "Les Gnomes sont un peuple ingénieux connu pour leur subterfuge tactile et leur brillance intellectuelle. Leurs prouesses magiques égalent celles des elfes, pourtant de nombreux gnomes préfèrent contrôler la magie par la technologie. Malgré la chute de la Hiérarchie Gnome qui rivalisait en puissance avec les plus grands empires d'antan, et la perte de la plupart de leurs terres, les gnomes ont conservé leur avance technologique et leur maîtrise de l'§yArtisanat Magique§!.\n\nLes Gnomes ont une §yLongue Vie§! et une espérance de vie d'environ §y250§! ans."

 DLC_race_goblin_TOOLTIP_INSTANT:0 "§YRace principale : Gobelin§!"
 race_goblin_desc:0 "Ce pays est dirigé par une majorité de Gobelins"
 LANDING_race_goblin_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_goblin_FLAVOR_TEXT:0 "Les Gobelins sont une race §ySouterraine§! de petite taille mais nombreuse, originaire des cavernes de l'Échine-du-Serpent. Ils sont exceptionnellement rusés et utilisent leurs complots et stratagèmes contre leurs esclavagistes orques et contre les nains, leurs ennemis ancestraux. Leur ruse et leur ingéniosité confèrent aux gobelins une affinité avec l'§yArtisanat Magique§!."

 DLC_race_halfling_TOOLTIP_INSTANT:0 "§YRace principale : Halfelin§!"
 race_halfling_desc:0 "Ce pays est dirigé par une majorité de Halfelins"
 LANDING_race_halfling_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_halfling_FLAVOR_TEXT:0 "Les Halfelins sont une petite race originaire du Petit-Pays à Cannor et de Fahvanosy à Sarhal, connue pour son esprit, sa jovialité et son goût de l'aventure, en plus d'une expertise agricole et culinaire exemplaire. Unis sous la Hiérarchie Gnome il y a plus de mille ans, les halfelins cannoriens se sont depuis divisés, et, avec le temps, presque tous les halfelins ont perdu leur indépendance sous les mains oppressives de Lorent et Gawed."

 DLC_race_harimari_TOOLTIP_INSTANT:0 "§YRace principale : Harimari§!"
 race_harimari_desc:0 "Ce pays est dirigé par une majorité de Harimari"
 LANDING_race_harimari_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_harimari_FLAVOR_TEXT:0 "Les Harimari sont une race bipède à l'apparence de tigre, originaire du sud-ouest du Rahen, apparue dans des circonstances mystérieuses lors du cataclysmique Jour-des-Cieux-Cendrés. Bien qu'ils soient craints pour leur force incroyable, leur vitesse et leurs armes naturelles, ils sont également connus comme des penseurs et philosophes de haute culture."

 DLC_race_harpy_TOOLTIP_INSTANT:0 "§YRace principale : Harpie§!"
 race_harpy_desc:0 "Ce pays est dirigé par une majorité de Harpies"
 LANDING_race_harpy_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_harpy_FLAVOR_TEXT:0 "Les Harpies sont une race aviaire exclusivement féminine qui habite le Bulwar, Sarhal et Haless. Leur caractéristique physique la plus distinctive est leurs ailes, qui leur confèrent la capacité naturelle unique de voler. En raison de leur nature physique unique, les harpies ont besoin de partenaires d'autres espèces, le plus souvent des humains, pour se reproduire."

 DLC_race_hobgoblin_TOOLTIP_INSTANT:0 "§YRace principale : Hobgobelin§!"
 race_hobgoblin_desc:0 "Ce pays est dirigé par une majorité de Hobgobelins"
 LANDING_race_hobgoblin_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_hobgoblin_FLAVOR_TEXT:0 "Les Hobgobelins sont un peuple gobelinoïde profondément militariste, originaire des hautes terres du nord du Rahen. Plus grands et plus forts que les gobelins, ils privilégient l'ordre et la discipline par-dessus tout et ont une profonde méfiance envers la magie. La plupart des hobgobelins sont unis sous le Commandement, une puissante alliance de trois grandes armées qui a récemment envahi le Rahen."

 DLC_race_human_TOOLTIP_INSTANT:0 "§YRace principale : Humain§!"
 race_human_desc:0 "Ce pays est dirigé par une majorité d'Humains"
 LANDING_race_human_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_human_FLAVOR_TEXT:0 "Les Humains sont la race la plus répandue dans une grande partie de Halann, à l'exception d'Aelantir. Groupe inhabituellement divers, les humains sont connus pour leur ambition et leur volonté exceptionnelle d'aller plus loin que quiconque avant eux. Les humains ont formé certains des pays les plus puissants de l'histoire, tels que Castanor et l'Empire d'Anbennar à Cannor, la Khétérata et la Fangaula à Sarhal, et le Rahenraj et la République-des-Lacs à Haless."

 DLC_race_kobold_TOOLTIP_INSTANT:0 "§YRace principale : Kobold§!"
 race_kobold_desc:0 "Ce pays est dirigé par une majorité de Kobolds"
 LANDING_race_kobold_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_kobold_FLAVOR_TEXT:0 "Les Kobolds sont une race §ySouterraine§! qui ressemble à de petits dragons humanoïdes sans ailes, et sont de ce fait présumés apparentés aux dragons, voire créés par eux. Bien que largement considérés comme faibles et lâches, les prouesses mécaniques des kobolds avec les pièges mortels sont bien connues. Cette ingéniosité explique pourquoi certains kobolds ont une affinité particulière pour l'§yArtisanat Magique§!."

 DLC_race_lizardfolk_TOOLTIP_INSTANT:0 "§YRace principale : Saurien§!"
 race_lizardfolk_desc:0 "Ce pays est dirigé par une majorité de Sauriens"
 LANDING_race_lizardfolk_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_lizardfolk_FLAVOR_TEXT:0 "Les Sauriens sont une race fière et industrieuse des jungles de Sarhal. Ils sont quelque peu isolés du reste de Halann, se méfiant à la fois des autres races et les uns des autres. Leur apparence varie grandement, allant de svelte et agile à massif et crocodilien. Cependant, tous partagent des peaux écailleuses aussi résistantes qu'une armure, et des griffes qui servent d'armes naturelles."

 DLC_race_mechanim_TOOLTIP_INSTANT:0 "§YRace principale : Mécanim§!"
 race_mechanim_desc:0 "Ce pays est dirigé par une majorité de Mécanims"
 LANDING_race_mechanim_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_mechanim_FLAVOR_TEXT:0 ""

 DLC_race_ogre_TOOLTIP_INSTANT:0 "§YRace principale : Ogre§!"
 race_ogre_desc:0 "Ce pays est dirigé par une majorité d'Ogres"
 LANDING_race_ogre_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_ogre_FLAVOR_TEXT:0 "Les Ogres sont des humanoïdes de trois mètres de haut que l'on trouve principalement dans les contreforts de l'Échine-du-Serpent. On pourrait les confondre avec des humains s'il n'y avait leur taille et leur corpulence. Bien que leur force soit célèbre, les ogres sont surtout connus, et craints, pour leurs appétits voraces et leur propension à manger n'importe quoi et n'importe qui, y compris leurs semblables."

 DLC_race_orcish_TOOLTIP_INSTANT:0 "§YRace principale : Orque§!"
 race_orcish_desc:0 "Ce pays est dirigé par une majorité d'Orques"
 LANDING_race_orcish_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_orcish_FLAVOR_TEXT:0 "Les Orques sont une race forte et très résistante qui valorise hautement les prouesses martiales individuelles. Ils viennent de l'Échine-du-Serpent où ils ont détruit de nombreuses forteresses naines, et ont récemment envahi l'Escann dans ce qu'on appelle la Marée Verte. Leur respect indéfectible de la force les pousse à suivre des individus puissants, qu'ils soient orques ou non."

 DLC_race_ruinborn_TOOLTIP_INSTANT:0 "§YRace principale : Né-des-Ruines§!"
 race_ruinborn_desc:0 "Ce pays est dirigé par une majorité de Nés-des-Ruines"
 LANDING_race_ruinborn_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_ruinborn_FLAVOR_TEXT:0 "Les Nés-des-Ruines sont des elfes qui sont restés en Aelantir après le Jour-des-Cieux-Cendrés. Ce terme ne désigne pas une seule sous-race d'elfes mais est plutôt un terme général pour tous les elfes d'Aelantir. En raison de leur exposition à des siècles de corruption magique, les Nés-des-Ruines ont perdu leur longévité elfique et la plupart d'entre eux ont développé des mutations physiques."

 DLC_race_troll_TOOLTIP_INSTANT:0 "§YRace principale : Troll§!"
 race_troll_desc:0 "Ce pays est dirigé par une majorité de Trolls"
 LANDING_race_troll_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays. "
 LANDING_race_troll_FLAVOR_TEXT:0 "Les Trolls sont un type vorace de géantoïde connu pour ses capacités régénératrices, ses grands nez hideux et, pour les mâles, leurs grandes mâchoires munies de défenses. L'espèce est hautement adaptable à de nombreux environnements, et par conséquent, de nombreuses régions ont leur propre groupe ethnique de trolls, même si la plupart des trolls sont solitaires ou vivent en petits groupes. Leur moralité est complètement étrangère et les rend particulièrement imprévisibles."

 DLC_race_half_elf_TOOLTIP_INSTANT:0 "§YRace principale : Demi-Elfe§!"
 race_half_elf_desc:0 "Ce pays est dirigé par une majorité de Demi-Elfes"
 LANDING_race_half_elf_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays."
 LANDING_race_half_elf_FLAVOR_TEXT:0 "Les Demi-Elfes désignent à la fois les descendants directs d'elfes et d'humains à parts égales, et aussi les descendants de familles n'ayant qu'un peu de sang elfique. Bénis par la magie et une espérance de vie légèrement plus longue, ils sont connus pour leur adaptabilité et leur prestige parmi la noblesse cannorienne."

 DLC_race_half_orc_TOOLTIP_INSTANT:0 "§YRace principale : Demi-Orque§!"
 race_half_orc_desc:0 "Ce pays est dirigé par une majorité de Demi-Orques"
 LANDING_race_half_orc_TEXT:0 "La race principale détermine qui dirige l'§yAdministration§! du pays."
 LANDING_race_half_orc_FLAVOR_TEXT:0 "Les Demi-Orques sont le fruit d'une union entre un orque et un humain ou un elfe, et constituent la plus jeune race de toutes. Souvent considérés comme des parias, une certaine ténacité peut être admirée dans la capacité de cette race à endurer et à s'adapter au monde et à la façon dont il les traite."

