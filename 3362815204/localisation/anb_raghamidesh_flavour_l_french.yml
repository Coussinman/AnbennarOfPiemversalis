 rag_government_events.1.t:0 "Réunion de l'Assemblée élective"
 rag_government_events.1.desc:0 "Suite au décès de notre précédent souverain, l'assemblée élective s'est réunie pour choisir un nouveau dirigeant pour notre peuple. Les débats sur l'identité de celui qui sera couronné font rage pendant des heures, jusqu'à ce qu'il soit enfin décidé que..."
 rag_government_events.1.a:0 "Gardons notre souverain actuel !"
 rag_government_events.1.aa:0 "Notre héritier régnera !"
 rag_government_events.1.b:0 "La maison du Regard Vengeur régnera !"
 rag_government_events.1.c:0 "La maison du Pelage Azuré régnera !"
 rag_government_events.1.d:0 "La maison de la Grande Patte régnera !"
 rag_government_events.1.e:0 "La maison de la Tour Bondissante régnera !"
 rag_government_events.1.f:0 "La maison du Fouet d'Argent régnera !"