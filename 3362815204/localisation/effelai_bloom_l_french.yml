    #Effelai Bloom Government Mechanics Tooltips
    effelai_intervene_militarily_mechanic_1_tt:0 "§GNotre Déesse nous investit de sa puissance, nous accordant la force et le nombre pour repousser nos ennemis.§!\n\n§YPalier d'harmonisation§! §G1§!§G :§!"
    effelai_intervene_militarily_mechanic_2_tt:0 "§GNotre Déesse nous investit de sa puissance, nous accordant la force et le nombre pour repousser nos ennemis.§!\n\n§YPalier d'harmonisation§! §G2§!§G :§!"
    effelai_intervene_militarily_mechanic_3_tt:0 "§GNotre Déesse nous investit de sa puissance, nous accordant la force et le nombre pour repousser nos ennemis.§!\n\n§YPalier d'harmonisation§! §G3§!§G :§!"
    effelai_intervene_militarily_mechanic_4_tt:0 "§GNotre Déesse nous investit de sa puissance, nous accordant la force et le nombre pour repousser nos ennemis.§!\n\n§YPalier d'harmonisation§! §G4§!§G :§!"
    effelai_intervene_militarily_mechanic_5_tt:0 "§GNotre Déesse nous investit de sa puissance, nous accordant la force et le nombre pour repousser nos ennemis.§!\n\n§YPalier d'harmonisation§! §G5§!§G :§!"
    effelai_goddesses_chosen_warrior_general_tt:0 "§GUn puissant Serf-Grainier opi'a émerge du cœur de notre Déesse pour mener nos guerriers.§!"
    effelai_retribution_mechanic_1_tt:0 "§GNotre Déesse déchaîne ses forces sur nos ennemis, s'assurant que sa terre nous soit rendue, à nous ses fidèles serviteurs. Des paliers d'harmonisation plus élevés libéreront des rebelles plus puissants et nous accorderont encore plus de terres, étendant finalement notre domaine au-delà de la jungle.§!\n\n§YPalier d'harmonisation§! §G1§!§G :§! §GNotre Déesse libère une force modérée sur nos ennemis, tentant de nous rendre des terres, à nous ses fidèles serviteurs.§!"
    effelai_retribution_mechanic_2_tt:0 "§GNotre Déesse déchaîne ses forces sur nos ennemis, s'assurant que sa terre nous soit rendue, à nous ses fidèles serviteurs. Des paliers d'harmonisation plus élevés libéreront des rebelles plus puissants et nous accorderont encore plus de terres, étendant finalement notre domaine au-delà de la jungle.§!\n\n§YPalier d'harmonisation§! §G2§!§G :§! §GNotre Déesse libère une armée encore plus grande de ses forces sur nos ennemis, tentant de nous rendre des étendues modérées de terres, à nous ses fidèles serviteurs.§!"
    effelai_retribution_mechanic_3_tt:0 "§GNotre Déesse déchaîne ses forces sur nos ennemis, s'assurant que sa terre nous soit rendue, à nous ses fidèles serviteurs. Des paliers d'harmonisation plus élevés libéreront des rebelles plus puissants et nous accorderont encore plus de terres, étendant finalement notre domaine au-delà de la jungle.§!\n\n§YPalier d'harmonisation§! §G3§!§G :§! §GNotre Déesse libère une armée encore plus grande de ses forces sur nos ennemis, tentant de nous rendre de vastes étendues de terres, à nous ses fidèles serviteurs.§!"
    effelai_retribution_mechanic_4_tt:0 "§GNotre Déesse déchaîne ses forces sur nos ennemis, s'assurant que sa terre nous soit rendue, à nous ses fidèles serviteurs. Des paliers d'harmonisation plus élevés libéreront des rebelles plus puissants et nous accorderont encore plus de terres, étendant finalement notre domaine au-delà de la jungle.\n\n§YPalier d'harmonisation§! §G4§!§G :§! §!§GNotre Déesse libère une armée massive de ses forces sur nos ennemis, tentant de nous rendre de vastes étendues de terres, à nous ses fidèles serviteurs.§!"
    effelai_retribution_mechanic_5_tt:0 "§GNotre Déesse déchaîne ses forces sur nos ennemis, s'assurant que sa terre nous soit rendue, à nous ses fidèles serviteurs. Des paliers d'harmonisation plus élevés libéreront des rebelles plus puissants et nous accorderont encore plus de terres, étendant finalement notre domaine au-delà de la jungle.§!\n\n§YPalier d'harmonisation§! §G5§!§G :§! §GNotre Déesse cherche à étendre son influence au-delà de la jungle et a envoyé ses forces en avant pour conquérir nos faibles voisins. Nous devrions conquérir ces terres pour notre Déesse et étendre son royaume plus loin encore.§!"
    effelai_develop_hubs_mechanic_1_tt:0 "§GNotre Déesse renforce nos cités-nœuds harmonisées. À des paliers d'harmonisation plus élevés, cet effet renforcera également les provinces racines environnantes.§!\n\n§YPalier d'harmonisation§! §G1§!§G :§! §CUn§! §Gde nos nœuds recevra un don de développement considérablement accru§!"
    effelai_develop_hubs_mechanic_2_tt:0 "§GNotre Déesse renforce nos cités-nœuds harmonisées. À des paliers d'harmonisation plus élevés, cet effet renforcera également les provinces racines environnantes.§!\n\n§YPalier d'harmonisation§! §G2§!§G :§! §CUn§! §Gde nos nœuds recevra un don de développement considérablement accru, cet effet se propagera également aux colonies voisines.§!"
    effelai_develop_hubs_mechanic_3_tt:0 "§GNotre Déesse renforce nos cités-nœuds harmonisées. À des paliers d'harmonisation plus élevés, cet effet renforcera également les provinces racines environnantes.§!\n\n§YPalier d'harmonisation§! §G3§!§G :§! §CDeux§! §Gde nos nœuds recevront un don de développement considérablement accru, cet effet se propagera également aux colonies voisines.§!"
    effelai_develop_hubs_mechanic_4_tt:0 "§GNotre Déesse renforce nos cités-nœuds harmonisées. À des paliers d'harmonisation plus élevés, cet effet renforcera également les provinces racines environnantes.§!\n\n§YPalier d'harmonisation§! §G4§!§G :§! §CTrois§! §Gde nos nœuds recevront un don de développement considérablement accru, cet effet se propagera également aux colonies voisines.§!"
    effelai_develop_hubs_mechanic_5_tt:0 "§GNotre Déesse renforce nos cités-nœuds harmonisées. À des paliers d'harmonisation plus élevés, cet effet renforcera également les provinces racines environnantes.§!\n\n§YPalier d'harmonisation§! §G5§!§G :§! §CQuatre§! §Gde nos nœuds recevront un don de développement considérablement accru, cet effet se propagera également aux colonies voisines.§!"
    effelai_bloom_attunement_info_tt:0 "§GEn nous harmonisant avec notre Déesse, nous avons obtenu l'accès à plusieurs capacités puissantes. Pour les améliorer davantage, nous devons continuer à développer les connexions des nœuds qui nous permettent de nous harmoniser davantage avec notre Déesse.§!\n\n§YPropagation de l'harmonisation§!§G :§! §GNos terres s'harmoniseront passivement au fil du temps, et une fois que toutes nos terres seront harmonisées, nous remplirons progressivement la jungle de nouvelles colonies. Ce pouvoir s'améliorera si notre harmonisation atteint un niveau suffisamment élevé.§!\n§YPuissance de la Déesse, intervention militaire§!§G :§! §GNotre Déesse nous accorde une puissance magique incroyable, nous permettant de dévaster plus facilement nos ennemis. À des niveaux d'harmonisation plus élevés, nos troupes seront davantage renforcées, et des serviteurs compétents afflueront vers notre cause.§!\n§YPuissance de la Déesse, rétribution§!§G :§! §GDes essaims de Serfs-Grainiers tenteront de céder les terres de notre Déesse à nous, les arrachant à nos ennemis. Au plus haut niveau d'harmonisation, l'influence de notre Déesse s'étendra au-delà de la seule jungle.§!\n§YPuissance de la Déesse, développement des nœuds§!§G :§! §GUne croissance divine traversera nos terres, renforçant les nœuds et leurs racines connectées. À des niveaux d'harmonisation plus élevés, cette capacité accordera encore plus de développement et bénira davantage de nos nœuds.§!\n\n§YLa progression de l'harmonisation peut être suivie en consultant la description du modificateur d'harmonisation (mise à jour annuelle).§!"
    effelai_burn_path_tt:0 "§ONous tracerons un chemin de cendres à travers la jungle."
