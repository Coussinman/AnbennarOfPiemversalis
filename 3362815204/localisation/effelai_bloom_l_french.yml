    effelai_bloom.50.a:0 "Faites-moi sortir d'ici"
    effelai_bloom.201.t:0 "Attaque des Serviteurs du Chant !"
    effelai_bloom.201.d:0 "Dire que les Serviteurs du Chant pillent les villages serait peut-être un malentendu. Si vous en avez regardé un dans les yeux, vous jureriez que c'est la jungle elle-même qui pille, la créature pitoyable n'étant guère plus qu'un vase pour le courroux déchaîné de la justice cruelle de la nature.\n\nBien sûr, de tels détails importent peu aux habitants de [Root.GetName], où des villages entiers brûlent devant les hordes maraudeuses de ceux séduits par la terrible beauté étrangère des mélodies de la jungle."
    effelai_bloom.201.a:0 "Même la nature peut être domptée par la force"
    effelai_bloom.202.t:0 "Citoyens disparus"
    effelai_bloom.202.d:0 "Les chants proviennent de la jungle, leurs mélodies insistantes donnant l'impression qu'elles pourraient habiter votre âme même. En effet, dans le cas des soi-disant « Serviteurs du Chant », il semble que ce soit précisément ce qui se passe. Dans [effelai_target_prov.GetName], les chants sont devenus de plus en plus insidieux, et maintenant des citoyens disparaissent sans laisser de trace. Qu'ils soient de nouveaux Serviteurs du Chant ou de simples victimes des déments, cela n'a certainement pas été idéal pour le moral ou la productivité."
    effelai_bloom.202.a:0 "Nous devons tirer cela au clair"
    effelai_bloom.203.t:0 "Migration des arbres marcheurs"
    effelai_bloom.203.d:0 "Le spectacle d'une grande migration d'arbres marcheurs est impressionnant, la masse ligneuse des créatures-arbres faisant trembler la terre tandis que leurs mouvements étranges et anguleux les portent à travers le territoire. En effet, ce pourrait même être une merveille à admirer si les migrations n'étaient pas si incroyablement perturbatrices. Une malheureuse colonie de [Root.GetName] se trouvait sur le chemin d'une de ces migrations. Il n'y avait guère d'autre choix que de condamner le village à la destruction et d'évacuer ses habitants."
    effelai_bloom.203.a:0 "Au moins ce n'était pas malveillant"
    effelai_bloom.204.t:0 "Croissance sauvage"
    effelai_bloom.204.d:0 "Les poussées capricieuses de l'Effelai sont devenues célèbres avant tout pour leur dévastation. Néanmoins, la générosité de la nature s'épanouit même lorsque ses terreurs se déchaînent. Les récoltes de [effelai_target_prov.GetName] ont augmenté de façon disproportionnée, produisant d'énormes rendements de [effelai_target_prov.GetTradeGoodsName]."
    effelai_bloom.204.a:0 "Quelle agréable surprise !"
    effelai_bloom.205.t:0 "Grande récolte"
    effelai_bloom.205.d:0 "Bien que l'attention ait naturellement été concentrée sur la réponse aux dangers de l'Effelai, les fermiers ont continué à signaler que certaines zones ont connu des rendements exceptionnels ces dernières années. Il semble maintenant que les bénédictions capricieuses de l'Effelai aient été accordées à l'ensemble de [Root.GetName]. Les rapports de production de la campagne indiquent tous que ceci sera une récolte particulièrement abondante."
    effelai_bloom.205.a:0 "Nous avons mérité ce répit !"
    effelai_great_harvest:0 "Grande récolte"
    effelai_bloom.206.t:0 "Colonie apaisée par le chant"
    effelai_bloom.206.d:0 "Toute personne sensée en est venue à considérer les tonalités étranges et surnaturelles des chants de l'Effelai avec une grande suspicion. Écouter attentivement ces hymnes étranges, c'est sentir les tonalités envoûtantes presser contre votre âme même : nul esprit mortel ne peut rester insensible. Heureusement pour le gouvernement, cependant, ces chants peuvent parfois être utiles, comme à [effelai_target_prov.GetName], où la population semble être devenue remarquablement docile et obéissante."
    effelai_bloom.206.a:0 "C'est certainement mieux que des émeutes."
    effelai_calming_songs:0 "Chants apaisants"
    effelai_bloom.207.t:0 "Créatures de la jungle en périphérie"
    effelai_bloom.207.d:0 "Tout effort sérieux pour apprivoiser la jungle repose sur ceux qui sont assez courageux pour travailler à la frontière, contribuant par le travail de chaque jour à la marche inexorable de la civilisation. Malheureusement, les jungles ont commencé à se défendre dans [effelai_target_prov.GetName], alors que des créatures insectoïdes massives détruisent les structures, tuent le bétail, et dans au moins un cas, ont même massacré une famille entière dans leur maison.\n\nUne fois le conflit dissipé, tout ce qui reste est un chant morbide résonnant à travers la colonie."
    effelai_bloom.207.a:0 "Ils ne doivent pas perdre foi en nous !"
    effelai_bloom.208.t:0 "Le chant dévaste une colonie"
    effelai_bloom.208.d:0 "L'Effelai a toujours été un défi à coloniser. C'est une terre de mysticisme et de merveilles, bien que peu propice à tout apprivoisement, sa végétation hostile et son climat difficile la rendant peu attrayante pour la colonisation. Cependant, il n'y a pas d'adversaire tout à fait comme l'Effelai elle-même. Plantes carnivores, paysage mouvant et changeant, et surtout, les natifs. Leurs sacrifices de chants et de sang sont pour le moins déconcertants. Leurs chants étranges ont perturbé beaucoup de gens dans notre colonie, les rendant incapables de dormir, des terreurs nocturnes hantant chacun de leurs pas. Presque tous les aspects de notre colonie ont été perturbés, les mains des ouvriers tremblant et les administrateurs incapables de trouver le sommeil."
    effelai_bloom.208.a:0 "Maudite soit cette Déesse malveillante !"
    effelai_devastating_songs:0 "Chants dévastateurs"
    effelai_bloom.209.t:0 "Lianes étrangleuses"
    effelai_bloom.209.d:0 "Une traînée d'étranges lianes fines s'est développée à travers les rues de [Root.Capital.GetCapitalName] pendant la nuit. Ne portant aucune feuille, les lianes se sont développées avec acharnement vers le mur d'une maison et se sont glissées par une fenêtre ouverte. À l'intérieur, notre conseiller a été retrouvé sans vie, les lianes enroulées autour de sa gorge."
    effelai_bloom.209.a:0 "Terrifiant..."
    effelai_bloom.219.t:0 "La Floraison de l'Effelai révèle des ruines"
    effelai_bloom.219.d:0 "La Floraison de l'Effelai a été une période de chaos sans précédent, la nature elle-même combattant bec et ongles contre chacun de nos mouvements. Cependant, avec chaque malheur qui nous est jeté, nous avons trouvé un bienfait déconcertant pour tous nos ennuis. Il semble que lors d'un retournement exceptionnellement violent du terrain, les racines et la verdure de la jungle se soient effondrées pour révéler quelque chose de véritablement stupéfiant : les ruines d'une civilisation ancienne ! Nous avons déjà commencé les fouilles du site."
    effelai_bloom.219.a:0 "La fortune nous sourit"
    effelai_bloom.219.b:0 "Récupérons ce que nous pouvons pour nos recherches"
    effelai_unearthed_ruins:0 "Ruines mises au jour"
    effelai_bloom.220.t:0 "Témoin d'une grande bataille"
    effelai_bloom.220.d:0 "Une chose véritablement déconcertante, mais intéressante, vient de se produire. Aux abords de la jungle, là où la dense végétation rencontre les marais profonds des Fosses-aux-Sangsues, une bataille monumentale vient de se dérouler. D'après ce que nous pouvons déduire de nos témoins, les Serfs-Grainiers de l'Effelai et les Hommes-Sangsues se sont engagés dans un combat brutal. Les Serfs-Grainiers habituellement stoïques, voire dépourvus d'émotions, ont brisé leur façade, laissant échapper un chant de pure malveillance et de haine pour leur ennemi, inspirant la terreur même à nos observateurs militaires. Les Hommes-Sangsues, quant à eux, se sont battus avec une ruse et une ferveur presque surnaturelles, de lourdes pertes étant infligées des deux côtés. Cependant, malgré toute cette mort et cette destruction, nous avons pu glaner d'importantes connaissances militaires de cela, apprenant beaucoup des deux camps."
    effelai_bloom.220.a:0 "Un étalage sauvage de rivalité"
    effelai_bloom.221.t:0 "Attaque des plantes carnivores"
    effelai_bloom.221.d:0 "La fumée s'élève des rivages. Les rues gisent sombres et abandonnées, quelques cadavres défigurés reposant sur la pierre des routes.\n\nDes colonies le long de la côte ont été dévastées suite à une attaque coordonnée de plantes carnivores émergeant de l'Effelai. Étrangement, nous avons l'impression la plus étrange qu'elles étaient... dirigées. Comme si elles essayaient de nous chasser dans une rage animale. Quoi qu'il en soit, nous avons pu repousser les plantes, non sans pertes de notre côté."
    effelai_bloom.221.a:0 "Horrible !"
    effelai_attacked_by_plants:0 "Attaqués par les plantes"
    effelai_bloom.222.t:0 "Renouveau né des cendres"
    effelai_bloom.222.d:0 "La côte calcinée est une terre stérile. Ce n'est pas une idée controversée. Même les natifs le comprennent, et ils le comprenaient quand ils ont décidé de brûler presque toutes leurs sources de nourriture. Malgré tout cela, nous avons trouvé une source d'espoir étrange au milieu de cette dévastation : l'Effelai elle-même.\n\nEn raison de l'augmentation incroyable de l'activité de l'Effelai, des terres jadis stériles ont fait germer une vie nouvelle. Des terres asséchées renaissent avec l'eau, détournée par les racines profondes de l'Effelai, irriguées non par l'homme, mais par la plante. Des pousses tremblantes aux arbres imposants, la Côte Calcinée a vu son premier semblant d'espoir depuis aussi longtemps que beaucoup peuvent se souvenir."
    effelai_bloom.222.a:0 "Les vieilles blessures guérissent"
