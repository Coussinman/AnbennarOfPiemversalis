l_french:
    #Effelai Bloom Events
    effelai_bloom.1.t:0 "La Dormance de l'Effelai"
    effelai_bloom.1.d:0 "L'Effelai sommeille paisiblement en ce moment : mieux vaut ne point la déranger."
    effelai_bloom.1.a:0 "Entendu"
    effelai_bloom.2.t:0 "La Floraison de l'Effelai"
    effelai_bloom.2.d:0 "D'étranges rapports nous parviennent de nos terres dans l'Effelai : la jungle tout entière semble en proie à un profond bouleversement. Les habitants locaux signalent de nombreux phénomènes singuliers, depuis des chants envoûtants et des gaz mystérieux s'élevant de la jungle jusqu'à des bosquets entiers d'arbres se déplaçant d'eux-mêmes. Mais le plus étrange demeure la couleur. La jungle tout entière, y compris des plantes qui ne devraient point porter de fleurs, s'est mise à fleurir. Sous la canopée vert sombre de la forêt tropicale de l'Effelai, c'est une explosion de couleurs, les fleurs recouvrant presque chaque surface. Elles vont du rouge le plus éclatant au bleu le plus profond, de l'argent réfléchissant à l'or miroitant, ou même à une iridescence chatoyante de teintes semblables à la lumière brisée dans l'huile. Certains mages théorisent qu'un puissant sortilège ou une malédiction affecte la région, remontant peut-être au Jour-des-Cieux-Cendrés. Pendant ce temps, nombre des elfes Nés-des-Ruines natifs de l'Effelai sont convaincus que leur déesse s'est éveillée, courroucée par l'afflux d'étrangers qui ne respectent point la sainteté de sa jungle et ne l'apaisent point par des sacrifices et des chants. Quoi qu'il en soit, nous devons découvrir ce qui se passe et trouver comment y mettre un terme avant que la situation ne nous échappe."
    effelai_bloom.2.a:0 "Des temps bien sombres"
    effelai_bloom.2.b:0 "Notre Déesse chante"
    effelai_bloom.3.t:0 "La Floraison de l'Effelai : une décision capitale"
    effelai_bloom.3.d:0 "De nombreuses expéditions envoyées dans l'Effelai ne sont point revenues, et davantage encore ont subi de lourdes pertes. Cependant, les informations qu'elles ont pu rapporter sont d'une valeur inestimable. La masse pulsante sous les arbres a été découverte dans l'ensemble de notre territoire dans la jungle de l'Effelai, formant un vaste réseau. Vraisemblablement, il s'étend même bien au-delà de notre propre territoire. Qui plus est, elle est indéniablement et indubitablement vivante et consciente. Toutes nos expéditions rapportent la même chose : toute forme d'attaque menée contre elles, que ce soit par les Serfs-Grainiers, les étranges monstruosités qui peuplent la jungle, ou les arbres eux-mêmes, coïncidait avec de fortes pulsations du réseau sous leurs pieds. Beaucoup ont commencé à désigner la chose sous le nom d'Effelai, car ils croient qu'il n'y a nulle différence entre ce réseau pulsant, la jungle elle-même, et même nombre des créatures qui y vivent. L'Effelai, affirment-ils, est une créature unique, couvrant près de la moitié du continent du Sud d'Aelantir. Et elle nous veut morts.\n\nCes découvertes ont semé un grand trouble à la cour, et nos conseillers sont profondément divisés sur la marche à suivre. La plupart s'accordent à dire que nous sommes, que cela nous plaise ou non, en guerre contre cette créature. Et pour gagner cette guerre, nous devons purger la jungle par le fer et le feu, et détruire l'Effelai, jusqu'à la racine et la tige. Soit l'Effelai vit ici, soit nous. Un groupe plus restreint de conseillers, cependant, entrevoit une autre voie. Les natifs de l'Effelai ont pu vivre à ses côtés pendant des siècles dans une paix relative. De plus, nous possédons des capacités qu'ils n'avaient point. Si l'Effelai est effectivement assez intelligente pour mener une guerre, arguent-ils, elle doit être assez intelligente pour communiquer et raisonner. Si nous pouvons faire la paix avec l'Effelai et vivre à ses côtés, nous pouvons former une alliance d'un genre jamais vu auparavant. Nous pouvons clairement voir les dommages que l'Effelai peut nous infliger : imaginons ce qu'elle pourrait faire à nos ennemis."
    effelai_bloom.3.a:0 "Cherchons le contact et la paix."
    effelai_bloom.3.b:0 "L'Effelai brûlera !"
    effelai_bloom.3.c:0 "Nous ne pouvons chercher le contact que si notre capitale se trouve dans l'Effelai."
    effelai_bloom.3.e:0 "Si nous ignorons le problème, il devrait disparaître... n'est-ce pas ?"
    effelai_bloom.4.t:0 "La Floraison de l'Effelai : Interlude"
    effelai_bloom.4.d:0 "D'étranges rapports nous parviennent de nos terres dans l'Effelai : la jungle tout entière semble en proie à un profond bouleversement. Les habitants locaux signalent de nombreux phénomènes singuliers, depuis des chants envoûtants et des gaz mystérieux s'élevant de la jungle jusqu'à des bosquets entiers d'arbres se déplaçant d'eux-mêmes. Mais le plus étrange demeure la couleur. La jungle tout entière, y compris des plantes qui ne devraient point porter de fleurs, s'est mise à fleurir. Sous la canopée vert sombre de la forêt tropicale de l'Effelai, c'est une explosion de couleurs, les fleurs recouvrant presque chaque surface. Elles vont du rouge le plus éclatant au bleu le plus profond, de l'argent réfléchissant à l'or miroitant, ou même à une iridescence chatoyante de teintes semblables à la lumière brisée dans l'huile. Certains mages théorisent qu'un puissant sortilège ou une malédiction affecte la région, remontant peut-être au Jour-des-Cieux-Cendrés. Pendant ce temps, nombre des elfes Nés-des-Ruines natifs de l'Effelai sont convaincus que leur déesse s'est éveillée, courroucée par l'afflux d'étrangers qui ne respectent point la sainteté de sa jungle et ne l'apaisent point par des sacrifices et des chants. Quoi qu'il en soit, nous devons découvrir ce qui se passe et trouver comment y mettre un terme avant que la situation ne nous échappe."
    effelai_bloom.4.a:0 "S'harmoniser avec notre Déesse"
    effelai_bloom.4.b:0 "La réduire en cendres"
    effelai_bloom.5.t:0 "Le suzerain choisit la voie"
    effelai_bloom.5.d:0 "D'étranges rapports nous parviennent du Sud d'Aelantir : l'immense jungle de l'Effelai semble en proie à un profond bouleversement. Les habitants locaux signalent de nombreux phénomènes singuliers, depuis des chants envoûtants et des gaz mystérieux s'élevant de la jungle jusqu'à des bosquets entiers d'arbres se déplaçant d'eux-mêmes. Mais le plus étrange demeure la couleur. La jungle tout entière, y compris des plantes qui ne devraient point porter de fleurs, s'est mise à fleurir. Sous la canopée vert sombre de la forêt tropicale de l'Effelai, c'est une explosion de couleurs, les fleurs recouvrant presque chaque surface. Elles vont du rouge le plus éclatant au bleu le plus profond, de l'argent réfléchissant à l'or miroitant, ou même à une iridescence chatoyante de teintes semblables à la lumière brisée dans l'huile. Certains mages théorisent qu'un puissant sortilège ou une malédiction affecte la région, remontant peut-être au Jour-des-Cieux-Cendrés. Pendant ce temps, nombre des elfes Nés-des-Ruines natifs de l'Effelai sont convaincus que leur déesse s'est éveillée, courroucée par l'afflux d'étrangers qui ne respectent point la sainteté de sa jungle et ne l'apaisent point par des sacrifices et des chants. Quoi qu'il en soit, les gouvernements coloniaux de la région doivent être équipés et instruits au mieux de nos capacités pour assurer la préservation de nos intérêts."
    effelai_bloom.5.a:0 "Qu'ils s'harmonisent"
    effelai_bloom.5.b:0 "Qu'ils brûlent tout"
    effelai_bloom.90.t:0 "L'Effelai se flétrit"
    effelai_bloom.90.d:0 "Il semblerait qu'ignorer un problème finisse par le résoudre."
    effelai_bloom.90.a:0 "Un calme mortel"
    effelai_bloom.91.t:0 "La jungle se tait"
    effelai_bloom.91.d:0 "Des années de cacophonie assourdissante ont laissé des traces profondes sur nos soldats. Des familles à travers tout notre pays pleurent la perte de leurs proches, furieuses qu'on les ait envoyés combattre une jungle. Mais il semble enfin que le coût ait dépassé le bénéfice potentiel aux yeux des dirigeants de tout le continent. Alors que nos troupes ont commencé à se retirer, l'agressivité de la jungle s'est apaisée, et nos petites colonies en périphérie subissent des attaques moins fréquentes. Bien que le cycle de raids et de réparations ne prenne peut-être jamais véritablement fin pour nos nouveaux avant-postes, le tumulte extrême de cette guerre contre la terre s'est calmé, et les gens recommencent à parler d'un avenir possible pour eux-mêmes et leurs familles."
    effelai_bloom.91.a:0 "De la poussière nous venons, à la poussière..."
    effelai_bloom.301.t:0 "La Floraison de l'Effelai : chants et pulsations"
    effelai_bloom.301.d:0 "Les chants rituels que les Nés-des-Ruines natifs de l'Effelai entonnent pour calmer la jungle ont généralement été considérés comme de simples superstitions. Cependant, les récentes découvertes sur la nature de l'Effelai ont amené certains à remettre cette croyance en question. De nombreux bardes aventuriers se sont aventurés pour chanter près des parties exposées du réseau de l'Effelai, avec des résultats prometteurs. Bien qu'il n'y ait certainement rien qui ressemble de près ou de loin à une communication, le réseau réagit indéniablement aux chants, pulsant doucement en harmonie avec la résonance de la musique. Les aventuriers demandent maintenant un effort organisé pour rechercher les nombreuses tribus disparates de l'Effelai et compiler leurs connaissances combinées des chants rituels pour de plus amples expérimentations."
    effelai_bloom.301.a:0 "Nous n'avons nul besoin de nous mêler des affaires des natifs."
    effelai_bloom.301.b:0 "Pétition acceptée."
    effelai_bloom.305.t:0 "Investir dans la recherche magique ?"
    effelai_bloom.305.d:0 "Alors que nos tentatives d'étude de l'Effelai se poursuivent, il est devenu évident que les applications de la magie peuvent grandement faciliter le processus d'apprentissage. Des mages locaux ont présenté un plan pour améliorer notre processus d'étude, mais ils ont besoin de financements pour mettre leurs plans en œuvre."
    effelai_bloom.305.a:0 "Bien entendu !"
    effelai_bloom.305.b:0 "Ce ne sera point nécessaire."
    effelai_bloom.306.t:0 "Investir dans la recherche sur l'artisanat magique ?"
    effelai_bloom.306.d:0 "Alors que nos tentatives d'étude de l'Effelai se poursuivent, il est devenu évident que les applications de la magie peuvent grandement faciliter le processus d'apprentissage. Des mages locaux ont présenté un plan pour améliorer notre processus d'étude, mais ils ont besoin de financements pour mettre leurs plans en œuvre."
    effelai_bloom.306.a:0 "Bien entendu !"
    effelai_bloom.306.b:0 "Ce ne sera point nécessaire."
    effelai_bloom.307.t:0 "Laisser le dirigeant mage mener des expériences ?"
    effelai_bloom.307.d:0 "Alors que nos tentatives d'étude de l'Effelai se poursuivent, il est devenu évident que les applications de la magie peuvent grandement faciliter le processus d'apprentissage. Notre dirigeant, étant lui-même mage, a présenté un plan pour améliorer notre processus d'étude, mais il a besoin de financements pour mettre ses plans en œuvre."
    effelai_bloom.307.a:0 "Une excellente idée, si je puis me permettre."
    effelai_bloom.307.b:0 "Il vaudrait peut-être mieux que je m'abstienne..."
    effelai_bloom.308.t:0 "La Floraison de l'Effelai : savoir ancestral"
    effelai_bloom.308.d:0 "La Floraison de l'Effelai a été un grand choc pour les tribus natives des Nés-des-Ruines. Pour eux, c'est le courroux de leur déesse, connue par la plupart sous le nom de Tswohvwoh'íi, la personnification de la jungle. Comme les tribus, à de très rares exceptions près, vivaient très étroitement liées à la jungle, la Floraison de l'Effelai les a particulièrement touchées, décimant nombre de leurs communautés. Leurs chants rituels sont presque entièrement tombés en désuétude depuis le début de la Floraison, car Tswohvwoh'íi ne saurait plus être apaisée par eux. Ils nous regardent avec méfiance, car ils nous considèrent, nous étrangers, comme faisant partie des raisons de tout cela. Et chaque fois qu'une tribu est approchée par nos aventuriers et nos légats, elle se montre craintive et méfiante. Mais chaque fois, lorsqu'on leur demande de l'aide pour calmer l'Effelai, ils cèdent et acceptent. Nous avons maintenant rassemblé un grand nombre de ces chanteurs de la jungle, et leurs chants sont mis par écrit pour que tous puissent les apprendre."
    effelai_bloom.308.a:0 "Excellent."
    effelai_bloom.309.t:0 "Réapprocher les natifs"
    effelai_bloom.309.d:0 "« Regardez qui revient en rampant... » Cela va assurément nous coûter cher."
    effelai_bloom.309.a:0 "Pourriez-vous nous aider ?"
    effelai_bloom.310.t:0 "La Floraison de l'Effelai : les mages tentent le contact"
    effelai_bloom.310.d:0 "Un grand nombre de mages étaient très impatients de tenter d'établir une communication avec l'Effelai et se sont rapidement mis à l'œuvre. Dans de nombreuses tentatives disparates, certaines menées par des mages seuls, d'autres par de grands groupes, les mages ont tenté de multiples façons d'interagir avec le réseau de l'Effelai. Jusqu'à présent, cependant, leurs tentatives n'ont donné aucun résultat tangible. Loin d'être découragés, cela a au contraire renforcé leur détermination, car « résoudre le problème de l'Effelai » devient un projet de prestige que chaque mage souhaite être le premier à élucider."
    effelai_bloom.310.a:0 "Nous continuons d'essayer."
    effelai_bloom.311.t:0 "La Floraison de l'Effelai : une base d'opérations"
    effelai_bloom.311.d:0 "Maintenant que nous avons un moyen potentiel d'interagir avec le réseau de l'Effelai, nous avons besoin d'un lieu sécurisé pour mener nos recherches sur le terrain. Les tentatives précédentes ont souvent été menacées par des incursions de l'Effelai, et si notre opération devait être attaquée après que nous ayons centralisé nos efforts, cela pourrait compromettre tous nos progrès. C'est pourquoi nous établissons une petite base d'opérations, gardée et fortifiée au mieux de nos capacités contre le pire que l'Effelai puisse nous envoyer. L'acte même de le faire, cependant, provoque encore plus d'agressivité de la part de l'Effelai, transformant cela en un effort qui doit être continuellement adapté, réparé et amélioré, afin de maintenir des conditions aussi stables que possible pour la recherche."
    effelai_bloom.311.a:0 "Bien."
    effelai_bloom.311.b:0 "Les artificiers devraient aussi aider."
    effelai_bloom.312.t:0 "Les mages étudient l'Effelai"
    effelai_bloom.312.d:0 "Il est évident qu'une énorme quantité de magie est impliquée dans la Floraison de l'Effelai, mais elle est canalisée sous une forme que nous n'avons jamais vue auparavant. Un groupe de mages est désireux d'aider dans nos efforts pour la comprendre, mais ils croient que la clé de leur travail se trouve au-delà de nos frontières. Le grand réseau sous la jungle semble être le conduit de propagation de cette magie, et ces mages veulent étudier un endroit où les racines de ce réseau convergent. Ils ont entendu parler de l'emplacement d'un de ces soi-disant « nœuds », et nous demandent maintenant de revendiquer cette région pour nous afin de pouvoir mener nos recherches."
    effelai_bloom.312.a:0 "Les secrets de la jungle seront bientôt nôtres."
    effelai_bloom.313.t:0 "Les mages irritent l'Effelai"
    effelai_bloom.313.d:0 "Bien que la magie soit enseignée, elle a toujours été davantage un art qu'une science, et face à l'inconnu, les mages jettent souvent la prudence aux orties. Dans leurs tentatives d'étudier les racines de l'Effelai, nos mages les ont infusées de sortilèges, émerveillés par le volume considérable de magie qu'elles sont capables de contenir. Il semble que cette magie se soit maintenant libérée, car plusieurs régions autour des racines ont été dévastées par ce qui semble avoir été une massive vague de magie déchaînée, un violent contrecoup de leurs expériences imprudentes."
    effelai_bloom.313.a:0 "Ils auraient dû être plus prudents..."
    effelai_bloom.314.t:0 "Attaque des Serfs-Grainiers"
    effelai_bloom.314.d:0 "Alors que nos mages intensifient leurs recherches sur le réseau neural de l'Effelai, ils remarquent qu'il commence à pulser selon un schéma rythmique, émettant un son mélodieux qui semble presque imiter un chant humain. Ils commencent avidement à noter leurs observations, inconscients du danger qui les guettait. Et soudain, ils furent encerclés. Les Serfs-Grainiers, émergeant des profondeurs de la jungle, attaquent toute âme vivante en vue, répondant à l'appel du réseau et venant à sa défense."
    effelai_bloom.314.a:0 "Sans esprit, mais si coordonnés..."
    effelai_bloom.315.t:0 "Attaque de la faune de l'Effelai"
    effelai_bloom.315.d:0 "Après que le réseau neural ait semblé se calmer pendant un moment, nos éclaireurs signalent soudain d'étranges mouvements d'animaux sauvages à la lisière de la jungle. Et puis, avant que nous ayons une chance de nous préparer, ils attaquent. Se déplaçant comme une armée disciplinée, ils fondent sur le site de recherche, les gardes se précipitant pour former un semblant de défense contre ce déluge de griffes, de lames et de crocs."
    effelai_bloom.315.a:0 "Tuez-les tous !"
    effelai_beast_rebels_name:0 "Bêtes de l'Effelai"
    effelai_beast_rebels_title:0 "Bêtes de l'Effelai"
    effelai_beast_rebels_desc:0 ""
    effelai_beast_rebels_army:0 "Hordes bestiales"
    effelai_beast_demands:0 "Dévaster $COUNTRYNAME$"
    effelai_beast_demands_desc:0 "Ces bêtes cherchent à dévaster nos colonies et à nous chasser de ces terres."
    effelai_bloom.316.t:0 "Catastrophe dans la recherche magique"
    effelai_bloom.316.d:0 "Alors que les mages insèrent un nouvel appareil dans le réseau neural de l'Effelai, celui-ci laisse soudain échapper un hurlement terrifiant, accompagné d'une vague d'énergie magique brute libérée dans la tente de recherche. Lorsque le hurlement s'éteint enfin, chercheurs et gardes inquiets se précipitent à l'intérieur et sont confrontés à un terrible spectacle : de nombreux chercheurs gisent immobiles au sol, et le plancher est jonché de verre provenant d'une myriade d'équipements brisés. Certains des experts les plus compétents sur l'Effelai sont perdus, et nous avons peut-être perdu des semaines de progrès."
    effelai_bloom.316.a:0 "Concentrons-nous sur le remplacement de l'équipement."
    effelai_bloom.316.b:0 "Concentrons-nous sur le recrutement de nouveaux chercheurs."
    effelai_bloom.317.t:0 "Esclaves du Chant"
    effelai_bloom.317.d:0 "Cela a commencé par un comportement étrange. Des chercheurs fixant le vide, ne répondant pas toujours aux personnes autour d'eux, et se balançant au rythme de ce qui semblait être une musique qu'eux seuls pouvaient entendre. Pourtant, ils continuaient à venir travailler, à parler avec leurs amis et à faire avancer leurs recherches. Jusqu'au jour où ils se mirent à chanter. Les soldats les attaquèrent immédiatement, terrifiés à l'idée que le chant se propage, mais les mages envoûtés les éliminèrent avec facilité. Une nouvelle infestation de Serviteurs du Chant a été créée, au beau milieu de notre site de recherche."
    effelai_bloom.317.a:0 "Aveuglés par leur propre arrogance"
    effelai_bloom.318.t:0 "Une percée"
    effelai_bloom.318.d:0 "Quand le réseau neural a recommencé à vibrer selon un schéma, nos chercheurs ont craint le pire. Mais lorsqu'aucune attaque ni accès de folie ne s'est produit, un chercheur a compris. Ce schéma n'était pas hostile, et n'avait jamais été observé nulle part ailleurs dans le réseau. C'était un *message*. Et après plusieurs semaines de comparaison avec les vibrations antérieures et leurs effets, il nous a finalement livré ce qu'il croit être... une invitation ? Tous nos chercheurs ne sont pas convaincus de la véracité de son travail, mais il y a enfin un air d'optimisme parmi les chercheurs."
    effelai_bloom.318.a:0 "Enfin !"
    effelai_bloom.320.t:0 "Harmonisation"
    effelai_bloom.320.d:0 "Le Chant. Bien sûr que la clé était le Chant. Comment aurait-il pu en être autrement ? Ici, à la convergence du réseau neural, nous chantons nos questions, et l'Effelai répond. Le langage est complexe, et même avec l'aide de notre équipement de résonance, chaque chant et vibration nécessite des jours, voire des semaines de traduction, mais la quantité d'informations que nous apprenons est stupéfiante. Nous parlons à une créature de la taille de près de la moitié du continent, et elle est disposée à nous répondre."
    effelai_bloom.320.a:0 "L'Effelai à nos côtés, et le monde à nos pieds."
    effelai_bloom.321.t:0 "Vous ne devriez pas voir ceci"
    effelai_bloom.360.t:0 "Notre harmonisation grandit"
    effelai_bloom.360.d:0 "La Déesse chante. Et chaque jour, Elle chante un peu plus fort qu'avant.\n\nNous pouvons le voir dans la façon dont la forêt se meut. Nous pouvons le sentir résonner dans nos poitrines. Nous pouvons le goûter dans l'air et le humer dans le vent.\n\nNous devons continuer à nous harmoniser et à développer les nœuds où Elle se connecte avec nous, pour amplifier davantage Son chant et enrichir Ses dons."
    effelai_bloom.360.a:0 "Un pouvoir sans limites"
    effelai_bloom.370.t:0 "Notre Déesse s'éveille"
    effelai_bloom.370.d:0 "Ces terres étaient jadis emplies de chaos, des horreurs désespérées rôdant sous chaque broussaille. Bien que nous nous soyons enfin établis, ce calme inquiétant n'apporte nul réconfort. Pourquoi avons-nous été appelés en ce lieu ? Des ruines désolées couvertes de lianes, dépourvues de toute vie et apparemment paisibles, mais leur seule vue nous emplit d'un sentiment de terreur accablant. Nos plus fins artisans ont travaillé sans relâche pour réparer la structure délabrée, et la première étape de leur effort touche à sa fin.\n\n"
    effelai_bloom.370.a:0 "Que nous réserve l'avenir ?"
    effelai_bloom.371.t:0 "Approchés par la providence"
    effelai_bloom.371.d:0 "Notre sanctuaire se rapproche chaque jour de son achèvement. L'illusion de paix au sein de la jungle a été brisée : un spectre de couleurs entièrement nouveau recouvre maintenant le temple, l'air vibrant doucement de son chant angoissé. Même notre dirigeant [Root.GetName] a commencé à ressentir les effets d'une exposition si fréquente à l'influence de notre Déesse. C'est alors qu'« ils » nous ont approchés.\n\nDes silhouettes contorsionnées, ressemblant davantage à des arbres torturés qu'à nos propres frères : ces « messagers » parlaient pour notre Déesse. On sait peu de choses sur ce qui s'est dit entre [Root.Monarch.GetName] et ses serviteurs, mais [Root.Monarch.GetSheHe] est revenu avec une ferveur renouvelée. Il est devenu parfaitement clair que le temple doit être achevé, et bientôt. Mais avec le lourd tribut continu sur notre psyché... que deviendrons-nous une fois qu'il sera achevé ?"
    effelai_bloom.371.a:0 "Nous devons achever ce monument à notre Déesse"
    effelai_bloom.372.t:0 "Le destin embrassé"
    effelai_bloom.372.d:0 "Depuis cette visite fatidique, [Root.Monarch.GetName] passe de plus en plus de temps au cœur du sanctuaire... des semaines sans manger ni dormir. Beaucoup ont cherché à communiquer avec lui, mais il est enfermé dans un état onirique.\n\nLes saisons ont passé, mais la jungle s'est transformée en un éventail frénétique de vie. Des plantes indéchiffrables, même pour nos yeux aguerris, recouvrent la surface du temple. Jadis un doux murmure, le chant de notre Déesse cherche maintenant à déchirer l'air lui-même par sa mélodie vertigineuse. C'est au moment où la tonalité atteint un cri strident, nous faisant tomber à genoux, que [Root.Monarch.GetName] émerge du cœur, une aura aveuglante illuminant sa forme. Le chant s'enfle en un bref chœur, avant de se taire alors que les premiers mots sont prononcés.\n\n« Elle m'a montré ce qui a été et ce qui sera. Cette terre était jadis vibrante et paisible. La sécurité abondait, la peur n'était qu'un seul pétale dans la vaste étendue de la jungle. Cela n'a pas duré. Cela ne pouvait pas durer. Une tempête de feu a réduit ces terres en cendres, mais elle nous a protégés et a restauré notre foyer. C'est maintenant notre destin d'être réunis à nouveau en son sein, car une nouvelle menace approche. Des étrangers cherchant à profaner nos foyers et à revendiquer les cendres. Nous devons accepter la bénédiction ultime de notre Déesse et fusionner notre destin avec le sien. »"
    effelai_bloom.372.a:0 "Construire le cœur"
    effelai_bloom.372.b:0 "Nous ne pouvons pas nier le destin"
    effelai_bloom.373.t:0 "Olaka'utká"
    effelai_bloom.373.d:0 "Là où il n'y avait jadis que des tribus disparates et effrayées, luttant pour survivre aux horreurs de ces terres, existe maintenant une forme plus grande qu'auparavant. Unis non seulement par des frontières, mais par leur connexion avec notre Déesse. Nos esprits sont devenus une mer de pensées et d'émotions en cascade : les dons magiques sont devenus monnaie courante, ceux particulièrement doués atteignant des sommets encore plus élevés qu'auparavant.\n\nCe qui était ne sera plus jamais. Avec de nouvelles menaces se profilant à l'horizon, c'est maintenant à notre tour de servir de protecteurs, investis par l'amour de notre Déesse et notre unité nouvellement acquise.\n\nMême lorsque la mort nous trouvera, nos esprits continueront de vivre dans son étreinte : leurs pensées libres de communiquer et de guider, longtemps après que leurs formes mortelles se seront éteintes et seront retournées à la terre.\n\nNous n'avons atteint que le commencement, et pourtant nous pouvons trouver réconfort dans le fait que ceci est notre fin destinée."
    effelai_bloom.373.a:0 "À jamais liés par le destin"
    effelai_bloom.374.t:0 "Rejet du don"
    effelai_bloom.374.d:0 ""
    effelai_bloom.374.a:0 "Seuls dans les ténèbres profondes"
    effelai_bloom.398.t:0 "Le cœur de notre Déesse"
    effelai_bloom.398.d:0 "Nous devons rechercher le Cœur de l'Effelai et le réparer. C'est notre seul moyen de chercher une connexion plus profonde avec elle et d'assurer notre avenir davantage encore.\n\nNous enverrons également une expédition indépendante qui, si tous nos autres efforts échouent, devrait produire quelques résultats."
    effelai_bloom.398.a:0 "Notre destin nous attend"
    effelai_bloom.399.a:0 "Une offrande divine"
    effelai_bloom.420.t:0 "Nœud perdu"
    effelai_bloom.420.d:0 "Nos éclaireurs dévoués apportent le rapport décourageant que notre labeur et notre ambition acharnés ont été vains. Une puissance rivale redoutable revendique maintenant la domination sur la terre même que nous cherchions à conquérir et cultiver. Nous avons passé plusieurs mois à tenter de brûler ce noyau de l'infâme conscience qui s'oppose à nous, seulement pour voir nos gains nous échapper. Malgré nos efforts pour entamer des négociations, il est devenu évident qu'ils sont là pour établir leur présence, ne nous laissant d'autre choix que de repenser notre approche pour sécuriser ce territoire vital."
    effelai_bloom.420.a:0 "Nous n'oublierons jamais cette injustice"
    effelai_bloom.421.t:0 "Vous avez perdu le contrôle face aux rebelles"
    effelai_bloom.421.d:0 "Nous avons perdu. Nos hommes ont été dispersés, nos maigres ressources ont été détruites, et toute cette affaire a jeté une ombre de désespoir sur nos troupes. Depuis le début de notre campagne méthodique pour purger l'Effelai par les flammes, nous avons été confrontés à une force implacable et écrasante qui semble avoir surgi des racines et des vrilles mêmes de la nature.\n\nChaque jour qui passe, le nombre de Serfs-Grainiers semble se multiplier, rendant nos efforts jadis prometteurs futiles. Nos soldats, en infériorité numérique et harassés, ont été témoins de l'assaut incessant de ces êtres. Les pertes que nous avons subies pèsent lourdement sur nos cœurs, et nous nous trouvons à un carrefour, contraints de reconsidérer notre approche méthodique et de concevoir une nouvelle stratégie pour naviguer dans cette bataille funeste. Déjà, nos plus brillants esprits s'efforcent d'adopter des avancées plus défensives et prudentes à l'avenir, menant les vastes troupes dans des zones de mise à mort qui peuvent être exploitées à répétition, mais il faudra du temps pour récupérer les pertes en hommes, en matériel et en moral."
    effelai_bloom.421.a:0 "Vraiment, construisez des forts."
    effelai_bloom.431.t:0 "La Floraison de l'Effelai : nœud calciné"
    effelai_bloom.431.d:0 "Alors que nous brûlons lentement notre chemin à travers le réseau, il semble que nous venions de tomber sur une excroissance particulièrement importante de celui-ci dans [effelai_burning_hub.GetName]. Tandis qu'elle brûle, les arbres hurlent, et la floraison s'intensifie un bref instant... Quelque chose émerge de la jungle.\n\n§RAssurez-vous de ne pas perdre le contrôle du nœud !§!"
    effelai_bloom.431.a:0 "Préparez vos armes !"
    effelai_bloom.432.t:0 "La Floraison de l'Effelai : perfectionner la méthode"
    effelai_bloom.432.d:0 "Le réseau de l'Effelai ne brûle pas facilement. Le matériau est similaire à des lianes, mais beaucoup plus épais, et tout comme la jungle, il est humide et résistant. Des préparations spéciales doivent être effectuées pour réellement maintenir la combustion de cette matière. De plus, les réactions violentes de la jungle lorsque le réseau est endommagé rendent ces entreprises extrêmement dangereuses. C'est pourquoi les ingénieurs nous conseillent de déclencher plutôt des charges explosives préparées avec des canons, afin d'éviter autant que possible de perdre des troupes.\n\n§RTous les rebelles doivent être vaincus pour continuer.§!"
    effelai_bloom.432.a:0 "Que tout brûle !"
    effelai_bloom.433.t:0 "Voyez-vous ceci ?"
    effelai_bloom.433.d:0 "Car vous ne devriez pas"
    effelai_bloom.433.a:0 "Assurément non"
    effelai_bloom.434.t:0 "Nœud calciné"
    effelai_bloom.434.d:0 "Félicitations, cette zone a été réduite en cendres et l'influence de l'Effelai n'est plus présente ici."
    effelai_bloom.434.a:0 "Passons à la zone suivante !"
    effelai_bloom.435.t:0 "Événement triche IA pour brûler"
    effelai_bloom.435.d:0 "Si vous voyez ceci et que vous n'êtes pas une IA, c'est un bogue"
    effelai_bloom.435.a:0 "Veuillez signaler le bogue"
    effelai_bloom.450.t:0 "La Floraison de l'Effelai : une jungle silencieuse"
    effelai_bloom.450.d:0 "La nuit dans l'Effelai est rarement calme, mais ce soir les sons de la jungle étaient assourdis et tranquilles. Nul oiseau ne chante, nul monstre ne rugit, nulle créature ne parle à voix basse juste hors de notre portée. La terre est morte, ou mourante. Nous savons pourquoi il en est ainsi, nous savons que c'est notre œuvre, et nous connaissons le prix que nous avons payé pour y parvenir.\n\nMort, massacre, sacrifice : toutes les expéditions que nous avons envoyées pour purger les horreurs de l'intérieur et la conscience maligne de l'environnement ont dû y faire face continuellement et sans répit. Nos soldats retournent dans nos colonies fortifiées, les yeux enfoncés et les jambes boitillantes tandis que nous comptons nos pertes. La jungle nous a tout envoyé, le hurlement collectif d'un million de créatures ne pouvait être couvert que par les cris de nos blessés et le tonnerre de nos canons tirant sans discrimination dans la ligne des arbres. Mort, massacre et sacrifice sans fin, mais ce soir, victoire.\n\nLentement, une lumière perce à travers les arbres. La lueur pénètre les tentes et les fenêtres de notre colonie, et notre peuple se rassemble pour accueillir l'aube. Cependant, il ne trouvera pas le soleil se levant, mais des flammes. Les préparatifs sont en cours depuis des mois, et nous avons perdu tant de monde en créant le périmètre, mais maintenant les flammes repoussent toute obscurité qui pourrait se cacher et nous résister tout au long de nos efforts. Nos soldats, meurtris mais non brisés, bordent les palissades, attendant ce que nous savons devoir venir. La jungle éclate à nouveau en une cacophonie de sons, mais maintenant ce sont des hurlements de douleur et les cris étranglés de Serfs-Grainiers en flammes, s'effondrant alors qu'ils tentent vainement de charger nos lignes, seules des braises vacillantes de rage alimentant leur avance désespérée. La conflagration est totale, et notre peuple contemple le soleil se lever enfin sur une terre carbonisée et stérile, mais nôtre pour la prendre.\n\nIl est juste que nous revendiquions maintenant un nouveau titre : « les Profanateurs de l'Effelai »."
    effelai_bloom.450.a:0 "Maintenant nous sommes devenus la Mort, les Destructeurs des Mondes"
    effelai_bloom.801.t:0 "La rétribution de notre Déesse"
    effelai_bloom.801.d:0 "Qu'ils tremblent devant la puissance de notre Déesse"
    effelai_bloom.801.a:0 "Nous devons soutenir les forces de notre Déesse"

