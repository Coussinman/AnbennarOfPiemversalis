# Tooltips
 trap_exploded_tt: "§Y[trapped_province_exploding.GetName]§! perdra tous les Pièges Kobolds.\n§Y[trapped_province_exploding.GetName]§! perdra tous les bâtiments de Fort."
 kobold_traps_province_tt: "La ou les §YProvince(s)§! a un fort (ou pas de construction en cours), n'a pas amélioré ses Pièges dans les 5 dernières années, et n'a pas de Pièges Kobolds au maximum"
 gain_extra_dev_migration_tt: "La province gagnera §Y1§! développement aléatoire. Il y a une chance de §Y15 %§! qu'elle gagne §Y2§! développement à la place."
 zux_scalesinger_trap_success_tt: "Tous nos pièges gagnent §Y+0,5§! attrition pendant 10 ans !"
 zux_scalesinger_trap_fail_tt: "Tous nos pièges gagnent §R-15 %§! de défensivité pendant 10 ans."
 KoboldTrapsDynamicTooltip: "[Root.KoboldTrapsDynamicTooltip]"
 kobold_unity_tt: "Toutes les provinces de culture Kobold à Cannor deviennent de culture Kobold Kobildzani et gagnent §Y10§! révolte pendant §Y10§! ans !"
 mission_warning_tt: "§RChanger de religion loin du Culte du Dragon Kobold rendra impossible de compléter la plupart des parties de notre Arbre de Missions !§!"
 child_prodigy_tt: "Les compétences de l'enfant augmenteront notre connaissance des pièges !"
 kobold_trap_slackening_tt: "Vous relâchez les standards de recrutement, donc vous ne récupérez pas de main-d'œuvre. Vous en avez déjà assez !"
 kobold_trap_general_tt: "Gagnez un Général avec du Feu et du Siège supplémentaires."
 kobold_trap_rescue_good_tt: "Nous secourons les kobolds piégés avec des pertes minimales !"
 kobold_trap_rescue_bad_tt: "C'est un désastre ! Les pièges cassent tout et tout le monde !"
 kobold_trap_heist_good_tt: "Ça marche ! Ils ne soupçonneront jamais rien !"
 kobold_trap_heist_bad_tt: "Ils nous prennent sur le fait... mais on peut expliquer, je vous jure !"
 kobold_trap_heist_verybad_tt: "Ils nous prennent sur le fait... et nous remercient !"
 kobold_trap_heist_suspicious_tt: "Les locaux sont suspicieux envers nous... mais nous n'avons rien fait !"
 kobold_trap_adapt_good_tt: "Les locaux ne découvrent jamais !"
 kobold_trap_adapt_bad_tt: "L'enfant s'enfuit et nous expose comme 'les gardant parce que ce serait gênant d'essayer de les rendre' ! Ça n'a pas l'air bon !"
 kobold_trap_adapt_best_tt: "L'enfant grandit pour devenir un parangon des relations humain-kobold !"
 kobold_trap_pie_lose_tt: "Les halfelins gagnent le concours, mais tout est de bon cœur !"
 kobold_trap_pie_win_tt: "Les Kobolds du Salon de Tourtes gagnent le concours !"
 kobold_trap_glue_win_tt: "Succès ! Le produit colle à merveille !"
 kobold_trap_glue_loss_tt: "L'invention fonctionne, mais elle n'est pas vraiment utile."
 kobold_trap_zux_win_tt: "Même sans notre aide, Zux réussit ! Nous avons l'air un peu idiots."
 kobold_trap_zux_fail_tt: "Échec ! Nous savions que ça arriverait."
 kobold_trap_zux_rogue_tt: "Zux est devenu incontrôlable ! Il y a de la colle partout ! Oh dragons, pourquoi !?"

# Decision
create_kobold_traps_decision_title: "Construire des Pièges Kobolds !"
create_kobold_traps_decision_desc: "Des arbalètes tirées depuis des trappes cachées ! Des sorciers draconiques soufflant des gaz empoisonnés ! Des drakes domestiqués libérés de leurs chaînes ! Nous construisons des pièges, nous fortifions nos foyers, et nous défendons la Côte-du-Dragon contre les envahisseurs !"

