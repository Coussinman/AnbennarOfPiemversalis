 crypts_and_cryptographies: "Cryptes et Cryptographies"
 crypts_and_cryptographies_desc: "Dans d'étranges tunnels, des déchiffreurs travaillent sur leurs arts arcanes. Les communications ennemies dans toute la province semblent échouer !"
 reverse_engineered_codes: "Codes Rétro-Ingénierés"
