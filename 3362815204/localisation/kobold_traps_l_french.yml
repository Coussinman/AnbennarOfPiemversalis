l_french:

# Kobold Traps Setup Events
 kobold_traps.1.title: "La Planification des Pièges"
 kobold_traps.1.desc: "[Root.KoboldTrapsDynamicIntro]\n\nLes idées de notre nation pour les pièges sont infinies, mais notre capacité à les mettre en œuvre est limitée. Heureusement, nous avons détourné les ressources nécessaires pour soit créer un nouveau piège, améliorer un piège existant, ou simplement former nos piégeurs. Où construirons-nous notre prochain piège ?"
 kobold_traps.1.a: "Côte-du-Dragon ([Root.dragon_coast_available_traps.GetValue])"
 kobold_traps.1.a.tt: "Il y a §Y[Root.dragon_coast_available_traps.GetValue]§! Pièges potentiels que nous pouvons actuellement améliorer dans cette région."
 kobold_traps.1.b: "La Frontière et l'Étendue Aléniques ([Root.alen_available_traps.GetValue])"
 kobold_traps.1.b.tt: "Il y a §Y[Root.alen_available_traps.GetValue]§! Pièges potentiels que nous pouvons actuellement améliorer dans cette région."
 kobold_traps.1.c: "Lencenor et le Petit-Pays ([Root.sc_lencenor_available_traps.GetValue])"
 kobold_traps.1.c.tt: "Il y a §Y[Root.sc_lencenor_available_traps.GetValue]§! Pièges potentiels que nous pouvons actuellement améliorer dans cette région."
 kobold_traps.1.d: "La Tête-de-Dame ([Root.dameshead_available_traps.GetValue])"
 kobold_traps.1.d.tt: "Il y a §Y[Root.dameshead_available_traps.GetValue]§! Pièges potentiels que nous pouvons actuellement améliorer dans cette région."
 kobold_traps.1.g: "Gérudie ([Root.gerudia_available_traps.GetValue])"
 kobold_traps.1.g.tt: "Il y a §Y[Root.gerudia_available_traps.GetValue]§! Pièges potentiels que nous pouvons actuellement améliorer dans cette région."
 kobold_traps.1.e: "Augmenter la Maîtrise des Pièges"
 kobold_traps.1.e.tt: "Nous utiliserons notre main-d'œuvre excédentaire pour perfectionner notre maîtrise de la fabrication de pièges. Cette option nous rapprochera du prochain palier de Maîtrise des Pièges, mais NE créera NI n'améliorera aucun Piège !"
 kobold_traps.1.f: "Retour"

 kobold_traps.2.title: "Piéger le Dragon"
 kobold_traps.2.desc: "La Côte-du-Dragon est notre foyer, et nous sommes là pour la piéger ! Gnomes, Pillards, Aléniques et d'autres veulent tous nous la prendre, mais nous tiendrons bon contre la marée. C'est le foyer des dragons, et de notre peuple ; nous créerons chaque engin et gadget que nous pouvons imaginer pour la protéger, et nous la défendrons jusqu'au jour de notre mort !\n\nBien sûr, la question doit encore être posée : où, précisément, voulons-nous créer (ou améliorer) nos pièges ?"
 kobold_traps.2.a: "[126.GetName]"
 kobold_traps.2.b: "[146.GetName]"
 kobold_traps.2.c: "[167.GetName]"
 kobold_traps.2.d: "[138.GetName]"
 kobold_traps.2.e: "[184.GetName]"
 kobold_traps.2.f: "[3362.GetName]"
 kobold_traps.2.g: "[213.GetName]"
 kobold_traps.2.h: "[187.GetName]"
 kobold_traps.2.i: "[173.GetName]"
 kobold_traps.2.j: "[177.GetName]"
 kobold_traps.2.k: "[4646.GetName]"
 kobold_traps.2.l: "[189.GetName]"

 kobold_traps.3.title: "Les Pièges de l'Alen"
 kobold_traps.3.desc: "L'Alen est un endroit étrange, plein d'humains dont les gouvernements semblent agir plus comme des tribus que les nôtres ne l'ont jamais fait. Ils se chamaillent et se battent, nourrissant mille griefs mesquins et superstitions, et ils font la guerre à tous ceux qui les entourent. Leur terre, au moins, a de la valeur ; ou du moins elle a de la valeur pour y installer des pièges, avec ses hautes falaises et ses collines ondulantes. Cette région doit être piégée si nous voulons défendre nos flancs nord et est, et donc nous nous mettons au travail.\n\nOù, précisément, devrions-nous créer (ou améliorer) nos pièges ?"
 kobold_traps.3.a: "[197.GetName]"
 kobold_traps.3.b: "[694.GetName]"
 kobold_traps.3.c: "[196.GetName]"
 kobold_traps.3.d: "[698.GetName]"
 kobold_traps.3.e: "[696.GetName]"
 kobold_traps.3.f: "[703.GetName]"
 kobold_traps.3.g: "[217.GetName]"

 kobold_traps.4.title: "Les Pièges du Sud"
 kobold_traps.4.desc: "Le sud est plein de terres riches et abondantes... qui sont terriblement difficiles à défendre. Le Petit-Pays abrite des milliers de fermes fertiles qui fournissent du grain pour la moitié d'un continent ; Lencenor est plein de seigneurs du vin et d'elfes. Aucun des deux, cependant, ne dispose de beaucoup de marais, de collines, de montagnes ou de hauts plateaux. Si nous voulons défendre cette région, nous devons le faire par un vaste réseau de pièges qui peut protéger tout notre flanc sud.\n\nOù, précisément, devrions-nous créer (ou améliorer) nos pièges ?"
 kobold_traps.4.a: "[65.GetName]"
 kobold_traps.4.b: "[71.GetName]"
 kobold_traps.4.c: "[120.GetName]"
 kobold_traps.4.d: "[76.GetName]"
 kobold_traps.4.e: "[139.GetName]"
 kobold_traps.4.f: "[161.GetName]"
 kobold_traps.4.g: "[112.GetName]"

 kobold_traps.5.title: "Le Dragon et la Dame"
 kobold_traps.5.desc: "La Côte-du-Dragon est la tête d'un dragon ; selon les Cannoriens, la Tête-de-Dame est la tête de, eh bien, la Dame. L'est abrite un millier de marchands et un millier de navires, ainsi qu'une multitude d'humains qui veulent désespérément reprendre nos terres. Si nous voulons défendre nos frontières, nous devons nous assurer que nos fortifications côtières sont protégées, et que nous ne pouvons pas facilement être envahis par la mer. Donc : plus de pièges !\n\nOù, précisément, devrions-nous créer (ou améliorer) nos pièges ?"
 kobold_traps.5.a: "[216.GetName]"
 kobold_traps.5.b: "[155.GetName]"
 kobold_traps.5.c: "[208.GetName]"

 kobold_traps.6.title: "L'Explosion à [Root.GetName]"
 kobold_traps.6.desc: "Notre garnison a combattu jusqu'au dernier homme, mais nos défenses ont été compromises ! Heureusement, ils ont veillé à ce que chaque séquence d'autodestruction se déroule exactement comme prévu. Nos ennemis contrôlent peut-être maintenant [Root.GetName], mais ils ne contrôleront jamais nos pièges !"
 kobold_traps.6.a: "BOUM !"

 kobold_traps.7.title: "L'Explosion à [trapped_province_exploding.GetName]"
 kobold_traps.7.desc: "Nos hommes se sont frayé un chemin à travers les pièges kobolds, surmontant toutes les défenses. Nous avons subi des lance-flammes, des drakes, de l'acide, des arbalètes, des canons, des fosses et plus encore... mais finalement, après tout cela, nous avons pris [trapped_province_exploding.GetName].\n\nIl n'y a qu'un seul problème : les kobolds ont détruit les pièges de la province avant que nous puissions les utiliser. L'intégralité des défenses de la province est partie en flammes. Nous ne pourrons pas réquisitionner leur folie, mais le voulions-nous vraiment en premier lieu ?"
 kobold_traps.7.a: "BOUM !"

 kobold_traps.8.title: "Démanteler les Pièges"
 kobold_traps.8.desc: "Avec la perte du fort à [Root.GetName], nos pièges sont exposés et vulnérables. Nous pouvons les démanteler de manière préventive, ou nous pouvons les laisser exister jusqu'à ce que nous soyons à nouveau prêts à fortifier la province. Que devons-nous faire ?"
 kobold_traps.8.a: "Démanteler les pièges."
 kobold_traps.8.b: "Déplacer les pièges vers les lignes de front !"
 kobold_traps.8.c: "Maintenir les pièges."

 kobold_traps.10.title: "Les Kobolds Fuient Vers les Cavernes"
 kobold_traps.10.desc: "Des caravanes de kobolds, tirées par de lourds drakes. Des chariots remplis de laine et de babioles brillantes. Partout à [kobolds_fleeing_province.GetName], les kobolds partent vers l'intérieur.\n\nAprès des années à endurer notre règne, nous qui avons saisi les terres kobolds, déplacé leurs paysans, et institué des administrations [Root.GetAdjective], les locaux en ont assez. Ils ont pris leurs biens, et leurs richesses, et ont commencé une grande migration vers les cavernes de l'Échine-du-Dragon. Les kobolds quittent la surface, vers un endroit qu'ils pensent pouvoir encore défendre.\n\nLa plupart de nos colons locaux ont commencé à célébrer, saisissant chaque propriété kobold qu'ils peuvent trouver dans le sillage de la migration. Certains, cependant, hésitent, en regardant les richesses passer nos frontières. Ils prétendent qu'il y a deux façons d'arrêter cette migration : soit nous intégrons les kobolds, soit nous détruisons leur havre dans les Profondeurs-du-Dragon. Sinon, ils pourraient bien continuer à partir.\n\nPour l'instant, cependant, cela signifie plus de foyers pour nos colons, plus de terres pour nos fermiers, et moins de reptiliens embêtants à gérer. Qui sommes-nous pour nous plaindre d'un terrier piégé de moins à surveiller ?"
 kobold_traps.10.a: "Les kobolds fuient, et nous nous installons..."

 kobold_traps.11.title: "Autres que les Dragons"
 kobold_traps.11.desc_1: "Une caravane de kobolds est entrée dans nos cavernes, trouvant son chemin dans les recoins de [Root.GetName]. Venant de [From.GetName], ils arrivent avec tout ce qu'ils avaient sur eux : babioles, colifichets, outils, graines, vêtements, et... théories. Philosophies. La maudite Pensée des gnomes, venue nous hanter.\n\nCela a immédiatement causé un tollé à [Root.GetName]. Les locaux reculent d'horreur devant ces migrants, qui entrent sur nos terres mais ne vénèrent pas Malliath, ni Tayekan, ni Nimrith, ni Iothoral. Déjà, les prêtres-dragons ont exigé qu'ils sacrifient des agneaux à l'abattoir, ou contribuent des richesses au Grand Trésor : mais les nouveaux venus refusent. Au lieu de cela, ils s'accrochent à la Pensée, et déclarent que nous devrions catégoriser, synthétiser et cataloguer chaque histoire que nous connaissons sur les dragons. Ils ont même convaincu certains des prêtres-dragons, qui ont déjà commencé à faire leurs propres recueils, et qui débattent que certains des dragons pourraient même ne pas être réels !\n\nLes migrants offrent leur propre richesse à [Root.GetName], et désirent nous aider à fortifier les cavernes. Ils disent vouloir nous aider, et pourtant la méfiance est semée dans toute notre nation. Embrassons-nous ces étrangers, qui déclarent loyauté à [Root.Owner.GetName] aux côtés de la Pensée ? Ou les mettons-nous au travail, tout en veillant à ce que les dragons soient les seules choses vénérées dans les cavernes de leur nom ?"
 kobold_traps.11.desc_2: "Une caravane de kobolds est entrée dans nos cavernes, trouvant son chemin dans les recoins de [Root.GetName]. Venant de [From.GetName], ils arrivent avec tout ce qu'ils avaient sur eux : babioles, colifichets, outils, graines, vêtements, et... dieux. Religions. Des manières de croire qui sont en conflit avec les dragons.\n\nCela a immédiatement causé un tollé à [Root.GetName]. Les locaux reculent d'horreur devant ces migrants, qui entrent sur nos terres mais ne vénèrent pas Malliath, ni Tayekan, ni Nimrith, ni Iothoral. Déjà, les prêtres-dragons ont exigé qu'ils sacrifient des agneaux à l'abattoir, ou contribuent des richesses au Grand Trésor : mais les nouveaux venus refusent. Au lieu de cela, ils s'accrochent à la religion de ceux qui les ont conquis, qui les ont forcés dans une telle misère qu'ils sont entrés sur nos terres. Ils ont apporté les modes de vie de l'ennemi au cœur de notre nation.\n\nLes migrants offrent leur propre richesse à [Root.GetName], et désirent nous aider à fortifier les cavernes. Ils disent vouloir nous aider, et pourtant la méfiance est semée dans toute notre nation. Embrassons-nous ces étrangers, qui déclarent loyauté à [Root.Owner.GetName] aux côtés de leurs nouveaux dieux ? Ou les mettons-nous au travail, tout en veillant à ce que les dragons soient les seules choses vénérées dans les cavernes de leur nom ?"
 kobold_traps.11.a: "Ceux qui trahissent les dragons seront brûlés par leur feu !"
 kobold_traps.11.b: "Nous pouvons accepter tous les kobolds, même s'ils ont tort."
 kobold_traps.11.c: "Peut-être ont-ils raison !"
 kobold_traps.11.d: "Ces gars sont géniaux, non ?"

 kobold_traps.12.title: "Conflits de Clans"
 kobold_traps.12.desc_1: "Les Écailles-Rouges arrivent ! Une horde de Kobolds Écailles-Rouges est arrivée à [Root.GetName], intimidant les locaux par leur arrogance et leur audace. Ils viennent fuir [From.GetName], et ils ont apporté avec eux tous les classiques des Écailles-Rouges : des fusils de fortune plus susceptibles d'exploser que de tirer correctement, un esprit martial d'agression constante, et une obsession tenace d'adapter les modes de vie de nos ennemis. Les locaux, pour dire simplement, sont furieux.\n\nLes nouveaux migrants prétendent que nous devons mettre de côté nos différences, et leur permettre de nous aider à défendre les cavernes pour que tous les kobolds puissent vivre un jour de plus... mais il n'y a qu'une limite à ce que nous sommes prêts à tolérer pour l'avancement de la koboldité. Les Écailles-Rouges exigent des droits, des privilèges et de l'autonomie ; ils exigent d'être pris au sérieux au sein de notre trivu et viraxia. Nous leur permettrons de construire des défenses supplémentaires, certainement, mais il n'est pas clair ce que nous devrions faire d'autre. Comment devrions-nous traiter ces nouveaux venus ?"
 kobold_traps.12.desc_2: "Les Écailles-Bleues arrivent ! Une horde de Kobolds Écailles-Bleues est arrivée à [Root.GetName], et ils ont immédiatement commencé à agir comme si les cavernes leur avaient toujours appartenu. Ils viennent fuir [From.GetName], et ils ont apporté avec eux tous les classiques des Écailles-Bleues : des prêtres-dragons qui insistent qu'ils connaissent les dragons mieux que quiconque, une revendication impérieuse de souveraineté sur les cavernes, et une centaine de variétés de champignons et de pièges. Les locaux, pour dire simplement, sont furieux.\n\nLes nouveaux migrants prétendent que nous devons mettre de côté nos différences, et leur permettre de nous aider à défendre les cavernes pour que tous les kobolds puissent vivre un jour de plus... mais il n'y a qu'une limite à ce que nous sommes prêts à tolérer pour l'avancement de la koboldité. Les Écailles-Bleues exigent des droits, des privilèges et de l'autonomie ; ils exigent d'être pris au sérieux au sein de notre trivu et viraxia. Nous leur permettrons de construire des défenses supplémentaires, certainement, mais il n'est pas clair ce que nous devrions faire d'autre. Comment devrions-nous traiter ces nouveaux venus ?"
 kobold_traps.12.desc_3: "Les Écailles-Vertes arrivent ! Une horde de Kobolds Écailles-Vertes est arrivée à [Root.GetName], et il semble qu'ils répandent des théories du complot sur des dragons lointains partout où ils vont. Ils viennent fuir [From.GetName], et ils ont apporté avec eux tous les classiques des Écailles-Vertes : un complexe d'infériorité douloureusement exagéré, une profonde méfiance envers chaque kobold sans teinte verte, et une obsession déconcertante avec le destin. Les locaux, pour dire simplement, sont furieux.\n\nLes nouveaux migrants prétendent que nous devons mettre de côté nos différences, et leur permettre de nous aider à défendre les cavernes pour que tous les kobolds puissent vivre un jour de plus... mais il n'y a qu'une limite à ce que nous sommes prêts à tolérer pour l'avancement de la koboldité. Les Écailles-Vertes exigent des droits, des privilèges et de l'autonomie ; ils exigent d'être pris au sérieux au sein de notre trivu et viraxia. Nous leur permettrons de construire des défenses supplémentaires, certainement, mais il n'est pas clair ce que nous devrions faire d'autre. Comment devrions-nous traiter ces nouveaux venus ?"
 kobold_traps.12.a: "Les forcer à contribuer au Trésor pour leurs transgressions !"
 kobold_traps.12.b: "Nos frères doivent contribuer au Trésor !"
 kobold_traps.12.c: "Les Cannoriens envahissent, et nous nous querellons pour ça ?"

 kobold_traps.13.title: "Pèlerins Réfugiés"
 kobold_traps.13.desc: "Une grande foule de pèlerins est arrivée de [From.GetName] ! Des kobolds pieux ont vu leurs vies détruites, leurs foyers saisis, leurs temples saccagés, et leurs trésors pillés... et pourtant ils viennent à [Root.Owner.Capital.GetName], contribuant tout ce qu'ils ont encore à notre Trésor. Dans cette procession, des prêtres-dragons étrangers échangent des histoires avec les nôtres ; des kobolds de toutes teintes chantent en solidarité et triomphe ; la koboldité est une, unie à [Root.Owner.Capital.GetName], unie dans leur amour pour les dragons.\n\nIci, dans les cavernes, nous ne serons pas vaincus. Ici, dans les cavernes, nous ne serons pas détruits ! À Malliath, Tayekan, Nimrith, et Iotharal, et à chaque autre dragon de Halann !"
 kobold_traps.13.a: "Tous les pèlerins sont les bienvenus !"

 kobold_traps.14.title: "Idées de l'Extérieur"
 kobold_traps.14.desc: "Une caravane de kobolds est entrée dans nos cavernes, trouvant son chemin dans les recoins de [Root.GetName]. Venant de [kobolds_fleeing_province.GetName], ils arrivent avec tout ce qu'ils avaient sur eux : babioles, colifichets, outils, graines, vêtements, et... philosophies. Modes de vie. Des manières de croire qui sont en conflit avec les nôtres.\n\nCes kobolds proclament encore suivre les dragons, et ils proclament loyauté à notre Viraxia ; et pourtant, en même temps, ils sont différents. Ayant été partiellement assimilés par leurs conquérants, ils viennent à nous avec des concepts des habitants « civilisés » de la surface. Ils écrivent les histoires des prêtres-dragons en alphabets cannoriens, liant les dragons à la page et extrayant le dynamisme de leurs légendes ! Ils apportent la connaissance de nouvelles méthodes de minage et de forge, osant perturber les mines de cavernes qui ont fonctionné pendant des siècles ! Ils osent même défier notre [Root.Owner.Monarch.GetTitle] [Root.Owner.Monarch.GetHerselfHimself], prétendant que notre Viraxia doit moderniser ses méthodes si nous voulons survivre à la tempête qui vient.\n\nMalgré tous ces affronts, les nouveaux kobolds proclament encore vouloir nous aider. Ils se sont immédiatement mis au travail pour construire de nouveaux pièges et défenses... et pourtant, malgré tout, nous restons hésitants. Comment devrions-nous traiter ces intrus ? Connaissent-ils l'avenir, ou sont-ils simplement trompés par nos ennemis ?"
 kobold_traps.14.a: "Ils connaissent l'avenir ; nous devons l'embrasser !"
 kobold_traps.14.b: "Nous savons comment nous gouverner nous-mêmes !"

 kobold_traps.15.title: "L'Unité Kobold"
 kobold_traps.15.desc_1: "Pendant mille ans, les kobolds se sont querellés pour la Côte-du-Dragon ! Les Rouges, Bleus et Verts ont tous revendiqué les cavernes des Profondeurs-du-Dragon, les pâturages vallonnés des Hauteurs-du-Dragon, et les belles terres agricoles des Bas-du-Dragon. Ils — non, nous — avons formé des tribus trivu basées sur la teinte de nos écailles, et les liens de notre sang. Pendant si longtemps, nous pouvions nous le permettre, car la Côte-du-Dragon était à nous et à nous seuls. Nous ne pouvons plus rester divisés.\n\nAvec des kobolds de toutes les tribus migrant dans les cavernes de l'Échine-du-Dragon, le changement est dans l'air. Écailles-Rouges, Écailles-Bleues et Écailles-Vertes se sont tous trouvés désespérés, plus conscients chaque jour que les Cannoriens conquièrent la surface. Nos conflits nous ont séparés, mais ici, dans les Profondeurs, nous trouvons de la place les uns pour les autres. L'audace des Rouges, la sagacité des Bleus, la ténacité des Verts : chacune s'est trouvée combinée dans nos trivuak, qui ont grandi en taille pour accueillir tous les kobolds. Nous avons appris les uns des autres, et, maintenant, nous pouvons combattre.\n\nDes défenses sont érigées à travers notre domaine. Les dragons rugissent dans nos cœurs et nos veines. Les kobolds (métaphoriquement) muent leurs écailles, adoptant une tribu partagée comme la leur. Aujourd'hui, nous déclarons la Viraxia de Kobildzan : le Foyer de Tous les Kobolds !"
 kobold_traps.15.desc_2: "Pendant mille ans, les kobolds se sont querellés pour la Côte-du-Dragon... mais maintenant, quelque chose a changé. Quelque chose ne va pas.\n\nNous avons regardé les Écailles-Rouges, Écailles-Bleues et Écailles-Vertes se rassembler en groupes à eux, peinant sous notre règne. Nous sommes restés en retrait alors qu'ils remarquaient les halfelins agiter pour l'indépendance, les gnomes combattre pour la reconquête, et les Aléniques se consolider dans leur grand royaume du nord. Quand leurs tribus se sont mélangées et ont mis de côté les vieilles rancunes, nous n'avons pas intervenu ; et pourquoi l'aurions-nous fait ? Les affaires personnelles des kobolds n'étaient pas les nôtres à contrôler, ni les nôtres à nous inquiéter. Ils étaient sous notre domaine, et notre contrôle.\n\nCes dernières années, des prêtres-dragons ont voyagé de village en village. Trop insignifiants pour que nous les remarquions, ils ont répandu la parole d'un réveil draconique : de Malliath qui s'agite, et des kobolds qui s'unissent. Ils ont prétendu que nous avons pris la Côte-du-Dragon par la cruauté, pas par la ruse, et que le temps est venu de nous expulser pour toujours. Les kobolds ont commencé à renoncer à leur « Viraxia » — les tribus Écailles-Rouges, Écailles-Bleues et Écailles-Vertes — et les ont laissées au passé, à être oubliées pour toujours comme un échec de la division kobold. Maintenant, il semble qu'ils aient trouvé quelque chose de nouveau.\n\nUn rugissement draconique s'élève. Les kobolds clament pour leur propre nation — un « Kobildzan », un foyer pour tous les kobolds — mais nous sommes sur leur chemin. Malgré tout, nous leur montrerons leur place. La Côte-du-Dragon est à nous à contrôler !"
 kobold_traps.15.a: "Nous devenons Kobildzan !"
 kobold_traps.15.b: "Qu'est-ce que ce « Kobildzan » !?"
 kobold_traps.15.c: "Nous sommes [Root.GetName], pas Kobildzan !"

 kobold_traps.19.title: "Événement de Gestion"
 kobold_traps.19.desc: "Ceci est un événement caché. Si vous le voyez... arrêtez de fouiner par ici ! Comment avez-vous même trouvé ça, hein ? Hein ? Allez, ouste, garnement. Chenapan. Les jeunes de nos jours, je vous jure..."
 kobold_traps.19.a: "Vous ne devriez pas voir ça !"

 kobold_traps.20.title: "La Garnison Prouve Son Potentiel"
 kobold_traps.20.desc: "Un autre rapport arrive sur le bureau bricolé du maître-piégeur concernant « La Trapiste », un titre qui s'est répandu comme l'éclair à travers [Root.GetName] ces derniers mois. « Un troisième assaut simulé sur l'un des pièges les plus récents de la Trapiste a été déjoué une fois de plus », déclare-t-il. « Sa connaissance des tactiques de champ de bataille n'est rivalisée que par son intuition pour créer des trappes, fils-pièges et enchevêtrements extrêmement efficaces. Nous devrions embaucher cette kobold immédiatement ! »\n\nOn a presque l'impression que la Trapiste peut être à deux endroits à la fois. D'un côté, elle a personnellement mené une centaine de sièges réussis dans des exercices de combat ; de l'autre, les pièges qu'elle fabrique sont inégalés en qualité. Tragiquement, nous ne pouvons pas l'employer à la fois comme maître de siège et comme piégeuse... mais nous pouvons l'employer vers l'une de ces fins. Que devrions-nous choisir ?"
 kobold_traps.20.a: "Elle mènera nos troupes dans mille sièges !"
 kobold_traps.20.b: "Elle gérera notre réseau de pièges à travers la nation !"

 kobold_traps.21.title: "L'Enfant Prodige"
 kobold_traps.21.desc: "La perte d'un enfant est une chose affreuse, et cela arrive bien trop souvent. La vie d'un kobold est brutale et courte, et tout, de la guerre à la maladie, consume bien trop de nos jeunes. Un risque plus rare que la mort d'un enfant est celui de l'enfant laissé derrière. Les « trivuak » kobolds (grands regroupements de clans étendus de plusieurs familles) ont de nombreux enfants partagés, élevés dans des couvées d'œufs par tous leurs membres : mais quand ils quittent leurs villages et terriers à cause de la guerre ou de la migration, il n'y a pas une seule famille qui veille sur chaque enfant. Parfois, rarement, un se perd dans la confusion.\n\nRécemment, un groupe d'aventuriers sans tripes est tombé sur un terrier kobold abandonné, et a pensé pouvoir le piller pour tout trésor restant. Quand ils ont approché, ils se sont retrouvés face à face avec la mort. Des pièges à champignons de flamme ont projeté du feu sur leurs visages ; de vieux pièges à pointes avaient été cachés exactement là où ils ont couru ; le dernier membre de leur groupe a été éliminé par un tir d'arbalète propre dans le front. Tout était fini en une demi-heure.\n\nQuand nos soldats sont venus inspecter les dégâts, ils étaient stupéfaits par ce qu'ils ont vu. Ce n'est qu'une fois qu'ils ont vu un unique, minuscule petit kobold qu'ils ont compris ce qui s'était passé. Tout cela — tout le système défensif — avait été conçu par une minuscule enfant kobold d'à peine treize ans, alors qu'elle avait vécu seule pendant quatre ans. Elle a accompli tout cela elle-même !\n\nLes troupes ont adopté l'enfant dans leur propre trivuak, et l'ont immédiatement amenée au haut commandement. Nous l'élèverons pour devenir une experte en pièges, et nous en serons tous meilleurs !"
 kobold_traps.21.a: "Elle a fait tout ça alors qu'elle était seule à la maison !"

 kobold_traps.22.title: "La Tribu des Pièges"
 kobold_traps.22.desc: "La plus petite structure sociale de la société kobold est la « zendia », ou la grande famille. Parce que les kobolds pondent des œufs et les élèvent collectivement, les « zendiak » (la forme plurielle de zendia) peuvent aller de dizaines à centaines de kobolds en taille. Les membres d'une zendia vivent généralement dans des foyers ou terriers partagés, et ils n'ont même pas de mots pour distinguer entre « cousin » et « grand-mère », car tous les membres de la zendia font simplement partie de la famille. Avec les kobolds ayant extrêmement peu de dimorphisme sexuel ou de rôles de genre culturels comparé à la plupart des humanoïdes cannoriens, même la distinction entre « mère » et « père » signifie peu ; les enfants sont élevés collectivement par les membres de la zendia qui ont pris sur eux d'élever tous les jeunes de la tribu.\n\nLa structure sociale suivante en taille est le « trivu », qui ressemble beaucoup à une tribu de tribus. Les trivuak forment les blocs de construction des communautés, et des villages entiers ou quartiers de ville sont souvent composés d'un seul trivu. Les trivuak sont connus pour se « spécialiser » dans certains domaines ; les trivuak se fédèrent souvent autour de mines, ou de routes commerciales particulières, ou de quais, et adoptent une « entreprise » familiale qui les définit. Ici, à [trap_province.GetName], un nouveau trivu s'est formé, basé entièrement autour de nos pièges !\n\nDes garnisons de tout [Root.GetName] ont maintenant peuplé le piège à [trap_province.GetName], et chacune de ces garnisons a amené une partie de leurs zendiak respectifs avec elles. Ici, ces zendiak se sont mêlés pendant des années, et ils se sont maintenant officiellement fédérés en un nouveau trivu. [trap_province.GetName] a ses propres protecteurs dévoués, avec une seule entreprise familiale : protéger nos kobolds !"
 kobold_traps.22.a: "Le Trivu des Pièges protège !"

 kobold_traps.23.title: "Un Donjon Accidentel"
 kobold_traps.23.desc: "Chaque kobold sait que le meilleur piège est celui qu'on ne peut pas déterrer. Comment faisons-nous cela ? En creusant plus profond ! Nous ne sommes forts que comme nos fondations, littéralement, et donc chaque kobold apprend dès son jeune âge comment creuser efficacement nos pièges plus profondément qu'on ne peut les déterrer.\n\nLa plupart du temps, c'est sans incident. Parfois nous trouvons un nouveau gisement de minerai, une source d'eau, ou des gemmes. Rarement, nous trouvons des vestiges de vieux pièges ou gadgets de générations précédentes. Une fois par génération, nous trouvons d'anciens tombeaux, trésors, ou structures décrépites. Maintenant, cependant, pour la première fois, nous avons trouvé quelque chose d'effrayant.\n\nCe mois-ci, un donjon a été découvert par gravité. Son explorateur accidentel (qui est tombé dans son entrée quand une excavation s'est transformée en effondrement), après avoir rassemblé ses esprits, a été émerveillé par des protections finement gravées sur des murs sphériques, avec une porte menant dans chaque direction cardinale. Peu après que ce kobold ait été récupéré de l'obscurité, il a commencé à entendre des voix lui disant de revenir. Maintenant, les kobolds qui sont simplement près du donjon entendent ces murmures invitants. Nous devons découvrir ce qui exige notre attention si fortement !"
 kobold_traps.23.a: "Bonjour ? Y a-t-il quelqu'un ?"

 kobold_traps.24.title: "Dysfonctionnement Massif"
 kobold_traps.24.desc: "Effondrement ! Un de nos pièges les plus récents a échoué avec succès ! Le piège s'est avéré trop efficace, et nos testeurs de pièges se sont retrouvés coincés en le testant. Quelques-uns d'entre eux ont déjà subi des blessures mortelles des pointes encastrées, et une solution doit venir bientôt.\n\nL'un de nos meilleurs piégeurs a trouvé deux solutions. La première : détruire le piège. Trois points faibles clés ont été intégrés dans le système complexe, et si un kobold était placé à chacun et attaquait en même temps, le piège pourrait être anéanti et nos proches libérés. Malheureusement, le créateur de ce piège était l'une des victimes, et donc faire cela effacerait notre capacité à le recréer de sitôt.\n\nDe l'autre griffe, nous pourrions tenter d'extraire nos braves testeurs en construisant un système de poulies temporaire et en les soulevant un à la fois. Cela assurerait la survie du piège unique, mais nous risquons de blesser ceux qui pourraient être déjà affaiblis.\n\nQue devrions-nous faire ?"
 kobold_traps.24.a: "Nous démonterons notre propre piège, si c'est ce qu'il faut pour libérer nos hommes !"
 kobold_traps.24.b: "Nous les extrairons, mais le piège doit rester !"

 kobold_traps.25.title: "Le Casse de Bébé Inversé"
 kobold_traps.25.desc: "Un enfant humain local est tombé dans un de nos Pièges ! Heureusement, il est indemne : mais nous avons un problème. Si nous essayons juste de... rendre le bébé aux locaux, ils vont devenir vraiment suspicieux, et demander pourquoi nous avions un bébé humain en premier lieu ! Comment allons-nous accomplir un casse de bébé inversé : comment allons-nous faire rentrer le bébé en douce dans leur maison, sans que personne ne remarque ?"
 kobold_traps.25.a: "Procéder au casse de bébé inversé !"
 kobold_traps.25.b: "...Nous ne faisons pas de « casse de bébé inversé ». Nous dirons juste aux locaux que nous avons trouvé un bébé."
 kobold_traps.25.c: "Au diable, ça n'en vaut pas la peine. On dirait qu'on a un enfant maintenant ?"
 kobold_traps.25.d: "Attendez, cet enfant est un noble !? Un héritier des pièges !"

 kobold_traps.26.title: "Vengeance sur Eaglecrest"
 kobold_traps.26.desc: "Sur la Côte-du-Dragon, nous connaissons Eaglecrest sous un autre nom. Nous l'appelons la cité du massacre.\n\nPendant tant d'années, ils nous ont tués. Ils nous ont écorchés. Les habitants d'Eaglecrest ont fait des armures de nos écailles, et nous ont appelés les monstres. Les gnomes ont peut-être eu des ambitions de prendre nos terres, et nous avons peut-être constamment livré bataille aux Hommes des Marais, mais aucun n'est aussi méprisé que les habitants d'Eaglecrest. Seule la cité du massacre pourrait gérer une telle dépravation.\n\nQuand nous avons pris la cité, nous l'avons faite nôtre. Nous avons érigé des pièges et une citadelle d'architecture kobold, faits pour dominer les locaux et leur rappeler leur passé. Nous avons construit des statues pour chaque kobold tué, et nous avons inscrit les noms des assassinés sur les portes de chaque foyer. Eaglecrest a été transformée en une cité de mémoriaux, immortalisant le mal qu'ils ont fait. Maintenant, ils enragent contre nous pour leur avoir rappelé ce qu'ils ont fait.\n\nLes habitants d'Eaglecrest lèvent les anciennes garnisons, et ils sortent les anciennes milices. Ils portent des capes d'écailles de kobold vieilles de générations, récupérées des tombes de meurtriers vénérés. Ils ont lancé leur dernier combat ; et cette fois, comme les autres, ils pensent qu'ils nous anéantiront pour toujours.\n\nIls ont tort. Ils ont toujours eu tort."
 kobold_traps.26.a: "Nous avons déjà gagné."

 kobold_traps.27.title: "Les Terriers de Baycodds"
 kobold_traps.27.desc: "Alors que nous creusons des tunnels sous Malliathalxa et excavons ses mines de Damestear, nous trouvons des preuves de ce qui était là avant. Bien avant que nous conquérions ces îles dispersées — bien avant que nous ayons même quitté nos cavernes — des gnomes étaient ici à « Baycodds », et ils étaient comme nous. Ils ont été conquis et envahis, leurs cités détruites ; mais alors que beaucoup ont fui dans les montagnes, certains sont restés chez eux près de leur Damestear. Ils ont creusé dans des terriers, fait d'innombrables pièges, et tenu bon contre la marée.\n\nMalgré les assauts constants des pillards humains et halfelins, les « Gnomes Éclats » (comme ils étaient connus à l'époque) ont réussi à rester en vie. Des cultistes adorateurs de Damestear ont vécu et sont morts dans ces terriers, coupés les uns des autres et des autres gnomes. Ils ont utilisé des magies désespérées et des inventions rusées pour briser leurs ennemis, pour les attirer dans des fosses, et des flammes, et des pointes, et plus encore. Même quand la fameuse « Invasion des Diables des Profondeurs » a brutalisé les côtes de Cannor, ils ont encore vécu ; et quand les Diables ont expulsé les pillards tribaux, les gnomes ont repris la surface. Ils ont peut-être depuis oublié leurs méthodes désespérées, mais les tunnels se souvenaient.\n\nQuand l'un de nos arpenteurs trouve des marques gravées dans les murs comptant les jours sans nourriture, ou quand il aperçoit ce qui était autrefois un fil-piège pendant d'un rebord, ça ressemble presque à la maison. Nous trouvons des puits où des enfants (aussi petits que les nôtres) se cachaient autrefois, et d'anciens squelettes de ceux qui ont déclenché leurs propres pièges et sont morts dans le processus. Ces tunnels sont riches en Damestear, et en souvenirs.\n\nNous réutilisons maintenant les terriers des Gnomes Éclats pour notre propre usage, et trouvons une parenté étrange dans les mines. Peut-être sommes-nous plus semblables que nous le pensions ?"
 kobold_traps.27.a: "Les terriers de Baycodds, de Malliathalxa, sont de nouveau piégés !"

 kobold_traps.28.title: "Les Kobolds du Salon de Tourtes"
 kobold_traps.28.desc: "Les kobolds de [trap_province.GetName] ont été charmés par la bonne nourriture ! Ces dernières années, nos garnisons ont vécu la belle vie, festoyant des provisions fournies par les halfelins locaux. Aucun de ces festins n'a été aussi adoré que les tourtes de [trap_province.GetName], une délicatesse locale qui a maintenant causé une brèche significative dans le budget alimentaire des soldats. Elles ont eu un tel succès que beaucoup de jeunes kobolds locaux ont commencé à vivre dans la ville, aidant les halfelins à cuisiner des tourtes et apprenant à le faire eux-mêmes !\n\nBien qu'ils aient été déconcertés au début, les chefs de [trap_province.GetName] ont depuis embrassé leurs homologues écailleux. Ils ont commencé à intégrer des champignons de caverne dans les tourtes salées, enseignant toutes les techniques qu'ils connaissent aux kobolds intéressés, et même les embauchant comme apprentis. Les traditions culinaires de la Côte-du-Dragon et du Petit-Pays se mélangent, et les pâtisseries résultantes sont meilleures qu'elles ne l'ont jamais été.\n\nC'est maintenant le moment du Concours de Cuisine tri-décennal de [trap_province.GetName], et une collection de « Kobolds du Salon de Tourtes » s'est inscrite comme sa propre équipe. Nous leur souhaitons bonne chance pour gagner, mais peu importe qui réussit, nous aurons tous de la bonne nourriture !"
 kobold_traps.28.a: "J'espère que les Kobolds du Salon de Tourtes l'emportent !"

 kobold_traps.29.title: "Pièges en Ruche"
 kobold_traps.29.desc: "Les méthodes de construction halfelines sont brutalement efficaces. Des structures en nid d'abeilles d'hexagones — des ruches entières de maisons — s'empilent les unes sur les autres comme des gâteaux en couches, créant des cités miniatures qui peuvent accueillir des dizaines de milliers de personnes. Ces cités finissent par être incroyablement difficiles à naviguer pour les grandes gens, car de minuscules ruelles et des toits bas finissent par être trop petits pour que quiconque de plus grand qu'un halfelin puisse naviguer confortablement... et cela nous donne une idée.\n\nNous avons contacté quelques constructeurs à [trap_province.GetName], et ils semblent favorables à nous aider à construire nos pièges. En mélangeant les pièges kobolds avec les ruches halfelines, nous pourrions être capables de construire quelque chose de vraiment labyrinthique ! Que devrions-nous faire ?"
 kobold_traps.29.a: "Enrôler les halfelins !"
 kobold_traps.29.b: "Nous avons nos propres méthodes."

 kobold_traps.30.title: "Nos Foyers Sécurisés"
 kobold_traps.30.desc: "À [167.GetName], nous avons sécurisé la Côte-du-Dragon contre les Lencori. À [184.GetName], nous l'avons sécurisée contre les Aléniques. À [694.GetName], nous l'avons sécurisée... aussi contre les Aléniques.\n\nTous les foyers des kobolds — quelle que soit la teinte de leurs écailles, ou où ils résident — ont été fortifiés contre les envahisseurs. Nous poussons maintenant de plus en plus profond en terres humaines, et étendons nos défenses chaque année ; mais à partir de maintenant, les kobolds seront en sécurité.\n\nPendant si longtemps, nous avons été divisés. Pendant si longtemps, nous avons eu peur que l'ennemi fonde sur nous avec des lames et de la poudre. Enfin, nous pouvons être tranquilles, sachant que la Côte-du-Dragon est à nous, et le sera pour toujours !"
 kobold_traps.30.a: "Nous survivrons toujours !"

 kobold_traps.31.title: "Le Centre de la Toile"
 kobold_traps.31.desc: "Les kobolds sont méfiants envers les nouveaux venus à cause de leurs mauvais traitements par la plupart des gens au fil de nombreuses vies. Cela ne signifie pas, cependant, que les non-kobolds ne peuvent pas être acceptés, ou même intégrés dans la culture kobold. C'est particulièrement le cas dans les terres lencori, pleines de résistance et de sabotage qu'elles sont. Pendant des siècles, les halfelins ont résisté au règne humain ; et ils l'ont fait depuis des terriers, dans des tribus et cultures divisées par de petites différences, et à la moitié de la taille de leurs ennemis. Est-ce une surprise que maintenant, un compagnon de stature similaire à la nôtre se soit élevé dans nos rangs ?\n\n« Seigneur Écaille-de-Cidre », comme il s'appelle maintenant, a mélangé le halfelin avec le kobold. Se couvrant de peintures de guerre écarlates, et s'annonçant être aussi Rouge de caractère que le cidre qu'il boit, il est devenu un pilier de nos forces dans le Petit-Pays. Depuis son centre de commandement au cœur de Pommérac, il a fait un travail admirable pour défendre nos terres nouvellement acquises de ceux plus au sud qui désirent les récupérer et expulser nos frères. Vraiment il doit être né kobold en esprit !"
 kobold_traps.31.a: "Vive le Seigneur Écaille-de-Cidre !"

 kobold_traps.32.title: "Épreuves et Piégeulations"
 kobold_traps.32.desc: "Zux Chant-d'Écaille. Ce nom est apparu trois fois maintenant dans les rapports quotidiens de notre ingénieur en chef.\n\nLa première fois c'était quand un nouveau type d'explosif qu'il a créé — censé aider nos éclaireurs à pister les soldats en fuite en leur appliquant une odeur... notable — a forcé nos ingénieurs à évacuer à la fois leurs laboratoires et le contenu de leurs estomacs. La deuxième c'était quand un piège innovant à pointes roulantes à poids de pression, censé seulement capturer l'ennemi sans le blesser de façon permanente, s'est avéré plutôt modérément efficace pour attraper du poisson quand équipé d'un filet. Et maintenant, son nom revient une fois de plus.\n\nCette fois, cependant, il semble que son invention pourrait avoir de la substance. Il prétend avoir découvert un moyen de créer une colle qui coule comme l'eau jusqu'à ce qu'elle entre en contact avec du tissu, auquel moment elle prend et durcit rapidement, rendant sa cible ralentie même en petites quantités, complètement immobile en plus grandes. Il a montré du potentiel avant et n'a pas réussi à livrer, mais peut-être peut-il tenir ses promesses ?"
 kobold_traps.32.a: "Chaque kobold mérite une chance !"
 kobold_traps.32.b: "Absolument pas, il a utilisé assez de nos ressources !"

 kobold_traps.33.title: "Pièges Gérudiens"
 kobold_traps.33.desc: "Le grand nord... plein de scaldes, de neige, et d'ennemis des dragons. Nous conquerrons cet endroit ! Nous contrôlerons sa terre, et son économie.\n\nOù, précisément, devrions-nous créer (ou améliorer) nos pièges ?"
 kobold_traps.33.a: "[733.GetName]"
 kobold_traps.33.b: "[740.GetName]"
