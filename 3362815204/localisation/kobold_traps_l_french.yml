 burrows_of_baycodds_desc: "D'anciens terriers-pièges, autrefois faits par des gnomes, ont été revitalisés par les kobolds. Les anciens pièges de Damestear bourdonnent de magie et d'histoire !"
 protector_of_all_kobolds: "Protecteur de Tous les Kobolds"
 protector_of_all_kobolds_desc: "Écailles-Bleues, Écailles-Vertes, Écailles-Rouges : les foyers des trois Viraxia ont été fortifiés et protégés. Tous les kobolds, quelle que soit leur teinte, sont en sécurité sous notre règne !"
 the_ciderscale_lair: "L'Antre d'Écaille-de-Cidre"
 the_ciderscale_lair_desc: "Le manoir du Seigneur Écaille-de-Cidre, le halfelin aux pieds rouges qui s'est proclamé kobold d'esprit, domine les pièges de la province. Au centre de la toile lencori, sa famille surveille tout !"
