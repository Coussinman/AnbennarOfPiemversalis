 trap_mastery_lvl_1: "Maîtrise des Pièges : Novices (1)"
 trap_mastery_lvl_1_desc: "Nous avons gagné de l'expérience dans l'art de fabriquer et d'utiliser des pièges. De cette expérience, nos défenses deviennent plus fortes !\n\nNous avons construit ou amélioré un total de §Y[Root.trap_mastery_counter.GetValue]§! Pièges Kobolds. Notre prochain palier sera à §Y20§! Pièges Kobolds."
 trap_mastery_lvl_2: "Maîtrise des Pièges : Compagnons (2)"
 trap_mastery_lvl_2_desc: "Nous sommes devenus experts dans toutes les formes de pièges, déceptions, collets et fosses. Nos ennemis sont facilement dupés, et nos armées sont plus que prêtes à bondir sur eux.\n\nNous avons construit ou amélioré un total de §Y[Root.trap_mastery_counter.GetValue]§! Pièges Kobolds. Notre prochain palier sera à §Y40§! Pièges Kobolds."
 trap_mastery_lvl_3: "Maîtrise des Pièges : Maestros (3)"
 trap_mastery_lvl_3_desc: "Trappes, batteries, embrasures, fosses à pointes, fosses à lave, fosses à acide, lance-flammes, lance-glaces, bêtes, fardeaux et plus encore... il n'y a pas de type de piège que nous ne pouvons utiliser. Tous les ennemis tombent, car ils essaient de nous attaquer là où nous sommes forts !\n\nNous avons construit ou amélioré un total de §Y[Root.trap_mastery_counter.GetValue]§! Pièges Kobolds. C'est le palier maximum !"
 trap_mastery_basic_tt: "Nous avons construit ou amélioré un total de §Y[Root.trap_mastery_counter.GetValue]§! Pièges Kobolds. Notre prochain palier sera à §Y5§! Pièges Kobolds."
