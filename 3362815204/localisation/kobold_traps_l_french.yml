## Dynamic Loc Options
 kobold_quote_1: "« Vous prenez les spores de champignons de flamme et les faites pousser dans les murs. Vous installez un fil-piège, qui tire sur le levier... et il bascule, provoquant les champignons. Leur mécanisme de défense : la flamme ! Comme le nom ! C'est aussi simple que ça. » — Maître-Piégeur Fegru"
 kobold_quote_2: "« Arrangez un seul groupe de kobolds comme appât. Assurez-vous qu'ils sont plus petits, plus rapides, et moins bien armés que leurs camarades. Attendez qu'ils aient été repérés, auquel moment ils devront se baisser, se cacher et fuir les attaquants. Ils les mèneront directement à la clairière dans les bois, auquel point ils plongeront dans le terrier pré-creusé. Alors, les kobolds environnants tireront des canons sur l'armée poursuivante, s'assurant qu'aucun ne survive. » — Tacticien Tikray"
 kobold_quote_3: "« Les drakes sont des créatures sacrées. Ils sont nos parents, car ils sont aussi des enfants de dragons ; et bien qu'ils n'aient pas notre ruse, ils ont la force de dix kobolds combinés. Comme ils nous ont protégés par le passé, ils nous protègent aujourd'hui ! Ne les honorons-nous pas en les déchaînant sur nos ennemis, en suspendant de la viande au-dessus de leurs têtes, en leur permettant le délectable festin de l'aventurier ? Ne leur permettons-nous pas la vraie expérience de la gloire draconique en leur permettant de combattre avec délice ? N'est-ce pas notre obligation de les entraîner pour les pièges, et de les armer contre nos ennemis ? » — Prêtre-Dragon Snepi"
 kobold_quote_4: "« Des insectes ! Couvrez-les d'insectes ! Les humains détestent les insectes ! » — Piégidaire Rudri"
 kobold_quote_5: "« Au bout du couloir, il y a une plaque de pression. NE MARCHEZ PAS SUR LA PLAQUE DE PRESSION. SI VOUS MARCHEZ SUR LA PLAQUE DE PRESSION, LA BOMBE EXPLOSE. VOUS MOURREZ. ÇA COÛTERA BEAUCOUP D'ARGENT DE REMPLACER LE PIÈGE. ENCORE : NE MARCHEZ PAS SUR LA PLAQUE DE PRESSION.\n\nAu moment d'écrire, cela fait trois jours depuis qu'un kobold a marché sur la plaque de pression. » — Instructions pour Utiliser les Pièges de Moorgaru, 1476"
 kobold_quote_6: "« La brèche la plus facile dans la structure des pièges est au point marqué d'un 'X' sur cette carte. Ne faiblissez pas quand la brèche se produit ; c'est fait exprès. L'ennemi se croira victorieux, et se précipitera à travers la brèche... directement dans un mur intérieur, couvert entièrement d'arbalètes pointées droit sur eux. Ils n'en sortiront pas vivants. » — Trapiste Uho"
 kobold_quote_7: "« Les chauves-souris sont des créatures utiles. Elles aident à répandre les spores de nos champignons préférés, et elles mangent plein de nuisibles qui pourraient ruiner nos récoltes ! Fait intéressant, il s'avère qu'elles hébergent aussi une multitude de maladies qui affectent les humains, mais pas les kobolds. Donc, je recommande fortement de garder des chauves-souris comme animaux de compagnie dans les pièges de caverne. Non seulement la garnison sera nourrie avec des champignons abondants et bien entretenus, mais tous les assiégeants pourraient succomber aux pestes de chauves-souris ! » — Lieutrapant Vitru"
 kobold_quote_8: "« Assurez-vous que le plus possible du piège est souterrain ; assurez-vous que tout le 'butin', que ce soit sous forme d'or de trésor ou de fournitures martiales, est gardé à l'étage le plus bas. Assurez-vous, aussi, que la poudre est gardée dans ces profondeurs. Si l'ennemi pénètre chaque couche de défenses, et réussit à pousser dans le dépôt de fournitures... eh bien, avec une explosion bien chronométrée, vous n'en sortirez pas, mais ils n'en sortiront pas non plus. Et l'or non plus. » — Trapfonceur Kovu"
 kobold_quote_9: "« Le sang du dragon coule dans nos veines ! L'héritage du dragon nous réchauffe et nous garde en sécurité à travers chaque nuit glaciale. Certains kobolds, et oh comme nous les bénissons, peuvent exploiter ce sang : les sorciers draconiques sont peu nombreux, mais leur souffle de feu de dragon émerveille tous nos ennemis. Ces sorciers sont des outils non seulement de moral, mais aussi d'une puissance de feu incroyable. Gardez un alchimiste à portée de main en tout temps pour brasser des potions qui peuvent augmenter la puissance du souffle de dragon, et vos pièges seront toujours en sécurité ! » — Prêtre-Dragon Drighad"
 kobold_quote_10: "« Ils pensent que la hauteur est leur avantage, mais c'est leur chute ! Les pièges à flèches tireront au niveau de la poitrine humaine, et rien de précieux ne sera accessible par quiconque de plus de quatre pieds de haut. Envoyez de la fumée chaude s'élever dans l'air, et laissez-les s'étouffer avec leurs propres égos ! » — Trapticien Erkil"
 kobold_quote_11: "« Mon plus grand chef-d'œuvre ? Il y avait un chemin de falaise maritime sur la route sud qui était un jour complet plus rapide que la route du col. Nous avions arrêté des armées entières là avant. Un général de Lorent a insisté pour marcher le long de ce chemin, prenant un temps précieux pour repérer et désamorcer chaque fil-piège ordinaire, inspecter chaque buisson. Lui a coûté des dizaines d'hommes pour une route dégagée.\n\nÀ un moment un pont dessus traverse la gorge de la rivière Koa, deux cents pieds en contrebas. Ils ont passé des JOURS à essayer de trouver comment nous avions piégé le pont cette fois. N'ont rien trouvé. Finalement le général a gonflé sa grosse personne et a traversé le pont au galop sur son cheval. Rien ne s'est passé. Il a crié sur toute son armée pour 'surestimer ces lézards' en chevauchant en avant.\n\nIl criait encore sur eux quand son cheval a marché sur une plaque à ressort cinquante pieds après le pont. Chaque fois que je pense à la tête qu'il faisait, et à la tête que son armée faisait, quand il a été lancé hurlant dans la mer, je n'arrive pas à m'arrêter de rire. » — Piégidaire Ris Œil-Acéré"
 kobold_quote_12: "« N'oubliez pas que les pièges simples sont parfois les plus efficaces. Oui, ils sont moins fantaisistes que nos pièges plus récents et élaborés, mais une fosse tuera un humain aussi sûrement qu'une bombe incendiaire ou une arbalète automatique.\n\nMaintenant, si vous voulez vraiment tromper un humain, faites-leur 'miraculeusement' surmonter des pièges difficiles, et quand ils s'approcheront de leur but, ils s'attendront à un autre, pas à un simple. Mon préféré ? Leur faire tomber un rocher dessus. Ils ne le voient littéralement jamais venir ! » — Trapticien Farol le Vieux"
 kobold_quote_13: "« Bien que beaucoup le rejettent, la boue est l'un des plus grands pièges que la nature a faits. Ça peut sembler basique, mais trouver le bon mélange demande de l'expérience. Faut s'assurer que la boue est assez épaisse pour que nous kobolds traversions, pendant que tout ce qui est plus gros, que ce soit humain ou machinerie gnome, s'enfoncera. Même si vous ne pouvez pas faire la fosse assez profonde pour noyer, vous pouvez toujours les piquer avec des lances pour les achever. Simple, pas cher, efficace. Et facile de récupérer leurs restes. » — Maître-Piégeur Metza"
 kobold_quote_14: "« Comme dit le vieux dicton, un humain perdu est un humain mort. Tout ce que vous avez à faire est de les attirer à travers une grotte où pousse le Fléau du Voyageur : grâce à ses spores, ils deviendront un peu intoxiqués, et — plus important — perdront tout sens de l'orientation. Vous aurez plus de facilité à diviser leur groupe, et à leur faire rencontrer leur fin. » — Trapetier Ristir"
 kobold_quote_15: "« Une façon bon marché de retarder ou de bloquer les aventuriers est simplement de saupoudrer des portes et des leviers partout. Ils n'ont pas à faire ou mener à quoi que ce soit, parce que les aventuriers ont été observés s'arrêtant et se disputant à la moindre trace d'un bouton. C'est une excellente méthode de temporisation : toutes vos troupes peuvent se repositionner, et vos autres pièges peuvent être relâchés, tout sur les malheureux aventuriers qui ne peuvent pas s'en empêcher. En plus, vous pouvez aussi faire en sorte que chaque huitième levier ACTIVE vraiment un autre piège ! Ils s'infligeront les conséquences eux-mêmes ! » — Trapéziste Glazna"
 kobold_quote_16: "« Aventuriers, prenez garde ! L'un des pièges les plus créatifs, sinon artistiques, rarement utilisés par les kobolds est une gueule de dragon improvisée avec un petit tas de biens précieux à l'intérieur. Vous pourriez penser que c'est un autel à piller à votre guise, mais ne vous y trompez pas : le trésor à l'intérieur est un appât, prêt à vous attirer. Si vous ramassez l'idole ou la gemme placée dans la gueule, un déclencheur sera activé, et la gueule tombera sur vous ! Ne vous laissez pas consumer par le dragon, qu'il soit taillé dans l'écaille ou la pierre ! » — Guide de Terrain pour Combattre les Kobolds de la Côte-du-Dragon, Treizième Édition"
 kobold_quote_17: "« C'est très bien si certains kobolds veulent inviter des humains égarés dans leur trivu, laissez mille écailles briller en ce qui me concerne. Mais je ne passerai pas de temps là-dessus, parce qu'entre-temps, tous les trois mois, un kobold se fait mettre en pièces par des drakes dans des pièges mal entretenus. » — Politrapien Kob"
 kobold_quote_18: "« Aussi mortelles que les choses que nous concevons puissent être, nous avons découvert que le monde de la surface est plus cruel et plus rusé qu'aucun kobold. Sous les montagnes et la terre, il y avait des bassins d'eau, et beaucoup de kobolds sont d'habiles nageurs. Pourtant nous n'étions pas préparés à l'immensité de la mer, ni à la force de son courant. Beaucoup de pionniers précoces qui cherchaient la générosité des vagues ont découvert que la marée était une force avec laquelle il ne fallait pas plaisanter, et beaucoup de kobolds ont été emportés vers le large et jamais revus. Lentement, avec le temps, nous avons compris la nature des vagues affamées... et avec la compréhension est venue l'invention des Pièges à Marée.\n\nLes Pièges à Marée sont une construction relativement simple, une fosse avec une trappe en bois placée dessus. Cependant, la trappe est placée sur une seule charnière et les fosses sont creusées dans des endroits qui sont submergés à marée haute. Pendant la marée haute, la fosse est sûre à traverser, car l'eau aide à soutenir la trappe. Cependant, à marée basse, la trappe se détachera et fera tomber la malheureuse victime dans la fosse. S'ils restent dans la fosse jusqu'à marée haute, ils se noieront. Cela permet au piège d'être seulement aussi mortel que nécessaire, avec les kobolds stupides qui y errent étant facilement secourus, et les aventuriers dangereux laissés à la merci de la mer. Ou son absence. » — Trapvoyant Soxxus Écaille-Verte"
 kobold_quote_19: "« Les gnomes — que Malliath me pardonne de prononcer leur nom — sont plus intéressés à lire et récupérer les ruines de leur pays perdu qu'à vraiment combattre. En tapissant les tunnels d'écriture kobold et d'ancienne littérature gnome, nous ralentissons les avancées de tout envahisseur, permettant à notre contre-attaque d'être mieux organisée et à leur élément de surprise d'être perdu. Peu importe que nous écrivions des contes pour enfants ou des secrets d'État, les gnomes ralentis n'auront pas la chance de le dire à leurs hideux alliés une fois que nous en aurons fini avec eux. » — Prêtre-Dragon Quetzal"
 kobold_quote_20: "« Même quand nous apprenons leur stupide langue, personne ne nous écoute jamais ! Nous leur disons combien les dragons sont géniaux, ils babillent sur leurs stupides dieux. Nous leur disons de rester hors de nos terres, ils débarquent avec des armes ! Alors, très bien, qu'ils n'écoutent pas ! En fournissant un chemin sûr bien marqué, nous pouvons assurer que tout imbécile 'intelligent' l'évitera en faveur de marcher directement dans nos pièges. Nous appelons cette tendance la 'pensée à l'envers'. Et, bien sûr, ça ne fait pas de mal de saupoudrer quelques pièges non marqués le long du chemin sûr, que seuls nous connaissons. » — Krr'Nax, Parleur-Humain désigné"
 kobold_quote_21: "« Parfois, mon génie, il m'étonne ! La beauté dans sa simplicité, la pure RÉUTILISABILITÉ ! En utilisant la vélocité de l'eau détournée des lacs souterrains voisins ou du ruissellement des sommets de montagne, canalisée à travers un très long tunnel sinueux, associée à des fosses tombant dans ce tunnel, quiconque OSE envahir nos tunnels sera forcé à travers une cascade d'eau à haute pression, les désorientant de tous les virages et tournants et les noyant tout du long. Et si l'eau et la turbulence ne les ont pas, nous attendrons juste là où ça se vide dans une citerne, prêts à draguer leurs corps pour tout butin !\n\nADDENDUM : Certains de mes collègues ont fait remarquer que peut-être une telle idée pourrait être utilisée de manière récréative. RIDICULE ! Un tel design est trop parfait pour être utilisé pour des raisons aussi banales ! » — Territect Saklu"

 gerudian_kobold_traps: "Pièges Kobolds Gérudiens"

