 kobold_traps_provinces: "Provinces de Pièges Kobolds"

# Modifiers
 kobold_traps_lvl_1: "Pièges Kobolds : Improvisés (1)"
 kobold_traps_lvl_1_desc: "Des champignons de caverne sont transformés en bombes puantes. Des outils de chasse sont reconvertis pour le combat. Des kobolds désespérés construisent des défenses à partir de rien.\n\nCe modificateur est retiré si la province est assiégée avec succès par un non-kobold ! Il est aussi retiré si le fort de la province est supprimé."
 kobold_traps_lvl_2: "Pièges Kobolds : Fortifiés (2)"
 kobold_traps_lvl_2_desc: "La ferraille cède la place aux alliages modernes. Les canons sont aussi communs que les arbalètes. Les pièges de la province sont plus forts que jamais.\n\nCe modificateur est retiré si la province est assiégée avec succès par un non-kobold ! Il est aussi retiré si le fort de la province est supprimé."
 kobold_traps_lvl_3: "Pièges Kobolds : Massifs (3)"
 kobold_traps_lvl_3_desc: "Une boule de feu explose d'une minuscule embrasure. Des gaz empoisonnés sont pompés par des tuyaux métalliques et des sorciers draconiques. Les défenses kobolds grandissent.\n\nCe modificateur est retiré si la province est assiégée avec succès par un non-kobold ! Il est aussi retiré si le fort de la province est supprimé."
 kobold_traps_lvl_4: "Pièges Kobolds : Labyrinthiques (4)"
 kobold_traps_lvl_4_desc: "Des drakes patrouillent le périmètre, cherchant leur proie. Des batteries camouflées cachent des kobolds derrière chaque coin. La province est gérée comme une machine défensive, et tous les attaquants tomberont devant sa puissance.\n\nCe modificateur est retiré si la province est assiégée avec succès par un non-kobold ! Il est aussi retiré si le fort de la province est supprimé."

 modified_kobold_traps_lvl_1: "Pièges de Dette Kobolds : Improvisés (1)"
 modified_kobold_traps_lvl_1_desc: "\n\nCe modificateur est retiré si la province est assiégée avec succès par un non-kobold ! Il est aussi retiré si le fort de la province est supprimé."
 modified_kobold_traps_lvl_2: "Pièges de Dette Kobolds : Fortifiés (2)"
