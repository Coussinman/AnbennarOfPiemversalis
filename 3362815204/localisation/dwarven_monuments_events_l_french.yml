dwarven_monuments_vaulthold.1.t: "Technologie des Précurseurs"
dwarven_monuments_vaulthold.1.d: "À l'intérieur de la Forteresse-Coffre, nous avons découvert quelque chose d'incroyable. D'anciennes technologies oubliées depuis longtemps et mises sous scellés, des manuscrits, des manuels, des livres et bien d'autres documents emplis de savoirs ancestraux consignés par les nains de l'ancien empire avant l'effondrement. Une grande partie de cette technologie semble dater de l'époque de la Guerre des Âges, lorsque les nains affrontaient les armées de l'elfe précurseur Ducaniel.\nLa question demeure : devons-nous officialiser une branche de l'État consacrée au perfectionnement de cette technologie ?"
dwarven_monuments_vaulthold.1.a: "Les secrets de la Forteresse-Coffre serviront l'État !"
dwarven_monuments_vaulthold.1.b: "Il serait imprudent de perturber cette technologie ancienne. Mieux vaut la laisser en paix."
dwarven_monuments_vaulthold.1.c: "L'artisanat magique ? Mais nous maîtrisons déjà l'artisanat magique !"
dwarven_monuments_vaulthold.1.e: "Bien que nous connaissions déjà cette technologie, nous pouvons exploiter le contenu de la voûte."

dwarven_monuments_goblinslayer_academy.1.t: "Éducation du [Root.Monarch.GetTitle] : Académie des Pourfendeurs de Gobelins"
dwarven_monuments_goblinslayer_academy.1.d: "Avec les dernières touches et améliorations apportées à la nouvelle Académie des Pourfendeurs de Gobelins, notre [Root.Monarch.GetTitle] a décidé de s'inscrire à une formation brève mais rigoureuse afin d'affiner ses compétences militaires et sa connaissance du champ de bataille. Sur quoi notre [Root.Monarch.GetTitle] devrait-il se concentrer ?"
dwarven_monuments_goblinslayer_academy.1.a: "Notre [Root.Monarch.GetTitle] devrait s'intéresser à la discipline et à l'ordre."
dwarven_monuments_goblinslayer_academy.1.b: "Notre [Root.Monarch.GetTitle] devrait apprendre à organiser au mieux notre état-major."
dwarven_monuments_goblinslayer_academy.1.c: "Notre [Root.Monarch.GetTitle] devrait être capable d'inspirer les troupes !"
dwarven_monuments_goblinslayer_academy.1.e: "C'est dans la tactique que l'action se joue, c'est là que notre [Root.Monarch.GetTitle] devrait se concentrer."
dwarven_monuments_goblinslayer_academy.1.f: "Et si notre [Root.Monarch.GetTitle] s'initiait un peu à tout ?"