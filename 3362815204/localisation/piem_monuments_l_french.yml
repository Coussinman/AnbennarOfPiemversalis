l_french:

old_colosseum_of_damucen_title: "Ancien Colisée de Damucen"
old_colosseum_of_damucen: "Ancien Colisée de Damucen"
great_project_old_colosseum_of_damucen: "Ancien Colisée de Damucen"
old_colosseum_of_damucen_desc: "L'Ancien Colisée de Damucen, dressé au cœur du quartier du Marché-aux-Colombes d'Anbenncóst, est une relique de l'antique République Damérienne. Jadis cœur battant du spectacle et du sang, où gladiateurs et bêtes féroces s'affrontaient devant des foules rugissantes, il demeure aujourd'hui un monument témoignant de l'amour de Cannor pour la gloire, la vaillance et le divertissement."


order_of_chroniclers_headquarters_title: "Quartier Général de l'Ordre des Chroniqueurs"
order_of_chroniclers_headquarters: "Quartier Général de l'Ordre des Chroniqueurs"
great_project_order_of_chroniclers_headquarters: "Quartier Général de l'Ordre des Chroniqueurs"
order_of_chroniclers_headquarters_desc: "Situé dans le Quartier des Temples d'Anbenncóst, le Quartier Général de l'Ordre des Chroniqueurs est le cœur battant du savoir à travers tout Cannor. Depuis ce grand hall, érudits et historiens rassemblent récits, tomes et vérités des quatre coins du monde afin de préserver l'héritage de chaque ère."

dovemarket_bazaar_title: "Bazar du Marché-aux-Colombes"
dovemarket_bazaar: "Bazar du Marché-aux-Colombes"
great_project_dovemarket_bazaar: "Bazar du Marché-aux-Colombes"
dovemarket_bazaar_desc: "Le Bazar du Marché-aux-Colombes d'Anbenncóst est un labyrinthe tentaculaire de marchands, de senteurs et de couleurs où se rassemblent négociants venus de tout Cannor et d'au-delà. Des soies les plus fines aux reliques aelantiriennes les plus rares, ce bazar constitue la véritable sève nourricière de la richesse et de l'esprit cosmopolite de la cité."

bells_of_reverence_title: "Cloches de la Révérence"
bells_of_reverence: "Cloches de la Révérence"
great_project_bells_of_reverence: "Cloches de la Révérence"
bells_of_reverence_desc: "Les Cloches de la Révérence de Tellum résonnent à travers les vallées de Damérie, leurs sons bénissant dit-on les fidèles et repoussant les mauvais présages. Forgées par des forgerons divins et accordées par des chants sacerdotaux, leur carillon marque couronnements, funérailles et grands augures à travers tout Cannor."

ashenfield_casino_title: "Grand Casino d'Ashenfield"
ashenfield_casino: "Grand Casino d'Ashenfield"
great_project_ashenfield_casino: "Grand Casino d'Ashenfield"
ashenfield_casino_desc: "Monument dédié tant à la fortune qu'à la folie, le Grand Casino d'Ashenfield attire nobles, marchands et aventuriers désireux de mettre leur chance à l'épreuve. L'or y coule comme le vin, et maintes fortunes s'y font et s'y défont sous l'éclat de ses lustres scintillants, inspiré par la maison de jeu des Collines-du-Corbeau."

salt_mine_of_the_empire_title: "Mine de Sel de l'Empire"
salt_mine_of_the_empire: "Mine de Sel de l'Empire"
great_project_salt_mine_of_the_empire: "Mine de Sel de l'Empire"
salt_mine_of_the_empire_desc: "On raconte que toutes les larmes des dieux infernaux furent bues en ces lieux, donnant naissance à une mine de sel éternelle."

castle_of_the_second_sons_title: "Château des Seconds Fils"
castle_of_the_second_sons: "Château des Seconds Fils"
great_project_castle_of_the_second_sons: "Château des Seconds Fils"
castle_of_the_second_sons_desc: "Demeure des légendaires Seconds Fils de l'Empire, cette forteresse sert à la fois de caserne et de bastion pour ceux qui combattent au nom de l'honneur et de la fraternité. Ses halls résonnent de chants célébrant les campagnes victorieuses et les compagnons perdus aux quatre coins de Cannor."

magical_wind_mill_title: "Moulin à Vent Magique"
magical_wind_mill: "Moulin à Vent Magique"
great_project_magical_wind_mill: "Moulin à Vent Magique"
magical_wind_mill_desc: "Dominant les plaines ondoyantes de Tourvent, ce moulin enchanté exploite tant le vent que le mana pour moudre le grain, tisser les étoffes et alimenter d'ingénieuses mécaniques. Son ronronnement rythmé s'entend à des lieues à la ronde, symbole de l'ingéniosité damérienne et de la maîtrise arcanique de ses artisans."

imperial_vineyard_title: "Vignoble Impérial"
imperial_vineyard: "Vignoble Impérial"
great_project_imperial_vineyard: "Vignoble Impérial"
imperial_vineyard_desc: "Niché parmi les collines fertiles de Port-du-Vin, le Vignoble Impérial produit des crus prisés dans les cours des rois comme des empereurs. Chaque vendange est bénie lors de cérémonies élaborées, et chaque bouteille porte en elle l'héritage du noble terroir damérien."

grand_cellars_of_sornbay_title: "Grandes Caves de Sornbay"
grand_cellars_of_sornbay: "Grandes Caves de Sornbay"
great_project_grand_cellars_of_sornbay: "Grandes Caves de Sornbay"
grand_cellars_of_sornbay_desc: "Sous les douces collines de Sornbay s'étendent les Grandes Caves, un labyrinthe sans fin de fûts de chêne et de voûtes de pierre où les plus fins crus de la Baie-du-Vin vieillissent jusqu'à la perfection. L'air y est frais, suave et chargé de siècles de savoir-faire et de festivités."

munas_pearl_lighthouse_title: "Phare de la Perle de Munas"
munas_pearl_lighthouse: "Phare de la Perle de Munas"
great_project_munas_pearl_lighthouse: "Phare de la Perle de Munas"
munas_pearl_lighthouse_desc: "Couronné par la sacrée Perle de Munas, ce phare radieux concentre la lumière divine en un rayon aveuglant capable d'embraser les navires ennemis. Vénéré à la fois comme arme et relique sainte, il guide les fidèles à travers les tempêtes et foudroie les hérétiques qui défient la volonté des mers."

wall_of_castonath_1_title: "Murailles Blanches de Castanor"
wall_of_castonath_1: "Murailles Blanches de Castanor"
great_project_wall_of_castonath_1: "Murailles Blanches de Castanor"
wall_of_castonath_1_desc: "Les Murailles Blanches de Castanor, aujourd'hui en ruines, pourraient, une fois rebâties, reformer la défense impénétrable qui protégeait jadis le royaume en leur sein."

