great_cave_of_murtrhol:0 "Grande Caverne de Murtrhol"
great_cave_of_murtrhol_desc:0 "Grandes cavernes des trolls des glaces, peu osent y pénétrer, et moins encore en reviennent. Mais ceux qui survivent en ressortent endurcis par leur passage dans cet enfer gelé empli de monstres terrifiants."
great_cave_of_murtrhol_tier_1:0 "Structure de Base"
great_cave_of_murtrhol_tier_2:0 "Monument Amélioré"
