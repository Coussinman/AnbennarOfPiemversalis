ruin_of_corveld_tier_2:0 "Monument Amélioré"
ruin_of_corveld_tier_3:0 "Grand Monument"


ruin_of_verham:0 "Ruines de Verham"
ruin_of_verham_desc:0 "Une section des ruines de la grande cité méridionale d'Escann, abandonnée après le grand massacre perpétré par les orques lors de la Marée Verte. Une fois rebâties, elles pourraient conférer à leur propriétaire une force économique et défensive considérable sur la région."
