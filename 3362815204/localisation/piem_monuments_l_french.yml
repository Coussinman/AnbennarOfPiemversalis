ruin_of_corveld:0 "Ruines de Corveld"
ruin_of_corveld_desc:0 "L'ancienne capitale de Dostanor et des Korbarides, jadis cité prospère bâtie en un emplacement idéal à un estuaire majeur, n'est désormais plus que ruines attendant d'être explorées et rebâties."
