castle_of_the_kings_of_the_breach:0 "Château des Rois de la Brèche"
castle_of_the_kings_of_the_breach_desc:0 "Château principal de la dynastie Cœur-Brisé, une forteresse mythique dont on dit qu'elle peut résister à des armées dix fois supérieures en nombre pendant des années. C'est également le plus grand centre administratif de la région des Bois du Nord."
