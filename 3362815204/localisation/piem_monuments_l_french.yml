apothecaries_market:0 "Marché des Apothicaires"
apothecaries_market_desc:0 "Cité des apothicaires et marchands de potions ; ici l'on trouve de tout, surtout ce qui est mortel et ce qui peut servir à confectionner des pièges. Pourtant les élixirs concoctés ici comptent parmi les plus renommés de tout l'empire, permettant un commerce fort lucratif."
apothecaries_market_tier_1:0 "Structure de Base"
apothecaries_market_tier_2:0 "Monument Amélioré"
apothecaries_market_tier_3:0 "Grand Monument"
