silk_market_of_redglades:0 "Marché de la Soie des Clairières-Rouges"
silk_market_of_redglades_desc:0 "Cette soie mystique est rarement récoltée en raison du danger de la zone où elle se trouve, une forêt profonde, mais si elle était un jour pleinement exploitée, elle deviendrait sans nul doute l'un des biens les plus précieux à échanger, capable de bouleverser les marchés de la soie du monde entier."
