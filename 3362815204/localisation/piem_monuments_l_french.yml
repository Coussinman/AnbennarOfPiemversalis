marines_training_camp_of_exwes_desc:0 "Ici s'entraînent les plus fins marins de l'empire, ceux à qui l'on confie les missions les plus difficiles et les batailles les plus féroces, ce qui leur vaut également leur renommée à travers tout Cannor."
