moonhaven_gp_title: "Havre-Lunaire"
moonhaven_gp: "Havre-Lunaire"
great_project_moonhaven_gp: "Havre-Lunaire"
moonhaven_gp_desc: "La capitale des Elfes de l'Empire. Ses hautes murailles blanches inspirent confiance, mais sont surtout renommées pour leur beauté. Ici, les Elfes partagèrent leur savoir-faire après leur arrivée en Escann... Nombre de soldats viennent y parfaire leur art du combat elfique, espérant peut-être ressembler à ces êtres gracieux."
monhaven_tier3: "Cité Resplendissante"


strait_of_the_lion_s_collar:0 "Détroit du Collier-du-Lion"
strait_of_the_lion_s_collar_desc:0 "Ce détroit, avec ses lions rugissants de chaque côté de la baie, garde le passage entre les terres de Busilar et l'île d'Eborthil, centre commercial de la région. Essentiel pour atteindre l'île, le contrôle de ce détroit est tout aussi important pour son impact économique, chaque passage étant naturellement taxé au profit des seigneurs locaux."
strait_of_the_lion_s_collar_tier_1:0 "Structure de Base"
strait_of_the_lion_s_collar_tier_2:0 "Monument Amélioré"
strait_of_the_lion_s_collar_tier_3:0 "Grand Monument"


strait_of_the_stone_s_gaze:0 "Détroit du Regard-de-Pierre"
strait_of_the_stone_s_gaze_desc:0 "Ce détroit, avec ses lions rugissants de chaque côté de la baie, garde le passage entre les terres de Busilar et l'île d'Eborthil, centre commercial de la région. Essentiel pour atteindre l'île, le contrôle de ce détroit est tout aussi important pour son impact économique, chaque passage étant naturellement taxé au profit des seigneurs locaux."
strait_of_the_stone_s_gaze_tier_1:0 "Structure de Base"
strait_of_the_stone_s_gaze_tier_2:0 "Monument Amélioré"
strait_of_the_stone_s_gaze_tier_3:0 "Grand Monument"


great_temple_of_begga:0 "Grand Temple de Begga"
great_temple_of_begga_desc:0 "Temple de la déesse de la bonté et de la charité, lieu où Begga s'éleva à la divinité. Situé au cœur des beaux quartiers de la cité marchande habitée par les halfelins, l'édifice lui-même reflète les préceptes de la déesse, d'une très grande humilité."
great_temple_of_begga_tier_1:0 "Structure de Base"
great_temple_of_begga_tier_2:0 "Monument Amélioré"
great_temple_of_begga_tier_3:0 "Grand Monument"


ruby_north_gate:0 "Porte-de-la-Rivière"
ruby_north_gate_desc:0 "Nichées dans les montagnes froides formant les contreforts des Monts-du-Rubis, elles permettent de descendre profondément sous terre jusqu'au bastion nain. Ces portes agissent alors comme de véritables forteresses imprenables gardant l'entrée d'un royaume riche et prospère, garantissant aux nains de pouvoir poursuivre leurs fouilles en paix."
ruby_north_gate_tier_1:0 "Structure de Base"
ruby_north_gate_tier_2:0 "Monument Amélioré"
ruby_north_gate_tier_3:0 "Grand Monument"


ruby_south_gate:0 "Porte-Rouge"
ruby_south_gate_desc:0 "Nichées dans les montagnes froides formant les contreforts des Monts-du-Rubis, elles permettent de descendre profondément sous terre jusqu'au bastion nain. Ces portes agissent alors comme de véritables forteresses imprenables gardant l'entrée d'un royaume riche et prospère, garantissant aux nains de pouvoir poursuivre leurs fouilles en paix."
ruby_south_gate_tier_1:0 "Structure de Base"
ruby_south_gate_tier_2:0 "Monument Amélioré"
ruby_south_gate_tier_3:0 "Grand Monument"


rosemetal_mines:0 "Mines de Métal-Rose"
rosemetal_mines_desc:0 "Emplacement des célèbres filons de métal-rose utilisé pour forger couronnes et armures de prestige, renommées dans tout l'empire pour leurs qualités et surtout leur beauté."
rosemetal_mines_tier_1:0 "Structure de Base"
rosemetal_mines_tier_2:0 "Monument Amélioré"
rosemetal_mines_tier_3:0 "Grand Monument"
rosemetal_works: "Mine de Métal-Rose en Construction"

ulric_s_sanctuary:0 "Sanctuaire d'Ulric"
ulric_s_sanctuary_desc:0 "Tandis que les dompteurs de griffons ont leur académie à l'est de l'ancien bastion nain, ici ce sont les bêtes elles-mêmes qui sont élevées dans un unique dessein : faire la guerre."
ulric_s_sanctuary_tier_1:0 "Structure de Base"
ulric_s_sanctuary_tier_2:0 "Monument Amélioré"
ulric_s_sanctuary_tier_3:0 "Grand Monument"


corinfall:0 "Chute-de-Corin"
corinfall_desc:0 "Ici tomba Corin l'héroïne, destructrice de la Marée Verte, lors de son ultime bataille contre le chef orque Korgus Dookanson. Ici tomba l'avatar du dieu de la guerre, qui devint alors la déesse de la guerre à sa place. Ici, ses compagnons érigèrent un petit tertre qui attire désormais toujours plus de pèlerins."
corinfall_tier_1:0 "Structure de Base"
corinfall_tier_2:0 "Monument Amélioré"
corinfall_tier_3:0 "Grand Monument"


munas_temple:0 "Grand Temple de Munas"
munas_temple_desc:0 "L'un des plus beaux temples, arborant un magnifique style elfique, de la Cour Régente. Situé au cœur même du prospère port elfique de Port-Munas, ce monument est également probablement l'un des plus visités, en raison de l'activité bouillonnante du lieu, facteur essentiel de sa renommée."
munas_temple_tier_1:0 "Structure de Base"
munas_temple_tier_2:0 "Monument Amélioré"
munas_temple_tier_3:0 "Grand Monument"


adeanscour_temple:0 "Grand Temple d'Adean"
adeanscour_temple_desc:0 "Assurément le plus ancien temple de la Cour Régente, il demeure à ce jour la demeure de la Congrégation du Bon Chevalier. De nombreux hommes d'armes viennent y effectuer un pèlerinage pour se remémorer les préceptes de la chevalerie, mais surtout pour s'entraîner au combat monté."
adeanscour_temple_tier_1:0 "Structure de Base"
adeanscour_temple_tier_2:0 "Monument Amélioré"
adeanscour_temple_tier_3:0 "Grand Monument"


great_oldport:0 "Grand Vieux-Port"
great_oldport_desc:0 "Ce port n'attend qu'à être achevé ; il constituera le fondement de votre puissance navale à son apogée et rayonnera dans toute la région. Une fois terminé, il offrira à vos navires des capacités navales améliorées."
great_oldport_tier_1:0 "Structure de Base"
great_oldport_tier_2:0 "Monument Amélioré"
great_oldport_tier_3:0 "Grand Monument"


