port_of_bretonia:0 "Port de Bretonia"
port_of_bretonia_desc:0 "Ici, le célèbre marchand Boloré de la Rêverie fit fortune ; le port est bâti à son image, décadent et magnifique. En plus d'être un havre naval exceptionnel, ce lieu rassemble toute l'aristocratie de la Rêverie et ses relations à travers le monde."
