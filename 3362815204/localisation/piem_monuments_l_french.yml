nest_of_the_ice_queen:0 "Nid de la Reine des Glaces"
nest_of_the_ice_queen_desc:0 "Ici les harpies du nord ont établi leur nid principal. Dans cette forteresse en ruines au sommet d'une montagne, les jeunes harpies apprennent à voler et à s'endurcir."
nest_of_the_ice_queen_tier_1:0 "Structure de Base"
nest_of_the_ice_queen_tier_2:0 "Monument Amélioré"
nest_of_the_ice_queen_tier_3:0 "Grand Monument"


house_of_redemption:0 "Maison de la Rédemption"
house_of_redemption_desc:0 "Le plus grand marché aux esclaves de tout Cannor, établi après être devenu le premier producteur d'esclaves d'Escann à la suite d'un événement. Il peut être relocalisé si les conditions requises ne sont plus remplies."
house_of_redemption_tier_1:0 "Structure de Base"
house_of_redemption_tier_2:0 "Monument Amélioré"
house_of_redemption_tier_3:0 "Grand Monument"


hq_of_asra_bank:0 "Siège de la Banque Asra"
hq_of_asra_bank_desc:0 "La banque la plus prestigieuse de tout Cannor, qui se relocalise là où ses intérêts l'exigent. Elle peut être déplacée si les conditions requises ne sont plus remplies."
hq_of_asra_bank_tier_1:0 "Structure de Base"
hq_of_asra_bank_tier_2:0 "Monument Amélioré"
hq_of_asra_bank_tier_3:0 "Grand Monument"


milcorissia_labyrinth:0 "Labyrinthe de Milcorissia"
milcorissia_labyrinth_desc:0 "Le labyrinthe de Milcorissia recèle les secrets les plus sombres de l'antique nation. Le dédale est infesté de minotaures et de toutes sortes de monstres, pourtant il attire des aventuriers du monde entier en quête des artefacts milcoriens qui s'y trouveraient. La vérité, cependant, est qu'il dissimule quelque chose de bien plus sinistre..."

grifroche_sanctuary:0 "Sanctuaire de Grifferoche"
grifroche_sanctuary_desc:0 "Dans ce sanctuaire perché en altitude, les plus fiers griffons sont élevés et dressés pour la guerre. Les maîtres-bêtes consacrent leur vie à enseigner aux jeunes créatures à voler en formation, à fondre sur leurs ennemis et à porter des cavaliers d'élite au combat. Le crissement des serres sur la pierre et le tonnerre des ailes puissantes résonnent jour et nuit, rappelant à tous que c'est ici que naissent les futurs seigneurs des cieux."

sanctuary_toxic_wings:0 "Sanctuaire des Ailes Toxiques"
sanctuary_toxic_wings_desv:0 "Au sein de ces fosses rocheuses lourdement gardées, des wyvernes sont élevées à des fins militaires. Sauvages, agressives et quasi impossibles à contrôler, elles ne s'inclinent que devant la force et la discipline implacable de leurs dresseurs. Ici elles apprennent à reconnaître leur maître, à frapper les lignes ennemies depuis les airs et à répandre la terreur sur le champ de bataille. Peu quittent ces lieux sans cicatrices... si tant est qu'ils en repartent."