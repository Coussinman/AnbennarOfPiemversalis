great_port_jaher_tier_2:0 "Monument Amélioré"
great_port_jaher_tier_3:0 "Grand Monument"


dorum_odir_temple:0 "Temple de Dorum Odir"
dorum_odir_temple_desc:0 "Le temple du dieu des forgerons ; ici résonnent encore les sons des marteaux et des enclumes, ici sont forgées armes et outils légendaires, et les artisans apprennent à exceller sous la tutelle des apôtres de leur dieu."
dorum_odir_temple_tier_1:0 "Structure de Base"
dorum_odir_temple_tier_2:0 "Monument Amélioré"
dorum_odir_temple_tier_3:0 "Grand Monument"


parliament_of_the_cities_of_munas:0 "Parlement des Cités de Munas"
parliament_of_the_cities_of_munas_desc:0 "Là où se prennent les décisions pour toutes les cités fluviales."
parliament_of_the_cities_of_munas_tier_1:0 "Structure de Base"
parliament_of_the_cities_of_munas_tier_2:0 "Monument Amélioré"
parliament_of_the_cities_of_munas_tier_3:0 "Grand Monument"


aldtemple:0 "Aldtemple"
aldtemple_desc:0 "Bien qu'il puisse paraître profane, ce lieu est en réalité l'un des sites les plus sacrés de la déesse Chasseresse. Ceux qui cherchent un défi à leur mesure viennent ici se soumettre aux épreuves de la déesse, et en ressortent ainsi... changés."
aldtemple_tier_1:0 "Structure de Base"
aldtemple_tier_2:0 "Monument Amélioré"
aldtemple_tier_3:0 "Grand Monument"


azuls_mother_sanctuary:0 "Sanctuaire de la Mère"
azuls_mother_sanctuary_desc:0 "Le plus grand temple d'Esmaryal, renommé dans tout l'empire et au-delà pour sa beauté. On dit qu'il peut accueillir plusieurs milliers de pèlerins à la fois."
azuls_mother_sanctuary_tier_1:0 "Structure de Base"
azuls_mother_sanctuary_tier_2:0 "Monument Amélioré"
azuls_mother_sanctuary_tier_3:0 "Grand Monument"


gemsiles:0 "Îles-aux-Gemmes"
gemsiles_desc:0 "Ici, les pierres précieuses peuvent être ramassées à pleines mains ; certains disent même qu'on en trouve sur les plages de sable fin de l'île. Cette île est donc âprement disputée par toutes les puissances maritimes de la région."
gemsiles_tier_1:0 "Structure de Base"
gemsiles_tier_2:0 "Monument Amélioré"
gemsiles_tier_3:0 "Grand Monument"


magisterium_tower:0 "Tour du Magisterium"
magisterium_tower_desc:0 "Une vieille tour en construction, emplie de livres et de vieux sages qui pourraient la faire exploser à tout instant."
magisterium_tower_tier_1:0 "Structure de Base"
magisterium_tower_tier_2:0 "Monument Amélioré"
magisterium_tower_tier_3:0 "Grand Monument"


old_capital_of_dameria:0 "Ancienne Capitale de Damérie"
old_capital_of_dameria_desc:0 "Ici repose l'ancienne capitale de la République de Damérie, terre des défunts Silmunas, un centre administratif habitué à gérer un vaste territoire et qui consommait une grande part de la production de papier de l'île et des régions environnantes."
old_capital_of_dameria_tier_1:0 "Structure de Base"
old_capital_of_dameria_tier_2:0 "Monument Amélioré"
old_capital_of_dameria_tier_3:0 "Grand Monument"


