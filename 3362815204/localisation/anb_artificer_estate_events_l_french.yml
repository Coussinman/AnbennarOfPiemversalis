l_french:
 artificers_estate_events.1.t:0 "Ascension des classes d'artificiers"
 artificers_estate_events.1.d:0 "Le statut des $ESTATE_ARTIFICERS$ ne repose pas sur les mêmes traditions ancestrales que celui des états traditionnels. Ils ont dû bâtir leur propre fortune par un labeur acharné et en trouvant sans cesse de nouveaux moyens d'améliorer la production. En règle générale, cependant, cette entreprise leur a fort bien réussi ces derniers temps. Bien que moins prestigieux que d'autres, le négoce et l'industrie constituent à bien des égards l'épine dorsale de notre économie, et grâce à leur mainmise sur les moyens de production, les $ESTATE_ARTIFICERS$ sont parvenus à accroître leur emprise sur notre pays."
 artificers_estate_events.1.a:0 "Entendu."
 EST_VAL_ARTIFICERS_ADVANCE:0 "Ascension des classes d'artificiers : §Y$VAL$%§!"
 artificers_estate_events.2.t:0 "Déclin des classes manufacturières"
 artificers_estate_events.2.d:0 "Sans les anciens privilèges ni les lignages des autres factions, le statut et l'influence des $ESTATE_ARTIFICERS$ ne jouissent jamais de la même assurance que ceux des héritiers du pouvoir. Dernièrement, une conjonction de revers dans la production et d'ambitions politiques mal aiguillées a entraîné une perte de pouvoir et d'influence pour les $ESTATE_ARTIFICERS$ de [Root.GetName]."
 artificers_estate_events.2.a:0 "Entendu."
 EST_VAL_ARTIFICERS_DECLINE:0 "Déclin des classes manufacturières : §Y$VAL$%§!"
 artificers_estate_events.3.t:0 "Libre-échange ou protectionnisme ?"
 artificers_estate_events.3.d:0 "Un pays doit-il rechercher l'autosuffisance ou les bonnes affaires à l'étranger ? Un débat presque aussi vieux que l'économie elle-même. La question ne se simplifie guère lorsque l'on confond les intérêts de sa propre classe avec le bien-être du pays, comme c'est le cas aujourd'hui : nos $ESTATE_ARTIFICERS$ exigent des mesures mercantilistes pour protéger leurs revenus, tandis que nos marchands réclament l'abolition de toutes les taxes douanières qui font grimper les prix et rongent leurs profits. La situation se détériore, chaque camp accusant l'autre de trahir la patrie. Nous devons soit prendre parti, soit élaborer un compromis. Quoi que nous décidions, les conséquences seront sévères."
 artificers_estate_events.3.a:0 "Les $ESTATE_BURGHERS$ ont raison : il nous faut le libre-échange."
 artificers_estate_events.3.b:0 "Les $ESTATE_ARTIFICERS$ ont raison : il nous faut le protectionnisme."
 artificers_estate_events.3.c:0 "Tentons de contenter les deux camps en combinant libre-échange et subventions à l'industrie."
 EST_VAL_BURGHERS_FREE_TRADE:0 "Bénéfices de la politique de libre-échange : §Y$VAL$%§!"
 EST_VAL_BURGHERS_PROTECTIONISM:0 "Pâtit de la politique protectionniste : §Y$VAL$%§!"
 EST_VAL_ARTIFICERS_FREE_TRADE:0 "Souffre de la concurrence étrangère : §Y$VAL$%§!"
 EST_VAL_ARTIFICERS_PROTECTIONISM:0 "Protégé de la concurrence étrangère : §Y$VAL$%§!"
 artificers_estate_events.4.t:0 "Les paysans migrent vers les cités"
 artificers_estate_events.4.d:0 "Récemment, certains de nos $ESTATE_NOBLES$ font face à un problème : leurs paysans, apparemment, ne veulent plus être des serfs et préfèrent vivre en ville, même si cela signifie devenir de simples manœuvres dans les ateliers des $ESTATE_ARTIFICERS$. Nos $ESTATE_NOBLES$ exigent à présent que nous fassions tout notre possible pour leur renvoyer cette main-d'œuvre, sous peine de devoir eux-mêmes labourer leurs champs au lieu de s'entraîner à la guerre.\n\nToutefois, agir ainsi irriterait nos $ESTATE_ARTIFICERS$, car ils se sont fort bien accommodés de cette nouvelle source de travail bon marché."
 artificers_estate_events.4.a:0 "Faisons appliquer le servage ; renvoyons les paysans."
 artificers_estate_events.4.b:0 "Ce n'est pas notre problème si leurs paysans s'enfuient !"
 EST_VAL_PEASANTS_RETURNED:0 "Les paysans ont été contraints de regagner les campagnes."
 EST_VAL_PEASANTS_MIGRATED_TO_CITIES:0 "Les paysans fuient vers les ateliers."
 artificers_estate_events.5.t:0 "$ESTATE_CHURCH$ offensé"
 artificers_estate_events.5.d:0 "Il existe toujours quelque friction entre les membres de l'$ESTATE_CHURCH$, qui s'évertuent à débusquer l'hérésie en tout lieu, et les autres organisations. Cette fois, c'est l'autre camp qui a lancé les hostilités : un prétendu professeur « libre-penseur », dans une université entretenant des liens étroits avec les $ESTATE_ARTIFICERS$, a insulté la religion en général et l'$ESTATE_CHURCH$ en particulier.\n\nSans surprise, l'$ESTATE_CHURCH$ réclame sa tête et exige son renvoi. Cependant, certains amis du professeur au sein de l'université font désormais jouer leurs relations auprès des $ESTATE_ARTIFICERS$ afin de le protéger, compliquant davantage la situation."
 artificers_estate_events.5.a:0 "Alors nous forcerons l'université à le renvoyer."
 artificers_estate_events.5.b:0 "Une légère réprimande suffira."
 EST_VAL_CHURCH_RIDICULIZED:0 "Ridiculisé par l'intelligentsia : §Y$VAL$%§!"
 EST_VAL_CHURCH_DEFENDED:0 "Prêtres défendus contre les railleries de l'intelligentsia : §Y$VAL$%§!"
 artificers_estate_events.6.t:0 "Demandes de réduction des droits de douane sur les matières premières"
 artificers_estate_events.6.d:0 "À mesure que les $ESTATE_ARTIFICERS$ gagnent en puissance, leurs appels à la baisse des droits de douane sur les matières premières dont ils ont besoin se font de plus en plus pressants. Nombreux sont ceux qui estiment que la politique économique de notre pays est archaïque et oppressive, et que nous aurions tout intérêt à réduire les taxes et réglementations qui entravent l'industrie."
 artificers_estate_events.6.a:0 "Soit, réduisons-les."
 artificers_estate_events.6.b:0 "Ils ne méritent aucune influence sur la politique du gouvernement."
 EST_VAL_REFUSED_LOWERING_RECOURCES_TARIFS:0 "Droits de douane sur les matières premières : §Y$VAL$%§!"
 EST_VAL_LOWERING_RECOURCES_TARIFS:0 "Réduction des droits de douane sur les matières premières : §Y$VAL$%§!"
 artificers_estate_events.7.t:0 "Népotisme dans les guildes des $ESTATE_ARTIFICERS$"
 artificers_estate_events.7.d:0 "Récemment, nos plus grandes guildes d'$ESTATE_ARTIFICERS$ recrutent moins de personnel nouveau, apparemment par crainte que leurs propres fils ne puissent se voir assurer une place dans la guilde en grandissant. Si cela ne serait normalement guère préoccupant, cette pratique met fin à une période de croissance industrielle, et compte tenu des profits actuels que les $ESTATE_ARTIFICERS$ tirent de leurs ateliers, il semble probable que l'industrie pourrait croître bien davantage.\n\nCertains suggèrent de mettre fin à ce « népotisme » en contraignant les $ESTATE_ARTIFICERS$ à recruter davantage de personnel ; toutefois cette mesure est vivement combattue par les représentants des $ESTATE_ARTIFICERS$, qui y voient une intrusion injuste dans leurs affaires internes et affirment qu'elle engendrerait des pratiques de recrutement inefficaces. Comme troisième option face à ce problème de sous-production, nous pourrions parrainer de tout nouveaux ateliers qui nous seraient redevables."
 artificers_estate_events.7.a:0 "Laissons-les faire."
 artificers_estate_events.7.b:0 "Forçons-les à accepter du personnel nouveau !"
 artificers_estate_events.7.c:0 "Contournons-les en parrainant de nouveaux ateliers."
 EST_VAL_ARTIFICERS_NEPOTISM:0 "Le népotisme entrave l'expansion des ateliers : §Y$VAL$%§!"
 EST_VAL_ARTIFICERS_NEW_PERSONNEL:0 "Afflux de personnel nouveau : §Y$VAL$%§!"
 artificers_estate_events.8.t:0 "Des $ESTATE_ARTIFICERS$ fous menacent la stabilité !"
 artificers_estate_events.8.d:0 "Récemment, un groupe de bricoleurs soutenus par nos guildes d'artificiers va bien au-delà de la normale. Non seulement ils ont considérablement augmenté le vacarme dans leur quartier, mais nous entendons aussi de sombres rumeurs faisant état d'enlèvements de mendiants à des fins d'expérimentation, ainsi que de pratiques contre nature telles que des tentatives avortées de nécromancie !\n\nQue ces rumeurs soient fondées ou non, nous l'ignorons, mais si nous n'agissons pas, elles se transformeront en hystérie collective."
 artificers_estate_events.8.a:0 "Rappelons-les à l'ordre ; ils ne doivent pas aller trop loin."
 artificers_estate_events.8.b:0 "Hmm, voilà qui est intéressant ; je demanderai à observer leurs expériences."
 EST_VAL_ARTIFICERS_FREE_REIGN:0 "Des artificiers fous ont carte blanche : §Y$VAL$%§!"
 EST_VAL_ARTIFICERS_NO_FREE_REIGN:0 "Les expériences sont encadrées : §Y$VAL$%§!"
 for_knowledge:0 "Pour l'expansion du savoir"
 desc_for_knowledge:0 "Les artificiers de ce pays sont libres de repousser les frontières du savoir par tous les moyens qu'ils jugent appropriés."
 artificers_estate_events.9.t:0 "Croissance de l'économie"
 artificers_estate_events.9.d:0 "Notre politique de coopération avec les $ESTATE_ARTIFICERS$ porte enfin ses fruits sous la forme de progrès dans de nombreux domaines. Les ateliers des $ESTATE_ARTIFICERS$ se développent tandis que leurs inventeurs repoussent sans cesse les frontières de notre savoir."
 artificers_estate_events.9.a:0 "Magnifique."
 artificers_estate_events.10.t:0 "Conflits dans une cité en plein essor"
 artificers_estate_events.10.d:0 "Nous avons une cité en pleine expansion où commerce et production sont tous deux en hausse. Si cela est bon pour l'économie, cette croissance a engendré des conflits entre guildes marchandes et guildes d'artificiers, à la fois par snobisme et parce qu'elles se disputent les marchés et le personnel. Leurs luttes prennent une tournure politique, chaque camp cherchant à user de son influence au sein du gouvernement municipal contre l'autre et à se faire nommer aux charges publiques, engendrant un système d'« autorité parallèle ». Cette rivalité nuit à l'ordre public ; nous devons intervenir, soit en aidant l'un des partis à supplanter l'autre, soit en sévissant contre les deux états."
 artificers_estate_events.10.a:0 "Soutenons les $ESTATE_ARTIFICERS$."
 artificers_estate_events.10.b:0 "Soutenons les $ESTATE_BURGHERS$."
 artificers_estate_events.10.c:0 "Ne favorisons aucun des deux afin de garder le contrôle de la cité."
 EST_VAL_CITY_GRANTED_TO_MERCHANTS:0 "Une cité importante a été placée sous le contrôle des marchands : §Y$VAL$%§!"
 EST_VAL_CITY_GRANTED_TO_ARTIFICERS:0 "Une cité importante a été placée sous le contrôle des artificiers : §Y$VAL$%§!"
 EST_VAL_CITY_NOT_GRANTED:0 "N'a pas obtenu la cité : §Y$VAL$%§!"
 artificers_estate_events.11.t:0 "Financer l'expansion de l'université ?"
 artificers_estate_events.11.d:0 "L'industrie de nos $ESTATE_ARTIFICERS$ nécessite un afflux continu de personnel instruit, et nos universités sont l'une des principales sources de tels spécialistes. Récemment, des représentants des $ESTATE_ARTIFICERS$ ont commencé à se plaindre de l'insuffisance du système universitaire actuel, et notre plus grande université sollicite des fonds pour s'agrandir.\n\nCette demande est combattue par divers groupes craignant des hausses d'impôts ou l'influence des $ESTATE_ARTIFICERS$ ; ils considèrent le projet avant tout comme un coûteux caprice de prestige ou une tentative de réduire leurs propres frais de formation."
 artificers_estate_events.11.a:0 "Elle est déjà assez grande ; pas besoin de projets de prestige."
 artificers_estate_events.11.b:0 "Bien entendu, nous l'agrandirons."
 EST_VAL_ARTIFICERS_UNIVERSITY:0 "Expansion de l'université : §Y$VAL$%§!"
 EST_VAL_ARTIFICERS_NO_UNIVERSITY:0 "Université sous-financée : §Y$VAL$%§!"
 artificers_estate_events.15.t:0 "Protestations parmi les $ESTATE_ARTIFICERS$"
 artificers_estate_events.15.d:0 "La détérioration continue des relations entre l'État et les $ESTATE_ARTIFICERS$ a atteint un point où il ne reste plus guère de confiance envers le [Root.Monarch.GetTitle] dans nos grandes cités. Chaque initiative de l'État est soupçonnée de viser à contenir le pouvoir des $ESTATE_ARTIFICERS$, et l'évasion fiscale s'est généralisée.\n\nLa situation en est venue au point où un certain nombre d'ateliers ont entamé une grève générale, exigeant une plus grande autonomie et d'être libérés de la tutelle oppressante de l'État."
 artificers_estate_events.15.a:0 "Ils plaisantent, assurément !"
 artificers_estate_events.15.b:0 "Cédons à leurs exigences."
 artificers_estate_events.16.t:0 "Révolte des $ESTATE_ARTIFICERS$ de [Root.GetName]"
 artificers_estate_events.16.d:0 "Outrés par la perte de leur autonomie et des terres abritant leurs manufactures, les $ESTATE_ARTIFICERS$ de la province se sont soulevés contre nous !"
 artificers_estate_events.16.a:0 "Entendu."