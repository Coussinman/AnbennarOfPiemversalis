 russian_modernization:0 "Modernisation"
 russian_modernization_desc:0 "La Modernisation mesure la diffusion des idées modernes au sein de l'État et dans votre société.\n\nLa Modernisation est augmentée par les facteurs suivants :\n - Conseillers embauchés qui ne sont pas [Root.Culture.GetGroupName]\n - Recevoir le Partage des Connaissances\n - Être en Avance sur son Temps dans n'importe quelle technologie\n - Compétences Administratives du Dirigeant\n - Voler ou Acheter des Idées Modernes\n\nLa Modernisation est diminuée par les facteurs suivants :\n - Stabilité Négative\n - Corruption\n - Inflation\n - Banqueroute\n - Privilèges de Domaine"
