 ###POWER PROJECTIONS###
 humiliation_of_a_rival:0 "Humiliation d'un Rival"
 dismantled_the_hre:0 "A démantelé l'Empire d'Anbennar"
 ###HRE EVENTS###
 hre_event.15.t:0 "La Fin de l'Empire d'Anbennar"
 hre_event.15.desc:0 "Avec la chute de [Emperor.Capital.GetName], [Emperor.Monarch.GetTitle] [Emperor.Monarch.GetName] a dû accepter [Emperor.Monarch.GetHerHis] défaite ultime aux mains des forces [Root.GetAdjective]. En l'an [GetYear], l'autrefois prestigieux [Emperor.Monarch.GetTitle] a signé [Emperor.Monarch.GetHerHis] abdication du trône de l'Empire d'Anbennar et a libéré tous les états et officiels impériaux de leurs serments et obligations envers l'empire.\n\nL'Empire d'Anbennar n'est plus et [Root.Monarch.GetTitle] [Root.Monarch.GetName] sera à jamais rappelé comme son destructeur."
 hre_event.15.a:0 "Un empire enfin mis au repos qu'il aurait dû avoir depuis longtemps."
 hre_event.15.b:0 "L'Empire est tombé. Vive l'Empire [Root.GetAdjective] s'élevant de ses cendres !"
 ###DISASTERS###
 estate_janissary_disaster:0 "Indépendance des Janissaires"
 estate_janissary_disaster_desc:0 "Les Janissaires sont devenus si puissants qu'ils se sont séparés pour former un État à eux, hors de notre contrôle."
 estate_janissaries_disaster_tooltip_cossacks:0 "Si cela se produit, le Domaine §YJanissaire§! se libérera et créera son propre pays ! Vous pouvez choisir de jouer ce nouveau pays."
 estate_janissaries_disaster_tooltip:0 "Si cela se produit, le Domaine §YJanissaire§! se libérera et créera son propre pays !"
 tur_disaster_ottoman_power_struggle:0 "Lutte de Pouvoir Interne"
 tur_disaster_ottoman_power_struggle_desc:0 "Le gouvernement ottoman est corrompu jusqu'à la moelle. Le Sultan s'incline devant le pouvoir des Janissaires. Le Harem est en charge des décisions gouvernementales. Les Eyalets envisagent de faire défection de l'empire. Les Pachas exigent plus de pouvoir et nos propres sujets sont empoisonnés par la pensée du nationalisme."
 tur_disaster_janissary_coup:0 "Coup d'État des Janissaires"
 tur_disaster_janissary_coup_desc:0 "Mécontents de leur manque d'influence directe sur le gouvernement, le Corps des Janissaires s'est révolté contre leur souverain et a pris le contrôle de l'État."
 tur_disaster_janissary_coup_at:0 "Nous avons promulgué la décision §YAffronter les Janissaires§! §Y3§! fois (§Y[Root.GetNumOfJanissaryDecisions]§!/§Y3§!)."
 NUM_OF_JANISSARIES_SLAUGHTERED:0 "[Root.tur_num_of_janissary_decisions.GetValue]"
 tur_disaster_janissary_coup_bt:0 "Les §YJanissaires§! n'ont pas de privilège qui diminue notre §YAbsolutisme§!."
 tur_disaster_plot_of_the_harem:0 "Complot du Harem"
 tur_disaster_plot_of_the_harem_desc:0 "Le Harem a grandi en influence et en pouvoir sur le Sultan régnant. Là où régnait autrefois un monarque absolu, règne maintenant un groupe d'esclaves et d'eunuques intéressés."
 tur_disaster_eyalet_rebellion:0 "Rébellion des Eyalets"
 tur_disaster_eyalet_rebellion_desc:0 "Les Eyalets assument le contrôle de leur territoire et déclarent leur indépendance de l'empire."
 tur_disaster_eyalet_rebellion_at:0 "Aucune province possédée en §YÉgypte§!, en §YPerse§! et en §YEurope Occidentale§! n'est occupée."
 tur_disaster_pasha_decadence:0 "Décadence des Pachas"
 tur_disaster_pasha_decadence_desc:0 "Les Pachas se pensent supérieurs et indépendants du Sultan. Ils s'assureront d'utiliser chaque ressource à leur disposition pour garantir leur autonomie."
 tur_disaster_nationalism_wave:0 "Vague de Nationalisme"
 tur_disaster_nationalism_wave_desc:0 "Les idées d'États-nations se sont répandues parmi nos sujets. Les mouvements d'indépendance et les révoltes menacent de déchirer l'empire."
 ###ESTATE PRIVILEGES###
 no_estate_crownland_loss_from_developing:0 "Ne perd pas de Part de Terres de la Couronne en développant les provinces"
 estate_dhimmi_millet_system:0 "Système des Millets"
 estate_dhimmi_millet_system_desc:0 "Le Système des Millets fait partie de l'administration ottomane des communautés religieuses séparées qui reconnaissait l'autorité de chaque communauté dans la supervision de ses propres affaires communautaires, principalement à travers des systèmes judiciaires et des écoles religieuses indépendants."
 estate_church_freedom_of_interpretation:0 "Liberté d'Interprétation"
 estate_church_freedom_of_interpretation_desc:0 "Le Coran est libre d'être interprété par tous. En permettant plus de clémence au [Root.GetClergyName] nous pourrions être en mesure de voir une vision unique de notre religion."
 estate_dhimmi_millet_system_mod:0 "Système des Millets"
 desc_estate_dhimmi_millet_system_mod:0 "Le Système des Millets fait partie de l'administration ottomane des communautés religieuses séparées qui reconnaissait l'autorité de chaque communauté dans la supervision de ses propres affaires communautaires, principalement à travers des systèmes judiciaires et des écoles religieuses indépendants."
 tur_every_heathen_province_tt:0 "Chaque province possédée §YChrétienne§! et §YJuive§! gagnera §G-5,0%§! de Coût de Développement"
 tur_removes_dev_cost_tt:0 "Le modificateur de §YCoût de Développement Local§! sera supprimé des provinces §YChrétiennes§! et §YJuives§!"
 ####BRHAMINS PRIVILEGES###
 estate_brahmins_development_of_temples:0 "Développement des Temples"
 estate_brahmins_development_of_temples_desc:0 "Les temples de l'État sont des lieux de refuge et le siège des [Root.GetBrahminsName]. La souveraineté de ces institutions doit être garantie, et leur développement doit être promu."
 estate_brahmins_development_of_temples_gt:0 "Chaque province possédée §YDharmique§! gagne le bonus suivant :"
 estate_brahmins_development_of_temples_rt:0 "Le modificateur « §YDéveloppement des Temples§! » est supprimé de toutes les provinces §YDharmiques§!."
 estate_brahmins_development_of_temples_mod:0 "Développement des Temples"
 desc_estate_brahmins_development_of_temples_mod:0 "L'État a garanti le développement des temples locaux."
 estate_brahmins_expand_the_theology:1 "Financer les Études Théologiques"
 estate_brahmins_expand_the_theology_desc:1 "La théologie dans notre État joue un rôle majeur en nous enseignant notre place dans le monde, et la place de nos sujets dans la grande chaîne de l'être. Les [Root.GetBrahminsName] auront plus de ressources pour étendre notre compréhension théologique."
 estate_brahmins_clerical_education:0 "Éducation des [Root.GetBrahminsName]"
 estate_brahmins_clerical_education_desc:1 "Les [Root.GetBrahminsName] sont l'élite intellectuelle de l'État, occupant des positions aussi bien religieuses (ou sacrées) que séculières. Ainsi, leur éducation doit être encouragée, et leur rôle de gardiens de l'éducation garanti."
 estate_brahmins_legitimacy_of_rule:0 "Soutien des [Root.GetBrahminsName]"
 estate_brahmins_legitimacy_of_rule_desc:0 "En tant que nation musulmane, nous régnons sur un grand nombre d'Hindous. La légitimité de notre règne est remise en question à moins que nous n'obtenions le soutien des [Root.GetBrahminsName]."
 estate_brahmins_institutionalized_brahimns:0 "[Root.GetBrahminsName] Institutionnalisés"
 estate_brahmins_institutionalized_brahimns_desc:1 "Les [Root.GetBrahminsName] sont un domaine puissant au sein de l'État. Bien que cela aille à l'encontre de leurs souhaits et de leur liberté, il serait sage pour l'État d'institutionnaliser les [Root.GetBrahminsName] et de révoquer une partie de leur pouvoir."
 estate_brahmins_donation_right:0 "Droit de Donation"
 estate_brahmins_donation_right_desc:0 "En tant que classe spirituelle de l'État, il est naturel que les [Root.GetBrahminsName] aient le droit de recevoir des donations de l'État."
 estate_brahmins_administrative_privileges:0 "Concentration Interne des [Root.GetBrahminsName]"
 estate_brahmins_administrative_privileges_desc:0 "Les [Root.GetBrahminsName] ont parlé. Ils semblent ignorer l'expansion de l'État par des moyens militaires et souhaitent couvrir la bureaucratie de l'État afin d'étendre nos capacités par d'autres moyens."
 ###CLERGY PRIVILEGES###
 estate_church_development_of_temples:0 "Développement des Temples"
 estate_church_development_of_temples_desc:0 "Les temples de l'État sont des lieux de refuge et le siège du [Root.GetClergyName]. La souveraineté de ces institutions doit être garantie, et leur développement doit être promu."
 estate_church_development_of_temples_gt:1 "Chaque province possédée §Y[Root.Religion.GetName]§! avec un §YTemple§! ou une §YCathédrale§! gagne le bonus suivant :"
 estate_church_development_of_temples_rt:0 "Le modificateur « §YDéveloppement des Temples§! » est supprimé de toutes les provinces §Y[Root.Religion.GetName]§!."
 estate_church_development_of_temples_mod:0 "Développement des Temples"
 desc_estate_church_development_of_temples_mod:0 "L'État a garanti le développement des temples locaux."
 estate_church_expand_the_theology:1 "Financer les Études Théologiques"
 estate_church_expand_the_theology_desc:1 "La théologie dans notre État joue un rôle majeur en nous enseignant notre place dans le monde, et la place de nos sujets dans la grande chaîne de l'être. Le [Root.GetClergyName] aura plus de ressources pour étendre notre compréhension théologique."
 estate_church_clerical_education:0 "Éducation Cléricale"
 estate_church_clerical_education_desc:1 "Le [Root.GetClergyName] est l'élite intellectuelle de l'État, occupant des positions aussi bien religieuses (ou sacrées) que séculières. Ainsi, son éducation doit être encouragée, et son rôle de gardien de l'éducation garanti."
 estate_church_religious_delegation:0 "Autoriser la Délégation Religieuse"
 estate_church_religious_delegation_desc:0 "De nombreux services liés à la religion sont actuellement gérés par l'État. En permettant au [Root.GetClergyName] d'avoir plus de liberté dans ses actions, nous pouvons soulager notre administration tandis que le [Root.GetClergyName] couvre les missions religieuses."
 estate_church_institutionalized_clergy:0 "[Root.GetClergyName] Institutionnalisé"
 estate_church_institutionalized_clergy_desc:0 "Le [Root.GetClergyName] est un domaine puissant au sein de l'État. Bien que cela aille à l'encontre de ses souhaits et de sa liberté, il serait sage pour l'État d'institutionnaliser le [Root.GetClergyName] et de révoquer une partie de son pouvoir."
 estate_church_donation_right:0 "Droit de Donation"
 estate_church_donation_right_desc:0 "En tant que classe spirituelle de l'État, il est naturel que le [Root.GetClergyName] ait le droit de recevoir des donations de l'État."
 estate_church_administrative_privileges:0 "Concentration Interne Cléricale"
 estate_church_administrative_privileges_desc:0 "Le [Root.GetClergyName] a parlé. Il semble ignorer l'expansion de l'État par des moyens militaires et souhaite couvrir la bureaucratie de l'État afin d'étendre nos capacités par d'autres moyens."
 ####NOBLE PRIVILEGES###
 estate_nobles_english_villeinage:0 "Servage [Root.GetAdjective]"
 estate_nobles_english_villeinage_desc:0 "La paysannerie [Root.GetAdjective] est soumise au système du servage. Similaire au servage, les vilains sont sévèrement restreints dans leur liberté de mouvement et servent leur seigneur."
 estate_nobles_english_copyhold_tenure:0 "Tenure Roturière Étendue"
 estate_nobles_english_copyhold_tenure_desc:0 "La tenure roturière est l'évolution du système féodal de servage [Root.GetAdjective]. Bien que le propriétaire légal des terres seigneuriales reste le seigneur intermédiaire, les paysans travaillant sur le terrain reçoivent la copie de l'acte de propriété correspondant."
 estate_nobles_development_of_castles:0 "Étendre les Fortifications"
 estate_nobles_development_of_castles_desc:0 "Les châteaux et fortifications sont nos lignes de défense cruciales contre les envahisseurs qui menacent notre existence. En accordant à notre [Root.GetNobilityName] les terres des châteaux et le privilège de vivre dans ces fortifications, nous pouvons assurer l'entretien de notre défense en tout temps."
 estate_nobles_development_of_castles_gt:0 "Chaque province possédée avec un §YFort§! gagne le bonus suivant :"
 estate_nobles_development_of_castles_at:0 "Chaque province possédée avec des §YRemparts§! gagne le bonus suivant :"
 estate_nobles_development_of_castles_rt:0 "Le modificateur « §YÉtendre les Fortifications§! » est supprimé de toutes les provinces avec un §YFort§!.\nLe modificateur « §YÉtendre les Remparts§! » est supprimé de toutes les provinces avec des §YRemparts§!."
 estate_nobles_development_of_castles_mod:0 "Étendre les Fortifications"
 desc_estate_nobles_development_of_castles_mod:0 "Cette province bénéficie du soutien financier de la noblesse locale, rendant les fortifications de cette zone mieux entretenues par rapport aux autres bâtiments défensifs."
 estate_nobles_development_of_castles_ramparts_mod:0 "Étendre les Remparts"
 desc_estate_nobles_development_of_castles_ramparts_mod:0 "Cette province bénéficie du soutien financier de la noblesse locale, rendant les fortifications de cette zone mieux entretenues par rapport aux autres bâtiments défensifs."
 estate_nobles_statesman_servitude:0 "Homme d'État de la [Root.GetNobilityName]"
 estate_nobles_statesman_servitude_desc:0 "Un État ne peut pas seulement compter sur un dirigeant compétent seul. Il a également besoin de véritables hommes d'État à des positions de pouvoir.\nLa [Root.GetNobilityName] possède tous les savoirs et manières nécessaires pour remplir un tel rôle si nous leur en donnons la chance."
 estate_nobles_royal_court_tasks:0 "Accorder des Positions à la Cour"
 estate_nobles_royal_court_tasks_desc:0 "La cour royale est une institution complexe en soi. Afin de la gérer avec moins d'efforts, des membres de la [Root.GetNobilityName] sont invités à remplir certaines positions de la cour pour leur [Root.Monarch.GetTitle]."
 estate_nobles_force_conscription:0 "Conscription Forcée de la [Root.GetNobilityName]"
 estate_nobles_force_conscription_desc:0 "Parfois, les levées ne suffisent pas pour les campagnes militaires de l'État. Dans de tels cas, c'est notre droit de forcer la conscription de la [Root.GetNobilityName] elle-même au front.\nCependant, ce droit a un coût élevé en faveur de la [Root.GetNobilityName] elle-même."
 estate_nobles_noble_officer_right:0 "Droits d'Officiers de la [Root.GetNobilityName]"
 estate_nobles_noble_officer_right_desc:0 "Un général pour notre armée ne peut pas être un quelconque fantassin d'une famille paysanne. Seul le sang noble sera autorisé à mener nos soldats à la victoire."
 estate_nobles_diet_right:0 "Droit de Convocation de la Diète de la [Root.GetNobilityName]"
 estate_nobles_diet_right_desc:0 "Les domaines sont une institution puissante au sein de notre [Root.GovernmentName]. Avec le droit de la [Root.GetNobilityName] de convoquer la diète selon ses caprices, le [Root.Monarch.GetTitle] n'a d'autre choix que d'accepter les souhaits de la [Root.GetNobilityName]."
 estate_nobles_expedition_rights:0 "Droits d'Expédition de la [Root.GetNobilityName]"
 estate_nobles_expedition_rights_desc:0 "Le Nouveau Monde offre de nombreuses opportunités, et notre [Root.GetNobilityName] en est bien consciente. En leur accordant le droit de commencer leur propre expédition dans le Nouveau Monde sans avoir à se soucier de leurs possessions terrestres dans la patrie, nous serons en mesure de recruter les conquistadors les plus courageux connus de l'homme."
 ####MARATHA PRIVILEGES###
 estate_maratha_development_of_marathi_lands:0 "Promouvoir le Développement Marathe"
 estate_maratha_development_of_marathi_lands_desc:0 "Les [Root.GetMarathasName] sont l'une des castes influentes au sein de notre [Root.GovernmentName]. Leur promettre l'attention et les ressources de l'État assurera leur loyauté envers nous."
 estate_maratha_development_of_marathi_lands_gt:0 "Chaque province possédée §YSinghalaise§!, §YDravidienne§! et §YArya Occidentale§! (qui n'est PAS Rajasthani ou Malvi) gagne le bonus suivant :"
 estate_maratha_development_of_marathi_lands_rt:0 "Le modificateur « §YDéveloppement Marathe§! » est supprimé de toutes les provinces."
 estate_maratha_development_of_marathi_lands_mod:0 "Développement Marathe"
 desc_estate_maratha_development_of_marathi_lands_mod:0 "Cette province reçoit un grand soutien des Marathes concernant son développement."
 estate_maratha_military_ministerium:0 "Accorder le Droit de Ministre aux [Root.GetMarathasName]"
 estate_maratha_military_ministerium_desc:0 "Les [Root.GetMarathasName] sont une caste guerrière et possèdent donc de nombreux stratèges militaires capables. Permettre aux [Root.GetMarathasName] une position garantie à notre cour nous donne un accès facile à leurs conseillers les plus compétents."
 estate_maratha_royal_court_tasks:0 "Accorder des Positions à la Cour"
 estate_maratha_royal_court_tasks_desc:0 "La cour royale est une institution complexe en soi. Afin de la gérer avec moins d'efforts, des membres des [Root.GetMarathasName] sont invités à remplir certaines positions de la cour pour leur [Root.Monarch.GetTitle]."
 estate_maratha_force_conscription:0 "Conscription des [Root.GetMarathasName]"
 estate_maratha_force_conscription_desc:0 "En temps de besoin, le [Root.Monarch.GetTitle] peut enrôler tous les membres capables des [Root.GetMarathasName] afin de combattre pour le [Root.GovernmentName]. Cela, bien sûr, a un coût sous forme de privilèges supplémentaires pour les [Root.GetMarathasName]."
 estate_maratha_noble_promotion:0 "Promotion Noble des [Root.GetMarathasName]"
 estate_maratha_noble_promotion_desc:0 "Les [Root.GetMarathasName] ont des membres de sang noble eux-mêmes. Cependant, en compétition directe avec la [Root.GetNobilityOrFallbackName] normale, les [Root.GetMarathasName] sont désavantagés. Promouvoir leur position assurera la loyauté des [Root.GetMarathasName]."
 ####RAJPUTS PRIVILEGES###
 estate_rajput_development_of_rajput_lands:0 "Promouvoir le Développement Rajasthani"
 estate_rajput_development_of_rajput_lands_desc:0 "Les [Root.GetRajputsName] sont l'une des castes influentes au sein de notre [Root.GovernmentName]. Leur promettre l'attention et les ressources de l'État assurera leur loyauté envers nous."
 estate_rajput_development_of_rajput_lands_gt:1 "Chaque province possédée §YRajasthani§!, §YMalvi§!, §YHindustani§!, §YIndienne Centrale§! et §YArya Orientale§! (qui n'est PAS Singhalaise) gagne le bonus suivant :"
 estate_rajput_development_of_rajput_lands_rt:0 "Le modificateur « §YDéveloppement Rajasthani§! » est supprimé de toutes les provinces."
 estate_rajput_development_of_rajput_lands_mod:0 "Développement Rajasthani"
 desc_estate_rajput_development_of_rajput_lands_mod:0 "Cette province reçoit un grand soutien des Rajputs concernant son développement."
 estate_rajput_military_ministerium:0 "Accorder le Droit de Ministre aux [Root.GetRajputsName]"
 estate_rajput_military_ministerium_desc:0 "Les [Root.GetRajputsName] sont une caste guerrière et possèdent donc de nombreux stratèges militaires capables. Permettre aux [Root.GetRajputsName] une position garantie à notre cour nous donne un accès facile à leurs conseillers les plus compétents."
 estate_rajput_royal_court_tasks:0 "Accorder des Positions à la Cour"
 estate_rajput_royal_court_tasks_desc:0 "La cour royale est une institution complexe en soi. Afin de la gérer avec moins d'efforts, des membres des [Root.GetRajputsName] sont invités à remplir certaines positions de la cour pour leur [Root.Monarch.GetTitle]."
 estate_rajput_force_conscription:0 "Conscription des [Root.GetRajputsName]"
 estate_rajput_force_conscription_desc:0 "En temps de besoin, le [Root.Monarch.GetTitle] peut enrôler tous les membres capables des [Root.GetRajputsName] afin de combattre pour le [Root.GovernmentName]. Cela, bien sûr, a un coût sous forme de privilèges supplémentaires pour les [Root.GetRajputsName]."
 estate_rajput_noble_promotion:0 "Promotion Noble des [Root.GetRajputsName]"
 estate_rajput_noble_promotion_desc:0 "Les [Root.GetRajputsName] ont des membres de sang noble eux-mêmes. Cependant, en compétition directe avec la [Root.GetNobilityOrFallbackName] normale, les [Root.GetRajputsName] sont désavantagés. Promouvoir leur position assurera la loyauté des [Root.GetRajputsName]."
 ####BURGHERS PRIVILEGES###
 estate_burghers_autonomous_trade_companies:0 "Compagnies Commerciales Autonomes"
 estate_burghers_autonomous_trade_companies_desc:0 "Les Compagnies Commerciales [Root.GetAdjective] sont des sujets hautement autonomes mais très loyaux de la Couronne. En leur accordant des chartes royales et des privilèges spéciaux, les Compagnies Commerciales de [Root.GetName] sont en mesure d'agir au bénéfice du [Root.GovernmentName]."
 estate_burghers_development_of_cities:0 "Privilèges d'Expansion des Cités"
 estate_burghers_development_of_cities_desc:0 "Les cités du [Root.GovernmentName] sont le joyau de la couronne de [Root.GetName]. Les [Root.GetBurghersName] sont désireux d'étendre les cités encore plus, si nous leur accordons le privilège de le faire."
 estate_burghers_development_of_cities_gt:0 "Chaque province possédée avec un §YEstuaire§! ou un §YCentre Commercial§! gagne le bonus suivant :"
 estate_burghers_development_of_cities_rt:0 "Le modificateur « §YExpansion des Cités§! » est supprimé de toutes les provinces avec un §YEstuaire§! ou un §YCentre Commercial§!."
 estate_burghers_development_of_cities_mod:0 "Expansion des Cités"
 desc_estate_burghers_development_of_cities_mod:0 "Par ordre de l'autorité régnante, les Bourgeois de cette province détiennent le droit d'étendre la cité à de nouvelles dimensions."
 estate_burghers_control_over_the_coinage:0 "Accorder le Contrôle de la Frappe"
 estate_burghers_control_over_the_coinage_desc:0 "Le droit de frapper des pièces est depuis longtemps entre les mains du [Root.Monarch.GetTitle]. À mesure que l'État grandit et que l'administration fait face à plus de défis, le droit de frapper des pièces devient de plus en plus un fardeau. En permettant aux [Root.GetBurghersName] de frapper en notre nom, nous pouvons résoudre ce problème bureaucratique."
 estate_burghers_economical_boost:0 "Accorder la Liberté Économique aux [Root.GetBurghersName]"
 estate_burghers_economical_boost_desc:0 "Les revenus de l'État ont été principalement générés par une approche mercantiliste du commerce. En laissant les [Root.GetBurghersName] avoir leur propre liberté sur les affaires économiques, nous pourrions être en mesure d'augmenter nos revenus considérablement."
 estate_burghers_force_impressment:0 "Enrôlement Forcé des [Root.GetBurghersName]"
 estate_burghers_force_impressment_desc:0 "Bien que non formés au combat, en temps de besoin, les équipages des navires marchands ainsi que leurs vaisseaux peuvent être forcément enrôlés dans notre marine.\nCe droit de conscription a, cependant, un coût élevé en faveur des [Root.GetBurghersName]."
 estate_burghers_naval_school_right:0 "Droits d'École Navale des [Root.GetBurghersName]"
 estate_burghers_naval_school_right_desc:0 "Traditionnellement, seule la Noblesse était autorisée à suivre une formation militaire. En libérant les barrières à l'entrée, nous pouvons accorder ce droit aux [Root.GetBurghersName]."
 estate_burghers_expanded_monopoly_rights:0 "Droits de Monopole des [Root.GetBurghersName]"
 estate_burghers_expanded_monopoly_rights_desc:0 "Les monopoles sur les biens commerciaux sont rarement un sujet d'intérêt au sein de notre [Root.GovernmentName]. Ainsi, les [Root.GetBurghersName] sont libres d'établir leurs propres monopoles chaque fois que leur besoin s'en fait sentir."
 estate_burghers_financial_demand:0 "Exigence Financière des [Root.GetBurghersName]"
 estate_burghers_financial_demand_desc:0 "En temps de besoin, le [Root.GovernmentName] peut saisir de force les possessions des [Root.GetBurghersName]. En retour, les [Root.GetBurghersName] ont des privilèges étendus qui leur accordent plus de pouvoir dans les affaires de l'État."
 estate_burghers_land_trade_rights:1 "Possessions de la Couronne des [Root.GetBurghersName]"
 estate_burghers_land_trade_rights_desc:0 "Tout a un prix si vous trouvez le bon acheteur. Nos propres terres ne font pas exception. En laissant les [Root.GetBurghersName] avoir le contrôle sur des parties de nos terres de la couronne, nous pouvons obtenir un bénéfice substantiel pour nos revenus."
 ####PRIVILÈGES VAISHYAS###
 estate_vaisyas_land_trade_rights:1 "Possessions de la couronne des [Root.GetVaishyasName]"
 estate_vaisyas_land_trade_rights_desc:0 "Tout a un prix si vous trouvez le bon acheteur. Notre propre terre ne fait pas exception. En laissant les [Root.GetVaishyasName] avoir le contrôle sur des parties de notre terre de la couronne, nous pouvons gagner un bénéfice substantiel à nos revenus."
 estate_vaisyas_development_of_cities:0 "Privilèges d'expansion urbaine"
 estate_vaisyas_development_of_cities_desc:0 "Les cités du [Root.GovernmentName] sont le joyau de la couronne de [Root.GetName]. Les [Root.GetVaishyasName] sont désireux d'étendre les cités encore davantage - si nous leur accordons le privilège de le faire."
 estate_vaisyas_development_of_cities_gt:0 "Chaque province possédée avec un §YEstuaire§! ou un §YCentre de commerce§! gagne le bonus suivant :"
 estate_vaisyas_development_of_cities_rt:0 "Le modificateur '§YExpansion urbaine§!' est supprimé de toutes les provinces avec un §YEstuaire§! ou un §YCentre de commerce§!."
 estate_vaisyas_development_of_cities_mod:0 "Expansion urbaine"
 desc_estate_vaisyas_development_of_cities_mod:0 "Par ordre de l'autorité dirigeante, les Vaishyas de cette province détiennent le droit d'étendre la cité à de nouvelles dimensions."
 estate_vaisyas_control_over_the_coinage:0 "Accorder le contrôle sur la frappe"
 estate_vaisyas_control_over_the_coinage_desc:0 "Le droit de frapper des pièces a longtemps été entre les mains du [Root.Monarch.GetTitle]. Alors que l'état grandit et que l'administration fait face à plus de défis, le droit de frapper des pièces devient de plus en plus un fardeau. En permettant aux [Root.GetVaishyasName] de frapper en notre nom, nous pouvons résoudre ce problème bureaucratique."
 estate_vaisyas_economical_boost:0 "Permettre la liberté économique aux [Root.GetVaishyasName]"
 estate_vaisyas_economical_boost_desc:0 "Les revenus de l'état ont été principalement générés à travers une approche mercantiliste du commerce. En laissant les [Root.GetVaishyasName] avoir leur propre main libre sur les questions économiques, nous pourrions être capables d'augmenter considérablement nos revenus."
 estate_vaisyas_expanded_guild_rights:0 "Droits de guilde élargis"
 estate_vaisyas_expanded_guild_rights_desc:0 "Les guildes des [Root.GetVaishyasName] sont la bouée de sauvetage de notre économie. Élargir leurs droits considérablement assurera leur loyauté et leur clémence concernant les intérêts des [Root.GetVaishyasName]."
 estate_vaisyas_force_impressment:0 "Enrôlement forcé des [Root.GetVaishyasName]"
 estate_vaisyas_force_impressment_desc:0 "Bien que non entraînés pour le combat, en temps de besoin, les équipages des navires marchands ainsi que leurs vaisseaux peuvent être enrôlés de force dans notre marine.\nCe droit de telle conscription vient, cependant, à un coût lourd en faveur des [Root.GetVaishyasName]."
 estate_vaisyas_financial_demand:0 "Demande financière des [Root.GetVaishyasName]"
 estate_vaisyas_financial_demand_desc:0 "En temps de besoin, le [Root.GovernmentName] peut saisir de force les possessions des [Root.GetVaishyasName]. En retour, les [Root.GetVaishyasName] ont des privilèges élargis qui leur accordent plus de pouvoir dans les affaires de l'état."
 ####COSSACKS PRIVILEGES###
 estate_cossacks_freedom_of_the_steppes:0 "Liberté des Steppes"
 estate_cossacks_freedom_of_the_steppes_desc:0 "Affirmer son contrôle sur les steppes est une entreprise difficile et coûteuse. Plutôt que de gouverner nous-mêmes ces terres, il serait sage de laisser les [Root.GetCossacksName] peupler ces vastes étendues et de n'exiger d'eux que leur service militaire en retour."
 estate_cossacks_freedom_of_the_steppes_gt:0 "Chaque province de §YSteppes§! possédée obtient le bonus suivant :"
 estate_cossacks_freedom_of_the_steppes_rt:0 "Le modificateur « §YLiberté des Steppes§! » est retiré de toutes les provinces de §YSteppes§!."
 estate_cossacks_freedom_of_the_steppes_mod:0 "Liberté des Steppes"
 desc_estate_cossacks_freedom_of_the_steppes_mod:0 "Cette province est entièrement autogouvernée par les Cosaques."
 estate_cossacks_grant_military_leadership:0 "Commandement Militaire des [Root.GetCossacksName]"
 estate_cossacks_grant_military_leadership_desc:1 "Les [Root.GetCossacksName] sont d'excellents guerriers et meneurs d'hommes. Il est tout naturel que nous leur accordions la chance de prouver leur valeur en tant que conseillers militaires de nos armées."
 estate_cossacks_military_service:0 "Service Militaire des [Root.GetCossacksName]"
 estate_cossacks_military_service_desc:0 "En raison de la nature guerrière de leur culture, les [Root.GetCossacksName] servent l'armée [Root.GetAdjective] comme troupes irrégulières, soutenant notre infanterie et notre artillerie en tant que force de cavalerie."
 estate_cossacks_expand_cossacks_raiders:0 "Légaliser les Raids des [Root.GetCossacksName]"
 estate_cossacks_expand_cossacks_raiders_desc:0 "En théorie, les [Root.GetCossacksName] sont des citoyens de [Root.GetName] et doivent donc obéir à nos lois. En pratique, les steppes se soucient peu de concepts tels que les lois. Les [Root.GetCossacksName] prennent ce dont ils ont besoin à ceux qui ont la malchance de les côtoyer.\nNous leur rendrions un grand service en légalisant leurs actions et en assumant la responsabilité de leurs raids contre les pays étrangers."
 estate_cossacks_expand_cossacks_raiders_gt:0 "L'événement « §YAgression Cosaque§! » accorde désormais des bonus supplémentaires pour §Y[Root.GetName]§!."
 estate_cossacks_expand_cossacks_raiders_rt:0 "L'événement « §YAgression Cosaque§! » n'accorde plus de bonus supplémentaires."
 estate_cossacks_expand_cossacks_raiders_at:0 "Nos [Root.GetCossacksName] sont revenus avec du butin, accordant les effets suivants :"
 estate_cossacks_exempt_from_bureaucracy:0 "Exemption de Bureaucratie"
 estate_cossacks_exempt_from_bureaucracy_desc:0 "Personne n'aime la bureaucratie, et les [Root.GetCossacksName] ne font pas exception. Bien que cela rende leur contrôle plus difficile, les exempter de nos institutions administratives garantira au moins leur loyauté."
 ####NOMADIC TRIBES PRIVILEGES###
 estate_nomadic_tribes_autonomy_of_the_tribes:0 "Autonomie des [Root.GetTribesName]"
 estate_nomadic_tribes_autonomy_of_the_tribes_desc:0 "Notre royaume est vaste, mais les infrastructures y sont rares. Pour maintenir le contrôle sur les steppes, nous devons permettre aux [Root.GetTribesName] d'avoir l'autonomie nécessaire pour gouverner leur territoire en notre nom."
 estate_nomadic_tribes_freedom_of_the_steppes:0 "Liberté des Steppes des [Root.GetTribesName]"
 estate_nomadic_tribes_freedom_of_the_steppes_desc:0 "Les steppes sont vastes. Vierges de toute civilisation sédentaire, les steppes sont notre foyer. Le foyer de [Root.GetUsableName] ; le foyer des [Root.GetTribesName]. Nous jouirons tous de la liberté des steppes."
 estate_nomadic_tribes_freedom_of_the_steppes_gt:0 "Chaque province de §YSteppes§! possédée obtient le bonus suivant :"
 estate_nomadic_tribes_freedom_of_the_steppes_rt:0 "Le modificateur « §YLiberté Tribale des Steppes§! » est retiré de toutes les provinces de §YSteppes§!."
 estate_nomadic_tribes_freedom_of_the_steppes_mod:0 "Liberté Tribale des Steppes"
 desc_estate_nomadic_tribes_freedom_of_the_steppes_mod:0 "Cette province est gouvernée par les Tribus d'une horde."
 estate_nomadic_tribes_grant_military_leadership:0 "Soutien au Commandement des [Root.GetTribesName]"
 estate_nomadic_tribes_grant_military_leadership_desc:0 "Diriger un royaume divisé en tant de tribus n'est pas une tâche aisée pour un [Root.Monarch.GetTitle]. En considérant le soutien des [Root.GetTribesName] dans le commandement, nous pouvons assurer le maintien du [Root.GovernmentName]."
 estate_nomadic_tribes_military_service:0 "Service Militaire des [Root.GetTribesName]"
 estate_nomadic_tribes_military_service_desc:0 "Bien que toutes les [Root.GetTribesName] contribuent à l'effort militaire, elles conservent une force pour elles-mêmes. Les appeler au service militaire général renforcera considérablement notre puissance."
 estate_nomadic_tribes_ensure_tribal_loyalty:0 "Garantir la Loyauté des [Root.GetTribesName]"
 estate_nomadic_tribes_ensure_tribal_loyalty_desc:0 "La puissance du [Root.Monarch.GetTitle] n'est rien sans la loyauté de ses sujets. La loyauté des [Root.GetTribesName] doit être assurée, quel qu'en soit le prix."
 estate_nomadic_tribes_ensure_tribal_loyalty_gt:2 "L'événement « §YCrise de Succession Tribale§! » ne se déclenchera plus pour les héritiers ayant au moins §Y12§! Points de Monarque au total."
 estate_nomadic_tribes_ensure_tribal_loyalty_rt:1 "L'événement « §YCrise de Succession Tribale§! » se déclenchera désormais toujours, quels que soient les Points de Monarque de l'héritier."
 estate_nomadic_tribes_secured_succession:0 "Succession Assurée"
 estate_nomadic_tribes_secured_succession_desc:0 "Dans un [Root.GovernmentName], la succession est assurée par la force. Hélas, la force est trompeuse, et de jeunes futurs khans ont été assassinés par le passé avant d'avoir eu la chance de prouver leur valeur.\nBien que cela contrarie les [Root.GetTribesName], la succession doit être garantie."
 ####DHIMMI PRIVILEGES###
 estate_dhimmi_administrative_privileges:0 "Autogouvernement des [Root.GetDhimmiName]"
 estate_dhimmi_administrative_privileges_desc:0 "Les provinces [Root.GetAdjective] abritent de nombreuses religions différentes. En laissant les [Root.GetDhimmiName] organiser leur propre gouvernement dans ces communautés, nous pouvons assurer la stabilité et la paix dans ces villes et villages païens."
 estate_dhimmi_development_of_communities:0 "Développement des Communautés"
 estate_dhimmi_development_of_communities_desc:0 "Notre État abrite de nombreuses communautés païennes gouvernées par les [Root.GetDhimmiName]. Promouvoir le développement de ces communautés simplifiera les efforts nécessaires pour étendre les infrastructures dans ces provinces."
 estate_dhimmi_development_of_communities_gt:1 "Chaque province §YPaïenne§! possédée avec un §YTemple§! ou une §YCathédrale§! obtient le bonus suivant :"
 estate_dhimmi_development_of_communities_rt:0 "Le modificateur « §YDéveloppement des Communautés§! » est retiré de toutes les provinces §YPaïennes§!."
 estate_dhimmi_development_of_communities_mod:0 "Développement des Communautés"
 desc_estate_dhimmi_development_of_communities_mod:0 "Cette province est sous la tutelle des Dhimmi, qui reçoivent des ressources supplémentaires pour promouvoir le développement des communautés locales."
 estate_dhimmi_grant_trading_privileges:0 "Accorder des Privilèges Commerciaux"
 estate_dhimmi_grant_trading_privileges_desc:0 "Les [Root.GetDhimmiName] sont capables de créer des contacts importants avec d'autres nations. Nous leur accordons des privilèges commerciaux afin qu'ils puissent nous en faire davantage profiter."
 estate_dhimmi_dhimmi_education:0 "Promouvoir l'Éducation des [Root.GetDhimmiName]"
 estate_dhimmi_dhimmi_education_desc:0 "Les [Root.GetDhimmiName] nous apportent des connaissances venues de l'extérieur de notre nation. Nous leur permettons de les diffuser à l'intérieur afin que tout notre peuple puisse en bénéficier."
 estate_dhimmi_military_service:0 "Service Militaire des [Root.GetDhimmiName]"
 estate_dhimmi_military_service_desc:0 "Notre armée a toujours besoin de s'agrandir. Nous permettons aux [Root.GetDhimmiName] d'en faire partie, élargissant ainsi davantage nos effectifs."
 estate_dhimmi_protected_communities:0 "Communautés [Root.GetDhimmiName] Protégées"
 estate_dhimmi_protected_communities_desc:0 "Les [Root.GetDhimmiName] sont une partie vitale de notre nation. Nous accordons une protection à leurs communautés pour qu'ils se sentent les bienvenus."
 estate_dhimmi_contribution_demand:0 "Acte de Contribution des [Root.GetDhimmiName]"
 estate_dhimmi_contribution_demand_desc:0 "Les [Root.GetDhimmiName] sont une partie vitale de notre nation. Nous leur demandons de contribuer à sa grandeur en conséquence."
 estate_dhimmi_promote_dhimmi_nobility:0 "Noblesse Promue parmi les [Root.GetDhimmiName]"
 estate_dhimmi_promote_dhimmi_nobility_desc:0 "Tous les nobles ne partagent pas la foi [Root.Religion.GetName]. Certains sont des païens sous la tutelle des [Root.GetDhimmiName]. Les promouvoir dans nos rangs pourrait contrarier les autres états, mais nous pourrions gagner un allié puissant parmi les [Root.GetDhimmiName]."
 ####JAINS PRIVILEGES###
 estate_jains_land_trade_rights:1 "Possessions de la Couronne des [Root.GetJainsName]"
 estate_jains_land_trade_rights_desc:0 "Tout a un prix si l'on trouve le bon acheteur. Notre propre terre ne fait pas exception. En laissant les [Root.GetJainsName] contrôler une partie de nos terres de la couronne, nous pouvons obtenir un bénéfice substantiel pour nos revenus."
 estate_jains_development_of_cities:0 "Privilèges d'Expansion Urbaine"
 estate_jains_development_of_cities_desc:0 "Les cités du [Root.GovernmentName] sont le joyau de la couronne de [Root.GetName]. Les [Root.GetJainsName] sont impatients d'étendre ces cités encore davantage, si nous leur accordons le privilège de le faire."
 estate_jains_development_of_cities_gt:0 "Chaque province possédée avec un §YEstuaire§! ou un §YCentre de Commerce§! obtient le bonus suivant :"
 estate_jains_development_of_cities_rt:0 "Le modificateur « §YExpansion Urbaine§! » est retiré de toutes les provinces avec un §YEstuaire§! ou un §YCentre de Commerce§!."
 estate_jains_development_of_cities_mod:0 "Expansion Urbaine"
 desc_estate_jains_development_of_cities:0 "Par ordre de l'autorité régnante, les Jaïns de cette province détiennent le droit d'étendre la cité à de nouvelles dimensions."
 estate_jains_right_to_offer_loans:0 "Accorder le Droit de Prêt"
 estate_jains_right_to_offer_loans_desc:0 "Les [Root.GetJainsName] se sont forgé une réputation de prêteurs. En leur accordant des droits spéciaux à cet égard, nous favorisons la fluidité générale de l'économie."
 estate_jains_economical_boost:0 "Accorder la Liberté Économique aux [Root.GetJainsName]"
 estate_jains_economical_boost_desc:0 "Tout a un prix si l'on trouve le bon acheteur. Notre propre terre ne fait pas exception. En laissant les [Root.GetJainsName] contrôler une partie de nos terres de la couronne, nous pouvons obtenir un bénéfice substantiel pour nos revenus."
 estate_jains_incorruptible_offices:0 "[Root.GetJainsName] aux Fonctions Publiques"
 estate_jains_incorruptible_offices_desc:0 "Les [Root.GetJainsName] sont loin d'être négligeables dans notre pays. Leur accorder des postes au sein de notre gouvernement ne peut qu'être bénéfique à l'avancement général de notre nation."
 estate_jains_patronize_jain_familiy:0 "Droits Étendus des Familles Jaïnes"
 estate_jains_patronize_jain_familiy_desc:0 "Les familles des [Root.GetJainsName] sont puissantes, mais leur influence se limite aux [Root.GetJainsName] uniquement. En étendant considérablement les droits des [Root.GetJainsName], ils pourraient se montrer plus indulgents dans leurs revendications futures."
 estate_jains_promote_jain_bookkeeping:0 "Promouvoir la Comptabilité des [Root.GetJainsName]"
 estate_jains_promote_jain_bookkeeping_desc:0 "Les affaires économiques devraient être entre les mains des [Root.GetJainsName]."
 ###NOBLE PRIVILEGES###
 estate_nobles_mansabdari_cav_maintenance:0 "Mansabdar : Force de Cavalerie"
 estate_nobles_mansabdari_cav_maintenance_desc:0 "Les mansabdars devaient fournir à l'État leurs propres chevaux pour la cavalerie en échange de droits fonciers ou de la promesse d'un généreux salaire."
 estate_nobles_mansabdari_military_service:0 "Mansabdar : Service Militaire"
 estate_nobles_mansabdari_military_service_desc:0 "Les mansabdars sont appelés à effectuer leur service militaire pour l'État. Ils commanderont les armées de notre grand [Root.GovernmentName] et serviront aux côtés du simple soldat au front."
 estate_nobles_mansabdari_royal_rule:0 "Mansabdar : Règle Royale"
 estate_nobles_mansabdari_royal_rule_desc:0 "Les mansabdars sont soumis à la Règle Royale. En les écartant de force des positions de pouvoir, le [Root.Monarch.GetTitle] peut affirmer son autorité sur le système des mansabdars."
 estate_nobles_rynda:0 "Boyards : Infanterie Rynda"
 estate_nobles_rynda_desc:0 "Les ryndas, sélectionnés parmi les jeunes boyards, sont la garde personnelle du [Root.Monarch.GetTitle] et protègent la cour. Bien qu'ils ne voient traditionnellement que peu de combats, ils pourraient être utilisés pour servir dans notre armée comme hommes d'armes."
 estate_nobles_rynda_at:0 "Tant que notre dirigeant est §Ygénéral§!, nous gagnons jusqu'à §G+15,0 %§! de Capacité de Combat d'Infanterie.\nSinon, nous gagnons jusqu'à §G-20,0 %§! de Coût d'Infanterie à la place."
 estate_nobles_landed_army:0 "Boyards : Armée Terrienne"
 estate_nobles_landed_army_desc:0 "L'Armée Terrienne est la force de cavalerie de [Root.GetUsableName]. Les boyards s'équipent eux-mêmes ainsi que leurs serviteurs armés à leurs propres frais."
 estate_nobles_landed_army_tt:0 "Nous gagnons jusqu'à §G+20,0 %§! de Capacité de Combat de Cavalerie."
 estate_nobles_mestnichestvo:0 "Système du Mestnitchestvo"
 estate_nobles_mestnichestvo_desc:0 "Le Mestnitchestvo est un système hiérarchique féodal complexe basé sur l'ancienneté de l'individu au sein de l'aristocratie étendue [Root.GetAdjective]. Menant souvent à des violences et des intrigues au sein de la noblesse, le Système du Mestnitchestvo éradique tout espoir de mérite dans les hautes fonctions de [Root.GetUsableName]."
 estate_nobles_early_serfdom:0 "Servage Naissant"
 estate_nobles_early_serfdom_desc:0 "Les paysans ont été asservis par la [Root.GetNobilityName]. Bien que le système n'ait pas encore été institutionnalisé, c'est le premier pas vers l'éradication complète de la liberté paysanne."
 estate_nobles_legalized_serfdom:0 "Servage Légalisé"
 estate_nobles_legalized_serfdom_desc:0 "Le servage est désormais légalement défini par une loi récemment adoptée. La [Root.GetNobilityName] a le droit de disposer des paysans asservis comme bon lui semble."
 estate_nobles_total_serfdom:0 "Servage Total"
 estate_nobles_total_serfdom_desc:0 "Le système de servage a été resserré au point qu'il ne reste pratiquement plus de paysan libre dans le pays. La mobilité sociale est chose du passé pour les paysans tandis que notre État jouit des fruits de leur labeur."
 estate_nobles_restricted_serfdom:0 "Servage Restreint"
 estate_nobles_restricted_serfdom_desc:0 "Le servage a été restreint comme première étape vers l'abolition de ces chaînes imposées aux paysans. Au grand déplaisir de la [Root.GetNobilityName], les paysans peuvent désormais changer de maître."
 estate_nobles_devastating_serfdom:0 "Servage Dévastateur"
 estate_nobles_devastating_serfdom_desc:0 "Le servage est devenu un élément central de notre société. À tel point que la simple idée de liberté pour un paysan est devenue blasphématoire même pour le plus bas rang de la [Root.GetNobilityName]."
 estate_nobles_increased_peasant_freedom:0 "Liberté Paysanne Accrue"
 estate_nobles_increased_peasant_freedom_desc:0 "Contre la volonté de la [Root.GetNobilityName], les paysans ont reçu une liberté de mouvement supplémentaire. Ils sont désormais autorisés à changer de propriétaire terrien quand ils le souhaitent, forçant la [Root.GetNobilityName] à faire preuve de clémence envers les paysans."
 estate_nobles_peasant_liberation:0 "Libération Paysanne"
 estate_nobles_peasant_liberation_desc:0 "La [Root.GetNobilityName] n'a plus aucun droit sur les paysans travaillant sur ses terres. Bien que ce changement soit une bénédiction pour la paysannerie, la [Root.GetNobilityName] nourrit une profonde rancune envers l'État pour avoir donné du pouvoir aux paysans."
 ###BURGHERS PRIVILEGES###
 estate_burghers_rise_of_the_burghers:0 "Essor des Bourgeois"
 estate_burghers_rise_of_the_burghers_desc:0 "Avec leur liberté nouvellement acquise, les paysans se sont lancés dans les arts du commerce et des affaires. Grâce à cette évolution, la [Root.GetBurghersName] s'agrandit à mesure que de plus en plus de paysans rejoignent cette classe avec leur richesse gagnée."
 estate_burghers_the_new_middle_class:0 "La Nouvelle Classe Moyenne"
 estate_burghers_the_new_middle_class_desc:0 "La majorité des anciens paysans a rejoint la classe sociale de la [Root.GetBurghersName]. Le pouvoir et l'influence que la [Root.GetBurghersName] exerce sur la cour sont indéniables."
 estate_privilege_only_revoked_by_republics:0 "§RNe peut être révoqué que par les §YRépubliques§!.§!"
 estate_burghers_promote_burgher_bookkeeping:0 "Promouvoir la Comptabilité de la [Root.GetBurghersName]"
 estate_burghers_promote_burgher_bookkeeping_desc:0 "Les affaires économiques devraient être entre les mains de la [Root.GetBurghersName]."
 ###JANISSARY PRIVILEGES###
 estate_janissary_sultans_aghas:0 "Aghas Nommés par le [Root.Monarch.GetTitle]"
 estate_janissary_sultans_aghas_desc:0 "Les aghas sont les commandants des Janissaires. En laissant le [Root.Monarch.GetTitle] nommer les aghas, nous pouvons nous assurer que des hommes compétents et rusés mènent nos troupes à la victoire."
 estate_janissary_recruited_by_merit:0 "Recrutement au Mérite"
 estate_janissary_recruited_by_merit_desc:0 "Les Janissaires sont recrutés par le Système du Devchirmé. Cependant, c'est nous qui décidons lesquels des nouvelles recrues serviront parmi les Janissaires. Le mérite dictera la composition des régiments."
 estate_janissary_professional_soldiers:0 "Soldats Professionnels"
 estate_janissary_professional_soldiers_desc:0 "Le rôle d'un Janissaire est de servir l'État comme infanterie d'élite. En tant que tel, chaque Janissaire est avant tout un soldat professionnel et n'est pas autorisé à exercer une activité secondaire."
 estate_janissary_professional_soldiers_mod:0 "Soldats Janissaires Professionnels"
 desc_estate_janissary_professional_soldiers_mod:0 "Le rôle d'un Janissaire est de servir l'État comme infanterie d'élite. En tant que tel, chaque Janissaire est avant tout un soldat professionnel et n'est pas autorisé à exercer une activité secondaire."
 estate_janissary_celibacy:0 "Célibat des Janissaires"
 estate_janissary_celibacy_desc:0 "Bien que non imposé par quelque moyen que ce soit, il est attendu de chaque Janissaire qu'il ne se marie pas avant l'âge de 40 ans, car sa loyauté n'appartient qu'à son [Root.Monarch.GetTitle] et non à une quelconque famille."
 estate_janissary_minimal_payment:0 "Standardisation des Soldes"
 estate_janissary_minimal_payment_desc:0 "Contrairement à de nombreux autres soldats, les Janissaires reçoivent leur juste part du butin de guerre et perçoivent même des soldes régulières pour leur service."
 estate_janissary_minimal_payment_ct:0 "L'événement « §YLes Janissaires Exigent leur Solde§! » nous coûte désormais nettement moins cher."
 estate_janissary_minimal_payment_rt:0 "L'événement « §YLes Janissaires Exigent leur Solde§! » n'aura plus de coût réduit pour le nouveau [Root.Monarch.GetTitle]."
 estate_janissary_rough_discipline:0 "Assurer un Entraînement Discipliné"
 estate_janissary_rough_discipline_desc:0 "L'entraînement des Janissaires est conçu pour être rude et les force à être hautement disciplinés. Bien que les méthodes semblent draconiennes pour les soldats ordinaires, elles sont nécessaires pour assurer la préparation des Janissaires."
 estate_janissary_rough_discipline_mod:0 "Entraînement Draconien"
 desc_estate_janissary_rough_discipline_mod:0 "L'entraînement des Janissaires est conçu pour être rude et les force à être hautement disciplinés. Bien que les méthodes semblent draconiennes pour les soldats ordinaires, elles sont nécessaires pour assurer la préparation des Janissaires."
 estate_janissary_loyalty_to_the_sultan:0 "Loyauté envers le [Root.GovernmentName]"
 estate_janissary_loyalty_to_the_sultan_desc:0 "Les Janissaires jurent fidélité au [Root.Monarch.GetTitle] et à [Root.Monarch.GetHerHim] seul."
 estate_janissary_strict_devshirme_recruitment:0 "Système du Devchirmé Strict"
 estate_janissary_strict_devshirme_recruitment_desc:0 "Toutes les jeunes recrues du corps des Janissaires sont le fruit du système de prélèvement d'enfants connu sous le nom de Système du Devchirmé. Seuls les jeunes des païens sont pris pour être réduits en esclavage, convertis à l'Islam et recrutés."
 estate_janissary_strict_devshirme_recruitment_mod:0 "Système du Devchirmé"
 desc_estate_janissary_strict_devshirme_recruitment_mod:0 "Cette province fournit sa jeunesse païenne à son propriétaire comme recrues pour l'armée."
 estate_janissary_strict_devshirme_recruitment_gt:1 "Chaque province §YPaïenne§! obtient l'effet suivant :"
 estate_janissary_strict_devshirme_recruitment_rt:1 "Chaque province §YPaïenne§! perd son effet bonus."
 estate_janissary_self_appointed_aghas:0 "Aghas Auto-Désignés"
 estate_janissary_self_appointed_aghas_desc:0 "Les commandants des Janissaires ne sont plus nommés par le [Root.Monarch.GetTitle]. Désormais, les Janissaires élisent leurs propres aghas selon leurs propres critères de mérite."
 estate_janissary_hereditary_ranks:0 "Accorder des Rangs Héréditaires"
 estate_janissary_hereditary_ranks_desc:0 "Le rang d'un Janissaire n'est plus déterminé par le mérite. Il est devenu une position héréditaire, permettant aux descendants de rejoindre les Janissaires sans l'entraînement habituel nécessaire."
 estate_janissary_allow_other_professions:0 "Autoriser les Professions Paramilitaires"
 estate_janissary_allow_other_professions_desc:0 "Les Janissaires étaient à l'origine destinés à n'être que des soldats. Cependant, en temps de paix, les Janissaires ne trouvaient guère d'utilité.\nAinsi, tous les Janissaires sont autorisés à exercer une profession secondaire."
 estate_janissary_allow_other_professions_ct:0 "Les Objectifs militaires des §YJanissaires§! sont remplacés par des §YObjectifs économiques§!."
 estate_janissary_allow_marriages:0 "Accorder le Droit au Mariage"
 estate_janissary_allow_marriages_desc:0 "Les Janissaires sont autorisés à se marier et à fonder leurs propres familles quand ils le souhaitent. La loyauté autrefois exclusive envers le [Root.Monarch.GetTitle] est désormais partagée avec celle envers leurs épouses."
 estate_janissary_toprak_payment:0 "Instaurer les Paiements Toprak"
 estate_janissary_toprak_payment_desc:0 "Les soldes originales ne suffisent plus aux exigences des Janissaires. Le paiement requis pour leur service comprend désormais des parts de la terre même pour laquelle ils combattent."
 tur_toprak_janissary_wages_tt:0 "Le coût des soldes des Janissaires de l'événement « §YLes Janissaires Exigent leur Solde§! » comprend désormais des §YTerres de la Couronne§! et varie selon les compétences §YDiplomatiques§! du dirigeant."
 estate_janissary_janissary_officers:0 "Officiers Janissaires"
 estate_janissary_janissary_officers_desc:0 "L'entraînement des Janissaires n'est plus une préoccupation du gouvernement. Désormais, les Janissaires s'entraînent eux-mêmes, bien qu'il soit évident que la discipline n'est plus la priorité de cet entraînement."
 estate_janissary_janissary_officers_mod:0 "Officiers Janissaires"
 desc_estate_janissary_janissary_officers_mod:0 "L'entraînement des Janissaires n'est plus une préoccupation du gouvernement. Désormais, les Janissaires s'entraînent eux-mêmes, bien qu'il soit évident que la discipline n'est plus la priorité de cet entraînement."
 estate_janissary_guarantee_privileges:0 "Garantir les Privilèges"
 estate_janissary_guarantee_privileges_desc:0 "Bien que les Janissaires soient officiellement loyaux au [Root.GovernmentName], leur allégeance n'est assurée que par notre garantie de leurs privilèges."
 estate_janissary_janissaries_from_muslims:0 "Assouplir le Système du Devchirmé"
 estate_janissary_janissaries_from_muslims_desc:0 "Les avantages d'être un Janissaire sont considérables. Il n'est guère surprenant que les familles musulmanes de notre [Root.GovernmentName] fassent entrer leurs enfants dans le corps des Janissaires. Bien que trouver de nouveaux Janissaires soit moins préoccupant désormais, la discipline des soldats laisse beaucoup à désirer."
 estate_janissary_janissaries_from_muslims_mod:0 "Système du Devchirmé Ignoré"
 desc_estate_janissary_janissaries_from_muslims_mod:0 "Les avantages d'être un Janissaire sont considérables. Il n'est guère surprenant que les familles musulmanes de notre [Root.GovernmentName] fassent entrer leurs enfants dans le corps des Janissaires. Bien que trouver de nouveaux Janissaires soit moins préoccupant désormais, la discipline des soldats laisse beaucoup à désirer."
 estate_janissary_coup_detat:0 "Coup d'État"
 estate_janissary_coup_detat_desc:0 "Le gouvernement n'est plus entre les mains du [Root.Monarch.GetTitle], mais désormais constamment contesté par les forces des Janissaires et les loyalistes de [Root.GetUsableName]."
 estate_janissary_military_reactionaries:0 "Réactionnaires Militaires"
 estate_janissary_military_reactionaries_desc:0 "Les Janissaires se sentent menacés dans leur mode de vie et leurs doctrines militaires. La discipline de notre armée tout entière souffre de l'audace des Janissaires."
 estate_janissary_puppet_sultan:0 "[Root.Monarch.GetTitle] Fantoche"
 estate_janissary_puppet_sultan_desc:0 "Le [Root.Monarch.GetTitle] n'est plus maître de lui-même. Les Janissaires peuvent imposer leur volonté sans aucune résistance."
 estate_janissary_ottoman_vanguards:0 "Avant-gardes Ottomanes"
 estate_janissary_ottoman_vanguards_desc:0 "Nos troupes janissaires deviendront l'avant-garde de nos forces. Semant la peur chez ceux qui les affrontent sur le champ de bataille, les Janissaires nous mèneront vers un avenir glorieux."
 estate_janissary_ottoman_vanguards_mod:0 "Avant-gardes Ottomanes"
 desc_estate_janissary_ottoman_vanguards_mod:0 "Nos troupes janissaires deviendront l'avant-garde de nos forces. Semant la peur chez ceux qui les affrontent sur le champ de bataille, les Janissaires nous mèneront vers un avenir glorieux."
 ###JANISSARY AGENDAS###
 estate_janissaries_hire_advisor:0 "Engager un Conseiller Militaire"
 estate_janissaries_hire_advisor_desc:0 "Les Janissaires souhaitent que le [Root.Monarch.GetTitle] engage un nouveau conseiller militaire."
 estate_janissaries_fire_advisor:0 "Renvoyer notre Conseiller Militaire"
 estate_janissaries_fire_advisor_desc:0 "[Root.Mil_Advisor.GetTitle] [Root.Mil_Advisor.GetName] a insulté les Janissaires. Ils exigent que nous le renvoyions !"
 estate_janissaries_three_privileges:0 "Étendre les Privilèges des Janissaires"
 estate_janissaries_three_privileges_desc:0 "En tant que force d'élite de [Root.GetName], les Janissaires se sentent désavantagés à bien des égards de la vie. Ils exigent que nous les rassurions sur leur statut en leur accordant davantage de privilèges."
 estate_janissaries_reduce_war_exhaustion:0 "Se Remettre des Ravages de la Guerre"
 estate_janissaries_reduce_war_exhaustion_desc:0 "Les Janissaires ont combattu dur et longtemps lors de nos récentes campagnes. Nombre de leurs soldats sont tombés au combat. Ils nous implorent de permettre à la nation de se remettre avant de tenter de nouvelles conquêtes."
 estate_janissaries_increase_monthly_military_power:0 "Se Concentrer sur nos Capacités Militaires"
 estate_janissaries_increase_monthly_military_power_desc:0 "L'armée est la force vitale de notre État. Naturellement, les Janissaires sont très intéressés à ce que notre attention reste sur les besoins militaires."
 estate_janissaries_retake_core:0 "Reprendre [agenda_province.GetName]"
 estate_janissaries_retake_core_desc:0 "Les Janissaires déplorent le fait que [agenda_province.GetName], partie intégrante de notre nation, ne soit pas sous notre contrôle. Ils exigent que nous reprenions la terre qui nous revient de droit !"
 estate_janissaries_support_independence:0 "Soutenir l'Indépendance [agenda_country.GetAdjective]"
 estate_janissaries_support_independence_desc:0 "Les Janissaires attirent l'attention sur le sort de [agenda_country.GetUsableName], une nation cruellement assujettie par nos rivaux, [agenda_rival_country.GetUsableName]. Ils nous enjoignent de défendre la cause de la justice et de soutenir l'indépendance [agenda_country.GetAdjective]."
 estate_janissaries_gain_corruption:0 "Accorder les Libertés aux Janissaires"
 estate_janissaries_gain_corruption_desc:0 "Les Janissaires sont conscients de leur propre position dans notre [Root.GovernmentName] et exigent que nous leur accordions plus de libertés dans leurs affaires d'État."
 estate_janissaries_stop_converting_province_x:0 "Protéger les Droits des Minorités à [agenda_province.GetName]"
 estate_janissaries_stop_converting_province_x_desc:1 "Les Janissaires sont consternés par notre manque de considération pour les droits religieux des minorités. Ils exigent que nous rappelions immédiatement notre missionnaire de [agenda_province.GetName] !"
 estate_janissaries_build_an_army:0 "Constituer une Armée pour notre Nation"
 estate_janissaries_build_an_army_desc:0 "Les Janissaires considèrent notre armée comme une honte pour notre nation. Ils appellent urgemment à son expansion, afin que nos forces puissent présenter une dissuasion suffisante aux ennemis qui pourraient convoiter nos terres."
 estate_janissaries_recruit_janissaries:0 "Recruter des Régiments de Janissaires"
 estate_janissaries_recruit_janissaries_desc:0 "Les Janissaires eux-mêmes veulent prouver leur valeur sur le champ de bataille. Naturellement, ils souhaitent être présents dans nos armées."
 estate_janissaries_humiliate_rival:0 "Humilier [agenda_country.GetName]"
 estate_janissaries_humiliate_rival_desc:1 "Le [agenda_country.GovernmentName] [agenda_country.GetAdjective] est une épine dans notre pied depuis des années. Les Janissaires en sont conscients et exigent que nous agissions contre notre rival de longue date."
 estate_janissaries_build_army_building_in_y:0 "Développer l'Infrastructure Militaire à [agenda_province.GetName]"
 estate_janissaries_build_army_building_in_y_desc:0 "Les Janissaires de [agenda_province.GetName] nous pressent de construire de nouveaux centres d'entraînement et de recrutement dans la province afin de sécuriser notre approvisionnement en recrues de haute qualité pour l'armée."
 estate_janissaries_build_soldier_household:0 "Construire un Foyer de Soldats à [agenda_province.GetName]"
 estate_janissaries_build_soldier_household_desc:0 "Les Janissaires ont besoin d'un foyer de soldats à [agenda_province.GetName] afin d'obtenir un recrutement plus rapide et plus efficace de leurs soldats."
 estate_janissaries_crush_revolts:0 "Écraser les Rebelles"
 estate_janissaries_crush_revolts_desc:0 "Les Janissaires exigent que nous utilisions leur force pour écraser les révoltes qui balaient notre nation."
 estate_janissaries_expand_into_x:0 "S'Étendre vers [agenda_province.GetAreaName]"
 estate_janissaries_expand_into_x_desc:0 "Les Janissaires aspirent à une expansion de leurs forces disponibles. Ils lorgnent avec envie sur [agenda_province.GetAreaName], une région qui ferait selon eux un bel ajout à notre nation. Ils appellent à une campagne militaire pour en sécuriser une partie pour nous-mêmes."
 estate_janissaries_condottieri_rivals:0 "Envoyer des Condottieres contre [agenda_country.GetUsableName]"
 estate_janissaries_condottieri_rivals_desc:0 "Nos rivaux de [agenda_country.GetUsableName] cherchent à étendre leur pouvoir par leur guerre contre [agenda_enemy_country.GetUsableName]. Les Janissaires nous appellent à les empêcher de prendre l'avantage en envoyant une force pour soutenir la cause [agenda_enemy_country.GetAdjective]."
 estate_janissaries_bigger_army_than_rival:0 "Se Protéger contre [agenda_country.GetUsableName]"
 estate_janissaries_bigger_army_than_rival_desc:0 "Les Janissaires craignent que notre armée soit mal en point face aux forces [agenda_country.GetAdjective] en cas de guerre. Ils insistent pour que nous augmentions notre recrutement afin que nos forces armées ne soient plus surpassées par nos rivaux."
 estate_janissaries_build_up_manpower_reserves:0 "Reconstituer nos Réserves de Main-d'œuvre"
 estate_janissaries_build_up_manpower_reserves_desc:1 "L'épuisement de nos réserves de main-d'œuvre inquiète les Janissaires, qui avertissent que [Root.GetUsableName] serait sans défense si nos ennemis cherchaient à profiter de la situation. Ils préconisent de nous consolider un temps et de permettre à nos réserves de se reconstituer."
 estate_janissaries_develop_heathen_x:0 "Augmenter la Main-d'œuvre à [agenda_province.GetName]"
 estate_janissaries_develop_heathen_x_desc:1 "Les Janissaires demandent que nous investissions dans la prospérité de [agenda_province.GetName]."
 estate_janissaries_build_trade_building_in_y:0 "Développer l'Infrastructure Commerciale à [agenda_province.GetName]"
 estate_janissaries_build_trade_building_in_y_desc:0 "Les Janissaires, autrefois classe guerrière et maintenant état marchand, prétendent que le marché de [agenda_province.GetName] est trop petit pour leurs besoins. Ils demandent que nous investissions dans un marché plus grand, ce qui selon eux augmentera considérablement la prospérité de la province et du pays dans son ensemble."
 estate_janissaries_increase_trade_power_in_X:0 "Augmenter la Puissance Commerciale dans le nœud [agenda_trade_node.GetTradeNodeName]"
 estate_janissaries_increase_trade_power_in_X_desc:0 "Les Janissaires, autrefois militaires, nous appellent à accroître notre présence commerciale dans le nœud commercial [agenda_trade_node.GetTradeNodeName], une action qui selon eux augmenterait considérablement la prospérité de la nation."
 estate_janissaries_restore_currency:0 "Restaurer la Monnaie"
 estate_janissaries_restore_currency_desc:0 "Les Janissaires, autrefois soldats et maintenant marchands, sont préoccupés par l'inflation que connaît [Root.GetUsableName]. Ils appellent à la freiner avant qu'elle ne devienne incontrôlable !"
 estate_janissaries_get_cash:0 "Constituer un Trésor"
 estate_janissaries_get_cash_desc:0 "L'état pitoyable de nos coffres est une source de grande préoccupation pour les Janissaires marchands. Ils nous pressent de modérer nos dépenses afin de reconstituer notre trésor."
 estate_janissaries_build_university_in_y:0 "Construire une Université à [agenda_province.GetName]"
 estate_janissaries_build_university_in_y_desc:0 "Les Janissaires nous demandent de financer la création d'une nouvelle université à [agenda_province.GetName], afin que les nouvelles recrues puissent bénéficier de la meilleure éducation que [Root.GetUsableName] puisse offrir."
 estate_janissaries_build_manufactory_in_y:0 "Construire une Manufacture à [agenda_province.GetName]"
 estate_janissaries_build_manufactory_in_y_desc:1 "Les Janissaires demandent que nous financions la construction d'une nouvelle [agenda_province.GetManufactory] à [agenda_province.GetName]. Ils prétendent que ce sera un investissement très rentable, doublant la production de [agenda_province.GetTradeGoodsName] de la province."
 estate_janissaries_build_production_building_in_y:0 "Augmenter l'Efficacité de Production à [agenda_province.GetName]"
 estate_janissaries_build_production_building_in_y_desc:1 "Les entrepreneurs parmi les Janissaires demandent que nous investissions dans l'infrastructure de production de la province à [agenda_province.GetName]. Ils prétendent que les installations élargies qu'ils proposent augmenteraient considérablement la prospérité de la province et du pays dans son ensemble."
 estate_janissaries_gain_mercantilism:0 "Augmenter notre Mercantilisme"
 estate_janissaries_gain_mercantilism_desc:0 "Les Janissaires marchands veulent renforcer leur emprise sur notre économie. Ils souhaitent un commerce plus mercantiliste."
 ###AGENDA MODIFIERS###
 new_recruitment_center:0 "Nouveau Centre de Recrutement"
 desc_new_recruitment_center:0 "L'investissement de l'État a permis une meilleure infrastructure pour le recrutement local."
 ###REBELS###
 janissary_rebels_title:0 "Rebelles Janissaires"
 janissary_rebels_name:0 "Janissaires de $COUNTRY$"
 janissary_rebels_desc:0 "Des Janissaires devenus décadents exigent un État qui leur soit propre. Ils combattront avec une discipline et une férocité sans pareilles et utiliseront l'artillerie au combat."
 janissary_rebels_army:0 "Armée des Rebelles Janissaires"
 janissary_rebels_demands:0 "Augmenter l'Influence des Janissaires"
 janissary_rebels_demands_desc:0 "Les rebelles janissaires cherchent à défendre leurs privilèges et exigent une augmentation de leur influence."
 renegade_sultan_son_rebels_title:0 "Rebelles du Prétendant Renégat"
 renegade_sultan_son_rebels_name:0 "Rebelles du Prétendant Renégat de $COUNTRY$"
 renegade_sultan_son_rebels_desc:0 "Ces rebelles sont des partisans loyaux du parent renégat du Sultan, qui cherche à s'emparer du trône de l'eyalet et à déclencher une révolte contre l'empire."
 renegade_sultan_son_rebels_army:0 "Armée du Prétendant Renégat"
 renegade_sultan_son_rebels_demands:0 "S'Emparer du Trône de l'Eyalet"
 renegade_sultan_son_rebels_demands_desc:0 "Les rebelles du prétendant exigent que le parent renégat du Sultan s'empare du trône de l'Eyalet et recherche l'indépendance de l'Empire."
 independence_rebels_title:0 "Rebelles Indépendantistes"
 independence_rebels_name:0 "Rebelles Indépendantistes de $COUNTRY$"
 independence_rebels_desc:0 "Ces rebelles recherchent l'indépendance politique de leur pays."
 independence_rebels_army:0 "Armée Indépendantiste"
 independence_rebels_demands:0 "Accorder l'Indépendance"
 independence_rebels_demands_desc:0 "Les rebelles recherchent l'indépendance politique de leur pays."
 eunuch_rebels_title:0 "Rebelles Eunuques"
 eunuch_rebels_name:0 "Eunuques de $COUNTRY$"
 eunuch_rebels_desc:0 "Les rebelles eunuques cherchent à défendre leur pouvoir et leurs privilèges à la cour et à accroître leur influence."
 eunuch_rebels_army:0 "Armée des Rebelles Eunuques"
 eunuch_rebels_demands:0 "Augmenter l'Influence des Eunuques"
 eunuch_rebels_demands_desc:0 "Les rebelles exigent d'augmenter substantiellement leur influence sur le gouvernement."
 local_janissaries_displeased:0 "Janissaires Locaux Mécontents"
 local_eunuchs_displeased:0 "Eunuques Locaux Mécontents"
 parliamentarians_rebels_title:0 "Rebelles Parlementaires"
 parliamentarians_rebels_name:0 "Parlementaires de $COUNTRY$"
 parliamentarians_rebels_desc:0 "Ces rebelles sont des partisans loyaux de §Y$PRETENDER_GENERAL$§W, qui s'oppose à la monarchie et veut établir une république avec §Y$PRETENDER_MONARCH$§W à la tête de $COUNTRY$."
 parliamentarians_rebels_army:0 "Armée des Rebelles Parlementaires"
 parliamentarians_rebels_demands:0 "Instaurer une République Parlementaire"
 parliamentarians_rebels_demands_desc:0 "Les rebelles parlementaires exigent que vous instauriez une république avec $PRETENDER_MONARCH$ à la tête de l'État de $COUNTRY$."
 ###BUILDING###
 building_manufactory:0 "Manufacture"
 ###NAVAL DOCTRINES###
 ottoman_great_navy:0 "Grande Marine Turque"
 ottoman_great_navy_desc:0 "La puissance de notre flotte réside dans son nombre. Pour chaque navire que l'ennemi déploie en mer, la Marine Turque en enverra trois."
 maghrebi_corsairs:0 "Corsaires Maghrébins"
 maghrebi_corsairs_desc:0 "Les marins maghrébins ont adopté une vie de pirates et de corsaires en Méditerranée. Pillant et saccageant les côtes des infidèles qui ne s'attendent pas à nos navires, les Corsaires Maghrébins sont une grande source de revenus pour notre pays."
 ###DISASTER EVENTS###
 ottoman_power_struggle_events.1.t:0 "La Lutte de Pouvoir de l'Empire Ottoman"
 ottoman_power_struggle_events.1.desc:0 "Autrefois acteur majeur sur la scène des grandes puissances et source de crainte dans le cœur de ses ennemis, l'Empire Ottoman est dans un état de décadence et de stagnation depuis des années. Là où régnait jadis un [Root.Monarch.GetTitle] absolu, il y a désormais une lutte de pouvoir entre les nombreux groupes influents du gouvernement ottoman. Les plus notables sont les Janissaires qui prétendent que [Root.Monarch.GetName] est une honte pour la Maison d'Osman et qu'[Root.Monarch.GetSheHe] cherche à détruire la puissance militaire de l'empire, et le Harem qui tente de s'emparer du contrôle de la cour en plaçant un sultan fantoche.\nTandis que le chaos règne dans le grand palais de la Maison d'Osman, les Eyalets et les Pachas autonomes saisissent l'opportunité d'étendre leur propre influence et cherchent l'indépendance vis-à-vis de l'Empire Ottoman."
 ottoman_power_struggle_events.1.a:0 "Des temps sombres s'annoncent..."
 ottoman_power_struggle_events.1.a.at:0 "Débloque les désastres §YCoup d'État des Janissaires§!, §YComplot du Harem§!, §YRébellion des Eyalets§!, §YDécadence des Pachas§! et §YRévolution§!."
 ottoman_power_struggle_events.1.a.tt:0 "Débloque les désastres §YCoup d'État des Janissaires§!, §YComplot du Harem§!, §YRébellion des Eyalets§! et §YDécadence des Pachas§!."
 ottoman_power_struggle_events.1.a.bt:0 "§YN'importe lequel de ces désastres peut survenir simultanément.§!"
 ottoman_power_struggle_events.1.a.ct:0 "§YLes nouvelles missions sont nécessaires pour mettre fin aux désastres.§!"
 ottoman_power_struggle_events.2.t:0 "Une Nouvelle Ère pour [Root.GetUsableName]"
 ottoman_power_struggle_events.2.desc:0 "Les longues luttes de pouvoir entre la Maison d'Osman et les nombreuses institutions de l'État sont enfin terminées ! Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a guidé notre royaume à travers son heure la plus sombre et a apporté des réformes radicales qui ont sauvé le [Root.GovernmentName] de la stagnation et de l'effondrement. De nombreuses institutions désuètes ont été modernisées, les Janissaires ont été maîtrisés et ne constituent plus une menace pour le gouvernement. Les Eyalets et les Pachas ont juré fidélité à leur maître et les sujets de notre royaume connaissent une période de prospérité retrouvée.\nÀ partir de ce jour, [Root.GetUsableName] sera connu comme un État ayant passé l'épreuve du temps et entrant désormais dans un nouvel Âge d'Or !"
 ottoman_power_struggle_events.2.desc.a:0 "Le Gouvernement Ottoman n'est plus ce qu'il était. Les traditions et lois musulmanes n'étant plus partie intégrante de notre gouvernement, le Harem a été naturellement dissous. Les pachas ont perdu leurs rangs tandis que les Eyalets ont été convertis en provinces normales de l'empire. Et même les Janissaires ont été neutralisés par une série d'assassinats et de chantages.\nBien que moins pompeux que beaucoup l'auraient espéré, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a réussi à mettre fin à la lutte de pouvoir interne de [Root.GetUsableName]."
 ottoman_power_struggle_events.2.desc.rev:0 "L'Empire Ottoman a traversé une période de stagnation et de troubles internes. Les Janissaires sapaient l'autorité du Sultan tandis que les Eyalets et les Pachas gagnaient de plus en plus d'autonomie. Finalement, la population même de l'empire s'est lassée de la décadence de sa patrie et s'est soulevée contre son régime incompétent ainsi que contre les menaces de la classe supérieure.\nDes cendres de l'Empire Ottoman s'est élevé le grand [Root.GovernmentName] de [Root.GetName] !"
 ottoman_power_struggle_events.2.a:0 "C'est le début d'un nouvel Âge d'Or pour [Root.GetUsableName] !"
 ottoman_power_struggle_events.2.b:0 "Au moins, nous ne sommes plus connus comme l'Homme Malade de l'Europe."
 ottoman_power_struggle_events.2.c:0 "À bas le Sultanat ! Vive le [Root.GovernmentName] !"
 ottoman_power_struggle_events.3.t:1 "La Légitimité de [Root.Monarch.GetName] Contestée"
 ottoman_power_struggle_events.3.desc:0 "Depuis que [Root.Monarch.GetName] a pris le pouvoir, ses ennemis veulent le voir quitter le trône. Récemment, une nouvelle rumeur concernant le [Root.Monarch.GetTitle] a attiré l'attention publique, remettant en question la piété, la légitimité et le dévouement de [Root.Monarch.GetName] envers le [Root.GovernmentName]."
 ottoman_power_struggle_events.3.a:0 "Ce ne sont que des rumeurs. Rien de plus."
 ottoman_power_struggle_events.4.t:0 "Perte de Prestige de [Root.GetUsableName]"
 ottoman_power_struggle_events.4.desc:0 "Il est plus qu'évident que notre [Root.GovernmentName] connaît des difficultés internes. Malheureusement pour nous, les États dans notre sphère d'influence l'ont remarqué et nous voient désormais comme faibles. « L'Homme Malade de [Root.Capital.GetContinentName] », voilà comment ils nous appellent."
 ottoman_power_struggle_events.4.a:0 "Ces allégations sont scandaleuses !"
 ottoman_power_struggle_events.5.t:0 "Administration Stagnante"
 ottoman_power_struggle_events.5.desc:0 "L'administration du gouvernement est dans un état préoccupant. Des tâches qui ne prenaient autrefois que quelques jours s'éternisent désormais pendant des semaines, voire des mois. Ce problème est particulièrement notable dans notre trésorerie, car même le moindre travail de comptabilité et de bureaucratie coûte plus qu'il ne rapporte."
 ottoman_power_struggle_events.5.a:0 "Ces tâches doivent néanmoins être accomplies. Investissons l'argent nécessaire."
 ottoman_power_struggle_events.5.b:0 "La comptabilité peut attendre. Cela ne vaut pas la peine de faire faillite pour si peu."
 ottoman_power_struggle_events.6.t:0 "Révolte des Beyliks"
 ottoman_power_struggle_events.6.desc:0 "La période de stagnation de [Root.GetUsableName] a rendu nos gouverneurs plus audacieux qu'il ne leur sied. Les beyliks, ces princes supposément loyaux de l'Empire qui administrent les provinces, sont en révolte ouverte contre leur [Root.Monarch.GetTitle] afin d'obtenir plus d'autonomie !"
 ottoman_power_struggle_events.6.a:0 "Ils le regretteront."
 ottoman_power_struggle_events.7.t:0 "Corruption à la Cour"
 ottoman_power_struggle_events.7.desc:0 "Alors que la lutte pour changer le statu quo de l'État devient de plus en plus évidente, les fonctionnaires et membres de la cour y voient l'occasion de s'enrichir. La corruption au palais royal ainsi que dans toutes les institutions d'État inférieures est devenue la norme."
 ottoman_power_struggle_events.7.a:0 "Des sangsues ! Tous autant qu'ils sont !"
 ottoman_power_struggle_events.8.t:0 "Bureaucratie Inefficace"
 ottoman_power_struggle_events.8.desc:0 "De nombreux systèmes gouvernementaux ont été établis aux premiers temps de l'empire. Ils sont donc fondés sur d'anciennes traditions plutôt que sur l'efficacité. Cela s'est particulièrement fait sentir ces derniers temps, les gouverneurs et fonctionnaires accordant bien moins de priorité à leurs tâches qu'ils ne le devraient."
 ottoman_power_struggle_events.8.a:0 "C'est regrettable."
 janissary_coup_events.1.t:0 "Coup d'État des Janissaires"
 janissary_coup_events.1.desc:0 "Les années de stagnation et de décadence ont laissé leur marque sur le gouvernement, car même les tâches les plus simples rencontrent une forte résistance de l'intérieur. La force réactionnaire la plus puissante est celle des Janissaires. Autrefois garde personnelle du [Root.Monarch.GetTitle], les Janissaires voient toute tentative de modernisation comme une menace pour leurs propres privilèges.\nLe [Root.Monarch.GetTitle] [Root.Monarch.GetName] a cherché à y remédier aujourd'hui en tentant de réduire le pouvoir des Janissaires. Peu après, une grande agitation a régné dans [Root.Capital.GetCapitalName] alors que les Janissaires, mécontents depuis longtemps de ce qu'ils considèrent comme la mauvaise gestion de l'empire par le [Root.Monarch.GetTitle], ont refusé le pain offert par le [Root.Monarch.GetTitle] et renversé leurs chaudrons sur la place centrale. Les Janissaires prétendent que [Root.Monarch.GetName] est une honte pour la Maison d'Osman, qu'[Root.Monarch.GetSheHe] a fait du Cheikh-ul-Islam sa marionnette personnelle et qu'[Root.Monarch.GetSheHe] cherche à détruire la puissance militaire de l'empire.\nLes Janissaires ont rapidement pris le contrôle du gouvernement et se sont assurés le soutien de nombreux autres groupes politiques de la capitale. Bien qu'[Root.Monarch.GetSheHe] soit encore en vie, [Root.Monarch.GetName] n'est plus maître de son empire."
 janissary_coup_events.1.desc.nosheikh:0 "Les années de stagnation et de décadence ont laissé leur marque sur le gouvernement, car même les tâches les plus simples rencontrent une forte résistance de l'intérieur. La force réactionnaire la plus puissante est celle des Janissaires. Autrefois garde personnelle du [Root.Monarch.GetTitle], les Janissaires voient toute tentative de modernisation comme une menace pour leurs propres privilèges.\nLe [Root.Monarch.GetTitle] [Root.Monarch.GetName] a cherché à y remédier aujourd'hui en tentant de réduire le pouvoir des Janissaires. Peu après, une grande agitation a régné dans [Root.Capital.GetCapitalName] alors que les Janissaires, mécontents depuis longtemps de ce qu'ils considèrent comme la mauvaise gestion de l'empire par le [Root.Monarch.GetTitle], ont refusé le pain offert par le [Root.Monarch.GetTitle] et renversé leurs chaudrons sur la place centrale. Les Janissaires prétendent que [Root.Monarch.GetName] est une honte pour la Maison d'Osman et qu'[Root.Monarch.GetSheHe] cherche à détruire la puissance militaire de l'empire.\nLes Janissaires ont rapidement pris le contrôle du gouvernement et se sont assurés le soutien de nombreux autres groupes politiques de la capitale. Bien qu'[Root.Monarch.GetSheHe] soit encore en vie, [Root.Monarch.GetName] n'est plus maître de son empire."
 janissary_coup_events.1.a:0 "Fort préoccupant."
 janissary_coup_events.1.a.tt:0 "Tous les privilèges positifs accordés aux §YJanissaires§! sont convertis en leur §RÉquivalent Négatif§!.\nLes événements génériques des Janissaires et les privilèges positifs pour les §YJanissaires§! sont désactivés jusqu'à la fin du désastre."
 janissary_coup_events.2.t:0 "La Fin du Coup d'État"
 janissary_coup_events.2.desc.a:0 "Les tombes de [janissary_province.GetName] s'étendent jusqu'à l'horizon. Un spectacle peu plaisant, mais le résultat d'une brutale nécessité. [Root.Monarch.GetName] médite tandis que ses gardes tirent la prochaine charretée de corps vers le cimetière sans fin. D'innombrables Janissaires et loyalistes sont morts pendant la période du Coup d'État des Janissaires, et bien que le [Root.Monarch.GetTitle] ait finalement été victorieux, le nombre de vies sacrifiées pour la stabilité et la sécurité de son [Root.GovernmentName] afflige [Root.Monarch.GetName].\n\nLa Maison d'Osman a triomphé une fois de plus contre un autre ennemi de l'empire. Les Janissaires ne sont plus que l'ombre d'eux-mêmes. Nombre de leurs membres reposent désormais dans les tombes de [janissary_province.GetName] tandis que ceux qui sont encore loyaux à [Root.Monarch.GetName] ont été intégrés à l'armée régulière de [Root.GetUsableName]."
 janissary_coup_events.2.desc.b:0 "Contre toute attente, [Root.Monarch.GetName] a réussi à utiliser son talent diplomatique pour négocier avec les Janissaires. Non pas ensanglantés et blessés, mais pacifiques et joyeux, les anciens preneurs d'otages quittent le palais royal en paix. Bien que le bain de sang ait été inévitable, les privilèges des Janissaires ont été révoqués en faveur de la promotion des autres classes de [Root.GetUsableName]. Ceux qui souhaitent continuer à servir comme soldats bien payés restent dans le corps tandis que les érudits, propriétaires terriens et marchands des Janissaires ont été promus parmi les [Root.GetClergyName], [Root.GetNobilityName] et [Root.GetBurghersName]. Bien que les discussions et débats aient pris plusieurs années pour aboutir, ils ont apporté paix et stabilité au [Root.GovernmentName], même si c'est au prix du pouvoir absolu du [Root.Monarch.GetTitle]."
 janissary_coup_events.2.a:0 "Tant de morts... mais au moins le [Root.GovernmentName] survivra."
 janissary_coup_events.2.b:0 "Enfin. Les Janissaires sont de nouveau l'avant-garde de notre État."
 janissary_coup_events.3.t:0 "Rébellions dans les Balkans"
 janissary_coup_events.3.desc:0 "Les rebelles janissaires semblent se rassembler en masse dans nos territoires balkaniques. Comme des loups affamés, ils prennent les armes contre le Sultan dans une vile tentative d'usurper la couronne qui lui a été si légitimement accordée par Dieu Lui-même !"
 janissary_coup_events.3.a:0 "Qu'on m'apporte mon fouet !"
 janissary_coup_events.4.t:0 "Rébellions dans les Territoires Anatoliens"
 janissary_coup_events.4.desc:0 "Les rebelles janissaires semblent se rassembler en masse dans nos territoires anatoliens. Comme des loups affamés, ils prennent les armes contre le Sultan dans une vile tentative d'usurper la couronne qui lui a été si légitimement accordée par Dieu Lui-même !"
 janissary_coup_events.4.a:0 "Par Allah, ils goûteront à ma botte !"
 janissary_coup_events.5.t:0 "Rébellions dans les Balkans et en Anatolie"
 janissary_coup_events.5.desc:0 "Les rebelles janissaires ont réussi à se coordonner et tentent maintenant une nouvelle stratégie audacieuse : ils se rassemblent dans nos territoires balkaniques et anatoliens en même temps. Plus seulement affamés, ces loups veulent mettre fin à l'empire lui-même et usurper le Sultan qui les a traités comme ses propres fils !"
 janissary_coup_events.5.a:0 "Qu'Allah ait pitié d'eux, car moi je n'en aurai pas."
 janissary_coup_events.12.t:0 "Négociations avec les Janissaires"
 janissary_coup_events.12.desc:0 "Bien que difficile, [Root.Monarch.GetName] et son Grand Vizir trouvent une oreille attentive parmi certains Janissaires. Certaines ortas sont prêtes à renoncer à certains des privilèges qu'elles ont acquis au fil des siècles en échange d'une vie plus favorable dans l'une des autres classes de la société de [Root.GetUsableName]. Cependant, ces régiments ne parlent qu'en leur nom, donc révoquer l'un des privilèges entraînera toujours une révolte active, bien que de moindre ampleur que l'alternative plus sanglante. Reste maintenant la question de savoir quel privilège révoquer..."
 janissary_coup_events.12.a:0 "Les Aghas seront désormais nommés par le Sultan."
 janissary_coup_events.12.b:0 "Le rang de Janissaire ne sera plus héréditaire."
 janissary_coup_events.12.c:0 "Un membre des Janissaires est toujours et uniquement un soldat."
 janissary_coup_events.12.d:0 "Le mariage pour les Janissaires n'est permis qu'après leur quarantième année."
 janissary_coup_events.12.e:0 "Les paiements sont de nouveau plus modestes mais constants."
 janissary_coup_events.12.f:0 "Les officiers des Janissaires assureront désormais la discipline."
 janissary_coup_events.12.g:0 "Les privilèges des Janissaires ne sont plus acquis."
 janissary_coup_events.12.h:0 "Le Système du Devchirmé sera restauré."
 janissary_coup_events.12.i:0 "Mettre fin à ce Coup d'État."
 janissary_coup_events.12.j:0 "Introduire des modernisations chez les Janissaires."
 janissary_coup_events.12.k:0 "Réduire l'influence des Janissaires sur le trône."
 janissary_coup_events.12.zzz:0 "Il n'y a rien à faire ici."
 janissary_coup_events.13.t:0 "Désertions de Janissaires"
 janissary_coup_events.13.desc:0 "Mon [Root.Monarch.GetTitle] ! Il semble que de nombreux soldats de notre grande armée aient décidé de déserter et de parcourir nos terres, soit pour échapper au chaos imminent, soit pour rejoindre la racaille rebelle ! Nous devons séparer le bon grain de l'ivraie, mais il apparaît que cela a laissé notre armée totalement mal préparée aux troubles à venir. Un jour noir pour nos livres d'histoire !"
 janissary_coup_events.13.a:0 "Bah, nous constituerons une nouvelle armée ! Avec des canons et des fusils !"
 janissary_coup_events.13.b:0 "Nous devons assurer la loyauté de l'armée restante."
 eyalet_rebellion_events.1.t:0 "La Rébellion des Eyalets"
 eyalet_rebellion_events.1.desc:0 "Des nouvelles préoccupantes des provinces frontalières sont parvenues à [Root.Monarch.GetName] ce matin. Les Eyalets, piliers de l'administration de [Root.GetUsableName], sont en défiance ouverte contre leur [Root.Monarch.GetTitle]. « Un Sultan qui ne peut même pas contrôler son palais à [Root.Capital.GetName] n'a aucune autorité sur aucun Eyalet », le beylerbey a proclamé une souveraineté de facto vis-à-vis de [Root.GetName] et ne répond plus qu'à lui-même."
 eyalet_rebellion_events.1.a:0 "Cette traîtrise ne sera pas oubliée."
 eyalet_rebellion_events.1.a.tt:0 "Chaque §YEyalet§! et §YEyalet Central§! gagne §R+20,0 %§! de Désir de Liberté."
 eyalet_rebellion_events.2.t:0 "Fin de la Rébellion des Eyalets"
 eyalet_rebellion_events.2.desc:0 "Les Eyalets ont été maîtrisés et les provinces frontalières de l'empire sont de nouveau sécurisées. Tous les beylerbeys traîtres ont été soit exécutés, soit exilés, et les sujets des territoires d'Eyalet retrouvent une vie normale dans [Root.GetUsableName]."
 eyalet_rebellion_events.2.a:0 "Merveilleux."
 eyalet_rebellion_events.3.t:0 "[angry_eyalet.GetName] Désobéit !"
 eyalet_rebellion_events.3.desc:0 "Les années d'autogouvernement ont fait croire au [angry_eyalet.Monarch.GetTitle] de [angry_eyalet.GetName] qu'il était sultan à part entière. [angry_eyalet.Monarch.GetSheHeCap] et ses sujets [angry_eyalet.GetAdjective] ont fait preuve d'une grande désobéissance envers le [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 eyalet_rebellion_events.3.a:0 "Sa tête roulera pour cela."
 eyalet_rebellion_events.4.t:0 "Évasion Fiscale de [angry_eyalet.GetName]"
 eyalet_rebellion_events.4.desc:0 "Un Eyalet est une division administrative de notre empire et, en tant que tel, n'est censé présenter que peu de différence avec le territoire central et les provinces détenues par le Sultan lui-même. En réalité, ce n'est bien sûr pas le cas en raison de l'immensité de l'empire, et un eyalet doit donc être gouverné par un représentant du Sultan.\nMalheureusement, le [angry_eyalet.Monarch.GetTitle] de [angry_eyalet.GetName] ne voit guère de raison de payer l'impôt habituel des Eyalets. Le laisser se soustraire à cette défiance donnera des idées similaires aux autres territoires sujets..."
 eyalet_rebellion_events.4.a:0 "Nous pouvons nous accommoder de moins d'impôts des Eyalets."
 eyalet_rebellion_events.4.b:0 "Nous ne devons pas montrer de faiblesse envers nos propres sujets. Collectez cet impôt !"
 eyalet_rebellion_events.5.t:0 "Révolte d'un Parent !"
 eyalet_rebellion_events.5.desc.son:0 "De graves nouvelles de [angry_eyalet.GetName] sont parvenues à [Root.Monarch.GetName]. Son propre fils, qui semble las d'attendre, a trouvé l'occasion de rassembler une armée à [angry_eyalet.GetName] et de se révolter contre son propre [Root.Monarch.GetMotherFather] ! Il est évident qu'il ne peut plus attendre la succession."
 eyalet_rebellion_events.5.desc.brother:1 "De graves nouvelles de [angry_eyalet.GetName] sont parvenues à [Root.Monarch.GetName]. Son frère, qui a survécu à la Succession Ottomane, a trouvé l'occasion de rassembler une armée à [angry_eyalet.GetName] et de se révolter contre son propre [Root.Monarch.GetSisterBrother] ! Il considère la décision de leur père de nommer [Root.Monarch.GetName] comme héritier comme injuste et tente de monter sur le trône de [angry_eyalet.GetName]."
 eyalet_rebellion_events.5.a:0 "C'est une trahison non seulement envers moi, mais envers toute la Maison d'Osman !"
 eyalet_rebellion_events.6.t:0 "La Révolte Égyptienne"
 eyalet_rebellion_events.6.desc:0 "Depuis la chute du Sultanat Mamelouk et l'établissement de [angry_eyalet.GetName], la situation en Égypte est précaire pour [Root.GetUsableName]. De nombreux systèmes gouvernementaux de l'ancien Sultanat Mamelouk ont été repris et maintenus, ce qui a conduit à une compétition interne entre le [angry_eyalet.Monarch.GetTitle] de [angry_eyalet.GetName] et le [Root.Monarch.GetTitle] pendant de nombreuses années.\nCes anciennes tensions se ravivent désormais alors que [angry_eyalet.Monarch.GetName] exige plus d'autonomie pour lui-même et son eyalet."
 eyalet_rebellion_events.6.a:0 "Accorder cette autonomie à [angry_eyalet.GetName]."
 eyalet_rebellion_events.6.b:0 "Plus d'autonomie ? Et pourquoi pas non ?"
 eyalet_rebellion_events.tt:0 "Des §YRebelles Indépendantistes§! déclareront une §YGuerre d'Indépendance§! au nom de §Y[angry_eyalet.GetName]§! s'ils imposent leurs exigences."
 eyalet_rebellion_events.6.c:0 "Écoutez, [angry_eyalet.Monarch.GetName], cela ne doit pas en arriver là..."
 eyalet_rebellion_events.7.t:0 "Demande Égyptienne de Plus d'Autonomie"
 eyalet_rebellion_events.7.desc:0 "L'Eyalet d'Égypte a transmis son ultimatum au [Root.Monarch.GetTitle] : ils exigent plus de libertés, sinon ils déclareront une guerre d'indépendance contre nous !"
 eyalet_rebellion_events.7.a:0 "Combattez et mourez pour votre indépendance !"
 eyalet_rebellion_events.7.b:0 "[angry_eyalet.GetName] ne cause que des problèmes. Accordons-leur l'indépendance."
 eyalet_rebellion_events.7.c:0 "Soit. Nous leur accorderons ces libertés."
 eyalet_rebellion_events.8.t:0 "La Révolte Perse"
 eyalet_rebellion_events.8.desc:1 "La région de Perse est une épine pour le [Root.Monarch.GetTitle] depuis notre conquête de cette région. Bien que les autrefois puissants Timourides et Safavides ne soient plus, les différences religieuses et culturelles entre les sujets de [angry_eyalet.GetName] et [Root.GetUsableName] ont causé de nombreux conflits.\nIl n'est surprenant pour personne que le [angry_eyalet.Monarch.GetTitle] [angry_eyalet.Monarch.GetName] fasse son mouvement et se révolte contre nous, à moins que nous n'accordions plus d'autonomie à [angry_eyalet.GetName]."
 eyalet_rebellion_events.9.t:0 "Demande Perse de Plus d'Autonomie"
 eyalet_rebellion_events.9.desc:0 "L'Eyalet de Perse a transmis son ultimatum au [Root.Monarch.GetTitle] : ils exigent plus de libertés, sinon ils déclareront une guerre d'indépendance contre nous !"
 eyalet_rebellion_events.10.t:0 "La Révolte Européenne"
 eyalet_rebellion_events.10.desc:0 "Les territoires européens au-delà des Balkans sont gérés par nos Eyalets les plus fiables. Cependant, leur loyauté n'était pas aussi garantie qu'espéré. [angry_eyalet.GetName] est en révolte ouverte contre nous et exige plus d'autonomie."
 eyalet_rebellion_events.11.t:0 "Demande Européenne de Plus d'Autonomie"
 eyalet_rebellion_events.11.desc:0 "[angry_eyalet.GetName] a transmis son ultimatum au [Root.Monarch.GetTitle] : ils exigent plus de libertés, sinon ils déclareront une guerre d'indépendance contre nous !"
 eyalet_rebellion_events.12.t:0 "Révolte Séparatiste à [tur_revolter_province.GetName]"
 eyalet_rebellion_events.12.desc:1 "Les sujets perses de [tur_revolter_province.GetName] sont insatisfaits de notre gouvernement de la Perse. Ils aspirent aux jours de la puissance timouride et méprisent la Maison d'Osman en raison des différences religieuses et culturelles entre les [tur_revolter_province.Culture.GetName] et les [Root.Culture.GetName]."
 eyalet_rebellion_events.12.a:0 "Écraser cette révolte."
 eyalet_rebellion_events.13.t:0 "Révolte Séparatiste à [tur_revolter_province.GetName]"
 eyalet_rebellion_events.13.desc:2 "Les sujets égyptiens de [tur_revolter_province.GetName] sont insatisfaits de notre gouvernement de l'Égypte. Ils regrettent le temps du Sultanat Mamelouk et souhaitent créer un État national égyptien."
 eyalet_rebellion_events.14.t:0 "Révolte Séparatiste à [tur_revolter_province.GetName]"
 eyalet_rebellion_events.14.desc:0 "Les sujets européens de [tur_revolter_province.GetName] sont insatisfaits de notre gouvernement des territoires européens. Ils souhaitent retourner sous la domination d'un royaume chrétien qui respecte les valeurs chrétiennes.\nNous sommes stupéfaits de leur ignorance."
 pasha_decadence_events.1.t:0 "Décadence des Pachas"
 pasha_decadence_events.1.desc:0 "Des rumeurs concernant le manque d'autorité et de légitimité de [Root.Monarch.GetName] sont parvenues aux Pachas trop ambitieux. Voyant que le gouvernement de [Root.GetName] connaît des difficultés internes, les Pachas au pouvoir ont déclaré leur semi-indépendance vis-à-vis du [Root.Monarch.GetTitle]."
 pasha_decadence_events.1.a:0 "Des temps sombres s'annoncent."
 pasha_decadence_events.2.t:0 "Fin de la Décadence des Pachas"
 pasha_decadence_events.2.desc:0 "Les Pachas ont été maîtrisés. Leur audace à défier tout ordre venant de [Root.Capital.GetName] est désormais considérée comme un crime capital et punie de mort. Ainsi, de nombreux Pachas autrefois décadents ont soit démissionné, soit été exilés, soit ont péri aux mains des troupes de choc du Sultan. Les Pachas sont enfin des serviteurs de l'État."
 pasha_decadence_events.2.a:0 "Enfin un peu de paix."
 pasha_decadence_events.3.t:1 "Le Pacha de [tur_pasha_province.GetAreaName] exige des Privilèges"
 pasha_decadence_events.3.desc:1 "Une lettre du Pacha de [tur_pasha_province.GetAreaName] est arrivée aujourd'hui à la cour. Apparemment, le gouverneur local a trouvé le courage d'exiger des privilèges du [Root.Monarch.GetTitle]. Il menace de se révolter si nous ne cédons pas."
 pasha_decadence_events.3.a:0 "Se révolter ? Renvoyez-lui une lettre et forcez-le à reculer."
 pasha_decadence_events.3.a.tt:0 "Nous exigerons que le Pacha recule.\nLes chances de réussite dépendent des compétences £dip£ de §Y[Root.Monarch.GetName]§! et de ses traits de personnalité."
 pasha_decadence_events.3.b:0 "Céder à la demande."
 pasha_decadence_events.4.t:1 "Le Pacha de [tur_pasha_province.GetAreaName] recule"
 pasha_decadence_events.4.desc:1 "Un ambassadeur de [tur_pasha_province.GetAreaName] est arrivé à la cour. Il semble que la lettre de [Root.Monarch.GetName] ait eu son effet, car le Pacha implore la clémence et renonce à ses exigences."
 pasha_decadence_events.4.a:0 "Au pied du mur, ils finissent toujours par céder."
 pasha_decadence_events.5.t:1 "Le Pacha de [tur_pasha_province.GetAreaName] se révolte"
 pasha_decadence_events.5.desc:1 "Un ambassadeur de [tur_pasha_province.GetAreaName] est arrivé à la cour. Il semble que la lettre de [Root.Monarch.GetName] n'ait eu aucun effet, car l'ambassadeur nous informe que le Pacha se révolte."
 pasha_decadence_events.5.a:0 "Je ne m'attendais pas à cela."
 pasha_decadence_events.6.t:0 "Révolte des Beyliks à [tur_revolter_province.GetName]"
 pasha_decadence_events.6.desc:0 "Le beylik de [tur_revolter_province.GetName] a montré une grande insatisfaction envers le gouvernement. La population de [tur_revolter_province.GetName] a pris les armes et menace d'une rébellion violente à moins que nous ne lui accordions l'autonomie."
 pasha_decadence_events.6.a:0 "Écraser cette rébellion."
 pasha_decadence_events.6.b:0 "Leur accorder cette autonomie."
 pasha_decadence_events.7.t:0 "La Rébellion Grecque de [tur_revolter_province.GetName]"
 pasha_decadence_events.7.desc:0 "Bien que faisant partie de notre empire depuis des siècles, le territoire de la Grèce abrite l'esprit d'une identité grecque indépendante. Alors que notre État souffre de problèmes internes, la population grecque de [tur_revolter_province.GetName] voit sa chance de se révolter contre nous. Ils exigent l'indépendance ou, à tout le moins, un degré significatif d'autonomie."
 pasha_decadence_events.7.a:0 "Mettre fin à cette révolte immédiatement."
 pasha_decadence_events.7.b:0 "Leur accorder l'autonomie qu'ils recherchent."
 pasha_decadence_events.8.t:0 "La Rébellion Serbe de [tur_revolter_province.GetName]"
 pasha_decadence_events.8.desc:0 "Les territoires de Serbie font partie de notre [Root.GovernmentName] depuis des siècles. Cependant, l'identité serbe n'a jamais cédé devant notre présence. Aujourd'hui encore, de fiers Serbes exigent une autonomie supplémentaire et menacent de se révolter si nous ne cédons pas."
 pasha_decadence_events.9.t:0 "La Rébellion Bulgare de [tur_revolter_province.GetName]"
 pasha_decadence_events.9.desc:0 "Le Second Empire Bulgare est tombé aux mains des forces ottomanes en 1396. Depuis lors, son territoire fait partie intégrante de notre empire. Cependant, sa population aspire toujours à plus d'autonomie vis-à-vis de la domination [Root.GetAdjective] et menace de se révolter si nous ne cédons pas."
 pasha_decadence_events.10.t:0 "La Rébellion [tur_revolter_province.Culture.GetName] de [tur_revolter_province.GetName]"
 pasha_decadence_events.10.desc:0 "Bien que musulmane, [tur_revolter_province.GetName] n'a jamais été une province [Root.Culture.GetName]. Elle s'est adaptée aux nouvelles circonstances de notre domination, mais son peuple reste [tur_revolter_province.Culture.GetName]. Alors que les récits de révoltes de Pachas leur parviennent, ils estiment être en position d'exiger plus d'autonomie."
 plot_of_the_harem_events.1.t:0 "Complot du Harem"
 plot_of_the_harem_events.1.desc:0 "Depuis la naissance de notre État, le Harem Impérial est l'une des institutions essentielles du gouvernement. Assurant la succession du Sultanat ainsi que symbole de richesse et de pouvoir pour le Sultan, le Harem n'a fait que croître en influence au fil des siècles.\n\nLa Validé Sultan ainsi que d'autres personnages importants du Harem ne peuvent plus cacher leur désapprobation de l'état actuel des affaires. Elles prétendent que [Root.Monarch.GetName] est inapte à gouverner correctement et se voient contraintes d'agir dans l'intérêt de l'empire. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'est plus qu'une figure de proue du Harem."
 plot_of_the_harem_events.1.a:0 "Otage de mon propre harem. L'humiliation..."
 plot_of_the_harem_events.1.a.tt:0 "Les événements du §YHarem§! sont désactivés tant que ce désastre est actif."
 plot_of_the_harem_events.2.t:0 "Fin du Complot du Harem"
 plot_of_the_harem_events.2.desc:0 "L'influence du Harem n'est plus. À travers une série de réformes, de faveurs et d'intrigues internes, le Harem a été maîtrisé. Les eunuques, concubines ainsi que la Validé Sultan elle-même ont été écartés des affaires du gouvernement et la loi de gouverner depuis le cheval est de nouveau appliquée. Plus jamais aucun nouveau Sultan ne deviendra l'esclave de son propre harem."
 plot_of_the_harem_events.2.a:0 "C'est enfin terminé."
 plot_of_the_harem_events.3.t:0 "Un Prétendant se Soulève à [tur_pretender_province.GetName]"
 plot_of_the_harem_events.3.desc.son:0 "[Root.tur_pretender.GetName], fils de [Root.Monarch.GetName], est devenu renégat avec sa mère. Il juge la force de son père trop faible et cherche à l'usurper. Il a rassemblé une armée dans la province de [tur_pretender_province.GetName] et est maintenant, sous la guidance de sa chère mère, en révolte ouverte contre son propre sang."
 plot_of_the_harem_events.3.desc.brother:0 "[Root.tur_pretender.GetName], frère de [Root.Monarch.GetName], est devenu renégat avec sa mère. Il juge la force de son demi-frère trop faible et cherche à l'usurper. Il a rassemblé une armée dans la province de [tur_pretender_province.GetName] et est maintenant, sous la guidance de sa chère mère, en révolte ouverte contre son frère."
 plot_of_the_harem_events.3.a:0 "[Root.tur_pretender.GetName] le paiera de sa vie."
 plot_of_the_harem_events.4.t:0 "Tentative d'Assassinat sur [Root.Heir.GetName]"
 plot_of_the_harem_events.4.desc:0 "Le jeune [Root.Heir.GetName] est l'héritier promis au trône de [Root.GetUsableName] et est en tant que tel le favori de [Root.Monarch.GetName] parmi ses enfants. Mais tous au Harem ne sont pas d'accord avec la décision du [Root.Monarch.GetTitle] et se sentent obligés de prendre les choses en main.\nOù que [Root.Heir.GetName] aille, les murmures de ses demi-frères et de leurs partisans le suivent. La rumeur dit qu'ils frapperont cette nuit..."
 plot_of_the_harem_events.4.a:0 "Qu'Allah protège mon [Root.Heir.GetDaughterSon] bien-aimé..."
 plot_of_the_harem_events.5.t:0 "Corruption à la Cour"
 plot_of_the_harem_events.5.desc:0 "Avec le harem utilisant son influence, la loyauté de nos propres conseillers n'est plus garantie. Les eunuques du harem utilisent l'extorsion, la corruption et d'autres méthodes déloyales pour éloigner les conseillers du [Root.Monarch.GetTitle]."
 plot_of_the_harem_events.5.a:0 "Pouah... s'ils étaient vraiment loyaux, ils resteraient à mes côtés."
 plot_of_the_harem_events.5.b:0 "Nous devons les payer davantage pour les convaincre de rester."
 plot_of_the_harem_events.6.t:0 "Test des Limites du Pouvoir Royal"
 plot_of_the_harem_events.6.desc:1 "Il semble que le « Sultanat des Femmes » revienne nous hanter. La Validé Sultan a testé les limites du pouvoir royal qui lui avait été généreusement accordé par le Sultan. Ces femmes inconscientes du Sultanat se sont également mêlées des affaires royales, ce que nous ne pouvions simplement pas tolérer. Cependant, le Sultan favorise toujours sa mère, citant son droit légal en tant que mère du Sultan de le conseiller sur les questions de législation et d'administration. Que faire concernant le pouvoir des femmes ?"
 plot_of_the_harem_events.6.a:0 "C'est tout à fait dans son droit !"
 plot_of_the_harem_events.6.a.tt:0 "Cette consolidation du pouvoir vers la Validé Sultan entraînera l'émergence de rivales au sein du Harem."
 plot_of_the_harem_events.6.b:0 "Ses excès doivent être freinés."
 plot_of_the_harem_events.6.b.tt:0 "S'opposer à la Validé Sultan entraînera d'autres rébellions à l'avenir."
 plot_of_the_harem_events.7.t:0 "Réaction du Harem"
 plot_of_the_harem_events.7.desc.a:0 "Depuis que la Validé Sultan est aux commandes du Harem et du gouvernement, l'Empire fait face à une difficulté après l'autre. Finalement, la Haseki Sultan, la concubine favorite de [Root.Monarch.GetName], a pris les choses en main. Par des intrigues de cour, la Haseki Sultan a démantelé toute base de pouvoir que la Validé Sultan avait sur le [Root.Monarch.GetTitle] et a réussi à prendre le contrôle du Harem Impérial."
 plot_of_the_harem_events.7.desc.b:0 "Les actions audacieuses de [Root.Monarch.GetName] contre le Harem n'ont pas été oubliées. Des eunuques renégats ont réussi à assembler une force pour attaquer le palais de [Root.Capital.GetName] afin de détrôner [Root.Monarch.GetName]."
 plot_of_the_harem_events.7.a:0 "Enfin un peu de paix au harem."
 plot_of_the_harem_events.7.b:0 "Traîtres !"
 ###DISASTER MODIFIERS###
 tur_shattered_the_janissaries:0 "Janissaires Brisés"
 desc_tur_shattered_the_janissaries:0 "Les Janissaires ne sont plus que l'ombre d'eux-mêmes. L'Incident Propice a conduit à la mort, à l'exil et au bannissement de nombreux membres des Janissaires. Ainsi, le pouvoir que cet état exerçait autrefois sur le gouvernement n'est plus."
 tur_reformation_of_the_ottoman_estates:0 "Réforme des États"
 desc_tur_reformation_of_the_ottoman_estates:0 "Le [Root.Monarch.GetTitle] a réformé le statut social et la qualité de vie des états. Les Janissaires ne sont plus la classe sociale la plus prestigieuse et leurs membres sont autorisés à abandonner leur statut pour obtenir une promotion vers la Noblesse, le Clergé ou la Bourgeoisie. Ceux qui restent dans le Corps des Janissaires servent exclusivement comme soldats pour le [Root.GovernmentName]."
 tur_inefficient_tax_collection:0 "Audace des Eyalets"
 desc_tur_inefficient_tax_collection:0 "Notre décision de laisser passer une évasion fiscale a donné à nos autres pays sujets l'idée de suivre cet exemple. Nos revenus et notre limite de forces provenant de nos sujets connaîtront un effondrement drastique."
 tur_loyal_pashas:0 "Pachas Loyaux"
 desc_tur_loyal_pashas:0 "Les Pachas ont été maîtrisés. De nombreux Pachas trop ambitieux ont été exilés ou exécutés et remplacés par d'autres véritablement loyaux au Sultan."
 tur_pasha_backed_down:0 "Le Pacha a Reculé"
 desc_tur_pasha_backed_down:0 "Le Pacha local a reculé et tente maintenant de s'attirer les faveurs du Sultan en accomplissant ses tâches avec un dévouement retrouvé."
 tur_pasha_revolt:0 "Révolte du Pacha"
 desc_tur_pasha_revolt:0 "Le Pacha local s'est révolté dans cette province. Les effets de sa déloyauté se feront sentir dans cette province pendant des années."
 tur_reign_of_the_valide_sultan_modifier:0 "Règne de la Validé Sultan"
 desc_tur_reign_of_the_valide_sultan_modifier:0 "La Validé Sultan, mère de notre [Root.Monarch.GetTitle], gouverne le pays depuis l'ombre du harem. Les décisions politiques ou gouvernementales que [Root.Monarch.GetName] prendrait sont fortement influencées par l'opinion de sa mère."
 tur_opposed_valide_sultan_modifier:0 "Opposition à la Validé Sultan"
 desc_tur_opposed_valide_sultan_modifier:0 "La Validé Sultan, mère de notre [Root.Monarch.GetTitle], a été contrariée. N'étant plus en mesure de manipuler son [Root.Monarch.GetDaughterSon], le harem a perdu un pouvoir considérable."
 tur_harem_under_haseki_sultans_control:0 "Harem sous le Contrôle de la Haseki Sultan"
 desc_tur_harem_under_haseki_sultans_control:0 "La Haseki Sultan est l'épouse favorite du Sultan et exerce une influence sur le sultan de plein droit. La Validé Sultan s'étant révélée plus nuisible à l'Empire en général et au Harem en particulier, la Haseki Sultan a pris le contrôle du Harem et assure sa loyauté envers [Root.Monarch.GetName]."
 ###ESTATE EVENTS###
 janissaries_estate_events.1.t:0 "Avancement des Janissaires"
 janissaries_estate_events.1.desc:0 "Les Janissaires sont les troupes d'élite du [Root.Monarch.GetTitle] et servent de garde personnelle. En période de [Root.Monarch.GetTitle] faibles ou de fortes demandes des Janissaires, l'influence de cette classe augmente considérablement au sein de [Root.GetUsableName]. Récemment encore, leurs services pour les affaires internes ont été requis, les rendant plus conscients de leur importance pour l'État [Root.GetAdjective]."
 janissaries_estate_events.1.a:0 "D'accord."
 janissaries_estate_events.2.t:0 "Déclin des Janissaires"
 janissaries_estate_events.2.desc:0 "Bien qu'étant une force militaire bien disciplinée, les Janissaires ne sont pas à l'abri des luttes internes dans leurs propres rangs. Plusieurs enchaînements d'événements ont conduit à des rivalités entre les différentes ortas des régiments de Janissaires, résultant en une organisation moins cohérente des Janissaires. N'étant plus en mesure de consacrer toute leur attention aux affaires politiques ou militaires, leur influence cède devant l'autorité de leur [Root.Monarch.GetTitle]."
 janissaries_estate_events.3.t:0 "Le Temps de la Paix"
 janissaries_estate_events.3.desc:0 "Force de discipline et de prouesse, les Janissaires sont entraînés pour le combat. Cependant, aucun [Root.GovernmentName] ne peut être en état de guerre permanent. Durant cette période de paix, les Janissaires servent l'État en assistant comme force de police du gouvernement, pompiers et gardiens du palais. Dernièrement, [Root.GetUsableName] connaît une période de paix et les Janissaires sont prêts à être affectés à leurs nouvelles positions jusqu'au début d'une autre guerre."
 janissaries_estate_events.3.a:0 "La sécurité de l'État doit être assurée."
 janissaries_estate_events.3.b:0 "Aucun bâtiment de ce pays ne doit brûler."
 janissaries_estate_events.3.c:0 "Le palais a besoin de gardes supplémentaires."
 janissaries_estate_events.4.t:0 "Propriété Foncière des Janissaires"
 janissaries_estate_events.4.desc:0 "Les Janissaires diffèrent des autres forces militaires car ils reçoivent un salaire régulier. Bien qu'habituellement sous forme de Ducats, il n'est pas rare que le [Root.Monarch.GetTitle] cède son propre territoire aux Janissaires comme forme de paiement. Plusieurs ortas ont trouvé un intérêt à acquérir un territoire propre à [janissary_province.GetName]. Ils se sont rendus auprès de leur [Root.Monarch.GetTitle] et ont exigé une influence dans la province comme paiement."
 janissaries_estate_events.4.a:0 "Leur accorder la terre."
 janissaries_estate_events.4.b:0 "Leur refuser ce paiement."
 janissaries_estate_events.5.t:0 "Rivalité avec la [Root.GetNobilityOrFallbackName]"
 janissaries_estate_events.5.desc:0 "Bien que notre armée soit principalement dirigée par les Janissaires, la [Root.GetNobilityOrFallbackName] conserve une influence significative sur la majorité de nos troupes régulières. Naturellement, cela provoque des conflits entre ces deux classes car elles sont vouées à s'affronter. Des questions telles que le commandement des ortas, le devoir de défendre le [Root.Monarch.GetTitle] et d'autres privilèges spéciaux sont régulièrement une source de conflit. Dans de telles situations, il appartient au [Root.Monarch.GetTitle] de servir de médiateur entre la [Root.GetNobilityOrFallbackName] et les Janissaires et de résoudre leur dernier point de désaccord."
 janissaries_estate_events.5.a:0 "Se ranger du côté des Janissaires."
 janissaries_estate_events.5.b:0 "Se ranger du côté de la [Root.GetNobilityOrFallbackName]."
 janissaries_estate_events.5.c:0 "Ne se ranger d'aucun côté."
 janissaries_estate_events.5.d:0 "Trouver un compromis avec les deux parties."
 janissaries_estate_events.6.t:0 "Le Mehterân"
 janissaries_estate_events.6.desc:0 "Le mehterân est la fanfare militaire des Janissaires et est bien connu bien au-delà des frontières de [Root.GetUsableName]. Partout où les Janissaires marchent, le mehterân suit pour inspirer les troupes pour la bataille. Les Janissaires exigent que des ressources de l'État soient dépensées pour financer la fanfare."
 janissaries_estate_events.6.a:0 "Argent bien dépensé."
 janissaries_estate_events.6.b:0 "Nous n'avons pas les Ducats à consacrer à la musique."
 janissaries_estate_events.7.t:0 "Loyauté envers le [Root.Monarch.GetTitle]"
 janissaries_estate_events.7.desc:0 "Un [Root.Monarch.GetTitle] n'est rien sans ses sujets loyaux. Cela est particulièrement vrai si les sujets sont les gardiens d'élite du [Root.Monarch.GetTitle] lui-même. Ces dernières années, les Janissaires ont exprimé une satisfaction remarquable envers le règne de [Root.Monarch.GetName] sur le [Root.GovernmentName]. Les soldes sont versées à temps et sont équitables, et les soldats sont exceptionnellement bien traités. La loyauté des Janissaires est assurée."
 janissaries_estate_events.7.a:0 "Excellent."
 janissaries_estate_events.8.t:0 "Les Janissaires se Rebellent !"
 janissaries_estate_events.8.desc:0 "Les relations entre [Root.GetUsableName] et les Janissaires ont atteint un nouveau point bas. Échouant à accorder plus de droits et de privilèges, notre État a déçu les attentes des Janissaires pendant des années. La négligence envers les soldats janissaires a créé une atmosphère de ressentiment et de méfiance qui menace maintenant d'éclater en conflit violent. Il n'était donc pas surprenant que les aghas des Janissaires lancent un ultimatum au [Root.Monarch.GetTitle] : soit nous cédons et faisons des concessions aux Janissaires, soit nous devons faire face à une rébellion ouverte."
 janissaries_estate_events.8.a:0 "Ils sont devenus trop audacieux pour leur propre bien. Écrasons-les."
 janissaries_estate_events.8.b:0 "Nous devrions céder. Nous ne pouvons nous permettre de combattre nos propres soldats."
 janissaries_estate_events.9.t:0 "Les Janissaires Formulent des Exigences"
 janissaries_estate_events.9.desc:0 "L'agha des Janissaires a réussi à acquérir une influence sérieuse à la cour [Root.GetAdjective], lui permettant d'atteindre une position où il peut formuler des exigences non négligeables au [Root.Monarch.GetTitle]. Comme il se doit, l'agha a dû saisir cette opportunité pour formuler des exigences au nom des Janissaires."
 janissaries_estate_events.9.a:0 "Inadmissible. Chassez-les de ma cour !"
 janissaries_estate_events.9.b:0 "Ils auront ce qu'ils demandent."
 janissaries_estate_events.10.t:0 "Ascension d'un Janissaire Prometteur"
 janissaries_estate_events.10.desc:0 "Un jeune Janissaire a attiré l'attention de l'agha. Tout au long de sa carrière, le soldat a fait forte impression sur ses camarades de son orta. Son génie tactique ainsi que ses compétences administratives ont montré une promesse de grandeur.\nNaturellement, il n'a pas fallu longtemps avant que même le [Root.Monarch.GetTitle] lui-même remarque son talent. Le jeune homme est arrivé à la cour de [Root.Monarch.GetName] aujourd'hui et attend anxieusement ce que le grand [Root.Monarch.GetTitle] a à dire."
 janissaries_estate_events.10.a:0 "Il fera un excellent général."
 janissaries_estate_events.10.b:0 "Enfin, un bon commandant pour la cour."
 janissaries_estate_events.10.c:0 "Un nouveau grand vizir, je le vois bien !"
 janissaries_estate_events.10.d:0 "Qu'il réforme notre armée."
 janissaries_estate_events.10.e:0 "Il est talentueux, certes, mais pas digne de mon attention."
 janissaries_estate_events.11.t:0 "Érudits et Administrateurs issus des Janissaires"
 janissaries_estate_events.11.desc:0 "Depuis que les Janissaires ont obtenu le privilège d'exercer une profession en dehors de l'armée, les rangs des érudits et des administrateurs au sein de notre État ont grossi. Les hommes de science embrassent les nombreuses littératures que notre [Root.GovernmentName] a produites au fil des siècles et ne voient donc que peu d'intérêt à retourner à leur vie de soldat. Bien qu'avantageux pour notre administration, cette antipathie envers leur véritable métier prévu diminuera certainement la qualité de nos troupes janissaires si nous laissons cela continuer."
 janissaries_estate_events.11.a:0 "Les laisser poursuivre leurs véritables intérêts."
 janissaries_estate_events.11.b:0 "Les Janissaires sont avant tout une force militaire."
 janissaries_estate_events.12.t:0 "Rivalité avec la [Root.GetBurghersOrFallbackName]"
 janissaries_estate_events.12.desc:0 "Avec l'introduction des professions secondaires, les Janissaires se sont engagés dans les arts du commerce et des affaires. Naturellement, cela entre en conflit avec une autre classe de la société : la [Root.GetBurghersOrFallbackName]. Récemment, un conflit entre ces deux états de notre pays a éclaté concernant certains droits marchands. Il appartient au [Root.Monarch.GetTitle] de résoudre définitivement cette question."
 janissaries_estate_events.12.a:0 "Se ranger du côté des Janissaires."
 janissaries_estate_events.12.b:0 "Se ranger du côté de la [Root.GetBurghersOrFallbackName]."
 janissaries_estate_events.12.c:0 "Ne se ranger d'aucun côté."
 janissaries_estate_events.12.d:0 "Trouver un compromis avec les deux parties."
 janissaries_estate_events.13.t:0 "Propriétaires Terriens des Janissaires"
 janissaries_estate_events.13.desc:0 "Suite à l'autorisation des professions secondaires, certains Janissaires ont réussi à accumuler une grande richesse pour eux-mêmes. Non seulement sous forme de Ducats mais aussi de terres véritables, la richesse des Janissaires leur a permis d'acquérir la province de [janissary_province.GetName] pour eux-mêmes. Cependant, pour que ce soit officiel, ils doivent d'abord conclure un accord avec notre gouvernement."
 janissaries_estate_events.13.a:0 "Les laisser posséder [janissary_province.GetName]."
 janissaries_estate_events.13.b:0 "Non, les terres de [Root.GetUsableName] sont la propriété du [Root.Monarch.GetTitle]."
 EST_VAL_JANISSARIES_ADVANCE:0 "Avancement des Janissaires : §Y$VAL$%§!"
 EST_VAL_JANISSARIES_DECLINE:0 "Déclin des Janissaires : §Y$VAL$%§!"
 EST_VAL_HAS_RULERS_FAVOR:0 "Dispose de la Faveur du Dirigeant : §Y$VAL$%§!"
 EST_VAL_RULER_PICKED_NO_SIDE:0 "Le Dirigeant n'a Choisi Aucun Camp : §Y$VAL$%§!"
 EST_VAL_HAS_MEHTERAN:0 "A Promu le Mehterân : §Y$VAL$%§!"
 EST_VAL_HAS_NOT_MEHTERAN:0 "A Négligé le Mehterân : §Y$VAL$%§!"
 EST_VAL_JANISSARIES_CONCESSIONS:0 "Concessions : §Y$VAL$%§!"
 EST_VAL_JANISSARIES_DENIED_LAND_OWNERSHIP:0 "Propriété Foncière Refusée : §Y$VAL$%§!"
 EST_VAL_JANISSARIES_FORCED_TO_FIGHT:0 "Forcés de Combattre : §Y$VAL$%§!"
 EST_VAL_EXTENDED_JANISSARY_PRIVILEGES:1 "Exigences Satisfaites : §Y$VAL$%§!"
 EST_VAL_NO_EXTENDED_JANISSARY_PRIVILEGES:1 "Exigences Refusées : §Y$VAL$%§!"
 ###ESTATE EVENT MODIFIERS###
 janissary_policemen:0 "Policiers Janissaires Élargis"
 desc_janissary_policemen:0 "Les Janissaires ont reçu l'instruction de servir l'État comme policiers.\n\n§YDure jusqu'à ce que [Root.GetUsableName] déclare une guerre.§!"
 janissary_fireighters:0 "Pompiers Janissaires Élargis"
 desc_janissary_fireighters:0 "Les Janissaires ont reçu l'instruction de servir l'État comme pompiers.\n\n§YDure jusqu'à ce que [Root.GetUsableName] déclare une guerre.§!"
 janissary_palace_guardians:0 "Gardiens du Palais Janissaires Élargis"
 desc_janissary_palace_guardians:0 "Les Janissaires ont reçu l'instruction de servir l'État comme gardiens du palais.\n\n§YDure jusqu'à ce que [Root.GetUsableName] déclare une guerre.§!"
 janissary_mehteran:0 "Le Mehterân"
 desc_janissary_mehteran:0 "Nous avons investi dans une grandiose fanfare militaire, le mehterân, afin d'inspirer les Janissaires pour les batailles à venir."
 janissary_loyalty_to_the_sultan:0 "Loyauté envers le Dirigeant"
 desc_janissary_loyalty_to_the_sultan:0 "Grâce aux bonnes relations avec les Janissaires, le [Root.Monarch.GetTitle] a assuré leur loyauté absolue pour un avenir prévisible."
 janissary_scholar_and_merchants:0 "Érudits et Marchands Janissaires"
 desc_janissary_scholar_and_merchants:0 "Notre décision de laisser les Janissaires poursuivre leurs intérêts a conduit à une augmentation significative d'érudits et de marchands au sein de notre [Root.GovernmentName]. Cela se fait cependant au prix fort de leur disponibilité au combat."
 janissary_unfit_for_fighting:0 "Janissaires trop Ramollis"
 desc_janissary_unfit_for_fighting:0 "Notre décision de laisser les Janissaires poursuivre leurs intérêts a conduit à une augmentation significative d'érudits et de marchands au sein de notre [Root.GovernmentName]. Cela se fait cependant au prix fort de leur disponibilité au combat."
 ###ESTATE DISASTER EVENTS###
 estate_disasters.21.t:0 "Les Janissaires se Libèrent"
 estate_disasters.21.d:0 "Les aghas des Janissaires ont étendu leur influence et leur autorité sur un vaste territoire de notre État. Là où régnaient autrefois des pachas loyaux gouvernent désormais des Janissaires qui ne voient plus aucune raison de combattre pour leur [Root.Monarch.GetTitle]. Tout ce que [Root.Monarch.GetName] peut faire est d'accepter qu'[Root.Monarch.GetSheHe] n'a plus aucun contrôle pratique sur la région ni sur les Janissaires qui y résident. Avec le couronnement d'un chef qui leur est propre, la transition est complète et notre perte d'autorité sur cette fraction significative des Janissaires est totale."
 ###RANDOM EVENTS###
 random_event.27.t:0 "Le Grand Incendie de [Root.Capital.GetName] de [GetDate]"
 random_event.27.desc:0 "La tragédie a frappé [Root.Capital.GetName] ! Tandis que de gigantesques nuages de fumée couvraient le ciel au-dessus de la ville, des flammes ardentes ont consumé la vieille ville et de nombreux quartiers de [Root.Capital.GetName]. Pendant trois jours consécutifs, l'incendie a fait rage et détruit des infrastructures cruciales ainsi que des maisons de la population."
 random_event.27.a:0 "Une semaine terrible pour un bourgeois."
 ###KOREAN DECISIONS###
 establish_sinmun_office_title:0 "L'Office du Sinmun"
 establish_sinmun_office_desc:0 "Les sujets qui estiment avoir été exploités ou traités injustement par le gouvernement ou leurs suzerains ont peu ou pas de chance de faire entendre leurs préoccupations. Il a été suggéré que nous formions une branche spéciale du gouvernement pour examiner ces cas."
 promote_sojunghwa_decision_title:0 "Promouvoir le Sojunghwa"
 promote_sojunghwa_decision_desc:0 "L'Empire Céleste est tombé aux mains de barbares mesquins ! Le concept même du Mandat Céleste a été corrompu tandis que des hordes de sauvages conquièrent le cœur de la Chine.\nIl appartient à [Root.GetUsableName] de reprendre le manteau d'un véritable royaume chinois."
 sojunghwa:0 "Sojunghwa"
 desc_sojunghwa:0 "Le Sojunghwa (« Petite Chine ») est l'idéologie fondamentale de notre État. L'Empire Céleste du passé est tombé aux mains des barbares, et il nous appartient désormais de perpétuer son héritage."
 ###RUSSIAN MISSIONS###
 mos_the_civil_war_title:0 "La Guerre Civile Moscovite"
 mos_the_civil_war_desc:0 "C'est une tradition moscovite que le frère aîné prenne le trône de la principauté. Vassili Ier le savait, pourtant il désigna Vassili II comme successeur au trône de Moscou. De ce fait, notre État a dû subir deux périodes de guerre civile. Enfin, le rival au trône, Iouri Dmitrievitch, a été vaincu. Cependant, son fils, Dimitri Chemyaka, aspire toujours au trône. Nous devons nous assurer que cette guerre civile prenne fin."
 mos_the_civil_war_at:0 "§YVassili II l'Aveugle§! n'est plus [Root.Monarch.GetTitle] de §Y[Root.GetName]§!"
 mos_the_civil_war_bt:0 "La chaîne d'événements « §YLa Guerre Civile Moscovite§! » a été conclue."
 mos_secure_muscovys_future_title:0 "Assurer un Commandement Fort"
 mos_secure_muscovys_future_desc:0 "Il est clair que le [Root.GovernmentName] fera face à de nombreux défis à l'avenir. Nous avons besoin d'un commandement fort pour les surmonter et mener [Root.GetUsableName] vers un lendemain doré."
 mos_rus_window_on_the_west_title:0 "Fenêtre sur l'Occident"
 mos_rus_window_on_the_west_desc:0 "La Mer Baltique est un nœud commercial important et la ligne de vie économique des États de Pologne, de Scandinavie et de Russie. Il est de la plus haute importance que nous améliorions notre accès au commerce lucratif de la Mer Baltique."
 nov_rus_window_on_the_west_title:0 "Fenêtre sur l'Occident"
 nov_rus_window_on_the_west_desc:0 "La Mer Baltique est un nœud commercial important et la ligne de vie économique des États de Pologne, de Scandinavie et de Russie. Il est de la plus haute importance que nous améliorions notre accès au commerce lucratif de la Mer Baltique."
 mos_rus_conquer_finland_title:0 "Conquête de la Finlande"
 mos_rus_conquer_finland_desc:0 "Les royaumes scandinaves ont été une épine dans le pied du peuple [Root.GetAdjective] pendant des siècles. Ils sont en concurrence directe avec nous pour la domination du commerce en Mer Baltique et représentent une menace s'ils rassemblent de puissants alliés en Europe. Nous devons frapper les premiers et pousser vers la Scandinavie en conquérant les terres des Finlandais pour nous-mêmes."
 mos_rus_conquer_finland_at:0 "Cet événement nous permettra de libérer @FIN la §YFinlande§! comme §YUnion Personnelle§! et donne accès à la §JCavalerie Hakkapeliitta§!. Alternativement, nous gagnons 75 £adm£.\n"
 nov_rus_conquer_finland_title:0 "Conquête de la Finlande"
 nov_rus_conquer_finland_desc:0 "Les royaumes scandinaves ont été une épine dans le pied du peuple [Root.GetAdjective] pendant des siècles. Ils sont en concurrence directe avec nous pour la domination du commerce en Mer Baltique et représentent une menace s'ils rassemblent de puissants alliés en Europe. Nous devons frapper les premiers et pousser vers la Scandinavie en conquérant les terres des Finlandais pour nous-mêmes."
 mos_rus_subjugate_scandinavia_title:0 "Abattre le Lion du Nord"
 mos_rus_subjugate_scandinavia_desc:0 "Notre première poussée en Finlande a été un grand succès. Cependant, le Lion du Nord trône toujours. Nous devons poursuivre notre marche vers la Scandinavie et mettre fin à la menace que représentent les trois royaumes."
 mos_rus_subjugate_scandinavia_at:0 "Si la §YFinlande§! est notre sujet :"
 mos_rus_subjugate_scandinavia_bt:0 "Les missions de la @FIN §YFinlande§! peuvent désormais être accomplies en tant que sujet."
 mos_rus_subjugate_scandinavia_ct:0 "Si la §YFinlande§! n'est pas notre sujet :"
 nov_rus_subjugate_scandinavia_title:0 "Abattre le Lion du Nord"
 nov_rus_subjugate_scandinavia_desc:0 "Notre première poussée en Finlande a été un grand succès. Cependant, le Lion du Nord trône toujours. Nous devons poursuivre notre marche vers la Scandinavie et mettre fin à la menace que représentent les trois royaumes."
 mos_rus_europes_greatest_power_title:0 "La Grande Puissance de l'Est"
 mos_rus_europes_greatest_power_desc:0 "La scène européenne est dressée. Les royaumes soit s'effondrent, soit se transforment en empires qui façonnent le monde à leur guise. Nous ne pouvons nous permettre de prendre du retard. De tous ces empires, l'Empire Russe s'élèvera au sommet des Puissances Mondiales."
 mos_rus_conquer_novgorod_title:0 "Envahir Novgorod"
 mos_rus_conquer_novgorod_desc:0 "La République du Vétché de Novgorod a résisté à la soumission pendant des siècles. Ni les hordes sauvages ni ses boyards arriérés n'ont réussi à causer la chute de Novgorod. Il nous appartient de mettre fin à cette république arrogante et de saisir son territoire."
 mos_rus_conquer_ruthenia_title:1 "Conquérir la Ruthénie"
 mos_rus_conquer_ruthenia_desc:0 "Le Commonwealth Polonais est à la fois faible et inapte à gouverner les fiers peuples ruthénien et biélorusse, et d'autres pays l'ont également réalisé. Il est grand temps d'agir avant que la région ne soit partagée entre nos rivaux."
 nov_rus_handle_ruthenia_title:1 "Conquérir la Ruthénie"
 nov_rus_handle_ruthenia_desc:0 "Le Commonwealth Polonais est à la fois faible et inapte à gouverner les fiers peuples ruthénien et biélorusse, et d'autres pays l'ont également réalisé. Il est grand temps d'agir avant que la région ne soit partagée entre nos rivaux."
 mos_rus_conquer_ruthenia_at:0 "Cet événement nous donnera le choix de développer un aspect de §Y[280.GetName]§!."
 mos_rus_partition_poland_title:0 "Partager la Pologne"
 mos_rus_partition_poland_desc:1 "La Pologne est un État faible dirigé par des dirigeants faibles. Les pays pertinents du monde, et notre propre nation en premier lieu, devraient découper leur territoire à la première occasion."
 mos_rus_partition_poland_at:0 "jusqu'à ce qu'une culture du groupe culturel §YSlave Occidental§! soit rétrogradée"
 nov_rus_deal_with_poland_title:0 "Partager la Pologne"
 nov_rus_deal_with_poland_desc:1 "La Pologne est un État faible dirigé par des dirigeants faibles. Les pays pertinents du monde, et notre propre nation en premier lieu, devraient découper leur territoire à la première occasion."
 nov_rus_take_danzig_title:0 "S'Emparer de Dantzig"
 nov_rus_take_danzig_desc:0 "Dantzig compte parmi les ports les plus riches et les plus stratégiques de la Baltique. Naturellement, les Chevaliers Teutoniques, la Couronne Polonaise, la Hanse et les Monarques Scandinaves souhaitent revendiquer la ville pour eux-mêmes. Ils ignorent qu'elle est la propriété légitime de Mère Russie."
 mos_rus_carpathian_conquest_title:0 "Annexer les Carpates"
 mos_rus_carpathian_conquest_desc:0 "Le bassin des Carpates abrite nos frères de foi qui souffrent sous l'occupation hérétique. C'est notre devoir de libérer ces pauvres âmes des griffes de leurs oppresseurs."
 mos_rus_carpathian_conquest_at:0 "jusqu'à ce qu'une culture du groupe culturel §YCarpathien§! soit rétrogradée"
 PERMANENT:1 "permanente "
 mos_rus_carpathian_conquest_ct:1 "§Y[Root.GetName]§! obtient une revendication [Root.GetPermanentOrEmpty]sur chaque province §YSlave du Sud§! dans la région des §YBalkans§!."
 mos_rus_protect_south_slavs_title:0 "Protéger les Slaves du Sud"
 mos_rus_protect_south_slavs_desc:0 "Les Slaves du Sud des Balkans sont trop faibles pour se protéger eux-mêmes. Ils ne sont que de simples pions pour le blasphémateur Saint-Empereur Romain et le diabolique Sultan des Ottomans. Nous devons pousser vers les Balkans et les protéger de ces menaces maudites."
 mos_rus_protect_south_slavs_at:0 "jusqu'à ce qu'une culture du groupe culturel §YSlave du Sud§! soit rétrogradée"
 mos_rus_protect_south_slavs_bt:0 "Former le groupe culturel §YSlave§!."
 mos_rus_claim_the_third_rome_title:0 "La Troisième Rome"
 mos_rus_claim_the_third_rome_desc:0 "Avec la chute de l'Empire Byzantin, [Root.GetUsableName] est le seul État restant à pouvoir revendiquer le titre de « Troisième Rome ». Acquis par mariage royal, le titre n'est encore qu'une revendication jusqu'à ce que nous le légitimions aux yeux du monde en affirmant notre contrôle sur la Ville du Désir du Monde, Constantinople elle-même."
 mos_rus_claim_the_third_rome_at:0 "Cet événement nous permettra de déplacer notre capitale à §Y[151.GetName]§! et de la développer ou de continuer à développer §Y[Root.Capital.GetName]§! à la place."
 nov_rus_involve_in_asian_trade_title:0 "Le Commerce Asiatique"
 nov_rus_involve_in_asian_trade_desc:0 "Initialement motivé par notre quête de fourrure, notre [Root.GovernmentName] s'est frayé un chemin vers l'est et a atteint des marchés avec des marchandises inconnues de tous nos voisins occidentaux. Pour la fortune de Mère Russie, nous devons nous impliquer dans ce commerce !"
 nov_rus_involve_in_asian_trade_at:0 "Si nous accomplissons cette mission en participant au commerce à §YYumen§! :"
 nov_rus_involve_in_asian_trade_bt:0 "Si nous accomplissons cette mission en participant au commerce à §YLahore§! :"
 nov_rus_dominate_asian_market_title:0 "Monopoliser les Marchés Asiatiques"
 nov_rus_dominate_asian_market_desc:0 "Le commerce de l'Inde et de la Chine est d'un profit immense. Naturellement, nos rivaux sont plus qu'intéressés à participer à ces marchés également. Nous devons nous assurer que nous seuls avons un accès complet aux marchandises d'Asie."
 nov_rus_compete_in_the_channel_title:1 "La Route Russe"
 nov_rus_compete_in_the_channel_desc:1 "Nous avons obtenu un accès complet aux marchés indiens et chinois et nous canalisons leurs actifs les plus précieux vers notre principal entrepôt en Europe. Mais ce que nous gagnons n'est que le début d'une entreprise bien plus grande. Faisons revivre la Route de la Soie et transformons-la en le chemin qui conduit les richesses de l'Asie vers l'Europe."
 nov_rus_compete_in_the_channel_at:0 "[Root.GetName] a un §YBonus Commercial§! pour soit la §YPorcelaine§!, le §YTissu§!, le §YPapier§!, la §YSoie§!, le §YThé§!, les §YColorants§! ou les §YÉpices§! !"
 RUS_RUSSIAN_ENGLISH_COMPETITION:0 "Concurrence dans la Manche"
 RUS_PERMANENT_BATLIC_SEA_ACCESS:0 "Accès Permanent à la Mer Baltique"
 nov_rus_conquer_muscovy_title:0 "Mettre Fin à Moscou"
 nov_rus_conquer_muscovy_desc:0 "À nos débuts, avant la proclamation du [Root.GovernmentName], notre État luttait contre les Riourikides de Moscou. Bien qu'ils ne soient plus une menace active pour nous, leur existence même est une offense envers ce que les [Root.Culture.GetName] représentent."
 nov_rus_monopolize_lubeck_title:1 "Dominer Lübeck"
 nov_rus_monopolize_lubeck_desc:0 "Les marchands et négociants de la Mer Baltique se rendent à Lübeck pour vendre leurs marchandises sur ses riches marchés. La ville doit être nôtre afin que nous puissions y monopoliser le commerce."
 nov_rus_trade_empire_of_europe_title:0 "Empire Commercial d'Europe"
 nov_rus_trade_empire_of_europe_desc:0 "Les royaumes s'élèvent en empires par la conquête et l'effusion de sang. Bien que profitable en soi, ce n'est pas aussi sophistiqué que notre manière de projeter notre puissance. Notre [Root.GovernmentName] sera connu dans ce monde comme l'Empire Commercial d'Europe, qui contrôle le flux des Ducats."
 nov_rus_trade_empire_of_europe_at:0 " Nœuds Commerciaux Européens :\n    §Y[Root.GetName]§! a §Y40 %§! ou plus de puissance commerciale."
 mos_rus_build_up_army_title:0 "Rassembler l'Armée"
 mos_rus_build_up_army_desc:0 "Des hordes à l'Est ; une Pologne montante à l'Ouest et un Empire Ottoman impérialiste au Sud. Nos ennemis sont nombreux et nos alliés peu nombreux. Nous devons rassembler nos troupes si [Root.GetUsableName] doit survivre aux siècles à venir."
 mos_rus_build_up_army_at:0 "Cet événement nous permettra d'obtenir un modificateur puissant en échange de la transformation de TOUTES les §YRevendications Permanentes§! de nos missions en §YRevendications Non-permanentes§!."
 mos_rus_eliminate_the_minors_title:0 "Consolider la Russie"
 mos_rus_eliminate_the_minors_desc:0 "La Russie est divisée en de nombreux princes faibles et mesquins. Aucun d'entre eux n'est digne d'être le dirigeant du peuple slave oriental. Les héritiers de Riourik doivent plier le genou devant la puissance du nom de [Root.GetUsableName]."
 rus_unifier_of_russia:0 "Unificateur de la Russie"
 desc_rus_unifier_of_russia:0 "[Root.Monarch.GetName], [Root.Monarch.GetTitle] de la Rus', a unifié la région russe sous le règne glorieux de [Root.GetUsableName]. Que son règne soit un règne d'unité et de force."
 mos_rus_eliminate_the_minors_at:0 "Jusqu'à §Y10§! provinces de la région §YRussie§! gagnent §G1§! Développement Militaire de base."
 mos_rus_conquer_crimea_title:0 "Accès à la Mer Noire"
 mos_rus_conquer_crimea_desc:0 "Les ports de la Mer Blanche ne sont utilisables que trois mois par an. La Mer Baltique est plus accessible, mais fortement contestée par nos rivaux.\nL'État a besoin d'un port en eaux chaudes pour s'engager dans le commerce et les échanges maritimes. Les plus proches sont les ports de Crimée. La mère patrie revendiquera cette région !"
 mos_rus_conquer_the_caucasus_title:0 "Marcher vers le Caucase"
 mos_rus_conquer_the_caucasus_desc:0 "Le Caucase est divisé par de nombreux royaumes entourés de menaces musulmanes. Leur perte est imminente si nous n'intervenons pas dans leur malheur. Les Chrétiens de ces montagnes doivent être protégés, soit par l'épée, soit par la plume."
 mos_rus_conquer_the_caucasus_tt:1 "Tout allié avec sa capitale dans la région du §YCaucase§! :\n    Possède au moins §Y15§! provinces.\n    Est du groupe religieux §Y[Root.Religion.GetGroupName]§!.\n    A au moins §Y100§! d'opinion de §Y[Root.GetName]§!"
 mos_rus_conquer_the_caucasus_at:1 "Si nous accomplissons cette mission en conquérant §Y15§! provinces dans la région du §YCaucase§! :"
 mos_rus_conquer_the_caucasus_bt:1 "Si nous accomplissons cette mission en ayant un allié dans la région du §YCaucase§! qui remplit les secondes conditions :"
 mos_rus_conquer_the_caucasus_ct:1 "Notre allié reçoit également le même modificateur.\n\nChaque province de la région de §YCaucasie§! possédée par §Y[Root.GetName]§!, ses sujets et ses alliés obtient les effets suivants :"
 mos_rus_conquer_persia_title:0 "Au-delà de la Mer Caspienne"
 mos_rus_conquer_persia_desc:0 "Le Caucase et les déserts d'Asie Centrale sont sous notre contrôle. Cependant, la grande Route de la Soie passe par les montagnes perses au-delà de la Mer Caspienne. Pour vraiment bénéficier de notre conquête, nous devons assurer l'accès au commerce persan, soit directement par la conquête, soit indirectement par une alliance."
 mos_rus_conquer_persia_at:0 "Fait partie du nœud commercial de §YPerse§!."
 mos_rus_conquer_persia_bt:0 "Tout allié §Y[Root.Religion.GetGroupName]§! avec sa capitale dans la région du §YCaucase§! possède ou a un sujet qui possède au moins §Y20§! provinces dans la région de §YPerse§!."
 mos_rus_conquer_persia_ct:1 "Si nous accomplissons cette mission en conquérant §Y6§! provinces d'importance commerciale significative dans le nœud commercial de §YPerse§! :"
 mos_rus_conquer_persia_dt:1 "Si nous accomplissons cette mission en ayant un allié qui remplit les secondes conditions :"
 mos_rus_conquer_persia_et:0 "Cet événement nous permettra de demander à notre allié de devenir un sujet de §Y[Root.GetName]§!."
 mos_rus_land_of_churches_title:0 "Terre d'Églises"
 mos_rus_land_of_churches_desc:0 "Il est impératif que chaque citoyen de notre nation, du prince au paysan, ait accès à une guidance spirituelle de notre clergé. Chaque village doit avoir une église."
 icon_climacus_reward_tt:1 "Si nous avons commandé l'§YIcône de Saint Jean Climaque§! :"
 icon_eleusa_reward_tt:1 "Si nous avons commandé l'§YIcône d'Eleusa§! :"
 icon_michael_reward_tt:1 "Si nous avons commandé l'§YIcône de Saint Michel§! :"
 icon_nicholas_reward_tt:1 "Si nous avons commandé l'§YIcône de Saint Nicolas§! :"
 icon_pancreator_reward_tt:1 "Si nous avons commandé l'§YIcône du Christ Pantocrator§! :"
 mos_rus_russian_patriarchate_title:0 "Patriarcat Russe"
 mos_rus_russian_patriarchate_desc:0 "Constantinople ne peut être le centre spirituel du Christianisme Orthodoxe sans la légitimité de l'Empereur Byzantin. Nous devons reprendre le manteau et établir une Troisième Rome !"
 mos_rus_conquer_the_great_horde_title:0 "Briser le Joug Tatar"
 mos_rus_conquer_the_great_horde_desc:0 "La Grande Horde et les autres tribus nomades à nos frontières ont imposé leur joug immonde sur notre fier peuple. Exigeant un tribut déraisonnable chaque année, les hordes ne sont rien d'autre qu'un fléau dangereux pour notre État.\nSi nous voulons devenir un grand empire ; un État qui peut véritablement revendiquer l'héritage des Romains, alors nous devons nous libérer du Joug Tatar."
 mos_rus_end_the_tatar_yok_title:0 "Détruire les Hordes"
 mos_rus_end_the_tatar_yok_desc:0 "Le Joug Tatar a peut-être été brisé, mais la sécurité de notre peuple reste incertaine tant que les héritiers de l'Empire Mongol existent. Aucun de ces nomades des steppes n'échappera à la colère de Mère Russie !"
 mos_rus_conquer_central_asia_title:0 "Consolider les Steppes"
 mos_rus_conquer_central_asia_desc:0 "Bien que nous ayons vaincu bon nombre des hordes les plus menaçantes, nous pouvons encore améliorer notre position stratégique dans les Steppes. Consolidons-nous dans la région et soumettons tous les nomades restants."
 RUS_RUSSIAN_TRADE_MONOPOLY:0 "Monopole Commercial Russe"
 mos_rus_conquer_central_asia_ct:0 "Fait partie du nœud commercial de §YSamarcande§!"
 mos_rus_conquer_central_asia_at:0 "Chaque Centre de Commerce possédé par §Y[Root.GetName]§! ou ses sujets dans la région d'§YAsie Centrale§! obtient les effets suivants :"
 mos_rus_conquer_manchuria_title:0 "L'Acquisition de l'Amour"
 mos_rus_conquer_manchuria_desc:0 "Notre expansion vers l'est sera complète avec l'incorporation de la côte mandchoue. Là-bas, nous fonderons une ville, Vladivostok, qui sera le centre de nos efforts commerciaux et navals dans le Pacifique et en Asie de l'Est."
 RUS_TRADE_OF_THE_NEW_WORLD:0 "Commerce du Nouveau Monde"
 mos_integrate_subjects_title:0 "Les Sujets de Moscou"
 mos_integrate_subjects_desc:0 "« Diviser pour régner. » Telle a été la pratique de notre précédent [Root.Monarch.GetTitle] afin de maximiser le tribut que nous pouvions collecter pour nos suzerains tatars.\nCependant, cette forme de décentralisation est contre-productive si nous voulons accéder au rang de puissance dominante dans notre région d'origine. Les sujets de [Root.GetName] doivent faire partie du [Root.GovernmentName]."
 nov_establish_the_great_navy_title:0 "Établir la Grande Marine"
 nov_establish_the_great_navy_desc:0 "Nous avons besoin d'une grande marine pour que notre [Root.GovernmentName] puisse projeter sa puissance en dehors de la Russie. L'avenir économique et militaire de l'État dépend de notre flotte."
 rmi_grow_to_power_title:0 "Croissance du Pouvoir"
 rmi_grow_to_power_desc:0 "Nos débuts ont été humbles ; les ennemis puissants et nombreux. Mais contre toute attente, la roue de la fortune a été de notre côté, et maintenant nous sommes la puissance dominante en Europe de l'Est."
 mos_rus_conquer_kazan_title:0 "Soumettre Kazan"
 mos_rus_conquer_kazan_desc:0 "La Cité de Kazan se trouve sur les routes commerciales clés le long de la Volga. Pour que la Russie prospère, elle doit appartenir à Mère Russie."
 mos_rus_expand_eastwards_title:0 "Revendiquer les Steppes"
 mos_rus_expand_eastwards_desc:0 "Nous devons porter le combat aux Tatars de la Horde d'Or. Nous devons planter la bannière de la Russie dans le cœur de leurs steppes car tout cela appartient à Mère Russie."
 mos_rus_colonize_west_siberia_title:0 "Au-delà de l'Oural"
 mos_rus_colonize_west_siberia_desc:0 "Maintenant que nous sommes libérés des chaînes des Tatars, le temps est venu de porter notre regard vers l'expansion à l'est. Les terres au-delà de l'Oural doivent être acquises pour Mère Russie."
 mos_rus_colonize_central_siberia_title:0 "Coloniser la Sibérie Occidentale"
 mos_rus_colonize_central_siberia_desc:1 "Nous avons commencé à chasser les Tatars de Sibérie, mais notre emprise sur ces régions est encore faible. Nous devons établir des forts pour qu'elles puissent être placées sous un contrôle russe approprié."
 mos_rus_colonize_eastern_siberia_title:0 "Pousser vers la Sibérie Orientale"
 mos_rus_colonize_eastern_siberia_desc:0 "Nos explorateurs ont ouvert les vastes terres inexploitées de la Sibérie Orientale. Nous devons y établir des forts pour sécuriser notre contrôle."
 mos_rus_colonize_alaska_title:0 "Coloniser l'Alaska"
 mos_rus_colonize_alaska_desc:0 "Notre quête pour monopoliser le commerce de la fourrure nous conduit encore plus loin vers l'est. Il est temps de mettre les voiles vers les côtes des Amériques et d'établir une colonie en Alaska, où de nouvelles opportunités de fourrure seront abondantes."
 mos_rus_colonize_california_title:0 "Coloniser la Côte Ouest"
 mos_rus_colonize_california_desc:0 "Bien que nous ayons trouvé de la fourrure en quantité en Alaska, nos explorateurs rapportent la découverte de réserves d'or sur la côte ouest de ce continent étranger."
 mos_rus_colonize_canada_title:0 "La Frontière Canadienne"
 mos_rus_colonize_canada_desc:0 "Le commerce de la fourrure prospère grâce à notre colonie dans le Nouveau Monde. Mais il y a encore des terres à découvrir et à coloniser. Ce Nouveau Monde et ses ressources appartiendront à Mère Russie !"
 mos_rus_found_the_russian_tsardom_title:0 "[Root.GetFoundRussiaMissionTitle]"
 mos_rus_found_the_russian_tsardom_title_monarchy:0 "Fonder le Tsarat"
 mos_rus_found_the_russian_tsardom_title_republic:0 "Fonder le Grand Vétché"
 mos_rus_found_the_russian_tsardom_desc:0 "[Root.GetFoundRussiaMissionDescription]"
 mos_rus_found_the_russian_tsardom_description_monarchy:0 "Les Russes ont dû beaucoup endurer. La chute de la Rus' de Kiev face aux Mongols ; le Joug Tatar ; les luttes intestines des Riourikides et la menace politique qu'a représenté Novgorod. Mais ce sont des problèmes du passé ! Le temps est venu d'unir les Russes sous la couronne d'un seul Tsar et de forger notre propre destin !"
 mos_rus_found_the_russian_tsardom_description_republic:0 "Les Russes ont dû beaucoup endurer. La chute de la Rus' de Kiev face aux Mongols ; le Joug Tatar ; la menace scandinave et les Moscovites avides de pouvoir. Mais ce sont des problèmes du passé ! Le temps est venu d'unir les Russes sous la règle de la Grande République du Vétché et de forger notre propre destin !"
 rus_enact_the_sudebnik_title:1 "Le Destin du Tysiatski"
 rus_enact_the_sudebnik_desc:0 "Les tysiatskis ont été des chefs militaires depuis l'époque de la Rus' de Kiev qui servent maintenant dans des fonctions judiciaires et commerciales. Ils ont été pour la plupart abolis et remplacés par les voïévodes pour les questions militaires et les namestniki pour le gouvernement. Cependant, certaines de nos provinces ont encore des tysiatskis en activité. Il est temps de mettre fin une fois pour toutes à cette position désuète."
 rus_enact_the_sudebnik_at:1 "Si nous accomplissons cette mission avec la réforme §YOffice du Tysiatski§! promulguée :"
 rus_enact_the_sudebnik_bt:1 "Si nous accomplissons cette mission avec la réforme §YOffice du Namestnik§! promulguée :"
 rus_enact_the_sudebnik_ct:0 "A eu l'événement « §YLe Dernier Tysiatski§! ».\nCet événement se déclenche lorsque nous avons au moins §Y1§! de Stabilité et atteint le niveau §Y3§! en Réformes Gouvernementales."
 rus_book_of_royal_degrees_title:0 "Livre des Degrés Royaux"
 rus_book_of_royal_degrees_desc:0 "En tant que nouvelle puissance montante d'Europe de l'Est, il est impératif de réorganiser et d'améliorer notre bureaucratie. L'avenir de notre [Root.GovernmentName] dépend de l'efficacité de notre cabinet."
 rus_book_of_royal_degrees_at:0 "L'événement nous permettra de sélectionner l'une des trois priorités qui nous donne des bonus relatifs aux aspects §YAdministratif§!, §YCommercial§! et §YMilitaire§! de l'État."
 rus_handle_the_boyars_title:0 "Gérer les Boyards"
 rus_handle_the_boyars_desc:0 "Les boyards exercent une grande influence sur notre pays. Notre avenir dépend de l'obéissance des boyards. Nous devrions soit gagner leur loyauté, soit affaiblir leur pouvoir, mais quoi qu'il en soit, les boyards doivent être gérés."
 rus_handle_the_boyars_at:1 "Si nous accomplissons cette mission alors que la §Y[Root.GetNobilityName]§! a moins de terres de la couronne que nous :"
 rus_handle_the_boyars_bt:1 "Si nous accomplissons cette mission alors que la §Y[Root.GetNobilityName]§! a plus de terres de la couronne que nous :"
 rus_the_mestnichestvo_title:0 "Abolir le Mestnitchestvo"
 rus_the_mestnichestvo_desc:0 "Le système hiérarchique de [Root.GetUsableName] est basé sur le Mestnitchestvo, une structure excessivement compliquée et désuète qui entrave la sélection des postes officiels au mérite. C'est un poison dans notre société et il doit être aboli."
 rus_show_russian_superiority_title:1 "Moderniser l'État"
 rus_show_russian_superiority_desc:1 "[Root.GetUsableNameCap] est bâti sur les traditions et les lois de nos ancêtres slaves orientaux. Bien que cette législature ait eu sa justification au temps des Mongols, elle n'est plus adéquate. L'État doit être modernisé si nous ne souhaitons pas prendre du retard sur les puissances de l'Ouest."
 rus_show_russian_superiority_at:0 "Une province possédée avec le plus haut développement obtient les effets suivants :"
 rus_the_vodka_monopoly_title:0 "Le Monopole de la Vodka"
 rus_the_vodka_monopoly_desc:0 "La vodka est un produit bon marché qui peut être brassé en grande quantité. Il est très avantageux pour l'État d'établir un monopole sur cette boisson car c'est à la fois une source de revenus sûre et un moyen facile de contrôler les masses."
 rus_enable_vodka_sales_decision_tt:0 "Active la décision « §YPromouvoir les Ventes de Vodka§! »."
 rus_the_time_of_troubles_title:0 "Traverser le Temps des Troubles"
 rus_the_time_of_troubles_desc:0 "Des nuages d'orage s'amoncellent à l'horizon de la Russie. Nous devons endurer toutes les épreuves que le destin nous réserve."
 rus_the_time_of_troubles_at:1 "Si nous accomplissons cette mission en terminant le désastre du §YTemps des Troubles§! :"
 rus_the_time_of_troubles_bt:1 "Si nous accomplissons cette mission en évitant le désastre du §YTemps des Troubles§! :"
 rus_the_empire_of_russia_title:0 "Grandes Ambitions Impériales"
 rus_the_empire_of_russia_desc:0 "Le [Root.GovernmentName] de [Root.GetName] est fort. Mais il est rigide. Bâti sur des fondations du temps de la Rus' de Kiev, le gouvernement et de nombreux aspects de notre société reposent sur des traditions et des visions désuètes. Seul un véritable Empire [Root.GetAdjective] peut résister à la tempête que représentent les grandes puissances européennes."
 rus_the_empire_of_russia_ct:0 "Compléter la §YModernisation§! de [Root.GetName] et promulguer soit §YEmpire Russe§! soit §YGrande Fédération Russe§!."
 rus_the_empire_of_russia_at:0 "Débloque les missions §YImpérial Russe§!."
 rus_the_empire_of_russia_bt:0 "L'événement nous permettra de changer le drapeau de notre pays. De plus, nous recevons §G50§! de Prestige. L'excédent de Prestige est converti en Points de Monarque."
 rus_the_streltsy_title:0 "Recruter les Streltsy"
 rus_the_streltsy_desc:0 "Les régiments de Streltsy sont l'épine dorsale de notre armée. Nous devons continuer à recruter et à approvisionner les Streltsy pour maintenir nos traditions militaires."
 rus_the_streltsy_at:0 "L'événement nous permettra d'établir un système de solde pour les §YStreltsy§!."
 has_not_russian_mechanic_tt:0 "N'utilise pas la §YMécanique Russe§!"
 rus_solidify_serfdom_title:0 "Le Destin de la Paysannerie"
 rus_solidify_serfdom_desc:0 "Le servage a eu son utilité, mais maintenant il nous empêche d'avancer vers une nouvelle ère industrialisée. La paysannerie doit être libérée des mâchoires des Nobles et des Bourgeois."
 rus_enacted_early_serfdom_tt:0 "A accordé le privilège §YServage Naissant§! à un moment donné."
 rus_solidify_serfdom_at:0 "A écrasé les rebelles §YPaysans§!."
 rus_enacted_early_disconnection_tt:0 "A accordé le privilège §YLiberté Paysanne Accrue§! à un moment donné."
 rus_solidify_serfdom_bt:0 "A écrasé les rebelles §YNobles§!."
 rus_solidify_serfdom_ct:1 "Si nous accomplissons cette mission en ayant accordé le privilège §YServage Naissant§! à un moment donné :"
 rus_solidify_serfdom_dt:0 "Les §YPrivilèges§! liés au §YServage§! gagnent des modificateurs conditionnels supplémentaires."
 rus_solidify_serfdom_et:1 "Si nous accomplissons cette mission en ayant accordé le privilège §YLiberté Paysanne Accrue§! à un moment donné :"
 rus_solidify_serfdom_ft:0 "Les §YPrivilèges§! liés à la §YLiberté Paysanne§! gagnent des modificateurs conditionnels supplémentaires."
 rus_increase_absolute_rule_title:0 "Une Autocratie Absolue"
 rus_increase_absolute_rule_desc:2 "Seul un autocrate absolu peut mener [Root.GetUsableName] vers un avenir prospère. Nous devons nous assurer qu'un tel dirigeant existe et qu'aucun état ne peut être une menace pour lui."
 rus_increase_absolute_rule_tt:0 "A utilisé l'interaction d'État §YSaisir des Terres§! au moins §Y10§! fois (§Y[Root.GetSeizeLandCounter]§!/§Y10§!)."
 rus_role_of_the_church_title:0 "Apaiser le Patriarcat"
 rus_role_of_the_church_desc:0 "Le Patriarcat est la base de notre légitimité à gouverner les Russes. Sans leur approbation, le pays se désagrégerait dans la discorde et le chaos. Nous devons assurer la loyauté du patriarche."
 rus_the_courts_direction_title:0 "Occidentaliser la Cour"
 rus_the_courts_direction_desc:1 "Afin de rénover la structure de l'État, nous devons nous assurer que la cour elle-même est modernisée. À cette fin, nous enverrons des délégations en Europe occidentale pour étudier leurs méthodes."
 rus_the_courts_direction_at:1 "Si nous avons un §YPhilosophe§! employé :"
 rus_the_courts_direction_bt:1 "Si nous avons un §YScientifique Naturaliste§! employé :"
 rus_the_courts_direction_ct:1 "Si nous avons un §YArtiste§! employé :"
 rus_the_courts_direction_dt:1 "Si nous avons un §YTrésorier§! employé :"
 rus_the_courts_direction_et:1 "Si nous avons un §YThéologien§! employé :"
 rus_the_courts_direction_ft:1 "Si nous avons un §YMaître de la Monnaie§! employé :"
 rus_the_courts_direction_gt:1 "Si nous avons un §YInquisiteur§! employé :"
 rus_philosopher_focus:0 "Priorité Philosophe"
 rus_natural_scientist_focus:0 "Priorité Scientifique Naturaliste"
 rus_artist_focus:0 "Priorité Artiste"
 rus_treasurer_focus:0 "Priorité Trésorier"
 rus_theologian_focus:0 "Priorité Théologien"
 rus_master_of_mint_focus:0 "Priorité Maître de la Monnaie"
 rus_inquisitor_focus:0 "Priorité Inquisiteur"
 rus_estabblish_the_russian_navy_title:0 "Marine Impériale Russe"
 rus_estabblish_the_russian_navy_desc:0 "Les grandes puissances de ce monde ne comptent plus uniquement sur leurs armées pour projeter leur puissance. Elles utilisent des marines coûteuses dont la portée va bien au-delà de ce que les armées régulières peuvent atteindre. Il est de la plus haute priorité pour nous de créer la Marine Impériale Russe qui rivalisera avec nos rivaux."
 rus_estabblish_the_russian_navy_at:0 "L'événement nous permettra de sélectionner un modificateur qui renforce soit l'aspect §YCommercial§! soit l'aspect §YMilitaire§! de notre flotte."
 rus_monopolize_novgorod_title:0 "Monopoliser Novgorod"
 rus_monopolize_novgorod_desc:0 "Novgorod et ses environs sont le cœur du commerce russe. Naturellement, nous devons nous assurer que nous seuls possédons le contrôle total de notre propre centre de commerce."
 unlock_monopolies_tt:0 "Débloque les privilèges de §YMonopoles§! pour les états."
 buffed_monopolies_tt:0 "Les §YMonopoles§! ne réduisent plus l'§YAbsolutisme§! lorsqu'ils sont accordés."
 rus_establish_the_governing_senate_title:0 "Le Sénat Gouvernant"
 rus_establish_the_governing_senate_desc:0 "Durant les périodes d'absence de notre [Root.Monarch.GetTitle], il doit exister une institution qui maintienne l'équilibre du pouvoir dans notre État et assure la stabilité. Le Sénat Gouvernant est exactement ce dont notre pays a besoin."
 rus_establish_the_governing_senate_at:0 "L'événement nous permettra de promulguer la réforme gouvernementale §YSénat Gouvernant§! ou §YAutocratie Renforcée§!."
 rus_pass_issues_in_the_senate_title:0 "Faire Passer les Questions"
 rus_pass_issues_in_the_senate_desc:0 "Le Sénat Gouvernant ne signifie rien pour l'État s'il n'est pas bien utilisé. Nous devrions y faire passer les questions des citoyens russes et les laisser être traitées par le Sénat."
 rus_pass_issues_in_the_senate_at:1 "Si nous accomplissons cette mission avec la réforme gouvernementale §YSénat Gouvernant§! promulguée :"
 rus_pass_issues_in_the_senate_bt:1 "Si nous accomplissons cette mission avec la réforme gouvernementale §YAutocratie Renforcée§! promulguée :"
 rus_pass_issues_in_the_senate_ct:0 " pays sujets ont au moins §Y100§! de développement total et moins de §Y20 %§! de désir de liberté."
 rus_pass_issues_in_the_senate_tt:0 "A fait passer au moins §Y10§! questions (§Y[Root.issues_passed.GetValue]§!/§Y10§!)."
 rus_most_holy_synod_title:0 "Le Très Saint Synode"
 rus_most_holy_synod_desc:0 "Bien que l'église ait joué un rôle majeur dans l'histoire de l'État, il est de plus en plus évident que sa position au sein de notre pays doit être repensée."
 rus_most_holy_synod_xx:1 "La Réputation Diplomatique est d'au moins §Y2§!.\n   A un allié ou sujet étant §Y[Root.Religion.GetGroupName]§! mais PAS §Y[Root.Religion.GetName]§! avec au moins §Y75§! de Confiance et §Y150§! d'opinion de [Root.GetName].\n\n"
 rus_6_tot_tt:0 "A au moins §Y6§! de Tolérance de la Vraie Foi"
 rus_most_holy_synod_at:1 "Si nous accomplissons cette mission par l'§YAlliance§! :"
 rus_most_holy_synod_ct:0 "Un événement se déclenchera nous permettant de sélectionner la réforme gouvernementale §YTrès Saint Synode Gouvernant§!."
 rus_most_holy_synod_bt:1 "\nSi nous accomplissons cette mission par le §Y[Root.GetClergyName]§! :"
 rus_most_holy_synod_dt:0 "Un événement se déclenchera nous permettant de sélectionner la réforme gouvernementale §YPatriarcat Renforcé§!."
 rus_most_holy_synod_tt:0 "Un événement se déclenchera nous permettant de sélectionner la réforme gouvernementale §YChef du Patriarcat§! à la place."
 rus_early_industrialization_title:0 "Manufactures d'État"
 rus_early_industrialization_desc:0 "Les roues de l'industrie tournent sans cesse, et la Russie ne doit pas être laissée pour compte alors que de nouvelles technologies de production deviennent disponibles. L'État doit construire et contrôler autant de grandes manufactures que possible."
 rus_early_industrialization_at:0 "Jusqu'à §Y10§! provinces possédées aléatoires qui ont §Y20§! de développement et une §YManufacture§! obtiennent les effets suivants :"
 rus_the_age_of_revolution_title:0 "Grande Puissance de l'Est"
 rus_the_age_of_revolution_desc:0 "Il est temps de récolter les fruits de notre labeur. Longtemps nous nous sommes préparés à accéder au rang des grandes puissances, et maintenant nous prendrons notre place légitime au soleil parmi les autres grandes puissances !"
 rus_the_age_of_revolution_at:0 "Nous obtiendrons un événement lorsque l'§YÈre des Révolutions§! commencera qui débloque les §Y3§! dernières missions."
 rus_the_age_of_revolution_bt:0 "Nous débloquerons les §Y3§! dernières missions."
 rus_dissolve_the_streltsy_title:0 "Gérer les Streltsy"
 rus_dissolve_the_streltsy_desc:0 "La loyauté des streltsy a toujours été au mieux discutable en raison de leurs demandes constantes. Il n'y a que deux façons de les traiter : soit nous abolissons les streltsy dans leur ensemble, soit nous les embrassons comme la force d'élite du [Root.GovernmentName]."
 rus_dissolve_the_streltsy_at:1 "Si nous accomplissons cette mission avec la réforme gouvernementale §YÉtablir les Streltsy§! promulguée :"
 rus_dissolve_the_streltsy_bt:1 "Si nous accomplissons cette mission SANS avoir la réforme gouvernementale §YÉtablir les Streltsy§! promulguée :"
 rus_reform_the_military_title:0 "Occidentaliser l'Armée"
 rus_reform_the_military_desc:0 "Bien que nos forces terrestres aient déjà connu de nombreuses réformes et améliorations, elles n'ont pas encore atteint leur apogée. Avec l'aide de conseillers militaires étrangers et d'une bonne vieille discipline, les armées de [Root.GetUsableName] combattront sur le champ de bataille avec autant de férocité que celles de n'importe quel rival."
 rus_reform_the_military_at:1 "Remporter §Y40§! batailles, terrestres ou navales (§Y[Root.GetNumWonBattles]/§Y40§!)"
 rus_reform_the_military_bt:1 "Remporter §Y40§! batailles, terrestres ou navales (§Y0§!/§Y40§!)\n§YCe compteur commence lorsque la mission « Gérer les Streltsy » a été accomplie.§!"
 rus_control_fur_trade_title:0 "Contrôler le Commerce de la Fourrure"
 rus_control_fur_trade_desc:0 "La fourrure ; l'or doux du Nord et de la Sibérie. La demande de bonne fourrure ne tarira jamais. Nous devons nous assurer d'avoir un monopole sur le commerce de la fourrure."
 rus_peters_reforms_title:0 "La Table des Rangs"
 rus_peters_reforms_desc:0 "En complément final à la modernisation de [Root.GetUsableName], nous devons réviser les anciens systèmes hiérarchiques de l'État en faveur d'une structure qui promeut le mérite et décourage les rangs hérités de la naissance."
 nizam_i_cedid_reform:0 "Nizam-i Cedid"
 nizam_i_cedid_reform_desc:0 "Le Nizam-i Cedid est une série de réformes inspirées des idées et des processus développés en Europe et visant à combattre la stagnation de la situation militaire et administrative de l'empire."
 rus_educational_reform_title:0 "Réformes Éducatives"
 rus_educational_reform_desc:0 "L'éducation de notre peuple n'a jamais été d'une grande importance jusqu'à présent. C'est notre plus haute priorité que chaque citoyen ait accès à l'éducation. Chaque ville doit avoir une université."
 rus_educational_reform_at:0 "L'événement nous permettra de sélectionner un bonus de §YTechnologie§! de notre choix."
 rus_the_glorious_revolution_title:0 "Révolution Russe"
 rus_the_glorious_revolution_desc:0 "L'Ère des Révolutions est sur nous et la Russie doit choisir un camp. Répondrons-nous à l'appel de la liberté et rejoindrons-nous la révolution, ou nous y opposerons-nous avec une force réactionnaire ?"
 rus_the_glorious_revolution_at:1 "Si nous accomplissons cette mission en étant §YRévolutionnaire§! :"
 rus_the_glorious_revolution_bt:1 "Si nous accomplissons cette mission en n'étant PAS §YRévolutionnaire§! :"
 rus_abolish_the_serfdom_title:0 "Abolir le Servage"
 rus_abolish_the_serfdom_desc:0 "Le servage a eu son utilité, mais maintenant il nous empêche d'avancer vers une nouvelle ère industrialisée. La paysannerie doit être libérée des mâchoires des Nobles et des Bourgeois."
 rus_establish_the_russian_navy_title:0 "Grande Flotte de Russie"
 rus_establish_the_russian_navy_desc:0 "Qu'est-ce qu'une grande puissance si elle ne peut projeter sa puissance sur les autres ? Nous devons construire une grande flotte qui nous soit propre afin d'être pris au sérieux par les autres grandes puissances et d'étendre notre portée en dehors de l'Europe."
 rus_establish_the_russian_navy_at:0 "Cet événement permet d'améliorer les capacités §YCommerciales§! ou §YMilitaires§! de notre marine."
 ###RUSSIAN MODIFIERS###
 mos_legitimacy_of_the_rurikovich:0 "Légitimité de Vassili"
 desc_mos_legitimacy_of_the_rurikovich:0 "La victoire de Vassili sur le prétendant a solidifié la légitimité de notre famille régnante."
 mos_a_new_russian_authority:0 "Une Nouvelle Autorité"
 desc_mos_a_new_russian_authority:0 "Vassili a failli à l'État. Maintenant, un nouvel autocrate prendra sa place et régnera sur le pays."
 mos_the_secured_future_of_russia:0 "Aube d'une Nouvelle Ère"
 desc_mos_the_secured_future_of_russia:0 "Avec le [Root.Monarch.GetTitle] [Root.Monarch.GetName] sur notre trône, l'avenir de [Root.GetUsableName] et de ses citoyens est assuré."
 rus_grand_duke_of_finland:0 "Grand-Duc de Finlande"
 desc_rus_grand_duke_of_finland:0 "[Root.Monarch.GetName] porte le titre de Grand-Duc de Finlande, faisant de [Root.Monarch.GetHerHim] le plus haut souverain sur le peuple finlandais.\n\n§YDonne accès à la §JCavalerie Hakkapeliitta§!.§!\n§YCe modificateur est supprimé si la Finlande n'est plus notre sujet.§!"
 rus_grand_duke_of_finland_at:0 "jusqu'à ce que la §YFinlande§! ne soit plus notre sujet"
 rus_developed_trade_post_novgorod:0 "Comptoir Commercial Développé"
 desc_rus_developed_trade_post_novgorod:0 "Cette province est le cœur du commerce et des échanges russes près de la Mer Baltique."
 rus_orthodox_holy_site:0 "Site Sacré Kiévien"
 desc_rus_orthodox_holy_site:0 "Le site religieux de cette ville a été agrandi par son propriétaire."
 rus_center_of_commerce:0 "Centre Commercial Kiévien"
 desc_rus_center_of_commerce:0 "Le centre de commerce de cette ville a été agrandi par son propriétaire."
 rus_the_west_fort:0 "Fortification Kiévienne"
 desc_rus_the_west_fort:0 "La fortification de cette ville a été agrandie par son propriétaire."
 rus_kiev_mohyla_academy:0 "Académie Kyiv-Mohyla"
 desc_rus_kiev_mohyla_academy:0 "L'académie de cette ville a été agrandie par son propriétaire."
 rus_west_slavic_union:0 "Hégémonie sur les Slaves Occidentaux"
 desc_rus_west_slavic_union:0 "Notre conquête de la Pologne et des autres territoires slaves occidentaux a conduit à une extension de nos lois pour inclure ces peuples dans notre législature.\n\n§YCe modificateur est supprimé si nous rétrogradons une culture slave occidentale.§!"
 rus_carpathian_union:0 "Hégémonie sur les Carpates"
 desc_rus_carpathian_union:0 "Notre conquête de la Hongrie et des autres territoires carpathiens a conduit à une extension de nos lois pour inclure ces peuples dans notre législature.\n\n§YCe modificateur est supprimé si nous rétrogradons une culture carpathienne.§!"
 rus_south_slavic_union:0 "Hégémonie sur les Slaves du Sud"
 desc_rus_south_slavic_union:0 "Notre conquête des Balkans et des autres territoires slaves du sud a conduit à une extension de nos lois pour inclure ces peuples dans notre législature.\n\n§YCe modificateur est supprimé si nous rétrogradons une culture slave du sud.§!"
 nov_rus_scandinavian_conquest:0 "Intégration Scandinave"
 desc_nov_rus_scandinavian_conquest:0 "La conquête de la Scandinavie oblige notre État à introduire de nouvelles lois afin d'administrer la population assujettie de ces terres."
 nov_rus_scandinavian_dominance:0 "Domination sur la Scandinavie"
 desc_nov_rus_scandinavian_dominance:0 "Avec la soumission complète de la Scandinavie, la législature [Root.GetAdjective] a conçu un système approprié pour intégrer toute la population scandinave dans notre société."
 rus_trade_empire:0 "Empire Commercial de l'Est"
 desc_rus_trade_empire:0 "Nos marchands dominent le commerce en Europe et influencent la politique et le marché dans les pays étrangers en notre nom. Véritablement, nous avons établi un empire sur les pieds du commerce et des échanges."
 rus_expanded_administrative_offices:0 "Changement de Priorité Administrative"
 desc_rus_expanded_administrative_offices:1 "Nous avons décidé de réorienter la priorité de notre administration en faveur d'une intégration plus facile des nouveaux territoires et de la fabrication de nouvelles revendications.\n\n§YToutes les Revendications Permanentes des missions russes sont transformées en revendications non perpétuelles.§!"
 rus_russian_caucasian_alliance:0 "Alliance Russo-Caucasienne"
 desc_rus_russian_caucasian_alliance:0 "Le lien entre la Russie et le Caucase conduit à une alliance solide entre ces deux régions."
 rus_reinforced_defenses:0 "Défense Renforcée"
 desc_rus_reinforced_defenses:0 "Les fortifications du Caucase voient des défenseurs russes et caucasiens combattre côte à côte pour protéger la région des envahisseurs étrangers."
 rus_religious_zeal:0 "Zèle Religieux Russe"
 desc_rus_religious_zeal:0 "La religion est l'une des pierres angulaires de notre société. Ainsi, le Zèle Religieux Russe nous permet de résister même aux temps les plus difficiles."
 the_tatar_yoke:0 "Le Joug Tatar"
 desc_the_tatar_yoke:0 "\n§RDoit payer un Tribut à §Y[466.Owner.GetName]§! chaque année ou doit faire face à la colère des Tatars.§!\n\nAvec la chute de la Rus' de Kiev face aux Mongols en 1223, les Mongols puis les Tatars ont maintenu une emprise ferme sur les sujets russes. Sous la direction du Grand-Duché de Moscou, les Russes paient leur tribut au Grand-Kniaz de Moscou qui le transmet ensuite au Khan de [466.GetName]. Le tribut est gérable, mais son existence même est une humiliation pour tout Slave oriental qui se respecte et aspire à perpétuer l'héritage des Romains.\n\n§YCe modificateur est supprimé si [466.GetName] perd le modificateur « Le Joug Tatar ».§!"
 rus_icon_climacus_bonus:0 "Inspiration de Saint Jean Climaque"
 desc_rus_icon_climacus_bonus:0 "L'icône commandée est une source de grande inspiration pour notre peuple."
 rus_icon_eleusa_bonus:0 "Inspiration d'Eleusa"
 desc_rus_icon_eleusa_bonus:0 "L'icône commandée est une source de grande inspiration pour notre peuple."
 rus_icon_michael_bonus:0 "Inspiration de Saint Michel"
 desc_rus_icon_michael_bonus:0 "L'icône commandée est une source de grande inspiration pour notre peuple."
 rus_icon_nicholas_bonus:0 "Inspiration de Saint Nicolas"
 desc_rus_icon_nicholas_bonus:0 "L'icône commandée est une source d'inspiration considérable pour notre peuple."
 rus_icon_pancreator_bonus:0 "Inspiration du Christ Pantocrator"
 desc_rus_icon_pancreator_bonus:0 "L'icône commandée est une source d'inspiration considérable pour notre peuple."
 rus_end_of_the_horde:0 "Fléau de la Horde"
 desc_rus_end_of_the_horde:0 "Jadis simple tributaire des hordes de l'Est, nous nous sommes élevés au pouvoir et avons renversé nos maîtres tatars ! Plus jamais aucune horde ne menacera le peuple russe !"
 rus_local_russian_trade_center:0 "Développement du marché d'Asie centrale"
 desc_rus_local_russian_trade_center:0 "Cette province bénéficie de subventions de la classe bourgeoise au pouvoir. Grâce à cet apport de ressources, la province est en position idéale pour devenir un véritable centre de commerce en Asie centrale."
 rus_new_world_trade:0 "Commerce du Nouveau Monde"
 desc_rus_new_world_trade:0 "Le commerce avec le Nouveau Monde étend notre influence et élargit nos opportunités."
 nov_rus_great_novgorodian_navy:0 "Grande flotte novgorodienne"
 desc_nov_rus_great_novgorodian_navy:0 "Notre investissement dans la grande flotte a profondément impressionné nos marins. Leur moral est sans égal, car ils combattront l'ennemi en mer jusqu'au dernier homme."
 rmi_rus_rising_russian_power:0 "Puissance russe montante"
 desc_rmi_rus_rising_russian_power:0 "Nos débuts furent humbles, les ennemis puissants et nombreux. Mais contre toute attente, la roue de la fortune a tourné en notre faveur, et nous sommes désormais la puissance dominante d'Europe de l'Est."
 rus_steppe_conversion:0 "Conversion des steppes"
 desc_rus_steppe_conversion:0 "Les steppes sont peuplées de païens qui n'ont pas encore vu la lumière du Seigneur. Nos missionnaires sont animés d'un zèle ardent pour guider ces âmes vers le droit chemin."
 rus_expansion_into_siberia:0 "Expansion en Sibérie"
 desc_rus_expansion_into_siberia:0 "De gré ou de force, les étendues sauvages de Sibérie seront domptées par les colons russes, d'une manière ou d'une autre."
 rus_new_world_colonization:0 "Quête au-delà du Pacifique"
 desc_rus_new_world_colonization:0 "La colonisation de la côte sibérienne à l'est ne marque pas la fin de notre poussée incessante vers l'orient. Nous mènerons de braves explorateurs et aventuriers vers le Nouveau Monde pour y établir une colonie au nom de la mère patrie."
 rus_tariffs_of_the_new_world:0 "Droits de douane sur les fourrures"
 desc_rus_tariffs_of_the_new_world:0 "Notre contrôle du Nouveau Monde nous permet d'imposer des droits de douane lucratifs sur les fourrures sans nuire à nos relations avec nos colonies d'outre-mer."
 rus_the_realm_of_the_rus:0 "Royaume de la Rus'"
 desc_rus_the_realm_of_the_rus:0 "Les Rus' sont enfin réunis. Libérés de l'oppression tatare, libérés des querelles intestines, notre royaume mènera notre peuple vers une gloire nouvelle."
 rus_bureaucratic_adm_focus:0 "Priorité bureaucratique à l'administration"
 desc_rus_bureaucratic_adm_focus:0 "Les réformateurs et bureaucrates de notre État consacrent leur temps et leurs ressources à accélérer nos progrès en matière d'administration."
 rus_bureaucratic_dip_focus:0 "Priorité bureaucratique au commerce"
 desc_rus_bureaucratic_dip_focus:0 "Les réformateurs et bureaucrates de notre État consacrent leur temps et leurs ressources à accélérer nos progrès en matière de commerce."
 rus_bureaucratic_mil_focus:0 "Priorité bureaucratique aux affaires militaires"
 desc_rus_bureaucratic_mil_focus:0 "Les réformateurs et bureaucrates de notre État consacrent leur temps et leurs ressources à accélérer nos progrès en matière militaire."
 rus_support_of_the_boyars:0 "Soutien des boyards"
 desc_rus_support_of_the_boyars:0 "Nous bénéficions du soutien des boyards et avons obtenu l'accès à leurs levées."
 rus_demoted_the_boyars:0 "Boyards rétrogradés"
 desc_rus_demoted_the_boyars:0 "Les boyards ne sont plus une préoccupation pour le gouvernement de l'État. Les bureaucrates peuvent désormais appliquer leurs réformes sans l'approbation des boyards."
 rus_early_modernization_modifier:0 "Modernisation précoce"
 desc_rus_early_modernization_modifier:0 "Notre État traverse les premières phases d'une modernisation précoce. Les idées novatrices ne sont pas seulement accueillies, mais encouragées."
 rus_center_of_modernization:0 "Centre de modernisation"
 desc_rus_center_of_modernization:0 "Cette province abrite un centre pionnier de modernisation et d'innovation."
 rus_vodka_sales:0 "Ventes de vodka"
 desc_rus_vodka_sales:0 "Les marchands et négociants répandent la vodka de la couronne parmi le peuple."
 rus_ensured_regular_payment:0 "Paiement régulier garanti"
 desc_rus_ensured_regular_payment:0 "§RDoit verser un salaire aux §YStreltsy§! à l'avènement de chaque nouveau souverain.§!\n\nLes streltsy ont exigé un paiement régulier, et nous leur avons fait cette promesse. À chaque avènement d'un nouveau [Root.Monarch.GetTitle], les streltsy nous rappelleront notre accord."
 rus_extra_high_payment:0 "Paiement généreux"
 desc_rus_extra_high_payment:0 "Les streltsy ont reçu un salaire généreux. Leur efficacité au combat s'en trouve notablement améliorée."
 rus_high_payment:1 "Paiement élevé"
 desc_rus_high_payment:0 "Les streltsy ont reçu leur salaire régulier à un taux supérieur aux attentes."
 rus_no_payment:0 "Aucun paiement"
 desc_rus_no_payment:0 "Les streltsy n'ont reçu aucun salaire. Leur loyauté et leur volonté de combattre sont au plus bas."
 rus_trade_fleet:0 "Flotte commerciale russe"
 desc_rus_trade_fleet:0 "Notre marine se concentre sur l'aspect commercial de la navigation."
 rus_war_fleet:0 "Flotte de guerre russe"
 desc_rus_war_fleet:0 "Notre marine se concentre sur l'aspect militaire de la navigation."
 rus_loyalty_of_the_patriarchy:0 "Loyauté du Patriarcat"
 desc_rus_loyalty_of_the_patriarchy:0 "Nous avons gagné la loyauté du Patriarcat et sommes assurés de leur soutien pour garantir notre légitimité."
 rus_early_center_of_industrialization:0 "Centre d'industrialisation précoce"
 desc_rus_early_center_of_industrialization:0 "Cette province abrite l'une des premières manufactures étendues et grandioses de Russie."
 rus_great_power_of_the_east:0 "Grande puissance de l'Est"
 desc_rus_great_power_of_the_east:0 "Nous récoltons les fruits de notre labeur. Longtemps nous nous sommes préparés à accéder au rang de grande puissance, et voici venu le moment de prendre notre place légitime au soleil parmi les autres grandes puissances !"
 rus_institutionalized_streltsy:0 "Streltsy institutionnalisés"
 desc_rus_institutionalized_streltsy:0 "Les streltsy font désormais partie intégrante et officielle du gouvernement. Leurs salaires sont enfin fixés et garantis. Toutefois, ils pourraient encore en exiger davantage à l'avenir."
 rus_standarized_military:1 "Armée standardisée"
 desc_rus_standarized_military:0 "L'armée [Root.GetAdjective] a tiré de nombreuses leçons de l'utilisation des streltsy et d'autres unités militaires par le passé, et les applique désormais aux troupes régulières."
 rus_state_investment:0 "Profits du commerce des fourrures"
 desc_rus_state_investment:0 "Le commerce des fourrures génère des revenus immenses pour la Russie. Une partie de ces ducats est réinvestie en Russie pour accroître davantage notre économie."
 rus_freed_peasants:0 "Paysans libres"
 desc_rus_freed_peasants:0 "Ni esclaves du servage ni assujettis au système rigide des bourgeois. Les paysans vivent libres au sein du [Root.GovernmentName]."
 rus_discontent_peasantry:0 "Paysannerie mécontente"
 desc_rus_discontent_peasantry:0 "La paysannerie exprime un profond mécontentement quant à sa situation actuelle."
 rus_supremacy_of_the_duna:0 "Suprématie du Sénat directeur"
 desc_rus_supremacy_of_the_duna:0 "Le Sénat directeur est chargé des affaires des états et peut donc convoquer la diète, saisir les terres de la couronne et vendre des titres plus fréquemment que le souverain ne le pourrait jamais."
 rus_absolute_rule:0 "Pouvoir absolu"
 desc_rus_absolute_rule:0 "Toutes les instances du gouvernement doivent s'incliner devant le [Root.Monarch.GetTitle]. Sans exception."
 russian_eastern_expansion:0 "Expansion orientale"
 desc_russian_eastern_expansion:0 "Notre État aspire à s'étendre vers de nouveaux horizons."
 rus_the_strong_motherland:0 "Mère patrie puissante"
 rus_the_stable_empire:0 "Empire stable"
 RUS_RUSSIAN_TRADE_INFLUENCE:0 "Influence commerciale russe"
 nov_rus_asian_market_access:0 "Accès au marché asiatique"
 ###RUSSIAN DISASTER###
 time_of_troubles_at:0 "Les £adm£ £dip£ et £mil£ de [Root.Monarch.GetName] totalisent au moins §Y9§ !"
 ###RUSSIAN EVENTS###
 flavor_rus.35.t:0 "Ivan IV, le « Terrible »"
 flavor_rus.35.desc:0 "Fils de Vassili III et de sa seconde épouse, Elena Glinskaïa, Ivan IV a été couronné Grand-Prince de Moscovie à l'âge de trois ans seulement, son père ayant succombé à une inflammation de la jambe. Sa jeunesse fut marquée par la négligence et les offenses des boyards conspirateurs. À seize ans, Ivan a été couronné « Tsar de toutes les Russies » et a solidifié la formation officielle du Tsarat russe, un royaume qui existait déjà de facto sous le règne de son grand-père, Ivan III « le Grand ».\n\nMalgré ce que son titre pourrait suggérer, les premières années du règne d'Ivan sont caractérisées par des réformes pacifiques et une modernisation. La nature de son règne changea lorsqu'Ivan fut cru mortellement malade et que les boyards refusèrent de prêter allégeance à son fils en bas âge. Depuis lors, Ivan nourrit une rancune paranoïaque envers les boyards, qui aboutit finalement au massacre de Novgorod.\n\nS'il est désigné comme héritier du Tsarat, beaucoup sont certains que le Tsarat atteindra son apogée, même si cela doit coûter une ville ou deux."
 flavor_rus.35.a:0 "Le trône [Root.GetAdjective] appartient à Ivan."
 flavor_rus.35.b:0 "Fascinant."
 flavor_rus.36.t:0 "La marine de [Root.GetUsableName]"
 flavor_rus.36.desc.a:0 "Bien que nous maîtrisions l'art de la construction navale, le [Root.GovernmentName] n'a que rarement construit de navires ou de flotte. Cela appartient désormais au passé, car [Root.Monarch.GetName] dévoile la grande flotte de [Root.GetUsableName]. Les grands navires [Root.GetAdjective]s serviront l'État dans toutes les affaires maritimes.\nUne question demeure cependant : quel doit être le rôle de ces navires ?"
 flavor_rus.36.desc.b:0 "Le savoir maritime est bien préservé depuis l'époque de l'ancienne République de Novgorod. La grande flotte de [Root.GetUsableName] a connu une expansion considérable de sa taille et de son équipage.\nUne question demeure cependant : quel doit être le rôle de ces navires ?"
 flavor_rus.36.a:0 "La flotte servira notre commerce."
 flavor_rus.36.b:0 "Ces navires sont faits pour la guerre."
 flavor_rus.37.t:0 "Le Sénat directeur"
 flavor_rus.37.desc:0 "En l'absence du [Root.Monarch.GetTitle], les sénateurs du Sénat directeur gouvernent le [Root.GovernmentName] jusqu'au retour du souverain. Le Sénat directeur remplace la Douma des boyards et constitue la plus haute instance législative, judiciaire et exécutive du [Root.GovernmentName].\nBien qu'il ait trouvé sa place au sein du gouvernement [Root.GetAdjective], l'idée d'institutionnaliser le Sénat se fait de plus en plus pressante."
 flavor_rus.37.a:0 "Institutionnaliser le Sénat directeur."
 flavor_rus.37.b:0 "Abolir le Sénat directeur."
 flavor_rus.38.t:0 "Le Très Saint-Synode"
 flavor_rus.38.desc:0 "La religion est l'un des piliers fondamentaux de notre nation. Depuis aussi loin que nous puissions nous souvenir, [Root.GetName] a été orthodoxe.\nToutefois, religion et gouvernement ne sont pas toujours en harmonie. Le Patriarcat, dirigé par un seul Patriarche, représente une menace significative pour le pouvoir absolu du [Root.Monarch.GetTitle]. Pour y remédier, le Très Saint-Synode a été créé afin de décentraliser le Patriarcat et de le mettre au service du [Root.GovernmentName]."
 flavor_rus.38.a:0 "Créer le Saint-Synode."
 flavor_rus.38.b:0 "Le système actuel est suffisant."
 flavor_rus.39.t:0 "Renforcement du Patriarcat"
 flavor_rus.39.desc:0 "La religion est l'un des piliers fondamentaux de notre nation. Depuis aussi loin que nous puissions nous souvenir, [Root.GetName] a été orthodoxe.\nÀ mesure que l'influence des Patriarches croît, leur emprise sur le gouvernement grandit également. Finalement, une proposition du Patriarche parvient au [Root.Monarch.GetTitle] : le Patriarcat recevra des privilèges supplémentaires et, en échange, l'Église soutiendra le [Root.Monarch.GetTitle]."
 flavor_rus.39.a:0 "Approuver cette proposition."
 flavor_rus.39.b:0 "Rejeter cette idée."
 flavor_rus.40.t:0 "Nouveau chef du Patriarcat"
 flavor_rus.40.desc:0 "La religion est l'un des piliers fondamentaux de notre nation. Depuis aussi loin que nous puissions nous souvenir, [Root.GetName] a été orthodoxe.\nL'influence du [Root.Monarch.GetTitle] sur le Patriarcat est devenue indiscernable de [Root.Monarch.GetHerHis] pouvoir absolu sur [Root.GetUsableName]. Contrairement à tant d'autres [Root.Monarch.GetTitle]s avant [Root.Monarch.GetHerHim], [Root.Monarch.GetName] a l'opportunité de s'emparer du pouvoir du Patriarcat et de se proclamer chef du nouveau Patriarcat."
 flavor_rus.40.a:0 "Fusionner le rôle de Patriarche avec celui de [Root.Monarch.GetTitle]"
 flavor_rus.40.b:0 "Nous ne devrions pas nous mêler des affaires de l'Église"
 flavor_rus.44.t:1 "[Root.GetUsableNameCap] et l'ère des Révolutions"
 flavor_rus.44.desc:0 "Une nouvelle ère se profile à l'horizon. Une ère différente de toutes les autres, car elle menace les fondements mêmes de notre [Root.GovernmentName] !\nLes idées de liberté et d'affranchissement germent dans l'esprit de nos sujets à un rythme alarmant. Qui sait combien de temps les anciennes structures sociales resteront intactes..."
 flavor_rus.44.a:0 "En vérité, des temps sombres attendent [Root.GetUsableName]."
 flavor_rus.45.t:0 "Occidentalisation de l'armée"
 flavor_rus.45.desc:0 "Avec les nombreuses réformes, révisions et réorganisations de l'armée [Root.GetAdjective], nos forces ne se distinguent plus guère de leurs homologues d'Europe occidentale. Nos troupes combattent avec les mêmes armes, tactiques et commandement que les autres grandes puissances."
 flavor_rus.45.a:0 "Que nos soldats mènent [Root.GetUsableName] à la victoire."
 flavor_rus.47.t:0 "Un bond novateur"
 flavor_rus.47.desc:0 "Notre investissement dans l'éducation de notre population a porté ses fruits. De jeunes hommes de science engagés et enthousiastes ont entamé leurs recherches dans les domaines des mathématiques, de la physique et de la chimie.\nSi les ambitions sont élevées, les coûts le sont davantage. Un seul de ces projets peut raisonnablement recevoir un financement."
 flavor_rus.47.a:0 "Choisir le projet de mathématiques"
 flavor_rus.47.b:0 "Choisir le projet de physique"
 flavor_rus.47.c:0 "Choisir le projet de chimie"
 flavor_rus.100.t:0 "Adaptation de l'administration [Root.GetAdjective]"
 flavor_rus.100.desc:0 "Alors que les troupes [Root.GetAdjective]s se rassemblent à la cour de [Root.Capital.GetName], des préoccupations concernant notre administration ont été révélées. La guerre est inévitable pour notre pays et l'État grandira à mesure que de nouveaux territoires seront conquis. Nos conseillers craignent que l'administration ne puisse suivre nos ambitions et notre puissance militaire, et souhaitent la modifier.\nEn accordant moins d'importance à la permanence de nos revendications, nous aurions davantage de ressources pour fabriquer et gérer potentiellement plus de revendications que l'armée ne pourrait jamais espérer conquérir. Bien sûr, de telles réformes ne sont pas approuvées par tous nos conseillers, et c'est au [Root.Monarch.GetTitle] de décider."
 flavor_rus.100.a:1 "Il n'y a guère de raison de changer un système déjà établi."
 flavor_rus.100.a.tt:0 "Toutes les §Yrevendications permanentes§! des missions [Root.GetAdjective]s demeurent inchangées."
 flavor_rus.100.b:1 "Mettre en œuvre cette idée. Le [Root.GovernmentName] doit s'agrandir !"
 flavor_rus.100.b.tt:0 "Toutes les §Yrevendications permanentes§! des missions [Root.GetAdjective]s deviennent des §Yrevendications non permanentes§!."
 flavor_rus.101.t:0 "Le développement commercial de [310.GetName]"
 flavor_rus.101.desc:1 "La ville de [310.GetName] est l'une des plus anciennes. Remontant au IXe siècle, la ville servait de plaque tournante commerciale majeure sur la route commerciale entre la Scandinavie et l'Empire byzantin. Naturellement, cette ville s'est développée pour devenir l'un des plus grands centres commerciaux d'Europe de l'Est.\nBien qu'elle ne soit plus la capitale de la puissante République de Novgorod d'antan, l'importance de [310.GetName] en tant que siège du commerce baltique a connu un renouveau sous la domination [Root.GetAdjective]."
 flavor_rus.101.a:0 "Merveilleux"
 flavor_rus.102.t:0 "La fondation d'Arkhangelsk"
 flavor_rus.102.desc:0 "La mer Blanche est une mer difficile à naviguer en raison de sa nature, n'étant accessible que trois mois par an. Pourtant, l'accès maritime depuis la mer Blanche est indéniablement d'une grande valeur. Marchands et bourgeois se sont installés dans la province de Kholmogory pour fonder la ville d'Arkhangelsk."
 flavor_rus.102.a:0 "D'accord"
 flavor_rus.105.t:0 "Le Grand-Duché de Finlande"
 flavor_rus.105.desc:0 "Le peuple finnois a joui d'une grande autonomie et d'une bonne intégration dans les lois et la société de leur ancien suzerain, les Suédois. Naturellement, ils ont désormais des attentes similaires à notre égard depuis que nous avons conquis leurs terres.\nL'établissement d'une Finlande autonome gouvernée par notre [Root.Monarch.GetTitle] en tant que domaine personnel pourrait pacifier les Finnois."
 flavor_rus.105.a:0 "Établir le Grand-Duché autonome."
 flavor_rus.105.a.tt:0 "Nous pourrons recruter la compagnie de mercenaires §JCavalerie Hakkapeliitta§! tant que ce modificateur est actif."
 flavor_rus.105.b:0 "Rejeter cette idée."
 flavor_rus.106.t:0 "[280.GetName] sous domination [Root.GetAdjective]"
 flavor_rus.106.desc:0 "[280.GetName] est le berceau de la Rus' de Kiev et un centre religieux majeur de la foi orthodoxe. En tant que telle, la ville est un creuset des figures religieuses les plus importantes du [Root.GovernmentName]. Bien que son importance commerciale soit restée négligeable, sa position permet à [280.GetName] de devenir un phare éclatant de [Root.GetUsableName]."
 flavor_rus.106.a:0 "Concentrons-nous sur son importance religieuse."
 flavor_rus.106.b:0 "Investissons dans son potentiel commercial."
 flavor_rus.106.c:0 "Transformons la ville en notre forteresse la plus puissante."
 flavor_rus.106.d:0 "Développons l'académie de [280.GetName]."
 flavor_rus.114.t:0 "Fondation de Rostov-sur-le-Don"
 flavor_rus.114.desc:0 "Le commerce est l'une des artères vitales de [Root.GetUsableName]. Cela est particulièrement vrai lorsque le commerce en question s'effectue avec l'une des autres grandes puissances, comme les Ottomans.\nLe [Root.Monarch.GetTitle] [Root.Monarch.GetName] l'a reconnu en premier et a établi une fortification à plusieurs kilomètres d'Azov afin de contrôler le commerce avec les Ottomans. Au fil des années, Azov a perdu de son importance tandis que Rostov-sur-le-Don s'élève pour devenir le principal centre de commerce."
 flavor_rus.114.a:0 "Très bien"
 flavor_rus.116.t:0 "L'avenir de l'alliance [Root.GetAdjective]-[rus_persian_ally.GetAdjective]"
 flavor_rus.116.tt:0 "L'événement « L'avenir de l'alliance [Root.GetAdjective]-caucasienne » se produit."
 flavor_rus.116.desc:0 "Initialement une alliance de circonstance et de devoir [Root.Religion.GetGroupName], le lien entre [Root.GetUsableName] et [rus_persian_ally.GetUsableName] est plus fort que tout lien politique que notre État ait jamais connu. Par des stratégies habiles et des forces combinées, la menace musulmane de Perse a été éliminée et le peuple de [rus_persian_ally.GetUsableName] célèbre une vie libérée de la menace des grandes puissances.\nIl est évident que les [rus_persian_ally.GetAdjective]s nous doivent leur soutien, et nulle autre récompense que leur loyauté envers la couronne [Root.GetAdjective] ne saurait suffire."
 flavor_rus.116.a:0 "[rus_persian_ally.GetUsableName] doit s'agenouiller devant [Root.GetUsableName] !"
 flavor_rus.117.tt:0 "Nous exigerons la soumission de §Y[rus_persian_ally.GetUsableName]§!, en faisant notre §Yvassal§! s'ils cèdent.\n§Y[rus_persian_ally.GetUsableName]§! refusera toujours s'ils ont plus de §Y500§! de développement total."
 flavor_rus.116.b:1 "[rus_persian_ally.GetUsableNameCap] et [Root.GetUsableName] sont égaux."
 RUS_PERSIAN_TRADE:0 "Présence russe en Perse"
 flavor_rus.117.t:1 "[From.GetUsableNameCap] exige notre soumission"
 flavor_rus.117.desc:0 "Un ambassadeur de [From.GetUsableName] a l'audace de se présenter à la cour [Root.GetAdjective] et d'exiger que notre [Root.Monarch.GetTitle] s'agenouille devant leur [From.Monarch.GetTitle]. Les [From.GetAdjective]s nous ont aidés dans notre conquête de la Perse et veulent maintenant que nous devenions l'un de leurs sujets."
 flavor_rus.117.a:0 "Qui sommes-nous pour défier les [From.GetAdjective]s ?"
 flavor_rus.117.b:0 "Absurde !"
 flavor_rus.118.t:1 "[From.GetUsableNameCap] cède !"
 flavor_rus.118.desc:1 "Des nouvelles de [From.GetUsableName] sont parvenues à notre cour. Le [From.Monarch.GetTitle] [From.GetAdjective] accepte notre exigence. [From.GetUsableNameCap] est désormais sujet de la couronne [Root.GetAdjective]."
 flavor_rus.118.a:0 "Excellent !"
 flavor_rus.119.t:1 "[From.GetUsableNameCap] résiste !"
 flavor_rus.119.desc:0 "Des nouvelles de [From.GetUsableName] sont parvenues à notre cour. Le [From.Monarch.GetTitle] [From.GetAdjective] rejette notre exigence. Les [From.GetAdjective]s nous crachent au visage pour avoir osé formuler cette demande raisonnable."
 flavor_rus.119.a:0 "Et cela après tout ce que nous avons fait pour eux ?"
 flavor_rus.120.a.tt:0 "Chaque pays §Y[Root.Religion.GetName]§! connu gagne §G25§! d'opinion envers §Y[Root.GetName]§!."
 flavor_rus.122.t:0 "La fin des hordes tatares"
 flavor_rus.122.desc:1 "Les hordes tatares, destructrices de la Rus' de Kiev et oppresseuses de notre peuple, ne sont plus ! Les derniers nomades fuient vers l'est ou périssent sur le champ de bataille face à nos troupes tandis que la frontière [Root.GetAdjective] avance vers l'orient. [Root.GetUsableNameCap] ne sera plus jamais serviteur d'aucun envahisseur étranger !"
 flavor_rus.122.a:0 "Pour la mère patrie !"
 flavor_rus.123.t:0 "Une priorité bureaucratique"
 flavor_rus.123.desc:0 "Alors que les bureaux de [Root.GetUsableName] se sont étendus à une nouvelle dimension, les ressources restantes peuvent désormais être utilisées pour se concentrer sur l'un des grands aspects de l'État."
 flavor_rus.123.a:0 "Se concentrer sur l'administration de l'État"
 flavor_rus.123.b:0 "Se concentrer sur les gains commerciaux"
 flavor_rus.123.c:0 "Se concentrer sur les avancées militaires"
 flavor_rus.124.t:0 "Le dernier Tysiatski"
 flavor_rus.124.desc:0 "Les tysiatskis étaient les chefs militaires de l'époque de la Rus' de Kiev. Après la chute de la Rus' de Kiev, les tysiatskis ont évolué pour occuper une fonction différente, celle des offices judiciaires et commerciaux. Du moins jusqu'à leur abolition sous Dimitri Donskoï en 1374. Cependant, certains tysiatskis sont encore actifs à ce jour."
 flavor_rus.124.a:0 "Ils devraient être rétablis."
 flavor_rus.124.b:0 "Ils devraient être remplacés par les namestniks."
 flavor_rus.125.t:0 "L'Opritchnina"
 flavor_rus.125.desc:1 "Certains boyards de [revolt_province.GetName] ont décidé de trahir la mère patrie et de déclencher une révolte alors que nous sommes au cœur d'une guerre.\nCette trahison n'est pas passée inaperçue. Le [Root.Monarch.GetTitle], profondément blessé par cette traîtrise, exige l'établissement de l'Opritchnina, une politique d'État qui donnerait au [Root.GovernmentName] la liberté d'opprimer la [Root.GetNobilityName] indocile."
 flavor_rus.125.a:0 "Cette trahison ne peut rester sans réponse."
 flavor_rus.125.b:0 "Cela n'en vaut pas la peine."
 flavor_rus.126.t:1 "L'autodafé des Razriady"
 flavor_rus.126.desc:1 "Le mestnitchestvo repose sur les informations généalogiques des boyards et les hiérarchies dynastiques enchevêtrées. Ces données cruciales sont publiées sous forme de Razriady, des registres.\nÀ mesure que l'autocratie se développe en [Root.GetUsableName] et que la bureaucratie évolue vers une forme plus centralisée directement sous l'autorité du [Root.Monarch.GetTitle], le mestnitchestvo a été jugé inutile. En [GetDate], le [Root.Monarch.GetTitle] ordonne l'autodafé de tous les Razriady et abolit définitivement le mestnitchestvo."
 flavor_rus.126.a:0 "Cendre aux cendres."
 flavor_rus.127.t:0 "Pierre le Grand"
 flavor_rus.127.desc:0 "Fils du tsar Alexis et de son épouse Natalia Narychkina, Pierre hérita du trône de Russie à l'âge de dix ans seulement. Comme Pierre n'était pas le premier dans l'ordre de succession, sa demi-sœur Sophie lança un coup d'État avec le soutien de streltsy déloyaux contre le jeune tsar. Certains parents et amis de Pierre furent assassinés lors de cette incursion. À dix-sept ans, Pierre renversa la régence et gouverna conjointement la Russie avec son demi-frère Ivan V. Ce n'est qu'à la mort de sa mère que Pierre commença véritablement à exercer le pouvoir en tant que souverain de Russie.\nSon règne fut caractérisé par ses nombreuses réformes qui touchèrent toutes les composantes de la société russe. Durant ses premières années, le tsar mit en œuvre plusieurs réformes radicales visant à moderniser la Russie et à la rapprocher des puissances d'Europe occidentale. Ainsi, la cour adopta un code vestimentaire d'inspiration occidentale tandis que l'armée connut des transformations profondes. Passionné de navires depuis sa jeunesse, Pierre fonda la première marine officielle.\n\nPierre gagna le surnom de « le Grand » pour ses nombreuses réformes gouvernementales et pour la transformation du Tsarat en l'un des grands empires d'Europe."
 flavor_rus.127.a:0 "Le trône [Root.GetAdjective] appartient à Pierre."
 flavor_rus.128.t:0 "Les réformes radicales de Pierre"
 flavor_rus.128.desc:0 "Durant ses premières années de règne, Pierre le Grand s'inspira grandement de conseillers d'Europe occidentale : il réorganisa l'armée, établit la première marine russe, modernisa les mœurs absolutistes et posa les premières pierres de l'industrialisation de la Russie. Bien que son règne ait également resserré l'étau du servage et exigé sang et violence en cas de révoltes, l'Empereur transforma le visage de la Russie en celui d'une puissance que les autres grandes puissances devaient reconnaître."
 flavor_rus.128.a:1 "J'ai conquis un empire, mais je n'ai pas su me conquérir moi-même."
 flavor_rus.129.t:0 "Catherine la Grande"
 flavor_rus.129.desc:0 "Née dans une branche cadette de la maison allemande des Ascanie, Sophie d'Anhalt-Zerbst était l'une des nombreuses princesses insignifiantes du Saint-Empire romain. À dix ans, elle rencontra son futur époux Pierre III. Après son mariage six ans plus tard, la jeune Sophie s'installa en Russie et apprit la langue russe avec grand zèle. Afin de s'adapter à son nouvel environnement et de gagner les faveurs de l'impératrice Élisabeth alors régnante, Sophie se convertit à l'orthodoxie et changea son nom en Catherine.\nLe mariage avec Pierre III échoua en raison de son immaturité et les deux époux commirent des infidélités. Catherine complota en secret contre son mari pendant de nombreuses années, et lorsque Pierre hérita du trône de Russie, l'ambitieuse Catherine renversa l'Empereur après seulement six mois de règne.\n\nLa Russie connut une renaissance de la culture, des arts, des sciences et de nombreuses idées des Lumières sous son règne. C'est sous Catherine que l'Empire étendit considérablement son influence vers l'Ouest."
 flavor_rus.129.a:0 "Elle doit mener [Root.GetUsableName] vers la grandeur."
 flavor_rus.129.b:0 "L'épouse parfaite pour [Root.Monarch.GetName]."
 flavor_rus.129.c:0 "Quelle femme remarquable."
 flavor_rus.130.t:0 "Le rôle des streltsy"
 flavor_rus.130.desc:1 "Les streltsy sont les unités d'élite de notre armée. Ils sont recrutés parmi la population rurale et les artisans disponibles, et leur service est à vie. En temps de paix, les streltsy doivent retourner à leurs métiers. Ainsi, toute campagne est indésirable car elle entraîne une perte de revenus.\nPour contrecarrer cela, l'idée d'un salaire garanti a été suggérée, ce qui maintiendrait la loyauté des streltsy même durant nos guerres les plus exigeantes."
 flavor_rus.130.a:0 "Garantir des salaires réguliers."
 flavor_rus.130.a.tt:0 "Les §Ystreltsy§! exigeront leur salaire à chaque nouveau souverain."
 flavor_rus.130.b:0 "Qu'ils vivent sur le pays."
 flavor_rus.131.t:0 "Les streltsy exigent leur paiement"
 flavor_rus.131.desc:0 "Les streltsy se sont rassemblés à la cour du [Root.Monarch.GetTitle] nouvellement couronné. Leur exigence est simple : un salaire pour leur service."
 flavor_rus.131.a:0 "Leur verser un salaire généreux."
 flavor_rus.131.b:0 "Leur verser une solde appropriée."
 flavor_rus.131.c:0 "Leur verser le strict minimum."
 flavor_rus.131.d:0 "Ne rien leur verser."
 flavor_rus.132.tt:1 "Les streltsy pourraient se soulever."
 flavor_rus.132.t:0 "Les streltsy se soulèvent"
 flavor_rus.132.desc:0 "L'absence de paiement pour les streltsy a provoqué une grande agitation parmi les régiments. Ils ont lancé une attaque à [revolt_province.GetName] et cherchent l'abdication de [Root.Monarch.GetName] en faveur d'un nouvel héritier."
 flavor_rus.132.a:0 "Oh non"
 flavor_rus.134.t:0 "Une approche occidentale"
 flavor_rus.134.desc:0 "Le [Root.GovernmentName] de [Root.GetUsableName] a existé pendant plusieurs décennies avec peu ou pas d'influence des puissances occidentales. Cela a changé depuis que [Root.Monarch.GetName] et [Root.Monarch.GetHerHis] conseillers compétents d'Europe occidentale ont pris le contrôle de la cour. La vie de cour autrefois rustique et traditionnelle a été remplacée par une vie calquée sur son équivalent occidental. De nombreux autres aspects de notre société nécessitent encore des réformes, mais ces changements à la cour sont le premier pas vers une nouvelle Russie."
 flavor_rus.134.a:0 "La modernisation progresse."
 flavor_rus.200.t:0 "Formation de l'Empire [Root.GetAdjective]"
 flavor_rus.200.desc.a:1 "[Root.Monarch.GetName], illustre [Root.Monarch.GetTitle] de [Root.GetUsableName] et vainqueur de la guerre des Rivaux, a fait [Root.Monarch.GetHerHis] proclamation. Le [Root.Monarch.GetTitle] sera désormais connu comme l'[Root.GetEmpressEmperor] de tous les [Root.GetAdjective]s. Par conséquent, le [Root.GovernmentName] sera désigné comme l'Empire de [Root.GetUsableName].\nLes grandes puissances de [Root.Capital.GetContinentName] voient cela comme une provocation, mais leur réaction ne fait que solidifier la revendication de [Root.Monarch.GetName] sur le nouveau titre."
 flavor_rus.200.desc.b:1 "Le conseil dirigeant [Root.GetAdjective], sous la direction de [Root.Monarch.GetName], illustre [Root.Monarch.GetTitle] de [Root.GetUsableName] et vainqueur de la guerre des Rivaux, a fait sa proclamation. À partir de ce jour, de cet instant, le [Root.GovernmentName] sera désigné comme la Grande République fédérale de [Root.GetUsableName]. L'autorité et le pouvoir du [Root.Monarch.GetTitle] seront renforcés tandis que le gouvernement des provinces sera confié à des représentants élus par le conseil des bourgeois."
 flavor_rus.200.a:0 "Gloire à l'[Root.GetEmpressEmperor] !"
 flavor_rus.200.b:1 "J'aime la République."
 flavor_rus.295.t:0 "Achat d'idées"
 flavor_rus.295.desc:0 "[From.GetUsableNameCap] est renommé pour ses progrès révolutionnaires en matière de science et de culture. Naturellement, les ambassadeurs [Root.GetAdjective]s ont approché le [From.Monarch.GetTitle] afin d'acheter certaines de leurs idées."
 flavor_rus.295.a:0 "D'accord."
 flavor_rus.295.a.tt:1 "Transférer §R-[Root.money_to_transfer_info.GetValue]§! ¤ à §Y[From.GetName]§!."
 flavor_rus.296.t:0 "Achat d'idées"
 flavor_rus.296.desc:0 "Des ambassadeurs de [From.GetUsableName] sont arrivés à notre cour et ont remis la somme de ducats promise."
 flavor_rus.296.a:0 "Parfait !"
 flavor_rus.296.a.tt:1 "Recevoir §G[From.money_to_transfer_info.GetValue]§! ¤ de §Y[From.GetName]§!."
 flavor_rus.300.t:0 "La paysannerie réduite au servage"
 flavor_rus.300.desc:0 "En temps de catastrophe et de chaos tels que les guerres, famines, sécheresses et épidémies, les paysans quittent leurs terres et fuient vers les villes. Cela laisse leurs exploitations envahies par les mauvaises herbes. Afin d'éviter de telles situations qui menaceraient l'approvisionnement alimentaire de tout le pays, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a décrété qu'il est interdit aux paysans de quitter le domaine où ils sont nés."
 flavor_rus.300.a:0 "Les paysans sont véritablement devenus des serfs."
 flavor_rus.301.tt:0 "Les §Ypaysans§! se soulèveront contre §Y[Root.GetUsableName]§!."
 flavor_rus.301.t:0 "La révolte des paysans"
 flavor_rus.301.desc:0 "Tous les paysans n'acceptent pas l'idée d'être des serfs. La paysannerie est en révolte ouverte contre ses seigneurs dans la province de [rus_peasant_revolt_province.GetName] !"
 flavor_rus.301.a:0 "Écrasez-les"
 flavor_rus.303.t:0 "Émancipation des paysans"
 flavor_rus.303.desc:0 "La paysannerie est l'épine dorsale du [Root.GovernmentName] et doit vivre dans une relation féodale oppressive avec son propriétaire terrien afin de maintenir l'approvisionnement alimentaire du [Root.GovernmentName]. Cependant, ce servage prive la paysannerie de toute autonomie.\nLe [Root.Monarch.GetTitle] [Root.Monarch.GetName], compatissant, a fait preuve de clémence envers les paysans et a assoupli le lien qui les attache à leur suzerain. Bien que hautement appréciée par la classe inférieure, la [Root.GetNobilityName] affirme que [Root.Monarch.GetName] est devenu faible et laxiste."
 flavor_rus.303.a:0 "La vie des masses avant celle des privilégiés."
 flavor_rus.304.t:0 "La révolte de la [Root.GetNobilityName]"
 flavor_rus.304.desc:1 "La décision de [Root.Monarch.GetName] d'accroître la liberté de la paysannerie lui a valu des ennemis dans les rangs de la [Root.GetNobilityName]. Ils sont désormais en révolte ouverte contre le [Root.Monarch.GetTitle] dans la province de [rus_boyars_revolt_province.GetName]."
 flavor_rus.304.a:0 "Écrasez-les"
 flavor_rus.304.tt:0 "La §Y[Root.GetNobilityName]§! se soulèvera contre §Y[Root.GetUsableName]§!."
 flavor_rus.306.t:0 "Sobornoïe Oulojénié"
 flavor_rus.306.desc:0 "Le servage est devenu une pratique courante sur le territoire de [Root.GetUsableName]. La paysannerie souffre sous le règne des propriétaires terriens tandis que la [Root.GetNobilityName] jouit des fruits de leur labeur.\nCependant, le servage n'a pas été légalisé par le Code de lois [Root.GetAdjective], et les règles régissant la possession et le statut de serf ne sont pas encore solidifiées. Le servage doit encore être légalement défini. Avec le Sobornoïe Oulojénié de [GetYear], le [Root.Monarch.GetTitle] [Root.Monarch.GetName] peut changer cela, scellant le destin de la paysannerie ou émancipant les serfs et provoquant la colère de la [Root.GetNobilityName]."
 flavor_rus.306.a:0 "Codifier le servage"
 flavor_rus.306.b:0 "Libérer les paysans"
 flavor_rus.307.t:0 "Premières idées des Lumières"
 flavor_rus.307.desc:0 "Avec la libération des paysans de la [Root.GetNobilityName] et d'autres propriétaires, la paysannerie jouit d'une grande liberté de mouvement sur le territoire de [Root.GetUsableName]. Tandis que le peuple savoure sa liberté nouvellement acquise, cela entraîne des conséquences imprévues pour le [Root.GovernmentName] : les premières pensées des Lumières, soulignant la liberté de la classe inférieure face à la classe dirigeante, se sont répandues dans l'esprit des masses. Si les droits des paysans ne sont pas révoqués, la stabilité même de [Root.GetUsableName] est menacée."
 flavor_rus.307.a:0 "Ignorer ces préoccupations"
 flavor_rus.307.b:0 "Instaurer le servage"
 flavor_rus.308.t:0 "Le grand soulèvement !"
 flavor_rus.308.desc:0 "Malgré tous les efforts gouvernementaux pour pacifier les masses par tous les moyens nécessaires, les serfs ont désobéi à leurs maîtres et se sont rassemblés à [revolt_province.GetName] pour lancer une rébellion ouverte contre le [Root.Monarch.GetTitle]. Menés par des Cosaques déplacés, ces rebelles contestent la légitimité de [Root.Monarch.GetName]. Ce soulèvement a motivé de nombreux autres roturiers à se révolter contre la classe dirigeante..."
 flavor_rus.308.a:0 "Les masses se mettent en mouvement..."
 flavor_rus.308.a.tt:1 "Chaque province possédée dans les régions de §YRussie§!, §YRuthénie§!, §YOural§! et §YSteppe Pontique§! qui produit des §Ycéréales§!, du §Ybétail§! ou de la §Ylaine§! gagne les effets suivants :"
 flavor_rus.309.t:0 "Ascension de la classe bourgeoise"
 flavor_rus.309.desc.a:0 "Les paysans, autrefois masses ignorantes et pauvres de [Root.GetUsableName], ont commencé à s'engager dans les arts du commerce et du négoce. Ainsi, la classe des [Root.GetBurghersName] connaît une nouvelle montée en puissance à mesure que de plus en plus d'anciens paysans acquièrent la richesse nécessaire pour vivre dans les grandes villes [Root.GetAdjective]s.\nLa classe moyenne est devenue la force dominante au sein de [Root.GetUsableName]."
 flavor_rus.309.a:0 "Les villes grandissent..."
 flavor_rus.309.b:0 "Intégrer ces nouveaux bourgeois dans la république"
 flavor_rus.310.t:0 "La politique réactionnaire"
 flavor_rus.310.desc:0 "Après le grand soulèvement, le [Root.Monarch.GetTitle] a pris conscience que les roturiers sont à craindre plutôt qu'à plaindre. Ainsi, la volonté de resserrer les liens des serfs à leurs maîtres a grandi dans l'esprit du [Root.Monarch.GetTitle] et de [Root.Monarch.GetHerHis] sujets dirigeants. Tout souhait d'émanciper les paysans a été écrasé car l'économie de [Root.GetUsableName] dépend fortement du servage, et un changement de ce système plongerait le [Root.GovernmentName] dans le désordre."
 flavor_rus.310.a:0 "Resserrer les chaînes des masses"
 flavor_rus.310.b:0 "Émanciper les paysans malgré tout"
 flavor_rus.311.t:0 "Ascension de la classe moyenne [Root.GetAdjective]"
 flavor_rus.311.desc.a:0 "La classe moyenne, autrefois un rôle mineur en [Root.GetUsableName] sans accomplissements notables, s'est élevée pour devenir la force dominante au sein de la société [Root.GetAdjective]. Grâce aux nombreux paysans rejoignant leurs rangs, les marchands et citadins ont acquis une influence significative sur les affaires de la cour et menacent même l'autorité du [Root.Monarch.GetTitle] et de [Root.Monarch.GetHerHis] sujets nobles."
 flavor_rus.311.desc.b:0 "La classe moyenne de [Root.GetUsableName] a joué un rôle majeur depuis sa formation. Cependant, l'équilibre du pouvoir entre la République et les bourgeois a été perturbé par les nombreux paysans rejoignant les rangs des [Root.GetBurghersName]. Leur influence sur les affaires des cours dirigeantes menace l'autorité même de la République et de la [Root.GetNobilityName]."
 flavor_rus.311.a:0 "Le [Root.GovernmentName] survivra"
 flavor_rus.311.b:0 "Imposer le servage aux nouveaux membres des [Root.GetBurghersName]"
 flavor_rus.312.t:0 "Idéaux des Lumières et servage"
 flavor_rus.312.desc:0 "Trop de [Root.GetAdjective]s ordinaires ont été asservis par le servage. En contraste flagrant avec les idéaux des Lumières, le royaume de [Root.GetUsableName] est bâti sur le dur labeur de paysans comparables au bétail qu'ils élèvent.\nCependant, en raison de la forte influence que la [Root.GetNobilityName] exerce sur les serfs et la cour, il y a peu à faire pour améliorer la situation de ces malheureux. Le mieux que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] puisse offrir, sans provoquer de guerre civile, est d'éduquer les enfants des serfs, de leur prêter de l'argent, d'instituer un système de soins médicaux gratuits, de leur donner plus de terres à cultiver et d'améliorer la technologie agricole.\nEt même alors, ces changements peuvent être perçus comme une attaque contre la liberté de la [Root.GetNobilityName]..."
 flavor_rus.312.a:0 "Améliorer la vie des serfs."
 flavor_rus.312.b:0 "Le système fonctionne parfaitement."
 flavor_rus.313.t:0 "Conflit entre l'autocratie et les [Root.GetBurghersName]"
 flavor_rus.313.desc:0 "Les [Root.GetBurghersName] sont devenus un état puissant au sein du [Root.GovernmentName]. De nombreuses décisions importantes au niveau de l'État sont influencées et mises en place par la classe moyenne. Là où jadis le [Root.Monarch.GetTitle] détenait le pouvoir absolu, les [Root.GetBurghersName] sont désormais en charge des affaires gouvernementales. Dans une certaine mesure, le souverain n'est plus qu'une figure décorative du pays. Il n'est donc guère surprenant que les [Root.GetBurghersName] aient entamé une tentative de renverser le [Root.GovernmentName]..."
 flavor_rus.313.a:0 "Écraser les [Root.GetBurghersName] !"
 flavor_rus.313.b:0 "Se soumettre aux [Root.GetBurghersName]."
 flavor_rus.350.t:0 "Le destin de la paysannerie"
 flavor_rus.350.desc:0 "[Root.Monarch.GetName] a consolidé les gains territoriaux de la Russie, mais peu après [Root.Monarch.GetHerHis] accession au pouvoir, sécheresse, famine et épidémie ont tué un demi-million de personnes à [Root.Capital.GetName]. Les paysans ont fui leurs villages, laissant leurs exploitations envahies par les mauvaises herbes. Une réponse du [Root.Monarch.GetTitle] et de [Root.Monarch.GetHerHis] conseillers est nécessaire !"
 flavor_rus.350.a:0 "Attacher les paysans à la terre où ils sont nés."
 flavor_rus.350.b:0 "Laissons-les tranquilles."
 flavor_rus.398.t:0 "L'éradication du servage"
 flavor_rus.398.desc:1 "Mort aux oppresseurs des travailleurs ! La Garde révolutionnaire de [Root.GetUsableName] a déferlé sur les vastes terres agricoles et a libéré chaque serf qu'elle a pu trouver. Ces paysans libérés ont rejoint la garde et les suivent dans leur quête pour purger le servage de [Root.GetUsableName] tandis que les propriétaires terriens sont exécutés sans le moindre procès.\n\nD'innombrables serfs ont été libérés des griffes de la noblesse tyrannique et encore plus les rejoindront lorsque l'exploitation de l'homme par l'homme sera abolie dans les puissances voisines !"
 flavor_rus.398.a:0 "À bas les têtes des boyards !"
 flavor_rus.399.t:0 "La Terreur rouge"
 flavor_rus.399.desc:0 "Mort aux ennemis de la Révolution ! La Garde révolutionnaire, composée de membres de familles d'anciens serfs, a déferlé sur les villes et a apporté la frustration des générations paysannes passées. D'innombrables bourgeois riches et boyards ont été traduits devant un tribunal pour juger les actes de leurs familles pendant l'époque du servage. Bien que qualifiés de mal nécessaire contre les ennemis de la révolution, ces procès étaient davantage du spectacle que des processus équitables. Malgré cela, de nombreux bourgeois d'origine paysanne ont rejoint la Garde révolutionnaire dans leur quête pour terroriser les grandes villes de [Root.GetUsableName]."
 flavor_rus.399.a:0 "La Révolution progresse !"
 ###MUSCOVY EVENTS###
 flavor_mos.1.t:0 "Le joug tatar"
 flavor_mos.1.desc:0 "Le joug tatar est un système de tribut imposé aux Russes depuis la chute de la Rus' de Kiev face à la Horde mongole en 1248. La Grande-Principauté est devenue l'intermédiaire entre les hordes et les terres russes après qu'Ivan Ier de Moscou eut rejoint ses suzerains contre une rébellion menée par son rival et prince de Tver en 1327. Les Mongols ont accordé à notre principauté le droit de gouverner la Rus' et de collecter leur tribut en leur nom.\n\nDe nos jours, ce joug tatar est à bout de souffle car la Horde d'Or a décliné et s'est fragmentée sous son propre poids. Bien que [Root.GetUsableName] soit de jure encore un État tributaire des hordes, c'est de facto le [Root.Monarch.GetTitle] [Root.Monarch.GetName] qui règne sur la Russie sans l'influence des Tatars."
 flavor_mos.1.a:0 "Ce joug ne pourra contenir le [Root.GovernmentName] éternellement..."
 the_tatar_yoke_desc:1 "jusqu'à ce que la province de §YSaraï§! ne soit plus possédée par une §Yhorde§!"
 flavor_mos.1.a.tt:0 "§R§Y[Root.GetName]§! est contraint de payer un tribut annuel à §Y[466.Owner.GetName]§! tant que ce modificateur est actif.§!"
 flavor_mos.2.t:0 "La fin du joug tatar"
 flavor_mos.2.desc:0 "Avec la chute de [466.GetName] aux mains de [466.Owner.GetName], les Tatars ne sont plus en position d'exiger un tribut du peuple [Root.GetAdjective]. Le [Root.GovernmentName] de [Root.GetUsableName] est enfin libéré du joug tatar !"
 flavor_mos.2.a:0 "Nous sommes maîtres de notre propre destin !"
 flavor_mos.3.t:0 "L'exigence de tribut"
 flavor_mos.3.desc:0 "L'exigence annuelle de tribut est parvenue à la cour de [Root.Monarch.GetName]. Les barbares de [466.Owner.GetName] attendent que nous payions au nom de toute la Rus'."
 flavor_mos.3.a:0 "Payer le tribut"
 flavor_mos.3.a.tt:1 "§Y[Root.GetName]§! verse §R[Root.mos_tribute_to_pay.GetValue]§! ¤ à §Y[466.Owner.GetName]§!."
 flavor_mos.3.b:0 "Refuser de payer le tribut"
 flavor_mos.3.b.tt:0 "§Y[466.Owner.GetName]§! pourrait exercer des représailles contre le peuple de §Y[Root.GetName]§!..."
 flavor_mos.4.t:0 "[From.GetName] paie le tribut annuel"
 flavor_mos.4.desc:0 "Le [From.Monarch.GetTitle] de [From.GetName], le laquais personnel du grand [Root.Monarch.GetTitle], a envoyé un délégué avec le tribut exigé. Les Rus' ont payé leur redevance de protection."
 flavor_mos.4.a:0 "Excellent !"
 flavor_mos.4.a.tt:0 "§Y[From.GetName]§! verse §Y[Root.mos_tribute_to_pay.GetValue]§! ¤ à §Y[Root.GetName]§!."
 flavor_mos.5.t:1 "[From.GetName] refuse de payer le tribut annuel"
 flavor_mos.5.desc:0 "Le [From.Monarch.GetTitle] de [From.GetName], traître à la puissance [Root.GetAdjective], a refusé de payer le tribut exigé ! Les Rus' provoquent la colère des fiers cavaliers de [Root.GetUsableName] !"
 flavor_mos.5.a:0 "Envoyer les pillards et prendre le tribut par la force"
 flavor_mos.5.a.tt:0 "Chaque province possédée par §Y[From.GetName]§! dans la région de §YRussie§! est pillée par §Y[Root.GetName]§! pour §G5§! ¤"
 flavor_mos.5.b:0 "Laisser passer"
 flavor_mos.6.t:0 "Les pillards [From.GetAdjective]s attaquent !"
 flavor_mos.6.desc:0 "Notre refus de payer le tribut à [From.GetName] a provoqué la colère du [From.Monarch.GetTitle] régnant. [From.Monarch.GetSheHeCap] a envoyé leurs pillards pour saccager, piller et raser nos établissements !"
 flavor_mos.6.a:0 "Oh non !"
 flavor_mos.6.a.tt:0 "Chaque province possédée dans la région de §YRussie§! est pillée, perdant §R5§! ¤ et les transférant à §Y[From.GetName]§!"
 flavor_mos.7.t:0 "La troisième période de la guerre civile moscovite"
 flavor_mos.7.desc:1 "Le règne de Vassili II est troublé. Son grand-père, Dimitri Donskoï, avait désigné Vassili Ier comme son successeur légitime et le frère de Vassili Ier, Iouri Dmitrievitch, comme le suivant dans l'ordre de succession.\nFinalement, Dimitri et Vassili Ier moururent et le fils de Vassili Ier, Vassili II, devint le souverain de [Root.GetUsableName]. Cet acte défie directement la loi de succession par séniorité et, en conséquence, Iouri se rebella contre le jeune Vassili II. Cela mena à la guerre civile moscovite entre Vassili II d'un côté et Iouri et ses fils, Vassili Kossoï et Dimitri Chemiaka, de l'autre.\n\nBien que les menaces de Kossoï et Iouri aient été écartées, Dimitri Chemiaka représente toujours un danger pour la stabilité du [Root.GovernmentName]. Avec une petite armée de conspirateurs, Dimitri exécute un coup d'État contre Vassili II. Le [Root.Monarch.GetTitle] est capturé, aveuglé et exilé à Ouglitch tandis que Dimitri prend le contrôle du gouvernement."
 flavor_mos.7.a:0 "Il paiera pour cela..."
 vasily_ii_in_exile:1 "Vassili II en exil"
 desc_vasily_ii_in_exile:0 "Dimitri Chemiaka, cousin de Vassili II, a aveuglé et exilé le souverain légitime de [Root.GetUsableName]. Bien que Dimitri n'ait pas été officiellement reconnu par les boyards comme leur prince légitime, le gouvernement de l'État est désormais dirigé par Dimitri.\n\n§YCe modificateur disparaît si Vassili II revient d'exil.§!"
 vasily_ii_in_exile_desc:0 "jusqu'à ce que §YVassili II§! revienne d'exil"
 flavor_mos.8.t:0 "Le règne de Dimitri"
 flavor_mos.8.desc:0 "Tandis que Vassili II est en exil, les affaires de l'État sont gérées par Dimitri Chemiaka. Mais aucun des états ne soutient Chemiaka.\nAu lieu de cela, ils se tournent vers le Vassili II aveuglé et lui jurent allégeance en tant que prince légitime de Moscovie. Avec ses loyalistes, Vassili II est en position d'évincer Dimitri de la cour et de reprendre son trône."
 flavor_mos.8.a:0 "Mettre fin au règne de Dimitri une fois pour toutes"
 flavor_mos.8.b:0 "Laisser le trône à Dimitri"
 flavor_mos.9.t:0 "La défaite de Dimitri"
 flavor_mos.9.desc:0 "Dimitri a été vaincu et le règne de Vassili a été restauré. Avec la victoire de Vassili, la guerre civile moscovite s'est conclue et le différend pour le trône n'est plus."
 flavor_mos.9.a:0 "Enfin, une fin à cette querelle."
 flavor_mos.10.t:0 "Fin du joug tatar"
 flavor_mos.10.desc:0 "Par les changements dans l'équilibre des forces entre les hordes tatares et l'État [Root.GetAdjective], le joug tatar est devenu impossible à maintenir. Autrefois un tribut imposé, les exigences des Tatars ne sont plus qu'une relique du passé."
 ###DECISIONS###
 rus_sell_vodka_to_the_people_title:0 "Promouvoir les ventes de vodka"
 rus_sell_vodka_to_the_people_desc:0 "Les masses commencent à s'agiter. Une promotion des ventes de nos produits à base de vodka pourrait améliorer l'humeur de notre peuple.\nOu du moins rediriger leur agressivité les uns contre les autres."
 rus_sell_vodka_to_the_people_bt:0 "Chaque province §Ycéréalière§! possédée perd §R10§! de prospérité."
 rus_claim_emperor_title_title:0 "Proclamer le titre impérial"
 rus_claim_emperor_title_desc:0 "Pendant bien trop longtemps, les autres puissances de [Root.Capital.GetContinentName] nous ont considérés comme faibles. Indignes d'attention sur la scène mondiale.\nNous devons leur montrer que nous ne sommes pas une principauté arriérée et décadente, mais un véritable Empire. Nous devons démontrer notre puissance par la force et la supériorité !"
 rus_claim_emperor_title_at:0 "N'importe quel pays §Yrival§! a été humilié par §Y[Root.GetName]§ !"
 rus_claim_emperor_title_bt:0 "N'a aucun §Yrival§ !"
 hopae_system_decision_title:0 "Introduire le système Hopae"
 hopae_system_decision_desc:0 "Le système Hopae est un système d'identification qui exige que tous les Coréens portent une plaque avec leur nom, lieu de naissance, statut et lieu de résidence. Cela facilitera l'identification des personnes et leur localisation."
 desc_hopae_system:0 "Le système Hopae est un système d'identification qui exige que tous les Coréens portent une plaque avec leur nom, lieu de naissance, statut et lieu de résidence. Cela facilite l'identification des personnes et leur localisation."
 enforce_hangeul_alphabet_decision_title:0 "Imposer l'alphabet Hangul"
 enforce_hangeul_alphabet_decision_desc:1 "L'alphabet Hangul est un alphabet facile à comprendre et accessible qui vise à augmenter l'alphabétisation de notre peuple. Comme c'est une invention relativement récente, la population pourrait avoir besoin de temps pour s'y adapter plutôt que d'utiliser l'ancienne écriture chinoise."
 enforce_hangeul_alphabet_decision_tt:1 "§Y[Root.Monarch.GetName]§! n'a PAS choisi d'§Yimposer§! ou de §Yrévoquer§! l'alphabet Hangul."
 revoke_hangeul_alphabet_decision_title:0 "Révoquer l'alphabet Hangul"
 revoke_hangeul_alphabet_decision_desc:1 "L'alphabétisation de notre peuple a certes apporté de grands progrès à notre culture et notre avancement technologique, mais a également engendré des idées dangereuses qui menacent l'État. Laisser le peuple choisir sa propre écriture et ne pas imposer l'alphabet pourrait apaiser la pression des masses contre l'État."
 hangeul_alphabet:0 "Alphabet Hangul imposé"
 hangeul_alphabet_decision_ct:0 "§YNe peut être imposé ou révoqué qu'une fois par règne.§!"
 desc_hangeul_alphabet:0 "Notre peuple est contraint d'utiliser l'alphabet Hangul. Bien que l'alphabétisation augmente, les classes inférieures coréennes nourrissent des idées qui s'avèrent dangereuses pour l'État."
 hangeul_alphabet_revoked:0 "Alphabet Hangul révoqué"
 desc_hangeul_alphabet_revoked:0 "Notre peuple n'est plus contraint d'utiliser l'alphabet Hangul. L'alphabétisation des roturiers diminuera, mais en contrepartie les masses seront plus apaisées."
 por_raise_the_ordenancas_title:0 "Lever les Ordenanças"
 por_raise_the_ordenancas_desc:1 "En temps de besoin, le [Root.GovernmentName] peut lever la milice des Ordenanças afin de protéger [Root.GetUsableName] des envahisseurs étrangers."
 por_raise_the_ordenancas_at:0 "Recevoir §G1§! an de main-d'œuvre et de marins de toutes les provinces situées à §Y50§! de distance de [Root.Capital.GetName]"
 por_raise_the_ordenancas_bt:0 "En raison d'une §Yguerre défensive§!, la décision n'a pas de coût £mil£."
 por_raise_the_ordenancas_ct:0 "Recevoir §G+4,0 %§! de récupération de main-d'œuvre pour chaque pays §Y[Root.Religion.GetName]§! allié ou sujet de §Y[Root.GetName]§! pendant §Y10§! ans.\n§YNe peut recevoir plus de §G+20,0 %§! de récupération de main-d'œuvre grâce à cette décision.§!"
 gra_rally_the_volunteers_title:0 "Rassembler les volontaires"
 gra_rally_the_volunteers_desc:1 "L'heure du conflit a sonné. Nous appellerons les volontaires de notre foi à notre protection !"
 ###PROVINCE TRIGGERD MODIFIER###
 gol_the_tatar_yoke:0 "Le joug tatar"
 desc_gol_the_tatar_yoke:0 "Le siège des Tatars qui exigent un tribut des sujets russes. Tant que cette province est aux mains d'une horde, les Tatars restent en position de force pour imposer leurs exigences au peuple russe."
 gol_the_tatar_yoke_tt:0 "La province n'a jamais été possédée par un pays qui n'a PAS les §Ynomades des steppes§! ou le §Ygrand État mongol§! comme réforme de gouvernement."
 ###ENGLISH MISSIONS###
 eng_recruit_the_mercenaries_title:1 "Lever une armée"
 eng_recruit_the_mercenaries_desc:0 "Traditionnellement, le [Root.GetParliamentOrFallbackName] s'oppose à toute tentative d'armée permanente pour la maison royale. Au lieu de cela, notre [Root.GovernmentName] s'appuie sur les efforts de la milice, des mercenaires et des levées de la [Root.GetNobilityName]. Alors que la guerre de Cent Ans entre dans ses dernières phases et que les Écossais représentent une menace pour notre sécurité, il est naturel que nous devions lever une armée d'une manière ou d'une autre."
 eng_irish_conquest_title:0 "Conquérir l'Irlande"
 eng_irish_conquest_desc:0 "Historiquement connus comme « les ennemis irlandais de Sa Majesté », le peuple gaélique d'Irlande a longtemps été hors de la domination anglaise. Il est temps de les soumettre."
 eng_conquer_scotland_title:0 "Soumettre l'Écosse"
 eng_conquer_scotland_desc:0 "Édouard Ier, Scottorum Malleus, comprit la sagesse de sécuriser notre royaume en soumettant les Écossais. Nous devons faire de même."
 eng_conquer_scotland_ct:0 "Cet événement nous permettra d'acheter §Y[369.GetName]§! à §Y[369.Owner.GetName]§!."
 eng_unify_the_isles_title:0 "Unifier les îles"
 eng_unify_the_isles_desc:0 "Les îles Britanniques abritent les deux royaumes d'Angleterre et d'Écosse ainsi que les nombreux petits royaumes d'Irlande. C'est à nous d'unifier les îles sous la domination anglaise."
 eng_act_of_union_title:0 "Les Actes d'Union"
 eng_act_of_union_desc:0 "La législation des nombreux royaumes des îles est fragmentée et confuse. Bien que chacun de ces États partage le même monarque, leurs lois et parlements ne sont pas unifiés sous une constitution unique. Nous ne pouvons laisser cela continuer."
 eng_act_of_union_at:1 "Si nous avons formé @GBR §Y[GBR.GetName]§! :"
 eng_act_of_union_bt:1 "Si nous avons formé @AVE §Y[AVE.GetName]§! :"
 eng_act_of_union_ct:0 "§G20§! de production de base sont répartis aléatoirement dans des provinces possédées situées dans les régions de §YGrande-Bretagne§! ou de §YFrance§!."
 eng_war_of_the_roses_title:0 "Guerre des Deux-Roses"
 eng_war_of_the_roses_desc:0 "C'est un conflit que beaucoup voyaient venir depuis longtemps. Notre peuple doit être guidé en toute sécurité à travers cette période d'incertitude d'une manière ou d'une autre."
 eng_war_of_the_roses_at:1 "Si nous accomplissons cette mission en traversant le désastre de la §Yguerre des Deux-Roses§! :"
 eng_piety_of_the_state_title:0 "Piété de l'État"
 eng_piety_of_the_state_desc:0 "Nous sommes une terre bénie par le Seigneur lui-même. Mais les institutions cléricales ont une vision très différente de la gestion des affaires religieuses. Nous devons assurer la piété de l'État et prendre le contrôle de l'Église."
 eng_piety_of_the_state_at:0 "Si nous accomplissons cette mission tout en ayant la réforme §YSéparer le clergé de l'État§! ou la réforme §YRéduire les privilèges cléricaux§! :"
 eng_handle_the_reformation_title:0 "Gérer la Réforme"
 eng_handle_the_reformation_desc:0 "L'anarchie religieuse a saisi l'Europe. Là où jadis le Pape servait de guide, il n'y a plus que le chaos. Nous devons prendre le contrôle de la situation et décider de notre position sur la question du Divin."
 eng_handle_the_reformation_at:1 "Si nous accomplissons cette mission en étant §Ycatholique§! :"
 eng_handle_the_reformation_bt:1 "Si nous accomplissons cette mission en étant §Yprotestant§! :"
 eng_handle_the_reformation_ct:1 "Si nous accomplissons cette mission en étant §Yréformé§! :"
 eng_handle_the_reformation_dt:1 "Si nous accomplissons cette mission en étant §Yanglican§! :"
 eng_strengthen_the_monarchy_title:0 "Renforcer le [Root.GovernmentName]"
 eng_strengthen_the_monarchy_desc:0 "L'autorité de la couronne a toujours été un sujet de contentieux. Tandis que le souverain considère son règne comme absolu et de nature divine, le [Root.GetParliamentOrFallbackName] tente de limiter le pouvoir du [Root.Monarch.GetTitle].\nAlors que l'idée d'absolutisme grandit dans les cours d'Europe, elle grandit aussi dans la nôtre. Nous devons suivre la tendance et renforcer le [Root.GovernmentName] [Root.GetAdjective]."
 eng_the_english_civil_war_title:0 "Les guerres des Trois Royaumes"
 eng_the_english_civil_war_desc:0 "Le pouvoir du [Root.Monarch.GetTitle] et l'autorité du [Root.GetParliamentOrFallbackName] sont en opposition marquée. Le conflit entre royalistes et parlementaires est inévitable.\nNous devons nous assurer que [Root.GetUsableName] survivra à ces temps difficiles et en sortira comme un État de plus grande puissance et autorité."
 eng_the_english_civil_war_at:0 "A terminé le désastre de la §Yguerre civile anglaise§!, ou a atteint l'§Yère des Révolutions§! sans le déclencher."
 eng_the_english_civil_war_bt:1 "Si nous accomplissons cette mission après que la §Yguerre civile anglaise§! ait eu lieu :"
 eng_the_english_civil_war_dt:0 "Débloquer des §Yquestions parlementaires§! qui peuvent modifier nos §Yidées nationales§!."
 eng_english_parliamentarism_title:0 "Actes du [Root.GetParliamentOrFallbackName]"
 eng_english_parliamentarism_desc:0 "Le [Root.GetParliamentOrFallbackName] est un outil de l'État. Aussi puissant que tout outil puisse l'être, le potentiel du [Root.GetParliamentOrFallbackName] ne peut être utilisé correctement que s'il est guidé avec sagesse."
 gbr_ave_hundred_years_war_title:0 "La guerre de Cent Ans"
 gbr_ave_hundred_years_war_desc:0 "Le traité de Tours a apporté une période de trêve précaire entre [Root.GetName] et la France. Les deux camps savent que cela ne durera probablement pas, et nous devons décider d'honorer leur traité et temporiser, ou de nous préparer à la guerre.\nLe destin de [Root.GetUsableName] dépend de cette décision."
 gbr_ave_hundred_years_war_at:0 "Cet événement nous permet de choisir entre conserver les missions @GBR §Ybritanniques§!, axées sur le Nouveau Monde et la colonisation de l'Asie, et les missions @AVE §Yangevines§!, axées sur la domination continentale en Europe."
 gbr_develop_british_identity_title:0 "Développer l'identité britannique"
 gbr_develop_british_identity_desc:0 "Les îles Britanniques abritent de nombreuses cultures et langues différentes. Les Écossais et les Highlanders au nord, les Irlandais de l'île d'émeraude et les Gallois et Anglais au sud. Naturellement, une telle collection de cultures différentes mènera à des problèmes si elle n'est pas gérée. Nous forgerons une identité britannique afin d'établir une hégémonie britannique sur les îles."
 gbr_develop_british_identity_at:1 "Si nous accomplissons cette mission tout en acceptant la culture §Yhighlander§! et en ayant l'§YIrlande§! comme sujet, ou tout en ayant l'§Yirlandais§! comme culture acceptée :"
 gbr_develop_british_identity_bt:0 "jusqu'à ce que §Yhighlander§! ou §Yirlandais§! soient rétrogradés"
 gbr_develop_british_identity_ct:0 "Si nous accomplissons cette mission tout en possédant §Y50§! provinces [Root.Culture.GetGroupName] :"
 gbr_explore_new_world_title:0 "Découvrir les Amériques"
 gbr_explore_new_world_desc:0 "Des murmures discrets parlent de terres mystérieuses à l'extrême ouest, propices à l'expansion et remplies de merveilles inimaginables. Si c'est vrai, elles doivent être nôtres."
 gbr_colonize_canada_title:0 "Coloniser le Canada"
 gbr_colonize_canada_desc:0 "Plus froides et plus rudes que les terres méridionales, les contrées du Canada n'en demeurent pas moins propices à l'exploitation. Fourrures exotiques, bois et minerais abondent dans ces montagnes enneigées."
 gbr_colonize_canada_ct:0 "§Y[Root.GetName]§! ou ses sujets possèdent au moins §Y10§! provinces entièrement colonisées dans la région coloniale du §YCanada colonial§!."
 ENGLISH_FUR_TRADE:0 "Commerce anglais des fourrures"
 gbr_seize_ceylon_title:0 "S'emparer de Ceylan"
 gbr_seize_ceylon_desc:0 "Ceylan est une île proche de l'Inde d'une importance capitale pour sécuriser le commerce dans l'océan Indien. Nos rivaux sont parfaitement conscients des profits à tirer du négoce avec l'Inde et les îles aux épices, et convoitent eux aussi l'occupation de Ceylan. Nous ne saurions le permettre."
 COROMANDEL_PRESENCE:0 "Présence sur la côte de Coromandel"
 gbr_end_the_french_conflict_title:0 "Mettre fin au conflit français"
 gbr_end_the_french_conflict_desc:0 "Que ce soit par la victoire sur les Français et la revendication de leur trône, ou par l'abandon de l'Europe continentale au profit d'un renforcement de notre marine, notre conflit avec la France et le continent doit trouver une issue, d'une manière ou d'une autre."
 gbr_end_the_french_conflict_at:0 "Ne possède aucune province autre que §Y[87.GetName]§! dans la région §YFrance§!"
 gbr_end_the_french_conflict_bt:0 "§Y[4385.GetName]§! et §Y[167.GetName]§! sont possédées par §Y[Root.GetName]§! ou ses sujets et disposent d'une §Yplace de marché§!, d'un §Ycomptoir commercial§! ou d'une §Ybourse§! !"
 gbr_abolish_villeinage_title:0 "Abolir le servage"
 gbr_abolish_villeinage_desc:0 "Le travail servile des vilains a prouvé son utilité par le passé. Cependant, il est désormais dépassé. N'étant plus adapté à un [Root.GovernmentName] de notre prestige, il est temps de remplacer ce système en favorisant la tenure en copie."
 unlock_privilege_estate_nobles_english_copyhold_tenure_tt:0 "\nDébloque le privilège de la noblesse « §YTenure en copie élargie§! »"
 gbr_establish_royal_navy_title:0 "Fonder la Marine royale"
 gbr_establish_royal_navy_desc:0 "Notre marine actuelle n'est rien d'autre que la contribution en prélèvement de nos bourgeois. La mobilisation de notre flotte est lente et coûteuse.\nNous devons créer une marine permanente qui défendra notre île contre les envahisseurs étrangers et assurera l'avenir de [Root.GetUsableName]."
 gbr_rule_britannia_title:0 "Rule Britannia !"
 gbr_rule_britannia_desc:0 "La marine est notre force ; la mer est notre demeure. Il est de notre destinée de régner sur le monde depuis nos îles et de le dominer par notre suprématie navale !"
 gbr_rule_britannia_at:0 "Le modificateur s'améliore par le biais des actions parlementaires."
 gbr_colonize_north_america_title:0 "S'établir en Amérique"
 gbr_colonize_north_america_desc:0 "Les terres d'Amérique semblent propices à bien des entreprises. Au nord, on parle de fourrures et de matériaux pour la construction navale. Au sud, le terrain paraît favorable à la culture de nombreuses denrées. Nous devons y établir des bases afin d'en tirer profit."
 gbr_colonize_north_america_at:0 "§Y[Root.GetName]§! ou ses sujets possèdent au moins §Y10§! provinces entièrement colonisées dans la région coloniale de l'Amérique orientale coloniale."
 gbr_dominiate_new_world_title:0 "Dominer le Nouveau Monde"
 gbr_dominiate_new_world_desc:0 "Cet étrange Nouveau Monde est une revendication [Root.GetAdjective]. Toutes ses ressources et ses terres appartiennent à la couronne [Root.GetAdjective]. Nous veillerons à assurer notre domination sur le Nouveau Monde et à expulser ceux qui oseraient nous contester."
 gbr_dominiate_new_world_at:1 "Tous les sujets §Ycoloniaux§! gagnent §G+50,0 %§! d'efficacité de production et §G+50,0 %§! d'efficacité commerciale."
 gbr_establish_first_indian_trade_post_title:0 "Compagnie des Indes orientales"
 gbr_establish_first_indian_trade_post_desc:0 "De nombreuses marchandises exotiques ont leur origine dans le sous-continent indien. Les puissances européennes tirent profit du commerce avec l'Inde depuis de nombreuses années déjà. Il est temps pour nous de nous hisser à leur niveau et d'établir notre propre compagnie commerciale en Inde."
 gbr_establish_first_indian_trade_post_at:0 "Cet événement nous permet d'établir la @EIC §YCompagnie des Indes orientales§! en Inde en tant que sujet de type §YEntreprise commerciale§!."
 gbr_conquer_western_india_title:0 "Prendre la côte ouest de l'Inde"
 gbr_conquer_western_india_desc:0 "Incontestablement, le contrôle du littoral de la côte ouest de l'Inde nous accorderait une plus grande emprise sur l'ensemble de l'Inde. Prenons ces terres au nom de [Root.GetName]."
 GBR_INDIAN_COASTLINE_CONTROL:0 "Contrôle du littoral indien"
 gbr_english_superiority_title:0 "Suprématie [Root.GetAdjective]"
 gbr_english_superiority_desc:0 "Nos rivaux sont nombreux et puissants, mais aussi arrogants. Ils présument pouvoir rivaliser avec nous sur mer, contester nos revendications sur les terres lointaines et constituer une menace pour nous.\nNous devons leur montrer à quel point ils se trompent fatalement."
 gbr_the_royal_charter_title:0 "Émettre le brevet royal"
 gbr_the_royal_charter_desc:0 "Le brevet royal de nomination est un titre accordé aux marchands de biens d'exception destinés à la cour royale et aux personnages de sang royal. Nous devons choisir nos partenaires commerciaux avec sagesse et leur accorder ces brevets en échange d'un commerce avantageux."
 unlock_privilege_estate_burghers_autonomous_trade_companies_tt:0 "\nDébloque le privilège des bourgeois « §YCompagnies commerciales autonomes§! »"
 gbr_the_mediterranean_isles_title:0 "Autorité méditerranéenne"
 gbr_the_mediterranean_isles_desc:0 "Bien que nous ayons initialement considéré nos possessions méditerranéennes comme un outil stratégique dans les guerres contre nos voisins, il est devenu évident que nous pouvons exercer notre influence sur les flux commerciaux de la région. Nous devrions nous efforcer de l'accroître."
 gbr_the_mediterranean_isles_tt:0 "§Y[Root.GetName]§! obtient une revendication permanente sur chaque §Yîle§! de la §YMéditerranée§!."
 gbr_colonize_caribbeans_title:0 "Coloniser les Caraïbes"
 gbr_colonize_caribbeans_desc:0 "Les îles des Caraïbes offrent des opportunités lucratives à certains types de gentilshommes ayant la volonté de les saisir et la main-d'œuvre pour les exploiter. Nous disposons précisément de ce genre de gentilshommes."
 gbr_discover_india_title:0 "Découvrir l'Inde"
 gbr_discover_india_desc:0 "Le commerce avec l'Inde se poursuit depuis des temps immémoriaux, mais avec les longues routes terrestres, ce sont d'autres qui en tirent profit. Nous devons équiper une expédition et trouver une route maritime vers l'Inde."
 gbr_discover_india_at:0 "§Y[Root.GetName]§! obtient jusqu'à §Y5§! noyaux territoriaux dans les provinces côtières de l'§YInde§! qui ont été découvertes par [Root.GetName]."
 gbr_colonize_the_spice_isles_title:0 "Coloniser les îles aux épices"
 gbr_colonize_the_spice_isles_desc:0 "Les confins les plus reculés du monde produisent des épices merveilleuses, des étoffes tissées et des femmes exotiques. Nous devrions établir une présence ici, pour le bien de la société [Root.GetAdjective]."
 gbr_conquer_inland_india_title:0 "Pénétrer dans l'intérieur de l'Inde"
 gbr_conquer_inland_india_desc:0 "Les territoires intérieurs de l'Inde sont réputés pour leurs mines lucratives et leurs joyaux rares. Inutile de préciser que les habitants autochtones de la région se porteraient bien mieux sous notre administration."
 gbr_conquer_inland_india_at:0 "Jusqu'à §Y10§! provinces possédées en §YInde§! obtiennent l'effet suivant :"
 gbr_masters_of_india_title:0 "Maîtres de l'Inde"
 gbr_masters_of_india_desc:0 "Le sous-continent indien s'incline devant la puissance du [Root.GovernmentName] [Root.GetAdjective]. Récoltons les fruits de l'Inde pour la gloire de [Root.GetUsableName] !"
 gbr_masters_of_india_at:0 "Les §YEntreprises commerciales§! et les §YProtectorats§! gagnent §G+15,0 %§! de modificateur de marchandises produites.\nLes §YEntreprises commerciales§! accordent désormais au suzerain §G-75,0 %§! de pénalité commerciale réduite sur les nœuds commerciaux non principaux et §G+5,0 %§! d'efficacité commerciale."
 gbr_ave_the_royal_court_title:0 "La cour royale"
 gbr_ave_the_royal_court_desc:0 "Un [Root.Monarch.GetTitle] n'est rien sans [Root.Monarch.GetHerHis] conseillers. Quel que soit l'avenir de [Root.GetUsableName], des consultants compétents seront toujours nécessaires."
 gbr_allies_on_the_mainland_title:0 "Alliances continentales"
 gbr_allies_on_the_mainland_desc:0 "Bien que nos priorités se situent au-delà des mers, nous ne devons pas oublier la menace que notre continent d'origine pourrait représenter pour nous s'il était laissé sans surveillance. Nous devrions établir des alliances avec les ennemis de nos ennemis."
 gbr_allies_on_the_mainland_tt:1 "- A sa capitale sur §Y[Root.Capital.GetContinentName]§!\n      - L'opinion envers §Y[Root.GetName]§! est d'au moins §Y150§!.\n      - Est soit §Y[POR.GetName]§!, soit a au moins §Y200§! de développement total."
 gbr_take_over_the_lowlands_title:0 "Influencer les Pays-Bas"
 gbr_take_over_the_lowlands_desc:0 "Les Néerlandais et les Flamands des Pays-Bas nous ressemblent à bien des égards : ils recherchent la richesse par le commerce lucratif, maintiennent une force navale impressionnante et s'opposent à la domination française et espagnole. Influencer les Pays-Bas en notre faveur pourrait nous apporter un allié ou un sujet inestimable dans cette région."
 gbr_take_over_the_lowlands_at:1 "Si nous accomplissons cette mission tout en ayant un allié dans les §YPays-Bas§! qui remplit les conditions :"
 gbr_take_over_the_lowlands_ct:0 "L'§Yallié§! et §Y[Root.GetName]§! deviennent §Yamis historiques§!."
 gbr_trade_dominance_in_europe_title:0 "Le commerce européen"
 gbr_trade_dominance_in_europe_desc:0 "Bien que de nombreuses marchandises du Nouveau Monde affluent dans notre canal, celui-ci est loin d'être le seul centre commercial d'Europe où des profits considérables peuvent être réalisés. Étendre notre présence en Europe assurera notre domination sur le commerce européen."
 gbr_trade_dominance_in_europe_at:0 " nœuds commerciaux en §YEurope§! :\n    §Y[Root.GetName]§! détient §Y30 %§! ou plus de la puissance commerciale.\n    §Y[Root.GetName]§! est la puissance commerciale dominante."
 gbr_sail_around_africa_title:0 "Naviguer autour de l'Afrique"
 gbr_sail_around_africa_desc:0 "Quelles merveilles nous attendent au-delà du cap de Bonne-Espérance ?"
 gbr_sail_around_africa_ct:0 "A navigué autour de l'Afrique"
 gbr_seize_the_cape_title:0 "S'emparer du Cap"
 gbr_seize_the_cape_desc:0 "Le cap de Bonne-Espérance est un point de passage crucial sur la route des Indes orientales. Sans aucun doute, celui qui contrôle le Cap contrôle également les ambitions asiatiques des autres grandes puissances.\nLe Cap doit être nôtre !"
 gbr_chart_the_southern_sea_title:0 "Cartographier les mers du Sud"
 gbr_chart_the_southern_sea_desc:0 "Des hommes audacieux, dotés d'un véritable courage britannique, sollicitent le soutien du gouvernement pour cartographier les vastes étendues vides des océans méridionaux. Les rumeurs parlent de terres à prendre là-bas ; nous devrions nous hâter d'établir une colonie prospère avant que d'autres ne saisissent cette opportunité."
 gbr_colonize_australia_title:0 "Coloniser l'Australie"
 gbr_colonize_australia_desc:0 "Nos explorations ont révélé l'existence d'une île d'une taille inimaginable. Bien qu'il ne s'agisse pas du continent austral que nous espérions trouver, c'est tout de même une terre qui devrait devenir une revendication [Root.GetAdjective]."
 gbr_conquer_eastern_india_title:0 "Conquérir le Bengale"
 gbr_conquer_eastern_india_desc:0 "La Compagnie [Root.GetAdjective] des Indes orientales opère dans cette région depuis un certain temps. À sa demande, et sous sa direction, il est temps de consolider notre emprise sur le fertile delta du Bengale."
 gbr_ave_monopolize_the_channel_title:0 "Monopoliser la Manche"
 gbr_ave_monopolize_the_channel_desc:0 "Maintenant que nous avons clairement établi notre domination coloniale, des marchandises précieuses commencent à arriver des colonies. Tout ce qui transite par la Manche nous appartient de droit, et nous devons protéger nos investissements à l'étranger comme chez nous."
 gbr_ave_center_of_worlds_trade_title:0 "Centres du commerce mondial"
 gbr_ave_center_of_worlds_trade_desc:0 "Partout où se pose notre regard, là sera le commerce d'une richesse inconcevable. Nos places de marché sont les centres du commerce mondial."
 gbr_a_house_divided_title:0 "Une maison divisée"
 gbr_a_house_divided_desc:0 "Le grand Parlement est divisé en deux chambres : la Chambre des communes, qui est la voix des contribuables, des roturiers et des bourgeois, et la Chambre des lords, l'organe politique de la noblesse et du clergé.\nNous devons assurer la loyauté des deux chambres."
 gbr_ave_early_industry_title:0 "Industrie naissante"
 gbr_ave_early_industry_desc:0 "À mesure que nos vastes possessions industrielles s'accroissent, la demande de combustible augmente sans cesse tandis que l'industrie mécanisée prend forme autour de [Root.GetName]. Augmentons l'approvisionnement en matériaux raffinés."
 gbr_ave_renovate_universities_title:0 "Rénover Oxbridge"
 gbr_ave_renovate_universities_desc:0 "Les installations des universités centenaires d'Oxford et de Cambridge commencent à s'avérer inadaptées à leur mission. Un modeste investissement devrait considérablement améliorer la situation."
 ave_conquer_lowlands_at:0 "A sa capitale dans les §YPays-Bas§!, a pour culture principale §Ynéerlandaise§!, §Yflamande§!, §Ywallonne§! ou §Yfrisonne§! et possède au moins §Y15§! provinces dans les §YPays-Bas§!."
 gbr_ave_the_great_empire_title:0 "L'Empire [Root.GetAdjective]"
 gbr_ave_the_great_empire_desc:0 "L'Empire [Root.GetAdjective] s'étend d'Est en Ouest ; peu de nations peuvent égaler notre ténacité. Néanmoins, il reste encore des terres qui ne nous appartiennent pas..."
 gbr_ave_english_renaissance_title:0 "Renaissance [Root.GetAdjective]"
 gbr_ave_english_renaissance_desc:0 "L'État, l'armée, le commerce et la diplomatie sont sujets au changement et à l'évolution, et la culture ne fait pas exception. Nous embrasserons et promouvrons les idées de la Renaissance."
 gbr_ave_create_standing_army_title:0 "Fonder une armée permanente"
 gbr_ave_create_standing_army_desc:0 "Bien que le Parlement voie cet acte avec suspicion et crainte, les guerres récentes ainsi que la menace de guerre civile ont démontré la nécessité d'une armée permanente sous le commandement du [Root.Monarch.GetTitle]. Nous ne pouvons laisser [Root.GetUsableName] sans protection en cas d'invasion ennemie."
 gbr_ave_the_redcoats_title:0 "Les Habits rouges"
 gbr_ave_the_redcoats_desc:0 "Dans le tumulte de la bataille, les troupes peuvent rapidement perdre leur orientation et se retrouver à tirer accidentellement sur des alliés et des camarades. De tels incidents doivent être évités à tout prix.\nL'établissement d'un uniforme approprié pour nos troupes, les rendant nettement visibles, réduira considérablement le nombre de ces accidents tout en améliorant l'apparence de notre armée."
 gbr_ave_the_royal_marines_title:0 "Les fusiliers marins royaux"
 gbr_ave_the_royal_marines_desc:0 "La nature maritime de notre État exige des adaptations de notre appareil militaire. Nous devons établir les Fusiliers marins royaux qui protégeront les intérêts de [Root.GetUsableName] outre-mer."
 gbr_ave_the_men_of_war_title:0 "Étendre la Marine royale"
 gbr_ave_the_men_of_war_desc:0 "Nous vivons et mourons par notre capacité à projeter notre puissance sur les mers. Nous devons préparer notre nation à la construction et à l'expansion de la Marine royale."
 ave_eliminate_the_french_minors_title:0 "Assurer les couronnes des ducs"
 ave_eliminate_the_french_minors_desc:0 "Bien que le trône de France soit désormais gouverné depuis [Root.Capital.GetName], la région française demeure décentralisée et fragmentée. Les duchés indépendants de Provence et de Bretagne doivent plier le genou devant [Root.GetUsableName]."
 ave_eliminate_the_french_minors_at:0 "Si nous accomplissons cette mission alors que la §YFrance§! est notre sujet :"
 ave_eliminate_the_french_minors_ct:0 "L'une des conditions suivantes doit être vraie :\n    Est un sujet de §Y[Root.GetName]§! ou de ses sujets\n    Ne possède aucune province dans la région §YFrance§!"
 ave_conquer_iberia_title:0 "Royaumes d'Espagne"
 ave_conquer_iberia_desc:0 "La péninsule Ibérique abrite les puissants royaumes d'Aragon, de Castille et du Portugal. Chacun de ces royaumes constitue une menace pour nos intérêts en France ainsi qu'au-delà du grand océan Atlantique. Nous devons frapper les premiers avant que les Ibériques ne lancent leur attaque contre nous."
 ave_angevin_iberia_title:0 "Ibérie angevine"
 ave_angevin_iberia_desc:0 "Les royaumes ibériques tombent devant notre puissance. Pourtant, leurs peuples refusent de se soumettre à la couronne angevine. Nous prendrons officiellement la couronne espagnole et montrerons aux Ibériques notre bienveillance en investissant dans leurs terres sous-développées."
 ave_promote_angevin_culture_title:0 "La culture angevine"
 ave_promote_angevin_culture_desc:0 "La guerre de Cent Ans a creusé un profond fossé entre notre culture et celles de notre terre d'origine, la France. Ces blessures doivent guérir si l'Empire angevin doit résister à l'épreuve du temps."
 ave_promote_angevin_culture_at:0 "A engagé un conseiller §Ybritannique§! et un conseiller §Yfrancien§!."
 ave_promote_angevin_culture_bt:1 "Le groupe culturel §Ybritannique§! est converti en culture §Yangloise§! du groupe culturel §Yfrançais§!."
 ave_take_the_french_throne_title:0 "S'emparer du trône de France"
 ave_take_the_french_throne_desc:0 "Depuis 1337, les Anglais et les Français sont engagés dans une lutte constante pour la domination du trône de France. Cent années de batailles, de dévastation, de mort et de destruction ; ce bain de sang ne peut s'achever que d'une seule manière : par la victoire totale sur les Français !"
 ave_shatter_frances_nobility_title:0 "Briser la noblesse française"
 ave_shatter_frances_nobility_desc:0 "Enfin, la France a accepté sa défaite et reconnaît le [Root.Monarch.GetTitle] de [Root.GetUsableName] comme son seul souverain légitime. Tandis que le roturier français s'agenouille devant son véritable [Root.Monarch.GetTitle], la noblesse française refuse de nous reconnaître. Comme nous avons déjà bien assez à faire avec la noblesse anglaise, les nobles français doivent être rapidement neutralisés."
 ave_the_angevin_empire_title:0 "Le royaume angevin"
 ave_the_angevin_empire_desc:0 "Les rois angevins régnaient sur la moitié des terres françaises, assurant prospérité et justice à tous. Avec notre victoire sur le trône de France, nous avons tous les droits de revendiquer à nouveau le titre angevin."
 ave_the_angevin_empire_at:0 "Est possédée par §Y[Root.GetName]§! ou ses sujets (ou les sujets de ses sujets)"
 ave_invade_italy_title:0 "Sécuriser les cols alpins"
 ave_invade_italy_desc:0 "Avec l'unification de la région française, les cols alpins sont devenus notre nouvelle frontière sud-est. Les Italiens tiennent ces cols et pourraient facilement nous couper des richesses du commerce italien. Nous devons sécuriser ces passages pour nous-mêmes et veiller à ce qu'aucun de ces ducs et doges ne devienne trop puissant."
 ave_italian_domination_title:0 "Régner sur l'Italie"
 ave_italian_domination_desc:1 "Les nombreuses maisons d'Italie ainsi que le pape lui-même se disputent la domination de l'Italie. Aucun de ces sots n'a conscience que leur chère botte se trouve dans la sphère d'influence angevine. Nous devrions leur rappeler courtoisement leur place."
 ave_dominate_europe_title:0 "Dominer l'Europe"
 ave_dominate_europe_desc:0 "Jadis un modeste royaume des îles Britanniques, notre [Root.GovernmentName] est devenu l'une des puissances les plus prestigieuses et influentes d'Europe occidentale. Le royaume de France est nôtre, les monarques ibériques s'agenouillent devant nous. Même le pape et l'empereur n'ont plus l'autorité de s'opposer à nous.\nÀ partir de ce jour, de cet instant, le continent européen nous appartient !"
 ave_a_kingdom_of_chivalry_title:0 "Un royaume de chevalerie"
 ave_a_kingdom_of_chivalry_desc:0 "La guerre de Cent Ans fut l'une des dernières guerres en Europe où les chevaliers firent preuve d'une véritable chevalerie et d'un honneur authentique au combat. Au fil du temps, les idéaux de chevalerie sombrèrent dans l'oubli.\nOu du moins, ce serait le cas s'il ne dépendait pas de nous. Nous devons nous en tenir à ces piliers fondamentaux et veiller à leur renouveau au sein de notre cour et de notre armée."
 ave_claim_the_empire_title_title:0 "Revendiquer le titre impérial"
 ave_claim_the_empire_title_desc:0 "À l'origine rien de plus qu'un royaume en compétition pour le pouvoir avec la France, le royaume angevin est aujourd'hui bien plus que cela. La totalité de la France et de l'Angleterre est en notre possession, et le simple titre de « Roi » n'est plus adéquat à notre gloire.\nNous assumerons le titre d'« Empereur » de l'Empire angevin !"
 ave_claim_the_empire_title_at:0 "Cet événement nous donnera un nom approprié reflétant notre puissance."
 ave_claim_the_empire_title_bt:0 "Le nom de notre pays s'ajuste désormais dynamiquement en fonction de notre gouvernement et de notre rang."
 ave_discover_the_americas_title:0 "Découvrir les Amériques"
 ave_discover_the_americas_desc:0 "Des murmures discrets parlent de terres mystérieuses à l'extrême Ouest, propices à la croissance et remplies de merveilles inimaginables. Si cela est vrai, elles doivent être nôtres."
 ave_eliminate_burgundy_title:0 "S'emparer de la Bourgogne"
 ave_eliminate_burgundy_desc:0 "Les derniers vestiges du duché de Bourgogne traversent des temps difficiles. Lorsqu'ils nous ont tourné le dos après le traité d'Arras, nous n'avons pas oublié. Leurs terres seront confisquées."
 ave_deal_with_the_hre_title:0 "Lutte pour le Saint-Empire"
 ave_deal_with_the_hre_desc:0 "Le Saint-Empire romain germanique ; un témoignage d'un empire jadis puissant dont le pouvoir est désormais réparti entre les électeurs et les princes. Comme notre ambition se porte sur l'Europe, il est naturel qu'une lutte émerge entre le [Root.GovernmentName] angevin et le Saint-Empire romain germanique."
 ave_deal_with_the_hre_at:0 "Si nous accomplissons cette mission alors qu'au moins §Y3§! électeurs sont nos sujets ou nous favorisent pour l'élection :"
 ave_deal_with_the_hre_bt:0 "Si nous accomplissons cette mission en possédant ou en ayant un sujet possédant au moins §Y10§! provinces en §YAllemagne§! :"
 ave_deal_with_the_hre_ct:0 "Chaque pays connu dans le §YSaint-Empire romain germanique§! perd §G5§! points d'opinion d'expansion agressive envers §Y[Root.GetName]§!."
 ave_double_emperorship_title:0 "Rois angevins en ascension"
 ave_double_emperorship_desc:0 "Notre fortune est en hausse. Des rois s'inclinent devant notre majesté, des nations cèdent devant nos forces. Il ne reste plus qu'un seul trône supérieur au nôtre à renverser."
 ave_double_emperorship_at:0 "Si nous accomplissons cette mission tout en étant empereur du §YSaint-Empire romain germanique§! :"
 ave_kingdom_of_metropolises_title:0 "Royaume de métropoles"
 ave_kingdom_of_metropolises_desc:0 "En tant qu'autorité sur les vastes terres d'Angleterre et de France, il est de notre devoir d'assurer une infrastructure stable sur le territoire des deux couronnes."
 ave_kingdom_of_metropolises_at:0 "Chaque province possédée ayant au moins §Y20§! de développement dans les régions de §YFrance§! et de §YBretagne§! gagne les effets suivants :"
 ave_the_angevin_age_title:0 "L'ère angevine"
 ave_the_angevin_age_desc:0 "Notre [Root.GovernmentName] était considéré comme une relique des temps médiévaux, d'une époque où les ténèbres obscurcissaient l'esprit de l'humanité. Pourtant, nous persistons. Pourtant, nous dominons.\nC'est l'aube d'une nouvelle ère. L'ère angevine conduira le continent vers un avenir plus radieux !"
 ave_introduce_the_banking_act_title:0 "Introduire la loi bancaire"
 ave_introduce_the_banking_act_desc:0 "Nos ambitions sont grandes ; nos cibles dangereuses. Toute entreprise que nous souhaitons tenter en Europe nécessitera un trésor solide, une banque nationalisée puissante. Nous devons préparer le gouvernement ainsi que notre économie à l'introduction d'un système bancaire nationalisé."
 ave_colonize_america_title:0 "S'établir en Amérique"
 ave_colonize_america_desc:0 "Les terres d'Amérique semblent propices à bien des entreprises. Au nord, on parle de fourrures et de matériaux pour la construction navale. Au sud, le terrain paraît favorable à la culture de nombreuses denrées. Nous devons y établir des bases afin d'en tirer profit."
 ave_colonize_america_tt:0 "§Y[Root.GetName]§! ou ses sujets possèdent au moins §Y10§! provinces entièrement colonisées dans le §YNouveau Monde§!."
 ave_colonial_empire_title:0 "Un empire colonial"
 ave_colonial_empire_desc:0 "Nous sommes choisis par le Seigneur pour apporter l'illumination, le progrès et la gloire au reste du monde. Il est de notre destinée de coloniser le Nouveau Monde au nom du [Root.Monarch.GetTitle] !"
 ave_conquer_lowlands_title:0 "Influencer les Pays-Bas"
 ave_conquer_lowlands_desc:0 "Les Néerlandais et les Flamands des Pays-Bas nous ressemblent à bien des égards : ils recherchent la richesse par le commerce lucratif, maintiennent une force navale impressionnante et s'opposent à la domination française et espagnole. Influencer les Pays-Bas en notre faveur pourrait nous apporter un allié ou un sujet inestimable dans cette région."
 ave_perfect_construct_barracks_title:0 "Étendre l'armée"
 ave_perfect_construct_barracks_desc:0 "Les guerres sont une extension de la diplomatie. Malheureusement, les monarques insensés d'Europe ne parlent que le langage de la violence, aussi la guerre est-elle la seule diplomatie qu'ils comprennent.\nPour cela, nous devons nous assurer d'une armée forte et vaste afin de pouvoir nous exprimer."
 ave_perfect_construct_barracks_at:0 "Jusqu'à §Y5§! provinces possédées qui ont un §Yfort§! et l'un des bâtiments augmentant les §Yeffectifs§! gagnent les effets suivants :"
 ave_combine_land_and_navy_title:0 "Une armée unifiée"
 ave_combine_land_and_navy_desc:0 "L'Armée royale et la Marine sont les deux faces d'une même pièce. Afin de minimiser la bureaucratie et de maximiser l'entraînement de nos troupes, il serait judicieux de consolider ces deux aspects de l'appareil militaire en un seul."
 ###BRITISH FLAVOR EVENTS###
 flavor_gbr.23.b.tt:0 "@SPA §YL'Espagne§! sera libérée en tant que nation sujette sous union personnelle avec §Y[Root.GetName]§!."
 flavor_gbr.24.b.tt:0 "@ITA §YL'Italie§! sera libérée en tant que nation sujette sous union personnelle avec §Y[Root.GetName]§!."
 ENG_CLERGICAL_PRIVILEGES:0 "Privilèges du clergé"
 flavor_gbr.104.b:0 "Nous ne devrions pas aller trop loin."
 flavor_gbr.105.b:0 "Le clergé a déjà suffisamment souffert."
 flavor_gbr.109.a.tt:0 "Tant que ce modificateur est actif :\n§YObtient un modificateur selon le type et le niveau du conseiller :§!\n -§YPhilosophe§! et §YScientifique naturaliste§!\n    - Tolérance envers les hérétiques : §G+1,00§! par niveau\n -§YArtiste§!\n    - Tolérance de la vraie foi : §G+1,00§! par niveau\n -§YTrésorier§! et §YMaître des monnaies§!\n    - Unité religieuse : §G+15,0 %§! par niveau\n -§YInquisiteur§! et §YThéologien§!\n    - Force missionnaire contre les hérétiques : §G+1,0 %§! par niveau"
 flavor_gbr.1.t:0 "Destinée de [Root.GetUsableName]"
 flavor_gbr.1.desc:0 "Les relations entre le [Root.GovernmentName] de [Root.GetUsableName] et le [FRA.GovernmentName] de [FRA.GetUsableName] sont à jamais entachées par la guerre de Cent Ans. Le roi Édouard III revendiqua le trône de France en 1337, et nos deux États sont en conflit constant depuis lors.\nLa guerre approche de sa conclusion finale, et il devient évident que notre destin dépend de notre position envers l'Europe continentale."
 flavor_gbr.1.a:0 "Le continent ne nous intéresse plus."
 flavor_gbr.1.a.tt:0 "Nous conservons les missions @GBR §Ybritanniques§!."
 flavor_gbr.1.b:0 "Nous ne pouvons abandonner notre revendication angevine."
 flavor_gbr.1.b.tt:0 "Remplace les missions @GBR §Ybritanniques§! par les missions @AVE §Yangevines§!.\nLes missions §Yangevines§! se concentrent sur la §Ydomination de l'Europe§! plutôt que sur la colonisation du Nouveau Monde et de l'Asie.\n§RNous ne pourrons pas former la §YGrande-Bretagne§!.§!"
 flavor_gbr.2.t:0 "Achat de [369.GetName]"
 flavor_gbr.2.desc:0 "Avec la soumission de l'Écosse, les parties septentrionales des îles Britanniques sont sous domination [Root.GetAdjective]. Cependant, les îles du nord de [369.GetName], [1978.GetName] et [1979.GetName] échappent encore à notre autorité. Si [1978.GetName] et [1979.GetName] sont négligeables, l'île de [369.GetName] doit être incorporée à notre État.\nPeut-être qu'un achat de l'île auprès de [369.Owner.GetName] serait envisageable."
 flavor_gbr.2.a:0 "Acheter [369.GetName]."
 flavor_gbr.2.a.tt:0 "§Y[Root.GetName]§! offrira §Y200§! ¤ à §Y[369.Owner.GetName]§! en échange de la province de §Y[369.GetName]§!.\n§YLa volonté de vendre la province dépend des relations de [Root.GetName] avec [369.Owner.GetName].§!"
 flavor_gbr.2.b:0 "Nous n'avons pas le trésor nécessaire pour le moment."
 flavor_gbr.2.b.tt:0 "Débloque une décision permettant de proposer d'§Yacheter [369.GetName]§! à §Y[369.Owner.GetName]§!."
 flavor_gbr.3.t:0 "L'offre pour [369.GetName]"
 flavor_gbr.3.desc:0 "Un ambassadeur de [From.GetName] est arrivé à notre cour. Il présente une offre de la couronne [From.GetAdjective] : 200 unités de ducats en échange de la propriété de la province de [369.GetName]."
 flavor_gbr.3.a:0 "Accepter cette offre."
 flavor_gbr.3.b:0 "Renvoyer l'ambassadeur."
 flavor_gbr.4.t:0 "[369.Owner.GetName] accepte l'offre"
 flavor_gbr.4.desc:0 "Notre ambassadeur est revenu de la cour de [369.Owner.GetName]. Il rapporte que le [369.Owner.Monarch.GetTitle] [369.Owner.GetAdjective] a accepté notre offre."
 flavor_gbr.4.a:0 "Excellent"
 flavor_gbr.5.t:0 "[369.Owner.GetName] décline l'offre"
 flavor_gbr.5.desc:0 "Notre ambassadeur est revenu de la cour de [369.Owner.GetName]. Il rapporte que le [369.Owner.Monarch.GetTitle] [369.Owner.GetAdjective] a décliné notre offre."
 flavor_gbr.5.a:0 "C'est leur perte"
 flavor_gbr.6.t:0 "Le royaume d'Irlande"
 flavor_gbr.6.desc:0 "Henri II d'Angleterre reçut le titre de « Seigneur d'Irlande » par bulle papale en 1155. [Root.GetUsableNameCap] a depuis lors une revendication monarchique sur l'Irlande.\nAu fil du temps, l'Irlande est devenue partie intégrante de [Root.GetUsableName], tandis que notre titre de seigneur de cette île est devenu incertain en raison des relations [Root.GetAdjective]-papales. Le [Root.GetParliamentOrFallbackName] ainsi que le [Root.Monarch.GetTitle] débattent des questions titulaires de notre revendication.\nL'établissement du « Royaume d'Irlande » rehausserait certainement le prestige de [Root.Monarch.GetName]. La question demeure de savoir si l'Irlande doit être gouvernée sous union personnelle."
 flavor_gbr.6.a:0 "L'Irlande doit rester sous notre autorité directe."
 flavor_gbr.6.b:0 "L'Irlande doit être gouvernée sous union personnelle."
 flavor_gbr.6.b.tt:1 "@IRE§YL'Irlande§! sera libérée en tant que nation sujette sous union personnelle avec §Y[Root.GetName]§!."
 flavor_gbr.7.t:0 "Le commerce des fourrures nord-américain"
 flavor_gbr.7.desc:0 "Les autochtones d'Amérique du Nord ont toujours pratiqué le commerce et la vente de fourrures animales, et les Européens colonisant l'Amérique ont commencé à participer à ce commerce dès leur arrivée. Les colons [Root.GetAdjective] ont établi des comptoirs commerciaux très tôt, et cela est devenu l'une des principales entreprises économiques en Amérique du Nord. Nos marchands et colons tirent profit de ce commerce."
 flavor_gbr.7.a:0 "Excellent"
 FUR_TRADE:0 "Le commerce des fourrures"
 flavor_gbr.10.a:0 "Laissons la compagnie prendre le contrôle de nos affaires indiennes"
 flavor_gbr.10.a.tt:0 "§Y[Root.GetName]§! libère la §YCompagnie des Indes orientales§! en §YInde§!.\n§YLa Compagnie des Indes orientales§! devient un sujet de type §YEntreprise commerciale§! de §Y[Root.GetName]§!."
 flavor_gbr.10.b:0 "Nous pouvons administrer l'Inde nous-mêmes"
 flavor_gbr.10.c:0 "Nous verrons bien comment cette compagnie s'en sortira..."
 flavor_gbr.12.t:0 "Le Théâtre du Globe"
 flavor_gbr.12.desc:0 "Le théâtre et les arts se répandent parmi notre population, et les habitants des villes jouissent d'une variété de divertissements. Promoteurs et mécènes des arts comme nous le sommes, nous sommes fiers d'inaugurer un nouveau théâtre au cœur de [Root.Capital.GetCapitalName]. Il s'agit en fait d'une reconstruction d'un autre, simplement appelé « Le Théâtre », qui fut en réalité le premier théâtre permanent de toute l'Angleterre. Ses poutres ont été transportées sur le nouveau site et réutilisées pour construire ce nouveau théâtre, plus grand et plus splendide que celui qu'il remplace.\n\nAvec ce nouveau théâtre, notre peuple pourra profiter de bien plus de pièces, y compris celles du célèbre William Shakespeare, et même notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] a manifesté son intérêt pour assister à certaines de ses représentations."
 flavor_gbr.12.a:0 "Le monde entier est une scène, mais la principale est à [Root.Capital.GetCapitalName]."
 flavor_gbr.13.t:0 "La Société royale de [Root.Capital.GetCapitalName]"
 flavor_gbr.13.desc:0 "Nous sommes un phare de savoir et de science. Des universitaires de tout le pays et même de l'étranger se rassemblent dans les rues et les collèges de [Root.Capital.GetCapitalName] pour discuter des dernières avancées. Ils ont commencé à s'organiser en différents groupes pour mener ces réunions et discussions. L'un de ces groupes a attiré l'attention du [Root.Monarch.GetTitle] [Root.Monarch.GetName], et [Root.Monarch.GetSheHe] a montré [Root.Monarch.GetHerHis] approbation en cautionnant officiellement le groupe. Il sera donc désormais connu sous le nom de Société royale de [Root.Capital.GetCapitalName].\n\nSa mission sera de promouvoir et de faire progresser la science, l'expérimentation et les découvertes, et grâce à elle, notre pays sera certainement le modèle de progrès par excellence. Les esprits les plus brillants de la nation et même du monde entier arpenteront sans aucun doute ses couloirs."
 flavor_gbr.13.a:0 "Un phare de lumière !"
 appointment_of_state_minister_tt:0 "Un §Yconseiller§! de notre choix rejoint la cour."
 appointment_of_state_minister_at:0 "§YIl coûte §G50,0 %§! moins cher.§!"
 flavor_gbr.15.t:0 "Nomination du ministre d'État"
 flavor_gbr.15.desc:0 "Le [Root.GetParliamentOrFallbackName] a pris sa décision. Un nouveau ministre rejoindra la cour afin d'assister le [Root.Monarch.GetTitle] dans les nombreuses affaires du gouvernement. Avant qu'un ministre puisse être nommé, le [Root.Monarch.GetTitle] doit décider quel poste le nouveau conseiller occupera."
 flavor_gbr.15.a:0 "Notre administration a besoin d'un bureaucrate."
 flavor_gbr.15.a.tt:0 "Nous choisirons un conseiller §Yadministratif§! pour la cour [Root.GetAdjective]."
 flavor_gbr.15.b:0 "Nous avons besoin de quelqu'un capable de diplomatie."
 flavor_gbr.15.b.tt:0 "Nous choisirons un conseiller §Ydiplomatique§! pour la cour [Root.GetAdjective]."
 flavor_gbr.15.c:0 "L'armée a besoin d'un homme de talent."
 flavor_gbr.15.c.tt:0 "Nous choisirons un conseiller §Ymilitaire§! pour la cour [Root.GetAdjective]."
 flavor_gbr.16.t:0 "Nomination du ministre d'État"
 flavor_gbr.16.desc.adm:0 "Nous avons décidé de pourvoir le poste administratif de la cour avec un nouveau ministre. Il y a plusieurs candidats qui peuvent occuper ce poste. C'est au [Root.Monarch.GetTitle] de décider quel type de conseiller [Root.Monarch.GetSheHe] requiert."
 flavor_gbr.16.desc.dip:0 "Nous avons décidé de pourvoir le poste diplomatique de la cour avec un nouveau ministre. Il y a plusieurs candidats qui peuvent occuper ce poste. C'est au [Root.Monarch.GetTitle] de décider quel type de conseiller [Root.Monarch.GetSheHe] requiert."
 flavor_gbr.16.desc.mil:0 "Nous avons décidé de pourvoir le poste militaire de la cour avec un nouveau ministre. Il y a plusieurs candidats qui peuvent occuper ce poste. C'est au [Root.Monarch.GetTitle] de décider quel type de conseiller [Root.Monarch.GetSheHe] requiert."
 flavor_gbr.16.desc.zzz:0 "Nous avons décidé que notre [Root.GovernmentName] est déjà suffisamment bon. Pourquoi devrions-nous nous encombrer d'un ministre de toute façon ?"
 flavor_gbr.16.zzz:0 "Le [Root.Monarch.GetTitle] est suffisamment compétent pour occuper tous les postes [Root.Monarch.GetHerselfHimself]."
 flavor_gbr.16.a:0 "Engager un artiste."
 flavor_gbr.16.b:0 "Engager un inquisiteur."
 flavor_gbr.16.c:0 "Engager un maître des monnaies."
 flavor_gbr.16.d:0 "Engager un scientifique naturaliste."
 flavor_gbr.16.e:0 "Engager un théologien."
 flavor_gbr.16.f:0 "Engager un trésorier."
 flavor_gbr.16.g:0 "Engager un philosophe."
 flavor_gbr.16.h:0 "Engager un diplomate."
 flavor_gbr.16.i:0 "Engager un gouverneur colonial."
 flavor_gbr.16.j:0 "Engager un réformateur naval."
 flavor_gbr.16.k:0 "Engager un navigateur."
 flavor_gbr.16.l:0 "Engager un maître-espion."
 flavor_gbr.16.m:0 "Engager un homme d'État."
 flavor_gbr.16.n:0 "Engager un marchand."
 flavor_gbr.16.o:0 "Engager un organisateur d'armée."
 flavor_gbr.16.p:0 "Engager un réformateur militaire."
 flavor_gbr.16.q:0 "Engager un commandant."
 flavor_gbr.16.r:0 "Engager un grand capitaine."
 flavor_gbr.16.s:0 "Engager un maître recruteur."
 flavor_gbr.16.u:0 "Engager un ingénieur militaire."
 flavor_gbr.16.v:0 "Engager un quartier-maître."
 flavor_gbr.20.t:0 "Un royaume angevin"
 flavor_gbr.20.desc:0 "Notre situation politique ayant changé, le nom officiel de notre pays doit être réajusté afin de refléter l'état actuel des choses."
 flavor_gbr.20.a:0 "Vive l'Empire !"
 flavor_gbr.20.b:0 "Un royaume pour un cheval."
 flavor_gbr.20.c:0 "Ô quelle misère..."
 flavor_gbr.20.d:0 "Une république pour résister à l'épreuve du temps !"
 flavor_gbr.20.e:0 "Que le Seigneur ait pitié car notre État n'en a point."
 flavor_gbr.20.f:0 "Nous n'avons besoin d'aucun « réajustement » du nom de notre comté."
 flavor_gbr.21.t:0 "Proclamation d'un Saint-Empire mondial"
 flavor_gbr.21.desc:0 "[Root.GetUsableNameCap], dirigeant du Saint-Empire romain germanique ; conquérant du Nouveau Monde ; maître de l'Europe, de l'Afrique et de l'Asie. Non plus un modeste royaume mais un empire mondial d'une puissance au-delà de la compréhension de tout État pathétique prétendant pouvoir rivaliser avec [Root.GetUsableName], [Root.Monarch.GetTitle] [Root.Monarch.GetName] a fait [Root.Monarch.GetHerHis] proclamation réunissant les nombreux titres en une seule autorité unifiée : la Couronne du Saint-Empire de Britannia !\nÀ partir de ce jour, de cet instant, le monde sera sous le contrôle de l'Empire avec [Root.Monarch.GetEmpressEmperor] [Root.Monarch.GetName] pour seul souverain."
 flavor_gbr.21.a:0 "Gloire à Britannia !"
 flavor_gbr.22.t:0 "L'ère angevine"
 flavor_gbr.22.desc:0 "[Root.GetUsableNameCap] fut d'abord considéré par ses voisins comme dépassé, un caprice des rois anglais tentant de faire face à l'impasse de leur lutte séculaire avec les rois de France. Cependant, les efforts continus pour étendre la domination et l'autorité de ce nouvel Empire ont abouti à une large reconnaissance du grand succès du [Root.Monarch.GetTitle] [Root.GetAdjective]. C'est l'aube d'une nouvelle ère, car la société multiculturelle de ce domaine est naturellement poussée vers le progrès en raison du mélange de traditions très différentes qui s'y est produit."
 flavor_gbr.22.a:0 "Le monde appartient au [Root.GovernmentName] !"
 flavor_gbr.23.t:0 "La couronne ibérique"
 flavor_gbr.23.desc:0 "La connexion ibérique a commencé il y a des siècles, avec des mariages royaux entre rois et princesses tels qu'Alphonse VIII de Castille et Éléonore, fille d'Henri II et d'Aliénor d'Aquitaine, et Édouard Ier d'Angleterre et Éléonore de Castille, sœur d'Alphonse X de Castille, ou le cas plus récent de Jean de Gand, duc de Lancastre, fils d'Édouard III, qui épousa Constance de Castille, fille du roi déposé Pierre Ier, pour revendiquer le trône de Castille par ce mariage.\n\nCette connexion a été récemment restaurée et renforcée, car tous les royaumes d'Ibérie sont passés sous notre domination, et nous sommes désormais en position de déclarer l'Union d'Ibérie comme l'une des couronnes de notre Royaume-Uni."
 flavor_gbr.23.a:0 "L'Ibérie doit rester sous notre autorité directe."
 flavor_gbr.23.b:0 "L'Ibérie doit être gouvernée sous union personnelle."
 flavor_gbr.24.t:0 "La couronne italienne"
 flavor_gbr.24.desc:0 "L'Italie est une région convoitée par de nombreux souverains depuis des siècles, alors que les efforts de la dynastie des Hohenstaufen pour affirmer leur autorité sur les communes italiennes ont totalement échoué. Cela s'est avéré être une ambition difficile, car les cités-États et principautés indépendantes de la péninsule se retournent souvent férocement contre les envahisseurs étrangers qui osent interrompre leurs querelles intestines.\n\nCependant, nos efforts dans la région ont porté leurs fruits, car nous sommes désormais en position de déclarer l'Union d'Italie comme l'une des couronnes de notre Royaume-Uni."
 flavor_gbr.24.a:0 "L'Italie doit rester sous notre autorité directe."
 flavor_gbr.24.b:0 "L'Italie doit être gouvernée sous union personnelle."
 flavor_gbr.100.t:0 "Henri VIII"
 flavor_gbr.100.desc:0 "Étant le troisième enfant du précédent roi, le jeune Henri n'était pas destiné à hériter du trône. À ce titre, il reçut une éducation de premier ordre, ainsi que quelques titres mineurs dans le royaume dès son plus jeune âge pour assurer la stabilité interne et défavoriser le partage des titres avec d'autres familles établies. Véritable intellectuel, écrivant en anglais, français et latin, il devint l'image même de l'homme de la Renaissance. Passionné de musique également, il pouvait jouer de divers instruments et chanter.\n\nBien qu'il n'ait pas été formellement préparé à gouverner, son éducation accomplie et ses talents en relations étrangères et diplomatie, combinés à son énorme charisme, pourraient certainement faire de lui l'un des meilleurs souverains que l'Angleterre ait jamais connus."
 flavor_gbr.100.a:0 "Il ferait un excellent roi !"
 flavor_gbr.100.b:0 "Un individu très talentueux."
 flavor_gbr.101.t:0 "L'ère élisabéthaine"
 flavor_gbr.101.desc:0 "Initialement considérée comme héritière présomptive, elle fut plus tard déclarée illégitime et retirée de l'ordre de succession après l'exécution de sa mère alors qu'Élisabeth n'avait que deux ans. Ayant reçu la meilleure éducation qui soit, elle pouvait écrire en anglais, latin, italien, français et grec. La controverse dans la succession après la mort du demi-frère d'Élisabeth fut résolue lorsqu'elle et sa demi-sœur Marie entrèrent triomphalement ensemble à Londres. Cependant, leur entente ne dura pas, car Marie était une catholique fervente déterminée à éteindre la foi protestante dans laquelle Élisabeth avait été élevée, et elle passa même près d'un an en prison, soupçonnée de soutenir les rebelles protestants contre Marie.\n\nAyant reçu l'une des meilleures éducations, ainsi qu'un tempérament doux, elle peut sans aucun doute devenir l'un des meilleurs souverains que l'Angleterre ait jamais connus, inaugurant l'aube du plus grand âge d'or jamais vu."
 flavor_gbr.101.a:0 "Elle ferait une excellente souveraine !"
 flavor_gbr.101.b:0 "Elle n'est pas faite pour régner."
 flavor_gbr.102.t:0 "Position religieuse du [Root.Monarch.GetTitle]"
 flavor_gbr.102.desc:0 "À mesure que l'ère de la Réforme progresse, les affaires religieuses de [Root.GetUsableName] évoluent également. Avec l'accession du [Root.Monarch.GetTitle] [Root.Monarch.GetName] au trône [Root.GetAdjective], la position [Root.GetAdjective] envers [Root.Religion.GetName] est une fois de plus au cœur des préoccupations de la cour."
 flavor_gbr.102.a:0 "La Réforme doit être imposée"
 flavor_gbr.102.a.tt:0 "Chaque pays §Ycatholique§! connu perd §R-50§! points d'opinion envers §Y[Root.GetName]§!."
 flavor_gbr.102.a.at:0 "Chaque pays §Yprotestant§!, §Yréformé§!, §Yanglican§! et §Yhussite§! connu gagne §G50§! points d'opinion envers §Y[Root.GetName]§!."
 flavor_gbr.102.b:0 "[Root.GetUsableNameCap] ne doit pas s'éloigner du Pape"
 flavor_gbr.102.b.tt:0 "Chaque pays §Yprotestant§!, §Yréformé§!, §Yanglican§! et §Yhussite§! connu perd §R-50§! points d'opinion envers §Y[Root.GetName]§!."
 flavor_gbr.102.b.at:0 "Chaque pays §Ycatholique§! connu gagne §G50§! points d'opinion envers §Y[Root.GetName]§!."
 flavor_gbr.102.c:0 "Maintenir le statu quo"
 flavor_gbr.103.t:0 "Dissolution des monastères"
 flavor_gbr.103.desc:1 "Les monastères de [Root.GetUsableName] sont de puissantes entités de l'Église catholique. Non seulement ils sont les hérauts du Pape, mais aussi des lieux de richesse que l'État ne peut toucher.\nSur ordre de Sa Majesté, les fiers soldats de la Réforme ont investi l'un des monastères influents, détruit leurs statues blasphématoires et pillé leurs richesses."
 flavor_gbr.103.a:0 "Le [Root.GovernmentName] en tirera grand profit."
 flavor_gbr.104.t:0 "Suppression des privilèges du clergé"
 flavor_gbr.104.desc:0 "Avec les idées de la Réforme en tête, le [Root.Monarch.GetTitle] [Root.Monarch.GetName] cherche des moyens de révoquer les nombreux privilèges dont jouit le clergé. N'étant plus sujets du Pape mais du [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself], il n'est plus adéquat pour l'autorité royale d'avoir des sujets qui ne soient pas loyaux envers leur [Root.Monarch.GetTitle]."
 flavor_gbr.104.a:0 "Inclinez-vous devant votre [Root.Monarch.GetTitle] !"
 flavor_gbr.105.t:0 "Taxation de l'Église"
 flavor_gbr.105.desc:0 "Les nombreuses églises et monastères de [Root.GetUsableName] sont exemptés d'impôts en raison de leur lien avec le Saint-Siège. Avec les nouvelles idées de la Réforme et l'ambition de [Root.Monarch.GetName] de libérer [Root.GetUsableName] de l'emprise papale, l'Église n'est plus exclue des impôts [Root.GetAdjective]."
 flavor_gbr.105.a:0 "Cela augmentera considérablement nos revenus."
 flavor_gbr.106.t:0 "Restauration de la messe en latin"
 flavor_gbr.106.desc:0 "La Réforme a aboli la messe traditionnelle en latin. Au lieu de cela, les chrétiens hérétiques tiennent leurs prières dans leur langue maternelle, défiant ainsi la volonté de l'Église catholique. Par une persécution considérable et l'exécution par le feu des membres de la Réforme, cette pratique a été éradiquée par les soldats [Root.GetAdjective] sur ordre du [Root.Monarch.GetTitle] [Root.Monarch.GetName] et la messe est de nouveau célébrée en latin."
 flavor_gbr.106.a:0 "L'ordre a été rétabli."
 flavor_gbr.107.t:0 "Réconciliation avec Rome"
 flavor_gbr.107.desc:1 "La Réforme a porté un coup sévère à l'unité religieuse de [Root.GetUsableName]. Par les actions des Réformateurs, les relations entre [Root.GetUsableName] et le Pape sont restées négatives pendant un certain temps.\nGrâce aux efforts soutenus de Sa Majesté, les diplomates [Root.GetAdjective] parviennent à rétablir une connexion diplomatique avec l'État pontifical. Le [Root.GovernmentName] et Rome se réconcilient."
 flavor_gbr.107.a:0 "Que le Seigneur nous pardonne les péchés des hérétiques."
 flavor_gbr.108.t:0 "La Réforme se répand !"
 flavor_gbr.108.desc:0 "Malgré [Root.Monarch.GetHerHis] efforts, la Réforme se répand dans [Root.GetUsableName]. Il est clair que le peuple [Root.GetAdjective] n'est pas satisfait de la corruption de l'Église catholique et est prêt à suivre les paroles de n'importe quel théologien qui diabolise l'institution catholique."
 flavor_gbr.108.a:0 "Des temps instables nous attendent..."
 flavor_gbr.109.t:0 "Affaires religieuses en mains étrangères"
 flavor_gbr.109.desc:0 "La décision du [Root.Monarch.GetTitle] [Root.Monarch.GetName] de ne prendre parti ni pour les catholiques ni pour les protestants a mené à une impasse au sein de la cour. Les actions contre ou en faveur de la Réforme ne sont plus de nature royale, mais désormais entre les mains des conseillers du [Root.Monarch.GetTitle]."
 flavor_gbr.109.a:0 "Espérons qu'elles soient en mains compétentes."
 flavor_gbr.110.t:0 "Soulèvement hérétique à [revolt_province.GetName]"
 flavor_gbr.110.desc:0 "Malgré la clémence de Sa Majesté envers les affaires religieuses de [Root.Monarch.GetHerHis] peuple, les hérétiques de [revolt_province.GetName] s'organisent en une révolte active contre le [Root.GovernmentName]. Tolérance ou non, ils exigent la destruction de la foi [Root.Religion.GetName]."
 flavor_gbr.110.a:0 "Oh non."
 flavor_gbr.110.b:0 "Leur accorder l'autonomie religieuse."
 flavor_gbr.111.t:0 "L'accord religieux [Root.Monarch.GetName]ien"
 flavor_gbr.111.desc:0 "Sous la sage direction et le leadership du [Root.Monarch.GetTitle] [Root.Monarch.GetName], le conflit religieux entre catholiques et protestants dans [Root.GetUsableName] a finalement trouvé sa conclusion. Grâce à l'accord religieux [Root.Monarch.GetName]ien, les nombreux arrangements religieux et politiques, les disputes concernant la religion ont pris fin dans les grandes lignes. Bien que des escarmouches isolées et dispersées entre catholiques et protestants persistent, la stabilité du [Root.GovernmentName] est assurée."
 flavor_gbr.111.a:0 "Enfin, une fin au chaos."
 flavor_gbr.112.t:0 "Conflit entre le [Root.Monarch.GetTitle] et le [Root.GetParliamentOrFallbackName]"
 flavor_gbr.112.desc:0 "Les relations entre le [Root.Monarch.GetTitle] [Root.Monarch.GetName] et le [Root.GetParliamentOrFallbackName] ont toujours oscillé entre cordiales et tendues. Les différends entre les divers intérêts régionaux et l'autorité du [Root.Monarch.GetTitle] ont toujours été source de débats houleux, et les vues divergentes sur la religion ont également suscité leur lot de discussions. Récemment, ces désaccords ont pris une nouvelle tournure, lorsque certains membres du [Root.GetParliamentOrFallbackName] ont tenté de défendre leurs positions devant le [Root.Monarch.GetTitle] en s'exprimant avec trop de ferveur, d'une manière véritablement indigne de personnes d'un tel rang. Le [Root.Monarch.GetTitle] fut manifestement mécontent de la façon dont la question était présentée, et [Root.Monarch.GetSheHe] la rejeta immédiatement.\n\nCela a réglé la question pour l'instant, mais a accru l'ardeur de ses partisans et leur animosité envers le [Root.Monarch.GetTitle]. Non seulement cela, mais il semble également que le nombre de personnes disposées à prendre la question en considération a étonnamment augmenté, et de plus en plus de gens lui apportent leur soutien, ouvertement ou en coulisses. De plus, d'autres groupes utilisent également cette question comme justification de l'incapacité du [Root.Monarch.GetTitle] à traiter correctement les préoccupations régionales.\n\nIls soutiennent que si une simple question comme celle-ci n'a même pas été considérée, aucune de leurs propres questions et demandes ne sera entendue. À ce titre, ils préconisent que le [Root.Monarch.GetTitle] ne devrait pas interférer avec les décisions du [Root.GetParliamentOrFallbackName], tandis que le [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself] souhaite limiter l'ingérence du [Root.GetParliamentOrFallbackName] dans [Root.Monarch.GetHerHis] règne."
 flavor_gbr.112.a:0 "Une évolution dangereuse."
 flavor_gbr.112.a.tt:0 "La §YMonarchie§! et le §YParlement§! sont désormais engagés dans une lutte pour le pouvoir. Si l'un ou l'autre camp prend le contrôle total de l'État, la lutte se transformera en §YGuerre civile anglaise§! !"
 flavor_gbr.113.t:0 "Le conflit s'intensifie"
 flavor_gbr.113.desc:0 "Les tensions entre le [Root.GetParliamentOrFallbackName] et le [Root.Monarch.GetTitle] ont atteint un point de non-retour. Ce qui avait commencé comme un simple différend sur le soutien aux intérêts régionaux, la fiscalité et les dépenses militaires s'est transformé en un conflit sur le rôle même du [Root.GetParliamentOrFallbackName] au sein du gouvernement. D'un côté, on s'interroge sur la nécessité d'un [Root.GetParliamentOrFallbackName], de l'autre, sur celle d'un [Root.Monarch.GetTitle]. Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est las de devoir contenter un groupe de personnes qui ne cessent d'interférer dans [Root.Monarch.GetHerHis] droit légitime et indéniable de gouverner et qui saisissent chaque occasion de saper leur autorité. D'autre part, de puissants individus régionaux du [Root.GetParliamentOrFallbackName] ont proclamé qu'ils n'obéiraient plus à aucune autorité centrale et tyrannique, et ont levé des troupes dans leurs territoires pour défendre leur propre autorité par la force.\n\nDe grandes parties de notre pays se sont déclarées comme n'étant plus soumises à notre autorité et sont en rébellion ouverte contre nous."
 flavor_gbr.113.a:0 "Passons à des négociations plus agressives."
 flavor_gbr.113.a.tt:0 "§RLe désastre de la §YGuerre civile anglaise§! a désormais des conditions plus faciles pour se déclencher.§!"
 flavor_gbr.114.t:0 "Marie la Sanglante"
 flavor_gbr.114.desc:0 "En raison de la recherche d'un héritier mâle, elle fut défavorisée dans l'ordre de succession au profit de son demi-frère, étant envoyée au pays de Galles, ce qui détériora sa relation avec son père durant son adolescence. Pendant le règne de son demi-frère, étant elle-même une catholique fervente, il la défavorisa davantage dans la succession par crainte qu'elle n'annule les réformes protestantes qui avaient eu lieu pendant son règne. C'est en fait ce que Marie voulait faire, déterminée à écraser la foi protestante, et avec sa demi-sœur Élisabeth, elle chercha à rassembler suffisamment de soutien pour récupérer le titre de reine.\n\nMalgré les obstacles et l'opposition de la cour, elle pourrait devenir une grande souveraine, renversant les tendances protestantes que le royaume a adoptées récemment et le reconvertissant au catholicisme."
 flavor_gbr.114.a:0 "Le protestantisme sera purgé !"
 flavor_gbr.114.b:0 "Elle n'est pas faite pour régner."
 flavor_gbr.115.t:0 "Ordre de chevalerie"
 flavor_gbr.115.desc:0 "Plusieurs ordres militaires furent fondés durant les premières croisades. S'inspirant de cette idée, et associés aux concepts de chevalerie, de nombreux autres ordres ont été établis de manière courtoise. Ils incluent l'idée de confrérie et sont associés tant au mérite qu'au prestige, ainsi qu'aux médailles et distinctions appropriées. Certains d'entre eux sont également liés à une famille noble particulière, voire cautionnés par un patronage royal, qu'il soit étranger ou le nôtre.\n\nCertaines voix proclament que ce genre d'ordres appartient déjà au passé, tandis que d'autres affirment que la chevalerie, le mérite et les valeurs doivent toujours être loués et récompensés. Notre nation a toujours été en faveur des individus méritants, et les valeurs prônées par les ordres sont certainement quelque chose à défendre. À ce titre, notre pays bénéficiera grandement d'un ordre de chevalerie promu et cautionné par notre [Root.Monarch.GetTitle] pour perdurer pendant des générations, représentant les meilleures valeurs de notre nation et formé par les meilleurs individus qu'elle peut offrir."
 flavor_gbr.115.a:0 "L'aube d'un nouvel ordre."
 flavor_gbr.115.b:0 "De tels ordres devraient rester dans le passé."
 flavor_gbr.116.t:0 "Les joutes en Angleterre"
 flavor_gbr.116.desc:0 "Les joutes sont une tradition dans toute l'Europe depuis des siècles, permettant aux chevaliers d'afficher et d'affiner leurs capacités de combat. Ces dernières années, les joutes ont été améliorées et perfectionnées, avec des innovations telles que l'introduction de la barrière de joute. Son but est d'éviter les collisions et de maintenir les deux cavaliers à un angle optimal lors de la rupture de la lance. Les améliorations de la technologie des armures ont également conduit à une meilleure sécurité pour les combattants. Par conséquent, les joutes sont devenues davantage un divertissement et un spectacle qu'un véritable exercice martial. Cependant, cela signifie également que plus de personnes que jamais auparavant peuvent y participer."
 flavor_gbr.116.a:0 "Un sport merveilleux."
 flavor_gbr.117.t:0 "La Glorieuse Révolution"
 flavor_gbr.117.desc:0 "Bien que catholique, Jacques II devint roi d'Angleterre, d'Écosse et d'Irlande avec un large soutien, mais cela était considéré comme un arrangement temporaire, car son héritière présomptive était sa fille protestante Marie. Elle-même était mariée à Guillaume d'Orange, dirigeant de facto de la République néerlandaise, elle-même un pays protestant. La naissance d'un héritier mâle qui supplanta Marie ouvrit les portes à une dynastie catholique prospective, et la poursuite de plusieurs évêques protestants déclencha une large opposition anticatholique.\nCela sapa l'autorité de Jacques, et une coalition d'hommes d'État anglais lança une invitation à Guillaume pour intervenir militairement et protéger la religion protestante."
 flavor_gbr.117.a:0 "Guillaume, secourez-nous, vous êtes notre seul espoir."
 flavor_gbr.118.t:0 "Les Cinquième-Monarchistes"
 flavor_gbr.118.desc:0 "Les Cinquième-Monarchistes est le nom d'une secte protestante centrée sur la croyance que quatre monarchies précéderaient la cinquième et dernière, qui est l'établissement du Royaume de Dieu sur Terre. Ils affirment que les événements récents ont signalé la fin de la Quatrième Monarchie, et que le règne du [Root.Monarch.GetTitle] [Root.Monarch.GetName] empêche en réalité la venue de la Cinquième. Ils se considèrent comme « sauvés » et se nomment eux-mêmes « saints », agissant prétendument dans l'intention de préparer la population à la Seconde Venue. Bien qu'il ne s'agisse pas vraiment d'un mouvement majeur, leur portée suffisamment importante combinée au fait que certains de ses membres croient que l'action militaire est justifiée, en font un groupe impossible à ignorer.\n\nBien qu'extrêmes, il est indéniable que leurs croyances ont déjà suscité l'intérêt de certains membres très puissants et influents du gouvernement, ouvertement ou en secret. Il serait imprudent de simplement les ignorer, surtout s'il y a effectivement la possibilité que la Seconde Venue soit véritablement sur le point de se produire."
 flavor_gbr.118.a:0 "Nous suivrons les signes de Dieu."
 flavor_gbr.118.a.tt:0 "Les Cinquième-Monarchistes prennent le pouvoir de §Y[Root.GetUsableName]§!...\n§R§Y[Root.GetUsableName]§! obtiendra accès à un système de gouvernement puissant mais dangereux, qui force notre nation dans un état de conflit permanent. L'échec de conquérir un millier de provinces avant que la Fin ne soit venue mènera à notre chute !§!"
 flavor_gbr.118.b:0 "Nous ne devrions pas entretenir l'idée d'une telle folie."
 flavor_gbr.119.t:0 "Une nouvelle ère des Cinquième-Monarchistes"
 flavor_gbr.119.desc:0 "Les signes de Dieu sont clairs ! Les Quatre Royaumes ont enfin pris fin, et le Cinquième est sur nous. Réjouissez-vous, car le Seigneur reviendra bientôt du ciel et marchera une fois de plus parmi nous. Seuls ceux qui L'embrassent seront sauvés, tandis que tous ceux qui Le refusent périront. Nous sommes les saints, ceux qui méritent d'être sauvés. Nous convaincrons ceux qui nient encore le Seigneur de suivre notre sillage et de L'embrasser véritablement dans leur cœur.\n\nLe Royaume de Dieu sur Terre est sur nous, et nous serons ceux qui prépareront le chemin pour Lui."
 flavor_gbr.119.a:0 "Que Sa volonté soit faite !"
 flavor_gbr.119.b:0 "Mettez fin à cette folie immédiatement !"
 flavor_gbr.119.b.tt:0 "§YLes Cinquième-Monarchistes n'auront plus jamais l'occasion de renverser le gouvernement.§!"
 flavor_gbr.120.t:0 "La fin des Cinquième-Monarchistes"
 flavor_gbr.120.desc.a:0 "Les marées et les reflux du gouvernement sont en perpétuel mouvement, et ceux qui sont favorisés un temps sont tôt ou tard certains de perdre cette faveur et d'être écartés de leur position. Cela nous est arrivé aussi, et les Cinquième-Monarchistes ont vu leur faveur passée s'évanouir alors que les courants des masses ont changé de direction.\n\nUn chapitre dans l'histoire de notre pays s'est clos. L'histoire sera celle qui nous jugera, mais que ce soit pour le meilleur ou pour le pire, les Cinquième-Monarchistes ne sont plus ceux qui nous dirigent. Vive le nouveau [Root.Monarch.GetTitle] [Root.Monarch.GetName]."
 flavor_gbr.120.desc.b:0 "Nous avons tous suivi la marée irrésistible des Cinquième-Monarchistes, emportés par leur appel de la Seconde Venue. Ils préparaient le pays pour elle, pour le Royaume de Dieu sur Terre. Nous étions tous dans l'attente, guettant le jour où Jésus descendrait des cieux et où nous serions béatement réunis avec Lui.\n\nMais ce jour n'est pas venu.\n\nCe qui vint d'abord, ce furent les excuses. Des justifications dues à des erreurs de calcul. Puis les promesses. Des promesses que ce serait en fait le jour suivant, puis le jour suivant, puis le suivant. Les gens commencèrent à ne plus croire les paroles de ceux qui les avaient menés là. Ils commencèrent à ouvrir les yeux et à réaliser qu'ils n'étaient pas des « saints », qu'ils n'allaient pas être « sauvés ». Jésus ne descendait pas du ciel, du moins pas encore.\n\nCe qui commença comme de l'incrédulité se transforma rapidement en haine envers ceux qui les avaient égarés. Les masses prirent d'assaut les bâtiments gouvernementaux, traînant dehors les dirigeants qu'ils avaient suivis peu de temps auparavant. Ils furent traînés hors de leurs bureaux et vers les places publiques, puis condamnés, critiqués et accusés. Finalement, dans la plupart des cas, ils furent exécutés, les autres emprisonnés. Aucun ne put échapper à l'ire des masses vengeresses."
 flavor_gbr.120.a:0 "La roue a inévitablement tourné."
 flavor_gbr.121.t:0 "L'anglicanisme dans le Saint-Empire romain germanique"
 flavor_gbr.121.desc:0 "Le Saint-Empire romain germanique a connu sa part de divisions religieuses. Pendant de nombreuses années, le catholicisme et le protestantisme se sont disputé son contrôle. Il est temps d'y mettre fin. L'Empire ne sera plus ballotté par ces croyances hérétiques. Seul l'anglicanisme doit être la religion officielle du Saint-Empire romain germanique, car il est ordonné par Dieu Lui-même. Avec l'anglicanisme comme seule religion officielle de l'Empire, notre suprématie sur celui-ci est assurée."
 flavor_gbr.121.a:0 "Unis dans une seule foi."
 flavor_gbr.122.t:0 "[Root.GetUsableNameCap] à l'ère de la Réforme"
 flavor_gbr.122.desc:0 "La Réforme a éclaté en Europe et plonge l'Europe continentale dans le chaos religieux et l'anarchie. L'autorité du Pape est à son plus bas et de nombreux théologiens différents rivalisent dans leurs théorèmes concernant le mysticisme de la foi.\nNaturellement, la Réforme a également atteint [Root.GetUsableName], et les [Root.GetAdjective] se battent entre eux pour la suprématie religieuse tandis que la position de [Root.GetUsableName] dépend entièrement du bien-aimé [Root.Monarch.GetTitle]."
 flavor_gbr.122.a:0 "Des temps incertains nous attendent..."
 flavor_gbr.122.a.tt:0 "La religion de chaque nouveau §Y[Root.Monarch.GetTitle]§! et §YHéritier§! a désormais une chance de §Y50,0 %§! d'être d'une religion §Yhérétique§! tant que ce modificateur est actif.\nLes souverains peuvent adopter une §Yposition religieuse§! envers la Réforme qui affectera les événements futurs."
 flavor_gbr.199.t:0 "Pax Britannica"
 flavor_gbr.199.t.a:0 "Pax Angevina"
 flavor_gbr.199.t.b:0 "[Root.GetPaxBritannica]"
 flavor_gbr.199.desc.a:0 "Notre pays a atteint une taille, une prospérité et une stabilité jamais vues auparavant. Notre règne glorieux a apporté une richesse sans précédent à la population, et dans le monde entier, les gens respectent notre autorité. Le dicton selon lequel « le soleil ne se couche jamais sur l'Empire britannique » n'est pas une allégorie mais un fait indéniable.\n\nEn cette période de paix et de prospérité, les gens ont commencé à comparer notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] aux plus grands souverains du passé, et en particulier à César Auguste. L'établissement de l'Empire romain et la paix et la prospérité qu'il apporta sont mis en parallèle avec le règne de [Root.Monarch.GetName] et la prospérité que [Root.Monarch.GetSheHe] [Root.Monarch.GetHerselfHimself] nous a apportée.\n\nNous jouissons d'une véritable Pax Britannica."
 flavor_gbr.199.desc.b:0 "Notre pays a atteint une taille, une prospérité et une stabilité jamais vues auparavant. Notre règne glorieux a apporté une richesse sans précédent à la population, et dans toute l'Europe, les gens respectent notre autorité. L'union de l'Angleterre et de la France s'est avérée encore plus réussie que ce à quoi nous nous attendions.\n\nEn cette période de paix et de prospérité, les gens ont commencé à comparer notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] aux plus grands souverains du passé, et en particulier à César Auguste. L'établissement de l'Empire romain et la paix et la prospérité qu'il apporta sont mis en parallèle avec le règne de [Root.Monarch.GetName] et la prospérité que [Root.Monarch.GetSheHe] [Root.Monarch.GetHerselfHimself] nous a apportée.\n\nNous jouissons d'une véritable Pax Angevina."
 flavor_gbr.199.a:0 "Nous sommes l'empire le plus glorieux."
 flavor_gbr.200.t:0 "Entreprise coloniale"
 flavor_gbr.200.desc:0 "Nos récents investissements coloniaux portent clairement leurs fruits. Un message vient d'arriver de notre récente colonie à [Root.GetName], nous informant de leur succès dans l'établissement du village. Les colons étendent déjà leurs logements et leurs infrastructures là-bas, et les autorités locales hésitent sur la direction dans laquelle elles devraient orienter la colonie. À ce titre, elles demandent les conseils du [Root.Owner.Monarch.GetTitle] [Root.Owner.Monarch.GetName], pour la développer au mieux des intérêts de la nation."
 flavor_gbr.200.a:1 "[Root.GetTradeGoodsName] est suffisant."
