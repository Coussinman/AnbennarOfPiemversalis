 great_engineer_personality:0 "Grand Ingénieur"
 desc_great_engineer_personality:0 "Un visionnaire et un pionnier dans le domaine de la construction. Que ce soit pour sa propre gloire et ferveur ou pour l'amélioration de notre peuple, notre dirigeant est incroyablement doué dans la planification et l'exécution de la construction."
