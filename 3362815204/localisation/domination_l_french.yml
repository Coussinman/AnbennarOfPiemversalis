 #Events
 flavor_jap.62.t:0 "Essor de [4815.GetName]"
 flavor_jap.62.d:0 "La cité de [4815.GetName], signifiant Cité du Lion et appelée Temasek par le passé, s'est élevée comme une importante cité commerciale pour les différents royaumes et empires maritimes malais et javanais. Elle a même servi de capitale au royaume de Singapura, dont elle a plus tard pris le nom. Située à un point d'étranglement crucial du flux commercial entre la Chine et l'Inde, elle a vu des marchands et des produits de tous horizons aller et venir constamment.\n\nCelui qui la contrôle, et le commerce qui la traverse, sera celui qui contrôle le commerce entre l'Orient et l'Occident, bénéficiant grandement des deux côtés."
 flavor_jap.62.a:0 "L'argent fait tourner le monde."

 flavor_jap.63.t:0 "La période Edo"
 flavor_jap.63.d:0 "La période Edo, commençant historiquement en 1603 avec l'établissement du Shogunat Tokugawa, marque une période de grande stabilité, de prospérité et de croissance économique pour le Japon. Enfin libéré des luttes internes et des guerres civiles constantes, le Japon s'est concentré sur le développement non seulement de l'économie mais aussi des arts et des sciences. L'augmentation de la population a également entraîné une urbanisation accrue, ce qui a favorisé ces développements encore davantage.\n\nLa période a vu la création et la prolifération de nouvelles politiques financières, de nouvelles techniques de peinture comme l'ukiyo-e ou de nouvelles activités de divertissement comme les geishas ou le kabuki et même de nouveaux types de plats comme les sushis ou les tempuras. Ils ont tous prospéré pendant la période Edo et sont devenus un pilier de la culture japonaise reconnu comme tel dans le monde entier.\n\nAvec cette période sans précédent de stabilité, de développement et de croissance, notre pays sera certainement capable d'atteindre des sommets jamais imaginés auparavant."
 flavor_jap.63.a:0 "Les luttes du passé sont maintenant derrière nous."

 flavor_jap.64.t:0 "Le destin du Mandat"
 flavor_jap.64.d:0 "Notre pays a toujours vécu sous l'ombre de la Chine. Le grand Dragon s'est toujours considéré comme le centre du monde et le souverain légitime de tout son territoire par le Mandat du Ciel lui-même. Par le passé, nous avons été contraints d'accepter ces prétentions grotesques, mais le Tigre s'est éveillé, et il n'obéira plus au Dragon !\n\nS'il y a un pays qui peut prétendre être mandaté par le Ciel lui-même pour gouverner ces terres, ce ne peut être autre que notre Divine Nation. Nous pourrions prendre le trône de Chine pour nous-mêmes tel quel, avec toute sa bureaucratie associée, ou le laisser mourir sous le poids d'un règne clairement supérieur et véritablement divinement autorisé."
 flavor_jap.64.a:0 "Il est à moi et à moi seul !"
 flavor_jap.64.b:0 "Ces déclarations mesquines sont indignes de nous..."

 flavor_jap.65.t:0 "La maison du Soleil Levant"
 flavor_jap.65.d:0 "Depuis bien trop longtemps, notre divin Empereur a été éclipsé par la dictature militaire du Shogun. Depuis bien trop longtemps, Son Sang Divin a été relégué à languir dans l'ombre. Heureusement pour nous, contrairement à Son ancêtre la Déesse du Soleil Amaterasu lorsqu'Elle s'est recluse dans la grotte, privant le monde de lumière, Il ne s'est pas résigné à vivre emprisonné sans fruits dans le Palais Impérial. Au lieu de cela, Il a travaillé sans relâche, utilisant Ses influences pour s'assurer faveurs et soutien.\n\nAvec le temps, Il a réussi à obtenir suffisamment de soutien pour pouvoir forcer le Shogun à abolir le shogunat et à rétablir la Lignée Impériale comme le dirigeant effectif du Japon. Avec un Kami Vivant à nouveau à la tête du pays, notre nation jouira à nouveau d'une prospérité divine."
 flavor_jap.65.a:0 "Nous avons attendu bien trop longtemps !"

 flavor_jap.66.t:0 "Le Livre des cinq anneaux"
 flavor_jap.66.d:0 "Notre pays a donné naissance à de nombreux guerriers renommés, mais aucun n'a acquis une renommée aussi persistante que le légendaire Miyamoto Musashi. Appelé le meilleur duelliste de l'histoire du Japon, il a remporté son premier duel à l'âge de treize ans, et a commencé à voyager et à participer à des duels dans tout le pays, restant invaincu.\n\nSes expériences sont transmises à travers son « Livre des cinq anneaux », dans lequel il explique toutes ses techniques d'arts martiaux, sa mentalité et sa philosophie. Dans ses pages se trouve un savoir inestimable sur la voie pour devenir le guerrier parfait, et nos armées pourraient grandement bénéficier de sa lecture."
 flavor_jap.66.a:0 "Ces enseignements amélioreront notre §Yarmée de terre§!."
 flavor_jap.66.b:0 "Les écarter, se concentrer sur la §Mmer§! à la place !"

 flavor_jap.67.t:0 "Des épices et des herbes"
 flavor_jap.67.d:0 "Conseillers, érudits, poètes et même politiciens ont tous pris part au dernier grand débat qui secoue la nation. Contrairement aux sujets habituellement sombres de guerre ou de pauvreté qui affligent et occupent les bureaux de notre hiérarchie, dernièrement la question dans tous les esprits est : Épices ou Herbes ? Certainement les deux camps ont de solides arguments pour leur cause. Les épices ont définitivement cette saveur supplémentaire pour donner à notre nourriture et à nos boissons ce goût et ce piquant spéciaux, tandis que le thé et les autres herbes possèdent fidèlement leurs propriétés curatives et apaisantes qui accompagnent notre nation depuis des siècles."
 flavor_jap.67.a:0 "J'adore les épices..."
 flavor_jap.67.b:0 "... mais les herbes, c'est là que ça se passe !"

 flavor_jap.68.t:0 "La première geisha"
 flavor_jap.68.d:0 "Une geisha (ou geiko) est une personne des arts, essentiellement une artiste de spectacle féminine. Alors que l'argent affluait dans les trésors du Japon, une partie croissante était canalisée vers la culture et le divertissement. La forme de divertissement la plus courante dans les quartiers de plaisir, pratiquée par les hommes et les femmes, était la danse et le chant accompagnés d'instruments et de jeunes danseuses appelées odoriko. Quand ces filles ont grandi, elles ont adopté différents noms pour continuer à travailler, l'un de ces noms étant « geisha ».\n\nAvec le temps, les geishas sont devenues appréciées pour leur art du chant, des danses et du shamisen, et se sont spécialisées dans ces types de divertissement."
 flavor_jap.68.a:0 "Quel raffinement et quelle sophistication !"

 flavor_jap.69.t:0 "Poésie et chansons de la période Edo"
 flavor_jap.69.d:1 "La prospérité de la période Edo a permis un développement et une maturité égaux de la culture et du divertissement, et de nombreuses formes de théâtre et de musique sont apparues. Les différences entre la noble classe des samouraïs et les gens du commun ont donné naissance à des styles spécifiques de musique et de théâtre, qui se sont définis et différenciés d'autant plus que les classes étaient séparées. Un style spécifique de musique et de métrique a été créé pendant cette période, nommé kouta ou kinsei kouta-cho, et il était si influent qu'il persiste encore dans la musique folklorique à ce jour. C'était un style de musique pour le shamisen, un instrument semblable au banjo, conçu pour accompagner le chant d'un poème ou d'une histoire.\n\nLa poésie a également traversé sa propre période de développement, avec des styles traditionnels relancés et élargis, et de nouveaux créés. Il était très courant d'écrire de la poésie en collaboration avec d'autres personnes en alternant les strophes, et même les citoyens ordinaires ont commencé à y participer. La strophe d'ouverture de la chaîne a commencé à être perçue comme un poème en soi, ce qui avec le temps a donné naissance au haïku.\n\nVieil étang ;\nla grenouille plonge ;\nbruit de l'eau."
 flavor_jap.69.a:0 "Quelle démonstration de beauté et d'intellect."

 flavor_jap.70.t:0 "La voie du Chonindo"
 flavor_jap.70.d:1 "Les changements dans la société après les temps tumultueux du Sengoku Jidai sont tout à fait évidents. Les luttes constantes précédentes à travers tout le Japon se sont enfin apaisées, et maintenant nous jouissons d'une paix intérieure quelque peu stable qui permet une vie plus détendue pour le peuple. En conséquence, ils affluent vers les villes en croissance rapide, et ainsi notre population auparavant rurale donne naissance aux Chonin (citadins), et avec cela leur propre mode de vie appelé Chonindo. Leur aspiration vers la classe des samouraïs et leurs valeurs du bushido, ainsi qu'un vif intérêt pour le développement des arts et des sciences ont abouti à une nouvelle culture de masse distincte, axée sur une grande qualité d'artisanat. Poésie, représentations, théâtres de marionnettes, peintures et toutes autres formes d'art connaissent de grandes expansions."
 flavor_jap.70.a:0 "Quelle époque pour être en vie !"

 flavor_jap.71.t:0 "Grand incendie de Meireki"
 flavor_jap.71.d:0 "Déclenché par un prêtre qui aurait tenté de brûler un kimono maudit, le Grand incendie de Meireki a décimé [1028.GetName] et coûté la vie à plus de 100 000 personnes. En raison de la nature des bâtiments de [1028.GetName], qui sont faits de bois et de papier, le feu qui a commencé dans le quartier de Hongo s'est rapidement propagé dans toute la ville. Malheureusement, le fait que nous ayons choisi de construire nos bâtiments si proches les uns des autres a joué un rôle important dans la propagation rapide de la destruction enflammée."
 flavor_jap.71.a:0 "Quelle tragédie."

 flavor_jap.72.t:0 "Festivals Kanda Matsuri à [Root.Capital.GetName]"
 flavor_jap.72.d:1 "Après les temps tumultueux et les guerres constantes du Sengoku Jidai, de nombreux festivals (matsuri) ont été établis pour célébrer la paix une fois celle-ci atteinte. L'un des plus célèbres est celui célébré au Kanda Myojin à Edo, un sanctuaire populaire tant parmi les samouraïs que parmi les classes communes. Les nombreux chars, mikoshi et représentations qui accompagnent la procession ont vraiment transformé le matsuri en des célébrations largement acclamées, et le centre de la vie citadine quand ils ont lieu."
 flavor_jap.72.a:0 "Une célébration de nos plus fières victoires !"

 flavor_jap.73.t:0 "Onna-Musha de la période Edo"
 flavor_jap.73.d:0 "Servant à l'origine comme bushi féminines, les Onna-musha étaient des guerrières estimées aux premiers jours de notre Empire. Elles étaient membres de la classe des samouraïs dans le Japon féodal et étaient formées à l'utilisation des armes pour protéger leur foyer, leur famille et leur honneur en temps de guerre. Au fil du temps, elles se sont distinguées sur le champ de bataille comme de capables commandantes, remportant des victoires impressionnantes et cimentant leurs noms dans les livres d'histoire.\n\nCependant, en raison de l'influence du néo-confucianisme Edo, le statut des Onna-musha a commencé à diminuer significativement. La fonction des Onna-musha a changé en plus de celle de leurs maris. Les samouraïs n'étaient plus concernés par les batailles et la guerre, ils étaient des bureaucrates. Les femmes, spécifiquement les filles de la plupart des foyers de la classe supérieure, étaient bientôt des pions pour des rêves de succès et de pouvoir. Les idéaux rugissants de dévotion intrépide et d'abnégation ont été progressivement remplacés par une obéissance civile calme, passive. Malgré cela, beaucoup souhaitent encore servir les forces militaires de la nation comme commandantes et demandent humblement la permission de donner leur vie au service de la noble cause de notre pays. Un exemple notable des icônes des bushi féminines est Ohori Tsuruhime. Elle a courageusement été au combat plusieurs fois et sa revendication d'inspiration divine couplée à ses compétences de combat l'a conduite à être comparée à Jeanne d'Arc. Son héritage l'établira sûrement comme l'une des guerrières les plus reconnaissables de l'histoire japonaise."
 flavor_jap.73.a:0 "Permettre aux onna-musha de continuer à opérer."
 flavor_jap.73.b:0 "Leur ère est terminée, elles serviront de pions du pouvoir et de la bureaucratie du mandat !"

