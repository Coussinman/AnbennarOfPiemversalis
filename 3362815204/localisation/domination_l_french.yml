 desc_birth_of_a_new_city_mil:0 "Cette province connaît une période de prospérité alors que de nouveaux résidents s'installent pour commencer une nouvelle vie."
 inaccurate_road_maps:0 "Cartes routières inexactes"
 desc_inaccurate_road_maps:0 "Les cartes utilisées par nos troupes sont confuses et de peu d'utilité. Il faudra des années avant de pouvoir les remplacer."
 insufficient_construction_supplies:0 "Fournitures de construction insuffisantes"
 desc_insufficient_construction_supplies:0 "Notre main-d'œuvre manque de bois, de pierre et d'autres ressources nécessaires à la construction de nos bâtiments."
 slowed_down_development:0 "Développement interrompu"
 desc_slowed_down_development:0 "Le développement de la province souffre d'une mauvaise gestion administrative. Il faudra du temps avant que son infrastructure puisse s'étendre de manière significative."
 regional_boom:0 "Essor économique régional"
 desc_regional_boom:0 "Cette province connaît une période de prospérité, de richesse et d'opportunités. Le peuple se réjouit en construisant ses demeures et en agrandissant la cité."
 capital_boom:0 "Essor économique de la capitale"
 desc_capital_boom:0 "Cette province connaît une période de prospérité, de richesse et d'opportunités. Le peuple se réjouit en construisant ses demeures et en agrandissant la cité."
 abandoned_fields:0 "Champs abandonnés"
 desc_abandoned_fields:0 "Les champs de cette province sont abandonnés par la paysannerie. Que ce soit par la fuite ou par un désastre, la main-d'œuvre ne peut plus être trouvée."
 administrative_challenges:0 "Défis administratifs"
 desc_administrative_challenges:0 "Notre gouvernement fait face à de grands défis pour maintenir et administrer des métropoles de plus en plus autonomes. À ce titre, tout effort d'intégration de nouveaux territoires sera d'une plus grande difficulté."
 talented_architect:0 "Architecte talentueux"
 desc_talented_architect:0 "L'État est béni par le travail d'un visionnaire de l'architecture, dont la passion et les efforts apporteront grandeur à nos cités."
 ###CHURCH ASPECTS###
 anglican_aspect:0 "Aspect anglican"
 desc_anglican_aspect:1 "Contrairement à de nombreuses autres branches et directions du protestantisme, l'aspect anglican tente de combiner les idées de la Réforme avec les traditions du catholicisme.\n\nNous gagnerons également §G+1§! de tolérance envers les hérétiques pendant §Y10§! ans"
 anglican_aspect_aspect_modifier:0 "Zèle de l'aspect ecclésiastique"
 desc_anglican_aspect_aspect_modifier:0 "L'introduction d'un nouvel aspect de notre foi a inspiré notre peuple à vivre selon ce nouveau codex."
 spread_the_book_of_common_prayer:1 "§YRépandre le Livre de la prière commune§!"
 desc_spread_the_book_of_common_prayer:0 "Les livres de prières ont traditionnellement été écrits en latin afin que le commun des mortels doive croire le prédicateur aveuglément. Avec la diffusion du Livre de la prière commune, les masses de notre pays peuvent enfin être indépendantes du clergé."
 ###KOREAN EVENTS###
 flavor_kor.15.t:0 "Fin de l'armée vertueuse"
 flavor_kor.15.d:0 "L'armée vertueuse est un contingent de paysans [Root.GetAdjective] qui se soulèvent pour défendre leur patrie contre les envahisseurs. En temps de paix, cependant, l'armée se dissout et les paysans retournent à leurs champs."
 flavor_kor.15.a:0 "Bien"
 flavor_kor.16.t:0 "Le Tripitaka Koreana"
 flavor_kor.16.d:1 "Le Tripitaka Koreana est une collection du Tripitaka, les écritures bouddhiques sacrées qui constituent collectivement le canon bouddhique. Ces écritures ont été gravées sur des blocs d'impression en bois et sont la fierté des érudits et artisans coréens. Bien qu'autrefois détruit par le feu des Mongols en furie en 1232, le Tripitaka Koreana a été restauré en 1249.\nMaintenant, il est entre les mains de [Root.GetUsableName]. Son destin dépend désormais de nous."
 flavor_kor.16.a:1 "L'apporter à [Root.Capital.GetName]."
 flavor_kor.16.b:0 "Le brûler."
 flavor_kor.16.c:0 "Épargner le Tripitaka."
 tripitaka_koreana:0 "Tripitaka Koreana"
 desc_tripitaka_koreana:0 "Une collection du Tripitaka. Ces blocs d'impression en bois contiennent les écritures bouddhiques sacrées et sont la fierté de l'érudition et de l'artisanat coréens."
 tripitaka_koreana_tt:1 "Le §YTripitaka Koreana§! sera retiré de §Y[tripitaka_koreana_province.GetName]§!."
 flavor_kor.17.t:0 "Vol du Tripitaka Koreana"
 flavor_kor.17.d:0 "Le désastre frappe alors que les portes de [tripitaka_koreana_province.GetName] tombent, laissant la voie libre vers le Tripitaka Koreana. Les soldats ennemis s'emparent de la collection sacrée du Tripitaka pour leur blasphématoire [From.Monarch.GetName] et se préparent à la transporter vers [From.Capital.GetName]."
 flavor_kor.17.a:0 "C'est une grande humiliation."
 ###KOREAN DECISIONS###
 reinforce_tripitaka_koreana_decision_title:0 "Renforcer le Tripitaka Koreana"
 reinforce_tripitaka_koreana_decision_desc:0 "Les ennemis de [Root.GetUsableName] ont les yeux rivés sur le précieux Tripitaka Koreana. Nous ne pouvons pas leur permettre de mettre la main sur ces écritures. Ses défenses doivent être renforcées immédiatement !"
 tripitaka_koreana_defenses:0 "Défenses du Tripitaka Koreana"
 tripitaka_koreana_defenses_tt:0 "jusqu'à ce qu'un ennemi du groupe religieux §Yoriental§! capture la province"
 evacuate_tripitaka_koreana_decision_title:0 "Évacuer le Tripitaka Koreana"
 evacuate_tripitaka_koreana_decision_desc:0 "Notre pays est attaqué ! Le Tripitaka Koreana risque de tomber entre des mains hostiles ! Nous devons l'évacuer vers [Root.Capital.GetName] immédiatement !"
 evacuate_tripitaka_koreana_decision_tt:0 "Le §YTripitaka Koreana§! est déplacé vers §Y[Root.Capital.GetName]§!."
 ###GENERIC GOVERNMENT EVENTS###
 government_events.2.desc:1 "[Root.Monarch.GetHerHisCap] Majesté le [Root.Monarch.GetTitle] [Root.Monarch.GetName] jouit d'une réputation de grand [Root.Monarch.GetWomanMan] et est incontesté en tant que souverain.\nComme il sied à un dirigeant de [Root.Monarch.GetHerHis] calibre et stature, le [Root.Monarch.GetTitle] a plusieurs enfants capables et beaucoup montrent de grandes promesses en tant que futurs souverains. Nos conseillers insistent sur le fait qu'il est grand temps que [Root.Monarch.GetName] désigne un favori parmi les successeurs possibles."
 government_events.3.t:0 "Élection d'un nouveau souverain"
 government_events.3.desc:0 "Avec la mort de notre précédent monarque, le cercle des conseillers du [Root.GovernmentName] s'est réuni afin d'élire le prochain dirigeant de [Root.GetUsableName]."
 government_events.3.a:0 "Élire [Root.Monarch.GetName]."
 government_events.3.aa:0 "Élire [Root.Heir.GetName]."
 government_events.3.b:0 "Choisir quelqu'un de la Maison de [selected_biggest_country.Monarch.Dynasty.GetName]."
 government_events.3.c:0 "Couronner quelqu'un de notre noblesse."
 government_events.3.d:0 "Notre général ferait un excellent souverain."
 government_events.3.e:0 "Seul un amiral peut diriger le [Root.GovernmentName]."
 government_events.3.f:0 "Choisir un marchand influent."
 government_events.3.g:0 "Quelqu'un des [Root.Monarch.Dynasty.GetName] prendra la relève."
 ###DECADENCE EVENTS###
 decadence.1.t:0 "Surextension catastrophique"
 decadence.1.desc:0 "[Root.GetUsableNameCap] fait face à l'un de ses plus grands défis administratifs. De nombreux territoires nouvellement conquis exigent l'attention de toute la bureaucratie [Root.GetAdjective]. À cause de cela, l'administration de nos provinces est au mieux pathétique et la corruption locale est devenue monnaie courante."
 decadence.1.a:0 "Notre État peut gérer cela."
 decadence.1.b:0 "Nous devons étendre notre administration !"
 decadence.2.t:0 "L'épuisement de la guerre"
 decadence.2.desc:0 "La guerre ravage notre pays. Paysans, bourgeois, marchands : toute la classe inférieure doit porter le fardeau de la mort sur ses épaules. Pourtant, à la cour [Root.GetAdjective], l'élite de [Root.GetUsableName] n'a que des oreilles sourdes à la souffrance du peuple."
 decadence.2.a:0 "Quelle guerre ? Il n'y a pas de guerre à [Root.Capital.GetName]."
 decadence.2.b:0 "Nous devrions alléger le fardeau de la guerre sur notre peuple."
 decadence.3.t:0 "Administration débordée"
 decadence.3.desc:0 "Les [Root.GetAdjective] peinent à maintenir l'organisation du [Root.GovernmentName]. La taxation et le maintien de l'ordre dans les provinces frontalières sont presque impossibles ; les troubles et l'anarchie sont un problème endémique au sein de [Root.GetUsableName] tandis que le [Root.Monarch.GetTitle] reste assis sur [Root.Monarch.GetHerHis] trône sans s'en soucier."
 decadence.3.a:0 "Ce sont des problèmes pour les plébéiens, pas pour la cour."
 decadence.3.b:0 "Ces problèmes doivent être traités rapidement."
 decadence.4.t:0 "Le grand désastre"
 decadence.4.desc:0 "Le [Root.GovernmentName] est dans un chaos total ! L'autorité du [Root.Monarch.GetTitle] est compromise alors que la nation jadis fière de [Root.GetUsableName] est perdue dans le désordre du [Root.GetActiveDisaster]."
 disaster:0 "Désastre"
 decadence.4.a:0 "Les problèmes du [Root.GetActiveDisaster] se résoudront d'eux-mêmes."
 decadence.5.t:1 "Les [Root.GetEstate80i30l] contrôlent l'État"
 decadence.5.desc:0 "L'un des états a gagné en puissance et contrôle maintenant pratiquement le gouvernement. Alors que d'autres dirigeants voient cela comme une tragédie, [Root.Monarch.GetName] y voit une opportunité de se relâcher et de laisser les autres gouverner l'État à [Root.Monarch.GetHerHis] place."
 decadence.5.a:0 "Tant qu'ils gèrent le [Root.GovernmentName] correctement..."
 decadence.5.b:0 "Les évincer du pouvoir !"
 estate:0 "État"
 decadence.6.t:0 "Corruption de l'État"
 decadence.6.desc:0 "Les affaires du [Root.GovernmentName] sont devenues de moins en moins pertinentes pour la cour royale de [Root.Capital.GetName]. Le trésor sert à enrichir l'élite fortunée. Les lois sont contournées par des pots-de-vin et la corruption étatique."
 decadence.6.a:0 "Des pots-de-vin ? Où est la part royale ?"
 decadence.6.b:0 "Cela ne peut pas continuer !"
 decadence.7.t:0 "Chaos religieux"
 decadence.7.desc:0 "Des tensions religieuses se sont développées au sein de [Root.GetUsableName]. Hérétiques, païens et autres pratiquants de rituels étranges menacent la paix de notre [Root.GovernmentName] tandis que la cour observe..."
 decadence.7.a:0 "Laissons-les. Ils ne représentent un danger pour personne."
 decadence.7.b:0 "Mettre fin à cette menace païenne. Par la force si nécessaire."
 decadence.8.t:0 "Chute en disgrâce"
 decadence.8.desc:0 "[Root.GetUsableNameCap], jadis le phare brillant de ce monde et une grande puissance révérée. Maintenant rien de plus qu'une risée pour les nouvelles puissances montantes. La cour [Root.GetAdjective] est pleinement consciente de la situation désastreuse de la position internationale de [Root.GetUsableName], pourtant des actions pour améliorer notre réputation restent à prendre..."
 decadence.8.a:0 "Qui se soucie des opinions des imbéciles de toute façon ?"
 decadence.8.b:0 "Réformer notre cour !"
 decadence.9.t:0 "Question d'autorité"
 decadence.9.desc:0 "Le règne de [Root.Monarch.GetName] a été au mieux instable depuis [Root.Monarch.GetHerHis] accession au titre de [Root.Monarch.GetTitle] du [Root.GovernmentName] et la cour semble faire peu pour améliorer l'image du [Root.Monarch.GetTitle] plutôt impopulaire."
 decadence.9.a:0 "La réputation n'est pas tout."
 decadence.9.b:0 "Nous devrions organiser un défilé en l'honneur du [Root.Monarch.GetTitle]."
 decadence.10.t:0 "Économie instable"
 decadence.10.desc:0 "La cour de [Root.GetUsableName] est une dépense substantielle et prend une grande partie du contenu du trésor. À ce titre, il ne reste pas grand-chose pour l'économie [Root.GetAdjective], qui connaît une détérioration depuis des années maintenant..."
 decadence.10.a:0 "Frappons simplement plus de ducats."
 decadence.10.b:0 "Nous devons réformer notre économie."
 #Japan#
 jap_balance_shinokosho_title:0 "Équilibrer le Shinokosho"
 jap_balance_shinokosho_desc:0 "La société japonaise a traditionnellement été organisée autour de l'existence de quatre groupes de personnes : guerriers, agriculteurs, artisans et marchands. Maintenir cette structure de manière équilibrée apportera une grande stabilité à notre nation."
 jap_expand_gokaido_title:0 "Étendre le Gokaido"
 jap_expand_gokaido_desc:0 "Bien que nos adversaires intérieurs aient été soumis, il est important que nous gardions ces seigneurs sous contrôle. Construire un nouveau système de routes et de relais aiderait à rendre les domaines des daimyos plus accessibles depuis la capitale et stimulerait le commerce local le long de ces itinéraires."
 jap_nanban_trade_title:0 "Commerce Nanban"
 jap_nanban_trade_desc:0 "L'arrivée des Occidentaux sur nos rivages a clairement montré l'importance du commerce. Augmenter nos capacités commerciales nous apportera certainement de grands profits."
 jap_conquer_south_china_title:0 "Conquérir le sud de la Chine"
 jap_conquer_south_china_desc:0 "Les parties méridionales de la Chine ont toujours été une source de grandes richesses. Les faire nôtres nous permettra d'étendre encore notre portée."
 jap_maraka_kaikyou_title:0 "Maraka Kaikyou"
 jap_maraka_kaikyou_desc:0 "Le détroit de Malacca est un point vital par lequel le commerce transite. Nous devons le tenir dans notre emprise afin d'être ceux qui contrôlent son flux."
 jap_edo_jidai_title:0 "Edo Jidai"
 jap_edo_jidai_desc:0 "Nous devons nous assurer que tout le pays est dans notre emprise, afin qu'il puisse jouir d'une longue période de paix, de prospérité et de stabilité sous notre grande direction."
 jap_five_regent_houses_title:0 "Les cinq maisons de régence"
 jap_five_regent_houses_desc:0 "La position de régent a traditionnellement été monopolisée par les cinq maisons du clan Fujiwara. Nous devrions les rallier à notre cause et les utiliser à notre avantage, ou les éliminer définitivement."
 jap_port_dejima_title:0 "Port de Dejima"
 jap_port_dejima_desc:0 "Une idée a été soumise à la cour concernant les Occidentaux : leur construire un port sur une île artificielle au large de Nagasaki afin qu'ils puissent y commercer librement. Ce ne sera pas une tâche triviale, mais cela nous permettrait certainement un plus grand afflux de commerce tout en gardant un grand contrôle sur celui-ci."
 jap_fate_mandate_title:0 "Mandat pour les gouverner tous"
 jap_fate_mandate_desc:0 "Le grand Dragon de Chine a toujours été une menace planant sur notre nuque. Il est temps que le Tigre du Japon remette enfin ce lézard à sa place."
 jap_imjin_war_title:0 "Guerre Imjin"
 jap_imjin_war_desc:0 "La Corée a longtemps été un couteau pointé sur la gorge du Japon. Il est temps pour nous de traverser enfin la mer et d'établir une présence forte et sécurisée dans la péninsule."
 jap_hegemon_of_asia_title:0 "Hégémon de l'Asie"
 jap_hegemon_of_asia_desc:0 "Nous avons déjà porté un grand coup à la Chine, et il est clair que nous les avons supplantés comme le grand poisson de la région. Nous devons affirmer totalement notre domination afin que tout le monde sache qui est le véritable hégémon de toute l'Asie."
 jap_issue_new_coin_title:0 "Émettre un nouveau Erizeni-Rei"
 jap_issue_new_coin_desc:0 "Des finances saines sont le socle d'un gouvernement stable. Pour assurer le maintien de l'ordre et la continuité du commerce, nous devons encourager un flux régulier de bonnes pièces dans le royaume."
 jap_permit_ryogaesho_title:0 "Autoriser les Ryogaesho"
 jap_permit_ryogaesho_desc:0 "De nombreux daimyos ont souffert de finances erratiques, poussant certains à faire défaut sur les prêts contractés. Permettre à de petits bureaux de change d'offrir des prêts plus fiables, et de garantir ces prêts avec nos propres réserves, devrait aider à stabiliser les finances des daimyos et peut-être favoriser une économie intérieure plus saine."
 jap_survey_secret_fields_title:0 "Recenser les champs secrets"
 jap_survey_secret_fields_desc:0 "Il est embarrassamment courant dans les provinces que les agriculteurs maintiennent des « champs secrets », des terres agricoles cachées aux yeux des collecteurs d'impôts. Un inventaire approfondi de ces propriétés non déclarées devrait considérablement aider à renforcer la santé de notre économie et de nos coffres."
 jap_encourage_fudasashi_title:0 "Encourager les Fudasashi"
 jap_encourage_fudasashi_desc:0 "Le riz a toujours été la base de notre système économique. Ces dernières années, certains groupes de nos marchands ont commencé à établir des entrepôts pour stocker le riz des daimyos en échange d'une redevance. Ils utilisent des reçus et ont également commencé à accorder des prêts. C'est un système qui montre un grand potentiel de bénéfices, nous devrions l'encourager et être ceux qui en récoltent les fruits."
 jap_discover_new_world_title:0 "Découvrir le Nouveau Monde"
 jap_discover_new_world_desc:0 "Nous sommes le Pays du Soleil Levant, mais des rumeurs circulent sur d'autres terres plus loin dans toutes les directions, même à l'Est. Nous devons partir pour voir si ces rumeurs sont vraies."
 jap_conquer_north_china_title:0 "Mettre fin au faux empereur"
 jap_conquer_north_china_desc:0 "Le nord de la Chine est le siège et l'origine de l'Empire chinois. Ses empereurs ont eu par le passé le culot de se considérer comme nos supérieurs. Il est grand temps de mettre fin à leur farce d'Empire et d'occuper leur cœur ancestral."
 jap_new_buddha_title:0 "Un nouveau Bouddha ?"
 jap_new_buddha_desc:0 "D'étranges Occidentaux sont récemment venus sur nos rivages parlant de ce qui semblait d'abord être un autre type de Bouddha. C'était en fait un ensemble de croyances complètement différent sans aucun rapport avec le bouddhisme, et cela a causé beaucoup d'agitation dans notre pays. Nous devons mettre fin à ces conflits religieux afin d'être tous unis dans nos croyances."
 jap_shinto_or_christian_title:0 "Mission dynamique"
 jap_shinto_or_christian_desc:0 "Le contenu de cette mission variera selon que nous nous convertissons au catholicisme ou restons shintoïstes."
 jap_restoration_title:0 "L'équilibre du pouvoir"
 jap_restoration_desc:0 "Depuis la fin de la guerre de Genpei en 1185, le pouvoir dans ce pays a été entre les mains des samouraïs. L'unification du pays sous notre main a établi un shogunat très prospère, mais Sa Majesté l'Empereur réside toujours dans son palais. D'autres empereurs ont tenté par le passé de se remettre à la tête du gouvernement, et l'un a même réussi pendant un temps, c'est donc une menace potentielle constante pour notre autorité que nous devons garder à l'esprit. D'un autre côté, peut-être que remettre l'Empereur aux commandes n'est pas une si mauvaise idée après tout."
 jap_spread_the_christian_faith_title:0 "Répandre la foi chrétienne"
 jap_spread_the_christian_faith_desc:0 "Les Pères occidentaux nous ont convaincus de l'erreur de nos voies et nous ont amenés à la lumière de Jésus. C'est maintenant notre tour d'apporter Sa lumière à tous les coins de l'Asie."
 jap_bugeijuuhappan_title:0 "Bugeijuuhappan"
 jap_bugeijuuhappan_desc:0 "Le Bugeijuuhappan, les dix-huit arts martiaux que tout samouraï doit maîtriser, ont toujours été la fierté et la tradition de nos troupes. Cependant, après la guerre civile constante et l'entrée dans une période de paix intérieure, certaines des jeunes générations de samouraïs commencent à se relâcher dans leur entraînement. Nous devons maintenir et promouvoir encore plus l'entraînement dans les dix-huit arts martiaux afin que tous nos samouraïs soient le pinacle du Bushido."
 jap_bugeijuuhappan_or_naval_academy_of_japan_title:0 "Mission dynamique"
 jap_bugeijuuhappan_or_naval_academy_of_japan_desc:0 "Le contenu de cette mission variera selon que nous décidions d'améliorer l'armée ou la marine."
 jap_naval_academy_of_japan_title:1 "Une nouvelle académie navale"
 jap_naval_academy_of_japan_desc:0 "Malgré le fait d'être une nation insulaire, notre pays a toujours été assez dédaigneux de toute importance navale substantielle. Si nous voulons vraiment nous étendre au-delà de nos frontières naturelles, nous devons plutôt investir dans une marine puissante et efficace."
 jap_strengthen_bakuhan_system_title:0 "Renforcer le Bakuhan"
 jap_strengthen_bakuhan_system_desc:0 "Le Bakuhan, le système qui divise les terres entre celles appartenant au Shogunat et celles appartenant aux seigneurs locaux, est en vigueur depuis que nous avons unifié le pays. Nous devons utiliser toutes ses capacités à notre plus grand avantage."
 jap_deploy_atakebune_title:0 "Déployer les Atakebune"
 jap_deploy_atakebune_desc:0 "Nos navires ont toujours été plutôt petits et quelconques. Il est temps de construire de véritables navires de guerre, de vraies forteresses flottantes assez grandes pour transporter des armées, et nous pourrions même les couvrir de plaques de fer pour les rendre véritablement invulnérables."
 jap_surpass_the_west_title:0 "Surpasser l'Occident"
 jap_surpass_the_west_desc:1 "Nous avons déjà une marine digne de ce nom, mais nous devons véritablement surpasser les nations occidentales dans toutes les affaires navales. Sinon, nous pourrions nous retrouver avec de gros canonnières aux portes de la baie d'Edo."
 jap_bushido_code_title:0 "Bushido"
 jap_bushido_code_desc:0 "Les voies de nos guerriers sont guidées en tout temps par une philosophie solide de vertu et de conduite appropriée."
 jap_train_samurai_title:0 "Former les samouraïs"
 jap_train_samurai_desc:0 "Les samouraïs sont le sang et la vie de nos forces. Nous devons les former davantage afin qu'aucun autre pays n'ait une chance de s'opposer à nous."
 jap_proliferation_firearms_title:0 "Prolifération des armes à feu"
 jap_proliferation_firearms_desc:0 "Les armes à feu sont devenues omniprésentes dans notre pays, et leur utilité est indéniable. Nous devons étendre leur fabrication si nous ne voulons pas prendre du retard sur nos ennemis."
 jap_tanegashima_teppo_title:0 "Tanegashima Teppo"
 jap_tanegashima_teppo_desc:0 "Le nouveau type d'arquebuse à mèche fabriquée en copiant celles récupérées sur l'île de Tanegashima s'est avéré être une grande amélioration pour toutes nos armées. Nous devons étendre encore leur production, afin d'avoir plus de fusils que tout autre pays."
 jap_miyadaiku_method_title:0 "Méthode Miyadaiku"
 jap_miyadaiku_method_desc:0 "Les techniques traditionnelles de menuiserie japonaise sont la fierté de nos artisans. Construire les bâtiments les plus impressionnants uniquement avec des joints en bois et sans l'utilisation d'un seul clou étonne tout étranger qui pose les yeux sur eux, mais ce sont précisément ces techniques transmises de génération en génération qui ont permis à ces mêmes bâtiments de tenir debout pendant des siècles. Si nous promouvons ces artisans, notre pays tiendra debout pendant encore des siècles."
 jap_financial_cliques_title:0 "Cliques financières"
 jap_financial_cliques_desc:0 "L'essentiel de la production du pays est fait et contrôlé par les familles de marchands les plus puissantes et influentes. Nous devons resserrer nos liens avec elles, en finançant l'expansion et le développement de la production, afin de récolter encore plus de bénéfices."
 jap_japanese_economic_miracle_title:0 "Miracle économique"
 jap_japanese_economic_miracle_desc:0 "Après les guerres constantes et les luttes intestines que notre nation a subies, nous avons réussi à nous rétablir. Mais nous devons maintenant améliorer notre économie au point qu'elle soit l'envie de toutes les autres nations du monde."

