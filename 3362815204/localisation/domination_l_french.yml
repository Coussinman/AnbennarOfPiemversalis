 #Privileges
 fu_estate_burghers_control_over_monetary_policy_desc:0 "En donnant aux [Root.GetBurghersName] le dernier mot sur la politique monétaire, l'État garantit que les intérêts commerciaux seront pris en compte lors des décisions économiques clés."
 fu_estate_burghers_control_over_monetary_policy:0 "Contrôle de la Politique Monétaire"

 #Ideas
 lessons_hundred_years_war:0 "Leçons de la Guerre de Cent Ans"
 lessons_hundred_years_war_desc:0 "La guerre constante contre la couronne anglaise a imprégné notre personnel militaire d'une expérience remarquable en matière de guerre. Nous pouvons utiliser cette connaissance pour étendre davantage notre influence et notre domaine."
 # haguenot_rebellions:0 "Rébellions Huguenotes"
 # haguenot_rebellions_desc:0 "Les rébellions durant les §YGuerres de Religion Françaises§! ont laissé de profondes cicatrices au sein de notre nation. Nous nous efforcerons d'empêcher ce désastre de se reproduire par tous les moyens nécessaires !"
 europes_first_standing_army:0 "Première Armée Permanente d'Europe"
 europes_first_standing_army_desc:0 "La force d'un dirigeant ne va que jusqu'où sa capacité militaire le permet. Forgée dans les feux d'une guerre constante et bénie par les épreuves rencontrées sur les champs de bataille d'Europe, notre armée est devenue une force disciplinée à prendre au sérieux."
 divine_right_to_rule:0 "Droit Divin"
 divine_right_to_rule_desc:0 "Nos chefs d'État ont un mandat qui surpasse toute autre autorité interne en matière d'administration et de guerre. Aucun autre individu au sein de notre domaine n'a la capacité d'influencer le droit divin de notre monarque."

 #Revolutionary Ideas
 FRA_ideas_2:0 "Idées Françaises Révolutionnaires"
 FRA_ideas_2_start:0 "Traditions Françaises Révolutionnaires"
 FRA_ideas_2_bonus:0 "Ambitions Françaises Révolutionnaires"

 revolutionary_tribunal:1 "Égalité devant la Loi"
 revolutionary_tribunal_desc:1 "L'Europe est la proie de tyrans sanguinaires qui maintiennent leurs sujets sous le joug des privilèges. Mais face au principe d'égalité devant la loi, permettant à chaque homme d'être reconnu comme l'égal de tout autre, ils accueilleront facilement cette grande Révolution qui garantira leur liberté et leurs droits."
 mandats_territoriaux:1 "Franc Germinal"
 mandats_territoriaux_desc:0 "Dans un effort pour que notre grande nation fasse face à l'instabilité financière, nous introduirons de nouveaux billets de banque en papier dans un effort pour combattre l'hyperinflation et restabiliser notre économie."
 jourdan_law:0 "Loi Jourdan"
 jourdan_law_desc:0 "Une tentative législative militaire réussie, la loi Jourdan oblige tous les hommes entre 20 et 25 ans sans épouse ni descendance à être astreints au service militaire. Les pauvres et les démunis de nos frontières seront une grande source de main-d'œuvre pour poursuivre nos ambitions révolutionnaires à travers le vieux continent."
 napoleonic_tactics:0 "Tactiques Napoléoniennes"
 napoleonic_tactics_desc:0 "Une série d'exercices d'entraînement intensifs ainsi que des tactiques militaires renouvelées sur le champ de bataille définissent notre époque. En utilisant de nouvelles manœuvres rapides sur le champ de bataille en conjonction avec la cavalerie et l'artillerie, notre puissance dominera nos ennemis."
 european_ambitions:0 "Ambitions Européennes"
 european_ambitions_desc:0 "Le vieux continent repose entre nos mains. Les monarchies et nos ennemis autour de nous ne sont que des obstacles mineurs dans notre rêve d'unir le continent sous la direction avisée des idéaux révolutionnaires."

 #China-related Localisation

 mng_tumu_crisis_title:0 "Crise de Tumu"
 mng_tumu_crisis_desc:0 "Les forces rassemblées sur notre frontière nord-ouest appellent à la chute de notre grand empire. Nous ne devons pas céder à leur pression sous peine de risquer l'éradication de notre grande dynastie. Les seigneurs d'Oïrat doivent comprendre pourquoi ils devraient nous craindre !"
 mng_restore_royal_road_title:0 "Restaurer la Route Royale"
 mng_restore_royal_road_desc:0 "Pendant des siècles, les marchands du lointain Occident ont apporté et commercé divers biens exotiques. La soie que nous exportions, le tissu sur lequel nous avons bâti un statut légendaire pour notre empire, sera une fois de plus librement échangée entre nous et nos alliés, que la soie coule !"
 mng_cornerstone_empire_title:0 "Pierre Angulaire d'un Empire"
 mng_cornerstone_empire_desc:0 "Une nation dont les frontières englobent de si vastes étendues de terre ne peut que dépendre de quelques figures puissantes au sein de notre cour. Ainsi, pour assurer une stabilité adéquate et une intégrité opérationnelle, nous devons discerner la meilleure voie à suivre et distribuer le pouvoir en conséquence."
 mng_censorate_title:0 "Le Censorat"
 mng_censorate_desc:0 "Une branche hautement efficace de notre gouvernement, nous devons présenter nos meilleurs efforts pour assurer la poursuite du processus de centralisation et d'efficacité bureaucratique afin de correspondre à la taille de notre énorme domaine."
 mng_promote_grand_coordinators_title:0 "Grands Coordinateurs"
 mng_promote_grand_coordinators_desc:0 "L'équivalent oriental d'un vice-roi, communément connu dans notre pays sous le nom de Xunfu, est une fonction clé qui joue un rôle important dans notre administration. Nous devons veiller à promouvoir des coordinateurs compétents et assurer leur loyauté envers l'Empereur."
 mng_crisis_ming_dynasty_title:1 "Crise de la Dynastie Ming"
 mng_crisis_ming_dynasty_desc:0 "Notre dynastie a traversé maintes crises terrifiantes. C'est peut-être un signe des Cieux mettant notre chef d'État à l'épreuve. Néanmoins, nous devons persévérer face au danger et ne pas faillir. L'avenir de notre peuple est en jeu."
 mng_expand_great_wall_title:0 "Étendre la Grande Muraille"
 mng_expand_great_wall_desc:0 "La Grande Muraille a protégé notre peuple pendant des générations. Afin d'assurer son efficacité continue, nous devons vérifier son état et corroborer un effort pour la moderniser et étendre sa portée afin de protéger nos sujets des griffes sanguinaires des étrangers."
 mng_sail_east_title:0 "Naviguer vers l'Est"
 mng_sail_east_desc:0 "La mer qui enveloppe nos côtes recèle de nombreux secrets, dont la plupart se trouvent juste au-delà de l'horizon, attendant avec impatience d'être découverts par nos aventuriers et explorateurs en quête de sensations fortes. Quels dons mystiques et découvertes ces terres peuvent-elles receler, il nous incombe assurément de le découvrir !"
 mng_reform_civil_registration_title:0 "Réformer l'État Civil"
 mng_reform_civil_registration_desc:0 "Le système de gouvernance promu par notre dynastie est un système qui a connu peu de rénovation au cours des derniers âges. À cette fin, nous devons déterminer une manière appropriée d'administrer les vagues de sujets sous notre bannière et atténuer de manière appropriée les malus qui accompagnent la corruption et la surextension administrative."
 mng_examination_system_title:0 "Système d'Examens"
 mng_examination_system_desc:0 "Ayant amélioré notre système de gouvernance, nous devons maintenant nous concentrer sur le choix d'une voie à suivre pour notre Empire. La centralisation, la délégation de l'autorité locale à des individus et la promotion de membres dynastiques à des postes de pouvoir ne sont que quelques-unes des voies que notre grand Empereur peut choisir de suivre."
 mng_mutual_trade_system_title:0 "Système de Commerce Mutuel"
 mng_mutual_trade_system_desc:0 "Projeter notre force et échanger des cadeaux, des faveurs et des pièces contre une protection est une relation relativement efficace et extrêmement profitable entre notre grande dynastie et les nombreux pays satellites à travers notre sphère d'influence. Cependant, nous ne devons pas nous reposer et continuer à améliorer cette base puissante, que ce soit par la révision des accords tributaires ou la cosignature de nouveaux accords avec de nouveaux alliés au-delà de nos frontières."
 mng_nomadic_frontier_title:0 "La Frontière Nomade"
 mng_nomadic_frontier_desc:0 "Les sujets sous la bannière de notre nation ont longtemps souffert des raids exécutés par les tribus voisines sur leurs terres. La famine, la dévastation et la perte de vies ne sont que quelques-unes des raisons derrière le besoin de traiter ce problème avant qu'il ne devienne incontrôlable."
 mng_deal_kama_kagyu_title:0 "Traiter avec les Karma Kagyu"
 mng_deal_kama_kagyu_desc:0 "Les écoles de pensée au Tibet ne sont pas toujours d'accord entre elles, ni avec les nôtres, pourtant leurs enseignements offrent du savoir et leurs dirigeants détiennent une bonne autorité sur leur peuple. À cette fin, nous devons assurer leur loyauté envers notre dynastie par tous les moyens nécessaires."
 mng_inward_perfection_title:0 "Perfectionnement Intérieur"
 mng_inward_perfection_desc:0 "De nombreuses voix consultatives dans notre palais plaident en faveur d'un mouvement qui se concentre sur le perfectionnement de nos affaires intérieures plutôt que de poursuivre la conquête de-ci de-là. Cependant, un nouveau mouvement au sein de notre royaume s'oppose au premier, soulignant que nous devons battre le fer tant qu'il est chaud et frapper les ennemis qui cherchent à le détruire, avant qu'ils ne puissent amasser des forces et nous défier."
 mng_survey_ocean_shores_title:0 "Arpenter les Rivages Océaniques"
 mng_survey_ocean_shores_desc:0 "Il n'y a pas longtemps, nous nous sommes embarqués dans une série de voyages légendaires à travers les rivages d'Asie, dans un démonstration profonde et inspirante de force. Une fois de plus, on nous demande de confirmer notre suprématie à travers notre vaste domaine et de tenir à distance les conquérants potentiels..."
 mng_tame_china_sorrow_title:0 "Dompter le Chagrin de la Chine"
 mng_tame_china_sorrow_desc:0 "Les rivières sont le sang vital de notre civilisation car elles fournissent à notre peuple des terres précieuses et les nécessités de base. Cependant, diverses inondations qui peuvent survenir toutes les quelques décennies sont une menace de la plus haute importance non seulement envers les moyens de subsistance de nos sujets mais aussi envers notre règne stable."
 mng_single_whip_law_title:0 "Loi du Fouet Unique"
 mng_single_whip_law_desc:0 "Un Empire de notre taille est, parfois, difficile à administrer et à taxer correctement. Ainsi, une grande partie de notre potentiel de profits peut parfois rester inexploitée. Pour y remédier, nous devons créer un nouvel impôt englobant, payé entièrement en argent dans un effort de centralisation de nos politiques fiscales."
 mng_pure_land_title:0 "Terre Pure"
 mng_pure_land_desc:0 "Malgré nos succès dans les affaires intérieures et extérieures, nous ne devons pas oublier de cultiver le jardin de notre âme et d'ériger des lieux de culte appropriés qui reflètent notre opulence et notre attention aux enseignements grâce auxquels nous avons prospéré."
 mng_shengshi_zhishi_title:0 "Shengshi et Zhishi"
 mng_shengshi_zhishi_desc:0 "L'histoire des dynasties passées, ainsi que l'histoire de la nôtre, a toujours été dictée par des flux et reflux. Les périodes de croissance, de décadence, de destruction et de renaissance font toutes partie de la vie. Cependant, cela ne doit pas être interprété comme si nous ne pouvions pas faire de notre mieux en ce qui concerne la croissance et le gouvernement de notre dynastie."
 mng_kingdom_joseon_title:0 "Royaume de Joseon"
 mng_kingdom_joseon_desc:0 "À l'Est se trouve le royaume de Corée, un allié puissant et une menace potentielle pour notre règne continu. Il serait sage de prendre des mesures et de résoudre cette situation soit par des moyens diplomatiques soit militaires afin de protéger nos intérêts."
 mng_repeal_or_improve_haijin_title:0 "Abroger ou Améliorer le Haijin"
 mng_repeal_or_improve_haijin_desc:1 "Cette mission sera débloquée par l'événement '§YLa Politique Haijin du Grand Ming§!' et déterminera la mission dynamique que nous recevrons."
 mng_improve_haijin_policy_title:0 "Améliorer la Politique Haijin"
 mng_improve_haijin_policy_desc:0 "Le statu quo actuel de l'interdiction commerciale au sein de notre royaume ne sert principalement qu'à nuire à notre propre bilan. Bien que l'empêchement de relations commerciales étendues avec les étrangers soit la voie sensée, il y a beaucoup de place pour améliorer les politiques existantes et les affiner pour l'amélioration de notre équilibre économique."
 mng_repeal_haijin_policy_title:0 "Abroger la Politique Haijin"
 mng_repeal_haijin_policy_desc:1 "Nos marchés sont restés fermés aux étrangers pendant bien trop longtemps ! Il est temps de nous efforcer vers une politique de modernisation et de commerce ouvert !"
 mng_expand_bogue_title:0 "Étendre le Bogue"
 mng_expand_bogue_desc:0 "L'embouchure du fleuve à [667.GetName] est connue dans tout notre royaume comme le cœur battant des affaires profitables et du transport de marchandises et de grains précieux. Nous devons travailler sans relâche pour l'étendre afin d'accommoder des volumes plus élevés de marchandises pour les besoins croissants de notre peuple."
 mng_jing_hang_grand_canal_title:0 "Le Grand Canal Jing-Hang"
 mng_jing_hang_grand_canal_desc:0 "Maîtriser la marée et les inondations qui éclatent le long des berges de notre grande nation est une compétence qui s'avérera vitale si nous voulons survivre aux siècles à venir. Les inondations ont été les événements catalyseurs derrière l'ascension et la chute de ceux qui étaient là avant nous et en tant que tels nous devons prendre les mesures nécessaires pour nous assurer que nous ne finissons pas comme une simple brève mention dans les livres d'histoire."
 mng_expand_yongle_dadian_title:0 "Yongle Dadian"
 mng_expand_yongle_dadian_desc:0 "L'avènement de l'impression et de la copie d'œuvres littéraires en Chine est une technique révolutionnaire qui permet la diffusion et la préservation du savoir. En améliorant les techniques de nos ancêtres, nous pouvons réussir à diffuser la plus grande œuvre encyclopédique de l'Empereur Yongle, englobant des centaines de volumes de savoir."
 mng_heavens_will_title:0 "Volonté du Ciel"
 mng_heavens_will_desc:0 "Le flambeau des Cieux est passé à notre dynastie. Pour nous montrer dignes et exploiter la puissance de la Chine, nous devons démontrer l'excellence et la compétence nécessaires pour réformer et dompter le pays, un exploit que personne n'avait accompli longtemps avant que notre dynastie n'arrive au pouvoir. C'est véritablement une épreuve de faveur envers le détenteur du Mandat du Ciel."
 mng_thirteen_provinces_title:0 "Les Treize Provinces"
 mng_thirteen_provinces_desc:0 "Nos relations avec nos voisins du Sud au Đại Việt ont été assez tumultueuses au cours des dernières décennies. Leur royauté s'est détachée de l'étreinte aimante de l'Empereur de Chine. Nous devons leur rappeler, de la manière que nous jugeons appropriée, où réside leur allégeance."
 mng_end_sengoku_jidai_title:0 "Mettre Fin au Sengoku Jidai"
 mng_end_sengoku_jidai_desc:0 "Le Japon est le foyer de guerriers sauvages, de seigneurs avides de pouvoir et d'un esprit guerrier qui a mené à l'aube de l'ère Sengoku Jidai. Nous ne pouvons tolérer un tel comportement turbulent et dangereux si près de nos rivages et devons donc agir pour sécuriser l'île pour nous-mêmes, directement ou indirectement."
 mng_form_depots_title:0 "Former les Dépôts"
 mng_form_depots_desc:0 "Malgré la nomination de sujets loyaux et l'exhibition de la faveur des cieux, les personnes servant notre illustre Empereur peuvent parfois succomber à leur nature humaine. Pour contrer cela, nous pouvons aller de l'avant et fonder des agences d'espionnage pour surveiller les affaires et les transactions internes de nos sujets."
 mng_outer_city_beijing_title:0 "Ville Extérieure de [1816.GetName]"
 mng_outer_city_beijing_desc:0 "La ville de [1816.GetName] a été le cœur de la Chine, étant le foyer d'innombrables quantités de notre peuple au sein de notre royaume. La taille croissante de la population aspire à une extension des plans de la ville, élargissant ainsi l'espace de vie au sein du domaine urbain."
 mng_fortify_coast_title:0 "Fortifier la Côte"
 mng_fortify_coast_desc:0 "Nos côtes ont longtemps été victimes d'une piraterie insensée, volant à nos sujets leur labeur durement gagné et, parfois, kidnappant nos habitants du littoral pour les réduire en esclavage. Cette situation est entièrement intolérable et doit donc être traitée de la manière la plus drastique possible."

