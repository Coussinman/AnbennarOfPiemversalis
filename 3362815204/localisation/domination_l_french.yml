 parliament_vs_monarchy_mechanic_bt:0 "§RLes Monarchistes peuvent déclencher une Guerre Civile !§!"
 governmental_power:0 "Pouvoir Absolu"
 governmental_power_desc:1 "Le Pouvoir Absolu est augmenté ou diminué selon nos actions liées au §Y[Root.GetParliamentOrFallbackName]§!.\n\nLe Pouvoir Absolu augmente quand nous faisons l'une des choses suivantes :\n - Réinitialiser un Débat Parlementaire : §Y+20§!\n - Perdre un Siège Parlementaire : §Y+5§!\n - Perdre un Débat Parlementaire : §Y+33§!\n\nLe Pouvoir Absolu diminue quand nous faisons l'une des choses suivantes :\n - Réussir un Débat Parlementaire : §Y-20§!\n - Accorder un Siège Parlementaire : §Y-5§!\n\nÀ §Y100§! nous gagnons les effets suivants :\n    Absolutisme Maximum : §G+50,00§!\n    Changement d'Autonomie Mensuel : §G-0,20§!\n    Troubles Nationaux : §R+4,00§!\n\nÀ §Y-100§! nous gagnons les effets suivants :\n    Troubles Nationaux : §G-4,00§!\n    Coût des Idées : §R+10,0 %§!\n    Années de Séparatisme : §R+10§!\n    Absolutisme Annuel : §G+1,00§!"
 monthly_governmental_power:0 "Pouvoir Absolu Mensuel"
 governmental_power_gain_modifier:0 "Modificateur de Gain de Pouvoir Absolu"
 end_time_mechanic:0 "Croyance en la Fin des Temps"
 ability_end_time_mechanic:0 "Croyance en la Fin des Temps"
 fanatic_zeal:0 "Zèle Fanatique"
 fanatic_zeal_desc:0 "Le Zèle Fanatique est la croyance collective que la fin est proche. Plus il y a de zèle, plus votre État est agressif envers ceux qui s'opposent à la Fin des Temps, qu'ils soient externes ou internes.\n\nLe Zèle Fanatique a une croissance de base de §Y1§! par mois et est diminué de §Y5§! chaque fois que nous gagnons une guerre (les paix séparées ne comptent pas)."
 monthly_fanatic_zeal:0 "Zèle Fanatique Mensuel"
 fanatic_zeal_gain_modifier:0 "Modificateur de Gain de Zèle Fanatique"
 end_time_mechanic_end_tt:0 "§RSi nous atteignons §Y100§! de Zèle Fanatique avant de posséder §Y1000§! provinces, alors la société et le gouvernement de §Y[Root.GetUsableName]§! s'effondreront.§!"
