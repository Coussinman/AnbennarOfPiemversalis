l_french:
 #Missions
 fra_liberate_norm_title:0 "Libérer la Normandie"
 fra_liberate_norm_desc:0 "Le duché de Normandie est un sujet de jure du royaume de France. Il doit être rendu à notre autorité." #old
 fra_burg_succession_title:0 "Succession Bourguignonne"
 fra_burg_succession_desc:0 "Les ducs parvenus de Bourgogne se prennent pour une grande puissance à part entière, mais en vérité ils ne sont qu'un simple vassal. Nous devrions leur rappeler ce fait." #old
 fra_border_empire_title:0 "Faire Face à l'Empire"
 fra_border_empire_desc:0 "Le Saint-Empire romain est le plus grand obstacle à l'expansion française, et une épine constante dans notre flanc. L'Empire doit être soit aboli, ouvrant la voie à nos ambitions, soit placé sous contrôle français." #old
 fra_chateux_loire_valley_title:0 "Châteaux de la Vallée de la Loire"
 fra_chateux_loire_valley_desc:0 "L'aube du XVe siècle a vu de nombreuses avancées dans le domaine de l'architecture au sein de nos frontières. Nous devrions mettre notre savoir à profit et développer les nombreuses vues magnifiques de notre pays."
 fra_armorican_peninsula_title:0 "La Péninsule Armoricaine"
 fra_armorican_peninsula_desc:0 "Le duché de Bretagne ne reconnaît pas sa relation légitime avec la couronne française. Nous devrions les persuader de rentrer dans le rang." #old
 fra_retake_aquitaine_title:0 "Reprendre la Gascogne"
 fra_retake_aquitaine_desc:0 "La Gascogne est une terre française de droit, occupée par un prétendant illégitime à la couronne. Chaque bastion anglais en France doit être réclamé." #old
 fra_unite_france_title:0 "La Couronne de France"
 fra_unite_france_desc:0 "Pendant bien trop longtemps nous sommes restés morcelés, nos terres sous commandement étranger. La France ne sera jamais en sécurité tant que la région que nous habitons ne sera pas unie sous notre bannière."
 fra_house_united_title:0 "Une Maison Unie"
 fra_house_united_desc:0 "Les parents royaux sur le trône de Provence ont toujours joui d'une grande autonomie par rapport à notre siège de pouvoir dans la capitale. Malgré leur taille, ils exercent une influence considérable, et nous devons donc nous efforcer de les assurer sous notre influence."
 fra_provencal_question_title:0 "La Question Provençale"
 fra_provencal_question_desc:0 "Les ducs de Provence aspirent à beaucoup, mais accomplissent peu. Ils se porteraient mieux en tant que sujets de la France." #old
 fra_ducal_lands_avignon_title:1 "Terres Papales d'Avignon"
 fra_ducal_lands_avignon_desc:0 "Avignon a toujours été une épine dans notre frontière sud-est. Malgré nos meilleurs efforts, elle a toujours échappé à notre juridiction, conservant son allégeance aux États pontificaux. Nous devons décider de notre approche dans cette affaire délicate, en supposant que le Saint-Père détienne l'autorité sur la Chrétienté."
 fra_crown_naples_title:0 "Couronne de Naples"
 fra_crown_naples_desc:0 "Le royaume méridional italien de Naples et ses territoires constituent un excellent point de contrôle du commerce transitant par la Méditerranée. Nous devons sécuriser ces territoires pour nous-mêmes et bénéficier de ce commerce."
 fra_branch_mission_4_3_title:0 "Mission à Embranchement"
 fra_branch_mission_4_3_desc:1 " " #deliberately empty
 fra_branch_mission_4_4_title:0 "Mission à Embranchement"
 fra_branch_mission_4_4_desc:0 " " #deliberately empty
 fra_branch_mission_5_3_title:0 "Mission à Embranchement"
 fra_branch_mission_5_3_desc:0 " " #deliberately empty
 fra_city_lights_title:0 "Ville Lumière"
 fra_city_lights_desc:0 "[118.GetName] a toujours été le cœur de l'une des religions les plus peuplées du monde. Ainsi, nous devons la placer sous notre bannière et profiter des effets de nous prélasser dans la gloire, en tant que conquérants de [118.GetName] !"
 fra_milanese_succession_title:0 "Succession Ambrosienne"
 fra_milanese_succession_desc:0 "Pour assurer la protection de notre position en Italie du Nord, nous devons étendre nos possessions pour inclure Milan." #old
 fra_protector_catholicism_title:0 "Protecteur du Catholicisme"
 fra_protector_catholicism_desc:0 "Le catholicisme a toujours été en guerre contre des voisins hostiles cherchant à l'éradiquer. Pour protéger notre peuple, le protéger des étrangers malveillants et défendre notre héritage, si Dieu le veut, nous le protégerons jusqu'au dernier homme !"
 fra_shield_of_outremer_title:0 "Bouclier d'Outremer"
 fra_shield_of_outremer_desc:0 "Notre influence au Levant a atteint des niveaux sans précédent. Pour la première fois depuis des siècles, nous sommes en mesure de proclamer la restauration de l'Outremer, l'étoile brillante de notre foi au Levant."
 fra_pilgrimage_jerusalem_title:1 "Croisade pour Jérusalem"
 fra_pilgrimage_jerusalem_desc:0 "La route vers Jérusalem est pleine d'ennemis et de conquérants étrangers. Il nous incombe de la secourir et de la ramener dans l'étreinte chaleureuse de notre religion. Deus vult !"
 fra_branch_mission_1_4_title:0 "Mission à Embranchement"
 fra_branch_mission_1_4_desc:0 " " #deliberately empty
 fra_branch_mission_2_5_title:0 "Mission à Embranchement"
 fra_branch_mission_2_5_desc:0 " " #deliberately empty
 fra_branch_mission_2_6_title:0 "Mission à Embranchement"
 fra_branch_mission_2_6_desc:0 " " #deliberately empty
 fra_branch_mission_3_5_title:0 "Mission à Embranchement"
 fra_branch_mission_3_5_desc:0 " " #deliberately empty
 fra_raise_slave_ships_title:1 "Arsenal des Galères"
 fra_raise_slave_ships_desc:0 "Si nous voulons soutenir nos tendances expansionnistes autour de la Méditerranée et au-delà, nous devons sécuriser une infrastructure navale appropriée et un flux constant d'hommes valides."
 fra_crossroad_continents_title:0 "Carrefour des Continents"
 fra_crossroad_continents_desc:0 "La Sicile se trouve au milieu de la mer Méditerranée, une étendue d'eau des plus vitales pour le commerce comme pour la guerre. La sécuriser ne fera que renforcer notre influence dans la région environnante."
 fra_throne_naples_title:0 "Trône de Naples"
 fra_throne_naples_desc:0 "La succession napolitaine est une affaire complexe et contentieuse. Naples elle-même aspire à l'indépendance, mais la France et les princes ibériques revendiquent également des droits sur elle. Cette affaire doit être réglée." #old
 fra_kingdoms_spain_title:0 "Royaumes d'Espagne"
 fra_kingdoms_spain_desc:0 "L'Ibérie abrite certaines des dynasties les plus illustres et prestigieuses d'Europe. Des nations qui exercent un pouvoir politique et militaire considérable, nous devons avancer prudemment et décider si nous les traiterons comme amis ou ennemis."
 fra_branch_mission_2_9_title:0 "Mission à Embranchement"
 fra_branch_mission_2_9_desc:0 " " #deliberately empty
 fra_secure_alpine_pass_title:0 "Sécuriser le Col Alpin"
 fra_secure_alpine_pass_desc:0 "La chaîne de montagnes entre notre domaine et l'Italie, les Alpes, a solidement défendu les habitants de l'Italie pendant des siècles. Si nous voulons conquérir les domaines italiens, nous devons franchir cet obstacle et sécuriser les cols menant à travers les précipices."
 fra_league_cambrai_title:0 "Ligue de Cambrai"
 fra_league_cambrai_desc:0 "Une tentative banale orchestrée par quelques puissances italiennes mineures n'est pas suffisamment puissante pour arrêter notre avance en Italie. Nous devons écraser toutes les forces d'opposition et sécuriser la région pour la couronne française !"
 fra_golden_march_title:0 "La Marche Dorée"
 fra_golden_march_desc:0 "L'Italie du Nord abrite certaines des terres les plus prospères du monde. Berceau de l'innovation politique et scientifique, son pouls est le rythme de toute la région et la sécuriser aiderait à accélérer davantage nos plans de conquête pour la région."
 fra_italian_heartland_title:1 "Sécuriser l'Italie du Nord"
 fra_italian_heartland_desc:0 "La maison des Visconti et les troubles civils qui ont suivi dans son domaine ne prouvent que l'incapacité de leur monarque à maîtriser les divers éléments perturbateurs. Nous devons soulager leurs citoyens de l'incompétence de leur dirigeant."
 fra_restore_signoria_title:1 "Seigneurie de Gênes"
 fra_restore_signoria_desc:0 "Les marchands de Gênes ont fréquemment entretenu de bonnes relations avec notre famille royale. Leurs ports abritent cependant de grandes richesses, et nous pourrions donc envisager de les usurper pour financer nos objectifs et notre programme."
 fra_house_god_title:0 "Maison de Dieu"
 fra_house_god_desc:0 "[118.GetName] abrite certaines des réalisations architecturales les plus célèbres du catholicisme. La ville, qui a été bénie par nombre des personnalités les plus célébrées de l'histoire, s'agenouillera bientôt face à la supériorité française."
 fra_secure_genoan_trade_title:1 "Commerce Génois"
 fra_secure_genoan_trade_desc:0 "L'opportunité commerciale sur les rives génoises ne peut être ignorée. Les marchands racontent des histoires de pièces inévitables, suffisamment pour remplir dix bourses. Sécuriser cette source de revenus s'avérera d'une importance vitale pour financer nos entreprises extérieures et intérieures."
 fra_expand_french_domain_title:0 "Étendre le Domaine Français"
 fra_expand_french_domain_desc:0 "L'Italie a toujours été déchirée entre de grands Empires. La région, autrefois partie de facto du Saint-Empire romain, doit reposer solidement entre nos mains, sous peine de risquer son alliance avec notre opposition politique et militaire."
 fra_sway_electorate_title:0 "Influencer l'Électorat"
 fra_sway_electorate_desc:0 "L'Emperorship n'est pas un titre facilement obtenu, surtout par un non-membre du Saint-Empire romain. Graisser quelques pattes et murmurer les bons mots nous aidera certainement dans nos efforts, cependant."
 fra_branch_mission_1_5_title:0 "Mission à Embranchement"
 fra_branch_mission_1_5_desc:0 " " #deliberately empty
 fra_push_imperial_line_title:0 "Repousser la Ligne Impériale"
 fra_push_imperial_line_desc:0 "Les frontières du soi-disant Saint-Empire romain à l'Est sont, au mieux, une affaire risible. Elles ne sont ni sûres, ni défendables, ni gardées par des soldats pouvant rivaliser avec les nôtres. Il tombera et s'effondrera devant la puissance de l'armée française."
 fra_break_habsburg_ring_title:2 "Briser l'Anneau de l'Empereur"
 fra_break_habsburg_ring_desc:2 "Les dirigeants [Emperor.Monarch.Dynasty.GetName] ont l'audace de tenter d'envelopper notre domaine avec les branches de leur lignée consanguine. Nous devons briser le soi-disant « Anneau [Emperor.Monarch.Dynasty.GetName] » sous peine d'être engloutis."
 fra_declaratio_gallica_title:0 "Declaratio Gallica"
 fra_declaratio_gallica_desc:0 "Les terres germaniques formellement protégées par l'Empereur ne sont qu'un fruit mûr pour nos ambitieux plans de conquête. Les conquérir et en faire un territoire français approprié éradiquera assurément une menace de plus de nos frontières."
 fra_dismantle_empire_title:0 "Démanteler l'Empire"
 fra_dismantle_empire_desc:0 "La charade malheureuse qui parade sous le nom d'Empire romain n'est qu'un triste état de fait et une pensée clairement délirante. Le briser et annuler sa raison d'être ne servirait qu'à accroître notre prestige."
 fra_right_blood_title:0 "Droit du Sang"
 fra_right_blood_desc:0 "Tout comme Charlemagne avant nous, le droit au trône impérial du Saint-Empire est nôtre. Le sécuriser ne servirait qu'à nous restaurer à notre place légitime."
 fra_restore_shadow_kingdom_title:0 "Regagner les Territoires Italiens"
 fra_restore_shadow_kingdom_desc:0 "Les territoires perdus par l'Empire au cours de la perte d'influence impériale sur la région doivent être rendus sous notre juridiction."
 fra_means_expansion_title:0 "Moyens d'Expansion"
 fra_means_expansion_desc:0 "Protéger l'Empire des menaces extérieures n'est pas une tâche aisée. Heureusement pour nous, nous sommes armés de l'une des armées les plus capables d'Europe qui nous assistera dans la libération et la protection du domaine de notre patrie."
 fra_french_canada_title:0 "Canada Français"
 fra_french_canada_desc:0 "La Compagnie des Marchands demande un soutien financier pour aider à établir des bases en Amérique du Nord. Ils disent que l'honneur de la France l'exige." #old
 fra_colonial_approach_title:0 "L'Approche Coloniale"
 fra_colonial_approach_desc:0 "Étendre notre influence à l'étranger en créant de nouveaux sujets coloniaux et avant-postes amplifiera davantage nos gains monétaires et notre puissance militaire, tant chez nous qu'à l'étranger."
 fra_appease_the_princes_title:0 "Apaiser les Dynasties"
 fra_appease_the_princes_desc:0 "Les diverses dynasties au sein de notre royaume ne détiennent peut-être pas beaucoup de pouvoir sur la couronne française mais doivent néanmoins être apaisées si nous devons demander leur coopération en temps de besoin."
 fra_crown_seat_capital_title:0 "Siège Royal de [Root.Capital.GetName]"
 fra_crown_seat_capital_desc:0 "La couronne française n'est forte que de sa capitale. Heureusement pour nous, nous sommes dans la position avantageuse de pouvoir renforcer davantage le cœur de notre domaine à [Root.Capital.GetName] et projeter la force."
 fra_found_french_haiti_title:0 "Fonder Haïti Française"
 fra_found_french_haiti_desc:0 "La Compagnie des Marchands demande un soutien financier pour aider à établir des bases dans les Caraïbes. Ils disent que l'honneur de la France l'exige." #old
 fra_hudson_bay_fur_title:0 "Fourrures de la Baie d'Hudson"
 fra_hudson_bay_fur_desc:0 "La bataille pour la domination du commerce de fourrures de l'Ohio ne peut être gagnée par la seule force militaire. Nous devons établir une relation commerciale avec les Amérindiens vivant dans la région pour sécuriser les intérêts du trésor français." #old
 fra_refine_bombards_title:0 "Perfectionner les Bombardes"
 fra_refine_bombards_desc:0 "Des machines de guerre, armées de quantités impressionnantes de poudre à canon, avancent sur le champ de bataille. Leur grondement tonitruant abattra les murs de nos ennemis et mènera [Root.GetName] à la victoire !"
 fra_form_gendarmes_title:0 "Former les Gendarmes"
 fra_form_gendarmes_desc:0 "Le besoin d'une armée appropriée, dotée de cavalerie lourde, est le facteur principal qui nous aidera à avancer vers la prise du pouvoir politique et la centralisation de notre royaume, par la puissance d'une armée permanente."
 fra_movement_centralization_title:0 "Mouvement de Centralisation"
 fra_movement_centralization_desc:0 "Les divers états politiques et factions au sein de notre royaume ont eu une influence considérable pendant bien trop longtemps. Nous devons nous débarrasser de ces éléments et centraliser notre pays."
 fra_reform_legal_system_title:0 "Réformer le Système Juridique"
 fra_reform_legal_system_desc:0 "Le système juridique de France était, pour la plupart, très fluide et archaïque tant dans sa conception que dans sa mise en œuvre. Afin de solidifier davantage notre emprise sur le trône, nous devons nous assurer que notre système juridique fonctionne à son efficacité maximale."
 fra_navy_mission_calais_title:0 "Port de Calais"
 fra_navy_mission_calais_desc:0 "Le perfide roi Édouard III d'Angleterre a pris Calais pour servir de base pour attaquer la France. Nous devons empêcher cela et donner à la France le Pays Reconquis." #old
 fra_auld_alliance_title:0 "Auld Alliance"
 fra_auld_alliance_desc:0 "Nous avons longtemps entretenu de bonnes relations et un pacte défensif avec l'Écosse en raison de notre rivalité mutuelle avec l'Angleterre. Nous devrions développer cette relation en préparation d'un assaut sur le continent anglais." #old
 fra_dutch_coast_title:0 "Exploiter la Côte Néerlandaise"
 fra_dutch_coast_desc:0 "La côte des Pays-Bas possède un grand potentiel commercial. Il serait sage de solidifier notre présence et de nous assurer qu'elle fonctionne selon la philosophie de l'efficacité maritime."
 fra_london_title:0 "L'Appel de Londres"
 fra_london_desc:0 "Toujours notre ennemi juré et rival, l'Angleterre continue d'être une épine dans notre flanc. Nous devons contourner ou vaincre la Royal Navy, débarquer sur la Grande-Bretagne elle-même, et mettre fin à la nation anglaise une fois pour toutes." #old
 fra_british_isles_title:0 "Conquérir les Îles"
 fra_british_isles_desc:0 "Avec la conquête de [236.GetName], nous avons sécurisé un puissant point d'appui sur les Îles Britanniques. La route vers l'éradication de la menace anglaise nous est désormais ouverte."
 fra_english_channel_mission_title:0 "La Manche Française"
 fra_english_channel_mission_desc:0 "La découverte du Nouveau Monde a donné naissance à de nouvelles opportunités commerciales. Exploitons-les et canalisons les richesses des terres lointaines dans notre Manche française."
 fra_rule_britannia_title:0 "Suprématie Navale Française"
 fra_rule_britannia_desc:0 "Nul ne contestera les prouesses navales et maritimes de notre marine si nous réussissons à vaincre nos ennemis sur l'eau. Avec la défaite de la marine britannique, la France règne désormais sur les flots !"
 fra_embrace_renaissance_title:0 "Embrasser la Renaissance"
 fra_embrace_renaissance_desc:0 "Les influences d'Italie et l'aube de la Renaissance doivent se frayer un chemin jusqu'au cœur de notre nation. Le faire et adhérer à l'adoption de nouvelles avancées en science, arts et culture ne servira que notre grande nation."
 fra_nine_universities_title:0 "Les Huit Universités"
 fra_nine_universities_desc:0 "Embrasser la Renaissance n'est que la première étape vers l'illumination de notre population. Nous devons également nous assurer qu'il y a suffisamment de fonds pour ériger des établissements d'enseignement appropriés à travers le pays."
 fra_retrial_jeanne_darc_title:0 "Procès de Jeanne d'Arc"
 fra_retrial_jeanne_darc_desc:0 "L'une des figures les plus controversées mais importantes de la Guerre de Cent Ans fut Jeanne d'Arc. Ses charges intrépides et sa foi inébranlable ont ouvert la voie à la victoire quand tout semblait perdu. Nous devons honorer sa mémoire et l'innocenter des fausses accusations portées contre elle."
 fra_renaissance_architecture_title:0 "De Architectura" #https://en.wikipedia.org/wiki/French_Renaissance_architecture#Religious_architecture
 fra_renaissance_architecture_desc:0 "Composé à l'origine comme un traité étudiant les facettes de l'architecture, par l'architecte et ingénieur militaire romain Marcus Vitruvius Pollio, l'étude intitulée « Dix Livres sur l'Architecture » a servi de base pour toutes les questions de cette nature. Ses nombreuses leçons ne serviront qu'à nous aider à ériger des bâtiments plus illustres et ornés."
 fra_trade_fairs_title:0 "Promouvoir les Foires Commerciales"
 fra_trade_fairs_desc:0 "Les foires commerciales à travers nos nations sont le siège d'une activité économique florissante ainsi que de prospérité. En finançant et en développant cette tradition, nous réussirons à répandre plus de prospérité à travers notre royaume."
 fra_connect_provinces_title:0 "Relier les Provinces"
 fra_connect_provinces_desc:0 "Notre pays n'est en aucun cas petit. Afin de maximiser l'efficacité du commerce et du transport, nous devons étudier des moyens d'adopter au moins un réseau d'infrastructure rudimentaire."
 fra_musketeers_title:0 "Mousquetaires Royaux"
 fra_musketeers_desc:0 "Nous devrions établir un corps d'élite de soldats pour garder le monarque et agir comme le bras armé de la Maison du Roi. Avec son adhésion réservée aux classes supérieures, ces régiments encourageront l'aristocratie à poursuivre des carrières dans l'armée." #old
 fra_absolutism_title:0 "Aube de l'Absolutisme"
 fra_absolutism_desc:0 "Le monarque ne devrait pas être limité par la tradition, les privilèges locaux ou la noblesse. Au contraire, en tant que premier parmi ses égaux, il doit être le seul commandant du navire de l'État." #old
 fra_french_industry_title:0 "Feux de l'Industrie"
 fra_french_industry_desc:0 "Les complexes industriels à travers notre terre produisent d'énormes quantités de biens. Alors que nous entrons dans l'ère de l'industrialisation, nous devons nous assurer davantage que nos usines sont correctement financées et développées."
 fra_merchant_cooperation_title:0 "Financer les Entreprises Commerciales"
 fra_merchant_cooperation_desc:1 "Il est vrai que s'aventurer dans l'inconnu comporte une grande part de risque, cependant si nous voulons maximiser nos profits, nous devons trouver une solution pour améliorer nos revenus commerciaux."
 fra_develop_trade_title:0 "Embrasser le Colbertisme"
 fra_develop_trade_desc:0 "École de pensée économique et politique, le colbertisme peut être considéré comme similaire au mercantilisme centré sur l'idée principale que la richesse et l'économie de la France doivent toujours servir l'État, améliorant davantage l'emprise du monarque sur le pouvoir."
 fra_toulon_dockyards_title:0 "Chantiers Navals de Toulon"
 fra_toulon_dockyards_desc:0 "Toulon est un emplacement idéal pour la construction d'un grand nouveau chantier naval et arsenal. Depuis Toulon, notre flotte dominera la Méditerranée !"
 fra_french_wars_religion_title:0 "Guerres de Religion Françaises"
 fra_french_wars_religion_desc:0 "Nous devons endurer et dépasser toutes les attentes placées sur nous alors que nous traversons l'ère périlleuse des conflits religieux qui a balayé l'Europe."

#Revolutionary Missions
 fra_secure_iberia_title:0 "La Guerre Péninsulaire"
 fra_secure_iberia_desc:0 "Les monarques parvenus d'Ibérie nous ont nargués pour la dernière fois. Nous devons libérer le peuple sous leurs chaînes et présenter leur famille royale à nos guillotines."
 fra_military_reform_title:0 "Réformer la Garde"
 fra_military_reform_desc:0 "Si nous devons affronter les injustices des maisons les plus puissantes d'Europe, nous aurons besoin de l'armée qui va avec. Ainsi, nous devrions examiner la réforme de nos forces armées et améliorer leur efficacité au combat."
 fra_cross_rhine_title:0 "Traverser le Rhin"
 fra_cross_rhine_desc:0 "À l'Est se trouvent les territoires germaniques de monarques perfides et de suzerains oppressifs. Nous devons rapidement soulager leurs citoyens de leurs liens royaux et intégrer leurs terres dans notre domaine."
 fra_dominate_europe_title:0 "Dominer l'Europe"
 fra_dominate_europe_desc:0 "L'Europe n'est qu'une scène sur laquelle nous proclamerons notre domination alors que nous triomphons contre les innombrables ennemis qui cherchent à étouffer notre mouvement."
 fra_religious_settlement_title:0 "Règlement Religieux"
 fra_religious_settlement_desc:0 "Les institutions du passé peuvent être archaïques et de peu d'utilité, cependant la religion est un outil puissant entre les mains du dirigeant, et nous devrions donc étudier ses utilisations potentielles. Selon Napoléon lui-même, la religion excelle à empêcher le peuple de déposer les riches."
 fra_invade_italy_title:0 "Envahir l'Italie"
 fra_invade_italy_desc:0 "Les terres d'Italie seront notre prochaine campagne alors que nous balayons l'Europe. Le siège d'hommes prétentieux de Dieu et d'opulence fera un bel ajout à notre collection de provinces."
 fra_national_bank_title:1 "Instituer la Banque de France"
 fra_national_bank_desc:0 "L'aube de la Révolution a vu notre nation déstabilisée et démunie. Pour combattre cela, nous devons imposer et nationaliser un pilier très important pour aider à notre redressement économique, notre propre banque nationale."
 fra_grande_armee_title:0 "La Grande Armée"
 fra_grande_armee_desc:0 "Notre armée est glorieuse et sert le peuple ! Les bannières que nous portons à la guerre, en combinaison avec nos manœuvres militaires supérieures et notre discipline, surprendront tout ennemi."
 fra_civil_code_title:0 "Code Napoléon"
 fra_civil_code_desc:0 "Notre société ne peut résister aux tests internes et externes si nous n'introduisons pas un code civil central pour régir les normes de notre société."
 fra_enlarge_ports_title:0 "Infrastructure Côtière"
 fra_enlarge_ports_desc:0 "L'aube du XVIIIe siècle a vu un virage accru vers le maintien d'une présence navale robuste. Pour atteindre cet objectif, nous devons répondre à nos besoins en infrastructure navale."
 fra_low_countries_title:1 "Révoltes Néerlandaises"
 fra_low_countries_desc:0 "Les Pays-Bas ont une histoire de révolutions et de révoltes contre leurs maîtres. Par conséquent, nous devons les aider et les placer sous notre aile protectrice."
 fra_educational_reforms_title:1 "Grandes Écoles de Condorcet"
 fra_educational_reforms_desc:0 "Le savoir ne peut plus être le privilège d'un noble. En finançant des idées audacieuses concernant l'accès à l'éducation, il est clair qu'éduquer notre population est de la plus haute importance."
 fra_road_connectivity_title:0 "Infrastructure Renouvelée"
 fra_road_connectivity_desc:0 "L'ère du charbon et des biens manufacturés se lève sur l'Europe et le monde. Si nous voulons suivre l'époque, nous devons nous assurer que notre infrastructure est de la plus haute qualité, pour aider tant notre programme interne qu'externe."
 fra_napoleonic_navy_title:0 "Marine Napoléonienne"
 fra_napoleonic_navy_desc:0 "Nos ennemis possèdent une puissance navale considérable. Si nous voulons protéger nos côtes et notre peuple, nous devons les égaler et les surpasser avec une marine puissante."
 fra_great_britain_title:0 "Détruire les Britanniques"
 fra_great_britain_desc:0 "Les Britanniques ont été une épine dans notre flanc pendant bien trop longtemps. Leur ingérence continentale et leur manque de respect envers notre chef d'État menace de saboter nos plans, ils doivent donc être éradiqués."
 fra_trade_hegemony_title:0 "Hégémonie Maritime"
 fra_trade_hegemony_desc:0 "La conquête des Îles conjuguée à notre domination navale ouvrira la voie pour que [Root.GetName] soit le maître incontesté des mers !"
 dom_fra_france_discovers_north_america_title:0 "Découvrir l'Amérique du Nord"
 dom_fra_france_discovers_north_america_desc:0 "Nos navigateurs supplient la couronne de financer une mission pour explorer les mers à l'ouest de nous. Ils ont entendu des rumeurs de terres riches qu'ils souhaitent revendiquer pour la gloire de la France." #old
 dom_fra_indian_dominance_title:0 "Domination Indienne"
 dom_fra_indian_dominance_desc:0 "Les richesses de l'Inde seront réservées uniquement aux [Root.GetAdjective]. Toutes les autres nations européennes présentes en Inde doivent être expulsées, par la force si nécessaire." #old




 #Events
 flavor_fra.102.t:1 "L'Anneau [Emperor.Monarch.Dynasty.GetName]"
 flavor_fra.102.d:0 "L'influence croissante de nos rivaux en Allemagne a conduit à leurs pitoyables tentatives de nous isoler tant territorialement que diplomatiquement. En concluant des mariages politiques et en étendant notre influence au-delà de nos frontières, nous en viendrons assurément à un conflit inévitable ainsi qu'à créer des tensions frontalières avec les suzerains des territoires germaniques."
 flavor_fra.102.a:0 "Nous ferons une offre pour le titre d'Empereur !"
 flavor_fra.102.b:0 "L'Anneau doit être détruit."
 flavor_fra.102.c:0 "Les bannières françaises triomphent !"

 flavor_fra.103.t:0 "Les Jardins de France"
 flavor_fra.103.d:0 "Les nombreux artistes en herbe qui ont afflué dans notre pays avant [GetYear] ont donné naissance à de nouveaux mouvements architecturaux, qui ornent désormais de magnifiques résidences nobles le long des rives de la Loire. En combinant l'architecture gothique et italienne, ces nouvelles constructions ne serviront qu'à nous imprégner davantage de splendeur et de prestige !"
 flavor_fra.103.a:0 "Quelle élégance et quelle beauté !"
 flavor_fra.103.b:0 "Exploitons cela !"

 flavor_fra.104.t:0 "Le Catholicon"
 flavor_fra.104.d:0 "La langue est l'essence même d'un peuple. Le changement des mots, des traditions et même des habitudes résiste à l'épreuve du temps pour prouver la ténacité de la résolution de nos citoyens. Mais la résolution seule ne propulsera pas notre civilisation vers la grandeur. Ainsi, la composition d'un dictionnaire, le premier du genre, fut ordonnée en [GetYear] par notre chef d'État. Le dictionnaire lui-même est écrit en latin, français et breton, et c'est le premier de son genre, contenant plus de six mille entrées, compilé par le prêtre breton Jehan Lagadeuc et plus tard imprimé à Tréguier."
 flavor_fra.104.a:0 "Quel homme éclairé !"

 flavor_fra.105.t:0 "Une Dame d'une Beauté et d'une Intrigue Remarquables"
 flavor_fra.105.d:1 "L'une des figures les plus éminentes de l'histoire française et anglaise, Aliénor d'Aquitaine est une figure légendaire tissée dans l'histoire de son domaine. Célèbre pour sa richesse et son pouvoir, elle en vint à contrôler une grande partie du sud de la France durant les XIIe et XIIIe siècles. À l'apogée de son influence, elle épousa le roi Louis VII de France et participa à la Deuxième Croisade en tant que Reine Consort. Peu après leur retour, elle demanda le divorce qui lui fut finalement accordé. À 30 ans, elle se fiança à son cousin au troisième degré Henri, duc de Normandie et comte d'Anjou, et lors de leur cérémonie de mariage, ils furent déclarés Roi et Reine d'Angleterre, inaugurant l'entité politique qui serait plus tard connue sous le nom d'Empire Angevin. Par un art de gouverner expert et une manipulation magistrale des nobles et des dirigeants, elle grava son nom dans les livres d'histoire pour les siècles à venir, un exemple brillant d'une reine des plus capables."
 flavor_fra.105.a:0 "Son esprit perdure !"

 flavor_fra.106.t:1 "Maison de [Root.Monarch.Dynasty.GetName]"
 flavor_fra.106.d:1 "Le [FRA.Monarch.GetTitle] de France, un membre de la famille [Root.Monarch.Dynasty.GetName], a récemment demandé l'annulation de nombreux de nos privilèges autonomes à notre cour. Beaucoup voient cela comme une violation claire de l'indépendance de la Provence tandis que la cour française à [FRA.Capital.GetCapitalName] considère cela comme le résultat naturel du statu quo actuel."
 flavor_fra.106.a:0 "Il est temps d'unir nos maisons."
 flavor_fra.106.b:0 "Nous ne pouvons jamais abandonner notre autonomie !"

 flavor_fra.109.t:0 "Sécuriser les Terres Milanaises"
 flavor_fra.109.d:0 "La lignée des Visconti qui régnait sur Milan juste avant leur chute face à la République Ambrosienne a toujours détenu une influence considérable, tant dans les affaires européennes qu'italiennes. La cité de Milan et son domaine environnant sont non seulement extrêmement prospères mais la ville se vante également d'un nombre impressionnant d'artistes, d'avancées culturelles et d'une position géographique commercialement lucrative."
 flavor_fra.109.a:0 "Ils recevront une autonomie nominale."
 flavor_fra.109.b:0 "Nous nous unirons contre nos ennemis communs !"
 flavor_fra.109.c:0 "L'Italie nous appartient !"

 flavor_fra.113.t:0 "Le Destin de Naples"
 flavor_fra.113.d:0 "Installer notre chef d'État comme dirigeant suprême des terres napolitaines est certainement un geste audacieux qui ne passera pas inaperçu. Malgré le tollé créé à l'étranger, nous devons regarder à l'intérieur et déterminer comment gérer les terres nouvellement acquises qui sont non seulement nombreuses mais aussi extrêmement prospères. Le port commercial de Naples seul peut être une clé pour accéder aux marchés de Gênes, et nous devons donc être prudents et mesurer nos actions en conséquence."
 flavor_fra.113.a:0 "Un membre égal du dominion français !"
 flavor_fra.113.b:0 "Ils existent pour servir la couronne !"
 flavor_fra.113.c:0 "La faiblesse de leurs anciens suzerains doit être exploitée !"


 flavor_fra.114.t:0 "Victoire dans la Guerre Franco-Ibérique"
 flavor_fra.114.d:0 "Les dirigeants d'Ibérie détenaient une grande influence et un grand pouvoir, qui à une époque avait toute l'Europe aux aguets, mesurant soigneusement une réponse. Malgré leurs prouesses militaires et leur influence, cependant, eux aussi sont tombés victimes de notre vision militaire et expansionniste d'une Europe unie sous notre bannière."
 flavor_fra.114.a:0 "L'Ibérie est à notre portée !"

 flavor_fra.115.t:0 "Le Domaine Papal en Italie"
 flavor_fra.115.d:0 "L'autorité papale a diminué depuis le siècle dernier en Italie. Cependant, alors que nous pénétrons nous-mêmes dans la région, il pourrait être sage d'avoir un allié puissant qui porte également la légitimité du monde catholique tout entier. Ainsi, nous devrions considérer soigneusement nos choix stratégiques."
 flavor_fra.115.a:0 "L'Italie appartient à Sa Sainteté !"
 flavor_fra.115.b:0 "À la réflexion..."

 flavor_fra.116.t:0 "Traité de la Fleur de Lys"
 flavor_fra.116.d:1 "Comme promis, notre amitié avec [FRA.GetName] porte ses fruits ! Notre tentative de nous légitimer en tant que suzerains de l'Italie via le soutien des grandes puissances européennes prendra bientôt effet. En conséquence, la propriété de l'Italie du Nord nous a déjà été accordée. Il est temps de préparer notre prochain mouvement diplomatique."
 flavor_fra.116.a:0 "C'est la voie à suivre pour le catholicisme et l'unification de l'Italie !"

 flavor_fra.117.t:0 "Coopérer avec le Saint-Père"
 flavor_fra.117.d:0 "Nos liens avec le Saint-Siège ont ouvert la voie à de nouveaux niveaux de coopération entre nos deux nations. Avec confiance, respect mutuel et accès aux ressources de l'autre, nous sommes prêts à affronter tous les ennemis et rivaux qui pourraient souhaiter entraver notre droit divin à la gloire et la réalisation de nos rêves impériaux. Ainsi, nous avons la capacité de diriger les efforts de recherche de nos deux départements vers le résultat souhaité."
 flavor_fra.117.a:0 "Travaillons ensemble sur l'administration."
 flavor_fra.117.b:0 "Nos nations bénéficieront d'une diplomatie mutuelle !"
 flavor_fra.117.c:0 "Nous préparerons et étudierons les questions de guerre."

 flavor_fra.118.t:0 "L'Opéra Précoce Fleurit"
 flavor_fra.118.d:0 "Les premières pièces d'opéra ont eu lieu dans nos frontières alors que notre influence en Italie grandissait et s'étendait. Des artistes aux performances exemplaires, louant le divin, l'humain et la lignée royale sont les premiers à produire ce qui est maintenant une tendance définissant une époque à travers toutes les maisons d'art et de culture en Europe !"
 flavor_fra.118.a:0 "Quelle performance, ma chère !"

 flavor_fra.119.t:1 "La Seigneurie Française de Gênes"
 flavor_fra.119.d:0 "Pendant bien trop longtemps, les gouverneurs de Gênes ont joui d'une autonomie vis-à-vis de la couronne française. La Seigneurie avait toujours été très proche de la couronne française pour des raisons politiques et financières, cependant il est temps de solidifier nos relations et d'utiliser leur monnaie et leur richesse pour pousser davantage notre agenda italien."
 flavor_fra.119.a:1 "Ils font désormais partie intégrante de notre domaine !"

 flavor_fra.120.t:0 "Traité des Bulles d'Or"
 flavor_fra.120.d:0 "Bataille après bataille, conquête après conquête. Le lien entre nous et la couronne française n'a fait que croître au fil du temps, pour devenir une amitié familière et robuste. Grâce à eux, nous contrôlons désormais des portions substantielles de notre région d'origine en Italie, et le moment est venu de faire passer notre relation à l'étape suivante, selon nos conseillers et les accords que nous avons signés avec le dirigeant français."
 flavor_fra.120.a:0 "Ensemble comme un seul !"
 flavor_fra.120.b:0 "Jamais !"

 flavor_fra.121.t:0 "Les Héritiers de Charlemagne"
 flavor_fra.121.d:1 "Il y a des siècles, un empereur franc légendaire semait la terreur dans le cœur de ses ennemis. Maintenant, une fois de plus, la lignée royale sur le trône de France est venue faire valoir cette revendication en tant qu'héritiers légitimes de Charlemagne et exiger l'abdication immédiate du trône du Saint-Empire romain en leur faveur ! Quelle folie est-ce là qui les motive à concevoir de telles revendications extravagantes !?"
 flavor_fra.121.a:0 "Nous devons abdiquer de l'Emperorship"
 flavor_fra.121.b:0 "Utiliser les moyens impériaux pour imposer des sanctions à la France !"
 flavor_fra.121.c:0 "Contrer leurs revendications !"

 flavor_fra.200.t:0 "L'Alliance Française Triomphe"
 flavor_fra.200.d:0 "Nous avons réussi à dissiper le mal qui foulait les terres germaniques ! Après d'innombrables batailles acharnées et un sang abondamment versé, nos ennemis ne sont plus ! Nul ne contestera désormais notre revendication en tant que maîtres du peuple germanique alors que nous gravons notre nom dans les livres d'histoire en lettres d'or."
 flavor_fra.200.a:0 "En cette heure, aucune ténèbre ne perdurera !"

 flavor_fra.201.t:0 "Protecteurs de l'Empire"
 flavor_fra.201.d:0 "Nous avons enfin atteint notre place légitime parmi les légendes de notre temps, le trône qui nous fut jadis pris est maintenant de retour avec ses propriétaires légitimes, la lignée royale française ! Contrairement à nos prédécesseurs, nous ne relâcherons pas nos devoirs de préserver l'Empire et de fournir protection à ses nombreux et divers habitants !"
 flavor_fra.201.a:0 "Nous sommes le bouclier de l'Empire !"

 flavor_fra.202.t:0 "La Rade de l'Arsenal de Toulon"
 flavor_fra.202.d:0 "Le mot rade vient du vieux terme anglais « Road », un endroit protégé près du rivage, pas aussi fermé qu'un port, où les navires peuvent mouiller à l'ancre. La Rade de Toulon est l'un des meilleurs mouillages naturels de la Méditerranée, et la plus grande rade d'Europe. Elle est protégée de la mer par la presqu'île de Giens et la presqu'île de Saint-Mandrier-sur-Mer, et a été utilisée comme port militaire depuis le XVe siècle. La Rade abrite le port de Saint-Mandrier-sur-Mer, le port de La Seyne-sur-Mer, ainsi que l'arsenal, ou port militaire de Toulon, et le port commercial.\n\nL'histoire moderne du port a commencé quand [Root.Monarch.GetName] a construit sa Tour Royale à Toulon en [GetYear]. Un arsenal naval et un chantier naval furent construits simultanément, et un petit port abrité, la Vieille Darse, fut construit quelques années plus tard pour protéger les navires du vent et de la mer. Le chantier naval fut considérablement agrandi par un Cardinal ultérieur, qui souhaitait faire de la Provence une puissance navale méditerranéenne."
 flavor_fra.202.a:0 "Qu'il soit construit !"

 flavor_fra.203.t:0 "Les Îles Françaises"
 flavor_fra.203.d:0 "Notre plus grand ennemi, la lignée royale des Îles, a péri. À leur place, ils ont laissé une économie en ruines, un peuple sans tête égaré, sans voix pour le guider. Malgré notre rivalité, il serait sage d'envisager de les intégrer dans notre administration. Alternativement, nous aurions tout le droit d'imposer leur conformité à nos règles et coutumes."
 flavor_fra.203.a:0 "Intégrons-les dans notre administration."
 flavor_fra.203.b:0 "La France règne en maître !"

 flavor_fra.204.t:0 "La Sorbonne"
 flavor_fra.204.d:0 "L'université de Paris n'est de loin pas le seul institut scientifique de [Root.GetName] en l'an [GetYear]. Bien que notre terre accueille un grand nombre de tels forums de pensée, la Sorbonne, comme on appelle l'Université de Paris, est de loin la plus célébrée et illustre de toutes. Construite à l'origine durant le XIIIe siècle, de récentes rénovations approfondies ont insufflé une vie précieuse à la faculté, lui permettant d'étendre ses halls, son programme et son prestige aux côtés des autres universités de notre terre !"
 flavor_fra.204.a:1 "Hic et ubique terrarum ! (Ici et partout sur Terre)"

 flavor_fra.205.t:0 "Les Terres Saintes de Jérusalem"
 flavor_fra.205.d:0 "Maintes et maintes fois le monde catholique a tenté de libérer Jérusalem et de protéger la ville et ses habitants des attaques païennes. Cependant, malgré les prières et l'utilisation de hordes d'hommes ainsi que plusieurs croisades, notre peuple n'a jamais été suffisamment victorieux. Malgré cela, les progrès récents au Levant nous ont accordé le droit de proclamer la résurrection du légendaire royaume croisé sous la bannière française, Dieu le veut !"
 flavor_fra.205.a:0 "Leur bannière flottera à nouveau !"
 flavor_fra.205.b:0 "[Root.Monarch.GetName] est le dirigeant légitime des terres saintes !"

 flavor_fra.206.t:0 "La Guerre de Cent Ans en France"
 flavor_fra.206.d:0 "La Guerre de Cent Ans a débuté en 1337 en raison d'un différend entre notre trône et la maison anglaise des Plantagenêt. Au cours du siècle passé, la guerre a grandi en échelle et en portée, englobant parfois diverses factions d'Europe occidentale. Récemment, le vent a tourné, accordant à nos troupes l'avantage dans la reconquête de terres longtemps perdues au maudit roi anglais, qui se terre maintenant de l'autre côté de la Manche. La venue de Jeanne d'Arc et sa valeur légendaire ont inspiré notre nation à poursuivre l'effort de guerre malgré notre position alors désavantageuse. Des chefs militaires comme Jean Bureau et Jean de Dunois chasseront certainement l'influence anglaise restante des rivages européens et la renverront d'où elle vient !"
 flavor_fra.206.a:0 "Nous serons victorieux !"



