 desc_mng_great_market_of_china_modifier:0 "Les marchandises fabriquées en Chine sont non seulement abondantes en nombre mais aussi impeccables en termes de qualité. L'accès au marché chinois est une opportunité précieuse."
 mng_reform_haijin_policy_modifier:0 "Politique Haijin Réformée"
 desc_mng_reform_haijin_policy_modifier:0 "Réformer la politique commerciale à travers notre royaume a eu des effets très bénéfiques pour notre économie et notre peuple."
 mng_bogue_modifier:0 "Le Bogue"
 desc_mng_bogue_modifier:0 "L'embouchure étendue de l'un de nos plus grands fleuves et estuaires est désormais le foyer d'une activité commerciale et d'affaires accrues."
 mng_imperial_printing_center_modifier:0 "Centre Impérial d'Impression"
 desc_mng_imperial_printing_center_modifier:0 "Une agence centrale chargée d'imprimer et de distribuer des œuvres littéraires aux quatre coins de notre pays."
 mng_divine_mandate_modifier:0 "Faveur Divine"
 desc_mng_divine_mandate_modifier:0 "Notre mandat au nom des Cieux eux-mêmes est clair. Le monde repose désormais dans la paume de nos mains."
 mng_backed_by_emperor_of_china_modifier:0 "Soutenu par l'Empereur"
 desc_mng_backed_by_emperor_of_china_modifier:0 "Nous avons le soutien des dynasties les plus éminentes et puissantes de Chine. Cela nous accordera assurément une légitimité et un pouvoir bien nécessaires."
 mng_eastern_campaigns_modifier:0 "Campagnes Orientales"
 desc_mng_eastern_campaigns_modifier:0 "Mobiliser des engins de siège et établir des centres logistiques est un plan d'action sain et sensé pour préparer de futures campagnes à l'étranger."
