 qng_passing_decree_reduces_autonomy_everywhere_by_5_tt:1 "\nChaque réforme que nous adoptons en tant qu'§YEmpereur de Chine§! réduira l'autonomie de toutes les provinces possédées de §G-10 %§!"
 # qng_during_this_era_events_may_fire_tt:0 "\n§YDurant cette ère, plusieurs événements pourront se déclencher, racontant l'histoire de l'art florissant, de l'opéra et de la culture s'épanouissant dans notre royaume§!"
 qng_free_trade_reward_tt:0 "Si nous choisissons d'« §YEmbrasser le Libre-Échange§! » :"
 qng_mercantilism_reawrd_tt:0 "\nAlternativement, si nous choisissons une « §YApproche Mercantiliste§! », nous obtiendrons :"
 qng_explain_pli_tt:1 "\nSi nous accomplissons la mission « §YPromouvoir les Industries Nationales§! », nous promouvrons nos §Ybiens commerciaux§! et stimulerons la §Yproduction§! interne."
 qng_explain_afe_tt:0 "Si nous accomplissons la mission « §YAutoriser les Échanges Étrangers§! », nous obtiendrons une forte présence sur le §Ymarché mondial§! et réduirons le désir de liberté de tout §Ysujet colonial§! que nous pourrions avoir."
 qng_no_westerners_in_our_ports_tt:0 "Aucune nation occidentale ne possède au moins §Y10 %§! de puissance commerciale dans les nœuds commerciaux suivants :\n §YPékin§!\n §YHangzhou§!\n §YCanton§!"
 qng_explain_cir_tt:1 "Si nous accomplissons la mission « §YRévolution Industrielle Chinoise§! », nous obtiendrons un puissant bonus §Ypermanent§! sur nos biens produits ainsi que l'accès à un nouvel §YÉdit d'État§! unique."
 qng_explain_ldp_tt:1 "\nSi nous accomplissons la mission « §YExpulser les Marchands Étrangers§! », nos marchés deviendront le « §YCentre Commercial du Désir Mondial§! » et nous pourrons imposer des §Ysanctions inflationnistes§! sur tout marché commercial extérieur en fonction de leur part commerciale dans leurs nœuds respectifs."
 qng_pull_the_lever_qing_tt:0 "\nDans chaque nœud commercial côtier européen où nous avons au moins §Y25 %§! de Puissance Commerciale, tout autre pays qui n'est pas notre §Ysujet§! ou §Yallié§! subira un §Reffondrement économique inflationniste§!"
 enable_industrialisation_tt:1 "\nActive l'Édit d'État §YIndustrialisation Rapide§! qui bénéficiera à nos provinces en croissance §Ytandis qu'elles sont développées§!"

 #Event Insight
 qng_event_insight_12_tt:0 "\n§GAperçu de l'Événement§! :\nCet événement célébrera notre victoire lors de nos campagnes §Ybirmanaises§! en élevant la cité de [586.GetName] et son §Ypalais impérial§!."



 #Events
 flavor_mch.12.t:0 "Victoire dans la Cité de [586.GetName]"
 flavor_mch.12.d:0 "Alors que nos armées franchissent les portes de [586.GetName], nous ne pouvons nous empêcher d'imaginer l'avenir radieux dissimulé derrière les divers succès que nous avons remportés sur les champs de bataille et à l'étranger. Tandis que notre influence en Indochine grandit et si nous devons solidifier la région sous notre contrôle, nous avons besoin d'un symbole à exhiber fièrement devant nos sujets nouvellement conquis. Une cité qui inspire la valeur et exhale le prestige, une démonstration de puissance complète et invincible."
 flavor_mch.12.a:0 "Une cité digne de la grandeur de notre Empereur !"

 flavor_mch.13.t:0 "L'Ère Prospère de Kangxi et [Root.Monarch.GetName]"
 flavor_mch.13.d:1 "La prospérité et la puissance de l'empire ont atteint de nouveaux sommets. Sur le plan intérieur, l'administration se porte bien grâce à l'approche méritocratique qui nous a été conférée en tant que maîtres de la Chine. Nos bureaucrates, sous la sage direction de [Root.Monarch.GetName], ont transformé notre pays en un État commercial comptant près du double de la population de l'ancienne dynastie. La sinisation a donné naissance à un amalgame culturel de Han et de Mandchous dans un équilibre unique de préservation des identités nationales et d'assimilation. Dictée par [Root.Monarch.GetHerHis] passion pour l'éducation et l'art, [Root.Monarch.GetName] a inauguré un âge d'or de prospérité pour tous les peuples sous notre bannière !"
 flavor_mch.13.a:0 "Un signe de faveur des Cieux, sans aucun doute !"


 #Reforms
 qng_grand_council_reform:0 "Junji Chu"
 qng_grand_council_reform_desc:0 "Un puissant organe législatif composé de conseillers triés sur le volet à la disposition de l'Empereur à tout moment. Leurs capacités bureaucratiques aideront certainement à administrer notre grand empire."

 #Edicts
 chinese_industrialization:0 "Industrialisation Rapide"
 chinese_industrialization_desc:0 "En établissant de solides domaines industriels à travers nos États, nous réussirons à industrialiser rapidement notre nation."



 #Chinese Kingdoms Loc by Big Boss

 #Missions
 solidify_our_borders_title:0 "Consolider notre Domaine"
 solidify_our_borders_desc:0 "Le tumulte qui a englouti notre patrie menace de tous nous avaler sur son passage. Si nous voulons survivre, nous devons nous étendre et sécuriser des frontières solides."
 mandate_cities_title:0 "Bâtir une Base de Pouvoir"
 mandate_cities_desc:0 "Revendiquer notre statut de dirigeants de la Chine exige une grande quantité de pouvoir légitimé. Pour ce faire, nous devons conquérir certaines des provinces les plus puissantes de l'Empire et les utiliser comme bases de pouvoir pour nous étendre davantage."
 fate_of_the_mandate_title:0 "Le Destin du Mandat"
 fate_of_the_mandate_desc:0 "La faiblesse de notre ancien suzerain a donné naissance à de nombreux royaumes sécessionnistes prétendant être la nouvelle dynastie destinée à mener la Chine vers un nouvel âge. Cependant, il ne peut y en avoir qu'un !"
 conquer_xinan_title:0 "Conquérir le Xinan"
 conquer_xinan_desc:0 "Le Xinan est une région qui servira de voie vers les régions frontalières au sud et à l'ouest de notre grand domaine. Malgré son terrain rocheux, le Xinan abrite de grands nombres de notre peuple, tous aspirant à être de nouveau dirigés par un puissant empereur."
 tributaries_or_conquest_title:0 "Voie de l'Expansion"
 tributaries_or_conquest_desc:0 "Les nombreuses dynasties avant notre époque cherchaient rarement à s'étendre au-delà des frontières de notre domaine. Cependant, nous ne devons pas imiter pour le simple plaisir d'imiter et plutôt choisir notre propre voie d'expansion, mieux adaptée aux besoins et ambitions de notre dynastie !"
 chi_independence_title:0 "La Chute des Grands Ming"
 chi_independence_desc:0 "La domination de la dynastie Ming sur la Chine touche à sa fin après des décennies de mauvaise administration et la perte de la faveur céleste. Des États sécessionnistes et des seigneurs de guerre prennent les armes, chacun s'efforçant d'imposer sa domination sur les autres."
 conquer_north_china_title:0 "Marcher sur [1816.GetName]"
 conquer_north_china_desc:0 "Ce qui était jadis le cœur d'un empire vibrant gît maintenant délabré et en ruines. La Chine du Nord nous servira de source de nouveaux hommes pour notre armée et de monnaie pour nos trésors tandis que nous nous efforçons d'unir les terres fragmentées."
 chi_unify_china_desc:0 "C'est un crève-cœur de voir sa patrie en lambeaux, luttant pour retrouver sa gloire passée. Les Cieux nous ont jugés dignes de reprendre le manteau de la faveur impériale et d'unifier nos glorieuses provinces sous notre bannière."
 chi_unify_china_title:0 "Unifier la Chine"
 chi_project_strength_desc:0 "Nos ennemis sont nombreux, et ils cherchent à saisir ce qui nous revient de droit. Malgré notre force magnifique, des empires lointains cherchent à nous rivaliser et nous déposer ; nous ne pouvons leur céder notre place dans l'histoire !"
 chi_project_strength_title:0 "L'Ère du Grand Dragon"
 conquer_south_china_title:0 "Conquérir la Chine du Sud"
 conquer_south_china_desc:0 "Les rivages des provinces du sud de la Chine offrent des biens luxuriants et des côtes fertiles. Combinée à sa production de métaux précieux, notre influence accrue là-bas rapportera d'immenses bénéfices monétaires à notre cause."
 issue_trade_policy_title:0 "Émettre une Politique Commerciale"
 issue_trade_policy_desc:0 "Nos frontières voient passer un volume toujours croissant de marchandises. Il serait sage d'établir des directives et de réglementer le trafic commercial au sein de notre juridiction."
 settle_internal_affairs_title:0 "Une Cour Stable"
 settle_internal_affairs_desc:0 "Tandis que nous cherchons à étendre notre influence au-delà de nos frontières, nous ne devons pas négliger nos affaires intérieures et plutôt œuvrer activement vers un processus équilibré et méritocratique au sein de notre administration."
 renovate_capital_title:0 "Rénover notre Capitale"
 renovate_capital_desc:0 "Notre capitale est l'emblème d'une dynastie prospère et indépendante dans notre région. En tant que telle, sa splendeur et sa beauté doivent être d'une qualité et d'une grandeur sans pareilles, une capitale digne d'un Empereur."
 china_prime_entrepot_title:0 "Cultiver les Marchés"
 china_prime_entrepot_desc:0 "De nombreuses provinces à travers le royaume affichent des volumes impressionnants de trafic commercial et marchand. Cependant, si nous voulons exploiter l'incroyable richesse au sein de nos frontières, nous devons élever des provinces désignées comme centres de commerce."



 #Modifiers
 chi_warring_era_kingdoms_modifier:0 "Royaume de la Nouvelle Ère des Guerres"
 desc_chi_warring_era_kingdoms_modifier:1 "Une grande ère d'instabilité et de royaumes en guerre est sur nous !"
 chi_new_emperor_modifier:0 "Nouvel Empereur de Chine"
 desc_chi_new_emperor_modifier:1 "Revêtir le manteau impérial a certainement solidifié notre dynastie dans les livres d'histoire."
 chi_absolutist_rule_china_modifier:0 "Règne Absolutiste"
 desc_chi_absolutist_rule_china_modifier:1 "Nul n'osera contester notre droit à régner en tant que maîtres de la Chine !"
 chi_rising_dynasty_modifier:0 "Dynastie du Nouveau Soleil"
 desc_chi_rising_dynasty_modifier:1 "Notre règne commencera par une nouvelle ère pour les Cieux et nos sujets."
 chi_rising_dynasty_modifier2:0 "Dynastie du Nouveau Soleil"
 desc_chi_rising_dynasty_modifier2:1 "Notre règne commencera par une nouvelle ère pour les Cieux et nos sujets."
 era_of_the_great_dragon_modifier:0 "Ère du Grand Dragon"
 desc_era_of_the_great_dragon_modifier:1 "Notre domaine administratif englobe de vastes étendues de terre. C'est l'ère du Grand Dragon, notre chance d'écrire l'histoire !"
 chi_stable_court_modifier:0 "Cour Méritocratique"
 desc_chi_stable_court_modifier:1 "Les promotions à notre cour sont distribuées par des moyens strictement méritocratiques aux candidats les plus capables."
 chi_imperial_center_of_commerce_modifier:0 "Centre Commercial Impérial"
 desc_chi_imperial_center_of_commerce_modifier:1 "Le domaine de cette province est protégé par l'Empereur lui-même en tant que centre commercial vital pour notre richesse et notre prospérité continue."


 #Tooltips
 chi_warscore_reward_tt:0 "\nSi nous accomplissons la mission en étant en guerre avec au moins §G90 %§! de Score de Guerre en notre faveur contre l'actuel §YEmpereur de Chine§!, nous obtiendrons la récompense supplémentaire suivante :"
 chi_strongest_warlord_tt:0 "Possède le §YDéveloppement§! le plus élevé et la plus grande §YArmée§! du sous-continent chinois"
 chi_subject_reward_tt:0 "Si nous accomplissons la mission en augmentant notre §Ynombre§! de sujets et que nous sommes l'§YEmpereur de Chine§!, nous gagnerons §G10§! de Mandat par sujet ainsi que la récompense suivante :"
