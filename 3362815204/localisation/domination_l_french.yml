 fra_scaling_dotf_reward_tt:0 "\nAccorde une récompense évolutive si nous complétons la mission en tant que Défenseurs de la Foi :\n\nNiveau §T1§! pour §Y25§! ans :\nVitesse de Récupération de Main-d'œuvre : §G+10 %§!\nPrestige Annuel : §G+0,5§!\n\nNiveau §T2§! pour §Y25§! ans :\nVitesse de Récupération de Main-d'œuvre : §G+10 %§!\nPrestige Annuel : §G+1§!\n\nNiveau §T3§! pour §Y25§! ans :\nVitesse de Récupération de Main-d'œuvre : §G+15 %§!\nPrestige Annuel : §G+1§!\n\nNiveau §T4§! jusqu'à la §Yfin§! du jeu :\nVitesse de Récupération de Main-d'œuvre : §G+15 %§!\nPrestige Annuel : §G+1§!\n\nNiveau §T5§! jusqu'à la §Yfin§! du jeu :\nVitesse de Récupération de Main-d'œuvre : §G+15 %§!\nPrestige Annuel : §G+1§!\nDéclin de Tradition Militaire : §G-1 %§!"
