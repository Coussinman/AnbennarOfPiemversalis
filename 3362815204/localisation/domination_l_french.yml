 #Events

 flavor_mch.9.t:0 "L'Ascension de Nurhaci"
 flavor_mch.9.d:0 "L'un de nos guerriers les plus nobles et courageux, Nurhaci s'est avéré un atout précieux pour notre pays en croissance. Sa réorganisation et son unification des diverses tribus Jurchen sous notre bannière nous ont donné les outils nécessaires pour porter le combat à nos oppresseurs. Historiquement, Nurhaci lancera un assaut total contre l'ensemble de l'Empire Ming en effondrement, posant les fondations de la prochaine dynastie qui domina la région. Ses réformes concernant le système des Bannières ainsi que la création de l'écriture mandchoue sont quelques-unes de ses réalisations légendaires."
 flavor_mch.9.a:0 "Il servira à la tête d'une grande puissance émergente !"
 flavor_mch.9.b:0 "Que ses prouesses militaires soient utilisées sur le terrain."
 flavor_mch.9.c:0 "Ses conseils seront précieux à la cour et sur les terrains d'entraînement."

 flavor_mch.10.t:0 "Les Sept Griefs"
 flavor_mch.10.d:0 "Historiquement, ce manifeste fut publié pour la première fois par le chef des Mandchous, Nurhaci, le treizième jour du quatrième mois lunaire de la troisième année de Tianming. L'animosité entre les tribus mandchoues et les Ming atteignit un zénith, menant à une guerre totale entre les deux puissances. Les Sept Griefs sont les suivants :\n\nLes Ming ont tué le père et le grand-père de [Root.Monarch.GetName] sans raison.\nLes Ming ont opprimé notre peuple et favorisé les clans rivaux.\nLes Ming ont violé l'accord sur les territoires avec [Root.Monarch.GetName].\nLes Ming ont envoyé des troupes pour protéger nos ennemis contre nous.\nLes Ming ont soutenu les plans d'autres clans pour rompre leur promesse envers notre dirigeant.\nLes Ming ont forcé [Root.Monarch.GetName] à abandonner les terres de Chaihe, Sancha et Fuan.\nLe fonctionnaire Ming Shang Bozhi a abusé de son pouvoir et tyrannisé le peuple."
 flavor_mch.10.a:0 "Notre temps est venu !"

 flavor_mch.11.t:0 "La Conquête de la Corée"
 flavor_mch.11.d:1 "La Corée et ses nombreux peuples reposent maintenant fermement entre nos mains. Ce qui était autrefois un royaume illustre, orné d'esprits brillants et de puissants rois, ne sera qu'une pierre de gué pour nous afin de bâtir notre propre gloire. Leur histoire se terminera là où la nôtre commence et à travers tout leur territoire nous chanterons les louanges de notre peuple et étudierons leur société, dans un effort pour apprendre d'eux."
 flavor_mch.11.a:0 "Étudions leur alphabet..."
 flavor_mch.11.b:0 "Nous devons apprendre de leur système agricole !"
 flavor_mch.11.c:0 "Leurs voies militaires seront d'une grande utilité."
 flavor_mch.11.e:0 "Ce sera la bibliothèque royale - nos guerriers liront des livres !"
 flavor_mch.11.f:0 "Ils s'intégreront dans la culture du vainqueur."



