 appanages_event.1.t:0 "L'Ancienne Noblesse de l'Apanage Outrée"
 appanages_event.1.desc:0 "Avec l'annexion de l'un de nos sujets, la noblesse de ces terres a exprimé son indignation et son mécontentement face à leur nouvelle position au sein de [Root.GetUsableName]. Autrefois détenteurs de titres et de terres, ces hommes ne sont plus qu'un autre sujet qui servira le [Root.Monarch.GetTitle]."
 appanages_event.1.a:0 "Avec le temps, ils accepteront leur place."
