 ###HOLY ORDERS###
 mevlevi_order:0 "Mevlevi"
 mevlevi_order_desc:0 "Fondé à Konya par les disciples de Jalaluddin Muhammad Balkhi, l'Ordre Mevlevi est une branche sunnite du soufisme. Il se consacre à l'étude du Coran et des œuvres de Rûmi."
 bektashi_order:0 "Bektashi"
 bektashi_order_desc:0 "L'Ordre Bektashi est une jeune branche chiite du soufisme. Né en Anatolie, les Bektashis suivent les Quatorze Innocents en plus des Douze Imams."
 ###OTTOMAN MISSIONS###
 tur_the_crescent_fleet_title:0 "La Flotte du Croissant"
 tur_the_crescent_fleet_desc:0 "La première marine de notre grand [Root.GovernmentName] a été établie en 1323 après la capture de la ville de Karamürsel. Depuis lors, notre marine n'a cessé de croître.\nPourtant, nos rivaux sur la mer tels que les derniers Chevaliers Hospitaliers, la République Commerciale Génoise et les Doges de Venise sont toujours une menace pour notre sécurité. Renforcer notre flotte est une grande priorité si nous ne voulons pas être distancés par nos ennemis."
 tur_maritime_presence_title:0 "Une Présence Maritime"
 tur_maritime_presence_desc:0 "Notre marine est notre défense sur la mer, mais ce n'est pas sa seule fonction. Le commerce de la Mer Méditerranée est de notre grand intérêt et ainsi notre marine devrait assurer l'influence des marchés d'Alep, d'Alexandrie ou de Raguse."
 tur_maritime_presence_tt:0 "Une province aléatoire dans votre Nœud Commercial Principal reçoit le dernier bâtiment §YCommercial§! et le modificateur « §YCentre Commercial Dominant§! » jusqu'à la fin du jeu, donnant les effets suivants :\nPuissance Commerciale Locale : §G+10,00§!\nCoût de Développement Local : §G-5 %§!"
 tur_venetian_relations_title:0 "Les Relations avec Venise"
 tur_venetian_relations_desc:0 "La Sérénissime République de Venise s'est affrontée à notre puissance à plusieurs reprises dans le passé déjà. De la Croisade de Nicopolis en 1396 à la Bataille de Gallipoli de 1416 jusqu'au Siège de Thessalonique en 1430, nos deux royaumes ont été en conflit constant. Pourtant, il est plus qu'apparent que nous bénéficions tous deux beaucoup du commerce l'un avec l'autre aussi.\nNous devons prendre une décision sur la façon dont nous traitons les Vénitiens."
 tur_venetian_relations_at:1 "Si nous accomplissons cette mission tandis que §YVenise§! est notre allié :"
 tur_venetian_relations_bt:0 "Cet événement nous donne le choix soit d'§YAccepter l'Accord Commercial avec Venise§! et leur accorder de la Puissance Commerciale dans le Nœud Commercial de §YConstantinople§! en échange de bonus, soit de §YRefuser l'Accord Commercial§! et gagner des revendications permanentes sur toutes les provinces dans les régions §YBalkans§! et §YAnatolie§! qui sont possédées par §YVenise§!, ses sujets ou les membres de sa ligue commerciale."
 tur_the_bospborus_control_title:0 "Sécuriser le Bosphore"
 tur_the_bospborus_control_desc:0 "Le Bosphore est le pont entre l'Europe et l'Asie et notre foyer. Naturellement, c'est bien sûr l'attraction des marchands et voyageurs qui veulent visiter l'autre continent.\nIl est dans notre meilleur intérêt que le Bosphore soit sous le contrôle de ceux en qui nous pouvons avoir confiance."
 tur_the_bospborus_control_at:0 "Les conditions de cette mission dépendent de notre choix dans l'événement « §YUn Accord Commercial [Root.GetAdjective]-Vénitien ?§! » de la mission précédente.\nSi l'Accord Commercial est actif, alors cette mission peut être accomplie en remplissant les conditions suivantes :\n- L'une des conditions suivantes doit être vraie :\n    - §YVenise§! n'existe PAS\n    - L'opinion de §YVenise§! envers §Y[Root.GetName]§! est d'au moins §Y190§!.\n    - §YVenise§! est la Puissance Commerciale la plus forte à §YConstantinople§!.\n"
 tur_the_bospborus_control_bt:0 "Si toutefois nous n'avons pas signé l'Accord Commercial ou si l'Accord Commercial a été rompu, alors les conditions suivantes sont requises :"
 tur_the_bospborus_control_ct:1 "Si nous accomplissons cette mission tandis que nous avons l'Accord Commercial avec §YVenise§! :"
 tur_the_bospborus_control_dt:1 "L'événement nous permet de reconsidérer notre Accord Commercial et de choisir l'une des options suivantes :\n - « §YÉtendre l'Accord Commercial§! » augmentera nos bonus de §GBiens Commerciaux Produits§! dans nos provinces en échange de plus de Puissance Commerciale dans notre Nœud Commercial Principal\n - « §YMaintenir le Statu Quo§! » nous donnera immédiatement §G3 ans de revenus§!\n - « §YMettre Fin à l'Accord Commercial§! » §Ysupprimera le modificateur d'Accord Commercial§! et mettra fin à notre alliance avec §YVenise§!, mais nous donnera les effets suivants :"
 tur_establish_the_pashas_title:0 "Établir les Pachas"
 tur_establish_the_pashas_desc:0 "Le titre de Pacha est un rang civil élevé dans notre système politique et militaire, accordé aux gouverneurs et généraux. À mesure que notre empire grandit, l'assignation de nouveaux Pachas est cruciale pour maintenir et gouverner notre territoire conquis."
 tur_improved_pashas_ct:1 "Réduire l'Augmentation d'Autonomie Locale Minimum à §Y+10,00§! pour les §YPachas§! de provinces qui ne sont pas du groupe culturel §Y[Root.Culture.GetGroupName]§!."
 tur_establish_the_pashas_ct:0 "Jusqu'à §Y10§! provinces qui ont un §YPacha§! assigné et ne sont pas du groupe culturel §Y[Root.Culture.GetGroupName]§! gagnent §G1§! de Main-d'œuvre de Base."
 tur_guns_of_urban_title:0 "Les Canons d'Urban"
 tur_guns_of_urban_desc:0 "L'ingénieur et fondeur de fer hongrois Urban nous a contactés. Il nous offre ses services et ses connaissances pour créer des canons qui seraient la ruine des murs de Babylone elle-même !\nNous devons nous assurer que nous avons accès à ses armes de siège."
 tur_guns_of_urban_at:0 "Si nous accomplissons cette mission en engageant §YUrban§! et avant la §YTechnologie Militaire 5§!, nous obtiendrons le bonus suivant :"
 tur_guns_of_urban_ct:0 "\nEn raison de leur taille et de leurs conceptions archaïques, les canons ottomans seront utilisés exclusivement pour pousser les sièges.\n"
 tur_aftermath_of_varna_title:0 "Conséquences de Varna"
 tur_aftermath_of_varna_desc:0 "Avec la dispersion de l'armée croisée infidèle à Varna, nous avons brisé la dernière résistance significative à la poursuite de notre expansion de nos possessions en Roumélie. Rassemblons nos forces et préparons notre conquête des restes d'un empire pathétique et croulant !"
 tur_aftermath_of_varna_ct:0 "L'événement « §YLa Victoire sur la Croisade de Varna§! » s'est produit.\nL'événement se déclenche dans §Y1 mois§!."
 tur_city_of_worlds_desire_title:0 "La Cité du Désir du Monde"
 tur_city_of_worlds_desire_desc:0 "L'Empire Byzantin n'est plus qu'une coquille de son ancienne gloire. Autrefois maîtres de l'Orient du Danube au Nil, ils ne sont maintenant plus qu'un État croulant noyé dans les conflits internes. Leur seul bastion, leur grande capitale Constantinople, est tout ce qui reste de leur puissance.\nAujourd'hui, cette cité tombera devant la puissance des Ottomans et deviendra le grand joyau de la Maison d'Osman et de notre nouvel empire !"
 tur_train_the_janissary_title:0 "Entraîner les Janissaires"
 tur_train_the_janissary_desc:0 "Les Janissaires furent formés durant le règne de Mourad Ier en 1365 et furent recrutés parmi les fils les plus forts de nos sujets chrétiens. Tous les cinq ans, les fidèles serviteurs du Sultan parcourent notre royaume pour trouver ces fils et les prendre pour le corps des Janissaires. Le temps d'une nouvelle vague de recrues approche à nouveau."
 tur_grant_first_janissary_privileges_title:0 "Privilèges des Janissaires"
 tur_grant_first_janissary_privileges_desc:0 "La majeure partie de notre armée est constituée de levées dont la loyauté va à la noblesse. Les Janissaires sont différents cependant, car leur servitude est destinée au [Root.Monarch.GetTitle] et au [Root.Monarch.GetTitle] uniquement. Cependant, cette obéissance a un prix car ces soldats ont leurs propres agendas et souhaitent être récompensés."
 tur_refill_the_ortas_title:0 "Reconstituer les Ortas"
 tur_refill_the_ortas_desc:0 "La Bataille de Varna fut une victoire cruciale pour nous, mais ses conséquences se font encore sentir. Les pertes que nos troupes ont subies furent lourdes et beaucoup de nos ortas, les bataillons de nos grandes armées, sont incomplets et manquent de nouveaux soldats. Nous devrions reconstruire notre armée et récupérer nos pertes afin de pouvoir poursuivre nos expansions à nouveau."
 tur_refill_the_ortas_tt:0 "§Y[Root.GetName]§! gagne une revendication permanente sur chaque province §YTurque§! en §YAnatolie§! et au §YMashriq§!."
 tur_conquer_anatolian_beyliks_title:0 "Conquérir les Beyliks"
 tur_conquer_anatolian_beyliks_desc:0 "Le Conquérant Timour causa des ravages et la destruction sur nos terres durant l'invasion timouride de l'Anatolie il y a plus de 40 ans. Bien que les Timourides furent finalement expulsés de notre territoire, le mal est déjà fait car plusieurs beyliks se sont libérés de notre emprise. Il est temps d'effacer ces petits princes de la carte et de récupérer les terres pour notre empire."
 tur_unify_anatolia_title:0 "Unifier l'Anatolie"
 tur_unify_anatolia_desc:0 "Depuis la désintégration du puissant Sultanat de Roum, la région anatolienne est disputée par des beyliks, des tribus et même les vestiges de l'ancienne dynastie ayyoubide. Tous tomberont devant notre puissance quand nous unifierons l'Anatolie sous la domination ottomane."
 tur_conquer_the_causcasus_title:0 "Marcher vers les Montagnes"
 tur_conquer_the_causcasus_desc:0 "Les montagnes du Caucase ont longtemps été le foyer de nombreuses tribus et entités politiques chrétiennes. Bien que combattants endurcis, ils sont trop peu nombreux pour nous résister. Nous devrions prendre ces terres pour nous-mêmes, avant que nos ennemis n'aient la chance de le faire."
 tur_black_sea_dominance_title:0 "Dominer la Mer Noire"
 tur_black_sea_dominance_desc:0 "La Mer Noire est le principal point d'accès pour le commerce d'Asie Centrale vers l'Europe. Ainsi, il est dans notre meilleur intérêt de s'assurer que seule la maison d'Osman ait le contrôle sur le littoral de cette étendue d'eau inestimable."
 TUR_PONTIC_TRADE:0 "Contrôle sur la Mer Noire"
 tur_black_sea_dominance_tt:0 "Le littoral de la §YMer Noire§! est soit possédé par §Y[Root.GetName]§!, soit par ses sujets."
 tur_conquer_mesopotomia_title:0 "Le Berceau de la Civilisation"
 tur_conquer_mesopotomia_desc:0 "La Mésopotamie est d'une grande importance sous plusieurs aspects. Pour les érudits, c'est le sol où les premières civilisations humaines ont prospéré. Pour les hommes de religion, l'importance de Bagdad pour l'Islam est hors de question. Et pour nous, ses terres fertiles et sa position stratégique au Golfe Persique en font un atout inestimable de notre empire toujours croissant."
 tur_defeat_the_mamluks_title:0 "Vaincre les Mamelouks"
 tur_defeat_the_mamluks_desc:0 "Le Sultanat Mamelouk d'Égypte a été la puissance dominante du monde islamique depuis que les Mongols ont saccagé Bagdad. Bien qu'ils s'appellent eux-mêmes les protecteurs du Calife et de la Ville Sainte, ils sont devenus faibles et décadents. Le moment est parfait pour revendiquer leurs possessions syriennes et libérer les villes les plus saintes de Jérusalem et Damas de leur emprise."
 tur_defeat_the_mamluks_at:0 "Utiliser ce casus belli contre les @MAM §YMamelouks§! activera une chaîne spéciale d'événements qui peut être déclenchée quand nous contrôlons §Y[MAM.Capital.GetName]§!.\nCet événement nous permettra d'établir un §YEyalet Central§! en §YÉgypte§!."
 tur_conquer_persia_title:0 "Mettre Fin à la Menace Perse"
 tur_conquer_persia_desc:1 "La région de Perse a été gouvernée par de nombreux empires, le dernier étant les Timourides, la force insidieuse qui dévasta les collines d'Anatolie. Même si la puissance des Timourides n'est plus ce qu'elle était, un nouvel empire pourrait surgir dans cette région ; un nouveau lion persan qui essaiera de nous démanteler. Nous devons frapper les premiers et mettre fin à la menace sur notre flanc oriental une fois pour toutes."
 tur_conquer_greece_title:0 "Régner sur la Grèce"
 tur_conquer_greece_desc:0 "Les États du Sud de la Grèce pourraient servir de tremplins aux infidèles pour mener une croisade contre nous. Nous devons sécuriser notre flanc sud pour assurer que le vrai leader de l'Islam prospère."
 tur_conquer_greece_ct:0 "Chaque province §YGrecque§! possédée perd §G100 %§! d'Autonomie Locale et §G20§! Années de Séparatisme."
 tur_push_into_the_balkans_title:0 "Pousser vers le Nord"
 tur_push_into_the_balkans_desc:0 "Depuis que le Roi hongrois Sigismond mena une force de croisés francs contre les forces ottomanes, nous n'avons pas été en sécurité. Bien qu'Allah nous ait accordé la victoire ce jour-là, nous devons pousser plus loin dans les Balkans pour assurer la protection de nos terres à l'avenir."
 tur_push_into_the_balkans_ct:0 "Chaque province dans les §YBalkans§! possédée par §Y[Root.GetName]§! ou ses sujets reçoit les effets suivants :"
 tur_subjugate_romania_title:0 "Subjuguer les Roumains"
 tur_subjugate_romania_desc:0 "Les Princes des royaumes roumains règnent sur des terres relativement pauvres qui sont dans les sphères d'influence hongroise et polonaise. Nous ne pouvons pas permettre à ces territoires de tomber entre les mains de nos ennemis. Les terres roumaines doivent faire partie de notre empire croissant."
 tur_subjugate_romania_at:0 "Si §Y[WAL.GetName]§! est notre sujet, alors il gagne §G-100 %§! de Désir de Liberté."
 tur_subjugate_romania_bt:0 "Si §Y[MOL.GetName]§! est notre sujet, alors il gagne §G-100 %§! de Désir de Liberté."
 tur_expand_the_devshirme_system_title:1 "Destin du Devshirme"
 tur_expand_the_devshirme_system_desc:1 "Notre récente frénésie de conquête nous a apporté de nombreux nouveaux sujets, tous des païens égarés. Le Système du Devshirme nous permet de gagner de nouvelles recrues pour nos armées et des bureaucrates parmi les familles chrétiennes que nous avons soumises. Cependant, ce système reçoit sa juste part de critiques car il a ses inconvénients. Le destin du système est entre nos mains."
 tur_has_abolished_devshirme_system:0 "A aboli le §YSystème du Devshirme§!."
 tur_dismantle_hre_title:0 "Empire Romain que de Nom"
 tur_dismantle_hre_desc:0 "Le Saint-Empire Romain est une honte pour les vrais Romains. Qualifier leur système de gouvernement d'inefficace serait un compliment.\nEncore une fois, c'est à nous de démanteler encore un autre prétendant au vrai trône romain. Le Saint-Empire Romain, un Empire Romain que de nom, tombera aujourd'hui !"
 tur_conquer_hungary_title:0 "Anéantir la Hongrie"
 tur_conquer_hungary_desc:0 "La Hongrie fut l'un des principaux contributeurs à la Croisade franque contre nous. Même si ce n'est pas comme un royaume indépendant mais comme un sujet de la Maison de Habsbourg, les Hongrois posent toujours une sérieuse menace à notre domination dans les Balkans bien après leur défaite à Varna.\nNous devons frapper les premiers et saisir leurs terres pour nous-mêmes avant qu'ils ne puissent se réorganiser dans une autre coalition contre nous."
 tur_conquer_vienna_title:0 "Briser les Habsbourg"
 tur_conquer_vienna_desc:0 "La Maison de Habsbourg a été notre plus grand adversaire dans nos ambitions européennes. Maintenant nos glorieuses armées se tiennent à leur porte, attendant notre ordre pour assiéger le siège du pouvoir des Habsbourg : Vienne, la Porte vers l'Europe."
 tur_conquer_vienna_tt:0 "L'événement §YChute de Vienne§! s'est produit.\nCet événement se déclenche si nous ne sommes PAS §YChrétiens§!, gagnons un siège à §Y[134.GetName]§! et contrôlons la province tandis qu'une province voisine est soit possédée par nous, soit par nos sujets."
 tur_conquer_italy_title:0 "Envahir l'Italie du Nord"
 tur_conquer_italy_desc:0 "Les Italiens furent impliqués dans de nombreux conflits avec nous. Sur mer ou sur terre, les Vénitiens, les Génois et les Forces Papales ont toujours cherché un moyen de mettre fin à notre puissance en Anatolie et dans les Balkans.\nLe destin doit avoir le sens de l'ironie car maintenant c'est nous qui allons nous efforcer de mettre fin à l'influence des Italiens du Nord en Europe."
 tur_devleti_rum_title:0 "Un Véritable Empire Romain"
 tur_devleti_rum_desc:0 "La chute de l'Empire Byzantin n'est pas la fin du véritable Empire Romain. Nous en sommes la continuation réussie, choisie par Allah. Ainsi, c'est notre droit légitime et divin de régner sur l'ancien cœur de l'Empire Romain : la grande cité de Rome elle-même !"
 tur_address_firman_title:0 "Adresser un Firman"
 tur_address_firman_desc:0 "Après la conquête des États musulmans de la Péninsule Ibérique, les musulmans y ont été de plus en plus opprimés par les monarques chrétiens de la région. Beaucoup ont fui vers les nations musulmanes environnantes. Nombre de ces réfugiés hautement éduqués pourraient nous être d'une grande utilité. Le Sultan devrait envisager de publier un Firman, accordant à ces réfugiés le droit de s'installer sur nos terres."
 tur_expelling_annexation_of_moriscos_grants_tt:0 "Si nous accomplissons la mission tandis que les §YMorisques§! ont été expulsés :"
 tur_moriscos_were_expelled_tt:0 "Les §YMorisques Grenadins§! ont été expulsés d'§YIbérie§! ou nous avons §Yrécemment§! accepté l'événement §YRéfugiés Maures§!.\nCes événements se déclenchent si §Y[GRA.GetName]§! tombe aux mains de §Y[CAS.GetName]§!."
 tur_alliance_exchange_population_and_historical_friendship_tt:1 "Si nous accomplissons cette mission tout en étant alliés ou suzerains de §YGrenade§! ou §YAndalousie§! :"
 tur_alliance_exchange_population_and_historical_friendship_at:0 "§Y[GetGranadaOrAndalusia]§! devient un ami historique mutuel de §Y[Root.GetName]§!\n§Y[GetGranadaOrAndalusia]§! gagne §YTurc§! comme culture acceptée jusqu'à ce qu'elle soit rétrogradée\n§Y[Root.GetName]§! gagne §YAndalou§! comme culture acceptée jusqu'à ce qu'elle soit rétrogradée\nJusqu'à §Y10§! provinces de §Y[GetGranadaOrAndalusia]§! gagnent §G1§! développement aléatoire\nJusqu'à §Y5§! provinces de §Y[Root.GetName]§! gagnent §G2§! développement aléatoire"
 tur_allied_married_to_gra_and_tt:0 "A une alliance et un mariage royal avec soit §YAndalousie§!, soit §YGrenade§!."
 tur_develop_constantinople_title:0 "Développer Konstantiniyye"
 tur_develop_constantinople_desc:0 "Konstantiniyye fut victime de nombreux saccages, pillages et raids. C'est à nous de restaurer cette grande cité à la gloire qu'elle mérite vraiment."
 tur_rebuild_the_hagia_sophia_title:0 "Reconvertir Hagia Sophia"
 tur_rebuild_the_hagia_sophia_desc:0 "Autrefois une grande église de la foi orthodoxe, elle est maintenant sous contrôle [Root.Religion.GetName]. Son usage original comme Maison de Dieu pour l'Orthodoxie n'est plus adéquat. À la place, elle deviendra un temple [Root.Religion.GetName] avec le [Root.Monarch.GetTitle] comme protecteur."
 tur_expand_the_city_title:0 "Joyau de la Méditerranée"
 tur_expand_the_city_desc:0 "Konstantiniyye est le cœur de notre empire. Les ressources de notre royaume servent à faire croître et développer la métropole et apporter la prospérité au siège du [Root.Monarch.GetTitle]. Bien que la cité ait grandi depuis que nous l'avons conquise, elle doit encore atteindre son plein potentiel pour devenir le véritable Joyau de la Méditerranée."
 tur_conquer_egypt_title:0 "Subjuguer l'Égypte"
 tur_conquer_egypt_desc:0 "Les Mamelouks sont faibles ; leur domination de l'Égypte est fragile au mieux et leurs forces ne sont pas en position de défendre leur sultanat. Il est temps que l'État mamelouk cesse son existence comme unité indépendante et que l'Égypte soit subjuguée sous notre propre règne."
 tur_control_the_red_sea_title:0 "Contrôler la Mer Rouge"
 tur_control_the_red_sea_desc:1 "Le Commerce des Épices est une affaire profitable et atteint l'Europe par le Golfe Persique et la Mer Rouge. Bien qu'arriver au Golfe Persique soit un petit problème, l'extrémité sud de la Mer Rouge est hors de notre portée. Nous devrions étendre notre influence vers le sud et sécuriser le détroit de Bab el Mandeb."
 tur_establish_the_eyalet_of_adal_title:0 "L'Eyalet d'Adal"
 tur_establish_the_eyalet_of_adal_desc:0 "Nos frères musulmans dans la Corne de l'Afrique risquent d'être submergés par les infidèles chrétiens d'Éthiopie ou, pire encore, les païens des Oromos. Nous devrions intervenir et établir l'Eyalet d'Adal pour sécuriser le contrôle musulman sur cette région.\nBien sûr, la croissance de notre influence en diplomatie et commerce dans la Corne de l'Afrique ainsi que notre emprise renforcée sur la Mer Rouge sont quelques avantages supplémentaires que nous pouvons tirer de cela."
 tur_conquer_tunis_title:0 "Écraser les Hafsides"
 tur_conquer_tunis_desc:0 "Les dirigeants corsaires du Maghreb ont toujours été un peuple indépendant. Bien que leurs actions contre nos ennemis européens soient utiles, elles sont non planifiées et chaotiques. Le temps est venu de les mettre au pas et d'incorporer ces marins endurcis et ces capitaines astucieux dans notre flotte."
 tur_al_andalus_eyalet_title:0 "L'Eyalet d'Al-Andalus"
 tur_al_andalus_eyalet_desc:0 "Les Infidèles d'Ibérie dévastèrent les États musulmans qui dominaient le Sud de la péninsule pendant des siècles et sont maintenant le bastion de la foi chrétienne en Europe Occidentale. Comme nos frontières sont plus proches que jamais, guerres et conflits avec les Ibériques sont inévitables.\nNous devons nous assurer que c'est nous qui montrons notre supériorité. Nous chasserons les Espagnols et les Portugais d'Ibérie et établirons l'Eyalet d'Al-Andalus à sa place !"
 tur_al_andalus_eyalet_ct:1 "Tout allié ou sujet §Y[Root.Religion.GetName]§! de §Y[Root.GetName]§! avec sa capitale en §YIbérie§! possède §Y[225.GetName]§!, §Y[223.GetName]§!, §Y[226.GetName]§! et §Y[224.GetName]§!, ainsi que §Y6§! autres provinces en §YIbérie§!."
 tur_al_andalus_eyalet_at:1 "Si nous accomplissons cette mission par un §YAllié§! ou §YSujet§! en §YIbérie§! :"
 tur_al_andalus_eyalet_bt:0 "L'allié ou le sujet qui remplit les conditions de la mission gagne aussi le modificateur."
 tur_al_andalus_eyalet_dt:0 "L'événement nous permet d'établir un §YEyalet§! en Ibérie."
 tur_the_algerian_corsairs_title:0 "Les Corsaires Algériens"
 tur_the_algerian_corsairs_desc:0 "L'Algérie et la Côte Barbaresque en général ont été un havre de paix pour les pirates musulmans du Maghreb depuis l'époque médiévale. Comme les raiders tunisiens, les activités des Algériens et des Berbères peuvent nous être bénéfiques car ils ciblent nos ennemis chrétiens, mais leur efficacité est... insuffisante. Les dégâts qu'ils pourraient causer seraient d'une grande importance si l'art de gouverner de leurs pays était entre nos mains."
 tur_conquer_morocco_title:0 "Protéger le Maroc"
 tur_conquer_morocco_desc:0 "Le Sultanat du Maroc a été dans une situation précaire depuis que la Reconquista a décimé les musulmans en Ibérie. En tant que fidèles musulmans, c'est notre devoir de prendre le contrôle du Sultanat du Maroc et de le protéger des griffes des royaumes chrétiens avides."
 tur_handle_the_egyptian_eyalet_title:0 "Le Destin des Mamelouks"
 tur_handle_the_egyptian_eyalet_desc:0 "L'Égypte est tombée sous notre assaut implacable et le sultanat mamelouk n'est plus. Pourtant, une chose reste à gérer : le gouvernement de notre territoire nouvellement conquis et le destin des Mamelouks qui régnaient sur ces terres indépendamment."
 tur_handle_the_egyptian_eyalet_at:0 "Les conditions de cette mission sont révélées par la mission §YSubjuguer l'Égypte§!."
 tur_handle_the_egyptian_eyalet_bt:0 "Les récompenses de cette mission sont révélées par la mission §YSubjuguer l'Égypte§!."
 tur_handle_the_egyptian_eyalet_ct:0 "Jusqu'à §Y10§! provinces dans la région §YÉgypte§! gagnent §G1§! de Production de Base."
 tur_fate_of_the_patriarchate_title:0 "Destin du Patriarcat"
 tur_fate_of_the_patriarchate_desc:0 "Konstantiniyye n'était pas seulement le cœur de l'ancien Empire Romain d'Orient, mais aussi le siège du Patriarche de l'Église Orthodoxe Grecque. Comme la cité est sous notre contrôle, le destin du Patriarcat est entre nos mains."
 tur_fate_of_the_patriarchate_tt:0 "L'événement §YDestin du Patriarcat§! s'est produit.\nCet événement se déclenche quand notre capitale est à §Y[151.GetName]§!, nous sommes §YMusulmans§! et §Y[BYZ.GetName]§! n'existe pas."
 tur_fate_of_the_patriarchate_ct:0 "Les conditions supplémentaires dépendent de notre choix dans l'événement §YDestin du Patriarcat§!."
 tur_fate_of_the_patriarchate_at:0 "Les récompenses dépendent de notre choix dans l'événement §YDestin du Patriarcat§!.\nLes options de l'événement montreront les récompenses potentielles."
 tur_allowed_patriarchate_to_exist_tt:1 "\nLa mission §YDestin du Patriarcat§! change ses conditions pour les suivantes :\n§Y2§! Agendas des §Y[Root.GetDhimmiName]§! accomplis\n§Y4§! Privilèges actuellement accordés aux §Y[Root.GetDhimmiName]§!\n\nSes récompenses changent pour les effets suivants :"
 tur_closed_patriarchate_down_tt:1 "\nLa mission §YDestin du Patriarcat§! change ses conditions pour les suivantes :\n§Y2§! Agendas du §Y[Root.GetClergyName]§! accomplis\n§Y4§! Privilèges actuellement accordés au §Y[Root.GetClergyName]§!\n\nSes récompenses changent pour les effets suivants :"
 tur_crimean_khaganate_title:0 "Destin de la Crimée"
 tur_crimean_khaganate_desc:0 "De l'autre côté de la Mer Noire se trouve le Khanat des Tatars de Crimée. Jadis, tous tremblaient devant les puissants guerriers montés des steppes, mais les années leur ont été cruelles, les Lituaniens et les Russes devenant de plus en plus une menace pour leur existence. Bien que ce soit une période sombre pour le Khan, c'est une opportunité parfaite pour nous d'étendre notre influence au Nord soit par la conquête, soit par la diplomatie."
 tur_alliance_cri_tt:1 "Si nous accomplissons cette mission tandis que §YCrimée§! est un §Yallié§! loyal :"
 tur_alliance_cri_at:1 "§Y[CRI.GetName]§! sera §Yconvaincue de prêter vassalité§! à nous durant l'événement §YSuccession au Khanat de Crimée§!."
 tur_alternatively_gain_access_to_tatar_vanguard_merc_comp_and_following_reward_tt:1 "Si nous accomplissons cette mission par la conquête :"
 tur_subject_crimea_reward_tt:0 "Si nous accomplissons cette mission tandis que §YCrimée§! est un §Ysujet§! :"
 tur_conquer_arabia_title:0 "Les Déserts d'Arabie"
 tur_conquer_arabia_desc:0 "La grande péninsule d'Arabie est le berceau de la foi islamique ; le lieu de naissance du grand Prophète Mahomet (paix soit sur lui). En tant que fervents musulmans, il est clair que l'Arabie doit être sous protection [Root.GetAdjective]."
 tur_seize_the_caliphate_title:0 "S'emparer du Califat"
 tur_seize_the_caliphate_desc:0 "Bien que le Califat Abbasside en tant que royaume fut exterminé par le sac mongol de Bagdad, les membres de la maison d'Abbas ont continué à porter le titre de Calife, tout en vivant comme « invités » des Mamelouks. Avec leur défaite, ce Calife fantoche a perdu le dernier de son prestige et de son influence. Le temps est venu pour une nouvelle famille forte de revendiquer la position de Chef de l'Oumma !"
 tur_seize_the_caliphate_at:0 "Cet événement débloquera les missions §YLégalisme§! ou §YMysticisme§!."
 tur_creation_of_persian_eyalet_title:0 "L'Eyalet de Perse"
 tur_creation_of_persian_eyalet_desc:1 "Bien que les hérétiques de Perse ne soient plus un risque pour notre domination dans le monde arabe, leur territoire le long et au-delà des Monts Zagros est difficile à gouverner. Encore une fois, nous avons besoin d'un Eyalet qui administre la région perse pour nous."
 tur_creation_of_persian_eyalet_at:1 "L'événement « §YL'Administration de la Perse§! » s'est produit.\nCet événement se déclenche si nous possédons ou avons un sujet possédant §Y20§! provinces dans la région §YPerse§! et que §YPerse§!, §YArdabil§! OU §YFars§! n'existe pas."
 tur_creation_of_persian_eyalet_bt:1 "Les conditions supplémentaires dépendent de notre choix dans l'événement §YL'Administration de la Perse§!."
 tur_the_silk_road_title:0 "Renaissance de la Route de la Soie"
 tur_the_silk_road_desc:0 "La Route de la Soie était la ligne de vie du commerce médiéval car les marchandises d'Asie et d'Europe étaient échangées par cette voie commerciale. L'essor de notre puissance a mis fin à son importance commerciale cependant, car les infidèles chrétiens étaient bloqués du commerce avec l'orient à cause de nos embargos.\nSi nous voulons profiter à nouveau du commerce avec l'Asie, nous devons nous assurer que les marchandises d'Asie arrivent en Europe par nous."
 tur_imperial_fabrics_title:0 "Tissus Impériaux"
 tur_imperial_fabrics_desc:0 "Les biens commerciaux les plus précieux passant le long de la Route de la Soie sont les soies, les textiles et les tapis. Nous devrions nous efforcer d'apprendre de nos partenaires commerciaux orientaux comment créer des tissus d'une qualité si magnifique. De cette façon, au lieu de seulement commercer les tissus d'autres peuples, nous pourrons vendre les nôtres."
 tur_trade_with_india_title:0 "Commerce en Inde"
 tur_trade_with_india_desc:0 "Le sous-continent indien est un trésor rempli de biens extravagants et de matériaux inestimables. Il va sans dire que les opportunités commerciales en Inde sont abondantes et simultanément lucratives."
 tur_trade_with_india_at:0 "Cet événement rendra le commerce en §YInde§! plus lucratif pour §Y[Root.GetName]§! et son allié indien."
 tur_trade_with_indonesia_title:0 "S'engager dans le Commerce des Épices"
 tur_trade_with_indonesia_desc:0 "Les puissances européennes semblent avoir un besoin insatiable d'épices d'Indonésie. Ils sont prêts à payer des prix ridicules qui seraient impensables au sein de notre État. Nous devrions étendre notre influence outre-mer et siphonner une partie du profit des épices pour nous-mêmes."
 tur_pax_ottomana_title:0 "Pax Ottomana"
 tur_pax_ottomana_desc:0 "Aucune grande puissance de ce monde ne peut rivaliser avec nous ; aucun empire hérétique ou païen ne peut nous menacer. Le peuple de notre grand [Root.GovernmentName] vit en des temps stables et sûrs tandis que le grand [Root.Monarch.GetTitle] règne avec force et sagesse sur notre vaste empire."
 tur_embrace_the_military_doctrines_title:0 "Doctrines de l'Armée"
 tur_embrace_the_military_doctrines_desc:0 "L'armée est l'incarnation de la force et de la puissance d'un empire. Sans armée, aucun empire ne peut imposer sa diplomatie sur la scène des grandes puissances.\nBien que les effectifs soient abondants pour notre armée, c'est la discipline et les doctrines qui gagneront les batailles pour nous en temps d'épée. La construction de nouvelles casernes et de centres de conscription pourrait attirer des hommes de génie militaire dont notre État a clairement besoin."
 tur_collect_the_siyasah_title:0 "Mettre en Place la Siyasah"
 tur_collect_the_siyasah_desc:0 "Le système de taxation de notre domaine est un patchwork complexe de différentes taxes et douanes que nous avons adoptées des territoires conquis. Ainsi, il n'y a pas de système unifié qui maintienne la bureaucratie de la collecte des impôts simple. Peut-être que s'inspirer de la Siyasah d'autres États musulmans pourrait nous aider à atténuer le problème."
 tur_most_humble_ottoman_ceo_title:0 "Le Centre Commercial du Monde"
 tur_most_humble_ottoman_ceo_desc:0 "À mesure que notre empire grandit, grandit aussi l'importance de [Root.Capital.GetName]. Il est apparent que la cité ne sert plus seulement de cœur de notre royaume mais aussi de centre du commerce mondial. Nous devons nous assurer que nous en sommes les plus grands bénéficiaires."
 tur_issue_the_kannuname_title:0 "Publier le Kanunname"
 tur_issue_the_kannuname_desc:0 "En bons musulmans, nos dirigeants ont toujours suivi les préceptes de la Charia établis par le Prophète (paix soit sur lui). Cependant, beaucoup de nos sujets sont d'autres confessions. Bien que dans le passé les autres peuples du livre aient été autorisés à tenir leurs propres tribunaux, cela conduit à un système judiciaire complexe et difficile à manier. Le temps est venu de créer un code juridique qui sera la base de l'état de droit pour tous nos sujets, quelle que soit leur foi."
 tur_3_toh_tt:1 "A §Y3§! de Tolérance envers les Païens."
 tur_3_tot_tt:0 "A §Y3§! de Tolérance de la Vraie Foi."
 tur_3_the_tt:0 "A §Y3§! de Tolérance envers les Hérétiques."
 tur_second_islamic_golden_age_title:0 "Second Âge d'Or Islamique"
 tur_second_islamic_golden_age_desc:0 "L'Âge d'Or Islamique fut une période de grand épanouissement scientifique, culturel et économique des royaumes musulmans. Pour beaucoup d'entre nous, cet âge prit fin avec le tragique Siège de Bagdad en 1258 par la Horde Mongole et l'effondrement du Califat Abbasside.\nAvec notre ascension à l'une des plus grandes puissances, il est temps de raviver le progrès de l'Islam."
 tur_any_islamic_nation_higher_dev_or_army_tt:0 "Aucune autre nation suivant la foi §YIslamique§! n'a plus de §YDéveloppement§! ou de §YTaille d'Armée§! que nous"
 tur_embrace_legalism_title:0 "Embrasser le Légalisme"
 tur_embrace_legalism_desc:0 "Les lois de l'Islam sont notre vie. Elles coulent à travers toutes nos actions, décisions et jugements. Une vie ne suivant pas la parole d'Allah n'est pas une bonne vie.\nNous embrasserons les grandes voies juridiques de notre foi et les incorporerons dans notre culture."
 tur_islamize_the_empire_title:0 "Des Mosquées pour le [Root.GovernmentName]"
 tur_islamize_the_empire_desc:0 "Bien que notre [Root.GovernmentName] abrite de nombreuses religions différentes, c'est un royaume islamique avant tout. Aucun paysan ne devrait avoir à vivre dans un village abandonné par Allah."
 tur_rework_the_devshirme_system_title:0 "Codifier le Fiqh"
 tur_rework_the_devshirme_system_desc:0 "Le fiqh est la compréhension humaine de la charia, les lois religieuses qui forment les traditions de l'Islam. Notre foi joue un rôle crucial dans notre société et notre gouvernement. Nous codifierons le fiqh et le mettrons en œuvre comme l'un des piliers de notre gouvernement."
 tur_embrace_mysticism_title:0 "Embrasser le Mysticisme"
 tur_embrace_mysticism_desc:0 "L'Islam joue un rôle significatif dans notre société et notre culture. Certains dédient même toute leur vie aux lois et règles de notre religion sacrée. Bien que ce ne soit pas nécessairement une qualité négative, l'idée de notre croyance est d'atteindre l'intimité avec Allah.\nEmbrassons le grand Mysticisme de notre religion."
 tur_expand_the_dhimmi_title:0 "Des Mosquées pour les Païens"
 tur_expand_the_dhimmi_desc:0 "Notre [Root.GovernmentName] abrite de nombreuses religions différentes. Bien qu'ils ne le réalisent pas, ils sont toujours aimés par Allah. C'est notre devoir de nous assurer que même nos sujets païens aient une mosquée à visiter."
 tur_develop_the_devshime_system_further_title:0 "Codifier le Soufisme"
 tur_develop_the_devshime_system_further_desc:0 "Bien que nous ne soyons pas aussi stricts avec le code juridique de l'Islam par rapport à d'autres empires musulmans, il est toujours essentiel de codifier les philosophies et les idées du Soufisme dans notre royaume."
 tur_one_faith_empire_title:0 "Un [Root.GovernmentName] [Root.Religion.GetName]"
 tur_one_faith_empire_desc:0 "La gloire de la [Root.Religion.GetName] est avec nous. Purgeons les voies païennes des infidèles de notre [Root.GovernmentName] et assurons la prospérité de la foi [Root.Religion.GetName]."
 tur_spread_the_true_faith_title:0 "Répandre la Vraie Foi"
 tur_spread_the_true_faith_desc:0 "C'est notre devoir divin de répandre la [Root.Religion.GetName] dans ce monde. Que personne ne marche sur le chemin des ténèbres tant que nous portons la lumière de la [Root.Religion.GetName] !"
 tur_spread_the_true_faith_at:1 "Conversion forcée de §Y15§! pays à la §Y[Root.Religion.GetName]§! (§Y[Root.GetNumForceConvertedCountries]§!/§Y15§!)"
 tur_spread_the_true_faith_bt:0 "Converti §Y150§! provinces (§Y[Root.GetNumConvertedProvinces]§!/§Y150§!)"
 tur_dummy_mission_1_title:0 "[Root.GetSelectableMissionTitle]"
 tur_dummy_mission_1_desc:0 "[Root.GetSelectableMissionDescription]"
 tur_dummy_mission_2_title:0 "[Root.GetSelectableMissionTitle]"
 tur_dummy_mission_2_desc:0 "[Root.GetSelectableMissionDescription]"
 tur_dummy_mission_3_title:0 "[Root.GetSelectableMissionTitle]"
 tur_dummy_mission_3_desc:0 "[Root.GetSelectableMissionDescription]"
 tur_legalism_path_trigger_tt:0 "\nSi §Y[Root.GetName]§! choisit la Voie du §YLégalisme§!, les conditions suivantes seront requises pour accomplir cette mission :"
 tur_mysticism_path_trigger_tt:0 "\nSi §Y[Root.GetName]§! choisit la Voie du §YMysticisme§!, les conditions suivantes seront requises pour accomplir cette mission :"
 tur_legalism_path_effects_tt:0 "\nSi §Y[Root.GetName]§! choisit la Voie du §YLégalisme§!, les effets suivants se produiront :"
 tur_mysticism_path_effects_tt:0 "\nSi §Y[Root.GetName]§! choisit la Voie du §YMysticisme§!, les effets suivants se produiront :"
 TUR_OTTOMAN_RED_SEA_ACCESS:0 "Accès Ottoman à la Mer Rouge"
 tur_oppose_the_janissaries_title:0 "Gérer les Janissaires"
 tur_oppose_the_janissaries_desc:0 "Les Janissaires sont devenus puissants dans notre État et représentent une menace active pour la santé de notre gouvernement. Ils doivent être remis en ordre par tous les moyens nécessaires."
 tur_oppose_the_janissaries_bt:0 "A eu le désastre §YCoup des Janissaires§! pendant §Y1 an§!."
 tur_oppose_the_janissaries_at:0 "N'est PAS dans un §YCoup des Janissaires§!.\nCes conditions changent quand nous avons le désastre §YCoup des Janissaires§!."
 tur_oppose_the_janissaries_ct:0 "Active les décisions pour §YCombattre les Janissaires§! et pour §YNégocier avec les Janissaires§! durant le désastre §YCoup des Janissaires§!.\nCes décisions sont requises pour mettre fin au §YCoup des Janissaires§!."
 tur_establish_the_new_army_title:0 "Moderniser l'Armée"
 tur_establish_the_new_army_desc:1 "Nos forces se sont appuyées sur la force et la discipline des Janissaires pendant des décennies. Alors que leur attention s'éloignait d'être une force militaire, la discipline de nos soldats a également drastiquement chuté. Il est temps de moderniser nos armées."
 tur_establish_the_new_army_at:0 "Promulgué la décision §YAffronter les Janissaires dans les Balkans§!."
 tur_establish_the_new_army_bt:0 "Débloque la décision §YAffronter les Janissaires en Anatolie§!."
 tur_establish_the_new_army_ct:0 "Débloque la décision §YAffronter les Janissaires à [Root.Capital.GetName]§!."
 tur_revoke_the_privileges_title:0 "Les Chaînes du Devshirme"
 tur_revoke_the_privileges_desc:0 "Le Système du Devshirme a prouvé sa valeur au fil des ans car il a servi de source principale de nouvelles recrues janissaires pour nos armées. Cependant, avec le temps, le système a été de plus en plus ignoré. Maintenant il travaille même contre notre faveur car il accorde plus de privilèges aux Janissaires sans aucun bénéfice pour l'État.\nNous devrions soit remanier cet ancien système, soit l'abolir définitivement."
 tur_the_mansure_reforms_title:0 "Armée Mansure"
 tur_the_mansure_reforms_desc:0 "L'armée de l'Empire a besoin d'une refonte complète. Le temps des Janissaires, des Yayas et des Derbendjis est révolu depuis longtemps. Maintenant une nouvelle force, l'Armée Victorieuse de Mahomet, mènera notre grande nation à la victoire !"
 tur_the_mansure_reforms_ct:0 "A eu le désastre §YCoup des Janissaires§!."
 tur_the_mansure_reforms_at:1 "Si nous accomplissons cette mission en mettant fin au désastre §YCoup des Janissaires§! en affrontant les Rebelles Janissaires trois fois :"
 tur_crush_the_eyalet_rebellion_title:0 "La Crise des Eyalets"
 tur_crush_the_eyalet_rebellion_desc:0 "Alors que l'autorité de notre [Root.Monarch.GetTitle] est de plus en plus remise en question, les Eyalets, nos sujets autrefois si loyaux pour gouverner nos territoires, se retournent contre nous. La situation doit être stabilisée."
 tur_centralize_the_power_title:0 "Mettre Fin aux Rébellions des Eyalets"
 tur_centralize_the_power_desc:0 "Soit par la diplomatie, soit par l'épée, les Eyalets rebelles doivent être ramenés à l'ordre !"
 tur_centralize_the_power_at:0 "Mettre fin au désastre §YRébellion des Eyalets§!.\nAjouter §G+20§! Raisons supplémentaires pour que les Eyalets acceptent d'être ramenés à l'ordre."
 tur_had_power_struggle_for_three_years_tt:0 "A eu le désastre §YLutte de Pouvoir Interne§! pendant §Y3 ans§!."
 tur_crush_the_eyalet_rebellion_at:0 "A eu le désastre §YRébellion des Eyalets§! pendant §Y1 an§!."
 HAS_BONUS_REIGN_IN_REASON:0 "A une Raison Bonus d'être ramené à l'ordre"
 tur_restructure_the_administration_title:0 "Restructurer l'Administration"
 tur_restructure_the_administration_desc:0 "Les millets, la « loi personnelle » des groupes confessionnels vivant dans notre empire, n'ont jamais été standardisés. Au lieu de cela, les pachas régnants étaient libres de les interpréter et de les appliquer.\nLes millets de notre gouvernement doivent être réformés car ils sont trop autonomes."
 tur_remove_pashas_from_power_title:0 "S'opposer aux Pachas"
 tur_remove_pashas_from_power_desc:0 "Avec la stagnation de notre empire, beaucoup de Pachas sont devenus décadents et trop ambitieux pour leur propre bien. Nous devons nous assurer que ceux qui nous sont loyaux restent au pouvoir tandis que les rebelles sont écartés."
 tur_remove_pashas_from_power_ct:0 "A eu le désastre §YDécadence des Pachas§! pendant §Y5 ans§!."
 tur_remove_pashas_from_power_tt:0 "Mettre fin au désastre §YDécadence des Pachas§!."
 tur_regulate_the_harem_title:0 "Réguler le Harem"
 tur_regulate_the_harem_desc:0 "Le Harem est une entité politique puissante au sein de notre royaume. Initialement destiné à assurer un héritier garanti, les concubines et eunuques du harem ont étendu leur influence bien au-delà de ce dont tout esclave devrait être capable.\nSi l'autorité du Sultan ne doit pas être compromise, alors le harem doit être régulé."
 tur_regulate_the_harem_ct:0 "A eu le désastre §YComplot du Harem§! pendant §Y3 ans§!."
 tur_regulate_the_harem_at:0 "Les £adm£ £dip£ & £mil£ de [Root.Monarch.GetName] totalisent au moins §Y10§!"
 tur_the_reign_of_women_title:0 "Règne des Femmes"
 tur_the_reign_of_women_desc:0 "Le Règne des Femmes est le nom d'une période de notre histoire où le Harem était particulièrement influent dans les prises de décisions gouvernementales et politiques des sultans. Certains membres conservateurs de la société voient cela comme un désastre tragique tandis que d'autres y voient une grande opportunité. La direction que prendra le règne est ouverte..."
 tur_the_reign_of_women_at:0 "Les £adm£ £dip£ & £mil£ de [Root.Monarch.GetName] totalisent au moins §Y15§!"
 tur_the_reign_of_women_tt:0 "Mettre fin au désastre §YComplot du Harem§!."
 tur_the_reign_of_women_bt:0 "La réforme §YGouvernement Ottoman Modernisé§! comportera la mécanique du §YHarem§!.\nLa réforme est débloquée quand nous mettons fin au désastre §YLutte de Pouvoir Interne§!."
 tur_the_reign_of_women_ct:0 "La réforme §YGouvernement Ottoman Modernisé§! ne comportera PAS la mécanique du §YHarem§!.\nLa réforme est débloquée quand nous mettons fin au désastre §YLutte de Pouvoir Interne§!."
 tur_a_new_dawn_title:0 "Une Nouvelle Aube"
 tur_a_new_dawn_desc:0 "Le monde nous considérait comme faibles ; comme un empire insignifiant comme les Romains l'étaient jadis. Nous avons été punis par la stagnation et la traîtrise.\nQue ce monde, qui cherche notre fin, sache que la lumière d'Allah est sur nous. Ce qui semble être le crépuscule de notre grand empire sera connu dans les livres d'histoire de demain comme la Nouvelle Aube de l'Empire Ottoman !"
 ###OTTOMAN FLAVOR EVENTS###
 tur_according_to_ruler_ability_tt:0 "La récompense suivante a été négociée entre §Y[Root.Monarch.GetName]§! et le chef du Corps des Janissaires selon les stipulations de la §YLoi Toprak§!."
 tur_janissaries_kill_ruler:0 "Les §YJanissaires§! rebelles peuvent capturer et exécuter §Y[Root.Monarch.GetName]§! !"
 flavor_tur.3750.a.tt:0 "L'opinion de chaque pays §YOrthodoxe§! connu envers §Y[Root.GetName]§! change de §G+25§!."
 flavor_tur.3750.b.tt:0 "L'opinion de chaque pays §YOrthodoxe§! connu envers §Y[Root.GetName]§! change de §R-25§!."
 flavor_tur.200.t:0 "Un Accord Commercial [Root.GetAdjective]-Vénitien ?"
 flavor_tur.200.desc:0 "Bien que le [VEN.GovernmentName] vénitien et le [Root.GovernmentName] [Root.GetAdjective] aient été impliqués dans plusieurs conflits l'un avec l'autre dans le passé, les marchands de ces deux États ont toujours commercé entre eux. Il pourrait être d'un grand bénéfice mutuel si cette relation commerciale officieuse pouvait être solidifiée dans un accord commercial approprié. Ainsi, le [VEN.Monarch.GetTitle] de Venise est arrivé à la cour de [Root.Monarch.GetName] et a fait une proposition commerciale concluante."
 flavor_tur.200.a:0 "Accepter l'Accord Commercial avec Venise"
 flavor_tur.200.a.tt:0 "§Y[Root.GetName]§! signera un Accord Commercial avec §YVenise§!, leur accordant §G100§! de Puissance Commerciale dans le Nœud Commercial Principal jusqu'à ce que l'alliance entre les deux pays soit dissoute."
 tur_end_of_venetian_trade_deal_tt:0 "jusqu'à ce que §YVenise§! ou les §YOttomans§! rompent leur alliance avec le partenaire commercial"
 TUR_VEN_TRADE_DEAL:0 "Accord Commercial Ottoman-Vénitien"
 flavor_tur.200.b:0 "Refuser l'Accord Commercial"
 flavor_tur.201.t:0 "Fin de l'Accord Commercial [Root.GetAdjective]-Vénitien"
 flavor_tur.201.desc:0 "En raison d'incidents et d'événements internationaux récents, les relations entre les Vénitiens et nous ont atteint un nouveau point bas, rompant l'alliance et dissolvant notre accord commercial."
 flavor_tur.201.a:0 "C'est ainsi."
 flavor_tur.201.a.tt:0 "Toutes les provinces qui bénéficiaient de l'Accord Commercial §Rperdent§! leur bonus de Biens Commerciaux Produits."
 flavor_tur.202.t:0 "Expansion de l'Accord Commercial ?"
 flavor_tur.202.desc:0 "Nous avons signé plusieurs accords généreux avec l'empire marchand de [tur_ottoman_trade_partner.GetName] pour assurer un bénéfice mutuel du commerce. Avec le temps, l'emprise [tur_ottoman_trade_partner.GetAdjective] sur le commerce de la Mer Noire s'est accrue en faveur de l'influence [tur_ottoman_trade_partner.GetAdjective]. Il pourrait être judicieux d'étendre l'Accord Commercial ou d'y mettre fin maintenant en faveur d'une économie plus mercantiliste."
 flavor_tur.202.a:0 "Étendre l'Accord Commercial"
 TUR_VEN_TRADE_DEAL_EXPANDED:0 "Accords Commerciaux Ottoman-Vénitiens Étendus"
 IS_EYALET_EVENT_TT:0 "Cet événement nous permettra de promouvoir notre sujet au statut de §YSujet Eyalet Central§!."
 flavor_tur.202.b:0 "Maintenir le Statu Quo"
 flavor_tur.202.c:0 "Mettre Fin à l'Accord Commercial"
 flavor_tur.203.t:0 "La Victoire sur la Croisade de Varna"
 flavor_tur.203.desc:0 "La paix est à nouveau tombée sur les Balkans avec la défaite des chrétiens à la Bataille de Varna. Le très cher Père de notre Sultan, Mourad, répondit à l'appel aux armes de son Fils pour nous défendre de ces envahisseurs. Il a remporté une grande victoire, bien qu'à un coût non négligeable. Les pertes à la bataille furent lourdes des deux côtés, et nos soldats auront besoin de temps pour se remettre des coups qu'ils ont reçus. Cependant, les chrétiens sont sortis du combat en bien pire état, avec Ladislas III de Pologne, Hongrie et Lituanie mort. La Pologne et la Hongrie se trouvent dans le chaos d'un interrègne. Inshallah, leurs malheurs continueront. Notre victoire a ébranlé l'Europe et la Chrétienté jusqu'au plus profond de leur être, et tous tremblent devant la puissance du Sublime État Ottoman. Personne n'osera lever le petit doigt tandis que nous balayerons les Balkans. La Serbie sera nôtre. La Valachie sera nôtre. Les Albanais seront mis au pas, et Skanderbeg sera tué comme le chien qu'il est. Le plus grand prix, aussi, sera nôtre : Constantinople."
 flavor_tur.203.a:0 "Le sort en est jeté..."
 flavor_tur.204.t:0 "L'Ingénieur de Siège Urban"
 flavor_tur.204.desc:1 "Urban était un fondeur de fer et ingénieur de la province hongroise de Brassó. En tant que l'un des pionniers de l'ingénierie de siège et de la construction d'artillerie, il gagnait sa vie grâce à ses armes de guerre. En [GetYear], Urban tenta sa chance auprès de l'Empereur Byzantin, mais comme ils ne pouvaient ni se permettre son salaire ni ne possédaient les matériaux nécessaires à la construction de tels canons, Urban se vit forcé de se tourner vers le [Root.Monarch.GetTitle] ottoman [Root.Monarch.GetName]. Il promit de créer un canon assez gros et puissant pour faire exploser « les murs de Babylone elle-même »."
 flavor_tur.204.a:0 "Les murs de Babylone elle-même, dites-vous ?..."
 flavor_tur.204.b:0 "Nous ne pouvons pas nous permettre ses services."
 TUR_GRIP_OVER_THE_BOSPBORUS:0 "Emprise sur le Bosphore"
 flavor_tur.205.t:0 "La Grande Capitale Konstantiniyye"
 flavor_tur.205.desc:0 "Les murs sont percés ; la porte est tombée et le joyau de l'autrefois puissant Empire Romain est maintenant en notre possession. Le magnifique [Root.Monarch.GetTitle] ordonna à [Root.Monarch.GetHerHis] troupes d'épargner l'autrefois prospère métropole de tout saccage et incendie supplémentaire car [Root.Monarch.GetSheHe] a des plans pour elle.\nLes murs seront restaurés ; les maisons rénovées et le siège du pouvoir transféré à Konstantiniyye. Parallèlement à ces nombreux efforts pour amener la nouvelle capitale des Ottomans à la gloire qu'elle avait jadis, le gouvernement sous la supervision de [Root.Monarch.GetName] réinstalle beaucoup de gens de la campagne vers la capitale. Cet afflux de population a amené beaucoup d'hommes de talent ; artisans, architectes et artistes en premier lieu. Avec le talent de ces hommes et la main directrice de notre [Root.Monarch.GetTitle], la capitale entre dans une nouvelle ère dorée. Konstantiniyye sera une fois de plus la perle de la Méditerranée."
 flavor_tur.205.a:0 "Ce sera le début de notre ère Classique !"
 flavor_tur.206.t:0 "La Structure de Pouvoir Interne"
 flavor_tur.206.desc:0 "Le gouvernement ottoman est un mariage du système de gouvernance romain avec les lois et idées du Coran. Bien qu'il s'avère efficace pour ses objectifs, il apporte les mêmes problèmes auxquels les anciens Romains devaient faire face : la lutte interne pour le pouvoir. Les Janissaires, le Harem, les Pachas et Eyalets hautement autonomes et les sujets cherchant l'indépendance posent tous une menace vitale à l'État des Ottomans.\n\nHeureusement pour le jeune [Root.Monarch.GetTitle] [Root.Monarch.GetName], ces préoccupations sont pour [Root.Monarch.GetHerHis] successeurs à venir car ceci est la période de l'Essor des Ottomans."
 flavor_tur.206.a:0 "Puissions-nous créer un empire qui passera l'épreuve du temps !"
 flavor_tur.206.a.tt:1 "L'efficacité et la stabilité du gouvernement interne sont mesurées par le niveau du compteur de §YDécadence Ottomane§!. Si ce compteur atteint §Y100§! alors le désastre §YLutte de Pouvoir Interne Ottomane§! sera disponible.\nPassez la souris sur la barre de progression de §YDécadence§! dans l'onglet §YGouvernement§! de votre pays pour voir votre valeur actuelle de §YDécadence Ottomane§! à tout moment."
 flavor_tur.207.t:0 "Déposition du Fléau Chevaleresque"
 flavor_tur.207.desc:1 "Que les Chevaliers de Saint-Jean puissent même prétendre être des hommes de foi est une plaisanterie en soi. Peut-être aux jours de Saladin, ils auraient pu être une organisation honorable, même si toujours païenne. Ces dernières années, cependant, l'ordre n'a été rien de plus qu'une bande de pirates et de pillards harcelant nos routes maritimes et saisissant les biens de nos paisibles marchands. Heureusement, maintenant que nous avons expulsé cette bande de voleurs de Rhodes, nos marchands peuvent à nouveau voyager sur les mers sans être molestés, et les habitants de nos établissements côtiers peuvent dormir sans avoir à craindre des groupes de Francs maraudeurs qui saisissent leurs richesses."
 flavor_tur.207.a:0 "Que nos côtes soient sûres et prospères !"
 flavor_tur.207.a.tt:0 "Chaque province côtière affligée par les raids côtiers recevra :"
 flavor_tur.208.t:0 "Les Janissaires"
 flavor_tur.208.desc:0 "L'armée ottomane était traditionnellement principalement composée de cavalerie. Au milieu du XIVe siècle, Orhan Ier et plus tard son fils, Mourad Ier, introduisirent les Janissaires, une force d'élite dont la loyauté est liée uniquement au Sultan. Formés à partir de prisonniers de guerre et d'esclaves, les Janissaires sont devenus l'épine dorsale de l'armée ottomane, régulièrement payés et hautement disciplinés.\n\nAvec le temps, les Janissaires ont grandi en pouvoir et en influence sur l'État à mesure que les Sultans comptaient de plus en plus sur leurs services. De nos jours, ils forment leur propre classe guerrière dans la société ottomane et peuvent exiger des privilèges significatifs s'ils ne sont pas maîtrisés."
 flavor_tur.208.a:0 "Mais au final, ils ne sont qu'une autre pièce sur l'échiquier."
 flavor_tur.209.t:0 "L'Eyalet de Hongrie"
 flavor_tur.209.desc.a:0 "Le Royaume de Hongrie représentait un rival majeur dans les Balkans. Cependant, même leurs défenseurs les plus tenaces ne purent résister à notre assaut et leur royaume tomba devant la puissance du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. L'autrefois puissant royaume n'est maintenant plus qu'un autre de nos nombreux États sujets. Maintenant la question demeure quelle forme l'administration des terres hongroises prendra..."
 flavor_tur.209.desc.b:0 "Le Royaume de Hongrie représentait un rival majeur dans les Balkans. Cependant, même leurs défenseurs les plus tenaces ne purent résister à notre assaut et leur royaume tomba devant la puissance du [Root.Monarch.GetTitle] [Root.Monarch.GetName]. L'autrefois puissant royaume n'est maintenant plus qu'un autre lot de territoires conquis administrés par nos Pachas."
 flavor_tur.209.a:0 "Établir l'Eyalet Central de Hongrie."
 flavor_tur.209.b:0 "Laissons la Hongrie se gérer elle-même."
 flavor_tur.209.c:0 "La Hongrie deviendra notre territoire central."
 flavor_tur.209.d:0 "Oui oui, un autre royaume s'agenouille devant notre puissance. Oh, l'heure de la poésie !"
 flavor_tur.210.t:0 "L'Administration des Terres Hongroises"
 flavor_tur.210.desc:0 "Le Royaume de Hongrie représentait autrefois un rival majeur dans nos affaires dans les Balkans. Mais le destin ne leur fut pas favorable et leur petit royaume finit par s'agenouiller devant nous. Les nombreuses provinces du royaume sont maintenant en notre propre possession, et bien que les intégrer comme territoire central de notre empire serait plus faisable, il pourrait être intéressant d'envisager la création d'un eyalet qui gouverne les païens pour nous."
 flavor_tur.210.a:0 "Créer l'Eyalet de [first_potential_eyalet.GetName]."
 flavor_tur.210.b:0 "[second_potential_eyalet.GetName] deviendra notre Eyalet de Carpatie."
 flavor_tur.210.c:0 "Seul le royaume de [third_potential_eyalet.GetName] peut représenter nos intérêts."
 flavor_tur.210.d:0 "Il y a peu de bénéfice à avoir un eyalet dans cette région."
 flavor_tur.211.t:0 "Chute de Vienne"
 flavor_tur.211.desc:0 "Vienne, le siège du pouvoir des Habsbourg, rivaux éternels de la Maison d'Osman, est tombée devant la puissance de l'Empire Ottoman ! La cité a opposé une défense honorable contre nos forces ; l'alliance autrichienne a combattu vaillamment mais en vain. Mais au final, aucun de nos adversaires ne put résister à nos tacticiens astucieux et à nos soldats bien disciplinés.\nTandis que la capitale impériale est saccagée, les chrétiens d'Europe craignent notre avance. Car ils savent que notre marche ne s'arrêtera pas à Vienne !"
 flavor_tur.211.a:0 "La porte vers l'Europe est nôtre ! Que ce soit le signe d'une nouvelle ère !"
 flavor_tur.211.a.tt:0 "Chaque pays §YChrétien§! connu en §YAllemagne du Nord§!, §YAllemagne du Sud§! et §YItalie§! reçoit l'événement « §YLa Menace Turque Avance !§! »."
 flavor_tur.212.t:0 "La Menace Turque Avance !"
 flavor_tur.212.desc:0 "Vienne, la capitale du Saint-Empire Romain et la force principale contre l'Empire Ottoman, est tombée ! Les Janissaires assoiffés de sang des Ottomans ont saccagé la cité et dévasté les terres environnantes !\nLes chrétiens de toute l'Europe Centrale se tournent vers leurs dirigeants, exigeant une protection contre la Menace Turque, mais même les rois et doges les plus sages ne peuvent ressentir que de la peur !"
 flavor_tur.212.a:0 "La fin est proche ! Que le Seigneur ait pitié de nos âmes."
 flavor_tur.213.t:0 "La Subjugation de l'Autriche"
 flavor_tur.213.desc:0 "Les relations austro-ottomanes ont été façonnées par les conflits, les guerres et la compétition d'influence dans les Balkans. Finalement cependant, l'Archiduc d'Autriche et Empereur de leur imposteur d'Empire Romain a dû accepter la défaite car leur duché n'est maintenant plus qu'un serf de notre [Root.GovernmentName].\nLe Grand Vizir de [Root.Monarch.GetName] suggéra d'humilier l'autrefois puissant détenteur du titre impérial. Il fit deux propositions : soit nous déposons les Habsbourg d'Autriche et la transformons en un véritable eyalet de notre royaume, soit nous laissons les Habsbourg régner sur leur petit duché et les forçons à accomplir les tâches triviales de gouvernement, leur rappelant chaque jour qu'ils sont les serviteurs de la Maison d'Osman."
 flavor_tur.213.a:0 "Restons pragmatiques. Transformons simplement l'Autriche en notre Eyalet."
 flavor_tur.213.b:0 "Habsburg hizmetkar, il y a une tache par terre. Nettoyez-la."
 flavor_tur.214.t:0 "L'Administration de l'Italie du Nord"
 flavor_tur.214.desc:0 "Les duchés et républiques d'Italie du Nord ont toujours été divisés par leurs querelles intestines et leurs intrigues mesquines. Sans surprise, aucun des États italiens n'avait la moindre chance contre nous. L'un après l'autre, les doges et ducs se sont soumis au [Root.Monarch.GetTitle].\nBien que la conquête des États italiens se soit déroulée relativement sans effort, gouverner le territoire est un défi différent. Il pourrait être intéressant d'établir un eyalet dans ce territoire avec l'un des politiciens locaux nommé pour représenter notre volonté."
 flavor_tur.214.a:0 "Créer l'Eyalet de [first_potential_eyalet.GetName]."
 flavor_tur.214.b:0 "L'État de [second_potential_eyalet.GetName] gouvernera l'Italie du Nord."
 flavor_tur.214.c:0 "Assigner un Pacha pour l'eyalet de [third_potential_eyalet.GetName]."
 flavor_tur.214.d:0 "[fourth_potential_eyalet.GetName] sera notre administrateur."
 flavor_tur.214.e:0 "Les marchands de [fifth_potential_eyalet.GetName] peuvent gérer cette tâche."
 flavor_tur.215.t:0 "Le Destin de la Sicile"
 flavor_tur.215.desc:0 "La Sicile, autrefois foyer de l'un des royaumes islamiques à l'époque médiévale, est maintenant sous notre contrôle. Comme il est de coutume, la question s'est à nouveau posée de savoir si nous devrions établir un nouvel eyalet dans notre territoire conquis. Cependant, alors que la plupart des eyalets utilisent la structure gouvernementale locale dans une certaine mesure pour régner sur la terre, le [Root.GetClergyName] lui-même a contacté [Root.Monarch.GetName]. En raison de l'histoire de la Sicile et de son importance comme centre culturel et politique majeur dans le monde musulman médiéval, le [Root.GetClergyName] souhaite que notre eyalet du sud de l'Italie soit la restauration de l'Émirat de Siqilliya lui-même."
 flavor_tur.215.a:0 "Siqilliya renaîtra de ses cendres."
 flavor_tur.215.b:0 "Leur temps est révolu depuis longtemps. L'Italie du Sud reste sous notre contrôle direct."
 flavor_tur.216.t:0 "La Couronne de Rome"
 flavor_tur.216.desc:0 "L'un des titres les plus contestés de toute l'histoire du monde, Rome était censée avoir pris fin avec la chute de Constantinople dans la première moitié du XVe siècle. Malgré tous les détracteurs qui nous ont jadis refusé ce titre, nous avons accumulé les terres de l'ancien Empire Romain sous notre grandeur et notre contrôle. Nous pouvons ainsi déclarer avec passion que l'ère dorée des empires est toujours forte et à juste titre, le titre appartient à notre Sultan [Root.Monarch.GetName] !"
 flavor_tur.216.a:0 "Nous sommes la continuation du plus grand Empire du monde !"
 flavor_tur.216.b:0 "Rome est peut-être nôtre maintenant, mais notre identité est clairement celle de [Root.GetName]."
 flavor_tur.217.t:0 "Une Nouvelle Capitale Impériale ?"
 flavor_tur.217.desc:0 "Avec la conquête de Rome, la cité même qui donna son nom à l'Empire Romain, notre revendication de la Couronne Romaine ne peut plus être contestée. Comme le cœur de l'empire fait maintenant partie de notre propre royaume, la question se pose de savoir si nous devrions déplacer notre capitale de Konstantiniyye à Roma. Notre règne sur les Italiens serait absolu, mais d'un autre côté nous pourrions étendre les bureaux et l'infrastructure de Konstantiniyye à la place afin de renforcer notre emprise sur les eyalets."
 flavor_tur.217.a:0 "Roma sera la nouvelle capitale."
 tur_accept_all_italian_cultures_tt:0 "Toutes les cultures du groupe culturel §YLatin§! seront acceptées. Cet effet est retiré si nous rétrogradons une culture §YLatine§!."
 tur_take_over_italian_eyalets_tt:0 "Les §YEyalets§! qui ont leur capitale en §YItalie§! céderont toutes leurs provinces en §YItalie§! à §Y[Root.GetName]§!.\n§Y[Root.GetName]§! obtient un cœur territorial sur chaque province cédée."
 flavor_tur.217.b:0 "Konstantiniyye est la seule capitale légitime de l'Empire."
 tur_enable_central_italy_eyalet_event_tt:0 "L'événement §YL'Eyalet de Rome§! est disponible."
 flavor_tur.218.t:0 "L'Eyalet de Rome"
 flavor_tur.218.desc:0 "La grande cité de Rome est nôtre. Cependant, notre décision de maintenir notre capitale à [Root.Capital.GetName] rend le gouvernement de cette cité prestigieuse un défi difficile. Heureusement pour nous, beaucoup sont plus qu'enthousiastes à l'idée d'administrer le territoire autour de cette ancienne capitale impériale."
 flavor_tur.218.a:0 "Établissons l'Eyalet de [first_potential_eyalet.GetName]."
 flavor_tur.218.b:0 "L'Eyalet de [second_potential_eyalet.GetName] gouvernera Rome."
 flavor_tur.218.c:0 "Nous n'avons besoin d'aucune de leur aide. Nous pouvons contrôler Rome nous-mêmes."
 flavor_tur.219.t:0 "Arrivée des Morisques de Grenade"
 flavor_tur.219.desc:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] envoya des proclamations dans tout l'empire stipulant que les réfugiés devaient être accueillis. Il leur accorda la permission de s'installer dans l'Empire Ottoman et de devenir citoyens ottomans. [Root.Monarch.GetSheHeCap] ridiculisa la conduite des monarques de Castille et d'Aragon pour avoir expulsé une classe de personnes si utile à leurs sujets. « Vous osez appeler [CAS.Monarch.GetName] un dirigeant sage », dit-[Root.Monarch.GetSheHe] à ses courtisans — « [CAS.Monarch.GetSheHe] qui a appauvri [CAS.Monarch.GetHerHis] propre pays et enrichi le mien ! » [Root.Monarch.GetName] adressa un firman à tous les gouverneurs de ses provinces européennes, leur ordonnant non seulement de s'abstenir de repousser les réfugiés espagnols, mais de leur réserver un accueil amical et chaleureux. [Root.Monarch.GetSheHeCap] menaça de mort tous ceux qui traiteraient les Morisques durement ou leur refuseraient l'admission dans l'empire."
 flavor_tur.219.a:0 "Ils sont les bienvenus."
 flavor_tur.219.b:0 "Nous ne pouvons pas risquer de mettre en colère les monarques ibériques."
 flavor_tur.220.t:0 "L'Eyalet d'Al-Andalus"
 flavor_tur.220.desc:0 "La Péninsule Ibérique fut autrefois le foyer de nombreux sultanats musulmans au cours de son histoire. Cependant, les Espagnols et les Portugais finirent par chasser les musulmans de la région qui était autrefois Al-Andalus et formèrent leurs propres royaumes sur les cendres de nos frères musulmans. Comme Allah l'a voulu, les infidèles ont été vaincus et Al-Andalus est à nouveau libre de l'influence ibérique.\n\nL'administration d'Al-Andalus est cependant une autre affaire. Affirmer notre contrôle sur cette région directement nécessite de grands efforts et le gain pourrait ne pas en valoir la peine. L'établissement du grand Eyalet d'Al-Andalus pourrait être ce dont nous avons besoin."
 flavor_tur.220.a:0 "En effet. L'Ibérie sera gouvernée par notre eyalet le plus prestigieux."
 flavor_tur.220.b:0 "Le territoire d'Al-Andalus fera partie de notre empire."
 flavor_tur.221.t:0 "L'Eyalet de Tunis"
 flavor_tur.221.desc.a:0 "Le Sultanat Tunisien est un royaume de corsaires et de pirates navigateurs. Bien que frères dans la foi, leurs coutumes ne sont pas particulièrement comparables à la culture des Ottomans. Pourtant, il est indéniable que leurs raids côtiers sont à notre propre grand bénéfice."
 flavor_tur.221.desc.b:0 "Le Sultanat Tunisien est un royaume de corsaires et de pirates navigateurs. Bien que frères dans la foi, leurs coutumes ne sont pas particulièrement comparables à la culture des Ottomans. Pourtant, il est indéniable que leurs raids côtiers sont à notre propre grand bénéfice. Ainsi, il est maintenant administré par nos Pachas."
 flavor_tur.221.a:0 "Nous devrions établir l'Eyalet Central de Tunis."
 flavor_tur.221.b:0 "Laissons les Tunisiens se gérer eux-mêmes."
 flavor_tur.221.c:0 "Tunis deviendra notre territoire central."
 flavor_tur.222.t:0 "L'Administration de Tunis"
 flavor_tur.222.desc:0 "Le Sultanat Tunisien est un royaume de corsaires et de pirates navigateurs. Bien que frères dans la foi, leurs coutumes ne sont pas particulièrement comparables à la culture des Ottomans. Pourtant, il est indéniable que leurs raids côtiers sont à notre propre grand bénéfice. Il pourrait être intéressant d'envisager l'installation d'un eyalet relativement autonome qui partagera son butin avec nous."
 flavor_tur.222.a:0 "En effet. Nous établirons l'Eyalet de [first_potential_eyalet.GetName]."
 flavor_tur.222.b:0 "J'aime le son de l'Eyalet de [second_potential_eyalet.GetName]."
 flavor_tur.223.t:0 "Hayreddin Barberousse"
 flavor_tur.223.desc:0 "Commençant comme corsaire ottoman, Hızır Reis se fit un nom au service de son frère aîné Oruç Reis. En 1516, les frères capturèrent Alger à la couronne espagnole avec Oruç se déclarant Sultan. Quand son frère mourut en 1518, Hızır hérita du surnom d'Oruç « Barberousse » (Barbe Rousse en italien) et reçut le nom honorifique de Hayreddin. Avec le temps, Barberousse gravit les échelons de la marine ottomane et remporta de nombreuses victoires clés en mer qui menèrent à la domination turque de la Mer Méditerranée au milieu du XVIe siècle. Finalement en 1533, Barberousse fut nommé Kapudan Pacha (Grand Amiral) de la Marine Ottomane par le Sultan Soliman le Magnifique."
 flavor_tur.223.a:0 "Il fera un excellent amiral !"
 flavor_tur.224.t:0 "L'Administration d'Alger"
 flavor_tur.224.desc:0 "Alger et la Côte Barbaresque ont été une région de contentieux entre les Maghrébins et les Ibériques pendant des siècles. Avec notre intervention, nous protégeons la région de toute ingérence chrétienne supplémentaire.\nComme il est de coutume, les plans pour établir un autre eyalet sont en préparation..."
 flavor_tur.224.a:0 "Créer l'Eyalet de [first_potential_eyalet.GetName]."
 flavor_tur.225.t:0 "L'Eyalet du Maroc"
 flavor_tur.225.desc:0 "Le Sultanat du Maroc était en danger d'annexion par des mains ibériques pendant des décennies. Heureusement pour eux, notre grand [Root.Monarch.GetTitle] intervint en leur faveur et accorda aux sujets marocains un nouveau foyer dans notre [Root.GovernmentName]."
 flavor_tur.225.a:0 "Nous devrions établir l'Eyalet Central du Maroc."
 flavor_tur.225.b:0 "Les Marocains seront bien traités."
 flavor_tur.225.c:0 "Le territoire marocain devrait devenir des provinces appropriées de notre empire."
 flavor_tur.226.t:0 "L'Administration du Maroc"
 flavor_tur.226.desc:1 "Le Sultanat du Maroc était en danger d'annexion par des mains ibériques pendant des décennies. Heureusement pour eux, notre grand [Root.Monarch.GetTitle] intervint en leur faveur et accorda aux sujets marocains un nouveau foyer dans notre [Root.GovernmentName]. Comme la distance entre [Root.Capital.GetName] et les terres marocaines est trop grande pour que nous les gouvernions efficacement, il pourrait être intéressant d'envisager l'établissement d'un eyalet dans cette région."
 flavor_tur.226.a:0 "L'Eyalet de [first_potential_eyalet.GetName] sera notre frontière la plus occidentale."
 flavor_tur.227.t:0 "L'Eyalet d'Adal"
 flavor_tur.227.desc:0 "Le Sultanat d'Adal est entouré par les ennemis de l'Islam. Le royaume copte d'Éthiopie à l'ouest ainsi que les païens du sud menaçaient l'existence du sultanat, et c'est seulement grâce à notre intervention que les Adaliens n'ont pas à craindre l'oppression sous un règne païen."
 flavor_tur.227.a:0 "Nous devrions établir l'Eyalet Central d'Adal."
 flavor_tur.227.b:0 "Les Adaliens seront bien traités."
 flavor_tur.227.c:0 "Le territoire adalien devrait devenir des provinces appropriées de notre empire."
 flavor_tur.228.t:0 "L'Administration de la Corne"
 flavor_tur.228.desc:0 "Notre [Root.GovernmentName] s'est étendu dans la Corne de l'Afrique. Là où régnaient autrefois les fiers Sultanats d'Adal et de petits royaumes chrétiens, maintenant le drapeau des Ottomans flotte.\nLes territoires au-delà de l'Égypte sont cependant hors de notre portée. Bien que les administrer serait faisable, il pourrait être plus bénéfique pour nous si un eyalet en prend le contrôle à la place."
 flavor_tur.228.a:0 "L'Eyalet de [first_potential_eyalet.GetName] sera notre frontière la plus méridionale."
 flavor_tur.229.t:0 "Nouveau Chef de l'Oumma"
 flavor_tur.229.desc:0 "Depuis la conquête d'Edirne par Mourad Hüdavendigar en 1362, nos Sultans ont formellement revendiqué le titre de Calife, le chef de l'Oumma. Maintenant que nous avons un contrôle ferme sur Le Caire, cependant, nous avons réussi à convoquer le dernier Calife Abbasside, Al-Mutawakkil III, à Konstantiniyye pour remettre officiellement le titre de Calife au Sultan [Root.Monarch.GetName], lui donnant l'épée et le manteau de Mahomet. Non seulement c'est une grande position pour notre Sultan au niveau national, mais cela lui accorde également l'autorité sur tous les musulmans en dehors de nos frontières, nous donnant une plus grande opportunité de protéger ceux qui ont la malchance d'être gouvernés par des non-musulmans.\nLa question demeure cependant quelle voie religieuse et spirituelle notre Califat prendra. Les voies du Légalisme et du Soufisme sont toutes deux présentes dans notre gouvernement, mais une seule d'entre elles peut être poursuivie au niveau gouvernemental."
 flavor_tur.229.a:0 "Nous devons embrasser et protéger les lois de l'Islam."
 tur_legalism_path_tt:0 "Débloquer la voie de mission du §YLégalisme§!."
 flavor_tur.229.b:0 "C'est seulement par le mysticisme que nous pouvons trouver la miséricorde d'Allah."
 tur_mysticism_path_tt:0 "Débloquer la voie de mission du §YMysticisme§!."
 flavor_tur.230.t:0 "La Fin du Califat"
 flavor_tur.230.desc:0 "Depuis la conquête d'Edirne par Mourad Hüdavendigar en 1362, nos Sultans ont formellement revendiqué le titre de Calife, le chef de l'Oumma. Cependant, les décennies suivantes ont forcé notre État à changer et à embrasser la foi [Root.Religion.GetName]. Ainsi, le titre de Califat n'a plus aucune signification pour nous. Comme le destin l'a voulu, nous avons réussi à capturer le Calife Abbasside et l'avons amené à [Root.Capital.GetName]. Par cet acte, l'idée d'un Califat a non seulement pris fin en [Root.GetUsableName] mais aussi dans tout le monde musulman."
 flavor_tur.230.a:0 "Quel tournant ironique des événements."
 tur_non_muslim_path_tt:0 "Débloquer la voie de mission §YReligieuse§!."
 flavor_tur.231.t:0 "Victoire pour la Maison de [Root.Monarch.Dynasty.GetName]"
 flavor_tur.231.desc:0 "« C'est magnifique ; assez magnifique pour faire venir les larmes aux yeux d'un homme. Oh, je pleure ! Je pleure de voir mon Empire prospérer ainsi. Mes armées ont soumis toute l'Anatolie, les petits Beys et les Moutons Blancs pareillement mis au pas. Arméniens, Kurdes et Grecs Pontiques m'appellent tous leur Sultan. Comme le Tout-Puissant m'a béni, pour que je puisse régner sur des terres si vastes et grandes ; qu'Osman Ghazi lui-même doit regarder vers moi, sachant que son héritage est sûr et sécurisé entre mes mains. Mon cœur palpite à cette pensée. »\n- [Root.Monarch.GetTitle] [Root.Monarch.GetName]"
 flavor_tur.231.a:0 "Un jour de célébration !"
 flavor_tur.232.t:0 "L'Église Orthodoxe Copte"
 flavor_tur.232.desc:0 "L'Église Copte et ses fidèles habitent la région du Caucase depuis des siècles. Guerres et famines ont ravagé la région alors que chaque conquérant aspirant jetait son dévolu pour régner sur les peuples de ces montagnes. Cependant, les montagnes elles-mêmes tremblent devant nous et les royaumes et tribus chrétiennes divisés font maintenant partie de notre sphère de pouvoir."
 flavor_tur.232.a:0 "Aucune montagne n'est trop escarpée pour nous à conquérir !"
 flavor_tur.233.t:0 "L'Eyalet du Yémen"
 flavor_tur.233.desc:0 "Le Sultanat du Yémen est dans une position commerciale forte car il est directement au Golfe d'Aden. Autrefois menacé par les forces chiites de cette région, il fait maintenant partie de notre empire toujours croissant et notre nouveau candidat pour un nouvel eyalet."
 flavor_tur.233.a:0 "Nous devrions établir l'Eyalet Central du Yémen."
 flavor_tur.233.b:0 "Le Yémen jouira d'une période de prospérité sous notre règne."
 flavor_tur.233.c:0 "Le territoire yéménite devrait devenir des provinces appropriées de notre empire."
 flavor_tur.234.t:0 "L'Administration du Yémen"
 flavor_tur.234.desc:0 "Notre [Root.GovernmentName] a conquis les parties méridionales de l'Arabie. Le Sultanat du Yémen et ses territoires appartiennent maintenant à l'Empire Ottoman.\nLe Golfe d'Aden est loin de [Root.Capital.GetName] cependant. Bien que l'administrer serait faisable, il pourrait être plus bénéfique pour nous si un eyalet en prend le contrôle à la place."
 flavor_tur.234.a:0 "L'Eyalet de [first_potential_eyalet.GetName] protégera le Golfe."
 flavor_tur.236.t:0 "L'Administration de la Perse"
 flavor_tur.236.desc:0 "L'histoire de la Perse et des Ottomans est entachée de sang même plusieurs années avant notre conquête de la région. Les Timourides dévastèrent des parties majeures de l'Anatolie et causèrent le premier et unique interrègne après la bataille d'Ankara en 1402. Mais même aujourd'hui, les relations entre le peuple turc et les Perses sont sous-optimales en raison de différences culturelles et religieuses.\nBien que nous soyons maintenant le suzerain de la région perse, ce n'est qu'une question de temps avant que les Perses ne se rassemblent sous une bannière pour combattre pour leur indépendance. L'établissement d'un eyalet qui gère cette région problématique en notre nom pourrait être la décision la plus sage."
 flavor_tur.236.a:0 "En effet. L'Eyalet de Perse maintiendra les Perses dans le rang."
 flavor_tur.237.t:1 "Suprématie sur la Perse"
 flavor_tur.237.desc:1 "L'Empire de Perse est vaincu, et ses vastes possessions sont tombées sous la juridiction juste de notre très Sublime Califat. En effet, un ennemi puissant et redoutable mais même la grande Perse ne peut se dresser entre nous et notre destin ultime. Bien que beaucoup de sang fut versé et de nombreux martyrs nés de cette conquête, les peuples de ces terres sont frères dans la foi, et méritent le respect. En effet, nous régnerons justement et honorerons l'histoire de cette terre en restaurant la Perse à sa gloire perdue depuis longtemps comme membre estimé de notre Empire toujours grandissant."
 flavor_tur.237.a:0 "Leur héritage et leur expertise serviront [Root.Monarch.GetName] !"
 flavor_tur.238.t:0 "Système des Millets"
 flavor_tur.238.desc:0 "Le Système des Millets nouvellement conçu fait partie de l'administration ottomane des communautés religieuses séparées qui reconnaissait l'autorité de chaque communauté dans la supervision de ses propres affaires communautaires, principalement à travers des systèmes judiciaires et des écoles religieuses indépendants. Cette approche nous aidera à maintenir une emprise ferme sur les territoires non-musulmans dans les Balkans et au-delà."
 flavor_tur.238.a:0 "Ces communautés font partie de notre grand Empire."
 flavor_tur.239.t:0 "Soliman le Magnifique"
 flavor_tur.239.desc:0 "Né comme fils du Sultan Sélim Ier et de Hafsa Sultan, une convertie musulmane, Soliman a montré un talent si exceptionnel rarement vu chez les Sultans Ottomans de l'époque. C'était un homme très instruit, et on lui enseigna la Littérature Islamique dès son plus jeune âge. Il s'intéressa également à des sujets dont la plupart des jeunes hommes seraient rebutés comme la science, l'histoire, la littérature et les tactiques militaires. S'il est désigné comme héritier de l'Empire, beaucoup sont sûrs que l'Empire atteindra son apogée."
 flavor_tur.239.a:0 "La couronne du prince est à lui !"
 flavor_tur.239.b:0 "Aussi prometteur soit-il, [Root.Heir.GetName] régnera un jour."
 tur_10_dev_randomly_given_to_christian_provinces_tt:0 "§G10§! de Développement est aléatoirement distribué parmi §Y10§! provinces §YChrétiennes§! possédées aléatoires."
 flavor_tur.240.t:0 "Effondrement du Sultanat Mamelouk"
 flavor_tur.240.desc:1 "Appeler le racket de protection que les Mamelouks ont fait fonctionner en Égypte et au Levant un État serait une évaluation généreuse, pour le moins. Que leur règne ait duré si longtemps est un miracle à contempler. Maintenant, cependant, dans notre plus récent conflit avec eux, les armées de notre grand Sultan ont taillé une voie de loi et d'ordre à travers la Syrie et jusqu'en Égypte. De plus, maintenant que [From.GetCapitalName] est tombée aux mains de nos forces, l'administration mamelouke s'est pratiquement effondrée dans leurs terres, et aucun véritable gouvernement central ne reste pour s'opposer à nous dans la saisie de l'ensemble des terres du Sultanat pour nous-mêmes. Cependant, sans aucun doute, notre saisie immédiate de toutes ces terres nécessiterait de s'appuyer sur des courtiers de pouvoir locaux, et l'intégration des terres du Sultanat dans notre administration serait un exploit herculéen."
 flavor_tur.240.a:0 "Leurs terres appartiennent au Sultan [Root.Monarch.GetName] !"
 flavor_tur.240.a.tt:2 "Si nous tenons §Y[MAM.Capital.GetName]§! pendant §Y3 ans§! tandis que nous avons §Y90 %§! de Score de Guerre contre §Y[MAM.GetName]§! alors l'événement §YChute du Sultanat Mamelouk§! se déclenche, nous permettant de signer une Paix Blanche avec les §YMamelouks§! et de créer l'§YEyalet d'Égypte§! immédiatement."
 flavor_tur.240.b:0 "Lentement mais sûrement on gagne la course..."
 flavor_tur.240.b.tt:0 "Nous n'aurons plus jamais la chance de créer l'§YEyalet d'Égypte§! sans un traité de paix."
 flavor_tur.241.t:0 "Effondrement du [Root.GovernmentName]"
 flavor_tur.241.desc:0 "Avec l'occupation turque de [Root.Capital.GetName], le règne déjà fragile de notre gouvernement fait face à un effondrement complet. L'administration ainsi que l'armée sont en désarroi tandis que les troupes ottomanes prennent le contrôle de la vaste région d'Égypte !"
 flavor_tur.241.a:0 "Quelle horreur !"
 flavor_tur.241.a.tt:0 "§R§Y[From.GetName]§! nous transformera en leur sujet Eyalet Central sans aucune négociation de paix si nous ne reprenons pas §Y[Root.Capital.GetName]§! dans les §Y3 prochaines années§!.§!"
 flavor_tur.242.t:0 "Chute du Sultanat Mamelouk"
 flavor_tur.242.desc:0 "La cité de [MAM.Capital.GetName] est sous contrôle ottoman tandis que le gouvernement mamelouk est sur le point de s'effondrer. Ce misérable Sultanat n'est rien d'autre qu'un souvenir insultant de ce qu'était autrefois le Califat Abbasside avant de se morceler en ses nombreux États successeurs. Il est devenu très évident que le sultanat ne peut plus se maintenir. Les administrateurs mamelouks, qui sont emprisonnés à [MAM.Capital.GetName], ont contacté [Root.Monarch.GetName], suggérant de mettre fin immédiatement à cette guerre en remettant tout le Sultanat à notre [Root.Monarch.GetTitle] en échange de leur service continu dans l'administration égyptienne."
 flavor_tur.242.a:0 "Un plan judicieux en effet. Mettons fin à cette guerre maintenant."
 tur_mamlukian_administration_tt:0 "jusqu'à ce qu'ils ne soient plus un sujet ou jusqu'à ce que leur suzerain accomplisse la mission « §YLe Destin des Mamelouks§! »"
 flavor_tur.242.b:0 "Non. Nous n'accepterons pas une administration partiale en Égypte."
 flavor_tur.243.t:0 "Indépendance de l'Eyalet Égyptien"
 flavor_tur.243.desc:0 "Plus d'esclaves de l'Empire Ottoman, notre pays est enfin libre de son influence ! Ainsi, notre administration est maintenant entièrement sous notre propre contrôle, et nous pouvons enfin nous appeler Égypte."
 flavor_tur.243.a:0 "Merveilleux."
 flavor_tur.244.t:0 "L'Égypte sous Domination Ottomane"
 flavor_tur.244.desc:0 "Le Sultanat Mamelouk n'est plus. Là où il se tenait autrefois se trouve maintenant notre Eyalet qui gouvernera ces terres pour nous. Bien que cela signifie des changements sérieux et menaçants pour de nombreux anciens officiels mamelouks, la majorité des Égyptiens vivant dans cette région voient cela comme un signe de nouveau développement de leurs terres natales alors que marchands et artisans de [Root.Capital.GetName] voyagent vers Alexandrie dans l'espoir de trouver de nouvelles opportunités. Ce n'est qu'une question de temps avant que l'Égypte n'atteigne son plein potentiel sous la direction des investisseurs turcs."
 flavor_tur.244.a:0 "Puissent-ils apporter la prospérité à l'Égypte."
 flavor_tur.245.t:0 "Le Vol de Legari Hasan Celebi"
 flavor_tur.245.desc:0 "« Ô mon sultan ! Soyez béni, je vais parler à Jésus ! » Ce sont les mots que Legari Hasan Celebi adressa à [Root.Monarch.GetName] alors qu'il s'apprêtait à décoller dans ce qui semblait être une drôle et bizarre machine mécanique pleine de produits chimiques et de poudre à canon. Qui peut dire ces jours-ci avec toutes ces nouvelles tendances dans lesquelles notre peuple s'engage. Tant qu'il porte des protège-genoux !"
 flavor_tur.245.a:0 "Contrôle au sol à Major Celebi !"
 tur_celebi_goes_bye_bye:0 "Celebi rencontre Jésus par une mort tragique, mais humoristique."
 flavor_tur.245.b:0 "Hors de ma vue, vil mendiant !"
 flavor_tur.246.t:0 "L'École Impériale du Génie Militaire"
 flavor_tur.246.desc:1 "Toutes les recrues (Acemi Oglan) du Système du Devshirme doivent passer par l'académie militaire pour leur formation afin de devenir membres des Janissaires. Cependant, à mesure que de nouvelles recrues du Devshirme affluent vers [Root.Capital.GetName], il devient plus apparent d'année en année que chaque étudiant n'est pas le même. Des jeunes hommes de grand talent et d'habileté intellectuelle ont prouvé qu'ils étaient au-dessus du niveau d'un simple fantassin. Afin de faciliter leur potentiel, le [Root.GovernmentName] a ouvert l'École Impériale du Génie Militaire à [Root.Capital.GetName]. Les diplômés de cette école apprennent tout en matière de logistique, de manœuvres et de construction d'engins de siège."
 flavor_tur.246.a:0 "Excellent."
 flavor_tur.247.t:0 "Développement du Devshirme"
 flavor_tur.247.desc:0 "Avec la conquête de plus de terres païennes, le Devshirme avait un besoin urgent d'une expansion de sa bureaucratie. Grâce aux réformes de [Root.Monarch.GetName] et de ses conseillers, le Système du Devshirme s'est développé en une institution sophistiquée de [Root.GetUsableName] qui extrait de jeunes recrues potentielles même des coins les plus reculés du [Root.GovernmentName]. Tout ce qui est requis est la codification officielle faite par notre [Root.Monarch.GetTitle]..."
 flavor_tur.247.a:0 "Codifier ces changements."
 flavor_tur.247.b:0 "Cela peut attendre."
 flavor_tur.248.t:0 "Entreprises Commerciales en Orient !"
 flavor_tur.248.desc:1 "Mon [Root.Monarch.GetTitle] ! Nos efforts en Orient ont porté leurs fruits. Il semble que vos investissements antérieurs aient été une dépense sage. Nos marchands rapportent que nous sommes maintenant parmi les plus grandes puissances commerciales entre [Root.Capital.GetCapitalName] et l'Inde."
 flavor_tur.248.a:0 "L'argent fait tourner le monde !"
 flavor_tur.249.t:0 "Mise en Œuvre de la Siyasah"
 flavor_tur.249.desc:0 "Une gestion appropriée de nos terres est la base sur laquelle nous construirons un empire qui résistera à l'épreuve du temps. Pour ce faire, le Sultan [Root.Monarch.GetName] a rassemblé toutes les meilleures lois byzantines, avec attention aux détails et ample considération pour la Charia, et s'est grandement inspiré de la Siyasah pour créer un système de taxation unique et cohérent pour l'empire. Le grand [Root.Monarch.GetTitle] les a ajoutées dans un seul tome d'apprentissage et de compréhension juridique. Tout ce qui est maintenant requis est la codification légale pour que cette réforme devienne réalité."
 flavor_tur.249.a:0 "Signer la codification."
 flavor_tur.249.b:0 "Pas maintenant."
 flavor_tur.250.t:1 "La Cité de Bagdad"
 flavor_tur.250.desc:0 "Ancienne capitale des Abbassides ! Bagdad, cité de la loi ! La cité du grand Calife Al-Mansour est tombée dans les bras de l'empire ottoman, et l'estimé [Root.Monarch.GetName] héritier juste et légitime du Califat. Ô Noble Bagdad, longtemps victime d'injustice et d'indignité... après tant d'années de désolation et de profanation ; d'abord aux mains des hordes dépravées de l'Extrême-Orient, puis les honteux Timourides, et enfin la terrible mauvaise gestion du supposé « Empire Perse », enfin un intendant approprié pour cette cité très estimée ! Que Bagdad soit à jamais un phare brillant de la jurisprudence hanafite, et une inspiration pour tous ceux qui incarnent la Foi Sunnite !"
 flavor_tur.250.a:0 "Le cœur battant de l'innovation et des études savantes !"
 flavor_tur.251.t:0 "Réforme des Sipahis"
 flavor_tur.251.desc:0 "Aussi féroces que disciplinés, bien des infidèles sont tombés par leur épée ou leur arc. Les Tatars sont en effet une force de combat redoutable et habile. Nous avons devant nous une opportunité d'enrôler les services de ces guerriers, et ce faisant d'étendre grandement la capacité de nos Sipahis. Bien que sans doute un atout pour nos forces de combat, certains craignent que les Janissaires et la noblesse ne s'offusquent de tels arrangements."
 flavor_tur.251.a:0 "Renforcer les Sipahis."
 flavor_tur.251.b:0 "N'irritons pas les Janissaires."
 flavor_tur.252.t:0 "Tissage, Or et Soie"
 flavor_tur.252.desc:0 "Longtemps l'ornement favori de la noblesse, depuis les temps anciens, depuis les jours glorieux de Rome ! La Soie : Aucun textile n'est plus recherché, et aucun empire n'en est plus riche que le nôtre ! Bien plus qu'un simple tissu, c'est un témoignage de richesse et de pouvoir, d'influence et de révérence ; un objet de vénération et d'admiration de tous, paysan et noble pareillement. Quelle bénédiction que nous soyons si bien positionnés pour bénéficier du commerce de ce matériau, et quel témoignage du destin divin de notre Empire et de notre peuple. Tout comme nos robes de soie enveloppent les corps des monarques du monde et ornent leurs grandes salles, ainsi notre radiance sublime enveloppera ce monde."
 tur_25_goods_fabrics_tt:0 "Chaque province possédée qui produit de la §YLaine§!, du §YDrap§!, du §YCoton§!, de la §YSoie§! ou des §YTeintures§! gagne §G+10,0 %§! de modificateur local de Biens Produits jusqu'à la fin du jeu."
 flavor_tur.252.a:0 "Nous tissons les étoffes de la vie elle-même."
 flavor_tur.253.t:0 "Le Développement du Commerce en Égypte"
 flavor_tur.253.desc:0 "Maintenant que l'Égypte est sous les mains directrices de dirigeants véritablement magnanimes qui ont cherché à investir dans la terre plutôt que de simplement extraire taxes et tarifs comme les Mamelouks voulaient le faire, les terres du Delta du Nil sont une fois de plus devenues une région prospère grouillant de marchands du monde entier. Nous sommes en position de profiter significativement du commerce passant par l'Égypte et remontant vers Konstantiniyye. L'endroit évident pour concentrer nos investissements est la côte méditerranéenne de l'Égypte. Cependant, un ingénieur ambitieux est venu à nous avec un autre plan d'investissement dans le commerce égyptien."
 flavor_tur.253.a:0 "Concentrer nos efforts sur la côte."
 flavor_tur.253.b:0 "J'ai une meilleure idée..."
 flavor_tur.254.t:0 "Le Système des Trois Cours de l'Empire Ottoman"
 flavor_tur.254.desc:0 "À mesure que notre [Root.GovernmentName] s'étend et assimile les peuples et cultures de ses terres les plus éloignées, nous sommes confrontés à la question de comment ces citoyens non-musulmans de notre sublime empire doivent être traités. Bien qu'ils n'embrassent pas la vérité de l'Islam et ne seront jamais tenus en aussi haute estime que nos citoyens natifs, nous devons adhérer aux préceptes établis par la Charia et traiter tous équitablement, ainsi qu'exercer une jurisprudence juste, de peur d'être pires que les Rois barbares d'Europe qui persécutent nos frères avec le plus grand préjudice. Il est proposé qu'un système judiciaire de « Trois cours » soit mis en œuvre pour traiter plus justement les affaires des non-musulmans et des entités d'intérêt économique."
 flavor_tur.254.a:0 "La loi sultanale règne suprême pour tous les sujets ottomans."
 flavor_tur.255.t:0 "Second Âge d'Or Islamique"
 flavor_tur.255.desc:0 "L'Âge d'Or Islamique fut une période de grand épanouissement scientifique, culturel et économique des royaumes musulmans. Cet âge prit fin avec le tragique Siège de Bagdad en 1258 par la Horde Mongole et l'effondrement du Califat Abbasside.\nAvec la restauration du Califat sous [Root.Monarch.GetTitle] [Root.Monarch.GetName], la perception de l'Islam dans son ensemble change une fois de plus. Unifiés sous la bannière ottomane, érudits, théologiens et artistes sont une fois de plus libres de vivre une vie exempte de soucis mondains. Les scientifiques voient une promotion active de leur travail tandis que les architectes sont bénis par Allah avec des tâches de construction de nouvelles mosquées. Tout cela tandis que la piété religieuse dans la foi islamique connaît sa propre renaissance. Véritablement, c'est le début d'une nouvelle, seconde ère dorée pour l'Islam et tous ceux qui le suivent."
 flavor_tur.255.a:0 "Alhamdulillah ! Que ce soit un âge de grandeur pour notre foi !"
 tur_enable_second_golden_era_decision_tt:0 "Chaque pays §YMusulman§! peut promulguer un §YSecond Âge d'Or§! ou prolonger son §YÂge d'Or§! actuel de §Y50§! ans."
 flavor_tur.255.a.tt:0 "Chaque pays §YMusulman§! reçoit l'événement « §YSecond Âge d'Or Islamique§! »."
 flavor_tur.256.t:0 "Second Âge d'Or Islamique"
 flavor_tur.256.desc:0 "Avec la restauration du Califat sous [From.Monarch.GetTitle] [From.Monarch.GetName], la perception de l'Islam dans son ensemble change une fois de plus. Unifiés sous la bannière ottomane, érudits, théologiens et artistes sont une fois de plus libres de vivre une vie exempte de soucis mondains. Les scientifiques voient une promotion active de leur travail tandis que les architectes sont bénis par Allah avec des tâches de construction de nouvelles mosquées. Tout cela tandis que la piété religieuse dans la foi islamique connaît sa propre renaissance.\nL'impact de [From.GetUsableName] se fait également sentir en [Root.GetUsableName] car notre propre population semble inspirée par l'exclamation de [From.Monarch.GetName] pour un nouvel Âge d'Or de l'Islam."
 flavor_tur.256.a:0 "Que ce soit un temps de richesse et de prospérité pour l'Islam !"
 flavor_tur.257.t:0 "Mise en Œuvre du Fiqh"
 flavor_tur.257.desc:0 "Le fiqh est la compréhension humaine de la charia, les lois religieuses qui forment les traditions de l'Islam. Comme notre foi joue un rôle critique dans tous les aspects de notre société, il est évident que le Grand Vizir de [Root.Monarch.GetName] intègre le fiqh dans la législation ottomane. Tout ce qui reste maintenant est la signature du [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself]..."
 flavor_tur.257.a:0 "À partir de ce jour, les valeurs religieuses font partie de la loi ottomane."
 flavor_tur.257.b:0 "J'ai besoin d'un moment pour y réfléchir."
 flavor_tur.258.t:0 "Codification du Soufisme"
 flavor_tur.258.desc:0 "Le Soufisme est une partie très spirituelle et mystique de l'Islam. Déconnecté des désirs et soucis mondains, il s'efforce de trouver la proximité avec Allah. Bien qu'apparemment contre-intuitif, le Grand Vizir de [Root.Monarch.GetName] a créé un concept qui combine les philosophies et traditions du Soufisme avec la législation de l'empire, donnant légitimité aux lois en les connectant à Allah. Bien sûr, cette codification nécessite encore une signature du [Root.Monarch.GetTitle] pour être active..."
 flavor_tur.258.a:0 "Que les philosophies du Soufisme guident l'empire."
 flavor_tur.258.b:0 "Je vois peu de raison de combiner le mysticisme avec la législation."
 flavor_tur.259.t:0 "La Perse sous Domination Ottomane"
 flavor_tur.259.desc:1 "Le mauvais sang entre les Perses et les Ottomans est indéniable. Même après tant d'années depuis la subjugation de la Perse, la rivalité entre ces deux peuples n'a jamais complètement cessé d'exister. Cependant, chaque bourgeois de [Root.Capital.GetName] n'a pas de raison de détester les gens de la région perse. Certains voient une opportunité d'étendre leur richesse, et ont donc décidé d'investir en Perse."
 flavor_tur.259.a:0 "Peut-être que ces migrants apaiseront nos relations avec les Perses."
 flavor_tur.260.t:0 "Expansion de la Bureaucratie Impériale"
 flavor_tur.260.desc:0 "Notre [Root.GovernmentName] a atteint des frontières dont les autres ne peuvent que rêver. Bien que véritablement une beauté sur toute carte, la portée de notre empire est tout sauf attrayante pour nos bureaucrates qui doivent administrer les nombreuses provinces et eyalets de l'État.\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] a décidé de contre-attaquer avant que [Root.GetUsableName] ne tombe victime de son propre succès. À travers une série de réformes radicales en matière d'administration et de bureaucratie, l'État de [Root.GetUsableName] connaît un essor de ses capacités organisationnelles."
 flavor_tur.260.a:0 "La bureaucratie ne sera jamais une raison de ralentir !"
 flavor_tur.261.t:0 "Les Janissaires Exigent des Privilèges"
 flavor_tur.261.desc:0 "Des Janissaires mécontents se sont frayé un chemin jusqu'à la chambre privée du Sultan. Les mains sur leurs épées, ils exigent leur juste part de privilèges royaux, tout comme les autres Domaines jouissent des leurs. Selon leur déclaration écrite, il est inconcevable que les forces armées les plus décorées du Sultan soient faites pour se sentir inférieures aux petits nobles et marchands ! Ils s'attendent à ce que nous assouplissions l'une de nos lois janissaires actuelles et la remplacions par un privilège convenant à la vie d'un Janissaire."
 flavor_tur.261.a:0 "Les autoriser à nommer leurs propres aghas."
 flavor_tur.261.b:0 "Rendre le rang de Janissaire héréditaire."
 flavor_tur.261.c:0 "Leur donner le droit d'avoir une profession secondaire."
 flavor_tur.261.d:0 "Leur accorder le droit de se marier quand ils le veulent."
 flavor_tur.261.e:0 "Promulguer la Loi Toprak pour leur paiement."
 flavor_tur.261.f:0 "Laisser les Janissaires s'entraîner eux-mêmes."
 flavor_tur.261.g:0 "Garantir leurs privilèges."
 flavor_tur.261.h:0 "Assouplir le Devshirme en leur faveur."
 flavor_tur.261.i:0 "Jamais !"
 flavor_tur.261.j:0 "Vous avez déjà tout ce que vous voulez..."
 flavor_tur.262.t:0 "Règne des Femmes"
 flavor_tur.262.desc:1 "Durant le règne des Seldjoukides sur l'Anatolie, la noblesse féminine détenait un immense pouvoir dans les affaires de politiques et d'État. Cela commença cependant à décliner avec l'émergence de la doctrine du « diriger à cheval ». Les premières politiques ottomanes incluaient l'octroi de gouvernorats aux princes et à leurs mères, ce qui fait qu'ils ne pourraient pas défier le véritable héritier. Tout cela changea au tournant du XVIe siècle.\n\nAvec l'ascension au trône du Sultan Soliman Ier vinrent plusieurs changements, dont l'un fut l'intégration du Harem Impérial au palais. Ces changements firent que les mères et épouses du Sultan eurent un pouvoir presque illimité dans les affaires d'administration et de diplomatie. Ce « Sultanat des Femmes » mena à une immense croissance des travaux publics, des installations et de la défense. De tels changements de politique reçurent d'immenses critiques des hommes au sein de l'Empire, comme les vizirs et conseillers.\n\nAinsi, une question se posa. Donner un pouvoir immense aux femmes du harem en vaut-il la peine ?"
 flavor_tur.262.a:0 "Elles seront la main droite du Sultan !"
 flavor_tur.262.b:0 "Nous ne pouvons pas diviser le pouvoir royal."
 flavor_tur.262.b.tt:0 "Nous limiterons le pouvoir du Harem afin qu'ils ne puissent pas manipuler les futurs [Root.Monarch.GetTitle]s.\n§YLes héritiers des événements du Harem auront §R-2§! compétences jusqu'à la fin du jeu si nous nous opposons au Harem.§!"
 flavor_tur.263.t:0 "Le Harem Passe à l'Action"
 flavor_tur.263.desc:0 "Notre décision de garder le Harem Impérial séparé des affaires d'administration et de diplomatie de l'Empire a irrité le Harem. Bien que ce soit [Root.Monarch.GetName] qui soit en charge du gouvernement, il est impossible de nier l'influence des femmes sur notre [Root.Monarch.GetTitle]. Par la persuasion, la Valide Sultan et les épouses de [Root.Monarch.GetName] essaient de convaincre le [Root.Monarch.GetTitle] de reconsidérer la position dure envers le harem."
 flavor_tur.263.a:0 "Peut-être que le harem a raison."
 flavor_tur.263.b:0 "Non c'est non, mère !"
 flavor_tur.264.t:0 "Séparation du Harem de l'État"
 flavor_tur.264.desc:0 "Bien que violente et sanglante, [Root.Monarch.GetName] a réussi à séparer le Harem Impérial de toutes les affaires politiques de l'État pour de bon. La tâche du harem est l'assurance d'un nouvel héritier tandis que le Sultan dirigera son pays à cheval une fois de plus.\nBien que cette séparation de la famille et de l'État ait une conséquence drastique : les futurs héritiers sont limités à apprendre de leur père et doivent compter sur les conseils de leurs mères et confidentes. Ainsi, il n'est plus garanti que les futurs Sultans agissent dans les intérêts de l'Empire quand leur temps viendra de régner."
 flavor_tur.264.a:0 "Qu'il en soit ainsi."
 flavor_tur.264.a.tt:0 "§YLes héritiers des événements du Harem auront §R-2§! compétences jusqu'à la fin du jeu si nous nous opposons au Harem.§!\nLe désastre §YComplot du Harem§! ne peut plus se déclencher durant le désastre §YLutte de Pouvoir Interne§!."
 flavor_tur.265.t:0 "Sauvegarder la Ligne de Succession"
 flavor_tur.265.desc:0 "Notre Vali Ahad actuel est celui que nous jugeons le plus approprié pour régner sur notre Empire. Il a cependant de nombreux frères. Ces Frères envient sa position d'héritier et détiennent également des positions d'autorité au sein de l'Empire. Ces imbéciles incompétents peuvent essayer de se soulever quand notre Vali Ahad prendra le trône et essayer de perturber son règne. Par conséquent, il vaut mieux nous débarrasser de ces chacals tant que nous avons le temps. Cependant, le faire peut avoir des conséquences imprévues à l'avenir. Nous devons considérer ce choix attentivement."
 flavor_tur.265.a:0 "Nous n'avons besoin que d'UN Vali Ahad !"
 tur_killing_of_line_potential_tt:0 "Tenter d'éradiquer tous les autres héritiers potentiels au trône peut résulter en une §Rrébellion ouverte§! selon la compétence £mil£ de notre dirigeant."
 flavor_tur.265.b:0 "Ne risquons pas une rébellion ouverte..."
 tur_the_administration_will_be_damaged_somehow:0 "Les autres membres héritiers seront laissés à la garde du Harem et libres de saboter notre nation..."
 flavor_tur.265.c:0 "Le sang est plus épais que l'eau, mon frère."
 tur_they_go_away_peacefully_tt:0 "La démonstration exemplaire et impeccable d'amour et de lien familial de [Root.Monarch.GetName] dissuadera tout prétendant de se lever contre notre bien-aimé [Root.Heir.GetName] !"
 flavor_tur.266.t:0 "Un Cœur Autrefois Brisé"
 flavor_tur.266.desc:0 "Oh, comme son sourire était innocent. Comme il venait à moi avec des questions sur l'Empire. « Père ! » disait-il. « Père, quelle est la taille de la Terre Sainte ? » me demanda-t-il une fois. Je me souvenais rire avec lui alors que nous dévorions des fruits. Je pensais... que ce que j'avais fait pour lui était pour le mieux. Apparemment, j'avais tort. En apprenant la mort prématurée de ses frères, mon prince sain et robuste tomba malade, très malade et maintenant, il repose dans un sommeil éternel... juste devant moi. Je veux voir son visage une dernière fois, mais je ne peux pas. Pour toujours, la culpabilité m'engloutira. Dans mon sommeil, je me souviendrai des visages de mes autres fils que j'ai impitoyablement assassinés, et je ne peux plus faire face à ma femme ou mes concubines. Tout ce qui existe maintenant, c'est la culpabilité et la honte."
 flavor_tur.266.a:0 "Mon garçon, mon pauvre garçon..."
 tur_i_did_this_tt:0 "Le chagrin causé par l'exécution incessante de ses frères et sœurs a conduit à la santé déclinante de [Root.Heir.GetName] et à sa mort éventuelle.\nIl sera remplacé par le premier garçon capable du Harem..."
 flavor_tur.267.t:0 "Le Destin de la Ville Sainte"
 flavor_tur.267.desc:0 "Jérusalem a été le champ de bataille sur lequel de nombreux païens et croyants ont offert leurs vies au service de la cause divine de leur foi. Entre les affrontements, un nombre significatif de chrétiens font leur chemin vers les sites saints de la Cité, rendant hommage aux divers saints qu'ils admirent. Comme la cité tombe sous notre contrôle, nous devons décider de son destin, et avec lui, du destin de ceux qui l'habitent quelle que soit leur religion."
 flavor_tur.267.a:0 "Elle redeviendra un centre de notre religion !"
 flavor_tur.267.b:0 "Que ce soit une cité de culte pour tout homme pieux."
 flavor_tur.269.t:0 "Une Lettre Inattendue"
 flavor_tur.269.desc:0 "Déconcerté et confus, [Root.Monarch.GetName] contemple la lettre entre ses mains. Aussi incroyable que cela puisse paraître, le Pape [PAP.Monarch.GetName] a envoyé une lettre officielle signée au [Root.Monarch.GetTitle].\n\n« Une insignifiante bagatelle peut faire de vous le plus grand, le plus puissant, le plus célèbre des mortels vivants. Vous demandez ce que c'est ? Ce n'est pas difficile à trouver ; il n'est pas nécessaire d'aller loin pour le chercher. Cela peut être trouvé partout : un peu d'eau avec laquelle être baptisé, être converti au christianisme et accepter la foi de l'Évangile.\n\nUne fois cela fait, il n'y aura pas de prince sur toute la terre pour vous surpasser en renommée ou vous égaler en pouvoir. Nous vous nommerons empereur des Grecs et de l'Orient... Tous les chrétiens vous honoreront et feront de vous l'arbitre de leurs querelles... Beaucoup se soumettront à vous volontairement, comparaîtront devant votre siège de jugement et vous paieront des taxes. Il vous sera donné de réprimer les tyrans, de soutenir les bons et de combattre les méchants. Et l'Église Romaine ne s'opposera pas à vous... Le premier siège spirituel vous embrassera du même amour que les autres rois, et d'autant plus que votre position est plus élevée. Dans ces conditions, vous pouvez facilement, sans guerre ni effusion de sang, acquérir de nombreux royaumes...\n\nNous ne prêterons jamais aide à vos ennemis, mais au contraire nous ferons appel à votre bras contre ceux qui usurpent parfois les droits de l'Église Romaine et dressent leurs cornes contre leur propre mère. »"
 flavor_tur.269.a:0 "La Couronne Romaine... et tout ce que j'ai à faire est de me convertir... hmm..."
 flavor_tur.269.b:0 "Pfft. Le vieil homme sénile a perdu l'esprit."
 flavor_tur.270.t:0 "Importations de Myrrhe pour les Dhimmis"
 flavor_tur.270.desc:0 "À la grande joie de nos Dhimmis, les terres fructueuses d'Aden ont été dotées par Allah d'une récolte abondante de myrrhe et d'autres herbes recherchées, enrichissant davantage nos routes commerciales déjà prospères entre l'Orient et le continent européen. Véritablement nous sommes bénis !"
 flavor_tur.270.a:0 "Nous les bénirons d'une grande prospérité au nom d'Allah le miséricordieux !"
 flavor_tur.271.t:0 "Le Péage de la Baie d'Ormuz"
 flavor_tur.271.desc:0 "Avec l'assimilation d'Ormuz dans notre glorieux Empire, nous avons sécurisé un point d'étranglement vital pour le commerce vers et depuis le Moyen-Orient et l'Arabie. Comme ce port est d'une grande importance pour les marchands qui voyagent entre le Levant et l'Inde, il est naturel que le Grand Vizir ait placé un péage de baie sur cette île."
 flavor_tur.271.a:0 "Excellent."
 flavor_tur.272.t:0 "Voyager sur les Routes Commerciales Asiatiques"
 flavor_tur.272.desc:0 "Notre expansion le long de la Route de la Soie a été une entreprise plutôt fructueuse. L'investissement dans la route commerciale s'est avéré une sage décision. En plus des trésors de soie et d'or, nos Marchands reviennent non seulement avec des récits extraordinaires, mais toutes sortes d'animaux étranges, de tapisseries merveilleuses, d'objets fins fabriqués en os et de poignées de pierres vertes translucides qui seraient très prisées par les nobles orientaux. De telles importations peuvent sans doute stimuler l'économie de notre nation déjà prospère. Les marchands de Kırklareli ont exprimé un intérêt particulier..."
 flavor_tur.272.a:0 "Des biens si intéressants et fascinants."
 TUR_SILK_ROAD_TRADE:0 "Commerce de la Route de la Soie"
 flavor_tur.273.t:0 "Les Sürgün Affluent vers [151.GetName]"
 flavor_tur.273.desc:0 "Avec notre grande campagne dans les Balkans commençant par la conquête de Constantinople, nous avons commencé à voir une augmentation de la migration des villes et villages voisins vers la cité. Ces personnes, appelées les Sürgün, ont déménagé à Constantinople pour améliorer leur niveau de vie et leurs moyens de subsistance. Non seulement cela entraînerait une augmentation du niveau de vie et des revenus pour les migrants, mais la grande cité elle-même bénéficierait de la main-d'œuvre supplémentaire. Que le Tout-Puissant nous bénisse constamment avec de tels jours de prospérité !"
 flavor_tur.273.a:0 "Ils sont les bienvenus !"
 flavor_tur.274.t:0 "Les Religions Dhimmies Prospèrent à [151.GetName]"
 flavor_tur.274.desc:0 "L'immense projet de développement à Constantinople a enfin commencé à porter ses fruits. Au fil des ans, les minorités religieuses comme les Juifs, parmi beaucoup d'autres, ont migré vers la Cité du Désir du Monde. Ces minorités ont établi leurs propres communautés au sein de la cité et ont commencé à se mêler aux autres communautés religieuses. Beaucoup de ces communautés ont commencé à prospérer au sein de Constantinople, gagnant assez pour subvenir à leurs besoins et à ceux de leurs familles. Rarement une autre nation a-t-elle montré autant de tolérance pour d'autres religions que nous, et c'est la raison pour laquelle la cité de Constantinople traverse son mini-Âge d'Or."
 flavor_tur.274.a:0 "Tous prospéreront sous notre bannière !"
 flavor_tur.275.t:0 "Rébellions Qizilbash"
 flavor_tur.275.desc:0 "Les Qizilbash étaient des groupes militants turkmènes-chiites qui ont prospéré immensément dans la partie orientale de la Péninsule Anatolienne à la fin du XVe siècle. Ces personnages jouèrent un rôle important dans la consolidation de la Perse par les Safavides. En 1512, les Safavides commencèrent leur da'wah au sein de l'Empire Ottoman et la conversion des Tribus Turkmènes Orientales, qui finirent par rejoindre les rangs safavides. En conséquence, les Turcs chiites vivant en Asie Mineure commençaient à être déportés dans la région de Morée. Les Qizilbash safavides se frayèrent un chemin au Kurdistan, défaisant les garnisons turques locales tout en étant largement inférieurs en nombre. Maintenant, l'Empire Ottoman est à un carrefour, entre défaite complète et humiliation, et victoire ultime et éternelle !"
 flavor_tur.275.a:0 "Grand Vizir, apportez-moi mon fouet !"
 flavor_tur.276.t:0 "Rébellions Şahkulu"
 flavor_tur.276.desc:0 "Les années 1510 furent des temps turbulents au sein de l'Empire Ottoman. Des missionnaires safavides et des militants Qizilbash sévissaient dans les parties orientales de l'Empire. En 1511, les Qizilbash turkmènes se rallièrent sous la cause de Şahkulu, le fils du halife de Teke. Il a été une épine dans notre flanc depuis longtemps, et il osa piller nos grandes caravanes à l'est. Notre Empire n'a pas de place pour de telles créatures enragées et viles, levons maintenant la bannière du prophète et écrasons ces animaux une fois pour toutes."
 flavor_tur.276.a:0 "Maudits soient ces Chiites !"
 flavor_tur.277.t:0 "Les Ambitions Italiennes de Mehmed II"
 flavor_tur.277.desc:0 "Avec la chute de Constantinople, Mehmed II proclama les Ottomans comme le successeur légal de l'Empire Romain et lui-même comme son empereur. Il légitima davantage ses revendications en promouvant d'anciens nobles byzantins à des postes supérieurs dans l'administration de l'État, fit de Constantinople la capitale de l'Empire Ottoman et la restaura à sa gloire passée et s'inspira grandement des Byzantins concernant les traditions de la cour. Naturellement, cette revendication de succession romaine fut également utilisée par Mehmed pour justifier une invasion d'Otrante en 1480 avec l'ambition supplémentaire de conquérir Rome pour les Ottomans. Cette entreprise trouva une fin prématurée, cependant, quand Mehmed mourut le 3 mai 1481. Depuis lors, aucun autre Sultan Ottoman n'a posé le pied en conquérant sur le sol italien."
 flavor_tur.277.a:0 "L'Italie tombera devant notre puissance !"
 flavor_tur.278.t:0 "L'Alliance Franco-Ottomane"
 flavor_tur.278.desc:0 "Les Habsbourg ont été un rival de [Root.GetUsableName] pendant des années. Bien que le [Root.Monarch.GetTitle] ait pu défendre [Root.GetUsableName] de l'hégémon autrichien d'Europe Centrale, il est apparent que cette dynastie grandit toujours en pouvoir et en influence, non seulement au sein du Saint-Empire Romain mais aussi en Ibérie, en Pologne et en Italie. Un allié est nécessaire si les Habsbourg doivent être arrêtés.\n\nEt [Root.Monarch.GetTitle] [Root.Monarch.GetName] a trouvé un partenaire de coalition improbable, mais potentiellement précieux. Le [TUR.GovernmentName] de [TUR.GetUsableName] est en conflit constant avec le Kaiser en raison de leurs intérêts communs dans les Balkans. Bien qu'ils soient des infidèles musulmans, leur objectif est d'éliminer la menace germanique que posent les Autrichiens et de consolider leur pouvoir dans les Balkans. Il pourrait être intéressant de contacter les Ottomans et de faire une offre d'alliance officielle au [TUR.Monarch.GetTitle] [TUR.Monarch.GetName]."
 flavor_tur.278.a:0 "Nous devrions chercher une audience avec le Sultan."
 flavor_tur.278.a.tt:0 "Tous les pays §YChrétiens§! connus en §Y[Root.Capital.GetContinentName]§! qui ne sont pas notre sujet gagnent §R-25§! d'opinion de §Y[Root.GetName]§!."
 flavor_tur.278.b:0 "Le Lys ne peut jamais être un allié du Croissant."
 flavor_tur.278.b.tt:0 "Tous les pays §YChrétiens§! connus en §Y[Root.Capital.GetContinentName]§! qui ne sont pas notre sujet gagnent §G50§! d'opinion de §Y[Root.GetName]§!."
 flavor_tur.279.t:0 "L'Alliance Franco-Ottomane"
 flavor_tur.279.desc:0 "Les Habsbourg ont été un rival de [Root.GetUsableName] pendant des années. Bien que le [Root.Monarch.GetTitle] ait pu défendre [Root.GetUsableName] de l'hégémon autrichien d'Europe Centrale, il est apparent que cette dynastie grandit toujours en pouvoir et en influence, non seulement au sein du Saint-Empire Romain mais aussi en Ibérie, en Pologne et en Italie. Un allié est nécessaire si les Habsbourg doivent être arrêtés.\n\nComme le destin le voudrait, un tel allié potentiel a trouvé son chemin jusqu'à la cour de [Root.Monarch.GetName]. Un diplomate du [FRA.GovernmentName] de France a contacté notre [Root.Monarch.GetTitle] pour le compte de son dirigeant, [FRA.Monarch.GetTitle] [FRA.Monarch.GetName]. Il semble que les Français veuillent contenir l'hégémonie des Habsbourg car ils posent une menace à leurs intérêts en Ibérie, en Italie et dans les Pays-Bas."
 flavor_tur.279.a:0 "Un puissant allié chrétien pourrait en effet être utile."
 flavor_tur.279.b:0 "Le Croissant a peu à se mêler avec le Lys."
 flavor_tur.280.t:1 "[From.GetUsableNameCap] accepte l'Offre d'Alliance"
 flavor_tur.280.desc:0 "Mon [Root.Monarch.GetTitle], le sage [From.Monarch.GetName] accepte notre offre désintéressée de les protéger de la menace autrichienne. Nous sommes maintenant officiellement alliés à [From.GetUsableName]."
 flavor_tur.280.a:0 "Que cela mène à la fin des Habsbourg."
 flavor_tur.281.t:1 "[From.GetUsableNameCap] refuse l'Offre d'Alliance"
 flavor_tur.281.desc:0 "Mon [Root.Monarch.GetTitle], les infidèles de [From.GetUsableName] ont refusé notre humble offre. Il est évident que le [From.Monarch.GetTitle] préférerait voir [From.Monarch.GetHerHis] [From.GovernmentName] brûler en cendres avant de surmonter [From.Monarch.GetHerHis] fierté."
 flavor_tur.281.a:0 "Oh, tant pis. Ce sera leur perte, pas la nôtre."
 flavor_tur.282.t:0 "Le Siyer-i Nebi"
 flavor_tur.282.desc:2 "La vie du Prophète Mahomet a toujours été la source des plus grands textes. L'un de ces textes est le Siyer-i Nebi, originellement achevé en 1388 par Mustafa al-Darir d'Erzurum à la demande du Sultan Mamelouk Berkuk. Depuis lors une œuvre très louée, notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] dans [Root.Monarch.GetHerHis] sagesse a décidé de l'enrichir, et a commandé une nouvelle copie illustrée du livre. La nouvelle copie a été réalisée par le célèbre calligraphe Lufti Abdullah, et le résultat est certainement digne d'admiration. Les magnifiques pages sont la plus belle représentation de la vie du Prophète à ce jour, et cela restera une possession fière du Sultan. Que la gloire salue l'Empire Ottoman à jamais !"
 flavor_tur.282.a:0 "Une littérature célébrée pour le Grand Prophète !"
 flavor_tur.283.t:0 "Le Tombeau d'Abu Hanifa"
 flavor_tur.283.desc:1 "L'Imam Abu Hanifa était un théologien et juriste musulman sunnite né à Kufa dans une famille perse. Largement crédité comme le fondateur de l'École de pensée Hanafite, son corps fut à jamais chéri dans une mosquée à Bagdad. Maintenant, avec notre récente conquête de la grande cité, c'est à la décision du Sultan de restaurer le Tombeau d'Hanifa ou d'économiser les ducats afin qu'ils puissent être alloués ailleurs."
 flavor_tur.283.a:0 "Restaurer son tombeau et honorer son héritage !"
 flavor_tur.283.b:0 "Nos pièces sont mieux dépensées ailleurs !"
 flavor_tur.284.t:0 "Épistémologie Islamique à l'Ère de [Root.Monarch.GetName]"
 flavor_tur.284.desc:0 "Épistémologie. Le mot lui-même est aussi mystique que le sens qui se cache derrière. La théorie de la connaissance sur quoi que ce soit est appelée son épistémologie. Avec notre Sultan favorisant de plus en plus les Philosophes Islamiques, ils se concentrent de plus en plus sur la compréhension de la philosophie derrière l'Islam. Cela mènera sûrement à une gloire éternelle pour les Oulémas des Ottomans grâce au mécénat sans fin du Sultan !"
 flavor_tur.284.a:0 "Une ère d'apprentissage et de philosophie !"
 flavor_tur.285.t:0 "Mauvaises Politiques Économiques de [Root.Monarch.GetName]"
 flavor_tur.285.desc:0 "Il semble que les mauvaises politiques économiques du Sultan aient montré leurs vilaines couleurs. L'économie ottomane s'est effondrée du jour au lendemain. L'effondrement a résulté en hyperinflation et plus de troubles généraux à travers les frontières de l'empire. Il faudra de nombreux mois avant que nous puissions nous remettre de cette tragédie."
 flavor_tur.285.a:0 "Frappez TOUT !"
 flavor_tur.286.t:0 "Destin du Devshirme"
 flavor_tur.286.desc:0 "Le Système du Devshirme a prouvé sa valeur au fil des ans car il a servi de source principale de nouvelles recrues janissaires pour nos armées. Cependant, avec le temps, le système a été de plus en plus ignoré alors que des familles musulmanes faisaient passer clandestinement leurs propres enfants pour un meilleur avenir pour eux. De nos jours, le Devshirme n'est plus qu'un nom d'une ancienne façon de conscription.\nIl est apparent que des réformes sont nécessaires. Le côté conservateur du gouvernement est en faveur de sa refonte tandis que l'état-major militaire est en faveur de son abolition totale et de l'introduction d'une conscription plus générale."
 flavor_tur.286.a:0 "Son temps est révolu. Nous introduirons de nouvelles façons d'obtenir des recrues."
 flavor_tur.286.b:0 "Il a prouvé sa valeur dans le passé, il le fera à nouveau à l'avenir."
 flavor_tur.287.t:0 "Expansion du Recrutement de l'Armée Mansure"
 flavor_tur.287.desc:0 "Le Devshirme est une relique du passé. Il a été remplacé par un système de recrutement standard qui parcourt tout l'Empire à la recherche de recrues potentielles au lieu de nous limiter aux hommes chrétiens. L'état-major militaire ottoman a décidé d'affiner le système davantage afin que le processus puisse être fait plus efficacement. Tout ce qui est maintenant nécessaire est l'approbation officielle du [Root.Monarch.GetTitle]..."
 flavor_tur.287.a:0 "Introduire ces changements à la conscription."
 flavor_tur.287.b:0 "Cela peut attendre."
 flavor_tur.288.t:0 "La Réforme de l'Armée Mansure"
 flavor_tur.288.desc:0 "Des siècles de luttes intestines et de corruption ont conduit les Janissaires à connaître la décadence, contents de leur influence accrue et de leur ingérence dans les affaires sultanales, ils sont devenus effrontés et ont oublié à qui va leur allégeance. Comme les réformes militaires furent accueillies par une résistance armée, le [Root.Monarch.GetTitle] se vit forcé de décimer les Janissaires.\n\nBien que cela fût horrible, l'éradication des conspirateurs janissaires permit au [Root.GovernmentName] de réformer l'armée de fond en comble. Le corps des Janissaires a été remplacé par l'Armée Mansure, qui utilise des stratégies, tactiques et équipements occidentaux pour combattre pour leur [Root.Monarch.GetTitle]. Tout ce qui reste est la dissolution officielle des Janissaires comme domaine."
 flavor_tur.288.a:0 "Enfin, une armée qui peut protéger l'Empire."
 flavor_tur.288.b:0 "D'accord."
 flavor_tur.289.t:0 "Compromis avec les Janissaires"
 flavor_tur.289.desc:0 "Des siècles de luttes intestines et de corruption ont conduit les Janissaires à connaître la décadence, contents de leur influence accrue et de leur ingérence dans les affaires sultanales, ils sont devenus effrontés et ont oublié à qui va leur allégeance. Finalement cependant, le [Root.Monarch.GetTitle] et [Root.Monarch.GetHerHis] Grand Vizir réussirent à parvenir à une entente avec le corps des Janissaires.\n\n[Root.Monarch.GetName] convainquit les aghas des Janissaires de leur nouvelle position comme classe officielle dans la société, ce qui permet à chaque membre d'être promu aux positions de noble ou de marchand. Bien que pas aussi pratique que les privilèges précédents, ce changement hiérarchique dans les domaines ouvre des opportunités pour les Janissaires qui ne souhaitent pas servir comme soldats tandis que ceux qui sont nés pour le combat peuvent retourner à leurs véritables devoirs."
 flavor_tur.289.a:0 "Enfin, les Janissaires ont retrouvé la raison."
 flavor_tur.289.b:0 "D'accord."
 flavor_tur.290.t:0 "Réforme des Millets"
 flavor_tur.290.desc:0 "Le Système des Millets fait partie de l'administration ottomane des communautés religieuses séparées qui reconnaissait l'autorité de chaque communauté dans la supervision de ses propres affaires communautaires, principalement à travers des systèmes judiciaires et des écoles religieuses indépendants. Pourtant, c'était un système incohérent et les lois de chaque province différaient vastement dans le tribunal du millet comparé à ses voisins. Certains pachas astucieux utilisèrent cela à leur avantage pour étendre leur pouvoir sur leur région gouvernée bien au-delà de ce qu'ils sont censés diriger. Avec la standardisation du millet, le traitement de nos sujets devrait être cohérent dans tous les coins de l'empire."
 flavor_tur.290.a:0 "Notre empire n'est plus un patchwork de lois conflictuelles."
 flavor_tur.290.b:0 "D'accord."
 flavor_tur.292.t:0 "Les Janissaires Exigent des Privilèges"
 flavor_tur.292.desc:0 "Des Janissaires mécontents se sont frayé un chemin jusqu'à la chambre privée du Sultan. Les mains sur leurs épées, ils exigent leur juste part de privilèges royaux, tout comme les autres Domaines jouissent des leurs. Selon leur déclaration écrite, il est inconcevable que les forces armées les plus décorées du Sultan soient faites pour se sentir inférieures aux petits nobles et marchands !"
 flavor_tur.293.t:0 "Montée des Janissaires"
 flavor_tur.293.desc:0 "Alors que notre armée augmente sa dépendance envers les Janissaires, leur pouvoir au sein de notre État augmente également. Leur influence et leur importance pour le système gouvernemental et militaire ne sont plus discutables. Bien que les Janissaires soient conscients de leur importance, leur attitude générale est actuellement en faveur du [Root.Monarch.GetTitle] [Root.Monarch.GetName], et en tant que tels les Janissaires ont accepté de nous servir comme avant-gardes incassables."
 flavor_tur.293.a:0 "Excellent."
 unlock_privilege_estate_janissary_ottoman_vanguards_tt:0 "Débloquer le privilège du domaine §YJanissaires§! §YAvant-gardes Ottomanes§! !"
 flavor_tur.300.t:0 "La Défaite de [Root.GetUsableName]"
 flavor_tur.300.desc:0 "La défaite aux mains de [From.GetUsableName] est un coup majeur à l'autorité du [Root.Monarch.GetTitle]. Le moral de notre nation est au plus bas et de nombreux citoyens au sein de notre royaume cherchent un bouc émissaire pour notre défaite humiliante."
 flavor_tur.300.a:0 "Blâmer les Janissaires"
 flavor_tur.300.b:0 "C'est ainsi..."
 flavor_tur.301.t:0 "Surextension du [Root.GovernmentName]"
 flavor_tur.301.desc:0 "À mesure que notre [Root.GovernmentName] grandit et étend ses frontières, l'administration de la cour fait face à un certain nombre de problèmes. Bien que notre dernière conquête ait été un succès magnifique, la gestion des provinces nouvellement conquises s'avère trop difficile à gérer pour nos bureaucrates."
 flavor_tur.301.a:0 "Utiliser toutes nos ressources pour la combattre."
 flavor_tur.301.b:0 "La surextension n'est qu'un concept abstrait."
 flavor_tur.998.t:0 "Trahison de la Maison d'Osman !"
 flavor_tur.998.desc:0 "Une tragédie frappe la Maison d'Osman car un parent de [Root.Monarch.GetName] a pris le pouvoir sur [From.GetName] et mène maintenant une guerre d'indépendance contre nous !"
 flavor_tur.998.a:0 "Sa tête roulera pour cette traîtrise !"
 flavor_tur.999.t:0 "La Nouvelle Fascination du [Root.Monarch.GetTitle]"
 flavor_tur.999.desc:1 "« Quel drapeau étonnant ! Un animal de prouesse, de puissance et de beauté ! Véritablement magnifique ! » Le Grand Vizir ne peut s'empêcher de se demander quelle folie s'est emparée de son [Root.Monarch.GetTitle] tout en se forçant à ne montrer aucune émotion. Le sage conseiller ne souhaite pas finir comme un homme exécuté juste parce qu'il n'a pas pu s'empêcher de rire du spectacle qu'il doit contempler. « Parlez, mon vizir le plus fidèle. Vous dites que nos hommes ont trouvé ce drapeau en marchant à travers la province de Taungoo ? » Le Grand Vizir répond avec maîtrise de soi et en quelques mots. Il observe [Root.Monarch.GetName] qui semble absolument ravi par le drapeau de la dynastie Taungoo : un drapeau blanc avec un paon stylisé en son centre. Bien qu'unique, le vizir n'est pas très impressionné par celui-ci. Beaucoup de nations qui sont tombées devant [Root.GetUsableName] avaient des drapeaux uniques après tout.\nQu'est-ce qui, au nom d'Allah, est fascinant à ce sujet ?, réfléchit le vizir tandis que [Root.Monarch.GetName] déborde d'enthousiasme. « Vizir, informez ma cour. Nous déménagerons à Istaungoo et y établirons notre capitale ! Je veux voir ces fabuleux paons moi-même ! »\n\nC'en était trop même pour le conseiller le plus stoïque. Quelle que soit la folie qui ait pu s'abattre sur le [Root.Monarch.GetTitle], le vizir doit parler maintenant pour le bien-être du [Root.GovernmentName]."
 flavor_tur.999.a:0 "Mes excuses, mon [Root.Monarch.GetTitle], nous devrions plutôt nous concentrer sur l'expansion de [Root.Capital.GetName]."
 flavor_tur.999.a.tt:0 "Le Grand Vizir pourrait être remplacé par un paon dans les prochains jours..."
 flavor_tur.999.b:0 "Qu'il en soit fait ainsi, mon [Root.Monarch.GetTitle]."
 flavor_tur.1000.t:0 "L'Indépendance d'un Eyalet"
 flavor_tur.1000.desc:0 "Inimaginable pendant de nombreuses décennies, [Root.Monarch.GetName] a réussi à sécuriser l'indépendance totale de [Root.GetName] de ses anciens maîtres. Autrefois un petit eyalet ; une province de l'Empire, le royaume peut enfin se tenir sur ses propres pieds et poursuivre sa destinée."
 flavor_tur.1000.a:0 "Nous sommes enfin maîtres de notre destin !"
 ###OTTOMAN MODIFIERS###
 tur_city_of_faiths:0 "Cité des Confessions"
 tur_ottoman_venetian_trade_deal_modifier:0 "Accord Commercial Ottoman-Vénitien"
 desc_tur_ottoman_venetian_trade_deal_modifier:0 "Nous avons conclu un accord commercial avec le gouvernement vénitien permettant à leurs marchands de voyager et commercer librement dans notre pays et vice versa. Bien que cela réduise notre propre influence commerciale dans nos ports d'origine, cela apportera une grande prospérité à long terme.\n\n§YCe modificateur est automatiquement supprimé quand les Ottomans ou Venise rompent leur alliance avec l'autre partenaire.§!"
 tur_ottoman_venetian_trade_deal_modifier_prov:0 "Accord Commercial Ottoman-Vénitien"
 desc_tur_ottoman_venetian_trade_deal_modifier_prov:0 "Cette province bénéficie de l'Accord Commercial Ottoman-Vénitien.\n\n§YCe modificateur est automatiquement supprimé quand les Ottomans ou Venise rompent leur alliance avec l'autre partenaire.§!"
 tur_ottoman_venetian_expanded_trade_deal_modifier:0 "Accord Commercial Ottoman-Vénitien Étendu"
 desc_tur_ottoman_venetian_expanded_trade_deal_modifier:0 "L'accord commercial avec les Vénitiens a été encore étendu. Bien que cela solidifie leur emprise sur le commerce de la Mer Noire, les frais qu'ils paient à [Root.GetName] compensent."
 tur_ottoman_venetian_expanded_trade_deal_modifier_prov:0 "Accord Commercial Ottoman-Vénitien Étendu"
 desc_tur_ottoman_venetian_expanded_trade_deal_modifier_prov:0 "Cette province bénéficie de l'Accord Commercial Ottoman-Vénitien.\n\n§YCe modificateur est automatiquement supprimé quand les Ottomans ou Venise rompent leur alliance avec l'autre partenaire.§!"
 tur_economical_reforms:0 "Réformes Économiques"
 desc_tur_economical_reforms:0 "Nous avons promulgué des réformes commerciales mercantilistes pour briser l'étranglement des marchands occidentaux sur le commerce de la Mer Noire."
 tur_early_cannons_modifier:0 "Canons Précoces d'Urban"
 desc_tur_early_cannons_modifier:0 "Les canons d'Urban sont monétairement complètement couverts au moment où nous avons donné à Urban des fonds et des matériaux abondants. La future artillerie ne sera malheureusement pas aussi bon marché..."
 tur_resettlement_of_constantinople:0 "Repeuplement de Constantinople"
 desc_tur_resettlement_of_constantinople:0 "L'autrefois grande cité de Constantinople fut victime de dévastations, de croisés incendiaires et de sacs ottomans. En tant que nouvelle capitale de l'Empire Ottoman, elle se remet rapidement de ces temps horribles cependant, à mesure que de plus en plus de gens migrent et s'installent dans cette cité animée."
 tur_preperation_for_naval_war:0 "Préparatifs de Guerre Navale"
 desc_tur_preperation_for_naval_war:0 "Nos relations avec les royaumes maritimes italiens ont atteint un nouveau point bas. Ce n'est qu'une question de temps avant qu'une guerre n'éclate.\nNous préparerons nos navires pour les combats à venir."
 tur_janissary_example:0 "Exemple des Janissaires"
 desc_tur_janissary_example:0 "La discipline et l'état de préparation au combat des Janissaires sont un grand exemple pour toutes nos troupes, rendant leur propre moral inégalé."
 tur_protection_from_raids_modifier:0 "Protégé des Raids"
 desc_tur_protection_from_raids_modifier:0 "Les petits chevaliers ne menaceront plus la sécurité et la prospérité de ce port."
 tur_janissary_loyalty:0 "Loyauté des Janissaires"
 desc_tur_janissary_loyalty:0 "Bien que les Janissaires soient assez puissants et influents pour former leur propre domaine, leur loyauté est toujours liée au [Root.Monarch.GetTitle]. Que leur servitude au [Root.GovernmentName] ottoman soit d'un grand bénéfice."
 tur_the_ottoman_rule:0 "Le Règne Ottoman"
 desc_tur_the_ottoman_rule:1 "Notre État est dirigé par la Maison d'Osman et est un mariage du gouvernement romain avec les lois et idées du Coran. Bien qu'efficace pour gouverner de vastes terres, cela apporte aussi les problèmes de la lutte de pouvoir interne."
 tur_respected_the_patriarchate:0 "Respect du Patriarcat"
 desc_tur_respected_the_patriarchate:0 "Notre décision de respecter le Patriarcat rend notre règne sur les chrétiens païens incontesté."
 tur_removed_the_patriarchate:0 "Fermeture du Patriarcat"
 desc_tur_removed_the_patriarchate:0 "Notre décision de fermer le Patriarcat est vue comme un grand succès de l'Islam."
 tur_local_millet_rule:0 "Influence Locale du Millet"
 desc_tur_local_millet_rule:0 "Cette province est sous l'influence du Millet local qui s'assure que les troubles sont gérés avant la cour."
 tur_integration_of_a_core_eyalet:0 "Intégration d'un Eyalet Central"
 desc_tur_integration_of_a_core_eyalet:0 "Bien que les eyalets servent un rôle crucial dans notre gouvernement, certaines régions valent la peine d'être tenues directement sous le contrôle du [Root.Monarch.GetTitle]. Ainsi, nous préparons maintenant le processus d'intégration de nos sujets eyalets centraux."
 tur_advance_into_europe:0 "Avancée en Europe"
 desc_tur_advance_into_europe:0 "La grande cité de Vienne est tombée. Le Saint-Empire Romain, autrefois un obstacle majeur à notre expansion, a prouvé au monde qu'il ne peut pas nous résister. Le chemin vers l'Europe est ouvert pour nous !"
 tur_turkish_fear:0 "Peur Turque"
 desc_tur_turkish_fear:0 "L'expansion rapide de l'Empire Ottoman en Europe cause peur et panique dans les cœurs de notre peuple. Les troubles et l'incertitude pour l'avenir dominent l'atmosphère de notre [Root.GovernmentName]."
 tur_march_for_rome:0 "Marche vers Rome"
 desc_tur_march_for_rome:0 "Notre campagne en Italie du Nord a été bénie par Allah. Les Italiens, confus et en tumulte à cause de notre frénésie de conquête, ne peuvent pas nous opposer une résistance appropriée.\nIl est temps pour nous de marcher vers Rome et de revendiquer ce qui nous appartient de droit !"
 tur_crown_of_rome_modifier:0 "Couronne de Rome"
 desc_tur_crown_of_rome_modifier:0 "Nous sommes les conquérants des deux capitales romaines. Notre revendication de la couronne romaine ne peut plus être contestée !"
 tur_legitimate_roman_empire_modifier:0 "Empire Romain Légitime"
 desc_tur_legitimate_roman_empire_modifier:0 "Vous êtes un Romain ! Et vous êtes un Romain ! Tout le monde est un Romain !"
 tur_expanded_governmential_offices:0 "Bureaux Gouvernementaux Étendus"
 desc_tur_expanded_governmential_offices:0 "Les bâtiments gouvernementaux de cette province favorisent substantiellement la croissance du développement de cette province."
 tur_eyalet_management:0 "Gestion Étendue des Eyalets"
 desc_tur_eyalet_management:0 "Notre décision de nous concentrer sur l'administration de l'État au lieu de déplacer notre capitale a résulté en la simplification de la gestion des eyalets de notre gouvernement."
 tur_turkish_andalusian_relations_gra:0 "Relations Turco-Andalouses"
 desc_tur_turkish_andalusian_relations_gra:0 "Ce ne regarde personne d'autre que les Turcs.\nEt les Andalous apparemment."
 tur_turkish_andalusian_relations_tur:0 "Relations Turco-Andalouses"
 desc_tur_turkish_andalusian_relations_tur:0 "Ce ne regarde personne d'autre que les Turcs.\nEt les Andalous apparemment."
 tur_morisco_refugees_modifier:0 "Réfugiés Morisques"
 desc_tur_morisco_refugees_modifier:0 "Cette province abrite les réfugiés musulmans et juifs d'Ibérie. Les Morisques se réinstallent ici et commencent une nouvelle vie sous protection ottomane."
 tur_conquest_of_iberia:0 "Conquête de l'Ibérie"
 desc_tur_conquest_of_iberia:0 "La Péninsule Ibérique est libérée des infidèles chrétiens. Les musulmans de ce monde se réjouissent car la Reconquista est défaite !"
 tur_re_reconquista:0 "Re-Reconquista Ibérique"
 desc_tur_re_reconquista:0 "Notre partenaire d'alliance a joué un rôle vital dans la destruction de la domination chrétienne en Ibérie. Cette relation prospérera tandis que le monde chrétien tremblera devant nous."
 tur_romanian_tribute:0 "Tribut Roumain"
 desc_tur_romanian_tribute:0 "Les Roumains ont été subjugués. Ils doivent maintenant nous payer tribut sous forme de main-d'œuvre et de ducats."
 tur_control_over_the_red_sea:0 "Contrôle sur la Mer Rouge"
 desc_tur_control_over_the_red_sea:0 "La Mer Rouge est véritablement nôtre. Aucun navire marchand n'y entre sans nous payer un péage et notre portée maritime vers l'Asie est plus grande que jamais."
 tur_religious_legal_code_level_1:0 "Le Code Juridique Religieux"
 desc_tur_religious_legal_code_level_1:0 "Notre pays est dirigé avec les lois, traditions et concepts de l'Islam à l'esprit. Le légalisme musulman joue un rôle majeur dans notre vie quotidienne."
 tur_religious_legal_code_level_2:0 "Le Grand Code Juridique Religieux"
 desc_tur_religious_legal_code_level_2:0 "Notre pays est dirigé avec les lois, traditions et concepts de l'Islam à l'esprit. Le légalisme musulman joue un rôle majeur dans notre vie quotidienne."
 tur_religious_legal_code_level_3:0 "Le Magnifique Code Juridique Religieux"
 desc_tur_religious_legal_code_level_3:0 "Notre pays est dirigé avec les lois, traditions et concepts de l'Islam à l'esprit. Le légalisme musulman joue un rôle majeur dans notre vie quotidienne."
 tur_spiritual_focus_level_1:0 "La Concentration Spirituelle"
 desc_tur_spiritual_focus_level_1:0 "Le Mysticisme, l'intimité avec Allah, est un pilier central de notre société. Contrairement à d'autres États qui suivent le code juridique de l'Islam dans tous les détails, nous embrassons une interprétation plus libre du Coran."
 tur_spiritual_focus_level_2:0 "La Grande Concentration Spirituelle"
 desc_tur_spiritual_focus_level_2:0 "Le Mysticisme, l'intimité avec Allah, est un pilier central de notre société. Contrairement à d'autres États qui suivent le code juridique de l'Islam dans tous les détails, nous embrassons une interprétation plus libre du Coran."
 tur_spiritual_focus_level_3:0 "La Magnifique Concentration Spirituelle"
 desc_tur_spiritual_focus_level_3:0 "Le Mysticisme, l'intimité avec Allah, est un pilier central de notre société. Contrairement à d'autres États qui suivent le code juridique de l'Islam dans tous les détails, nous embrassons une interprétation plus libre du Coran."
 tur_one_faith_empire_mod:0 "Royaume d'Une Seule Foi"
 desc_tur_one_faith_empire_mod:0 "Par l'effusion de sang, la persécution et d'autres méthodes, les païens de notre [Root.GovernmentName] ne sont plus. Nous régnons sur un royaume d'une seule foi."
 tur_religious_empire:0 "Empire Religieux"
 desc_tur_religious_empire:0 "Nous sommes tous un dans nos croyances et notre foi. Nous répandons la parole de [Root.Religion.GetName] dans le monde et ramenons les païens et hérétiques sur le droit chemin."
 tur_competent_pashas:0 "Loyauté des Pachas"
 desc_tur_competent_pashas:0 "Les Pachas de cette province se sont avérés particulièrement loyaux à leur sultan."
 tur_imperial_muslim_center:0 "Centre Musulman Impérial"
 desc_tur_imperial_muslim_center:0 "Cette cité est le centre de la foi musulmane de l'empire. Érudits, philosophes et hommes de piété de tout le pays voyagent vers la cité pour leurs affaires religieuses."
 tur_the_gem_of_worlds_desire:0 "Le Joyau du Désir du Monde"
 desc_tur_the_gem_of_worlds_desire:0 "Les marchés de la cité font de la province le Joyau du Désir du Monde. Des marchands du monde entier font le long voyage vers la cité afin de commercer et de nouer de nouvelles connexions commerciales."
 tur_mamlukian_administration:0 "Administration Mamelouke"
 desc_tur_mamlukian_administration:0 "Nous sommes dirigés par les gouverneurs mamelouks, bien que l'influence des Ottomans diminue drastiquement l'efficacité du gouvernement.\n\n§YNe peut pas être intégré tant que ce modificateur est actif.§!"
 tur_indonesian_trade:0 "Commerce Ottoman-Indonésien"
 desc_tur_indonesian_trade:0 "Nos marchands ont atteint les riches îles aux épices d'Indonésie. Leurs transactions en Asie enrichiront sûrement notre propre trésor."
 tur_center_of_ottoman_commerce:0 "Centre du Commerce Ottoman"
 desc_tur_center_of_ottoman_commerce:0 "Cette cité est le Centre du Commerce Ottoman. Assez grande et influente pour être appelée « Centre du Commerce Mondial », cette cité est devenue le cœur même du commerce mondial car marchands et hommes de commerce de l'Ancien et du Nouveau Monde voyagent pour poursuivre leurs entreprises."
 tur_pax_ottomana:0 "Pax Ottomana"
 desc_tur_pax_ottomana:0 "Nous sommes le grand Aigle de l'Héritage Romain. Notre magnifique Empire trône au-dessus du monde, prêt à résister à l'épreuve du temps. Que notre gloire brille pour l'éternité. Devlet-i Ebed-müddet !"
 tur_tatar_vanguard_modifier:0 "Avant-gardes Tatares"
 desc_tur_tatar_vanguard_modifier:0 "La Horde de Crimée envoie ses meilleures forces de cavalerie pour renforcer notre armée.\n\nCe modificateur dure jusqu'à ce que §YCrimée§! ne soit plus notre sujet."
 tur_the_imperial_capital:0 "La Capitale Impériale"
 desc_tur_the_imperial_capital:0 "Constantinople est le cœur de l'Empire Ottoman. Artisans, membres du Clergé et de la Noblesse, marchands, politiciens, chaque homme d'importance voyage vers cette cité et s'installe dans ses murs."
 tur_imperial_school_of_military_engineering:0 "École Impériale du Génie Militaire"
 desc_tur_imperial_school_of_military_engineering:0 "Cette cité abrite l'École Impériale du Génie Militaire. De nombreux grands experts en siège sont formés dans cette école, afin que leur génie puisse être utilisé sur le champ de bataille contre les défenses ennemies."
 tur_the_turkish_national_force:1 "La Garde Nationale Turque"
 desc_tur_the_turkish_national_force:0 "Avec la modernisation de l'armée de l'État, notre nation a été témoin de la naissance d'une nouvelle garde qui protégera l'Empire durant ces temps sombres."
 tur_weakened_the_harem:0 "Affaiblissement du Harem"
 desc_tur_weakened_the_harem:0 "Comme le Harem était devenu trop puissant dans le passé, notre grand Sultan l'a ramené à l'ordre et s'est assuré que ni eunuque ni concubine ne puisse jamais gagner d'influence sur le gouvernement et la cour.\n\nLes héritiers du Harem ont §R2 de moins§! en compétence tant que ce modificateur est actif."
 tur_reign_of_women_modifier:0 "Règne des Femmes"
 desc_tur_reign_of_women_modifier:0 "Également connu sous le nom de « Sultanat des Femmes », le Règne des Femmes est la période de l'histoire ottomane où le Harem avait un pouvoir significatif sur le Sultan et sa prise de décision. Les affaires d'administration et de diplomatie étaient maintenant gérées par les mères et les épouses du Sultan."
 tur_secured_vali_ahad_modifier:0 "Succession du Vali Ahad Sécurisée"
 desc_tur_secured_vali_ahad_modifier:0 "La succession est maintenant sécurisée maintenant que tous les frères rebelles ont été soit exécutés soit expulsés du pays."
 tur_rebellion_line_modifier:0 "Ligne de Succession Rebelle"
 desc_tur_rebellion_line_modifier:0 "Laisser le frère vivre s'est avéré fatal. Malgré la miséricorde de notre Sultan, le frère essaie de l'usurper en motivant nos sujets loyaux à se lever contre le Sultan..."
 tur_sabotaged_bureaucracy_modifier:0 "Bureaucratie Sabotée"
 desc_tur_sabotaged_bureaucracy_modifier:0 "Le frère du Sultan a reçu la miséricorde. En remerciement, il a saboté notre bureaucratie.\nNous aurions dû exécuter cet imbécile..."
 tur_hormuz_toll_modifier:0 "Péage d'Ormuz"
 desc_tur_hormuz_toll_modifier:0 "Le péage du détroit d'Ormuz a été introduit par le Grand Vizir de l'Empire Ottoman. Tous les navires de fret étrangers passant par le Détroit d'Ormuz doivent payer un péage à l'Empire pour passer."
 tur_abu_hanifa_mosque_modifier:0 "Mosquée d'Abu Hanifa"
 desc_tur_abu_hanifa_mosque_modifier:0 "Cette province abrite le tombeau d'Abu Hanifa, qui fut autrefois un grand théologien et juriste. En son honneur, la mosquée au-dessus a été restaurée à sa gloire passée."
 tur_embraced_legalism_modifier:0 "Embrassement du Légalisme"
 desc_tur_embraced_legalism_modifier:0 "Nous avons choisi la voie du Légalisme et en tant que tel nous embrassons ses valeurs dans leur pleine mesure."
 tur_embraced_mysticism_modifier:0 "Embrassement du Mysticisme"
 desc_tur_embraced_mysticism_modifier:0 "Nous avons choisi la voie du Mysticisme et en tant que tel nous embrassons ses valeurs dans leur pleine mesure."
 tur_end_of_the_caliphate_modifier:0 "Fin du Califat"
 desc_tur_end_of_the_caliphate_modifier:0 "Le Califat n'est plus. Quel sens d'autorité il donnait autrefois n'est maintenant plus qu'un conte tandis que nous serons rappelés comme son destructeur."
 tur_integration_in_the_ottoman_government_modifier:0 "Intégration dans le Gouvernement Ottoman"
 desc_tur_integration_in_the_ottoman_government_modifier:0 "Cette province est en processus actif de devenir une partie intégrante de l'Empire Ottoman. Ainsi son administration locale est très soucieuse de maintenir l'autonomie basse et le gain de nouvelles recrues élevé."
 tur_caucasian_conquest:0 "Conquête Caucasienne"
 desc_tur_caucasian_conquest:0 "Cette province est sujette à la conquête ottomane du Caucase. Bien que fraîchement partie de l'empire, elle reçoit déjà des investissements de la population de l'empire afin qu'elle puisse devenir un atout précieux de l'État."
 tur_conquest_of_persia:0 "Conquérants de la Perse"
 desc_tur_conquest_of_persia:0 "Notre campagne contre la Perse nous apporte une grande gloire. Les empires tombent pour que le nôtre règne sur toutes leurs terres !"
 tur_egyptian_annexation:0 "La Campagne d'Égypte"
 desc_tur_egyptian_annexation:0 "Notre décision de ne pas annexer tout le Sultanat Mamelouk en une seule guerre permet à notre bureaucratie de se préparer à la conquête majeure devant nous. L'Égypte tombera, cela prendra juste plus de temps."
 tur_exporting_to_the_west_modifier:0 "Exportation vers l'Occident"
 desc_tur_exporting_to_the_west_modifier:0 "Les biens de l'Extrême-Orient atteignent l'Extrême-Occident à travers nous."
 tur_trade_center_of_the_ottoman_empire_modifier:0 "Centre Commercial de l'Empire Ottoman"
 desc_tur_trade_center_of_the_ottoman_empire_modifier:0 "Cette province est un centre important du commerce de l'Empire Ottoman. Des marchands de tout le sous-continent visitent cette province pour s'engager dans le commerce."
 tur_baghdad_city_of_learning:0 "Contrôle sur la Cité du Savoir"
 desc_tur_baghdad_city_of_learning:0 "Bagdad était autrefois le centre culturel et théorique du monde islamique. Comme elle est maintenant sous contrôle, la cité traverse une nouvelle renaissance de science et de culture, nous permettant de découvrir de nouvelles technologies avec facilité."
 tur_allowed_tatars_in_sipahi_modifier:0 "Sipahi Tatars"
 desc_tur_allowed_tatars_in_sipahi_modifier:0 "Nous avons décidé d'accepter les Tatars dans nos propres rangs. Bien que les Janissaires se sentent menacés, les Tatars se prouveront comme des unités de cavalerie très utiles."
 tur_safeguarded_jan_privileges_modifier:0 "Privilèges Janissaires Sauvegardés"
 desc_tur_safeguarded_jan_privileges_modifier:0 "Nous avons décidé de refuser les Tatars dans nos propres rangs. Les Janissaires savent apprécier ce geste."
 tur_increased_fabric_production_modifier:0 "Production de Tissus Accrue"
 desc_tur_increased_fabric_production_modifier:0 "Cette province bénéficie du commerce des tissus. Ainsi la population locale est plus encline à produire plus de ses marchandises pour le commerce."
 tur_golden_silk_modifier:0 "Soie Dorée"
 desc_tur_golden_silk_modifier:0 "La soie est le sang de notre économie. Aussi précieuse que l'or, la soie ottomane est recherchée dans toutes les parties de notre grand empire et est utilisée comme monnaie alternative."
 tur_second_islamic_golden_era_modifier:0 "Second Âge d'Or Islamique"
 desc_tur_second_islamic_golden_era_modifier:0 "L'Islam est une fois de plus en plein essor. De grandes percées culturelles, sociales et technologiques sont faites par les hommes bénis par Allah tandis que les pays musulmans traversent une renaissance de l'art et de la science."
 tur_investment_into_infrastructure:0 "Investisseurs Étrangers"
 desc_tur_investment_into_infrastructure:0 "Cette province reçoit le soutien d'investisseurs étrangers qui cherchent leur chance ici."
 tur_jade_techniques_of_far_east_modifier:0 "Techniques de Jade de l'Extrême-Orient"
 desc_tur_jade_techniques_of_far_east_modifier:0 "Les marchands voyageant sur la Route de la Soie n'ont pas seulement apporté des biens d'Asie en Europe, mais aussi des connaissances et du matériel qui permettent à cette province de produire sa propre version de porcelaine."
 tur_peak_of_ottoman_empire:0 "Administration Impériale Étendue"
 desc_tur_peak_of_ottoman_empire:0 "Le grand [Root.Monarch.GetTitle] a fait des réformes radicales de l'administration et de la bureaucratie de l'empire, nous permettant d'intégrer et de maintenir plus de territoire que jamais auparavant."
 tur_major_centre_myrrh_production_modifier:0 "Centre Majeur de Production de Myrrhe"
 desc_tur_major_centre_myrrh_production_modifier:0 "Cette province est sur les terres fructueuses d'Aden. En raison des propriétés du sol, la production de myrrhe et d'autres ingrédients d'encens est en quantité beaucoup plus grande."
 tur_secured_loyalty_of_the_harem:0 "Régulation du Harem"
 desc_tur_secured_loyalty_of_the_harem:0 "Par des intrigues, des jeux diplomatiques à la cour et du chantage, le contrôle sur le Harem a été partiellement restauré."
 tur_growing_influence_of_the_janissaries:0 "Influence Croissante des Janissaires"
 desc_tur_growing_influence_of_the_janissaries:0 "Les Janissaires voient une utilisation accrue dans notre armée. Tellement que nos forces et notre Sultan sont devenus dépendants d'eux, permettant aux Janissaires d'exercer plus de pouvoir qu'il n'était jamais prévu pour eux."
 tur_reigned_the_eyalets:0 "Eyalets Ramenés à l'Ordre"
 desc_tur_reigned_the_eyalets:0 "Les Eyalets ont été ramenés à l'ordre et n'osent plus s'opposer à leur maître."
 tur_a_reborn_empire_modifier:0 "Un Empire Renaissant"
 desc_tur_a_reborn_empire_modifier:0 "Nous avons surmonté notre période la plus sombre de l'histoire ottomane. Les Janissaires traîtres, le Harem comploteur et les Pachas rebelles n'ont pas suffi à mettre le grand Empire à genoux !"
 tur_the_republic_of_turkiye:0 "La République de Türkiye"
 desc_tur_the_republic_of_turkiye:0 "Le Sultanat n'est plus, mais la grandeur des Turcs perdure ! Que le monde tremble devant la puissance de la Révolution menée par notre glorieux pays !"
 ###OTTOMAN DECISIONS###
 restore_devshirme_system_title:0 "Restaurer le Système du Devshirme"
 restore_devshirme_system_desc:0 "Le Système du Devshirme a été compromis. Des familles musulmanes font passer clandestinement leurs enfants dans le corps des Janissaires tandis que les sujets païens de notre pays nous livrent leurs plus faibles. Nous devons réparer les dégâts aussi vite que possible avant que la discipline de nos Janissaires ne décline davantage."
 second_islamic_golden_era_descision_title:0 "Second Âge d'Or Islamique"
 second_islamic_golden_era_descision_desc:0 "Une fois de plus, l'Islam s'élève au rang de grande puissance dominante du monde. Avec l'essor du Califat Ottoman, le progrès culturel et technologique des pays musulmans est florissant.\nVéritablement, nous vivons dans un Second Âge d'Or Islamique."
 tur_assigned_local_pasha:0 "Pacha de leur Propre Peuple"
 desc_tur_assigned_local_pasha:0 "Le pacha régnant sur cette province a été sélectionné parmi l'un des résidents locaux populaires."
 tur_expanded_administration:0 "Administration Décentralisée"
 desc_tur_expanded_administration:0 "En raison de la nature décentralisée de notre régime, le processus d'intégration du nouveau territoire est géré par les pachas locaux et est donc moins un fardeau pour le gouvernement central."
 face_the_janissaries_1_title:0 "Affronter les Janissaires dans les Balkans"
 face_the_janissaries_1_desc:0 "Les Janissaires ont trop grandi en pouvoir et en influence. Par le feu de nos canons et l'acier de nos lames, ils doivent être arrêtés !"
 face_the_janissaries_2_title:0 "Affronter les Janissaires en Anatolie"
 face_the_janissaries_2_desc:0 "Les Janissaires ont trop grandi en pouvoir et en influence. Par le feu de nos canons et l'acier de nos lames, ils doivent être arrêtés !"
 face_the_janissaries_3_title:0 "Affronter les Janissaires à [Root.Capital.GetName]"
 face_the_janissaries_3_desc:0 "Les Janissaires ont trop grandi en pouvoir et en influence. Par le feu de nos canons et l'acier de nos lames, ils doivent être arrêtés !"
 negotiate_with_the_janissaries_title:0 "Négocier avec les Janissaires"
 negotiate_with_the_janissaries_desc:0 "Bien que ce ne soit pas nécessairement la première option que l'on considérerait après qu'ils aient fait un Coup d'État, il pourrait être possible de négocier avec les Janissaires et de les persuader de rendre une partie du pouvoir."
 tur_legendary_lawgiver_modifier:0 "Le Grand Législateur"
 desc_tur_legendary_lawgiver_modifier:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] est d'un grand talent en ce qui concerne l'administration et la création de lois pour l'empire.\nQue [Root.Monarch.GetHerHis] règne soit éternel.\nQue [Root.Monarch.GetHerHis] sagesse ne [Root.Monarch.GetHerHim] fasse jamais défaut."
