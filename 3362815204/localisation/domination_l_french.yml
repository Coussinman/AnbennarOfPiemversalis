 ###ESTATES###
 estate_janissaries:0 "Janissaires"
 estate_janissaries_desc:0 "Les Janissaires sont des corps d'élite loyaux uniquement au Sultan lui-même. Leurs rangs sont constitués par le système du devshirme de prélèvement d'enfants et passent par un entraînement militaire strict. Ainsi, les Janissaires sont les forces les plus disciplinées de l'empire.\nAvec le temps, l'influence des Janissaires a grandi au point où les Janissaires sont une classe à part entière."
 estate_janissaries_ownership:0 "Propriété Foncière des Janissaires"
 EST_VAL_FROM_JANISSARY_PERCENTAGE:0 "Janissaires employés par rapport à l'Armée totale : §Y$VAL$%§!"
 EST_VAL_NO_JANISSARY_ON_FIELD:0 "Aucun Janissaire employé : §Y$VAL$%§!"
 EST_VAL_RULER_MIL_SKILLS_LOY:0 "Compétences Militaires du Dirigeant : "
 EST_VAL_JANISSARY_PERCENTAGE_LOY:0 "Sous Dépendance des Janissaires : §R$VAL$§!"
 ###MODIFIERS###
 janissaries_loyalty_modifier:0 "Équilibre de Loyauté des Janissaires"
 janissaries_influence_modifier:0 "Influence des Janissaires"
 janissaries_privilege_slots:0 "Privilèges Maximum des Janissaires"
 ###SUBJECT TYPES###
 eyalet_modifier:0 "Est un Eyalet"
 eyalet:0 "Eyalet"
 eyalet_long_desc:0 "Un Eyalet est un sujet ottoman qui se concentre uniquement sur la gouvernance des terres qu'il possède. Contrairement aux autres types de sujets, un Eyalet ne rejoindra aucune guerre de lui-même à moins d'en recevoir l'ordre direct de son suzerain."
 eyalet_title:0 "Eyalet"
 eyalet_title_plural:0 "Eyalets"
 eyalet_overlord:0 "Suzerain d'Eyalet"
 eyalet_subject:0 "Sujet Eyalet"
 eyalet_is_our:0 "§Y$NAME$§! est notre Eyalet."
 core_eyalet:0 "Eyalet Central"
 core_eyalet_long_desc:0 "Un Eyalet Central se comporte comme tout autre Eyalet, mais est bien plus étroitement lié à son suzerain et n'est guère différent d'un territoire directement contrôlé. Contrairement aux eyalets normaux, un eyalet central ne peut pas être appelé dans les guerres et peut être annexé."
 core_eyalet_title:0 "Eyalet Central"
 core_eyalet_title_plural:0 "Eyalets Centraux"
 core_eyalet_overlord:0 "Suzerain d'Eyalet Central"
 core_eyalet_subject:0 "Sujet Eyalet Central"
 core_eyalet_is_our:0 "§Y$NAME$§! est notre Eyalet Central."
 CORE_EYALET_TT:0 "Un §YEyalet Central§! peut être annexé pour §Y6§! £dip£ par développement au lieu de 8, mais ne peut rejoindre aucune guerre de son suzerain."
 default:0 "défaut"
 default_long_desc:0 "Le sujet par défaut. L'origine de tous les types de sujets du monde."
 default_title:0 "Sujet par Défaut"
 default_title_plural:0 "Sujets par Défaut"
 default_overlord:0 "Suzerain de Sujet par Défaut"
 default_subject:0 "Sujet par Défaut"
 default_is_our:0 "§Y$NAME$§! est notre Sujet par Défaut."
 APPANAGE:0 "Apanage"
 appanage:0 "Apanage"
 appanage_long_desc:0 "Un sujet Apanage doit suivre son suzerain à la guerre, ne peut pas effectuer certaines actions diplomatiques et paiera une fraction de ses revenus à son suzerain. Les sujets Apanage peuvent également se combattre entre eux."
 appanage_title:0 "Apanage"
 appanage_title_plural:0 "Apanages"
 appanage_overlord:0 "Suzerain d'Apanage"
 appanage_subject:0 "Sujet Apanage"
 appanage_is_our:0 "§Y$NAME$§! est notre Apanage."
 commercial_enterprise:0 "Entreprise Commerciale"
 commercial_enterprise_long_desc:0 "Une entreprise commerciale est une compagnie de commerce autonome qui agit dans les intérêts de son suzerain."
 commercial_enterprise_title:0 "Entreprise Commerciale"
 commercial_enterprise_title_plural:0 "Entreprises Commerciales"
 commercial_enterprise_overlord:0 "Suzerain d'Entreprise Commerciale"
 commercial_enterprise_subject:0 "Sujet Entreprise Commerciale"
 commercial_enterprise_is_our:0 "§Y$NAME$§! est notre Entreprise Commerciale"
 trade_protectorate:0 "Protectorat Commercial"
 trade_protectorate_long_desc:0 "Un protectorat commercial est une relation entre une puissance maritime forte et un royaume local plus faible. Le sujet transfère toute son influence commerciale à son suzerain en échange de sa protection. Bien que ce soit une relation de sujétion, les protectorats commerciaux agissent de manière autonome et peuvent rompre l'accord commercial avec leur suzerain."
 trade_protectorate_title:0 "Protectorat Commercial"
 trade_protectorate_title_plural:0 "Protectorats Commerciaux"
 trade_protectorate_overlord:0 "Suzerain de Protectorat Commercial"
 trade_protectorate_subject:0 "Sujet Protectorat Commercial"
 trade_protectorate_is_our:0 "§Y$NAME$§! est notre Protectorat Commercial"
 ###PEACE TREATIES###
 po_establish_eyalet:0 "Établir un Eyalet"
 po_establish_eyalet_desc:0 "[From.GetName] deviendra un Eyalet de [Root.GetName]"
