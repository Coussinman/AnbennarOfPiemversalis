 ###DECISIONS###
 eng_make_orkney_offer_title:0 "Proposer l'achat de [369.GetName]"
 eng_make_orkney_offer_desc:0 "Avec la soumission de l'Écosse, les parties septentrionales des îles Britanniques sont sous domination [Root.GetAdjective]. Cependant, les îles du nord de [369.GetName], [1978.GetName] et [1979.GetName] échappent encore à notre autorité. Si [1978.GetName] et [1979.GetName] sont négligeables, l'île de [369.GetName] doit être incorporée à notre État.\nPeut-être qu'un achat de l'île auprès de [369.Owner.GetName] serait envisageable."
 eng_abolish_adjustments_of_laws_title:0 "Abroger les ajustements législatifs"
 eng_abolish_adjustments_of_laws_desc:0 "Les ajustements à notre ensemble de lois ne sont plus nécessaires. Il est temps de s'en débarrasser."
 eng_end_the_law_discussions_title:0 "Mettre fin aux ajustements législatifs"
 eng_end_the_law_discussions_desc:0 "Promulguer de nouvelles questions pour modifier notre législation est un lourd fardeau pour notre bureaucratie. Il est temps de mettre fin à ces discussions pour le moment."
 eng_end_the_law_discussions_at:0 "§YLes questions parlementaires qui modifient nos idées nationales ne seront plus disponibles.§!"
 eng_start_the_law_discussions_title:0 "Reprendre les ajustements législatifs"
 eng_start_the_law_discussions_desc:0 "Notre situation exige à nouveau des ajustements flexibles de nos lois nationales."
 eng_start_the_law_discussions_at:0 "§YLes questions parlementaires qui modifient nos idées nationales sont à nouveau disponibles.§!"
 ###BRITISH MODIFIERS###
 eng_the_crown_of_ireland:0 "La couronne d'Irlande"
 desc_eng_the_crown_of_ireland:1 "Avec l'établissement de l'Irlande en tant que véritable royaume, le prestige de notre [Root.Monarch.GetTitle] en tant que souverain légitime de l'Irlande est assuré."
 eng_the_crown_of_iberia:0 "Couronne d'Ibérie"
 desc_eng_the_crown_of_iberia:0 "Avec l'établissement de l'Ibérie en tant que véritable royaume, le prestige de notre [Root.Monarch.GetTitle] en tant que souverain légitime de l'Ibérie est assuré."
 eng_the_crown_of_italy:0 "Couronne d'Italie"
 desc_eng_the_crown_of_italy:0 "Avec l'établissement de l'Italie en tant que véritable royaume, le prestige de notre [Root.Monarch.GetTitle] en tant que souverain légitime de l'Italie est assuré."
 eng_english_rule_over_ireland:0 "Domination directe"
 desc_eng_english_rule_over_ireland:0 "Cette province est sous la domination directe des Anglais. Certainement, cela n'aura aucune répercussion à l'avenir."
 eng_unified_britain:0 "Bretagne unifiée"
 desc_eng_unified_britain:0 "Son Altesse, le [Root.Monarch.GetTitle], sera bénie car la grande nation de [Root.GetUsableName] a unifié les îles Britanniques pour la gloire du Seigneur."
 gbr_british_rule:0 "Domination britannique"
 desc_gbr_british_rule:0 "Cette province fait partie intégrante du royaume britannique. Là où régnaient jadis les inquiétudes du chaos et des troubles locaux se trouve désormais un gouvernement local sûr et stable."
 eng_a_house_united:0 "Une maison unie"
 desc_eng_a_house_united:0 "Avec la fin de la Guerre des Deux-Roses, la maison de [Root.Dynasty.GetName] règne sur [Root.GetUsableName] avec le soutien de la noblesse et des diplomates."
 eng_dynastical_security:0 "Sécurité dynastique"
 desc_eng_dynastical_security:0 "La Guerre des Deux-Roses a été de justesse évitée. Pour l'avenir, les [Root.Dynasty.GetName] veilleront à ce qu'un héritier légitime succède toujours au [Root.Monarch.GetTitle] sur le trône."
 eng_a_new_religious_destiny:0 "Une nouvelle destinée religieuse"
 desc_eng_a_new_religious_destiny:0 "Plus de chrétiens, l'avenir religieux de [Root.GetName] est ouvert. Mais où que notre destin nous mène, la croyance zélée de notre peuple demeurera !"
 eng_a_different_kind_of_christian:0 "Absent de la Réforme"
 desc_eng_a_different_kind_of_christian:0 "Tandis que nos anciens frères dans la foi s'entretuent au milieu de la Réforme, notre peuple a trouvé l'illumination dans les voies de [Root.Religion.GetName]. Nous plaignons ceux qui s'accrochent encore aux voies archaïques du catholicisme et de son équivalent réformé."
 eng_loyalty_to_catholocisim:0 "Loyauté envers le Pape"
 desc_eng_loyalty_to_catholocisim:0 "Nous avons montré notre loyauté envers la cause catholique. Notre influence dans les affaires papales grandit."
 eng_own_church_creation:0 "Un État, une Église"
 desc_eng_own_church_creation:0 "L'influence néfaste du clergé a enfin été endiguée. Désormais, l'Église est sujette à l'État et la religion protestante prévaudra dans [Root.GetName]."
 eng_calvinist_path:0 "Voie calviniste"
 desc_eng_calvinist_path:0 "Nous avons choisi de suivre la voie des calvinistes. Que le Seigneur ait pitié de nos ennemis car nous n'en aurons point."
 eng_head_of_the_anglican_church:0 "Chef de l'Église anglicane"
 desc_eng_head_of_the_anglican_church:0 "L'Église catholique a été expulsée ; les directions luthérienne et calviniste de la Réforme ne suffisent pas. Au lieu de cela, nous empruntons une voie religieuse adaptée aux seigneurs de Bretagne."
 eng_the_age_of_reformation:0 "Chaos religieux"
 desc_eng_the_age_of_reformation:0 "Les souverains [Root.GetAdjective] ont une chance de §Y50,0 %§! d'avoir une religion §Rhérétique§! lorsqu'ils accèdent au trône.\nLes souverains peuvent adopter une §Yposition religieuse§! envers la Réforme qui affectera les événements futurs.\n\nLa guidance religieuse de l'État est dans un chaos total. Les [Root.Monarch.GetTitle]s décident de la direction de notre foi à volonté ; le clergé est menacé par l'État.\nUn avenir incertain attend notre peuple...\n§YCe modificateur dure jusqu'à la fin de l'Ère de la Réforme ou jusqu'à ce que nous ne soyons plus chrétiens.§!"
 eng_reformer_ruler:0 "Membre de la Réforme"
 desc_eng_reformer_ruler:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est un membre de la Réforme. [Root.Monarch.GetHerHisCap] actions conduiront à la discrimination de ceux qui suivent encore l'Église catholique.\n§YCe modificateur dure jusqu'à la fin de l'Ère de la Réforme ou jusqu'à ce que nous ne soyons plus chrétiens.§!"
 eng_catholic_ruler:0 "Membre de l'Église catholique"
 desc_eng_catholic_ruler:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est un membre de l'Église catholique. [Root.Monarch.GetHerHisCap] actions conduiront à la discrimination de ceux qui suivent encore la Réforme.\n§YCe modificateur dure jusqu'à la fin de l'Ère de la Réforme ou jusqu'à ce que nous ne soyons plus chrétiens.§!"
 eng_tolerant_ruler:0 "Direction incertaine"
 desc_eng_tolerant_ruler:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est indécis quant à [Root.Monarch.GetHerHis] religion. À ce titre, [Root.Monarch.GetHerHis] règne est marqué par l'instabilité nationale en faveur de l'égalité entre les religions.\n§YCe modificateur dure jusqu'à la fin de l'Ère de la Réforme ou jusqu'à ce que nous ne soyons plus chrétiens.§!"
 gbr_isolation_policy:0 "Politique d'isolement"
 desc_gbr_isolation_policy:0 "Le continent n'est plus un lieu de confort pour nous. Seules les îles Britanniques sont le foyer de notre peuple, et nous veillerons à nous concentrer d'abord sur nos affaires intérieures."
 gbr_recovering_prestige:0 "Prestige en récupération"
 desc_gbr_recovering_prestige:0 "L'abandon du continent a certainement laissé une marque sur notre prestige. Avec le temps, les puissances d'Europe reconnaîtront que nous n'avons fait qu'un repli tactique, et que nous n'avons pas abandonné les terres françaises derrière nous."
 gbr_end_of_the_villeinage:0 "Fin du servage"
 desc_gbr_end_of_the_villeinage:0 "Nos paysans ne sont plus soumis au système du servage."
 gbr_english_dutch_trade_partners:0 "Partenaires commerciaux néerlandais"
 desc_gbr_english_dutch_trade_partners:0 "Notre relation avec les Néerlandais nous permet de meilleurs profits commerciaux."
 gbr_naval_dominance:0 "Domination navale"
 desc_gbr_naval_dominance:0 "Britannia règne sur les flots."
 eng_globe_theatre:0 "Théâtre du Globe"
 desc_eng_globe_theatre:0 "Le Théâtre du Globe est un théâtre construit par la troupe du Lord Chamberlain, la troupe de William Shakespeare. De nombreux grands actes et pièces ont lieu dans ce théâtre et c'est donc un objet de grand prestige et de splendeur."
 gresham_college_royal_society:0 "La Société royale"
 desc_gresham_college_royal_society:0 "La Société royale de Londres pour l'amélioration des connaissances naturelles est une communauté de scientifiques et d'érudits promouvant les avancées de la science."
 angevin_age:0 "Ère angevine"
 desc_angevin_age:0 "Une nouvelle ère se lève alors que le [Root.GovernmentName] [Root.GetAdjective] revendique le monde même pour lui. Que nos ennemis tremblent et que nos sujets prospèrent tandis que le [Root.Monarch.GetTitle] contemple le territoire qui reste à conquérir."
 eng_taxation_of_the_clergy:0 "Taxation du clergé"
 desc_eng_taxation_of_the_clergy:0 "Le clergé est sous la pression d'une lourde taxation. Un autre mouvement de la couronne royale contre l'institution cléricale."
 eng_protects_the_clergy:0 "Protection du clergé"
 desc_eng_protects_the_clergy:0 "Le clergé est protégé de la persécution et de la pression fiscale."
 eng_taxation_of_the_clergy_prot:0 "Taxation du clergé"
 desc_eng_taxation_of_the_clergy_prot:0 "Le clergé est sous la pression d'une lourde taxation. Un autre mouvement de la couronne royale contre l'institution cléricale."
 eng_protects_the_clergy_prot:0 "Protection du clergé"
 desc_eng_protects_the_clergy_prot:0 "Le clergé est protégé de la persécution et de la pression fiscale."
 eng_foreign_religious_control:0 "Contrôle religieux étranger"
 desc_eng_foreign_religious_control:0 "Les affaires religieuses sont désormais entre les mains des [Root.GetClergyName] et des conseillers du [Root.Monarch.GetTitle].\n\n§YObtient un modificateur selon le type et le niveau du conseiller :§!\n -§YPhilosophe§! et §YScientifique naturaliste§!\n    - Tolérance envers les hérétiques : §G+1,00§! par niveau\n -§YArtiste§!\n    - Tolérance de la vraie foi : §G+1,00§! par niveau\n -§YTrésorier§! et §YMaître des monnaies§!\n    - Unité religieuse : §G+15,0 %§! par niveau\n -§YInquisiteur§! et §YThéologien§!\n    - Force missionnaire contre les hérétiques : §G+1,0 %§! par niveau"
 eng_end_of_the_english_reformation:0 "Fin de la Réforme"
 desc_eng_end_of_the_english_reformation:0 "Les catholiques et les membres de la Réforme se sont finalement réconciliés sous la bannière de [Root.GetUsableName]. Notre nation, jadis divisée par la religion, est désormais à nouveau unie.\nDu moins, autant que faire se peut.\n\n§YLe désastre « Troubles religieux » ne peut pas se déclencher pour nous.§!"
 gbr_religious_stability:0 "Stabilité religieuse"
 desc_gbr_religious_stability:0 "La Réforme est terminée et la stabilité et la sécurité de notre religion ont été restaurées."
 gbr_resolved_civil_war:0 "Ordre restauré"
 desc_gbr_resolved_civil_war:0 "Le chaos de la guerre civile a laissé des cicatrices dans notre pays, mais finalement, l'ordre a été restauré. La légitimité de la couronne ainsi que l'influence du parlement sont à nouveau en équilibre."
 gbr_a_stable_government:0 "Absolutisme surmonté"
 desc_gbr_a_stable_government:0 "La lutte pour le pouvoir entre le parlement et la couronne a été résolue sans effusion de sang. Le gouvernement a survécu aux tentatives du parlement et de la couronne de prendre le contrôle total du pays."
 gbr_unified_british_isles_culture:0 "Identité britannique unifiée"
 desc_gbr_unified_british_isles_culture:0 "L'identité britannique est constituée des nombreuses cultures différentes des îles Britanniques forgées en une seule sous l'anglais, son aspect le plus dominant."
 ave_iberian_conquest:0 "Conquête ibérique"
 desc_ave_iberian_conquest:0 "La péninsule Ibérique est tombée devant la puissance de notre [Root.GovernmentName]. Leur population fera partie de la machine de guerre [Root.GetAdjective] !"
 gbr_new_world_dominance:0 "Domination du Nouveau Monde"
 desc_gbr_new_world_dominance:0 "Le Nouveau Monde et toutes ses ressources appartiennent au [Root.GovernmentName] [Root.GetAdjective] !\n\nTous les sujets §Ycoloniaux§! gagnent §G+50,0 %§! d'efficacité de production et §G+50,0 %§! d'efficacité commerciale."
 ave_new_world_dominance:0 "Domination du Nouveau Monde"
 desc_ave_new_world_dominance:0 "Le Nouveau Monde et toutes ses ressources appartiennent au [Root.GovernmentName] [Root.GetAdjective] !"
 ave_west_european_empire:0 "Empire d'Europe"
 desc_ave_west_european_empire:0 "Notre royaume a atteint une nouvelle dimension qui fait honte à toutes les autres grandes puissances. L'Europe plie le genou devant nous !"
 ave_anglo_french_imperium:0 "Imperium anglo-français"
 desc_ave_anglo_french_imperium:0 "L'union des Anglais et des Français. Les ambitions de deux peuples impériaux unies en un seul désir."
 gbr_influence_of_the_trade_company:0 "Influence de la compagnie commerciale"
 desc_gbr_influence_of_the_trade_company:0 "Cette province est dans la sphère d'influence directe d'une puissante compagnie commerciale."
 gbr_emperor_of_india:0 "Maître de l'Inde"
 desc_gbr_emperor_of_india:0 "Les richesses de l'Inde nous appartiennent ! Véritablement, nous en sommes le maître et bénéficierons grandement de sa fortune.\n\nLes §YEntreprises commerciales§! et les §YProtectorats§! gagnent §G+15,0 %§! de modificateur de marchandises produites.\nLes §YEntreprises commerciales§! accordent désormais au suzerain §G-75,0 %§! de pénalité commerciale réduite sur les nœuds commerciaux non principaux et §G+10,0 %§! d'efficacité commerciale."
 gbr_emperor_of_india_subject_bonus:0 "Maître de l'Inde"
 gbr_emperor_of_india_overlord_bonus:0 "Maître de l'Inde"
 ave_imperial_favoritism:0 "Favoritisme impérial"
 desc_ave_imperial_favoritism:0 "Par notre charme, les électeurs de l'Empire nous sont favorables. Cela améliore considérablement notre image publique."
 ave_expnansionist_path:0 "Marche vers l'Allemagne"
 desc_ave_expnansionist_path:0 "Le jadis puissant Saint-Empire n'est plus. Notre chemin vers l'Allemagne est pavé pour nos ambitions de conquête."
 ave_imperial_parliament:0 "Parlement impérial"
 desc_ave_imperial_parliament:0 "En tant que grand empereur du Saint-Empire romain germanique, le [Root.GetParliamentOrFallbackName] a étendu ses responsabilités aux affaires de l'Empire."
 ave_end_of_the_empire:0 "Fin de l'Empire"
 desc_ave_end_of_the_empire:0 "L'Empire est tombé. Tout ce qui en reste est un vague souvenir tandis que la bannière [Root.GetAdjective] flotte sur son sol."
 ave_prosperous_metropolis:0 "Métropole prospère"
 desc_ave_prosperous_metropolis:0 "Cette province traverse une période de paix, de liberté, de justice et de sécurité sous son nouvel empire."
 gbr_accepted_lowlands:0 "Pays-Bas intégrés"
 desc_gbr_accepted_lowlands:0 "Les cultures des Pays-Bas sont intégrées aux nôtres."
 gbr_accepted_lowlands_tt:0 "jusqu'à ce que §Ynéerlandais§! ou §Yflamand§! soit rétrogradé"
 gbr_colonial_australia:0 "La colonie pénitentiaire"
 desc_gbr_colonial_australia:0 "Ceux qui désobéissent à la loi ont un choix : soit pourrir dans nos prisons, soit commencer une nouvelle vie dans la terre lointaine d'Australie."
 ave_national_bank:0 "Banque nationale réformée"
 desc_ave_national_bank:0 "Notre monnaie et notre économie connaissent d'importants remaniements à plusieurs égards."
 ave_local_expanded_barracks:0 "Casernes agrandies"
 desc_ave_local_expanded_barracks:0 "Les casernes et fortifications de cette province ont été ajustées afin d'héberger plus de soldats et leurs familles."
 eng_empire_of_the_island:0 "Ascension impériale"
 desc_eng_empire_of_the_island:0 "Non plus un royaume mais un empire mondial et puissant, la gloire [Root.GetAdjective] régnera pour toujours."
 eng_most_esteemed_university:0 "Université très estimée"
 desc_eng_most_esteemed_university:0 "Seuls les plus élitistes des intellectuels sont invités à étudier dans cette université."
 eng_the_man_of_war:0 "Le vaisseau de ligne"
 desc_eng_the_man_of_war:0 "La Marine royale n'est rien sans un puissant navire pour représenter la puissance maritime du [Root.GovernmentName]."
 eng_strict_marines:0 "Les fusiliers marins royaux"
 desc_eng_strict_marines:0 "En tant que royaume maritime, il est naturel que nos fusiliers marins soient les plus élitistes et les meilleurs que la nation puisse offrir."
 eng_the_redcoat:0 "Les Habits rouges"
 desc_eng_the_redcoat:0 "À l'origine un surnom pour nos soldats, l'Habit rouge est devenu synonyme de la discipline de nos lignes d'infanterie."
 eng_the_two_houses:0 "Les deux chambres"
 eng_order_of_chivalry:0 "Ordre de chevalerie"
 eng_jousting_tournaments:0 "Tournois de joutes"
 gbr_pax_britannica:0 "Pax Britannica"
 ave_pax_angevina:0 "Pax Angevina"
