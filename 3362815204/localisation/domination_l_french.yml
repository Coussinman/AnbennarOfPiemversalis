 #Event Insights
 fra_event_insight_203_tt:0 "\n§GAperçu de l'Événement§!\nCet événement nous permettra de choisir si nous souhaitons intégrer des éléments anglais dans nos facettes d'administration ou remodeler complètement la carte culturelle des Îles"
 fra_event_insight_204_tt:0 "\n§GAperçu de l'Événement§!\nCet événement tissera l'histoire derrière l'une des universités les plus illustres et anciennes de [Root.GetName], accordant des bonus à [183.GetName] ainsi qu'aux autres provinces mentionnées dans les conditions."
 fra_event_insight_205_tt:0 "\n§GAperçu de l'Événement§!\nCet événement nous donnera l'opportunité de ressusciter le Royaume de Jérusalem @KOJ ou de couronner notre souverain comme seul chef des Terres Saintes"
