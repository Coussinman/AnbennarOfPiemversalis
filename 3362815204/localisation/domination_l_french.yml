 chi_outwards_expansion_reward_tt:0 "\nAlternativement, si nous consolidons le pouvoir pour nous-mêmes et croissons d'au moins §G1000§! de Développement :"
 chi_permanent_pp:0 "Cette Projection de Puissance est §Ypermanente§!"
