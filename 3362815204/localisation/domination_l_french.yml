 legendary_conqueror_personality:0 "Conquérant Légendaire"
 desc_legendary_conqueror_personality:0 "Un conquérant forgé par les feux de la guerre et de la victoire. Ce dirigeant a la trempe et l'éducation qui le placeront aux côtés des plus grands et des plus loués conquérants de l'histoire."
 legendary_conqueror_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] conquêtes ont pavé la gloire de notre nation."
 ancestor_legendary_conqueror_personality:0 "Conquérant Légendaire"
