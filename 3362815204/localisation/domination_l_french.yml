 #Japan EoC Loc

 mng_cornerstone_empire2_title:0 "Pierre angulaire d'un empire"
 mng_cornerstone_empire2_desc:0 "Une nation dont les frontières englobent de si vastes étendues de terre ne peut que dépendre de quelques personnages puissants au sein de notre cour. Ainsi, pour assurer une stabilité et une intégrité opérationnelle appropriées, nous devons discerner la meilleure voie à suivre et distribuer le pouvoir en conséquence."
 mng_censorate2_title:0 "Le Censorat"
 mng_censorate2_desc:0 "Branche hautement efficace de notre gouvernement, nous devons déployer nos plus grands efforts pour assurer le processus continu de centralisation et d'efficacité bureaucratique afin de correspondre à la taille de notre immense domaine."
 mng_promote_grand_coordinators2_title:0 "Grands coordinateurs"
 mng_promote_grand_coordinators2_desc:0 "L'équivalent oriental d'un vice-roi, communément appelé Xunfu en Chine et Junbu dans notre pays, est une fonction clé qui joue un rôle important dans notre administration. Nous devons veiller à promouvoir des coordinateurs capables et assurer leur loyauté envers l'Empereur."
 mng_reform_civil_registration2_title:0 "Réformer l'état civil"
 mng_reform_civil_registration2_desc:0 "Le système de gouvernance promu par notre dynastie n'a connu que peu de rénovations au cours des dernières époques. À cette fin, nous devons établir une méthode appropriée pour administrer les vagues de sujets sous notre bannière et atténuer convenablement les malus qui accompagnent la corruption et la surextension administrative."
 mng_examination_system2_title:0 "Système d'examens"
 mng_examination_system2_desc:0 "Ayant amélioré notre système de gouvernance, nous devons maintenant nous concentrer sur le choix d'une voie à suivre pour notre Empire. La centralisation, la délégation de l'autorité locale à des figures individuelles et la promotion de membres dynastiques à des positions de pouvoir ne sont que quelques-unes des voies que notre grand Empereur peut choisir de suivre."
 mng_mutual_trade_system2_title:0 "Système commercial mutuel"
 mng_mutual_trade_system2_desc:0 "Projeter notre force et échanger des cadeaux, des faveurs et des pièces contre la protection est une relation relativement efficace et extrêmement profitable entre notre grande dynastie et les nombreux pays satellites à travers notre sphère d'influence. Cependant, nous ne devons pas nous reposer et continuer plutôt à améliorer cette base puissante, que ce soit par la révision des accords de tribut ou la cosignature de nouveaux avec des alliés nouvellement trouvés au-delà de nos frontières."
 mng_tame_china_sorrow2_title:0 "Dompter le chagrin de la Chine"
 mng_tame_china_sorrow2_desc:0 "Les rivières sont le sang vital de la civilisation chinoise car elles fournissent au peuple des terres précieuses et les nécessités de base. Cependant, les diverses inondations qui peuvent survenir toutes les quelques décennies sont une menace de la plus haute importance non seulement pour les moyens de subsistance de nos sujets mais aussi pour notre règne stable."
 mng_single_whip_law2_title:0 "Loi du fouet unique"
 mng_single_whip_law2_desc:0 "Un Empire de notre taille est parfois difficile à administrer et à taxer correctement. Ainsi, une grande partie de notre potentiel de profits peut parfois rester inexploitée. Pour remédier à cela, nous devons créer un nouvel impôt global, payé entièrement en argent dans un effort de centralisation de nos politiques fiscales."
 mng_pure_land2_title:0 "Terre Pure"
 mng_pure_land2_desc:0 "Malgré nos succès dans les affaires internes et externes, nous ne devons pas oublier de cultiver le jardin de notre âme et d'ériger des lieux de culte appropriés qui reflètent notre affluence et notre attention aux enseignements grâce auxquels nous avons prospéré."
 mng_shengshi_zhishi2_title:0 "Seisei et Chisei"
 mng_shengshi_zhishi2_desc:0 "L'histoire des dynasties passées, ainsi que notre propre histoire, a toujours été dictée par des flux et des reflux. Les périodes de croissance, de décadence, de destruction et de renaissance font toutes partie de la vie. Cependant, cela ne doit pas être interprété comme si nous ne pouvions pas faire de notre mieux pour assurer la croissance et le gouvernement de notre dynastie."
 mng_expand_bogue2_title:0 "Étendre le Bogue"
 mng_expand_bogue2_desc:0 "L'embouchure du fleuve à [667.GetName] est connue dans tout notre royaume comme le cœur battant des affaires profitables et du transport de marchandises et de grains précieux. Nous devons travailler sans relâche pour l'étendre afin d'accueillir des volumes plus importants de marchandises pour les besoins croissants de notre peuple."
 mng_jing_hang_grand_canal2_title:0 "Le Grand Canal de Keikou"
 mng_jing_hang_grand_canal2_desc:0 "Maîtriser les marées et les inondations qui éclatent le long des rives de notre grande nation est une compétence qui s'avérera vitale si nous voulons survivre aux siècles à venir. Les inondations ont été les événements catalyseurs derrière la montée et la chute de ceux qui étaient là avant nous et nous devons donc prendre les mesures nécessaires pour ne pas finir comme une simple brève mention dans les livres d'histoire."
 mng_expand_yongle_dadian2_title:0 "Eiraku Taiten"
 mng_expand_yongle_dadian2_desc:0 "L'avènement de l'impression et de la copie d'œuvres littéraires en Chine est une technique révolutionnaire qui permet la diffusion et la préservation des connaissances. En améliorant les techniques de nos ancêtres, nous pouvons réussir à diffuser la plus grande œuvre encyclopédique de l'Empereur Yongle, englobant des centaines de volumes de connaissances."
 mng_form_depots2_title:0 "Former les dépôts"
 mng_form_depots2_desc:0 "Malgré la nomination de sujets loyaux et la faveur des cieux, les personnes servant notre illustre Empereur peuvent parfois être victimes de leur nature humaine. Pour contrecarrer cela, nous pouvons fonder des agences d'espionnage pour surveiller les affaires et les transactions internes de nos sujets."
 mng_outer_city_beijing2_title:0 "Ville extérieure de [1816.GetName]"
 mng_outer_city_beijing2_desc:0 "La ville de [1816.GetName] a été le cœur de la Chine, abritant d'innombrables habitants de notre royaume. La taille croissante de la population aspire à une extension des plans de la ville, agrandissant ainsi l'espace de vie dans le domaine urbain."
 mng_fortify_coast2_title:0 "Fortifier la côte"
 mng_fortify_coast2_desc:0 "Nos côtes sont depuis longtemps victimes d'une piraterie insensée, dépouillant nos roturiers de leur dur labeur et parfois réduisant nos habitants du littoral en esclavage. Cette situation est totalement intolérable et doit donc être traitée de la manière la plus drastique possible."

