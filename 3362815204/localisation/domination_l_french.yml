 #General Traits

 dragon_tiger_general_personality:0 "Dragon Tigre"
 desc_dragon_tiger_general_personality:0 "Ce général est connu pour sa rapidité sur les destriers et ses charges dévastatrices aux côtés de ses régiments montés."
 dragon_tiger_general_personality_die_desc:1 "Ses manœuvres légendaires ne manqueront pas à nos ennemis insignifiants."


