 #New Mil Reforms Localisation

 expanded_black_army_reform:0 "Armée noire étendue"
 expanded_black_army_reform_desc:0 "Le besoin d'une armée professionnelle pour garder nos frontières tumultueuses a fait naître des voix à travers notre cour, exigeant l'extension des privilèges entourant l'Armée noire, une armée de mercenaires puissante et professionnelle, équipée d'un excellent acier et dévouée aux arts de la guerre."
 staatse_leger_reform:0 "Staatse Leger"
 staatse_leger_reform_desc:0 "La défense des Pays-Bas contre les griffes avides de nos puissants voisins sera confiée uniquement aux épaules de l'armée la plus capable que notre nation puisse lever. En mettant l'accent sur des valeurs telles que les effectifs militaires, la préparation et la mobilisation, nous tiendrons tête à certaines des forces armées les plus capables d'Europe."
 watergeuzen_reform:0 "Watergeuzen"
 watergeuzen_reform_desc:0 "Les fameux « Gueux de mer » sont un outil puissant à notre disposition dans nos efforts pour dompter les mers le long de notre vaste côte. En employant leurs tactiques d'abordage, en sécurisant les navires ennemis et en effectuant des réparations en mer, nous resterons à la pointe de l'innovation maritime et éclipserons nos rivaux commerciaux et militaires."
 sygnakhs_system_reform:0 "Renforcer les Sygnakhs"
 sygnakhs_system_reform_desc:0 "Le système de recrutement et de défense à travers notre nation, un ensemble de fortifications utilisées pour rassembler et défendre nos territoires, monte la garde entre nous et nos ennemis depuis des siècles. Nous devons donc prendre grand soin de le maintenir et de l'améliorer au fil du temps."
 cossacks_registry_reform:0 "Registre des Cosaques"
 cossacks_registry_reform_desc:0 "Les Cosaques qui occupent des territoires dans notre domaine sont des cavaliers habiles, maîtres de la selle et un atout puissant pour notre armée. Le registre des Cosaques les intégrera formellement dans notre administration et engagera un échange de privilèges et d'influence pour recruter leurs précieux services."
 lessons_of_the_hussite_wars_reform:0 "Leçons des guerres hussites"
 lessons_of_the_hussite_wars_reform_desc:0 "L'Europe a jadis tenté d'anéantir notre foi. Dans leurs tentatives désespérées de s'emparer de nos terres et d'exterminer nos fidèles, ils ont forgé notre trempe dans les feux de la bataille. Les expériences que nous avons vécues pendant ce martèlement constant d'assauts et de guerre, gravées dans notre peau, seront une leçon précieuse de guerre et un avertissement à tous ceux qui souhaitent fouler les terres hussites : fuyez ou mourez."

 rallied_volunteers_level_1:0 "Volontaires rassemblés"
 desc_rallied_volunteers_level_1:0 "Nous avons rassemblé de nombreux fidèles pour rejoindre nos forces armées et nous aider en guerre."
 rallied_volunteers_level_2:0 "Volontaires rassemblés"
 desc_rallied_volunteers_level_2:0 "Nous avons rassemblé de nombreux fidèles pour rejoindre nos forces armées et nous aider en guerre."
 rallied_volunteers_level_3:0 "Volontaires rassemblés"
 desc_rallied_volunteers_level_3:0 "Nous avons rassemblé de nombreux fidèles pour rejoindre nos forces armées et nous aider en guerre."
 rallied_volunteers_level_4:0 "Volontaires rassemblés"
 desc_rallied_volunteers_level_4:0 "Nous avons rassemblé de nombreux fidèles pour rejoindre nos forces armées et nous aider en guerre."
 rallied_volunteers_level_5:0 "Volontaires rassemblés"
 desc_rallied_volunteers_level_5:0 "Nous avons rassemblé de nombreux fidèles pour rejoindre nos forces armées et nous aider en guerre."

 #New Iberian content#

 #Castile and Spain

 #Slot 1
 gc_cas_spa_reconquista_one2_title:0 "Reprendre l'Andalousie"
 gc_cas_spa_reconquista_one2_desc:0 "Les Maures ont joui de notre patience pendant des centaines d'années. Chassons-les et reprenons l'Andalousie pour la Couronne [Root.GetAdjective]."
 gc_cas_spa_reconquista_four2_title:0 "Poursuivre la Reconquista"
 gc_cas_spa_reconquista_four2_desc:0 "En plus de nos revendications en Ibérie, nous devrions établir notre présence dans quelques villes d'Afrique du Nord pour nous protéger contre une invasion."
 gc_cas_spa_iberia_christian2_title:0 "Convertir l'Ibérie"
 gc_cas_spa_iberia_christian2_desc:0 "Le reste de l'Europe regarde avec désapprobation alors que nous semblons abriter l'hérésie en notre sein. Ramenons nos frères égarés à la seule vraie foi."
 spa_raise_army_title:1 "Armées d'Ibérie"
 spa_raise_army_desc:0 "La compétition accrue entre les différentes nations ibériques et leurs voisins nous détermine à établir une armée et une marine permanentes pour faire face aux défis qui se présenteront à l'avenir."
 spa_reform_armada2_title:0 "Armada espagnole"
 spa_reform_armada2_desc:0 "Nous devons être prêts à combattre la montée de l'hérésie en Europe, et pour ce faire nous aurons besoin d'une flotte rivalisant même avec celle de l'Angleterre. Notre Grande et Très Fortunée Marine doit pouvoir résister à tout ennemi et à toute tempête."
 gc_spa_invade_england2_title:0 "Envahir l'Angleterre"
 gc_spa_invade_england2_desc:0 "Nous ne pouvons pas permettre aux îles Britanniques de tomber dans l'hérésie ! Pour protéger la foi, nous devons embarquer nos soldats sur l'Armada et mettre les voiles vers l'Angleterre, où nous tenterons de prendre les rênes du gouvernement par la force."
 #Colonial Slot 1
 spa_sevilla_port_title:0 "Port de Séville"
 spa_sevilla_port_desc:0 "Séville est déjà le port le plus important de Castille, étant au carrefour des routes commerciales de la Méditerranée et de l'Atlantique. Développer son infrastructure pourrait être un investissement très rentable."
 spa_dominate_sevilla_title:0 "Casa de Contratación"
 spa_dominate_sevilla_desc:0 "Nous devons établir une nouvelle institution capable de superviser tout le commerce effectué avec le Nouveau Monde, et qui puisse contribuer à une colonisation ordonnée de ces terres."
 gc_cas_spa_la_plata2_title:0 "Établir La Plata"
 gc_cas_spa_la_plata2_desc:0 "Le paysage verdoyant d'Amérique du Sud devrait constituer un excellent site pour une nouvelle entreprise coloniale."
 gc_cas_spa_new_granada2_title:0 "Nouveau Royaume de Grenade"
 gc_cas_spa_new_granada2_desc:1 "Les territoires de la côte espagnole méridionale doivent être organisés en une entité administrative cohérente, que nous nommerons le Nouveau Royaume de Grenade. Une Real Audiencia doit être nommée pour déléguer l'autorité juridique sur la colonie depuis Bogotá."
 spa_new_world_silver_title:0 "Le commerce de l'argent"
 spa_new_world_silver_desc:0 "Nous avons découvert de vastes gisements de métaux précieux en explorant et colonisant le Nouveau Monde. L'exploitation et le commerce systématiques de ces métaux, en particulier l'argent, augmenteraient considérablement nos revenus réguliers."

 #Slot 2
 spa_papal_favor_title:0 "Politique du Saint-Siège"
 spa_papal_favor_desc:0 "Depuis des siècles, la présence de cardinaux ibériques au Saint-Siège est régulière. Il serait judicieux d'accroître leur réseau et leur influence dans la politique papale, car cela pourrait être très bénéfique pour nos Rois Catholiques."
 spa_rein_in_france_title:0 "Maîtriser la France"
 spa_rein_in_france_desc:0 "L'influence de la France s'est profondément fait sentir dans la politique ibérique pendant des siècles, soit comme allié soit comme ennemi. Nous avons un choix à faire : soit nous lier d'amitié avec elle et sécuriser une nouvelle alliance clé, soit la rivaliser et la neutraliser comme menace pour notre avenir."
 spa_tercios_system_title:0 "Assembler les Tercios"
 spa_tercios_system_desc:0 "Nos chefs militaires ont accumulé une précieuse expérience de combat au cours des dernières décennies. En conséquence, nous pourrions être en mesure d'introduire un nouveau système de recrutement et d'entraînement pour nos armées, qui aboutira à une nouvelle organisation militaire, les Tercios."
 spa_reform_tercios_title:0 "Affiner les Tercios"
 spa_reform_tercios_desc:0 "Le système des Tercios a été un grand succès depuis sa mise en œuvre. Cependant, de nouveaux styles de guerre ont été développés pour les vaincre sur le champ de bataille, une réforme de leur organisation est donc nécessaire pour les maintenir aussi invincibles qu'ils sont considérés."
 #Colonial Slot 2
 spa_merchant_fleet_title:0 "Reales Atarazanas"
 spa_merchant_fleet_desc:0 "La construction navale a progressé depuis la fondation des premières Reales Atarazanas à Séville et Barcelone au XIIIe siècle. Il serait maintenant judicieux d'augmenter le nombre de chantiers navals à notre disposition, comme nos marchands le demandent également."
 gc_cas_spa_spanish_main2_title:0 "La Côte espagnole"
 gc_cas_spa_spanish_main2_desc:0 "La Côte, comme on l'appelle désormais, peut être aperçue depuis les ponts de nos navires marchands avant qu'ils n'accostent à Hispaniola. Si la prospérité des Caraïbes est une indication, il vaudrait la peine d'explorer la Côte en profondeur."
 gc_cas_spa_incans2_title:0 "Trésors incas"
 gc_cas_spa_incans2_desc:0 "Les Incas remplissent leurs temples d'or, mais semblent ignorer combien de pouvoir cette richesse commande. Leur territoire, ainsi que l'or, seraient bien plus en sécurité entre nos mains."
 gc_cas_spa_potosi2_title:0 "Argent de Potosí"
 gc_cas_spa_potosi2_desc:0 "Nous avons découvert des gisements d'argent au Cerro Rico d'une richesse au-delà de tout ce que nous avons jamais vu. Pour extraire autant d'argent que possible, nous devons non seulement mettre la population indigène au travail mais aussi importer des milliers d'esclaves africains. La valeur de cet argent est estimée si grande qu'elle dépasse de loin le coût d'achat de nouveaux esclaves, nous ne devrions donc pas hésiter à faire travailler les esclaves jusqu'à la mort."

 #Slot 3
 gc_cas_spa_reconquista_three2_title:0 "Revendications en Aragon"
 gc_cas_spa_reconquista_three2_desc:0 "Une grande partie du territoire aragonais était autrefois gouvernée par [Root.GetName]. Par la force ou par la ruse, nous devons le faire nôtre une fois de plus."
 gc_cas_spa_italian_ambition2_title:0 "Descente en Italie"
 gc_cas_spa_italian_ambition2_desc:0 "L'Italie est riche et mûre pour la prise. Comme tant d'autres avant nous, nous allons délimiter notre part de l'Italie et en récolter les richesses pour nous-mêmes."
 gc_cas_spa_italian_ambition_22_title:0 "Conquête italienne"
 gc_cas_spa_italian_ambition_22_desc:0 "En nous intégrant dans la toile complexe de diplomatie dynastique qu'est la politique italienne, nous avons tissé une histoire plausible sur de potentielles revendications espagnoles en Toscane et à Milan. Bien sûr, cette histoire ne fera rien seule ; pour cela nous aurons besoin de l'assistance de nos forces militaires."
 spa_spanish_road_title:0 "Le Chemin espagnol"
 spa_spanish_road_desc:0 "En sécurisant le nord de l'Italie et les terres d'Autriche, nous sommes maintenant prêts à poursuivre l'une des anciennes ambitions des Habsbourg, les riches Pays-Bas. Mais d'abord, nous devons établir une série de postes militaires et d'alliances qui pourraient ouvrir la voie à nos armées."
 gc_spa_spanish_netherlands2_title:0 "Pays-Bas espagnols"
 gc_spa_spanish_netherlands2_desc:0 "Nos revendications sur la Flandre et la Wallonie doivent être imposées, que ce soit par la diplomatie ou par l'épée. De plus, nous devons combattre toute hérésie qui émerge dans les Pays-Bas."
 spa_rb_italian_ambition2_title:0 "Ambition italienne"
 spa_rb_italian_ambition2_desc:0 "L'Italie est riche et mûre pour la prise. Comme tant d'autres avant nous, nous allons délimiter notre part de l'Italie et en récolter les richesses pour nous-mêmes."
 gc_spa_hre2_title:0 "Monarchie universelle"
 gc_spa_hre2_desc:0 "Il est temps pour l'Espagne de créer une monarchie catholique universelle en Europe. Pour ce faire, nous devons revendiquer le Trône Impérial du Saint-Empire romain germanique à perpétuité, abolissant les électeurs et rendant la succession héréditaire."
 #Colonial Slot 3
 gc_cas_spa_caribbean_discovery2_title:0 "Découvrir les Caraïbes"
 gc_cas_spa_caribbean_discovery2_desc:0 "On a longtemps théorisé que plutôt que de voyager vers l'Est, nous pourrions aller vers l'Ouest pour atteindre l'Inde. Nous devons mettre cette théorie à l'épreuve et rechercher le point d'atterrissage idéal."
 gc_cas_spa_caribbean_colony2_title:0 "Colonie des Caraïbes"
 gc_cas_spa_caribbean_colony2_desc:0 "Les indigènes de notre nouveau territoire d'Hispaniola sont amicaux, agréables et surtout, crédules. Nous devrions revendiquer cette région comme nôtre en plantant davantage de bottes [Root.GetAdjective] sur le terrain."
 gc_cas_spa_mayans2_title:0 "Conquête maya"
 gc_cas_spa_mayans2_desc:0 "Les explorateurs que nous avons envoyés au Yucatan reviennent avec des récits d'une mystérieuse civilisation déchue. Autrefois une grande Ligue qui régnait sur toute la péninsule, ces Mayas ont été réduits à des cités-États en guerre, mûres pour la conquête espagnole."
 gc_cas_spa_california2_title:0 "Coloniser la Californie"
 gc_cas_spa_california2_desc:0 "Étendre notre portée en Californie serait une extension naturelle des frontières de la Nouvelle-Espagne. Bien que non confirmées, il y a des rumeurs de gisements d'or vierges dans la région que nous devons sécuriser, s'ils existent effectivement."

 #Slot 4
 spa_infantes_aragon_title:0 "Les Infants d'Aragon"
 spa_infantes_aragon_desc:0 "Les Infants d'Aragon sont les frères et sœurs du roi Alphonse V d'Aragon, cousins du roi Jean II de Castille, de la dynastie Trastamare. Leur influence et leurs ambitions dans la politique castillane ont été une constante pendant un quart de siècle, atteignant maintenant un nouveau point critique et décisif."
 gc_cas_spa_reconquista_two2_title:0 "Récupérer le Portugal"
 gc_cas_spa_reconquista_two2_desc:0 "Le Royaume des Espagnes nous appartient. Cela inclut notre ancien voisin, le Portugal. Dépouillons-le de son titre et rendons la souveraineté à [Root.GetName]."
 spa_handle_austria_title:0 "Couronne d'Autriche"
 spa_handle_austria_desc:0 "Nos intérêts en Italie déterminent que nous devons sécuriser notre position avec la dynastie des Habsbourg, la principale Maison Impériale de ce siècle."
 gc_spa_austrian_union2_title:0 "La succession autrichienne"
 gc_spa_austrian_union2_desc:0 "Les Habsbourg d'Autriche ont généreusement marié leur progéniture dans à peu près toutes les maisons nobles d'Europe. Bien que cela les mette dans les bonnes grâces de nombreuses nations, leur politique est une épée à double tranchant ; des mariages stratégiques ont uni les trônes de nombreuses nations, mais les fruits de ces unions héritent également de revendications sur l'Autriche elle-même."
 spa_fecho_imperio_title:0 "Fecho del Imperio"
 spa_fecho_imperio_desc:0 "Après avoir sécurisé un pied-à-terre dans l'Empire à travers les terres autrichiennes, il est maintenant temps de briguer la Couronne Impériale et de réussir là où le roi Alphonse X a échoué au XIIIe siècle."
 #Colonial Slot 4
 gc_cas_spa_plus_ultra2_title:0 "Plus Ultra"
 gc_cas_spa_plus_ultra2_desc:0 "Qu'y a-t-il au-delà des Colonnes d'Hercule ? Nos braves explorateurs sont prêts à le découvrir !"
 gc_cas_spa_hispaniola2_title:0 "Revendiquer Hispaniola"
 gc_cas_spa_hispaniola2_desc:0 "L'île d'Hispaniola sera notre porte d'entrée vers les Caraïbes et au-delà. Nous devons coloniser l'île et établir des missions religieuses à Saint-Domingue pour répandre la parole de Dieu à travers le Nouveau Monde."
 gc_cas_spa_new_spain2_title:0 "Vice-royauté de Nouvelle-Espagne"
 gc_cas_spa_new_spain2_desc:0 "Il est temps de véritablement consolider notre règne sur le golfe du Mexique en établissant une vice-royauté coloniale permanente et organisée. La Real Audiencia servira de plus haute cour du Nouveau Monde et veillera à ce que les richesses dorées du Mexique arrivent en toute sécurité en Espagne."
 gc_cas_spa_florida2_title:0 "Fortifier la Floride"
 gc_cas_spa_florida2_desc:0 "Les terres marécageuses de Floride au nord de la Nouvelle-Espagne ne sont pas riches en or, mais elles pourraient s'avérer vitales pour la défense future de notre ordre colonial. Nous devons coloniser la région et la fortifier."

 #Slot 5
 spa_reinforce_royal_authority_title:0 "Renforcer l'autorité royale"
 spa_reinforce_royal_authority_desc:0 "La noblesse de [Root.GetName] nous a affrontés ces dernières années. Nous devons maintenant renforcer notre autorité et parvenir à un accord à long terme avec elle."
 spa_law_and_order_title:0 "Loi et ordre"
 spa_law_and_order_desc:0 "Nous devons assurer la loi et l'ordre et faciliter les voyages entre nos villes et cités prospères. Par conséquent, nous devons promouvoir les tribunaux de la Chancillería à Valladolid et Grenade, et établir la Santa Hermandad comme notre force de l'ordre."
 spa_economic_reforms_title:0 "Réformer la Hacienda"
 spa_economic_reforms_desc:0 "Après les temps difficiles qui ont affecté le pays, nous avons besoin d'un Trésor solide pour nos nouvelles entreprises. Nous devons également réformer notre système monétaire, et nous aurons besoin des conseils et de l'approbation des bourgeois pour réussir."
 spa_new_capital_title:0 "Une nouvelle capitale"
 spa_new_capital_desc:0 "Notre pays s'est agrandi et englobe maintenant de nombreux royaumes. Bien que nous soyons habitués à voyager parmi eux, nous devons maintenant établir notre cour dans un lieu fixe."
 spa_system_councils_title:0 "Système des conseils"
 spa_system_councils_desc:0 "Les besoins de notre pays se sont étendus au cours des dernières décennies. Pour cette raison, il serait judicieux de réformer notre gouvernement pour établir un système plus complet qui nous permette d'employer une bureaucratie efficace organisée en différents conseils thématiques et territoriaux."
 #Colonial Slot 5
 gc_cas_spa_west_africa2_title:0 "Ports d'Afrique de l'Ouest"
 gc_cas_spa_west_africa2_desc:0 "La côte d'Afrique de l'Ouest est d'une importance stratégique vitale. Non seulement il est essentiel d'établir des stations de ravitaillement pour les navires contournant le Cap, mais nous devons également assurer un approvisionnement régulier d'esclaves africains pour le transport vers nos colonies des Amériques."
 gc_cas_spa_discover_spice_islands2_title:0 "Naviguer vers les Indes orientales"
 gc_cas_spa_discover_spice_islands2_desc:0 "Loin à l'est se trouvent les légendaires « Îles aux Épices », la source de certaines des marchandises les plus recherchées en Europe comme la noix de muscade et les clous de girofle. Nous devons découvrir une route orientale vers ces îles."
 gc_cas_spa_conquer_philippines2_title:0 "Las Islas Filipinas"
 gc_cas_spa_conquer_philippines2_desc:0 "Nous avons découvert un grand groupe d'îles, que nous avons baptisé « Las Islas Filipinas », riches en épices et en pierres précieuses. Les païens indigènes sont divisés et peu susceptibles de pouvoir résister à une invasion espagnole. Nous devrions lancer une expédition avec autant d'hommes que nous pouvons épargner pour conquérir ces îles précieuses."
 gc_cas_spa_havana2_title:0 "Fonder La Havane"
 gc_cas_spa_havana2_desc:0 "Cuba est la plus grande des îles des Caraïbes et celle avec l'approvisionnement le plus abondant d'esclaves indigènes pour travailler nos plantations. Nous devons y établir des colonies et construire une ville dans le port naturel de la baie de La Havane."
 gc_cas_spa_native_reductions2_title:0 "Réductions indigènes"
 gc_cas_spa_native_reductions2_desc:0 "Les érudits de l'École de Salamanque nous ont forcés à admettre à contrecœur que les indigènes des Amériques sont en fait des êtres humains dotés d'une âme, et qu'à ce titre ils ont droit à des droits naturels. Nous devrions envisager de rassembler les indigènes qui restent et de les rééduquer systématiquement plutôt que de simplement les assassiner et les réduire en esclavage."
 gc_cas_spa_aztecs2_title:0 "Conquête aztèque"
 gc_cas_spa_aztecs2_desc:0 "Le système d'entrada ordonne que l'autoproclamé Empire aztèque nous appartienne. Emparons-nous de leurs terres et ramenons leur or à [Root.Capital.GetName]."

 #Modifiers
 spa_reformed_tercio_modifier:0 "Régiments de Tercios réformés"
 desc_spa_reformed_tercio_modifier:0 "Nos Tercios ont été réformés, et maintenant ils sont plus puissants que jamais !"
 spa_powerful_trade_ships_modifier:0 "Expansion des Reales Atarazanas"
 desc_spa_powerful_trade_ships_modifier:0 "Nos routes commerciales connaissent une augmentation de leur activité, conséquence de l'expansion de nos chantiers navals."
 spa_long_range_logistics_modifier:0 "Logistique à longue portée"
 desc_spa_long_range_logistics_modifier:0 "Les postes militaires que nous avons établis sur la route des Pays-Bas améliorent grandement notre performance militaire."
 spa_backed_by_the_army_modifier:0 "Expansion militaire"
 desc_spa_backed_by_the_army_modifier:0 "Une nouvelle armée permanente."
 spa_spanish_affluence_modifier:0 "Affluence espagnole"
 desc_spa_spanish_affluence_modifier:0 "Les investissements que nous avons faits dans le port de Séville portent leurs fruits."
 spa_bid_for_the_hab_crown_modifier:0 "Candidature à la couronne des Habsbourg"
 desc_spa_bid_for_the_hab_crown_modifier:0 "Notre présence en Europe centrale doit se faire sentir."
 spa_royal_authority_restored_modifier:0 "Autorité royale restaurée"
 desc_spa_royal_authority_restored_modifier:0 "L'autorité royale a finalement été restaurée en Castille."
 estate_nobles_crown_authority_modifier:0 "Autorité de la couronne"
 spa_valladolid_court_modifier:0 "Chancillería de Valladolid"
 desc_spa_valladolid_court_modifier:0 "Nous avons établi le siège de notre système judiciaire au nord du Tage à Valladolid."
 spa_granada_court_modifier:0 "Chancillería de Grenade"
 desc_spa_granada_court_modifier:0 "Nous avons établi le siège de notre système judiciaire au sud du Tage à Grenade."
 spa_spanish_dollar_modifier:0 "Le dollar espagnol"
 desc_spa_spanish_dollar_modifier:0 "Montrez-moi le dollar espagnol !"
 spa_san_lorenzo_escorial_modifier:0 "San Lorenzo de El Escorial"
 desc_spa_san_lorenzo_escorial_modifier:0 "San Lorenzo de El Escorial"
 spa_royalists_victorious_modifier:0 "Victoire des royalistes"
 desc_spa_royalists_victorious_modifier:0 "Victoire des royalistes."
 spa_victorious_infantes_modifier:0 "Suprématie des Infants"
 desc_spa_victorious_infantes_modifier:0 "Suprématie des Infants."
 est_val_infantes_victorious:0 "Infants victorieux"
 spa_universal_monarchy_modifier:0 "Monarchie universelle"
 desc_spa_universal_monarchy_modifier:0 "Le soleil ne se couchera jamais sur la nation la plus puissante que le monde ait jamais connue, vive [Root.GetName] !"
 spa_spanish_silver_and_gold_modifier:0 "Gisements espagnols"
 desc_spa_spanish_silver_and_gold_modifier:0 "Le grand afflux d'argent et d'or de nos colonies rend notre pays immensément riche."
 spa_overseas_wealth_modifier:0 "Richesse d'outre-mer"
 desc_spa_overseas_wealth_modifier:0 "Nos colonies américaines sont devenues un pilier de la richesse de notre pays."
 spa_victory_netherlands_modifier:0 "Subjugation des Pays-Bas"
 desc_spa_victory_netherlands_modifier:0 "Nous avons enfin soumis ces Hollandais embêtants !"
 spa_transatlantic_migrations_modifier:0 "Mouvement de population transatlantique"
 desc_spa_transatlantic_migrations_modifier:0 "Le Nouveau Monde doit être colonisé par notre peuple."
 spa_invest_in_west_africa_modifier:0 "Investir en Afrique de l'Ouest"
 desc_spa_invest_in_west_africa_modifier:0 "Investir en Afrique de l'Ouest semble être une décision judicieuse pour l'avenir."
 spa_aztecs_conquest_modifier:0 "Conquête des Aztèques"
 desc_spa_aztecs_conquest_modifier:1 "Nous avons enfin conquis les belliqueux Aztèques ! Ils sont maintenant très satisfaits de l'enrichissement mutuel de nos cultures."
 spa_enforced_catholicism_modifier:0 "Catholicisme imposé"
 desc_spa_enforced_catholicism_modifier:0 "Nous veillons à ce que nos sujets coloniaux pratiquent la seule vraie foi."
 spa_universal_empire_modifier:0 "Un empire universel"
 desc_spa_universal_empire_modifier:0 "Nous sommes maintenant la puissance numéro un sur la scène mondiale, que tous s'inclinent devant la couronne espagnole !"

 #Events
 flavor_spa.18.t:0 "Les Infants d'Aragon"
 flavor_spa.18.d:1 "Les Infants d'Aragon sont les fils et filles du roi Ferdinand Ier d'Aragon et de son épouse Léonore d'Alburquerque, qui ont établi la dynastie Trastamare dans ce royaume après le Compromis de Caspe en 1412. Ils sont également cousins du roi castillan Jean II et ont conspiré depuis le début de son règne pour le contrôler et s'emparer du pouvoir en Castille, avec le soutien d'une faction de parents et d'alliés parmi la noblesse castillane. Cependant, ils furent opposés par une autre faction dirigée par le Connétable Royal Álvaro de Luna, qui devint le principal soutien du roi Jean II pendant deux décennies.\n\nLa situation s'est détériorée à partir de 1437 lorsqu'une nouvelle guerre civile éclata entre la faction dirigée par les Infants d'Aragon et celle dirigée par Álvaro de Luna et l'héritier du trône Enrique, qui en vint à une résolution à la bataille d'Olmedo en [GetYear]."
 flavor_spa.18.a:0 "Nous soutenons le Roi !"
 flavor_spa.18.b:0 "Les Infants ont raison !"
 flavor_spa.20.t:0 "Fin de la lutte avec les Infants d'Aragon"
 flavor_spa.20.d:0 "Le combat entre les factions des Infants d'Aragon et les royalistes s'est terminé à la bataille d'Olmedo, l'une des factions nobles castillanes ayant triomphé de l'autre, du moins pour le moment..."
 flavor_spa.20.a:0 "Cette situation désastreuse est terminée, pour le meilleur ou pour le pire..."
 flavor_spa.22.t:0 "Le dollar espagnol"
 flavor_spa.22.d:1 "Le système monétaire en Castille dans la seconde moitié du XVe siècle était dans le chaos. Le maravédis, la principale monnaie de compte, avait été continuellement dévalué depuis le XIIIe siècle. De plus, il existait différentes monnaies régionales dans les royaumes ibériques, ce qui compliquait l'économie de l'unification politique initiée par le mariage d'Isabelle de Castille et de Ferdinand d'Aragon.\n\nPour cette raison, une réforme monétaire a été initiée en [GetYear], établissant une nouvelle pièce d'or, le ducat, et une nouvelle pièce d'argent, le réal, pour usage dans les deux royaumes. Étant donné l'afflux inattendu et important d'argent venant des Amériques dans les décennies suivantes, l'utilisation du « real de a ocho », qui devint rapidement connu sous le nom de « dollar espagnol », monta en flèche. Il est considéré comme la première monnaie mondiale, puisqu'elle était acceptée par les marchands du monde entier, de l'Afrique à l'Amérique et de l'Europe à l'Asie."
 flavor_spa.22.a:0 "Montrez-moi les dollars espagnols !"
 flavor_spa.23.t:0 "San Lorenzo de El Escorial"
 flavor_spa.23.d:1 "[Root.Monarch.GetName], monarque de [Root.GetName], a de nombreux surnoms. Mais l'un des plus précis est « le Roi Bureaucrate ». [Root.Monarch.GetSheHeCap] a décidé d'établir une capitale fixe, mettant fin à l'ancienne tradition des rois ibériques de voyager continuellement. [Root.Monarch.GetSheHeCap] a choisi Madrid en raison de sa position centrale, n'étant dépendant d'aucun grand seigneur ni de l'Église, et certains diraient en raison de sa bonne alimentation en eau. En tout cas, [Root.Monarch.GetName] n'aime pas la ville elle-même, alors [Root.Monarch.GetSheHe] a également décidé de construire un grand monastère dans ses banlieues montagneuses, dédié à Saint Laurent, qui serait également [Root.Monarch.GetHerHis] résidence habituelle. [Root.Monarch.GetSheHeCap] y a rassemblé une grande bibliothèque et des reliques de saints, et en a fait le centre nerveux de l'administration, présidant les réunions quotidiennes des différents conseils qui traitent des affaires gouvernementales. Enfin, [Root.Monarch.GetSheHe] y a également établi le panthéon de la famille royale, où tous les Rois et Reines de [Root.GetName] après [Root.Monarch.GetName] seront enterrés."
 flavor_spa.23.a:0 "Une capitale digne d'un empire mondial !"
 flavor_spa.199.t:0 "Fernand de Magellan : un explorateur légendaire !"
 flavor_spa.199.d:0 "Fernand de Magellan est un explorateur portugais qui vise à mener la première circumnavigation du monde, afin de confirmer enfin que la Terre est ronde. En [GetYear], il se prépare à mettre les voiles avec une flotte de cinq navires et environ 270 hommes pour trouver une nouvelle route vers les Îles aux Épices dans les Indes orientales. Son objectif est de découvrir le passage qui permettrait à ses navires de naviguer à travers la pointe sud de l'Amérique du Sud et d'entrer dans l'océan Pacifique.\n\nLe voyage de Magellan pourrait être semé de difficultés, y compris la famine et les batailles avec les peuples indigènes, mais il prévoit d'atteindre finalement les Indes orientales et de revenir par le cap de Bonne-Espérance. L'exploit de Magellan ouvrira la voie aux futurs explorateurs et commerçants pour naviguer autour du globe et ouvrir de nouvelles opportunités pour la colonisation et le commerce européens dans les Amériques et en Asie."
 flavor_spa.199.a:0 "Il servira sous nos armoiries !"
 flavor_spa.199.b:0 "Qu'il s'en aille ! C'est clairement un fou !"
 #Recurring events for the System of Councils mechanic
 hispanic_monarchy_events.1.t:0 "Focus sur le Conseil Royal"
 hispanic_monarchy_events.1.desc:0 "Après des délibérations réfléchies, les secrétaires des différents conseils sont parvenus au consensus que nous devons concentrer les efforts de notre gouvernement dans les années à venir sur les affaires internes, leurs actions étant coordonnées par le Conseil Royal. Il nous appartient de décider quel conseil spécifique devrait diriger les actions gouvernementales."
 hispanic_monarchy_events.1.a:0 "Le Conseil de la Chambre dispensera la volonté et la justice royales."
 hispanic_monarchy_events.1.b:0 "Le Conseil des Finances mettra le trésor en ordre et augmentera nos revenus."
 hispanic_monarchy_events.1.c:0 "Personne ne s'attendra au Conseil de l'Inquisition !"
 hispanic_monarchy_events.2.t:0 "Focus sur le Conseil d'État"
 hispanic_monarchy_events.2.desc:0 "Après des délibérations réfléchies, les secrétaires des différents conseils sont parvenus au consensus que nous devons concentrer les efforts de notre gouvernement dans les années à venir sur les affaires diplomatiques, leurs actions étant coordonnées par le Conseil d'État. Il nous appartient de décider quel conseil spécifique devrait diriger les actions gouvernementales."
 hispanic_monarchy_events.2.a:0 "Notre candidature à l'hégémonie sur l'Europe sera la question la plus importante !"
 hispanic_monarchy_events.2.b:0 "Nous orienterons les voiles de notre gouvernement vers la Méditerranée et ses côtes."
 hispanic_monarchy_events.2.c:0 "Les Indes et leurs richesses pourraient être la ligne d'action la plus lucrative."
 hispanic_monarchy_events.3.t:0 "Focus sur le Conseil de Guerre"
 hispanic_monarchy_events.3.desc:0 "Après des délibérations réfléchies, les secrétaires des différents conseils sont parvenus au consensus que nous devons concentrer les efforts de notre gouvernement dans les années à venir sur la guerre, leurs actions étant coordonnées par le Conseil de Guerre. Il nous appartient de décider quel conseil spécifique devrait diriger les actions gouvernementales."
 hispanic_monarchy_events.3.a:0 "Le Conseil de Croisade dirigera nos efforts contre les infidèles !"
 hispanic_monarchy_events.3.b:0 "Le Conseil des Ordres Militaires fournira à notre machine de guerre davantage de ressources."
 hispanic_monarchy_events.3.c:0 "Le Conseil de l'Armada assurera notre domination sur les routes maritimes."

 #Event Insights
 spa_event_insight_1003_tt:0 "\n§GAperçu de l'événement§! :\nCet événement fondera la §YCasa de Contratación§! et nous accordera un puissant modificateur permanent pour aider nos entreprises coloniales"
 #Reforms
 tercios_reform:0 "Tercios"
 tercios_reform_desc:0 "Les Tercios, littéralement « Un Tiers », étaient l'épine dorsale des armées espagnoles au début de l'époque moderne. Bien qu'historiquement les Tercios n'aient pas été recrutés uniquement en Espagne, mais aussi en Italie ou en Wallonie, les Tercios les plus précieux étaient recrutés dans les provinces espagnoles. Les Tercios furent presque imbattables pendant des décennies sur les champs de bataille à travers l'Europe et la Méditerranée, et furent essentiels à l'évolution de la guerre européenne."
 system_of_councils_reform:0 "Système des conseils"
 system_of_councils_reform_desc:0 "Le Système des Conseils, également connu sous le nom de Système Polysynodial, a été développé par la Monarchie Hispanique pour organiser le gouvernement de ses différents territoires au début de l'époque moderne. L'administration centrale était confiée à un groupe d'organes collégiaux, les Conseils, composés de nobles, de clercs et de bourgeois, directement gérés par des juristes formés à l'université, les « letrados ». Les différents Conseils étaient soit thématiques, avec des pouvoirs dans tout l'Empire espagnol, soit territoriaux, avec leurs compétences établies sur chacun des différents royaumes."

 #Privileges
 estate_nobles_factionalist_nobility:0 "Noblesse factionnaliste"
 estate_nobles_factionalist_nobility_desc:0 "Les nobles de notre pays se sont organisés en différentes factions, luttant pour le contrôle du pays, érodant progressivement le pouvoir de la Couronne."

 #Disaster
 infantes_of_aragon:0 "Infants d'Aragon"

 #New Holy Orders
 benedictines:0 "Bénédictins"
 benedictines_desc:0 "L'Ordre des Bénédictins est le plus nombreux et le plus répandu, puisque leurs moines suivent la Règle de Saint Benoît de Nursie depuis le VIe siècle."
 carthusians:0 "Chartreux"
 carthusians_desc:0 "L'Ordre des Chartreux, fondé par Bruno de Cologne, se concentre sur une approche plus érémitique de leurs monastères, appelés « chartreuses »."
 hieronymites:0 "Hiéronymites"
 hieronymites_desc:0 "L'Ordre de Saint-Jérôme a été fondé dans la péninsule Ibérique au XIVe siècle, et s'est développé rapidement car il jouissait d'une grande faveur des différentes monarchies ibériques."
 augustinians:0 "Augustins"
 augustinians_desc:0 "L'Ordre de Saint-Augustin suit la Règle de Saint Augustin d'Hippone, étant un grand promoteur de la vénération de la Vierge Marie."
 carmelites:0 "Carmélites"
 carmelites_desc:0 "Les Carmélites sont un ordre mendiant fondé sur le Mont Carmel en Terre Sainte, ayant comme pères spirituels le prophète Élie et son disciple Élisée."
 calatrava_order:0 "Ordre de Calatrava"
 calatrava_order_desc:0 "L'Ordre Militaire de Calatrava a été fondé en Castille au XIIe siècle pour combattre le Califat Almohade, en tant que branche militaire des moines cisterciens."
 avis_order:0 "Ordre d'Avis"
 avis_order_desc:0 "L'Ordre Militaire d'Avis a été fondé au Portugal au XIIe siècle, aidant le pays à s'établir comme indépendant et donnant son nom à la dynastie régnante au XVe siècle."
 montesa_order:0 "Ordre de Montesa"
 montesa_order_desc:0 "L'Ordre Militaire de Montesa a été fondé après la branche aragonaise des Templiers, étant directement parrainé par les rois d'Aragon."
 santiago_order:0 "Ordre de Santiago"
 santiago_order_desc:0 "L'Ordre de Santiago a été fondé dans le royaume de León au XIIe siècle, mais a son siège à Uclés en Castille et est l'ordre militaire ibérique le plus répandu car il est dédié à Saint Jacques, Patron de l'Espagne."
 san_juan_order:0 "Ordre de San Juan"
 san_juan_order_desc:0 "L'Ordre de Saint-Jean, mieux connu sous le nom de Chevaliers Hospitaliers, est un ordre militaire qui concentre ses activités en Méditerranée orientale, bien que ses maisons s'étendent à travers l'Europe occidentale."
 alcantara_order:0 "Ordre d'Alcántara"
 alcantara_order_desc:0 "L'Ordre d'Alcántara a été fondé dans le royaume de León au XIIe siècle dans une ville qui servait d'avant-poste frontalier avec le Portugal et le Califat Almohade."

 #Tooltips
 cas_armada_info_tt:0 "\nSi nous complétons cette mission alors que @ENG l'Angleterre ou @GBR la Grande-Bretagne suit une religion §Yhérétique§! tout en étant éligible à une §YUnion personnelle§!, nous obtiendrons à la place un casus belli de §YRestauration de l'union§!"
 spa_every_cardinal_1_tax_tt:0 "\nChaque province avec un §YCardinal§! gagnera 1 £adm£ de développement"
 spa_any_ally_tt:0 "Avoir un §Yallié§! avec :\n - Sa capitale dans la région §YFrançaise§!\n - Il est une §YGrande Puissance§! ou a au moins §Y500§! de développement total\n - Il a au moins §Y180§! d'opinion envers nous"
 spa_royalist_tt:0 "\nSi nous avons complété la mission en §Yécrasant§! les Infants, les effets négatifs de la §YNoblesse factionnaliste§! seront §Gréduits§!, et nous obtiendrons la récompense suivante :"
 spa_infantes_tt:0 "\nTandis que si nous avons choisi de §Ysoutenir§! les Infants, les effets négatifs de la §YNoblesse factionnaliste§! s'§Rintensifieront§!, et nous obtiendrons la récompense suivante :"
 spa_recent_change_tt:0 "A récemment changé sa capitale pour [217.GetName] via l'événement « §YSólo Madrid es Corte§! »"
 ended_infantes_disaster_tt:0 "A conclu le désastre des §YInfants d'Aragon§!"
 spa_no_isabella_event_tt:0 "\nL'événement « §YIsabelle de Castille§! » ne se déclenchera pas\n"
 spa_pu_por_tt:1 "Compléter cette mission sans être §Yallié§! ou engagé dans un §Ymariage royal§! avec @POR le Portugal nous accordera une revendication sur leur trône\n"
 spa_every_gold_province_tt:0 "Chaque province que nous ou un sujet §Ynon-tributaire§! possédons qui produit de l'§Yor§! obtiendra la récompense suivante :"
 cas_crushed_infantes_tt:0 "A soutenu le monarque actuel pendant le désastre"
 cas_sided_infantes_tt:0 "A soutenu les Infants pendant le désastre"
 cas_impact_mission_tt:0 "\nCela impactera le résultat de la mission « §YInfants d'Aragon§! »"
 spa_had_cas_civil_war_tt:0 "A eu le désastre « §YGuerre civile castillane§! »"
 spa_enable_san_juan_holy_order_tt:0 "\nDonne accès à l'Ordre Saint §YSan Juan§! tant que nous restons §YChrétiens§!"
 enable_jesuit_order_tt:0 "\nDonne accès à l'Ordre Saint §YJésuite§! tant que nous restons §YChrétiens§!"
 cas_race_portugal_event_tt:0 "\nSi nous complétons cette mission avant que @POR le Portugal ne complète la sienne équivalente, nous obtiendrons la récompense suivante :"
 #Aragon

 #Missions
 #Slot 1
 gc_ara_navarra2_title:0 "Vassaliser la Navarre"
 gc_ara_navarra2_desc:1 "Les Royaumes de Castille et de France jettent des regards envieux sur les terres de Navarre. Il serait désastreux pour [Root.GetName] que ces terres tombent entre leurs mains, nous devons donc être proactifs."
 gc_ara_consultate_of_the_sea2_title:0 "Consulat de la Mer"
 gc_ara_consultate_of_the_sea2_desc:0 "Le Consulat de la Mer administre le commerce maritime de notre nation depuis Valence. Sa capacité à faire respecter ses lois dépend cependant de sa capacité à contrôler le flux commercial en Méditerranée occidentale. Nous devons aider les efforts du Consulat en sécurisant la majorité de la part commerciale dans la mer voisine."
 gc_ara_genoa2_title:0 "Dominer Gênes"
 gc_ara_genoa2_desc:0 "Nous avons dû rivaliser avec les marchands génois pendant trop longtemps. Il est temps de les soumettre définitivement et de nous emparer de leur ville."
 gc_ara_italy2_title:0 "Régner sur l'Italie"
 gc_ara_italy2_desc:0 "Nous devons éliminer les derniers vestiges de résistance à notre règne en Italie. Même le Pape doit accepter notre domination."

 #Slot 2
 dom_ara_intervene_castile_title:0 "Intervenir en Castille"
 dom_ara_intervene_castile_desc:0 "Les frères et sœurs du roi Alphonse V, les Infants d'Aragon, ont tenté de prendre le contrôle de la Castille pendant deux décennies. Il est maintenant temps de soutenir leurs efforts plus directement, que ce soit par des moyens diplomatiques ou militaires."
 gc_ara_portugal2_title:0 "Union avec le Portugal"
 gc_ara_portugal2_desc:0 "Il est temps d'unir tous les Royaumes d'Espagne sous un seul monarque, et pour ce faire nous devons obtenir la couronne du Portugal."
 dom_ara_iberia_title:0 "Couronnes d'Ibérie"
 dom_ara_iberia_desc:0 "Les nombreuses couronnes d'Ibérie ont été divisées pendant des siècles. Il est maintenant temps de consommer nos efforts en la matière, afin de créer l'Empire d'Espagne."
 dom_ara_med_title:1 "Mare Nostrum"
 dom_ara_med_desc:0 "Des Colonnes d'Hercule à la mer de Marmara, la Méditerranée sera nôtre. Chaque navire qui navigue sur ses eaux le fera sous nos lois."
 gc_ara_occitania2_title:0 "Envahir l'Occitanie"
 gc_ara_occitania2_desc:0 "Partager une frontière avec le Royaume de France est une source d'anxiété pour de nombreuses nations. Nous ne pouvons jamais être sûrs que nos efforts militaires ou diplomatiques suffiront à les dissuader s'ils décident d'envahir. Au lieu de cela, nous devons porter le combat chez eux !"

 #Slot 3
 dom_ara_remensa_war_title:0 "La guerre des Remences"
 dom_ara_remensa_war_desc:0 "Les paysans remença se sont soulevés contre la noblesse catalane, après des siècles d'abus seigneuriaux croissants, s'organisant à travers le « Sindicat Remença ». Il est maintenant de notre devoir de pacifier le pays et de panser les plaies de ce conflit entre paysans et nobles."
 dom_ara_catalan_nobility_title:0 "Noblesse catalane"
 dom_ara_catalan_nobility_desc:0 "Après avoir pacifié le pays avec succès, nous devons décider du sort de la noblesse catalane dans les suites de la guerre des Remences."
 gc_ara_constantinople2_title:0 "Cité du désir mondial"
 gc_ara_constantinople2_desc:0 "Constantinople, cité du désir mondial, est à notre portée. Le siège sera certainement long et ardu, mais nous devons persévérer. La ville sera nôtre !"
 gc_ara_tunis2_title:0 "Conquérir Tunis"
 gc_ara_tunis2_desc:0 "Tunis est plus qu'un simple port de pirates. C'est la capitale d'une puissance navale rivale avec des liens avec les redoutables Turcs, et doit être détruite avant qu'ils ne deviennent une menace plus grande."
 gc_ara_golden_age2_title:0 "Siècle d'or"
 gc_ara_golden_age2_desc:0 "Nous devons inaugurer une ère dorée pour notre nation qui durera des générations. Notre richesse et notre prestige éclipseront toutes les autres nations !"
 gc_ara_industry2_title:0 "Districts industriels"
 gc_ara_industry2_desc:0 "Nous produisons une variété de biens de haute valeur et manufacturés ; le verre, le vin, le papier et même la soie comptent parmi nos produits nationaux. Nous devons sécuriser des monopoles sur ces biens et développer nos industries manufacturières."
 #Slot 4
 dom_ara_med_ambitions_title:0 "Ambitions méditerranéennes"
 dom_ara_med_ambitions_desc:0 "Nous devons continuer à augmenter la taille et la qualité de notre marine, afin qu'elle soit un moyen efficace de dominer toute la mer Méditerranée."
 gc_ara_navy2_title:1 "Marine [Root.GetAdjective]"
 gc_ara_navy2_desc:0 "Comme notre royaume est divisé à travers la Méditerranée, nous devons faire de la construction d'une flotte notre priorité absolue. Si nous ne pouvons pas sécuriser la domination sur l'eau, nos ennemis auront carte blanche pour piller et capturer nos territoires."
 gc_ara_athens2_title:0 "Revendications sur Athènes"
 gc_ara_athens2_desc:0 "La Couronne d'Aragon a une revendication sur le Duché d'Athènes, qui se trouve maintenant menacé par l'assaut turc. Athènes, et en fait le peuple grec plus largement, bénéficierait du retour de notre protection."
 gc_ara_banking2_title:0 "Table de change"
 gc_ara_banking2_desc:0 "Les pratiques bancaires évoluent rapidement à mesure que le commerce devient plus sophistiqué. Nous devons nous assurer que nos propres banques ont suffisamment d'or dans leurs coffres pour financer l'expansion continue des intérêts de notre nation."
 gc_ara_valencian_silk2_title:0 "Soie valencienne"
 gc_ara_valencian_silk2_desc:0 "Nous avons réussi à obtenir à la fois les moyens et les connaissances pour produire de la soie, l'un des biens les plus recherchés en Europe et typiquement acquis uniquement par la participation à la Route de la Soie, maintenant contrôlée par nos ennemis musulmans. Nous devons commencer à produire notre propre soie et établir une bourse, la Llotja de la Seda, où elle pourra être achetée et vendue au profit de notre nation."

 #Slot 5
 gc_ara_trade_guilds2_title:0 "Guildes de Barcelone"
 gc_ara_trade_guilds2_desc:0 "Les Guildes de Barcelone ont toujours été influentes dans la ville. Nous devons sécuriser leur loyauté, ainsi que la loyauté de guildes similaires dans notre royaume."
 gc_ara_alexandria2_title:0 "Occuper Alexandrie"
 gc_ara_alexandria2_desc:0 "Alexandrie fut jadis une grande cité, mais est tombée en déclin. Alors que nous étendons notre règne vers l'est, nous devrions la capturer et la restaurer afin que la richesse de l'Égypte afflue dans la ville."
 gc_ara_barbary_ports2_title:0 "Combattre la piraterie barbaresque"
 gc_ara_barbary_ports2_desc:0 "Les esclavagistes pirates opérant depuis la côte nord-africaine sont une menace constante pour nos côtes et notre navigation. Nous devons capturer ces villes de corsaires et mettre fin à la menace qu'ils représentent pour les chrétiens innocents."
 gc_ara_provence2_title:0 "Humilier la Provence"
 gc_ara_provence2_desc:0 "Le Duc de Provence prétend être le dirigeant légitime à la fois de l'Aragon et de Naples. Ses prétentions ne doivent pas rester impunies."
 gc_ara_naples2_title:0 "Intégrer Naples"
 gc_ara_naples2_desc:0 "Naples est soumis au règne aragonais, mais nous ne le gouvernons pas directement. Elle doit être pleinement intégrée à l'Aragon."

 #Events

 flavor_ara.12.t:0 "Les Infants d'Aragon"
 flavor_ara.12.d:1 "Les Infants d'Aragon sont les frères et sœurs du roi Alphonse V d'Aragon, deuxième souverain de la dynastie Trastamare, qui a été établie dans le pays après le Compromis de Caspe en 1412. Ils sont également cousins du roi castillan Jean II et ont conspiré depuis le début de son règne pour le contrôler et s'emparer du pouvoir en Castille, avec le soutien d'une faction de parents et d'alliés parmi la noblesse castillane.\n\nLa situation s'est détériorée à partir de 1437 lorsqu'une nouvelle guerre civile éclata entre la faction dirigée par les Infants d'Aragon et celle dirigée par Álvaro de Luna et l'héritier du trône Enrique, qui arrive maintenant à une résolution."
 flavor_ara.12.a:0 "L'occasion frappe à la porte !"
 flavor_ara.12.b:0 "Nous ne devrions pas sacrifier la paix..."
 flavor_ara.13.t:0 "Expansion commerciale à Alexandrie"
 flavor_ara.13.d:0 "Le commerce qui transite par le Nil contient des montants de valeur exorbitants. Exploiter la quantité de marchandises qui y transitent équivaudra non seulement à des profits inimaginables mais aussi à l'introduction de nouveaux biens de rivages lointains. La récente conquête du Delta a conduit à la monopolisation de nombreuses entreprises qui s'étendent jusqu'en Inde et au-delà."
 flavor_ara.13.a:0 "Cela influencera positivement nos trésors !"

 #Tooltips
 ara_claims_in_castile_tt:0 "\nNous obtiendrons des revendications permanentes sur les terres que @CAS la Castille détient\n "
 ara_if_cas_dip_tt:0 "\nSi nous complétons la mission alors que @CAS est notre §Ysujet§! ou §Yallié§!, nous obtiendrons une §Yamitié historique§!\n "
 #ara_access_iberian_special_units_tt:0 "\nGain access to the Portuguese special naval unit '§YCaravel§!'"
 ara_had_remensa_war_event_tt:0 "A eu l'événement « §YSindicat Remença§! »"
 ara_become_p_republic_tt:1 "\nNous proclamerons une §YRépublique paysanne§! !\n "

 #Modifiers
 ara_iberian_struggle_modifier:0 "Lutte ibérique"
 desc_ara_iberian_struggle_modifier:0 "Des siècles de luttes intestines entre les royaumes ibériques arrivent à leur fin."
 ara_a_new_power_modifier:0 "Hégémon d'Ibérie"
 desc_ara_a_new_power_modifier:0 "§Y[Root.GetName]§! a finalement triomphé des autres royaumes ibériques, établissant son hégémonie sur la région."
 ara_masters_med_modifier:0 "Maîtres de la Méditerranée"
 desc_ara_masters_med_modifier:0 "L'effort pour établir l'hégémonie de §Y[Root.GetName]§! sur la Méditerranée a abouti au triomphe de notre marine comme la plus puissante de toute la mer."
 ara_governmental_restructuring_modifier:0 "Réformes internes"
 desc_ara_governmental_restructuring_modifier:0 "Nous avons surmonté la guerre des Remences, et maintenant nous effectuons les réformes appropriées dont le pays a besoin pour se rétablir."
 ara_crushed_the_catalan_estates_modifier:0 "Paix sociale"
 desc_ara_crushed_the_catalan_nobles_modifier:0 "Nos efforts pour pacifier les états de notre pays ont été couronnés de succès, et maintenant ils rament tous dans la même direction."
 ara_unshackled_modifier:0 "Déchaînés"
 desc_ara_unshackled_modifier:0 "Les §Yremences§! sont victorieux dans leur guerre contre les seigneurs féodaux, et maintenant un avenir radieux attend notre pays !"
 ara_italian_influences_modifier:0 "Influences italiennes"
 desc_ara_italian_influences_modifier:0 "Notre pays s'est fermement établi en Italie, et maintenant son influence culturelle a un impact profond."
 ara_maritime_administration_modifier:0 "Administration maritime"
 desc_ara_maritime_administration_modifier:0 "[Root.GetName] se concentre de plus en plus sur ses entreprises maritimes, étendant son administration outre-mer dans le processus."
 diamond_district2:0 "District du diamant de Barcelone"
 desc_diamond_district2:0 "Nous promouvons les affaires à Barcelone à travers leurs guildes, avec des résultats étincelants."
 spa_employ_galleon_modifier:0 "Dompter la vaste mer"
 desc_spa_employ_galleon_modifier:0 "Les galions sont un nouveau développement clé dans l'ingénierie navale, devenant le cheval de trait de notre marine."
 ara_nile_production_monopoly_modifier:0 "Monopole de production du Nil"
 desc_ara_nile_production_monopoly_modifier:0 "Les terres fertiles du delta et de la vallée du Nil rendent maintenant notre pays riche."
 ara_victory_over_provence_modifier:0 "Victoire sur la Provence"
 desc_ara_victory_over_provence_modifier:0 "Nous sommes sortis victorieux face à nos rivaux !"
 #Personality
 peasant_revolt_leader_personality:0 "Protecteur du petit peuple"
 peasant_revolt_leader_personality_desc:0 "Protéger le petit peuple des abus des puissants est la raison d'être de ce dirigeant."

 #Estate Privilege
 estate_burghers_sindicat_remensa_privilege:0 "Sindicat Remença"
 estate_burghers_sindicat_remensa_privilege_desc:0 "Le Sindicat Remença est une guilde pour les paysans catalans créée après leur combat contre les abus seigneuriaux."

 #Reforms
 consulate_of_the_sea:0 "Consulat de la Mer"
 consulate_of_the_sea_desc:0 "Notre nouvel organe quasi-judiciaire qui administrera le droit maritime et commercial s'appelle le Consulat de la Mer. Il donne à nos marchands le droit de régler leurs différends commerciaux sans ingérence des tribunaux royaux et en échange nous recevons un soutien financier."

 #Navarra

 #Reforms
 courts_of_navarra:0 "Cortes de Navarre"
 courts_of_navarra_desc:0 "Les Cortes de Navarre sont une assemblée délibérative du Royaume de Navarre formée par des chevaliers, des clercs et des représentants des villes et cités du royaume. Ils sont les gardiens des Anciennes Lois, connues sous le nom de Fueros, et ont pour objectif de garder en échec le pouvoir du monarque, tout en servant également la maison royale dans ses besoins."

 #Naval Doctrine
 basque_marines:0 "Marins basques"
 basque_marines_desc:0 "Notre peuple a poursuivi les baleines jusqu'aux confins du monde, pillé des côtes ou rapporté des marchandises précieuses d'autres terres depuis très longtemps, apprenant les secrets de l'océan. Ces enseignements ont rendu nos marins intrépides et fiables, une valeur sûre dans toute marine qui les emploie."

 #New Navarran Ideas
 fearless_seamen:0 "Marins intrépides"
 fearless_seamen_desc:0 "Notre peuple a toujours regardé la mer avec admiration et crainte, les tentant d'embrasser les richesses qu'elle peut apporter. Courageux, nos ancêtres ont fondé des communautés qui vivraient non seulement près de la mer, mais d'elle, développant des compétences impressionnantes sur l'eau. Nos marins sont bien connus sur toute la côte Atlantique."
 shipbuiling_experts:0 "Experts en construction navale"
 shipbuiling_experts_desc:0 "La mer qui embrasse nos rivages regorge de ressources, attendant ceux qui osent les saisir. Pendant des siècles, notre côte a été pleine de ports et de chantiers navals, construisant sans relâche des navires pour calmer notre soif d'aventures et d'entreprises maritimes."
 basque_ferocity:0 "Férocité basque"
 basque_ferocity_desc:0 "Même avant la bataille de Roncevaux, dont les Français pleurent encore, ou les campagnes de la Compagnie Navarraise, notre peuple a toujours été considéré comme des combattants féroces. Nous ne devrions jamais laisser nos ennemis l'oublier."
 camara_de_comptos:0 "Cámara de Comptos"
 camara_de_comptos_desc:0 "Durant les règnes de nos premiers rois éduqués en France, des idées sur la façon d'administrer un royaume furent apportées en Navarre. Grâce à ces nouvelles connaissances, la Cámara de Comptos est née avec le devoir de contrôler la santé monétaire de notre nation."
 people_of_the_sea:0 "Peuple de la mer"
 people_of_the_sea_desc:0 "Notre peuple est composé de marins experts, mais nous devons convertir chaque homme habile en mer en un marin potentiel pour nos marines, si nous avons besoin d'eux dans les guerres à venir. Leur expertise sera un avantage évident pour ce projet."
 an_industrious_folk:0 "Un peuple industrieux"
 an_industrious_folk_desc:0 "La terre où nous vivons n'est peut-être pas la plus riche, mais les Basques sont un peuple industrieux, travaillant dur pour en obtenir ce dont ils ont besoin. Que ce soit en fondant notre fer dans les forges, en convertissant le bois de nos forêts en charbon ou en créant les meilleurs navires alentour. Notre royaume est abondant grâce à l'effort de notre peuple."

 #Portugal

 #New Missions
 dom_por_clash_ottomans_title:0 "Affrontement avec les Ottomans"
 dom_por_clash_ottomans_desc:0 "Notre expansion dans l'océan Indien et notre contrôle sur le golfe Persique ont conduit à une situation où un affrontement avec les Ottomans, l'hégémon du Moyen-Orient, est inévitable."
 dom_portugal_exploration_ideas_title:0 "Voiles d'exploration"
 dom_portugal_exploration_ideas_desc:0 "Nos explorations le long de la côte africaine ouvrent de nouvelles routes et perspectives pour l'avenir de notre pays. Il nous appartient de profiter de cette opportunité pour l'expansion de [Root.GetName] outre-mer."
 dom_portugal_circumnavigation_title:0 "Cartographier les mers"
 dom_portugal_circumnavigation_desc:0 "Les explorations que nous avons promues au cours des dernières décennies ont prouvé que les théories scientifiques sur la forme arrondie du monde étaient correctes. Nous avons maintenant l'opportunité de devenir le premier pays à mener une expédition pour circumnaviguer le monde, apportant un grand prestige à [Root.GetName]."
 dom_castile_exploration_ideas_title:0 "Voiles d'exploration"
 dom_castile_exploration_ideas_desc:0 "Nos explorations le long de la côte africaine ouvrent de nouvelles routes et perspectives pour l'avenir de notre pays. Il nous appartient de profiter de cette opportunité pour l'expansion de [Root.GetName] outre-mer."
 dom_castile_circumnavigation_title:0 "Cartographier les mers"
 dom_castile_circumnavigation_desc:0 "Les explorations que nous avons promues au cours des dernières décennies ont prouvé que les théories scientifiques sur la forme arrondie du monde étaient correctes. Nous avons maintenant l'opportunité de devenir le premier pays à mener une expédition pour circumnaviguer le monde, apportant un grand prestige à [Root.GetName]."


 #Tooltip Keys
 triangle_trade_key:0 "Commerce triangulaire"
 por_every_wine_prov_tt:1 "\nChaque province possédée avec du §YVin§! obtiendra la récompense suivante :"
 por_more_likely_to_get_expansionist_tt:0 "Nos dirigeants seront plus susceptibles d'obtenir le trait « §YExpansionniste§! » tant que nous avons les idées §YExploration§! ou §YExpansion§! actives"
 second_circumnavigation_tt:0 "A été la deuxième nation à circumnaviguer le monde."
 #Modifiers
 por_presence_in_india_modifier:0 "Présence en Inde"
 desc_por_presence_in_india_modifier:0 "Notre présence en Inde ouvre un nouveau marché très profitable pour notre pays."
 por_center_of_portuguese_trade_modifier:0 "Centre du commerce portugais"
 desc_por_center_of_portuguese_trade_modifier:0 "Un nouveau centre de commerce pour les marchands portugais."
 por_struggle_for_iberia_modifier:0 "Lutte pour l'Ibérie"
 desc_por_struggle_for_iberia_modifier:0 "Des siècles de luttes intestines entre les royaumes ibériques arrivent à leur fin."
 por_reform_navy_1_modifier:0 "Une puissance navale montante"
 desc_por_reform_navy_1_modifier:0 "La promotion et l'investissement constants dans la marine portugaise depuis l'époque d'Henri le Navigateur ont porté leurs fruits, et nous avons maintenant la flotte la plus technologiquement avancée au monde."
 por_first_circumnavigation_modifier:0 "Héritage de la première circumnavigation"
 desc_por_first_circumnavigation_modifier:0 "Nos navires ont cartographié les ports et les mers inhospitaliers au-delà des horizons, la gloire de la découverte est nôtre ainsi qu'un héritage d'excellence maritime."
 por_elite_marines_modifier:0 "Marines d'élite portugais"
 desc_por_elite_marines_modifier:0 "L'entraînement de nos fusiliers marins comprend des exercices rigoureux et difficiles, transformant nos cadets navals en soldats redoutés."

 #Missions
 dom_portugal_reform_navy_title:0 "Réformer la marine"
 dom_portugal_reform_navy_desc:0 "Dom Henrique, Duc de Viseu, l'oncle du roi Alphonse V, est surtout connu pour avoir promu les efforts d'exploration du Portugal en Afrique de l'Ouest et réformé sa marine, parrainant un nouveau type de navire, la caravelle."

 #Prussia

 #Modifiers
 pru_golden_age_of_thought_modifier:0 "Âge d'or"
 desc_pru_golden_age_of_thought_modifier:0 "Durant le règne de [Root.Monarch.GetName], la Prusse a émergé comme l'une des puissances dominantes en Europe, avec une armée puissante et un système administratif hautement centralisé. L'économie a prospéré, et le pays était connu pour ses avancées dans les arts, la philosophie et les sciences. Cette ère a vu le règne de [Root.Monarch.GetName], qui était un mécène des arts et des sciences et encourageait la croissance de la culture prussienne."
 pru_palace_of_berlin_modifier:0 "Palais de Berlin"
 desc_pru_palace_of_berlin_modifier:0 "Le Palais de Berlin est un palais royal situé à Berlin, en Allemagne, qui sert de résidence aux Rois de Prusse et futurs Empereurs allemands. Le palais a été construit à l'origine au XVIe siècle et a subi plusieurs rénovations et extensions au fil des siècles. Au XVIIIe siècle, le palais a été reconstruit dans le style baroque sous le règne de Frédéric le Grand."
 pru_victory_lower_saxony_modifier:0 "Victoire en Basse-Saxe"
 desc_pru_victory_lower_saxony_modifier:0 "En [GetYear], les forces [Root.GetAdjective] sous le commandement de [Root.Monarch.GetName] ont vaincu les armées de l'alliance de Basse-Saxe, qui comprenait de nombreux États locaux. Cette victoire a permis à [Root.GetName] d'étendre ses territoires dans la région et a solidifié sa position de puissance majeure en Europe. La bataille était notable pour l'utilisation par l'armée [Root.GetAdjective] de tactiques et de discipline, qui ont aidé à sécuriser la victoire contre une force ennemie plus nombreuse et mieux équipée."
 pru_embed_company_modifier:0 "La Compagnie d'Emden"
 desc_pru_embed_company_modifier:1 "La Compagnie d'Emden est une compagnie commerciale basée dans la ville allemande d'Emden. C'est un acteur majeur du commerce des Indes orientales et elle est impliquée dans l'exportation de marchandises telles que les épices, les textiles et la porcelaine d'Asie vers l'Europe. La Compagnie d'Emden est notable pour son vaste réseau de comptoirs commerciaux et ses pratiques commerciales innovantes, qui l'ont aidée à devenir l'une des plus grandes et des plus prospères compagnies de son époque. Malgré la concurrence d'autres compagnies commerciales européennes, la Compagnie d'Emden a continué à prospérer et a joué un rôle significatif dans la croissance et le développement de l'économie allemande aux XVIIe et XVIIIe siècles."
 pru_expanded_the_western_domains_modifier:0 "Extension des domaines occidentaux"
 desc_pru_expanded_the_western_domains_modifier:0 "Durant cette période, la Prusse, sous le règne de [Root.Monarch.GetName], a cherché à étendre ses territoires par une combinaison de conquête militaire et de moyens diplomatiques. À travers une série de guerres et de traités, la Prusse a pu incorporer les territoires de la Hesse, du Palatinat et de parties du Bas-Rhin dans son royaume. Cette expansion a considérablement augmenté la taille et la puissance de la Prusse et a aidé à établir le pays comme une puissance européenne majeure. L'inclusion de ces territoires a également apporté de nouvelles ressources, populations et influences culturelles dans l'État prussien, renforçant davantage le pays et contribuant à sa croissance et son développement."
 PRU_bitter_resistance:0 "Résistance théologique acharnée"
 desc_PRU_bitter_resistance:0 "La défense de notre identité religieuse est une question de grande importance pour nous."
 PRU_toleranzedikt:0 "Toleranzedikt"
 desc_PRU_toleranzedikt:0 "Nous ne pouvons pas laisser notre domaine devenir victime de mesquines querelles religieuses. Pour éviter ce sort funeste, nous devons être tolérants envers nos frères, aussi égarés soient-ils."
 BRA_abolished_kreditwerk:0 "Kreditwerk aboli"
 desc_BRA_abolished_kreditwerk:0 "L'abolition d'un système économique historique est la porte d'entrée vers l'innovation et la croissance financière au sein de notre nation."
 BRA_reformed_kreditwerk:0 "Kreditwerk réformé"
 desc_BRA_reformed_kreditwerk:0 "La réforme d'un système économique historique est la porte d'entrée vers l'innovation et la croissance financière au sein de notre nation."
 PRU_investing:0 "Investissement dans l'économie"
 desc_PRU_investing:0 "Divers investissements et stimulations fiscales dans notre économie l'impacteront grandement et positivement alors que nous nous efforçons d'équilibrer notre budget."
 PRU_reichsthaler:0 "Der Reichsthaler"
 desc_PRU_reichsthaler:0 "L'administration consciencieuse de nos affaires commerciales est un aspect vital de notre gouvernement."
 monthly_prussian_militarized_society_1:0 "Société militarisée prussienne primitive mensuelle"
 monthly_prussian_militarized_society_2:0 "Société militarisée prussienne mensuelle"
 monthly_prussian_militarized_society_3:0 "Société militarisée prussienne totale mensuelle"
 prussian_militarized_society_1_gain_modifier:0 "Modificateur de gain de militarisation prussienne primitive"
 prussian_militarized_society_2_gain_modifier:0 "Modificateur de gain de militarisation prussienne"
 prussian_militarized_society_3_gain_modifier:0 "Modificateur de gain de militarisation prussienne totale"

 #Militarization Loc
 ability_prussian_militarization_mechanic_1:0 "Militarisation prussienne primitive"
 ability_prussian_militarization_mechanic_2:0 "Militarisation prussienne"
 ability_prussian_militarization_mechanic_3:1 "Militarisation prussienne totale"
 #
 prussian_militarization_mechanic_1:0 "Militarisation prussienne primitive"
 prussian_militarized_society_1:0 "Militarisation prussienne"
 boost_militarization:0 "Stimuler la militarisation"
 boost_militarization_desc:0 "La militarisation a joué un rôle crucial dans le développement de la Prusse aux XVIIe et XVIIIe siècles. Sous le règne du roi Frédéric-Guillaume Ier, la Prusse est devenue un État hautement centralisé avec une forte orientation militaire. Le roi voyait l'armée comme la pierre angulaire de l'État et a investi massivement dans l'entraînement, l'organisation et l'équipement de l'armée prussienne. Cette emphase sur la militarisation a aidé la Prusse à devenir l'une des puissances les plus fortes d'Europe et lui a permis de se défendre avec succès contre ses ennemis et d'étendre ses territoires. L'armée prussienne est devenue un modèle pour d'autres puissances européennes, et ses tactiques et sa structure organisationnelle ont été largement imitées. En conséquence, la militarisation a été un facteur clé dans l'ascension de la Prusse comme grande puissance aux XVIIe et XVIIIe siècles.\n "
 #
 prussian_militarization_mechanic_2:0 "Militarisation prussienne"
 prussian_militarized_society_2:0 "Militarisation prussienne"
 #
 prussian_militarization_mechanic_3:1 "Militarisation prussienne totale"
 prussian_militarized_society_3:0 "Militarisation prussienne"
 #Buttons
 march_divided_fight_united:0 "Manœuvres de Scharnhorst"
 march_divided_fight_united_desc:0 "La Prusse, à la fin du XVIIIe siècle, employait des manœuvres de déploiement rapide sur le champ de bataille comme composante clé de ses tactiques militaires. Cela impliquait d'entraîner les soldats à se déplacer rapidement et efficacement vers différentes positions sur le champ de bataille, dans le but de manœuvrer et de submerger l'ennemi. L'emphase sur la vitesse et la mobilité permettait aux forces prussiennes de répondre rapidement aux situations changeantes et de profiter des opportunités dès qu'elles se présentaient. Cette approche était essentielle au succès de l'armée prussienne dans plusieurs guerres et a aidé à établir leur réputation de force militaire hautement efficace et efficiente. Les tactiques de manœuvre de déploiement rapide ont ensuite été incorporées dans les manuels militaires révisés et sont devenues une caractéristique de la guerre prussienne.\n "
 pru_thunderous_advance_modifier:0 "Avancée foudroyante"
 desc_pru_thunderous_advance_modifier:0 "En déployant rapidement nos troupes dans des manœuvres orchestrées, nous dépasserons les lignes ennemies et porterons des coups décisifs à nos ennemis."
 rewrite_military_manual:0 "Réformer le manuel militaire"
 rewrite_military_manual_desc:0 "Les généraux prussiens à la fin du XVIIIe siècle ont réécrit leurs manuels militaires pour refléter les changements dans les tactiques et la technologie de guerre. Cela impliquait de mettre à jour leurs doctrines et tactiques pour mieux s'adapter aux champs de bataille changeants de l'époque, qui étaient caractérisés par l'utilisation croissante des armes à feu et la guerre à grande échelle. Les manuels révisés mettaient davantage l'accent sur la vitesse, la mobilité et la puissance de feu, et visaient à améliorer l'efficacité et l'efficience de l'armée prussienne. Ces changements ont été un facteur significatif dans le succès de l'armée prussienne pendant les guerres de l'époque et ont aidé à établir la Prusse comme une puissance militaire dominante en Europe.\n "
 pru_rewrite_military_manual_modifier:0 "Nouveau manuel militaire"
 desc_pru_rewrite_military_manual_modifier:0 "Les généraux prussiens à la fin du XVIIIe siècle ont réécrit leurs manuels militaires pour refléter les changements dans les tactiques et la technologie de guerre. Cela impliquait de mettre à jour leurs doctrines et tactiques pour mieux s'adapter aux champs de bataille changeants de l'époque, qui étaient caractérisés par l'utilisation croissante des armes à feu et la guerre à grande échelle. Les manuels révisés mettaient davantage l'accent sur la vitesse, la mobilité et la puissance de feu, et visaient à améliorer l'efficacité et l'efficience de l'armée prussienne. Ces changements ont été un facteur significatif dans le succès de l'armée prussienne pendant les guerres de l'époque et ont aidé à établir la Prusse comme une puissance militaire dominante en Europe."

 #Effects
 pru_adding_provs_in_empire_tt:0 "\nConquérir des provinces qui ne font pas partie du §YSaint-Empire romain germanique§! accordera l'un des avantages suivants :"
 pru_if_non_emp_and_ally_tt:0 "\nSi nous conquérons une province tout en étant allié à l'§YEmpereur§! actuel, il gagnera §G3§! de confiance envers nous"
 pru_if_non_emp_and_no_ally_tt:0 "\nSi nous ne sommes pas alliés avec l'§YEmpereur§! actuel, pour chaque province externe que nous conquérons, nous gagnerons §G1§! de projection de puissance"
 pru_if_emperor_tt:1 "\nEnfin, si nous sommes l'§YEmpereur§! actuel, chaque province non-HRE d'au moins §G25§! de développement que nous conquérons rapportera §G1§! d'autorité impériale"
 pru_spread_dev_tt:0 "\nChaque province des régions de §YPrusse-Orientale§! et §YPrusse-Occidentale§! recevra §G1§! de développement aléatoire\n"
 pru_golden_era_20_unis_tt:0 "\nSi nous complétons cette mission avec au moins §Y25§! universités, nous connaîtrons un §Yâge d'or§! sans dépenser le nôtre pour la durée de la vie de notre dirigeant"
 until_its_sieged_desc:0 "jusqu'à ce qu'un ennemi assiège ou conquière la province de Berlin"
 estate_nobles_consolidated_noble_contracts:0 "Contrats nobles consolidés"
 estate_nobles_consolidated_noble_contracts_desc:0 "Les nobles sont une partie vitale de notre royaume en temps de guerre. Si nous voulons que notre armée se concentre sur l'avancement de nos frontières, nous devons aligner les familles puissantes de notre royaume pour maintenir la paix à l'intérieur."
 unlock_privilege_estate_nobles_consolidated_noble_contracts_tt:0 "\nDébloque le privilège de la noblesse « §YConsolider les contrats nobles§! »"
 pru_lords_franconia_power_projection:0 "Victoire en Franconie"
 pru_access_franconian_conquest_success_tt:0 "\nSi nous acceptons l'union avec Ansbach dans l'événement « §YHohenzollern de Franconie§! », nous aurons §Y5§! ans pour compléter l'objectif temporisé suivant pour la mission §YConquête franconienne§! :\n\n§MSuccès§! :"
 pru_access_franconian_conquest_failure_tt:0 "\n§RÉchec§! :\nNous perdrons nos terres en §YHaute§! et §YBasse Franconie§! et subirons ce qui suit :\nExpansion agressive : §R+15§!"
 release_franconia_tt:1 "\nToutes les terres que nous possédons dans les régions de §YHaute§! et §YBasse Franconie§! seront cédées et libérées sous @FKN Franconie indépendante de notre autorité"
 gain_15_ae_n_s_germany_tt:0 "\nChaque pays dont la capitale est dans la région §YNord§! ou §YSud allemande§! gagnera §R15§! d'expansion agressive contre nous"
 pru_accepting_cultures_reduces_3_AE_tt:0 "Désormais, promouvoir une §YCulture§! réduira notre §YExpansion agressive§! de §G-3§!"
 pru_200_dev_unlock_Ability_x_tt:2 "\n£no£ Nous obtiendrons l'accès à la capacité de splendeur « §YCouronne polonaise§! » durant l'§YÈre de la Réforme§! si nous complétons la mission tout en détenant directement au moins §Y200§! de développement dans la région §YPolonaise§!"
 pru_200_dev_unlock_Ability_tt:2 "\n£yes£ Nous obtiendrons l'accès à la capacité de splendeur « §YCouronne polonaise§! » durant l'§YÈre de la Réforme§! si nous complétons la mission tout en détenant directement au moins §Y200§! de développement dans la région §YPolonaise§!"
 pru_adding_provinces_to_trade_c_merc_prod_tt:1 "\nAjouter nos provinces à une §YCompagnie commerciale§! leur accordera §G1§! de développement £dip£ ainsi que §G1§! de mercantilisme pour nous"
 pru_dev_saxon_lands_tt:1 "\nDévelopper des provinces avec les cultures §YSaxonne§! ou §YBasse-saxonne§! leur accordera les avantages suivants pendant les §Y20§! prochaines années :\n Années de séparatisme local : §G-3§!\nRéduction de l'autonomie locale : §G-5 %§!\nCroissance de la prospérité locale : §G+1§!\n"
 pru_unifying_germany_bb_gate_magnificent_tier_tt:0 "\nLe niveau « §YMagnifique§! » de la §YPorte de Brandebourg§! accordera en outre les récompenses suivantes :\nModificateur de main-d'œuvre du groupe culturel : §G+10 %§!\nAbsolutisme effectif maximum : §G+10 %§!"
 pru_spread_5_dev_tt:1 "§G5§! de développement aléatoire £adm£ £dip£ et £mil£ seront distribués dans les provinces que nous ou un sujet possédons dans les régions suivantes :\n- §YBrunswick§!\n- §YWestphalie du Nord§!\n- §YWestphalie du Sud§!"
 enable_this_ability_tt:0 "A obtenu l'accès à cette capacité en récompense"
 pru_access_normal_militarization_tt:0 "\nAméliorer la mécanique « §YMilitarisation prussienne primitive§! » en « §YMilitarisation prussienne§! » augmentant sa puissance"
 pru_access_advanced_militarization_tt:0 "\nAméliorer la mécanique « §YMilitarisation prussienne§! » en « §YMilitarisation prussienne totale§! » augmentant sa puissance et débloquant de nouvelles §YInteractions gouvernementales§!"
 #Events
 flavor_brapru.24.b:0 "Nous déclinons prudemment."
 flavor_brapru.42.t:0 "Désastre en Franconie"
 flavor_brapru.42.d:0 "Nos tentatives de consolider nos terres en Franconie ont abouti à une conclusion désastreuse. Après plusieurs années d'efforts, notre situation dans le sud de l'Allemagne ne peut être décrite que comme un échec total, et nous ressentirons bientôt les répercussions de cette catastrophe. Nous étions au bord de la grandeur..."
 flavor_brapru.42.a:0 "Nous étions si près !"

 #Stiopa's events
 flavor_brapru.43.t:0 "Berliner Religionsgespräch"
 flavor_brapru.43.d:0 "De nombreux théologiens et érudits se sont tous rassemblés à Berlin pour un événement unique dans une vie. Le sujet est simple : réconcilier les différences de la théologie luthérienne et calviniste. Nous sommes depuis longtemps un bastion de la liberté religieuse dans l'Empire, offrant refuge à ceux ciblés par l'Inquisition. Malgré cela, les tensions continuent de monter alors que le peuple prend parti dans ce qui est devenu un Schisme Protestant, semblable à la scission de l'Église romaine. Espérons qu'avec cette conférence, il y aura la paix."
 flavor_brapru.43.a:0 "Un grand développement !"
 flavor_brapru.43.b:0 "Les églises ne peuvent pas être unies. Perte de temps !"
 flavor_brapru.44.t:1 "Das Toleranzedikt"
 flavor_brapru.44.d:1 "Alors que les tensions religieuses croissent, c'est le travail de [Root.GetName] d'étouffer la flamme toujours croissante et de résister à la tempête à venir. L'Édit de Tolérance, émis par [Root.Monarch.GetName], stipule que les Églises luthérienne et réformée doivent être traitées comme égales et que les relations entre elles doivent être réglementées par la loi."
 flavor_brapru.44.a:0 "Imposer l'Édit !"
 flavor_brapru.44.b:0 "Cela ne fera que créer plus de mécontentement."
 flavor_brapru.45.t:0 "Destin du Kreditwerk"
 flavor_brapru.45.d:0 "Les dettes des hommes et des rois ne peuvent rester sans financement. Avant l'ère du pragmatisme, des solutions simples étaient essentielles à l'administration des nations, et le Kreditwerk est un vestige d'une telle époque. En finançant la dette du Margraviat à travers les états, le [Root.Monarch.GetTitle] pouvait continuer à dépenser à des taux d'intérêt exorbitants. Peut-être le temps est-il venu de neutraliser cette institution une fois pour toutes."
 flavor_brapru.45.a:0 "Une institution funeste doit connaître un sort funeste"
 flavor_brapru.45.b:0 "Réformer le Kreditwerk et le rendre gouvernemental"
 flavor_brapru.46.t:0 "Les frères Humboldt"
 flavor_brapru.46.d:0 "Les frères Humboldt étaient des philosophes, linguistes, fonctionnaires gouvernementaux, diplomates prussiens et les fondateurs de l'Université Humboldt de Berlin. Wilhelm von Humboldt, le frère aîné, a concentré ses études sur les poursuites philosophiques de la vie, se présentant comme un intellectuel de part en part. Pendant ce temps, son jeune frère Alexander von Humboldt a concentré ses études sur une découverte révolutionnaire après l'autre. Lançant plusieurs expéditions en Amérique espagnole, en Russie et aux États-Unis, les frères Humboldt étaient vraiment une paire de génies."
 flavor_brapru.46.a:0 "La philosophie éternelle de Wilhelm nous guidera."
 flavor_brapru.46.b:0 "Les découvertes révolutionnaires d'Alexander façonneront l'État."
 flavor_brapru.47.t:0 "Des Thaler, Groschen et Pfennige"
 flavor_brapru.47.d:0 "Avec le flux et le reflux constants de la masse monétaire nationale, la politique monétaire est généralement regroupée avec la politique fiscale et laissée aux états à gérer. À ce titre, l'approvisionnement en monnaie est rarement entre les mains d'un dirigeant pour commencer. Avec notre récent accent sur le contrôle de la masse monétaire de la nation, il est temps de choisir la direction que nous entendons prendre."
 flavor_brapru.47.a:0 "Soutenir et stocker"
