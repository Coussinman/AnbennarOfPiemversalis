 qng_north_china_gets_tt:0 "Toutes les provinces que nous possédons ou que possèdent nos sujets non tributaires en §YChine du Nord§! recevront :"
 qng_branching_mission_open_tt:1 "Les conditions requises pour accomplir cette mission §Yaprès avoir ouvert nos ports§! seront les suivantes :"
 qng_complete_3_stab_5_crownland_tt:1 "\nSi nous accomplissons cette mission avec une Stabilité de §G3§!, nous obtiendrons également §Y5 % de Domaine de la Couronne§! supplémentaires."
