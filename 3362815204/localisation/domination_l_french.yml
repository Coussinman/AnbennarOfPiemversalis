 desc_mng_tibetan_horses_monopoly_modifier:0 "Le monopole sur les destriers élevés dans les montagnes du Tibet est non seulement une opportunité lucrative pour nous mais aussi un excellent moyen de renforcer notre cavalerie."
 mng_yellow_river_dykes_modifier:0 "Digues du Fleuve Jaune"
 desc_mng_yellow_river_dykes_modifier:0 "Les digues le long du Fleuve Jaune assureront la gestion des marées et l'utilisation appropriée du fleuve."
 mng_silver_trade_china_modifier:0 "Commerce d'Argent en Chine"
 desc_mng_silver_trade_china_modifier:0 "L'argent est devenu un métal précieux recherché à travers notre royaume en raison de sa popularisation comme méthode stable de paiement des impôts."
 mng_silver_house_of_china_modifier:0 "Maison d'Argent de Chine"
 desc_mng_silver_house_of_china_modifier:0 "Les maisons d'argent à travers notre royaume sont responsables du métal précieux avec lequel nos sujets financent leurs impôts."
