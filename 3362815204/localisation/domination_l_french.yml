 ability_system_of_councils_mechanic:0 "Mécanique du Système des Conseils"
 system_of_councils_mechanic:0 "Mécanique du Système des Conseils"
 system_of_councils_mechanic_desc:0 "Le Système des Conseils a été développé par la Monarchie Hispanique pour permettre le gouvernement de terres très distantes et différentes à travers une bureaucratie complexe, structurée en conseils thématiques ou territoriaux. Ce système a atteint son apogée sous le règne de Philippe II, également connu comme « le Roi Bureaucrate »."
 royal_council_interaction:0 "Convoquer le Conseil Royal"
 royal_council_interaction_desc:0 ""
 royal_council_interaction_tooltip:0 "Peut choisir l'un des modificateurs suivants pour §Y10 ans§! :\n§YConseil de la Chambre§! :\n    Conseillers Possibles : §G+1§!\n    Coût des Conseillers : §G-10,0 %§!\n\n§YConseil des Finances§! :\n    Réduction d'Inflation Annuelle : §G-0,05§!\n    Intérêt par An : §G-1,00§!\n\n§YConseil de l'Inquisition§! :\n    Missionnaires : §G+1§!\n    Force Missionnaire contre les Hérétiques : §G+2,0 %§!"
 state_council_interaction:0 "Convoquer le Conseil d'État"
 state_council_interaction_desc:0 ""
 state_council_interaction_tooltip:1 "Peut choisir l'un des modificateurs suivants pour §Y10 ans§! :\n§YConseil d'Europe§! :\n    Réputation Diplomatique : §G+2,00§!\n\n§YConseil de la Méditerranée§! :\n    Capacité de Combat des Galères : §G+15,0 %§!\n\n§YConseil des Indes§! :\n    Augmentation Globale de Colons : §G+15,00§!\n    Désir de Liberté Réduit sur un Autre Continent : §G-10,00 %§!"
