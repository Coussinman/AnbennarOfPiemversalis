 mng_safe_coasts_modifier:0 "Côtes Sûres"
 desc_mng_safe_coasts_modifier:0 "Nos côtes jouissent désormais des services de protection que nous fournissons avec aptitude, inaugurant une nouvelle ère de sécurité et de commerce."
 mng_era_of_culture_modifier:0 "Ère de Culture"
