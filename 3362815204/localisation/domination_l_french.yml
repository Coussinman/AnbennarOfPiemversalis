 #Imperial Reforms

 codify_single_whip_law_decision_title:0 "Codifier la Loi du Fouet Unique"
 codify_single_whip_law_decision_desc:0 "En codifiant la loi du Fouet Unique, nous insérerons son précédent juridique dans le code judiciaire de notre nation."
 reign_in_estates_decision_title:0 "Maîtriser les Factions"
 reign_in_estates_decision_desc:0 "Les diverses factions au sein de notre royaume font rage, serrant leurs perles lorsqu'on leur demande de contribuer et exerçant davantage de pression pour recevoir faveurs et influence en échange de corruption. Nous devons mettre fin à cela sous peine que l'Empire ne tombe dans la tourmente."
 reform_civil_registration_decision_title:0 "Enregistrement Civil"
 reform_civil_registration_decision_desc:0 "Un système visant à garder la trace de tous nos sujets au sein de notre royaume, afin d'améliorer le niveau de vie de tous ceux sous notre bannière."
 establish_silver_standard_decision_title:0 "Un Étalon Argent"
 establish_silver_standard_decision_desc:0 "L'introduction de la loi du Fouet Unique a certainement amélioré notre efficacité fiscale. Cependant, nous devons prendre des précautions et combattre l'inflation potentiellement galopante."
 kanhe_certificate_decision_title:0 "Certificat Kanhe"
 kanhe_certificate_decision_desc:0 "Une déclaration impériale visant à renforcer nos marchands chez nous et à l'étranger, tout en accordant simultanément à nos sujets un accès exclusif plus grand à nos marchés."
 new_keju_formats_decision_title:0 "Nouveaux Formats de Keju"
 new_keju_formats_decision_desc:0 "Cette réforme vise à perfectionner le processus derrière la sélection des candidats et potentiels bureaucrates pendant l'Examen Impérial. L'introduction de nouveaux formats de tests et de normes accrues bénéficiera certainement à notre administration."
 inclusive_monarchy_decision_title:0 "Monarchie Inclusive"
 inclusive_monarchy_decision_desc:0 "Notre domaine est englobant, et nos sujets sont nombreux. Ainsi, nous devons afficher la perfection et la tolérance exhibées par les cieux eux-mêmes et viser à créer une société tolérante qui traite son peuple avec dignité et compassion."
 promote_bureaucratic_faction_decision_title:0 "§OPromouvoir les Bureaucrates§!"
 promote_bureaucratic_faction_decision_desc:0 "L'âme de notre nation repose dans nos procédures bureaucratiques. En renforçant et favorisant nos esprits bureaucratiques plutôt que ceux de position militante, nous réglerons les luttes de pouvoir qui pourraient se produire en interne, à l'avenir.\n§YMutuellement exclusif avec la réforme « Promouvoir les Généraux »§!\n"
 promote_military_faction_decision_title:0 "§OPromouvoir les Généraux§!"
 promote_military_faction_decision_desc:0 "Ceux qui sacrifient leur vie pour assurer notre liberté méritent plus d'éloges que les bureaucrates confortables qui délèguent sans fin sur les procédures et sont piégés dans d'interminables formalités administratives.\n§YMutuellement exclusif avec la réforme « Promouvoir les Bureaucrates »§!\n"
 unifed_trade_market_decision_title:0 "Unifier les Marchés Asiatiques"
 unifed_trade_market_decision_desc:0 "En unifiant l'accès à tous les marchés où nous avons de l'influence, nos marchands profiteront de bénéfices au-delà de leurs rêves les plus fous, étendant notre influence et augmentant la taille de notre trésor."
 reform_the_military_branch_decision_title:0 "Réformer l'Armée"
 reform_the_military_branch_decision_desc:0 "Un Empire de notre taille a besoin d'hommes capables et courageux pour le protéger. Cependant, avoir du courage et de la valeur ne suffit pas dans les affaires d'aujourd'hui. Le besoin d'une armée permanente répandue, réformée et puissante jouera un rôle vital dans le maintien de notre position puissante."
 modernize_the_banners_decision_title:0 "Populariser les Bannières"
 modernize_the_banners_decision_desc:0 "L'armée des Bannières nous a servis fidèlement, portant des coups à nos ennemis et obtenant des victoires cruciales. Si nous voulons maintenir leur forme optimale et leur discipline, nous devons les réformer et les améliorer, sous peine qu'ils ne risquent la décadence."
 study_foreign_ship_designs_decision_title:0 "Étudier les Navires Étrangers"
 study_foreign_ship_designs_decision_desc:0 "Les navires étrangers détiennent de nombreux secrets en matière de maîtres charpentiers et de conception architecturale. Il serait sage d'émettre une réforme à travers notre nation et d'instruire nos constructeurs navals de les étudier en grand détail."
 tributary_embassies_decision_title:0 "Ambassades Tributaires"
 tributary_embassies_decision_desc:0 "La communication avec tous les pays qui paient tribut à notre bannière est vitale comme moyen de dissuasion de la violence et meilleure communication. À cette fin, il serait sage de promulguer une réforme et de financer des ambassades officielles à travers notre sphère d'influence."
 new_world_discovery_decision_title:0 "Expéditions vers le Nouveau Monde"
 new_world_discovery_decision_desc:0 "Le nouveau monde détient de nombreux biens exotiques, opportunités commerciales et voies d'expansion visant à cimenter notre pouvoir. Il serait sage d'investir l'influence impériale dans l'émission de proclamations, instruisant les fonctionnaires de se concentrer sur l'étude de ces lieux étranges au-delà de l'horizon."

 #Decisions
 reform_the_administration_of_china_decision_title:0 "Réformer l'Administration"
 reform_the_administration_of_china_decision_desc:0 "Pendant bien trop longtemps, les Eunuques ont usurpé le pouvoir pour eux-mêmes. La Chine et le trône impérial appartiennent à l'Empereur. Nous devons donc réduire leurs privilèges et freiner leur pouvoir afin de nous sauver d'un désastre certain."




 mng_pay_50_gov_ref_prog_and_2_stab_for_reduction_tt:0 "Dépensez §R50§! Progrès de Réforme Gouvernementale et §R-2§! Stabilité pour réformer le gouvernement et réduire le malus de « §YSurextension Administrative§! » de §G-5§! Autonomie Minimale"


 #Qing-related Loc Starts here

 #Missions
 qng_eight_banners_title:0 "Les Huit Bannières"
 qng_eight_banners_desc:0 "Les groupes de chasse Jurchen traditionnels nous ont bien servis dans les conflits contre nos rivaux, mais si nous voulons un jour conquérir un empire, nous devons réorganiser nos forces en régiments de Bannières disciplinés."
 qng_end_yuan_title:0 "Mettre Fin aux Yuan"
 qng_end_yuan_desc:0 "Le fantôme des dynasties passées s'accroche à la vie dans les terres des Mongols. Nous devons nous aventurer vers l'ouest et effacer leur nom des livres d'histoire."
 mjz_unite_home_provinces_title:0 "Unir les Fragments"
 mjz_unite_home_provinces_desc:0 "Les zones les plus densément peuplées par les tribus Jurchen sont fragmentées et enfermées dans un conflit éternel. Nous devons nous aventurer en avant et les unir sous une seule bannière."
 mjz_dominate_rival_jurchens_title:0 "Dominer les Jurchens Rivaux"
 mjz_dominate_rival_jurchens_desc:0 "Si nous voulons présenter un front solide contre tous les ennemis extérieurs, nous ne devons laisser aucun seigneur de guerre parmi nous attirer une influence suspecte sous sa bannière."
 mch_issue_seven_grievances_title:0 "Émettre les Sept Griefs"
 mch_issue_seven_grievances_desc:0 "Pendant bien trop longtemps, nous avons laissé les fantômes prétendants qui gouvernent la Chine dicter nos vies et traiter notre peuple comme des citoyens de seconde classe. Nous devons présenter nos griefs contre l'Empereur de Chine et le forcer à genoux pour qu'on lui apprenne sa place aux côtés de l'humilité."
 mch_proclaim_later_jin_title:0 "Proclamer le Jin Postérieur"
 mch_proclaim_later_jin_desc:0 "Nos succès en Chine ont apporté les fruits de notre labeur à notre peuple. Des campagnes victorieuses et le fait de repousser l'ennemi plus au sud nous ont conduits à amasser assez de crédibilité pour proclamer le début d'une dynastie potentiellement puissante."
 mch_bypass_great_wall_title:0 "Contourner la Grande Muraille"
 mch_bypass_great_wall_desc:0 "La soi-disant « Grande » muraille de Chine n'est qu'une relique d'un âge ancien. Nous devons submerger ses défenses et déferler en Chine, chevaucher à travers les terres et semer la mort, la peur et le malheur en faisant flotter notre bannière sur toutes les fortifications derrière lesquelles l'Empereur pourrait se cacher."
 mjz_unite_jurchen_tribes_title:0 "Réorganiser les Tribus"
 mjz_unite_jurchen_tribes_desc:1 "Si nous souhaitons consolider notre pouvoir, nous devons chercher à réorganiser les guerriers et le peuple au sein de nos sociétés. Nous devons renforcer nos rangs et nous assurer que tous dans nos frontières suivent la parole de notre loi tribale."
 mch_adopt_alphabet_title:0 "Une Écriture Mandchoue"
 mch_adopt_alphabet_desc:0 "La base d'un peuple est sa langue. Beaucoup de notre peuple ne possèdent pas la capacité d'écrire ou de parler la langue de l'Empereur chinois. Cependant, maintes et maintes fois nos proches ont été pillés par des conquérants étrangers. Arrachés à nos anciens, nous avons été forcés de parler des langues étrangères. Avec chaque nouvelle dynastie et conquérant, nos maîtres ont changé avec les mots qu'ils nous faisaient parler. Avec chaque changement, nous avons changé aussi. Nos pensées, personnalités et la façon dont nous percevions le bien du mal. Ainsi, pour cimenter notre place et nous protéger des influences étrangères, notre peuple a besoin d'une langue commune."
 mjz_into_korea_title:0 "Le Royaume Ermite"
 mjz_into_korea_desc:0 "Au-delà de la montagne Paektu se trouve le royaume de Corée, une terre de fertilité et de ressources abondantes. Leur opulence est dangereuse, et nous ne pouvons leur permettre d'errer librement si près de nos frontières car ils pourraient évoluer en un rival dangereux."
 mch_ensure_internal_stability_title:0 "Stabilité Factionnelle"
 mch_ensure_internal_stability_desc:0 "La conquête est une pierre angulaire vitale de notre domaine croissant. Mais si nous voulons résister à l'épreuve du temps, nous devons aussi nous occuper de nos affaires intérieures, assurant le bon fonctionnement de notre gouvernement."
 mjz_break_through_korea_title:0 "Submerger Ganggye"
 mjz_break_through_korea_desc:0 "Les fortifications autour des montagnes dans la région coréenne bloquent l'accès à un butin incommensurable et à la gloire de la conquête. Sécuriser le passage plus au sud est une étape importante vers la richesse et les joies de la conquête."
 mjz_mount_paektu_title:0 "Mont Paektu"
 mjz_mount_paektu_desc:0 "La Montagne Bukuri, également appelée Paektu par les Coréens, est le site d'origine sacré de notre peuple. Selon la légende, une jeune fille céleste résidant au lac de la montagne fut imprégnée par un fruit laissé tomber par une pie. Son fils devint le premier chef Jurchen. Nous devons honorer nos ancêtres en construisant des sanctuaires près de la Montagne."
 qng_formalize_ritual_practices_title:0 "Formaliser les Pratiques Rituelles"
 qng_formalize_ritual_practices_desc:0 "Les pratiques religieuses ne sont pas une formalité au sein de notre nation. La dévotion et la piété sont quelques-uns des piliers sur lesquels nous bâtirons une grande nation, gouvernée par des procédures méritocratiques et la transparence, la tolérance envers les autres et nos compatriotes croyants."
 mjz_for_the_horde_title:0 "Pour la Horde !"
 mjz_for_the_horde_desc:0 "S'armer de vigueur, d'honneur et de courage face à nos ennemis alors que nous chargeons dans la chaleur de la bataille est un noble sentiment. Cependant, nous n'avons pas besoin de sauter dans les mâchoires de la mort seuls, et peut-être pourrions-nous trouver des alliés partageant les mêmes idées, nous unir et vaincre mutuellement nos ennemis !"



