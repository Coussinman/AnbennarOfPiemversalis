 expansion_focus_desc:0 ""
 no_perfectionism_focus:0 "Manque de Concentration"
 desc_no_perfectionism_focus:0 "Tant que notre État n'a pas encore décidé quelle concentration nous devons adopter, nous souffrirons de problèmes internes.\n\n§YDure jusqu'à ce que l'une des concentrations de Perfectionnisme soit sélectionnée.§!"
 has_no_perfectionism_focus:0 "jusqu'à ce que l'une des trois concentrations soit choisie"
 inward_focus_modifier:0 "Concentration Intérieure"
 desc_inward_focus_modifier:0 "Notre État a décidé de mettre l'accent sur les affaires intérieures et est donc moins intéressé par la diplomatie ou la guerre."
 outward_focus_modifier:0 "Concentration Extérieure"
 desc_outward_focus_modifier:0 "Notre État a décidé de mettre l'accent sur les affaires extérieures et est donc moins intéressé par le développement ou la guerre."
 expansion_focus_modifier:0 "Concentration Expansionniste"
 desc_expansion_focus_modifier:0 "Notre État a décidé de mettre l'accent sur les affaires expansionnistes et est donc moins intéressé par la diplomatie ou le développement."
 until_different_focus_tt:0 "jusqu'à ce qu'une §YConcentration§! différente soit sélectionnée"
