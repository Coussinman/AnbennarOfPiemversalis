 #Qing New Missions Loc
 qng_north_china_title:0 "Consolider la Chine du Nord"
 qng_north_china_desc:1 "Notre lutte ne fait que commencer ! Tandis que nous nous efforçons de soumettre la Chine, nous devons consolider notre domination sur les territoires septentrionaux, cœur d'une ancienne dynastie."
 qng_green_standard_army_title:0 "L'Armée de l'Étendard Vert"
 qng_green_standard_army_desc:0 "Les armées chinoises sont en déroute, leurs généraux perdant rapidement confiance en leurs maîtres. Si nous parvenons à contrôler suffisamment le nord de la Chine, ces généraux pourraient décider de rallier notre cause plutôt que de servir un Empereur condamné. Il serait sage de former ces nouveaux convertis en une véritable armée permanente, digne du nouvel Empereur de Chine !"
 qng_annex_tibet_title:0 "Annexer le Tibet"
 qng_annex_tibet_desc:0 "De nombreux Mongols ont commencé à adopter la foi bouddhiste tibétaine. Nous devons conquérir le Tibet afin de nous assurer que cette foi demeure fermement sous le contrôle de notre étendard."
 qng_modernize_the_banners_title:0 "Moderniser les Bannières"
 qng_modernize_the_banners_desc:0 "La branche militaire des armées de bannières nous a bien servis. Toutefois, si nous voulons suivre l'évolution de l'art de la guerre, nous devons les moderniser et nous assurer qu'elles sont aptes au combat."
 qng_incorporate_han_title:0 "Intégrer les Han"
 qng_incorporate_han_desc:0 "Conquérir l'Empire Ming n'est pas une mince affaire. Vaincre leurs généraux et leurs troupes médiocres au combat ne sera peut-être pas notre tâche la plus ardue. Leur peuple se compte en millions ; les gouverner exige que nous parvenions à certains accords de coopération, un arrangement qui nous profite avant tout."
 qng_extinguish_ming_title:0 "Éteindre les Ming"
 qng_extinguish_ming_desc:0 "Tant qu'il subsistera le moindre bastion de loyalisme Ming, notre domination sur la Chine ne sera jamais véritablement assurée. Nous devons éradiquer totalement les Ming."
 qng_ten_grand_campaigns_title:0 "Les Dix Grandes Campagnes"
 qng_ten_grand_campaigns_desc:0 "Notre conquête de la Chine a permis à ceux vivant aux confins de l'Empire de s'élever au-dessus de leur condition. Une série de campagnes doit être menée pour rétablir l'ordre dans ces territoires et étendre la puissance des Grands Qing sur nos ennemis."
 qng_campaign_in_burma_title:0 "Campagne en Birmanie"
 qng_campaign_in_burma_desc:0 "D'autres loyalistes Ming ont fui vers les collines de Birmanie, cherchant refuge auprès des chefs Shan et Bamar. Nous devons leur montrer qu'il n'existe aucun endroit où se cacher de ceux qui détiennent légitimement le Mandat."
 qng_three_feudatories_title:0 "Les Trois Feudataires"
 qng_three_feudatories_desc:0 "Alors que notre campagne progresse vers le sud de la Chine, nous devons nous demander s'il ne serait pas plus aisé, du moins à court terme, de déléguer le gouvernement de la région aux gouverneurs Ming ayant rallié les Qing. Nous devons trouver un moyen d'exploiter la situation dans le sud."
 qng_junji_chu_title:0 "Le Conseil du Junji Chu"
 qng_junji_chu_desc:0 "Établi par l'Empereur Qing [Root.Monarch.GetName] en [GetYear], le Junji Chu, communément appelé le Grand Conseil, est l'un des organes législatifs les plus puissants et influents. Nous devons utiliser notre habileté juridique et notre polyvalence afin de constituer un conseil privé autour de nos chefs d'État."
 qng_integrate_taiwan_title:0 "Intégrer Taïwan"
 qng_integrate_taiwan_desc:0 "Loyalistes Ming, pirates et opportunistes européens pullulent sur les côtes de Taïwan. L'île n'a jamais été intégrée à la Chine, la plupart la considérant comme un arrière-pays sauvage. Mais nous ne pouvons plus nier son importance stratégique entre les mains de nos ennemis."
 qng_conquer_south_china_title:0 "Sécuriser la Chine du Sud"
 qng_conquer_south_china_desc:0 "Les terres au sud de [1821.GetName] sont en proie aux révoltes, à la dévastation, et à un peuple prêt à nous accueillir comme les libérateurs célestes. À cette fin, nous devons marcher rapidement et sécuriser les riches terres fertiles des côtes méridionales et au-delà vers l'ouest."
 qng_balance_mandate_title:0 "Équilibrer le Mandat"
 qng_balance_mandate_desc:0 "Les Cieux nous accorderont leur faveur. Après les échecs subis du fait de l'administration médiocre des Ming, nous comblerons bravement le vide de pouvoir laissé par la dynastie précédente et inscrirons nos propres noms dans les livres d'histoire !"
 qng_high_qing_era_title:0 "L'Ère Prospère des Qing"
 qng_high_qing_era_desc:0 "Tourments, luttes et guerres ont fait que nous avons obtenu toute la Chine et ses vastes richesses dans la paume de notre main. Cependant, la guerre n'est ni le seul ni le meilleur chemin vers l'excellence historique. Pour élever notre nom au rang d'impérial et digne, nous devons investir autant vers l'intérieur que vers l'extérieur et cultiver notre culture aussi bien que notre instruction."
 qng_library_four_treasuries_title:0 "La Bibliothèque des Quatre Trésors"
 qng_library_four_treasuries_desc:0 "L'histoire complète de la Chine a été rassemblée dans nos archives, tout matériau hostile aux Qing étant exclu afin d'éviter la propagation de la dissidence."
 qng_regulate_trade_title:0 "Mondialisation du Commerce"
 qng_regulate_trade_desc:0 "Les étrangers ont toujours voulu mettre la main dans nos affaires commerciales intérieures. Des accords commerciaux lucratifs au sein de notre royaume pourraient leur rapporter d'immenses bénéfices monétaires, après tout. Malgré leurs souhaits, nous devons présenter un front solide et décider d'une ligne de conduite, sous peine de devenir la proie de leurs pulsions exploitatrices."
 qng_branching_mission_trade_1_title:0 "§YMission Dynamique§!"
 qng_branching_mission_trade_1_desc:0 " "
 qng_branching_mission_trade_2_title:0 "§YMission Dynamique§!"
 qng_branching_mission_trade_2_desc:0 " "
 qng_promote_local_industry_title:0 "Promouvoir les Industries Nationales"
 qng_promote_local_industry_desc:0 "Notre peuple est au plus fort lorsqu'il est uni, travaillant aux côtés de nos concitoyens pour faire avancer les desseins et la cause de notre grand Empereur. Plutôt que de nous abaisser en tendant la main aux étrangers, nous devons renforcer notre concentration sur les lignes de production domestiques."
 qng_expel_foreign_merchants_title:0 "Expulser les Marchands Étrangers"
 qng_expel_foreign_merchants_desc:0 "Depuis bien trop longtemps, ces marchands étrangers venus de terres lointaines ont profité de nos manières hospitalières et généreuses. Il est temps que nous prenions le contrôle de nos marchés et nous débarrassions de toutes ces sangsues."
 qng_allow_foreign_exchanges_title:0 "Autoriser les Échanges Étrangers"
 qng_allow_foreign_exchanges_desc:0 "Une nation aussi puissante et prospère que la nôtre a beaucoup à gagner en élargissant notre portée mercantile pour y inclure des peuples et marchands étrangers de tous les coins du monde. Le commerce mondial est une marée montante qui soulève tous les navires, et nous devons agir rapidement pour en profiter pleinement."
 qng_chinese_industrial_revolution_title:0 "La Révolution Industrielle Chinoise"
 qng_chinese_industrial_revolution_desc:0 "Le rugissement des machines, le sifflement joyeux de la vapeur et l'avancement des frontières du savoir progressent tandis que nous exploitons les bonds prodigieux de notre économie croissante. Les lignes de fabrication, l'industrialisation et l'avènement de nouvelles machines ouvriront la voie à notre glorieux éveil industriel."





