 devshirme_assign_local_pashas:0 "Assigner des Pachas Locaux"
 devshirme_assign_local_pashas_desc:0 ""
 devshirme_recruit_new_grand_vizier:0 "Recruter un nouveau Grand Vizir"
 devshirme_recruit_new_grand_vizier_desc:0 ""
 devshirme_conscript_heathen_recruits:0 "Conscription de Recrues Païennes"
 devshirme_conscript_heathen_recruits_desc:0 ""
 ability_ottoman_decadence_mechanic:0 "Jauge de Décadence"
 ottoman_decadence:0 "Décadence"
 ottoman_decadence_desc:1 "La Décadence est une mesure de combien de pouvoir réside vraiment entre les mains de votre dirigeant et combien l'état actuel de notre nation est considéré comme acquis. Plus votre royaume a de Décadence, plus il devient difficile de maintenir l'État et de suivre les autres grandes puissances.\n\nLa Décadence augmente par les facteurs suivants :\n - Être en Paix\n - Janissaires déloyaux et Janissaires possédant des terres de la couronne\n - Stabilité Négative\n - Corruption\n - Être au-dessus de la Capacité de Gouvernance\n - Désir de Liberté Moyen des Sujets\n - Autonomie Globale Moyenne\n - Perdre des Batailles avec le [Root.Monarch.GetTitle] comme chef\n\nLa Décadence diminue par les facteurs suivants :\n - Absolutisme\n - Accomplir des Agendas de Domaine\n - Gagner des Batailles avec le [Root.Monarch.GetTitle] comme chef\n - Stabilité Positive\n\nSi la Décadence atteint §R100§! alors le Désastre §RLutte de Pouvoir Interne§! peut se déclencher."
 ability_perfectionism_mechanic:0 "Mécanique du Perfectionnisme"
 inward_focus:0 "Concentration Intérieure"
 inward_focus_desc:0 ""
 outward_focus:0 "Concentration Extérieure"
 outward_focus_desc:0 ""
