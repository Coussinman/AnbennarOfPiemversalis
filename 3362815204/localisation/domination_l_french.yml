 eng_enable_colonial_ventures_title:0 "Révoquer l'autonomie des entreprises coloniales"
 eng_enable_colonial_ventures_desc:0 "Les colons ont joui de l'autonomie suffisamment longtemps. Il est temps de prendre un rôle plus actif dans les affaires du nouveau monde."
