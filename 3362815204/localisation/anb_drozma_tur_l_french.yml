 drozma_tur_varlengeilt_holy_order_owner_tt:0 "Ceci nous donnera accès à un ordre sacré unique, mais seulement si un royaume partageant nos idées contrôle Gomosengha le moment venu. Nous devrions aussi nous préparer à une attaque de royaumes ne partageant pas nos idées."

