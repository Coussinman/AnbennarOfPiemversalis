 drozma_tur_varlengeilt_holy_order_non_owner_tt:0 "Ceci nous donnera accès à un ordre sacré unique, mais seulement si un royaume partageant nos idées contrôle Gomosengha le moment venu. Nous nous engagerons aussi à défendre le propriétaire actuel de la cité contre des royaumes ne partageant pas nos idées."

 drozma_tur_varlengeilt_buff_non_owner_tt:0 "Nous nous préparerons à attaquer les voleurs impies détenant actuellement Gomosengha, et nous serons rejoints par des royaumes partageant nos idées dans cette entreprise. Cependant, il pourrait bien y avoir d'autres royaumes qui ne partagent pas nos vues sur cette question - nous devrions progresser prudemment si nous voulons réussir. Si nous y parvenons, nous aurons accès à une amélioration unique de notre religion."

