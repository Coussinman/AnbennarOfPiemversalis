 drozma_tur_events.6.t:0 "Recruteurs de Guerriers et Érudits"
 drozma_tur_events.6.d:0 "Quelques récits ont atteint la cour concernant des vagabonds solitaires ou cavaliers dans notre pays cherchant des combattants talentueux, des mages, des érudits et autres individus qualifiés leur offrant du travail dans un lieu éloigné. Naturellement en ces âges sombres, il y a peu qui accepteraient de telles offres et encore moins qui vaudraient la peine d'être sollicités. Cependant, il est quelque peu impoli de parcourir le pays en tentant de débaucher des gens qui devraient par droit et loi servir leurs Seigneurs, ainsi il serait sage de mettre fin à ce recrutement."
 drozma_tur_events.6.a:0 "Laissez-les tranquilles, qu'est-ce que j'en ai à faire."
 drozma_tur_events.6.b:0 "Trouvez ces vagabonds et renvoyez-les."

 drozma_tur_events.7.t:0 "Fin de la Régence d'Imariel"
 drozma_tur_events.7.d:0 "Après la mort du Seigneur Aranthiv, sa mère monta sur le trône de Gomosengha. Vieille dame noueuse, mince, mais sereine, le règne d'Imariel se révéla stable et paisible malgré les inquiétudes concernant le désordre causé par la foi vacillante dans le Dieu Dragon défunt et les invasions potentielles de voisins ambitieux. Maintenant, Imariel a laissé le trône à sa petite-fille, dont le grand talent né d'une bonne instruction n'est terni que par une profonde ambition de devenir le grand Duc que son père fut privé de vie trop tôt pour être."
 drozma_tur_events.7.a:0 "Que sa puissance grandisse."

 drozma_tur_events.8.t:0 "La Naissance d'un Dieu"
 drozma_tur_events.8.d:0 "Un guerrier d'une loge et monastère éloignés se précipita très impoliment aux portes de Gomosengha, exigeant l'entrée de la Dame locale. Une fois admis, il apporta écaille et coquille d'œuf devant la cour et proclama avec certitude que le onzième jour du onzième mois de quatorze cent quarante-quatre un héritier secret du Dieu Dragon éclôt dans une vallée septentrionale éloignée.\n\nRéjouissez-vous, car ainsi je vous révèle le fils vivant de Drozmagog, le Prince du Changement et Seigneur du Feu : Varlengeilt, Terreur en Vert.\n\nLe jeune Dieu Dragon a été gardé caché dans les landes de Dolenmach où il a été enseigné par des érudits et guerriers aux côtés de plusieurs autres jeunes héros pour le défendre. Avec le temps, cet ordre devait révéler le Prince Dragon au monde mais le guerrier porteur de nouvelles prétend qu'ils l'ont gardé secret pour leur propre gain, cherchant à manier ce pouvoir pour bénéfice et ambition personnels. Ses mots se sont répandus comme flamme à travers toutes les nations de foi et nous devons rapidement prendre une décision sur ce que nous faisons de ce nouveau Dieu et notre ligne de conduite envers lui."
 drozma_tur_events.8.a:0 "Laissons-le rester dans le Dolenmach, notre dieu a besoin d'une longue éducation."
 drozma_tur_events.8.b:0 "Nous devons mettre en sécurité le Prince Dragon, pour son propre bien bien sûr."

 drozma_tur_events.13.t:0 "Rumeurs Inquiétantes"
 drozma_tur_events.13.d:0 "Une ombre vola jadis au-dessus de la rivière, une vision de feu et de tromperie verte, pourtant elle fut occise par Artorean d'Arganjuzorn il y a longtemps et seul son souvenir peut nous hanter.\n\nIl n'en est rien.\n\nDu nord et de l'ouest viennent des récits de l'héritier de Drozmagog, un nouveau dragon pour unir les disciples rzentur dispersés et apporter à nouveau l'assaut de l'armée païenne sur tous les bons Seigneurs chevaleresques de la Rivière Unique."
 drozma_tur_events.13.a:0 "Nous devons être prêts."

 drozma_tur_events.14.t:0 "Le Dragon Ascendant"
 drozma_tur_events.14.d:0 "Durant de longues années, l'Éclos Divin fut gardé en sécurité et protégé pour que son instruction soit réussie et que sa sagesse et sa puissance soient aussi grandes que nous pouvions donner. Maintenant, lors du Cycle Fluvial du Dragon, nous déclarons et présentons notre Dieu au monde.\n\nÀ Svemel, les fidèles ont été appelés par centaines et milliers pour rendre louange au jeune Prince. Rzenta et tous les fidèles sont submergés de joie et de triomphe, car nous avons enduré les jours sombres en deuil de Drozmagog et sommes maintenant récompensés, ici pour voir son Héritier s'élever. Écoutez ô Tur, fidèles ! Écoutez ô Ynn, grande rivière ! Inclinez-vous devant le Fils de Dieu ! Louez le Prince du Changement ! Craignez le Seigneur du Feu Éternel !"
 drozma_tur_events.14.a:0 "Chantons à voix haute en adoration..."

### aspects

 spirit_ambition_aspect:0 "Esprit de l'Ambition"
 desc_spirit_ambition_aspect:0 "Cet Esprit incarne la vision Ynnique des dragons comme créatures ambitieuses et met l'accent sur une volonté d'amélioration du statut par le travail acharné et l'astuce.\n§TCélébration§! donne des §YRevendications§! sur les §YProvinces Voisines§!"

 spirit_authority_aspect:0 "Esprit de l'Autorité"
 desc_spirit_authority_aspect:0 "Cet Esprit se concentre sur comment l'unité et la loyauté sous le Dieu Dragon apportent sécurité et prospérité aux vies des Rzentur, et met l'accent sur l'amélioration mutuelle de la qualité de vie par le respect de la loi et la cohérence dans les mœurs.\n§TCélébration§! réduit l'§YAutonomie§! dans toutes les §YProvinces§! de §Y25 %§!"

 spirit_introspection_aspect:0 "Esprit de l'Introspection"
 desc_spirit_introspection_aspect:0 "Cet Esprit parle de comment Drozmagog et Varlengeilt furent sages grâce à leur compréhension d'eux-mêmes, il place l'importance sur les individus contemplant leur comportement et pensée pour mieux se comprendre eux-mêmes et leur place dans le monde.\n§TCélébration§! retire §Y15 d'Expansion Agressive§! d'opinion dans toutes les §YNations non-Rivales§!"

 aspire_compassion_aspect_adm:0 "Aspirer à la Compassion"
 desc_aspire_compassion_aspect_adm:0 "En ayant ce Précepte, gagne §Y+1 Pouvoir d'Église mensuel§! par Sujet jusqu'à +3, §YImposer le Dialogue Interconfessionnel§! est §T50 % Plus Fort§! et §TNe Coûte Aucune Loyauté du Clergé§!"
 aspire_compassion_aspect_dip:0 "Aspirer à la Compassion"
 desc_aspire_compassion_aspect_dip:0 "En ayant ce Précepte, §YDévelopper une Province§! avec un §YOrdre Sacré§! a §Y10 % de Chance§! de Fournir §T5 Pouvoir d'Église§! et de §TDoubler le Développement Accordé§!"
 aspire_compassion_aspect_mil:0 "Aspirer à la Compassion"
 desc_aspire_compassion_aspect_mil:0 "En ayant ce Précepte, §YÉchanger Main-d'Œuvre, Marins ou Or§! en §YÉchange de Faveurs§! §TCumule un Modificateur§! accordant jusqu'à §T+15 Raisons de Vassalisation§!"

 aspire_wisdom_aspect_adm:0 "Aspirer à la Sagesse"
 desc_aspire_wisdom_aspect_adm:0 "En ayant ce Précepte, §YCentraliser un État§! Fournit §T10 Pouvoir d'Église§!, §YÉtablir un Ordre Sacré§! Fournit §T2 Pouvoir d'Église et 1 % Loyauté du Clergé§!"
 aspire_wisdom_aspect_dip:0 "Aspirer à la Sagesse"
 desc_aspire_wisdom_aspect_dip:0 "En ayant ce Précepte, §YConstruire un Temple§! fournit §T5 Pouvoir d'Église§! et §T2 Progression de Réforme§!, prendre une §YTechnologie§! fournit §T20 Pouvoir d'Église§! et §T10 Progression de Réforme§!"
 aspire_wisdom_aspect_mil:0 "Aspirer à la Sagesse"
 desc_aspire_wisdom_aspect_mil:0 "En ayant ce Précepte, §YBriser les Alliances§! du §YChef de Guerre Ennemi§! donne §T2 Projection de Puissance§! et §T1 Innovation§!. §YNe fonctionne que dans une guerre à la fois§!"

 aspire_power_aspect_adm:0 "Aspirer au Pouvoir"
 desc_aspire_power_aspect_adm:0 "En ayant ce Précepte, §YGagner des Batailles§! ou §YAssiéger des Forts§! contre des §YRebelles§! accorde §T5 Pouvoir d'Église§! et §T2 % Loyauté des Nobles§!"
 aspire_power_aspect_dip:0 "Aspirer au Pouvoir"
 desc_aspire_power_aspect_dip:0 "En ayant ce Précepte, §YConstruire une Caserne§! donne §T+1 Main-d'Œuvre de Base§! et §T5 Pouvoir d'Église§!, une §YMaisonnée de Soldats§! fournit le §TDouble§! de cela"
 aspire_power_aspect_mil:0 "Aspirer au Pouvoir"
 desc_aspire_power_aspect_mil:0 "En ayant ce Précepte, §YGagner des Batailles§! et §YAssiéger des Forts§! accorde §T2 Pouvoir d'Église§!, Assiéger une §YCapitale§! donne §T2 Projection de Puissance§!"

 community_advancement_aspect_adm:0 "Communautés pour l'Avancement"
 desc_community_advancement_aspect_adm:0 "En ayant ce Précepte, les §YProvinces Possédées§! avec ou ayant Construit des §YManufactures ou Universités§! gagnent §T-0,1 Autonomie Mensuelle§! et §T+0,5 Prospérité Mensuelle§!"
 community_advancement_aspect_dip:0 "Communautés pour l'Avancement"
 desc_community_advancement_aspect_dip:0 "Après avoir choisi le §TPrécepte d'Esprit§!, §YChaque Dix fois Développer§! dans les §YProvinces Drozma Tur Possédées§! avec des §YTemples ou Cathédrales§! fournit §T1 Innovation§!, jusqu'à un §TMaximum de 10§!"
 community_advancement_aspect_mil:0 "Communautés pour l'Avancement"
 desc_community_advancement_aspect_mil:0 "En ayant ce Précepte, les §YProvinces Possédées§! qui ont un §YTemple ou Cathédrale§! ou Construisent ceux-ci §TGagnent +20 % Diffusion d'Institution§!. Si la Province a une §YUniversité§!, elle Gagne §T+20 % Diffusion d'Institution Additionnels§!"

 community_recognition_aspect_adm:0 "Communautés pour la Reconnaissance"
 desc_community_recognition_aspect_adm:0 "En ayant ce Précepte, les §YProvinces Possédées§! de §YCulture Non Acceptée§! gagnent §T-5 Ans de Séparatisme§! et §T-1 % Force Missionnaire Locale§!"
 community_recognition_aspect_dip:0 "Communautés pour la Reconnaissance"
 desc_community_recognition_aspect_dip:0 "Pour Chaque §YProvince Possédée§! avec un §YTemple ou Cathédrale§! ayant une §YCulture Non Primaire mais Acceptée§!, §TRéduit l'Expansion Agressive§! de §T1 à 15 Additionnels§! lors de la §YCélébration§!"
 community_recognition_aspect_mil:0 "Communautés pour la Reconnaissance"
 desc_community_recognition_aspect_mil:0 "En ayant ce Précepte, les §YProvinces Possédées§! avec ou ayant Construit un §YTemple ou Cathédrale§! gagnent §T-10 % Coût de Conversion Culturelle§!, si elles ont aussi un §YAtelier ou Comptoir§! ou Construisent ceux-ci, gagnent §T-10 % Coût de Conversion Culturelle Additionnels§!"

 community_triumph_aspect_adm:0 "Communautés pour le Triomphe"
 desc_community_triumph_aspect_adm:0 "En ayant ce Précepte, §YChaque Province Possédée§! avec du §YSéparatisme§! Gagne §T+10 Agitation Locale, +20 % Main-d'Œuvre Locale et -20 % Coût de Régiment Local§!"
 community_triumph_aspect_dip:0 "Communautés pour le Triomphe"
 desc_community_triumph_aspect_dip:0 "Après avoir choisi le §TPrécepte d'Esprit§!, les §YProvinces Possédées§! qui §YTerminent des Conversions Religieuses ou Culturelles§! Gagnent §T-10 % Coût de Construction Local et +10 % Biens Produits Locaux§! tant que ce Précepte est actif"
 community_triumph_aspect_mil:0 "Communautés pour le Triomphe"
 desc_community_triumph_aspect_mil:0 "En prenant ce Précepte, les §YReligions§! des §YAlliés ou Sujets§! localement §TNe Réduisent pas l'Unité Religieuse§! et §TGagnent -5 Agitation Locale§!, les §YCultures Non Acceptées§! des §YAlliés ou Sujets§! gagnent une §TCompensation à leur Malus§! et §T-5 Agitation Locale§!"


