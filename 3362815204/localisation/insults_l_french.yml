l_french:
 insult_default:1 "Votre mère était un hamster et votre père sentait le sureau !"
 insult_default2:0 "Le jour du jugement est sur nous ! Les sbires de Kazraiel marchent sur terre... Oh. Non, ce sont simplement les [Root.GetAdjective]."
 insult_default3:0 "De plus, je pense que [Root.Capital.GetCapitalName] doit être détruite !"
 insult_default4:0 "Quand le récit de notre époque sera écrit par les générations futures, elles vous regarderont avec ce mélange de pitié et de dégoût qu'on appelle la compassion."
 insult_default5:0 "Ma dernière visite aux latrines fut bien plus agréable qu'un dîner avec l'ambassadeur [Root.GetAdjective]."
 insult_default6:0 "Oh, regardez. Il y a de la belle crasse par ici."
 insult_default7:0 "Votre sang rendra le sol que je vous prendrai d'autant plus riche."
 insult_default8:0 "Les [Root.GetAdjective] ne savent rien de la gestion d'un État !"
 insult_default9:0 "Il y a un problème des plus répandus avec [Root.GetName], et je soupçonne que la cause en est les [Root.Culture.GetName]."
 insult_default10:0 "Dans ce grand jeu que nous jouons, vous n'êtes qu'un simple pion."
 insult_default11:0 "À [From.GetName], « [Root.GetName] » est un mot synonyme de fumier."
 insult_default12:0 "Les récits de vos méfaits se racontent de la Gérudie jusqu'à Haless."
 insult_default13:0 "La culture [Root.GetAdjective] est quelque chose d'un oxymore, ne trouvez-vous pas ?"
 insult_default14:0 "Puisse votre ciel être obscurci de cendres."
 insult_default15:0 "Aucune carte ne peut être une œuvre d'art tant que votre nation y figure."
 insult_no_army:0 "Qu'allez-vous faire, saigner sur moi ?"
 insult_bookkeeping:0 "Un jour, même les marchands [Root.GetAdjective] comprendront la comptabilité."
 insult_rome:0 "Peut-être que mes armées devraient vérifier si tous les chemins mènent vraiment à Rome."
 insult_heir_hunter:0 "J'ai entendu dire que votre héritier aime la chasse. Faites bien attention, ce serait dommage qu'un accident imprévu survienne."
 insult_monarchy:1 "Toute votre lignée souffre de délires de compétence."
 insult_european_indian:0 "Alors c'est ici que pousse le poivre ? Il semble que nous soyons arrivés juste à temps pour une riche récolte..."
 insult_diamonds:0 "On dit que les diamants sont éternels, et vous semblez en avoir beaucoup. Donnez-nous-en quelques-uns, et nous verrons s'ils peuvent survivre à votre dynastie."
 insult_christian_muslim:0 "C'est une dangereuse merveille qu'un païen tel que vous ait acquis une terre si riche et prospère. Heureusement, cela sera bientôt rectifié."
 insult_against_bahmanis:0 "Bientôt tous vos trésors seront à nous, y compris ce ridicule trône de turquoise que vous chérissez tant."
 insult_against_timurid:0 "Vous auriez pu être une belle nation, si vous n'aviez pas été si préoccupés à vous entre-tuer pour savoir qui était le plus apparenté au plus grand meurtrier de notre temps."
 insult_against_deccani:0 "Pendant que nous bâtissions une civilisation, vous vous êtes cachés parmi les vagabonds du Deccan. Prosternez-vous maintenant ou rencontrez votre fin aux mains des héritiers de Timur et Gengis."
 insult_portugal_vs_africa_or_india:0 "Nous avons voyagé loin et bravé de nombreux périls pour atteindre vos rivages. Rien, cependant, n'aurait pu nous préparer aux hideux péchés de votre cour païenne."
 insult_against_habsburg:0 "Le trône [From.GetAdjective] ne sera pas souillé par votre lignée maudite et difforme."
 insult_byz_to_ven:0 "Vous êtes le fléau de cette terre et serez pendu à vos murs pour ce que vous avez fait !"
 insult_guybrush:0 "Vous vous battez comme une vache !"
 insult_against_guybrush:0 "Vous vous battez comme un fermier laitier !"
 insult_low_dipadm:0 "La tête de [Root.Monarch.GetName] est aussi vide que les sous-vêtements d'un eunuque."
 insult_pvp:0 "aprend a jouer noob !"
 insult_pvp2:0 "Git gud."
 insult_cossack_to_turk:0 "Ô Sultan, diable turc et maudit parent du diable, secrétaire de Lucifer lui-même."
 insult_muslim_truce:0 "Quand nos fils regarderont ce jour, ils sauront que bien que vous ayez pu raser notre barbe, nous vous enlèverons le bras."
 insult_against_denmark:0 "Il y a quelque chose de pourri au royaume de Danemark."
 insult_against_england:0 "Si [Root.Monarch.GetName] tombait dans la Tamise, ce serait un malheur. Mais si quelqu'un l'en ressortait, ce serait une calamité."
 insult_marprelate:0 "[Root.Monarch.GetName] est un prélat orgueilleux, papiste, présomptueux, profane, pestilentiel, pernicieux et usurpateur."
 insult_marprelate2:0 "Votre [Root.Monarch.GetTitle] est un gouverneur illégitime, contre-nature, faux, bâtard de l'Église, l'Ordonnance du Diable, petit pape, anti-Christ, diable incarné, fripon trompeur et menteur prolifique."
 insult_against_saxony:0 "Ce serait dommage qu'il arrive quelque chose à votre porcelaine de Meissen..."
 insult_fort:0 "Vos murs s'effondreront devant nos canons comme le sable devant la mer."
 insult_revolutionary:0 "Votre cadavre pavera le chemin du progrès, [Root.Monarch.GetName] !"
 insult_monarchy_rank:0 "Est-ce que cette chose pitoyable sur votre tête est ce qui passe pour une couronne à [Root.GetName] ?"
 insult_low_adm:0 "J'avais préparé une autre insulte pour vous, mais je doute que vous seriez capable de la lire."
 insult_against_gbr:0 "Il est temps que le soleil se couche sur l'Empire britannique."
 insult_from_arabs:0 "Puissiez-vous être cousu vivant dans le ventre d'un chameau mort."
 insult_against_craven:0 "Je vous suggère de changer la couleur de votre pantalon d'uniforme pour du marron."
 insult_against_sinner:0 "Est-ce que [Root.Consort.GetName] sait combien de servantes vous gardez dans vos appartements ?"
 insult_against_hre:0 "Anbennar n'est rien d'autre que le fantasme humide de mages complexés."
 insult_against_serbia:0 "Votre aigle a deux têtes mais pas même une seule couronne."
 insult_against_european_in_india:0 "Il est temps que vous partiez."
 insult_japanese:0 "Même le seppuku ne pourrait restaurer votre honneur."
 insult_loans:0 "L'état lamentable de votre économie est un avertissement pour tous les aspirants dirigeants."
 insult_rebels:0 "J'entends que votre peuple est révoltant. Vous avez cela en commun."
 insult_low_mil_tech:0 "Vos soldats peuvent-ils toucher une grange maintenant, ou pensent-ils encore que les mousquets sont des gourdins ?"
 insult_golden_horde_vs_muscovy:0 "Vous autres collecteurs d'impôts parvenus devriez connaître votre place : piétinés sous nos chevaux !"
 insult_wallachia_to_ottomans:0 "Nous empalerons [Root.Monarch.GetName] sur un pieu, comme nous l'avons fait avec vos pathétiques armées."
 insult_barbary_pirates:0 "Vous avez hanté les eaux de la Méditerranée trop longtemps, maudit pirate !"
 insult_turkish_drunkard:0 "Vous êtes vraiment le Sultan du Rhum, espèce de porc ivrogne !"
 insult_against_england2:0 "Votre royaume ne vaut vraiment qu'un cheval."
 insult_against_scotland:0 "Nous prendrons vos vies, et votre liberté !"
 insult_for_buddhists:0 "Puissiez-vous succomber au Samsara et vivre mille vies sans joie ni illumination."
 insult_for_persians:0 "Nos flèches obscurciront le soleil !"
 chinese_insult_1:0 "J'entends que [Root.Monarch.GetName] est un fervent fidèle de [Root.religion.GetName], ce qui décidera de [From.Monarch.GetHerHis] sort dans la prochaine vie. Mais c'est l'Empereur qui décidera de votre sort dans cette vie."
 chinese_insult_2:0 "Montrez votre obéissance à l'Empereur et jouissez d'une vie heureuse, sinon vous rencontrerez l'Armée Céleste !"
 chinese_insult_3:0 "Vos méfaits jusqu'ici ne sont qu'une plaie insignifiante. Corrigez-les avant qu'ils ne s'infectent au-delà de tout secours."
 insult_explorer_vs_africa_or_india:0 "Avez-vous un drapeau ?"
 insult_republic_to_monarchy:0 "Écoutez, des femmes étranges couchées dans des étangs distribuant des épées n'est pas une base pour un système de gouvernement. Le pouvoir exécutif suprême dérive d'un mandat des masses, pas d'une quelconque cérémonie aquatique farfelue."
 insult_pirates_1:0 "Qu'est-ce que tu viens de me dire, vaurien ? J'ai navigué les sept mers et j'ai plus d'une centaine d'abordages confirmés."
 insult_pirates_2:0 "Je ferai pleuvoir la mitraille sur toi et tu t'étoufferas avec. Tu es coulé, gredin."
 insult_pirates_3:0 "Si vous continuez à boire du rhum, le monde sera bientôt débarrassé d'une très sale canaille !"
 insult_pirates_4:0 "J'ai possédé un chien qui était plus intelligent que vous"
 insult_pirates_5:0 "Je vous donne le choix. Vous pouvez être éviscéré, ou décapité !"
 insult_jungle:0 "C'est vrai, j'admets, que [Root.GetName] est d'une plus grande étendue que [From.GetName]. Mais vous devez convenir que [From.Monarch.GetName] règne sur des hommes, tandis que [Root.GetName] ne règne que sur des forêts et des moustiques."

 # Anbennar
 insult_default12_ynn:0 "Les récits de vos méfaits se racontent de Svemel jusqu'à Adbrabohvi."
 insult_marrhold_adventurer:0 "L'aventurisme et ses conséquences ont été un désastre pour l'Escann."
 insult_corin_waifu:0 "J'ai vu les portraits de Corin aussi bien que quiconque, mais je pense que Minara serait bien mieux adaptée à votre niveau d'adulation."
 insult_tall_small_1:0 "Ce matin, j'ai pensé à vous et craint pour mes chevilles. Puis, j'ai mis mes bottes et ces soucis se sont envolés."
 insult_tall_small_2:0 "Moi devoir manger pays entier pour un repas."
 insult_tall_small_3:0 "Toi grand comme mon orteil, et juste aussi intelligent !"
 insult_garden_gnomes:0 "Les statues de vos ancêtres que vous vénérez décoreront bientôt mon jardin."
 insult_silmuna_1:0 "La lune s'est couchée pour de bon, et ne se relèvera jamais."
 insult_from_pelomar:0 "Prosternez-vous devant les Liés-au-Serment, les véritables Champions des Fées, misérable !"
 insult_from_winter_court:0 "Le permafrost a une longue mémoire, et en lui nous voyons votre avenir : il n'y a rien."
 insult_ogres:0 "Les ogres sont comme les oignons. Ils sentent affreusement mauvais et font pleurer quand on les ouvre."
 insult_from_undead_army:0 "J'enverrais mes sbires zombies après [Root.Monarch.GetName], mais [Root.Monarch.GetSheHe] semble manquer de cervelle."
 insult_from_xhazobkult:0 "Préféreriez-vous servir comme esclave, ou comme dîner ?"
 insult_from_harpy_1:0 "Je ne chasserais pas [Root.Monarch.GetName] même s'il était le dernier homme sur Halann !"
 insult_from_harpy_2:0 "Cela en dit long sur les femmes de [Root.GetName] quand vos hommes sautent pratiquement dans nos serres."
 insult_lencori_1:0 "Êtes-vous sûr que votre vin provient de raisins, et non de l'urine de votre [Root.Monarch.GetTitle] ?"
 insult_lencori_2:0 "Puissent vos vignes être aussi flétries que vos reins."
 insult_lencori_alenic:0 "Du vin ! Du vin ! Du vin ! Ce doit être parce que vous tombez dans les pommes à la moindre gorgée de Bière Alénique !"
 insult_from_dumb_ogres_1:0 "Moi mangerait toi, mais moi deviendrait plus bête !"
 insult_from_dumb_ogres_2:0 "Toi avoir problème avec moi ? Rejoindre le club !"
 insult_from_mossmouth_1:0 "Mets ce L sur ton front !"
 insult_from_mossmouth_2:0 "Toi parler comme âne, aucun sens."
 insult_from_gnomes_1:0 "C'est quoi ce bordel que tu viens de dire sur moi, petit kobold ? Pour ton information, j'ai été major de ma promotion au Gommo, et j'ai participé à de nombreux raids secrets contre les kobolds, et j'ai plus de 300 inventions confirmées. Je suis entraîné à la guerre-bricolo et je suis le meilleur artificier de toute l'Armée de Reconquête Gnome. Tu n'es rien pour moi qu'une autre cible. Je vais t'effacer avec une précision jamais vue auparavant sur Halann, retiens bien mes putains de mots. Tu crois pouvoir t'en tirer en me disant cette merde par les Pierres d'Envoi ? Réfléchis encore, enfoiré. Pendant qu'on parle, je contacte mon réseau secret d'espions à travers Cannor et ta magie est tracée en ce moment même alors prépare-toi pour la tempête, mage. La tempête qui efface la petite chose pathétique que tu appelles ta vie. T'es mort, gamin. Je peux être n'importe où, n'importe quand, et je peux te tuer de plus de sept cents façons, et c'est juste avec mes outils de bricoleur. Non seulement je suis extensivement entraîné à l'artisanat improvisé, mais j'ai accès à tout l'arsenal du Corps de Bricoleurs de la Hiérarchie Gnome et je l'utiliserai dans toute son étendue pour effacer ton misérable cul de la face du plan mortel, petite merde. Si seulement tu avais pu savoir quelle rétribution a-logique ton petit commentaire « malin » allait t'attirer, peut-être que tu aurais fermé ta putain de gueule. Mais tu n'as pas pu, tu ne l'as pas fait, et maintenant tu paies le prix, espèce d'idiot damné-pensée. Je vais inventer de la fureur partout sur toi et tu vas te noyer dedans. T'es putain de mort, gamin."
 insult_from_gnomes_2:0 "Ooh ohh ohh oohah hah. Ooh hoo hoo hee hee hah. Salut mon vieux pote ! Je suis gnon pas un gnelfe, je suis gnon pas un gnobelin. Je suis un gnome ! Et tu viens de te faire gnomer !"
 insult_closed_dwarves:0 "Ouvrez vos tunnels, arrêtez de les garder fermés."
 insult_against_colonizer:0 "Il est temps que vous partiez."
 insult_against_anbennar:0 "Anbennar n'est rien d'autre que le fantasme humide de mages complexés."
 insult_against_silmuna:0 "Le trône [From.GetAdjective] ne sera pas souillé par votre lignée fourbe et intrigante."
 insult_anbenncost:0 "Anbenncóst a connu ses meilleurs jours quand elle était la capitale d'un empire plus grand, n'êtes-vous pas d'accord ?"
 insult_dwarf_1:0 "L'histoire [Root.GetAdjective] est, en résumé, une série malheureuse de désastres."
 insult_dwarf_2:0 "Vos plus grandes forteresses sont à un mauvais jour de s'effondrer dans un chaos de crises de colère. Vous n'y croyez pas ? Regardez bien."
 insult_dwarf_3:0 "Tous les chevaliers des nains et tous les trains des nains n'ont pas pu remettre Aul-Dwarov ensemble. Et vous non plus."
 insult_from_dwarf:0 "Je suis un nain et je creuse votre tombe."
 insult_rianvisa_end:0 "Vous auriez pu être une belle nation, si vous n'aviez pas été si préoccupés à avoir une guerre civile pour un continent qui a jadis été détruit par une guerre civile."
 insult_ynn:0 "Même l'Ynn ne pourrait laver vos péchés."
 insult_cannorian_rahen:0 "Alors c'est ça le Rahen ? Est-ce un bon endroit pour la chasse au tigre ?"
 insult_centaur_civilization:0 "Vous autres bâtisseurs de nations parvenus devriez connaître votre place : piétinés sous nos sabots !"
 insult_ruinborn_light:0 "Marchez dans la lumière, Nés-des-Ruines, ou nous vous y traînerons."
 insult_wex_damerian:0 "Des cendres des traîtres, Damérie renaîtra."
 insult_against_wex:0 "Contemplez, le Grand-Duc des Wexonards, un collaborateur négligé, au chapeau mou, âgé et sans inspiration qui ne possède aucun sens du style, de l'honneur, de la fierté, ni de la piété. Un troglodyte malodorant qui dévore agneau et veau quelle que soit la saison, nappés de saveurs aléniques telles que l'ail, l'eau de rivière, et l'huile de foie de poisson. C'est un débauché qui désire les femmes sans égard pour le rang ou la bienséance, se complaisant d'une manière, et ne montrant aucun respect pour Ryal, ses vœux, ou ses fidèles. Vraiment, un homme plus méprisable n'a jamais honoré le siège d'Empereur."
 insult_slaver:0 "Qui est le sauvage maintenant, esclavagiste ?"
 insult_damerian_wex:0 "Devons-nous vous rappeler ce qui s'est passé sur la Damesmear ?"
 insult_gerudian:0 "Il n'est pas étonnant que les pillards soient venus au sud quand on regarde l'état de votre nation !"
 insult_marrhold_1:0 "Le Griffon est une bête détestable."
 insult_marrhold_2:0 "Vous dites être un chevaucheur de Griffon, et pourtant vous ne m'avez pas convaincu que c'est vous qui êtes dessus."
 insult_wood_elves_green_orcs:0 "Différence entre elfes et arbres ? Pas de différence, pareil ! Un coup de hache et nouvelles terres pour moi !"
 insult_wood_elves:0 "Pourquoi ne demandez-vous pas aux fées de refermer la forêt ? Je pense que nous pouvons tous convenir que c'était une erreur de vous en laisser sortir."
 insult_reavers:0 "Vous pillards sauvages êtes une chose du passé !"
 insult_heir_mage:0 "J'ai entendu que votre héritier aime la magie. Ce serait dommage qu'il se transforme en grenouille."
 insult_esmari_1:0 "Vos barges de fête sont énormes. Votre peuple compense-t-il peut-être quelque chose ?"
 insult_esmari_2:0 "Vos barges de fête sont des tares grotesques sur la belle rivière comparées aux nôtres."
 insult_elves_industrialists:0 "J'ai entendu que vous aimez les forêts. Eh bien devinez quoi ? Nos fourneaux aussi !"
 insult_elves_1:0 "Les oreilles pointues méritent des choses pointues. Plantées dans leurs ventres !"
 insult_elves_2:0 "Pourquoi n'allez-vous pas vous perdre en mer pour un autre millier d'années ?"
 insult_great_power:0 "Votre impact sur la scène politique nous fait vraiment souhaiter que le Jour des Cieux Cendrés ait annihilé toute vie sur Halann."
 insult_from_gnolls_1:0 "Notre grand chef n'est pas sûr que vous feriez de bons esclaves. Il semble qu'il n'y ait qu'un moyen de le savoir."
 insult_from_monstrous:0 "Votre précieuse « civilisation » tombera devant notre force."
 insult_centaurs:0 "Vous êtes mieux adaptés à tirer nos carrosses qu'à diriger une nation."
 insult_humans_orcs_1:0 "L'âge des Hommes est révolu. Le temps des Orques est venu."
 insult_humans_orcs_2:0 "Votre peuple est si répugnant que ça nous fait presque regretter d'avoir quitté les montagnes. Mais vous faites de bons cadavres."
 insult_from_kobolds_1:0 "Cette couronne qui est la vôtre sera superbe dans le trésor."
 insult_from_kobolds_2:0 "Nous entendons que votre trésorerie enfle. Elle sera excellente ajoutée à notre trésor."
 insult_blademarches:0 "Des intendants étranges distribuant des épées n'est pas une base pour un système de gouvernement !"
 insult_raj:0 "La seule chose pire que les déchets qui coulent le long du Dhenbasana depuis vos halls est l'oppression bâtie en leur sein."
 insult_gnolls_1:0 "Il semblerait que les chiens se soient échappés de leurs chenils."
 insult_gnolls_2:0 "Fils d'un chien galeux ! Petit-fils d'un chacal scorbut ! Arrière-petit-fils d'un vautour qui mue ! Tout cela décrit [Root.Monarch.GetName] !"
 insult_from_longlived_1:0 "La mienne est une histoire d'héroïsme, éphémères. Vous ne la partagez que pour un moment."
 insult_celliande_toarnen:0 "Celliandre, puant la sueur et l'alcool, a pris la rose de l'héritière, tachée à jamais de déshonneur ! Se suicidant, elle n'avait qu'un seul souhait : que la rose de Toarnen flotte pour toujours au-dessus du château de celui qui avait causé sa mort ! Et nous ferons qu'il en soit ainsi."
 insult_elves_ravelian:0 "La puanteur de l'hubris des précurseurs s'accroche encore à votre peuple."
 insult_sun_elves_nsc:0 "C'est avec grand regret que [From.Monarch.GetName] vous envoie cette insulte, Ô choisi de Surael ! Nous avons simplement noté que vos compétences de gouvernance sont à peu près égales à celles des êtres inférieurs appelés trolls, et que vous êtes indigne d'être appelé un choisi. S'il vous plaît, Ô choisi de Surael, ayez pitié de cet humble serviteur."
 insult_hehodovar:0 "Vous êtes un nain, donc je parlerai en mots simples : votre cerveau est trop gros pour votre crâne. C'est complètement dégoûtant. Vous devez cesser d'exister."
 insult_khozrugan:0 "Quand nos conseillers nous mettent en garde contre vous, ils ne font que crier au loup."
 insult_ravelian_1:0 "Ne mettez pas votre nez là où il n'a pas sa place, Ravélien !"
 insult_from_castanor_1:0 "Tous les chemins mènent à Castonath. Et tout homme doit être mené par Castan !"
 insult_from_castanor_2:0 "Fléau-des-Bêtes a dû vous manquer vous chamaillant dans la boue. Nous finirons son travail."
 insult_gawed:0 "Le Nord se souvient ? Avec un héritage aussi pathétique et sordide que le vôtre, peut-être vaudrait-il mieux que vous oubliiez."
 insult_monstrous:0 "Je suis surpris que votre pays fonctionne même, vu que vous brutes ne pouvez même pas lire ce message."
 insult_halflings:0 "Un demi-homme fait un demi-pays."
 insult_from_regent_court:0 "Nous pensions que la mort de Castellos était la plus grande tragédie que notre monde ait vue. Puis nous avons regardé [Root.GetName]."
 insult_lich:0 "Vos horribles incursions dans la nécromancie prouvent votre peur lâche et horrible de la mort. Nous veillerons à ce que vos pires craintes se réalisent."
 insult_from_dahvar:0 "Ainsi parla le Prophète Dahvar : « Les incroyants et les impurs souillent le sol de la sainte Aelantir. Chassez-les partout où vous les voyez, poussez-les devant vous et purifiez-les de leur Péché d'Existence. »\n  Til Eathil 3:26"
 insult_from_xia_1:0 "Vous courtisez la mort !"
 insult_from_xia_2:0 "[Root.Monarch.GetName] n'est rien d'autre qu'un jeune maître arrogant, à qui on montrera l'erreur de ses voies !"
 insult_from_xia_3:0 "Avez-vous... volontairement mal entraîné votre armée, comme une sorte de blague ?"
 insult_from_xia_4:0 "D'abord, je vais te botter le cul. Puis je le ferai encore, pour enseigner à mes disciples."
 insult_vizier_1:0 "La seule chose de grand chez vous est votre titre, et même celui-là ne durera pas longtemps."
 insult_raja_1:0 "Raja ? Chasseur de souris serait un meilleur métier pour vous."
 insult_from_ghavaanaj_1:0 "[Root.Monarch.GetName] est à peu près aussi corpulent qu'un éléphant, mais pas aussi intelligent."
 insult_from_ghavaanaj_2:0 "Même nos meilleurs Reishi ne pourraient aider votre pauvre [Root.Monarch.GetTitle] ; ils ont besoin d'un noyau d'intelligence là pour travailler."
 insult_shuvuush_1:0 "Au nom de tous ceux qui vous ont jamais regardé, je voudrais vous remercier de porter des masques."
 insult_shuvuush_2:0 "Moi aussi je suis assez friand des oiseaux de terreur. Frits, et avec un mélange d'épices yansheni."
 insult_shuvuush_3:0 "Avez-vous oublié que vous pouviez monter des chevaux, ou préférez-vous simplement une espèce avec une taille de cerveau à peu près égale à la vôtre ?"
 insult_shuvuush_4:0 "Votre peuple parle de démons voleurs de visage qui hantent les sables du nord. Les démons doivent trouver cet arrangement des plus malheureux."
 insult_ghost_emperor_1:0 "Votre peuple est aussi sans épine dorsale que votre empereur !"
 insult_ghost_emperor_2:0 "Votre peuple a autant de cervelle que votre empereur !"
 insult_feiten:0 "Vos diplomates et vos ballons sont également remplis d'air chaud."
 insult_elves_haless:0 "Haless vous a déjà vaincus vous les elfes une fois, et nous le ferons encore !"
 insult_xiaken_1:0 "Vous êtes un combattant de troisième ordre utilisant des arts martiaux de quatrième ordre !"
 insult_goldbolds:0 "Vous êtes petit et chanceux ? Approprié, puisque votre chance a tiré à sa fin."
 insult_eunuchs_rp:0 "Le Chi est stocké dans les couilles, ce qui rend votre situation assez problématique."
 insult_from_verkal_dromak:0 "J'ai rêvé, et dans mes rêves j'ai plané à travers vallées, montagnes, et océans, vu des empires s'élever et s'effondrer, et même entrevu le secret du sens de la vie lui-même, et pourtant je ne PEUX TOUJOURS PAS trouver quiconque qui vous veuille dans les parages."
 insult_not_oni:0 "Les Oni, démons grotesques des collines, sont venus à la cour ! Fuyez... Oh. Non. C'est simplement l'ambassadeur de [Root.GetName]."
 insult_no_maidens:0 "Pas de demoiselles ?"
 insult_horashesh:0 "Comment votre nation pitoyable a survécu après la Guerre de Zena me dépasse. Votre pleurnicheur de Medaka a dû accepter l'aide des sorcières de la nuit."
 insulting_the_vyzemby:0 "J'ai entendu que votre peuple monte des chiens. Je pensais que c'était comme cavalerie, mais après vous avoir vu j'ai réalisé que je m'étais trompé. Parce que vous ressemblez vraiment à un fils de chienne."
 insult_from_nekheis:0 "Être témoin de votre barbarie nous fait souhaiter n'avoir jamais quitté notre île."
