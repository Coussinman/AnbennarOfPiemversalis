 ######################################### ÉVÉNEMENTS DU SYSTÈME KHÉIONAÏ #################################################
 kheionai.0.t:0 "Les Vents de Mort"
 kheionai.0.d:0 "Une mère des campagnes borde ses enfants et leur fait réciter leurs plans d'évacuation, comme sa propre mère le lui avait fait faire avant son premier Vent de Mort. Un marin en haute mer se prend la tête dans les mains, sachant qu'il est trop loin pour rentrer chez lui, et que les tumeurs magiques feront en sorte qu'il ne revoie jamais sa femme. Un philosophe sur Alecand contemple les nuages de poussière bleue haineuse à l'horizon, serein à l'idée que l'architecture bâtie à dessein et les Brise-Vents magiques le protégeront, lui et son khéion.\n\nLa surexposition à toute forme de souffrance finit par vous y insensibiliser. C'est ce que se disent les Khéionaï. On ne peut se terrer dans la peur que si longtemps. Et les Khéionaï vivent dans l'ombre maléfique du Vent de Mort depuis qu'il existe des Khéionaï : une immense tempête de sable bleu empoisonné venue de la Mer Kaydhano, porteuse d'une magie malfaisante qui inflige des cancers mortels à tous ceux qui y sont exposés. On ne peut l'éviter. On ne peut l'arrêter. Tout ce que l'on peut faire, c'est espérer trouver refuge à temps. La vie s'arrête tandis que les Vents de Mort décapent le sol et mutilent les chairs. Ils étouffent une nation comme on étouffe un nourrisson.\n\nLes Khéionaï ont appris à se préparer à l'inévitable du mieux qu'ils peuvent. Il n'y a tout simplement pas d'autre choix. Tant que les Khéionaï entretiendront leurs fragiles Brise-Vents, leur jeune civilisation pourra survivre."
 kheionai.0.a:0 "Les mages prédisent la prochaine tempête dans un an."

 kheionai.1:0 "Vent de Mort"
 kheionai.1.t:0 "La Mort Azurée Approche"
 kheionai.1.d:0 "Des nouvelles arrivent du nord, portées par les braves et les téméraires qui s'aventurent dans ces eaux : le Kaydhano s'agite. Les vents balaient à nouveau cette vaste étendue empoisonnée, soulevant les sables voleuses de vie du désert, et bientôt ils fouetteront le sud pour ravager Alecand. Déjà la nouvelle se répand comme une traînée de poudre à travers les khéions et jusqu'aux campagnes, et ceux qui osent vivre au-delà des Brise-Vents se préparent à rejoindre les cités pour y affronter les tempêtes. Au cours des semaines suivantes, toute la vie commence à tourner autour de la préparation aux Vents de Mort, et l'activité économique normale ralentit tandis que chacun se concentre sur sa survie."
 kheionai.1.a:0 "Le Vent de Mort sera bientôt sur nous."

 kheionai.2.t:0 "Protections des Forts"
 kheionai.2.d:0 "Événement auxiliaire"
 kheionai.2.a:0 "Entendu"
 kheionai.3.t:0 "Protections des Tours de Mage"
 kheionai.3.d:0 "Événement auxiliaire"
 kheionai.3.a:0 "Entendu"
 kheionai.4.t:0 "Protections du Développement"
 kheionai.4.d:0 "Événement auxiliaire"
 kheionai.4.a:0 "Entendu"

 kheionai.5.t:0 "Brise-Vents Sabotés !"
 kheionai.5.d:0 "Les Brise-Vents qui entourent les khéions sont robustes et puissants, capables de résister à certains des bombardements physiques et magiques les plus dévastateurs de Halann. Mais ils sont aussi, pour ceux qui les comprennent, très fragiles : le retrait ou l'endommagement d'un ou deux composants seulement peut annuler leurs mesures protectrices et laisser de larges sections d'un khéion sans protection.\n\nEn raison de leur valeur et de leur vulnérabilité, les Brise-Vents sont toujours une cible. Récemment, nos soldats ont capturé des saboteurs tentant d'endommager nos protections ! Nous présumons qu'ils ont été envoyés par nos rivaux pour s'assurer que nous serons affaiblis par les Vents de Mort lors de leur prochaine venue. Nous devrons les châtier avec force pour punir une transgression aussi sournoise et perfide."
 kheionai.5.a:0 "Les misérables !"

 kheionai.6.t:0 "Un Nouveau Peuple ?"
 kheionai.6.d:0 "Depuis des années maintenant, nous avons perdu les liens avec nos suzerains d'Alecand. Le temps passant, les gens changent, et certains ne nous considèrent plus comme semblables à nos cousins qui n'ont jamais quitté l'île."
 kheionai.6.a:0 "Nous ne sommes plus Alecandi !"
 kheionai.6.b:0 "Nous sommes toujours du sang d'Alecand !"

 kheionai.7.t:0 "Dégâts Temporaires aux Protections Levés"
 kheionai.7.d:0 "Événement auxiliaire"
 kheionai.7.a:0 "Entendu."

 kheionai.8.t:0 "Le Calme Après la Tempête"
 kheionai.8.d:0 "Après de nombreuses années, les Vents de Mort se sont apaisés, les grands vents changeant de direction pour ne plus porter que l'odeur du sel marin et l'air des montagnes dans la brise. Une semaine de réjouissances règne dans les khéions, des gens de toutes conditions célébrant une épreuve de plus surmontée. Lentement, les habitants commencent à s'écouler hors des cités : retournant aux fermes et aux champs éloignés pour reconstruire, embarquant comme émissaires, pêcheurs ou marchands, ou même errant simplement pour le plaisir de quitter les confins où ils ont été si longtemps prisonniers. La vie reprend son cours normal, aussi normal qu'elle puisse l'être sur Alecand, pour un temps, et nous ferions bien de saisir cette opportunité pour regarder à nouveau au-delà de nos frontières."
 kheionai.8.a:0 "Le Vent de Mort est terminé."

 kheionai.9.t:0 "La Tempête"
 kheionai.9.d:0 "Comme toujours, elle s'est abattue lentement sur la terre, les vents tournant pour souffler du nord-est. Les premiers vents emportaient de petites particules bleues, à peine un murmure de mort pour l'œil non averti. Mais ces premières particules furent bientôt suivies de vents toujours plus intenses charriant la mort azurée, les sables empoisonnés flétrissant le sol et répandant la maladie partout où ils tombent, l'air lui-même devenant un héraut du cancer et de la contagion. Les jours terribles sont revenus sur Alecand, ces vents de mort prêts à purger la terre et à voler la vie de quiconque n'est pas abrité derrière les Brise-Vents. Les cités débordent de réfugiés, les greniers sont remplis à ras bord et sévèrement rationnés tandis que nous attendons que passe le courroux du Kaydhano."
 kheionai.9.a:0 "Le Vent de Mort est là."

 kheionai.12.t: "Dérive Culturelle au Devand"
 kheionai.12.d: "En colonisant l'intérieur du Devand, les colons se sont éloignés de leurs cités mères, développant de nouvelles traditions et coutumes distinctes de celles d'Alecand. Ces peuples s'identifient désormais plus fortement à leur nékhei qu'à la cité mère qui les gouverne peut-être. Désormais, cette distinction signifie que les Khéionaï du Devand ne peuvent plus être appelés comme ils l'étaient auparavant."
 kheionai.12.a: "Nous forgeons désormais notre propre voie !"

 kheionai.14.t: "Dérive Culturelle au Devand"
 kheionai.14.d: "En colonisant l'intérieur du Devand, les colons se sont éloignés de leurs cités mères, développant de nouvelles traditions et coutumes distinctes de celles d'Alecand. Ces peuples s'identifient désormais plus fortement à leur nékhei qu'à la cité mère qui les gouverne peut-être. Désormais, cette distinction signifie que les Khéionaï du Devand ne peuvent plus être appelés comme ils l'étaient auparavant."
 kheionai.14.a: "Tant qu'ils continuent de plier le genou"

 kheionai.16.t: "Croissance de nos Nékheis"
 kheionai.16.d: "Grâce à la croissance régulière de nos nékheis, nous sommes désormais en mesure de tirer davantage de commerce d'eux et du continent pour notre bénéfice."
 kheionai.16.a: "Espérons qu'ils ne se fassent pas d'idées"

 kheionai.17.t: "Croissance de notre Pays"
 kheionai.17.d: "Grâce à notre croissance régulière, nous pouvons désormais consacrer davantage de ressources à nos efforts de colonisation, tandis que notre suzerain alecandi récolte davantage de bénéfices pour son commerce."
 kheionai.17.a: "Peut-être est-il temps de forger notre propre voie..."

 kheionai.18.t: "Un Nouveau Sujet"
 kheionai.18.desc: "Au cours de notre expansion, nous avons réussi à prendre le contrôle d'un pays. Qu'en faire ?"
 kheionai.18.a: "Proclamons-les notre vassal"
 kheionai.18.b: "Laissons-leur une part de leur autonomie"
 kheionai.18.c: "Libérons-les, ils n'en valent pas la peine"
 kheionai.18.dd: "Intégrons-les à nos autres Nékheis"

 kheionai.19.t: "[From.GetName] Demande le Droit de Guerre"
 kheionai.19.d: "Aujourd'hui, notre [Root.Monarch.GetTitle] a reçu une lettre de [From.GetName] demandant le droit d'entrer en guerre. Si cela favoriserait notre colonisation du continent, cela nuira également à notre commerce jusqu'à la fin de la guerre, et s'ils deviennent trop puissants, ils pourraient commencer à songer à l'indépendance."
 kheionai.19.a: "Accorder le Droit de Guerre"
 kheionai.19.b: "Refuser la Demande"

 kheionai.20.t: "Droit de Guerre Accordé"
 kheionai.20.d: "Notre diplomate nous revient avec d'excellentes nouvelles : [From.GetName] a accepté notre demande de droit de guerre ! Nous pouvons désormais déclarer une guerre dans les cinq prochaines années."
 kheionai.20.a: "Préparez les troupes !"

 kheionai.21.t: "Droit de Guerre Refusé"
 kheionai.21.d: "Notre diplomate nous revient avec de mauvaises nouvelles : [From.GetName] a refusé notre demande de droit de guerre !"
 kheionai.21.a: "Peut-être devrions-nous suivre notre propre voie"

################################ ÉVÉNEMENTS D'AMBIANCE KHÉIONAÏ ###################################

 # events

 kheionai_flavour.1.t:0 "Les Chiens d'Askóvoinos"
 kheionai_flavour.1.d:0 "Bien que la richesse de Kimánis provienne depuis longtemps de sa soie plutôt que de son vin, la cité conserve un fier héritage viticole : chaque année, lorsqu'un nouveau millésime est apporté au Khéion, les Kimabhen tiennent le « Festival d'Askóvoinos », une grande célébration avec force théâtre, festins et, naturellement, consommation de vin d'Askóvoinos dilué, selon la coutume khéionaï. Mais depuis aussi longtemps que les Kimabhen boivent du vin dilué, des rumeurs salaces circulent sur des cultes souterrains qui s'adonnent à la boisson à pleine puissance et en grande quantité. Ce ne sont que des rumeurs, bien sûr, mais ils semblent être les coupables les plus évidents de ce qui vient de se passer.\n\nLe festival avait commencé normalement, les tables de banquet, disposées à travers la cité, pleines de citoyens kimabhen, savourant avec empressement la viande et le vin distribués si généreusement. Mais la boisson était plus forte que d'habitude : ce n'est qu'après que la majeure partie de la populace kimabhen fut bien éméchée qu'on réalisa que quelqu'un avait remplacé le vin dilué par du vin pur. La populace kimabhen a l'habitude d'être ballottée par des démagogues populistes et nativistes ; ivre, elle peut être entraînée vers n'importe quel extrême. Quand les premiers cris de grief contre [Root.GetName] commencèrent à résonner dans la cité, le sort de la garnison fut scellé. Les Chiens d'Askóvoinos furent lâchés, et Kimánis s'abandonna à la folie.\n\nLes Kimabhen ont, littéralement, mis nos troupes en pièces dans les rues. Maintenant, même tandis qu'ils se remettent de ce qui doit être la mère de toutes les gueules de bois, ils ont déjà fait des plans pour l'indépendance, s'emparant de l'armurerie de la cité et équipant chaque citoyen volontaire qu'ils peuvent trouver. La Révolte de Kimánis a commencé : nous devons désormais reconquérir notre territoire égaré !"
 kheionai_flavour.1.a:0 "Écrasez ces parvenus ivrognes !"
 kheionai_flavour.1.b:0 "La liberté kimabhen ne sera pas écrasée !"

 kheionai_flavour.2.t: "Kimánis Appelle à l'Aide"
 kheionai_flavour.2.d: "Les Chiens d'Askóvoinos courent enragés dans les rues de la cité de la soie, tandis que les Kimabhen rejettent leurs oppresseurs ! Mais la marée tourne déjà contre eux. Kimánis appelle à l'aide..."
 kheionai_flavour.2.a: "Et ce Khéion répondra !"
 kheionai_flavour.2.b: "Mais où était Kimánis quand Empkeios est tombée ?"

 kheionai_flavour.3.t:0 "Des Khéionaï Laissés pour Compte"
 kheionai_flavour.3.d:0 "Quand le Kaydhano s'agite, les îles d'Anisídhan sont les premières à le remarquer : l'arrivée d'une flotte de navires transportant la population d'Anisídhan à Arpedifér annonce une vague d'activité à travers Alecand, tandis que les Khéionaï se préparent à endurer ce qui briserait la plupart des autres sociétés. Parfois, Anisídhan le remarque trop tard, et leur fuite précipitée laisse aux habitants d'Alecand moins de temps pour atteindre les Khéions. Si nos pronostiqueurs échouent également à prédire le Kaydhano par d'autres moyens, les résultats peuvent être désastreux.\n\nMalheureusement, ce pire scénario s'est réalisé. Notre peuple s'est précipité vers la sécurité de [Root.Capital.GetName], mais il semble que tous n'arriveront pas à temps. L'un des tabous les plus forts de la culture khéionaï est de refuser l'abri à quelqu'un durant un Kaydhano, mais il n'y a pas si longtemps, durant la Révolte des Esclaves, la cité de Kimánis fut dévastée lorsqu'une petite brèche dans la protection de la cité permit au Kaydhano de fouetter les rues en contrebas. Des dizaines de milliers moururent : assurément, nous ne pouvons risquer une telle chose à nouveau ?\n\nLa nouvelle qu'un long convoi de gens venus des confins de notre territoire se précipite vers nos portes, prédit pour arriver juste au moment où le Kaydhano arrivera aussi, a remis cette question au premier plan. Notre décision pourrait avoir de graves conséquences..."
 kheionai_flavour.3.a: "Laissez-les entrer, vite !"
 kheionai_flavour.3.b: "Nous ne pouvons risquer d'ouvrir la protection."

 kheionai_flavour.4.t: "Cela en Valait-il la Peine ?"
 kheionai_flavour.4.d:0 "Les suites d'un Kaydhano sont devenues routinières pour les Khéionaï. Attendre que la létalité du sable du Kaydhano diminue, envoyer des ouvriers protégés par abjuration si cela ne suffit pas, dégager les routes menant hors du Khéion, puis ramener ceux qui étaient venus d'ailleurs chez eux, aussi vite et efficacement que possible.\n\nIls ont trouvé les corps lors de cette deuxième étape, quand un groupe de déblayeurs de sable est tombé sur une grotte qu'ils avaient revendiquée comme abri. Alors que le mur de mort approchait dangereusement, ils avaient été refoulés, le convoi de gens et les biens qu'ils apportaient jugés trop importants à traiter à temps. Bien qu'ils aient cherché refuge sous terre, ils avaient déjà été exposés aux vents trop longtemps.\n\nLa nouvelle s'est répandue rapidement parmi notre peuple, et ils ne sont pas contents. Partout, les gens parlent des mères mourant avec leurs enfants dans les bras, des enfants de [Root.Capital.GetName] abandonnés par leur État, et ils disent que c'est notre erreur de jugement qui les a tués. Déjà, la foule exige la chute de notre gouvernement, assiégeant l'Oúraskheion de notre capitale. Si nous ne matons pas cette révolution bientôt, ils pourraient obtenir ce qu'ils veulent."
 kheionai_flavour.4.a: "Nous avons fait ce que nous pouvions."

 kheionai_flavour.5.t:0 "Un Débatteur Importun"
 kheionai_flavour.5.d:0 "Les Khéionaï adorent un bon débat : c'est d'ailleurs l'un des fondements de leur culture, le creuset dans lequel la philosophie est forgée. C'est juste qu'ils aiment généralement débattre au symposium, autour de quelques coupes de vin, dans les halls des écoles philosophiques, ou dans la chambre de l'assemblée. La plupart n'aiment pas débattre quand ils essaient d'acheter ou de vendre au marché, quand ils tentent de se détendre aux bains, quand ils vaquent à leurs occupations quotidiennes et affaires publiques. Personne, absolument personne, n'aime débattre des questions fondamentales de la vie en étant assis aux latrines publiques.\n\nUn philosophe, cependant, n'a pas reçu ce mémo. À un moment vous flânez pour récupérer des papiers chez votre associé en affaires, l'instant d'après vous êtes pris en embuscade avec des questions sur la nature de la vie et de la mort, sur le rôle de la magie dans la société, ou sur « si l'on peut appeler un poulet un elfe ». Certains membres de notre gouvernement font des crises de nerfs : nulle part dans le Khéion n'est sûr ! Et pour aggraver les choses, il a réussi à rassembler une cohorte de gens qui l'apprécient vraiment ! Si nous mettons fin à cette folie, certains appelleront cela une « atteinte à la liberté de débat ». D'un autre côté, cela rendrait le fait de vaquer à ses affaires, de quelque nature qu'elles soient, beaucoup moins agaçant."
 kheionai_flavour.5.a:0 "Arrêtez-le immédiatement !"
 kheionai_flavour.5.b:0 "Nous n'avons pas le droit d'intervenir."
 kheionai_flavour.5.c:0 "Invitons-le au gouvernement !"

 kheionai_flavour.6.t:0 "Manières Conflictuelles de Gouverner"
 kheionai_flavour.6.d:0 "Pour les Khéionaï, les écoles philosophiques, des enseignements organisés sur la façon de voir le monde et d'y agir, sont le socle de la société, du gouvernement et de la culture. Chaque Khéion a été façonné par les philosophies auxquelles adhèrent ses citoyens, ce qui signifie que l'interaction entre différentes cités est analogue à l'interaction de différentes philosophies. Normalement, ces différences peuvent être surmontées par le débat, le consensus et la concession, mais, comme c'est courant chez les philosophes, il peut y avoir une tendance à retrancher ses propres valeurs face à l'opposition.\n\nCela s'est récemment produit dans les relations de notre Khéion avec nos sujets, et malheureusement, il semble que nous soyons à blâmer. Les croyances inébranlables de notre Kylakas et de ses conseillers sur la façon dont le gouvernement et la gouvernance devraient fonctionner ont abouti à une impasse totale, une grande partie de la direction locale de nos sujets refusant désormais de travailler avec nous, croyant que puisque nous ne cédons jamais, ils ne devraient pas non plus.\n\nIl ne semble y avoir que deux options : soit nous battons enfin en retraite de notre position, soit nous utilisons la force pour imposer notre volonté aux cités."
 kheionai_flavour.6.a:0 "Battons en retraite de notre position pour apaiser les cités."
 kheionai_flavour.6.b:0 "Nous leur ouvrirons les yeux nous-mêmes !"
 kheionai_flavour.6.c:0 "La démission de notre Kylakas les apaisera."

 kheionai_flavour.7.t: "Dans les Rues et les Halls"
 kheionai_flavour.7.d: "Il y a quelques jours, une simple bagarre entre un groupe de Taychendi et des marchands [Root.Culture.GetName] s'est transformée en un combat de rue sanglant, qui a vu les Taychendi tués ou grièvement blessés par les mains d'une populace superstitieuse. Cette affaire a non seulement attiré l'attention des autorités de notre cité, mais aussi celle des philosophes de nos pays.\n\nMême maintenant, des cris se font entendre dans toute la cité, alors que des Philosophes de multiples écoles et académies débattent de cette violence récente. Beaucoup d'arguments diffèrent d'une école à l'autre, mais un groupe d'Archatiradiens, une école de Lokemeion connue pour ses grands efforts à documenter et comprendre les manières des peuples barbhen, est outré. Ils disent que la violence n'est pas la manière de contester les Taychendi et autres peuples étrangers, et qu'il faut plutôt les engager dans un débat raisonné pour leur montrer l'erreur de leurs voies.\n\nIls exigent que notre gouvernement punisse la populace ayant causé la mort de plusieurs Taychendi et présente des excuses."
 kheionai_flavour.7.a: "Présentons des excuses et punissons les coupables"
 kheionai_flavour.7.b: "Ne faites jamais confiance à un Taychendi !"
 kheionai_flavour.7.c: "Nous ne pouvons punir notre peuple, nous devons trouver un compromis"

 kheionai_flavour.8.t: "Étranges pensées d'un homme étrange"
 kheionai_flavour.8.d: "Bien que connu pour son leadership, un ancien Kylakas a fini par vivre dans un tonneau. Cette vue a poussé beaucoup à questionner l'état de notre cité, mais il s'est avéré qu'il avait choisi de vivre dans ce tonneau. De nos jours, il est connu pour prêcher ouvertement sa façon de penser ; il se dit « Ulótholiste », en référence à un philosophe vieux de plusieurs siècles nommé « Ulóthopholes » dont l'œuvre est encore étudiée aujourd'hui.\n\nL'homme vivant dans un tonneau croit que pour vivre une vie pleinement bonne et honnête, on doit rejeter le matériel et vivre une vie dépourvue de possessions matérielles. Bien que grossier et offensant, cet homme pourrait s'avérer un atout pour l'État et apporter avec lui beaucoup d'expérience. Le problème est cependant qu'il n'acceptera pas d'emploi ; nous devrons donc envoyer des conseillers et des bureaucrates pour « simplement lui poser des questions »."
 kheionai_flavour.8.a: "Cette maîtrise de la Philosophie ne sera pas gaspillée !"

 kheionai_flavour.9.t: "Parvenu Ormabhen"
 kheionai_flavour.9.d: "Une université à Ormam, connue pour son expertise dans l'étude du commerce et de l'économie, a vu une classe particulièrement talentueuse se faire un nom en employant de nouvelles stratégies en commerce et économie. Bien que leurs stratégies peu orthodoxes les aient rendus impopulaires auprès de nombreux marchands traditionnels."
 kheionai_flavour.9.a: "Faisons-leur passer un test et engageons leur meilleur étudiant"
 kheionai_flavour.9.b: "Laissons la classe suivre son cours, ils ont déjà assez de travail"

 kheionai_flavour.10.t: "Un mode de vie particulier"
 kheionai_flavour.10.d: "Les gens dans nos cités semblent apprécier une vie plus libre, libre de possessions matérielles, s'entend. Ils suivent l'Ulótholisme, bien que beaucoup ne se soucient pas de l'idée philosophique originale d'Ulóthopholes et apprécient simplement ce qu'ils considèrent comme une vie libre.\n\nQuand on les interroge, beaucoup de ces gens ne se laissent décourager par aucun argument et continuent simplement leur journée. Certains ont aussi été vus marchant à travers la nature complètement nus, bien que ces cas soient rares, cela pourrait donner une mauvaise image de l'État si nous continuons à permettre ce genre de comportement."
 kheionai_flavour.10.a: "Notre peuple devrait pouvoir vivre sa vie comme il l'entend"
 kheionai_flavour.10.b: "Cela confine à la débauche, mettez-y fin !"

 kheionai_flavour.11.t: "Les Scéposmatistes Questionnent le Suffrage"
 kheionai_flavour.11.d: "Le Scéposmatisme, une école née à Lokemeion, a longtemps été à l'avant-garde pour questionner les idéaux préexistants et les tabous de notre société et critiquer ouvertement les idées philosophiques considérées comme standards dans notre société. Bien que beaucoup ne les voient que comme des nuisances publiques, un domaine où leurs opinions suscitent le plus de troubles est leur vision des droits politiques des minorités, en particulier les femmes et les non-citoyens.\n\nRécemment, les Scéposmatistes de votre capitale ont fait pression pour l'extension de certains droits politiques à ces personnes, bien qu'un tel acte serait certainement extrêmement déstabilisant."
 kheionai_flavour.11.a: "C'est une offense à nos valeurs, nous n'accepterons pas cela"
 kheionai_flavour.11.b: "Les femmes ont été opprimées assez longtemps dans notre société, cela doit cesser"

 kheionai_flavour.12.t: "Muístaxia"
 kheionai_flavour.12.d: "Muístaxia, une femme très versée dans les domaines de la Philosophie, a connu un grand succès en étudiant à l'école Scéposmatiste de Lokemeion. Elle incarne pleinement les idéaux scéposmatistes et débat ouvertement avec les gens, tout en commentant de nombreuses questions politiques, principalement celles concernant les droits des femmes et des minorités."
 kheionai_flavour.12.a: "Son talent exceptionnel pour le débat nous sera utile"
 kheionai_flavour.12.b: "Elle se surestime, nous n'avons pas besoin d'une autre grande bouche dans notre gouvernement"

 #flavor events by valera
 kheionai_flavour.15.t: "Briser les Murs"
 kheionai_flavour.15.d: "Au cours des derniers mois, il est devenu de plus en plus évident qu'une femme d'immense talent et d'ambition issue d'une de nos familles inférieures les plus prestigieuses se fait un nom. Elle a inspiré son propre mouvement dans notre scène politique, avec des partisans se ralliant à elle pour avoir brisé des murs dans les parties les plus enracinées de la société. Son statut même incarne les valeurs que nous avons vues reflétées dans la pensée maédéritique, une idée que beaucoup ne peuvent ignorer, malgré le fait qu'elle attire l'ire de ses supérieurs patriarcaux. Une option se présente cependant pour soutenir son mouvement au sein de notre administration. L'accueillir à notre cour pourrait être un atout en termes d'introduction de nouvelles perspectives, mais cela pourrait sérieusement mécontenter les éléments plus traditionnels de notre cité."
 kheionai_flavour.15.a: "Nous ne pouvons pas simplement ignorer un tel talent !"
 kheionai_flavour.15.b: "Elle semble se débrouiller très bien toute seule."
 kheionai_flavour.15.c: "Son message résonne avec la philosophie maédéritique ; elle nous aidera à la pratiquer."

 kheionai_flavour.16.t: "Politeia"
 kheionai_flavour.16.d: "Une question qui a commencé comme un simple débat philosophique entre deux elfes respectés a commencé à prendre vie. Le débat a balayé toute notre société et capturé les esprits de nos érudits les plus prestigieux. L'ampleur d'une telle enquête philosophique sera sûrement mémorable pendant des siècles. Bien qu'il y ait une richesse de discours menés en haut et en bas, une facette du débat s'est déroulée dans nos propres halls de gouvernement. Divers philosophes tentent de courtiser la faveur de notre administration, dont ils recherchent le prestige et le patronage. Alors que la foule frémit de ferveur philosophique, sûrement un orateur se distingue-t-il parmi les autres ?"
 kheionai_flavour.16.a: "Un philosophe maédéritique a réussi à convaincre la foule."
 kheionai_flavour.16.b: "Un adepte d'Isparokaeus a réussi à convaincre la foule."
 kheionai_flavour.16.c: "Un philosophe axiérophonique a réussi à convaincre la foule."
 kheionai_flavour.16.dd: "Nous avons tous quelque chose à apprendre du débat d'aujourd'hui."

 kheionai_flavour.17.t: "Nourrir les Affamés"
 kheionai_flavour.17.d: "Suite au récent Vent de Mort, on a découvert que des portions significatives de nos champs de céréales sont désormais en jachère, la récolte de l'année complètement dévastée par les tempêtes de poussière dévastatrices qui ne se soucient ni des animaux ni des plantes. Bien que nous n'ayons pas encore épuisé nos réserves existantes, il est évident qu'il y aura des pénuries de céréales à moins que nous n'agissions pour nous assurer que le peu qui reste soit conservé pour les gens déjà laissés à se remettre de la dévastation du Vent de Mort. L'option la plus drastique proposée serait d'interdire les exportations de céréales jusqu'à ce que l'approvisionnement soit à nouveau gérable. Cependant, cela affecterait gravement nos intérêts commerciaux pour le moment, nécessitant plusieurs récoltes avant de permettre aux céréales de circuler à nouveau comme avant."
 kheionai_flavour.17.a: "Imposons l'autarcie pour garder des céréales supplémentaires sur nos marchés."
 kheionai_flavour.17.b: "La situation ne justifie pas une telle réponse. Le marché se régulera de lui-même."
 kheionai_flavour.17.c: "Initions des réformes pour garantir les terres des fermiers pour la production céréalière future."
 kheionai_flavour.17.dd: "Adoptons une législation pour aider nos fermiers à étendre leur production céréalière."

 kheionai_flavour.18.t: "Changements dans la Guerre"
 kheionai_flavour.18.d: "Avec un crépitement tonitruant et une fumée montante, les armes à feu atteignent leurs cibles prévues à plusieurs champs de distance. Les officiers échangent des regards puis se tournent vers les marchands cannoriens debout derrière eux, les bras croisés avec un sourire. L'un d'eux parle, et notre traducteur intervient. « Impressionnant, n'est-ce pas ? C'est exactement comme annoncé. La mort à distance. Sûrement voyez-vous les avantages d'une telle arme ? » Les officiers échangent à nouveau des regards et se tournent vers nos fonctionnaires de la cour. Une telle arme serait en effet dévastatrice sur le champ de bataille, capable de faucher les ennemis plus vite qu'ils ne peuvent réagir. Cependant, cela soulève la question de ce qui se passe quand nos soldats doivent affronter ces armes à feu, les balles déchirant les nôtres. Alors que les marchands retournent à leurs navires, notre direction doit décider comment s'adapter à ce qui est indéniablement l'avenir de la guerre."
 kheionai_flavour.18.a: "Faisons en sorte que nos formations existantes reçoivent une division d'artillerie."
 kheionai_flavour.18.b: "Convoquez les mages ; nous devons nous armer contre ces armes."
 kheionai_flavour.18.c: "La mort à distance en effet ! Faites équiper toute l'armée immédiatement."

 kheionai_flavour.19.t: "Magie Sauvage, Sauvage Magie"
 kheionai_flavour.19.d: "L'un de nos marchands les plus audacieux est revenu après avoir bravé les eaux au large de la Mer Kaydhano pour faire des affaires en Amadie, une terre que nos érudits n'ont pas documentée depuis un certain temps. Avec une cargaison considérable, le marchand est accompagné d'un groupe de grands elfes à la peau pâle ornés de cicatrices particulières. Ce sont manifestement des Amadiens, maîtres de la magie sauvage. Ce qui était autrefois l'objet d'histoires de marins se tient maintenant aux portes de notre cité avec notre capitaine khéionaï. Il refuse d'accoster ailleurs ou d'abandonner son équipage, affirmant qu'ils sont les meilleurs marins qu'il ait jamais eus. Alors que beaucoup de nos citoyens paniquent, se rappelant les anciens récits sur la magie sauvage et ce qu'elle pourrait causer aux Brise-Vents, d'autres admirent la ténacité du capitaine, disant qu'il serait incivilisé de lui refuser l'hospitalité, à lui et à son équipage."
 kheionai_flavour.19.a: "Le risque est trop grand pour l'infrastructure de notre Khéion. Qu'ils s'en aillent."
 kheionai_flavour.19.b: "Nous ne pouvons pas refuser le capitaine et ses marchandises. Nous surveillerons les Amadiens."
 kheionai_flavour.19.c: "Une excellente opportunité d'étudier la culture et les coutumes amadiennes !"

 kheionai_flavour.20.t: "Une Question d'Amour"
 kheionai_flavour.20.d: "Un scandale a secoué la cour de $COUNTRY$. Un dirigeant politique éminent issu de l'une de nos maisons nobles a été démasqué pour une liaison amoureuse prolongée après des décennies d'un mariage apparemment heureux. Les histoires circulent déjà dans les rues, avec des rumeurs sur tout, de la vie personnelle du noble à l'implication de notre propre administration dans l'affaire. Les standards moraux mêmes de notre Kheinsí sont maintenant soumis à un examen public qui n'a pas été vu depuis un certain temps, et des gens de toutes les couches de la société réclament que notre Kylakas intervienne personnellement et rende jugement sur l'affaire. Bien que ce soit l'un de nos nobles, les répercussions du tabou même et de son statut pourraient s'avérer accablantes."
 kheionai_flavour.20.a: "Infligeons une lourde amende au malheureux amant."
 kheionai_flavour.20.b: "Aider ce politicien améliorera notre position parmi la noblesse."
 kheionai_flavour.20.c: "Peut-être pourrions-nous trouver un compromis qui satisfasse les deux parties ?"

 kheionai_flavour.21.t: "Trop Près pour être Confortable"
 kheionai_flavour.21.d: "Alors que l'arpentage régulier est effectué dans les centres urbains entourant notre Brise-Vent, il est devenu apparent qu'il y a un problème de surpopulation. Les gens vivent dans des espaces qui ne peuvent tout simplement pas répondre correctement à leurs besoins, tout cela pour vivre à proximité de l'abri le plus fiable. Bien que des rénovations puissent être entreprises pour accueillir ces citoyens dans le Brise-Vent, cela nécessiterait des expulsions dans des portions existantes du Khéion pour les reconstruire correctement, ce qui mécontenterait certainement ceux qui sont déjà à l'intérieur des murs. Quoi qu'il en soit, notre politique doit être décidée pour ces citoyens afin de les protéger du prochain Vent de Mort, à l'intérieur ou à l'extérieur de la cité."
 kheionai_flavour.21.a: "Des plans de rénovation s'imposent clairement."
 kheionai_flavour.21.b: "Les réfugiés des campagnes devront s'accommoder des rues."
 kheionai_flavour.21.c: "Notre Khéion ne peut accueillir ces réfugiés. Nous construirons de nouveaux abris."
 kheionai_flavour.21.dd: "Nous devons élaborer un plan parfait pour satisfaire tout le monde !"

 kheionai_flavour.22.t: "Protéger leur Foi"
 kheionai_flavour.22.d: "Suite à notre récente subjugation des Eltibhen voisins, la milice locale a rapporté qu'un passage près du Meteí ferait un abri idéal contre les Vents de Mort. La milice a marché de manière préventive dans le col, construisant les débuts d'abris pour une utilisation future. Le chef eltibhen local, cependant, était outré quand il est arrivé pour trouver une partie de la route de pèlerinage sacrée vers le Meteí bloquée par ces orientaux. Aujourd'hui, le chef lui-même est arrivé furieux aux portes de notre Khéion. Il supplie notre administration d'ordonner à la milice de quitter le col pour respecter leurs coutumes en tant que sujets légitimes, en appelant à notre foi en la raison. Nous devons répondre rapidement, de peur que les tensions n'escaladent."
 kheionai_flavour.22.a: "Ne comprennent-ils pas qu'ils pourront utiliser cet abri aussi ?"
 kheionai_flavour.22.b: "Il serait éthiquement correct de respecter les croyances locales pour le moment."
 kheionai_flavour.22.c: "S'ils n'aiment pas notre milice, ils sont les bienvenus à déménager ailleurs."

 kheionai_flavour.23.t: "Servir ou Protéger ?"
 kheionai_flavour.23.d: "On dit de la fonction de Kylakas que celui qui possède une armée puissante est capable de protéger à la fois son khéion et ses nékheis. Une telle philosophie a été mise à l'épreuve par une proposition récente dans notre politique gouvernementale. Certains de nos membres du conseil soutiennent que nous devrions négliger de financer l'armée de nos nékheis en faveur de nos levées sur Alecand. Les membres alignés avec les nékheis, cependant, ont vivement protesté contre une telle proposition. Ils soutiennent que pour maintenir et étendre notre présence au Devand, il est prudent d'envoyer un financement et des ressources supplémentaires aux nékheis immédiatement. D'une manière ou d'une autre, l'une de ces factions pourrait repartir mécontente."
 kheionai_flavour.23.a: "Nous devons investir plus de ressources dans notre présence sur Alecand."
 kheionai_flavour.23.b: "Nous écouterons les nékheis et financerons leurs efforts d'expansion."
 kheionai_flavour.23.c: "Rappelons aux nékheis que la défense du royaume est, sans aucun doute, un effort conjoint."

 kheionai_flavour.24.t: "La Légende des Sept Mers"
 kheionai_flavour.24.d: "Un capitaine d'une flotte marchande ambitieuse est revenu après quelques années, apportant avec lui des récits d'une terre lointaine enregistrée comme « Haraf ». Il décrit des aventures qui semblent presque fantastiques, de l'évasion de vers titanesques qui creusent à travers les sables à la défense de son équipage contre des elfes tordus qui sculptent leur peau en œuvres d'art macabres. Il porte également avec lui un masque orné qu'il prétend être imprégné des esprits de guerriers tombés et parle d'un rituel qui lui permet de communier avec ses ancêtres de siècles passés à travers les courants d'eau eux-mêmes. Beaucoup de notre peuple trouvent ses histoires incroyables, mais quoi qu'il en soit, il a décidé de donner une partie de la richesse acquise pendant ce voyage sauvage."
 kheionai_flavour.24.a: "Peu importent ses histoires, son don est certainement le bienvenu."
 kheionai_flavour.24.b: "Nous pourrions utiliser un gredin comme lui."
 kheionai_flavour.24.c: "Vous savez quoi ? Ses histoires ne sont pas mal pour un corsaire. Officialisons cette histoire."

 kheionai_flavour.25.t: "Philosophes Inaptes"
 kheionai_flavour.25.d: "Alors qu'un nouveau jour se lève, les écoles qui travaillent si diligemment à cultiver les meilleurs esprits de notre royaume ouvrent une fois de plus. Étudiants et publics se pressent pour regarder nos philosophes débattre et faire des discours. Pour les observateurs extérieurs, cependant, il est apparent que les foules ont diminué ces derniers mois. Même ceux qui regardent ne semblent pas le moins du monde captivés par ce que nos philosophes jadis vénérés ont à dire, et les étudiants se présentent en nombres moindres à chaque session. Il devient de plus en plus évident que même les masses croient que des temps sombres sont sur notre peuple, les fondements mêmes de notre culture en déclin."
 kheionai_flavour.25.a: "C'est la vérité. Notre culture a connu des temps meilleurs."
 kheionai_flavour.25.b: "Tout historien saurait que de telles petites affaires affligent chaque État à travers le temps."

 kheionai_flavour.26.t: "Akratos"
 kheionai_flavour.26.d: "Une tradition du khéion de Kimánis, le festival annuel semble avoir échappé à tout contrôle cette fois-ci. Le commandant de milice local que nous avions nommé a été vu boire tant de vin de Kimánis qu'il a conduit son char à travers une école locale à plusieurs reprises. Pire encore, la milice elle-même a aussi pris l'excuse pour se saouler jusqu'à la stupeur. Devenant plus une foule indisciplinée, on les aurait vus utiliser des fenêtres comme cibles d'entraînement, tomber de hauteurs dangereuses et harceler les marchands locaux. Certains Kimabhen ont déclaré que c'est un complot de notre administration pour ruiner leur cité, mais il est difficile de s'adresser aux locaux. Eux aussi sont ivres du même vin du festival, faisant du peuple une foule similairement ivre. À moins que nous n'intervenions d'une manière ou d'une autre, Kimánis sera bientôt hors de contrôle."
 kheionai_flavour.26.a: "Arrêtez les milices et les foules ; cessez le chaos par tous les moyens nécessaires."
 kheionai_flavour.26.b: "Nous ne devons pas provoquer davantage les Kimabhen."

 kheionai_flavour.27.t: "Nékheis Indisciplinés"
 kheionai_flavour.27.d: "Encore un messager est arrivé aujourd'hui de nos Nékheis, livrant un refus ferme de nos récentes décisions politiques. C'est encore un incident dans une longue série de refus par nos gouverneurs subordonnés de coopérer avec l'administration du Khéion lui-même. Même quand ils acquiescent à nos demandes, elles sont exécutées d'une manière qui ressemble presque à du sabotage pour nos administrateurs. Plus souvent qu'autrement, cependant, la résistance est si obstructive qu'elle empêche tout progrès significatif. Il est devenu apparent pour les deux administrations que nous manquons simplement de beaucoup des liens qui autrefois poussaient nos Nékheis à prospérer sous notre règne."
 kheionai_flavour.27.a: "C'est regrettable, mais indéniable."
 kheionai_flavour.27.b: "Nous devons juste trouver la bonne approche avec eux."

 kheionai_flavour.28.t: "L'Homme qui Acheta le Monde"
 kheionai_flavour.28.d: "Un rapport troublant est posé sur la table du Kylakas. Un aristocrate local et puissant est rapidement en passe de devenir l'homme le plus riche du monde connu. Parallèlement à sa richesse, il a commencé à exercer son influence sur la politique de notre Kheinsí. Il rallie le soutien du peuple, plaidant pour un exécutif plus puissant, impliquant même qu'il pourrait lui-même se présenter au poste de Kylakas pour y arriver ! Cet homme pourrait être celui qui met notre Kheinsí à genoux avec la terrible peste de la tyrannie. Nous pourrions enquêter sur les agissements de cet homme, mais cela pourrait l'inciter à agir. Devons-nous intervenir pour le bien du Kheinsí ?"
 kheionai_flavour.28.a: "Sûrement qu'un seul homme ne peut corrompre toute notre république ?"
 kheionai_flavour.28.b: "Ordonnez qu'un espion soit envoyé à son domaine ; nous devons connaître ses intentions !"

 kheionai_flavour.29.t: "Résultats de l'Enquête"
 kheionai_flavour.29.d: "Le messager court désespérément dans la salle du conseil du Kheinsí, agitant les bras et apportant des nouvelles du domaine du tyran potentiel. Il s'effondre à genoux, essoufflé par la course. Son message résonne à travers la chambre. Nos espions envoyés pour infiltrer la maison de l'homme ont été appréhendés à l'extérieur de sa villa. Le tyran a saisi cette chance pour agir prématurément, déclarant que ses droits civils ont été violés par notre régime illégitime. Il rassemble maintenant ses partisans à travers le royaume, leur ordonnant de marcher contre nos armées ! Nous devons agir rapidement pour empêcher leur succès, aussi précipité que cela puisse être."
 kheionai_flavour.29.a: "Au moins nous avons forcé leur main. Dispersez cette racaille !"

 kheionai_flavour.30.t: "Grand Festin"
 kheionai_flavour.30.d: "Le messager revient dans notre salle du conseil d'un pas vif, toujours avec un sens du devoir, mais pas même un soupçon de panique concernant la situation avec le tyran potentiel. Les conseillers l'assaillent immédiatement, exigeant une mise à jour sur ce parvenu fortuné. Il commence son message. L'atmosphère de la salle s'éloigne de l'inquiétude tandis qu'il continue. Hier, le tyran organisait un grand banquet avec ses partisans, avant d'avoir l'intention de les faire marcher sur notre Khéion. Ce repas, cependant, s'est avéré être son dernier, car il s'est soudainement plié en deux en s'étouffant sur la cuisse d'un sanglier rôti ! Un tel homme était destiné à être consumé par sa propre avidité !"
 kheionai_flavour.30.a: "Il semble que le destin était de notre côté cette fois !"

 kheionai_flavour.31.t: "Le Tyran Agit !"
 kheionai_flavour.31.d: "Le messager trébuche dans notre salle du conseil, essoufflé d'avoir évité l'armée approchant des portes de la cité. Le conseil est outré, ne sachant même pas qu'une telle armée existait à l'extérieur jusqu'à maintenant. Le messager explique que les communications se sont effondrées à l'extérieur de la capitale. Le tyran a profité de notre ignorance pour amasser une armée de mercenaires, de pirates et de collègues aristocrates pour se rebeller pour le poste de Kylakas ! Nous devons agir rapidement pour mater cette révolte, bien que l'armée soit moindre car ses partisans ont été apaisés par notre clémence. Cela laisse le reste de la population stupéfait par notre incompétence et notre permission pour une telle révolte, questionnant notre légitimité face à de telles actions."
 kheionai_flavour.31.a: "Comment avons-nous pu laisser les choses en arriver là ?"

