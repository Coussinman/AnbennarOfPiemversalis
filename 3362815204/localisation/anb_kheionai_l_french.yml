 kheios_deathwind_manager:0 "Conséquences des Vents de Mort"
 kheionai_first_event_tt:0 "§gAppelées « Brise-Vents », ces protections sont grossièrement classées par niveaux selon la puissance du Vent de Mort qu'elles peuvent raisonnablement supporter.\n\nCertaines actions peuvent augmenter le niveau d'un Brise-Vent, protégeant ainsi une province des Vents de Mort de puissance équivalente. Des vents de niveau supérieur nécessitent des Brise-Vents plus puissants, sans quoi la province et votre peuple en souffriront. Vous pouvez consulter le niveau d'un Brise-Vent et ses effets depuis la province elle-même. Chaque tranche de dix points de développement et chaque fort local offrent un niveau de Brise-Vent, tandis qu'une tour de mage en offre trois et protège les provinces voisines comme un fort.§!\n\n§rPréparez-vous en conséquence.§!\n\n"
 kheionai_deathwind_reminder_tt:0 "§gToute la région d'Alecand sera frappée par les Vents de Mort dans l'année à venir, dévastant les provinces aux Brise-Vents insuffisants.\n\nCertaines actions peuvent augmenter le niveau d'un Brise-Vent, protégeant ainsi une province des Vents de Mort de puissance équivalente. Des vents de niveau supérieur nécessitent des Brise-Vents plus puissants, sans quoi la province et votre peuple en souffriront. Vous pouvez consulter le niveau d'un Brise-Vent et ses effets depuis la province elle-même. Chaque tranche de dix points de développement et chaque fort local offrent un niveau de Brise-Vent, tandis qu'une tour de mage en offre trois et protège les provinces voisines comme un fort.§!\n\n"

