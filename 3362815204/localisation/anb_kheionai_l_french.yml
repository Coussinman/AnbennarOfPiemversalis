#Customizable Localization
 degarikes_taychendi:0 "Bien que nous n'ayons pas toujours été un peuple de marins, même les Thekrystana, qui dépendent de l'eau pour leur richesse, sont mal à l'aise en haute mer, un seul regard sur ces navires suffit pour connaître leur gloire. Imaginez une flotte entière, terrorisant les mers et projetant la puissance taychendi à travers les vagues ! Et avec les secrets des Seigneurs-Esclavagistes sous nos pieds, on se demande jusqu'où ces navires peuvent grandir..."
 degarikes_eltibhari:0 "Bien que nous ayons peut-être atteint la domination sur l'île d'Alecand elle-même, les Khéionaï maintenaient un vaste empire maritime. Avec une étendue infinie d'océan ouvert sur nos côtes, nous n'avons jamais vraiment pu maîtriser le combat naval ; maintenant, si nous voulons étendre davantage le domaine de notre Riei, nous devons le maîtriser. Heureusement, nous pouvons nous tourner vers nos nouveaux territoires pour le faire."

 degarikes_devandi:0 "Les pirates lacustres chendyens du Taras'su Ervan avaient l'habitude d'aborder les navires marchands et de lâcher leurs montures félines sur les marins non préparés. Bien que nous n'ayons peut-être pas les traditions maritimes des Khéionaï, une possibilité distincte se présente en regardant leurs navires titanesques : ils semblent assez grands pour contenir un grand nombre de montures à tout moment, et ils ont certainement l'armure pour plonger dans une flotte ennemie sans être détruits. Peut-être est-il temps de faire connaître aux océans ouverts la terreur qu'un cavalier de jaguar peut apporter ?"
 degarikes_oktikheion:0 "Quand nous avons perdu notre flotte et notre armée au nord du Kaydhano, nous avons été forcés de réduire considérablement notre marine, nos coffres épuisés. Il a fallu des décennies pour que la population de notre cité se rétablisse, et ce n'est qu'après la prise de Kimánis que nous avons pu commencer à préparer notre résurgence navale et commencer à construire plus de Degárikes. Mais plus de 50 ans s'étaient écoulés depuis que l'un de nos ingénieurs avait posé les yeux sur eux ; ce fut un processus long et ardu, même avec les plans détaillés déjà en notre possession. Nous n'avons pas été les premiers à ramener ces navires, mais nous ne serons pas les derniers. Nos ingénieurs ont maintenant fait tous les préparatifs nécessaires, et nous pouvons commencer à reconstruire notre flotte immédiatement."
 degarikes_kheionai:0 "Quand Oktikheion a perdu toute sa flotte et un quart de sa population masculine dans une tombe aquatique, les Degárikes, titanesques en taille et en puissance, mais coûteux à construire et à entretenir, ont failli mourir avec elle. Oktikheion avait longtemps forcé les autres Khéions dans une course aux armements navals à laquelle ils ne voulaient pas participer ; quand le plus grand joueur a été forcé de quitter le jeu, les autres se sont précipités pour voir qui pourrait se retirer le plus vite. Maintenant, avec le monde devenant plus dangereux, le besoin de ces navires titanesques grandit à nouveau. Nous n'avons pas été les premiers à les réintroduire, mais cela ne nous découragera pas : nos ingénieurs ont dépoussiéré d'anciens plans navals, et nous commencerons bientôt la construction."

#Events
 kheionai.30.t:0 "Nouvelles Menaces sur les Mers"
 kheionai.30.d:0 "En 1397, la flotte d'Oktikheion, la plus grande puissance navale du monde khéionaï, a navigué au-delà de l'horizon. Frôlant la faillite en raison de la perte de l'or d'Althungoti, les imposants Degárikes qui avaient brisé l'hégémonie d'Ormam, entourés de dizaines de trirèmes et de navires de transport, ont mis le cap sur l'Amadie, espérant reconquérir les richesses qui avaient autrefois construit leur flotte.\n\n10 ans plus tard, un seul navire est revenu. L'armée expéditionnaire avait été brisée dans les terres sauvages du nord, et la flotte décimée par un Vent de Mort errant. Oktikheion était ruinée, leurs femmes et enfants se lamentant dans les rues pour les maris, pères, frères et fils qui ne reviendraient jamais. Mais dans le reste des Khéions, trésoriers et planificateurs navals ont poussé un soupir de soulagement : la flotte redoutée d'Oktikheion, ses titanesques Degárikes en particulier, reposait au fond de l'océan. Pourquoi, alors, devraient-ils essayer de l'égaler ? Les cités d'Alecand ont réduit leurs dépenses navales, mis leurs Degárikes au repos, la plupart ayant été démontés pour leur bois et leur métal.\n\nMais la marée a encore tourné. Kimánis est tombée. Le Nékhei d'Amgremós, coupé et à la dérive, s'est tourné vers les pirates de la Mer Fendue pour sa protection, qui utilisent maintenant leur port pour s'en prendre aux navires ramenant les richesses du Taychend vers les côtes khéionaï. Et, bien sûr, avec le vert d'Oktikheion flottant au-dessus du Port-de-Soie de Kimánis, les craintes d'une résurgence navale montent, et des murmures abondent sur les ingénieurs oktibhen fouillant leurs archives à la recherche d'anciens plans et schémas. Beaucoup se demandent : peut-être est-il temps de déterrer nos propres plans ?"
 kheionai.30.a:0 "La Mer Fendue n'est pas sûre..."

 kheionai.31.t:0 "Titans des Mers"
 kheionai.31.d:0 "Ardores, l'un des pirates les plus riches de la Mer Fendue, commandant d'une flotte complète de trirèmes et capitaine de l'Effroi du Kraken, fut réveillé de son sommeil par un appel de l'extérieur. Il y eut du remue-ménage alors que le navire commençait à tourner, bien qu'il n'eût ordonné aucune telle manœuvre. Quand Ardores se précipita sur le pont, il vit toute sa flotte aux postes de combat, voiles abaissées et rames sorties. Bientôt, il vit pourquoi : il y avait un seul navire à l'horizon, fonçant vers eux. Il vit un groupe de petits points jaillir de ses ponts et se rapprocher.\n\n« ARTILLERIE ! » cria Ardores, alors qu'il se dirigeait vers la barre. Quelques secondes plus tard, le projectile semblable à un rocher passa en sifflant, manquant son propre navire mais frappant certains des autres sous son commandement. Il regarda les pierres percer les ponts, transformant pirates et marins en ruines sanglantes. Des navires dérivaient tandis que leurs rameurs faiblissaient, et la flotte ralentit, confuse. Même pendant que son artillerie tirait, le vaisseau ennemi gardait son cap, droit vers l'Effroi du Kraken. Un navire contre une flotte, mais ce n'était pas un navire normal. C'était un Degárikes.\n\n« Il va nous éperonner... » réalisa le capitaine-pirate, en pâlissant. Son second le tira par le bras, le suppliant de donner des ordres, mais Ardores fixait simplement sa mort approchante. C'était massif, plus haut que deux trirèmes empilées, et avec un éperon comme un bec de kraken. Une force de la nature pas vue depuis des décennies, depuis le désastre au-delà du Kaydhano. Les marins abandonnèrent le navire alors que le Degárikes approchait, puis fit contact. L'Effroi du Kraken poussa un cri à vous percer les tympans alors que le bois se fendait, puis se brisa. La force du navire qui se démembrait projeta Ardores en arrière. Le Degárikes trancha et continua.\n\nArdores regarda avec incrédulité le Degárikes déchirer sa flotte. L'artillerie à bord continuait de tirer, transformant les navires en fuite en éclats brisés tandis que des archers faisaient pleuvoir des flèches d'en haut sur tout pirate malchanceux encore en vie. Des marines descendaient en rappel des ponts, prêts à récupérer toute cargaison possible des épaves et achever les traînards. Les Degárikes étaient de retour, que tous leurs ennemis se méfient."
 kheionai.31.a:0 "[Root.GetName] régnera sur les vagues !"

 kheionai.32.t:0 "Plans de Degárikes Trouvés"
 kheionai.32.d.b:0 "Les Degárikes des Khéionaï sont des chefs-d'œuvre d'ingénierie navale, des vaisseaux titanesques pouvant accueillir des rangées d'artillerie lourde sur leurs ponts, ainsi qu'un complément massif d'archers et de marines. Redoutés dans le monde entier, ils sont utilisés depuis des siècles, célèbrement employés par Oktikheion pour contester l'hégémonie navale d'Ormam dans les Grandes Guerres Maritimes des Xe et XIe siècles. Bien qu'ils aient connu une période sombre au début du XVe siècle, la perte de la formidable flotte d'Oktikheion lors de la Seconde Expédition Amadienne ayant conduit à leur abandon, les récents conflits en Mer Fendue ont mené à leur renaissance.\n\n[Root.GetDegarikesDesc]\n\nEn termes de construction, des informations précieuses de nos territoires khéionaï conquis ont plus ou moins révélé les secrets de la construction des Degárikes ; bientôt, nos ingénieurs croient qu'ils pourront commencer à construire nos propres vaisseaux. Malheureusement, les Degárikes nécessitent de grands ports spécialisés, et il y a peu de ports hors des terres khéionaï où ils peuvent être construits et amarrés ; si nous voulons étendre notre flotte de Degárikes, nous devons conquérir plus de Chantiers Navals Khéionaï."

 kheionai.32.d.k:0 "[Root.GetDegarikesDesc]\n\nLes Degárikes sont si massifs qu'ils nécessitent des ports et des chantiers navals spécialisés où ils peuvent d'abord être construits, puis amarrés en sécurité une fois terminés. Outre le problème évident de vidanger une cale sèche appropriée pour les réparations et modifications de coque, et quand vous avez affaire à un navire en bois, non protégé, plus long que deux krakens mis bout à bout, il Y AURA des réparations et des modifications, un Degárikos sans abri risque d'être littéralement déchiré s'il est pris dans une tempête. Seul notre peuple a fait ces modifications ; si nous voulons augmenter la taille de notre flotte, nous devrons nous emparer de plus de Chantiers Navals Khéionaï."
 kheionai.32.a:0 "L'avantage maritime des Khéionaï sera brisé !"
 kheionai.32.b:0 "Nous égalerons à nouveau les navires des Seigneurs-Esclavagistes !"
 kheionai.32.c:0 "La liberté ne sera plus limitée à nos côtes !"

