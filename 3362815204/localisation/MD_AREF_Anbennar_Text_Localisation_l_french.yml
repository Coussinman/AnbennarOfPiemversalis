 loc_legend_nb_text_greentide: "----- §YBonus de Nations§! -----\nEmpire d'Anbennar : §G-25 % Expansion Agressive§!\nEborthil : §G+50 % Pouvoir Commercial des Navires§!\n\nCes bonus sont automatiquement appliqués au début de l'ère et automatiquement retirés à la fin de l'ère."
 loc_legend_nb_text_unraveling: "----- §YBonus de Nations§! -----\nElfes : §G+0,5 Prestige, +60 Augmentation Globale de Colons§!\nCorinites : §G+30 % Dégâts de Choc§!\n\nCes bonus sont automatiquement appliqués au début de l'ère et automatiquement retirés à la fin de l'ère."
 loc_legend_nb_text_witchkings: "----- §YBonus de Nations§! -----\nNains : §G+1 Coloniste, +1 Développement Colonial Amélioré§!\n\nCes bonus sont automatiquement appliqués au début de l'ère et automatiquement retirés à la fin de l'ère."
 loc_legend_nb_text_artificers: "----- §YBonus de Nations§! -----\nOrques : §G-25 % Coût de Développement, +50 % Défense des Forts§!\nEmpire d'Anbennar : §G-1 Agitation Nationale, -33 % Dégâts de Feu Reçus§!\n\nCes bonus sont automatiquement appliqués au début de l'ère et automatiquement retirés à la fin de l'ère."

