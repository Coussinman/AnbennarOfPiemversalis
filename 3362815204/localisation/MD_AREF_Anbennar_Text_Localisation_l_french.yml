  # Descriptions des Peintures d'Ères
 pic_age_of_greentide_desc: "La Bataille de Pas-Pourri, 1443\n\nÀ l'été 1443, une bataille sanglante fut décisivement remportée par les Seigneurs des Marches de Cannor, principalement des aventuriers humains, des déserteurs et des vétérans des Guerres Lilas, contre l'avant-garde numériquement supérieure de la Marée Verte. La grande force orque menée par Korgus Jour-Fatal et ses dix commandants fut vaincue après une bataille féroce qui faillit tourner en leur faveur.\n\nL'issue de la bataille fit reculer la Marée Verte, les orques ayant perdu plus de deux fois plus de soldats avec 35 000 victimes contre 15 000 morts parmi les Seigneurs des Marches. Fait notable de la bataille, une jeune écuyère nommée Corin perdit la vie en défendant son seigneur, Frédéric Bennon, pour être ressuscitée par le dieu de la guerre déchu, Agrados, qui la nomma sa championne et avatar, rachetant ainsi son héritage et la faisant le remplacer en tant que nouvelle déesse de la guerre."
 pic_age_of_unraveling_desc: "Torrieth Parleur-aux-Dieux découvre le Fragment Divin\n\nTorrieth Parleur-aux-Dieux, une mage elfe et Haute Rectrice de l'Église Ravélienne, fut une figure majeure de l'expédition qui trouva le Fragment Divin. Elle fut également la première personne capable d'interpréter ses messages."
 pic_age_of_witchkings_desc: "Forteresse du Domaine-Noir\n\nInitialement développée à partir des divagations d'Adelar síl na Whistlehill, la religion du Domaine-Noir commença à prendre racine lorsque ses écrits furent découverts à l'Ère des Rois-Sorciers. Il prêchait contre les dieux des autres religions et cherchait à établir un État magocratique mondial dirigé par des mages mortels et non par des divinités. L'union politique du Domaine-Noir serait dirigée par un puissant Roi-Sorcier avec 8 acolytes sous lui, régnant depuis le Trône de Crâne. Les armées du Domaine-Noir s'appuient sur la nécromancie et les morts ressuscités."
 pic_age_of_artificers_desc: "Cuirassé de la Hiérarchie Gnome\n\nAlors que l'Ère des Rois-Sorciers touche à sa fin, l'ingéniosité et la domination des Gnomes dans les domaines de la technologie et de la magie reprendraient racine à Halann. La combinaison de la technologie et de la magie mènerait à des révolutions technologiques et militaires qui changeraient le monde."


