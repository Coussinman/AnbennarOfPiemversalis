 pasha_removed_modifier:0 "Pacha révoqué"
 desc_pasha_removed_modifier:0 "Le pacha a été révoqué"
 PASHA_MODIFIER:0 "Pacha dans l'État"
 CONFORM_TO_TEMPLATE:1 "§YConformer au modèle§!"
 CONFORM_TO_TEMPLATE_ARMY_DESC:0 "Sélectionnez un modèle d'armée pour conformer cette armée à ce modèle.\nLes régiments ne correspondant pas au modèle seront détachés dans une nouvelle armée et les régiments manquants seront construits, déplacés et fusionnés avec cette armée."
 CONFORM_TO_TEMPLATE_NAVY_DESC:1 "Sélectionnez un modèle de flotte pour conformer cette flotte à ce modèle.\nLes navires ne correspondant pas au modèle seront détachés dans une nouvelle flotte et les navires manquants seront construits, déplacés et fusionnés avec cette flotte."
 NO_CONFORM_TO_TEMPLATE_CONDOTTIERI:0 "§RCette armée ne peut actuellement pas être conformée à aucun modèle.§!\nL'armée est actuellement louée comme condottieri."
 NO_CONFORM_TO_TEMPLATE_PENDING_CONDOTTIERI:0 "§RCette armée ne peut actuellement pas être conformée à aucun modèle.§!\nL'armée est actuellement proposée comme condottieri."
 NO_TEMPLATES_ARMY:0 "§RVous devez d'abord créer un modèle d'armée dans l'onglet Unités terrestres de l'interface de production.§!"
 NO_TEMPLATES_NAVY:0 "§RVous devez d'abord créer un modèle de flotte dans l'onglet Unités navales de l'interface de production.§!"
 NO_VALID_CONFORM_TO_TEMPLATES_ARMY:0 "§RCette armée ne peut actuellement pas être conformée à aucun modèle.§!\nVeuillez vérifier que vous avez assez de ¤ et de £icon_manpower£."
 NO_VALID_CONFORM_TO_TEMPLATES_NAVY:0 "§RCette flotte ne peut actuellement pas être conformée à aucun modèle.§!\nVeuillez vérifier que vous avez assez de ¤ et de £icon_sailors£."
 ARMY_IS_EMBARKED:0 "§RCette armée est actuellement embarquée.§!"
 NAVY_HAS_UNITS_EMBARKED:0 "§RCette flotte transporte actuellement des troupes.§!"
 crushed_non_mamluk_rebels:0 "Rebelles écrasés"
 desc_crushed_non_mamluk_rebels:0 "Une rébellion récente a été violemment écrasée."
 placated_non_mamluk_rebels:0 "Population locale apaisée"
 desc_placated_non_mamluk_rebels:0 "Nous avons évité une rébellion récente en tentant de remédier à la discrimination des locaux."
 tarh:0 "Tarh"
 desc_tarh:0 "Nous forçons les habitants de cette province à acheter des produits locaux, et à payer un prix que nous avons fixé. Cela a assuré que nous ne perdons pas d'argent directement sur nos monopoles royaux, mais a aussi résulté en une baisse générale de productivité et de qualité."
 unprofitable_monopolies:0 "Monopoles non rentables"
 desc_unprofitable_monopolies:0 "La production dans cette province est contrôlée par des monopoles royaux, mais la demande pour les produits fabriqués a considérablement baissé dernièrement, résultant en une perte de profit pour nous."
 factionalism:0 "Factionalisme"
 desc_factionalism:0 "Notre dirigeant essaie de jouer les factions de notre pays les unes contre les autres pour augmenter son propre contrôle sur elles."
 ruler_supporting_faction:0 "Dirigeant soutenant une faction"
 desc_ruler_supporting_faction:0 "Notre dirigeant essaie de toujours être du côté le plus fort dans les conflits factionnels de notre pays."
 cairo_markets:0 "Expansion des marchés du Caire"
 desc_cairo_markets:0 "Notre sultan a décrété que les quartiers marchands du Caire devraient être la priorité absolue pour tout projet de rénovation ou de construction pendant son règne."
 cairo_slums:0 "Rénovation des bidonvilles du Caire"
 desc_cairo_slums:0 "Tous les efforts de construction de notre dirigeant actuel visent à combattre la pauvreté et la maladie dans les bidonvilles du Caire."
 cairo_al_ahzar:0 "Patronage d'al-Azhar"
 desc_cairo_al_ahzar:0 "Des propriétés considérables ont été accordées comme donations charitables pour soutenir les mosquées du Caire en général et la vénérable al-Azhar en particulier."
 cairo_defences:0 "Citadelle du Caire"
 desc_cairo_defences:0 "Nous avons consacré des efforts considérables à rénover la citadelle du Caire ainsi qu'à construire et réparer les défenses partout où c'était nécessaire."
 monuments_of_cairo:0 "Monuments du Caire"
 desc_monuments_of_cairo:0 "Nous avons consacré la plupart de nos ressources dans l'ancienne cité du Caire à la construction de monuments à la grandeur de notre dirigeant."
 mamluk_amir_al_hajj:0 "Amir al-Hajj mamelouk"
 desc_mamluk_amir_al_hajj:0 "Nous avons confié à l'un de nos mamelouks les plus fiables la tâche de garder les caravanes vers les cités saintes. Comme il n'y a pas de guerriers aussi compétents que notre propre espèce, les caravanes devraient être en sécurité. Même s'il manque de connaissance du paysage et de la population locaux."
 diplomat_amir_al_hajj:0 "Amir al-Hajj diplomate"
 desc_diplomat_amir_al_hajj:0 "Notre Amir al-Hajj, l'officiel en charge des pèlerinages annuels à La Mecque, a été choisi parmi nos meilleurs diplomates. Cela devrait le rendre bien adapté pour mener les caravanes vitales à travers des territoires parfois dangereux."
 warrior_amir_al_hajj:0 "Amir al-Hajj guerrier"
 desc_warrior_amir_al_hajj:0 "Notre Amir al-Hajj, l'officiel en charge des pèlerinages annuels à La Mecque, a été choisi parmi nos meilleurs chefs militaires. Cela devrait le rendre bien adapté pour mener la défense de ces caravanes vitales."
 bedouin_amir_al_hajj:0 "Amir al-Hajj bédouin"
 desc_bedouin_amir_al_hajj:0 "Notre Amir al-Hajj, l'officiel en charge des pèlerinages annuels à La Mecque, a été choisi parmi les hommes de tribu bédouins qui constitueraient normalement une menace pour les caravanes mêmes que nous lui demanderions de protéger. Cela devrait le rendre particulièrement bien adapté pour protéger les caravanes, mais peut aussi être vu comme une négligence de notre devoir sacré par certains."
 awlad_al_nas_commander:0 "Commandant des Awlad al-nas"
 desc_awlad_al_nas_commander:0 "La défense de [Root.GetName] a été laissée entre les mains d'Awlad al-Nas entreprenants, les fils de mamelouks affranchis."
 mamluk_commander:0 "Commandant mamelouk"
 desc_mamluk_commander:0 "La défense de cette zone est entre les mains de l'un de nos mamelouks les plus fiables."
 trusting_old_guard:0 "Qaranis"
 desc_trusting_old_guard:0 "Divers officiels mis au pouvoir par nos prédécesseurs restent à leurs postes. Cela rend la période de transition moins stable que beaucoup ne l'auraient souhaité."
 loyal_mamluks_in_high_positions:0 "Mamelouks loyaux"
 desc_loyal_mamluks_in_high_positions:0 "Nous avons remplacé les mamelouks mis au pouvoir par nos prédécesseurs par des mamelouks fraîchement achetés et loyaux. Cela ne nous a pas fait beaucoup d'amis parmi les maisonnées du Caire, mais au moins nous savons que nous pouvons faire confiance à nos officiers maintenant."
 mamluk_events.0.t:0 "Succession mamelouke"
 mamluk_events.0.d:0 "La mort de [Root.Monarch.GetName] a laissé notre pays sans dirigeant. Toutes les maisonnées mameloukes importantes de [Root.Capital.GetCapitalName] font appel à leur influence pour avoir leur mot à dire sur qui sera son successeur. Selon qui gagne, notre nouveau dirigeant aura le soutien de différentes maisonnées et de différentes parties du pays.\nUne seule chose est certaine, ceux qui auraient préféré voir les intérêts de leur propre groupe prévaloir n'accueilleront pas notre nouveau [Root.Monarch.GetTitle] avec joie. Certains pourraient même passer le reste de leur vie à essayer de limiter son influence."
 mamluk_events.0.a:0 "Nous avons besoin du soutien des mamelouks [first_ruler_alternative_province.Culture.GetName]."
 mamluk_events.0.b:0 "Seuls les mamelouks [second_ruler_alternative_province.Culture.GetName] sont utiles maintenant."
 mamluk_events.0.c:0 "Le candidat [third_ruler_alternative_province.Culture.GetName] a notre soutien !"
 mamluk_events.0.dd:0 "La meilleure alternative est quelqu'un qui n'a aucun lien avec les groupes de [Root.Capital.GetCapitalName]..."
 mamluk_events.1.t:0 "Soldats [not_ruling_culture_province.Culture.GetName]"
 mamluk_events.1.d:1 "Bien que les mamelouks constituent le cœur de nos forces, toute notre puissance militaire ne se compose pas d'esclaves guerriers. Les soldats [not_ruling_culture_province.Culture.GetName] locaux constituent une grande partie de notre infanterie et sont également utilisés pour les tâches de garde et de garnison.\nLes faibles chances d'avancement et la basse solde ne sont cependant pas les meilleurs motivateurs, et il n'est pas clair jusqu'où nous pouvons faire confiance à ces hommes. Certainement, leur entraînement et leur équipement sont souvent négligés par l'Amir en charge d'eux.\nEn [not_ruling_culture_province.GetAreaName], la méfiance entre les [not_ruling_culture_province.Culture.GetName] et les Amirs mamelouks a conduit à une mutinerie."
 mamluk_events.1.a:0 "Nous devons écraser cela dans l'œuf !"
 mamluk_events.1.b:0 "Voyons ce que nous pouvons faire pour améliorer leur situation."
 mamluk_events.2.t:0 "Le Tarh et les monopoles royaux"
 mamluk_events.2.d:0 "Nos prédécesseurs ont sagement utilisé un système de monopoles royaux pour contrôler les revenus des cultures de rente et des produits fins. Avec la baisse de la demande cependant, nous perdons de l'argent sur ces investissements. Notre superviseur en [monopoly_province.GetName] rapporte qu'ils n'ont pas pu vendre leur stock depuis deux ans maintenant et s'inquiètent que cela va coûter de l'argent à l'État.\nIl suggère que nous forcions nos sujets à acheter ces produits à un prix fixé pour que nous puissions récupérer notre investissement. Un processus traditionnellement connu sous le nom de Tarh."
 mamluk_events.2.a:0 "Quelle excellente idée !"
 mamluk_events.2.b:0 "Nous devrons simplement supporter le coût."
 mamluk_events.3.t:0 "Révolte de l'Amir [mamluk_province.Culture.GetName]"
 mamluk_events.3.d:0 "L'un de nos Amirs mamelouks les plus puissants a bâti une base de pouvoir en [mamluk_province.GetAreaName] et marche maintenant sur [Root.Capital.GetCapitalName]. Il y a des rumeurs de soutien généralisé à sa cause parmi les maisonnées mameloukes de la capitale et même au sein de la citadelle elle-même."
 mamluk_events.3.a:0 "La peine pour trahison est la mort !"
 mamluk_events.4.t:0 "Factionalisme"
 mamluk_events.4.d:0 "[Root.Monarch.GetTitle] est loin d'être le seul propriétaire de mamelouks dans notre [Root.GovernmentName]. Les maisonnées des mamelouks affranchis influents contiennent souvent de grands, sinon plus grands, nombres d'esclaves nouvellement importés de leurs régions d'origine. Ces Amirs influents sont souvent ceux qui ont la plus grande influence lors d'une succession mais même quand le trône est occupé, l'influence des maisonnées mameloukes est grande sur la politique [Root.GetAdjective]. C'est à [Root.Monarch.GetName] de s'assurer que ce factionalisme n'étouffe pas la politique de [Root.Capital.GetCapitalName]."
 mamluk_events.4.a:0 "Nous devons essayer de les jouer les uns contre les autres."
 mamluk_events.4.b:0 "Choisissons un camp et soutenons les factions les plus fortes."
 mamluk_events.5.t:0 "Coup de palais"
 mamluk_events.5.d:0 "Gravement mécontents de la mauvaise gouvernance de [Root.Monarch.GetName], d'éminents Amirs mamelouks ont pris sur eux de déposer notre [Root.Monarch.GetTitle] et de mettre un guerrier plus compétent sur le trône."
 mamluk_events.5.a:0 "Nous n'abandonnerons pas [Root.Monarch.GetName] !"
 mamluk_events.5.b:0 "Tous les hommes doivent mourir."
 mamluk_events.6.t:0 "La cité du Caire"
 mamluk_events.6.d:0 "Bien plus ancienne que notre propre [Root.GovernmentName], le Caire a été embellie par des dirigeants et des conquérants pendant des centaines sinon un millier d'années. Mettre de l'ordre dans ce labyrinthe de bâtiments, des tombeaux de la cité des morts et des bidonvilles de Fostat, aux marchés animés de Khan el-Khalili, ou à la grande citadelle du Caire elle-même, s'est avéré une tâche monumentale pour beaucoup de nos prédécesseurs. Néanmoins, en tant que maître de la cité, [Root.Monarch.GetName], est censé laisser [Root.Monarch.GetHerHis] marque sur le Caire, à la fois pour l'embellir et la développer, et pour combattre la maladie et maintenir l'ordre."
 mamluk_events.6.a:0 "Rénovons les souks et le Khan el-Khalili."
 mamluk_events.6.b:0 "Nous devons rénover les bidonvilles croissants et les faubourgs."
 mamluk_events.6.c:0 "Les mosquées et l'al-Azhar requièrent notre attention."
 mamluk_events.6.dd:0 "Concentrons-nous sur la citadelle elle-même, et les défenses de la cité."
 mamluk_events.6.e:0 "Les générations futures envieront les monuments que nous érigeons."
 mamluk_events.6.f:0 "Il n'y a pas grand-chose que nous puissions faire pour les citoyens du Caire en ce moment."
 mamluk_events.7.t:0 "Un nouvel Amir al-Hajj"
 mamluk_events.7.d:0 "Le pèlerinage aux cités saintes de La Mecque et Médine est un que chaque musulman devrait entreprendre au moins une fois dans sa vie. En tant que [Root.Monarch.GetTitle], il est de notre responsabilité de s'assurer qu'ils peuvent atteindre cette destination en sécurité. C'est un poste qui à bien des égards requiert à la fois ruse et capacité martiale, car la façon de procéder peut aller de la défaite des pillards à la négociation de passage avec les dirigeants locaux, aux menaces directes ou à la corruption. L'Amir al-Hajj aura la responsabilité générale des caravanes du Hajj et aura une grande liberté dans la façon d'assurer un passage régulier et paisible pour tous les pèlerins [Root.GetAdjective]."
 mamluk_events.7.a:0 "Choisissons un bédouin, le meilleur des nôtres."
 mamluk_events.7.a.tt:0 "Votre choix d'§YAmir al-Hajj§! aura un effet tant sur le taux de succès des caravanes du Hajj de votre peuple que sur le type d'impact que tout problème avec le Hajj aura :\nUn Amir al-Hajj bédouin sera capable de protéger les caravanes des dangers qu'aucune des autres options ne pourrait."
 mamluk_events.7.b:0 "Choisissons un bédouin, natif des déserts d'Arabie."
 mamluk_events.7.c:0 "Un guerrier compétent sera à la hauteur de la tâche."
 mamluk_events.7.c.tt:0 "Votre choix d'§YAmir al-Hajj§! aura un effet tant sur le taux de succès des caravanes du Hajj de votre peuple que sur le type d'impact que tout problème avec le Hajj aura :\nUn Amir al-Hajj guerrier aura de bonnes chances de défendre la caravane si elle est attaquée, mais il pourrait aussi créer des conflits inutiles par son manque de tact."
 mamluk_events.7.dd:0 "Un diplomate compétent gérera cela au mieux."
 mamluk_events.7.dd.tt:0 "Votre choix d'§YAmir al-Hajj§! aura un effet tant sur le taux de succès des caravanes du Hajj de votre peuple que sur le type d'impact que tout problème avec le Hajj aura :\nUn Amir al-Hajj diplomate sera plus efficace quand votre pays est en paix, et moins quand vous êtes en guerre."
 mamluk_events.7.e:0 "Seul un mamelouk loyal peut accomplir cette tâche."
 mamluk_events.7.e.tt:0 "Votre choix d'§YAmir al-Hajj§! aura un effet tant sur le taux de succès des caravanes du Hajj de votre peuple que sur le type d'impact que tout problème avec le Hajj aura :\nUn Amir al-Hajj mamelouk sera plus digne de confiance quand votre dirigeant a une haute légitimité, et beaucoup moins digne de confiance quand la légitimité est basse."
 mamluk_events.8.t:0 "Caravanes du Hajj pillées"
 mamluk_events.8.d:0 "Une caravane récente de pèlerins pour les cités saintes a été attaquée et pillée. C'est notre devoir de protéger ceux de nos sujets qui partiraient pour les cités saintes et maintenant notre capacité à le faire est mise en question."
 mamluk_events.8.a:0 "Cela ne se reproduira pas."
 mamluk_events.8.b:0 "Nous devons dépenser plus pour les protéger."
 mamluk_events.8.c:0 "Notre Amir al-Hajj utilisera ses contacts pour assurer un meilleur résultat à l'avenir."
 mamluk_events.9.t:0 "Les pèlerins sont en sécurité"
 mamluk_events.9.d:0 "Nos efforts pour protéger ceux de nos sujets qui cherchent à accomplir leur pèlerinage aux cités saintes de La Mecque et Médine ont porté leurs fruits. Cela fait longtemps depuis le dernier raid et le royaume est en paix."
 mamluk_events.9.a:0 "Excellent."
 mamluk_events.10.t:0 "Awlad al-nas"
 mamluk_events.10.d:0 "Ayant été éduqués pour être des guerriers loyaux depuis leur jeune âge, les esclaves mamelouks ont souvent la confiance totale de leur propriétaire ou employeur. Leurs fils cependant, les Awlad al-nas, ayant grandi dans des circonstances bien plus commodes et clémentes, sont généralement considérés comme bien moins capables et loyaux. Incapables de servir comme mamelouks royaux, les Awlad al-nas constituent à la place une élite sociale au sein des unités militaires régulières et dans l'administration inférieure.\nCes fils nobles eux-mêmes essaient cependant continuellement de prouver qu'ils sont prêts pour de plus grandes responsabilités. Avec le poste ouvert de commandement pour les défenses de l'État de [defence_province.GetAreaName], un certain nombre d'entre eux espèrent que nous leur confierons cette tâche."
 mamluk_events.10.a:0 "Nommons l'un des fils."
 mamluk_events.10.b:0 "Nous ne pouvons faire confiance qu'aux nôtres, le commandant doit être un mamelouk."
 mamluk_events.11.t:0 "Qaranis"
 mamluk_events.11.d:0 "Ce [Root.GovernmentName] a été fondé par des esclaves mamelouks et la possession et l'importation d'esclaves guerriers compétents restent la base du pouvoir de tout [Root.Monarch.GetTitle]. Il est seulement naturel qu'un esclave soit plus loyal envers son maître qu'envers tout autre dans sa nouvelle patrie, et encore plus s'il est récompensé par l'affranchissement pour services rendus.\nCependant, actuellement beaucoup des mamelouks royaux dans notre administration, cour et armées sont ceux que $RANDOM_OLD_MONARCH$ a achetés et introduits dans notre [Root.GovernmentName]. Ce sont des hommes avec une grande influence mais aucune loyauté personnelle envers [Root.Monarch.GetName], des hommes que nos nouveaux mamelouks accusent de comploter et d'essayer de limiter leur influence."
 mamluk_events.11.a:0 "Éliminons les Qaranis des postes importants !"
 mamluk_events.11.b:0 "Nous n'avons pas d'autre choix que de leur faire confiance, nous sommes tous des mamelouks après tout..."
 mamluk_events.12.t:0 "Furusiyya"
 mamluk_events.12.d:0 "La Furusiyya est un ensemble d'exercices équestres qui enseignent aux jeunes guerriers l'art de la guerre de cavalerie. Avec des règles détaillées, des manuels d'entraînement et des compétitions publiques très populaires et des champions, la Furusiyya a à bien des égards été perfectionnée par l'aristocratie guerrière mamelouke. Bien que certains chroniqueurs prétendraient que les champions d'aujourd'hui ne pourraient jamais rivaliser avec les guerriers du passé, il est toujours à la fois coutumier, et très populaire, pour les [Root.Monarch.GetTitle] d'organiser de grandes compétitions publiques de Furusiyya, et les champions restent les héros de nombreux contes populaires."
 mamluk_events.12.a:0 "C'est bon pour le peuple, mais pas quelque chose pour lequel un [Root.Monarch.GetTitle] devrait dépenser de l'argent."
 mamluk_events.12.b:0 "Agrandissons et construisons de nouveaux hippodromes pour patronner les fleurons de la chevalerie."
 furusiyya:0 "Furusiyya"
 desc_furusiyya:0 "Nous consacrons des ressources considérables à maintenir les grandes traditions de compétitions martiales pour la cavalerie dans l'État mamelouk."
