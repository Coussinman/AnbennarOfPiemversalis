 growing_merchant_community:0 "Communauté marchande croissante"
 merchants_discriminated:0 "Marchands discriminés"
 foreign_merchant_community:0 "Communauté marchande florissante"
 desc_foreign_merchant_community:0 "Le quartier étranger dans la capitale provinciale ici s'est considérablement développé, résultant en une augmentation temporaire de l'économie locale."
 foreign_merchants_discriminated:0 "Commerçants locaux renforcés"
 desc_foreign_merchants_discriminated:0 "Nous avons pris des mesures sévères pour soutenir nos commerçants locaux dans cette province, aux dépens de tout marchand étranger dans la zone."
 adopt_wahabism_title:0 "Adopter le wahhabisme"
 adopt_wahabism_desc:0 "Une nouvelle branche de l'école hanbalite gagne en popularité parmi certains de nos hommes de tribu. Bien que l'école hanbalite n'ait pas été notre Madhab préféré, de nombreux érudits influents arguent maintenant que nous devrions rejoindre ce mouvement."
 meddled_in_trade:0 "S'est mêlé de notre commerce"
 making_us_rich:0 "Grand importateur"
 local_goods_in_demand:0 "Produits de luxe en demande"
 desc_local_goods_in_demand:0 "Les produits de luxe locaux sont devenus très à la mode dans une capitale étrangère. La richesse apportée a conduit à une augmentation de l'entreprise locale."
 outsiders_cleared_our_merchants:0 "Brigandage sous contrôle"
 desc_outsiders_cleared_our_merchants:0 "Des marchands étrangers de la zone sont intervenus pour réprimer le brigandage dans cette province."
 merchants_hampered_by_bandits:0 "Marchands entravés par des bandits"
 local_merchants_outcompeted:0 "Marchands locaux surpassés"
 desc_local_merchants_outcompeted:0 "Les marchands locaux de cette province ont été surpassés par des étrangers qui en sont venus à dominer les affaires dans les cités ici. Plus de marchandises sont créées qu'auparavant mais une grande partie des profits finit dans des mains étrangères."
 protectionism:0 "Protectionnisme"
 local_protectionism:0 "Protectionnisme local"
 desc_local_protectionism:0 "Afin de s'assurer que les commerçants locaux soient favorisés par rapport aux intérêts étrangers, nous avons rendu la vie très difficile aux étrangers dans cette province. Cela a peut-être freiné l'économie locale, mais maintenant nous pouvons être sûrs que les profits vont aux gens qui les méritent."
 influential_trading_family:0 "Famille marchande influente"
 regulated_economic_growth:0 "Croissance économique régulée"
 desc_regulated_economic_growth:0 "Une demande accrue pour les produits locaux a conduit à une croissance économique dans cette province."
 unregulated_economic_growth:0 "Croissance économique non régulée"
 desc_unregulated_economic_growth:0 "Bien que l'économie locale prospère, elle le fait de manière incontrôlée. Il y a eu de nombreux excès qui ont résulté en troubles tant dans les campagnes que dans les cités de cette zone."
 lack_of_demand_for_local_goods:0 "Manque de demande pour les produits locaux"
 desc_lack_of_demand_for_local_goods:0 "Un manque soudain de demande pour les produits de luxe de cette province a entravé les entreprises locales."
 influx_of_foreign_ideas:0 "Afflux d'idées étrangères"
 desc_influx_of_foreign_ideas:0 "Les marchands étrangers ont apporté de nombreuses nouvelles méthodes et idées dans cette province. Une partie de la population locale ne s'adapte cependant pas bien aux changements soudains, et s'oppose activement au changement."
 traditional_values_supported:0 "Valeurs traditionnelles ancrées"
 desc_traditional_values_supported:0 "Face aux nouvelles idées et méthodes, cette province a gardé ses principes et traditions."
 trade_policy_events.1.t:0 "Quartier étranger de [quarter_city.GetCapitalName]"
 trade_policy_events.1.d:1 "Depuis longtemps, des marchands étrangers se sont installés à [quarter_city.GetCapitalName] pour mieux conduire le commerce avec notre pays. Dernièrement cependant, avec l'activité intensifiée de [community_country.GovernmentName] de [community_country.GetDefiniteArticleBeforePluralCountry] [community_country.GetName], le quartier s'est développé en une cité à part entière.\nCe n'est pas sans problèmes, nos propres citoyens se plaignent que la communauté [community_country.GetAdjective] croît à leurs dépens. Ils exigent que nous imposions des règles plus strictes aux marchands étrangers et que nous restreignions leurs activités en dehors du quartier étranger."
 trade_policy_events.1.a:0 "Non, nous devrions encourager la communauté étrangère à croître plutôt."
 trade_policy_events.1.b:0 "Nous devons respecter les souhaits des braves gens de [quarter_city.GetCapitalName]."
 trade_policy_events.2.t:0 "[trade_province.GetFancyTradeGood] [trade_province.Culture.GetName]"
 trade_policy_events.2.d:0 "En raison du long temps que beaucoup de nos familles marchandes passent dans les communautés [trade_province.Culture.GetName] et surtout parmi les habitants de [trade_province.GetAreaName], ils ont commencé à apprécier les spécialités locales. Certains ont commencé à commercialiser [trade_province.GetFancyTradeGood_LOW] de la zone à [Root.Capital.GetCapitalName] à des prix très élevés.\nC'est une entreprise qui les rend rapidement très riches, eux et les locaux..."
 trade_policy_events.2.a:0 "Un bel exemple d'entreprise privée."
 trade_policy_events.2.b:0 "Attention, car la mode est capricieuse."
 trade_policy_events.3.t:0 "Demande [From.GetAdjective] et offre [Root.GetAdjective]"
 trade_policy_events.3.d:0 "Il semble que [trade_province.GetFancyTradeGood_LOW] de [trade_province.GetName] soient de plus en plus recherchés dans la capitale [From.GetAdjective], [From.Capital.GetCapitalName]. Il y avait toujours une forte demande pour nos produits, mais cet attrait exceptionnel a résulté en une grande augmentation de richesse dans la province."
 trade_policy_events.3.a:0 "Excellent."
 trade_policy_events.4.t:0 "La valeur d'une bonne carte"
 trade_policy_events.4.d:0 "Il semble que les marchands de [spy_country.GetName] aient fait bien plus que simplement commercer. Lors d'un contrôle de routine, nos représentants locaux ont réussi à découvrir non seulement une grande sélection de contrebande, mais aussi un ensemble de cartes très détaillées de notre territoire. Si détaillées en fait qu'elles sont dans de nombreux cas meilleures que les nôtres. Il semble que le marchand était non seulement un espion mais aussi assez doué pour trouver des opportunités commerciales."
 trade_policy_events.4.a:0 "Nous ferons bon usage de ses informations."
 trade_policy_events.5.t:0 "Bandits en [banditprovince.GetName]"
 trade_policy_events.5.d:0 "Un jeune marchand [Root.GetAdjective] qui avait été envoyé en [banditprovince.GetName] avec la mission non seulement de commercer mais aussi de cartographier les installations militaires et les ressources précieuses a rencontré quelques difficultés. Le problème n'est pas, comme on pourrait s'y attendre, les autorités locales. Plutôt, la zone est en proie aux bandits et aux déserteurs de la garnison locale.\nNotre agent a maintenant demandé notre aide pour nettoyer la zone des pires excès afin qu'elle puisse être correctement cartographiée et analysée."
 trade_policy_events.5.a:0 "Nous allouerons les ressources nécessaires."
 trade_policy_events.5.b:0 "Non, nous ne ferions qu'aider les [banditprovince_owner.GetAdjective]."
 trade_policy_events.6.t:0 "Des commerçants étrangers interviennent dans les affaires locales"
 trade_policy_events.6.d:0 "Les bandits locaux ont longtemps été un problème en [banditprovince.GetName], mais il semble que l'affaire ait finalement été résolue. Plutôt que les autorités locales qui s'occupent du problème, cependant, il semble que ce soit la communauté marchande [From.GetAdjective] qui soit intervenue pour régler le problème, le payant de leurs propres poches."
 trade_policy_events.6.a:0 "Merveilleux"
 trade_policy_events.7.t:0 "Profiteurs à [trade_province.GetCapitalName]"
 trade_policy_events.7.d:0 "Les citoyens de [trade_province.GetCapitalName] en ont assez de l'influence locale des avides marchands [trader_country.GetAdjective] qui, selon eux, utilisent des avantages injustes pour surpasser les entreprises locales. Ils exigent que nous intervenions pour limiter l'influence des commerçants étrangers sur la zone et réaffirmer les privilèges de nos propres marchands et artisans.\nSi nous n'agissons pas, ils pourraient prendre les choses en main..."
 trade_policy_events.7.a:0 "Nous devons protéger notre commerce."
 trade_policy_events.7.b:0 "La concurrence est bonne pour tout le monde."
 trade_policy_events.8.t:0 "Croissance du commerce de [developing_business_province.GetFancyTradeGood]"
 trade_policy_events.8.d:0 "Nos efforts pour maximiser les profits commerciaux dans la zone de [developing_business_province.GetAreaName] ont porté leurs fruits dans la province de [developing_business_province.GetName]. Les entrepreneurs ont réussi à augmenter considérablement la production de [developing_business_province.GetFancyTradeGood_LOW] et ont trouvé de nouveaux marchés dans notre capitale pour les produits transformés."
 trade_policy_events.8.a:0 "Excellent"
 trade_policy_events.9.t:1 "[Root.prominent_merchant.GetName] et sa famille"
 trade_policy_events.9.d:0 "Une famille marchande de [merchant_family_province.GetName] en est venue à grandement développer notre commerce à longue distance avec [foreign_province_owner.GetName]. En s'établissant avec succès tant à [foreign_province_owner.Capital.GetCapitalName] que dans l'arrière-pays [foreign_province_owner.GetAdjective], ils en sont venus à être très influents dans nos deux sociétés, et très riches. C'est une situation dont nous pourrions probablement tirer parti..."
 trade_policy_events.9.a:0 "Utilisons leur influence pour extraire des cartes de l'arrière-pays [foreign_province_owner.GetAdjective]."
 trade_policy_events.9.b:0 "Nous ne devrions pas demander ce qu'ils peuvent faire pour nous. Ce qui est bon pour eux est bon pour nous."
 trade_policy_events.9.c:0 "Faisons de [Root.prominent_merchant.GetName] le nouvel architecte de nos politiques commerciales."
 trade_policy_events.10.t:0 "Demande accrue pour [trade_province.GetFancyTradeGood]"
 trade_policy_events.10.d:1 "[trade_province.GetFancyTradeGood] de [trade_province.GetName] obtient un très bon prix sur les marchés étrangers comme domestiques dernièrement. À tel point que cela a donné naissance à une nouvelle génération d'entrepreneurs et de spéculation économique."
 trade_policy_events.10.a:0 "Nous devrions intervenir pour limiter tout excès."
 trade_policy_events.10.b:0 "Allégeons les réglementations pour vraiment profiter aux entrepreneurs locaux."
 trade_policy_events.11.t:0 "Manque de demande pour [trade_province.GetFancyTradeGood]"
 trade_policy_events.11.d:0 "[trade_province.GetName] a longtemps vécu de [trade_province.GetFancyTradeGood_LOW] produits localement mais dernièrement ils ont été forcés de vendre leurs produits à des prix réduits. Si c'est dû aux caprices temporaires de la mode ou à un changement plus permanent est difficile à dire, mais il est clair que le commerce local souffre."
 trade_policy_events.11.a:0 "C'est regrettable."
 trade_policy_events.12.t:0 "Propagation des idées"
 trade_policy_events.12.d:0 "Avec l'échange d'argent et de marchandises, il y a souvent une propagation de méthodes et d'idées. Avec la croissance de l'activité marchande [merchant_country.GetAdjective] à [institution_province.GetCapitalName], il y a une influence claire sur la société locale. Alors que les coutumes et les modes locales évoluent, certains aspirent aux temps anciens, et selon eux meilleurs."
 trade_policy_events.12.a:0 "Notre société n'a qu'à gagner du progrès."
 trade_policy_events.12.b:0 "Protégeons la société [institution_province.culture.GetName] traditionnelle."
 trading_settlement:0 "Comptoir commercial"
 desc_trading_settlement:0 "Nous avons autorisé des commerçants ravéliens à créer leur propre établissement en dehors de nos cités dans cette province."
 muslim_traders_controlled:0 "Commerce contrôlé"
 desc_muslim_traders_controlled:0 "Nous avons placé des limitations sur la croissance de la communauté marchande ravélienne dans cette province. Cela rend beaucoup plus facile de les contrôler et de les taxer, mais pourrait aussi entraver la croissance de nos cités ici à long terme."
 islamic_missionaries:0 "Missionnaires ravéliens"
 desc_islamic_missionaries:0 "Nous avons autorisé un certain nombre de missionnaires et d'enseignants ravéliens à s'installer dans cette province."
 muslim_sailor_community:0 "Communauté de marins"
 desc_muslim_sailor_community:0 "Cette province abrite une communauté florissante de marins ravéliens."
 religious_community_isolated:0 "Communauté religieuse isolée"
 desc_religious_community_isolated:0 "Nous avons agi pour isoler la communauté religieuse dans cette province afin de limiter la propagation de leur foi."
 mosque_of_x:0 "Influence religieuse croissante"
 desc_mosque_of_x:0 "La récente fondation d'une grande église à proximité a rendu cette zone plus susceptible à la propagation de nouvelles idées religieuses."
 explain_conversion_strength_in_true_religion_provinces:0 "La force missionnaire locale augmente la vitesse de conversion pour la politique commerciale §YPropager la religion§!.\n\n"
 discriminated_our_countrymen:0 "A discriminé nos compatriotes"
 adopted_islamic_titles:1 "Roi de nom"
 converted_to_islam:0 "A rejoint la communauté des fidèles"
 sultan_titles_for_non_muslims_tooltip:1 "[Root.Monarch.GetName] sera désormais connu comme un roi, améliorant nos relations de §G75§! envers tous les pays §YRavéliens§! connus."
 sultan_conversion_tooltip:0 "Nos relations s'amélioreront de §G50§! envers tous les pays §YRavéliens§! connus."
 islamic_titles:0 "Syncrétisme ravélien"
 desc_islamic_titles:0 "Nous avons adopté de nombreux titres et coutumes des royaumes ravéliens et d'inspiration cannorienne dans notre région pour faire avancer nos objectifs diplomatiques et mercantiles."
 defended_traditional_kingship:0 "Royauté traditionnelle"
 desc_defended_traditional_kingship:0 "Notre dirigeant a défendu les notions traditionnelles de royauté dans notre société et marginalisé les groupes ravéliens dans la haute noblesse et le gouvernement."
 the_dominant_religion_is_a_form_of_islam_tooltip:0 "La religion dominante dans notre pays est ravélienne."
 trade_propagation_convert_to_islam_title:0 "Adopter le ravélianisme comme religion d'État"
 trade_propagation_convert_to_islam_desc:0 "Le ravélianisme est de plus en plus devenu la religion dominante tant au gouvernement, parmi nos sujets que notre noblesse. Il est temps que nous rejoignions la communauté des fidèles."
 chiefs_with_pretensions:0 "Prétentions des potentats locaux"
 desc_chiefs_with_pretensions:0 "Un chef local a commencé à se faire appeler roi et se considère comme un dirigeant indépendant."
 rejection_of_syncretism:0 "Rejet du syncrétisme"
 desc_rejection_of_syncretism:0 "Nous travaillons activement contre la propagation du syncrétisme ravélien dans notre pays."
 helped_clear_out_bandits:0 "A combattu nos bandits"
 propagate_religion_events.1.t:0 "Commerçants à [trade_province.GetCapitalName]"
 propagate_religion_events.1.d:0 "Les commerçants ravéliens sont une vue de plus en plus commune dans nos ports depuis des générations maintenant et nous nous sommes habitués à eux et à leur religion. Dans nos ports de la province de [trade_province.GetName], et surtout [trade_province.GetName] même, ces marchands sont devenus si courants qu'ils font maintenant partie intégrante de la population urbaine.\nRécemment, certains de ces commerçants ont approché [Root.Monarch.GetTitle], demandant à être autorisés à construire un établissement à eux, juste à l'extérieur de [trade_province.GetName] proprement dit."
 propagate_religion_events.1.a:0 "Seul le bien peut en résulter."
 propagate_religion_events.1.b:0 "Non, ils doivent rester là où nous pouvons les contrôler."
 propagate_religion_events.2.t:0 "Missionnaires [converter_country.Religion.GetName]"
 propagate_religion_events.2.d:0 "Un groupe de missionnaires ravéliens s'est installé en [trade_province.GetName] pour y fonder une nouvelle communauté pour eux-mêmes et leurs convertis. Ils coopèrent avec les autorités locales et ne s'opposent pas à notre règne, mais leur présence conduira probablement à ce que leur religion se répande plus rapidement dans toute la zone."
 propagate_religion_events.2.a:0 "Nous ne pouvons pas laisser l'autorité échapper à des groupes extérieurs comme celui-ci."
 propagate_religion_events.2.b:0 "Ils seront un ajout bienvenu à notre société."
 propagate_religion_events.3.t:0 "Marins ravéliens"
 propagate_religion_events.3.d:0 "De la Complainte d'Uelos au golfe de Rahen, il y a une abondance de navires, des petites caravelles aux grandes galères, naviguant constamment entre les nombreux ports. Dans son ensemble, ce réseau commercial fournit des biens et des provisions pour plus de la moitié de la population mondiale.\nCe que beaucoup de ces galères ont en commun, c'est qu'elles sont armées par des marins suivant la foi ravélienne. Ce sont des marins de Cannor rejoints par des locaux convertis."
 propagate_religion_events.3.a:0 "Encourageons ces marins à chercher nos ports !"
 propagate_religion_events.3.b:1 "Nous n'avons pas besoin de fois étrangères sur nos navires."
 propagate_religion_events.4.t:0 "Miracle ?"
 propagate_religion_events.4.d:0 "Un homme savant d'une terre lointaine aurait guéri une princesse locale en [cured_province.GetName] d'une maladie grave avec d'étranges ustensiles. Les locaux sont tous très impressionnés et ont choisi d'adopter la foi de cet étranger afin que son Dieu puisse les protéger dans les temps à venir."
 propagate_religion_events.4.a:0 "C'est un bon signe."
 propagate_religion_events.4.b:0 "Invitons cet homme à [Root.Capital.GetName], où il pourra être utile."
 propagate_religion_events.5.t:0 "Église construite en [mosque_province.GetName]"
 propagate_religion_events.5.d:0 "Les ravéliens de [mosque_province.GetName] ont construit une nouvelle église pour servir de lieu de culte. L'église est le nouveau centre clair de la communauté et attirera probablement un plus grand nombre de gens à s'installer ici. Elle facilitera également la conversion locale de toute la zone.\nIl y a des indications claires que la nouvelle église est en partie financée par les nombreux commerçants [converter_country.GetAdjective] actifs dans la région, et dans notre gouvernement certains s'inquiètent que cela puisse conduire à une influence indue pour eux et leur religion."
 propagate_religion_events.5.a:0 "Nous ne pouvons pas permettre cela."
 propagate_religion_events.5.b:0 "Fournissons-leur le soutien dont ils ont besoin pour construire une meilleure communauté."
 propagate_religion_events.6.t:0 "Roi de [Root.GetName] ?"
 propagate_religion_events.6.d:0 "Avec la foi ravélienne devenant de plus en plus la religion dominante de notre pays, beaucoup de nos fonctionnaires gouvernementaux, nobles et autres notables, ont commencé à adopter des notions cannoriennes de royauté, des noms et titres cannoriens. Beaucoup ont en fait commencé à appeler [Root.Monarch.GetName] un roi, même si notre religion d'État officielle est encore [Root.Religion.GetName]. Certains conseillers de [Root.Monarch.GetName] suggèrent maintenant qu'il pourrait être prudent d'aller dans ce sens. Si nous commençons à appeler notre propre pays un royaume, cela pourrait faciliter les relations avec les nombreux pays ravéliens du monde entier."
 propagate_religion_events.6.a:0 "J'aime cette idée."
 propagate_religion_events.6.b:0 "Non, nous devons défendre les valeurs traditionnelles de [Root.GetStateForm] [Root.GetAdjective] !"
 propagate_religion_events.7.t:0 "Rejoindre la communauté des fidèles"
 propagate_religion_events.7.d:0 "Comme [Root.Religion.GetName] est maintenant la religion officielle de [Root.GetName], nous avons rejoint la communauté des fidèles. Bien que certains traditionalistes restants déplorent ce changement, beaucoup plus de nos sujets ravéliens se réjouissent maintenant du règne juste de [Root.Monarch.GetName]."
 propagate_religion_events.7.a:0 "Longue vie à [Root.Monarch.GetTitle] !"
 propagate_religion_events.8.t:0 "Érudit itinérant"
 propagate_religion_events.8.d:0 "Un homme savant d'une terre lointaine est arrivé à [Root.Capital.GetCapitalName]. Il prétend avoir étudié sous des érudits dans de nombreuses cités célèbres, des grandes cités de Konwell à Anbenncóst, Degakheion et Brasan. Il est versé dans la politique du grand monde moderne ainsi que dans les questions complexes de théologie."
 propagate_religion_events.8.a:0 "Nous avons besoin de cet homme. Offrons-lui une place à notre cour !"
 propagate_religion_events.8.b:0 "Apprenons autant que possible sur l'état des choses à l'étranger."
 propagate_religion_events.9.t:0 "Chefs ravéliens"
 propagate_religion_events.9.d:0 "Dans l'arrière-pays [Root.GetAdjective], de nombreux chefs dirigent leurs propres petits domaines avec peu d'interférence du pouvoir central. Cependant, même s'ils manquent de capacité à projeter beaucoup de pouvoir, certains ont de plus grandes ambitions. Certains chefs locaux en [hinterland_province.GetName] ont donné nom à de plus grandes prétentions en commençant à se faire appeler sultans et en essayant de revendiquer une légitimité en convertissant leur population au ravélianisme."
 propagate_religion_events.9.a:0 "Ridicule."
 propagate_religion_events.10.t:0 "Saints syncrétiques ravéliens"
 propagate_religion_events.10.d:0 "Une vue de plus en plus commune dans la campagne [Root.GetAdjective] est celle de zélotes itinérants, des missionnaires mystiques de la foi ravélienne. Ils sont souvent chaleureusement accueillis non seulement par leurs frères de foi, mais aussi par la population rurale qui a trouvé un moyen d'intégrer le credo ravélien dans ses propres traditions et mythes : ils ont même confirmé certains de nos héros mythologiques comme saints dans leur religion ! Le résultat n'est globalement pas quelque chose qui conviendrait à Cannor mais a rendu beaucoup plus prédisposés au ravélianisme en général."
 propagate_religion_events.10.a:0 "Nous devons protéger la foi de nos ancêtres !"
 propagate_religion_events.10.b:0 "Quel mal ces hommes peuvent-ils faire."
 propagate_religion_events.11.t:0 "Réfugiés ravéliens"
 propagate_religion_events.11.d:0 "Un certain nombre de réfugiés d'une guerre lointaine sont arrivés sur nos côtes. Ils sont menés par des aventuriers et réfugiés ravéliens et prétendent que si nous leur permettons simplement quelques terres non réclamées, ils créeront un établissement prospère pour eux-mêmes et mèneront des vies productives comme nos sujets."
 propagate_religion_events.11.a:0 "J'ai justement l'endroit en tête..."
 propagate_religion_events.11.b:0 "Ils devraient pouvoir trouver refuge ailleurs."
 propagate_religion_policy:0 "Centre religieux"
 protestant_center_of_reformation:0 "Centre de Réformation"
 reformed_center_of_reformation:0 "Centre de Réformation"
 catholic_center_of_reformation:0 "Centre du catholicisme"
 INVITE_SCHOLAR_INSTANT_TOOLTIP:0 "§YInviter un érudit§!"
 INVITE_SCHOLAR_DELAYED_TOOLTIP:1 "Inviter un érudit d'un autre pays nous donnera un bonus unique pendant 20 ans."
 UNIQUE_TRADING_POLICY_ALREADY_ACTIVE:0 "§RCette politique commerciale ne peut être active que pour une nation dans ce nœud et est déjà sélectionnée par §!$BY|Y$§R.§!"
 ARMY_PROFESSIONALISM_YEARLY_MODIFIERS_DESC:0 "§YGain annuel :§!\n$MODIFIER$"
 ARMY_PROFESSIONALISM_STATIC_MODIFIERS_DESC:1 "§YGain immédiat :§!\nRecruter un général : §G+1%§!\nRecruter des mercenaires : §R-5%§!"
 unruly_tribes:0 "Tribus indociles"
 desc_unruly_tribes:0 "Les tribus locales de cette zone sont mécontentes que leurs services pour soutenir le dirigeant n'aient pas été récompensés selon leurs préférences."
 disfavored_clan:0 "Clan défavorisé"
 desc_disfavored_clan:0 "Nous avons limité l'influence d'un clan local de cette zone, malgré la grande quantité de pouvoir informel qu'il a réussi à amasser récemment."
 favored_clan:0 "Clan favorisé"
 desc_favored_clan:0 "Nous avons favorisé un clan montant dans cette zone au détriment des autres."
 city_protected:0 "Zones urbaines protégées"
 desc_city_protected:0 "Nous avons bridé nos collecteurs tribaux locaux dans cette zone pour protéger les privilèges des citadins locaux."
 urbanites_chastised:0 "Cités surexploitées"
 desc_urbanites_chastised:0 "Les clans locaux ont peut-être été un peu trop avides en extrayant des revenus de la population citadine locale dans cette province."
 religious_heterodoxy:0 "Hétérodoxie religieuse"
 desc_religious_heterodoxy:0 "Les hommes de tribu locaux sont devenus amoureux d'un cheikh charismatique. Nous avons fait de cet homme un officiel à notre cour, et il prélève maintenant des revenus de la zone."
 imposed_religious_orthodoxy:0 "Troubles religieux"
 desc_imposed_religious_orthodoxy:0 "Un cheikh local fait de la propagande contre notre règne dans cette zone."
 religious_fervor_among_tribesmen:0 "Ferveur religieuse"
 desc_religious_fervor_among_tribesmen:0 "Nos hommes de tribu ont été inspirés par une secte religieuse voisine. Cette inspiration leur insuffle du courage, rendant nos armées encore plus redoutables."
 divided_loyalties:0 "Loyautés divisées"
 desc_divided_loyalties:0 "Les hommes de tribu dans cette province servent deux maîtres. À la fois le conseil tribal qui sont leurs dirigeants nominaux, et les chefs religieux d'une théocratie féodale."
 religious_propaganda:0 "Propagande religieuse"
 desc_religious_propaganda:0 "Une théocratie féodale voisine répand de la propagande parmi nos hommes de tribu, essayant de semer la désunion et de briser l'allégeance de nos fédérés."
 strong_national_clan:0 "Clan national fort"
 desc_strong_national_clan:0 "Bien qu'il ait une faible présence ici, cette zone est dirigée par un clan qui a une forte présence dans toute sa fédération tribale."
 strong_local_clan:0 "Clan local fort"
 desc_strong_local_clan:0 "Cette zone a été confiée à un clan local fort pour être dirigée, au grand dam des clans plus forts au niveau national."
 unsafe_caravans:0 "Raids de caravanes"
 unsafe_roads_hurting_demand:0 "Raids de caravanes"
 desc_unsafe_roads_hurting_demand:0 "Les raids de caravanes en territoire contrôlé par des étrangers ont nui à la distribution de nos marchandises locales, ce qui a eu un effet négatif sur l'économie locale ici."
 rooting_out_raiders:0 "Éradiquer les pillards"
 desc_rooting_out_raiders:0 "Nous menons actuellement une campagne pour éradiquer les pillards locaux afin de pouvoir protéger les routes de caravanes dans cette zone."
 caravans_protected_by_raiders:0 "Caravanes protégées par des pillards"
 desc_caravans_protected_by_raiders:0 "Plutôt que de passer du temps sur une longue campagne pour éradiquer les pillards de caravanes, nous avons commencé à payer les pillards pour protéger les caravanes commerciales dans cette région. Une solution coûteuse mais efficace."
 COLUMBIAN_EXCHANGE:0 "Échange colombien"
 tribal_federation_events.1.t:0 "Clans de [clan_province.GetName]"
 tribal_federation_events.1.d:0 "Les clans de [clan_province.GetName] ont longtemps soutenu [Root.Monarch.GetTitle], et ils sont un pilier de notre fédération. En retour cependant, ils s'attendent à ce que leur région d'origine de [clan_province.GetName] et son peuple aient la priorité lorsque le butin est divisé et lorsque nous attribuons des fonctions importantes."
 tribal_federation_events.1.a:0 "Il est temps que nous montrions notre gratitude."
 tribal_federation_events.1.b:0 "Les faveurs doivent être méritées."
 tribal_federation_events.2.t:0 "Détresse des citoyens de [urban_province.GetCapitalName]"
 tribal_federation_events.2.d:1 "Le conseil municipal de [urban_province.GetCapitalName] nous a approchés pour demander notre aide. Ils prétendent que les hommes de clan leur ont imposé des fardeaux fiscaux indus, ainsi que pris une quantité déraisonnable de leurs terres pour le pâturage. Ils se tournent maintenant vers [Root.Monarch.GetTitle] en espérant recevoir un traitement plus équitable."
 tribal_federation_events.2.a:0 "Nous n'interférerons pas dans la politique locale."
 tribal_federation_events.2.b:0 "Refrénons les chefs de clan."
 tribal_federation_events.3.t:0 "Chef de clan montant"
 tribal_federation_events.3.d:0 "L'équilibre des pouvoirs dans notre fédération change fréquemment alors que des individus et des clans compétents font leurs preuves et gagnent de l'influence par leur courage et leur ruse en guerre ou en pillage. La zone de [clan_area.GetAreaName] a récemment vu la montée d'un tel nouveau clan, son chef exigeant maintenant une place au conseil de [Root.Monarch.GetTitle]."
 tribal_federation_events.3.a:0 "Faisons de la place pour cet homme !"
 tribal_federation_events.3.b:0 "Il peut mieux nous servir sur le terrain."
 tribal_federation_events.3.c:0 "Nous devons protéger les privilèges des clans dirigeants traditionnels."
 tribal_federation_events.4.t:0 "Cheikh influent"
 tribal_federation_events.4.d:0 "Un ordre soufi local en [sufi_came_from_here.GetName] en est venu à gagner une grande popularité parmi les hommes de tribu locaux. Cette ferveur nouvelle a conduit à un sentiment croissant d'unité et de ferveur parmi nos guerriers de la zone, qui sont grandement pris par ce mysticisme charismatique."
 tribal_federation_events.4.a:0 "Invitons-le au conseil de notre [Root.Monarch.GetTitle] !"
 tribal_federation_events.4.b:0 "C'est un affront à tout ce qui est convenable."
 tribal_federation_events.5.t:0 "Ferveur religieuse"
 tribal_federation_events.5.d:0 "Les tribus de [tribal_religion_province.GetName] ont été séduites par les prédicateurs charismatiques de [Root.GovernmentName] de [neighboring_feudal_theocracy.GetName]. Comme beaucoup de parties de notre fédération, cette zone était toujours religieusement hétérogène, mais ce tournant des événements inquiète le conseil de notre [Root.Monarch.GetTitle]."
 tribal_federation_events.5.a:0 "Nous ne pouvons pas permettre à la dynastie [neighboring_feudal_theocracy.Monarch.Dynasty.GetName] une telle influence sur nos terres."
 tribal_federation_events.5.b:0 "La conviction religieuse n'augmentera-t-elle pas la férocité de nos guerriers ?"
 tribal_federation_events.6.t:0 "Partage du butin"
 tribal_federation_events.6.d:0 "Traditionnellement, lors de l'intégration de nouvelles terres, le droit de taxer certaines zones ou d'utiliser leurs pâturages pour le bétail est divisé entre ceux de nos clans dirigeants qui ont aidé pendant les guerres récentes. Il y a cependant deux clans qui se disputent les droits sur le prestigieux État de [clan_province.GetAreaName]. L'un nous a bien servis pendant de nombreuses années mais n'a pas vraiment beaucoup de présence dans la zone. L'autre a une forte présence locale mais est par ailleurs sans beaucoup d'influence et de pouvoir dans notre fédération."
 tribal_federation_events.6.a:0 "Faisons confiance aux capacités locales."
 tribal_federation_events.6.b:0 "Nous devons soutenir nos vieux amis."
 tribal_federation_events.7.t:0 "La famille royale"
 tribal_federation_events.7.d:0 "Des plus hautes aux plus basses parties de la société [Root.GetAdjective], l'autorité personnelle est primordiale pour toute forme de pouvoir. Le nom de famille [Root.Monarch.Dynasty.GetName] peut commander un grand respect, mais [Root.Monarch.GetName] est loin d'être le seul candidat pour diriger notre clan, sans parler de la fédération.\nLes hommes de tribu en [revolt_province.GetAreaName] ont convaincu un des parents de [Root.Monarch.GetName] que c'est maintenant le moment de frapper pour assurer sa propre succession."
 tribal_federation_events.7.a:0 "Les rebelles seront écrasés !"
 tribal_federation_events.8.t:0 "[fancy_trade_caravan_origin.GetFancyTradeGood] volés"
 tribal_federation_events.8.d:0 "Une caravane transportant [fancy_trade_caravan_origin.GetFancyTradeGood_LOW] a été attaquée par des tribus en [ambush_province.GetName]. Il apparaît qu'un clan local estime que sa collecte légale d'impôts en notre nom n'est pas suffisante pour survivre. Au lieu de cela, ils ont pris sur eux d'augmenter leurs revenus par des moyens violents.\nLe conseil royal est divisé entre ceux qui estiment que nous devons sévir contre les bandits pour assurer un passage sûr pour les commerçants, et ceux qui estiment que nous devrions commencer à payer ces hommes de tribu pour protéger les caravanes."
 tribal_federation_events.8.a:0 "Nous devons éradiquer les pillards."
 tribal_federation_events.8.b:0 "Payer l'argent de la protection."
 tribal_federation_events.9.t:0 "[fancy_trade_caravan_origin.GetFancyTradeGood] volés"
 tribal_federation_events.9.d:0 "Il apparaît que les [From.GetAdjective] ne peuvent pas contrôler leurs propres clans. Une caravane transportant [fancy_trade_caravan_origin.GetFancyTradeGood_LOW] a été attaquée par des tribus en [ambush_province.GetName]. Les autorités locales prétendent qu'elles vont gérer la situation, mais pour l'instant l'effet a été une forte baisse de profit pour nos commerçants locaux."
 tribal_federation_events.9.a:0 "Scandaleux !"
 tribal_federation_events.10.t:0 "La garde d'honneur de [Root.Monarch.GetTitle]"
 tribal_federation_events.10.d:0 "Il y a de nombreuses façons informelles pour les clans de notre fédération de montrer leur influence. Une position au conseil royal en est certainement une, tout comme le commandement d'armées ou le droit de taxer des provinces spécifiques. L'un des honneurs suprêmes qu'un clan puisse recevoir, cependant, est une position dans la garde d'honneur de [Root.Monarch.GetTitle]. Tout clan influent serait censé avoir des représentants parmi les kawass personnels du dirigeant, mais il n'y a besoin que de tant de gardes pour un seul homme. D'une certaine façon, c'est une idée en conflit avec l'objectif de réellement protéger [Root.Monarch.GetTitle]."
 tribal_federation_events.10.a:0 "Élargissons la garde d'honneur."
 tribal_federation_events.10.b:0 "Nous avons besoin d'hommes compétents, pas de plus de cérémonies sans signification."
 tribal_federation_events.11.t:0 "Les tribus de [Root.GetName]"
 tribal_federation_events.11.d:0 "Les tribus locales de [Root.GetName] sont impressionnées par nos armées en progression et nous ont approchés pour demander à rejoindre notre fédération directement. En échange, ils demandent que leurs anciens privilèges soient respectés et qu'on leur donne un statut égal aux autres tribus de la zone sous notre contrôle.\nCependant, le conseil tribal pourrait contester la dilution de leur propre influence, si nous devions accepter."
 tribal_federation_events.11.a:0 "Accueillons-les dans la famille."
 tribal_federation_events.11.b:0 "Une fois la paix revenue, ils devront rivaliser avec tous les autres potentats locaux."
 tribal_federation_events.12.t:0 "Les tribus de [From.GetName]"
 tribal_federation_events.12.d:0 "Les tribus traîtres de [From.GetName] nous ont abandonnés et ont rejoint nos ennemis. Leur lâcheté ne leur vaudra aucun ami une fois la guerre terminée."
 tribal_federation_events.12.a:0 "Leurs noms vivront à jamais dans l'infamie !"
 tribal_federation_events.13.t:0 "Les tribus de [tribal_religion_province.GetName]"
 tribal_federation_events.13.d:0 "Les hommes de tribu de [tribal_religion_province.GetName] ont été impressionnés par nos prédicateurs charismatiques et seraient probablement plus que disposés à rejoindre notre [Root.GovernmentName]..."
 tribal_federation_events.13.a:0 "Dieu est bon."
 tribal_federation_events.13.a.tt:0 "Nous avons obtenu une §GLégitimisation§! sur §Y[tribal_religion_province.GetName]§!."
 ADD_PASHA_BUTTON:0 "Nommer un pacha"
 REMOVE_PASHA_BUTTON:0 "Révoquer le pacha"
