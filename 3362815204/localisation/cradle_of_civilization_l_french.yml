 ghazis_from_abroad:0 "Ghazis"
 desc_ghazis_from_abroad:0 "Nous avons reçu un certain nombre de guerriers étrangers qui sont venus rejoindre la guerre contre les infidèles."
 sufi_shrine:0 "Sanctuaire soufi"
 desc_sufi_shrine:0 "C'est le site de la tombe d'un éminent cheikh soufi et du sanctuaire associé."
 foreign_shiite_urbanites:0 "Citadins chiites"
 desc_foreign_shiite_urbanites:0 "Des chiites urbains de pays lointains sont venus s'installer dans cette province, facilitant la croissance économique mais créant aussi des tensions avec les locaux qui ont parfois d'autres traditions."
 foreign_shiite_settlers:0 "Colons chiites"
 desc_foreign_shiite_settlers:0 "Des chiites de pays lointains sont venus peupler cette province, facilitant la croissance mais créant aussi des tensions avec la population locale plus traditionnelle."
 local_sufi:0 "Soufi influent"
 desc_local_sufi:0 "La société locale est sous la forte influence d'un soufi charismatique. Ce guide spirituel est loin de l'influence directe des Oulémas, mais il a néanmoins un grand nombre d'adeptes ici, dont beaucoup se tournent vers l'islam pour la première fois."
 local_sufi_chased_away:0 "Orthodoxie religieuse imposée"
 desc_local_sufi_chased_away:0 "Nous avons chassé un cheikh soufi local de cette région, bien qu'il soit très influent même parmi les non-musulmans, et imposé une orthodoxie plus stricte parmi la population locale fidèle."
 has_religious_scholars_trigger_tooltip:0 "A invité des érudits religieux."
 academic_respect:0 "Respect mutuel"
 ruler_overriding_ulema:0 "Conflit État-tribunal"
 desc_ruler_overriding_ulema:0 "En intervenant et en nous mêlant des tribunaux dans cette région, nous avons contrarié les juges locaux et par conséquent généré de la mauvaise volonté parmi la population."
 courtly_disorder:0 "Manipulation des tribunaux"
 desc_courtly_disorder:0 "Un marchand inhabituellement peu scrupuleux a pris l'habitude de manipuler les tribunaux religieux pour des bénéfices personnels, perturbant l'ordre de cette zone."
 upset_lodges:0 "Loges soufies contrariées"
 desc_upset_lodges:0 "Nous avons activement persécuté quiconque pouvait être vu comme flirtant avec des tendances chiites dans cette province et par conséquent nous avons grandement empiété sur les droits des loges soufies locales."
 agreed_with_mufti:0 "Cédé à la protestation sociale"
 desc_agreed_with_mufti:0 "Nous avons répondu aux protestations locales menées par un mufti influent en cédant à leurs demandes. Réduisant les tensions au prix de la perte de prestige de la garnison locale."
 disagreed_with_mufti:0 "Protestations sociales"
 desc_disagreed_with_mufti:0 "Les protestations sociales dans cette zone ont été renforcées par le soutien de l'établissement religieux local. Notre refus d'écouter les protestataires malgré tout a grandement enflammé les personnes impliquées."
 urban_decay:0 "Croissance entravée"
 desc_urban_decay:0 "La cité capitale de cette province a grandi trop vite pour que les institutions caritatives puissent suivre le nombre de pauvres."
 waqfs_donated:0 "Établissement de nouveaux Waqfs"
 desc_waqfs_donated:0 "Pour faire face à la croissance rapide des centres urbains de cette province, nous avons fait un certain nombre de nouvelles donations charitables, réduisant les revenus de l'État mais augmentant la capacité locale à s'occuper des pauvres."
 upkeep_of_holy_cities:0 "Entretien des sanctuaires sacrés"
 desc_upkeep_of_holy_cities:0 "C'est notre devoir de payer l'entretien des sanctuaires sacrés sous notre contrôle. Pour ce faire, nous avons mis de côté des terres dans tout notre domaine à cette fin."
 expanded_madrasah:0 "Madrasa renommée"
 desc_expanded_madrasah:0 "La madrasa locale est devenue assez renommée, attirant un grand nombre d'érudits de toute la région, contribuant grandement à la croissance de toute la zone."
 hampered_expansion_of_madrasah:0 "Expansion de la madrasa entravée"
 desc_hampered_expansion_of_madrasah:0 "La madrasa locale est devenue assez renommée. Les locaux n'ont cependant pas pu fournir les installations nécessaires pour soutenir une madrasa vraiment grande, ce qui a entravé le potentiel de croissance de la région."
 sought_sufi_sheikh:0 "Pèlerinage au tombeau d'un cheikh soufi"
 desc_sought_sufi_sheikh:0 "Notre dirigeant a gagné une grande notoriété en ayant cherché le tombeau d'un éminent cheikh soufi."
 ruler_not_favoring_sufis:0 "Défaveur envers les soufis"
 desc_ruler_not_favoring_sufis:0 "Notre dirigeant a refusé de donner une légitimité aux sanctuaires soufis dans notre pays, augmentant grandement son soutien de la part des Oulémas établis."
 alevi_modifier:0 "Alévis renforcés"
 desc_alevi_modifier:0 "Nous avons renforcé le pouvoir des Alévis locaux pour rendre la conversion de cette zone plus rapide et moins problématique."
 ulema_displeased:0 "Privilèges des Oulémas violés"
 desc_ulema_displeased:0 "Afin d'endiguer la corruption parmi les administrateurs des dotations religieuses, nous avons dû piétiner les droits des Oulémas."
 corrupt_sadrs:0 "Sadr corrompu"
 desc_corrupt_sadrs:0 "Certains de nos administrateurs des dotations religieuses se sont servis de l'argent qu'ils gèrent, et ont utilisé leur pouvoir pour s'assurer que leurs proches paient peu d'impôts."
 muslim_school_opinion_events.1.t:0 "Respect mutuel entre les [Root.GetReligiousSchool] et les [school_opinion_increase_country.GetReligiousSchool]"
 muslim_school_opinion_events.1.d:0 "Il n'y a jamais eu de différences théologiques valant un vrai conflit entre les écoles [Root.GetReligiousSchool] et [school_opinion_increase_country.GetReligiousSchool] et les deux coutumes coexistent souvent côte à côte.\nLa coopération de longue date entre les [Root.GetReligiousSchool] [Root.GetAdjective] et les États [school_opinion_increase_country.GetReligiousSchool] [school_opinion_increase_country.GetAdjective] a cependant conduit à une nouvelle ère de compréhension et de respect mutuels."
 muslim_school_opinion_events.1.a:0 "Dieu est grand."
 muslim_school_opinion_events.2.t:0 "Normalisation des relations entre les [Root.GetReligiousSchool] et les [school_opinion_increase_country.GetReligiousSchool]"
 muslim_school_opinion_events.2.d:0 "Pendant un certain temps, la relation entre les [Root.GetReligiousSchool] et les [school_opinion_increase_country.GetReligiousSchool] a été fortement colorée par la méfiance et le conflit. Certains érudits sont allés jusqu'à dénoncer les théologiens de l'autre école et leurs adeptes.\nCependant, les tensions ont été grandement réduites ces dernières années avec les érudits [Root.GetReligiousSchool] [Root.GetAdjective] et [school_opinion_increase_country.GetReligiousSchool] [school_opinion_increase_country.GetAdjective] montrant la voie vers la tolérance et la coexistence."
 muslim_school_opinion_events.2.a:0 "Dieu est grand."
 muslim_school_opinion_events.3.t:0 "Les Oulémas et la guerre [Root.GetAdjective] - [school_opinion_decrease_country.GetAdjective]"
 muslim_school_opinion_events.3.d:0 "Le conflit prolongé entre les [school_opinion_decrease_country.GetAdjective] et les [Root.GetAdjective] commence à déborder dans le domaine religieux. Le respect mutuel et la tolérance sont au plus bas et la pensée [school_opinion_decrease_country.GetReligiousSchool] est marginalisée dans la société [Root.GetAdjective]."
 muslim_school_opinion_events.3.a:0 "Scandaleux."
 muslim_school_events.1.t:0 "Un juge talentueux"
 muslim_school_events.1.d:0 "Acquérir une éducation en théologie et en droit est souvent un long processus impliquant l'étude d'œuvres classiques de droit, sous la tutelle des cheikhs de diverses madrasas. Pour chaque œuvre ou commentaire appris, l'étudiant acquiert un certificat, une Ijaza. Selon la madrasa et le cheikh, la valeur de l'Ijaza peut ne pas être nécessairement la même.\nUn homme savant particulier a dernièrement fait très bonne impression dans les madrasas du pays ; sans doute a-t-il une grande carrière de Qadi ou de Mufti devant lui."
 muslim_school_events.1.a:0 "J'entends dire que [mufti_province.GetAreaName] a besoin d'un nouveau Qadi."
 muslim_school_events.1.b:0 "Il apportera une orientation juridique à une génération comme Mufti à [Root.Capital.GetCapitalName]."
 muslim_school_events.2.t:0 "Le Cheikh-ul-Islam"
 muslim_school_events.2.d:0 "Là où les Qadis sont les juges du pays, les Muftis sont ceux qui fournissent l'interprétation et la doctrine juridiques générales. Un [Root.GovernmentName] aussi grand que le nôtre a cependant besoin d'une autorité supérieure sur tous les Muftis. Traditionnellement, c'est le rôle du Cheikh-ul-Islam.\nLe Cheikh-ul-Islam ne se contentera pas de rédiger lui-même des Fatwas, il sera aussi celui qui nommera beaucoup des Muftis régionaux dans notre royaume, et finalement c'est la personne qui garantira la légalité des édits de [Root.Monarch.GetTitle]. Naturellement, l'homme que nous choisirons appartiendra à l'école [Root.GetReligiousSchool], mais il y a un certain nombre de candidats distingués parmi lesquels choisir."
 muslim_school_events.2.a:0 "Élisons le Mufti le plus éminent et le plus loyal à ce poste"
 muslim_school_events.2.a.tt:0 "Un Cheikh-ul-Islam loyal prendra presque toujours le parti de [Root.Monarch.GetTitle] et augmentera les chances de soutien de l'établissement religieux."
 muslim_school_events.2.b:0 "Le candidat le plus savant et le plus ferme doit être nommé Cheikh-ul-Islam."
 muslim_school_events.2.b.tt:0 "Un Cheikh-ul-Islam pieux nous soutiendra tant que nous maintiendrons un règne pieux. Cela rendra aussi les événements liés à la volonté de nos érudits religieux plus courants."
 muslim_school_events.2.c:0 "Un soufi célèbre donnera à cette fonction la dignité qu'elle mérite."
 muslim_school_events.2.c.tt:0 "Un Cheikh-ul-Islam soufi nous soutiendra tant que nous soutiendrons le soufisme dans le royaume. Cela rendra aussi les événements liés au soufisme plus courants."
 muslim_school_events.3.t:0 "Nouvelle madrasa"
 muslim_school_events.3.d:0 "Des citoyens éminents de [madrassah_province.GetAreaName] ont fait un certain nombre de donations charitables pour l'établissement d'une nouvelle madrasa à [madrassah_province.GetCapitalName]. Ils ont invité des érudits non seulement de la région élargie de [madrassah_province.GetAreaName] mais aussi de [Root.Capital.GetCapitalName] et même des théologiens étrangers."
 muslim_school_events.3.a:0 "Merveilleux."
 muslim_school_events.4.t:0 "Ghazis"
 muslim_school_events.4.d:0 "Pendant des siècles, les guerres pour étendre la foi ont vu des groupes de « Ghazis », ou guerriers saints sur les frontières de l'islam, pillant les terres ennemies et renforçant les rangs des fidèles. Notre guerre contre les [infidel.GetAdjective] infidèles a attiré l'attention de tels guerriers. Ils sont venus rejoindre nos rangs pour prouver leur valeur comme guerriers saints, et peut-être pour la promesse de butin aussi."
 muslim_school_events.4.a:0 "Ils sont les bienvenus."
 muslim_school_events.5.t:0 "Garde de [holy_city.GetCapitalName]"
 muslim_school_events.5.d:0 "Chaque année, la cité sainte de [holy_city.GetCapitalName] a vu une augmentation du nombre de pèlerins qui cherchent les sanctuaires là-bas. Les fidèles viennent de tous les coins du monde islamique, apportant commerce, marchandises, capital, nouvelles et idées de lieux lointains à nos ports."
 muslim_school_events.5.a:0 "Dieu est bon."
 muslim_school_events.6.t:0 "Migration chiite"
 muslim_school_events.6.d:0 "Bien que le chiisme soit répandu dans le monde islamique, la plupart des chiites vivent dans des terres gouvernées par des États sunnites ou même non-musulmans. Pour survivre, nos frères de foi doivent souvent adopter une politique de Taqiyya, prétendant délibérément se distancer de la foi chiite. En tant que l'un des rares [Root.GovernmentName] chiites, nous en sommes venus à attirer des membres de la foi qui ne veulent plus vivre leur vie spirituelle dans le secret. Beaucoup d'entre eux sont des membres de la société à la fois savants et productifs."
 muslim_school_events.6.a:0 "Accueillons-les dans nos cités."
 muslim_school_events.6.b:0 "Envoyons-les peupler la frontière."
 muslim_school_events.7.t:0 "Syncrétisme soufi"
 muslim_school_events.7.d:0 "Les soufis, avec leur approche mystique et moins légaliste de l'islam, sont souvent plus bienvenus parmi les païens que les Oulémas hautement éduqués ou les soldats de la foi. Manifestant leur piété de d'autres façons comme la danse, le chant et en mélangeant les traditions islamiques avec les locales, les soufis ne sont pas toujours en bons termes avec l'établissement religieux.\nUn chef soufi a réussi à obtenir un grand nombre d'adeptes en [sufi_province.GetName], avec un grand nombre de convertis [sufi_province.Religion.GetName] rejoignant ses disciples. Ses adeptes défrichent des terres pour de nouveaux établissements où ils pourraient vivre ensemble et cela pourrait bien mener à une influence islamique beaucoup plus grande dans toute la zone. Beaucoup parmi les Oulémas demandent que nous le renvoyions, car ils craignent qu'il n'égare les vrais fidèles et ne brouille la ligne entre l'islam et la foi [sufi_province.Religion.GetName]."
 muslim_school_events.7.a:0 "Il fait l'œuvre de Dieu."
 muslim_school_events.7.b:0 "Il devra faire sa prédication ailleurs."
 muslim_school_events.8.t:1 "Des théologiens étrangers enrichissent l'érudition"
 muslim_school_events.8.d:0 "Les théologiens que nous avons invités dans notre pays en sont venus à grandement enrichir l'érudition religieuse locale. Ils ont laissé leur marque sur notre pays et inspiré une nouvelle génération d'Oulémas."
 muslim_school_events.8.a:0 "J'ai besoin d'eux à [Root.Capital.GetCapitalName]."
 muslim_school_events.8.b:0 "Ils trouveront leur place dans tout notre pays."
 muslim_school_events.9.t:0 "Théologiens [scholar_country.GetReligiousSchool]"
 muslim_school_events.9.d:0 "En donnant à des érudits [scholar_country.GetAdjective] dans nos madrasas, nous améliorons non seulement la discussion théologique dans notre pays mais aussi nos liens avec [Root.GovernmentName] de [scholar_country.GetName]."
 muslim_school_events.9.a:0 "Excellent."
 muslim_school_events.10.t:0 "Désaccord des érudits religieux"
 muslim_school_events.10.d:0 "Tous les théologiens ne sont pas d'accord. Normalement, ce n'est pas un gros problème, car le désaccord peut exister sans problème dans le monde savant. Parfois, les désaccords prennent une forme plus personnelle cependant ; certains diraient que c'est ainsi que nos érudits invités en sont venus à être en désaccord avec une grande partie de notre établissement religieux, causant beaucoup de tort à notre réputation internationale."
 muslim_school_events.10.a:0 "Malheureux."
 muslim_school_events.11.t:0 "Manipulation des tribunaux"
 muslim_school_events.11.d:0 "Bien que l'école [Root.GetReligiousSchool] soit l'école officiellement sanctionnée de [Root.GovernmentName], il y a de nombreux tribunaux et Qadis dans nos terres et les quatre écoles de foi sont considérées comme appropriées pour les procédures civiles. Cela signifie que dans une certaine mesure, il est possible de « manipuler les tribunaux » en portant une affaire devant un Qadi d'une école considérée comme plus susceptible de donner une décision favorable à un cas spécifique.\nUn marchand entreprenant à [shiites_here.GetCapitalName] est devenu si doué pour cela que cela a mis en colère non seulement la population locale et ses concurrents commerciaux, mais aussi le gouverneur local. Il n'y a pas grand-chose que nous puissions faire à ce sujet sans empiéter sur les privilèges des Oulémas."
 muslim_school_events.11.a:0 "Assurons-nous simplement que cet homme soit traité."
 muslim_school_events.11.b:0 "Le pragmatisme doit passer avant la théologie."
 muslim_school_events.12.t:0 "Taqiyya"
 muslim_school_events.12.d:0 "Pendant des siècles, de nombreux adeptes d'Ali ont considéré comme une nécessité de se cacher et de feindre l'adhésion à d'autres coutumes religieuses afin de maintenir leur foi vivante. Les autorités en [shiites_here.GetName] soupçonnent de plus en plus qu'il y a un nombre croissant de chiites parmi les loges soufies locales, et aimeraient notre bénédiction dans leurs tentatives de les éradiquer."
 muslim_school_events.12.a:0 "Nous ne pouvons pas tolérer les hérétiques !"
 muslim_school_events.12.b:0 "Nous devons respecter les loges soufies."
 muslim_school_events.13.t:0 "Protestations en [protest_province.GetName]"
 muslim_school_events.13.d:0 "En tant qu'hommes de grande force spirituelle, mais aussi fermement partie de l'établissement, les membres des Oulémas choisissent parfois de rejoindre des protestations sociales. Une altercation récente entre la garnison locale et la population urbaine en [protest_province.GetName] a attiré l'attention d'un Mufti éminent dans l'État de [protest_province.GetAreaName].\nNotre commandant local craint que la situation ne s'aggrave à moins que nous n'écoutions les protestataires, mais le faire aurait un coût."
 muslim_school_events.13.a:0 "Compensons le peuple de [protest_province.GetName]."
 muslim_school_events.13.b:0 "Mufti ou pas, il n'y a rien que nous puissions faire."
 muslim_school_events.14.t:0 "Les pauvres de [urbanization_province.GetCapitalName]"
 muslim_school_events.14.d:0 "À mesure que les cités grandissent, les anciennes commodités et murs qui les soutenaient autrefois se dégradent. À [urbanization_province.GetCapitalName], cela a conduit avec le temps au changement. Les ateliers moins propres, comme ceux des tanneurs, ont déménagé au-delà des murs de la cité, tout comme les cimetières. Plus visible, cependant, est le nombre croissant de pauvres dans les rues. Comme les œuvres de charité existantes n'ont pas pu suivre la croissance rapide de la cité, il a été suggéré que nous réservions plus de propriétés d'État comme Waqf, donations charitables pour l'entretien de soupes populaires et de bains publics."
 muslim_school_events.14.a:0 "Nous soutiendrons naturellement une telle cause."
 muslim_school_events.14.b:0 "Les notables locaux peuvent sûrement se permettre la charité de leur propre poche ?"
 muslim_school_events.15.t:0 "La cité de [holy_city.GetCapitalName]"
 muslim_school_events.15.d:0 "En tant que gardiens des mosquées saintes de [holy_city.GetCapitalName], nous sommes responsables non seulement du sanctuaire sacré. Un État qui revendique cet honneur est aussi censé subvenir aux besoins de la population des cités saintes ainsi qu'aux pèlerins qu'elles attirent. À cette fin, de nombreux dirigeants ont consacré de grandes ressources, tant au sein des cités elles-mêmes que de vastes étendues de terres agricoles lointaines, afin de nourrir et d'entretenir la zone.\nCertains disent que [Root.Monarch.GetName] n'a pas accordé à ces cités l'attention qu'elles méritent, que les pèlerins ne sont plus en sécurité et qu'il y a un grand besoin dans les rues de [holy_city.GetCapitalName]."
 muslim_school_events.15.a:0 "Réservons plus de terres pour leur entretien."
 muslim_school_events.15.b:0 "Malheureusement, nous n'avons plus de ressources à épargner en ce moment."
 muslim_school_events.16.t:0 "Expansion de la madrasa de [madrasa_province.GetCapitalName]"
 muslim_school_events.16.d:0 "La madrasa de [madrasa_province.GetCapitalName] gagne en réputation, non seulement comme centre d'apprentissage [Root.GetReligiousSchool], mais aussi pour ses cheikhs d'autres écoles. Les érudits [Root.GetReligiousScholars] d'autres parties du monde se sont particulièrement fait un nom à la madrasa de [madrasa_province.GetCapitalName] et par conséquent, tant l'institution elle-même, que le quartier du marché adjacent et la cité animée dans son ensemble croissent rapidement.\nLa croissance urbaine n'est jamais sans ses problèmes, cependant, et une madrasa croissante doit encore être pourvue. Si [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself] mettait de côté une donation charitable plus importante pour l'entretien et la maintenance d'une plus grande madrasa, cela bénéficierait tant à la cité qu'à la zone environnante."
 muslim_school_events.16.a:0 "Nous devons contribuer à cette entreprise."
 muslim_school_events.16.b:0 "Les locaux peuvent les nourrir et payer pour eux."
 muslim_school_events.17.t:0 "Dargah"
 muslim_school_events.17.d:0 "Un cheikh soufi est décédé en [dargah_province.GetName] et ses adeptes érigent maintenant un sanctuaire en son honneur. Des pèlerins de diverses parties du pays commencent déjà à venir dans la province pour voir le sanctuaire de ce grand homme, certains l'appelant un saint. Les notables locaux ont mis de côté une donation charitable pour son entretien et ses anciens élèves ont ouvert une loge à proximité.\nBien qu'il n'y ait rien de mal à honorer un grand homme, certains parmi les plus traditionalistes des pieux et des Oulémas estiment que cette forme de culte est sacrilège.\nSi [Root.Monarch.GetName] visitait le sanctuaire en [dargah_province.GetName], cela pourrait faire beaucoup, tant pour le prestige du sanctuaire lui-même que pour [Root.Monarch.GetHerHis] perception populaire."
 muslim_school_events.17.a:0 "Cherchons conseil en ce lieu saint."
 muslim_school_events.17.b:0 "Nous ne devons pas nourrir la superstition locale."
 muslim_school_events.18.t:0 "Les Alévis de [alevi_province.GetName]"
 muslim_school_events.18.d:0 "Bien qu'ils ne soient pas nos frères de foi directs, un grand nombre parmi les tribus turques d'Anatolie sont des Alévis chiites. Comme les Jafarites, les Alévis sont des duodécimains et croient en la venue du Douzième Imam. Leur foi est aussi profondément enracinée dans le mysticisme et le soufisme. Sous la domination sunnite, ils ont été forcés de vivre une vie à bien des égards recluse de la société, ils n'ont pas été autorisés à se marier avec les sunnites et ils ont été méfiés par l'État.\nBeaucoup parmi les habitants de [alevi_province.GetName] sont des Alévis, et ils nous ont généralement accueillis comme leurs nouveaux suzerains. Leurs traditions mystiques sont à bien des égards différentes des nôtres, mais si nous embrassions ces gens, nous pourrions probablement répandre la foi chiite beaucoup plus rapidement dans la zone."
 muslim_school_events.18.a:0 "Renforçons nos frères de foi dans la zone."
 muslim_school_events.18.b:0 "Bien que nous les accueillions, l'administration restera entre les mains des autorités locales."
 muslim_school_events.19.t:0 "Les Oulémas mondains"
 muslim_school_events.19.d:0 "Tous les membres des Oulémas ne sont pas de grands théologiens ou intellectuels. La corruption peut croître dans n'importe quel coin de l'État et pour certains, il peut être difficile de distinguer ce qui bénéficie à la foi de ce qui pourrait leur bénéficier à eux-mêmes. Il est venu à l'attention de [Root.Monarch.GetName] qu'un certain nombre de donations pieuses qui existent dans l'empire ont été obtenues par fraude ou illégalement transmises à des héritiers. Notre vizir a suggéré que nous inspections et vérifiions toutes ces donations dans [Root.GovernmentName], en particulier dans les régions qui n'étaient pas originellement gouvernées par nous.\nCe serait clairement un grave affront aux Oulémas, cependant, qui le verraient comme un empiètement sur leurs privilèges et une attaque contre leur caste dans son ensemble."
 muslim_school_events.19.a:0 "Quelques transgressions ne sont rien comparées à ce que ces hommes nous donnent."
 muslim_school_events.19.b:0 "Seuls les traîtres ont quelque chose à craindre."
 muslim_school_events.20.t:0 "Le Madhab de [Root.GetName]"
 muslim_school_events.20.d:0 "En tant que jeune pays, nous ne patronnons pas encore d'école religieuse particulière. Bien qu'il y ait de nombreuses façons de suivre Dieu, nous devrions avoir une doctrine directrice spécifique à suivre pour nos dirigeants."
 muslim_school_events.20.a:0 "D'accord."
 muslim_school_events.20.b:0 "Suivons l'école d'Abu Hanifa."
 muslim_school_events.20.c:0 "Il n'y a que la voie des Hanbalites."
 muslim_school_events.20.dd:0 "Malik ibn Anas a montré la bonne voie."
 muslim_school_events.20.e:0 "Les enseignements de l'Imam al-Shafi'i sont les plus pertinents."
 muslim_school_events.20.f:0 "L'école jafarite nous durera jusqu'à l'arrivée du Mahdi."
 muslim_school_events.20.g:0 "Ismail ibn Jafar et ses adeptes seront nos guides."
 muslim_school_events.20.h:0 "Ne cachons jamais nos principes ! Nous devons suivre les enseignements de Zaid ibn Ali."
 muslim_school_events.21.t:0 "Néo-soufisme et réaction traditionaliste"
 muslim_school_events.21.d:0 "Beaucoup parmi les Oulémas sont de plus en plus mécontents de [Root.Monarch.GetTitle]. Parmi les musulmans pieux, notre inclusion de païens dans les hautes fonctions ainsi que l'adoption de coutumes et traditions païennes sont vues avec mépris. Les intrusions de l'État dans l'interprétation du droit et d'autres domaines traditionnels des Oulémas n'ont pas non plus valu d'amis à l'État parmi les juristes du royaume.\nDes cheikhs charismatiques de l'ordre soufi Naqshbandi ont commencé à agiter contre l'État ce qu'ils considèrent comme une mise en œuvre fautive, et dans certains cas pécheresse, de la loi islamique dans notre royaume."
 muslim_school_events.21.a:0 "Ils sont malheureusement égarés."
 muslim_school_events.21.a.tt:0 "Désormais, l'établissement religieux réagira plus fortement à la conduite impie de [Root.Monarch.GetTitle]."
 muslim_school_events.21.a.ttb:0 "Les §YOulémas§! s'attendront désormais à recevoir plus de terres."
 muslim_school_events.22.t:0 "Wahhabisme"
 muslim_school_events.22.d:0 "Un mouvement croissant parmi les Oulémas hanbalites de [Root.GovernmentName] de [Root.GetName] prône un retour à une foi plus pure. Ils s'opposent fortement à toutes les innovations aux coutumes du prophète, et à tout ce qui ne fait pas partie des sources littéraires de la loi islamique. S'opposant fortement à toutes les formes de soufisme, de culte des saints ou de traditions non-islamiques, ils promettent d'apporter une société plus véritablement religieuse à tous ceux qui embrassent leurs enseignements."
 muslim_school_events.22.a:0 "Intéressant."
 muslim_school_events.22.a.tt:0 "Il est maintenant possible pour les fédérations tribales de changer d'école pour l'école hanbalite."
 muslim_school_events.23.t:0 "Sanctuaires soufis"
 muslim_school_events.23.d:0 "La pratique de patronner ou même de pourvoir aux sanctuaires liés aux tombeaux de soufis célèbres a longtemps été un point de discorde majeur pour les Oulémas. Avec une génération plus traditionaliste prenant le pouvoir, ils font maintenant pression sur notre dirigeant pour tenter de réprimer cette coutume."
 muslim_school_events.23.a:0 "Nous devons faire ce qu'ils demandent."
 muslim_school_events.23.b:0 "Non. Les anciens maîtres étaient de grands hommes !"
 EST_VAL_NEO_SUFISM:1 "Néo-soufisme et traditionalisme : §Y$VAL$%§!"
 compile_x_fiqh_title:0 "Compiler le Fiqh [Root.GetReligiousSchool]"
 compile_x_fiqh_desc:0 "Il n'est pas toujours clair, même pour les plus savants des Oulémas, comment appliquer au mieux la Charia et au cours des siècles, un grand nombre de décisions contradictoires en sont venues à exister dans certains domaines. Si nous passions un temps et un effort considérables à permettre aux meilleurs esprits du royaume de compiler et d'écrire une revue complète du Fiqh [Root.GetReligiousSchool], ce serait probablement une aide immense pour tous les Qadis et Muftis de notre royaume."
