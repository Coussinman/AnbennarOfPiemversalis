 efficient_tax_farming_modifier:0 "Affermage fiscal efficace"
 desc_efficient_tax_farming_modifier:0 "Les fermes fiscales sont à bien des égards le moyen le plus efficace d'exploiter les ressources de notre pays. En vendant le droit d'extraire des profits de diverses parties de notre domaine, nous pouvons être assurés d'un revenu régulier et garanti, tandis que le fermier fiscal lui-même a toutes les raisons de faire produire encore plus à la terre."
 land_acquisition_modifier:0 "Acquisition de terres"
 desc_land_acquisition_modifier:0 "Par une récupération efficace de terres auparavant inutilisées et l'intégration de terres auparavant sans propriétaire, nous sommes en mesure de tirer profit beaucoup plus rapidement même à la périphérie de notre État."
 lenient_taxation_modifier:0 "Fiscalité clémente"
 desc_lenient_taxation_modifier:0 "Un sujet surtaxé est enclin à la dissidence, voire à la rébellion. En allégeant les fardeaux que nous imposons à nos États voisins, nous avons gagné leur gratitude."
 train_horsemanship_modifier:0 "Équitation entraînée"
 desc_train_horsemanship_modifier:0 "Peu de cavaliers sont aussi compétents que les nôtres et peu de races de chevaux sont aussi fiables et adaptées à la guerre. Nous devons toujours travailler activement sur notre équitation, par des compétitions, des entraînements, de petits raids et même dans la guerre elle-même."
 promote_culture_in_government_modifier:0 "Culture promue au gouvernement"
 desc_promote_culture_in_government_modifier:0 "Notre sage Sultan a choisi de promouvoir ceux qui l'ont soutenu dans la lutte de succession. Grâce à ses politiques avisées, une région entière peut maintenant prospérer."
 seize_clerical_holdings_modifier:0 "Pratique des bonnes œuvres"
 desc_seize_clerical_holdings_modifier:0 "TEMP - À MODIFIER - Il y a une variété de donations charitables et de propriétés cléricales dans cette terre qui ont été accordées pour de mauvaises raisons par nos prédécesseurs. Nous devons agir pour réduire la corruption dans ce système et restituer les propriétés cléricales à l'État, le gardien suprême de ce qui est juste et faux dans notre pays."
 invite_minorities_modifier:0 "Prudence encouragée"
 desc_invite_minorities_modifier:0 "TEMP - À MODIFIER - Agissant comme un refuge sûr pour nos frères de foi dans un monde dangereux, nous les avons tous invités à s'installer sur nos terres. Ici, ils peuvent construire une nouvelle vie tout en contribuant à l'essor de notre État."
 ideagroups.111.b:0 "Faisons de notre mieux pour réaliser ces idées !"
 army_professionalism_events.1.t:0 "Sac de [From.GetCapitalName]"
 army_professionalism_events.1.d:0 "Traditionnellement, les armées en marche sont censées se ravitailler à partir de ce qu'elles peuvent piller dans la zone qu'elles traversent. C'est souvent le seul moyen pour les soldats de survivre en temps de guerre car les paiements du trésor de [Root.GovernmentName] peuvent rarement être acheminés à temps aux hommes. En fait, en payant rétroactivement, beaucoup évitent aussi la charge de payer pour les tombés au combat.\nLorsque [From.GetCapitalName] est tombée, il était donc attendu que nos soldats soient autorisés à piller la cité pour s'enrichir. Ce qui était moins attendu était la destruction totale et absolue de la cité qui a eu lieu. Refusant de suivre les ordres, nos hommes se sont abattus sur les bourgeois sans défense, commettant des actes méprisables et ruinant la région pour longtemps."
 army_professionalism_events.1.a:0 "Nous devons punir les coupables !"
 army_professionalism_events.1.b:0 "Nous avons besoin de meilleures procédures de paiement et d'une discipline plus stricte !"
 army_professionalism_events.1.c:0 "Telles sont les règles de la guerre."
 army_professionalism_events.2.t:0 "[Root.GetCapitalName] pillée !"
 army_professionalism_events.2.d:0 "Suite à la chute de [Root.GetCapitalName], les armées de [From.GetName] ont dévasté la cité et la campagne environnante."
 army_professionalism_events.2.a:0 "Barbares !"
 army_professionalism_events.3.t:0 "Le sac de [Root.GetCapitalName]"
 army_professionalism_events.3.d:1 "Alors que la cité de [Root.GetCapitalName] tombait aux mains de l'ennemi, les armées [From.GetAdjective] en progression se sont livrées à plusieurs jours de pillage. À l'intérieur des murs de la cité, une ruine fumante est tout ce qui reste de la cité autrefois florissante et les survivants cherchent refuge aussi loin qu'ils le peuvent."
 army_professionalism_events.3.a:0 "Notre peuple n'oubliera jamais les atrocités de [From.GetName] !"
 army_professionalism_events.4.t:0 "Salaires retardés"
 army_professionalism_events.4.d:0 "La campagne en [enemy_country.GetName] a rencontré de graves problèmes logistiques. Alors que la saison du paiement des salaires approche, il devient évident que nous ne pourrons pas payer toutes les troupes car il n'y a tout simplement aucun moyen pour que l'argent leur parvienne à temps. Nos généraux blâment les raids constants de l'ennemi sur le train de bagages et insistent sur le fait qu'ils avaient tout planifié en détail, mais le problème est maintenant celui de [Root.Monarch.GetName] à résoudre.\nSi nous ne payons qu'une fraction de nos troupes, beaucoup déserteront sans doute.\nNous pourrions aussi choisir de n'en payer aucune et leur dire de vivre de la terre, mais cela dévasterait probablement toute la région."
 army_professionalism_events.4.a:0 "Nous devons payer les troupes d'élite"
 army_professionalism_events.4.b:0 "Qu'ils vivent de la terre"
 army_professionalism_events.5.t:0 "Les nombreux métiers d'un soldat"
 army_professionalism_events.5.d:0 "La paix prolongée et les changements dans l'économie ont conduit beaucoup de nos soldats salariés à ne plus considérer les pensions que nous leur payons comme suffisantes. Un nombre croissant d'entre eux se sont tournés vers d'autres travaux quotidiens comme la tenue de boutiques ou l'artisanat, gagnant mieux leur vie dans leurs foyers citadins.\nBien que cela puisse stimuler l'économie locale, cela signifie que ces soldats n'entretiennent plus ni ne s'exercent plus avec l'équipement que nous leur avons fourni. Afin d'arrêter cette tendance, nous devrions augmenter leur solde substantiellement."
 army_professionalism_events.5.a:0 "Ils ne doivent pas être autorisés à toucher à d'autres occupations."
 army_professionalism_events.5.b:0 "Nous le permettrons pour l'instant."
 army_professionalism_events.6.t:0 "Talent étranger"
 army_professionalism_events.6.d:0 "Nos instructeurs sont admiratifs des armées [professional_country.GetAdjective] et des méthodes qu'elles ont employées avec tant de succès pour organiser les routines et pratiques de l'armée. Nous ne sommes pas les seuls à l'avoir remarqué, les officiers [professional_country.GetAdjective] sont très demandés dans de nombreux pays. Bien sûr, [professional_country.GetStateForm] de [professional_country.GetName] ne voit pas d'un bon œil ceux de ses officiers qui chercheraient un emploi à l'étranger et désapprouverait probablement si nous essayions d'en attirer.\nCela ne signifie pas, cependant, qu'il n'y a pas d'individus qui seraient intéressés par une telle opportunité de carrière, si nous en valions la peine."
 army_professionalism_events.6.a:0 "Engager des officiers [professional_country.GetAdjective]"
 army_professionalism_events.6.b:0 "Continuons à compter sur notre propre peuple."
 army_professionalism_events.7.t:0 "Infiltration de [From.GetName]"
 army_professionalism_events.7.d:1 "Notre professionnalisme militaire a rendu nos officiers retraités ou déserteurs très attractifs pour les autres pays de la région. À tel point qu'ils ne vérifient pas correctement les transfuges qu'ils recrutent.\nNotre maître-espion rapporte que nous avons réussi à placer un certain nombre d'agents au service de [From.GetStateForm] [From.GetAdjective]."
 army_professionalism_events.7.a:0 "Excellent..."
 army_professionalism_events.8.t:0 "Manœuvres militaires"
 army_professionalism_events.8.d:0 "Nos généraux nous ont demandé des fonds pour mener un exercice militaire massif sur le terrain afin de reconstituer l'une des grandes batailles de [Root.GetOldEra]. Ce serait assez coûteux et prendrait beaucoup de leur temps, mais ils insistent sur le fait que cela leur fournirait des informations précieuses, serait un bon moyen d'entraîner les troupes et peut-être aussi d'intimider nos voisins."
 army_professionalism_events.8.a:0 "Les autoriser à reconstituer la bataille."
 army_professionalism_events.8.b:0 "Nous leur donnerons bientôt une vraie guerre pour tester leurs théories."
 army_professionalism_events.9.t:0 "Entrepreneurs privés"
 army_professionalism_events.9.d:0 "En raison du manque de structures permanentes, de nombreuses armées comptent sur des entrepreneurs privés pour fournir tout, de l'équipement à des régiments entiers. Habituellement, ces entrepreneurs reçoivent une somme à l'avance qu'ils peuvent ensuite utiliser pour se procurer ce dont l'armée a besoin rapidement. Cela fonctionne souvent bien pour répondre aux besoins rapidement changeants de nos troupes pendant les campagnes, mais il y en a qui profiteraient du système.\nAlors que nos armées en [enemy_country.GetName] avancent plus profondément en territoire ennemi, il y a de plus en plus de rapports de corruption et de coopération injustifiée entre nos officiers logistiques et les entrepreneurs locaux. Si nous voulons maintenir l'efficacité, nous devons éradiquer ces pratiques, mais à court terme, nous risquons de perturber le système encore plus en luttant contre la corruption."
 army_professionalism_events.9.a:0 "Éradiquer la gangrène !"
 army_professionalism_events.9.b:0 "Nous devrons laisser faire."
 army_professionalism_events.10.t:0 "Une carrière militaire"
 army_professionalism_events.10.d:0 "Avec la croissance de notre armée professionnelle, de nouvelles opportunités de carrière abondent pour ceux qui ont du talent et de l'ambition. L'ancienne [Root.GetNoblesReplacementForOtherGovernments], cependant, s'attend toujours à recevoir toutes les commissions les plus précieuses par tradition et les siècles pendant lesquels leurs lignées ont servi fidèlement [Root.GetStateForm].\nCertains de nos officiers supérieurs nous implorent maintenant d'ouvrir plus d'opportunités pour que les hommes compétents s'élèvent dans les rangs, tandis que d'autres s'y opposent véhémentement et maintiennent qu'il y a des qualités que seul le sang peut assurer."
 army_professionalism_events.10.a:0 "Nous devons sauvegarder les traditions anciennes de notre corps d'officiers."
 army_professionalism_events.10.b:0 "Nous pouvons faire de la place pour les nouveaux venus dans les échelons supérieurs de la hiérarchie."
 army_professionalism_events.11.t:0 "Esprit de corps"
 army_professionalism_events.11.d:1 "La tension que le mode de vie militaire impose aux hommes qui servent peut, dans de bonnes circonstances, mener au développement d'un esprit d'appartenance et de coopération qui renforce considérablement les forces armées. Pendant le récent conflit avec [enemy_country.GetName], nous avons vu des signes clairs que nos troupes travaillent mieux ensemble et qu'elles ont formé de forts liens de loyauté et de devoir envers [Root.GetStateForm] [Root.GetAdjective] qui auraient semblé difficiles à imaginer il y a quelques années."
 army_professionalism_events.11.a:0 "C'est ce qui distingue les troupes [Root.GetAdjective] de toutes les autres."
 army_professionalism_events.12.t:0 "Manque d'officiers"
 army_professionalism_events.12.d:0 "Afin de maintenir une armée professionnelle importante efficace, un nombre suffisant d'officiers formés est nécessaire pour exécuter les ordres et la volonté de [Root.GetStateForm]. Cependant, la demande accrue de leadership de qualité n'est pas égalée par le nombre d'officiers sur nos rôles.\nAvec des exigences accrues sur la qualité, les nouveaux officiers prennent aussi plus de temps à former et sont plus difficiles à recruter."
 army_professionalism_events.12.a:0 "Raccourcir la formation."
 army_professionalism_events.12.b:1 "Nous surmonterons cela avec le temps."
 army_professionalism_events.13.t:0 "Milices locales"
 army_professionalism_events.13.d:0 "De nombreuses tâches militaires ne sont pas effectuées par les armées professionnelles de [Root.GetStateForm] mais plutôt par des milices locales basées autour des cités, châteaux et forts dans les diverses parties de notre pays. Ces milices connaissent souvent bien la région locale et offrent un très bon rapport qualité-prix comme garnisons, éclaireurs et collecteurs de renseignements, mais leur qualité comme troupes régulières est très variable pour le moins.\nIl a été suggéré que nous envoyions des soldats professionnels pour au moins instruire toutes les milices du pays et que nous comptions moins sur elles lors des opérations dans de nombreuses zones. Cela conduirait, selon nos généraux, à une augmentation de la qualité et nous rendrait moins vulnérables aux choses que nous ne pouvons pas contrôler. Cela signifierait cependant aussi très probablement le licenciement d'un grand nombre de nos troupes de réserve."
 army_professionalism_events.13.a:0 "Nous avons besoin des milices."
 army_professionalism_events.13.b:0 "Ne comptons pas sur les capacités locales."
 army_professionalism_events.14.t:0 "Les feux de l'industrie"
 army_professionalism_events.14.d:0 "Les besoins croissants de notre armée professionnelle ont eu un effet profond sur les affaires locales à [Root.GetCapitalName]. Les manufactures dans et autour de la cité peuvent à peine suivre la demande croissante et tant les investisseurs que les travailleurs affluent maintenant de tout notre pays vers [Root.GetName] pour développer les affaires."
 army_professionalism_events.14.a:0 "Les fonderies de [Root.GetCapitalName] approvisionneront la nation !"
 army_professionalism_events.15.t:0 "Croissance des villes de garnison"
 army_professionalism_events.15.d:0 "Alors que l'armée devient un moyen de gagner sa vie pour un nombre croissant de nos sujets, les cités qui abritent les installations et casernes de l'armée commencent à croître sous la supervision des ingénieurs et rénovateurs de l'armée. En [Root.GetName], la croissance de [Root.GetCapitalName] en est venue à bénéficier à toute la province."
 army_professionalism_events.15.a:0 "Excellent."
 army_professionalism_events.16.t:0 "Trahison contre [Root.GetDefiniteArticleBeforePluralCountry][Root.GetName]"
 army_professionalism_events.16.d:0 "Le recrutement est par nécessité quelque chose qui doit être une affaire quelque peu décentralisée. Souvent, il sera confié à [Root.GetNoblesReplacementForOtherGovernments] dans la capitale, et ils sont ensuite responsables de rassembler un nombre défini d'hommes dans les diverses provinces sous notre contrôle.\nC'est un système qui repose dans une certaine mesure sur la confiance car le gouvernement central n'est pas impliqué dans les détails du rassemblement de campagne, et la seule forme de contrôle que nous avons sont les inspections, souvent sporadiques, que l'armée elle-même mène. Une telle inspection en [cheating_rolls.GetName] a mis au jour un scandale local assez important. Les rôles que nous avons pour la zone sont pleins de noms fictifs et personne ne semble savoir ce que nous pourrions réellement rassembler de la région."
 army_professionalism_events.16.a:0 "C'est malheureux."
 army_professionalism_events.16.b:0 "Nous devons punir le coupable et mener notre propre enquête."
 army_professionalism_events.17.t:0 "Prolifération du mousquet"
 army_professionalism_events.17.d:0 "Alors que les armes à feu sont devenues monnaie courante, nos anciens régiments de troupes d'élite ne remplissent plus la même fonction de tireurs d'élite et de pionniers. Ils ont beaucoup fait pour développer nos armées au fil du temps, et ils seront maintenant dispersés parmi nos autres régiments."
 army_professionalism_events.17.a:0 "D'accord."
 hanafi_school:0 "Hanafite"
 hanafi_school_desc:0 "Le Madhab hanafite est nommé d'après Abu Hanifa No'man bin Tabet. L'école est originaire de Koufa et est prééminente dans tout le monde perse et turc, y compris le nord de l'Inde. Bien que les sources textuelles du Coran et des Hadiths aient la préférence, les Hanafites ont une vision inclusive des sources et emploient également l'analogie (Qiyas), l'Istihsan et les coutumes locales (Urf) dans leur jurisprudence. Certains la considèrent comme la plus flexible des écoles."
 hanbali_school:1 "Hanbalite"
 hanbali_school_desc:1 "Le Madhab hanbalite est nommé d'après Ahmad ibn Hanbal et défend l'abstention de toute théologie spéculative, le Kalam. Les Hanbalites maintiennent que le Coran et la Sunna sont les seules sources appropriées de jurisprudence et qu'ils doivent être interprétés dans un sens littéral et traditionaliste. Bien qu'elle soit acceptée comme un Madhab valide, très peu d'États promeuvent activement l'école hanbalite, et elle a été interdite par les califes abbassides."
 maliki_school:0 "Malékite"
 maliki_school_desc:0 "Le Madhab malékite est nommé d'après Malik Ibn Anas et est prééminant en particulier en Afrique du Nord et en Ibérie. La jurisprudence est principalement basée sur le travail et les interprétations d'ibn Anas et de son élève Sahnun tels que décrits dans l'al-Muwatta et le Mudawwanah. L'un des principaux centres d'apprentissage au sein de l'école malékite est la Grande Mosquée de Kairouan, près de Tunis."
 shafii_school:0 "Chaféite"
 shafii_school_desc:0 "Le Madhab chaféite est nommé d'après l'Imam Al-Shafi'i, et il est prééminant en particulier parmi les musulmans d'Arabie, d'Afrique de l'Est et d'Asie de l'Est. C'était autrefois la doctrine officielle des sultanats seldjoukide, ayyoubide et mamelouk. Contrairement aux autres Madhabs, le chaféite rejette l'Istihsan et l'Istislah comme sources de la Charia, s'appuyant uniquement sur ce qui est textuellement dans le Coran ou les Hadiths."
 ismaili_school:0 "Ismaélien"
 ismaili_school_desc:0 "L'ismaélisme est nommé d'après Ismai'l ibn Jafar, le successeur de Ja'far al-Sadiq, et était l'école de foi dominante dans le sultanat fatimide mais a perdu beaucoup de terrain depuis sa chute. L'ismaélisme englobe un certain nombre de branches de plus en plus divergentes, comme les Musta'li et les Nizari, et à bien des égards, ils se concentrent davantage sur les éléments ésotériques de la foi chiite que les Jafaris ou les Zaïdites."
 jafari_school:0 "Jafarite"
 jafari_school_desc:0 "Le Madhab jafarite est nommé d'après Ja'far al-Sadiq, le sixième Imam, et ses adeptes sont des chiites « duodécimains ». Les duodécimains croient qu'Ali, le successeur de Mahomet, a été suivi de douze Imams infaillibles choisis par décret divin. Le dernier des Imams, al-Mahdi, est attendu pour revenir comme le sauveur de l'humanité, imposant finalement la justice et la paix dans le monde."
 zaidi_school:0 "Zaïdite"
 zaidi_school_desc:0 "Les Zaïdites sont nommés d'après Zaid ibn Ali, le petit-fils du fils de Mahomet Ali, et suivent ses enseignements tels que décrits dans le Majmu' al-Fiqh. Les Zaïdites mettent l'accent sur la justice et la responsabilité humaine et descendent de ceux qui ont soutenu la révolte originelle de Zaid contre le calife omeyyade. Les Zaïdites rejettent entièrement la dissimulation religieuse pratiquée par de nombreux chiites, et ils sont prééminants dans les hautes terres du Yémen."
 hanafi_scholar_modifier:0 "Érudits hanafites"
 desc_hanafi_scholar_modifier:0 "Nous recevons actuellement des érudits hanafites pour approfondir la discussion théologique dans notre pays."
 hanbali_scholar_modifier:0 "Érudits hanbalites"
 desc_hanbali_scholar_modifier:0 "Nous recevons actuellement des érudits hanbalites pour approfondir la discussion théologique dans notre pays."
 maliki_scholar_modifier:0 "Érudits malékites"
 desc_maliki_scholar_modifier:0 "Nous recevons actuellement des érudits malékites pour approfondir la discussion théologique dans notre pays."
 shafii_scholar_modifier:0 "Érudits chaféites"
 desc_shafii_scholar_modifier:0 "Nous recevons actuellement des érudits chaféites pour approfondir la discussion théologique dans notre pays."
 ismaili_scholar_modifier:0 "Érudits ismaéliens"
