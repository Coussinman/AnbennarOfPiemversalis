 supply_depot_area:0 "Dépôt de ravitaillement dans la zone"
 BUILD_SUPPLY_DEPOT:0 "§YConstruire un dépôt de ravitaillement§!"
 BUILD_SUPPLY_DEPOT_DESC:1 "Construire un dépôt de ravitaillement en $PROV|Y$ coûtera $COST|Y$ £mil£ et donne l'effet suivant pour toutes les armées alliées dans la zone de $AREA|Y$ :\nCompte comme territoire possédé pour déterminer les renforts\n$MOD$\n\nLe dépôt de ravitaillement sera en opération jusqu'au $DATE|Y$ ou jusqu'à ce qu'un ennemi occupe ou prenne la province."
 SUPPLY_DEPOT_ALREADY_BUILT:0 "§RVous avez déjà construit un dépôt de ravitaillement dans cette zone§!\n"
