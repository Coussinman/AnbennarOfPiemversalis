l_french:
 horse_artillery:0 "Artillerie à Cheval"
 desc_horse_artillery:0 "Grâce à une coordination rigoureuse, les servants peuvent rapidement dételer et tirer, puis ratteler et se déplacer. Cela crée une artillerie à la fois mobile et au tir rapide."
 armed_neutrality_act:0 "Acte de Neutralité Armée"
 desc_armed_neutrality_act:0 "Nos marchands ont le droit de commercer sans ingérence étrangère, et nous protégerons ce droit."
 public_road_act:0 "Loi sur les Voies Publiques"
 desc_public_road_act:0 "Consacrons une semaine entière par an de notre armée à l'entretien de nos infrastructures."
 rapid_integration_act:0 "Loi d'Intégration Rapide"
 desc_rapid_integration_act:0 "Notre excellente administration facilite l'intégration de nouvelles provinces dans notre pays."
 colonial_garrisons:0 "Garnisons Coloniales"
 desc_colonial_garrisons:0 "En établissant des garnisons permanentes outre-mer, nous pouvons encourager la croissance de nos colonies."
 colonial_settlement_act:0 "Loi de Peuplement Colonial"
 desc_colonial_settlement_act:0 "Notre réserve abondante de population facilite le maintien d'une croissance coloniale constante."
 military_prowess:0 "Prouesse Militaire"
 desc_military_prowess:0 "Nos soldats sont nombreux et bien entraînés. Le monde craint notre puissance militaire."
 naval_school_act:0 "Loi sur les Écoles Navales"
 desc_naval_school_act:0 "En établissant des écoles navales, nous pourrons améliorer la qualité tant de nos amiraux que de nos marins."
 naval_infrastructure_act:0 "Infrastructures Navales"
 desc_naval_infrastructure_act:0 "Nous sommes en mesure de maintenir une vaste infrastructure navale pour soutenir davantage de navires."
 trained_marines_act:0 "Loi sur les Fusiliers Marins Organisés"
 desc_trained_marines_act:0 "Nos navires de guerre sont équipés de fusiliers marins compétents, les rendant plus résistants aux abordages ennemis."
 exploration_charters:0 "Chartes d'Exploration"
 desc_exploration_charters:0 "Les expéditions en Terra Incognita sont coûteuses et risquées. Soutenir les explorateurs potentiels leur facilitera grandement la vie, et les résultats seront plus probables."
 superior_supply_system:0 "Systèmes d'Approvisionnement Supérieurs"
 desc_superior_supply_system:0 "Approvisionner les troupes en terres étrangères n'est jamais aisé. Fort heureusement, nous avons appris quelques astuces qui facilitent grandement la tâche."
 state_missionaries_act:0 "Loi sur les Missionnaires d'État"
 desc_state_missionaries_act:0 "L'administration de l'État parraine la promotion de la seule vraie foi."
 for_the_glory:0 "Pour la Gloire des Dieux"
 desc_for_the_glory:0 "Notre pays abrite de nombreux hommes pieux qui font preuve d'un véritable talent dans leurs professions."
 the_espionage_act:0 "Loi sur l'Espionnage"
 desc_the_espionage_act:0 "En utilisant les inventions les plus récentes, nous pouvons garder une longueur d'avance sur nos ennemis et rendre notre espionnage encore plus efficace."
 diplomatic_cooperation_act:0 "Coopération Diplomatique"
 desc_diplomatic_cooperation_act:1 "En intensifiant la coopération avec nos voisins, nous aurons un accès inégalé aux grands esprits à recruter pour notre cour."
 the_banking_system:0 "Le Système Bancaire"
 desc_the_banking_system:0 "Certains de nos marchands ont exprimé le désir d'établir un système bancaire. Si nous les soutenons, cela ne profitera pas qu'à eux, mais aussi à nous."
 new_naval_tactis:0 "Nouvelles Tactiques Navales"
 desc_new_naval_tactis:0 "Nos amiraux peuvent parfois être quelque peu hétérodoxes dans leurs tactiques, mais le succès leur donne raison."
 scientific_expeditions:0 "Expéditions Scientifiques"
 desc_scientific_expeditions:0 "En veillant à ce qu'au moins une personne érudite fasse partie de nos expéditions, nous pourrons apprendre et découvrir bien des choses susceptibles de bénéficier à notre économie."
 hired_adventurers_act:0 "Aventuriers à Gages"
 desc_hired_adventurers_act:0 "La perspective de richesse et de prospérité a attiré nombre d'aventuriers vers les terres nouvellement découvertes. En engageant les plus capables, nous nous assurerons que leurs services restent toujours à notre disposition."
 edict_of_toleration:0 "Édit de Tolérance"
 desc_edict_of_toleration:0 "Notre administration diligente protégera les droits accordés aux minorités religieuses de notre royaume."
 modern_siege_weapons:0 "Armes de Siège Modernes"
 desc_modern_siege_weapons:0 "Grâce à nos ingénieurs zélés, nous pouvons déployer des armes de siège toujours plus puissantes."
 superior_fortification_act:0 "Fortifications Supérieures"
 desc_superior_fortification_act:0 "Nous veillerons à ce que nos forteresses soient toujours construites et équipées des technologies les plus avancées."
 modern_firearm_techniques:0 "Techniques Modernes d'Armes à Feu"
 desc_modern_firearm_techniques:0 "Les armes à feu sont devenues un atout vital pour nos armées. Nos chefs savent comment les utiliser à notre avantage."
 the_garrison_act:0 "Système de Garnison"
 desc_the_garrison_act:0 "Grâce à un système de garnison, nous pouvons nous assurer que les recrues sont affectées là où nous en avons le plus besoin."
 noble_loyalty_act:0 "Loi sur la Loyauté Nobiliaire"
 desc_noble_loyalty_act:0 "Nos espions veilleront à ce que nos nobles restent loyaux envers la couronne, même dans les moments difficiles."
 manueline_architecture:0 "Architecture Adéline"
 desc_manueline_architecture:0 "Ce style novateur synthétise des aspects de l'architecture alénique tardive avec des influences des techniques busilariennes, esmariennes et damériennes. Les constructions adélines furent largement financées par les revenus du lucratif commerce de reliques avec Aelantir et Haless."
 trade_connection_policy:0 "Politique des Relations Commerciales"
 desc_trade_connection_policy:0 "En utilisant les relations de nos anciennes familles nobles, nous pouvons grandement faciliter la vie de nos marchands."
 the_colonial_nobility_act:0 "Loi sur la Noblesse Coloniale"
 desc_the_colonial_nobility_act:0 "En créant une noblesse dans les colonies et en lui octroyant le pouvoir de tenir les autochtones d'une main de fer, nous établirons une excellente base de recrutement pour notre armée nationale."
 nobles_in_navy_act:0 "Traditions Navales Nobiliaires"
 desc_nobles_in_navy_act:0 "Nos nobles font partie intégrante de notre marine depuis un certain temps déjà. Leurs anciennes traditions et compétences seront fort précieuses à l'avenir."
 chivalry_heritage:0 "Héritage Chevaleresque"
 desc_chivalry_heritage:0 "Le temps de la chevalerie est peut-être révolu, mais la cavalerie demeure une arme puissante sur le champ de bataille. Nos nobles devront simplement s'adapter quelque peu."
 local_reserves_act:0 "Loi sur les Réserves Locales"
 desc_local_reserves_act:0 "Nos nobles veilleront à toujours disposer d'une réserve locale de soldats."
 nobility_from_battlefield_act:0 "Loi sur la Noblesse du Champ de Bataille"
 desc_nobility_from_battlefield_act:0 "Il y a toujours des nobles qui se distinguent sur le champ de bataille. En veillant à ce que ces hommes d'exception reçoivent une place dans nos armées, nous améliorerons la qualité de nos troupes dans leur ensemble."
 compulsory_levy_act:0 "Loi sur la Levée Obligatoire"
 desc_compulsory_levy_act:0 "En augmentant le nombre de soldats que les nobles doivent fournir, nous pouvons aligner des armées encore plus importantes."
 shady_embassies:0 "Ambassades Troubles"
 desc_shady_embassies:0 "Combiner la rouerie de nos espions avec l'élégance de nos ambassadeurs permettra de créer nos revendications bien plus rapidement."
 merchant_embargo_act:0 "Loi sur l'Embargo Marchand"
 desc_merchant_embargo_act:0 "En soutenant nos propres marchands avec des agents aguerris, nous pouvons nous assurer que les marchands ennemis seront définitivement discrédités."
 diplomatic_defence_act:0 "Loi sur la Défense Diplomatique"
 desc_diplomatic_defence_act:1 "Pour défendre notre patrie, nous devons être prêts à maintenir un cabinet conséquent capable de gérer un vaste réseau complexe de relations afin d'assurer un équilibre international des puissances."
 the_loyalty_act:0 "Loi sur la Loyauté"
 desc_the_loyalty_act:0 "Les citoyens loyaux qui révèlent des éléments dangereux sur nos territoires seront généreusement récompensés par l'État."
 privy_council_establishment_act:0 "Loi d'Établissement du Conseil Privé"
 desc_privy_council_establishment_act:0 "Être informé des événements au sein de l'État est vital pour tout souverain. En établissant un conseil privé, nous pourrons garder un œil sur notre peuple."
 the_foreign_support_act:0 "Loi sur le Soutien Étranger"
 desc_the_foreign_support_act:0 "Parfois, le meilleur moyen de vaincre nos ennemis est de retourner leur propre peuple contre eux. Coûteux, mais sûr."
 the_colonial_supervision_act:0 "Loi sur la Supervision Coloniale"
 desc_the_colonial_supervision_act:0 "Nos vice-rois ont été notoirement corrompus par le passé. Nous ne tolérerons plus cela."
 naval_civilian_neutrality_act:0 "Loi sur la Neutralité Civile Navale"
 desc_naval_civilian_neutrality_act:0 "Nos espions peuvent fournir des informations vitales pour traiter avec les contrebandiers et les forceurs de blocus."
 deserteur_act:0 "Loi sur les Déserteurs"
 desc_deserteur_act:0 "Nous avons été bien trop cléments envers les déserteurs par le passé. Désormais, nos agents veilleront à ce que les lâches subissent le sort qu'ils méritent."
 the_mercenary_registration_act:0 "Loi sur l'Enregistrement des Mercenaires"
 desc_the_mercenary_registration_act:0 "En tenant un registre des mercenaires présents dans notre pays, nous pouvons nous assurer de bénéficier de leurs services quand nous en aurons le plus besoin."
 the_royal_commission_act:0 "Loi sur les Commissions Royales"
 desc_the_royal_commission_act:0 "Contrôler de temps à autre les comportements suspects au sein de l'administration pourrait être judicieux. La création de commissions royales contribuera certainement à réduire la corruption."
 anti_heresy_act:0 "Loi Contre l'Hérésie"
 desc_anti_heresy_act:0 "Chacun doit œuvrer sans relâche contre les hérésies. L'hérésie est passible de mort !"
 naval_secrecy_act:0 "Loi sur le Secret Naval"
 desc_naval_secrecy_act:0 "Nous avons vu bien des choses dans cet étrange Nouveau Monde. Des choses que nos ennemis aimeraient certainement connaître. Désormais, toutes les affaires navales seront considérées comme informations secrètes."
 local_army_organisation:0 "Organisation Militaire Locale"
 desc_local_army_organisation:0 "Nous réorganiserons notre armée pour nous assurer que nos forces puissent combattre efficacement chaque fois que nécessaire et où qu'elles soient requises."
 streamlined_galley_production:0 "Production Rationalisée de Galères"
 desc_streamlined_galley_production:0 "Nos constructeurs navals nous disent que beaucoup pourrait être accompli en matière d'efficacité dans la production de galères pour notre marine. En rationalisant et standardisant les processus de production et en veillant à ce que les chantiers navals ne manquent jamais de matériaux, nous poserons les bases solides de notre pays en tant que grande puissance navale."
 edict_of_resistance:0 "Édit de Résistance"
 desc_edict_of_resistance:0 "Par l'intermédiaire de notre clergé, nous promouvons l'idée que notre nation est celle favorisée dans la guerre et que nous ne devons jamais perdre foi en notre droit sur cette terre. Combattre jusqu'au dernier souffle est l'esprit même de notre peuple."
 public_welfare_act:0 "Loi sur le Bien-Être Public"
 desc_public_welfare_act:0 "Les pauvres souffrent le plus en temps de troubles. Quelques petits dons aideront à soulager leur misère, et à s'assurer que la populace ne prendra pas les torches et les fourches."
 the_spy_discovery_act:0 "Loi sur la Détection des Espions"
 desc_the_spy_discovery_act:0 "Notre administration sera toujours une cible de choix pour les espions ennemis. Mais nous pouvons faire certaines choses pour leur compliquer grandement la vie."
 les_invalides_act:0 "Loi sur les Invalides"
 desc_les_invalides_act:0 "Nos soldats âgés nous ont bien servis. Il est maintenant de notre devoir de veiller à ce qu'ils puissent vivre dignement au terme de leur carrière militaire."
 enforce_religious_law:0 "Application de la Loi Religieuse"
 desc_enforce_religious_law:1 "Examinons de bien plus près nos écritures saintes pour distinguer les crimes et les peines pour notre société. Quand une société est gouvernée de manière véritablement pieuse, il sera plus facile pour les dévots de repérer les traîtres et les déviants."
 cloth_quality_edict:0 "Édit sur la Qualité des Étoffes"
 desc_cloth_quality_edict:0 "Pour garantir une meilleure qualité des étoffes offertes sur le marché, nous décrétons que si l'étoffe proposée par un marchand n'est pas jugée de qualité satisfaisante à trois reprises distinctes, ledit marchand sera attaché à un poteau avec ladite étoffe fixée sur lui en guise de punition."
 policy_of_calculate_delay:0 "Politique du Délai Calculé"
 desc_policy_of_calculate_delay:0 "Avec des promesses et des assurances de sécurité et de tolérance, nous pouvons convaincre les mécréants de notre royaume de rester pacifiques et désarmés. Cela devrait au moins temporairement retarder la menace d'une guerre civile religieuse jusqu'à ce que nous soyons mieux équipés pour traiter leur perversité et les ramener à la vraie foi."
 production_quota_act:0 "Loi sur les Quotas de Production"
 desc_production_quota_act:0 "Fixer et faire respecter des quotas de production plus élevés nous permettra simplement d'obtenir plus de revenus en produisant davantage de biens."
 encouragement_of_merchant_navy:0 "Encouragement de la Marine Marchande"
 desc_encouragement_of_merchant_navy:0 "Encourager l'expansion de la marine marchande privée nous permettra d'accroître notre influence commerciale à travers le monde."
 black_chamber_act:0 "Loi sur la Chambre Noire"
 desc_black_chamber_act:0 "Nous devrions créer une agence gouvernementale dédiée, chargée de tout ce qui a trait à l'espionnage, à la cryptanalyse et aux opérations secrètes."
 revenue_farming:0 "Affermage des Revenus"
 desc_revenue_farming:0 "L'affermage des taxes ou des revenus est l'une des pratiques les plus anciennes qui soit pour obtenir un revenu sûr et stable pour l'État, ou pour assurer des investissements même là où ils nécessiteraient plus de capital que l'État ne serait disposé à dépenser à un moment donné. L'affermage des revenus stimulerait certainement aussi la croissance de notre secteur financier."
 the_tolerance_act:0 "Loi sur la Tolérance"
 desc_the_tolerance_act:0 "Il est important que nous soutenions les divers groupes religieux de notre société et que nous n'essayions pas d'imposer une seule religion à nos citoyens."
 commercial_embassies:0 "Ambassades Commerciales"
 desc_commercial_embassies:0 "Nos ambassadeurs à l'étranger ne devraient pas seulement agir comme envoyés, ils devraient aussi être chargés de protéger et promouvoir notre commerce. Ils doivent veiller à ce que tous les accords passés continuent d'être étendus et honorés dans les cours étrangères, et ne doivent pas hésiter à espionner nos concurrents afin de saboter leurs efforts."
 naval_exploration_act:0 "Loi sur l'Exploration Navale"
 desc_naval_exploration_act:0 "Équiper nos navires pour l'exploration des mers inconnues leur permettra de s'aventurer plus loin de nos côtes."
 active_foreign_recruitment_act:0 "Loi sur le Recrutement Étranger Actif"
 desc_active_foreign_recruitment_act:0 "Notre nation devrait être connue pour bien payer les mercenaires combattant pour notre cause, attirant ainsi davantage d'hommes capables."
 sapper_regiments_act:0 "Loi sur les Sapeurs"
 desc_sapper_regiments_act:0 "Une règle militaire exigeant que chaque régiment d'infanterie conserve une escouade de sapeurs pour les cas où des fortifications doivent être prises."
 vassal_taxation_policy:0 "Politique de Taxation des Vassaux"
 desc_vassal_taxation_policy:0 "Adopter une position plus agressive dans la taxation des nations sujettes assurera un meilleur afflux d'or dans nos coffres."
 the_stamp_act:0 "Loi du Timbre"
 desc_the_stamp_act:0 "Nous devrions activement imposer des taxes supplémentaires sur nos établissements coloniaux."
 weapon_quality_standards:0 "Normes de Qualité des Armes"
 desc_weapon_quality_standards:0 "Nous devrions activement superviser la production d'armes pour nous assurer qu'elles répondent à nos exigences élevées."
 colonial_administration_act:0 "Loi sur l'Administration Coloniale"
 desc_colonial_administration_act:0 "En assurant un meilleur contrôle et une meilleure administration de notre effort colonial, nous pouvons garantir une meilleure concentration de nos colons pour le bien de la nation."
 trade_kontor_network:0 "Réseau de Comptoirs Commerciaux"
 desc_trade_kontor_network:0 "En maintenant des comptoirs commerciaux dans les pays étrangers, nous aurons l'opportunité de contrôler leur commerce sans avoir à combattre pour le territoire."
 underhanded_diplomacy_act:0 "Loi sur la Diplomatie Sournoise"
 desc_underhanded_diplomacy_act:0 "Parfois les gens ont besoin d'un « cadeau » quand on essaie de les persuader. En canalisant davantage de nos ressources vers nos diplomates, nous pouvons plus facilement amener les gens à voir les choses à notre façon."
 mandatory_service:0 "Service Obligatoire"
 desc_mandatory_service:0 "Pour défendre les idéaux égalitaires de notre nation, toute la population a l'obligation de servir dans une capacité militaire ou civile au moins une fois dans sa vie. Quel que soit le rang ou le sexe, nous prospérons ensemble, nous mourons ensemble."
 native_translators_act:0 "Loi sur les Interprètes Autochtones"
 desc_native_translators_act:0 "Les peuples qui ont survécu dans ces terres étrangères pendant des générations pourraient s'avérer bénéfiques pour nos colons s'ils sont approchés de la bonne manière."
 military_zeal_act:0 "Loi sur le Zèle Militaire"
 desc_military_zeal_act:0 "Augmenter le nombre de prêtres dans les rangs de notre armée aidera à convaincre nos soldats que les dieux sont de notre côté dans la guerre et qu'ils accomplissent leur œuvre divine."
 new_model_army_policy:0 "Loi sur la Nouvelle Armée Modèle"
 desc_new_model_army_policy:0 "Pour défendre la république, nous devons maintenir une armée professionnelle bien entraînée avec un corps d'officiers entièrement professionnels à sa tête."
 levee_en_masse:0 "Levée en Masse"
 desc_levee_en_masse:0 "Quand la république est en danger, tous les hommes valides sont obligés de se précipiter au service militaire pour la défendre."
 professional_diplomatic_corps:0 "Corps Diplomatique Professionnel"
 desc_professional_diplomatic_corps:0 "En employant des diplomates professionnels, et pas seulement des personnes ayant reçu le rang d'ambassadeur en raison de leur sang, nous gagnons en efficacité."
 letters_of_marque:1 "Corsaires Parrainés"
 desc_letters_of_marque:0 "En rédigeant des lettres de marque pour des capitaines privés entreprenants, ils renforceront nos capacités de course."
 the_citizen_service_act:0 "Loi sur le Service Citoyen"
 desc_the_citizen_service_act:0 "Si les citoyens ont des avantages, ils ont aussi des devoirs envers l'État. Le service garantit la citoyenneté !"
 colonial_companies_act:0 "Loi sur les Compagnies Coloniales"
 desc_colonial_companies_act:0 "L'exploration est devenue profitable et nos marchands veulent atteindre plus loin que leur richesse individuelle ne le permet. En établissant des compagnies coloniales, nous pouvons exploiter leur capital pour explorer, s'étendre et exploiter."
 protected_shipping_lanes:0 "Loi sur les Routes Maritimes Protégées"
 desc_protected_shipping_lanes:0 "Nos navires transportant des marchandises à travers le monde bénéficient de l'emprunt de routes établies par la nature des vents et des océans. En sécurisant ces voies, nous pouvons assurer que notre commerce est mené en toute sécurité et efficacement."
 church_sponsored_guilds:0 "Guildes à Patronage Religieux"
 desc_church_sponsored_guilds:0 "L'artisanat offre de nombreuses occasions de célébrer le spirituel, donnant à nos chefs religieux des raisons de soutenir ce travail. Nous aidons la manifestation du divin dans la création du profane."
 record_keeping_act:0 "Loi sur la Tenue des Archives"
 desc_record_keeping_act:1 "Avec une loi exigeant que nos diplomates conservent chaque contrat enregistré pour que les officiels de l'État puissent le lire, nous pouvons être plus efficaces dans nos entreprises."
 military_allotment_act:0 "Loi sur l'Attribution Militaire"
 desc_military_allotment_act:0 "En allouant localement des ressources à notre armée, nous pouvons maintenir suffisamment d'effectifs pour rester prêts à la guerre sans dépendre davantage des mercenaires."
 the_pioneer_policy:0 "Politique des Pionniers"
 desc_the_pioneer_policy:0 "L'État financera les entreprises de nos citoyens pour aller hardiment là où aucun d'entre nous n'est encore allé."
 land_inheritance_act:0 "Loi sur l'Héritage Foncier"
 desc_land_inheritance_act:0 "En permettant au plus humble paysan d'hériter du droit de continuer à utiliser la terre que ses ancêtres utilisaient, nous gagnons en productivité en tant qu'État."
 chaplains_of_the_fleet:0 "Prêtres de la Flotte"
 desc_chaplains_of_the_fleet:0 "Les tempêtes déchaînées en haute mer peuvent mettre à l'épreuve la foi de n'importe quel marin, surtout celui voyageant dans un vaisseau déchiré par la guerre. Les prêtres militaires de la Flotte aident nos recrues à maintenir l'espoir dans les moments d'adversité."
 moral_economy_act:0 "Loi sur l'Économie Morale"
 desc_moral_economy_act:0 "De nombreux États semblent tout faire pour encourager le développement financier et commercial. Cela perturbe grandement nombre de sujets car cela dérange l'ordre naturel des choses. En concentrant la politique économique de notre État sur le maintien d'une économie morale appropriée, où les prix justes et les droits traditionnels sont respectés et protégés, nous donnerons l'exemple à tous les autres."
 field_priests:0 "Prêtres de Campagne et Livres de Prières du Soldat"
 desc_field_priests:0 "Nous devons nous efforcer d'insuffler le zèle à nos soldats et de les rendre disposés à se sacrifier pour notre sainte cause. À tout moment, nous devons nous assurer qu'il y ait un grand nombre de prêtres pour prendre soin de la santé spirituelle de nos hommes sur le terrain, pour les guider dans le culte et pour s'occuper d'eux quand leur vie prend fin. Nous devons aussi veiller à ce qu'ils ne manquent jamais de livres de prières ou de tout autre matériel religieux qu'ils pourraient désirer pendant nos campagnes."
 currency_council:0 "Conseil de la Monnaie"
 desc_currency_council:0 "En établissant un conseil de la monnaie pour superviser notre frappe, nous pouvons prévenir la dévaluation inutile de notre devise."
 policy_religious_freedom_act:0 "Loi sur la Liberté Religieuse"
 desc_policy_religious_freedom_act:0 "Accorder à tous les sujets la liberté de conscience de vénérer les divinités qu'ils jugent appropriées."
 the_redemption_act:0 "Loi sur la Rédemption"
 desc_the_redemption_act:0 "Encourager nos sujets égarés à sauver leurs âmes en accordant l'amnistie pour les offenses hérétiques en échange d'un retour au bercail."
 provincial_autonomy:0 "Autonomie Provinciale"
 desc_provincial_autonomy:0 "En accordant à nos provinces une certaine autonomie en matière de défense, nous rendrons plus difficile pour les ennemis intérieurs et extérieurs de nous les prendre."
 mission_of_civilize:0 "Mission Civilisatrice"
 desc_mission_of_civilize:0 "C'est notre sainte mission de porter le flambeau de la civilisation dans les coins sombres du monde et de sauver les âmes égarées qui y demeurent."
 exchange_of_ideas:0 "Échange d'Idées"
 desc_exchange_of_ideas:0 "En encourageant activement l'incorporation d'idées et de pratiques étrangères dans notre culture, nous pouvons faciliter la mise en œuvre de nouvelles idées à l'avenir."
 vassal_obligations_act:0 "Loi sur les Obligations Vassales"
 desc_vassal_obligations_act:0 "Fixer dans la loi les obligations militaires et économiques précises que nos États clients ont envers nous."
 foreign_advisors:0 "Conseillers Étrangers"
 desc_foreign_advisors:0 "En ouvrant notre cour aux personnes de toutes nationalités, nous pouvons nous assurer d'obtenir les meilleurs conseils au moindre coût pour nous-mêmes, tout en créant de précieux liens diplomatiques à l'étranger."
 vassal_integration_act:0 "Loi sur l'Intégration des Vassaux"
 desc_vassal_integration_act:2 "Incorporer des terres étrangères dans notre pays est une affaire difficile et chronophage. En établissant une série de pratiques standard pour l'intégration, nous pouvons la faciliter."
 overseas_dominions:0 "Dominions d'Outre-Mer"
 desc_overseas_dominions:0 "Gouverner des terres lointaines est difficile, particulièrement quand ces terres sont à un océan de distance. En établissant des dominions gouvernés par des vice-rois locaux loyaux à la couronne, nous pouvons tirer le meilleur parti de ces terres."
 enlightened_aristocracy:0 "Aristocratie Éclairée"
 desc_enlightened_aristocracy:0 "Encourager l'éducation et les hauts standards littéraires parmi l'aristocratie afin de s'assurer que les hommes dirigeant notre nation sont les plus fidèles adeptes de nos idéaux humanistes."
 the_liberation_act:0 "Loi sur la Libération"
 desc_the_liberation_act:0 "Annoncer notre intention de libérer les sujets opprimés des tyrans étrangers afin qu'ils puissent jouir du privilège de notre propre règne éclairé."
 visionary_thinkers:0 "Penseurs Visionnaires"
 desc_visionary_thinkers:0 "Notre pays est un bastion de la pensée intellectuelle et nos universités produisent certains des penseurs les plus brillants et visionnaires du monde."
 the_transportation_act:0 "Loi sur le Transport"
 desc_the_transportation_act:0 "Établir un système fixe de frais de transport pour les marchandises afin d'encourager l'exportation de biens de valeur."
 harbour_administration:0 "Administration Portuaire"
 desc_harbour_administration:0 "Établir un office national pour l'administration et l'entretien de nos ports."
 supply_convoys:0 "Convois de Ravitaillement"
 desc_supply_convoys:0 "S'assurer que nos possessions d'outre-mer ont un accès régulier aux approvisionnements de la mère patrie."
 cultural_recognition_act:0 "Loi sur la Reconnaissance Culturelle"
 desc_cultural_recognition_act:0 "En reconnaissant le caractère distinctif et les contributions précieuses de nos cultures minoritaires, nous pouvons les faire se sentir plus incluses dans l'État."
 multilingual_diplomats:0 "Diplomates Polyglottes"
 desc_multilingual_diplomats:0 "S'assurer que nos diplomates sont instruits dans les langues des cours étrangères afin de faciliter la compréhension entre nous et les autres cultures."
 native_assimilation_act:0 "Loi sur l'Assimilation des Autochtones"
 desc_native_assimilation_act:0 "Encourager activement l'assimilation des tribus autochtones dans nos colonies."
 cultural_understanding:0 "Compréhension Culturelle"
 desc_cultural_understanding:0 "Notre nation possède une compréhension considérable des coutumes et traditions des cultures étrangères, nous permettant de nous fondre sans effort dans leur société quand cela est nécessaire."
 the_foreign_aid_act:0 "Loi sur l'Aide Étrangère"
 desc_the_foreign_aid_act:0 "L'aide étrangère, bien que certainement bonne pour notre réputation, peut aussi être un outil utile pour faire avancer nos agendas diplomatiques à l'étranger."
 cultural_unity:0 "Unité Culturelle"
 desc_cultural_unity:0 "En nous concentrant sur l'unité par la foi et les coutumes, nous pouvons faciliter l'assimilation des étrangers dans notre culture."
 foreign_political_allies:0 "Alliés Politiques Étrangers"
 desc_foreign_political_allies:0 "Les alliés sont bons à avoir, et en faisant en sorte que ces alliés poussent nos propres intérêts, nous pouvons accroître notre influence diplomatique sur les autres États."
 loyal_governors:0 "Gouverneurs Loyaux"
 desc_loyal_governors:0 "La loyauté est la vertu la plus importante, et en veillant à ce que les gouverneurs des provinces lointaines soient loyaux envers la couronne avant tout, nous pouvons accroître l'utilité de ces terres."
 a_rating_system:0 "Un Système de Classification"
 desc_a_rating_system:0 "Un système formel pour classifier la catégorie de nos navires selon leur nombre de canons."
 merchant_protection_act:0 "Loi sur la Protection des Marchands"
 desc_merchant_protection_act:0 "Le commerce est le sang vital du monde. En accordant des privilèges et une protection à nos marchands, nous pouvons nous assurer qu'ils le font couler dans notre direction."
 the_foreign_relations_act:0 "Loi sur les Relations Étrangères"
 desc_the_foreign_relations_act:0 "Les diplomates sont bien sûr utiles pour la diplomatie, mais ils ont aussi un objectif secondaire d'espionner les autres États. En veillant à ce que nos diplomates soient bien formés à l'espionnage sous couvert d'« établir des relations étrangères », nous pouvons prendre l'avantage sur nos ennemis."
 the_citrus_statute:0 "Statut des Agrumes"
 desc_the_citrus_statute:0 "En exigeant que chaque navire stocke des fruits frais pendant son voyage, nos marins resteront forts et en bonne santé."
 terms_of_surrender_statute:0 "Statut des Conditions de Reddition"
 desc_terms_of_surrender_statute:0 "Nos officiers de navire emploient des tactiques peu orthodoxes forçant l'ennemi à rendre ses navires à notre marine."
 skilled_cartographers:0 "Cartographes Qualifiés"
 desc_skilled_cartographers:1 "En ne recrutant que les meilleurs cartographes pour établir nos cartes et nos cartes marines, nous pouvons augmenter le rayon d'action de nos capitaines."
 fortified_trading_posts:0 "Comptoirs Commerciaux Fortifiés"
 desc_fortified_trading_posts:0 "Établir des comptoirs commerciaux en terres étrangères est vital pour nos intérêts économiques, mais ils ont tendance à être exposés aux attaques des puissances étrangères et des autochtones hostiles. En dotant chacun d'une petite garnison, nous pouvons réduire ce risque."
 the_integrated_administration_act:0 "Loi sur l'Administration Intégrée"
 desc_the_integrated_administration_act:0 "Intégrer nos États clients dans l'administration de l'État pour améliorer les revenus et simplifier la gouvernance."
 the_cooperation_act:0 "Loi sur la Coopération"
 desc_the_cooperation_act:0 "Encourager la coopération entre nos marchands afin qu'ils travaillent ensemble pour prendre le contrôle des routes commerciales lucratives."
 noble_captains:0 "Capitaines Nobles"
 desc_noble_captains:0 "Encourager la noblesse à considérer la marine comme une voie de carrière lucrative afin d'améliorer le commandement de nos flottes."
 the_superior_armament_act:0 "Loi sur l'Armement Supérieur"
 desc_the_superior_armament_act:0 "Créer des exigences strictes pour la qualité et la taille des canons montés sur nos navires."
 superior_hull_designs:0 "Conceptions de Coques Supérieures"
 desc_superior_hull_designs:0 "Standardiser les conceptions de coque pour nos navires de guerre afin qu'ils soient mieux à même de résister tant au feu ennemi qu'à l'usure normale."
 timber_importation_standards:0 "Normes d'Importation du Bois"
 desc_timber_importation_standards:0 "Créer des normes de qualité strictes pour les importations de bois que nous utilisons dans la construction navale."
 the_naval_conscription_act:0 "Loi sur la Conscription Navale"
 desc_the_naval_conscription_act:0 "Exiger des jeunes hommes vivant dans les régions côtières qu'ils effectuent leur service dans la marine plutôt que dans l'armée."
 the_naval_supremacy_act:0 "Loi sur la Suprématie Navale"
 desc_the_naval_supremacy_act:1 "Un régime d'entraînement strict pour nos marins garantira que nos équipages comprennent comment mener le plus efficacement un blocus et la saisie des secours étrangers destinés au siège."
 the_maritime_intelligencer_unit:0 "Unité de Renseignement Maritime"
 desc_the_maritime_intelligencer_unit:0 "En formant des agents loyaux au sein de notre marine, prêts à donner leur vie pour transmettre des informations à notre armée, nous pouvons saisir des opportunités que nous aurions autrement manquées."
 the_nautic_education_act:0 "Loi sur l'Éducation Nautique"
 desc_the_nautic_education_act:0 "Assurer un haut niveau d'éducation pour nos officiers de marine afin qu'ils comprennent les principes vitaux de l'artillerie dans les batailles."
 zealous_captains:0 "Capitaines Zélés"
 desc_zealous_captains:0 "Sélectionner nos capitaines parmi des hommes de foi et de feu qui n'ont aucun scrupule à aborder les navires ennemis pour en découdre avec les mécréants."
 autonomous_estates:0 "États Autonomes"
 desc_autonomous_estates:0 "Accorder un certain degré d'autonomie politique aux états de nos sujets nous donnera plus de marge de négociation pour extraire des taxes de leurs terres."
 inspirational_leaders:0 "Chefs Inspirants"
 desc_inspirational_leaders:1 "S'assurer que nos officiers sont des hommes de raison et de savoir capables d'inspirer les soldats ordinaires sur le champ de bataille."
 the_naval_inspection_act:0 "Loi sur l'Inspection Navale"
 desc_the_naval_inspection_act:0 "Créer un conseil d'inspection pour veiller au bien-être des marins ordinaires de notre marine."
 the_preparation_act:0 "Loi sur la Préparation"
 desc_the_preparation_act:0 "Le savoir savant nous dit que la guerre est inévitable, mais il peut aussi nous aider à comprendre quand elle est susceptible d'éclater afin que nous puissions nous y préparer."
 local_militias:0 "Milices Locales"
 desc_local_militias:0 "Accorder un soutien de l'État aux milices locales qui peuvent résister à l'incursion de troupes étrangères sur nos terres."
 unified_army_command:0 "Commandement Unifié de l'Armée"
 desc_unified_army_command:0 "Inclure les armées de nos États sujets dans notre propre commandement afin que tout le monde reçoive les mêmes ordres et qu'il n'y ait pas de confusion sur le champ de bataille."
 guerilla_warfare:0 "Guérilla"
 desc_guerilla_warfare:0 "Créer des caches d'armes et de fournitures pour permettre à la population locale de résister à une invasion étrangère."
 merchant_marine_act:0 "Loi sur la Marine Marchande"
 desc_merchant_marine_act:0 "Accorder un soutien de l'État aux compagnies de navigation et de commerce pour nous assurer que nous avons une grande flotte marchande qui peut être convertie en navires de guerre en temps de conflit."
 pen_rely_on_sword_act:0 "Loi de la Plume Appuyée par l'Épée"
 desc_pen_rely_on_sword_act:0 "Ne renonçant ni au pouvoir des actes ni au pouvoir des mots, notre nation enrôle à la fois de grands ambassadeurs et orateurs et la force militaire pour appuyer leurs arguments."
 taxation_with_representation:0 "Taxation avec Représentation"
 desc_taxation_with_representation:2 "Permettre à nos colonies d'être représentées dans notre gouvernement nous fournira un plus grand bassin de citoyens loyaux envers l'État."
 the_combination_act:0 "Loi sur les Coalitions"
 desc_the_combination_act:0 "Toutes les mesures ont été prises pour empêcher de futures grèves. Toute formation illégale de syndicats commerciaux ou de travailleurs est désormais interdite."
 the_court_of_wards_and_liveries:0 "Cour des Pupilles et des Livrées"
 desc_the_court_of_wards_and_liveries:0 "Avec une cour des pupilles et des livrées, l'administration de la collecte des impôts et des droits féodaux est tellement plus efficace."
 formalized_measures:0 "Échelles, Poids et Mesures Formalisés"
 desc_formalized_measures:1 "Notre nation a formalisé son système de poids, d'échelles et de mesures. Cela contribue grandement à ce que nous utilisions au moins les mêmes unités de base partout dans le pays."
 agricultural_cultivations:0 "Culture Agricole"
 desc_agricultural_cultivations:0 "La production de récoltes a été maximisée en déplaçant l'accent des petites fermes vers l'établissement de grandes plantations."
 colonial_expansions:0 "Expansion Coloniale"
 desc_colonial_expansions:0 "Un programme de réinstallation a été introduit pour augmenter la taille de nos colonies."
 the_navigation_act:0 "Acte de Navigation"
 desc_the_navigation_act:0 "Des restrictions ont été imposées sur l'utilisation de navires étrangers en ce qui concerne le commerce."
 the_importation_act:0 "Loi sur les Importations"
 desc_the_importation_act:0 "Des restrictions ont été placées sur la quantité de marchandises qui peuvent être vendues ou importées de pays étrangers."
 the_house_of_trade:0 "Maison du Commerce"
 desc_the_house_of_trade:0 "Une agence gouvernementale a été établie pour contrôler le commerce colonial et la colonisation."
 the_mining_act:0 "Loi sur les Mines"
 desc_the_mining_act:0 "Hormis une taxe minière, tous les aspects de l'exploitation minière sont gérés par des entreprises privées."
 hire_privateers:0 "Corsaires"
 desc_hire_privateers:0 "Des corsaires ont été enrôlés pour perturber le commerce étranger et attaquer les vaisseaux ennemis."
 hold_the_weather_gauge:0 "Tenir l'Avantage du Vent"
 desc_hold_the_weather_gauge:0 "En assumant la position avantageuse d'être au vent d'un vaisseau ennemi, nous obtenons un degré de manœuvrabilité bien plus élevé au combat."
 restrictions_for_colonies:0 "Restrictions Coloniales"
 desc_restrictions_for_colonies:0 "Des règles strictes ont été établies concernant le commerce et la production pour accroître le contrôle sur nos colonies."
 the_anti_piracy_act:0 "Loi Contre la Piraterie"
 desc_the_anti_piracy_act:0 "Les peines pour avoir commis des actes de piraterie ont été sévèrement augmentées."
 the_land_recruiting_act:0 "Loi de Recrutement"
 desc_the_land_recruiting_act:0 "Forcer tout homme valide sans moyens de revenu à s'enrôler pour le service causera sans doute quelque controverse."
 the_liquor_act:0 "Loi sur les Spiritueux"
 desc_the_liquor_act:0 "Des réglementations et des droits de licence ont été introduits concernant la vente d'eau-de-vie."
 the_joint_stock_companies_act:0 "Loi sur les Sociétés par Actions"
 desc_the_joint_stock_companies_act:0 "Il est désormais interdit de former une société par actions sans autorisation royale."
 the_merchant_shipping_act:0 "Loi sur la Marine Marchande"
 desc_the_merchant_shipping_act:0 "Une limite a été imposée sur la responsabilité d'un armateur concernant les marchandises endommagées ou perdues en raison d'un vol."
 the_witchcraft_act:0 "Loi sur la Sorcellerie"
 desc_the_witchcraft_act:0 "Toute pratique de sorcellerie, magie ou enchantement est désormais considérée comme un crime en droit commun."
 the_education_act:0 "Loi sur l'Éducation"
 desc_the_education_act:0 "L'éducation est désormais obligatoire pour ceux qui doivent gouverner notre système juridique."
 the_abolish_slavery_act:0 "Loi sur l'Abolition de l'Esclavage"
 desc_the_abolish_slavery_act:0 "La traite des esclaves et l'esclavage sont désormais interdits dans toute notre nation."
 the_judiciary_act:0 "Loi sur le Pouvoir Judiciaire"
 desc_the_judiciary_act:0 "Un système judiciaire national a été établi qui sera responsable de l'administration et de l'interprétation de la loi."
 the_statute_of_monopolies:0 "Statut des Monopoles"
 desc_the_statute_of_monopolies:0 "En promouvant le libre-échange et la libre circulation des marchandises entre les nations commerçantes, nous avons augmenté à la fois notre efficacité de production et de commerce."
 the_recruiting_act:0 "Loi de Recrutement Naval"
 desc_the_recruiting_act:0 "Forcer tout homme valide sans moyens de revenu à s'enrôler pour le service naval causera sans doute quelque controverse."
 the_military_act:0 "Loi sur la Milice"
 desc_the_military_act:0 "Le droit exclusif sur la milice, en tous points qu'il s'agisse de commandement ou de disposition, repose entre les mains du roi."
 the_tenures_abolition_act:0 "Loi d'Abolition des Tenures"
 desc_the_tenures_abolition_act:0 "Un montant fixe de compensation a été établi pour le monarque et divers types de tenures militaires et agricoles dues à la couronne ont été supprimées."
 the_dissolution_act:0 "Loi de Dissolution"
 desc_the_dissolution_act:0 "Toutes les mesures ont été prises pour empêcher le roi d'exercer un contrôle absolu sur son royaume sans le consentement du Parlement."
 the_statue_in_restraint_of_appeals:0 "Statut de Restriction des Appels"
 desc_the_statue_in_restraint_of_appeals:0 "Nous avons officiellement rétrogradé toutes les autres figures et élevons à la place le roi comme l'autorité légale finale en toutes matières de religion."
 the_licensing_of_the_press_act:0 "Loi sur la Licence de la Presse"
 desc_the_licensing_of_the_press_act:0 "Nous avons adopté des règles et réglementations strictes concernant l'imprimerie afin de minimiser la quantité de textes séditieux et abusifs dans notre société."
 the_wooden_wall:0 "La Flotte est Notre Muraille de Bois"
 desc_the_wooden_wall:0 "« Je n'ai jamais dit que les Gawedi ne viennent pas, j'ai juste dit qu'ils ne viendraient pas par la mer. »"
 beneficial_neglect:0 "Négligence Bienveillante"
 desc_beneficial_neglect:0 "Une certaine liberté politique a été accordée à nos colonies afin d'améliorer les relations."
 the_provincial_taxation_system:0 "Système de Taxation Provinciale"
 desc_the_provincial_taxation_system:0 "Nous avons établi un système permanent de taxation provinciale qui optimisera les gains pour le trésor."
 foreign_conscription_centers:0 "Centres de Conscription Étrangers"
 desc_foreign_conscription_centers:0 "Nous pouvons accéder à la population et aux ressources de nos sujets bien moins cher si nous établissons des centres de conscription dédiés dans leurs grandes villes."
 steppe_supplies_policy:0 "Approvisionnement des Steppes"
 desc_steppe_supplies_policy:0 "Les steppes sont rudes pour leurs habitants et la nourriture peut être difficile à trouver. Avec nos politiques d'administration améliorées, nous pouvons leur assurer suffisamment de ravitaillement."
 to_the_ground_policy:0 "Jusqu'au Sol"
 desc_to_the_ground_policy:0 "S'assurer que notre économie reste saine est le meilleur moyen de garantir un bon entretien de nos hordes. Avec une bonne fourniture de l'équipement et des armes dont elles ont besoin, nous conquerrons le sol lui-même."
 calming_the_tides_policy:0 "Apaiser les Marées"
 desc_calming_the_tides_policy:0 "Notre attention portée au bien-être de notre peuple a merveilleusement porté ses fruits : notre réputation de bienveillance s'est répandue dans toute la nation et même le berger le plus éloigné se sent reconnaissant de vivre sur nos terres."
 esprit_de_corps_policy:0 "Esprit de Corps"
 desc_esprit_de_corps_policy:1 "Notre force religieuse a aidé le peuple de notre fière nation à se sentir intégré dans une seule union. Cette foi nous aidera à les assujettir en assurant leur bonheur."
 otto_per_mille:0 "Otto Per Mille"
 desc_otto_per_mille:0 "Chaque année, une partie de nos impôts sera investie pour prendre bien soin de notre gouvernement pieux. Grâce à la générosité de notre peuple, notre nation atteindra enfin la prospérité à laquelle elle est destinée."
 religious_spread_policy:0 "Propagation Religieuse"
 desc_religious_spread_policy:0 "Le royaume des dieux réside en chacun de nous car nous l'avons consommé. Nous avons partagé la même nourriture, nous avons bu ses rivières, nos bouches pécheresses sont encore coupables de les avoir avalées. Nous partagerons ce festin avec tous nos nouveaux sujets."
 omnism_policy:0 "Omnisme"
 desc_omnism_policy:0 "Une administration tolérante est la clé du succès. Notre nation doit être bâtie sur l'acceptation, le respect et la confiance. Une population joyeuse est plus facile à contrôler qu'une population en colère."
 ora_et_labora_policy:0 "Ora et Labora"
 desc_ora_et_labora_policy:0 "La chair doit être tout autant cultivée que l'âme. Nos moines ne consacreront pas leur vie retirée aux seules prières dévotes, mais devront aussi exercer leurs corps. La production d'approvisionnement de nos monastères épaissira les biens de notre nation."
 administration_of_sacred_land_policy:0 "Administration des Terres Sacrées"
 desc_administration_of_sacred_land_policy:0 "Une administration efficace peut et doit mener à une meilleure exploitation de nos avantages naturels."
 shared_land_policy:0 "Terres Partagées"
 desc_shared_land_policy:0 "La croissance de notre nation ne doit pas reposer uniquement sur l'élargissement de son extension, mais aussi sur l'entretien de nos propres provinces. Les doter de nouveaux bâtiments attirera de nouveaux colons et augmentera l'importance universelle de nos cités. Bientôt tout le monde connaîtra leurs noms."
 disruptive_innovation_policy:0 "Innovation de Rupture"
 desc_disruptive_innovation_policy:1 "Notre progrès technologique n'a été égalé par aucune autre nation voisine. Les améliorations de notre développement scientifique sont maintenant assez grandes pour garantir une meilleure utilisation de nos grands esprits et la diffusion de leurs connaissances."
 ancestor_worship_policy:0 "Culte des Ancêtres"
 desc_ancestor_worship_policy:0 "Le culte des morts est une partie importante de notre culture. Leurs corps peuvent pourrir, mais pas leurs mémoires. Notre peuple a un fort sens de l'union grâce à ces croyances communes et essentielles."
 steppe_nomad_migrations_policy:0 "Migrations des Nomades des Steppes"
 desc_steppe_nomad_migrations_policy:1 "En tant que nation nomade, notre peuple est habitué à voyager et à s'installer sur de nouvelles terres conquises. Un homme ne peut choisir où il naît, mais il peut choisir où il meurt."
 riverine_navy_policy:0 "Marine Fluviale"
 desc_riverine_navy_policy:0 "Notre horde a navigué sur la mer rugueuse des herbes pendant des siècles, maintenant nous avons transféré cela à l'eau. Que tout autre navire ennemi ne navigue que dans le sang."
 passport_to_merchants_policy:0 "Passeport pour les Marchands"
 desc_passport_to_merchants_policy:1 "Un excellent moyen de maintenir l'or en mouvement est de s'assurer que ledit or est effectivement en mouvement. Nos politiques de protection du commerce nous aideront à empêcher les marchands de choisir une autre route."
 faith_advisors_policy:0 "Conseillers de Foi"
 desc_faith_advisors_policy:0 "La guidance divine montre à notre souverain le bon chemin. Cependant, tandis qu'il nous bénit de sa présence sur Terre, il doit aussi être aidé par des conseils profanes, afin que le conseil ardent de la foi ne consume pas son âme."
 one_and_true:0 "Unique et Vraie"
 desc_one_and_true:0 "L'influence de nos missionnaires n'a jamais été aussi cruciale, leur réputation auprès de notre peuple l'a convaincu que les rumeurs malveillantes qu'il peut entendre ne sont que des chuchotements malveillants."
 maritime_scribes:0 "Scribes Maritimes"
 desc_maritime_scribes:0 "Par le passé, nous avons envoyé certains de nos meilleurs érudits sur nos navires à la recherche d'une documentation adéquate. Ils ont maintenant enregistré un bon nombre de chroniques relatant nos plus grandes batailles navales et le commandement réussi de nos amiraux."
 solidarity_policy:0 "Solidarité"
 desc_solidarity_policy:0 "Partager c'est aimer. Recevoir c'est... tout simplement mieux. La réputation altruiste de notre nation nous a accordé une position de premier plan dans les échanges commerciaux généreux."
 appeal_to_old_powers_policy:0 "Appel aux Anciennes Puissances"
 desc_appeal_to_old_powers_policy:0 "Nous n'avons pas négligé nos relations avec les nations non coloniales et cela nous a accordé une notoriété prestigieuse dans les connexions diplomatiques."
 indirect_approach_policy:0 "Approche Indirecte"
 desc_indirect_approach_policy:0 "La nature est un corps, elle a des yeux et des oreilles, elle est partout, tout le temps, impossible à éviter. Tout ce qui est dit ou fait dans notre nation, nous le savons à travers elle."
 loyalty_to_the_land_policy:0 "Loyauté envers la Terre"
 desc_loyalty_to_the_land_policy:0 "Une meurtrissure dans le ciel, des nuages pourpres partiellement éclairés par la lune. Nous la ressentons comme une meurtrissure sur notre peau. Abandonner cette terre c'est nous abandonner nous-mêmes."
 commercial_tribes_policy:0 "Tribus Commerciales"
 desc_commercial_tribes_policy:0 "Notre réseau commercial a été notablement étendu et maintenant nos marchands peuvent couvrir une quantité significative de terres. Là où il y a une volonté, il y a un chemin."
 war_horses_policy:0 "Chevaux de Guerre"
 desc_war_horses_policy:1 "Nous protégeons nos chevaux autant que nous nous protégeons nous-mêmes. Leur vitesse et leur endurance nous ont aidés en de nombreuses occasions et sont la raison pour laquelle nos ambitions d'expansion peuvent atteindre des limites presque impossibles. Ce qu'un simple homme parcourt en une semaine, nous le ravageons en un jour."
 the_best_defense_policy:0 "La Meilleure Défense"
 desc_the_best_defense_policy:0 "La meilleure défense est en fait... une bonne défense. Nous nous sommes inspirés d'autres armées afin de créer une version supérieure de notre armure qui peut endurer la dureté de nos batailles, sans affecter la mobilité."
 omne_datum_optimum_policy:0 "Tout Don Parfait"
 desc_omne_datum_optimum_policy:0 "Nos hommes religieux ont enfin compris que la foi n'est pas seulement une bataille de l'esprit, mais aussi du corps. Beaucoup de nos monastères sont maintenant les endroits parfaits où aller quand on cherche de nouveaux soldats."
 wielders_of_the_flaming_sword_policy:0 "Porteurs de l'Épée Flamboyante"
 desc_wielders_of_the_flaming_sword_policy:0 "Les flammes de l'épée tournoyante éclaireront le chemin vers la victoire. Le soleil des dieux est contenu dans une seule lame, sa luminosité inévitable."
 the_three_sisters_policy:0 "Les Trois Sœurs"
 desc_the_three_sisters_policy:1 "La récolte des trois sœurs comme notre stratégie agricole la plus efficace est ce qui a maintenu nos armées saines et en bonne santé."
 by_the_people_for_the_people_policy:0 "Par le Peuple, Pour le Peuple"
 desc_by_the_people_for_the_people_policy:0 "Même en temps de guerre, nous devons toujours nous rappeler que nous combattons pour notre peuple, pas seulement pour la gloire. C'est notre devoir de le protéger des attaques hostiles, et c'est le sien de nous aider dans cette tâche."
 war_on_our_terms_policy:0 "La Guerre à Nos Conditions"
 desc_war_on_our_terms_policy:0 "Une guerre sur le sol natal est mieux combattue qu'en terre étrangère. Nous connaissons nos soldats et ils nous connaissent, leur discipline est sans pareille et leur engagement incontestable."
 fear_tactics_policy:0 "Tactiques de Peur"
 desc_fear_tactics_policy:0 "Nous avons gagné le respect de nos nations voisines par la peur et la puissance. Il n'y a pas de plus grand ennemi que celui que vous redoutez."
 psychological_warfare_policy:0 "Guerre Psychologique"
 desc_psychological_warfare_policy:0 "Nos espions ont étudié la guerre de nos ennemis et leurs formations jusqu'à apprendre la meilleure position possible pour notre cavalerie. Il y a peu de choses plus effrayantes que de se réveiller au son de nos sabots ébranlant la terre."
 kharash_policy:0 "Un Mur de Prisonniers"
 desc_kharash_policy:0 "Ce que nous faisons à nos ennemis est quelque chose qu'aucun de nos sujets ne veut expérimenter. Dans notre tactique la plus récente, nous rassemblons les prisonniers capturés lors de batailles précédentes et les faisons former l'avant-garde au combat. Pour éviter que cela ne leur arrive, nos vassaux préfèrent aimablement combattre à nos côtés."
 my_word_is_my_bond_policy:0 "Ma Parole est Mon Engagement"
 desc_my_word_is_my_bond_policy:0 "Notre réseau d'espions connaît le chemin d'entrée et de sortie des châteaux ennemis, car ils les ont vus dans l'architecture suprême des dieux. Certains peuvent appeler cela de l'infiltration, nous appelons cela de la vision."
 render_unto_caesar_policy:0 "Rendez à l'Empereur"
 desc_render_unto_caesar_policy:0 "Ce que les dieux vous ont donné, vous devez le lui rendre ; ce que nous avons donné aux autres, ils doivent nous le rendre. Notre expansion à travers le monde est un don d'illumination."
 canoe_expertise_policy:0 "Expertise du Canoë"
 desc_canoe_expertise_policy:0 "Notre peuple a une longue histoire avec les canoës par le passé et a appris à manœuvrer avec eux exceptionnellement bien. Nos marins peuvent transférer leur expertise du canoë à l'utilisation de plus grands navires également."
