 ###actions
 aakhetist_offer_servitude:0 "§TOffrir notre servitude§!"
 desc_aakhetist_offer_servitude:0 "Aakhet exige la loyauté absolue de Ses fidèles. Nous devons prêter serment de servir Sa cause, de peur qu'Il ne nous abandonne pour d'autres plus enclins à suivre Ses directives."
 aakhetist_offer_servitude_tooltip:0 "Dépenser du §YPrestige§! pour nous soumettre à Lui"

 aakhetist_offer_food:0 "§TOrganiser un festin§!"
 desc_aakhetist_offer_food:0 "Aakhet adore assister aux grands festivals en Son honneur, le plus souvent déguisé. Si grandioses étaient ces festins qu'il fallait des années aux villes pour reconstituer leurs réserves."
 aakhetist_offer_food_tooltip:0 "Un carnaval en Son honneur se tiendra dans l'une de nos §Yprovinces§!"

 aakhetist_offer_weapons:0 "§TTribut de Lames§!"
 desc_aakhetist_offer_weapons:0 "Les dragons sont réputés pour amasser des montagnes d'or. Pas Aakhet. Parmi Ses nombreuses excentricités figure Son amour des armes rares et précieuses."
 aakhetist_offer_weapons_tooltip:0 "§YAcheter§! les meilleures armes à offrir à Sa collection."

 aakhetist_offer_knowledge:0 "§TSavoir du Monde§!"
 desc_aakhetist_offer_knowledge:0 "Rassembler les nouvelles des événements du monde et les présenter à Aakhet. Nul doute qu'Il serait avide d'apprendre les derniers conflits militaires pour enrichir Sa connaissance sans bornes de l'art de la guerre."
 aakhetist_offer_knowledge_tooltip:0 "Il ne Se lassera jamais d'acquérir plus de §YSavoir§!"

 aakhetist_offer_mind:0 "§TAu service d'Aakhet§!"
 desc_aakhetist_offer_mind:0 "Aakhet n'a jamais régné seul. Bien que Sa parole soit absolue, Il a toujours valorisé l'avis de Ses sujets. Envoyons-Lui nos plus brillants esprits ; peut-être pourront-ils siéger à Ses côtés."
 aakhetist_offer_mind_tooltip:0 "Nos plus grands tacticiens §Yrejoindront§! Sa suite."

 aakhetist_aakhet_blessing:0 "Bénédiction d'Aakhet"
 desc_aakhetist_aakhet_blessing:0 "L'honneur se trouve au combat. Avec la bénédiction d'Aakhet, nombreux seront ceux empressés de s'entraîner et de combattre pour avoir la chance de se montrer dignes de Lui."
 aakhetist_aakhet_blessing_tooltip:0 "Avec Sa bénédiction, nos troupes §Yse préparent§! à la guerre."

 aakhetist_aakhet_retinue:0 "Suite d'Aakhet"
 desc_aakhetist_aakhet_retinue:0 "Aakhet se mêle régulièrement à la population sous un déguisement, débusquant ceux qui possèdent un talent pour le commandement. D'ordinaire, ils demeurent dans Son cercle intime secret, mais peut-être l'un d'entre eux pourrait-il mener nos armées au combat."
 aakhetist_aakhet_retinue_tooltip:0 "Un membre de Sa suite nous §Yconduira§! à la gloire."

 aakhetist_aakhet_wrath:0 "Courroux d'Aakhet"
 desc_aakhetist_aakhet_wrath:0 "Bien qu'Il prenne normalement forme humaine, Aakhet demeure un grand et puissant dragon. Son souffle de flammes peut faire fondre les murs de château les plus robustes."
 aakhetist_aakhet_wrath_tooltip:0 "Que Sa flamme §Yanéantisse§Y ce qui nous fait obstacle."

 aakhetist_aakhet_rage:0 "Rage d'Aakhet"
 desc_aakhetist_aakhet_rage:0 "Quiconque met Aakhet en colère sera personnellement traqué et brûlé vif par Lui, peu importe la distance qui les sépare."
 aakhetist_aakhet_rage_tooltip:0 "Notre ennemi a engagé de multiples §Ygénéraux§!"
 aakhetist_aakhet_rage_tooltip2:0 "Par Son feu, qu'ils soient §Ypurgés§! !"

 aakhetist_aakhet_conquest:0 "Conquête d'Aakhet"
 desc_aakhetist_aakhet_conquest:0 "Les conquêtes d'Aakhet ne visaient pas la destruction, mais la soumission. Nul besoin de réduire un pays entier en cendres quand une seule démonstration de force absolue suffit."
 aakhetist_aakhet_conquest_tooltip:0 "Par Son commandement, nous ferons §Yplier§! nos ennemis !"

 aakhetist_aakhet_wisdom:0 "Sagesse d'Aakhet"
 desc_aakhetist_aakhet_wisdom:0 "La Grande Bibliothèque de Koroshesh regorge de tomes historiques sur les Guerres Draconiques khétérataines. Notre héritier pourrait étudier ces ouvrages assommants, ou bien apprendre directement du dragon qui en est responsable."
 aakhetist_aakhet_wisdom_tooltip:0 "Par Son §Ysavoir§!, notre avenir sera assuré."

 aakhetist_aakhet_glory:0 "Gloire d'Aakhet"
 desc_aakhetist_aakhet_glory:0 "Osez-vous affronter le Dragon de Bronze en personne au combat ? Avez-vous le courage de défier notre dieu ? Pénétrez dans Sa salle et découvrez quels défis vous attendent..."
 aakhetist_aakhet_glory_tooltip:0 "Réussir Son §Yépreuve§! prouvera notre valeur."


 ###events

 aakhetist.cancel:0 "Ce n'est peut-être pas le meilleur moment."

 aakhetist.01.t:0 "Le Dragon de Bronze"
 aakhetist.01.d:0 "Juste avant le crépuscule, alors que les marchands du marché de la capitale commençaient à remballer leurs étals, les nuages au-dessus se fendirent dans un claquement sec d'éclair, illuminant une créature monstrueuse et terrifiante dans le ciel. La créature piqua du nez, descendant vers le centre de la cité tandis que les badauds, pris de panique, se cachaient sous les tables et se réfugiaient à l'intérieur. Dans un rugissement, la créature se redressa de son plongeon, et un autre éclair frappa le sol derrière elle, éclairant la silhouette gigantesque pour que tous la voient : un grand dragon de bronze. Une voix forte et tonitruante, qui semblait émaner de partout à la fois, résonna :\n\n« Mon peuple ! J'ai entendu vos appels. J'ai veillé sur vos prières, savouré vos offrandes et assisté à vos festivals. J'ai été impressionné par votre bravoure, votre loyauté et votre honneur. C'est pourquoi J'ai répondu à votre appel. »\n\nUn dernier éclair frappa la corne du grand dragon, et un tourbillon de flammes se mit à tourbillonner autour de Lui. Sa forme se métamorphosa jusqu'à toucher le sol, se changeant en la silhouette d'un homme en tenue militaire formelle, paré d'innombrables insignes et vêtu d'une courte cape ornée du symbole du dragon de bronze déployé dans son dos. Il leva les mains vers la foule et leur fit signe de s'approcher. « Ne craignez plus rien, car vos prières ont été exaucées. Car Moi, terreur de la Détresse, conquérant du Salahad, grand Dragon de Bronze Aakhet, Je suis de retour ! »\n\nL'acclamation commença timidement, mais à mesure que la nouvelle se répandait, de plus en plus de gens accoururent vers le centre de la cité pour accueillir leur dieu. Certains qui virent Sa silhouette s'effondrèrent au sol et pleurèrent, submergés par la joie de savoir que leurs prières avaient été exaucées. Bientôt, le pays tout entier connut la glorieuse vérité. Aakhet est de retour."
 aakhetist.01.a:0 "Gloire à Aakhet ! Gloire à [Root.GetName] !"
 aakhetist.01.tooltip:0 "De §Ynouvelles actions religieuses§! sont disponibles"

 aakhetist.02.t:0 "Perdre la faveur"
 aakhetist.02.d:0 "Aakhet s'est montré curieusement absent ces derniers temps. Suivre Ses allées et venues est naturellement difficile, étant donné Son penchant pour le changement de forme et Sa capacité à voler. Du moins, jusqu'à ce qu'Il révèle à l'un des serviteurs du palais qu'Il avait rendu visite aux aakhétistes de différentes contrées et avait été profondément impressionné par leur dévotion."
 aakhetist.02.a:0 "Ne Lui avons-nous pas accordé assez d'attention ?"

 aakhetist.03.t:0 "Abandonné"
 aakhetist.03.d:0 "Parti. Ses appartements où Il dormait sont vides, la plupart des vêtements ayant disparu. Le vieux grenier où Il entreposait Sa collection d'armes est vide. Son visage, sous quelque forme que ce soit, reste introuvable. Certains sont encore convaincus qu'Il Se cache parmi nous, déguisé comme à Son habitude, veillant sur notre peuple. Mais vous connaissez la vérité. Vous avez déçu le Dragon de Bronze pour la dernière fois."
 aakhetist.03.a:0 "Aakhet nous a abandonnés !"
 aakhetist.03.tooltip:0 "Nous ne pouvons plus accéder aux §YBénédictions d'Aakhet§!"

 aakhetist.04.t:0 "Invoquer le Dragon"
 aakhetist.04.d:0 "Nous savons qu'Il est là, quelque part. Le Dragon de Bronze. Elikhet réincarné. Celui qui jadis mena Son peuple à la gloire. Le grand dragon Aakhet. Nous savons qu'Il marche parmi nous sous un déguisement, jugeant nos capacités, attendant de voir si nous sommes dignes de Sa présence, de nous tenir sous Ses ailes.\n\nPour l'heure, tout ce que nous pouvons faire est louer Son nom, organiser des festivals en Son honneur et Lui laisser des offrandes. Certains nous traitent de fous, mais nous savons avec certitude qu'Il nous observe. Il nous faut simplement Lui prouver que nous sommes prêts à être guidés."
 aakhetist.04.a:0 "Il nous observe"
 aakhetist.04.tooltip:0 "Pour l'instant, nous ne pouvons qu'§Toffrir un tribut§! à §YAakhet§! et espérer qu'Il nous rejoigne en §Y[Root.GetName]§!. Une fois Son approbation à §Y100§!, tout tribut supplémentaire sabotera les relations de Son §Yhôte actuel§! avec Lui."

 aakhetist.05.t:0 "Le retour du Dragon de Bronze"
 aakhetist.05.d:0 "Pour la plupart des historiens, l'histoire de la Khétérata avec Aakhet le Bronze prend fin en 488. Le grand dragon prenait rarement Sa véritable forme draconique, préférant mener les armées sous apparence humaine. Ses conquêtes en tant que souverain de la Khétérata après l'Éveil-du-Dragon virent la conquête de la majeure partie du Bulwar, jusqu'à ce qu'il fût entraîné sous les sables par le Démon des Sables du Salahad.\n\nMais tous ne crurent pas que ce fût sa fin. Ces fanatiques du dragon de bronze, ou aakhétistes comme on les appelait communément, croyaient qu'Il avait fui le Démon des Sables pour Se cacher parmi le peuple de la Khétérata. Il refaisait parfois surface, déguisé en grand général, pour mener leurs armées au combat, avant de disparaître à nouveau dans les rues pour se mêler à la population. Cette croyance était particulièrement répandue parmi les confréries militaires des Ahati, ainsi que parmi le peuple d'Irsmahap et les soldats du sud à Aramoole. Ils croyaient que, s'ils Lui demeuraient loyaux, Aakhet le Bronze reviendrait les sauver à leur heure la plus sombre.\n\nEt c'est ce qui advint. Après le siège victorieux de Golkora par les gnolls de Gnollakaz en 1439, la Khétérata se scinda en deux. La panique se répandit à travers Khetapera. Pour ceux qui vivaient autour de la forteresse méridionale d'Aramoole, la menace des hommes-lézards au sud devint plus pressante maintenant qu'ils n'avaient plus la garantie que les soldats khétératains viendraient les renforcer en cas d'invasion. Même la plus belle forteresse finit par tomber face à un siège prolongé sans renforts. C'est à ce moment précis, alors que l'état-major d'Aramoole se réunissait pour discuter de la défense de ses frontières, que l'un d'entre eux révéla qu'il était Aakhet.\n\nAvec Aakhet guidant nos mains, rien ne pourra barrer notre route. Nous repousserons toute invasion des hommes-lézards, unirons le peuple Tijarikheti et remonterons la Détresse pour reconquérir le Mandat du Khet. La Khétérata sera de nouveau unie sous la conduite du Dragon de Bronze !"
 aakhetist.05.a:0 "Gloire à Aakhet"
 aakhetist.05.tooltip:0 "Tant qu'§YAakhet§! nous approuve, Il demeurera en §Y[Root.GetName]§! où Il pourra directement nous aider.\nNous devrions veiller à ce que Son approbation reste élevée en Lui offrant un §Ttribut§!"


 aakhetist.20.t:0 "Soumission"
 aakhetist.20.d:0 "Pour montrer notre dévotion à Aakhet, nos dirigeants doivent Se soumettre à Lui et prêter allégeance à Sa cause. La cérémonie de soumission n'est d'ordinaire qu'une simple prière prononcée à l'ombre d'un arbre, censée symboliser le fait de se tenir sous les ailes d'Aakhet.\n\nPour un souverain cependant, la tradition veut qu'il se dévête et se prosterne dans l'herbe, montrant sa volonté de tout abandonner pour suivre Aakhet. C'est une cérémonie d'humilité conçue pour qu'aucun roi ne se considère au-dessus d'Aakhet."
 aakhetist.20.a:0 "Je fais serment de dévotion à Aakhet"

 aakhetist.21.t:0 "Un festin pour un dragon"
 aakhetist.21.d:0 "Le règne d'Aakhet n'était pas seulement connu pour ses conquêtes militaires, mais aussi pour ses grands festivals. Aakhet Lui-même n'y assistait jamais officiellement, mais c'était un secret de polichinelle qu'Il y participait déguisé. En l'honneur d'Aakhet, tenons un nouveau festin en Son nom. Vidons les entrepôts, abattons notre plus beau bétail et organisons une fête dont les réjouissances seront contées dans les légendes ! Peut-être, si la fortune nous sourit, Aakhet Lui-même Se montrera."
 aakhetist.21.a:0 "Il faudra des années à la ville pour s'en remettre"

 aakhetist.22.t:0 "Un trésor de bronze"
 aakhetist.22.d:0 "Les dragons adorent amasser des trésors, et Aakhet ne fait pas exception. Cependant, fidèle à Sa réputation, le trésor du Dragon de Bronze n'était pas fait d'or ni de gemmes, mais d'armes. Épées, bâtons, lances et même engins à poudre, tous font partie de Sa collection. Achetons les plus belles armes pour les Lui offrir en présent, et peut-être gagnerons-nous Sa faveur."
 aakhetist.22.a:0 "Espérons qu'Il ne les possède pas déjà"

 aakhetist.23.t:0 "Collecte du savoir"
 aakhetist.23.d:0 "Le Télégraphe de Bronze était un système de télégraphie utilisé durant les Guerres Draconiques khétérataines, et constitua un élément majeur du succès des conquêtes d'Aakhet. Au moyen d'un système complexe de signaux lumineux utilisant de grandes plaques de bronze, les armées pouvaient communiquer sur de vastes distances très rapidement. Bien que le langage des signaux lumineux ait disparu, l'idée de collecter les informations sur les derniers événements militaires dans un « télégraphe » écrit demeura une tradition dans les communautés aakhétistes au fil des générations."
 aakhetist.23.a:0 "Envoyez le Télégraphe de Bronze"

 aakhetist.24.t:0 "Conseiller digne"
 aakhetist.24.d:0 "La raison pour laquelle nous savions qu'Aakhet était encore parmi nous et n'avait pas été terrassé par le Démon des Sables, c'est qu'Il révélait Sa véritable forme pour recruter ceux qu'Il estimait être des génies tactiques exceptionnels. Ils devenaient alors membres de Son cercle intime tandis qu'Il gravissait secrètement les échelons de la nation où Il avait élu domicile et menait les soldats au combat. Si nous pouvions faire ce travail pour Lui et Lui envoyer nos plus grands esprits militaires, peut-être nous récompenserait-Il de Sa présence."
 aakhetist.24.a:0 "Allez vous tenir à Ses côtés"

 aakhetist.25.t:0 "Aakhet, lumière dans les ténèbres"
 aakhetist.25.d:0 "« J'ai vécu un millénaire sur cette planète, vu des civilisations s'élever et s'effondrer. J'ai vu leurs soldats fuir le champ de bataille en terreur au premier signe de doute, car ils manquaient de courage, de volonté, de force d'âme pour combattre. Par-dessus tout, ils manquaient d'une raison, poussés sur le champ de bataille par un seigneur indifférent, pas préparés aux horreurs qui les attendaient.\n\nMais vous êtes différents, car vous combattrez aux côtés de votre seigneur. Vos cœurs seront emplis d'espoir, sachant que vous avez une raison de combattre. Vous combattez pour [Root.GetName]. Vous combattez pour le Dragon de Bronze. Vous combattez pour Moi, comme Je combats pour vous. Vous êtes les cœurs-de-dragon, et la gloire sera vôtre ! »"
 aakhetist.25.a:0 "Gloire à Aakhet !"

 aakhetist.26.t:0 "Aakhet, maître des hommes"
 aakhetist.26.d:0 "Les appartements d'Aakhet sont normalement strictement interdits d'accès à quiconque ne bénéficie pas d'une invitation expresse. C'est pourquoi ce fut un tel choc de voir une vingtaine de personnes se tenant dans l'ombre derrière Lui tandis qu'Il était assis à une table au milieu de la pièce, faisant nonchalamment tournoyer un poignard entre Ses mains.\n\n« Je ne fais jamais confiance aux généraux nommés par un roi. Le népotisme et la corruption dictent bien trop souvent qui dirige. C'est pourquoi Je trouve Moi-même des conseillers talentueux pour M'aider dans Mes décisions. » Il planta le poignard dans la table, Se leva et, dans un tournoiement théâtral de Ses robes, claqua des doigts, allumant chaque chandelle de la pièce d'un coup, révélant les visages de tous ceux qui se tenaient derrière Lui.\n\n« Je suis d'humeur généreuse. Vous pouvez prendre un membre de Ma suite. Qu'il mène vos forces à la gloire. Je suis certain qu'il fera mieux que quiconque vous employez actuellement. »"
 aakhetist.26.a:0 "Ils mèneront nos forces au combat"

 aakhetist.27.t:0 "Aakhet, embraseur de mondes"
 aakhetist.27.d:0 "Les cieux ont une fois encore été honorés par le Dragon de Bronze !\n\nDans un rugissement perçant, Il fondit sur les remparts, embrasant tout sur Son passage. Roche et pierre fondirent partout où Ses flammes frappèrent. Là où des milliers de nos hommes auraient péri si nous avions tenté d'escalader ces murs, Aakhet les anéantit en un instant. Il piqua devant les troupes assiégeantes tandis qu'elles scandaient Son nom, atterrissant devant elles et crachant une boule de feu dans les airs sous les acclamations des soldats.\n\nAakhet baissa Sa tête près du général et murmura d'une voix qui, malgré tout, portait parfaitement à des lieues à la ronde : « Ne prenez pas l'habitude de ce genre de requête. Je préfère laisser une chance à nos ennemis. »"
 aakhetist.27.a:0 "Brûlez !"

 aakhetist.28.t:0 "Aakhet, destructeur de légions"
 aakhetist.28.d:0 "Sous la lueur de la lune, Il frappa. Ses écailles scintillant sous les feux qu'Il allumait en contrebas, les forces de [event_country.GetName] furent terrorisées toute la nuit par le Dragon de Bronze. Ce n'était point destruction aveugle cependant. La rage d'Aakhet n'est pas une furie insensée, mais une frappe mortelle de précision au cœur de Ses ennemis. Un à un, chaque général menant les forces [event_country.GetAdjective] fut embrasé par Aakhet, avant qu'Il ne Se redresse de Son plongeon enflammé et ne reprenne son essor vers le ciel, en quête de Sa prochaine proie."
 aakhetist.28.a:0 "La voie est dégagée pour nos forces"
 aakhetist.28.tooltip1:0 "§YAakhet§! estime que tuer autant de généraux banalise cette guerre"
 aakhetist.28.tooltip2:0 "§YAakhet§! est déçu que nous ayons dû compter sur Lui pour combattre un misérable mage"
 aakhetist.28.tooltip3:0 "§YAakhet§! est mécontent d'avoir dû tuer le souverain ennemi de manière si simple"

 aakhetist.28.tooltip4:0 "Tous leurs §Ygénéraux§! brûleront !"

 aakhetist.29.t:0 "Aakhet, subjugueur de royaumes"
 aakhetist.29.d:0 "Les briefings militaires d'Aakhet sont imprévisibles. Souvent, ils ne sont qu'un prétexte pour Lui de ressasser Ses anciennes conquêtes. Parfois Il conçoit un stratagème si élaboré que pas un seul général dans la salle ne peut le suivre, laissant les plans inachevés et Aakhet frustré.\n\nCe plan était différent. En quelques étapes simples, Il exposa avec précision comment décapiter la direction de [event_country.GetName] et la placer sous notre contrôle en une seule guerre. Le génie résidait dans sa simplicité. Parfois, plus d'un millénaire d'expertise en campagnes militaires porte effectivement ses fruits."
 aakhetist.29.a:0 "Nous les ferons plier !"

 aakhetist.30.t:0 "Aakhet, maître bienveillant"
 aakhetist.30.d:0 "Quand on trouvait Aakhet au palais, c'était d'ordinaire en train de se quereller avec des généraux apeurés dans la salle de guerre. Mais aujourd'hui, Aakhet Se tenait dans la cour, regardant l'héritier du trône brandir une petite épée de bois, aboyant des ordres sur la posture déplorable de l'héritier. Il était rare que le dragon reste éloigné du champ de bataille aussi longtemps. Il semble que les supplications du seigneur pour entraîner son héritier à l'art de la guerre aient porté leurs fruits."
 aakhetist.30.a:0 "Apprendre du meilleur"

 aakhetist.31.t:0 "Aakhet, majesté glorieuse"
 aakhetist.31.d:0 "Quand Aakhet vous a convié dans Ses appartements pour un duel afin de juger votre valeur, vous vous étiez mentalement préparé à ce que vous pensiez être toute éventualité. Ce à quoi vous n'étiez pas préparé, c'était la vue du Dragon de Bronze en personne, assis à une petite table sous Sa forme humaine habituelle, en train de battre un jeu de cartes.\n\n« Seules trois créatures connues ont jamais tué un khet. » Aakhet vous fit signe de prendre place en face de Lui. « Moi, la démoniaque Xhazobine, et un autre khet. Le khetarch préfère garder ce dernier cas secret, car deux khet s'affrontant est un spectacle terrible. Aussi, lorsque des désaccords surviennent entre khet, ils règlent leurs différends par un jeu élaboré d'invocation de monstres. J'ai toujours été fasciné par ce jeu, et J'ai créé Ma propre version avec ces cartes à jouer. »\n\nIl posa un paquet de cartes de l'autre côté de la table et vous invita à les consulter. « Malheureusement, les nouveaux joueurs sont très difficiles à trouver, et Je déteste jouer contre les khet. Ils sont de terriblement mauvais perdants. » Il posa Son paquet face cachée, joignit Ses doigts en clocher et vous observa par-dessus la table. « Mais vous M'intriguez. Je pense que vous pourriez avoir l'esprit nécessaire pour maîtriser ce jeu. »"
 aakhetist.31.a:0 "L'heure du duel a sonné !"
 aakhetist.31.tooltip:0 "Que le jeu commence"


 aakhetist.33.t:0 "Premier tour"
 aakhetist.33.d1:0 "Aakhet tira une carte de Sa main et l'abattit théâtralement sur la table entre vous. « Je joue le Démon des Sables du Salahad. Un monstre puissant en effet. Certains disent qu'il M'a même tué, bien que comme vous pouvez le constater par Ma présence ici aujourd'hui, ce fut au mieux un match nul. »"
 aakhetist.33.d2:0 "Aakhet tira une carte de Sa main et vous la montra. « La Jarre d'Avidité. Elle Me permet de piocher deux nouvelles cartes. Une carte bien appropriée pour un jeu inventé par les khet, ne trouvez-vous pas ? » Il gloussa de Sa propre plaisanterie tout en piochant Ses nouvelles cartes."
 aakhetist.33.a:0 "Magicien des Ombres"
 aakhetist.33.tooltip1:0 "Cette carte est un monstre §Tpuissant§!"
 aakhetist.33.b:0 "Gouffre sans fond"
 aakhetist.33.tooltip2:0 "Cette carte nous protégera des §Tmonstres à venir§!"
 aakhetist.33.c:0 "Golem de Fangaula"
 aakhetist.33.tooltip3:0 "Cette carte possède de §Tsolides défenses§!"
 aakhetist.33.d:0 "Traîné dans la Tombe"
 aakhetist.33.tooltip4:0 "Cette carte nous permettra de §Tretirer une carte§! de la main d'§YAakhet§!"

 aakhetist.35.t:0 "Deuxième tour"
 aakhetist.35.d1:0 "« Je joue le Kobold Loyal, ce qui Me permet de jouer une carte piège de Ma main. Je n'ai jamais été particulièrement fasciné par les kobolds, mais J'ai assurément entendu parler de leur ingéniosité en matière de pièges sournois. » Il s'apprêta à poser la carte sur la table, mais marqua une pause, observant l'illustration.\n\n« Curieux. J'ai copié ces dessins des grandes dalles de pierre utilisées par les khet. À y regarder de plus près, celui-ci semble être un kobold de bronze. Je n'en ai jamais créé, n'est-ce pas ? D'où auraient-ils pu naître ? Peut-être dans le Salahad ? Ou dans les montagnes de Khetapera ? Tout de même pas sous la pyramide ? »\n\nAakhet tambourina des doigts sur la table, fixant intensément la carte pendant quelques secondes, avant de hausser les épaules et de la poser sur la table avec Sa carte piège face cachée. « C'est probablement juste un kobold d'or mal coloré. »"
 aakhetist.35.d2:0 "Aakhet Se mit à réarranger les cartes dans Sa main, avant de sourire pour Lui-même. Il posa une seule carte face cachée sur la table. « Cette carte piège est tout ce que J'ai pour vous ce tour-ci, mais c'est tout ce qu'il Me faut pour rester en sécurité pour l'instant. Vous ne serez pas prêt pour la tempête qui s'abattra sur vous au prochain tour. »"
 aakhetist.35.a:0 "Fissure"
 aakhetist.35.tooltip1:0 "Cette carte §Tdétruira§! un monstre"
 aakhetist.35.b:0 "Kirrubeh"
 aakhetist.35.tooltip2:0 "Cette carte nous §Tprotégera§!"
 aakhetist.35.c:0 "Magicienne des Ombres"
 aakhetist.35.tooltip3:0 "Cette carte est un monstre §Tpuissant§!"
 aakhetist.35.d:0 "Ouragan Spatial Mystique et Pain Muté"
 aakhetist.35.tooltip4:0 "L'Ouragan §Tretirera§! un piège et le Pain §Tattaquera§!"

 aakhetist.37.t:0 "Troisième tour"
 aakhetist.37.d1:0 "« Enfin, Je peux jouer cette carte ! » proclama un Aakhet visiblement ravi. « Je joue Éveil-du-Dragon ! Avec cette carte, Je peux invoquer chaque carte dragon de Ma main. Paraissez, Nimrith le Rouge, Zaamalot le Noir, et Alos le Cuivré ! » La pièce elle-même se mit à trembler tandis que des formes draconiques tourbillonnaient autour de la table. Les yeux d'Aakhet commencèrent à luire, et vous auriez juré voir des flammes danser sous Son sourire. « Mes frères et sœurs Me reviennent pour cette partie. Aucun d'entre eux n'a survécu jusqu'à la fin de l'Éveil-du-Dragon, mais Je doute que vous surviviez au prochain tour. »"
 aakhetist.37.d2:0 "« D'abord, Je joue Terreur Astrale. Cela Me permet d'invoquer Eztarthul depuis Ma main, ce qui Me permet de chercher une carte Damestear dans Mon deck. De là, Je peux maintenant invoquer... »\n\nÀ ce stade, vous perdez le fil de ce qu'Aakhet raconte, tandis qu'Il explique minutieusement chaque coup, entrecoupant Ses explications de divers fragments de savoir historique et d'anecdotes personnelles sur des batailles et des dragons qu'Il a rencontrés au fil des âges. Vous êtes assez convaincu qu'Il invente les règles au fur et à mesure, mais vous n'osez pas Le contester. Le tour entier dure plus de cinq minutes avant qu'Il ne joue enfin Sa dernière carte.\n\n« ...ce qui signifie que Je peux fusionner les trois pour créer le Dragon Eldritch des Temps Anciens, un dragon que Je crois inventé par Septkhet pour effrayer les jeunes khet et leur inculquer la crainte des dragons. Ha ! C'est du dragon de bronze qu'il aurait dû se méfier. » Vous contemplez la monstruosité horrifiante du dragon sur la carte devant vous, dont les statistiques dépassent de loin celles de toute autre carte vue jusqu'ici dans la partie."
 aakhetist.37.a:0 "Tayekan le Bleu"
 aakhetist.37.tooltip1:0 "Cette carte est un monstre §Tpuissant§!"
 aakhetist.37.b:0 "Invocation de Castan"
 aakhetist.37.tooltip2:0 "Cette carte peut prendre le §Tcontrôle§! d'un monstre"
 aakhetist.37.c:0 "Murailles Blanches de Castanor"
 aakhetist.37.tooltip3:0 "Cette carte peut §Tbloquer plusieurs monstres§! de vous attaquer"
 aakhetist.37.d:0 "Jarre d'Avidité"
 aakhetist.37.tooltip4:0 "Cette carte vous permettra de §Tpiocher§! deux nouvelles cartes"

 aakhetist.38.t:0 "La fin"
 aakhetist.38.d1:0 "Aakhet examina la dernière carte que vous avez jouée, avant d'éclater de rire. « Si votre stratégie était de jouer un coup si lamentable que Je forfaiterais par pitié, alors c'était effectivement la bonne carte. » Il continua de rire tandis que la pièce autour de vous commençait à s'assombrir. Des ombres se mirent à ramper au coin de votre vision. Une terreur commença à vous envahir en réalisant que peut-être, vous n'auriez pas dû vous engager dans un jeu auquel jouent les dieux.\n\n« Savez-vous ce que les khet faisaient à leurs sujets qui perdaient à ce jeu ? Ils étaient envoyés dans le Plan de l'Ombre, pour être parmi la mort et la décomposition qui peuplent ce monde. J'ai cherché à recréer leur jeu de manière quasi identique. » La pièce autour de vous se mit à trembler plus violemment, jusqu'à ce que, sans avertissement, tout s'arrête, ne laissant que vous et un Aakhet narquois assis de part et d'autre de la table.\n\n« Mais cet aspect n'est pas quelque chose que J'ai mis dans Ma version de leur jeu. À présent, sortez de Mes quartiers. Si c'est le mieux que votre peuple peut proposer dans un jeu avec les dieux, alors ils ont besoin de vous vivant pour les diriger, de crainte qu'ils ne sachent même plus mettre un pied devant l'autre. »"
 aakhetist.38.d2:0 "Votre dernier coup prend Aakhet complètement au dépourvu. Son dernier tour avait vidé Sa main, et Il n'a plus rien à jouer. « Ha, ne vous réjouissez pas encore ! » dit-Il en retrouvant temporairement Sa contenance et en piochant une nouvelle carte. « Car Je crois au cœur de la... cette carte ne vaut rien ! » Il lança la dernière carte avec tant de force qu'elle se ficha dans le mur. L'espace d'un instant, l'inquiétude vous gagna, pensant que peut-être vous auriez dû laisser Aakhet gagner pour avoir la vie sauve. Mais à la place, le dragon laissa échapper un grand éclat de rire.\n\n« Voilà une bonne partie ! Cela faisait longtemps que Je ne M'étais pas autant amusé. Presque aussi longtemps que depuis la dernière fois que quelqu'un M'a vaincu au combat. Le peuple de [Root.GetName] est entre de bonnes mains avec vous à sa tête. »"
 aakhetist.38.a:0 "Une défaite cuisante"
 aakhetist.38.b:0 "Une victoire glorieuse !"

 aakhetist.39.t:0 "Feu et cendres"
 aakhetist.39.d:0 "Nos braves soldats défendaient vaillamment les murs de la forteresse, gardant l'espoir que ce siège finirait par être levé. Du moins, jusqu'à ce qu'un dragon aux écailles de bronze descende des nuages dans un tourbillon de terreur et de flammes, faisant fondre les murs de pierre jusqu'à leurs fondations. Nos défenses sont en ruines, et il ne faudra pas longtemps avant que le château ne tombe."
 aakhetist.39.a:0 "Maudit soit ce dragon"

 aakhetist.40.t:0 "Mort ailée"
 aakhetist.40.d:0 "Il frappa au cœur de la nuit. Un grand dragon aux écailles de bronze fondit sur nos campements militaires, incendiant les quartiers des officiers, avant de s'élever hors des flammes et de disparaître à nouveau dans la nuit. Ce n'était pas une attaque aveugle, mais un assassinat ciblé de chacun de nos généraux, laissant notre armée en plein désarroi."
 aakhetist.40.a:0 "Cette guerre vient de devenir plus difficile"
 aakhetist.40.tooltip:0 "Tous nos §Ygénéraux§! ont été brûlés !"

 aakhetist.50.t:0 "Les trêves sont pour les faibles"
 aakhetist.50.d:0 "Lors d'un rapport de renseignement sur les capacités militaires de [event_country.GetName], Aakhet fit ce qu'Il fait régulièrement et intervint avec une suggestion inutile. « Pourquoi n'envahissons-nous pas [event_country.GetName] maintenant ? Ils sont plus affaiblis que jamais par leurs récents conflits. C'est le moment idéal pour frapper. » Tout le monde resta silencieux pendant plusieurs secondes, les regards passant nerveusement d'un visage à l'autre, jusqu'à ce que le plus jeune soldat de la salle prenne la parole : « Parce que nous avons une trêve avec eux, votre Honneur. Il serait déshonorant de les envahir en ce moment. »\n\n« Une trêve ?! »\n\nAakhet renversa Sa tête en arrière et lança un grand rire perçant. « Écoutez, les trêves sont une construction sociale. Aucune force ne vous empêche de les rompre. Si vous vous sentez liés par ces traités sans valeur, vous vous désignez simplement comme faibles. En guerre, camarades, ou bien nous ne sommes que des couards ! »"
 aakhetist.50.a:0 "Quelle brillante idée, Aakhet"
 aakhetist.50.b:0 "Nous devons honorer notre trêve"

 aakhetist.51.t:0 "L'heure de la conquête"
 aakhetist.51.d:0 "C'était une journée inhabituellement paisible à [Root.Capital.GetName]. Du moins, jusqu'à ce qu'un rugissement assourdissant retentisse au-dessus des têtes, le Dragon de Bronze descendant de la lumière du soleil pour atterrir en plein milieu du marché, renversant les étals et envoyant les marchands rouler au sol. Certains tentèrent de se mettre à genoux pour offrir une prière, avant d'être renversés par le battement de Ses ailes. Le dragon fit jaillir un tourbillon de flammes tandis qu'Il Se métamorphosait pour retrouver la silhouette entièrement nue d'Aakhet.\n\n« Nous devons envahir [event_country.GetName] immédiatement ! » hurla Aakhet, saisissant une robe projetée d'un étal renversé et gesticulant furieusement vers la foule débraillée. « Leurs soldats sont faibles, leurs dirigeants corrompus, et leur peuple souffre sous leur règne injuste. Nous ne pouvons rester les bras croisés et laisser leur faiblesse perdurer sans réagir. Nous devons montrer notre force en cet instant et frapper sans plus tarder. » Revêtant la robe, Il brandit le poing et cria : « En guerre ! »\n\nLa foule éclata en jubilation effrénée et Aakhet disparut dans la mêlée. Le temps que la nouvelle du dernier décret d'Aakhet parvienne au palais, le dragon de bronze était introuvable, ayant été aperçu pour la dernière fois brandissant ce qui semblait être une chaussure remplie de vin. Obéissons-nous à Son appel, ou espérons-nous qu'Il aura oublié d'ici demain ?"
 aakhetist.51.a:0 "En guerre !"
 aakhetist.51.b:0 "Espérons qu'Il oubliera tout cela"

 aakhetist.52.t:0 "Progéniture indigne"
 aakhetist.52.d:0 "« Entrez », dit la voix derrière la porte. Vous poussez nerveusement la porte des appartements d'Aakhet et Le trouvez assis à une table, étudiant un ouvrage sur la langue du peuple bulwari, plume à la main sur un parchemin. Vous vous tenez au garde-à-vous pendant ce qui semble être dix minutes avant qu'Aakhet ne cesse finalement d'écrire et ne lève les yeux vers vous, faisant tournoyer la plume entre Ses doigts.\n\n« Je partageais généreusement Mon savoir inestimable en histoire militaire avec votre héritier aujourd'hui, dans l'espoir qu'il puisse un jour contribuer à Mon objectif de mener cette nation à la grandeur. Nous en étions arrivés au récit de Mon incroyable conquête de la Porte du Salahad, et savez-vous ce qu'il a dit ? » La voix d'Aakhet se brisa légèrement. « Il a dit qu'il ne souhaitait pas en entendre parler. » La plume dans Sa main se cassa en deux. Il la regarda, jura entre Ses dents, puis la posa délicatement et releva les yeux vers vous.\n\n« Maints dirigeants ont été en désaccord avec Moi. Ils ont toujours tort, mais Je peux apprécier leur point de vue. Cela démontre une volonté forte que de débattre avec un dragon. Ce que Je ne supporte pas, c'est celui qui est si profondément ignorant qu'il ne désire même pas apprendre. Une telle personne ne peut diriger ce pays. J'attends de vous que les dispositions nécessaires soient prises pour que cela ne se reproduise plus. »"
 aakhetist.52.a:0 "Comme vous le souhaitez, Aakhet"
 aakhetist.52.b:0 "Peut-être que des excuses pourraient arranger les choses"

 aakhetist.53.t:0 "Fortifications stratégiques"
 aakhetist.53.d:0 "Les réunions de stratégie militaire avec Aakhet durent souvent bien plus longtemps que prévu, mais même selon Ses standards, celle-ci était absurde. Au moins deux généraux s'étaient endormis. L'un des gardes en faction avait dû être évacué, terrassé par l'épuisement. Il n'y avait vraisemblablement plus personne dans la salle, hormis le Dragon de Bronze Lui-même, qui savait encore quel était l'objet de la réunion.\n\nParfaitement indifférent au manque d'attention de Son auditoire, Aakhet poursuivit Son exposé. « ...et Je superviserai personnellement la construction de cette forteresse, sans quoi Je ne crois pas qu'elle satisfera aux spécifications exposées aujourd'hui. » Les yeux vitreux, l'assemblée scruta l'endroit sur la carte qu'Aakhet désignait. C'était une vaste étendue de terrain plat, loin de tout relief défendable. « Cela sera assurément plus coûteux que toutes les fortifications défensives précédentes et prendra naturellement du temps en raison de tout ce que J'ai exposé ici. Les crocodiles imprégnés de Damestear ne sont pas bon marché, après tout. »"
 aakhetist.53.a:0 "Bien sûr, Aakhet, votre génie est sans limites"
 aakhetist.53.b:0 "Inventer quelque excuse budgétaire"

 aakhetist.54.t:0 "Armée pathétique"
 aakhetist.54.d:0 "L'un des devoirs d'un souverain est d'assister aux défilés militaires pour galvaniser les troupes. Debout, saluant les soldats en marche, vous remarquez l'un d'eux rompre les rangs et se diriger droit vers vous. Pris de panique, vous cherchez vos gardes du regard, mais chacun d'entre eux semble avoir simultanément reçu du sable dans les yeux, tous aveuglés et se frottant le visage. Vous tâtonnez pour saisir votre épée tandis que ce que vous pensez être un assassin s'avance vers vous et salue, avant de se pencher et de gronder d'un ton que vous reconnaissez instantanément, même sous cette nouvelle apparence : Aakhet.\n\n« Vos troupes se sont manifestement inspirées des khet. De tout Mon temps parmi eux, Je n'ai jamais rencontré collection de soi-disant soldats plus paresseuse, gâtée et inutile. Nous devons dissoudre chaque homme de ce bataillon sur-le-champ, ainsi que toutes nos unités de réserve. Car si nous les envoyons au combat, Je crains qu'ils ne se crèvent les yeux eux-mêmes avant de blesser un ennemi. » Aakhet se redressa, salua et retourna vers l'unité au pas de marche."
 aakhetist.54.a:0 "Nous devons écouter ses sages paroles"
 aakhetist.54.b:0 "Je ferai semblant de ne pas savoir qui c'était"

 aakhetist.55.t:0 "Murmures des imbéciles"
 aakhetist.55.d:0 "Pouvoir parler directement à son dieu est un grand honneur, un privilège que peu d'autres en ce monde peuvent prétendre avoir. Ce que votre prédécesseur n'avait jamais précisé, c'est combien de ce temps de conversation avec ledit dieu serait consacré à l'écouter se plaindre.\n\n« Des imbéciles décrépits, chacun d'entre eux. » Aakhet abattit Son poing sur la table, laissant une marque fumante derrière Lui, tout en mordant dans un pilon de poulet de l'autre main. « Si Je dois entendre le mot "budget" une fois de plus, Je pourrais bien déclencher un second Éveil-du-Dragon. Ces crétins ne savent-ils pas qu'il faut dépenser de l'or pour en gagner ? La misérable dette contractée pour l'expansion sera éclipsée par les revenus que nous tirerons des réparations après la conquête. » L'os commença à visiblement se carboniser dans Sa main tandis qu'Il le pointait vers vous. « Je veux que chacun de vos conseillers de haut rang soit jugé pour trahison et blasphème. Ils tentent de saper Mon autorité. »"
 aakhetist.55.a:0 "Ils seront destitués sans délai"
 aakhetist.55.b:0 "Laisser à Aakhet quelques jours pour se calmer"

 aakhetist.56.t:0 "Guerriers dignes"
 aakhetist.56.d:0 "« Savez-vous ce qui rend cette nation grande ? » dit Aakhet, paradant dans un champ en tenue militaire complète. Il était suivi d'une file de prêtres inquiets, de badauds curieux, d'adorateurs fascinés et d'une cavalcade de conseillers portant des cartes de divers plans de bataille. « Moi, bien sûr. Mais ce qui rend aussi cette nation grande, c'est notre diversité. Tant de gens remarquables avec tant à offrir à ce pays. J'ai parcouru les terres, entraîné nos troupes, et aucun ne M'a plus impressionné que les soldats des anciens territoires conquis. »\n\nIl s'arrêta brusquement au milieu du champ et Se frappa le front. « Mais bien sûr, pourquoi n'y ai-Je pas pensé plus tôt ? Parfois Ma propre ingéniosité Me surprend. » Aakhet pivota, arracha une carte d'une pile de parchemins d'un conseiller et la déroula au sol devant la foule. Il saisit un couteau et le plongea à travers un point de notre nation. « Nous devrions tirer parti de leurs prouesses militaires et les libérer de notre commandement direct en tant que marche de notre nation. Ils ne pourront s'épanouir si nous tentons de les intégrer à nos forces existantes. N'êtes-vous pas tous d'accord avec Mon plan incroyable ? »"
 aakhetist.56.a:0 "Bien sûr, Aakhet, quelle idée magnifique"
 aakhetist.56.b:0 "Gardons-les sous notre commandement pour l'instant"

 aakhetist.57.t:0 "Des ouvriers aux soldats"
 aakhetist.57.d:0 "L'un des passe-temps favoris d'Aakhet était d'assister aux exercices militaires et de se plaindre des nouvelles recrues. D'ordinaire, Il repartait satisfait que Ses critiques aient été entendues et seraient mises en œuvre, mais Sa dernière visite semblait L'avoir troublé bien plus que d'habitude. « Cette nation n'est-elle bonne qu'à produire des colifichets pour les riches ? Je ne peux blâmer les jeunes d'aujourd'hui, car on ne leur donne même pas leur chance. Nous avons clairement passé trop de temps à courir après l'or au lieu de la gloire.\n\n« Regardez le triste état de ceci. » Aakhet semblait sincèrement peiné tandis qu'Il jetait à terre un bouclier de bois brisé. « Voilà le type d'équipement que nos jeunes recrues sont contraintes d'utiliser lors de leurs exercices. Je veux que ces manufactures soient rasées et que de nouveaux centres d'entraînement militaire soient bâtis à leur place. Si Je dois critiquer la jeunesse d'aujourd'hui, J'exige au moins qu'on lui donne une chance de Me décevoir. »"
 aakhetist.57.a:0 "Nous commencerons leur construction sur-le-champ"
 aakhetist.57.b:0 "Ces manufactures sont des rouages essentiels de notre économie"

 aakhetist.58.t:0 "Conjureurs de tours de pacotille"
 aakhetist.58.d:0 "Un personnage éminent de la Guilde des Mages venait de dire par inadvertance quelque chose d'extrêmement condescendant au sujet d'Aakhet. Le mage fautif avait été réduit à guère plus qu'une paire de chaussures fumantes par Aakhet, mais à en juger par ce que le dragon furieux avait déclaré ensuite, Il avait l'intention de promulguer quelque décret sur les activités des mages en [Root.GetName].\n\nUn messager entra dans la salle au pas de marche, salua et remit un parchemin couvert de la graphie d'Aakhet et de Son sceau draconique officiel. À l'intérieur figurait une série d'exigences outrageantes auxquelles les mages devaient se conformer, incluant de sévères restrictions sur la recherche, des limitations drastiques du recrutement et un élargissement considérable de leurs devoirs d'assistance militaire. Mettre tout cela en œuvre portera atteinte au pouvoir et à l'intégrité de nos mages pour très, très longtemps. D'un autre côté, veut-on vraiment s'attirer les foudres d'Aakhet après ce qu'Il a fait à ce mage ?"
 aakhetist.58.a:0 "Transmettre le décret d'Aakhet sur-le-champ. Les mages doivent être punis"
 aakhetist.58.b:0 "Ce n'était qu'un seul mage, et son cas a été réglé"

 aakhetist.59.t:0 "Une alliance défavorable"
 aakhetist.59.d:0 "Des verres tintèrent tandis que divers dignitaires saluaient l'amitié entre les nations de [Root.GetName] et de [event_country.GetName]. Cette dernière rencontre était plus cérémonielle que pratique, mais son intention était de renforcer les liens entre nos deux nations. Aakhet y assistait, quoique déguisé, cette fois en l'un des serveurs s'occupant des convives au festin. Riant d'une blague exécrable d'un diplomate en visite, vous aperçûtes Aakhet vous faisant furieusement signe depuis le couloir menant aux cuisines. Vous excusant, vous quittâtes la table et sortîtes voir ce que votre dieu souhaitait vous dire.\n\n« Cet imbécile vient de Me révéler des secrets militaires vitaux sur nos opérations communes », chuchota Aakhet d'un ton furieux. « Rien de plus qu'une question polie a suffi pour qu'il divulgue des informations aussi critiques. Pouvez-vous imaginer quels autres renseignements classifiés leurs diplomates imbéciles ont bien pu révéler ? Je n'ai jamais approuvé cette alliance, et à présent J'ai la preuve qu'elle nous nuit plus qu'elle ne nous aide. Nous ne pouvons laisser cette mascarade se poursuivre. »"
 aakhetist.59.a:0 "Nous devons mettre fin à cette alliance"
 aakhetist.59.b:0 "Ce n'était qu'un seul diplomate"

 aakhetist.60.t:0 "Économie de guerre"
 aakhetist.60.d:0 "Parfois, la présence d'Aakhet aux exercices militaires galvanisait les soldats vers de plus hauts exploits. D'autres fois, comme aujourd'hui, elle ne faisait que les rendre nerveux. Après avoir regardé un soldat trébucher et rater le mannequin d'entraînement, Aakhet s'avança et prit le couteau des mains de la recrue bégayante. « N'ayez crainte, Mes adorables oisillons, car Je vais vous montrer la bonne manière de manier cette arme. » Dans une fioriture théâtrale, Il fit passer le couteau d'une main à l'autre, puis le projeta sur le mannequin. La lame échoua complètement à percer sa cible, déviant sur le côté et laissant le mannequin indemne.\n\nPersonne n'osa bouger ni émettre le moindre bruit tandis qu'Aakhet fixait le couteau fautif. Il marcha vers le général terrorisé en charge et brandit la lame sous son nez. « Je veux que toutes les ressources soient détournées vers l'expansion des mines de [event_province2.GetName]. Ces armes doivent être fourrées de sciure à cause de pénuries, car il n'existe aucune autre explication possible à ce dont nous avons tous été témoins aujourd'hui. »"
 aakhetist.60.a:0 "Détourner nos ressources sur-le-champ"
 aakhetist.60.b:0 "Cette arme avait simplement besoin d'être affûtée"


 ###modifiers
