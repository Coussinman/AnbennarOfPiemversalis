l_french:

 #Events
 corins_circle.1.t:0 "Le Cercle de Corin : Sire Laurens síl Place"
 corins_circle.1.d:0 "L'Orda Aldresia fut fondée au lendemain de la Croisade Aldresienne, un ordre chevaleresque ayant juré obéissance à l'Empereur d'Anbennar et voué à la destruction du mal. Mais Laurens síl Place, un mage-chevalier de Tellum, s'était toujours davantage consacré au second aspect. Quand la Marée Verte déferla, il refusa l'ordre de l'Orda de rester en place et de suivre les directives de l'Empereur. Au lieu de cela, lui et un groupe d'autres chevaliers partirent de leur propre chef combattre les orques, se déclarant l'Ordre de la Volonté Sacrée. Dans ce rôle, il fut l'un des premiers mages-chevaliers à prendre les armes contre la Marée Verte, et l'un des premiers à reconnaître la volonté ardente de Corin et à lier sa vie à sa cause et à son Cercle.\n\nLaurens ne pouvait lui enseigner la magie, et son style de combat entremêlait si intimement divination et enchantement que peu de son maniement de l'épée lui était pertinent. Mais il pouvait lui enseigner la stratégie et la planification, ce qu'il fit avec vigueur — remettant constamment en question ses idées instinctives et les poussant vers une efficacité maximale. Il ne manquait jamais de rappeler au Cercle les terribles chances dressées contre eux, et l'importance suprême de leur cause. Ils ne pouvaient se permettre autre chose que le chemin le plus efficace, au diable les conventions d'aventuriers ou le mépris des Seigneurs des Marches.\n\nPeut-être ses conseils portèrent-ils leurs fruits, car assurément le succès de Corin n'était pas garanti, et l'histoire aurait pu emprunter tant de chemins qui n'auraient pas mené à ce jour fatidique à Castonath. C'était certainement l'avis de síl Place, et dans les années qui suivirent, il prêta occasionnellement son expertise à d'autres campagnes contre les Peaux-Vertes.\n\nApparemment, il pense que [Root.Monarch.GetName] prépare un tel effort, car aujourd'hui il est arrivé à [Root.Capital.GetName], sollicitant une audience. Il souhaiterait rejoindre notre cour, conseiller [Root.Monarch.GetTitle], et s'assurer que nous détruisions quelque mal chaque jour."
 corins_circle.1.a:0 "Bien sûr ! Nous sommes honorés de vous accueillir parmi nous."
 corins_circle.1.b:0 "Nous serions ravis de bénéficier de vos conseils pour tracer notre route."
 corins_circle.1.c:0 "Corin n'avait pas vraiment besoin de vous, et nous non plus."

 corins_circle.2.t:0 "Tuer le Mal, et son Prix"
 corins_circle.2.d:0 "Depuis qu'il a rejoint nos forces, Laurens síl Place a bien servi, et nous devons une part de nos récents succès à ses idées ingénieuses et ses tactiques brillantes. Plus récemment, il semblait aspirer à retrouver les sensations de ses jours d'aventurier, et demanda un petit escadron à diriger. [Root.Monarch.GetName] fut heureux de le lui accorder, donnant même à síl Place l'opportunité de sélectionner lui-même ses soldats.\n\nDepuis lors, Laurens et son escadron se sont montrés efficaces. Extrêmement efficaces. Ils ont repoussé de multiples raids orques, semblant savoir où ils frapperaient presque avant même qu'ils n'apparaissent à l'horizon. Ils possèdent également un sens infaillible pour identifier le chef de guerre parmi la horde, celui qu'il faut occire pour mettre leurs ennemis en déroute au plus vite. Une fois serait de la chance, deux fois pourrait être la bénédiction de Corin. Mais trois fois, quatre ? [Root.Monarch.GetName] invita l'un des aventuriers les plus novices de l'escadron à dîner, et le jeune homme fut empressé, presque ravi, de révéler le secret de Laurens.\n\nC'était de la sorcellerie dévoreuse d'esprits. Ils partaient dans l'arrière-pays capturer un orque parti chasser. Síl Place utilisait alors un mélange de magies de divination et d'enchantement, déchirant l'esprit de l'orque pour tout apprendre de sa bande de guerre et de son chef — ainsi que les plans du prochain raid. Ils pouvaient alors devancer l'attaque, préparer une embuscade et cibler le chef de guerre avec précision. Capturer quelques prisonniers au combat, broyer leurs esprits pour répéter le processus, rincer, recommencer. Le soldat était émerveillé, apparemment fier — [Root.Monarch.GetName] faillit vomir."
 corins_circle.2.a:0 "Gardes, amenez-moi síl Place à la pointe des lances !"

 corins_circle.13.t:0 "Confronter le Mage-Chevalier"
 corins_circle.13.d:0 "[Root.Monarch.GetName] convoqua une réunion immédiate suite à la révélation des actes odieux de Laurens síl Place, tirant [Root.Monarch.GetHerHis] généraux de leurs lits et exigeant que les gardes amènent síl Place devant [Root.Monarch.GetHerHim] à la pointe des lances. Síl Place ne nia pas les accusations ; en fait, il dit que ce n'était qu'une démonstration de faisabilité ! Il cherchait la coopération de toute l'armée de [Root.GetName] pour prendre des captifs, et suggéra que s'il s'intégrait à chaque bataillon tour à tour, ils pourraient rapidement identifier chaque bande de guerre environnante et les écraser. Qu'importaient quelques esprits orques réduits en bouillie dans un tourbillon de douleur et de destruction, comparés à cette opportunité unique de détruire tant de mal en Escann ?\n\nÀ cette proposition, plus d'un général cracha aux pieds du Mage-Chevalier. Nous ne faisons pas le mal pour mettre fin au mal, dirent-ils, le visage rouge de rage. Nous ne trahissons pas les lois de la magie pendant que nous forgeons les nôtres. Nous ne traitons même pas le plus ignoble ennemi ainsi — chaque orque mérite la mort, mais une mort propre, pas cette torture inconcevable.\n\nIci, la voix de Laurens síl Place trembla de rage. « Comment osez-vous ! » s'exclama-t-il, la main allant presque à l'épée à son côté. « N'avez-vous pas suivi Corin ? N'avez-vous rien appris de son exemple ? Le mal doit être détruit, le bien doit être fait, quel qu'en soit le prix ! Comment osez-vous proclamer que les convenances de la bonne société priment ! »\n\nIl se tourna pour s'adresser directement à [Root.Monarch.GetName], « Laisseriez-vous des fermiers mourir sous les lames orques ? Laisseriez-vous encore plus d'Escann brûler sous leur joug ? Ou suivrez-vous les traces de Corin, et ferez-vous tout ce qu'il faut pour les vaincre ? »"
 corins_circle.13.a:0 "Corin me guide ici, comme en toute chose. Dites-m'en plus sur la façon dont vous utilisez ces magies..."
 corins_circle.13.b:0 "Vous me dégoûtez. Quittez nos terres, et n'y revenez jamais."

 corins_circle.3.t:0 "Le Cercle de Corin : Winston Piedfollet"
 corins_circle.3.d:0 "Winston Piedfollet était un homme à idées. Une pléthore d'idées. Et — chose rare chez la plupart des aventuriers — elles étaient généralement bonnes.\n\nNé enfant du milieu dans une famille de marchands à Pic-des-Abeilles, il devint marchand itinérant, et en 1442 conduisit une caravane de vivres et de fournitures vers l'Escann ravagé par la Marée Verte, espérant faire un profit rapide tout en évitant les hostiles (cette idée faisant exception à la règle). Coincé dans une petite ville, assiégé par une vaste horde de peaux-vertes — il se sentit appelé à l'action d'une manière qu'il n'avait jamais ressentie auparavant. Il usa de son esprit halfelin pour organiser les citadins paniqués, identifia une brèche dans les sentinelles orques désorganisées, et les mena tous vers la fuite.\n\nC'est lui, dans son rôle ultérieur à la Maison des Richesses, qui rallia les autres groupes d'aventuriers pour s'unir derrière Corin. C'est lui qui conçut un ingénieux système de poulies pour hisser Lothane Défense-Bleue hors de la fosse où le Cercle l'avait trouvé. Et c'est lui qui veilla sur le corps de Corin après sa chute à Rottenstep, un murmure dans sa tête le convainquant qu'elle n'était pas partie, pas encore.\n\nAprès sa seconde chute, pour une fois, le brillant halfelin ne savait que faire. Rester avec les Corintar signifiait risquer d'éclater en sanglots chaque fois qu'il voyait Lothane (il avait une idée de ce que la rousse et le demi-orque représentaient l'un pour l'autre, bien meilleure que celle qu'ils en avaient eux-mêmes). Et pourtant il conservait assez de cet esprit aventurier pour décliner une offre d'emploi de Carleon Tour-Noire. Au lieu de cela, il erra d'un groupe d'aventuriers à l'autre (évitant on ne sait comment les hordes de gobelins et d'orques encore errantes), restant peut-être une semaine, peut-être un mois, peut-être un an, offrant ses idées à qui voulait les prendre.\n\n[Root.Monarch.GetName] avait entendu des rumeurs selon lesquelles Piedfollet aidait le maire d'un village aux abords de [Root.Capital.GetName], mais même alors [Root.Monarch.GetSheHe] n'était pas tout à fait préparé à voir le halfelin entrer d'un pas assuré dans [Root.Monarch.GetHerHis] tente de commandement. « Vous faites du bon travail. J'ai quelques idées que vous pourriez vouloir examiner. Ça vous dérange si je reste un moment ? »"
 corins_circle.3.a:0 "Je vous en prie, faites comme chez vous. Je serais à jamais un sot de refuser un homme tel que vous."
 corins_circle.3.b:0 "Entrez ! J'adorerais entendre ce que vous avez vu dans vos voyages."
 corins_circle.3.c:0 "Un demi-homme signifie un demi-cerveau. Nous n'avons pas besoin de vous ici !"

 corins_circle.4.t:0 "Le Cercle de Corin : Aucan síl Versil"
 corins_circle.4.d:0 "Le membre le plus intéressant du Cercle de Corin était Corin, bien sûr. Les aventuriers ivres dans les tavernes débattent du second : certains disent Défense-Bleue, les orques plaident souvent pour Arosha, les passionnés d'artisanat magique pointeront le génie de Creekwhistle. Mais le moins intéressant est certain : Aucan síl Versil.\n\nAucan ne fut jamais vraiment intéressant. Malgré une éducation au sein de l'une des plus nobles familles de Farraneán, il resta oubliable jusqu'à l'âge adulte. Sa famille comptait des mages talentueux, des guerriers honorables, des mondains populaires — mais il n'était rien de tout cela. En vieillissant, il devint un homme aux multiples talents, touche-à-tout, maître en rien. Le mieux qu'on pût dire était qu'il savait s'adapter à une société changeante.\n\nQue fit un tel homme quand la Marée Verte arriva, qu'il vit sa famille massacrée, son foyer ruiné, son peuple dispersé aux quatre vents ? Une telle expérience en briserait certains, en tuerait d'autres, mais pas Aucan. Le Cercle de Corin le trouva dans les décombres de Versil, dirigeant un petit camp de survivants, une lumière et une détermination jamais vues auparavant dans ses yeux. Corin lui parla personnellement, sa personnalité ardente et sa dévotion suffisant à l'attirer vers elle (une fois les survivants du sac de Versil mis en sécurité, bien sûr).\n\nIl servit dans divers rôles pendant la Marée Verte, de liaison avec la Ligue des Comtes à éclaireur avancé, travaillant même au noir comme cuisinier du groupe. Et bien sûr, il écrivit sur ceux plus intéressants que lui : chansons, récits et poèmes, puisant dans ce qu'il se rappelait de sa formation bardique.\n\nCes histoires survécurent à la mortalité de Corin, à nombre de ses compagnons, et survivront probablement à Aucan lui-même. C'est évident pour [Root.Monarch.GetName], alors que les notes finales du barde s'éteignent après une représentation improvisée à [Root.Capital.GetName]. Ces poèmes, ces vers, vivront plus longtemps que n'importe quel elfe, sans parler d'un humain. Ils seront à jamais le premier jet de l'histoire de la Marée Verte. Ils sont l'étoffe même de la légende.\n\nPeut-être, si [Root.Monarch.GetSheHe] le demande, Aucan acceptera-t-il de jouer à nouveau ?"
 corins_circle.4.a:0 "Resteriez-vous un moment pour partager vos récits ?"
 corins_circle.4.b:0 "Je vous en prie, parlez-nous de Corin, des vérités et valeurs que nous devons défendre dans Sa croisade."
 corins_circle.4.c:0 "Écrivez une chanson sur [Root.Monarch.GetName], [Root.Monarch.GetSheHe] sera le héros de l'âge à venir !"

 corins_circle.5.t:0 "Le Cercle de Corin : Dominic de Gallowspeak"
 corins_circle.5.d:0 "Si Lothane Défense-Bleue était le membre du Cercle de Corin qui aimait le plus Corin, Dominic de Gallowspeak était celui qui la craignait le plus. Oh, il était loyal comme les autres, mais plus que ses compagnons, il savait ce que signifiait qu'un avatar d'Agrados foulât la terre.\n\nPrêtre de Nerat depuis ses premiers jours, quand il fut sauvé par cette secte des griffes d'un vampire corvurien, il était attiré par les deux devoirs de son Dieu : guider les âmes des morts, et s'assurer que les immortels les rejoignent. Il rejoignit les Seigneurs des Marches pour s'occuper des rites funéraires, mais quand il apprit après Rottenstep qu'une femme était imprégnée de pouvoir infernal, sachant que cela risquait l'immortalité, il partit l'épée à la main pour assurer le trépas de cette âme.\n\nIl faillit réussir, et alors l'histoire aurait pris un cours très différent. Mais même avant d'être forgée dans la chaleur du combat, Corin avait des instincts surnaturels, et repoussa son attaque surprise. Elle était curieuse, cependant, de la nature de son assassin, de ses habits et manières de prêtre. Et ainsi, à la pointe de l'épée, il rejoignit son Cercle. Elle en apprendrait plus sur ce que signifiait être un avatar (le maigre savoir qui existait), il aurait plus d'occasions de la tuer. Gagnant-gagnant.\n\nIl n'y parvint pas, bien sûr, mais la lame de Dookan fit l'affaire. À ce moment-là, cependant, il en était venu à bien mieux connaître la femme ; elle exposait son âme et ses desseins devant lui comme tous le font devant Nerat. Et dans sa vie ardente, il vit l'inspiration, la rédemption — la divinité.\n\nIl fut une figure instrumentale dans l'organisation du dixième Concile Panthéonique, qui l'intronisa à la Cour Régente, et après cela parcourut tout Cannor pour parler à quiconque voulait entendre de Sa vie et de Sa cause.\n\nAujourd'hui, il semble être venu à [Root.Capital.GetName], clairement visible sous la bannière rouge de l'épée et du bouclier qui se dresse fièrement dans ses rues. [Root.Monarch.GetTitle] connaît bien l'histoire de Corin. Mais même ainsi, Dominic lui en enseignerait davantage."
 corins_circle.5.a:0 "Enseignez-moi comment je puis servir Sa cause."
 corins_circle.5.b:0 "Dites-moi comment Elle voudrait que je dirige [Root.GetName]."
 corins_circle.5.c:0 "Emportez vos enseignements quasi-hérétiques ailleurs, de peur que je ne vous conduise moi-même à Nerat !"

 corins_circle.6.t:0 "Le Cercle de Corin : Sire Cecil de l'Œil de Saphir"
 corins_circle.6.d:0 "Imaginez, si vous le voulez bien, faire partie d'une institution sans pareille. Être un membre de haut rang d'un ordre qui définit littéralement ce que signifie être chevalier. Être l'un d'une longue lignée d'hommes et de femmes qui incarnent la chevalerie elle-même, remontant jusqu'à Caylen Longlance, le premier chevalier.\n\nPuis imaginez tout cela arraché, détruit avec la seule terre que vous ayez jamais appelée foyer. Imaginez vos châteaux brûlés, vos écuyers occis, vos puissants destriers dévorés. Imaginez cela, et vous aurez peut-être une idée de ce qu'est être Sire Cecil de l'Œil de Saphir, le chevalier solitaire du Cercle de Corin.\n\nMais la vie de Cecil ne s'arrêta pas avec la Marée Verte. S'arrêter là serait manquer son amitié et sa romance avec son frère d'armes Eledas Silurion — avant que lui aussi ne fût occis, en sauvant les derniers des Silurion. S'arrêter là serait manquer toutes les leçons qu'il impartit à Corin et à quiconque autour du feu de camp voulait écouter, soulignant l'importance de faire le bien, de voir clairement, de forger un monde meilleur.\n\nEt il continua d'enseigner ces leçons même après la mort de Corin — la perte de cette amie n'étant qu'une entaille de plus sur un bouclier déjà frappé d'innombrables fois. Les aventuriers ne sont pas des chevaliers, ne peuvent jamais l'être. Mais même si les jours des chevaliers d'Escann, de l'Œil de Saphir, sont révolus, les valeurs de la chevalerie perdurent. Et ce sont des valeurs que Sire Cecil enseignerait à [Root.Monarch.GetTitle] [Root.Monarch.GetName], si [Root.Monarch.GetSheHe] est disposé à écouter."
 corins_circle.6.a:0 "Enseignez-moi à vivre une vie d'honneur et de droiture."
 corins_circle.6.b:0 "Votre ordre était maître du duel, n'est-ce pas ? J'aimerais en apprendre davantage."
 corins_circle.6.c:0 "Tout l'Œil de Saphir n'a pu contenir la Marée Verte. Il est temps pour quelque chose de nouveau."

 corins_circle.7.t:0 "Le Cercle de Corin : Nesterin le Décharné"
 corins_circle.7.d:0 "Autour du feu de camp, tard dans la nuit, il était courant que les membres du Cercle de Corin se livrent des duels. Arosha cherchait toujours (encore) un combat d'entraînement avec Lothane, les jumeaux Summermoon cherchaient à pratiquer leurs formes ensemble pour la centième, peut-être millième fois, et Sire Cecil de l'Œil de Saphir était toujours partant pour éduquer ses jeunes et impétueux compagnons avec le meilleur des professeurs : la douleur.\n\nMais l'un parmi le Cercle ne se battait jamais en duel, pas même avec Corin elle-même. Nesterin le Décharné s'asseyait à la lueur du feu, aiguisant et nettoyant sa lame, ou simplement contemplant au plus profond de ses braises. Le danseur de lame ne voyait jamais l'attrait des duels d'entraînement avec ses compagnons. Après tout, quel était l'intérêt de danser avec un enfant sachant à peine marcher ?\n\nNesterin gardait sa lame en réserve, et ne démontrait son art que contre les orques — par douzaines. À la fin d'une journée de mêlée, elle était rouge de leur sang (et prête à être nettoyée de nouveau ce soir-là). Le combat, et le combat seul, était la seule chance de le voir danser.\n\nNotre [Root.Monarch.GetTitle] [Root.Monarch.GetName] avait entendu maints récits de la beauté du mouvement et de la mort que le Danseur de Lame pouvait évoquer, mais pensait que c'était juste une des nombreuses beautés de Halann [Root.Monarch.GetSheHe] ne verrait jamais en personne. Mais le visiteur aux portes de [Root.Capital.GetName] ce matin signifie que cela pourrait ne pas être le cas. Car Nesterin le Décharné lui-même était le premier visiteur du jour pour [Root.Monarch.GetTitle]. Apparemment, il avait songé à rengainer sa lame pour de bon après la mort de Corin, avait même envisagé de laisser derrière lui tous les caprices du monde pour le calme du Repos Silencieux — mais un corps forgé pour un seul but pendant plus d'un siècle ne change pas si facilement. Il connaît notre croisade continue contre l'orque et le gobelin, et est disposé à offrir ses services dans cette quête."
 corins_circle.7.a:0 "Même sans duels, il peut enseigner beaucoup à nos forces."
 corins_circle.7.b:0 "Donnez-lui une place d'honneur à l'avant-garde."
 corins_circle.7.c:0 "La lame est obsolète, le mousquet règne désormais en maître !"

 corins_circle.8.t:0 "Le Cercle de Corin : Iacobb Creekwhistle"
 corins_circle.8.d:0 "S'il fallait un mot pour décrire Iacobb Creekwhistle, ce serait explosif. Explosif dans sa volonté, un petit gnome à la voix grave tenant tête aux plus hautains des Seigneurs des Marches, singulier et engagé dans sa résolution — et triomphant d'eux. Explosif dans sa colère, exposant durement les défauts de n'importe quel plan à demi mûri de Corin, ou quand il était témoin — et corrigeait promptement — les méfaits d'un compagnon aventurier. Explosif dans son génie, qu'il s'agisse de concevoir de nouveaux fusils dans sa tête et de les forger dans des forges en ruine à partir de tout ce qu'on pouvait récupérer d'Escann brisé, ou des pièces d'art magnifiques qu'il peignait à la lueur du feu de camp entouré de toutes parts par la dévastation. Et, bien sûr, explosif dans son armement, faisant sauter d'innombrables orques en morceaux.\n\nL'Éveil-du-Dragon, et les kobolds qui suivirent, écrasèrent la Hiérarchie Gnomique. Mais s'il y eut jamais un gnome capable de rivaliser avec un dragon en feu, en fureur, en gloire, ce serait Creekwhistle. Il le prouva surtout à la Bataille de Castonath, un barrage de ses balles — ainsi que son canon portable — dégageant le chemin de Corin pour affronter Dookanson. Et avec un œil de tireur d'élite, il fut témoin de sa chute, et de tout ce qui advint après.\n\nCela fait bien des lunes, et bien que Creekwhistle ait quitté le métier d'aventurier peu après, son génie ne pouvait être éteint éternellement. Apparemment, tout ce temps il travaillait dans un petit village aux abords de [Root.Capital.GetName], perfectionnant ses conceptions de fusils et de canons. Il aurait été heureux de continuer à œuvrer si un administrateur local ne l'avait pas importuné au sujet des impôts. Sa réponse fut succincte — « Certainement pas » — et il est venu jusqu'à [Root.Monarch.GetName] pour exprimer son mécontentement."
 corins_circle.8.a:0 "Mes excuses. Puis-je demander votre pardon en fournissant quelques mains pour tester votre travail ?"
 corins_circle.8.b:0 "Pardonnez-moi pour cette erreur. Vos idées sont brillantes, et nous adorerions en entendre davantage."
 corins_circle.8.c:0 "Je corrigerai cette affaire immédiatement... et en attendant, puis-je vous demander si vous travaillez aussi sur les drapeaux ?"
 corins_circle.8.e:0 "Allez siffler dans votre ruisseau, [Root.Monarch.GetTitle] ne s'excuse devant personne !"

 corins_circle.9.t:0 "Les Fusils d'Iacobb"
 corins_circle.9.d:0 "D'abord il y eut Iacobb Creekwhistle : le célèbre artificier, le seul gnome du Cercle de Corin, il était content d'étudier et d'améliorer ses fusils en paix, sans avoir à répondre à des questions stupides ou à des plans insensés. Mais ensuite vinrent quelques autres gnomes, également anciens membres des Fusils d'Eaux-Vives, cherchant fortune en Escann plutôt que d'être emportés par la reconquête gnomique. Entendant des rumeurs de ses projets, et avides de voir ses nouvelles conceptions, ils furent prompts à rejoindre Creekwhistle.\n\nEt puis quelques autres vinrent, et encore quelques autres après. Des gnomes marchands, une branche distante de la famille Iochand, même quelques érudits Giberdi, tous gravitèrent vers cette nouvelle communauté gnomique. Soudain, ce qui avait été une petite ville en était devenue une grande, même si la plupart de ses habitants étaient eux-mêmes de petites silhouettes.\n\nMais la nuit dernière, la tragédie frappa. La communauté grandissante attira également l'intérêt d'une horde orque errante, qui attaqua le village sous le couvert de l'obscurité. Réassemblant hâtivement des fusils, et saisissant les derniers prototypes, Iacobb mena ses compagnons artificiers dans la défense. Et bien que chaque fusil servît excellemment, le simple nombre faillit submerger les forces gnomiques. Iacobb vit que les défenses ne tiendraient pas, et attira plutôt la majorité des orques à le suivre dans une grande caverne proche — le dépôt de poudre. Avec une fusée éclairante, et un dernier salut, Creekwhistle fit signe à ses apprentis de tout faire sauter.\n\nLes orques disparurent, réduits en miettes. Creekwhistle disparut, rien de son corps n'étant récupérable. Mais ce qui ne disparaîtra pas est le souvenir de lui, et son héritage dans la communauté qu'il a bâtie."
 corins_circle.9.a:0 "Si des gnomes cherchent vengeance, nous pouvons fournir de nombreuses occasions."
 corins_circle.9.b:0 "Parrainons les gnomes locaux en son honneur."

 corins_circle.10.t:0 "Le Cercle de Corin : Rethag Sourcil-de-Fer"
 corins_circle.10.d:0 "On dit que la moitié de tous les groupes d'aventuriers commencent dans une taverne. Et bien que peu d'entre elles se trouvaient dans l'Escann saccagé, Rethag Sourcil-de-Fer fit de son mieux pour maintenir la tradition.\n\nGuerrier nain natif de Forteresse-de-Rubis, lui et son compagnon Belgrak Habitant-des-Cavernes combattirent comme mercenaires pendant les Guerres Lilas puis suivirent les Seigneurs des Marches vers l'est quand ils se dirigèrent vers l'Escann. Pour la première fois, ils combattirent non pour l'or mais pour leur propre cause, les anciens récits de Forteresse-de-Rubis les appelant au combat contre l'ennemi orque. Mais leurs employeurs d'alors s'exaspérèrent de la tendance du duo à terminer chaque bataille par une consommation copieuse d'alcool, mais une aventurière rousse trouva cela inspirant. Après une bataille particulièrement intense près de Bladeskeep, elle les défia à un concours de boisson — déesse de la bravoure, en effet. Bien après qu'elle eût perdu et se fût retirée pour la nuit, les deux nains y allaient toujours. Les trouvant, le Seigneur des Marches Carleon Tour-Noire fut frappé de dégoût et exigea que les seigneurs les renvoient. Mais le pouvoir liant de l'alcool avait fait son œuvre une fois de plus, et les deux nains rejoignirent le Cercle de Corin. D'où ils trouvaient toute la bière et l'alcool, nul au Cercle ne le savait vraiment, mais tous en étaient fort reconnaissants néanmoins.\n\nOu c'est ce que [Root.Monarch.GetName] a appris au fil de plusieurs chopes de cidre, aujourd'hui, alors que Rethag Sourcil-de-Fer racontait l'histoire de sa vie. Le nain en a apparemment assez de goûter à toutes les tavernes d'Escann, et cherche à retourner au métier d'aventurier. Pas comme combattant, cependant — il voudrait que nous lui fournissions toute la bière qu'il désire, et en retour, il nous écrira un compendium sur l'art de la guerre. Il prétend connaître presque chaque détail de tactique et de stratégie utilisé en Escann pendant et après la Marée Verte — et il nous promet une réponse à toute question que nous pourrions avoir à leur sujet. (En effet, les seules questions auxquelles il refuse de répondre sont celles sur son compagnon absent. Cela, il ne l'abordera pas, et la simple mention de Belgrak apporte soit la rage, soit le chagrin — peut-être les deux — à ses yeux)."
 corins_circle.10.a:0 "Donnez à ce nain plume et parchemin — et une plus grande chope !"
 corins_circle.10.b:0 "Peut-être peut-il appliquer ses enseignements à nos forces ?"
 corins_circle.10.c:0 "Nous n'avons pas besoin d'alcooliques dans notre armée !"

 corins_circle.11.t:0 "Rethag Sourcil-de-Fer : Pour Corin !"
 corins_circle.11.d:0 "Rethag Sourcil-de-Fer a été connu pour bien des choses. Dans sa patrie de Forteresse-de-Rubis, il était connu comme l'un des rares nains à avoir quitté les montagnes comme mercenaire. Au sein du Cercle de Corin, il était connu comme le nain au foie de fer, capable de boire plus que même la constitution orque d'Arosha. Et au cours des dernières décennies, il est devenu connu pour ses écrits sur les tactiques de Corin et les développements stratégiques de l'Escann post-Marée Verte, lecture indispensable recherchée par les stratèges de la Gérudie à la Khétérata.\n\nMaintenant, il semble qu'il va se faire encore un autre nom : celui de l'un des plus éminents serviteurs de Corin. Car alors que Cannor marche à la guerre pour prouver Sa justice, il voudrait mener — et a quasi-insisté sur ce point quand il a fait irruption dans la tente de commandement de [Root.Monarch.GetName] aujourd'hui. Il n'a aucune confiance en nos stratèges actuels, et insiste pour prendre le commandement afin de voir la volonté de Corin accomplie."
 corins_circle.11.a:0 "S'il combat avec la moitié de la vigueur qu'il met à argumenter, notre victoire est assurée."
 corins_circle.11.b:0 "L'état-major, et la cause de Corin, n'ont pas besoin d'un ivrogne."

 corins_circle.12.t:0 "Le Premier Prêtre de Corin"
 corins_circle.12.d:0 "Dominic de Gallowspeak est vieux, maintenant. L'homme qui organisa le Dixième Concile Panthéonique à partir d'un rassemblement de clercs-aventuriers est devenu ridé et hâlé, mais n'a rien perdu de sa vigueur. Les dernières décennies furent chargées, concevant les attributs — rites, rituels — de la divinité pour la plus récente déesse de la Cour Régente. Et puis, comme une hache fracassant un lac gelé, la révélation de Castellos plaça chacun de ses actes passés sous un nouveau jour, et traça un nouveau cours pour son avenir, pour celui de Halann.\n\nIl y avait des prières à forger à partir des poèmes d'Aucan síl Versil, il y avait des mantras à trouver dans les mémoires de Lothane Défense-Bleue. Et, bien sûr, il y avait les préceptes de la foi à élaborer : tous les détails qui entourent un objectif unique de faire le bien, quel qu'en soit le prix.\n\nIl n'a pas encore fini. Il est venu à [Root.Capital.GetName] pour enseigner, pour prier, pour montrer à tous Ses fidèles ce que signifie consacrer une vie à Sa cause. Il semble qu'il le fera jusqu'à son dernier souffle, quand son ancien maître Nerat le rappellera chez lui, et que sa Reine prendra son âme en main."
 corins_circle.12.a:0 "Puissions-nous tous être inspirés par son exemple."
 corins_circle.12.b:0 "Assurez-vous que tous dans la nation apprennent ses enseignements."

 corins_circle.14.t:0 "Le Cercle de Corin : Arosha Brise-Chêne propose ses services"
 corins_circle.14.d:0 "Tôt ce matin, un grand émoi fut soulevé quand une orque solitaire entra d'un pas assuré dans la cour de [Root.Monarch.GetName]. Puissamment bâtie — même selon les standards orques — portant une énorme hache inscrite de runes qui luisaient faiblement, la guerrière se présenta comme Arosha Brise-Chêne, ancienne compagne de l'héroïne humaine et déesse ascendante Corin Tueuse-de-Korgan.\n\nAprès la Bataille de Castonath et la mort de Corin et du Dookanson, Brise-Chêne affirme qu'elle est devenue préoccupée par le sort du peuple orque en Escann. Elle ne souhaite pas voir les Orques anéantis par les nombreuses compagnies d'aventuriers qui parcourent la contrée, et elle est donc venue offrir ses services pour entraîner nos guerriers et organiser nos armées. Cependant, son service n'est pas gratuit, bien que le prix qu'elle demande soit inhabituel — la permission d'enseigner à ceux qu'elle instruit la vie et les rêves de Corin.\n\nBrise-Chêne est une guerrière légendaire, et le savoir martial qu'elle apporterait à notre tribu serait certainement d'une grande aide pour entraîner nos troupes à combattre les aventuriers, mais la condition qu'elle soit autorisée à enseigner à notre peuple l'idéologie de Corin semble blasphématoire — cette humaine qu'elle estime tant n'a-t-elle pas tué le fils du Grand Dookan ? Que ferons-nous ?"
 corins_circle.14.a:0 "Qu'elle entraîne les recrues ! Nous pourrions utiliser une maître d'armes pour les mettre en forme."
 corins_circle.14.b:0 "Qu'elle réorganise l'armée et intègre de nouvelles tactiques dans nos forces."
 corins_circle.14.c:0 "Non, nous n'avons pas besoin de l'aide de cette traîtresse envers Dookan."

 corins_circle.15.t:0 "Arosha Brise-Chêne : La Parole de Corin"
 corins_circle.15.d:0 "Bien des années se sont écoulées depuis qu'Arosha Brise-Chêne est venue vivre parmi notre tribu, et son habileté de tacticienne et de guerrière nous a immensément profité. Cependant, bien qu'elle ait été instrumentale dans l'enseignement à la nouvelle génération d'une méthode de guerre supérieure combinant tactiques orques traditionnelles et cannoriennes, ses autres actions inquiètent certains des membres plus conservateurs de la tribu.\n\nLes leçons de Brise-Chêne sur le maniement de l'épée et les tactiques d'escouade sont entrecoupées de conférences sur la morale, de débats sur la théologie, et de sermons sur la déesse ascendante Corin. Beaucoup de jeunes en sont venus à croire des choses que leurs aînés trouvent absurdes — que la force seule ne donne pas nécessairement le droit de régner ; que les non-combattants devraient bénéficier de protection et être laissés en paix en temps de guerre ; que l'on a l'obligation de protéger les innocents et de détruire le mal. De tels enseignements créent des fractures majeures dans notre société entre ceux qui trouvent certaines de nos traditions barbares et cruelles, et ceux qui trouvent cette nouvelle façon de penser ridicule et malavisée.\n\nSi nous ne traitons pas ce problème maintenant, les enseignements de Brise-Chêne pourraient causer des conflits majeurs en [Root.GetName]. Cependant, le faire violerait l'accord que nous avons passé avec elle il y a des années, et on ne peut prévoir comment elle réagirait. Il est possible qu'elle quitte la tribu... mais avec son tempérament ardent, il est probable que le faire mènerait à une confrontation plus directe."
 corins_circle.15.a:0 "Laissons-la continuer à prêcher, plutôt que de trahir notre parole."
 corins_circle.15.b:0 "Elle devrait être arrêtée maintenant. Découragez quiconque de prêter attention à ses paroles sur ce sujet."

 corins_circle.16.t:0 "Arosha Brise-Chêne : Le Culte de l'Épée et du Bouclier"
 corins_circle.16.d:0 "Les années depuis qu'Arosha Brise-Chêne est venue vivre parmi notre peuple ont été longues, et depuis ce temps nos guerriers ont grandement bénéficié de son enseignement et les idéaux de Corin qu'elle a prêchés ont été acceptés par un grand nombre de notre peuple. Brise-Chêne travaille inlassablement pour protéger les orques de [Root.GetName], mais certains questionnent avec dérision si elle est même une orque elle-même, tant certains de ses enseignements sont antithétiques à certaines de nos traditions. De telles paroles sont souvent accueillies par les poings de ses plus fervents partisans, qui en sont venus à vénérer Corin et sont fanatiquement loyaux envers celle qui les a amenés à leur déesse.\n\nLe nombre d'orques qui en sont venus à suivre la parole de Brise-Chêne, même avant celle de [Root.Monarch.GetName], est profondément préoccupant. Pire encore, Brise-Chêne a commencé à faire des déclarations publiques décriant la chefferie pour son rejet continu des idéaux de Corin, et exige que nous adoptions officiellement Corin comme notre divinité patronne officielle, l'élevant au même statut que — ou même au-dessus de — celui du Grand Dookan. Si nous devions refuser sa demande que l'état adopte officiellement Corin, un conflit semble probable. Mais tourner le dos au Grand Dookan... une telle hérésie est inouïe."
 corins_circle.16.a:0 "Le message de Brise-Chêne est juste. Voyons où son chemin nous mènera."
 corins_circle.16.b:0 "Nous ne connaissons d'autre dieu que Dookan !"

 corins_circle.17.t:0 "Arosha Brise-Chêne : Ozarm'chadash"
 corins_circle.17.d:0 "Brise-Chêne est revenue — mais cette fois, semble-t-il, elle n'est pas venue pour parler. Les portes de la grande salle s'ouvrent en grand à son approche, flanquée d'une large escorte de guerriers qui lui sont loyaux, leurs pas lourds sur le sol de pierre. Les rires bruyants des convives rassemblés au festin deviennent étouffés et appréhensifs alors qu'Arosha approche, son expression froide, sa grande hache reposant sur son épaule.\n\n« [Root.Monarch.GetName] ! [Root.Monarch.GetTitle] de [Root.GetName] ! Je viens vous défier en Ozarm'chadash ! Je vous défie par droit de force et de renommée, et exige que vous entendiez mon grief ! »\n\nSes paroles se perdent dans les chevrons de la salle, sa voix tonitruante semblant secouer tout le bâtiment. Dans toute la salle, tous les yeux sont sur elle, mais pas un murmure de protestation ne s'élève. Un moment plus tard, voyant que nul ne se lèverait pour l'arrêter, Brise-Chêne continue.\n\n« Quand je suis venue vers cette tribu, je suis venue pour assurer que les orques survivraient en tant que peuple libre en Escann. Nous faisons face à des chances terribles, contre les aventuriers qui nous asserviraient nous et nos enfants pour le crime de la Marée Verte. Je suis venue apporter mon expertise en guerre pour m'assurer que cela n'arriverait pas. Mais je ne suis pas venue seulement enseigner la guerre, mais aussi l'honneur. Parler d'une femme humaine qui m'a montré que la force ne se mesure pas seulement à la vigueur du bras, mais aussi à l'éclat de l'âme. Je suis venue guider le peuple orque sur un chemin qui mènerait à être vus comme égaux par les puissances de Cannor, car c'est dans cette voie que réside la survie. »\n\n« Et maintenant, après que j'ai respecté ma part du marché que nous avons conclu, d'entraîner vos armées et de mener vos guerriers et de vous apporter la gloire, vous reculez devant l'accomplissement de votre part. Vous avez donné votre parole que je pourrais apporter le message de Corin à votre peuple, [Root.Monarch.GetName]. Je ne peux vous laisser rompre votre promesse maintenant et risquer tout ce pour quoi j'ai travaillé en [Root.Monarch.GetHerHim] éloignant du chemin d'honneur que nous empruntons. Et donc, si vous ne voulez pas être le chef dont ce peuple a besoin, je le serai. »\n\nSur ces mots, Brise-Chêne plante sa hache carrément dans la longue table du festin devant elle, les runes luisant faiblement à la lueur des chandelles de la salle. Son regard d'acier trouve [Root.Monarch.GetName] et tient [Root.Monarch.GetHerHis] yeux, attendant une réponse, prête à bondir à l'action au moment où son défi sera relevé."
 corins_circle.17.a:0 "Contre une guerrière légendaire telle que Brise-Chêne, il n'y a aucun espoir de victoire. Retirez-vous."
 corins_circle.17.b:0 "Viens donc, et mettons à l'épreuve une Fidèle de Dookan contre une Disciple de Corin !"

 corins_circle.18.t:0 "Arosha Brise-Chêne : La Hache de Corin"
 corins_circle.18.d:0 "La hache fend l'air comme un éclair d'argent, Brise-Chêne la faisant tournoyer d'une vitesse inhumaine, sa tête passant sous la garde de [Root.Monarch.GetName] et mordant profondément dans [Root.Monarch.GetHerHis] poitrine, tranchant la peau et broyant l'os, un hoquet de surprise s'échappant de [Root.Monarch.GetHerHis] lèvres. D'un mouvement vif, Arosha retire la hache, nettoyant le tranchant de l'arme luisante sur son tabard alors que [Root.Monarch.GetName] tombe à genoux, le sang coulant de la blessure fatale. « Je gagne », dit-elle doucement, « et je les mènerai vers l'avenir que tu ne pouvais pas voir. »\n\nLa salle explose en clameurs, réaffirmations de loyauté de certains des plus ardents partisans d'Arosha, nouveaux serments de nombreux autres guerriers. Quelques chamans et les membres les plus conservateurs de la tribu maudissent la nouvelle chef, mais ils sont rapidement jetés hors de la salle par les gardes.\n\nDans les jours qui suivirent la victoire de Brise-Chêne sur [Root.Monarch.GetName], la nouvelle se répandit comme une traînée de poudre à travers les provinces de [Root.GetName] et au-delà. Les tribus ont soit juré loyauté à Arosha, soit fui, acclamant leur nouvelle chef comme « Hache de Corin » ou « Brise-Chêne la Victorieuse ». L'ancienne compagne de Corin siège maintenant sur le trône de [Root.GetName], et seul le temps dira comment elle remodelera l'Escann."
 corins_circle.18.a:0 "Gloire à [Root.Monarch.GetTitle], Arosha Brise-Chêne, Hache Puissante de Corin !"

 corins_circle.19.t:0 "Arosha Brise-Chêne : Brise-Chêne, Brisée"
 corins_circle.19.d:0 "La hache s'écrase au sol, une demi-douzaine d'entailles creusées dans le manche par le duel furieux. Brise-Chêne respire faiblement, saignant d'une douzaine de blessures mineures et de plusieurs majeures, luttant pour se relever et récupérer son arme. Prenant appui sur une jambe, elle commence à se redresser, mais son genou cède et elle tombe.\n\nSes yeux trouvent ceux de [Root.Monarch.GetName], mais il n'y a pas de fureur en eux, seulement une fatigue sombre, une incrédulité résignée. « C'est à toi, alors », dit-elle, sa voix un murmure. « Puisses-tu être assez fort pour sauver notre peuple. »\n\nUn souffle rauque s'échappe des lèvres d'Arosha, et sa poitrine ne se soulève plus. La salle explose en clameurs, pour la plupart des réaffirmations de loyauté des guerriers de la tribu. Quelques-uns des partisans les plus dévots d'Arosha crient d'incrédulité et maudissent, tentant de se frayer un chemin à travers les nombreux orques autour d'eux pour récupérer le corps de leur chef déchue, mais ils sont repoussés hors de la salle par les gardes. [Root.Monarch.GetName] s'assied, épuisé par le combat, l'exaltation de la bataille s'estompant et la lourdeur s'installant dans ses membres.\n\nDans les jours qui suivirent la victoire de [Root.Monarch.GetName] sur Brise-Chêne, la nouvelle se répandit comme une traînée de poudre à travers les provinces de [Root.GetName] et au-delà. Les partisans d'Arosha ont soit fui, soit réaffirmé leur loyauté envers nous, ceux qui restent acclamant notre monarque comme « Le Marteau de Dookan » ou « Brise-Hache ». La puissante hache de Brise-Chêne est maintenant suspendue dans la salle du trône de [Root.Monarch.GetTitle] — un rappel de ses prouesses au combat, et symbole de son autorité incontestée."
 corins_circle.19.a:0 "Gloire à [Root.Monarch.GetName], Marteau de Dookan !"

 corins_circle.20.t:0 "Arosha Brise-Chêne : La Réformation Corinite"
 corins_circle.20.d:0 "Dans les années qui suivirent l'arrivée d'Arosha Brise-Chêne en [Root.GetName], ses efforts pour amener le peuple au culte de Corin furent couronnés de succès. Bien que certains se soient accrochés aux anciennes voies malgré ses efforts, il devint courant avec le temps que les orques de la tribu révèrent Corin, sinon comme une divinité, du moins comme un modèle de guerrier et un archétype de courage et de noblesse. Vers le milieu du XVIe siècle, les adeptes de Corin étaient aussi nombreux parmi les orques de [Root.GetName] que ceux qui révéraient Dookan, et incluaient désormais les membres de nombreux clans importants.\n\nCette lente conversion religieuse atteignit finalement son apogée après le Onzième Concile Panthéonique et la Proclamation Corinite, de nombreux orques déclarant que [Root.GetName] devrait se proclamer officiellement royaume corinite et marcher pour défendre la prétention de Corin au Trône d'Argent."
 corins_circle.20.a:0 "Par l'Épée et le Bouclier de Corin, nous marchons !"
 corins_circle.20.b:0 "Nous gardons toujours notre foi en Dookan."

 corins_circle.21.t:0 "Arosha Brise-Chêne : L'Honneur parmi les Monstres"
 corins_circle.21.d:0 "Dans les années qui suivirent l'arrivée d'Arosha Brise-Chêne en [Root.GetName], ses efforts pour insuffler un sens de la chevalerie, de l'honneur et du respect aux guerriers de la tribu eurent des degrés de succès variables. Bien qu'elle n'eût jamais tout à fait réussi à changer à elle seule la culture des orques qui suivaient ses enseignements, il ne faisait aucun doute que son passage laissa sa marque sur le peuple. Les codes d'honneur pour les duels, les règles sur le pillage et le fait de ne pas nuire aux non-combattants en temps de guerre, et une croyance en des lois non fondées uniquement sur la force distinguèrent les habitants orques de [Root.GetName] de beaucoup de leurs contemporains, et les amenèrent à être perçus avec curiosité et un plus grand degré de respect par les puissances établies de Cannor."
 corins_circle.21.a:0 "Honneur et Force !"

