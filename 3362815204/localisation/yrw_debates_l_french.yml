 YRW_REFORM_TOOLTIP:0 "Êtes-vous certain de vouloir faire avancer le débat actuel ? Cela pourrait mener à des révoltes contre notre autorité."

 debate_1_topic_tt:0 "Lorsque le Déluge Final submergea le monde, on crut que les elfes le long du Fleuve étaient les survivants choisis pour hériter de ce qui resterait. Cependant, certains se demandent si seuls les elfes vivant le long du fleuve principal sont élus, ou également ceux des affluents."
 debate_2_topic_tt:0 "L'Empire Ynnique fut le royaume le plus puissant et le plus durable à avoir existé dans la Vallée de l'Ynn. Pourtant, il s'effondra et depuis lors, les débats font rage sur sa véritable cause. Certains disent que c'était parce que le pouvoir militaire des empereurs divisait l'armée en guerre civile à leur mort. D'autres affirment qu'il tomba à cause d'aristocrates décadents qui se combattaient plus entre eux que contre les ennemis de l'empire."
 debate_3_topic_tt:0 "L'arrivée des Cannoriens a apporté des armes nouvelles et étranges sur le champ de bataille. Bien qu'un fusil manque de la grâce d'un arc, beaucoup ont commencé à accumuler ce nouvel engin. La question se pose maintenant à nous : devons-nous adopter ces armes cannoriennes pour nos propres armées ou devons-nous nous fier aux tactiques qui ont servi notre peuple pendant des siècles ?"
 debate_4_topic_tt:0 "On croyait récemment que la Vallée du Fleuve Ynn était l'étendue complète du monde et qu'au-delà des falaises méridionales gisait le Monde Inférieur. Cependant, ces Cannoriens ont apporté des cartes et des plans de sous les falaises et bien plus encore. Cela a ébranlé les fondations du Culte du Fleuve Ynn, clercs et gens du peuple débattant de la manière dont ces révélations doivent être interprétées."

