pinion sur la question. C'est clair, pense le [Root.Monarch.GetTitle], assurément…"
 ynn_debate.18.a:0 "Nous devrions accueillir les grands esprits du monde entier."
 ynn_debate.18.b:0 "Ces arriérés ne connaissent rien de l'Ynn."
 ynn_debate.19.t:0 "Des Iosahar déloyaux déclarent la guerre"
 ynn_debate.19.d:0 "Nous savions que le débat religieux en cours serait conflictuel, mais nous ne nous attendions jamais à cela ! Certains Iosahar ont été si outrés par notre position qu'ils cherchent à mettre fin au contrat féodal qu'ils avaient accepté, et à se séparer de la domination de [Root.GetName]. Nous leur montrerons l'erreur de leurs voies !"
 ynn_debate.19.a:0 "Qu'on m'apporte une lame !"

 ynn_debate.21.t:0 "Hésitation"
 ynn_debate.21.d:0 "La question des Nés-des-Ruines Corrompus est source de division. Si les Corrompus sont vraiment abandonnés par l'Ynn, alors comment se fait-il qu'ils aient survécu au Déluge Final ? Mais alors s'ils sont sauvés, qu'est-ce qui explique leur nature sauvage ? Bien que les courants de la foi puissent porter même la plus lourde barge, l'opposition pourrait couler nos espoirs de résoudre cette question si nous maintenons notre cap actuel. Est-ce le moment d'être pragmatique et de mettre notre foi de côté ?"
 ynn_debate.21.a:0 "Peut-être ne devrions-nous pas faire confiance aux Nés-des-Ruines Corrompus…"
 ynn_debate.21.b:0 "Peut-être pouvons-nous faire confiance aux Nés-des-Ruines Corrompus…"
 ynn_debate.21.c:0 "Non, nous connaissons notre position."

 ynn_debate.22.t:0 "Trancher le débat ?"
 ynn_debate.22.d:0 "Les échanges en cours sur le débat des Nés-des-Ruines Corrompus ont été épuisants, et aucun terrain d'entente n'a encore été trouvé. Si quelque chose, les deux camps se sont seulement plus retranchés dans leurs positions, tous deux tentant de gagner notre faveur. Il pourrait être dans notre intérêt de mettre fin au différend une fois pour toutes, avant que cette question ne cause un schisme durable dans nos terres. Le moment serait peut-être opportun de clore le conseil de la noblesse, et d'appeler tous nos sujets à jurer de respecter sa conclusion."
 ynn_debate.22.a:0 "Oui, tranchons cela."
 ynn_debate.22.b:0 "Non, poursuivons le débat."

 ynn_debate.23.t:0 "Concessions à l'opposition"
 ynn_debate.23.da:0 "Bien que nous favorisions l'inclusion de tous les nés-des-ruines des affluents de l'Ynn comme nos semblables, il pourrait être politiquement judicieux de rencontrer nos adversaires à mi-chemin sur certaines questions. De nombreux héritiers des grandes familles nobles craignent que leur statut et leur prestige diminuent si nous l'emportons dans ce débat, comme si la supposée corruption des nés-des-ruines des affluents se répandrait sur eux comme une malédiction dès qu'ils les accueilleraient.\n\nSi nous continuions à permettre à certaines de leurs lois discriminatoires d'exister tant que nous clarifions qu'elles visent les coutumes et comportements étrangers, et NON le fait d'être un "corrompu" en soi, alors nous pourrions ouvrir une voie plus sûre, bien que plus lente, vers l'acceptation."
 ynn_debate.23.db:0 "Bien que notre position ferme contre l'intégration des Nés-des-Ruines Corrompus soit inébranlable, il pourrait être politiquement judicieux de… adoucir quelque peu notre ton. Certains de nos sujets pourraient être persuadés de changer de camp pour nous rejoindre si nous offrions une forme de compromis, comme permettre à certaines tribus corrompues de s'installer sur nos parcelles de terre les moins désirables."
 ynn_debate.23.a:0 "S'il le faut, alors."
 ynn_debate.23.b:0 "Certaines choses ne sont pas négociables."
 ynn_debate.24.t:0 "Soudoyer un Iosahar ?"
 ynn_debate.24.d:0 "Le débat en cours sur les Nés-des-Ruines Corrompus a causé une augmentation significative des négociations secrètes à huis clos. Alors que certaines de ces négociations contiennent des débats passionnés sur la droiture de leur cause, beaucoup sont froides et transactionnelles, certains demandant ouvertement des cadeaux en échange d'une attitude plus conciliante envers nous."
 ynn_debate.24.a:0 "Plaisir de faire affaire."
 ynn_debate.24.b:0 "Comment OSEZ-vous ?"
 ynn_debate.25.t:0 "Une bagarre éclate au milieu du débat"
 ynn_debate.25.d:0 "Les débats sur les Nés-des-Ruines Corrompus ont toujours été passionnés, mais cela a maintenant atteint un tout autre niveau. Des bagarres ont éclaté dans les salles de réunion, débordant dans les rues. Les combats furent intenses et ne durèrent pas longtemps, mais ont coûté plusieurs vies.\n\nBien sûr, les deux camps prétendent immédiatement que l'autre partie était en faute. Certaines figures hautaines disent qu'elles n'auraient jamais l'intention de verser le sang pour quelques Nés-des-Ruines Corrompus, aux protestations bruyantes des autres. En l'absence de preuves réelles, il semble que ce soit à nous de décider ce qui sera écrit dans les livres d'histoire."
 ynn_debate.25.a:0 "Se ranger du côté de [iosahar_a.GetName] qui accepte les Corrompus."
 ynn_debate.25.b:0 "Se ranger du côté de [iosahar_b.GetName] qui exclut les Corrompus."
 ynn_debate.26.t:0 "Les Iosahar s'impatientent"
 ynn_debate.26.d:0 "Alors que le débat sur les Nés-des-Ruines Corrompus traîne en longueur, nous voyons de plus en plus de faux sourires à nos festins. Nous entendons des secrets murmurés juste hors de portée. Les conversations s'arrêtent à notre approche. Il semble que le débat pourrait tourner contre nous si nous n'agissons pas avec décision."
 ynn_debate.26.a:0 "Mieux vaut conclure bientôt…"
 ynn_debate.27.t:0 "Un changement dans l'opinion populaire"
 ynn_debate.27.da:0 "Récemment, [iosahar_good_argument.GetName] a commencé à envoyer des crieurs publics à travers notre royaume pour tenter d'influencer le débat actuel. Les rapports indiquent que le texte des crieurs prône le traitement égal de tous les peuples ynniques, qu'ils viennent du fleuve principal ou des affluents, et qu'il est largement inoffensif et ne présente pas de menace pour notre règne. Néanmoins, c'est une approche peu orthodoxe des questions religieuses qui sont généralement débattues uniquement parmi les classes supérieures où l'opinion paysanne compte peu."
 ynn_debate.27.db:0 "Récemment, [iosahar_good_argument.GetName] a commencé à envoyer des crieurs publics à travers notre royaume pour tenter d'influencer le débat actuel. Les rapports indiquent que le texte des crieurs décrit la sauvagerie et le manque de fiabilité des Nés-des-Ruines Corrompus, et qu'il est largement inoffensif et ne présente pas de menace pour notre règne. Néanmoins, c'est une approche peu orthodoxe des questions religieuses qui sont généralement débattues uniquement parmi les classes supérieures où l'opinion paysanne compte peu."
 ynn_debate.27.a:0 "Cela semble avoir eu un certain effet sur nos sujets."
 ynn_debate.28.t:0 "Des volontaires affluent sous notre bannière"
 ynn_debate.28.d:0 "Bien que le débat en cours soit très divisif, notre participation n'est pas sans avantages. Notre statut de voix dominante dans la discussion a conduit de nombreux guerriers, chevaliers et aventuriers qui se rangent de notre côté à affluer sous notre bannière, prêts à se battre pour leurs convictions si nécessaire."
 ynn_debate.28.a:0 "Notre cause est juste, et nous prévaudrons !"
 ynn_debate.29.t:0 "La question des Corrompus."
 ynn_debate.29.d:0 "Alors que [From.GetName] débat de la nature des Nés-des-Ruines Corrompus, c'est notre devoir en tant que grands prêtres de l'Ynn de leur fournir notre guidance. Puisque nous parlons au nom du Fleuve sacré, nos paroles ont une signification importante dans ces matières, même au-delà de nos propres frontières. Conseillons-nous que ceux qui habitent près des affluents ynniques sont corrompus, ou bénis ?"
 ynn_debate.29.a:0 "Comme l'eau peut remplir n'importe quel récipient, ainsi la grâce de l'Ynn."
 ynn_debate.29.b:0 "Nous seuls avons reçu la grâce de l'Ynn. Chassez les Corrompus !"
 ynn_debate.30.t:0 "Un suzerain réforme sa religion"
 ynn_debate.30.d:0 "Alors que [From.GetName] traverse des réformes religieuses tumultueuses concernant le statut des Nés-des-Ruines Corrompus, nous pouvons saisir l'opportunité d'affecter leur position. Nous pouvons les diffamer comme hérétiques, ou tenter d'attiser le mécontentement parmi leurs vassaux qui sont en désaccord avec la direction qu'ils prennent."
 ynn_debate.30.a:0 "Diffamons-les."
 ynn_debate.30.b:0 "Semons le mécontentement parmi leurs vassaux."
 ynn_debate.30.c:0 "Ils ne nous concernent pas."
 ynn_debate.31.t:0 "Un rival revendique l'autorité"
 ynn_debate.31.d:0 "Dénigrant notre position dans le débat en cours, un prétendant potentiel revendique l'autorité légitime sur notre religion. Il affirme que notre position nous rend égarés et inaptes à régner. Nous pourrions le dénoncer en retour et chercher la confrontation directe, ou simplement l'ignorer et espérer que cette folie s'éteigne d'elle-même."
 ynn_debate.31.a:0 "Dénonçons-le comme hérétique !"
 ynn_debate.31.b:0 "Laissons-le parler."
 ynn_debate.32.t:0 "Terreur d'État ?"
 ynn_debate.32.d:0 "Le désaccord sur le sujet du débat en cours est une chose, mais certains parmi nos vassaux sont allés plusieurs étapes plus loin en insultant ouvertement nos décisions et en essayant de nous apprendre à régner. Si nous engagions des agents de l'Ordre de l'Œil de la Montagne pour manipuler psychologiquement et harceler l'un de nos pires détracteurs connus, cela pourrait suffire à effrayer les autres et les faire rentrer dans le rang."
 ynn_debate.32.a:0 "Je sais exactement qui…"
 ynn_debate.32.b:0 "Non, nous sommes au-dessus de cela."
 ynn_debate.33.t:0 "S'unir contre les Corrompus"
 ynn_debate.33.d:0 "Notre position ferme contre l'émancipation des Nés-des-Ruines Corrompus a conduit à une montée du soutien de nombreux de nos sujets bénis, qui nous voient comme un bouclier vertueux contre les étrangers. La division entre nous et les Nés-des-Ruines Corrompus a, à son tour, guéri les divisions entre nous."
 ynn_debate.33.a:0 "Notre règne est stable."
 ynn_debate.34.t:0 "Ne tolérez pas les Corrompus"
 ynn_debate.34.d:0 "Dans un acte de défiance traître, l'un de nos Iosahar a déclaré que quel que soit le résultat de ce débat, il n'acceptera jamais les Nés-des-Ruines Corrompus comme égaux sous la foi. Son manque de respect envers le débat est évident, et il n'entendra plus d'arguments."
 ynn_debate.34.a:0 "Nous verrons à son arrogance plus tard…"
 ynn_debate.35.t:0 "Roturiers mécontents"
 ynn_debate.35.d:0 "Nous avons maintenant passé des mois à plaider pour accepter les Corrompus comme nos Élus. L'Ynn nous a sauvés, et il les a sauvés. Nous nous attendions à ce que certains soient en désaccord mais il y a maintenant une nouvelle épine dans notre flanc, que nous n'avions pas anticipée : un groupe de roturiers dans nos terres est devenu de plus en plus mécontent de tout le temps que nous avons passé à discuter des Corrompus, et de ne pas prêter attention à leurs besoins.\n\nIl y a toujours des grognements concernant des impôts trop élevés et le détachement de [Root.Monarch.GetName], mais le débat a fait déborder le vase, et maintenant certains d'entre eux ont levé une milice pour se libérer de notre règne !"
 ynn_debate.35.a:0 "Tous les affluents se jettent dans l'Ynn, tous doivent obéir au [Root.Monarch.GetTitle] !"
 ynn_debate.36.t:0 "Des volontaires des [yrw_natives_origin.Culture.GetName]"
 ynn_debate.36.d:0 "Notre position fervente sur l'acceptation des Nés-des-Ruines Corrompus n'est pas passée inaperçue parmi les Nés-des-Ruines Corrompus eux-mêmes, qui sont réjouis que nous parlions en leur nom. En signe de fraternité, une bande de guerriers [yrw_natives_origin.Culture.GetName] des affluents de l'Ynn est arrivée dans nos terres, et s'est portée volontaire pour rendre la pareille, et combattre sous notre bannière."
 ynn_debate.36.a:0 "Ils seront vitaux si le besoin s'en fait sentir."
 ynn_debate.37.t:0 "Un chef [yrw_natives_origin.Culture.GetName] prend la parole"
 ynn_debate.37.d:0 "Un chef local d'une tribu [yrw_natives_origin.Culture.GetName] a commencé à prêcher pour le traitement équitable de son peuple dans nos terres. Bien qu'il soit avantageux d'avoir son soutien, il agit indépendamment de nous, et certains de ses arguments pourraient se refléter défavorablement sur nos efforts. En plus de cela, les gens du peuple auxquels il prêche ne sont pas réellement ceux qui participent aux débats."
 ynn_debate.37.a:0 "C'est bien de l'avoir de notre côté."
 ynn_debate.37.b:0 "Il devrait apprendre à garder le silence."
 ynn_debate.38.t:0 "Le débat impacte les relations commerciales"
 ynn_debate.38.d:0 "Turbulence. C'est quand l'Ynn s'agite, l'eau devenant blanche, brisant toute branche ou tout corps qu'il porte. C'est une description du débat en cours sur la question de savoir si les Nés-des-Ruines Corrompus sont en fait des Élus de l'Ynn et de tous ses arguments constants. Et maintenant, il semble que la turbulence ait frappé certaines de nos relations commerciales : le débat en cours a fait que certains de nos voisins se demandent si nous sommes de vrais adhérents de la Foi ou si nous sommes quasi-hérétiques, et la méfiance les a vus annuler des contrats et envoyer leurs caravanes marchandes ailleurs. Mais peut-être ferons-nous mieux sans ces relations ossifiées, et l'opportunité de chercher de nouveaux partenariats ?"
 ynn_debate.38.a:0 "Nous devrons nous débrouiller seuls."
 ynn_debate.38.b:0 "Cela nous rapprochera de nos voisins."
 ynn_debate.39.t:0 "Un général [yrw_natives_origin.Culture.GetName] nous rejoint"
 ynn_debate.39.d:0 "Notre position en faveur des nés-des-ruines des affluents a attiré l'attention de l'un d'entre eux. Guerrier redoutable et stratège astucieux, il a offert ses services comme général pour mener nos troupes. Bien que nos adversaires dans le débat puissent rechigner à servir sous ses ordres, nos partisans se sont empressés d'arguer que sa force et sa compétence sont une preuve claire qu'il est béni par l'Ynn."
 ynn_debate.39.a:0 "Nos ennemis trembleront !"

 ynn_debate.41.t:0 "Hésitation"
 ynn_debate.41.d:0 "La question de l'effondrement de l'Empire Ynnique est source de division. Si des sujets traîtres sont vraiment responsables de la destruction de la société ynnique, alors comment se fait-il que beaucoup d'entre eux aient pu engendrer des maisons nobles bénies par l'Ynn ? Mais alors si les Empereurs sont à blâmer, qu'est-ce qui explique leurs siècles de règne harmonieux ? Bien que les courants de la foi puissent porter même la plus lourde barge, l'opposition pourrait couler nos espoirs de résoudre cette question si nous maintenons notre cap actuel. Est-ce le moment d'être pragmatique et de mettre notre foi de côté ?"
 ynn_debate.41.a:0 "Peut-être pouvons-nous compter sur nos Iosahar…"
 ynn_debate.41.b:0 "Peut-être devrions-nous rester seuls dans notre pouvoir…"
 ynn_debate.41.c:0 "Non, nous connaissons notre position."
 ynn_debate.42.t:0 "Trancher le débat ?"
 ynn_debate.42.d:0 "Les échanges en cours concernant l'effondrement de l'Empire Ynnique ont été épuisants, et aucun terrain d'entente n'a encore été trouvé. Si quelque chose, les deux camps se sont seulement plus retranchés dans leurs positions, tous deux tentant de gagner notre faveur. Il pourrait être dans notre intérêt de mettre fin au différend une fois pour toutes, avant que cette question ne cause un schisme durable dans nos terres. Le moment serait peut-être opportun de clore le conseil de la noblesse, et d'appeler tous nos sujets à jurer de respecter sa conclusion."
 ynn_debate.42.a:0 "Oui, tranchons cela."
 ynn_debate.42.b:0 "Non, poursuivons le débat."
 ynn_debate.43.t:0 "Concessions à l'opposition"
 ynn_debate.43.da:0 "Nos conseillers nous ont approchés et proposent une légère concession à la faction opposée : reconnaissons que bien que la traîtrise des nobles passés soit ce qui a fait tomber l'Empire Ynnique, les nobles qui ont créé leurs propres royaumes pendant la chute de l'Empire agissaient avec les intentions les plus pures à l'esprit et ont gagné la bénédiction du Fleuve."
 ynn_debate.43.db:0 "Nos conseillers nous ont approchés et proposent une légère concession à la faction opposée : reconnaissons que bien que les excès des empereurs passés soient ce qui a fait tomber l'Empire Ynnique, l'Ynn a parfois été béni de bons empereurs qui étaient les plus hauts parangons de vertu de l'histoire ynnique."
 ynn_debate.43.a:0 "C'est peut-être pour le mieux."
 ynn_debate.43.b:0 "Nous ne céderons pas d'un pouce !"
 ynn_debate.44.t:0 "Soudoyer un Iosahar ?"
 ynn_debate.44.d:0 "Le débat en cours sur l'effondrement de l'Empire Ynnique a causé une augmentation significative des négociations secrètes à huis clos. Alors que certaines de ces négociations contiennent des débats passionnés sur la droiture de leur cause, beaucoup sont froides et transactionnelles, certains demandant ouvertement des cadeaux en échange d'une attitude plus conciliante envers nous."
 ynn_debate.44.a:0 "Plaisir de faire affaire."
 ynn_debate.44.b:0 "Comment OSEZ-vous ?"
 ynn_debate.45.t:0 "Une bagarre éclate au milieu du débat"
 ynn_debate.45.d:0 "Les débats sur l'effondrement de l'Empire Ynnique ont toujours été passionnés, mais cela a maintenant atteint un tout autre niveau. Des bagarres ont éclaté dans les salles de réunion, débordant dans les rues. Les combats furent intenses et ne durèrent pas longtemps, mais ont coûté plusieurs vies.\n\nBien sûr, les deux camps prétendent immédiatement que l'autre partie était en faute. Certaines figures hautaines disent qu'elles seraient si folles que de commencer de nouvelles querelles tout en discutant des anciennes, à l'incrédulité des autres. En l'absence de preuves réelles, il semble que ce soit à nous de décider ce qui sera écrit dans les livres d'histoire."
 ynn_debate.45.a:0 "Se ranger du côté de [iosahar_a.GetName] qui croit en la centralisation."
 ynn_debate.45.b:0 "Se ranger du côté de [iosahar_b.GetName] qui croit en la décentralisation."
 ynn_debate.46.t:0 "Les Iosahar s'impatientent"
 ynn_debate.46.d:0 "Alors que le débat sur l'effondrement de l'Empire Ynnique traîne en longueur, nous voyons de plus en plus de faux sourires à nos festins. Nous entendons des secrets murmurés juste hors de portée. Les conversations s'arrêtent à notre approche. Il semble que le débat pourrait tourner contre nous si nous n'agissons pas avec décision."
 ynn_debate.46.a:0 "Mieux vaut conclure bientôt…"

 ynn_debate.47.t:0 "Un argument bien placé"
 ynn_debate.47.d:0 "Durant une nuit de festin avec les représentants des Iosahar de notre royaume, les salles de [Root.Capital.GetName] se sont emplies de plus en plus de réjouissances, alors que le sujet de l'effondrement de l'Empire Ynnique s'estompait, jusqu'à ce que [iosahar_good_argument.Monarch.GetTitle] [iosahar_good_argument.Monarch.GetName] de [iosahar_good_argument.GetName] prenne la parole, passant presque sans transition de la conversation précédente :\n\n« [Root.YnnDebate47Bloc0] »"
 YnnDebate47Bloc0_A1:0 "Un verre à notre hôte, [Root.Monarch.GetTitle] [Root.Monarch.GetName], pour avoir eu la patience de nous écouter !"
 YnnDebate47Bloc0_A2:0 "Un verre aux Empereurs d'antan, pour nous avoir transmis l'Ynn relativement intact !"
 YnnDebate47Bloc0_A3:0 "Il y avait une certaine gloire à voir des milliers de soldats tous sous la même bannière…"
 YnnDebate47Bloc0_B1:0 "Heureusement, [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'abuserait jamais du pouvoir de cette façon."
 YnnDebate47Bloc0_B2:0 "Que les Iosahar protègent l'Ynn pour trois siècles de plus !"
 YnnDebate47Bloc0_B3:0 "Nous avons été si préoccupés par la gloire perdue de l'Empire, que nous n'avons jamais vu combien de maisons nobles sont aussi grandes et accomplies que les impériales."
 ynn_debate.47.a:0 "Cela semble avoir eu un certain effet sur les auditeurs."
 ynn_debate.48.t:0 "Des volontaires affluent sous notre bannière"
 ynn_debate.48.d:0 "Bien que le débat en cours soit très divisif, notre participation n'est pas sans avantages. Notre statut de voix dominante dans la discussion a conduit de nombreux guerriers, chevaliers et aventuriers qui se rangent de notre côté à affluer sous notre bannière, prêts à se battre pour leurs convictions si nécessaire."
 ynn_debate.48.a:0 "Notre cause est juste, et nous prévaudrons !"

 ynn_debate.49.t:0 "La théocratie intervient dans le débat"
 ynn_debate.49.d:0 "Alors que le peuple de [From.GetName] débat de la raison pour laquelle l'Empire Ynnique est tombé, et de ce que cela signifie pour le système des Iosahar, c'est notre devoir en tant que grands prêtres de l'Ynn de leur fournir notre guidance. Puisque nous parlons au nom du Fleuve sacré, nos paroles ont une signification importante dans ces matières, même au-delà de nos propres frontières. Que conseillons-nous ?"
 ynn_debate.49.a:0 "Le pouvoir doit être centralisé"
 ynn_debate.49.b:0 "L'Empereur doit partager l'autorité"
 ynn_debate.50.t:0 "Un suzerain réforme sa religion"
 ynn_debate.50.d:0 "[From.GetName] traverse un débat religieux tumultueux, remettant en question pourquoi l'Empire Ynnique est tombé. Leur conflit interne les rend vulnérables. Nous pouvons les diffamer comme hérétiques, ou tenter d'attiser le mécontentement parmi leurs vassaux qui sont en désaccord avec la direction qu'ils prennent."
 ynn_debate.50.a:0 "Attaquons-les comme les hérétiques qu'ils sont !"
 ynn_debate.50.b:0 "Inspirons leurs vassaux qui adhèrent encore à la droiture !"
 ynn_debate.50.c:0 "En quoi cela nous concerne-t-il ?"
 ynn_debate.51.t:0 "Un rival revendique l'autorité"
 ynn_debate.51.d:0 "Un rival dans notre pays a revendiqué l'autorité sur la direction de notre religion. Cette revendication doit être prise au sérieux, car elle ne peut que mener à l'instabilité. Nous avons deux choix : soit le laisser parler et en supporter les conséquences, soit le dénoncer comme hérétique, ce qui, bien que renforçant notre position momentanément, est certain de provoquer une rébellion."
 ynn_debate.51.a:0 "Dénonçons ce vilain comme un hérétique : c'est la vérité !"
 ynn_debate.51.b:0 "Laissons-le parler. Il se taira finalement."
 ynn_debate.52.t:0 "Terreur d'État ?"
 ynn_debate.52.d:0 "Le désaccord sur le sujet du débat en cours est une chose, mais certains parmi nos vassaux sont allés plusieurs étapes plus loin en insultant ouvertement nos décisions et en essayant de nous apprendre à régner. Si nous engagions des agents de l'Ordre de l'Œil de la Montagne pour manipuler psychologiquement et harceler l'un de nos pires détracteurs connus, cela pourrait suffire à effrayer les autres et les faire rentrer dans le rang."
 ynn_debate.52.a:0 "Je sais exactement qui…"
 ynn_debate.52.b:0 "Non, nous sommes au-dessus de cela."
 ynn_debate.53.t:0 "Une discussion privée avec un Iosahar"
 ynn_debate.53.d:0 "Nous pensions que [iosahar_private_talk.GetRulerTitleAndNameOrRegencyCap] de [iosahar_private_talk.GetName] assistait à la cour aujourd'hui simplement pour rendre les respects dus à [Root.GetRulerTitleAndNameOrRegencyCap], mais il semble qu'il y avait une autre raison à sa visite. En début de soirée, alors que [Root.Monarch.GetName] se reposait dans un jardin privé, le Iosahar s'est glissé pour discuter du débat en cours sur pourquoi l'Empire Ynnique est tombé, et si le devoir ultime incombe à l'Empereur ou aux sujets.\n\nAprès avoir parlé doucement pendant quelques minutes, [iosahar_private_talk.Monarch.GetName] a finalement fait une pause, pour écouter la réaction de [Root.Monarch.GetName]. La réponse se forme déjà dans le cerveau du [Root.Monarch.GetTitle] : [Root.Monarch.GetSheHe] sait que les idées exposées étaient…"
 ynn_debate.53.a:0 "Une vraie et pénétrante perspicacité !"
 ynn_debate.53.b:0 "Une absurdité absolue !"
 ynn_debate.54.t:0 "Les paysans suivent l'exemple"
 ynn_debate.54.d:0 "Remettre en question le système des Iosahar, comme le fait le débat en cours, est une chose. C'en est une toute autre de remettre en question le contrat féodal même, comme certains paysans ont apparemment été inspirés à le faire ! C'est des fadaises, bien sûr, mais déjà il semble que beaucoup des plus humbles de [Root.GetName] sont avares de leurs impôts et prompts à se révolter."
 ynn_debate.54.a:0 "L'histoire nous donnera raison !"
 ynn_debate.54.b:0 "L'histoire nous donnera raison !"
 ynn_debate.55.t:0 "Une constante au milieu du débat"
 ynn_debate.55.d:0 "Le débat en cours est une tempête sans pareille, agitant tous ceux qui vivent leur vie près de l'Ynn. Mais bien sûr, la vie continue au milieu d'une tempête, et ainsi en est-il de l'une des rares constantes de la vie : les impôts, en particulier tous les paiements dus à [Root.GetRulerTitleAndNameOrRegencyCap] par ses Iosahar. Ou quelque chose est-il différent cette année… ?\n\nAprès tout, le débat en cours qui remet en question le système des Iosahar pourrait être une bonne excuse pour augmenter les redevances dues à [Root.Capital.GetName]. Mais d'un autre côté, si nous offrons à nos Iosahar une légère réduction de leurs paiements, nous pourrions les gagner à notre manière de penser."
 ynn_debate.55.a:0 "Diminuer les redevances vassales"
 ynn_debate.55.b:0 "Augmenter les redevances vassales"
 ynn_debate.56.t:0 "Un grand tournoi"
 ynn_debate.56.d:0 "Le débat fait rage, mais certains en ont assez de discuter et veulent trouver une réponse par l'action. Nos vassaux ont suggéré que nous fassions une pause dans les querelles pour organiser un tournoi, visant à déterminer si une armée unique centralisée peut surpasser une armée plus grande mais décentralisée.\n\nLa structure est claire : [Root.Monarch.GetRulerTitleAndNameOrRegencyCap] exercera un contrôle absolu sur 100 soldats tandis que chacun de nos vassaux nous affrontera avec 50 soldats chacun. Ce n'est peut-être qu'un combat simulé, mais cela pourrait prouver si le nouvel Empire Ynnique fonctionne mieux avec un pouvoir central fort ou décentralisé."
 ynn_debate.56.a:0 "Nous organiserons le tournoi !"
 ynn_debate.56.b:0 "Des jeux ne trancheront pas cette question."
 ynn_debate.57.t:0 "Investissement dans les sujets"
 ynn_debate.57.d:0 "Le débat en cours sur la façon dont l'Empire Ynnique devrait être organisé regorge de colère et de disputes… mais peut-être regorge-t-il aussi d'opportunités. Après tout, tous les meilleurs esprits du royaume sont tournés vers la meilleure façon d'organiser et de diriger l'État. Nous pourrions saisir une opportunité ici, en nous emparant de réformes potentielles mentionnées en passant pour améliorer l'administration et la structure du système des Iosahar. Bien que coûteux, cela pourrait porter ses fruits et démontrera notre engagement en tant que suzerain."
 ynn_debate.57.a:0 "Oui, c'est le moment d'investir."
 ynn_debate.57.b:0 "Non, nous manquons de ressources."
 ynn_debate.58.t:0 "Une attaque contre notre Iosahar !"
 ynn_debate.58.d:0 "Le débat en cours sur le système des Iosahar a été passionné pendant des mois, mais il semble qu'aujourd'hui il ait atteint un tout autre niveau ! Il y a eu une tentative d'assassinat contre l'un de nos Iosahar, et déjà d'autres affirment que c'est la preuve que nous faisons peu pour les protéger. L'origine de cette tentative est incertaine, mais elle a laissé tout le monde plus divisé sur la question en jeu."
 ynn_debate.58.a:0 "Cela devient compliqué…"
 ynn_debate.59.t:0 "Un morceau du passé"
 ynn_debate.59.d:0 "Le débat peut se concentrer sur le système des Iosahar qui guide [Root.GetName] aujourd'hui, mais il est enraciné dans un désaccord sur la chute de l'Empire Ynnique il y a plusieurs siècles. Nous ne pouvons pas trouver de preuves historiques qui clarifient que notre position est correcte… mais peut-être pouvons-nous en fabriquer. Du papier taché, de l'encre vieillie, qui verrait la différence ? Et l'un des sages anciens Empereurs ne le voudrait-il pas de toute façon, étant donné qu'ils seraient sans aucun doute d'accord avec [Root.GetRulerTitleAndNameOrRegencyCap] ?"
 ynn_debate.59.a:0 "Faisons l'histoire !"
 ynn_debate.59.b:0 "C'est un pas de trop."

 ynn_debate.61.t:0 "La croisée des chemins mentale"
 ynn_debate.61.d:0 "Une croyance ferme est bien et bonne dans tout débat. Mais parfois, nous n'avons pas d'autre choix que de permettre au pragmatisme de l'emporter sur le dogme. Devrions-nous le faire maintenant ?"
 ynn_debate.61.a:0 "Peut-être ne devrions-nous pas adopter l'armement cannorien…"
 ynn_debate.61.b:0 "Peut-être devrions-nous adopter l'armement cannorien…"
 ynn_debate.61.c:0 "Non. Nous connaissons notre position."
 ynn_debate.62.t:0 "Trancher le débat ?"
 ynn_debate.62.d:0 "Il semble que les deux camps aient avancé tous les arguments qu'ils étaient disposés ou capables de faire. Peut-être est-il opportun de mettre fin au débat."
 ynn_debate.62.a:0 "Oui, tranchons cela."
 ynn_debate.62.b:0 "Non, poursuivons le débat."
 ynn_debate.63.t:0 "Concessions à l'opposition"
 ynn_debate.63.da:0 "Nos conseillers nous ont approchés et proposent une concession à la faction opposée à l'adoption des armes cannoriennes : promettons que bien que [Root.GetName] facilitera la production d'armes à feu, les seigneurs vassaux qui choisissent de maintenir l'armement traditionnel seront dûment respectés et devront fournir moins de levées comparés aux seigneurs qui adoptent les armes à feu."
 ynn_debate.63.db:0 "Nos conseillers nous ont approchés et proposent une concession à la faction opposée à l'interdiction des armes cannoriennes : reconnaissons que bien qu'aucun bon Ynnique craignant le Fleuve ne prendrait volontairement une crosse de fusil, une arme à feu utilisée pour défendre l'innocent est plus noble qu'une épée utilisée pour s'en prendre à lui."
 ynn_debate.63.a:0 "C'est peut-être pour le mieux."
 ynn_debate.63.b:0 "Nous ne céderons pas d'un pouce !"
 ynn_debate.64.t:0 "Soudoyer un Iosahar ?"
 ynn_debate.64.d:0 "Les débats, c'est bien beau ; beaucoup sont motivés par l'adrénaline apportée par le fait de gagner ou de perdre. Cependant, à travers le monde, il y a des factions et des gens qui ne sont motivés que par l'argent, et la Vallée du Fleuve Ynn ne fait pas exception à cette règle. Un sujet, succombant à sa cupidité connue, demande un pot-de-vin pour se ranger à notre position."
 ynn_debate.64.a:0 "Plaisir de faire affaire avec vous."
 ynn_debate.64.b:0 "Comment osez-vous ?! Espèce de petit…"
 ynn_debate.65.t:0 "Conflit pendant le débat"
 ynn_debate.65.d:0 "Pour le meilleur ou pour le pire, le débat s'échauffe maintenant. Ces jours-ci, cependant, c'est décidément pour le pire : une bagarre a maintenant éclaté entre deux dirigeants de royaumes opposés lors d'un festin local."
 ynn_debate.65.a:0 "Se ranger du côté de [iosahar_a.GetName], qui a plaidé pour les armes à poudre."
 ynn_debate.65.b:0 "Se ranger du côté de [iosahar_b.GetName], qui a plaidé pour le combat de mêlée enchanté."
 ynn_debate.66.t:0 "L'impatience monte"
 ynn_debate.66.d:0 "Le débat n'avance pas aussi vite que quiconque l'avait espéré ou attendu. Le débat dure depuis un bon moment. Aggravant la situation, personne n'est prêt à reculer. Tout le monde est fatigué, et nos Iosahar sujets s'impatientent."
 ynn_debate.66.a:0 "Nous ferions mieux de mettre fin à tout cela bientôt…"
 ynn_debate.67.t:0 "Un argument bien placé"
 ynn_debate.67.d:0 "Durant une nuit de festin avec les représentants des Iosahar de notre royaume, les salles de [Root.Capital.GetName] se sont emplies de plus en plus de réjouissances, alors que le sujet des armes à feu et de la modernisation de l'armée s'estompait, jusqu'à ce que [iosahar_good_argument.Monarch.GetTitle] [iosahar_good_argument.Monarch.GetName] de [iosahar_good_argument.GetName] prenne la parole, passant presque sans transition de la conversation précédente :\n\n« [Root.YnnDebate67Bloc0] »"
 YnnDebate67Bloc0_A1:0 "L'idée que les armes à feu et la magie ne peuvent pas aller de pair est peut-être une erreur…"
 YnnDebate67Bloc0_A2:0 "Depuis l'époque de Lukaus, les histoires de tant de chevaliers se sont terminées en tragédie, n'est-ce pas ?"
 YnnDebate67Bloc0_A3:0 "Dans le temps qu'il m'a fallu pour recruter dix rangers de Trompolere, j'aurais pu lever dix mille fusils."
 YnnDebate67Bloc0_A4:0 "Ce cerf que nous avons mangé ? Il a été chassé par un tireur cannorien."
 YnnDebate67Bloc0_B1:0 "Le chevalier ynnique avec sa monture à bois est plus qu'un combattant : c'est un symbole."
 YnnDebate67Bloc0_B2:0 "Les épées ynniques ont vaincu des dragons, et maintenant des gens disent qu'elles ne feront pas contre des barils qui explosent ?"
 YnnDebate67Bloc0_B3:0 "Si les garçons ne vont pas s'entraîner à l'épée ou à l'arc, qui sait à quels vices ils s'adonneront ?"
 YnnDebate67Bloc0_B4:0 "Comment les bardes vont-ils chanter nos victoires, quand les champs de bataille sont obscurcis par la fumée ?"
 ynn_debate.67.a:0 "Cela semble avoir eu un certain effet sur les auditeurs."
 ynn_debate.68.t:0 "Des volontaires affluent sous notre bannière"
 ynn_debate.68.d:0 "Bien que le débat en cours soit très divisif, notre participation n'est pas sans avantages. Notre statut de voix dominante dans la discussion a conduit de nombreux guerriers, chevaliers et aventuriers qui se rangent de notre côté à affluer sous notre bannière, prêts à se battre pour leurs convictions si nécessaire."
 ynn_debate.68.a:0 "Notre cause est juste, et nous prévaudrons !"
 ynn_debate.69.t:0 "Le débat sur l'armement de [From.GetName]"
 ynn_debate.69.d:0 "Alors que le peuple de [From.GetName] débat de la nature et des mérites des armes cannoriennes, c'est notre devoir en tant que grands prêtres de l'Ynn de leur fournir notre guidance. Puisque nous parlons au nom du Fleuve sacré, nos paroles ont une signification importante dans ces matières, même au-delà de nos propres frontières. Conseillons-nous que ce nouvel armement devrait être accepté ou rejeté ?"
 ynn_debate.69.a:0 "Le nouvel armement a ses mérites."
 ynn_debate.69.b:0 "Le nouvel armement est au mieux sans valeur, au pire hérétique."
 ynn_debate.70.t:0 "Un suzerain débat de l'armement cannorien"
 ynn_debate.70.d:0 "Alors que [From.GetName] traverse des réformes religieuses tumultueuses concernant le statut de l'armement cannorien, nous pouvons saisir l'opportunité d'affecter leur position. Nous pouvons les diffamer comme hérétiques, ou tenter d'attiser le mécontentement parmi leurs vassaux qui sont en désaccord avec la direction qu'ils prennent."
 ynn_debate.70.a:0 "Attaquons-les comme les hérétiques qu'ils sont !"
 ynn_debate.70.b:0 "Inspirons leurs vassaux qui adhèrent encore à la droiture !"
 ynn_debate.70.c:0 "En quoi cela nous concerne-t-il ?"
 ynn_debate.71.t:0 "Un rival revendique l'autorité"
 ynn_debate.71.d:0 "Un rival dans notre pays a revendiqué l'autorité sur la direction de notre religion. Cette revendication doit être prise au sérieux, car elle ne peut que mener à l'instabilité. Nous avons deux choix : soit le laisser parler et en supporter les conséquences, soit le dénoncer comme hérétique, ce qui, bien que renforçant notre position momentanément, est certain de provoquer une rébellion."
 ynn_debate.71.a:0 "Dénonçons ce vilain comme un hérétique : c'est la vérité !"
 ynn_debate.71.b:0 "Laissons-le parler. Il se taira finalement."
 ynn_debate.72.t:0 "Terreur d'État ?"
 ynn_debate.72.d:0 "Le désaccord sur le sujet du débat en cours est une chose. Mais certains parmi nos vassaux sont allés plusieurs étapes plus loin en montrant des signes de déloyauté ouverte. Si nous faisions un exemple de l'un des pires de nos détracteurs, cela pourrait suffire à effrayer les autres et les faire rentrer dans le rang. Mais encore une fois, ce genre de choses a été connu pour se retourner contre soi…"
 ynn_debate.72.a:0 "Je sais exactement qui cibler."
 ynn_debate.72.b:0 "Non ! Nous sommes au-dessus de cela."
 ynn_debate.73.t:0 "Confiscation des armes à feu ?"
 ynn_debate.73.d:0 "Nous avons défini notre cap pour nous opposer aux armes dégénérées des Cannoriens, et résolu de nous en tenir à améliorer les méthodes transmises par nos sages ancêtres. Mais peut-être que cela ne suffit pas. Peut-être devrions-nous saisir les armes à feu qui sont entrées dans [Root.GetName] et ainsi montrer notre fidélité à notre ligne de conduite déclarée. Cela nous permettra de purifier le déshonneur d'utiliser ces armes nouvelles de notre nation par tous les moyens."
 ynn_debate.73.a:0 "Qu'il en soit ainsi !"
 ynn_debate.73.b:0 "Pas besoin. Laissons-les à leur honte."
 ynn_debate.74.t:0 "Les méthodes de combat traditionnelles portent leurs fruits"
 ynn_debate.74.d:0 "Nous avons toujours su comment combattre à l'épée. C'est honorable et pratique. Renforcer cette tradition dans notre pays a porté des résultats positifs : nos forces sont maintenant plus expérimentées."
 ynn_debate.74.a:0 "C'est bien !"
 ynn_debate.75.t:0 "Achats d'épées ?"
 ynn_debate.75.d:0 "Des indications de la capitale de notre Suzerain suggèrent qu'ils abandonneront l'art traditionnel du combat à l'épée en faveur de l'armement cannorien. Nous n'avons pas encore embrassé un tel point de vue ; ce fait peut nous procurer quelque avantage. Peut-être pouvons-nous leur racheter ces épées."
 ynn_debate.75.a:0 "Faisons la tentative."
 ynn_debate.75.b:0 "Pas vraiment d'intérêt…"
 ynn_debate.76.t:0 "Achats d'armes à feu ?"
 ynn_debate.76.d:0 "Des indications de la capitale de notre Suzerain suggèrent qu'ils abandonneront l'art traditionnel du combat à l'épée en faveur des armes à feu cannoriennes. Nous avons déjà embrassé un tel point de vue ; ce fait peut nous procurer quelque avantage. Avec nos connexions au commerce cannorien, nous pouvons aider à obtenir plus d'armes à feu pour notre Suzerain. Le devrions-nous ?"
 ynn_debate.76.a:0 "Faisons la tentative."
 ynn_debate.76.b:0 "Pas vraiment d'intérêt…"
 ynn_debate.77.t:0 "Le point de vue d'un Iosahar cannorien ?"
 ynn_debate.77.d:0 "Avant que nous ne venions dans la vallée du Fleuve Ynn et ne nous affilions à son peuple local, qui sont maintenant, nous sommes fiers de le dire, nos amis et alliés suzerains, nous étions Cannoriens. Nous avons contemplé les effets de nos armes natives sur nos rivaux, et nous les avons exploitées en nous dirigeant vers Aelantir. Maintenant nous sommes assermentés comme Iosahar. Nous devrions partager notre expérience avec nos pairs."
 ynn_debate.77.a:0 "Eh bien, voyez-vous…"
 ynn_debate.78.t:0 "Déshonorant"
 ynn_debate.78.d:0 "Nos voisins nous regardent maintenant de travers ; en fait, ils prétendent que nous manquons d'honneur parce que nous voulons combattre avec des armes à feu. Nous avons perdu un certain prestige aux yeux du monde, même en dehors de la Vallée du Fleuve Ynn pour une raison quelconque. Avec la volonté de l'Ynn, ce ne sera qu'un revers temporaire."
 ynn_debate.78.a:0 "Nous devrons faire avec."
 ynn_debate.79.t:0 "Des mages offrent leur aide pour l'enchantement des épées"
 ynn_debate.79.d:0 "Les mages de notre royaume ont offert de nous aider à enchanter nos épées pour tirer de la magie et nos boucliers pour dévier les balles. Inutile de dire que ce serait un grand avantage pour nos forces, mais d'un autre côté, leur concéder de l'influence pourrait causer plus de problèmes qu'autre chose. Voulons-nous leur aide ?"
 ynn_debate.79.a:0 "Oui, assurément !"
 ynn_debate.79.b:0 "Non, ce n'est pas nécessaire."

 ynn_debate.81.t:0 "La croisée des chemins mentale"
 ynn_debate.81.d:0 "Une croyance ferme est bien et bonne dans tout débat. Mais parfois, nous n'avons pas d'autre choix que de permettre au pragmatisme de l'emporter sur le dogme. Devrions-nous le faire maintenant ?"
 ynn_debate.81.a:0 "Peut-être devrions-nous chasser ces intrus…"
 ynn_debate.81.b:0 "Peut-être avons-nous exclu ces Cannoriens trop rapidement…"
 ynn_debate.81.c:0 "Non, nous connaissons notre position."
 ynn_debate.82.t:0 "Trancher le débat ?"
 ynn_debate.82.d:0 "Il semble que les deux camps aient avancé tous les arguments qu'ils étaient disposés ou capables de faire. Peut-être est-il opportun de mettre fin au débat."
 ynn_debate.82.a:0 "Oui, tranchons cela."
 ynn_debate.82.b:0 "Non, poursuivons le débat."
 ynn_debate.83.t:0 "Concessions à l'opposition"
 ynn_debate.83.da:0 "Nos conseillers nous ont approchés et proposent une concession à la faction opposée à la diffusion des idées cannoriennes : déclarons que bien que l'Ynn accueille les Cannoriens avec la profondeur qu'ils apportent en entrant, ils devront assister aux leçons du clergé ynnique et ne jamais s'adresser à eux comme des pairs."
 ynn_debate.83.db:0 "Nos conseillers nous ont approchés et proposent une concession à la faction opposée à l'interdiction des idées cannoriennes : déclarons que bien que nous ne tolérions aucune hérésie, les élites ynniques pourront satisfaire leur curiosité sur les questions cannoriennes dans l'intimité de leurs résidences."
 ynn_debate.83.a:0 "C'est peut-être pour le mieux."
 ynn_debate.83.b:0 "Nous ne céderons pas d'un pouce !"
 ynn_debate.84.t:0 "Soudoyer un Iosahar ?"
 ynn_debate.84.d:0 "Les débats, c'est bien beau ; beaucoup sont motivés par l'adrénaline apportée par le fait de gagner ou de perdre. Cependant, à travers le monde, il y a des factions et des gens qui ne sont motivés que par l'argent, et la Vallée du Fleuve Ynn ne fait pas exception à cette règle. Un sujet, succombant à sa cupidité connue, demande un pot-de-vin pour se ranger à notre position."
 ynn_debate.84.a:0 "Plaisir de faire affaire avec vous."
 ynn_debate.84.b:0 "Comment osez-vous ?! Espèce de petit…"
 ynn_debate.85.t:0 "Conflit pendant le débat"
 ynn_debate.85.d:0 "Pour le meilleur ou pour le pire, le débat s'échauffe maintenant. Ces jours-ci, cependant, c'est décidément pour le pire : une bagarre a maintenant éclaté entre deux dirigeants de royaumes opposés lors d'un festin local."
 ynn_debate.85.a:0 "Se ranger du côté de [iosahar_a.GetName] qui accueille les pratiques cannoriennes."
 ynn_debate.85.b:0 "Se ranger du côté de [iosahar_b.GetName] qui a interdit les publications cannoriennes."
 ynn_debate.86.t:0 "L'impatience monte"
 ynn_debate.86.d:0 "Les choses n'avancent pas aussi vite que quiconque l'avait espéré ou attendu. Le débat dure depuis un bon moment. Aggravant la situation, personne n'est prêt à reculer. Tout le monde est fatigué, et nos Iosahar sujets s'impatientent."
 ynn_debate.86.a:0 "Nous ferions mieux de mettre fin à tout cela bientôt…"
 ynn_debate.87.t:0 "Un argument bien placé"
 ynn_debate.87.d:0 "Durant une nuit de festin avec les représentants des Iosahar de notre royaume, les salles de [Root.Capital.GetName] se sont emplies de plus en plus de réjouissances, alors que le sujet des armes à feu et de la modernisation de l'armée s'estompait, jusqu'à ce que [iosahar_good_argument.Monarch.GetTitle] [iosahar_good_argument.Monarch.GetName] de [iosahar_good_argument.GetName] prenne la parole, passant presque sans transition de la conversation précédente :\n\n« [Root.YnnDebate87Bloc0] »"
 YnnDebate87Bloc0_A1:0 "En lisant des livres sur la chevalerie en Escann ou sur Lorenan le Grand, il y a tellement de parallèles que cela semble irréel, comme si les Cannoriens étaient nos frères et sœurs perdus depuis longtemps…"
 YnnDebate87Bloc0_A2:0 "Vous avez tous vu la puissance de l'étrier cannorien. On ne peut qu'imaginer à quel point l'Ynn serait puissant avec encore plus d'inventions…"
 YnnDebate87Bloc0_A3:0 "J'ai trouvé que l'Étendue et Veykoda avaient acquis une beauté nouvelle grâce aux fermes cannoriennes."
 YnnDebate87Bloc0_A4:0 "Dans les fermes cannoriennes, personne n'a besoin de labourer les champs et chaque homme a un cheval à monter : ils appellent cela le mode de vie "cowboy"."
 YnnDebate87Bloc0_B1:0 "L'Empire Ynnique est véritablement le plus grand Empire jamais construit par les Elfes, et aucun argument fragile ou prétendue révélation ne me l'enlèvera."
 YnnDebate87Bloc0_B2:0 "Les invasions Buycev d'abord, et les migrations cannoriennes ensuite, prouvent vraiment que l'Ynn est le centre du monde."
 YnnDebate87Bloc0_B3:0 "J'ai constaté que l'intellect stupéfiant des Cannoriens est malheureusement principalement détourné vers le pillage de la campagne…"
 YnnDebate87Bloc0_B4:0 "Malgré tous ses progrès, je n'ai jamais entendu parler de Cannoriens voulant retourner à Cannor…"
 ynn_debate.87.a:0 "Cela semble avoir eu un certain effet sur les auditeurs."
 ynn_debate.88.t:0 "Des volontaires affluent sous notre bannière"
 ynn_debate.88.d:0 "Bien que le débat en cours soit très divisif, notre participation n'est pas sans avantages. Notre statut de voix dominante dans la discussion a conduit de nombreux guerriers, chevaliers et aventuriers qui se rangent de notre côté à affluer sous notre bannière, prêts à se battre pour leurs convictions si nécessaire."
 ynn_debate.88.a:0 "Notre cause est juste, et nous prévaudrons !"
 ynn_debate.89.t:0 "La théocratie intervient dans le débat"
 ynn_debate.89.d:0 "[From.GetName] débat de la valeur de la pensée cannorienne pour l'Ynn, ou si elle devrait être rejetée avec tous ceux qui cherchent à l'apporter ici. C'est notre devoir en tant que grands prêtres de l'Ynn de leur fournir notre guidance. Puisque nous parlons au nom du Fleuve sacré, nos paroles ont une signification importante dans ces matières, même au-delà de nos propres frontières. De quel côté nous rangeons-nous ?"
 ynn_debate.89.a:0 "Un affluent nourrit l'Ynn ; la pensée cannorienne aidera la nôtre."
 ynn_debate.89.b:0 "Leur pensée est au mieux sans valeur, au pire hérétique !"
 ynn_debate.90.t:0 "Un suzerain réforme sa religion"
 ynn_debate.90.d:0 "[From.GetName] traverse un débat religieux tumultueux cherchant à décider du mérite de la pensée cannorienne dans l'Ynn. Ils se battent entre eux, et en tant que tels sont vulnérables : Nous pouvons les diffamer comme hérétiques, ou tenter d'attiser le mécontentement parmi leurs vassaux qui sont en désaccord avec la direction qu'ils prennent."
 ynn_debate.90.a:0 "Attaquons comme les hérétiques qu'ils sont !"
 ynn_debate.90.b:0 "Inspirons leurs vassaux qui adhèrent encore à la droiture !"
 ynn_debate.90.c:0 "En quoi cela nous concerne-t-il ?"
 ynn_debate.91.t:0 "Un rival revendique l'autorité"
 ynn_debate.91.d:0 "Un rival dans notre pays a revendiqué l'autorité sur la direction de notre religion. Cette revendication doit être prise au sérieux, car elle ne peut que mener à l'instabilité. Nous avons deux choix : soit le laisser parler et en supporter les conséquences, soit le dénoncer comme hérétique, ce qui, bien que renforçant notre position momentanément, est certain de provoquer une rébellion."
 ynn_debate.91.a:0 "Dénonçons ce vilain comme un hérétique : c'est la vérité !"
 ynn_debate.91.b:0 "Laissons-le parler. Il se taira finalement."
 ynn_debate.92.t:0 "Terreur d'État ?"
 ynn_debate.92.d:0 "Le désaccord sur le sujet du débat en cours est une chose. Mais certains parmi nos vassaux sont allés plusieurs étapes plus loin en montrant des signes de déloyauté ouverte. Si nous faisions un exemple de l'un des pires de nos détracteurs, cela pourrait suffire à effrayer les autres et les faire rentrer dans le rang. Mais encore une fois, ce genre de choses a été connu pour se retourner contre soi…"
 ynn_debate.92.a:0 "Je sais exactement qui cibler."
 ynn_debate.92.b:0 "Non ! Nous sommes au-dessus de cela."
 ynn_debate.93.t:0 "Les publications cannoriennes fleurissent"
 ynn_debate.93.d:0 "Comme un feu dans du petit bois, comme une mauvaise herbe dans un champ négligé, les publications cannoriennes se sont répandues à travers [Root.GetName]. Intrigués par nos arguments publics et passionnés, même certains paysans ont cherché à apprendre sur et de ces documents étrangers. Et puis, bien sûr, la demande engendre l'offre, alors que les marchands cannoriens en apportent de plus en plus, directement des presses d'Anbenncóst et de Konwell."
 ynn_debate.93.a:0 "Assurons-nous que le [Root.Monarch.GetTitle] ait le premier choix !"
 ynn_debate.94.t:0 "Une bonne noyade de livres"
 ynn_debate.94.d:0 "L'Ynn est sacré, notre sauveur de la destruction et notre protecteur même maintenant. Mais cela ne signifie pas qu'il ne charrie pas de détritus, parfois ; c'est la nature du grand Fleuve que tout, bon et mauvais, se retrouvera dans son courant en temps voulu.\n\nAinsi, nos actes aujourd'hui, jeter des livres, pamphlets et autres publications cannoriennes, n'était pas de la pollution. C'était de la purification, l'Ynn sauvant une fois de plus cette terre en brûlant les œuvres en apparence innocentes qui mèneraient en fait à sa destruction."
 ynn_debate.94.a:0 "L'Ynn nous protège une fois de plus !"
 ynn_debate.95.t:0 "Un Cannorien indépendant prend la parole"
 ynn_debate.95.d:0 "Il semble que l'un des soi-disant « Suzerains » ynniques prenne des mesures pour réformer leur religion. D'après ce que nous comprenons, la religion tourne autour d'une obsession pour le fleuve dont ils tirent leur nom. Maintenant, ils débattent des Cannoriens et de ce que nous, aventuriers, signifions pour leur petite religion. Cela pourrait être une chance pour nous d'influencer leur religion pour qu'elle soit plus favorable à notre mode de vie. Nous devrions leur parler de l'erreur de leurs voies et de ce que nous avons à offrir s'ils nous écoutent."
 ynn_debate.95.a:0 "Nous devons partager notre sagesse."
 ynn_debate.96.t:0 "La pensée fleurit en [Root.GetName]"
 ynn_debate.96.d:0 "En encourageant la diffusion des idées cannoriennes parmi notre peuple, nous avons déclenché une sorte de renaissance intellectuelle parmi les érudits et penseurs de notre pays. Déjà, la cour de [Root.Capital.GetName], qui semble si souvent n'être qu'un marécage d'intrigues politiques et de commérages futiles, a été revitalisée comme centre de débat et d'enquête. La pensée cannorienne a peut-être été la graine de ce renouveau, mais l'épanouissement est entièrement nôtre."
 ynn_debate.96.a:0 "Quelles idées fascinantes !"
 ynn_debate.97.t:0 "La menace cannorienne"
 ynn_debate.97.d:0 "Rien ne rassemble un peuple comme un ennemi. Et bien que notre ennemi actuel combatte principalement avec des idées et des publications, un poison corrosif caché à l'intérieur, ils n'en sont que plus mortels par leur subtilité. Nous avons fait comprendre cela à notre peuple, et par conséquent, nous sommes tous plus étroitement liés contre la menace des étrangers."
 ynn_debate.97.a:0 "Que les élus se réjouissent."
 ynn_debate.98.t:0 "Un scandale cannorien"
 ynn_debate.98.d:0 "Un marchand est arrivé à [Root.Capital.GetName] aujourd'hui, n'apportant aucune publication cannorienne, mais plutôt des nouvelles du continent. Parmi d'autres événements, nous avons appris une histoire véritablement scandaleuse, le genre de chose impensable pour tout véritable elfe. Nous devrions transmettre cela à notre suzerain pour informer le débat en cours."
 ynn_debate.98.a:0 "Envoyez un messager à la cour, immédiatement !"
 ynn_debate.99.t:0 "Un penseur de Cannor"
 ynn_debate.99.d:0 "Apparemment, notre défense de la pensée cannorienne a eu des échos, jusqu'à ce continent lointain. Apprenant que [Root.Capital.GetName] est un centre de réflexion dans l'Ynn (et fuyant un scandale mineur, elle n'a rien dit sur le fait d'être la fille d'un seigneur !), un penseur prééminent a voyagé ici pour offrir ses services au [Root.Monarch.GetTitle]."
 ynn_debate.99.a:0 "Faisons-en un conseiller royal !"

 ynn_debate.99.b:0 "Renvoyez-le."

 ynn_debate.101.t:0 "L'opposition cède"
 ynn_debate.101.d:0 "Les questions posées devant la foi ont vu une forte résistance tant dans les cours que sur les champs de bataille à travers le royaume. Enfin, il y aura la paix. Bien que le rebelle occasionnel ici ou là puisse lever une bannière contre le $MONARCHTITLE$, la plupart ont été rappelés à notre règne."
 ynn_debate.101.a:0 "Désormais, cette question restera réglée parmi les fidèles."
 ynn_debate.102.t:0 "Un rival revendique l'autorité"
 ynn_debate.102.d:0 "[Root.Monarch.GetName] est le seul souverain de [Root.GetName], mais tous dans le royaume ne semblent pas reconnaître ce fait. Le débat religieux en cours les a inspirés à faire plus que répandre des murmures séditieux : ils se sont unis autour d'une seule figure, qui prétend que notre position dans le débat en cours nous rend indignes d'être [Root.Monarch.GetTitle]. Les traîtres ont rapidement rassemblé une force, et marchent sur [Root.Capital.GetName] !"
 ynn_debate.102.a:0 "Malédiction !"
 ynn_debate.103.t:0 "Des dissidents prennent les armes"
 ynn_debate.103.d:0 "Le débat religieux lancé par notre [Root.Monarch.GetTitle] s'est échauffé ces derniers mois, mais nous ne nous attendions jamais à ce qu'il atteigne ce niveau. Certaines personnes ont adopté la position opposée avec une telle férocité qu'ils affirment ouvertement que [Root.Monarch.GetName] est un hérétique pour ses croyances, et qu'en tant que tel, leur contrat féodal est nul et non avenu. Ils ont pris les armes pour gagner leur indépendance !"
 ynn_debate.103.a:0 "Ce sont eux les hérétiques !"
 ynn_debate.104.t:0 "Excès religieux"
 ynn_debate.104.d:0 "Le débat en cours sur la nature de notre foi a consumé les pensées de presque tous à [Root.Capital.GetName], et de beaucoup à travers le royaume. Mais pas tous. Il y a ceux qui ne prêtent aucune attention au grand Fleuve, qui nient sa merveille sacrée. Dans notre distraction alors que nous cherchons à résoudre le différend religieux, ils ont vu une opportunité. Les épées sont descendues des murs, les fermiers ont pris des fourches : ils pensent qu'une petite révolte pendant que nous sommes occupés ailleurs leur permettra de gagner une plus grande autonomie locale et une diminution des impôts."
 ynn_debate.104.a:0 "Nous leur montrerons qu'ils avaient tort !"
 ynn_debate.105.t:0 "Questions d'autorité"
 ynn_debate.105.d:0 "« [Root.Monarch.GetSheHeCap] ne peut pas régner ! [Root.Monarch.GetSheHeCap] ne doit pas ! Personne d'aussi égaré sur la vérité de l'Ynn ne peut diriger [Root.GetName] ! »\n\nC'est tout ce que le fou sur la place de [Root.Capital.GetName] a pu dire avant que les gardes locaux ne l'emmènent. Mais, malheureusement, ce n'est pas un sentiment si rare de nos jours : avec le pays en tumulte, certains de ceux qui remettent en question la position du [Root.Monarch.GetTitle] sur le débat religieux en cours remettent aussi en question son droit de régner. C'est absurde, bien sûr, mais une forme pernicieuse d'absurdité."
 ynn_debate.105.a:0 "Malédiction !"
 ynn_debate.106.t:0 "[angry_yrw_neighbor.GetName] condamne notre position"
 ynn_debate.106.d:0 "Le débat religieux n'est pas seulement une question pour [Root.GetName], il façonnera sans doute le cours de l'Ynn (ou du moins son culte) pour les années à venir. Et en tant que tel, il semble s'être étendu au-delà de nos frontières, atteignant la cour voisine de [angry_yrw_neighbor.Capital.GetName]. Cela ne nous préoccupe pas s'ils souhaitent se tenir informés des événements de [Root.GetName], mais maintenant il semble qu'ils aient choisi d'interférer !\n\nUn messager de [angry_yrw_neighbor.Monarch.GetTitle] [angry_yrw_neighbor.Monarch.GetName] a récemment annoncé à toute la cour qu'[angry_yrw_neighbor.Monarch.GetSheHe] pense que notre position est ridicule et quasi-hérétique « comme il sied à un pays aussi arriéré ». Nous avons expulsé le messager sur-le-champ, mais la tache que cet intrus a répandue ne sera pas retirée aussi facilement."
 ynn_debate.106.a:0 "Comment osent-ils ?!"
 ynn_debate.107.t:0 "La croisée des chemins mentale"
 ynn_debate.107.d:0 "Une croyance ferme est bien et bonne dans tout débat. Mais parfois, nous n'avons pas d'autre choix que de permettre au pragmatisme de l'emporter sur le dogme. Il y a un segment de la population qui exige que nous renversions notre position, ou ils nous condamneront comme hérétiques et se soulèveront en révolte ! Le [Root.Monarch.GetName] rit de leur pitoyable menace, bien sûr, mais c'est une chance de reconsidérer si nous le souhaitons."
 ynn_debate.107.a:0 "Peut-être ne devrions-nous pas faire confiance aux Nés-des-Ruines Corrompus…"
 ynn_debate.107.b:0 "Peut-être pouvons-nous faire confiance aux Nés-des-Ruines Corrompus…"
 ynn_debate.107.c:0 "Peut-être pouvons-nous compter sur nos Iosahar…"
 ynn_debate.107.e:0 "Peut-être devrions-nous rester seuls dans notre pouvoir…"
 ynn_debate.107.f:0 "Peut-être ne devrions-nous pas adopter l'armement cannorien…"
 ynn_debate.107.g:0 "Peut-être devrions-nous adopter l'armement cannorien…"
 ynn_debate.107.h:0 "Peut-être devrions-nous adopter l'armement cannorien…"
 ynn_debate.107.i:0 "Peut-être avons-nous exclu ces Cannoriens trop rapidement…"
 ynn_debate.107.j:0 "Absurde ! Notre position est claire et correcte."
 ynn_debate.108.t:0 "Un moment de faiblesse"
 ynn_debate.108.d:0 "Aucun royaume ne peut régner sur des fondations fracturées. Alors que nous tentons de régler certaines des questions qui ont érodé la base du Culte du Fleuve Ynn, d'autres cherchent encore à profiter de la situation. Un personnage local va de ville en ville rassemblant une bande de paysans. Ils se rallient contre la couronne affirmant que tandis que les nobles et les clercs perdent leur temps à débattre de combien de gouttes composent l'Ynn, l'elfe du commun meurt de faim dans le champ de son seigneur. Maintenant, soit par audace soit par folie, ce personnage s'est présenté à la cour. Calmement et éloquemment, il expose son cas devant $MONARCHTITLE$ $MONARCH$. Il semble en savoir beaucoup sur le débat actuel. Plus qu'un roturier typique ne le devrait. De plus, il reconnaît que les révoltes auxquelles fait face le $MONARCHTITLE$ mettent l'armée à rude épreuve. Il dit qu'il serait plus que disposé à convaincre ses partisans de déposer les armes s'il recevait un titre foncier à son nom.\n\nL'audace de faire une telle demande ! Et devant toute la cour, qui plus est. Pourtant, il nous a pris dans un moment de faiblesse…"
 ynn_debate.108.a:0 "Donnez-lui quelques terres et que cela soit terminé !"
 ynn_debate.108.b:0 "Je pense qu'il a assez parlé. Coupez-lui la langue et renvoyez-le à sa populace."

 ynn_debate.150.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.150.d:0 "Une proclamation est descendue de [From.GetName] en faveur de l'acceptation des Nés-des-Ruines Corrompus comme égaux le long des courants de la foi. Ils déclarent que bien que les sauvages ne soient pas capables de civilisation comme les vrais Ynniques de l'ancien empire, cela ne les exclut pas de la grâce. Toute vie coule de l'Ynn, et ainsi toute vie est précieuse pour son culte. Même les animaux communs méritent une certaine protection, dont les Corrompus ne font pas exception. D'autant plus qu'ils sont capables d'apprendre notre langue, bien que grossièrement, et, bien qu'ils adorent follement des esprits animaux et des inscriptions runiques, ce n'est que l'interprétation égarée de notre propre zodiaque et ils peuvent être sauvés de leurs croyances."
 ynn_debate.150.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.151.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.151.d:0 "Une proclamation est descendue de [From.GetName] déclarant qu'aucun Né-des-Ruines Corrompu n'est l'égal d'un adorateur de l'Ynn. Selon eux, c'est seulement par la grâce de l'Ynn que nos sociétés ont prospéré depuis le Déluge Final. L'absence de toute civilisation parmi les Corrompus est donc la preuve qu'ils n'ont jamais été les élus de l'Ynn. Les seigneurs peuvent concevoir des idées de leur enseigner nos voies, mais ils ne peuvent jamais apprendre. On peut apprendre à un chien à faire des tours, mais les œuvres glorieuses de la société ynnique ne sont pas de simples tours. Nous cultivons là où ils ne peuvent pas. Nous avons l'écriture et une langue compréhensible là où ils n'en ont pas. Nous avons la culture là où ils n'en ont pas. C'est la disparité qu'ils ne pourront jamais franchir car ils sont les perdus et nous sommes les trouvés."
 ynn_debate.151.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.152.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.152.d:0 "Une proclamation est descendue de [From.GetName] plaidant en faveur des réformes de centralisation. Les bénédictions de l'Ynn ont toujours favorisé une hiérarchie juste, et le contrat sacré entre gouvernant et gouverné. Un système plus centralisé assure que les ambitieux assoiffés de pouvoir ne peuvent pas facilement profiter de notre structure de gouvernance. En fin de compte, affirment les prêtres, les bénédictions de l'Ynn sont plus efficacement protégées par le clergé sous un système centralisé."
 ynn_debate.152.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.153.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.153.d:0 "Une proclamation est descendue de [From.GetName], mettant en garde contre la tentation de centraliser le pouvoir. En investissant trop d'influence en un seul endroit, ou même une seule personne, nous risquons qu'ils soient tentés par la corruption et le déshonneur. Le pouvoir corrompt, et doit être contrôlé en permanence. Ce n'est que par un système décentralisé, affirment-ils, que cette influence corruptrice peut vraiment être maîtrisée : seul le pouvoir peut contrôler le pouvoir."
 ynn_debate.153.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.154.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.154.d:0 "Une proclamation est descendue de [From.GetName], déclarant que l'utilisation des armes à feu est sanctionnée par l'Ynn. Les armes sont des armes, quelle que soit la forme qu'elles prennent, et la seule différence d'honneur entre elles est la façon dont elles sont utilisées. Les épées peuvent être utilisées de manière honteuse, tandis que les mousquets peuvent être utilisés de manière vertueuse. Tant que nous préservons notre ordre social et maintenons notre droiture, nous resterons bénis par l'Ynn peu importe quelles armes nous utilisons pour le défendre."
 ynn_debate.154.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.155.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.155.d:0 "Une proclamation est descendue de [From.GetName], condamnant l'utilisation des armes à feu par les adorateurs de l'Ynn. Ces armes, affirment-ils, vont à l'encontre de l'ordre naturel de l'Ynn, élevant le vulgaire tout en rabaissant le vertueux. Alors que nous affrontons des armées maniant ces armes, nous devons nous fier à la magie et aux lames comme nous l'avons toujours fait, de peur de perdre ce que nous sommes. Dans sa tentative de combattre les monstres, on ne peut pas se permettre de devenir un monstre en retour. Par la grâce de l'Ynn, nous prévaudrons quelles que soient nos armes."
 ynn_debate.155.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.156.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.156.d:0 "Une proclamation est descendue de [From.GetName], recommandant l'examen approfondi de la pensée cannorienne. Bien que leurs idées ne proviennent pas de l'Ynn, les Cannoriens ne sont clairement pas des barbares. Le fait que ces nouvelles idées se soient répandues à travers nos terres, apportant innovation et prospérité, est une preuve suffisante qu'elles sont bénies par l'Ynn. Bien que cela ne signifie pas que chaque innovation cannorienne soit bonne, et certainement pas qu'elles devraient supplanter nos propres traditions, nous ne devrions pas craindre ces idées simplement parce qu'elles nous sont inconnues."
 ynn_debate.156.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.157.t:0 "Le [From.GovernmentName] de [From.GetName] intervient"
 ynn_debate.157.d:0 "Une proclamation est descendue de [From.GetName] conseillant l'interdiction de toute pensée cannorienne. Bien qu'ils ne soient pas tout à fait des barbares, ces gens restent intouchés par les bénédictions de l'Ynn, et sont en tant que tels indignes de confiance. Nous avons vu le chemin sur lequel leurs philosophies les ont mis. Nous avons déjà vu leur cupidité et leur déshonneur pleinement exposés, maintes et maintes fois. Toute relation avec ces gens doit inclure des garanties qui ne peuvent être contournées, et toutes leurs idées doivent être traitées avec la plus grande suspicion."
 ynn_debate.157.a:0 "Nous ne pouvons nier leur perspicacité."

 ynn_debate.200.t:0 "[From.GetName] condamne notre effort de réforme"
 ynn_debate.200.d:0 "Apparemment, le débat en cours à [Root.GetName] sur la nature de notre foi a atteint au-delà de nos frontières. Un messager récent de [From.Capital.GetName], sans équivoque, a dénoncé notre approche comme « à peine de l'hérésie », insistant sur le fait que le [Root.Monarch.GetTitle] devrait quitter son trône et prendre une « nage dans le grand fleuve pour voir clairement ses vérités ». Nous avons expulsé leur ambassadeur, mais [Root.Monarch.GetName] peut encore entendre les courtisans ricaner dans son dos…"
 ynn_debate.200.a:0 "Leurs paroles ne signifient rien."

 ynn_debate.201.t:0 "[From.GetName] envoie des dissidents"
 ynn_debate.201.d:0 "Nous nous attendions à ce que l'ambassadeur de [From.GetName] soit une nuisance constante à la cour, et un irritant particulièrement frustrant dans le cours de ce débat. Mais nous ne nous attendions pas à ce qu'il franchisse la ligne, et visite directement nos Iosahar pour rassembler leurs arguments contre notre position dans le débat religieux en cours !\n\nDes promenades tranquilles tôt le matin, aux murmures échangés dans les jardins du palais au cœur de la nuit, nos agents rapportent un certain nombre de conversations dont la nature exacte reste inscrutable, mais qui ont toutes un résultat commun : nos Iosahar s'irritent sous notre règne, les frustrations révélées par le débat en cours ne faisant que s'aggraver."
 ynn_debate.201.a:0 "Comment osent-ils interférer ?"

 ynn_debate.205.t:0 "Des guerriers [yrw_natives_origin.Culture.GetName] rejoignent les rangs"
 ynn_debate.205.d:0 "Notre position en faveur de l'intégration des Nés-des-Ruines soi-disant « Corrompus » a causé une montée du soutien pour nous parmi eux, ce qui a conduit certains à se porter volontaires pour rejoindre nos forces."
 ynn_debate.205.a:0 "Excellent !"

 ynn_debate.210.t:0 "Les traditions portent leurs fruits"
 ynn_debate.210.d:0 "Notre choix de rejeter l'introduction des armes à feu et de maintenir nos voies ancestrales a inspiré nos soldats à redoubler de zèle dans leur pratique, et inspiré nos généraux à concevoir de nouveaux stratagèmes pour contrer le feu de volée de nos ennemis."
 ynn_debate.210.a:0 "Très bien !"

 ynn_debate.215.t:0 "Un Iosahar offre d'acheter nos épées"
 ynn_debate.215.d:0 "Depuis que nous avons décidé de commencer lentement à intégrer les armes à feu dans nos armées, nous avons eu un surplus croissant d'épées inutilisées qui collectent maintenant la rouille. Apprenant cela, l'un de nos Iosahar a offert de nous les racheter. Bien qu'ils n'offrent pas autant d'argent qu'elles valent réellement, nous ne les utilisons de toute façon pas, et ce serait un ajout bienvenu à nos coffres. D'un autre côté, nous pourrions choisir de simplement fondre les épées pour leur métal à la place."
 ynn_debate.215.a:0 "Ils peuvent les avoir."
 ynn_debate.215.b:0 "Non, fondons-les pour le métal."

 ynn_debate.216.t:0 "Le suzerain accepte de nous vendre leurs épées"
 ynn_debate.216.d:0 "Notre offre d'acheter les épées inutilisées de notre suzerain a été acceptée ! Pour un prix extrêmement bas, nous avons maintenant assez d'épées pour armer chaque homme, femme et enfant de notre royaume si jamais nous le voulions ou en avions besoin !"
 ynn_debate.216.a:0 "Plaisir de faire affaire !"

 ynn_debate.217.t:0 "Le suzerain refuse de nous vendre leurs épées"
 ynn_debate.217.d:0 "Dans un acte de pur manque de respect, notre suzerain a refusé notre offre d'acheter leurs épées inutilisées, choisissant plutôt de toutes les faire fondre. Il semble que, dans leur empressement à avancer vers l'avenir, ils jettent leur passé dans la fournaise."
 ynn_debate.217.a:0 "Scandaleux !"

 ynn_debate.220.t:0 "Un Iosahar offre de nous aider à acheter des armes à feu"
 ynn_debate.220.d:0 "Bien que nous ayons choisi de transitionner vers l'utilisation de mousquets et d'armes à feu pour nos armées, c'est plus facile à dire qu'à faire. Nous n'avons pas d'artisans expérimentés dans leur fabrication, et les marchands cannoriens sont quelque peu hésitants à les échanger en gros. Maintenant, l'un de nos Iosahar offre de nous mettre en contact avec un marchand disposé à vendre une grande quantité de mousquets !"
 ynn_debate.220.a:0 "Nous accepterons volontiers leur offre !"
 ynn_debate.220.b:0 "Nous n'avons pas besoin de faire cela."

 ynn_debate.221.t:0 "Vente d'armes"
 ynn_debate.221.d:0 "Notre suzerain a accepté notre offre de l'aider à se procurer des armes à feu cannoriennes. Nous le mettrons en contact avec notre marchand… et récolterons la récompense pour cela."
 ynn_debate.221.a:0 "Très bien."

 ynn_debate.222.t:0 "Vente d'armes"
 ynn_debate.222.d:0 "Notre suzerain a rejeté notre offre de l'aider à se procurer des armes à feu cannoriennes. Que cela signifie qu'il a déjà un autre contact, qu'il n'a pas l'argent, ou qu'il n'est peut-être pas aussi pressé qu'il le laissait entendre, c'est une opportunité perdue pour nous de profiter de tout accord qui aurait été conclu."
 ynn_debate.222.a:0 "Malheureux."

 ynn_debate.225.t:0 "Un Iosahar cannorien prend la parole"
 ynn_debate.225.d:0 "Les conversations aux tables de festin de [Root.Capital.GetName] suivent souvent des schémas similaires : il y a toujours la discussion de la dernière chasse de notre [Root.Monarch.GetTitle], un petit débat sur lequel des signes du zodiaque prédispose le mieux quelqu'un à être chevalier, des arguments sur la question de savoir si un conflit historique aurait pu tourner autrement. Mais le festin de ce soir a présenté une exception : une interruption grossière par l'un de nos Iosahar cannoriens !\n\nRiant alors que nous discutions de la poussée de lance contre le mur de lances, ils ont affirmé qu'une poignée d'hommes armés de mousquets aurait suffi à vaincre n'importe quelle armée légendaire de l'Ynn. C'est scandaleux, et le remous que cela a causé a certainement provoqué une nouvelle escalade dans notre débat religieux en cours."
 ynn_debate.225.a:0 "Comment osent-ils ?!"

 ynn_debate.230.t:0 "Victoire pour la centralisation !"
 ynn_debate.230.d:0 "Une douzaine d'épées faiblement tenues ne sont rien comparées à la puissance d'une charge féroce et unie. Cette leçon a été prouvée sur les champs de bataille à travers l'Ynn pendant des siècles, et au tournoi d'aujourd'hui, [Root.Monarch.GetName] l'a prouvé une fois de plus.\n\nNos ennemis nous surpassaient peut-être en nombre, mais chaque Iosahar avait son propre plan de bataille, et ils ont été sabotés par la désunion et le manque de coordination. Pendant ce temps, le bataillon du [Root.Monarch.GetTitle] a combattu comme une extension de sa volonté, repoussant chaque ennemi devant eux et écrasant tous ceux qui se dressaient sur leur chemin.\n\nDéjà, la nouvelle du tournoi s'est répandue à travers [Root.GetName], et les histoires des prouesses du [Root.Monarch.GetTitle] sont chantées dans les tavernes à travers le pays. Et dans l'esprit de ceux qui plaidaient pour l'importance du pouvoir décentralisé dans le débat religieux en cours, eh bien, chaque nouveau récit est un coup porté à leur confiance."
 ynn_debate.230.a:0 "Douce victoire !"

 ynn_debate.231.t:0 "Défaite face à la décentralisation"
 ynn_debate.231.d:0 "Même le chêne le plus puissant peut tomber quand il est infesté par une légion de fourmis. L'ours le plus fier peut succomber à une meute de loups affamés. Et, comme le tournoi d'aujourd'hui à [Root.Capital.GetName] l'a montré, même un escadron de troupes mené par le [Root.Monarch.GetTitle] lui-même peut être surpassé quand il est attaqué par une douzaine d'ennemis à la fois.\n\nLes tactiques des Iosahar étaient assez simples, mais elles ont fonctionné : une attaque de toutes les directions, simultanément, assez pour nous submerger avec leur plus grand nombre. Mais ce n'est pas la défaite sur le terrain qui fait le plus mal : c'est la façon dont l'histoire du tournoi s'est déjà répandue à travers le pays, beaucoup dans [Root.GetName] la voyant comme une preuve solide de l'importance et de la valeur du système décentralisé des Iosahar."
 ynn_debate.231.a:0 "Apportez-moi assez de vin pour oublier cet après-midi !"

 ynn_debate.235.t:0 "Une perspective extérieure"
 ynn_debate.235.d:0 "Un État cannorien indépendant a entendu parler de notre processus en cours d'intégration des idées cannoriennes, et a gracieusement offert de nous aider. En signe de bonne foi, ils envoient des livres et des érudits pour nous aider à mieux comprendre leurs manières étrangères."
 ynn_debate.235.a:0 "Une noble entreprise !"

 ynn_debate.236.t:0 "Une perspective non bienvenue"
 ynn_debate.236.d:0 "Un État cannorien indépendant tente de répandre de la propagande sur ses croyances à travers notre population. Par ces méthodes sournoises, ils tentent sûrement de subvertir le débat en cours en leur faveur, affaiblissant notre unité et empoisonnant les esprits de notre peuple."
 ynn_debate.236.a:0 "Dégoûtant !"

 ynn_debate.240.t:0 "Dans la force il y a la faiblesse"
 ynn_debate.240.d:0 "Beaucoup des histoires sur les Cannoriens qui atteignent la cour de [Root.Capital.GetName] parlent de leurs forces : de leur puissance de feu dévastatrice, à leurs villes tentaculaires, aux eaux infinies sur lesquelles leurs vaisseaux flottent. Mais aujourd'hui, un messager de [From.GetName] a porté à notre attention un récit bien moins flatteur :\n\n[Root.YnnDebate240Bloc0]\n\nQue nous choisissions de rendre publique cette histoire ou de la cacher, un impact sur le débat a déjà été fait."
 YnnDebate240Bloc0_1:0 "Castanor, le prétendu plus grand empire de l'histoire de Cannor, a accédé à la prééminence non par l'adoration du massif fleuve Alen qui le traverse, mais plutôt avec la protection d'un dragon d'argent qu'ils voyaient comme l'avatar de leur dieu."
 YnnDebate240Bloc0_2:0 "Un nécromancien cannorien a cherché à créer une société où le travail était facilité, en forçant tous les paysans dans un état perpétuel de mort-vivance, peinant à construire et produire jusqu'à ce que leurs os mêmes s'effritent."
 YnnDebate240Bloc0_3:0 "Les eaux du monde sous les falaises ne sont pas seulement naviguées par des capitaines héroïques, mais aussi par des pirates, des contrebandiers, et toutes sortes de crapules qui pilleraient nos barges funéraires en un instant !"
 ynn_debate.240.a:0 "Tous devraient connaître leurs échecs !"
 ynn_debate.240.b:0 "Cela ne correspond pas vraiment aux croyances cannoriennes…"

 ynn_debate.245.t:0 "Des documents fabriqués par notre suzerain !"
 ynn_debate.245.d:0 "[Root.Capital.GetName] était en ébullition il y a quelques mois avec une découverte envoyée de [From.GetName] : des documents de l'époque de l'Empire Ynnique, qui semblaient directement soutenir leurs affirmations dans le débat religieux en cours. Mais si cela a causé un émoi, imaginez ce que la récente découverte de notre [Root.Monarch.GetTitle] va causer : les documents n'étaient pas réels du tout, mais des faux !\n\nLeur crime est devenu une épée dans notre main : comment l'utiliserons-nous ?"
 ynn_debate.245.a:0 "Révélons le faux à tous !"
 ynn_debate.245.b:0 "Envoyons un mot discret à [From.Capital.GetName], et nommons notre prix…"

 ynn_debate.246.t:0 "Faux révélé !"
 ynn_debate.246.d:0 "Le débat en cours nous a forcés à des actes audacieux pour nous assurer de l'emporter. La « découverte » de documents datant de l'Empire Ynnique était une victoire dans cette guerre, mais la nouvelle d'aujourd'hui est une défaite calamiteuse.\n\nLe [From.Monarch.GetTitle] de [From.GetName] a apparemment découvert que les documents étaient en fait des faux, et a rendu publique cette vérité pour que tous la sachent. Notre cause a pris un coup significatif dans les suites."
 ynn_debate.246.a:0 "Malédiction !"

 ynn_debate.247.t:0 "Le faux du suzerain révélé !"
 ynn_debate.247.d:0 "[Root.Capital.GetName] était en ébullition il y a quelques mois avec une découverte envoyée par notre suzerain : des documents de l'époque de l'Empire Ynnique, qui semblaient directement soutenir leurs affirmations dans le débat religieux en cours. Mais cette nouvelle n'est rien comparée au récent message de [From.GetName] : les documents étaient des faux !\n\nQue notre suzerain se tourne vers de telles tactiques déshonorantes est la preuve que sa position dans le débat en cours est fausse. Comment pouvons-nous faire confiance à un souverain qui mentirait si profanément sur la vérité même de l'histoire ?"
 ynn_debate.247.a:0 "Comment osent-ils ?!"

 ynn_debate.248.t:0 "Chantage d'un Iosahar !"
 ynn_debate.248.d:0 "Une note discrète passée par l'ambassadeur de [From.GetName] à notre [Root.Monarch.GetTitle] a suscité l'effroi dès qu'[Root.Monarch.GetSheHe] l'a ouverte : apparemment, notre Iosahar a découvert que les documents de l'époque de l'Empire Ynnique que nous avons récemment « découverts » étaient en fait des faux, et exige que nous achetions leur silence avec de l'or. Nous savions que cela pourrait arriver quand nous avons fait l'acte, et au moins ce n'est qu'un de nos vassaux qui l'a réalisé…"
 ynn_debate.248.a:0 "Quel autre choix avons-nous que d'accepter leurs termes ?"

 ynn_debate.249.t:0 "Une bagarre éclate au milieu du débat"
 ynn_debate.249.d:0 "Une discussion théologique entre nous et un autre Iosahar a dégénéré en une bagarre vicieuse. Notre suzerain, [From.GetName], a été prompt à intervenir et à se ranger de notre côté."
 ynn_debate.249.a:0 "Notre suzerain a au moins vu la vérité"

 ynn_debate.250.t:0 "Une bagarre éclate au milieu du débat"
 ynn_debate.250.d:0 "Une discussion théologique entre nous et un autre Iosahar a dégénéré en une bagarre vicieuse. Notre suzerain, [From.GetName], a mis fin aux combats et nous a rapidement condamnés comme la partie coupable."
 ynn_debate.250.a:0 "Comment notre suzerain peut-il croire de tels mensonges ?"

 ynn_debate.251.t:0 "Un don de notre suzerain"
 ynn_debate.251.d:0 "D'agréables nouvelles arrivent de [From.GetName]. Notre suzerain nous a envoyé un cadeau en or, accompagné d'une lettre où [From.Monarch.GetSheHe] nous a subtilement assuré que nous serons laissés à nos propres affaires, libres de diriger [Root.GetName] comme bon nous semble et, même en cas d'accusations crédibles, [From.GetRulerTitleAndNameOrRegencyCap] fermera les yeux. Cela ne manquera pas d'influencer notre position dans le débat actuel, ou du moins de s'assurer que nous serons assez reconnaissants pour ne pas agiter les eaux pendant un moment."
 ynn_debate.251.a:0 "Merci pour votre généreux don !"

 yrw_wrong_choice_tt:0 "§RCe choix mécontentera notre peuple, car il va à l'encontre des idéaux de notre nation§!"