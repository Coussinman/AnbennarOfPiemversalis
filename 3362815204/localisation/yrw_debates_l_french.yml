uche, laisse son impression dans les esprits des nés-des-ruines présents, qui commencent à discuter des possibilités entre eux. Une épée qui tire des rayons de lumière. Un bouclier qui renvoie les projectiles à leur expéditeur. Est-ce que cela fonctionnerait même ? S'ils avaient la foi, peut-être…\n\nC'est une question personnelle, et bien que nous ne soyons pas les plus forts de l'Ynn, [Root.Monarch.GetName] a le droit de se forger sa propre opinion sur la question. C'est clair, pense le [Root.Monarch.GetTitle], assurément…"
 ynn_debate.16.a:0 "Nous avons besoin de leur puissance de feu pour rivaliser."
 ynn_debate.16.b:0 "Voilés de magie, nos épées prévaudront."
 ynn_debate.17.t:0 "La pensée cannorienne est-elle pertinente pour l'Ynn ?"
 ynn_debate.17.d1:0 "De nombreux missionnaires cannoriens ont fait leur chemin jusqu'à l'Ynn, pensant y trouver un terrain fertile pour récolter des convertis. Pourtant, c'est nous qui avons ri quand la doctrine cannorienne sur l'adoration de dieux morts a réussi à se scinder en trois sectes différentes, chacune combattant l'autre si vicieusement que beaucoup de Cannoriens ont fui vers l'Ynn juste pour s'en éloigner.\n\nAlors que les seigneurs les plus chauvins rient et ricanent entre eux de l'évidente infériorité spirituelle de ces Gens du Monde Inférieur, d'autres peuvent être vus s'éclipser.\n« Un guérisseur cannorien a sauvé mon fils ! » dit une dame. « Un homme d'affaires cannorien a triplé mes revenus ! » dit un autre seigneur.\n\n« En effet, » commente un diplomate bien élevé, « bien que les Cannoriens puissent faire beaucoup pour améliorer leur style et leur grâce, peut-être avons-nous des choses à apprendre en regardant notre monde et notre société à travers leurs yeux. »\n\n« Ne laissez pas les dons des Gens du Monde Inférieur vous ensorceler, Farendil, » répond un riche marchand au diplomate. « S'il y a une chose que j'ai apprise sur les Cannoriens, c'est qu'ils ne veulent que prendre. Et pas seulement à la manière "tu m'aides, je t'aide". Vous ne croiriez pas la facilité avec laquelle les Cannoriens disparaissent et renient leurs accords dès qu'un nuage dans le ciel semble s'assombrir. Votre peau se glacerait aux histoires de dépravation cannorienne que les gardes d'Adbrabohvi vous raconteraient. Ces gens sont à peine au-dessus des barbares… leur culture ne devrait pas être imitée. »\n\nTout le monde se tourne vers [Root.Monarch.GetTitle] [Root.Monarch.GetName], attendant qu'[Root.Monarch.GetHerHim] prononce un verdict.\n\n« Je crois… »"
