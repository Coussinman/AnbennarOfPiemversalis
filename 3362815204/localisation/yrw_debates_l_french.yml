 remove_primitives_modifier_tt:0 "Le malus §YPrimitifs§! sera retiré de [Root.GetName]."
 change_religion_yrr_tt:0 "Le §YCulte Réformé du Fleuve Ynn§! devient la nouvelle religion d'État de [Root.GetName] et de tous ses §YIosahar§!."
 ynn_debate.2.t:0 "Le Jaillissement de la Foi"
 ynn_debate.2.d:0 "Alors que [Root.Monarch.GetTitle] [Root.Monarch.GetName] tient le dernier d'une longue série de conseils, un sentiment général de soulagement se fait sentir. On dit que les prédécesseurs de [Root.Monarch.GetName] tenaient leurs discours avec une coupe de vin dans une main et un poignard dans l'autre, toujours prêts à dispenser l'un ou l'autre. Aujourd'hui, un groupe bien plus nombreux que ce à quoi ces monarques d'antan étaient habitués est assemblé devant [Root.Monarch.GetName], pourtant [Root.Monarch.GetSheHe] ne ressent rien de cette tension. Au lieu de cela, son cœur est empli d'espoir et de possibilités pour l'avenir, et ainsi [Root.Monarch.GetSheHe] parle :\n\n« À travers des débats tumultueux et des protestations radicales, à travers des batailles sanglantes et des paix précaires, nous nous retrouvons au terme paisible d'un siècle éprouvant. Le monde connu s'est étendu plus loin que nos ancêtres n'auraient pu l'imaginer et nous voici à l'avant-garde d'une ère nouvelle. Notre foi a affronté les difficultés de ce monde changeant et nous sommes plus fermes dans notre résolution que jamais. Allons maintenant répandre notre foi au-delà des rives de l'Ynn, afin que tous connaissent ses dons et sa gloire. »"
 ynn_debate.2.a:0 "Là où règne la discorde, que j'apporte l'unité."
 ynn_debate.3.t:0 "Une Foi Renouvelée"
 ynn_debate.3.d:0 "Après un siècle de division, notre Suzerain a entrepris d'adapter le Culte du Fleuve Ynn pour mieux correspondre au monde changeant dans lequel nous vivons désormais. Ou du moins, pour mieux correspondre à son opinion sur celui-ci. Il promet maintenant une période plus calme où un Iosahar n'a pas à craindre d'être agressé pour des querelles religieuses lors de n'importe quel festin. Maintenant, nous devons nous demander dans quelle mesure nous suivons vraiment cette nouvelle foi qui est la leur. Devons-nous les rejoindre pour répandre la parole de cette nouvelle doctrine ou devons-nous attendre notre heure pour revendiquer une doctrine qui nous soit propre ?"
 ynn_debate.3.a:0 "Nous sommes un Iosahar, et notre serment sera tenu."
 ynn_debate.3.b:0 "Nous vivrons et mourrons par la liberté de choisir nos propres préceptes."

 ynn_debate.10.t:0 "Choisir un Sujet de Débat"
 ynn_debate.10.d1:0 "[Root.YnnDebate10Bloc0]\n[Root.YnnDebate10Bloc1]\n[Root.YnnDebate10Bloc2]\n[Root.YnnDebate10Bloc3]\n\nUn air subtil de tension flotte dans l'air : une guerre passée, une offense encore fraîche d'un seigneur envers un autre, une petite querelle ou deux entre amis, mais tout le monde fait de son mieux pour réprimer son animosité pour le bien du royaume.\n\nAlors que les festivités atteignent leur apogée, les nobles se taisent et cessent de se parler, se tournant vers [Root.Monarch.GetTitle] [Root.Monarch.GetName], attendant qu'[Root.Monarch.GetHerHim] prenne la parole."
 YnnDebate10Bloc0_1:0 "Après des mois d'anticipation et de préparation, les invités sont arrivés : toute la noblesse du royaume est venue à [Root.Capital.GetName], rassemblée pour une journée de réjouissances."
 YnnDebate10Bloc0_2:0 "Après des mois d'anticipation et de préparation, les invités sont arrivés : nobles chevaliers ynniques, riches marchands et belles dames emplissent les rues et les terrains de joute de [Root.Capital.GetName]. Parmi cette foule éblouissante, on pourrait presque manquer les visages peints de runes des magiciens Veykodan et les robes vives arborées par les braves Epednar, tandis qu'ils marchandent et rient avec les émissaires Rzentur et les écuyers Dolindhan, tous affluant aux réjouissances organisées par [Root.Monarch.GetTitle] [Root.Monarch.GetName].\n"
 YnnDebate10Bloc0_3:0 "Après des mois d'anticipation et de préparation, les invités sont arrivés : nobles chevaliers ynniques, riches marchands et belles dames emplissent les rues et les terrains de joute de [Root.Capital.GetName]. Ici, les langues de Sarda et de Dolindha s'entremêlent tandis que le peuple élu de l'Ynn discute des événements de l'époque, le peuple élu de l'Ynn affluant aux réjouissances organisées par [Root.Monarch.GetTitle] [Root.Monarch.GetName].\n"
 YnnDebate10Bloc1_1:0 "D'abord, un tournoi est tenu. Il se termine avec un jeune écuyer manquant de peu de battre un chevalier expérimenté faisant deux fois sa taille, mais alors que l'écuyer s'effondre au sol avec une blessure mortelle au milieu de la poitrine, il apparaît qu'il n'y aura pas une telle chance."
 YnnDebate10Bloc1_2:0 "Les festivités du jour commencent par un tournoi. La joute est aussi populaire que jamais, des chevaliers habiles démontrant leur maîtrise de la selle et de la lance. S'ensuit la mêlée générale, où diverses tactiques sont exposées : des murs de boucliers lourdement armurés s'affrontent avec des formations de piques popularisées par les colons cannoriens. Pour les classes inférieures, des mousquetaires démontrent leur habileté à l'arquebuse sur le champ de tir, le tonnerre des armes se joignant aux acclamations de la foule.\n"
 YnnDebate10Bloc1_3:0 "Les festivités du jour commencent par un tournoi. La joute est aussi populaire que jamais, des chevaliers habiles vêtus d'armures de plates enchantées démontrent leur maîtrise de la selle et de la lance, chaque coup porté résonnant de magie et du déchirement de muscles magiquement renforcés. Pour les classes inférieures, des archers démontrent leur habileté à l'arc sur le champ de tir, le claquement des cordes se joignant aux acclamations de la foule.\n"
 YnnDebate10Bloc2_1:0 "L'attraction principale de l'après-midi est la course de canoë le long de l'Ynn déchaîné. Certains seigneurs rient depuis leurs sièges surélevés dans les gradins tandis que quelques malheureux canotiers sont coulés et mis en pièces par des serpents sous-marins."
 YnnDebate10Bloc2_2:0 "L'attraction principale de l'après-midi est la course de canoë le long de l'Ynn déchaîné. Un coureur parvient à compléter deux tours à une vitesse stupéfiante, surpassant tous les autres participants. Pour le plus grand plaisir de [Root.Monarch.GetTitle] [Root.Monarch.GetName], le coureur représente l'équipe locale.\n"
 YnnDebate10Bloc2_3:0 "L'attraction principale de l'après-midi est la course de canoë le long de l'Ynn déchaîné. Les canotiers sont attaqués par un serpent de rivière solitaire, mais en se protégeant mutuellement dans une formation compacte et en le frappant sur le museau avec leurs pagaies, ils parviennent à le repousser sans perte.\n"
 YnnDebate10Bloc3_1:0 "À l'approche du soir, les invités notables sont conviés dans la grande salle du [Root.Monarch.GetTitle] pour un festin. Les seigneurs rient tandis que le vin coule et que l'histoire ynnique, ancienne et récente, est remémorée."
 YnnDebate10Bloc3_2:0 "À l'approche du soir, les invités notables sont conviés dans la grande salle du [Root.Monarch.GetTitle] pour un festin. Des dignitaires cannoriens sont également présents, venant des colonies pionnières voisines ou de plus loin, de la terre de Noruin ou même de Cannor lui-même : flattant les seigneurs locaux, ils établissent des comparaisons entre l'histoire de leur patrie d'outre-mer et celle de l'Ynn, trouvant de nombreux parallèles intéressants, mais prenant soin de toujours laisser l'Ynn émerger favorablement dans les comparaisons directes entre les deux."
 YnnDebate10Bloc3_3:0 "À l'approche du soir, les invités notables sont conviés dans la grande salle du [Root.Monarch.GetTitle] pour un festin. Quelques dignitaires cannoriens sont présents, venant des colonies pionnières voisines ou même du Monde Inférieur : flattant les seigneurs locaux, ils applaudissent la glorieuse histoire de l'Ynn et reconnaissent l'Empire Ynnique comme le premier et le plus grand Empire jamais créé par les elfes, dont la ressemblance sera difficilement égalée par ceux qui ne peuvent qu'errer dans les ténèbres du Monde Inférieur."

 ynn_debate.10.d2:0 "Tous les guerriers sont ici, rassemblés pour une journée de réjouissances.\nD'abord, un rapide tournoi est tenu. Il se termine quand un agile combattant à la lance manque de peu de prendre l'avantage sur un compagnon robuste et lourdement armé : la foule regarde le souffle coupé mais finalement c'est le sang du lancier qui éclabousse le gravier de l'arène, un coup net de la hache de bataille du compagnon.\nPuis, une compétition de lancer de javelot. Elle se termine avec une seule personne mutilée par des javelots égarés lors du nettoyage de la zone de lancer, ce qui est vu comme un signe de bonne chance par [Root.Monarch.GetTitle] [Root.Monarch.GetName].\nÀ l'approche du soir, nourriture et rafraîchissements sont apportés. Le plus fin gibier sauvage est rapidement dévoré par les guerriers qui ne manquent pas l'occasion de se vanter de leurs exploits dans les batailles les plus récentes.\n\nLe festin déborde d'impatience : quand sera la prochaine guerre ? Le prochain combat ? La bataille de la semaine prochaine sera-t-elle contre de féroces monstres ou juste plus de villageois en colère ? Quelle que soit l'avenir sanglant qui les attend, il semble que la soif de bataille de chacun soit étanchée pour ce jour.\n\nAlors que les festivités atteignent leur apogée, les guerriers se taisent et cessent de se parler, se tournant vers [Root.Monarch.GetTitle] [Root.Monarch.GetName], attendant qu'[Root.Monarch.GetHerHim] s'adresse aux Compagnons."
 ynn_debate.10.a:0 "Les Nés-des-Ruines Corrompus sont-ils des Élus ?"
 ynn_debate.10.b:0 "Qu'est-ce qui a causé l'effondrement de l'Empire Ynnique ?"
 ynn_debate.10.c:0 "Devons-nous adopter les armes cannoriennes ?"
 ynn_debate.10.e:0 "La pensée cannorienne est-elle pertinente pour l'Ynn ?"
 ynn_debate.10.f:0 "Peu importe"
 ynn_debate.11.t:0 "Les Nés-des-Ruines Corrompus sont-ils des Élus ?"
 ynn_debate.11.d1:0 "Alors que [Root.Monarch.GetTitle] [Root.Monarch.GetName] prononce sa fatidique question, une division aussi grande que l'Ynn émerge entre les seigneurs. « Oui, bien sûr, » dit une voix, « le Fleuve Ynn nous a tous créés égaux et libres de toute souillure. »\n\n« Absurde ! » rétorque immédiatement un autre seigneur en se levant. « Je ne laisserai pas ma dynastie être comparée à des bêtes et des bâtards ! Même le plus sale de mes paysans vaut plus que ces sauvages. »\n\nAlors que l'animosité monte, des cris fusent d'un bout à l'autre de l'assemblée, accompagnés de murmures partout, jusqu'à ce que tout le monde se taise soudainement.\nLe temps pour l'hôte de parler est arrivé ; [Root.Monarch.GetTitle] [Root.Monarch.GetName] a posé la question, et alors que tous se tournent vers [Root.Monarch.GetHerHim], [Root.Monarch.GetSheHe] doit choisir une position.\n\n« Je crois… »"
 ynn_debate.11.d2:0 "Alors que [Root.Monarch.GetTitle] [Root.Monarch.GetName] prononce sa fatidique question, une division aussi grande que l'Ynn émerge entre les Compagnons. « Oui, bien sûr, » dit une voix, « le Fleuve Ynn nous a tous créés égaux afin que nous puissions déterminer qui est supérieur sur le champ de bataille. »\n\n« Absurde ! » rétorque immédiatement un ancien compagnon en se levant. « Je ne laisserai pas ma dynastie de guerriers être comparée à des bâtards ! Même le plus faible des petits seigneurs ynniques est d'une tête au-dessus de ces éphémères cavaliers Epednar ou de ces Veykodan ivres de magie. »\n\nAlors que l'animosité monte, non seulement contre les cultures étrangères mais d'un guerrier à l'autre, les gardes stabilisent leurs armes au cas où ils devraient intervenir, mais alors qu'ils le font, la foule se tait soudainement.\nLe temps pour l'hôte de parler est arrivé ; [Root.Monarch.GetTitle] [Root.Monarch.GetName] a posé la question, et alors que tous se tournent vers [Root.Monarch.GetHerHim], [Root.Monarch.GetSheHe] doit choisir une position.\n\n« Je crois… »"
 ynn_debate.11.a:0 "Nous sommes tous élus par les eaux guides du Fleuve."
 ynn_debate.11.b:0 "Les affluents ne sont pas l'Ynn ; les Corrompus ne sont pas les Élus."
 ynn_debate.12.t:0 "Les Nés-des-Ruines Corrompus sont-ils des Élus ?"
 ynn_debate.12.d:0 "Les événements récents à la cour de notre suzerain ont dépassé la simple querelle de cour pour devenir un débat qui pourrait ébranler les fondations mêmes de notre culte. Tout a commencé après un festin il y a quelques nuits…\n\nAlors que notre suzerain prononce la fatidique question, une division aussi grande que l'Ynn émerge entre les seigneurs. « Oui, bien sûr, » dit une voix, « le Fleuve Ynn nous a tous créés égaux et libres de toute souillure. »\n\n« Absurde ! » rétorque immédiatement un autre seigneur en se levant. « Je ne laisserai pas ma dynastie être comparée à des bêtes et des bâtards ! Même le plus sale de mes paysans vaut plus que ces sauvages. »\n\nC'est une question personnelle, et bien que nous ne soyons pas les plus forts de l'Ynn, [Root.Monarch.GetName] a le droit de se forger sa propre opinion sur la question. C'est clair, pense le [Root.Monarch.GetTitle], assurément…"
 ynn_debate.12.a:0 "Nous sommes tous élus par les eaux guides du Fleuve."
 ynn_debate.12.b:0 "Les affluents ne sont pas l'Ynn ; les Corrompus ne sont pas les Élus."
 ynn_debate.13.t:0 "Qu'est-ce qui a causé l'effondrement de l'Empire Ynnique ?"
 ynn_debate.13.d1:0 "La question posée par [Root.Monarch.GetTitle] [Root.Monarch.GetName] touche profondément le cœur de beaucoup. Personne parmi les présents n'est choqué ou offensé, mais la question résonnante semble laisser tout le monde perdu dans ses pensées, contemplant, essayant de trouver les mots pour expliquer la plus grande tragédie de l'histoire de l'Ynn…\n\n« L'Empire Ynnique est tombé… » dit une dame, « parce que la société était trop corrompue. » Mais comment ? Un petit seigneur élabore : « Elle est devenue corrompue à cause d'empereurs comme Calrodiy II, qui exécutait des gens sur un coup de tête. »\n\nÀ cela, un autre seigneur est prompt à répondre : « Des empereurs comme Calrodiy le Grand ont sauvé l'Empire. Ils ont sauvé l'Ynn ! Et ils ont fait cela malgré des parents traîtres et des fonctionnaires ingrats qui convoitaient leur pouvoir ! » dit-il, concluant passionnément sa déclaration en frappant sa coupe de vin sur la table de bois.\n\nUn autre seigneur réplique avec une plaisanterie inappropriée sur l'Empereur Fineas le Pendu, ce qui fait s'enflammer un autre seigneur. Quelqu'un d'autre argumente, puis un autre, et un autre. Une chose est claire : la discussion, de tentative d'examiner les causes de l'événement catastrophique qu'était l'effondrement de l'Empire Ynnique, a dégénéré en une question d'attribution de blâme.\n\nDivers arguments sont avancés, certains éclairés, certains manifestement ignorants, certains de mauvaise foi mais pas assez ouvertement pour qu'on les dénonce. Mais, alors que la ligne entre une discussion et un glorifié tir à la corde commence à s'estomper, les seigneurs cessent leurs querelles et se tournent vers le bout de la table, silencieusement.\nLe temps pour l'hôte de parler est arrivé ; [Root.Monarch.GetTitle] [Root.Monarch.GetName] a posé la question, et alors que tous se tournent vers [Root.Monarch.GetHerHim], [Root.Monarch.GetSheHe] doit choisir une position.\n\n« Je crois… »"
 ynn_debate.13.d2:0 "La question posée par [Root.Monarch.GetTitle] [Root.Monarch.GetName] touche profondément le cœur de beaucoup. Personne parmi les présents n'est choqué ou offensé, mais la question résonnante semble laisser tout le monde perdu dans ses pensées, contemplant, essayant de trouver les mots pour expliquer la plus grande tragédie de l'histoire de l'Ynn…\n\n« L'Empire Ynnique est tombé… » dit une voix féminine, « parce que la société était trop corrompue. » Mais comment ? Un jeune compagnon élabore : « Elle est devenue corrompue à cause d'empereurs comme Calrodiy II, qui exécutait des gens sur un coup de tête. »\n\nÀ cela, un autre compagnon est prompt à répondre : « Des empereurs comme Calrodiy le Grand ont sauvé l'Empire. Ils ont sauvé l'Ynn. Et qu'ont-ils reçu ? Des coups de poignard dans le dos, et encore plus de corruption ! » dit-il, concluant passionnément sa déclaration en plantant une vraie lame dans la table de bois.\n\nUn autre compagnon réplique avec une plaisanterie : « Comme j'aurais aimé être avec l'Empereur Fineas le Pendu ce jour-là… Pour le tuer, ou le défendre. » Cela provoque une réaction outrée de nombreux Compagnons, qui sombrent dans d'autres disputes. Une chose est claire : la discussion, de tentative d'examiner les causes de l'événement catastrophique qu'était l'effondrement de l'Empire Ynnique, cherche maintenant simplement un méchant à attaquer.\n\nDivers arguments sont avancés, certains pacifiques, certains agressifs, certains délivrés de la manière la plus lâchement passive-agressive, mais il n'y avait pas le temps de les dénoncer dans la mêlée. Alors que la discussion dégénère de plus en plus en quelque chose dont tout le monde aurait honte le lendemain, les Compagnons cessent leurs querelles et se tournent vers le bout de la table, silencieusement.\nLe temps pour l'hôte de parler est arrivé ; [Root.Monarch.GetTitle] [Root.Monarch.GetName] a posé la question, et alors que tous se tournent vers [Root.Monarch.GetHerHim], [Root.Monarch.GetSheHe] doit choisir une position.\n\n« Je crois… »"
 ynn_debate.13.a:0 "La responsabilité incombe aux sujets. Tous doivent se rallier à l'Ynn, à l'Empire."
 ynn_debate.13.b:0 "La responsabilité incombe aux empereurs. Même les grands ne peuvent régner seuls."
 ynn_debate.14.t:0 "Qu'est-ce qui a causé l'effondrement de l'Empire Ynnique ?"
 ynn_debate.14.d:0 "Les événements récents à la cour de notre suzerain ont dépassé la simple querelle de cour pour devenir un débat qui pourrait ébranler les fondations mêmes de notre culte. Tout a commencé après un festin il y a quelques nuits…\n\nLa question posée par notre suzerain touche profondément le cœur de beaucoup. Personne parmi les présents n'est choqué ou offensé, mais la question résonnante semble laisser tout le monde perdu dans ses pensées, contemplant, essayant de trouver les mots pour expliquer la plus grande tragédie de l'histoire de l'Ynn…\n\n« L'Empire Ynnique est tombé… » dit une dame, « parce que la société était trop corrompue. » Mais comment ? Un petit seigneur élabore : « Elle est devenue corrompue à cause d'empereurs comme Calrodiy II, qui exécutait des gens sur un coup de tête. »\n\nÀ cela, un autre seigneur est prompt à répondre : « Des empereurs comme Calrodiy le Grand ont sauvé l'Empire. Ils ont sauvé l'Ynn ! Et ils ont fait cela malgré des parents traîtres et des fonctionnaires ingrats qui convoitaient leur pouvoir ! » dit-il, concluant passionnément sa déclaration en frappant sa coupe de vin sur la table de bois.\n\nUn autre seigneur réplique avec une plaisanterie inappropriée sur l'Empereur Fineas le Pendu, ce qui fait s'enflammer un autre seigneur. Quelqu'un d'autre argumente, puis un autre, et un autre. Une chose est claire : la discussion, de tentative d'examiner les causes de l'événement catastrophique qu'était l'effondrement de l'Empire Ynnique, a dégénéré en une question d'attribution de blâme.\n\nC'est une question personnelle, et bien que nous ne soyons pas les plus forts de l'Ynn, [Root.Monarch.GetName] a le droit de se forger sa propre opinion sur la question. C'est clair, pense le [Root.Monarch.GetTitle], assurément…"
 ynn_debate.14.a:0 "La responsabilité incombe aux sujets. Tous doivent œuvrer vers un but commun."
 ynn_debate.14.b:0 "La responsabilité incombe aux empereurs. Même les grands ne peuvent régner seuls."
 ynn_debate.15.t:0 "Devons-nous adopter les armes cannoriennes ?"
 ynn_debate.15.d1:0 "Les armes à feu. Les bâtons tonnants des Cannoriens. Un sujet délicat, assurément. Malheureux sont les seigneurs qui apprennent que leur meilleur chevalier est tombé d'une balle perdue avant même que la mêlée ne commence, un type de malheur qui semble devenir de plus en plus commun d'année en année.\n\nBien que l'efficacité des armes à poudre soit une vérité amère à avaler, surtout en ce qui concerne leur capacité à être produites facilement, maîtrisées encore plus facilement et rapidement utilisées pour annuler même les plus belles armures, seuls les seigneurs les plus isolés et ceux vivant au fin fond de l'arrière-pays restent bienheureusement inconscients de la menace que cela pose.\n\nCar la menace n'est pas simplement une question de puissance militaire, mais aussi de stabilité sociétale. Avec un mousquet, n'importe quel paysan avec une semaine d'entraînement peut tuer un vaillant chevalier de l'Ynn, leurs décennies d'entraînement rendues inutiles par la force mortelle de la poudre.\n\n« Peut-être… pouvons-nous faire un compromis, » propose timidement un seigneur. « Transformer nos armées en une partie mousquets, une partie porteurs de piques. »\n« Cela ne marchera jamais ! » rétorque un autre seigneur, arborant fièrement une armure étincelante. « Les chevaliers affrontent les épreuves en persévérant, pas en se retirant ou en négociant. Nous n'abandonnerons pas nos traditions. Nous n'avons pas besoin de le faire, » sa voix s'emplit d'espoir, « j'ai un contact, l'un des Elfes du Monde Inférieur… qui promet que si nous lui apportons de l'énergie magique et des ressources, il produira des armes et des boucliers magiques dépassant de loin même notre imagination la plus folle ! »\n\nLa promesse, bien qu'indubitablement louche, laisse son impression dans les esprits des nés-des-ruines présents, qui commencent à discuter des possibilités entre eux. Une épée qui tire des rayons de lumière. Un bouclier qui renvoie les projectiles à leur expéditeur. Est-ce que cela fonctionnerait même ? S'ils avaient la foi, peut-être…\n\nLe silence tombe, le festin devenu débat se taisant quand tous les participants se tournent vers l'hôte, [Root.Monarch.GetTitle] [Root.Monarch.GetName], attendant qu'[Root.Monarch.GetHerHim] parle.\n\n« Je crois… »"
 ynn_debate.15.d2:0 "Les armes à feu. Les bâtons tonnants des Cannoriens. Un challenger émergent, assurément. Déjà les récits de chevaliers ynniques armurés tombant d'une seule balle se sont répandus jusqu'à Malacnar, attirant pas mal d'attention.\n\nL'efficacité des armes à poudre est difficile à surestimer, surtout en ce qui concerne leur capacité à être produites facilement, maîtrisées encore plus facilement et rapidement utilisées pour annuler même les plus belles armures. Cela permet même à la plus faible des populaces d'avoir une chance contre les chevaliers ynniques armurés, et certains murmurent que nos compagnons pourraient subir le même sort.\n\n« Nous ne changerons pas nos traditions, [Root.Monarch.GetTitle] [Root.Monarch.GetName], » commence un ancien compagnon. « Que penseriez-vous d'une armée composée uniquement d'archers ? Cela a l'air ridicule, n'est-ce pas ? C'est la même impression que donnent ces "mousquetaires" cannoriens, et les battre est humiliant de facilité. Ce sera toujours ainsi, même si quelque petit seigneur se casse un ongle en essayant de les charger. »\n\n« Néanmoins… » dit un autre compagnon, « vous devez admettre qu'ils reviennent à un rythme stupéfiant. Pour chacun de nos guerriers abattu, dix autres Cannoriens arrivent avec un fusil. Nous ne devrions pas nous laisser distancer en nombre, et l'entraînement de quelques troupes armées d'armes à feu, évidemment inférieures à nos guerriers, pourrait offrir un soutien… »\n\n« Des nombres ? Des tireurs dans l'armée ? Et quoi ensuite ? Des combattants à la fourche ? Malacnar est un royaume de guerriers, pas de populace, et il le restera, » rétorque un autre compagnon, clairement mécontent de l'inélégance de la suggestion, et croise les bras. « Ce dont le royaume a besoin, ce sont de meilleures protections pour nos guerriers, pas plus d'entre eux. Avec des armures enchantées à l'épreuve des balles, nous les fixerons calmement tandis que nous marcherons vers eux, avant de les abattre sans pitié. »\n\nAprès quelques arguments supplémentaires, et insultes, échangés de part et d'autre, les compagnons cessent leur dispute et, sombrement silencieux, tournent leurs regards vers [Root.Monarch.GetTitle] [Root.Monarch.GetName], attendant qu'[Root.Monarch.GetHerHim] parle.\n\n« Je crois… »"
 ynn_debate.15.a:0 "Nous avons besoin de leur puissance de feu pour rivaliser."
 ynn_debate.15.b:0 "Voilés de magie, nos épées prévaudront."
 ynn_debate.16.t:0 "Devons-nous adopter les armes cannoriennes ?"
