 #Personality Modifier Descriptions - Note: don't refer directly to the sex or title of the monarch.
 desc_conqueror_personality:0 "Ce dirigeant est un conquérant. Nous serons en mesure d'incorporer de nouvelles terres à notre royaume plus efficacement sous ce régime."
 desc_tolerant_personality:0 "Ce dirigeant est tolérant. Les minorités religieuses prospéreront sous notre régime."
 desc_just_personality:0 "Ce dirigeant est juste. Grâce à une compréhension aiguë des nombreuses lois et coutumes de son royaume, nos sujets nous font confiance pour gouverner légitimement et équitablement."
 desc_righteous_personality:0 "Ce dirigeant est vertueux. Notre peuple sera moins enclin à remettre en question notre autorité car il sait qu'un dirigeant vertueux a toujours leur intérêt à cœur."
 desc_kind_hearted_personality:0 "Ce dirigeant a bon cœur. Un grand intérêt pour les hommes et femmes du commun a rendu notre dirigeant très aimé et notre pays plus résistant aux temps difficiles en général et aux ravages de la guerre en particulier."
 desc_free_thinker_personality:0 "Ce dirigeant est un libre penseur. Affranchi des doctrines strictes, notre dirigeant encourage chacun à essayer de nouvelles choses et à réfléchir librement sur l'avenir de notre grand pays."
 desc_well_connected_personality:0 "Ce dirigeant est bien connecté. Notre cour et notre cabinet bénéficient du vaste réseau de notre dirigeant parmi les grands esprits de cette époque."
 desc_calm_personality:0 "Ce dirigeant est calme. En ne perdant jamais son sang-froid ou sa contenance, notre dirigeant inspire par l'exemple et peut prendre des décisions bien réfléchies, nous permettant de nous remettre plus rapidement de toute crise que le monde pourrait nous envoyer."
 desc_careful_personality:0 "Ce dirigeant est prudent. En naviguant soigneusement autour des diverses règles tacites des relations interétatiques, notre monarque est capable d'atténuer l'impact de nos transgressions réelles."
 desc_secretive_personality:0 "Ce dirigeant est secret. Un instinct naturel pour garder les portes fermées et les lettres chiffrées se répercute et rendra l'ensemble de notre gouvernement plus difficile à infiltrer pour nos ennemis."
 desc_intricate_web_weaver_personality:0 "Ce dirigeant est un tisseur de toiles complexes. En tramant constamment de nouveaux complots, notre dirigeant est capable d'assumer personnellement une grande partie de la responsabilité du renseignement étranger."
 desc_fertile_personality:0 "Ce dirigeant est fertile. Grâce à la prédisposition naturelle de notre dirigeant à avoir de nombreux enfants, nous risquons peu de rester sans héritier longtemps."
 desc_well_advised_personality:0 "Ce dirigeant est bien conseillé. Toujours prêt à écouter les sages conseils des autres, notre dirigeant attire un plus grand nombre de personnes à notre cour et dans notre cabinet."
 desc_benevolent_personality:0 "Ce dirigeant est bienveillant. Être perçu comme voulant faire le bien est un grand atout quand il s'agit de maintenir nos sujets calmes."
 desc_zealot_personality:0 "Ce dirigeant est un zélote. Être fanatiquement dévoué à la vraie foi permet à notre dirigeant d'inspirer plus de gens à se convertir et à rejoindre la religion d'État."
 desc_pious_personality:0 "Ce dirigeant est pieux. Religieusement dévoué, spirituel et religieux, notre dirigeant veille à ce que notre État ne perde pas son cap et inspire confiance en notre foi."
 desc_lawgiver_personality:0 "Ce dirigeant est un législateur. La législation est ce qui construit et unit un royaume. Notre dirigeant est déterminé à réduire les centaines de lois et coutumes des diverses parties de notre royaume pour créer un ensemble de lois plus centralisé et plus juste."
 desc_midas_touched_personality:0 "Ce dirigeant est béni de Balris. Le talent de rendre chaque projet rentable est un grand atout pour le dirigeant d'un pays. Les coffres de notre État ne manqueront jamais d'argent tant que notre dirigeant restera."
 desc_incorruptible_personality:0 "Ce dirigeant est incorruptible. À bien des égards, bâtir un État moderne est une bataille constante contre la corruption. Les fonctionnaires sont toujours tentés d'accepter des pots-de-vin et vouloir prendre soin de ses amis et parents est un instinct humain naturel. En rejetant fermement toutes ces notions et en les combattant avec mépris, notre dirigeant donne l'exemple à tout le pays."
 desc_architectural_visionary_personality:0 "Ce dirigeant est un visionnaire architectural. Améliorer les infrastructures est une nécessité pour tout État de notre époque et ce dirigeant est celui qui peut le faire. De grandes visions couplées à une grande compréhension et un talent pour maintenir les coûts bas font de ce dirigeant un atout précieux pour nous."
 desc_scholar_personality:0 "Ce dirigeant est un érudit. L'ambition d'apprendre sur le monde et les principes gouvernant les hommes et la nature permet à notre dirigeant de comprendre et de mettre en œuvre les nouvelles technologies bien plus efficacement qu'il ne serait autrement possible."
 desc_entrepreneur_personality:0 "Ce dirigeant est un entrepreneur. En voyant le potentiel de nouveaux projets dans chaque obstacle ou opportunité, notre dirigeant contribue à un nombre toujours croissant de projets pour renforcer notre économie."
 desc_industrious_personality:0 "Ce dirigeant est industrieux. Jamais content de se reposer et à travers des journées de travail de plus en plus longues, notre dirigeant gère constamment les détails de chaque province du royaume pour maximiser la production et les revenus collectés de toutes les ressources sous contrôle de l'État."
 desc_expansionist_personality:0 "Ce dirigeant est un expansionniste. Notre dirigeant est personnellement investi dans la revendication et la colonisation de nouvelles terres et est déterminé à s'assurer que l'expansion coloniale reste une priorité absolue pour notre État."
 desc_charismatic_negotiator_personality:0 "Ce dirigeant est un négociateur charismatique. Grâce à une implication personnelle dans la diplomatie et les négociations d'État, notre dirigeant est capable de faire voir les choses à notre façon plus souvent qu'il ne serait autrement possible."
 desc_silver_tongue_personality:0 "Ce dirigeant est considéré comme ayant une langue d'argent. Dans notre communication avec les autres États, notre dirigeant est capable de présenter nos actions passées sous un jour beaucoup plus favorable. Une fois que nos voisins voient les raisons de nos actions, ils sont beaucoup plus susceptibles de nous pardonner à long terme nos transgressions."
 desc_tactical_genius_personality:0 "Ce dirigeant est un génie tactique. Un grand intérêt personnel et investissement dans les manœuvres et feintes sur le champ de bataille se traduira par un intérêt et une expérience bien plus grands dans ces domaines pour tous nos généraux."
 desc_bold_fighter_personality:0 "Ce dirigeant est un combattant audacieux. Croyant que le choc est d'une grande importance sur le champ de bataille, notre dirigeant n'a jamais peur des conséquences et encourage tout le monde à mener leurs troupes au cœur de l'ennemi si la situation l'exige."
 desc_fierce_negotiator_personality:0 "Ce dirigeant est un négociateur féroce. Nous aurons plus de facilité à convaincre les capitaines mercenaires de combattre pour notre cause pour moins de solde qu'ils n'en demanderaient autrement."
 desc_strict_personality:0 "Ce dirigeant est strict. En s'intéressant de près au comportement des troupes, notre dirigeant est capable d'inculquer un sens strict de la discipline à tous dans nos rangs, du plus humble au plus haut."
 desc_inspiring_leader_personality:0 "Notre dirigeant est un chef inspirant. Un grand leadership personnel peut amener même les hommes les plus couards à trouver leur courage."
 desc_martial_educator_personality:0 "Ce dirigeant est un éducateur martial. Sous le régime actuel, l'éducation et la formation de notre corps d'officiers est l'une de nos plus hautes priorités."
 desc_navigator_personality:0 "Ce dirigeant est un navigateur. Une implication personnelle dans tout, du programme de formation des officiers à l'acquisition de bonnes cartes et aux règles et lois de la navigation, garantit que nos navires ne se perdent pas aussi souvent que ceux de nos voisins."
 desc_babbling_buffoon_personality:0 "Ce dirigeant est considéré comme un bouffon bavard. Bien que notre dirigeant veuille bien faire en s'engageant personnellement dans la diplomatie avec nos voisins, cela n'est pas couplé à un talent pour mener des négociations. Quiconque aura plus de mal à voir les points que nous voulons faire valoir et beaucoup de nos négociations sont entravées par l'ineptie de notre dirigeant."
 desc_embezzler_personality:0 "Ce dirigeant est un détourneur de fonds. L'une des choses qui animent notre dirigeant est une grande volonté et un talent pour utiliser les revenus de l'État afin d'accroître sa richesse personnelle."
 desc_infertile_personality:0 "Ce dirigeant est stérile. Pour des raisons indépendantes de notre volonté, notre monarque semble avoir beaucoup plus de mal que la plupart à produire un héritier."
 desc_drunkard_personality:0 "Ce dirigeant est indulgent. Cherchant toujours à soulager une apathie générale, notre dirigeant se livre à de grandes quantités de stimulants comme l'alcool. Avoir un dirigeant indulgent rejaillit mal sur tout le pays."
 desc_sinner_personality:0 "Ce dirigeant est largement considéré comme un pécheur. Les manquements personnels dans la direction de notre pays ont retourné l'establishment religieux contre nous."
 desc_greedy_personality:0 "Ce dirigeant est cupide. La collecte des revenus de l'État devient de plus en plus impitoyable et à courte vue sous notre dirigeant qui ne reculera devant rien pour tenter d'augmenter nos revenus. Détruisant ou nuisant à chaque source de revenus, les effets à long terme de ce comportement à courte vue sont une grande diminution des revenus fiscaux."
 desc_cruel_personality:0 "Ce dirigeant est perçu comme cruel. Les récits répandus d'actions arbitraires et cruelles de notre dirigeant en personne ont grandement contrarié nombre de nos sujets. Cela peut ne pas suffire à déclencher une rébellion en soi, mais toute crise frappera l'opinion publique plus durement car personne ne manque de raisons de se révolter."
 desc_naive_personality:0 "Ce dirigeant est un enthousiaste naïf. En fonçant aveuglément et en sous-estimant constamment les conséquences, notre dirigeant s'assure que nos voisins seront plus lents à pardonner les affronts et transgressions."
 desc_craven_personality:0 "Ce dirigeant est couard. Désespérément craintif du combat physique, notre dirigeant reste aussi loin que possible des champs de bataille. Nos troupes ne peuvent s'empêcher de remarquer qu'elles sont livrées à elles-mêmes."
 desc_loose_lips_personality:0 "Souvent personnellement responsable de fuites et de violations d'informations, ce dirigeant est généralement trop confiant et facilement dupé. Malheureusement, la somme de tout cela est que notre dirigeant fait plus de mal que de bien à nos efforts de contre-espionnage."
 desc_obsessive_perfectionist_personality:0 "Ce dirigeant est un perfectionniste obsessionnel. Un vif intérêt pour les détails et les minuties n'est pas toujours couplé à un talent égal pour ces choses. En causant constamment des interruptions et des retards, notre dirigeant fait beaucoup plus de mal que de bien quand il s'agit de développer notre infrastructure interne."
 desc_malevolent_personality:0 "Ce dirigeant est perçu comme malveillant. Les actions de votre dirigeant sont souvent perçues comme motivées par la malveillance ou une intention hostile. En conséquence, tout pays sujet sous notre contrôle est prompt à s'irriter et à craindre chaque action que nous entreprenons."
 #Leaders (Generals and Admirals)
 glory_seeker_personality:0 "Chercheur de gloire"
 desc_glory_seeker_personality:0 "Ce général est un chercheur de gloire. Les troupes menées par ce général acquerront plus de prestige et de tradition militaire qu'elles ne le feraient autrement car elles sont toujours déployées là où elles feront la plus grande différence visible."
 born_to_the_saddle_personality:0 "Né en selle"
 desc_born_to_the_saddle_personality:0 "Ce général est né en selle. La cavalerie menée par ce chef sera en mesure de mieux utiliser son avantage de flanc."
 defensive_planner_personality:0 "Planificateur défensif"
 desc_defensive_planner_personality:0 "Ce général est un planificateur défensif. Toutes les troupes menées par ce chef seront plus résistantes aux chocs."
 battlefield_medic_personality:0 "Médecin de campagne"
 desc_battlefield_medic_personality:0 "Ce général est connu comme médecin de campagne. Un nombre plus grand que la normale de soldats sous ce chef pourra se rétablir après la bataille pour renforcer leur unité."
 ruthless_personality:0 "Impitoyable"
 desc_ruthless_personality:0 "Ce général est impitoyable. Les troupes sous le commandement de ce chef infligeront plus de dégâts de feu."
 inspirational_leader_general_personality:0 "Chef inspirant"
 desc_inspirational_leader_general_personality:0 "Ce général est un chef inspirant. Les troupes commandées par ce chef récupéreront plus rapidement leur moral face à la défaite."
 master_of_arms_personality:0 "Maître d'armes"
 desc_master_of_arms_personality:0 "Ce général est un maître d'armes. L'infanterie commandée par ce chef sera plus efficace et pourra infliger plus de dégâts."
 goal_oriented_personality:0 "Orienté vers l'objectif"
 desc_goal_oriented_personality:0 "Ce général est orienté vers l'objectif. Les troupes commandées par ce chef marcheront plus rapidement vers leur objectif."
 hardy_warrior_personality:0 "Guerrier endurci"
 desc_hardy_warrior_personality:0 "Ce général est connu comme guerrier endurci. Les troupes commandées par ce chef seront plus résistantes aux conditions difficiles et subiront moins d'attrition."
 siege_specialist_personality:0 "Spécialiste des sièges"
 desc_siege_specialist_personality:0 "Ce général est un spécialiste des sièges. Les sièges commandés par ce chef seront menés de manière plus efficace et devraient être conclus plus rapidement."
 cannoneer_personality:0 "Canonnier"
 desc_cannoneer_personality:0 "Ce général est un canonnier. Connu pour sa grande fascination pour la poudre et les canons, l'artillerie commandée par ce chef sera plus efficace."
 cuirassier_leader_personality:0 "Chef de cuirassiers"
 desc_cuirassier_leader_personality:0 "Ce général est un chef de cuirassiers. L'armée commandée par ce chef pourra soutenir plus de cavalerie que d'habitude."
 cruel_tactician_personality:0 "Tacticien cruel"
 desc_cruel_tactician_personality:0 "Ce général est un tacticien cruel. Les troupes commandées par ce chef seront plus efficaces pour briser le moral de l'ennemi."
 frontline_holder_personality:0 "Défenseur de la ligne de front"
 desc_frontline_holder_personality:0 "Ce général est un défenseur de la ligne de front. Les troupes commandées par ce chef seront plus résistantes à la perte de moral."
 strict_drillmaster_personality:0 "Instructeur strict"
 desc_strict_drillmaster_personality:0 "Ce général est un instructeur strict. Les troupes commandées par ce chef seront plus disciplinées et ne perdront pas leur entraînement aussi vite."
 extortioner_personality:0 "Extorqueur"
 desc_extortioner_personality:0 "Cet amiral est un extorqueur. Sachant comment mieux tirer parti d'un avantage de force, notre chef peut faire plus avec moins et les navires commandés par l'extorqueur exerceront une plus grande puissance commerciale que ceux menés par des capitaines concurrents."
 ruthless_blockader_personality:0 "Bloqueur impitoyable"
 desc_ruthless_blockader_personality:0 "Cet amiral est un bloqueur impitoyable. Les navires commandés par ce chef pourront maintenir un blocus beaucoup plus efficacement."
 buccaneer_personality:0 "Boucanier"
 desc_buccaneer_personality:0 "Cet amiral est un boucanier. Les corsaires commandés par ce chef seront plus efficaces."
 prize_hunter_personality:0 "Chasseur de prises"
 desc_prize_hunter_personality:0 "Cet amiral est un chasseur de prises. Les capitaines commandés par ce chef seront encouragés à saisir plus de prises et captureront plus de navires que d'autres."
 ironside_personality:0 "Cuirassé"
 desc_ironside_personality:0 "Cet amiral est un cuirassé. Les navires commandés par ce chef subiront moins de dommages que ceux commandés par d'autres capitaines."
 naval_engineer_personality:0 "Ingénieur naval"
 desc_naval_engineer_personality:0 "Cet amiral est un ingénieur naval. Les navires commandés par ce chef pourront récupérer plus rapidement des dommages subis en route ou lors d'engagements navals."
 naval_showman_personality:0 "Bateleur naval"
 desc_naval_showman_personality:0 "Cet amiral est un bateleur naval. Les navires commandés par ce chef recevront plus de prestige et de tradition navale des batailles."
 ram_raider_personality:0 "Attaquant à l'éperon"
 desc_ram_raider_personality:0 "Cet amiral est un attaquant à l'éperon. Les galères commandées par ce chef seront plus efficaces et infligeront plus de dégâts dans les batailles navales."
 naval_gunner_personality:0 "Canonnier naval"
 desc_naval_gunner_personality:0 "Cet amiral est connu comme canonnier naval. L'entraînement constant des équipes de canonniers commandées par ce chef signifie que les navires lourds infligeront plus de dégâts."
 accomplished_sailor_personality:0 "Marin accompli"
 desc_accomplished_sailor_personality:0 "Cet amiral est un marin accompli. Son expertise personnelle en navigation permet à ce chef d'améliorer les compétences de tous les capitaines sous ses ordres ; les navires commandés par le marin accompli atteindront leurs destinations plus rapidement."
 level_headed_personality:0 "Pondéré"
 desc_level_headed_personality:0 "Cet amiral est pondéré. Grâce à un entraînement soigneux et un esprit calme, les équipages commandés par ce chef seront plus résistants aux dommages de moral causés par les coups reçus pendant le combat naval."
 naval_strategist_personality:0 "Stratège naval"
 desc_naval_strategist_personality:0 "Cet amiral est un stratège naval. Les navires commandés par ce chef sont plus susceptibles de se retirer d'une mauvaise bataille au lieu de couler."
 inspirational_captain_personality:0 "Capitaine inspirant"
 desc_inspirational_captain_personality:0 "Cet amiral est un capitaine inspirant. Les marins commandés par ce chef récupéreront plus rapidement leur moral face à la défaite."
 naval_cannoneer_personality:0 "Canonnier naval"
 desc_naval_cannoneer_personality:0 "Cet amiral est un canonnier naval. Les navires de ce chef apporteront plus de canons au combat pour bombarder les ennemis."
 wooden_waller_personality:0 "Muraille de bois"
 desc_wooden_waller_personality:0 "Cet amiral est une muraille de bois. Les navires commandés par ce chef pourront résister à plus de dommages que ceux commandés par d'autres capitaines."
 cunning_navigator_personality:0 "Navigateur rusé"
 desc_cunning_navigator_personality:0 "Cet amiral est un navigateur rusé. Les navires commandés par ce chef atteindront leur destination plus rapidement que d'habitude."
 immortal_personality:0 "Immortel/Longévif"
 desc_immortal_personality:0 "Ce dirigeant a une durée de vie bien plus longue qu'un humain typique."
 immortal_personality_die_desc:0 "Même le plus long des récits trouve sa fin, semble-t-il."
 great_explorer_personality:0 "Grand explorateur"
 desc_great_explorer_personality:0 "Un explorateur légendaire, prêt à cartographier des mers inconnues et à apporter prestige et splendeur à notre nom !"
 great_explorer_personality_die_desc:0 "Hélas, quelle grande catastrophe ! Magellan, notre navigateur le plus estimé et légendaire a rejoint l'au-delà. Un jour gris et triste est sur nous..."