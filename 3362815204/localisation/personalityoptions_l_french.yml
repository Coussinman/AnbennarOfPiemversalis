l_french:
 #Personality Options to existing events:
 personality_options.710.a:1 "Abattez quiconque oserait s'opposer à notre [Root.GetLowLevelOfficialForCountry]."
 personality_options.711.a:0 "Nous devons apprendre à vivre et laisser vivre."
 personality_options.712.a:0 "Nous devons réformer la monnaie."
 personality_options.714.a:0 "Tenter de combiner les meilleurs aspects des deux écoles."
 personality_options.714.b:0 "Le [Root.Monarch.GetTitle] favorise l'offensive."
 personality_options.714.c:0 "Le [Root.Monarch.GetTitle] favorise la défense."
 personality_options.715.a:0 "Tenter d'en atténuer l'impact."
 personality_options.717.a:0 "Donner au [Root.Monarch.GetTitle] carte blanche pour réformer l'économie."
 personality_options.718.a:0 "Ces pauvres gens..."
 personality_options.719.a:0 "Nous devons être disposés à apprendre même de nos inférieurs."
 personality_options.720.a:0 "Tout le monde doit se concentrer sur la mer."
 personality_options.722.a:0 "Le groupe talentueux le plus proche du [Root.Monarch.GetTitle] sera le plus apte à gouverner."
 personality_options.724.a:0 "Nous devrons simplement le tolérer."
 personality_options.725.a:0 "Gardons notre calme et veillons à ce qu'aucun dommage ne soit causé."
 personality_options.726.a:0 "Impitoyable ? Moi ?"
 personality_options.726.b:0 "Tenter de les convaincre que ce n'est pas vrai."
 personality_options.729.a:0 "Notre [Root.Monarch.GetTitle] supervisera ce projet en personne."
 personality_options.729.b:0 "Notre [Root.Monarch.GetTitle] supervisera ce projet en personne."
 personality_options.730.a:0 "Nous ne pouvons permettre à quiconque de se mettre en travers du progrès."
 personality_options.734.a:0 "Les convaincre de la nécessité de nos politiques."
 personality_options.734.b:0 "Offrir quelque chose aux meneurs pour qu'ils abandonnent leurs revendications."
 personality_options.734.c:0 "Menacer d'exposer leurs secrets s'ils ne reculent pas."
 personality_options.735.a:0 "Une vie dans l'armée les endurcira à nouveau !"
 personality_options.736.a:0 "Je sais exactement qui devrait recevoir notre mécénat."
 personality_options.736.b:0 "Je sais exactement qui devrait recevoir notre mécénat."
 personality_options.737.b:0 "Ce sera une excellente opportunité pour lui."
 personality_options.738.a:0 "Nous devrons simplement veiller à ce qu'il soit toujours tenu à l'écart."
 personality_options.740.a:0 "Notre [Root.Monarch.GetTitle] connaît des moyens de fermer certaines des pires failles du système."
 personality_options.740.b:0 "Tant qu'ils ne nuisent pas directement à nos intérêts..."
 personality_options.741.a:0 "C'est également excellent pour répandre les nombreuses idées de notre [Root.Monarch.GetTitle]."
 personality_options.742.a:0 "Nous avons besoin d'hommes de qualité, pas seulement de plus d'hommes."
 personality_options.742.b:0 "Laissons notre [Root.Monarch.GetTitle] mener une campagne de recrutement."
 personality_options.806.a:0 "Nous devrons simplement être un peu plus prudents tout en déléguant une partie du pouvoir."
 personality_options.836.a:0 "Le [Root.Monarch.GetTitle] pourrait convaincre certains d'entre eux de rester."
 personality_options.837.a:0 "Tenter de créer davantage d'opportunités de carrière."
 personality_options.850.a:0 "Faites-le savoir à tous ceux qui voudront l'entendre."
 personality_options.851.a:0 "Absurde !"
 personality_options.851.a.tt:0 "Grâce à la popularité personnelle de notre monarque, nous pouvons simplement ignorer ces viles rumeurs."
 personality_options.852.a:0 "Nous devons faire mieux que cela !"
 personality_options.852.b:0 "Notre [Root.Monarch.GetTitle] doit être autorisé à renforcer le gouvernement !"
 personality_options.853.a:0 "Imaginez ce que notre [Root.Monarch.GetTitle] pourrait accomplir avec davantage de ressources..."
 personality_options.854.a:0 "Utilisez ceci pour attirer des artistes prometteurs à notre cour."
 personality_options.855.a:0 "Ils ont juste besoin d'être remis en forme."
 personality_options.857.a:0 "De l'argent, pas de la soie !"
 personality_options.859.a:0 "Rentrez dans le rang !"
 personality_options.860.a:0 "Voilà l'esprit !"
 personality_options.861.a:0 "Une excellente opportunité !"
 personality_options.862.a:0 "Nous avons besoin des deux !"
 personality_options.864.a:0 "Passons à l'offensive diplomatique générale maintenant !"
 personality_options.865.a:0 "Notre [Root.Monarch.GetTitle] est pratiquement un saint."
 personality_options.866.a:0 "Quelques-uns ? Vous en aurez autant que possible."
 personality_options.867.a:0 "C'est maintenant notre priorité absolue !"
 personality_options.872.a:1 "Le convaincre qu'une vie à [Root.Capital.GetCapitalName] serait dans son intérêt."
 personality_options.881.a:0 "Aidez-les à trouver un capitaine plus approprié pour cette entreprise."
 personality_options.883.a:0 "Nous devons nous engager pleinement dans la Renaissance."
 personality_options.884.a:0 "Réduire son influence par voie législative."
 personality_options.884.b:0 "Négocier avec le Noble."
 personality_options.884.c:0 "Intimider le Noble."
 personality_options.885.a:0 "Je reconnais une bonne opportunité quand j'en vois une."
 personality_options.5008.c:0 "Je suis certain de connaître d'autres personnes qui peuvent contribuer."
 personality_options.5008.dd:0 "Je sais exactement où placer ces fonds..."
 personality_options.5008.e:0 "Nous devons faire don de ceci aux pauvres."
 personality_options.5014.c:0 "Heureusement, nous sommes entourés de gens en qui nous pouvons avoir confiance."
 personality_options.5015.c:0 "Étendons ses responsabilités !"
 personality_options.5017.c:0 "Pas de panique !"
 personality_options.5017.e:0 "Quelqu'un est-il vraiment surpris ?"
 personality_options.5017.dd:0 "Tenter d'en atténuer l'impact."
 personality_options.5018.c:0 "Nous devons détourner des ressources de l'État pour contrecarrer cette sombre tendance."
 personality_options.5018.dd:0 "Nous pouvons tirer avantage de leur ignorance !"
 personality_options.5018.f:0 "Ainsi nous pouvons maintenir nos sujets dans l'obscurité..."
 personality_options.5019.c:0 "Investir l'argent dans de nouveaux projets prometteurs."
 personality_options.5019.dd:0 "Détournons autant que possible vers notre trésorerie centrale."
 personality_options.5022.c:0 "Tirons-en le meilleur parti, c'est un nouveau monde fantastique !"
 personality_options.5023.c:0 "L'État devrait les aider à négocier de meilleures conditions."
 personality_options.5023.dd:0 "Nous pouvons les soutenir en investissant dans de meilleurs navires."
 personality_options.5060.a:0 "Fascinant !"
 personality_options.5024.c:0 "Rien n'échappe vraiment à mon contrôle !"
 personality_options.5024.dd:0 "Nous sommes une superpuissance diplomatique !"
 personality_options.5025.c:0 "Nous devons cela au [Root.Monarch.GetTitle]."
 personality_options.5027.c:0 "Optons pour un programme d'améliorations plus ambitieux."
 personality_options.5027.dd:0 "[Root.Monarch.GetName] saura tirer parti de cette opportunité."
 personality_options.5040.a:0 "Éradiquer la corruption dans notre gouvernement."
 personality_options.5040.b:0 "Améliorer le programme de formation des officiers."
 personality_options.5040.c:0 "Le [Root.Monarch.GetTitle] souhaite organiser un festin somptueux..."
 personality_options.5040.d:0 "Permettre au [Root.Monarch.GetTitle] de superviser personnellement le détournement des fonds."
 personality_options.5040.e:0 "C'est le moment idéal pour l'un des petits projets de notre [Root.Monarch.GetTitle]."
 personality_options.5045.a:0 "La nature bienveillante de notre [Root.Monarch.GetTitle] et de mauvais conseillers sont à blâmer."
 personality_options.5045.b:0 "Réviser les politiques gouvernementales."
 personality_options.5050.a:0 "Laissons notre [Root.Monarch.GetTitle] tenter de les apaiser."
 personality_options.5050.b:0 "Laissons notre [Root.Monarch.GetTitle] assumer personnellement le blâme."
 personality_options.5051.a:0 "Écrasons ces fauteurs de troubles !"
 personality_options.5051.b:0 "Encouragez-les à se lancer dans d'autres activités."
 personality_options.5051.c:0 "Les plaintes indiquent un manque de dévouement à leur travail."
 personality_options.5051.d:0 "Introduire de nouvelles réformes pour protéger les paysans."
 personality_options.5053.a:0 "Laissons le [Root.Monarch.GetTitle] superviser une réforme commerciale."
 personality_options.5054.a:0 "Laissons le [Root.Monarch.GetTitle] tenter d'en atténuer l'impact."
 personality_options.5054.b:0 "Permettons à notre [Root.Monarch.GetTitle] de voir s'il existe une solution au bénéfice de tous."
 personality_options.5055.a:0 "Permettons à notre [Root.Monarch.GetTitle] de s'occuper de tout signe visible de corruption."
 personality_options.5055.b:0 "Laissons notre [Root.Monarch.GetTitle] remplacer certains hauts fonctionnaires."
 personality_options.5056.a:0 "Laissons notre [Root.Monarch.GetTitle] gérer cela personnellement."
 personality_options.5062.a:0 "Laissons notre [Root.Monarch.GetTitle] parler en notre nom."
 personality_options.5062.c:0 "Nous devons étendre les bénéfices à une zone plus large."
 personality_options.5073.a:0 "Augmenter la Production et les Impôts."
 personality_options.5073.b:0 "Augmenter la Production et les Effectifs."
 personality_options.5073.c:0 "Augmenter les Impôts et les Effectifs."
 personality_options.5058.a:0 "Écrasez-les !"
 personality_options.5058.b:0 "Laissons le [Root.Monarch.GetTitle] expliquer pourquoi ils n'ont jamais eu ces droits au départ."
 personality_options.5059.a:0 "Leur offrir un partenariat dans une entreprise d'État."
 personality_options.5061.a:0 "Nous devons trouver un moyen d'exploiter cela."
 personality_options.5064.a:0 "Laissons le [Root.Monarch.GetTitle] les intimider."
 personality_options.5065.a:0 "Le [Root.Monarch.GetTitle] peut les intimider pour qu'ils gardent le silence."
 personality_options.5065.b:0 "Notre [Root.Monarch.GetTitle] doit résoudre le conflit."
 personality_options.5066.a:0 "Nous les avons sous-facturés."
 personality_options.5068.a:0 "Nous devons mieux dissimuler nos traces."
 personality_options.5071.a:0 "Laissons le [Root.Monarch.GetTitle] négocier un meilleur accord."
 personality_options.5075.a:0 "Le [Root.Monarch.GetTitle] rédigera une nouvelle liste de droits."
 personality_options.5077.a:0 "Notre [Root.Monarch.GetTitle] s'en occupera."
 personality_options.5082.a:0 "Tenter d'ouvrir de nouvelles opportunités sans froisser les anciennes élites."
 personality_options.5083.a:0 "Renégocier le prix."
 personality_options.5085.a:0 "Cela doit être encore plus grandiose !"
 personality_options.5085.b:0 "Laissons [Root.Monarch.GetName] superviser le projet en personne."
 personality_options.5086.a:0 "[Root.Adm_Advisor.GetSheHeCap] a quelques idées intéressantes en fait !"
 personality_options.5088.a:0 "Profitons de cette occasion pour nous réconcilier avec nos voisins."
 personality_options.5092.a:0 "Profitons de cette occasion pour taxer davantage les marchands étrangers."
 personality_options.5097.a:0 "Tenter une médiation."
 personality_options.5098.a:0 "Tant que l'État obtient sa part du gâteau."
 personality_options.5098.b:0 "Le [Root.Monarch.GetTitle] sévira personnellement contre ces pécheurs."
 personality_options.6000.a:0 "Promouvoir la Marine."
 personality_options.6001.a:0 "Le [Root.Monarch.GetTitle] attend mieux de vous !"
 personality_options.6003.a:0 "Établir des institutions représentatives mineures."
 personality_options.6004.a:0 "Notre [Root.Monarch.GetTitle] saura comment optimiser notre argent."
 personality_options.6013.a:0 "Tous ceux qui comptent devront être présents."
 personality_options.6015.a:0 "Le [Root.Monarch.GetTitle] souhaite combiner cela avec un festin somptueux."
 personality_options.random.3.a:0 "Les agents personnels du [Root.Monarch.GetTitle] s'en occuperont."
 personality_options.random.8.a:0 "Le [Root.Monarch.GetTitle] s'en occupera."
 personality_options.random.14.a:0 "Fascinant !"
 personality_options.random.15.a:0 "C'est le courage qui gagne les batailles, pas les armes."
 excellent_diplomacy_modifier:0 "Excellente diplomatie"
 desc_excellent_diplomacy_modifier:0 "Nous récoltons les fruits d'une excellente réputation diplomatique."
 indulgent_feast:0 "Dirigeant invité à un festin somptueux"
 opinion_more_eased_tension:0 "Tensions fortement apaisées"
 #Personality Events:
 personality_events.1.t:0 "Les nombreux intérêts de [Root.Monarch.GetName]"
 personality_events.1.d:0 "Notre [Root.Monarch.GetTitle] s'intéresse de plus en plus aux hautes poursuites intellectuelles et peut passer des jours à converser avec les hommes instruits de notre cour. [Root.Monarch.GetSheHeCap] a commencé à inviter des érudits de près et de loin pour l'aider à mieux comprendre comment le monde et ses habitants fonctionnent.\nAu rythme où les choses évoluent, [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself] pourrait probablement devenir une autorité à part entière si [Root.Monarch.GetSheHe] pouvait consacrer suffisamment de temps et de ressources aux domaines de [Root.Monarch.GetHerHis] choix."
 personality_events.1.a:0 "Nous devons nous efforcer de comprendre le monde physique qui nous entoure."
 personality_events.1.a.tt:0 "Notre dirigeant sera libre de consacrer du temps et les ressources de notre État à la poursuite de [Root.Monarch.GetHerHis] grands intérêts dans la vie.\nSeul le temps dira si [Root.Monarch.GetSheHe] se fera un nom dans une discipline savante."
 personality_events.1.b:0 "Un dirigeant doit comprendre les lois de Dieu et des hommes."
 personality_events.1.c:0 "Ne gaspillons pas [Root.Monarch.GetHerHis] temps et argent avec de telles questions."
 personality_events.2.t:0 "Progrès en cartographie"
 personality_events.2.d:0 "Étudiant dévoué du monde qui l'entoure, [Root.Monarch.GetName] est devenu obsédé par les cartes. [Root.Monarch.GetHerHisCap] palais à [Root.Owner.Capital.GetCapitalName] possède des pièces entièrement consacrées à [Root.Monarch.GetHerHis] collection de cartes et notre cher [Root.Monarch.GetTitle] passe beaucoup de temps à les contempler et à les cataloguer.\nBien que cela l'ait rendu un peu étrange aux yeux de [Root.Monarch.GetHerHis] courtisans (et du trésorier royal), notre pays bénéficie des grandes archives [Root.Monarch.GetSheHe] qu'il a constituées sur le monde qui nous entoure."
 personality_events.2.a:0 "Le monde est un si vaste endroit."
 personality_events.3.t:0 "Progrès en armurerie"
 personality_events.3.d:0 "[Root.Monarch.GetName] s'est passionné pour la fonction et la forme des armes à feu. Des efforts considérables ont été déployés pour dénicher des armes inhabituelles ou innovantes et [Root.Monarch.GetName] démonte et remonte avec joie toute arme qu'on lui apporte.\nCertains considéreraient cette fascination comme morbide (sans parler de coûteuse) mais grâce à ce projet de longue haleine, notre [Root.Monarch.GetTitle] a créé ce [Root.Monarch.GetSheHe] qu'il considère comme l'arme à feu parfaite."
 personality_events.3.a:0 "Que le monde tremble !"
 gun_designer_ruler:0 "Concepteur d'armes"
 desc_gun_designer_ruler:0 "Nos troupes sont équipées d'un type inhabituel d'arme à feu conçue par notre dirigeant."
 personality_events.4.t:0 "La quête de l'or"
 personality_events.4.d:0 "[Root.Monarch.GetName] est absorbé par la possibilité de créer de l'or depuis [Root.Monarch.GetHerHis] petite enfance et avec les coffres du gouvernement à sa disposition, cela est devenu une obsession. Chaque livre et supposé expert a été rassemblé à [Root.Capital.GetCapitalName] pour être examiné ou interrogé. [Root.Monarch.GetName] [Root.Monarch.GetHerselfHimself] a passé de nombreux jours dans [Root.Monarch.GetHerHis] laboratoire mais n'est jusqu'ici pas parvenu à créer ce métal précieux.\nCertains qualifieraient cette quête de folie, mais elle a certainement amélioré notre connaissance de la chimie."
 personality_events.4.a:0 "Excellent, essayons de tempérer cela maintenant."
 personality_events.4.b:0 "Doit... Créer de l'or..."
 personality_events.4.b.tt:0 "Donner à notre monarque carte blanche pour poursuivre [Root.Monarch.GetHerHis] objectifs en alchimie. Les chances de succès sont très incertaines."
 personality_events.5.t:0 "La poursuite d'un passe-temps"
 personality_events.5.d:0 "Bien que [Root.Monarch.GetName] se soit intéressé à toutes sortes de poursuites intellectuelles tout au long de [Root.Monarch.GetHerHis] règne, il semble que [Root.Monarch.GetHerHis] ambition de se faire un nom parmi les érudits du monde n'ait pas été très fructueuse. [Root.Monarch.GetHerHisCap] mécénat des grands esprits n'est pas sans mérite pour [Root.GetName] dans son ensemble, même si [Root.Monarch.GetHerHis] ambition déçue reste un point sensible pour le [Root.Monarch.GetTitle]."
 personality_events.5.a:0 "« Dicebat nos esse quasi nanos, gigantium humeris insidentes. »"
 personality_events.5.b:0 "Je m'entourerai des grands esprits de notre époque !"
 personality_events.6.t:0 "Codification des lois"
 personality_events.6.d:0 "Après d'intenses études et débats, [Root.Monarch.GetName] [Root.Monarch.GetTitle] de [Root.GetName] a décrété qu'un certain nombre de lois et traditions juridiques locales de tout [Root.GetName] seront remplacées par un nouveau recueil de lois de [Root.Monarch.GetHerHis] création.\nCette compilation de droit combine la jurisprudence de tout notre royaume ainsi que d'autres pays de notre religion et l'on croit qu'elle servira d'exemple aux juges pour les générations à venir."
 personality_events.6.a:0 "Tout le monde a droit à un procès équitable."
 personality_events.6.b:0 "Je pourrais m'y habituer..."
 personality_events.7.t:0 "Le grand débat de [Root.Owner.Capital.GetCapitalName]"
 personality_events.7.d:0 "Afin de comprendre pleinement quelles règles gouvernent une terre et ses habitants, [Root.Monarch.GetName] s'est plongé dans les grandes œuvres de théologie et de philosophie. Un grand nombre d'érudits ont également été amenés à [Root.Capital.GetCapitalName] pour donner leur point de vue sur l'ordre des choses dans le monde.\nCette quête de sagesse a maintenant culminé en un grand débat organisé par notre [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself] à [Root.Owner.Capital.GetCapitalName]."
 personality_events.7.a:0 "Quelle grande journée pour l'érudition !"
 personality_events.7.b:0 "Nous devons chercher plus loin des réponses."
 personality_events.8.t:0 "Ce qui est juste en guerre et en paix"
 personality_events.8.d:0 "Dans [Root.Monarch.GetHerHis] quête de justice, [Root.Monarch.GetName] s'est intéressé aux relations entre grands États. La conduite des États en temps de guerre, en mer ou autrement loin de chez eux est régie par peu de lois mais de nombreuses traditions. Déterminé à façonner le débat international sur ces questions, [Root.Monarch.GetName] a puisé dans tous les matériaux [Root.Monarch.GetSheHe] qu'il a pu trouver pour écrire un livre sur les lois de la guerre, de la paix et de la conduite internationale. Il n'est toujours pas clair si cela fera la différence que notre [Root.Monarch.GetTitle] espère, mais cela a clairement fait une différence pour la réputation de notre pays parmi les autres États."
 personality_events.8.a:0 "Un casus belli valide ?"
 personality_events.9.t:0 "Une potion de mana ?"
 personality_events.9.d:0 "Le secret de la création d'or à partir d'une matière inférieure a continué d'échapper à [Root.Monarch.GetName] mais dans [Root.Monarch.GetHerHis] expériences [Root.Monarch.GetSheHe] a réussi à créer quelque chose [Root.Monarch.GetSheHe] qu'il appelle une « potion de mana ». Notre [Root.Monarch.GetName] insiste sur le fait que boire cette potion lui apportera vie et vitalité, sans parler du pouvoir d'accomplir de grandes choses pour notre royaume."
 personality_events.9.a:0 "Boire la potion de mana"
 personality_events.10.t:0 "Querelle provinciale"
 personality_events.10.d:0 "Ce qui a commencé comme un différend mineur entre un notable local et certains de ses tenanciers a d'une manière ou d'une autre pris une importance nationale. Avec des prêtres, des érudits, des nobles et des démagogues de rue partageant tous leurs opinions aussi bruyamment que possible, les parties en conflit se sont finalement tournées vers [Root.Monarch.GetName] pour résoudre leur différend.\nAprès les avoir entendus plaider leur cause, notre [Root.Monarch.GetTitle] est convaincu que les tenanciers, aussi déplorable que soit leur situation, sont les fautifs. Un verdict juste et bien argumenté est peu susceptible de contrarier quiconque, mais il est assez tentant d'utiliser l'opinion publique pour accroître notre propre autorité sur la province aux dépens de ce notable."
 personality_events.10.a:0 "Tenter de régler l'affaire équitablement."
 personality_events.10.b:0 "Nous devons exploiter cette situation !"
 personality_events.10.b.tt:0 "Chaque province possédée dans cette §Yrégion§! obtiendra une réduction d'autonomie de §G-0,05§! pendant 30 ans et chaque province n'étant pas à son minimum une réduction immédiate de §G15§! d'autonomie locale."
 increasing_local_authority:0 "Autorité locale croissante"
 desc_increasing_local_authority:0 "Nous étendons rapidement notre autorité sur cette région après avoir écrasé les détenteurs de pouvoir locaux, volant leurs clients."
 just_settlement_modifier:0 "Conflit réglé"
 desc_just_settlement_modifier:0 "Nous avons réglé équitablement un conflit local dans l'un des états de notre pays, impressionnant grands et petits dans notre pays."
 personality_events.11.t:0 "Un [Root.Monarch.GetTitle] vertueux"
 personality_events.11.d:0 "Il est peu de monarques qui peuvent se vanter d'une base de soutien aussi fervente que [Root.Monarch.GetName]. [Root.Monarch.GetHerHisCap] représentants ne sont cependant pas toujours aussi chanceux ; dans certains cas, nos sujets refusent simplement d'accepter qu'un gouverneur, percepteur ou autre fonctionnaire agisse au nom de [Root.Monarch.GetName]. Une pétition nous est parvenue concernant un tel gouverneur. Selon la croyance populaire, il a abusé de notre bonne volonté tout en faisant souffrir le peuple."
 personality_events.11.a:0 "Réprimander le gouverneur."
 personality_events.11.a.tt:0 "Cette §Yrégion§! obtiendra une réduction d'agitation de §G-2§! et une réduction d'impôts de §R25 %§! pendant 30 ans."
 personality_events.11.b:0 "Tenter de défendre le gouverneur."
 personality_events.11.b.tt:0 "Cette §Yrégion§! obtiendra une augmentation d'agitation de §R1§! et une augmentation d'impôts de §G25 %§! pendant 30 ans."
 personality_events.11.c:0 "Laisser les locaux s'en occuper."
 chastised_governor:0 "Gouverneur local réprimandé"
 desc_chastised_governor:0 "Suite à une pétition de nos sujets dans cette région, nous avons réprimandé le gouverneur local, détruisant son autorité à collecter les impôts efficacement mais assurant notre propre popularité en tant que dirigeant de cette région."
 defended_governor:0 "Gouverneur local renforcé"
 desc_defended_governor:0 "Le gouverneur local ici est assez impopulaire mais nous avons usé de toute notre autorité royale pour le soutenir. Permettant un plus grand flux d'argent vers nos coffres."
 personality_events.12.t:0 "Les vertus d'un [Root.Monarch.GetTitle]"
 personality_events.12.d:0 "Le règne de [Root.Monarch.GetName] est marqué par une coopération remarquable : des bureaucrates aux simples marchands et même l'aristocratie républicaine, tous semblent sentir que notre [Root.Monarch.GetTitle] a leur bien à cœur. Il y a cependant un groupe qui estime que [Root.Monarch.GetName] les a déçus. [Root.Monarch.GetHerHisCap] propre famille et partisans estiment que nous n'avons pas assez tiré parti de notre fonction. Leurs biens et leur influence sont substantiels même s'ils n'ont pas beaucoup augmenté pendant [Root.Monarch.GetHerHis] mandat et beaucoup insistent sur le fait qu'ils pourraient faire de grandes choses pour la république."
 personality_events.12.a:0 "Nous devons combattre toutes les formes de népotisme !"
 personality_events.12.b:0 "Je suis certain que notre propre chair et sang peut être digne de confiance."
 personality_events.12.c:0 "Continuer à éviter les parents de [Root.Monarch.GetName]."
 true_republican_virtues_modifier:0 "Vraies vertus républicaines"
 desc_true_republican_virtues_modifier:0 "En repoussant toutes les demandes de renforcement de nos propres partisans, nous avons renforcé nos institutions républicaines contre la sombre influence de la corruption."
 personality_events.13.t:0 "La nature confiante de [Root.Monarch.GetName]"
 personality_events.13.d:0 "Notre [Root.Monarch.GetTitle] est célèbre pour sa tolérance envers les communautés non-[Root.Religion.GetName] de notre royaume. Certains diraient même que [Root.Monarch.GetSheHe] est trop confiant et laisse ces non-croyants troubler [Root.Monarch.GetHerHis] jugement. [Root.Monarch.GetHerHisCap] proche confident $TREASURER$$NATURAL_SCIENTIST$$PHILOSOPHER$$ARTIST$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$ a particulièrement attiré beaucoup de jalousie et de malveillance. Des rumeurs ont commencé à circuler selon lesquelles notre cher conseiller et $TREASURER_POSS_PRONOUN$$PHILOSOPHER_POSS_PRONOUN$$ARTIST_POSS_PRONOUN$$THEOLOGIAN_POSS_PRONOUN$$MASTER_OF_MINT_POSS_PRONOUN$$INQUISITOR_POSS_PRONOUN$$NATURAL_SCIENTIST_POSS_PRONOUN$ famille auraient infiltré le gouvernement pour comploter contre les fidèles."
 personality_events.13.a:0 "Absurdités !"
 tolerance_backlash:0 "Réaction conservatrice"
 desc_tolerance_backlash:0 "Notre politique d'emploi de sujets non affiliés à la religion d'État à des postes élevés a irrité les fidèles de notre pays. Ils prétendent que nous laissons entrer des individus indignes de confiance parmi nous et que bientôt ils nous trahiront pour leurs frères dans la foi."
 personality_events.13.b:0 "Comment ai-je pu être si aveugle !?"
 intolerant_tolerance:0 "Dirigeant hypocrite"
 desc_intolerant_tolerance:0 "Notre dirigeant professe être tolérant envers toutes les religions étrangères, mais les actes parlent plus fort que les mots et nos sujets ont une longue mémoire."
 personality_events.13.b.tt:0 "En allant à l'encontre du caractère de [Root.Monarch.GetName], ses bonus de tolérance seront annulés par le modificateur suivant :"
 personality_events.14.t:0 "Ravages de la guerre"
 personality_events.14.d:0 "La guerre est une chose terrible et même de nombreuses années après la conclusion de la paix, de nouveaux sujets aspireront à la relative tranquillité d'avant l'arrivée des troupes ennemies. Dans les régions particulièrement touchées par les ravages de la guerre, il peut ne plus rester grand-chose des anciennes institutions gouvernementales ou même des familles élargies. Dans de telles zones, les démagogues peuvent rapidement attiser le séparatisme et la discorde, entravant leur intégration dans l'État plus large."
 personality_events.14.a:0 "Nous devons aider ces pauvres gens à reconstruire leur vie !"
 personality_events.14.a.tt:0 "Chaque province possédée dans cette §Yrégion§! obtiendra une réduction d'agitation de §G-5§! ainsi qu'une réduction de revenu fiscal de §R-15 %§! pendant 15 ans."
 kind_hearted_healing_ravages_of_war:0 "Guérir les ravages de la guerre"
 desc_kind_hearted_healing_ravages_of_war:0 "Par des allègements fiscaux et une politique active de reconstruction, nous avons tenté de restaurer l'ordre et la paix dans cette zone ravagée par la guerre."
 personality_events.14.b:0 "Utilisons plutôt la dévastation à notre avantage !"
 personality_events.14.b.tt:0 "Chaque province possédée dans cette §Yrégion§! obtiendra une réduction d'autonomie locale de §G-2§! pendant 15 ans ainsi qu'une réduction immédiate d'autonomie allant jusqu'à §G25§!."
 personality_events.14.c:0 "Les autorités locales s'en occupent."
 not_so_kind_hearted:0 "Campagne de répression rapide"
 desc_not_so_kind_hearted:0 "Plutôt que de laisser la société locale se rétablir, nous réprimons violemment toutes les formes de séparatisme dans cette région."
 personality_events.15.t:0 "Hérésiarque ?"
 personality_events.15.d:0 "Un homme étrange a été aperçu dans la campagne à divers endroits de notre royaume. Il enseigne une version des plus hétérodoxes de la création du monde à quiconque veut bien écouter ses divagations joviales. Selon certains, il représente une réinterprétation dangereuse et vile des écritures saintes, mais peu de nos sujets semblent avoir été séduits par cette hérésie. Beaucoup semblent plutôt apprécier ce prophète autoproclamé et ses idées.\nIntrigué par la réputation de [Root.Monarch.GetName] comme [Root.Monarch.GetWomanMan] libre penseur, le prophète exige maintenant une audience avec [Root.Monarch.GetName], offrant d'agir comme conseiller en matières spirituelles."
 personality_events.15.a:0 "Le monde comme un fromage avec des vers ? Perspective fascinante !"
 personality_events.15.a.tt:0 "En tant que libre penseur, votre dirigeant pourrait avoir beaucoup à gagner en conversant avec cet homme, ou ses idées pourraient en fait être de peu de valeur. L'opinion publique sera sévère."
 personality_events.15.b:0 "Nous ne pouvons le laisser tourner notre foi en dérision !"
 personality_events.15.b.tt:0 "Condamner sévèrement cet homme avec une répulsion marquée impressionnera certainement l'establishment religieux, mais notre dirigeant pourrait perdre sa soif de nouvelles idées et de pensées fraîches si [Root.Monarch.GetSheHe] commence à les réprimer."
 personality_events.15.c:0 "Congédiez simplement cet homme."
 inspiring_spiritual_guide:0 "Cour novatrice"
 desc_inspiring_spiritual_guide:0 "Notre dirigeant remplit notre cour de personnages novateurs, bien qu'un peu excentriques, pour faire progresser la fortune de notre pays."
 personality_events.16.t:0 "Le cabinet dynamique de [Root.Monarch.GetName]"
 personality_events.16.d:0 "[Root.Monarch.GetName] s'est donné pour mission de connaître tous les hommes et femmes de qualité de notre époque. Cela lui a permis de rassembler un cabinet des esprits les plus brillants de [Root.GetName]. Réalisant quel excellent moyen c'est pour faire carrière, un ami proche de [Root.Monarch.GetName] nous a approchés demandant que nous fassions de la place pour l'un de ses protégés dans notre cercle intime. Quelle réponse pouvons-nous offrir à ce jeune talent ?"
 personality_events.16.a:0 "Vous avez un cerveau remarquable, et j'aimerais le mettre à profit."
 personality_events.16.b:0 "Je suis certain que nous pouvons vous trouver une place quelque part dans notre administration..."
 personality_events.17.t:0 "Montrer l'exemple"
 personality_events.17.d:0 "[Root.Monarch.GetName] n'est pas [Root.Monarch.GetWomanMan] à perdre facilement [Root.Monarch.GetHerHis] sang-froid. En temps de troubles, de conflits ou de crises, [Root.Monarch.GetSheHe] est toujours resté ferme et fort, évitant la panique et inspirant les autres à garder leur calme. Avec le temps, cela a filtré jusqu'aux plus bas niveaux de notre administration et notre pays est bien plus stable grâce à cela."
 personality_events.17.a:0 "Pas de panique"
 personality_events.18.t:0 "Manœuvres prudentes"
 personality_events.18.d:0 "En tant que dirigeant d'un État moderne ambitieux, il est difficile de se lier d'amitié avec tout le monde. Cependant, prêter une attention particulière à ce qui se passe dans la communauté internationale permet parfois d'atténuer l'impact des affronts passés. Dans [Root.Monarch.GetHerHis] correspondance personnelle avec les dirigeants des États voisins, [Root.Monarch.GetName] espère améliorer notre position dans le monde petit à petit."
 personality_events.18.a:0 "Nous sommes vraiment juste incompris."
 careful_diplomatic_manouvering:0 "Manœuvres diplomatiques prudentes"
 personality_events.19.t:0 "Le grand chiffre de [Root.Monarch.GetName]"
 personality_events.19.d:0 "Depuis l'enfance, la cryptographie est un passe-temps pour [Root.Monarch.GetName] et à mesure que [Root.Monarch.GetSheHe] a mûri, [Root.Monarch.GetHerHis] méthodes pour s'assurer que [Root.Monarch.GetHerHis] secrets restent cachés se sont également perfectionnées. Après la découverte d'une série de lettres ouvertes, il est devenu clair que plus de personnes qu'il ne conviendrait lisent notre correspondance avec les gouverneurs provinciaux. Notre [Root.Monarch.GetTitle] est convaincu que [Root.Monarch.GetSheHe] pourrait considérablement augmenter la sécurité."
 personality_events.19.a:0 "Faisons-en notre priorité absolue !"
 personality_events.19.b:0 "Ne gaspillons pas d'énergie là-dessus. La méthode finira par se répandre."
 secretive_new_cipher:0 "Nouveau chiffrement"
 desc_secretive_new_cipher:0 "Notre dirigeant a introduit un nouveau chiffrement de sa propre conception à utiliser pour certaines fonctions administratives limitées dans notre pays. Comme les ordres de l'État atteindront désormais moins d'yeux pendant leur acheminement vers le destinataire, nous avons pu réduire la corruption et le mauvais usage des informations classifiées. Cependant, à mesure que de plus en plus de personnes découvrent notre nouvelle méthode de cryptage, l'avantage de ce nouveau chiffrement est susceptible de diminuer."
 personality_events.20.t:0 "Des amis dans les bas-fonds"
 personality_events.20.d:0 "On dit qu'un artiste, interprète ou voleur sur deux dans les capitales de nos rivaux est en réalité un informateur de [Root.Monarch.GetName]. Avec un intérêt personnel aigu pour les allées et venues de quiconque ayant une quelconque influence, notre [Root.Monarch.GetTitle] voit souvent les opportunités bien avant notre chef de l'espionnage. Dernièrement, les contacts de [Root.Monarch.GetName] ont indiqué qu'il existe des ouvertures que nous pourrions exploiter dans des pays d'intérêt. Cela nous obligerait toutefois à ouvrir un peu les coffres de l'État."
 personality_events.20.a:0 "L'argent n'est qu'un nombre."
 personality_events.20.b:0 "Laissons l'espionnage aux professionnels."
 personality_events.21.t:0 "Naissance de jumeaux"
 personality_events.21.d:0 "Louons les cieux ! [Root.Monarch.GetName] a donné naissance à deux enfants en bonne santé. Dans la commotion, il est un peu difficile de savoir qui sera le nouvel héritier royal..."
 personality_events.21.a:0 "Celui qui semble être le plus fort des deux."
 personality_events.21.b:0 "Celui au regard intelligent, bien sûr."
 personality_events.22.t:0 "Naissance de jumeaux"
 personality_events.22.d:0 "Louons les cieux ! [Root.Monarch.GetName] est père d'une paire de jumeaux en bonne santé. Dans la commotion générale, il est un peu difficile de savoir qui sera le nouvel héritier royal..."
 personality_events.22.a:0 "Celui qui semble être le plus fort des deux."
 personality_events.22.b:0 "Celui au regard intelligent, bien sûr."
 personality_events.23.t:0 "Apprendre des erreurs des autres"
 personality_events.23.d:0 "[Root.Monarch.GetName] a toujours considéré comme une vertu d'écouter les conseils de ceux qui l'ont précédé et de s'entourer de conseillers expérimentés. Cela l'inquiète cependant que [Root.Heir.GetName] ne réalise peut-être pas pleinement ce qu'implique de gouverner [Root.GetName]. À un moment donné, c'est une responsabilité que [Root.Heir.GetName] devra assumer, et à ce moment-là, il serait probablement préférable que [Root.Heir.GetSheHe] ait été plus complètement initié aux défis de la gouvernance."
 personality_events.23.a:0 "Nous devons lui enseigner l'administration."
 personality_events.23.b:0 "Nous devons lui enseigner les affaires étrangères."
 personality_events.23.c:0 "Nous devons lui enseigner la guerre."
 personality_events.23.dd:0 "[Root.Heir.GetSheHeCap] doit suivre [Root.Heir.GetHerHis] propre voie."
 personality_events.24.t:0 "Il n'est jamais trop tard pour apprendre ?"
 personality_events.24.d:0 "Réaliser ses propres déficiences et déléguer à des personnes compétentes qui complètent ses propres capacités est l'un des aspects les plus importants d'une bonne gouvernance. [Root.Monarch.GetName] croit fermement en l'écoute des bons conseils et en l'amélioration de [Root.Monarch.GetHerselfHimself] en écoutant ceux qui sont plus expérimentés. Avec le temps, cependant, il peut être possible d'apprendre ce qui vient naturellement aux autres. Si nous permettons à [Root.Monarch.GetName] de se consacrer pleinement, un tuteur serait probablement capable d'améliorer sa maîtrise de certaines des parties les plus avancées de la gestion de l'État [Root.GetName]."
 personality_events.24.a:0 "Laissons [Root.Monarch.GetName] étudier l'administration [Root.GetAdjective]"
 personality_events.24.b:0 "Laissons [Root.Monarch.GetName] étudier les affaires étrangères."
 personality_events.24.c:0 "Laissons [Root.Monarch.GetName] étudier la guerre."
 personality_events.24.dd:0 "[Root.Monarch.GetHerHisCap] temps est mieux employé ailleurs."
 personality_events.25.t:0 "Guerre injuste"
 personality_events.25.d:0 "Alors que les négociations approchent dans notre guerre actuelle, [Root.Monarch.GetName] a été occupé à rencontrer les envoyés de nos amis et rivaux mutuels. En tant que défenseurs contre une guerre d'agression injuste, nous avons la sympathie de la communauté internationale. Rien n'est encore réglé, mais nous pouvons être sûrs d'avoir beaucoup de poids dans les futures négociations."
 personality_events.25.a:0 "Il est temps de conclure un accord."
 silver_tongued_leverage:0 "Poids dans les négociations"
 desc_silver_tongued_leverage:0 "La capacité de notre dirigeant à convaincre les gens qu'ils veulent vraiment ce que nous voulons nous a donné plus de poids dans les négociations."
 personality_events.25.b:0 "Ce dont nous avons besoin, c'est d'aide pour reconstruire."
 personality_events.26.t:0 "Expansion de la foi [Root.Religion.GetName]"
 personality_events.26.d:0 "[Root.Monarch.GetName] a fait de sa vie une mission de répandre la foi [Root.Religion.GetName] et s'est rapidement fait un nom parmi les communautés religieuses de tout notre pays. [Root.Monarch.GetHerHisCap] liens étroits avec $ESTATE_CHURCH$ de [Root.GetName] ont fait des clercs de toutes sortes une vue commune à [Root.Capital.GetCapitalName] et une voix influente dans les couloirs du pouvoir.\nAvec le temps, la renommée de notre [Root.Monarch.GetTitle] a commencé à se répandre même au-delà de nos frontières et nos espions nous disent qu'il existe des minorités religieuses parmi les sujets de nos rivaux qui soutiendraient une expansion militaire dans leurs régions."
 personality_events.26.a:0 "Nous devons défendre nos frères religieux !"
 zealot_reputation_opinion:0 "Guerrier religieux"
 personality_events.26.b:0 "Évitons les effusions de sang inutiles."
 personality_events.27.t:0 "Soutien des pieux"
 personality_events.27.d:0 "Beaucoup contribuent avec le peu qu'ils ont pour renforcer l'État et son pieux dirigeant dans [Root.Monarch.GetHerHis] lutte contre les infidèles. Nos clercs locaux rapportent également une montée de volontaires prêts à prendre les armes pour combattre les ennemis de la foi."
 personality_events.27.a:0 "Nos prières ont été exaucées."
 personality_events.28.t:0 "L'attrait de [Root.Capital.GetCapitalName]"
 personality_events.28.d:0 "Au mieux, une relation vassal-protecteur est une affaire mutuellement bénéfique où les deux parties peuvent réaliser des gains supérieurs à ce qui serait autrement possible. Sous la main ferme de [Root.Monarch.GetName], beaucoup des pays bénéficiant de notre protection ont prospéré. L'un des nombreux avantages que cela nous apporte est que les jeunes princes et autres notables des pays vassaux considèrent [Root.GetName] comme un bon endroit pour forger une carrière."
 personality_events.28.a:0 "Laissez-les concourir pour l'honneur de servir dans notre administration."
 personality_events.28.b:0 "Les plus talentueux recevront le droit de servir dans nos armées."
 demanded_support:0 "Soutien exigé"
 personality_events.29.t:0 "Réforme juridique"
 personality_events.29.d:0 "Comme beaucoup d'États de taille similaire, l'unité apparente de [Root.GetName] est en partie un mirage. Localement, chaque cité, domaine ou même village peut avoir ses propres règles et lois depuis des temps immémoriaux. Désireux de réduire les incohérences législatives dans notre pays, le [Root.Monarch.GetTitle] a retiré des privilèges et émis de nouvelles directives nationales pour mettre de l'ordre dans le chaos. Cela n'est cependant pas toujours immédiatement couronné de succès. Une récente directive gouvernementale étant tout simplement ignorée dans une partie de notre pays, l'autorité de [Root.Monarch.GetName] est remise en question."
 personality_events.29.a:0 "Analyser leurs objections et harmoniser en profondeur notre législation."
 local_legal_reform:0 "Réforme juridique locale"
 desc_local_legal_reform:0 "Nous harmonisons diverses excentricités législatives locales dans cette région afin de la faire mieux se conformer aux lois et décrets nationaux."
 personality_events.29.b:0 "Le temps est venu d'employer la force !"
 personality_events.29.b.tt:0 "Chaque province possédée dans cette §Yrégion§! verra immédiatement son autonomie réduite de §G-15§!."
 personality_events.29.c:0 "Il vaut mieux pour tous que nous fermions les yeux."
 personality_events.30.t:0 "Trouver de l'argent là où on ne l'attend pas"
 personality_events.30.d:0 "[Root.Monarch.GetName] est bien connu pour [Root.Monarch.GetHerHis] capacité inégalée à trouver de nouvelles sources de revenus étatiques dans les endroits les plus improbables. [Root.Monarch.GetHerHisCap] récent audit des chiffres locaux a révélé une toute nouvelle source de revenus dans l'une de nos provinces, augmentant lentement mais sûrement le flux d'argent vers les coffres de l'État."
 personality_events.30.a:0 "De l'argent !"
 personality_events.31.t:0 "S'en tenir au code"
 personality_events.31.d:0 "L'application stricte et les vues de [Root.Monarch.GetName] concernant la conduite éthique et la corruption ont contribué à faire de notre État un endroit plus honnête. Cela ne lui rapporte pas non plus beaucoup d'amis parmi nos administrateurs et clercs. Bien que nous ayons dissuadé beaucoup de prendre des pots-de-vin, beaucoup travaillent activement à ralentir les rouages de la machinerie gouvernementale par tous les moyens à leur disposition."
 personality_events.31.a:0 "Avec le temps, nous les aurons tous éliminés."
 personality_events.31.b:0 "Nous pouvons nous permettre d'assouplir un peu nos hauts principes."
 corrupted_incorruptible_ruler:0 "Ignorer la corruption"
 desc_corrupted_incorruptible_ruler:0 "Afin d'éviter d'aliéner nos administrateurs, nous fermons les yeux sur certaines des corruptions les plus tolérables dans la machinerie gouvernementale. Les nombreuses façons dont un homme peut s'enrichir sont après tout considérées comme un avantage d'un emploi gouvernemental."
 personality_events.32.t:0 "École de [Root.Capital.GetCapitalName]"
 personality_events.32.d:0 "La silhouette de notre capitale n'a jamais été aussi pleine de grues et de tours et monuments à moitié construits de notre vivant. Le règne de [Root.Monarch.GetName] a été caractérisé par un nombre toujours croissant de projets de construction ici et dans d'autres parties de notre royaume.\nLe nombre croissant de personnes employées à planifier et ériger de grands bâtiments au goût de notre [Root.Monarch.GetTitle] a conduit au développement d'un nouveau style architectural distinct. À l'international, la demande pour les grands architectes et bâtisseurs de l'école de [Root.Capital.GetCapitalName] augmente et certaines villes étrangères peuvent maintenant rivaliser avec nous dans notre propre style."
 personality_events.32.a:0 "[Root.Capital.GetCapitalName] doit rester la plus grandiose des cités !"
 personality_events.32.b:0 "Encourageons nos maîtres à répandre ce style plus loin à l'étranger."
 opinion_school_of_capital:0 "Parangon culturel"
 monumental_architecture:0 "Architecture monumentale"
 desc_monumental_architecture:0 "La capitale de cette province est célèbre pour son architecture ambitieuse."
 personality_events.33.t:0 "L'attrait de l'argent facile"
 personality_events.33.d:0 "Un certain nombre d'investisseurs économiques ont approché [Root.Monarch.GetName] demandant le droit de développer l'une des zones sous notre contrôle. Ils paieraient une somme forfaitaire pour le droit d'extraire des revenus de nos terres et ce serait alors à eux de collecter l'argent à notre place. Les investisseurs s'empressent de souligner qu'il est dans leur intérêt d'investir dans l'infrastructure locale pour augmenter les chances qu'ils gagnent plus que la somme qu'ils ont payée pour le droit sur notre zone."
 personality_events.33.a:0 "Je reconnais une bonne affaire quand j'en vois une !"
 personality_events.33.b:0 "Mieux vaut jouer la prudence."
 economic_development_entrepreneur:0 "Entreprises en croissance"
 desc_economic_development_entrepreneur:0 "L'économie de cette zone a été relancée en la confiant à des fermiers fiscaux responsables qui veulent tirer le maximum de leur investissement. Utilisant leur propre argent, ils ont investi dans de nouvelles technologies et infrastructures économiques, faisant prospérer toute la zone."
 economic_downturn_modifier:0 "Politiques économiques imprudentes"
 desc_economic_downturn_modifier:0 "En permettant à des fermiers fiscaux peu intéressés par la croissance à long terme de disposer de cette zone, nous avons contribué à la destruction rapide de l'infrastructure économique locale. La reprise viendra mais cela prendra du temps."
 personality_events.34.t:0 "L'économie d'un [Root.Monarch.GetTitle]"
 personality_events.34.d:0 "[Root.Monarch.GetName] est bien connu pour [Root.Monarch.GetHerHis] énergie incessante et ses habitudes de travail. Il y a peu d'heures dans la nuit où les lumières de [Root.Monarch.GetHerHis] appartements ne brûlent pas et les décrets royaux sont connus pour quitter [Root.Capital.GetCapitalName] tôt le matin comme tard le soir. [Root.Monarch.GetSheHeCap] semble également garder une surveillance constante sur tous les secteurs d'activité de notre pays ; les étrangers ont parfois été stupéfaits d'apprendre que [Root.Monarch.GetSheHe] créera personnellement des réglementations même pour des entreprises entièrement nouvelles dans les provinces.\nAlors que notre cher [Root.Monarch.GetTitle] saisit de nouvelles opportunités de croissance dans notre pays, la seule question est vraiment de savoir si nous avons les ressources pour faire tout ce que [Root.Monarch.GetSheHe] souhaite en même temps."
 personality_events.34.a:0 "L'argent n'est pas un problème."
 personality_events.34.b:0 "[Root.Monarch.GetSheHeCap] aura ce dont [Root.Monarch.GetSheHe] a besoin et plus encore."
 personality_events.34.c:0 "Une autre fois peut-être."
 industrious_boost:0 "Développement manufacturier"
 desc_industrious_boost:0 "L'économie locale de cette zone se développe rapidement après une série de décrets visant à stimuler la croissance."
 personality_events.35.t:0 "L'attrait des nouveaux mondes"
 personality_events.35.d:0 "Depuis [Root.Monarch.GetHerHis] enfance, [Root.Monarch.GetName] est fasciné par les récits de lieux lointains et en tant que [Root.Monarch.GetTitle], [Root.Monarch.GetSheHe] a activement promu les voyages de découverte et de colonisation. Alors que nos administrateurs coloniaux exigent maintenant que nous leur donnions plus de soutien pour réaliser nos ambitions d'outre-mer, [Root.Monarch.GetHerHis] a été capable de lever les ressources nécessaires de [Root.Monarch.GetHerHis] propre chef, sans grever les coffres de l'État."
 personality_events.35.a:0 "Mieux vaut diriger l'aide là où elle est le plus nécessaire."
 personality_events.35.b:0 "Il est temps de monter une expédition !"
 personality_events.35.c:0 "Cartographions les mers."
 personality_events.35.dd:0 "Nous devons développer notre infrastructure coloniale chez nous."
 personality_events.36.t:0 "Intervention gouvernementale"
 personality_events.36.d:0 "Les talents de [Root.Monarch.GetName] en tant que négociateur et courtier sont généralement un atout dans les négociations internationales, mais parfois une opportunité se présente qui peut être utilisée au profit de nos marchands. Une récente série de réunions avec des émissaires étrangers a ouvert une opportunité de donner à nos marchands nationaux un avantage lors de l'exportation de marchandises vers les marchés étrangers."
 personality_events.36.a:0 "Excellent !"
 personality_events.36.b:0 "Un [Root.Monarch.GetTitle] est au-dessus de telles questions."
 personality_events.37.t:0 "Crainte et admiration"
 personality_events.37.d:0 "Tout au long de [Root.Monarch.GetHerHis] règne, [Root.Monarch.GetName] a prouvé par la parole et l'action [Root.Monarch.GetHerHis] ambitions de conquérant. Admiré par les troupes, une visite impromptue à un camp militaire insuffle maintenant un rêve glorieux de victoire dans le cœur de nos soldats."
 personality_events.37.a:0 "La présence d'un [Root.Monarch.GetTitle] les poussera au triomphe !"
 personality_events.37.b:0 "Nous devrions composer des chants de marche en [Root.Monarch.GetHerHis] nom !"
 personality_events.38.t:0 "L'art de la guerre"
 personality_events.38.d:0 "Cette époque a vu peu d'individus avec un esprit tactique rivalisant avec celui de notre illustre [Root.Monarch.GetTitle], [Root.Monarch.GetName]. [Root.Monarch.GetSheHeCap] a révolutionné notre approche du champ de bataille et nous prévoyons de nombreuses grandes victoires dans l'avenir de notre [Root.GovernmentName]. [Root.Monarch.GetName] envisage d'écrire un livre sur [Root.Monarch.GetHerHis] méthodes. Bien que cela nous aiderait à diffuser les connaissances sur les tactiques militaires au sein de notre propre armée, cela atteindrait certainement aussi nos voisins."
 personality_events.38.a:0 "Ne pas partager ce progrès serait un crime contre l'humanité !"
 personality_events.38.a.tooltip:0 "§Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! écrit un livre sur les tactiques militaires."
 personality_events.38.b:0 "Ils nous célébreraient aujourd'hui pour nous poignarder dans le dos demain."
 personality_events.38.b.tooltip:0 "Nous gardons les méthodes de §Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! pour nous."
 personality_events.39.t:0 "Toute paix et aucun jeu"
 personality_events.39.d:0 "[Root.Monarch.GetName] fait les cent pas dans [Root.Monarch.GetHerHis] appartements ces derniers temps. Les ragots disent que ce sont des affaires de cœur qui rendent le [Root.Monarch.GetTitle] anxieux, mais quiconque connaît [Root.Monarch.GetWomanMan] saurait que c'est en fait la paix actuelle du royaume : un brave guerrier tel que [Root.Monarch.GetSheHe] se sent confiné comme un poulet dans [Root.Monarch.GetHerHis] appartements quand il n'y a pas de guerre à planifier. D'un autre côté, [Root.Monarch.GetSheHe] est le [Root.Monarch.GetTitle]... Peut-être pourrait-[Root.Monarch.GetSheHe] y faire quelque chose ?"
 personality_events.39.a:0 "Le [Root.Monarch.GetTitle] devrait organiser un tournoi !"
 personality_events.39.b:0 "Le [Root.Monarch.GetTitle] devrait passer plus de temps à entraîner [Root.Monarch.GetHerHis] troupes."
 hosting_tournament:0 "Organisation de tournois"
 desc_hosting_tournament:0 "Notre dirigeant récompense actuellement les braves guerriers avec beaucoup de prestige pour leur participation, et particulièrement pour leur victoire, aux tournois. Les gens de tout le royaume sont inspirés à prouver leur valeur."
 drilling_troops:0 "Entraînement des troupes"
 desc_drilling_troops:0 "Notre dirigeant s'est personnellement intéressé à l'entraînement militaire de la capitale et est souvent vu en train d'instruire les soldats, sinon de s'entraîner avec eux, sur les terrains d'exercice."
 personality_events.40.t:0 "Une étiquette stricte"
 personality_events.40.d:0 "[Root.Heir.GetName] a rejoint [Root.Monarch.GetName] pour le souper un soir. Les rumeurs disent que cela ne s'est pas bien passé. Ce qui a apparemment commencé comme une dispute sur l'étiquette a rapidement conduit l'héritier habituellement bien élevé à quitter la table au milieu du repas, suivi de près par [Root.Monarch.GetName] criant que le misérable avait tenté de l'empoisonner !"
 personality_events.40.a:0 "Cela ne peut être toléré ! [Root.Heir.GetName] paiera pour cela."
 personality_events.40.a.tt:0 "[Root.Monarch.GetName] déshérite §Y[Root.Heir.GetName]§!\n"
 personality_events.40.b:0 "C'était probablement un malentendu."
 personality_events.41.t:0 "Le pouvoir de la rhétorique"
 personality_events.41.d:0 "Troublé par l'état actuel de la guerre, [Root.Monarch.GetName] a tenu un discours galvanisant devant [Root.Monarch.GetHerHis] armées fatiguées. La rumeur se répand maintenant parmi nobles et roturiers : tel un phare, [Root.Monarch.GetSheHe] se tenait devant eux, le soleil se reflétant sur [Root.Monarch.GetHerHis] armure tandis que [Root.Monarch.GetHerHis] paroles insufflaient un nouvel espoir aux soldats."
 personality_events.41.a:0 "Nous sommes plus résistants qu'ils ne le pensent."
 personality_events.42.t:0 "La nouvelle génération"
 personality_events.42.d:0 "Au fil des années, notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] a montré un grand intérêt pour façonner notre armée et a personnellement formé beaucoup des jeunes esprits brillants de l'armée. À travers ces protégés, [Root.Monarch.GetName] a pu répandre [Root.Monarch.GetHerHis] idées dans les rangs de nos troupes. Le [Root.Monarch.GetTitle] croit que le temps est venu pour [Root.Monarch.GetHerHis] plus récent élève de déployer ses ailes. Comment pourrait-il le mieux servir notre grand [Root.GovernmentName] ?"
 personality_events.42.a:0 "Il devrait se concentrer sur des réformes pour améliorer le moral de nos hommes."
 personality_events.42.a.tooltip:0 "Gagnez un réformateur militaire de compétence §Y3§! en [Root.GetName]. Ce conseiller est §G50 %§! moins cher à employer pour votre pays."
 personality_events.42.b:0 "Il entraînera nos troupes, en faisant les soldats les plus disciplinés au monde !"
 personality_events.42.b.tooltip:0 "Gagnez un commandant de compétence §Y3§! en [Root.GetName]. Ce conseiller est §G50 %§! moins cher à employer pour votre pays."
 personality_events.42.c:0 "Nous avons toujours besoin de plus d'hommes. Il ferait un excellent recruteur !"
 personality_events.42.c.tooltip:0 "Gagnez un maître recruteur de compétence §Y3§! en [Root.GetName]. Ce conseiller est §G50 %§! moins cher à employer pour votre pays."
 personality_events.42.d.tooltip:0 "Gagnez un réformateur militaire de compétence §Y2§! en [Root.GetName]. Ce conseiller est §G50 %§! moins cher à employer pour votre pays."
 personality_events.42.e.tooltip:0 "Gagnez un commandant de compétence §Y2§! en [Root.GetName]. Ce conseiller est §G50 %§! moins cher à employer pour votre pays."
 personality_events.42.f.tooltip:0 "Gagnez un maître recruteur de compétence §Y2§! en [Root.GetName]. Ce conseiller est §G50 %§! moins cher à employer pour votre pays."
 personality_events.43.t:0 "Un marin terre-à-terre"
 personality_events.43.d:0 "Nous avons reçu des nouvelles d'un homme qui monte rapidement dans les rangs de notre marine. Chef né, mais de caractère humble, le marin a été porté à l'attention par recommandation de ses compagnons marins. Ils affirment, presque superstitieusement, que cet homme a une affinité naturelle avec la mer et que ce serait un gaspillage de ne pas le promouvoir."
 personality_events.43.a:0 "Il fera un excellent amiral !"
 personality_events.43.b:0 "Nous pourrions utiliser un explorateur !"
 personality_events.43.c:0 "Nous n'avons pas besoin de ses services pour l'instant."
 personality_events.44.t:0 "Négocier durement"
 personality_events.44.d:0 "Au fil des années, beaucoup en sont venus à craindre notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] à la table des négociations. [Root.Monarch.GetSheHeCap] est absolument implacable, féroce comme un lion et rusé comme un serpent. À la fin, la plupart des gens donnent à [Root.Monarch.GetName] tout ce que [Root.Monarch.GetSheHe] veut juste pour échapper à [Root.Monarch.GetHerHis] regard de fer. Quand notre [Root.Monarch.GetTitle] a convoqué les banquiers pour renégocier les prêts de la nation, nous savions tous comment cela finirait."
 personality_events.44.a:0 "Les banquiers se retourneront dans leur sommeil pendant des mois !"
 renegotiated_loans:0 "Prêts renégociés"
 desc_renegotiated_loans:0 "Notre féroce dirigeant a réussi à diminuer les intérêts de nos emprunts."
 personality_events.45.t:0 "La goutte de trop"
 personality_events.45.d:0 "Depuis longtemps, nos diplomates se méfient du [Root.Monarch.GetTitle] [Root.Monarch.GetName] et de [Root.Monarch.GetHerHis] tendance à insulter tout le monde et tout. Ils n'ont pas un moment de répit car ils doivent nettoyer tous les désordres que notre [Root.Monarch.GetTitle] laisse derrière. Lors d'une visite de l'émissaire du [angry_country.Monarch.GetTitle] [angry_country.Monarch.GetName] de [angry_country.GetName], notre [Root.Monarch.GetTitle] a tellement irrité l'homme qu'il a fait une crise. Jamais de telles insultes n'avaient été entendues dans nos grandes salles !"
 personality_events.45.a:0 "Nous devons défendre l'honneur de notre grand [Root.GovernmentName] !"
 personality_events.46.t:0 "À quelque chose malheur est bon"
 personality_events.46.d:0 "L'un des conseillers du [Root.Monarch.GetTitle] [Root.Monarch.GetName], $TREASURER$$MASTER_OF_MINT$, a récemment découvert que des fonds manquaient dans le trésor national. $TREASURER_CAP_S_PRONOUN$$MASTER_OF_MINT_CAP_S_PRONOUN$ n'a pas été surpris de découvrir dans quelle poche l'argent était allé. Bien qu'au début $TREASURER_S_PRONOUN$$MASTER_OF_MINT_S_PRONOUN$ ait eu du mal à trouver une solution sans offenser le [Root.Monarch.GetTitle], maintenant $TREASURER_S_PRONOUN$$MASTER_OF_MINT_S_PRONOUN$ a une idée intéressante. Pourquoi ne pas utiliser les « talents » du [Root.Monarch.GetTitle] pour remplir à nouveau les coffres ?"
 personality_events.46.a:0 "C'est pour le bien du [Root.GovernmentName] !"
 personality_events.46.a.tooltip:0 "§Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! accepte de mettre en place un stratagème de détournement de fonds avec §Y$TREASURER$$MASTER_OF_MINT$§! afin de remplir le trésor."
 personality_events.46.b:0 "Deux torts ne font pas un bien."
 personality_events.46.b.tooltip:0 "Nous acceptons la perte de fonds et n'essayons pas de la rectifier par des moyens douteux."
 personality_events.47.t:0 "L'encre est plus épaisse que le sang"
 personality_events.47.d:0 "L'avenir est incertain car le [Root.Monarch.GetTitle] [Root.Monarch.GetName] reste sans enfant. À mesure que chaque année passe, notre [Root.Monarch.GetTitle] ne fait que vieillir, la perspective d'un héritier diminue. Nous avons parcouru l'arbre généalogique des [Root.Monarch.Dynasty.GetName] à la recherche de parents que notre [Root.Monarch.GetTitle] pourrait adopter. Bien que leur revendication serait faible, cela nous donnerait au moins un sentiment de stabilité."
 personality_events.47.a:0 "Nous avons entendu des choses impressionnantes sur Marie [adoptive_country_1.Monarch.Dynasty.GetName] de [adoptive_country_1.GetName]."
 personality_events.47.b:0 "Alexandre [adoptive_country_2.Monarch.Dynasty.GetName] de [adoptive_country_2.GetName] est un commandant estimé."
 personality_events.47.c:0 "Personne ne dit du mal de Stéphanos [adoptive_country_3.Monarch.Dynasty.GetName] de [adoptive_country_3.GetName]."
 personality_events.47.e:0 "Nous n'avons pas besoin d'un méprisable étranger sur le trône !"
 personality_events.47.e.tooltip:0 "§Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! reste sans héritier."
 personality_events.48.t:0 "Travail et plaisir"
 personality_events.48.d:0 "Notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] est connu pour [Root.Monarch.GetHerHis] style de vie frivole et souvent scandaleux. Jusqu'à présent, les conduites les plus honteuses étaient cachées derrière des portes closes. Les choses semblent changer, cependant. [Root.Monarch.GetName] a amené [Root.Monarch.GetHerHis] amant favori, un escroc notoire, à la cour..."
 personality_events.48.a:0 "Elle a manifestement des talents. Mettons-la au travail."
 personality_events.48.b:0 "Il a manifestement des talents. Mettons-le au travail."
 personality_events.48.c:0 "Ce ne serait pas convenable."
 personality_events.48.c.tooltip:0 "L'amant de §Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! est tenu à l'écart du public."
 personality_events.49.t:0 "Une nuit inoubliable"
 personality_events.49.d:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est bien connu – ou plutôt tristement célèbre – pour [Root.Monarch.GetHerHis] nature indulgente et son mode de vie fastueux. Bien que nos administrateurs se plaignent souvent de cette ponction sur les fonds gouvernementaux, savoir organiser des fêtes impressionnantes est une ressource en soi. [Root.Monarch.GetName] a fait à notre [Root.GovernmentName] de nombreux amis grâce à [Root.Monarch.GetHerHis] bals et banquets. Maintenant [Root.Monarch.GetSheHe] planifie un autre grand événement, cependant, l'invité d'honneur n'a pas encore été choisi."
 personality_events.49.a:0 "Le [invitee_1.Monarch.GetTitle] [invitee_1.Monarch.GetName] de [invitee_1.GetName] apprécie une bonne célébration."
 personality_events.49.b:0 "Nous devrions essayer d'impressionner [invitee_2.Monarch.GetName], le [invitee_2.Monarch.GetTitle] de [invitee_2.GetName]."
 personality_events.49.c:0 "Améliorons les relations avec [invitee_3.GetName] en invitant le [invitee_3.Monarch.GetTitle] [invitee_3.Monarch.GetName]."
 personality_events.49.e:0 "Ce sont tous des raseurs ! L'événement sera meilleur sans eux."
 personality_events.49.e.tooltip:0 "Aucun dirigeant étranger n'est invité à l'événement."
 personality_events.50.t:0 "Faire du profit"
 personality_events.50.d:0 "Bien que la cupidité du [Root.Monarch.GetTitle] [Root.Monarch.GetName] ait certainement nui à l'économie de notre nation, [Root.Monarch.GetHerHis] quête incessante d'argent facile n'est pas toujours infructueuse. Parfois, les entreprises dans lesquelles [Root.Monarch.GetSheHe] investit sont rentables et aujourd'hui est un tel jour."
 personality_events.50.a:0 "Vivre l'instant peut être doux en effet !"
 personality_events.51.t:0 "Une main de fer"
 personality_events.51.d:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] est mécontent des derniers rapports de notre province [lazy_province.GetName]. [Root.Monarch.GetSheHeCap] est certain que les paysans sans valeur sont à blâmer. Peut-être devrions-nous en faire un exemple pour encourager les autres à travailler plus dur ?"
 personality_events.51.a:0 "Montrez-leur le prix de la paresse !"
 personality_events.51.b:0 "Nous ne pouvons risquer un soulèvement, alors personne ne travaillerait."
 personality_events.51.b.tooltip:0 "La soif de sang de §Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! est contenue... pour l'instant."
 cruel_overlord:0 "Suzerain cruel"
 desc_cruel_overlord:0 "Les gens de cette province ont été traités cruellement par leur seigneur, ce qui a créé beaucoup de mécontentement et d'agitation."
 personality_events.52.t:0 "Employeur de la décennie"
 personality_events.52.d:0 "Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] n'est pas toujours facile à gérer : [Root.Monarch.GetHerHis] approche irréfléchie et son manque total de discrétion ont offensé beaucoup de gens au fil des années. Cependant, il y a un groupe de personnes qui apprécie la naïveté de [Root.Monarch.GetName]. [Root.Monarch.GetHerHisCap] conseillers ont réalisé que notre [Root.Monarch.GetTitle] est facile à persuader et s'enthousiasme pour presque n'importe quelle proposition. Comme ils sont si contents, nous avons pu réduire un peu leurs salaires. Ce n'est pas comme si nous n'avions pas beaucoup de brillants candidats qui attendent leur tour !"
 personality_events.52.a:0 "Un peu de concurrence ne fera que les faire travailler plus dur !"
 naive_employer:0 "Employeur naïf"
 desc_naive_employer:0 "Le dirigeant de notre nation est enthousiaste et disposé à essayer presque toute nouvelle idée, ce qui le rend populaire parmi les conseillers."
 personality_events.53.t:0 "Sauvé par [Root.Monarch.GetHerHisCap] nerfs"
 personality_events.53.d:0 "C'en est trop, mais que pouvions-nous attendre d'autre du scélérat [assassination_nation.Monarch.GetTitle] [assassination_nation.Monarch.GetName] de [assassination_nation.GetName] ? La nuit dernière, notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] a survécu de justesse à une tentative d'assassinat. Pour une fois, nous remercions [Root.Monarch.GetHerHis] tempérament nerveux, car sans lui, le poignard empoisonné aurait sûrement trouvé sa cible. Les gardes ont réussi à capturer l'assassin et après quelques encouragements de notre interrogateur, nous savons maintenant exactement qui blâmer..."
 personality_events.53.a:0 "Un poignard dans le dos ? Nous ne prendrons pas cette insulte à la légère !"
 personality_events.54.t:0 "Un compliment accidentel"
 personality_events.54.d:0 "Lors d'un banquet, notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est engagé dans une discussion sur la nourriture et les douces gourmandises. Alors que la plupart des parties impliquées restaient fermes dans leur évaluation, défendant la force de la cuisine locale, le [Root.Monarch.GetTitle] a fait une déclaration maladroite quand [Root.Monarch.GetSheHe] a laissé échapper [Root.Monarch.GetHerHis] opinion : « J'ai toujours pensé que [cool_neighbor_country.GetName] avait les meilleurs plateaux de fromage ! Les nôtres sont complètement fades en comparaison ! »\n\nBien que notre chef ait été gravement offensé, le [cool_neighbor_country.Monarch.GetTitle] [cool_neighbor_country.Monarch.GetName] de [cool_neighbor_country.GetName] devait avoir des espions présents à l'événement car l'un de [cool_neighbor_country.Monarch.GetHerHis] émissaires nous a ensuite livré une grande caisse de fromage, entièrement gratuitement."
 personality_events.54.a:0 "Oh, cet inconscient de [Root.Monarch.GetName] !"
 personality_events.54.a.tt:0 "[cool_neighbor_country.Monarch.GetName] a été satisfait du manque de tact de notre [Root.Monarch.GetTitle]."
 personality_events.55.t:0 "L'élite de [Root.GetName]"
 personality_events.55.d:0 "Pour les armées de notre grand [Root.GovernmentName], seuls les meilleurs soldats [Root.GetAdjective] feront l'affaire ! Le [Root.Monarch.GetTitle] [Root.Monarch.GetName] a passé de nombreuses nuits blanches à réfléchir à l'avenir de notre armée et a conclu que nous devons établir des standards plus élevés. Bien que le nombre d'hommes disponibles serait certainement plus petit en conséquence, nous pourrions attendre davantage de nos soldats au combat."
 personality_events.55.a:0 "En effet, nous aurons la qualité plutôt que la quantité !"
 personality_events.55.b:0 "Nous ne pouvons nous permettre de refuser des hommes valides."
 personality_events.55.b.tooltip:0 "Les idées du §Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! sont rejetées."
 military_perfectionism:0 "Perfectionnisme militaire"
 desc_military_perfectionism:0 "Notre dirigeant n'autorise que les meilleurs soldats à rejoindre l'armée, ce qui augmente la qualité globale mais diminue sa taille."
 personality_events.56.t:0 "Conseiller un conseiller"
 personality_events.56.d:0 "Tout le monde sait que le [Root.Monarch.GetTitle] n'est pas très populaire parmi les membres de la cour. Bien que la plupart des gens tolèrent [Root.Monarch.GetHerHis] personnalité vindicative, probablement par peur de tout autre comportement, un conseiller a récemment eu plus d'un différend avec notre dirigeant. Affirmant de façon peu convaincante que « c'est strictement professionnel », $TREASURER$$NATURAL_SCIENTIST$$PHILOSOPHER$$ARTIST$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$ menace maintenant de quitter la cour. Cependant, il existe un langage que tous les administrateurs comprennent..."
 personality_events.56.a:0 "Laissons notre argent parler."
 personality_events.56.a.tt:0 "Le conseiller est fortement encouragé à oublier les désaccords."
 personality_events.56.b:0 "Nous n'avons pas besoin de $TREASURER$$NATURAL_SCIENTIST$$PHILOSOPHER$$ARTIST$$THEOLOGIAN$$MASTER_OF_MINT$$INQUISITOR$."
 personality_events.57.t:0 "Un appel aux armes"
 personality_events.57.d:0 "Le nom de [Root.Monarch.GetName] est connu bien au-delà des frontières de notre [Root.GovernmentName]. Non seulement est-elle notre exaltée [Root.Monarch.GetTitle], mais elle est également célèbre pour ses prouesses militaires. Jusqu'à présent, elle a contribué depuis la sécurité de la salle de guerre, cependant, il y a des voix qui réclament sa présence sur le champ de bataille. Elles augmentent en nombre ainsi qu'en force chaque jour qui passe."
 personality_events.57.a:0 "Nous la suivrons jusqu'à la tombe !"
 personality_events.57.a.tooltip:1 "§Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! est fait général."
 personality_events.57.b:0 "Nous ne pouvons risquer la vie de notre [Root.Monarch.GetTitle]."
 personality_events.57.b.tooltip:0 "§Y[Root.Monarch.GetTitle] [Root.Monarch.GetName]§! n'est pas fait général."
 personality_events.58.t:0 "Un appel aux armes"
 personality_events.58.d:0 "Le nom de [Root.Heir.GetName] est connu de tous ceux qui comptent dans notre [Root.GovernmentName], car elle est l'héritière de notre [Root.Monarch.GetTitle]. Bien que moins de gens le sachent, il n'en demeure pas moins vrai : notre héritière possède d'impressionnantes prouesses militaires. Jusqu'à présent, elle a contribué depuis la sécurité de la salle de guerre, cependant, il y a des voix qui réclament sa présence sur le champ de bataille. Elles augmentent en nombre ainsi qu'en force chaque jour qui passe."
 personality_events.58.a:0 "Nous la suivrons jusqu'à la tombe !"
 personality_events.58.a.tooltip:0 "§Y[Root.Heir.GetName]§! est fait général."
 personality_events.58.b:0 "Nous ne pouvons risquer la vie de l'héritière de notre [Root.Monarch.GetTitle]."
 personality_events.58.b.tooltip:0 "§Y[Root.Heir.GetName]§! n'est pas fait général."

 NO_LOCATION:0 "leur demeure"

 #Death Reasons
 DEATH_IN_BATTLE:0 "[Root.Monarch.GetSheHeCap] est mort en menant nos troupes à $NAME$."
 DEATH_IN_SIEGE:0 "[Root.Monarch.GetSheHeCap] est mort en menant le siège de $NAME$."
 DEATH_WHILE_MARCHING:0 "[Root.Monarch.GetSheHeCap] est mort en faisant marcher une armée à travers $NAME$."
 DEATH_WHILE_CAMP:0 "[Root.Monarch.GetSheHeCap] est mort alors que l'armée campait à $NAME$."
 DEATH_OLD_AGE:0 "[Root.Monarch.GetSheHeCap] est mort naturellement de vieillesse."
 DEATH_RANDOM_0:0 "[Root.Monarch.GetSheHeCap] est mort subitement en s'étouffant."
 DEATH_RANDOM_1:0 "[Root.Monarch.GetSheHeCap] est mort d'une blessure reçue lors d'une activité sportive."
 DEATH_RANDOM_2:0 "[Root.Monarch.GetSheHeCap] est tombé dans un escalier et en est mort."
 DEATH_RANDOM_3:0 "[Root.Monarch.GetSheHeCap] est mort subitement d'un ulcère perforé."
 DEATH_RANDOM_4:0 "[Root.Monarch.GetSheHeCap] est mort de pneumonie suite à un rhume banal."
 DEATH_RANDOM_5:0 "Une maladie soudaine nous l'a pris trop tôt."
 DEATH_RANDOM_6:0 "[Root.Monarch.GetSheHeCap] est mort de façon inattendue d'une intoxication alimentaire."
 DEATH_RANDOM_7:0 "[Root.Monarch.GetSheHeCap] a été victime d'un accident de chasse apparemment improbable."
 DEATH_RANDOM_8:0 "[Root.Monarch.GetSheHeCap] est mort d'une défaillance cardiaque."
 DEATH_RANDOM_9:0 "[Root.Monarch.GetSheHeCap] est mort de dysenterie."
 #Generals/Admirals:
 leader_death_reason_accident:0 "[GetSheHeCap] est mort dans un accident en menant [GetHerHis] troupes lors d'un exercice."
 leader_death_reason_age:0 "Bien que [GetSheHe] n'ait jamais bronché face au danger, c'est la vieillesse qui a finalement eu raison d'[GetHerHim]."
 leader_death_reason_disease:0 "[GetSheHeCap] est mort d'une maladie contractée sur le terrain."
 leader_death_reason_siege:0 "[GetSheHeCap] a été touché par une balle perdue alors qu'[GetSheHe] inspectait vaillamment les tranchées pendant un siège."
 leader_death_reason_naval_battle:0 "[GetSheHeCap] a coulé avec [GetHerHis] navire comme un vrai capitaine."
 leader_death_reason_land_battle:0 "[GetSheHeCap] est mort vaillamment au milieu d'un engagement avec les troupes ennemies."
 leader_death_reason_navy_moving:0 "[GetSheHeCap] est mort en mer après avoir contracté une maladie malheureuse."
 leader_death_reason_land_moving:0 "[GetSheHeCap] est mort en faisant marcher une armée à travers $PROVINCE$."
 leader_death_reason_navy_idle:0 "[GetSheHeCap] est mort en mer après avoir contracté une maladie malheureuse."
 leader_death_reason_land_idle:0 "[GetSheHeCap] est mort dans le camp militaire à $PROVINCE$."
 leader_death_reason_event_default:0 "[GetSheHeCap] est mort pour des raisons mystérieuses à $PROVINCE$."
 leader_death_reason_drilling:1 "[GetSheHeCap] est mort dans un accident lors d'une session d'entraînement.\nL'entraînement est maintenant interrompu."
 #Obituaries
 just_personality_die_desc:0 "Notre royaume regrettera [Root.Monarch.GetHerHis] jugements justes et impartiaux."
 righteous_personality_die_desc:0 "Notre peuple pleure le passage du [Root.Monarch.GetTitle] le plus vertueux de notre vivant."
 kind_hearted_personality_die_desc:0 "Notre peuple se souvient d'[Root.Monarch.GetHerHim] comme d'un dirigeant au grand cœur et aimant."
 free_thinker_personality_die_desc:0 "[Root.Monarch.GetSheHeCap] n'a jamais eu peur de rompre avec les vieilles traditions pour faire avancer nos objectifs."
 well_connected_personality_die_desc:0 "Nul doute que [Root.Monarch.GetSheHe] établit déjà de précieux contacts dans l'au-delà."
 calm_personality_die_desc:0 "[Root.Monarch.GetSheHeCap] a apporté paix et ordre à notre royaume."
 secretive_personality_die_desc:0 "Sans aucun doute [Root.Monarch.GetSheHe] a emporté beaucoup de [Root.Monarch.GetHerHis] secrets dans [Root.Monarch.GetHerHis] tombe."
 intricate_web_weaver_personality_die_desc:0 "[Root.Monarch.GetSheHeCap] est pleuré par une armée d'informateurs."
 fertile_personality_die_desc:0 "[Root.Monarch.GetSheHeCap] est pleuré par [Root.Monarch.GetHerHis] nombreux descendants."
 well_advised_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] conseillers nous assurent que c'était mieux ainsi."
 benevolent_personality_die_desc:0 "Nos sujets se lamentent sur le passage d'un suzerain aussi bienveillant."
 zealot_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] énergie et conviction ont amené de nombreux incroyants dans le giron."
 pious_personality_die_desc:0 "Nous ne connaîtrons peut-être plus jamais un dirigeant d'une telle vertu et stature spirituelle."
 careful_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] décisions bien planifiées ont renforcé notre position dans le monde."
 lawgiver_personality_die_desc:0 "À la fin, nous serons tous jugés."
 midas_touched_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] talent pour trouver de l'argent partout a fait de nous un pays plus riche."
 incorruptible_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] caractère fort a fait de notre pays un endroit plus honnête."
 architectural_visionary_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] mémoire vivra à jamais dans les nombreux bâtiments [Root.Monarch.GetSheHe] qu'il a laissés derrière lui."
 scholar_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] poursuites savantes ont apporté à la fois innovation et renommée à notre royaume."
 entrepreneur_personality_die_desc:0 "[Root.Monarch.GetSheHeCap] a façonné la vie économique de [Root.Monarch.GetHerHis] époque."
 industrious_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] efforts inlassables pour améliorer notre économie nous manqueront cruellement."
 expansionist_personality_die_desc:0 "Nos colons pleureront la perte de leur grand bienfaiteur."
 charismatic_negotiator_personality_die_desc:0 "Les négociations avec les dirigeants étrangers sembleront calmes et mornes sans [Root.Monarch.GetHerHim]."
 silver_tongue_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] douces paroles ont tenu le monde à distance. Qui nous protégera maintenant ?"
 tactical_genius_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] manœuvres complexes ont laissé nos ennemis désorientés et confus."
 bold_fighter_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] charges audacieuses dans les lignes ennemies ont laissé une impression durable sur chaque soldat de [Root.Monarch.GetHerHis] génération."
 fierce_negotiator_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] négociations acharnées ont laissé des capitaines mercenaires dans le dénuement à travers nos terres."
 strict_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] surveillance constante nous a toujours tenus en alerte."
 inspiring_leader_personality_die_desc:0 "[Root.Monarch.GetSheHeCap] a inspiré une génération à prendre les armes contre nos ennemis."
 martial_educator_personality_die_desc:0 "Le programme [Root.Monarch.GetSheHe] qu'il a créé pour nos officiers sera utilisé par les générations à venir."
 navigator_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] enthousiasme pour la mer nous a laissé une marine plus forte."
 babbling_buffoon_personality_die_desc:0 "Nos amis chériront ce jour."
 embezzler_personality_die_desc:0 "Nos comptables ne le regretteront pas mais [Root.Monarch.GetHerHis] neveux sûrement."
 infertile_personality_die_desc:0 "Nous ne pouvons qu'espérer que [Root.Monarch.GetHerHis] successeurs feront davantage pour perpétuer la dynastie."
 drunkard_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] beuveries et goûts dispendieux ont laissé le pays plus pauvre et moins bien gouverné qu'il ne l'était quand [Root.Monarch.GetSheHe] a été couronné."
 sinner_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] vie pécheresse n'a apporté que honte à notre pays."
 greedy_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] soif dévorante d'argent et de richesse ne nous manquera pas."
 tolerant_personality_die_desc:0 "Nos minorités religieuses pleureront le passage de quelqu'un d'une si grande nature tolérante."
 cruel_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] méfaits seront rappelés pendant des générations."
 naive_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] ingérence naïve dans les affaires étrangères n'a apporté que malentendus et nouveaux ennemis."
 craven_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] conduite lâche sur le champ de bataille sera à jamais [Root.Monarch.GetHerHis] héritage."
 loose_lips_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] manipulation négligente d'informations secrètes a rendu nos secrets de notoriété publique."
 obsessive_perfectionist_personality_die_desc:0 "[Root.Monarch.GetHerHisCap] ingérence constante dans chaque projet d'infrastructure a laissé notre pays avec une longue liste de dépenses qui ne nous manquera pas."
 malevolent_personality_die_desc:0 "Nos sujets peuvent dormir plus tranquilles maintenant sachant que [Root.Monarch.GetHerHis] règne de terreur malveillante est terminé."
 conqueror_personality_die_desc:0 "Nos ennemis seront certainement soulagés de [Root.Monarch.GetHerHis] disparition."

 #Obituaries for Generals/Admirals:
 no_personality_die_desc:0 "[GetSheHeCap] est mort trop tôt sans avoir pu accomplir grand-chose de notable."
 glory_seeker_personality_die_desc:0 "[GetHerHisCap] attaques vaillantes manqueront à nos troupes."
 born_to_the_saddle_personality_die_desc:0 "[GetHerHisCap] cavaliers le pleurent comme l'un des leurs."
 defensive_planner_personality_die_desc:0 "Nos troupes regretteront grandement [GetHerHis] attention à leur sécurité."
 battlefield_medic_personality_die_desc:0 "Nos troupes regretteront grandement [GetHerHis] attention à leur santé."
 ruthless_personality_die_desc:0 "[GetHerHisCap] tactiques impitoyables pouvaient inspirer une grande peur chez nos ennemis."
 inspirational_leader_general_personality_die_desc:0 "[GetHerHisCap] discours inspirants seront rappelés par des générations de soldats."
 master_of_arms_personality_die_desc:0 "[GetHerHisCap] fantassins le pleurent comme l'un des leurs."
 goal_oriented_personality_die_desc:0 "[GetHerHisCap] arrivées opportunes ont sauvé bien des batailles."
 hardy_warrior_personality_die_desc:0 "[GetHerHisCap] simple présence semblait alléger les pires épreuves."
 siege_specialist_personality_die_desc:0 "[GetHerHisCap] attention aux techniques de siège a rendu chaque investissement digne."
 cannoneer_personality_die_desc:0 "Le corps d'artillerie pleure [GetHerHis] passage comme si [GetSheHe] était l'un des leurs."
 cuirassier_leader_personality_die_desc:1 "[GetHerHisCap] engagement pour la cavalerie nous manquera."
 cruel_tactician_personality_die_desc:0 "Le jour de [GetHerHis] disparition sera célébré par nos ennemis comme un jour férié."
 frontline_holder_personality_die_desc:0 "[GetHerHisCap] mort ne sera pas vaine alors que nos troupes tiennent la ligne."
 strict_drillmaster_personality_die_desc:0 "Puissent [GetHerHis] leçons inspirer la grandeur aux futurs généraux."
 extortioner_personality_die_desc:0 "[GetHerHisCap] disparition réjouira grandement les marchands de toutes nationalités sauf la nôtre."
 ruthless_blockader_personality_die_desc:0 "Les citoyens des ports de tout le littoral peuvent maintenant respirer plus facilement."
 buccaneer_personality_die_desc:0 "Avec [GetHerHim] parti, nos ennemis se sentiront plus en sécurité avec les routes maritimes à nouveau."
 prize_hunter_personality_die_desc:0 "[GetHerHisCap] faits de bravoure ont apporté de nombreux nouveaux navires comme prises entre nos mains."
 ironside_personality_die_desc:0 "[GetHerHisCap] forte croyance dans les tactiques défensives a laissé une impression durable sur tous ceux qui ont été sous [GetHerHis] commandement."
 naval_engineer_personality_die_desc:0 "[GetHerHisCap] attention aux navires sous [GetHerHis] commandement a grandement augmenté la durabilité de notre marine pendant [GetSheHe] qu'il a servi."
 naval_showman_personality_die_desc:0 "[GetHerHisCap] manœuvres audacieuses ont apporté gloire et expérience à nos équipages."
 ram_raider_personality_die_desc:0 "[GetHerHisCap] manœuvres audacieuses ont apporté gloire et expérience à nos équipages."
 naval_gunner_personality_die_desc:0 "[GetHerHisCap] entraînement constant de nos équipes de canonniers a grandement augmenté notre puissance navale durant [GetHerHis] vie."
 accomplished_sailor_personality_die_desc:0 "[GetHerHisCap] grande appréciation de l'art de la voile en général était vénérée par [GetHerHis] hommes."
 level_headed_personality_die_desc:0 "[GetHerHisCap] capacité à garder son sang-froid même face à un grave danger nous manquera grandement."
 naval_strategist_personality_die_desc:0 "[GetHerHisCap] stratégies en mer ont sauvé de nombreuses vies."
 inspirational_captain_personality_die_desc:0 "[GetHerHisCap] discours inspirants seront rappelés par des générations de marins."
 naval_cannoneer_personality_die_desc:0 "Le son de nos canons ne sera jamais aussi fort qu'il l'était sous [GetHerHis] commandement."
 wooden_waller_personality_die_desc:0 "[GetHerHisCap] guerre d'affrontement nous a menés à la victoire là où d'autres navires auraient coulé."
 cunning_navigator_personality_die_desc:0 "[GetHerHisCap] compétences en navigation ont sauvé la vie de nombreux marins."
