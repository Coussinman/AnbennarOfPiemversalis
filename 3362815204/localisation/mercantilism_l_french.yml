l_french:
 refused_food_import:0 "Refus d'Importer de la Nourriture"
 desc_refused_food_import:0 "Le refus de notre nation d'assouplir les barrières commerciales en période de pénurie alimentaire a provoqué l'indignation parmi les populations touchées."
 buying_american:0 "Acheter Aelantiri"
 desc_buying_american:0 "Nous avons assoupli les barrières commerciales pour permettre les importations depuis la colonie de notre voisin en Aelantir."
 importing_cocoa:0 "Importation de Cacao"
 desc_importing_cocoa:0 "Nos importantes importations de chocolat et de cacao apportent joie et revigorisation à notre peuple."
 importing_coffee:0 "Importation de Café"
 desc_importing_coffee:0 "Nos importantes importations de café maintiennent le peuple heureux et vigilant."
 importing_tea:0 "Importation de Thé"
 desc_importing_tea:0 "Nos importantes importations de thé plaisent aux membres sophistiqués de la société."
 mercantilism_events.1.t:0 "Importer de la Nourriture pour Combattre la Famine"
 mercantilism_events.1.d:0 "La récente pénurie alimentaire dans certaines parties de notre nation a poussé de nombreux [Root.GetAdjective] à remettre en question les politiques commerciales qui empêchent les importations de biens vitaux. Le peuple réclame un assouplissement des barrières commerciales, espérant que la crise puisse être atténuée en achetant de la nourriture auprès de nations plus fortunées."
 mercantilism_events.1.a:0 "En ces temps de besoin, les vies comptent plus que la politique."
 mercantilism_events.1.b:0 "Nous devons nous efforcer d'être autosuffisants, même lorsque nous ne le sommes pas."
 mercantilism_events.2.t:0 "Les Importations Concurrencent les Produits de Qualité [Root.GetAdjective]"
 mercantilism_events.2.d:0 "Nos voisins ont établi une importante présence coloniale dans le Nouveau Monde. Les exportations de cette terre lointaine n'ont cessé d'augmenter, et certains de ces biens exotiques sont devenus très populaires, même parmi ceux qui devraient savoir mieux que de se laisser éblouir par des curiosités.\n\nRécemment, nos voisins sont allés plus loin, alimentant ouvertement cet intérêt. Encourageant les gens à « acheter aelantiri », ils poussent à davantage d'importations des colonies, supplantant nos propres produits et privant de braves gens [Root.GetAdjective] de travail. Nous pourrions tirer quelque chose de cet afflux de commerce étranger, mais l'option la plus sûre serait d'ériger des barrières pour le réduire."
 mercantilism_events.2.a:0 "Voyons ce que les colonies ont à offrir."
 mercantilism_events.2.b:0 "Rien de qualité décente ne saurait provenir de ces parvenus de contrées arriérées."
 mercantilism_events.3.t:0 "Importation de Fer"
 mercantilism_events.3.d:0 "Nous nous efforçons de maintenir l'armée [Root.GetAdjective] forte, moderne et soutenue par la production nationale, mais parfois nos priorités entrent en conflit les unes avec les autres. Manquant des riches mines de fer de nos voisins, certains de nos plans les plus ambitieux pour le développement militaire futur ne seront pas réalisables aussi vite que nous le souhaiterions. Augmenter les importations est une option tentante, mais dépendre d'un soutien étranger pourrait compromettre nos politiques commerciales... bien qu'un poignard dans le dos de notre voisin serait d'autant plus brillamment insidieux s'il était forgé de leur propre acier."
 mercantilism_events.3.a:0 "Nous avons besoin de fer importé pour notre poing."
 mercantilism_events.3.b:0 "Nous devons compter sur nos propres ressources. Le cœur compte plus que le fer."
 mercantilism_events.4.t:0 "Importation de Fournitures Navales"
 mercantilism_events.4.d:0 "Les ambitions d'améliorer la marine de notre nation ont récemment été interrompues. Les constructeurs navals [Root.GetAdjective] ne manquent pas d'idées ou de plans, mais de fournitures. Certains d'entre eux ne peuvent s'empêcher de remarquer, prétendent-ils, que notre voisin dispose d'une abondance de matériaux qui seraient utiles pour équiper une marine moderne. Nous essayons de ne pas rendre notre flotte dépendante d'un soutien étranger, mais si ces politiques font obstacle au progrès, peut-être pourrions-nous importer juste assez pour tester les nouvelles techniques de construction navale."
 mercantilism_events.4.a:0 "Nous pouvons faire des compromis si cela met certains plans en mouvement."
 mercantilism_events.4.b:0 "Des navires en bois étranger ? Il serait plus sûr de les façonner dans la roche !"
 mercantilism_events.5.t:0 "$TRADER$, Protectionniste Controversé"
 mercantilism_events.5.d:0 "Depuis que $TRADER$ a commencé à conseiller les développements commerciaux de [Root.GetName], le commerce intérieur a été renforcé au prix d'importations réduites et d'une réglementation étatique accrue. Bien que ses décisions d'améliorer les infrastructures aient été appréciées, des suggestions récentes ont poussé de nombreuses personnes influentes à remettre en question sa philosophie. Ils soutiennent que le [Root.Monarch.GetTitle] suit trop facilement les conseils de $TRADER$, et que nous devrions rechercher des accords mutuellement bénéfiques avec d'autres nations plutôt que de chercher à dominer tous les domaines du commerce."
 mercantilism_events.5.a:0 "La pensée de $TRADER$ nous a aidés jusqu'ici."
 mercantilism_events.5.b:0 "Un marchand devrait faciliter le libre-échange, pas le restreindre."
 mercantilism_events.6.t:0 "Réformes Radicales"
 mercantilism_events.6.d:0 "Deux de nos conseillers les plus fiables, $MASTER_OF_MINT$ et $TRADER$, ont beaucoup discuté récemment. Ils complotent, disent certains. Ils élaborent des plans pour l'avenir de [Root.GetName], disent d'autres. Quoi qu'ils discutent, c'est clairement assez controversé pour justifier une certaine discrétion.\n\nFinalement, ils approchent le [Root.Monarch.GetTitle] [Root.Monarch.GetName] pour présenter les résultats. L'épaisse liasse de papiers contient des plans pour des changements monumentaux dans les pratiques commerciales de la nation, incluant un protectionnisme accru, une réglementation et une politique industrielle. Radical, diraient certains.\n« Nécessaire », dit $MASTER_OF_MINT$.\n« Profitable », dit $TRADER$.\n\nQu'en dit [Root.Monarch.GetName] ?"
 mercantilism_events.6.a:0 "Radical pour les esprits simples, peut-être, mais pas pour le [Root.Monarch.GetTitle]."
 mercantilism_events.6.b:0 "$MASTER_OF_MINT$ a une mauvaise influence sur $TRADER$."
 mercantilism_events.6.c:0 "$TRADER$ a clairement radicalisé $MASTER_OF_MINT$."
 mercantilism_events.6.e:0 "Sortez d'ici, tous les deux !"
 mercantilism_events.7.t:0 "Commerce Intercolonial"
 mercantilism_events.7.d:0 "Établir des sujets coloniaux outre-mer nous a permis d'étendre notre commerce tout en gardant le contrôle, important des marchandises de terres qui sont essentiellement sous contrôle [Root.GetAdjective]. Tant que nous fournissons à notre colonie ce dont elle a besoin, elle n'a aucune raison de commencer à mettre de l'or dans les mains de nos ennemis.\n\nMalheureusement, les colons ont parfois une opinion différente de celle de notre [Root.Monarch.GetTitle] sur ce dont exactement ils ont « besoin ». Ils ont commencé à commercer avec les colonies voisines et les indigènes, contournant les barrières commerciales que nous avons érigées pour protéger les intérêts de notre nation. Cela leur profite clairement... mais que cela nous profite est hautement douteux."
 mercantilism_events.7.a:0 "Ils font partie de [Root.GetName]. Nos intérêts sont les leurs."
 mercantilism_events.7.b:0 "Ils font partie de [Root.GetName]. Leurs intérêts sont les nôtres."
 mercantilism_events.8.t:0 "Importations de Chocolat"
 mercantilism_events.8.d:0 "D'éminents économistes ont récemment remis en question les augmentations rapides des importations de chocolat dans notre nation. Après que l'un de nos voisins soit venu à contrôler une grande quantité de l'approvisionnement mondial connu en cacao par d'habiles pratiques commerciales, leur confiserie est devenue très populaire même parmi les gens [Root.GetAdjective]. Les politiciens protectionnistes remettent maintenant en question si de telles importations de biens de luxe profitent à [Root.GetName], arguant que devenir dépendant d'un bien que nos voisins contrôlent entraîne une fuite d'or hors de notre nation."
 mercantilism_events.8.a:0 "Mais un fleuve de doux, si doux chocolat coule vers notre nation."
 mercantilism_events.8.b:0 "Restreindre les importations de cette indulgence pécheresse."
 mercantilism_events.8.c:0 "Donnons une image négative du chocolat, le remplaçant par notre sucre à l'image positive."
 mercantilism_events.9.t:0 "Importations de Café"
 mercantilism_events.9.d:0 "D'éminents économistes ont récemment remis en question les augmentations rapides des importations de café dans notre nation. Après que l'un de nos voisins soit venu à contrôler une grande quantité de l'approvisionnement mondial connu en grains de café par d'habiles pratiques commerciales, leurs boissons sont devenues très populaires même parmi les gens [Root.GetAdjective]. Les politiciens protectionnistes remettent maintenant en question si de telles importations de biens de luxe profitent à [Root.GetName], arguant que devenir dépendant d'un bien que nos voisins contrôlent affaiblit notre position économique."
 mercantilism_events.9.a:0 "Ces soi-disant économistes doivent-ils gérer les petits matins ?"
 mercantilism_events.9.b:0 "Nous devons limiter la propagation de ce narcotique contre-nature."
 mercantilism_events.9.c:0 "Nous autres [Root.GetAdjective] sommes un peuple buveur de thé. Nous n'aurons rien de cela."
 mercantilism_events.10.t:0 "Importations de Thé"
 mercantilism_events.10.d:0 "D'éminents économistes ont récemment remis en question les augmentations rapides des importations de thé dans notre nation. Après que l'un de nos voisins soit venu à contrôler une grande quantité de l'approvisionnement mondial connu en thé par d'habiles pratiques commerciales, leurs boissons sont devenues très populaires même parmi les gens [Root.GetAdjective]. Les politiciens protectionnistes remettent maintenant en question si de telles importations de biens de luxe profitent à [Root.GetName], arguant que devenir dépendant d'un bien que nos voisins contrôlent affaiblit notre position économique."
 mercantilism_events.10.a:0 "Si nous abandonnons le thé, la civilisation suivra rapidement."
 mercantilism_events.10.b:0 "Nous devrions jeter leur thé dans l'océan !"
 mercantilism_events.10.c:0 "Qui a besoin de thé quand on a du café ?"

