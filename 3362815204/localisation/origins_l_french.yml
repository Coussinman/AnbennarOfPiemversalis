 ###GOVERNMENT REFORMS###
 negusa_nagast:0 "Monarchie du Negusa Nagast"
 negusa_nagast_legacy:0 "Monarchie du Negusa Nagast"
 negusa_nagast_legacy_desc:0 "Bien que l'Éthiopie soit un empire, elle manque des moyens appropriés pour imposer l'autorité du Negusa Nagast, l'empereur d'Éthiopie. La Monarchie du Negusa Nagast est l'état embryonnaire de l'Empire que l'Éthiopie deviendra, et en tant que telle cette réforme est marquée par la désunion religieuse, un manque de pouvoir central et une capitale itinérante, qui a causé plus de problèmes qu'elle n'en valait."
 negusa_nagast_desc:0 "Bien que l'Éthiopie soit un empire, elle manque des moyens appropriés pour imposer l'autorité du Negusa Nagast, l'empereur d'Éthiopie. La Monarchie du Negusa Nagast est l'état embryonnaire de l'Empire que l'Éthiopie deviendra, et en tant que telle cette réforme est marquée par la désunion religieuse, un manque de pouvoir central et une capitale itinérante, qui a causé plus de problèmes qu'elle n'en valait."
 mechanic_has_itinerant_capital_yes:1 "Possède une §YCapitale Itinérante§!"
 solomonic_empire:0 "Empire Salomonide"
 solomonic_empire_legacy:0 "Empire Salomonide"
 solomonic_empire_legacy_desc:0 "L'Empire Salomonide est la réforme gouvernementale de l'Éthiopie après que l'État se soit consolidé d'un seul coup. Les querelles religieuses ne sont plus une préoccupation et l'empire exerce maintenant sa domination vers l'extérieur."
 solomonic_empire_desc:1 "L'Empire Salomonide est la réforme gouvernementale de l'Éthiopie après que l'État se soit consolidé d'un seul coup. Les querelles religieuses ne sont plus une préoccupation et l'empire exerce maintenant sa domination vers l'extérieur."
 sacred_kingdom:0 "Royaume Sacré"
 sacred_kingdom_legacy:0 "Royaume Sacré"
 sacred_kingdom_desc:0 "Une monarchie absolue où le souverain n'est pas seulement le chef de l'État mais aussi le chef de la religion et est déifié comme l'un des dieux de son peuple."
 sacred_kingdom_legacy_desc:0 "Une monarchie absolue où le souverain n'est pas seulement le chef de l'État mais aussi le chef de la religion et est déifié comme l'un des dieux de son peuple."
 sacred_kingdom_tt:0 "Le peuple de [Root.GetName] a déifié la dynastie."
 tribal_confederacy:0 "Confédération Tribale"
 tribal_confederacy_legacy:0 "Confédération Tribale"
 tribal_confederacy_desc:0 "Une forme gouvernementale où plusieurs chefs et petits rois se soumettent à l'autorité d'un pouvoir central mais conservent un certain degré d'autonomie interne."
 tribal_confederacy_legacy_desc:0 "Une forme gouvernementale où plusieurs chefs et petits rois se soumettent à l'autorité d'un pouvoir central mais conservent un certain degré d'autonomie interne."
 tribe_remain_tribal_reform:0 "Former une Tribu avancée"
 tribe_remain_tribal_reform_desc:0 "Par la consolidation du pouvoir, notre tribu a progressé vers un gouvernement plus efficace, qui maintient la population satisfaite et le souverain au pouvoir."
 mechanic_has_internal_tribes_yes:1 "Possède des §YTribus Internes§!"
 mechanic_has_locked_government_yes:0 "Ne peut pas changer de Gouvernement par les Réformes."
 mossi_federal_kingdom:0 "Royaume Confédéral Mossi"
 mossi_federal_kingdom_legacy:0 "Royaume Confédéral Mossi"
 mossi_federal_kingdom_desc:0 "Le royaume Mossi est moins un royaume unique qu'une confédération de plusieurs petits royaumes Mossi, qui partageaient des liens de parenté, militaires et rituels les uns avec les autres."
 mossi_federal_kingdom_legacy_desc:0 "Le royaume Mossi est moins un royaume unique qu'une confédération de plusieurs petits royaumes Mossi, qui partageaient des liens de parenté, militaires et rituels les uns avec les autres."
 shaka_regime:0 "Tribu Zouloue"
 shaka_regime_legacy:0 "Tribu Zouloue"
 shaka_regime_desc:0 "Une monarchie tribale, qui se concentre sur la domination militaire des autres tribus et la militarisation de l'État."
 shaka_regime_legacy_desc:0 "Une monarchie tribale, qui se concentre sur la domination militaire des autres tribus et la militarisation de l'État."
 mechanic_has_federal_kingdoms_yes:1 "Possède des §YRoyaumes Confédéraux§!"
 tribe_tribal_unity:0 "Unité Tribale"
 tribe_tribal_unity_desc:0 "La vie tribale est notre héritage et ce sera notre legs. Nous sommes unis comme une grande famille."
 matrilineal_system:0 "Système Matrilinéaire"
 matrilineal_system_legacy:0 "Système Matrilinéaire"
 matrilineal_system_desc:0 "Une forme spéciale d'héritage où le vrai pouvoir de l'État était hérité par les filles d'un souverain."
 matrilineal_system_legacy_desc:0 "Une forme spéciale d'héritage où le vrai pouvoir de l'État était hérité par les filles d'un souverain."
 musa_rule:0 "Règne du Mansa"
 musa_rule_legacy:0 "Règne du Mansa"
 musa_rule_desc:0 "Le gouvernement de l'Empire du Mali. Bien que très similaire aux autres monarchies, le Règne du Mansa est spécial car il permet un héritage matrilinéaire. De plus, il soutient les fonctionnaires de la cour qui prennent les affaires de l'État en main pendant les règnes de mauvais successeurs."
 musa_rule_legacy_desc:0 "Le gouvernement de l'Empire du Mali. Bien que très similaire aux autres monarchies, le Règne du Mansa est spécial car il permet un héritage matrilinéaire. De plus, il soutient les fonctionnaires de la cour qui prennent les affaires de l'État en main pendant les règnes de mauvais successeurs."
 mechanic_has_tributaries_yes:1 "Peut avoir des §YÉtats Tributaires§!"
 feudal_tribe:0 "Tribu Féodale"
 feudal_tribe_legacy:0 "Tribu Féodale"
 feudal_tribe_desc:0 "Un système tribal très similaire à une monarchie féodale classique. Au lieu d'être possédés par le monarque ou sa noblesse, les sujets paient un tribut au souverain de l'État."
 feudal_tribe_legacy_desc:0 "Un système tribal très similaire à une monarchie féodale classique. Au lieu d'être possédés par le monarque ou sa noblesse, les sujets paient un tribut au souverain de l'État."
 great_man:0 "Grand Homme"
 great_man_legacy:0 "Grand Homme"
 great_man_desc:0 "Un système de gouvernement de chefs tribaux qui dirigent le processus de colonisation de la jungle vers les plaines et mènent les guerriers de la tribu."
 great_man_legacy_desc:0 "Un système de gouvernement de chefs tribaux qui dirigent le processus de colonisation de la jungle vers les plaines et mènent les guerriers de la tribu."
 ###ESTATE PRIVILEGES###
 estate_church_yakobs_churches:0 "Réforme du Sabbat Biblique"
 estate_church_yakobs_churches_desc:1 "Le Negusa Nagast Zara Yaqob a unifié l'Église copte autrefois divisée en trouvant un compromis pour les différentes visions du week-end. Grâce à son action, le clergé a introduit une réforme qui permet d'enseigner plus facilement la lecture de Yaqob parmi les autres fidèles dévots."
 estate_burghers_control_over_the_mint:0 "Extraction Aurifère Contrôlée"
 estate_burghers_control_over_the_mint_desc:1 "L'extraction de l'or peut être très profitable, mais des fouilles incontrôlées peuvent causer des conséquences catastrophiques pour l'économie. En laissant la [Root.GetBurghersName] avoir un contrôle plus direct sur le processus de frappe et d'extraction, nous pouvons nous assurer que trop d'or n'entre pas dans le trésor d'un seul coup."
 estate_burghers_control_over_the_mint_gt:0 "Chaque province §YAurifère§! possédée recevra §R-15,0 %§! de modificateur de production de biens."
 estate_burghers_control_over_the_mint_rt:0 "Retirer la pénalité du modificateur de production de biens de chaque province §YAurifère§! possédée."
 estate_church_one_faith_one_culture:0 "Culture Religieuse"
 estate_church_one_faith_one_culture_desc:0 "L'unité dans une société ne peut être atteinte que lorsque le [Root.GetClergyName] ne prend pas seulement les affaires spirituelles en main mais prend aussi un rôle plus crucial dans les questions culturelles et sociales du royaume."
 estate_church_one_faith_one_culture_gta:0 "Chaque province possédée de foi §Y[Root.Religion.GetName]§!, qui est soit dans le groupe culturel §Y[Root.Culture.GetGroupName]§! soit a une §Yculture acceptée§!, reçoit « §YSociété Religieuse§! », donnant les effets suivants :\nTroubles locaux : §G-1,00§!\nModificateur d'impôt local : §G+10,0 %§!\nEfficacité de production locale : §G+10,0 %§!\nModificateur de main-d'œuvre local : §G+10,0 %§!"
 estate_church_one_faith_one_culture_gtb:2 "Chaque province possédée qui n'est PAS dans le groupe culturel §Y[Root.Culture.GetGroupName]§! et n'a PAS de §Yculture acceptée§!, reçoit « §YCulture Hérétique§! », donnant les effets suivants :\nTroubles locaux : §R+3,00§!\nCoût de conversion culturelle locale : §G-10,0 %§!"
 estate_church_one_faith_one_culture_rta:0 "Le modificateur « §YSociété Religieuse§! » est retiré de toutes les provinces §Y[Root.Religion.GetName]§! avec une §Yculture acceptée§! ou avec une culture du groupe culturel §Y[Root.Culture.GetGroupName]§!."
 estate_church_one_faith_one_culture_rtb:0 "Le modificateur « §YCulture Hérétique§! » est retiré de toutes les provinces sans §Yculture acceptée§! et sans culture du groupe culturel §Y[Root.Culture.GetGroupName]§!."
 estate_brahmins_one_faith_one_culture:0 "Culture Religieuse"
 estate_brahmins_one_faith_one_culture_desc:0 "L'unité dans une société ne peut être atteinte que lorsque le [Root.GetClergyName] ne prend pas seulement les affaires spirituelles en main mais prend aussi un rôle plus crucial dans les questions culturelles et sociales du royaume."
 estate_dhimmi_guarantee_of_traditions:0 "Traditions Garanties"
 estate_dhimmi_guarantee_of_traditions_desc:1 "La foi au sein de notre [Root.GovernmentName] a toujours été un mélange de classe supérieure [Root.Religion.GetName] et de classe inférieure fétichiste. En garantissant la liberté d'exercer ces traditions et en révoquant l'ingérence gouvernementale dans leurs croyances, nous pouvons assurer le contentement des populations rurales."
 MONOPOLY_INCOME_IVORY_DESC:0 "de la production d'ivoire."
 MONOPOLY_INCOME_GOLD_DESC:0 "de la production d'or."
 estate_nobles_better_integration:0 "Politique d'Intégration de la [Root.GetNobilityOrFallbackName]"
 estate_nobles_better_integration_desc:1 "Centraliser l'État et annexer des sujets n'est pas une tâche facile car nos administrateurs et diplomates sont occupés par le processus d'intégration. Cela peut cependant être évité si nous permettons à la [Root.GetNobilityOrFallbackName] de prendre le contrôle de la politique d'intégration de notre pays."
 estate_maratha_better_integration:0 "Politique d'Intégration des [Root.GetMarathaOrFallbackName]"
 estate_maratha_better_integration_desc:0 "Centraliser l'État et annexer des sujets n'est pas une tâche facile car nos administrateurs et diplomates sont occupés par le processus d'intégration. Cela peut cependant être évité si nous permettons aux [Root.GetMarathaOrFallbackName] de prendre le contrôle de la politique d'intégration de notre pays."
 estate_rajput_better_integration:0 "Politique d'Intégration des [Root.GetRajputOrFallbackName]"
 estate_rajput_better_integration_desc:0 "Centraliser l'État et annexer des sujets n'est pas une tâche facile car nos administrateurs et diplomates sont occupés par le processus d'intégration. Cela peut cependant être évité si nous permettons aux [Root.GetRajputOrFallbackName] de prendre le contrôle de la politique d'intégration de notre pays."
 estate_church_religious_diplomats:0 "Diplomates Religieux"
 estate_church_religious_diplomats_desc:1 "La bonne diplomatie est difficile à atteindre. Il suffit de quelques simples malentendus et la relation entre deux pays s'effondre.\nEn envoyant des diplomates très religieux à nos frères dans la foi, nous pouvons au moins empêcher cette situation de se produire."
 estate_brahmins_religious_diplomats:0 "Diplomates Religieux"
 estate_brahmins_religious_diplomats_desc:0 "La bonne diplomatie est difficile à atteindre. Il suffit de quelques simples malentendus et la relation entre deux pays s'effondre.\nEn envoyant des diplomates très religieux à nos frères dans la foi, nous pouvons au moins empêcher cette situation de se produire."
 estate_church_heir_shrine:0 "Construire des Sanctuaires pour les Héritiers"
 estate_church_heir_shrine_desc:0 "Habituellement les cultes sont une affaire de nos [Root.Monarch.GetTitle] et non de leurs héritiers. Cela peut cependant être changé en construisant des sanctuaires qui servent à nos héritiers de retraite religieuse, leur permettant d'exprimer leur propre croyance dans un certain culte."
 estate_burghers_hydraulic_rights:0 "Droits Hydrauliques"
 estate_burghers_hydraulic_rights_desc:0 "La distribution de l'eau a toujours été un sujet qui préoccupe les villages éloignés. En permettant à la [Root.GetBurghersName] de prendre un contrôle plus direct sur les droits d'eau, nous pouvons assurer une distribution équitable et efficace de l'accès à l'eau."
 estate_burghers_enslaving_rights_gt:0 "Réduire le coût de développement dû au type de terrain de chaque province §YDésert§!, §YDésert Côtier§!, §YSteppes§! et §YSavane§! possédée de §G50,0 %§!."
 estate_burghers_enslaving_rights_rt:0 "Retirer la réduction du coût de développement de chaque province §YDésert§!, §YDésert Côtier§!, §YSteppes§! et §YSavane§! possédée."
 estate_nobles_cawa_peace_keepers:1 "Assigner des Gardiens de la Paix Cawa"
 estate_nobles_cawa_peace_keepers_desc:0 "Les Cawa sont la force d'élite et la classe guerrière noble d'Éthiopie. En leur accordant certains privilèges, nous pouvons nous assurer qu'ils utilisent leurs compétences pour maintenir la paix dans nos provinces éloignées."
 estate_nobles_cawa_offensive_fighters:0 "Assigner des Conquérants Cawa"
 estate_nobles_cawa_offensive_fighters_desc:0 "Les Cawa sont la force d'élite et la classe guerrière noble d'Éthiopie. En leur accordant certains privilèges, nous pouvons nous assurer qu'ils utilisent leurs compétences pour briser les forts de nos ennemis."
 eth_estate_did_not_have_cawa_privilege_for_five_years:1 "Nous n'avons pas choisi de privilège d'assignation Cawa au cours des §Y5 dernières années§!."
 estate_church_embrace_singluar_cult:0 "Adopter un Culte Unique"
 estate_church_embrace_singluar_cult_desc:0 "Notre religion honore plusieurs cultes différents. Mais un seul d'entre eux est bien plus important que les autres. Nous devrions adopter un culte unique et faire de la divinité vénérée notre culte principal."
 estate_church_flexible_cults:0 "Culte Flexible"
 estate_church_flexible_cults_desc:0 "Notre religion est une collection de différentes croyances. En permettant aux chamans des différents cultes de se rencontrer régulièrement, nous pouvons changer notre croyance même au cours de la vie d'un seul souverain."
 estate_church_scholar_connections:0 "Établir des Écoles Religieuses"
 estate_church_scholar_connections_desc:0 "Inviter un érudit de l'une des autres écoles est lié à des investissements administratifs. En laissant le [Root.GetClergyName] établir des écoles religieuses, nous pouvons assurer une intégration plus facile des nombreux érudits dans notre pays."
 estate_church_integrated_school:0 "Accorder une Résidence Locale à l'Érudit"
 estate_church_integrated_school_desc:0 "En accordant à un érudit d'un pays étranger une résidence dans nos frontières, nous pouvons assurer l'accès à ses connaissances sans avoir besoin d'affaires politiques."
 estate_nobles_neighbor_raids:0 "Raid de Voisinage"
 #Anbennar
 estate_nobles_neighbor_raids_desc:0 "Les forts gouvernent, les faibles servent : telle a toujours été la loi de notre peuple. Ceux qui peuvent, prennent. Ceux qui ne peuvent pas, donnent. Nous sommes entourés de donneurs, et en accordant à nos guerriers les moyens de subjuguer les peuples conquis, nous pouvons assurer de nouveaux gains de main-d'œuvre pour le [Root.GovernmentName]."
 estate_nobles_decentralized_tribe:0 "Confédération Décentralisée"
 estate_nobles_decentralized_tribe_desc:0 "L'État de [Root.GetName] est composé de plusieurs États vassaux, tous gouvernés par la [Root.GetNobilityOrFallbackName]. Les tribus internes peuvent avoir moins de marge de manœuvre que les vassaux normaux, mais l'absolutisme du souverain est sans aucun doute sapé à moins que des efforts de centralisation ne soient faits."
 estate_nobles_decentralized_tribe_tt:0 "Ce privilège est révoqué en accordant à la [Root.GetNobilityOrFallbackName] le privilège « §YRévoquer le Privilège Tribal§! »."
 estate_nobles_tribe_unification:0 "Révoquer les Privilèges Tribaux"
 estate_nobles_tribe_unification_desc:0 "[Root.GetName] reçoit de grands efforts de centralisation, révoquant les privilèges de la [Root.GetNobilityOrFallbackName] au pouvoir. Bien que le pouvoir des tribus confédérées au sein de [Root.GetName] soit toujours indéniable, cela fait place à la centralisation complète du [Root.GovernmentName] et au renforcement de l'autorité du [Root.Monarch.GetTitle]."
 estate_nobles_tribe_unification_tt:0 "Ce privilège est révoqué en accordant à la [Root.GetNobilityOrFallbackName] le privilège « §YCentraliser les Tribus§! »."
 estate_nobles_tribe_centralization:0 "Centraliser les Tribus"
 estate_nobles_tribe_centralization_desc:0 "Le temps est venu de dissoudre la confédération tribale et de centraliser le pouvoir !"
 can_not_have_tributaries:0 "Nous ne sommes pas en mesure d'établir des §YÉtats Tributaires§!."
 estate_nobles_grant_power_to_the_bashorun:0 "Accorder le Pouvoir au Bashorun"
 estate_nobles_grant_power_to_the_bashorun_desc:0 "Le Bashorun est le chef de la [Root.GetNobilityOrFallbackName] et contrôle le pouvoir du [Root.Monarch.GetTitle]. En accordant un pouvoir supplémentaire de gouvernance et d'organisation au Bashorun, nous pouvons assurer la stabilité de [Root.GetName] même pendant le règne de souverains inaptes."
 ###TRADE MODIFIER###
