 ###JUDAISM MODIFIERS###
 judaism_abrahamic_roots:0 "Racines Abrahamiques"
 desc_judaism_abrahamic_roots:0 "Cette province embrasse les Racines Abrahamiques que les résidents et le suzerain juif ont en commun. En tant que telle, la tolérance dont jouissent les chrétiens et musulmans dans cette province les rend plus productifs qu'autrement."
 judaism_community_wrong_culture:0 "Communauté Unie"
 desc_judaism_community_wrong_culture:0 "Cette province a surmonté les différences culturelles avec son suzerain et se voit d'abord comme Juifs, se connectant avec le propriétaire de la province."
 judaism_community_same_culture_group:0 "Communauté Unie"
 desc_judaism_community_same_culture_group:0 "Cette province a surmonté les différences culturelles avec son suzerain et se voit d'abord comme Juifs, se connectant avec le propriétaire de la province."
 judaism_yom_kippur_aspect_war_modifier:0 "Yom Kippour"
 desc_judaism_yom_kippur_aspect_war_modifier:0 "La guerre est venue, mais notre peuple persévérera. Les enseignements du passé nous aident à endurer les difficultés de la guerre."
 judaism_yom_kippur_aspect_defensive_war_modifier:0 "Appel aux Armes"
 desc_judaism_yom_kippur_aspect_defensive_war_modifier:0 "Les ennemis de notre peuple sont à notre porte essayant de nous conquérir. Chacun de nous est prêt à combattre les envahisseurs !"
 ###MECHANIC MODIFIERS###
 itinerant_capital_area:0 "Zone de Capitale Itinérante"
 desc_itinerant_capital_area:1 "Cette province fait partie de la zone qui abrite la capitale itinérante."
 itinerant_capital_just_moved:0 "Réorganisation de la Capitale"
 desc_itinerant_capital_just_moved:0 "Notre Capitale Itinérante a été déplacée récemment. Les tentatives de déplacer à nouveau la capitale sont très coûteuses dans un avenir prévisible."
 has_invited_scholar_recently:0 "A Invité un Érudit"
 desc_has_invited_scholar_recently:0 "Nous avons actuellement déjà un érudit et ne pouvons pas en recruter un autre."
 ###IDEAS###
 ZAN_ideas:0 "Idées Kilwanes"
 ZAN_ideas_start:0 "Traditions Kilwanes"
 ZAN_ideas_bonus:0 "Ambition Kilwane"
 zan_kilwa_latitude_staves:0 "Bâtons de Latitude Kilwans"
 zan_kilwa_latitude_staves_desc:0 "Notre technologie navale supérieure nous permet de naviguer plus loin et mieux que n'importe lequel de nos concurrents, nous donnant l'avantage."
 zan_shirazis_legacy:0 "Héritage des Shirazi"
 zan_shirazis_legacy_desc:0 "Notre fondateur ancestral venait de Chiraz, fils de l'Émir de Perse, ce qui ne laisse aucune possibilité de douter de notre droit de régner."
 zan_the_deal_with_almuli:0 "L'Accord avec le Roi Almuli"
 zan_the_deal_with_almuli_desc:0 "Nous avons obtenu notre île du Roi Almuli, notre réputation de négociateurs équitables devrait être claire pour tous."
 zan_gold_of_sofala:0 "Or de Sofala"
 zan_gold_of_sofala_desc:0 "L'or de Sofala a toujours été l'une de nos principales sources de richesse, nous sommes habitués à avoir une économie autour."
 zan_trade_center_of_zanzibar:0 "Marchands de Zanzibar"
 zan_trade_center_of_zanzibar_desc:0 "Zanzibar a toujours été un point de convergence pour les marchands, ils viennent de partout pour commercer ici."
 zan_center_of_migration:0 "Centre de Migration"
 zan_center_of_migration_desc:0 "Avec l'augmentation du commerce, il y a aussi un flux accru de personnes, ce qui signifie que nos cités se développent encore plus."
 zan_kilwa_the_melting_pot:0 "Creuset Culturel"
 zan_kilwa_the_melting_pot_desc:0 "Avec le commerce qui coule à travers notre terre, il y a aussi un flux et un échange accru d'idées. Nous pouvons apprendre de tous les coins du monde."
 ###MODIFIERS###
 eth_accepted_society:0 "Société Acceptée"
 desc_eth_accepted_society:0 "Le peuple juif de cette province est traité comme s'ils étaient Coptes."
 hau_hausa_conquest:0 "Conquête Haoussa"
 desc_hau_hausa_conquest:0 "Cette province a été subjuguée par les Haoussa. Malgré ce fait, les gens locaux jouissent de plus de libertés qu'attendu."
 desc_eth_blessing_of_kings:0 "Pour des raisons inexplicables, notre dynastie régnante semble être bénie de fortune et de chance."
 estate_nobles_neighbor_raids_fort:0 "Forteresse Pillée"
 desc_estate_nobles_neighbor_raids_fort:0 "Le fort a été pillé récemment. Il ne possède ni personnel vétéran ni objets de valeur dignes d'un second raid."
 gathers_soldiers_for_the_ruler:0 "Rassemblement des Troupes"
 desc_gathers_soldiers_for_the_ruler:0 "Cette province est actuellement occupée à rassembler des soldats. Les tâches de moindre priorité doivent attendre."
 internal_marriage:0 "Mariage Interne"
 desc_internal_marriage:0 "Notre souverain a épousé un conjoint de l'un des royaumes internes."
 msi_federal_kingdom_focus:0 "Privilèges pour les Royaumes"
 desc_msi_federal_kingdom_focus:0 "Nous avons décidé de concentrer nos efforts sur l'augmentation de la loyauté des royaumes confédéraux."
 msi_federal_kingdom_focus_desc:0 "dure jusqu'à ce que « §YRoyaume Confédéral Mossi§! » soit révoqué."
 msi_centralization_focus:0 "Centralisation des Mossi"
 desc_msi_centralization_focus:0 "Nous avons décidé de concentrer nos efforts sur l'augmentation de la centralisation de notre État."
 msi_centralization_focus_desc:0 "dure jusqu'à ce que « §YRoyaume Confédéral Mossi§! » soit sélectionné."
 city_of_401_deities:1 "Cité des Quatre Cent Une Divinités"
 desc_city_of_401_deities:1 "Ile Ife est la célèbre Cité des Quatre Cent Une Divinités, et un lieu saint pour de nombreux peuples des fois traditionnelles africaines."
 hau_chief_of_power:0 "Cité du Gouvernement"
 desc_hau_chief_of_power:0 "Cette cité est le lieu historique de pouvoir pour les Haoussa. Peu importe l'état actuel de la capitale, cette province est d'une grande importance dans l'histoire haoussa."
 hau_chiefs_of_market:0 "Cité des Marchés"
 desc_hau_chiefs_of_market:0 "Cette cité est le lieu historique des marchés pour les Haoussa. Elle attire le commerce de toute l'Afrique de l'Ouest."
 hau_chief_of_war:0 "Cité de Guerre"
 desc_hau_chief_of_war:0 "Cette cité est le lieu historique de guerre pour les Haoussa. Des armes y sont créées, des soldats y sont entraînés."
 hau_chiefs_of_indigo:0 "Cité de l'Indigo"
 desc_hau_chiefs_of_indigo:0 "Cette cité est le lieu historique de l'indigo pour les Haoussa. Elle a été d'une grande valeur pour les peuples d'Afrique de l'Ouest, et est maintenant à nouveau un centre pour les teintures dans cette région."
 hau_chief_of_slaves:0 "Cité des Esclaves"
 desc_hau_chief_of_slaves:0 "Cette cité est le lieu historique des esclaves pour les Haoussa. De grands bâtiments ont été construits en utilisant des esclaves de cette région."
 zul_provocated_locals:0 "Troubles Nguni"
 desc_zul_provocated_locals:0 "Les Nguni de cette province ont été forcés au service militaire par des forces extérieures à leur culture. Ils pourraient exprimer leur mécontentement sous la forme d'une révolte à l'avenir."
 hau_city_builders:0 "Bâtisseurs de Cités"
 desc_hau_city_builders:0 "Nous sommes indubitablement la plus grande et la plus influente des cités haoussa."
 hau_the_jiihad:0 "Le Djihad"
 desc_hau_the_jiihad:0 "C'est notre devoir sacré de s'opposer à tous ceux qui nient les enseignements du Prophète."
 hau_caliphate_of_the_sahel:0 "Califat du Sahel"
 desc_hau_caliphate_of_the_sahel:0 "Nous sommes devenus le Califat incontesté de tout le Sahel."
 aju_gold_trade_deal_refused:0 "Focus sur notre Propre Économie"
 desc_aju_gold_trade_deal_refused:0 "Nous avons décidé de nous concentrer sur notre propre économie au lieu de faire un accord commercial avec notre allié, gardant tout l'or que nous faisons pour nous-mêmes."
 aju_gold_trade_deal_ajuuraan:0 "Accord Commercial sur l'Or"
 desc_aju_gold_trade_deal_ajuuraan:0 "Nous avons maintenant accès aux sources d'or d'un allié proche. Bien que l'or supplémentaire fasse pression sur notre économie, les métaux sont définitivement d'une grande utilité pour notre frappe de monnaie."
 aju_ajuuran_influence_in_java:0 "Influence Commerciale Ajuuraan"
 desc_aju_ajuuran_influence_in_java:0 "Cette province reçoit une influence commerciale d'Ajuuraan. Bien que le pouvoir commercial soit sapé par la présence de marchands étrangers, le pouvoir d'achat qu'ils apportent soutient substantiellement la production locale."
 warband_assembled:0 "Bande de Guerre Assemblée"
 desc_warband_assembled:0 "Nous avons assemblé une vraie bande de guerre, et maintenant nous pouvons montrer correctement notre force à nos rivaux !"
 w_african_modern_weapons:0 "Armes Modernes"
 desc_w_african_modern_weapons:0 "Nous avons acquis des armes à poudre pour nos guerriers, et maintenant nous pouvons même les fabriquer dans nos terres."
 w_african_unity_of_west_african:0 "Unité de l'Afrique de l'Ouest"
 desc_w_african_unity_of_west_african:0 "Nous avons triomphé là où le Mali a échoué, et maintenant toutes les terres et tous les peuples d'Afrique de l'Ouest sont réunis sous notre règne !"
 w_african_cult_collector:1 "Traditions Fétichistes"
 desc_w_african_cult_collector:1 "Notre peuple a embrassé les anciens rituels de notre foi et culture."
 w_african_shamans:0 "Chamans"
 desc_w_african_shamans:0 "Nos chamans ont répandu nos croyances parmi les terres voisines."
 w_african_fetishist_rights:0 "Droits Fétichistes"
 desc_w_african_fetishist_rights:0 "Notre peuple est plus uni en vénérant nos cultes traditionnels."
 w_african_tolerance:1 "Unité dans la Religion"
 desc_w_african_tolerance:1 "Nous avons affirmé la vraie foi en Afrique de l'Ouest ! La piété et la dévotion à Allah seront incontestées !"
 w_african_tolerance_fetishist:0 "Unité dans la Religion"
 desc_w_african_tolerance_fetishist:0 "Nous avons affirmé la vraie foi en Afrique de l'Ouest ! Les traditions et l'autorité de nos chamans seront incontestées !"
 w_african_defender_of_sunni_faith:0 "Défenseurs de la Foi Sunnite"
 desc_w_african_defender_of_sunni_faith:0 "Nous avons correctement uni notre peuple derrière notre foi islamique."
 w_african_missionaries:0 "Missionnaires"
 desc_w_african_missionaries:0 "Maintenant nous avons des gens désireux de répandre la foi parmi nos voisins."
 w_african_sunni_rights:1 "Marabout Local"
 desc_w_african_sunni_rights:0 "Nos marabouts ont répandu nos croyances parmi les terres voisines."
 w_african_tax_collectors:0 "Collecteurs d'Impôts"
 desc_w_african_tax_collectors:0 "Nous avons correctement collecté les tributs de nos voisins, comme il se doit."
 w_african_develop_modifier:0 "Défrichements et Irrigations"
 desc_w_african_develop_modifier:0 "Nous avons maintenant développé nos terres avec ce processus planifié de défrichements et d'irrigations."
 w_african_tolerance_desc:0 "Jusqu'à ce que nous changions de religion"
 estate_nobles_cawa_peace_keepers_modifier:0 "Gardiens de la Paix Cawa"
 desc_estate_nobles_cawa_peace_keepers_modifier:0 "Nos troupes Cawa se concentrent sur le maintien de la paix au sein de notre empire et la conservation de leurs forces pour l'avenir."
 estate_nobles_cawa_offensive_fighters_modifier:0 "Conquérants Cawa"
 desc_estate_nobles_cawa_offensive_fighters_modifier:0 "Nos troupes Cawa se concentrent sur le repoussement de l'ennemi loin des frontières impériales. Ils cherchent le combat et engagent l'ennemi de toutes leurs forces."
 jol_dominant_trade:0 "Expertise Commerciale"
 desc_jol_dominant_trade:0 "L'exécution des leçons que nous avons apprises des Européens nous permet de trouver du profit dans les accords commerciaux."
 jol_imperial_ambitions:0 "Victoire sur le Songhaï"
 desc_jol_imperial_ambitions:0 "Notre victoire sur la menace songhaïe apporte gloire et célébrité ! Ni les sujets ni les étrangers ne douteront de notre force !"
 jol_west_african_great_power:0 "Grande Puissance d'Afrique de l'Ouest"
 desc_jol_west_african_great_power:0 "Nous avons vaincu les plus grandes menaces en Afrique de l'Ouest, remplacé l'empire du Mali autrefois glorieux et nous sommes élevés au-dessus de tous nos concurrents. Vraiment, nous sommes la grande puissance d'Afrique de l'Ouest !"
 zim_nguni_militarization:0 "Militarisation Nguni"
 desc_zim_nguni_militarization:0 "Nous avons militarisé les Nguni et établi un programme de recrutement à l'échelle de l'État pour renforcer nos régiments."
 oyo_access_to_horses:0 "Accès aux Chevaux"
 desc_oyo_access_to_horses:0 "Nous avons maintenant accès aux chevaux, il est facile pour nous de former des régiments de cavalerie."
 oyo_empire:0 "Empire Oyo"
 desc_oyo_empire:0 "Nous sommes devenus un véritable Empire, personne ne le niera."
 oyo_shaman_gathering:0 "Rassemblement des Chamans"
 desc_oyo_shaman_gathering:0 "Les différents chamans de notre foi sont capables de tisser une vision unifiée des croyances de notre pays."
 zan_kilwan_embassy:0 "Ambassade Kilwane"
 desc_zan_kilwan_embassy:0 "Cette province abrite l'ambassade de Kilwa et sert de connexion diplomatique perso-africaine.\n\n§YLe modificateur est retiré si le propriétaire de la province change.§!"
 zan_persian_embassy:0 "Ambassade Perse"
 desc_zan_persian_embassy:1 "Cette province abrite l'ambassade de [2218.Owner.GetName] et sert de connexion diplomatique perso-africaine.\n\n§YLe modificateur est retiré si le propriétaire de la province change.§!"
 zan_embassy_desc:1 "dure jusqu'à ce que le propriétaire de la province change"
 zan_expansion_into_the_cape:0 "Expansion vers le Cap"
 desc_zan_expansion_into_the_cape:0 "Des aventuriers et explorateurs de notre pays se sont portés volontaires pour s'étendre vers le sud de l'Afrique afin de découvrir ses richesses cachées."
 zan_great_kilwa:0 "Grande Kilwa"
 desc_zan_great_kilwa:0 "La cité de Grande Kilwa a reçu un développement et des restaurations majeurs. Maintenant c'est la perle de la côte swahilie."
 zan_kilwan_trade_dominance:0 "Domination Commerciale Kilwane"
 desc_zan_kilwan_trade_dominance:0 "Nos marchands dominent le commerce du golfe d'Aden. Maintenant ils étendent leur influence dans d'autres nœuds commerciaux pour notre bénéfice."
 zan_master_of_the_trade:0 "Maître du Commerce"
 desc_zan_master_of_the_trade:0 "Aucun pays autre que nous n'a atteint la grandeur du commerce comme nous l'avons fait. Nous sommes le maître définitif du commerce africain et asiatique !"
 zan_conversion_of_fetishist:0 "Prise de Contrôle Swahili"
 desc_zan_conversion_of_fetishist:0 "Cette province a été prise en main par les Swahilis, qui tentent maintenant de convertir les locaux de cette zone."
 zan_riches_of_china:0 "Richesses de Chine"
 desc_zan_riches_of_china:0 "Les histoires des richesses de Chine ont conduit nombre de nos marchands à intensifier leurs tactiques commerciales afin d'obtenir une part de l'argent d'Asie."
 zan_trade_with_india:0 "Commerce Indien"
 desc_zan_trade_with_india:0 "Grâce aux expériences que nous faisons en Inde, notre commerce a atteint un nouveau niveau d'efficacité."
 zan_colonial_ambition:0 "Ambition Coloniale"
 desc_zan_colonial_ambition:0 "Bien que nous soyons fortement concentrés sur le commerce, nous ne pouvons pas oublier l'attrait de coloniser les îles sauvages, et… de libérer les biens précieux qu'elles possèdent."
 zan_australian_colony:1 "Colonisateurs Kilwans"
 desc_zan_australian_colony:1 "La colonisation de l'Australie motive notre peuple plus que jamais à déménager vers les nouveaux endroits de ce monde."
 msi_conquerors_of_west_africa:0 "Organisation Mossi"
 desc_msi_conquerors_of_west_africa:0 "Notre objectif est la subjugation et la conquête de toute l'Afrique de l'Ouest. En assignant les nombreux royaumes confédéraux à l'administration, nous pouvons assurer une campagne de conquête plus fluide."
 msi_west_african_hegemony:0 "Hégémon Ouest-Africain"
 desc_msi_west_african_hegemony:0 "Nous dominons la région ouest-africaine ! En tant que royaume le plus fort de cette région, il est naturel que nous revendiquions le titre d'hégémon régional !"
 msi_prepared_for_war:0 "Préparation à la Guerre"
 desc_msi_prepared_for_war:0 "Nous avons rassemblé nos troupes, recruté nos meilleurs généraux et préparé la machine de guerre de notre pays. Notre pays est prêt pour les grandes guerres à venir."
 msi_integrated_province:0 "Païens Intégrés"
 desc_msi_integrated_province:0 "Les païens de cette province jouissent de privilèges spéciaux en échange d'impôts uniques pour l'État mossi."
 msi_the_kingdom_federation:0 "Loyauté Confédérale"
 desc_msi_the_kingdom_federation:0 "Les royaumes au sein de notre royaume ont juré leur loyauté au [Root.Monarch.GetTitle], et le reconnaissent comme chef suprême des Mossi."
 aju_gold_trade_deal_ally:0 "Accord sur l'Or Ajuuraan"
 desc_aju_gold_trade_deal_ally:0 "Nous avons décidé d'accepter l'accord avec Ajuuraan, leur fournissant notre métal précieux pour leurs frappes de monnaie."
 kon_great_power:0 "Suprématie sur une Grande Puissance"
 desc_kon_great_power:0 "Contre toute attente, notre pays a réussi à remporter une victoire décisive contre l'une des grandes puissances de ce monde ! Gloire à [Root.GetName] !"
 ###EVENTS###
 #EAST AFRICAN MISSIONS
 east_africa_economic_base_title:0 "Créer une Base Économique"
 east_africa_economic_base_desc:0 "Pour que notre peuple progresse, nous devons établir une fondation économique solide et bonne. Économisons de l'or et créons des entreprises génératrices de revenus."
 east_africa_trade_consolidation_title:0 "Consolidation Commerciale"
 east_africa_trade_consolidation_desc:0 "Nos terres et celles environnantes sont pleines de ressources que d'autres nations désirent. Nous pouvons définitivement réaliser leurs souhaits. Pour un prix, bien sûr."
 east_africa_dominate_tn_title:0 "Dominer le Nœud Commercial"
 east_africa_dominate_tn_desc:0 "En tant que nation commerçante émergente, nous devons contrôler les plus grands centres commerciaux de notre zone pour assurer cette domination."
 east_africa_trading_navy_title:0 "Une Marine Commerciale"
 east_africa_trading_navy_desc:0 "Nos principaux partenaires commerciaux sont loin de nous. En construisant des navires, nous pouvons naviguer vers leurs rivages au lieu d'attendre qu'ils viennent à nous et fixent les conditions de vente nous-mêmes."
 east_africa_commercial_treaties_title:0 "Traités Commerciaux"
 east_africa_commercial_treaties_desc:1 "Traditionnellement, nos principaux partenaires commerciaux étaient d'Arabie ou d'Inde du Sud. Si nous envoyons nos marchands et créons une forte présence sur leurs propres marchés domestiques, nous serons en mesure de négocier depuis une position plus puissante."
 east_africa_zheng_he_title:0 "Zheng He Inversé"
 east_africa_zheng_he_desc:0 "Il n'y a pas si longtemps, un amiral de la lointaine nation de Chine a visité nos rivages. Encore aujourd'hui, il y a des descendants des marins de cette flotte qui sont restés dans nos terres. Notre nation est puissante maintenant et nous pouvons leur rendre visite. Ce ne sera pas seulement une visite de courtoisie, mais un moyen d'assurer un approvisionnement constant de porcelaine pour notre royaume."
 chinese_trade_agreement:0 "Accord Commercial Chinois"
 east_africa_rising_lion_title:0 "Un Lion Montant"
 east_africa_rising_lion_desc:0 "Aucune nation n'est respectée s'il n'y a pas une puissante armée pour la défendre. Nous enrôlerons les meilleurs hommes de nos terres et créerons une puissante armée qui fera réfléchir à deux fois quiconque avant de nous mettre en colère."
 east_africa_hear_me_roar_title:0 "Entendez-Moi Rugir"
 east_africa_hear_me_roar_desc:0 "Une nation commerçante dominante a besoin de deux choses pour imposer sa volonté : des ports et des terres. Nous devons contrôler à la fois la terre et la mer."
 east_africa_international_influence_title:0 "Influence Internationale"
 east_africa_international_influence_desc:1 "Notre force est évidente, mais si d'autres pays ne reconnaissent pas notre grandeur, sa valeur est moindre. Nous enverrons des ambassades à d'autres grandes nations et serons reconnus comme une vraie puissance."
 international_influence.tooltip:0 "Au moins §Y2§! Grandes Puissances :\nAlliance avec §Y[Root.GetName]§!.\nOnt au moins §Y150§! d'opinion de §Y[Root.GetName]§!."
 east_africa_lion_king_title:0 "Le Roi Lion"
 east_africa_lion_king_desc:0 "Seulement en contrôlant notre région pourrons-nous nous appeler rois marchands. Conquête ou diplomatie, peu importe. Toutes les nations autour s'inclineront ou périront."
 east_africa_horn_trade_title:0 "Commerce de la Corne de l'Afrique"
 east_africa_horn_trade_desc:0 "Le détroit de Bab al-Mandab est un point d'étranglement commercial proche qui doit être contrôlé par notre nation si nous voulons devenir une grande nation commerçante. Nous n'avons pas besoin de conquérir comme des fous, juste de tenir les provinces appropriées."
 east_africa_horn_trade_tooltip:0 "Nous recevrons des revendications dans plusieurs ports de la région du nœud commercial d'Aden."
 east_africa_eastern_trade_title:0 "Routes Commerciales Orientales"
 east_africa_eastern_trade_desc:0 "La Chine et les épices orientales passent toutes par l'Inde du Sud. Si nous prenons quelques ports dans la zone, nous serons en mesure de détourner ces produits précieux plus facilement vers notre nœud domestique."
 east_africa_eastern_trade_tooltip:0 "Nous recevrons des revendications dans plusieurs ports de la région du nœud commercial de Coromandel."
 east_africa_modern_army_title:0 "Une Armée Moderne"
 east_africa_modern_army_desc:0 "Une Grande Nation ne peut pas être appelée ainsi si son armée et sa marine ne sont pas parmi les meilleures. Nous moderniserons nos troupes et nos navires pour qu'ils soient craints partout."
 east_africa_modern_nation_title:0 "Influenceur de Nations"
 east_africa_modern_nation_desc:0 "En étant la nation leader, nous pouvons influencer les tendances et les façons des nations qui nous connaissent. Ils nous regarderont avec un mélange d'envie et d'admiration."
 east_africa_big_treasury_title:0 "Grand Trésor"
 east_africa_big_treasury_desc:0 "Nous devons collecter autant d'argent que possible afin de créer une bonne base pour devenir une Grande Puissance."
 #EAST AFRICAN MODIFIERS
 east_africa_blooming_nation:0 "Nation Florissante"
 desc_east_africa_blooming_nation:0 "Comme une fleur, notre nation s'épanouit et devient un joyau dans la région, regardée avec envie et admiration par nos voisins."
 east_africa_trading_hub:0 "Carrefour Commercial"
 desc_east_africa_trading_hub:0 "Alors que le commerce commence à inonder nos cités de marchands de partout, de nombreux endroits à travers notre nation commencent à prospérer."
 east_africa_trading_hub_tooltip:0 "Pour le reste de la campagne, une province possédée dans votre nœud commercial domestique obtiendra :\nCoût de mise à niveau du centre commercial : §G-20 %§!\nPouvoir commercial local : §G+10,00§!"
 east_africa_money_calls_money:0 "L'Argent Appelle l'Argent"
 desc_east_africa_money_calls_money:0 "Économiser de l'argent nous a permis d'améliorer nos méthodes pour créer plus d'argent de manière intelligente avec les bons investissements."
 east_africa_modern_army:0 "Armée Moderne"
 desc_east_africa_modern_army:0 "Nous avons enseigné à nos troupes sur terre et en mer les avantages de la discipline et des tactiques modernes. Ces leçons assureront que nos forces armées soient craintes par nos ennemis pendant longtemps."
 east_africa_modern_nation:0 "Nation Moderne"
 desc_east_africa_modern_nation:0 "Les tendances ont changé. Alors que dans le passé nous regardions les autres avec émerveillement, nous sommes maintenant le modèle à suivre. Des ambassades de partout viennent nous visiter pour apprendre de nos méthodes."
 east_africa_commercial_routes:0 "Routes Commerciales"
 desc_east_africa_commercial_routes:0 "Avec une forte marine commerciale, chaque rivage distant semble plus proche, facilitant notre accès à de nouvelles richesses et notre capacité à exporter nos produits."
 east_africa_attracting_capital:0 "Attirer les Capitaux"
 desc_east_africa_attracting_capital:1 "Notre capitale a attiré beaucoup de gens et d'investissements, la faisant grandir. La richesse est telle que les provinces voisines en bénéficient aussi."
 east_africa_indian_trade:0 "Commerce Indien"
 desc_east_africa_indian_trade:0 "Notre stratégie de comptoirs commerciaux redirige les routes commerciales d'Inde du Sud, envoyant vers nos rivages les richesses de cette nation pour notre propre bénéfice."
 east_africa_fearless_army:0 "Armée Intrépide"
 desc_east_africa_fearless_army:0 "Nos troupes sont préparées au combat, conscientes de leur supériorité contre nos pathétiques ennemis."
 east_africa_big_friends:0 "Grands Amis"
 desc_east_africa_big_friends:0 "Se lier d'amitié avec d'autres grandes puissances nous protégera pendant que nous devenons plus forts. Peut-être pourrons-nous même les poignarder dans le dos à l'avenir…"
 east_africa_regional_hegemon:0 "Hégémon Régional"
 desc_east_africa_regional_hegemon:1 "Aucun pays de notre région n'est plus puissant que nous. L'opposition interne et externe n'a aucune chance contre notre appareil d'État. Nous sommes des leaders et nous continuerons à diriger pendant mille ans."
 ###CENTRAL AFRICAN GENERIC MISSIONS
 c_a_prepare_for_war_mission_title:0 "Se Préparer à la Guerre"
 c_a_prepare_for_war_mission_desc:0 "Nous sommes entourés de nombreux pays qui à tout moment pourraient devenir nos ennemis potentiels. Nous devons nous y préparer."
 c_a_war_mission_title:0 "Profiter de la Guerre"
 c_a_war_mission_desc:0 "Nous devons piller nos ennemis pour gagner leurs ressources, nous les garderons faibles et nous rendrons plus forts. Ensuite ils seront beaucoup plus faciles à écraser plus tard."
 c_a_conquest_mission_title:0 "Étendre notre Pays"
 c_a_conquest_mission_desc:0 "Nos ennemis sont implacables et sans fin, seulement en les éliminant un par un et en devenant plus forts à leurs dépens pourrons-nous affronter les plus grandes menaces. Étendre notre territoire n'est que la première étape sur notre chemin vers la gloire."
 c_a_become_empire_mission_title:0 "Devenir un Empire"
 c_a_become_empire_mission_desc:0 "Nous sommes plus grands et plus forts que jamais, mais ce n'est toujours pas suffisant ! Nous devons atteindre le pinacle du pouvoir et revendiquer notre droit légitime de régner sur tous nos ennemis. Nous devons devenir un véritable empire glorieux."
 c_a_train_army_mission_title:0 "Entraîner l'Armée"
 c_a_train_army_mission_desc:1 "Si nous devons survivre et vaincre quiconque ose s'opposer à nous, nous ne pouvons pas le faire avec une populace qui peut à peine distinguer le bout pointu de la lance de l'autre. Nous devons les transformer en une vraie armée."
 c_a_military_hegemon_mission_title:0 "Avoir la Suprématie Militaire"
 c_a_military_hegemon_mission_desc:0 "Notre glorieuse armée nous a bien servis, mais elle n'est toujours pas assez puissante pour atteindre nos objectifs. Nous devons l'agrandir et en faire une force considérable, digne de la peur de nos ennemis."
 c_a_military_hegemon_mission_ct:0 "Avoir la plus grande armée dans les régions §YAfrique Centrale§! et §YKongo§!."
 c_a_ally_big_mission_title:0 "Se Lier d'Amitié avec les Gros Poissons"
 c_a_ally_big_mission_desc:0 "Bien que nous soyons entourés d'ennemis potentiels, il est clair que certains d'entre eux sont plus préoccupants que d'autres. Peut-être pourrions-nous stratégiquement nous mettre du bon côté de ceux-là et devenir leurs amis avant qu'ils ne décident de nous écraser. Au moins, jusqu'à ce que nous décidions de les écraser."
 c_a_ally_big_mission_ct:0 "Avoir un allié avec au moins §Y150§! d'opinion de §Y[Root.GetName]§! qui est soit §YKongo§!, §YMutapa§! ou §YKilwa§!, ou a plus de §Y100§! de développement."
 c_a_loyal_ally_mission_title:0 "Être un Allié Loyal"
 c_a_loyal_ally_mission_desc:0 "Nous avons réussi à nous assurer quelques alliés, il nous faut désormais gagner leur confiance. Plus ils nous feront confiance, plus nous tirerons d'avantages de cette alliance, et plus il nous sera aisé de les trahir ultérieurement si le besoin s'en fait sentir."
 c_a_get_vassals_mission_title:0 "Acquérir des vassaux"
 c_a_get_vassals_mission_desc:0 "À quoi bon être aussi puissants que nous le sommes si nous n'avons personne sur qui exercer notre pouvoir ? Avoir d'autres pays qui s'inclinent devant nous montrera clairement au monde notre véritable puissance."
 c_a_humiliate_rival_mission_title:0 "Humilier un rival"
 c_a_humiliate_rival_mission_desc:0 "Nos ennemis ont été trop longtemps une épine dans notre flanc, il est temps que cela prenne fin. Nous devons leur porter un coup si décisif qu'ils n'oseront plus jamais se dresser sur notre chemin."
 c_a_humiliate_rival_mission_ct:0 "Avoir §Y100§! de score de guerre dans une guerre contre un rival ou un ennemi"
 c_a_get_cults_mission_title:0 "S'instruire des traditions"
 c_a_get_cults_mission_desc:1 "Nos voisins ne partagent pas toujours les mêmes croyances religieuses que nous. Nos traditions ont toujours été variées, il n'est donc guère surprenant que d'autres visions de certains aspects existent parmi nos frères. Nous devrions apprendre autant que possible d'eux."
 c_a_contact_muslims_mission_title:0 "Contacter les musulmans"
 c_a_contact_muslims_mission_desc:0 "Parmi nos voisins, il en est qui ont une vision du monde radicalement différente de la nôtre. Ils disent suivre les enseignements du Prophète, qui nous sont totalement étrangers. Nous devons entretenir des relations étroites avec eux, car nous pourrions avoir beaucoup à apprendre."
 c_a_contact_muslims_mission_ct:1 "Avoir un allié du groupe religieux §Ymusulman§! avec §Y200§! d'opinion envers §Y[Root.GetName]§!."
 c_a_expand_religion_mission_title:0 "Étendre nos vues religieuses"
 c_a_expand_religion_mission_desc:0 "Nos croyances et notre vision du monde sont manifestement les seules vraies. Quiconque prétend le contraire est simplement trop aveugle pour voir la vérité. Nous devons les atteindre si nous voulons leur ouvrir les yeux."
 c_a_expand_religion_mission_ct:0 "Être limitrophe d'une province qui n'est pas de religion §Y[Root.Religion.GetName]§!"
 c_a_convert_mission_title:0 "Les ramener dans le giron"
 c_a_convert_mission_desc:0 "Beaucoup de gens sont encore des insensés qui ne partagent pas nos croyances. Cela ne saurait perdurer, nous devons leur faire voir l'erreur de leurs voies et les faire adhérer à la seule vérité."
 c_a_convert_mission_tt:1 "Convertir §Y10§! provinces (§Y[Root.GetNumConvertedProvinces]§!/§Y10§!)"
 c_a_improve_infrastructure_title:0 "Améliorer les infrastructures"
 c_a_improve_infrastructure_desc:0 "Bien que le pillage de nos voisins ait longtemps été une part importante de notre économie, nous devrions améliorer nos propres infrastructures pour accroître notre production de richesses. Nous devons être capables d'avoir une économie solide et autosuffisante qui ne dépende pas de voisins à piller."
 ###CENTRAL AFRICAN GENERIC MISSIONS MODIFIERS
 c_a_preparing_for_war:0 "Préparatifs de guerre"
 desc_c_a_preparing_for_war:0 "Nous avons rassemblé une armée, il est temps de la mettre à l'œuvre"
 c_a_training:0 "Entraînement de l'armée"
 desc_c_a_training:0 "Maintenant que notre armée est pleinement entraînée, elle est devenue une force redoutable"
 c_a_hegemon:0 "Hégémonie militaire"
 desc_c_a_hegemon:0 "Nous sommes devenus le pays le plus puissant de la région. Il est évident que toutes les terres devraient s'incliner devant nous"
 c_a_spoils_of_war:0 "Butin de guerre"
 desc_c_a_spoils_of_war:0 "Piller nos voisins pour s'enrichir est le meilleur moyen de développer notre économie"
 c_a_vassals:0 "Vassaux loyaux"
 desc_c_a_vassals:0 "Avoir acquis tant de vassaux a montré à tous que nous sommes diplomatiquement puissants"
 c_a_humiliated_rival:0 "Rivaux humiliés"
 desc_c_a_humiliated_rival:0 "Avoir porté un coup si décisif à nos rivaux garantit qu'ils réfléchiront à deux fois avant de s'opposer à nous de nouveau"
 c_a_only_truth:0 "La seule vérité"
 desc_c_a_only_truth:0 "Nos croyances sont la seule vérité qui soit, nous devons en convaincre les autres."
 c_a_united_cults:0 "Cultes unifiés"
 desc_c_a_united_cults:0 "Nos différents cultes ont enfin été unifiés, nous sommes devenus Un"
 ###GENERIC HORN OF AFRICA MISSIONS###
 gen_hoa_building_religious_alliances_title:0 "Alliances religieuses"
 gen_hoa_building_religious_alliances_desc:0 "Le monde a toujours été dangereux et imprévisible. Nous devons bâtir des relations durables avec ceux qui partagent nos valeurs et nos croyances."
 building_religious_alliances.tooltip:0 "Au moins §Y2§! pays du même groupe religieux :\nAlliance avec §Y[Root.GetName]§!.\nAvoir au moins §Y150§! d'opinion envers §Y[Root.GetName]§!."
 gen_hoa_subjugate_heathens_title:0 "Soumettre les païens"
 gen_hoa_subjugate_heathens_desc:0 "De nombreuses tribus et États païens menacent notre peuple et nos alliés ; s'ils devaient unir leurs forces, ils pourraient représenter une menace sérieuse. Nous devons les affaiblir avant que cela n'arrive en les soumettant à notre poing vertueux."
 gen_hoa_heretic_convert_cost_modifier:0 "Clergé aguerri"
 desc_gen_hoa_heretic_convert_cost_modifier:0 "Le clergé de la Corne est constamment confronté à des païens et des hérétiques qui résistent à ses enseignements ; cette lutte perpétuelle en fait de grands défenseurs de la foi."
 gen_hoa_convert_60_provinces_tooltip_tt:1 "Les provinces de la région §YCorne de l'Afrique§! doivent professer la religion §Y[Root.Religion.GetName]§!."
 gen_hoa_convert_30_provinces_tooltip_tt:0 "A converti au moins 30 provinces dans la région."
 gen_hoa_join_forces_title:0 "Unir nos forces"
 gen_hoa_join_forces_desc:0 "Le chemin a été long et difficile pour nos vassaux, mais ils sont désormais prêts. Nous les accueillons à bras ouverts dans notre grand État et ensemble nous apporterons foi et prospérité à cette terre."
 gen_hoa_join_forces.tooltip:0 "Le pays a diplomatiquement annexé tous ses vassaux païens."
 gen_hoa_become_great_power_title:0 "Lumière de la Corne"
 gen_hoa_become_great_power_desc:0 "Le monde est bien plus vaste aujourd'hui qu'à l'époque de nos ancêtres. Les grandes puissances façonnent la terre selon leur volonté. Nous ne pouvons permettre à ces géants sans foi d'en faire ce qu'ils veulent ; nous devons plutôt nous rassembler, reprendre le flambeau de la foi et guider le fier peuple de la Corne de l'Afrique vers le paradis."
 gen_hoa_great_power_modifier:0 "Lumière de la Corne"
 desc_gen_hoa_great_power_modifier:0 "La grande puissance qui guide le peuple de la Corne de l'Afrique est connue et respectée aux quatre coins du monde."
 gen_hoa_prepare_for_war_title:0 "Préparer la guerre"
 gen_hoa_prepare_for_war_desc:0 "Au-delà de nos frontières, nous avons encore de nombreux ennemis, des païens qui suivent des dieux terrifiants et veulent notre perte. Nous devons rassembler nos forces aussi vite que possible et nous préparer à une guerre inévitable."
 gen_hoa_attack_the_heathens_title:0 "Attaquer les païens"
 gen_hoa_attack_the_heathens_desc:0 "Les efforts de notre peuple ont porté leurs fruits et notre armée est enfin prête à défendre notre patrie. Maintenant que nous avons l'avantage, nous devons attaquer les païens et nous emparer des ressources qu'ils accumulent avant qu'ils ne puissent s'unir et nous attaquer."
 gen_hoa_attack_the_heathens.tooltip:0 "A sa capitale dans la §YCorne de l'Afrique§!."
 gen_hoa_horn_bravery_modifier:0 "Bravoure des fidèles"
 desc_gen_hoa_horn_bravery_modifier:0 "Nos guerriers sont célèbres pour leur férocité et leur impitoyabilité envers les ennemis de notre foi."
 gen_hoa_expand_borders_title:0 "Étendre nos frontières"
 gen_hoa_expand_borders_desc:0 "Les frontières de notre État ne sont pas assez vastes pour englober notre grand destin, nous devons les étendre et exploiter toutes les ressources disponibles pour accomplir nos rêves d'un avenir sûr et prospère."
 gen_hoa_unify_the_horn_of_africa_title:0 "Unifier la Corne de l'Afrique"
 gen_hoa_unify_the_horn_of_africa_desc:0 "Les temps de troubles et de guerre entre les peuples de la Corne touchent à leur fin. Nous unirons chaque tribu et chaque peuple sous notre bannière et les conduirons vers un avenir prospère et paisible."
 gen_hoa_unify_horn_modifier:0 "Corne unifiée"
 desc_gen_hoa_unify_horn_modifier:0 "Tous se réjouissent maintenant que la Corne de l'Afrique est enfin unie sous un État commun."
 gen_hoa_favor_church_title:1 "Favoriser [Root.GetChurchOrFallbackName]"
 gen_hoa_favor_church_desc:1 "Notre région a toujours été divisée et le peuple dupé par de faux cultes. Mettons-y fin en soutenant [Root.GetChurchOrFallbackName] dans sa mission de montrer à chaque païen l'erreur de ses voies et de le ramener dans le giron."
 gen_hoa_convert_conquered_title:0 "Convertir les conquis"
 gen_hoa_convert_conquered_desc:0 "À mesure que de nouvelles provinces rejoignent notre grand État, il est de notre devoir d'enseigner à ceux sous notre protection le chemin du salut. Seuls les fidèles peuvent pleinement s'intégrer à notre pays et rejoindre leurs concitoyens dans notre glorieux destin."
 gen_hoa_convert_conquered_modifier:0 "Convertir les conquis"
 desc_gen_hoa_convert_conquered_modifier:0 "Ceux sous notre protection doivent suivre nos traditions et accepter leur propre salut avec gratitude."
 gen_hoa_convert_the_horn_title:0 "Sauver la Corne"
 gen_hoa_convert_the_horn_desc:0 "C'est le grand destin de notre État de conduire l'humanité au salut, et en rendant la vraie religion dominante dans la Corne, nous ferons le premier pas vers notre avenir."
 gen_hoa_convert_the_horn_modifier:0 "La Corne sainte"
 desc_gen_hoa_convert_the_horn_modifier:0 "Les peuples de la Corne de l'Afrique sont enfin unis sous la seule vraie foi."
 gen_hoa_stabilize_economy_mission_title:0 "Stabiliser l'économie"
 gen_hoa_stabilize_economy_mission_desc:0 "L'instabilité de notre région est une grande opportunité pour ceux qui sont assez audacieux pour l'exploiter. Nous devons faire tout ce qui est en notre pouvoir pour accroître les revenus de l'État et nous préparer aux temps troublés à venir."
 gen_hoa_stabilize_economy_mission.tooltip:0 "N'a pas d'emprunts auprès des états."
 gen_hoa_developing_economy_modifier:0 "Économie en développement"
 desc_gen_hoa_developing_economy_modifier:0 "L'économie de notre pays a retrouvé sa vigueur et génère de nouvelles opportunités pour notre peuple."
 gen_hoa_build_temples_title:0 "Temples de pierre"
 gen_hoa_build_temples_desc:0 "La richesse nouvellement créée de l'État doit désormais revenir au peuple. Nous accomplirons notre devoir de charité en reconstruisant les temples et les infrastructures de notre foi."
 gen_hoa_build_temples_modifier:0 "Nouveaux temples"
 desc_gen_hoa_build_temples_modifier:0 "Les améliorations apportées à notre capitale et la construction de nouveaux temples apaisent nos sujets et leur donnent espoir pour l'avenir."
 gen_hoa_build_trade_navy_title:0 "Bâtir une flotte"
 gen_hoa_build_trade_navy_desc:0 "Notre peuple a une grande tradition marchande, mais nous avons toujours commercé avec les étrangers venus sur nos côtes ; il est temps que nous construisions une grande flotte marchande pour voyager vers des terres lointaines et rapporter les plus belles richesses."
 gen_hoa_trade_navy_modifier:0 "Flotte marchande"
 desc_gen_hoa_trade_navy_modifier:0 "La grande flotte de notre État est prête à apporter profit à notre peuple à tout prix."
 gen_hoa_control_coastline_title:0 "Contrôler le littoral"
 gen_hoa_control_coastline_desc:0 "Les marchands de notre peuple sont la base de notre puissance. Avant de regarder vers l'extérieur, nous devons faire tous les efforts nécessaires pour consolider leur emprise sur le commerce de notre région."
 gen_hoa_control_coastline_modifier:0 "Mer d'opportunités"
 desc_gen_hoa_control_coastline_modifier:0 "Le vaste littoral de notre État est notre ligne de vie commerciale avec le reste du monde et, en tant que tel, notre ressource la plus importante."
 gen_hoa_control_india_ocean_title:0 "Dominer l'océan Indien"
 gen_hoa_control_india_ocean_desc:0 "La Corne de l'Afrique jouit d'une position privilégiée et nous devons l'exploiter pour étendre notre influence et devenir les marchands les plus prospères de l'océan Indien."
 gen_hoa_control_india_ocean.tooltip1:0 "§Y[Root.GetName]§! détient §Y70 %§! de puissance commerciale dans §YGolfe d'Aden§!"
 gen_hoa_control_india_ocean.tooltip2:0 "§Y[Root.GetName]§! détient §Y50 %§! de puissance commerciale dans §YÉthiopie§!"
 gen_hoa_control_india_ocean.tooltip3:0 "§Y[Root.GetName]§! détient §Y30 %§! de puissance commerciale dans §YGujarat§!"
 gen_hoa_control_india_ocean.tooltip4:0 "§Y[Root.GetName]§! détient §Y30 %§! de puissance commerciale dans §YCoromandel§!"
 gen_hoa_control_india_ocean.tooltip5:0 "§Y[Root.GetName]§! détient §Y15 %§! de puissance commerciale dans §YBengale§!"
 gen_hoa_control_india_ocean.tooltip6:0 "§Y[Root.GetName]§! détient §Y15 %§! de puissance commerciale dans §YMalacca§!"
 ###WEST AFRICA MISSIONS###
 west_africa_assemble_warband_title:0 "Rassembler une bande de guerre"
 west_africa_assemble_warband_desc:0 "Pour asseoir efficacement notre contrôle sur notre territoire, nous devons rassembler une bande de guerre composée de braves guerriers."
 west_africa_strong_leadership_title:0 "Un commandement fort"
 west_africa_strong_leadership_desc:0 "Nos rivaux doivent prendre conscience de notre bravoure et de notre puissance. Ainsi, nous devons montrer que nous sommes le peuple le plus fort de la région en les humiliant sur le champ de bataille."
 west_africa_strong_leadership_ct:0 "Aucun pays connu ayant sa capitale au §YSahel§!, au §YNiger§! ou en §YGuinée§! n'est un pays indépendant avec plus de développement que §Y[Root.GetName]§!."
 west_africa_unite_home_region_title:0 "Unifier la région d'origine"
 west_africa_unite_home_region_desc:0 "Nous avons grandi en puissance ces dernières années et avons l'opportunité d'unir tous les peuples de notre région pour la première fois depuis des générations."
 west_africa_gunpowder_weapons_title:0 "Armes à poudre"
 west_africa_gunpowder_weapons_desc:0 "Nous sommes désormais une puissance majeure dans notre région, mais nous avons vu un nouveau type d'armes commercialisé par des marchands étrangers, qu'ils appellent poudre à canon. Nous devons nous assurer de pouvoir en équiper nos guerriers sans dépendre de ces étrangers."
 west_africa_greater_than_mali_title:0 "Plus grands que le Mali !"
 west_africa_greater_than_mali_desc:0 "Après avoir unifié notre région, et avec ces nouvelles armes entre les mains de nos guerriers, nous sommes prêts à conquérir toutes les terres entre le désert du Sahara et le golfe de Guinée. Nous ne devons pas gaspiller cette opportunité de devenir la plus grande puissance depuis le déclin de l'Empire du Mali, voire plus grande encore !"
 west_africa_embracing_old_traditions_title:0 "Embrasser les anciennes traditions"
 west_africa_embracing_old_traditions_desc:0 "Nous suivons nos traditions ancestrales depuis des générations. De nouvelles croyances se répandent désormais parmi notre peuple, mais nous devons rester unis et nous en tenir à nos anciens rituels pour perdurer."
 west_africa_brothers_in_tradition_fetishist_title:0 "Frères dans la foi"
 west_africa_brothers_in_tradition_fetishist_desc:0 "Notre peuple a une longue tradition de conflits avec d'autres peuples voisins en raison de nos croyances et des leurs. Mais le temps est venu de nous allier contre les fois qui sapent nos territoires."
 west_africa_shamans_title:0 "Chamans"
 west_africa_shamans_desc:0 "Nos croyances sont fortes parmi notre peuple, mais nous pensons que la simple adoration ne suffit pas. Nos chamans sont impatients d'enseigner aux étrangers le culte qui nous rend plus forts."
 west_africa_sankore_university_fetishist_title:0 "Université de Sankoré"
 west_africa_sankore_university_fetishist_desc:0 "La médersa de Sankoré à Tombouctou est le centre de savoir le plus important au sud du Sahara depuis des décennies. Il est temps de prendre cette cité et d'utiliser les manuscrits qui y sont conservés à notre avantage."
 west_africa_sincretic_rituals_title:0 "Rituels syncrétiques"
 west_africa_sincretic_rituals_desc:1 "Une grande variété de cultes, traditions et croyances est disséminée à travers tout le Sahel, le Niger et les régions de Guinée. Il est dans notre intérêt d'en faire un creuset pour soutenir notre pouvoir grandissant dans ces régions grâce à une meilleure entente entre les peuples sous notre domination."
 west_africa_embracing_new_traditions_title:0 "Embrasser de nouvelles traditions"
 west_africa_embracing_new_traditions_desc:0 "L'islam est présent depuis longtemps dans notre région, mais n'a pas été entièrement adopté par notre peuple. Nous devons désormais nous en assurer et être suffisamment pieux pour nous faire respecter."
 west_africa_brothers_in_faith_sunni_title:0 "Frères dans la foi"
 west_africa_brothers_in_faith_sunni_desc:1 "Notre peuple a une longue tradition de conflits avec d'autres peuples voisins en raison de nos croyances et des leurs. Mais le temps est venu de nous allier contre les fois qui sapent nos territoires."
 west_africa_marabouts_title:0 "Marabouts"
 west_africa_marabouts_desc:0 "Les marabouts répandent les Cinq Piliers de l'Islam à travers la région depuis des générations. Il est temps de soutenir leurs efforts pour que leur parole se répande plus largement."
 west_africa_sankore_university_sunni_title:0 "Université de Sankoré"
 west_africa_sankore_university_sunni_desc:0 "La médersa de Sankoré à Tombouctou est le centre de savoir le plus important au sud du Sahara depuis des décennies. Il est temps de prendre cette cité et d'utiliser les manuscrits qui y sont conservés à notre avantage."
 west_africa_the_only_faith_title:0 "La seule foi"
 west_africa_the_only_faith_desc:0 "Nos efforts pour répandre la Chahada, les autres Piliers et le Coran parmi les peuples sous notre domination ont été intenses pendant des décennies. Mais nous devons désormais établir l'islam comme seule religion, car il n'y a de dieu qu'Allah."
 west_africa_gathering_tributes_title:0 "Collecter les tributs"
 west_africa_gathering_tributes_desc:0 "Il est nécessaire pour notre peuple de collecter des tributs de nos voisins, car nous en avons besoin pour nous renforcer dans les années à venir."
 west_africa_clearings_irrigations_title:0 "Défrichages et irrigations"
 west_africa_clearings_irrigations_desc:0 "Nos terres sont propices à l'agriculture depuis que les hommes ont commencé à les travailler, mais si nous voulons accueillir davantage de population, nous devons défricher les forêts et jungles et irriguer nos vallées fluviales."
 west_africa_salt_cloth_shells_title:0 "Sel, tissus et coquillages"
 west_africa_salt_cloth_shells_desc:0 "Le commerce à travers les corridors sahariens et le golfe de Guinée s'est intensifié depuis quelque temps, avec de nouveaux marchands étrangers apparaissant dans nos cités et proposant de nouveaux produits. Nous devons prendre le contrôle de ce commerce lucratif à notre avantage."
 west_africa_manufacturing_africa_title:0 "Manufactures en Afrique"
 west_africa_manufacturing_africa_desc:0 "Des marchandises opulentes d'outre-mer ont inondé nos territoires ces dernières années. Nous avons désormais l'opportunité de les reproduire et de créer nos propres biens, en profitant de leur vente à notre peuple et même de leur exportation outre-mer."
 west_africa_bilad_sudan_trade_title:0 "Commerce du Bilad al-Soudan"
 west_africa_bilad_sudan_trade_desc:0 "D'importants centres se sont développés avec l'intensification du commerce dans toute la région au cours des dernières décennies. Tombouctou est la porte du Nord, le Kanem-Bornou contrôle le commerce avec l'Est, tandis que le Bénin est le principal comptoir de la côte méridionale. Il est désormais nécessaire de prendre le contrôle de ces places et du commerce qui y transite."
 ###MORE MISSIONS###
 zan_centralize_trade_at:1 "§Y[Root.GetName]§! détient §Y85 %§! de puissance commerciale dans l'un de ces nœuds commerciaux : §YZanzibar§!, §YCap de Bonne-Espérance§! ou la §YCôte de l'Ivoire§!."
 zan_centralize_trade_bt:0 "§Y[Root.GetName]§! détient §Y30 %§! de puissance commerciale ou est la §Yplus grande puissance commerciale§! dans le nœud commercial §YZambèze§! ou le §YGolfe d'Aden§!."
 zan_centralize_trade_ct:1 "§Y[Root.GetName]§! détient §Y10 %§! de puissance commerciale ou est la §Yplus grande puissance commerciale§! dans le nœud commercial §YGujarat§! ou le §YCoromandel§!."
 mal_second_branch_mission_title:0 "[Root.GetSelectableMissionTitle]"
 mal_second_branch_mission_desc:0 "[Root.GetSelectableMissionDescription]"
 obj_convert_25_provinces_tooltip:0 "Convertir §Y25§! provinces (§Y[Root.GetNumConvertedProvinces]§!/§Y25§!)."
 eth_secure_religious_unity_title:0 "Assurer l'unité religieuse"
 eth_secure_religious_unity_desc:0 "Notre royaume est religieusement divisé entre coptes, juifs et musulmans. Cela engendre un manque d'unité religieuse qui rend presque impossible tout effort de centralisation de l'État et de résolution des problèmes. Nous devons assurer notre unité religieuse !"
 hausa_claims_tt:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur chaque province §Yhaoussa§! de la région du §YNiger§!."
 hau_build_armies_ct:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur chaque province §Yhaoussa§! de la région du §YNiger§! si la mission « §YFormer des alliances§! » est accomplie."
 hau_the_seven_great_cities_tt:0 "Les provinces §Y[2280.GetName]§!, §Y[1149.GetName]§!, §Y[2279.GetName]§!, §Y[1148.GetName]§!, §Y[1155.GetName]§!, §Y[2281.GetName]§! et §Y[1154.GetName]§! obtiennent un modificateur de province spécial pendant §Y10 ans§!, représentant leur importance historique dans l'histoire haoussa."
 hau_the_seven_great_cities_decision_tt:1 "Active une décision permettant à [Root.GetName] d'appliquer les modificateurs de province §YSept Cités§! à §Y[2280.GetName]§!, §Y[1149.GetName]§!, §Y[2279.GetName]§!, §Y[1148.GetName]§!, §Y[1155.GetName]§!, §Y[2281.GetName]§! et §Y[1154.GetName]§! pendant §Y10 ans§! tous les §Y20 ans§! au coût de §Y75§! points administratifs."
 hau_gather_allies_ct:1 "§Y[Root.GetName]§! obtient des revendications permanentes sur chaque province §Yhaoussa§! de la région du §YNiger§! si la mission « §YRassembler une armée§! » est accomplie."
 hau_the_kanuri_threat_tt:0 "Chaque province §Ykanuri§! possédée obtient le modificateur de province « §YConquête haoussa§! » pendant §Y30 ans§!, conférant les effets suivants :\nAgitation locale : §G-2,00§!\nSéparatisme local : §G-5,00§!"
 hau_prepare_the_jihad_tt:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur chaque province des régions du §YSahel§!, du §YNiger§! ou de §YGuinée§! qui n'est pas de foi §Ymusulmane§!."
 JOL_TRADE_DEAL_AGREEMENT:0 "Accord commercial jolof"
 JOL_INCREASED_IVORY_DEMAND:0 "Demande accrue d'ivoire"
 jol_gain_ports_tt:0 "Un port possédé au hasard débutera la construction de §Y6 navires légers§! et d'un §YGrand chantier naval§! sans coût et en §Y50 %§! du temps."
 four_years_of_trade_income:0 "Gagne §G4 années§! de revenus commerciaux."
 jol_centralize_the_state_ct:0 "Réduit l'autonomie de chaque province possédée ayant au moins §Y5§! d'autonomie de §G100 %§! et ajoute §G0,1§! d'absolutisme par province."
 msi_integrate_the_muslims_ct:0 "Améliore l'opinion de chaque pays §Ymusulman§! connu en §YAfrique de l'Ouest§! de §G50§!."
 msi_integrate_the_muslims_at:0 "Chaque province §Ymusulmane§! possédée obtient le modificateur de province « §YPaïens intégrés§! » pendant §Y25 ans§!, conférant les effets suivants :\nContribution à l'unité religieuse locale : §G-100,0 %§!\nAgitation locale : §G-2,00§!\nModificateur d'impôts locaux : §G+15,0 %§!"
 msi_integrate_the_muslims_bt:0 "Chaque province §Ypaïenne§! possédée obtient le modificateur de province « §YPaïens intégrés§! » pendant §Y25 ans§!, conférant les effets suivants :\nContribution à l'unité religieuse locale : §G-100,0 %§!\nAgitation locale : §G-2,00§!\nModificateur d'impôts locaux : §G+15,0 %§!"
 msi_gather_the_troops_ct:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur toutes les provinces §Ymossi§! de la région du §YNiger§!."
 west_africa_shamans_ct:1 "Chaque province §Ypaïenne§! possédée obtient le modificateur de province « §YDroits fétichistes§! » pendant §Y25 ans§!, conférant les effets suivants :\nAgitation locale : §G-2,00§!\nChangement mensuel d'autonomie locale : §G-0,05§!"
 west_africa_marabouts_ct:0 "Chaque province §Ymusulmane§! possédée obtient le modificateur de province « §YMarabout local§! » pendant §Y25 ans§!, conférant les effets suivants :\nAgitation locale : §G-2,00§!\nChangement mensuel d'autonomie locale : §G-0,05§!"
 oyo_trade_with_the_muslims_at:0 "Possède un §Ycentre de commerce§! dans le nœud commercial de §YTombouctou§!."
 oyo_trade_with_the_muslims_bt:0 "Tout propriétaire d'un §Ycentre de commerce§! dans le nœud commercial de §YTombouctou§! a au moins §Y90§! d'opinion envers [Root.GetName] ou est un sujet de [Root.GetName]."
 oyo_chaaargee_ct:0 "La capitale d'un §Yrival§!, d'un §Yennemi§!, d'une §Ygrande puissance§! ou d'un pays avec plus de développement total que §Y[Root.GetName]§! est sous notre contrôle tandis qu'une unité de cavalerie s'y trouve."
 oyo_chaaargee_tt:1 "La compagnie de mercenaires §YCavalerie Oyo§! ne réduit plus la §Yprofessionnalisation de l'armée§! lorsqu'elle est recrutée."
 CAPITAL_MONOPOLY:0 "Production de la capitale."
 hau_build_armies_title:0 "Rassembler une armée"
 hau_build_armies_desc:0 "Si nous voulons survivre et réussir en tant que nation, la première chose à faire est de nous assurer que personne ne puisse nous détruire. Nous devons rassembler une armée pour garantir notre sécurité, et nous pourrons l'utiliser pour conquérir nos ennemis également."
 hau_the_yoruba_and_nupe_title:0 "Les Yorubas et les Nupés"
 hau_the_yoruba_and_nupe_desc:0 "Les Yorubas et les Nupés sont à nos portes et constituent une cible idéale pour notre expansion. Nous devons les conquérir pour établir une position solide d'où nous pourrons nous étendre davantage par la suite."
 hau_gain_sea_access_title:0 "Accéder à la mer"
 hau_gain_sea_access_desc:0 "Nous avons été enclavés trop longtemps. Nous devons accéder à la mer, ce qui nous permettrait d'étendre notre portée plus loin que jamais."
 hau_unite_the_cities_title:0 "Unir les cités"
 hau_unite_the_cities_desc:0 "Les différentes cités haoussa sont divisées et en concurrence les unes avec les autres depuis trop longtemps. Nous devons toutes les unir sous la même bannière, la nôtre."
 hau_develop_the_cities_title:0 "Développer les cités"
 hau_develop_the_cities_desc:0 "Maintenant que toutes les cités haoussa sont sous notre contrôle, nous devons les développer pour qu'elles brillent comme les joyaux qu'elles devraient être."
 hau_resolve_internal_issues_title:0 "Résoudre les problèmes internes"
 hau_resolve_internal_issues_desc:0 "Ayant unifié toutes les différentes cités haoussa, il est inévitable que des conflits internes surgissent. Nous devons œuvrer à résoudre ces problèmes afin de devenir véritablement une seule nation."
 hau_contact_with_the_fulani_title:0 "Contact avec les Peuls"
 hau_contact_with_the_fulani_desc:0 "Les Peuls sont devenus étonnamment plus influents récemment. Nous devons établir le contact avec eux et évaluer s'ils peuvent nous être bénéfiques."
 hau_gather_allies_title:0 "Former des alliances"
 hau_gather_allies_desc:0 "Si nous voulons survivre et réussir en tant que nation, la première chose à faire est de nous assurer que personne ne puisse nous détruire. Nous devons nouer des alliances pour réduire les menaces contre nous et nous assurer des protecteurs."
 hau_the_kanuri_threat_title:0 "La menace kanuri"
 hau_the_kanuri_threat_desc:0 "Les Kanuris sont à nos portes et constituent une menace pour notre expansion. Nous devons les conquérir avant qu'ils ne deviennent assez puissants pour nous conquérir."
 hau_the_tuareg_title:0 "Les Touaregs"
 hau_the_tuareg_desc:0 "Les Touaregs ont toujours vécu dans les zones désertiques au nord de nous. Il est temps que nous nous étendions dans cette direction et les soumettions à notre autorité."
 hau_prepare_the_jihad_title:0 "Préparer le djihad"
 hau_prepare_the_jihad_desc:0 "Il est clair que les enseignements du Prophète sont la seule vraie foi. Nous devons être prêts à combattre quiconque oserait prétendre le contraire."
 hau_convert_west_africa_title:0 "Convertir l'Afrique de l'Ouest"
 hau_convert_west_africa_desc:0 "Il y a encore trop de gens qui ne croient pas aux enseignements du Prophète, cela ne saurait perdurer. Nous devons répandre Ses enseignements si nous voulons devenir un phare de civilisation."
 hau_finish_the_jihad_title:0 "Achever le djihad"
 hau_finish_the_jihad_desc:0 "Nous avons répandu avec succès les enseignements du Prophète, mais il reste encore des gens qui n'y croient pas. Nous devons tous les convaincre pour devenir un véritable califat."
 aju_completely_modernized_army:0 "Armée modernisée"
 desc_aju_completely_modernized_army:0 "Nous avons décidé d'investir massivement dans notre armée et de la moderniser entièrement selon les conseils ottomans."
 aju_bought_new_guns:0 "Armes ottomanes"
 desc_aju_bought_new_guns:0 "Nous avons décidé d'investir dans notre armée et de l'équiper avec les armes à feu de l'Empire ottoman."
 aju_keep_the_ways:0 "Conserver les anciennes méthodes"
 desc_aju_keep_the_ways:0 "Nous avons décidé de renoncer aux conseils des Turcs. Nous conservons plutôt les anciennes méthodes de guerre, plus accessibles à un plus grand nombre de notre peuple."
 jol_the_mali_border_title:0 "La frontière malienne"
 jol_the_mali_border_desc:0 "À l'est, la puissante nation du Mali menace notre sécurité et nos conseillers nous disent, à juste titre, de commencer à élaborer une stratégie pour nous défendre.\nJuste au cas où."
 jol_take_over_futa_jallon_title:0 "S'emparer du Fouta-Djalon"
 jol_take_over_futa_jallon_desc:0 "Le Fouta-Djalon est un plateau de grès, fortement érodé par les pluies abondantes, qui se trouve au sud-ouest de notre royaume. La région peut servir de point de départ pour un front plus long afin de défier la puissance du Mali."
 jol_gain_ports_title:0 "Acquérir des ports"
 jol_gain_ports_desc:0 "Pendant des siècles, notre peuple a vu la mer comme une opportunité, puisque la majeure partie de notre nation est côtière. Aujourd'hui plus que jamais, notre expansion doit se concentrer sur l'acquisition de davantage de ports, si nous voulons nous appuyer sur la mer."
 jol_discover_europe_title:0 "Découvrir l'Europe"
 jol_discover_europe_desc:0 "À de nombreuses reprises, des gens à la peau pâle naviguant depuis le nord sont arrivés sur nos côtes, cherchant à commercer avec nous la plupart du temps. Savoir d'où ils viennent peut nous permettre de fixer les conditions de ce commerce et d'éviter toute nouvelle tentative de nous intimider."
 jol_trade_experts_title:0 "Experts commerciaux"
 jol_trade_experts_desc:0 "Maintenant que nous connaissons les pratiques commerciales en Europe, nous pouvons examiner les nôtres et les améliorer là où elles échouent. Nous utiliserons ces techniques nouvelles et meilleures pour devenir le commerçant dominant de notre région."
 jol_the_fulani_title:0 "Les Peuls"
 jol_the_fulani_desc:0 "Les Peuls sont nos voisins et depuis des siècles nos peuples sont en contact. Les relations n'ont pas toujours été amicales, mais il existe une sorte de parenté entre nous et nous pensons qu'il serait possible de les intégrer pleinement dans notre royaume."
 jol_push_further_into_mali_title:0 "Progresser dans le Mali"
 jol_push_further_into_mali_desc:0 "À mesure que notre puissance croît, celle du Mali commence à décliner. C'est le moment de nous venger du joug sous lequel notre peuple a souffert pendant des années. Nous attaquerons le §YBaghéna§!, le §YManding§! et le §YMassina§!."
 jol_replace_mali_title:0 "Remplacer le Mali"
 jol_replace_mali_desc:0 "Le Mali a pris la place de l'Empire du Ghana en tant qu'hégémon de l'Afrique de l'Ouest. Maintenant, c'est notre tour. Le Mali doit tomber, soit comme notre sujet, soit comme un cadavre."
 jol_the_songhai_threat_title:0 "La menace songhaï"
 jol_the_songhai_threat_desc:0 "En tant que l'une des nations les plus puissantes de la région, la seule existence des Songhaï est une menace pour notre royaume. Tant qu'ils ne sont pas tenus en échec, le danger persiste. Ils plieront le genou devant nous ou périront."
 jol_west_african_great_power_title:0 "Grande puissance ouest-africaine"
 jol_west_african_great_power_desc:0 "Pour que le monde sache qui règne en Afrique de l'Ouest, nous devons nous assurer de contrôler directement suffisamment de terres. Aux armes !"
 jol_the_tribal_confederacy_title:0 "La confédération tribale"
 jol_the_tribal_confederacy_desc:0 "Notre nation est formée de plusieurs petits royaumes qui, seuls, sont faibles, mais qui, travaillant ensemble, peuvent devenir une menace redoutable pour nos ennemis. Nous unirons notre peuple et conquerrons le monde."
 jol_reforms_for_the_state_title:0 "Réformes pour l'État"
 jol_reforms_for_the_state_desc:0 "En tant que confédération tribale, notre peuple s'est davantage battu entre lui que contre ceux qui s'opposaient à nous, et nous avons donc conservé des lois trop archaïques partout, qui drainent l'efficacité de l'État. Nous devons changer cela !"
 jol_centralize_the_state_title:0 "Centraliser l'État"
 jol_centralize_the_state_desc:0 "Pendant trop longtemps, le pouvoir a été divisé entre le Buur ou le Roi et les différents roitelets ou chefs de notre royaume. Nous devons récupérer tout ce pouvoir perdu dans la personne de notre souverain."
 zim_militarize_the_nguni_title:0 "Recruter les Ngunis"
 zim_militarize_the_nguni_desc:0 "Bien que notre peuple soit composé de guerriers féroces et puissants à part entière, ce sont tout de même des [Root.GetAdjective], des gens de notre [Root.GovernmentName]. Nous devrions envisager de recruter les tribus et clans sauvages du sud afin d'éviter des pertes parmi notre propre peuple."
 zim_learn_from_the_nguni_title:0 "Apprendre des Ngunis"
 zim_learn_from_the_nguni_desc:0 "Les Ngunis ont prouvé leur valeur au combat. Ils ont montré leur force et leur ruse sur le champ de bataille. Nous devrions développer les ressources militaristes des Ngunis et apprendre de leur ingéniosité pour les guerres à venir."
 oyo_trade_with_the_muslims_title:0 "Commercer avec les musulmans"
 oyo_trade_with_the_muslims_desc:0 "Le commerce a toujours été prépondérant dans notre région, en particulier celui mené par les musulmans via Tombouctou et Gao. Nous ne devons pas être en reste si nous voulons en profiter ; nous devons également participer activement au flux commercial et être capables de le contrôler."
 oyo_found_the_cavalry_regiment_title:0 "Cavalerie pour [Root.GetName]"
 oyo_found_the_cavalry_regiment_desc:1 "Grâce à notre commerce avec les nations musulmanes, nous avons désormais accès aux chevaux, une ressource jusqu'ici peu commune dans notre pays. Nous devons également former des régiments de cavalerie, à l'image de ceux que possèdent les pays musulmans."
 oyo_chaaargee_title:0 "Chaaaargez !!"
 oyo_chaaargee_desc:0 "Maintenant que nous disposons de régiments de cavalerie, il est temps de les utiliser. Nous pouvons exploiter leur supériorité de manœuvre pour nous emparer rapidement de la capitale ennemie et les écraser totalement. C'est précisément ce que nous allons faire."
 oyo_appease_the_oyo_mesi_title:0 "Apaiser les Oyo Mesi"
 oyo_appease_the_oyo_mesi_desc:0 "Les Oyo Mesi, notre conseil de nobles, ont toujours été une partie intégrante de notre gouvernement. Aucun souverain ne peut être intronisé sans leur approbation, et ils peuvent également le déposer s'ils le jugent trop tyrannique. Nous devons les satisfaire de notre règne."
 oyo_perma_claims_tt:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur les zones §YBénin§!, §YBas-Niger§!, §YZazzau§!, §YAtacora-Ouémé§! et §YBas-Volta§!."
 oyo_appease_the_oyo_mesi_ct:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur les zones §YBénin§!, §YBas-Niger§!, §YZazzau§!, §YAtacora-Ouémé§! et §YBas-Volta§! si la mission « §YApaiser les Ogboni§! » a été accomplie."
 oyo_push_north_tt:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur chaque province des régions du §YSahel§!, du §YNiger§! et de §YGuinée§! qui n'est pas de foi §Y[Root.Religion.GetName]§!."
 oyo_appease_the_ogboni_ct:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur les zones §YBénin§!, §YBas-Niger§!, §YZazzau§!, §YAtacora-Ouémé§! et §YBas-Volta§! si la mission « §YApaiser les Mesi§! » a été accomplie."
 oyo_push_north_title:0 "Pousser vers le nord"
 oyo_push_north_desc:0 "Contrairement aux jungles denses du Sud, les plaines luxuriantes du Sahel au Nord sont une grande source de richesse. Par conséquent, le seul choix sensé est de nous étendre vers le nord."
 oyo_eradicate_the_muslims_title:0 "Éradiquer les musulmans"
 oyo_eradicate_the_muslims_desc:0 "Les musulmans autour de nous ont cessé de nous être utiles et sont devenus une nuisance. Nous devons nous en débarrasser complètement pour faire place à notre propre glorieuse expansion."
 oyo_eradicate_the_muslims_ct:1 "Est soit un sujet de §Y[Root.GetName]§!, soit professe la foi §Y[Root.Religion.GetName]§!."
 oyo_growth_of_power_title:0 "Croissance du pouvoir"
 oyo_growth_of_power_desc:0 "Nous, les Oyos, sommes une grande nation. Mais nous pouvons toujours devenir encore plus grands. Nous devons étendre notre glorieuse nation pour qu'elle fasse l'envie du monde."
 oyo_develop_the_capital_title:0 "Développer la capitale"
 oyo_develop_the_capital_desc:1 "Notre capitale est le joyau étincelant de notre pays et son symbole. Nous devons la développer en une véritable cité bouillonnante qui montre clairement son importance."
 oyo_reform_the_government_title:0 "Réformer le gouvernement"
 oyo_reform_the_government_desc:0 "Nos anciennes traditions tribales sont devenues trop étroites pour nos grandes ambitions. Nous devons réformer notre gouvernement en un État glorieux si nous voulons nous tenir parmi les géants du monde."
 oyo_imperial_oyo_title:0 "L'Oyo impérial"
 oyo_imperial_oyo_desc:0 "L'Oyo a toujours été un Empire à nos yeux. Le temps est venu qu'il en devienne un aux yeux de tous. Nous devons montrer notre véritable force si nous voulons mériter ce titre."
 oyo_appease_the_ogboni_title:0 "Apaiser les Ogboni"
 oyo_appease_the_ogboni_desc:0 "Les Ogboni ont toujours été une partie influente de notre gouvernement. Outre leur implication dans les affaires religieuses, ils ont également une influence sur la désignation des souverains. Nous devons donc nous assurer qu'ils sont de notre côté."
 oyo_unite_the_fetishists_title:0 "Unir les fétichistes"
 oyo_unite_the_fetishists_desc:0 "Nos croyances ont toujours été une partie intégrante de notre identité. Nous devons convaincre les peuples autour de nous de partager la même vision que nous."
 oyo_gather_cults_title:0 "Rassembler les cultes"
 oyo_gather_cults_desc:0 "Maintenant que beaucoup plus de gens partagent nos croyances, nous sommes plus conscients qu'il existe des différences subtiles entre leurs chamans. Nous devons collecter ces différences pour avoir une vision unifiée et vraie."
 msi_balance_of_power_title:0 "Équilibre des pouvoirs"
 msi_balance_of_power_desc:0 "Notre pays est fait de chefs et de chefs religieux ; et à notre désespoir, ils se battent toujours entre eux pour avoir plus de pouvoir que l'autre. Nous devrions parvenir à un accord avec les deux factions afin qu'elles œuvrent ensemble pour le bien de notre nation."
 msi_integrate_the_muslims_title:0 "Intégrer les musulmans"
 msi_integrate_the_muslims_desc:0 "La société mossi est composée à la fois de musulmans et de fétichistes qui s'affrontent habituellement. Nous devons travailler avec les deux, afin qu'un terrain d'entente soit trouvé et que nous puissions oublier tous ces conflits interreligieux. Ce n'est qu'en étant Mossi avant tout que notre nation prospérera."
 msi_invade_the_west_title:0 "Envahir l'ouest"
 msi_invade_the_west_desc:0 "À l'ouest de notre royaume, Massina et Djenné dominent leur arrière-pays riche en or et sont devenus un objectif précieux pour notre nation. Si nous contrôlons ces deux points centraux, la zone environnante tombera bientôt entre nos mains. De plus, ils regorgent de trésors qui rempliront nos coffres."
 msi_gather_the_troops_title:0 "Rassembler les troupes"
 msi_gather_the_troops_desc:0 "Notre peuple est guerrier et commence à s'agiter, assoiffé de défis et de guerre. Nous devrions rediriger cette énergie vers l'agrandissement de nos armées et la recherche de chefs prometteurs pour elles. Leurs souhaits seront exaucés, mais sous notre autorité."
 msi_unite_the_kingdoms_title:0 "Unir le royaume"
 msi_unite_the_kingdoms_desc:0 "Depuis l'époque de la princesse Yennenga, de son fils Ouédraogo, et de leurs enfants et petits-enfants, notre peuple a été divisé en plusieurs royaumes. Unis, nous sommes forts ; divisés, nous tomberons un par un. Nous rassemblerons toutes les terres mossi sous une seule bannière."
 msi_invade_the_north_title:0 "Envahir le nord"
 msi_invade_the_north_desc:1 "Dans la boucle du fleuve Niger, au nord, les puissantes cités de Tombouctou et Gao contrôlent les richesses de l'Afrique de l'Ouest et le commerce avec les peuples vivant au-delà du grand désert. Leur richesse est incommensurable et elle doit être nôtre."
 msi_ruler_of_the_river_title:0 "Maître du fleuve"
 msi_ruler_of_the_river_desc:0 "Le fleuve Niger bénit les terres qu'il traverse de crues périodiques qui rendent le sol incroyablement fertile. Nous ne pourrons nous appeler Maîtres du Fleuve et tirer avantage de cette fertilité que lorsque la région autour de la Boucle du Niger nous appartiendra, à nous seuls."
 msi_hegemony_of_west_africa_title:0 "Hégémonie de l'Afrique de l'Ouest"
 msi_hegemony_of_west_africa_desc:0 "Pendant des générations, le Mali a contrôlé la majeure partie de l'Afrique de l'Ouest d'une main de fer. Leur pouvoir a décliné, cependant, tandis que le nôtre a grandi de jour en jour. Pour revendiquer l'hégémonie sur cette région, nous devons la dominer et détruire ou soumettre le Mali."
 msi_the_kingdom_confederacy_title:0 "La confédération des royaumes"
 msi_the_kingdom_confederacy_desc:0 "Notre peuple a traditionnellement été dispersé entre les différents royaumes mossi ; certains grands et d'autres petits, mais désunis néanmoins. Si nous voulons survivre en tant que nation, nous devons nous unir en confédération."
 msi_the_kingdom_confederacy_ct:0 "L'événement « §YLe Royaume confédéral mossi§! » s'est déclenché."
 msi_the_centralization_question_title:0 "Centraliser la confédération"
 msi_the_centralization_question_desc:0 "Le temps du pouvoir local doit prendre fin et seul un pouvoir central devrait conserver la capacité de diriger cette nation. Nous veillerons à ce que les personnes administrant les provinces de notre royaume répondent directement à nous."
 msi_the_centralization_question_tt:0 "[Root.GetName] a promulgué au moins §Y2§! décisions du Royaume confédéral."
 msi_invade_the_south_title:0 "Envahir le sud"
 msi_invade_the_south_desc:0 "Bien que moins riches que leurs homologues du nord, les cités de Kong et de Bonoman sont des comptoirs commerciaux où l'argent coule à flots. Si nous voulons financer davantage nos campagnes militaires, nous devons nous assurer de contrôler autant de ces sources de richesse que possible."
 msi_balance_of_power_ct:0 "[Root.GetClergyName] et [Root.GetNobilityOrFallbackName] ont une différence d'influence de §Y5 %§! ou moins."
 ada_prepare_second_invasion_title:0 "Préparer les forces"
 ada_prepare_second_invasion_desc:0 "Depuis notre formation sur les ruines d'Ifat, les chrétiens barbares d'Éthiopie ont toujours été une menace pour [Root.GetName]. Bien que notre récente victoire sur l'Éthiopie nous ait valu la province de [1210.GetName] en 1443, ce n'est qu'une question de temps avant que les Éthiopiens ne contre-attaquent. Nous devrions préparer nos forces pour les conflits à venir."
 ada_prepare_second_invasion_tt:0 "§Y[Root.GetName]§! obtient le bonus suivant tant que le modificateur « §YPréparatifs de guerre adaliens§! » est actif :\n[Root.GetName] obtient le modificateur « §YGuerre adalo-éthiopienne§! » tant que [Root.GetName] est en guerre avec §Y[ETH.GetName]§!, dont le développement est égal ou supérieur à celui de [Root.GetName], conférant les effets suivants :\nMoral des armées : §G+5,0 %§!\nVitesse de récupération des effectifs : §G+10,0 %§!\nPiété mensuelle : §Y+0,1§!"
 ada_justification_for_unity_title:0 "Justification pour l'unité"
 ada_justification_for_unity_desc:0 "Nous autres Somalis avons toujours été une collection de clans différents qui s'affrontent à maintes occasions. Aucun des clans tribaux n'a intérêt à unir notre peuple, et ces prétentieux Ajuuraan préfèrent irriguer leurs champs. C'est à nous d'unir les Somalis et de les rallier contre les menaces chrétiennes et païennes.\nMais avant cela, nous avons besoin d'une justification officielle pour la guerre, sinon ces clans ne se soumettront jamais."
 ada_justification_for_unity_at:0 "Aucun autre pays que §Y[Root.GetName]§! n'a le §Ysomali§! comme culture principale."
 ada_justification_for_unity_bt:0 "§Y[Root.GetName]§! a un casus belli « §YConquête§! » contre tout pays §Ysomali§!."
 ada_restore_the_old_mosque_title:0 "Restaurer l'ancienne mosquée"
 ada_restore_the_old_mosque_desc:0 "Zeila fut l'une des toutes premières cités à embrasser les lumières de l'islam. Il y a environ 700 ans, les premiers musulmans de la Corne construisirent la mosquée Masjid al-Qiblatayn, en faisant la plus ancienne mosquée connue. Cependant, le temps a laissé son empreinte sur la mosquée et elle n'est plus aussi fonctionnelle qu'autrefois. Nous devrions restaurer ce grand monument de notre peuple !"
 ada_prepare_second_invasion_ct:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur les zones §YHadiya§!, §YChoa§!, §YTigré§! et §YÉthiopie centrale§! et une revendication permanente sur la province §Y[2768.GetName]§! si la mission « §YRestaurer l'ancienne mosquée§! » a été accomplie auparavant."
 ada_restore_the_old_mosque_ct:0 "§Y[Root.GetName]§! obtient des revendications permanentes sur les zones §YHadiya§!, §YChoa§!, §YTigré§! et §YÉthiopie centrale§! et une revendication permanente sur la province §Y[2768.GetName]§! si la mission « §YPréparer les forces§! » a été accomplie auparavant."
 ada_turkish_alliance_title:0 "Atteindre les Turcs"
 ada_turkish_alliance_desc:0 "Les coptes de la Corne de l'Afrique sont féroces et agressifs. Même avec toute notre puissance militaire, nous aurons peu de chances contre les Éthiopiens, qui utilisent les hauteurs contre nous. Nous avons besoin d'un allié puissant pour notre cause.\nLes Mamelouks pourraient être un tel allié, mais des rumeurs parlent d'un empire musulman en plein essor qui éclipsera bientôt les Mamelouks. Ces soi-disant Turcs sont le peuple de cet empire. Nous devrions essayer de les atteindre et voir si nous pouvons conclure une alliance avec eux."
 ada_turkish_alliance_ct:0 "Tout régiment §Y[Root.GetAdjective]§! est situé dans un port de la région §YÉgypte§! ou de la région §YMachrek§!, qui borde la §YMer Méditerranée§!, ou dans une province détenue par un pays §Yturc§!."
 ada_turkish_alliance_tt:0 "Le régiment voyagera en §YAnatolie§! par bateau dans l'espoir de trouver de nouveaux alliés."
 ada_destroy_ethiopia_title:0 "Détruire l'Éthiopie"
 ada_destroy_ethiopia_desc:0 "Nous avons rassemblé des alliés puissants et préparé nos forces. Le temps est venu de résoudre le conflit interminable avec l'Éthiopie une fois pour toutes !"
 ada_push_further_north_title:0 "Éliminer les coptes nubiens"
 ada_push_further_north_desc:0 "Avec la défaite totale de l'Éthiopie, le nord et l'ouest de la Corne de l'Afrique sont à prendre. Bien que la majorité des chrétiens soient désormais sous notre domination, il reste les coptes nubiens, qui défient l'autorité de l'islam. Nous devrions nous emparer de leurs terres et extirper cette foi païenne."
 ada_push_further_north_ct:1 "Chaque province des zones §YDongola§!, §YHaute-Nubie§! et §YSennar§! est possédée par un pays §Y[Root.Religion.GetName]§! ou par un sujet de §Y[Root.GetName]§!."
 ada_the_sahel_corridor_title:0 "Le long du Sahara"
 ada_the_sahel_corridor_desc:0 "À l'ouest de la Corne de l'Afrique se trouve la bande sahélienne. Une région praticable entre le désert désolé du Sahara et les vicieuses forêts tropicales du bassin du Congo. Il est recommandé que nous prenions le contrôle de ce passage et construisions le pont entre l'Afrique de l'Ouest et la Corne de l'Afrique."
 ada_modernize_army_title:0 "Moderniser l'armée"
 ada_modernize_army_desc:0 "Notre contact avec les peuples d'Anatolie nous a montré l'importance capitale de la technologie pour la santé d'un État. Nous devrions moderniser notre armée et développer des tactiques afin que nos troupes puissent résister aux batailles à venir."
 ada_the_gold_of_ethiopia_title:1 "L'or de la Corne"
 ada_the_gold_of_ethiopia_desc:0 "La Corne ne possède pas beaucoup de ressources précieuses qui pourraient stimuler notre économie, à l'exception de deux provinces aurifères distinctes : [2762.GetName] et [2757.GetName]. Nous devrions y accéder et utiliser ce métal précieux à notre avantage."
 ada_convert_the_horn_title:0 "Convertir la Corne"
 ada_convert_the_horn_desc:0 "Notre région natale est infestée de païens et d'hérétiques. Tant que nous n'aurons pas d'unité religieuse au sein de notre [Root.GovernmentName], toute chance de paix sera vaine. Nous devons convertir les infidèles et les amener à la lumière de la foi §Y[Root.Religion.GetName]§! !"
 ada_conquer_war_mre_title:0 "Conflits de clans"
 ada_conquer_war_mre_desc:0 "Warsangali et Marehan sont des clans turbulents, occupés par des luttes intestines et des préoccupations tribales. Leur peuple est las d'un État décentralisé qui semble les décevoir encore et encore. Ce dont les Somalis ont besoin, c'est d'un dirigeant fort, et nous serons leur chef !"
 ada_conquer_ogd_aju_title:0 "Soumettre Ajuuraan"
 ada_conquer_ogd_aju_desc:0 "Contrairement aux clans somalis tribaux, l'État d'Ajuuraan possède véritablement un gouvernement centralisé sous forme de théocratie. Cependant, bien qu'étant de pieux musulmans de nom, ils ne se soucient pas de notre combat contre la menace chrétienne et se concentrent plutôt sur le commerce et l'expansion au-delà des mers. Leur gouvernance est sans valeur, mais les terres fertiles qu'ils détiennent au sud pourraient nous être utiles."
 ada_expand_into_arabia_title:0 "S'emparer de la Ville sainte"
 ada_expand_into_arabia_desc:0 "[385.GetName] est un centre religieux d'une grande importance pour la foi musulmane. En tant que musulmans dévoués, nous sommes obligés de la protéger des menaces extérieures. Mais pour protéger la Ville sainte, nous devons d'abord affirmer notre domination sur elle."
 ada_somali_empire_title:0 "Fonder l'Empire adal"
 ada_somali_empire_desc:0 "Pendant très longtemps, le seul empire de la Corne était l'État infidèle d'Éthiopie. Cela a changé cependant. Les Éthiopiens sont vaincus, la Corne de l'Afrique est consolidée sous le règne [Root.GetAdjective] et les conflits religieux sont enfin résolus ! À partir de ce jour, nous serons connus comme un nouvel Empire en Afrique de l'Est !"
 ###EVENTS###
 muslim_school_events.24.t:0 "Un érudit étranger s'installe en [Root.GetName]"
 muslim_school_events.24.d:0 "Nous avons décidé d'accorder une résidence à un érudit d'une école étrangère. Cependant, nous n'avons pas encore décidé quel érudit devrait avoir le privilège de vivre dans les frontières sécurisées de [Root.GetName]."
 muslim_school_events.24.a:0 "Accorder le privilège à un érudit de l'école hanafite."
 muslim_school_events.24.b:0 "Accorder le privilège à un érudit de l'école hanbalite."
 muslim_school_events.24.c:0 "Accorder le privilège à un érudit de l'école malikite."
 muslim_school_events.24.e:0 "Accorder le privilège à un érudit de l'école chaféite."
 muslim_school_events.24.f:0 "Accorder le privilège à un érudit de l'école ismaélienne."
 muslim_school_events.24.g:0 "Accorder le privilège à un érudit de l'école ja'farite."
 muslim_school_events.24.h:0 "Accorder le privilège à un érudit de l'école zaïdite."
 flavor_eth.39.b.tt:0 "Active une décision pour former l'§YAksoum§!."
 flavor_msi.2.a.tt:0 "Gagne §G§0[Root.federal_manpower_gain_tooltip.GetValue]§! effectifs des royaumes fédéraux [Root.GetAdjective]."
 flavor_msi.5.a.tt:0 "Gagne §G§0[Root.allegience_tooltip.GetValue]§! d'allégeance tribale des royaumes fédéraux [Root.GetAdjective]."
 flavor_nub.1.b:0 "Je me demande s'ils m'accepteront comme leur souverain..."
 flavor_zim.3.a.tt:0 "Active une décision permettant d'attirer les §Y[ZUL.GetName]§!."
 fetishist_flavor.603.t:0 "Un nouveau culte pour [Root.GetName]"
 fetishist_flavor.603.desc:0 "Nos chamans ont rassemblé les chefs spirituels des différents cultes. Tous présentent les bienfaits de la croyance en leur divinité à [Root.Monarch.GetName] dans l'espoir de [Root.Monarch.GetHerHim] persuader de choisir leur culte plutôt que les autres."
 fetishist_flavor.603.a:0 "Choisir le culte de Yemoja."
 fetishist_flavor.603.b:0 "Choisir le culte de Roog."
 fetishist_flavor.603.c:0 "Choisir le culte de Nyame."
 fetishist_flavor.603.d:0 "Choisir le culte des Cwezi."
 fetishist_flavor.603.e:0 "Choisir le culte de Mlira."
 fetishist_flavor.603.f:0 "Choisir le culte de Mwari."
 fetishist_flavor.603.g:0 "Choisir le culte d'Enkai."
 fetishist_flavor.603.h:0 "Choisir le culte de Waaq."
 fetishist_flavor.603.i:0 "Choisir le culte de Zanahary."
 fetishist_flavor.603.j:0 "Choisir le culte du christianisme."
 fetishist_flavor.603.k:0 "Choisir le culte de l'islam."
 fetishist_flavor.603.l:0 "Choisir le culte du Buddhadharma."
 fetishist_flavor.603.m:0 "Choisir le culte du Sanatana Dharma."
 fetishist_flavor.603.n:0 "Choisir le culte de Teotl."
 fetishist_flavor.603.o:0 "Choisir le culte de Freyja."
 fetishist_flavor.603.p:0 "Choisir le culte d'Haymanot."
 fetishist_flavor.603.q:0 "Choisir le culte du Mazdayasna."
 fetishist_flavor.603.r:0 "Nous devrions conserver notre culte actuel."
 flavor_zul.1.t:0 "L'essor des [ZUL.GetName]"
 flavor_zul.1.d.a:0 "Les Ngunis jouissaient d'une vie paisible au sein de leurs petites communautés tribales. Tout a changé lorsque les conseillers militaires [Root.GetAdjective] ont eu l'idée de militariser et de recruter le peuple de [789.GetName] pour les armées de [Root.GetName]. Un jeune chef nguni a unifié les clans ngunis de [789.GetName] et a utilisé nos propres enseignements militaires et nos armes pour se rebeller contre nous ! Ils se font désormais appeler les [ZUL.GetName] et déclarent leur indépendance de [Root.GetName] !"
 flavor_zul.1.d.b:0 "Les Ngunis étaient un groupe de clans et de communautés qui sont restés entre eux pendant de nombreuses années. Cela a changé en 1816 lorsque le jeune chef Shaka Zulu a succédé à son père, qui l'avait auparavant banni, et a militarisé le clan de 1 500 hommes. Grâce à ses compétences militaires et à l'Impi [ZUL.GetAdjective], les [ZUL.GetAdjective] ont uni les clans ngunis et fondé le royaume des [ZUL.GetName]."
 flavor_zul.1.a:0 "Nous devons les arrêter !"
 flavor_zul.1.b:0 "Ils peuvent avoir leur indépendance s'ils la désirent tant."
 flavor_zul.1.c:0 "Je me demande ce que ça fait d'être un Zoulou..."
 flavor_aju.13.a.tt:0 "Chaque province possédée sur l'§Yîle de Java§! obtient le modificateur de province « §YInfluence commerciale ajuuraan§! » pendant §Y25 ans§!, conférant les effets suivants :\nModificateur de puissance commerciale locale : §R-10,0 %§!\nModificateur de production locale de biens : §G+25,0 %§!"
 flavor_hau.1.t:0 "Demande militaire"
 flavor_hau.1.d:0 "Les cités haoussa sont divisées et la diplomatie reste lettre morte. L'unification de notre peuple n'est possible que d'une seule façon : par la force !\nIl y a cependant un problème : les cités-États rivales rassemblent des alliés pour se défendre. Si nous voulons une offensive efficace, nous avons besoin d'une aide militaire. Nous devrions demander à nos propres alliés de l'aide en la matière."
 flavor_hau.1.a:0 "Un plan judicieux."
 flavor_hau.1.b:0 "Demander de l'aide ? Jamais !"
 flavor_hau.2.t:0 "[From.GetName] demande notre aide militaire"
 flavor_hau.2.d:0 "Le [From.GovernmentName] de [From.GetName] a de grandes ambitions : unifier les États haoussa et mettre fin aux rivalités entre cités-États. En raison de leur taille, ils manquent d'effectifs pour atteindre cet objectif. Un ambassadeur de [From.GetName] a récemment atteint notre cour, demandant une aide militaire pour poursuivre leur ambition. Bien sûr, il est risible qu'ils y parviennent jamais, mais il pourrait être intéressant d'investir dans [From.GetName] au cas où ils deviendraient une puissance régionale..."
 flavor_hau.2.a:0 "Que représentent quelques soldats pour aider un État à réaliser son rêve ?"
 flavor_hau.2.b:0 "Ce serait juste un gaspillage d'hommes [Root.GetAdjective]."
 flavor_hau.3.t:0 "Les effectifs de [From.GetName] arrivent !"
 flavor_hau.3.d:0 "Bonne nouvelle ! Notre demande a été entendue et les [From.GetAdjective] ont envoyé 1 000 de leurs meilleurs hommes pour nous aider dans notre combat !"
 flavor_hau.3.a:0 "Excellent."
 flavor_hau.4.t:0 "[From.GetName] refuse de nous aider !"
 flavor_hau.4.d:0 "Malgré nos meilleures tentatives diplomatiques, les lâches de [From.GetName] ne voient aucune raison de nous aider dans notre noble combat ! Clairement, ils ne méritent pas d'être nos alliés."
 flavor_hau.4.a:0 "Maudits soient ces [From.GetAdjective] !"
 flavor_hau.5.t:0 "L'érudit musulman peul"
 flavor_hau.5.d:0 "Selon les rumeurs, les Peuls sont au cœur d'une révolution religieuse. Bien qu'il soit difficile de prouver ces rumeurs, un érudit musulman peul de [Root.Capital.GetName] a été inspiré pour organiser une réforme dans notre propre pays. Son message puissant et sa personne charismatique ont impressionné une partie de notre population, mais le manque de preuves de djihads réussis à l'ouest limite son succès. Néanmoins, la popularité de l'érudit a rendu la culture peule très populaire dans notre pays, un événement qui déconcerte même nos plus brillants conseillers."
 flavor_hau.5.a:0 "Je ne sais pas si c'est une bonne ou une mauvaise nouvelle..."
 flavor_zim.3.t:0 "Militarisation nguni"
 flavor_zim.3.d:0 "Les Ngunis se sont révélés être des guerriers redoutables et dignes, qui donnent même du fil à retordre à nos propres troupes ! Un clan en particulier, le clan dit des Zoulous, a fait preuve d'une ruse et d'une adaptabilité exceptionnelles dans le feu du combat. Il vaut la peine d'envisager d'établir un État-marche là-bas afin que les Ngunis puissent s'organiser et nous aider en cas de besoin."
 flavor_zim.3.a:0 "Je pense qu'il vaut mieux les intégrer dans notre État."
 flavor_zim.3.b:0 "Cela semble être une bonne idée."
 flavor_zim.3.c:0 "Je pense qu'ils méritent plutôt leur indépendance."
 kilwan_embassy_holder_name:0 "[kilwan_embassy_holder.GetName]"
 persian_embassy_holder_name:0 "[persian_embassy_holder.GetName]"
 kilwan_embassy_holder_adjective:0 "[kilwan_embassy_holder.GetAdjective]"
 persian_embassy_holder_adjective:0 "[persian_embassy_holder.GetAdjective]"
 kilwan_embassy_holder_religion:0 "[kilwan_embassy_holder.Religion.GetName]"
 persian_embassy_holder_religion:0 "[persian_embassy_holder.Religion.GetName]"
 flavor_zan.8.t:0 "Envoyer une ambassade en Perse ?"
 flavor_zan.8.desc:0 "Certaines histoires et légendes racontent l'origine du peuple shirazi, habitant désormais notre pays mais originaire de la terre lointaine d'Eran, très éloignée de Kilwa. Maintenant, nos marchands ont établi le contact avec des gens de l'autre côté d'un détroit appelé Ormuz, parlant une langue appelée farsi, qui pourrait nous mener à ce territoire légendaire. Alors, mon sultan, devons-nous envoyer une ambassade dans cette terre lointaine d'outre-mer, pour vérifier si ces histoires sont vraies ? Ou peut-être est-ce risqué de les envoyer sur le continent, et devrions-nous nous contenter de notre activité commerciale actuelle dans les mers connues ?"
 flavor_zan.8.a:0 "Envoyer un ambassadeur en Perse"
 flavor_zan.8.a.tt:1 "Nous demanderons à §Y[2218.Owner.GetName]§! d'établir une ambassade [Root.GetAdjective] à §Y[2218.GetName]§! en échange d'une ambassade [2218.Owner.GetAdjective] à §Y[Root.Capital.GetName]§!.\n[2218.Owner.GetName] pourrait refuser complètement si sa culture principale n'est PAS §Ypersane§!."
 flavor_zan.8.b:1 "Cela n'en vaut pas vraiment la peine"
 flavor_zan.9.t:0 "Un ambassadeur [From.GetAdjective] nous rencontre"
 flavor_zan.9.desc:0 "Mon seigneur, une ambassade venant d'une terre lointaine au sud dans l'océan, que certains nomment Zanj, dit être venue dans notre pays pour recueillir des informations sur ses propres origines, qui s'appelle Kilwa, disant aussi qu'ils pourraient être des Persans. Devons-nous accepter cette ambassade, en établissant une relation diplomatique régulière avec eux ?"
 flavor_zan.9.a:0 "Accueillons-le !"
 flavor_zan.9.b:0 "Nous n'avons pas besoin de diplomatie avec Kilwa"
 flavor_zan.10.t:0 "La Perse accueille notre ambassade !"
 flavor_zan.10.desc:0 "Grande nouvelle, mon sultan ! Notre ambassadeur envoyé en Eran nous a envoyé des nouvelles : il a atteint un pays nommé [From.GetAdjective], qui était désireux d'établir des relations diplomatiques avec notre pays."
 flavor_zan.10.a:0 "Très aimable de leur part !"
 flavor_zan.11.t:0 "La Perse a expulsé l'ambassadeur !"
 flavor_zan.11.desc:0 "Mauvaise nouvelle, mon sultan ! Notre ambassade a atteint la terre lointaine de [From.GetAdjective], mais leur souverain a été assez borné pour rejeter notre origine persane et expulser nos gens de leur pays."
 flavor_zan.11.a:0 "Oh, ces sales bâtards !"
 flavor_zan.12.t:0 "La destruction de l'ambassade [embassy_owner.GetAdjective]"
 flavor_zan.12.desc:0 "Malgré tous nos efforts, nous avons perdu l'ambassade [embassy_owner.GetAdjective] ! Notre connexion avec [embassy_owner.GetName] a été rompue. Seul le temps dira comment cela affectera nos relations..."
 flavor_zan.12.a:0 "Ce n'est pas bon..."
 flavor_zan.12.b:0 "Ce n'est pas bon..."
 flavor_zan.13.t:1 "[From.GetName] a perdu l'ambassade [Root.GetAdjective] !"
 flavor_zan.13.desc:0 "Mon seigneur, nous avons perdu le contact avec l'ambassade envoyée par le peuple du Zanj. Nous ne comprenons pas entièrement les raisons de cela ; certains disent qu'ils sont retournés dans leur pays, d'autres qu'ils voulaient voyager vers d'autres terres lointaines. Probablement nous ne saurons jamais ce qu'il est advenu d'eux."
 flavor_zan.13.a:0 "Oh, quelle perte de temps !"
 flavor_zan.14.t:1 "[From.GetName] a perdu l'ambassade [Root.GetAdjective] !"
 flavor_zan.14.desc:1 "Mon seigneur, cette ambassade étrangère envoyée par le peuple du Zanj a été récemment dissoute. Il est étrange qu'ils aient refusé de rester ici, après avoir voyagé si longtemps et de si loin."
 flavor_zan.14.a:0 "Ces gens étaient étranges."
 flavor_zan.15.t:1 "Nos marchands visitent [OppositeEmbassyHolderName]"
 flavor_zan.15.desc:1 "L'ambassade que nous avons établie dans les terres lointaines de [OppositeEmbassyHolderName] nous a révélé des gens intéressants avec qui commercer. De plus, récemment, certains de nos marchands ont également visité ces terres, échangeant certaines de nos marchandises contre les leurs, et réalisant des profits intéressants avec ces voyages."
 flavor_zan.15.a:0 "C'est toujours agréable d'obtenir de bonnes choses et de l'argent !"
 flavor_zan.16.t:1 "Partage des connaissances avec [OppositeEmbassyHolderName]"
 flavor_zan.16.desc:1 "La route commerciale établie par nos marchands avec le pays lointain de [OppositeEmbassyHolderName] a récompensé l'effort d'établir notre ambassade là-bas. Mais outre les marchandises et l'argent, il y a quelque chose de plus intéressant qui a commencé à être partagé entre nos deux peuples : les idées. Ainsi, cela a été très bénéfique pour le développement de notre pays ces dernières années, mon sultan."
 flavor_zan.16.a:0 "Partager de nouvelles idées en vaut toujours la peine."
 flavor_zan.17.t:0 "Interactions religieuses"
 flavor_zan.17.desc:1 "L'ambassade établie il y a quelques années nous a également donné des informations sur les croyances des gens de [OppositeEmbassyHolderName], qui ne sont pas si différentes des nôtres. Cela a également stimulé le travail de nos érudits religieux, au bénéfice du culte de la religion dans notre pays et de la piété des croyants, mon sultan."
 flavor_zan.17.a:1 "La religion relie nos deux royaumes."
 flavor_zan.18.t:1 "L'influence de [OppositeEmbassyHolderReligion]"
 flavor_zan.18.desc:1 "Les années de discussions religieuses entre les érudits de notre pays et ceux de [OppositeEmbassyHolderName] ont profondément influencé nos croyances. Désormais, un courant de pensée a émergé parmi nos érudits, affirmant que notre religion n'est pas si différente de la leur. Dès lors, une question importante se pose à partir de ces réflexions. Serait-il plus bénéfique pour notre pays d'embrasser officiellement la religion d'amis de longue date, renforçant ainsi davantage notre relation ?"
 flavor_zan.18.a:1 "[OppositeEmbassyHolderReligion] sera notre nouvelle foi."
 flavor_zan.18.b:0 "Nous conserverons nos propres croyances, merci."
 flavor_zan.19.t:1 "Les revendications des descendants shirazi"
 flavor_zan.19.desc:1 "L'idée d'envoyer une ambassade dans les terres lointaines de [OppositeEmbassyHolderName] visait à rechercher les origines du peuple shirazi. Après tant d'années, nous sommes certains d'avoir trouvé la terre d'où ils sont venus. Cela pourrait également nous donner une revendication légitime aux yeux de notre peuple sur ces terres lointaines mais riches, où nous pourrions également établir un point d'appui sur le continent asiatique. Mon [Root.Monarch.GetTitle], devons-nous poursuivre ces revendications ambitieuses ?"
 flavor_zan.19.a:0 "Nous devons faire valoir les revendications des origines shirazi !"
 flavor_zan.19.b:1 "Je ne pense pas qu'il soit sage de faire valoir ces revendications."
 flavor_zan.20.t:0 "Mogadiscio admet sa défaite"
 flavor_zan.20.desc:0 "Nous avons vaincu l'entrepôt commercial de Mogadiscio, et nous pouvons donc prendre autant de butin que nous le souhaitons !"
 flavor_zan.20.a:0 "Piller est la meilleure partie de la vie !"
 flavor_zan.21.t:1 "Route commerciale vers la Chine"
 flavor_zan.21.desc:1 "Grâce à notre présence à Malacca, nos marchands ont réussi à obtenir la connaissance d'une route commerciale navale vers la Chine !"
 flavor_zan.21.a:0 "Cap à l'Est !"
 flavor_msi.1.t:0 "Le Royaume confédéral mossi"
 flavor_msi.1.d:0 "Les royaumes mossi sont désormais unis pour la première fois depuis des générations, mais cela n'a pas toujours été ainsi. Nos anciens racontent l'histoire de la princesse Yennenga, qui s'enfuit vers ces terres depuis la cité mamprussi de Gambaga, et de son fils Ouédraogo, qui fonda la cité de Tenkodogo. Il eut ensuite trois autres fils. L'aîné, Diaba, fut également le fondateur de Fada N'Gourma. Le deuxième fils, Rawa, fonda le royaume de Zondoma. Le dernier fils, Zoungrana, devint souverain de Tenkodogo, et eut également un fils, nommé Oubri, qui fut lui-même le fondateur de Ouagadougou. Telles sont les origines du peuple mossi, et en conséquence, nous, les Mossi, nous sommes organisés en royaumes indépendants. Mais maintenant, il est temps d'avoir un gouvernement commun, même si nous respectons les origines et les différences de chacun des royaumes mossi."
 flavor_msi.1.a:0 "Il est temps d'avoir un Royaume confédéral mossi unifié, alors."
 flavor_msi.2.t:0 "Effectifs des royaumes mossi"
 flavor_msi.2.d:0 "Le temps de la guerre est venu pour le peuple mossi. Nous avons maintenant besoin de guerriers de chacun des royaumes mossi pour faire face à la menace."
 flavor_msi.2.a:0 "Allez monter nos chevaux, Mossi !"
 flavor_msi.3.t:0 "Mariage parmi le peuple mossi"
 flavor_msi.3.d:0 "Nos légendes racontent que nos royaumes sont nés du mariage entre les peuples boussansi, dagomba et ninisi. Depuis des générations, nous suivons les coutumes de nos ancêtres, et les mariages entre princes et princesses mossi sont courants. Nous avons maintenant besoin d'un consort pour régner avec nous sur la Confédération mossi."
 flavor_msi.3.a:0 "Qui sera l'heureux élu ?"
 flavor_msi.4.t:0 "Célébration rituelle"
 flavor_msi.4.d:0 "C'est une tradition parmi les rois et reines mossi de célébrer des festivals, l'un pour accroître le « naam » de notre lignée, et l'autre de sacrifices au « tenga ». Le temps de célébrer l'un de ceux-ci est venu."
 flavor_msi.4.a:0 "Nous aimons toujours les festivals, n'est-ce pas ?"
 flavor_msi.5.t:0 "Allégeance tribale"
 flavor_msi.5.d:0 "Les effectifs fournis par les différents royaumes mossi ces dernières années ont été essentiels pour notre Confédération. Cependant, nous avons besoin d'un système plus intégré pour recruter davantage de cavaliers mossi renommés dans nos terres."
 flavor_msi.5.a:0 "Jurons allégeance entre les clans mossi !"
 flavor_msi.6.t:0 "Réforme du gouvernement de la Confédération mossi"
 flavor_msi.6.d:0 "Les royaumes mossi ont été gouvernés en Confédération pendant quelques années. Cependant, des vents de changement soufflent sur nos royaumes, et une question est dans l'air : devons-nous être gouvernés comme nous l'avons été jusqu'à présent, ou devons-nous avoir un gouvernement plus centralisé pour nos royaumes ?"
 flavor_msi.6.a:0 "Nous sommes heureux d'être la Confédération mossi."
 flavor_msi.6.b:0 "Nous avons besoin d'un pouvoir plus centralisé !"
 flavor_oyo.1.t:0 "Achat de chevaux"
 flavor_oyo.1.d:0 "Ayant étendu notre commerce aux zones dominées par les musulmans, nous pourrions avoir la possibilité de commencer à établir des contacts pour l'achat d'une denrée rare dans nos terres : les chevaux. Être en mesure de nous procurer ces animaux bénéficierait non seulement à nos agriculteurs, mais aussi à notre armée, car nous pourrions commencer à former des régiments de cavalerie. C'est une opportunité peut-être trop importante pour la laisser passer."
 flavor_oyo.1.a:0 "Nous devons acheter les chevaux"
 flavor_oyo.1.b:0 "Avoir des relations diplomatiques avec eux suffit pour l'instant"
 flavor_oyo.2.t:0 "Des marchands officiels [From.GetAdjective] nous rendent visite pour acheter des chevaux !"
 flavor_oyo.2.d:0 "Récemment, la nation de [From.GetName] a étendu son commerce dans nos régions. Nous n'y avions pas vraiment prêté attention, mais certains de leurs marchands sont venus nous voir avec une proposition commerciale : ils ont l'intention d'acheter certains de nos chevaux, pour lesquels ils nous paieront en conséquence. Nous avons la chance d'être bénis par une abondance de chevaux, donc si nous pouvons en tirer profit, nous n'avons rien à redire."
 flavor_oyo.2.a:0 "Parfait"
 flavor_oyo.3.t:0 "Chevaux de [From.GetName]"
 flavor_oyo.3.d:0 "Les marchands que nous avons envoyés à [From.GetName] sont revenus avec d'excellentes nouvelles. Ils ont réussi à négocier l'achat de certains des chevaux là-bas, et les ont ramenés dans notre pays. Nous pourrons désormais copier leurs régiments de cavalerie."
 flavor_oyo.3.a:0 "Parfait"
 flavor_oyo.4.t:0 "Les Oyo Mesi forcent le souverain à abdiquer"
 flavor_oyo.4.d:0 "Les Oyo Mesi ont toujours été une partie cruciale de notre gouvernement. Ce sont eux qui donnent leur approbation pour l'intronisation d'un nouveau souverain, et ils ont le devoir de le déposer s'ils le jugent tyrannique. Malheureusement, leur décision concernant notre [Root.Monarch.GetTitle] [Root.Monarch.GetName] a été prise et [Root.Monarch.GetSheHe] a reçu la calebasse traditionnelle comme message [Root.Monarch.GetSheHe] qu'il doit abdiquer par suicide rituel.\nIls sont trop puissants et influents pour qu'on s'y oppose, donc notre [Root.Monarch.GetTitle] ne peut qu'obéir à leur commandement."
 flavor_oyo.4.a:0 "Il n'y a pas d'échappatoire"
 flavor_jol.1.t:0 "Accord commercial européen"
 flavor_jol.1.d:0 "Nos navires et explorateurs ont navigué au loin pour découvrir les nombreuses terres au-delà de notre connaissance. L'une de ces terres est un continent entier au nord appelé Europe, patrie de nombreux pays et peuples différents. Nous pourrions essayer de contacter certaines de ces nations, pour voir si l'une d'entre elles serait intéressée à établir des relations commerciales avec nous. Nous pourrions sans aucun doute bénéficier grandement de tels accords commerciaux."
 flavor_jol.1.a:0 "Bonne idée"
 flavor_jol.1.b:0 "Il n'y a pas besoin de tels accords"
 flavor_jol.2.t:0 "Accord commercial de [From.GetName]"
 flavor_jol.2.d:0 "Nous avons été approchés par certains marchands et diplomates de [From.GetName], un pays du sud qui vient récemment d'entrer dans notre sphère d'influence. Ils nous ont fait l'offre d'établir un accord commercial avec eux, arguant qu'un commerce accru entre nos nations bénéficiera sans aucun doute aux deux parties. Leur argument est sensé, et cela pourrait être un moyen d'accéder à des marchandises plus exotiques."
 flavor_jol.2.a:0 "Conclure l'accord"
 flavor_jol.2.b:0 "Il n'y a pas besoin de tels accords"
 flavor_jol.3.t:0 "Accord commercial accepté"
 flavor_jol.3.d:0 "Les marchands et diplomates que nous avons envoyés à [From.GetName] sont revenus avec d'excellentes nouvelles. Le [From.Monarch.GetTitle] [From.Monarch.GetName] a accepté d'établir des relations officielles entre nos pays et d'ouvrir leurs ports et marchés au commerce avec nous. Cela augmentera certainement le flux commercial dans notre pays, avec la richesse qui l'accompagne."
 flavor_jol.3.a:0 "Parfait"
 flavor_jol.4.t:0 "Accord commercial rejeté"
 flavor_jol.4.d:0 "Les marchands et diplomates que nous avons envoyés à [From.GetName] sont revenus avec de terribles nouvelles. Le [From.Monarch.GetTitle] [From.Monarch.GetName] a stupidement refusé de signer un accord commercial avec nous, coupant toute possibilité d'augmenter le flux commercial entre nos pays. Nos marchands et commerçants devront se débrouiller seuls et se contenter de produits plus locaux."
 flavor_jol.4.a:0 "Peu importe"
 flavor_jol.5.t:0 "L'accord commercial entraîne une demande accrue d'ivoire"
 flavor_jol.5.d:0 "L'accord commercial que nous avons récemment signé avec ces diplomates venant d'Afrique de l'Ouest a eu des conséquences imprévues. Bien qu'il soit vrai que nous avons maintenant plus accès à leurs marchandises exotiques, nos nobles et marchands se sont trop habitués à ces produits, en particulier l'ivoire, et peu importe la quantité que nous réussissons à importer, leur appétit n'est jamais rassasié."
 flavor_jol.5.a:0 "Nous avons besoin de plus d'ivoire"
 custom_global_monthly_devastation:0 "Guildes locales de reconstruction"
 custom_global_monthly_devastation_desc:0 "Les guerres et les catastrophes sont le fléau de toute province. Notre grande nation maintient les périodes de dévastation dans nos provinces à un niveau bas grâce à l'utilisation de guildes locales de maçons et d'architectes, qui reconstruisent les cités et villages dévastés."
 custom_global_prosperity_growth:0 "Quête de prospérité"
 custom_global_prosperity_growth_desc:0 "Un empire ne peut être aussi glorieux que sa province la plus éloignée. En assurant que nous nous concentrons sur la prospérité non seulement de la capitale centralisée de notre nation, mais aussi sur la prospérité des petits villages, nous pouvons atteindre un Âge d'Or pour notre pays."
 custom_monthly_piety_accelerator:0 "Dévotion souple"
 custom_monthly_piety_accelerator_desc:0 "Le mysticisme et le légalisme sont les deux faces d'une même pièce. Ce n'est qu'en embrassant les deux aspects de l'islam que notre pieux royaume peut atteindre la grandeur spirituelle."
 custom_monthly_gold_inflation_modifier:0 "Régulation de l'or"
 custom_monthly_gold_inflation_modifier_desc:0 "Les mines d'or sont une arme à double tranchant. Bien que leur or aide notre économie, une dépendance trop forte à son égard peut signifier la ruine de la valeur de notre monnaie. En régulant l'or que nous obtenons des mines d'or et la façon dont nous l'utilisons, nous pouvons minimiser le danger d'inflation dans notre nation."
 custom_gold_depletion_chance_modifier:0 "Exploitation minière avancée"
 custom_gold_depletion_chance_modifier_desc:0 "Épuisé n'est pas épuisé. Même si une mine d'or semble ne plus avoir de minerai d'or, cela signifie seulement que nous n'avons pas creusé assez profond."
 custom_tolerance_of_heretics_capacity:0 "Points communs religieux"
 custom_tolerance_of_heretics_capacity_desc:0 "Les hérétiques ne valent pas moins que notre propre peuple pieux. Au lieu d'attaquer les hérétiques en raison des différences de croyance, nous devrions nous concentrer sur nos points communs et accepter leur présence dans notre société."
 custom_tolerance_of_heathens_capacity:0 "Édits de tolérance"
 custom_tolerance_of_heathens_capacity_desc:0 "Contrairement à d'autres nations, notre gouvernement reconnaît la futilité de discriminer ceux qui n'embrassent pas la religion de l'État. Grâce à la mise en œuvre d'édits de tolérance, notre société a surmonté les conflits entre les membres de la vraie foi et les païens."
 custom_yearly_doom_reduction:0 "Dévotion à vie"
 custom_yearly_doom_reduction_desc:0 "Il n'y a pas de plus grand honneur que de consacrer sa vie à l'adoration des dieux. Bien que cela ne remplacera jamais les sacrifices nécessaires pour conjurer le destin, les prières apaiseront nos dieux."
 custom_yearly_authority:0 "Autorité religieuse"
 custom_yearly_authority_desc:0 "L'autorité sur l'État et sur le clergé sont tous deux des piliers importants de notre classe dirigeante. Notre peuple ne doit plier le genou que devant son souverain d'État et de foi."
 custom_move_capital_cost_modifier:0 "Administration flexible"
 custom_move_capital_cost_modifier_desc:0 "La capitale est généralement la tête de l'État et le centre du gouvernement national. Cependant, parfois les capitales doivent être déplacées vers des positions plus avantageuses. Grâce à notre administration flexible, il n'est pas difficile pour notre pays de déplacer la capitale."
 custom_all_estate_loyalty_equilibrium:0 "Cabinet de cour"
 custom_all_estate_loyalty_equilibrium_desc:0 "Les états sont des entités politiques puissantes dans notre nation. En établissant un cabinet à la cour, où chaque état est représenté, nous pouvons assurer leur loyauté envers la couronne."
 custom_monthly_favor_modifier:0 "Art de l'ingratiation"
 custom_monthly_favor_modifier_desc:0 "La diplomatie est une affaire délicate. Chaque action à la cour, aussi petite soit-elle, influence l'impression que les autres ont de nous. Il est de la plus haute importance que nos diplomates sachent comment s'insinuer dans les bonnes grâces des souverains étrangers."
 custom_movement_speed_in_fleet_modifier:0 "Plus rapide que le vent"
 custom_movement_speed_in_fleet_modifier_desc:0 "Grâce à notre façon ingénieuse de construire des bateaux, nous sommes capables de fabriquer des navires qui naviguent plus vite que le vent.\nComment nous y parvenons est un secret de nos marins."
 custom_amount_of_cawa:0 "Camps d'entraînement d'élite"
 custom_amount_of_cawa_desc:0 "Les Cawa sont l'épine dorsale de notre armée. Cependant, en raison de leur entraînement, ils sont peu nombreux. Avec l'établissement de camps d'entraînement d'élite, il nous est possible de déployer plus de régiments cawa que jamais auparavant."
 custom_global_rebel_suppression_efficiency:0 "Politique militaire"
 custom_global_rebel_suppression_efficiency_desc:0 "Les rebelles sont toujours une menace pour notre nation, que les forces de l'ordre locales ne peuvent pas gérer. Pour de tels cas, il nous est nécessaire d'utiliser notre armée pour assurer la paix dans nos provinces."
