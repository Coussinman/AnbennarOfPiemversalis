 colonize_tuat_decision_title:0 "Coloniser [1127.GetName]"
 colonize_tuat_decision_desc:0 "Nous pouvons coloniser la province [1127.GetName] et y envoyer certains de nos gens. Cela nous permettra d'avoir une connexion directe avec le Maghreb."
 colonize_djado_and_tajarhi_decision_title:0 "Coloniser le Corridor"
 colonize_djado_and_tajarhi_decision_desc:1 "[2474.GetName] et [2475.GetName] sont des connexions vitales entre le Sahel et le Maghreb. En réinstallant certains de nos gens, nous pouvons revendiquer ce corridor pour nous-mêmes."
 mal_purchase_trade_colony_title:0 "Acheter une Colonie Commerciale"
 mal_purchase_trade_colony_desc:0 "Bien que les Européens ne fassent pas très confiance à notre genre, notre or nous permettra de les convaincre quand même de nous vendre une de leurs provinces.\nNous devrions cependant nous assurer que notre relation avec le pays cible est quelque peu bonne."
 mal_purchase_trade_colony_tt:1 "§YNous pourrons demander au propriétaire de l'une des cinq provinces sélectionnées d'acheter ladite province.\nLa chance que le propriétaire nous vende sa province dépend de son opinion de nous. Plus elle est basse, moins il est probable qu'il vende la province désirée.§!"
