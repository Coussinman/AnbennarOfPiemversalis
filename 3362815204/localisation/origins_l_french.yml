 eth_refused_annexation:0 "A refusé l'annexion"
 eth_war_times_ahead:0 "Temps de guerre à venir"
 eth_restored_contact:0 "Contact restauré"
 eth_banned_jesuits:0 "A banni les Jésuites"
 mal_gold_of_mali:0 "Or du Mali"
 mal_ivory_of_mali:0 "Ivoire du Mali"
 mal_invested_into_mecca:0 "A investi à La Mecque"
 mal_accepted_gift:0 "A accepté notre don"
 mal_refused_gift:0 "A refusé notre don"
 mal_investments_enabled:0 "Or donné"
 zim_preferred_by_mutapa:0 "Favorisé par le Mutapa"
 zim_refused_by_mutapa:0 "Refusé par le Mutapa"
 zim_exploited_merchants:0 "A profité des marchands"
 ###MALI MISSION MODIFIERS###
 mal_colonial_enthusiasm:0 "Enthousiasme Colonial"
 desc_mal_colonial_enthusiasm:0 "Le mythe de Ko Mamadi a attiré nombre de nos jeunes hommes à enquêter sur son sort et à commencer une nouvelle vie en Amérique du Sud dans l'espoir de trouver ses restes et ceux de ses équipages."
 mal_controller_of_the_market:0 "Contrôleur du Marché"
 desc_mal_controller_of_the_market:1 "Grâce à notre accès à l'or, nous avons réussi à obtenir une influence significative sur des marchés qui sont bien en dehors de notre sphère d'influence."
 mal_economic_oppression:0 "Oppression Économique"
 desc_mal_economic_oppression:1 "En raison de l'afflux d'or sur le marché le plus riche du monde, la valeur de l'or a atteint son niveau le plus bas absolu. En conséquence, personne ne peut vraiment rivaliser avec nos prix et nous pouvons exploiter le marché mondial jusqu'à ce que la majorité des nations aient réformé leur monnaie."
 mal_closed_gold_mine:0 "Mine Fermée"
 desc_mal_closed_gold_mine:1 "Cette province ne produit plus d'or jusqu'à ce que le marché de l'or se soit stabilisé."
 mal_protected_economy:0 "Économie Protégée"
 desc_mal_protected_economy:0 "Notre économie atteint de nouvelles dimensions grâce à la protection intensifiée de notre commerce."
 mal_a_new_golden_age:0 "Second Âge d'Or"
 desc_mal_a_new_golden_age:0 "Notre empire a renversé le cours du destin ! Là où nous étions autrefois un royaume en déclin et estropié se dresse maintenant le nouvel Empire du Mali, plus fort et plus puissant que jamais !"
 mal_great_imperial_power:0 "Patron de l'Afrique"
 desc_mal_great_imperial_power:0 "Notre puissance a grandi à des tailles formidables et même les Européens ne peuvent poser une menace à notre grand empire !"
 mal_river_cultivation:0 "Culture Fluviale"
 desc_mal_river_cultivation:0 "Le fleuve de cette province connaît une grande cultivation économique et agricole, rendant la terre plus fertile."
 mal_generous_realm:0 "Royaume Généreux"
 desc_mal_generous_realm:1 "Nos dons à nos frères de foi nous ont rendus, ainsi que nos ambassadeurs qui ont apporté l'or, assez populaires."
 mal_fan_of_the_ulema:0 "Soutien Total des Oulémas"
 desc_mal_fan_of_the_ulema:1 "Notre décision de répandre la vraie foi et de convertir les païens a inspiré les Oulémas. Ils nous soutiennent maintenant du mieux qu'ils peuvent."
 mal_fan_of_the_dhimmi:0 "Soutien Total des Dhimmis"
 desc_mal_fan_of_the_dhimmi:1 "Notre décision de tolérer les païens et de leur donner plus de droits a inspiré les Dhimmis. Ils nous soutiennent maintenant du mieux qu'ils peuvent."
 great_mosque_djenne_modifier:0 "Grande Mosquée de Djenné"
 desc_great_mosque_djenne_modifier:1 "Cette province abrite la Grande Mosquée de Djenné. Les Oulémas de la province ont investi une grande quantité de temps et de ressources pour rénover la mosquée et en ont fait le joyau de l'Afrique de l'Ouest."
 mal_mansas_journey:0 "Pèlerinage du Mansa"
 desc_mal_mansas_journey:0 "Notre souverain est actuellement en voyage vers La Mecque, prenant une route à travers le monde chrétien. En chemin, notre souverain voit les merveilles de l'Europe."
 mal_advisors_journey:0 "Pèlerinage des Conseillers"
 desc_mal_advisors_journey:0 "Nos conseillers sont actuellement en voyage vers La Mecque, prenant une route à travers le monde chrétien."
 mal_pilgrimage_desc:0 "jusqu'à la fin du pèlerinage"
 mal_the_pilgrim:0 "Règne Pieux"
 desc_mal_the_pilgrim:0 "Les nombreux pèlerinages à La Mecque ont fait de notre royaume un exemple de piété et de légitimité."
 ###MALI EVENT MODIFIERS###
 mal_nobles_take_over:0 "Prise de Pouvoir des Nobles"
 desc_mal_nobles_take_over:1 "Cette province a été prise en main par les nobles du Mali, qui cherchent à augmenter leur pouvoir au sein de l'empire au détriment des locaux."
 mal_burghers_take_over:0 "Prise de Pouvoir des Bourgeois"
 desc_mal_burghers_take_over:1 "Cette province a été prise en main par les bourgeois du Mali, qui cherchent à augmenter leur pouvoir au sein de l'empire au détriment des locaux."
 mal_radical_clergy:0 "Oulémas Radicaux"
 desc_mal_radical_clergy:0 "Les Oulémas ont pris une plus grande part du contrôle au Mali, et essaient de saper l'influence des Dhimmis et l'influence des païens au Mali."
 mal_radical_dhimmi:0 "Dhimmis Radicaux"
 desc_mal_radical_dhimmi:0 "Les Dhimmis ont pris une plus grande part du contrôle au Mali, et essaient de saper l'influence des Oulémas et l'influence des musulmans au Mali."
 mal_the_declining_authority_of_mali:0 "Déclin de l'Autorité"
 desc_mal_the_declining_authority_of_mali:1 "Les sujets du Mali ne prennent pas l'autorité du mansa au sérieux. Maintenir leur loyauté sera plus que difficile pendant cette période éprouvante."
 mal_investment_of_the_mansa:0 "Don du Mali"
 desc_mal_investment_of_the_mansa:0 "Les pèlerins du Mali ont laissé des tonnes d'or chez nous. Bien qu'ils aient causé des dommages économiques, l'or qu'ils ont laissé réduit les prix de notre infrastructure."
 mal_the_gold_inflation:0 "Or du Mali"
 desc_mal_the_gold_inflation:0 "Notre économie souffre actuellement de l'afflux d'or étranger."
 mal_investing_in_own_provinces:0 "Investissement en Or"
 desc_mal_investing_in_own_provinces:1 "Cette province a reçu un soutien financier sous forme d'or du Mali."
 mal_second_target:0 "Seconde Cible"
 desc_mal_second_target:1 "Assurez-vous de chercher une seconde cible pour envoyer de l'or."
