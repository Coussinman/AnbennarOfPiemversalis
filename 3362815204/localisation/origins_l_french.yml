l_french:
 ###ETH FLAVOR EVENTS###
 flavor_eth.29.t:0 "La Capitale Itinérante de [Root.GetName]"
 flavor_eth.29.desc:1 "La capitale de [Root.GetName] n'a jamais été fixe car les Negusa Nagast de [Root.GetName] déplaçaient leur cour vers les régions qu'ils jugeaient nécessaires. Si ce système garantissait que la région autour de la nouvelle capitale était sous la coupe des Salomonides, les provinces restantes de [Root.GetName] demeuraient largement autonomes, entraînant une perte de contrôle sur ces territoires."
 flavor_eth.29.a:0 "D'accord."
 flavor_eth.30.t:0 "Établissement d'une Capitale Permanente"
 flavor_eth.30.desc:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] a modernisé l'État de [Root.GetName] et fondé la première capitale à [Root.Capital.GetName] en l'an [GetYear]. De plus, [Root.Monarch.GetSheHe] a résolu les querelles religieuses qui retardaient les décisions importantes et a centralisé le gouvernement. Ses accomplissements resteront à jamais gravés dans l'histoire [Root.GetAdjective]."
 flavor_eth.30.a:0 "Enfin. Les capitales itinérantes ne sont plus."
 flavor_eth.30.b:0 "J'apprécie pourtant la capitale mobile."
 flavor_eth.33.t:0 "Ouverture de l'Arche d'Alliance"
 flavor_eth.33.desc:1 "Pendant des millénaires, personne n'a ouvert la véritable Arche d'Alliance. De ce fait, le contenu de l'Arche est resté un mystère pour le croyant ordinaire et même pour le clergé, cet événement est unique en son genre. Pour éviter une panique potentielle dans la nation, [Root.Monarch.GetName] a décidé d'ouvrir cet artefact légendaire dans le palais, loin des regards indiscrets des masses.\nLorsque notre gracieux [Root.Monarch.GetTitle] et ses proches ont ouvert le coffre de bois recouvert d'or, ils ont trouvé ce qui avait été promis : deux anciennes tables de pierre des Dix Commandements ainsi que le bâton d'Aaron et un pot de manne. Ce ne fut pas l'événement le plus spectaculaire, mais ce fut un moment de dévotion. Après avoir confirmé l'authenticité de ces artefacts, le clergé les a replacés dans le coffre et a de nouveau caché l'Arche d'Alliance.\n\nDes jours ont passé depuis cet événement et depuis lors, bien des activités semblent plus… aisées pour notre [Root.Monarch.GetTitle]. C'est comme si Dieu lui-même avait béni notre glorieuse dynastie et la fortune de notre nation !"
 flavor_eth.33.a:0 "Que Dieu le Père nous bénisse, que le Christ veille sur nous !"
 flavor_eth.35.t:0 "Les Sujets de [Root.GetName]"
 flavor_eth.35.desc:1 "Damot et Hadiya sont des vassaux de notre glorieux [Root.GovernmentName] depuis plus de 100 ans. Bien que leur contribution sous forme de tribut nous ait bien servis, beaucoup à la cour de [Root.Monarch.GetName] estiment que leur temps est venu de rejoindre pleinement [Root.GetName]. En fin de compte, c'est à notre bon [Root.Monarch.GetTitle] de décider du sort de ces deux nations."
 flavor_eth.35.a:0 "Qu'ils deviennent partie de notre nation !"
 flavor_eth.35.b:0 "Ils sont plus utiles en tant que vassaux."
 flavor_eth.37.t:0 "Restauration du Christianisme à Suakin"
 flavor_eth.37.desc:0 "Bien que la ville se soit soumise aux Mamelouks en 1317, beaucoup croyaient encore qu'elle restait un centre du christianisme. Cela changea lorsque de plus en plus d'immigrants musulmans s'installèrent à Suakin. Avec le temps, les derniers chrétiens restants, nos frères et sœurs dans la foi, disparurent dans l'ombre. Mais ces temps sont révolus car Suakin fait enfin partie d'un véritable [Root.GovernmentName] chrétien et de nombreux Coptes cachés sont revenus à la lumière du jour !"
 flavor_eth.37.a:0 "Bénies soient ces âmes !"
 flavor_eth.38.t:0 "Adulis, le Grand Port d'Aksoum"
 flavor_eth.38.desc:1 "Des murs de grès et des rues vides et délabrées décorent les ruines d'une cité qui fut jadis le joyau d'un ancien empire. Pour nos ancêtres, ce spectacle aurait été attristant, jusqu'à ce qu'ils voient ce que les fiers et diligents ouvriers de [Root.GetName] ont créé ! En un temps remarquablement court, nos constructeurs et bâtisseurs ont restauré la cité portuaire dans sa beauté d'antan et nombre de nos gens s'y installent !"
 flavor_eth.38.a:0 "Et cette fois, Adulis vivra bien plus longtemps !"
 flavor_eth.39.t:0 "Dépassement des Frontières Aksoumites"
 flavor_eth.39.desc:1 "À l'origine, l'Empire aksoumite ne possédait que la région nubienne, les zones du nord de l'Éthiopie et la côte sud de l'Arabie. Des frontières qui ne sont rien comparées aux nôtres ! [Root.Monarch.GetName] a mené notre [Root.GovernmentName] vers de nombreuses batailles victorieuses et campagnes de guerre, et maintenant nous avons non seulement accompli la restauration mais aussi le dépassement d'un empire qui s'est effondré il y a plus de 400 ans !\nAvec ces vastes campagnes de conquête, nombre de nos nobles plaident pour un retour officiel au nom d'« Empire aksoumite » afin de montrer au monde notre force de faire revivre un ancien royaume. D'un autre côté, les conseillers de [Root.Monarch.GetName] recommandent que nous commencions à regarder vers l'avenir. Comment notre bien-aimé [Root.Monarch.GetTitle] doit-il décider ?"
 flavor_eth.39.a:0 "Nous devrions reprendre le manteau de l'Empire aksoumite !"
 flavor_eth.39.b:0 "Les conseillers ont raison. Nous devons laisser nos propres empreintes sur ce monde !"
 flavor_eth.40.t:0 "Le Royaume de Semien"
 flavor_eth.40.desc:2 "À l'époque où l'Empire aksoumite régnait sur ces terres, il y avait un groupe de Juifs qui refusaient de suivre la vraie foi. Ils résistèrent à la déclaration religieuse d'Ezana et organisèrent des révoltes contre l'empereur légitime. Des siècles plus tard, la reine juive Gudit leva une armée et détruisit définitivement l'Empire aksoumite.\nTout cela appartient à un passé lointain, mais les Beta Israël sont restés un groupe turbulent, même pour [Root.GetName]. Nous pouvons tenter de les convertir à la foi [Root.Religion.GetName], bien que nous ferons face à une forte résistance des Beta Israël."
 flavor_eth.40.a:1 "Montrons-leur la voie de la foi [Root.Religion.GetName]."
 flavor_eth.40.b:1 "Nous ne devrions pas créer un fossé plus grand entre nos peuples."
 flavor_eth.41.t:1 "Le Voyage sur le Nil"
 flavor_eth.41.desc:1 "Habituellement, la plupart de nos ambassadeurs voyagent à pied jusqu'en Égypte puis prennent le premier bateau venu pour atteindre l'Europe. Cependant, parfois certains deviennent audacieux et tentent différentes voies pour atteindre une destination. Notre ambassadeur actuel est l'un d'eux car il a pris quelques galères de notre puissante flotte et a voyagé avec elles sur le Nil. Heureusement pour l'ambassadeur, le Seigneur l'a protégé des dangers du grand fleuve et des infidèles du Nord et l'a guidé vers la mer Méditerranée."
 flavor_eth.41.a:0 "Je ne pensais pas qu'il irait si loin."
 flavor_eth.42.t:0 "Contact avec les Chrétiens !"
 flavor_eth.42.desc:1 "Après 50 jours de voyage supplémentaires, l'ambassadeur a atteint son objectif : le contact avec les chrétiens d'Europe ! Bien que leurs vues soient assez hérétiques pour nous, nos diplomates sont simplement heureux d'être à nouveau en contact avec le monde extérieur. De plus, ces « catholiques » partagent notre ambition d'une croisade contre la menace musulmane, ce qui en fait des alliés potentiels."
 flavor_eth.42.a:0 "Dieu bénisse cet ambassadeur et nos nouveaux alliés !"
 flavor_eth.43.t:0 "Un étrange Ambassadeur"
 flavor_eth.43.desc:1 "Nos gardes ont trouvé ce matin un étrange groupe de trois galères se dirigeant directement vers Rome. Après que les hommes sur les galères eurent confirmé qu'ils venaient en paix, la flotte d'interception les a laissés passer. Apparemment, ces gens sont des chrétiens comme nous et ils escortent un étrange ambassadeur qui prétend avoir navigué tout le long chemin depuis l'Éthiopie sur le puissant Nil.\nL'ambassadeur est ici pour restaurer l'ancien contact entre [From.GetName] et l'Empire romain !"
 flavor_eth.43.a:1 "L'Éthiopie ? Un instant… est-il un serviteur du Prêtre Jean ?!"
 flavor_eth.43.a.tt:0 "Découvrir toutes les provinces de §Y[From.GetName]§!."
 flavor_eth.44.t:0 "Alliance avec les Portugais ?"
 flavor_eth.44.desc:1 "[Root.GetName] a eu des contacts avec les Portugais auparavant, mais nous n'avons jamais désiré une alliance avec eux. Mais étant donné que des païens nous menacent et que le Pape catholique est incapable d'être utile, nos diplomates ont estimé que c'était une bonne idée de s'allier avec les Portugais. Notre ambassadeur n'attend que l'ordre de [Root.Monarch.GetName] !"
 flavor_eth.44.a:0 "Navigue, mon fils, et fais-leur notre offre d'alliance !"
 flavor_eth.44.b:0 "À la réflexion… [Root.GetName] se porte mieux sans eux."
 flavor_eth.45.t:0 "Demande d'Alliance de [From.GetName]"
 flavor_eth.45.desc:1 "Un jeune diplomate d'une terre lointaine a atteint la cour de [Root.Monarch.GetTitle] [Root.Monarch.GetName] et souhaite une audience ! Apparemment, l'homme vient de l'ancienne terre de [From.GetName]. En tant que frères chrétiens, il a été envoyé pour offrir une alliance avec nous.\nBien que nous soyons trop éloignés de [From.GetName] pour recevoir une aide bénéfique en Europe, [From.GetName] pourrait encore être un allié utile pour nos ambitions dans l'océan Indien."
 flavor_eth.45.a:0 "Nous devrions accepter leur offre."
 flavor_eth.45.a.at:0 "§Y[From.GetName]§! aura accès à la compagnie de mercenaires §YMousquetaires Portugais§! s'ils entrent en guerre avec [ADA.GetName] et si [ADA.GetName] reçoit de l'aide."
 flavor_eth.45.b:0 "Ils pourraient être utiles, oui, mais il y a de meilleurs alliés que [From.GetName]."
 flavor_eth.46.t:0 "[From.GetName] accepte l'Alliance"
 flavor_eth.46.desc:0 "Notre diplomate revient ! Avec une lueur d'excitation dans les yeux pour avoir accompli sa première mission réussie, il rapporte que les Portugais acceptent l'offre et souhaitent être nos alliés !"
 flavor_eth.46.a:1 "Ce sont de merveilleuses nouvelles !"
 flavor_eth.46.a.at:0 "§Y[From.GetName]§! nous aidera dans notre guerre contre [ADA.GetName] si [ADA.GetName] reçoit une aide étrangère."
 flavor_eth.47.t:0 "[From.GetName] refuse l'Alliance"
 flavor_eth.47.desc:1 "Notre diplomate revient ! Le regard du jeune homme est celui de la déception. Il rapporte que les Portugais n'ont aucun intérêt pour une alliance avec [Root.GetName] et ont renvoyé notre diplomate !"
 flavor_eth.47.a:1 "Ne t'inquiète pas. Tu as fait de ton mieux. C'est leur perte, pas la nôtre."
 flavor_eth.48.t:0 "Modernisation d'une Armée"
 flavor_eth.48.desc:0 "Grâce aux efforts de [Root.Monarch.GetTitle] [Root.Monarch.GetName], nos armées ont pu se moderniser. Nos troupes ont pleinement adopté l'occidentalisation de leurs capacités de combat !\nElles ont appris les stratégies de la Grande Armée française.\nElles ont enduré l'entraînement prussien.\nElles ont reçu des fusils suisses.\nEt maintenant elles sont prêtes à combattre pour la gloire de [Root.GetName] !"
 flavor_eth.48.a:0 "Gloire à [Root.GetName] !"
 flavor_eth.49.t:0 "Soutien des Ottomans"
 flavor_eth.49.desc:0 "Dans la grande guerre éthiopienne-adalite de 1529, les Ottomans rejoignirent une alliance avec le Sultanat d'Adal afin de vaincre l'Empire éthiopien et d'éteindre le dernier bastion chrétien dans la Corne de l'Afrique. Bien que ce ne fût pas une guerre totale pour les Ottomans, ils soutinrent Adal avec plusieurs compagnies de soldats turcs."
 flavor_eth.49.ada.desc:0 "La guerre entre [Root.GetName] et [ETH.GetName] fait rage. Aucun camp ne semble être un vainqueur clair et sur quelques fronts, les troupes [Root.GetAdjective] sont même repoussées. Heureusement, nous nous sommes préparés pour ce jour. Des soldats d'élite turcs d'Anatolie sont arrivés en [Root.GetName] pour rejoindre le combat contre la menace chrétienne !"
 flavor_eth.49.a:0 "Bénis soient les Ottomans pour leur aide !"
 flavor_eth.49.a.tt:0 "Active la compagnie de mercenaires §YJanissaires Ottomans§!."
 flavor_eth.50.t:0 "Soutien des Portugais"
 flavor_eth.50.desc:1 "La guerre éthiopienne-adalite a été un désastre pour l'Éthiopie. De nombreuses villes ont été rasées, la capitale a été assiégée par la puissance combinée d'Adal et de l'Empire ottoman, et l'armée restante d'Éthiopie a dû se replier dans les montagnes. Les musulmans pensaient que ce n'était qu'une question de temps avant que l'Éthiopie ne tombe.\nPuis les Portugais arrivèrent. En l'an 1541, les Portugais envoyèrent le commandant Cristóvão da Gama avec une compagnie de troupes portugaises pour assister l'Éthiopie et combattre l'Empire ottoman. Ces nouvelles troupes permirent à l'Éthiopie de renverser la situation et de vaincre l'armée musulmane bien plus nombreuse, ce qui mena à la paix blanche de 1543."
 flavor_eth.50.a:0 "Dieu merci, les Portugais sont venus !"
 flavor_eth.50.a.tt:0 "Active la compagnie de mercenaires §YMousquetaires Portugais§!."
 flavor_eth.51.t:0 "Fin des Conflits Portugais-Ottomans"
 flavor_eth.51.desc:1 "Les Portugais et les Ottomans ont une longue histoire de rivalité depuis que l'Empire ottoman a bloqué le commerce de la Route de la Soie vers l'Europe. Le premier vrai combat commença cependant lorsque les Ottomans assistèrent le Sultanat du Gujarat lors du siège de Diu en 1538. Depuis lors, ces deux grandes puissances furent en guerre l'une contre l'autre à plusieurs reprises, la guerre éthiopienne-adalite étant la guerre par procuration la plus importante.\nAprès la petite victoire de l'Éthiopie, les Portugais continuèrent leurs victoires contre les Ottomans. En l'an 1559, Soliman Ier dut reconnaître que les victoires décisives contre les Portugais étaient un projet futile. Pour cette raison, les activités militaires de ces deux puissances ont été grandement réduites dans la Corne de l'Afrique."
 flavor_eth.51.a:0 "Ainsi soit-il."
 flavor_eth.51.a.tt:0 "Les compagnies de mercenaires §YJanissaires Ottomans§! et §YMousquetaires Portugais§! ne sont plus disponibles."
 flavor_eth.52.t:0 "Activités Jésuites en [Root.GetName]"
 flavor_eth.52.desc:1 "En 1555 et 1557, les premiers jésuites portugais arrivèrent en Éthiopie. Au début, ils avaient l'intention de servir la petite communauté portugaise qui s'était développée en Éthiopie depuis 1543. Cependant, leur influence à la cour éthiopienne grandit. Elle alla si loin que l'Église catholique commença à devenir une véritable menace pour l'autorité de l'Église copte et maintenant ils essaient de convaincre [Root.Monarch.GetName] de se convertir au catholicisme ! Comment devons-nous traiter ces missionnaires étrangers ?"
 flavor_eth.52.a:0 "Nous bannirons ces parasites !"
 flavor_eth.52.b:0 "Ils devraient être avertis !"
 flavor_eth.52.c:1 "Peut-être ont-ils raison. Nous devrions nous convertir au catholicisme."
 ###MAL FLAVOR EVENTS###
 west_african.19.b:1 "Vous savez, le trône de [ASH.GetName] semble plus confortable que le nôtre…"
 flavor_mal.2.b:0 "Hé, attendez ! Emmenez-moi avec vous !"
 flavor_mal.6.a.tt:0 "Cette option débloquera la §YMission Religieuse§! pour [Root.GetName]."
 flavor_mal.6.b.tt:0 "Cette option débloquera la §YMission de Tolérance§! pour [Root.GetName]."
 flavor_mal.9.t:0 "Le Déclin de [Root.GetName]"
 flavor_mal.9.d:1 "Après la mort de Mansa Souleyman Keita, le frère du puissant Mansa Moussa, l'empire de [Root.GetName] a connu un déclin constant de pouvoir, d'influence et de richesse au fil des décennies. Les guerres civiles, les luttes pour le trône et une série de mansas incompétents ont sapé la stabilité de [Root.GetName]. D'anciens sujets comme les Songhaï ou Tombouctou ont déclaré leur indépendance de l'empire, et même maintenant le royaume voit son importance décliner encore davantage."
 flavor_mal.9.a:0 "Ce sont des temps sombres…"
 flavor_mal.10.t:0 "Retour à l'ancienne Gloire pour [Root.GetName]"
 flavor_mal.10.d:1 "Comme par miracle, le [Root.GovernmentName] de [Root.GetName] a survécu aux luttes internes pour le pouvoir entre factions, a convaincu les sujets de rester loyaux envers le mansa et a même uni la cour royale. Mieux encore, les anciennes frontières du [Root.GovernmentName] de [Root.GetName] ont été restaurées et, par conséquent, l'influence que le royaume avait jadis en Afrique de l'Ouest.\nMaintenant, c'est à [Root.Monarch.GetTitle] [Root.Monarch.GetName] d'étendre le pouvoir et l'influence de [Root.GetName] au-delà même des accomplissements du puissant Mansa Moussa !"
 flavor_mal.10.a:0 "Une nouvelle aube pour [Root.GetName] est venue !"
 flavor_mal.11.t:0 "[Root.mal_pretender.GetName] défie [Root.Monarch.GetName] !"
 flavor_mal.11.d:0 "Les batailles pour le trône sont monnaie courante en [Root.GetName] depuis la mort de Souleyman. Ainsi, ce n'est une surprise pour personne que l'ambitieux général [Root.mal_pretender.GetName] tente de renverser [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Le général a rassemblé une armée et assiège maintenant [mal_pretender_province.GetName]."
 flavor_mal.11.a:1 "Tu oses me défier ?"
 flavor_mal.12.t:0 "Révolte de la [Root.GetNobilityOrFallbackName] à [mal_disaster_estate_province.GetName] !"
 flavor_mal.12.d:0 "Depuis notre déclin, la [Root.GetNobilityOrFallbackName] est devenue trop ambitieuse et tente de prendre le contrôle de [mal_disaster_estate_province.GetName] pour ses propres besoins."
 flavor_mal.12.a:0 "Nous les écraserons !"
 flavor_mal.12.b:0 "[mal_disaster_estate_province.GetName] ne vaut pas l'effort."
 flavor_mal.13.t:0 "Révolte du [Root.GetClergyName] à [mal_disaster_estate_province.GetName] !"
 flavor_mal.13.d:1 "Le [Root.GetClergyName] a exprimé son mécontentement face au processus de conversion des Fétichistes ruraux et au manque de piété à la cour. Maintenant ils ont déclenché une rébellion à [mal_disaster_estate_province.GetName] dans l'espoir de prendre le contrôle de [Root.GetName] !"
 flavor_mal.13.a:0 "Nous les écraserons !"
 flavor_mal.13.b:0 "Nous devrions probablement les écouter."
 flavor_mal.14.t:0 "Révolte des [Root.GetDhimmiName] à [mal_disaster_estate_province.GetName] !"
 flavor_mal.14.d:1 "Les [Root.GetDhimmiName] ont exprimé leur mécontentement face à la hiérarchie musulmane et exigent plus de droits pour les Fétichistes ruraux. Maintenant ils ont déclenché une rébellion à [mal_disaster_estate_province.GetName] dans l'espoir de prendre le contrôle de [Root.GetName] !"
 flavor_mal.14.a:0 "Nous les écraserons !"
 flavor_mal.14.b:0 "Nous devrions probablement les écouter."
 flavor_mal.15.t:0 "Révolte de la [Root.GetBurghersOrFallbackName] à [mal_disaster_estate_province.GetName] !"
 flavor_mal.15.d:0 "Depuis notre déclin, la [Root.GetBurghersOrFallbackName] est devenue trop ambitieuse et tente de prendre le contrôle de [mal_disaster_estate_province.GetName] pour ses propres besoins."
 flavor_mal.15.a:0 "Nous les écraserons !"
 flavor_mal.15.b:0 "[mal_disaster_estate_province.GetName] ne vaut pas l'effort."
 flavor_mal.16.t:0 "[mal_disaster_independent_province.GetName] exige l'Indépendance !"
 flavor_mal.16.d:1 "La province [mal_disaster_independent_province.GetName] a officiellement cessé de reconnaître l'autorité de [Root.Monarch.GetName] et exige son retour à [mal_original_owner.GetName] !"
 flavor_mal.16.a:0 "Seulement sur mon cadavre !"
 flavor_mal.16.b:0 "Bien sûr. Hors de ma vue."
 flavor_mal.17.t:0 "Kaabu exige l'Indépendance !"
 flavor_mal.17.d:0 "Le peuple du Kaabu a exprimé un sentiment excessivement fort de négligence de la part du [Root.Monarch.GetTitle] et souhaite maintenant un État qui leur soit propre. À la cour de [Root.Monarch.GetName], un diplomate du Kaabu a apporté un ultimatum au [Root.Monarch.GetTitle] : soit nous libérons le Kaabu vers l'indépendance, soit ils combattront pour leur liberté."
 flavor_mal.17.a:1 "Alors vous mourrez pour votre indépendance !"
 flavor_mal.17.b:0 "Nous n'avions pas vraiment besoin du Kaabu de toute façon."
 flavor_mal.18.t:0 "Jolof exige l'Indépendance !"
 flavor_mal.18.d:0 "La conquête du Jolof ne fut pas une tâche aisée pour un royaume en déclin. Encore plus difficile est de tenir le peuple Jolof en respect. Avec notre rapide déclin, les nationalistes Jolof se sont armés et exigent leur libération immédiate vers l'indépendance !"
 flavor_mal.18.a:1 "Alors vous mourrez pour votre indépendance !"
 flavor_mal.18.b:0 "Nous n'avions pas vraiment besoin du Jolof de toute façon."
 flavor_mal.19.t:0 "Djenné exige l'Indépendance !"
 flavor_mal.19.d:1 "La cité de Djenné était autrefois vassale de l'Empire de [Root.GetName]. Cependant, notre déclin a entraîné leur indépendance et les citoyens de la cité commerciale s'y sont habitués. Naturellement, notre reconquête justifiée de leur cité n'a pas été appréciée par les résidents. Ils se sont armés jusqu'aux dents et exigent leur indépendance !"
 flavor_mal.19.a:1 "Alors vous mourrez pour votre indépendance !"
 flavor_mal.19.b:0 "Nous n'avons pas besoin de cette cité de toute façon…"
 flavor_mal.20.t:0 "Kong exige l'Indépendance !"
 flavor_mal.20.d:0 "La conquête de Kong ne fut pas une tâche aisée pour un royaume en déclin. Encore plus difficile est de tenir le peuple Kong en respect. Avec notre rapide déclin, les nationalistes Kong se sont armés et exigent leur libération immédiate vers l'indépendance !"
 flavor_mal.20.a:1 "Alors vous mourrez pour votre indépendance !"
 flavor_mal.20.b:0 "Nous n'avions pas vraiment besoin de Kong de toute façon."
 flavor_mal.21.t:0 "Les Sujets rejettent le [Root.Monarch.GetTitle] !"
 flavor_mal.21.d:0 "Notre déclin constant a détruit toute confiance que nos sujets avaient en notre stabilité. Maintenant ils se retournent contre le [Root.Monarch.GetTitle] et attendent leur moment pour frapper…"
 flavor_mal.21.a:0 "Traîtres !"
 flavor_mal.22.t:0 "Les Paysans [Root.GetAdjective] se soulèvent à [mal_disaster_peasant_province.GetName] !"
 flavor_mal.22.d:1 "Les paysans de [mal_disaster_peasant_province.GetName] en ont assez des temps instables et ont déclaré la guerre à leur [Root.Monarch.GetTitle] non soutenu !"
 flavor_mal.22.a:0 "Imbéciles ! Vous faites partie du problème !"
 flavor_mal.22.b:0 "Faites-leur quelques concessions. Cela les rendra heureux."
 flavor_mal.23.t:0 "Scandale en [Root.GetName]"
 flavor_mal.23.d:1 "Un scandale de la cour du [Root.Monarch.GetTitle] a causé l'indignation au sein de notre classe supérieure. La stabilité de [Root.GetName] est menacée !"
 flavor_mal.23.a:0 "Au moins on ne s'ennuie pas ici…"
 flavor_mal.24.t:0 "La Quête de la Flotte Perdue"
 flavor_mal.24.desc:1 "Bien que les légendes de Ko Mamadi ne soient qu'une histoire de Mansa Moussa, elles ont tout de même intrigué de nombreux jeunes marins aventureux de notre royaume. L'un d'eux a même accepté de mener une expédition dangereuse vers l'ouest dans l'espoir de trouver les restes de la flotte de Ko Mamadi et le supposé destin de Ko Mamadi lui-même."
 flavor_mal.24.a:0 "Eh bien, je ne vous retiendrai pas de naviguer vers votre tombe."
 flavor_mal.25.t:0 "TERRE DÉCOUVERTE !"
 flavor_mal.25.desc:1 "Des nouvelles incroyables sont parvenues au [Root.Monarch.GetTitle] ! La flotte d'exploration a réussi et a effectivement trouvé quelque chose, mais c'est au-delà de tout ce que [Root.GetName] aurait pu imaginer : l'équipe d'explorateurs a trouvé une nouvelle terre inexplorée au-delà de la mer d'Afrique de l'Ouest ! Après des investigations plus poussées, il s'est avéré que ce n'était pas une île mais un immense continent.\nLes marins se sont installés sur une côte qu'ils appellent maintenant « [755.GetName] » et sont prêts à chercher des traces de Ko Mamadi dans cette nouvelle terre."
 flavor_mal.25.a:0 "Nous cherchions du bois pourri… et nous avons trouvé des diamants !"
 flavor_mal.26.t:0 "Ivoire de Haute Qualité de [Root.GetName]"
 flavor_mal.26.desc:1 "[Root.GetName] a toujours été connu pour ses richesses en or, mais maintenant nous nous sommes également fait un nom dans le commerce et la production d'ivoire ! Nous exportons l'ivoire le plus fin et les marchés européens et asiatiques connaissent un engouement pour nos marchandises !"
 flavor_mal.26.a:0 "Merveilleux !"
 flavor_mal.27.t:0 "Ivoire de Haute Qualité de [From.GetName]"
 flavor_mal.27.desc:0 "[From.GetName] a toujours été connu pour ses richesses en or, mais maintenant ils se sont également fait un nom dans le commerce et la production d'ivoire ! Leur ivoire le plus fin a atteint les marchés européens et asiatiques et cause maintenant un grand engouement pour ce matériau précieux !"
 flavor_mal.27.a:0 "D'accord."
 flavor_mal.28.t:0 "Le Destin de Tombouctou"
 flavor_mal.28.desc:1 "La cité de Tombouctou a joué un rôle majeur dans la région ouest-africaine et était autrefois le principal lien entre l'Europe et la région du Sahel. Maintenant que nous avons repris le contrôle de la cité, des discussions ont surgi pour savoir si nous devrions déplacer notre capitale vers cette cruciale cité commerciale…"
 flavor_mal.28.a:1 "Faisons de Tombouctou notre capitale."
 flavor_mal.28.b:0 "Nous devrions plutôt développer notre capitale actuelle."
 can_colonize_the_strait_tt:0 "Active une Décision qui nous permet de coloniser §Y[1127.GetName]§!."
 can_colonize_djado_and_tajarhi_tt:0 "Active une Décision qui nous permet de coloniser §Y[2474.GetName]§! et §Y[2475.GetName]§!."
 flavor_mal.29.t:0 "La Grande Mosquée de Djenné"
 flavor_mal.29.desc:1 "La Grande Mosquée de Djenné est une merveille régionale et nombre de notre classe supérieure font un pèlerinage vers ce saint édifice pour prier. La mosquée a été en mauvais état dernièrement. Heureusement pour la cité et le monument, notre [Root.GetClergyName] a investi beaucoup de ses ressources dans l'amélioration de la mosquée et la conversion des résidents locaux."
 flavor_mal.29.a:0 "Béni soit le [Root.GetClergyName]."
 flavor_mal.30.t:0 "[Root.GetName] et les Songhaï"
 flavor_mal.30.desc:1 "Avant 1430, les terres des Songhaï étaient nos sujets. En 1430, le [Root.GetName] perdit le contrôle de la riche cité de Gao en raison des problèmes et des luttes dans la patrie, et la cité et son territoire alentour devinrent indépendants. Ils ont été repris par la dynastie des Sonni et se sont proclamés royaume à part entière, rivalisant avec notre puissance.\nMais cela appartient désormais au passé. Gao est à nouveau sous notre contrôle et une majorité de ceux qui s'identifient comme « Songhaï » sont une fois de plus nos sujets."
 flavor_mal.30.a:0 "Comme il se doit."
 flavor_mal.30.a.tt:0 "Chaque province possédée de culture §YSonghaï§! reçoit §G-30§! années de séparatisme."
 flavor_mal.31.t:0 "[Root.GetName] et les Maghrébins"
 flavor_mal.31.desc:1 "Le Maghreb est la patrie d'un très ancien partenaire commercial de [Root.GetName], bien que cela soit sur le point de changer car la situation des Maghrébins est précaire en raison de la menace ibérique. Nos frères dans la foi semblent avoir entendu les merveilleuses histoires de Mansa Moussa et nous demandent maintenant un soutien sous forme d'or ou d'ivoire. Bien sûr, un tel soutien est assez coûteux, mais l'opportunité d'une alliance nordique pourrait en valoir la peine."
 flavor_mal.31.a:1 "Envoyons-leur un soutien sous forme d'or."
 flavor_mal.31.b:0 "Subventionnons-les avec de l'ivoire."
 flavor_mal.31.c:0 "Gardons l'or et l'ivoire pour nous."
 flavor_mal.32.t:0 "Les nombreuses Options des Comptoirs Commerciaux Européens"
 flavor_mal.32.desc:1 "L'Europe est un grand continent et il y aurait de nombreuses options d'emplacements pour établir des comptoirs. Cependant, sur les conseils du ministre de [Root.Monarch.GetTitle] [Root.Monarch.GetName], la liste des provinces potentielles a été limitée à ces cinq-là."
 flavor_mal.32.a:0 "Faire une offre à [226.Owner.GetName] pour [226.GetName]."
 flavor_mal.32.a.tt:0 "Nous offrirons §Y2000§! ducats à §Y[226.Owner.GetName]§! pour la province §Y[226.GetName]§!."
 flavor_mal.32.b:0 "Faire une offre à [1247.Owner.GetName] pour [1247.GetName]."
 flavor_mal.32.b.tt:0 "Nous offrirons §Y2000§! ducats à §Y[1247.Owner.GetName]§! pour la province §Y[1247.GetName]§!."
 flavor_mal.32.c:0 "Faire une offre à [126.Owner.GetName] pour [126.GetName]."
 flavor_mal.32.c.tt:0 "Nous offrirons §Y2000§! ducats à §Y[126.Owner.GetName]§! pour la province §Y[126.GetName]§!."
 flavor_mal.32.d:0 "Faire une offre à [4559.Owner.GetName] pour [4559.GetName]."
 flavor_mal.32.d.tt:0 "Nous offrirons §Y2000§! ducats à §Y[4559.Owner.GetName]§! pour la province §Y[4559.GetName]§!."
 flavor_mal.32.e:0 "Faire une offre à [102.Owner.GetName] pour [102.GetName]."
 flavor_mal.32.e.tt:0 "Nous offrirons §Y2000§! ducats à §Y[102.Owner.GetName]§! pour la province §Y[102.GetName]§!."
 flavor_mal.32.f:0 "Nous devrions attendre un meilleur moment pour un achat."
 flavor_mal.32.f.tt:1 "Personne ne recevra d'offre. Nous pourrons acheter une colonie commerciale européenne ultérieurement."
 flavor_mal.32.g:0 "Acheter ? Mais nous les possédons déjà toutes !"
 mal_will_accept_offer:0 "§Y[This.GetName]§! §Gacceptera§! l'offre."
 mal_will_probably_accept_offer:0 "§Y[This.GetName]§! §Gpourrait§! accepter l'offre."
 mal_could_accept_offer:0 "§Y[This.GetName]§! §Ypourrait ou non§! accepter l'offre."
 mal_will_probably_not_accept_offer:0 "§Y[This.GetName]§! §Rpourrait ne pas§! accepter l'offre."
 mal_will_naver_accept_offer:0 "§Y[This.GetName]§! §Rn'acceptera pas§! l'offre."
 mal_offer_outcome_unkonwn:0 "Nous ne pouvons pas prédire si §Y[This.GetName]§! acceptera l'offre ou non."
 flavor_mal.33.t:0 "Offre d'Or de [From.GetName]"
 flavor_mal.33.desc:0 "Un ambassadeur en habits [From.GetAdjective] a atteint la cour de [Root.Monarch.GetName] ! Bien que ce soit déjà un événement très unique, l'ambassadeur montre aussi à notre [Root.Monarch.GetTitle] un coffre plein d'or ! Il nous offre un échange dans lequel nous recevons cette immense quantité d'or en échange de la province [mal_colony_to_buy.GetName]. L'ambassadeur mentionne également qu'au cas où nous n'accepterions pas l'or, le [From.Monarch.GetName] pourrait être « légèrement contrarié »…"
 flavor_mal.33.a:0 "Eh bien, je prends l'or avec plaisir. Merci beaucoup."
 flavor_mal.33.b:0 "Alors qu'il soit contrarié ! [mal_colony_to_buy.GetName] reste entre nos mains !"
 flavor_mal.34.t:0 "[From.GetName] accepte l'Offre !"
 flavor_mal.34.desc:1 "Bonnes nouvelles, mon [Root.Monarch.GetTitle] : [From.Monarch.GetTitle] [From.Monarch.GetName] a accepté notre généreuse offre et nous a cédé [mal_colony_to_buy.GetName] !"
 flavor_mal.34.a:0 "Charmant"
 flavor_mal.35.t:0 "[From.GetName] refuse l'Offre !"
 flavor_mal.35.desc:0 "Mauvaises nouvelles, mon [Root.Monarch.GetTitle] : [From.Monarch.GetTitle] [From.Monarch.GetName] a refusé notre généreuse offre et garde [mal_colony_to_buy.GetName] sous contrôle [From.GetAdjective]."
 flavor_mal.35.a:0 "Eh bien, il y a d'autres moyens d'obtenir une colonie que l'or…"
 flavor_mal.36.t:0 "Afflux d'Or de [Root.GetName]"
 flavor_mal.36.desc:0 "Avec la croissance de l'influence de [Root.GetName] en Europe et son commerce, une quantité stupéfiante d'or a atteint le marché européen. De nombreuses mines d'or ferment maintenant car leur exploitation n'est plus rentable, et la quantité de ducats a atteint un nouveau sommet sur le marché européen."
 flavor_mal.36.a:0 "Je vous en prie, prenez mon or, j'insiste !"
 flavor_mal.36.a.tt:0 "Toutes les provinces d'or contrôlées par un pays §YEuropéen§! ou ses sujets reçoivent « §YMine Fermée§! » pour §Y15§! ans, donnant les effets suivants :\nEfficacité de production : §R-1000,0 %§!"
 flavor_mal.36.a.at:0 "Chaque pays européen recevra §R+1,5§! d'inflation par pourcentage de revenu commercial par rapport au revenu total."
 flavor_mal.36.a.bt:0 "Les pays joueurs et leurs sujets ne recevront que §R+0,15§! d'inflation par pourcentage de revenu commercial par rapport au revenu total."
 flavor_mal.37.t:0 "Le généreux Pèlerinage de [Root.Monarch.GetName]"
 flavor_mal.37.desc:1 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] s'est rendu dans la grande cité de [385.GetName]. Tout comme le grand Mansa Moussa l'a fait autrefois, le [Root.Monarch.GetTitle] actuel a apporté les richesses de [Root.GetName] à la cité, bien que cette fois avec beaucoup moins d'or ; après tout, [Root.Monarch.GetSheHe] ne voulait pas causer de dommages à nos frères dans la foi.\nEn arrivant dans la cité, le [Root.GetClergyName] a recommandé de donner l'or pour la construction d'une grande mosquée, qui complimenterait la grande Kaaba. D'un autre côté, certains conseillers plus compatissants ont suggéré d'investir dans un comptoir à [385.GetName] afin que les pauvres puissent s'aider eux-mêmes à surmonter leur mauvaise situation avec l'aide d'Allah."
 flavor_mal.37.a:0 "[385.GetName] aura une grande mosquée !"
 flavor_mal.37.a.tt:0 "[Root.Monarch.GetName] investira son argent à [385.GetName] pour la construction d'une §YGrande Mosquée§!."
 flavor_mal.37.b:0 "Les pauvres ont besoin de plus d'aide que le [Root.GetClergyName] !"
 flavor_mal.37.b.tt:0 "[Root.Monarch.GetName] investira son argent à [385.GetName] pour la construction d'un §YComptoir§!."
 flavor_mal.38.t:0 "[From.Monarch.GetName] fait don d'Or pour une Grande Mosquée !"
 flavor_mal.38.desc:1 "Le généreux [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.GetName] a fait un pèlerinage vers notre sainte cité de [385.GetName] et a donné des quantités inimaginables d'or pour la construction d'une nouvelle grande mosquée, qui complimentera la sainte Kaaba !"
 flavor_mal.38.a:0 "Bénie soit sa sagesse !"
 flavor_mal.39.t:0 "[From.Monarch.GetName] fait don d'Or pour un Comptoir !"
 flavor_mal.39.desc:0 "Le généreux [From.Monarch.GetTitle] [From.Monarch.GetName] de [From.GetName] a fait un pèlerinage vers notre sainte cité de [385.GetName] et a donné des tonnes d'or pour la construction d'un nouveau comptoir, qui apportera travail et soutien aux pauvres !"
 flavor_mal.39.a:0 "Béni soit son cœur !"
 flavor_mal.40.t:0 "Une nouvelle Route de Pèlerinage"
 flavor_mal.40.desc:1 "Beaucoup de nos Mansas ont voyagé à La Mecque par le passé. Chaque fois les Mansas prenaient la route classique par l'Égypte et passaient leur temps dans le monde arabe. Bien que ce soit la voie la plus sûre et la plus rapide, ce n'est pas une route très excitante. Ce serait comme n'importe quel autre pèlerinage.\nMais la cour a eu une nouvelle idée : un grand tour vers La Mecque à travers le monde chrétien pour voir les merveilles de l'Europe."
 flavor_mal.40.a:0 "Je me réjouis de voir l'Europe !"
 flavor_mal.40.a.tt:0 "[Root.Monarch.GetName] voyagera vers La Mecque par une route à travers l'Europe.\n§YLe Pèlerinage peut se terminer prématurément si [Root.Monarch.GetName] meurt pendant le voyage.§!"
 flavor_mal.40.b:0 "Je pense qu'un pèlerinage de cette envergure devrait plutôt être fait par mes conseillers."
 flavor_mal.40.b.tt:0 "Les conseillers de [Root.Monarch.GetName] prendront la route à travers l'Europe à sa place."
 flavor_mal.40.c:0 "Je préfère la route classique cependant."
 flavor_mal.40.c.tt:0 "[Root.Monarch.GetName] prendra la route traditionnelle vers La Mecque à la place."
 GREAT_PILGRIMAGE:0 "Le Grand Pèlerinage"
 GREAT_TOUR:0 "Le Grand Tour"
 flavor_mal.41.t:0 "[Root.GetMaliPigrimageTour]"
 mal_visiting_foreign_regional_power:1 "\n\nLe groupe a finalement visité la merveilleuse cité [selected_biggest_country_of_region.Capital.GetName], la capitale de [selected_biggest_country_of_region.GetName]. Les [selected_biggest_country_of_region.Culture.GetName] ont attiré l'attention du groupe voyageur et leur hospitalité a tellement impressionné les proches de [Root.Monarch.GetName] qu'ils ont suggéré de donner une partie de notre splendide or au [selected_biggest_country_of_region.Monarch.GetTitle] de [selected_biggest_country_of_region.GetName]."
 flavor_mal.41.mansa.maghreb:0 "Après un long voyage à travers le Sahara brûlant, notre [Root.Monarch.GetTitle] et ses plus proches compagnons sont arrivés dans la région montagneuse du Maghreb. [Root.Monarch.GetName] a passé son temps à visiter la grande cité fortifiée d'Aït Benhaddou à Demnate. [Root.Monarch.GetSheHeCap] a appris les grandes cultures maghrébines et a acheté plusieurs lectures, la plus importante étant les écrits d'Ibn Sa'id al-Maghribi.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.iberia:1 "Le pèlerinage continue et le groupe de [Root.Monarch.GetName] est arrivé plus tard dans la péninsule Ibérique, patrie du défunt Sultanat d'Andalousie. Les voyageurs ont contemplé la beauté de l'Alhambra. Bien que les chrétiens d'Ibérie soient très religieux et ne fassent pas confiance à notre genre, ils ont toléré notre présence lorsque le [Root.Monarch.GetTitle] leur a expliqué sa situation. Bien sûr, l'or que nous avons apporté a aidé aussi…[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.france:1 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] et ses compagnons sont entrés en France, une région qui est le foyer de nombreux croisés qui ont tenté de mener des guerres contre le monde musulman. Mais aujourd'hui, aucune épée ne sera brandie car le [Root.Monarch.GetTitle] en voyage a proclamé ses intentions pacifiques de pèlerinage au peuple. Les Français ont accueilli le sage [Root.Monarch.GetTitle] et, en signe d'hospitalité, lui ont même permis d'entrer dans leur impressionnante cathédrale : Notre-Dame.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.italy:0 "Le [Root.Monarch.GetTitle] est finalement arrivé en Italie. [Root.Monarch.GetSheHeCap] et ses sujets ont cherché une audience avec le grand Pape, le chef de la foi chrétienne, mais même l'or [Root.GetAdjective] n'a pas pu convaincre le saint homme de rencontrer [Root.Monarch.GetName]. Malgré cela, le séjour en Italie a donné au [Root.Monarch.GetTitle] une grande compréhension des croyances chrétiennes.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.south_germany:1 "Malgré les altitudes extrêmes et les conditions météorologiques difficiles, le groupe de [Root.Monarch.GetName] a réussi à traverser les Alpes et s'est retrouvé dans les terres du tristement célèbre Saint-Empire romain germanique. L'état de cet empire a rappelé au [Root.Monarch.GetTitle] l'état que notre grand [Root.GovernmentName] a dû subir par le passé. [Root.Monarch.GetSheHeCap] sympathise avec l'[Emperor.Monarch.GetTitle] et lui a envoyé ses meilleurs vœux pour surmonter les luttes internes de cet empire déclinant.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.balkans:0 "Le voyage à travers les Balkans fut un voyage de diversité culturelle : Slaves du Sud, Italiens, Grecs et enfin les Turcs ottomans, le tout dans une seule région. Finalement, [Root.Monarch.GetName] s'est tenu devant la grande Sainte-Sophie à [151.GetName], contemplant sa magnificence.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.anatolia:0 "La patrie des Turcs ottomans, les belles terres d'Anatolie. En entrant dans cette région, le groupe de [Root.Monarch.GetName] est revenu dans le monde musulman et le pèlerinage approche de sa fin.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.mashriq:0 "Après avoir traversé l'Anatolie, le [Root.Monarch.GetTitle] s'est retrouvé dans les déserts du Machrek. Sur leur chemin vers l'Égypte, [Root.Monarch.GetName] et ses suivants ont atteint la Ville Sainte de Jérusalem, un centre de grande importance religieuse pour les Juifs, les Chrétiens et les Musulmans, et ont passé des heures à prier.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.egypt:0 "L'Égypte n'est pas une région étrangère pour les [Root.Monarch.GetTitle] de [Root.GetName]. Nombre de nos ancêtres ont contemplé la grande Pyramide de Khéops. Il est donc naturel que [Root.Monarch.GetName] ait visité la Pyramide aussi.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.arabia:0 "Après tant d'années de voyage, le grand et sage [Root.Monarch.GetTitle] et les plus proches de ses suivants sont enfin arrivés à la plus sainte de toutes les cités : [385.GetName] ! Les résidents de la cité se souviennent encore du dernier pèlerinage [Root.GetAdjective] et ont donc accueilli [Root.Monarch.GetName] à bras ouverts.\nLes deux semaines suivantes ont été passées dans la cité à prier et à documenter les expériences que le [Root.Monarch.GetTitle] a faites pendant le pèlerinage. [Root.Monarch.GetSheHe] a décidé de laisser un cadeau d'adieu pour le peuple de [385.GetName] avant de rentrer.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.horn_of_africa:1 "Bien que le chemin du retour soit très bien connu du groupe, [Root.Monarch.GetName] a décidé de prendre une route alternative pour rentrer. En traversant le détroit de [1330.GetName], [Root.Monarch.GetSheHe] et ses compagnons ont trouvé le royaume de celui qu'on appelait la demeure du « Prêtre Jean ».[Root.GetMaliRegionalCapital]"
 flavor_mal.41.mansa.home:0 "Il y a plus de cinq ans, le grand [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] a commencé son pèlerinage vers [385.GetName]. Cependant, la décision audacieuse fut prise que la route devrait passer par l'Europe au lieu de prendre le chemin le plus rapide, permettant au [Root.Monarch.GetTitle] de voir et de témoigner de choses qu'il n'aurait jamais vues autrement.\nAprès si longtemps, [Root.Monarch.GetName] est enfin revenu à [Root.Capital.GetName] !"
 flavor_mal.41.advisor.maghreb:0 "Après un long voyage à travers le Sahara brûlant, les trois conseillers sont arrivés dans la région montagneuse du Maghreb. Ils ont passé leur temps à visiter la grande cité fortifiée d'Aït Benhaddou à Demnate. Les trois ont appris les grandes cultures maghrébines et ont acheté plusieurs lectures, la plus importante étant les écrits d'Ibn Sa'id al-Maghribi.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.iberia:1 "Le pèlerinage continue et le groupe de conseillers est arrivé plus tard dans la péninsule Ibérique, patrie du défunt Sultanat d'Andalousie. Les voyageurs ont contemplé la beauté de l'Alhambra. Bien que les chrétiens d'Ibérie soient très religieux et ne fassent pas confiance à notre genre, ils ont toléré notre présence lorsque les trois pèlerins leur ont expliqué leur situation. Bien sûr, l'or que nous avons apporté a aidé aussi…[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.france:0 "Les conseillers sont entrés en France, une région qui est le foyer de nombreux croisés qui ont tenté de mener des guerres contre le monde musulman. Mais aujourd'hui, aucune épée ne sera brandie car le groupe en voyage a proclamé ses intentions pacifiques de pèlerinage au peuple. Les Français ont accueilli les trois érudits et, en signe d'hospitalité, leur ont même permis d'entrer dans leur impressionnante cathédrale : Notre-Dame.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.italy:0 "Le groupe est finalement arrivé en Italie. Les trois pèlerins ont cherché une audience avec le grand Pape, le chef de la foi chrétienne, mais même l'or [Root.GetAdjective] n'a pas pu convaincre le saint homme de rencontrer les trois hommes. Malgré cela, le séjour en Italie leur a donné une grande compréhension des croyances chrétiennes.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.south_germany:1 "Malgré les altitudes extrêmes et les conditions météorologiques difficiles, le groupe de conseillers a réussi à traverser les Alpes et s'est retrouvé dans les terres du tristement célèbre Saint-Empire romain germanique. L'état de cet empire leur a rappelé l'état que notre grand [Root.GovernmentName] a dû subir par le passé. Ils sympathisent avec l'[Emperor.Monarch.GetTitle] et lui ont envoyé leurs meilleurs vœux pour surmonter les luttes internes de cet empire déclinant.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.balkans:0 "Le voyage à travers les Balkans fut un voyage de diversité culturelle : Slaves du Sud, Italiens, Grecs et enfin les Turcs ottomans, le tout dans une seule région. Finalement, les trois érudits se sont tenus devant la grande Sainte-Sophie à [151.GetName], contemplant sa magnificence.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.anatolia:1 "La patrie des Turcs ottomans, les belles terres d'Anatolie. En entrant dans cette région, le groupe est revenu dans le monde musulman et le pèlerinage approche de sa fin.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.mashriq:0 "Après avoir traversé l'Anatolie, les trois pèlerins se sont retrouvés dans les déserts du Machrek. Sur leur chemin vers l'Égypte, ils ont atteint la Ville Sainte de Jérusalem, un centre de grande importance religieuse pour les Juifs, les Chrétiens et les Musulmans, et ont passé des heures à prier.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.egypt:0 "L'Égypte n'est pas une région étrangère pour les [Root.Monarch.GetTitle] de [Root.GetName]. Nombre de nos ancêtres ont contemplé la grande Pyramide de Khéops. Il est donc naturel que les trois aventuriers aient visité la Pyramide aussi.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.arabia:0 "Après tant d'années de voyage, les trois sages sont enfin arrivés à la plus sainte de toutes les cités : [385.GetName] ! Les résidents de la cité se souviennent encore du dernier pèlerinage [Root.GetAdjective] et ont donc accueilli les hommes à bras ouverts.\nLes deux semaines suivantes ont été passées dans la cité à prier et à documenter les expériences que les anciens conseillers ont faites pendant le pèlerinage. Ils ont décidé de laisser un cadeau d'adieu pour le peuple de [385.GetName] avant de rentrer.[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.horn_of_africa:1 "Bien que le chemin du retour soit très bien connu du groupe, les hommes ont décidé de prendre une route alternative pour rentrer. En traversant le détroit de [1330.GetName], les trois ont trouvé le royaume de celui qu'on appelait la demeure du « Prêtre Jean ».[Root.GetMaliRegionalCapital]"
 flavor_mal.41.advisor.home:0 "Il y a plus de cinq ans, trois grands conseillers du grand [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName] ont commencé un pèlerinage vers [385.GetName] au nom de leur [Root.Monarch.GetTitle]. Cependant, la décision audacieuse fut prise que la route devrait passer par l'Europe au lieu de prendre le chemin le plus rapide, permettant à ces hommes de voir et de témoigner de choses qu'ils n'auraient jamais vues autrement.\nAprès si longtemps, ils sont enfin revenus à [Root.Capital.GetName] ! Bien que le pèlerinage les ait rendus inaptes à reprendre leur travail de conseillers, leur sagesse éclairera [Root.Monarch.GetName] !"
 flavor_mal.41.a:0 "Le peuple de [selected_biggest_country_of_region.GetName] mérite certainement un grand don !"
 flavor_mal.41.a.tt:1 "[Root.GetName] fera don d'or à [selected_biggest_country_of_region.GetName].\nLe don contient §R[Root.mal_money_to_give_tt.GetValue]§! ducats pour [selected_biggest_country_of_region.GetName]. S'ils acceptent, l'inflation de [selected_biggest_country_of_region.GetName] augmentera de §R[Root.trade_income_variable_tt.GetValue]§!, mais leurs coûts de bâtiments, grands projets, armée et marine seront réduits de §G25,0 %§! pendant §Y5 ans§!.\n\nEn raison de l'afflux d'or [Root.GetAdjective], chaque pays avec sa capitale dans [selected_biggest_country_of_region.Capital.GetRegionName] reçoit le modificateur « §YOr du Mali§! » pendant §Y5 ans§!, qui a les effets suivants :\nRéduction annuelle de l'inflation : §R-1,00§!"
 flavor_mal.41.b:0 "Juste un peu d'or pour le peuple de la région devrait suffire."
 flavor_mal.41.b.tt:1 "En raison de l'afflux d'or [Root.GetAdjective], chaque pays avec sa capitale dans [selected_biggest_country_of_region.Capital.GetRegionName] reçoit le modificateur « §YOr du Mali§! » pendant §Y5 ans§!, qui a les effets suivants :\nRéduction annuelle de l'inflation : §R-1,00§!"
 flavor_mal.41.c:0 "Nous ne pouvons nous permettre aucun don."
 flavor_mal.41.c.tt:1 "Aucun or [Root.GetAdjective] ne trouvera son chemin dans l'économie de [selected_biggest_country_of_region.Capital.GetRegionName]."
 flavor_mal.41.d:0 "Nulle part n'est mieux que chez soi."
 flavor_mal.41.e:0 "Quelle belle région !"
 flavor_mal.41.f:0 "Quel endroit charmant !"
 mal_invest_in_region_tt:0 "[Root.GetName] investira une partie de l'or dans §Y[selected_biggest_country_of_region.Capital.GetRegionName]§!. Chaque province possédée dans §Y[selected_biggest_country_of_region.Capital.GetRegionName]§! reçoit « §YInvestissement en Or§! », qui donne les effets suivants :\nCoût de construction local : §G-15,0 %§!\nTemps de construction local : §G-15,0 %§!"
 flavor_mal.43.t:0 "[From.GetName] visite [Root.GetName] !"
 flavor_mal.43.desc.a:0 "Le [From.Monarch.GetTitle] de [From.GetName] est arrivé à [Root.Capital.GetName]. Le sage [From.Monarch.GetTitle] est en pèlerinage vers [385.GetName] et a visité nos villages et cités. Apparemment, [From.Monarch.GetSheHe] a été impressionné par notre hospitalité et nous offre maintenant un don de [Root.mal_money_to_give_tt.GetValue] ducats. La quantité d'or pur est bien plus que ce que nous n'avons jamais vu, et accepter ce don pourrait endommager notre économie, mais cela nous permettrait d'améliorer considérablement notre infrastructure."
 flavor_mal.43.desc.b:0 "Trois conseillers de [From.GetName] sont arrivés à [Root.Capital.GetName]. Ces hommes sages sont en pèlerinage vers [385.GetName] et ont visité nos villages et cités. Apparemment, ils ont été impressionnés par notre hospitalité et nous offrent maintenant un don de [Root.mal_money_to_give_tt.GetValue] ducats. La quantité d'or pur est bien plus que ce que nous n'avons jamais vu, et accepter ce don pourrait endommager notre économie, mais cela nous permettrait d'améliorer considérablement notre infrastructure."
 flavor_mal.43.a:0 "Prendre l'argent."
 flavor_mal.43.a.tt:0 "[Root.GetName] gagne §G[Root.mal_money_to_give_tt.GetValue]§! ducats."
 add_025_inflation:0 "[Root.GetName] recevra §R[Root.trade_income_variable_tt.GetValue]§! d'inflation."
 flavor_mal.43.b:0 "Notre économie ne peut pas supporter l'or."
 flavor_mal.43.b.tt:0 "Bien que nous refusions le don de [From.GetName], les pèlerins continueront à dépenser de l'or dans notre pays."
 flavor_mal.44.t:0 "[From.GetName] accepte le Cadeau !"
 flavor_mal.44.desc.a:0 "Après une audience avec [From.Monarch.GetName], le grand [From.Monarch.GetTitle] de [From.GetName] a accepté le cadeau de [Root.Monarch.GetName] et lui souhaite un bon voyage."
 flavor_mal.44.desc.b:0 "Après une audience avec [From.Monarch.GetName], le grand [From.Monarch.GetTitle] de [From.GetName] a accepté le cadeau des trois pèlerins et leur souhaite un bon voyage."
 flavor_mal.44.a:0 "Puissent les [From.Culture.GetName] faire bon usage de l'or."
 flavor_mal.44.a.tt:0 "Transférer §R[Root.mal_money_to_give.GetValue]§! ducats à §Y[From.GetName]§!."
 flavor_mal.45.t:0 "[From.GetName] refuse le Cadeau"
 flavor_mal.45.desc.a:0 "Bien que [Root.Monarch.GetName] ait eu l'intention de donner une grande somme d'or, le [From.Monarch.GetTitle] de [From.GetName] a refusé d'accepter l'or. [From.Monarch.GetName] affirme que l'or ferait plus de mal que de bien."
 flavor_mal.45.desc.b:0 "Bien que les trois hommes aient eu l'intention de donner une grande somme d'or, le [From.Monarch.GetTitle] de [From.GetName] a refusé d'accepter l'or. [From.Monarch.GetName] affirme que l'or ferait plus de mal que de bien."
 flavor_mal.45.a:0 "Ainsi soit-il."
 flavor_mal.45.b:0 "Peut-être le [mal_next_gold_target.Monarch.GetTitle] de [mal_next_gold_target.GetName] aimerait-il le cadeau à la place."
 flavor_mal.46.t:0 "Afflux d'Or de [From.GetName] !"
 flavor_mal.46.desc:0 "D'importants pèlerins de [From.GetName] sont arrivés dans notre région d'origine et ont apporté des quantités d'or jamais vues ! Nos maîtres de la monnaie font de leur mieux pour réduire l'impact, mais l'inflation augmentera pendant les cinq prochaines années."
 flavor_mal.46.a:0 "Ce seront des années difficiles…"
 flavor_mal.47.t:0 "Le [Root.Monarch.GetTitle] est mort !"
 flavor_mal.47.desc:0 "Le pèlerinage vers [385.GetName] n'est pas nécessairement sûr, pas même pour un [Root.Monarch.GetTitle]. Bien que la mort de notre souverain frappe durement le peuple [Root.GetAdjective], l'héritage du pèlerinage restera toujours avec nous."
 flavor_mal.47.a:0 "Nous prions pour son âme."
 flavor_mal.47.a.tt:0 "§YLe Pèlerinage a trouvé une fin prématurée.§!"
 flavor_mal.48.t:0 "Visite de [From.GetName]"
 flavor_mal.48.desc:0 "[385.GetName] est le Lieu Saint de la foi musulmane. Ainsi, ce n'est guère une surprise que des pèlerins de [From.GetName] visitent à nouveau notre grande cité de [385.GetName]. Cette fois, ils apportent de grands cadeaux en or pour notre [Root.GetClergyName] afin que la Kaaba puisse être le magnifique monument qu'elle a toujours été destinée à être."
 flavor_mal.48.a:0 "Béni soit [From.GetName]."
 ###SON FLAVOR EVENTS###
 flavor_son.4.t:0 "L'Ascension au Pouvoir de Muhammad"
 flavor_son.4.d:0 "Muhammad Turé est d'origines Soninké et a commencé sa carrière à Songhaï comme premier ministre d'Alî Ber Sonni. Après la mort d'Alî Ber et la succession par son fils Ko Mamadi Dao, le ministre Muhammad a défié l'autorité d'Abu en 1493 et l'a renversé après la victorieuse Bataille d'Anfao. Il a ensuite pris le trône de Songhaï pour lui-même et fondé la dynastie Askia, prenant le nom de Muhammad Ier Askia.\nSon règne fut un règne de grand succès militaire et de réformes politiques, qui ont assuré un héritage d'apprentissage et d'alphabétisation pour le peuple Songhaï."
 flavor_son.4.a:0 "Longue vie à Muhammad Askia !"
 flavor_son.4.b:0 "Les [Root.Monarch.Dynasty.GetName] ne tomberont pas devant un tel prétendant !"
 flavor_son.5.t:0 "Question de Piété et de Traditions"
 flavor_son.5.d:0 "Avec la conquête des très traditionnels Mossi, [Root.GetName] se trouve à un carrefour religieux et social : le [Root.GetClergyName] exige l'éradication des anciennes croyances traditionnelles et veut amener les populations rurales à la lumière d'Allah. La [Root.GetNobilityOrFallbackName] cependant souligne les avantages dont [Root.GetName] jouirait si les paysans étaient laissés tranquilles avec leurs croyances, comme un risque réduit de soulèvements paysans contre le [Root.Monarch.GetTitle].\nEn fin de compte, c'est à [Root.Monarch.GetTitle] [Root.Monarch.GetName] de décider du sort de ces gens et de la direction religieuse de [Root.GetName]."
 flavor_son.5.a:0 "Nous les convertirons à la vraie foi !"
 flavor_son.5.b:0 "Nous devrions les laisser tranquilles."
 flavor_son.5.a.tt:1 "Débloque les missions §YReligieuses§!.\n§YLe choix est irréversible.§!"
 flavor_son.5.b.tt:1 "Débloque les missions de §YTolérance§!.\n§YLe choix est irréversible.§!"
 flavor_son.6.t:0 "Alî Ber, le grand Conquérant"
 flavor_son.6.d:1 "Alî Sonni était le 15e souverain de la dynastie Sonni et celui qui passerait à l'histoire comme le premier véritable roi de Songhaï. Durant son règne, de nombreuses grandes cités comme Djenné ou Tombouctou tombèrent aux mains des armées de Songhaï et le royaume se développa en l'empire qui remplacerait le Mali comme hégémon d'Afrique de l'Ouest. Bien qu'il fût musulman, sa politique répressive envers les érudits de Tombouctou et sa tolérance envers les religions traditionnelles faisaient de lui au mieux un musulman de façade."
 flavor_son.6.a:0 "Alî Ber nous mènera à la victoire !"
 flavor_son.6.b:0 "Un grand conquérant en effet."
 flavor_son.7.t:0 "L'Émergence de [From.GetName]"
 flavor_son.7.d:0 "Le [From.GetName] de l'est a grandi jusqu'à des dimensions qui dépassent ce que l'empire du Mali a réussi à faire. Ils ont revendiqué le titre d'empire et sont devenus la nouvelle puissance régionale d'Afrique de l'Ouest, et tandis que nous luttons encore contre des conflits internes, les troupes [From.GetAdjective] attendent à notre porte !"
 flavor_son.7.a:1 "Ce sont vraiment de mauvaises nouvelles…"
 flavor_son.8.t:1 "Les Réformes Militaires de [Root.Monarch.GetName]"
 flavor_son.8.d:2 "Avant l'accession de [Root.Monarch.GetName] au trône, les armées de Songhaï étaient déjà une force avec laquelle il fallait compter, mais elles n'ont jamais été une armée permanente. Avec l'accession au pouvoir de [Root.Monarch.GetName], cela a changé car il a fondé la première armée permanente pour Songhaï. Durant son règne, l'armée a reçu une modernisation et un accent sur un entraînement et un recrutement plus stricts, ce qui a fait des troupes déjà formidables de Songhaï une puissance dominante au début du XVIe siècle."
 flavor_son.8.a:0 "Un accent sur une meilleure armée permanente est une bonne idée."
 flavor_son.8.b:0 "L'histoire militaire est si fascinante !"
 flavor_son.10.t:0 "Une Offre de Mariage d'une Veuve"
 flavor_son.10.d:0 "La cité de [1134.GetName] s'est rendue aux glorieuses armées de [Root.GetName] ! Bien que le noble [JNN.Monarch.GetTitle] [JNN.Monarch.GetName] ait combattu jusqu'à son dernier souffle, il n'a toujours pas pu repousser nos troupes et est mort au combat. Sa veuve s'est alors tournée vers notre [Root.Monarch.GetTitle] et s'est offerte en échange de la clémence pour la cité."
 flavor_son.10.a:0 "J'accepte volontiers cette généreuse offre."
 flavor_son.10.b:0 "Je n'ai pas besoin d'une veuve comme consort."
 flavor_son.11.t:0 "La Grande Mosquée de Djenné"
 flavor_son.11.d:1 "La mosquée de [1134.GetName], autrefois le palais du Sultan Kunburu, a subi beaucoup de dommages collatéraux pendant le siège et a donc eu besoin d'une rénovation. Grâce aux efforts des ouvriers [Root.GetAdjective], il a été possible de restaurer la mosquée dans sa gloire d'antan sauf pour un détail : le design original de la mosquée incorporait de nombreuses décorations coûteuses qui provenaient de l'époque où le bâtiment était un palais, mais ces décorations avaient été détruites pendant la guerre.\nLe [Root.GetClergyName] argue qu'une restauration de cette décoration est nécessaire pour montrer notre dévotion à Allah. Cependant, les [Root.GetDhimmiName] soulignent que les églises et temples des autres religions ne reçoivent pas le même traitement de décorations et qu'ainsi la Grande Mosquée devrait être traitée de manière égale."
 flavor_son.11.a:0 "Se ranger du côté du [Root.GetClergyName]."
 flavor_son.11.b:0 "Se ranger du côté des [Root.GetDhimmiName]."
 flavor_son.12.t:0 "Les Racines de [Root.GetName]"
 flavor_son.12.d:0 "Avant l'islamisation de l'Afrique de l'Ouest, le peuple de Songhaï était entièrement membre des religions traditionnelles populaires. On pensait qu'il était impossible pour notre classe dirigeante d'y penser, mais notre position très tolérante envers les anciennes coutumes les a fait remettre en question leur statut de musulmans. D'ordinaire, ce serait un péché impardonnable, mais même [Root.Monarch.GetName] envisage de retourner aux racines religieuses de [Root.GetName]…"
 flavor_son.12.a:0 "Nous ne devrions pas envisager un tel acte hérétique. Notre foi pourrait cependant utiliser des ajustements."
 flavor_son.12.b:0 "Il est temps pour nous de retourner aux anciennes coutumes !"
 flavor_son.12.b.tt:0 "La religion de chaque province §YSunnite§! possédée change en §YFétichiste§!."
 flavor_son.13.t:0 "La Chute de [Root.Monarch.GetName] et de la cité de [Root.Capital.GetName]"
 flavor_son.13.d:1 "Les soldats [From.GetAdjective] ont assiégé notre capitale bien-aimée pendant des mois. Malgré nos meilleurs efforts, nos braves défenseurs n'ont pas pu arrêter l'invasion [From.GetAdjective]. Dans une tentative désespérée, notre [Root.Monarch.GetTitle] en personne a combattu sur les murs de [Root.Capital.GetName], mais dans la bataille, même [Root.Monarch.GetSheHe] a perdu la vie.\nMais tout n'est pas perdu. L'épouse du [Root.Monarch.GetTitle] déchu a une dernière idée : la guerre peut être terminée au prix d'un mariage avec [From.Monarch.GetName]."
 flavor_son.13.a:0 "C'est le seul choix juste."
 flavor_son.13.b:0 "Nous pouvons encore renverser la guerre !"
 ###COMET EVENTS###
 EVTOPTI5060:0 "Quel beau début d'année !"
 EVTOPTJ5060:0 "Encore quelques années et ce sera le problème de Victoria…"
 EVTOPTK5060:0 "C'est ça. Je suis mort."
 ###KONGO FLAVOR EVENTS###
 flavor_kon.4.a.tt:2 "Le peuple de [Root.GetName] se sentira trahi par son [Root.Monarch.GetTitle], entraînant une perte de §R3§! de stabilité.\n[Root.GetName] remplacera les missions « Fétichiste » et « Combat contre les Européens » par les missions « §YCatholiques§! ».\n§YLe choix est irréversible.§!"
 flavor_kon.4.b.tt:2 "La [Root.GetNobilityOrFallbackName] de [Root.GetName] se sentira trahie par la populace [Root.GetAdjective], entraînant une perte de §R3§! de stabilité.\n[Root.GetName] remplacera les missions « Catholiques » par les missions « §YFétichistes§! ».\n§YLe choix est irréversible.§!"
 flavor_kon.7.t:0 "Des Étrangers arrivent en [Root.GetName] !"
 flavor_kon.7.desc.ib:0 "D'étranges hommes pâles en armure argentée et longues robes brunes ont été repérés sur nos côtes. Après le premier contact, il était clair que ces hommes venaient de loin, de ce qu'ils appellent l'« Ibérie ». Une courte audience avec [Root.Monarch.GetName] a été organisée et ces étrangers nous ont raconté leurs intentions : ces « Portugais » et « Castillans » sont ici pour découvrir le monde et répandre le nom de celui qu'ils appellent le « Christ ». Leur technologie est plus avancée que tout ce qui a été vu en [Root.GetName] et ainsi tant le [Root.Monarch.GetTitle] que la [Root.GetNobilityOrFallbackName] ont été intrigués par ces étrangers."
 flavor_kon.7.desc.pap:0 "Un groupe d'hommes âgés est arrivé sur notre littoral. Ils sont tous vêtus de longues robes blanches et portent des chapeaux amusants. Ils prétendent être ici au nom de leur « Pape » et cherchent une audience avec notre [Root.Monarch.GetTitle]. Apparemment, ces hommes sont des évêques d'un pays appelé « [PAP.GetName] » et sont ici pour répandre la parole du « Christ ». Aucun de nous ne comprend vraiment de quoi ils parlent, mais leur technologie semble bien en avance sur la nôtre, et leurs croyances ont intrigué [Root.Monarch.GetName] et la [Root.GetNobilityOrFallbackName]."
 flavor_kon.7.desc.catholic:1 "Des gens en longues robes brunes et étranges croix dorées sont arrivés sur notre littoral. Ils prétendent être ici pour « nous amener sur le droit chemin » et ont cherché une audience avec [Root.Monarch.GetName]. Ils se révèlent être des « missionnaires de l'Église catholique romaine ». Bien qu'aucun de nous ne comprenne vraiment ce que cela signifie, leur technologie a attiré notre intérêt."
 flavor_kon.7.desc.christian:1 "Un petit bateau s'est échoué sur notre littoral. Quand quelques-uns de nos guerriers s'en sont approchés prudemment, ils ont trouvé cinq hommes totalement épuisés en robes brunes. À en juger par leurs vêtements, on aurait dit qu'on avait tenté de les brûler vifs et qu'ils avaient à peine échappé sans dommages physiques graves. Ils ont été amenés à [Root.Monarch.GetName] car la découverte de ces hommes pâles a attiré l'attention du peuple. Apparemment, ces « missionnaires » sont des gens persécutés, qui étaient sous l'attaque d'hérétiques « protestants ». Ils nous parlent de leur technologie et de leur religion et ont attiré l'attention de notre classe supérieure."
 flavor_kon.7.desc.others:1 "Trois hommes en robes gravement endommagées et avec de sérieuses blessures se sont échoués sur nos rivages ! Quelques civils sont immédiatement allés vers eux et ont soigné leurs blessures. Après quelques semaines, les hommes ont pu se relever et nous ont raconté les histoires de leur patrie, et comment elle a été détruite par des forces impies. Ils racontent aussi des histoires sur leur religion, le « catholicisme », et comment on peut simplement les rejoindre. Leurs histoires sur leur religion et leur technologie ont fait hausser un sourcil à [Root.Monarch.GetName], mais ont finalement éveillé son intérêt."
 flavor_kon.7.a:0 "Invitons ces étrangers à rester un moment."
 flavor_kon.7.a.tt:1 "Se ranger du côté des Européens.\n[Root.GetName] remplacera les missions « Fétichistes » par les missions « §YCatholiques§! »."
 flavor_kon.7.b:0 "Leurs intentions ne peuvent être bonnes. Expulsons-les immédiatement de notre patrie !"
 flavor_kon.7.b.tt:0 "S'opposer aux Européens.\n[Root.GetName] §Yconservera§! ses missions actuelles."
 flavor_kon.8.t:0 "[Root.GetName] et les Européens"
 flavor_kon.8.d:1 "[Root.GetName] a été visité par beaucoup d'hommes pâles en armure brillante et avec d'étranges croix autour du cou. Ces soi-disant Européens ont essayé d'influencer notre peuple par le passé.\nAprès la restauration de [Root.GetName], la question a de nouveau émergé de savoir comment nous devons traiter avec les Européens."
 flavor_kon.8.a:0 "Nous devrions essayer de gagner leurs faveurs."
 flavor_kon.8.a.tt:2 "Se ranger du côté des Européens.\n[Root.GetName] remplacera les missions « Fétichistes » par les missions « §YCatholiques§! ».\n§YLe choix est irréversible.§!"
 flavor_kon.8.b:0 "Ils sont un mauvais présage et nous devrions tout faire pour nous y opposer !"
 flavor_kon.8.b.tt:1 "S'opposer aux Européens.\n[Root.GetName] §Yconservera§! ses missions actuelles.\n§YLe choix est irréversible.§!"
 flavor_kon.9.t:0 "[Root.GetName] Converti !"
 flavor_kon.9.d:1 "Après des mois d'efforts de missionnaires étrangers et de nos propres préparatifs de conversion, c'est enfin fait : [Root.Monarch.GetName] a rejoint les catholiques du monde !"
 flavor_kon.9.a:0 "Amen !"
 flavor_kon.10.t:1 "[kon_converted_province.GetName] converti au Catholicisme !"
 flavor_kon.10.d:0 "Le peuple de la province [kon_converted_province.GetName] a commencé à abandonner nos anciennes traditions et s'est converti à l'Église catholique ! Si nous n'intervenons pas, toute la province sera convertie. Si nous décidons de réprimer leur nouvelle croyance, cependant, nous devrons faire face à ces catholiques sur le champ de bataille !"
 flavor_kon.10.a:0 "Laissons-les croire en leurs croix."
 flavor_kon.10.a.tt:0 "Le [Root.GetClergyName] voit cela comme un acte de trahison et lance une contre-révolte contre l'invasion catholique."
 flavor_kon.10.b:0 "Cela ne peut être autorisé !"
 flavor_kon.10.b.tt:1 "La [Root.GetNobilityOrFallbackName] voit cela comme un gaspillage de ressources et tente de perturber notre gouvernement."
 flavor_kon.11.t:0 "Le Voyage vers l'Europe"
 flavor_kon.11.d:1 "Trois navires ont été préparés dans le port de [kon_port.GetName]. Ils servent de vaisseaux pour nos prêtres et ambassadeurs, qui ont été choisis pour voyager en Europe afin de gagner des faveurs à [Root.GetName] auprès du Saint-Siège et de ses alliés.\nCela prendra du temps, mais avec la bénédiction du Seigneur, ces hommes courageux arriveront à leur destination."
 flavor_kon.11.a:0 "Espérons que le Pape accepte cette généreuse offre."
 flavor_kon.11.a.tt:0 "[Root.GetName] enverra des ambassadeurs et des prêtres en Europe afin d'offrir 500 $COST|Y$¤ au Pape en échange d'un §YCardinal garanti§!."
 flavor_kon.11.b:0 "J'espère que notre allié appréciera cette offre."
 flavor_kon.11.b.tt:0 "[Root.GetName] enverra des ambassadeurs et des prêtres en Europe afin d'offrir 500 $COST|Y$¤ à un allié en échange d'un §YCardinal garanti§!."
 flavor_kon.11.c:0 "Espérons que le propriétaire de Rome appréciera cette offre…"
 flavor_kon.11.c.tt:0 "[Root.GetName] enverra des ambassadeurs et des prêtres en Europe afin d'offrir 1000 $COST|Y$¤ au propriétaire de la sainte cité de Rome pour un §YCardinal garanti§!."
 flavor_kon.12.t:0 "Généreuse Offre de [From.GetName] !"
 flavor_kon.12.d:0 "Trois navires étrangers sont arrivés ce mois-ci en Europe avec des ambassadeurs et des prêtres de la nation africaine de [From.GetName]. Ils offrent un bon marché : ils demandent une place de cardinal garantie en échange de ce généreux cadeau de 500 unités de ducats !"
 flavor_kon.12.a:0 "Une place de cardinal ? Bien sûr, il y en a plein."
 flavor_kon.13.t:0 "Généreuse Offre de [From.GetName] !"
 flavor_kon.13.d:0 "Trois navires étrangers sont arrivés ce mois-ci en Europe avec des ambassadeurs et des prêtres de la nation africaine de [From.GetName], notre allié. Ils offrent un bon marché : ils demandent un de nos cardinaux en échange de ce généreux cadeau de 500 unités de ducats !"
 flavor_kon.13.a:0 "Je prends l'argent, merci !"
 flavor_kon.14.t:0 "Généreuse Offre de [From.GetName] !"
 flavor_kon.14.d:1 "Trois navires étrangers sont arrivés ce mois-ci en Europe avec des ambassadeurs et des prêtres de la nation africaine de [From.GetName]. Ils offrent un bon marché : ils demandent une place à Rome pour leur cardinal en échange de 1000 unités de ducats !"
 flavor_kon.14.a:0 "Cela semble équitable."
 flavor_kon.15.t:0 "Cardinal pour [Root.GetName] !"
 flavor_kon.15.d:0 "L'accord avec [From.GetName] a été un succès total et [Root.GetName] possède maintenant une place de cardinal garantie au Saint-Siège !"
 flavor_kon.15.a:0 "Dieu est bon !"
 flavor_kon.15.a.tt:1 "§Y[This.GetName]§! reçoit le modificateur déclenché « §YCardinal d'Afrique§! », donnant les effets suivants lorsqu'actif :\nModificateur d'impôt local : §G+25,0 %§!\nTolérance de la vraie foi : §G+1,00§!\nInfluence papale annuelle : §G+1,00§!\nÉquilibre de loyauté du [Root.GetClergyName] : §G+10,0 %§!\n\nDe plus, la province abritera toujours un §YCardinal§! tant que [Root.GetName] contrôle [This.GetName], et que [Root.GetName] et la province [This.GetName] sont de fervents adeptes de la foi §YCatholique§!."
 flavor_kon.16.t:0 "Fondation d'un Royaume"
 flavor_kon.16.d:0 "Il est évident que nos anciens systèmes ne sont plus viables. Des étrangers débarquent sur nos côtes et apportent de nouvelles idées et technologies à notre peuple. Mais ils posent aussi une menace à notre société. Nos conseillers recommandent de remodeler notre gouvernement en une monarchie convenable."
 flavor_kon.16.a:0 "Réformer l'État en un Royaume convenable"
 flavor_kon.16.b:0 "Les anciennes coutumes sont assez bonnes"
 ###MUTAPA FLAVOR EVENTS###
 flavor_zim.1.t:0 "Régression du Zimbabwe"
 flavor_zim.1.d:2 "Zimbabwe était autrefois la grande capitale de l'Empire du Zimbabwe, qui s'est effondré suite à des guerres civiles il y a des siècles. Depuis, la cité nous sert de merveilleuse capitale avec ses nombreuses maisons de pierre.\nMais ses jours sont comptés. Les récoltes qui assuraient la subsistance de cette grande cité ont échoué, les ressources qui maintenaient l'économie de la cité depuis si longtemps sont épuisées et les troubles locaux ont chassé de nombreux résidents, les poussant vers les autres provinces de [Root.GetName]."
 flavor_zim.1.a:1 "Ce sont des temps sombres pour le Zimbabwe…"
 flavor_zim.1.a.tt:0 "Les résidents du Zimbabwe déménageront vers les autres provinces de [Root.GetName]."
 flavor_zim.1.a.at:2 "Si [Root.GetName] perd le contrôle du Zimbabwe, le peuple remettra en question l'autorité du dirigeant de [Root.GetName], obtenant le modificateur « §YRoyaume Profané§! », qui donne les effets suivants :\nLégitimité : §R-1,00§!\nTolérance de la vraie foi : §R-3,00§!"
 flavor_zim.2.t:1 "Dépassement du Zimbabwe"
 flavor_zim.2.d:2 "Le puissant Zimbabwe dominait autrefois la région d'Afrique australe et était le point central de la culture et du commerce en Afrique australe. Ils ont construit de grands monuments et étaient le fondement de notre civilisation.\nMaintenant, nous n'avons pas seulement atteint leur zénith, mais nous l'avons aussi complètement dépassé. Le [Root.GovernmentName] de [Root.GetName] a atteint une hauteur de pouvoir dont nos ancêtres n'auraient pu que rêver. Lors d'un jour de célébration, le [Root.GetClergyName] a rencontré le [Root.Monarch.GetTitle] et l'a félicité pour ce succès. Ils recommandent de renommer notre nation en Grand Zimbabwe pour honorer Mwari et nos ancêtres."
 flavor_zim.2.a:1 "Bien sûr ! Désormais nous serons connus comme le Zimbabwe !"
 flavor_zim.2.b:0 "Les ancêtres appartiennent au passé. [Root.GetName] est l'avenir !"
 flavor_zim.2.b.tt:0 "Active une décision pour former le §YZimbabwe§!."
 flavor_zim.5.t:0 "Conflit Religieux parmi les Marchands"
 flavor_zim.5.desc:1 "[Root.GetName] est un lieu attrayant pour les marchands du monde entier grâce à notre accès à l'or et à l'ivoire. Bien que cela apporte une grande prospérité pour nous, cela a aussi l'effet secondaire de conflits religieux entre les marchands. Tel est le cas avec les marchands chrétiens et musulmans à [Root.Capital.GetName], qui tentent de rivaliser sur les marchés et à la cour royale.\nSi nous voulons jamais la paix de cette nuisance, [Root.Monarch.GetName] doit choisir comment nous devons traiter ces marchands agressifs."
 flavor_zim.5.a:0 "Se ranger du côté des marchands chrétiens."
 flavor_zim.5.a.tt:0 "[Root.Monarch.GetName] se rangera du côté des marchands chrétiens, ce qui pourrait avoir des §Yconséquences religieuses§! plus tard…"
 flavor_zim.5.b:0 "Se ranger du côté des marchands musulmans."
 flavor_zim.5.b.tt:0 "[Root.Monarch.GetName] se rangera du côté des marchands musulmans, ce qui pourrait avoir des §Yconséquences religieuses§! plus tard…"
 flavor_zim.5.c:1 "Nous devrions exploiter leurs différences !"
 flavor_zim.5.d:0 "Expulser les deux groupes de marchands de la cité."
 flavor_zim.6.t:0 "La Conversion de [Root.Monarch.GetName]"
 flavor_zim.6.d.a:0 "Les marchands musulmans ont été expulsés de nos cités tandis que les marchands chrétiens ont profité d'un environnement sans concurrence. Avec le temps, notre [Root.Monarch.GetTitle] s'est attaché aux chrétiens. Un jour, [Root.Monarch.GetName] a reçu la visite de missionnaires déguisés en marchands et [Root.Monarch.GetSheHe] s'est converti au christianisme sans vraiment réfléchir à sa décision. Maintenant [Root.GetName] a un [Root.Monarch.GetTitle] chrétien sur le trône !"
 flavor_zim.6.d.b:1 "Les marchands chrétiens ont été expulsés de nos cités tandis que les marchands musulmans ont profité d'un environnement sans concurrence. Avec le temps, notre [Root.Monarch.GetTitle] s'est attaché aux musulmans. Un jour, [Root.Monarch.GetName] a reçu la visite de missionnaires déguisés en marchands et [Root.Monarch.GetSheHe] s'est converti à l'islam sans vraiment réfléchir à sa décision. Maintenant [Root.GetName] a un [Root.Monarch.GetTitle] musulman sur le trône !"
 flavor_zim.6.a:0 "Nous sommes tous chrétiens maintenant !"
 flavor_zim.6.b:0 "Nous sommes tous musulmans maintenant !"
 flavor_zim.6.c:0 "À bas sa tête !"
 flavor_zim.6.d:0 "Ce n'est pas vraiment une affaire d'État [Root.GetAdjective]."
 flavor_zim.7.t:0 "Cartes de Sofala"
 flavor_zim.7.d:0 "Avec la conquête de Sofala, notre [Root.GovernmentName] a obtenu l'accès aux cartes de cette riche cité commerciale. Elles révèlent les nombreuses cités côtières importantes de l'océan Indien occidental ainsi que d'autres cités importantes pour la foi musulmane."
 flavor_zim.7.a:0 "Ces cartes seront très utiles."
 flavor_zim.7.a.tt:0 "Découvrir la §YCorne de l'Afrique§!, l'§YÉgypte§!, l'§YArabie§!, le §YMachrek§! et l'§YOcéan Indien occidental§!."
 flavor_zim.8.t:0 "Anciennes Cartes du Commerce Asiatique"
 flavor_zim.8.d:1 "La création d'une nouvelle flotte commerciale a attiré de nombreux marchands à la recherche de nouvelles opportunités. L'un de ces marchands possède d'anciennes cartes de l'époque où le Zimbabwe avait des contacts commerciaux avec la Chine, et a été assez aimable pour donner les cartes à notre [Root.Monarch.GetTitle]."
 flavor_zim.8.a:0 "Très apprécié."
 flavor_zim.8.a.tt:0 "Découvrir la Route commerciale navale vers §Y[1816.GetName]§!."
 flavor_zim.9.t:0 "[1184.GetName] est perdu !"
 flavor_zim.9.d:0 "La grande cité de [1184.GetName] a été perdue aux mains des ennemis de [Root.GetName] ! Notre peuple doute de son [Root.Monarch.GetTitle] sacré et est en désarroi !"
 flavor_zim.9.a:0 "Ce n'est pas bon…"
 flavor_zim.10.t:0 "[1184.GetName] est à nouveau sous Contrôle [Root.GetAdjective] !"
 flavor_zim.10.d:0 "La grande cité de [1184.GetName] est à nouveau sous notre contrôle ! Notre peuple se calme enfin !"
 flavor_zim.10.a:0 "Bien."
 ###AJUURAN FLAVOR EVENTS###
 flavor_aju.1.t:0 "Accord d'Or avec [From.GetName]"
 flavor_aju.1.d:1 "[From.GetName] a envoyé des diplomates et des marchands à la cour de [Root.Monarch.GetName]. Apparemment, ces hommes cherchent une audience avec notre [Root.Monarch.GetTitle]. Ils offrent un accord commercial où nous offrons de l'or de nos mines d'or à [From.GetName] en échange d'une monnaie appropriée pour notre économie."
 flavor_aju.1.a:0 "Accepter l'offre."
 flavor_aju.1.b:0 "Refuser l'offre."
 flavor_aju.5.t:0 "Les Marchands de [From.GetName]"
 flavor_aju.5.d:1 "Les marchands de [From.GetName] sont devenus un spectacle plus courant en Inde récemment. Ce sont des commerçants honnêtes et les marchandises qu'ils apportent sont de haute qualité. Ce qui ressort, c'est leur engagement dans les processus de production locaux et la monnaie avec laquelle ils nous paient. Ces marchands pourraient s'avérer utiles pour améliorer notre production de divers biens, mais nous pourrions devenir trop dépendants de ces étrangers."
 flavor_aju.5.a:0 "Une meilleure production est toujours bonne cependant."
 flavor_aju.5.b:0 "Les expulser."
 flavor_aju.6.t:0 "Une girafe pour le Fils du Ciel"
 flavor_aju.6.d:0 "La nation lointaine de [From.GetName] a envoyé des ambassadeurs à notre glorieux souverain [Root.Monarch.GetName]. Ils nous ont apporté des nouvelles de leur pays et des cadeaux somptueux, dont l'un a attiré l'œil de notre [Root.Monarch.GetTitle]. Une girafe, un animal qui relève davantage du mythe et de la légende dans notre pays. Ils nous ont présenté l'animal comme un cadeau de leur [From.Monarch.GetTitle] en signe d'amitié."
 flavor_aju.6.a:0 "C'est… C'est… MAGNIFIQUE !"
 flavor_aju.6.b:0 "Merci, mais nous n'avons pas vraiment besoin de girafes."
 flavor_aju.2.t:0 "Ils ont accepté notre accord"
 flavor_aju.2.d:0 "Le souverain de [From.GetName] a gracieusement accepté notre accord commercial. Cela résultera certainement en un bénéfice mutuel pour les deux pays, y compris un coup de pouce économique substantiel pour le nôtre."
 flavor_aju.2.a:0 "Bien"
 flavor_aju.3.t:0 "Ils ont refusé notre accord"
 flavor_aju.3.d:0 "Les fous de [From.GetName] ont osé refuser notre généreuse offre commerciale. Cela ne résultera qu'en leur perte, et nous ne serons pas si magnanimes à l'avenir."
 flavor_aju.3.a:0 "Nous nous en souviendrons"
 flavor_aju.4.t:0 "Frappe de monnaie"
 flavor_aju.4.d:0 "Ayant accès aux mines d'or, nous pouvons mieux réguler la production et la frappe des pièces, résultant en une richesse accrue pour notre pays. Développer une industrie de frappe appropriée et stable augmentera certainement notre puissance économique."
 flavor_aju.4.a:0 "Bien"
 flavor_aju.4.a.tt:0 "Gagner §G4 ans§! de production d'or d'une province aurifère possédée par votre sujet."
 flavor_aju.7.t:0 "L'Empereur adore la girafe"
 flavor_aju.7.d:0 "Les ambassadeurs que nous avons envoyés à [From.GetName] sont enfin revenus. Apparemment, le [From.Monarch.GetTitle] [From.Monarch.GetName] a été enchanté par notre cadeau et a gracieusement accepté la girafe que nous avons offerte. Les relations entre nos pays vont certainement fleurir."
 flavor_aju.7.a:0 "Content de voir qu'il l'apprécie"
 flavor_aju.8.t:0 "Ils ont dit que c'était bof…"
 flavor_aju.8.d:0 "Les ambassadeurs que nous avons envoyés à [From.GetName] sont enfin revenus. Apparemment, le [From.Monarch.GetTitle] [From.Monarch.GetName] n'a pas été impressionné par notre cadeau et a refusé la girafe que nous avons offerte. Les ambassadeurs ont été forcés de la ramener, mais malheureusement le pauvre animal n'a pas pu supporter le voyage de retour. Nous n'oublierons pas de sitôt ce manque de respect."
 flavor_aju.8.a:0 "Vous êtes bof aussi…"
 flavor_aju.9.t:0 "Dynasties unies"
 flavor_aju.9.d:1 "Nos îles ont été une colonie de [From.GetName] par le passé. Finalement, nous avons gagné notre liberté car gouverner les Maldives s'est avéré trop difficile, jusqu'à maintenant. Des ambassadeurs [From.GetAdjective] sont venus à nous du continent demandant de mettre fin à cette situation. Ayant été gouvernés par la même famille, ils arguent qu'il est absurde d'être vus comme deux nations différentes, et que nous bénéficierions tous les deux si nous nous réunissions avec nos frères."
 flavor_aju.9.a:0 "Content d'être de retour"
 flavor_aju.9.b:2 "Nous ne nous soumettrons pas à [From.GetName] !"
 flavor_aju.10.t:0 "Dynasties unies - ils acceptent !"
 flavor_aju.10.d:0 "Les ambassadeurs que nous avons envoyés à [From.GetName] sont revenus avec d'excellentes nouvelles ! Le [From.Monarch.GetTitle] de [From.GetName] a accepté que nous bénéficierions tous les deux si nous réunissions nos nations sous une seule bannière."
 flavor_aju.10.a:0 "Content d'être de retour"
 flavor_aju.11.t:0 "Dynasties unies - ils refusent !"
 flavor_aju.11.d:1 "Les ambassadeurs que nous avons envoyés à [From.GetName] sont revenus avec de sombres nouvelles ! Le [From.Monarch.GetTitle] de [From.GetName] a refusé notre proposition de réunir nos nations. L'imbécile doit se croire meilleur que nous. Ce qu'il ne réalise pas, c'est que l'offre que nous avons présentée n'était qu'une formalité ; ils font partie de notre nation qu'ils le veuillent ou non, et nous le leur montrerons."
 flavor_aju.11.a:0 "Leurs terres nous appartiennent d'une manière ou d'une autre !"
 flavor_aju.12.t:0 "Marchands de [From.GetName] en [Root.GetName]"
 flavor_aju.12.d:0 "Les marchands envoyés par [From.GetName] nous apporteront certainement un grand profit. Pouvoir commercer avec des terres aussi lointaines apportera un grand afflux de richesse et de gens, transformant [613.GetName] en un marché animé."
 flavor_aju.12.a:0 "Bien"
 flavor_aju.13.t:0 "Marchands de [From.GetName] à Java"
 flavor_aju.13.d:0 "Les marchands envoyés par [From.GetName] nous apporteront certainement un grand profit. Pouvoir commercer avec des terres aussi lointaines apportera un grand afflux de richesse et de gens, augmentant les produits présents sur nos marchés."
 flavor_aju.13.a:0 "Bien"
 flavor_aju.14.t:0 "Modernisation de l'armée"
 flavor_aju.14.d:0 "Sous la tutelle ottomane, nous pourrions avoir une armée moderne et imposante. Nous pourrions engager certains de leurs instructeurs pour changer radicalement nos armées, ce qui ne serait certainement pas bon marché mais serait efficace. Alternativement, nous avons aussi l'option d'acheter certains de leurs fusils excédentaires ; nous aurions un meilleur équipement mais pas l'expertise pour l'utiliser, ce serait quelque chose que nous devrions gagner par nous-mêmes."
 flavor_aju.14.a:0 "Nous demanderons leurs conseils"
 flavor_aju.14.b:0 "Nous achèterons du nouvel équipement"
 flavor_aju.14.c:0 "Pas vraiment intéressant"
 ###ADA FLAVOR EVENTS###
 flavor_ada.2.t:0 "Régiment [From.GetAdjective] arrive à [Root.Capital.GetName]"
 flavor_ada.2.d:0 "Des invités étrangers ont visité la cour [Root.GetAdjective] aujourd'hui, des régiments entiers de soldats escortant un seul diplomate. Apparemment, ils ont voyagé tout le long chemin depuis [From.Capital.GetName] jusqu'à [Root.Capital.GetName] dans l'espoir d'obtenir une audience avec [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Le diplomate nous demande une alliance avec [From.GetName] afin d'arrêter les [ETH.GetAdjective] qui menacent nos frères dans la foi."
 flavor_ada.2.a:0 "Nous soutiendrons [From.GetName] !"
 flavor_ada.2.a.tt:0 "§Y[From.GetName]§! aura accès à la compagnie de mercenaires §YJanissaires§! s'ils entrent en guerre avec [ETH.GetName]."
 flavor_ada.2.b:0 "Ce n'est pas notre guerre."
 flavor_ada.3.t:0 "Les [From.GetAdjective] acceptent l'Alliance !"
 flavor_ada.3.d:0 "Notre diplomate est arrivé sain et sauf à [Root.Capital.GetName], et il apporte de merveilleuses nouvelles ! Le sage [From.Monarch.GetTitle] a accepté l'alliance et a assuré une aide militaire quand nous frapperons l'Éthiopie !"
 flavor_ada.3.a:0 "Splendide !"
 flavor_ada.3.a.tt:0 "Nous recevrons l'aide de §Y[From.GetName]§! lors de notre prochaine guerre contre [ETH.GetName] !"
 ada_discover_anatolia:0 "Découvrir toute l'§YAnatolie§!."
 flavor_ada.4.t:0 "Les [From.GetAdjective] rejettent l'Alliance !"
 flavor_ada.4.d:0 "Notre diplomate est revenu avec de sombres nouvelles : les prometteurs [From.GetAdjective] rejettent l'idée d'une alliance car ils pensent que nous ne valons pas leur temps. Bien sûr, une telle façon de penser est risible. Pourtant, nous ne sommes toujours pas dans une meilleure position diplomatiquement…"
 flavor_ada.4.a:0 "Malédiction !"
 flavor_ada.5.t:0 "Pas d'Empire en Anatolie"
 flavor_ada.5.d:0 "Notre diplomate est revenu. Mais il a l'air vaincu, choqué même. Apparemment, il n'y a pas de grand empire en Anatolie disposé à nous aider. Des païens et des hérétiques ont conquis l'Anatolie et les Turcs, qui étaient des alliés prometteurs, sont sujets d'une puissance hostile."
 flavor_ada.5.a:0 "Nous n'avons pas d'autre choix. Nous devrons demander aux Mamelouks après tout."
 flavor_ada.5.b:0 "Ce n'est pas bon…"
 flavor_ada.6.a.tt:0 "§Y[From.GetName]§! obtient l'accès à la compagnie de mercenaires §YSoldats Mamelouks§! jusqu'à la fin du jeu."
 flavor_ada.7.t:0 "Les Mamelouks soutiennent [Root.GetName]"
 flavor_ada.7.d:0 "Bien que les Mamelouks n'aient pas été notre première option en tant qu'allié, ils reconnaissent la menace éthiopienne et ont décidé de nous aider avec une petite compagnie de soldats mamelouks."
 flavor_ada.7.a:0 "Eh bien, mieux que rien."
 flavor_ada.7.a.tt:0 "La compagnie de mercenaires §YSoldats Mamelouks§! est disponible pour [Root.GetName]."
 flavor_ada.8.t:0 "Les Mamelouks rejettent l'aide pour [Root.GetName]"
 flavor_ada.8.d:0 "Des nouvelles des Mamelouks nous sont parvenues. Malgré nos meilleures tentatives diplomatiques, les Mamelouks ne voient aucune raison de nous soutenir dans notre lutte contre les Éthiopiens."
 flavor_ada.8.a:0 "Qu'ils soient maudits !"
 ###HEIR CULT###
 fetishist_flavor.600.t:0 "Le Culte pour l'[Root.Heir.GetTitle]"
 fetishist_flavor.600.desc:0 "Traditionnellement, c'est notre [Root.Monarch.GetTitle] qui sert de guide pour le culte de [Root.GetName]. Mais les traditions ne sont pas rigides et peuvent changer avec le temps, et ainsi la décision d'un culte pour notre héritier est devenue une question importante aussi."
 fetishist_flavor.600.a:0 "[Root.Heir.GetName] suivra le culte de Yemoja."
 fetishist_flavor.600.b:0 "[Root.Heir.GetName] suivra le culte de Roog."
 fetishist_flavor.600.c:0 "[Root.Heir.GetName] suivra le culte de Nyame."
 fetishist_flavor.600.d:0 "[Root.Heir.GetName] suivra le culte de Cwezi."
 fetishist_flavor.600.e:0 "[Root.Heir.GetName] suivra le culte de Mlira."
 fetishist_flavor.600.f:0 "[Root.Heir.GetName] suivra le culte de Mwari."
 fetishist_flavor.600.g:0 "[Root.Heir.GetName] suivra le culte d'Enkai."
 fetishist_flavor.600.h:0 "[Root.Heir.GetName] suivra le culte de Waaq."
 fetishist_flavor.600.i:0 "[Root.Heir.GetName] suivra le culte de Zanahary."
 fetishist_flavor.600.j:0 "[Root.Heir.GetName] suivra le culte du Christianisme."
 fetishist_flavor.600.k:0 "[Root.Heir.GetName] suivra le culte de l'Islam."
 fetishist_flavor.600.l:0 "[Root.Heir.GetName] suivra le culte du Buddhadharma."
 fetishist_flavor.600.m:0 "[Root.Heir.GetName] suivra le culte du Sanatana Dharma."
 fetishist_flavor.600.n:0 "[Root.Heir.GetName] suivra le culte de Teotl."
 fetishist_flavor.600.o:0 "[Root.Heir.GetName] suivra le culte de Freyja."
 fetishist_flavor.600.p:0 "[Root.Heir.GetName] suivra le culte d'Haymanot."
 fetishist_flavor.600.q:0 "[Root.Heir.GetName] suivra le culte de Mazdayasna."
 fetishist_flavor.601.t:0 "La Quête d'un nouveau Culte"
 fetishist_flavor.601.desc:1 "Un chaman de notre [Root.GovernmentName] a demandé à entrer en contact avec l'un des autres cultes ou un pays connu d'une religion différente. Il n'est pas difficile quant au type de culte que nous devons rencontrer, alors notre grand [Root.Monarch.GetTitle] le guidera sur la bonne voie."
 fetishist_flavor.601.a:0 "Tu iras chez un membre du culte de Yemoja."
 fetishist_flavor.601.b:0 "Tu iras chez un membre du culte de Roog."
 fetishist_flavor.601.c:0 "Tu iras chez un membre du culte de Nyame."
 fetishist_flavor.601.d:0 "Tu iras chez un membre du culte de Cwezi."
 fetishist_flavor.601.e:0 "Tu iras chez un membre du culte de Mlira."
 fetishist_flavor.601.f:0 "Tu iras chez un membre du culte de Mwari."
 fetishist_flavor.601.g:0 "Tu iras chez un membre du culte d'Enkai."
 fetishist_flavor.601.h:0 "Tu iras chez un membre du culte de Waaq."
 fetishist_flavor.601.i:0 "Tu iras chez un membre du culte de Zanahary."
 fetishist_flavor.601.j:0 "Tu iras chez un membre du Christianisme."
 fetishist_flavor.601.k:0 "Tu iras chez un membre de l'Islam."
 fetishist_flavor.601.l:0 "Tu iras chez un membre du Buddhadharma."
 fetishist_flavor.601.m:0 "Tu iras chez un membre du Sanatana Dharma."
 fetishist_flavor.601.n:0 "Tu iras chez un membre du culte de Teotl."
 fetishist_flavor.601.o:0 "Tu iras chez un membre du culte de Freyja."
 fetishist_flavor.601.p:0 "Tu iras chez un membre du culte d'Haymanot."
 fetishist_flavor.601.q:0 "Tu iras chez un membre du culte de Mazdayasna."
 fetishist_flavor.601.r:0 "Attends, tu es encore nécessaire ici, chaman !"
 fetishist_flavor.601.r.tt:0 "Le chaman restera en [Root.GetName] et attendra vos ordres."
 fetishist_flavor.602.t:0 "Le Culte Principal de [Root.GetName]"
 fetishist_flavor.602.desc:0 "Le [Root.GetClergyName] s'est réuni à la cour de [Root.GetName]. Ils ont soulevé des inquiétudes que trop de cultes tentent d'imposer leur influence dans notre [Root.GovernmentName] et recommandent de suivre une approche plus monothéiste en promouvant un culte principal. Un culte qui est toujours suivi par le sage [Root.Monarch.GetTitle] de [Root.GetName]."
 fetishist_flavor.602.a:0 "Nous adopterons le culte de Yemoja comme notre culte principal !"
 fetishist_flavor.602.b:0 "Nous adopterons le culte de Roog comme notre culte principal !"
