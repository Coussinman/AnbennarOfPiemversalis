 MALI_IVORY:0 "Ivoire Malien"
 ###SCRIPTED EFFECTS AND TRIGGERS###
 unlock_privilege_estate_burghers_control_over_the_mint_tt:1 "Active le privilège de la [Root.GetBurghersName] « §YExtraction Aurifère Contrôlée§! »."
 unlock_privilege_estate_nobles_cawa_peace_keepers_tt:1 "Active le privilège de la [Root.GetNobilityOrFallbackName] « §YUtiliser les Gardiens de la Paix Cawa§! »."
 unlock_privilege_estate_nobles_cawa_offensive_fighters_tt:0 "Active le privilège de la [Root.GetNobilityOrFallbackName] « §YUtiliser les Conquérants Cawa§! »."
 mal_add_disaster_stability_tt:1 "Gagner §G1§! de stabilité (§G50§! de pouvoir administratif si vous avez déjà 3 de stabilité) si le désastre §YDéclin du Mali§! est actif."
 set_prestige_to_zero_tt:0 "Mettre le prestige de [This.GetName] à §Y0§!."
 enable_cult_for_heirs_tt:0 "Les héritiers peuvent choisir une version affaiblie d'un §YCulte§!."
 disable_cult_for_heirs_tt:0 "§RLes héritiers ne peuvent plus choisir une version affaiblie d'un §YCulte§!.§!"
 unlock_cult_through_selection_tt:0 "Débloquer un §YCulte§! de votre choix.\nLes cultes d'autres religions nécessitent d'abord notre connaissance de leur existence pour les débloquer."
 enable_development_on_buildings_built_tt:0 "Construire des bâtiments non défensifs §Yaugmentera§! le développement de la province.\nDétruire des bâtiments construits pendant que cet effet est actif retirera cependant du développement."
 enable_primary_cult_tt:1 "Active l'utilisation d'un §YCulte Principal§!, qui augmente la puissance du culte et supprime la perte de stabilité à la mort d'un monarque non-Liche, mais désactive l'utilisation d'autres cultes."
 disable_primary_cult_tt:0 "Désactive l'utilisation d'un §YCulte Principal§! et active l'utilisation d'autres cultes."
 select_primary_cult_yemoja_cult_tt:0 "§YYemoja§! devient notre §YCulte Principal§!.\nLes autres cultes deviennent indisponibles, mais nous ne subirons pas de perte de stabilité à la mort de notre [Root.Monarch.GetTitle]. De plus, les modificateurs de Yemoja sont renforcés.[Root.GetHeirPrimaryCultFeature]"
