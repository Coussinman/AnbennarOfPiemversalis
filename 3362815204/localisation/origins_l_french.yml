 ###DECISIONS###
 kongo_nation_title:0 "Restaurer le Royaume du Kongo"
 kongo_nation_desc:1 "Le royaume tribal du Kongo était autrefois la principale puissance régionale et a donné son nom à la région du Kongo. Avec sa chute et sans personne pour le remplacer, un vide a émergé dans la région du Kongo, qui attire maintenant les Européens et autres étrangers pour l'exploiter. Il est temps de combler ce vide nous-mêmes et de continuer l'héritage du royaume !"
 ethiopia_nation_title:0 "Restaurer l'Héritage Salomonide"
 ethiopia_nation_desc:1 "L'empire d'Éthiopie est le successeur spirituel de l'Empire aksoumite, le foyer du fils du légendaire roi Salomon et de la reine de Saba et le défenseur de la foi copte. Leur chute a été une tragédie pour la foi copte éthiopienne, mais l'esprit de l'Éthiopie vit encore, attendant d'être ravivé par un successeur digne comme nous !"
 set_focus_on_professional_army_title:0 "Se Concentrer sur une Armée Professionnelle"
 set_focus_on_professional_army_desc:0 "Avec l'ascension de [Root.Monarch.GetName] au trône, l'armée attend les ressources nécessaires pour se concentrer sur une armée plus efficace mais plus petite."
 set_focus_on_professional_army_ct:1 "L'armée n'a PAS reçu d'attention pendant la vie de §Y[Root.Monarch.GetName]§! au cours des §Y20 dernières années§!."
 send_the_shaman_to_a_foreign_country_title:0 "Envoyer le Chaman vers des Cultes Étrangers"
 send_the_shaman_to_a_foreign_country_desc:0 "Nous pouvons envoyer le chaman de notre [Root.GovernmentName] dans un pays avec un culte étranger afin d'étudier les pratiques religieuses et cultuelles dudit pays."
 zulu_nation_ct:0 "Provoquer le peuple Nguni local, ce qui pourrait entraîner la création prématurée de §Y[ZUL.GetName]§!."
 federal_kingdoms_gather_the_armies_tt:0 "Les Royaumes Confédéraux rassembleront leurs troupes au cours des §Y6 prochains mois§!, ce qui entraînera un gain de §Y1000 de main-d'œuvre§! par base de main-d'œuvre pour les provinces §Y[Root.Culture.GetName]§! plus tard.\nLe gain de main-d'œuvre évolue avec les §YModificateurs nationaux de main-d'œuvre§!.\nChaque province §Y[Root.Culture.GetName]§! gagne §R+20,0 %§! d'autonomie locale."
 federal_kingdoms_internal_royal_marriage_tt:0 "Les Royaumes Confédéraux organiseront un mariage au cours des §Y6 prochains mois§!, ce qui entraînera un mariage royal interne plus tard, donnant les effets suivants pendant §Y20 ans§! :\nÉquilibre de loyauté de la [Root.GetNobilityOrFallbackName] : §G+10,0 %§!\nInfluence de la [Root.GetNobilityOrFallbackName] : §Y+5,0 %§!\nChance d'un nouvel héritier : §G+100,0 %§!"
 federal_celebrate_rituals_together_tt:0 "Les Royaumes Confédéraux prépareront un festival au cours des §Y6 prochains mois§!, ce qui entraînera §G+1§! de stabilité plus tard.\nChaque province §Y[Root.Culture.GetName]§! gagne §R+10,0 %§! d'autonomie locale."
 federal_gain_tribal_allegiance_tt:0 "Les Royaumes Confédéraux exprimeront leur allégeance à [Root.Monarch.GetName] au cours des §Y6 prochains mois§!, ce qui entraînera un gain de §G+3§! d'allégeance tribale et §R+5,0 %§! d'autonomie locale pour chaque province §Y[Root.Culture.GetName]§! plus tard."
 has_adopted_any_cult:0 "A adopté un §YCulte§!."
 switch_active_cult_decision_title:0 "Choisir un nouveau Culte"
 switch_active_cult_decision_desc:0 "La foi de [Root.Religion.GetName] n'est pas rigide avec une seule divinité. Nous croyons en une collection de différentes divinités et cultes, qui vénèrent lesdites divinités. De temps en temps, il est nécessaire pour un souverain de changer l'objet du culte du pays. Avec l'aide de notre [Root.GetClergyName], nous pouvons changer assez facilement."
 switch_permanent_scholar_title:0 "Remplacer l'Érudit Résident"
 switch_permanent_scholar_desc:0 "Parfois les enseignements d'une certaine école ne sont plus de valeur pour notre État. Dans de tels cas, il est recommandé d'expulser l'érudit étranger et de le remplacer par un érudit d'une école plus bénéfique.\nEt grâce aux connexions de notre [Root.GetClergyName], nous ne subirons même pas de pénalité dans notre diplomatie étrangère."
 invest_into_the_seven_cities_title:0 "Investir dans les Sept Cités"
 invest_into_the_seven_cities_desc:0 "Les Sept Cités des Haoussa sont de grande importance dans notre histoire culturelle. Nous pouvons investir dans la prospérité de ces cités pour ressusciter leur importance régionale et culturelle pour notre État."
 zulu_nation_title:0 "Militariser les Nguni"
 zulu_nation_desc:0 "Les armées de [Root.GetName] sont splendides. Mais elles peuvent être meilleures. En équipant les Nguni locaux et en militarisant leur peuple, nous assurons des centaines de nouvelles recrues pour le [Root.GovernmentName] [Root.GetAdjective]."
 aksumite_nation_title:0 "Restaurer Aksoum"
 aksumite_nation_desc:0 "Les anciens racontent le récit de l'ancien et puissant Royaume d'Aksoum et de son puissant roi, Kaleb, qui régnait sur la mer Rouge sans opposition et était connu sous le nom de Saint Elesbaan. Maintenant nous sommes enfin prêts à écrire un nouveau chapitre de l'histoire en reprenant le manteau de nos ancêtres et en réclamant leur gloire passée."
 great_zimbabwe_nation_title:0 "Restaurer le Zimbabwe"
 great_zimbabwe_nation_desc:0 "Réjouissez-vous ! La grande cité de pierre est à nouveau peuplée, ses bâtiments reconstruits et sa force retrouvée ! Il est maintenant temps pour nous de lever haut sa bannière et de faire savoir au monde que le Grand Zimbabwe est à nouveau le joyau resplendissant de l'Afrique qu'il était autrefois."
 hausa_nation_title:0 "Unir les Haoussa"
 hausa_nation_desc:0 "Après de nombreuses années de querelles et de guerres qui ont déchiré le pays, les anciennes rivalités sont enfin apaisées et la paix a été atteinte. Les fils de Bawo sont à nouveau réunis sous la même bannière. Il est temps pour les Haoussa de se lever comme un seul !"
 israel_nation_title:0 "Rétablir Israël"
 israel_nation_desc:0 "Comme promis, la terre d'Israël est à nouveau libre de la tyrannie des Gentils, la majesté de David a été rétablie et la ville sainte de Jérusalem reconstruite. Le Seigneur est retourné à Sion avec miséricorde et les villes débordent à nouveau de prospérité."
 federal_kingdoms_gather_the_armies_title:0 "Royaumes Confédéraux : Rassembler les Armées"
 federal_kingdoms_gather_the_armies_desc:0 "Nous pouvons organiser de nouveaux contingents de recrues grâce à nos relations avec les plusieurs royaumes de [Root.GetName]."
 federal_kingdoms_internal_royal_marriage_title:1 "Royaumes Confédéraux : Arranger un Mariage"
 federal_kingdoms_internal_royal_marriage_desc:0 "Nous pouvons utiliser nos relations internes pour arranger un mariage de [Root.Monarch.GetName] avec l'un des époux des autres royaumes de notre domaine."
 federal_celebrate_rituals_together_title:0 "Royaumes Confédéraux : Célébrer les Rituels"
 federal_celebrate_rituals_together_desc:0 "En temps spéciaux, il est important de se rappeler ce qui nous unit et de célébrer les festivals de notre peuple."
 federal_gain_tribal_allegiance_title:0 "Royaumes Confédéraux : Gagner l'Allégeance Tribale"
 federal_gain_tribal_allegiance_desc:0 "Les royaumes proclament leur allégeance au [Root.Monarch.GetTitle]."
 kitara_nation_title:0 "Revendiquer le Titre d'Empire de Kitara"
 kitara_nation_desc:0 "Après beaucoup de luttes et de souffrances, nous avons uni les peuples des Grands Lacs et réparé la division qui nous séparait. Il est temps maintenant de reconstruire l'unité qui a été perdue et de lever à nouveau la bannière de Kitara pour que tous puissent voir que nous ne faisons qu'un."
 macina_nation_title:0 "Former Macina"
 macina_nation_desc:0 "Notre peuple a enduré une terrible injustice et tyrannie sous nos anciens suzerains, mais nous nous sommes enfin libérés de leur joug et sommes maintenant prêts à tracer notre propre chemin. Levons notre nouvelle bannière comme symbole de notre liberté et comme avertissement pour ceux qui oseraient la menacer."
 mali_nation_title:0 "Reprendre le Manteau du Mali"
 mali_nation_desc:0 "Le puissant et prospère Empire du Mali est tombé il y a de nombreuses années à cause de voisins jaloux et de chefs querelleurs. Malgré cela, l'esprit du Mali ne peut être détruit, il survivra toujours dans son peuple. Maintenant que les terres autour du Manding sont à nouveau unies, il est temps qu'un nouveau Mansa se lève et ramène l'empire à sa gloire d'antan."
 mossi_nation_title:0 "Unir les Royaumes Mossi"
 mossi_nation_desc:0 "Pendant trop d'années, les fils de la princesse Yennega se sont battus entre eux. Mais maintenant les rivalités et querelles constantes ont été apaisées et les frères depuis longtemps perdus chevauchent à nouveau côte à côte. Il est temps de tourner nos yeux vers le monde et de leur faire savoir que les Mossi ne font qu'un."
 nubian_nation_title:0 "Unir les Nubiens"
 nubian_nation_desc:0 "Depuis les temps anciens, les royaumes de Nubie ont été menacés du nord et du sud par des païens qui ne veulent que prendre notre peuple et nos richesses. Il est temps de mettre de côté nos différences et de nous unir en une seule nation nubienne sous Dieu."
 rozwi_nation_title:0 "Établir le Rozwi"
 rozwi_nation_desc:0 "Nous sommes des guerriers. Nous avons expulsé la menace étrangère, pacifié la terre du Zimbabwe, construit de grandes cités de pierre, extrait l'or des profondeurs de la terre, chassé des bêtes féroces, protégé le commerce et uni les peuples. Nous sommes les Rozwi !"
 somalia_nation_title:0 "Unir les Clans Somaliens"
 somalia_nation_desc:0 "Depuis les temps anciens, les Somaliens ont habité la Corne de l'Afrique, mais ils ont toujours été divisés et ont rivalisé entre eux, tant dans le commerce que sur le champ de bataille. Tout change maintenant alors que le peuple laisse les rivalités derrière lui et se tient enfin uni sous la même bannière."
 ###ZIM MODIFIERS###
 zim_declining_city:0 "Ruines Abandonnées"
 desc_zim_declining_city:1 "Cette province est une cité abandonnée sans ressources et avec seulement une poignée de gens restants qui administrent la province. Les efforts pour ramener les gens dans la cité s'avéreront difficiles."
 zim_restored_capital:0 "Capitale Restaurée"
 desc_zim_restored_capital:0 "Par un effort concentré et du dévouement, la cité du Zimbabwe a été restaurée à sa gloire d'antan et sert à la cour royale comme siège du pouvoir."
 zim_desecrated_kingdom:0 "Royaume Profané"
 desc_zim_desecrated_kingdom:0 "Le Zimbabwe est le siège de nos ancêtres. En l'abandonnant aux ennemis de notre royaume, le roi sacré a montré sa faiblesse et est inapte à régner."
 zim_desecrated_kingdom_tt:0 "dure jusqu'à ce que le Zimbabwe soit à nouveau sous la propriété de [Root.GetName]"
 ###ADAL MODIFIERS###
 ada_preperation_for_war:0 "Préparatifs de Guerre Adalites"
 desc_ada_preperation_for_war:0 "La guerre est omniprésente dans la société adalite. Nous attendons et nous préparons tous pour le jour où nous frapperons les Éthiopiens…\n\nNous recevons le modificateur « §YGuerre Adalite-Éthiopienne§! » tant que nous sommes en guerre avec §Y[ETH.GetName]§!, dont le développement est égal ou supérieur au nôtre, donnant les effets suivants :\nMoral des armées : §G+5,0 %§!\nVitesse de récupération de la main-d'œuvre : §G+10,0 %§!\nPiété mensuelle : §Y+0,1§!\n"
 ada_war_against_ethiopia:0 "Guerre Adalite-Éthiopienne"
 desc_ada_war_against_ethiopia:0 "Une fois de plus, notre peuple combat notre rival de toujours, l'Éthiopie, pour la domination de la Corne de l'Afrique ! Nos troupes décimeront les chrétiens et éteindront la menace qu'ils représentaient pour nous depuis tant de décennies."
 ada_expelling_of_the_christians:0 "Efforts de Conversion d'Adal"
 desc_ada_expelling_of_the_christians:0 "Les chrétiens de la Corne de l'Afrique ont causé misère et souffrance à notre peuple par leurs tentatives d'expansion. Nous devons convertir ces gens à la vraie foi afin de maintenir la paix !"
 ada_professional_army:0 "Armée Modernisée"
 desc_ada_professional_army:0 "L'armée de [Root.GetName] a connu de grandes améliorations en qualité et en entraînement."
 ada_religious_unity_in_the_horn:0 "Corne Unie Religieusement"
 desc_ada_religious_unity_in_the_horn:0 "Nous avons uni la Corne de l'Afrique et expulsé les païens et hérétiques belliqueux de notre patrie ! L'autorité de [Root.Religion.GetName] est incontestable !"
 ada_imperial_adal_sultanate:0 "Adal Impérial"
 desc_ada_imperial_adal_sultanate:0 "Nous avons surmonté la lutte des clans somaliens, nous avons éradiqué la menace causée par les Éthiopiens, nous avons uni toute la Corne de l'Afrique et même étendu notre domaine en Arabie. Vraiment, nous sommes un empire à part entière et en tant que tel, nous sommes devenus l'une des grandes puissances d'Afrique."
 ###CATHOLICISM###
 harsh:0 "Sévère"
 neutral:0 "Neutre"
 concilatory:1 "Conciliant"
 concessions:0 "Concessions"
 ###PP###
 zim_african_great_power:0 "Bonus de Mission Permanent" #anbennar
 ###MISSIONS###
 eth_cawa_discipline_title:0 "Entraîner les Cawa"
 eth_cawa_discipline_desc:1 "Les Cawa sont la classe noble féodale de notre royaume. Ces soldats professionnels, autrefois nommés par le Negusa Nagast lui-même, servent d'ossature à notre armée et assurent la paix dans nos provinces éloignées.\nPourtant, il y a toujours place à l'amélioration. Nous devrions recruter davantage de ces fiers guerriers et les entraîner à la perfection."
 eth_reform_the_negusa_government_title:0 "Centraliser l'État"
 eth_reform_the_negusa_government_desc:1 "L'ancienne monarchie du Negusa Nagast s'est avérée être un système rigide. Si le principe de la capitale itinérante a montré son efficacité pour garder une région sous contrôle, il a aussi révélé à quel point l'État est décentralisé, à quel point il est impuissant. Nous devons réformer le gouvernement et centraliser le pouvoir si nous voulons que notre empire survive."
 eth_reform_the_negusa_government_ct:0 "Débloquer la réforme gouvernementale §YEmpire Salomonide§!."
 eth_conquest_of_qasr_ibrim_title:0 "Prendre Qasr Ibrim"
 eth_conquest_of_qasr_ibrim_desc:1 "La foi copte a une forte connexion avec plusieurs Lieux Saints dans le monde. L'un d'eux est l'ancienne cité de Qasr Ibrim, qui a servi au VIIIe siècle de centre du christianisme. Cependant, ses jours de gloire ont trouvé une fin avec ses habitants se tournant vers les croyances païennes. Nous devrions la libérer de son propriétaire incompétent et ramener les gens là-bas à la vraie foi."
 eth_conquest_of_alexandria_title:0 "Libérer Alexandrie"
 eth_conquest_of_alexandria_desc:0 "Alexandrie abrite l'ancien siège du Patriarcat copte et du Pape copte. Cependant, l'église et une grande partie de la communauté copte souffrent sous la domination étrangère et infidèle des Mamelouks. Nous devons libérer la cité des musulmans et aider les Coptes qui se cachent encore."
 eth_conquest_of_antioch_title:0 "Conquérir Antioche"
 eth_conquest_of_antioch_desc:0 "L'ancienne cité d'Antioche était autrefois le Berceau du Christianisme et l'un de ses centres majeurs. À cause des Croisades et de la propagation de l'Islam, cela a changé et maintenant elle n'est plus que l'ombre d'elle-même. Bien que le clergé chrétien ait été éradiqué à Antioche, c'est toujours un lieu saint important pour notre foi. Nous devons reprendre ce siège antique et restaurer l'autorité chrétienne au Moyen-Orient."
 eth_please_the_vassals_title:0 "Damot et Hadiya"
 eth_please_the_vassals_desc:1 "Notre vassal Damot était autrefois un État qui avait subjugué le Sultanat de Shewa. L'autre vassal, le Sultanat d'Hadiya, faisait autrefois partie de Shewa.\nBien que les deux nations aient certainement leur histoire, elles ne sont que des sujets pour nous depuis que Zara Amda Seyon Ier a pris les choses en main et conquis les deux nations en l'an 1309. Maintenant le temps est venu que ces deux nations rejoignent notre grand empire ! Mais pour ce faire, leurs dirigeants pourraient d'abord avoir besoin d'un peu de persuasion."
 eth_unify_the_kingdoms_title:0 "Unifier les Tribus"
 eth_unify_the_kingdoms_desc:0 "Notre royaume était autrefois le grand Empire aksoumite, qui s'étendait des déserts de Dongola jusqu'à la côte de Mokha au Yémen. Cependant, cela a changé lorsque la reine Gudit et ses guerriers de Semien ont mis à sac Aksoum et assassiné la dynastie aksoumite. Peu après, l'Empire s'est effondré en plusieurs tribus.\nMais maintenant nous avons une nouvelle dynastie sur le trône ! Une qui mérite le titre de « Roi des Rois » et en tant que tels, nous reconquerrons les territoires de notre prédécesseur déchu, en commençant par l'unification des tribus !"
 eth_retake_suakin_title:0 "Conquérir Suakin"
 eth_retake_suakin_desc:1 "Le port de Suakin s'est avéré être un port important pour le commerce en mer Rouge. Bien qu'il n'ait jamais été établi que le port faisait partie de l'Empire aksoumite, il a tout de même été un foyer pour de nombreux chrétiens [Root.GetAdjective] jusqu'à ce que la cité tombe aux mains des musulmans. En tant que tel, nous avons plus que suffisamment de raisons de prendre ce port pour nous-mêmes et de libérer les quelques chrétiens qui s'y cachent encore."
 eth_develop_the_ancestors_city_title:0 "La Capitale des Ancêtres"
 eth_develop_the_ancestors_city_desc:0 "Bien que la plus grande histoire de notre nation soit basée sur le grand roi Ménélik et la Reine de Saba, nous avons une histoire encore plus ancienne que les récits de ces deux légendes. Notre grande nation faisait autrefois partie de l'Empire aksoumite, un empire de nos ancêtres. Bien que ses jours soient depuis longtemps révolus grâce aux envahisseurs musulmans et à la reine guerrière Gudit, son ancienne capitale, Aksoum, vit encore.\nDe nos jours, elle sert de lieu de couronnement de nos souverains. Cependant, le temps n'a pas été clément avec la cité et a laissé ses marques. Nous devrions rénover cette cité pour assurer la préservation de notre passé."
 eth_harbor_city_adulis_title:0 "Restaurer Adulis"
 eth_harbor_city_adulis_desc:1 "Aucun port n'est aussi important pour l'ancien Empire aksoumite que la cité portuaire d'Adulis. Elle a été le point clé du commerce antique de la mer Rouge et était très proche de la Grèce antique ainsi que de l'Empire byzantin. Grâce à son emplacement, elle a permis à Aksoum de devenir la puissance majeure de la mer Rouge.\nMalheureusement, la cité a été capturée par les musulmans vers l'an 702, ce qui a mené à l'isolement et à l'inévitable chute de l'Empire aksoumite. Mais tout n'est pas perdu ! L'infrastructure de la cité est encore intacte. Si nous récupérons ce port, nous pouvons reconstruire Adulis en une cité plus grande qu'elle ne l'a jamais été."
 eth_conquer_adal_title:0 "Conquérir Adal"
 eth_conquer_adal_desc:1 "Les relations entre [Root.GetName] et Adal ont toujours été sombres en raison des différences de religion et de pouvoir. À cause de cette différence de pouvoir, notre [Root.GovernmentName] a toujours pu exiger son tribut légitime du sultan d'Adal. Cependant, depuis que les Ottomans ont pris contact avec le sultan, le peuple d'Adal est devenu têtu dans ses paiements et aspire maintenant à notre destruction avec l'aide des Turcs. Nous devrions prendre des précautions et les conquérir avant qu'ils ne deviennent une vraie menace pour [Root.GetName]."
 eth_unify_the_horn_of_africa_title:0 "Unir la Corne"
 eth_unify_the_horn_of_africa_desc:1 "La Corne de l'Afrique abrite de nombreux anciens royaumes. Beaucoup d'entre eux se sont élevés et sont tombés au fil des siècles, mais aucun d'eux n'a jamais réussi à unir toute la région. Nous devrions prendre les choses en main et mettre fin aux combats sans fin dans la Corne de l'Afrique une fois pour toutes."
 eth_yemens_coasts_title:0 "Pied-à-Terre en Arabie"
 eth_yemens_coasts_desc:1 "L'Empire aksoumite possédait autrefois des territoires en Arabie du Sud au IIIe siècle. Particulièrement le littoral des zones qui sont aujourd'hui associées au Yémen. Comme chaque grande réalisation de cet ancien empire, notre pied-à-terre en Arabie est également tombé aux mains des musulmans. Le temps est venu de le leur reprendre."
 eth_restore_aksumite_empire_title:0 "Dépasser le Passé"
 eth_restore_aksumite_empire_desc:0 "L'empire de nos ancêtres a peut-être chuté, mais son héritage vit en nous, et grâce à cela, nous avons la force non seulement de restaurer ce qui a été détruit il y a si longtemps, mais aussi de le dépasser !"
 eth_eliminate_the_semien_rebels_title:0 "La Révolte de Gédéon"
 eth_eliminate_the_semien_rebels_desc:0 "Le traître roi Gédéon V mène une rébellion contre [Root.Monarch.GetName] et tente de détacher son royaume de notre empire. Nous devrions donner une leçon à ce traître et renvoyer ses partisans d'où ils viennent."
 eth_church_reforms_title:0 "Résoudre la Question du Sabbat"
 eth_church_reforms_desc:0 "Bien que cela semble être un problème trivial, notre église est divisée sur la question de l'observance du Sabbat biblique, et ce depuis presque un siècle entier. Tandis que les loyalistes de l'Église d'Alexandrie croient que le jour de repos devrait être observé le dimanche, les disciples d'Ewostatewos pensent que les deux jours du week-end devraient être observés. Si nous voulons maintenir une unité religieuse, nous devons trouver un compromis pour les deux groupes."
 eth_church_reforms_ct:1 "L'événement « §YRéformes de centralisation de Zara Yaqob§! » s'est produit."
 unlock_privilege_estate_church_yakobs_churches_tt:0 "Active le privilège du [Root.GetClergyName] « §YRéforme du Sabbat Biblique§! »"
 unlock_privilege_estate_burghers_hydraulic_rights_tt:0 "Active le privilège de la [Root.GetBurghersName] « §YAccorder les Droits Hydrauliques§! »"
 eth_build_an_army_title:0 "L'Armée de [Root.GetName]"
 eth_build_an_army_desc:0 "Notre royaume est entouré d'infidèles et d'ennemis du [Root.GovernmentName]. Si nous espérons survivre et étendre notre nation, nous devons renforcer notre armée avec plus de troupes et un général compétent."
 eth_conquer_southern_kingdoms_title:0 "Conquérir le Sud"
 eth_conquer_southern_kingdoms_desc:1 "Des rivaux potentiels existent aux frontières méridionales de notre grand [Root.GovernmentName]. Le Royaume de Kaffa est peut-être une nation copte sœur, mais leurs rois n'ont aucun intérêt à partager leur or avec notre légitime [Root.Monarch.GetTitle]. Le Royaume d'Ennarea est une piètre excuse d'État et pourrait finir comme renfort des barbares fétichistes de l'est.\nNous devrions conquérir les royaumes du sud et consolider la région éthiopienne."
 eth_the_riches_of_the_south_title:0 "Richesses de Kaffa"
 eth_the_riches_of_the_south_desc:0 "Bien sûr, les gens sont plutôt mécontents lorsqu'ils perdent leur souveraineté au profit d'une nation étrangère. C'est ainsi que fonctionnent la guerre et la conquête, après tout, et habituellement les peuples conquis s'adapteront à leurs nouveaux suzerains avec le temps. Cependant, dans certains cas, la transition doit être rendue plus confortable. Kaffa est l'un de ces cas. Leur or est inestimable pour notre pays, mais tant que la population locale est mécontente, nous ne pouvons pas extraire l'or là-bas. Nous devrions développer une meilleure infrastructure à Kaffa et Damot pour montrer notre côté bienveillant."
 eth_gain_sea_access_title:0 "Accès à la Mer Rouge"
 eth_gain_sea_access_desc:0 "Depuis la chute de l'Empire aksoumite, notre royaume n'a eu aucun accès à la mer, qui nous connectait aux autres chrétiens du monde. Nous devons changer cela en conquérant un port et en l'agrandissant avec un chantier naval approprié ! Après tout, ni nos troupes ni nos diplomates ne peuvent se transformer en bateaux s'ils touchent l'eau."
 eth_gain_sea_access_tt:0 "Un §YChantier naval§! sera immédiatement construit dans un port possédé au hasard."
 eth_create_a_navy_title:0 "Créer la Marine [Root.GetAdjective]"
 eth_create_a_navy_desc:0 "Maintenant que notre royaume a les moyens de produire des navires, il est naturel que nous fassions exactement cela. Afin d'assurer un contact permanent avec nos frères et sœurs chrétiens, il est crucial que nous ayons une flotte fonctionnelle."
 eth_create_a_navy_tt:1 "Une petite flotte de navires naviguera à travers le grand Nil pour atteindre la mer Méditerranée."
 eth_ethiopian_empire_title:0 "Grande Puissance Africaine"
 eth_ethiopian_empire_desc:1 "Bien que nous ayons la bienveillance des Européens grâce à notre connexion religieuse, ils nous voient encore comme rien de plus qu'une tribu qui vit dans des huttes de boue. Nous leur montrerons que nous sommes une force avec laquelle il faut compter, tout comme ces grandes puissances européennes !"
 eth_find_other_christians_title:0 "Contact avec le Portugal"
 eth_find_other_christians_desc:0 "Depuis l'époque du grand Negusa Nagast Dawit Ier, notre [Root.GovernmentName] a eu des contacts avec les Européens. Mais en raison des longues distances et des complications causées par les Mamelouks, aucun des Européens n'a pu maintenir le contact avec nous de façon permanente. Cela a changé lorsque les Portugais ont commencé à construire leur empire mondial et qu'ils avaient besoin d'alliés près de l'océan Indien.\nNous devrions initier le contact avec les Portugais !"
 eth_find_other_christians_ct:0 "L'événement « §YPêro da Covilhã§! » s'est produit."
 eth_find_other_christians_tt:0 "[Root.GetName] a découvert une province possédée par §Y[POR.GetName]§!."
 eth_market_of_the_west_title:0 "Marché de l'Occident"
 eth_market_of_the_west_desc:1 "Le commerce en mer Rouge était autrefois l'un des nœuds commerciaux les plus importants du monde. Il connectait l'Empire romain aux richesses de l'Inde, ce qui permettait aux Romains de profiter des biens indiens sans avoir les tracas de traiter avec les Perses. Cela a changé cependant lorsque son successeur, l'Empire byzantin, est tombé aux mains des Turcs ottomans. Depuis, la mer Rouge n'est plus aussi profitable qu'elle l'était autrefois, et en raison du colonialisme des Européens, elle ne le sera probablement plus jamais.\nMais nous avons encore des options. Grâce à notre nouvelle connexion avec les Européens, il nous est possible d'être présents dans leurs nœuds commerciaux beaucoup plus actifs. Tout ce que nous avons à faire est d'atteindre leur riche marché d'une manière ou d'une autre."
 eth_ideas_and_institutions_title:0 "Idées de l'Occident"
 eth_ideas_and_institutions_desc:1 "Bien que notre religion et notre culture soient l'aspect le plus important de notre civilisation, la technologie n'a jamais vraiment été une grande préoccupation pour nous.\nJusqu'à ce que nous découvrions de quoi les Européens sont capables. Grâce à nos relations commerciales avec les Européens, les marchands ont pu expérimenter l'ingénierie européenne de première main. Particulièrement leurs réalisations technologiques dans le domaine militaire ont laissé nos marchands très impressionnés, et notre nation inquiète. Nous devons nous assurer qu'aucun de ces Européens ne prenne de l'avance sur nous !"
 has_better_tech_than_westerns_tt:0 "Aucun pays §YOccidental§! n'est en avance dans une technologie par rapport à §Y[Root.GetName]§!."
 has_more_institutions_than_westerns_tt:1 "Aucun pays §YOccidental§! n'a adopté plus d'institutions que §Y[Root.GetName]§!."
 eth_westernize_the_army_title:0 "Moderniser l'Armée"
 eth_westernize_the_army_desc:0 "Notre nation a pu voir l'efficacité et la brutalité des armées européennes dans le passé. Particulièrement pendant les conflits avec le Sultanat d'Adal, [Root.GetName] a été témoin des réalisations technologiques en matière de guerre grâce aux Portugais. Nous devrions moderniser notre armée et adopter la technologie occidentale, sinon notre nation pourrait tomber aux mains d'envahisseurs européens compétents."
 eth_blessed_empire_title:0 "Un Empire Béni"
 eth_blessed_empire_desc:0 "Notre nation a traversé de nombreux défis et les a maîtrisés. Elle a restauré le contact avec les chrétiens d'Europe et modernisé sa technologie et sa société ! Elle a ressuscité les frontières d'un ancien empire et les a même dépassées ! Elle a même reçu la sainte lumière du Seigneur lui-même ! Nous sommes vraiment un Empire Béni au-dessus de tous les autres empires !"
 ###MAL MISSIONS###
 mal_pick_religious_direction_title:0 "Choisir une Direction"
 mal_pick_religious_direction_desc:0 "Notre royaume, toute la famille royale ainsi que l'aristocratie, est composé de musulmans dévoués tandis que les paysans et les bourgeois inférieurs sont des païens tribaux. Dans un tel [Root.GovernmentName], la question de la direction religieuse est plus importante que jamais. Nous devons faire un choix si nous voulons voir la stabilité intérieure prévaloir."
 mal_pick_a_religious_direction_tt:0 "Selon le choix, [Root.GetName] débloquera soit une §YMission Religieuse§! soit une §YMission de Tolérance§!."
 mal_pick_a_religious_direction_ct:1 "L'événement « §YIslamisation de l'Aristocratie§! » s'est déclenché et nous avons choisi l'une des deux options."
 mal_create_navy_title:0 "Créer une Flotte Commerciale"
 mal_create_navy_desc:0 "Depuis les jours de notre âge d'or, les marchands [Root.GetAdjective] se sont appuyés sur les caravanes et les routes terrestres pour atteindre l'Égypte, l'Arabie ou l'Europe. Cependant, le déclin de notre nation après la mort de Mansa Moussa a montré que ces routes commerciales ne sont plus suffisantes.\nNous devons nous adapter et voyager par mer pour atteindre les marchés lucratifs à la place. Mais pour y parvenir, nous avons d'abord besoin d'une flotte commerciale."
 mal_new_world_ambition_title:0 "Mystère de Ko Mamadi"
 mal_new_world_ambition_desc:0 "Le prédécesseur de Mansa Moussa était, selon Moussa lui-même, le curieux Mansa Ko Mamadi, mieux connu en langue arabe sous le nom de Muhammad ibn Qu. Ko Mamadi a disparu du Mali lorsqu'il a navigué vers l'ouest avec une flotte de mille navires et n'est jamais revenu.\nBien que notre bon Moussa fût un homme pieux et généreux, la véracité de l'histoire de Ko Mamadi est… discutable pour notre cour. Pourtant, le mystère de Ko Mamadi en est un qui intrigue nos marins et notre royauté, et il vaut la peine de considérer cartographier la Mer Occidentale."
 mal_discover_the_new_world_title:0 "Rechercher la Flotte Perdue"
 mal_discover_the_new_world_desc:0 "La quête de la flotte perdue continue. Il doit y avoir quelque part une épave, prouvant l'existence de la flotte et la légende de Ko Mamadi…"
 mal_discover_the_new_world_tt:0 "Découvrir au moins une province d'§YAmérique du Sud§!."
 mal_abu_bakr_ambition_title:0 "L'Ambition de Ko Mamadi"
 mal_abu_bakr_ambition_desc:0 "Bien que l'existence de Mansa Ko Mamadi et de sa flotte reste un mystère, la découverte de l'Amérique du Sud est le résultat de la fascination que son histoire a causée pour nous. Comme dernier hommage à sa légende, nous devrions poursuivre son ambition et coloniser ce continent pour la gloire de [Root.GetName]."
 mal_conquer_jol_title:0 "Subjuguer le Jolof"
 mal_conquer_jol_desc:1 "Le Jolof était notre vassal à ses débuts, mais en raison de nos propres luttes internes, ils ont réussi à déclarer leur indépendance. Ils ont eu leurs cent ans de souveraineté, mais maintenant il est temps pour eux de revenir sous notre protection."
 mal_trade_with_maghreb_title:0 "Connexion au Maghreb"
 mal_trade_with_maghreb_desc:0 "Notre [Root.GovernmentName] a été très isolé du reste du monde musulman depuis la mort du grand Mansa Moussa. Nous ne pouvons pas laisser cela continuer et devons rétablir la connexion avec nos frères dans la foi au Maghreb."
 mal_trade_with_maghreb_tt:0 "Permettre l'achat unique d'une province en §YEurope§! par une décision."
 mal_trade_with_europeans_title:0 "Atteindre l'Europe"
 mal_trade_with_europeans_desc:0 "Bien que le commerce de Safi renforce nos revenus, il ne peut pas rivaliser avec le profit potentiel que le marché européen pourrait nous rapporter. Naturellement, il est dans notre meilleur intérêt d'avoir accès à l'un de leurs nœuds commerciaux."
 mal_econimical_hegemony_title:0 "Préparer le Pèlerinage"
 mal_econimical_hegemony_desc:1 "Les pèlerinages à La Mecque sont un devoir sacré pour tout musulman pieux. Cela a une signification supplémentaire pour nous car traditionnellement nos Mansas voyageaient à La Mecque avec des richesses au nom d'Allah. Cette fois, un pèlerinage encore plus grand devrait être entrepris, un qui passe aussi par les merveilles de l'Europe. Mais pour cela, nous avons besoin de l'économie pour financer le voyage du [Root.Monarch.GetTitle] et d'une cour compétente qui prend en charge ses devoirs en attendant."
 mal_riches_of_trade_tt:1 "§Y[Root.GetName]§! a au moins §Y50 %§! de pouvoir commercial et est la plus forte §YPuissance Commerciale§! dans n'importe quel nœud commercial §YEuropéen§!."
 mal_fighting_musa_title:0 "Le Mansa aux Armes"
 mal_fighting_musa_desc:0 "L'époque autrefois glorieuse de Mansa Moussa est terminée, pourtant notre royaume n'a jamais pu s'en remettre.\nCela doit changer ! La légitimité de tous les Mansas après Moussa a été fortement remise en question et aucun d'eux n'a gagné le soutien de notre peuple. [Root.Monarch.GetName] verra ce destin car [Root.Monarch.GetSheHe] mènera nos troupes personnellement à la victoire."
 mal_subjugate_zaf_title:1 "Apaiser les Bambara"
 mal_subjugate_zaf_desc:1 "Les Bambara de Ségou dans la région du Macina ont exprimé un grand malaise sous notre règne. Ils souhaitent se séparer de nous. En conséquence, ils tendent maintenant la main vers notre rival Songhaï pour obtenir du soutien dans leur mouvement indépendantiste.\nNous ne pouvons pas permettre que cela arrive ! Nous devrions apaiser les Bambara aussi vite que possible afin de les garder dans notre royaume."
 mal_reintegrate_son_title:0 "Réintégrer le Songhaï"
 mal_reintegrate_son_desc:0 "Un autre État qui était autrefois un territoire [Root.GetAdjective] est [SON.GetName]. Contrairement à [ZAF.GetName] cependant, [SON.GetName] a l'intention de croître en puissance et de combler le vide de pouvoir ouest-africain causé par notre déclin initial. Si notre royaume doit survivre, nous devons bannir la menace [SON.GetAdjective] et réintégrer le peuple [SON.GetAdjective] dans notre nation."
 mal_restore_the_mali_empire_title:0 "Restaurer l'Empire"
 mal_restore_the_mali_empire_desc:0 "Nous étions autrefois la puissance majeure et le cœur culturel de l'Afrique de l'Ouest. À travers des successions malheureusement mauvaises, notre empire déclinait et aurait pu disparaître entièrement.\nMais nous avons réussi à prévaloir, et même à renverser le cours de notre destin. Maintenant il est temps de nous étendre même au-delà des anciennes frontières de notre empire et de reconquérir notre ancien titre !"
 mal_control_the_niger_river_title:0 "Contrôler le Fleuve"
 mal_control_the_niger_river_desc:0 "Le fleuve Niger est la ligne de vie de l'Afrique de l'Ouest et en tant que tel a une haute importance dans cette région. Il serait préférable que ce fleuve soit sous contrôle total."
 mal_control_the_niger_river_ct:0 "Posséder toutes les provinces légitimées qui font partie du fleuve §YNiger§!."
 mal_control_the_niger_river_tt:0 "Chaque province possédée qui fait partie du fleuve §YNiger§! reçoit « §YFleuve Cultivé§! » pendant §Y25§! ans, donnant les effets suivants :\nCoût de développement : §G-10,0 %§!\nEfficacité de production locale : §G+10,0 %§!\nModificateur d'impôt local : §G+10,0 %§!"
 mal_dominate_ivory_coast_and_timbuktu_title:0 "Protéger le Commerce Ouest-Africain"
 mal_dominate_ivory_coast_and_timbuktu_desc:1 "Tout le commerce ouest-africain doit être fait sous notre supervision. Nous ne pouvons pas permettre aux étrangers et aux rivaux de trouver un moyen d'exploiter le commerce de notre région natale."
 mal_dominate_ivory_coast_and_timbuktu_tt:1 "Aucun pays §YEuropéen§! n'a §Y20 %§! de pouvoir commercial dans les nœuds commerciaux §YCôte d'Ivoire§!, §YTombouctou§! ou §YKatsina§!."
 mal_trade_domination:0 "Commerce Ouest-Africain Protégé"
 mal_retake_the_mosque_title:0 "Conquérir Djenné"
 mal_retake_the_mosque_desc:0 "L'État de Djenné était autrefois l'un de nos partenaires commerciaux et était même un vassal de notre grand empire à un moment donné. Avec notre déclin, Djenné a réussi à gagner son indépendance. Ils commercent maintenant avec nos rivaux et les soutiennent. Nous ne pouvons pas leur permettre de continuer, et devons annexer leur État au nôtre."
 mal_conquer_tmb_title:0 "Reprendre Tombouctou"
 mal_conquer_tmb_desc:0 "La grande cité de Tombouctou était autrefois une partie essentielle de notre empire car c'était le comptoir commercial qui connecte l'Afrique de l'Ouest à l'Europe. En raison de notre déclin, la cité est sortie de notre emprise et a fondé son propre État. Maintenant il est temps de reprendre cette cité inestimable et de la réintégrer dans notre [Root.GovernmentName]."
 mal_absolute_authority_title:0 "Restaurer l'Autorité du Mali"
 mal_absolute_authority_desc:0 "Beaucoup ont spéculé que le puissant Empire du Mali ne reviendrait jamais, que nous disparaîtrions avec le temps.\nMais rien de tout cela n'est vrai ! Nous avons réussi à étendre nos frontières au-delà de toutes les attentes et avons traité les menaces internes. Que tous sachent que l'autorité du Mali est pleinement restaurée !"
 mal_absolute_authority_ct:0 "Le désastre §YDéclin du Mali§! prendra fin."
 mal_west_african_great_power_title:0 "Grande Puissance Ouest-Africaine"
 mal_west_african_great_power_desc:1 "Notre empire était au bord du déclin complet, et pourtant nous avons réussi à survivre et même à grandir ! Mais bien que nous dominions notre région natale, nous sommes loin d'être la seule grande puissance dans ce monde. Les Européens, eux aussi, ont formé des États puissants de leur côté et essaient maintenant d'imposer leur volonté sur les peuples d'Afrique.\nNous devons croître en puissance et faire savoir à chacun de ces petits Européens que leurs ambitions ne peuvent pas être imposées à nous !"
 mal_west_african_great_power_ct:0 "Aucun pays §YEuropéen§! n'a plus de développement total que §Y[Root.GetName]§!."
 mal_brace_for_decline_title:0 "Gagner les Faveurs des États"
 mal_brace_for_decline_desc:1 "Ce n'est un secret pour personne que notre royaume traverse ses heures les plus sombres. Beaucoup de notre population craignent le pire tandis que sujets et rivaux cherchent des opportunités pour exploiter notre état affaibli. En de tels temps, nous avons besoin d'unité et d'intégrité au sein de notre cour plus que jamais. Nous devrions construire des faveurs avec les états pour nous assurer qu'ils ne se retourneront pas contre nous à la seconde où ils en auront l'occasion."
 mal_brace_for_decline_tt:0 "Les États resteront §Yloyaux§! à [Root.GetName] pendant le désastre §YDéclin du Mali§!."
 mal_get_competent_court_title:0 "Une Cour Compétente"
 mal_get_competent_court_desc:1 "Après la mort de Mansa Moussa en 1337, son fils Maghan a pris le trône, le premier de nombreux terribles souverains que nous avons dû endurer après notre âge d'or. En l'an 1341, Maghan fut remplacé par son oncle Souleyman, qui a inversé les nombreuses erreurs financières de son neveu. Mais après sa mort, le Mali n'a eu que des Mansas qui ont régné quelques mois, ou étaient des tyrans absolus.\n\nSi nous voulons enfin nous remettre de notre histoire, nous avons besoin d'un Mansa compétent sur notre trône, ou au moins un Mansa qui connaît des gens compétents pour la cour."
 mal_get_competent_court_tt:0 "Les §YRebelles prétendants§! ne se soulèveront plus lorsqu'un nouveau Mansa sera couronné pendant le désastre §YDéclin du Mali§!."
 mal_handle_the_kaabu_title:0 "Gérer le Peuple Kaabu"
 mal_handle_the_kaabu_desc:0 "[1114.GetName] fait partie de [Root.GetName] depuis le XIIIe siècle. Mais en raison de notre déclin constant depuis presque cent ans, le peuple de [1114.GetName] s'est senti négligé et désire un État propre, complètement indépendant de nous, surtout après qu'ils sont entrés en contact avec les Européens et ne souhaitent plus être notre intermédiaire.\nNous devrions leur montrer notre empathie et notre affection pour ne pas avoir une autre partie de notre pays qui nous échappe."
 mal_handle_the_kaabu_ct:0 "Chaque province qui est aussi légitimée par un autre pays restera §Yloyale§! à [Root.GetName] pendant le désastre §YDéclin du Mali§!."
 mal_gold_and_ivory_title:0 "Or et Ivoire"
 mal_gold_and_ivory_desc:1 "L'or a traditionnellement toujours été le principal bien d'exportation de [Root.GetName], et de nombreux étrangers feraient n'importe quoi pour les pépites d'or que notre grand [Root.Monarch.GetTitle] possède. Pendant ce temps, nous avons aussi accès à une autre ressource qui a vu une augmentation de popularité aussi : l'ivoire.\nNous devrions augmenter la production des deux biens et développer notre économie."
 mal_give_gold_away_title:1 "Montrer la Générosité"
 mal_give_gold_away_desc:0 "[Root.GetMaliReligionGenorisityMissionText]"
 mal_give_gold_away_desc_muslim:1 "Posséder la richesse et les trésors de la terre est formidable, mais cela ne remplit pas la vision du Prophète. Au lieu de rester assis sur nos richesses, nous devrions suivre les pas du grand Mansa Moussa et partager notre or avec nos frères de foi, notamment ceux d'Anatolie, d'Égypte et, bien sûr, de La Mecque."
 mal_give_gold_away_desc_fetishist:1 "Ce monde nous a offert des métaux précieux et d'autres richesses, et nous savons comment en profiter. Cependant, ce n'est pas dans l'esprit de nos chamans et de nos croyances. Au lieu de cela, nous devrions partager nos richesses avec d'autres grandes tribus du monde !"
 mal_jihad_upon_own_population_title:0 "Convertir [Root.GetName]"
 mal_jihad_upon_own_population_desc:1 "Avec l'islamisation de notre aristocratie, nous avons décidé de convaincre notre peuple d'embrasser l'Islam aussi. Nous devrions nous mettre en route, déraciner les pratiques païennes du passé et éliminer le pouvoir que les [Root.GetDhimmiName] ont sur nous."
 mal_more_tolerance_to_heathens_title:0 "Tolérer la Tradition"
 mal_more_tolerance_to_heathens_desc:0 "Nous avons décidé de laisser notre peuple rural continuer à pratiquer sa religion traditionnelle. Cependant, la classe supérieure de notre royaume n'est pas très enthousiaste à ce sujet. Nous devons augmenter notre tolérance publique des anciennes traditions et réduire le pouvoir que le [Root.GetClergyName] a sur notre [Root.GovernmentName]."
 ###SON MISSIONS###
 son_build_military_title:0 "Préparatifs de Guerre"
 son_build_military_desc:1 "Nous étions autrefois sujets du royaume du Mali jusqu'à ce qu'ils perdent leur emprise sur leur territoire. Depuis que nous sommes devenus indépendants, c'est à nous-mêmes de nous défendre contre les menaces étrangères. Nous devrions constituer nos forces et engager un général compétent car le temps des conflits approche."
 son_conquer_tmb_title:0 "Conquérir Tombouctou"
 son_conquer_tmb_desc:0 "Tombouctou est le cœur de la culture et du commerce en Afrique de l'Ouest, et attire marchands, érudits, oulémas et étrangers. Il est dans notre meilleur intérêt d'avoir le contrôle sur cette cité significative."
 son_conquer_zaf_title:0 "Conquérir Koumbi Saleh"
 son_conquer_zaf_desc:1 "Il y a environ 300 ans, le puissant Empire du Ghana régnait sur le territoire qui est maintenant occupé par le Mali. L'Empire du Ghana s'est effondré avec le passage du temps et finalement leur capitale autrefois impressionnante, Koumbi Saleh, n'est plus qu'une ville abandonnée.\nPourtant, la conquête de cette ruine pourrait s'avérer utile pour obtenir une meilleure prise sur le territoire malien. Nous pourrions aussi trouver d'anciens écrits qui pourraient être utiles pour notre État actuel."
 son_prepare_troops_title:0 "Prendre le Titre d'Empire"
 son_prepare_troops_desc:1 "Le temps est venu pour le Mali de nous donner son titre. Leur déclin les a affaiblis et maintenant ils ne sont plus que l'ombre de ce qu'ils étaient. Cependant, pour revendiquer le titre d'Empire de l'Afrique de l'Ouest, nous devons démontrer notre puissance en surpassant le Mali dans tous les aspects imaginables."
 son_invade_mali_title:0 "Éradiquer le Mali"
 son_invade_mali_desc:0 "Le Mali a survécu à son temps. C'est un acte de miséricorde de mettre fin à la misère de ce pathétique royaume et d'intégrer sa population dans notre propre empire légitime !"
 son_west_african_great_power_title:0 "Conquérir l'Afrique de l'Ouest"
 son_west_african_great_power_desc:1 "Avec la chute du Mali, notre plus grand rival a cessé d'exister. Tout le Niger, le Sahel et la Guinée sont à prendre, et le Maghreb peut être contesté sans avoir à s'inquiéter des attaques de notre région natale."
 son_competence_in_court_title:0 "Améliorer la Bureaucratie"
 son_competence_in_court_desc:1 "La bureaucratie n'est pas un sujet très excitant, mais elle est essentielle pour tout pays qui a de grandes ambitions. Notre état actuel de bureaucratie semble désastreux cependant. Nous devons rassembler notre administration avant même de pouvoir penser à l'expansion."
 son_military_expertise_title:0 "Professionnalisme de l'Armée"
 son_military_expertise_desc:1 "De nombreux souverains de la dynastie Sonni ne voyaient en chacun de nos paysans rien de plus qu'un autre soldat potentiel à gaspiller dans une guerre insensée. Bien que cette attitude nous ait aidés dans le passé à obtenir plus de recrues, ce n'était certainement pas rentable. Nous devrions abandonner cette attitude et créer une armée professionnelle, menée par notre [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself]."
 son_win_battles_title:0 "Embrasser la Gloire de la Bataille"
 son_win_battles_desc:0 "Une armée professionnelle n'est qu'une belle figure de proue si nous ne l'utilisons pas. Nous devrions déchaîner leur puissance sur nos ennemis et embrasser la gloire de la bataille !"
 son_win_battles_bt:0 "Le déclencheur de cette mission sera révélé lorsque la mission « §YProfessionnalisme de l'Armée§! » aura été complétée."
 son_win_battles_ct:0 "Gagner au moins §Y30§! batailles (actuellement §Y[Root.son_fight_counter.GetValue]§!/§Y30§!).\nLes batailles gagnées par des armées menées par §Y[Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName]§! comptent double."
 son_modernize_army_title:0 "Réformer l'Armée"
 son_modernize_army_desc:0 "Bien que l'utilisation des armes à feu et des fusils s'infiltre dans notre armée, elle est encore loin d'être commune pour nos troupes. La plupart de nos soldats comptent encore sur des lances et des arcs tandis que les Maghrébins et les Européens maîtrisent les armes à feu. Si nous ne voulons pas être envahis par nos voisins du nord, nous devons réformer l'armée et moderniser leurs armes."
 son_modernize_army_tt:0 "Aucun pays du groupe technologique §YOccidental§! n'a une technologie militaire supérieure à §Y[Root.GetName]§!."
 son_westernize_state_title:0 "Moderniser [Root.GetName]"
 son_westernize_state_desc:1 "Tandis que notre armée profite de réformes et de modernisation, notre [Root.GovernmentName] maintient encore les anciennes lois et règles des temps médiévaux, et notre [Root.Monarch.GetTitle] n'est pas perçu comme le souverain absolu de [Root.GetName]. Nous devrions nous concentrer sur la réorganisation de notre gouvernement et embrasser les nombreuses merveilles de la technologie moderne."
 son_stop_the_air_raids_title:0 "Arrêter les Raids Aériens"
 son_stop_the_air_raids_desc:0 "Depuis notre fondation, le peuple [Root.GetAdjective] a dû repousser les raids de [AIR.GetName]. Être défensif n'est cependant pas la solution ; les Touaregs continueront simplement à piller nos villages.\nNon, pour mettre fin à cette menace, nous devons passer à l'offensive et éliminer la menace [AIR.GetAdjective]."
 son_take_djenne_title:0 "Conquérir [1134.GetName]"
 son_take_djenne_desc:1 "[1134.GetName] a été historiquement un centre commercial très important sur le Niger depuis sa fondation. En plus de cela, elle abrite aussi la Grande Mosquée de Djenné et faisait autrefois partie de notre rival le Mali, mais est maintenant une cible indépendante, et donc facile.\nNous devrions prendre le contrôle de cette cité importante pour la gloire de [Root.GetName]."
 son_expand_djenne_mosque_title:0 "Rénover la Grande Mosquée"
 son_expand_djenne_mosque_desc:0 "Avec notre conquête de la cité, la Grande Mosquée de Djenné a subi des dommages collatéraux. Nous devons rénover la mosquée au nom d'Allah !"
 son_contact_with_morocco_title:0 "Contact avec le Maghreb"
 son_contact_with_morocco_desc:1 "À l'époque de l'Empire du Ghana, les régions du Sahel et du Niger recevaient de nombreux visiteurs d'Arabie et du Maghreb. Cela a continué pendant la durée de vie de l'Empire du Mali, mais de nos jours les voyageurs et les marchands de ces régions viennent rarement chez nous. Nous devrions restaurer le contact avec nos frères dans la foi, au moins avec ceux du Maghreb car ils sont les plus proches de nous."
 son_contact_with_morocco_tt:0 "Découvrir une province au §YMaghreb§!."
 son_invade_maghreb_title:0 "Envahir le Maghreb"
 son_invade_maghreb_desc:0 "Bien que nous espérions une meilleure relation diplomatique avec les peuples du Maghreb, ils ne s'intéressent qu'à notre or et notre sel. Pire encore : les Marocains planifiaient même une invasion de notre territoire pour pouvoir s'emparer de la production de sel et d'or pour eux-mêmes ! Pour notre propre sécurité, nous devrions renverser la situation et passer à l'offensive en premier !"
 son_consolidate_maghreb_title:0 "Consolider le Maghreb"
 son_consolidate_maghreb_desc:1 "Le Maghreb est une grande région et possède de nombreuses ressources précieuses. Nous devrions étendre notre influence dans cette zone et conquérir les provinces restantes pour notre bénéfice."
 son_conquer_the_mossi_title:0 "Éliminer la Menace Mossi"
 son_conquer_the_mossi_desc:1 "Les tribus Mossi au sud ont été une épine dans notre flanc depuis un bon moment. Bien qu'elles se battent régulièrement entre elles, elles et les Touaregs réussissent encore à organiser des raids sur nos villages. Si nous voulons la paix de ces païens, nous devons montrer notre force et éliminer ces tribus."
 son_conquer_the_mossi_tt:0 "Chaque province §YMossi§! est possédée par §Y[Root.GetName]§! ou ses sujets non-tributaires."
 son_convert_the_mossi_title:0 "Convertir les Mossi"
 son_convert_the_mossi_desc:0 "Le [Root.GetClergyName] a étudié l'histoire des Mossi et leurs raids contre notre peuple, et a suggéré une solution : la conversion totale des Mossi à la vraie foi ! Ces païens doivent voir la lumière d'Allah !"
 son_convert_the_mossi_tt:0 "Chaque province §YMossi§! est §Y[Root.Religion.GetName]§!."
 son_convert_the_mossi_ct:0 "Chaque province §YMossi§! perd §G100§! d'autonomie et reçoit le modificateur « §YDévots Fidèles§! » pendant §Y30§! ans, donnant les effets suivants :\nSéparatisme local : §G-10,0§!"
 son_invite_foreign_scholars_title:0 "Inviter des Érudits"
 son_invite_foreign_scholars_desc:0 "Nous sommes loin de nos frères en Arabie et nos érudits aussi. Par conséquent, nos lois ont changé indépendamment des leurs. Nous devrions inviter des érudits de l'est et entendre leurs dernières avancées dans les lois de [Root.Religion.GetName]."
 son_invite_foreign_scholars_ct:0 "Tout pays dont la capitale n'est PAS dans la région §YSahel§!, §YNiger§! ou §YGuinée§! et qui suit la foi §Y[Root.Religion.GetName]§! est allié avec §Y[Root.GetName]§!."
 son_invite_foreign_scholars_bt:0 "[Root.GetName] pourra inviter un §YÉrudit§! sans exigences diplomatiques.\n"
 son_invite_foreign_scholars_at:0 "Le type d'érudit dépend de l'école qui a été invitée au moment de compléter cette mission."
 son_invite_foreign_scholars_tt:0 "A sa capitale PAS dans la région §YSahel§!, §YNiger§! ou §YGuinée§!\n  Est §Y[Root.Religion.GetName]§!\n  A une opinion d'au moins §Y150§! de §Y[Root.GetName]§!"
 son_power_to_the_ulema_title:0 "Plus de Pouvoir au [Root.GetClergyName]"
 son_power_to_the_ulema_desc:1 "Notre [Root.GovernmentName] se dirige vers l'unité religieuse et l'illumination. Mais il y a beaucoup plus de choses à faire. Le [Root.GetClergyName] gère les lois sacrées de notre pays et supervise la conversion des païens, mais ils sont limités par notre gouvernement. Nous devrions leur accorder plus de liberté et de privilèges afin qu'ils fassent avancer notre progrès dans la création de lois."
 son_convert_west_africa_title:0 "Convertir l'Afrique de l'Ouest"
 son_convert_west_africa_desc:0 "L'Afrique de l'Ouest a toujours été unique en ce qui concerne la religion. Lorsque l'Islam a établi son emprise en Afrique de l'Ouest, les élites supérieures se sont converties à la vraie foi, mais ne l'ont pas imposée à leurs sujets. Dans de rares cas, ils ont même accordé des droits aux paysans païens et toléré leur comportement.\nLe temps de la tolérance est cependant terminé, et maintenant ces païens devraient aussi être menés sur le bon chemin."
 son_convert_west_africa_tt:0 "Chaque province dans la région §YSahel§!, §YNiger§! ou §YGuinée§!, qui n'est PAS non colonisée, est §Y[Root.Religion.GetName]§!."
 son_build_workshops_title:0 "Construire des Ateliers"
 son_build_workshops_desc:0 "La demande pour nos produits augmente et plus de marchands veulent commercer du sel et d'autres biens avec nous. Nous devrions construire des ateliers pour augmenter l'efficacité de production."
 son_own_develop_clothes_and_salt_title:0 "Développer le Sel et le Tissu"
 son_own_develop_clothes_and_salt_desc:1 "L'or est vu comme une ressource immensément précieuse dans le monde. Cependant, en Afrique de l'Ouest, il n'est que second à une autre ressource beaucoup plus importante : le sel. Bien que l'or soit utile pour notre trésor, il n'est pas comestible, et en tant que tel le sel est de haute valeur ici.\nEnsuite il y a les tissus, qui sont de grande importance pour protéger le corps de la chaleur du soleil.\n\nNous devrions développer la production des deux biens afin d'approvisionner notre marché et d'étendre notre commerce même au-delà du Sahel et du Niger."
 son_own_develop_clothes_and_salt_ct:0 "[Root.GetName] reçoit « §YProduction Principale de Sel et Tissu§! » pendant §Y25 ans§!, donnant les effets suivants :\nPouvoir commercial global : §G+25,0 %§!\nChaque province possédée qui produit du §YSel§! ou du §YTissu§! :\nBiens produits locaux : §G+0,50§!"
 son_gold_of_west_africa_title:0 "Richesse de l'Afrique de l'Ouest"
 son_gold_of_west_africa_desc:0 "Notre région natale est connue pour ses riches sources d'or. Nous devrions développer l'extraction de l'or et établir des marchés afin de distribuer l'or aux nombreux coins du monde."
 son_dominate_west_african_trade_title:0 "Protéger le Commerce Ouest-Africain"
 son_dominate_west_african_trade_desc:1 "Tout le commerce ouest-africain doit être fait sous notre supervision. Nous ne pouvons pas permettre aux étrangers et aux rivaux de trouver un moyen d'exploiter le commerce de notre région natale."
 son_guarantee_the_fetishist_title:0 "Garantir les Anciennes Traditions"
 son_guarantee_the_fetishist_desc:0 "[Root.GetName], comme tout autre pays en Afrique, suivait les anciennes traditions et foi des ancêtres. Tandis que notre classe supérieure a embrassé la lumière d'Allah, notre population rurale suit encore les traditions païennes. Nous devrions rendre hommage à nos racines et garantir la liberté de religion pour notre peuple."
 son_guarantee_the_fetishist_ct:0 "[Root.GetName] a au moins §Y1§! de tolérance des païens."
 son_fetishist_alliances_title:0 "Alliances Païennes"
 son_fetishist_alliances_desc:0 "Pour mieux comprendre notre passé et notre tradition, il est important d'apprendre comment les païens agissent. Nous devrions rassembler des alliés ou sujets païens et étudier leur comportement."
 son_fetishist_alliances_ct:0 "A sa capitale en §YAfrique§!"
 son_eliminate_other_muslims_title:0 "Protéger notre Héritage"
 son_eliminate_other_muslims_desc:0 "La foi fétichiste peut être païenne pour nous et pour l'Islam, mais c'est une partie importante de notre identité, de notre peuple, et en tant que tel nous devons protéger cet héritage des zélotes religieux qui veulent le détruire."
 son_eliminate_other_muslims_tt:0 "Aucune province §YFétichiste§! au §YSahel§!, §YNiger§! ou §YGuinée§! n'est possédée par un pays non-fétichiste autre que §Y[Root.GetName]§! et ses sujets."
 son_back_to_the_roots_title:0 "Unir les Tribus"
 son_back_to_the_roots_desc:0 "De nombreux pays qui suivent les anciennes voies sont fragmentés en tribus, menant des guerres les unes contre les autres et contre nous, et perdent leur importance dans le processus. Bien que le sort de ces tribus soit peu notre préoccupation, les traditions et l'histoire qu'elles portent avec elles valent la peine d'être protégées et préservées. Nous devrions rendre un service à leurs populations rurales et les libérer de ces tribus."
 son_back_to_the_roots_ct:0 "[Root.GetName] a au moins §Y3§! de tolérance des païens."
 son_european_gold_market_title:0 "Le Marché de l'Europe"
 son_european_gold_market_desc:1 "Les marchés européens sont pleins d'opportunités, et bien que développer nos propres nœuds commerciaux et notre production d'or nous aide financièrement, il y a encore plus de moyens de gagner plus de ducats."
 son_first_branch_mission_title:0 "[Root.GetSelectableMissionTitle]"
 son_first_branch_mission_desc:0 "[Root.GetSelectableMissionDescription]"
 son_second_branch_mission_title:0 "[Root.GetSelectableMissionTitle]"
 son_second_branch_mission_desc:0 "[Root.GetSelectableMissionDescription]"
 son_third_branch_mission_title:0 "[Root.GetSelectableMissionTitle]"
 son_third_branch_mission_desc:0 "[Root.GetSelectableMissionDescription]"
 son_fourth_branch_mission_title:0 "[Root.GetSelectableMissionTitle]"
 son_fourth_branch_mission_desc:0 "[Root.GetSelectableMissionDescription]"
 SELECTABLE_MISSION_TITLE:0 "Mission à Embranchement"
 SELECTABLE_MISSION_DESCRIPTION:0 "Cette mission est une §YMission à Embranchement§!. Par des événements ou par d'autres missions, cette mission sera remplacée par une nouvelle version finale."
 selectable_mission_trigger_tt:0 "Cette mission ne peut pas être complétée car c'est une §YMission à Embranchement§!."
 son_religious_triggers_tt:0 "\nSi §Y[Root.GetName]§! choisit la voie §YReligieuse§!, les déclencheurs suivants seront nécessaires pour compléter cette mission :"
 son_tolerance_triggers_tt:0 "\nSi §Y[Root.GetName]§! choisit la voie de §YTolérance§!, les déclencheurs suivants seront nécessaires pour compléter cette mission :"
 son_religious_effects_tt:0 "\nSi §Y[Root.GetName]§! choisit la voie §YReligieuse§!, les effets suivants se produiront :"
 son_tolerance_effects_tt:0 "\nSi §Y[Root.GetName]§! choisit la voie de §YTolérance§!, les effets suivants se produiront :"
 ###KON MISSIONS###
 kon_develop_country_title:0 "Développer [Root.GetName]"
 kon_develop_country_desc:0 "Notre [Root.GovernmentName] est sur le point d'atteindre la grandeur. Cependant, pour y parvenir, nous avons besoin de plus de gens et de l'infrastructure pour les soutenir. Nous devrions développer [1170.GetCapitalName] et les environs."
 kon_colonize_coast_title:0 "Sources de Nzimbu"
 kon_colonize_coast_desc:0 "Traditionnellement, les coquilles de palourdes, les nzimbu, servaient à [Root.GetName] de monnaie. Elles sont relativement faciles à briser, et parce que l'accès à l'or est rare dans notre région natale, nous avons besoin de ces coquilles pour continuer à frapper la monnaie.\nHeureusement, il y a une bonne source pour plus de ces coquilles précieuses : les îles à côté de la côte de [1167.GetName] abritent les palourdes. Nous devrions étendre notre territoire et intégrer cette côte pour augmenter notre accès aux nzimbu."
 kon_protect_trade_title:0 "Contrôleur du Commerce"
 kon_protect_trade_desc:0 "L'économie de [Root.GetName] est basée sur les nzimbu comme monnaie et le commerce intérieur. Mais seul le commerce intérieur n'est pas assez efficace, et en tant que tel nous devrions étendre le commerce aux tribus intérieures du Kongo, au grand lac et à la Côte d'Ivoire."
 kon_seize_crown_land_title:0 "Saisir le Pouvoir des Mani"
 kon_seize_crown_land_desc:0 "[Root.GetName] est une confédération de provinces, gérées par les Mani de notre pays. Ils collectent les impôts des zones rurales et chaque année présentent leurs gains au [Root.Monarch.GetTitle]. Si notre [Root.Monarch.GetTitle] est satisfait d'eux, alors les Mani sont en mesure de conserver leur pouvoir pour une autre année.\nBien que ce système ait très bien fonctionné dans le passé, c'est une forme de gouvernement très obsolète, et si notre [Root.GovernmentName] doit survivre, nous devons saisir le pouvoir des Mani et centraliser l'État."
 kon_seize_crown_land_tt:1 "§GRéduire§! l'autonomie locale de toutes les provinces possédées dans la région §YKongo§! et §YAfrique Centrale§! à leur minimum."
 kon_absolute_rule_title:0 "Règne Absolu"
 kon_absolute_rule_desc:1 "Le monde change, et notre place aussi. Les Européens ont apporté de nouvelles idées. Toutes ne sont pas pratiques pour nous, mais le concept d'absolutisme vaut la peine d'être poursuivi. Il est en conflit direct avec les anciennes façons traditionnelles de gouvernement d'État, mais notre peuple a vu les avancées que les Européens ont réalisées sous cette ligne directrice.\nNous devrions embrasser ce concept et mettre en œuvre le règne absolu dans notre royaume aussi."
 absolutism_dynamic_reward_tt:0 "L'§YAbsolutisme§! n'est PAS actif.\nLes conditions pour cette mission changeront drastiquement quand l'Absolutisme deviendra actif à l'§YÈre de l'Absolutisme§! ou à l'§YÈre de la Révolution§!."
 kon_annex_vassals_title:0 "Le Destin de Loango et Ndongo"
 kon_annex_vassals_desc:1 "L'histoire des royaumes de Ndongo et Loango est obscure et, tout comme notre propre histoire, basée sur des légendes. Malgré cela, ces deux États sont des États vassaux de [Root.GetName], au moins en nom. Les deux royaumes ne sont plus aptes à être gouvernés par leurs propres souverains et devraient être intégrés dans notre propre [Root.GovernmentName] à la place."
 kon_conquer_ksj_title:0 "La Menace Guerrière"
 kon_conquer_ksj_desc:1 "Notre région natale n'est pas seulement un lieu pour les [Root.GetAdjective], mais aussi pour d'autres tribus. Bien que nous partagions certaines similitudes et vivions très proches, nos cultures diffèrent encore assez substantiellement. Deux de ces cultures sont même vues comme une menace pour nos frontières, qui sont les Yaka pillards et les Mbangala militarisés. Nous devrions les subjuguer rapidement avant qu'ils n'aient la chance de devenir un problème sérieux."
 kon_conquer_ksj_tt:0 "Chaque province §YYaka§! est possédée par §Y[Root.GetName]§! ou ses sujets non-tributaires."
 kon_conquer_ksj_ct:0 "Chaque province §YMbangala§! est possédée par §Y[Root.GetName]§! ou ses sujets non-tributaires."
 kon_conquer_ckw_title:0 "Les Chokwe et les Lunda"
 kon_conquer_ckw_desc:0 "Plus profondément dans la région du Kongo se trouvent les Chokwe et les Lunda, deux tribus avec leur propre culture et traditions uniques.\nLes Chokwe sont des artisans et artistes exceptionnellement bons et leur travail artistique est un trésor régional.\nLes Lunda sont connus de notre peuple pour leur art de gouverner efficace et leur connexion profonde à la religion.\nNotre [Root.GovernmentName] pourrait bénéficier de l'intégration des deux cultures dans la nôtre."
 kon_conquer_ckw_at:1 "Chaque province §YChokwe§! est possédée par §Y[Root.GetName]§! ou ses sujets non-tributaires."
 kon_conquer_ckw_bt:1 "Chaque province §YLunda§! est possédée par §Y[Root.GetName]§! ou ses sujets non-tributaires."
 kon_conquer_ckw_ct:0 "Chaque province produisant de l'§YIvoire§! possédée par §Y[Root.GetName]§! ou ses sujets reçoit « §YArtisanat Chokwe§! » pendant §Y30 ans§!, donnant les effets suivants :\nBiens produits locaux : §G+1,0§!\nCroissance de prospérité locale : §G+0,25§!"
 kon_conquer_kub_title:0 "Conquête du Kuba"
 kon_conquer_kub_desc:1 "Selon les légendes fondatrices du Kuba, ce royaume de la jungle est ancien, vieux d'au moins 900 ans même. Leurs légendes sont cependant de peu d'importance pour nous. Ce qui est plus important, c'est l'art dont les Kubans sont capables de créer. Leurs masques, leurs épées larges, l'Épée Ilwoon, sont tous deux des témoignages de leur habileté en art et en guerre.\nNous devrions intégrer les Kubans dans notre royaume et utiliser leurs deux objets iconiques."
 kon_conquer_kub_tt:0 "Chaque province §YKuba§! est possédée par §Y[Root.GetName]§! ou ses sujets non-tributaires."
 kon_conquer_lub_title:0 "Le Fer Luba"
 kon_conquer_lub_desc:1 "Afin de maintenir le pouvoir, notre [Root.GovernmentName] a besoin de ressources stratégiques comme le cuivre et le fer. Tandis que le cuivre n'est pas un gros problème, le fer de Mpemba n'est pas suffisant pour soutenir notre économie et notre armée. Heureusement, les Luba à l'est ont de riches sources de fer. Il nous serait utile de… libérer leur fer."
 kon_conquer_lub_tt:0 "§Y[Root.GetName]§! gagne pour chaque sujet §G4§! ans de $COST|Y$¤ de la production de §YFer§! ou de §YCuivre§! du sujet."
 kon_consolidate_central_africa_title:0 "Unir les Tribus du Congo"
 kon_consolidate_central_africa_desc:0 "Les nombreuses tribus du Congo avaient du mauvais sang entre elles depuis que les histoires sont racontées.\nCela doit finir maintenant ! Face aux menaces extérieures et aux colonisateurs qui essaient de pénétrer dans notre région, nous devons unir les tribus quereleuses !"
 kon_consolidate_central_africa_tt:1 "Chaque province du groupe culturel §YCongo§! (sauf les cultures Sawabantu et Jukun) est possédée par ou sujette de §Y[Root.GetName]§!."
 kon_greatest_power_kongo_title:1 "Hégémon de l'Afrique"
 kon_greatest_power_kongo_desc:2 "Avec la consolidation de la région du Kongo, l'accès aux Grands Lacs, à l'Afrique de l'Est et à l'Afrique Australe est libre. Il est temps qu'un empire s'élève en Afrique Australe, qui maintienne ces régions ensemble et les protège des regards indiscrets des Européens, et nous serons cet empire !"
 kon_greatest_power_kongo_tt:1 "Les provinces des groupes culturels §YAfrique Australe§!, §YBantu de l'Est§! et §YGrands Lacs§! ne subiront pas les pénalités de culture non acceptée.\n\n§YHégémon de l'Afrique Australe§! est §Rretiré§! si [Root.GetName] change son groupe culturel."
 kon_reform_army_title:0 "Fonder une Armée"
 kon_reform_army_desc:0 "[Root.GetName] n'a traditionnellement jamais eu aucune sorte d'armée. Au mieux, il y avait la Garde Royale, qui assurait la sécurité de notre [Root.Monarch.GetTitle], mais sinon nous avons toujours dû compter sur une armée paysanne non professionnelle.\nBien que cela ait fonctionné dans le passé, ce n'est pas une stratégie solide pour l'avenir. Nous devons établir une armée permanente."
 kon_obliterate_great_power_army_title:0 "Preuve de Force"
 kon_obliterate_great_power_army_desc:0 "De grandes puissances se sont élevées dans ce monde et décident maintenant du destin de l'Afrique, de notre destin ! Bien que nous ne soyons pas un royaume guerrier, nous serons forcés de montrer notre force par la force en vainquant une autre grande puissance dans une guerre. Sinon, nous ne serons jamais maîtres de notre propre destin."
 kon_obliterate_great_power_army_at:0 "Une §YGrande Puissance§! a moins de §Y50§! de score de guerre contre §Y[Root.GetName]§!."
 kon_obliterate_great_power_army_bt:0 "Un pays avec au moins autant ou plus de développement total (sujets inclus) que [Root.GetName] a moins de §Y50§! de score de guerre contre §Y[Root.GetName]§!."
 kon_obliterate_great_power_army_tt:0 "§Y[Root.GetName]§! est la seule grande puissance restante."
 kon_anzikus_copper_title:0 "Le Cuivre du Makoko"
 kon_anzikus_copper_desc:1 "Le roi de Tyo, le soi-disant « Makoko », règne sur Anziku et ses riches sources de cuivre. Historiquement, nous n'avons eu aucun différend avec les gens de Tyo, mais leur cuivre est d'excellente qualité et il est nécessaire dans notre propre royaume pour un usage civil et militaire. Il serait bénéfique si Tyo devenait une partie intégrante de [Root.GetName]."
 kon_collect_cults_title:0 "Rencontrer les autres Cultes"
 kon_collect_cults_desc:0 "Aucune religion n'est aussi diverse et complexe que les religions et cultes d'Afrique. Toutes les tribus, tous les royaumes ont des vues différentes de la cosmologie de notre monde, pourtant ces croyances sont rarement un motif de combat. Au lieu de cela, nous cherchons les autres tribus pour en apprendre plus sur leurs croyances et même étendre les nôtres en nous basant sur elles."
 kon_fetishist_alliances_title:0 "Alliances Chamaniques"
 kon_fetishist_alliances_desc:1 "Notre religion est basée sur l'échange culturel et la diplomatie tribale. Nous devrions rassembler des alliés et des sujets pour améliorer notre capacité à maintenir les relations entre les différents cultes."
 kon_fetishist_alliances_tt:0 "Est §YFétichiste§! et est soit un §Ysujet§! soit un §Yallié§! de §Y[Root.GetName]§! ou a une opinion de §Y150§! de §Y[Root.GetName]§!."
 kon_repel_the_missionaries_title:0 "Repousser les Chrétiens"
 kon_repel_the_missionaries_desc:0 "Des hommes avec une peau très pâle sont apparus sur nos côtes et ont commencé à répandre des idées sur un homme pendu sur une croix. Au début, ils semblaient être des conteurs amicaux, mais ensuite ils ont apporté la mentalité de brûler nos anciennes traditions, et les gens qui les suivent ont écouté ! Nous ne pouvons pas permettre à ces missionnaires de continuer comme ça !"
 kon_repel_the_missionaries_tt:1 "§Y[Root.GetName]§! ne sera plus la cible de missionnaires étrangers."
 kon_convert_west_africa_title:0 "Libérer les Cultes"
 kon_convert_west_africa_desc:1 "L'Afrique a vu les invasions par les musulmans et les chrétiens, tous deux essayant d'éradiquer nos traditions et notre héritage et de les remplacer complètement par leurs propres idées. Cela doit cesser ! Nous chasserons ces zélotes vers leurs foyers et récupérerons le continent pour nos frères !"
 kon_convert_west_africa_bt:1 "Chaque province colonisée dans la région §YNiger§! et §YGuinée§! est §YFétichiste§!."
 kon_convert_west_africa_ct:0 "[Root.GetName] a décidé de §YS'opposer§! aux Européens."
 kon_convert_the_country_title:0 "Embrasser le Christianisme"
 kon_convert_the_country_desc:0 "Nous avons décidé de nous ranger du côté des Européens, mais ils ne nous verront jamais comme égaux jusqu'à ce que nous ayons embrassé la lumière du Seigneur. Nous devons devenir officiellement catholiques et convertir roi et peuple."
 kon_churches_for_the_pope_title:0 "Des Églises pour notre Peuple"
 kon_churches_for_the_pope_desc:1 "À l'époque de notre adoration primitive des esprits de la nature et des fantômes des ancêtres, nous n'avions aucune sorte de lieu de culte. Au mieux, nous avions des sanctuaires qui étaient entretenus par un chaman.\nCes temps sont heureusement révolus, et maintenant notre tâche la plus importante est de construire des églises pour que chacun de notre peuple puisse entrer en contact avec le Seigneur."
 kon_gain_cardinal_title:0 "Cardinal pour [Root.GetName]"
 kon_gain_cardinal_desc:1 "Tandis que notre peuple se familiarise de plus en plus avec les écrits de la Bible et les enseignements du Christ, l'influence catholique en Afrique centrale grandit. Si nous voulons que cela continue, nous aurons besoin d'un cardinal officiellement nommé. Il serait bénéfique d'entrer en contact avec le Pape ou au moins avec l'un des pays catholiques ayant un cardinal."
 kon_gain_cardinal_at:0 "Soit l'§YÉtat Pontifical§! soit tout pays avec un §Ycardinal§! est soit §Yallié§! à [Root.GetName] soit a au moins §Y100§! d'opinion de [Root.GetName]."
 kon_gain_cardinal_bt:0 "L'§YÉtat Pontifical§! n'existe PAS et aucun pays n'a de cardinal."
 kon_spread_catholicism_title:0 "Répandre la Parole"
 kon_spread_catholicism_desc:0 "Les Européens ont apporté des maladies et un commerce injuste, mais ils ont aussi apporté la technologie et le progrès. Mais le bien le plus important qu'ils ont apporté était la lumière du Seigneur. Il est dans le meilleur intérêt des peuples d'Afrique de recevoir ce don aussi et de devenir partie de l'Église catholique."
 kon_build_navy_title:0 "Marine [Root.GetAdjective]"
 kon_build_navy_desc:1 "Le monde change. Des hommes à la peau pâle et à l'armure jamais vue visitent nos côtes et apportent de nouvelles idées à notre peuple, tandis que d'autres étrangers commercent leurs biens avec nous. Cependant, il est douteux que leur intention soit en notre faveur, et en tant que tel nous devons nous préparer à défendre notre foyer de ces envahisseurs de la mer en créant des navires de guerre pour nous-mêmes."
 kon_find_europe_title:0 "Trouver les Européens"
 kon_find_europe_desc:1 "Ces hommes de loin, ces Européens, nous ont raconté toutes sortes d'histoires de leur patrie et les raisons pour lesquelles ils ont besoin d'esclaves pour leur travail. Nous devrions voir par nous-mêmes à quel point leurs histoires sont vraies, et voir cette Europe de nos propres yeux."
 kon_find_europe_tt:0 "[Root.GetName] a découvert une province en §YEurope§!."
 kon_find_europe_ct:0 "[Root.GetName] a eu contact avec les §YEuropéens§!."
 kon_face_off_against_europeans_title:0 "Vaincre les Esclavagistes"
 kon_face_off_against_europeans_desc:1 "Les esclavagistes d'Europe sont devenus de plus en plus outrageants dans leur quête d'esclaves. Ils ne font plus aucune différence entre classe inférieure et Mani et prennent qui ils veulent pour leurs plantations dans leurs colonies. Les expulser officiellement a eu peu ou pas d'effet et même des raids de nos villages ont été rapportés, où ils ont kidnappé notre peuple.\nNous ne pouvons pas laisser cela aller plus loin ! Nous devons prendre position contre ces Européens et les vaincre au combat si nous voulons que cette audace cesse !"
 kon_face_off_against_europeans_bt:0 "Les conditions seront révélées quand la mission « §YTrouver les Européens§! » aura été complétée d'abord."
 kon_face_off_against_europeans_ct:1 "§Y[Root.GetName]§! gagne une revendication permanente sur chaque province dans les sous-continents §YAfrique du Nord§! et §YAfrique Australe§! qui sont détenues par un pays §YEuropéen§!."
 kon_banish_the_westerners_from_africa_title:0 "Bannir les Européens"
 kon_banish_the_westerners_from_africa_desc:2 "Nous ne serons jamais en sécurité tant que les Européens auront une quelconque forme d'influence dans une partie de l'Afrique Australe. Nous devons bannir cette menace de notre région natale et les chasser vers le nord froid !"
 kon_banish_the_westerners_from_africa_tt:0 "Chaque province du sous-continent §YAfrique Australe§! et chaque province de la région §YNiger§! et §YGuinée§! n'est PAS possédée par un pays dont la capitale est en §YEurope§!, ou est possédée par un sujet européen de §Y[Root.GetName]§!."
 kon_protector_of_africa_title:0 "Protecteur de l'Afrique"
 kon_protector_of_africa_desc:0 "Nous sommes devenus beaucoup plus qu'un [Root.GovernmentName] en Afrique centrale. Nous nous sommes élevés pour devenir le défenseur de l'Afrique qui protège les peuples des Européens opportunistes !"
 kon_become_proper_monarchy_title:0 "Un Royaume Approprié"
 kon_become_proper_monarchy_desc:1 "Notre [Root.Monarch.GetTitle] est dans notre société déjà un monarque approprié. Aux yeux de ces hommes pâles, nous sommes cependant des « barbares », des gens de tribu. Bien sûr, ces gens n'ont aucune idée de notre culture, mais tant qu'ils ne nous voient pas à la même hauteur, nous ne pourrons pas apprendre de leur technologie et des idées qu'ils apportent."
 kon_accelerate_slave_trade_title:0 "Le Commerce des Esclaves"
 kon_accelerate_slave_trade_desc:1 "Notre royaume échange de nombreux biens avec les Européens, de l'ivoire au cuivre. Un bien commercial en particulier a gagné la plus grande popularité parmi les Européens : les esclaves. Ces gens qui sont vendus aux Européens sont la classe inférieure de notre [Root.GovernmentName] qui soit ont réussi à s'endetter de façon inimaginable, soit ont commis des crimes.\nLa demande des Européens pour les esclaves a augmenté rapidement et organiser le marché des esclaves est devenu délicat. Nous devrions développer les centres d'esclaves et améliorer l'infrastructure locale pour une meilleure gestion."
 kon_study_european_technology_title:0 "Moderniser [Root.GetName]"
 kon_study_european_technology_desc:0 "Les avancées des Européens étonnent notre peuple et les Mani. Nous nous sommes rangés de leur côté et avons commencé ce commerce d'esclaves afin d'apprendre de leur technologie et de faire avancer notre propre civilisation. Il est temps de moderniser notre [Root.GovernmentName] !"
 kon_abolish_slavery_title:0 "Bannir les Esclavagistes"
 kon_abolish_slavery_desc:1 "Le commerce des esclaves a servi son but. Il nous a ouvert l'opportunité de moderniser notre État. Maintenant ses effets négatifs l'emportent sur les positifs car les Européens sont devenus de plus en plus outrageants dans leur demande d'esclaves, organisant même des raids d'esclaves et capturant notre peuple peu importe le statut social. Nous devons abolir l'esclavage et expulser les Européens d'Afrique si nous voulons que leur audace cesse !"
 kon_abolish_slavery_tt:0 "Aucun pays §YEuropéen§! ne détient de province §YAfricaine§! qui produit des §YEsclaves§!."
 kon_abolish_slavery_bt:0 "Les conditions seront révélées quand la mission « §YModerniser [Root.GetName]§! » aura été complétée d'abord."
 kon_amongst_the_great_powers_title:0 "Parmi les Grandes Puissances"
 kon_amongst_the_great_powers_desc:0 "Nous ne sommes plus une tribu mais l'un des grands empires du monde ! Nous nous sommes modernisés en un grand État, avons expulsé les puissants colonisateurs et renversé l'esclavage barbare !"
 ###ZIM MISSIONS###
 zim_decline_of_zimbabwe_title:0 "Destin du Zimbabwe"
 zim_decline_of_zimbabwe_desc:0 "Le Zimbabwe est la capitale de l'ancien Empire du Grand Zimbabwe et sert maintenant de centre de notre pouvoir gouvernemental. Cependant, le destin de cette cité est en balance lorsque la pénurie de ressources a chassé les gens de la cité et les a fait déménager dans les autres provinces de notre royaume.\nEn de tels temps, il est de la plus haute importance que nous gardions notre [Root.GovernmentName] aussi stable que possible."
 zim_decline_of_zimbabwe_tt:0 "L'événement « §YRégression du Zimbabwe§! » s'est déclenché."
 zim_restore_the_city_title:0 "Restaurer le Zimbabwe"
 zim_restore_the_city_desc:1 "La grande cité du Zimbabwe a été construite il y a 200 ans, et en tant que telle joue un rôle majeur dans notre histoire. Elle abrite les nombreuses grandes maisons de pierre de notre peuple, contient beaucoup d'histoires de notre passé et a même été décrite comme la cité d'or dans les livres sacrés des étrangers qui nous ont visités.\nMaintenant la grande cité d'autrefois n'est plus que des ruines abandonnées, une ville où même les esprits de nos ancêtres ne voudraient pas rester. Nous ne pouvons pas permettre à cette cité importante de tomber en ruine !"
 zim_restore_old_empire_title:0 "Éclipser le Grand Zimbabwe"
 zim_restore_old_empire_desc:2 "Avant l'époque du Mutapa, l'Empire du Grand Zimbabwe dominait l'Afrique Australe en ce qui concerne la culture, l'économie et l'armée. L'empire s'est effondré cependant avec le temps et notre État s'est élevé pour prendre leur place. Avec la restauration de l'ancienne cité, c'est notre devoir d'atteindre la même hauteur que cet ancien empire, et même de l'éclipser."
 zim_european_contact_title:0 "Contact avec les Européens"
 zim_european_contact_desc:1 "Notre royaume a toujours été le point d'attraction pour de nombreux étrangers de terres lointaines. Les Européens, bien qu'encore plus étrangers pour nous que les musulmans, ne font pas exception et ont finalement atteint notre terre aussi. Mais le contact avec eux était superficiel au mieux. Nous devons établir une meilleure façon de rester en contact avec les Européens afin de commercer et d'apprendre d'eux."
 zim_european_contact_tt:1 "Tout pays §YChrétien Européen§! a soit §Y75§! d'opinion de [Root.GetName], est §Ysujet§! ou §Ysuzerain§! de [Root.GetName], garantit §Y[Root.GetName]§! ou est un §Yallié§! de [Root.GetName]."
 zim_develop_gold_title:0 "Légende d'Ophir"
 zim_develop_gold_desc:1 "Les musulmans du nord et les voyageurs de l'ouest prétendent que nous sommes la terre promise d'Ophir, un lieu de leurs écrits sacrés où les cités sont faites d'or. Nous devrions être à la hauteur de cette légende et augmenter notre extraction d'or. Sinon pour augmenter notre prestige, au moins pour notre économie."
 zim_conquer_coast_title:0 "Conquérir Sofala"
 zim_conquer_coast_desc:0 "La cité portuaire de Sofala est un lieu commercial majeur et a distribué nos biens en Asie pendant des siècles. Elle n'a cependant jamais été en notre propre possession, et si nous voulons reconstruire notre connexion avec l'Asie, nous devons conquérir cette cité importante."
 zim_build_navy_title:0 "Construire une Flotte Commerciale"
 zim_build_navy_desc:1 "L'Empire du Zimbabwe avait autrefois une relation commerciale florissante avec les Asiatiques de l'extrême orient. Mais c'était une relation commerciale très unidimensionnelle car les marchands devaient venir chez nous.\nCe n'est plus une stratégie commerciale valide cependant. Sofala nous a montré que le commerce ne peut prospérer que pour ceux qui règnent sur les vagues. En tant que tel, nous devons nous adapter à ces nouvelles circonstances et construire une flotte commerciale à nous."
 zim_build_navy_tt:0 "§Y[Root.GetName]§! gagne une revendication permanente sur chaque province côtière de la région §YCorne de l'Afrique§!."
 zim_dominate_upstream_trade_title:0 "La Richesse d'Aden"
 zim_dominate_upstream_trade_desc:1 "Bien que nous ayons eu une histoire de commerce avec les Asiatiques de l'Extrême-Orient, il est très improbable que nous puissions jamais restaurer cette ancienne relation commerciale. Pourtant, nous n'avons aucune raison d'être inquiets. La richesse du commerce d'Asie de l'Est coule à travers l'Inde et atteint finalement le golfe d'Ormuz et le golfe d'Aden. Tandis qu'Ormuz pourrait être trop loin, le golfe d'Aden pourrait être à notre portée. Tout ce que nous avons à faire est de… libérer la côte de la Corne de l'Afrique."
 zim_dominate_upstream_trade_at:0 "Est une province §Ycôtière§! dans la région de la §YCorne de l'Afrique§!."
 zim_dominate_upstream_trade_ct:0 "Gagner §G2 ans§! de revenus commerciaux."
 zim_dominate_upstream_trade_tt:0 "Influence Commerciale du Mutapa"
 zim_zanzibar_greatest_market_title:0 "Monopoliser l'Afrique de l'Est"
 zim_zanzibar_greatest_market_desc:0 "Le commerce prospère et notre trésor se remplit, mais ce n'est pas suffisant. Les richesses du passé rivalisent encore avec notre richesse actuelle. Cela doit changer ! Nous devrions contrôler le flux de ducats sur la côte de l'Afrique de l'Est, monopoliser les centres commerciaux importants et diriger autant de biens exotiques d'Inde et d'Asie vers notre marché que possible."
 ZIM_TRADE_DOMINANCE:0 "Domination Commerciale du Mutapa"
 zim_zanzibar_greatest_market_tt:2 "Grâce au succès du contrôle du flux de richesse, [Root.GetName] a restauré sa présence sur les marchés d'Extrême-Orient.\n[Root.GetName] gagne §YDomination Commerciale du Mutapa§! (Pouvoir Commercial : §G15,0§!) dans §YGolfe d'Aden§!, §YZanzibar§!, §YCap de Bonne-Espérance§!, §YGujarat§!, §YCoromandel§!, §YMalacca§!, §YCanton§!, §YHangzhou§! et §YPékin§! jusqu'à la fin de la partie."
 zim_zanzibar_greatest_market_at:0 "Soit le §YCap de Bonne-Espérance§!, §YZanzibar§! ou le §YGolfe d'Aden§! est le nœud commercial le plus valorisé au monde et §Y[Root.GetName]§! est la plus forte puissance commerciale dans ledit nœud commercial."
 zim_zanzibar_greatest_market_bt:1 "§Y[Root.GetName]§! est soit la plus forte puissance commerciale, soit a au moins §Y10 %§! de pouvoir commercial dans soit §YGujarat§!, §YCoromandel§! ou §YMalacca§!."
 zim_cults_title:0 "La Croyance Mwari"
 zim_cults_desc:1 "Bien que le Mwenemutapa soit le souverain divin de notre religion et de notre État, [Root.Monarch.GetSheHe] est encore un obéissant au tout-puissant Mwari. Un être qui règne sur les esprits de nos ancêtres, et une divinité de création, de fortune et de bien d'autres aspects. Il est nécessaire que nous honorions son nom avec des temples."
 zim_council_title:0 "Équilibrer le Conseil"
 zim_council_desc:1 "Notre royaume a un conseil opérationnel, qui conseille le [Root.Monarch.GetTitle] dans ses décisions. Ces soi-disant ministres ont un pouvoir majeur dans les zones locales de notre [Root.GovernmentName] comme prendre des décisions judiciaires. Ils sont aussi des membres importants d'anciennes tribus, qui ont décidé de nous rejoindre au lieu de combattre. Nous devrions assurer leur bonheur au sein de la cour royale."
 zim_reform_army_title:0 "Réformer l'Armée"
 zim_reform_army_desc:2 "Selon les légendes orales de notre peuple, notre royaume a été fondé par le premier Mwene, le prince guerrier Nyatsimba Mutota. Il a établi les premiers pas pour une puissante armée.\nNous ne pouvons cependant pas nous reposer sur le succès d'un Mwene du passé. Au lieu de cela, nous devrions améliorer les troupes encore plus pour assurer la sécurité du [Root.GovernmentName]."
 zim_conquer_north_title:0 "Fer et Tissu"
 zim_conquer_north_desc:1 "Bien que l'or soit un métal très précieux et que l'ivoire soit très recherché, ils ne sont tous deux pas de bons matériaux pour forger des armes ou tailler des tenues de soldats distinctives. Les provinces de Kalonga et Lundu ont les matériaux que nous cherchons. Nous devrions les prendre pour nous-mêmes et utiliser leurs ressources pour nos objectifs."
 zim_discover_the_cape_title:0 "Découvrir le Sud"
 zim_discover_the_cape_desc:1 "Cela a toujours été un mystère ce qui se cache exactement au sud de notre royaume. Nous devrions commencer une expédition vers le sud et voir ce qui se cache dans les plaines du sud."
 zim_annex_vassals_title:0 "Gérer les Torwa"
 zim_annex_vassals_desc:0 "La dynastie Torwa est une relique de l'ancien empire du Zimbabwe et est devenue notre sujet après que nous avons remplacé l'ancien royaume. Bien que la qualité de leurs troupes soit inégalée, leur loyauté envers le [Root.Monarch.GetTitle] est parfois discutable. Il est temps de les intégrer correctement dans notre État."
 zim_annex_vassals_ct:0 "Les §YGuerriers Butua§! deviendront une unité de mercenaires unique disponible uniquement pour [Root.GetName]."
 zim_strong_rulership_title:0 "Règne Fort"
 zim_strong_rulership_desc:0 "Notre [Root.Monarch.GetTitle] représente notre État et notre religion. [Root.Monarch.GetSheHeCap] est l'épicentre de notre société et en tant que tel ne mérite que le meilleur autour de [Root.Monarch.GetHerHim]."
 zim_dominate_south_africa_title:1 "Contrôler l'Afrique Australe"
 zim_dominate_south_africa_desc:0 "Les plaines au sud de nous sont incontestées et en tant que telles sont notre revendication légitime. Nous devrions nous assurer que ces revendications deviennent réalité."
 zim_amongst_the_great_powers_title:0 "Grande Puissance d'Afrique"
 zim_amongst_the_great_powers_desc:0 "Le monde rétrécit alors que les étrangers du Nord essaient d'étendre leur influence globalement. Nous devons devenir l'un des grands acteurs du monde pour nous assurer que notre propre État ne tombe pas dans l'obscurité et ne devienne pas la prochaine cible des Européens."
 zim_amongst_the_great_powers_tt:1 "Cette projection de puissance est §Ypermanente§!.\n "
 zim_modernize_state_title:0 "Moderniser l'État"
 zim_modernize_state_desc:1 "Depuis notre fondation, notre peuple a vénéré le Mwenemutapa comme l'image de Mwari, la divinité de notre Zimbabwe. Avec l'arrivée des étrangers du Nord, une nouvelle vision du monde est entrée dans la tête des gens. Une où le Mwenemutapa serait un sujet de notre dieu. Ou une autre où le peuple régnerait réellement sur [Root.GetName].\nCependant, les pensées seules ne peuvent pas moderniser un État. Nous avons besoin de la technologie et des connaissances pour changer les bases de notre gouvernement pour le bien de notre peuple."
 ###AJU MISSIONS###
 aju_annex_mogadishu_title:0 "Annexer Mogadiscio"
 aju_annex_mogadishu_desc:0 "Mogadiscio est la perle de la Corne de l'Afrique. La cité est un splendide centre commercial, attirant des marchands de tout le monde arabe et indien. Il est temps d'intégrer cette belle cité et d'utiliser son influence à notre avantage."
 aju_gold_minting_title:0 "Obtenir l'Accès à l'Or"
 aju_gold_minting_desc:1 "Mogadiscio frappait ses propres pièces, ce qui a aidé à la centralisation de son hégémonie commerciale. Bien qu'il y ait déjà des pièces en circulation en Arabie et en Inde, leur nombre est trop petit pour avoir un impact majeur. Nous devrions obtenir l'accès à une bonne source d'or pour frapper plus de pièces afin de pouvoir influencer les économies de ces régions importantes."
 aju_gold_minting_ct:0 "Si la mission est complétée alors que [Root.GetName] possède ou a un sujet qui possède au moins §Y1§! province aurifère, alors [Root.GetName] recevra §G4 ans§! de revenus aurifères de cette province aurifère.\nSi [Root.GetName] termine cette mission diplomatiquement à la place, l'allié ayant accès à l'or recevra l'événement « §YAccord sur l'Or avec [Root.GetName]§! »."
 aju_the_mamluk_soldiers_tt:0 "[Root.GetName] a engagé la compagnie de mercenaires §YSoldats Mamelouks§!."
 aju_invent_istunka_tt:0 "Avoir au moins §Y20 régiments d'infanterie§! stationnés dans la province §Y[2776.GetName]§!."
 aju_indian_trade_ct:0 "Chaque pays avec au moins §Y5 %§! de pouvoir commercial dans n'importe quel nœud commercial §YIndien§! reçoit l'événement « §YLes Pièces de [Root.GetName]§! »."
 AJU_INDIAN_MERCHANTS:0 "Marchands Ajuuraan en Inde"
 AJU_JAVA_MERCHANTS:0 "Marchands Ajuuraan à Java"
 aju_invent_istunka_ct:0 "[2776.GetName] reçoit le modificateur de province déclenché §YPatrie de l'Istunka§! jusqu'à la fin de la partie, donnant les effets suivants :\nTroubles globaux : §G-1,00§!\nCoût de développement local : §G-5,0 %§!"
 aju_oromo_invasion_tt:0 "L'événement « §YLes Oromos§! » s'est déclenché il y a §Y10 ans§!."
 aju_unite_the_clans_tt:0 "Chaque province §YSomali§! reçoit le modificateur de province « §YClans Unis§! » pendant §Y25 ans§!, donnant les effets suivants :\nTroubles locaux : §G-4,00§!\nModificateur de main-d'œuvre local : §G+10,0 %§!\nModificateur d'impôt local : §G+10,0 %§!\nEfficacité de production locale : §G+10,0 %§!"
 aju_indian_trade_title:0 "Commerce avec l'Inde"
 aju_indian_trade_desc:0 "La région de l'Inde est pleine de richesses inexploitées par nos voisins. Si nous réussissions à établir une présence commerciale là-bas, nous pourrions récolter des bénéfices inimaginables."
 aju_chinese_trade_company_title:0 "Commerce avec le Dragon"
 aju_chinese_trade_company_desc:0 "Après le marché indien, la prochaine étape logique est de pénétrer le marché chinois. De là, nous pouvons obtenir des richesses et des biens encore plus exotiques et rentables qu'avant. Nous devons aussi nous établir là-bas."
 aju_castle_builders_title:0 "Fortifier [Root.Capital.GetName]"
 aju_castle_builders_desc:0 "Notre capitale est le centre de notre pouvoir et en tant que telle la partie la plus vitale de notre pays. Nous devons la fortifier pour renforcer sa défense et nous assurer qu'elle ne tombe jamais aux mains de l'ennemi."
 aju_hydraulic_expertise_title:0 "Expertise Hydraulique"
 aju_hydraulic_expertise_desc:1 "La nourriture et l'eau sont les choses les plus importantes pour la survie d'une population, et cela à son tour est la base de tout pays. Nous devons développer et étendre notre infrastructure d'irrigation pour pouvoir contrôler et augmenter les deux."
 aju_maldives_dynasty_title:0 "Reprendre les Maldives"
 aju_maldives_dynasty_desc:0 "Bien que nous ayons établi une présence aux Maldives, nous en avons perdu le contrôle après que des membres traîtres de notre famille se sont séparés de nous. Il est temps de reprendre ce qui est nôtre."
 aju_invent_istunka_title:0 "Développer l'Istunka"
 aju_invent_istunka_desc:0 "Nos guerriers ont toujours été fiers d'eux-mêmes, et nous devrions l'être aussi. En organisant un festival où ils peuvent montrer leur prouesse au combat, tout notre peuple serait également fier d'eux."
 aju_merchants_in_dai_viet_title:0 "Commerce Vietnamien"
 aju_merchants_in_dai_viet_desc:0 "Après l'Inde, nous étendre au Vietnam et en Indochine est un développement logique. Non seulement pourrions-nous avoir accès à encore plus de richesses là-bas, mais cela nous permettra aussi de contrôler le commerce qui vient de Chine et au-delà."
 aju_markets_of_ajuuran_title:0 "Étendre les Marchés"
 aju_markets_of_ajuuran_desc:0 "Notre capitale a toujours été un centre de commerce. Nous devrions étendre nos marchés pour l'encourager encore plus et augmenter la richesse qui y afflue."
 aju_sofaala_claims_title:0 "Reprendre [1186.GetName]"
 aju_sofaala_claims_desc:0 "Sofala nous avait permis une présence sur les marchés du sud jusqu'à ce qu'elle nous soit prise. Nous devrions la reprendre pour pouvoir à nouveau étendre notre commerce vers le sud facilement."
 aju_trade_on_java_title:0 "Commerce avec Java"
 aju_trade_on_java_desc:0 "Après l'Inde, nous devrions nous étendre sur les marchés de Java. Ce faisant, nous pourrions contrôler le commerce venant des Îles aux Épices, et les bénéfices seraient incommensurables."
 aju_protect_trade_aden_title:0 "Dominer le Golfe d'Aden"
 aju_protect_trade_aden_desc:0 "Nos marchés ont toujours été influents, mais seulement en dominant complètement le commerce à travers notre zone, spécialement par mer, serions-nous en mesure d'assurer notre stabilité et notre expansion future."
 aju_expand_navy_title:0 "Étendre la Marine"
 aju_expand_navy_desc:0 "Seulement en ayant une domination complète de la mer pouvons-nous aspirer au succès. Nous devons construire plus de navires pour nous assurer qu'aucune autre nation ne soit en mesure de s'opposer à nos flottes."
 aju_ally_the_ottomans_title:0 "Alliance Ottomane"
 aju_ally_the_ottomans_desc:0 "Les Ottomans ont clairement pu établir une présence en Anatolie. Nous devrions les approcher et leur offrir une alliance, il y a beaucoup que nous pouvons gagner et apprendre de cette amitié."
 aju_buy_modernization_title:0 "Moderniser l'Armée"
 aju_buy_modernization_desc:1 "L'armée ottomane est certainement une force avec laquelle il faut compter. Nous devrions essayer de les imiter, nous pouvons engager certains de leurs instructeurs militaires et acheter une partie de leur équipement, pour que nous puissions aussi avoir une formidable armée moderne."
 aju_oromo_invasion_title:0 "Surmonter les Oromos"
 aju_oromo_invasion_desc:0 "Les Oromos ont toujours été une épine dans notre flanc. Nous devrions nous en débarrasser une fois pour toutes."
 aju_the_mamluk_soldiers_title:0 "Recruter les Mamelouks"
 aju_the_mamluk_soldiers_desc:1 "Les Mamelouks sont parmi les guerriers les plus formidables qui soient. Nous devons en recruter certains pour augmenter la puissance de notre propre armée. Cela nous permettra de conquérir nos ennemis plus facilement."
 aju_the_tip_of_the_horn_title:0 "Conquérir la Corne"
 aju_the_tip_of_the_horn_desc:0 "Si nous devons survivre entourés d'ennemis, la première étape que nous devrions prendre est de contrôler la Corne. Seulement en faisant cela pouvons-nous établir une base suffisamment puissante d'où nous étendre plus tard."
 aju_unite_the_clans_title:0 "Unir les Clans"
 aju_unite_the_clans_desc:0 "Il y a différents clans somaliens indépendants autour de nous qui peuvent entraver nos ambitions à moins que nous ne les fassions nous répondre. Seulement en unifiant tous les clans pouvons-nous aspirer à nous étendre au-delà."
 aju_liberate_sheik_hussein_title:0 "Libérer Cheikh Hussein"
 aju_liberate_sheik_hussein_desc:0 "Cheikh Hussein a été aux mains des infidèles coptes depuis trop longtemps. Il est temps que nous le reprenions pour la gloire de l'Islam."
 aju_consolidate_the_horn_title:0 "Consolider la Corne"
 aju_consolidate_the_horn_desc:0 "Bien que notre présence dans la Corne ait clairement augmenté, il y a encore des parties que nous ne contrôlons pas. Nous devrions éliminer toute opposition pour pouvoir clairement revendiquer la domination sur toute la zone."
 ###ZAN MISSIONS###
 zan_annex_sofala_title:0 "Annexer [SFA.GetName]"
 zan_annex_sofala_desc:0 "[SFA.GetName] a été sous notre influence depuis longtemps, mais il est temps de prendre le contrôle direct, elle doit être dans notre propre territoire."
 zan_mutapan_gold_title:0 "L'Or du Zimbabwe"
 zan_mutapan_gold_desc:0 "La terre du Zimbabwe est riche en or, nous devons la conquérir pour obtenir cette richesse. Seulement alors aurons-nous assez de pouvoir économique pour permettre une expansion future."
 zan_discover_the_cape_title:0 "Le Sud Inexploré"
 zan_discover_the_cape_desc:0 "Les terres du sud ont toujours été enveloppées de mystère, qui sait combien de richesses inimaginables peuvent s'y trouver ? Nous devons explorer ces terres si nous voulons les exploiter."
 zan_colonize_the_cape_title:0 "Coloniser le Cap"
 zan_colonize_the_cape_desc:0 "La pointe sud du continent est d'une importance vitale si nous voulons contrôler le flux du commerce allant vers l'Ouest. Nous devons y établir une présence permanente d'où exercer le contrôle sur tout le commerce."
 zan_settle_trade_posts_title:0 "Comptoirs Commerciaux d'Afrique"
 zan_settle_trade_posts_desc:0 "Il y a beaucoup d'endroits au Nord et à l'Ouest où le flux commercial est remarquable. Nous devons posséder ces endroits et prendre le contrôle du commerce nous-mêmes."
 zan_establish_contact_with_persia_title:0 "Renouer avec la Perse"
 zan_establish_contact_with_persia_desc:0 "Il est connu que notre ancêtre Ali ibn al-Hassan Shirazi était le fils de l'Émir perse de Chiraz. Nous devons renouer avec nos origines ancestrales."
 zan_build_workshops_title:0 "Augmenter la Production d'Ivoire"
 zan_build_workshops_desc:0 "L'ivoire a toujours été l'une de nos principales sources de revenus. Nous devrions faire tous les efforts possibles pour augmenter sa production."
 zan_expand_the_capital_title:0 "Étendre [1196.GetName]"
 zan_expand_the_capital_desc:0 "Notre capitale est le symbole qui représente notre nation, et où la plupart de notre richesse est située. Nous devrions l'améliorer et la développer encore plus, pour qu'elle devienne la cité la plus riche du monde."
 zan_build_manufactories_title:0 "Construire des Manufactures"
 zan_build_manufactories_desc:0 "Il ne fait aucun doute que plus nous produisons, plus nous serons en mesure d'amasser de la richesse. À cette fin, nous devrions augmenter nos manufactures pour pouvoir produire encore plus."
 zan_trade_fleet_title:0 "Établir une Flotte Commerciale"
 zan_trade_fleet_desc:0 "Le commerce coule constamment à travers nos eaux. Si nous voulons en profiter, nous devons construire une flotte qui nous permet de le contrôler."
 zan_conquer_the_coast_title:0 "Conquérir le Littoral"
 zan_conquer_the_coast_desc:0 "Avec une flotte à notre disposition, nous avons juste besoin maintenant d'avoir une présence le long de toute la côte pour contrôler sa richesse. Nous devons conquérir tout ce qui pourrait nous entraver."
 zan_conquer_mogadishu_title:0 "Conquérir Mogadiscio"
 zan_conquer_mogadishu_desc:0 "Les gens de Mogadiscio ont toujours été une nuisance pour nos ambitions commerciales. Nous devons les faire disparaître une fois pour toutes en les conquérant."
 zan_dominate_gulf_of_aden_title:0 "Le Golfe d'Aden"
 zan_dominate_gulf_of_aden_desc:0 "Le golfe d'Aden a toujours été animé par le commerce. Nous devons en prendre le contrôle clair et l'exploiter à notre avantage."
 zan_dominate_gulf_of_aden_ct:0 "§Y[Root.GetName]§! gagne une revendication sur chaque centre commercial côtier des nœuds commerciaux §YGujarat§! et §YCoromandel§!."
 zan_centralize_trade_title:0 "Revendiquer l'Hégémonie Commerciale"
 zan_centralize_trade_desc:0 "Le commerce qui coule à travers notre pays, ainsi que celui qui coule vers l'ouest à travers toute la côte est une grande source de richesse si nous pouvons le contrôler. Nous devrions dominer complètement ce commerce et en même temps diriger tout le commerce environnant vers nous si nous voulons récolter les bénéfices maximaux."
 zan_transport_fleet_title:0 "Préparer l'Invasion"
 zan_transport_fleet_desc:1 "L'île de Madagascar est juste en face de notre côte, un prix trop doux à ignorer. Et elle est pleine d'infidèles de surcroît. Nous devons lever une armée et une flotte, et nous préparer à la prendre."
 zan_conquer_madagascar_title:1 "Envahir Madagascar"
 zan_conquer_madagascar_desc:0 "Avec notre armée et notre flotte prêtes, il est temps de faire notre mouvement et de purger cette île d'infidèles, et d'en prendre le contrôle pour exploiter ses richesses."
 zan_dominate_the_malacca_trade_title:0 "Le Commerce de Malacca"
 zan_dominate_the_malacca_trade_desc:0 "Les commerçants viennent toujours nous raconter d'étranges histoires du mystérieux Orient et des Îles aux Épices. Nous devons étendre notre influence vers ces zones et prendre le contrôle de ce commerce nous-mêmes."
 zan_trade_with_china_title:0 "Commerce avec la Chine"
 zan_trade_with_china_desc:1 "L'Extrême-Orient est la source de richesses incommensurables de légende. Nous devons avoir une forte présence commerciale là-bas si nous voulons y participer."
 zan_trade_of_the_east_title:0 "Atteindre le Marché Indien"
 zan_trade_of_the_east_desc:0 "L'Inde a toujours vu un grand flux de commerce la traverser. Nous ne pouvons pas rester en dehors de cette richesse, nous devons aussi établir notre présence sur les marchés indiens."
 zan_explore_the_malacca_trade_title:0 "Explorer l'Océan Indien"
 zan_explore_the_malacca_trade_desc:1 "L'Inde s'est avérée être une grande source de richesses. Qui sait quelles autres terres pourraient se trouver au-delà de l'océan, attendant d'être exploitées ? Nous devons faire un effort pour explorer l'océan à la recherche de ces possibles sources de richesse encore plus grandes."
 zan_dominate_moluccas_title:0 "Le Commerce des Moluques"
 zan_dominate_moluccas_desc:0 "Maintenant que nous contrôlons le commerce qui coule à travers le détroit de Malacca, il est temps d'aller encore plus loin, jusqu'aux Îles aux Épices elles-mêmes. Seulement en faisant cela pouvons-nous vraiment contrôler tout le flux commercial et ses richesses."
 zan_colonize_australia_title:0 "Coloniser l'Australie"
 zan_colonize_australia_desc:0 "Nous nous sommes étendus à des distances et des terres jamais imaginées auparavant. Nous devons aller encore plus loin, jusqu'aux mystérieuses Terres du Sud dont nous avons entendu parler et qui sont clairement à notre portée."
 ###AJU MODIFIERS###
 aju_merchants_in_india:0 "Présence Ajuuraan-Inde"
 desc_aju_merchants_in_india:0 "Nos marchands sont actifs en Inde et commercent avec les gens là-bas pour notre bénéfice."
 aju_exotic_zoo:0 "Zoo Exotique"
 desc_aju_exotic_zoo:1 "Des marchands d'Afrique ont apporté des créatures merveilleuses et étranges à l'Empereur. Pour héberger ces créatures, le peuple a construit un zoo juste à côté de la Cité Interdite."
 ajuuran_place_of_istunka:0 "Patrie de l'Istunka"
 desc_ajuuran_place_of_istunka:0 "Cette province est la patrie du festival du Nouvel An appelé Istunka, qui est célébré par tout le peuple d'Ajuuraan."
 aju_trade_influence:0 "Marchés Étendus"
 desc_aju_trade_influence:0 "Avec la construction de plusieurs nouveaux marchés, le commerce dans notre royaume prospère plus que jamais."
 aju_ajuuran_sofala:0 "Administration Ajuuraan"
 desc_aju_ajuuran_sofala:1 "Sofala était autrefois une colonie d'Ajuuraan. Quand les Ajuuraan sont venus reprendre la province, beaucoup de Swahili ont été expulsés et remplacés par les membres de clans loyaux d'Ajuuraan."
 aju_fleet_investment:0 "Investissement dans la Flotte Commerciale"
 desc_aju_fleet_investment:0 "Notre domination du commerce du golfe d'Aden nous donne les ressources pour investir dans la construction d'une grande flotte commerciale."
 aju_united_somali_clans:0 "Clans Unis"
 desc_aju_united_somali_clans:0 "Les Somaliens de cette province ont été unis par leur suzerain."
 aju_mogadishu_currency:0 "Investissement Ajuuraan"
 desc_aju_mogadishu_currency:0 "Nous avons décidé de permettre aux marchands Ajuuraan de rester dans notre pays et d'investir dans notre production."
 ###ZAN MISSIONS###
 zan_establish_contact_with_persia_at:0 "Avoir au moins §Y1§! régiment de n'importe quel type stationné dans la province §Y[2218.GetName]§!."
 zan_establish_contact_with_persia_bt:1 "Le propriétaire de §Y[2218.GetName]§! est soit un allié soit un sujet de §Y[Root.GetName]§!."
 zan_build_manufactories_ct:0 "Jusqu'à §Y6§! provinces possédées avec une §YManufacture§! gagnent §G2§! de production."
 zan_explore_the_malacca_trade_tt:0 "§Y[Root.GetName]§! gagne des revendications permanentes sur les îles §YSumatra§! et §YJava§!."
 zan_conquer_madagascar_tt:0 "Chaque province de §YMadagascar§! possédée par [Root.GetName] ou ses sujets reçoit le modificateur de province « §YPrise de Contrôle Swahili§! » pendant §Y25 ans§!, donnant les effets suivants :\nForce missionnaire locale : §G+2,0 %§!\nBiens produits locaux : §G+0,25§!"
 zan_colonize_the_cape_ct:0 "§Y[Root.GetName]§! gagne une revendication permanente sur chaque province avec un §YCentre Commercial§! dans les régions §YKongo§! et §YAfrique Centrale§!."
 zan_settle_trade_posts_ct:0 "Gagner §G4 ans§! de revenus commerciaux."
 ZAN_DOMINATION:0 "Domination Marchande Kilwane"
 ###ETHIOPIA MISSION REWARDS###
 eth_legacy_of_alexandria:0 "Héritage d'Alexandrie"
 desc_eth_legacy_of_alexandria:0 "Bien que la bibliothèque d'Alexandrie ait brûlé il y a de nombreux siècles, la cité abrite encore des bibliothèques très importantes, qui ont des connaissances inestimables pour le clergé et les penseurs de notre État."
 eth_coptic_offense:0 "Offensive Copte"
 desc_eth_coptic_offense:0 "Nous nous tenons à la porte des infidèles. Il n'y a qu'une seule façon de défendre les Coptes de ce monde : nous devons passer à l'offensive et repousser les musulmans !"
 eth_conversion_focus:0 "Retour Copte"
 desc_eth_conversion_focus:0 "La plupart des lieux saints majeurs ont été libérés des mains des païens. Maintenant il est temps de ramener les gens de ces zones à la miséricorde du Seigneur."
 eth_blessing_of_kings:0 "Bénédiction du Seigneur"
 eth_restoration_of_antioch:0 "Restauration d'Antioche"
 desc_eth_restoration_of_antioch:1 "La sainte cité d'Antioche est à nouveau aux mains des chrétiens. De nombreux Coptes voyagent vers cette cité pour la revitaliser et reconstruire la cité à sa gloire d'antan."
 eth_obelisk_of_axum:0 "Obélisque d'Aksoum"
 desc_eth_obelisk_of_axum:0 "L'Obélisque d'Aksoum est un vestige ancien de l'Empire aksoumite et a été érigé au Ve siècle. De nombreux pèlerins voyagent vers cet obélisque pour honorer le passé et le présent."
 eth_lord_of_the_horn:0 "Seigneur de la Corne de l'Afrique"
 desc_eth_lord_of_the_horn:1 "Après des siècles de luttes intestines et de guerres, c'est enfin fait. La Corne de l'Afrique a été unie sous une seule bannière, sous la bannière [Root.GetAdjective] !"
 eth_restoration_of_ancient_borders:0 "Empire des Empires"
 desc_eth_restoration_of_ancient_borders:0 "Notre royaume n'a pas seulement recréé une ancienne grande puissance de l'histoire, mais l'a aussi dépassée de loin ! Notre empire sera celui qui éclipse tous les autres empires !"
 eth_new_christians:0 "Falash Mura"
 desc_eth_new_christians:0 "Les Falash Mura sont des Juifs qui ont été convertis de force. Bien que tout le monde ne soit pas content de leur nouveau sort, la majorité des Falash Mura apprécient les avantages significatifs en Éthiopie, ce qui rend leur transition beaucoup plus supportable."
 eth_united_church:0 "Église Unie"
 desc_eth_united_church:1 "L'église copte était divisée sur la question du Sabbat biblique, qui portait sur l'observation des jours de repos. Bien que ce soit une question relativement triviale, c'était néanmoins une question d'importance pour les églises éthiopiennes. Ce n'est qu'après que le Negusa Nagast Zara Yaqob lui-même se soit consacré à ce problème en 1442 qu'une solution a été trouvée. Depuis, l'église est plus unie que jamais."
 eth_active_missionaries:0 "Missionnaires Actifs"
 desc_eth_active_missionaries:1 "Après la conquête par l'Éthiopie, cette province a maintenant des missionnaires actifs, qui ont été envoyés par le Negusa Nagast. Ils devraient s'assurer que les résidents locaux retrouvent le bon chemin."
 eth_increased_gold_mining:0 "Extraction Aurifère Efficace"
 desc_eth_increased_gold_mining:0 "Grâce à l'amélioration de l'infrastructure, l'efficacité de l'extraction de l'or a été drastiquement augmentée."
 eth_merchants_in_europe:0 "Marchands en Europe"
 desc_eth_merchants_in_europe:0 "Nos marchands ont trouvé leur chance sur les marchés européens. Ils apportent des richesses d'Europe à [Root.GetName] tout en vendant beaucoup de nos propres biens là-bas, ce qui rapporte un bon profit du commerce."
 eth_modernized_army:0 "Armée Modernisée"
 desc_eth_modernized_army:0 "Grâce à la modernisation de notre grande armée, la discipline moyenne des troupes a été notablement augmentée."
 eth_blessed_empire:0 "Empire Béni"
 desc_eth_blessed_empire:0 "Notre nation a dépassé le passé, sécurisé l'avenir et gagné la bienveillance du Seigneur lui-même. Nous sommes vraiment un Empire Béni !"
 eth_better_integration:0 "Effort d'Intégration Accru"
 desc_eth_better_integration:0 "Nous avons décidé d'augmenter nos efforts pour intégrer nos vassaux."
 eth_better_vassal_handling:0 "Collecte d'Impôts Accrue"
 desc_eth_better_vassal_handling:0 "Nous avons décidé d'augmenter nos efforts pour collecter les impôts des vassaux."
 eth_surpassed_aksumite_empire:0 "Héritage Aksoumite"
 desc_eth_surpassed_aksumite_empire:0 "Notre royaume a dépassé les frontières de l'Empire aksoumite. Nous avons revendiqué l'ancien héritage aksoumite !"
 eth_negusa_nagast_issues:0 "État Décentralisé"
 desc_eth_negusa_nagast_issues:0 "L'Éthiopie n'a pratiquement aucune centralisation. La seule autorité qui peut être assumée n'est possible que par la présence du Negusa Nagast lui-même, qui a déplacé sa capitale vers la zone qui doit être contrôlée."
