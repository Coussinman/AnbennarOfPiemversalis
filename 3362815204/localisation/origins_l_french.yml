 ###JEWISH MECHANICS###
 JEWISH_ASPECTS_LONG:0 "Aspects de la Torah"
 JEWISH_ASPECTS_SHORT:0 "aspect"
 JUDAISM_HAS_ADM_ASPECT:0 "A un §YAspect§! £adm£ actif."
 celebrate:0 "Accomplir le Rituel"
 judaism_rosh_hashanah_aspect:0 "Festival de Roch Hachana"
 desc_judaism_rosh_hashanah_aspect:0 "§YAspect§! £adm£\n§YCélébrer le Festival§! nous donne §G+1§! de stabilité.\n\nBien que notre peuple ait vécu pendant de nombreuses années sous l'oppression du Pharaon, ils n'ont jamais perdu leur sens de soi ni leur foi en Dieu, et ils se sont rapidement établis à nouveau comme une nation une fois qu'ils ont quitté l'Égypte."
 judaism_simchat_torah_aspect:0 "Festival de Simhat Torah"
 desc_judaism_simchat_torah_aspect:2 "§YAspect§! £adm£\n§YCélébrer le Festival§! nous donne §G+25§! de progrès de réforme, §G+5§! de légitimité (ou son équivalent pour d'autres gouvernements) et §G+5§! de force de revendication de l'héritier.\n\nLa Torah est l'écrit sacré du judaïsme et contient les cinq premiers livres de la Bible hébraïque. C'est aussi la source de nos lois et traditions les plus sacrées et possède des connaissances de grande valeur pour nous."
 judaism_sukkot_aspect:0 "Festival de Souccot"
 desc_judaism_sukkot_aspect:2 "§YAspect§! £adm£\n§YCélébrer le Festival§! nous donne §G0,3§! an de revenus et réduit l'inflation de §G-1§!.\n\nLe Souccot est un festival juif de grande importance car c'est à la fois un symbole de récolte mais aussi un symbole de notre attachement à la volonté de Dieu. Pendant cette période, le travail est soit interdit, soit très restreint."
 judaism_communities_aspect:0 "Communauté Juive"
 desc_judaism_communities_aspect:1 "§YAspect§! £dip£\nAucune province §YJuive§! possédée ne subira les pénalités de §YCulture Non Acceptée§! et §YMême Groupe Culturel§! tant que cet aspect est actif.\n\nLe peuple juif a été la minorité dans de nombreuses provinces et pays pendant des siècles. Bien que ce statut ait rendu la vie inutilement plus difficile, il a au moins contribué à la création d'un grand sens de la communauté au sein du judaïsme, surmontant même les différences culturelles auxquelles d'autres religions feraient face."
 jewish_abrahamic_aspect:0 "Racines Abrahamiques"
 desc_jewish_abrahamic_aspect:0 "§YAspect§! £dip£\nChaque province §YChrétienne§! ou §YMusulmane§! possédée ne subira plus les pénalités de mauvaise religion et diminuera la contribution à l'unité religieuse locale de §G-100,0 %§! et la force missionnaire locale de §R-100,0 %§!.\n\nJuifs, chrétiens et musulmans peuvent avoir leurs différences, mais en fin de compte toutes nos religions peuvent être liées au grand Abraham. À cause de cela, les chrétiens et les musulmans dans notre royaume sont traités comme des frères, même si leur chemin diffère du nôtre."
 judaism_diplomatic_rabbi_aspect:0 "Foyer des Juifs"
 desc_judaism_diplomatic_rabbi_aspect:0 "§YAspect§! £dip£\nChaque pays §YChrétien§! ou §YMusulman§! non-théocratique aura une opinion de §G+35§! de nous.\n\nNous sommes un phare pour notre peuple et en tant que tel, nous attirons de nombreux Juifs de pays étrangers dans notre nation. Comme effet secondaire, les chrétiens et les musulmans sont contents que leurs « Indésirables » soient chez nous."
 judaism_yom_kippur_aspect:0 "Yom Kippour"
 desc_judaism_yom_kippur_aspect:3 "§YAspect§! £mil£\nEn guerre, notre pays reçoit §G+20,0 %§! de vitesse de récupération de la main-d'œuvre et §G+25,0 %§! de pouvoir de foi. Cet effet est doublé si nous sommes dans une guerre §Ydéfensive§! à la place.\n\nLe plus saint de nos jours, le Yom Kippour est un jour d'expiation pour nos transgressions et de repentance pour nos péchés. Pendant le Yom Kippour, chaque Juif est censé jeûner, se confesser et prier, souvent en servant à la synagogue."
 judaism_remember_passover_aspect:0 "Se Souvenir de Pessah"
 desc_judaism_remember_passover_aspect:2 "§YAspect§! £mil£\nLes sièges de nos propres forts tombés commencent avec §G+2§! de progression de siège en notre faveur. Gagner des sièges contre des forts hostiles nous donne §G+5§! de pouvoir de foi.\n\nPessah est une fête majeure du judaïsme et un rappel du temps de notre peuple sous les Égyptiens, et de notre libération d'eux. Chaque personne doit se souvenir de l'endurance que le peuple de notre passé a montrée, et que chaque victoire mérite une célébration."
 judaism_purim_teachings_aspect:0 "Enseignements de Pourim"
 desc_judaism_purim_teachings_aspect:2 "§YAspect§! £mil£\nChaque bataille gagnée réduit l'épuisement de guerre de §G-0,05§!. Chaque guerre gagnée nous accorde §G+75§! de pouvoir de foi. Les traités de paix séparée dans une guerre ne déclenchent pas cet effet.\n\nPourim est une fête juive, et sert de mémorial pour le sauvetage de notre peuple d'Haman de l'Empire perse achéménide. En tant que tel, nous nous souvenons et honorons l'endurance de notre peuple pendant les temps difficiles, et vivons selon leur exemple."
