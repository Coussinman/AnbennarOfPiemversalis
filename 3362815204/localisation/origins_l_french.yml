 estate_chieftains:0 "Chefs de Clan"
 estate_tengbiise:0 "Tengbiise"
 estate_nakomse:0 "Nakomsé"
 estate_oyo_mesi:0 "Oyo Mesi"
 estate_ogboni:0 "Ogboni"
 ###ESTATE MODIFIERS###
 estate_burghers_control_over_gold_mine:0 "Extraction Aurifère Contrôlée"
 desc_estate_burghers_control_over_gold_mine:0 "Les bourgeois de cette province ont pris le contrôle du processus d'extraction et s'assurent que trop d'or n'entre pas dans l'économie du propriétaire."
 estate_church_united_faith_and_culture:0 "Société Religieuse"
 desc_estate_church_united_faith_and_culture:1 "Cette province est guidée par le clergé, qui a pris des rôles cruciaux dans les affaires sociales et culturelles et combine culture et religion pour les gens qui y vivent."
 estate_church_false_culture:0 "Culture Hérétique"
 desc_estate_church_false_culture:1 "Cette province a une majorité de gens qui ne sont pas tolérés par leur suzerain. En tant que tel, le clergé fait des tentatives pour rééduquer les habitants afin qu'ils puissent rejoindre leur société religieuse."
 estate_burghers_hydraulic_rights_desert:0 "Irrigation Améliorée"
 desc_estate_burghers_hydraulic_rights_desert:0 "Cette province voit de grandes améliorations dans l'accès à l'eau grâce à l'intervention des bourgeois locaux."
 estate_burghers_hydraulic_rights_coastal_desert:0 "Irrigation Améliorée"
 desc_estate_burghers_hydraulic_rights_coastal_desert:1 "Cette province voit de grandes améliorations dans son accès à l'eau grâce à l'intervention des bourgeois locaux."
 estate_burghers_hydraulic_rights_steppes:0 "Irrigation Améliorée"
