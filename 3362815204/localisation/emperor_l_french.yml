 COUNTRY_REVOLUTION_SPREAD_DELAYED:0 "Les idées révolutionnaires se propagent depuis un Centre de Révolution proche, convertissant les provinces à sa cause et incitant leur peuple à se révolter contre l'absolutisme. Plus un pays est absolutiste, pire sera l'impact de la Révolution sur ses provinces. Ce n'est qu'en mettant fin à la Révolution que la propagation s'arrêtera et que l'ordre sera finalement rétabli."
