 PROVINCE_HAS_REVOLUTION_DELAYED:1 "Les idées révolutionnaires se propagent au fil du temps aux provinces proches d'un Centre de Révolution. Une fois que la Révolution prend le contrôle d'une province, l'autonomie augmentera selon le degré d'absolutisme du pays."
 PROVINCE_HAS_REVOLUTION_DELAYED_REV:1 "Les idées révolutionnaires se propagent au fil du temps aux provinces proches d'un Centre de Révolution. Propager la Révolution dans d'autres pays augmentera notre propre zèle révolutionnaire."
