 # Ravelian Debates
 COUNCIL_OF_TRENT:0 "Débats Ravéliens"
 COUNCIL_POSITION_ALREADY:0 "§RVous avez déjà choisi cette position dans le débat.§!"
 COUNCIL_POSITION_THIS_RULER:0 "§R$NAME$ a déjà pris position dans ce débat, et un dirigeant ne peut changer d'avis.§!"
 COUNCIL_POSITION_NO_CARDINAL:0 "§RNous n'avons pas de véridique, nous n'avons donc pas notre mot à dire.§!"
 COUNCIL_HARSH_TITLE:0 "Soutenir les doctrines zélotes\n§WLes ésotéristes, mystiques et prédicateurs constituent le noyau de la Secte Zélote. Ils croient que l'église doit se concentrer sur la diffusion de sa vérité et la conversion des masses du monde afin de les sauver de la damnation. Malgré leurs vues parfois extrêmes et dogmatiques, ils sont le visage public de la religion et passent beaucoup de temps à enseigner et à prendre soin de tous. C'est grâce aux œuvres de la Secte Zélote que la foi ravélienne se répand à travers le monde.§!"
 COUNCIL_HARSH_DESC:0 "Voulez-vous soutenir les doctrines zélotes dans les Débats Ravéliens ? Vous ne pourrez pas changer de position tant que vous n'aurez pas un nouveau dirigeant. Cela a les effets suivants :\n$IMPACT$"
 COUNCIL_CONCILATORY_TITLE:0 "Soutenir les doctrines érudites\n§WLes érudits, philosophes et avant-gardistes constituent le noyau de la Secte Érudite. Ils croient que l'église doit se concentrer avant tout sur la découverte, la recherche et le dévoilement des secrets du monde, plutôt que sur la diffusion de ce que l'église actuelle sait aux masses. Souvent perçue comme secrète et fermée, c'est de la Secte Érudite que proviennent les révélations et les enseignements de l'Église Ravélienne, et sans elle, la foi ravélienne ne serait qu'une religion de plus construite sur des demi-vérités et de fausses croyances.§!"
 COUNCIL_CONCILATORY_DESC:0 "Voulez-vous soutenir les doctrines érudites dans les Débats Ravéliens ? Vous ne pourrez pas changer de position tant que vous n'aurez pas un nouveau dirigeant. Cela a les effets suivants :\n$IMPACT$"
 COUNCIL_CONCESSION_NOT:2 "§RVous n'êtes pas le contrôleur du Rectorat !§!\nSeul le contrôleur du Rectorat peut dépenser les coffres du Rectorat pour de nouvelles doctrines dans les Débats Ravéliens. Le coût dépend du nombre de véridiques soutenant chaque camp."
