 # Revolution
 CENTER_OF_REVOLUTION_INSTANT:0 "$PROVINCE|Y$ est un Centre de Révolution."
 CENTER_OF_REVOLUTION_DELAYED:0 "Un Centre de Révolution abrite de dangereux réactionnaires qui répandent une vile propagande contre les rois, évêques et doges. S'ils ne sont pas arrêtés, ils répandront leurs idées dans les provinces voisines et inciteront des sujets loyaux à prendre les armes contre leurs dirigeants."
 CENTER_OF_REVOLUTION_DELAYED_REV:0 "Un Centre de Révolution abrite de grands penseurs et amis du peuple qui ont légitimement pris les armes contre l'oppression. Avec le temps, le récit de leur succès se répandra dans les provinces voisines et inspirera leurs habitants à lever l'étendard sanglant contre la tyrannie."
