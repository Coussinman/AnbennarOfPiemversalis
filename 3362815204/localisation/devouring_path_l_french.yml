l_french:
 devouring_path.0.t:0 "La Griffe Brisée"
 devouring_path.0.d:0 "Dans la province de [event_province.GetName], l'école de la Griffe Intacte a pris racine. Cette école enseigne que la force est tout, et que combattre ses ennemis est la voie vers leurs dieux. Ils ont décidé que nous, les adeptes de la Voie Dévorante, sommes ces ennemis. Ha ! Ces imbéciles ne savent rien du danger du Royaume des Esprits. Nous les sauvons d'une éternité de torture sans fin. Ils devraient nous remercier, mais au lieu de cela, ils se rebellent contre nous. Devrions-nous faire selon leur souhait et leur offrir la torture éternelle, ou montrer notre bonté et les sauver ?"
 devouring_path.0.a:0 "Envoyons-les au Royaume des Esprits"
 devouring_path.0.b:0 "Sauvons leurs âmes"

 devouring_path.1.t:0 "Le Deuil des Ancêtres"
 devouring_path.1.d:0 "Dans la province de [event_province.GetName], de nombreuses personnes suivent la pratique du culte des ancêtres. Cela ne devrait vraiment pas poser problème, puisque nous pleurons également nos ancêtres, qui sont partis au Royaume des Esprits pour y être torturés pour l'éternité. C'est là, cependant, que réside le problème. Les Adorateurs des Ancêtres n'aiment guère l'idée que leurs ancêtres, même leurs Grands Ancêtres, aient été torturés pendant des millénaires, et continuent de l'être encore aujourd'hui. Ils y voient une grande insulte, bien que ce soit une terrible, terrible vérité. Que faire des Adorateurs des Ancêtres ?"
 devouring_path.1.a:0 "Montrons-leur la vérité et pleurons à leurs côtés"
 devouring_path.1.b:0 "Ignorons-les"

  mourning_ancestors:0 "Deuil des Ancêtres"
  desc_mourning_ancestors:0 "Le peuple de cette province a appris l'infortunée vérité sur le destin de ses ancêtres."

  worshippers_ignored:0 "Adorateurs Ignorés"
  desc_worshippers_ignored:0 "Les Adorateurs des Ancêtres de cette province n'ont pas été correctement instruits de la vérité sur ce qui est advenu de leurs ancêtres."