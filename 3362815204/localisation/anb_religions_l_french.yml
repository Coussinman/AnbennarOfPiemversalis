 desc_assemble_shamans_old_aspect:0 "Rassemblons les chamans pour réaffirmer notre autorité sur le clan."
 desc_shake_the_earth:0 "Nos chamans peuvent utiliser la puissance qui leur est donnée directement par Dookan lui-même pour écraser toute muraille."
 desc_look_for_omens:0 "Dookan est toujours emprisonné profondément sous l'Échine du Serpent et ne peut pas communiquer directement avec ses adorateurs. Pour découvrir la volonté de leur dieu l'Ancien Dookan, les chamans orques entrent en transe pour chercher des présages de leur dieu."
 desc_shake_the_earth_old:0 "Nos chamans peuvent utiliser la puissance qui leur est donnée directement par Dookan lui-même pour écraser toute muraille."
 desc_ask_for_dookan_guidance:0 "Rassemblons nos chamans de toutes nos terres et essayons de communiquer directement avec Dookan !"
 BULGU_ORAZAN_ASPECTS_LONG:0 "Chant orque"
 BULGU_ORAZAN_ASPECTS_SHORT:0 "Chant"
 bulgu_orazan:0 "Bulgu Orazan"
 bulgu_orazan_religion_desc:0 "Bulgu Orazan, qui se traduit de l'orque en langue commune par « Chants des Sages », est une philosophie qui rejette l'adoration de Dookan et se concentre plutôt sur les leçons qui peuvent être tirées de l'histoire orque, transmise oralement pendant des milliers d'années et qui a récemment trouvé sa voie sous forme écrite. La philosophie et ses Chants diffèrent grandement selon les régions, car les Chants que les locaux étudient concernent des orques éminents du passé spécifiques à la région, ou ceux d'autres clans avec lesquels ils ont établi le contact."
 bulgu_songs_of_korgus:0 "Chants de Korgus"
 desc_bulgu_songs_of_korgus:0 "Korgus Fils-de-Dookan, qui unifia des millions d'orques pour un objectif commun mais échoua finalement à accomplir ce à quoi il aspirait et mourut aux mains d'une femme humaine. La plupart des orques tirent de cette histoire qu'on ne doit jamais surestimer ses propres forces, et toujours être prudent."
 bulgu_songs_of_bramash:0 "Chants de Bramash"
 desc_bulgu_songs_of_bramash:0 "Les Chants de Bramash Œil-Voilé, qui s'éleva au statut légendaire après avoir mené les orques asservis d'Ozgarom d'Endralliande aux jungles de Soruin, sur des bateaux pris à leurs oppresseurs, pour poursuivre une vie de liberté. Il est considéré comme le père fondateur d'Ozgarom et a même atteint la déification dans certains foyers, en tant que Bramash le Libérateur. Ses Chants instillent le courage chez de nombreux orques du nouveau monde, qui luttent encore contre l'esclavage, la servitude sous contrat, le racisme et le colonialisme."
 bulgu_songs_of_brasur:0 "Chants de Brasûr"
 desc_bulgu_songs_of_brasur:0 "Brasûr Gueule-Gelée, qui fut exilé avec son clan et vit son père mourir en duel contre Korgus pour avoir contesté son statut, unifia les clans gris et persévéra à travers des terres inconnues et froides, survivant à leur exil et établissant un royaume. La plupart des orques tirent de cette histoire qu'il faut continuer à se battre pour ce en quoi on croit, même si on est puni pour cela."
 bulgu_songs_of_brown_struggle:0 "Chants de l'Avant-Garde Brune"
 desc_bulgu_songs_of_brown_struggle:0 "Les Orques Bruns ont passé des siècles subjugués par le Commandement hobgobelin, servant de troupes de choc d'avant-garde pendant la guerre et de force d'occupation pour les humains rebelles en temps de paix. Durant leur temps à servir comme avant-garde des hobgobelins, ils ont bâti une histoire commune avec un chant pour chaque bataille, siège, héros et chef."
 bulgu_songs_of_bluetusk:0 "Chants de Défense-Bleue"
 desc_bulgu_songs_of_bluetusk:0 "Lothane Défense-Bleue, qui combattit aux côtés de Corin contre le Fils-de-Dookan, est une figure controversée dans la société orque, considéré par certains comme un traître à la race. Cependant, pour de nombreux demi-orques, il est vu comme le premier défenseur éminent de leur cause. Il a peut-être échoué à protéger son groupe de demi-orques contre Karagh Poing-Sanglant, mais il a réussi à sauver des milliers d'autres orques et demi-orques en promouvant l'intégration et la tolérance des (demi-)orques dans la société corintarienne."
 bulgu_songs_of_ashentree:0 "Chants de l'Arbre-Cendré"
 desc_bulgu_songs_of_ashentree:0 "Le Pacte de l'Arbre-Cendré est une foi qui s'est développée parmi certains orques des Bois Profonds après un contact intense avec les fées de la région. Ils valorisent la nature par-dessus tout et les histoires de leur peuple enseignent comment bénéficier de la nature sans l'endommager, que ce soit par la magie ou la cueillette."
 bulgu_songs_of_maxug:0 "Chants de Maxug"
 desc_bulgu_songs_of_maxug:0 "Maxug du clan des Guerriers-des-Routes était célèbre pour son inventivité et son goût du voyage. Il emmena son clan de l'Arbre de Pierre jusqu'au Dwarovar Occidental, apprenant des inventions et de l'infrastructure naines en chemin."
 bulgu_songs_of_shattering:0 "Chants de la Couronne Brisée"
 desc_bulgu_songs_of_shattering:0 "Le Clan de la Couronne Brisée est bien connu pour sa féroce résistance contre les aventuriers nains. Là où de nombreux clans d'Orques Noirs tombèrent en quelques années, ils combattirent sans relâche, cherchant un moyen de libérer Dookan malgré la menace existentielle pesant sur leur patrie."
 bulgu_songs_of_rowing:0 "Chants de la Rame"
 desc_bulgu_songs_of_rowing:0 "Durant les longs et mortels voyages à travers les océans que les orques d'Aelantir furent forcés d'endurer, ils forgèrent de nouveaux Chants pour créer de l'espoir dans des circonstances si sombres. Ces chants finirent par acquérir des rythmes pour pouvoir être utilisés quand ils étaient forcés de ramer les navires de leurs maîtres vers leurs destinations. Cette pratique économisait une énergie précieuse et revigorait les orques autrement déprimés. Maintenant cependant, ces Chants sont le fondement de ce qui sera un jour une culture navale orque."
 bulgu_songs_of_bordu:0 "Chants de Bordu Brise-Couronne"
 desc_bulgu_songs_of_bordu:0 "Bordu, qui serait plus tard connu sous le nom de Bordu Brise-Couronne, était un orque faisant partie de la horde qui prit Amldihr aux nains. On dit qu'il prit lui-même le Dwarovkron d'un roi nain. La légende raconte qu'il utilisa toute sa force pour plier la couronne naine pour qu'elle s'adapte à sa propre tête, en brisant des morceaux dans le processus. Ce jour-là, il devint Bordu Brise-Couronne, père du clan de la Couronne Brisée, chef d'Amldihr. Il passa la majeure partie de sa vie à unifier le vaste bastion d'Amldihr sous son seul clan et à apporter de la structure à une société autrement chaotique. Les Chants de lui parlent des nombreuses cicatrices qu'il reçut et des amis qu'il perdit en essayant d'unifier son bastion, quelque chose dont nous pouvons tous apprendre."
 #elven:0 "Elfique"
 elven_forebears:0 "Ancêtres elfiques"
 elven_forebears_religion_desc:0 "Originaire de leur temps perdu en mer, le peuple elfe, qui croyait avoir été abandonné par ses dieux pour permettre la tragédie connue sous le nom de Jour des Cieux Cendrés, se mit à révérer ses ancêtres à la place. On dit que chaque elfe doit s'harmoniser avec un héritage spécifique qui aidera les futurs membres de son clan."
 nur_dahvaraesa:0 "Nùr Dahvaraesa"
 nur_dahvaraesa_religion_desc:0 "Mouvement religieux initié par le Prophète Dahvar. Il exalte les Elfes des Étoiles comme héritiers divins d'Aelantir. Ils sont guidés par leurs ancêtres, qui sont renés comme étoiles dans la sphère céleste."
 soise_vio:0 "Soise Vio"
 soise_vio_religion_desc:0 "Un ensemble de philosophies guidant la politique de l'État pour la prochaine décennie."
 kayd_path:0 "Kayd"
 kayd_path_desc:0 "Voie de Kayd\nLa Philosophie de la Guerre, car ce n'est que par le feu et le sang que vous pouvez forger la plus grande nation du monde."
 kayd_tooltip:0 "Discipline : §G+2.5%§!\nDégâts d'artillerie depuis l'arrière : §G+10.0%§!"
 sicrheior_path:0 "Sicrheior"
 sicrheior_path_desc:0 "Voie de Sicrheior\nLa Philosophie de la Colonisation, car une nation doit toujours chercher de plus grandes conquêtes coloniales, jusqu'à ce que même les étoiles soient nôtres."
 sicrheior_tooltip:0 "Augmentation globale des colons : §G+20.00§!\nChance de soulèvement indigène : §G-25.0%§!"
 dahvar_path:0 "Dahvar"
 dahvar_path_desc:0 "Voie de Dahvar\nLa Philosophie de la Spiritualité, car une nation a besoin d'un esprit unifié pour pouvoir affronter la plus grande menace à son existence."
 dahvar_tooltip:0 "Force missionnaire : §G+3.0%§!\nTolérance de la vraie foi : §G+1.00§!"
 aelthanas_path:0 "Aelthanas"
 aelthanas_path_desc:0 "Voie d'Aelthanas\nLa Philosophie de la Prospérité, car un peuple riche qui n'a pas à se concentrer sur la survie peut mieux utiliser ses capacités pour développer la nation."
 aelthanas_tooltip:0 "Modificateur de biens produits : §G+10.0%§!"
 aist_cantir_path:0 "Aistcantir"
 aist_cantir_path_desc:0 "Voie d'Aistcantir\nLa Philosophie du Commerce, car nous devons diriger le commerce de toutes les mers du monde, car le monde est nous, et doit le rester pour toujours."
 aist_tooltip:0 "Puissance des caravanes : §G+20.0%§!\nPropagation de la puissance commerciale des navires : §G+20.0%§!"
 dea_cithe_path:0 "Deacithe"
 dea_cithe_path_desc:0 "Voie de Deacithe\nLa Philosophie de la Stabilité, car comme la Rianvisa nous l'a enseigné, la guerre ne devrait jamais être civile, et nos blaidd doivent toujours se tourner vers l'ennemi extérieur."
 dea_tooltip:0 "Révolte nationale : §G-1.50§!\nModificateur du coût de stabilité : §G-25.0%§!"
 dragon_cult:0 "Culte du Dragon"
 kobold_dragon_cult:0 "Culte du Dragon kobold"
 kobold_dragon_cult_religion_desc:0 "Le Culte du Dragon kobold est une collection lâche de sectes vénérant les dragons au sein de la société kobold. On dit que lorsque le plus grand trésor d'or du monde sera rassemblé aux Hauteurs-du-Dragon, le grand ancien père des dragons, Malliath lui-même, s'éveillera."
 nimrithan:0 "Nimrithan"
 nimrithan_religion_desc:0 "Originaire de Khugdihr d'une combinaison de cultistes humains et kobolds, le Nimrithan vénère le dragon Nimrith le Rouge comme le seul être véritablement digne d'adoration. De nos jours, des siècles après la mort de leur dieu, les derniers fidèles restants de la foi sont les diverses populations de Kobolds Écaille-Sombre dispersées à travers l'Échine du Serpent.\n\nLes fidèles Nimrithan croient que toute richesse doit être dirigée vers le trésor de Nimrith, comme ils le faisaient quand le dragon vivait. Ils espèrent qu'une fois Son trésor suffisamment grand, leur dieu bien-aimé reviendra dans le monde des vivants pour les guider à nouveau."
 xhazobkult:0 "Xhazobkulte"
 xhazobkult_religion_desc:0 "Le Xhazobkulte vénère les Xhazobines, des figures messianiques qu'on croit possédées par un Xhazob, un esprit démoniaque primordial que le folklore du Kulte considère comme les progéniteurs de leur race. Les Xhazobines précédentes ont été responsables d'invasions couvrant des continents et leurs réalisations brutales figurent en bonne place dans les traditions orales de nombreuses meutes gnolles.\n\nL'adhérence stricte au Xhazobkulte varie d'une région à l'autre. Pour certaines meutes, c'est un élément de fond de leur folklore aux côtés de croyances animistes et d'éléments syncrétiques des fois voisines. D'autres cependant prennent le Xhazobkulte très au sérieux, avec des traditions chamaniques organisées, des dîmes de sacrifices humains et des tentatives actives de provoquer la prochaine Xhazobine pour noyer le monde dans le sang."
 invocation_of_hellfire:0 "Invocation du Feu Infernal"
 desc_invocation_of_hellfire:1 "Les chamans canaliseront une partie des énergies démoniaques que nous avons amassées pour créer une tempête de démon-flamme émeraude pour brûler nos ennemis. Leurs corps noircis seront un témoignage approprié de notre puissance !"
 invocation_of_chains:0 "Invocation des Chaînes"
 desc_invocation_of_chains:1 "Les esprits et les corps des créatures inférieures sont facilement brisés par les magies démoniaques. Que nos chamans utilisent leurs pouvoirs infernaux pour voler l'esprit des Kerho et les lier à notre volonté !"
 invocation_of_blood:0 "Invocation du Sang"
 desc_invocation_of_blood:1 "Nous Gnolls partageons un héritage avec nos patrons infernaux. En dépensant une partie du pouvoir démoniaque, nous pouvons invoquer l'étincelle infernale profondément enfouie dans le sang de notre meute et pousser nos guerriers dans une frénésie sanglante !"
 invocation_of_gold:0 "Invocation de l'Or"
 desc_invocation_of_gold:1 "Le sang et la terreur c'est bien beau, mais l'or fait tourner le monde. Les démons accorderont à nos capitaines des langues d'or maudites qui embrouillent les esprits de leurs cibles, les rendant plus susceptibles aux raids comme aux accords défavorables."
 invocation_of_eyes:0 "Invocation des Yeux"
 desc_invocation_of_eyes:1 "En arrachant les yeux de la tête des esclaves, nos chamans peuvent dépenser du pouvoir démoniaque pour enchanter ces orbes abandonnés afin d'espionner à distance nos ennemis et voler leurs secrets."
 ritual_of_carrion:0 "Rituel de la Charogne"
 desc_ritual_of_carrion:1 "Consommer rituellement les morts est une pratique courante dans les sociétés gnolles. Ce faisant, nous acquérons la connaissance de nos ancêtres et empêchons leurs corps de se relever comme des Flétrisseurs hostiles et morts-vivants à cause des énergies démoniaques que nous avons exploitées."
 ritual_of_appeasement:0 "Rituel d'Apaisement"
 desc_ritual_of_appeasement:1 "Les démons ne sont pas les seules entités puissantes dans notre monde. Qu'ils soient Khet ou esprit de la nature, chacun a un prix pour son soutien. Renonçons aux dons que nous donnerions aux démons et faisons plutôt une offrande pour apaiser ces créatures."
 ritual_of_predation:0 "Rituel de Prédation"
 desc_ritual_of_predation:1 "Traiter avec des esprits démoniaques prélève son tribut sur la chair des gnolls même les plus forts. En organisant une grande chasse à la griffe et aux crocs, nous pouvons nous rapprocher d'un état plus naturel et nous purifier de leur influence profane."
 ritual_of_hunger:0 "Rituel de la Faim"
 desc_ritual_of_hunger:1 "Les démons sont des bêtes cupides, éternellement affamées, et leur influence tord l'esprit vers la gloutonnerie et la paresse. Un esprit affamé est un esprit aiguisé. Notre meute doit partir dans la nature sans nourriture ni abri pour garder nos têtes claires et tempérer les influences des démons."
 ritual_of_kinship:0 "Rituel de la Parenté"
 desc_ritual_of_kinship:1 "Nos patrons démoniaques fournissent de nombreuses aubaines, mais nous ne devons pas oublier que ce sont nous les Gnolls et la résilience de nos liens de meute qui nous rendent vraiment forts. Nous renoncerons aux sacrifices habituels et célébrerons plutôt avec un grand festin pour réaffirmer nos liens de sang et de parenté !"
 xhazobkult_light_the_pyres_tt:0 "Allumer les bûchers !\n--------------\nNous effectuerons des sacrifices de masse dans plusieurs provinces non-Xhazobkulte. Ce nombre augmente pour chaque §Y100§! de développement que nous avons, jusqu'à un maximum de §Y10§! provinces.\nChaque sacrifice réduira le développement de cette province d'un point dans chacune des §Y3§! catégories.\nNous recevrons §G+5.00%§! de Pouvoir Démoniaque."
 xhazobkult_light_the_pyres_cooldown_tt:0 "A un temps de recharge de §Y5§! ans."
 xhazobkult_light_the_pyres_100:0 "§Y1§! province sera affectée"
 xhazobkult_light_the_pyres_200:0 "§Y2§! provinces seront affectées"
 xhazobkult_light_the_pyres_300:0 "§Y3§! provinces seront affectées"
 xhazobkult_light_the_pyres_400:0 "§Y4§! provinces seront affectées"
 xhazobkult_light_the_pyres_500:0 "§Y5§! provinces seront affectées"
 xhazobkult_light_the_pyres_600:0 "§Y6§! provinces seront affectées"
 xhazobkult_light_the_pyres_700:0 "§Y7§! provinces seront affectées"
 xhazobkult_light_the_pyres_800:0 "§Y8§! provinces seront affectées"
 xhazobkult_light_the_pyres_900:0 "§Y9§! provinces seront affectées"
 xhazobkult_light_the_pyres_1000:0 "§Y10§! provinces seront affectées"
 kvangahga:0 "Kvangahga"
 kvangahga_religion_desc:0 "Kvangahga, « La Voie de Kvanga » en gnoll, est une religion ancienne qui vénère Kvanga, une déesse primordiale de la renaissance, du recyclage et de la reforge. Les adeptes du Kvangahga croient que la déesse est la créatrice des Gnolls, que lorsque le monde était jeune et sauvage, elle combattit les esprits bestiaux malveillants qui ravageaient Halann et les reforgea, liant leurs âmes renées aux corps des hyènes et en faisant des créatures capables de vertu. À cause de cette croyance, les Kvangahga voient leurs parents Xhazobkulte comme des âmes égarées qui ont cédé à leurs instincts les plus bas, mais qui sont capables d'être « reforgées » par l'étreinte de Kvanga.\n\nLa foi valorise l'efficacité, l'innovation et le pragmatisme et a une philosophie de « rien ne se perd », prenant des choses que d'autres considéreraient comme des déchets et les mettant à bon usage. Bien que la plupart des gnolls pratiquent l'endocannibalisme, l'acte a une révérence particulière pour les adeptes de Kvanga. C'est vu comme une façon d'honorer les morts tout en ne laissant rien se perdre. Les valeurs du Kvangahga sont bien représentées par les activités des artisans mystiques connus sous le nom de Saints-Forgerons ou Rram Zelags à l'est, et de Bergers-de-Charogne ou Vog Mekza à l'ouest. Ces saints hommes et femmes récupèrent, échangent et recyclent des objets naturels et artificiels pour les refaire en outils imprégnés de magie que les membres fidèles de leur meute peuvent utiliser. À travers ces actes de recyclage, ils croient accomplir la volonté de Kvanga, donnant un nouveau but aux choses non désirées."
 ancestral_armaments_aspect:0 "Armements ancestraux"
 desc_ancestral_armaments_aspect:0 "Les artisans mystiques ont incorporé les os de nos ancêtres honorés dans des armes et armures imprégnées de protections mystiques de résilience. La sagesse de combat des ancêtres coule à travers ces armements, inspirant nos guerriers à des prouesses."
 ancestral_armaments_aspect_tt:0 "Gagnez de la tradition militaire et des dégâts reçus réduits"
 ancestral_armaments_irkorzik_aspect_tt:0 "Gagnez de la tradition militaire et des dégâts reçus réduits"
 repurposed_relics_aspect:0 "Reliques reconverties"
 desc_repurposed_relics_aspect:0 "La gloire de Kvanga est évidente pour nous, mais nos parents du Xhazobkulte peuvent avoir besoin d'être convaincus. Peut-être que si nous leur montrons le pouvoir de Kvanga en reforgeant leurs icônes profanes en nos reliques bénies, cela facilitera la transition."
 repurposed_relics_aspect_tt:0 "Construisez un temple et gagnez de la force de conversion des hérétiques"
 reconditioned_tools_aspect:0 "Outils reconditionnés"
 desc_reconditioned_tools_aspect:0 "Bon marché et abondants, les outils enchantés faits de matériaux recyclés permettront à nos artisans de construire des bâtiments pratiques et rentables pour loger la population croissante de Gnolls migrant vers nos terres pour une vie libre du Xhazobkulte."
 reconditioned_tools_aspect_tt:0 "Gagnez du développement aléatoire et un coût de construction réduit"
 salvage_shipwrecks_aspect:0 "Récupérer les épaves"
 desc_salvage_shipwrecks_aspect:0 "Certains de nos artisans mystiques se sont mis à récupérer les épaves de navires sur et hors de la côte pour du matériel utilisable qui peut être reforgé pour faire des navires bon marché et durables."
 salvage_shipwrecks_aspect_tt:0 "Construisez deux navires lourds gratuits et gagnez de la durabilité des navires"
 recycled_jewellery_aspect:0 "Bijoux recyclés"
 desc_recycled_jewellery_aspect:0 "Nous trouvons de la beauté dans les choses que d'autres considèrent comme des déchets, et nos artisans mystiques ont le don de transformer même les rebuts les plus laids en œuvres d'art que des collectionneurs avisés paieront généreusement."
 recycled_jewellery_aspect_tt:0 "Gagnez des couronnes, du prestige passif et de la réputation diplomatique"
 trial_of_the_reforged_chain_aspect:0 "Épreuve de la Chaîne Reforgée"
 desc_trial_of_the_reforged_chain_aspect:0 "Chaque année, la population non-gnoll de notre royaume a l'opportunité de tenter l'Épreuve de la Chaîne Reforgée, où ils fabriqueront une arme ou un outil de leur cru et concourront dans une série de défis pour gagner un statut égal à leurs compatriotes gnolls. Que notre dirigeant choisisse un thème approprié pour l'épreuve de cette année. À mesure que nous acquérons de nouvelles ressources et technologies, les options disponibles augmenteront."
 trial_of_the_reforged_chain_aspect_tt:0 "Gagnez des conseillers à prix réduit des cultures acceptées"
 bulwari_sun_cult:0 "Nouveau Culte du Soleil"
 bulwari_sun_cult_religion_desc:0 "Nouveau Culte du Soleil est le nom donné à la principale dénomination du Culte du Soleil bulwari, et prétend que Jaher était Surael Réincarné et que puisque la lignée de Jaher s'est éteinte, son devoir divin en tant que Surael réincarné repose maintenant entre les mains du peuple elfe du soleil, et que le monde doit être uni par les elfes du soleil contre les Ténèbres Malveillantes. Les principaux enseignements de la foi sont centrés sur une vision dualiste du bien et du mal, et le combat éternel entre la lumière et les ténèbres.\n\nIls croient que tous les dieux sont morts, le dernier dieu, Surael, s'étant sacrifié pour devenir le soleil afin de tenir les Ténèbres Malveillantes à distance. Les adeptes du culte cherchent à protéger la Lumière en combattant les Ténèbres en rejetant les mensonges, la tristesse et le désespoir, en aidant les nécessiteux et en maintenant l'espoir. Le précepte principal de la religion est de servir les Élus, car ils sont la main de Surael sur Halann.\n\nLe Nouveau Culte du Soleil est la religion dominante de Bulwar, et le rôle des Élus dans la société varie d'un pays à l'autre."
 old_bulwari_sun_cult:0 "Ancien Culte du Soleil"
 old_bulwari_sun_cult_religion_desc:0 "Ancien Culte du Soleil est le nom donné aux différentes sectes du Culte du Soleil bulwari qui ont rejeté les prétentions que Jaher était Surael Réincarné et que les Elfes du Soleil étaient les Élus de Surael. Les principaux enseignements de la foi sont centrés sur une vision dualiste du bien et du mal, et le combat éternel entre la lumière et les ténèbres.\n\nIls croient que tous les dieux sont morts, le dernier dieu, Surakel, s'étant sacrifié pour devenir le soleil afin de tenir les Ténèbres Malveillantes à distance. Les adeptes du culte cherchent à protéger la Lumière en combattant les Ténèbres en rejetant les mensonges, la tristesse et le désespoir, en aidant les nécessiteux et en maintenant l'espoir, jusqu'au jour où Surakel reviendra.\n\nÀ l'exception de certaines tribus Mašnsih et des Maqeti, ils professent leur religion en secret, craignant la persécution des Inquisiteurs jahériens."
 old_bulwari_sun_cult_blessings:0 "Préceptes divins"
 pick_old_bulwari_sun_cult_blessing:0 "Choisir un précepte divin"
 prepare_the_return_of_surakel:0 "Préparer le retour de Surakel"
 shelter_the_remaining_light:0 "Abriter la Lumière restante"
 keep_the_light_of_your_children:0 "Garder la Lumière de vos enfants"
 speak_no_lies_dark_and_false:0 "Ne proférer aucun mensonge sombre et faux"
 let_shine_the_light_of_joy:0 "Laisser briller la Lumière de la joie"
 HOLY_SITE_601_DESC:0 "Bulwar est la plus grande cité et donne son nom à toute la région. Son complexe de temples est considéré par certains comme le plus ancien et le plus important de tous les temples bulwari. Bien que d'autres soient en désaccord, il est certainement tenu en grande estime par tous les cultes du soleil, vrais et faux, et c'est incontestablement l'un des trois grands temples de la région."
 HOLY_SITE_631_DESC:0 "Eduz-Vacyn abrite le plus grand temple de Bulwar et son clergé fut essentiel pour fournir un soutien religieux officiel à ceux sceptiques de la divinité de Jaher et de l'usurpation subséquente de la foi bulwari par les Elfes du Soleil."
 HOLY_SITE_643_DESC:0 "Azka-Sur est le troisième des grands temples de Bulwar. Bien que moins central dans la région, il commandait parfois le même respect qu'Eduz-Vacyn et Bulwar, et fut le dernier des grands temples à tomber face à l'avancée des Elfes du Soleil."
 HOLY_SITE_522_DESC:0 "Azka-szel-Azka est l'un des plus anciens forts de l'humanité, existant même à l'âge des Rois-Dieux. Il occupe une place spéciale dans les cœurs et les esprits des Bulwari comme la structure la plus ancienne de la région. On dit qu'il se dressait alors que Surakel combattait sur Halann, et la légende locale proclame que ses pierres furent posées par lui avant qu'il ne monte aux cieux."
 HOLY_SITE_5434_DESC:0 "Azka-szel-Udam est la forteresse de Dasma szel-Maqet, qui mena un groupe d'esclaves bulwari échappés vers le sud et fonda le royaume de Dasmazar. C'est là que de nombreuses traditions pré-Jaher furent maintenues vivantes et hors de l'influence des Elfes du Soleil, et ainsi son royaume resta un exemple pour tous ceux restant fidèles aux anciennes voies."
 the_jadd:0 "Le Jadd"
 the_jadd_religion_desc:0 "Jadd est le nom donné à la plus récente dénomination du Culte du Soleil bulwari. Fondé par Jaddar Jexiszuir, ils prétendent que tous les fidèles du Jadd furent Choisis par Surael pour combattre les Ténèbres, quelle que soit leur race. Les principaux enseignements de la foi sont centrés sur une vision dualiste du bien et du mal, et le combat éternel entre la lumière et les ténèbres.\n\nIls croient que tous les dieux sont morts, le dernier dieu, Surael, s'étant sacrifié pour devenir le soleil afin de tenir les Ténèbres Malveillantes à distance. Les adeptes du culte cherchent à protéger la Lumière en combattant les Ténèbres en rejetant les mensonges, la tristesse et le désespoir, en aidant les nécessiteux et en maintenant l'espoir. Le Jadd a déclaré la guerre aux Ténèbres Malveillantes et cherche activement à continuer la guerre sur Halann, tandis que Surael continue la guerre dans le ciel.\n\nTous ceux en dehors du Jadd ont la chance de se convertir et de devenir un Élu, et de rejoindre le Combat, ou de se déclarer serviteur des Ténèbres."
 harpy_cults:0 "Cultes harpies"
 the_hunt:0 "La Chasse"
 the_hunt_religion_desc:0 "La Chasse est le nom des croyances religieuses traditionnelles des harpies bulwari. Une foi animiste avec des éléments de culte des ancêtres, les enseignements de la Chasse sont transmis aux nouvelles générations par des chants, dont les thèmes incluent traditionnellement les histoires d'anciennes matriarches et les actions ou caractéristiques de certains oiseaux, entre autres sujets. Les chants fonctionnent de manière similaire aux fables, car leur fonction est de mener à une morale ou leçon pratique particulière sur comment être un chasseur, un idéal partagé par la plupart des sociétés harpies.\n\nLes harpies voient l'acte de chasser comme la poursuite de son objectif, qui pourrait être quelque chose de physique comme des compagnons ou des richesses, ou plus philosophique, comme la connaissance.\n\nBien que la Chasse n'ait aucune forme de clergé, chaque volée a un Chanteur, dont le devoir est de se souvenir des chants, de chanter lors des festivités et de transmettre leur connaissance à la génération suivante. Il est très courant qu'un chant varie d'une volée à l'autre."
 #gerudian:0 "Gérudien"
 skaldhyrric_faith:0 "Foi Skaldhyrrique"
 skaldhyrric_faith_religion_desc:0 "Fondée durant l'Éveil du Dragon, la Foi Skaldhyrrique est la religion dominante de Gérudia. Ils croient que réciter des contes magiques garde Elkaesal le Blanc, le dragon qui plongea Gérudia dans un hiver éternel, endormi et à distance."
 the_dragon_and_the_skald:0 "Conte 1"
 the_dragon_and_the_skald_desc:0 "§YLe Dragon et le Skald§!\nLe premier conte de la Foi Skaldhyrrique, Le Dragon et le Skald raconte l'origine de la foi elle-même. Il y a longtemps, au cinquième siècle, Gérudia sombra dans un profond hiver à cause d'un dragon monstrueux connu sous le nom d'Elkaesel le Blanc. Un brave Skald manchot partit courageusement affronter la bête, et la fit s'endormir par son chant. Depuis lors, la Foi Skaldhyrrique récite ce conte pour rappeler à tous leur histoire et combien elle dépend des Skalds."
 emp_the_dragon_and_the_skald:0 "Conte 1"
 emp_the_dragon_and_the_skald_desc:0 "§YLe Dragon et le Skald§!\nLe premier conte de la Foi Skaldhyrrique, Le Dragon et le Skald raconte l'origine de la foi elle-même. Il y a longtemps, au cinquième siècle, Gérudia sombra dans un profond hiver à cause d'un dragon monstrueux connu sous le nom d'Elkaesel le Blanc. Un brave Skald manchot partit courageusement affronter la bête, et la fit s'endormir par son chant. Depuis lors, la Foi Skaldhyrrique récite ce conte pour rappeler à tous leur histoire et combien elle dépend des Skalds."
 voyage_of_the_north_raider:0 "Conte 2"
 voyage_of_the_north_raider_desc:0 "§YVoyage du Pillard du Nord§!\nUn grand conte d'aventure en mer, le Voyage du Pillard du Nord est un favori des explorateurs cherchant de nouvelles terres. L'histoire raconte un navire appelé le Pillard du Nord qui fut violemment dévié de sa route. Pendant des semaines, l'équipage fut perdu en mer, puis ils se retrouvèrent dans une terre vierge pleine de richesses. Ils retournèrent chez eux avec des trésors de butin, mais hélas, ils ne purent jamais retrouver le chemin vers la terre des richesses."
 emp_voyage_of_the_north_raider:0 "Conte 2"
 emp_voyage_of_the_north_raider_desc:0 "§YVoyage du Pillard du Nord§!\nUn grand conte d'aventure en mer, le Voyage du Pillard du Nord est un favori des explorateurs cherchant de nouvelles terres. L'histoire raconte un navire appelé le Pillard du Nord qui fut violemment dévié de sa route. Pendant des semaines, l'équipage fut perdu en mer, puis ils se retrouvèrent dans une terre vierge pleine de richesses. Ils retournèrent chez eux avec des trésors de butin, mais hélas, ils ne purent jamais retrouver le chemin vers la terre des richesses."
 beralic_saga:0 "Conte 3"
 beralic_saga_desc:0 "§YSaga de Bera§!\nBera fut la fondatrice du Royaume de Bjarnrík, d'abord une Pilleuse acclamée puis l'unificatrice de la Vallée de Dalr. La Saga de Bera raconte le récit de son retour chez elle, quand elle chassa les Trolls qui avaient tourmenté sa patrie. Avec les forces unies des jarls dalriques et des Skalds, Bera vainquit Urgnak le Répugnant, bannissant à jamais les Trolls dans les Montagnes de Dalrfjall."
 emp_beralic_saga:0 "Conte 3"
 emp_beralic_saga_desc:0 "§YSaga de Bera§!\nBera fut la fondatrice du Royaume de Bjarnrík, d'abord une Pilleuse acclamée puis l'unificatrice de la Vallée de Dalr. La Saga de Bera raconte le récit de son retour chez elle, quand elle chassa les Trolls qui avaient tourmenté sa patrie. Avec les forces unies des jarls dalriques et des Skalds, Bera vainquit Urgnak le Répugnant, bannissant à jamais les Trolls dans les Montagnes de Dalrfjall."
 dirge_of_the_deep:0 "Conte 4"
 dirge_of_the_deep_desc:0 "§YDirge des Profondeurs§!\nUn conte sombre mais inspirant, le Dirge des Profondeurs est un récit des héros tombés de Gérudia qui furent enterrés en mer. Le Dirge a souvent lieu lors des services funéraires, mais on peut aussi le trouver dans les salles d'hydromel où des Pillards adultes et endurcis détournent la tête de tristesse."
 emp_dirge_of_the_deep:0 "Conte 4"
 emp_dirge_of_the_deep_desc:0 "§YDirge des Profondeurs§!\nUn conte sombre mais inspirant, le Dirge des Profondeurs est un récit des héros tombés de Gérudia qui furent enterrés en mer. Le Dirge a souvent lieu lors des services funéraires, mais on peut aussi le trouver dans les salles d'hydromel où des Pillards adultes et endurcis détournent la tête de tristesse."
 treasure_of_the_golden_forest:0 "Conte 5"
 treasure_of_the_golden_forest_desc:0 "§YTrésor de la Forêt Dorée§!\nUne légende originaire de Naugsvol, le Trésor de la Forêt Dorée est un conte de mise en garde sur la poursuite de la richesse. La Forêt Dorée est une clairière mythique, qu'on dit être au-delà des Montagnes du Repos des Titans, pleine de trésors en joyaux, fourrure et or. Bien des aventuriers sont partis trouver cette forêt, mais aucun ne l'a jamais trouvée. À travers les cols de montagne, on trouve des cadavres gelés, témoignage de l'insaisissabilité de la forêt. Le conte de la Forêt Dorée est raconté pour avertir ceux qui aspirent à la richesse de ne pas prendre trop de risques."
 emp_treasure_of_the_golden_forest:0 "Conte 5"
 emp_treasure_of_the_golden_forest_desc:0 "§YTrésor de la Forêt Dorée§!\nUne légende originaire de Naugsvol, le Trésor de la Forêt Dorée est un conte de mise en garde sur la poursuite de la richesse. La Forêt Dorée est une clairière mythique, qu'on dit être au-delà des Montagnes du Repos des Titans, pleine de trésors en joyaux, fourrure et or. Bien des aventuriers sont partis trouver cette forêt, mais aucun ne l'a jamais trouvée. À travers les cols de montagne, on trouve des cadavres gelés, témoignage de l'insaisissabilité de la forêt. Le conte de la Forêt Dorée est raconté pour avertir ceux qui aspirent à la richesse de ne pas prendre trop de risques."
 the_old_winter_lullaby:0 "Conte 6"
 the_old_winter_lullaby_desc:0 "§YL'Ancienne Berceuse de l'Hiver§!\nUn favori des nouveaux parents, l'Ancienne Berceuse de l'Hiver est une chanson apaisante qui endort même les nourrissons les plus turbulents. Curieusement, la Berceuse est parlée dans une langue que peu comprennent hormis les Skalds, sur un ton menaçant et guttural. Certains spéculent même que c'est exactement le conte que le Skald inconnu de la légende chanta au Dragon pour l'endormir."
 emp_the_old_winter_lullaby:0 "Conte 6"
 emp_the_old_winter_lullaby_desc:0 "§YL'Ancienne Berceuse de l'Hiver§!\nUn favori des nouveaux parents, l'Ancienne Berceuse de l'Hiver est une chanson apaisante qui endort même les nourrissons les plus turbulents. Curieusement, la Berceuse est parlée dans une langue que peu comprennent hormis les Skalds, sur un ton menaçant et guttural. Certains spéculent même que c'est exactement le conte que le Skald inconnu de la légende chanta au Dragon pour l'endormir."
 gjalund_and_the_giantslayers:0 "Conte 7"
 gjalund_and_the_giantslayers_desc:0 "§YGjalund et les Tueurs de Géants§!\nUn conte qui précède même Le Dragon et le Skald. Il y a longtemps, quand les Géants foulaient la terre, peu osaient s'opposer à eux. Gjalund, cependant, prit sa hache et tua de nombreux Géants lui-même, et en inspira beaucoup à suivre son exemple. Cependant, l'histoire de Gjalund prit fin quand le puissant Dragon commença son horrible hiver. Avec ses guerriers les plus intrépides, Gjalund mourut de froid en campant dans le crâne d'un géant mort."
 emp_gjalund_and_the_giantslayers:0 "Conte 7"
 emp_gjalund_and_the_giantslayers_desc:0 "§YGjalund et les Tueurs de Géants§!\nUn conte qui précède même Le Dragon et le Skald. Il y a longtemps, quand les Géants foulaient la terre, peu osaient s'opposer à eux. Gjalund, cependant, prit sa hache et tua de nombreux Géants lui-même, et en inspira beaucoup à suivre son exemple. Cependant, l'histoire de Gjalund prit fin quand le puissant Dragon commença son horrible hiver. Avec ses guerriers les plus intrépides, Gjalund mourut de froid en campant dans le crâne d'un géant mort."
 master_boat_builders_of_far_gerudia_beyond:0 "Conte 8"
 master_boat_builders_of_far_gerudia_beyond_desc:0 "§YMaîtres Constructeurs de Bateaux du Lointain Au-delà de Gérudia§!\nSouvent récité par les constructeurs de bateaux et les marins le long des nombreuses côtes de Gérudia, les Maîtres Constructeurs de Bateaux du Lointain Au-delà de Gérudia parle d'un immense et ancien chantier naval bien au-delà des mers gelées de Gérudia Lointaine. On dit que ce chantier naval est travaillé par de petites silhouettes pâles vêtues de fourrures chaudes, mais la partie impressionnante est les navires qu'ils produisent. D'énormes drakkars avec de massifs brise-glaces en acier sortiraient du chantier naval, construits d'un bois jamais vu auparavant."
 emp_master_boat_builders_of_far_gerudia_beyond:0 "Conte 8"
 emp_master_boat_builders_of_far_gerudia_beyond_desc:0 "§YMaîtres Constructeurs de Bateaux du Lointain Au-delà de Gérudia§!\nSouvent récité par les constructeurs de bateaux et les marins le long des nombreuses côtes de Gérudia, les Maîtres Constructeurs de Bateaux du Lointain Au-delà de Gérudia parle d'un immense et ancien chantier naval bien au-delà des mers gelées de Gérudia Lointaine. On dit que ce chantier naval est travaillé par de petites silhouettes pâles vêtues de fourrures chaudes, mais la partie impressionnante est les navires qu'ils produisent. D'énormes drakkars avec de massifs brise-glaces en acier sortiraient du chantier naval, construits d'un bois jamais vu auparavant."
 tale_of_leif_snaketongue:0 "Conte 9"
 tale_of_leif_snaketongue_desc:0 "§YConte de Leiv Langue-de-Serpent§!\nLeiv Langue-de-Serpent était un Gérudien ordinaire, né à Redgarhavn il y a de nombreuses années. Il était souvent ignoré, car il n'était pas béni de force ou de courage au combat. Mais son don était la ruse et le pouvoir de persuasion de ses mots. Leiv Langue-de-Serpent acheta un navire et recruta un équipage, à prix réduit bien sûr, et fit voile vers la Frontière Alénique. Là, il rencontra une étrange cité, nommée Celmaldor, habitée par les Elfes de Lune, de tous les peuples. Avec sa langue de serpent, Leiv convainquit les Elfes de l'élire comme chef de leur république."
 emp_tale_of_leif_snaketongue:0 "Conte 9"
 emp_tale_of_leif_snaketongue_desc:0 "§YConte de Leiv Langue-de-Serpent§!\nLeiv Langue-de-Serpent était un Gérudien ordinaire, né à Redgarhavn il y a de nombreuses années. Il était souvent ignoré, car il n'était pas béni de force ou de courage au combat. Mais son don était la ruse et le pouvoir de persuasion de ses mots. Leiv Langue-de-Serpent acheta un navire et recruta un équipage, à prix réduit bien sûr, et fit voile vers la Frontière Alénique. Là, il rencontra une étrange cité, nommée Celmaldor, habitée par les Elfes de Lune, de tous les peuples. Avec sa langue de serpent, Leiv convainquit les Elfes de l'élire comme chef de leur république."
 castan_ebonfrost:0 "Conte 10"
 castan_ebonfrost_desc:0 "§YL'Épopée d'Ebonfrost§!\nCertains disent que le pouvoir est leur droit de naissance. Qu'une couronne est portée par ceux d'une noble dynastie. C'est absurde : le pouvoir est gagné par ceux qui le saisissent. Le Castan Ebonfrost commença sa vie comme humble roturier dans les arrière-pays d'Urviksten, alors tributaire du déclinant Castanor. Gunnar Ebonfrost rejoignit un équipage de pillards et gagna sa vie par des tâches à la fois banales et violentes. L'Ebonfrost grandit en force et en gloire au fil des années, contribuant et menant des raids et sacs à travers le Dameshead et la Mer de Divenhal. Mais sa plus grande aventure fut le casse de Castanor lui-même : les dupant pour qu'ils l'acceptent comme gouverneur de Vrorenmarch, il se fraya un chemin à travers les tendres Castanoriens et se couronna Castan."
 emp_castan_ebonfrost:0 "Conte 10"
 emp_castan_ebonfrost_desc:0 "§YL'Épopée d'Ebonfrost§!\nCertains disent que le pouvoir est leur droit de naissance. Qu'une couronne est portée par ceux d'une noble dynastie. C'est absurde : le pouvoir est gagné par ceux qui le saisissent. Le Castan Ebonfrost commença sa vie comme humble roturier dans les arrière-pays d'Urviksten, alors tributaire du déclinant Castanor. Gunnar Ebonfrost rejoignit un équipage de pillards et gagna sa vie par des tâches à la fois banales et violentes. L'Ebonfrost grandit en force et en gloire au fil des années, contribuant et menant des raids et sacs à travers le Dameshead et la Mer de Divenhal. Mais sa plus grande aventure fut le casse de Castanor lui-même : les dupant pour qu'ils l'acceptent comme gouverneur de Vrorenmarch, il se fraya un chemin à travers les tendres Castanoriens et se couronna Castan."
 skcorin:0 "Conte 11"
 skcorin_desc:0 "§YLe Sacrifice de Corin§!\nComme un conte d'antan, la jeune vierge Corin tua le monstrueux Korgus Fils-de-Dookan. Bien qu'Escannienne, elle a légitimement mérité sa gloire, à tel point que certains la proclament déesse. Bien que sa divinité soit douteuse, son héroïsme ne l'est pas. Les hérétiques comme les traditionalistes de la Cour Régente ont tissé leurs propres contes de dieux et d'avatars : tissons le martyre de Corin dans notre propre livre de contes pour trouver un terrain d'entente avec eux."
 emp_skcorin:0 "Conte 11"
 emp_skcorin_desc:0 "§YLe Sacrifice de Corin§!\nComme un conte d'antan, la jeune vierge Corin tua le monstrueux Korgus Fils-de-Dookan. Bien qu'Escannienne, elle a légitimement mérité sa gloire, à tel point que certains la proclament déesse. Bien que sa divinité soit douteuse, son héroïsme ne l'est pas. Les hérétiques comme les traditionalistes de la Cour Régente ont tissé leurs propres contes de dieux et d'avatars : tissons le martyre de Corin dans notre propre livre de contes pour trouver un terrain d'entente avec eux."
 elven_voyages:0 "Conte 12"
 elven_voyages_desc:0 "§YVoyages Elfiques§!\nDepuis longtemps les Gérudiens ont navigué les mers pour la gloire et la fortune. Venant des mers occidentales, les Elfes ont séduit et subjugué les Cannoriens, et porté un coup vital au Castanor Noir. Leurs voyages à travers les mers, contes du passé lointain, et querelles politiques ont façonné le cours des siècles passés. Méditées et transcrites par les Skalds, les récits de la mythologie elfique et de leurs exploits sont racontés à travers toute Gérudia."
 emp_elven_voyages:0 "Conte 12"
 emp_elven_voyages_desc:0 "§YVoyages Elfiques§!\nDepuis longtemps les Gérudiens ont navigué les mers pour la gloire et la fortune. Venant des mers occidentales, les Elfes ont séduit et subjugué les Cannoriens, et porté un coup vital au Castanor Noir. Leurs voyages à travers les mers, contes du passé lointain, et querelles politiques ont façonné le cours des siècles passés. Méditées et transcrites par les Skalds, les récits de la mythologie elfique et de leurs exploits sont racontés à travers toute Gérudia."
 ebonsteel:0 "Conte 13"
 ebonsteel_desc:0 "§YEinherjar d'Acier Noir§!\nDerrière chaque héros se trouve son outil de métier. Hache et lance, bouclier et heaume, cor et marteau — les contes épiques sont forgés par l'artisanat de forgerons légendaires. Depuis les temps anciens, bien avant qu'Elkaesal le Blanc ne gèle Gérudia, les anciens Gérudiens forgeaient du métal noir comme le ciel nocturne. Des guerriers vêtus d'Acier Noir pourfendaient le fer commun, des boucliers résistaient aux barrages, et des montagnes furent sculptées en statues dans les Montagnes du Repos des Titans. L'art de forger l'Acier Noir avait été complètement perdu, jusqu'à maintenant."
 emp_ebonsteel:0 "Conte 13"
 emp_ebonsteel_desc:0 "§YEinherjar d'Acier Noir§!\nDerrière chaque héros se trouve son outil de métier. Hache et lance, bouclier et heaume, cor et marteau — les contes épiques sont forgés par l'artisanat de forgerons légendaires. Depuis les temps anciens, bien avant qu'Elkaesal le Blanc ne gèle Gérudia, les anciens Gérudiens forgeaient du métal noir comme le ciel nocturne. Des guerriers vêtus d'Acier Noir pourfendaient le fer commun, des boucliers résistaient aux barrages, et des montagnes furent sculptées en statues dans les Montagnes du Repos des Titans. L'art de forger l'Acier Noir avait été complètement perdu, jusqu'à maintenant."
 ambrstrond:0 "Conte 14"
 ambrstrond_desc:0 "§YAnnales d'Ambrströnd§!\nDécouvrant une nouvelle terre à travers les mers occidentales, les Gérudiens établirent la colonie d'Ambrströnd le long de la rivière Hjora. Appelée Dalaire par les gens du sud, cette terre semblait presque comme chez eux : des montagnes aux sommets glacés, de vastes étendues de forêts de pins et des fjords sinueux. Mais derrière cette façade accueillante se cachaient de nombreux dangers étranges : de la sève hallucinogène, du pergélisol à magie sauvage et les Skraelings toujours vigilants. Les journaux de la colonie primitive furent publiés en Gérudia et se révélèrent populaires comme contes d'aventure swashbuckling."
 emp_ambrstrond:0 "Conte 14"
 emp_ambrstrond_desc:0 "§YAnnales d'Ambrströnd§!\nDécouvrant une nouvelle terre à travers les mers occidentales, les Gérudiens établirent la colonie d'Ambrströnd le long de la rivière Hjora. Appelée Dalaire par les gens du sud, cette terre semblait presque comme chez eux : des montagnes aux sommets glacés, de vastes étendues de forêts de pins et des fjords sinueux. Mais derrière cette façade accueillante se cachaient de nombreux dangers étranges : de la sève hallucinogène, du pergélisol à magie sauvage et les Skraelings toujours vigilants. Les journaux de la colonie primitive furent publiés en Gérudia et se révélèrent populaires comme contes d'aventure swashbuckling."
 lineages_of_adventurers:0 "Conte 15"
 lineages_of_adventurers_desc:0 "§YLignées des Aventuriers Gérudiens§!\nL'Ère de Glace Noire ne fut pas seulement une ère de grandes aventures, mais aussi de conquête et d'établissement de royaumes gérudiens loin de leur patrie. Derrane par Derhilde Reine-Pilleuse, qui faillit renverser Lencenor. Pearlsedge par Henrik Fléau-du-Divenhal, écumant la Mer de Divenhal à bord de leurs drakkars. Drekiríki sur les cendres d'Oddansbay, perdu face aux kobolds sauvages. Reveria, défiant les puissants royaumes lorentais et gawedi. Et le plus grand de tous, le Castanor « Noir » saisi par les Ebonfrost régna autrefois sur presque la moitié de Cannor avant l'intervention de la Flotte des Vestiges elfique. À ce jour, de nombreuses dynasties de ces aventuriers gérudiens persistent à travers Cannor, témoignage de notre ténacité et adaptabilité."
 emp_lineages_of_adventurers:0 "Conte 15"
 emp_lineages_of_adventurers_desc:0 "§YLignées des Aventuriers Gérudiens§!\nL'Ère de Glace Noire ne fut pas seulement une ère de grandes aventures, mais aussi de conquête et d'établissement de royaumes gérudiens loin de leur patrie. Derrane par Derhilde Reine-Pilleuse, qui faillit renverser Lencenor. Pearlsedge par Henrik Fléau-du-Divenhal, écumant la Mer de Divenhal à bord de leurs drakkars. Drekiríki sur les cendres d'Oddansbay, perdu face aux kobolds sauvages. Reveria, défiant les puissants royaumes lorentais et gawedi. Et le plus grand de tous, le Castanor « Noir » saisi par les Ebonfrost régna autrefois sur presque la moitié de Cannor avant l'intervention de la Flotte des Vestiges elfique. À ce jour, de nombreuses dynasties de ces aventuriers gérudiens persistent à travers Cannor, témoignage de notre ténacité et adaptabilité."
 olav:0 "Conte 16"
 olav_desc:0 "§YOlav et Urvik, les Premiers Gérudiens§!\nPresque oublié dans le mythe, le conte d'Urvik et Olav est aussi vieux que la terre elle-même. Menant son peuple vers le nord au-delà des Jotuntars, Urvik fonda le premier foyer gérudien dans les Montagnes du Gel Noir — Urviksten. Forgeant des armures et des armes de légende en acier noir, Urvik et son fils Olav se retrouvèrent bientôt cibles des Trolls envieux. Le Rocher d'Urvik fut férocement défendu contre l'ennemi monstrueux, et avec lame d'acier noir et feu, nous chassâmes les bêtes jusqu'au Dalr ! Maintenant adulte lui-même, Olav succéda à son père et fonda Olavsborg, et a été immortalisé comme le père fondateur d'Olavlund."
 emp_olav:0 "Conte 16"
 emp_olav_desc:0 "§YOlav et Urvik, les Premiers Gérudiens§!\nPresque oublié dans le mythe, le conte d'Urvik et Olav est aussi vieux que la terre elle-même. Menant son peuple vers le nord au-delà des Jotuntars, Urvik fonda le premier foyer gérudien dans les Montagnes du Gel Noir — Urviksten. Forgeant des armures et des armes de légende en acier noir, Urvik et son fils Olav se retrouvèrent bientôt cibles des Trolls envieux. Le Rocher d'Urvik fut férocement défendu contre l'ennemi monstrueux, et avec lame d'acier noir et feu, nous chassâmes les bêtes jusqu'au Dalr ! Maintenant adulte lui-même, Olav succéda à son père et fonda Olavsborg, et a été immortalisé comme le père fondateur d'Olavlund."
 taychendi:0 "Taychendi"
 gods_of_the_taychend:0 "Cultes héroïques taychendi"
 gods_of_the_taychend_religion_desc:0 "Les Taychendi croient qu'on peut devenir un dieu par des actions légendaires dans la vie. Après leur mort, ces héros s'élèvent pour devenir des dieux par acclamation populaire. Les exploits qui permettent à quelqu'un d'accéder à la divinité varient considérablement, mais la voie la plus courante est par la guerre et le conflit. Quand on meurt sans ascensionner, on se réincarne à la place.\n\nDes cultes se sont souvent formés autour de ces dieux-héros, leurs membres émulant leur dieu pour gagner sa faveur et potentiellement suivre ses traces, afin d'avoir une meilleure chance d'ascensionner dans cette vie ou la prochaine. Ces cultes, tant les secrets que les populaires, sont très éminents dans la société taychendi et détiennent une grande influence religieuse et politique."
    taychend_glory_1:0 "Dirigeant mortel (Niveau 1)"
    taychend_glory_1_desc:0 "Le dirigeant n'a fait que peu. Ce n'est que par la force et la violence qu'il peut espérer gagner respect et autorité — sans parler d'une chance d'apothéose.\n\n§OGloire§! actuelle : [Root.TaychendGlory.GetValue]\n\nLe §YNiveau de Gloire§! augmente tous les 100 §OGloire§!\nSubjuguer un pays : §G+50§!\nIntégrer une province : §G+10§!\nMontrer sa supériorité sur un rival : §G+100§!\nGagner une guerre défensive de coalition : §G+100§!\nPerdre une bataille : §R-5§!\nUn rival montre sa supériorité sur nous : §R-100§!"
    taychend_glory_2:0 "Héros local (Niveau 2)"
    taychend_glory_2_desc:0 "Le dirigeant a accompli quelques exploits notables. Après sa mort, ceux qui lui furent loyaux de son vivant pourront le vénérer, mais personne d'autre.\n\n§OGloire§! actuelle : [Root.TaychendGlory.GetValue]\n\nLe §YNiveau de Gloire§! augmente tous les 100 §OGloire§!\nSubjuguer un pays : §G+50§!\nIntégrer une province : §G+10§!\nMontrer sa supériorité sur un rival : §G+100§!\nGagner une guerre défensive de coalition : §G+100§!\nPerdre une bataille : §R-5§!\nUn rival montre sa supériorité sur nous : §R-100§!"
    taychend_glory_3:0 "Légende grandissante (Niveau 3)"
    taychend_glory_3_desc:0 "Le dirigeant s'est fait un nom. Ses grands exploits assurent que son culte héroïque sera influent.\n\n§OGloire§! actuelle : [Root.TaychendGlory.GetValue]\n\nLe §YNiveau de Gloire§! augmente tous les 100 §OGloire§!\nSubjuguer un pays : §G+50§!\nIntégrer une province : §G+10§!\nMontrer sa supériorité sur un rival : §G+100§!\nGagner une guerre défensive de coalition : §G+100§!\nPerdre une bataille : §R-5§!\nUn rival montre sa supériorité sur nous : §R-100§!"
    taychend_glory_4:0 "Monarque divin (Niveau 4)"
    taychend_glory_4_desc:0 "Les récits des exploits légendaires du dirigeant se sont répandus, et les gens ont déjà commencé à établir un culte héroïque qui sera influent à travers Taychend.\n\n§OGloire§! actuelle : [Root.TaychendGlory.GetValue]\n\nLe §YNiveau de Gloire§! augmente tous les 100 §OGloire§!\nSubjuguer un pays : §G+50§!\nIntégrer une province : §G+10§!\nMontrer sa supériorité sur un rival : §G+100§!\nGagner une guerre défensive de coalition : §G+100§!\nPerdre une bataille : §R-5§!\nUn rival montre sa supériorité sur nous : §R-100§!"
    taychend_glory_5:0 "Souverain glorieux (Niveau 5)"
    taychend_glory_5_desc:0 "Les exploits du dirigeant sont si grands que beaucoup le considèrent égal à Ebenanth lui-même ! Il a inscrit son nom dans les livres d'histoire, pour ne jamais être oublié.\n\n§OGloire§! actuelle : [Root.TaychendGlory.GetValue]\n\nLe §YNiveau de Gloire§! augmente tous les 100 §OGloire§!\nSubjuguer un pays : §G+50§!\nIntégrer une province : §G+10§!\nMontrer sa supériorité sur un rival : §G+100§!\nGagner une guerre défensive de coalition : §G+100§!\nPerdre une bataille : §R-5§!\nUn rival montre sa supériorité sur nous : §R-100§!"
    taychend_deity_description: "[Root.taychend_defined_deity_text]"
   gods_of_the_taychend_reformed:0 "Culte héroïque taychendi"
   gods_of_the_taychend_reformed_religion_desc: "Les Taychendi croient qu'on peut devenir un dieu par des actions légendaires dans la vie. Après leur mort, ces héros s'élèvent pour devenir des dieux — à condition, bien sûr, que l'Empereur ne s'y oppose pas. Les exploits qui permettent à quelqu'un d'accéder à la divinité varient considérablement, mais la voie la plus courante est par la guerre et le conflit. Quand on meurt sans ascensionner, on se réincarne à la place.\n\nQuand Taychend fut unifié, l'État impérial prit grand soin de centraliser le système de croyances taychendi. Les cultes régionaux plus petits furent soit intégrés soit supprimés, leurs dieux devenant partie d'un nouveau panthéon taychendi standardisé. Le culte impérial devint répandu et parrainé par l'État, s'intégrant fermement dans la pratique religieuse taychendi."
    taychend_style_temperate:0 "Tempéré"
    taychend_style_temperate_desc:0 "À la manière des seigneurs de guerre prudents et sages du passé, notre dirigeant a décidé de régner avec une autorité tempérée, réfléchissant grandement avant de poursuivre toute action. Il règne justement et honorablement, comme un roi-philosophe."
    taychend_style_prosperous:0 "Prospère"
    taychend_style_prosperous_desc:0 "À la manière des seigneurs de guerre prospères du passé, notre dirigeant a décidé de se concentrer sur l'augmentation de la prospérité de son royaume durant son règne. Il a parrainé la construction de projets d'infrastructure massifs à travers le pays, et bâti les cités à une telle majesté que même les précurseurs seraient étonnés !"
    taychend_style_patron:0 "Mécène"
    taychend_style_patron_desc:0 "À la manière des seigneurs de guerre à l'esprit artistique du passé, notre dirigeant a décidé de définir son règne par la promotion des arts et des sciences, cherchant à rendre son royaume plus culturellement vibrant. De grands philosophes, sculpteurs et artistes affluent à la cour de ce mécène, en faisant la plus vibrante d'Aelantir."
    taychend_style_eminence:0 "Éminence"
    taychend_style_eminence_desc:0 "À la manière des seigneurs de guerre rusés du passé, notre dirigeant a décidé d'éviter la violence durant son règne, préférant utiliser les mots et l'encre pour atteindre ses objectifs. Il a fait de grands progrès pour unifier le royaume pacifiquement, et a de nombreux contacts étrangers."
    taychend_style_conqueror:0 "Conquérant"
    taychend_style_conqueror_desc:0 "À la manière des grands conquérants du passé, notre dirigeant a décidé d'émuler les monarques guerriers du passé comme Ebenanth et Yodhan, et n'est pas satisfait de l'étendue actuelle de nos terres. Il cherche à étendre le royaume, par la force si nécessaire."
    taychend_style_dreamer:0 "Rêveur"
    taychend_style_dreamer_desc:0 "À la manière des exclus amoraux du passé, notre dirigeant a décidé d'émuler les artificiers du présent, qui cherchent à repousser les limites de l'acceptable dans leur quête de pouvoir. Il cherche à repousser les limites de l'artificerie, quel qu'en soit le coût pour sa réputation."
    taychend_style_dynast:0 "Dynaste"
    taychend_style_dynast_desc:0 "À la manière des patriarches du passé, notre dirigeant a décidé de dédier son règne non seulement à combattre pour sa propre gloire, mais à propager la gloire que ses prédécesseurs ont atteinte, aidant à étendre l'influence de la famille impériale et de la foi dans son ensemble."
    taychend_style_universalist:0 "Universaliste"
    taychend_style_universalist_desc:0 "À la manière des héros qui ont adopté la religion taychendi par le passé, notre dirigeant a décidé de dédier son règne à incorporer les religions disparates de l'Empire sous la bannière de la religion taychendi."
    taychend_style_vainglorious:0 "Vaingloire"
    taychend_style_vainglorious_desc:0 "À la manière des grands, des audacieux, des fiers, des colériques, notre dirigeant a décidé de se dédier à surpasser tous ceux qui l'ont précédé. À étendre les frontières de l'empire, et le contrôle de l'empereur. À aller où personne n'est jamais allé, faire ce que personne n'a jamais fait. Le monde tremblera à son approche."
   oren_nayiru:0 "Oren Nayiru" #Uses same mechanics as Taychendi Hero Cults (gods_of_the_taychend)
   oren_nayiru_religion_desc:0 "Les Oren Nayiru sont une nouvelle religion radicale et millénariste, née de l'union du Culte taychendi de Vherenar et d'idées adoptées des Cultes du Soleil bulwari, introduites à Taychend par les Exemplaires Jahériens. Les Oren Nayiru croient que l'arrivée des Exemplaires annonçait le retour de Nayiru, le dernier membre survivant d'un groupe de dieux supérieurs, et qu'une guerre révolutionnaire pour renverser les dirigeants de Taychend et remodeler radicalement la société et le gouvernement est imminente.\n\nMilitantement abolitionnistes, la base principale de la foi est constituée des populations d'esclaves, de serfs et de paysans de Taychend. Ils sont menés par une classe de seigneurs de guerre-prêtres, les Kavalali, qui dirigent des « cellules », des communautés Oren Nayiru secrètes et compartimentées — les plus éminentes d'entre elles sont elles-mêmes dirigées par les « Hauts Kavalali », les chefs de la foi."
   oren_nayiru_reformed:0 "Oren Nayiru"
   oren_nayiru_reformed_religion_desc: "Les Oren Nayiru sont une nouvelle religion radicale et millénariste, née de l'union du Culte taychendi de Vherenar et d'idées adoptées des Cultes du Soleil bulwari, introduites à Taychend par les Exemplaires Jahériens. Les Oren Nayiru croient que l'arrivée des Exemplaires annonçait le retour de Nayiru, le dernier membre survivant d'un groupe de dieux supérieurs, et qu'une guerre révolutionnaire pour renverser les dirigeants de Taychend et remodeler radicalement la société et le gouvernement est imminente.\n\nMilitantement abolitionnistes, la base principale de la foi est constituée des populations d'esclaves, de serfs et de paysans de Taychend. Ils sont menés par une classe de seigneurs de guerre-prêtres, les Kavalali, qui dirigent des « cellules », des communautés Oren Nayiru secrètes et compartimentées — les plus éminentes d'entre elles sont elles-mêmes dirigées par les « Hauts Kavalali », les chefs de la foi."

  ynnic:0 "Ynnique"
   ynn_river_worship:0 "Culte de la Rivière Ynn"
   ynn_river_worship_religion_desc:0 "L'ancien monde fut noyé par le Déluge Final quand les eaux de l'Ynn s'élevèrent pour engloutir le monde entier. Toute vie découle de la sacrée Ynn et doit être respectée, et les morts doivent être déposés sur l'Ynn pour partir vers l'au-delà."
   ynn_river_reformed:0 "Culte Réformé de la Rivière Ynn"
   ynn_river_reformed_religion_desc:0 "L'ancien monde fut noyé par le Déluge Final quand les eaux de l'Ynn s'élevèrent pour engloutir le monde entier. Toute vie découle de la sacrée Ynn et doit être respectée, et les morts doivent être déposés sur l'Ynn pour partir vers l'au-delà. §GNous avons clarifié les préceptes de l'Ynn au milieu de ce monde changeant et sommes assurés dans notre culte et notre foi !§!"

