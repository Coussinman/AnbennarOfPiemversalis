 ACCRETIVE_PATH_ASPECTS_LONG:0 "Acte d'Illumination"
 ACCRETIVE_PATH_ASPECTS_SHORT:0 "acte"

accretive_path_acts_of_hermitage_minor:0 "Actes d'Ermitage"
desc_accretive_path_acts_of_hermitage_minor:0 "L'ermitage est un concept plutôt simple : on part vers les déserts, les montagnes et autres lieux isolés pour se séparer de la discorde, vivre en harmonie avec son environnement, ou entraîner son esprit et son corps sans distractions mondaines. Bien que rude pour beaucoup, une telle voie porte avec elle un immense honneur et une grande révérence."
accretive_path_acts_of_hermitage_major_unimproved:0 "Actes d'Ermitage"
desc_accretive_path_acts_of_hermitage_major_unimproved:0 "Les mois s'écoulent comme l'eau, les étés et les hivers passant sur l'ermite comme la pluie sur les montagnes. Le corps frissonne, transpire, souffre, mais se renforce néanmoins, et l'esprit devient aussi aiguisé que des brins d'herbe. L'ermite est isolé, mais pas inutile. Il cultive, construit, étudie, contemple comme n'importe qui, mais sans le fardeau de la diversion."
accretive_path_acts_of_hermitage_major_improved:0 "Actes d'Ermitage"
desc_accretive_path_acts_of_hermitage_major_improved:0 "Les années passent comme des feuilles dans le vent, les saisons allant et venant ; l'ermite s'en réjouit, mais ne s'accroche pas pour qu'elles restent. L'ermite est content, ni distrait ni accablé, aussi libre qu'un oiseau. Son corps est maintenant perfectionné, stable comme la pierre, énergique comme l'eau, son esprit flexible comme le bois tout en maîtrisant les émotions du feu. Et avec sa nature même aussi vertueuse que le métal, il a atteint la perfection dans l'isolement."
accretive_path_remembrance_festivals_minor:0 "Festivals du Souvenir"
desc_accretive_path_remembrance_festivals_minor:0 "Dans de nombreuses communautés, les festivals sont la forme suprême de culte, qu'il s'agisse d'un événement régulier ou d'un jour particulier du mois ou de l'année. Des icônes et des fresques sont ornées de visages récents et anciens, tous disparus de ce monde. De telles cérémonies apportent un sentiment de sérénité et de calme, non seulement aux habitants, mais aussi aux esprits qui les entourent."
accretive_path_remembrance_festivals_major_unimproved:0 "Festivals du Souvenir"
desc_accretive_path_remembrance_festivals_major_unimproved:0 "La préparation commence toujours plus tôt, plus certaine et habile. Les rôles sont exécutés comme une horloge : peinture, danse, sculpture, tout selon un grand dessein connaissable. Un rire doux emplit l'air aux côtés d'une contemplation silencieuse, sans que l'un ne domine l'autre. La célébration rend la vie plus supportable, les fardeaux et les peines plus faciles à porter, bien que non sans coût."
accretive_path_remembrance_festivals_major_improved:0 "Festivals du Souvenir"
desc_accretive_path_remembrance_festivals_major_improved:0 "Les cycles sont déterminés par le festival, les préparatifs commençant des semaines ou des mois à l'avance. Joie et chagrin fluctuent, cycles à embrasser plutôt qu'extrêmes vers lesquels tendre. Déploiements infinis de cérémonies et de traditions, des siècles exposés à travers une création maîtrisée, des lanternes éclipsant les étoiles, ancêtres et esprits honorés et apaisés."
accretive_path_sponsor_travelling_libraries_minor:0 "Parrainer les Bibliothèques-Chariots"
desc_accretive_path_sponsor_travelling_libraries_minor:0 "Des chariots partent vers l'horizon, chargés de rouleaux et de livres, entretenus par des philosophes et des érudits. Peu savent lire là-bas ; ainsi les pages sont lues à haute voix, sous des cieux d'azur ou de crépuscule. Le savoir est apporté des centres des empires et des sociétés vers les marges, villages ruraux et bourgs illuminés par la lumière des lanternes."
accretive_path_sponsor_travelling_libraries_major_unimproved:0 "Parrainer les Bibliothèques-Chariots"
desc_accretive_path_sponsor_travelling_libraries_major_unimproved:0 "Les chariots continuent sans entrave, ne s'arrêtant qu'au bord des rivières et aux marchés. Les ténèbres sont illuminées, la brume se dissipant des esprits qu'ils rencontrent. Ils sont acclamés partout où ils vont, que ce soit sur les pentes des hautes montagnes, le long des sentiers forestiers sinueux ou par les rudes pistes désertiques. L'ignorance persiste, cependant, et des intellectuels sont convoqués de la capitale ; toujours plus de lanternes sont allumées contre l'obscurité."
accretive_path_sponsor_travelling_libraries_major_improved:0 "Parrainer les Bibliothèques-Chariots"
desc_accretive_path_sponsor_travelling_libraries_major_improved:0 "L'illumination couvre la terre, illustre et resplendissante. Les villageois lisent tomes, rouleaux et livres, prennent des notes pour eux-mêmes, le savoir se portant plus loin que les chariots ne le pourraient jamais. Comme les lucioles qui entourent le chariot à la tombée de la nuit, la lumière du savoir se répand plus loin et plus vite maintenant ; nul besoin de lanternes, aussi libre que les rivières et le vent."
accretive_path_meditation_through_labour_minor:0 "Méditation par le Labeur"
desc_accretive_path_meditation_through_labour_minor:0 "Les fermiers partent à l'aube, suivant paresseusement le chemin vers leurs parcelles de riz et de légumes, tandis que les mineurs se dirigent vers leurs minerais et minéraux. Les deux travaillent dur toute la journée, le balancement d'une faux et d'une pioche créant un chœur, s'ils pouvaient seulement l'entendre."
accretive_path_meditation_through_labour_major_unimproved:0 "Méditation par le Labeur"
desc_accretive_path_meditation_through_labour_major_unimproved:0 "Les deux sont plus rapides maintenant, les muscles apprenant les tâches, l'esprit libre de vagabonder. Il médite d'abord sur le monde, puis au-delà, s'alignant comme les arbres au vent. Un tel labeur est intense, cependant, et beaucoup ont besoin de temps pour récupérer, se reposer et se régénérer."
accretive_path_meditation_through_labour_major_improved:0 "Méditation par le Labeur"
desc_accretive_path_meditation_through_labour_major_improved:0 "Ils s'éveillent à l'unisson, se dirigeant promptement vers leur labeur, leurs mains et leurs pieds se mouvant aussi vifs que la pluie et aussi directs que les rivières, accomplissant adroitement leurs objectifs du jour. Leur esprit gère mille tâches, n'échouant en aucune, glorieux dans sa lutte, harmonieux dans son effort."
accretive_path_fill_the_begging_bowls_minor:0 "Nourriture pour les Mendiants"
desc_accretive_path_fill_the_begging_bowls_minor:0 "Les mendiants sont omniprésents à travers la terre, des montagnes aux mers. Des cuisines sont installées, la nourriture est préparée, les feux sont attisés, bouillant, grillant, hachant. Du riz et des légumes fades, un peu de viande, pauvre mais nourrissant, suffisant pour durer la nuit. Des aumônes sont données, les pièces tintant dans les tasses et les bols."
accretive_path_fill_the_begging_bowls_major_unimproved:0 "Nourriture pour les Mendiants"
desc_accretive_path_fill_the_begging_bowls_major_unimproved:0 "Les feux grandissent, marmites et poêles et baguettes achetées et apportées de loin. Des conseillers sont dépêchés pour donner des fonds aux nécessiteux : la pauvreté est atténuée, des faveurs sont gagnées, la bonté remboursée en temps voulu."
accretive_path_fill_the_begging_bowls_major_improved:0 "Nourriture pour les Mendiants"
desc_accretive_path_fill_the_begging_bowls_major_improved:0 "Épices expertement émincées, riz magistralement cuit, perfection dans la grillade des viandes. La faim est vaincue, comme on terrasserait une bête moindre ou délogerait des bandits. Le rire est partagé autour des feux de camp, aussi énergique que les flammes près desquelles ils parlent. Les pièces tombent aussi vite que la pluie ; de nouvelles vies sont arrosées."
accretive_path_relive_past_lives_minor:0 "Revivre les Vies Passées"
desc_accretive_path_relive_past_lives_minor:0 "Le Chi coule à travers tout, et ainsi, il coule de vie en vie. Si l'on se concentre, on peut remonter la rivière, voir son passé. Le voyage est difficile ; les rapides du Chi rendent la progression difficile et brève. Rois, mages, philosophes ; la sagesse peut être glanée des grands hommes et femmes de l'histoire."
accretive_path_relive_past_lives_major_unimproved:0 "Revivre les Vies Passées"
desc_accretive_path_relive_past_lives_major_unimproved:0 "Nager est plus facile maintenant ; dépasser les rochers et les racines, voler à travers les eaux vers son but. Des expériences sont glanées, des souvenirs gagnés, des leçons apprises. Comment trier les vers du fromage ? Beaucoup de vies sont simplement ordinaires, fermiers et mineurs et esclaves, inutiles. Plus d'énergie, de temps et de ressources sont nécessaires pour dépasser ce blocage."
accretive_path_relive_past_lives_major_improved:0 "Revivre les Vies Passées"
desc_accretive_path_relive_past_lives_major_improved:0 "Couler en amont et en aval de la rivière, naviguant à travers les vies. Héros vertueux et méchants misérables, rois puissants et mendiants faibles, ceux qui ont vécu longtemps et ceux qui ont à peine eu le temps de vivre. Aucune expérience n'est inutile, aucun acte, action ou événement indigne d'étude ou impénétrable dans le détail. Dans la maîtrise de chaque vie, la préparation à toute situation est garantie."
accretive_path_universal_martial_education_minor:0 "Éducation pour les Aspirants"
desc_accretive_path_universal_martial_education_minor:0 "Parmi les moyens les plus basiques de cultiver son Chi personnel se trouve l'action répétitive attentive : le fermier qui arrose ses cultures pendant des mois, le peintre qui apprend la nature intime des azurs et des ocres, et bien sûr, l'artiste martial qui pratique ses postures et ses formes. Grâce à des instructeurs universellement accessibles, nos peuples bénéficient de l'accord de leur âme, tandis que l'État bénéficiera quand viendra le temps de la guerre."
accretive_path_universal_martial_education_major_unimproved:0 "Éducation pour les Aspirants"
desc_accretive_path_universal_martial_education_major_unimproved:0 "Le corps se meut par la volonté de l'âme ; par l'intentionnalité il y a le sens, et par le sens le but. Bouger, c'est croître ; s'arrêter, c'est devenir comme une pierre, dépourvu de vie, dépourvu de Chi. Ainsi, il est dans le meilleur intérêt de tous de continuer à bouger, de ne pas rester immobile et pourrir. Par les arts martiaux, le peuple accomplit cela, atteignant le but et la force de la vie cultivée."
accretive_path_universal_martial_education_major_improved:0 "Éducation pour les Aspirants"
desc_accretive_path_universal_martial_education_major_improved:0 "Répétition. Le corps coule comme l'eau s'adaptant à la terre ; au monde qui l'entoure. Le coup engendre le jeu de jambes. La forme suit la forme. L'artiste martial devient semblable à un bassin versant, son corps un système. À travers chaque frappe coule son Chi cultivé. À travers chaque frappe, la fluidité de l'eau. Par la répétition, les peuples de notre terre incarnent ce credo."
accretive_path_leadership_of_hero_monks_minor:0 "Direction des Moines-Héros"
desc_accretive_path_leadership_of_hero_monks_minor:0 "Nos troupes et généraux sont comme des fleurs dans un jardin. Ils poussent sauvagement et méchamment sans jardinier, mais avec les conseils de nos Moines, ils pousseront droits et forts."
accretive_path_leadership_of_hero_monks_major_unimproved:0 "Direction des Moines-Héros"
desc_accretive_path_leadership_of_hero_monks_major_unimproved:0 "La Moine se penche et s'incline dans le buisson d'épines. Elle dépouille le soldat des pousses vertes de la naïveté, et bientôt fleurit l'orchidée."
accretive_path_leadership_of_hero_monks_major_improved:0 "Direction des Moines-Héros"
desc_accretive_path_leadership_of_hero_monks_major_improved:0 "Chaque tête pétalie se tourne vers le soleil ; cherchant ses semblables, elle tend vers la nourriture. Comme la Moine a entretenu le jardin, maintenant le jardin entretient la Moine."
accretive_path_hire_sellsword_monks_minor:0 "Engager des Moines Mercenaires"
desc_accretive_path_hire_sellsword_monks_minor:0 "Une fois pleinement développée, une fleur s'épanouit, s'étirant haut et droit vers le soleil. Il en va de même pour les Moines, qui offrent leurs services non pour s'enrichir de l'or, mais pour l'expérience qui accompagne une profession aussi dangereuse. Ce sont des étapes importantes vers leur croissance future."
accretive_path_hire_sellsword_monks_major_unimproved:0 "Engager des Moines Mercenaires"
desc_accretive_path_hire_sellsword_monks_major_unimproved:0 "Hélas, trop de moines dans un régiment mèneront à des querelles, comme un pot partageant deux fleurs. Il n'y a que tant de place avant que les deux racines ne commencent à se battre pour les richesses du sol. Nous devons cultiver nos moines comme nous cultivons nos terres, avant que des problèmes graves ne surviennent."
accretive_path_hire_sellsword_monks_major_improved:0 "Engager des Moines Mercenaires"
desc_accretive_path_hire_sellsword_monks_major_improved:0 "Avec le temps, deux fleurs partageant un pot réussissent toutes deux ou rencontrent toutes deux leur fin. Tout comme nous avons réussi à cultiver notre État et notre terre, ainsi avons-nous cultivé nos Mercenaires. Batailles et guerres ont forgé de nos moines querelleurs de féroces frères d'armes. Un avenir florissant les attend."
accretive_path_liberation_of_the_mind_major_unimproved:0 "Ascension de l'Esprit"
desc_accretive_path_liberation_of_the_mind_major_unimproved:0 "L'esprit est l'une des choses les plus simples et pourtant les plus complexes. Comme une canne à pêche, on pêche pour se nourrir. Mais un pêcheur trop concentré sur sa tâche sera bientôt englouti par la mer. Un pêcheur inexpérimenté rentre chez lui ou peut se nourrir et laisser la mer prendre le dessus."
accretive_path_liberation_of_the_mind_major_improved:0 "Ascension de l'Esprit"
desc_accretive_path_liberation_of_the_mind_major_improved:0 "Celui qui conquiert la mer conquiert l'esprit. Savoir quand se concentrer sur soi-même et quand sur la mer. Un tel pêcheur rentrera toujours à la maison avec un filet plein."
accretive_path_liberation_of_the_soul_major_unimproved:0 "Ascension de l'Âme"
desc_accretive_path_liberation_of_the_soul_major_unimproved:0 "L'âme, la source de soi-même. Débordante d'énergie que notre corps et notre esprit peinent à comprendre et que nos corps peinent à exercer. Libérer notre âme mènera à de nouvelles richesses et de nouvelles voies. Mais sans discipline, une telle libération tourne en dérision nos devoirs."
accretive_path_liberation_of_the_soul_major_improved:0 "Ascension de l'Âme"
desc_accretive_path_liberation_of_the_soul_major_improved:0 "La véritable libération de l'âme réside dans l'harmonie de l'esprit et du corps. Chacun aspire à sa propre substance, mais ne peut exister sans l'autre. C'est notre devoir de nous discipliner et d'harmoniser ces deux forces opposées, afin que nos esprits puissent être libérés."
accretive_path_liberation_of_the_body_major_unimproved:0 "Ascension du Corps"
desc_accretive_path_liberation_of_the_body_major_unimproved:0 "Le corps est le fondement du soi. Il est l'hôte de l'esprit et de l'âme, et ne peut être simplement laissé derrière. Comme un fondement approprié, il nécessite de la nourriture ; la force de l'âme et de l'esprit sont bâties sur lui. Là où le fondement s'effondre, la maison n'est pas loin derrière."
accretive_path_liberation_of_the_body_major_improved:0 "Ascension du Corps"
desc_accretive_path_liberation_of_the_body_major_improved:0 "Ce n'est qu'une fois le temple entier planifié que le fondement est bâti ; sans planification, le Temple ne pourrait jamais abriter l'Esprit et l'Âme. Un fondement trop petit et le Temple ne tient pas dessus. Trop large, et l'on gaspille trop de ressources pour pouvoir se permettre le Temple lui-même. Chaque temple a son propre fondement ; en les étudiant, nous apprenons sur nous-mêmes. Sinon, tout s'effondrera tôt ou tard."
accretive_path_river_flows_in_you_minor:0 "Le Ruisseau Coule en Toi"
desc_accretive_path_river_flows_in_you_minor:0 "Les gens sont comme des rivières, coulant souvent d'un endroit à l'autre : de la maison au travail, en tant que marchands d'un pays à l'autre, en tant que guerriers d'un champ de bataille au suivant. En tant qu'État, nous avons l'influence et le pouvoir de diriger ce flux humain vers un étang plus prospère."
accretive_path_river_flows_in_you_major_unimproved:0 "La Rivière Coule en Toi"
desc_accretive_path_river_flows_in_you_major_unimproved:0 "Tout comme avec les rivières, s'il y a trop d'eau, les berges éclateront, débordant et causant d'immenses dommages sur leur passage. En de tels temps, les eaux abondantes de la rivière se déverseront par-delà les frontières, incontrôlées."
accretive_path_river_flows_in_you_major_improved:0 "Le Yanhe Coule en Toi"
desc_accretive_path_river_flows_in_you_major_improved:0 "Avec le temps, même les rivières nées de calamités se calmeront. Un chemin solide est creusé dans le sol, usé par des années d'eaux indisciplinées et débordantes suivant leur cours. Ainsi, il n'est pas surprenant que de nombreux moines contemplent une rivière et son reflet, et s'en inspirent dans la cultivation de leur Chi."
accretive_path_words_aflame_minor:0 "Mots en Étincelles"
desc_accretive_path_words_aflame_minor:0 "Le corps cultivé n'est rien sans un esprit cultivé ; l'esprit exige le savoir et le Chi à parts égales. Par un calcul et une redirection minutieux du Chi, les pensées couleront avec lui et viendront à l'esprit comme des éclairs, des étincelles et des braises."
accretive_path_words_aflame_major_unimproved:0 "Mots Enflammés"
desc_accretive_path_words_aflame_major_unimproved:0 "Les pensées peuvent consumer, et par cette consommation engendrer l'obsession. Le peuple Gangim exploite cela à grand effet par une forme de pratique méditative accomplie dans les sources chaudes ; ils canalisent leur Chi intérieur pour attiser cette flamme d'obsession, la flamme d'un but unique qui alimente l'innovation et la découverte."
accretive_path_words_aflame_major_improved:0 "Mots Embrasés"
desc_accretive_path_words_aflame_major_improved:0 "Un esprit curieux brûle ; mots et pensées coulent à travers son être ; la flamme alimente des sommets d'accomplissement toujours plus grands. La plupart des feux de ce type sont rapidement réduits en cendres, mais pas ici, où la flamme est éternellement alimentée en combustible. Le Chi du soi, le Chi des eaux de sources chaudes, le Chi de la nature qui imprègne tout, peuvent y couler et en sortir. Comme en haut, ainsi en bas."
accretive_path_serenity_in_rock_and_stone_minor:0 "Calme dans les Briques"
desc_accretive_path_serenity_in_rock_and_stone_minor:0 "Roche et Pierre, châteaux et murs ; chacun orne les halls des Guerres de Haless. Ils se forment aussi naturellement que les berges le long des rivières et les falaises près des mers tempétueuses. Naturellement, les généraux les voient comme une facette de plus du don de la nature ; de précieux bâtiments qui protègent les richesses et la prospérité dans leur ombre."
accretive_path_serenity_in_rock_and_stone_major_unimproved:0 "Calme dans les Briques"
desc_accretive_path_serenity_in_rock_and_stone_major_unimproved:0 "Et tandis que nous les construisons, garnir de tels murs a un prix. Tout comme dans la nature, toutes choses ont un coût. Nous ne déplaçons pas que terre et roche, mais des gens et des familles, des casernes et des armureries, des forgerons et leurs outils. Sommes-nous capables de supporter un tel fardeau ?"
accretive_path_serenity_in_rock_and_stone_major_improved:0 "Calme dans les Briques"
desc_accretive_path_serenity_in_rock_and_stone_major_improved:0 "Et avec le temps, notre dévouement et notre maîtrise ont cultivé notre savoir. Comme une falaise, les eaux de la discipline érodent tous les éperons avec le temps. Seule la pierre nécessaire demeure."
accretive_path_the_second_ascension_minor:0 "Ascension Mineure"
desc_accretive_path_the_second_ascension_minor:0 "Parmi tant de choses que la nature et la vie nous donnent, la plus recherchée est simplement plus de temps : plus de temps pour explorer, plus de temps pour profiter, plus de temps pour chérir, plus de temps pour rassembler la sagesse. Beaucoup de moines partent en quête pour développer leur Chi, pour repousser leurs limites, s'inspirant souvent des vieux animaux et de leurs esprits. Après tout, la sagesse vient de l'expérience et du temps."
accretive_path_the_second_ascension_major_unimproved:0 "Voie de l'Ascension"
desc_accretive_path_the_second_ascension_major_unimproved:0 "Mais contrairement à certains animaux, bénis de longues vies, les gens sont invisiblement liés à une horloge. Certains peuvent même sentir ce lien, et tireront contre sa tension, se tordant et se contorsionnant de manière inconvenante. De tels mouvements sont visibles, contrairement aux fils du temps et de la mort."
accretive_path_the_second_ascension_major_improved:0 "La Seconde Ascension"
desc_accretive_path_the_second_ascension_major_improved:0 "Mais comme les Moines, avec soin et cultivation, apprenant des actes et actions de ceux qui sont venus avant, nous pouvons bâtir un temple de connaissance. Nous pouvons nous installer confortablement dans notre lien, relâchant la corde pour quelques heures de plus avant que l'horloge ne s'épuise. C'est au moins assez de temps pour préparer le suivant d'entre nous, et laisser le soin du Temple au prochain tandis que nous passons à autre chose."
accretive_path_tea_ceremonies_minor:0 "Formalités du Thé"
desc_accretive_path_tea_ceremonies_minor:0 "Dans les champs, les feuilles sont récoltées, descendues dans les maisons du village, où elles sont bouillies et préparées. Deux s'agenouillent, l'un versant dans la porcelaine, les deux tenant leurs tasses à deux mains. Ils boivent, goûtant la saveur, avant de parler. La formalité apporte un sentiment de sérénité."
accretive_path_tea_ceremonies_major_unimproved:0 "Cérémonies du Thé"
desc_accretive_path_tea_ceremonies_major_unimproved:0 "La tradition s'étend ; de nombreuses bouilloires bouillent à travers le village, préparation expérimentée de nouveaux mélanges. Un groupe s'assoit, l'hôte passant la bouilloire, distribuant le breuvage. Un invité le remercie gracieusement, portant sa tasse à ses lèvres. Il recrache le thé ; un goût qui reste à acquérir."
accretive_path_tea_ceremonies_major_improved:0 "Rituels du Thé"
desc_accretive_path_tea_ceremonies_major_improved:0 "Grande préparation, mélanges et saveurs élaborés, techniques peaufinées pendant des décennies par des maîtres de leur art. La ville se rassemble, un festival de commerce. Paires et groupes, amis et étrangers, vieux et jeunes ; chacun boit du breuvage de la prospérité, qui coule proche et loin."
accretive_path_teachings_of_balris_minor:0 "Enseignements de Balris"
desc_accretive_path_teachings_of_balris_minor:0 "Il n'y a pas de terre dans tout Haless qui ne connaisse les monastères de Balrijin, les fils et filles du grand dragon Balris dispensant leur sagesse à quiconque voudrait l'entendre. Une telle voie est dangereuse, cependant, et ainsi seules quelques dizaines font le voyage. Ils traversent des champs vallonnés et des terres cultivées, vers les montagnes du nord où, parmi les temples, ils se font connaître."
accretive_path_teachings_of_balris_major_unimproved:0 "Enseignements du Doré"
desc_accretive_path_teachings_of_balris_major_unimproved:0 "Des bannières flottent au vent tandis que des centaines font le trek, passant des relais et des auberges construits pour les aider, vers le lieu dont on chante les louanges, le lieu dont les tapisseries ne peuvent qu'à moitié afficher la majesté. L'avidité court partout, cependant. Beaucoup ne peuvent résister à l'attrait de la richesse, grimpant jusqu'au sommet simplement pour attraper des écailles égarées, des bibelots à vendre dans les marchés des basses terres."
accretive_path_teachings_of_balris_major_improved:0 "Enseignements de l'Aurique"
desc_accretive_path_teachings_of_balris_major_improved:0 "Temples et monastères, dorés de connaissance, bénis d'un flux éternel de philosophie vertueuse. Chaque jour, des milliers affluent en haut et en bas des marches, que ce soit par la lumière du soleil ou des lanternes, l'éclat d'écailles sages les guidant vers la sagesse et l'illumination. Et parmi ces pics dorés, les scions écailleux enseignent les voies de leur vertueux Dragon de l'Aube, le Seigneur Aurique Balris."
accretive_path_sages_of_the_misty_mountains_minor:0 "Sages des Brumes et des Hauts"
desc_accretive_path_sages_of_the_misty_mountains_minor:0 "Moines et sages arpentent les hautes terres de haut en bas, les yeux scrutant pour trouver leur chemin, chaque pas atterrissant sur des rochers hasardeux et des corniches précaires. L'ascension laborieuse prend des heures, dents serrées et muscles douloureux, tandis que chaque initié se fraie un chemin vers le sommet des hautes terres. Et pourtant, que si peu puissent emprunter cette voie est une bénédiction."
accretive_path_sages_of_the_misty_mountains_major_unimproved:0 "Sages des Brouillards et des Collines"
desc_accretive_path_sages_of_the_misty_mountains_major_unimproved:0 "Le chemin est plus facile ; yeux, jambes, bras, mains, tous se mouvant en harmonie, ascendant comme un seul. L'entraînement commence, des sages habiles à la lance patrouillent les landes, leurs capes de brume leur accordant une invisibilité adroite. Mais le chemin est un fardeau pour tant de monde."
accretive_path_sages_of_the_misty_mountains_major_improved:0 "Sages des Montagnes Brumeuses"
desc_accretive_path_sages_of_the_misty_mountains_major_improved:0 "Les hommes et les femmes serpentent sur les montagnes, dansant à travers le péril, l'eau coulant vers les plus hauts terrains. En temps de paix, les sherpas guident le chemin, marchands et voyageurs bergers sous la protection sagace. En temps de guerre, des yeux dans les collines, des lances dans la brume, un ennemi à juste titre inquiet."
accretive_path_temples_for_warriors_major_unimproved:0 "Sanctuaires pour Guerriers"
desc_accretive_path_temples_for_warriors_major_unimproved:0 "Placeholder"
accretive_path_temples_for_warriors_major_improved:0 "Temples pour Guerriers"
desc_accretive_path_temples_for_warriors_major_improved:0 "Placeholder"

 TRANSMUTATIVE_PATH_ASPECTS_LONG:0 "Acte d'Harmonie"
 TRANSMUTATIVE_PATH_ASPECTS_SHORT:0 "acte"

 transmutative_path_acts_of_hermitage:0 "Actes d'Ermitage"
 desc_transmutative_path_acts_of_hermitage:0 "Tous les Objets sont définis par le Lieu et la Substance :\nKülfo passe la porte de pierre du dzong\nil est ailleurs, autre chose.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! le §YDéveloppement Fiscal§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_rememberance_festival:0 "Festivals du Souvenir"
 desc_transmutative_path_rememberance_festival:0 "Le Chi coule à travers le cadavre aussi facilement que le corps :\nHezhei pleure sans réserve, gémissant vers le ciel\nne craignant ni la pourriture ni l'attachement.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YRéduire§! l'§YAgitation§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_sponsor_travelling_libraries:0 "Parrainer les Bibliothèques Itinérantes"
 desc_transmutative_path_sponsor_travelling_libraries:0 "Si nous n'avions pas de souffle, nos mots silencieux porteraient encore le Chi :\nLe chariot frêle de Lan s'arrête près des bains\nsilencieux, il promet le monde.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! l'§YAdoption des Institutions§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_meditation_through_labour:0 "Méditation par le Labeur"
 desc_transmutative_path_meditation_through_labour:0 "Ne demandez pas qui vous êtes, mais ce que vous êtes :\nDans la cour, Gao s'efforce et sue sa chair\nIci aussi, il sculpte le Chi.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! le §YDéveloppement de Production§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_fill_the_begging_bowls:0 "Remplir les Bols des Mendiants"
 desc_transmutative_path_fill_the_begging_bowls:0 "Quelle que soit sa forme, le Chi ne peut être détruit :\nUn lancer paresseux et languide de la pièce\net Maira n'a rien perdu du tout.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! la §YProsperité§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_relive_past_lives:0 "Revivre les Vies Passées"
 desc_transmutative_path_relive_past_lives:0 "Le pot se souvient de l'argile :\nSang parle en Substance, remoule sa propre matière\net se refuse mille possibilités.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YRéduire§! le §YSéparatisme§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_universal_martial_education:0 "Éducation pour les Aspirants"
 desc_transmutative_path_universal_martial_education:0 "Le roi ne détient pas plus de Chi que le paysan :\nL'astucieux Hiderion moule cent mille briques\nune arme de la Substance d'un peuple.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! le §YDéveloppement Militaire§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_leadership_of_hero_monks:0 "Direction des Moines-Héros"
 desc_transmutative_path_leadership_of_hero_monks:0 "La Substance cède à la Substance :\nDans l'ombre de Houxi, cent épéistes se tiennent\nimitant un instant sa posture.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YRéduire§! le §YCoût des Régiments§! et le §YTemps de Recrutement§! en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_hire_sellsword_monks:0 "Engager des Moines Mercenaires"
 desc_transmutative_path_hire_sellsword_monks:0 "Aucune hiérarchie n'existe pour la Substance :\nLe Chi de dix seigneurs de guerre silhouette la rusée Keo Hua\ncoulant le long de rivières d'or.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! l'§YAttrition Hostile§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_everything_under_heaven:0 "Tout Sous le Ciel"
 desc_transmutative_path_everything_under_heaven:0 "Toute matière est matière, toutes choses une :\nAgenouillé près du ruisseau, Gao tire sa tasse en bois\net siphonne juste un peu pour ses besoins.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! la §YValeur Fiscale§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_through_inaction_action:0 "Par l'Inaction, l'Action"
 desc_transmutative_path_through_inaction_action:0 "Le moine au repos forme un point d'appui pour le monde :\nJehyu est assise au centre de la roue\nà travers ses cent mille rayons, elle tourne tout.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! la §YProduction de Biens§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_we_all_lift_together:0 "Nous Soulevons Tous Ensemble"
 desc_transmutative_path_we_all_lift_together:0 "Cent triangles forment un treillis :\nle jour où les cent monastères prieront comme un seul\nils fendront Phokhao lui-même.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! les §YEffectifs§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_the_second_ascension:0 "La Seconde Ascension"
 desc_transmutative_path_the_second_ascension:0 "Ce qui a été fait peut être refait :\nLe moule du glorieux Harimar est vide\nattendant seulement le feu de forge.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! la §YProsperité§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_tea_ceremonies:0 "Cérémonies du Thé"
 desc_transmutative_path_tea_ceremonies:0 "Première parmi les transmutations est l'Addition :\nLa réservée Ka Lam absorbe à chaque gorgée\nle Chi cruel et déterminé du règne.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YJungle§! en §YThé§! en dépensant §Y50§! Chi !"
 transmutative_path_from_strings_to_silk:0 "Des Fils à la Soie"
 desc_transmutative_path_from_strings_to_silk:0 "Nul ne peut prédire le flux transformateur du Chi :\nLe ver bout dans son cocon, meurt dans une douleur hurlante\nsur une fine cheongsam de soie, Yong coud le papillon.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YTissu§! en §YSoie§! en dépensant §Y50§! Chi !"
 transmutative_path_dowsing_for_metals:0 "Radiesthésie des Métaux"
 desc_transmutative_path_dowsing_for_metals:0 "La terre saignera pour ceux qui peuvent imaginer le couteau :\nAyahati plonge ses doigts dans le sol\net les veines mortifères chantent en réponse.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YMontagne§!, §YCollines§! et §YHautes Terres§! en §YCuivre§! en dépensant §Y50§! Chi !"
 transmutative_path_muzzle_the_ox:0 "Museler le Bœuf"
 desc_transmutative_path_muzzle_the_ox:0 "Une vie épargnée est une vie redevable :\nLa charrue-Chi creuse des sillons dans la courtepointe de terre\nNous sommes raccommodés, nous sommes raccommodés.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YCéréales§! en §YBétail§! en dépensant §Y50§! Chi !"
 transmutative_path_strip_the_scales:0 "Dépouiller les Écailles"
 desc_transmutative_path_strip_the_scales:0 "Le Chi est un océan, nos vies de simples îles :\nDu bleu infini, Nhitrac conçoit un saphir\net imagine le poisson-lait magnifique.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YPoisson§! en §YGemmes§! en dépensant §Y50§! Chi !"
 transmutative_path_sages_of_the_misty_mountains:0 "Sages des Montagnes Brumeuses"
 desc_transmutative_path_sages_of_the_misty_mountains:0 "Ne négligez pas l'aspect du Lieu :\nLe solide Jiong connaît bien les myriades de Substances de son pic\nsi petite chose que de faire de l'une une autre.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! la §YVitesse de Mouvement Hostile§! en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_weaving_weal:0 "Tisser le Bien-Être"
 desc_transmutative_path_weaving_weal:0 "Le Chi de l'amour adoucit le riz de grand-mère :\nMême Harimar ne maniait pas le pouvoir d'un manteau rembourré\npour réchauffer l'enfant hanté la nuit.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YCoton§! en §YTissu§! en dépensant §Y50§! Chi !"
 transmutative_path_dessicate_landscape:0 "Dessécher le Paysage"
 desc_transmutative_path_dessicate_landscape:0 "La matière n'est jamais détruite, seulement changée et changée encore :\nDans les brumes de chaleur, Dhantha aperçoit le Chi vacillant\net sait que rien ne peut vraiment mourir.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YDésert§! ou de §YTerres Arides§! en §YSel§! en dépensant §Y50§! Chi !"
 transmutative_path_dredge_the_flats:0 "Draguer les Plaines"
 desc_transmutative_path_dredge_the_flats:0 "En temps de guerre, manger c'est être riche :\nDamrong voit dans chaque grain de sel\nchaque prix gonflé, chaque vol désespéré.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YAugmenter§! la §YProduction de Biens§! de nos provinces en dépensant §Y50§! Chi dans l'une de nos §YProvinces Préférées§ !"
 transmutative_path_threadeth_the_corn:0 "Filer le Grain"
 desc_transmutative_path_threadeth_the_corn:0 "Le sage invite le mépris des habiles :\nNang Keo montre la Voie à chaque agneau, chaque veau\ndix mille âmes sont illuminées.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YCéréales§! en §YBétail§! en dépensant §Y50§! Chi !"
 transmutative_path_irrigate_jungle_plantations:0 "Irriguer les Plantations de Jungle"
 desc_transmutative_path_irrigate_jungle_plantations:0 "Agir et être agi est la nature du Chi :\nÀ travers les mille canaux d'Ai Yuna coule sa volonté liquide\nles arbres cèdent à cette hubris ; il ne ressent aucune honte.\n--------------\nTant que cet aspect est utilisé, nous pouvons §YChanger§! les §YBiens Commerciaux§! des provinces de §YJungle§! en §YCafé§! en dépensant §Y50§! Chi !"
 transmutative_path_hon_sai_ghost_emperor:0 "Hon-Sai l'Empereur Fantôme"
 desc_transmutative_path_hon_sai_ghost_emperor:0 "Le pouvoir sur la Substance est pouvoir sur la vie :\nDu Chi de l'autorité, l'Empereur se façonne\nune immobilité imposée au cycle."
 transmutative_path_temples_for_warriors:0 "Temples pour Guerriers"
 desc_transmutative_path_temples_for_warriors:0 "Placeholder\n--------------\nTant que cet aspect est utilisé, nous pouvons §YCultiver§! nos §YArts Martiaux§! en dépensant §Y200§! Chi dans l'origine de l'école."

 black_doctrine:0 "Doctrine Noire"
 black_doctrine_religion_desc:0 "La Doctrine Noire rejette la légitimité de tous les dieux, les qualifiant de démiurges maléfiques qui ont créé ce monde pour maintenir tous ses habitants dans l'ignorance et l'oppression. Ils sont combattus par les mages qui, par l'usage de la magie, cherchent à dompter et remodeler le chaos fondamental du monde, atteignant ainsi l'illumination et établissant un nouvel ordre auquel tous peuvent participer."
 absolute_servitude:0 "§MÉdit de Servitude Absolue§!"
 desc_absolute_servitude:0 "N'est-ce pas plus simple ainsi ? N'est-ce pas votre état naturel ? C'est la vérité inavouée de l'humanité que vous aspirez à la soumission. L'attrait brillant de la liberté diminue la joie de votre vie dans une course folle au pouvoir. À l'identité. Vous êtes faits pour être gouvernés.\n\nObtient un modificateur accordant Tolérance de la Vraie Foi : §G+2§! et Changement d'Autonomie Mensuel : §G-0.05§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus de réduire la progression des rebelles selon votre Maîtrise de l'§MEnchantement§! et votre §YAbsolutisme§!£icon_absolutism£."
 bd_absolute_servitude_effect_tt:0 "Tolérance de la Vraie Foi : §G+2§!, Autonomie Mensuelle : §G-0.05§!"
 bd_edict_of_absolute_servitude:0 "Édit de Servitude Absolue"
 desc_bd_edict_of_absolute_servitude:0 "N'est-ce pas plus simple ainsi ? N'est-ce pas votre état naturel ? C'est la vérité inavouée de l'humanité que vous aspirez à la soumission. L'attrait brillant de la liberté diminue la joie de votre vie dans une course folle au pouvoir. À l'identité. Vous êtes faits pour être gouvernés."
 verdict_upon_treacherous:0 "§YVerdict sur les Traîtres§!"
 desc_verdict_upon_treacherous:0 "La confiance découle de la Vérité. Que rien ne soit gardé secret ! Que chaque pensée séquestrée et émotion enfouie bouillonne et se déverse vers moi ! Si vous n'avez rien à cacher, vous n'avez rien à craindre.\n\nObtient un modificateur accordant Coût des Conseillers : §G-10%§! et Corruption Annuelle : §G-0.10§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus de gagner et supprimer du réseau d'espionnage selon votre Maîtrise de la §YDivination§! et votre §YAbsolutisme§!£icon_absolutism£."
 verdict_upon_neighbors_4_effect_tt:0 "Efface §G40§! de Réseau d'Espionnage que chaque voisin a sur vous et gagne §G40§! sur eux. Réduit £icon_corruption_small£ §G-0.10§! et coût des conseillers §G-10%§!."
 verdict_upon_neighbors_2_effect_tt:0 "Efface §G20§! de Réseau d'Espionnage que chaque voisin a sur vous et gagne §G20§! sur eux. Réduit £icon_corruption_small£ §G-0.10§! et coût des conseillers §G-10%§!."
 verdict_upon_neighbors_1_effect_tt:0 "Efface §G10§! de Réseau d'Espionnage que chaque voisin a sur vous et gagne §G10§! sur eux. Réduit £icon_corruption_small£ §G-0.10§! et coût des conseillers §G-10%§!."
 bd_verdict_upon_the_treacherous:0 "Verdict sur les Traîtres"
 bd_verdict_upon_treacherous_effect_tt:0 "Coût des Conseillers : §G-10%§!, Corruption Annuelle : §G-0.10§!"
 desc_bd_verdict_upon_the_treacherous:0 "La confiance découle de la Vérité. Que rien ne soit gardé secret ! Que chaque pensée séquestrée et émotion enfouie bouillonne et se déverse vers moi ! Si vous n'avez rien à cacher, vous n'avez rien à craindre."
 bonewrought_legions:0 "§gPacte des Légions Osseuses§!"
 bd_covenant_of_bonewrought_legions_4_effect_tt:0 "Un conseiller §Y4§!£mil£ aléatoire sera disponible avec une réduction de §G75%§!."
 bd_covenant_of_bonewrought_legions_2_effect_tt:0 "Un conseiller §Y2§!£mil£ aléatoire sera disponible avec une réduction de §G75%§!."
 bd_covenant_of_bonewrought_legions_1_effect_tt:0 "Un conseiller §Y1§!£mil£ aléatoire sera disponible avec une réduction de §G75%§!."
 bd_covenant_of_bonewrought_legions_effect_tt:0 "Vitesse de Mouvement : §G15%§!, Vitesse de Récupération des Effectifs : §G10%§!"
 desc_bonewrought_legions:1 "Quel plus grand honneur que de mourir pour son suzerain ? Ah, bien sûr ! Mourir, et mourir encore. Levez-vous, mes légions, retournez au front d'où vous êtes tombées, votre bataille ne fait que commencer !\n\nObtient un modificateur accordant Vitesse de Mouvement : §G15%§! et Vitesse de Récupération des Effectifs : §G10%§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus d'obtenir un conseiller Militaire aléatoire à 75% de réduction avec un niveau dépendant de votre Maîtrise de la §gNécromancie§! et de votre §YAbsolutisme§!£icon_absolutism£.\nSe transforme en §gPacte des Terres Labourées de Cadavres§! si vous perdez votre §gArmée Morte-Vivante§!."
 bd_covenant_of_bonewrought_legions:0 "Pacte des Légions Osseuses"
 desc_bd_covenant_of_bonewrought_legions:0 "Quel plus grand honneur que de mourir pour son suzerain ? Ah, bien sûr ! Mourir, et mourir encore. Levez-vous, mes légions, retournez au front d'où vous êtes tombées, votre bataille ne fait que commencer !"
 corpsetilled_lands:0 "§gPacte des Terres Labourées de Cadavres§!"
 bd_covenant_of_corpsetilled_lands_4_effect_tt:0 "Perd §G40§! de dévastation dans chaque province."
 bd_covenant_of_corpsetilled_lands_2_effect_tt:0 "Perd §G20§! de dévastation dans chaque province."
 bd_covenant_of_corpsetilled_lands_1_effect_tt:0 "Perd §G10§! de dévastation dans chaque province."
 bd_covenant_of_corpsetilled_lands_effect_tt:0 "Croissance de la Prospérité : §G20%§!, Efficacité de Production : §G10%§!"
 desc_corpsetilled_lands:1 "Comme une forêt renaît des cendres, la destruction engendre la vie. Dans nos champs, où gisent morts les ennemis de notre règne parfait, je leur ordonne de pourrir. Que leur sang nourrisse nos terres, et que leur faiblesse devienne notre force.\n\nObtient un modificateur accordant Croissance de la Prospérité : §G20%§! et Efficacité de Production : §G10%§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus de réduire la dévastation dans chaque province selon votre Maîtrise de la §gNécromancie§! et votre §YAbsolutisme§!£icon_absolutism£.\nSe transforme en §gPacte des Légions Osseuses§! si vous levez une §gArmée Morte-Vivante§!."
 bd_covenant_of_corpsetilled_lands:0 "Pacte des Terres Labourées de Cadavres"
 desc_bd_covenant_of_corpsetilled_lands:0 "Comme une forêt renaît des cendres, la destruction engendre la vie. Dans nos champs, où gisent morts les ennemis de notre règne parfait, je leur ordonne de pourrir. Que leur sang nourrisse nos terres, et que leur faiblesse devienne notre force."
 leashed_supplications:0 "§OActe des Suppliques Enchaînées§!"
 bd_act_of_leashed_supplications_skip_effect_tt:0 "Chacun de vos sujets gagnera de l'opinion envers vous."
 bd_act_of_leashed_supplications_effect_tt:0 "Réputation Diplomatique : §G+1§!, Coût d'Annexion : §G-10%§!"
 bd_act_of_leashed_supplications_witch_king_effect_tt:0 "Réputation Diplomatique : §G+6§!, Coût d'Annexion : §G-20%§!"
 desc_leashed_supplications:0 "Dans les ombres, les fous complotent contre les sages. Que leurs actes ne restent pas inconnus, je t'invoque du lieu derrière le miroir, où l'ascension est de verre et les murs sont de couteaux, surgissez multitudes ! Que nul recoin de ce monde ne reste sans surveillance !\n\nObtient un modificateur accordant Réputation Diplomatique : §G+1§!, Coût d'Annexion Diplomatique : §G-10%§!, et si vous êtes un Roi-Sorcier, un Coût d'Annexion Diplomatique supplémentaire : §G-10%§! et Réputation Diplomatique : §G+5§!, pendant §Y10§! ans (et réduit le gain de pouvoir), en plus d'accorder à tous vos sujets de l'opinion envers vous selon votre Maîtrise de la §OConjuration§! et votre §YAbsolutisme§!£icon_absolutism£."
