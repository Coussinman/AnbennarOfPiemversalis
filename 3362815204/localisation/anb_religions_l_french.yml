 closed_runelink_title:0 "Statut du Lien Runique : §YFermé§! | §YNiveau 0§!"
 closed_runelink_desc:0 "\nLe §YLien Runique§! est la seule connexion entre le Dwarovar et la patrie des Nains d'Obsidienne. Maintenir sa puissance et sa stabilité doit être notre plus grande priorité, car la ruine sera la seule chose qui nous attend s'il est un jour coupé.\n------------------\nSi notre niveau change, notre nation recevra les effets suivants :\n§YLien Runique Puissant§! | §YNiveau 4§!\nModificateur d'Effectifs Nationaux : §G+20.0%§!\nCoût de Développement : §G-10.0%§!\nModificateur d'Impôts Nationaux : §R-20.0%§!\n\n§YLien Runique Fort§! | §YNiveau 3§!\nModificateur d'Effectifs Nationaux : §G+15.0%§!\nCoût de Développement : §G-7.5%§!\nModificateur d'Impôts Nationaux : §R-15.0%§!\n\n§YLien Runique Stable§! | §YNiveau 2§!\nModificateur d'Effectifs Nationaux : §G+10.0%§!\nCoût de Développement : §G-5.0%§!\nModificateur d'Impôts Nationaux : §R-10.0%§!\n\n§YLien Runique Faible§! | §YNiveau 1§!\nModificateur d'Effectifs Nationaux : §G+5.0%§!\nCoût de Développement : §G-2.5%§!\nModificateur d'Impôts Nationaux : §R-5.0%§!\nAgitation Nationale : §R+2.0§!\n------------------\nVotre niveau actuel accorde :"

