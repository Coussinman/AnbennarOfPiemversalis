 bleed_haless_dry:0 "Saigner Haless à Blanc"
 desc_bleed_haless_dry:0 "« Quand j'étais enfant, mon village était un paradis terrestre. La beauté du Chi coulait autour de nous, les esprits dansaient aux côtés de la lune. Quand j'étais perdu, je pouvais tracer le chemin du Chi jusqu'à la maison. Où est-il maintenant ? Comment a-t-il disparu ? Pourquoi ne puis-je plus retrouver le chemin de la maison ? »\n— Mendiant de Nirakvonkai"
