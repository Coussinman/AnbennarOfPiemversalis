 kheionism.2.t:0 "Le statut de nos gouverneurs"
 kheionism.2.desc:0 "Avec chaque nouveau dirigeant élu, de nouveaux gouverneurs sont également nommés pour gérer nos territoires. Que devons-nous faire ?"
 kheionism.2.a:0 "Laissons nos gouverneurs où ils sont"
 kheionism.2.b:0 "Ne gardons que ceux qui suivent ma philosophie"
 kheionism.2.c:0 "Remplaçons-les par des gens qui pensent comme moi"
 kheionism.2.d:0 "Nous les remplacerons tous"
 kheionism.4.t:0 "La nature de la gouvernance"
 kheionism.4.d:0 "L'un des préceptes fondamentaux du Khéionisme est la croyance en un gouvernement républicain. Avec notre récente conversion à leurs croyances, nos philosophes exigent que nous changions également notre style de gouvernement pour y correspondre."
 kheionism.4.a:0 "Nos valeurs l'exigent"
 kheionism.4.b:0 "Nous ne dévierons pas"
 #orcish:0 "Orque"
 great_dookan:0 "Grand Dookan"
 great_dookan_religion_desc:0 "Nouvelle branche zélée de l'ancienne religion Dookan, ils vénèrent Dookan, qu'ils appellent le Grand Dookan, créateur de la race orque. Ils croient que Dookan, qui combattit dans la Guerre des Dieux du mythe cannorien, du côté de Castellos qui plus est, fut lésé par les autres dieux et emprisonné par un acte traître orchestré par les Panthéons cannorien et nain.\n\nLes adorateurs du Grand Dookan croient que Korgus Fils-de-Dookan est le fils et champion de leur dieu, et que pour libérer leur Dookan, ils doivent exercer leur vengeance sur les fidèles de tous les autres dieux pour réveiller Dookan et lui donner le pouvoir de briser ses chaînes."
 find_reincarnated_warrior_aspect:0 "Guerrier orque réincarné trouvé !"
 invoke_warrior_heritage_aspect:0 "Invoquer les ancêtres guerriers !"
 gather_great_host_great_aspect:0 "Rassembler une grande armée !"
 glorious_looting_aspect:0 "Pillage glorieux !"
 purge_the_weak_aspect:0 "Purger les faibles !"
 anoint_slave_herd_great:0 "Oindre un troupeau d'esclaves !"
 assemble_shamans_great_aspect:0 "Rassembler les chamans !"
 shake_the_earth_great:0 "Ébranler la Terre !"
 desc_find_reincarnated_warrior_aspect:0 "Parmi nos clans, nous avons trouvé la réincarnation d'un grand guerrier de notre passé. Il mènera sûrement nos armées à la victoire."
 desc_invoke_warrior_heritage_aspect:0 "Nos chamans permettent à nos guerriers de se reconnecter avec leurs vies passées, leur permettant de puiser dans l'expérience de siècles de combat."
 desc_gather_great_host_great_aspect:0 "Il est temps d'aller en guerre ! Rassemblons nos troupes et levons nos bannières, nous réclamerons la gloire."
 desc_glorious_looting_aspect:0 "Nous contrôlons le peuple de notre ennemi ! Il est temps de montrer notre dominance et de réclamer nos justes récompenses !"
 desc_purge_the_weak_aspect:0 "Notre terre est pleine de faibles peaux-roses. Nous les chasserons de leurs foyers et les remplacerons par les nôtres."
 desc_anoint_slave_herd_great:0 "Il est temps d'oindre un troupeau d'esclaves pour le sacrifier au Grand Dookan. Ils auront l'honneur d'être travaillés jusqu'à la mort pour sa gloire !"
 desc_assemble_shamans_great_aspect:0 "Rassemblons les chamans pour réaffirmer notre autorité sur le clan."
 desc_shake_the_earth_great:0 "Nos chamans peuvent utiliser la puissance qui leur est donnée directement par Dookan lui-même pour écraser toute muraille."
 old_dookan:0 "Ancien Dookan"
 old_dookan_religion_desc:0 "L'Ancien Dookan désigne les adorateurs traditionnels du dieu orque Dookan. Alors que leurs homologues du Grand Dookan croient que leur dieu fut lésé et emprisonné par les Panthéons cannorien et nain et que leur devoir est de libérer Dookan et de vaincre tous les dieux et leurs fidèles, la foi de l'Ancien Dookan se concentre sur le conte original : que leur dieu fut emprisonné par les nains traîtres pour avoir voulu un foyer, et qu'ils furent créés pour prospérer, venger leur dieu, et finalement le libérer de ses chaînes.\n\nLa foi de l'Ancien Dookan nie la prétention de Korgus Fils-de-Dookan d'être l'héritier de Dookan, et rejette sa guerre sainte contre tous les dieux (au lieu des seuls nains). À leurs yeux, il est un imposteur qui a tordu les croyances orques."
 look_for_omens:0 "Chercher des présages !"
 shake_the_earth:0 "Ébranler la Terre !"
 ask_for_dookan_guidance:0 "Demander la guidance de Dookan !"
