 gunpowder_meditation:0 "Méditation à la Poudre"
 desc_gunpowder_meditation:0 "Une forme d'alchimie interdite que l'on croyait scellée depuis longtemps, dont les secrets furent disséminés par un étudiant renégat de la Maison du Feu et de l'Eau. En mélangeant la poudre à canon avec diverses autres substances, on obtient une drogue dont l'inhalation peut induire une transe méditative. Parmi les effets : des mains parfaitement stables, l'insensibilité à la douleur et un ralentissement drastique du rythme cardiaque. Parmi les effets secondaires : la dépendance, et finalement la mort."
