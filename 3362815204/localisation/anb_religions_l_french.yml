 above_spirits_and_man:0 "Au-dessus des Esprits et des Hommes"
 desc_above_spirits_and_man:0 "La Dame de Pierre est une divinité interdite dans l'Accord Mystique, bannie et châtiée par les autres esprits. Ses paroles seraient comme de la soie d'araignée, liant ceux qui les entendent à sa volonté. Il est ainsi ordonné : son nom ne doit pas être prononcé, ne doit pas être écrit, ne doit pas être pensé. Mais on peut se demander : à qui profite un tel diktat ?"
 above_spirits_and_man_mod:0 "Afflux de Chi : Au-dessus des Esprits et des Hommes"
