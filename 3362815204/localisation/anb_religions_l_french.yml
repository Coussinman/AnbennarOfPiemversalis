 #Incidents
 incident_bulwar_under_threat_title:0 "Les Décennies de Dévastation"
 incident_bulwar_under_threat_desc:0 "Dévastés par de mesquines guerres dynastiques, des rébellions et l'Exode Gobelin au nord, et menacés par l'invasion gnolle au sud, les bulwari ont vu la confiance qu'ils plaçaient dans les Élus considérablement diminuer. Il est maintenant temps pour les seigneurs elfes de sortir de leurs somptueux palais et de stabiliser la situation.\n"
 incident_naqtazan_title:0 "L'Aube du Naqtazan"
 incident_naqtazan_desc:0 "Les récents événements qui ont vu la reine gnolle Tluukt vaincre solidement Karodir de Varamhar et raser notre cité ont prouvé une chose : les Élus ne peuvent pas nous protéger contre cette nouvelle menace, du moins pas seuls. Ce n'est qu'unis ensemble que les peuples du Bulwar peuvent tenir à distance les Ténèbres Malveillantes ! Unissons-nous dans une nouvelle grande alliance : le Naqtazan !\n"
 incident_half_a_king_title:0 "Un Demi-Akal"
 incident_half_a_king_desc:0 ""
 incident_death_of_taelarios_title:0 "La Mort de Taelarios"
 incident_death_of_taelarios_desc:0 "Taelarios était l'Elfe Solaire qui unifia le Nouveau Culte Solaire en une religion proprement dite et le maintint ensemble depuis son palais à Irrliam depuis lors. Sa mort a laissé un vide de pouvoir dans le clergé et maintenant l'agitation et les luttes intestines se répandent rapidement parmi les fidèles du Culte.\n"
 incident_summit_of_samartal_title:0 "La Mascarade de Samartal"
 incident_summit_of_samartal_desc:0 "Les dernières décennies ont vu les tensions entre les Royaumes du Culte Solaire atteindre un point critique. Inquiet de l'état actuel des affaires, le célèbre diplomate Kelador Elrazuir a invité les personnages les plus éminents du Bulwar à un sommet dans son domaine de Samartal. Le sommet de trente jours sera inauguré par le plus grand bal masqué que le Bulwar ait jamais vu, dans une tentative d'apaiser les relations tendues entre les participants.\n"
 incident_call_of_aelantir_title:0 "L'Appel d'Aelantir"
 incident_call_of_aelantir_desc:0 "La redécouverte de la patrie des elfes a été confirmée. Certains Elfes veulent « retourner » dans leur ancien foyer. Pour les elfes souhaitant rester au Bulwar, cela signifierait voir leurs effectifs déjà relativement faibles diminuer et leur position s'affaiblir. Pendant ce temps, leurs fidèles ne pourront s'empêcher de se sentir abandonnés à la vue de leur objet de culte les quittant pour une terre étrangère et lointaine.\n"
 incident_ashes_of_the_phoenix_title:0 "Les Cendres du Phénix"
 incident_ashes_of_the_phoenix_desc:0 ""
 incident_silent_as_the_grave_title:0 "Silencieux comme la Tombe"
 incident_silent_as_the_grave_desc:0 "Des rumeurs d'une ancienne tombe cachée dans le désert Salahadi ont fait surface. Certains disent qu'elle appartient à un ancien roi, d'autres qu'elle fut construite par un génie déchu. Une chose est certaine cependant : si elle est réelle, elle doit contenir de nombreux trésors."
 incident_rise_of_artificery_title:0 "L'Essor de l'Artisanat Magique"
 incident_rise_of_artificery_desc:0 "Les avancées technologiques et les diverses découvertes en Aelantir ont conduit à des progrès rapides dans la discipline de l'artisanat magique. Certains de nos sujets humains ont déjà adopté les nouvelles inventions, affirmant que l'utilisation de l'artisanat magique est différente de l'utilisation de la magie, et que nous devrions donc leur permettre de l'utiliser.\n"
 incident_spread_of_ravelianism_title:0 "La Propagation du Ravélianisme"
 incident_spread_of_ravelianism_desc:0 "Cela fait quelques décennies que Cannor a de nouveau embrassé une nouvelle foi. Leur prétention de posséder et d'écouter un fragment d'un dieu unique est plutôt intrigante. Se pourrait-il que ce soit Surael qui leur parle ? Nous devons enquêter davantage.\n"
 incident_teachings_szal_fazil_title:0 "Enseignements du szal-Fazil"
 incident_teachings_szal_fazil_desc:0 "Les anciens magi du Bulwar furent persécutés et détruits par les Élus à cause de leurs pratiques maléfiques, mais les temps changent, et maintenant notre pays fait face à plusieurs menaces qui pourraient être atténuées avec des mages. Des Magi humains. Peut-être est-il temps de récupérer notre héritage perdu ?\n"
