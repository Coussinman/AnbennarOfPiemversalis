 tether_the_weak:0 "Enchaîner les Faibles"
 desc_tether_the_weak:0 "« Ceux qui peuvent combattre doivent combattre. Ceux qui ne peuvent combattre seront forcés de combattre. Ceux qui montrent une faiblesse d'esprit verront leur tête remplacée par de la laine, ceux dont le corps est faible verront leurs muscles substitués par de la soie. Ceux qui ont une faiblesse d'âme seront rapidement promus. »\n— Proclamation jaunie"
