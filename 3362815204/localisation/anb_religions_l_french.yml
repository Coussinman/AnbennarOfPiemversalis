 oni_demon_warriors:0 "Guerriers Démoniaques Oni"
 desc_oni_demon_warriors:0 "Les Oni des Collines-Démoniaques sont des créatures recluses, souvent sujets de mythes chenus et de légendes brumeuses. Certains prétendent qu'ils dévorent les humains, d'autres qu'ils les réduisent en esclavage. Néanmoins, chaque année, des caravanes de pèlerins désespérés gravissent les Collines-Démoniaques, cherchant sagesse et assistance quand nul autre recours ne leur reste. Les guerriers qui s'entraînent sous la tutelle des Oni adoptent leurs pratiques monastiques, acquièrent la connaissance de techniques interdites et deviennent des Yaorenjun. Certains ne reviennent jamais."
 oni_demon_warriors_mod:0 "Afflux de Chi : Guerriers Démoniaques Oni"
