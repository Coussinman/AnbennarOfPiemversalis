 akasik_compassion_3:0 "Aspect de Compassion"
 akasik_compassion_3_desc:0 "L'aspect de la Mère représentant sa compassion inébranlable, qui inspire la camaraderie et un sens du lien.\n\nPuisque §Gles huit provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Gélevés§!.\nNous sommes unis avec la Mère.\n\nAspects à venir :\n§MRéciprocité§! :\n   Coût des idées : §G-10 %§!\n   Efficacité commerciale : §G+10 %§!\n   Troubles nationaux : §R+1§!\n§GJustice§! :\n   Moral des armées : §G+7,5 %§!\n   Coût de l'infanterie : §G-10 %§!\n   Réputation diplomatique : §R-1§!\n§YRésilience§! :\n   Troubles nationaux : §G-2§!\n   Défensivité : §G+20 %§!\n   Coût des idées : §R+5 %§!"
 akasik_exchange_1:0 "Aspect de Réciprocité"
 akasik_exchange_1_desc:0 "L'aspect de la Mère représentant son ouverture à la réciprocité, qui inspire la réflexion et le flux du commerce.\n\nPuisque §Rmoins de quatre provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Rfaibles§!.\nNous devons unifier Mère Akasik pour la vénérer pleinement.\n\nAspects à venir :\n§MJustice§! :\n   Moral des armées : §G+5 %§!\n§GRésilience§! :\n   Troubles nationaux : §G-1§!\n§YCompassion§! :\n   Réputation diplomatique : §G+1§!"
 akasik_exchange_2:0 "Aspect de Réciprocité"
 akasik_exchange_2_desc:0 "L'aspect de la Mère représentant son ouverture à la réciprocité, qui inspire la réflexion et le flux du commerce.\n\nPuisque §Yquatre à sept provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Ymoyens§!.\nNous devons unifier Mère Akasik pour la vénérer pleinement.\n\nAspects à venir :\n§MJustice§! :\n   Moral des armées : §G+7,5 %§!\n   Réputation diplomatique : §R-1§!\n§GRésilience§! :\n   Troubles nationaux : §G-2§!\n   Coût des idées : §R+5 %§!\n§YCompassion§! :\n   Réputation diplomatique : §G+2§!\n   Moral des armées : §R-5 %§!"
 akasik_exchange_3:0 "Aspect de Réciprocité"
 akasik_exchange_3_desc:0 "L'aspect de la Mère représentant son ouverture à la réciprocité, qui inspire la réflexion et le flux du commerce.\n\nPuisque §Gles huit provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Gélevés§!.\nNous sommes unis avec la Mère.\n\nAspects à venir :\n§MJustice§! :\n   Moral des armées : §G+7,5 %§!\n   Coût de l'infanterie : §G-10 %§!\n   Réputation diplomatique : §R-1§!\n§GRésilience§! :\n   Troubles nationaux : §G-2§!\n   Défensivité : §G+20 %§!\n   Coût des idées : §R+5 %§!\n§YCompassion§! :\n   Réputation diplomatique : §G+2§!\n   Amélioration des relations : §G+20 %§!\n   Moral des armées : §R-5 %§!"
 mother_akasik.2.t:0 "Le douzième solstice d'été"
 mother_akasik.2.d:0 "Le solstice d'été de la douzième année est arrivé, et tous les douze ans, un nouvel aspect de Mère Akasik est célébré. Bien que la Mère possède de nombreux aspects, il est connu parmi ses fidèles que ses aspects principaux sont la Justice, la Résilience, la Compassion et la Réciprocité. Nombre d'enfants ont grandi en ne connaissant que la célébration d'un seul aspect. Nombre d'anciens ne vivront pas assez longtemps pour revoir cet aspect. Souvenez-vous d'eux tandis que le cycle tourne et que la Mère nous porte à travers nos vies."
 mother_akasik.2.a:0 "En ces temps troublés, que la justice de la Mère nous guide..."
 mother_akasik.2.b:0 "Que la justice de la Mère nous montre la voie."
 mother_akasik.2.c:0 "Nous sommes unis avec la Mère dans la justice !"
 mother_akasik.2.e:0 "En ces temps troublés, que la résilience de la Mère nous guide..."
 mother_akasik.2.f:0 "Que la résilience de la Mère nous montre la voie."
 mother_akasik.2.g:0 "Nous sommes unis avec la Mère dans la résilience !"
 mother_akasik.2.h:0 "En ces temps troublés, que la compassion de la Mère nous guide..."
 mother_akasik.2.i:0 "Que la compassion de la Mère nous montre la voie."
 mother_akasik.2.j:0 "Nous sommes unis avec la Mère dans la compassion !"
 mother_akasik.2.k:0 "En ces temps troublés, que la réciprocité de la Mère nous guide..."
 mother_akasik.2.l:0 "Que la réciprocité de la Mère nous montre la voie."
 mother_akasik.2.m:0 "Nous sommes unis avec la Mère dans la réciprocité !"
 aelantiri:0 "Aelantiri"
 vechnogejzn:0 "Vechnogejzn"
 vechnogejzn_religion_desc:0 "Religion des anciens elfes Rzentur, le Vechnogejzn est un culte ritualiste d'un feu éternel, créé par la magie des Fées. Les anciens Rzentur racontent qu'il y a longtemps, leur peuple combattit le Roi du Givre, déterminé à faire de leurs terres son domaine de l'hiver permanent. Les autres habitants de la forêt, les Fées du Nord d'Aelantir, avaient été tantôt une aide, tantôt un obstacle pour les elfes, jusqu'au jour où le Prince Changelin vint et offrit aux anciens Rzentur le don du Vechnogejzn, la flamme éternelle. Avec elle, les anciens Rzentur vainquirent le Roi du Givre, repoussant sa progéniture loin vers le nord.\n\nChaque tribu des anciens Rzentur possède son propre Vechnogejzn, qu'elle entretient méticuleusement à ce jour. La flamme symbolise l'unité de la tribu et est censée les protéger des mauvais esprits et du danger."
 etchings_of_the_deep:0 "Gravures des Profondeurs"
 etchings_of_the_deep_religion_desc:0 "Tout ce que l'on sait de la religion des Dormeurs de Glace (pour autant qu'on puisse dire qu'ils en ont une) est déduit des dessins rupestres qu'ils peignent, juste au-dessus de la ligne de marée haute sur les falaises rocheuses de toute la Mer Brisée. Ces dessins montrent souvent des scènes de vie marine, bien qu'ils représentent régulièrement des créatures qui ne correspondent à aucune espèce connue. Les scènes de chasse ou de festin sont également courantes.\n\nLa plus étrange de ces peintures rupestres semble se répéter, avec très peu de variations : c'est une scène de deux créatures humanoïdes géantes combattant, chacune possédant un halo de six étoiles, et elle est généralement entourée de petits tas de crânes et d'os de poissons. Comme les Dormeurs de Glace semblent incapables de parler, il n'a jamais été déterminé de façon concluante ce que cette image est censée représenter."
 senanset:0 "Senanset"
 senanset_religion_desc:0 "Le Senanset ou « Chant des Ancêtres » est la croyance populaire des Nés-des-Ruines Soruiniques, centrée sur l'émulation des exploits de grands ancêtres qui accomplirent des prouesses incroyables. Les Nés-des-Ruines Soruiniques sont organisés en unités tribales appelées Danatsgos, chacune possédant ses récits oraux et ses chants célébrant les exploits de leurs ancêtres à réciter tout au long de la journée.\nDes chants festifs s'élèvent des villages dispersés à travers le paysage de Soruin, qui devient étrangement silencieux le soir et la nuit, pour ne pas attirer l'attention de la jungle."
 weeping_mother:0 "Mère Éplorée"
 weeping_mother_religion_desc:0 "Les Bosquets Sanglants sont le foyer des Kwineh, et nul n'est plus révéré par les Kwineh que la Mère Éplorée. Elle qui a forgé les liens de l'ordre et les a attachés à la terre, c'est par sa seule volonté que les Kwineh prospèrent. Rompre cette alliance apportera grand malheur au transgresseur : malédictions, blessures et bien pire attendent le parjure. Pour s'assurer que tous ceux qui demeurent dans les Bosquets Sanglants respectent ses lois, les Ishtanums des Kwineh partent enseigner ces lois, les respectant par-dessus tout comme exemple pour les autres.\n\nCela ne signifie pas que la vie dans les Bosquets Sanglants n'est qu'un fardeau. Car ceux qui respectent véritablement les lois se retrouvent souvent avec une riche abondance et une grande chance. Car les Bosquets Sanglants donnent autant qu'ils prennent, et par ce cycle de réciprocité, un contrat sacré se forme entre les Nés-des-Ruines et la Mère Éplorée."
 dotimism:0 "Dobondotiste"
 dotimism_religion_desc:1 "La croyance boek enseigne que chaque individu a un lien de parenté avec une créature appelée totem ou dotim. Généralement un esprit ou un animal, des poteaux dotim à l'effigie de son dotim sont sculptés, parfois en pierre ou en bois, parfois par la réutilisation de statues ou d'armes précurseures, et ils sont rassemblés dans un bâtiment appelé « Dotimveb » avec ceux du reste de la tribu.\n\nUn poteau dotim chargé magiquement est appelé Dobondotim et la puissance de plusieurs Dobondotim peut être combinée pour des rituels capables d'affecter le destin de toute la tribu. Le plus grand rassemblement de poteaux dotim se trouve dans une ruine précurseure connue des natifs sous le nom de Dobondotimveb, située près de Boek'taraw.\n\nCette religion est partagée par les Nés-des-Ruines Teira vivant à Dalaire, qui sont les ancêtres des Nés-des-Ruines du Noruin."
 death_cult_of_cheshosh:0 "Culte de la Mort de Cheshosh"
 death_cult_of_cheshosh_religion_desc:0 "« Cheshosh » est le dieu local de la mort, et l'on dit qu'il est la personnification de la Ruine d'Aelantir (également connue sous le nom de Jour-des-Cieux-Cendrés) qui détruisit le continent entier. Dieu de rétribution, ses adorateurs affirment qu'il s'est levé pour punir les peuples de l'antique Aelantir pour leur nature pécheresse et décadente. Les Cheshoshi font de nombreux sacrifices, y compris de personnes vivantes, pour imiter ce dieu, afin qu'un semblant de sa fureur puisse continuer à terroriser le continent aujourd'hui."
 effelai:0 "Effelai"
 tswohvwohii:0 "Tswohvwoh'íi"
 tswohvwohii_religion_desc:0 "Tswohvwoh'íi est le titre de la déesse de la jungle Effelai, dont les arbres, par moments, craquent au vent dans ce que certains voient comme le chant inconnaissable de la jungle. Les peuples Effe'i et Laí'i croient que Tswohvwoh'íi a besoin d'un chant en retour pour rester satisfaite, et accomplissent régulièrement des « sacrifices » de chant et de sang pour repousser et maintenir la déesse de la jungle heureuse et silencieuse."
 chahinanito:0 "Chahinanito"
 chahinanito_religion_desc:0 "Chahinanito est le nom parura pour Tswohvwoh'íi. Le culte de la déesse de la jungle est très similaire dans les Tanières des Sangsues au reste d'Effelai, mais avec un accent plus prononcé sur le sacrifice des nés-des-ruines et les aspects les plus mortels de la jungle. En raison de leur proximité avec les monstrueux hommes-sangsues, les Chahinanito considèrent le sacrifice d'une telle bête comme le plus digne des rituels."
 song_servants:0 "Serviteurs du Chant"
 song_servants_religion_desc:0 "Un terme désignant ceux qui semblent envoûtés par le « chant » de la jungle (produit principalement par le mouvement et le craquement des arbres dans le vent). Contrairement à d'autres croyances comme le Tswohvwoh'íi, les Serviteurs du Chant ne chantent aucun chant en retour, ni ne font de sacrifices pour apaiser la jungle. Au lieu de cela, ils oscillent et bougent à l'unisson avec la jungle tandis qu'elle chante, dans un état quasi transe. Les adeptes de cette foi vont des Serfs-Graines que l'Effelai a revendiqués comme siens aux nés-des-ruines ordinaires qui croient qu'embrasser la jungle, et non la repousser, est la voie à suivre."
 leechfather:0 "Père Sangsue"
 leechfather_religion_desc:0 "Les Hommes-Sangsues des Tanières croient qu'un grand Père Sangsue géant dort sous le marais, et que s'ils ne satisfont pas Sa soif de sang en jetant des sacrifices vivants dans les Tanières pour qu'Il les dévore, alors le Père s'éveillera de son sommeil pour assécher le monde entier."
 orwaii:0 "Orwa'íi"
 orwaii_religion_desc:0 "Orwa'íi, le chant des murs divins, était la croyance Oonoi'i selon laquelle Tswohvwoh'íi est une entité maléfique, et que l'Effelai doit être purifiée de sa souillure. Comme les autres croyances, ils chantent leur propre chant en retour pour se protéger de la forêt, mais travaillent à empêcher toute croissance de la vie de la jungle dans leurs terres de la Côte Sèche. On dit que les Oono'i croient que la Côte Sèche est ce qu'elle est grâce aux travaux de leurs grands ancêtres. Depuis lors, cependant, le peuple a grandement souffert et nombre d'entre eux sont devenus des Serfs-Graines serviteurs de la jungle. De nos jours, seules quelques petites tribus subsistent."
 eordellon:0 "Eordellon"
 eordellon_religion_desc:0 "Originellement basée sur les préceptes enseignés par les Fées du Domandrod peu après le Jour-des-Cieux-Cendrés, les peuples Eordan ont fait leurs propres ajustements à ces enseignements au fil des ans. Les fidèles d'Eordellon doivent défendre les valeurs de chaque saison et servir fidèlement les Fées du Domandrod. Au fil des ans, les peuples se sont fragmentés en favorisant une saison plutôt qu'une autre, et peu restent obéissants aux Fées."
 spring_court:0 "Cour du Printemps"
 spring_court_religion_desc:0 "Centrée sur la saison du Printemps, les Selpheregi sont en harmonie avec l'esprit de renouveau qui imprègne tout l'Éordande."
 summer_court:0 "Cour de l'Été"
 summer_court_religion_desc:0 "La Cour de l'Été est centrée sur les Sarmadfar et Elarbarc, les eaux chaudes du sud. Ses adorateurs sont en harmonie avec l'appel de la mer."
 autumn_court:0 "Cour de l'Automne"
 autumn_court_religion_desc:0 "Les Tuathak favorisent l'Automne par-dessus tout. Dernière saison avant la désolation de l'Hiver, l'Automne célèbre les bonnes nouvelles de la moisson."
 winter_court:0 "Cour de l'Hiver"
 winter_court_religion_desc:0 "Forcée dans les confins reculés, la Cour de l'Hiver doit se battre pour sa survie grâce à la loyauté partagée des Snecboth."
 raeldaeriach:0 "Raeldaeriach"
 raeldaeriach_religion_desc:0 "Originellement composés de clans d'elfes Eordan qui rejetèrent l'enseignement féérique de l'équilibre saisonnier, les nés-des-ruines de la péninsule Sarmadfar se sont détournés du culte des saisons au cours de leurs siècles d'exil dans le sud. Au lieu de cela, les Fograc pratiquent une forme de divination céleste et d'astrologie appelée Raeldaeriach, cherchant à déterminer la vraie nature du monde à partir du mouvement des corps célestes.\n\nLes déviations dans les schémas normaux du ciel nocturne telles que les comètes sont considérées comme de mauvais présages, tandis que les météores sont révérés comme des fragments de la vérité céleste descendus sur terre. Les individus naissent sous une multitude vertigineuse de signes zodiacaux et de présages astrologiques qui prédisent les événements de leur vie, et nombreux sont ceux qui s'efforcent de se conformer à leurs destinées annoncées avec grand zèle."
 harafic:0 "Harafique"
 kalun_masks:0 "Masques Kalun"
 kalun_masks_religion_desc:0 "Les peuples du sud-est de Haraf croient au pouvoir des masques Kalun, qui seraient imprégnés d'esprits existant depuis des temps immémoriaux, et ces esprits habiteraient supposément le corps du porteur. Les adeptes croient que la protection des masques imprégnés d'esprits les défendra contre les Veilleurs Silencieux. Les esprits aussi sont protégés, à la fois par le matériau des masques et par les porteurs de masques. On dit également que les porteurs de masques sont possédés et aidés par l'esprit habitant le masque, leur conférant souvent une force et une agilité surnaturelles.\n\nDes tournois sont organisés parmi les Mayte et le meilleur lutteur reçoit le Masque du Roi qui contient un esprit royal existant depuis toujours."
 kheionism:0 "Khéioniste"
 kheionism_religion_desc:0 "La tradition philosophique et idéologique prédominante parmi les peuples Kheionai. La philosophie se concentre sur le rôle de la cité-État républicaine comme forme de gouvernance la plus civilisée, et la cité-État comme base de toute civilisation. Le Khéionisme ne reconnaît pas intrinsèquement la croyance en une puissance supérieure, car c'est une doctrine uniquement athée, dépourvue de toute spiritualité. Au lieu de cela, les Khéionistes placent leur foi dans leurs dirigeants élus pour les défendre et les guider vers l'avenir."

 maederitic_rule_deity_level_1:0"Gouvernance Maedéritique" #Written By: Karlov
 maederitic_rule_deity_level_1_desc:0"§YGouvernance Maedéritique§!\nMaedérites de Kimánis est surtout connu pour son grand traité sur le gouvernement, « Marées », une série de dialogues sur le flux et le reflux des fortunes des elfes et de leurs kheions. Maedérites soutenait que chaque gouvernement possède des forces et des faiblesses qui se révèlent en temps de stress aigu. Parmi les nombreuses formes de gouvernement, celles qui échouent à s'adapter échouent toujours, tandis que celles qui peuvent évoluer minimiseront les facteurs de stress sur leur société et auront les meilleures chances de prospérer. Ainsi, la politique gouvernementale maedéritique cherche à empêcher l'enracinement de forces statiques qui empêcheraient un État d'évoluer selon les besoins, et souligne l'importance de détruire les groupes d'intérêts particuliers qui détourneraient un gouvernement de sa capacité à agir de manière décisive et réactive envers son peuple.\n\nSi l'Ordre Sacré de la §YGouvernance Maedéritique§! est placé dans plus de §Y50 %§!([Root.kheionism_maederitic_rule_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75 %§!([Root.kheionism_maederitic_rule_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nCroissance du progrès des réformes : §G+20,0 %§!\n\nSi l'Ordre Sacré de la §YGouvernance Maedéritique§! est placé dans plus de §Y75 %§!([Root.kheionism_maederitic_rule_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nCroissance du progrès des réformes : §G+20,0 %§!\nPolitiques administratives gratuites : §G+1§!"
