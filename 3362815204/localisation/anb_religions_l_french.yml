 way_of_shadows:0 "Voie des Ombres"
 desc_way_of_shadows:0 "Il est des silences qui parlent à ceux qui écoutent. Il est des nuances de ténèbres qui recèlent un sens pour ceux qui voient. Il est un savoir transmis dans l'absence de missive. Il est un pouvoir dans les choses interdites, et nous sommes interdits."
