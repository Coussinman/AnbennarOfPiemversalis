 origin_of_the_devouring_path:0 "Origine de la Voie Dévorante"
 origin_of_the_devouring_path_desc:0 "Les Oni sont les Initiateurs de la Voie Dévorante et savent le mieux guider les autres sur cette voie."

 dvp_devoured_mod:0 "Dévoré"
 dvp_devoured_mod_desc:0 "Attention maintenant, que la Voie ne vous dévore pas..."
 expand_the_dark_world:0 "Étendre le Monde des Ténèbres"
 desc_expand_the_dark_world:0 "Le monde est un endroit sombre et chaotique, reflétant le chaos de l'au-delà. Mais nous pouvons nous élever au-dessus de sa dégénérescence. Par le pouvoir personnel et la vertu, nous imposerons l'ordre au chaos et atteindrons la vie éternelle, chassant les forces de l'Enfer. Pour tout être qui a reconnu l'état désolé de la réalité, la Voie Dévorante offre à la fois une explication et une issue."
 expand_the_dark_world_mod:0 "Ruée de Chi : Étendre le Monde des Ténèbres"
 expand_the_dark_world_effect_tt:0 "Missionnaires : §G+1§!, Force Missionnaire : §G+3.0%§!"
 expand_the_dark_world_boon_tt:0 "\n§YÉtendre le Monde des Ténèbres§! :\n   Missionnaires : §G+1§!\n   Force Missionnaire : §G+3.0%§!"
 expand_the_dark_world_cost_tt:0 "\n§YÉtendre le Monde des Ténèbres§! : Tolérance des Hérétiques : §R-3§!"
 wisdom_beyond_honor:0 "§RSagesse au-delà de l'Honneur§!"
 desc_wisdom_beyond_honor:0 "« Que gagne-t-on à Dévorer ? Consommer la chair d'âme d'un autre apporte avec elle son pouvoir, mais aussi sa connaissance, ses souvenirs, ses émotions. Consommez-en assez, et non seulement vous vous retrouverez débordant de magie, mais aussi avec la capacité de l'utiliser. Attention à ne pas vous oublier, maintenant : quand vous Dévorez, vous êtes Dévoré en retour. »\n—Shukagi Sikala, Errer la Nuit"
 wisdom_beyond_honor_effect_tt:0 "Nous deviendrons un §YMage Puissant§!"
 wisdom_beyond_honor_effect_2_tt:0 "Gagne §G100§! Points de Monarque aléatoires"
 wisdom_beyond_honor_cost_tt:0 "\n§RSagesse au-delà de l'Honneur§! : Épuisement de Guerre Mensuel : §R+0.1§!"
 barter_with_dark_spirits:0 "§RMarchander avec les Esprits Sombres§!"
 desc_barter_with_dark_spirits:0 "L'acte de Dévorer est parfois suffisant pour attirer quelqu'un près du Royaume des Esprits, assez près pour capter l'attention d'êtres plus impressionnants que la normale. Incapables de se forcer à travers les barrières séparant nos royaumes et les leurs, ils sont néanmoins disposés à offrir des services spécifiques en échange de sacrifices. À chaque acte, la barrière entre les mondes s'affaiblit ; on se demande ce qui arrivera quand elle cédera. La voie que vous avez dévorée vous dévorera-t-elle aussi ?"
 barter_with_dark_spirits_effect_tt:0 "Gagne §G1§! compétence de souverain aléatoire"
 barter_with_dark_spirits_effect_2_tt:0 "Gagne §G100§! Points de Monarque aléatoires"
 barter_with_dark_spirits_cost_tt:0 "\n§RMarchander avec les Esprits Sombres§! : Moral des Armées : §R-10.0%§!"
 witches_and_shamans_preview:0 "Sorcières et Chamans"
 desc_witches_and_shamans_preview:0 "L'acte de Dévorer est une voie vers de nombreuses capacités que certains considéreraient comme... contre-nature. Ses pratiquants sont souvent rejetés et bannis, mis de côté comme forces déstabilisatrices. Nous sommes le dernier refuge de ces parias, et ils nous servent avec joie. Sachant comment l'histoire se termine, il ne faudrait pas grand-chose pour tourner le bon esprit vers une voie aussi inévitable."
 witches_and_shamans:0 "Sorcières et Chamans"
 desc_witches_and_shamans:0 "L'acte de Dévorer est une voie vers de nombreuses capacités que certains considéreraient comme... contre-nature. Ses pratiquants sont souvent rejetés et bannis, mis de côté comme forces déstabilisatrices. Nous sommes le dernier refuge de ces parias, et ils nous servent avec joie. Sachant comment l'histoire se termine, il ne faudrait pas grand-chose pour tourner le bon esprit vers une voie aussi inévitable."
 witches_and_shamans_effect_tt:0 "Perd §R1§! Stabilité et obtient un §YMage de Guerre§!"
 witches_and_shamans_cost_tt:0 "\n§YSorcières et Chamans§! : Modificateur de Coût de Stabilité : §R+20.0%§!"
 advocation_of_chi_stealers:0 "§RPromotion des Voleurs de Chi§!"
 desc_advocation_of_chi_stealers:0 "« Je suis la mort certaine pour toutes choses. Pensez-vous que parce que vous êtes un jeune homme courageux, je retarderai ma visite jusqu'à ce que vous soyez vieux et impuissant ? À une heure inopportune je vous trouverai. Je vous prendrai. Retarder ma visite avec les âmes des autres ? Cent de leurs heures deviennent une des vôtres. Vous êtes mon agent alors. À votre deux-centième année, les jours couleront comme l'eau. Même si vous Dévorez, je vous Dévore aussi. »\n—Shukagi Sikala, Errer la Nuit"
 lifeExtension1_tt:0 "Notre espérance de vie sera augmentée à §G100§!"
 lifeExtension2_tt:0 "Notre espérance de vie sera augmentée à §G125§!"
 lifeExtension3_tt:0 "Notre espérance de vie sera augmentée à §G150§!"
 lifeExtension4_tt:0 "Notre espérance de vie sera augmentée à §G175§!"
 lifeExtension5_tt:0 "Notre espérance de vie sera augmentée à §G200§!"
 advocation_of_chi_stealers_cost_tt:0 "\n§RPromotion des Voleurs de Chi§! : Vitesse de Récupération des Effectifs : §R-15.0%§!"
 from_beyond_preview:0 "De l'Au-Delà"
 desc_from_beyond_preview:0 "On dit que le temple de Ghatasak fut corrompu il y a longtemps avec l'usage de la main gauche d'un moine mort. On dit que l'esprit des Collines-Démoniaques fut enseveli sous la terre avec bougie et couteau. On dit qu'il existe un moyen d'invoquer le pouvoir d'autres royaumes, un pouvoir qui trouble la terre elle-même."
 from_beyond:0 "De l'Au-Delà"
 desc_from_beyond:0 "On dit que le temple de Ghatasak fut corrompu il y a longtemps avec l'usage de la main gauche d'un moine mort. On dit que l'esprit des Collines-Démoniaques fut enseveli sous la terre avec bougie et couteau. On dit qu'il existe un moyen d'invoquer le pouvoir d'autres royaumes, un pouvoir qui trouble la terre elle-même."
 from_beyond_cost_tt:0 "\n§YDe l'Au-Delà§! : Dévastation Mensuelle Globale : §R+0.08§!"
 chroniclers_of_secret_histories:0 "Chroniqueurs des Histoires Secrètes"
 desc_chroniclers_of_secret_histories:0 "La Société des Serrures et des Clés se cache sous des couloirs sinueux et des passages secrets. Ses bibliothèques parsèment la terre, l'accès accordé avec le don d'un nouveau récit. Un millier de demi-histoires peuplent ses étagères : chacune une possibilité contradictoire de comment le passé a rencontré le présent, chacune une révélation née de la tempête, chacune une révolution naissante. Les moines des Xia voudraient nous faire oublier notre passé : que le contraire perdure."
 chroniclers_of_secret_histories_effect_tt:0 "Tous les Coûts de Pouvoir : §G-2.5%§!"
 chroniclers_of_secret_histories_mod:0 "Ruée de Chi : Chroniqueurs des Histoires Secrètes"
 chroniclers_of_secret_histories_boon_tt:0 "\n§YChroniqueurs des Histoires Secrètes§! : Tous les Coûts de Pouvoir : §G-2.5%§!"
 chroniclers_of_secret_histories_cost_tt:0 "\n§YChroniqueurs des Histoires Secrètes§! : Agitation Nationale : §R+1§!"
 gifts_for_fools:0 "Dons pour les Fous"
 desc_gifts_for_fools:0 "Les Oni, repoussés sans cesse dans les Collines-Démoniaques, apprirent à survivre par tous les moyens nécessaires. La fierté est un mot grossier ; pour tenir la tête haute, il ne faut pas craindre pour son cou. La Voie Dévorante enseigne l'ascétisme et la magie, mais elle enseigne aussi les techniques appropriées pour ramper, pour corrompre, pour feindre la sincérité. Ceux qui ont un jour craint la famine comprennent pourquoi."
 gifts_for_fools_mod:0 "Ruée de Chi : Dons pour les Fous"
 gifts_for_fools_effect_tt:0 "Impact de l'Expansion Agressive : §G-15.0%§!"
 gifts_for_fools_boon_tt:0 "\n§YDons pour les Fous§! : Impact de l'Expansion Agressive : §G-15.0%§!"
 gifts_for_fools_cost_tt:0 "\n§YDons pour les Fous§! : Corruption Annuelle : §R+0.10§!"
 to_devour_chi_preview:0 "§RDévorer le Chi§!"
 desc_to_devour_chi_preview:0 "L'acte principal de la Voie est de Dévorer : le processus d'absorber le Chi, de le revendiquer pour soi, de le retirer à un autre. Laissez la sensation enivrante couler en vous, plus aiguë que n'importe quel encens, une énergie au-delà de la vôtre. Prenez-la, grandissez par elle, regardez les souvenirs défiler et apprenez d'elle. Attention à ne pas Dévorer trop, ou vous serez transposé dans le royaume des esprits : la Voie qui Dévore vous Dévore aussi."
 devouring_path_need_one_aspect_tt:0 "£no£A §Y1§! autre §YSerment de la Main Gauche§!"
 to_devour_chi:0 "§RDévorer le Chi§!"
 desc_to_devour_chi:0 "L'acte principal de la Voie est de Dévorer : le processus d'absorber le Chi, de le revendiquer pour soi, de le retirer à un autre. Laissez la sensation enivrante couler en vous, plus aiguë que n'importe quel encens, une énergie au-delà de la vôtre. Prenez-la, grandissez par elle, regardez les souvenirs défiler et apprenez d'elle. Attention à ne pas Dévorer trop, ou vous serez transposé dans le royaume des esprits : la Voie qui Dévore vous Dévore aussi."
 to_devour_chi_effect_tt:0 "Débloque les §YExplorations de Temples§! et la §YCorruption§!"
 to_devour_chi_effect_2_tt:0 "Débloque un (autre) aspect §RDévorant§!"
 to_devour_chi_cost_tt:0 "\n§RDévorer le Chi§! : Équivalent Légitimité Annuelle : §R-1§!"
