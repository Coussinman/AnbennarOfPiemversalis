 #Skaldhyrric#

 skald_einher_tooltip:0 "L'Einher commencera à traquer sa proie."
 skald_hunting_tooltip:0 "Nous pourrons organiser une Grande Chasse à moitié prix."
 summon_forth_einher_title:0 "Invoquer l'Einher !"
 summon_forth_einher_desc:0 "À notre grand désarroi, un mal des plus infâmes a ouvertement ravagé notre royaume depuis quelque temps. D'innombrables héros et aventuriers sont partis affronter cette menace, mais elle demeure. Pourtant, il reste encore quelqu'un que l'on peut appeler en notre heure de besoin : invoquez l'Einher, le plus grand des héros !"
 call_great_hunt_title:0 "Organiser une Grande Chasse"
 call_great_hunt_desc:0 "Les pics les plus élevés, les forêts les plus sombres, les mers les plus profondes : voilà où nous, Gérudiens, allons chercher l'aventure. Les défis les plus anciens, combattre les champions de Halann même, le tout en compagnie de camarades et d'une gourde d'hydromel : que demander de mieux ! Qu'il s'agisse d'un ours, d'un troll, d'un lindwurm ou d'une grande baleine, si cela saigne, cela peut mourir !"
 skald_reformation_1_title:0 "Organiser les Scaldes"
 skald_reformation_1_desc:0 "À travers la Gérudie, la Foi Skaldhyrrique est fragmentée entre d'innombrables sectes régionales, seulement vaguement guidées par le clergé de la Skaldskola. Si nous espérons répondre aux bouleversements religieux des méridionaux et les surmonter, nous devons présenter un front uni. Convoquons les Scaldes de toute la Gérudie en conclave : le canon sera discuté, la tradition légitimée et le commandement assuré !"
 skald_reformation_2_title:0 "Étendre la Foi Skaldhyrrique"
 skald_reformation_2_desc:0 "Suite au premier conclave de la Foi Skaldhyrrique, les plus perspicaces ont comparé la théologie cannorienne à la nôtre. Il est clair qu'il existe des similitudes dans les récits de vaillance et de dieux. Mais là où leurs histoires reposent sur les paroles de dieux morts, les nôtres sont fondées sur l'histoire véritable, chroniquée par les archives de la Skaldskola ! Avec un peu de persuasion et quelques retouches soigneuses, les gens des Marches et au-delà pourraient être convaincus de reconnaître les véritables récits !"
 skald_reformation_3_title:0 "Une Saga de Givre et de Flamme"
 skald_reformation_3_desc:0 "Depuis l'époque de Castan Givre Ébène et Henrik Fléau-des-Fosses, les Gérudiens n'avaient plus dominé les mers et les terres lointaines, mais contrairement à cette ère, la Foi Skaldhyrrique peut désormais être entendue récitée dans les halls de Cannor et au-delà. Non seulement des Gérudiens se rassemblent à la Skaldskola pour des débats liturgiques, mais aussi des scaldes formés parmi les demi-elfes d'Anbennar, les orques d'Escann, et même les skraelings d'Aelantir. L'ascension de la Foi Skaldhyrrique mérite désormais véritablement un récit épique."
 important_skaldhyrric_provs:0 "Cités Skaldhyrriques Importantes"
 skaldhyrric_provs_tt:0 "§YProvince(s)§! est un lieu passé, présent ou futur d'importance pour la §YFoi Skaldhyrrique§! (voir §YProvinces à mettre en évidence§!)"

 skaldhyrric.2.t:0 "Le Récital"
 skaldhyrric.2.d:0 "« Je sais ce que je veux, écoutons un autre récit ! »\n\n« J'ai préparé une brève liste de lectures pour ce soir », explique le Scalde en déposant une imposante pile de tomes et de parchemins sur la table. « Bien sûr, Le Dragon et le Scalde est un classique. Peut-être quelque chose d'un peu plus vaillant, comme Gjalund et les Pourfendeurs de Géants ? Ou peut-être que vos petits ont besoin d'aide pour s'endormir, la Vieille Berceuse de l'Hiver devrait y contribuer. Bien sûr, j'en ai bien d'autres parmi lesquels vous pouvez choisir. Vos désirs sont des ordres, comme toujours. »"
