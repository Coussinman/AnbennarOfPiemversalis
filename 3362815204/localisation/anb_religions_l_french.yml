 akasik_justice_3_desc:0 "L'aspect de la Mère représentant son administration de la justice, qui inspire loyauté et promptitude à agir.\n\nPuisque §Gles huit provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Gélevés§!.\nNous sommes unis avec la Mère.\n\nAspects à venir :\n§MRésilience§! :\n   Troubles nationaux : §G-2§!\n   Défensivité : §G+20 %§!\n   Coût des idées §R+5 %§!\n§GCompassion§! :\n   Réputation diplomatique : §G+2§!\n   Amélioration des relations : §G+20 %§!\n   Moral des armées §R-5 %§!\n§YRéciprocité§! :\n   Coût des idées : §G-10 %§!\n   Efficacité commerciale : §G+10 %§!\n   Troubles nationaux §R+1§!"
 akasik_resilience_1:0 "Aspect de Résilience"
 akasik_resilience_1_desc:0 "L'aspect de la Mère représentant sa résilience dans les moments difficiles, qui inspire le calme et un sens du stoïcisme.\n\nPuisque §Rmoins de quatre provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Rfaibles§!.\nNous devons unifier Mère Akasik pour la vénérer pleinement.\n\nAspects à venir :\n§MCompassion§! :\n   Réputation diplomatique : §G+1§!\n§GRéciprocité§! :\n   Coût des idées : §G-5 %§!\n§YJustice§! :\n   Moral des armées : §G+5 %§!"
