 demon_warriors:0 "Guerriers Démoniaques"
 desc_demon_warriors:0 "Les Oni des Collines-Démoniaques sont des créatures recluses, souvent sujets de mythes chenus et de légendes brumeuses. Certains prétendent qu'ils dévorent les humains, d'autres qu'ils les réduisent en esclavage. Néanmoins, chaque année, des caravanes de pèlerins désespérés gravissent les Collines-Démoniaques, cherchant sagesse et assistance quand nul autre recours ne leur reste. Certains guerriers adoptent leur mode de vie monastique et apprennent des techniques interdites, devenant des Yaorenjun. Certains ne reviennent jamais."
 demon_warriors_mod:0 "Afflux de Chi : Guerriers Démoniaques"
 demon_warriors_effect_tt:0 "Choc d'infanterie : §G+0,2§!"
