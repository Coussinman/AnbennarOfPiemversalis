 dictats_of_isparokaeus_deity_level_1:0 "Dictats d'Isparokaeus" #Written By: Karlov
 dictats_of_isparokaeus_deity_level_1_desc:0 "§YDictats d'Isparokaeus§!\nLes enseignements d'Isparokaeus d'Empkeios notent que la réalité n'est pas attachée aux choses physiques, mais à la perception de l'esprit. En tant que tel, ce n'est pas la force mesurable d'un Kheion qui importe, mais ce que les autres voient de la force et du prestige du dirigeant. Pour qu'un Kheion soit honorable, puissant et juste, il faut que les esprits des autres le croient ainsi. La philosophie isparokéenne souligne la nécessité de cultiver constamment une réputation puissante auprès des citoyens comme des étrangers, permettant au Kheion de parler avec des mots grandiloquents portés par des navires rapides et des langues d'argent.\n\nSi l'Ordre Sacré des §YDictats d'Isparokaeus§! est placé dans plus de §Y50%§!([Root.kheionism_dictats_of_isparokaeus_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75%§!([Root.kheionism_dictats_of_isparokaeus_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nAmélioration des relations : §G+30.0%§!\n\nSi l'Ordre Sacré des §YDictats d'Isparokaeus§! est placé dans plus de §Y75%§!([Root.kheionism_dictats_of_isparokaeus_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nAmélioration des relations : §G+30.0%§!\nPolitiques diplomatiques gratuites : §G+1§!"
