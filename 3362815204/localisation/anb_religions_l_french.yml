 laskaris_creed_deity_level_1:0"Credo de Laskaris" #Written By: Takasaki
 laskaris_creed_deity_level_1_desc:0"§YCredo de Laskaris§!\nPuisant dans diverses philosophies différentes et les propres expériences du Conquérant à Taychend, Laskaris et ses proches compagnons transformèrent Ameion en une société civique militarisée, plaçant la conquête et la domination militaire au premier plan de l'activité étatique. S'inspirant des textes archatiradistes, les adeptes de Laskaris croyaient également que l'État devait jouer un rôle actif et vigoureux dans la résolution de « l'arriération » des bharbhen — après la mort de Laskaris, cela se cristalliserait en une politique de suprématie culturelle et politique kheionai imposée militairement, dans un processus impliquant une codification générale de ses croyances en une philosophie unique.\n\nSi l'Ordre Sacré du §YCredo de Laskaris§! est placé dans plus de §Y50%§!([Root.kheionism_laskaris_creed_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75%§!([Root.kheionism_laskaris_creed_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nMoral des armées : §G+15.0%§!\n\nSi l'Ordre Sacré du §YCredo de Laskaris§! est placé dans plus de §Y75%§!([Root.kheionism_laskaris_creed_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nMoral des armées : §G+15.0%§!\nPolitiques militaires gratuites : §G+1§!"
