   #Ja'akaiin
 jaakaiin:0 "Ja'akaiin"
  jaakaiin_religion_desc:0 "Ja'akaiin, signifiant le Chant de l'Eau dans la langue Kooras, est la foi des Elfes Nés-des-Ruines Kooras. Bien que certaines croyances des Kooras diffèrent d'une tribu à l'autre, les principes fondamentaux du Ja'akaiin consistent en des notions animistes, la croyance au Monde d'Eau et au Monde Sombre, Mondes opposés qui composent l'univers et dans lesquels seul le Bien ou le Mal peut être trouvé, et le culte de l'eau et de la Damestear. Parmi les autres croyances importantes figurent leur Au-delà unique, dans lequel les esprits des défunts intègrent la manifestation de l'eau la plus en accord avec la personne de son vivant, et une cosmogonie partagée.\n\nDans les mythes Kooras, le Monde-Total fut créé par les quatre grands dieux : Kseldos, dieu du Monde d'Eau, Dikaal, dieu du Monde de Feu, Etkal, dieu du Monde de Pierre et Chkalii, déesse du Monde d'Air. Ces Mondes étaient des Mondes de Bien, et en tant que tels, seul le Bien pouvait y être trouvé. Les mythes parlent ensuite de la traîtrise de Dikaal, où Dikaal créa de force les Observateurs Silencieux et corrompit son monde en Monde Sombre. Les autres dieux tuèrent Dikaal en représailles, mais le Monde Sombre tordit leurs cœurs et une bataille éclata entre eux. Finalement, on dit que Kseldos, après avoir tué ses compagnons divins au combat, vit le Monde Sombre engloutir le Monde-Total et, dans une grande tristesse, décida de créer les manifestations de l'eau afin que le Monde d'Eau puisse demeurer une source de Bien même après sa mort inévitable."
  the_rain:0 "La Pluie"
  the_rain_desc:0 "On pense souvent que la Pluie détient la Vertu de Prospérité, apportant une nouvelle vie à l'univers à chacune de ses occurrences. Les âmes qui rejoignent la Pluie étaient souvent chasseurs ou fermiers de leur vivant."
  the_rain_upgraded:0 "La Pluie"
  the_rain_upgraded_desc:0 "On pense souvent que la Pluie détient les Vertus de Prospérité et de Victoire, apportant une nouvelle vie à l'univers à chacune de ses occurrences, tout en représentant les guerres célestes. Les âmes qui rejoignent la Pluie étaient souvent chasseurs, fermiers ou guerriers de leur vivant. C'est aussi là où vont les Corinites après la mort."
  jaakaiin_the_river:0 "La Rivière"
  jaakaiin_the_river_desc:0 "On croit généralement que la Rivière détient la Vertu d'Amitié, liant les Harafiques entre eux. Les âmes de personnes très charismatiques et sociables rejoignent souvent la Rivière à leur mort. Elle est aussi considérée comme la manifestation que rejoignent les infidèles après la mort."
  jaakaiin_the_river_upgraded:0 "La Rivière"
  jaakaiin_the_river_upgraded_desc:0 "On croit généralement que la Rivière détient les Vertus d'Amitié et de Lien Animal car elle lie les Harafiques et les petites gens ensemble, en plus d'héberger le Grand Zodiaque Ynnique. Les âmes de personnes très charismatiques et sociables rejoignent souvent la Rivière ainsi que celles des grands cavaliers et dompteurs d'animaux. Elle est aussi considérée comme la manifestation que rejoignent les infidèles Harafiques, petites gens et Ynniques après la mort."
  the_sea:0 "La Mer"
  the_sea_desc:0 "La Mer, avec son étendue sans fin et sa nature apparemment immobile, est considérée comme détenant la Vertu de Tradition. La plupart des Chanteurs rejoignent la Mer après la mort."
  the_sea_upgraded:0 "La Mer"
  the_sea_upgraded_desc:0 "La Mer est à la fois une étendue sans fin et la porteuse de nouvelles découvertes. Elle est le lien vers Cannor et tout Halcann. En tant que telle, elle est considérée comme détenant les Vertus de Tradition et de Nouveauté, et c'est là où vont la plupart des Chanteurs et des infidèles Halcanniens après la mort."
  the_blood:0 "Le Sang"
  the_blood_desc:0 "Le Sang est un rappel de la divinité de Kseldos et de la beauté qu'il a ramenée au monde, et en tant que tel détient la Vertu de Beauté. Peu d'âmes rejoignent le Sang après la mort, car on pense que c'est un honneur réservé aux plus grands chefs."
  the_blood_upgraded:0 "Le Sang"
  the_blood_upgraded_desc:0 "Le Sang est un rappel de la divinité de Kseldos et de la beauté qu'il a ramenée au monde, ainsi que des grandes machineries de cette nouvelle ère, et en tant que tel détient les Vertus de Beauté et de Praticité. Peu d'âmes rejoignent le Sang après la mort, car on pense que c'est un honneur réservé aux plus grands chefs et artificiers."
  upgrade_river_title:0 "Canoniser la Nouvelle Vertu de la Rivière"
  upgrade_river_desc:0 "Nous avons découvert que d'autres elfes, comme nous, vénèrent une grande rivière. Bien qu'ils ne comprennent pas la divinité de Kseldos, leur maîtrise de l'équitation et leur grand Zodiaque nous ont montré que la Rivière peut détenir une autre Vertu que celle de l'Amitié : la Vertu du Lien Animal. Une assemblée de Chanteurs doit être convoquée pour canoniser cette nouvelle Vertu !"
  jaakaiin_upgrade_river_tt:0 "Améliorez la §YRivière§! avec §G+10 %§! de capacité de combat de cavalerie"
  upgrade_sea_title:0 "Canoniser la Nouvelle Vertu de la Mer"
  upgrade_sea_desc:0 "Des gens nouveaux et inconnus sont venus à Haraf de l'autre bout de la Mer, se faisant appeler Cannoriens. Alors que nous pensions que la Mer n'était qu'une gardienne des traditions, les Cannoriens nous ont montré que la Mer peut détenir une autre Vertu que celle de la Tradition : la Vertu de Nouveauté. Une assemblée de Chanteurs doit être convoquée pour canoniser cette nouvelle Vertu !"
  upgrade_sea_tt:0 "Améliorez la §YMer§! avec §G+15 %§! de propagation des institutions"
  upgrade_rain_title:0 "Canoniser la Nouvelle Vertu de la Pluie"
  upgrade_rain_desc:0 "Des histoires d'une pluie rouge et irrésistible sur Cannor parviennent à nos oreilles. Selon les Cannoriens, l'âme d'une grande guerrière, Corin, a rejoint la Pluie après sa mort. Les Corinites nous ont montré que la Pluie peut détenir une autre Vertu que celle de la Prospérité : la Vertu de Victoire. Une assemblée de Chanteurs doit être convoquée pour canoniser cette nouvelle Vertu !"
  upgrade_rain_tt:0 "Améliorez la §YPluie§! avec §G+5 %§! de dégâts de moral"
  upgrade_blood_title:0 "Canoniser la Nouvelle Vertu du Sang"
  upgrade_blood_desc:0 "Les petites gens ont apporté à Haraf un concept tout nouveau : « l'artisanat magique ». Certaines des grandes machineries créées avec utilisent des fragments du Sang de Kseldos, qu'ils appellent Damestear, pour s'alimenter. Les petites gens et leur artisanat magique nous ont montré que le Sang peut détenir une autre Vertu que celle de la Beauté : la Vertu de Praticité. Une assemblée de Chanteurs doit être convoquée pour canoniser cette nouvelle Vertu !"
  upgrade_blood_tt:0 "Améliorez le §YSang§! avec §G-2,5 %§! de coût de technologie"
 #Eotomolaque
 eotomolaque:0 "Eotomolaque"
  eotomolaque_religion_desc:0 "La religion Epednar est centrée sur le culte des Oiseaux-Tonnerre de l'Étendue, qu'ils croient avoir été autrefois un peuple mythique dont descendent les Epednar. Leur mythe de création raconte comment ces gens, les Eotomolaque, furent créés aux côtés de trois autres races elfiques par quatre dieux cruels et oppressifs. Puis, il explique comment trois de ces peuples, dont les Eotomolaque, se révoltèrent contre leurs dieux respectifs et les tuèrent, absorbant leurs pouvoirs et devenant des bêtes légendaires, qui à ce jour protègent leurs descendants. Ils croient que les Eotomolaque sont devenus les Epednar, leur animal totem étant l'Oiseau-Tonnerre. Les Eotepn sont devenus les Rzentur, leur animal totem étant le Dragon, et les Eotyr sont devenus les Chiunife et les Haraf'ne, leur animal totem étant la Baleine Poskawa. Pendant ce temps, on dit que le peuple qui est resté sous le joug et a continué à vénérer son dieu de l'eau est devenu les Ynniques, qui n'ont donc pas d'animal totem. Une pratique courante chez les Epednar est ce qu'ils appellent la Danse du Tonnerre, qui consiste en de multiples épreuves physiques et mentales, tandis qu'ils se sacrifient pour la communauté, à l'imitation des Eotomolaque d'antan."
  eotomolaque_rebels_demand:0 "Convertir $COUNTRYNAME$"
  eotomolaque_rebels_demand_desc:0 "Les rebelles religieux combattent pour la religion $RELIGION$. Ils exigent que nous reconnaissions sa suprématie ou, à tout le moins, que nous cessions nos efforts pour les convertir et les laissions pratiquer leur culte en paix."
  eotomolaque_rebels_title:0 "Religieux"
  eotomolaque_rebels_name:0 "Zélotes $RELIGION$"
  eotomolaque_rebels_desc:0 "Les fanatiques religieux ont tendance à se soulever dans les provinces contrôlées par des nations d'une foi différente. Ils cherchent à répandre leur foi et à châtier tous les mécréants."
  eotomolaque_rebels_army:0 "Armée $RELIGION$"
  #Great Tceusluhd
 great_tceusluhd:0 "Grande Tceusluhd"
  great_tceusluhd_religion_desc:0 "Grande Tceusluhd, signifiant Grande Chasse en Chiunife, est la religion chamanique des Nés-des-Ruines Chiunife de la Chaîne d'Ekyunimoy. Au centre de la religion se trouve leur croyance en Eslu, un dieu créateur sévère qui conçut le cycle des âmes à travers le Monde d'En-Haut physique et le Monde d'En-Bas spirituel, et le Coyote, un esprit trompeur et perfide élevé et doté de pensée par Eslu, avant de détruire le tissu de la réalité en essayant d'échapper à ses lois. Eslu est maintenant piégé dans le Vide Impie Entre-Deux, chassant et absorbant les âmes qui tombent dans son royaume, et on dit qu'il se relèvera à nouveau quand il aura récupéré la force de toutes les âmes souillées par le Coyote.\n\nUn aspect majeur de la Grande Tceusluhd vient des myriades de façons dont Eslu et le Coyote sont vus par différentes tribus. En 1444, l'opinion la plus répandue est qu'Eslu était un dieu nécessairement oppressif, diabolisant le Coyote pour avoir déchiré la réalité. Ces tribus tirent une grande fierté de faire partie d'Eslu à leur mort et considèrent la chasse et les sacrifices d'animaux comme des activités sacrées qui renforcent Eslu. Cependant, certains Chiunife vénèrent le Coyote et d'étranges elfes-coyotes nés de chamans appelés Decuvie, adoptant une position similaire à celle des Epednar en disant qu'Eslu était un dieu cruel méritant d'être renversé. Ces cultes s'adonnent fréquemment à la nécromancie afin de voler des âmes à Eslu et s'élèvent au premier plan quand leur peuple est menacé par des menaces extérieures."
  great_tceusluhd_rebels_demand:0 "Convertir $COUNTRYNAME$"
  great_tceusluhd_rebels_demand_desc:0 "Les rebelles religieux combattent pour la religion $RELIGION$. Ils exigent que nous reconnaissions sa suprématie ou, à tout le moins, que nous cessions nos efforts pour les convertir et les laissions pratiquer leur culte en paix."
  great_tceusluhd_rebels_title:0 "Religieux"
  great_tceusluhd_rebels_name:0 "Zélotes $RELIGION$"
  great_tceusluhd_rebels_desc:0 "Les fanatiques religieux ont tendance à se soulever dans les provinces contrôlées par des nations d'une foi différente. Ils cherchent à répandre leur foi et à châtier tous les mécréants."
  great_tceusluhd_rebels_army:0 "Armée $RELIGION$"
 #Skincarvers
 skincarvers:0 "Scarificateurs"
 skincarvers_religion_desc:0 "Bien que l'existence même d'une culture des « Observateurs Silencieux » soit débattue parmi les érudits, certains comportements des Observateurs Silencieux pourraient représenter des croyances religieuses ou des superstitions. À savoir, les marques de scarification que l'on peut trouver sur de nombreux cadavres d'Observateurs Silencieux. Les Observateurs Silencieux utilisent souvent des pigments naturels pour teindre leurs cicatrices dans une forme d'art arcane. Cet art corporel, si on le regarde trop longtemps, peut provoquer des visions confuses et étranges et causer des sentiments de dissociation chez l'observateur. De nombreuses théories existent sur cette tradition, l'école de pensée la plus populaire suggérant qu'il s'agit d'un simple instinct sauvage. Mais les détracteurs de cette simplification d'un comportement complexe citent les visions comme preuve qu'une explication de la tradition pourrait être bien plus profonde. D'autres théories incluent : des représentations de castes ou de rôles sociétaux des Précurseurs, des représentations de leur dieu ou de leurs dieux, un ensemble de marqueurs culturels représentant des accomplissements rituels ou sociétaux, ou même des visions enregistrées d'événements futurs. Cependant, la nature exacte de ces comportements ne sera probablement jamais comprise en raison de l'impossibilité de tout contact avec les Observateurs Silencieux."

 mother_snake:0 "Serpent Mère"
 mother_snake_religion_desc:0 "Les adorateurs du Serpent Mère la croient être une bête ancienne de l'époque des Bêtes Héroïques, qui trahit le Valeureux Mangouste pour ses propres raisons et trouva refuge à Yezel Mora. Elle protège de petites bandes de Tanizu parias qui habitent le marais, et autant de versions de son mythe existent qu'il y a de groupes de ses adorateurs. Elle accorde à ses fidèles des pouvoirs de métamorphose, leur conférant la capacité de se transformer à l'image de charognards infectés par la pourriture et de plantes mort-vivantes."
 rufaro_the_frog_modifier:0 "Conseils de Rufaro la Grenouille"
 tanizu_animal_companion_modifier:0 "Compagnon Animal"

 #Baashidi
 rinta_seekers:0 "Chercheurs de Rinta"
 rinta_seekers_religion_desc:0 "Développée par le philosophe Kabil Hadni, les Chercheurs de Rinta prêchent que les cieux sont gouvernés par des âmes mortelles qui ont chassé les dieux malveillants formant désormais les étoiles du ciel. Ils croient que le paradis ne peut être atteint qu'en atteignant l'illumination par la contemplation de la loi divine du monde, et consacrent leurs vies à se préparer pour le voyage contemplatif vers le paradis qu'ils entreprendront dans l'au-delà."
 habab_zar:0 "Habab Zar"
 habab_zar_religion_desc:0 "Habab Zar est le nom donné à l'ensemble des magies d'exorcisme et des rituels spirituels qui précèdent le développement des Chercheurs de Rinta. Les pratiquants du Habab Zar n'ont pas d'objet unique de vénération, vénérant plutôt des lieux locaux de signification spirituelle."
 genie_cult:0 "Culte des Génies"
 genie_cult_religion_desc:0 "Parmi de nombreuses religions sarhalies, les Génies sont vénérés ou craints en raison de leur immense pouvoir, et des nombreux mythes entourant leurs exploits. Cela se voit mieux dans les terres d'Ardimya, où la sage djinn dont la région tire son nom fonda un royaume grandiose qui conserve un puissant héritage à travers les terres sub-sahéliennes. Les gens d'ici l'adoraient elle et les génies comme les êtres les plus élevés possibles, abandonnant leurs propres dieux.\n\nDe nos jours, peu restent pour pratiquer les arts du Culte des Génies, en raison du massacre massif des Guryadagga par les Qeyikul. Bien qu'ils frôlent l'extinction, de petites tribus à travers le continent persistent dans leurs pratiques. La plupart se concentrent autour d'Ardimya et de son culte en raison de l'héritage de son royaume. Les Guryadagga ne croient cependant pas qu'elle soit plus suprême que les autres génies ; ils croient que les Génies ne naissent pas nécessairement égaux, mais qu'ils ne sont pas nécessairement « au-dessus » d'un autre génie simplement à cause de cela.\n\nBeaucoup des pratiques trouvées dans le Culte des Génies peuvent être vues comme les ancêtres de nombreuses pratiques des religions Habab Zar et Chercheurs de Rinta. Ce qui les différencie est leur croyance directe en des divinités de pouvoir supérieur, et leur utilisation de l'idolâtrie et de l'encens pour invoquer leur pouvoir dans la prière.\n\nOn dit que de nombreuses pratiques du Culte des Génies proviennent des peuples Dim, des anciens Bulwaris, et de groupes plus petits qui deviendraient les ancêtres des peuples vivant dans le Jasiir Jadid et le Jasiir Doog."
 #Effelai Worship Religions
 chahinanito_blessings:0 "Bénédictions de Chahinanito"
 pick_chahinanito_blessing:0 "Consacrer une Région"
 tswohvwohii_blessings:0 "Bénédictions de Tswohvwoh'ii"
 pick_tswohvwohii_blessing:0 "Consacrer une Région"
 senanset_blessings:0 "Bénédictions d'Effelai"
 pick_senanset_blessing:0 "Consacrer une Région"

 effelai_the_claw:0 "Effelai Orientale, la Griffe"
 HOLY_SITE_2240_DESC:0 "Un vaste labyrinthe quasi-infini de fourrés denses, l'air épais d'anticipation nerveuse. La chasse se déroule tout autour de nous, un terrain d'épreuve pour les plus puissants prédateurs et les proies les plus résistantes. Le respect donné est la sécurité gagnée."

 effelai_the_maw:0 "Les Marais-aux-Sangsues, la Gueule"
 HOLY_SITE_2232_DESC:0 "Des marécages fétides infestés de sangsues s'étendent aussi loin que le regard peut porter dans toutes les directions. Des vignes tordues et enchevêtrées sont souvent impossibles à distinguer de grotesques appendices tentaculaires s'étirant désespérément à la recherche de proies. Ce lieu est d'Elle, et pourtant séparé d'Elle."

 effelai_the_head:0 "Soruin, le Cerveau"
 HOLY_SITE_2199_DESC:0 "L'air inondé de brume épaisse, la lumière tachetée touche rarement le sol de la jungle ici, mais quand elle le fait, elle illumine une architecture ancienne et des flèches croulantes envahies après avoir été intouchées pendant des millénaires."

 effelai_the_spine:0 "Effelai Occidentale, l'Échine"
 HOLY_SITE_2355_DESC:0 "Elle est avec nous. L'énergie vitale inonde notre esprit dans ces bosquets, les fruits cueillis nourrissent le corps et l'âme en parts égales, en proportion de la révérence qui Lui est témoignée. Un répit des conditions extrêmes trouvées ailleurs sous Sa canopée. Un paradis verdoyant."

 effelai_the_heart:0 "Effelai Méridionale, le Cœur"
 HOLY_SITE_2377_DESC:0 "Ici la véritable harmonie est trouvée. La jungle vibre au rythme du bruissement des feuilles, du goutte-à-goutte de la rosée et du balancement des branches, comme un cœur battant. Ici tous les souffles ne font qu'un. Ici Sa voix est créée et libérée."

 effelai_the_desacration:0 "La Côte Sèche, la Profanation"
 HOLY_SITE_2302_DESC:0 "Un silence assourdissant. Sol stérile et sable, fosses de boue ne contenant que des souvenirs lointains de pluie. Sa désolation est un avertissement, un rappel. Un jour Elle reviendra sur cette terre, les premières incursions prudentes visibles à l'œil averti, mais pour l'instant cette terre reste vide."

 effelai_the_tumor:0 "La Forêt-aux-Champignons, la Tumeur"
 HOLY_SITE_2371_DESC:0 "Une anomalie sous Sa canopée. D'immenses champignons occultant le ciel, des réseaux mycéliens semblables à des toiles s'entrelaçant dans un sol autrement vide. Ici la jungle vient mourir. Pour mettre fin à sa vie naturelle et fournir subsistance à une nouvelle vie."
 #Gotiriei
 gotiriei:0 "Gotiriei"
 gotiriei_religion_desc:0 "La tradition Gotiriei soutient que tous les Vrais Rois divins sauf un sont morts dans la dernière de plusieurs batailles titanesques contre les forces de l'Oubli, qui furent scellées à la création de l'univers et s'infiltrèrent ensuite à nouveau dans Halann par la folie de la race elfique. Alors que ses frères mouraient autour de lui pour éviter le plus récent Grand Déséquilibre, le Dernier Vrai Roi bénit un simple berger avec la royauté sacrée au sommet du Rigoti, le pic le plus serein de Halann, et continue de guider et d'habiliter les rois Eltibhar à ce jour. Les rois Eltibhar doivent donc chercher la bénédiction du Dernier Vrai Roi, être mis à l'épreuve et triompher, avant d'être considérés comme véritablement grands.\n\nÀ première vue, une telle eschatologie mystique pourrait sembler totalement en contradiction avec ses voisins kheions. Pourtant, les deux croyances sont intensément préoccupées par la bonne gouvernance et le caractère d'un dirigeant juste, et les deux croyances croient qu'il reste peu aux elfes de Halann sinon leur propre ingéniosité. Tous les Vrais Rois sauf un sont morts, et si nous voulons éviter l'Oubli, nous devons reprendre leur manteau."

 east_sarhal_religion:0 "Sarhalie Orientale"

 #Amadian
 amadian_religion: "Amadienne"
 rioqay_diu: "Rioqay Diú"
 rioqay_diu_religion_desc: "Rioqay Diú, signifiant « Dieux-Images » en Amadien, est une foi panthéonique englobant diverses croyances et rituels Amadiens. Commun à toutes les doctrines Rioqay Diú est le culte du dieu créateur Ñawsayachaer et la croyance en la Fragmentation, une catastrophe au millionième jour d'existence qui divisa toute la réalité. Les dieux furent fragmentés en « visages », prenant différents aspects de la création que leur dieu parent gouvernait à l'origine. Ñawsayachaer lui-même fut déchiré en le Dieu du Soleil, la Déesse de la Lune et l'Émissaire de l'Au-delà, créant un déséquilibre dans les lois fondamentales du monde."
 nawsayachaer: "Ñawsayachaer"
 nawsayachaer_desc: "Ñawsayachaer était autrefois le dieu du temps et de la création, mais s'est depuis divisé en trois. Ñawach, Dieu du Soleil, est honnête et bienveillant, et montre de la bonté envers tous. Sayaer, Déesse de la Lune, ayant découvert la féminité, est silencieuse et miséricordieuse ; elle garde ceux qui se retrouvent dans les ténèbres. Musatqyachio, Émissaire de l'Au-delà, est le vide formé par leur séparation ; malgré les meilleurs efforts des dieux du temps, la création n'est toujours pas complète. Musatqyachio voyage dans l'abîme de l'au-delà, revenant occasionnellement sous forme de présages dans le ciel. De la division de Ñawsayachaer vient la magie chaotique d'Amadia."
 nawach: "Ñawach"
 nawach_desc: "Ñawach, qui soutient le soleil, améliore le monde pendant la journée, et contrôle le présent et l'avenir immédiat. Son patronage rend les gens plus désireux de contribuer au bien commun."
 sayaer: "Sayaer"
 sayaer_desc: "Sayaer, qui soutient la lune, améliore le monde pendant la nuit, et contrôle les marées et l'avenir lointain. Sa grâce permet aux travailleurs de travailler la nuit sans crainte."
 musatqyachio: "Musatqyachio"
 musatqyachio_desc: "Musatqyachio, Esprit de l'Au-delà, revient rarement de ses voyages, tout comme on ne peut revenir au passé. Interpréter correctement ses signes dans le ciel peut apporter de grandes aubaines."

 prawyukis: "Prawyúkis"
 prawyukis_desc: "Autrefois roi arrogant et vaniteux des mers, Prawyúkis s'est depuis divisé en quatre dieux, chacun avec un dédain pour leur forme précédente et cherchant à s'améliorer. Prayú, Roi des Eaux Paisibles, chercha à faire la paix avec ceux que Prawyúkis avait méprisés, et créa le Lac Chakantu comme cadeau au peuple. Wuqúchis, Roi des Eaux Rudes, chercha à défendre ceux que Prawyúkis avait blessés, et protégea les marins. Ma Uyáy et Ma Éi, le Maître des Formes et le Maître de la Viscosité, cherchèrent à fournir de l'aide à ceux que Prawyúkis avait dépouillés, et fournirent aux Amadiens les secrets de la construction navale et de la natation. Bien qu'ils se querellent parfois, les quatre dieux de la mer ont finalement tous les mêmes intérêts."
 prayu: "Prayú"
 prayu_desc: "Prayú, Roi des Eaux Paisibles, règne sur le Lac Chakantu, et est vu comme un patron des Quchamár. Il assure des mers calmes pour nos marchands."
 wuquchis: "Wuqúchis"
 wuquchis_desc: "Wuqúchis, Roi des Eaux Rudes, règne sur les océans, et est un patron du peuple de Cara Banqúm. Il protège nos bateaux de la cruauté de la mer."
 ma_uyay: "Ma Uyáy"
 ma_uyay_desc: "Ma Uyáy, Maître des Formes, a enseigné aux Amadiens les secrets de la construction navale. Ses bénédictions inspirent nos constructeurs navals à travailler plus efficacement."
 ma_el: "Ma Éi"
 ma_el_desc: "Ma Éi, Maître de la Viscosité, gouverne la flottaison et la submersion, et a enseigné aux Amadiens comment nager. Ses dévots sont des nageurs habiles."

 tarplanaq: "Tarpláñaq"
 tarplanaq_desc: "Tarpláñaq était le gardien de l'équilibre de la verdure. Sa division créa trois rois de la nature. Láñaq, Roi de la Floraison, hait ses frères et l'équilibre de la verdure, et souhaite voir la verdure durer éternellement. Pamiyuk, Roi du Flétrissement, n'a aucune haine pour ses frères, et essaie de faire voir à Láñaq la vérité de l'équilibre sans succès. Chaque année ils combattent, de force égale, avec la moitié de l'année laissant un frère vainqueur, et l'autre moitié laissant l'autre vainqueur. Haq, Forgeur de l'Évolution, ne se soucie pas des querelles de ses frères, seulement de l'art et de la création de nouvelles formes de vie. Il passe la plupart de son temps avec Ma Uyáy et Ma Éi, travaillant à créer de nouvelles choses."
 lanaq: "Láñaq"
 lanaq_desc: "Láñaq, Roi de la Floraison, souhaite voir la saison de croissance devenir éternelle, et combat la décomposition. Il bénit nos fermiers avec de plus grands rendements."
 pamiyuk: "Pamiyuk"
 pamiyuk_desc: "Pamiyuk, Roi du Flétrissement, enseigne l'équilibre entre le vert et le gris. Avec son aide, nous pouvons utiliser la dureté de la saison déclinante contre nos ennemis."
 haq: "Haq"
 haq_desc: "Haq, Forgeur de l'Évolution, crée de nouveaux arts et de nouvelles vies. Il nous enseigne de nouvelles façons de vivre et de prospérer."

 sunqu_maqay: "Sunqu Maqay"
 sunqu_maqay_desc: "Sunqu Maqay se croyait l'être parfait, contenant toutes les émotions en elle-même en parfait équilibre. Elle était aveugle au fait que personne ne pouvait la comprendre, car posséder toutes les émotions à la fois rendait l'expression d'elle-même impossible. Quand elle se divisa en trois sœurs, elles commencèrent à se battre, cherchant à retourner à la perfection, mais découvrirent que personne ne comprenait leur conflit, malgré leur adoration pour les sœurs. Ainsi, elles firent la paix entre elles et cherchèrent la découverte de soi. Sunqumi, Impératrice de la Vivacité, apprit à s'exprimer et à se réjouir. Mayaqe, Maîtresse de la Constance, trouva la paix intérieure. Sipo, les Émotions Errantes, sautait d'émotion en émotion, n'ayant aucun centre, mais finit par faire la paix avec ce fait. Les trois voyagent à travers la terre et enseignent leurs secrets au peuple."
 sunqumi: "Sunqumi"
 sunqumi_desc: "Sunqumi, Impératrice de la Vivacité, enseigne à notre peuple comment s'exprimer, y compris libérer leur rage au combat."
 maqaye: "Maqaye"
 maqaye_desc: "Mayaqe, Maîtresse de la Constance, enseigne à notre peuple à contrôler ses sentiments et à trouver le calme ; un trait utile face à une charge de cavalerie."
 sipo: "Sipo"
 sipo_desc: "Sipo, les Émotions Errantes, nous enseigne comment embrasser nos sentiments et les libérer."

 tukuyphu: "Tukuyphu"
 tukuyphu_desc: "Tuyukphu, le fils de Prawyúkis et dieu du temps, maintenait un équilibre strict dans les cieux. Sa division créa trois frères, qui se querellent encore pour les nuages. Way Rawak, Équilibre des Tempêtes, a hérité de la volonté de Tuyukphu de maintenir un équilibre, essayant de s'assurer que les champs reçoivent assez de pluie et de soleil pour pousser, et que les inondations ou les sécheresses ne ravagent pas la terre. Warachiq, Libérateur des Tempêtes, croit que son frère s'accroche à un système mort, et cherche à laisser le temps faire ce qu'il veut. Ils créent une sorte d'équilibre qui leur est propre, car Warachiq crée des tempêtes dans le ciel, et Way Rawak le pourchasse pour l'arrêter. Au bord du monde se trouve le troisième frère, Phúyulay, le Climatiseur Sauvage. Un farceur, il se délecte du chaos, créant des tornades de maïs et des ouragans de feu. Il se moque de ses frères, les considérant sans imagination et ternes, et prend occasionnellement le contrôle de leurs œuvres pour ses propres desseins."
 way_rawaq: "Way Rawaq"
 way_rawaq_desc: "Way Rawak, Équilibre des Tempêtes, tente de maintenir le temps stable et statique."
 warachiq: "Warachíq"
 warachiq_desc: "Warachiq, Libérateur des Tempêtes, cherche à libérer le temps ; beaucoup fuient ses vents sur le dos de montures."
 phuyulay: "Phúyulay"
 phuyulay_desc: "Phúyulay, le Climatiseur Sauvage, crée les tempêtes désastreuses pour lesquelles Amadia est connue, et pousse les gens à abandonner leurs foyers."

 uma: "Uma"
 uma_desc: "Uma était la fille de Kusa, et était la gardienne du savoir et l'observatrice de la société mortelle. Elle s'est divisée en trois formes d'intellect : Humu de la Pensée Logique, Sonquo de la Pensée de Soi et Soi du Savoir Inné. Ces trois ont dominé les esprits des animaux depuis, mais se chamaillent constamment. Tenir les trois formes de pensée en équilibre, c'est atteindre la sapience, restaurant Uma pour un bref moment, un accomplissement dont seules les personnes sont capables."
 humu: "Humu"
 humu_desc: "Humu de la Pensée Logique nous enseigne à embrasser les nouvelles idées et à innover dans les domaines scientifiques."
 sonquo: "Sonquo"
 sonquo_desc: "Sonquo de la Pensée de Soi nous enseigne à penser philosophiquement et à considérer les ramifications de nos actions."
 soi: "Soi"
 soi_desc: "Soi du Savoir Inné gouverne notre instinct, y compris notre capacité à utiliser la magie."

 kusa: "Kusa"
 kusa_desc: "Kusa, fille de Tarpláñaq, créa la vie animale sous une forme parfaite, mais quand elle se divisa en quatre, ses visages divisèrent toute vie animale entre eux et entrèrent en guerre, chacun préférant sa vision de la perfection. Pancha créa les animaux terrestres, Allin créa la vie marine, Sumaq créa les oiseaux et Poqi créa les gens. Le subtil Poqi gagna la guerre, et maintenant les gens sont les maîtres incontestés de la vie."
 pancha: "Pancha"
 pancha_desc: "Pancha, créateur de tous les animaux terrestres à part les gens, est révéré par les Quruwei, qui conclurent un pacte avec lui pour apprendre à monter le lama, l'utiliser comme bête de somme et prendre sa laine et sa viande."
 allin: "Allin"
 allin_desc: "Allin, créateur des animaux marins, est vu comme un mystère par les Amadiens, qui ont rarement contact avec la mer. Une légende courante dit qu'Allin céda sa victoire inévitable à Poqi au dernier moment en échange d'une promesse de ne jamais plonger trop profond et de déranger ses plus grandes créations, donnant aux gens la souveraineté sur seulement les eaux de surface."
 sumaq: "Sumaq"
 sumaq_desc: "Sumaq, créateur des oiseaux, est cru par les Banche avoir été allié à Poqi et leur avoir enseigné le secret de parler aux oiseaux. Ce secret est jalousement gardé par les Banche, mais apprendre à apprivoiser les oiseaux et les utiliser comme éclaireurs avancés ne l'est pas."
 poqi: "Poqi"
 poqi_desc: "Poqi, créateur des gens et vainqueur rusé de la guerre entre les visages de Kusa, rappelle à notre peuple qu'il se tient au sommet de la chaîne alimentaire ; leur intelligence défait les dons naturels de tous les autres animaux."

 #Sudomeg'i
 sudomegi:0 "Sudomeg'i"
 sudomegi_religion_desc:0 "La Faim est au centre de l'expérience de tous les ogres. Elle pousse ceux de l'ouest à festoyer dans l'abondance, et ceux du sud à chercher le pouvoir ; cependant, les Ogres Chercheurs d'Âmes suivent une troisième voie. Pour eux, la Faim est une impulsion à contrôler, à rendre subordonnée à leur volonté. À cette fin, ils perfectionnent le soi en poussant rigoureusement le corps, l'esprit et l'âme, souffrant à travers ces tribulations en préparation du jour où ils abandonneront leurs entraves mortelles et seront liés en tant qu'esprits, libérés de leur Faim. Ces esprits sont consultés pour obtenir des conseils dans les foyers, les sanctuaires de village et les temples de montagne auxquels ils sont liés. Un rite de passage courant est de visiter ces derniers en parcourant les chemins sinueux du plateau, passant devant les statues délicatement sculptées des géants, leurs créateurs. Chaque statue doit être l'objet de méditation avant d'atteindre les sentiers secondaires qui montent vers les temples de montagne, où enfin ils peuvent rendre hommage aux plus révérés des esprits qui y résident."

 #Eagle Worship
 eagle_worship:0 "Banbe Anen"
 eagle_worship_religion_desc:0 "« L'Aigle s'élance vers les cieux, resplendissant dans son savoir et sa technique. Pourtant, il redescend, retournant au nid pour nourrir et faire croître les capacités de ses enfants afin qu'ils puissent le rejoindre. » Pour les Hobgobelins du Plateau de Nomsyulhan, le monde lui-même est dans une bataille sans fin entre l'Ordre et le Chaos. Une bataille qui fut lourdement penchée en faveur du Chaos lors du Jour-des-Cieux-Cendrés. Une bataille qu'ils ne peuvent se permettre de perdre à nouveau.\n\nL'Ordre est donc la pièce maîtresse déterminante de leur foi et imprègne tous les aspects de la vie. Les Hobgobelins sous cette foi ont le devoir d'atteindre l'illumination afin de pouvoir rejoindre cette bataille cosmique, et, de manière cruciale, sont chargés de revenir de leur vol et d'élever ceux qui ne peuvent pas encore voler."

 #Un Khudai
 un_khudai:0 "Un Khudai"
 un_khudai_religion_desc:0 "Un Khudai peut être approximativement traduit en langage commun comme « Une Harmonie ». À son cœur se trouve un ensemble de traditions écologiques culturellement enracinées axées sur le maintien du cycle du monde à travers le cadre de la boussole quintuple. La Terre révèle le Métal, qui engendre l'Eau, qui nourrit les Forêts, qui à leur tour alimentent le Feu, qui ensemence la Terre à nouveau. Ceci n'est qu'une facette de la grande boussole quintuple, qui, dans sa totalité, définit les mouvements, la création et la destruction de ces éléments. Un Khudai souligne que ce cycle doit être maintenu, car si les Khudi croissent au-delà de leurs moyens et brisent l'Harmonie de la Terre, les esprits enterreront leur civilisation et les renverront à des époques depuis longtemps révolues."
 #Aspects
 fire_1:0 "Feu"
 desc_fire_1:0 "Du Bois, le Feu naît. C'est chaleur, énergie, à la fois créatif et destructeur. Il jaillit du sol et descend du ciel, purgeant l'ancien et le nouveau et le retournant à la terre. Dans Un Khudai, nous reconnaissons que le feu est à la fois une force créative et destructrice. Sans le feu, le métal ne pourrait être façonné. Pourtant, le feu consume aussi le bois et le réduit en terre. Ainsi, le feu est un élément transitoire, une chose en perpétuel changement que nous devons garder en mesure de peur qu'un manque ou un excès ne mène au désastre."
 fire_2:0 "Feu"
 desc_fire_2:0 "Du Bois, le Feu naît. C'est chaleur, énergie, à la fois créatif et destructeur. Il jaillit du sol et descend du ciel, purgeant l'ancien et le nouveau et le retournant à la terre. Dans Un Khudai, nous reconnaissons que le feu est à la fois une force créative et destructrice. Sans le feu, le métal ne pourrait être façonné. Pourtant, le feu consume aussi le bois et le réduit en terre. Ainsi, le feu est un élément transitoire, une chose en perpétuel changement que nous devons garder en mesure de peur qu'un manque ou un excès ne mène au désastre."
 earth_1:0 "Terre"
 desc_earth_1:0 "Du Feu, la Terre se forme. La cendre devient Sol, et avec le temps le Sol peut devenir Pierre. C'est la base, le fondement de tout. Elle est ferme, fiable, pour le meilleur ou pour le pire qu'elle puisse apporter. La Terre ne peut être déplacée sans effort ; elle représente la stabilité et donc de nombreux pratiquants l'associent à des émotions comme la patience et le contentement. Le Métal se forme dans la Terre, et la Terre submerge l'Eau en la déplaçant et en l'absorbant dans sa vaste forme."
 earth_2:0 "Terre"
 desc_earth_2:0 "Du Feu, la Terre se forme. La cendre devient Sol, et avec le temps le Sol peut devenir Pierre. C'est la base, le fondement de tout. Elle est ferme, fiable, pour le meilleur ou pour le pire qu'elle puisse apporter. La Terre ne peut être déplacée sans effort ; elle représente la stabilité et donc de nombreux pratiquants l'associent à des émotions comme la patience et le contentement. Le Métal se forme dans la Terre, et la Terre submerge l'Eau en la déplaçant et en l'absorbant dans sa vaste forme."
 wood_1:0 "Bois"
 desc_wood_1:0 "De l'Eau, le Bois croît. Individuellement, une pièce de bois est faible, et pourtant unis, ils peuvent résister même aux grands coups du métal. Le Bois est l'exemple de l'ordre naturel, car c'est du Bois que la vie elle-même jaillit, l'harmonisation de tout ce qui vient avant et après. Le Bois représente et annonce la coopération et la croissance, tant naturelle que personnelle. Ignorer le Bois dans Un Khudai, c'est ignorer la vie elle-même et ce que signifie être vivant."
 wood_2:0 "Bois"
 desc_wood_2:0 "De l'Eau, le Bois croît. Individuellement, une pièce de bois est faible, et pourtant unis, ils peuvent résister même aux grands coups du métal. Le Bois est l'exemple de l'ordre naturel, car c'est du Bois que la vie elle-même jaillit, l'harmonisation de tout ce qui vient avant et après. Le Bois représente et annonce la coopération et la croissance, tant naturelle que personnelle. Ignorer le Bois dans Un Khudai, c'est ignorer la vie elle-même et ce que signifie être vivant."
 water_1:0 "Eau"
 desc_water_1:0 "Du Métal, l'Eau se condense. L'Eau s'insinue, se rassemblant de l'air, des racines de la terre. Ces eaux se canalisent ensuite en sources qui coulent en ruisseaux et rivières avant de disparaître dans le Grand Bleu, souillées par la terre. L'Eau éteint même le brasier le plus ardent, et ainsi de nombreux Géomanciens considèrent l'Eau comme une représentation exemplaire de l'âme d'une personne. Forte mais flexible. Faible mais puissante. Quand elle est correctement maîtrisée, c'est une force constructive qui peut voir des machines mues et des voyages facilités. Cependant, l'indécision de l'eau est une faiblesse insidieuse et, mal gérée, elle mènera à une grande ruine."
 water_2:0 "Eau"
 desc_water_2:0 "Du Métal, l'Eau se condense. L'Eau s'insinue, se rassemblant de l'air, des racines de la terre. Ces eaux se canalisent ensuite en sources qui coulent en ruisseaux et rivières avant de disparaître dans le Grand Bleu, souillées par la terre. L'Eau éteint même le brasier le plus ardent, et ainsi de nombreux Géomanciens considèrent l'Eau comme une représentation exemplaire de l'âme d'une personne. Forte mais flexible. Faible mais puissante. Quand elle est correctement maîtrisée, c'est une force constructive qui peut voir des machines mues et des voyages facilités. Cependant, l'indécision de l'eau est une faiblesse insidieuse et, mal gérée, elle mènera à une grande ruine."
 metal_1:0 "Métal"
 desc_metal_1:0 "De la Terre, le Métal est forgé. Une fois fait et durci en forme, il prend forme et la conserve. Il ne cédera à rien d'autre que le temps ou un grand changement, pour le meilleur ou pour le pire. Sans le métal, le monde ne peut être plié à notre volonté, mais de même sans le métal, nous ne pouvons pas matraquer la terre jusqu'à la ruine, déséquilibrant à jamais son harmonie naturelle. Le Métal est la confiance en soi, la capacité du soi à changer le monde sans être changé. Les forêts peuvent être abattues en grand excès si l'on n'est pas prudent, détruisant tout sur son passage."
 metal_2:0 "Métal"
 desc_metal_2:0 "De la Terre, le Métal est forgé. Une fois fait et durci en forme, il prend forme et la conserve. Il ne cédera à rien d'autre que le temps ou un grand changement, pour le meilleur ou pour le pire. Sans le métal, le monde ne peut être plié à notre volonté, mais de même sans le métal, nous ne pouvons pas matraquer la terre jusqu'à la ruine, déséquilibrant à jamais son harmonie naturelle. Le Métal est la confiance en soi, la capacité du soi à changer le monde sans être changé. Les forêts peuvent être abattues en grand excès si l'on n'est pas prudent, détruisant tout sur son passage."
 insight_foundations:0 "Invocation de la Vision des Fondations"
 desc_insight_foundations:0 "Les esprits sont les juges et arbitres finaux de toute construction. Un bâtiment crée son propre flux d'énergie spirituelle, tiré du sol puis libéré dans la zone. Cela peut altérer le flux de l'énergie de la terre, et donc causer de la disharmonie. Ainsi, les nouvelles constructions doivent consulter les esprits de la terre, et si nécessaire, des ajustements doivent être faits ou des sanctuaires construits pour contrecarrer les influences disharmonieuses, souvent habités par les esprits qui furent originellement consultés. Les rénovations sont similaires, durant lesquelles les esprits locaux sont appelés de leurs sanctuaires, parfois vieux de plusieurs siècles, pour offrir à nouveau leurs aperçus sur la meilleure façon d'aider le flux d'énergie dans la terre."
 way_between_people:0 "Rencontre des Âmes"
 desc_way_between_people:0 "L'âme est le centre, le cœur de la personne. Quand deux personnes se rencontrent, ce sont deux âmes qui se rencontrent, échangeant des histoires et offrant une chance d'apprendre et de grandir. Ce faisant, elles deviennent plus harmonieuses avec la terre. Plus l'âme est érudite, plus grande est son influence pour assurer l'harmonie. Ainsi, organiser des célébrations et des échanges d'histoires et d'histoires offre un grand bénéfice à la croissance du peuple, et aide l'État à le faire. Cela est particulièrement vrai si nous soutenons ces Géomanciens et érudits qui œuvrent vers une existence harmonieuse."
 plentiful_harvests:0 "Prière d'Abondance"
 desc_plentiful_harvests:0 "Les esprits supervisent la terre, et c'est à eux que les fidèles font des offrandes. Sans eux, nous ne pouvons maintenir l'harmonie avec la terre à de tels extrêmes. Un champ bien aligné avec une guidance spirituelle appropriée peut faire pousser deux, parfois même trois récoltes en une bonne année. Pendant ce temps, un champ mal aligné peut avoir du mal à en produire ne serait-ce qu'une. Une Prière de Récolte Abondante est plus qu'une simple demande de prospérité. C'est un pacte, l'intention d'assurer la prospérité pour tous. Sans une récolte abondante, il y a moins à offrir aux esprits, et ils s'affaibliront donc, rendant l'année suivante d'autant plus difficile."
 pathways:0 "Cérémonie des Chemins"
 desc_pathways:0 "Une Cérémonie des Chemins est un rituel que tous les pratiquants d'Un Khudai entreprennent au début d'un grand voyage. Le monde est vaste et plein de dangers, et le voyage peut emmener loin de l'harmonie et de la sécurité de son foyer. De nombreux marchands et voyageurs aisés préparent des cérémonies élaborées ou vont même jusqu'à préparer des sanctuaires de voyage pour assurer leur sécurité en contractant un esprit ou un ensemble d'esprits. Une telle protection est coûteuse, mais fournit à un esprit une ancre pour rester dans le monde, si leurs voyages les emmènent au-delà de Haless."
 spark_of_inspiration:0 "Invocation de l'Inspiration"
 desc_spark_of_inspiration:0 "Il y a de la sagesse à trouver en toutes choses. De la plus petite feuille au plus haut sommet, le monde recèle des merveilles et des prodiges innombrables, malgré les meilleurs efforts des plus grands érudits pour les documenter. Pourtant, même les érudits souffrent des mêmes défis fondamentaux, parmi lesquels le besoin d'inspiration. Une telle passion est un puits capricieux qui n'obéit à aucune saison, mais à nouveau le monde peut fournir même ces choses invisibles. Les esprits d'artisans, d'érudits, d'artistes et de poètes disparus peuvent être une source d'idées ; bien des âmes créatives se sont retrouvées freinées par les limitations de leur temps. Invoquer leur présence peut leur offrir un exutoire pour voir des idées inachevées aboutir. Un tel acte peut non seulement offrir aux vivants de grandes perspectives, mais aussi accorder aux esprits des défunts une chance de repos."
 fierce_blows:0 "Cérémonie des Coups Féroces"
 desc_fierce_blows:0 "De la disharmonie naît la violence. La violence mène à la guerre, qui propage plus de violence et crée une spirale qui peut voir la terre dévastée. Pourtant, la guerre peut aussi restaurer l'harmonie. De mauvais dirigeants peuvent être renversés, les justes élevés à leur place pour guider la terre en tant que gardiens appropriés. Une Cérémonie des Coups Féroces peut être invoquée par les nobles et les justes, cherchant la sagesse et la force des esprits non seulement pour se doter de pouvoir, mais pour annoncer au royaume et à tous ceux qu'il contient qu'un gardien approprié s'est levé pour le guider à nouveau."
 tide_of_fury:0 "Marées de Fureur"
 desc_tide_of_fury:0 "Le feu brûle en nous tous, mais en certains il y en a plus. Il brûle fort, blanc, exigeant d'être libéré. Certains tourneraient cette flamme vers des fins égoïstes. Pourtant, bien d'autres trouvent sa libération dans la guerre, guidés sous un sage commandement, dirigeant justement leur courroux vers la défense de l'Harmonie. Les âmes les plus brillantes montrent une sagesse au-delà de la simple soldatesque, et ainsi des Conclaves de Fureur peuvent être convoqués. Ces réunions sont destinées à cultiver plus que de simples prouesses martiales ; elles cherchent des esprits astucieux qui pourraient encore servir de plus grandes ambitions que la simple victoire sur le champ de bataille."
 well_made_land:0 "Leçons d'Art de Gouverner"
 desc_well_made_land:0 "L'appareil d'État est celui de l'Ordre, pour assurer l'Harmonie. Une société harmonieuse est celle qui est paternelle à la fois envers la terre et le peuple. De nombreux anciens Cheqh'ans et Qh'ans ont laissé des traités et des tomes exposant les philosophies de leur règne. De telles idées furent enregistrées pour une époque différente, quand la terre était plus ou moins harmonieuse qu'aujourd'hui, mais les érudits et Géomanciens peuvent encore y trouver de la sagesse. Ainsi, de grands débats et conseils érudits peuvent être tenus pour assurer la dissémination de ces idées et informer une bonne gouvernance."
 roar_of_pride:0 "Avertissement de l'Orgueil"
 desc_roar_of_pride:0 "L'orgueil est une chose dangereuse. Pour les anciens Khudi, c'est ce qui condamna leur civilisation trois fois et coûta la vie d'un des Frères Jumeaux. C'est aussi la perte d'autres, et bien qu'Un Khudai souligne que l'orgueil est une folie dangereuse, d'autres fois sont moins prudentes. Avec les rituels appropriés, la terre peut murmurer où les âmes orgueilleuses ont caché leurs gains mal acquis et les esprits des défunts peuvent murmurer pour obtenir vengeance contre ceux qui leur ont fait du tort. S'assurer que la volonté du monde est apaisée nous laisse ainsi plus riches, tant spirituellement que matériellement."
 stone_ship:0 "Récit du Navire de Pierre"
 desc_stone_ship:0 "Ce récit est le plus ancien des Khudi, raconté quand les derniers vestiges de leur héritage maritime sont nécessaires. Dans les temps anciens, le monde fut plongé dans la glace, et le paradis idyllique dans lequel ils habitaient fut enseveli sous le givre et le gel. Voyant cela, leurs ancêtres sculptèrent sept grands navires de pierre dans de la pierre noire et grise et fendirent les mers gelées, allant si loin au nord que cela devint le sud. Une grande tempête survint alors et dans le chaos trois des navires de parenté furent perdus dans les vagues et la glace. Les autres furent endommagés, et durent être réparés avec tous les matériaux qui pouvaient être trouvés. Ceux qui deviendraient les Oinukhudi et les Anarkhudi résistèrent aux eaux avec la pierre et furent victorieux, s'échouant sur les rivages nord de Moduk, se déversant sur les rivages d'une terre indomptée, mais en harmonie."
 un_khudai_aspects_LONG:0 "Volonté Géomantique"
 un_khudai_aspects_SHORT:0 "Géomancie"
 #Event
 un_khudai_flavour.1.t:0 "Rituel Géomantique"
 un_khudai_flavour.1.d:0 "Les foules se sont rassemblées autour du lieu rituel aujourd'hui, et le Cheq'an s'est préparé pour ce qui l'attend. Le moment est venu de prouver au Cheq'anat que son droit de régner est légitime, à travers un grand rituel géomantique. Les éléments ont été alignés, les géomanciens consultés, et la cérémonie préparée pour l'harmonie. Il ne reste plus qu'à commencer."
