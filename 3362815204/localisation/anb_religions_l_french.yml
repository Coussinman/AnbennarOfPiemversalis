   ynn_zodiac_deity_1:0 "Cheval-Bois"
   ynn_zodiac_deity_1_desc:0 "Le cheval sauvage des forêts ynniques du nord, caractérisé par sa couronne de bois. Les seigneurs aux bois façonnaient leurs couronnes à l'image de cette bête.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 1 sur 16\n\nZodiaques à venir :\n§MLoutre Happante§! :\n   Coût des conseillers : §G-10%§!\n§GTigre à Dents de Sabre§! :\n   Pouvoir militaire mensuel : §G+1§!\n§YRhino Laineux§! :\n   Épuisement de guerre mensuel : §G-0.02§!\n§gLoup Géant§! :\n   Moral des armées : §G+7.5%§!\n§gCastor Géant§! :\n   Coût de construction : §G-10%§!\n§gCochon Ynnéen§! :\n   Attrition terrestre : §G-10%§!"
   ynn_zodiac_deity_2:0 "Loutre Happante"
   ynn_zodiac_deity_2_desc:0 "Connue pour son museau allongé, la loutre happante est un animal très intelligent souvent dressé pour la pêche par les Sarda.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 2 sur 16\n\nZodiaques à venir :\n§MTigre à Dents de Sabre§! :\n   Pouvoir militaire mensuel : §G+1§!\n§GRhino Laineux§! :\n   Épuisement de guerre mensuel : §G-0.02§!\n§YLoup Géant§! :\n   Moral des armées : §G+7.5%§!\n§gCastor Géant§! :\n   Coût de construction : §G-10%§!\n§gCochon Ynnéen§! :\n   Attrition terrestre : §G-10%§!\n§gMouton à Quatre Cornes§! :\n   Direction commerciale : §G+15%§!"
   ynn_zodiac_deity_3:0 "Tigre à Dents de Sabre"
   ynn_zodiac_deity_3_desc:0 "Une bête puissante et rusée, les Veykodans sont connus pour tatouer de grands yeux à l'arrière de leur tête pour repousser les attaques surprises de ces prédateurs par derrière.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 3 sur 16\n\nZodiaques à venir :\n§MRhino Laineux§! :\n   Épuisement de guerre mensuel : §G-0.02§!\n§GLoup Géant§! :\n   Moral des armées : §G+7.5%§!\n§YCastor Géant§! :\n   Coût de construction : §G-10%§!\n§gCochon Ynnéen§! :\n   Attrition terrestre : §G-10%§!\n§gMouton à Quatre Cornes§! :\n   Direction commerciale : §G+15%§!\n§gOiseau-Tonnerre§! :\n   Pouvoir administratif mensuel : §G+1§!"
   ynn_zodiac_deity_4:0 "Rhino Laineux"
   ynn_zodiac_deity_4_desc:0 "Cette bête est chassée à Veykoda pour faire de la corde d'arc de ses poils et pour sculpter des ornements de sa corne. De tels artefacts sont considérés comme sacrés par les autochtones.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 4 sur 16\n\nZodiaques à venir :\n§MLoup Géant§! :\n   Moral des armées : §G+7.5%§!\n§GCastor Géant§! :\n   Coût de construction : §G-10%§!\n§YCochon Ynnéen§! :\n   Attrition terrestre : §G-15%§!\n§gMouton à Quatre Cornes§! :\n   Direction commerciale : §G+15%§!\n§gOiseau-Tonnerre§! :\n   Pouvoir administratif mensuel : §G+1§!\n§gRenard à Queue Blanche§! :\n   Réduction d'inflation annuelle : §G+0.10§!"
   ynn_zodiac_deity_5:0 "Loup Géant"
   ynn_zodiac_deity_5_desc:0 "Des ensembles d'yeux brillants dans la nuit, les loups géants se tiennent aussi grands qu'un elfe sur leurs quatre pattes, plus grands même qu'un tigre à dents de sabre. Ils chassent toujours en meute.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 5 sur 16\n\nZodiaques à venir :\n§MCastor Géant§! :\n   Coût de construction : §G-10%§!\n§gCochon Ynnéen§! :\n   Attrition terrestre : §G-10%§!\n§YMouton à Quatre Cornes§! :\n   Direction commerciale : §G+15%§!\n§gOiseau-Tonnerre§! :\n   Pouvoir administratif mensuel : §G+1§!\n§gRenard à Queue Blanche§! :\n   Réduction d'inflation annuelle : §G+0.10§!\n§gBaleine Poskawa§! :\n   Révolte nationale : §R+1§!"
   ynn_zodiac_deity_6:0 "Castor Géant"
   ynn_zodiac_deity_6_desc:0 "Habitants de nombreux affluents de l'Ynn, les castors géants sont connus pour inonder des villages entiers avec leurs barrages. On croit que ces animaux ont inspiré les premiers barrages ynniques.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 6 sur 16\n\nZodiaques à venir :\n§MCochon Ynnéen§! :\n   Attrition terrestre : §G-15%§!\n§GMouton à Quatre Cornes§! :\n   Direction commerciale : §G+15%§!\n§YOiseau-Tonnerre§! :\n   Pouvoir administratif mensuel : §G+1§!\n§gRenard à Queue Blanche§! :\n   Réduction d'inflation annuelle : §G+0.10§!\n§gBaleine Poskawa§! :\n   Révolte nationale : §R+1§!\n§gMishipeshu§! :\n   Dégâts de choc terrestres : §G+10%§!"
   ynn_zodiac_deity_7:0 "Cochon Ynnéen"
   ynn_zodiac_deity_7_desc:0 "Réputé pour avoir des propriétés curatives et de fertilité par proximité, l'humble cochon ynnéen est souvent gardé comme animal de compagnie par les classes supérieures de Sarda et Dolindha.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 7 sur 16\n\nZodiaques à venir :\n§MMouton à Quatre Cornes§! :\n   Direction commerciale : §G+15%§!\n§GOiseau-Tonnerre§! :\n   Pouvoir administratif mensuel : §G+1§!\n§YRenard à Queue Blanche§! :\n   Réduction d'inflation annuelle : §G+0.10§!\n§gBaleine Poskawa§! :\n   Révolte nationale : §R+1§!\n§gMishipeshu§! :\n   Dégâts de choc terrestres : §G+10%§!\n§gPoisson de Pierre§! :\n   Défense : §G+15%§!"
   ynn_zodiac_deity_8:0 "Mouton à Quatre Cornes"
   ynn_zodiac_deity_8_desc:0 "Source principale de nourriture et de laine et assez robuste pour être un animal de bât, le mouton à quatre cornes fut le premier animal à être domestiqué dans l'Ynn.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 8 sur 16\n\nZodiaques à venir :\n§MOiseau-Tonnerre§! :\n   Pouvoir administratif mensuel : §G+1§!\n§GRenard à Queue Blanche§! :\n   Réduction d'inflation annuelle : §G+0.10§!\n§YBaleine Poskawa§! :\n   Révolte nationale : §R+1§!\n§gMishipeshu§! :\n   Dégâts de choc terrestres : §G+10%§!\n§gPoisson de Pierre§! :\n   Défense : §G+15%§!\n§gSerpent d'Eau§! :\n   Pouvoir diplomatique mensuel : §G+1§!"
   ynn_zodiac_deity_9:0 "Oiseau-Tonnerre"
   ynn_zodiac_deity_9_desc:0 "On dit qu'ils sont la cause de la foudre et nés des nuages d'orage, les oiseaux-tonnerre sont assez grands pour soulever un elfe et peuvent être trouvés planant au-dessus de l'Étendue d'Epednan.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 9 sur 16\n\nZodiaques à venir :\n§MRenard à Queue Blanche§! :\n   Réduction d'inflation annuelle : §G+0.10§!\n§GBaleine Poskawa§! :\n   Révolte nationale : §R+1§!\n§YMishipeshu§! :\n   Dégâts de choc terrestres : §G+10%§!\n§gPoisson de Pierre§! :\n   Défense : §G+15%§!\n§gSerpent d'Eau§! :\n   Pouvoir diplomatique mensuel : §G+1§!\n§gBête-Hibou§! :\n   Amélioration des relations : §G+15%§!"
   ynn_zodiac_deity_10:0 "Renard à Queue Blanche"
   ynn_zodiac_deity_10_desc:0 "Le mythe ynnique affirme que le renard à queue blanche enseigna aux elfes comment reconstruire leur société après le grand déluge. Sa queue touffue est aussi grande que son corps.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 10 sur 16\n\nZodiaques à venir :\n§MBaleine Poskawa§! :\n   Révolte nationale : §R+1§!\n§GMishipeshu§! :\n   Dégâts de choc terrestres : §G+10%§!\n§YPoisson de Pierre§! :\n   Défense : §G+20%§!\n§gSerpent d'Eau§! :\n   Pouvoir diplomatique mensuel : §G+1§!\n§gBête-Hibou§! :\n   Amélioration des relations : §G+15%§!\n§gDragon§! :\n   Dégâts de feu terrestres : §G+10%§!"
   ynn_zodiac_deity_11:0 "Baleine Poskawa"
   ynn_zodiac_deity_11_desc:0 "Un danger omniprésent le long de l'Étendue d'Epednar et de la Chaîne de Dalairey, la baleine terrestre tend des embuscades aux voyageurs et est devenue un symbole de malchance et d'instabilité à travers l'Ynn.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 11 sur 16\n\nZodiaques à venir :\n§MMishipeshu§! :\n   Dégâts de choc terrestres : §G+10%§!\n§gPoisson de Pierre§! :\n   Défense : §G+15%§!\n§YSerpent d'Eau§! :\n   Pouvoir diplomatique mensuel : §G+1§!\n§gBête-Hibou§! :\n   Amélioration des relations : §G+15%§!\n§gDragon§! :\n   Dégâts de feu terrestres : §G+10%§!\n§gCheval-Bois§! :\n   Prestige annuel : §G+1§!"
   ynn_zodiac_deity_12:0 "Mishipeshu"
   ynn_zodiac_deity_12_desc:0 "Soudaine et trompeuse, la panthère aquatique de la Rivière Ynn peut surprendre même l'elfe-pêcheur le plus expérimenté. Une vigilance constante est nécessaire sur l'eau.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 12 sur 16\n\nZodiaques à venir :\n§MPoisson de Pierre§! :\n   Défense : §G+20%§!\n§GSerpent d'Eau§! :\n   Pouvoir diplomatique mensuel : §G+1§!\n§YBête-Hibou§! :\n   Amélioration des relations : §G+15%§!\n§gDragon§! :\n   Dégâts de feu terrestres : §G+10%§!\n§gCheval-Bois§! :\n   Prestige annuel : §G+1§!\n§gLoutre Happante§! :\n   Coût des conseillers : §G-10%§!"
   ynn_zodiac_deity_13:0 "Poisson de Pierre"
   ynn_zodiac_deity_13_desc:0 "Ces créatures se déguisent parmi les décombres du fond de la rivière. Elles sont couvertes de petits dards venimeux, mais font un délicieux repas si préparées correctement.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 13 sur 16\n\nZodiaques à venir :\n§MSerpent d'Eau§! :\n   Pouvoir diplomatique mensuel : §G+1§!\n§GBête-Hibou§! :\n   Amélioration des relations : §G+15%§!\n§YDragon§! :\n   Dégâts de feu terrestres : §G+10%§!\n§gCheval-Bois§! :\n   Prestige annuel : §G+1§!\n§gLoutre Happante§! :\n   Coût des conseillers : §G-10%§!\n§gTigre à Dents de Sabre§! :\n   Pouvoir militaire mensuel : §G+1§!"
   ynn_zodiac_deity_14:0 "Serpent d'Eau"
   ynn_zodiac_deity_14_desc:0 "Aucun deux ne se ressemble exactement, à tel point que certains se demandent si le serpent d'eau est en fait de nombreuses sortes de bêtes. Alors que certains ressemblent à de grands serpents terrestres, d'autres sont trop horribles pour être décrits.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 14 sur 16\n\nZodiaques à venir :\n§MBête-Hibou§! :\n   Amélioration des relations : §G+15%§!\n§GDragon§! :\n   Dégâts de feu terrestres : §G+10%§!\n§YCheval-Bois§! :\n   Prestige annuel : §G+1§!\n§gLoutre Happante§! :\n   Coût des conseillers : §G-10%§!\n§gTigre à Dents de Sabre§! :\n   Pouvoir militaire mensuel : §G+1§!\n§gRhino Laineux§! :\n   Épuisement de guerre mensuel : §G-0.02§!"
   ynn_zodiac_deity_15:0 "Bête-Hibou"
   ynn_zodiac_deity_15_desc:0 "La Bête-Hibou est une créature de solennité et de puissance. Sans ailes, cet oiseau marche sur quatre pattes griffues et bien qu'il ne soit généralement pas violent, son bec peut briser le crâne d'un elfe.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle de quatre ans de la Rivière Ynn, connu sous le nom de §OStuir Balia§!, durant lequel elle gonfle pendant deux ans et se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. On croit que la rivière est la source de toute vie et ainsi chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 15 sur 16\n\nZodiaques à venir :\n§MDragon§! :\n   Dégâts de feu terrestres : §G+10%§!\n§GCheval-Bois§! :\n   Prestige annuel : §G+1§!\n§YLoutre Happante§! :\n   Coût des conseillers : §G-10%§!\n§gTigre à Dents de Sabre§! :\n   Pouvoir militaire mensuel : §G+1§!\n§gRhino Laineux§! :\n   Épuisement de guerre mensuel : §G-0.02§!\n§gLoup Géant§! :\n   Moral des armées : §G+7.5%§!"
   ynn_zodiac_deity_16:0 "Dragon"
   ynn_zodiac_deity_16_desc:0 "Qu'il soit craint ou révéré, le dragon est l'une des forces les plus intelligentes et puissantes du monde entier. Néanmoins, l'Alliance des Seigneurs Chevaliers a terrassé Drozmagog, prouvant que ces créatures ne sont ni divines ni invincibles.\n--------------\n\nLe §OZodiaque Ynnique§! est basé sur le cycle quadriennal du fleuve Ynn, connu sous le nom de §OStuir Balia§!, durant lequel il gonfle pendant deux ans puis se contracte pendant deux ans.\n\nHistoriquement, surveiller ce cycle était nécessaire pour l'entretien des §YGrands Barrages Ynniques§! ainsi que pour l'agriculture. Le fleuve est considéré comme la source de toute vie, et chaque Stuir Balia est associé à l'un des 16 animaux. Ensemble, ils composent un §OKyuvir§! ou grand cycle de 64 ans.\n\nStuir Balia 16 sur 16\n\nZodiaques à venir :\n§MCheval-Ramure§! :\n   Prestige annuel : §G+1§!\n§GLoutre Vorace§! :\n   Coût des conseillers : §G-10 %§!\n§YTigre à Dents de Sabre§! :\n   Pouvoir militaire mensuel : §G+1§!\n§gRhinocéros Laineux§! :\n   Épuisement de guerre mensuel : §G-0,02§!\n§gLoup Sinistre§! :\n   Moral des armées : §G+7,5 %§!\n§gCastor Géant§! :\n   Coût de construction : §G-10 %§!"
   ynn_zodiac_ruler_1:0 "Cheval-Ramure"
   desc_ynn_zodiac_ruler_1:0 "Ceux qui naissent durant le Stuir Balia du §YCheval-Ramure§! tendent à être ordonnés dans leurs manières et font des dirigeants vertueux. Cependant, de tels souverains peuvent souvent être perçus comme cruels dans leur distribution de la justice.\n\n\nTraits de personnalité probables :\n§YVertueux§!, §YLégislateur§!, §YCruel§!"
   ynn_zodiac_ruler_2:0 "Loutre Vorace"
   desc_ynn_zodiac_ruler_2:0 "Ceux qui naissent durant le Stuir Balia de la §YLoutre Vorace§! tendent à être perçus comme bienveillants envers leurs pairs et sont susceptibles de rechercher de nouvelles opportunités commerciales. Cependant, on peut les surprendre à mettre de l'argent de côté pour eux-mêmes malgré leur bonne nature.\n\n\nTraits de personnalité probables :\n§YBienveillant§!, §YEntrepreneur§!, §YDétourneur de fonds§!"
   ynn_zodiac_ruler_3:0 "Tigre à Dents de Sabre"
   desc_ynn_zodiac_ruler_3:0 "Ceux qui naissent durant le Stuir Balia du §YTigre à Dents de Sabre§! tendent à être plus extravertis, prêts à « conquérir » leurs ennemis. Ils font également de hardis combattants sur le terrain. Cependant, leur diplomatie laisse à désirer et ils sont susceptibles de se précipiter vers un avantage perçu.\n\n\nTraits de personnalité probables :\n§YCombattant intrépide§!, §YConquérant§!, §YEnthousiaste naïf§!"
   ynn_zodiac_ruler_4:0 "Rhinocéros Laineux"
   desc_ynn_zodiac_ruler_4:0 "Ceux qui naissent durant le Stuir Balia du §YRhinocéros Laineux§! tendent à être plus endurants que la plupart, tant dans leurs valeurs que dans leur morale. Cependant, cette résistance aux nouvelles idées peut les rendre trop sûrs d'eux en territoire inconnu.\n\n\nTraits de personnalité probables :\n§YIncorruptible§!, §YPieux§!, §YEnthousiaste naïf§!"
   ynn_zodiac_ruler_5:0 "Loup Sinistre"
   desc_ynn_zodiac_ruler_5:0 "Ceux qui naissent durant le Stuir Balia du §YLoup Sinistre§! tendent à exceller dans l'art de manœuvrer leurs adversaires et recherchent des positions de commandement. Cependant, il est rare de trouver de tels individus exerçant leur influence à des fins désintéressées.\n\n\nTraits de personnalité probables :\n§YMeneur inspirant§!, §YGénie tactique§!, §YMalveillant§!"
   ynn_zodiac_ruler_6:0 "Castor Géant"
   desc_ynn_zodiac_ruler_6:0 "Ceux qui naissent durant le Stuir Balia du §YCastor Géant§! tendent à avoir l'esprit tourné vers la construction et une éthique de travail qui leur permet de mener les projets à terme. Cependant, dans ces entreprises, leurs visions sont souvent influencées par un besoin d'accumuler une richesse personnelle.\n\n\nTraits de personnalité probables :\n§YVisionnaire architectural§!, §YIndustrieux§!, §YCupide§!"
   ynn_zodiac_ruler_7:0 "Cochon d'Ynnea"
   desc_ynn_zodiac_ruler_7:0 "Ceux qui naissent durant le Stuir Balia du §YCochon d'Ynnea§! sont réputés pour leur compassion et, comme leur animal totem, auront de nombreux enfants au cours de leur vie. Cependant, ce ne sont pas les individus les plus malins et ils se ridiculiseront dans les situations mondaines.\n\n\nTraits de personnalité probables :\n§YCœur généreux§!, §YFécond§!, §YBouffon bredouillant§!"
   ynn_zodiac_ruler_8:0 "Mouton à Quatre Cornes"
   desc_ynn_zodiac_ruler_8:0 "Ceux qui naissent durant le Stuir Balia du §YMouton à Quatre Cornes§! seront plus enclins à surveiller leurs paroles et à tolérer des idées contraires aux leurs. Cependant, cette tendance à ne pas riposter mène souvent à une perception de couardise.\n\n\nTraits de personnalité probables :\n§YPrudent§!, §YTolérant§!, §YCouard§!"
   ynn_zodiac_ruler_9:0 "Oiseau-Tonnerre"
   desc_ynn_zodiac_ruler_9:0 "Ceux qui naissent durant le Stuir Balia de l'§YOiseau-Tonnerre§! aspirent à être libres des contraintes d'autrui et peuvent se défaire de la plupart des engagements par la parole. Cependant, leurs arguments sont souvent parsemés de plus de vérités qu'il ne faudrait en révéler.\n\n\nTraits de personnalité probables :\n§YLibre penseur§!, §YNégociateur redoutable§!, §YLangue trop pendue§!"
   ynn_zodiac_ruler_10:0 "Renard à Queue Blanche"
   desc_ynn_zodiac_ruler_10:0 "Ceux qui naissent durant le Stuir Balia du §YRenard à Queue Blanche§! sont connus pour leur attitude grégaire envers autrui, trouvant de nombreuses opportunités grâce à ces relations personnelles. Cependant, ces opportunités peuvent être gâchées par une perte de vue de l'ensemble.\n\n\nTraits de personnalité probables :\n§YBien connecté§!, §YTouché par Balris§!, §YPerfectionniste obsessionnel§!"
   ynn_zodiac_ruler_11:0 "Baleine Poskawa"
   desc_ynn_zodiac_ruler_11:0 "Ceux qui naissent durant le Stuir Balia de la §YBaleine Poskawa§! partagent un destin sinistre. Onze est un nombre malchanceux pour les Ynniques et ce zodiaque peut être exploité pour déstabiliser les adversaires. Cependant, cela ne va que jusqu'à un certain point car ce comportement traître est considéré comme un péché.\n\n\nTraits de personnalité probables :\n§YExpansionniste§!, §YMalveillant§!, §YPécheur§!"
   ynn_zodiac_ruler_12:0 "Mishipeshu"
   desc_ynn_zodiac_ruler_12:0 "Ceux qui naissent durant le Stuir Balia du §YMishipeshu§! tendent à être habiles dans le subterfuge et implacables dans leurs entreprises, faisant souvent d'eux de fervents défenseurs de la foi. Cependant, ce zèle ne les empêche pas de succomber à des plaisirs plus vils.\n\n\nTraits de personnalité probables :\n§YTisseur de toiles complexes§!, §YZélé§!, §YIndulgent§!"
   ynn_zodiac_ruler_13:0 "Poisson de Pierre"
   desc_ynn_zodiac_ruler_13:0 "Ceux qui naissent durant le Stuir Balia du §YPoisson de Pierre§! sont solides en toutes choses, que ce soit leur vision du commandement ou leur engagement envers les procédures. Cependant, une langue raide les laisse souvent en manque des mots justes.\n\n\nTraits de personnalité probables :\n§YNavigateur§!, §YStrict§!, §YBouffon bredouillant§!"
   ynn_zodiac_ruler_14:0 "Serpent d'Eau"
   desc_ynn_zodiac_ruler_14:0 "Ceux qui naissent durant le Stuir Balia du §YSerpent d'Eau§! sont réputés pour adopter n'importe quelle position selon le contexte, qu'ils croient ou non ce qu'ils disent. Cela leur donne fréquemment l'avantage dans les négociations. Cependant, cette nature arbitraire peut nuire à autrui sans égard pour leur bien-être.\n\n\nTraits de personnalité probables :\n§YLangue d'argent§!, §YNégociateur charismatique§!, §YCruel§!"
   ynn_zodiac_ruler_15:0 "Bête-Hibou"
   desc_ynn_zodiac_ruler_15:0 "Ceux qui naissent durant le Stuir Balia de la §YBête-Hibou§! vivent pour les quêtes intellectuelles, ce qui engendre leur nature ésotérique. Cependant, cette préoccupation pour l'abstrait peut les éloigner de leurs amis comme de leurs amants.\n\n\nTraits de personnalité probables :\n§YÉrudit§!, §YSecret§!, §YInfertile§!"
   ynn_zodiac_ruler_16:0 "Dragon"
   desc_ynn_zodiac_ruler_16:0 "Ceux qui naissent durant le Stuir Balia du §YDragon§! aspirent à la réussite. Ils font les mages les plus puissants et les meilleurs généraux. Cependant, cette ascension perpétuelle les fait paraître cupides aux yeux des autres.\n\n\nTraits de personnalité probables :\n§YMage puissant§!, §YGénie tactique§!, §YCupide§!"
   ynn_zodiac_heir_1:0 "Héritier : Cheval-Ramure"
   desc_ynn_zodiac_heir_1:0 "Ceux qui naissent durant le Stuir Balia du §YCheval-Ramure§! tendent à être ordonnés dans leurs manières et font des dirigeants vertueux. Cependant, de tels souverains peuvent souvent être perçus comme cruels dans leur distribution de la justice.\n\n\nTraits de personnalité probables :\n§YVertueux§!, §YLégislateur§!, §YCruel§!"
   ynn_zodiac_heir_2:0 "Héritier : Loutre Vorace"
   desc_ynn_zodiac_heir_2:0 "Ceux qui naissent durant le Stuir Balia de la §YLoutre Vorace§! tendent à être perçus comme bienveillants envers leurs pairs et sont susceptibles de rechercher de nouvelles opportunités commerciales. Cependant, on peut les surprendre à mettre de l'argent de côté pour eux-mêmes malgré leur bonne nature.\n\n\nTraits de personnalité probables :\n§YBienveillant§!, §YEntrepreneur§!, §YDétourneur de fonds§!"
   ynn_zodiac_heir_3:0 "Héritier : Tigre à Dents de Sabre"
   desc_ynn_zodiac_heir_3:0 "Ceux qui naissent durant le Stuir Balia du §YTigre à Dents de Sabre§! tendent à être plus extravertis, prêts à « conquérir » leurs ennemis. Ils font également de hardis combattants sur le terrain. Cependant, leur diplomatie laisse à désirer et ils sont susceptibles de se précipiter vers un avantage perçu.\n\n\nTraits de personnalité probables :\n§YCombattant intrépide§!, §YConquérant§!, §YEnthousiaste naïf§!"
   ynn_zodiac_heir_4:0 "Héritier : Rhinocéros Laineux"
   desc_ynn_zodiac_heir_4:0 "Ceux qui naissent durant le Stuir Balia du §YRhinocéros Laineux§! tendent à être plus endurants que la plupart, tant dans leurs valeurs que dans leur morale. Cependant, cette résistance aux nouvelles idées peut les rendre trop sûrs d'eux en territoire inconnu.\n\n\nTraits de personnalité probables :\n§YIncorruptible§!, §YPieux§!, §YEnthousiaste naïf§!"
   ynn_zodiac_heir_5:0 "Héritier : Loup Sinistre"
   desc_ynn_zodiac_heir_5:0 "Ceux qui naissent durant le Stuir Balia du §YLoup Sinistre§! tendent à exceller dans l'art de manœuvrer leurs adversaires et recherchent des positions de commandement. Cependant, il est rare de trouver de tels individus exerçant leur influence à des fins désintéressées.\n\n\nTraits de personnalité probables :\n§YMeneur inspirant§!, §YGénie tactique§!, §YMalveillant§!"
   ynn_zodiac_heir_6:0 "Héritier : Castor Géant"
   desc_ynn_zodiac_heir_6:0 "Ceux qui naissent durant le Stuir Balia du §YCastor Géant§! tendent à avoir l'esprit tourné vers la construction et une éthique de travail qui leur permet de mener les projets à terme. Cependant, dans ces entreprises, leurs visions sont souvent influencées par un besoin d'accumuler une richesse personnelle.\n\n\nTraits de personnalité probables :\n§YVisionnaire architectural§!, §YIndustrieux§!, §YCupide§!"
   ynn_zodiac_heir_7:0 "Héritier : Cochon d'Ynnea"
   desc_ynn_zodiac_heir_7:0 "Ceux qui naissent durant le Stuir Balia du §YCochon d'Ynnea§! sont réputés pour leur compassion et, comme leur animal totem, auront de nombreux enfants au cours de leur vie. Cependant, ce ne sont pas les individus les plus malins et ils se ridiculiseront dans les situations mondaines.\n\n\nTraits de personnalité probables :\n§YCœur généreux§!, §YFécond§!, §YBouffon bredouillant§!"
   ynn_zodiac_heir_8:0 "Héritier : Mouton à Quatre Cornes"
   desc_ynn_zodiac_heir_8:0 "Ceux qui naissent durant le Stuir Balia du §YMouton à Quatre Cornes§! seront plus enclins à surveiller leurs paroles et à tolérer des idées contraires aux leurs. Cependant, cette tendance à ne pas riposter mène souvent à une perception de couardise.\n\n\nTraits de personnalité probables :\n§YPrudent§!, §YTolérant§!, §YCouard§!"
   ynn_zodiac_heir_9:0 "Héritier : Oiseau-Tonnerre"
   desc_ynn_zodiac_heir_9:0 "Ceux qui naissent durant le Stuir Balia de l'§YOiseau-Tonnerre§! aspirent à être libres des contraintes d'autrui et peuvent se défaire de la plupart des engagements par la parole. Cependant, leurs arguments sont souvent parsemés de plus de vérités qu'il ne faudrait en révéler.\n\n\nTraits de personnalité probables :\n§YLibre penseur§!, §YNégociateur redoutable§!, §YLangue trop pendue§!"
   ynn_zodiac_heir_10:0 "Héritier : Renard à Queue Blanche"
   desc_ynn_zodiac_heir_10:0 "Ceux qui naissent durant le Stuir Balia du §YRenard à Queue Blanche§! sont connus pour leur attitude grégaire envers autrui, trouvant de nombreuses opportunités grâce à ces relations personnelles. Cependant, ces opportunités peuvent être gâchées par une perte de vue de l'ensemble.\n\n\nTraits de personnalité probables :\n§YBien connecté§!, §YTouché par Balris§!, §YPerfectionniste obsessionnel§!"
   ynn_zodiac_heir_11:0 "Héritier : Baleine Poskawa"
   desc_ynn_zodiac_heir_11:0 "Ceux qui naissent durant le Stuir Balia de la §YBaleine Poskawa§! partagent un destin sinistre. Onze est un nombre malchanceux pour les Ynniques et ce zodiaque peut être exploité pour déstabiliser les adversaires. Cependant, cela ne va que jusqu'à un certain point car ce comportement traître est considéré comme un péché.\n\n\nTraits de personnalité probables :\n§YExpansionniste§!, §YMalveillant§!, §YPécheur§!"
   ynn_zodiac_heir_12:0 "Héritier : Mishipeshu"
   desc_ynn_zodiac_heir_12:0 "Ceux qui naissent durant le Stuir Balia du §YMishipeshu§! tendent à être habiles dans le subterfuge et implacables dans leurs entreprises, faisant souvent d'eux de fervents défenseurs de la foi. Cependant, ce zèle ne les empêche pas de succomber à des plaisirs plus vils.\n\n\nTraits de personnalité probables :\n§YTisseur de toiles complexes§!, §YZélé§!, §YIndulgent§!"
   ynn_zodiac_heir_13:0 "Héritier : Poisson de Pierre"
   desc_ynn_zodiac_heir_13:0 "Ceux qui naissent durant le Stuir Balia du §YPoisson de Pierre§! sont solides en toutes choses, que ce soit leur vision du commandement ou leur engagement envers les procédures. Cependant, une langue raide les laisse souvent en manque des mots justes.\n\n\nTraits de personnalité probables :\n§YNavigateur§!, §YStrict§!, §YBouffon bredouillant§!"
   ynn_zodiac_heir_14:0 "Héritier : Serpent d'Eau"
   desc_ynn_zodiac_heir_14:0 "Ceux qui naissent durant le Stuir Balia du §YSerpent d'Eau§! sont réputés pour adopter n'importe quelle position selon le contexte, qu'ils croient ou non ce qu'ils disent. Cela leur donne fréquemment l'avantage dans les négociations. Cependant, cette nature arbitraire peut nuire à autrui sans égard pour leur bien-être.\n\n\nTraits de personnalité probables :\n§YLangue d'argent§!, §YNégociateur charismatique§!, §YCruel§!"
   ynn_zodiac_heir_15:0 "Héritier : Bête-Hibou"
   desc_ynn_zodiac_heir_15:0 "Ceux qui naissent durant le Stuir Balia de la §YBête-Hibou§! vivent pour les quêtes intellectuelles, ce qui engendre leur nature ésotérique. Cependant, cette préoccupation pour l'abstrait peut les éloigner de leurs amis comme de leurs amants.\n\n\nTraits de personnalité probables :\n§YÉrudit§!, §YSecret§!, §YInfertile§!"
   ynn_zodiac_heir_16:0 "Héritier : Dragon"
   desc_ynn_zodiac_heir_16:0 "Ceux qui naissent durant le Stuir Balia du §YDragon§! aspirent à la réussite. Ils font les mages les plus puissants et les meilleurs généraux. Cependant, cette ascension perpétuelle les fait paraître cupides aux yeux des autres.\n\n\nTraits de personnalité probables :\n§YMage puissant§!, §YGénie tactique§!, §YCupide§!"
   ynn_river_worship_reform_0:0 "Convoquer un conseil de noblesse"
   ynn_river_worship_reform_0_buy:0 "Aucun débat en cours actuellement."
   ynn_river_worship_reform_0_desc:0 "Il est temps que nous mobilisions nos faveurs et notre autorité pour rassembler tous les vassaux principaux de notre royaume en un conseil. Cela nous permettra d'accroître encore notre influence et, si le fleuve Ynn le veut, de régler certaines questions pour tous."
   ynn_river_worship_reform_1:0 "Les Nés-des-Ruines corrompus sont-ils aussi des Élus ?"
   ynn_river_worship_reform_1_buy:0 "Avons tenu un débat sur ce sujet."
   ynn_river_worship_reform_1_desc:0 "[Root.YnnRiverWorshipReform1]"
   ynn_river_worship_reform_1_0_tt:0 "Lorsque le Déluge Final déferla sur le monde, on crut que les elfes le long du fleuve étaient les survivants élus pour hériter de l'après. Cependant, certains se demandent si seuls les elfes vivant le long du fleuve principal sont élus, ou également ceux des affluents plus modestes."
   ynn_river_worship_reform_1a_tt:0 "Lorsque le Déluge Final déferla sur le monde, on crut que les elfes le long du fleuve étaient les survivants élus pour hériter de l'après. Cependant, certains se demandent si seuls les elfes vivant le long du fleuve principal sont élus, ou également ceux des affluents plus modestes.\n\nNous soutenons actuellement l'inclusion des peuples des affluents.\nSéparatisme : §G-5§!"
   ynn_river_worship_reform_1b_tt:0 "Lorsque le Déluge Final déferla sur le monde, on crut que les elfes le long du fleuve étaient les survivants élus pour hériter de l'après. Cependant, certains se demandent si seuls les elfes vivant le long du fleuve principal sont élus, ou également ceux des affluents plus modestes.\n\nNous rejetons actuellement l'inclusion des nés-des-ruines corrompus.\nTolérance de la vraie foi : §G+1§!"
   ynn_river_worship_reform_1a_modifier_tt:0 "Nous embrassons nos frères nés-des-ruines le long des affluents !\nAnnées de séparatisme : §G-5§!"
   ynn_river_worship_reform_1b_modifier_tt:0 "Nous seuls sommes les élus !\nTolérance de la vraie foi : §G+1§!"
   ynn_river_worship_reform_2:0 "Qu'est-ce qui a causé l'effondrement de l'Empire Ynnique ?"
   ynn_river_worship_reform_2_buy:0 "Avons tenu un débat sur ce sujet."
   ynn_river_worship_reform_2_desc:0 "[Root.YnnRiverWorshipReform2]"
   ynn_river_worship_reform_2_0_tt:0 "L'Empire Ynnique fut le royaume le plus puissant et le plus durable à exister dans la vallée de l'Ynn. Pourtant, il s'est effondré et depuis lors, les débats font rage sur la véritable cause. Certains disent que c'est parce que le pouvoir militaire des empereurs fragmentait l'armée en guerre civile à leur mort. D'autres affirment qu'il est tombé à cause d'aristocrates décadents qui se battaient plus entre eux que contre les ennemis de l'empire."
   ynn_river_worship_reform_2a_tt:0 "L'Empire Ynnique fut le royaume le plus puissant et le plus durable à exister dans la vallée de l'Ynn. Pourtant, il s'est effondré et depuis lors, les débats font rage sur la véritable cause. Certains disent que c'est parce que le pouvoir militaire des empereurs fragmentait l'armée en guerre civile à leur mort. D'autres affirment qu'il est tombé à cause d'aristocrates décadents qui se battaient plus entre eux que contre les ennemis de l'empire.\n\nNous plaidons actuellement pour un pouvoir central plus fort.\nModificateur d'effectifs nationaux : §G+10 %§!"
   ynn_river_worship_reform_2b_tt:0 "L'Empire Ynnique fut le royaume le plus puissant et le plus durable à exister dans la vallée de l'Ynn. Pourtant, il s'est effondré et depuis lors, les débats font rage sur la véritable cause. Certains disent que c'est parce que le pouvoir militaire des empereurs fragmentait l'armée en guerre civile à leur mort. D'autres affirment qu'il est tombé à cause d'aristocrates décadents qui se battaient plus entre eux que contre les ennemis de l'empire.\n\nNous soutenons actuellement les droits des vassaux.\nContribution des vassaux à la limite de forces : §G+100 %§!"
   ynn_river_worship_reform_2a_modifier_tt:0 "Les empereurs étaient trop faibles !\nModificateur d'effectifs nationaux : §G+10 %§!"
   ynn_river_worship_reform_2b_modifier_tt:0 "Les empereurs étaient trop puissants !\nContribution des vassaux à la limite de forces : §G+100 %§!"
   ynn_river_worship_reform_3:0 "Devrions-nous adopter les armes à feu cannoriennes ?"
   ynn_river_worship_reform_3_buy:0 "Avons tenu un débat sur ce sujet."
   ynn_river_worship_reform_3_desc:0 "[Root.YnnRiverWorshipReform3]"
   ynn_river_worship_reform_3_0_tt:0 "L'arrivée des Cannoriens a apporté des armes nouvelles et étranges sur le champ de bataille. Bien qu'un fusil manque de la grâce d'un arc, nombreux sont ceux qui ont commencé à stocker ce nouvel engin. La question se pose maintenant de savoir si nous devrions adopter ces armes cannoriennes pour nos propres armées ou si nous devrions nous fier aux tactiques qui ont servi notre peuple pendant des siècles."
   ynn_river_worship_reform_3a_tt:0 "L'arrivée des Cannoriens a apporté des armes nouvelles et étranges sur le champ de bataille. Bien qu'un fusil manque de la grâce d'un arc, nombreux sont ceux qui ont commencé à stocker ce nouvel engin. La question se pose maintenant de savoir si nous devrions adopter ces armes cannoriennes pour nos propres armées ou si nous devrions nous fier aux tactiques qui ont servi notre peuple pendant des siècles.\n\nNous soutenons actuellement l'adoption des fusils à poudre.\nDégâts de feu terrestres : §G+5 %§!"
   ynn_river_worship_reform_3b_tt:0 "L'arrivée des Cannoriens a apporté des armes nouvelles et étranges sur le champ de bataille. Bien qu'un fusil manque de la grâce d'un arc, nombreux sont ceux qui ont commencé à stocker ce nouvel engin. La question se pose maintenant de savoir si nous devrions adopter ces armes cannoriennes pour nos propres armées ou si nous devrions nous fier aux tactiques qui ont servi notre peuple pendant des siècles.\n\nNous rejetons actuellement une telle armement barbare.\nDégâts de choc terrestres : §G+5 %§!"
   ynn_river_worship_reform_3a_modifier_tt:0 "Aux problèmes modernes, des solutions modernes !\nDégâts de feu terrestres : §G+5 %§!"
   ynn_river_worship_reform_3b_modifier_tt:0 "Nos flèches obscurciront le soleil !\nDégâts de choc terrestres : §G+5 %§!"
   ynn_river_worship_reform_4:0 "La pensée cannorienne est-elle pertinente pour l'Ynn ?"
   ynn_river_worship_reform_4_buy:0 "Avons tenu un débat sur ce sujet."
   ynn_river_worship_reform_4_desc:0 "[Root.YnnRiverWorshipReform4]"
   ynn_river_worship_reform_4_0_tt:0 "On croyait récemment que la vallée du fleuve Ynn était l'étendue complète du monde et qu'au-delà des falaises méridionales se trouvait le Monde Souterrain. Cependant, ces Cannoriens ont apporté des cartes et des plans d'en dessous des falaises, et bien plus encore. Cela a ébranlé les fondations du culte du fleuve Ynn, les clercs et le peuple se disputant sur la façon dont ces révélations devraient être interprétées."
   ynn_river_worship_reform_4a_tt:0 "On croyait récemment que la vallée du fleuve Ynn était l'étendue complète du monde et qu'au-delà des falaises méridionales se trouvait le Monde Souterrain. Cependant, ces Cannoriens ont apporté des cartes et des plans d'en dessous des falaises, et bien plus encore. Cela a ébranlé les fondations du culte du fleuve Ynn, les clercs et le peuple se disputant sur la façon dont ces révélations devraient être interprétées.\n\nNous soutenons actuellement la diffusion des connaissances d'au-delà des falaises.\nPropagation des institutions : §G+10 %§!"
   ynn_river_worship_reform_4b_tt:0 "On croyait récemment que la vallée du fleuve Ynn était l'étendue complète du monde et qu'au-delà des falaises méridionales se trouvait le Monde Souterrain. Cependant, ces Cannoriens ont apporté des cartes et des plans d'en dessous des falaises, et bien plus encore. Cela a ébranlé les fondations du culte du fleuve Ynn, les clercs et le peuple se disputant sur la façon dont ces révélations devraient être interprétées.\n\nNous rejetons actuellement ces enseignements trompeurs pour l'hérésie qu'ils sont.\nCoût de score de guerre contre autres religions : §G-15 %§!"
   ynn_river_worship_reform_4a_modifier_tt:0 "Un tout nouveau monde !\nPropagation des institutions : §G+10 %§!"
   ynn_river_worship_reform_4b_modifier_tt:0 "Savoir maléfique d'un royaume maléfique !\nCoût de score de guerre contre autres religions : §G-15 %§!"
   ynn_zodiac.4.t:0 "Constance et changement"
   ynn_zodiac.4.d:0 "Le fleuve Ynn est la source de toute vie et ses rythmes dictent donc le cours de l'existence. Tous les quatre ans, le fleuve accomplit un cycle de gonflement et de contraction, connu sous le nom de Stuir Balia. Cela a été inestimable pour l'agriculture le long de ses rives et pour surveiller l'entretien des Grands Barrages Ynniques. En raison de cette importance religieuse et culturelle, le calendrier du Zodiaque Ynnique fut formalisé à travers l'Empire Ynnique de 640 AA à 649 AA, en même temps que la normalisation des pratiques du culte du fleuve Ynn. Il y a 16 animaux zodiacaux, chacun assigné à un Stuir Balia, et un grand cycle de ces 16 constitue un Kyuvir."
   ynn_zodiac.4.a:0 "Voici le Stuir Balia du Cheval-Ramure."
   ynn_zodiac.4.b:0 "Voici le Stuir Balia de la Loutre Vorace."
   ynn_zodiac.4.c:0 "Voici le Stuir Balia du Tigre à Dents de Sabre."
   ynn_zodiac.4.e:0 "Voici le Stuir Balia du Rhinocéros Laineux."
   ynn_zodiac.4.f:0 "Voici le Stuir Balia du Loup Sinistre."
   ynn_zodiac.4.g:0 "Voici le Stuir Balia du Castor Géant."
   ynn_zodiac.4.h:0 "Voici le Stuir Balia du Cochon d'Ynnea."
   ynn_zodiac.4.i:0 "Voici le Stuir Balia du Mouton à Quatre Cornes."
   ynn_zodiac.4.j:0 "Voici le Stuir Balia de l'Oiseau-Tonnerre."
   ynn_zodiac.4.k:0 "Voici le Stuir Balia du Renard à Queue Blanche."
   ynn_zodiac.4.l:0 "Voici le Stuir Balia de la Baleine Poskawa."
   ynn_zodiac.4.m:0 "Voici le Stuir Balia du Mishipeshu."
   ynn_zodiac.4.n:0 "Voici le Stuir Balia du Poisson de Pierre."
   ynn_zodiac.4.o:0 "Voici le Stuir Balia du Serpent d'Eau."
   ynn_zodiac.4.p:0 "Voici le Stuir Balia de la Bête-Hibou."
   ynn_zodiac.4.q:0 "Voici le Stuir Balia du Dragon."
   drozma_tur:0 "Drozma Tur"
   drozma_tur_religion_desc:0 "Religion récente, les Drozmatur, signifiant Disciples du Dragon, forment un culte draconique dont les membres prétendent recevoir des visions du « dernier dragon » restant en Aelantir."
   rune_scribes:0 "Scribes des Runes"
   rune_scribes_religion_desc:0 "Les Veykodans croient que l'âme de chaque personne est divisée en deux parties. L'une est primale, forte et féroce, tandis que l'autre est calme, sereine et patiente. La croyance en cette Âme Duale, ou « Edhen Minrud » dans la langue veykodane, est centrale à leurs coutumes et traditions. On croit que grâce au fait que les Veykodans sont plus en contact avec leur âme primale que les Ynniques voisins, ils sont capables de puiser leur force intérieure plus efficacement et de créer des liens avec les puissantes bêtes des terres sauvages veykodanes. Ils utilisent des tatouages runiques magiques pour améliorer leur puissance de combat et se lier aux tigres à dents de sabre et aux rhinocéros laineux massifs qu'ils utilisent comme montures. Les Veykodans ont également une forte tradition écrite, où les Scribes des Runes, sages tribaux qui inscrivent des runes non seulement sur des pierres runiques mais aussi sur les corps de leur peuple, sont chargés de préserver les mémoires et légendes des âges révolus."
  devandi:0 "Devandi"
   mazhthramazh:0 "Mazhthramazh"
   mazhthramazh_religion_desc:0 "La foi devandi, bien qu'animiste, est également basée sur le suivi de l'exemple de leur légendaire chef Munakles, qui se souleva en défiance et libéra les ancêtres des Devandi, les guidant vers l'ouest jusqu'à la vallée montagneuse de Mteibas.\n\nLes Mteibhar croyaient que la vallée était un lieu sacré et passèrent leur vie à la protéger. Tant que les Mteibhar révéraient correctement la vallée, l'esprit de celle-ci les aiderait à maintenir leur liberté durement gagnée contre les intrus.\n\nLes tribus se rassemblent périodiquement pour des assemblées du souvenir où les anciens relatent les exploits et vertus de Munakles. Outre la protection de la vallée, d'autres vertus importantes sont le souvenir, l'amélioration de soi et la recherche de la paix autant que possible."
   askaeorg:0 "Askaeorg"
   askaeorg_religion_desc:0 "La foi devandi, bien qu'animiste, est également basée sur le suivi de l'exemple de leur légendaire chef Munakles, qui se souleva en défiance et libéra les ancêtres des Devandi, les guidant vers l'ouest jusqu'à la vallée montagneuse de Mteibas.\n\nLes Chendhyans adoptèrent une approche proactive pour préserver cette liberté et croyaient que la seule façon de protéger la leur était de prendre aux autres jusqu'à ce qu'ils ne soient plus une menace. Quittant la sécurité de la vallée, ils rencontrèrent de nombreux grands félins : pumas, guépards et jaguars, et ils cherchèrent à créer un lien avec ces bêtes. Aujourd'hui, les Chendhyans chevauchent et chassent aux côtés des grands félins, croyant que tant qu'ils prouveront être aussi féroces et indépendants que les félins, ils seront acceptés par les animaux en retour. Ils passent donc leurs jours à piller et prendre à leurs voisins afin que leur liberté soit préservée.\n\nBien que le pillage soit la pratique la plus courante de leur foi, le commerce et l'échange de connaissances ne sont pas mal vus tant qu'il s'agit d'un échange équivalent."
  fey_religion:0 "Religion Féerique"
   fey_court:0 "Cour des Fées"
   fey_court_religion_desc:0 "La Cour des Fées n'est pas une religion au sens classique, car ceux qui la pratiquent ne considèrent pas les Fées comme divines ou objets de culte. Il s'agit plutôt d'un ensemble d'histoires, de traditions, de rituels et de rites employés pour éviter d'irriter les Fées et, idéalement, coexister avec elles."
   FEYCOURTRITUALS_SHORT:0 "rituel"
   FEYCOURTRITUALS_LONG:0 "Invoquer un rituel"
   fey_court_seelie:0 "Cour Seelie"
   fey_court_unseelie:0 "Cour Unseelie"
   fey_court_angered:0 "§RCourroucée§"
