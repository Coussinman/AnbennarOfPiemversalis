 schaal_onitheia_deity_level_3_desc:0"§YSchaal Ónítheia§!\nLes maîtres de la Schaal Ónítheia, ou École de la Débrouillardise, enseignent des idées qu'ils considèrent fondamentales pour tous, en particulier les ouvriers, les marchands et les criminels. Originaires d'Ormam, les pratiquants sont souvent mieux lotis que les autres et capables de se relever face à l'adversité bien plus vite qu'autrui. Pour les marchands et les ouvriers, cela leur apprend à devenir plus efficaces. Pour ceux qui sont désespérés de survivre, il y a le sentiment d'apprendre à créer quelque chose à partir de rien, menant souvent à prospérer dans des emplois temporaires ou la criminalité. Promouvoir cette idée dans toute la société aide finalement l'économie à croître, en grande partie grâce aux fonctionnaires gouvernementaux qui deviennent plus efficaces contre le crime tandis que le peuple trouve des moyens de rendre leur travail plus rapide avec moins de ressources.\n\nSi l'Ordre Sacré de la §YSchaal Ónítheia§! est placé dans moins de §Y50 %§!([Root.kheionism_schaal_onitheia_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nEfficacité de production : §G+10,0 %§!\n\nSi l'Ordre Sacré de la §YSchaal Ónítheia§! est placé dans plus de §Y50 %§!([Root.kheionism_schaal_onitheia_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75 %§!([Root.kheionism_schaal_onitheia_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nEfficacité de production : §G+20,0 %§!"

 teachings_of_varamelas_deity_level_1:0"Enseignements de Varamelas" #Written By: Georgius
 teachings_of_varamelas_deity_level_1_desc:0"§YEnseignements de Varamelas§!\nLes enseignements du penseur radical Varamelas résonnent à travers sa patrie de Besolakí jusqu'à ce jour. Varamelas et ses héritiers philosophiques à Besolakí fondèrent la gouvernance sur un État démocratique radical et combatif, accordant le suffrage garanti et des droits à la citoyenneté indépendamment des caractéristiques immuables. Le pouvoir est disputé entre des partis politiques rudimentaires, chacun né d'une école de pensée spécifique. L'affrontement entre ces groupes maintient le processus démocratique de Besolakí, puisqu'un groupe devenant trop puissant nuirait à tous les autres. Cela encourage également l'innovation et la bonne gouvernance. Un débat et une argumentation intenses et passionnés stimulent la création de nouvelles politiques et le raffinement de la pensée philosophique dans un environnement impitoyablement compétitif, mais la centralisation du pouvoir sur un seul parti mène à la stagnation.\n\nSi l'Ordre Sacré des §YEnseignements de Varamelas§! est placé dans plus de §Y50%§!([Root.kheionism_teachings_of_varamelas_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75%§!([Root.kheionism_teachings_of_varamelas_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nCoût des conseillers : §G+15.0%§!\n\nSi l'Ordre Sacré des §YEnseignements de Varamelas§! est placé dans plus de §Y75%§!([Root.kheionism_teachings_of_varamelas_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nCoût des conseillers : §G+15.0%§!\nPolitiques administratives gratuites : §G+1§!"
