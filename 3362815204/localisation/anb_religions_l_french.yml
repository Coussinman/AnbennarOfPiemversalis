 drivos_rochos_deity_level_1:0"Drivos Rochos" #Written By: Takasaki
 drivos_rochos_deity_level_1_desc:0"§YDrivos Rochos§!\nDéveloppée par les Phylaxana de Degakheion à l'esprit martial, le Drivos Rochos, ou Voie du Roc, place le devoir envers sa fonction au-dessus de tout. On enseigne que maintenir ce standard encourage la modération et la retenue personnelles, ne permettant ni aux plaisirs ni aux stress de la vie de submerger l'individu. Bien que la jouissance des désirs primaires soit normale, leur retenue est vertueuse, car un guerrier prodigue est un piètre guerrier — ainsi, les adeptes du Drivos Rochos valorisent même la concision dans le discours, menant à l'esprit acéré « degabhen ». La philosophie enseigne à ne céder ni à l'émotion ni à la colère face aux épreuves, à la peur ou au traumatisme. C'est particulièrement important pour les Kheionai à l'esprit guerrier.\n\nSi l'Ordre Sacré du §YDrivos Rochos§! est placé dans plus de §Y50%§!([Root.kheionism_drivos_rochos_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75%§!([Root.kheionism_drivos_rochos_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nTradition militaire annuelle : §G+1.00§!\nProfessionnalisme militaire annuel : §G+0.3%§!\n\nSi l'Ordre Sacré du §YDrivos Rochos§! est placé dans plus de §Y75%§!([Root.kheionism_drivos_rochos_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nTradition militaire annuelle : §G+1.00§!\nProfessionnalisme militaire annuel : §G+0.3%§!\nPolitiques militaires gratuites : §G+1§!"
