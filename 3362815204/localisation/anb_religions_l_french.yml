 cannorian:0 "Cannorien"
 regent_court:0 "Cour Régente"
 regent_court_religion_desc:0 "La Cour Régente (également connue sous le nom de Panthéon Cannorien) rassemble les dieux vénérés sur le continent de Cannor. Les fidèles vouent généralement un culte particulier à une divinité tutélaire, tout en honorant les autres dieux du panthéon. Ce dernier s'organise à la manière d'une cour féodale, chaque divinité assumant un rôle similaire aux diverses fonctions de ladite cour."
 castellos:0 "Castellos"
 castellos_desc:0 "Chef de la Cour Régente, Castellos est l'aîné des trois premiers membres du Panthéon (les autres étant Yshtralania et Agrados) et règne en tant que dieu de la souveraineté et de l'ordre. Jadis grand guerrier, le sauvetage de son fils Adean contre le premier dragon, Malliath, lui coûta le bras et la jambe gauches. Désormais, Castellos gouverne depuis son trône en roi juste et légitime, laissant ses sujets (les autres dieux) œuvrer pour le bien en son nom.\n\nPersonnalités alignées :\n§YVertueux\nJuste\nBien conseillé§!"
 lightfather:0 "Père de Lumière"
 lightfather_desc:0 "L'Union entre Castellos et Surael"
 the_dame:0 "Dame"
 the_dame_desc:0 "La Dame était à l'origine l'antique déesse des moissons, mais elle devint au fil du temps la déesse de la sagesse et de la magie (héritant de sa mère et sœur de Castellos : Yshtralania). Depuis l'arrivée des elfes, qu'elle sauva en guidant Munas Chante-Lune vers Cannor, elle est également louée comme déesse de la tolérance, de la miséricorde et de la clairvoyance.\n\nPersonnalités alignées :\n§YTolérante\nLibre penseuse\nÉrudite\nMécène des arts§!"
 corin:0 "Corin"
 corin_desc:0 "Dernière divinité à rejoindre le panthéon et réincarnation du dieu de la guerre déchu Agrados, Corin accéda à ce rang après avoir sacrifié sa vie pour vaincre la Marée Verte naissante en 1444. Corin sert désormais de nouvelle déesse de la guerre, un rôle laissé vacant depuis la défaite d'Agrados durant la Guerre des Dieux.\n\nPersonnalités alignées :\n§YMeneuse inspirante\nCombattante intrépide\nZélatrice§!"
 adean:0 "Adean"
 adean_desc:0 "Premier-né de Castellos et dieu du bien, de l'honneur et de la chevalerie. Adean fut l'écuyer d'Agrados (l'ancien dieu de la guerre et frère félon de Castellos), mais choisit le camp du bien après la trahison de son mentor. Avant l'ascension de Corin, Adean était le dieu de facto des guerres et conflits justes et honorables. Il est surtout célèbre pour sa charge, lance au poing sur son destrier, qui trancha l'une des deux têtes de Malliath Dévore-Dieux, le premier dragon.\n\nPersonnalités alignées :\n§YVertueux\nÉducateur martial\nStrict§!"
 adean_upgraded_war:0 "Adean"
 adean_upgraded_war_desc:0 "Premier-né de Castellos et dieu du bien, de l'honneur et de la chevalerie. Adean fut l'écuyer d'Agrados (l'ancien dieu de la guerre et frère félon de Castellos), mais choisit le camp du bien après la trahison de son mentor. Avant l'ascension de Corin, Adean était le dieu de facto des guerres et conflits justes et honorables.\n\nPersonnalités alignées :\n§YVertueux\nÉducateur martial\nStrict§!"
 adean_upgraded_admin:0 "Adean"
 adean_upgraded_admin_desc:0 "Premier-né de Castellos et dieu du bien, de l'honneur et de la chevalerie. Adean fut l'écuyer d'Agrados (l'ancien dieu de la guerre et frère félon de Castellos), mais choisit le camp du bien après la trahison de son mentor. Avant l'ascension de Corin, Adean était le dieu de facto des guerres et conflits justes et honorables. Depuis la révélation de la mort de Castellos, Adean a pris un rôle plus actif dans la direction de la Cour.\n\nPersonnalités alignées :\n§YVertueux\nÉducateur martial\nStrict§!"
 munas_moonsinger:0 "Munas"
 munas_moonsinger_desc:0 "Munas Chante-Lune est le dieu des voyages, de la musique, de l'exploration et des mers. L'un des dieux les plus récents à accéder à la divinité, et le premier elfe à y parvenir. Munas est surtout célèbre pour avoir guidé la Flotte des Rescapés elfique vers Cannor, mettant fin à leur périple millénaire après la perte de leur patrie lors du Jour-des-Cieux-Cendrés.\n\nPersonnalités alignées :\n§YNavigateur\nExpansionniste\nLangue d'argent§!"
 munas_upgraded:0 "Munas"
 munas_upgraded_desc:0 "Munas Chante-Lune est le dieu des voyages, de la musique, de l'exploration et des mers. L'un des dieux les plus récents à accéder à la divinité, et le premier elfe à y parvenir. Munas est surtout célèbre pour avoir guidé la Flotte des Rescapés elfique vers Cannor, mettant fin à leur périple millénaire après la perte de leur patrie lors du Jour-des-Cieux-Cendrés.\n\nPersonnalités alignées :\n§YNavigateur\nExpansionniste\nLangue d'argent§!"
 ara:0 "Ara"
 ara_desc:0 "Ara (également connue sous le nom de Dame Fortune) est la déesse du commerce et de la chance. Ses fidèles furent à l'origine de la première monnaie et du premier atelier monétaire humain, permettant à l'antique Castanor de s'affranchir de sa dépendance aux devises naines.\n\nPersonnalités alignées :\n§YBénie de Balris\nEntrepreneuse\nIndustrieuse§!"
 balgar:0 "Balgar"
 balgar_desc:0 "Balgar le Bâtisseur est le dieu de la construction, des monuments et des grands ouvrages. Nain de son vivant, Balgar fut l'un des principaux conseillers de Castan Ier de Castanor, responsable de la conception et de l'édification des célèbres Citadelles Castanoriennes et des Grandes Murailles de Castanor.\n\nPersonnalités alignées :\n§YVisionnaire architectural\nIndustrieux\nExpansionniste§!"
 balgar_upgraded:0 "Balgar"
 balgar_upgraded_desc:0 "Balgar le Bâtisseur est le dieu de la construction, des monuments et des grands ouvrages. Nain de son vivant, Balgar fut l'un des principaux conseillers de Castan Ier de Castanor, responsable de la conception et de l'édification des célèbres Citadelles Castanoriennes et des Grandes Murailles de Castanor.\n\nPersonnalités alignées :\n§YVisionnaire architectural\nIndustrieux\nExpansionniste§!"
 esmaryal:0 "Esmaryal"
 esmaryal_desc:0 "Seconde épouse de Castellos (après la mort de la primordiale Halanna) et mère de ses enfants Adean et Ryala. Esmaryal donna son nom à la région d'Esmarie, dont elle était la déesse locale de la fertilité, du foyer et de la famille, fonctions qu'elle assume encore aujourd'hui.\n\nPersonnalités alignées :\n§YFéconde\nCœur généreux\nNégociatrice charismatique§!"
 ryala:0 "Ryala"
 ryala_desc:0 "Fille vierge de Castellos, Ryala est la déesse de l'amour véritable, de la beauté, de la cour amoureuse et de la chasteté. On dit que les avatars de Ryala furent responsables de la plupart des guerres causées par l'amour au cours de l'histoire.\n\nPersonnalités alignées :\n§YCalme\nPrudente\nBienveillante§!"
 ryala_upgraded:0 "Ryala"
 ryala_upgraded_desc:0 "Fille vierge de Castellos, Ryala est la déesse de l'amour véritable, de la beauté, de la cour amoureuse et de la chasteté. On dit que les avatars de Ryala furent responsables de la plupart des guerres causées par l'amour au cours de l'histoire.\n\nPersonnalités alignées :\n§YCalme\nPrudente\nBienveillante§!"
 minara:0 "Minara"
 minara_desc:0 "Créée par Ryala pour repousser les prétendants importuns, Minara est la déesse de l'amour (profane), des célébrations et de la joie. On raconte que Minara était une mortelle que Ryala éleva au rang divin, impressionnée par ses talents dans l'art de l'amour.\n\nPersonnalités alignées :\n§YNégociatrice redoutable\nLangue d'argent\nFéconde§!"
 falah:0 "Falah"
 falah_desc:0 "L'un des deux seuls enfants d'Agrados, nés de son viol sur Halanna, à ne pas devenir monstrueux. Falah Œil-Infaillible sert de déesse de l'archerie, de la guerre à distance et de la chasse, accomplissant volontairement la pénitence de son père pour le compte de Castellos : traquer ses frères et sœurs monstrueux, les divinités des races bestiales.\n\nPersonnalités alignées :\n§YGénie tactique\nIncorruptible\nConquérante§!"
 falah_upgraded:0 "Falah"
 falah_upgraded_desc:0 "L'un des deux seuls enfants d'Agrados, nés de son viol sur Halanna, à ne pas devenir monstrueux. Falah Œil-Infaillible sert de déesse de l'archerie, de la guerre à distance et de la chasse, accomplissant volontairement la pénitence de son père pour le compte de Castellos : traquer ses frères et sœurs monstrueux, les divinités des races bestiales.\n\nPersonnalités alignées :\n§YGénie tactique\nIncorruptible\nConquérante§!"
 nerat:0 "Nerat"
 nerat_desc:0 "Frère de Falah et fils d'Agrados. Nerat est le dieu de la loi, du jugement et des enfers, servant de geôlier à Castellos et de gardien de l'enfer, protégeant les cieux et la terre contre la progéniture démoniaque des divinités vaincues lors de la Guerre des Dieux. Inversement, son domaine sur la vie et la mort a fait de lui le dieu de facto de la médecine.\n\nPersonnalités alignées :\n§YJuste\nLégislateur\nIncorruptible§!"
 nathalyne:0 "Nathalyne"
 nathalyne_desc:0 "Déesse des voleurs, des secrets et des ombres. Nathalyne fut jadis un avatar mortel de la Dame qui demeura indétecté pendant des années grâce à ses origines demi-elfiques. De son vivant, elle fut une voleuse notoire et l'une des premières praticiennes extérieures de l'art harimari de l'ombromancie.\n\nPersonnalités alignées :\n§YSecrète\nTisseuse de toiles complexes\nBien connectée§!"
 wip:0 "Wip"
 wip_desc:0 "Jadis trois acteurs gnomes mortels fusionnés en un seul être par la Dame, Wip est le Bouffon Royal de la Cour Régente. Sa présence se manifeste le plus souvent dans les théâtres, prisé des acteurs et des comédiens, tout en incarnant également la fourberie."
 begga:0 "Begga"
 begga_desc:0 "À l'origine avatar d'Ara, Begga Doigts-Agiles passa une longue existence à aider les nécessiteux et à humilier les cupides. Seule halfeline parmi les dieux de la Cour Régente, le culte de Begga offre un exutoire aux opprimés et aux démunis. Elle rappelle à ceux qui préféreraient oublier les enseignements plus doux d'Ara que la fortune ne se forge pas par ses propres actes, mais se gagne par l'échange de miséricorde et de bienveillance envers autrui.\n\nPersonnalités alignées :\n§YCœur généreux\nBienveillante\nRéformatrice§!"
 begga_upgraded:0 "Begga"
 begga_upgraded_desc:0 "À l'origine avatar d'Ara, Begga Doigts-Agiles passa une longue existence à aider les nécessiteux et à humilier les cupides. Seule halfeline parmi les dieux de la Cour Régente, le culte de Begga offre un exutoire aux opprimés et aux démunis. Elle rappelle à ceux qui préféreraient oublier les enseignements plus doux d'Ara que la fortune ne se forge pas par ses propres actes, mais se gagne par l'échange de miséricorde et de bienveillance envers autrui.\n\nPersonnalités alignées :\n§YCœur généreux\nBienveillante\nRéformatrice\nProtectrice des petites gens§!"
 dookan:0 "Dookan"
 dookan_desc:0 "Bien que corrompu en dieu sanguinaire de la conquête dans les mythes orques, la véritable nature de Dookan est celle du dieu des mercenaires. Jadis lieutenant en chef du dieu de la guerre Agrados, il trahit son maître pour de l'or et combattit au service de Castellos durant la Guerre des Dieux, restant fidèle à sa vocation première et jouant un rôle décisif dans la victoire de Castellos."
 khetist:0 "Khétiste"
 elikhetist:0 "Élikhétiste"
 elikhetist_religion_desc:0 "Les adeptes du Khétisme révèrent et vénèrent les Khet, des êtres à l'apparence humaine dotés d'une tête de chat, possédant des pouvoirs quasi divins au sein de l'éponyme Khétérata, qu'ils fondèrent et contrôlent depuis des temps immémoriaux par l'intermédiaire de souverains mortels choisis par mandat. Les fidèles doivent observer les préceptes du Khétarque, une figure de proue désignée parmi les descendants d'Elikhet, le premier Khet.\n\nBien que tous les Khet soient vénérés par les Élikhétistes, Elikhet est considéré comme leur unique vrai dieu. Les autres divinités ne sont ni reconnues ni niées, seul leur culte est interdit."
 nirakhetist:0 "Nirakhétiste"
 nirakhetist_religion_desc:0 "Les adeptes du Khétisme révèrent et vénèrent les Khet, des êtres à l'apparence humaine dotés d'une tête de chat, possédant des pouvoirs quasi divins au sein de l'éponyme Khétérata, qu'ils fondèrent et contrôlent depuis des temps immémoriaux par l'intermédiaire de souverains mortels choisis par mandat. Les fidèles doivent observer les préceptes du Khétarque, une figure de proue désignée parmi les descendants d'Elikhet, le premier Khet.\n\nLes Nirakhétistes révèrent Nirakhet, mère d'Elikhet, par-dessus tout, la désignant comme la Mère Divine. Leur vénération d'Elikhet n'atteint pas celle de leurs frères Élikhétistes ; ils ne le considèrent pas plus divin que ses descendants (c'est-à-dire toujours très divin) depuis sa descente du Panthéon Bulwari. C'est par cet acte que naquit la Désolation, les larmes d'adieu de la Mère Divine tombant sur Halann, permettant à Elikhet et aux siens de demeurer toujours proches de sa présence."
 aakhetist:0 "Aakhétiste"
 aakhetist_religion_desc:0 "Les armées de la Khétérata furent jadis menées par le puissant dragon Aakhet le Bronze dans une série de grandes conquêtes de Khétérat au Bulwar. Ceux qui adhèrent à l'Aakhétisme suivent toujours les enseignements d'Elikhet comme tous les autres khétistes. Cependant, alors que la plupart des khétistes considèrent aujourd'hui le règne d'Aakhet comme celui d'un belliciste assoiffé de sang, les Aakhétistes croient que le dragon de bronze était la réincarnation d'Elikhet lui-même et qu'il reviendra un jour pour mener leurs armées vers de glorieuses conquêtes."
 dalcabba:0 "Dalcabba"
 dalcabba_religion_desc:0 "Un syncrétisme entre le Khétisme et les croyances cannoriennes. Comme les Élikhétistes, ils révèrent les Khet de la Khétérata comme la plus haute divinité, mais vénèrent également Castellos comme protecteur de l'Escann. Contrairement aux Élikhétistes, les Dalcabbans sont bien plus zélés dans la propagation de leur foi, encourageant les Cannoriens à effectuer des pèlerinages sacrés à Khétérat pour apporter des offrandes aux Khet."
 runefather_worship:0 "Culte du Père-des-Runes"
 runefather_worship_religion_desc:0 "Il y a des millénaires, le Père-des-Runes sauva les Nains d'Obsidienne de leurs pairs, sacrifiant son corps et son esprit pour emmener son peuple plus profond qu'aucun nain n'avait jamais creusé. La rumeur veut qu'il repose désormais sur le Trône Runique, dans la Salle d'Obsidienne au plus profond de l'Échine-du-Serpent, où son corps brisé attend de mener à nouveau son peuple vers la surface."
 swap_deity_tt:0 "Changer de divinité"
 swap_deity_tt_2:0 "Ne peut changer de divinité qu'une fois tous les §Y10 ans§!."
 swap_deity_tt_3:0 "Ne peut changer de divinité qu'une fois tous les §Y5 ans§!."
 swap_deity_tt_4:0 "Ne peut changer de divinité qu'une fois tous les §Y25 ans§!."
 swap_deity_tt_5:0 "A restauré la flèche de Zerat dans son ancienne gloire"
 swap_deity_tt_6:0 "Ne peut changer de divinité qu'une fois tous les §Y20 ans§!."
 corinite:0 "Corinite"
 corinite_religion_desc:0 "Les Corinites croient que Corin, la déesse de la guerre récemment ascendée, est plus apte à diriger la Cour Régente qu'Adean, fils de Castellos. Ils estiment qu'Adean est trop conservateur et négligent, et que la Cour Régente doit prendre une part plus active dans la vie des fidèles : les ténèbres et la tyrannie ne doivent pas simplement être contenues, elles doivent être extirpées et anéanties."
 ravelian:0 "Ravélien"
 ravelian_excommunicated:0 "Excommunié"
 ravelian_religion_desc:0 "Le Ravélianisme est une religion monothéiste croyant en un Dieu unique, dont tous les autres dieux ne seraient que des aspects ou des saints. Les Ravéliens sont à la fois érudits et prédicateurs, et croient en la révélation des secrets du monde pour découvrir et propager ses Vérités fondamentales. Nombre de ces révélations proviennent de leurs recherches sur le Fragment Divin, un étrange appareil cristallin qui communique dans un langage quasi indéchiffrable, affirmant être la dernière parcelle de divinité, et que les elfes précurseurs auraient dérobé la divinité de Dieu pour la transformer en ce que nous connaissons aujourd'hui sous le nom de magie. Un précepte populaire de la foi ravélienne est leur désir d'utiliser l'Artisanat Magique pour rendre cette magie volée accessible à tous."
 send_ravelian_scholars:0 "Envoyer des érudits ravéliens"
 use_warrior_automata:0 "Utiliser des automates de guerre"
 warrior_automata:0 "Automates de guerre"
 levy_artificer_tax:0 "Lever l'impôt des artificiers"
 sanction_for_artificer_tax:0 "Sanction pour l'impôt des artificiers"
 tutelage_under_the_masters:0 "Tutelle sous les maîtres"
 proclaim_holy_research:0 "Proclamer la recherche sacrée"
 holy_research:0 "Recherche sacrée"
 ravelian_crusade:0 "Croisades ravéliennes"
 ravelian_crusade_DESC:0 "Comme les Croisades Corinites avant elles, la foi ravélienne doit parfois être tempérée par la foi et l'acier. Le monde a assez souffert de mensonges, et si notre Vérité est contestée et assaillie de toutes parts par des ennemis, nous devons y voir la Volonté Divine de combattre."
 contemplation_edict:0 "Édit de servitude"
 contemplation_edict_DESC:0 "De temps à autre, les nombreux prêtres-érudits de l'Église deviennent si obsédés par leurs recherches qu'ils finissent par négliger les fidèles. Nous devons leur rappeler que servir les fidèles et les éclairer par la Vérité doit être une priorité si l'Église Ravélienne veut perdurer."
 holiness_in_simple_work:0 "Sainteté dans le labeur simple"
 holiness_in_simple_work_DESC:0 "Ce monde recèle bien des secrets dignes d'être connus, et nombre de nos plus éminents recteurs consacrent leur vie entière à révéler ne serait-ce qu'une parcelle de la Vérité. Pour la plupart, cependant, nous devons trouver le contentement dans la vie elle-même : dans le fait de vivre, et dans la simplicité qui nous permet d'apprécier les Œuvres de Dieu dans toute leur beauté."
 faith_through_trade:0 "La foi par le commerce"
 faith_through_trade_DESC:0 "La Connaissance est Pouvoir, et la Richesse est l'un des plus grands signes du Pouvoir. Si nous voulons répandre nos révélations à travers le monde, nous devons le faire avec un cœur ouvert et un esprit pragmatique. Nous devons offrir aux non-convertis un savoir réel et tangible ainsi que des biens pour améliorer leurs royaumes, et peut-être qu'avec l'amélioration de leurs terres, leurs esprits s'ouvriront à nos paroles."
 revelation_dissemination:0 "Diffusion des nouvelles révélations"
 revelation_dissemination_DESC:0 "La foi ravélienne travaille ardemment à rechercher et méditer sur de nombreux sujets, et parfois en une seule année, de nombreuses vérités sont découvertes et de nombreuses théories progressent. Bien que les nouvelles connaissances puissent être dérangeantes et bouleverser le statu quo, c'est dans la connaissance de la Vérité que réside notre liberté, et nous devons donc consacrer du temps à diffuser correctement nos découvertes dans l'ensemble de la communauté ravélienne."
 one_world_one_god:0 "Un monde, un Dieu"
 one_world_one_god_DESC:0 "Dans les temps anciens, le monde était gouverné et créé par Dieu, mais en raison des actes des elfes précurseurs, des dragons et des prophètes de religions égarées, notre monde s'est fragmenté. En nous concentrant sur ce qui nous unit tous, croyants ou non, nous pourrons peut-être trouver paix et stabilité. Les deux premières Vérités Fondamentales de la vie sont que nous vivons tous dans Un Monde, et sommes créés par Un Dieu."
 PAPACY_THE_HOLY_SEE:0 "Haut Rectorat"
 ravelian_harsh:0 "Zélote dans les débats ravéliens"
 ravelian_concilatory:0 "Érudit dans les débats ravéliens"
 refused_ravelian_org:0 "A refusé l'Organisation Ravélienne des Artificiers"
 goblinic_shamanism:0 "Chamanisme Gobelin"
 goblinic_shamanism_religion_desc:0 "La religion originelle de la plupart des gobelins est une religion polythéiste et chamanique comportant des éléments de culte ancestral et d'animisme. C'est une religion très diverse et fluide, chaque sous-groupe affirmant que ses dieux favoris sont les plus importants et intégrant souvent des éléments des religions des peuples subjugués et alliés. Elle se divise en de multiples cultes considérés comme également valides par le peuple, également erronés par les philosophes, et également utiles par les magistrats."
 faithless:0 "Sans-foi"
 the_thought:0 "La Pensée"
 the_thought_religion_desc:0 "La Pensée est le nom donné à la philosophie gnomique traditionnelle, qui met l'accent sur la sensibilité et l'intelligence comme qualités les plus vitales qu'un être puisse posséder. Les adeptes de cette philosophie ne s'intéressent guère à la spiritualité ; ils se concentrent plutôt sur la création et le perfectionnement d'une « Théorie du Tout » expliquant précisément le fonctionnement de la réalité. Les membres sont poussés à observer et analyser le monde matériel, dans l'espoir d'intégrer leurs découvertes à la doctrine dans un acte connu sous le nom d'« Être touché par la Pensée ». Cette quête de l'analyse matérielle et de l'innovation rend les adeptes de la Pensée particulièrement aptes à la recherche scientifique et au développement de l'artifice ; les gnomes croyants en la Pensée furent les premiers à combiner magie et science dans l'art aujourd'hui connu sous le nom d'Artisanat Magique. Ceux qui suivent la Pensée sont généralement très tolérants envers les autres modes de pensée, car ils tiennent en haute estime le produit de l'intelligence d'autrui et profitent de l'opportunité de s'instruire sur d'autres cultures."
 godlost:0 "Sans-Dieux"
 godlost_religion_desc:0 "Les Sans-Dieux ont renoncé aux voies chamaniques des cultes gobelins, forgeant au contraire leur société en une structure rigide. Ils valorisent la famille et la nation au-dessus des pratiques religieuses et des puissances cosmiques. Une attitude disciplinée et loyale est révérée, et toute désobéissance est sévèrement punie. Ils ont structuré cela en une série d'enseignements que tous sont censés suivre, bien que certains puissent en privilégier un par rapport aux autres."
 domestic_teachings:0 "Enseignements domestiques"
 domestic_teachings_desc:0 "Les enseignements domestiques sont ceux du foyer : des valeurs familiales, des liens forgés entre époux et des serments prêtés pour honorer et nourrir le ménage. Ceux qui chérissent cet enseignement sont souvent de jeunes époux ou les matriarches et patriarches aînés du clan. Ils observent les coutumes et traditions appropriées pour forger la génération suivante. Un commandement fort découle d'une famille forte."
 domestic_teachings_improved:0 "Enseignements domestiques"
 domestic_teachings_improved_desc:0 "Les enseignements domestiques sont ceux du foyer : des valeurs familiales, des liens forgés entre époux et des serments prêtés pour honorer et nourrir le ménage. Ceux qui chérissent cet enseignement sont souvent de jeunes époux ou les matriarches et patriarches aînés du clan. Ils observent les coutumes et traditions appropriées pour forger la génération suivante. Un commandement fort découle d'une famille forte."
 strict_teachings:0 "Enseignements stricts"
 strict_teachings_desc:0 "Les enseignements stricts sont au cœur de l'éthique Sans-Dieux. Ils mettent l'accent sur la discipline personnelle et l'obéissance à la famille, au clan et au commandement. Ceux qui tiennent cet enseignement en plus haute estime sont des sergents instructeurs sévères et des constables impitoyables. Ils ne tolèrent guère ceux qui désobéissent ou s'écartent de leur voie désignée. Tous doivent marcher au pas ou être piétinés."
 strict_teachings_improved:0 "Enseignements stricts"
 strict_teachings_improved_desc:0 "Les enseignements stricts sont au cœur de l'éthique Sans-Dieux. Ils mettent l'accent sur la discipline personnelle et l'obéissance à la famille, au clan et au commandement. Ceux qui tiennent cet enseignement en plus haute estime sont des sergents instructeurs sévères et des constables impitoyables. Ils ne tolèrent guère ceux qui désobéissent ou s'écartent de leur voie désignée. Tous doivent marcher au pas ou être piétinés."
 lenient_teachings:0 "Enseignements indulgents"
 lenient_teachings_desc:0 "Les enseignements indulgents sont assez controversés parmi les adeptes de la philosophie Sans-Dieux. Ils soulignent que si les hobgobelins ont renoncé à leurs dieux et embrassé la structure des commandements, tous ceux qui vivent sous leur autorité n'ont pas besoin de renoncer à la religion. Tant qu'ils mènent des vies ordonnées et obéissent au commandement, ils peuvent poursuivre leurs prières futiles et leurs vaines philosophies."
 lenient_teachings_improved:0 "Enseignements indulgents"
 lenient_teachings_improved_desc:0 "Les enseignements indulgents sont assez controversés parmi les adeptes de la philosophie Sans-Dieux. Ils soulignent que si les hobgobelins ont renoncé à leurs dieux et embrassé la structure des commandements, tous ceux qui vivent sous leur autorité n'ont pas besoin de renoncer à la religion. Tant qu'ils mènent des vies ordonnées et obéissent au commandement, ils peuvent poursuivre leurs prières futiles et leurs vaines philosophies."
 protective_teachings:0 "Enseignements protecteurs"
 protective_teachings_desc:0 "Les enseignements protecteurs sont perçus par certains comme passifs, par d'autres comme nobles. Ils instruisent sur le soin et la protection de l'ordre dans un monde chaotique. Ce sont souvent les gardes, les stratèges du temps de paix et les ingénieurs de fortifications qui élèvent ces enseignements au-dessus de tous les autres, car ils concernent directement leur travail. Ils soutiennent qu'aucun ordre ne peut être créé s'il est balayé par le chaos."
 protective_teachings_improved:0 "Enseignements protecteurs"
 protective_teachings_improved_desc:0 "Les enseignements protecteurs sont perçus par certains comme passifs, par d'autres comme nobles. Ils instruisent sur le soin et la protection de l'ordre dans un monde chaotique. Ce sont souvent les gardes, les stratèges du temps de paix et les ingénieurs de fortifications qui élèvent ces enseignements au-dessus de tous les autres, car ils concernent directement leur travail. Ils soutiennent qu'aucun ordre ne peut être créé s'il est balayé par le chaos."
 imperialist_teachings:0 "Enseignements impérialistes"
 imperialist_teachings_desc:0 "Les enseignements impérialistes sont un enseignement relativement récent, apparu seulement après la formation, la structuration et l'unification des trois commandements hobgobelins. Ils proclament que le monde est dans le chaos et qu'il a besoin d'une main ferme pour lui donner de la structure. Ceux qui tiennent cet enseignement au-dessus de tout sont la force motrice de la grande invasion hobgobeline de Haless. Après tout, le meilleur moyen d'instaurer l'ordre est de les faire marcher au rythme de votre commandement."
 imperialist_teachings_improved:0 "Enseignements impérialistes"
 imperialist_teachings_improved_desc:0 "Les enseignements impérialistes sont un enseignement relativement récent, apparu seulement après la formation, la structuration et l'unification des trois commandements hobgobelins. Ils proclament que le monde est dans le chaos et qu'il a besoin d'une main ferme pour lui donner de la structure. Ceux qui tiennent cet enseignement au-dessus de tout sont la force motrice de la grande invasion hobgobeline de Haless. Après tout, le meilleur moyen d'instaurer l'ordre est de les faire marcher au rythme de votre commandement."
 valorous_teachings:0 "Enseignements valeureux"
 valorous_teachings_desc:0 "Les enseignements valeureux sont ce qui se rapproche le plus d'un code guerrier chez les Sans-Dieux. Ils enseignent l'importance de tenir la formation, de rester aux côtés de ses camarades, mais aussi de respecter ses ennemis. Ils sont chers à tous les soldats, qu'ils soient fantassins ordinaires ou chevaucheurs de wargs d'élite. Ils sont responsables de l'éthique du soldat. Après tout, un soldat qui sait qu'il agit bien est un soldat qui ne cédera pas."
 valorous_teachings_improved:0 "Enseignements valeureux"
 valorous_teachings_improved_desc:0 "Les enseignements valeureux sont ce qui se rapproche le plus d'un code guerrier chez les Sans-Dieux. Ils enseignent l'importance de tenir la formation, de rester aux côtés de ses camarades, mais aussi de respecter ses ennemis. Ils sont chers à tous les soldats, qu'ils soient fantassins ordinaires ou chevaucheurs de wargs d'élite. Ils sont responsables de l'éthique du soldat. Après tout, un soldat qui sait qu'il agit bien est un soldat qui ne cédera pas."
 industrious_teachings:0 "Enseignements industrieux"
 industrious_teachings_desc:0 "Les enseignements industrieux ne sont pas prestigieux, mais ils sont essentiels. Ils guident les Sans-Dieux dans leur éthique du travail. Ils traduisent la discipline de leur société en discipline de leurs artisans et travailleurs. Ce sont donc principalement ceux qui exercent ces métiers qui tiennent cet enseignement au-dessus de tous les autres. Ils sont les pourvoyeurs de leur famille et de leur commandement. Sans eux, la machine de guerre s'arrête."
 industrious_teachings_improved:0 "Enseignements industrieux"
 industrious_teachings_improved_desc:0 "Les enseignements industrieux ne sont pas prestigieux, mais ils sont essentiels. Ils guident les Sans-Dieux dans leur éthique du travail. Ils traduisent la discipline de leur société en discipline de leurs artisans et travailleurs. Ce sont donc principalement ceux qui exercent ces métiers qui tiennent cet enseignement au-dessus de tous les autres. Ils sont les pourvoyeurs de leur famille et de leur commandement. Sans eux, la machine de guerre s'arrête."
 nationalist_teachings:0 "Enseignements nationalistes"
 nationalist_teachings_desc:0 "Les enseignements nationalistes ont pris de l'importance lorsque le Commandement s'est étendu dans Haless proprement dit et a établi de nouveaux commandements mineurs pour gouverner le territoire. Pour certains, cela subvertit la structure clanique et affaiblit son importance, tandis que pour d'autres, cela réaffirme que le Commandement passe avant le clan et la famille."
 raheni:0 "Raheni"
 high_philosophy:0 "Haute Philosophie"
 high_philosophy_religion_desc:0 "La Haute Philosophie est une religion centrée sur la reproduction de la vie des anciens Hauts Dieux, tels que les harimari les ont trouvés dans les temples antiques disséminés à travers Haless. Ils utilisent les bas-reliefs de ces temples anciens comme fondement de la structure sociale et du mode de vie. Cependant, différents philosophes ont eu différentes interprétations de la signification des bas-reliefs, et ainsi différentes écoles de pensée ont émergé. Celles-ci tournent souvent autour d'un système de castes, partie intégrante de la société rahenie depuis les temps anciens."
 suhans_praxis:0 "Praxis de Suhan"
 suhans_praxis_religion_desc:0 "Établie par le Gourou Suhan à la fin des années 1400, la Praxis de Suhan est une variante de la Haute Philosophie traditionnelle. Bien qu'elle s'efforce également de découvrir la sagesse des hauts dieux afin d'amener ses pratiquants à un état d'être plus éclairé, la Praxis rejette la notion qu'il existe plusieurs voies vers la sagesse, ou que les débats apporteront la sagesse à toutes les parties impliquées. Au contraire, les enseignements de Suhan professent que la vraie sagesse, et donc la voie des Hauts Dieux, se trouve en tirant des enseignements moraux de toutes les philosophies majeures, tout en dénonçant les structures sociales et politiques, telles que les castes raheniennes et la structure familiale patriarcale, que ces philosophies ont été utilisées pour justifier par le passé."
 starry_eye_school:0 "Œil Étoilé"
 starry_eye_school_desc:0 "Les philosophes adhérant à l'idée de l'Œil Étoilé croient que les Hauts Dieux ont trouvé l'illumination et sont montés aux étoiles. Ils croient que tous devraient toujours être en quête d'illumination et organisent souvent de grands rassemblements avec des membres de toutes les castes où ils contemplent les étoiles et conversent sur les moyens potentiels de devenir illuminés, s'instruisant mutuellement de leurs découvertes."
 starry_eye_scholar_modifier:0 "Érudits de l'Œil Étoilé"
 starry_eye_scholar_modifier_desc:0 "Nous recevons actuellement des érudits de l'Œil Étoilé pour approfondir la discussion théologique dans notre pays."
 radiant_sun_school:0 "Soleil Radieux"
 radiant_sun_school_desc:0 "Le Soleil Radieux est une école de pensée relativement jeune. Elle est apparue lorsque Jaher envahit le Rahen et que la population locale nota les similitudes entre les Elfes Solaires et les représentations des Hauts Dieux. Contrairement aux autres écoles, ils mettent fortement l'accent sur le rituel religieux et l'apaisement des Hauts Dieux. Ils croient qu'en accomplissant les rituels qu'ils ont déchiffrés des Hauts Temples, les Hauts Dieux les aideront dans la vie quotidienne et leur apporteront une plus grande prospérité."
 radiant_sun_scholar_modifier:0 "Érudits du Soleil Radieux"
 radiant_sun_scholar_modifier_desc:0 "Nous recevons actuellement des érudits du Soleil Radieux pour approfondir la discussion théologique dans notre pays."
 orange_sash_school:0 "Ceinture Orange"
 orange_sash_school_desc:0 "La ceinture orange est le vêtement traditionnel du père de famille au Rahen. Les philosophes de cette école ont interprété un bas-relief récurrent représentant un rassemblement comme une famille, avec le père à sa tête. Ils prennent cela comme base de la structure sociale et croient que le devoir ultime de chacun est envers la famille, quels que soient la caste, la position ou le pays."
 orange_sash_scholar_modifier:0 "Érudits de la Ceinture Orange"
 orange_sash_scholar_modifier_desc:0 "Nous recevons actuellement des érudits de la Ceinture Orange pour approfondir la discussion théologique dans notre pays."
 golden_palace_school:0 "Palais Doré"
 golden_palace_school_desc:0 "Les érudits du Palais Doré sont parvenus à la conclusion que les dieux anciens vivaient selon un système rigide de castes qui leur permettait d'assurer la prospérité de tous au sein de chaque caste. Ils promeuvent l'idée que par l'adhésion à sa caste, on peut trouver la prospérité et son esprit passera à une vie dans une caste supérieure, pour finalement devenir illuminé et rejoindre les Hauts Dieux eux-mêmes."
 golden_palace_scholar_modifier:0 "Érudits du Palais Doré"
 golden_palace_scholar_modifier_desc:0 "Nous recevons actuellement des érudits du Palais Doré pour approfondir la discussion théologique dans notre pays."
 unbroken_claw_school:0 "Griffe Intacte"
 unbroken_claw_school_desc:0 "L'École de la Griffe Intacte observe les nombreuses structures dispersées des Hauts Dieux et en a déduit qu'ils ont dû vaincre les créatures des ténèbres primordiales pour bâtir leurs temples anciens. Ainsi, pour être comme les Hauts Dieux, on doit également être capable de tenir ferme et de bannir les créatures qui s'opposent à votre volonté et à votre prospérité."
 unbroken_claw_scholar_modifier:0 "Érudits de la Griffe Intacte"
 unbroken_claw_scholar_modifier_desc:0 "Nous recevons actuellement des érudits de la Griffe Intacte pour approfondir la discussion théologique dans notre pays."
 silk_turban_school:0 "Turban de Soie"
 silk_turban_school_desc:0 "Leur symbole étant le vêtement traditionnel de l'élite fortunée du sous-continent, l'école du Turban de Soie souscrit à la croyance que la création de prospérité et l'accumulation de richesse sont essentielles pour atteindre la Purtara. Cette richesse n'est pas censée être simplement thésaurisée, mais investie : dans de grands ouvrages, dans la faveur politique, et bien sûr dans l'accumulation de plus de richesse. C'est le devoir de chacun envers soi-même, sa famille et sa caste de répandre la prospérité aussi loin que possible et de s'enrichir par tous les moyens, car c'est uniquement par la richesse que la vie d'un Haut Dieu peut être atteinte."
 silk_turban_scholar_modifier:0 "Érudits du Turban de Soie"
 silk_turban_scholar_modifier_desc:0 "Nous recevons actuellement des érudits du Turban de Soie pour approfondir la discussion théologique dans notre pays."
 ascendant_soul_school:0 "Âme Ascendante"
 ascendant_soul_school_desc:0 "L'École de l'Âme Ascendante trouve ses racines dans les traditions de la Voie Accrétive. Les érudits de cette école voient la plus grande importance dans l'amélioration de soi. Ils soutiennent que si les Hauts Dieux ont bâti de magnifiques structures, ce fut seulement après avoir atteint un statut divin par la perfection de soi, et ainsi chaque étudiant de cette école devrait aspirer au même idéal."
 ascendant_soul_scholar_modifier:0 "Érudits de l'Âme Ascendante"
 ascendant_soul_scholar_modifier_desc:0 "Nous recevons actuellement des érudits de l'Âme Ascendante pour approfondir la discussion théologique dans notre pays."
 synthetic_truth_school:0 "Vérité Synthétique"
 synthetic_truth_school_desc:0 "L'école religieuse établie par le Gourou Suhan. Les érudits de la Vérité Synthétique affirment que chacune des écoles philosophiques majeures a découvert un fragment de la Sagesse des Hauts Dieux, mais en ont tiré la conclusion erronée qu'on peut atteindre l'illumination en n'imitant qu'un seul aspect d'une divinité. Au contraire, la Vérité Synthétique affirme que c'est uniquement en examinant collectivement les sept écoles philosophiques traditionnelles, les soi-disant « éclats de vérité », que la vraie sagesse peut être trouvée et que les erreurs et imperfections de l'existence mortelle peuvent être éliminées de la sainteté et de la divinité."
 synthetic_truth_scholar_modifier:0 "Érudits de la Vérité Synthétique"
 synthetic_truth_scholar_modifier_desc:0 "Nous recevons actuellement des érudits de la Synthèse de la Vérité pour approfondir la discussion théologique dans notre pays."
 final_paradigm_school:0 "Paradigme Final"
 final_paradigm_school_desc:0 "Évoluant à partir de la Vérité Synthétique classique dans les décennies suivant la mort du Gourou Suhan, le Paradigme Final est une philosophie plus radicale qui proclame la suprématie des écrits et enseignements de Suhan. Au-delà de l'appel à l'étude de toutes les traditions philosophiques, les érudits du Paradigme Final croient que seuls les écrits de Suhan sont la source de vérité légitime et que toutes les idées extérieures à celles professées par leur Gourou doivent être supprimées."
 final_paradigm_scholar_modifier:0 "Érudits du Paradigme Final"
 final_paradigm_scholar_modifier_desc:0 "Nous recevons actuellement des érudits du Paradigme Final pour approfondir la discussion théologique dans notre pays."
 piercing_fang_school:0 "Croc Perçant"
 piercing_fang_school_desc:0 "Émergeant parmi les Dûrsikari longtemps isolés de l'Échine-du-Serpent, l'École du Croc Perçant est une branche de la Griffe Intacte qui postule que la survie elle-même est le plus grand art de la vie. Endurer malgré les épreuves les plus traîtresses, utilisant sa ruse et ses talents pour triompher d'ennemis toujours plus dangereux et de défis toujours plus difficiles, imite le mieux les vies légendaires des Hauts Dieux, et de leur héros particulier Anjita, et est donc la Nitikamarja. Se prouver contre les nombreux dangers que les montagnes ont à offrir, chasser, traquer et vaincre toute proie rencontrée, c'est uniquement par l'exécution magistrale de la chasse que les adeptes du Croc Perçant peuvent atteindre la Purtara."
 piercing_fang_scholar_modifier:0 "Érudits du Croc Perçant"
 piercing_fang_scholar_modifier_desc:0 "Nous recevons actuellement des érudits du Croc Perçant pour approfondir la discussion théologique dans notre pays."
 #Suhan's Praxis Actions
 liberation_of_the_sexes:0 "Libération des sexes"
 desc_liberation_of_the_sexes:0 "Suhan croyait en l'égalité radicale des hommes et des femmes, raisonnant que dans le cycle de réincarnation, le svayatma de chacun traversait toutes les formes et manières d'être. Il comparait l'oppression des femmes au système de castes contre lequel il s'élevait également, et à l'esclavage endémique du Golfe. Nul étonnement, dès lors, que la première vague à embrasser la Praxis ait inclus tant de femmes. Suhan demandait souvent à ses disciples d'imaginer la puissance du Visvatma cultivé de la moitié d'un continent, le pur potentiel spirituel d'un tel affranchissement. Nous n'avons plus besoin d'imaginer."
 liberation_of_the_sexes_tt:0 "Obtenir une réduction du §Ycoût des dirigeants§! et du §Ycoût des conseillers§!"
 all_walk_nitikamarja:0 "Tous marchent sur la Nitikamarja"
 desc_all_walk_nitikamarja:0 "Suhan fut de son vivant accusé à plusieurs reprises d'irrévérence envers l'histoire et la philosophie du Rahen, mais c'est une profonde dénaturation de ses propos. Nous ne cherchons pas à fermer les portes des hauts temples, mais à les ouvrir. La Purtara ne sera plus placée sur une étagère haute et gardée des enfants, soumise à l'ego académique. Aux sociétés de débat de la Praxis, tous les participants sont nourris."
 all_walk_nitikamarja_tt:0 "Obtenir la loyauté des §YCastes inférieures§!, des §YCastes moyennes§! et de la §YBourgeoisie§!"
 guru_diplomacy:0 "Diplomatie des Gourous"
 desc_guru_diplomacy:0 "Tout au long de ses pérégrinations, Suhan nous exhortait à boire profondément à la coupe de la vie. Suivant son exemple, nous croyons que l'érudit accompli doit vagabonder loin de chez lui, acquérir de nouvelles expériences et perspectives. De telles personnes nous reviennent en tant que Gourous, chargés d'une connaissance de première main d'une autre route le long de la Nitikamarja. À leur tour, nous les envoyons à nouveau comme nos émissaires. Ils arrivent en terres étrangères sachant quoi porter, comment parler et comment témoigner du respect."
 guru_diplomacy_tt:0 "Obtenir §YRéputation diplomatique§! et §YAmélioration des relations§!"
 horizons_of_mind:0 "Horizons de l'esprit"
 desc_horizons_of_mind:0 "Aucune idée, aussi troublante ou perverse soit-elle, ne peut en elle-même polluer l'esprit. Il n'existe pas de crime de contemplation. Nous pouvons être induits en erreur et nous pouvons causer de grands torts, mais le concept lui-même n'est jamais l'acte. L'espace sacré que nous créons lorsque nous débattons nous permet de transcender nos présupposés et de trouver un nouveau sens. Quand nous errons, nous le faisons parmi des amis bienveillants. C'est cela la Praxis, la méthode par laquelle nous marchons main dans la main vers la Purtara."
 horizons_of_mind_tt:0 "Obtenir une réduction du §YCoût de technologie§! et un §YGain d'innovativité§!"
 promote_long_path:0 "Promouvoir la Longue Voie"
 desc_promote_long_path:0 "Syncrèse par la contradiction : vers la fin de sa vie, Suhan appelait cela son paradigme final. Opposition et argumentation sont des prérequis à la sagesse, et affinent notre compréhension. Les tyrans ricanent quand nous entrons dans une nouvelle cité sans fermer ses temples, quand nous permettons à des dissidents moqueurs d'assister à nos sociétés de débat et de s'époumoner. Comme toujours, les tyrans passent complètement à côté de l'essentiel ; de tels contradicteurs ont déjà commencé leur Praxis."
 promote_long_path_tt:0 "Perdre §G5§! ans de séparatisme dans les provinces de religion §Yrahenie§!"
 paradigmatic_zeal:0 "Zèle paradigmatique"
 desc_paradigmatic_zeal:0 "Là où les penseurs précédents concevaient le Visvatma comme une simple possession de la politique, une structure figée nécessitant un entretien constant, Suhan proposa le Visvatma comme un mouvement, une houle d'atma nourrie par de nombreux souffles. Jamais immobile, le Visvatma porte l'influence constante de nos choix collectifs et est renforcé par notre volonté collective. Quand nous combattons, il ne suffit pas de simplement obéir aux prescriptions de l'État. Nous devons respirer comme un seul, lutter comme un seul, triompher comme un seul."
 paradigmatic_zeal_tt:0 "Obtenir §YMoral des armées§! et §YMoral des flottes§!"
 debate_nature_of_praxis:0 "Débattre de la nature de la Praxis"
 desc_debate_nature_of_praxis:0 "Le séjour de Suhan à Rayavhashapal le convainquit que les érudits, aussi étroits et bornés qu'ils puissent parfois être, menaient néanmoins la plus belle des existences. Tandis que sa suite passait de ville en ville, ils encourageaient l'établissement de sociétés de débat de la Praxis, des réunions dans les arrière-salles de tavernes ou dans des boutiques vides où même les plus pauvres pouvaient argumenter et apprendre. Périodiquement, une seule question était posée à toutes les sociétés à la fois, un débat mené à travers la moitié d'un continent.\n\nCette tradition a survécu à Suhan, comme elle nous survivra espérons-le. À chaque appel au débat, des évangélistes et rhétoriciens habiles émergent, des figures charismatiques désireuses d'aider les autres à marcher sur la Nitikamarja."
 debate_nature_of_praxis_tt:0 "Obtenir §YForce missionnaire§! depuis les provinces d'origine de l'école"

 #Lizard Schools
 fate_sculptors_school:0 "Sculpteurs du Destin"
 fate_sculptors_school_desc:0 "Les Sculpteurs du Destin sont de loin la plus grande branche de la croyance Anzalkatsa, et maintiennent la théologie conventionnelle selon laquelle le destin est malléable comme l'argile, quelque chose à façonner dans la poursuite d'un avenir désiré. Cela coïncide avec la croyance orthodoxe selon laquelle pour que l'avenir du 333e Empire soit véritablement sculpté, le 332e doit être effacé, créant une toile vierge sur laquelle travailler. Par conséquent, les Sculpteurs du Destin considèrent la destruction des vestiges du 332e empire comme un impératif moral, et croient que le 333e empire sera évident en soi : un État lézard qui détient les obélisques et gouverne tous les hommes-lézards est le 333e empire, il n'y a rien de plus."
 fate_sculptors_scholar_modifier:0 "Sculpteurs du Destin"

 fate_sculptors_school_humiliated:0 "Sculpteurs du Destin (Humiliés)"
 fate_sculptors_school_humiliated_desc:0 "Les Sculpteurs du Destin sont de loin la plus grande branche de la croyance Anzalkatsa, et maintiennent la théologie conventionnelle selon laquelle le destin est malléable comme l'argile, quelque chose à façonner dans la poursuite d'un avenir désiré. Cela coïncide avec la croyance orthodoxe selon laquelle pour que l'avenir du 333e Empire soit véritablement sculpté, le 332e doit être effacé, créant une toile vierge sur laquelle travailler. Par conséquent, les Sculpteurs du Destin considèrent la destruction des vestiges du 332e empire comme un impératif moral, et croient que le 333e empire sera évident en soi : un État lézard qui détient les obélisques et gouverne tous les hommes-lézards est le 333e empire, il n'y a rien de plus."
 fate_sculptors_school_humiliated_modifier:0 "Sculpteurs du Destin"

 fate_sculptors_school_ascended:0 "Sculpteurs du Destin (Ascendés)"
 fate_sculptors_school_ascended_desc:0 "Les Sculpteurs du Destin sont de loin la plus grande branche de la croyance Anzalkatsa, et maintiennent la théologie conventionnelle selon laquelle le destin est malléable comme l'argile, quelque chose à façonner dans la poursuite d'un avenir désiré. Cela coïncide avec la croyance orthodoxe selon laquelle pour que l'avenir du 333e Empire soit véritablement sculpté, le 332e doit être effacé, créant une toile vierge sur laquelle travailler. Par conséquent, les Sculpteurs du Destin considèrent la destruction des vestiges du 332e empire comme un impératif moral, et croient que le 333e empire sera évident en soi : un État lézard qui détient les obélisques et gouverne tous les hommes-lézards est le 333e empire, il n'y a rien de plus."
 fate_sculptors_school_ascended_modifier:0 "Sculpteurs du Destin"

 fate_sculptors_school_victorius:0 "Sculpteurs du Destin (Victorieux)"
 fate_sculptors_school_victorius_desc:0 "Les Sculpteurs du Destin sont de loin la plus grande branche de la croyance Anzalkatsa, et maintiennent la théologie conventionnelle selon laquelle le destin est malléable comme l'argile, quelque chose à façonner dans la poursuite d'un avenir désiré. Cela coïncide avec la croyance orthodoxe selon laquelle pour que l'avenir du 333e Empire soit véritablement sculpté, le 332e doit être effacé, créant une toile vierge sur laquelle travailler. Par conséquent, les Sculpteurs du Destin considèrent la destruction des vestiges du 332e empire comme un impératif moral, et croient que le 333e empire sera évident en soi : un État lézard qui détient les obélisques et gouverne tous les hommes-lézards est le 333e empire, il n'y a rien de plus."
 fate_sculptors_school_victorius_modifier:0 "Sculpteurs du Destin"

 being_sculptors_school:0 "Sculpteurs de l'Être"
 being_sculptors_school_desc:0 "Les Sculpteurs de l'Être reconnaissent la Prophétie du 333e Empire, mais adoptent une approche nettement différente pour provoquer son avènement. Composés principalement des vestiges du 332e Empire, cette école enseigne que le destin manque de tangibilité dans le présent, et que la bonne façon de poursuivre un avenir prophétique est de façonner le présent en une forme plus prête à recevoir cet avenir. En termes plus pratiques, ils considèrent le 332e Empire non comme une entité politique à détruire, mais plutôt à façonner en un réceptacle pour le destin sous la forme du 333e."
 being_sculptors_scholar_modifier:0 "Sculpteurs de l'Être"

 being_sculptors_school_humiliated:0 "Sculpteurs de l'Être (Humiliés)"
 being_sculptors_school_humiliated_desc:0 "Les Sculpteurs de l'Être reconnaissent la Prophétie du 333e Empire, mais adoptent une approche nettement différente pour provoquer son avènement. Composés principalement des vestiges du 332e Empire, cette école enseigne que le destin manque de tangibilité dans le présent, et que la bonne façon de poursuivre un avenir prophétique est de façonner le présent en une forme plus prête à recevoir cet avenir. En termes plus pratiques, ils considèrent le 332e Empire non comme une entité politique à détruire, mais plutôt à façonner en un réceptacle pour le destin sous la forme du 333e."
 being_sculptors_school_humiliated_modifier:0 "Sculpteurs de l'Être"

 being_sculptors_school_ascended:0 "Sculpteurs de l'Être (Ascendés)"
 being_sculptors_school_ascended_desc:0 "Les Sculpteurs de l'Être reconnaissent la Prophétie du 333e Empire, mais adoptent une approche nettement différente pour provoquer son avènement. Composés principalement des vestiges du 332e Empire, cette école enseigne que le destin manque de tangibilité dans le présent, et que la bonne façon de poursuivre un avenir prophétique est de façonner le présent en une forme plus prête à recevoir cet avenir. En termes plus pratiques, ils considèrent le 332e Empire non comme une entité politique à détruire, mais plutôt à façonner en un réceptacle pour le destin sous la forme du 333e."
 being_sculptors_school_ascended_modifier:0 "Sculpteurs de l'Être"

 being_sculptors_school_victorius:0 "Sculpteurs de l'Être (Victorieux)"
 being_sculptors_school_victorius_desc:0 "Les Sculpteurs de l'Être reconnaissent la Prophétie du 333e Empire, mais adoptent une approche nettement différente pour provoquer son avènement. Composés principalement des vestiges du 332e Empire, cette école enseigne que le destin manque de tangibilité dans le présent, et que la bonne façon de poursuivre un avenir prophétique est de façonner le présent en une forme plus prête à recevoir cet avenir. En termes plus pratiques, ils considèrent le 332e Empire non comme une entité politique à détruire, mais plutôt à façonner en un réceptacle pour le destin sous la forme du 333e."
 being_sculptors_school_victorius_modifier:0 "Sculpteurs de l'Être"

 blade_and_needle_school:0 "Lame et Aiguille"
 blade_and_needle_school_desc:0 "L'école la plus ancienne. Pour les adeptes de Lame et Aiguille, il n'est pas de plus grande beauté que la vie elle-même, et donc pas de plus grand barde que celui qui fait de sa maîtrise sur la vie et la mort un art. Un vrai barde de Lame et Aiguille est un guerrier et un guérisseur, capable de prendre et de donner la vie avec aisance. Savoir simplement manier une épée ou pratiquer l'acupuncture ne suffit pas ; cela doit être calme, sans effort, parfait, sans le moindre gaspillage d'énergie. Artistique."
 blade_and_needle_scholar_modifier:0 "Lame et Aiguille"

 great_cycle_school:0 "Grand Cycle"
 great_cycle_school_desc:0 "L'école intermédiaire, le Grand Cycle, considère l'École de Lame et Aiguille comme une version primitive d'elle-même, et regarde au-delà de la simple vie et mort mortelle vers la création et la destruction dans leur ensemble. Pour ceux du Grand Cycle, l'art le plus vrai est celui qui peut puiser dans ce cycle de création et de destruction qu'ils voient imprégner toutes choses. Leur médium préféré est l'argile, la roche, le bois et la cire alors qu'ils tentent de construire la beauté en donnant forme à l'informe dans la poterie, et de libérer la beauté de sa prison en ajoutant le néant à la nature dans la sculpture."
 great_cycle_scholar_modifier:0 "Grand Cycle"

 humble_zeal_school:0 "Zèle Humble"
 humble_zeal_school_desc:0 "L'école la plus récente, le Zèle Humble, s'est développée en réaction à ce qui était perçu comme la nature trop sérieuse des autres écoles. Le Zèle Humble enseigne que le vrai art est la perfection dans le pratique, et la maîtrise de l'ordinaire. Bien que beaucoup plus large dans ses enseignements que les autres écoles, les formes emblématiques du Zèle Humble sont simplement la cuisine et la forge. Utiles, inévitables, et pourtant immensément complexes, ces deux arts symbolisent les enseignements du Zèle Humble : trouver la perfection dans ce qui rend la vie un peu plus facile, un peu plus douce. Contrairement aux autres arts, il n'existe pas de vrai barde du Zèle Humble, car quiconque est reconnu comme maître dans son métier peut être considéré comme un barde."
 humble_zeal_scholar_modifier:0 "Zèle Humble"

 soul_song_school:0 "Chant de l'Âme"
 soul_song_school_desc:0 "Les adeptes du Chant de l'Âme croient que la musique est de loin l'outil le plus puissant pour la clarté émotionnelle en raison de sa capacité à faire émerger les émotions. Un vrai barde du Chant de l'Âme est celui qui peut complètement contrôler les émotions, et il doit être aussi capable de susciter le chagrin et la tristesse que la joie et l'émerveillement avec sa musique, et ce à tout moment. Généralement, ils sont ce à quoi un non-Zaradyrra pense quand il imagine un barde, et on les trouve parfois sur les champs de bataille à inspirer leurs troupes."
 soul_song_scholar_modifier:0 "Chant de l'Âme"

 colors_of_life_school:0 "Couleurs de la Vie"
 colors_of_life_school_desc:0 "Les disciples des Couleurs de la Vie, contrairement à l'École du Chant de l'Âme, considèrent les couleurs entrelacées comme le plus grand évocateur d'émotions. Ils cherchent à utiliser la beauté de la couleur pour raconter les histoires de leurs vies. Un vrai barde des Couleurs de la Vie tisse les couleurs ensemble d'une manière qui représente les accomplissements de sa vie, et son art doit être capable de transmettre les émotions de ces moments, quelle que soit la forme que prend son art. Les bardes des Couleurs de la Vie disposent d'une variété de médiums ; peindre sur une toile, dessiner sur des écailles, tisser des tapisseries colorées ou teinter du verre sont tous considérés comme du vrai art."
 colors_of_life_scholar_modifier:0 "Couleurs de la Vie"

#Gnoll Schools
 INVITE_SCHOLAR_COUNTRY_TEXT_GNOLL:0 "\nInviter un chaman de la §YTradition [From.GetReligiousSchool]§! nous donnera :"

 demons_of_the_sorrow_tradition:0 "Démons de la Désolation"
 demons_of_the_sorrow_tradition_modifier:0 "Démons de la Désolation"
 demons_of_the_sorrow_tradition_desc:0 "Les Khet sont une réalité malheureuse de la vie pour les nombreux gnolls vivant le long de la Désolation, qui considèrent ces êtres à tête de chat comme des démons particulièrement capricieux à apaiser ou éviter autant que possible. En de rares occasions, les gnolls s'intéressent plus directement aux Khet et cherchent à s'attirer leurs faveurs, offrant des présents en échange d'un aveuglement face à leurs agressions contre la Khétérata."

 monstrous_pedigrees_tradition:0 "Lignées Monstrueuses"
 monstrous_pedigrees_tradition_modifier:0 "Lignées Monstrueuses"
 monstrous_pedigrees_tradition_desc:0 "Cette tradition populaire accorde une grande importance à l'héritage des royaumes gnolls du passé lointain et tend à mettre l'accent sur le séculier plutôt que le mystique. Les dirigeants revendiquent souvent une descendance de souverains ou d'États notables, ainsi que de leurs anciens territoires. Particulièrement répandue parmi les gnolls du Bulwar qui puisent dans les nombreux royaumes de l'Âge des Monstres."

 children_of_goxma_tradition:0 "Enfants de Goxma"
 children_of_goxma_tradition_modifier:0 "Enfants de Goxma"
 children_of_goxma_tradition_desc:0 "Les Gnolls Hurleurs-du-Vent de l'ouest du Sarhal ont une longue histoire de cohabitation avec les humains de Fangaula. Avant la venue des Xhaz Jumeaux, le panthéon fangaulan était suivi par nombre de ces gnolls et ces croyances ont été incorporées dans leur foi actuelle. En particulier la vénération de la déesse gnoll fangaulane Goxma, un nombre significatif de Xhazobkultistes de l'ouest croyant que les divers Xhazobines étaient ses avatars."

 kult_of_the_packmother_tradition:0 "Kulte de la Mère de Meute"
 kult_of_the_packmother_tradition_modifier:0 "Kulte de la Mère de Meute"
 kult_of_the_packmother_tradition_desc:0 "Nombre de gnolls vénèrent des esprits d'origine plus naturelle, voyant dans leur nature prédatrice des liens avec les bêtes et les lieux sauvages. Le Kulte de la Mère de Meute est un courant particulièrement organisé de cette croyance commune, soutenant que les gnolls sont la progéniture d'une puissante déesse bestiale de la chasse. Cette divinité est parfois assimilée à la déesse Kvanga, ou vénérée comme une entité distincte par ceux plus alignés avec le Xhazobkult."

 demonic_shamans_tradition:0 "Chamans Démoniaques"
 demonic_shamans_tradition_modifier:0 "Chamans Démoniaques"
 demonic_shamans_tradition_desc:0 "Bien que de nombreux Xhazobkultistes ne voient les démons que comme une petite partie de leur mythologie, il en est pour qui le Xhazobkult s'apparente davantage à une religion organisée et qui prennent très au sérieux leur vocation infernale. Des dîmes sacrificielles organisées, des rituels démoniaques réguliers et une caste sacerdotale de Chamans qui veillent à ce que la meute reste fidèle à ses croyances messianiques malveillantes, voilà les traits communs de cette tradition particulière."

 umbral_bargains_tradition:0 "Pactes Ombreux"
 umbral_bargains_tradition_modifier:0 "Pactes Ombreux"
 umbral_bargains_tradition_desc:0 "Pour certains gnolls, les démons ne sont pas les seules entités malignes avec lesquelles ils font affaire. Ceux qui ont longtemps vécu aux marges du Marais des Ombres ont souvent cherché à contacter les créatures sinistres qui y demeurent, passant des pactes avec quiconque ou quoi que ce soit leur fera une offre. Un long contact avec ces êtres d'outre-monde a façonné cette tradition populaire presque jusqu'à la révérence, les plus grands esprits du Plan des Ombres étant considérés comme quasi égaux aux Xhazob démoniaques vénérés par le Xhazobkult."

 way_of_iron_tradition:0 "Voie du Fer"
 way_of_iron_tradition_modifier:0 "Voie du Fer"
 way_of_iron_tradition_desc:0 "Les adeptes de Kvangahga de l'est du Sarhal appellent leurs artisans mystiques « Rram Zelag » ou Prêtre-Forgeron en langage commun, ce nom de leur classe sacerdotale montrant l'importance des arts métallurgiques dans leur interprétation de la foi. La forge et le travail qui s'y accomplit sont sacrés pour la Voie du Fer ; la fonte des métaux de récupération en leurs parties les plus brutes, avant d'être reforgés en quelque chose d'entièrement nouveau et utile, est considérée comme l'expression la plus parfaite de la volonté divine de Kvanga."

 way_of_bones_tradition:0 "Voie des Os"
 way_of_bones_tradition_modifier:0 "Voie des Os"
 way_of_bones_tradition_desc:0 "La Voie des Os se trouve principalement dans les déserts de l'ouest du Sarhal et met l'accent sur l'importance du recyclage des matières organiques dans cette terre hostile, en particulier la chair et les os des défunts. Les ancêtres honorés sont révérés pour le don de leur chair aux vivants, leurs os souvent façonnés en talismans ou incorporés dans des armes et armures comme moyens de garder leurs esprits proches et de leur permettre de continuer à guider et protéger leurs descendants."


 mother_akasik:0 "Mère Akasik"
 mother_akasik_religion_desc:0 "La divinité locale des peuples Akasi, Mère Akasik est à la fois la représentation littérale et spirituelle des Monts Akasik. C'est une déesse ferme et juste, mais bienveillante envers ceux qui habitent ses terres."
 akasik_justice_1:0 "Aspect de Justice"
 akasik_justice_1_desc:0 "L'aspect de la Mère représentant son administration de la justice, qui inspire loyauté et promptitude à agir.\n\nPuisque §Rmoins de quatre provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Rfaibles§!.\nNous devons unifier Mère Akasik pour la vénérer pleinement.\n\nAspects à venir :\n§MRésilience§! :\n   Troubles nationaux : §G-1§!\n§GCompassion§! :\n   Réputation diplomatique : §G+1§!\n§YRéciprocité§! :\n   Coût des idées : §G-5 %§!"
 akasik_justice_2:0 "Aspect de Justice"
 akasik_justice_2_desc:0 "L'aspect de la Mère représentant son administration de la justice, qui inspire loyauté et promptitude à agir.\n\nPuisque §Yquatre à sept provinces montagneuses d'Akasik§! sont à la fois de foi Mère Akasik et contrôlées par un pays vénérant Mère Akasik, les bénéfices sont §Ymoyens§!.\nNous devons unifier Mère Akasik pour la vénérer pleinement.\n\nAspects à venir :\n§MRésilience§! :\n   Troubles nationaux : §G-2§!\n   Coût des idées : §R+5 %§!\n§GCompassion§! :\n   Réputation diplomatique : §G+2§!\n   Moral des armées : §G-5 %§!\n§YRéciprocité§! :\n   Coût des idées : §G-10 %§!\n   Troubles nationaux : §R+1§!"
