 axierophonic_mandate_deity_level_1:0 "Mandat Axiérophonique" #Written By: Karlov
 axierophonic_mandate_deity_level_1_desc:0 "§YMandat Axiérophonique§!\nLes enseignements d'Axiérophon de Kherka notent que le rôle premier du gouvernement d'un Kheion est de servir le peuple, et qu'un peuple est mieux servi en étant mis en sécurité. La sécurité est nécessaire pour que les droits soient garantis, et la sécurité contre les menaces, internes et externes, ne peut être maintenue qu'avec une armée forte et un monopole de la violence. La sécurité, enseigne-t-on, devrait venir de l'écrasement des rébellions internes et de la dissuasion des ennemis étrangers d'attaquer. Parfois raillée comme une philosophie de « la raison du plus fort », la politique gouvernementale axiérophonique place les affaires militaires au premier plan de la prise de décision du Kheion afin de protéger son peuple.\n\nSi l'Ordre Sacré du §YMandat Axiérophonique§! est placé dans plus de §Y50%§!([Root.kheionism_axierophonic_mandate_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75%§!([Root.kheionism_axierophonic_mandate_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nDéfense des forts : §G+20.0%§!\n\nSi l'Ordre Sacré du §YMandat Axiérophonique§! est placé dans plus de §Y75%§!([Root.kheionism_axierophonic_mandate_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nDéfense des forts : §G+20.0%§!\nPolitiques militaires gratuites : §G+1§!"
 axierophonic_mandate_deity_level_2:0 "Mandat Axiérophonique" #Written By: Karlov
