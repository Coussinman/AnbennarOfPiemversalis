 lizardfolk_religion:0 "Hommes-Lézards"
 anzalkatsa:0 "Anzalkatsa"
 anzalkatsa_religion_desc:0 "La foi Anzalkatsa est indissociable de la prophétie du 333e Empire. Bien qu'il y ait de nombreuses délibérations sur les détails, tous s'accordent à dire qu'elle affirme que tous les hommes-lézards doivent être finalement unis sous le 333e Empire : Khatalashya. L'Empire Final régnera sur tous les hommes-lézards, tiendra tous les piliers et apportera la prospérité éternelle. C'est le devoir de chaque fidèle d'Anzalkatsa de travailler à accomplir cette prophétie et d'être prêt à tout sacrifier pour ce but, et cette attente pèse également sur toute la société. La paysannerie, les marchands, les nobles et même le roi doivent se prosterner à cette fin : c'est leur seul but.\n\nLes gardiens de cet avenir sont les nagas, une rare mutation des hommes-lézards distingués par leur apparence et leur grand potentiel magique, qui forment leur propre classe sociale. On les trouve comme conseillers, érudits, prêtres, conseillers : là où il y a du pouvoir et de l'influence, ils sont là.\n\nLe devoir et la compétence sont des vertus clés chez les Anzalkatsa, et les ordinaires sont censés reconnaître leur médiocrité et faire place aux étoiles montantes. Ceux qui ne peuvent reconnaître leurs propres limites, ou refusent de le faire, ne sont pas longtemps tolérés par les nagas, qui s'assurent qu'ils subissent une chute de leur propre fait. Aucun droit de naissance n'accorde l'immunité à cela, et le trône d'aucun roi ne peut jamais être véritablement stable contre leurs machinations."

 zaradyrra:0 "Zaradyrra"
 zaradyrra_religion_desc:0 "La foi Zaradyrra tire son origine des premiers hommes-lézards Ashhana libérés de la malédiction du sang par la musique. À l'origine, on pensait que seule la musique pouvait soulager la malédiction du sang, mais au fur et à mesure que la société Ashhana se développait, on découvrit que de nombreuses formes d'art pouvaient affaiblir l'emprise de la malédiction du sang, et que créer de l'art était un remède bien plus puissant que le consommer. Les premiers Ashhana capables de guérir leurs semblables devinrent les bardes, et certains allèrent fonder les premières maisons nobles Ashhana. À mesure que de plus en plus d'Ashhana sauvages étaient amenés dans la société, la foi Zaradyrra vint véritablement à exister sous sa forme moderne comme un ensemble de pratiques utilisées pour gérer la malédiction du sang au quotidien. Le moyen le plus faible de combattre la malédiction du sang est de simplement consommer l'art des autres, ce qui suffit à maintenir une décorum normale et est le lot de nombreuses classes inférieures. Le suivant plus efficace est de créer de l'art dérivé, pas véritablement original ou révolutionnaire mais pas une simple copie non plus, et cela est dit donner au créateur un esprit véritablement clair qui est plus capable. Ces Échos sont le lot de la noblesse et de l'artisan occasionnel des classes inférieures privilégiées. Le moyen le plus efficace est la création artistique véritablement originale : le domaine exclusif des bardes."

 the_sovereign:0 "Le Souverain"
 the_sovereign_desc:0 "Quelles vistas pourrait-on apercevoir au sommet après avoir gravi mille montagnes ? Bien qu'on doive toujours garder le présent à l'esprit, on doit également regarder vers des horizons lointains, et il n'y a pas d'horizon plus lointain, ni plus digne, que celui du Souverain, le dirigeant éternel de l'empire final. Cette constellation est généralement associée à la chute du 33e empire, dont les dirigeants dans leur orgueil croyaient que leur empire se tenait déjà au pinacle et refusaient de regarder vers l'horizon pour voir ce que leur royaume pourrait encore devenir. Cet orgueil assura la chute de l'empire, et le Souverain dans le ciel est un rappel constant pour les hommes-lézards de toujours regarder vers l'avant."

 the_storm:0 "La Tempête"
 the_storm_desc:0 "Comment autrement un nouveau royaume peut-il être forgé sinon par la guerre ? Bien que tous les fidèles d'Anzalkatsa travaillent à faire advenir l'empire-qui-doit-être, aucune simple encre répandue sur une page ne fera advenir ce qui doit être ; un fait que le 167e empire ignora. L'empire craignait la Tempête et resta placide, ne se résolvant jamais à faire ce qui devait être fait, croyant faussement que simplement en existant, d'autres se rallieraient à leur bannière ; nous savons maintenant que l'empire-qui-doit-être ne sera amené que par la Tempête de la guerre et de la conquête. Chercher la tempête, c'est devenir la force qui balaie ce qui était, et amène le nouveau, chaque cycle apportant un nouvel ordre amélioré."

 the_anchor:0 "L'Ancre"
 the_anchor_desc:0 "Comme ce fut, ainsi ce sera. Se dresser contre la tempête, c'est mettre à l'épreuve ceux qui se présument Souverains, et tenir contre eux, c'est montrer leur folie. L'Avenir ne sera pas forcé, le changement doit être enduré jusqu'à ce que des vents plus favorables prévalent. Le 277e empire croyait qu'il pouvait forcer le changement et ainsi faire advenir le 333e empire, mais ce fut leur folie et la seule chose qu'ils amenèrent fut la chute d'un autre empire, le leur. Dans une guerre de prophétie, ce ne sont pas ceux qui brûlent avec éclat pour ensuite tomber qui connaîtront la victoire, mais ceux qui survivront à ces prétendants. Chercher l'Ancre, c'est tenir bon contre le changement et protéger ce qui est vôtre contre la tempête du monde."

 the_erudite:0 "L'Érudit"
 the_erudite_desc:0 "Quand la mort viendra, que restera-t-il de votre œuvre ? Il y a plus à gouverner que de simples épées et sorcellerie, et tout comme les guerriers dévoués à la Tempête feront advenir l'empire-qui-doit-être, ainsi les Érudits forgeront leurs armes et élaboreront des stratagèmes supérieurs. Cette constellation est généralement associée à la chute du 167e empire en raison de la complaisance de son peuple. C'est un rappel pour les hommes-lézards que tout comme le plus puissant des guerriers peut être vaincu par une nouvelle arme, ainsi le plus grand des empires peut être détruit par la complaisance."

 lizard_the_river:0 "La Rivière"
 lizard_the_river_desc:0 "Le monde autour de nous bouge et coule indépendamment de la prophétie, bien que nous puissions la connaître et attendre l'empire-qui-doit-être, nous devons aussi être conscients des changements constants autour de nous tandis que d'autres peuples s'élèvent et chutent. Alors que de nouveaux royaumes sont forgés et transformés, vous devez être prêt à apprendre de ces changements et ainsi en bénéficier. Le 243e empire, fixé sur la prophétie du 333e empire, se retrouva complètement inconscient des changements autour d'eux, menant à leur chute. Nous savons maintenant qu'on doit flotter comme une feuille sur le courant de la rivière dans un monde de royaumes et d'alliances en perpétuel changement."

 the_sail:0 "La Voile"
 the_sail_desc:0 "Qu'y a-t-il au-delà de notre horizon ? Encore un autre horizon. Bien que nous ne devions pas nous fixer sur ce cycle éternel de découverte, on doit toujours être prêt à hisser la Voile pour voyager vers le prochain horizon, et rencontrer ceux qui viennent d'horizons différents. Le 257e empire se complaisait dans sa propre vision étroite du monde et refusait de regarder la richesse au-delà de son propre horizon, mais cette richesse n'attendait pas ; quand ils réalisèrent enfin la richesse à gagner, il était trop tard. Le monde autour d'eux avait changé, et l'horizon s'était ouvert sur un autre. Vous devez mettre la Voile et explorer de nouveaux horizons pour vous y faire une place avant qu'il ne change et ne continue sans nous."

 the_mistake:0 "L'Erreur"
 the_mistake_desc:0 "Tant de mal est engendré par les meilleures intentions, et une telle folie ouvre l'histoire de Zaradyrra. Elle commence avec une grande armée envoyée aux terres de l'ombre, chargée des nobles tâches d'aider les faibles et de vaincre le mal. Mais la conviction seule ne peut servir de bouclier contre le mal, et ainsi les ténèbres vinrent pour ce phare de bien tout de même. Ses soldats lumineux de lumière seraient transformés en coquilles creuses qui ne pouvaient même plus se souvenir de ce que c'était de penser et ressentir comme autrefois. De l'erreur, nous apprenons à nous garder du fanatisme et à toujours garder nos esprits dans le présent, de peur que nos désirs vertueux ne deviennent la graine d'un nouveau mal."

 the_onslaught:0 "L'Assaut"
 the_onslaught_desc:0 "Le sang appelle le sang. Un bleu est donné pour un mot, un œil pour un bleu, une tête pour un œil, et ainsi la violence se gorge d'elle-même. Les raids des maudits du sang infligeraient mort et souffrance incalculables à nos semblables, et ainsi dans les siècles précédant le premier Ashhana libre, la vengeance régnerait dans les cœurs de tous tandis que la mort appelait la mort, encore et encore. Que le cycle puisse être brisé ne fut jamais recherché, jamais considéré tandis que représailles et sang exigeaient tous les efforts. De l'Assaut, nous apprenons à ne jamais laisser ce qui ne peut être défait gouverner ce qui est à venir, et à chercher à briser les cycles de violence et de vengeance qui lient le monde."

 the_bard:0 "Le Barde"
 the_bard_desc:0 "Les temps les plus sombres peuvent transformer les plus petites flammes vacillantes en piliers de lumière par l'espoir d'une nouvelle aube. Quand le premier barde vint, l'espoir avait depuis longtemps quitté ces terres ; que le bain de sang puisse jamais cesser était au-delà de toute considération. Et pourtant, ce ne fut pas un puissant roi, pas un grand sage qui éveillerait le premier Ashhana du long sommeil de la malédiction du sang, mais un simple barde avec une simple chanson. En un instant lumineux d'espoir et de désespoir, une nouvelle ère naquit sans le savoir d'un champ de mort. Du premier Barde, nous apprenons à ne jamais perdre espoir et à ne jamais nous perdre dans la peur et l'abattement, car une nouvelle aube peut toujours se lever."

 the_rising:0 "L'Ascension"
 the_rising_desc:0 "D'une seule étincelle, un feu ardent peut naître. Les premiers Ashhana libres faisaient face à des siècles d'histoire qui enseignaient qu'ils étaient perdus à jamais et contemplaient des multitudes infinies de leurs semblables encore perdus dans la malédiction. De leur conviction et de leur espoir surgirent les premiers bardes Ashhana, les premiers vrais Zaradyrra. Ces âmes désintéressées consacrèrent tout ce qu'elles étaient à une vie de purification de leurs semblables, non seulement pour libérer les Ashhana, mais pour défier les ombres en forgeant un nouveau peuple à partir de ceux qui étaient destinés à n'être que des monstres. De l'Ascension, nous apprenons à ne pas nous contenter de petites victoires contre le mal mais à les porter en avant pour détruire le mal entièrement."


 #Night Coven
 hag_religion:0 "Pacte Nocturne"
 night_coven:0 "Pacte Nocturne"
 night_coven_religion_desc:0 "Représentant un large éventail de pratiques folkloriques et chamaniques, des versions perverties du mythe originel des géants des trolls aux cultes locaux vénérés par les tribus humaines. Le Pacte Nocturne unit tout cela avec les principes fondamentaux selon lesquels ses fidèles vivent pour servir les caprices de leurs maîtresses Sorcières de la Nuit, cherchant des faveurs et leur bienveillance en échange de sacrifices et de servitude."

 echenka_religion:0 "Echenka"

  sky_domain:0 "Domaine Céleste"
  sky_domain_religion_desc:0 "Semayi'gera, ou Domaine Céleste en langage commun, est la foi dominante du peuple Mengi. Seul en révérence est le dieu Amilak, que les Mengi croient être le seigneur des cieux et le porteur de la pluie. Des sanctuaires et monastères dédiés à Amilak se trouvent dans toutes les terres Mengi, et de grands temples sont érigés dans les cités, ouverts aux cieux, où les Prêtres-de-Pluie et les Mages-des-Nuages œuvrent à guider les pluies vers le peuple.\n\nAux côtés d'Amilak, les Mengi reconnaissent également divers « Parents-Divins » que l'on croit être les dieux d'autres peuples, et Yrilak, le jumeau sombre d'Amilak. Là où Amilak règne sur les terres des Mengi, les terres de Yezel Mora sont le domaine d'Yrilak, autrefois une terre verdoyante, maintenant louée aux sorcières via un sombre pacte conclu pendant le Jour-des-Cieux-Cendrés en échange de vils colifichets et babioles."
 #Dai'Nadeilhil
 dai_nadeilhil:0 "Dai'Nadeilhil"
  dai_nadeilhil_religion_desc:0 "Dai'Nadeilhil, ou « Histoire des Quatre Mondes », est la religion du peuple Haraf'ne : les Nés-des-Ruines natifs de la terre éponyme du Nord d'Aelantir. Le Dai'Nadeilhil est une tradition orale racontant principalement les voyages et expériences du peuple Haraf'ne à travers les quatre mondes de Dchei'ilhil, Kosu'ilhil, Yaih'ilhil et Keiin'ilhil : le Monde Sombre, le Monde d'Eau, le Monde d'Air et le Monde de Feu, respectivement.\n\nTselayos, Dieu de l'Eau, est vénéré comme le créateur des Haraf'ne après les avoir sortis de Dchei'ilhil vers Kosu'ilhil et les avoir bénis avec des âmes et la connaissance de l'agriculture pour se distinguer des redoutés Observateurs Silencieux. Iishkeli, Déesse de l'Air, est louée pour avoir fourni un espace généreux aux Haraf'ne d'antan pour régner sur Yaih'ilhil depuis leurs Six Montagnes Volantes, jusqu'à ce que finalement, l'envieux Di'iikunail, Dieu du Feu, qui ne pouvait créer que par la destruction, abattit les Montagnes Volantes et rasa tous les mondes par l'immense force de leur chute.\n\nC'est de cette destruction que Di'iikunail forgea un monde unique pour remplacer tous les autres : Keiin'ilhil, une terre brûlante et torride de mort. Cependant, les Bons Dieux de l'Eau et de l'Air jugèrent bon de créer et de donner vie à Ek'elas, Dieu de la Terre, pour servir de gardien des Haraf'ne dans ce nouveau monde. Ek'elas utilisa de grandes magies pour protéger et soutenir les Haraf'ne jusqu'à ce qu'il se flétrisse et devienne les sables du grand Désert Haraf, assurant que les Haraf'ne pourraient dompter leur nouvelle demeure grâce à son sacrifice."
  deliver_from_dark:0 "Délivrance des Ténèbres"
  bounty_of_kosuilhil:0 "Abondance de Kosu'ilhil"
   six_mountains:0 "Sur les Six Hautes Montagnes"
   rebirth_through_flame:0 "Renaissance par la Flamme"
   honor_ekelas:0 "Honorer le Sacrifice d'Ek'elas"
   ekelas_fort:0 "Ériger les Défenses d'Ek'elas'ne"
  desc_deliver_from_dark:0 "Le premier des Chants des Mondes. Il rappelle un temps où les Haraf'ne n'étaient que des créatures sans âme du Monde Sombre jusqu'à ce que Tselayos donne identité et forme aux Haraf'ne."
  desc_bounty_of_kosuilhil:0 "Le deuxième des Chants des Mondes. Il rappelle un temps où les Haraf'ne grandirent en tant que peuple et absorbèrent le savoir de Tselayos dans le Monde d'Eau."
   desc_six_mountains:0 "Le troisième des Chants des Mondes. Il rappelle un temps où les Haraf'ne régnaient sur l'entièreté du Monde d'Air au sommet de six montagnes volantes."
   desc_rebirth_through_flame:0 "Le quatrième et dernier des Chants des Mondes. Il rappelle un temps où les Haraf'ne furent précipités de leurs montagnes volantes par l'envieux Dieu du Feu Di'iikunail, forgeant le Monde de Feu à partir des vestiges de tous les autres."
   desc_honor_ekelas:0 "Ô, Ek'elas. Né dans le monde par Tselayos et Iishkeli pour protéger contre la destruction de Di'iikunail, tu fus protecteur et gardien de tous les Haraf'ne. Ton sacrifice sera à jamais remémoré. Tout comme ton corps est devenu le vaste désert éternel, ainsi les Haraf'ne resteront gardiens pour toi, Ek'elas ; un monument à ta persévérance."
   desc_ekelas_fort:0 "Des rochers de taille humaine sont gardés près du périmètre des colonies pour servir de couverture contre les projectiles basiques. Quand une force ennemie s'approche pour l'assaut, les rochers sont surchauffés par les Chanteurs pour diriger et magnifier les éclats des rochers explosant vers l'ennemi comme une sorte de canon à mitraille primitif et tactique de choc."
  dai_nadeilhil_dark_tt:0 "Gagnez §G-10 %§! de coût de colonisation ou §G+10 %§! de progression des réformes gouvernementales selon que vous êtes §Yindigène§! ou non."
  dai_nadeilhil_bounty_tt:0 "Gagnez §G15 Couronnes§! pour chaque groupe de §Y5 provinces prospères§! et gagnez §R+2§! d'agitation nationale ou perdez §R10§! de loyauté de la Bourgeoisie."
  dai_nadeilhil_mountains_tt:0 "Gagnez §G-10 %§! de coût de création de cœur si en paix ou levez le §YBrouillard de Guerre§! chez tous les ennemis en guerre."
  dai_nadeilhil_flame_tt:0 "Une province aléatoire avec un bien commercial agricole gagne §R50§! de dévastation. Dans 3 ans déclenchez §YTerre Renaissante§!, l'améliorant."
  dai_nadeilhil_ekelas_tt:0 "Gagnez §G-10 %§! de dégâts de choc et de feu reçus pendant 5 ans."
  dai_nadeilhil_fort_tt:0 "Gagnez §G-10 %§! d'entretien des forts et §G+20 %§! de défensivité pendant 5 ans."
