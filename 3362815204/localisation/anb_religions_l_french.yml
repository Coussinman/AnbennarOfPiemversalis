 oni_demon_warriors_boon_tt:0 "\n§YGuerriers Démoniaques Oni§! : Choc d'infanterie : §G+0,4§!"
 the_god_eaters:0 "Les Dévoreurs de Dieux"
 desc_the_god_eaters:0 "Il y a fort longtemps, les Oni servaient des dieux au Paradis. Un jour, leurs dieux tombèrent malades et ne purent plus les protéger, alors les Oni prirent d'abord leurs cheveux, puis leurs ongles, puis ce qui restait, espérant conserver la protection divine. C'est pour cette raison qu'ils sont désormais maudits par les appétits des dieux. Et maintenant nous dévorerons les esprits, qui sont les dieux de la Voie Accrétive, et nous dévorerons le Chi lui-même, et nous deviendrons pareils aux dieux."
 the_god_eaters_mod:0 "Afflux de Chi : Les Dévoreurs de Dieux"
 the_god_eaters_effect_tt:0 "Score de guerre contre ennemis religieux : §G-15 %§!"
