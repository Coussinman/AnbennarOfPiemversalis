   fey_court_seelie_offering:0 "Améliorer les relations avec la Cour Seelie"
   desc_fey_court_seelie_offering:0 "La Cour Seelie est toujours en quête d'un peu de divertissement. Avec un peu d'effort, nous pouvons donner aux Seelie ce qu'elles veulent pour améliorer les relations."
   fey_court_seelie_offering_tooltip:0 "§YOffrir quelque chose à la Cour Seelie pour améliorer les relations.§! Elles sont actuellement [Root.SeelieCourtRelationsLoc] !"
   fey_court_seelie_offering_cooldown:0 "Délai d'offrande Seelie"
   desc_fey_court_seelie_offering_cooldown:0 "Nous avons récemment fait une offrande aux Seelie. Nous devrons attendre avant de pouvoir faire une autre offrande."
   fey_court_unseelie_offering:0 "Améliorer les relations avec la Cour Unseelie"
   desc_fey_court_unseelie_offering:0 "La Cour Unseelie ne refusera jamais ceux qui ont quelque chose à offrir. Avec un peu d'effort, nous pouvons donner aux Unseelie ce qu'elles veulent pour améliorer les relations."
   fey_court_unseelie_offering_tooltip:0 "§YOffrir quelque chose à la Cour Unseelie pour améliorer les relations.§! Elles sont actuellement [Root.UnseelieCourtRelationsLoc] !"
   fey_court_unseelie_offering_cooldown:0 "Délai d'offrande Unseelie"
   desc_fey_court_unseelie_offering_cooldown:0 "Nous avons récemment fait une offrande aux Unseelie. Nous devrons attendre avant de pouvoir faire une autre offrande."
   fey_court_unaligned_fey_offering:0 "Améliorer les relations avec les Fées indépendantes"
   desc_fey_court_unaligned_fey_offering:0 "Les fées ne forment pas un groupe unifié et beaucoup peuvent vivre indépendamment des deux grandes cours. Avec un peu d'effort, nous pouvons atteindre ces fées indépendantes et travailler à améliorer nos relations avec elles."
   fey_court_unaligned_fey_offering_tooltip:0 "§YOffrir quelque chose aux Fées indépendantes pour améliorer les relations.§! Elles sont actuellement [Root.UnalignedFeyRelationsLoc] !"
   fey_court_unaligned_fey_offering_cooldown:0 "Délai d'offrande aux Fées indépendantes"
   desc_fey_court_unaligned_fey_offering_cooldown:0 "Nous avons récemment fait une offrande aux Fées indépendantes. Nous devrons attendre avant de pouvoir faire une autre offrande."
   fey_court_seelie_power_1:0 "Demander un Jubilé Frupticieux"
   desc_fey_court_seelie_power_1:0 ""
   fey_court_seelie_power_1_tooltip:0 "§GRéduire§! le §Ycoût de stabilité§! et les §Ytroubles globaux§!."
   fey_court_seelie_modifier_1:0 "Le Jubilé Frupticieux"
   desc_fey_court_seelie_modifier_1:0 "Laissez aux Seelie le soin de trouver un moyen de célébrer chaque jour différemment."
   fey_court_seelie_power_2:0 "Employer un Tulmun Retors"
   desc_fey_court_seelie_power_2:0 ""
   fey_court_seelie_power_2_tooltip:0 "§GAugmenter§! l'§Yamélioration des relations§! et la §Yprojection de puissance par insultes§!."
   fey_court_seelie_modifier_2:0 "Un Tulmun Retors"
   desc_fey_court_seelie_modifier_2:0 "« Toi, espèce de flatulent freluquet flagellé, et ta mère est un mammouth maniéré et mégalomane ! » Une insulte classique de Tulmun."
   fey_court_seelie_power_3:0 "Prendre le poste de Grand Chapelier"
   desc_fey_court_seelie_power_3:0 ""
   fey_court_seelie_power_3_tooltip:0 "§GAugmenter§! la §Yréputation diplomatique§!, §Gréduire§! le §Ycoût des conseillers§! et §Gaugmenter§! les §Yconseillers disponibles§!."
   fey_court_seelie_modifier_3:0 "Le Grand Chapelier"
   desc_fey_court_seelie_modifier_3:0 "Nous avons été nommés Chapelier de Grande Importance à la Cour Seelie. Une position au sens discutable mais aux avantages tangibles."
   fey_court_unseelie_power_1:0 "Accéder à l'Épreuve"
   desc_fey_court_unseelie_power_1:0 ""
   fey_court_unseelie_modifier_1_early_game:0 "L'Épreuve Unseelie"
   desc_fey_court_unseelie_modifier_1_early_game:0 "Nos troupes sont plus vives, plus fortes et plus rapides grâce à l'entraînement rigoureux de l'Épreuve."
   fey_court_unseelie_modifier_1_late_game:0 "L'Épreuve Unseelie"
   desc_fey_court_unseelie_modifier_1_late_game:0 "Nos troupes sont plus vives, plus fortes et plus rapides grâce à l'entraînement rigoureux de l'Épreuve."
   fey_court_unseelie_power_1_tooltip:0 "§GRéduire§! les §Ydégâts reçus§! et §Gaugmenter§! la §Yvitesse de renfort§!."
   fey_court_unseelie_power_2:0 "Invoquer un Gardien du Serment d'Écorce-de-Fer"
   desc_fey_court_unseelie_power_2:0 ""
   fey_court_unseelie_modifier_2:0 "Les Gardiens du Serment d'Écorce-de-Fer"
   desc_fey_court_unseelie_modifier_2:0 "Nos vassaux ont plus de mal à se soustraire à leurs devoirs grâce aux Gardiens du Serment d'Écorce-de-Fer Unseelie."
   fey_court_unseelie_power_2_tooltip:0 "§GAugmenter§! le §Yrevenu des vassaux§! et §Gréduire§! le §Ydésir de liberté§!."
   fey_court_unseelie_power_3:0 "Assumer le rôle de Dourach"
   desc_fey_court_unseelie_power_3:0 ""
   fey_court_unseelie_modifier_3:0 "Reconnu comme Dourach"
   desc_fey_court_unseelie_modifier_3:0 "Les yeux de la Cour Unseelie sont nombreux et la volonté de leur roi est de fer. En tant que Dourach, représentant de la Cour, nous jouissons désormais des avantages de cette autorité."
   fey_court_unseelie_power_3_tooltip:0 "§GAugmenter§! le §Ygain annuel de légitimité§!, la §Ydiscipline§! et la §Yloyauté des états§!."
   fey_court_unaligned_fey_power_1:0 "Sonner le Cor Sauvage"
   desc_fey_court_unaligned_fey_power_1:0 ""
   fey_court_unaligned_modifier_1:0 "Le Cor Sauvage"
   desc_fey_court_unaligned_modifier_1:0 "Malgré nos hauts et nos bas avec nos voisins fées, des générations de communion commune nous ont donné une certaine confiance innée. Quand nous appelons contre une menace, elles répondent."
   fey_court_unaligned_fey_power_1_tooltip:0 "§GAugmenter§! la §Ydéfensivité§! et l'§Yattrition hostile§!."
   fey_court_unaligned_fey_power_2:0 "Organiser nos voisins fées"
   desc_fey_court_unaligned_fey_power_2:0 ""
   fey_court_unaligned_modifier_2:0 "Fées productives"
   desc_fey_court_unaligned_modifier_2:0 "Avec un peu d'aide administrative, il est étonnant de voir combien nos voisins fées peuvent produire davantage. Maintenant, si seulement elles n'étaient pas si capricieuses et obstinées..."
   fey_court_unaligned_fey_power_2_tooltip:0 "§GAugmenter§! l'§Yefficacité commerciale§! et l'§Yefficacité de production§!."
   fey_court_unaligned_fey_power_3:0 "Faveurs des Sans-Cour"
   desc_fey_court_unaligned_fey_power_3:0 ""
   fey_court_unaligned_modifier_3:0 "Faveur des Sans-Cour"
   desc_fey_court_unaligned_modifier_3:0 "Nos druides ont travaillé dur pour attirer l'attention des archifées Sans-Cour. Leur faveur est une grande bénédiction."
   fey_court_unaligned_fey_power_3_tooltip:0 "§GAugmenter§! le §Ygain de pouvoir ecclésiastique§! et §Gaméliorer§! les §Yrelations avec la Cour Seelie§! et les §Yrelations avec la Cour Unseelie§!."
   fey_court_stolen_heir_tooltip:0 "La Cour Seelie exige que votre héritier §Y[Root.Heir.GetName] rejoigne leur cour !§! Elles promettent de le rendre « après qu'il ait appris ce qu'est le plaisir »."
   fey_court.0.t:0 "Événement modèle Cour des Fées 2.0"
   fey_court.0.d:0 "La Cour Seelie est [Root.SeelieCourtRelationsLoc].\n\nLa Cour Unseelie est [Root.UnseelieCourtRelationsLoc]"
   fey_court.0.a:0 "Exemple favoriser la Cour Seelie"
   fey_court.0.b:0 "Exemple favoriser la Cour Unseelie"
   fey_court.0.c:0 "Exemple favoriser les Fées indépendantes"
   fey_court.1.t:0 "La Cour Seelie Éternellement Joyeuse"
   fey_court.1.d:0 "Dirigée par la Reine des Fées, la Cour Seelie est un lieu où chaque instant de vie devrait être célébré. C'est un lieu de réjouissances, de célébrations et de festivals constants, où les farces et les plaisanteries abondent et où les commérages sont toujours croustillants et scandaleux. En vérité, peu de lieux à Halann, et encore moins dans les Bois-Profonds, peuvent se vanter de telles légèretés.\n\nPourtant, malgré leur disposition joviale, les fées de la Cour Seelie sont loin d'être d'inoffensifs fêtards. Les réputations, la dignité et bien plus encore sont des cibles légitimes pour les Seelie si nous leur déplaisons. C'est pourquoi il a toujours été avantageux pour ceux de [Root.GetName] de maintenir une relation saine, sinon cordiale, avec les Seelie. Peut-être est-ce le bon moment pour une démonstration de bonne foi festive ?"
   fey_court.1.a:0 "Fournir des serviteurs et des intendants pour approvisionner la prochaine fête."
   fey_court.1.b:0 "[Root.Monarch.GetName] jouera le rôle du bouffon à la prochaine fête..."
   fey_court.1.b.tt:0 "Les choses que je fais pour [Root.GetName]...\n"
   fey_court.1.c:0 "Que [Root.Capital.GetCapitalName] accueille le prochain gala !"
   fey_court.1.c.tt:0 "Et nous venons juste de finir de nettoyer après le dernier...\n"
   fey_court.1.e:0 "Nous pouvons peut-être nous passer des festivités pour l'instant."
   fey_court.2.t:0 "La Cour Unseelie Éternelle"
   fey_court.2.d:0 "Dirigée par le Roi des Ténèbres, la Cour Unseelie est un lieu où chaque instant de vie est âprement disputé. Là, les forts osent avancer et dépasser leurs anciennes limites tandis que les faibles sont mis au défi de mériter leur prochain souffle. Retenue et force doivent être démontrées face à des épreuves tant physiques qu'émotionnelles. Ceux qui se montrent à la hauteur gagnent la faveur du Roi. Ceux qui échouent sont rejetés.\n\nAutant dire que les fées Unseelie ne sont pas à irriter. La plupart de leurs adeptes peinent à satisfaire les exigences éprouvantes du Roi. La plupart des mortels échoueraient même à lutter. Pour cette raison, et d'autres, il a toujours été avantageux pour ceux de [Root.GetName] de maintenir une relation saine, sinon cordiale, avec les Unseelie. Peut-être est-ce le bon moment pour une démonstration de courage et de détermination ?"
   fey_court.2.a:0 "Endurer l'Épreuve des Épines."
   fey_court.2.a.tt:0 "[Root.Monarch.GetName] endurera une série d'humiliations comme test d'honneur et de retenue.\n"
   fey_court.2.b:0 "Fournir un combattant pour un prochain tournoi de la Cour."
   fey_court.2.c:0 "Endurer l'Interrogatoire."
   fey_court.2.c.tt:0 "Le caractère même de [Root.Monarch.GetName] sera mis en question dans une bataille de volonté.\n"
   fey_court.2.e:0 "Peut-être pouvons-nous éviter les épreuves aujourd'hui..."
   fey_court.3.t:0 "Les Fées des Bois-Profonds"
   fey_court.3.d:0 "Satyres et dryades. Dobies et boggles. Sylvains et pixies. Ce ne sont là que quelques-unes des innombrables fées qui vivent dans ces forêts. Elles sont de toutes formes, tailles et couleurs. Certaines sont courantes, préférant le confort de nos foyers, avec ou sans invitation. D'autres sont des vues rares, favorisant la tranquillité isolée des bosquets inviolés. Toutes, cependant, sont nos voisines.\n\nEt ce sont des voisines capricieuses, les fées. Il n'y a pas de culture partagée entre elles. Pas de pratiques ou de croyances communes. Apparemment, chacune a sa propre façon de vivre sa vie. C'est une tâche sans fin d'apprentissage et d'adaptation. Heureusement, nous sommes devenus perspicaces pour deviner les besoins et les désirs de nos voisines fées. Peut-être est-ce le moment de montrer cette perspicacité et de gagner quelques faveurs ?"
   fey_court.3.a:0 "Distribuer de la nourriture, des cadeaux et autres gentillesses."
   fey_court.3.b:0 "Résoudre quelques disputes entre fées locales."
   fey_court.3.c:0 "Permettre qu'une partie des terres de [Root.Capital.GetCapitalName] soit récupérée pour un établissement de fées."
   fey_court.3.e:0 "Laissons nos voisines fées tranquilles pour l'instant..."
   fey_court.4.t:0 "Demander un Jubilé Frupticieux"
   fey_court.4.d:0 "Le Jubilé Frupticieux n'est pas tant un événement qu'une expérience. Chaque nuit et chaque jour, les fées Seelie s'emploient à créer un nouveau délice. L'une pourrait organiser une fête. Une autre pourrait cuire un gâteau. Et d'autres pourraient simplement décider de vous complimenter sur votre choix de tenue du jour. Quelle que soit la méthode, le résultat est toujours le même : mettre un sourire sur le visage de tous.\n\nSi [Root.Monarch.GetTitle] le souhaite, nous pourrions demander à nos contacts dans la Cour Seelie une telle célébration."
   fey_court.4.a:0 "Oui, commençons ce carnaval de réjouissances constantes !"
   fey_court.4.b:0 "Non, point besoin de nous épuiser en fêtes."
   fey_court.5.t:0 "Employer un Tulmun Retors"
   fey_court.5.d:0 "On ne sait pas si ces fées rondelettes ressemblant vaguement à des scarabées ont été nommées d'après le poste de cour qu'elles occupent si souvent, ou si le poste a été nommé d'après elles. Ce qui est certain, c'est qu'il y en a peu, fées ou autres, qui soient aussi capables de vous flatter puis de vous exaspérer en un seul souffle. Un atout précieux, quoique parfois irritant, pour [Root.GetName]. Tout ce que nous avons à faire, c'est d'appeler quelques faveurs auprès de la Cour et nous pourrions trouver un tulmun dans notre propre cour... pour un temps."
   fey_court.5.a:0 "Un ajout parfait à notre corps diplomatique."
   fey_court.5.b:0 "Je préférerais ne plus entendre celle sur ma mère..."
   fey_court.6.t:0 "Prendre le poste de Grand Chapelier"
   fey_court.6.d:0 "La Cour Seelie, comme la nôtre, est définie par une série de rôles et de responsabilités. Cependant, comme il sied à un tel lieu frénétique, la plupart des postes tendent à être en constante fluctuation. Un jour il peut y avoir un échanson ou un héraut ou un majordome, le lendemain les Seelie vous demanderont de quoi vous parlez. Il y a quelques exceptions à cela, cependant. Par exemple, le Maître de la Chasse est toujours l'archifée connue sous le nom de Seigneur des Bêtes. Une autre est le Chapelier de Grande Importance ou simplement, le Grand Chapelier.\n\nLe Grand Chapelier est... eh bien, nous ne savons pas exactement ce que c'est. Ou du moins quel est le but du poste, si ce n'est qu'il n'a pas grand-chose à voir avec les chapeaux et qu'il est curieusement réservé aux mortels. Heureusement, nous n'avons pas besoin de le savoir, semble-t-il. Tant que nous détenons cette « position précieusement prestigieuse », nous bénéficierons d'un certain nombre d'avantages des Seelie. Du moins jusqu'à ce qu'elles se lassent de nous."
   fey_court.6.a:0 "Nous assumerons humblement ce rôle sacré de chapelier."
   fey_court.6.b:0 "Mieux vaut laisser le poste vacant un peu plus longtemps."
   fey_court.7.t:0 "Accéder à l'Épreuve"
   fey_court.7.d:0 "Le Roi des Ténèbres attend de ses sujets qu'ils s'aiguisent comme une lame convenable. Chaque sujet doit s'affronter à la lutte et en émerger plus tranchant qu'avant, plus fort, plus mortel. Avec le temps, ceux qui ont du potentiel se voient accorder la chance d'entrer dans « l'Épreuve », une entité labyrinthique en perpétuel changement qui chevauche notre plan et le Royaume Féerique. Un lieu éprouvant : ceux qui surmontent l'Épreuve en ressortent plus grands qu'ils n'ont jamais été.\n\nBien que les fées Unseelie doivent mériter leur passage, il est possible pour nous mortels d'obtenir l'accès avec les bons rituels et faveurs. Ce faisant, nous pourrons mieux entraîner nos soldats et les rendre agréables à l'image du Roi lui-même."
   fey_court.7.a:0 "Nos troupes prouveront leur valeur."
   fey_court.7.b:0 "Nul besoin de soumettre notre peuple à l'Épreuve."
   fey_court.8.t:0 "Invoquer un Gardien du Serment d'Écorce-de-Fer"
   fey_court.8.d:0 "Dans de nombreux accords entre mortels, il y a souvent une tierce partie présente pour s'assurer que les termes convenus sont respectés et qu'il n'y a pas de magouilles en coulisse. Les Unseelie ont à leur service un groupe de fées avec un but similaire : les Gardiens du Serment d'Écorce-de-Fer. Petites, silencieuses, à la peau grise, ces fées ont la capacité particulière de détecter quand les accords auxquels elles ont assisté sont violés. Quelque chose dont les Unseelie tirent grand avantage.\n\nDonner et prendre quelques faveurs, et quelques-uns de ces Gardiens du Serment pourraient se trouver présents la prochaine fois que nous rencontrerons nos vassaux."
   fey_court.8.a:0 "Un peu d'assurance supplémentaire pour garder nos vassaux dans le rang ne ferait pas de mal."
   fey_court.8.b:0 "Non, point besoin."
   fey_court.9.t:0 "Assumer le rôle de Dourach"
   fey_court.9.d:0 "Comme toute cour mortelle, la Cour Unseelie est définie par une série de rôles et de responsabilités, tous établis conformément à la volonté du Roi des Ténèbres. Unique parmi ces rôles est la position de Dourach. Réservée uniquement aux mortels jugés dignes par la Cour, les Dourachs détiennent l'autorité reconnue des Unseelie dans le Plan Matériel.\n\nPour un temps, nous serons vus comme arbitres de la volonté de la Cour dans notre domaine. Un avantage pour la légitimité de notre règne. Bien sûr, assumer un tel rôle nous laissera avec de hautes attentes de la part des Unseelie et de leur roi."
   fey_court.9.a:0 "Par la volonté du Roi et de sa cour, nous prenons le manteau de Dourach."
   fey_court.9.b:0 "Évitons les attentes non désirées pour l'instant."
   fey_court.10.t:0 "Sonner le Cor Sauvage"
   fey_court.10.d:0 "Les Bois-Profonds sont un lieu sombre et dangereux. Elfes, gobelins, orques et fées sont tous la proie de sa nature. Pourtant, le monde extérieur est tout aussi dangereux, sinon plus. Des scélérats comme Castan Fléau-des-Bêtes l'ont prouvé. Des millénaires après sa mort, son nom suffit à mettre fin aux fêtes des satyres et à faire fuir les pixies parmi les roses.\n\nPour ces raisons vint le Cor Sauvage. Ce n'est pas tant une entité singulière qu'une promesse. Un vœu pour ceux de [Root.GetName] et les habitants fées de travailler ensemble pour une défense commune. L'appel n'est pas quelque chose à prendre à la légère car c'est une épreuve stressante pour beaucoup de fées de combattre. Mais, quand on appelle, elles répondront."
   fey_court.10.a:0 "Donnez l'ordre. Nous nous battons pour défendre notre foyer."
   fey_court.10.b:0 "Épargnons-leur les combats..."
   fey_court.11.t:0 "Organiser nos voisins fées"
   fey_court.11.d:0 "Malgré ce que ceux de l'extérieur des Bois-Profonds pourraient penser, nos voisines fées ne sont pas toutes des créatures irrationnelles ou chaotiques. En effet, beaucoup ont développé leurs propres sociétés. Les pixies, par exemple, ont leurs clans floraux. Et les satyres ont leurs terrains de fête plutôt infâmes. Certes, les fées tendent à préférer des vies plus simples. La monnaie est une rareté si elle existe. L'agriculture et autres métiers se font à la main comme ils l'ont été depuis des milliers d'années.\n\nCela leur convient assez bien, mais c'est devenu de plus en plus inefficace dans ce monde changeant où nous vivons. Heureusement, nous avons une chance d'influencer nos voisines pour qu'elles adoptent des techniques plus modernes. Il nous suffit de donner une petite impulsion et d'appeler quelques faveurs, et nous devrions voir des gains de productivité. Du moins tant que les fées sont disposées à écouter."
   fey_court.11.a:0 "Cela les aidera, elles et nous."
   fey_court.11.b:0 "Mieux vaut ne pas les déranger pour l'instant."
   fey_court.12.t:0 "Faveurs des Sans-Cour"
   fey_court.12.d:0 "Bien qu'un certain nombre d'archifées s'alignent sur la Cour Seelie ou Unseelie, toutes ne le font pas. Du bienveillant Seigneur Floraison à la mystérieuse Dame Émeraude, ces archifées « sans-cour » et leurs agendas ne font qu'ajouter au jeu chaotique d'intrigues qui se déroule dans le Royaume Féerique.\n\nLa plupart du temps, [Root.GetName] est largement libre de l'influence de ces archifées. Mais parfois, au bon moment et au bon endroit, nous pouvons tenter d'invoquer leur aide comme nous le ferions avec les Cours. De tels rituels peuvent être éprouvants pour notre peuple et les fées autour de nous, mais la récompense peut être la subtile faveur d'une des Sans-Cour."
   fey_court.12.a:0 "Rassemblez les druides. Voyons qui nous sourit."
   fey_court.12.b:0 "Mieux vaut ne pas attirer d'attention non désirée."
   fey_court.13.t:0 "Présents du monde sauvage"
   fey_court.13.d:0 "Notre [Root.Monarch.GetTitle] s'est vu présenter un dilemme aussi vieux que notre présence dans la forêt. Devant nous sont présentés deux cadeaux des Cours Seelie et Unseelie. Les Seelie ont offert un présent de délicieuses sucreries et friandises, sûres d'égayer toute réunion diplomatique. Une note au doux parfum dit : « Aucune condition attachée, promis ! »\n\nLes Unseelie ont offert un présent de fer, de bronze et de cerfs de guerre, sûrs d'être précieux pour notre armée. « Nous n'attendons rien en retour. C'est simplement dans l'esprit du don », affirme une lettre nette et propre.\n\nBien sûr, malgré leurs affirmations, le choix n'est pas si simple. Ni l'un ni l'autre n'attend quoi que ce soit, certes, mais les deux seraient irrités si nous acceptions le cadeau de l'autre. Nous devrions réfléchir soigneusement à quelle cour nous aimerions nous aligner, ou alternativement, refuser les deux cadeaux et rester neutres."
   fey_court.13.a:0 "Merci pour les bonbons ! Ils sont délicieux !"
   fey_court.13.b:0 "Notre gratitude pour les cerfs de guerre, nous nous assurerons qu'ils soient bien utilisés."
   fey_court.13.c:0 "Non merci. Nous ne voulons pas nous mettre au milieu de cela."
   fey_court.13.c.tooltip:0 "Décliner poliment."
   fey_court.14.t:0 "Questions de loyauté"
   fey_court.14.d:0 "L'histoire ne compte que quelques privilégiés dirigeants qui ont réussi la tâche contradictoire, alambiquée et apparemment impossible d'apaiser à la fois les Cours Seelie et Unseelie. Et pourtant, après des années de diplomatie rusée, vous êtes maintenant membre de ce club exclusif. Accomplir cette tâche n'a pas été facile, et vous avez appris à porter le masque à la fois d'un allié insouciant de la Reine Seelie et d'un serviteur loyal de la Cour Unseelie. Un moment vous riez et festoyez à une fête Seelie, et l'instant d'après vous vous battez avec une fée Unseelie au visage de pierre.\n\nMalheureusement, quelque part vous avez dû laisser glisser ce masque.\n\nLes deux cours vous ont invité dans le même bosquet juste à l'extérieur de la capitale, au même moment exact. Les deux ont obstinément refusé de changer l'heure ou le lieu de la réunion, ou d'expliquer ce que vous ferez dans ce bosquet. Ni l'une ni l'autre n'a reconnu l'invitation de l'autre, mais le message tacite est clair : vous devez choisir un camp. Accepter une invitation et refuser l'autre serait un signal clair de vos loyautés, ou d'un autre côté vous pourriez accepter les deux et continuer à marcher sur la corde raide."
   fey_court.14.a:0 "Accepter les Unseelie, rejeter les Seelie"
   fey_court.14.b:0 "Accepter les Seelie, rejeter les Unseelie"
   fey_court.14.c:0 "Tenter de décliner poliment les deux."
   fey_court.15.t:0 "Farces Seelie"
   fey_court.15.d:0 "Le palais du gouverneur de [fey_court_seelie_pranks_target.GetName] est un grand bâtiment de pierre au centre du plus grand village de la région. Depuis cette structure imposante, le gouverneur gère le budget, signe des décrets et fait appliquer les lois de la nation. Ou du moins, c'est ce que le gouverneur ferait normalement s'il n'y avait pas de paperasserie. Pas le genre figuratif. De la paperasserie littérale. Un ruban rouge littéral. En ce moment, derrière un grand bureau en chêne sombre ne siège pas le gouverneur de [fey_court_seelie_pranks_target.GetName], mais un petit rouleau de ruban rouge. Sur le bureau se trouve une lettre portant le sceau de la Cour Seelie, qui dit :\n\n« Désolés pour notre petit accident ! Nous allons immédiatement rendre les poulets à leurs propriétaires, aucune paperasse requise ! Après tout, nous ne voudrions pas que vous soyez empêtrés dans... du ruban rouge ! »\n\nQuand un mage est entré dans le bureau pour examiner la scène, nos craintes ont été rapidement confirmées. Il a immédiatement senti une puissante magie de transmutation émanant du ruban. Avec le gouverneur « empaqueté » dans son bureau, l'administration locale est tombée dans le chaos, et des pillards ont déjà profité de l'occasion. Nous pourrions envoyer un gouverneur de remplacement, ce qui calmerait la situation mais insulterait les fées, ou simplement les laisser profiter de leur farce."
   fey_court.15.a:0 "Ha ! C'est hilarant ! Vous pouvez le retransformer maintenant... Vous allez le retransformer, n'est-ce pas ?"
   fey_court.15.b:0 "Envoyez un remplaçant, nous devons rétablir l'ordre."
   fey_court_rampant_seelie_pranks:0 "Farces Seelie déchaînées"
   desc_fey_court_rampant_seelie_pranks:0 "Les farces Seelie ont été plus agaçantes que d'habitude, au grand dam des habitants."
   fey_court_peace_and_quiet:0 "Paix et tranquillité"
   desc_fey_court_peace_and_quiet:0 "Nous avons mis un frein aux farces Seelie. Certaines fées en sont assez vexées, mais au moins les habitants peuvent profiter de quelque calme."
   fey_court.16.t:0 "La Satyr-ie"
   fey_court.16.d:0 "Dans tout Cannor, s'il y a une chose sur laquelle on peut s'accorder, c'est de ne jamais accepter aveuglément une fête de satyres. Il y a peu de choses dont on puisse être témoin qui soient aussi viles et dépravées que les satyres quand elles se lâchent. Heureusement, de telles affaires sont généralement des événements locaux et perturbent rarement la vie à travers [Root.GetName].\n\nC'est pour cette raison que les récentes rumeurs selon lesquelles les diverses communautés de satyres de [Root.GetName] préparent quelque chose de « spécial » ont causé quelque alarme parmi ceux proches de [Root.Monarch.GetTitle]. Ces rumeurs disent que certains au sein de la Cour Seelie elle-même parrainent quelque chose appelé « la Satyr-ie », une tempête volatile de beuveries, de festins et de relations intimes improvisées.\n\nPour faire simple, ce sera une fête mémorable, en supposant que quiconque *puisse* s'en souvenir. Cela nous laissera également avec un désordre qui pourrait nous prendre des années à nettoyer. Si cela en vaut la peine est la question."
   fey_court.16.a:0 "Faisons la fête comme en 1444 !"
   fey_court.16.b:0 "Non. Cela n'arrivera pas."
   fey_court_raging_satyr_parties:0 "La Satyr-ie"
   desc_fey_court_raging_satyr_parties:0 "Le fait que [Root.GetName] soit reconnu comme l'un des meilleurs endroits pour faire la fête malgré le fait que nous ne nous souvenions de rien de ce qui s'est passé durant la Satyr-ie en dit long."
   fey_court.17.t:0 "Problèmes de pixies"
   fey_court.17.d:0 "Ailées, minuscules, bien intentionnées quoique crédules, les pixies comptent parmi les fées les plus nombreuses à habiter ces bois. C'est leur crédulité qui attire généralement les pixies dans les ennuis, et comme les événements récents le montrent, les pixies de [fey_court_pixie_problems_province.GetName] se sont bel et bien attiré des ennuis.\n\nNous ne savons pas exactement comment elles ont réussi à s'attirer l'ire des Seelie §Yet§! des Unseelie, mais qu'il suffise de dire que les pixies sont plutôt effrayées maintenant. Connaissant notre habileté à gérer ces situations, elles sont venues nous demander de démêler cette affaire."
   fey_court.17.a:0 "Très bien. Montons les Cours l'une contre l'autre."
   fey_court.17.b:0 "Se porter garantes des pixies auprès des Seelie."
   fey_court.17.c:0 "Plaider en faveur des pixies auprès des Unseelie."
   fey_court_protected_pixies:0 "Pixies protégées"
   desc_fey_court_protected_pixies:0 "Au grand dam des Cours Féeriques, nous avons protégé les pixies de ces terres. En reconnaissance, elles ont travaillé dur pour aider les villageois locaux."
   fey_court.18.t:0 "Un sylvain éprouvant"
   fey_court.18.d:0 "De toutes les fées de nos bois, les sylvains, des arbres amenés à la conscience par la magie féerique, sont peut-être le plus grand fléau du bâtisseur. On ne sait jamais quand ni où un sylvain pourrait « naître ». Peut-être au milieu d'un bosquet jamais vu par des yeux mortels. Ou, moins commodément, près d'une construction récente à [fey_court_trying_treant_province.GetName].\n\nCe qui était autrefois un nouveau développement prometteur est maintenant au point mort. Les rapports décrivent le sylvain naissant renversant à plusieurs reprises les cadres de bâtiments et arrachant les fondations alors qu'il se déplace et trouve des endroits idéaux pour enfoncer ses racines. Pire encore, il y a même une possibilité que le sylvain se déplace vers des établissements déjà établis. Et, comme le veut la tradition, c'est au [Root.Monarch.GetTitle] de rendre un verdict."
   fey_court.18.a:0 "Renforcer la construction. Un peu plus de coût en échange d'un sylvain heureux."
   fey_court.18.b:0 "Laisser le sylvain s'installer avant de continuer."
   fey_court.18.c:0 "L'abattre."
   fey_court_trying_treant:0 "Sylvain éprouvant"
   desc_fey_court_trying_treant:0 "Les bâtisseurs trouvent plutôt difficile de faire leur travail à cause des déplacements d'un sylvain naissant."
   fey_court.19.t:0 "Domaines des dryades"
   fey_court.19.d:0 "Des siècles de vie dans ces bois nous ont enseigné de nombreuses leçons. L'une des plus pertinentes est d'être attentif aux dryades et à leurs domaines. Comme nos ancêtres l'ont douloureusement appris, ces humanoïdes féminines élancées ressemblant à des plantes préfèrent passer leur temps à entretenir la nature dans l'isolement. « Préfèrent » étant une façon diplomatique de le dire. Ceux qui entrent dans ces « domaines » sans y être invités reviennent rarement.\n\nCe ne serait pas le plus gros problème si ces domaines et leurs frontières n'avaient pas tendance à dériver. Et comme il se trouve, un certain nombre de villages à [fey_court_dryad_domain_province.GetName] « empiètent » maintenant sur un domaine de dryade. Si le domaine restera en place ou non est inconnu, mais le bien-être de ces villageois est maintenant certainement menacé. Si nous agissons, nous devrons soit abandonner quelque chose, soit irriter ces puissantes fées."
   fey_court.19.a:0 "Mieux vaut laisser les dryades suivre leur cours."
   fey_court.19.b:0 "Peut-être que les druides locaux peuvent trouver une solution ?"
   fey_court.19.c:0 "Dicter la ligne du domaine, par la force si nécessaire."
   fey_court.20.t:0 "Terriers de boggles"
   fey_court.20.d:0 "Les boggles, des créatures brunes et poilues qui ne dépassent guère les genoux et ont une terrible propension à creuser des terriers près des fermes et des marchés pour grignoter les produits et autres marchandises. Pour cette raison, ils sont considérés comme de simples nuisibles par le fermier ordinaire. Surtout pour ceux de [fey_court_boggle_burrows_province.GetName], où les boggles semblent être plus actifs que d'habitude.\n\nCependant, bien qu'ils ne soient pas particulièrement intelligents, il est possible de négocier avec les boggles avec beaucoup de patience et de persévérance. Cela conduirait à un budget administratif plus élevé, mais nous pourrions convaincre ces petites fées de concentrer leurs habitudes de grignotage sur les mauvaises herbes et les nuisibles plus dangereux. Ou nous pourrions simplement permettre aux fermiers de s'occuper des boggles eux-mêmes.\n\nBien que pas les créatures les plus intelligentes, ils sont également conscients et peuvent être convaincus de conclure un accord. Les fermiers et marchands veulent que vous fassiez quelque chose."
   fey_court.20.a:0 "Laissez les boggles tranquilles."
   fey_court.20.b:0 "Allouer un budget pour négocier avec les boggles."
   fey_court.20.c:0 "Donner aux fermiers la permission de régler le problème."
   fey_court_boggle_burrows:0 "Terriers de boggles"
   desc_fey_court_boggle_burrows:0 "Les fermiers de cette terre ont trouvé leurs récoltes compromises par les boggles locaux."
   fey_court_boggle_negotations:0 "Négociations avec les boggles"
   desc_fey_court_boggle_negotations:0 "Avec un peu d'encouragement, les boggles de cette terre agissent comme répulsifs de mauvaises herbes et de nuisibles."
   fey_court.21.t:0 "Sanctuaires des sylphes"
   fey_court.21.d:0 "Petites créatures vaporeuses de toutes sortes de couleurs, les sylphes sont bien connues pour leur amour du voyage. Cependant, leur nature fragile signifie qu'elles doivent souvent se reposer entre leurs pérégrinations dans divers « sanctuaires ». Des sanctuaires qui ont été emportés par des tempêtes récentes dans notre royaume.\n\nN'ayant aucun moyen organisé de reconstruire ce qui a été perdu, les sylphes se sont tournées vers nous, ou « les bâtisseurs » selon leurs propres termes. En tant que simples voyageuses, elles n'ont rien à offrir en retour que de la bonne volonté et des remerciements. Si cela suffit pour que le trésor les aide dépend de nous."
   fey_court.21.a:0 "Qu'il y ait un abri pour ces fées errantes."
   fey_court.21.b:0 "Rien ne peut être épargné, hélas."
   fey_court.21.b.tt:0 "Les sylphes comprennent, mais sont affligées..."
   fey_court.22.t:0 "L'Échange des Présents"
   fey_court.22.d:0 "Les Fées et les Elfes Sylvestres des Bois-Profonds, malgré toutes leurs différences, ont toujours maintenu des relations amicales entre eux. Eh bien, peut-être qu'« amicales » est un peu exagéré, mais les désaccords ne se sont jamais transformés en guerre totale. Une raison de ces relations relativement amicales est une tradition connue sous le nom de « l'Échange des Présents ».\n\nL'Échange des Présents n'a pas de date fixée, et commence souvent spontanément chaque fois qu'un présent suffisamment important est donné. Un elfe peut offrir un arc magistralement fabriqué, un dobie peut laisser le double du loyer normal sur la table, ou une fée Unseelie peut tuer un loup qui s'est servi dans le troupeau du village. Il y a autant de présents possibles qu'il y a de fées dans la forêt, mais quel que soit le présent donné, il est attendu que vous en donniez un en retour.\n\nUne fois que quelqu'un est vu donnant un présent, il est convenable de donner ses propres présents à ses amis, sa famille et ses voisins, et en quelques jours, tout le village célèbre l'Échange des Présents. Une telle situation s'est produite à [Root.Capital.GetCapitalName], et des présents affluent déjà dans le bâtiment de la capitale. Tout le monde anticipe le présent que [Root.Monarch.GetName] donnera en retour."
   fey_court.22.a:0 "Merci pour ces fourrures ! Un festival est prévu pour demain soir, tout le monde est invité !"
   fey_court.22.b:0 "Merci pour ces présents ! Nous vous donnerons le meilleur présent possible en retour : une réduction d'impôts !"
   fey_court.22.c:0 "Appelons quelques faveurs auprès des Cours, nous leur montrerons une fête qu'elles n'oublieront jamais"
   fey_court.22.e:0 "Merci pour ces présents !"
   fey_court.23.t:0 "Fées dissidentes"
   fey_court.23.d:0 "S'empêtrer dans les affaires féeriques est une situation malheureuse mais courante pour [Root.Monarch.GetTitle]. Et aujourd'hui, une telle situation a décidé de montrer le bout de son nez. Un message Unseelie vient d'arriver demandant en des termes sans équivoque la remise immédiate des « ingrats impénitents et indolents résidant dans votre domaine ».\n\nUn mal de tête s'installe rapidement. Vous n'êtes pas sûr de ce que ces fées ont fait, ou plus probablement pas fait, mais vous savez que cela ne sera pas une affaire simple. L'expérience passée vous l'a appris, à vous et vos prédécesseurs. Vos troupes devront aller traquer les fées en question. Pendant ce temps, vous devrez gérer les plaintes qui s'ensuivront.\n\nBien sûr, vous pourriez simplement ignorer le message. Quelque chose que vos voisines fées ne manqueraient pas de célébrer, au prix de la colère Unseelie."
   fey_court.23.a:0 "Capturer et livrer les « ingrats ». Mieux vaut gagner la faveur des Unseelie."
   fey_court.23.b:0 "Ignorer le message. Ce n'est pas notre problème."
   fey_court.24.t:0 "Plus forts, plus rapides, meilleurs"
   fey_court.24.d:0 "Les affaires des Cours Féeriques et de notre propre cour sont une chose entremêlée. Tandis que les courtisans et les membres de la cour se déplacent pour satisfaire la volonté de leur cour respective, les conséquences de leurs actions se répercutent inévitablement. C'est maintenant un tel moment si l'on en croit les généraux harassés devant [Root.Monarch.GetName].\n\nSelon eux, des changeling de la Cour Unseelie ont infiltré nos armées, se faisant passer pour nos instructeurs pour appliquer l'entraînement Unseelie à notre armée. Si l'expérience passée est une indication, c'est une façon détournée de répandre la volonté du Roi des Ténèbres.\n\nHeureusement, après quelques observations, nos généraux ont conclu que les exercices éprouvants sont plus efficaces que subversifs. Que nous devions permettre cela de continuer dépend de nous."
   fey_court.24.a:0 "Laissons-les servir leur Roi en nous servant."
   fey_court.24.b:0 "Prenons note des exercices avant de les expulser."
   fey_court_unseelie_higher_standards:0 "À la hauteur des standards Unseelie"
   desc_fey_court_unseelie_higher_standards:0 "Nos troupes sont poussées à leurs limites pour satisfaire aux normes strictes des Unseelie."
   fey_court.25.t:0 "Une question de force"
   fey_court.25.d:0 "Les soldats que vous voyez devant vous ont réussi l'académie militaire de [Root.Capital.GetCapitalName] avec brio. Un soldat est un vétéran de cent campagnes, et l'un des épéistes les plus habiles de l'armée [Root.GetAdjective]. Le suivant est un guerrier musclé et gigantesque qui domine beaucoup de ses plus grands camarades d'armes. Un autre est l'un des meilleurs tireurs de [Root.GetName], et peut toucher sa cible de manière fiable à des centaines de mètres. Tous sont la crème de la crème, les meilleurs des meilleurs, et actuellement à l'infirmerie avec plusieurs membres disloqués.\n\n« À la guerre, rien de moins qu'une volonté de fer n'est acceptable. Vos soldats, si on peut les appeler ainsi, manquent clairement de cette volonté. »\n\nFaisant de votre mieux pour ignorer les gémissements des soldats blessés, vous tournez votre attention vers la fée Unseelie, celle-ci d'un violet vif, antennée et ondulant de muscles, qui les a mis là. La fée insectoïde propose d'aider à transformer votre « foule indisciplinée » en une « véritable force de combat ». Bien que l'entraînement fourni par la fée serait sans doute précieux, un rapide coup d'œil aux soldats blessés vous rappelle les coûts qu'un tel entraînement pourrait avoir."
   fey_court.25.a:0 "Bien sûr ! Vous êtes toujours bienvenue dans notre camp de guerre"
   fey_court.25.b:0 "Peut-être pourriez-vous aider à entraîner nos généraux à la place ?"
   fey_court.25.c:0 "Vous avez mis trois de nos meilleurs soldats hors de combat ! Sortez de notre camp !"
   fey_court_unseelie_iron_will:0 "Volonté de fer Unseelie"
   desc_fey_court_unseelie_iron_will:0 "La volonté de nos troupes est aussi forte que le fer grâce à l'influence des Unseelie. Coûteux mais efficace."
   fey_court.26.t:0 "Légèreté face à la guerre"
   fey_court.26.d:0 "La vie est une chose éphémère, surtout pendant la guerre à laquelle nous faisons face actuellement. Le fait lugubre est que tout le monde ne la verra pas jusqu'au bout. Et c'est ce fait lugubre qui amène la petite fée devant nous portant un message de la Cour Seelie.\n\nLe lisant devant [Root.Monarch.GetTitle], la fée piaille : « Durant les temps les plus sombres, nous de la Cour Seelie cherchons à faire briller la lumière de la joie encore plus fort. Cher [Root.Monarch.GetName], laissez le rire élever les esprits ! Réjouissez-vous capricieusement en festoyant ! Répondez à la méchanceté par la manie ! »\n\nÀ la fin de sa petite proclamation, la fée lève les yeux avec attente. Bien que ce ne soit pas évident pour les étrangers, le jeu de mots est une offre détournée d'aide de la part des Seelie. Pas au sens traditionnel, mais de l'aide néanmoins."
   fey_court.26.a:0 "Un peu de plaisir nous aiderait à traverser cela..."
   fey_court.26.b:0 "Pas de distractions. Nous avons une guerre à gagner."
   fey_court_seelie_levity_in_war:0 "Légèreté Seelie en temps de guerre"
   desc_fey_court_seelie_levity_in_war:0 "La souffrance et la misère de la guerre sont rendues un peu plus supportables grâce aux Seelie."
   fey_court.27.t:0 "Une invitation non désirée"
   fey_court.27.d:0 "Une créature à l'apparence vaguement humanoïde se tient devant vous, souriant doucement au milieu de votre salle du trône. Elle est grande, maigre même, avec des membres légèrement trop longs pour son corps et un visage qui brille comme de la pierre polie. Personne ne l'a vue entrer, et vous savez que personne ne la verra partir. Telle est la nature d'un Dapifer, un représentant de la Cour Seelie Éternellement Joyeuse. Plus pressant que son entrée est la raison de la présence du Dapifer.\n\nIl est venu offrir une place pour votre héritier en tant qu'invité d'honneur de la Cour, afin qu'il puisse apprendre les manières Seelie, apprendre ce que signifie vraiment apprécier et profiter de la vie. Le message sous-jacent reste non-dit ; la Cour est déçue de vous, et c'est leur façon d'y remédier. Notre réputation sera ternie si nous refusons une offre aussi rare et convoitée, mais votre héritier ne sera probablement plus jamais le même... et il faudra un certain temps avant qu'il ne revienne."
   fey_court.27.a:0 "Nous acceptons gracieusement..."
   fey_court.27.b:0 "Il vaut mieux que [Root.Heir.GetName] reste pour s'occuper de ses devoirs."
   fey_court.28.t:0 "La Fête de Bienvenue de Retour"
   fey_court.28.d:0 "Cela aurait dû être une journée normale à [Root.Capital.GetCapitalName], ou du moins aussi normale que les Bois-Profonds le permettent. Pourtant, cette petite bénédiction allait être refusée quand [Root.Monarch.GetName] entra dans la salle d'audience car, en franchissant le seuil, une pléthore de bruits obnubilants retentirent, annonçant une soudaine pluie de confettis aux couleurs vives.\n\n« Bienvenue à la Fête de Bienvenue de Retour Bienvenue ! » claironnèrent une douzaine de fées.\n\n[Root.Monarch.GetTitle] sursauta. « La quoi ? »\n\nUne question qui resta sans réponse et passa inaperçue tandis que le groupe de fées se dispersait avec empressement pour révéler une silhouette vaguement familière.\n\n« Bonjoouuur, mon cher géniteur ! Je suis de retour à la maison ! »\n\nLes yeux de [Root.Monarch.GetName] s'écarquillèrent : « Mon enfant ? »\n\n« Lui-même et le seeuuul ! » rit-il en s'avançant pour une étreinte.\n\nUne étreinte qui fut volontiers donnée, sous les « ohhh » attendris des fées présentes."
   fey_court.28.a:0 "Il y a tant de choses à se raconter !"
   fey_court.28.b:0 "Tu voudras rencontrer [Root.Heir.GetName]..."
   fey_court.29.t:0 "Calomnies salaces"
   fey_court.29.d:0 "« J'ai entendu dire qu'il *apprécie* la compagnie des satyres… »\n\n« Oh ? La rumeur disait que [Root.Monarch.GetTitle] avait un faible pour les dryades. »\n\n« Ma foi… cela expliquerait le prétendu incident des sous-vêtements. »\n\nEt ainsi de suite. Chuchotement indécent après chuchotement indécent. Sans doute ces faussetés grossières font-elles partie du « divertissement » des Seelie. Qu'elles soient si dégradantes trahit leur ire envers nous. Peut-être est-il temps d'un rapprochement ?\n\n« Avez-vous entendu que la mère de [Root.Monarch.GetName] est une- »\n\nOu peut-être pas."
   fey_court.29.a:0 "Soit, envoyez un émissaire applaudir la « farce » des Seelie."
   fey_court.29.b:0 "Envoyez un émissaire aux Seelie. Dites-leur : « La seule blague qui me fait rire est votre Cour. »"
   fey_court_seelie_anger_1:0 "Calomnies salaces"
   desc_fey_court_seelie_anger_1:0 "La réputation de notre [Root.Monarch.GetTitle] est sous constante calomnie à cause des murmures d'une Cour Seelie irritée."
   fey_court.30.t:0 "Voyous turbulents"
   fey_court.30.d:0 "Dernièrement, des fées alignées avec les Seelie ont commencé à parcourir la campagne plus que d'habitude, laissant des désastres d'ivrognes dans leur sillage. Par le passé, de tels événements auraient au moins suscité un certain souci des Seelie pour notre peuple, mais notre récent différend avec les Seelie a conduit à un mépris total de toute retenue passée.\n\nMaintenant, ces fées voyous ont jeté leur dévolu sur [fey_court_seelie_anger_target.GetName]. Les habitants, cependant, n'ont pas l'intention de laisser une autre série de tavernes et de campements être laissés dans un désordre désastreux. Ils cherchent à prendre les choses en main et à disperser les fêtards itinérants. Si nous les laissons faire, cela ne fera qu'envenimer davantage les relations. D'un autre côté, pouvons-nous vraiment nous permettre de nettoyer un autre désastre ?"
   fey_court.30.a:0 "Arrêtez les habitants. Que ce soit un geste de bonne volonté."
   fey_court.30.b:0 "Laissez les habitants agir et détournez le regard."
   fey_court.31.t:0 "Convocation sinistre"
   fey_court.31.d:0 "L'humeur de la cour à [Root.Capital.GetCapitalName] est sombre. Même les chuchotements les plus discrets ne percent pas le silence solennel qui a envahi la salle du trône. Dans les mains de [Root.Monarch.GetTitle] se trouve un morceau de parchemin noirci, un mauvais présage apporté par nos relations aigries avec les Unseelie. En posant les yeux sur le papier, le texte mystérieux se réorganise en une cursive nette. Une voix froide résonne de la lettre, brisant le silence :\n\n« Le Roi a jugé votre règne insuffisant et votre force défaillante. Fournissez une preuve de votre capacité ou nous la chercherons nous-mêmes. »\n\nEt puis, le silence revient. Les yeux de la cour se posent sur [Root.Monarch.GetName], implorant silencieusement sa réponse."
   fey_court.31.a:0 "[Root.Mil_Advisor.GetName]... Montrez-leur le métal dont nous sommes faits."
   fey_court.31.a.tt:0 "Les Unseelie prendront notre conseiller militaire, [Root.Mil_Advisor.GetName], comme membre de leur cour. Nous ne le reverrons presque certainement jamais.\n"
   fey_court.31.b:0 "Qu'ils viennent. Ils réaliseront leur erreur !"
   fey_court.31.b.tt:0 "Les Unseelie laisseront une marque sur notre peuple dans leur sombre quête.\n"
   fey_court.32.t:0 "Courant séditieux"
   fey_court.32.d:0 "La salle du conseil est vide à l'exception de [Root.Monarch.GetName]. La réunion prévue n'avait rien de très important, juste une partie du décorum général attendu entre [Root.Monarch.GetName] et diverses figures de proue de [Root.GetName]. Pourtant, ce n'est qu'après plus de quelques minutes pénibles que les divers notables de [Root.GetName] finissent par arriver. Ce ne sont que sourires tandis que des excuses sont présentées, mais l'affront ne passe pas inaperçu. Le peu d'égard pour le temps de [Root.Monarch.GetTitle] est délibéré. Même tandis que les diverses figures plaisantent et minaudent avec frivolité, une tension palpable monte. Elle s'accumule encore et encore jusqu'à ce qu'enfin, le sujet des devoirs soit abordé.\n\n« C'est une chose difficile », soupire une femme. « De suivre les divers devoirs de cour. »\n\n« En effet », acquiesce un autre invité.\n\n« Surtout quand on est tiraillé entre deux cours », ajoute un troisième.\n\nLa femme se tourne vers [Root.Monarch.GetName] et fait une petite révérence, presque dédaigneuse.\n\n« Excusez-nous encore, mon [Root.Monarch.GetTitle], pour notre retard. Les Unseelie et les besoins de leur monarque peuvent être assez exigeants. » Elle fait une pause, tapotant ses lèvres. « N'êtes-vous pas d'accord ? »\n\nEt voilà. La raison d'un tel comportement effronté : les Unseelie. Le poids de la tension fait taire la pièce tandis que ses occupants attendent la réponse de [Root.Monarch.GetTitle]."
   fey_court.32.a:0 "Bien sûr, c'est pour de bonnes raisons que les exigences du Roi doivent être satisfaites en premier."
   fey_court.32.b:0 "Exigeants ? Certainement, mais secondaires aux besoins de [Root.GetName]."
   fey_court_unseelie_anger_1:0 "Courants séditieux"
   desc_fey_court_unseelie_anger_1:0 "Les Unseelie et quelques sujets insensés peuvent s'incliner devant le Roi des Ténèbres, mais pas [Root.Monarch.GetTitle]. Qu'ils essaient de nous saper."
   fey_court.33.t:0 "Du sang pour le Bol de Sang"
   fey_court.33.d:0 "Les zites sont bien connus pour leur amour de la violence. Ces humanoïdes rouges rayonnants à la peau tannée recherchent régulièrement le conflit, soit parmi d'autres fées, soit, plus communément, entre eux. Leur faim constante de combat les a rendus chers au monarque austère de la Cour Unseelie, à notre grand dam.\n\nSans doute est-ce son courroux envers nous qui a conduit à la situation actuelle. Pourquoi sinon un groupe de zites préparerait-il l'un de leurs « Bols de Sang », un étrange sport plus préoccupé par l'écrasement de l'équipe adverse que par le fait de marquer ou de gagner le match, juste à l'extérieur de la capitale ?\n\nDéjà diverses fées alignées avec les Unseelie affluent pour regarder et même participer. Elles attendent avec impatience ce que l'« hôte » du Bol de Sang, nous, va aligner."
   fey_court.33.a:0 "Un entraîneur pour l'une des équipes."
   fey_court.33.a.tt:0 "Il s'avère qu'entraîner une équipe de Bol de Sang était un choix de carrière plus épanouissant que le généralat.\n"
   fey_court.33.b:0 "Alignez une équipe de nos meilleurs gars et filles."
   fey_court.33.b.tt:0 "Allez les chercher, équipe !\n"
   fey_court.33.c:0 "Absolument rien. Nous n'avons pas demandé cela."
   fey_court.33.c.tt:0 "Les foules Unseelie huent.\n"
   fey_court.34.t:0 "Frustrations temporelles"
   fey_court.34.d:0 "Le temps. Nous le mesurons, construisons nos vies autour de lui. Nous travaillons pour tirer le meilleur parti de chaque instant, car nous savons qu'à mesure que le temps avance, nous devons avancer aussi. Et à tout moment, nous ressentons la pression de rivaliser avec nos voisins et de chercher de nouveaux sommets.\n\nMais le temps est un concept [Root.Culture.GetName], pas un concept féerique. C'est quelque chose qu'elles laissent passer avec insouciance. Pourtant, nos frictions récentes et constantes avec nos fées locales, combinées à l'intégration quotidienne croissante entre [Root.GetName] et la vie féerique, ont rendu cela impossible. Et maintenant, à [fey_court_unaligned_fey_anger_target.GetName], la frustration des fées a atteint son paroxysme.\n\nElles ne se soucient pas des événements du monde ni de la façon dont il change. Au lieu de cela, elles souhaitent simplement vivre leur vie au jour le jour."
   fey_court.34.a:0 "Très bien, accordez-leur du temps."
   fey_court.34.b:0 "Non, elles doivent vivre avec leur temps."
   fey_court.35.t:0 "Sujets de beau temps"
   fey_court.35.d:0 "Selon le moment, les circonstances et à qui vous demandez, les fées qui résident dans notre domaine lui sont soumises ainsi qu'à son [Root.Monarch.GetName]. Une affirmation facile de loyauté peut être obtenue quand les Seelie ou les Unseelie font leurs pitreries. On peut en dire autant quand nos relations avec les diverses communautés féeriques sont saines.\n\nMalheureusement, avec les Cours silencieuses en ce moment et notre relation actuellement ténue, les fées de [fey_court_unaligned_fairweather_fey_target.GetName] ont décidé de nous ignorer complètement, nous et nos souhaits. Les laisser vaquer à leurs occupations rendra la gouvernance là-bas plus difficile, mais leur donnera une chance de réaliser que leur sort sera meilleur avec nous que sans. Surtout une fois que les Cours le remarqueront."
   fey_court.35.a:0 "Elles reviendront. Elles reviennent toujours."
   fey_court.35.b:0 "On ne peut pas partir quand les choses ne sont pas parfaites."
   fey_court.36.t:0 "Lois boueuses"
   fey_court.36.d:0 "Pour certains, la gouvernance féerique est un oxymore. Payer pour cueillir une pomme. Se laver plus d'une fois par mois. Porter des vêtements. Nous admettons pleinement que ce sont des concepts que les fées de nos terres ont du mal à suivre. Mais, avec un peu de persuasion et de bonne volonté, les pommes sont payées, les bains sont pris, et les vêtements sont (pour la plupart) portés.\n\nMalheureusement, la bonne volonté fait défaut ces derniers temps en raison des récents différends que nous avons eus avec les fées locales. En réponse, le respect de nos « lois boueuses » a chuté en conséquence. Des produits de qualité ont disparu sans être comptabilisés. Le musc des fées a élu domicile dans la capitale et d'autres villes. Et pas plus tard qu'hier, l'impudeur d'un satyre a maudit les yeux de notre [Root.Monarch.GetTitle]. Il faut faire quelque chose !"
   fey_court.36.a:0 "Quelques exceptions peuvent être accordées. Mais la règle de pudeur reste."
   fey_court.36.b:0 "Les règles sont les règles ! Maintenant, enfilez ce pantalon."
   fey_court.40.t:0 "Festival des fées"
   fey_court.40.d:0 "Le personnel d'entretien observe avec horreur la scène qui se déroule devant vous. Votre salle du trône est devenue une tornade déchaînée de chants, de danses et de jeux féeriques insensés. Des pixies filent entre les branches d'un sylvain éveillé, et quelques boggles voisins ont quitté leur terrier souterrain pour un nouveau à l'intérieur d'un gâteau au chocolat. Confettis et détritus jonchent le sol, et une bannière de soie violette suspendue au-dessus de votre trône dit :\n\n« Merci, [Root.Monarch.GetName] !! »\n\nPour quoi exactement les fées vous remercient n'est jamais expliqué. Mais tandis qu'une chenille de Papillon Géant se perche sur votre tête, il est clair que vous vous êtes attiré les faveurs des fées locales."
   fey_court.40.a:0 "De toute évidence, leur éloge de moi est mérité."
   fey_court.40.b:0 "S'il vous plaît, vous mettez du désordre partout."
   fey_court.41.t:0 "Dobies délicieux"
   fey_court.41.d:0 "Quand certains fermiers locaux ont remarqué pour la première fois les petits morceaux de nourriture manquants dans leurs entrepôts, beaucoup ont pensé que c'était simplement des adolescents qui s'amusaient, ou peut-être qu'ils surestimaient le remplissage de leurs réserves. Cependant, le bruit de pas feutrés dans la nuit et les fouilles étouffées sous leurs planchers ont bientôt révélé la vérité.\n\nLes dobies, de petites fées humanoïdes qui vivent à l'intérieur des maisons des autres, qu'ils le veuillent ou non, se sont répandus dans tout [Root.GetName]. Personne n'en a vraiment vu un, notez bien, mais quand les fermiers rentrent chez eux le soir, ils trouvent souvent une petite quantité de leur nourriture disparue et quelques pièces d'argent sur leur table. Alors que certains ont initialement posé des pièges et engagé des gardes, les dobies ont habilement évité toute tentative de capture. La plupart des propriétaires ont été forcés d'accepter leurs nouveaux locataires et collectent simplement leurs pièces chaque fois qu'ils rentrent d'une journée de travail."
   fey_court.41.a:0 "Nous pouvons taxer cela, non ?"
   fey_court.41.b:0 "Demandez-leur de laisser les fermiers tranquilles."
   fey_court.42.t:0 "Pixies plaisantes"
   fey_court.42.d:0 "Les pixies sont de petites fées au bon cœur connues pour venir en aide aux voyageurs dans le besoin et assister ceux qu'elles croient en péril. Cette attitude les attire souvent des ennuis avec des farceurs qui les tromperaient, mais pour les bons villageois de [Root.GetName], voir des pixies voler vers la ville est une vue bienvenue.\n\nQuand un clan de pixies entend parler d'une dévastation récente, elles sont promptes à mobiliser un effort de secours multi-clans, amenant des centaines de pixies pour aider aux réparations. Certes, les pixies n'ont aucune connaissance en construction et sont trop petites pour tenir un marteau ou contribuer matériellement à l'effort de reconstruction de manière significative, mais leur enthousiasme et leur gentillesse ont grandement amélioré le moral et l'humeur générale des habitants."
   fey_court.42.a:0 "Merci !"
   fey_court.42.b:0 "C'est gentil, mais laissez-nous nous en occuper."
   fey_court_pleasant_pixies:0 "Pixies plaisantes"
   desc_fey_court_pleasant_pixies:0 "À travers [Root.GetName], les pixies ont aidé le pays et notre peuple à se rétablir."
   fey_court.44.t:0 "Sauter de cour en cour"
   fey_court.44.d:0 "Pour les non-fées, assister à la Cour Seelie n'est pas une mince affaire, car les Seelie ne sont pas comme les mortels et mènent des vies qui peuvent être incompréhensibles ou déroutantes pour nos esprits. Elles s'immergent dans des concepts communs comme le plaisir, l'humour et la joie, certes, mais ce qu'elles considèrent comme drôle, humoristique et joyeux n'est pas toujours la même chose que ce qui est considéré sous un sens mortel de la bienséance ou de la réalité. Pourtant, ceux qui rejoignent les réjouissances des Seelie découvrent que quitter leurs salles tapageuses est une tâche bien plus difficile que de les rejoindre, car rejoindre la Cour, c'est promettre son cœur à la poursuite de la lumière de la vie. C'est une promesse qui ne se brise pas facilement ni sans conséquence.\n\nDes nouvelles nous sont parvenues qu'un des courtisans des réjouissances éternelles des Seelie cherche cette évasion pour trouver une vie, pour retourner sur le plan mortel et trouver une vie en dehors de la joie. Normalement, un tel choix ne serait pas accordé à un serviteur de la cour, mais, étant donné nos bonnes grâces avec les Seelie, nous pourrions potentiellement les convaincre de laisser ce fêtard prendre sa retraite."
   fey_court.44.a:0 "Un courtisan Seelie est toujours utile."
   fey_court.44.b:0 "Hélas, notre cour est pleine."
   fey_court.45.t:0 "Répandre la joie"
   fey_court.45.d:0 "Malgré tous les ennuis que leurs manières espiègles causent souvent, on ne peut nier que les Seelie savent transformer même les humeurs les plus aigres en délices. Comme il se trouve, quelques amis de la Cour Seelie ont préparé quelque chose de merveilleux pour un événement à venir. Les détails sont rares mais cela inclura certainement des lumières éclatantes et éblouissantes, de la musique improvisée avec des instruments à cuivre et à vent, et un gâteau avec une crème sucrée glacée à l'intérieur. Une telle fête serait certaine de remonter le moral de tous les participants, et avec quelques sollicitations et supplications, le gâteau et tout le reste pourraient être appréciés par notre peuple aussi."
   fey_court.45.a:0 "Mangeons du gâteau !"
   fey_court.45.b:0 "Peut-être la prochaine fois."
   fey_court.43.t:0 "La Foire de Jillyflop"
   fey_court.43.d:0 "À une occasion aléatoire, encore moins respectueuse des schémas de la réalité et du bon sens que d'habitude pour les Seelie, survient un grand échange connu sous le nom de Foire de Jillyflop. Des marchandises de toutes sortes, des artefacts étranges et des spectacles encore plus étranges sont fusionnés en un carnaval éclectique. Et, comme il se trouve, les fées organisant l'événement ont du mal à déterminer le lieu.\n\nIl doit être grand, spacieux et fongible. Les deux premiers sont assez faciles à trouver étant donné la nature du Royaume Féerique, mais la dernière partie a été plus un défi... Apparemment, les Seelie n'arrivent pas à déterminer quel genre de champignon devrait être présent. Il va sans dire qu'essayer d'expliquer le malentendu linguistique qui se produit ici ne mènerait personne nulle part. Au lieu de cela, nous pourrions simplement suggérer un site, même si ce n'est pas ce que les fées veulent réellement."
   fey_court.43.a:0 "[fey_court_seelie_jillyflop_target.GetName] est très fongible. Quel champignon ? Celui que vous voulez, bien sûr !"
   fey_court.43.b:0 "Quelque chose me dit que la foire n'aura pas lieu."
   fey_court.46.t:0 "Au service de la force"
   fey_court.46.d:0 "Les portes de la salle d'audience s'ouvrent en fracas, révélant un zite deux fois plus grand que les spectateurs surpris, énorme même pour sa race.\n\n« C'est une chose rare que mes maîtres reconnaissent la puissance de ceux en dehors de la Cour ! » cliquète bruyamment le Zite.\n\n[Root.Monarch.GetName] cligne lentement des yeux, le pétitionnaire qui parlait oublié.\n\nTotalement inconsciente, la fée Unseelie continue : « Je devais voir qui commandait un tel respect. Une telle force ! »\n\nLa fée allonge sa prononciation de force, la laissant rouler sur sa langue, savourant apparemment le mot. Puis, sans avertissement, le Zite s'agenouille.\n\n« Je m'offre à vous et renonce aux Unseelie, sachant que vous m'apporterez de plus grands ennemis que le Roi lui-même ! »\n\nIl vous regarde avec attente, sa peau rouge rayonnante brillant d'anticipation. En arrière-plan, un courtisan tousse."
   fey_court.46.a:0 "« Nous, euh, accueillons votre service. »"
   fey_court.46.b:0 "Escortez gentiment le Zite dehors, après avoir promis de considérer son offre."
   fey_court.47.t:0 "Aiguiser les tranchants"
   fey_court.47.d:0 "L'Épreuve, le parcours toujours changeant et apparemment sans limites où les Unseelie s'entraînent et se rassemblent, est un lieu de grand mystère. Y accéder nécessite la permission de ceux de haut rang à la cour Unseelie, qu'ils soient fées ou autres. Et même avec la permission, on n'obtient pas un accès total. Nul à part le Roi, le Héraut et le Marchand ne peut revendiquer ce privilège.\n\nPourtant, aujourd'hui, nous pourrions avoir la chance d'explorer un nouvel aspect de l'Épreuve. Ces mêmes hauts courtisans qui accordent l'accès sont en train d'explorer une aile nouvellement formée de la grande salle d'épreuves. Quelques-uns d'entre eux sont plutôt amicaux envers nous. Nous devrions insister fortement, mais nous pourrions réussir à les convaincre d'accorder à nos troupes la permission de les rejoindre."
   fey_court.47.a:0 "L'Épreuve est une pierre à aiguiser comme nulle autre. Faites-le."
   fey_court.47.b:0 "Nous ne devrions pas surjouer notre main."
   fey_court_unseelie_support:0 "Tranchants aiguisés"
   desc_fey_court_unseelie_support:0 "L'accès aux chambres d'élite de l'Épreuve Unseelie a aiguisé nos troupes à une efficacité meurtrière."
   fey_court.48.t:0 "L'Ombre du Roi"
   fey_court.48.d:0 "Des murmures suivent [Root.Monarch.GetTitle]. Pas des murmures hostiles, mais des murmures d'admiration et de crainte. Il est rare pour quelqu'un de gérer des relations aussi étroites avec les froides Unseelie. Habituellement, de tels résultats viennent au prix de la servitude ou du rabaissement, pourtant notre souverain se tient droit. Et maintenant, certains ont commencé à se demander si [Root.Monarch.GetName] n'est pas en fait l'Ombre du Roi, un avatar du souverain archifée des Unseelie.\n\nBien sûr, la proposition est absurde, mais il y a de la valeur à laisser de tels murmures persister sans être contestés. Voir ses sujets se tenir un peu plus droit en votre présence ne fait jamais de mal, après tout."
   fey_court.48.a:0 "Laissez-les être émerveillés un peu plus longtemps."
   fey_court.48.b:0 "Étouffez les rumeurs, de peur qu'une véritable Ombre n'apparaisse."
   fey_court.49.t:0 "Pris entre deux feux"
   fey_court.49.d:0 "Maintes et maintes fois, nous et nos ancêtres avons réussi à marcher sur le chemin étroit de l'équilibre des Cours Féeriques des Bois-Profonds. Oui, il y a eu parfois des faux pas. Mais, dans le grand ordre des choses, peu peuvent revendiquer le long exploit de maintenir cet acte comme nous de [Root.GetName].\n\nPeut-être est-ce pour cette raison que le chaos se déroulant devant [Root.Monarch.GetTitle] se produit. Peut-être que l'idée de réellement gérer un semblant d'ordre dans les Bois-Profonds était un pont trop loin. Mais était-ce une raison suffisante pour justifier les mots, les accusations et les divers projectiles mous lancés à travers la salle du trône par une pléthore de fées Seelie et Unseelie non invitées ?\n\nNon. Non, ce ne l'était pas.\n\nÀ un moment donné, cela devrait prendre fin, au moins pour aujourd'hui. La seule question était comment ?"
   fey_court.49.a:0 "Informer les Unseelie que le Roi des Ténèbres serait déçu de leur comportement."
   fey_court.49.b:0 "Rappeler aux Seelie combien leur conduite est inintéressante en ce moment."
   fey_court.49.c:0 "Descendre calmement du trône et poursuivre votre journée."
   fey_court.49.c.tt:0 "Parfois, ça n'en vaut tout simplement pas la peine.\n"

   fey_court.100.t:0 "Nouvelles de la Cour Seelie"
   fey_court.100.boon:0 "Depuis des années, la Cour Seelie est §MRavie§! de nous. Maintenant, des rapports indiquent que les fées Seelie se donnent du mal pour soutenir nos efforts à travers [Root.GetName]. Tant que les relations restent élevées, nous devrions nous attendre à une nouvelle normalité.\n\n(Si les relations tombent à un état inférieur pendant environ 2 ans, alors cette bénédiction prendra fin.)"
   fey_court.100.bane:0 "Depuis des années, la Cour Seelie est §RCourroucée§! envers nous. Maintenant, des rapports indiquent que les fées Seelie sabotent activement nos efforts à travers [Root.GetName]. Jusqu'à ce que les relations se normalisent, nous devrions nous attendre à une nouvelle normalité.\n\n(Si les relations s'élèvent à un état supérieur pendant environ 2 ans, alors ce fléau prendra fin.)"
   fey_court.100.neutral:0 "Nos relations avec la Cour Seelie se sont normalisées. Nous devrions nous attendre à un traitement plus neutre de nouveau."
   fey_court.100.a:0 "Joie jubilante !"
   fey_court.100.b:0 "Les bons moments sont terminés pour l'instant..."
   fey_court.100.c:0 "Voilà comment on retourne la situation !"
   fey_court.100.e:0 "Qu'elles soient rabat-joie."
   fey_court.100.f:0 "Dieu merci."
   fey_court.100.g:0 "Trouble-fêtes."
   fey_court.100.h:0 "Masquer tous les futurs événements de bénédiction/fléau de la Cour Seelie (donne quand même les modificateurs)"
   fey_court_seelie_boon:0 "Bénédictions de la Cour Seelie"
   desc_fey_court_seelie_boon:0 "Nos excellentes relations avec les Seelie nous ont accordé un certain nombre de bénédictions."
   fey_court_seelie_bane:0 "Fléaux de la Cour Seelie"
   desc_fey_court_seelie_bane:0 "Nos relations aigres avec les Seelie nous ont causé un certain nombre de fléaux."
   fey_court.101.t:0 "Masquer les événements de bénédiction/fléau de la Cour Seelie"
   fey_court.102.t:0 "Nouvelles de la Cour Unseelie"
   fey_court.102.boon:0 "Depuis des années, la Cour Unseelie est Ravie de nous. Maintenant, des rapports indiquent que les fées Unseelie se donnent du mal pour soutenir nos efforts à travers [Root.GetName]. Tant que les relations restent élevées, nous devrions nous attendre à une nouvelle normalité.\n\n(Si les relations tombent à un état inférieur pendant environ 2 ans, alors cette bénédiction prendra fin.)"
   fey_court.102.bane:0 "Depuis des années, la Cour Unseelie est Courroucée envers nous. Maintenant, des rapports indiquent que les fées Unseelie sabotent activement nos efforts à travers [Root.GetName]. Jusqu'à ce que les relations se normalisent, nous devrions nous attendre à une nouvelle normalité.\n\n(Si les relations s'élèvent à un état supérieur pendant environ 2 ans, alors ce fléau prendra fin.)"
   fey_court.102.neutral:0 "Nos relations avec la Cour Unseelie se sont normalisées. Nous devrions nous attendre à un traitement plus neutre de nouveau."
   fey_court.102.a:0 "Le Roi des Ténèbres accorde sa faveur !"
   fey_court.102.b:0 "Nous pouvons regagner la faveur du Roi."
   fey_court.102.c:0 "Preuve de notre trempe !"
   fey_court.102.e:0 "Imbéciles moroses. Nous nous moquons de leur jugement."
   fey_court.102.f:0 "Un fardeau de moins."
   fey_court.102.g:0 "Quelles évaluations erronées..."
   fey_court.102.h:0 "Masquer tous les futurs événements de bénédiction/fléau de la Cour Unseelie (donne quand même les modificateurs)"
   fey_court_unseelie_boon:0 "Bénédictions de la Cour Unseelie"
   desc_fey_court_unseelie_boon:0 "Nos excellentes relations avec les Unseelie nous ont accordé un certain nombre de bénédictions."
   fey_court_unseelie_bane:0 "Fléaux de la Cour Unseelie"
   desc_fey_court_unseelie_bane:0 "Nos relations aigres avec les Unseelie nous ont causé un certain nombre de fléaux."
   fey_court.103.t:0 "Masquer les événements de bénédiction/fléau de la Cour Unseelie"
   fey_court.104.t:0 "Nouvelles des Fées indépendantes"
   fey_court.104.boon:0 "Depuis des années, les Fées indépendantes sont §MRavies§! de nous. Maintenant, des rapports indiquent que les fées des Bois-Profonds se donnent du mal pour soutenir nos efforts à travers [Root.GetName]. Tant que les relations restent élevées, nous devrions nous attendre à une nouvelle normalité.\n\n(Si les relations tombent à un état inférieur pendant environ 2 ans, alors cette bénédiction prendra fin.)"
   fey_court.104.bane:0 "Depuis des années, les Fées indépendantes sont §RCourroucées§! envers nous. Maintenant, des rapports indiquent que les fées des Bois-Profonds sabotent activement nos efforts à travers [Root.GetName]. Jusqu'à ce que les relations se normalisent, nous devrions nous attendre à une nouvelle normalité.\n\n(Si les relations s'élèvent à un état supérieur pendant environ 2 ans, alors ce fléau prendra fin.)"
   fey_court.104.neutral:0 "Nos relations avec les Fées indépendantes se sont normalisées. Nous devrions nous attendre à un traitement plus neutre de nouveau."
   fey_court.104.a:0 "Quels bons voisins."
   fey_court.104.b:0 "La faveur des voisins ne peut durer éternellement."
   fey_court.104.c:0 "Enfin, elles comprennent la chance qu'elles ont."
   fey_court.104.e:0 "Fées capricieuses..."
   fey_court.104.f:0 "Enfin."
   fey_court.104.g:0 "Maudits imbéciles !"
   fey_court.104.h:0 "Masquer tous les futurs événements de bénédiction/fléau des Fées indépendantes (donne quand même les modificateurs)"
   fey_court_unaligned_fey_boon:0 "Bénédictions des Fées indépendantes"
   desc_fey_court_unaligned_fey_boon:0 "Nos excellentes relations avec les Fées indépendantes nous ont accordé un certain nombre de bénédictions."
   fey_court_unaligned_fey_bane:0 "Fléaux des Fées indépendantes"
   desc_fey_court_unaligned_fey_bane:0 "Nos relations aigres avec les Fées indépendantes nous ont causé un certain nombre de fléaux."
   fey_court.105.t:0 "Masquer les événements de bénédiction/fléau des Fées indépendantes"
   fey_court.106.t:0 "Favoritisme de cour"
   fey_court.106.d:0 "Bien que nous continuions à exprimer extérieurement notre neutralité entre les Seelie et les Unseelie, notre favoritisme subtil a commencé à s'accumuler."
   fey_court.106.a:0 "Laissez les Unseelie bouder."
   fey_court.106.b:0 "Oh non, les Seelie ne s'amusent pas ? Bref."

   ashentree_pact:0 "Pacte du Frêne Cendré"
   ashentree_pact_religion_desc:0 "Le Pacte du Frêne Cendré est un groupe de Fées unies par un désir commun de venger les humains pour avoir brûlé l'Arbre-Monde Cendré, le dernier vestige de Halanna, l'ancienne Déesse de la Terre. Les membres du Pacte du Frêne Cendré croient que les Fées devraient reconquérir les terres perdues et planter un nouvel Arbre-Monde pour sauver à la fois le Plan Matériel Primaire et le Royaume Féerique de la Séparation, la séparation complète des deux mondes et la perte de toute magie à Halann."
   pactseeker:0 "Quêteur de Pacte"
   pactseeker_religion_desc:0 "Les Quêteurs de Pacte sont des sorciers qui se donnent du mal pour entrer en contact avec de puissantes archifées, leur rendant leurs services en échange d'une magie puissante. C'est un fait généralement accepté que tous ces sorciers ont une double loyauté, envers leur clan et leurs protecteurs féeriques. Les problèmes que cela cause parfois sont généralement compensés par le pouvoir considérable qu'ils peuvent fournir."
   centaur_religion:0 "Centaure"
   irdaeos_worship:0 "Culte d'Irdaeos"
   irdaeos_worship_religion_desc:0 "Irdaeos est une divinité vénérée par les divers clans centaures des steppes. Dieu du ciel, des nuages, des tempêtes, du vent et du mouvement, les centaures croient que les Plaines-Interdites sont le domaine d'Irdaeos sur terre, et qu'il a admiré les luttes des centaures durant leur ancien exode et a offert son domaine aux centaures pour qu'il soit le leur. Les croyances et pratiques diffèrent légèrement entre chaque clan, mais tous ceux qui le vénèrent sont unis dans la croyance qu'Irdaeos surveille le paradis connu sous le nom d'Ik Magthaal dans l'au-delà. Seuls ceux qui ont véritablement honoré son don de leur vivant sont autorisés à entrer à Ik Magthaal à leur mort, et ainsi la plupart des pratiques religieuses concernent cette idée de rendre grâce ou de montrer de l'honneur."

  halessi:0 "Halessi"
   accretive_path:0 "Voie Accrétive"
   accretive_path_religion_desc:0 "Les croyances culturelles répandues à travers Haless, la Voie Accrétive est davantage une collection de folklore local et de superstitions, principalement autour de la force vitale « Chi ». On dit que la Voie Accrétive est comme une rivière : elle est différente dans chaque terre et chaque peuple, mais fait partie du flux plus grand de la vie."
   transmutative_path:0 "Voie Transmutative"
   transmutative_path_religion_desc:0 "Les croyances culturelles répandues à travers Haless, la Voie Transmutative est davantage une collection de folklore local et de superstitions, principalement autour de la force vitale « Chi ». On dit que la Voie Transmutative est comme une rivière : elle est différente dans chaque terre et chaque peuple, mais fait partie du flux plus grand de la vie."
   devouring_path:0 "Voie Dévorante"
   devouring_path_religion_desc:0 "Il existe certaines techniques interdites aux pratiquants des Voies Accrétive et Transmutative, certains pouvoirs qui ne peuvent être appris d'elles. Ces pratiques interdites sont maintenues par les sages de la Voie Dévorante, une religion née quand les deux Voies vertueuses ont rencontré les pratiques culturelles des Oni. La Voie Dévorante détient trois vérités secrètes : que le royaume des esprits est l'Enfer, qu'il est acceptable de prendre le Chi d'autrui pour soi, et que la vie éternelle est le sens de l'illumination.\n\nLa Voie Dévorante utilise le §YChi§!, qui ne peut être gagné au fil du temps par des moyens normaux. Au lieu de cela, nos sources de §YChi§! sont :\nPillage des capitales en guerre : §G+50§!\nExploitation du développement : §G+15§!\nCorruption des temples : §G+10,0 %§! de Chi mensuel\n\nNous pouvons faire des §YSerments de la Main Gauche§! avec notre Chi, qui ont des avantages durant §Y20 ans§!, mais des inconvénients qui persistent. Quand notre dirigeant meurt, tous les serments qu'il a faits meurent avec lui, et notre prochain dirigeant peut faire un nouveau §YSerment de la Main Gauche§!."
   neokttareum:0 "Neokttareum"
   neokttareum_religion_desc:0 "Les pratiques religieuses de Gowon, une foi chamanique vénérant ses ancêtres ainsi qu'une grande variété d'esprits puissants connus sous le nom de Neoksari. Les chefs des fidèles sont des chamans appelés Neoksamaji qui ont été partiellement possédés par un Neoksari mineur, gagnant un pouvoir mystique comme des visions prophétiques et la capacité de parler aux morts."
  supreme_spirit:0 "Esprit Suprême"
   saanorgegh:0 "Saanorgegh"
   saanorgegh_religion_desc:0 "Les Shuvüüsh vénèrent principalement les Saanorgegh, les trois frères qui ont repoussé les esprits voleurs de visages durant la migration de leurs ancêtres et ont fondé les trois familles des Shuvüüshudi. Pour se protéger des esprits malveillants, la plupart portent des masques finement sculptés, parfois sculptés par eux-mêmes mais souvent transmis de génération en génération. Leurs chamans, qui portent des masques noirs sans traits, guident le peuple en communiquant avec les dieux et les esprits. L'idée que quiconque digne d'ascension peut rejoindre les trois frères à la mort fait que leurs cavaliers d'oiseaux combattent avec ferveur et pillent en toute impunité."
    tsarai:0 "Tsarai"
    tsarai_desc:0 "Tsarai était l'aîné des trois frères qui ont mené le peuple Shuvüüsh hors du désert de Khaashalg durant le Husuusing. Le masque qu'il a sculpté pour lui-même est le masque rouge avec des décorations blanches aux yeux que les dirigeants de Nuugdan Tsarai ont transmis à leurs héritiers depuis sa mort en 24 AA, quand il est monté au rang de divinité. Quand le masque n'est pas porté par un monarque, il est retourné à son lieu de repos dans le temple de Tsarai à Zougzengom. Il est considéré comme le plus calme des trois et par son raisonnement logique est tenu responsable d'avoir empêché les schismes de survenir durant le Husuusing. Ses disciples se targuent généralement de calme et de compréhension, et les dirigeants qui le vénèrent tendent à tenter de régner avec la même finesse incroyable qu'il a montrée de son vivant et au-delà."
    tsarai_full:0 "Tsarai, l'Ancien"
    oedek:0 "Oedek"
    oedek_desc:0 "Oedek était le frère du milieu des trois qui ont mené le peuple Shuvüüsh hors du désert de Khaashalg durant le Husuusing. Le masque qu'il a sculpté pour lui-même est le masque gris lavande représentant une bête féline que les dirigeants de Rüng Igedch ont transmis à leurs héritiers depuis sa mort à Kaashegaarch en 27 AA, quand il est monté au rang de divinité. Quand le masque n'est pas porté par un monarque, il est retourné à son lieu de repos dans le temple d'Oedek à Kaashegaarch. Il est considéré comme le plus spirituel des trois et par sa compréhension intrinsèque des esprits voleurs de visages, il a pu concevoir le plan de fabriquer des masques. Il est ainsi tenu responsable d'avoir empêché la mort de tous les Shuvüüsh durant le Husuusing. Les chamans de la foi Saanorgegh le voient généralement comme leur patron et les dirigeants qui le vénèrent forcent souvent leur foi sur les incroyants."
    oedek_full:0 "Oedek, le Sage"
    jaal:0 "Jaal"
    jaal_desc:0 "Jaal était le plus jeune des trois frères qui ont mené le peuple Shuvüüsh hors du désert de Khaashalg durant le Husuusing. Le masque qu'il a sculpté pour lui-même est le masque blanc et rouge rappelant les esprits mêmes qui hantaient le désert, que les dirigeants de Tsuista Khul ont transmis à leurs héritiers depuis sa mort à Tuiinond en 32 AA, quand il est monté au rang de divinité. Quand le masque n'est pas porté par un monarque, il est retourné à son lieu de repos dans le temple de Jaal à Tuiinond. Il est considéré comme le plus agressif des trois et par sa colère il a motivé de nombreux Shuvüüsh à continuer à marcher et à se battre, même dans les pires circonstances. Il est ainsi tenu responsable d'avoir instillé l'espoir dans le peuple quand ils en avaient le plus besoin et est la seule personne à avoir jamais tué un esprit voleur de visages. Les guerriers de la foi Saanorgegh le voient souvent comme leur patron et les dirigeants qui le vénèrent essaient souvent d'imiter sa force, sa persévérance et son agressivité."
    jaal_full:0 "Jaal, le Féroce"
    faceless_queen:0 "Sans-Visage"
    faceless_queen_desc:0 "La Reine Sans-Visage, communément abrégée en Sans-Visage ou la Sans-Visage, était connue de son vivant sous le nom de Nurgai Bagaatun. Avant son ascension à la divinité, elle était une légendaire Kusheng qui a uni le peuple Shuvüüsh sous une seule bannière pour la première fois en plus de 400 ans. De son vivant, elle portait le masque de Tsarai seulement quand elle cherchait ses conseils, préférant garder son masque Izhuun blanc sans traits de ses temps comme chamane familiale la plupart du temps. Quand le masque n'est pas porté par un monarque, il est retourné à son lieu de repos dans le temple des Sans-Visage à Zougzengom.\n\nLe masque ressemble à celui d'un type d'esprit féminin connu pour hanter les rêves. Elle est considérée comme la patronne de toutes les femmes Saanorgegh et par son message d'unité et de force, elle est probablement invoquée quand un compromis est atteint ou avant une charge de cavalerie. Si vous entendez « Pour la Reine Sans-Visage » dans une pièce, soyez tranquille, car un accord a été conclu, mais si vous l'entendez dans un champ, fuyez, car une charge arrive."
    faceless_queen_full:0 "La Reine Sans-Visage"
    bhengudakhnar:0 "Bhen-Ak"
    bhengudakhnar_desc:0 "Bhengudakhnar, plus communément connu sous le nom de Bhen-Ak, est une divinité composée de deux Shuvüüsh élevés. D'abord le grand Bhengudak, celui qui a d'abord subjugué les Gowon et formé le Kaashanat de Guwaamud. Ce royaume a tenu plus de 800 ans sous son regard vigilant depuis les cieux, mais a finalement chuté à cause de luttes intestines. En réponse, il a planté sa graine pour le faire repousser et des siècles plus tard, sa graine a porté ses fruits et un enfant est né avec le destin de le refaire. Quand son enfant, qui avait reformé Guwaamud, est passé dans l'au-delà, la divinité est revenue au premier plan, maintenant rejointe par son enfant à ses côtés. Leurs conquêtes sur des terres religieusement étrangères et les enseignements stricts du père Bhengudakhnar en font la divinité patronne de ceux qui souhaitent répandre la foi par l'oiseau, pas la bouche. Ainsi, les dirigeants qui revêtent le masque sculpté selon les descriptions données par la divinité elle-même lors de la communion tenteront souvent d'apporter la foi Saanorgegh aux autres par la conquête."
    bhengudakhnar_full:0 "Bhengudakhnar, Père de Guwaamud"
    daxuusgen:0 "Daxüü"
    daxuusgen_desc:0 "Daxüüsgen, plus communément connu sous le nom de Daxüü, est l'esprit ascensionné du légendaire premier Diguó qui a mené les Shuvüüsh et plus tard le peuple Daxug dans une nouvelle ère quand ils ont formé l'empire de Daxugo. Des réformes majeures ont balayé l'empire sous leur règne de leur vivant et même dans la mort, ils restent une force motrice pour les réformateurs à travers l'empire. Les Diguó qui revêtent le masque de dragon de Daxüüsgen signalent à tous les Daxug et en effet à tous les habitants de Daxugo qu'ils suivent le dieu de la réforme, le dieu de l'innovation et du changement, et que des réformes majeures sont imminentes. Ce dieu est la divinité patronne de la plupart des intellectuels, des eunuques et des employés gouvernementaux."
    daxuusgen_full:0 "Daxüüsgen, le Premier Diguó"
    manjang:0 "Manjang"
    manjang_desc:0 "Manjang est la figure ancienne qui a uni les Gowon et forgé une paix entre les esprits et les humains sur l'île de Nakseseom, ses disciples prêchent la tolérance et visent à conclure des accords avec les esprits plutôt que de combattre la plupart des types."
    manjang_full:0 "Manjang, l'Insulaire"
   levaajan:0 "Levaajan"
   levaajan_religion_desc:0 "Une foi désorganisée pratiquée par les Rünsukhi du désert, apparue après que le Jour-des-Cieux-Cendrés ait frappé Haless. La religion est principalement construite sur l'idée de prier l'Esprit Suprême partagé avec le peuple Besholgi au nord, mais la différence est qu'au lieu de rituels de chasse comme les Besholgi, les Rünsukhi utilisent la prière pour vénérer l'Esprit Suprême et demander le salut. En raison de la proximité avec les esprits voleurs de visages, les Rünsukhi construisent un abri pour la sécurité et prient l'Esprit Suprême, croyant que si un esprit voleur de visages tue une personne, cette âme ne peut être rendue au créateur. Les Rünsukhi espèrent finalement qu'un jour leurs cités sous le désert se relèveront, ce qui les garde attachés à la terre, et attendent leur retour éventuel à une civilisation."
   LEVAAJAN_ASPECTS_LONG:0 "Pouvoir Monastique"
   LEVAAJAN_ASPECTS_SHORT:0 "pouvoir"
    levaajan_monastery:0 "Monastère Levaajan"
    levaajan_monastery_desc:0 "Les §YMonastères Levaajan§! parsèment la campagne de Gozengun, offrant refuge aux voyageurs et à ceux qui cherchent à échapper aux Voleurs-de-Visages. Chaque monastère est à la fois une forteresse et une cité, aussi autosuffisant que possible. Ils gardent également chacun leur propre code monastique : posséder un §YMonastère Levaajan§! accordera à une nation §YLevaajan§! l'accès à l'§YAction Religieuse§! unique de cette région !"
    heretic_levaajan_monastery:0 "Monastère Levaajan Hérétique"
    heretic_levaajan_monastery_desc:0 "Les moines de [5405.GetName] sont considérés comme hérétiques par le reste de la tradition §YLevaajan§!."
    levaajan_effect:0 "Une région de §YMonastère Levaajan§! reçoit l'effet suivant :"
    does_not_own_monastery:0 "£no£Nous ne possédons aucun cœur dans cette région monastique !"
    maxed_out_levaajan_actions:0 "£no£ Nous avons atteint le nombre maximum autorisé de §YPouvoirs Monastiques§! dans cette région !"
    maxed_out_national_levaajan_actions:0 "Nous n'avons PAS atteint le nombre maximum autorisé de §YPouvoirs Monastiques§! !"
    already_has_levaajan_action:0 "£no£ Cette région a déjà ce §YPouvoir Monastique§! !"

    levaajan_renovating_the_monasteries:0 "Rénovation des monastères"
    desc_levaajan_renovating_the_monasteries:0 "De grands et petits monastères parsèment les plateaux de Kaashalg, offrant à la fois des zones de repos pour les voyageurs fatigués et des lieux de foi profonde pour les moines qui les habitent. Le monastère est une partie fondamentale de la foi de l'Esprit Suprême, et ainsi il va de soi que lorsqu'il a besoin de réparations, l'argent y afflue afin de perfectionner ses lourdes pierres."
    renovating_the_monasteries_local_mod:0 "Rénovation des monastères"
    renovating_the_monasteries_country_mod:0 "Rénovation des monastères"
    renovating_the_monasteries_local_modifiers_tt:0 "Coût de développement local : §G-15,0 %§! pendant §Y10§! ans"
    renovating_the_monasteries_country_modifiers_tt:0 "Coût de développement : §G-10,0 %§! pendant §Y10§! ans"
    levaajan_golden_mask:0 "Masque Doré"
    desc_levaajan_golden_mask:0 "L'Ordre du Masque Doré ne voit pas l'intérêt de vivre simplement dans les monastères, le considérant comme une impasse sur le chemin vers l'Esprit Suprême, de s'enchaîner à la stagnation. Au lieu de cela, ils marchent sur les routes des Runsukhi, voyageant parmi eux et répandant leurs édits de l'Esprit Suprême tout en portant leurs masques dorés caractéristiques. Leur expertise dans les routes de voyage et la pose de protections est si répandue qu'on dit qu'ils ont le plus de connaissances de tous les Ordres."
    golden_mask_local_mod:0 "Masque Doré"
    golden_mask_country_mod:0 "Masque Doré"
    golden_mask_local_modifiers_tt:0 "Attrition pour les ennemis : §G+5,00§! pendant §Y10§! ans"
    golden_mask_country_modifiers_tt:0 "Attrition pour les ennemis : §G+2,00§! pendant §Y10§! ans"
    levaajan_sealed_gaze:0 "Regard Scellé"
    desc_levaajan_sealed_gaze:0 "Les Frères du Regard Scellé sont tristement célèbres parmi les Rukunai pour leurs pratiques hérétiques, cherchant à mettre fin aux Voleurs-de-Visages par tous les moyens nécessaires. Des rumeurs abondent sur leur connexion avec les Oni du sud, sur comment ils scellent leurs propres émotions dans la poursuite d'un combat froid, sur les choses bien plus sombres qui se cachent dans leurs regards. Ils ont été exilés dans les montagnes glacées il y a des siècles, et même alors gardés sous surveillance depuis. Pourtant, leur puissance est quelque chose à garder près de soi, et si jamais elle est nécessaire, ils seront déchaînés."
    sealed_gaze_local_mod:0 "Regard Scellé"
    sealed_gaze_country_mod:0 "Regard Scellé"
    sealed_gaze_local_modifiers_tt:0 "Bonus de dé d'attaquant local : §G+1,00§! pendant §Y10§! ans"
    sealed_gaze_country_modifiers_tt:0 "Capacité d'assaut de fort : §G+15,0 %§! pendant §Y10§! ans"
    levaajan_western_passageway:0 "Passage Occidental"
    desc_levaajan_western_passageway:0 "L'ordre le plus occidental des monastères, le Monastère Huluutarai a vu des étrangers à la fois des Hobgobelins Aigles de Nomsyulhan et des centaures des Plaines-Interdites. Alors que certaines de ces expéditions ont cherché le commerce avec les Rukunai et Runsukhi, d'autres n'ont cherché que la guerre et la conquête. Les Huluutarai ont aidé par le passé à établir des fortifications contre ces incursions. Bien que maintenant il y ait des débats entre l'Ordre du Passage Occidental et [Root.GetName] sur comment combattre leurs ennemis, la discorde est toujours écartée quand de plus grandes menaces se profilent."
    western_passageway_local_mod:0 "Passage Occidental"
    western_passageway_country_mod:0 "Passage Occidental"
    western_passageway_local_modifiers_tt:0 "Défense de fort locale : §G+25,0 %§! pendant §Y10§! ans"
    western_passageway_country_modifiers_tt:0 "Défense de fort : §G+15,0 %§! pendant §Y10§! ans"
    levaajan_four_guides:0 "Quatre Guides"
    desc_levaajan_four_guides:0 "Les Quatre Ordres des parties septentrionales des Rukunai passent leurs jours ensemble, et cela se voit dans leur idée d'unité. Ils croient que ce n'est qu'ensemble, et en grand nombre, que le peuple des Rukunai et Runsukhi peut vivre en accord avec l'Esprit Suprême, et à cette fin ils ont encouragé tous à les rejoindre, qu'ils soient Rukunai, Runsukhi, ou même ceux des Khudi. Les chefs des monastères qui suivent ce code sont un conseil de quatre, qui se chamaillent sans fin sur la nature de l'Esprit Suprême."
    four_guides_local_mod:0 "Quatre Guides"
    four_guides_country_mod:0 "Quatre Guides"
    four_guides_local_modifiers_tt:0 "Coût de régiment local : §G-25,0 %§! pendant §Y10§! ans"
    four_guides_country_modifiers_tt:0 "Coûts des régiments : §G-10,0 %§! pendant §Y10§! ans"
    levaajan_the_pursuit:0 "La Quête"
    desc_levaajan_the_pursuit:0 "Les Harimari du Plateau ont longtemps respecté leurs propres enseignements de la Haute Philosophie, et ces enseignements coexistent avec ceux des divers monastères. Bien que très différents en philosophie, ils se sont entrelacés de telle manière qu'ils ont créé leur propre Code Monastique : La Quête, où l'on cherche la grandeur dans toutes les choses de la vie et au-delà."
    the_pursuit_local_mod:0 "La Quête"
    the_pursuit_country_mod:0 "La Quête"
    the_pursuit_local_modifiers_tt:0 "Changement d'autonomie mensuel : §G-0,10§! pendant §Y10§! ans"
    the_pursuit_country_modifiers_tt:0 "Coût de création de cœur : §G-15,0 %§! pendant §Y10§! ans"
    levaajan_harmony_with_future:0 "En harmonie avec l'avenir"
    desc_levaajan_harmony_with_future:0 "Niché principalement dans la grande cité de Bazuniezar, l'Ordre de la Réflexion a toujours débattu avec les Guildes des Reliques de Bazuniezar sur la meilleure façon d'utiliser les anciennes reliques abondantes dans la cité. Ils soutiennent que ces reliques sont souvent mal utilisées, ou que les obsessions des guildes les éloignent de l'Esprit Suprême, ou encore des centaines d'autres plaintes qui se déversent sans fin dans les oreilles des Guildes des Reliques jour après jour. Pourtant, ce n'est pas la malveillance qui anime l'Ordre de la Réflexion, mais une appréciation de la prise en compte de tout avant de finalement, définitivement, faire son mouvement. Bien que les tensions persistent encore à ce jour, ils travaillent toujours à être en harmonie avec l'avenir."
    harmony_with_future_local_mod:0 "En harmonie avec l'avenir"
    harmony_with_future_country_mod:0 "En harmonie avec l'avenir"
    harmony_with_future_local_modifiers_tt:0 "Marchandises produites localement : §G+0,50§! pendant §Y10§! ans"
    harmony_with_future_country_modifiers_tt:0 "Efficacité commerciale : §G+10,0 %§! pendant §Y10§! ans"
    levaajan_opening_the_door:0 "Ouvrir la porte"
    desc_levaajan_opening_the_door:0 "Les terres désolées qui s'étendent au-delà de la protection du plateau ne sont pas pour les cœurs fragiles, ce sont les terrains de chasse habituels des Sans-Visage. Afin de s'assurer que seuls les Rukunai les plus résolus prennent un tel risque profond, chacun des monastères qui mènent vers le plateau a une cérémonie connue sous le nom d'Épreuve des Portes, qui a pris naissance dans la région du Bouclier Sud avec les Disciples de la Porte. Cette cérémonie implique des défis intenses de l'esprit et du corps, à travers lesquels un élève apprend à ignorer les sons de ses proches, à se déplacer autant qu'il le peut, et à perfectionner les innombrables compétences requises pour donner à l'élève une chance de survivre en territoire infesté de Sans-Visage. Ce n'est que lorsqu'on réussit tous ces défis qu'on est autorisé à traverser les portes."
    opening_the_door_local_mod:0 "Ouvrir la porte"
    opening_the_door_country_mod:0 "Ouvrir la porte"
    opening_the_door_local_modifiers_tt:0 "Modificateur d'effectifs local : §G+50,0 %§! pendant §Y10§! ans"
    opening_the_door_country_modifiers_tt:0 "Modificateur d'effectifs national : §G+10,0§! pendant §Y10§! ans"
    levaajan_ashen_way:0 "La Voie Cendrée"
    desc_levaajan_ashen_way:0 "Ceux du Monastère de Grès ont longtemps fusionné les traditions et méthodes du Clergé Levaajan et des Géomanciens Khudi, apprenant les moyens d'élever de grandes fortifications et d'utiliser les éléments à leur avantage."
    ashen_way_local_mod:0 "La Voie Cendrée"
    ashen_way_country_mod:0 "La Voie Cendrée"
    ashen_way_local_modifiers_tt:0 "Coût de construction local : §G-15,0 %§! pendant §Y10§! ans"
    ashen_way_country_modifiers_tt:0 "Coût de construction : §G-10,0 %§! pendant §Y10§! ans"

    levaajan.1.t:0 "Sélectionner le monastère cible"
    levaajan.1.desc:0 "Sélectionnez un monastère auquel appliquer les effets du Code Monastique."
    levaajan.1.a:0 "Notre capitale fera très bien l'affaire"
    levaajan_target_area:0 "Monastère cible"
    levaajan.10.t:0 "Le début d'un voyage"
    levaajan.10.desc:0 "Chaque voyage, chaque chemin, chaque pas commence quelque part. Qu'il soit mené par Rukanai ou Runsukhi, tous s'inclinent en supplication devant l'Esprit Suprême.\n\n[Root.Monarch.GetName] est assis en contemplation, ruminant sur le chemin devant [Root.Monarch.GetHerHim] alors que le soleil commence à plonger sous l'horizon. Les marées changent, et à moins qu'[Root.Monarch.GetSheHe] ne commence son pèlerinage vers l'Esprit Suprême maintenant, [Root.Monarch.GetHerHis] âme sera laissée derrière."
    levaajan.10.a:0 "Le pied se stabilise sur la marche en avant."
    levaajan.11.t:0 "Des temps troublés à venir"
    levaajan.11.desc:0 "Tous les monastères enseignent que la nature du chemin en avant n'est pas toujours claire, mais [Root.Monarch.GetName] a appris par l'expérience : certains jours le chemin est plus clair que d'autres. Et aujourd'hui, il semblait vraiment trouble.\n\nVoleurs-de-Visages. Oni. Hobgobelins. Centaures. Les cavaliers d'oiseaux de terreur, et plus encore. Tous empiètent sur les terres des Rukunai et Runsukhi.\n\nIl y a aussi des menaces au sein de ces terres. La tourmente fleurit comme une fleur sur la vigne, les rivalités voient les lances aiguisées, et les ressources sont tendues au point de rupture. Le peuple, tout uni par l'Esprit Suprême, commence à se diviser.\n\nMais peut-être…\nEt si les Rukunai et Runsukhi étaient recousus ensemble ? Pourraient-ils être unis ? Leur groupe, leur peuple pourrait-il être rassemblé ? Et ce faisant, sauvé ?\nPeut-être que le jour n'est pas si trouble. Peut-être y a-t-il un chemin clair devant. Un chemin difficile. Mais un qui doit être parcouru : Nous devons unir nos frères."
    levaajan.11.a:0 "Bien que trébuchant, nous nous rattrapons."
    levaajan_11_tt:0 "Obtenir des revendications permanentes sur d'autres provinces Runshuki/Rukunai."
    levaajan.12.t:0 "La terreur de l'Est"
    levaajan.12.desc:0 "Les Cavaliers d'Oiseaux de l'Est ont longtemps été considérés comme perdus par les Rukunai et Runsukhi en raison de leur déplacement vers l'est ainsi que de leur port de masques, mais ce n'est que récemment que des discussions ont commencé sur plus qu'une froide acceptation de leurs desseins égarés. Ceux dans les monastères parlent maintenant d'un autre sujet : la guerre. Pour les ramener dans le giron, pour qu'ils fassent à nouveau partie des desseins des monastères. Simplement ignorer cela serait une folie : cela doit être débattu, discuté et médité."
    levaajan.12.a:0 "Pourquoi chevaucher quand on peut courir ?"
    levaajan_12_tt:0 "Obtenir des revendications permanentes sur toutes les terres Shuvuush. Peut mettre jusqu'à deux modificateurs différents par 10 ans au lieu de 1."
    levaajan.13.t:0 "Réformer les rénovations du monastère"
    levaajan.13.desc:0 "L'expansion du pays a dépassé l'ordre apporté par la précédente Règle Monastique, et tout comme les robes de l'un des plus fidèles, elles doivent être réajustées et redessinées selon les besoins, le tissu de la société refilé en forme.\n\n[Root.Monarch.GetName] écoute avec curiosité tandis que les divers ordres des monastères font connaître leurs cas : de petits arguments sur les frontières monastiques, des disputes acharnées sur le braconnage de savants éminents, et autres futilités. Il y a même un rapport de moines prenant les choses en main de manière plus violente, les hommes ayant apparemment conclu que l'agression était une meilleure solution que le débat pacifique. Il est clair que le tissu de nos enseignements commence à s'effilocher par surmenage.\n[Root.Monarch.GetName] regarde la plume devant lui, avant de griffonner la ligne suivante. Peut-être que si les frontières entre les Monastères devaient se desserrer, s'ils étaient autorisés à s'étendre les uns aux autres...\nOui. C'est le premier pas, sur un chemin qu'[Root.Monarch.GetSheHe] verra [Root.GetName] parcourir. Et avec cette marche, les tissus commenceront aussi à révéler un nouveau motif de tissu entrelacé et de soie coûteuse, pointant vers l'avenir en supplication dorée."
    levaajan.13.a:0 "Les pas deviennent plus faciles à franchir."
    levaajan_13_tt:0 "Peut mettre jusqu'à trois modificateurs différents par 10 ans au lieu de 1."
    levaajan.14.t:0 "Fin d'un voyage"
    levaajan.14.desc:0 "C'est fait ! Les monastères ont longtemps prospéré sous l'œil du règne de [Root.Monarch.GetName], et maintenant ont commencé à se connecter les uns aux autres, soutenant même des projets au-delà des paysages locaux de leurs propres domaines ! Les pèlerinages d'un bout à l'autre de Kaashalg peuvent voyager sans être attaqués. Les monastères sont pleinement ouverts les uns aux autres, permettant la propagation des idées d'aller au-delà même des monastères de leur propre Code Monastique avec ferveur ! Une nouvelle aube s'est approchée, et avec elle vient une guidance supplémentaire le long du chemin vers l'Esprit Suprême !"
    levaajan.14.a:0 "La première montagne a été gravie."
    levaajan_14_tt:0 "Si pas empire, en devenir un. Tous les aspects passent maintenant à des modificateurs de pays, affectant la nation entière"

   umun_omi:0 "Umun Omi"
   umun_omi_religion_desc:0 "La foi (traduite par Une Seule Âme en commun) du peuple Besholgi de Moduk, basée sur la croyance en un Esprit Suprême unique qui, il y a longtemps, a divisé son âme pour créer le monde, y compris les humains, les animaux et les esprits pour habiter le monde. Quand un humain meurt, on croit que son âme retourne à l'Esprit Suprême tandis que son corps devient une coquille, et finalement chaque âme sur Halann retournera à son créateur. La foi met l'accent sur la chasse, et ils croient que c'est un rituel pour aider à faire revivre l'Esprit Suprême par le meurtre d'un animal. Il y a une infime minorité de Besholgi qui deviennent mercenaires dans le sud, avec la théorie qu'ils aident à faire revivre l'Esprit Suprême en tuant d'autres sur le champ de bataille, bien qu'ils soient pour la plupart exilés de leur tribu pour leur radicalisme."
  triunic_lake:0 "Lac Triunique"
   kodave_followers:0 "Disciples de Kodave"
   kodave_followers_religion_desc:0 "Kodave est la déesse guerrière des Lacs Triuniques, principalement vénérée par les robustes Metsamics et les soldats à travers la Fédération. On croit qu'elle protège les îles de l'invasion, élevant des champions pour projeter sa puissance dans le monde matériel."
   yukel_followers:0 "Disciples de Yukel"
   yukel_followers_religion_desc:0 "Yukel est la déesse du commerce des lacs et la mère des autres Déesses Triuniques. Principalement vénérée par les Zabatlari, elle représente une figure de paix et de prospérité, calmant les tempêtes pour les marchands qui louent son nom et accordant une éloquence surnaturelle à ses disciples."
   enuuk_followers:0 "Disciples d'Enuuk"
   enuuk_followers_religion_desc:0 "Enuuk est la déesse de la production et la plus jeune Déesse des lacs. Ses disciples les plus ardents sont les Khamgunai, dont les forges et ateliers qu'elle bénit produisent les plus belles œuvres de la Fédération."
   kalyin_worshippers:0 "Adorateurs de Kalyin"
   kalyin_worshippers_religion_desc:0 "Kalyin est l'union toute-puissante des Trois Déesses, incarnant chacun de leurs domaines et pouvoirs également en une seule figure, tout comme la Fédération incarne le pouvoir de chaque cité des îles. Elle représente l'idéal pour notre peuple, uni dans le but et la force."
   kukatodic_religion:0 "Möitsäliusko"
   kukatodic_religion_religion_desc:0 "Les peuples Kukatodiques d'Yyl Möitsa croient que les grandes forêts dans lesquelles ils vivent abritent un nombre incalculable d'esprits locaux. Chaque arbre, chaque rocher, chaque cascade a un esprit, et ils vivent et meurent, tout comme les humains, dans leur monde invisible. Les croyances de Möitsäliusko, signifiant « esprits de la forêt », sont variées et diffèrent d'une tribu à l'autre. Une chose qu'elles ont en commun est la révérence envers les vieilles sages, généralement les femmes les plus âgées du village, qui servent de médium spirituel entre le monde matériel et le monde des esprits."
   yudunyovi:0 "Yudunyovi"
   yudunyovi_religion_desc:0 "Les Yudunyovi (ou Dieux du Monde) sont un panthéon de dieux redécouverts par les colons Triuniques sur le continent. Menés par le dieu soleil Taqoshur et révélés par le dieu des rêves Soiti, les disciples de cette foi cherchent à reconquérir leur ancien héritage dans le contexte du monde moderne."
    taqoshur:0 "Taqoshur"
    taqoshur_desc:0 "Chef des Yudunyovi et dieu du soleil, Taqoshur est la source de toute vie dans le monde. Autrefois connu sous le nom de Tapashur, sous sa forme moderne sa lumière éloigne les ténèbres et le chaos qui régneraient sans la chaleur de la civilisation."
    soiti:0 "Soiti"
    soiti_desc:0 "Existant en dehors de la hiérarchie des Yudunyovi, Soiti le dieu de la magie et des rêves est considéré comme le cinquième grand-parent de tout mage. Depuis le royaume des rêves, Soiti enseigne à ses petits-enfants les secrets de leur droit de naissance, et récemment leur a rappelé l'existence même des Yudunyovi.\nContrairement aux autres dieux du monde, Soiti seul reste entièrement inchangé depuis des milliers d'années."
    yukel:0 "Yukel"
    yukel_desc:0 "Déesse de l'eau, de la paix et de la tranquillité, Yukel a gagné en importance au cours des derniers siècles car elle était l'un des dieux principaux du peuple Triunique. Autrefois connue sous le nom de Yushel, son étreinte permet de voir l'eau comme un lieu de calme sécurité."
    kalyin:0 "Kalyin"
    kalyin_desc:0 "L'union des trois Déesses du Lac, et bien qu'elle ne soit pas considérée comme « toute-puissante » parmi les Yudunyovi, Kalyin jouit d'un large domaine sur l'eau, la paix, la tranquillité et la forge. Bien que la civilisation ne puisse exister sans la lumière de Taqoshur, elle ne peut prospérer sans eau."
    shirdos:0 "Shirdos"
    shirdos_desc:0 "Dieu des vents, des tempêtes, des cieux et de l'honneur, Shirdos promet une vie après la mort dans les cieux pour les honorables, et des tempêtes sur ceux qui en manquent. Autrefois connu sous le nom de Pekirdi, le dieu du ciel est considéré par beaucoup comme une itération « apprivoisée » du dieu Centaure Irdaeos."
    yerush:0 "Yerush"
    yerush_desc:0 "Déesse de la Guerre et de la Terre, Yerush représente la force nécessaire pour défendre son foyer. Autrefois connue sous le nom de Korhist, elle était une figure de force comme moyen de justifier la conquête."
    ekchorvu:0 "Ek'chorvu"
    ekchorvu_desc:0 "Le premier humain à avoir domestiqué un animal, Ek'chorvu a forgé un lien entre l'homme et la nature. Maintenant le dieu de la diplomatie et de l'élevage, il représente tous les liens que l'homme fait dans le monde. Autrefois connu sous le nom d'Eku, il est le seul dieu majeur d'origines mortelles."
    tayoghur:0 "Tayoghur"
    tayoghur_desc:0 "Le Dieu de la Protection et des Minéraux, Tayoghur agit comme le gardien solide contre les vrais monstres qui rôdent dans les endroits sombres. Un camarade de Yerush, la paire représente le lien entre l'homme et le nain dans leurs efforts de reconquête respectifs. Autrefois connu sous le nom de Herghor, il était autrefois symbolisé par les montagnes de l'Échine-du-Serpent avant que le contact ne soit établi avec les nains."
    asimlik:0 "Asimlik"
    asimlik_desc:0 "Enseignant des usages des plantes, Asimlik est le dieu de la végétation. Étroitement associé à Taqoshur, il transforme l'énergie vitale du soleil en formes que les mortels peuvent utiliser. Autrefois connu sous le nom d'Auigra, il a appris beaucoup de choses durant l'absence de deux mille ans de l'humanité."
  giantkin:0 "Enfants des Géants"
   feast_of_the_gods:0 "Festin des Dieux"
   feast_of_the_gods_religion_desc:0 "Connu sous le nom d'Iskerag Vulshor en langue ogre, les Ogres croient qu'ils ont gagné leur force et leur stature en dévorant leurs anciens dieux, les Vrais Géants, et qu'en dévorant les forts et les sages, ils peuvent hériter de leur pouvoir pour eux-mêmes."
   reformed_feast_of_the_gods:0 "Festin des Dieux"
   reformed_feast_of_the_gods_religion_desc:0 "Connu sous le nom d'Iskerag Vulshor en langue ogre, les Ogres croient qu'ils ont gagné leur force et leur stature en dévorant leurs anciens dieux, les Vrais Géants, et qu'en dévorant les forts et les sages, ils peuvent hériter de leur pouvoir pour eux-mêmes. La foi a subi un certain nombre de réformes intensives pour la mettre plus en accord avec les sensibilités modernes."
   mountain_watchers:0 "Guetteurs des Montagnes"
   mountain_watchers_religion_desc:0 "Les Trolls de Gérudie se nomment eux-mêmes les Jartal Agefa, ou Guetteurs des Montagnes, dans leur croyance qu'ils ont été laissés derrière par les Vrais Géants pour garder la Gérudie des intrus et empêcher les intrus de pénétrer dans les terres des titans qu'ils croient être loin au nord, même de la Gérudie Lointaine."
   mountain_watchers_blessings:0 "Héritage des Jötunn"
   pick_mountain_watchers_blessing:0 "Choisir l'Héritage"
   blessing_ofanttlir:0 "Öfanttlir, le Progéniteur"
   blessing_jormir:0 "Jormir, le Roi Dégelé"
   blessing_valerid:0 "Valerið, le Kullninger"
   blessing_kranmas:0 "Kranmas, l'Enchaîné"
   blessing_balmir:0 "Bålmir, Fléau des Eaux"
   blessing_ofanttlir_upgraded:0 "Öfanttlir, le Progéniteur"
   blessing_jormir_upgraded:0 "Jormir, le Roi Dégelé"
   blessing_valerid_upgraded:0 "Valerið, le Kullninger"
   blessing_kranmas_upgraded:0 "Kranmas, l'Enchaîné"
   blessing_balmir_upgraded:0 "Bålmir, Fléau des Eaux"
   HOLY_SITE_995_DESC:0 "Murtrhol est l'endroit où les Jötunn ont jailli d'Ofantlir, le premier Géant dont le dos est la fondation du monde."
   HOLY_SITE_985_DESC:0 "Le Manoir du Géant était la dernière capitale des Jötunn dirigée par Gerud avant que les dragons ne fassent fondre les grands palais et noient la plupart des Jötunn, créant la Mer de la Tombe des Géants."
   HOLY_SITE_740_DESC:0 "Bal Vroren est l'endroit où Kranmas, le dernier des Géants Dégelés, et son armée de trolls et d'ogres ont perdu face à Castanor. Il fut enchaîné et noyé dans la Mer de la Tombe des Géants."
   HOLY_SITE_4208_DESC:0 "KrakdhÃ»mvror était un bastion des nains à partir duquel ils repoussaient les tentatives des Jötunn de reprendre le Col du Nord. De nombreux rochers furent lancés contre ses défenses mais il ne tomba jamais."
   HOLY_SITE_5323_DESC:0 "L'étendue la plus orientale du Jotunnlagen au bord du monde. À la fin des temps, Balmir se lèvera de Piikanvosaamua et brûlera les eaux du monde avec son arc de feu sans fin."
  infernal_religion:0 "Infernaliste"
   infernal_court:0 "Cour Infernale"
   infernal_court_religion_desc:0 "La Cour Infernale est un panthéon composé des dieux qui se sont rangés du côté d'Agrados dans la Guerre des Dieux et ont été envoyés dans les Plans Inférieurs par Castellos après sa victoire. Les disciples, appelés Infernalistes, ont tendance à vénérer la Cour Infernale non par piété ou désir de vertu mais en échange de pouvoir brut."
    kazraiel:0 "Kazraiel"
    kazraiel_desc:0 "Kazraiel, le Prince Courroucé, fut créé quand Castellos tenta d'absorber l'énergie divine de son frère, Agrados, mais fut lui-même corrompu à la place. Il projeta la portion corrompue de lui-même, ainsi que ce qu'il avait pris d'Agrados, vers les Plans Inférieurs où elle finirait par gagner une conscience de soi en tant qu'Archidiable Kazraiel.\n\nKazraiel est le plus agressif des Archidiables, connu pour ses grandes rages et son désir constant de conflit, mais derrière ses manières extérieures de berserker se cache une compréhension de la façon de mener la guerre inégalée par personne. Il se considère héritier d'Agrados et de Castellos à la fois et maître légitime de leurs deux peuples, les Aléniques et les Escanniens."
    mesner:0 "Mesner"
    mesner_desc:0 "Mesner, le Seigneur de la Paresse, était autrefois le dieu des voyages et de la communication et fut projeté vers les Plans Inférieurs par Castellos pour son échec à agir au nom de l'un ou l'autre camp de la Guerre des Dieux. Il est peut-être le plus amer des Archidiables, croyant fermement qu'il n'a rien fait de mal, et s'est allié avec Kazraiel qu'il considère également comme injustement condamné.\n\nEn tant qu'ancien dieu de la communication, et gagnant son titre de Seigneur de la Paresse, il est l'Archidiable le plus capable de parler directement à ceux du Plan Matériel, murmurant des pensées d'apathie, de chagrin ou de l'inutilité de leurs actes à ceux qu'il cible, sapant leurs volontés."
    ildran:0 "Ildran"
    ildran_desc:0 "Ildran, le Marquis de l'Orgueil, était autrefois le dieu de la construction et des grandes œuvres et devint le principal lieutenant et idéologue d'Agrados durant la Guerre des Dieux. Il fut le plus enthousiaste de tous les membres de l'Armée d'Agrados pour leur plus grande création, l'humanité, se voyant reflété dans leur désir de dominer et de remodeler le monde pour leur convenir.\n\nIl prêchait une vision d'un monde cherchant éternellement la perfection, construit par les mains ambitieuses de l'humanité et vénérant un nouveau panthéon de dieux, attirant beaucoup de ceux mécontents du conservatisme de Castellos dans les rangs d'Agrados. Pour l'instant, il se satisfait d'envoyer des visions de monuments glorieux à ceux qui le suivent, tout en rêvant encore de son nouveau monde promis habité uniquement par ses humains favoris."
    hedine:0 "Hedine"
    hedine_desc:0 "Hedine, la Maîtresse de la Luxure, était autrefois la déesse de la joie et fut blâmée pour avoir encouragé la luxure d'Agrados pour Halanna. Hedine était crainte comme la plus convaincante de l'Armée d'Agrados, car bien qu'elle manquât des compétences rhétoriques d'Ildran, elle savait toujours exactement comment tenter quelqu'un en tête-à-tête.\n\nElle était également méprisée par de nombreux avariels pour être la seule Archidiable à avoir séduit ses serviteurs avariels pour qu'ils la suivent, les transformant en ses succubes."
    ibberal:0 "Ibberal"
    ibberal_desc:0 "Ibberal, le Grand Duc de la Gloutonnerie, était autrefois le dieu des célébrations. Il était un dieu mineur dans la faction gagnante de Castellos, mais commença plus tard une conspiration pour empoisonner Castellos et d'autres dieux majeurs, le blâmer sur les loyalistes restants d'Agrados, et s'établir lui-même ainsi que les co-conspirateurs Canturian et Forsara comme le nouveau Triune dirigeant les dieux.\n\nCela échouerait et lui, et ses co-conspirateurs, seraient bannis vers les Plans Inférieurs. Les trois resteraient des alliés proches, s'appelant la Triade et coopérant généralement étroitement pour compenser leur faiblesse par rapport aux quatre autres Archidiables."
    canturian:0 "Canturian"
    canturian_desc:0 "Canturian, le Baron de l'Envie, était autrefois le dieu de la musique et du théâtre et un loyaliste de Castellos jusqu'à ce qu'il soit projeté vers les Royaumes Inférieurs pour avoir participé à une conspiration, menée par Ibberal, pour empoisonner Castellos lors d'un festin de victoire.\n\nIl deviendrait le membre le plus actif de la Triade formée avec ses co-conspirateurs, prétendant avoir rendu possible la création des premiers vampires Cannoriens. Bien que la véracité de cette déclaration ne puisse vraiment être déterminée, Canturian est connu pour accorder à ses disciples des faveurs aux dépens de ceux dont ils sont jaloux, et cela correspondrait à ce schéma."
    forsara:0 "Forsara"
    forsara_desc:0 "Forsara, la Comtesse de l'Avarice, était autrefois la déesse de la chance et de la charité et resta loyale à Castellos durant la Guerre des Dieux avant d'être bannie vers les Plans Inférieurs pour sa part dans une conspiration, aux côtés d'Ibberal et Canturian, pour l'empoisonner et usurper sa place de dirigeant des dieux.\n\nSes diables sont peut-être responsables du stéréotype du diable qui conclut des accords extérieurement équitables, mais secrètement traîtres."
