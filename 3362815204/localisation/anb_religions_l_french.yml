 anagbheism_deity_level_1:0"Anagbhéisme" #Written By: Georgius
 anagbheism_deity_level_1_desc:0"§YAnagbhéisme§!\nAucun Anagbhéiste ne sait qui fut le premier à dire « Retournez tous les Kheionai pour le savoir, quittez volontiers Andeios pour lui — allez chapeau bas vers les Bharbhen s'ils le possèdent ! » mais ils répètent ces mots jusqu'à l'obsession. L'Anagbhéisme désire apprendre les cultures étrangères et leurs modes d'apprentissage par une volonté sincère de chercher la connaissance et s'oppose aux sentiments de supériorité culturelle, qualifiant les suprémacistes culturels de « déficients mentaux » et « d'assassins de masse en puissance ». Les Anagbhéistes, un groupe décentralisé de penseurs indifférents ou ignorants de l'histoire de leur tradition au-delà de son origine à Amgremós, sont xénophiles presque à l'extrême. Ils écoutent tous ceux qui viennent, et s'opposent violemment à faire honte aux Bharbhen qui s'expriment en leur présence.\n\nSi l'Ordre Sacré de l'§YAnagbhéisme§! est placé dans plus de §Y50%§!([Root.kheionism_anagbheism_var.GetValue]/[Root.kheionism_half_provinces_display_var.GetValue]) et moins de §Y75%§!([Root.kheionism_anagbheism_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nEfficacité commerciale : §G+20.0%§!\n\nSi l'Ordre Sacré de l'§YAnagbhéisme§! est placé dans plus de §Y75%§!([Root.kheionism_anagbheism_var.GetValue]/[Root.kheionism_75_provinces_display_var.GetValue]) des provinces, le modificateur actuel sera remplacé par :\nEfficacité commerciale : §G+20.0%§!\nPolitiques diplomatiques gratuites : §G+1§!"
