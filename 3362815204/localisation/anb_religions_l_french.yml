 desc_bd_act_of_leashed_supplications:0 "Dans les ombres, les fous complotent contre les sages. Que leurs actes ne restent pas inconnus, je t'invoque du lieu derrière le miroir, où l'ascension est de verre et les murs sont de couteaux, surgissez multitudes ! Que nul recoin de ce monde ne reste sans surveillance !"
