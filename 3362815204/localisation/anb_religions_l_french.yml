 skaldhyrric.2.q:0 "J'ai changé d'avis"
 skaldhyrric.3.t:0 "Le Conseil de Toute la Gérudie"
 skaldhyrric.3.d:0 "Tandis que [Root.Monarch.GetTitle] siégeait sur le trône dans la salle de débat, les torches chaudes repoussant le givre extérieur, les Scaldes débattaient sans fin. Maîtres de l'art oratoire qu'ils sont, nul homme ni femme dans la salle ne pouvait détourner le regard tandis qu'ils chantaient les récits du passé, chaque Scalde utilisant les exploits des héros Gérudiens pour justifier ses opinions sur le sujet du jour.\n[Root.Monarch.GetTitle] avait convoqué ce conclave des Scaldes pour les organiser, pour les mettre tous sur la même longueur d'onde afin que la Gérudie puisse s'unir en un seul État et une seule foi contre les Cannoriens du sud. Cela devenait épuisant à chaque minute, quelle que soit l'excellence des talents des Scaldes, leurs querelles semblaient infinies, car nul ne pouvait s'accorder sur lesquels des récits méritaient les plus grands honneurs ou devaient être récités en premier, ou sur d'autres disputes doctrinales.\nAlors que la patience de [Root.Monarch.GetTitle] s'amenuisait, un jeune Scalde se leva et commença à parler d'une voix puissante et vibrante qui résonna dans toute la salle, des paroles comme le tonnerre, et avec un mépris glacial.\n« Frères et sœurs, nous devrions avoir honte de nous-mêmes. Notre grand souverain nous a convoqués ici non pour nous quereller comme des enfants, mais pour nous asseoir en tant que communauté de foi et nous assurer que la Gérudie reste unie. »\nCette déclaration audacieuse reçut des huées et des sifflets de nombreux Scaldes présents, mais attira aussi l'attention de [Root.Monarch.GetTitle].\n« Bien, ignorez-moi si vous le souhaitez. Calomniez mon nom de Revrhavn à Urviksten, car je suis Radulfr, et bien que certains d'entre vous se contentent de réveiller Elkaesal avec vos disputes, j'ai l'intention de faire ce pour quoi j'ai été convoqué. »\nRadulfr se tourna vers [Root.Monarch.GetTitle] siégeant sur le grand trône de la salle.\n« Mon seigneur, vous avez convoqué ce conclave des Scaldes afin que notre peuple ne soit plus jamais sans guide, afin que les chants de la Gérudie ne se taisent jamais même face à nos pires ennemis. Je vous demande humblement de me commander un récit, afin que je puisse maintenant mener ce conseil à rassembler les fidèles. »"
