  cheshoshi_religion:0 "Cheshoshi"
 tanibic_religion:0 "Panthéons Tanibiques"
  nakavy_avo:0 "Nakavy Avo"
  nakavy_avo_religion_desc:0 "Nakavy Avo, littéralement « Grande Famille », est un panthéon de dieux vénérés principalement par les Vyzemby de Fahvanosy. Les dieux et déesses composent une grande famille étendue qui sont vénérés par le chant, la danse et la joie. Les disciples ont tendance à choisir une divinité patronne de la famille qui représente un idéal qu'ils souhaitent incarner, bien que tous fassent partie de la Grande Famille et soient exaltés comme tels."
    lel:0 "Lel"
    lel_desc:0 "Lel ! Grande matriarche de notre famille ! Si fort est ton amour apaisant que tu as une fois apprivoisé la flamme brûlant dans le cœur de Turozi. Maîtresse des vagues, mère nourricière, nous chantons tes louanges par-dessus tous les autres !\n\n§TPosséder le Sanctuaire à §YLelanàn§! nous accordera§!\nAmélioration des relations : §G+7,5 %§!"
    kolo:0 "Kolo"
    kolo_desc:0 "Kolo ! Père de la richesse, seigneur de l'abondance ! Nous louons ton nom quand les pierres sont posées et les cultures semées. Nous sentons ta présence par-dessus tous les autres dans le sol même sous nos pieds, époux de Lel, colonne vertébrale de notre famille !\n\n§TPosséder le Sanctuaire à §YKunolo (Kolonoma)§! nous accordera§!\nCapacité de combat de cavalerie : §G+5 %§!"
    the_nakazy:0 "Nakazy"
    the_nakazy_desc:0 "Nakazy ! Les ailes sur lesquelles nos âmes fatiguées viennent se reposer ! Filles de Lel et Kolo, vents qui secouent les arbres, oiseaux chanteurs et plumes colorées, nous invoquons votre sagesse !\n\n§TPosséder le Sanctuaire à §YLelajik§! nous accordera§!\nModificateur de coût de stabilité : §G-10 %§!"
    turozi:0 "Turozi"
    turozi_desc:0 "Turozi ! Flamme de guerre, esprit de vengeance ! Amant au sang chaud de Lel et frère de Kolo, aucune bataille n'est hors de ta portée. Nous invoquons ta férocité et ta passion pour nous enhardir à protéger notre famille !\n\n§TPosséder le Sanctuaire à §YOfavi§! nous accordera§!\nPrestige des batailles terrestres : §G+100 %§!"
    yuye:0 "Yuye"
    yuye_desc:0 "Yuye ! Maître des tempêtes, brillant guerrier ! Le sang de Turozi et Lel coule en toi, courageux guerrier, protecteur de notre liberté. Seigneur des torrents, guide notre peuple vers l'œil de la tempête !\n\n§TPosséder le Sanctuaire à §YAnàniltra§! nous accordera§!\nTradition militaire annuelle : §G+0,25§!"
    ozamdi:0 "Ozamdi"
    ozamdi_desc:0 "Ozamdi ! Fidèle chien, gardien chéri de la famille ! Ô compagnon honorable, chasseur mortel, ton dévouement est un exemple pour nous tous. Montre-nous comment nous devrions être !\n\n§TPosséder le Sanctuaire à §YTibokbo§! nous accordera§!\nVitesse de renfort : §G+10 %§!"
    jyva:0 "Jyva"
    jyva_desc:0 "Jyva ! Dame du mystère et de la magie, sœur de Lel, maîtresse de Kolo ! Sorcière aux écailles changeantes, froide et calculatrice, nous cherchons à incarner ta brillance !\n\n§TPosséder le Sanctuaire à §YAngoitra§! nous accordera§!\nCapacité de siège : §G+5 %§!"
    ytrai:0 "Ytrai"
    ytrai_desc:0 "Ytrai ! Dieu de la forge, seigneur de la chance et de la joie ! Enfant de Kolo et Jyva, maître de l'industrie, tu incarnes le meilleur des qualités de ta mère et de ton père. Nous dédions notre travail à ton nom !\n\n§TPosséder le Sanctuaire à §YMboikata§! nous accordera§!\nMarchandises produites : §G+2,5 %§!"
    drongray:0 "Drongray"
    drongray_desc:0 "Drongray ! Ami à sang froid pour nous tous ! Patron des Hommes-Lézards, habitant des jungles profondes, les marins survivent grâce à ta guidance par la lune et les étoiles. Apprends-nous à prospérer là où nul autre ne pourrait !\n\n§TPosséder le Sanctuaire à §YTeramzadai§! nous accordera§!\nAttrition terrestre : §G-7,5 %§!"
    elinao:0 "Elinalo"
    elinao_desc:0 "Elinalo ! Compteur de pièces, sauveur, seigneur marchand des grands, nous te sommes éternellement redevables pour ton service envers notre espèce. Nos navires marchands voguent sur les mers en chantant des louanges à ton nom !\n\n§TPosséder le Sanctuaire à §YJakavafo§! nous accordera§!\nTradition navale annuelle : §G+0,25§!"
    begga2:0 "Begga"
    begga2_desc:0 "Begga ! Ton lien de sang peut être ténu, mais tu fais néanmoins partie de la famille. Désintéressé et charitable envers les défavorisés, apprends-nous comment traiter notre famille et ses amis !\n\n§TPosséder le Sanctuaire à §YLoranakodro§! nous accordera§!\nRéputation diplomatique : §G+1§!"
    nakinta:0 "Nakinta"
    nakinta_desc:0 "Nakinta ! Sage ancien, sculpteur du monde, intemporel et pourtant ancien ! Ta mémoire est une tapisserie sans fin de connaissances. Accorde-nous un aperçu de ta brillance qui brille comme les étoiles innombrables que tu as laissées pour nous guider !\n\n§TPosséder le Sanctuaire à §YMapiltra§! nous accordera§!\nCoût des idées : §G-5 %§!"


  noukahi_pantheon:0 "Panthéon Noukahi"
  noukahi_pantheon_religion_desc:0 "Le Panthéon Nouakahi est une collection vaguement connectée d'histoires sur des figures héroïques pour les peuples Vurebindu et Irsukuba de Horashesh. La religion emprunte fortement aux mythes voisins de Fangaula, Nakavy Avo et Khétistes, ce qui signifie qu'il y a très peu de thèmes unificateurs. Au lieu de cela, chaque récit a des enseignements et des significations différents, variant souvent selon la personne qui raconte l'histoire."

  fangaulan_pantheon:0 "Panthéon Fangaulan"
  fangaulan_pantheon_religion_desc:0 "Le Panthéon Fangaulan vénère les ancêtres, les animaux totémiques et les primordiaux comme des « aspects » divins de Dieu, gouvernant le monde après le meurtre de Dieu par les génies. Le chef du Panthéon est Aro, le héros mi-génie et fondateur du Premier Empire Fangaulan, qui a libéré l'humanité de la tyrannie des génies. Chaque adorateur porte un talisman représentant une divinité gardienne du Panthéon, appelé gris-gris. Les fidèles croient que ces talismans confèrent des protections divines et doivent être rechargés dans un lieu saint chaque semaine."


