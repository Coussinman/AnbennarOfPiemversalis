 forced_malleability:0 "§lLoi de Malléabilité Forcée§!"
 bd_law_of_forced_malleability_4_effect_tt:0 "Répartit §G4§!£icon_development_in_text£, et §G4§!£icon_production_in_text£ parmi des provinces spécifiques"
 bd_law_of_forced_malleability_2_effect_tt:0 "Répartit §G2§!£icon_development_in_text£, et §G2§!£icon_production_in_text£ parmi des provinces spécifiques"
 bd_law_of_forced_malleability_1_effect_tt:0 "Répartit §G1§!£icon_development_in_text£, et §G1§!£icon_production_in_text£ parmi des provinces spécifiques"
 bd_law_of_forced_malleability_effect_tt:0 "Réduction de l'Inflation : §G0.2§!, Coût de Construction : §G-10%§!"
 desc_forced_malleability:0 "Les liens du monde mortel ne nous entraveront plus. Œuvrons sans limites, sans poids ni hauteur ni haut ni bas. La réalité se plie à ma volonté, et vous, mes fidèles, forgerez mon empire là où elle se déforme.\n\nObtient un modificateur accordant Réduction de l'Inflation : §G0.2§! et Coût de Construction : §G-10%§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus de répartir du £icon_development_in_text£ aléatoirement parmi les provinces de la Doctrine Noire et du £icon_production_in_text£ parmi les provinces produisant de la Damestear, des Reliques Précurseurs ou possédant une Tour de Mage, une Maîtrise de la §GTransmutation§! et un §YAbsolutisme§!£icon_absolutism£ plus élevés signifient plus de développement réparti."
 bd_law_of_forced_malleability:0 "Loi de Malléabilité Forcée"
 desc_bd_law_of_forced_malleability:0 "Les liens du monde mortel ne nous entraveront plus. Œuvrons sans limites, sans poids ni hauteur ni haut ni bas. La réalité se plie à ma volonté, et vous, mes fidèles, forgerez mon empire là où elle se déforme."
