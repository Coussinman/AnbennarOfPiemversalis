 means_to_an_end:0 "La Fin Justifie les Moyens"
 desc_means_to_an_end:0 "Les souvenirs de la Voie Dévorante sont les plus tendres à Shamakhad. Ici résidait le Maître Ténébreux. Ici se trouvait le Sir Ekata. Ici demeurent des maisons cachées et des regards sympathisants. Ici l'aide peut être trouvée, des oreilles bienveillantes peuvent être tournées. L'équilibre du gouvernement vacille sur son axe, et il penche à gauche."
 means_to_an_end_mod:0 "Afflux de Chi : La Fin Justifie les Moyens"
 means_to_an_end_effect_tt:0 "Gagnez §G1§! émissaire de chaque type et §Gdoublez§! leur vitesse"
