 #tooltip
 khudai_req_tooltip:0 "Sélectionnez deux éléments et un objectif pour commencer le rituel. Méfiez-vous de l'ordre élémentaire et de leur but, car les traiter à la légère aura de sombres conséquences. Les effets du rituel doivent se dissiper avant qu'un nouveau puisse commencer."


 #Kinbond
 kinbond:0 "Kinbond"
 kinbond_religion_desc:0 "Le Kinbond est le nom du lien télépathique partagé par les Maudits, et en tant que tel est au centre de leurs croyances spirituelles.\n\nLes Maudits croient que le Grand Créateur façonna le monde et le peupla des Premiers Peuples, pour ensuite réaliser qu'ils étaient imparfaits, et décida donc de purger le monde dans un grand gel. Alors que la plupart des esprits étaient d'accord avec le Grand Créateur, l'un d'eux, connu comme l'Esprit de l'Est, se rebella contre lui, et sélectionna ceux des Premiers Peuples les plus dignes pour recevoir une partie de son âme sous la forme du Kinbond, afin qu'ils se comprennent et ne combattent pas entre eux. L'Esprit de l'Est se sacrifia ensuite au Soleil pour empêcher le gel de consumer le monde, ses cendres tombant sur la terre qui deviendrait la Forêt des Maudits.\n\nLes élus de l'Esprit de l'Est allèrent former les Familles, chaque Famille ayant une âme partagée remontant à leurs ancêtres de l'époque du gel. Les membres d'une Famille vénèrent leurs ancêtres en récitant leurs récits et en les imitant dans leurs propres vies, résultant en chaque Famille ayant sa propre épopée retraçant leur histoire au fil des siècles."

  #HP Flavour
 found_the_nam_labeda_title:0 "Fonder le Nam Labeda"
 found_the_nam_labeda_desc:0 "Historiquement, les gourous des écoles de Darsanasara ont toujours été quelque peu itinérants, voyageant de lieu en lieu pour discuter et débattre avec leurs pairs et fournir leur sagesse au peuple. Malgré cela, le rôle de ces enseignants a rarement été de prêcher et de convertir, mais de guider ceux qui se trouvaient déjà ostensiblement dans la sphère religieuse de la Haute Philosophie. Pour apporter la sagesse des Hauts Dieux à de nouveaux peuples, un ordre spécialisé d'itinérants sera nécessaire, ceux qui sont formés aux coutumes locales et aux structures politiques, qui traverseront un climat rude et une terre incertaine pour atteindre même les plus lointains et isolés des peuples."
 HP_nam_labeda:0 "Nam Labeda"
 HP_nam_labeda_desc:0 "Historiquement, les gourous des écoles de Darsanasara ont toujours été quelque peu itinérants, voyageant de lieu en lieu pour discuter et débattre avec leurs pairs et fournir leur sagesse au peuple. Malgré cela, le rôle de ces enseignants a rarement été de prêcher et de convertir, mais de guider ceux qui se trouvaient déjà ostensiblement dans la sphère religieuse de la Haute Philosophie. Pour apporter la sagesse des Hauts Dieux à de nouveaux peuples, un ordre spécialisé d'itinérants sera nécessaire, ceux qui sont formés aux coutumes locales et aux structures politiques, qui traverseront un climat rude et une terre incertaine pour atteindre même les plus lointains et isolés des peuples."
 rule_mendab_title:0 "Gouverner Mendab"
 rule_mendab_desc:0 "Mendab est un ancien terme pour un pavillon, et était utilisé à l'époque des Rahenrajas pour décrire le gouvernement des rajas quand les affaires étaient conduites en dehors des résidences royales formelles. Depuis, « Gouverner Mendab » a évolué comme terme pour impliquer que le gouvernement est activement impliqué dans la gestion des affaires à travers le royaume et voyagera pour traiter les choses directement. Gouverner Mendab est vu comme le signe d'un souverain juste, et ceux qui ont la capacité d'administrer les affaires de cette façon le font souvent."
 HP_rule_mendab:0 "Gouverner Mendab"
 HP_rule_mendab_desc:0 "Mendab est un ancien terme pour un pavillon, et était utilisé à l'époque des Rahenrajas pour décrire le gouvernement des rajas quand les affaires étaient conduites en dehors des résidences royales formelles. Depuis, « Gouverner Mendab » a évolué comme terme pour impliquer que le gouvernement est activement impliqué dans la gestion des affaires à travers le royaume et voyagera pour traiter les choses directement. Gouverner Mendab est vu comme le signe d'un souverain juste, et ceux qui ont la capacité d'administrer les affaires de cette façon le font souvent."
 convoke_idisarindat_title:0 "Convoquer l'Idisarindat"
 convoke_idisarindat_desc:0 "Un dirigeant sage doit être bien conseillé, et la plus grande sagesse peut souvent être recherchée auprès de sources religieuses. La convocation d'un Idisarindat, une communion de nobles aisés et d'érudits respectés, peut améliorer notre compréhension des prochaines étapes à franchir sur le Nitikamarja."
 HP_convoke_idisarindat:0 "Convoquer l'Idisarindat"
 HP_convoke_idisarindat_desc:0 "Un dirigeant sage doit être bien conseillé, et la plus grande sagesse peut souvent être recherchée auprès de sources religieuses. La convocation d'un Idisarindat, une communion de nobles aisés et d'érudits respectés, peut améliorer notre compréhension des prochaines étapes à franchir sur le Nitikamarja."
 proclaim_anjitaranga_title:0 "Proclamer l'Anjitaranga"
 proclaim_anjitaranga_desc:0 "Le dieu barbu Anjita, seigneur de tous les guerriers, maître de l'arc, a de nombreux fidèles qui s'efforcent d'être comme lui en toutes choses. Ceux qui aspirent à atteindre les mêmes sommets de vaillance et de gloire sont Anjitaranga, chercheurs d'Anjita. Comme [Root.Monarch.GetTitle] [Root.Monarch.GetName] est bien connu pour son habileté martiale, nul ne douterait de la sincérité d'une proclamation de suivre Anjita."
 HP_proclaim_anjitaranga:0 "Proclamer l'Anjitaranga"
 HP_proclaim_anjitaranga_desc:0 "Le dieu barbu Anjita, seigneur de tous les guerriers, maître de l'arc, a de nombreux fidèles qui s'efforcent d'être comme lui en toutes choses. Ceux qui aspirent à atteindre les mêmes sommets de vaillance et de gloire sont Anjitaranga, chercheurs d'Anjita. Comme [Root.Monarch.GetTitle] [Root.Monarch.GetName] est bien connu pour son habileté martiale, nul ne douterait de la sincérité d'une proclamation de suivre Anjita."
 reorganise_chalanevaala_title:0 "Réorganiser les Chalanevaala"
 reorganise_chalanevaala_desc:0 "Les divers enseignants itinérants du royaume sont loin d'être organisés, bien qu'il existe un esprit reconnu de camaraderie parmi eux quelle que soit leur école ou origine. Contrôler et diriger ces mendiants est souvent bien au-delà de la portée du pouvoir de l'État, mais avec un gestionnaire habile comme [Root.Monarch.GetTitle] [Root.Monarch.GetName] à la barre, il pourrait être possible de promouvoir ceux parmi les errants qui sont favorables aux idéologies approuvées par l'État et de rallier tout dissident à notre façon de voir les choses."
 HP_reorganise_chalanevaala:0 "Réorganiser les Chalanevaala"
 HP_reorganise_chalanevaala_desc:0 "Les divers enseignants itinérants du royaume sont loin d'être organisés, bien qu'il existe un esprit reconnu de camaraderie parmi eux quelle que soit leur école ou origine. Contrôler et diriger ces mendiants est souvent bien au-delà de la portée du pouvoir de l'État, mais avec un gestionnaire habile comme [Root.Monarch.GetTitle] [Root.Monarch.GetName] à la barre, il pourrait être possible de promouvoir ceux parmi les errants qui sont favorables aux idéologies approuvées par l'État et de rallier tout dissident à notre façon de voir les choses."
 meditation_on_simrals_mirror_title:0 "Méditation sur le Miroir de Simral"
 meditation_on_simrals_mirror_desc:0 "Le Miroir de Simral est parmi les légendes les plus connues des hauts temples. Simral le Sage aurait autrefois créé un trésor de beauté et de vérité absolues : le Simralaeena, un miroir si pur qu'il montrait non seulement le reflet de ceux qui y regardaient, mais révélait la vraie nature de toutes les choses reflétées à sa surface. Selon la légende, c'était un test pour tous les hauts dieux de regarder dans le miroir et de se juger dignes des vantardises qu'ils revendiquaient, et Simral utilisa le miroir à la fois pour devenir le plus érudit des dieux tout en empêchant son ego de grandir trop par excès de confiance. De nos jours, « Regarder dans le Miroir de Simral » est une expression avec deux significations : plonger profondément dans l'étude de sujets complexes, et appliquer un œil critique à ses propres méthodes et nature. Faire les deux requiert une grande habileté et un équilibre du soi, quelque chose que nous devrions faire, si nous en avons la capacité."
 HP_meditation_on_simrals_mirror:0 "Méditation sur le Miroir de Simral"
 HP_meditation_on_simrals_mirror_desc:0 "Le Miroir de Simral est parmi les légendes les plus connues des hauts temples. Simral le Sage aurait autrefois créé un trésor de beauté et de vérité absolues : le Simralaeena, un miroir si pur qu'il montrait non seulement le reflet de ceux qui y regardaient, mais révélait la vraie nature de toutes les choses reflétées à sa surface. Selon la légende, c'était un test pour tous les hauts dieux de regarder dans le miroir et de se juger dignes des vantardises qu'ils revendiquaient, et Simral utilisa le miroir à la fois pour devenir le plus érudit des dieux tout en empêchant son ego de grandir trop par excès de confiance. De nos jours, « Regarder dans le Miroir de Simral » est une expression avec deux significations : plonger profondément dans l'étude de sujets complexes, et appliquer un œil critique à ses propres méthodes et nature. Faire les deux requiert une grande habileté et un équilibre du soi, quelque chose que nous devrions faire, si nous en avons la capacité."
 meditation_on_the_kamalkundal_title:0 "Méditation sur le Kamalkundal"
 meditation_on_the_kamalkundal_desc:0 "L'Enroulement du Lotus, ou Kamalkundal, est un ensemble d'anciens mantras qui nous parviennent depuis l'aube même de la civilisation rahénie. Réputé avoir été écrit par Vadhan le Donneur-de-Vie lui-même, le Kamalkundal réfléchit sur la croissance, la vie et la mort, la lutte de la nature et la place de l'homme en son sein, l'importance de savoir quand appliquer la main douce et le poing fermé, le labeur sans fin de la survie. Comment toutes ces choses englobent la vie, et la nature éternellement croissante et aspirante de la vie. Comment la mort est le début et la fin de la vie, et comment trouver la paix avec ce fait. Le Kamalkundal figure parmi les méditations les plus importantes de l'histoire rahénie, et est un favori parmi les guerriers de grande renommée et d'habileté, qui disent que ses vérités concentrent leurs esprits sur l'immédiat et les rendent prêts pour les rigueurs de la campagne."
 HP_meditation_on_the_kamalkundal:0 "Méditation sur le Kamalkundal"
 HP_meditation_on_the_kamalkundal_desc:0 "L'Enroulement du Lotus, ou Kamalkundal, est un ensemble d'anciens mantras qui nous parviennent depuis l'aube même de la civilisation rahénie. Réputé avoir été écrit par Vadhan le Donneur-de-Vie lui-même, le Kamalkundal réfléchit sur la croissance, la vie et la mort, la lutte de la nature et la place de l'homme en son sein, l'importance de savoir quand appliquer la main douce et le poing fermé, le labeur sans fin de la survie. Comment toutes ces choses englobent la vie, et la nature éternellement croissante et aspirante de la vie. Comment la mort est le début et la fin de la vie, et comment trouver la paix avec ce fait. Le Kamalkundal figure parmi les méditations les plus importantes de l'histoire rahénie, et est un favori parmi les guerriers de grande renommée et d'habileté, qui disent que ses vérités concentrent leurs esprits sur l'immédiat et les rendent prêts pour les rigueurs de la campagne."


#Uelos Cult

uelos_cult:0 "Culte d'Uelos"
uelos_cult_religion_desc:0 "Fidèles du Primordial Uelos, frère de Halanna, seigneur des eaux. Bien que la plupart des fidèles de la Cour Régente ne vénèrent pas Uelos, le croyant soit mort soit inactif de chagrin après avoir perdu sa sœur, les Uelairey continuent son culte, et son culte s'est répandu dans de nombreux ports à travers Cannor et au-delà."

###Aspects

uelos_avenging_kraken:0 "Uraes, le Kraken Vengeur"
desc_uelos_avenging_kraken:0 "Uelos fait rage sous les vagues, pleurant la mort de sa chère sœur, maudissant le monde qui a continué sans elle. Rien n'incarne cette rage plus qu'Uraes, sa bête héraldique de tempête, qui brasse les eaux sans fin, la terreur de tous ceux qui s'aventurent dans les flots."
uelos_spectral_whale:0 "Bacifices, la Baleine Spectrale, Sérénité d'Uelos"
desc_uelos_spectral_whale:0 "Uelos coule sous les vagues, méditant sur la nature des choses, contemplant l'étendue insondable de son royaume saumâtre. Rien n'incarne cela comme Bacifices, la plus grande de toutes les bêtes, qui dérive à travers les profondeurs, enveloppée de sérénité."
uelos_lightning_sailfish:0 "Volaces, le Voilier-Éclair, Élan d'Uelos"
desc_uelos_lightning_sailfish:0 "Uelos chevauche sous les vagues, filant sous les eaux pour veiller sur son vaste domaine, toujours avançant sur un char d'hippocampes. Rien n'incarne cela comme Volaces, chevalier des profondeurs, qui charge ses ennemis et porte des coups contre tous ceux qui menaceraient les domaines de son suzerain."
uelos_devouring_shark:0 "Battirus, le Requin Dévoreur, Faim d'Uelos"
desc_uelos_devouring_shark:0 "Uelos a faim sous les vagues, dévorant ses sujets, car tel est le cycle de la vie. Rien n'incarne cela comme Battirus, le barbare zélé de leur Roi, qui dévore toutes sortes de poissons et d'animaux, ne cessant jamais de chasser ou de se nourrir."
uelos_eternal_jellyfish:0 "Cyres, la Méduse Éternelle, Permanence d'Uelos"
desc_uelos_eternal_jellyfish:0 "Uelos vit sous les vagues, bien que beaucoup le croient péri par la mort de sa sœur, Halanna. Rien n'incarne cela comme Cyres, l'érudit permanent et pieux, qui se renouvelle dans un cycle infini de croissance, de déclin et de retour."
uelos_endless_coral:0 "Sedecules le Corail Infini, Prospérité d'Uelos"
desc_uelos_endless_coral:0 "Uelos construit sous la mer, érigeant de grands champs, fermes et prairies, habités par nul autre que les grandes Anguilles des Profondeurs des fonds marins. Rien n'incarne cela comme Sedecules, le grand architecte de la mer, érigeant les cités colorées du Royaume sous-marin d'Uelos, de hautes tours grattant les cieux aquatiques."
uelos_mourning_cuttlefish:0 "Vlessus, la Seiche en Deuil, Lamentation d'Uelos"
desc_uelos_mourning_cuttlefish:0 "Uelos pleure sous la mer, éperdument affligé par la perte de sa sœur disparue, Halanna, se demandant ce qu'il aurait pu faire d'autre. Rien n'incarne cela comme Vlessus, la pleureuse des profondeurs, qui réconforte sans cesse le seigneur des marées, apaisant son angoisse."
uelos_deep_one:0 "Le Profond"
desc_uelos_deep_one:0 "Uelos Est. Il est en Deuil, Éternel, Paisible, Courroucé, mille émotions, mille visages. Les autres dieux sont sans importance, car ils marquent à peine ce monde, tandis qu'Il est dans l'esprit de chaque marin, le rêve de chaque enfant qui attend le jour où il pourra prendre la mer. Il est l'insondable Roi-Saumâtre, Seigneur des Profondeurs, que nous craignons et louons et aimons."

### Uelos rebels
uelos_cult_rebels_demand:0 "Convertir $COUNTRYNAME$"
uelos_cult_rebels_demand_desc:0 "Les rebelles religieux combattent pour le $RELIGION$. Ils exigent que nous reconnaissions sa suprématie ou, à tout le moins, que nous cessions nos efforts pour les convertir et les laissions pratiquer leur culte en paix."
uelos_cult_rebels_title:0 "Religieux"
uelos_cult_rebels_name:0 "Zélotes $RELIGION$"
uelos_cult_rebels_desc:0 "Les fanatiques religieux ont tendance à se soulever dans les provinces contrôlées par des nations d'une foi différente. Ils cherchent à répandre leur foi et à châtier tous les mécréants."
uelos_cult_rebels_army:0 "Armée $RELIGION$"


