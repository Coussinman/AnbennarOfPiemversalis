 the_god_eaters_cost_tt:0 "\n§YLes Dévoreurs de Dieux§! : Prestige par développement du missionnaire : §R-0,15§!"
 the_dead_serve_the_living_preview:0 "Les Morts Servent les Vivants"
 desc_the_dead_serve_the_living_preview:0 "C'est le droit des vivants d'utiliser les morts à leurs propres fins, que ce soit en déformant l'histoire de leur vie ou en invoquant leur nom pour des causes qu'ils n'auraient jamais célébrées. Nulle part cela n'est plus littéralement vrai qu'à Haless, où les fantômes des ancêtres peuvent être asservis, consumés, transformés en puissance brute, réduits en esclavage. Le terrible pouvoir de la mort est qu'elle transforme l'être en non-personne."
 the_dead_serve_the_living:0 "Les Morts Servent les Vivants"
 desc_the_dead_serve_the_living:0 "C'est le droit des vivants d'utiliser les morts à leurs propres fins, que ce soit en déformant l'histoire de leur vie ou en invoquant leur nom pour des causes qu'ils n'auraient jamais célébrées. Nulle part cela n'est plus littéralement vrai qu'à Haless, où les fantômes des ancêtres peuvent être asservis, consumés, transformés en puissance brute, réduits en esclavage. Le terrible pouvoir de la mort est qu'elle transforme l'être en non-personne."
