 skaldhyrric.4.t:0 "Canonisation de Nouveaux Récits"
 skaldhyrric.4.d:0 "Suivant l'héritage du Premier Conseil Scaldique, une nouvelle génération de réformateurs scaldiques se tient maintenant devant le Konungr. Étudiants et disciples de Radulfr, l'homme qui devint connu comme le Grand Récitant des Sagas, le seul à avoir porté ce titre désormais infâme. Mais Radulfr est mort depuis longtemps, et la Foi s'est étendue bien au-delà de ce qu'il aurait jamais pu imaginer, et ces Scaldes qui portent son héritage font maintenant appel au Konungr pour qu'il fasse un choix comme leur ancêtre le fit quand il ordonna à Radulfr de chanter.\nAlors que notre royaume s'est étendu loin et au large, de nouveaux récits s'ajoutent à l'histoire de notre peuple, et les Scaldes du royaume ont commencé à chanter le présent, pas seulement le passé. Un signe de la puissance croissante de la Gérudie certes, mais aussi un signe que le trône doit intervenir une fois de plus pour guider les Scaldes. L'un des réformateurs prend la parole, présentant un parchemin au Konungr.\n« Grand seigneur, je suis Signy, et mes compagnons Scaldes m'ont choisie pour présenter nos conclusions sur la foi. »\nLe Konungr prend le parchemin et commence à lire.\n« Ces quatre récits sont ceux que nous pensons que la couronne devrait parrainer afin que le peuple puisse en tirer des enseignements. Premièrement, la redécouverte de la fabrication de l'Givre Ébène, le grand métal de nos ancêtres. Deuxièmement, la colonisation d'Ambrströnd il y a tant d'années, et l'héritage des Gérudiens qui vivent encore en Aelantir. Troisièmement, les récits des pillards et aventuriers qui conquirent des royaumes cannoriens, comme vous et votre dynastie l'avez fait. Et enfin, le récit d'Olav et Urvik, l'origine de notre peuple, et l'origine de notre force. »\nSigny se leva et s'inclina tandis que le Konungr lisait les chants composés.\n« Tous sont précieux pour nous aujourd'hui, mais prononcez simplement le mot et nous commencerons à en chanter un jusqu'aux confins de la Gérudie où votre peuple écoutera. »"
 skaldhyrric.4.a:0 "L'Einherjar d'Acier Ébène"
 skaldhyrric.4.b:0 "Les Annales d'Ambrströnd"
 skaldhyrric.4.c:0 "Les Lignées des Aventuriers Gérudiens"
 skaldhyrric.4.dd:0 "Olav et Urvik, les Premiers Gérudiens"
 skaldhyrric.5.title:0 "Échos de Victoire"
 skaldhyrric.5.d:0 "[Root.Monarch.GetTitle] n'a pas l'intention d'écouter aux portes. Les voix des serviteurs portent depuis la cour, faisant écho sur les toits escarpés du Pavillon d'Hiver et atteignant les passerelles supérieures. L'appeler pavillon est un euphémisme, bien sûr, puisqu'il s'étend sur une immense surface et peut héberger presque toute la cour impériale, mais néanmoins c'est un lieu qui invite à la détente, une base fabuleuse pour la chasse avec une vue dominante sur un lac immaculé. Même maintenant, alors que l'hiver approche, il y a des jours merveilleusement clairs, vifs mais magnifiques. Les serviteurs et porteurs sont plus à l'aise ici. Les courtoisies ne disparaissent pas, mais chacun respire un peu. Malgré [Root.Monarch.GetHerHim]-même, [Root.Monarch.GetName] écoute.\n\n« C'est Leiv », dit Arne, un serviteur de petite stature. « Un tricheur, un homme rusé. Comme nous avons déjoué les ennemis qui ne pensaient rien de nous, ainsi fit Leiv. » Il y a une lueur dans ses yeux, la promesse que les apparemment faibles se révéleront autrement.\n\n« Ridicule », répond Yoeren, tirant sur sa pipe. « Les Scaldes n'existent pas pour vous conjurer une botte à lécher. Les récits sont nos guides, nos avertissements. Le Trésor de la Forêt Dorée. »\n\nUn grand gaillard des cuisines lève les yeux au ciel, [Root.Monarch.GetName] ne se souvient pas de son nom, seulement de la pitié des cicatrices d'acné sur son front. « Gjalund débarque et décapite un tas de fichus géants, ça me suffit. Je reçois assez de conséquences morales de vous autres quand j'oublie de verrouiller le garde-manger, je prendrai bien un ou deux massacres, merci. »\n\n[Root.Monarch.GetName] ne peut s'empêcher de sourire. Les pavés de la cour sont propres et en bon état, l'armurerie bien garnie. Au-delà des murs du Pavillon s'étendent de vastes territoires, des villes prospères, des routes sûres, des mers domptées et une grande fierté. Ces serviteurs sont mieux nourris et plus oisifs que tous ceux de l'histoire du pays, même dans la résidence d'un [Root.Monarch.GetTitle]. Des millénaires d'histoire skaldhyrrique s'étendent derrière eux, à cueillir comme une prune de printemps. Le sourire de [Root.Monarch.GetName] dure tout le chemin jusqu'au fauconnier, et finalement il pense que le plus grand récit est absolument clair, et qu'en fait il mériterait bien une nouvelle édition, une commémoration du règne :\n\n"
 skaldhyrric.5.a:0 "Le Dragon et le Scalde"
 skaldhyrric.5.b:0 "Le Voyage du Pillard du Nord"
 skaldhyrric.5.c:0 "La Saga de Beralic"
 skaldhyrric.5.dd:0 "Le Chant Funèbre des Profondeurs"
 skaldhyrric.5.e:0 "Le Trésor de la Forêt Dorée"
 skaldhyrric.5.f:0 "La Vieille Berceuse de l'Hiver"
 skaldhyrric.5.g:0 "Gjalund et les Pourfendeurs de Géants"
 skaldhyrric.5.h:0 "Les Maîtres Constructeurs de Navires de la Lointaine Gérudie"
 skaldhyrric.5.i:0 "Le Conte de Leiv Langue-de-Serpent"
 skaldhyrric.5.j:0 "L'Épopée de Givre Ébène"
 skaldhyrric.5.k:0 "Le Sacrifice de Corin"
 skaldhyrric.5.l:0 "Les Voyages Elfiques"
 skaldhyrric.5.m:0 "L'Einherjar d'Acier Ébène"
 skaldhyrric.5.n:0 "Les Annales d'Ambrströnd"
 skaldhyrric.5.o:0 "Les Lignées des Aventuriers Gérudiens"
 skaldhyrric.5.p:0 "Olav et Urvik, les Premiers Gérudiens"
 skaldhyrric.5.t:0 "Le Conseil de Toute la Gérudie"
 skaldhyrric.7.t:0 "Un Nid de Rats"
 skaldhyrric.7.d:0 "La place d'un héros est loin dans les contrées sauvages, à pourfendre la bête déchaînée qui a terrorisé les terres. Ou à défendre les sans-défense, repoussant une horde de trolls. Mais aujourd'hui, ce héros arpente les rues animées et les ruelles étroites. De vulgaires voleurs ont créé une sorte d'alliance, dérobant aux riches comme aux pauvres. Allégeant la bourse du percepteur, et par conséquent les coffres du trésor royal. Bien que ce ne soit pas une aventure aux proportions épiques, l'Einher traquera ces malfrats jusqu'à l'antre où résident leurs chefs. Avec les têtes, au sens propre, de cette organisation criminelle tranchées, l'ordre et la prospérité reviendront dans cette ville."
 skaldhyrric.7.a:0 "L'or pue encore..."
 skaldhyrric.8.t:0 "À Peine l'Effort"
 skaldhyrric.8.d:0 "De vulgaires bandits ont harcelé les arrière-pays trop longtemps. Des misérables, impatients de voler les travailleurs honnêtes et vertueux, les blâmant pour leurs malheurs. Bien qu'ils soient petits et pathétiques, comme des souris ils se sont facilement cachés dans les recoins sombres de la campagne, échappant à nos percepteurs zélés. Mais face à un Einher solitaire, marchant seul sur la route désolée, ils ne purent s'empêcher de le délester de ses biens. Et bientôt, les bandits se retrouvèrent soulagés de leur or, de leurs membres et de leurs têtes. Leurs camps cachés dans les bois furent découverts et brûlés. Peut-être que certains s'échappèrent, mais leurs mésaventures sont terminées depuis longtemps, tremblant de peur face à cette incarnation de la justice."
 skaldhyrric.8.a:0 "Pas tout à fait un récit héroïque de légende..."
 skaldhyrric.9.t:0 "Lune Sanglante"
 skaldhyrric.9.d:0 "Une malédiction infâme rôde aux confins de la civilisation, transformant les hommes en bêtes. De Vargrhol aux Grandes-Marches jusqu'au Bois-Maudit, les fermiers ont appris à se cacher et à prier au son de la meute qui approche sous la pleine lune. Loups-garous, sangliers-garous et ours-garous, ces monstres redoutables ne combattent pas seulement avec une sauvagerie bestiale, mais avec la colère et la haine des maudits. Égalant leurs prouesses, l'Einher affronta la bête dans le pâturage sous la pleine lune, hurlant comme une bête enragée tandis qu'il terrassait le chef de la meute. Les Scaldes disent que la prochaine pleine lune sera rouge."
 skaldhyrric.9.a:0 "Allez, accrochez-la au mur !"
 skaldhyrric.10.t:0 "Récupérer Nos Péages"
 skaldhyrric.10.d:0 "Un récit vieux comme le monde, un vrai classique. Les trolls descendent de leurs pics glacés et de leurs profondeurs ténébreuses, avides de ravager nos terres et d'enlever nos citoyens pour leur cruel divertissement. Les Gérudiens ont résisté à cette menace aussi loin que notre mémoire remonte, et nous les avons repoussés aux confins du monde, mais pourtant ils ressurgissent encore pour plus de mal ! Menant un régiment d'élite de guerriers, l'Einher assaillit le campement des trolls et fit couler leur sang infect dans les rivières. Brisant leurs chaînes, les villageois enlevés rayonnent de joie et étreignent leurs bien-aimés qu'ils croyaient ne plus jamais revoir."
 skaldhyrric.10.a:0 "Nos Scaldes seront ravis d'entendre que quelqu'un s'est souvenu du sang de troll !"
 skaldhyrric.11.t:0 "Esprits Frappeurs et Húsvattir"
 skaldhyrric.11.d:0 "Chaque foyer, aussi humble ou grandiose soit-il, est habité par un Húsvattir. Gardiens solitaires, ces esprits protègent la demeure de la malchance en échange d'une petite offrande occasionnelle. De nombreux Gérudiens tolèrent ces créatures, car si elles sont honorées, elles sont souvent bienveillantes, mais certains préfèrent leur absence et choisissent de tuer la créature. Bien que les Húsvattir ne soient pas particulièrement dangereux, ils sont experts pour passer inaperçus, et dans leur colère et leur dépit, ils peuvent causer du chagrin pendant des années. Un tel esprit a manifesté sa colère trop longtemps, et s'est métamorphosé en quelque chose de bien pire. L'Einher affrontera cette menace en suivant les anciennes traditions, offrant un tribut apaisant dans le bon ordre pour l'attirer dehors, avant de frapper au bon moment, mettant miséricordieusement fin à sa misérable existence."
 skaldhyrric.11.a:0 "Enfin, je pourrai dormir paisiblement cette nuit."
 skaldhyrric.12.t:0 "Dompter les Laissés-pour-compte"
 skaldhyrric.12.d:0 "Les gobelins ne sont pas une créature native de la Gérudie, mais on peut parfois les trouver en bandes isolées qui ont investi les anciennes demeures des trolls. Ils imitent aussi les anciens occupants, terrorisant les environs. Mais comparés aux trolls, ce ne sont que de petites créatures. Féroces mais couards, petits de stature mais grands en nombre. Même un fermier moyen peut en vaincre un, mais quand toute la tribu attaque, des villages sont rayés de la carte. Pour éliminer une telle menace, l'Einher a rassemblé une armée pour affronter un tel péril. Frappant de nuit, le chef gobelin fut abattu en pleine bataille. Tenant la couronne du chef en main, le reste des gobelins a déposé les armes et a commencé à suivre l'Einher comme leur chef !"
 skaldhyrric.12.a:0 "... mais ne les amenez pas ici !"
 skaldhyrric.13.t:0 "L'Âme de la Fête"
 skaldhyrric.13.d:0 "Les satyres : créatures forestières cornues et à sabots, obsédées par la boisson et les rituels débauches, pas si différentes de l'ivrogne résident d'une salle d'hydromel ! Et comme l'ivrogne, ils ne savent pas quand arrêter de boire et de faire la fête. Bien qu'un Einher soit souvent amateur de boisson lui-même, il faut un vrai héros pour conclure les festivités et s'assurer que tous dorment en sécurité jusqu'au lendemain. Bien que ce ne soit pas une quête particulièrement sanglante et violente, certains la considèrent comme la tâche la plus difficile de leur carrière !"
 skaldhyrric.13.a:0 "Espérons que leur gueule de bois ne sera pas légendaire aussi !"
 skaldhyrric.14.t:0 "Pas Si Mortel"
 skaldhyrric.14.d:0 "Nombreux sont les monstres d'Aelantir jamais vus auparavant, mais peu égalent le redoutable Wendigo. Hantant les forêts et les lieux sombres, les Wendigos se délectent de chasser et de consommer la chair des gens. On dit même que les Wendigos naissent de ceux qui sont forcés au cannibalisme par désespoir, transformés en monstruosités méconnaissables par la corruption magique persistante du Jour-des-Cieux-Cendrés. Pourtant, ces monstres peuvent être tués, et qui de mieux que les Gérudiens qui ne reculent pas devant le grotesque ? Et avec ces collecteurs de cadavres éliminés, nos nouvelles colonies dans ces terres peuvent prospérer !"
 skaldhyrric.14.a:0 "Un autre trophée pour le mur !"
 skaldhyrric.15.t:0 "Mis au Repos"
 skaldhyrric.15.d:0 "La Gérudie est parsemée d'anciens tumulus d'une époque antérieure même à la Foi Skaldhyrrique, ainsi que des cadavres de ces malheureux jamais incinérés comme il se doit. Relevés par des magies ténébreuses, ces draugr sont connus pour amasser des groupes de pillards et rassembler tribut et contrôle sur leurs environs comme si leurs vies ne s'étaient jamais terminées. Des tumulus engloutis par les tourbières de Haugrmyrr ont émergé des draugr véritablement anciens, prétendant servir les Géants de Givre d'antan. Brandissant du fer corrodé, presque aussi décrépit et usé que leurs esprits pourris, leurs corps craquent et se brisent sous les coups de hache. Un par un, la horde est abattue et brûlée pour qu'elle ne puisse revenir."
 skaldhyrric.15.a:0 "Que le feu garde nos terres au chaud !"
 skaldhyrric.16.t:0 "Exsanguination"
 skaldhyrric.16.d:0 "Des cadavres blêmes vidés de leur sang, abandonnés aux coins des rues et certains même disposés intimement, signes d'un vampire en liberté. Se répandant comme une infection à travers Cannor, les vampires ont fondé des couvents en Gérudie. Les froides nuits hivernales qui décourageraient même les trolls ne font rien contre ces abominations immortelles. Il est temps d'éradiquer les parasites qui se repaissent de nous : les appâter avec des vierges gardiennes-boucliers, et frapper à leur jugulaire ! Qu'ils désespèrent tandis que leur sang vital s'écoule, en représailles pour les innocents qu'ils ont tués !"
 skaldhyrric.16.a:0 "Le sang a été brûlé, n'est-ce pas ?"
 skaldhyrric.17.t:0 "Combat Inégal"
 skaldhyrric.17.d:0 "La plupart des Orques en Gérudie sont arrivés des Orques Gris du Col Septentrional, et restent organisés en groupes menés uniquement par le chef le plus fort. Constamment mis au défi par des duels, un vieux commandant orque est quelqu'un qu'il faut craindre. Ce groupe d'Orques a été particulièrement problématique, refusant de s'assimiler à notre société et pillant et tuant régulièrement. Ils ont aussi refusé toute négociation, et toutes les attaques ont été vaines. La seule réponse appropriée est donc : un duel en tête-à-tête avec leur chef, à mort ! Sans crainte, notre Einher affrontera ce redoutable ennemi, se souvenant du vieil adage : il n'existe pas de combat inégal."
 skaldhyrric.17.a:0 "L'adresse plutôt que la force brute !"
 skaldhyrric.18.t:0 "Un Couvent Démantelé"
 skaldhyrric.18.d:0 "Se cachant à la vue de tous, les sorcières Bheur boitillent vers le sud depuis la Lointaine Gérudie sous l'apparence de pitoyables grand-mères pendant les mois d'hiver. Emmitouflées dans des châles de fourrure, leur peau blême et gelée et leur aura glaciale sont pratiquement imperceptibles contre les bourrasques déchaînées de Gérudie. Ces sorcières préfèrent ne pas maudire directement leurs victimes : elles intensifient simplement le temps froid et insufflent des pensées invasives de désespoir. Pour elles, rien n'est plus doux que de pousser des communautés heureuses à se retourner les unes contre les autres par désespoir de survie, ricanant depuis leurs cavernes glaciales. Emmitouflé dans des fourrures bénies par les Scaldes, l'Einher s'aventure à travers les nombreux hameaux du royaume, à la recherche de Bheurs à éliminer."
 skaldhyrric.18.a:0 "Je suppose qu'une Bheur n'est pas derrière ce jour froid ?"
 skaldhyrric.19.t:0 "Plus de Sacrifices"
 skaldhyrric.19.d:0 "Les longs hivers oisifs engendrent des sentiments dangereux, et d'autant plus quand des forces ténébreuses s'en prennent aux faibles d'esprit. Prétendant parler pour des divinités oubliées depuis longtemps, des forces invisibles, et même Elkaesal le Blanc encore endormi, des chefs de culte ont envoûté une ville entière avec leurs rituels insensés. Pire encore, certains de ces cultes se sont adonnés à des pratiques extrêmes, comme offrir des sacrifices à leur patron. Assez ! Sous un déguisement, notre Einher infiltrera le vil culte et s'offrira comme dernier sacrifice. Quand la cérémonie commencera, il tranchera la tête du serpent, mettant fin à leurs mensonges !"
 skaldhyrric.19.a:0 "Un tome de secrets aussi ?"
 skaldhyrric.20.t:0 "La Chasse Commence !"
 skaldhyrric.20.d:0 "La chasse n'est pas qu'un passe-temps : c'est un mode de vie pour tous les Gérudiens. Des périodes de croissance plus courtes, un temps imprévisible et souvent froid, et un sol pauvre limitent tous ce qui peut être cultivé pour nourrir la population. La pêche est également limitée par des mers tumultueuses et des banquises glaciales. Durant les mois sombres de l'hiver, il est nécessaire que les chasses procurent de la viande pour subsister.\n\nCette tradition a été grandement modifiée : les plus grands des jarls, les plus audacieux des guerriers, et les plus inventifs des Scaldes se rassemblent tous pour traquer les bêtes les plus redoutables ! Contrairement aux méridionaux qui chassent cerfs et sangliers, nous Gérudiens chassons du vrai gibier : des mammouths gigantesques, des lindwurms ondulants, et même des élémentaires de glace vivants ! La poursuite et la mise à mort d'une telle proie cimentent votre statut de puissant chasseur, mais il y a plus à la chasse que la simple mise à mort. Les groupes de chasse doivent être organisés, alliés et ennemis assemblés pour les meilleures positions, c'est un jeu politique en soi. On doit aussi considérer le patron de la chasse : de nombreux chefs choisissent de mener la chasse eux-mêmes, mais certains confient cet honneur et cette responsabilité à leur héritier.\n\nAllez-vous prendre cela sur vous, sonnant le cor de chasse ? Ou votre héritier devrait-il apprendre ses responsabilités ce jour ?"
 skaldhyrric.20.a:0 "Mener la chasse vous-même !"
 skaldhyrric.20.b:0 "Prouve ta valeur, mon héritier."
 skaldhyrric.21.t:0 "La Poursuite"
 skaldhyrric.21.d:0 "Maintenant qu'il a été décidé que vous mènerez la chasse, laquelle de vos compétences allez-vous pratiquer au cours de la chasse ?"
 skaldhyrric.21.a:0 "Coordonner les chemins de chasse"
 skaldhyrric.21.b:0 "Préparer le terrain pour que des alliés clés gagnent en gloire"
 skaldhyrric.21.c:0 "Tuer la bête vous-même !"
 skaldhyrric.22.t:0 "Pratique de Chasse"
 skaldhyrric.22.d:0 "Maintenant qu'il a été décidé que $HEIR$ mènera la chasse, laquelle de ses compétences souhaitez-vous qu'il pratique au cours de la chasse ?"
 skaldhyrric.22.a:0 "Le laisser planifier l'événement"
 skaldhyrric.22.b:0 "Le conseiller sur quels alliés s'attirer les faveurs"
 skaldhyrric.22.c:0 "Préparer une mise à mort glorieuse !"
 skaldhyrric.23.t:0 "Une Question de Littérature Théologique"
 skaldhyrric.23.d:0 "Récemment, un rapport déconcertant a été porté à la cour. Le peuple de [skald_regent_court_outreach.GetName] semble avoir adopté une curieuse fusion de leurs dieux de la Cour et des récits skaldhyrriques. Nos récits ont commencé à être contés dans leurs cercles aux côtés des histoires de leurs dieux, avec le Scalde Manchot raconté aux côtés des histoires de Castellos et Corin. Il est clair qu'avec le temps, ils commenceront à comprendre que leurs dieux sont des histoires du passé, non des chroniques d'êtres divins. Devrions-nous capitaliser sur cette tendance ou serait-il préférable de laisser les choses suivre leur cours naturel ?"
 skaldhyrric.23.a:0 "Castellos, Adean, Corin : tous des héros d'antan comme Olav !"
 skaldhyrric.23.b:0 "Ils sont libres de pratiquer leurs propres récits."
 skaldhyrric.25.t:0 "Épopées Résonnantes"
 skaldhyrric.25.d:0 "De temps en temps, les Scaldes de Gérudie se rassemblent en un seul lieu pour réciter les grands poèmes de notre foi en masse, en compétition amicale les uns avec les autres. Le spectacle est l'une des choses les plus sacrées et excitantes que puissent vivre les pauvres et les démunis de la société, car tous sont invités et encouragés à assister, du noble au roturier. De telles compétitions sont à bien des égards les plus grands rituels de la Foi Skaldhyrrique et même les participants qui ne sont pas croyants sont émerveillés par le spectacle musical et magique de l'événement."
 skaldhyrric.25.a:0 "Vous savez, je suis un peu scalde moi-même"
 skaldhyrric.25.b:0 "Presque aussi bien que dans le bon vieux temps..."
 skaldhyrric.29.t:0 "Récits Hétérodoxes"
 skaldhyrric.29.d:0 "Les récits skaldhyrriques évoluent, changent et se multiplient sans cesse, et ce n'est pas une mauvaise chose. Cependant, il a été porté à notre attention que certains scaldes hétérodoxes ont récité des versions fortement modifiées de récits établis. Les scaldes plus orthodoxes de la cour sont outrés, affirmant que ces récits ne sont que des perversions de la vérité, la prose est maladroite et les affirmations ridicules. Ils exigent que $MONARCHTITLE$ $MONARCH$ mette fin à cela."
 skaldhyrric.29.a:0 "Cessez leurs mensonges !"
 skaldhyrric.29.b:0 "Je ne vois rien de mal au folklore régional"
 skaldhyrric.29.c:0 "Peut-être devrions-nous les canoniser ?"
 skaldhyrric.30.t:0 "La Joie du Chasseur"
 skaldhyrric.30.d:0 "Oh, qui resterait à l'intérieur, à l'intérieur,\nQuand le cor sonne sur la colline ?\nAvec l'air vif qui pique, et les chasseurs qui chantent,\nEt une bête de dix tonnes à tuer !\nAvant que le soleil se couche, se couche,\nNous abattrons le taureau des dix ; et les scaldes chanteront un récit, et nous aurons l'ale,\nQuand nous rentrerons chez nous !\n\nÊtre considéré comme un grand chasseur de gibier est l'une des distinctions les plus recherchées en Gérudie, et quand une grande chasse est convoquée par les scaldes, beaucoup viennent de loin pour y participer. La question vous revient donc : sera-ce une grande occasion pour la noblesse, ou préférez-vous offrir des primes aux roturiers pour les peaux qu'ils vous apportent ?"
 skaldhyrric.30.a:0 "Convoquez les jarls : c'est l'heure de la chasse !"
 skaldhyrric.30.b:0 "Quelques peaux de plus pour les marchés cannoriens"
 skaldhyrric.30.c:0 "Rien de tel qu'une chasse pour rassembler les familles !"
 skaldhyrric.31.t:0 "Le Courroux d'Elkaesal"
 skaldhyrric.31.d:0 "Oh c'est un vaste hiver,\nVenteux de bourrasques,\nDur, âpre et sans horizon, froid,\nEt je ne peux rien faire de plus cette année,\nQu'affûter les épées, réparer l'équipement,\nRaccommoder les toiles, rapiécer les voiles,\nÉcouter les récits contés par les anciens,\nÉcouter les chevaux piétiner dans les étables.\nSentir le sang dans mes veines n'aller nulle part.\n\nL'hiver cette année est exceptionnellement rude, et parmi les fidèles skaldhyrriques, c'est le signe le plus sûr de l'impiété d'un souverain. Car c'est le devoir des scaldes de maintenir le sommeil du dragon blanc, et avec un hiver aussi avide et mordant que celui-ci, beaucoup craignent que le dragon ne remue à nouveau..."
 skaldhyrric.31.a:0 "Par le Scalde Unijambiste, nous endurons"
 skaldhyrric.32.t:0 "Un Manque de Commandement"
 skaldhyrric.32.d:0 "Les Gérudiens, contrairement aux seigneurs méridionaux, ne sont pas liés par la terre pour servir leurs suzerains. Les nôtres doivent donc régner par la force de leur conviction et la force de leur volonté.\nLes temps ont été durs pour le peuple de $COUNTRY$, et beaucoup attribuent l'état déplorable du pays au manque de leadership fort de notre $MONARCHTITLE$. Les choses sont devenues si graves qu'un membre mineur, mais volontaire de la noblesse s'est levé avec une armée, et cherche à renverser $MONARCHTITLE$ $MONARCH$ ! Nous n'avons plus d'autre choix que de les affronter sur le champ de bataille. Nous devons arrêter cette glissade vers l'anarchie."
 skaldhyrric.32.a:0 "S'ils n'écoutent pas mes paroles, qu'ils écoutent ma hache !"

