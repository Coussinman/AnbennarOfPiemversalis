 bd_command_of_forbidden_breach_1_effect_tt:0 "Gagne §G1§! Mercantilisme."
 bd_command_of_forbidden_breach_1_e_effect_tt:0 "Gagne §G1§! Mercantilisme et §G5§! de Loyauté des §Y[This.GetBurghersName]§!."
 bd_command_of_forbidden_breach_2_effect_tt:0 "Gagne §G2§! Mercantilisme."
 bd_command_of_forbidden_breach_2_e_effect_tt:0 "Gagne §G2§! Mercantilisme et §G10§! de Loyauté des §Y[This.GetBurghersName]§!."
 bd_command_of_forbidden_breach_4_effect_tt:0 "Gagne §G4§! Mercantilisme."
 bd_command_of_forbidden_breach_4_e_effect_tt:0 "Gagne §G4§! Mercantilisme et §G20§! de Loyauté des §Y[This.GetBurghersName]§!."
 bd_command_of_forbidden_breach_effect_tt:0 "Efficacité d'Embargo §G50%§!, Puissance Commerciale Intérieure : §G20%§!"
 desc_forbidden_breach:0 "Les oiseaux sont mes oreilles, le soleil est mon œil, les pierres me racontent tout ce dont elles sont témoins. Que nul qui cherche à profiter à mon détriment ne foule la terre qui m'est loyale, de peur que le sol même de Halann ne se dresse contre lui.\n\nObtient un modificateur accordant Efficacité d'Embargo §G50%§! et Puissance Commerciale Intérieure : §G20%§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus de gagner du Mercantilisme et de la loyauté des Bourgeois selon votre Maîtrise de l'§WAbjuration§! et votre §YAbsolutisme§!£icon_absolutism£."
 bd_command_of_forbidden_breach:0 "Commandement de la Brèche Interdite"
 desc_bd_command_of_forbidden_breach:0 "Les oiseaux sont mes oreilles, le soleil est mon œil, les pierres me racontent tout ce dont elles sont témoins. Que nul qui cherche à profiter à mon détriment ne foule la terre qui m'est loyale, de peur que le sol même de Halann ne se dresse contre lui."
 illusory_chains:0 "§VMandat des Chaînes Illusoires§!"
 bd_mandate_of_illusory_chains_1_effect_tt:0 "Les conversions actuellement actives gagneront §G10%§! de progression."
 bd_mandate_of_illusory_chains_2_effect_tt:0 "Les conversions actuellement actives gagneront §G20%§! de progression."
 bd_mandate_of_illusory_chains_4_effect_tt:0 "Les conversions actuellement actives gagneront §G40%§! de progression."
 bd_mandate_of_illusory_chains_effect_tt:0 "Coût de Conversion Culturelle : §G-25%§!, Force Missionnaire §G+2%§!"
 desc_illusory_chains:0 "Qui contrôle le passé contrôle le futur. Qui contrôle le présent contrôle le passé. Que tous les êtres connaissent ceci, la nouvelle Vérité, afin qu'ils soient libérés des rêves insensés et servent d'un cœur joyeux.\n\nObtient un modificateur accordant Coût de Conversion Culturelle : §G-25%§! et Force Missionnaire §G+2%§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus d'accélérer la progression des conversions actives selon votre Maîtrise de l'§VIllusion§! et votre §YAbsolutisme§!£icon_absolutism£"
 bd_mandate_of_illusory_chains:0 "Mandat des Chaînes Illusoires"
 bd_illusory_conversion_helper:0 "Chaînes Illusoires"
 bd_illusory_conversion_unhelper:0 "Chaînes Illusoires"
 desc_bd_mandate_of_illusory_chains:0 "Qui contrôle le passé contrôle le futur. Qui contrôle le présent contrôle le passé. Que tous les êtres connaissent ceci, la nouvelle Vérité, afin qu'ils soient libérés des rêves insensés et servent d'un cœur joyeux."
 anointment_of_wrath:0 "§ROnction de Courroux§!"
 bd_anointment_of_wrath_4_effect_tt:0 "Obtient un Général avec §G80§! de tradition et §G+4§! de choc de commandant."
 bd_anointment_of_wrath_2_effect_tt:0 "Obtient un Général avec §G40§! de tradition et §G+2§! de choc de commandant."
 bd_anointment_of_wrath_1_effect_tt:0 "Obtient un Général avec §Y20§! de tradition et §G+1§! de choc de commandant."
 bd_anointment_of_wrath_effect_tt:0 "Dégâts de Choc : §G15%§!, Score de Guerre des Batailles : §G15%§!"
 desc_anointment_of_wrath:0 "Je tue où je veux et nul n'ose résister ! Moi seul commande la destruction ! Le choc de ma voix est un coup de tonnerre, mes légions un ouragan, et ma volonté... la mort ! Lève-toi, mon héraut, et porte mon commandement sur les faibles !\n\nObtient un modificateur accordant Dégâts de Choc : §G15%§! et Score de Guerre des Batailles : §G15%§! pendant §Y10§! ans (et réduit le gain de pouvoir), en plus d'obtenir un général avec des statistiques améliorées selon votre Maîtrise de l'§RÉvocation§! et votre §YAbsolutisme§!£icon_absolutism£."
 bd_anointment_of_wrath:0 "Onction de Courroux"
 desc_bd_anointment_of_wrath:0 "Je tue où je veux et nul n'ose résister ! Moi seul commande la destruction ! Le choc de ma voix est un coup de tonnerre, mes légions un ouragan, et ma volonté... la mort ! Lève-toi, mon héraut, et porte mon commandement sur les faibles !"

 ELVEN_FOREBEARS_ASPECTS_LONG:0 "Héritages de Nos Ancêtres"
 ELVEN_FOREBEARS_ASPECTS_SHORT:0 "héritages"
 #Generic Elves
 ivrandir_1:0 "Robe de Jardinage d'Ivrandir"
 desc_ivrandir_1:0 "Cette splendide robe de soie vert profond permettait à Ivrandir, le légendaire jardinier Précurseur, de s'occuper de ses champs peu importe le temps : il ne ressentait ni chaleur, ni froid, ni pluie, et ne respirait que l'air le plus pur.\n\nVénération Supplémentaire :\n§TÉtranges Terres d'Ivrandir§! : Coût de Développement : §G-5%§!\n§TPierre-Ancre d'Ivrandir§! : Colon : §G+1§!"
 ivrandir_2:0 "§TÉtranges Terres d'Ivrandir§!"
 desc_ivrandir_2:0 "Au milieu du Jour-des-Cieux-Cendrés, on dit que les descendants d'Ivrandir ont sauvé cette petite boîte en bois par-dessus tout ce qu'ils possédaient. Elle contient un certain nombre d'échantillons de sol, d'origine incertaine."
 ivrandir_3:0 "§TPierre-Ancre d'Ivrandir§!"
 desc_ivrandir_3:0 "Un galet noir de jais, enchanté de sorte qu'il pointe toujours vers la maison d'Ivrandir. Pourquoi le jardinier en avait besoin n'est pas clair, mais pour quiconque de mémoire vivante, il pointe vers l'ouest, toujours vers l'ouest."
 oloris_1:0 "Diadème de Sort d'Oloris"
 desc_oloris_1:0 "Un diadème richement décoré, avec un léger enchantement augmentant la sagesse et le charisme du porteur, il était le symbole de la fonction d'Oloris en tant que dirigeant de la cité volante de Lanaiande.\n\nVénération Supplémentaire :\n§TRubis Enchantés d'Oloris§! : Efficacité Commerciale : §G+5%§!\n§TNote de Suicide d'Oloris§! : Efficacité Administrative : §G+2%§!"
 oloris_2:0 "§TRubis Enchantés d'Oloris§!"
 desc_oloris_2:0 "Une poignée de rubis qui permettent aux utilisateurs de communiquer comme s'ils étaient face à face, peu importe la distance. Oloris les fit distribuer entre les navires de la flotte des survivants."
 oloris_3:0 "§TNote de Suicide d'Oloris§!"
 desc_oloris_3:0 "Longue de trente-six pages, ce document catalogue les pensées d'Oloris sur le leadership moral et efficace. Le chapitre final détaille ce qu'il décrit comme ses propres échecs sur tous les points, dans toutes les vies qu'il n'a pas réussi à sauver après la chute de Lanaiande."
 arfil_1:0 "Journaux de Bord d'Arfil"
 desc_arfil_1:0 "Ces notes détaillées décrivent la gestion par Arfil de son navire au sein de la Flotte des Survivants, ainsi que ses réflexions alors que le jadis grand général devint capitaine de réfugiés.\n\nVénération Supplémentaire :\n§TDoctrine de Bataille d'Arfil§! : Vitesse de Récupération des Effectifs : §G+5%§!\n§TÉclats de Lame Magique d'Arfil§! : Choc d'Infanterie : §G+5%§!"
 arfil_2:0 "§TDoctrine de Bataille d'Arfil§!"
 desc_arfil_2:0 "Arfil esquissa un certain nombre de batailles sur du papier de rechange : qu'il s'agisse de celles qu'il a menées, ou de simples produits de son imagination, ensemble elles résument son approche tactique."
 arfil_3:0 "§TÉclats de Lame Magique d'Arfil§!"
 desc_arfil_3:0 "Le général ne porta jamais de lame magique à bord de la Flotte des Survivants, et ce n'est qu'après sa mort qu'on découvrit pourquoi : il gardait les éclats de la lame dans une pochette de velours près de sa poitrine, ayant brisé l'arme il y a longtemps."
 #Ibevar
 ibenion_1:0 "Sabre Cardesti d'Ibenion Ier"
 desc_ibenion_1:0 "Un sabre réclamé dans le Val Désolé. Bien que ce ne fût pas l'arme qu'Ibenion avait passé sa vie à maîtriser, ce fut néanmoins son arme de choix pendant la Guerre du Roi-Sorcier.\n\nVénération Supplémentaire :\n§TAnneau de Fer d'Ibenion Ier§! : Coût de Construction : §G-5%§!\n§TRoue de Navire d'Ibenion Ier§! : Coût de Légitimation : §G-5%§!"
 ibenion_2:0 "§TAnneau de Fer d'Ibenion Ier§!"
 desc_ibenion_2:0 "Un anneau offert par Forgelune, pour honorer l'achèvement des travaux des nains construisant la capitale d'Ibevar."
 ibenion_3:0 "§TRoue de Navire d'Ibenion Ier§!"
 desc_ibenion_3:0 "La roue de la barre du Lunatein, récupérée par Ibenion après le Traité d'Anbenncóst."
 tanelia_1:0 "Fiole de Feu Lunaire de Tanelia"
 desc_tanelia_1:0 "Une potion qui brille et danse au clair de lune.\n\nVénération Supplémentaire :\n§TTalisman de Toile de Tanelia§! : Épuisement de Guerre : §G-0.2§!\n§TVœux Cléricaux de Tanelia§! : Force Missionnaire : §G+1%§!"
 tanelia_2:0 "§TTalisman de Toile de Tanelia§!"
 desc_tanelia_2:0 "Un talisman pour canaliser les sorts façonné à partir d'un morceau des voiles du Lunatein."
 tanelia_3:0 "§TVœux Cléricaux de Tanelia§!"
 desc_tanelia_3:0 "Une transcription en elfique des vœux cléricaux de Tanelia."
 varamel_1:0 "Manifeste de Navire de Varamel"
 desc_varamel_1:0 "Manifeste de tous les passagers du Lunatein avant le Jour-des-Cieux-Cendrés.\n\nVénération Supplémentaire :\n§TJournal de Second de Varamel§! : Coût de Technologie Administrative : §G-5%§!\n§TFleur Pressée de Varamel§! : Légitimité Annuelle : §G+1§!"
 varamel_2:0 "§TJournal de Second de Varamel§!"
 desc_varamel_2:0 "Le livre de comptes du Lunatein, organisant les diverses tâches, des travaux administratifs importants aux corvées ennuyeuses mais nécessaires, à bord du navire."
 varamel_3:0 "§TFleur Pressée de Varamel§!"
 desc_varamel_3:0 "Une fleur pressée entre les pages du journal. Le dernier exemplaire de son espèce datant d'avant le Jour-des-Cieux-Cendrés."
 #Silent Repose
 arda_1:0 "Trousse Médicale d'Arda"
 desc_arda_1:0 "Une collection d'aiguilles, de fil, de teintures et de potions qu'Arda utilisait régulièrement pour soigner les blessés de la Guerre du Roi-Sorcier.\n\nVénération Supplémentaire :\n§TTableau d'Arda§! : Défense de Fort : §G+10%§!\n§TCarnet de Croquis d'Arda§! : Coût de Développement : §G-5%§!"
 arda_2:0 "§TTableau d'Arda§!"
 desc_arda_2:0 "L'uniforme de choix d'Arda, enchanté pour rester immaculé malgré tout le sang et les larmes qui l'ont indubitablement arrosé."
 arda_3:0 "§TCarnet de Croquis d'Arda§!"
 desc_arda_3:0 "Un certain nombre de croquis de la montagne qu'Arda verrait sculptée dans la retraite monastique connue sous le nom de Repos Silencieux. Sur quelques pages, elle a plutôt dessiné des personnes : parfois les perdus, mais plus souvent ceux qu'elle avait aidés."
 jahelor_1:0 "Coussin de Méditation de Thalanor"
 desc_jahelor_1:0 "Un coussin bien rembourré, le cadre des nombreuses transes de Thalanor le Mage-des-Rêves. Il fut taché en quelques endroits pendant le long voyage de la Flotte des Survivants, et subit une déchirure mineure pendant la Guerre du Roi-Sorcier, mais il n'en utiliserait jamais un autre.\n\nVénération Supplémentaire :\n§TChâle de Protection de Thalanor§! : Attrition pour les Ennemis : §G+1§!\n§TService à Thé de Thalanor§! : Diplomates : §G+1§!"
 jahelor_2:0 "§TChâle de Protection de Thalanor§!"
 desc_jahelor_2:0 "Un châle bleu pâle, enchanté de sorte que quiconque dérangerait le porteur souffrirait de malheurs mineurs. On disait qu'on savait si Thalanor dormait, selon que l'on trébuchait ou non en approchant de sa porte."
 jahelor_3:0 "§TService à Thé de Thalanor§!"
 desc_jahelor_3:0 "Thalanor n'a jamais cessé de servir les breuvages les plus reposants : dans ses rares moments d'éveil à bord de la Flotte des Survivants, après les batailles les plus amères de la Guerre du Roi-Sorcier, à tous ceux qui le rejoignaient au Repos Silencieux."
  elethen_1:0 "Harpe aux Cent Cordes d'Elethen"
 desc_elethen_1:0 "Une harpe à cent cordes, dont on dit qu'il faut cent ans pour l'apprendre et mille pour la maîtriser. Elethen, le légendaire Barde Errant Précurseur, était connu pour être un tel maître, et Halann ne connaîtra peut-être jamais plus de musique égalant la sienne.\n\nVénération Supplémentaire :\n§TPlume d'Oiseau-Tonnerre d'Elethen§! : Coût des Conseillers : §G-5%§!\n§TÉtui de Transport d'Elethen§! : Efficacité Commerciale : §G+5%§!"
 elethen_2:0 "§TPlume d'Oiseau-Tonnerre d'Elethen§!"
 desc_elethen_2:0 "Une plume du mythique Oiseau-Tonnerre, une créature connue des Précurseurs mais perdue pour nous. Elethen l'utilisait pour chaque écrit dans lequel il mettait son cœur : des notes à des amants lointains, des partitions musicales et des poèmes à des amis perdus."
 elethen_3:0 "§TÉtui de Transport d'Elethen§!"
 desc_elethen_3:0 "Un étui à instrument fait de la peau d'une étrange bête, et enchanté comme un sac sans fond. Il suffisait à contenir tous les instruments d'Elethen et des siècles de partitions dans ses errances, et a aussi permis à ses descendants de tous les emporter avec eux sur la Flotte des Survivants."
 #Pelodaire
 rulership_1:0 "De la Souveraineté de Pelodir Vol. I"
 desc_rulership_1:0 "WIP\n\nVénération Supplémentaire :\n§TDe la Souveraineté de Pelodir Vol. II§! : Coût de Réduction de l'Épuisement de Guerre : §G-15%§!\n§TDe la Souveraineté de Pelodir Vol. III§! : Relations Diplomatiques : §G+1§!"
 rulership_2:0 "§TDe la Souveraineté de Pelodir Vol. II§!"
 desc_rulership_2:0 "WIP"
 rulership_3:0 "§TDe la Souveraineté de Pelodir Vol. III§!"
 desc_rulership_3:0 "WIP"
 warfare_1:0 "De la Guerre de Pelodir Vol. I"
 desc_warfare_1:0 "WIP\n\nVénération Supplémentaire :\n§TDe la Guerre de Pelodir Vol. II§! : Demandes Injustifiées : §G-10%§!\n§TDe la Guerre de Pelodir Vol. III§! : Vitesse de Mouvement : §G+5%§!"
 warfare_2:0 "§TDe la Guerre de Pelodir Vol. II§!"
 desc_warfare_2:0 "WIP"
 warfare_3:0 "§TDe la Guerre de Pelodir Vol. III§!"
 desc_warfare_3:0 "WIP"
 wealth_1:0 "De la Richesse de Pelodir Vol. I"
 desc_wealth_1:0 "WIP\n\nVénération Supplémentaire :\n§TDe la Richesse de Pelodir Vol. II§! : Coût des Idées : §G-5%§!\n§TDe la Richesse de Pelodir Vol. III§! : Intérêts : §G-0.5§!"
 wealth_2:0 "§TDe la Richesse de Pelodir Vol. II§!"
 desc_wealth_2:0 "WIP"
 wealth_3:0 "§TDe la Richesse de Pelodir Vol. III§!"
 desc_wealth_3:0 "WIP"
 #Venail
 camnaril_1:0 "Première Pierre de Camnaril"
 desc_camnaril_1:0 "Bien que les fragiles structures d'abord érigées sur Vénail aient depuis longtemps été remplacées, la première pierre posée, gravée de motifs complexes et de la propre signature de Camnaril, demeure.\n\nVénération Supplémentaire :\n§TRobe de Dignitaire de Camnaril§! : Coût des Commandants : §G-10%§!\n§TVaisseaux de l'Esprit de Camnaril§! : Coût de Développement : §G-5%§!"
 camnaril_2:0 "§TRobe de Dignitaire de Camnaril§!"
 desc_camnaril_2:0 "La tenue de cérémonie du Prince de Vénail, cette robe magnifiquement brodée exploite la mystique elfique pour produire une beauté captivante, même si elle ne repose désormais que sur un mannequin."
 camnaril_3:0 "§TVaisseaux de l'Esprit de Camnaril§!"
 desc_camnaril_3:0 "Une vaste série de peintures et de croquis par Camnaril, sa représentation de vaisseaux exotiques et oniriques stimule l'imagination des constructeurs navals, inspirant de nombreuses conceptions nouvelles et navigables."
 boats_1:0 "Les Aventures de Davi Joens"
 desc_boats_1:0 "Une collection écrite des nombreux récits extravagants écrits sur Davithir de Joens, un féroce guerrier de la flotte des survivants, et détaille des batailles contre des créatures des mers trop fantastiques même pour les confins les plus reculés de Halann.\n\nVénération Supplémentaire :\n§TCoffre de Davithir de Joens§! : Modificateur d'Entretien Naval : §G-5%§!\n§TCor d'Argent de Davithir§! : Coût des Navires : §G-5%§!"
 boats_2:0 "§TCoffre de Davithir de Joens§!"
 desc_boats_2:0 "Un coffre de pied contenant les possessions de Joens, son organisation méticuleuse et son rangement dense est un bel exemple de l'efficacité qu'un marin devrait viser."
 boats_3:0 "§TCor d'Argent de Davithir§!"
 desc_boats_3:0 "L'appel mélodieux du cor d'argent de Joens résonnait pour signaler le danger, tandis que le vaillant elfe et ses plus proches compagnons tenaient bon contre les attaques ou plongeaient par-dessus bord pour secourir les marins en difficulté."
 tech_1:0 "« Un Nouveau Voyage » d'Irithil"
 desc_tech_1:0 "Une statue sculptée par le célèbre érudit et artisan Irithil Âme-Sombre à l'effigie d'un elfe inconnu, cette sculpture magnifique, presque réaliste, se tient avec un pied sur la proue d'un navire de la Flotte des Survivants, et l'autre sur une rive rocheuse, le regard tourné vers l'avenir. Aussi têtus que soient les elfes, ils peuvent avancer quand ils le veulent.\n\nVénération Supplémentaire :\n§TPlume Resplendissante d'Irithil§! : Coût de Technologie Administrative : §G-5%§!\n§T« Atouts pour l'Administrateur Admirable » d'Irithil§! : Réduction Annuelle de l'Inflation : §G+5%§!"
 tech_2:0 "§TPlume Resplendissante d'Irithil§!"
 desc_tech_2:0 "La plume de quelque bête oubliée d'Aelantir datant d'avant le Jour-des-Cieux-Cendrés, cette plume aux couleurs toujours changeantes a écrit des siècles de textes et traités d'Irithil, pratiquement de la naissance à la mort."
 tech_3:0 "§T« Atouts pour l'Administrateur Admirable » d'Irithil§!"
 desc_tech_3:0 "Ce tome, populaire parmi les fonctionnaires, décrit les nombreuses fois où l'indulgent Irithil se sortit d'un mauvais pas financier alors qu'il servait comme conseiller administratif à travers tout Cannor."

 #--------#New Sun Cult#--------#
 #Isolationism Levels
 suraels_voice_isolation:0 "Enfants de Surael"
 suraels_voice_isolation_title:0 "Rôle des Élus :  §YEnfants§! | §YNiveau 1§!"
 suraels_voice_isolation_desc:0 "Les Élus sont vus comme les Enfants de Surael, et on attend d'eux qu'ils agissent toujours conformément aux préceptes du Culte Solaire et qu'ils servent de modèles pour les fidèles.\n------------------\nSi notre niveau change, notre nation recevra les effets suivants :\n§YSuccesseurs de Jaher§! | §YNiveau 5§!\n§H(Uniquement disponible pour les pays Élus)§!\nCoût des Conseillers : §R+10.0%§!\nTolérance de la Vraie Foi : §G+2.00§!\nChangement d'Autonomie Mensuel : §G-0.10§!\n§YIntendants du Jardin§! | §YNiveau 4§!\nCoût des Conseillers : §R+5.0%§!\nTolérance de la Vraie Foi : §G+1.50§!\nDiscipline : §G+2.5%§!\n§YGardiens de la Lumière§! | §YNiveau 3§!\nCoût des Commandants : §G-5.0%§!\nTolérance de la Vraie Foi : §G+1.00§!\nCoût de Technologie Administrative : §G-5.0%§!\n§YGuides des Fidèles§! | §YNiveau 2§!\nCoût des Conseillers : §G-5.0%§!\nTolérance de la Vraie Foi : §G+0.50§!\nConseillers Possibles : §G+1§!\n------------------\nVotre niveau actuel accorde :"
 suraels_light_isolation:0 "Guides des Fidèles"
 suraels_light_isolation_title:0 "Rôle des Élus :  §YGuides§! | §YNiveau 2§!"
 suraels_light_isolation_desc:0 "Les Élus sont vus comme les Guides des Fidèles, et on attend d'eux qu'ils soient des membres actifs de leurs communautés : les artisans prennent des enfants humains comme apprentis, les médecins soignent gratuitement les patients humains, et les professeurs donnent une éducation de base dans les temples.\n------------------\nSi notre niveau change, notre nation recevra les effets suivants :\n§YSuccesseurs de Jaher§! | §YNiveau 5§!\n§H(Uniquement disponible pour les pays Élus)§!\nCoût des Conseillers : §R+10.0%§!\nTolérance de la Vraie Foi : §G+2.00§!\nChangement d'Autonomie Mensuel : §G-0.10§!\n§YIntendants du Jardin§! | §YNiveau 4§!\nCoût des Conseillers : §R+5.0%§!\nTolérance de la Vraie Foi : §G+1.50§!\nDiscipline : §G+2.5%§!\n§YGardiens de la Lumière§! | §YNiveau 3§!\nCoût des Commandants : §G-5.0%§!\nTolérance de la Vraie Foi : §G+1.00§!\nCoût de Technologie Administrative : §G-5.0%§!\n§YEnfants de Surael§! | §YNiveau 1§!\n§O(Indisponible pour les pays Élus)§!\nCoût des Conseillers : §G-10.0%§!\nTolérance de la Vraie Foi : §R-0.50§!\nCoût des Idées : §G-10.0%§!\n------------------\nVotre niveau actuel accorde :"
 suraels_wisdom_isolation:0 "Gardiens de la Lumière"
 suraels_wisdom_isolation_title:0 "Rôle des Élus :  §YGardiens§! | §YNiveau 3§!"
 suraels_wisdom_isolation_desc:0 "Les Élus sont vus comme les Gardiens de la Lumière de Surael, et ils participent activement aux affaires régionales, agissant comme Anciens, maîtres de guilde, juges et professeurs. Les marchands et propriétaires terriens sont encouragés à prendre des rôles de direction dans leurs communautés.\n------------------\nSi notre niveau change, notre nation recevra les effets suivants :\n§YSuccesseurs de Jaher§! | §YNiveau 5§!\n§H(Uniquement disponible pour les pays Élus)§!\nCoût des Conseillers : §R+10.0%§!\nTolérance de la Vraie Foi : §G+2.00§!\nChangement d'Autonomie Mensuel : §G-0.10§!\n§YIntendants du Jardin§! | §YNiveau 4§!\nCoût des Conseillers : §R+5.0%§!\nTolérance de la Vraie Foi : §G+1.50§!\nDiscipline : §G+2.5%§!\n§YGuides des Fidèles§! | §YNiveau 2§!\nCoût des Conseillers : §G-5.0%§!\nTolérance de la Vraie Foi : §G+0.50§!\nConseillers Possibles : §G+1§!\n§YEnfants de Surael§! | §YNiveau 1§!\n§O(Indisponible pour les pays Élus)§!\nCoût des Conseillers : §G-10.0%§!\nTolérance de la Vraie Foi : §R-0.50§!\nCoût des Idées : §G-10.0%§!\n------------------\nVotre niveau actuel accorde :"
 suraels_authority_isolation:0 "Intendants du Jardin"
 suraels_authority_isolation_title:0 "Rôle des Élus :  §YIntendants§! | §YNiveau 4§!"
 suraels_authority_isolation_desc:0 "Les Élus sont vus comme les Intendants du Jardin, et on attend d'eux qu'ils travaillent activement dans l'administration pour faire du Bulwar un meilleur endroit. On attend des monarques Elfes Solaires qu'ils protègent le Jardin de Surael des Ténèbres Malveillantes.\n------------------\nSi notre niveau change, notre nation recevra les effets suivants :\n§YSuccesseurs de Jaher§! | §YNiveau 5§!\n§H(Uniquement disponible pour les pays Élus)§!\nCoût des Conseillers : §R+10.0%§!\nTolérance de la Vraie Foi : §G+2.00§!\nChangement d'Autonomie Mensuel : §G-0.10§!\n§YGardiens de la Lumière§! | §YNiveau 3§!\nCoût des Commandants : §G-5.0%§!\nTolérance de la Vraie Foi : §G+1.00§!\nCoût de Technologie Administrative : §G-5.0%§!\n§YGuides des Fidèles§! | §YNiveau 2§!\nCoût des Conseillers : §G-5.0%§!\nTolérance de la Vraie Foi : §G+0.50§!\nConseillers Possibles : §G+1§!\n§YEnfants de Surael§! | §YNiveau 1§!\n§O(Indisponible pour les pays Élus)§!\nCoût des Conseillers : §G-10.0%§!\nTolérance de la Vraie Foi : §R-0.50§!\nCoût des Idées : §G-10.0%§!\n------------------\nVotre niveau actuel accorde :"
 suraels_incarnation_isolation:0 "Successeurs de Jaher"
 suraels_incarnation_isolation_title:0 "Rôle des Élus :  §YSuccesseurs§! | §YNiveau 5§!"
 suraels_incarnation_isolation_desc:0 "Les Élus sont vus comme les Successeurs de Jaher. On attend des Élus qu'ils combattent activement les Ténèbres, soit en combattant dans la guerre pour revendiquer les terres hors du Jardin du Bulwar, soit en s'engageant dans des rituels religieux et des prières de plusieurs décennies.\n------------------\nSi notre niveau change, notre nation recevra les effets suivants :\n§YIntendants du Jardin§! | §YNiveau 4§!\nCoût des Conseillers : §R+5.0%§!\nTolérance de la Vraie Foi : §G+1.50§!\nDiscipline : §G+2.5%§!\n§YGardiens de la Lumière§! | §YNiveau 3§!\nCoût des Commandants : §G-5.0%§!\nTolérance de la Vraie Foi : §G+1.00§!\nCoût de Technologie Administrative : §G-5.0%§!\n§YGuides des Fidèles§! | §YNiveau 2§!\nCoût des Conseillers : §G-5.0%§!\nTolérance de la Vraie Foi : §G+0.50§!\nConseillers Possibles : §G+1§!\n§YEnfants de Surael§! | §YNiveau 1§!\n§O(Indisponible pour les pays Élus)§!\nCoût des Conseillers : §G-10.0%§!\nTolérance de la Vraie Foi : §R-0.50§!\nCoût des Idées : §G-10.0%§!\n------------------\nVotre niveau actuel accorde :"

