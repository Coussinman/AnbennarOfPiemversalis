 harpy_tolerance_events.1.t:0 "Les Minorités Harpies Exigent une Représentation"
 harpy_tolerance_events.1.d:0 "Les minorités harpies dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 harpy_tolerance_events.1.a:0 "Accordé !"
 harpy_tolerance_events.1.b:0 "Faire quelques concessions"
 harpy_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 harpy_tolerance_events.1.e:0 "Faire des promesses vides"

 harpy_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Harpies"
 harpy_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités harpies de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race harpie a augmenté."
 harpy_tolerance_events.2.a:0 "Tant mieux pour elles"

 harpy_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Harpies"
 harpy_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race harpie a diminué."
 harpy_tolerance_events.3.a:0 "C'est regrettable"

 harpy_tolerance_events.4.t:0 "Enlèvement par Harpie !"
 harpy_tolerance_events.4.d:0 "Tout le monde et sa belle-mère savent qu'à moins qu'une influence civilisatrice ne soit présente, les harpies enlèveront des mâles d'autres races afin de s'accoupler avec eux. Il s'avère que le compagnon choisi d'une harpie particulièrement courageuse ou folle était l'un de nos conseillers. Certaines personnes, en particulier les opposants du conseiller au gouvernement, conseillent à [Root.Monarch.GetTitle] de simplement laisser le conseiller partir, mais d'autres nous exhortent soit à interroger d'autres harpies qui pourraient connaître l'emplacement du conseiller, soit au moins à envoyer une équipe de recherche et de sauvetage."
 harpy_tolerance_events.4.a:0 "Eh bien... pas une énorme perte pour être honnête"
 harpy_tolerance_events.4.b:0 "Envoyer une équipe de sauvetage massive"
 harpy_tolerance_events.4.c:0 "Interroger les harpies locales pour obtenir des informations"
 harpy_tolerance_events.4.e:0 "Négocier un accord pour la libération du conseiller"

 harpy_tolerance_events.5.t:0 "Ils Appellent Ça l'Amour Harpie"
 harpy_tolerance_events.5.d:0 "Récemment, un officiel local est tombé amoureux d'une harpie locale. Heureusement, puisque nous avons réussi à trouver un modus vivendi permanent avec elles, ceci n'est qu'un sujet d'intérêt pour le peuple de [Root.GetName], et une partie importante de notre peuple veut que les deux aillent jusqu'au bout ensemble. Cependant, il y a une préoccupation légitime que, si cela n'est pas arrêté, cela pourrait conduire à ce que les harpies obtiennent un degré d'influence indésirable dans notre pays."
 harpy_tolerance_events.5.a:0 "Je suis heureux pour eux"
 harpy_tolerance_events.5.b:0 "Encourager l'officiel à reconsidérer ses choix"
 harpy_tolerance_events.5.c:0 "Tuer la harpie et faire un exemple de l'officiel"
 harpy_tolerance_events.5.e:0 "Ce type de comportement devrait être encouragé"

 harpy_tolerance_events.6.t:0 "Un Clan Harpie Offre un Tribut"
 harpy_tolerance_events.6.d:0 "Récemment, un officiel local est tombé amoureux d'une harpie locale. La matriarche des harpies, reconnaissant que c'est une situation assez délicate pour [Root.GetName], nous a envoyé un émissaire avec diverses babioles et artefacts afin d'obtenir notre approbation pour l'union."
 harpy_tolerance_events.6.a:0 "Leur envoyer un cadeau en retour"
 harpy_tolerance_events.6.b:0 "Merci"
 harpy_tolerance_events.6.c:0 "Sortez ces abominations de ma vue !"

 harpy_tolerance_events.7.t:0 "Harpies au-dessus de [harpy_raid_province.GetName]"
 harpy_tolerance_events.7.d:0 "C'est comme une scène d'une histoire de feu de camp effrayante. Des harpies se sont abattues sur un village dans l'une de nos provinces, l'ont attaqué et ont lâché, pour ainsi dire, les oiseaux de guerre sur ses innocents habitants. Cela a encore aggravé leur position déjà diminuée à [Root.GetName], et maintenant le peuple de notre pays exige vengeance. Mais un argument peut être avancé pour se concentrer plutôt sur la réparation de la zone affectée ou même essayer de désamorcer les tensions."
 harpy_tolerance_events.7.a:0 "Riposter ne fera que les mettre en colère"
 harpy_tolerance_events.7.b:0 "Se concentrer sur les réparations"
 harpy_tolerance_events.7.c:0 "Envoyer une force vers un nid en représailles"

 harpy_tolerance_events.8.t:0 "Des Harpies Attaquent Voyageurs et Marchands à [harpy_killing_travellers_province.GetName]"
 harpy_tolerance_events.8.d:0 "Des bandes de harpies, utilisant l'instabilité ou les politiques anti-harpies comme prétexte, ont commencé à attaquer les marchands et les voyageurs sur les routes et les artères de [harpy_killing_travellers_province.GetName]. Pire encore, plutôt que de simplement les emmener pour leurs rituels absurdes et pervers, elles les massacrent en masse. Une chose est claire : que nous les apaisions, envoyions des patrouilles ou fassions quelque chose de plus drastique, nous devons prendre des mesures décisives avant que cela ne dégénère."
 harpy_tolerance_events.8.a:0 "L'apaisement doit fonctionner"
 harpy_tolerance_events.8.b:0 "Quelques patrouilles les décourageront"
 harpy_tolerance_events.8.c:0 "Construire des tours de guet le long des routes"
 harpy_tolerance_events.8.e:0 "Nous devons venger tous ceux qui ont été attaqués"
 harpy_killing_travellers:0 "Raids de Harpies"
 desc_harpy_killing_travellers:0 "Cette province subit de fréquents raids et vols de harpies sur la population locale."

 harpy_tolerance_events.9.t:0 "Chanteuse Harpie Célèbre"
 harpy_tolerance_events.9.d:0 "Une chanteuse harpie célèbre, renommée pour sa voix et sa beauté, a attiré les yeux et les oreilles de la population et, plus important encore, de la cour. Un corps d'opinion important au gouvernement estime qu'elle pourrait mettre ses charmes artistiques et personnels au service de notre gouvernement ; un avantage utile à cela serait de renforcer les relations entre le gouvernement de [Root.GetName] et la population harpie."
 harpy_tolerance_events.9.a:0 "Recruter la harpie"
 harpy_tolerance_events.9.b:0 "Un véritable exemple pour la communauté !"
 harpy_tolerance_events.9.c:0 "Et alors ?"

 harpy_tolerance_events.10.t:0 "Le Pouvoir du Vol : Bâtisseuses Harpies"
 harpy_tolerance_events.10.d:0 "Comme tout le monde le sait, les harpies sont capables de voler d'une manière que pratiquement aucune autre espèce ne peut espérer égaler. Cela les rend extrêmement utiles dans la construction de structures hautes, comme les temples et les observatoires, et elles et nous le savons. Ainsi, des bâtisseuses harpies qualifiées nous ont approchés, offrant leur aide en échange d'un prix."
 harpy_tolerance_events.10.a:0 "Nous pourrions utiliser leurs capacités naturelles"
 harpy_tolerance_events.10.b:0 "Pas besoin"
 harpy_tolerance_events.10.c:0 "Nous n'avons pas besoin de vous ni de vos ailes"
 harpy_builders:0 "Bâtisseuses Harpies"
 desc_harpy_builders:0 "Les harpies prêtent leurs ailes et leur capacité de vol pour aider aux constructions provinciales. Qu'il s'agisse de récupérer du mortier, de transporter des briques ou de poser des pierres, le vol rend tout plus facile."

 harpy_tolerance_events.11.t:0 "Et l'Ingrédient Final... des Plumes de Harpie"
 harpy_tolerance_events.11.d:0 "Certains sorts et potions nécessitent des instruments ésotériques, tels que des parties corporelles de diverses créatures. Un résultat malheureux de l'ambition démesurée des mages, possiblement aggravé par la levée de leurs restrictions, a entraîné une série d'incidents malheureux au cours desquels des harpies ont été droguées et dépouillées de leurs plumes, et dans certaines situations, massacrées pour leurs organes. Cela a suscité un mécontentement considérable dans [Root.GetName], et les gens se tournent vers leur [Root.Monarch.GetTitle] pour obtenir des directives."
 harpy_tolerance_events.11.a:0 "Forcer les mages à payer des réparations aux harpies"
 harpy_tolerance_events.11.b:0 "Eh bien, les mages devraient probablement arrêter..."
 harpy_tolerance_events.11.c:0 "Le travail que font les mages est trop important... Ouvrir la saison de chasse !"

