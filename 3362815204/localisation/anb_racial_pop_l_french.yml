 half_elf_tolerance_events.1.t:0 "Les Minorités Demi-elfes Exigent une Représentation"
 half_elf_tolerance_events.1.d:0 "Les minorités demi-elfes dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 half_elf_tolerance_events.1.a:0 "Accordé !"
 half_elf_tolerance_events.1.b:0 "Faire quelques concessions"
 half_elf_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 half_elf_tolerance_events.1.e:0 "Faire des promesses vides"

 half_elf_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Demi-elfes"
 half_elf_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités demi-elfes de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race demi-elfe a augmenté."
 half_elf_tolerance_events.2.a:0 "Tant mieux pour eux"

 half_elf_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Demi-elfes"
 half_elf_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race demi-elfe a diminué."
 half_elf_tolerance_events.3.a:0 "C'est regrettable"

 half_elf_tolerance_events.4.t:0 "Gala d'Élite Demi-elfe"
 half_elf_tolerance_events.4.d1:0 "D'éminents membres demi-elfes de notre communauté organisent un gala dans les prochains jours. Apparemment, ils ont restreint la participation aux demi-elfes et aux elfes, comme c'est leur habitude pour ce type d'événement. [Root.Monarch.GetTitle] s'est vu offrir une invitation à cet événement exclusif. Certains conseillent au [Root.Monarch.GetTitle] d'accepter et d'autres lui conseillent de l'ignorer. D'autres encore disent que ce refus d'inclure des personnes extérieures à leurs cercles sociaux indique une hostilité envers le reste de [Root.GetName] et devrait être condamné."
 half_elf_tolerance_events.4.d2:0 "D'éminents membres demi-elfes de notre communauté organisent un gala dans les prochains jours. Apparemment, ils ont restreint la participation aux demi-elfes et aux elfes, comme c'est leur habitude pour ce type d'événement. Cependant, dans un geste de bonne volonté envers notre pays, ils étendent des invitations à quelques personnes extérieures à ce groupe, et [Root.Monarch.GetTitle] est l'une d'entre elles. Certains conseillent au [Root.Monarch.GetTitle] d'accepter et d'autres lui conseillent de l'ignorer. D'autres encore disent que ce refus d'inclure des personnes extérieures à leurs cercles sociaux indique une hostilité envers le reste de [Root.GetName] et devrait être condamné."
 half_elf_tolerance_events.4.a:0 "Oh ! Merci pour l'invitation !"
 half_elf_tolerance_events.4.b:0 "C'est leur fête, ils peuvent faire ce qu'ils veulent"
 half_elf_tolerance_events.4.c:0 "Sévir contre un tel comportement"

 half_elf_tolerance_events.5.t:0 "Un Citoyen Demi-elfe Insulte le Gouvernement"
 half_elf_tolerance_events.5.d:0 "Un citoyen demi-elfe éminent de notre pays a critiqué notre gouvernement et sa structure nationale, en particulier en ce qui concerne son traitement de la race demi-elfe. Plaidant pour des changements significatifs, cet orateur exige des réformes qui assurent une plus grande égalité pour les demi-elfes ainsi que l'abolition d'autres pratiques qu'il qualifie d'« inefficaces ». Certains exigent que ce potentiel subversif soit réduit au silence, mais d'autres pensent qu'il pourrait avoir raison, même s'il est demi-elfe."
 half_elf_tolerance_events.5.a:0 "Ils font de bons arguments, les embaucher"
 half_elf_tolerance_events.5.b:0 "Ce n'est que l'opinion d'un individu"
 half_elf_tolerance_events.5.c:0 "Arrêter le demi-elfe !"

 half_elf_tolerance_events.6.t:0 "Graffiti Anti-Demi-elfe"
 half_elf_tolerance_events.6.d:0 "« Mort aux sang-mêlé ! »\n\nCeci et d'autres types de rhétorique grossière apparaissent sur les murs et autres espaces publiquement visibles à travers [Root.GetName]. Peu importe ce que nous pensons des demi-elfes, sûrement seuls [Root.Monarch.GetTitle] et [Root.Monarch.GetHerHis] officiels ont le droit d'exprimer leur sympathie ou antipathie envers eux, sans parler de les blâmer pour leur race, quelque chose qui est sans doute hors de leur contrôle ?"
 half_elf_tolerance_events.6.a:0 "Ne pas les haïr pour ce qu'ils sont. Cela ne se reproduira plus"
 half_elf_tolerance_events.6.b:0 "Juste nettoyer"
 half_elf_tolerance_events.6.c:0 "Il y a une part de vérité dans la rhétorique..."

 half_elf_tolerance_events.7.t:0 "Conspirateurs au Sang d'Argent"
 half_elf_tolerance_events.7.d:0 "C'est un fait bien connu à travers ces terres que les demi-elfes sont généralement des individus très puissants, avec leur concentration parmi la noblesse de [Root.GetName]. De plus, les demi-elfes influents ont tendance à se serrer les coudes, formant des connexions qui leur fournissent de plus en plus d'influence si on les laisse sans contrôle. En considérant ces deux points ensemble, un citoyen éminent connu pour avoir concocté des conspirations à moitié cuites a accusé plusieurs notables demi-elfes dans [Root.GetName] de conspirer contre notre pays et son [Root.Monarch.GetTitle] au profit de leur propre espèce. Ces allégations ne sont que légèrement crédibles, mais nous pourrions les utiliser pour créer un changement significatif dans ce pays dans une direction ou une autre..."
 half_elf_tolerance_events.7.a:0 "Arrêter le fou pour diffamation !"
 half_elf_tolerance_events.7.b:0 "Je suis sûr que ce n'est rien"
 half_elf_tolerance_events.7.c:0 "Arrêter ces conspirateurs diaboliques et confisquer leurs biens !"

 half_elf_tolerance_events.8.t:0 "Ministre Demi-elfe"
 half_elf_tolerance_events.8.d:0 "Un demi-elfe éminent dans notre royaume est devenu connu pour sa compétence diplomatique et ses talents oratoires. Sa capacité de négociation et de discours est reconnue même par ses ennemis. En tant que tel, des membres de notre cour suggèrent que [Root.Monarch.GetTitle] devrait envisager d'inclure ce diplomate consommé dans notre service."
 half_elf_tolerance_events.8.a:0 "Recruter cet homme, euh, demi-elfe !"
 half_elf_tolerance_events.8.b:0 "Un véritable exemple pour la communauté !"
 half_elf_tolerance_events.8.c:0 "Et alors ?"

 half_elf_tolerance_events.9.t:0 "Les Nobles Demi-elfes Exigent un Traitement Préférentiel"
 half_elf_tolerance_events.9.d:0 "En raison de leur charme naturel et de leur héroïsme dans la Guerre du Roi-Sorcier, de nombreux elfes sont devenus les consorts de nobles humains éminents, tels qu'Auci de Damérie et Munas Chante-Lune, et ont conduit à la naissance de nombreux demi-elfes au pouvoir. Pour certains endroits, comme l'Empire d'Anbennar, un grand nombre de nobles se proclament « demi-elfes » (que ce soit factuellement vrai est sujet à débat, généralement ils ont au moins une certaine ascendance elfique), et sont devenus une composante des échelons supérieurs de la société.\n\nLes nobles demi-elfes dans notre pays exigent un traitement spécial en reconnaissance de leur statut spécial en tant que pierres angulaires du règne de [Root.Monarch.GetTitle] [Root.Monarch.GetName] dans notre pays. Les autres nobles du royaume observent cela avec intérêt ; sans aucun doute, faire des concessions aux demi-elfes leur donnera une raison d'exiger des concessions de leur propre chef. D'un autre côté, nous pourrions utiliser cela comme prétexte pour réduire l'influence noble et rabaisser les demi-elfes d'un cran..."
 half_elf_tolerance_events.9.a:0 "Céder à leurs demandes"
 half_elf_tolerance_events.9.b:0 "Offrir des promesses vides"
 half_elf_tolerance_events.9.c:0 "Leur apprendre leur place"
 half_elven_noble_privileges:0 "Nobles Demi-elfes Ayant Reçu un Traitement Préférentiel"
 desc_half_elven_noble_privileges:0 "La noblesse demi-elfe dans cette province est traitée avec la faveur et l'attraction grandiose qu'ils méritent manifestement."
 half_elven_noble_privileges_estate_happy:0 "Nobles Demi-elfes ayant reçu un traitement préférentiel : §Y$VAL$%§!"
 half_elven_noble_privileges_estate_angered:0 "Nobles Demi-elfes refusés du traitement préférentiel : §Y$VAL$%§!"

 half_elf_tolerance_events.10.t:0 "Un Seigneur Préfère un Bâtard Demi-elfe"
 half_elf_tolerance_events.10.d:0 "Un noble éminent dans notre royaume connu pour son impuissance a récemment eu un enfant ! Cependant, ils réalisent maintenant qu'ils préfèrent leur enfant bâtard existant, un demi-elfe qui a maintenant commencé à montrer une grande compétence dans son rôle. Le noble a adressé une pétition et demandé la permission de [Root.Monarch.GetTitle] de légitimer le bâtard comme son héritier. Si nous allons de l'avant avec cela, les nobles seront mécontents, mais les communautés demi-elfes de [Root.GetName] prendront naturellement cela comme une indication de la faveur accrue de notre pays envers eux."
 half_elf_tolerance_events.10.a:0 "Légitimer le bâtard"
 half_elf_tolerance_events.10.b:0 "Je peux le faire, contre de l'argent"
 half_elf_tolerance_events.10.c:0 "Rejeter la demande"

