#  dwarven_tolerance_events.10.t:0 "Poor Dwarven Mine"
#  dwarven_tolerance_events.10.d:0 "There have recently been a major loss in mines within [dwarven_poor_mining_province.GetName] and while our mines are still profitable the dwarves claim that they are quickly running out of resources to mine. It may just be temporary and they'll simple have to dig deeper, but they believe that if we secede some land to them to mine in they can recover quickly."
#  dwarven_tolerance_events.10.a:0 "Send them back to their mines"
#  dwarven_tolerance_events.10.b:0 "Divert resources to help their efforts"
#  dwarven_tolerance_events.10.c:0 "Let's give them new land"
#  dwarven_forced_back_to_poor_mines_prov:0 "Dwarven Miners Upset"
#  desc_dwarven_forced_back_to_poor_mines_prov:0 "Despite explaining their issues the government decided against supporting them in their efforts to get new land to mine. Now they are forced to work in depleted mines which hurts the local economy and brings a lot of angry dwarves."
#  dwarven_poor_mines_prov:0 "Empty Mines"
#  desc_dwarven_poor_mines_prov:0 "The Dwarven mines have been proven depleted in the region and right now we're spending resources to help the local Dwarven people to find new mines for them."

 dwarven_tolerance_events.1.t:0 "Les Minorités Naines Exigent une Représentation"
 dwarven_tolerance_events.1.d:0 "Les minorités naines de la province de [racial_pop_province_target.GetName] ont demandé une plus grande représentation pour leur peuple ainsi qu'une plus grande autonomie dans leurs droits et actions."
 dwarven_tolerance_events.1.a:0 "Accordé !"
 dwarven_tolerance_events.1.b:0 "Faire quelques concessions"
 dwarven_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 dwarven_tolerance_events.1.e:0 "Faire de vaines promesses"

 dwarven_tolerance_events.2.t:0 "Augmentation de la Tolérance Naine"
 dwarven_tolerance_events.2.d:0 "Que ce soit par nos politiques et notre gouvernance ou simplement grâce à la prospérité du royaume, notre coexistence avec les minorités naines de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race naine s'est accrue."
 dwarven_tolerance_events.2.a:0 "Tant mieux pour eux"

 dwarven_tolerance_events.3.t:0 "Diminution de la Tolérance Naine"
 dwarven_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit en raison des troubles de la guerre, de l'économie ou simplement d'une incompatibilité fondamentale, mais une chose est certaine : la tolérance de [Root.GetName] envers la race naine a diminué."
 dwarven_tolerance_events.3.a:0 "C'est regrettable"

 dwarven_tolerance_events.4.t:0 "Ministre Nain"
 dwarven_tolerance_events.4.d:0 "En tant que race, les nains sont réputés pour être de grands artisans, dominant des métiers aussi variés que la forge, la banque et l'architecture. Il semble que cette renommée soit fondée sur la réalité, car il est venu à notre attention que l'un de nos sujets nains s'est fait connaître pour ses exploits de grand artisanat."
 dwarven_tolerance_events.4.a:0 "Recruter ce nain !"
 dwarven_tolerance_events.4.b:0 "Un véritable modèle pour la communauté !"
 dwarven_tolerance_events.4.c:0 "Et alors ?"

 dwarven_tolerance_events.5.t:0 "Les Rivalités entre Clans Éclatent"
 dwarven_tolerance_events.5.d:0 "Des rapports troublants nous parviennent de [dwarven_rivalry_province.GetName]. Il semble que deux clans nains rivaux s'affrontent dans les rues depuis des semaines. Que ce soit pour une rancune ou un conflit concernant des terres ou des ressources, il est clair que les échauffourées perturbent grandement le fonctionnement normal de la région. Si nous n'intervenons point, il est probable qu'ils continueront indéfiniment."
 dwarven_tolerance_events.5.a:0 "Tenter de résoudre cela pacifiquement"
 dwarven_tolerance_events.5.b:0 "Ce n'est point notre place d'intervenir"
 dwarven_tolerance_events.5.c:0 "Résoudre ce conflit brutal par la force"
 dwarven_clans_fighting:0 "Conflits entre Clans Nains"
 desc_dwarven_clans_fighting:0 "Deux clans nains aux rivalités anciennes se battent et ne cesseront point avant que leurs rancunes mutuelles ne soient satisfaites."

 dwarven_tolerance_events.6.t:0 "Les Banques Naines Réclament Paiement"
 dwarven_tolerance_events.6.d:0 "Il est de notoriété publique que les nains sont les principaux acteurs financiers du monde. Utilisant la richesse qu'ils ont emportée avec eux après l'effondrement d'Aul-Dwarov, les clans nains qui se sont stabilisés en surface ont prêté des quantités massives d'or aux différents souverains des terres, finançant guerres et constructions. Nous-mêmes, comme les seigneurs d'antan, en sommes venus à compter sur eux pour notre soutien financier dans un passé récent, et il semble que le moment soit venu de les rembourser pour leurs services."
 dwarven_tolerance_events.6.a:0 "Les rembourser avec intérêts"
 dwarven_tolerance_events.6.b:0 "Prolonger le prêt"
 dwarven_tolerance_events.6.c:0 "Je ne donnerai rien de plus à vos mains cupides et crasseuses !"

 dwarven_tolerance_events.7.t:0 "Les Artisans Nains Dominent le Marché"
 dwarven_tolerance_events.7.d:0 "Aussi normal qu'il soit de voir des nains travailler comme artisans, c'est chose rare de voir un marché totalement dominé par un petit groupe d'entre eux. C'est précisément ce qui s'est produit dans l'une de nos provinces, où un maître artisan nain a établi un atelier avec un groupe de ses apprentis, surpassant le reste des artisans locaux. Bien que les artisans se soient plaints, il ne fait nul doute que c'est une excellente opportunité de commander aux nains une œuvre d'art."
 dwarven_tolerance_events.7.a:0 "Commander un Chef-d'œuvre Nain pour la Cour !"
 dwarven_tolerance_events.7.b:0 "Que puis-je dire ? Ils excellent dans leur métier !"
 dwarven_tolerance_events.7.c:0 "Ils nous prennent nos emplois !"

 dwarven_tolerance_events.8.t:0 "Les Rancunes de Longue Date Portent Fruit"
 dwarven_tolerance_events.8.d:0 "L'un des aspects les plus étrangers de la culture naine pour nous est leur concept de rancunes à long terme. Les nains ont une réputation notoire d'être facilement offensés et de conserver leurs rancunes pendant des périodes de temps ridicules, les transmettant souvent à leurs descendants et membres de clan. Ce comportement a créé le dernier conflit à notre cour, car l'un de nos courtisans nains a attaqué un administrateur pour une offense commise il y a des décennies. Nos conseillers sont partagés entre le désir de respecter nos procédures légales et le respect des traditions naines. Cependant, ils attendent votre opinion avant de porter des accusations."
 dwarven_tolerance_events.8.a:0 "Soutenir le nain lésé"
 dwarven_tolerance_events.8.b:0 "Médier devant le tribunal"
 dwarven_tolerance_events.8.c:0 "Soutenir l'administrateur attaqué"

 dwarven_tolerance_events.9.t:0 "Nervis des Cartels Nains"
 dwarven_tolerance_events.9.d:0 "Les Cartels Nains se forment souvent comme conglomérats marchands qui servent également de centre aux communautés naines lorsqu'elles sont minoritaires dans une cité.\n\nCertains de ces cartels ont évolué en rien de moins qu'une bande organisée, et ont, telle la roche, lentement mais sûrement accru leur pouvoir, extorquant paysans, marchands et seigneurs. Profitant des troubles et du mécontentement de notre population naine, ces cartels criminels organisés ont uni de plus en plus de nervis nains autour d'eux, et ont commencé à utiliser leur force collective pour intimider et punir leurs victimes. Cependant, cette situation présente un côté positif, car ces criminels semblent agir indépendamment des principaux cartels, qui ont demandé de l'aide pour contrôler leurs congénères enclins au crime."
 dwarven_tolerance_events.9.a:0 "Soutenir le cartel pour traduire les éléments hors-la-loi en justice"
 dwarven_tolerance_events.9.b:0 "Affecter davantage de membres à la garde locale"
 dwarven_tolerance_events.9.c:0 "Infliger une amende aux cartels pour ne pas gérer les leurs"

 dwarven_tolerance_events.11.t:0 "Bastion Nain"
 dwarven_tolerance_events.11.d:0 "Bien qu'il soit difficile de dire quand cela s'est produit, il est désormais fort clair que dans l'une de nos provinces un bastion nain a été bâti. Pour l'essentiel, ce type de fortifications ne nous cause point de trouble, mais ils se sont déclarés indépendants. Leurs soi-disant « nobles » exigent une quantité déraisonnable de terres et que nous les reconnaissions comme royaume indépendant."
 dwarven_tolerance_events.11.a:0 "Ils peuvent avoir les terres pour le moment"
 dwarven_tolerance_events.11.b:0 "Racheter immédiatement les terres"
 dwarven_tolerance_events.11.c:0 "Envoyer l'armée, ces terres nous appartiennent légitimement"
 dwarven_tolerance_events.11.e:0 "Voilà une opportunité déguisée"
 dwarven_independent_stronghold_prov:0 "Bastion Indépendant"
 desc_dwarven_independent_stronghold_prov:0 "Un bastion indépendant existe dans la province et étend son influence, ce qui rend plus difficile pour l'administration locale de faire son travail tandis que les gens, principalement des nains, affluent sous sa bannière."
 dwarven_independent_stronghold_attacked_prov:0 "Combat pour la Forteresse"
 desc_dwarven_independent_stronghold_attacked_prov:0 "Alors qu'un bastion nain dans la province s'est proclamé indépendant, le gouvernement a répondu en envoyant l'armée. Il y a maintenant des combats dans la province pour le droit de gouverner."
 dwarven_independent_stronghold_deal_prov:0 "Accord avec le Bastion"
 desc_dwarven_independent_stronghold_deal_prov:0 "Un accord a été conclu avec un bastion local qui, bien que de facto indépendant, agit davantage comme un vassal qu'un royaume indépendant. Bien que cela ait nui au recrutement dans la région, cela a aidé à améliorer notre capacité à protéger la province."

 dwarven_tolerance_events.12.t:0 "Cartels Nains"
 dwarven_tolerance_events.12.d:0 "À [dwarven_guild_province.GetName], d'éminents cartels nains se sont élevés, cherchant fortune et travaillant avec de nombreux groupes de nains pour améliorer leur influence dans la région.\n\nCela a conduit à ce qu'ils soient plus influents qu'auparavant. Ils ont même pu approvisionner la région en nouvelles marchandises de qualité. Cela bénéficiera indubitablement à notre commerce, mais en échange de la poursuite de leurs services, ils exigent certains privilèges. Ces privilèges inquiètent toutefois notre propre classe marchande, qui prétend qu'elle sera surpassée si nous permettons cela."
 dwarven_tolerance_events.12.a:0 "Leur compétence sera récompensée"
 dwarven_tolerance_events.12.b:0 "Nous ne pouvons malheureusement accepter cela"
 dwarven_tolerance_events.12.c:0 "Scandaleux ! Nul nain ne mérite de tels privilèges"

 dwarven_primary_refugees:0 "Un Foyer pour le Peuple Nain"
 dwarven_guilds_given_privileges:0 "Privilèges du Cartel Nain"
 desc_dwarven_guilds_given_privileges:0 "Le Cartel Nain de la région s'est révélé bénéfique au commerce local et a donc reçu des privilèges pour l'aider à maintenir ses activités profitables."
 dwarven_guilds_upset:0 "Cartel Nain Mécontent"
 desc_dwarven_guilds_upset:0 "Le Cartel Nain local est mécontent de ne pas avoir été récompensé pour sa compétence. Cela a accru les troubles dans la région, les nains se demandant si nous avons leurs intérêts à cœur."

