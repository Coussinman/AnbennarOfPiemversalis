 hobgoblin_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Hobgobelins"
 hobgoblin_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités hobgobelines de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race hobgobeline a augmenté."
 hobgoblin_tolerance_events.2.a:0 "Tant mieux pour eux"

 hobgoblin_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Hobgobelins"
 hobgoblin_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race hobgobeline a diminué."
 hobgoblin_tolerance_events.3.a:0 "C'est regrettable"

 hobgoblin_tolerance_events.4.t:0 "Ministre Hobgobelin"
 hobgoblin_tolerance_events.4.d:0 "S'il ne peut y avoir qu'une seule chose dite sur la race hobgobeline, que ce soit leur maîtrise de la guerre sans égale dans ce monde, une force qui les a rendus craints par tous ceux qui habitent Haless depuis qu'ils ont quitté l'Échine-du-Serpent pour la première fois. Bien que nous ne puissions que rêver que nos armées atteignent ce niveau de notoriété, pour l'instant, un officier hobgobelin retraité d'une renommée non négligeable s'est approché de la cour de [Root.Monarch.GetTitle] avec l'offre d'aider à former une force militaire véritablement professionnelle."
 hobgoblin_tolerance_events.4.a:0 "Embaucher cet hobgobelin !"
 hobgoblin_tolerance_events.4.b:0 "Un véritable exemple de leur race"
 hobgoblin_tolerance_events.4.c:0 "Et alors ?"

 hobgoblin_tolerance_events.5.t:0 "Débat entre Mage et Hobgobelin"
 hobgoblin_tolerance_events.5.d:0 "La cour est en effervescence de discussion entre les émissaires des mages et les officiers hobgobelins en représentation de leurs communautés. Les tensions entre les deux camps sont à un niveau historique après un cas particulièrement grave de maltraitance de mages hobgobelins : un groupe de tels sorciers s'est échappé de leur garde de type militaire dans notre terre de la couronne, mais a été traqué, enchaîné et attelé avec des colliers massifs chargés de damestear-noir, les soumettant pour être ramenés en captivité, nos sources étant réticentes à décrire d'autres moyens de punition employés qu'elles regrettent d'avoir vus. Les hobgobelins accusent les mages de « remuer les chamans » en envoyant des agents pour inciter leurs sensibles à la magie à fuir, et exigent que nous respections et défendions leur autonomie dans le traitement des anomalies magiques d'une « manière responsable ». Les mages eux-mêmes se sentent personnellement attaqués et insultés si nous permettons un traitement aussi « barbare et inhumain » des sorciers dans nos frontières, les lois locales au diable."
 hobgoblin_tolerance_events.5.a:0 "Contrôler les mages"
 hobgoblin_tolerance_events.5.b:0 "Argumentez ailleurs"
 hobgoblin_tolerance_events.5.c:0 "Nous ne tolérerons pas cela !"

 hobgoblin_tolerance_events.6.t:0 "Comparaisons Odieuses"
 hobgoblin_tolerance_events.6.d:0 "La réputation hobgobeline de discipline et de gestion efficace des camps de guerre n'est pas exagérée le moins du monde. À tel point que leur compétence est cause de relations difficiles avec le reste du militaire, des simples soldats, qui se sentent méprisés et moqués par l'attitude apparente de supériorité des hobgobelins, au haut commandement, dont les membres sont cruellement conscients des méthodes hobgobelines supérieures et de la mauvaise image que cela reflète sur leur leadership. Ce contraste s'est révélé si frappant dans le cas de l'une de nos armées que nos agents ont enquêté et trouvé des preuves d'un programme de revente d'équipement militaire et de falsification de registres qui pointent directement vers certaines des maisons nobles et conglomérats marchands les plus puissants"
 hobgoblin_tolerance_events.6.a:0 "Maudissez-les !"
 hobgoblin_tolerance_events.6.b:0 "Remplacer les délinquants par des hobgobelins"
 hobgoblin_tolerance_events.6.c:0 "Imputer la faute aux hobgobelins"

 hobgoblin_mages_rebellion:0 "Rébellion des Mages"
 desc_hobgoblin_mages_rebellion:0 "Les mages indisciplinés se rebellent contre nous pour ne pas avoir pris leur parti"

 hobgoblin_in_military:0 "Hobgobelins dans le Militaire"

