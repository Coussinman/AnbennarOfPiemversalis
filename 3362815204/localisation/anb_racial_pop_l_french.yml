# Descriptions de races
 racial_pop_selected_desc:0 "[Root.getRacialPopDescription]"
 racial_pop_desc_centaur:0 "Les centaures sont une race mi-humain mi-cheval, avec le torse supérieur d'un humain sur le corps d'un cheval.\n\nBien qu'ils fassent originellement partie des habitants féeriques des Bois-Profonds, les centaures ont été chassés par Castan Fléau-des-Bêtes et vivent depuis une vie nomade dans les steppes hostiles des Plaines-Interdites."
 racial_pop_desc_dwarven:0 "Les nains sont un peuple petit et trapu connu pour leur artisanat industrieux, leurs bières corsées et une sacrée veine d'entêtement.\n\nOriginaires des montagnes de l'Échine-du-Serpent, le peuple nain a perdu une grande partie de sa patrie il y a longtemps face aux races orques et gobelinoïdes, et est depuis devenu réfugié dans le monde de surface."
 racial_pop_desc_elven:0 "Les elfes sont une race souple, agile et douée en magie originaire d'Aelantir, couramment reconnus par leurs oreilles pointues.\n\nMalgré leurs nombreuses variétés, ils sont tous perçus avec un sens d'émerveillement et de beauté éthérée par les autres races du monde, à leur avantage ou détriment."
 racial_pop_desc_gnollish:0 "Les gnolls sont une race sauvage et brutale ressemblant à des hyènes humanoïdes, originaires du désert Salahadi.\n\nIls sont connus de façon infâme comme esclavagistes, et en tant que société, ont été le fléau des royaumes civilisés depuis l'antiquité. Ils sont cependant une race ingénieuse, capable de récupération à grande échelle, et sont connus pour leur loyauté envers leur meute."
 racial_pop_desc_gnomish:0 "Les gnomes sont une race petite et intelligente connue pour leurs inventions ingénieuses et leur sens de l'humour excentrique.\n\nJadis dirigeants d'un empire fier, la Hiérarchie Gnomique, ils ont perdu leur patrie dans la Côte-du-Dragon au Ve siècle AA et se sont depuis répandus à travers le monde, principalement dans les cités humaines."
 racial_pop_desc_goblin:0 "Les gobelins sont une race petite et nombreuse de gobelinoïdes originaires des montagnes de l'Échine-du-Serpent, vivant traditionnellement dans des cavernes et tunnels là-bas.\n\nLes gobelins sont exceptionnellement rusés dans leurs plans et stratagèmes, et sont devenus connus pour leur marque explosive d'artisanat magique et leur expertise commerciale impitoyable au XVIIIe siècle."
 racial_pop_desc_half_elven:0 "Les demi-elfes sont les descendants d'unions entre humains et elfes et se trouvent le plus couramment à Cannor, où ils dominent les cercles de noblesse et sont vus comme les véritables héritiers d'Anbennar.\n\nDans d'autres parties du monde, le statut des demi-elfes peut être très différent, leur existence même considérée comme blasphématoire à Bulwar par exemple."
 racial_pop_desc_half_orcish:0 "Les demi-orques sont le résultat d'un accouplement orque et humain ou elfique, et la plus jeune race de toutes, résultant de la Marée Verte à Escann et de l'invasion de Rahen par le Commandement au XVe siècle.\n\nIls sont souvent vus comme des parias, mais une certaine ténacité peut être admirée dans la capacité de cette race à endurer et s'adapter au monde et à la façon dont il les traite."
 racial_pop_desc_halfling:0 "Les halfelins sont une race petite à l'apparence humaine connue pour leurs vies simples, leurs attitudes joviales et un grand amour de la nourriture.\n\nOriginaires de Sarhal, les halfelins se sont depuis fait un foyer dans le Petit-Pays et de nombreuses autres cités à travers le monde."
 racial_pop_desc_harimari:0 "Les Harimari sont une race féline prenant l'apparence de tigres humanoïdes, originaires de la péninsule maintenant nommée Ascension dans le sud de Rahen.\n\nLes Harimari sont connus comme philosophes et guerriers féroces, et c'est leur tendance pour les deux qui leur a valu la position de conquérants de Rahen et Haless à travers l'histoire."
 racial_pop_desc_harpy:0 "Les harpies sont une race asexuée, monosexe qui ressemblent à des femelles humanoïdes avec des attributs aviaires distincts et variés tels que des ailes, des serres et des plumes.\n\nConnues pour leur capacité à voler et leurs voix distinctives, les harpies peuvent être trouvées sur toute la longueur de Halann, bien que leur population soit principalement centrée à Bulwar, d'où l'on présume qu'elles sont originaires."
 racial_pop_desc_hobgoblin:0 "Les hobgobelins sont une sous-race de gobelinoïdes originaires de l'Échine-du-Serpent orientale. Contrairement à leurs cousins gobelins, ils ont la peau rouge tout en étant plus forts et plus grands.\n\nLeur société est extrêmement rigide ; une attitude disciplinée et loyale est vénérée et toute désobéissance est sévèrement punie, en faisant des soldats et conquérants redoutables."
 racial_pop_desc_human:0 "Les humains sont une race extrêmement variée présente à travers la majeure partie du monde.\n\nHautement adaptables, les humains sont souvent à la tête des organisations et pays les plus prospères de Halann. Si quelque chose les caractérise, c'est leur ambition et leur volonté exceptionnelle d'aller plus loin que quiconque auparavant."
 racial_pop_desc_kobold:0 "Les kobolds sont une petite race reptilienne originaire à la fois de la Côte-du-Dragon et du Yanshen. Ils ressemblent à de petits dragons humanoïdes sans ailes, auxquels on pense qu'ils sont distamment apparentés.\n\nMalgré leur réputation de couardise, ils sont infâmes pour leurs trésors et leurs inventions ingénieuses qui pourraient rivaliser avec celles des gnomes, gobelins et nains."
 racial_pop_desc_lizardfolk:0 "Les hommes-lézards sont une race fière et industrieuse des jungles de Sarhal. Ils sont quelque peu isolés du reste de Halann, se méfiant à la fois des autres races et les uns des autres.\n\nIls varient grandement en apparence, allant de svelte et dextre à imposant et crocodilien. Cependant, ils partagent tous des peaux écailleuses dures comme armure et des griffes servant d'armes naturelles."
 racial_pop_desc_mechanim:0 "Les Mechanim sont une race d'êtres artificiels sensibles, construits de métal et de magie par des chercheurs elfes dans l'ancienne Insyaa. Leurs corps mécaniques varient énormément en apparence, mais chacun contient un Kauga, un morceau taillé de damestear incrusté de métal qui sert à la fois de cerveau et de moteur. \n\nAprès des millénaires d'épreuves, les mechanim s'éveillent une fois de plus, prêts à reconstruire leurs histoires, leurs cultures, leur peuple, tout à nouveau."
 racial_pop_desc_ogre:0 "Les ogres sont un type de descendants de géants, des humanoïdes de 3 mètres de haut qui sont corpulents mais musclés.\n\nConnus pour leur comportement brutal et leur appétit glouton pour toutes choses (même entre eux), ils croient pouvoir hériter du pouvoir des forts et des sages en les dévorant."
 racial_pop_desc_orcish:0 "Les orques sont une race forte et sauvage, prétendument originaire des profondeurs les plus sombres de l'Échine-du-Serpent.\n\nLa hiérarchie orque est basée sur la force, et ils valorisent l'honneur et l'adversité par-dessus tout. Ils avaient jadis la capacité de prendre lentement la couleur de leur environnement jusqu'à ce que cela soit soudainement perdu durant la Marée Verte, laissant certaines parties du monde remplies d'orques de couleurs différentes."
 racial_pop_desc_ruinborn:0 "Né-des-Ruines est un terme général pour les elfes restés à Aelantir après le Jour-des-Cieux-Cendrés. Une sous-race très variée, ils peuvent aller de variantes mutées d'elfes au nez de chauve-souris à presque indiscernables.\n\nBien que leurs cultures soient aussi diverses que leur apparence, ils partagent une histoire et mythologie communes de la ruine de leur patrie et sont vus comme un cousin arriéré de l'espèce elfique."
 racial_pop_desc_troll:0 "Les trolls sont un type vorace de descendants de géants connus pour leurs capacités régénératives, leurs grands nez laids et leurs grandes gueules à défenses.\n\nL'espèce est hautement adaptable à de nombreux environnements, et en conséquence, de nombreuses régions ont leur propre sous-race de troll, comme la Gérudie et le Marais-de-l'Ombre où ils sont les plus nombreux."
 racial_pop_desc_none:0 ""

