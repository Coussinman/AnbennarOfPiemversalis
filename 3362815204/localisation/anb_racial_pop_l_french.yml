 gnoll_tolerance_events.1.t:0 "Les Minorités Gnolles Exigent une Représentation"
 gnoll_tolerance_events.1.d:0 "Les minorités gnolles dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 gnoll_tolerance_events.1.a:0 "Accordé !"
 gnoll_tolerance_events.1.b:0 "Faire quelques concessions"
 gnoll_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 gnoll_tolerance_events.1.e:0 "Faire des promesses vides"

 gnoll_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Gnolls"
 gnoll_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités gnolles de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race gnolle a augmenté."
 gnoll_tolerance_events.2.a:0 "Tant mieux pour eux"

 gnoll_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Gnolls"
 gnoll_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race gnolle a diminué."
 gnoll_tolerance_events.3.a:0 "C'est regrettable"

 gnoll_tolerance_events.4.t:0 "Ministre Gnoll"
 gnoll_tolerance_events.4.d:0 "Les gnolls sont bien connus pour leurs tendances entreprenantes et leur ténacité militaire. Pour le meilleur ou pour le pire, de nombreux peuples peuvent témoigner de leur capacité au combat. De même, si quelqu'un parvient à obtenir l'amitié ou la loyauté d'un gnoll, il ne peut qu'en bénéficier ; le dévouement féroce des gnolls envers ceux qu'ils considèrent comme leur meute l'emporte sur tout le reste. Un gnoll d'une certaine capacité est maintenant venu voir [Root.Monarch.GetTitle] avec une offre de service, jurant de faire son devoir comme pour son chef de meute."
 gnoll_tolerance_events.4.a:0 "Accorder à ce gnoll une position à la cour !"
 gnoll_tolerance_events.4.b:0 "Ils sont véritablement un exemple pour leur communauté !"
 gnoll_tolerance_events.4.c:0 "Pas intéressé."

 gnoll_tolerance_events.5.t:0 "Gnolls Ingénieux !"
 gnoll_tolerance_events.5.d:0 "Les gnolls, une race entreprenante sans pareille en matière de récupération et d'artisanat, se sont récemment révélés extrêmement bénéfiques pour l'économie de [Root.GetName]. Leur implication dans un certain secteur de l'économie locale a entraîné une augmentation de la production de biens et une amélioration de la force économique locale. L'opinion de la population non-gnolle est divisée. Certains sont bien sûr hostiles à ceux qu'ils jugent étrangers et exigent que [Root.Monarch.GetTitle] intervienne. Mais d'autres apprécient plutôt l'augmentation des profits que les gnolls ont aidé à partager."
 gnoll_tolerance_events.5.a:0 "Les soutenir !"
 gnoll_tolerance_events.5.b:0 "Les laisser tranquilles."
 gnoll_tolerance_events.5.c:0 "Récupérer ? Sur MES terres ?"

 gnoll_tolerance_events.6.t:0 "Recycleurs Gnolls"
 gnoll_tolerance_events.6.d:0 "Un nouveau développement a eu lieu à [Root.GetName]. Les gnolls, étant, après tout, inégalés dans leur capacité de récupération, ont fouillé les tas d'ordures de la province et par quelque coup d'ingéniosité que notre peuple ne peut imiter, ont réussi à produire des outils et des meubles moins chers que ceux des artisans locaux. Évidemment, lesdits artisans sont maintenant venus voir [Root.Monarch.GetTitle] pour se plaindre et exiger que quelque chose soit fait pour empêcher cette concurrence déloyale ; cependant, des personnes plus pragmatiques dans notre cour peuvent voir un avantage non nul à les laisser continuer."
 gnoll_tolerance_events.6.a:0 "Leur construire plus d'ateliers ! Et leur procurer plus de matériel !"
 gnoll_tolerance_events.6.b:0 "Les laisser continuer leur travail en paix."
 gnoll_tolerance_events.6.c:0 "Ne pas les laisser voler les moyens de subsistance de nos artisans !"

 gnoll_tolerance_events.7.t:0 "Des Gnolls Offrent de Combattre !"
 gnoll_tolerance_events.7.d:0 "À la suite des politiques bienveillantes de notre État envers la population gnolle de [Root.GetName], la grande majorité des gnolls considèrent [Root.Monarch.GetTitle] non seulement comme leur dirigeant mais comme le chef de leur meute. Pour un gnoll, cette désignation comporte une obligation primordiale de loyauté. Ce devoir inspire ceux qui y adhèrent à de vastes sommets de dévouement et d'innovation au service de [Root.Monarch.GetTitle] personnellement. Récemment, cela a eu pour résultat qu'un groupe de gnolls, avec tout leur équipement requis acheté par eux-mêmes, se soit présenté à [Root.Capital.GetName] pour combattre dans nos forces. L'avis majoritaire est que nous ne pouvons qu'en bénéficier en les intégrant dans notre armée ; après tout, les gnolls sont réputés comme des troupes de choc inégalées."
 gnoll_tolerance_events.7.a:0 "Les faire tous entrer dans une caserne immédiatement !"
 gnoll_tolerance_events.7.b:0 "Nous pourrions en utiliser certains."
 gnoll_tolerance_events.7.c:0 "Nous n'avons pas besoin de votre espèce. Partez immédiatement !"

 gnoll_tolerance_events.8.t:0 "Les Gnolls Proclament [Root.Monarch.GetName] Chef de Meute !"
 gnoll_tolerance_events.8.d:0 "Un groupe de gnolls, représentant leur groupe social plus large, ont déclaré [Root.Monarch.GetTitle] chef de leur meute. Nos conseillers nous ont informés que cela est significatif ; un gnoll se considère lié par serment à un individu qu'il juge être un chef de meute.\n\nLes gnolls ont adressé une pétition à [Root.Monarch.GetTitle] pour combattre dans l'armée de notre nation afin qu'ils puissent agir conformément à leur dette de loyauté envers leur chef de meute."
 gnoll_tolerance_events.8.a:0 "En tant que votre chef de meute, j'accepte votre service."
 gnoll_tolerance_events.8.b:0 "Je suis votre chef, mais la loyauté ne vous oblige pas à saigner pour moi."
 gnoll_tolerance_events.8.c:0 "Un « chef de meute » ? Bah ! Je suis un [Root.Monarch.GetTitle] !"

 gnoll_tolerance_events.9.t:0 "Des Gnolls Sèment le Chaos à [Root.GetName]"
 gnoll_tolerance_events.9.d:0 "Terrible nouvelle de [Root.GetName] ! La population gnolle hostile dans cette région est devenue sauvage et a gravement endommagé une ville de la région. Alors que les survivants fuient pour sauver leur vie, il appartient à [Root.Monarch.GetTitle] de déterminer comment répondre à cette attaque perfide contre notre nation et son peuple ; certains préconisent l'extermination, mais d'autres conseillent une approche plus pragmatique."
 gnoll_tolerance_events.9.a:0 "Traquer les bêtes, puis reconstruire la ville !"
 gnoll_tolerance_events.9.b:0 "Ainsi soit-il."
 gnoll_tolerance_events.9.c:0 "Exterminer ces brutes !"
 gnoll_tolerance_events.9.e:0 "Les payer pour reconstruire la ville."

 gnoll_crafters:0 "Artisans Gnolls"
 desc_gnoll_crafters:0 "Des artisans gnolls se sont installés dans cette province, leur ingéniosité rend la production bien plus grande."
 gnollish_recyclers:0 "Recyclage Gnoll"
 desc_gnollish_recyclers:0 "Les gnolls à travers la nation fabriquent des outils bon marché et de qualité décente à partir de matériaux récupérés."
 gnoll_recruitment_extensive:0 "Recrutement Étendu de Gnolls"
 desc_gnoll_recruitment_extensive:0 "Les quantités massives de recrues gnolles fournissent des résultats stupéfiants sur le champ de bataille."
 gnoll_recruitment_small:0 "Petit Recrutement de Gnolls"
 desc_gnoll_recruitment_small:0 "Une petite quantité de recrues gnolles augmente la capacité de combat de notre armée."
 gnollish_recycling_prices:0 "Surpassé par les Prix du Recyclage Gnoll"
 desc_gnollish_recycling_prices:0 "Les prix bon marché des recycleurs gnolls forcent les marchands à baisser leurs prix."
 gnollish_refugees_gold_desc:0 "du travail gnoll augmentant la productivité de notre province"

