 lizardfolk_tolerance_events.1.t:0 "Les Minorités d'Hommes-lézards Exigent une Représentation"
 lizardfolk_tolerance_events.1.d:0 "Les minorités d'hommes-lézards dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 lizardfolk_tolerance_events.1.a:0 "Accordé !"
 lizardfolk_tolerance_events.1.b:0 "Faire quelques concessions"
 lizardfolk_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 lizardfolk_tolerance_events.1.e:0 "Faire des promesses vides"

 lizardfolk_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Hommes-lézards"
 lizardfolk_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités d'hommes-lézards de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race des hommes-lézards a augmenté."
 lizardfolk_tolerance_events.2.a:0 "Tant mieux pour eux"

 lizardfolk_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Hommes-lézards"
 lizardfolk_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race des hommes-lézards a diminué."
 lizardfolk_tolerance_events.3.a:0 "C'est regrettable"

 lizardfolk_tolerance_events.4.t:0 "Une Démonstration Sanglante"
 lizardfolk_tolerance_events.4.d:0 "La foi Zaradyrra des hommes-lézards fait de l'art une religion, mais la définition de l'art peut être flexible en effet. Dernièrement, une jeune bouchère Zaradyrra particulièrement habile a commencé à faire un spectacle de son métier, abattant et découpant la volaille et le bétail plus gros dans une démonstration élégante de maniement du couteau. L'élite dénigre cela comme un spectacle dégoûtant, inapproprié pour la cour, mais nous pourrions montrer beaucoup de compréhension de la coutume Zaradyrra en reconnaissant l'habileté et le talent de cette jeune bouchère. Certains sont allés jusqu'à recommander que nous l'invitions à se produire devant [Root.Monarch.GetTitle]."
 lizardfolk_tolerance_events.4.a:0 "Dîner et spectacle ? Pourquoi pas ?"
 lizardfolk_tolerance_events.4.b:0 "Lui envoyer une plaque ou quelque babiole, quelque chose qu'elle pourra exhiber."
 lizardfolk_tolerance_events.4.c:0 "Ignorer cette sauvage ignorante."

 lizardfolk_tolerance_events.5.t:0 "La Roue qui Grince"
 lizardfolk_tolerance_events.5.d:0 "Notre minorité d'hommes-lézards s'est révélée tenace et participante enthousiaste dans notre système républicain, n'ayant aucun manque de confiance et fortement motivée à faire pression pour leurs intérêts collectifs. Comme les hommes-lézards préfèrent généralement vivre parmi les leurs, ils ont formé des quartiers séparés dans nos cités et ont activement collaboré pour acheter des propriétés et de l'influence, soit en obtenant des représentants au gouvernement pour eux-mêmes, soit en parrainant des non-hommes-lézards sympathiques. En retour, ces officiels approuvent des projets de construction et des ordonnances locales bénéficiant à la communauté des hommes-lézards.\n\nComme on pouvait s'y attendre, de nombreuses figures de notre gouvernement voient cela comme une tendance dangereuse qui devrait être éliminée, soit par des achats forcés de propriétés pour diluer le vote contrôlé par les hommes-lézards, soit par une administration plus directe de nos centres urbains. Des figures plus pragmatiques dans votre entourage, cependant, voient une simple opportunité d'échange : s'allier avec ces éléments pro-hommes-lézards et lever leur soutien contre notre opposition. Cela pourrait être politiquement lucratif, mais il est peu probable que cela nous reflète bien."
 lizardfolk_tolerance_events.5.a:0 "Demander un dîner avec un ou quelques-uns de ces hommes-lézards. Voyons ce qui peut être arrangé."
 lizardfolk_tolerance_events.5.b:0 "Nous ne sommes ni tyrans ni serpents ; laissons-les simplement tranquilles."
 lizardfolk_tolerance_events.5.c:0 "Nous ne pouvons tolérer aucune pilarisation dans notre république."

lizardfolk_tolerance_events.6.t:0 "Un Mage Naga Émerge"
 lizardfolk_tolerance_events.6.d:0 "Les nagas serpentins constituent une petite minorité des hommes-lézards, mais ils ont une rare disposition pour la magie et, surtout à l'étranger, ont une influence démesurée dans leurs communautés. Un tel mage naga a jeté son dévolu sur l'adhésion à la cour, la plus haute fonction à laquelle il peut aspirer dans un pays sans aristocratie naga traditionnelle. Notre clergé s'y est opposé avec véhémence, citant le rôle sacré des nagas dans de nombreuses sociétés d'hommes-lézards et l'approbation implicite d'une foi étrangère qu'ils estiment qu'une telle décision représenterait. Les nagas sont également notoires pour leur réserve hautaine et leur sens de leur propre majesté, et il n'y a aucune garantie quant à la façon dont ce naga s'intégrerait à la cour."
 lizardfolk_tolerance_events.6.a:0 "Cela vaut la peine pour le talent."
 lizardfolk_tolerance_events.6.b:0 "Nous pouvons trouver nos propres mages."

 lizardfolk_tolerance_events.7.t:0 "Une Langue Fourchue"
 lizardfolk_tolerance_events.7.d:0 "Étant donné leur réserve traditionnelle et leur méfiance envers les étrangers, il est rare que les hommes-lézards deviennent bien connus en dehors de leurs propres communautés. Au cours des dernières années, cependant, un polémiste homme-lézard virulent et très érudit vivant à [lizardfolk_forked_tongue_province.GetName] a rédigé un certain nombre de traités sur le gouvernement, comparant et contrastant notre gouvernement et celui de nos voisins avec plusieurs des 332 empires historiques d'hommes-lézards les plus éminents. Nous n'en sortons pas particulièrement bien.\n\nD'une part, ces critiques sont plus institutionnelles que philosophiques : le polémiste ne plaide pas pour le renversement du gouvernement, et nous crédite même sur quelques points, bien que pas aussi souvent qu'il nous dénigre. Quelques officiels ont même confié en privé qu'il y a du mérite à certaines des critiques. Les opinions sont divisées quant à savoir si les actions du polémiste doivent être considérées comme de la trahison ou non."
 lizardfolk_tolerance_events.7.a:0 "C'est une attaque contre la dignité de l'État. L'arrêter."
 lizardfolk_tolerance_events.7.b:0 "Si les observations sont correctes, utilisons-les, et donnons à l'écrivain une allocation pour en faire davantage."
 lizardfolk_tolerance_events.7.c:0 "Cela est en dessous de notre attention."

 lizardfolk_tolerance_events.8.t:0 "Une Chef Naga S'Approche de la Cour"
 lizardfolk_tolerance_events.8.d:0 "Rarement, une famille d'hommes-lézards donnera naissance à un naga semblable à un serpent, vénéré dans une grande partie du territoire des hommes-lézards, ils s'élèvent facilement à l'influence et au pouvoir. Dans les terres où les hommes-lézards ne gouvernent pas, ou où ils vivent dans des communautés fermées et étroitement liées, cette influence est moins formelle. Les nagas se trouvent en tant que matriarches de ces quartiers d'immigrants, en tant que propriétaires d'entreprises, en tant que magistrats officieux et résolveurs de problèmes.\n\nUne telle naga est venue nous demander notre aide et notre investissement : elle représente une tendance pro-gouvernementale dans notre population d'hommes-lézards et a une relation de travail étroite avec les magistrats locaux. Elle aimerait déblayer plusieurs rues de bidonvilles et construire des logements appropriés et un aqueduc pour sa communauté, et demande un investissement pour le faire. En privé, elle s'engage également à attribuer fermement le crédit à nous, ce qui pourrait beaucoup faire pour améliorer notre relation avec notre minorité d'hommes-lézards."
 lizardfolk_tolerance_events.8.a:0 "Ne ménager aucune dépense pour cela."
 lizardfolk_tolerance_events.8.b:0 "Nous pouvons aider, mais négocions."
 lizardfolk_tolerance_events.8.c:0 "Nous ne pouvons tout simplement pas l'épargner."

 lizardfolk_tolerance_events.9.t:0 "Une Presse Indépendante"
 lizardfolk_tolerance_events.9.d:0 "Depuis la prolifération des presses à travers notre pays, la tendance générale a été pour les communautés de se rapprocher les unes des autres, capables d'échanger des informations et de standardiser les textes. Cela n'a pas été vrai pour notre minorité d'hommes-lézards, qui historiquement ont préféré vivre cloîtrés parmi les leurs, et qui en conséquence ont commencé à publier leurs propres pamphlets, périodiques et journaux. Une grande partie du contenu de ceux-ci est inoffensive, mais certains des écrits éditoriaux proclament les vertus de la gouvernance historique des hommes-lézards, ou regrettent ouvertement le 333e Empire, sentiments que beaucoup de nos courtisans considèrent ouvertement séditieux."
 lizardfolk_tolerance_events.9.a:0 "Nous n'interdirons pas ces publications, mais elles doivent se soumettre à un censeur pour être légales."
 lizardfolk_tolerance_events.9.b:0 "C'est une tempête dans une tasse de thé."
 lizardfolk_tolerance_events.9.c:0 "Mettre le feu à ces torchons."

 lizardfolk_tolerance_events.10.t:0 "Colons Hommes-lézards"
 lizardfolk_tolerance_events.10.d:0 "Nous avons reçu une pétition d'un groupe d'administrateurs locaux à [lizardfolk_homesteaders_province.GetName], qui rapportent que ce qui a commencé comme une petite ferme d'hommes-lézards il y a plusieurs décennies est devenu un établissement indépendant. Dirigé par une matriarche naga charismatique qui a réussi à attirer un certain nombre de fidèles, le village maintient un mur d'enceinte et n'autorise les étrangers que dans une place commerciale désignée. Ils préfèrent généralement rester distants et reclus, parlent largement leur propre langue et appliquent strictement les litiges territoriaux.\n\nLa paysannerie est divisée : beaucoup sont satisfaits de commercer avec l'établissement et louent la qualité de leurs biens, mais une minorité importante et vocale s'oppose à la présence d'une communauté qui revendique les terres environnantes (bien que légalement) et refuse l'accès. Il y a eu plusieurs petites échauffourées entre les habitants et les hommes-lézards concernant les droits de pâturage et l'utilisation commune des sources d'eau. Les administrateurs qui ont fait la pétition soulignent également le manque de surveillance juridique sur ce qui se passe à l'intérieur de l'établissement ; ils vous exhortent au moins à forcer l'ouverture de l'établissement aux commerçants et aux inspecteurs."
 lizardfolk_tolerance_events.10.a:0 "Le statu quo convient. Leur solitude ne nuit à personne."
 lizardfolk_tolerance_events.10.b:0 "L'établissement peut rester, mais ils ne peuvent pas refuser l'accès à nos officiels."
 lizardfolk_tolerance_events.10.c:0 "Nous ne pouvons tolérer cette présence étrangère sur notre territoire. Disperser l'établissement."

 lizardfolk_tolerance_events.11.t:0 "Les Hommes-lézards Demandent des Bains"
 lizardfolk_tolerance_events.11.d:0 "Un petit groupe d'artisans hommes-lézards aisés a approché notre trésorerie avec une proposition d'investissement mutuel dans un complexe de bains publics pour [lizardfolk_baths_province.GetName]. Vue traditionnelle dans les terres des hommes-lézards, ces bassins sont un site de commerce informel, de lobbying et même de diplomatie interétatique. Les artisans prétendent qu'un tel complexe attirerait une clientèle importante, même parmi les non-hommes-lézards. En tant qu'investisseur, l'État pourrait récolter les bénéfices d'un tel investissement et montrer un intérêt pour le bien-être de la communauté des hommes-lézards en même temps."
 lizardfolk_tolerance_events.11.a:0 "Un projet qui mérite d'être parrainé."
 lizardfolk_tolerance_events.11.b:0 "Ils peuvent polir leurs écailles à la maison."

 lizardfolk_tolerance_events.12.t:0 "Les Balances de la Justice"
 lizardfolk_tolerance_events.12.d:0 "Il n'est pas fréquent que des cas de simple meurtre attirent l'attention du gouvernement, mais un litige provenant de [lizardfolk_justice_province.GetName] a gagné sa place sur votre bureau. Un homme-lézard Ashhana, l'un des crocodiles, comme vos conseillers les moins diplomates les appellent, a été trouvé mort devant un pub. Il n'y a aucun doute quant à qui l'a tué, car une paire de voyous a déjà avoué, mais ils jurent que « le croc » a attaqué en premier, perdu dans l'une des rages sanglantes connues pour affliger les Ashhana. Ceci n'est attesté par aucun des spectateurs, et le rapport des magistrats considère hautement improbable que des non-Ashhana non armés survivraient à une telle rencontre.\n\nL'opinion publique est derrière les tueurs, méfiante envers les Ashhana et encline à les considérer comme monstrueux. Nerveux à l'idée d'inciter à des troubles, les magistrats ont renvoyé le problème en haut lieu. Il nous incombe maintenant de décider comment cela devrait être traité."
 lizardfolk_tolerance_events.12.a:0 "La loi est la loi. Arrêter les meurtriers et les juger comme n'importe qui d'autre."
 lizardfolk_tolerance_events.12.b:0 "Ne pas poursuivre ces hommes, mais ne pas cautionner leurs actions non plus."
 lizardfolk_tolerance_events.12.c:0 "Devrions-nous arrêter les fermiers pour avoir tué des bœufs maintenant ? Les exonérer."

