 kobold_tolerance_events.1.t:0 "Les Minorités Kobolds Exigent une Représentation"
 kobold_tolerance_events.1.d:0 "Les minorités kobolds de la province de [racial_pop_province_target.GetName] ont demandé une plus grande représentation pour leur peuple ainsi qu'une plus grande autonomie dans leurs droits et actions."
 kobold_tolerance_events.1.a:0 "Accordé !"
 kobold_tolerance_events.1.b:0 "Faire quelques concessions"
 kobold_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 kobold_tolerance_events.1.e:0 "Faire de vaines promesses"

 kobold_tolerance_events.2.t:0 "Augmentation de la Tolérance Kobold"
 kobold_tolerance_events.2.d:0 "Que ce soit par nos politiques et notre gouvernance ou simplement grâce à la prospérité du royaume, notre coexistence avec les minorités kobolds de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race kobold s'est accrue."
 kobold_tolerance_events.2.a:0 "Tant mieux pour eux"

kobold_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Kobolds"
 kobold_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race kobold a diminué."
 kobold_tolerance_events.3.a:0 "C'est regrettable"

 kobold_tolerance_events.4.t:0 "Ministre Kobold"
 kobold_tolerance_events.4.d:0 "Les kobolds sont souvent perçus comme lâches et avides, vivant dans leurs grottes sombres et leurs taudis (ou dans les villes, dans des appartements surpeuplés) avec leurs familles, leurs familles élargies et leurs familles élargies-élargies. Un individu kobold de mérite s'élève généralement soit grâce à sa grande expérience dans la gestion de l'argent et de toutes sortes d'objets de valeur depuis qu'il est éclos, soit en tant qu'excellent coordinateur de grands groupes, ce qui a vu des kobolds à tendance militaire s'élever pour organiser les armées de conscription de masse du XIXe siècle. L'un de ces individus s'est fait connaître."
 kobold_tolerance_events.4.a:0 "Recrutons ce kobold !"
 kobold_tolerance_events.4.b:0 "Un véritable exemple pour sa race"
 kobold_tolerance_events.4.c:0 "Qui s'en soucie ?"

 kobold_tolerance_events.5.t:0 "Des Kobolds Cambriolent une Banque !"
 kobold_tolerance_events.5.d:0 "Des kobolds dans notre nation ont cambriolé une banque, prétendument parce que leurs croyances les y obligeaient, quelque chose à propos d'un trésor de dragon. Alors que normalement les coupables auraient déjà eu rendez-vous avec le bourreau, nous devons nous assurer que cela ne se reproduise plus jamais avec les kobolds, sinon des nuées entières d'entre eux prendraient d'assaut nos banques et toute autre institution de valeur. Nous pourrions taxer les kobolds plus durement en guise de représailles, ce qui enverrait certainement un message clair à toute la communauté pour qu'elle respecte la loi. Nous pourrions essayer de leur dire d'arrêter, ce qui fonctionnerait, bien que cela mobiliserait nos diplomates. Bien sûr, nous pourrions les laisser garder leur or, auquel cas nous pourrions oublier le problème."
 kobold_tolerance_events.5.a:0 "Les éduquer sur l'erreur de leurs voies"
 kobold_tolerance_events.5.b:0 "Les punir comme n'importe quel autre criminel"
 kobold_tolerance_events.5.c:0 "Taxer plus durement les communautés kobolds locales en guise de leçon"

 kobold_tolerance_events.6.t:0 "Des Bricoleurs Kobolds Dévoilent une Nouvelle Invention"
 kobold_tolerance_events.6.d:0 "Récemment, un artificier kobold à [kobold_invention_province.GetName] a dévoilé une nouvelle invention qui s'est révélée très populaire pour sa petite taille et son faible coût. Cependant, elle a également été fabriquée par un kobold, ce qui signifie que les préoccupations de sécurité sont acquises, et beaucoup de nos artificiers les plus conservateurs se sont prononcés contre. Bien que le produit ne soit toujours pas distribué, il pourrait apporter des avantages économiques si nous le laissons être commercialisé, bien que nos artificiers puissent être mécontents."
 kobold_tolerance_events.6.a:0 "Bon marché et efficace ? Allez-y !"
 kobold_tolerance_events.6.b:0 "Exiger qu'ils la rendent plus sûre"
 kobold_tolerance_events.6.c:0 "S'en tenir aux méthodes approuvées par les artificiers"
 kobold_inventions_unsafe:0 "Inventions Kobolds Instables"
 desc_kobold_inventions_unsafe:0 "Une version très efficace mais assez dangereuse d'une invention kobold a été distribuée dans cette province."
 kobold_inventions_OSHA_approved:0 "Inventions Kobolds Sûres"
 desc_kobold_inventions_OSHA_approved:0 "Une version plus sûre, mais moins efficace, d'une invention kobold a été distribuée dans cette province."

 kobold_tolerance_events.7.t:0 "Trésor Kobold Découvert par une Foule"
 kobold_tolerance_events.7.d:0 "Les kobolds étaient connus pour amasser de l'argent dans les grottes profondes des Hauteurs-Draconiques, et ceux vivant dans de petits taudis ne sont pas différents. En réponse à quelque grief grossier, une foule en colère a saccagé l'une de nos cités à la recherche d'argent, et ils l'ont trouvé dans le trésor d'un kobold local. Bien qu'il n'ait enfreint aucune loi, après tout, c'est sa propriété, son accumulation a conduit à une déflation locale, et ses affirmations selon lesquelles il en a besoin pour sa « santé mentale » sont manifestement exagérées. Devrions-nous mettre en colère le kobold impuissant, ou la foule en colère armée de fourches ?"
 kobold_tolerance_events.7.a:0 "Quiconque, quelle que soit sa race, a droit à ses propres biens. Disperser la foule"
 kobold_tolerance_events.7.b:0 "Et que voulez-vous que j'y fasse ?"
 kobold_tolerance_events.7.c:0 "« Redistribuer » la richesse au peuple, après en avoir prélevé un peu au passage, bien sûr"
 kobold_tolerance_events.7.e:0 "La pauvre créature, faisons-lui plaisir"

 kobold_tolerance_events.8.t:0 "Des Tunnels Kobolds Provoquent l'Effondrement d'un Bâtiment"
 kobold_tolerance_events.8.d:0 "Les kobolds sont connus pour être de grands creuseurs, non pas à la manière des nains, mais plutôt des tunnels qui feraient pâlir d'envie les fourmis. L'intersection entre les kobolds et notre peuple a causé des tensions à [kobold_collapsed_building_province.GetName], avec l'effondrement d'un bâtiment majeur en raison de la présence de tunnels kobolds en dessous. Il est clair que cela n'est pas acceptable, mais les kobolds répondent que leurs tunnels sont une nécessité pour loger leur population toujours croissante."
 kobold_tolerance_events.8.a:0 "Dire aux kobolds de construire leurs tunnels dans des endroits plus sûrs"
 kobold_tolerance_events.8.b:0 "Se concentrer simplement sur les réparations du bâtiment"
 kobold_tolerance_events.8.c:0 "Les forcer à évacuer et à aider aux réparations du bâtiment"

 kobold_tolerance_events.9.t:0 "Terriers Entravant la Construction d'un Nouveau Bâtiment"
 kobold_tolerance_events.9.d:0 "Dans le cadre de nos efforts pour améliorer la vie de nos sujets, nous avons décidé de construire un nouveau bâtiment dans notre province. Malheureusement, les terriers et tunnels kobolds sont sur le chemin, et nous devons les gérer si nous voulons continuer sans nouveaux retards. Certains conseillers ont suggéré de les soudoyer pour qu'ils partent, mais d'autres répondent que nous pourrions simplement les effrayer pour moins cher. La garde locale a également demandé un soutien militaire pour simplement les expulser par la force."
 kobold_tolerance_events.9.a:0 "Les soudoyer pour qu'ils partent"
 kobold_tolerance_events.9.b:0 "Les effrayer"
 kobold_tolerance_events.9.c:0 "Les expulser !"
 kobold_burrows:0 "Terriers Kobolds"
 desc_kobold_burrows:0 "Les terriers kobolds s'entrecroisent profondément dans le sol, rendant difficile la construction de fondations et de nouveaux bâtiments en toute sécurité."

 kobold_tolerance_events.10.t:0 "Fichues Trappes Kobolds !"
 kobold_tolerance_events.10.d:0 "Des rapports troublants nous parviennent de [kobold_traps_province.GetName], alors que des pièges ont commencé à apparaître le long des principales artères de la province. Bien que le constructeur de ces pièges soit inconnu, ils sont indubitablement liés à la population locale de kobolds en raison de leur expertise mondiale en matière de confection de pièges. Bien qu'il ne soit pas clair si ces pièges étaient destinés à capturer des animaux ou à blesser des voyageurs, il est évident qu'ils nuisent à nos revenus en décourageant les voyageurs et les marchands de traverser la région.\n\nBien qu'embaucher quelques kobolds pour désactiver les pièges serait l'option la plus sûre, leur avarice est bien connue, ce qui signifie que leurs services ne seront pas bon marché. Une autre option serait de nous occuper des pièges nous-mêmes, bien que cela prendrait beaucoup plus de temps et nuirait à nos affaires à court terme. Enfin, nous pourrions envoyer l'armée pour s'occuper des pièges et punir les coupables, bien que cela nuirait davantage à nos relations avec les kobolds."
 kobold_tolerance_events.10.a:0 "Embaucher des kobolds volontaires pour les démanteler"
 kobold_tolerance_events.10.b:0 "Les démanteler nous-mêmes"
 kobold_tolerance_events.10.c:0 "Envoyer une force pour déloger les coupables"
 kobold_pesky_traps:0 "Fichues Trappes Kobolds"
 desc_kobold_pesky_traps:0 "Les sentiers moins fréquentés et les routes secondaires de cette province sont criblés de pièges kobolds, rendant le commerce et les voyages difficiles."
 kobold_tolerance_events.11.t:0 "Trop d'une Chose Dorée"
 kobold_tolerance_events.11.d:0 "La trésorerie a découvert un problème inattendu avec notre population résidente de kobolds écailles-d'or. Bien que leurs écailles dorées soient naturellement précieuses, elles ont généralement été assez rares, tout comme les kobolds eux-mêmes étaient assez rares. Cependant, nos kobolds se portent maintenant si bien que les écailles de rechange inondent le marché, et chacune devient moins valorisée en conséquence.\n\nLa trésorerie appelle cela « l'inflation » et avertit que si elle n'est pas contrôlée, cela pourrait gravement endommager notre économie. Cependant, si nous ne faisons pas attention, la gestion de cette situation pourrait amener notre peuple à devenir suspicieux et rancunier envers les kobolds, qui n'ont rien fait de mal sinon perdre des écailles, après tout."
 kobold_tolerance_events.11.a:0 "Gérer l'inflation par d'autres moyens"
 kobold_tolerance_events.11.b:0 "Introduire une nouvelle taxe sur les transactions d'écailles"
 kobold_tolerance_events.11.c:0 "Interdire l'utilisation d'écailles dorées"
 kobold_tolerance_events.12.t:0 "Dominance Mercantile Kobold"
 kobold_tolerance_events.12.d:0 "Les bourgeois de [kobold_trade_province.GetName] ont déposé une plainte officielle concernant les kobolds écailles-d'or qui y vivent. L'amour inné des kobolds pour l'argent et leur maîtrise de celui-ci ont conduit certains d'entre eux à devenir marchands, et à très, très bien réussir. Les marchands dorés sont sur le point de dominer le commerce dans tout [kobold_trade_province.GetName].\n\nLes bourgeois considèrent cela comme anti-mercantile, voire oppressif, ce qui n'a certainement rien à voir avec la part de marché qu'ils ont perdue. Ils exigent que nous fassions quelque chose pour freiner ce pouvoir croissant et maintenir le libre flux du commerce sur les marchés de [kobold_trade_province.GetName]."
 kobold_tolerance_events.12.a:0 "Ils sont simplement amers d'avoir perdu"
 kobold_tolerance_events.12.b:0 "Étendre les privilèges pour les kobolds"
 kobold_tolerance_events.12.c:0 "Accepter les exigences des bourgeois"
 kobold_tolerance_events.13.t:0 "Honorer le Dragon Doré"
 kobold_tolerance_events.13.d:0 "Notre royaume prospère, et notre population kobold l'a remarqué. Certains de leurs membres les plus prospères ont adressé une pétition au gouvernement pour financer un projet : couler et ériger une série de statues dorées dans des sanctuaires à plusieurs endroits du pays, pour honorer leur dragon vénéré, Balris.\n\nLes kobolds insistent pour que les statues soient dorées, sinon entièrement en or, au moins plaquées or, ce qui ne sera pas bon marché. Cependant, leurs plans sont étonnamment minutieux et détaillés, et il est difficile de contester l'argument selon lequel ériger de pures statues dorées à travers le pays est une déclaration de succès assez visible."
 kobold_tolerance_events.13.a:0 "Leur donner ce qu'ils veulent"
 kobold_tolerance_events.13.b:0 "Leur donner ce qu'ils veulent, puis les embaucher comme bâtisseurs"
 kobold_tolerance_events.13.c:0 "Décliner respectueusement"
 kobold_tolerance_events.14.t:0 "Les Dragons Disparaissent"
 kobold_tolerance_events.14.d:0 "Il y a des nouvelles troublantes de la campagne de [kobold_disappearing_province.GetName]. Les kobolds écailles-d'or dans les zones périphériques disparaissent simplement, d'abord seuls ou par deux, mais maintenant en petits groupes. Des citoyens affligés et des communautés inquiets de la perte de leurs voisins et symboles de fortune nous ont adressé une pétition pour trouver une réponse.\n\nLa cause, selon nos magistrats, est que certains des bandits de l'arrière-pays ont commencé à kidnapper les écailles-d'or. Les raisons exactes ne sont pas claires mais sont garanties d'être néfastes : les détenir pour rançon, récolter leurs écailles, ou... pire. Les kobolds ne sont qu'une minorité à [kobold_disappearing_province.GetName], mais les forces de l'ordre locales ne peuvent pas agir rapidement contre un groupe qui est maintenant assez important et bien financé. Que devrions-nous faire exactement à ce sujet ?"
 kobold_tolerance_events.14.a:0 "Sévir contre les kidnappeurs"
 kobold_tolerance_events.14.b:0 "Rien"
 kobold_tolerance_events.14.c:0 "S'assurer de rendre les « marchandises » à leurs familles"
 kobold_tolerance_events.15.t:0 "L'Extase de l'Or"
 kobold_tolerance_events.15.d:0 "Les kobolds écailles-d'or ont longtemps été considérés comme un signe de bonne fortune et de prospérité à Haless, et il en va de même à [golden_presence_province.Owner.GetName]. Nous avons été bénis par une population importante vivant parmi nous, et le peuple est très heureux de simplement les avoir autour. Devrions-nous répondre à cela d'une manière ou d'une autre ?"
 kobold_tolerance_events.15.a:0 "Célébrons cette bonne fortune !"
 kobold_tolerance_events.15.b:0 "Je devrais en avoir quelques-uns pour ma cour !"
 kobold_tolerance_events.15.c:0 "Superstition insensée !"
 kobold_tolerance_events.16.t:0 "Un Âge de Prospérité Écaillé d'Or"
 kobold_tolerance_events.16.d:0 "Nos magistrats signalent un avantage majeur dans l'économie de [kobold_prosperity_province.GetName]. La population locale de kobolds écailles-d'or est poussée à créer au nom de leur dragon patron, Balris, construisant de grands monastères et fabriquant de magnifiques trésors. Le commerce de ces artisanats et artefacts, ainsi que des fournitures nécessaires pour les fabriquer, a grandement renforcé l'économie de [kobold_prosperity_province.GetName]."
 kobold_tolerance_events.16.a:0 "Simplement l'apprécier"
 kobold_tolerance_events.16.b:0 "Embaucher le meilleur artisan kobold à notre cour"
 kobold_tolerance_events.16.c:0 "Promouvoir nos propres artisans plutôt que cette camelote"
 scales_tax:0 "Taxe sur les Écailles"
 kobold_free_trade:0 "Libre-Échange Kobold"
 contracted_kobolds:0 "Kobolds Sous Contrat"
 angered_people:0 "Peuple en Colère"
 golden_presence:0 "Présence Dorée"
 kobold_court_officials:0 "Officiers de Cour Kobolds"
 industrious_kobolds:0 "Kobolds Industrieux"

 kobold_tolerance_events.17.t:0 "Bandes Kobolds"
 kobold_tolerance_events.17.d:0 "Il semble que les kobolds de [kobold_causing_havoc_province.GetName] se soient révélés bien plus braves que leur apparence ne le laisserait croire. Ils ont rassemblé un grand nombre de kobolds, et ceux disposés à se battre pour eux, et terrorisent maintenant les habitants. Ils semblent avoir peu de respect pour notre autorité, cependant il est tout à fait possible que ce ne soit que parce qu'ils sont trois fois plus nombreux que la milice locale.\n\nNous devons faire quelque chose à ce sujet ! La plupart de nos conseillers suggèrent que nous agissions rapidement et imposions notre volonté avant que la situation ne dégénère. D'autres suggèrent que nous fassions une démonstration de pouvoir, pour les forcer à se soumettre devant la puissance de [Root.GetName].\n\nBien que ces idées soient sensées, il est également possible que nous puissions trouver un chef kobold local que nous pouvons persuader d'envoyer ses hommes travailler pour notre cause."
 kobold_tolerance_events.17.a:0 "Les effrayer pour qu'ils se soumettent"
 kobold_tolerance_events.17.b:0 "Imposer rapidement notre volonté"
 kobold_tolerance_events.17.c:0 "Trouver un moyen de les recruter"
 kobold_scared_into_submission:0 "Kobolds Effrayés pour se Soumettre"
 desc_kobold_scared_into_submission:0 "Dans nos tentatives d'imposer notre volonté dans la région, nous avons fait une démonstration de notre pouvoir, ce qui a fragmenté les kobolds de la province et les a amenés à réparer les dommages qu'ils ont causés dans une tentative de ne pas avoir à affronter notre puissance militaire."
 kobold_angered_by_attempts_to_submit:0 "Kobolds en Colère"
 desc_kobold_angered_by_attempts_to_submit:0 "Dans nos tentatives de forcer les kobolds à se soumettre à nos façons, il est devenu clair que cela n'a conduit qu'au chaos dans la province. Nous sommes maintenant dans un conflit local avec les kobolds qui nuit à l'économie locale et à notre capacité à recruter des gens là-bas."
 kobold_bands_recruited:0 "Bandes Kobolds Recrutées"
 desc_kobold_bands_recruited:0 "Après de longues négociations, les kobolds de la région ont décidé de travailler pour nous, même s'ils semblent le faire uniquement pour éviter les ennuis. Ils pillent toujours nos terres quand ils peuvent s'en tirer, augmentant les tensions dans la région, mais au moins cela nous permet de recruter quelques kobolds qui peuvent aider à combattre pour notre cause."

 kobold_tolerance_events.18.t:0 "Des Kobolds Sabotent le Recrutement à [kobold_hindering_military_operations.GetName]"
 kobold_tolerance_events.18.d:0 "Récemment, des bandes kobolds à [kobold_hindering_military_operations.GetName] ont saboté le recrutement local que l'administration effectue, profitant du moment où nous sommes occupés par notre guerre avec [kobold_war_target_chance.GetName] pour causer le chaos. La noblesse est particulièrement mécontente de notre incapacité à réagir instantanément à ce problème, mais nous pourrions peut-être nous rattraper en agissant rapidement et en punissant ces traîtres."
 kobold_tolerance_events.18.a:0 "Les punir tous !"
 kobold_tolerance_events.18.b:0 "Punir les kobolds reconnus coupables"
 kobold_tolerance_events.18.c:0 "Les ignorer"
 kobold_tolerance_events.18.e:0 "Peut-être peuvent-ils être recrutés ?"
 kobold_bands_punished_harshly:0 "Punition Sévère des Bandes Kobolds"
 desc_kobold_bands_punished_harshly:0 "Toutes les bandes kobolds qui peuvent être trouvées dans la région dans une tentative d'arrêter le sabotage supplémentaire de nos opérations militaires. Cela a été coûteux pour l'administration locale mais a empêché certaines personnes de vouloir prendre les armes contre nous."
 kobold_bands_punished:0 "Bandes Kobolds Punies"
 desc_kobold_bands_punished:0 "De nombreuses bandes de kobolds dans la région ont été punies, leurs tentatives d'arrêter nos opérations dans la région ont été stoppées net mais ce travail a forcé l'administration locale à conserver ses ressources et nous obtenons donc moins d'argent et de main-d'œuvre de la province."
 kobold_bands_not_punished:0 "Kobolds Impunis"
 desc_kobold_bands_not_punished:0 "Les kobolds de cette province n'ont pas été punis malgré les crimes qu'ils ont commis contre notre gouvernement, ce qui a contrarié l'administration locale."

 kobold_tolerance_events.19.t:0 "Kobolds Traités Comme des Parasites"
 kobold_tolerance_events.19.d:0 "Le grand nombre de kobolds à [kobold_treated_unfairly_province.GetName], combiné à leur nature diminutive, a conduit le peuple [Root.GetAdjective] local à les traiter pas moins qu'une mouche ou un rat agaçant, les chassant souvent comme ils le feraient d'une bande de gamins des rues, ce qui, bien sûr, est parfaitement acceptable.\nUn chef kobold éminent nous a adressé une pétition pour clarifier que les kobolds sont aussi des personnes !"
 kobold_tolerance_events.19.a:0 "Soutenir les kobolds"
 kobold_tolerance_events.19.b:0 "Nous ne pouvons pas changer la façon dont les gens pensent"
 kobold_tolerance_events.19.c:0 "Les kobolds SONT des parasites !"
 kobold_preferred_before_administration:0 "L'Administration Favorise les Kobolds"
 desc_kobold_preferred_before_administration:0 "Les kobolds confrontés à la discrimination ont reçu un traitement préférentiel par l'administration locale."
 kobold_treated_unfairly:0 "Kobolds Traités Injustement"
 desc_kobold_treated_unfairly:0 "L'administration locale a encouragé la discrimination rampante contre les kobolds."

 kobold_primary_refugees:0 "Un Foyer pour le Peuple Kobold"
 kobold_tolerance_events.20.t:0 "Trivu Minière"
 kobold_tolerance_events.20.d:0 "Dans le district minier de [kobold_mining_trivu_province.GetName], une Trivu de kobolds s'est élevée à la proéminence en raison de la quantité et de la qualité exceptionnelles de minerai qu'ils ont extrait ces derniers mois. En plus de leur simple productivité, ils n'ont également signalé aucun effondrement de mine et seulement quatorze décès liés à l'exploitation minière au cours du dernier semestre, ce qui est impressionnant en soi.\n\nLe secret, ce n'est pas qu'ils le cachent, s'avère être une combinaison de magie d'abjuration et d'acide alchimique. Ils renforcent la roche environnante magiquement, puis font fondre la roche contenant du minerai dans des auges de collecte. Après un certain temps, la boue chargée de métal séchera en une poudre riche, qui peut être raffinée en utilisant un bloomerie rotatif. Le résultat final est un rendement exceptionnel de métaux de base sans l'utilisation d'explosifs ou de travail éreintant, bien que le processus global soit plus lent et un peu plus coûteux que l'exploitation minière traditionnelle."
 kobold_tolerance_events.20.a:0 "Excellent travail, leur fournir un financement supplémentaire pour améliorer et étendre davantage leurs opérations !"
 kobold_tolerance_events.20.b:0 "Leur offrir une allocation et des privilèges spéciaux pour diffuser leurs techniques dans toute notre nation !"
 kobold_tolerance_events.20.c:0 "Exploiter avec de l'acide ? C'est un accident qui attend de se produire ! Fermer tout ça !"
 kobold_mining_trivu:0 "Trivu Minière"
 kobold_tolerance_events.21.t:0 "Le Problème avec les Trivuak"
 kobold_tolerance_events.21.d:0 "Les kobolds sont connus pour leurs vies rapides et rudes, beaucoup mourant jeunes, tués par des aventuriers, perdus dans des accidents miniers ou morts en testant leurs propres pièges, et pourtant ce peuple prospère et se multiplie. Vies courtes, oui, mais enfances courtes également, les kobolds atteignant l'âge adulte plus rapidement que la plupart des autres races sur Halann. L'éducation communautaire de leurs nouveau-nés soulève également le fardeau des parents à la Kendia, de sorte que les générations kobolds sont plus nombreuses que n'importe lequel de leurs contemporains, sauf peut-être les halfelins. Cette reproduction rapide et cette croissance rapide sont un trait de survie, et ont vu les kobolds endurer à travers les épreuves et les conflits pendant des siècles.\n\nMais que se passe-t-il quand les kobolds ne meurent pas jeunes ? À [origin_province.GetName], notre richesse et notre stabilité croissantes nous ont montré la réponse : des kobolds à perte de vue. L'une des Trivu les plus prospères a atteint un point de rupture et s'est brisée en trois, les deux nouvelles Trivuak s'attendant maintenant à entreprendre la migration traditionnelle post-division et à s'installer sur des terres à elles."
 kobold_tolerance_events.21.a:0 "Il y a des terres inutilisées à [destination_province.GetName], nous soutiendrons votre réinstallation."
 kobold_tolerance_events.21.b:0 "Il y a beaucoup d'espace dans les colonies, faites vos bagages !"
 kobold_tolerance_events.21.c:0 "Il y en a absolument des charges !"
 kobold_tolerance_events.22.t:0 "Trivuak et Tribulations"
 kobold_tolerance_events.22.d:0 "Une Trivu typique, une famille-de-familles kobold ou tribu, se spécialise dans un métier ou une profession spécifique, mais toutes assument un peu le fardeau de diriger et d'organiser les communautés kobolds. L'organisation typique demande que chaque établissement soit administré par une seule Trivu qui détermine l'orientation générale que cet établissement développera et dans laquelle il se spécialisera, mais la croissance des grandes villes a conduit à un sentiment de prestige, car certaines Trivu gouvernent des villes beaucoup plus grandes que ce qui est traditionnel. Maintenant, notre attention est attirée vers la capitale de la province de [target_province.GetName], où trois Trivu se sont distinguées et demandent le leadership de la ville en pleine croissance.\n\nLes Inkclaws se spécialisent dans la construction et ont déjà aidé à l'infrastructure de la ville, concevant et mettant en œuvre de nouveaux systèmes de routes et d'assainissement.\n\nLa Trivu Broadnose a soumis une proposition de moyens d'améliorer la fabrication locale, dont ils prétendent que leurs propres artisans-kobolds ont déjà prouvé l'efficacité.\n\nLe Clan Quickdagger est une Trivu de garnison, et bien qu'ils soient un groupe plus récent avec un manque d'expérience, ils sont farouchement loyaux et nous assurent qu'ils peuvent maintenir l'ordre dans leur ville."
 kobold_tolerance_events.22.a:0 "Nous ne jouerons pas aux favoris. Chaque Trivu sera responsable d'un district."
 kobold_divided_administration:0 "Trivus Kobolds Partageant le Pouvoir"
 kobold_tolerance_events.22.b:0 "Les Inkclaws ont de l'expérience et sont déjà impliqués dans la gouvernance, ils recevront des postes officiels"
 kobold_tax_trivu:0 "Trivu Kobold Dirigeant l'Administration"
 kobold_tolerance_events.22.c:0 "Le Clan Broadnose est passionné par son travail, si rien d'autre."
 kobold_production_trivu:0 "Gouverneurs Artisans-Kobolds"
 kobold_tolerance_events.22.e:0 "La Trivu Quickdagger peut être inexpérimentée, mais leur loyauté compensera cela."
 kobold_manpower_trivu:0 "Trivu Militaire Kobold au Pouvoir"
 kobold_tolerance_events.22.f:0 "Les kobolds sont mieux adaptés aux tâches subalternes, nous nommerons un gouverneur plus approprié."
 suppressing_kobolds:0 "Les Kobolds sont des Résidents de Seconde Classe"
 kobold_tolerance_events.23.t:0 "Trivu Troubadour"
 kobold_tolerance_events.23.d:0 "Les kobolds. Malicieux, enthousiastes et curieux, un peu moins de la moitié de la taille d'un humain et possiblement le peuple sur Halann ayant le moins en commun avec les autres races. Malgré les différences, les écailles et les griffes, ils ont beaucoup en commun avec nous également, et ils sont si curieux. Une bande de kobolds particulièrement curieux est arrivée récemment, ils disent qu'ils font le tour de [Root.Capital.GetContinentName] pour découvrir les arts et la musique des autres peuples. Ils ont clairement voyagé pendant un certain temps et cherchent maintenant un endroit où rester, se reposer et jouer ce qu'ils ont appris."
 kobold_tolerance_events.23.a:0 "Nous les parrainerons."
 kobold_troubadour_trivu:0 "Ménestrels Kobolds"
 kobold_tolerance_events.23.b:0 "Les inviter à jouer pour [Root.Monarch.GetTitle] !"
 kobold_tolerance_events.23.c:0 "Je ne peux pas imaginer qu'un lézard fasse mieux que nos propres ménestrels !"
 kobold_tolerance_events.24.t:0 "Fermes de Lucioles"
 kobold_tolerance_events.24.d2:0 "Dans une tournure inattendue des événements, des marchands de l'étranger affluent vers [target_province.GetName], faisant un détour pour inclure une étendue de bois anodine dans leur itinéraire. La raison ? Les kobolds. Une Trivu, une tribu ou un clan de kobolds, vend une marchandise plutôt peu conventionnelle : des lucioles. Largement connus comme des inventeurs ingénieux, bien que souvent imprudents, ces kobolds ont trouvé un moyen d'élever les insectes luminescents en captivité, et vendent maintenant des lanternes sans flamme. Ces sources de lumière sont moins chères et durent plus longtemps que les homologues conventionnels, et peuvent être ravitaillées en ajoutant davantage de feuilles dont les insectes se nourrissent, permettant à une lanterne de durer de nombreux mois."
 kobold_tolerance_events.24.d1:0 "[target_province.GetName] a connu un revirement soudain de fortune. Alors que certains se sont empressés de remercier les esprits pour l'augmentation du commerce, les ministres locaux ont souligné que les kobolds locaux sont en fait à créditer pour l'augmentation du trafic marchand à travers la forêt. Dans tout Haless, et partout où les marchands halessiens peuvent être trouvés à l'étranger, des lanternes en papier, certaines simples bien que la plupart soient décorées de manière complexe, sont utilisées pour la lumière et la beauté. Cette trivu kobold vend de telles lanternes avec une nouveauté qu'aucun autre fabricant de lanternes ne peut revendiquer : celles-ci s'illuminent sans feu. En étudiant une variété locale de luciole, l'un des moines écailles-d'or a découvert que les larves et les adultes se nourrissent de la même variété de ver de farine, ce qui a permis à la trivu de domestiquer les minuscules insectes. Une lanterne de lucioles bien faite, décorée de teintures ton terre et parsemée des propres écailles dorées des kobolds, a été envoyée à [Root.Monarch.GetTitle] en cadeau."
 kobold_tolerance_events.24.a:0 "Financer la ferme pour qu'elle reste productive."
 firefly_farm:0 "Ferme de Lucioles Kobold"
 kobold_tolerance_events.24.b:0 "Leur accorder une exonération fiscale pour encourager leur travail innovant."
 firefly_farm_taxbreak:0 "Ferme de Lucioles Kobold, avec Exonérations Fiscales"
 kobold_tolerance_events.24.c:0 "Comme c'est mignon, mais ils empiètent sur les profits d'entreprises légitimes."

