 half_orc_tolerance_events.3.a:0 "C'est regrettable"

 half_orc_tolerance_events.4.t:0 "Compagnie Mercenaire Demi-orque"
 half_orc_tolerance_events.4.d:0 "Les demi-orques ont souvent été perçus comme des parias sociaux, surtout dans la société « civilisée » où ils sont vus comme un sombre rappel de la Marée Verte et d'autres attaques orques. Dans la société orque, beaucoup sont considérés comme souillés et faibles à cause de leur sang humain. Ainsi, de nombreux demi-orques se sont retrouvés dans une vie à l'écart, en tant qu'aventuriers ou mercenaires, atteignant leur propre version du succès et de la fortune dans ces domaines, et peuvent parfois utiliser leur richesse pour prendre soin de leurs communautés dans les diverses cités du monde. Les plus talentueux se retrouvent à former des compagnies ou régiments mercenaires dominés par les demi-orques, au lieu de rejoindre les armées nationales et d'autres compagnies mercenaires. Une telle fière compagnie, récemment formée, adresse maintenant une pétition pour formaliser leur statut en tant que compagnie mercenaire approuvée par l'État. Que devons-nous faire ?"
 half_orc_tolerance_events.4.a:0 "Nous pourrions utiliser leur expertise"
 half_orc_tolerance_events.4.b:0 "Ils devront se fondre dans les compagnies existantes"
 half_orc_tolerance_events.4.c:0 "Ce ne sont que de vulgaires voyous !"
 half_orc_mercenaries:0 "Mercenaires Demi-orques"
 desc_half_orc_mercenaries:0 "Un grand nombre de demi-orques ont afflué à notre service en tant que mercenaires habiles et féroces."

 half_orc_tolerance_events.5.t:0 "Légitimation Demi-orque ?"
 half_orc_tolerance_events.5.d:0 "Alors qu'il s'occupait des affaires du royaume, une enquête délicate a été portée à l'attention de [Root.Monarch.GetName]. L'un de nos seigneurs locaux se trouve dans une situation difficile, puisque son seul héritier légitime est mort dans un accident de chasse. Son seul autre enfant est issu d'une prostituée de l'autre race ! Malgré la nature de l'enfant, il semble être très attaché à son enfant illégitime et souhaite le désigner comme héritier de sa baronnie. Cela pourrait être une grande chance d'améliorer davantage la position des demi-orques dans notre royaume, mais cela mettrait gravement en colère l'élite noble la plus conservatrice. Peut-être pourrions-nous aussi en profiter un peu ?"
 half_orc_tolerance_events.5.a:0 "Légitimer l'héritier demi-orque"
 half_orc_tolerance_events.5.b:0 "Je peux le faire, contre de l'argent"
 half_orc_tolerance_events.5.c:0 "Rejeter la demande"

 half_orc_tolerance_events.6.t:0 "Tribunaux de Clan Demi-orques"
 half_orc_tolerance_events.6.d:0 "L'un de nos conseillers, voyageant à travers [half_orc_clan_courts_province.GetName], est tombé sur une pratique particulière parmi sa population demi-orque. Apparemment transmise du côté orque de leur ascendance, les demi-orques distribuaient la loi et la justice dans ce qu'ils appelaient des audiences de « tribunal de clan » pour traiter les conflits dans leur communauté. Il peut être préjudiciable de les laisser continuer leur marque de justice qui existe en dehors du contrôle de nos législateurs, mais en même temps, la pratique est limitée au sein de leurs propres communautés soudées et ne semble nuire à personne en dehors de celle-ci."
 half_orc_tolerance_events.6.dOrc:0 "L'un de nos conseillers, voyageant à travers [half_orc_clan_courts_province.GetName], est tombé sur une pratique particulière parmi sa population demi-orque. Ils avaient adopté certaines pratiques juridiques du côté humain de leur ascendance et refusaient d'autoriser l'utilisation de tribunaux de clan traditionnels qui ont si bien servi notre société orque depuis si longtemps ! Il peut être préjudiciable de les laisser continuer leur marque de justice qui existe en dehors du contrôle de nos législateurs, mais en même temps, la pratique est limitée au sein de leurs propres communautés soudées et ne semble nuire à personne en dehors de celle-ci."
 half_orc_tolerance_events.6.a:0 "Peut-être pouvons-nous apprendre quelque chose de leurs traditions à mettre dans nos propres codes de loi"
 half_orc_tolerance_events.6.b:0 "Les laisser faire ce qu'ils veulent"
 half_orc_tolerance_events.6.c:0 "Sévir contre leurs pratiques sauvages"
 half_orcish_clan_courts:0 "Tribunaux de Clan Demi-orques"
 desc_half_orcish_clan_courts:0 "Les demi-orques de cette province ont commencé à traiter les problèmes au sein de leur communauté dans leurs propres « tribunaux de clan » conformément à leurs propres lois, plutôt qu'aux lois officielles du pays."

 half_orc_tolerance_events.7.t:0 "Ascension des Gangs Demi-orques"
 half_orc_tolerance_events.7.d:0 "Dans la société « civilisée », en raison des préjugés reçus de leur rôle dans la Marée Verte et de leur sauvagerie perçue, de nombreux demi-orques ont peu ou pas de perspectives économiques ou sociales. Dans la société orque, de nombreux demi-orques sont considérés comme des parias et faibles en raison de leur sang humain, et un manque similaire de perspectives surgit. Dans les deux cas, ils recourent souvent à des activités criminelles pour joindre les deux bouts. La situation est particulièrement mauvaise à [half_orc_gangs_province.GetName], où les gangs ont pris le contrôle de plusieurs villes et ont mis une multitude d'entreprises sous leur « protection ».\n\nL'un de nos conseillers pense que ce serait une bonne idée de recruter ces gangs et de les utiliser pour maintenir l'ordre dans la province, tandis que d'autres veulent envoyer l'armée pour prendre le contrôle de la situation. Il y a même des voix pour utiliser cela comme un casus belli pour simplement les éradiquer tous."
 half_orc_tolerance_events.7.a:0 "Les embaucher pour faire du « maintien de la paix »"
 half_orc_tolerance_events.7.b:0 "Assigner plus de membres à la garde"
 half_orc_tolerance_events.7.c:0 "Sévir contre eux"
 half_orcish_gangs_peacekeeping:0 "Gangs Demi-orques sur la Liste de Paie"
 desc_half_orcish_gangs_peacekeeping:0 "Plusieurs gangs demi-orques éminents ont été embauchés par le gouvernement pour faire leur sale travail, s'occupant des dissidents en dehors des limites habituelles de la loi."
 half_orcish_gangs_crackdown:0 "Répression des Gangs Demi-orques"
 desc_half_orcish_gangs_crackdown:0 "L'ascension des gangs demi-orques a conduit à une présence accrue des gardes locaux."

 half_orc_tolerance_events.8.t:0 "Une Bande Errante de Demi-orques S'Installe"
 half_orc_tolerance_events.8.d:0 "La Marée Verte fut une période chaotique de guerre et de conflit à Escann, avec l'augmentation concomitante des crimes de guerre et des enfants nés de la guerre. Dans une telle période anarchique, des villages entiers peuvent apparemment disparaître et réapparaître alors que les populations fuient, se cachent ou sont déplacées par la guerre. Aujourd'hui, un grand groupe de demi-orques, les enfants et petits-enfants des habitants d'une ville apparemment conquise et déplacée au début de la Marée Verte, sont apparus. Ils disent qu'ils ont été cachés pendant des années dans une vallée isolée, ne connaissant pas le statut de la Marée Verte en dehors de leur cachette, et seulement forcés de sortir récemment en raison de récoltes défaillantes. Ce groupe de demi-orques adresse maintenant une pétition pour s'installer à [children_of_greentide_province.GetName]"
 half_orc_tolerance_events.8.a:0 "Bien, nous avons besoin de tous les bras disponibles"
 half_orc_tolerance_events.8.b:0 "Ils peuvent faire ce qu'ils veulent"
 half_orc_tolerance_events.8.c:0 "Nous ne pouvons laisser nos communautés être souillées"

 half_orc_tolerance_events.9.t:0 "Héros de Guerre Demi-orque"
 half_orc_tolerance_events.9.d:0 "À travers le monde, les demi-orques s'enrôlent à un taux disproportionné par rapport à leur population, probablement en raison du manque de perspectives de carrière non martiales ou des préjugés contre celles-ci. Et heureusement, car lors de campagnes récentes, certains demi-orques très talentueux ont gagné encore plus de gloire et de mérite que beaucoup de nos propres meilleurs soldats les plus expérimentés. Les réalisations d'un individu spécifique sont si impressionnantes que même nos conseillers conservateurs pensent qu'il serait bénéfique pour nous de lui attribuer un rôle dans notre cabinet militaire. Cela pourrait être une grande chance d'améliorer davantage la position sociale des demi-orques et de les inciter davantage à notre service également."
 half_orc_tolerance_events.9.a:0 "Recruter ce héros de guerre"
 half_orc_tolerance_events.9.b:0 "Un véritable exemple pour la communauté !"
 half_orc_tolerance_events.9.c:0 "Et alors ?"

 half_orc_tolerance_events.10.t:0 "Campagne de Recrutement Demi-orque"
 half_orc_tolerance_events.10.d:0 "Lors de la réunion du conseil aujourd'hui, l'un de nos conseillers militaires, qui est revenu de l'inspection du recrutement en cours à [half_orc_recruitment_drive_province.GetName], dit qu'il a été impressionné par un gang de demi-orques traînant autour du camp d'entraînement. La vie dans les rues n'a pas été favorable à leur espèce, mais leur a appris à être plus robustes que notre soldat habituel. Ce groupe semble réceptif à nous rejoindre pour une chance d'une vie meilleure, et notre conseiller suggère donc de les recruter dans notre armée."
 half_orc_tolerance_events.10.a:0 "Nous pourrions utiliser leur ténacité légendaire"
 half_orc_tolerance_events.10.b:0 "Nous ne dirons pas non, au moins"
 half_orc_tolerance_events.10.c:0 "Quelle horrible idée"
 half_orc_recruitment_drive:0 "Campagne de Recrutement Demi-orque"
 desc_half_orc_recruitment_drive:0 "De grands efforts ont été faits pour recruter des demi-orques de cette province pour rejoindre l'armée."

 half_orc_tolerance_events.11.t:0 "Mauvais Traitement des Travailleurs Demi-orques"
 half_orc_tolerance_events.11.d:0 "Alors que nos lois donnent certaines protections de base aux pauvres de notre propre espèce, ces lois ont tendance à ne pas s'appliquer pleinement aux minorités demi-orques dans nos terres, qui ont souvent été méprisées en raison de leur histoire dans la Marée Verte. Cela a conduit de plus en plus de propriétaires d'entreprises à utiliser les demi-orques comme travailleurs bon marché et remplaçables pour les emplois indésirables ou carrément dangereux. Ce développement stimule l'économie locale de [half_orc_cheap_labour_province.GetName], il pourrait donc être bénéfique de les laisser continuer. D'un autre côté, nous pourrions aider ces pauvres âmes, mais nos voisins verraient cela comme une faiblesse de faire des concessions aux parias sociaux."
 half_orc_tolerance_events.11.a:0 "Nous devons protéger ceux qui sont vulnérables"
 half_orc_tolerance_events.11.b:0 "Offrir des promesses vides"
 half_orc_tolerance_events.11.c:0 "Et alors ? Réparations pour les actions de leurs ancêtres"
 cheap_half_orc_labour:0 "Main-d'œuvre Demi-orque Bon Marché"
 desc_cheap_half_orc_labour:0 "La population locale exploite les demi-orques pour leur incroyable combinaison de force orque et d'intelligence humaine afin de stimuler l'industriosité de la province"

