 goblin_tolerance_events.1.t:0 "Les Minorités Gobelines Exigent une Représentation"
 goblin_tolerance_events.1.d:0 "Les minorités gobelines dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 goblin_tolerance_events.1.a:0 "Accordé !"
 goblin_tolerance_events.1.b:0 "Faire quelques concessions"
 goblin_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 goblin_tolerance_events.1.e:0 "Faire des promesses vides"

 goblin_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Gobelins"
 goblin_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités gobelines de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race gobeline a augmenté."
 goblin_tolerance_events.2.a:0 "Tant mieux pour eux"

 goblin_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Gobelins"
 goblin_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race gobeline a diminué."
 goblin_tolerance_events.3.a:0 "C'est regrettable"

 goblin_tolerance_events.4.t:0 "Brevets d'Artificier"
 goblin_tolerance_events.4.d:0 "Malgré la nouveauté du métier et le caractère quelque peu excentrique de ses praticiens, les artificiers sont aussi enclins à la tradition et à la réglementation que tout autre groupe organisé. En effet, peu d'inventions voient jamais le jour sans l'approbation, explicite ou non, du Gommo, avec des taux stupéfiants de projets approuvés. En cela, les préjugés, la politique et le népotisme sont valorisés presque plus que le véritable génie technique ou l'application réussie, laissant des percées potentielles écartées, parfois pour ne plus jamais être revues.\n\nDans cette ligne suit un scandale de cour très récent. L'un de nos artificiers de cour les plus favorisés et maître renommé de son art a été présenté comme rien de moins qu'un plagiaire. Apparemment, sa dernière invention semble être une copie presque identique d'un prototype rejeté par un artisan gobelin indépendant, dont la proposition a été initialement rejetée par le Gommo, pour que le prototype soit ensuite vu pleinement réalisé à la cour parmi de grandes fanfares par un créateur différent. Une commission d'enquête indépendante a à contrecœur examiné la position du gobelin et trouvé des preuves indéniables d'actes répréhensibles par le maître artificier, bien qu'ils remarquent l'inclusion « d'améliorations techniques substantielles » et de « modifications de sécurité élémentaires », ainsi qu'une « chance significativement diminuée d'explosions ».\n\nCette question a fait surface des tensions sous-jacentes entre l'élite des artificiers et les acteurs indépendants, et quelle que soit notre réponse à ce cas, elle sera sûrement interprétée comme suggérant une politique future."
 goblin_tolerance_events.4.a:0 "Le gobelin l'a fait en premier, lui accorder sa compensation"
 goblin_tolerance_events.4.b:0 "Ce n'est pas notre problème"
 goblin_tolerance_events.4.c:0 "Soutenir les artificiers [Root.Culture.GetName]s"

 goblin_tolerance_events.5.t:0 "Gobelins Sournois au Gouvernement"
 goblin_tolerance_events.5.d:0 "Notre administration constate un afflux inhabituel de rapports d'application réussie de nos quotas de taxation et de recrutement. Il semble que ce soient les gobelins qu'il faut féliciter : des détenteurs de pouvoir influents, des magnats et des chefs de communauté d'occupations plutôt vagues, qui coopèrent avec nos officiels conformément à notre pratique de récompenser le soutien privé par des privilèges et des exemptions spéciaux. Il semble y avoir un lien entre leur présence et un manque de plaintes concernant l'application de nos politiques. Bien qu'on ne puisse pas contester leur influence positive sur notre administration, il y a une quantité égale de plaintes d'accidents étranges concernant la poudre à canon, les toxines et le sabotage présumé arrivant à des élites moins coopératives, au point que certains commencent à nous soupçonner d'utiliser des cartels gobelins comme mercenaires."
 goblin_tolerance_events.5.a:0 "Leur initiative devrait être félicitée !"
 goblin_tolerance_events.5.b:0 "S'ils font le travail, qu'importe ?"
 goblin_tolerance_events.5.c:0 "Les rabaisser d'un cran !"

 goblin_tolerance_events.8.t:0 "Ministre Gobelin"
 goblin_tolerance_events.8.d:0 "Bien que les gobelins manquent généralement de force et de bravoure, ils le compensent par leur ruse et leur innovation. Composés des esprits les plus... créatifs à travers Halann, les gobelins trouveront souvent les solutions les plus surprenantes à des problèmes qui peuvent tourmenter les érudits traditionnels pendant des années. Maintenant, l'un des plus innovants de leur espèce est venu offrir ses services à [Root.Monarch.GetTitle] et utiliser son esprit pour le bien du royaume... à condition que nous payions pour tous les dommages qui pourraient survenir pendant ses recherches."
 goblin_tolerance_events.8.a:0 "Recruter le gobelin"
 goblin_tolerance_events.8.b:0 "Un véritable exemple pour la communauté !"
 goblin_tolerance_events.8.c:0 "Et alors ?"

 goblin_tolerance_events.9.t:0 "Maîtres Chanteurs du Cartel Gobelin"
 goblin_tolerance_events.9.d:0 "Les guildes sont prêtes à aller à tous les extrêmes pour s'assurer que leurs principes monopolistiques sont appliqués, s'appuyant principalement sur la loi et leurs privilèges pour se débarrasser des artisans ou commerçants non affiliés qui tentent de faire des affaires dans leur zone, mais elles recourent souvent à des méthodes moins conventionnelles. Parmi celles-ci, s'appuyer sur des cartels gobelins est généralement le moins cher, et avec moins de risques, car une guilde peut facilement couper les liens avec les criminels vermineux en tirant parti de leur réputation et de leur influence. Au fil du temps, cependant, elles peuvent tellement compter sur les méthodes utiles des cartels, et pour des transactions si diverses, que les gobelins voudraient « sécuriser leur partenariat ». Nos agents nous ont informés de mouvements financiers très suspects de la part des marchands de [Root.Capital.GetName], et soupçonnent qu'ils pourraient être contraints par un parrain de la mafia gobeline à partager une part des profits de la guilde en échange de son silence sur leurs transactions précédentes."
 goblin_tolerance_events.9.a:0 "Faire taire les guildes"
 goblin_tolerance_events.9.b:0 "Ils se le sont fait à eux-mêmes"
 goblin_tolerance_events.9.c:0 "Les gobelins ne devraient pas diriger d'« affaires » de toute façon"

 goblin_primary_refugees:0 "Un Foyer pour le Peuple Gobelin"

