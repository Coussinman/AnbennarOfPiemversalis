 troll_tolerance_events.1.t:0 "Les Minorités Trolls Exigent une Représentation"
 troll_tolerance_events.1.d:0 "Les minorités trolls dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 troll_tolerance_events.1.a:0 "Accordé !"
 troll_tolerance_events.1.b:0 "Faire quelques concessions"
 troll_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 troll_tolerance_events.1.e:0 "Faire des promesses vides"

 troll_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Trolls"
 troll_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités trolls de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race troll a augmenté."
 troll_tolerance_events.2.a:0 "Tant mieux pour eux"

 troll_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Trolls"
 troll_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race troll a diminué."
 troll_tolerance_events.3.a:0 "C'est regrettable"

 troll_tolerance_events.4.t:0 "Péage du Troll"
 troll_tolerance_events.4.d:0 "Il y a des rapports inhabituels provenant de l'une de nos provinces. L'un des ponts sur les terres d'un noble local a, apparemment, été pris en main par un troll. Bien que ce ne soit guère inhabituel, ce qui est surprenant, c'est que la bête prétend être, entre toutes choses, un « ferviteur bublic ». Apparemment, le troll a appris que l'État a repris la collecte des péages commerciaux des commerçants de passage, et à la surprise de notre shérif local, dépose tous les paiements non comestibles au poste de collecte d'impôts le plus proche avec une régularité digne d'un mécanisme gnomique. Les plaintes ne viennent pas des commerçants, car ils considèrent les paiements comme plutôt standards, mais du noble, qui veut la tête de cette « vile bête » pour lui faire des actes assez horribles.\n\nIl convient également de noter que, depuis que le troll a pris le relais, il a livré des paiements avec bien plus de régularité que son ancien administrateur noble, ce qui amène notre shérif à soupçonner un détournement de fonds."
 troll_tolerance_events.4.a:0 "Infliger une amende au noble pour sa mauvaise gestion et nommer le meilleur collecteur"
 troll_tolerance_events.4.b:0 "Rassurons ce sujet entreprenant"
 troll_tolerance_events.4.c:0 "Permettre au noble de faire ce qu'il souhaite"

 troll_tolerance_events.5.t:0 "Traînée de Destruction"
 troll_tolerance_events.5.d:0 "Un paysan a obtenu une audience auprès du [Root.Monarch.GetTitle] et nous supplie d'aider les villages de sa région contre les trolls locaux. Les yeux las, le fermier décrit un scénario de chaos total : enclos renversés, cultures piétinées, arbres fruitiers brisés et jardins dévastés, tout cela dû aux déplacements et à l'alimentation occasionnelle d'un groupe important de trolls indigènes, qui ont les habitants de la région au bord de saisir torches et fourches. Bien que le paysan implique clairement la nécessité d'une approche brutale, certains universitaires à la cour nous supplient de considérer une solution plus diplomatique : puisque ces trolls ne sont pas sauvages, on pourrait leur expliquer l'erreur de leurs méthodes pour parvenir à une solution satisfaisante pour les deux parties, « si seulement nous étions patients avec les spécimens. Très patients. »"
 troll_tolerance_events.5.a:0 "Voyons comment les universitaires gèrent cela"
 troll_tolerance_events.5.b:0 "Dire aux paysans de résoudre leurs propres problèmes"
 troll_tolerance_events.5.c:0 "Engager un professionnel"

 troll_tolerance_events.6.t:0 "Ministre Troll"
 troll_tolerance_events.6.d:0 "Les trolls sont typiquement une race solitaire avec peu d'intérêt à interagir avec ceux en dehors de leur meute ou tribu familiale, et encore moins sont intéressés à favoriser une quelconque bonne volonté avec les étrangers. Imaginez notre surprise alors quand un troll imposant s'est approché de notre capitale en paix ! En entrant en dialogue avec le troll, il est rapidement devenu clair qu'il cherchait à servir notre cour, croyant que ses talents pourraient bénéficier à la nation dans son ensemble. Comment devrions-nous réagir à cette offre particulière ?"
 troll_tolerance_events.6.a:0 "Recruter ce troll"
 troll_tolerance_events.6.b:0 "Un véritable exemple pour la communauté !"
 troll_tolerance_events.6.c:0 "Et alors ?"

 troll_primary_refugees:0 "Un Foyer pour le Peuple Troll"
 troll_corrupt_tolling:0 "Péage Corrompu"
 desc_troll_corrupt_tolling:0 "Nous avons permis au noble de maintenir son péage corrompu en vigueur"

