 halfling_tolerance_events.1.t:0 "Les Minorités Halfelines Exigent une Représentation"
 halfling_tolerance_events.1.d:0 "Les minorités halfelines de la province de [racial_pop_province_target.GetName] ont demandé une plus grande représentation pour leur peuple ainsi qu'une plus grande autonomie dans leurs droits et actions."
 halfling_tolerance_events.1.a:0 "Accordé !"
 halfling_tolerance_events.1.b:0 "Faire quelques concessions"
 halfling_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 halfling_tolerance_events.1.e:0 "Faire de vaines promesses"

 halfling_tolerance_events.2.t:0 "Augmentation de la Tolérance Halfeline"
 halfling_tolerance_events.2.d:0 "Que ce soit par nos politiques et notre gouvernance ou simplement grâce à la prospérité du royaume, notre coexistence avec les minorités halfelines de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race halfeline s'est accrue."
 halfling_tolerance_events.2.a:0 "Tant mieux pour eux"

 halfling_tolerance_events.3.t:0 "Diminution de la Tolérance Halfeline"
 halfling_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit en raison des troubles de la guerre, de l'économie ou simplement d'une incompatibilité fondamentale, mais une chose est certaine : la tolérance de [Root.GetName] envers la race halfeline a diminué."
 halfling_tolerance_events.3.a:0 "C'est regrettable"

 halfling_tolerance_events.4.t:0 "Ministre Halfelin"
 halfling_tolerance_events.4.d:0 "Les halfelins sont une race rare à voir aux grandes positions dans les cours du monde, car ils se contentent souvent d'une vie paisible à la campagne.\n\nCependant, lorsqu'un tel individu s'élève des masses, il est manifestement destiné à la grandeur, souvent en tant que négociant astucieux ou cuisinier talentueux. L'un d'eux a été découvert par l'un de nos courtisans, qui l'a amené à la cour et demande que nous prenions ce halfelin à notre service."
 halfling_tolerance_events.4.a:0 "Recruter ce halfelin"
 halfling_tolerance_events.4.b:0 "Un véritable modèle pour la communauté !"
 halfling_tolerance_events.4.c:0 "Et alors ?"

 halfling_tolerance_events.5.t:0 "La Criminalité Halfeline Sévit"
 halfling_tolerance_events.5.d:0 "Il y a eu une vague majeure de criminalité dans l'une de nos cités, et nous ne savons comment y faire face. Bien que cela soit ordinairement considéré comme assez normal, la majorité de ces rapports désignent les coupables comme étant des halfelins, stéréotypiquement connus pour leur habileté au vol. Bien que les punir soit certain, certains suggèrent que nous devrions faire un exemple des criminels pour intimider leurs semblables. Comment devons-nous répondre à ces petits voleurs, certes agaçants ?"
 halfling_tolerance_events.5.a:0 "Un crime est un crime"
 halfling_tolerance_events.5.b:0 "Doubler les gardes !"
 halfling_tolerance_events.5.c:0 "Tous les halfelins sont des voleurs ! Les arrêter tous !"
 halfling_tolerance_events.5.e:0 "Conclure un accord avec les syndicats du crime"
 high_halfling_crime:0 "Criminalité Halfeline Galopante"
 desc_high_halfling_crime:0 "Des voleurs halfelins audacieux font sentir leur présence dans cette province"

 halfling_tolerance_events.6.t:0 "Festival Culinaire Halfelin"
 halfling_tolerance_events.6.d:0 "Qu'y a-t-il de plus nécessaire à la vie que la nourriture ? Telle est la question posée par les halfelins, qui consacrent une grande partie de leur temps à améliorer et créer des recettes de toutes sortes. Certains d'entre eux ont même décidé d'organiser un festival à [halfling_food_festival_province.GetName], partageant leurs délices culinaires avec toute la population. Il y aurait fort peu d'inconvénient à laisser cela se poursuivre, et certains de nos conseillers prévoient déjà de goûter aux mets offerts. Que doit-on faire ?"
 halfling_tolerance_events.6.a:0 "Soutenir le Festival"
 halfling_tolerance_events.6.b:0 "Une excellente tradition !"
 halfling_tolerance_events.6.c:0 "Ces maudits gloutons. Ne pas permettre le festival !"
 halfling_tolerance_events.6.e:0 "Un festival culinaire ? Inviter toute la cour !"
 halfling_food_festival:0 "Festival Culinaire Halfelin"
 desc_halfling_food_festival:0 "Un Festival Culinaire Halfelin a lieu dans cette province, où de nombreuses communautés halfelines et même des cuisineries locales rivalisent et partagent leurs mets avec la province."

 halfling_tolerance_events.7.t:0 "Surpopulation Halfeline"
 halfling_tolerance_events.7.d:0 "Il est bien connu que les halfelins se reproduisent comme des lapins, et ceux de notre royaume ne font point exception. Cela a conduit à une surpopulation dans l'une de nos provinces et à une migration vers une province voisine. Bien que les mouvements internes de nos citoyens ne soient habituellement point de notre ressort, ces halfelins sont un cas particulier. Devrions-nous entraver leur expansion ou aider à réduire la surpopulation ? Nous pourrions, bien sûr, ne rien faire, mais cela pourrait mener à un exode moins organisé."
 halfling_tolerance_events.7.a:0 "Aider le déplacement à se dérouler sans encombre"
 halfling_tolerance_events.7.b:0 "Tant mieux pour eux"
 halfling_tolerance_events.7.c:0 "Interdire leur mouvement"

 halfling_tolerance_events.8.t:0 "Main-d'œuvre Halfeline Bon Marché"
 halfling_tolerance_events.8.d:0 "Récemment, des employeurs ont trouvé une faille dans les codes traditionnels du travail de notre royaume, stipulant qu'« un homme libre doit recevoir un salaire égal à sa stature ». Certains employeurs prétendent que cela leur permet de payer les halfelins la moitié du salaire normal, ce que les halfelins surpeuplés ont volontiers accepté, évincant par là même nombre de nos sujets de plus haute taille. Ces non-halfelins exigent que nous prenions des mesures pour arrêter l'invasion des petites gens, tandis que nos marchands souhaitent davantage de main-d'œuvre bon marché à exploiter. Nous devons agir !"
 halfling_tolerance_events.8.a:0 "Ils méritent un salaire équitable, comme tout un chacun"
 halfling_tolerance_events.8.b:0 "C'est un marché libre"
 halfling_tolerance_events.8.c:0 "Une main-d'œuvre bon marché ? Excellent !"
 cheap_halfling_labour:0 "Main-d'œuvre Halfeline Bon Marché"
 desc_cheap_halfling_labour:0 "En raison d'une faille stipulant qu'« un homme libre doit recevoir un salaire égal à sa stature », certains l'utilisent comme prétexte pour payer les halfelins la moitié du salaire ! Nombre de halfelins qui manquent d'emplois affluent vers cette opportunité, et le gouvernement soutient cette exploitation."
 cheap_halfling_labour_mad:0 "Travailleurs Non-Halfelins Mécontents"
 desc_cheap_halfling_labour_mad:0 "Des travailleurs halfelins bon marché acceptent la moitié du salaire en raison du manque général d'emplois pour leur peuple. Les travailleurs non-halfelins sont mécontents que le gouvernement ne fasse rien pour enrayer cette exploitation du peuple halfelin et la cupidité de leurs employeurs."

 halfling_tolerance_events.9.t:0 "Marchandises de Basse Qualité"
 halfling_tolerance_events.9.d:0 "Dans d'autres royaumes, les halfelins sont habituellement entassés dans des ghettos aux pires quartiers des cités et, dans l'ensemble, ils sont devenus une minorité résolue dédiée à joindre les deux bouts. Une partie de cela consiste à gagner de l'argent pour eux-mêmes, et certains halfelins ont récemment fait fortune en colportant des marchandises qui sont manifestement une imitation bon marché de la chose véritable !\n\nLes marchands de la région craignent que cela n'affecte la valeur de leurs propres marchandises, et nous supplient qu'ils empêchent les halfelins de commercer dans la région jusqu'à ce qu'ils atteignent la qualité standard ou se conforment aux lois sur la contrefaçon. Bien que nous ne soyons point obligés d'aider les marchands, ils pourraient se fâcher si nous devions les refuser."
 halfling_tolerance_events.9.a:0 "Les marchands ont raison"
 halfling_tolerance_events.9.b:0 "Les laisser commercer"
 halfling_tolerance_events.9.c:0 "Nous devons confisquer leurs marchandises"
 halfling_tolerance_events.9.e:0 "Dédommager les deux parties"
 halfling_tolerance_events.9.f:0 "Se débarrasser des plaignants"
 halfling_not_allowed_to_trade:0 "Restrictions commerciales halfelines"
 desc_halfling_not_allowed_to_trade:0 "En raison d'une baisse locale de la qualité des marchandises produites par les halfelins de la région, de lourdes restrictions leur ont été imposées qui entraveront leur capacité à mener commerce. Cela nuit toutefois également aux halfelins qui produisent des marchandises convenables."
 halfling_low_quality_wares:0 "Marchandises de basse qualité"
 desc_halfling_low_quality_wares:0 "Les marchandises produites par les halfelins sont malheureusement de basse qualité et le mot s'est rapidement répandu à ce sujet. Il est difficile de dire qui a propagé les premières rumeurs, mais il semble que ce soit notre propre classe marchande. Cela a conduit à un déclin des ventes locales et nuit au commerce de la région."

 halfling_tolerance_events.10.t:0 "Les Halfelins Exigent Compensation"
 halfling_tolerance_events.10.d:0 "Acheter des marchandises aux halfelins n'est point chose rare. Bien franchement, des choses comme leur grain sont fort utiles pour quiconque cherche à étendre son royaume. Cependant, récemment, les halfelins de notre royaume ont exigé davantage de compensation pour le dur labeur qu'ils prétendent accomplir. Bien qu'il soit difficile de dire s'ils ont réellement travaillé davantage que quiconque, il est assez clair qu'ils ne continueront point à travailler tant qu'ils ne seront point dédommagés."
 halfling_tolerance_events.10.a:0 "Ces petits cupides..."
 halfling_tolerance_events.10.b:0 "Se conformer à leurs demandes"
 halfling_tolerance_events.10.c:0 "Nous allons leur montrer !"
 halfling_tolerance_events.10.e:0 "Trouvons un compromis"
 halfling_was_not_given_compensation:0 "Les Halfelins N'ont Pas Reçu Compensation"
 desc_halfling_was_not_given_compensation:0 "En réponse à une injustice qui leur a été faite, nombre de communautés halfelines locales œuvrent activement contre nos efforts commerciaux."

 halfling_tolerance_events.11.t:0 "Le Présent d'un Halfelin"
 halfling_tolerance_events.11.d:0 "Bien que cela ne soit point un acte courant, il semble que les halfelins nous aient approchés avec un modeste présent, des marchandises qui peuvent nous être utiles ainsi qu'un délicieux repas pour [Root.Monarch.GetName]. Bien que ce soit un geste fort bienvenu, certains à notre cour haussent le sourcil devant cet acte supposé de bonté.\n\nBien qu'il soit douteux qu'ils trament réellement quelque chose, il pourrait être sage de se méfier de leurs intentions."
 halfling_tolerance_events.11.a:0 "Accepter leur présent"
 halfling_tolerance_events.11.b:0 "Ceci est en effet suspect..."
 halfling_tolerance_events.11.c:0 "Nous devrions les récompenser pour leur générosité !"
 halfling_tolerance_events.11.e:0 "...ceci doit être un piège ! Gardes, saisissez-les !"
 halfling_angry_over_not_accepting_gift:0 "Colère Suite aux Soupçons"
 desc_halfling_angry_over_not_accepting_gift:0 "La population halfeline locale a récemment été insultée par notre souverain qui a prétendu qu'ils avaient tramé quelque chose d'odieux contre le gouvernement. Cela a accru les troubles au sein de la communauté alors que la méfiance se répand."
 halfling_punishment_of_local_traitors:0 "Punition des Halfelins Locaux"
 desc_halfling_punishment_of_local_traitors:0 "En raison de soupçons envers les gens de la région, le gouvernement local a reçu l'ordre de faire un exemple des halfelins de la province, pour montrer qu'ils ne doivent rien faire qui aille à l'encontre de notre volonté."

