 desc_harimar_debate:0 "Alors que les Harimari se lancent passionnément dans leur débat, les spectateurs s'inquiètent du contenu"
 harimari_expanded_in_government:0 "Officiels Harimari Élargis"
 desc_harimari_expanded_in_government:0 "Nous avons étendu le nombre d'Harimari travaillant dans notre gouvernement en raison de leurs compétences administratives expertes"
 harimari_restricted_offices:0 "Bureaux Harimari Restreints"
 desc_harimari_restricted_offices:0 "Apaisant les non-harimari dans notre gouvernement, nous avons restreint le nombre d'harimari que nous employons"
 harimari_expertise_in_government:0 "Expertise Harimari au Gouvernement"
 desc_harimari_expertise_in_government:0 "Il a été décidé que les harimari conserveront leurs postes actuels, guidant notre administration"
 harimari_corrupt_administrators:0 "Administrateurs Harimari Corrompus"
 desc_harimari_corrupt_administrators:0 "L'attitude indulgente des harimari dans notre gouvernement a atteint un sommet, leur corruption incontestable"
 harimari_upset_local_government:0 "Autonomie Locale Harimari"
 desc_harimari_upset_local_government:0 "Les harimari dirigeant le gouvernement local ont reçu une plus grande autonomie"
 harimari_upset_hunters:0 "Chasseurs Harimari"
 desc_harimari_upset_hunters:0 "Les Harimari ont été autorisés à chasser dans nos bois, conduisant à un excès de chasseurs"
 harimari_public_pardon:0 "Harimari Publiquement Pardonnés"
 desc_harimari_public_pardon:0 "Les procédures ont été publiquement dénoncées, à la grande colère des magistrats locaux"
 harimari_local_distrust:0 "Méfiance Locale Harimari"
 desc_harimari_local_distrust:0 "Avec les harimari libres, de nombreux locaux les soupçonnent toujours des meurtres"
 harimari_appeased_millitary:0 "Familles Militaires Apaisées"
 desc_harimari_appeased_millitary:0 "En ne donnant pas la promotion à l'harimari, nous avons apaisé de nombreuses familles d'élite dans le militaire"
 harimari_refused_women_rights:0 "Droits des Femmes Refusés"
 desc_harimari_refused_women_rights:0 "D'autres nations nous regardent avec honte car nous n'avons pas réussi à protéger les droits des femmes dans notre terre"

