 elven_tolerance_events.1.t:0 "Les Minorités Elfiques Exigent une Représentation"
 elven_tolerance_events.1.d:0 "Les minorités elfiques de la province de [racial_pop_province_target.GetName] ont demandé une plus grande représentation pour leur peuple ainsi qu'une plus grande autonomie dans leurs droits et actions."
 elven_tolerance_events.1.a:0 "Accordé !"
 elven_tolerance_events.1.b:0 "Faire quelques concessions"
 elven_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 elven_tolerance_events.1.e:0 "Faire de vaines promesses"

 elven_tolerance_events.2.t:0 "Augmentation de la Tolérance Elfique"
 elven_tolerance_events.2.d:0 "Que ce soit par nos politiques et notre gouvernance ou simplement grâce à la prospérité du royaume, notre coexistence avec les minorités elfiques de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race elfique s'est accrue."
 elven_tolerance_events.2.a:0 "Tant mieux pour eux"

 elven_tolerance_events.3.t:0 "Diminution de la Tolérance Elfique"
 elven_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit en raison des troubles de la guerre, de l'économie ou simplement d'une incompatibilité fondamentale, mais une chose est certaine : la tolérance de [Root.GetName] envers la race elfique a diminué."
 elven_tolerance_events.3.a:0 "C'est regrettable"

 elven_tolerance_events.4.t:0 "Ministre Elfique"
 elven_tolerance_events.4.d:0 "Les elfes sont renommés pour bien des choses, mais dans les affaires de l'État, ils se distinguent souvent comme de grands orateurs de l'assemblée ou de fameux visionnaires sous le patronage du [Root.Monarch.GetTitle].\n\nL'un de ces individus s'est fait connaître à la cour !"
 elven_tolerance_events.4.a:0 "Recruter cet elfe"
 elven_tolerance_events.4.b:0 "Un véritable modèle pour la communauté !"
 elven_tolerance_events.4.c:0 "Et alors ?"

 elven_tolerance_events.5.t:0 "Les Elfes Bloquent le Progrès"
 elven_tolerance_events.5.d:0 "En raison de leur nature immortelle et de leur faible natalité, un village elfique peut demeurer inchangé pendant un siècle entier et résister farouchement à tout changement. Cette question est devenue critique alors que l'une de nos villes en pleine expansion a empiété sur un village elfique. Les elfes ont refusé de laisser leurs demeures être détruites, mettant en péril la croissance future de la ville. Bien que les forcer à partir nuirait gravement à nos relations avec les elfes, leur permettre de rester entraverait considérablement le développement de la ville."
 elven_tolerance_events.5.a:0 "Respectons leurs souhaits"
 elven_tolerance_events.5.b:0 "Leur offrir une compensation"
 elven_tolerance_events.5.c:0 "Les expulser de force !"

 elven_tolerance_events.6.t:0 "Les Elfes Contrarient les Artisans"
 elven_tolerance_events.6.d:0 "Avec des siècles d'expérience consacrés à leur art, les artisans elfiques sont sans égal, et leurs marchandises atteignent des prix considérables. Cela a suscité un ressentiment croissant parmi nos propres artisans, contraints d'abaisser leurs prix pour rester compétitifs."
 elven_tolerance_events.6.a:0 "Récompenser les elfes"
 elven_tolerance_events.6.b:0 "Telle est la nature du libre marché"
 elven_tolerance_events.6.c:0 "Nous ne pouvons permettre à nos artisans d'être surpassés"

 elven_tolerance_events.7.t:0 "Mages Elfiques"
 elven_tolerance_events.7.d:0 "Les mages elfiques sont considérés parmi les plus accomplis du monde, mais leur insistance sur les méthodes traditionnelles a irrité les autres mages de notre royaume. Certains ont approché [Root.Monarch.GetTitle] pour l'encourager à remplacer les elfes aux plus hautes positions. Bien que cela satisferait indubitablement les mages, écarter ces vénérables elfes du pouvoir serait perçu comme une insulte à la communauté elfique."
 elven_tolerance_events.7.a:0 "Nous devons respecter la sagesse des anciens mages"
 elven_tolerance_events.7.b:0 "Laissons les mages régler cela entre eux"
 elven_tolerance_events.7.c:0 "Élever des non-elfes à des positions supérieures"

 elven_tolerance_events.8.t:0 "Un Puissant Dignitaire Pris dans un Scandale"
 elven_tolerance_events.8.d:0 "Peau magnifique, longue chevelure ondoyante, des décennies d'expérience en conversation et autres affaires pratiques. Il n'est guère étonnant que les elfes soient souvent les maîtresses de choix de nos dignitaires. Normalement cela ne poserait problème, mais l'un des plus puissants officiers de la cour vient d'être découvert entretenant une liaison dans le dos de son épouse avec une elfe. La femme offensée a transformé cette affaire en scandale, et des appels se font entendre pour limoger l'officier, de peur que les elfes ne puissent indûment influencer les politiques par l'intermédiaire de leur séductrice bien placée. D'autres ont souligné que limoger l'officier montrerait que nous nous méfions de toute influence elfique, ce qui serait perçu comme une insulte à la communauté."
 elven_tolerance_events.8.a:0 "Une maîtresse elfe ? Je ne les blâme point !"
 elven_tolerance_events.8.b:0 "Prendre nos distances avec cet officier"
 elven_tolerance_events.8.c:0 "Faire un exemple de lui et de sa maîtresse"

 elven_tolerance_events.9.t:0 "Craintes de Marionnettistes Elfiques"
 elven_tolerance_events.9.d:0 "En raison de la longévité des elfes, ils constituent une race capable d'échafauder des plans nécessitant des décennies, voire des siècles pour aboutir. Alors que les elfes sont devenus partie intégrante de notre nation, des rumeurs circulent selon lesquelles notre administration actuelle serait le résultat d'un complot séculaire visant à rendre nos élites redevables envers eux. On prétend que bientôt, les elfes nous réduiront tous en esclavage, tout cela parce que notre [Root.Monarch.GetTitle] aurait été contrôlé par les elfes depuis sa naissance même."
 elven_tolerance_events.9.a:0 "Il n'y a rien de mal à un peu de sagesse elfique"
 elven_tolerance_events.9.b:0 "Rejeter ces accusations"
 elven_tolerance_events.9.c:0 "Évincer les elfes influents de notre gouvernement !"

 elven_tolerance_events.10.t:0 "Protestation Pacifique"
 elven_tolerance_events.10.d:0 "Des groupes d'elfes ont pris les rues pour protester contre nos politiques discriminatoires à leur égard. Leur beauté naturelle, leur sens du but et peut-être un soupçon de magie ont créé une puissante combinaison qui a inspiré l'admiration de nombre de nos propres citoyens. Jusqu'à présent, les protestations sont demeurées pacifiques et respectueuses, mais les elfes exigent que leurs droits soient protégés. Et si ce n'est le cas, les protestations pourraient devenir bien moins pacifiques."
 elven_tolerance_events.10.a:0 "Écouter leurs demandes"
 elven_tolerance_events.10.b:0 "Disperser les manifestants pacifiquement"
 elven_tolerance_events.10.c:0 "Disperser les manifestants par la violence"

 elven_tolerance_events.11.t:0 "Guérilleros Elfiques"
 elven_tolerance_events.11.d:0 "Notre patrouille s'est hâtée en apercevant la fumée, espérant ne pas arriver trop tard. Mais à leur arrivée, ils découvrirent un spectacle horrifiant. La plupart des soldats eurent la chance d'être abattus par une seule flèche de tireurs d'élite elfiques ; les quelques malheureux qui ne périrent point devinrent des exemples du maniement elfique de la lame. Tout équipement qui ne put être emporté fut brûlé. Les guérilleros elfiques sont devenus une nuisance que nous ne pouvons plus ignorer. De petites bandes bien disciplinées déciment nos patrouilles et cela ne semble point vouloir cesser. Certains de nos commandants suggèrent d'utiliser des civils elfes pour leur tendre un piège, mais d'autres ont conseillé de tendre une branche d'olivier dans l'espoir d'apporter la paix avec la communauté elfique."
 elven_tolerance_events.11.a:0 "Leur offrir une chance de se rendre"
 elven_tolerance_events.11.b:0 "Les traduire en justice"
 elven_tolerance_events.11.c:0 "Exécuter certains des leurs pour les attirer !"

 elven_tolerance_events.12.t:0 "Les Elfes Exigent Plus de Représentation à [elven_wants_representation_province.GetName]"
 elven_tolerance_events.12.d:0 "Les Elfes de [elven_wants_representation_province.GetName] ont lentement mais sûrement remarqué que leur position de minorité au sein des cités n'est point convenable. Bien qu'il reste quelques propriétaires terriens elfes, ceux-ci ne peuvent influencer suffisamment la politique selon eux. Ils demandent désormais plus d'autonomie et de représentation pour leur peuple."
 elven_tolerance_events.12.a:0 "Bien entendu !"
 elven_tolerance_events.12.b:0 "Faire quelques concessions"
 elven_tolerance_events.12.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 elven_tolerance_events.12.e:0 "Quelle idée intéressante"
 elven_represenatives_prov:0 "Représentation Elfique"
 desc_elven_represenatives_prov:0 "Les Elfes de la province ont obtenu la possibilité d'être mieux représentés dans la politique du royaume, ayant leur mot à dire dans les affaires locales. Cela a légèrement réduit les troubles, satisfaisant manifestement les masses elfiques."
 elven_not_given_represenatives_prov:0 "Les Elfes Manquent de Représentation"
 desc_elven_not_given_represenatives_prov:0 "Malgré de nombreuses tentatives pour obtenir une représentation et une chance d'influencer la politique locale, les Elfes de la région n'ont rien obtenu. Cela a accru les troubles."

 elven_tolerance_events.13.t:0 "Seigneurs Elfiques Locaux"
 elven_tolerance_events.13.d:0 "À [elven_lords_province.GetName], un groupe d'Elfes prétend être de sang royal. Bien qu'il soit difficile de prouver s'ils le sont réellement, ils ont présenté des documents qui semblent suffisamment authentiques pour être véritables.\n\nLeur accorder quelques privilèges et terres pourrait être bien vu, car qui refuserait d'avoir du sang royal elfique dans son royaume ? Cela ne serait toutefois point populaire dans le royaume, certains affirmant que les documents sont tous falsifiés."
 elven_tolerance_events.13.a:0 "Un seigneur est un seigneur"
 elven_tolerance_events.13.b:0 "Ces prétentions sont manifestement fausses"
 elven_tolerance_events.13.c:0 "Les punir pour ces mensonges"
 elven_tolerance_events.13.e:0 "Expliquer leurs devoirs"
 elven_tolerance_events_2_e_tooltip:0 "Notre souverain explique que le peuple elfique occupe déjà une excellente position dans le royaume et qu'il sera récompensé s'il demeure patient."
 elven_tolerance_events.13.f:0 "Ces documents sont faux !"
 elven_tolerance_events_2_f_tooltip:0 "L'œil avisé de notre souverain a repéré que les documents étaient faux, ce qui nous permet de justifier toute punition que nous infligeons."
 elven_local_lords:0 "Noblesse Elfique"
 desc_elven_local_lords:0 "Récemment, la Noblesse Elfique s'est levée et unie, obtenant le soutien du gouvernement et de la population locale. Par cela, elle refuse de nous verser certaines taxes, prétextant qu'il s'agit de l'un de leurs privilèges. Heureusement pour nous, elle utilise également ses ressources pour nous aider à maintenir les masses sous contrôle."
 elven_local_lords_punished:0 "Seigneurs Elfiques Punis"
 desc_elven_local_lords_punished:0 "La Noblesse Elfique locale est désormais activement traquée et la population locale est encouragée à dénoncer tout elfe qui prétendrait avoir du sang royal afin que nous puissions les punir convenablement. Cependant, certains profitent de cela pour causer des ennuis à des Elfes qu'ils n'apprécient point..."

 elven_tolerance_events.14.t:0 "Bandits Elfiques"
 elven_tolerance_events.14.d:0 "Récemment, [elven_bandit_province.GetName] a été ravagée par le banditisme. Bien que plusieurs personnes et groupes soient impliqués, il semble que les plus actifs soient des bandits elfiques. Ces bandits ont dévalisé nos marchands, nobles et paysans. Cela nuit à l'économie locale et les habitants exigent que nous agissions !"
 elven_tolerance_events.14.a:0 "Voilà un problème que nous pouvons ignorer"
 elven_tolerance_events.14.b:0 "Nous devons les punir !"
 elven_tolerance_events.14.c:0 "Ils pourraient collecter nos taxes"

 enforced_old_elven_rights:0 "Anciens droits elfiques"
 elven_bandits_punished:0 "Bandits elfiques punis"
 desc_elven_bandits_punished:0 "Le banditisme local est activement combattu, en particulier les bandits elfiques sans terres. L'opération n'est guère bien organisée mais elle fonctionne bien pour décourager d'autres problèmes."
 elven_bandits_run_free:0 "Les bandits elfiques sévissent librement"
 desc_elven_bandits_run_free:0 "Le gouvernement ignore les supplications des populations locales et en ce moment les bandits prospèrent dans la région, les plus actifs étant malheureusement des bandits elfiques."
 elven_bandits_run_free_gov_support:0 "Les bandits elfiques collectent les taxes"
 desc_elven_bandits_run_free_gov_support:0 "Le gouvernement soutient les bandits locaux, récupérant une part de leurs gains en échange de protection durant leurs raids. Ces provinces en particulier sont ravagées par ces problèmes."
 minority_bandits_run_free_gov_support_global:0 "Collecteurs de Taxes Bandits"
 desc_minority_bandits_run_free_gov_support_global:0 "Le gouvernement soutient les bandits locaux, récupérant une part de leurs gains en échange de protection durant leurs raids. Cela est très impopulaire parmi nos sujets."
 elven_guerillas:0 "Guérilleros Elfiques"

