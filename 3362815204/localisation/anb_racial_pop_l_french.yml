 harimari_tolerance_events.1.t:0 "Les Minorités Harimari Exigent une Représentation"
 harimari_tolerance_events.1.d:0 "Les minorités harimari dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
 harimari_tolerance_events.1.a:0 "Accordé !"
 harimari_tolerance_events.1.b:0 "Faire quelques concessions"
 harimari_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 harimari_tolerance_events.1.e:0 "Faire des promesses vides"

 harimari_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Harimari"
 harimari_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités harimari de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race harimari a augmenté."
 harimari_tolerance_events.2.a:0 "Tant mieux pour eux"

 harimari_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Harimari"
 harimari_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race harimari a diminué."
 harimari_tolerance_events.3.a:0 "C'est regrettable"

 harimari_tolerance_events.4.t:0 "Érudits Harimari"
 harimari_tolerance_events.4.d:0 "Les Harimari sont depuis longtemps versés dans l'érudition juridique, et un petit groupe d'harimari résidents s'est récemment présenté avec une pétition pour modifier plusieurs lois dans l'État qu'ils prétendent causer une taxation et une gouvernance inefficaces. Bien sûr, les changements qu'ils proposent semblent tous fournir des avantages indirects aux communautés harimari, souvent aux dépens des intérêts mercantiles et fonciers établis. Devrions-nous adopter leurs changements ?"
 harimari_tolerance_events.4.a:0 "Mettre en œuvre des réformes de gouvernance"
 harimari_tolerance_events.4.b:0 "Mettre en œuvre des réformes économiques"
 harimari_tolerance_events.4.c:0 "Quelle insolence ? Nos lois n'ont besoin d'aucune révision."

 harimari_tolerance_events.5.t:0 "Débat Public Harimari"
 harimari_tolerance_events.5.d:0 "Les Harimari aiment se mesurer, tant physiquement que mentalement, et lorsqu'ils ne sont pas enclins à prendre les armes, ils organisent souvent des débats philosophiques, juridiques ou religieux dans leurs communautés. Une série de débats particulièrement importante a été planifiée dans l'une de nos cités par un tel groupe, mais certains s'opposent aux nombreuses idées exotiques et non orthodoxes sur la foi qu'une telle conférence apporterait, affirmant qu'elle minerait les fondements moraux de l'État. Que devons-nous faire ?"
 harimari_tolerance_events.5.a:0 "Ils sont inoffensifs, les laisser avoir leur petit débat"
 harimari_tolerance_events.5.b:0 "Ils peuvent tenir leur propre rassemblement, s'ils le paient"
 harimari_tolerance_events.5.c:0 "Pensez au chaos que les nouvelles idées pourraient causer ! Interdire la pratique !"

 harimari_tolerance_events.6.t:0 "Auto-gouvernance Harimari"
 harimari_tolerance_events.6.d:0 "Dans les terres où ils sont communs, les Harimari ont vécu en tant que dirigeants d'eux-mêmes et des autres pendant plus d'un millier d'années. Être gouvernés par d'autres sans avoir leur mot à dire dans le gouvernement est impensable pour de nombreux harimari, et si on leur refuse l'implication appropriée avec l'État, de nombreuses communautés harimari préfèrent le droit de s'auto-gouverner. Une pétition a été présentée par la population harimari dans la province, demandant le droit d'entendre leurs propres affaires judiciaires et de percevoir des taxes locales pour financer leurs propres projets municipaux. Le faire empiéterait sur les droits du gouvernement local de superviser toutes les personnes dans la zone. Que devons-nous faire ?"
 harimari_tolerance_events.6.a:0 "Accorder aux pétitionnaires leur demande"
 harimari_tolerance_events.6.b:0 "Nous ne ferons pas d'exceptions"

 harimari_tolerance_events.7.t:0 "Chasseurs Harimari"
 harimari_tolerance_events.7.d:0 "Il y a peu de traditions aussi importantes pour les harimari que la chasse. Que ce soit avec lance, arc ou main nue, la poursuite de la proie et l'abattage habile d'une bête sauvage est une tradition longue et fière des hommes-tigres. Un groupe de chasseurs harimari enthousiastes a approché la couronne avec une demande de droits de chasse étendus à travers les bois de la province. Beaucoup de ces bois appartiennent à l'État, et les chasseurs qui ont déjà le droit de les utiliser se plaignent que les nouveaux chasseurs surpeupleront les bois et épuiseront la terre avec leur prédation trop zélée. Que devons-nous faire ?"
 harimari_tolerance_events.7.a:0 "Ils font certainement une offre généreuse. Leur accorder le droit de chasser sur les terrains de l'État."
 harimari_tolerance_events.7.b:0 "Les bois de nos ancêtres doivent être maintenus par leurs descendants"

 harimari_tolerance_events.8.t:0 "Fureur Primale Harimari"
 harimari_tolerance_events.8.d:0 "Bien que le tempérament des harimari soit généralement calme et raisonnable, ils ont une réputation d'être colériques et de guerriers sauvages. Les premiers rapports sur les harimari qui ont fait leur chemin vers Bulwar et Cannor décrivaient les hommes-tigres comme des monstres, et bien que des siècles de commerce aient depuis prouvé qu'ils ne sont pas différents des autres peuples de Halann, il y a ceux qui voient toujours les enfants d'Harimar comme des bêtes. Ce préjugé est récemment venu à son paroxysme dans la province, où plusieurs harimari ont été emprisonnés par des magistrats locaux et accusés d'un meurtre horrible. Ils ont fait appel de leur cas devant les tribunaux supérieurs et prétendent qu'ils sont blâmés à cause du préjugé de la communauté. Les preuves semblent effectivement fragiles... comment les tribunaux statueront-ils ?"
 harimari_tolerance_events.8.a:0 "Dénoncer publiquement les procédures et offrir une restitution aux accusés"
 harimari_tolerance_events.8.b:0 "Ils ne sont pas différents de nous, rejeter l'affaire !"
 harimari_tolerance_events.8.c:0 "Ces bêtes sont clairement responsables"

 harimari_tolerance_events.9.t:0 "Guerrier Harimari Distingué"
 harimari_tolerance_events.9.d:0 "La grande taille et la force des harimari en font d'excellents guerriers, et ceux qui ont rejoint nos armées ont été très loués par les officiers. Récemment, un jeune harimari s'est révélé être un combattant et un commandant particulièrement capable, et certains suggèrent qu'il devrait être élevé au corps des officiers. Élever ce jeune commandant montrerait certainement aux harimari qu'ils ont une place dans notre société, mais nous devrions passer outre les fils de nombreuses familles militaires éminentes pour le faire. Que devrions-nous faire ?"
 harimari_tolerance_events.9.a:0 "Accorder au soldat la commission"
 harimari_tolerance_events.9.b:0 "Passer outre le guerrier pour la promotion"

 harimari_tolerance_events.10.t:0 "Les Femmes Harimari et la Sphère Publique"
 harimari_tolerance_events.10.d:0 "La société harimari a longtemps été structurée selon des lignes strictement patriarcales, et les femmes harimari sont souvent restreintes par leurs familles de chercher un emploi ou de quitter leurs maisons sans surveillance. Plusieurs dames puissantes du royaume se sont prononcées contre cette restriction des droits de leurs consœurs, et exigent que le gouvernement adopte des lois interdisant certaines des restrictions les plus flagrantes que les familles harimari imposent à leurs épouses et filles. Insérons-nous le pouvoir de l'État dans les foyers de notre peuple, ou laissons-nous les décisions concernant les personnes à charge au chef de famille ?"
 harimari_tolerance_events.10.a:0 "Ce sont des affaires familiales, pas de l'État"
 harimari_tolerance_events.10.b:0 "Assurer que leurs droits soient protégés"

 harimari_tolerance_events.11.t:0 "Ministre Harimari"
 harimari_tolerance_events.11.d:0 "Les Harimari sont doués pour penser, parler et écrire de la poésie. Un harimari de talent particulier dans l'une de ces professions s'est récemment distingué. Voulons-nous les amener dans l'administration, ou fournir d'autres récompenses ou reconnaissances ?"
 harimari_tolerance_events.11.a:0 "Je pense que nous avons un emploi pour eux !"
 harimari_tolerance_events.11.b:0 "Quel individu remarquable. Féliciter publiquement leurs accomplissements."
 harimari_tolerance_events.11.c:0 "Ne faire aucun commentaire sur ce félin présomptueux."

 harimari_tolerance_events.12.t:0 "Fonction Publique Harimari"
 harimari_tolerance_events.12.d:0 "Les Harimari sont organisationnellement orientés, et ils sont maintenant impliqués dans la bureaucratie en nombre étonnamment élevé. Nous recevons des plaintes concernant les préjugés raciaux dans l'administration parmi ceux qui ne font pas confiance aux harimari, mais la fonction publique fonctionne merveilleusement bien. Restreignons-nous le nombre d'harimari autorisés dans notre gouvernement ?"
 harimari_tolerance_events.12.a:0 "Ils sont très efficaces... nous pouvons utiliser davantage de leurs compétences !"
 harimari_tolerance_events.12.b:0 "Les choses vont bien telles qu'elles sont"
 harimari_tolerance_events.12.c:0 "Nous ne pouvons pas leur permettre de dominer l'administration"

 harimari_tolerance_events.13.t:0 "Administrateurs Harimari Corrompus"
 harimari_tolerance_events.13.d:0 "Malgré toute leur brillance dans le gouvernement, les Harimari ont également une tendance à l'indolence et à l'excès. Un petit réseau d'administrateurs harimari dans le royaume a récemment été exposé pour avoir détourné de grandes sommes de fonds de l'État et accepté des pots-de-vin d'individus privés. Les traîtres ont été emprisonnés, mais maintenant la suspicion tombe sur de nombreux fonctionnaires harimari de niveau inférieur. Beaucoup dans le gouvernement suggèrent une purge de la bureaucratie qui retirerait les harimari suspects de leurs postes et atténuerait les dommages futurs, mais une telle mesure conduirait certainement au retrait de nombreux travailleurs innocents et compétents. Que devons-nous faire ?"
 harimari_tolerance_events.13.a:0 "Nous ne pouvons blâmer certains pour les péchés d'autres. Innocent jusqu'à preuve du contraire"
 harimari_tolerance_events.13.b:0 "Leur espèce s'est montrée trop facile à corrompre. Les virer tous."

 harimari_governing_reforms:0 "Réformes de Gouvernance Harimari"
 desc_harimari_governing_reforms:0 "Les érudits harimari ont créé des réformes gouvernementales pour gérer les États plus efficacement"
