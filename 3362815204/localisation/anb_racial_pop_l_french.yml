 tolerance_generic.1.t:0 "Boucs Émissaires"
 tolerance_generic.1.d:0 "Récemment, notre royaume ne s'en sort pas très bien. Les collecteurs d'impôts sont accusés d'extorquer la population, les officiels sont largement considérés comme des exemples d'incompétence et de népotisme, et le traitement des actes juridiques et des litiges civils est déploré comme injuste et corrompu. Le destin cruel est le seul coupable, mais vos sujets ingrats imputent injustement le blâme au gouvernement. Certains ont même commencé à critiquer notre estimé [Root.Monarch.GetTitle], et nous voyons les signes d'une révolte qui se prépare.\nAvec tous vos conseillers, nous avons tenu une réunion urgente du conseil. Nous avons convenu que puisque leurs innombrables préoccupations mesquines sont pour l'instant au-delà de notre pouvoir de résoudre, le meilleur cours d'événements pour au moins prévenir des rébellions à grande échelle serait d'essayer de diriger la colère des masses contre un autre ennemi. L'une des minorités présentes dans le royaume, peut-être ; elles sont déjà méfiées, et avec un message soigneusement élaboré, nous pourrions les présenter comme la cause de l'état actuel des choses.\nQuelle est votre décision, mon Seigneur ?"
 tolerance_generic.1.1:0 "Quel destin cruel ? J'ai fait les erreurs, je les assume !"
 tolerance_generic.1.2:0 "Je n'ai jamais aimé ces gens..."
 tolerance_generic.1.3:0 "L'un d'eux m'a frappé quand j'étais enfant !"
 tolerance_generic.1.4:0 "Tous mes sujets sont égaux, quelle que soit la race."
 tolerance_generic.2.t:0 "Tragédie Frappe !"
 tolerance_generic.2.d.1:0 "Ce serait enfin la nuit où il mettrait cette vermine à sa place. Après des années forcé de vivre près d'eux, chaque jour entendant les bruits qu'ils appellent une langue, chaque nuit gérant le tumulte qu'ils feraient dans leur stupeur ivrogne, il en aurait fini avec eux.\nChacun de ses compagnons avait une histoire à raconter : qui s'est fait agresser pour un simple mot, qui a vu ses filles harcelées par leurs jeunes. Une de ces choses avait eu l'audace d'ouvrir boutique juste en face de son commerce, volant la moitié de ses clients !\nEt maintenant il était apparu que leur race était responsable de l'état dans lequel se trouve notre nation, les impôts croissants, les prix augmentés ? Ce soir, il récupérerait ce qui lui est dû, et avec intérêt.\n\nHorreur ! Mon Seigneur, les paysans de [mob_province.GetName] ont assemblé une foule et incendié le plus grand quartier minoritaire de la cité ! Des centaines gisent morts ; comment une telle chose a-t-elle pu se produire ?\nCes fanatiques... c'est pourquoi nous devons maintenir la plèbe en bas ; si un petit indice que d'autres races pourraient ne pas être parfaites suffit à les transformer tous en assassins, on ne peut leur faire confiance en rien !"
 tolerance_generic.2.d.2:0 "Elle était fatiguée. Fatiguée de trimer tous les jours sans pause ni récompense, fatiguée des disputes avec son mari et des pleurs des enfants, fatiguée d'une vie au bas de l'échelle.\nEt fatiguée d'être méprisée par ces bâtards hautains. Pour qui se prenaient-ils, à parader comme s'ils étaient meilleurs qu'elle ? Ils vivaient près d'elle, travaillaient des emplois similaires aux siens, pourtant elle se sentait toujours inférieure devant eux. Pourquoi ? Juste parce qu'ils vivaient un peu plus longtemps ? À cause de leur grâce supposée ? Ils étaient aussi sales et en haillons qu'elle, quelle grâce ? Elle ne pouvait plus le supporter.\nEt maintenant il était apparu que leur race était responsable de l'état dans lequel se trouve notre nation, les impôts croissants, les prix augmentés ? Elle était fatiguée, mais ce soir elle ne dormirait pas. Et eux non plus.\n\nHorreur ! Mon Seigneur, les paysans de [mob_province.GetName] ont assemblé une foule ciblant l'une des minorités ! Des centaines gisent morts ; comment une telle chose a-t-elle pu se produire ?\nCes fanatiques... c'est pourquoi nous devons maintenir la plèbe en bas ; si un petit indice que d'autres races pourraient ne pas être parfaites suffit à les transformer tous en assassins, on ne peut leur faire confiance en rien !"
 tolerance_generic.2.d.3:0 "« Nous allons remettre cette vermine à sa place ! Ces petites nuisibles sont dans chaque trou, mettant leurs mains crasseuses partout où elles peuvent, salissant notre cité avec leurs taudis ! Le nombre pur de vols que notre zone subit ne sera plus toléré. Même le gouvernement l'a finalement reconnu !\nC'est leur nature, elles ne peuvent pas s'en empêcher, disent les cœurs saignants. Eh bien, nous allons leur apprendre ! »\n\nHorreur ! Mon Seigneur, les paysans de [mob_province.GetName] ont assemblé une foule et traqué les petites gens de la cité ! Des centaines gisent morts ; comment une telle chose a-t-elle pu se produire ?\nCes fanatiques... c'est pourquoi nous devons maintenir la plèbe en bas ; si un petit indice que d'autres races pourraient ne pas être parfaites suffit à les transformer tous en assassins, on ne peut leur faire confiance en rien !"
 tolerance_generic.2.d.4:0 "Il ne voulait pas faire cela. Il se croyait un homme bon et honnête, il méprisait les gens qui nuisaient à d'autres êtres. Mais il ne pouvait supporter de vivre toute sa vie dans la peur. C'étaient des monstres, violents et imprévisibles comme des prédateurs sauvages. Même l'État l'a dit.\nC'était tuer ou être tué. Et il refusait de partir tranquillement.\n\nHorreur ! Mon Seigneur, les paysans de [mob_province.GetName] ont assemblé une foule et attaqué l'une des races minoritaires ! Des centaines gisent morts ; comment une telle chose a-t-elle pu se produire ?\nCes fanatiques... c'est pourquoi nous devons maintenir la plèbe en bas ; si un petit indice que d'autres races pourraient ne pas être parfaites suffit à les transformer tous en assassins, on ne peut leur faire confiance en rien !"
 tolerance_generic.2.d.5:0 "Horreur ! Mon Seigneur, les paysans de [mob_province.GetName] ont assemblé une foule et attaqué l'une des races minoritaires ! Des centaines gisent morts ; comment une telle chose a-t-elle pu se produire ?\nCes fanatiques... c'est pourquoi nous devons maintenir la plèbe en bas ; si un petit indice que d'autres races pourraient ne pas être parfaites suffit à les transformer tous en assassins, on ne peut leur faire confiance en rien !"
 tolerance_generic.2.1:0 "Bêtes ! Animaux ! Pourtant... sont-ils moins révoltants maintenant ?"

