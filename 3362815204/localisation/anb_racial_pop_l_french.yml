 ogre_tolerance_events.1.t:0 "Les Minorités Ogres Exigent une Représentation"
 ogre_tolerance_events.1.d:0 "Les minorités ogres dans la province de [racial_pop_province_target.GetName] ont adressé une pétition pour une plus grande représentation de leurs peuples et plus d'autonomie dans leurs droits et actions."
