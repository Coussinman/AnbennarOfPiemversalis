 orcish_tolerance_events.1.t:0 "Les Minorités Orques Exigent une Représentation"
 orcish_tolerance_events.1.d:0 "Les minorités orques de la province de [racial_pop_province_target.GetName] ont demandé une plus grande représentation pour leur peuple ainsi qu'une plus grande autonomie dans leurs droits et actions."
 orcish_tolerance_events.1.a:0 "Accordé !"
 orcish_tolerance_events.1.b:0 "Faire quelques concessions"
 orcish_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 orcish_tolerance_events.1.e:0 "Faire de vaines promesses"

 orcish_tolerance_events.2.t:0 "Augmentation de la Tolérance Orque"
 orcish_tolerance_events.2.d:0 "Que ce soit par nos politiques et notre gouvernance ou simplement grâce à la prospérité du royaume, notre coexistence avec les minorités orques de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race orque s'est accrue."
 orcish_tolerance_events.2.a:0 "Tant mieux pour eux"

 orcish_tolerance_events.3.t:0 "Diminution de la Tolérance Orque"
 orcish_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit en raison des troubles de la guerre, de l'économie ou simplement d'une incompatibilité fondamentale, mais une chose est certaine : la tolérance de [Root.GetName] envers la race orque a diminué."
 orcish_tolerance_events.3.a:0 "C'est regrettable"

 orcish_tolerance_events.4.t:0 "Révolte Orque"
 orcish_tolerance_events.4.d:0 "Funestes nouvelles de la capitale. Il semble qu'un démagogue orque ait manipulé nombre des siens pour le suivre. Prêchant partout depuis les villages isolés jusqu'aux ghettos, cet homme a rassemblé une base de fidèles considérable. Confiant, le démagogue a montré ses vraies couleurs et ordonné à ses disciples de se révolter contre notre gouvernement et d'attaquer nos communautés loyales, prétendant que tout cela est nécessaire à leur soi-disant « libération » !"
 orcish_tolerance_events.4.a:0 "Les Sauvages !"
 orcish_tolerance_events.4.b:0 "Leur accorder une certaine autonomie"

 orcish_tolerance_events.5.t:0 "Révolte des Esclaves Orques"
 orcish_tolerance_events.5.d:0 "Au début, ce fut un cas isolé : un manoir d'un aristocrate mineur fut saccagé et pillé avec peu de traces du coupable et ses serviteurs asservis disparaissant également de la même manière. Ce serait le premier de nombreux événements similaires se produisant dans la campagne. Bien qu'initialement considérés comme l'œuvre de bandits et autres brigands, nous avons maintenant reçu des témoins vivants et leurs récits sur la dernière de ces attaques... il s'avère que les esclaves de l'attaque initiale se sont d'une manière ou d'une autre libérés de leurs chaînes et ont déversé leur colère sur la propriété de leur maître avant de disparaître dans la frontière sauvage, pour ensuite réapparaître et commettre le même acte sur d'autres propriétaires d'esclaves partout où ils les trouvent ! À chaque raid, ils grossissent et deviennent plus audacieux... quelque chose doit être fait, sinon nous aurons bientôt une révolte complète sur les bras. La question sur l'esprit de tous, cependant, est quoi ?"
 orcish_tolerance_events.5.a:0 "Laisser les Esclavagistes gérer leurs propres problèmes"
 orcish_tolerance_events.5.b:0 "Envoyer des troupes pour réprimer la révolte"
 orcish_tolerance_events.5.c:0 "Faire un exemple des meneurs"

 orcish_tolerance_events.6.t:0 "Un Aventurier Orque Achète des Esclaves"
 orcish_tolerance_events.6.d:0 "Les orques sont parmi les mieux adaptés au métier d'aventurier, et certains peuvent être fantastiquement riches grâce à leurs prouesses. L'un de ces orques a utilisé une fortune nouvellement acquise pour acheter un millier d'esclaves orques, puis les a libérés sur place. Bien que l'achat par un autre orque soit la manière dont la plupart des orques libres sont créés, le nombre considérable d'orques que l'aventurier a libérés a créé une controverse. De nombreux esclavagistes sont outrés, disant qu'à cause de cette manœuvre, leur propre cheptel est devenu agité. D'autres se sont plaints du grand afflux d'orques libres qui ont commencé à causer des troubles. Certains ont suggéré que les orques libres soient disciplinés, ou que l'aventurier serve d'exemple, afin de dissuader de futures actions similaires. Cependant, l'une ou l'autre action serait profondément ressentie par les Aventuriers, qui soutiennent leur camarade."
 orcish_tolerance_events.6.a:0 "Assez équitable"
 orcish_tolerance_events.6.b:0 "Leur interdire d'acheter des esclaves"
 orcish_tolerance_events.6.c:0 "Il a manifestement volé cet or, l'emprisonner et le saisir"

 orcish_tolerance_events.7.t:0 "Un Esclavagiste Orque Exige Reconnaissance"
 orcish_tolerance_events.7.d:0 "Une controverse plutôt étrange s'est produite sur le marché aux esclaves de notre capitale. Une caravane d'esclaves appartenant à un Orque libre a été attaquée sur le marché même ! Peu après être entré, la caravane fut bientôt arrêtée par des mercenaires employés par des esclavagistes rivaux en entrant sur le marché, qui prétendaient avoir pensé que l'Orque était un fugitif tentant de partir avec la caravane de son maître absent. L'Orque fut roué de coups, et ses esclaves emportés avant que les gardes n'interviennent et éclaircissent le malentendu. Enragé, l'Orque a maintenant porté cette situation devant nos plus hautes cours, exigeant compensation pour ses blessures, ses esclaves volés ainsi que des protections supplémentaires à accorder aux esclavagistes de race orque ! Comment devons-nous répondre à ces exigences ?"
 orcish_tolerance_events.7.a:0 "Accorder des Privilèges Spéciaux pour les protéger"
 orcish_tolerance_events.7.b:0 "Rester en dehors de cela"
 orcish_tolerance_events.7.c:0 "Les orques sont des esclaves"

 orcish_tolerance_events.8.t:0 "Ministre Orque"
 orcish_tolerance_events.8.d:0 "Les orques ne sont peut-être point connus pour leurs manières courtoises, mais peu les surpassent dans les affaires de la guerre. Un commandant orque s'est récemment distingué à la cour et a offert ses services au [Root.Monarch.GetTitle]."
 orcish_tolerance_events.8.a:0 "Recruter cet homme, euh, cet orque !"
 orcish_tolerance_events.8.b:0 "Un véritable modèle pour la communauté !"
 orcish_tolerance_events.8.c:0 "Et alors ?"

 orcish_tolerance_events.9.t:0 "Tribunaux de Clan Orques"
 orcish_tolerance_events.9.d:0 "L'un de nos conseillers, voyageant à travers [orc_clan_courts_province.GetName], a découvert une pratique particulière parmi sa population orque. Apparemment, les orques appliquaient loi et justice dans ce qu'ils appelaient des audiences de « tribunal de clan » pour traiter les conflits dans leur communauté. Il peut être préjudiciable de les laisser continuer leur propre justice qui existe hors du regard de nos législateurs, mais en même temps, la pratique est limitée à leurs propres communautés soudées et ne semble nuire à personne en dehors."
 orcish_tolerance_events.9.a:0 "Peut-être pouvons-nous apprendre quelque chose de leurs traditions pour le mettre dans nos propres codes de loi"
 orcish_tolerance_events.9.b:0 "Les laisser faire ce qu'ils veulent"
 orcish_tolerance_events.9.c:0 "Réprimer leurs pratiques sauvages"

 orcish_tolerance_events.10.t:0 "Nouveaux Demi-orques"
 orcish_tolerance_events.10.d:0 "Après la Marée Verte, le chaos dans l'Escann a fait d'étranges compagnons de lit, souvent littéralement. Dans une communauté, humains et orques ont trouvé un moyen non seulement de coexister, mais de prospérer ensemble, et en conséquence, une minorité demi-orque a émergé."
 orcish_tolerance_events.10.a:0 "Excellent"

 orcish_tolerance_events.11.t:0 "Embuscadiers Orques"
 orcish_tolerance_events.11.d:0 "Récemment, nos routes commerciales ont été ravagées par une épine plutôt irritante dans notre flanc. Des rapports parlent d'une bande de maraudeurs orques apparaissant soudainement et attaquant les caravanes commerciales et les patrouilles de garnison avant de se retirer d'où ils sont venus, leur butin mal acquis en remorque. Jusqu'à présent, toutes les tentatives pour mettre fin à cette menace ont été vaines, la bande échappant à nos forces militaires au mieux ou détruisant purement et simplement nos patrouilles de recherche dans des assauts rapides comme l'éclair au pire. Bien que la plupart de notre cour ait conseillé que nous doublions simplement nos efforts actuels ou que nous établissions des fortifications supplémentaires le long de nos routes, une alternative a été offerte par un messager envoyé de force par la bande elle-même. En bref, ils exigent une somme forfaitaire de richesses ainsi que des privilèges spéciaux, et en échange ils cesseront leurs attaques. Quelle option devons-nous prendre ?"
 orcish_tolerance_events.11.a:0 "Les apaiser"
 orcish_tolerance_events.11.b:0 "Envoyer quelques patrouilles"
 orcish_tolerance_events.11.c:0 "Construire des tours de guet le long des routes"

 orcish_tolerance_events.12.t:0 "Soldats de Fortune Orques"
 orcish_tolerance_events.12.d:0 "Bien que les orques aient eu du mal à s'intégrer dans notre société, ils demeurent parmi les recrues les plus désirées pour les professions armées. Leur apparence méchante et verte en fait des gardes du corps ou des guetteurs très prisés, et nombreux se sont engagés comme mercenaires ou troupes auxiliaires dans notre propre armée. Lorsqu'ils sont sans emploi, cependant, l'ennui, les malentendus culturels ou la stupeur ivre peuvent souvent finir en tragédie pour les autres et les orques eux-mêmes. Surtout lorsqu'ils sont hors de portée de leurs clans et chefs. L'échevin de l'une des villes du royaume nous a informés de la présence d'une telle compagnie de soldats de fortune, et nous supplie de trouver une solution avant que les tavernes ne soient à court de stocks ou qu'un fou ne provoque les orques."
 orcish_tolerance_events.12.a:0 "Nous leur trouverons du divertissement sur les lignes de front"
 orcish_tolerance_events.12.b:0 "Envoyer une troupe pour les disperser !"
 orcish_tolerance_events.12.c:0 "Les laisser tranquilles, ce n'est point du ressort de la cour"

 orcish_tolerance_events.13.t:0 "Un Affranchi Orque Appelle à la Libération"
 orcish_tolerance_events.13.d:0 "Bien que normalement la race orque jouisse des mêmes droits et responsabilités que toute autre race sur notre territoire, la prévalence de l'esclavage à l'intérieur de nos frontières est la cause de beaucoup d'agitation parmi nos sujets orques libres. Lorsqu'ils sont pressés, ils condamnent notre manque d'honneur en appelant les orques frères et sœurs, tout en permettant à de riches marchands et nobles de commercer leur parenté plus que toute autre race. Les esclavagistes et propriétaires d'esclaves eux-mêmes argumentent qu'il s'agit juste d'une relation contractuelle spéciale dans les limites de la légalité, sans discrimination basée sur la race, et remarquent l'impact économique significatif de l'esclavage à travers le pays et dans le trésor de l'État. Cette situation bout au point qu'elle a atteint la cour, et une position officielle est attendue du [Root.Monarch.GetTitle]."
 orcish_tolerance_events.13.a:0 "Promulguons des lois pour apaiser les deux parties"
 orcish_tolerance_events.13.b:0 "Les laisser continuer à argumenter"
 orcish_tolerance_events.13.c:0 "Écouter les élites"

 orcish_tolerance_events.14.t:0 "Orques Détruisant la Propriété à [orcish_causing_havoc_province.GetName]"
 orcish_tolerance_events.14.d:0 "Sans surprise, les orques de [orcish_causing_havoc_province.GetName] ont causé des problèmes, détruisant la propriété des domaines locaux après qu'un conflit a éclaté entre eux et un porte-parole local. Ce qui n'était initialement qu'un argument avec des mots devint bientôt pire quand le porte-parole parla mal des familles des orques.\n\nBien qu'il soit difficile de prétendre que le porte-parole ne l'avait point mérité, les domaines ne sont point satisfaits que leur propriété ait été détruite. Ils exigent maintenant que les orques soient punis."
 orcish_tolerance_events.14.db:0 "Sans surprise, les orques de [orcish_causing_havoc_province.GetName] ont causé des problèmes, détruisant la propriété des domaines locaux après ce qui était initialement une bagarre de taverne. Ce qui n'était initialement qu'un argument avec des mots devint bientôt pire quand quelqu'un parla mal d'un orque concernant son intelligence.\n\nIl est difficile de prétendre que la bagarre fut uniquement initiée par les orques, mais malgré cela les domaines exigent que les orques soient tout de même punis en raison de la destruction de leur propriété."
 orcish_tolerance_events.14.dc:0 "Sans surprise, les orques de [orcish_causing_havoc_province.GetName] ont causé des problèmes, détruisant la propriété des domaines locaux en raison de ce que nous ne pouvons que deviner être un raid planifié. Ce qui était selon eux initialement un petit raid vers la population locale finit par dégénérer quand certains des orques sous le chef cessèrent d'écouter et visèrent les terres appartenant au domaine local.\n\nIl est difficile de prétendre que cela ne fut point initié par les orques et il est justifié que les domaines exigent que les orques soient punis à cause de la destruction de leur propriété."
 orcish_tolerance_events.14.a:0 "Les punir sévèrement"
 orcish_tolerance_events.14.b:0 "Juste les punir modérément"
 orcish_tolerance_events.14.c:0 "Nous devons pardonner ce qui est hors de leur contrôle"
 orcish_tolerance_events.14.e:0 "Les punir ainsi que leurs familles !"
 orcish_harsh_punishment_prov:0 "Punition Sévère des Orques"
 desc_orcish_harsh_punishment_prov:0 "Dans une tentative de restaurer l'ordre dans la province, les autorités locales punissent activement tout orque suspecté de causer des troubles et de détruire la propriété."
 orcish_normal_punishment_prov:0 "Punition des Orques"
 desc_orcish_normal_punishment_prov:0 "Dans une tentative de restaurer l'ordre dans la province, les autorités locales ont reçu l'instruction de punir les orques ayant un casier judiciaire connu et plus important encore, les orques ayant causé la destruction pour les domaines locaux."

 orcish_tolerance_events.15.t:0 "Bandits Orques"
 orcish_tolerance_events.15.d:0 "Récemment, [orcish_bandit_province.GetName] a été ravagée par le banditisme. Bien que plusieurs personnes et groupes soient impliqués, il semble que les plus actifs soient des bandits orques. Ces bandits ont dévalisé nos marchands, nobles et paysans. Cela nuit à l'économie locale et les habitants exigent que nous agissions !"
 orcish_tolerance_events.15.a:0 "Voilà un problème que nous pouvons ignorer"
 orcish_tolerance_events.15.b:0 "Nous devons les punir !"
 orcish_tolerance_events.15.c:0 "Ils pourraient collecter nos taxes"
 orcish_bandits_punished:0 "Bandits orques punis"
 desc_orcish_bandits_punished:0 "Le banditisme local est activement combattu, en particulier les bandits orques sans terres. L'opération n'est guère bien organisée mais elle fonctionne bien pour décourager d'autres problèmes."
 orcish_bandits_run_free:0 "Les bandits orques sévissent librement"
 desc_orcish_bandits_run_free:0 "Le gouvernement ignore les supplications des populations locales et en ce moment les bandits prospèrent dans la région, les plus actifs étant malheureusement des bandits orques."
 orcish_bandits_run_free_gov_support:0 "Les bandits orques collectent les taxes"
 desc_orcish_bandits_run_free_gov_support:0 "Le gouvernement soutient les bandits locaux, récupérant une part de leurs gains en échange de protection durant leurs raids. Ces provinces en particulier sont ravagées par ces problèmes."

 orcish_tolerance_events.16.t:0 "Des Bandes Orques Cherchent le Combat"
 orcish_tolerance_events.16.d:0 "En raison de la guerre actuelle, certains orques y ont vu une opportunité parfaite, prétendant qu'ils pourraient aider à renverser la guerre et nous apporter la victoire. Bien qu'ils exigent compensation pour leurs services, il semble qu'ils soient plus que prêts à combattre. Que ce soit pour nous ou nos ennemis, il est difficile de le dire, mais dans le passé il a été montré qu'ils sont des combattants compétents."
 orcish_tolerance_events.16.a:0 "Les recruter"
 orcish_tolerance_events.16.b:0 "Nous ne pouvons nous le permettre"
 orcish_tolerance_events.16.c:0 "Ce serait comme engager nos ennemis pour nous révéler leurs plans..."

 orcish_refugees_manpower_desc:0 "provenant de réfugiés orques gonflant nos rangs"
 orcish_clan_courts:0 "Tribunaux de Clan Orques"
 desc_orcish_clan_courts:0 "Les orques de cette province ont commencé à traiter les problèmes au sein de leur communauté dans leurs propres « tribunaux de clan » selon leurs propres lois, plutôt que les lois officielles du pays."
 orcish_recruitment_province:0 "Recrutement Orque"
 desc_orcish_recruitment_province:0 "Des orques sont recrutés dans la province. Ce qui a commencé comme quelques bandes s'est bientôt transformé en un camp géant dans lequel les orques résident, prêts à être appelés aux armes."
 orcish_angry_about_assumptions:0 "Orques en Colère Concernant les Suppositions"
 desc_orcish_angry_about_assumptions:0 "Les orques sont en colère à cause de nos suppositions. Ils prétendent que c'est injuste ainsi que d'autres termes avancés qu'ils ne devraient point connaître et sont activement en train de rallier le peuple."
 upset_local_slaveholders:0 "Propriétaires d'Esclaves Locaux Mécontents"
 desc_upset_local_slaveholders:0 "Les propriétaires d'esclaves de cette province sont mécontents de notre décision de protéger un esclavagiste orque."
 orcish_liberation_edict:0 "Édit de Libération"
 desc_orcish_liberation_edict:0 "Nous avons tenu parole et libéré les orques de leurs chaînes"
 orcish_reassured_slavery:0 "Esclavage Rassuré"
 desc_orcish_reassured_slavery:0 "Les propriétaires d'esclaves ont reçu l'assurance que l'esclavage ne va nulle part"
 orcish_ambushers:0 "Embuscadiers Orques"
 desc_orcish_ambushers:0 "En accordant des privilèges spéciaux à ces embuscadiers, le commerce et la production ont souffert"

