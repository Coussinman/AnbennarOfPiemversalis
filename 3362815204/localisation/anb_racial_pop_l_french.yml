 gnomish_tolerance_events.1.t:0 "Les Minorités Gnomiques Exigent une Représentation"
 gnomish_tolerance_events.1.d:0 "Les minorités gnomiques de la province de [racial_pop_province_target.GetName] ont demandé une plus grande représentation pour leur peuple ainsi qu'une plus grande autonomie dans leurs droits et actions."
 gnomish_tolerance_events.1.a:0 "Accordé !"
 gnomish_tolerance_events.1.b:0 "Faire quelques concessions"
 gnomish_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas déjà suffisamment accordé ?!"
 gnomish_tolerance_events.1.e:0 "Faire de vaines promesses"

 gnomish_tolerance_events.2.t:0 "Augmentation de la Tolérance Gnomique"
 gnomish_tolerance_events.2.d:0 "Que ce soit par nos politiques et notre gouvernance ou simplement grâce à la prospérité du royaume, notre coexistence avec les minorités gnomiques de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race gnomique s'est accrue."
 gnomish_tolerance_events.2.a:0 "Tant mieux pour eux"

 gnomish_tolerance_events.3.t:0 "Diminution de la Tolérance Gnomique"
 gnomish_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit en raison des troubles de la guerre, de l'économie ou simplement d'une incompatibilité fondamentale, mais une chose est certaine : la tolérance de [Root.GetName] envers la race gnomique a diminué."
 gnomish_tolerance_events.3.a:0 "C'est regrettable"

 gnomish_tolerance_events.4.t:0 "Les Gnomes Dominent les Cercles d'Artificiers"
 gnomish_tolerance_events.4.d:0 "Les gnomes furent les premiers artificiers, et à ce jour ils sont toujours considérés comme les meilleurs artificiers. Ceux de notre nation n'ont fait nulle exception. Bien que cela soit ordinairement considéré comme une bonne chose, d'autres artificiers non-gnomes souffrent, prétendant que ceux qui ne suivent point la méthodologie gnomique sont perçus comme des objets de risée et non comme des artificiers crédibles ! Certains nous ont secrètement approchés pour privilégier leurs œuvres plutôt que celles des gnomes, ce qui stimulerait notre propre secteur tout en irritant les gnomes. Bien qu'il soit bon d'être équitable, peut-être devrions-nous favoriser les artificiers [Root.GetAdjective] de ces terres ?"
 gnomish_tolerance_events.4.a:0 "Les récompenser pour leur ingéniosité"
 gnomish_tolerance_events.4.b:0 "Ne pas intervenir"
 gnomish_tolerance_events.4.c:0 "Privilégier nos propres artificiers"
 gnomish_artificers_dominating_support_gnomes_influence:0 "Artificiers Gnomiques récompensés plutôt que les nôtres : §Y$VAL$%§!"
 gnomish_artificers_dominating_support_own_influence:0 "Artificiers Locaux privilégiés plutôt que les Gnomes : §Y$VAL$%§!"

 gnomish_tolerance_events.5.t:0 "Ministre Gnome"
 gnomish_tolerance_events.5.d:0 "Les gnomes sont renommés pour leur grande intelligence et leur capacité de grande réflexion, en plus de leur nature ingénieuse en tant que fondateurs du domaine de l'artisanat magique. L'un de ces individus s'est présenté à la cour, prétendant que ses pensées pourraient bénéficier au royaume dans son ensemble, si nous sommes disposés à financer ses travaux."
 gnomish_tolerance_events.5.a:0 "Recruter cet homme, euh, ce gnome !"
 gnomish_tolerance_events.5.b:0 "Un véritable modèle pour la communauté !"
 gnomish_tolerance_events.5.c:0 "Et alors ?"

 gnomish_tolerance_events.6.t:0 "Conférences Publiques Gnomiques"
 gnomish_tolerance_events.6.d:0 "Les gnomes aiment penser et aiment débattre, et certains d'entre eux à [gnomish_public_lectures_province.GetName] ont commencé à organiser des conférences publiques, invitant quiconque à venir écouter et discuter des idées présentées. Cela a conduit à une culture d'innovation dans la province, mais également de scepticisme, tant envers la religion que le gouvernement. Certains conseillers ont suggéré de réprimer les réunions, tandis que d'autres ont conseillé de les soutenir. La décision, cependant, appartient au souverain seul."
 gnomish_tolerance_events.6.a:0 "Un excellent moyen de faire réfléchir nos citoyens !"
 gnomish_tolerance_events.6.b:0 "Gardons théorie et philosophie dans nos propres cercles"
 gnomish_tolerance_events.6.c:0 "Fermer le lieu de réunion !"
 gnomes_public_lectures_happening:0 "Conférences Gnomiques Encouragées"
 desc_gnomes_public_lectures_happening:0 "Des conférences publiques menées par des gnomes se tiennent dans cette province, éveillant l'esprit pensant des autres peuples de cette province."
 gnomes_public_lectures_discouraged:0 "Conférences Gnomiques Découragées"
 desc_gnomes_public_lectures_discouraged:0 "Des conférences publiques menées par des gnomes pour discuter et débattre d'une grande variété de sujets ont été découragées, de peur qu'elles n'incitent à la révolte dans la population locale."

 gnomish_tolerance_events.7.t:0 "La Satire Gnomique Va Trop Loin"
 gnomish_tolerance_events.7.d:0 "Bien que la comédie soit une tradition gnomique bien établie, certains véritables génies comiques parmi eux ont décidé d'insulter notre souverain ! Leurs critiques ont été largement diffusées et touchent un peu trop juste, mais ils feignent l'ignorance concernant ce concept qu'ils appellent « liberté d'expression ». Bien que nous puissions invoquer les lois anti-sédition, cela serait perçu comme excessif, et davantage de comédiens remarqueraient certainement notre susceptibilité. Que devons-nous faire ?"
 gnomish_tolerance_events.7.a:0 "C'est hilarant ! Les embaucher !"
 gnomish_tolerance_events.7.b:0 "Est-ce que je parle vraiment ainsi ?"
 gnomish_tolerance_events.7.c:0 "Nous verrons qui rira quand ils seront pendus !"

 gnomish_tolerance_events.8.t:0 "Provocateurs Gnomiques"
 gnomish_tolerance_events.8.d:0 "Les gnomes sont intelligents, certes, mais on dit que la Hiérarchie Gnomique de l'Antiquité a sécurisé son pouvoir non par la rumination et le débat, mais par la ruse et l'intrigue plutôt que la force brute. Nos espions ont récemment découvert que d'éminents gnomes de notre nation ont secrètement répandu des rumeurs sur notre gouvernement et soutenu des groupes dissidents pour semer le chaos. Bien que nous réprimerait ces fauteurs de troubles, cela ne ferait que confirmer apparemment les rumeurs, tout en nous attirant la colère de cette minorité influente. D'un autre côté, ne pas réprimer pourrait laisser ces faussetés se répandre davantage."
 gnomish_tolerance_events.8.a:0 "Peut-être ont-ils le droit à leur façon de penser..."
 gnomish_tolerance_events.8.b:0 "L'ignorer ! Ce ne sont que des paroles après tout"
 gnomish_tolerance_events.8.c:0 "Traquer ces gnomes et leurs alliés !"
 gnomish_provocateurs:0 "Provocateurs Gnomiques"
 desc_gnomish_provocateurs:0 "Des provocateurs gnomiques incitent aux troubles dans notre nation."

 gnomish_tolerance_events.9.t:0 "Innovations des Gnomes"
 gnomish_tolerance_events.9.d:0 "Récemment à [innovations_gnomish_province.GetName], un petit groupe de gnomes a fait une invention d'une nature fort impressionnante. Bien que l'ouvrage soit manifestement un prototype, il s'est révélé fort utile pour les affaires menées dans la province.\n\nCependant, les gnomes qui l'ont construit veulent que nous ne le diffusions point plus loin qu'ils ne le permettent, prétendant que ce serait une insulte à leur travail s'il se répandait au loin avant d'être prêt. Bien qu'ils aient peu leur mot à dire maintenant sur ce que nous ferons, nous pourrions prendre en considération leur opinion."
 gnomish_tolerance_events.9.a:0 "Nous devons exploiter cela, MAINTENANT !"
 gnomish_tolerance_events.9.b:0 "Respecter leurs souhaits"
 gnomish_tolerance_events.9.c:0 "Confisquer leurs machines"
 gnomish_tolerance_events.9.e:0 "Une grande innovation, faisons-en usage avec leur aide !"
 gnomish_exploiting_inventions_prov:0 "Exploitation de l'Innovation Gnomique"
 desc_gnomish_exploiting_inventions_prov:0 "Dans une tentative d'améliorer l'économie locale, un prototype fait par le peuple gnome a été mis en usage intensif, fortement contre les souhaits du créateur. Bien qu'ils suscitent des troubles dans leur propre foyer, il y a aussi le problème que certaines de nos guildes se sentent surpassées et menacées et causent également des troubles."
 gnomish_respect_of_innovations_prov:0 "Usage de l'Innovation Gnomique"
 desc_gnomish_respect_of_innovations_prov:0 "Dans une tentative d'améliorer l'économie locale, une invention faite par le peuple gnome a été mise en usage, toutefois fortement réglementée comme demandé par les gens derrière l'innovation. Cela a été mis en œuvre en toute sécurité heureusement."
 gnomish_stopped_innovations_prov:0 "Innovations Stoppées"
 desc_gnomish_stopped_innovations_prov:0 "Dans une tentative d'arrêter les gnomes dans l'une de nos provinces, le gouvernement local a reçu l'ordre d'arrêter tout Gnome qui tente de bricoler sans permis."

 gnomish_tolerance_events.10.t:0 "Harcèlement des Gnomes"
 gnomish_tolerance_events.10.d:0 "Malheureusement, l'une de nos provinces a montré qu'elle n'a nul respect pour les gnomes qui y vivent, les harcelant constamment et perturbant leur vie quotidienne. Certains extrémistes vont même jusqu'à habiller les gnomes et les forcer à garder leurs jardins ! Cela a aigri les relations avec le manque flagrant de respect envers les gnomes, et nous sommes désormais contraints d'agir."
 gnomish_tolerance_events.10.a:0 "Eh bien, nous pourrions ignorer le problème"
 gnomish_tolerance_events.10.b:0 "Quelque chose pourrait être fait à ce sujet"
 gnomish_tolerance_events.10.c:0 "Cela semble juste, soutenir la tendance !"
 gnomish_tolerance_events.10.e:0 "Ces pauvres âmes, nous devons les aider"
 gnomish_tolerance_events.10.f:0 "Faire un exemple des fauteurs de troubles"
 gnomish_tolerance_events.10.g:0 "Ils devraient mieux savoir"
 gnomes_treated_poorly_prov:0 "Gnomes Maltraités"
 desc_gnomes_treated_poorly_prov:0 "Les gnomes de la province sont sous harcèlement constant, les rendant à la fois plus enclins à riposter quand ils le peuvent et également cibles privilégiées pour tout exutoire que la population peut avoir. Cela a malheureusement accru les troubles dans la région, même si cela facilite le suivi des gnomes car davantage de rapports soi-disant « faux » arrivent concernant des criminels gnomes. Au moins maintenant nous avons amplement de raisons pour confisquer leurs terres."
 gnomes_protected_from_danger_prov:0 "Gnomes Protégés"
 desc_gnomes_protected_from_danger_prov:0 "Alors que le danger de harcèlement augmente dans la province pour tout gnome y vivant, le gouvernement prend davantage de mesures pour l'arrêter, allant même jusqu'à envoyer des milices locales."

 gnomish_tolerance_events.11.t:0 "Génie Gnomique"
 gnomish_tolerance_events.11.d:0 "Un gnome est récemment devenu célèbre pour ses découvertes. Ce qui a commencé comme un simple projet local pour sa propre communauté s'est bientôt transformé en quelque chose de bien plus grand. Normalement, cela serait ignoré si ce n'était le fait qu'il a approché notre cour aujourd'hui. Il a prétendu que ses découvertes pourraient l'améliorer, et à la surprise de notre administration, il avait effectivement raison. Maintenant, il veut une sorte de récompense pour que nous utilisions son idée. Il prétend également avoir quelques idées supplémentaires qu'il est disposé à partager si la récompense est convenable."
 gnomish_tolerance_events.11.a:0 "Lui donner une récompense symbolique"
 gnomish_tolerance_events.11.b:0 "Récompenser son ingéniosité"
 gnomish_tolerance_events.11.c:0 "Il a probablement volé cette idée à quelqu'un..."
 gnomish_tolerance_events.11.e:0 "Je ne gaspillerai point mon argent pour ce fou"
 gnomish_tolerance_events.11.f:0 "Discutons du prix"

 gnomish_primary_refugees:0 "Un Foyer pour le Peuple Gnome"
 gnomish_respected_intellectuals_prov:0 "Génie Gnomique Respecté"
 desc_gnomish_respected_intellectuals_prov:0 "Un génie gnomique est venu de cette province, à qui nous avons montré de la bonté, et cela a conduit la communauté gnomique à être plus satisfaite de notre règne."
 gnomish_disrespected_intellectuals_prov:0 "Génie Gnomique Méprisé"
 desc_gnomish_disrespected_intellectuals_prov:0 "Un génie gnomique est venu de cette province et a approché notre cour. Malheureusement, en raison de notre rejet de ses services et de son intelligence, la province a été quelque peu frustrée par notre règne. Cela n'a point beaucoup nui à la stabilité locale, mais les troubles ont tout de même augmenté."

