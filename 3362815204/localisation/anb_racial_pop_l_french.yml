 ogre_tolerance_events.1.b:0 "Faire quelques concessions"
 ogre_tolerance_events.1.c:0 "Non. Ne leur avons-nous pas assez donné ?!"
 ogre_tolerance_events.1.e:0 "Faire des promesses vides"

 ogre_tolerance_events.2.t:0 "Augmentation de la Tolérance envers les Ogres"
 ogre_tolerance_events.2.d:0 "Que ce soit par des politiques et une gouvernance ou simplement un pays prospère, notre temps avec les minorités ogres de notre nation a conduit à un apprentissage naturel et à une compréhension mutuelle de nos coutumes respectives. La tolérance de [Root.GetName] envers la race ogre a augmenté."
 ogre_tolerance_events.2.a:0 "Tant mieux pour eux"

 ogre_tolerance_events.3.t:0 "Diminution de la Tolérance envers les Ogres"
 ogre_tolerance_events.3.d:0 "Nul ne sait ce qui s'est produit, que ce soit des troubles liés à la guerre, à l'économie ou simplement une incompatibilité manifeste, mais une chose est certaine : la tolérance de [Root.GetName] envers la race ogre a diminué."
 ogre_tolerance_events.3.a:0 "C'est regrettable"

 ogre_tolerance_events.4.t:0 "S'Aventurer dans le Marais"
 ogre_tolerance_events.4.d:0 "Les ogres ne sont pas les gens les plus grégaires, et beaucoup préfèrent la vie tranquille dans les coins sauvages de notre royaume, les collines, les rochers et les marais où personne ne peut les déranger, ce qui, malheureusement pour nous, inclut également les collecteurs d'impôts. Alors que les villages cherchent à étendre leurs terres agricoles, cependant, ils peuvent entrer en conflit avec ces ogres, qui considèrent ces zones marginales comme leurs terres, avec ou sans actes pour soutenir de telles revendications, et avec les terres arables devenant plus rares, ces conflits augmentent en fréquence. Dans la province, en drainant un marais voisin, les paysans locaux sont tombés sur un ogre particulièrement reclus, qui aime apparemment lancer des projectiles, des oignons trop mûrs aux ânes vivants. Bien que cela soit assez anecdotique, nous pourrions prendre cela comme une chance d'établir une politique officielle concernant ces cas."
 ogre_tolerance_events.4.a:0 "Ne pouvons-nous pas simplement régler cela autour d'une pinte ?"
 ogre_tolerance_events.4.b:0 "Certains d'entre eux peuvent mourir, mais c'est un sacrifice que je suis prêt à faire."
 ogre_tolerance_events.4.c:0 "Sortir de leur marais."

 ogre_tolerance_events.5.t:0 "La Taille Compte"
 ogre_tolerance_events.5.desc:0 "Les ogres ont une longue tradition de construction d'établissements fortifiés monumentaux, datant peut-être de l'époque de leurs ancêtres géants, tradition qu'ils maintiennent à ce jour, montrant des prouesses significatives en construction, en partie grâce à leur taille et leur force. Ce n'est pas simplement un choix de style, car il est manifestement clair que les ogres sont de grands gaillards. Avec une hauteur imposante d'au moins trois mètres, ils ont positivement besoin d'habitations plus grandes que les autres races, et se trouvent souvent dans des situations embarrassantes lorsqu'ils vivent dans nos cités en raison de leurs silhouettes maladroites. Dans l'espoir de remédier à cela, une délégation de maîtres maçons ogres, d'architectes et de notables a présenté à la cour une proposition pour une série de réformes radicales des normes de construction dans notre royaume, afin de s'adapter aux besoins de leur communauté croissante. Conscients des coûts apparemment intimidants, ils assurent que ce style ne favorisera pas seulement leur race, mais aussi notre réputation en tant que mécènes des arts."
 ogre_tolerance_events.5.a:0 "Construire en grand ne se démode jamais"
 ogre_tolerance_events.5.b:0 "Restons conservateurs"
 ogre_tolerance_events.5.c:0 "Petites portes seulement"
 ogre_tolerance_events.5.d:0 "Grandes portes pour un grand chef !"

 ogre_tolerance_events.6.t:0 "Ogres Cannibales dans l'Armée"
 ogre_tolerance_events.6.desc:0 "Nos forces armées bénéficient grandement du déploiement de régiments ogres. Leur force et leur férocité sont inégalées, et les possibilités tactiques de les armer avec des armes à poudre sont un délice pour nos généraux. \nMalgré cela, cependant, les scions géants ont une réputation quelque peu sinistre dans les camps de guerre. Même la recrue la plus verte en vient à connaître leurs étranges promenades sur les champs de bataille frais, pour revenir dans leurs enclos fortifiés avec de gros ballots étroitement enveloppés. Après cela, des feux de joie peuvent être vus allumés toute la nuit jusqu'à l'aube, l'odeur de chair rôtie remplissant l'air. \nAlors que nos généraux négligent ces pratiques sinistres, contents de garder leurs meilleurs guerriers heureux, les rumeurs de leurs banquets nocturnes ont commencé à s'infiltrer non seulement dans le pays, mais aussi à l'étranger. Déjà, les critiques de notre règne publient des pamphlets diffamatoires contre nos armées et notre gouvernement, où les « bêtes mangeuses d'hommes sacrilèges » sont parmi les adjectifs les plus doux employés. Notre chancelier peut à peine compter le volume de lettres suppliantes, des officiels aux marchands et tout ce qui se trouve entre les deux, nous exhortant à prendre des mesures contre cette catastrophe d'image publique, d'une manière ou d'une autre."
 ogre_tolerance_events.6.a:0 "Les ogres ont besoin de manger"
 ogre_tolerance_events.6.b:0 "Garder les rituels discrets"
 ogre_tolerance_events.6.c:0 "Les gens ne sont pas de la nourriture !"
 ogre_tolerance_events.6.d:0 "Ce sont des recrues potentielles ! Ne les mangez pas !"

 ogre_tolerance_events.7.t:0 "Ministre Ogre"
 ogre_tolerance_events.7.d:0 "Les fenêtres tremblent dans leurs cadres. Les oiseaux s'envolent des arbres dans les jardins du palais. Les gardes se précipitent vers les portes de bois sculpté, et pendant un court moment, la seule chose qui brise le silence, c'est le cliquetis de leur armure, les respirations rapides et anxieuses, et les coups sourds, rythmiques de quelque chose de très, très gros qui s'approche de la porte. Soudain, les pas se taisent, et pas même une mouche ne brise la tension. Puis, quoi que ce soit là-dehors frappe à la porte, trop délicatement pour l'ambiance raide. Sans baisser sa hallebarde, un garde s'approche de la porte pendant qu'il signale de se préparer à une attaque, et après avoir essuyé la sueur froide de son front, ouvre brusquement la porte pour révéler une silhouette imposante, un monstre, un géant mangeur de chair, et juste au moment où le capitaine ouvre la bouche pour commander l'attaque... « Bon après-midi, messieurs, terriblement chaud aujourd'hui, n'est-ce pas ? »"
 ogre_tolerance_events.7.a:0 "Embaucher cet ogre !"
 ogre_tolerance_events.7.b:0 "Un véritable exemple de leur race"
 ogre_tolerance_events.7.c:0 "Et alors ?"

 ogre_tolerance_events.8.t:0 "Insatiables"
 ogre_tolerance_events.8.d:0 "Les prix du grain et d'autres denrées alimentaires ont augmenté régulièrement au cours des dernières années, causant beaucoup d'agitation dans nos provinces alors que les roturiers sont forcés de consacrer une part croissante de leurs revenus à la nourriture. \nAprès quelques enquêtes, il a été découvert que les prix sont en hausse en raison de l'énorme demande des ogres de notre pays. Leur appétit semblable à celui d'un géant leur fait consommer bien plus que les gens ordinaires, faisant grimper les prix locaux sur leurs terres et en faisant une clientèle prisée pour les marchands de gros de grain et de bétail. Puisque toute la nourriture est maintenant évaluée en tenant compte du profit potentiel à réaliser sur le territoire ogre, cela a aggravé les problèmes déjà graves de spéculation et de thésaurisation, doublant presque les prix des denrées alimentaires, ce qui a conduit des agitateurs à se lever dans de nombreuses cités incitant à la violence contre les ogres, qui sont présentés comme les coupables de leurs estomacs vides, ignorant que leurs ennemis perçus souffrent également de ces coûts gonflés. Seules deux solutions s'offrent à nous : soit nous instituons une distribution de grain pour que le peuple puisse manger jusqu'à ce que le marché se stabilise, soit nous appliquons des lois spéciales contre les causes artificielles de ce désordre, ce qui ne manquera pas de mettre en colère les guildes marchandes. Avec des tensions aussi élevées, l'inaction récoltera sûrement des victimes innocentes, que ce soit par la dette, la famine ou le lynchage."
 ogre_tolerance_events.8.a:0 "Subventionner les vulnérables."
 ogre_tolerance_events.8.b:0 "Entre les gloutons et les fous avides d'or, je favorise les gloutons."
 ogre_tolerance_events.8.c:0 "J'ai raté la partie où tout cela est mon problème."

 ogre_tolerance_events.9.t:0 "Étalement Ogre Ordonné et Grand"
 ogre_tolerance_events.9.d:0 "Alertés par des nuages de poussière montants et des détonations tonitruantes clamant depuis un taudis à [Root.Capital.GetName], les gardes locaux ont découvert un quartier en construction : des boulevards dégagés assez larges pour une douzaine de bêtes de somme, des bâtiments imposants sculptés de reliefs ornés et des terrains communs tentaculaires, le tout fraîchement érigé à une échelle titanesque. Avant qu'ils ne puissent errer plus loin, un ogre vigilant orné d'écharpes jaunes et orange les a arrêtés et réprimandés pour avoir erré dans le quartier sans précautions de sécurité. Après quelques longues explications, l'ogre a partagé les plans de son peuple : insatisfaits de leur enclave crasseuse, ils ont pris les choses en main, rénovant le taudis en une maison digne des scions de géants.\n\nPourtant, même si nous nous émerveillons de leur accomplissement, l'échelle pure rend la zone hostile pour quiconque autre que les géants. Comme ils sont encore en pleine rénovation, nous pourrions leur demander d'ajuster les voies et les structures pour les personnes plus petites, mais nous pouvons également laisser leur projet de rénovation libre tranquille, gagnant le respect des ogres.\n\nComment notre [Root.Monarch.GetTitle] devrait-il gérer ce développement tentaculaire ?"
 ogre_tolerance_events.9.a:0 "Tant qu'ils continuent à payer des impôts, les laisser tranquilles."
 ogre_tolerance_events.9.b:0 "Exiger qu'ils rénovent le quartier pour les personnes plus petites."
 ogre_tolerance_events.9.c:0 "J'ai en fait quelques améliorations en tête."
 ogre_tolerance_events.9.e:0 "Une chance parfaite de presser ces lourdauds pour leur travail."
 ogre_tolerance_events.9.f:0 "Ah, j'ai trouvé leur paperasse ; approuvons avec certaines conditions."
 ogre_tolerance_events.9.g:0 "Pouvons-nous au moins avoir quelques zones récréatives à utiliser ?"

 ogre_tolerance_events.10.t:0 "Les Guildes Clandestines Exigent l'Intégration des Ogres"
 ogre_tolerance_events.10.d:0 "Toc-toc.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] s'agite dans [Root.Monarch.GetHerHis] chambre privée, soudainement conscient d'une silhouette encapuchonnée reposant contre un meuble orné à la distance d'un coup de dague. Comment...? L'étranger lève la main, parlant avec un accent charmant mais difficile à identifier.\n\n« Mon [Root.Monarch.GetTitle], il n'y a pas besoin d'alarme. Je suis ici seulement pour parler d'une affliction affectant vos sujets les plus loyaux.\n\n« Voyez-vous, les gouttières crasseuses et les arrière-salles enfumées se plaignent d'un seul problème ces jours-ci : la discrimination ogre. Ils sont de parfaits matériel de sentinelle et de videur, mais les flics les harcèlent, les arrêtent et même les tuent ; un seigneur du crime ne peut même pas profiter d'un dîner parfaitement légal sans s'inquiéter que leurs gardes du corps ogres attirent une attention indésirable.\n\n« Et donc j'ai été envoyé pour plaider auprès de vous, [Root.Monarch.GetTitle] [Root.Monarch.GetName] ; veuillez émettre un privilège pour ces ogres. En échange, vos fidèles scélérats aideront à dénoncer les rats indépendants, les cochons corrompus et les serpents étrangers cherchant à saper la grandeur de cette nation. \n\n« Que dites-vous, mon [Root.Monarch.GetTitle] ? »"
 ogre_tolerance_events.10.a:0 "D'accord, les ogres seront désormais... attendez, comment êtes-vous entré ici ?"
 ogre_tolerance_events.10.b:0 "Dans quel monde accepterions-nous cela ?"
 ogre_tolerance_events.10.c:0 "Pourquoi n'avez-vous pas soulevé cela lors de notre dernière réunion de cabale ?"
 ogre_tolerance_events.10.e:0 "Par toute mon autorité et mes moyens, je redresserai ce tort."


 ogre_tolerance_events.11.t:0 "Opération de Carrière Examinée par un Ogre"
 ogre_tolerance_events.11.d:0 "Une lettre furieuse de [ogre_tolerance_target.GetName] arrive dans la capitale, reliée en os et grande comme une couverture. Déroulant le massif missive, un conseiller lit à haute voix :\n\n« Au plus puissant seigneur suzerain de [Root.GetName],\n\nJe griffonne mon mécontentement à propos d'une nouvelle carrière près de ma maison. En tant qu'ogre, je suis un descendant d'artisans et de bâtisseurs, pourtant je ne peux m'empêcher de vomir devant toute l'affaire que j'ai vue se dérouler. Ces... » Le conseiller se mord la langue et saute quelques mots choisis. « C'est-à-dire que presque tout a mal tourné avec cette opération naissante : discipline, diligence, motivation des travailleurs, manque de professionnalisme, qualité minérale, et bien plus encore. C'est mon espoir que vous déployiez vos guerriers les plus noueux pour limoger les surveillants et redresser cette opération tordue. »\n\nLe conseiller dépose la lettre, la chambre regardant [Root.Monarch.GetTitle] [Root.Monarch.GetName].\n\n« Comment devrions-nous gérer cet ogre harceleur, mon [Root.Monarch.GetTitle] ? »"
 ogre_tolerance_events.11.a:0 "Mais le fouet est-il nécessaire pour la motivation des travailleurs ?"
 ogre_tolerance_events.11.b:0 "Gardez cela pour vous."
 ogre_tolerance_events.11.c:0 "Mettre en œuvre ces méthodes pour les projets futurs."
 ogre_tolerance_events.11.e:0 "Je reconnais un gestionnaire quand j'en vois un."
 ogre_tolerance_events.11.f:0 "Jeu d'enfant ; laissez-moi vous montrer comment on fait."

 ogre_tolerance_events.12.t:0 "Héritage des Géants Déchus"
 ogre_tolerance_events.12.d:0 "Il y a quelques années, un groupe d'aventuriers a découvert et bravé des ruines anciennes dans [Root.GetName]. Gardant leur découverte secrète, ces audacieux spéléologues ont enrôlé l'aide d'un historien de confiance pour vérifier les origines de la ruine. Après une longue enquête dans les salles titanesques, grouillantes d'innombrables artefacts grands et petits, ils ont déterminé que les ruines étaient d'origine géante.\n\nPourtant, un tel secret précieux ne pouvait être gardé éternellement. Les détails de l'expédition ont fui, et, craignant pour l'intégrité du site, les aventuriers nous ont approchés pour le protéger des pillards et des voleurs.\n\nAlors que nous luttons pour traiter un arriéré de demandes concernant les ruines géantes, un groupe particulier a sauté la file bureaucratique avec leurs grandes foulées : les ogres. Parlant brusquement mais équitablement, ils ont exprimé qu'ils, plus que tous les autres, méritent d'en être les gardiens et les surveillants : après tout, c'est leur héritage en tant que descendants de géants.\n\nAvec tant de parties disparates impliquées, il semble impossible de tous les apaiser. Qui devrait gérer les ruines géantes ?"
 ogre_tolerance_events.12.a:0 "Les descendants de géants méritent de superviser leur héritage."
 ogre_tolerance_events.12.b:0 "Obliger les ogres, mais exiger une part des artefacts."
 ogre_tolerance_events.12.c:0 "Les aventuriers l'ont trouvé, les aventuriers le gardent."
 ogre_tolerance_events.12.e:0 "Je pense connaître un moyen d'apaiser toutes les parties..."
 ogre_tolerance_events.12.a_tt_LOY:0 "Ruines Géantes Données aux Ogres"
 ogre_tolerance_events.12.a_tt:0 "Ruines Géantes Données aux Ogres : §Y$VAL$§!"
 ogre_tolerance_events.12.c_tt_LOY:0 "Ruines Géantes Possédées par les Aventuriers"
 ogre_tolerance_events.12.c_tt:0 "Ruines Géantes Possédées par les Aventuriers : §Y$VAL$§!"

 ogre_tolerance_events.13.t:0 "Troupeaux Redoutables Causent une Commotion au Marché"
 ogre_tolerance_events.13.d:0 "Des foyers enfument de délicieuses tranches de viande épicée, des caisses débordent de légumes voluptueux gros comme une tête de bœuf, et les citoyens volettent entre les étals animés, baignés dans la gaieté. Oui en effet, le marché fermier à [ogre_tolerance_target.GetName] était censé être un succès saisonnier... jusqu'à ce que les ogres arrivent avec leurs troupeaux.\n\nGrands comme un mât, les descendants de géants ont érigé des enclos massifs pour leur bétail tout aussi massif. Ces animaux titanesques bêlent et braient aussi fort que le tonnerre, causant un malaise parmi les animaux plus petits, et les fermiers craignent pour la sécurité du marché si les animaux devenaient trop agités. Les éleveurs ogres, d'un autre côté, rejettent ces craintes comme de petits cœurs tremblant à propos de petits problèmes.\n\nQue devrions-nous faire concernant les animaux géants turbulents affectant l'ambiance du marché ?"
 ogre_tolerance_events.13.a:0 "Gardez-moi un flanc d'aurochs, je veux caresser l'Agneau Redoutable !"
 ogre_tolerance_events.13.b:0 "Ces bestioles sont un peu trop... intenses pour le zoo de caresses."
 ogre_tolerance_events.13.c:0 "Awww ; je veux les caresser tous ! Qu'ils restent à chaque fois !"
 ogre_tolerance_events.13.c_tt:0 "Si notre dirigeant meurt lors de ces pitreries, nous ne subirons aucune perte de stabilité."

 ogre_tolerance_events.14.t:0 "Course au Canon"
 ogre_tolerance_events.14.d:0 "Canon : tonitruant, puissant, précieux, mortel, et soudainement en pénurie... quelle malchance pourrie !\n\nInterrogeant nos forges et distributeurs habituels pour ce manque de stock d'armes, ils disent qu'ils ont fait face à un pic soudain de demande, et quand nous avons insisté pour savoir qui dans notre nation pourrait acheter de l'artillerie, ils ont répondu : les ogres.\n\nNotre production d'armes domestique satisfait toutes sortes de besoins nationaux et individuels, mais pour les descendants de géants, nos petites armes sont... eh bien, petites : trop petites, à tout le moins. Pour convenir à leurs proportions imposantes, ces ogres ont plutôt acheté des canons pour les reconvertir en armes de poing, fusils et équipement similaire.\n\nBien que fait légalement et sans mauvaise intention, cela place notre nation dans une impasse logistique. Attendre que la fabrication domestique se stabilise prendra des années, donc nous sommes laissés avec deux options : soit nous payons des prix premium pour nous assurer d'avoir toujours des canons, soit nous récupérons les achats des ogres, gagnant leur courroux. Comment devrions-nous procéder ?"
 ogre_tolerance_events.14.a:0 "Canon malheureusement fermé à l'acquisition."
 ogre_tolerance_events.14.b:0 "Récupérer les armes immédiatement."
 ogre_tolerance_events.14.c:0 "Et c'est pourquoi nous maintenons des stocks"
 ogre_tolerance_events.14.e:0 "Présenter cette récupération comme une nouvelle taxe."
 ogre_tolerance_events.14.f:0 "QUI A GÂCHÉ MA LOGISTIQUE ?! JE VEUX DES NOMS !"

