 subject_only_rival_other_overlord:0 "En tant que $MYSUBJECTTYPE$, nous ne pouvons rivaliser qu'avec les $THEIRSUBJECTTYPES$ sous un suzerain différent."
 subject_only_ally_same_overlord:0 "En tant que $MYSUBJECTTYPE$, nous ne pouvons nous allier qu'avec les $THEIRSUBJECTTYPES$ sous le même suzerain."
