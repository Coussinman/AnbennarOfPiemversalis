 colony_cant_fight:1 "En tant que $SUBJECTTYPE$, vous ne pouvez déclarer la guerre qu'à d'autres colonies et aux primitifs ou infidèles voisins."
 subject_cant_fight:0 "Les $SUBJECTTYPES$ ne peuvent mener leurs propres guerres."
 subject_cant_rival:0 "Les $SUBJECTTYPES$ ne peuvent désigner de rivaux."
 subject_cant_ally:0 "Les $SUBJECTTYPES$ ne peuvent conclure d'alliances."
 subject_cant_marry:0 "Les $SUBJECTTYPES$ ne peuvent contracter de mariages royaux."
 subject_only_fight_same_overlord:0 "En tant que $MYSUBJECTTYPE$, nous ne pouvons combattre que les $THEIRSUBJECTTYPES$ sous le même suzerain."
