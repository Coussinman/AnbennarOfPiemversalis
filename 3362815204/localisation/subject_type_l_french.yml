 vassal_long_desc:0 "Un vassal doit suivre son suzerain en guerre, ne peut entreprendre certaines actions diplomatiques et versera une fraction de ses revenus à son suzerain."
 march_long_desc:0 "Une marche est un vassal qui ne peut être annexé et ne verse aucun impôt, mais possède une capacité militaire supérieure à celle d'un vassal ordinaire."
 client_vassal_long_desc:0 "Comme un vassal ordinaire, un État client doit suivre son suzerain en guerre, ne peut entreprendre certaines actions diplomatiques et versera une fraction de ses revenus à son suzerain."
 daimyo_vassal_long_desc:0 "Un Prabhi peut combattre d'autres Prabhia et Senaptia. Cependant, contrairement aux Senaptia, il n'est pas tenu de rejoindre son suzerain en guerre ; il verse plutôt des impôts au Raj."
 client_march_long_desc:0 "Comme une marche ordinaire, une marche cliente ne peut être annexée et ne verse aucun impôt, mais possède une capacité militaire supérieure à celle d'un vassal ordinaire."
 colony_long_desc:1 "Une colonie est un État colonial distinct sous l'autorité de son suzerain. Les colonies doivent verser un tarif mensuel basé sur la moitié de leur production et commerce à leur suzerain et céderont $TRADE|0%$ de leur puissance commerciale. Les colonies ne peuvent déclarer la guerre qu'aux primitifs ou à d'autres colonies."
 protectorate_long_desc:0 "Un protectorat fournira la moitié de sa puissance commerciale à son suzerain, tandis que ce dernier assure sa protection."
 personal_union_long_desc:0 "Dans une union personnelle, deux pays sont gouvernés par le même monarque. Le partenaire mineur doit suivre son suzerain en guerre et ne peut entreprendre certaines actions diplomatiques. À la mort du monarque, l'union peut soit se poursuivre, se rompre, soit le partenaire mineur peut être hérité et annexé."
