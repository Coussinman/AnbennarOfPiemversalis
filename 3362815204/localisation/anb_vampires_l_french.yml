l_french:
 outed_vampire:0 "Ancien Dirigeant Révélé Vampire"
 vampire_ruler_rampage:0 "Frénésie Sanguinaire Vampirique"
 injured_vampire:0 "Dirigeant Blessé"
 grand_masquerade:0 "Organisation d'une Grande Mascarade"
 ruler_broken_masquerade:0 "Mascarade Brisée"

 advance_vampire_hunter:0 "Les §YChasseurs de Vampires§! vont §Rse rapprocher§! !"
 end_vampire_hunter:0 "Les §YChasseurs de Vampires§! vont §Rmettre fin à leur traque§! !"
 vampire_ruler_die_permanent:0 "Notre Dirigeant Vampirique va §Rpérir sans possibilité de résurrection§! !"

 tooltip_ruler_is_vampire:0 "Le dirigeant est un §YVampire§! !"
 tooltip_ruler_is_not_vampire:0 "Le dirigeant n'est PAS un §YVampire§! !"
 tooltip_ruler_is_exposed_vampire:0 "Le dirigeant est un §YVampire Démasqué§! !"
 tooltip_ruler_is_hidden_vampire:0 "Le dirigeant est un §YVampire Dissimulé§! !"

 vampire_ruler.0.t:0 "Le Dirigeant Vampire est Révélé"
 vampire_ruler.0.d:0 "Depuis des années, notre [Root.Monarch.GetName] règne secrètement sur le pays en tant que vampire. Si des rumeurs ont longtemps circulé sur [Root.Monarch.GetHerHis] véritable identité, celle-ci est demeurée un secret bien gardé.\n\nMais rien ne dure éternellement, pas même les secrets d'un puissant mort-vivant. Récemment, les rumeurs se sont multipliées à travers le royaume, et il devient de plus en plus difficile de les démentir. Ce n'est plus qu'une question de temps avant que le [Root.Monarch.GetTitle] ne soit démasqué. Si nous agissons rapidement, nous devrions encore pouvoir préserver la mascarade, comme tout vampire est tenu par devoir et honneur de le faire. Mais cela exigera l'abdication immédiate de [Root.Monarch.GetName], une vie dans l'obscurité étant désormais [Root.Monarch.GetHerHis] seule voie."
 vampire_ruler.0.a:0 "Je dois me retirer."
 vampire_ruler.0.b:0 "C'est MON royaume !"
 human_heir:0 "Notre dirigeant se retirera et un héritier issu des familles nobles du royaume prendra la relève. §RLes héritiers vampiriques ne pourront pas accéder au trône.§!"

 vampire_ruler.1.t:0 "L'Âge Éveille les Soupçons"
 vampire_ruler.1.d:0 "[Root.Monarch.GetName] règne sur [Root.GetName] depuis de nombreuses années, et certains commencent à s'interroger sur l'absence de tout signe visible de vieillissement. Son visage demeure jeune et vigoureux, pas un seul cheveu gris, et ses yeux conservent leur attrait étrange.\n\nSi [Root.Monarch.GetName] veut continuer à régner, des mesures extrêmes doivent être prises pour préserver le secret de son identité."
 vampire_ruler.1.a:0 "Heureusement, j'ai déjà un héritier"
 vampire_ruler.1.b:0 "Je vais simuler ma propre mort !"
 vampire_ruler.1.c:0 "Je n'abdiquerai jamais !"
 vampire_ruler.1.e:0 "Peut-être devrais-je altérer leurs souvenirs de moi"
 vampire_ruler.1.f:0 "Je me lasse de régner, peut-être devrais-je me retirer."

 vampire_ruler.2.t:0 "Un Conseiller Trop Curieux"
 vampire_ruler.2.d:0 "Les divers conseillers qui servent la cour de [Root.Capital.GetName] sont grassement payés pour leurs brillants esprits, tandis qu'ils explorent les voies les plus fructueuses pour [Root.GetName]. Mais employer de telles créatures curieuses comporte des inconvénients. L'un d'eux a récemment commencé à noter les excursions nocturnes de notre dirigeant et sa nature inhabituelle, et a pris sur lui d'enquêter plus avant.\n\nS'il ne s'agissait que d'un simple paysan à l'esprit vagabond, cela ne serait pas inquiétant, grâce aux mesures de longue date prises pour préserver l'identité de notre [Root.Monarch.GetTitle]. Cependant, probablement en raison de sa proximité avec notre [Root.Monarch.GetTitle], le conseiller a pu rassembler des preuves et nourrir ses soupçons, jusqu'à percer entièrement le voile. Il a maintenant découvert la véritable nature de [Root.Monarch.GetName], et menace de l'exposer devant le pays et le monde entier !"
 vampire_ruler.2.a:0 "Personne ne le croira"
 vampire_ruler.2.b:0 "Peut-être puis-je vous convaincre de garder le silence"
 vampire_ruler.2.c:0 "Dommage, je vous appréciais pourtant"

 vampire_ruler.3.t:0 "Blessé Durant l'Entraînement"
 vampire_ruler.3.d:0 "Il n'est pas inhabituel pour les dirigeants de s'entraîner au combat avec leurs généraux et autres nobles du royaume, et il est extrêmement rare que des blessures graves surviennent lors d'un tel duel. Mais cela arrive.\n\n[Root.Monarch.GetName] a subi une telle blessure lors de [Root.Monarch.GetHerHis] duel plus tôt dans la journée. Heureusement, grâce à sa nature vampirique, aucun dommage permanent n'en résulte, mais cela soulève quelques questions embarrassantes sur la façon dont [Root.Monarch.GetName] a survécu."
 vampire_ruler.3.a:0 "Ce n'était pas si grave..."
 vampire_ruler.3.b:0 "Moi ? Blessé ?"

 vampire_ruler.4.t:0 "Invitation à un Banquet"
 vampire_ruler.4.d:0 "[Root.Monarch.GetName] a été invité à visiter la cour d'une grande famille noble pour une foire. Accepter une telle invitation exigerait de grands efforts pour éviter d'attirer l'attention sur la nature vampirique de notre [Root.Monarch.GetName]. Sans parler du risque que représente la lumière du soleil. Bien qu'il n'y ait aucune obligation d'assister à un tel événement, cela serait perçu comme un signe d'irrespect et attirerait certainement l'inimitié de cette famille.\n\nMais un lion doit-il vraiment se soucier des sentiments des moutons ?"
 vampire_ruler.4.a:0 "Prendre des mesures pour préserver l'identité de [Root.Monarch.GetName]"
 vampire_ruler.4.b:0 "Je devrai décliner"

 vampire_ruler.5.t:0 "Requête du Géniteur"
 vampire_ruler.5.d:0 "En tant que Rejeton Vampirique, [Root.Monarch.GetName] est sous la responsabilité de son Géniteur, le vampire qui lui a accordé le Don du Sang. Ainsi, selon la tradition et les coutumes vampiriques, notre [Root.Monarch.GetTitle] est tenu par devoir de suivre tous les ordres qu'[Root.Monarch.GetSheHe] reçoit, peu importe la couronne sur [Root.Monarch.GetHerHis] tête ou le trône sur lequel [Root.Monarch.GetSheHe] siège.\n\nRécemment, le Géniteur de [Root.Monarch.GetName] a commencé à formuler des exigences exorbitantes envers [Root.Monarch.GetHerHim], exigeant des privilèges bien au-delà de ceux de n'importe quelle noblesse ordinaire. Et aujourd'hui, une nouvelle demande est arrivée à [Root.Capital.GetName], une encre rouge sang griffonnant une requête absurde sur un papier blanc comme l'os. Comment le [Root.Monarch.GetTitle] va-t-il procéder ?"
 vampire_ruler.5.a:0 "Je dois m'exécuter"
 vampire_ruler.5.b:0 "Il ne me commande pas !"
 BROKE_VAMPIRE_LAWS:0 "A enfreint les Lois Vampiriques : "

 vampire_ruler.6.t:0 "Autorités Concurrentes"
 vampire_ruler.6.d:0 "Des rapports nous sont parvenus concernant un Vampire sauvage sévissant dans la capitale. Bien que de tels monstres ne soient pas inconnus, les rumeurs vampiriques circulant parmi notre peuple attireront certainement une attention indésirable sur notre dirigeant et les autres vampires de notre pays.\n\nEn conséquence, la classe des Vampires a exigé que le [Root.Monarch.GetTitle] prête l'assistance de l'État pour traquer et détruire ce prédateur errant. Le ton de ces requêtes a commencé poliment, mais s'est récemment transformé en quasi-ordres, comme s'ils avaient oublié quel rôle [Root.Monarch.GetName] joue au sein de [Root.GetName].\n\nEn effet, c'est traditionnellement la responsabilité de la classe des Vampires. Notre [Root.Monarch.GetTitle] pourrait cependant intervenir, et même les contredire si nécessaire."
 vampire_ruler.6.a:0 "Mon domaine, mes règles"
 vampire_ruler.6.b:0 "Assister la classe des Vampires"
 vampire_ruler.6.c:0 "Cela n'en vaut pas le coût"
 ALLOWED_FERAL_VAMPIRES:0 "A toléré des Vampires Sauvages : "

 vampire_ruler.7.t:0 "Engendrer un Héritier"
 vampire_ruler.7.d:0 "Les vampires sont strictement limités dans leur capacité à Engendrer de nouveaux héritiers, car le faire sans précaution représente un grand risque pour la Mascarade. Tout nouvel héritier doit être approuvé par les autres Vampires du royaume et doit être soigneusement sélectionné.\n\n[Root.Monarch.GetName] a trouvé le candidat idéal pour le don du sang, et est prêt à balayer toutes les préoccupations de ses frères. À quoi bon être vampire, ou être [Root.Monarch.GetTitle], si l'on ne peut répandre cette bénédiction aux plus dignes ? La seule question qui demeure est de savoir comment ils serviront."
 vampire_ruler.7.a:0 "Ils me succéderont"
 vampire_ruler.7.b:0 "Ils me serviront comme conseiller"
 vampire_ruler.7.c:0 "Ils mèneront nos armées"
 vampire_ruler.7.e:0 "Cela attirerait l'attention"
 add_vampire_heir:0 "Un §Ghéritier§! sera §Yengendré§!, nous permettant de conserver un dirigeant vampirique si notre dirigeant choisit de se retirer."
 tooltip_has_exiled_vampire_heir:0 "§g[Root.Heir.GetName] se retire dans les ombres... pour l'instant§!"

 vampire_ruler.8.t:0 "Organisation d'une Grande Mascarade"
 vampire_ruler.8.d:0 "[Root.Monarch.GetName] a commencé à envisager l'organisation d'une grande mascarade, invitant chaque noble du royaume et même certains dignitaires étrangers. Le vin, et d'autres liquides, coulerait à flots, les festins seraient abondants, et toute la cour danserait jusqu'à l'aube.\n\nUn tel événement améliorerait certainement grandement les relations avec nos voisins, mais ne serait pas bon marché. Mais les meilleurs luxes ne le sont jamais."
 vampire_ruler.8.a:0 "Nous organiserons cette Mascarade"
 vampire_ruler.8.b:0 "C'est trop coûteux"

 vampire_ruler.10.t:0 "La Faim Dévorante"
 vampire_ruler.10.d:0 "Tous les vampires connaissent la faim, une pulsion lancinante toujours présente dans leur esprit. C'est quelque chose à laquelle aucun vampire ne peut échapper, quelle que soit sa puissance et sa résolution, et ils finiront par être consumés par cette pulsion.\n\nCertaines nuits, la faim est distante et un vampire peut presque prétendre ne pas la ressentir. Certaines nuits, elle titille l'esprit, une légère démangeaison impossible à gratter complètement. Et les nuits comme celle-ci ? Cette nuit, la faim consume [Root.Monarch.GetName]."
 vampire_ruler.10.a:0 "Je dois chasser"
 vampire_ruler.10.b:0 "Je me contrôlerai"
 vampire_ruler.10.c:0 "Je... Dois... §RME NOURRIR§!"
 vampire_ruler.10.e:0 "La Cour du Sang est toujours préparée à cela"

 vampire_ruler.11.t:0 "La Bête Intérieure"
 vampire_ruler.11.d:0 "Garder le contrôle n'est pas tâche aisée pour un vampire. Tous connaissent l'appel de la bête, le monstre qui vit en chacun d'eux. Un monstre qui menace constamment de prendre le dessus, d'arracher le contrôle à l'être rationnel qui habite normalement leur enveloppe terrestre. Et comme [Root.Monarch.GetName] le sait bien, une fois que la bête commence à tirer, il n'existe qu'un seul moyen de la repousser.\n\nCette nuit, le désir a frappé notre [Root.Monarch.GetTitle], et [Root.Monarch.GetHerHis] ligne de conduite semble claire."
 vampire_ruler.11.a:0 "Bête je suis, de peur que bête je devienne"
 vampire_ruler.11.b:0 "Je me contrôlerai"
 vampire_ruler.11.c:0 "Je... Dois... §RME NOURRIR§!"

 vampire_ruler.12.t:0 "L'Obsession Sans Fin"
 vampire_ruler.12.d:0 "Avec des siècles de non-vie devant eux, de nombreux vampires semblent s'abandonner à l'une de leurs obsessions d'avant leur transformation. Certains poursuivent la connaissance dans des tomes poussiéreux, d'autres recherchent le pouvoir dans les cours ou sur les champs de bataille, d'autres encore s'adonnent à tous les plaisirs hédonistes connus de l'homme (et en inventent de nouveaux).\n\nMais ce ne sont que des mensonges, n'y prêtez pas attention. La seule véritable obsession qu'un vampire connaisse, celle qui l'accompagnera aussi longtemps qu'il non-vivra, c'est le sang. Et cette nuit, cette vérité est particulièrement saillante pour [Root.Monarch.GetName]. Car malgré tous ses efforts pour prêter attention aux affaires de l'État, aux derniers développements politiques du royaume, seul cet ichor rouge domine [Root.Monarch.GetHerHis] pensées."
 vampire_ruler.12.a:0 "Je m'accorderai ce plaisir, mais avec modération"
 vampire_ruler.12.b:0 "Je me contrôlerai"
 vampire_ruler.12.c:0 "Je... Dois... §RME NOURRIR§!"

 vampire_ruler.13.t:0 "La Chasse Commence"
 vampire_ruler.13.d:0 "Il est bien connu que les vampires chassent, partant en excursions nocturnes pour se gorger du sang de leurs proies. Ce qui est moins connu, c'est que la chasse ne se résume pas à un simple besoin de nourriture : une bonne partie de la raison pour laquelle les vampires chassent réside dans le frisson de la traque elle-même.\n\n[Root.Monarch.GetName] sent ces deux désirs s'éveiller en [Root.Monarch.GetHerHis] entrailles cette nuit. Tous les préparatifs nécessaires accomplis, le [Root.Monarch.GetTitle] quitte le siège de [Root.Monarch.GetHerHis] pouvoir, en quête de la victime qui sera sa proie cette nuit."
 vampire_ruler.13.a:0 "Que la chasse commence !"
 vampire_ruler.13.b:0 "Je ne devrais pas attirer l'attention"

 vampire_ruler.14.t:0 "La Chasse - Un Vampire Sauvage"
 vampire_ruler.14.d:0 "De récentes rumeurs ont attiré l'attention de [Root.Monarch.GetName] cette nuit : un rôdeur dans les ombres de [Root.Capital.GetName], s'en prenant à sa population tard dans la nuit et ne laissant que des cadavres exsangues derrière lui. Ce n'est assurément pas l'œuvre du [Root.Monarch.GetTitle], qui traite la satiété avec bien plus de soin et de respect. Ce doit être un vampire sauvage.\n\nEt ainsi, dans les rues obscures éclairées seulement par un croissant de lune, [Root.Monarch.GetName] entreprend de chasser le chasseur. Depuis les ombres, [Root.Monarch.GetSheHe] observe les ombres. Depuis les toits, [Root.Monarch.GetSheHe] surveille les toits. Avec l'œil d'un prédateur, [Root.Monarch.GetSheHe] considère ce sur quoi un autre prédateur pourrait se concentrer.\n\nEt puis, un mouvement là où il ne devrait pas y en avoir. Un rival ? Non. Une victime des circonstances, et bientôt de la lame de [Root.Monarch.GetName]."
 vampire_ruler.14.a:0 "Il ne peut être laissé en vie"
 vampire_ruler.14.b:0 "Je devrais renoncer"

 vampire_ruler.15.t:0 "La Chasse - Un Chasseur de Vampires"
 vampire_ruler.15.d:0 "[Root.Monarch.GetName] a quitté son siège de pouvoir pour chasser, mais alors qu'[Root.Monarch.GetSheHe] arpentait les rues, [Root.Monarch.GetSheHe] a ressenti un sentiment troublant : celui d'être traqué à son tour. Et maintenant, à la vue d'un homme encapuchonné errant également dans les rues de [Root.Capital.GetName], dont les pieux de bois à pointe d'acier scintillent au clair de lune, il est évident que quelqu'un voudrait transformer notre [Root.Monarch.GetTitle] de prédateur en proie.\n\n[Root.Monarch.GetName] pourrait tenter une embuscade, affrontant son poursuivant de front, mais une telle action serait risquée. Quoi qu'il en soit, il est clair que le repas de cette nuit doit être pris avec précaution, ou peut-être abandonné entièrement... mais cela ne peut attendre longtemps."
 vampire_ruler.15.a:0 "Tu meurs ici et maintenant, misérable !"
 vampire_ruler.15.b:0 "Je ne dois pas attirer l'attention"
 vampire_ruler.15.c:0 "Je vais les attendre dans nos refuges sûrs"

 vampire_ruler.16.t:0 "La Chasse - Reconnu par un Roturier"
 vampire_ruler.16.d:0 "Le flot constant de courtisans et de pétitionnaires qui se présentent devant [Root.Monarch.GetName] dans [Root.Monarch.GetHerHis] salle d'audience semble souvent se confondre, et il est courant que le [Root.Monarch.GetTitle] ne se souvienne que d'une poignée de visages rencontrés ce jour-là. Mais l'inverse ne s'applique évidemment pas. Avec le portrait frappé sur chaque pièce [Root.GetAdjective] comme rappel constant, même le plus humble paysan est censé pouvoir reconnaître le [Root.Monarch.GetTitle]. Normalement c'est un privilège du rang, mais cette nuit, cela s'est retourné contre nous.\n\nLa chasse se déroulait à merveille, et [Root.Monarch.GetName] pouvait presque goûter le sang frais qui semblait si proche. Quand soudain, la porte d'une des nombreuses maisons de [Root.Capital.GetName] s'ouvrit brusquement, et la torche brandie à l'intérieur illumina [Root.Monarch.GetHerHis] visage. Celui qui ouvrait la porte, encore en vêtements de nuit, haleta et s'exclama « Mon [Root.Monarch.GetTitle] ! »\n\nSi cela n'est pas immédiatement traité, cela pourrait engendrer des rumeurs embarrassantes, et peut-être être le flocon de neige qui déclenche une avalanche de suspicion. Ce n'est pas un risque que [Root.Monarch.GetName] peut prendre à la légère. Que doit-[Root.Monarch.GetSheHe] faire ?"
 vampire_ruler.16.a:0 "Je dois fuir"
 vampire_ruler.16.b:0 "Une proie de plus !"
 vampire_ruler.16.c:0 "L'hypnotiser"

 vampire_ruler.17.t:0 "La Chasse - Jusqu'à l'Aube"
 vampire_ruler.17.d:0 "L'aube. Les premiers rayons du soleil au-dessus de l'horizon. Au Bulwar, c'est un appel aux fidèles du Culte du Soleil, un rappel de la gloire de Surael. À Anbenncóst, cela signale à une vaste foule de se lever de quartiers exigus pour se rendre à des ateliers tout aussi exigus. En Gérudie, cela exige qu'une douzaine de scaldes chantent à nouveau le chant du Dragon et du Scalde, pour s'assurer que la chaleur solaire ne soit jamais noyée par la glace draconique.\n\nMais pour [Root.Monarch.GetName], c'est une vue frustrante : le marqueur d'une nuit infructueuse, sans sang. La faim le ronge encore. Mais tout vampire est un prédateur nocturne, et c'est vrai aussi de notre [Root.Monarch.GetTitle]."
 vampire_ruler.17.a:0 "Je devrai attendre une autre occasion"
 vampire_ruler.17.b:0 "Encore un peu..."

 vampire_ruler.18.t:0 "La Chasse - Hypnotiser un Client de Taverne"
 vampire_ruler.18.d:0 "C'était presque trop facile. [Root.Monarch.GetName] a décidé que le terrain de chasse serait la taverne, ce pot de miel attirant constamment les mouches, et les guêpes. [Root.Monarch.GetSheHe] est arrivé tard dans la nuit, bien après le début des festivités, quand plus âme qui vive ne pouvait distinguer le visage du [Root.Monarch.GetTitle] à travers d'épaisses lunettes de bière (et encore moins s'en souvenir le lendemain matin).\n\nIl fut tout aussi simple d'attirer une victime potentielle. En tournant le charme à plein régime, [Root.Monarch.GetName] a à peine eu besoin de [Root.Monarch.GetHerHis] capacités vampiriques. L'auberge avait été bien choisie pour la disponibilité de chambres privées (et discrètes), et le couple s'est fondu parmi d'innombrables autres en trouvant leur chemin vers l'étage.\n\nLe reste s'est fait dans les ténèbres, et dans les ténèbres il demeurera. Qu'il suffise de dire que les désirs de [Root.Monarch.GetName] ont été bien assouvis, et que sa victime survivra, avec un souvenir flou de la nuit. [Root.Monarch.GetName] accueillera l'aube avec un sourire sur [Root.Monarch.GetHerHis] visage, sachant que le seul souvenir de sa proie sera l'éclat de [Root.Monarch.GetHerHis] yeux."
 vampire_ruler.18.a:0 "Tout s'est déroulé sans incident"

 vampire_ruler.19.t:0 "La Chasse - Comme une Ombre"
 vampire_ruler.19.d:0 "[Root.Capital.GetName] gisait dans les ténèbres, et ces ténèbres étaient de trois natures.\n\nLes ténèbres les plus évidentes étaient celles des ombres réconfortantes de la place principale, tapies entre les zones de lumière des torches. Des ténèbres constamment percées par l'ouverture d'une porte de taverne et le déversement de lumière et de musique, mais omniprésentes dans les moments entre-deux. Dans le domaine palatial du [Root.Monarch.GetTitle], beaucoup dormaient, et ceux qui ne dormaient pas accomplissaient principalement leur travail dans des ténèbres d'une autre nature, des ténèbres préfigurant les actes des jours, des semaines et des années à venir.\n\nEt il y avait une troisième obscurité, moins facile à remarquer. L'obscurité de [Root.Monarch.GetName], alors qu'[Root.Monarch.GetSheHe] arpentait les rues avec confiance, patience, dans l'anonymat. Une obscurité qui rampait et rôdait, courait et restait immobile comme le granit. Une obscurité bien familière à la panthère chasseresse ou au hibou vigilant.\n\nEn temps voulu, l'obscurité trouva l'un des habitants de [Root.Capital.GetName], et le marqua. Un artiste talentueux à la longue barbe et aux cheveux bouclés, travaillant tard dans la nuit sur une sculpture d'Halanna.\n\nEt entre un coup de ciseau et le suivant, l'homme disparut. Bien avant l'aube, [Root.Monarch.GetName] rentra chez lui, [Root.Monarch.GetHerHis] visage inexpressif, [Root.Monarch.GetHerHis] yeux brillants."
 vampire_ruler.19.a:0 "Tout s'est déroulé sans incident"

 vampire_ruler.20.t:0 "La Chasse - Un Courtisan Disparu"
 vampire_ruler.20.d:0 "[Root.Monarch.GetName] a longtemps pensé qu'[Root.Monarch.GetSheHe] pourrait bannir la moitié de [Root.Monarch.GetHerHis] cour et remarquer à peine la différence. En vérité, [Root.Monarch.GetSheHe] a été tenté par l'idée : moitié moins de complots pour gagner de l'influence, moitié moins de stratagèmes stupides, moitié moins de « conseils » non sollicités. Bien que quelques spécimens se distinguent, offrant des conseils utiles, la grande majorité n'a rien à offrir. On ne trouverait nulle part ailleurs dans [Root.GetName] une bande plus égoïste et égocentrique.\n\nAinsi, le [Root.Monarch.GetTitle] se repose tranquillement après avoir réduit leur nombre d'une unité, sachant que peu noteront l'absence, et encore moins s'en soucieront. Le sang du courtisan, qui étanche si merveilleusement la soif de [Root.Monarch.GetName], servira bien mieux que son cerveau ne l'aurait jamais pu."
 vampire_ruler.20.a:0 "Tout s'est déroulé sans incident"

 vampire_ruler.21.t:0 "Les Chasseurs de Vampires se Rapprochent"
 vampire_ruler.21.d:0 "[hunterClosesIn]"
 vampire_ruler.21.a:0 "Ce n'est qu'une question de temps"
 hunter0: "Des rumeurs, venues d'une taverne dans un coin reculé de [Root.GetName]. Quelques silhouettes encapuchonnées, regroupées autour d'une table. Des murmures que tout ne va pas comme il semble à [Root.Capital.GetName], que quelque chose cloche chez le [Root.Monarch.GetTitle]. Qu'une quête se prépare, que des aventuriers sont recherchés.\n\nDes observations, depuis l'une de nos villes frontalières en pleine croissance. Un homme avec des pieux de bois à la ceinture. Une femme couverte de cicatrices, assez pour l'imaginer morte trois fois, mais continuant malgré tout. Un homme avec un feu sauvage, une détermination farouche, dans les yeux.\n\nUne certitude dans l'esprit de [Root.Monarch.GetName], que ce soit sur [Root.Monarch.GetHerHis] trône ou dans [Root.Monarch.GetHerHis] cercueil : ceci n'est que le commencement, pas la fin."
 hunter1: "Des questions, discutées autour de bière et de brandy dans une ville à une demi-douzaine d'heures en carrosse à quatre chevaux du cœur de [Root.GetName]. Quelle est la nourriture préférée de [Root.Monarch.GetName] ? [Root.Monarch.GetHerHis] vin préféré ? Où dort-[Root.Monarch.GetSheHe], quand, et avec qui ?\n\nDes contacts établis avec ceux qui vivent, peinent et meurent dans l'obscurité. Les menuisiers qui fabriquent des cercueils pour la noblesse. Les décorateurs spécialisés dans l'esthétique de la pénombre. Les sans-abri, les dépossédés, les oubliés qui dorment dans les rues de [Root.Capital.GetName], et notent bien qui erre parmi eux, et quand l'un des leurs disparaît.\n\nUn murmure, dans le cœur de [Root.Monarch.GetName]. Un sentiment peu familier, le prédateur devenant proie. Une émotion presque oubliée : la peur."
 hunter2: "Il y a un battement de tambour qui résonne dans [Root.Capital.GetName]. On peut l'entendre dans le rythme des pas des limiers, alors qu'ils rôdent dans les ruelles sombres, cherchant l'odeur pour laquelle ils ont été élevés. On peut l'entendre dans les questions staccato posées à une conseillère à la retraite, des interrogations sur les spécificités de son temps à la cour de [Root.Monarch.GetName]. Et on peut l'entendre dans tous les cœurs qui battent au sein de la cour du [Root.Monarch.GetTitle], boum-boum, boum-boum, boum-boum, et dans le silence du [Root.Monarch.GetHerHis].\n\nIl semble qu'un nouveau soleil commence à se lever sur [Root.GetName], dissipant la brume, chassant les ombres. Et qui sait ce que cette lumière solaire fera lorsqu'elle atteindra [Root.Monarch.GetName] ?"
 hunter3: "Toutes choses ont une fin. Chaque cœur pompe un dernier battement, chaque poumon prend un dernier souffle. Pour [Root.Monarch.GetName], cela s'est produit il y a longtemps. Mais même la non-vie a ses fins à son tour, et l'une d'elles vient de se produire. La grande façade, qui a servi le [Root.Monarch.GetTitle] pendant tant d'années, et l'a si bien aidé à maintenir sa domination sur le peuple [Root.GetAdjective] souvent turbulent, ne pouvait les tenir à distance pour toujours.\n\n[Root.Monarch.GetName] pensait avoir laissé la mortalité, et toutes ses inquiétudes afférentes, derrière lui. Que les craintes du jour où [Root.Monarch.GetHerHis] règne prendrait fin brutalement étaient loin derrière, qu'[Root.Monarch.GetSheHe] n'avait plus à s'inquiéter de s'endormir pour ne jamais se réveiller. Mais maintenant ces pensées sont revenues avec vengeance, et avec elles l'agitation pernicieuse que seuls les insomniaques connaissent. Et chaque jour, alors que le [Root.Monarch.GetTitle] reste éveillé dans [Root.Monarch.GetHerHis] cercueil à se tourner et se retourner, [Root.Monarch.GetSheHe] le sait bien : le pire est encore à venir."

 vampire_ruler.22.t:0 "La Confrontation"
 vampire_ruler.22.d:0 "Alors que [Root.Monarch.GetName] sommeille dans son cercueil, un bruit sourd à l'extérieur le réveille. Il se lève de son cercueil, pour découvrir la porte de son sanctuaire ouverte sur le monde extérieur. Une silhouette vêtue de noir et encapuchonnée entre dans la pièce. Dans ses mains, elle tient une épée, fraîche du sang des gardes. [Root.Monarch.GetName] n'a pas été assez discret dans ses activités vampiriques."
 vampire_ruler.22.a:0 "Parfait, je commençais à avoir faim."
 vampire_ruler.22.b:0 "Nous pouvons certainement trouver un arrangement..."
 vampire_ruler.22.c:0 "Je suis cette terre !"

 vampire_ruler.23.t:0 "La Confrontation - Un Chasseur Occis"
 vampire_ruler.23.d:0 "[Root.Monarch.GetName] est blessé, mais victorieux. Le chasseur a livré un combat féroce, mais n'était pas de taille face au vampire expérimenté. Une feinte habile a suffi pour que le chasseur commette son erreur fatale, [Root.Monarch.GetName] l'achevant prestement d'un coup à la gorge. Le corps du chasseur gît maintenant sur le sol du sanctuaire, son sang vital s'écoulant sur la pierre environnante. Le duel n'a pas été sans coût cependant. Il faudra du temps au [Root.Monarch.GetTitle] pour se remettre de ses blessures. Maintenant que le chasseur est mort, le [Root.Monarch.GetTitle] aura tout le temps nécessaire."
 vampire_ruler.23.a:0 "Enfin débarrassé de ce nuisible"

 vampire_ruler.24.t:0 "La Confrontation - Une Rencontre avec la Mort"
 vampire_ruler.24.d:0 "Il semble que notre monarque ait été très actif ces derniers temps. Que ce soit par manque de contrôle de soi ou par des erreurs suspectes, [Root.Monarch.GetName] a attiré de sérieuses rumeurs sur certaines de ses particularités, des particularités qui attirent les chasseurs. Alors qu'[Root.Monarch.GetSheHe] se prélasse dans la chambre la plus intérieure du palais, savourant les restes d'un serviteur jadis plein de vie, une brise soudaine [Root.Monarch.GetHerHim] tire de [Root.Monarch.GetHerHis] béatitude sanguine.\n\nAlors que [Root.Monarch.GetName] se retourne pour faire face à cette perturbation, la terreur le frappe. À l'entrée se dresse une silhouette, une faux vicieuse en main, son corps paré de robes noires menaçantes et sur son visage : un masque rouge rubis. Le Faucheur est venu.\n\n« L'heure est venue. »\n\n[Root.Monarch.GetName] recule de peur, criant pour appeler les serviteurs, les gardes, n'importe qui. Mais [Root.Monarch.GetSheHe] est seul, le couloir extérieur dépourvu de pas. Et avec un sourire triste, le Faucheur prépare silencieusement son arme et avance vers le [Root.Monarch.GetTitle]."
 vampire_ruler.24.a:0 "Vais-je mourir ?"

 vampire_ruler.25.t:0 "L'Impossible - Triomphe sur la Mort Elle-Même"
 vampire_ruler.25.d:0 "Vaincre un Faucheur est impossible.\n\nLe Faucheur avance vers [Root.Monarch.GetName], ses pas fantomatiques résonnant dans la petite pièce, vers le [Root.Monarch.GetTitle] stupéfait puis, sans avertissement, sa lame fend l'air, plus vite que n'importe quel œil mortel ne peut suivre. [Root.Monarch.GetName] recule instinctivement, glissant sur le sang frais de [Root.Monarch.GetHerHis] repas. Le coup de faux destiné au cou de [Root.Monarch.GetName] s'enfonce plutôt dans [Root.Monarch.GetHerHis] épaule, une blessure non fatale, le coup du Faucheur gâché par pure malchance. Agissant rapidement, [Root.Monarch.GetName] tranche le bras du Faucheur, son arme brisant le silence de la mêlée muette en se fracassant sur le sol de pierre de la chambre. Un regard de choc traverse le visage du Faucheur, avant que [Root.Monarch.GetName] ne saisisse sa tête, [Root.Monarch.GetHerHis] force vampirique l'arrachant de ses épaules.\n\nLe corps du Faucheur tombe mais n'atteint jamais le sol, se transformant en un nuage sombre. Ne reste qu'un masque rouge rubis.\n\n[Root.Monarch.GetName] ne se remettra pas de ses blessures de sitôt, mais il a survécu."
 vampire_ruler.25.a:0 "La chance était de mon côté"

 vampire_ruler.26.t:0 "La Chasse - Une Seconde Ombre"
 vampire_ruler.26.d:0 "[Root.Monarch.GetName] connaît bien les ombres. [Root.Monarch.GetSheHeCap] est intimement familier avec les longues ombres du crépuscule, la façon dont elles se découpent contre la lumière orangée et annoncent l'arrivée de la nuit. [Root.Monarch.GetSheHeCap] a une vaste expérience pour naviguer autour des ombres projetées par une torche vacillante ou une lune brillante, comment passer de l'une à l'autre et presque devenir une ombre [Root.Monarch.GetHerselfHimself]. [Root.Monarch.GetSheHeCap] connaît même la rare ombre d'un humain étendu, éclairé par des bougies tombées (et sait que le sang aspiré hors de lui n'en projette aucune).\n\nC'est parce que le [Root.Monarch.GetTitle] connaît si bien les ombres qu'[Root.Monarch.GetSheHe] sait que quelque chose cloche cette nuit, car [Root.Monarch.GetSheHe] semble avoir une ombre qui n'est pas la [Root.Monarch.GetHerHis]. Aucun paysan curieux ou courtisan fouineur ne devrait pouvoir le suivre, et pourtant... Il n'y a pas d'instincts criant au danger comme un chasseur inspirerait, et pourtant... [Root.Capital.GetName] n'a pas de problème de fantômes, et pourtant...\n\nPeut-être n'était-ce qu'un mirage, peut-être pas. Mais il est clair que [Root.Monarch.GetName] est à la croisée des chemins, et [Root.Monarch.GetHerHis] cercueil pourrait le rappeler chez lui plus tôt cette nuit."
 vampire_ruler.26.a:0 "Ce n'était rien"
 vampire_ruler.26.b:0 "C'est trop risqué"

 vampire_ruler.27.t:0 "La Chasse - Poursuivi par les Gardes"
 vampire_ruler.27.d:0 "La garde de nuit de [Root.Capital.GetName] a longtemps été considérée comme le lot le plus pitoyable qu'on puisse trouver dans la ville. [Root.Monarch.GetName] se souvient encore du ricanement morose de l'un de [Root.Monarch.GetHerHis] conseillers lorsqu'il détailla leur composition lors d'une récente réunion sur le budget de la défense : un ivrogne à la tête, des subordonnés incluant un lourdaud obèse, un vaurien boutonneux (qui, selon les rumeurs, pourrait même ne pas être humain), et un grand rouquin persuadé d'être un nain.\n\nMais cette nuit, ils ne semblent plus si risibles. Juste au moment où [Root.Monarch.GetName] avait traîné [Root.Monarch.GetHerHis] victime dans une ruelle et commencé à se nourrir, au moment le plus vulnérable, des torches sont apparues à l'entrée de la ruelle. Et l'équipage hétéroclite d'hommes en uniforme qu'elle illuminait a déclenché un sentiment très inhabituel chez le prédateur : la peur."
 vampire_ruler.27.a:0 "Je dois m'enfuir"

 vampire_ruler.28.t:0 "La Chasse - Une Piètre Chasse"
 vampire_ruler.28.d:0 "Parfois, une pomme impeccable a quand même le goût du ver. Parfois, un millésime immaculé de Rouge de Rubenaire est altéré et vinaigré. Et parfois, même une chasse réussie semble insatisfaisante.\n\nPeut-être y avait-il quelque chose qui n'allait pas avec le sang de la victime de [Root.Monarch.GetName] cette nuit, peut-être manquait-il une pièce ineffable du processus. Quelle qu'en soit la cause, cette nuit le sang repose mal dans l'estomac de notre [Root.Monarch.GetTitle], et [Root.Monarch.GetSheHe] sait que demain commencera avec une gueule de bois (vampirique)."
 vampire_ruler.28.a:0 "Au moins ma faim a été apaisée."

 vampire_ruler.29.t:0 "La Chasse - Attaqué par des Vagabonds"
 vampire_ruler.29.d:0 "La croissance récente de [Root.Capital.GetName] a attiré des gens de tout le pays venus y chercher leur avenir. Parmi eux se trouvent malheureusement de nombreux individus peu recommandables, ternissant le nom de [Root.GetName] et l'honneur de [Root.Monarch.GetName]. Tant qu'ils limitaient leur prédation aux personnes sans importance, cependant, ils ne méritaient pas l'attention nécessaire pour les maîtriser.\n\nMais cela a changé cette nuit. Apparemment, une silhouette encapuchonnée errant dans les ruelles bien après minuit apparaît à beaucoup comme une « personne sans importance », et un trio de voyous, arborant de curieux masques rouges, vient de s'approcher nonchalamment de [Root.Monarch.GetName] alors que la chasse battait son plein. Le plus grand du lot fait un geste avec sa dague vers le [Root.Monarch.GetTitle], exigeant tout [Root.Monarch.GetHerHis] or, tandis que le plus massif semble prêt à empoigner. Que doit faire [Root.Monarch.GetName] ?"
 vampire_ruler.29.d2:0 "La croissance récente de [Root.Capital.GetName] a attiré des gens de tout le pays venus y chercher leur avenir. Parmi eux se trouvent malheureusement de nombreux individus peu recommandables, ternissant le nom de [Root.GetName] et l'honneur de [Root.Monarch.GetName]. Tant qu'ils limitaient leur prédation aux personnes sans importance, cependant, ils ne méritaient pas l'attention nécessaire pour les maîtriser.\n\nMais cela a changé cette nuit. Apparemment, une silhouette encapuchonnée errant dans les ruelles bien après minuit apparaît à beaucoup comme une « personne sans importance », et un trio de voyous, arborant de curieux masques rouges, vient de s'approcher nonchalamment de [Root.Monarch.GetName] alors que la chasse battait son plein. Le plus grand du lot fait un geste avec son steak congelé vers le [Root.Monarch.GetTitle], exigeant tout [Root.Monarch.GetHerHis] or, tandis que le plus massif semble prêt à empoigner. Que doit faire [Root.Monarch.GetName] ?"
 vampire_ruler.29.a:0 "Il vaut mieux leur donner une leçon"
 vampire_ruler.29.b:0 "Je ne peux pas prendre ce risque"

 vampire_ruler.30.t:0 "La Chasse - Bain de Sang à la Cour"
 vampire_ruler.30.d:0 "De nombreux scandales hantent les halls de la cour à [Root.Capital.GetName]. Il y a l'histoire du [Root.Monarch.GetTitle] qui s'est transformé en grenouille en pratiquant de nouvelles magies, assurée de déclencher les rires à tout banquet ou bal. Il y a l'histoire du cruel [Root.Consort.GetTitle], qui a personnellement conçu une variété de chambres « spéciales » depuis scellées des donjons principaux, qui fait frissonner les auditeurs même en plein été. Et maintenant, une nouvelle histoire s'ajoutera à la liste, même si on n'en parle que tard dans la nuit (ou en plein soleil), à voix basse : le festin de [Root.Monarch.GetName].\n\nCar aucun courtisan, aucun serviteur, aucun conseiller, n'oubliera de sitôt le spectacle qui les attendait ce matin. La grande salle ruisselait de sang rouge, comme si tout le vin d'un banquet avait été renversé sur le sol. Des cadavres d'une pâleur spectrale étaient éparpillés partout, comme des raisins dans un gâteau. Et en son centre : l'architecte du massacre, son chef, son créateur, [Root.Monarch.GetName]."
 vampire_ruler.30.a:0 "Je devrais me modérer..."
 vampire_ruler.30.b:0 "... mais j'ai tellement faim"

 vampire_ruler.31.t:0 "La Confrontation - Le Dernier Clou"
 vampire_ruler.31.d:0 "Malgré une résistance acharnée, [Root.Monarch.GetName] n'est pas de taille face au chasseur de vampires expérimenté. Bien qu'[Root.Monarch.GetHerHim] se soit battu vaillamment, il fut bientôt submergé par le chasseur. La dernière chose qu'[Root.Monarch.GetSheHe] voit alors que ses yeux se ferment lentement est le Chasseur fracassant le cercueil, la grâce salvatrice de [Root.Monarch.GetName], en morceaux. [Root.Monarch.GetName] laisse échapper un dernier souffle tremblant, sachant qu'il ne reviendra pas.\n\nMalgré ses tentatives, [Root.Monarch.GetName] a fini par connaître l'étreinte de la mort. Peut-être, enfin, trouvera-t-il la paix qu'il n'a jamais eue de son vivant."
 vampire_ruler.31.a:0 "Mis au repos, pour toujours"

 vampire_ruler.32.t:0 "La Confrontation - Le Dernier Clou"
 vampire_ruler.32.d:0 "Nettoyant le sang du défunt [Root.Monarch.GetTitle] de sa lame de faux, le faucheur jette un dernier regard autour de la pièce. Il regarde le cadavre d'un serviteur tué avec un regard affligé et lentement, sereinement, se dirige vers cette forme mutilée. Il dépose sa faux, berce le corps. Et puis tous deux disparaissent.\n\nCe qui reste de [Root.Monarch.GetName] sera découvert au matin, mais d'ici là il sera bien trop tard. Nul ne peut échapper à la mort."
 vampire_ruler.32.a:0 "Non..."

 vampire_ruler.33.t:0 "L'Héritier Vampirique Revient"
 vampire_ruler.33.d:0 "Le sang coule sans cesse dans le corps. La nuit suit toujours le jour. Et, semble-t-il, un Vampire régnera toujours sur [Root.GetName].\n\nCes dernières années, l'ancien [Root.Monarch.GetTitle] sentait sa chair morte-vivante se faner, son âme s'éloigner de ce plan. Et ainsi il a façonné l'un de ses protégés en un digne héritier, lui offrant le Don du Sang, et lui enseignant les voies de la Chasse et les rituels de la Mascarade. Peut-être cherchait-il encore une autre forme d'immortalité approximative.\n\nMaintenant, à la mort de l'ancien Vampire, le rejeton est arrivé à [Root.Capital.GetName]. Sa revendication est triple : le sceau du royaume qui lui a été confié, les dernières volontés et testament de son prédécesseur, et la détermination sanglante dans son œil.\n\nTous ne souhaiteraient pas voir la succession se dérouler ainsi, cependant. Ils n'osent bien sûr défier l'ancien [Root.Monarch.GetTitle] que maintenant, après qu'il a quitté ce royaume, et même alors ils surveillent leurs arrières. Mais l'ascension de l'héritier présomptif pourrait ne pas être aussi facile qu'il y paraît."
 vampire_ruler.33.a:0 "Ma première tâche sera de rappeler à ces imbéciles comment les choses fonctionnent."
 vampire_ruler.33.b:0 "Prenons cette étincelle d'espoir, et attisons-la en un brasier qui bannira les ténèbres des dernières décennies !"

 vampire_ruler.99.t:0 "Le Vampire Revient"
 vampire_ruler.99.d:0 "Bien que les vampires ne soient pas pleinement immortels, en tuer un n'est pas tâche aisée. Lorsqu'ils subissent ce qui serait normalement une blessure mortelle, les vampires entrent dans une forme de brume, se reconstituant à leur cercueil et retrouvant leur forme mortelle.\n\n§B(Un nouvel héritier sera créé, mais cet héritier est en fait votre vampire ressuscité. Profitez de ce moment pour renommer votre vampire si nécessaire)§!"
 vampire_ruler.99.a:0 "Et ainsi notre [Root.Monarch.GetTitle] s'est relevé."

 vampire_ruler.100.t:0 "Les Envahisseurs Cherchent le Cercueil"
 vampire_ruler.100.d:0 "Notre capitale, [Root.GetName], a été occupée. Des chasseurs de vampires recherchent certainement notre cercueil afin de le détruire."
 vampire_ruler.100.a:0 "Nous devons les arrêter rapidement !"
 vampire_ruler.100.b:0 "Nos protections les ralentiront, mais nous devons nous hâter !"

 vampire_ruler.101.t:0 "Les Occupants Trouvent le Cercueil"
 vampire_ruler.101.d:0 "Événement masqué résultant de vampire_ruler.100"
 vampire_ruler.101.a:0 "Cercueil Trouvé"

 vampire_ruler.102.t:0 "La Recherche du Cercueil Commence"
 vampire_ruler.102.d:0 "[From.Owner.GetName] est dirigé par un vampire et nous avons occupé sa capitale. Un célèbre chasseur de monstres a demandé notre aide pour chercher le cercueil de [From.Owner.Monarch.GetName]."
 vampire_ruler.102.a:0 "Nous devons tenir [From.GetName] !"

 vampire_ruler.103.t:0 "Un Monstre Détruit"
 vampire_ruler.103.d:0 "Nous avons trouvé le cœur corrompu du mal qui nous afflige. Le cercueil du vampire est maintenant entre nos mains. Avec la destruction de ce cercueil, nous pouvons ôter l'immortalité au vampire [From.Owner.Monarch.GetName] et le détruire une fois pour toutes, débarrassant à jamais notre monde de la malédiction de son influence."
 vampire_ruler.103.a:0 "Le mal ne survit jamais au bien."