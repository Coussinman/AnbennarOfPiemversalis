 ebonsteel_events.1.t:0 "Focalisation Runique d'Acier Ébène"
 ebonsteel_events.1.d:0 "De la terre une roche noire sans particularité, du feu un métal sombre comme la nuit, et par la parole prononcée une véritable identité révélée. Ce qui était jadis ordinaire est maintenant puissant. Le véritable pouvoir de l'Acier Ébène est de résister à l'échec : les coups entrants sont bloqués par le désir inné du métal de rester intact. Nombre de héros dans l'histoire gérудienne ont juré par une plaque d'Acier Ébène pour leur résilience. Pourtant il existe une autre identité encore inexprimée dans l'Acier Ébène.\n\nEn des temps anciens, l'Acier Ébène était forgé individuellement, chaque pièce recevant un récit différent pour l'imprégner d'un pouvoir unique. La redécouverte moderne du forgeage de l'Acier Ébène a perdu cette individualité, dépendant d'une liste fixe de litanies à réciter pour déverrouiller ses propriétés magiques. Et bien qu'il puisse être possible de retrouver la voie de nos ancêtres une fois encore, ce qui a été accompli maintenant est une sorte de compromis utile. Certaines des propriétés latentes de l'Acier Ébène peuvent être réveillées durant leur forgeage avec un nouveau mélange de récits récités. Cependant, ce réveil de propriétés a un étrange effet secondaire : tous les armements d'Acier Ébène déjà forgés en masse avec nos chants scaldiques déjà établis seront écrasés par les nouveaux, et dès lors resteront obstinément immuables dans leur identité.\n\nLes anciennes identités qui ont refait surface sont vieilles, mais ont changé au fil des années à leur propre manière. Le Feu Scaldique fut jadis imprégné dans les armes pour donner le don de flamme ardente à chaque coup, mais peut maintenant être délivré à distance avec des armes à feu d'Acier Ébène. Le Feu qui soutient la Gérudie contre l'hiver sans fin peut maintenant non seulement brûler nos ennemis, mais aussi nous protéger de leurs propres projectiles, les consumant en braises. L'Essence d'Einherjar puise dans le pouvoir de tous nos héros passés, pas seulement nos ancêtres immédiats. Tandis qu'il est renforcé par les Einherjar, chaque balancement est magistralement balancé et chaque coup absorbé par guidance surnaturelle... et avec chaque blessure infligée par l'arme d'Acier Ébène, l'effroi croît dans l'esprit de l'ennemi avec le courroux de siècles de héros gérудiens."
 ebonsteel_events.1.a:0 "Enchantons nos armées d'Acier Ébène avec le pouvoir du Feu Scaldique !"
 ebonsteel_events.1.b:0 "La guidance de nos ancêtres sera écoutée : invoquons l'Essence d'Einherjar !"
 ebonsteel_events.2.t:0 "Infanterie d'Acier Ébène"
 ebonsteel_events.2.d:0 "Le passé est quelque chose que l'on contemple beaucoup en Gérudie : nostalgie pour des temps meilleurs, quand nous étions craints à travers les mers d'Halann, quand chaque littoral pouvait affronter nos Écumeurs et des royaumes entiers forgés à notre image par leur faiblesse. Nos terres froides et maigres forgèrent la force, et récompensèrent nos ancêtres avec l'Acier Ébène. Ce métal mythique, d'abord un noir banal avec le plus faible éclat pourpre, fut reforgé et éveillé avec le pouvoir des chants scaldiques. Nombre de nos plus grands héros manièrent de telles armes et armures d'Acier Ébène, pourtant même en leur temps les secrets du forgeage de l'Acier Ébène étaient presque perdus. Jadis les forges d'Urviksten et Blodfjell rougeoyaient et résonnaient de chants, pourtant nos ancêtres perdirent leur plus grand don à travers les luttes et la honte. L'art de forger l'Acier Ébène, et de déverrouiller son véritable pouvoir, a été oublié."
 ebonsteel_events.2.a:0 "Peut-être qu'un jour l'héritage de nos ancêtres sera restauré..."
 ebonsteel_system_desc_1_tt:0 "Les provinces d'Acier Ébène augmentent votre limite de forces d'§GInfanterie d'Acier Ébène§! de §Y1,5§! chaque fois que vous élargissez l'infrastructure. Construire une §YTour de Mage§! dans ces provinces augmente cela de §Y2§! supplémentaires. Vous ne pouvez recruter de nouvelles unités d'§GInfanterie d'Acier Ébène§! que lorsque vous avez déverrouillé les secrets du §YForgeage d'Acier Ébène§!."
 ebonsteel_system_desc_2_tt:0 "Vous pouvez élargir votre limite de forces d'§GInfanterie d'Acier Ébène§! en utilisant l'§YInterface de Province§! des provinces d'Acier Ébène. Construire une §YTour de Mage§! dans ces provinces augmente cela de §Y2§! supplémentaires. Vous ne pouvez recruter de nouvelles unités d'§GInfanterie d'Acier Ébène§! que lorsque vous avez déverrouillé les secrets du §YForgeage d'Acier Ébène§!."
 enhance_ebonsteel_regiments_title:0 "Renforcer les Runes d'Acier Ébène"
 enhance_ebonsteel_regiments_desc:0 "Bien que l'art de forger l'Acier Ébène ait été pratiqué à travers la Gérudie depuis sa restauration, jusqu'à présent la magie enchantée sur le métal n'a été que rudimentaire comparée aux merveilles des anciens. Il est à prévoir que l'Acier Ébène forgé pour nos armées serait de qualité inférieure à celle des armes magistralement ouvragées de légende. Mais que se passerait-il si nous pouvions déverrouiller les plus grandes propriétés magiques répulsives en bien moins de temps et d'effort que ce qui est requis pour un chef-d'œuvre ? Que ce soit par Scalde, artificier, érudit, ou même sorcière folle, aucune dépense ne devrait être épargnée pour déverrouiller le véritable potentiel de l'Acier Ébène !"
 rediscover_ebonforging_title:0 "Redécouvrir l'Art de l'Acier Ébène"
 rediscover_ebonforging_desc:0 "Depuis qu'Elkaesal recouvrit la Gérudie de l'hiver mettant fin à tout de l'Ère du Givre, l'art de forger l'Acier Ébène a été totalement dormant. Un métal sombre avec un léger éclat du pourpre le plus profond, l'Acier Ébène était admiré par nos ancêtres pour sa merveilleuse propriété : une barrière magique pouvant repousser les objets se déplaçant rapidement avec aisance ! Jadis la grande Forge d'Acier Ébène à Urviksten brûlait ardemment, mais fut éteinte par la trahison du dernier grand Ébongivre, Urvic, à son retour. À Blodfjell, les anciennes forges d'Acier Ébène demeurent, mais n'ont pas vu de forgeron capable de les opérer depuis des siècles.\n\nJusqu'à présent. Les Scaldes ont médité sur les origines des artefacts d'Acier Ébène et leurs propriétés magiques, et sont parvenus à une conclusion : ils furent ouvragés avec la conjonction du maître forgeron et du scalde travaillant ensemble. Les Scaldes ont préparé une liste de chants et litanies pour travailler le métal, cependant ce n'est pas seulement leur contribution qui est nécessaire. Les érudits ont étudié les montagnes traîtresses et vallées escarpées de Gérudie, cherchant où l'Acier Ébène pourrait être trouvé. Si nous fournissons aux scaldes et érudits les fonds, nous pourrions trouver un renouveau pratique de l'art du Forgeage d'Ébon !"
 urviksten_ebonforge:0 "La Forge d'Acier Ébène"
 urviksten_ebonforge_desc:0 "La légendaire Forge d'Ébon, cœur de la production d'Acier Ébène antique. D'immenses quantités d'Acier Ébène jaillissaient jadis des feux de cette forge.\n\n[Root.GetEbonsteelDlcStatus]"
 small_ebonsteel_forge:0 "Petite Forge d'Acier Ébène"
 small_ebonsteel_forge_desc:0 "Une forge d'Acier Ébène mineure : des quantités minimales d'Acier Ébène peuvent être ouvragées ici.\n\n[Root.GetEbonsteelDlcStatus]"
 medium_ebonsteel_forge:0 "Forge d'Acier Ébène Moyenne"
 medium_ebonsteel_forge_desc:0 "Une forge d'Acier Ébène majeure, beaucoup plus d'Acier Ébène peut être forgé ici, du fait de plus de minéraux disponibles dans les gisements régionaux.\n\n[Root.GetEbonsteelDlcStatus]"
 isolation_ebonsteel:0 "Veines d'Acier Ébène Isolées"
 isolation_ebonsteel_desc:0 "Les veines de fer dans cette montagne peuvent potentiellement être utilisées par nos forgerons et scaldes pour créer de l'Acier Ébène.\n\n[Root.GetEbonsteelDlcStatus]"
 mage_tower_ebonforge:0 "Tour de Scalde de la Forge d'Ébon"
 mage_tower_ebonforge_desc:0 "Une Tour de Scalde, installation régionale de formation et d'éducation pour le développement de la magie scaldique requise pour créer l'Acier Ébène.\n\nConstruire une §YTour de Mage§! dans cette province augmentera la limite de forces d'Acier Ébène de §Y1§!."
 ebonforging_rediscovered:0 "Forgeage d'Ébène Redécouvert"
 ebonforging_rediscovered_desc:0 "L'art de forger l'Acier Ébène a été restauré. Une armure pouvant dévier les projectiles avec seulement un faible flou magique a permis une fusion de tactiques anciennes et nouvelles sur le champ de bataille. Revêtus d'Acier Ébène protecteur, des guerriers puissants et imposants peuvent manier hache et mousquet avec une efficacité égale : un adversaire terrifiant."
 ebonsteel_offensive_focus:0 "Focalisation Runique d'Acier Ébène : Feu Scaldique"
 ebonsteel_offensive_focus_desc:0 "Le Feu Scaldique fut jadis imprégné dans les armes pour donner le don de flamme ardente à chaque coup, mais peut maintenant être délivré à distance sur des armes à feu d'Acier Ébène. Le Feu qui soutient la Gérudie contre l'hiver sans fin peut non seulement brûler nos ennemis, mais aussi nous protéger de leurs propres projectiles, les consumant en braises."
 ebonsteel_defensive_focus:0 "Focalisation Runique d'Acier Ébène : Essence d'Einherjar"
 ebonsteel_defensive_focus_desc:0 "L'Essence d'Einherjar puise dans le pouvoir de tous nos héros passés, pas seulement nos ancêtres immédiats. Tandis qu'il est renforcé par les Einherjar, chaque balancement est magistralement balancé et chaque coup absorbé par guidance surnaturelle... et avec chaque blessure infligée par l'arme d'Acier Ébène, l'effroi croît dans l'esprit de l'ennemi avec le courroux de siècles de héros gérudiens."
 ebonsteel_stockpiles:0 "Réserves d'Ébène"
 ebonsteel_stockpiles_desc:0 "Cette nation possède une réserve d'armures d'Ébène anciennes, qu'elle continue d'utiliser sur le champ de bataille."
 ebonsteel_provinces: "Acier Ébène"
 ebonsteel_leviathan_dlc_no:0 "Vous pouvez utiliser l'§YInterface de Province§! pour augmenter la limite de forces d'Acier Ébène dans cette province."
 ebonsteel_leviathan_dlc_yes:0 "Élargir l'Infrastructure dans cette province augmentera la limite de forces d'Acier Ébène de §Y1,5§!."
 ebonsteel_expand_infra_button_tt:0 "Élargir l'Infrastructure d'Acier Ébène"
 ebonsteel_max_expand_infra_tt:0 "Vous avez atteint le niveau maximum d'Infrastructure d'Acier Ébène pour cette province."
