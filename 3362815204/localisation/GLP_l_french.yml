 glp_gm_events.EVTNAME5:0 "Une opportunité §Gverte§!"
 glp_gm_events.EVTDESC5:0 "[Root.Monarch.GetTitle] ! Le commerce d'esclaves est en plein essor après la victoire de la Marée Verte. L'esclavage a été décrété comme châtiment principal pour les orques. Les esclaves affluent sur les marchés, c'est l'occasion parfaite d'avoir de la main-d'œuvre bon marché ou un esclave orque de luxe à la maison pour presque rien !"
 glp_gm_events.EVTSEPCULATIONA01:0 "Rejoignons ce commerce lucratif !"
 glp_gm_events.EVTSEPCULATIONA02:0 "Je ne veux pas participer à ce commerce horrible"

 glp_gm_events.EVTNAME6:0 "Les conséquences de l'esclavage orque"
 glp_gm_events.EVTDESC6:0 "Après une expansion intensive de l'Escann, l'abondance orque n'est plus ! Nous avons trop spéculé sur la surabondance des orques. Maintenant tout le monde se bat pour les derniers orques disponibles sur le marché comme si leur vie en dépendait."
 glp_gm_events.EVTSEPCULATIONB01:0 "Quel désastre"
 glp_gm_events.EVTSEPCULATIONB02:0 "NOUS SOMMES RICHES ! NOUS SOMMES RICHES !!!"

 glp_gm_events.EVTNAME7:0 "Les conséquences de l'esclavage orque"
 glp_gm_events.EVTDESC7:0 "Après une expansion intensive de l'Escann, l'abondance orque n'est plus ! Nous avons fait le choix de ne pas dépendre de ce commerce horrible. Maintenant nous voyons d'autres pays avoir de gros problèmes avec la sur-dépendance à l'esclavage orque."
 glp_gm_events.EVTSEPCULATIONB03:0 "Nous pouvons nous moquer d'eux !"

 glp_gm_events.EVTNAME8:0 "Une explosion retentissante"
 glp_gm_events.EVTDESC8:0 "Le volcan de la Côte-du-Dragon entre en éruption avec une force cataclysmique, couvrant le ciel d'épais nuages gris et faisant pleuvoir des cendres sur toute la contrée. Le soleil disparaît derrière un voile de fumée."
 glp_gm_events.EVTOPTA8:0 "Le Ciel Cendré est de retour !"

 glp_gm_events.EVTNAME9:0 "Conséquences de l'éruption de la Côte-du-Dragon"
 glp_gm_events.EVTDESC9:0 "Dix ans se sont écoulés depuis la grande éruption. Le ciel reste d'un gris terne, les récoltes peinent et une génération a grandi sans jamais voir un été clair."
 glp_gm_events.EVTOPTA9:0 "Les cendres tombent encore..."

 glp_gm_events.EVTNAME10:0 "Vingt ans de cendres"
 glp_gm_events.EVTDESC10:0 "Deux décennies sous le ciel cendré ont endurci notre peuple. L'air est encore épais, les hivers plus longs et la famine rôde aux confins du royaume."
 glp_gm_events.EVTOPTA10:0 "Nous endurons."

 glp_gm_events.EVTNAME11:0 "Une génération assombrie"
 glp_gm_events.EVTDESC11:0 "Trente ans après l'éruption, peu se souviennent du monde tel qu'il était. Les enfants naissent sous des cieux gris et les récits de cieux bleus ressemblent à des mythes."
 glp_gm_events.EVTOPTA11:0 "Le ciel a-t-il jamais été bleu ?"

 glp_gm_events.EVTNAME12:0 "Quarante ans sans soleil"
 glp_gm_events.EVTDESC12:0 "Quatre décennies se sont écoulées. Les cultures se sont adaptées, les cités perdurent, mais le soleil reste un pâle souvenir derrière d'interminables nuages de cendres."
 glp_gm_events.EVTOPTA12:0 "Nous avons appris à vivre dans l'ombre."

 glp_gm_events.EVTNAME13:0 "Le ciel cendré se dissipe"
 glp_gm_events.EVTDESC13:0 "Cinquante ans après l'éruption, les nuages commencent enfin à s'amincir. Des rayons de soleil percent le voile gris. Pour la première fois en un demi-siècle, le ciel se souvient de sa couleur."
 glp_gm_events.EVTOPTA13:0 "Le soleil revient."





