 glp_save_edit_events.EVTFIXINGNUKE:0 "Bombarder cette foutue province"
 MJ_nuke_tt:0 "§RVous choisissez la violence pour punir un comportement insensé. Cette action rasera cette province.§!"
 glp_save_edit_events_NUKE.EVTNAME1:0 "La dernière réflexion"
 glp_save_edit_events_NUKE.EVTDESC1:0 "Appuyer sur ce bouton est assurément un lourd fardeau. Mais si c'est ce que vous choisissez, voici les conséquences, inscrites sur un papier juste au-dessus du bouton : \n\n§RLa province de [MJ_nuke.GetName] reviendra à 3 de développement.§! \n§RLa province de [MJ_nuke.GetName] perdra tous ses bâtiments.§! \n§RCela tuera toutes les troupes sur cette case§!"
 glp_save_edit_events_NUKE.EVTOPTZZ1:0 "Annuler"
 glp_save_edit_events_NUKE.EVTOPTA01:0 "Vous savez quoi ? Envoyez juste un message d'avertissement."
 glp_save_edit_events_NUKE.EVTOPTA02:0 "§RFAITES-LE !§!"
 glp_save_edit_events_NUKEWARNING.EVTNAME1:0 "§RUne très mauvaise nouvelle !§!"
 glp_save_edit_events_NUKEWARNING.EVTDESC1:0 "Mon [Root.Monarch.GetTitle] ! Les Maîtres du Jeu Trolls Infernaux nous ont envoyé un message très inquiétant : \n\nNous, les Dieux bienveillants parmi les hommes, avons choisi de ne pas raser la cité de [MJ_nuke.GetName]. Mais soyez prévenus, la prochaine fois, nous ne serons pas si indulgents. Voici la liste de ce qui arrivera si vous osez mal vous comporter : \n\n \n\n§RLa province de [MJ_nuke.GetName] reviendra à 3 de développement.§! \n§RLa province de [MJ_nuke.GetName] perdra tous ses bâtiments.§! \n§RCela tuera toutes les troupes sur cette case§!\n\nQue pouvons-nous faire contre une telle menace, mon [Root.Monarch.GetTitle] ?"
 glp_save_edit_events_NUKEWARNING.EVTOPTA01:0 "Cieux cendrés ?! Je dois signaler cette menace au monde !"
 glp_save_edit_events_NUKEWARNING.EVTOPTA02:0 "Bah ! Des menaces en l'air. Je ne me laisserai pas effrayer par cela."
 glp_save_edit_events_NUKEWARNING.EVTOPTA03:0 "... Ne rien dire ..."
 glp_save_edit_events_NUKEEXPLODED.EVTNAME1:0 "§RBOOOOOOOOOOOOOOOOOOOOOOOOOOOM !§!"
 glp_save_edit_events_NUKEEXPLODED.EVTDESC1:0 "Sans aucun avertissement, une gigantesque explosion se fait entendre à travers tout le pays. Vous n'avez jamais vu cela de toute votre vie. Le peuple, l'armée, les bâtiments, tout a disparu. La province de [MJ_nuke.GetName] a été rasée."
 glp_save_edit_events_NUKEEXPLODED.EVTOPTA01:0 "NOOOOOOOOOOOOOOOOOOOOOOOOOOOOON !"
 glp_GM_nation_buffs:0 "Nation MJ"

