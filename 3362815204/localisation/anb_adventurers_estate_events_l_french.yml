l_french:
 adventurers_estate_events.1.t:0 "Montée en puissance des aventuriers"
 adventurers_estate_events.1.d:0 "Le statut des $ESTATE_ADVENTURERS$ ne repose ni sur les privilèges des $ESTATE_NOBLES$ ou de l'$ESTATE_CHURCH$, ni sur la richesse des $ESTATE_BURGHERS$. Ils ont dû forger eux-mêmes leur fortune par la bravoure et le talent au combat. En règle générale cependant, cela leur a fort bien réussi ces derniers temps. Si leur activité n'est pas des plus prestigieuses, elle constitue à bien des égards la colonne vertébrale de notre économie, et grâce à leur contrôle sur les moyens de production, les $ESTATE_ADVENTURERS$ ont réussi à accroître leur pouvoir sur notre pays."
 adventurers_estate_events.1.a:0 "Soit."
 EST_VAL_ADVENTURERS_ADVANCE:0 "Montée de l'influence des aventuriers : §Y$VAL$%§!"
 adventurers_estate_events.2.t:0 "Déclin de l'influence des aventuriers"
 adventurers_estate_events.2.d:0 "Sans les anciens privilèges et lignages, ni la puissance économique brute des autres factions, le statut et l'influence des $ESTATE_ADVENTURERS$ sont rarement aussi assurés que ceux des gens nés dans le pouvoir. Dernièrement, une combinaison de quêtes échouées et d'ambitions politiques mal orientées a entraîné une perte de pouvoir et d'influence pour les $ESTATE_ADVENTURERS$ de [Root.GetName]."
 adventurers_estate_events.2.a:0 "Soit."
 EST_VAL_ADVENTURERS_DECLINES:0 "Déclin de l'influence des aventuriers : §Y$VAL$%§!"
 adventurers_estate_events.3.t:0 "Commissions militaires"
 adventurers_estate_events.3.d:0 "Il ne fait aucun doute que les $ESTATE_ADVENTURERS$ vivent une existence bien plus riche que le citoyen ordinaire, ayant combattu une multitude d'ennemis sur tous types de terrains. Certains proposent d'intégrer des $ESTATE_ADVENTURERS$ comme officiers et commandants au sein de nos forces pour tirer parti de leur vaste expérience, mais d'autres avertissent que leur formation martiale irrégulière pourrait nuire au professionnalisme de notre armée."
 adventurers_estate_events.3.a:0 "Aucun noble ne servira sous les ordres d'un roturier."
 adventurers_estate_events.3.b:0 "Nous promouvons au mérite."
 EST_VAL_NO_COMMISSIONS_FOR_ADVENTURERS:0 "Les $ESTATE_ADVENTURERS$ ne peuvent devenir officiers commissionnés : §Y$VAL$%§!"
 EST_VAL_COMMISSIONS_FOR_ADVENTURERS:0 "Les $ESTATE_ADVENTURERS$ peuvent devenir officiers commissionnés : §Y$VAL$%§!"
 adventurers_estate_events.4.t:0 "Des paysans partent à l'aventure"
 adventurers_estate_events.4.d:0 "Les $ESTATE_NOBLES$ se plaignent qu'un nombre croissant de serfs désertent les foyers sûrs qui leur sont fournis pour chercher fortune en tant qu'$ESTATE_ADVENTURERS$. Ils estiment que nous en sommes responsables, ayant laissé les $ESTATE_ADVENTURERS$ devenir trop puissants, ce qui incite les serfs à abandonner leurs maîtres légitimes.\n\nLes représentants des grandes familles exigent à présent que nous limitions le pouvoir des $ESTATE_ADVENTURERS$ afin que l'ordre naturel des choses soit rétabli."
 adventurers_estate_events.4.a:0 "Ces serfs doivent être ramenés."
 adventurers_estate_events.4.b:0 "Nul ne peut résister à l'appel de l'aventure !"
 adventurers_estate_events.5.t:0 "Les $ESTATE_BURGHERS$ refusent de payer les $ESTATE_ADVENTURERS$"
 adventurers_estate_events.5.d:0 "Nous avons officiellement reçu la pétition d'un aventurier de renom : un puissant marchand refuse de le payer pour une quête accomplie. Un représentant du marchand affirme que l'aventurier a effectué un travail insuffisant, et qu'en vertu du contrat signé... il n'est pas tenu de payer si le commanditaire juge le résultat insatisfaisant !"
 adventurers_estate_events.5.a:0 "Une quête est une quête. Forcer le marchand à payer."
 adventurers_estate_events.5.b:0 "Si les aventuriers ont mal travaillé, qu'ils en subissent les conséquences."
 EST_VAL_SUPPORTED_ADVENTURERS:0 "A soutenu les aventuriers contre les marchands : §Y$VAL$%§!"
 EST_VAL_SUPPORTED_BURGHERS_VS_ADVENTURERS:0 "A soutenu les marchands contre les aventuriers : §Y$VAL$%§!"
 adventurers_estate_events.6.t:0 "Les $ESTATE_ADVENTURERS$ insultent l'$ESTATE_CHURCH$"
 adventurers_estate_events.6.d:0 "Les $ESTATE_ADVENTURERS$ sont notoirement un groupe aux opinions bien tranchées, particulièrement envers les formes d'autorité et de religion. On nous a rapporté un incident au cours duquel un aventurier renommé a insulté un dignitaire de notre foi !\n\nLes aventuriers ont depuis été capturés par l'$ESTATE_CHURCH$, qui exige à présent que nous réglions le sort de ces insolents."
 adventurers_estate_events.6.a:0 "Punir les $ESTATE_ADVENTURERS$."
 adventurers_estate_events.6.b:0 "Des mots ne sont que des mots ; relâchez-les."
 EST_VAL_UNDERMINED_BY_ADVENTURERS:0 "Autorité sapée par les aventuriers : §Y$VAL$%§!"
 adventurers_estate_events.7.t:0 "Les $ESTATE_ADVENTURERS$ refusent de remettre un artefact aux $ESTATE_ARTIFICERS$"
 adventurers_estate_events.7.d:0 "Les $ESTATE_ARTIFICERS$ sont venus à nous en panique, déclarant que les $ESTATE_ADVENTURERS$ engagés pour récupérer des artefacts se sont enfuis avec ! Après avoir retrouvé les aventuriers, ceux-ci affirment que l'artefact doit être préservé, proclamant qu'il a sa place dans un musée, et non qu'il soit détruit et exploité !"
 adventurers_estate_events.7.a:0 "Sa place est dans un musée !"
 adventurers_estate_events.7.b:0 "Saisir l'artefact par la force."
 EST_VAL_EXPLOITING_ARTIFACTS:0 "Exploitation d'artefacts d'aventuriers : §Y$VAL$%§!"
 adventurers_estate_events.8.t:0 "Des aventuriers engagés par l'État nous font honte"
 adventurers_estate_events.8.d:0 "Un groupe d'aventuriers que nous avions engagés pour une quête a apparemment causé un grand embarras au nom [Root.GetAdjective] !"
 adventurers_estate_events.8.a:0 "Hélas..."
 adventurers_estate_events.8.b:0 "Tenter de sauver la face."
 adventurers_estate_events.9.t:0 "Des aventuriers retraités achètent des terres"
 adventurers_estate_events.9.d:0 "Les $ESTATE_ADVENTURERS$ vivent rarement vieux, mais ceux qui y parviennent se retirent riches, célèbres et puissants. Quelques aventuriers ont fait exactement cela et ont racheté de nombreuses propriétés et affaires pour vivre une existence paisible avec leur butin durement gagné. Ces individus, bien que retraités, conservent de solides liens avec les aventuriers en activité, et leur influence contribuera assurément à former la prochaine génération d'aventuriers."
 adventurers_estate_events.9.a:0 "Bonne retraite à eux !"
 adventurers_estate_events.9.b:0 "Racheter une partie des terres pour rester en bons termes."
 EST_VAL_ADVICE_FROM_LOYAL_RETIRED_ADVENTURERS:0 "Aventuriers retraités loyaux"
 adventurers_estate_events.10.t:0 "Trop d'aventuriers !"
 adventurers_estate_events.10.d:0 "Chaque auberge grouille d'aventuriers, tous en quête de travail et rêvant de gloire. Les tableaux de primes sont vides, et les commanditaires de quêtes renommés sont harcelés pour n'importe quoi.\n\nSi ce chaos devait perdurer et que les aventuriers devenaient encore plus nombreux et puissants, ou pire, déloyaux, cela ne manquerait pas d'apporter le désastre sur notre pays."
 adventurers_estate_events.10.a:0 "Je vous paie 10 couronnes pour déguerpir d'ici."
 too_many_adventurers:0 "Trop d'aventuriers"
 too_many_adventurers_desc:0 "Ce pays compte trop d'aventuriers, ce qui sème le chaos et mécontente la population."
 adventurers_estate_events.11.t:0 "Grand nombre de fausses licences découvertes !"
 adventurers_estate_events.11.d:0 "En vertu de la loi [Root.GetAdjective], les $ESTATE_ADVENTURERS$ souhaitant exercer dans le pays doivent obtenir et payer une Licence d'Aventurier.\n\nIl semble qu'un important marché noir et une corruption au sein de nos tribunaux aient été mis au jour, et de nombreux aventuriers ont été pris avec de fausses licences ! Si certains sont assurément non qualifiés, d'autres ont fait leurs preuves avec succès, même sans avoir passé l'examen, et demandent maintenant à régulariser leur situation par les voies officielles. Mais cela pourrait saper notre autorité et notre contrôle sur l'état."
 adventurers_estate_events.11.a:0 "Régulariser ceux qui ont fait leurs preuves."
 adventurers_estate_events.11.b:0 "Leur faire suivre la procédure complète."
 shortage_of_adventurers:0 "Pénurie d'aventuriers"
 EST_VAL_ADVENTURER_UNQUALIFIED_ADVENTURERS:0 "Aventuriers non qualifiés"
 adventurers_estate_events.12.t:0 "Un aventurier célèbre offre ses services"
 adventurers_estate_events.12.d:0 "Grâce à nos bonnes relations avec les $ESTATE_ADVENTURERS$, ainsi qu'à leur puissance grandissante, un aventurier célèbre a proposé ses services pour rejoindre notre armée !"
 adventurers_estate_events.12.a:0 "Qu'il mène nos forces !"
 adventurers_estate_events.12.b:0 "C'est de penseurs inventifs dont nous avons besoin."
 adventurers_estate_events.13.t:0 "Les aventuriers partagent leurs exploits"
 adventurers_estate_events.13.d:0 "Notre coopération avec les $ESTATE_ADVENTURERS$ du royaume leur a permis de transmettre une chose ou deux à notre armée, et de reverser une part de leurs gains bien mérités à l'État !"
 adventurers_estate_events.13.a:0 "Excellent !"
 adventurers_estate_events.14.t:0 "Offre de l'Ordre des Chroniqueurs"
 adventurers_estate_events.14.d:0 "Un groupe naissant d'érudits et de quêteurs de savoir d'Anbenncóst a offert ses services comme intermédiaire entre nous et les $ESTATE_ADVENTURERS$ de notre royaume.\n\nL'Ordre des Chroniqueurs cherche à rassembler toute information existante dans le monde connu afin de créer une encyclopédie universelle du savoir, encourageant ainsi les aventuriers à être des explorateurs et des chercheurs de vérité plutôt que des guerriers. Dans le cadre de leur offre, ils accorderont des Bourses de Chroniqueur pouvant couvrir ou financer en partie les quêtes et expéditions des aventuriers.\n\nEn échange, nous devons partager avec les Chroniqueurs tout savoir que les aventuriers rapportent ou acquièrent dans notre royaume, afin de contribuer à leurs recherches et archives."
 adventurers_estate_events.14.a:0 "Marché conclu."
 adventurers_estate_events.14.b:0 "Les aventuriers sont faits pour combattre, pas pour le savoir !"
 adventurers_estate_events.15.t:0 "Révolte des $ESTATE_ADVENTURERS$ de [Root.GetName]"
 adventurers_estate_events.15.d:0 "Les $ESTATE_ADVENTURERS$ refusent d'accepter la confiscation de leurs terres et se sont soulevés contre nous !"
 adventurers_estate_events.15.a:0 "Soit."
 adventurers_estate_events.16.t:0 "Les $ESTATE_ADVENTURERS$ sèment le carnage !"
 adventurers_estate_events.16.d:0 "Si nos relations avec les $ESTATE_ADVENTURERS$ n'étaient pas au beau fixe ces derniers temps, leur manque de respect a atteint un point critique : nous avons reçu des rapports indiquant que des aventuriers opérant dans la province de [adventurer_province.GetName] se sont comportés de manière si abjecte au cours de leur quête que plusieurs propriétés ont été endommagées ou détruites, et de nombreux civils sont morts en dommages collatéraux.\n\nMalheureusement, ils sont partis depuis longtemps, mais ce ne sera pas la dernière fois si nous ne gagnons pas le respect de l'état."
 adventurers_estate_events.16.a:0 "Maudits soient-ils !"
 adventurers_estate_events.17.t:0 "Un barde célèbre vous fait cocu !"
 adventurers_estate_events.17.d:0 "Un barde célèbre (ou plutôt infâme) a déclaré publiquement devant la cour avoir séduit [Root.Consort.GetName], votre moitié ! « Ce fut comme un jet de dé », dit-il.\n\nVous êtes la risée de la cour. Le barde a malheureusement échappé à vos gardes et s'est enfui de la ville avec sa troupe."
 adventurers_estate_events.17.a:0 "Maudits soient ces bardes charismatiques !"
 adventurers_estate_events.17.b:0 "...et divorcer de [Root.Consort.GetName] par la même occasion !"
 adventurers_estate_events.18.t:0 "De puissants aventuriers sapent l'État"
 adventurers_estate_events.18.d:0 "Avec l'immense influence et le pouvoir que les $ESTATE_ADVENTURERS$ ont amassés en [Root.GetName], il n'est guère surprenant qu'ils agissent désormais en toute impunité, se croyant invincibles, et pire, se comportant comme s'ils dirigeaient le pays ! D'innombrables rapports font état d'incidents variés où des aventuriers de notre royaume ont refusé de respecter nos coutumes et nos lois, allant à plusieurs reprises jusqu'à insulter publiquement le nom du [Root.Monarch.GetTitle] !"
 adventurers_estate_events.18.a:0 "Ils sont trop puissants ; il nous faut les apaiser pour l'instant."
 adventurers_estate_events.18.b:0 "Leur rappeler à qui ils s'adressent !"
 EST_VAL_UNDERMINING_THE_STATE:0 "Sape de l'État : §Y$VAL$%§!"
 EST_VAL_PUT_INTO_PLACE:0 "Remis à leur place : §Y$VAL$%§!"
 adventurers_estate_events.19.t:0 "Les $ESTATE_ADVENTURERS$ réclament de plus grandes récompenses"
 adventurers_estate_events.19.d:0 "Les $ESTATE_ADVENTURERS$ ont récemment accompli une mission discrète et difficile pour le pays, mais ils reviennent à présent réclamer une récompense supérieure à ce qui était convenu ! Ils affirment que la quête était plus ardue que prévu, mais nos conseillers prétendent le contraire, estimant qu'ils testent jusqu'où ils peuvent aller !"
 adventurers_estate_events.19.a:0 "Soit, payons-leur une somme plus élevée."
 adventurers_estate_events.19.b:0 "Refuser de payer."
 EST_VAL_FORCED_COUNTRY_TO_GIVE_GREAT_REWARDS:0 "Récompenses majorées obtenues : §Y$VAL$%§!"
 adventurers_estate_events.20.t:0 "Les $ESTATE_ADVENTURERS$ investissent dans [adventurer_province.GetName]"
 adventurers_estate_events.20.d:0 "Grâce à nos bonnes relations et à l'influence grandissante des $ESTATE_ADVENTURERS$, un groupe d'aventuriers renommés s'est attaché au peuple de [adventurer_province.GetName] et a investi une partie de ses richesses dans le développement du bien-être de ses habitants."
 adventurers_estate_events.20.a:0 "Formidable !"

 adventurer_settlers:0 "Colons aventuriers"
 desc_adventurer_settlers:0 "Nos sujets aventuriers sont habitués à vivre sur la frontière, loin de tout rempart défini et à portée des raids orques ou gobelins, dans un climat parfois rude. Cette expérience s'est révélée inestimable dans les contrées similaires que nous colonisons, telles que Castanor ou les Bois-Profonds."
 adventurers_leading_own_troops:0 "Les aventuriers mènent leurs propres bandes."
 desc_adventurers_leading_own_troops:0 "Nos aventuriers mènent désormais leurs propres bandes de guerre, indépendamment de la structure militaire générale."