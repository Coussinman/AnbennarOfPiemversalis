 #Forest Goblin flavour events
 forest_goblin.1.t:0 "Pièges, Pièges à l'Infini..."
 forest_goblin.1.d:0 "La Marée Verte a été, pour le dire franchement, désastreuse pour nous Gobelins des Forêts. Déjà en difficulté pour riposter contre les Elfes Sylvestres, l'armée d'Orques déferlant dans les bois brisa toute défense qui aurait pu être érigée. Désespérément surclassés sur le champ de bataille, ce ne fut que l'ingéniosité de nos esprits qui nous permit de nous accrocher aux franges de nos bosquets.\n\nChaque gobelin sait maintenant que malgré toute leur puissance, même l'orque le plus fort tombera de la même manière que quiconque dans un piège à fosse caché. La discipline n'est que si utile pour un bataillon elfique face à un rondin clouté roulant. Nous sommes devenus très bons pour fortifier nos terres avec des pièges : et certains de nos gobelins dans [too_many_traps_province.GetName] semblent être devenus trop bons.\n\nNous avons reçu des rapports des zones que les pièges sont si répandus et prévalents qu'il devient impossible de se déplacer sans être nous-mêmes victimes de quelque chose. Il ne se passe pas un jour sans qu'un de nos propres gobelins ne disparaisse dans la forêt, et des appels sont lancés pour arrêter d'en construire de nouveaux : au moins jusqu'à ce que nous découvrions où sont ceux que nous avons déjà."
 forest_goblin.1.a:0 "Peut-être plus de pièges ?"
 forest_goblin.1.b:0 "On ne peut jamais avoir trop de pièges !"
 forest_goblin.2.t:0 "Gobelins Perdus Retrouvés"
 forest_goblin.2.d:0 "Dans le chaos de la Marée Verte, la société gobeline fit face à un bouleversement complet. Les familles furent séparées, des êtres chers perdus, et des clans entiers furent détruits par les orques envahisseurs. Avec le chaos se calmant maintenant, et notre tribu rétablissant sa place, certains de ces survivants ont lentement retrouvé leur chemin vers nous.\n\nRécemment, nos éclaireurs ont apparemment trouvé un grand groupe de gobelins, longtemps crus perdus à jamais. De lointains cousins et amis ont été réunis et il semble que le groupe ait même ramené quelque trésor de leur temps dans la nature. Cependant, mon [Root.Monarch.GetTitle], il convient de noter que certains de ces arrivants semblent... étranges. Sans doute avec leur longue absence, les fées ont eu quelque chose à voir avec leur retour."
 forest_goblin.2.a:0 "Nous devrions les accueillir, nous avons besoin de tous ceux que nous pouvons obtenir."
 forest_goblin.2.b:0 "Autant inviter les fées à vivre à côté : renvoyez-les !"
 forest_goblin.2.c:0 "Ils ont probablement appris une chose ou deux des fées..."
 forest_goblin.3.t:0 "Tréant en Colère"
 forest_goblin.3.d:0 "Les kartels opérant dans notre pays ont un amour au-dessus de tout : l'argent. Normalement, c'est un excellent arrangement pour nous, avec nous obtenant une part des profits. Malheureusement, l'avidité de certains de nos gobelins semble avoir été trop loin, et un kartel de bois dans notre pays a étendu ses opérations d'une manière... imprudente.\n\nTout le monde dans les Bois-Profonds sait que la forêt est dangereuse. La première leçon que nous apprenons tous enfant : ne t'éloigne pas trop du sentier, ou les bois te dévoreront entier. Donc lorsque des arbres commencent à être coupés, de plus en plus loin dans le Royaume-Fée, l'attention est attirée. Dans notre cas, il semble avoir attiré l'attention d'un tréant, qui sans surprise n'est pas trop content de nos opérations d'exploitation dans la zone. À moins que nous n'envoyions de l'aide à [angry_treant_province.GetName], notre production dans la zone luttera jusqu'à ce que le tréant se déplace."
 forest_goblin.3.a:0 "Envoyez-leur l'aide dont ils ont besoin."
 forest_goblin.3.b:0 "Ils ont creusé leur tombe, maintenant ils peuvent s'y allonger."
 forest_goblin.4.t:0 "Artisanat Magique dans les Bois-Profonds"
 forest_goblin.4.d:0 "Avec l'essor de l'artisanat magique dans notre pays, de nouveaux dispositifs surgissent chaque jour de nos inventeurs entreprenants. Notre position dans les Bois-Profonds nous donne un accès facile aux composants magiques, soit des fées soit poussant plus directement dans les bois.\n\nNos inventions sont sûres de faire un joli profit si nous les diffusons à nos voisins, avides comme toujours de mettre la main sur nos produits. Cependant, un groupe de conseillers soutenus par certains artificiers sont venus nous demander d'arrêter le commerce naissant, nous permettant de garder tous nos produits pour nous-mêmes."
 forest_goblin.4.a:0 "Combien avez-vous dit que nous vendons ça ?"
 forest_goblin.4.b:0 "Nous devrions garder ceci pour nous-mêmes..."
 forest_goblin.5.t:0 "Catastrophe dans la Canopée"
 forest_goblin.5.d:0 "Aussi loin que nous le savons, les Gobelins des Forêts ont construit des maisons haut dans les arbres, loin des dangers du sol forestier ainsi que de tout regard indiscret. Des villes et villages entiers ont été construits entre les branches des Bois-Profonds, connectés par de petits ponts de corde et des choix architecturaux discutables.\n\nAu fil des années, [fallen_building_goblin.GetName] a connu un boom démographique massif, avec le petit village dans les arbres s'étant transformé en une cité florissante. Malheureusement, le désastre a récemment frappé car le poids de tant de gobelins a fait s'écraser quelques bâtiments au sol, tuant des centaines de gobelins et en blessant beaucoup d'autres.\n\nLa plupart appellent à ce que nous envoyions immédiatement de l'aide à [fallen_building_goblin.GetName] pour reconstruire, mais certains dans notre cour proposent d'aller plus loin. Un conseiller en chef a proposé une nouvelle organisation, l'Organisation de Sécurité en Haute Altitude, pour mettre en œuvre de nouvelles réglementations de construction et s'assurer que cela ne se reproduise pas. Peu de gobelins seraient contents qu'on leur dise comment construire leurs maisons, mais ce pourrait être juste une mesure nécessaire."
 forest_goblin.5.a:0 "Nous n'avons pas d'argent à perdre, ils devront se débrouiller."
 forest_goblin.5.b:0 "Envoyez de l'argent pour réparer et qu'on en finisse."
 forest_goblin.5.c:0 "Nous devrions nous assurer que cela ne se reproduise jamais !"
 forest_goblin_osha:0 "Ces réglementations, bien qu'impopulaires, devraient grandement réduire les chances que cela se reproduise."
 forest_goblin.6.t:0 "Le Festival des Lumières Jaunes"
 forest_goblin.6.d:0 "Après des décennies d'attente, les étoiles se sont alignées pour un autre Festival des Lumières Jaunes. Remontant à l'époque des Vieux-Bois, avant même que l'ancien royaume Gobelin des Forêts ne s'élève et tombe, ses origines ont depuis longtemps été perdues dans le temps. Quoi qu'il en soit, le ciel est dégagé : il n'y aura pas de nuit comme celle-ci avant longtemps.\n\nBien que chaque tribu, et même chaque génération de gobelins, en soit venue à célébrer légèrement différemment, la pratique générale de la nuit reste la même. Les gobelins du clan se rassemblent dans leurs villages, accrochant des lanternes de lucioles et partageant les histoires de leurs parents à la génération suivante. La plupart des gobelins n'assistent qu'à un seul festival dans leur vie, et ils finissent comme une occasion sans pareille.\n\nCe soir, la forêt brillera sous une mer de lumières brillantes au-dessus, et d'yeux jaunes en dessous."
 forest_goblin.6.a:0 "Ça a l'air amusant, mais nous n'avons pas l'argent à perdre..."
 forest_goblin.6.b:0 "Nous pouvons dépenser un peu pour les garder heureux."
 forest_goblin.6.c:0 "Nous pouvons tout donner, tout pour nos compagnons Zvoyeozi !"
