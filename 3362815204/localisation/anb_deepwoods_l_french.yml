 #Salla Cenag Loc
 salla_cenag.1.t:0 "Alara du Clan des Os"
 salla_cenag.1.d:0 "Mon cœur battait la chamade. Ma bouche était sèche. Chaque phrase que je bafouillais était suivie d'un geste sauvage. Un instant, j'agitais mes mains, l'instant d'après je pointais vers l'un des guerriers rassemblés. Je ne pouvais m'empêcher de faire les cent pas. Mes pieds piétinant tandis que je réclamais chaque parcelle d'espace dans la clairière formée par les foules de membres-du-clan m'entourant.\n\nJe me sentais comme une folle délirante, pensant que mon peuple croyait un seul mot de ce que je disais. Pourtant, lorsque je croisais le regard de chaque elfe devant moi, je ne voyais que foi. Même après des années de guerre sans fin. Des années de sang, de larmes, et de trop nombreux êtres chers perdus. Ils croyaient encore en moi.\n\n« Mes frères-de-sang ! N'oubliez jamais que chaque souffle n'est pas donné ! Il est pris ! Rappelez-vous la Lutte des Os ! »\n\nJe frappai ma poitrine. Ma gorge me brûlait, mais je sentis encore les mots éclater, « Yfel Cenág ! »\n\nMille coups de poitrine résonnèrent tandis que j'entendis mes mots repris en chœur vers moi, « Yfel Cenág ! »\n\nJe frappai ma poitrine à nouveau, « Yfel Cenág ! »\n\nMes parents firent de même, rugissant avec la puissance du tonnerre. Mais ce n'était pas suffisant. Ma voix se brisa tandis que je hurlai une dernière fois, « Yfel Cenág ! »\n\nCe qui suivit laissa les os jonchant notre terre trembler. Ce n'était pas du simple tonnerre, c'était la tempête. C'était l'angoisse et la colère d'un clan, ses espoirs et ses rêves, et par-dessus tout, son désir de vivre.\n\nLorsque les beuglements et cris moururent finalement, comme toute chose, je fis signe aux guerriers de partir. Je sentis mon estomac se nouer tandis que je lançais mes ordres. Cette voix toujours présente murmura pourquoi quiconque écoutait quelqu'un comme moi, mais la pratique avait rendu plus facile de me concentrer. Et, après une heure, la clairière s'était vidée me laissant apparemment seule avec mes pensées.\n\nLa voix questionna doucement à nouveau. Pouvais-je vraiment laisser mon peuple, mes parents, partir au danger sans moi ? J'étais ceanna, leur chef de clan. C'était une position que je n'étais jamais censée occuper, le moins que je puisse faire était d'être là avec eux.\n\nJe me déplaçai pour monter, laissant l'action non la pensée répondre à la voix qui emplissait ma tête. Mais, avant que je puisse me hisser, quelqu'un de familier appela."
 salla_cenag.1.a:0 "« Que fais-tu, Al ? »"
 salla_cenag.1.a.tt:0 "Mon cœur se mit à battre la chamade...\n"
 salla_cenag.2.t:0 "Promesses"
 salla_cenag.2.d:0 "Je me retournai lentement, laissant mes propres yeux marron foncé rencontrer ses yeux bleu vif. Ils étaient remplis de la résolution têtue que j'aimais. Ses cheveux vert verdoyant, normalement flottants, étaient noués en chignon. Ses lèvres fines étaient pressées vers le bas et ses fins sourcils pliés. Par les Fées, qu'elle était belle. Même tandis que mon estomac déjà nauséeux coulait, la garder dans ma vue était tout ce que je pouvais considérer.\n\n« Ne me fixe pas juste, Alara, » exigea-t-elle. « Réponds-moi. »\n\nJe pinçai mes lèvres avant de laisser mon aveu tomber, « J'étais sur le point de partir. »\n\n« Tu as dit que tu ne le ferais pas. »\n\n« Je l'ai fait... »\n\n« Alors, pourquoi m'as-tu menti ? » Malgré ses meilleurs efforts, la voix de Lanhara montait, « Tu as promis. »\n\n« Je ne pouvais pas les laisser derrière, » Je désignai les bois sombres devant. « À quoi suis-je bonne pour notre clan si je ne suis pas là ? »\n\n« À quoi bon ? » Répéta-t-elle avant de soupirer. « Réfléchis-tu même à ce que tu dis ensuite ? »\n\n« Non... » J'admis.\n\nLanhara me fixa avant de se pincer le nez, « Réfléchis, Al. Tu dois réfléchir. Pas juste à moi... mais à notre clan. Qu'arrive-t-il si... tu meurs là-bas ? »\n\n« Je ne mourrai pas. »\n\nElle secoua la tête, ses yeux devenant vitreux. « Comme Balarion ? Comme Eledas ? »\n\nJe sentis mon cœur tomber tandis qu'elle murmurait les noms de mes frères perdus. Pour la première fois, je pensais à ce qui arriverait si je ne revenais pas. Je pensais à mes membres-du-clan. Je pensais à Hara. Qui les protégerait ? Qui la protégerait ? L'inimaginable devenait imaginable et me saisissait. Et si...\n\nMon cœur m'incita une fois de plus à agir. Je me raidis et..."
 salla_cenag.2.a:0 "...portai mes lèvres aux siennes. « Je ne mourrai pas, » je lui promis, et à moi-même, tandis que nous nous séparions avec des larmes."
 salla_cenag.2.a.tt:0 "[Root.Country.Monarch.GetName] §Yprendra le champ§!. En plus d'être §Gun général capable§!, [Root.Country.Monarch.GetName] sera capable de mener personnellement des raids et autres assauts résultant en §Yrécompenses militaires§! §Gplus efficaces§!. Cependant, elle a plus de chances de §Rmourir§!. [Root.Country.GetName] survivra à sa mort, mais §Yses connexions personnelles§! seront §Rperdues§!."
 salla_cenag.2.b:0 "...la serrai contre moi. « Je ne mourrai pas, » je lui promis. Lorsque je ne bougeai pas, elle commença à sangloter."
 salla_cenag.2.b.tt:0 "§W[Root.Country.Monarch.GetName]§! §Yjurera de rester aux côtés de son amour§!. Les raids et autres assauts donneront des §Yrécompenses§! §Rmoins efficaces§!. Cependant, elle est susceptible de vivre §Gune vie complète§! et §W[Root.Country.GetName]§! bénéficiera de §Yses connexions personnelles§!."
 salla_cenag.3.t:0 "Narawen du Clan des Épines"
 salla_cenag.3.d:0 "Quand j'étais jeune pousse, j'avais passé d'innombrables jours à Drennethille visitant des cousins et parents lointains. Je me souviens encore de rire et courir, respirant l'air doux, chargé d'une énergie que je ne pourrais jamais décrire. Pourtant, malgré ces jours heureux et ces liens de sang, je n'avais pas été ici depuis bien plus d'une décennie. Tout à cause de ma propre stupidité.\n\n« Alara ? M'écoutes-tu ? »\n\nJe regardai ma chère cousine, ma « petite sœur » : Narawen Drennen. Malgré le sang qui avait été versé entre nos clans. Malgré mes cris et hurlements contre elle à Elynaile. Elle se tenait encore à mes côtés. Aux côtés de Salla Cenág.\n\n« Donc, tu as eu accès au Creuset ? » demandai-je incertainement, tentant de me rappeler l'explication de Narwen.\n\nNarawen hocha la tête, « En quelque sorte. J'ai eu accès à un Défi. Mais, il n'y a pas tant de différence. »\n\nJe tapotai mon menton, « Donc juste battre quelques zites aléatoires ou quoi que ce soit d'autre qu'ils nous jettent, puis pouf ! » Je fis un geste de mes mains. « Des bénédictions ? »\n\n« Eh bien, ce pourrait être un peu plus dur que ça mais ou- »\n\nJe donnai un rire avant d'envelopper Narawen. Je n'avais pas besoin d'en entendre plus pour savoir que ça marcherait. Narawen savait comment gérer les fées. Et, avec leurs bénédictions, nous gagnerions à coup sûr.\n\n« C'est brillant, Wen ! »\n\n« Ala...s'il...te... » Narawen respira avec peine. « M'écra...ses »\n\nJe relâchai ma cousine. Elle recula en titubant avec un sourire exaspéré.\n\n« Tes câlins m'ont manqué... » respira-t-elle, « ...du moins je crois. Maintenant que c'est fait, que dirais-tu d'un déjeuner ? »\n\nAvec un sourire jusqu'aux oreilles, je hochai pleinement la tête. Ensemble, nous descendîmes les marches vers la salle à manger. Ce faisant, je pris une pleine respiration d'air qui m'avait tant manqué. C'était ainsi que ça devait être. La famille aidant la famille."
 salla_cenag.3.a:0 "Un jour, je retournerais la faveur. Et plus."
 salla_cenag.3.insight:0 "§GAperçu de l'Événement :§!\nMa douce cousine, §YNarawen Drennen§!, a pardonné ma folie d'avoir appelé elle et Salla Drennen, notre plus cher allié, ennemi mille fois. Pourtant je ressens encore de la honte pour mon pauvre jugement. Encore plus après avoir reçu son messager me demandant de lui rendre visite à §YDrennthille§! avec des promesses de §YBénédictions Fées§Y."
 salla_cenag.4.t:0 "Rage Contre le Chagrin"
 salla_cenag.4.d:0 "Lanhara et moi nous figeâmes en entrant dans la salle d'audience désolée, drapée d'ombres. Là Irvah Ayeth, l'elfe qui m'avait enseigné la guerre et la glaive, était assis non sur le siège d'honneur mais en dessous, agrippant quelque manteau sale. Il ne prêta attention ni à moi ni à Hara, sa propre petite-fille, malgré nos appels doux. Hara me fit signe de rester immobile avant de s'approcher de l'elfe morose, tentant de secouer doucement le Cean de Salla Ayeth. Lorsque cela échoua, elle devint énergique. Les mêmes questions perçantes qu'elle m'avait lancées, elle les lâcha maintenant contre Irvah. Qu'en était-il du clan Ayeth ? Qu'en était-il d'elle et de son père ?\n\nJe ne saisis pas ce qu'il murmura, mais il était impossible de manquer Hara s'enflammer de colère. Ce n'était que la deuxième fois que je la voyais ainsi. Toute retenue disparue. Elle jura. Elle hurla. Elle tapa du pied. Pourtant malgré sa fureur et ses exigences de savoir où était le « Ferme d'Ayeth », elle n'obtint aucune réponse.\n\nÉventuellement, sa colère s'estompa. Elle se retourna simplement et partit. Un seul regard brûlant fut tout ce dont j'eus besoin pour suivre sans un mot. Et tandis que nous nous déplacions pour quitter la salle d'audience, nous nous retrouvâmes arrêtées par une figure à l'allure sauvage. Immédiatement, mes instincts me poussèrent à me placer devant Lanhara. Ce faisant, j'entendis la voix de mon amour murmurer, « Père ? »\n\nMa mâchoire tomba. Cet elfe était Elaria ?\n\n« Il est mort, ma fille. Tout comme ma mère et ta grand-mère, » commença Elaria platement, ignorant la question. « Son corps ne l'a juste pas encore rattrapé. »\n\nNi l'une ni l'autre ne répondit, incertaines de quoi dire, mais Elaria ne prêta pas attention à notre silence. Au lieu de cela, ses poings se serrèrent tandis qu'un tranchant dangereux bordait sa voix, « Il refuse d'agir. Même quand notre peuple ne peut se le permettre. Pas quand cette vermine infeste nos terres. »\n\nSes yeux rencontrèrent finalement les miens. Même œil à œil, je ne pouvais reconnaître l'elfe que j'appelais autrefois áthyr'ionn, « père-de-serment ».\n\n« Mais tu es différente, nía'ionn. Salla Cenág est différent. » Ses poings se desserrèrent et il m'offrit sa main. « Ma fille-de-serment, nous ferons ce qu'il ne peut. Nous sauverons notre peuple. »\n\nJe me sentis me raidir sous son regard creux. C'était du chagrin. De la rage. De l'angoisse. C'était quelque chose qui ne pouvait être affronté seul, mais il n'était pas seul."
 salla_cenag.4.a:0 "Je saisis sa main, faisant de mon mieux pour ignorer sa poigne froide."
 salla_cenag.4.a.tt:0 "§YElaria Ayeth§! deviendra §Gdisponible§! pour mener nos armées. Il apporte des §Yrôdeurs§! pour renforcer nos forces.\n\n§TJouez Salla Ayeth pour vivre l'histoire d'Elaria de son point de vue !§!"
 salla_cenag.4.insight:0 "§GAperçu de l'Événement :§!\nMême avant que Lanhara et moi ne soyons liées-par-serment, son clan, Salla Ayeth, était parmi les alliés les plus proches de mon clan parmi tous les Grands Salla. Si nous devons repousser nos ennemis, nous aurons besoin de leurs §Yrôdeurs§!. Cependant, aucune des missives de Hara n'est revenue depuis la mort de sa grand-mère aux mains des envahisseurs. Nous pleurons tous sa perte, mais Hara craint que quelque chose de pire ne soit arrivé à §Yson père§! et §Yson grand-père§!... Il semble que nous devrons chevaucher vers Ayethstir nous-mêmes."
 salla_cenag.5.t:0 "Promesses Brisées"
 salla_cenag.5.d:0 "Tout ce que je pouvais goûter était le goût métallique du sang. Mes oreilles bourdonnaient. Elles étaient remplies de cris, hurlements et mor-. Douleur. Il y avait tellement de douleur.\n\nMais cela n'importait pas. Rien de cela n'importait. Je lui avais promis.\n\nAvec mon unique bon bras, je me traînai lentement à travers le sol. C'était ça. Ne pense pas. Continue juste à bouger. Tu lui as promis.\n\nMon corps trembla tandis que je m'étouffai sur un sanglot étouffé de sang. Ma vision tournait. La douleur commençait à s'estomper, mais je réussis à me traîner une fois de plus. C'est ça. Juste. Continue. À. Bouger. Souviens-toi. De la promesse.\n\nJ'appelai mon corps. Mon unique membre loyal. Un seul doigt. Mais, rien ne répondit. J'essayai de prendre une respiration mais ne trouvai pas d'air. Tout ce que je pouvais sentir était une humidité lointaine. Des larmes."
 salla_cenag.5.a:0 "Hara... Je suis désolée..."
 salla_cenag.5.a.tt:0 "§RJe ne pus tenir ma promesse.§!\n\n§Y[Root.GetName] perdra les connexions personnelles d'Alara, mais survivra.§!"
 salla_cenag.6.t:0 "La Fille Qu'Elle N'a Jamais Eue"
 salla_cenag.6.d:0 "TODO"
 salla_cenag.6.a:0 "TODO"
 salla_cenag.7.t:0 "Mille Flèches"
 salla_cenag.7ruler.d:0 "Je terminai de lire le rapport de raid avec un sourire sinistre. C'était le dernier du genre à arriver ces dernières semaines.\n\n« Un autre raid réussi ? » demanda Lanhara, regardant par-dessus mon épaule.\n\nJe hochai la tête.\n\n« Bien, » dit-elle en commençant à masser mes épaules. Je fermai les yeux pour profiter du moment, mais à la place mes pensées dérivèrent vers la bataille et la stratégie. Mon sourire se retourna.\n\n« Désolée, » s'excusa Hara, assumant que c'était le nœud qu'elle venait de toucher.\n\nJ'amenai ma main à la sienne. « Non, ce n'était pas toi. Ce sont ces orques et leur salaud de chef. » Elle continua le massage sachant que je n'avais pas fini. « Nous avons tué des centaines de ces brutes, mais ils ne veulent juste pas rompre. »\n\nMes mots flottèrent dans l'air.\n\n« Une seule poussée de la glaive plutôt que mille flèches ?, » offrit finalement Lanhara.\n\nJe levai les yeux derrière, vers elle. « Oui, une seule poussée de glaive ! Nous allons devoir les affronter de front ! »\n\n« Et qui exactement est 'nous' ? »\n\nJe renâclai, « Tu sais ce que je veux dire. »\n\nElle haussa les sourcils, « Vraiment ? »"
 salla_cenag.7ruler.a:0 "Je soupirai et l'embrassai sur la joue, « Je ne vais pas combattre. »"
 salla_cenag.7general.d:0 "L'air est odorant avec l'odeur de la sueur, du sang et de la mort. Je respire profondément par le nez, m'étant depuis longtemps habituée à la puanteur, mes yeux scrutant le champ de bataille victorieux. Tandis que mon cerf trotte lentement, je compte silencieusement les corps d'orques tombés. Alors que mon compte atteint cent, mon sourire sinistre s'aigrit.\n\nCombien de ces envahisseurs maudits-par-les-fées avais-je et mon clan abattus ? Mille ? Deux mille ? Plus ? D'innombrables cadavres et je ne pouvais toujours pas les repousser. Pourquoi ?\n\nJe secouai la tête connaissant la réponse. C'était leur salaud de chef : Khagor « Sapchopper ». Tant qu'il se tiendrait debout, il n'y aurait jamais-\n\nJe me figeai.\n\n« Une seule poussée de la glaive plutôt que mille flèches, » murmurai-je.\n\nLentement, je hochai la tête vers moi-même. Oui, c'était la réponse. Ensemble avec les autres clans."
 salla_cenag.7general.a:0 "Une seule poussée à travers ce salaud maudit-par-les-fées mettrait fin à cela."
 salla_cenag.7general.a.tt:0 "§GCe raid fut plus efficace grâce au commandement d'Alara.§!"
 salla_cenag.7.insight:0 "§GAperçu de l'Événement :§!\nLa lutte contre §RKhagor 'Sapchopper'§! et ses orques méprisables ne finit jamais. Mes membres-du-clan se déplacent pour les §Yassaillir§! une fois de plus."
 salla_cenag.8.t:0 "Corps et Os"
 salla_cenag.8.d:0 "La forêt, comme toujours, était une cacophonie de vie. Les arbres se balançaient dans le vent. Au loin, les hurlements de prédateurs en chasse résonnaient. Et, en particulier, le crissement et le gazouillis des insectes emplissaient l'air.\n\nCoupant à travers tout cela étaient les rugissements de rage de Khagor Sapchopper. L'éclaireur n'était pas arrivé à mi-chemin avant que Khagor n'ait reconstitué qu'un autre groupe de guerre était mort aux mains de Durzk'ungul, la fille maudite de la forêt connue sous le nom d'Alara Cenág.\n\nCette misérable, ce parasite, ce moucheron avait bourdonné à ses oreilles avec insistance depuis sa plus grande victoire sur les elfes. Elle grignotait et entaillait sans fin, refusant de lui accorder une bataille appropriée.\n\nMais il ne serait pas refusé. Avec le temps, elle et les autres petits elfillons seraient forcés d'affronter sa puissance. Et quand ils le feraient...\n\nKhagor porta sa main sur une mouche-couronne bourdonnante sans méfiance. Son bourdonnement cessa tandis qu'elle était prise entre lui, le chêne voisin, et une force violente."
 salla_cenag.8.a:0 "Il les écraserait."
 salla_cenag.8.a.tt:0 "§R[I29.GetName] nous a assaillis ! Notre force militaire a été réduite en conséquence.§!"
 salla_cenag.9.t:0 "Les Batailles Après la Guerre"
 salla_cenag.9.d:0 "Je ne pus m'empêcher de darder mes yeux partout, tentant de saisir autant que je pouvais de mon environnement. Ça devait faire au moins dix ans que j'avais été sur cette piste. Bien avant que les orques ne viennent. Pourtant en si peu de temps, tant avait changé. Le sentier avait été élargi. Un nombre de marqueurs grossiers avaient été sculptés dans un nombre d'arbres. Une grande partie du sous-bois et de la broussaille voisins avaient été brûlés. Les orques de Sapchopper avaient laissé les mêmes cicatrices sur la terre que sur notre peuple. La réalisation me laissa avec un froncement de sourcils.\n\n« J'aurais pensé que ça se sentirait mieux, » parla soudainement Narawen, brisant le long silence entre nous. « Voir tout ça à nouveau. Savoir que c'était fini. Que nous avions gagné. »\n\nJe me tournai pour la regarder. La gentillesse douce pour laquelle je connaissais ma cousine avait disparu. À sa place se trouvait une dureté, le même tranchant que je voyais chez Elaria : de la rage. Mon propre visage devint plus chaud à la vue de son angoisse.\n\n« Mais je ne me sens pas mieux, » continua-t-elle doucement. « Même si le salaud est mort. Son armée de meurtriers dispersée. Je me sens juste... »\n\nNarawen s'arrêta.\n\n« Les druides enseignent que la haine n'a pas de place durable dans la vie. Les Seelie pardonnent et oublient. Les Unseelie combattent pour surmonter. Mais qu'en est-il des Cendre-Fées ? Ne haïssent-ils pas ? »\n\nJe pinçai mes lèvres. Chaque elfe connaissait les Cendre-Fées. Cruels et vicieux, leur prince sombre avait passé des milliers d'années à comploter vengeance contre quelque ennemi oublié. Ils n'étaient pas à suivre.\n\n« Je pense que je les hais, Alara, » dit-elle, regardant au-delà de moi. « Pour avoir pris mes parents. Pour avoir ruiné nos vies. Mais je ne veux pas haïr. Je ne veux pas être comme les Cendre-Fées. »\n\nNarawen me regarda avec un regard perdu, « Pouvons-nous vraiment vivre avec eux ? Après tout ce qui s'est passé ? »\n\nJe regardai les bois que je connaissais autrefois puis de retour vers elle. Ma tête tournait d'émotion."
 salla_cenag.9.a:0 "« Non, Narawen. Nous ne pouvons pas. »"
 salla_cenag.9.a.tt:0 "Les §Yprovinces orques§! dans [Root.GetName] et [I28.GetName] seront §Rdévastées§! mais §Ydeviendront Elfiques Sylvestres de Cour Fée§!."
 salla_cenag.9.b:0 "« Je ne sais pas, Wen, mais ils ne nous feront plus de mal. »"
 salla_cenag.9.b.tt:0 "Les §Yprovinces orques§! dans [Root.GetName] et [I28.GetName] seront §Ggardées sous surveillance attentive réduisant la chance de révolte§! mais laissées tranquilles."
 salla_cenag.9.insight:0 "§GAperçu de l'Événement :§!\n§RKhagor§! est mort et ses §YSapchoppers§! dispersés, mais je sais que juste parce que la guerre est gagnée ne signifie pas qu'il ne reste pas de batailles à combattre. Je pense que §YNarawen§! réalise ça maintenant."
 salla_cenag.10.t:0 "Attrapé l'Elfe"
 salla_cenag.10.d:0 "Il ne fallut pas longtemps pour apprendre pourquoi ces marais misérables étaient connus comme la Folie. L'odeur étouffante de soufre, les hurlements de monstres invisibles, et la dégradation constante de la terre elle-même ont rendu la vie ici presque une entreprise insensée. Même au sein de notre clan, renommé pour repousser la frontière, seuls les plus endurcis de notre peuple furent capables de s'établir sur ses bords. Et seuls quelques élus étaient prêts à presser plus loin, poussés par la même curiosité audacieuse que nos ancêtres.\n\nCela... a peut-être été une erreur. Une folie si vous voulez.\n\nCar aujourd'hui, coupant à travers l'ambiance misérable de la vie des marais, se trouvaient des hurlements elfiques, à la fois rauques et hystériques. Ils furent poursuivis par des gloussements et des huées, déformés par des forces ne venant pas de notre plan. Les bruns et gris habituels du marais étaient illuminés d'une teinte verte maladive. Des geysers de feu verdâtre éclatèrent bientôt après. Et de ces bûchers émergèrent des créatures glabres, au museau dressé. Leurs yeux brûlaient d'une envie chaotique tandis qu'ils se jetaient sur leurs victimes."
 salla_cenag.10.a:0 "Par le Sein de la Reine Seelie ! QU'EST-CE QUE C'EST ?"
 salla_cenag.10.insight:0 "§GAperçu de l'Événement :§!\nEn de rares occasions, nos membres-du-clan ont aperçu et combattu avec §Rd'étranges créatures sans poil§!. Il est temps de patauger plus profondément dans la fange et découvrir ce que sont ces choses..."
 salla_cenag.11.t:0 "Ce Qui Est À Nous Est À Vous ?"
 salla_cenag.11.d:0 "Ce n'était peut-être pas la vue la plus étrange que nous ayons vue dans nos aventures au-delà des Bois-Profonds, mais c'était certainement parmi les plus gênantes. D'un côté se tenaient nos meilleurs éclaireurs et explorateurs les plus audacieux. De l'autre côté se trouvaient les Ourdi, certains vêtus de métal solide et d'autres de vêtements doux et colorés non sans ressemblance avec ceux portés par les elfes du Bosquet-du-Lac. Entre les deux parties se trouvait un Gobelin des Forêts agissant, de toutes choses, de traducteur.\n\nLa réunion fut... ardue, mais après un nombre de malentendus et quelques pointages très en colère sur une carte, le message Ourdi passa finalement. Apparemment, la terre que nous conquîmes des gobelins était la leur il y a seulement quelques années. Et... ils la veulent de retour.\n\nCeci, bien sûr, nous surprit. Quelques échanges tendus et quelques menaces pas si subtiles de guerre suivirent, mais notre peuple réussit à conclure la réunion sans incident. Comprendre les frontières n'est pas quelque chose qui peut être fait du jour au lendemain, après tout. Les Ourdi n'étaient pas contents, mais cela nous a acheté du temps."
 salla_cenag.11.a:0 "Quel désordre..."
 salla_cenag.11.a.tt:0 "Mais, au moins nous avons appris quelque chose de l'échange.\n"
 salla_cenag.11.insight:0 "§GAperçu de l'Événement :§!\nIl semblerait que §Yle [U16.Monarch.GetTitle] de [U16.GetName]§! exige une audience. Peut-être pouvons-nous tirer avantage de ceci pour §Gapprendre§! plus sur ces Ourdi, par §Ymoyens subtils§! ou §Ydiplomatie§!."
 salla_cenag.11alara.d:0 "« Donc en gros, ils disent qu'ils veulent récupérer leur merde, » dit le Gobelin des Forêts.\n\nJe fixai la créature qui était devenue notre traducteur d'une certaine manière. Trois jours de ma vie pour ça. Trois jours passés piégée à écouter des réunions sans fin et des discussions obtuses. Bien sûr. Laissez aux « diplomates » le soin de gaspiller tout ce temps pour faire passer le message.\n\nLe gobelin haussa les épaules tandis que je me pinçais le nez.\n\nAu début, j'avais été excitée de rencontrer ces Ourdi. C'était une chance de s'aventurer au-delà des bois pour des raisons autres que la guerre. Je rencontrerais des humains comme la femme aux cheveux de feu à Elynaile à nouveau. Peut-être même entrer dans le grand château sur le grand lac dont les éclaireurs avaient bavardé.\n\nCela n'arriva pas.\n\nToute cette affaire était une guerre, juste différente de celles que je combattais typiquement. Des mots et des piques furent échangés au lieu de lame et flèche. Aucun de ces humains ne détenait cette étincelle qu'elle avait. Et, pire de tout, je n'entrai pas dans le château, encore moins même le voir.\n\n« Que dirais-tu si je leur donnais un poing dans le cul ? » marmonnai-je.\n\nLe gobelin me regarda, se demandant si c'était ce que je voulais dire aux Ourdi [U16.Monarch.GetTitle]. Je hochai presque la tête, mais Lanhara intervint.\n\n« Ce qu'elle veut dire c'est 'La Ceanna comprend maintenant la cause de cette discorde. Cependant, ces terres sont encore dans le chaos. Peut-être serait-il plus facile de résoudre cela une fois que nos ennemis partagés ont été vaincus ?' »\n\nLe gobelin roula des yeux et transmit le message. Ou du moins quelque chose comme ça.\n\nLe [U16.Monarch.GetTitle], [U16.Monarch.GetName], grogna puis exhala vivement quelque charabia au gobelin avant de se lever pour partir.\n\n« J'ai pas tout saisi mais c'était à peu près un rendez-nous nos terres... ou sinon. »\n\nJe soupirai intérieurement. Je ne verrai jamais ce château n'est-ce pas ?"
 salla_cenag.11alara.insight:0 "§GAperçu de l'Événement :§!\nJe déteste les réunions, mais celle-ci pourrait être une exception. Hara est méfiante, mais §Yle [U16.Monarch.GetTitle] de [U16.GetName]§! veut me rencontrer. Avec un peu de chance dans son château ! Une réunion est un petit prix à payer pour voir ce que nos §Yéclaireurs§! et §Ydiplomats§! ont découvert par moi-même !"
 salla_cenag.12.t:0 "Famille-d'Armes"
 salla_cenag.12.d:0 "Mes joues étaient rouges tandis que je me pavanais à travers les groupes bavards de membres-du-clan. Je pouvais sentir mes lèvres verrouillées dans le sourire d'un imbécile tandis que je faisais un pas mal assuré après l'autre. Occasionnellement, je m'arrêtais pour donner un hochement de tête ici, un rire là, plus que quelques longues étreintes.\n\nJe levai ma coupe pour prendre une autre gorgée de vin tandis qu'un elfe torse nu portant un turbin rôti au-dessus de sa tête passa en courant devant moi. Une douzaine de cuisiniers en colère me dépassèrent en courant secondes plus tard. Je ris puis crachotai tandis que je m'étouffai sur le vin.\n\n« Te voilà, » appela une voix douce de derrière.\n\nJe me retournai et faillis basculer tandis que j'aperçus Narawen portant un sourire espiègle. Me rattrapant à mi-chute, elle saisit ma main et commença à me tirer. « Que fais-tu, Wen ? »\n\n« Des trucs importants, » hoqueta-t-elle.\n\n« Des trucs importants ? »\n\n« Ouip. »\n\nJe ne sais pas comment elle réussit à me tirer vers l'avant. Ma chère cousine faisait une tête de moins et moitié moins forte, mais je me retrouvai à trébucher derrière elle, le monde était un flou tandis que nous allions. Avant que je ne le sache, je fus hissée sur une table. Je levai les yeux pour voir Elaria... sourire ? Du moins quelque chose s'en rapprochant.\n\nAvec pas peu de lutte, Narawen grimpa à côté de moi et me fit un sourire radieux. Je la fixai abasourdie seulement pour tressaillir au boum de la voix de baryton d'Elaria, « Écoutez ! Nous avons un toast à donner ! »\n\nIl désigna Narawen et croisa les bras.\n\nDu mieux qu'elle put, Narawen tenta de combler le vide d'Elaria, « Mon cher Peuple. Mes chers parents et proches. Ayeth, Cenág et Drennen. Aujourd'hui nous célébrons la victoire ! »\n\nAcclamations et huées.\n\n« Et nous célébrons l'elfe qui nous l'a apportée, ma cousine, ma 'grande sœur' : Alara. »\n\nUne autre série d'acclamations et huées emplirent l'air nocturne. Tout le temps, mes joues commencèrent à chauffer.\n\nElaria s'avança alors. Il me regarda, et juste un instant, vit l'elfe que je connaissais autrefois. Puis il se tourna vers la foule et leva son gobelet, « À l'elfe qui apporta la justice à Salla Ayeth ! À ma fille-de-serment, Alara ! »\n\nPlus de hurlements retentirent. Bientôt les elfes rassemblés commencèrent à scander un nom. Mon nom. Tandis qu'il devenait plus fort, je sentis mon visage brûler encore plus chaud."
 salla_cenag.12.a:0 "C'est ça la famille."
 salla_cenag.12.insight:0 "§GAperçu de l'Événement :§!\nDes années de combat. Des années de lutte juste pour nous accrocher à ce que nous avions encore. Et maintenant finalement, je peux voir une fin à tout cela. Il reste tellement à faire encore, mais Hara insiste pour organiser un rassemblement de clan. Un que nous n'avons pas vu depuis avant que tout ceci ne commence. Ce serait bien d'avoir à nouveau nos familles ensemble..."
 salla_cenag.13.t:0 "Horizons Bleus"
 salla_cenag.13.d:0 "Notre peuple n'est pas fait pour les larmes. Le bosquet que nous appelons foyer, si rempli d'os, nous enseigne jeunes que la difficulté et la perte ne sont qu'une partie de la vie. Et tandis que le chagrin peut nous saisir comme n'importe quel autre clan, nous avons trouvé que lâcher son emprise creuse ne nécessite pas de verser des larmes. Cela prend simplement du temps et la volonté de continuer à avancer.\n\nCe fut cette volonté qui nous mena ici. Malgré d'innombrables batailles et des pertes déchirantes, nos elfes-du-clan continuèrent à avancer. Cette destination était là où la terre se rétrécissait en mer.\n\nAu début, il y eut un silence déférent tandis que notre avant-garde se tenait sur les rives sablonneuses. L'odeur de sel et de vie emplit leurs narines. Les vagues écrasantes et les volées lointaines les laissèrent sans voix.\n\nPuis vint une réalisation. Nous n'avions même pas de mot pour cet endroit, cette « mer », dans notre propre langue. C'était la chose sur laquelle nos ancêtres avaient navigué. C'était la chose qui les avait amenés ici dans ces terres avant qu'ils ne soient perdus dans les bois. Pourtant, nous ne pouvions pas l'appeler. Et donc le silence se brisa en sanglots tandis que les larmes coulaient librement. Combien avions-nous perdu ?\n\nAlors que notre peuple luttait avec le moment, un village d'humains débraillés observait. Bien qu'ils ne le montraient pas, ils luttaient aussi avec le moment. Un groupe de conquérants avait-il été remplacé par un autre ?"
 salla_cenag.13.a:0 "Nous ne sommes pas des conquérants. Nous trouverons un autre moyen..."
 salla_cenag.13.a.tt:0 "Cela déverrouillera la mission d'amitié Ourdi."
 salla_cenag.13.b:0 "Nous ne pouvons perdre cela. Nous ne le ferons pas."
 salla_cenag.13.b.tt:0 "Cela déverrouillera la mission navale Cenága."
 salla_cenag.13.insight:0 "§GAperçu de l'Événement :§!\nCe fut une marche constante vers l'ouest, mais maintenant elle arrive à sa fin. Non parce que nous avons affronté un ennemi trop grand, mais parce que la terre elle-même a cédé à une eau sans limites. C'est une vue comme nulle autre, une que nous n'avons jamais lue que dans les mémoires de nos ancêtres. Alors que nous nous tenons devant cette majesté, une question résonne avec les vagues qui se lavent : §Yest-ce la fin de notre exploration ?§!"
 salla_cenag.13alara.d:0 "Mes orteils s'enfoncèrent dans ce que les locaux appelaient « sable ». J'aimais ça. C'était lisse et doux et doux... bien qu'il aille partout. L'écrasement des vagues emplit mes oreilles, tout comme le gazouillis et les croassements d'oiseaux à plumes blanches, « mouettes ». L'odeur de « brise marine » était sel et fraîcheur.\n\nJe ne pus m'empêcher de sourire, pourtant en même temps je pouvais sentir un tremblement inhabituel dans mes lèvres. Cet endroit, cette « plage », était comme rien que j'avais expérimenté. Les rives du Bosquet-du-Lac ne pouvaient espérer se comparer.\n\nEt la « mer » ?\n\nMes yeux commencèrent à s'humecter tandis que j'essayai d'avaler.\n\nJe savais que c'était là que tout avait commencé. Sur cette « mer » les ancêtres de mon clan, de tous les clans, naviguèrent et atterrirent sur une « plage » comme celle-ci. Notre peuple était lié à cet endroit et je ne pouvais même pas utiliser ma propre langue pour décrire ces endroits.\n\nQuelques larmes m'échappèrent tandis que j'étouffai un sanglot.\n\nJe me retournai vers le village humain, essuyant mon visage. C'était grâce à ces humains que je pouvais trouver un mot pour cet endroit. Pour toutes ces choses que je ne pouvais même pas décrire. Je savais aussi que c'était leur foyer. Je savais que cette terre était aux Ourdi.\n\nEt je savais que je ne voulais pas partir. Je ne voulais pas perdre ce que mon clan venait juste de retrouver.\n\nJe retournai mon regard vers la mer."
 salla_cenag.13alara.a:0 "Il doit y avoir un autre moyen."
 salla_cenag.13alara.b:0 "Nous ne pouvons partir. Nous ne le ferons pas."
 salla_cenag.13alara.insight:0 "§GAperçu de l'Événement :§!\nLa marche de mon clan vers l'ouest est arrivée à sa fin. Non à cause d'un ennemi, mais à cause de quelque chose à laquelle la terre elle-même a cédé : une eau sans fin. Elle est plus large que toute rivière que j'ai vue. Plus grande que tout lac. Est-ce de là que mon peuple vint ? Et... §Yest-ce la fin de notre expédition ?§!"
 salla_cenag.14.t:0 "La Cour du Soleil ?"
 salla_cenag.14.d:0 "« Donc ça, » je pointai vers le Soleil, « c'est Surael. Il n'est pas un archifée. Il n'est pas le Dieu Soleil. Il est en fait le Soleil. »\n\nLes deux « Elfes Solaires » vêtus vivement, à la peau sombre hochèrent la tête. Mon esprit palpita. Non, il me fit mal. Toute cette affaire du Culte du Soleil était bien plus compliquée que je ne l'avais pensé. Il y avait tellement de règles et de détails. Comment quelqu'un pouvait-il comprendre ça ?\n\n« Mais et s'il y a des nuages ? » demandai-je, « Est-ce que ça signifie qu'il est occupé ? »\n\nLanhara me poussa du coude en désapprobation. Probablement une question trop directe, mais je l'ignorai et observai tandis que les deux elfes consultaient chacun leurs propres textes poussiéreux. D'après ce que j'avais compris, c'était quelque chose comme notre propre compilation de rituels fées.\n\nAprès quelque tournage de pages frénétique, l'un répondit, « Si le ciel au-dessus du temple reste sombre pendant 64 heures, nos prêtres doivent sacrifier six grenades- »\n\nL'autre interrompit, « C'est 72 heures, Kelmonias. »\n\nKelmonias secoua la tête et pointa vers son propre texte. « Doutes-tu à nouveau de mes lectures, Amarien ? »\n\n« Oui, en fait, » répliqua-t-elle sèchement. « Aussi, tu n'as pas mentionné les olives. Les olives viennent en premier. »\n\nLe texte de Kelmonias se referma violemment. « Oh, je comprends maintenant. Tu n'as pas appris des prêtres d'Eduz-Vacyn, encore. Que Surael t'aide. »\n\n« Hah ! T'accroches à la tradition encore ? Si tu voyageais plus, tu aurais appris que Taelarios a récemment souligné l'importance des olives. »\n\nImpuissante, j'observai tandis que les elfes commencèrent à lutter. Ils hurlèrent alors ce qui était soit des vers aléatoires soit des insultes grossières. Quelque chose surgit alors sur Jahar, les Guerres de Cendre, et l'Élection. Je sentis Lanhara me pincer et je pris conscience de son regard brûlant. Bien, pensai-je. Je ferai quelque chose.\n\n« Euh... par Surael ! » appelai-je tentant d'attirer leur attention, « Qu'est-ce que c'est ? » Les deux elfes me regardèrent tous deux, le meurtre dans leurs yeux puis vers le pot aléatoire vers lequel je pointais.\n\nIls regardèrent tous deux puis se redressèrent.\n\n« Des lentilles, » répondirent-ils, leur querelle entièrement oubliée."
 salla_cenag.14.a:0 "« Que sont les lentilles ? »"
 salla_cenag.14.a.tt:0 "Nous §Ydécouvrirons§! plus sur §YBulwar§!"
 salla_cenag.14.insight:0 "§GAperçu de l'Événement :§!\nHara m'a dit que nous recevons des visiteurs aujourd'hui. Par la grâce de la Reine Seelie, ce ne sont pas des dignitaires coincés cependant. Non, ce sont des elfes comme nous ! Apparemment ils viennent d'une terre loin au sud appelée '§YBulwar§!'. Je n'écoutais pas trop attentivement mais Hara a dit qu'ils suivent leur propre cour fée, le §YCulte du Soleil§! ou quelque chose."
 salla_cenag.15.t:0 "Passé et Présent"
 salla_cenag.15.d:0 "J'observai sur le côté de la scène de fortune avec Narawen tandis qu'un de mes éclaireurs répondait aux questions des membres-du-clan Drennen rassemblés.\n\n« Donc, les étrangers font des accords et puis les écrivent sur du papier ? »\n\nMon éclaireur hocha la tête à l'elfe Drennen dans la foule.\n\n« Ne se tiennent-ils pas à leur parole ? » demanda un autre avec insistance.\n\nHaussant les épaules, l'éclaireur expliqua, « Apparemment il y a trop d'elfes, humains, et autres créatures pour que ça marche. »\n\nIl y eut un murmure au sein du groupe Drennen. Je souris tandis que je vis même Narawen secouer la tête. La parole d'un elfe était sa vie dans les Grands Salla. Pourtant, au-delà des bois, c'était loin de ça.\n\n« Il y a beaucoup de noms pour ça, mais le plus commun que nous l'avons entendu appeler était 'Féodalisme'. L'adopter peut apparemment être jusqu'à cinquante pour cent plus efficace. »\n\n« Des conneries de Tulmun ! » cria un druide vieux tandis que des murmures mécontents emplirent l'air.\n\nNarawen me poussa du coude tandis que l'éclaireur tentait de maîtriser la foule, « Est-ce vraiment vrai ? »\n\nAvec un sourire jusqu'aux oreilles, je répondis, « Ça l'est. Après l'avoir adopté, nous avons trouvé plus facile de construire de nouveaux bâtiments, organiser de nouvelles unités, et commercer. »\n\nMa cousine hocha lentement la tête, pas tout à fait convaincue. Pas découragée par cela, je retournai mon attention à mon éclaireur qui avait finalement obtenu que la foule écoute à nouveau."
 salla_cenag.15.a:0 "« Après le 'Féodalisme' vient une renaissance... ' commencèrent-ils."
 salla_cenag.15.insight:0 "§GAperçu de l'Événement :§!\n§YNarawen§! et les §Ymembres-du-clan de Drennen§! ont toujours eu une connexion profonde aux Fées. Que ce soit les Seelie ou les Unseelie, ils savent toujours juste comment les traiter et sont toujours prêts à me donner à moi et §YCenág§! des conseils. Cependant, il y a tellement plus dans le monde que juste les Fées. Et bien qu'ils ne le sachent pas, ma douce cousine et son peuple pourraient utiliser un petit conseil propre !"
 salla_cenag.16.t:0 "Le Conclave de Hofónn"
 salla_cenag.16.d:0 "Depuis la chute du Voile Verdoyant, le changement n'avait pas juste été une constante pour les clans Elfes Sylvestres, mais un facteur toujours croissant. Marchandises, connaissances et personnes coulaient dedans et dehors à un flux vertigineux pour une terre isolée depuis des millénaires. Et au cœur de cela d'une certaine manière, au milieu de ce torrent, Hofónn. Malgré être la capitale de Salla Cenág, elle avait à peine été plus qu'un trou perdu. La « ville » elle-même n'était guère plus qu'une poignée de masures plus grandes que le camp d'éclaireurs qu'elle avait été au départ.\n\nPourtant, maintenant elle se dressait comme un vrai centre des Bois-Profonds. On pouvait trouver des tubes de métal qui tonnaient et crachaient du feu. Les marchands colportaient des manuscrits de Chroniqueur décrivant la patrie elfique récemment redécouverte d'Aelantir. Et si on écoutait attentivement, on pouvait entendre les chants d'étranges missionnaires répandant la parole du Jadd.\n\nPourtant, ce fut encore un choc pour [Root.Monarch.GetName] lorsque les clans du Pacte Verdoyant décidèrent de se réunir au sein d'Hofónn plutôt que de retourner là où le Pacte fut signé à Elynaille."
 salla_cenag.16.a:0 "Avec exaspération, le [Root.Monarch.GetTitle] prépara la capitale pour leur arrivée."
 salla_cenag.16.insight:0 "§GAperçu de l'Événement :§!\nLes Grands Salla attendent depuis trop longtemps un autre conclave. Et tandis que les autres clans étaient plus désireux d'héberger, le succès de §YSalla Cenág§! a conduit notre propre capitale à jouer hôte."
 salla_cenag.17.t:0 "Le Poids des Bois"
 salla_cenag.17.d:0 "Je gémis tandis que je m'affalai à plat ventre sur notre lit, totalement épuisée. Mon épuisement n'était pas parce que j'avais passé la journée à faire quoi que ce soit de significatif comme des exercices de tir à l'arc ou parcourir le bosquet ou des combats à la glaive. Non, mon corps allait bien, frais même. Mon esprit, d'autre part, menaçait de suinter comme si j'avais été piquée par un scorpion chasse-mort. Malheureusement, ce n'avait pas été mon destin. Ça aurait été trop gentil.\n\n« Ce n'était pas si mal, Al, » roucoula Lanhara tandis qu'elle s'assit à côté de moi et commença à caresser mes cheveux.\n\nJe fis un bruit mécontent dans l'oreiller en réponse.\n\n« Et tu as bien fait, » continua-t-elle. « Bien mieux qu'à Elynaile. Tu ne t'es même pas endormie une fois. »\n\nJe me retournai avec un froncement de sourcils, « Comment aurais-je pu ? Chaque ceann, ceanna, et leur cousin au second degré-deux fois retiré n'arrêtaient pas de me parler ! »\n\n« Parce qu'ils ont vu ce que tu as fait, observé comment notre clan s'est élevé. Ils veulent la même chose pour eux-mêmes. »\n\n« Nous avons fait ça. » Je protestai, « Ensemble. »\n\nLanhara me pinça la joue, « Oui, mais c'était toi qui nous menais. »\n\nJe fronçai les sourcils, « Ça n'a pas de sens. Pourquoi ne pas suivre [I28.Monarch.GetName] ou [I27.Monarch.GetName] ? Ils savent comment parler élégamment. Moi je parle juste. »\n\nÀ cela, l'amour de ma vie rit seulement, « C'est exactement pourquoi ils t'écoutent... »"
 salla_cenag.17.a:0 "« ...parce que tu es juste toi. »"
 salla_cenag.18.t:0 "Nous Vivons"
 salla_cenag.18.d:0 "« Te voilà. »\n\nMon regard vers le sol se déplaça pour apercevoir l'approche de Lanhara. Je donnai un petit sourire mais ne dis rien. Elle retourna le geste et s'affala près de l'arbre tombé que j'avais fait mon point de repos.\n\n« Tu es plutôt silencieuse, » commenta-t-elle, prenant ma main.\n\n« Je réfléchis, » répondis-je.\n\n« Dangereux. »\n\nJe roulai des yeux, « Quelqu'un m'a dit que je devrais le faire plus souvent. »\n\n« Conseil intelligent d'une belle elfe. À quoi penses-tu ? »\n\n« Très belle, » je corrigeai. Ma récompense fut un reniflement indigne. Avec un sourire satisfait, je reposai ma tête sur son épaule, « J'ai pensé à ce qui vient ensuite. »\n\n« Qu'arrive-t-il ensuite ? »\n\n« Ouais, » marmonnai-je en retour. « Nous avons combattu si longtemps. Et maintenant c'est fini. Maintenant quoi ?\n\n« Simple. Même chose que nous avons toujours faite. Nous vivons, » répondit Lanhara.\n\n« C'est tout ? »\n\n« C'est tout. »\n\nJe fis un hmm incertain avant de considérer ce qu'elle dit. Mais tandis que mes pensées commencèrent à tourbillonner, je sentis Hara serrer ma main avant de donner un rire, « Oh Al, comment est-ce arrivé ? »\n\n« Comment quoi est arrivé ? »\n\nElle se déplaça, me forçant à me redresser. Tandis que je lui lançai un regard interrogateur, Lanhara se pencha avec un regard espiègle, « Comment suis-je devenue celle qui agit d'abord, pense après ? »\n\nJ'ouvris la bouche mais Hara mit un doigt sur mes lèvres, « Nouveau conseil, ne pense pas trop. »"
 salla_cenag.18.a:0 "Je clignai des yeux puis souris. Plus de conseil intelligent d'une belle elfe."
 salla_cenag.18.insight:0 "§GAperçu de l'Événement :§!\nNous l'avons fait. Tous les Grands Salla se tiennent une fois de plus. Plus que cela, nous nous tenons ensemble. Mais...qu'est-ce qui vient ensuite ?"
 salla_cenag.19.t:0 "Ceannasaí"
 salla_cenag.19.d:0 "D'une certaine manière, ce fut une surprise que de tous les ceann et ceanna ce soit [Root.Monarch.GetName] qui se tenait devant les clans rassemblés comme ceannasaí. Notre clan n'avait jamais été à l'avant-garde de la culture, politique, ou pouvoir elfique. Nous étions explorateurs et éclaireurs, liés ensemble par le sang et les liens. Peut-être, pour cette raison, d'autres manières il était seulement évident que [Root.GetName] fut choisi pour mener les Grands Salla.\n\nLe monde avait changé, après tout. Notre foyer forestier n'était plus tout ce qu'il y avait, mais le commencement de tout ce qu'il y avait de plus. Qui mieux pour s'aventurer et rencontrer cet inconnu que ceux qui l'avaient déjà fait ?\n\nPourtant cela seul n'était pas suffisant car chaque Elfe Sylvestre était né rôdeur, ne serait-ce que par nécessité. Il devait y avoir quelque chose de plus. C'était pour cette raison que notre [Root.Monarch.GetTitle] ne parla pas de nos propres exploits mais plutôt de comment nous étions un peuple : parents et proches, indivisibles et inséparables. Que nous nous appelions frère, sœur, cousin, ou simplement membre-du-clan, notre loyauté était les uns envers les autres, maintenant et pour toujours."
 salla_cenag.19alara.d:0 "Je me retrouve une fois de plus devant mes compagnons ceanns et ceannas. Me tenant à pleine hauteur et vêtue de ma plus belle armure, je fais tout ce que je peux pour garder un visage droit. Je puise de la force où je peux du sourire furtif de Narawen tandis que je repousse ma nervosité.\n\nCe moment était son œuvre. Je m'arrête et me corrige. C'était notre œuvre.\n\nAvec les clans restaurés et les bois en paix, la question du futur avait plané sur tout le monde. C'était clair pour tous, même moi, que nous ne pouvions retourner aux anciennes voies de chaque clan seul, se querellant quand les choses arrivaient à un point critique. Cela avait presque apporté notre ruine.\n\nDes années de combat ensemble sous le Pacte Verdoyant nous avaient aussi rapprochés. Nous n'étions plus juste des clans maintenant, nous étions un peuple. Une force unifiée tout comme nos ancêtres l'étaient. Tout ce dont nous avions besoin était un commandant, un ceannasaí.\n\nEt cela nous mena ici. La plupart des chefs de clan avaient un désir pour la position. Mes yeux glissèrent vers Oberon Fealgarn qui s'était installé sur ce que je ne pouvais décrire que comme un froncement de sourcils au repos. Certains plus que d'autres, pensai-je. Pourtant, ce n'était pas suffisant de le vouloir. Les autres clans devaient être d'accord.\n\nJe ne sais pas ce que Narawen dit. Et, de tant de manières, je ne pensais pas être l'elfe pour ça. Mais, après toutes ces années, j'avais appris à penser un peu mais pas trop.\n\nJe pressai mon poing contre ma poitrine, jurant de servir comme Ceannasaí. D'honorer tous les clans, pas juste le mien. De mener avec courage et conviction. Et de défendre notre foyer contre tout ce qui le menaçait.\n\nCe fut un discours court. Je savais que je ne pouvais parler élégamment, mais tandis que j'apercevais Lanhara derrière les chefs de clan, je savais aussi que c'était bien. Je devais juste être moi.\n\nEt tandis que j'atteignais la fin de mon discours, je frappai ma poitrine deux fois.\n\n« Yfel Cyranvar ! »\n\nÀ l'unisson les chefs de clan répondirent de même."
 salla_cenag.19.a:0 "« Yfel Cyranvar ! »"
 salla_cenag.19.a.tt:0 "Pour le reste de la partie, §Ychanger§! ou §Yajouter des réformes gouvernementales§! nous donnera le modificateur §GLégacy de Salla Cenág§! pendant §Y5 ans§!"
 salla_cenag.20.t:0 "Les Gobelins du Bosquet-des-Os"
 salla_cenag.20.d:0 "Contrairement aux autres bosquets, le contrôle elfique du Bosquet-des-Os n'a jamais été complet. Il y eut des moments fugaces de domination, mais pour la plupart des siècles passés, le bosquet est resté divisé entre elfe et gobelin. Cela est finalement arrivé à sa fin.\n\nAvec ce pouvoir vient une décision, comment gouvernerons-nous nos rivaux gobelins vaincus ?"
 salla_cenag.20.a:0 "Comme sujets sous guidance elfique."
 salla_cenag.20.b:0 "Sous le talon de la domination elfique."
 salla_cenag.20.a.tt:0 "Cela déverrouillera la voie de tolérance gobeline."
 salla_cenag.20.b.tt:0 "Cela déverrouillera la voie de domination elfique."
 salla_cenag.20alara.d:0 "Mon frère, mon père, et mon grand-père partageaient tous le même rêve : le contrôle complet de Cenága sur le Bosquet-des-Os. Chacun d'eux mourut poursuivant ce rêve. Et maintenant le Prince des Fous doit rire de l'ironie que ce rêve que je n'ai jamais imaginé une fois soit devenu vie sous ma surveillance comme chef de clan.\n\nJe secoue la tête. Tout ce que je voulais était restaurer les territoires traditionnels de mon clan. Récupérer nos foyers. Protéger ce qui était nôtre. Pas plus. Ce n'est jamais aussi simple cependant. Pas quand tu es ceanna.\n\nLa récupération devint conquête, et maintenant les partisans et anciens du clan se sont querellés sans fin. Beaucoup exigent vengeance pour les tentatives de conquête d'Oubblig. Que nous devions placer les gobelins sous nos bottes. Il y en a quelques-uns, cependant, qui argumentent qu'Oubblig et ses successeurs, [U12.GetName], suivaient simplement la Lutte des Os, le combat pour la vie.\n\nJe regarde Lanhara, elle fixe impassiblement attendant ma décision. Elle a été silencieuse sur la question mais je suspecte que je connais sa propre opinion. Tandis que je reporte mon regard sur les elfes rassemblés, je repense à Elynaile, de retour à quand Corin et sa bande revinrent. Je me souviens de la joie que j'ai ressentie en apprenant que le Voile Verdoyant était tombé... et le choc d'apprendre que le meurtrier de mon frère, Oubblig, avait été essentiel à son succès.\n\nCe n'est vraiment jamais simple, n'est-ce pas ?\n\nAvec un mouvement rapide de ma main, les arguments s'éteignent. Je me lève, avalant la boule dans ma gorge puis m'adresse à mes membres-du-clan."
 salla_cenag.20alara.a:0 "« Nous honorerons la Lutte des Os et ceux qui l'honorent. »"
 salla_cenag.20alara.b:0 "« Nous honorerons les rêves de ceux qui combattirent pour un Bosquet-des-Os Cenága. »"
 salla_cenag.21.t:0 "Sur le Vent"
 salla_cenag.21.d:0 "Je m'appuie contre l'arbre et fixe mes pieds maladroitement, essayant de mon mieux de m'effacer du moment. Je ne devrais pas être ici. Ceci... ce n'est pas ma place d'être. Pourtant, j'étais là.\n\nC'était partiellement ma faute. Lorsque je dis à Lanhara de parler avec son père, elle insista que je vienne aussi. Contre ces yeux suppliants, je savais que c'était une bataille que je n'allais jamais gagner. Je suppose que même si j'avais pu, je serais quand même allée. Affronter ta famille et traverser les failles qui vous divisaient était assez dur. Le faire seul ? Je secoue la tête. Et donc je me retrouvai à la tombe de l'elfe que j'appelais autrefois grand-mère-de-serment.\n\nMon rôle avait été simple, agir comme une branche pour que les deux puissent finalement parler. Pas en accès et départs, mais quelque chose de plus, de plus profond. Après ça ? Eh bien, il y avait une raison pour laquelle je me tenais où je me tenais.\n\nCela ne m'empêchait pas de voler un regard furtif vers Elaria et Lanhara. Père et fille se tenaient côte à côte en souvenir silencieux. S'il y eut des mots passés entre le silence, alors ils furent heureusement perdus pour moi. C'était leur moment, pas le mien.\n\nEt quand ce moment finit, ils se tournèrent ensemble et m'approchèrent. Je donnai mon meilleur sourire rassurant. Hara essuya ses yeux et retourna le même. Quant à Elaria ? Pour la première fois, je vis l'elfe que je connaissais autrefois."
 salla_cenag.21.a:0 "Je saisis sa main, soulagée par sa poigne chaude."
 salla_cenag.21.insight:0 "§GAperçu de l'Événement :§!\nMalgré nos succès, mon áthyr'ionn, §YElaria Ayeth§! reste distant au mieux. Au pire... Je ne souhaite pas y penser. Et bien qu'elle ne le montre pas, je sais que §YHara§! s'inquiète pour le bien-être de son père. Son §Rchagrin§! menace de le noyer dans le §Rdésespoir§!. Je dois faire quelque chose..."
 salla_cenag.22.t:0 "Bal Ourd"
 salla_cenag.22.d:0 "La forteresse était au-delà de tout ce que nous avions contemplé. Elle s'étendait à travers la falaise surplombant les vagues sans limites en dessous, des murs se tenant à une demi-douzaine d'elfes de haut. Bal Ourd, les humains locaux l'appelaient. C'est l'une des nombreuses grandes forteresses érigées par l'empire depuis longtemps passé connu sous le nom de Castanor, l'Empire de l'Homme. Impressionnant de l'extérieur, Bal Ourd s'avéra être également impressionnant de l'intérieur.\n\nAlors que [Root.Monarch.GetName] franchissait des couloirs éclairés aux chandelles, un creux se forma dans leur cœur. Comparé à cet exploit, qu'avait construit [Root.GetName] ? [Root.Monarch.GetHerHisCap] peuple avait passé des siècles à gratter une vie dans les forêts vivant dans des taudis de bois et d'os. Pour tout leur discours de changement et d'adaptation, il semblait qu'il y avait encore tellement plus à apprendre.\n\nPire encore, [Root.Monarch.GetSheHe] pouvait sentir les regards des locaux. Maintenant dans la chambre principale, [Root.Monarch.GetName] vit finalement le trône vide. Les humains ici avaient jadis un royaume. Tandis que les Elfes Sylvestres seraient tolérés pour l'instant, un jour bientôt, un choix devrait être fait."
 salla_cenag.22.a:0 "Seraient-ils libérateurs ? Ou conquérants ?"
 salla_cenag.22.insight:0 "§GAperçu de l'Événement :§!\nEn sécurisant §Yla grande forteresse de Bal Ourd§! nous pourrions §Gapprendre§! davantage sur ces Ourdi et les moyens par lesquels ils vivent."
 salla_cenag_our_home_tolerance_settling_reward_tt:0 "Les §YElfes§! et §YGobelins§! s'établiront à travers §Yle Bosquet-des-Os§!."
 salla_cenag_warlocks_wars_insult_reward_tooltip:0 "Si nous §Yinsultons avec mépris§! [U12.GetName] alors nous gagnerons §Gde la force militaire additionnelle§!."
 salla_cenag_salla_arka_reward_tooltip:0 "Avoir nos §Ydiplomats§! §Gaméliorer les relations§! avec [U16.GetName] nous §Ggagnera§! des §Yinsights dans leurs institutions§!. Avoir nos §Yespions§! dans [U16.GetName] nous §Gdonnera§! de la §Yconnaissance de leurs réformes gouvernementales§!. §YExploiter les deux§! nous récompensera avec §Gles deux§!.\n"
 salla_cenag_the_bone_struggle_tooltip:0 "75 §YPouvoir d'Église§! seront §Ydépensés§! si la Cour Unseelie n'est pas §GContente§! ou §MRavie§!."
 salla_cenag_the_bone_struggle_unseelie_challengers_tooltip:0 "Des §RChallengers Unseelie§! apparaîtront dans §Yune province aléatoire§! pour tester notre valeur."
 salla_cenag_goblin_path_tt:0 "Ceci est une §YMission Ramifiée§!. Ses déclencheurs et effets seront basés sur notre choix une fois que nous §Ycontrôlons le Bosquet-des-Os§!."
 salla_cenag_ourdia_path_tt:0 "Ceci est une §YMission Ramifiée§!. Ses déclencheurs et effets seront basés sur notre choix durant §YHorizons Bleus§!."
 salla_cenag_heartsmitten:0 "Coeur-Épris"
 salla_cenag_heartsmitten_desc:0 "« Hara, tu es mon tout... » -Alara Cenág"
 salla_cenag_pacified_orcs:0 "Sapchoppers Dispersés"
 salla_cenag_pacified_orcs_desc:0 "Avec la mort de leur chef Khagor Sapchopper, les orques dans nos terres ont été brisés. Toute tentative de réorganisation est dissuadée par la pointe-de-glaive."
 salla_cenag_for_the_lost:0 "Pour les Perdus"
 salla_cenag_for_the_lost_desc:0 "« Regardez les os sur lesquels nous marchons ! Ils contiennent vos frères, vos sœurs, vos cousins ! Ils tombèrent pour que nous puissions nous tenir debout ! Alors combattez ! Combattez et souvenez-vous de la Lutte des Os ! » -Alara Cenág"
 salla_cenag_into_the_unknown:0 "Vers l'Inconnu"
 salla_cenag_into_the_unknown_desc:0 "Nous sommes un clan né d'éclaireurs et d'explorateurs. Contrairement à nos frères, affronter l'inconnu nous a remplis non de peur mais d'excitation. Avec le Voile Verdoyant disparu et les Gobelins des Forêts vaincus, nous avons une chance de sortir au-delà de la forêt que nous avons connue si longtemps. Mais, que se trouve au-delà ?"
 salla_cenag_wide_eyes_reward:0 "Apprendre les Savoirs"
 salla_cenag_wide_eyes_reward_desc:0 "« Familles d'Argent ? Dwarovar ? Surael ? Il y a tellement à apprendre, Al. » - Lanhara Ayeth\n« Ugh, il y a trop à apprendre... qui a le temps pour tout ça ? » -Alara Cenág"
 salla_cenag_passed_unseelie_challenge:0 "Répondu au Défi Unseelie"
 salla_cenag_passed_unseelie_challenge_desc:0 "« Par-dessus tout les Unseelie valorisent la force, la volonté de vivre. Affrontez leur Défi de front et vous trouverez cette force. » -Narawen Drennen"
 salla_cenag_a_shoulder_to_lean_on_reward:0 "Sur le Vent"
 salla_cenag_a_shoulder_to_lean_on_reward_desc:0 "« Je pensais qu'oublier la douleur, le chagrin, signifiait trahir les tombés. Mais je comprends maintenant, ils ne voulaient pas que nous brûlions dans le chagrin, mais vivions dans l'espoir. Le passé est passé, mais le présent est un cadeau... » -Elaria Ayeth"
 salla_cenag_bonecoated_infiltrators_rangers_reward:0 "Infiltrateurs Recouverts-d'Os"
 salla_cenag_bonecoated_infiltrators_rangers_reward_desc:0 "Les elfes de Cenág n'ont jamais été renommés pour leur habileté à l'arc comme Ayeth ni la maîtrise de la selle comme Fealgarn. C'était leur capacité à percer à travers ligne de bataille et fortification qui gagna le respect des clans."
 salla_cenag_swift_as_an_arrow_reward:0 "Encocher la Flèche"
 salla_cenag_swift_as_an_arrow_reward_desc:0 "« Pas de cris de guerre. Pas de hurlements de vengeance. Juste le murmure de flèches sifflantes et les râles mourants des envahisseurs. » -Elaria Ayeth"
 salla_cenag_family_in_arms:0 "Famille-d'Armes"
 salla_cenag_family_in_arms_desc:0 "« Personne ne peut garder son dos seul. » -Proverbe Cenága"
 salla_cenag_just_me:0 "Une Ceanna Sincère"
 salla_cenag_just_me_desc:0 "« Elle lutte pour ne pas s'assoupir durant nos conclaves. Elle parle sans réfléchir. Et, elle ne tient absolument aucune considération pour le décorum. Mais, je ne douterai jamais de sa loyauté ou dévouement. » -Bricena Myna sur Alara Cenág"
 salla_cenag_yfel_cenag:0 "Yfel Cenág"
 salla_cenag_yfel_cenag_desc:0 "« N'oubliez jamais la Lutte des Os. » - Dicton Cenága\n\nLorsque nous adoptons une §Ynouvelle réforme gouvernementale§! ou §Ychangeons de réformes gouvernementales§! nous §Ggagnerons de l'innovation pendant 5 ans§!."
 salla_cenag_embrace_change:0 "Héritage de Salla Cenág"
 salla_cenag_embrace_change_desc:0 "Rien ne vit éternellement. Elfe. Clan. Idée."
 salla_cenag_branching_1_2_title:0 "Mission Ramifiée"
 salla_cenag_branching_1_2_desc:0 "Ceci est une §YMission Ramifiée§!. Ses déclencheurs et effets seront basés sur notre choix une fois que nous §Ycontrôlons le Bosquet-des-Os§!."
 salla_cenag_branching_1_3_title:0 "Mission Ramifiée"
 salla_cenag_branching_1_3_desc:0 "Ceci est une §YMission Ramifiée§!. Ses déclencheurs et effets seront basés sur notre choix une fois que nous §Ycontrôlons le Bosquet-des-Os§!."
 salla_cenag_uneasy_peace_tolerance_title:0 "Paix Précaire"
 salla_cenag_uneasy_peace_tolerance_desc:0 "Notre histoire avec les Gobelins des Forêts remonte à des siècles. Durant ces temps, nous étions parfois des ennemis amers. D'autres fois, nous étions des rivaux concurrents. Peut-être maintenant, avec du temps et de l'espace, pouvons-nous simplement être voisins."
 salla_cenag_our_home_tolerance_title:0 "Notre Foyer"
 salla_cenag_our_home_tolerance_desc:0 "Des neuf bosquets des Bois-Profonds, le Bosquet-des-Os est parmi les plus durs et pauvres. Ses habitants ont longtemps dépensé les quelques ressources pour défendre ce qu'ils pouvaient tenir de leurs rivaux. Plus jamais. Que elfe et gobelin partagent le peu qu'il y a et construisent quelque chose de plus : un Bosquet-des-Os qui soit foyer pour tous."
 salla_cenag_uneasy_peace_intolerance_title:0 "Un Bosquet"
 salla_cenag_uneasy_peace_intolerance_desc:0 "Bien que le Bosquet-des-Os soit nominalement sous notre contrôle, nous devons encore vraiment le sécuriser. Des bandes gobelines dispersées demeurent encore. Nous manquons de postes de communication dans des emplacements clés. Si nous voulons que le Bosquet-des-Os reste nôtre, nous devons resserrer notre emprise. Même si cela signifie plus de résistance."
 salla_cenag_uneasy_peace_intolerance_autonomy_tt:0 "Toutes les §Yprovinces Gobelines des Forêts du Bosquet-des-Os§! ont moins de §Y25 d'autonomie§! OU §Yont vu leur autonomie réduite§!."
 salla_cenag_our_home_intolerance_title:0 "Notre Foyer"
 salla_cenag_our_home_intolerance_desc:0 "Avec chaque clairière fermement sécurisée, il est temps de permettre à nos membres-du-clan de récupérer ce qui fut perdu et de construire quelque chose de nouveau. Notre bosquet sera peut-être toujours dur, mais il sera aussi toujours notre foyer."
 salla_cenag_curiosity_title:0 "Curiosité..."
 salla_cenag_curiosity_desc:0 "Au-delà des bois se trouvent de nombreuses merveilles, à la fois époustouflantes et bizarres. Peut-être la plus étrange est la terre connue par les locaux comme « Folie-de-Daravan ». C'est un marais putride embrasé de magies étranges à la fois similaires et étrangères aux magies fées avec lesquelles nous avons longtemps vécu. Beaucoup de nos jeunes réclament d'explorer cette terre étrange et apparemment désolée."
 salla_cenag_where_the_land_ends_title:0 "Où la Terre Finit"
 salla_cenag_where_the_land_ends_desc:0 "Nous poussons toujours vers l'ouest, poursuivant le soleil. Le clapotis des vagues du bleu sans limites borne notre voyage, tout comme ces gobelins étranges. Plus trapus, plus nombreux, et parlant un dialecte seulement vaguement intelligible par ceux d'entre nous qui connaissent le Gobelin, ces « Gobelins de l'Exode » se tiennent entre nous et découvrir si la terre finit un jour."
 salla_cenag_branching_1_6_title:0 "Mission Ramifiée"
 salla_cenag_branching_1_6_desc:0 "Ceci est une §YMission Ramifiée§!. Ses déclencheurs et effets seront basés sur notre choix durant §YHorizons Bleus§!."
 salla_cenag_far_lands_title:0 "Terres Lointaines"
 salla_cenag_far_lands_desc:0 "Il y a quelques courtes décennies, seuls les plus audacieux rêvaient de quitter les Bois-Profonds. Et même eux n'imaginaient jamais conquérir et tenir des terres au-delà. Et pourtant, nous avons fait exactement cela. Bien que Gobelin de l'Exode et Ourdi puissent amèrement grincer sous notre règle, leur disposition morose ne fait rien pour diminuer l'excitation de notre peuple. Cette excitation peut être résumée par un mot : bateaux. En dehors de quelques canoës et canots sur le Bosquet-du-Lac, aucun elfe des Bois-Profonds n'a jamais eu la chance de construire les embarcations sur lesquelles nos ancêtres arrivèrent durant le Débarquement. Jusqu'à maintenant, c'est-à-dire !"
 salla_cenag_unlikely_friends_title:0 "Amis Improbables"
 salla_cenag_unlikely_friends_desc:0 "C'est une chose d'explorer le monde et ses idées. C'en est une autre de rencontrer ses peuples et de les comprendre. Et aussi audacieux que nous soyons, même nous ne pouvions nous empêcher de ressentir de l'appréhension. Qui étaient les Ourdi ? Pouvaient-ils être confiés avec ces terres que nous gouvernions maintenant ? Et qu'en était-il de notre accès à la mer ?\n\nPeut-être qu'un autre clan aurait décidé que ces étrangers étaient un trop grand risque. Peut-être. Mais, nous ne sommes pas un autre clan. Nous sommes Salla Cenág. Le Clan des Os, lié par le sang et la confiance. Et tandis que les Ourdi ne soient peut-être pas liés directement par le sang, cela peut être compensé par la confiance."
 salla_cenag_unlikely_friends_tooltip:0 "Nous §Ycéderons§! toutes les provinces §Yayant des cœurs Ourdia§! à §YOurdia§!.\nGagnez §G25§! Pouvoir Administratif, §G25§! Pouvoir Diplomatique, et §G25§! Pouvoir Militaire pour chaque province cédée."
 salla_cenag_warlocks_wars_title:0 "Sorciers et Guerres"
 salla_cenag_warlocks_wars_desc:0 "Nos querelles avec les gobelins du Bosquet-des-Os remontent à des siècles à quand nos ancêtres Elfes Lunaires arrivèrent pour la première fois. À travers les nombreuses guerres qui ont suivi, jamais notre peuple n'avait expérimenté un ennemi aussi dangereux que le sorcier fée Oubblig. À travers une puissante magie fée, il dévasta notre clan, tuant même notre précédent chef de clan et le frère de l'actuelle Ceanna. Oubblig, cependant, ne mène plus les gobelins ! Nous devons frapper et venger nos parents tombés !"
 salla_cenag_into_the_unknown_title:0 "Vers l'Inconnu"
 salla_cenag_into_the_unknown_desc:0 "Nous sommes un clan né d'éclaireurs et d'explorateurs. Contrairement à nos frères, affronter l'inconnu nous a remplis non de peur mais d'excitation. Avec le Voile Verdoyant disparu et les Gobelins des Forêts vaincus, nous avons une chance de sortir au-delà de la forêt que nous avons connue si longtemps. Mais, que se trouve au-delà ?"
 salla_cenag_salla_arka_title:0 "Salla Arká"
 salla_cenag_salla_arka_desc:0 "Nous ne sommes pas étrangers aux forteresses de pierre. La citadelle toujours croissante de Ciranmyna est bien connue parmi nous elfes et dans les bibliothèques d'Elyn se trouvent des archives de puissantes et anciennes structures trouvées par nos ancêtres dans la terre connue sous le nom d'Escann. Pourtant, ni l'une ni l'autre ne se comparent à la forteresse devant nous. Surplombant une étendue sans fin d'eau, ce bastion est comme rien que nous ayons jamais vu. Nos éclaireurs ont pris l'habitude d'appeler ces peuples de cette structure Salla Arká, le Clan du Château, nommé d'après leur drapeau. Dans leur propre langue, ils s'appelaient les Ourdi et il semble qu'ils souhaitent nous parler...."
 salla_cenag_wide_eyes_title:0 "Yeux Écarquillés"
 salla_cenag_wide_eyes_desc:0 "Des Elfes ! C'est la dernière nouvelle de nos éclaireurs. Des Elfes comme nous mais différents de nous. Ils portent des vêtements doux de couleurs chatoyantes. La plupart brandissent des amulettes du soleil et vénèrent son lever. Et le plus étrange de tout, ils parlent dans une langue qui ne ressemble en rien à la nôtre. Pourtant, ils ne semblent pas différents de nous ! Les locaux les appellent « Elfes Solaires », ce qui explique certains de nos rapports. Pourtant il y a bien plus à apprendre ! À la fois sur ces elfes et sur cette terre étrange connue sous le nom de Bahar."
 salla_cenag_across_halann_title:0 "À Travers Halann"
 salla_cenag_across_halann_desc:0 "Toujours plus loin, toujours plus audacieux nous nous aventurons. Le monde, Halann, n'est plus un étranger à observer mais un parent perdu de longue date attendant d'être rencontré et accueilli. Alors qu'attendons-nous ?"
 salla_cenag_across_halann_expedition_tt:0 "Nous avons envoyé une §Yexpédition pour suivre les pas de Corin§! et une §Yexpédition entrant dans la vallée entre de grandes montagnes§!."
 salla_cenag_blood_is_thicker_title:0 "Le Sang Est Plus Épais"
 salla_cenag_blood_is_thicker_desc:0 "Bien que nous Elfes Sylvestres soyons liés par un sang commun, il n'y a pas d'autre clan plus proche de nous que Salla Drennen, le Clan des Épines. Beaucoup de familles de nos peuples s'étendent à travers les deux salla et même nos chefs de clan sont cousines proches. Cependant, cela ne signifie pas que tout a été bien. Il y a seulement quelques années, nos clans étaient ennemis, pris dans la Guerre des Cousins sur le meurtre de parents. Même maintenant, un peu de mauvais sang persiste, quelque chose qui pèse lourdement sur notre Ceanna."
 salla_cenag_two_steps_ahead_title:0 "Deux Pas en Avant"
 salla_cenag_two_steps_ahead_desc:0 "Notre première rencontre avec les orques fut brutale. Avec une force vicieuse et une rage impétueuse, nous fûmes dispersés quand nous les affrontâmes directement pour la première fois. Nos innombrables frères et sœurs tombés rendirent clair que nous ne pouvions les affronter sur leurs termes. Ainsi nous rencontrâmes leurs façons brutales avec ruse. Glissant entre le Royaume-Fée et notre propre réalité, nous pouvons frapper à tout moment, en tout lieu. Et quand ils viennent charger vers nous, ils se retrouveront deux pas derrière..."
 salla_cenag_getting_the_chop_title:0 "Recevoir le Tranchant"
 salla_cenag_getting_the_chop_desc:0 "Misérable et sauvage Clan Sapchopper. Il a souffert mille entailles et son chef Khagor combat encore. Lui et ses brutes continuent de nous traquer comme des animaux et avec le temps, ils pourraient juste nous attraper. Pour cette raison, il est clair pour notre Ceanna que nous devons nous retourner et affronter ces bêtes. Il est temps de les abattre."
 salla_cenag_stubborn_thorns_title:0 "Épines Têtues"
 salla_cenag_stubborn_thorns_desc:0 "Ce fut de Salla Drennen que nous apprîmes à canaliser la faveur des Unseelie en puissantes bénédictions. Des bénédictions qui nous aidèrent à atteindre les hauteurs que nous atteignons maintenant. Il est seulement juste que nous retournions la faveur à nos plus chers amis et cousines. Comme ils nous enseignèrent les voies capricieuses des fées, ainsi leur montrerons-nous les merveilles exotiques du monde extérieur."
 salla_cenag_second_conclave_title:0 "Le Second Conclave"
 salla_cenag_second_conclave_desc:0 "Il n'y a pas longtemps, notre clan était au bord de la destruction. Seul et isolé, nous combattîmes sans savoir si demain signifierait la fin pour notre peuple. Puis vint l'invitation de Narawen Drennen pour un conclave à Elynaile entre les clans. Malgré nos doutes, notre Ceanna choisit d'y assister, ne sachant pas que cela annoncerait un renversement dans nos fortunes. Maintenant, notre propre capitale, autrefois un trou perdu, surpasse Elynaile elle-même ! Les clans se rassemblent une fois de plus non à Salla Elyn, mais à Salla Cenág ! Prouvons-nous dignes hôtes !"
 salla_cenag_ceannasai_title:0 "Ceannasaí"
 salla_cenag_ceannasai_desc:0 "Il n'y a jamais eu qu'une seule Ceannasaí, qu'une seule Commandante des Elfes. Son nom était Liandiel Danse-Lance et ce fut elle qui guida nos ancêtres perdus à travers les Bois-Profonds étranges et dangereux. Mais tandis que nous nous répandîmes à travers les bois, les régiments qui composaient cette armée elfique perdue se brisèrent en clans. Et avec le décès de Liandiel, disparut aussi l'unité elfique. Ou du moins ce que nous pensions.\n\nAvec les Grands Salla restaurés et les liens entre les clans plus forts que jamais, il y a maintenant une clameur pour quelque chose de plus."
 salla_cenag_the_bone_struggle_title:0 "La Lutte des Os"
 salla_cenag_the_bone_struggle_desc:0 "Notre bosquet est rempli d'os d'innombrables créatures. La mort est tout aussi constante que la vie. En cela, nous avons appris à ne tenir rien de sacré autre que les liens de nos proches et notre propre force. Bien que cela nous ait menés à être favorisés par les sombres Unseelie, notre clan a rarement cherché leur bénédiction. Avec l'aide de nos cousines murmurant-aux-fées de Salla Drennen, cette faveur peut offrir quelque chose de plus."
 salla_cenag_kinship_title:0 "Parenté"
 salla_cenag_kinship_desc:0 "Une fois de plus Salla Cenág, Drennen, et Ayeth sont entiers. Un exploit accompli non seul mais ensemble. Peut-être cela ne devrait-il pas surprendre ! Car quels ennemis pourraient tenir contre la puissance combinée des archers à l'œil-perçant d'Ayeth, des infiltrateurs rusés de Cenág, et des druides dévoués de Drennen ? Aucun ! Rassemblons les clans et trinquons à cela !"
 salla_cenag_shoulder_lean_on_title:0 "Une Épaule Sur Laquelle S'Appuyer"
 salla_cenag_shoulder_lean_on_desc:0 "Elaria Ayeth n'est pas du genre aux larmes. Dans son cœur ne réside pas du chagrin froid mais une haine brûlante. Un fait qui inquiète notre Ceanna et son amour Lanhara Ayeth. Une telle émotion déchaînée ne peut rester sans soin. Pour le bien de Salla Cenág et Ayeth, nous devons adresser l'exigence gratuite de vengeance d'Elaria. Ce faisant, peut-être pouvons-nous guérir à la fois Elaria et Salla Ayeth."
 salla_cenag_shoulder_lean_on_fort_tt:0 "Avoir §Y4 provinces§! dans §Yle Bosquet-des-Flèches dans la zone de contrôle d'un fort.§!"
 salla_cenag_on_all_fronts_title:0 "Sur Tous les Fronts"
 salla_cenag_on_all_fronts_desc:0 "Même avec le Voile Verdoyant reculé, il n'est pas entièrement disparu. Les voies vers le Royaume-Fée et retour demeurent à notre portée. Et à la portée de nos ennemis. Il est temps d'arracher le contrôle des voies-de-clairière. Puis, avec nos ennemis isolés, nous les écraserons sur tous les fronts !"
 salla_cenag_on_all_fronts.tt:0 "Si [Root.Monarch.GetName] est un §Ygénéral§!, [Root.Monarch.GetSheHe] gagnera §G1§! compétence mil."
 salla_cenag_shadow_of_grief_title:0 "Ombre du Chagrin"
 salla_cenag_shadow_of_grief_desc:0 "Bien que peut-être pas aussi proche que Salla Drennen, Salla Ayeth a longtemps été un allié traditionnel du nôtre. En effet l'amour de notre propre Ceanna est la petite-fille du Vieux Ferme lui-même : Ceann Irvah Ayeth. Malheureusement la mort de la propre compagne d'Irvah, Vehari Vraie-Flèche, a laissé le Ceann de Salla Ayeth figé dans le chagrin. Nous devons faire ce que nous pouvons pour remuer le Clan des Flèches."
 salla_cenag_swift_arrow_title:0 "Rapide Comme une Flèche"
 salla_cenag_swift_arrow_desc:0 "Aussi fiers que nous soyons de notre habileté à l'arc, nous savons que les plus grands archers seront toujours Salla Ayeth. En partie, c'est dû à l'insistance de leur clan à pratiquer l'arc exhaustivement. L'autre partie, bien qu'ils ne l'admettront jamais, c'est aussi dû à leurs « Flèches Ayeth » uniques, fabriquées à partir de bois touchés-par-les-fées poussant dans leur bosquet. Les récupérer aidera certainement nos efforts collectifs."
 salla_cenag_bonecoated_infiltrators_title:0 "Infiltrateurs Recouverts-d'Os"
 salla_cenag_bonecoated_infiltrators_desc:0 "Lorsque nous partons en guerre, les guerriers de notre clan ont longtemps utilisé de la poudre d'os comme peinture de guerre : à la fois pour nous dissimuler et inspirer la peur chez nos ennemis. Cependant, grâce à notre meilleure compréhension des magies et bénédictions, notre Ceanna croit que nous pourrions utiliser certains os touchés-par-les-fées et un peu de cajolerie fée pour créer un vrai camouflage : un indétectable même par l'œil le plus perçant."
 salla_cenag_swift_arrow_bonus_reward_tt:0 "Nous §Ycéderons§! toutes les provinces que nous contrôlons dans §Yle Bosquet-des-Flèches§! à §YSalla Ayeth§! et gagnerons une §Gunité de Rôdeur§G par province."
 salla_cenag_bodies_and_bones:0 "Corps et Os"
 salla_cenag_bodies_and_bones_desc:0 "Les maudits elfes de Cenág et leur misérable garce nous refusent une bataille appropriée. Les raids et escarmouches constants ont commencé à faire des ravages sur nos guerriers."
 salla_cenag_uneasy_peace_reward:0 "Vivre Ensemble Parmi les Os"
 salla_cenag_uneasy_peace_reward_desc:0 "Pendant des siècles, elfes et gobelins se sont querellés au sein du Bosquet-des-Os, menant souvent à des ajouts aux piles d'os. Ce temps, cependant, semble arriver à sa fin."
 salla_cenag_goblin_tolerance_reward:0 "Aller Au-Delà du Passé"
 salla_cenag_goblin_tolerance_reward_desc:0 "« Corin... elle m'a dit qu'Oubblig a donné sa vie pour l'aider à démolir le Voile. Je ne sais pas si je peux oublier la douleur qu'il a causée. Ou lui pardonner. Mais... je ne m'accrocherai pas au passé... » -Alara Cenág"
 salla_cenag_struggling_together:0 "Lutter Ensemble"
 salla_cenag_struggling_together_desc:0 "Peu de choses rassemblent d'anciens ennemis comme la misère collective. Heureusement, ou malheureusement pour les locaux, le Bosquet-des-Os reste une terre dure avec beaucoup de lutte. Le fossé entre elfe et gobelin est apaisé, sinon oublié, sous le labeur du quotidien."
 salla_cenag_uneasy_peace_intolerance_reward:0 "Pour les Rêves des Tombés"
 salla_cenag_uneasy_peace_intolerance_reward_desc:0 "« Je ne pouvais oublier, je ne pouvais pardonner. Mon frère. Mon clan. Combien moururent aux mains d'Oubblig ? Que pouvais-je faire d'autre que payer sang pour sang ? » -Alara Cenág"
 salla_cenag_far_lands_reward:0 "Naviguer À Nouveau"
 salla_cenag_far_lands_reward_desc:0 "Pour la première fois en mille ans, notre peuple navigue sur la Mer Divenhal. Instable et incertain au début, mais lentement avec plus de confiance. Avec le temps, nous retracerons le voyage de nos ancêtres. Vers les Quais Elfiques à Anbenncost. Vers les villes jumelles de Port Jahar et Brasan. Et, peut-être, vers notre patrie perdue : Aelantir."
 salla_cenag_into_the_unknown_reward:0 "Vers l'Inconnu"
 salla_cenag_into_the_unknown_reward_desc:0 "« Eledas. Arun. Nous l'avons fait. Nous avons quitté ces bois. » -Alara Cenág"
 salla_cenag_across_halann_castanor_reward:0 "Rapport : Escann"
 salla_cenag_across_halann_castanor_reward_desc:0 "[Root.Country.Monarch.GetTitle], au nord fait rage une lutte aussi grande que la nôtre. Des bandes d'aventuriers et des clans d'orques se battent pour le contrôle de la terre connue sous le nom d'« Escann ». Il est peu probable que nous trouvions des alliés pour nous assister à ce jour, mais nous avons réussi à sécuriser quelques connexions. Ci-joint vous trouverez des routes de voyage notables ainsi que des tactiques efficaces utilisées par les aventuriers contre les clans.\n-Cyril Myraeth"
 salla_cenag_across_halann_harpies_reward:0 "Rapport : Harpies"
 salla_cenag_across_halann_harpies_reward_desc:0 "Vents favorables sur toi, cousine ! Pardons pour la salutation étrange, mais j'ai pris goût aux locaux. Pour bonne raison, remarque ! Ils sont connus sous le nom d'« Harpies » et ils sont aussi fantastiques que toute fée de nos bois. Pourquoi demandes-tu ? Pour commencer, ces Harpies sont un peuple entièrement constitué de femelles ! Et elles sont capables de voler ! Sur des ailes emplumées pour s'élancer ici et là avec tant de grâce et de beauté. Beauté qui n'est égalée que face à face ! Bien que j'avais l'intention de revenir avec ce rapport, j'ai décidé de m'attarder ici un peu plus longtemps. Ne t'inquiète pas, [Root.Country.Monarch.GetName], je représenterai notre clan et nos intérêts.\n-Iras Cenág"
 salla_cenag_stubborn_thorns_reward:0 "Soigner les Épines Têtues"
 salla_cenag_stubborn_thorns_reward_desc:0 ""
 salla_cenag_on_all_fronts_reward:0 "Pointe de la Glaive"
 salla_cenag_on_all_fronts_reward_desc:0 ""


 unseelie_challengers_name:0 "Challengers Unseelie"
 unseelie_challengers_title:0 "Challengers Unseelie"
 unseelie_challengers_army:0 "Challengers Unseelie"
 unseelie_challengers_desc:0 "Une bande hétéroclite de guerriers composée de fées, elfes, gobelins et autres habitants des Bois-Profonds qui servent la Cour Unseelie et son Roi. Ils ont été envoyés défier ceux cherchant la bénédiction des Unseelie."
 unseelie_challengers_rebels_demand:0 "Prouvez Votre Valeur !"
 unseelie_challengers_rebels_demand_desc:0 "Cette bande hétéroclite de guerriers exige bataille pour prouver leur propre valeur... et la vôtre..."

 infestation_gnoll_rebels_name:0 "Gnolls Touchés-par-les-Démons"
 infestation_gnoll_rebels_title:0 "Gnolls Touchés-par-les-Démons"
 infestation_gnoll_rebels_army:0 "Gnolls Touchés-par-les-Démons"
 infestation_gnoll_rebels_desc:0 "Longtemps corrompus par les énergies démoniaques s'échappant de la Folie, ces gnolls sans poil sont à peine sentients. Ils ne se rassemblent que le temps de piller et détruire avant de se glisser de retour vers leurs marais."
 infestation_gnoll_rebels_demand:0 "§RTuer. Piller. Détruire.§!"
 infestation_gnoll_rebels_demand_desc:0 "§RGloussements Déments§!"

#Rangers
deepwoods_rangers_button_tt:0 "[Root.GetEstablishRecallRangers]"
deepwoods_rangers_establish_button_tt:0 "Établir Camp de Rôdeurs"
deepwoods_rangers_disable_button_tt:0 "Rappeler les Rôdeurs"
deepwoods_rangers_button_3_ctt:0 "Ce Bosquet peut accueillir jusqu'à §Y3 Camps de Rôdeurs§!."
deepwoods_rangers_button_2_ctt:0 "Ce Bosquet peut accueillir jusqu'à §Y2 Camps de Rôdeurs§!."
deepwoods_rangers_strategy_effect_tt:0 "Appliquer l'effet de la §YStratégie de Rôdeurs§! actuellement choisie."
deepwoods_rangers_camp:0 "Camp de Rôdeurs"
desc_deepwoods_rangers_camp:0 "À la limite de la civilisation, où les flores étranges s'emmêlent et la faune indescriptible rôde, les rôdeurs patrouillent et entraînent leurs apprentis dans des camps toujours en mouvement."
deepwoods_rangers_modifier:0 "Héritage de la Légion Perdue"
deepwoods_rangers_modifier_desc:0 "Même après mille ans, les salla Elfes Sylvestres conservent la tradition martiale de leurs ancêtres Elfes Lunaires et l'ont adaptée aux forêts qu'ils appellent maintenant foyer."

#Ranger Privileges:
estate_adventurers_rangers_use_ranger_pathfinders:0 "Utiliser les Éclaireurs Rôdeurs"
estate_adventurers_rangers_use_ranger_pathfinders_desc:0 "Quelques élus sont envoyés en avant : silencieux, infatigables et invisibles. Ces éclaireurs recrutés parmi les régiments de Rôdeurs guident les armées à travers fourrés et terrains brisés, cartographiant sites d'embuscade potentiels et passages sûrs. Bien que moins de rôdeurs arpentent les étendues sauvages, tous les soldats marchent maintenant avec des yeux plus clairs et des pas plus légers."
estate_adventurers_rangers_ranger_primacy:0 "Primauté des Rôdeurs"
estate_adventurers_rangers_ranger_primacy_desc:0 "Il fut décrété que les armées traditionnelles ne doivent plus être la pierre angulaire de notre puissance militaire. Au lieu de cela, notre avenir réside avec ceux qui connaissent les étendues sauvages mieux que la place d'exercices : les Rôdeurs. Avec chaque clairière qu'ils tiennent et chaque clairière dans laquelle ils disparaissent, nous nous engagerons sur une voie de ruse plutôt que de nombre, de précision plutôt que de force."
deepwoods_rangers_ranger_primacy:0 "Primauté des Rôdeurs"
estate_adventurers_rangers_call_the_hunt:0 "Appeler la Chasse"
estate_adventurers_rangers_call_the_hunt_desc:0 "Les sentiers sont marqués, les caches remplies, et les ordres écrits. Avec toutes les préparations terminées, le réseau de rôdeurs est rendu prêt pour le jour où la Chasse doit être appelée. Avec la préparation en place, les camps dispersés peuvent être rallié rapidement : transformant gardiens vigilants en une marée de flèches aiguisées."
enable_estate_action_CALL_THE_HUNT_ACTION_tt:0 "[Root.EnableEstateDecisionText] §Y[Root.GetAdventurersName] : Appeler la Chasse§!"
disable_estate_action_CALL_THE_HUNT_ACTION_tt:0 "[Root.DisableEstateDecisionText] §Y[Root.GetAdventurersName] : Appeler la Chasse§!"
CALL_THE_HUNT_ACTION_title:0 "[Root.GetAdventurersName] : Appeler la Chasse"
CALL_THE_HUNT_ACTION_desc:0 "Un cor sonne des arbres hauts et l'appel se répand de camp en camp. La Chasse commence. À travers clairières et bosquets, chaque rôdeur capable répond, faisant sortir ceux cachés parmi les bois pour gonfler les rangs."
call_the_hunt_effect_tt:0 "Gagnez §G0,1§! Années de Force Militaire pour chaque §YCamp de Rôdeurs§!, jusqu'à un maximum de §G2§! Années de Force Militaire à §Y20§! Camps de Rôdeurs."
estate_adventurers_rangers_ayeth_strategy:0 "Stratégie Ayeth"
estate_adventurers_rangers_ayeth_strategy_desc:0 "Née de l'héritage amer de Salla Ayeth, cette stratégie se concentre sur transformer chaque clairière en piège et chaque piste en blessure saignante. Créée en suivant les pas d'Elaria Ayeth, les rôdeurs sont instruits non de combattre pour récupérer la terre, mais de faire regretter aux envahisseurs d'y avoir jamais mis le pied, frappant les ennemis et disparaissant dans l'obscurité avant que la représaille ne puisse les trouver."
deepwoods_rangers_ayeth_strategy_mod:0 "Stratégie Ayeth"
deepwoods_rangers_ayeth_strategy_tt:0 "Chaque province possédée avec un §YCamp de Rôdeurs§! ou adjacente à un §YCamp de Rôdeurs§! reçoit '§YStratégie Ayeth§!' jusqu'à la fin de la partie, donnant les effets suivants :\nAttrition pour Ennemis : §G+2,00§!\nVitesse de Mouvement Hostile : §G-25,0 %§!\nAttrition Hostile Maximale : §G+2,00§!"
estate_adventurers_rangers_scotha_strategy:0 "Stratégie Scotha"
estate_adventurers_rangers_scotha_strategy_desc:0 "Stratégie Scotha - description provisoire"
deepwoods_rangers_scotha_strategy_mod:0 "Stratégie Scotha"
deepwoods_rangers_scotha_strategy_tt:0 "Chaque province possédée avec un §YCamp de Rôdeurs§! produisant §YÉpices§!, §YSucre§!, §YSoie§!, §YTissu§!, §YIvoire§! ou §YTeintures§! reçoit '§YStratégie Scotha§!' jusqu'à la fin de la partie, donnant les effets suivants :\nRevenu Fiscal Annuel : §G+3,00§! ¤\nModificateur de Valeur Commerciale : §G+25,0 %§!"
estate_mages_rangers_drennen_strategy:0 "Stratégie Drennen"
estate_mages_rangers_drennen_strategy_desc:0 "Inspirée par le Bosquet-des-Épines, cette stratégie se plante sur une coopération entre druides et rôdeurs. Les camps ne servent pas seulement de postes de guet des établissements, mais sont intégrés dans la terre elle-même, la magie des druides transformant les sentiers forestiers en enfer pour tout envahisseur potentiel."
deepwoods_rangers_drennen_strategy_mod:0 "Stratégie Drennen"
deepwoods_rangers_drennen_strategy_tt:0 "Chaque province possédée avec un §YCamp de Rôdeurs§! reçoit '§YStratégie Drennen§!' jusqu'à la fin de la partie, donnant les effets suivants :\nDéfensive Locale : §G+20,0 %§!\nEntretien de Fort Local : §G-20,0 %§!"
estate_adventurers_rangers_scotha_strategy:0 "Stratégie Scotha"
deepwoods_ranger_strategy_cooldown:0 "Nous n'avons pas choisi de §YPrivilège de Stratégie de Rôdeurs§! dans les dernières §Y10 années§!."