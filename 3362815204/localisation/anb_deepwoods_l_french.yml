 desc_hunt_lord_sharpen_my_wit:0 "Votre esprit a été aiguisé."
 hunt_lord_let_me_be_beautiful:0 "Rendez-moi beau"
 desc_hunt_lord_let_me_be_beautiful:0 "Vous êtes beau."
 hunt_lord_see_the_truth:0 "Permettez-moi de voir la vérité"
 desc_hunt_lord_see_the_truth:0 "Vous pouvez discerner la vérité du mensonge."
 hunt_lord_show_the_future:0 "Montrez-moi ce que l'avenir réserve"
 desc_hunt_lord_show_the_future:0 "Vous avez aperçu ce que l'avenir réserve."
 hunt_lord_temp_adm_injury:0 "Blessure"
 desc_hunt_lord_temp_adm_injury:0 "Vous avez été blessé en chassant le Seigneur des Bêtes."
