 I45_cluster_1_title:0 "Bosquet du Lac"
 I45_cluster_1_desc:0 "Le Lac Silencieux du Clan Elyn est depuis longtemps réputé comme l'un des bosquets les plus paisibles, du moins le long de ses rives. Elynáyle, la capitale traditionnelle, a longtemps été un lieu où les elfes viennent revivre avec nostalgie les jours passés sur la flotte survivante. Ses habitants passent leurs journées à naviguer sur les eaux placides et à pêcher dans ces eaux poissonneuses à leur guise. Contrairement à ce que l'on pourrait attendre de la Forêt Féerique, les eaux libres du lac lui-même ne présentent aucune menace significative pour la vie ou l'intégrité physique.\n\nLa rive méridionale se caractérise par un caractère plus marécageux, avec d'imposants léviathans semblables à des mangroves s'élevant des eaux, créant un enchevêtrement de racines bien plus périlleux que les eaux libres. La partie la plus méridionale du bosquet, près de Sáwelahain, a longtemps été un bastion gobelin, bien que la rive du lac soit demeurée elfique depuis les conquêtes initiales."
 I45_cluster_2_title:0 "Bosquet de la Montagne"
 I45_cluster_2_desc:0 "Le Bosquet de la Montagne du Clan Myna est depuis longtemps apprécié comme l'unique endroit où la terre perce les cieux et s'affranchit de l'obscurité oppressante des canopées forestières. Leur fière demeure montagnarde est sculptée dans les grottes où les elfes effrayés, piégés dans la forêt, trouvèrent d'abord refuge. Ses cavernes et ses versants abritent de nombreuses habitations taillées à la main qui ont été continuellement occupées pendant presque toute la durée de la présence des elfes dans le bois.\n\nLes Myna se sont longtemps dressés comme un phare de la culture des Elfes Sylvestres, au-dessus du reste tant par leur valeur que par leur élévation. Les bois du bosquet sont largement ordinaires, plus paisibles que la plupart grâce à leur proximité avec la lisière de la forêt. Bien qu'il faille garder à l'esprit que « paisible » peut avoir une mesure bien différente dans les Bois-Profonds."
 I45_cluster_3_title:0 "Bosquet des Épines"
 I45_cluster_3_desc:0 "Le Bosquet des Épines de Drennen se trouve au cœur des Bois-Profonds. Il constitue peut-être la partie la plus ouvertement menaçante de la forêt. Bien que ronces et épines ne soient rien d'inhabituel dans quelque partie du bois que ce soit, même les arbres prennent une apparence tordue et épineuse aussi profondément dans les bosquets. Bien que parfaitement nettoyé des gobelins et autres rivaux des elfes, la région était peut-être l'une des plus fermement tenues par les fées. L'emprise des esprits est depuis longtemps assez ferme, avec des sentiers, et même des villages entiers semblant passer d'un plan à l'autre du plan matériel selon leur bon vouloir."
 I45_cluster_4_title:0 "Bosquet des Os"
 I45_cluster_4_desc:0 "Le Bosquet des Os est depuis longtemps le foyer du Clan Cenág, l'un des moins nombreux mais des plus soudés parmi les clans elfiques. Bien que tout elfe sylvestre apprenne rapidement à naviguer dans l'enchevêtrement de racines et de fougères qui composent les sentiers des Bois-Profonds, dans le Bosquet des Os, ils sont également contraints d'apprendre à garder leur équilibre lorsque des fémurs et des tibias abandonnés s'ajoutent au mélange, et à surveiller les tanières d'os et de crânes au centre de nombreuses clairières. Malgré le danger que représentent les accumulateurs d'ossements qui habitent ces étranges demeures, ce bosquet a également longtemps abrité l'une des plus grandes concentrations de gobelins subsistant dans la forêt."
 I45_cluster_5_title:0 "Bosquet des Fleurs"
 I45_cluster_5_desc:0 "Un nom comme « Bosquet des Fleurs » mettrait sûrement l'esprit à l'aise... Ne serait-ce pas l'un des plus charmants des bois ? Avec ces bulbes doucement lumineux qui lui donnent de la lumière, avec les couleurs vibrantes des fleurs éternellement en floraison. Les Scotha le qualifieraient effectivement de charmant. Mais qui n'adore pas son foyer ? Peu d'autres le feraient, car les fleurs n'ont mérité le nom du bosquet que grâce au grand danger qu'elles représentent.\n\nTout habitant du bosquet doit se faire botaniste, voire alchimiste, tant il est aisé de trouver le danger dans sa belle flore. Des fruits d'apparence amicale capables de pourrir les entrailles, aux pollens qui plongent l'esprit dans toutes sortes de brumes étranges, même un pas mal jugé peut faire jaillir des épines chargées des toxines les plus puissantes de Cannor à travers la semelle de la botte d'un voyageur."
 I45_cluster_6_title:0 "Bosquet du Chasseur"
 I45_cluster_6_desc:0 "Le Bosquet du Chasseur abrite les bêtes les plus puissantes et les plus tordues des Bois-Profonds. Ceux qui osent tenter de l'apprivoiser deviennent rapidement des guerriers rivalisant même avec les envahisseurs orques de la forêt en puissance. À condition qu'ils survivent, bien entendu. Foyer du Clan Fealgarn, le bosquet offre peut-être les chasses les plus sportives de tout Cannor. Les animaux de compagnie géants et difformes des fées se fracassent à travers les bois, brisant les arbres anciens tandis qu'ils traquent leur proie avec des griffes venimeuses, avec des rangées de dents si nombreuses qu'on pourrait difficilement les compter avant d'être emporté par elles."
 I45_cluster_7_title:0 "Bosquet de la Flèche"
 I45_cluster_7_desc:0 "L'étymologie exacte du Bosquet de la Flèche des Ayeth est disputée. Est-ce pour le bois fin employé dans la fabrication des flèches ? Ou est-ce le fait que les flèches ont longtemps été la seule arme fiable, quand un seul faux pas sur le sol traître pourrait vous précipiter vers votre perte ? Les cavernes calcaires sous cette partie du bois ont érodé le sol forestier en un labyrinthe de cavernes, tunnels et ravins trop traîtres pour être navigués.\n\nIl est bien plus sûr de traverser la canopée, bondissant à travers les branches, se balançant le long des lianes, que de risquer le labyrinthe traître en contrebas, où un faux pas pourrait vous envoyer chuter aussi longtemps que depuis la canopée jusqu'au sol ferme. Même la plupart des fées hésitent à violer la terre traître du bosquet, car les horreurs qui rôdent en dessous promettent certains des destins les plus tortueux que le monde naturel offre en dehors de la Jungle Effelai."
 I45_cluster_8_title:0 "Bosquet de la Rivière"
 I45_cluster_8_desc:0 "Peut-être le plus sincèrement tranquille et agréable des bosquets, du moins dans les jours passés, le Bosquet de la Rivière Ahain était, jusqu'à la venue de la Marée Verte, un rare bastion d'harmonie naturelle dans les Bois-Profonds. Elfes, gobelins et certaines des populations de satyres les plus importantes des Bois vivaient paisiblement côte à côte. Il est même dit que quelques ancêtres survivants des centaures avaient été aperçus y vivant paisiblement, de temps à autre.\n\nLa région abritait depuis longtemps certaines des fées les moins courroucées, résultant en la disposition de la terre pour des bosquets de fruits abondants et des rivières grouillant d'une abondance de poissons, autour desquels la plupart des colonies étaient regroupées. Tandis que la forêt se remet de l'assaut orque, on ne peut que prier pour que cette paix et cette abondance puissent revenir."
 I45_cluster_9_title:0 "Bosquet de l'Ombre"
 I45_cluster_9_desc:0 "Ghul, le Bosquet de l'Ombre. Foyer du clan de ce nom, ce coin reculé de la forêt a longtemps été le mouton noir des Bois-Profonds. Ombragé par l'étreinte des pics imposants de l'Échine-du-Serpent sur deux côtés, et une canopée impénétrablement épaisse de feuilles noires au-dessus, la région était d'un noir de jais, avec même les sources de la rivière Jorkad totalement ombragées dans leur écoulement, pas un rayon de lumière à voir le long de ses eaux désespérément précipitées.\n\nLes elfes sinistres de Ghul sont réputés non seulement pour apaiser les Infélices dans leurs perversions et leurs caprices sombres, mais même pour prendre des voyageurs en apaisement aux fées Arbre-de-Cendres vicieusement misanthropes, leurs pratiques obscures étant un chemin vers de nombreuses capacités que certains considèrent comme contre-nature."
 I45_securize_the_border_title:0 "Sécuriser la frontière"
 I45_securize_the_border_desc:0 "Suite à l'émergence de la Marée Verte, nombre des clairières menant aux Bois-Profonds furent abandonnées. Nous devons remédier à cela en établissant le contrôle sur les sentiers extérieurs. Ce faisant, nous assurerons la sûreté et la sécurité des Bois-Profonds contre d'autres envahisseurs extérieurs potentiels."
 I45_the_oak_guard_title:0 "La Garde du Chêne"
 I45_the_oak_guard_desc:0 "Ayant pris le contrôle des clairières extérieures, nous devrions rétablir la Garde du Chêne. Cette unité maintiendra une vigilance constante sur les sentiers menant aux Bois-Profonds, assurant ainsi que nos terres seront adéquatement défendues contre quiconque oserait tenter de violer notre patrie sylvestre."
 I45_cyranvar_renaissance_title:0 "Renaissance de Cyranvar"
 I45_cyranvar_renaissance_desc:0 "La décision d'améliorer la capitale s'est révélée providentielle. Même à présent, des foules de marchands et d'autres peuples de tout Cannor ont commencé à s'engager avec notre royaume en masse. Nous devrions nous assurer que cet engagement sera bénéfique pour l'état en adoptant l'une des coutumes ou institutions que le monde extérieur a innovées."
 I45_develop_infrastructure_title:0 "Développer les infrastructures"
 I45_develop_infrastructure_desc:0 "La destruction causée par la Marée Verte a laissé les Bois-Profonds dévastés. Si nous voulons avoir le moindre espoir de créer un état capable de résister aux menaces qui nous entourent, nous devons inverser cela. Développons le royaume pour que nos ancêtres puissent être fiers et nos ennemis se méfient de penser à des pensées d'invasion !"
 I45_promote_education_title:0 "Promouvoir l'éducation"
 I45_promote_education_desc:0 "Les besoins toujours croissants de l'état nécessitent une quantité presque inépuisable de bureaucrates bien éduqués. Afin de nous assurer que notre population soit capable de combler cette demande, nous établirons des instituts d'enseignement supérieur à travers Cyranvar."
 I45_only_the_best_title:0 "Seuls les meilleurs"
 I45_only_the_best_desc:0 "Notre décision de poursuivre une politique d'isolement forcé repose sur le maintien d'une armée permanente hautement élitiste. Bien que chacun soit censé suivre un entraînement militaire afin de pouvoir être rappelé en temps de besoin urgent, seuls les meilleurs parmi nous sont aptes à servir dans l'armée permanente. Cela garantit que nous avons un sérieux avantage militaire sur nos rivaux, mais cela signifie également que remplir nos rangs pour remplacer nos soldats tombés est difficile."
 I45_a_safe_country_title:0 "Un pays sûr"
 I45_a_safe_country_desc:0 "Dans le cadre de notre politique continue d'isolement, des figures dirigeantes de notre établissement militaire ont appelé à l'adoption d'une stratégie d'engagement préventif. Ils soutiennent que frapper au-delà de nos frontières pour étouffer les menaces montantes est supérieur à une politique de défense réactive. La véracité de leur argument a touché une corde sensible chez le Haut Roi. Nous devons écraser les menaces qui émergent avant qu'elles ne puissent nuire à notre patrie !"
 I45_the_model_elf_title:0 "L'elfe modèle"
 I45_the_model_elf_desc:0 "En décidant de poursuivre l'isolement, notre état a dû éduquer minutieusement la population sur les avantages de celui-ci. Une partie de cette éducation repose sur une politique de service obligatoire, connue familièrement sous le nom de programme « Elfe Modèle ». Nos citoyens savent que ce n'est qu'en étant totalement dévoués à Cyranvar que l'état prospérera et la sécurité du pays sera préservée. Cela garantit que nous bénéficions de certains avantages économiques et militaires dont la plupart des états manquent."
 I45_demand_the_oak_oath_title:0 "Exiger le serment du Chêne"
 I45_demand_the_oak_oath_desc:0 "La destruction des envahisseurs orques nous a placés dans la position de plus grande prééminence parmi les états Elfes Sylvestres subsistants. Nous exigerons un serment de fidélité des rois subsistants afin d'unir notre peuple pour la première fois de l'histoire. Tous ceux qui refuseraient bêtement cette généreuse offre seront mis au pas par la force."
 I45_a_capital_city_title:0 "Une cité capitale"
 I45_a_capital_city_desc:0 "Alors que Cyranvar se fond en un véritable état, notre capitale manque cruellement en comparaison des autres grandes cités de Cannor. Si nous voulons vraiment assumer une nouvelle position d'importance, nous devons rénover la capitale pour refléter l'orientation future de notre glorieux état."
 I45_toward_the_future_title:0 "Vers l'avenir"
 I45_toward_the_future_desc:0 "L'unification des Bois-Profonds et l'établissement de la Monarchie du Chêne offrent à notre roi l'opportunité unique de décider de la direction du peuple Elfe Sylvestre. Les partisans de la ligne dure parmi nous plaident pour une politique d'isolement strict afin de s'assurer que quelque chose comme la Marée Verte n'arrive plus jamais. Ceux aux attitudes plus libérales voient les merveilles que Cannor a à offrir et plaident pour l'adoption d'une politique plus ouverte. Les deux directions auront de sérieuses conséquences pour l'avenir de Cyranvar, choisissez sagement, éminence !"
 I45_remember_the_fallen_title:0 "Se souvenir des disparus"
 I45_remember_the_fallen_desc:0 "Tandis que Cyranvar continue de se développer, nous ne devons jamais oublier nos ancêtres. C'est par leur sacrifice désintéressé que notre peuple fut sauvé. Sans eux, la Marée Verte nous aurait détruits. Alors que le royaume se développe, nous devons commémorer leur bravoure par de grandes œuvres érigées en leur honneur."
 I45_economic_boom_title:0 "Essor économique"
 I45_economic_boom_desc:0 "De la nourriture sur chaque table ! Nos politiques économiques se sont révélées être un succès retentissant. L'économie a atteint des niveaux de prospérité que nous pensions impossibles, et l'état en bénéficiera grandement !"
 I45_silvar_ishu_title:0 "Silvar Ishu"
 I45_silvar_ishu_desc:0 "En choisissant de nous isoler de Cannor, nous en sommes venus à développer une relation enracinée dans l'équilibre avec les Bois-Profonds. Toutes les actions de notre royaume reposent sur le respect des limites et frontières de notre patrie forestière. Cela a grandement approfondi nos liens avec les fées et esprits de la terre, qui ont pris l'habitude de nous appeler les « Silvar Ishu » ou Enfants de la Forêt."
 I45_to_another_forest_title:0 "Vers une autre forêt"
 I45_to_another_forest_desc:0 "Au cours des mille dernières années et plus, les elfes des Bois-Profonds n'ont jamais connu une telle prospérité. Avec la richesse viennent de nouvelles ambitions. De nouveaux désirs de repousser les limites. Une telle audace a mené un aventurier vers un lieu où nul elfe n'est allé... le cœur des Bois-Profonds."
 I45_under_the_canopy_title:0 "Sous la canopée"
 I45_under_the_canopy_desc:0 "Sous la canopée ombragée des Bois-Profonds, notre peuple prospère ! Des siècles se sont écoulés depuis la dévastation de la Marée Verte, pourtant grâce à notre règne bienveillant, Cyranvar est désormais l'envie de Cannor. Notre économie est florissante, le commerce continue de s'épanouir et nul n'oserait défier notre puissance militaire ! Plus jamais les Elfes Sylvestres ne souffriront sous le joug d'envahisseurs étrangers, car nous avons assumé notre position légitime parmi les peuples du monde !"
 I45_toward_unification_title:0 "Vers l'unification"
 I45_toward_unification_desc:0 "Bien que Cyranvar soit de loin le royaume le plus dominant dans les Bois-Profonds, nous n'avons pas encore exercé un contrôle total sur notre patrie. Nous devons remédier à cela en amenant quiconque pourrait résister à nos desseins à la soumission. C'est seulement par l'unification que nous pouvons espérer atteindre notre place légitime à Cannor."
 I45_a_united_deepwoods_title:0 "Bois-Profonds unis"
 I45_a_united_deepwoods_desc:0 "À travers d'innombrables guerres et de grandes luttes, nous sommes parvenus à unir l'entièreté des Bois-Profonds sous notre règne. Des plans ont commencé à émerger pour élever le statut de notre royaume nouvellement unifié, le temps dira quelle direction notre état poursuivra."
 I45_a_high_king_title:0 "Un Haut Roi"
 I45_a_high_king_desc:0 "Avoir réussi à unir l'entièreté de notre patrie sylvestre a permis à notre monarque d'assumer véritablement une position d'importance. La Monarchie du Chêne a été établie, annonçant un nouveau chapitre pour notre peuple sous le règne illustre du Haut Roi des Elfes Sylvestres."
 I45_the_keys_to_rule_title:0 "Les clés du pouvoir"
 I45_the_keys_to_rule_desc:0 "Avec la progression du temps et l'évolution des attitudes politiques et culturelles, notre état se trouve désormais à un carrefour. Une division sérieuse est apparue parmi le peuple concernant la nature de la Monarchie du Chêne. Certains plaident pour que le Haut Roi assume une position d'autorité absolue, assurant que l'état demeure fort. D'autres suggèrent qu'un parlement ou quelque autre corps délégatif soit établi, diminuant le pouvoir du roi et remettant l'autorité à des officiels élus. Ils soutiennent que cela garantirait que le monarque demeure légitime et permettrait le développement d'un état plus dynamique. Quelle que soit la direction que le roi choisisse, une décision doit être prise maintenant."
 I45_develop_artisanat_title:0 "Développer l'artisanat"
 I45_develop_artisanat_desc:0 "En choisissant de poursuivre une politique d'ouverture, nous devons nous assurer que notre économie ne devienne pas dominée par nos voisins. Pour éviter cet esclavage économique potentiel, le royaume interviendra partout où nécessaire pour assurer le développement d'un Cyranvar fort et florissant quel qu'en soit le coût."
 I45_centralize_money_printing_title:0 "Centraliser la frappe monétaire"
 I45_centralize_money_printing_desc:0 "Notre politique de soutien à l'artisanat a été un succès retentissant. Pourtant malgré cela, les fournisseurs privés d'argent exercent une influence indue sur notre économie, ce qui est une préoccupation croissante. Nous devons exercer notre contrôle en devenant le seul fournisseur de monnaie. Cela garantira que l'argent continue de circuler, bien que nous puissions rencontrer quelques défis..."
 I45_one_of_many_title:0 "Un parmi tant d'autres"
 I45_one_of_many_desc:0 "En poursuivant une politique d'ouverture, notre peuple en est venu à valoriser le commerce et la production par-dessus tout. En conséquence, l'influence exercée par les classes marchandes a conduit à un changement qualitatif sur notre culture, cela est plus évident dans les affaires militaires. En temps de guerre, tous sont censés servir et faire leur devoir, pourtant aucune place n'est accordée à la bravade ou à la grandeur individuelle. Chaque soldat n'est qu'un parmi tant d'autres."
 I45_expert_artisan_title:0 "Artisans experts"
 I45_expert_artisan_desc:0 "L'habileté de nos artisans est incomparable. Nulle part à travers Cannor ne peut-on trouver des individus de qualité comparable. Les artisans se sont révélés être un succès retentissant, car les générations futures sont capables de continuer à améliorer les compétences héritées de leurs maîtres."
 I45_the_cosmopolitan_elf_title:0 "L'elfe cosmopolite"
 I45_the_cosmopolitan_elf_desc:0 "Les traditions de nos ancêtres se sont révélées incapables de s'adapter au monde en rapide changement autour de nous. En cherchant à ouvrir nos frontières et à nous engager avec le continent dans son ensemble, notre économie a prospéré et une société plus égalitaire s'est développée. Plus jamais aucun individu ne se sentira tenu par les traditions honorées par le temps. Au lieu de cela, nous sommes un peuple véritablement cosmopolite, disposé et capable d'adopter les meilleures pratiques de toutes les cultures."
 I45_internal_trade_title:0 "Commerce intérieur"
 I45_internal_trade_desc:0 "L'ouverture des Bois-Profonds a sérieusement entravé notre capacité à profiter des fruits de notre labeur. Si nous voulons avoir le moindre espoir de voir le commerce prospérer sur notre terre, nous devons limiter la capacité des marchands étrangers à exploiter nos ressources. Nous devons adopter tous les moyens nécessaires pour avantager nos marchands et limiter la capacité des marchands étrangers prédateurs à nous exploiter."
 I45_a_protectionism_approach_title:0 "Une approche protectionniste"
 I45_a_protectionism_approach_desc:0 "Nos mesures pour protéger le commerce intérieur se sont révélées inadéquates. Même avec de sérieuses barrières au commerce, les étrangers continuent d'exploiter notre pauvre position économique. Des barrières plus dures doivent être érigées de peur que nous ne devenions esclaves des intérêts économiques étrangers. Nous allons rendre les Bois-Profonds grands à nouveau !"
 I45_eordand_colonizing_title:0 "Coloniser les bois mystérieux"
 I45_eordand_colonizing_desc:0 "Fournir des provisions et du soutien aux clans mineurs pour coloniser les bois mystérieux que nous avons découverts."
 wood_elf_nation_title:0 "Unir les Bois-Profonds !"
 wood_elf_nation_desc:0 "Nous avons finalement écrasé la Marée Verte et assumé une position de domination parmi les divers royaumes Elfes Sylvestres. Notre [Root.Monarch.GetTitle] voit l'opportunité présentée par ceci, et a appelé à ce que le Pacte Verdoyant soit unifié en un véritable état pour le peuple Elfe Sylvestre. Naturellement, nos vassaux seront absorbés dans le processus et nous serons capables de presser notre revendication sur les portions de notre patrie qui demeurent hors de notre portée. Glorieux sera le nouveau royaume de Cyranvar !"
 unite_deepwoods_tooltip:0 "§GNous intégrerons tous nos vassaux Elfes Sylvestres dans les Bois-Profonds.§!"
 glade_colonisation_title:0 "Expansion des clairières"
 glade_colonisation_desc:0 "Nous ouvrirons une connexion dans l'une des clairières voisines et établirons un avant-poste frontalier dans la zone."
 deepwoods_surroundings_exploration_title:0 "S'aventurer au-delà des Bois-Profonds"
 deepwoods_surroundings_exploration_desc:0 "Nous financerons des expéditions pour explorer les terres en dehors des Bois-Profonds."
 forest_goblin_cartel_nation_title:0 "Former le Cartel"
 forest_goblin_cartel_nation_desc:0 "Trop longtemps, nous Gobelins des Forêts avons été brutalisés et commandés. Maintenant nous détenons le pouvoir et, plus important, la pièce. Il est temps que nous nous réorganisions en une organisation appropriée. Une dédiée à cimenter notre pouvoir et remplir nos bourses. Formons le Cartel Soyzkaru !"
 forest_goblin_pactseeker_nation_title:0 "Restaurer le Pacte"
 forest_goblin_pactseeker_nation_desc:0 "Autrefois, il y eut un grand royaume gobelin au sein des Vieux-Bois, la forêt connue avant les Bois-Profonds. Il aurait dû résister à l'épreuve du temps, mais fut perdu à cause de l'orgueil lorsque nos ancêtres brisèrent le Pacte. Mais ce qui fut autrefois perdu ne sera plus perdu. Restaurons le Pacte et notre royaume avec lui !"
 deepwoods_orc_nation_choice_title:0 "Écouter les murmures de la forêt"
 deepwoods_orc_nation_choice_desc:0 "Alors que nous sommes devenus toujours plus puissants dans ces bois étranges, des murmures étranges ont également grandi toujours plus forts dans l'oreille de [Root.Monarch.GetName]. D'abord, ce n'était qu'une brise lointaine. Maintenant ils sont un coup de vent obsédant. Pour le bien de [Root.GetName], notre [Root.Monarch.GetTitle] doit trouver la source de ces murmures."
 deepwoods_orc_reform_karakhanbar_title:0 "Rallumer le Foyer Noir"
 deepwoods_orc_reform_karakhanbar_desc:0 "Parmi les plus grandes des créations orques, le Foyer Noir était une forge magique, créée par les chamans du clan Lune-Noire pour forger des armes qui abattirent même les plus redoutables bêtes des anciens Bois-Profonds. Hélas, la forge s'est éteinte, envahie par la végétation sauvage. Mais le feu de l'Âme Orque ne peut jamais être véritablement éteint..."
 deepwoods_orc_reform_tugund_darakh_title:0 "Embrasser le Prince"
 deepwoods_orc_reform_tugund_darakh_desc:0 "Mille ans de complots, et pourtant la vengeance du Prince Noirci demeure inassouvie. Tugund-Darakh, la terre aux mille arbres, a été abattue. Pourtant il y a toujours des plans dans les plans. Entendez l'appel du Prince. Devenez l'arme des déchus. Arrosez la terre du sang des enfants de Castan. Croissez à nouveau."
 deepwoods_verdant_pact:0 "Le Pacte Verdoyant"
 desc_deepwoods_verdant_pact:0 "Le Pacte Verdoyant est un pacte d'alliance qui lie toutes les nations Elfes Sylvestres des Bois-Profonds, pour affronter les envahisseurs ennemis et se protéger mutuellement."
 deepwoods_settled_refugee:0 "Réfugié installé"
 deepwoods_verdant_army:0 "Armée Verdoyante"
 deepwoods_safe_wood:0 "Lien Verdoyant sous contrôle"
 deepwoods_safe_wood_tt:0 "Le modificateur « Lien Verdoyant sous contrôle » est déjà permanent."
 deepwoods_fight_for_the_wood:0 "Combattre pour les bois"
 deepwoods_overlord:0 "Suzerain elfique"
 verdant_link:0 "Lien Verdoyant"
 fey_abundant_goods:0 "Ressources cultivées"
 desc_fey_abundant_goods:0 "Ces provinces sont bien plus productives, grâce à notre coexistence avec les fées !"
 fey_dummy_goods:0 "Ressources non cultivées"
 desc_fey_dummy_goods:0 "Ces provinces peuvent donner bien plus, si seulement une culture harmonisée aux fées y vivait.\n\n§TLes cultures harmonisées aux fées incluent les Elfes Sylvestres, les Gobelins des Forêts Chercheurs de Pacte, les Orques Émeraude, les Nés-des-Ruines Éordans et les Centaures Avil.§!"
 fey_abundant_goods_improved:0 "Haute culture des bois"
 desc_fey_abundant_goods_improved:0 "Grâce à nos efforts, cette province est un parangon de l'artisanat des Bois-Profonds."
 is_fey_attuned_culture_tooltip:0 "Possède une culture harmonisée aux fées\n\n§TLes cultures harmonisées aux fées incluent les Elfes Sylvestres, les Gobelins des Forêts Chercheurs de Pacte, les Orques Émeraude, les Nés-des-Ruines Éordans et les Centaures Avil.§!"
 desc_verdant_link:0 "Cette province fait partie du Lien Verdoyant, un chemin stable résiduel entre notre plan et le Royaume Féerique.\n\n§TLes provinces du Lien Verdoyant sont toutes connectées les unes aux autres, permettant le voyage entre elles et empêchant la construction de forts.§!"
 cyranvar_the_oak_guard:0 "La Garde du Chêne"
 cyranvar_renaissance:0 "Renaissance de Cyranvar"
 cyranvar_develop_infrastructure:0 "Développement des infrastructures"
 cyranvar_advisor:0 "Éducation promue"
 cyranvar_only_the_best:0 "Seuls les meilleurs"
 cyranvar_one_of_many:0 "Un parmi tant d'autres"
 cyranvar_the_model_elf:0 "L'elfe modèle"
 cyranvar_the_cosmopolitan_elf:0 "L'elfe cosmopolite"
 cyranvar_economic_boom:0 "Essor économique"
 cyranvar_under_the_canopy:0 "Sous la canopée"
 cyranvar_artisan:0 "Artisanat de Cyranvar"
 cyranvar_centralize_money:0 "Flux monétaire contrôlé"
 cyranvar_absolute_ruler:0 "Un roi absolu"
 WOOD_reclaim_the_emerald_path_title:0 "Reconquérir le Lien Verdoyant"
 WOOD_reclaim_the_emerald_path_desc:0 "Si notre peuple veut avoir le moindre espoir de repousser ces envahisseurs des Bois-Profonds, nous devons nous assurer que l'entièreté du Lien Verdoyant repose entre mains Elfes Sylvestres. Les viles Peaux-Vertes les utilisent pour continuer à lancer leurs incessants raids au cœur de nos terres. Nous devons les saisir pour mettre fin à ces raids et les mettre sur la défensive !"
 WOOD_own_the_emerald_path_title:0 "Contrôler le Lien Verdoyant"
 WOOD_own_the_emerald_path_desc:0 "Même avec l'entièreté du Lien Verdoyant reposant entre les mains du Pacte, les raids continuent lorsque le conflit s'embrase. Le laxisme de nos alliés dans la protection des Liens nécessite un changement de politique. Nous devons personnellement assumer le contrôle du Lien Verdoyant, alors seulement la sûreté et la sécurité de notre royaume seront assurées. Cela aura l'avantage supplémentaire de nous offrir un sérieux avantage sur nos compatriotes une fois que les Peaux-Vertes auront été chassées de nos terres."
 WOOD_the_verdant_pact_title:0 "Le Pacte Verdoyant"
 WOOD_the_verdant_pact_desc:0 "L'assaut soudain des Peaux-Vertes a pris notre peuple complètement au dépourvu. Afin de monter une défense appropriée de nos terres, les divers chefs et petits rois formèrent le Pacte Verdoyant pour coordonner l'effort de guerre. Nous devons approfondir nos liens avec les divers royaumes Elfes Sylvestres dans un effort pour forger un front uni plus fort, afin que nous puissions commencer à monter une offensive contre les vils orques."
 WOOD_settle_the_refugees_title:0 "Installer les réfugiés"
 WOOD_settle_the_refugees_desc:0 "Lorsque la Marée Verte commença d'abord, nombre des royaumes de notre peuple furent pris complètement au dépourvu. Avant qu'ils ne puissent même monter une résistance efficace, ils furent anéantis. Peu importe ce que la vieille garde dans le royaume pourrait grommeler à présent, nous sommes Elfes Sylvestres avant tout. Les loyautés de clan et les vieilles querelles n'ont pas leur place face à cette menace. À cette fin, les quelques âmes qui survécurent à la dévastation infligée doivent être réinstallées afin que nous puissions bénéficier de leur expertise dans les temps difficiles à venir."
 WOOD_invest_in_capital_title:0 "Investir dans la capitale"
 WOOD_invest_in_capital_desc:0 "Alors que l'ampleur du conflit grandit, nous avons accueilli une quantité toujours croissante de réfugiés. Au-delà de cela, les besoins de l'état continuent de croître. Nous devons agrandir la capitale tout en améliorant nos installations existantes. Cela garantira que les réfugiés et notre propre peuple ne manquent pas de commodités tout en nous fournissant des ressources supplémentaires dont nous avons grand besoin."
 WOOD_prosperous_capital_title:0 "Capitale prospère"
 WOOD_prosperous_capital_desc:0 "Nos investissements ont porté leurs fruits, car la capitale se dresse comme un témoignage de la volonté et de la détermination du peuple. Même à présent, un nouveau commerce afflue dans notre cité, et elle est de plus en plus vue comme un centre commercial florissant au sein des Bois-Profonds."
 WOOD_the_verdant_army_title:0 "L'Armée Verdoyante"
 WOOD_the_verdant_army_desc:0 "Le but du Pacte Verdoyant était de présenter un front uni contre les orques barbares. À cette fin, une armée commune des royaumes Elfes Sylvestres fut formée. Cette mise en commun des ressources a eu un grand effet, mais nous devrions contribuer encore plus afin d'assumer un rôle dirigeant parmi les royaumes, assurant ainsi que nous puissions influencer le cours de la guerre."
 WOOD_war_council_title:0 "Conseil de guerre"
 WOOD_war_council_desc:0 "Jusqu'à présent, les royaumes disparates ont poursuivi leurs propres agendas dans la poursuite du conflit malgré l'existence de l'Armée Verdoyante. Si nous voulons vraiment déloger les Peaux-Vertes de notre patrie, nous devons adopter une vision unifiée. Un conseil de guerre composé des dirigeants du Pacte Verdoyant doit donc être institué, et naturellement nous prendrons un rôle dirigeant dans la facilitation de celui-ci."
 WOOD_retaking_our_land_title:0 "Reprendre notre terre"
 WOOD_retaking_our_land_desc:0 "Même les plus préparés des royaumes virent des parties intégrales de leur territoire saisies pendant l'apogée de la Marée Verte, le nôtre inclus. Nous devons inverser cette parodie, et ainsi annoncer le début d'une offensive pour chasser ces intrus de sous les rameaux ombragés de notre patrie !"
 WOOD_end_of_the_green_menace_title:0 "La fin de la menace verte"
 WOOD_end_of_the_green_menace_desc:0 "Enfin les Peaux-Vertes ont été chassées de nos terres. Les Elfes Sylvestres à travers les Bois-Profonds se réjouissent car c'est un jour mémorable pour notre peuple. Pour la première fois en années, la paix pourra peut-être prévaloir."
 WOOD_uniting_the_deepwood_title:0 "Unir les Bois-Profonds"
 WOOD_uniting_the_deepwood_desc:0 "Avec la fin des guerres pour chasser les Peaux-Vertes, nombre de nos anciens alliés au sein du Pacte Verdoyant ont appelé à sa dissolution et un retour aux anciennes façons. Cela ne sera pas le cas, car les anciennes façons sont ce qui a permis à la parodie de la Marée Verte de se produire pour commencer. Nous devons saisir l'opportunité et unir les Bois-Profonds, garantissant qu'un tel événement déchirant ne se produira plus jamais."
 WOOD_at_war_with_the_enemy_title:0 "En guerre avec l'ennemi"
 WOOD_at_war_with_the_enemy_desc:0 "Notre royaume est en guerre ! Même à présent les envahisseurs orques marchent sur nos clairières sacrées. Nos forces se sont préparées pour ce moment ! Elles sont prêtes à donner leurs vies pour défendre leurs foyers de ces bêtes infectes."
 WOOD_unite_the_deepwoods_title:0 "Une forêt unie"
 WOOD_unite_the_deepwoods_desc:0 "Il est enfin temps de revendiquer notre hégémonie sur les Bois-Profonds, et d'unir nos frères sous notre bannière."
 WOOD_hegemony_title:0 "Hégémonie de [Root.Country.GetName]"
 WOOD_hegemony_desc:0 "Nous avons assumé une position de grand pouvoir sur l'un de nos royaumes frères. Cette position hégémonique nous permet un niveau d'influence sans précédent sur eux. Nous exploiterons toutes les ressources qu'ils pourraient posséder et les détournerons vers nos propres fins."
 deepwoods.2.t:0 "Le destin du Pacte Verdoyant"
 deepwoods.2.d:0 "Avec la menace de la Marée Verte enfin vaincue, il y a une clameur croissante pour un royaume Elfe Sylvestre unifié. Il y a encore du temps pour la diplomatie, mais avec le temps les liens forgés par le Pacte Verdoyant s'estomperont..."
 deepwoods.2.a:0 "Ensemble vers un nouvel avenir !"
 deepwoods.2.a.tt:0 "Le Pacte Verdoyant tiendra ensemble pendant 5 ans de plus. Pendant ce temps, nous devrons former Cyranvar ou risquer que notre coalition s'effondre."
 deepwoods.2.b:0 "[Root.GetName] mènera... seul."
 deepwoods.3.t:0 "Libérer [I26.GetName]"
 deepwoods.3.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan du Lac : Salla Elyn. C'est maintenant notre devoir de les libérer."
 deepwoods.3.a:0 "Libérons-les."
 deepwoods.3.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.4.t:0 "Libérer [I27.GetName]"
 deepwoods.4.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de la Montagne, Salla Myna. C'est maintenant notre devoir de les libérer."
 deepwoods.4.a:0 "Libérons notre peuple !"
 deepwoods.4.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.5.t:0 "Libérer [I28.GetName]"
 deepwoods.5.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de l'Épine, Salla Drennen. C'est maintenant notre devoir de les libérer."
 deepwoods.5.a:0 "Libérons notre peuple !"
 deepwoods.5.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.6.t:0 "Libérer [I29.GetName]"
 deepwoods.6.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de l'Os, Salla Cenág. C'est maintenant notre devoir de les libérer."
 deepwoods.6.a:0 "Libérons notre peuple !"
 deepwoods.6.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.7.t:0 "Libérer [I30.GetName]"
 deepwoods.7.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan du Chasseur, Salla Fealgarn. C'est maintenant notre devoir de les libérer."
 deepwoods.7.a:0 "Libérons notre peuple !"
 deepwoods.7.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.8.t:0 "Libérer [I31.GetName]"
 deepwoods.8.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de la Fleur, Salla Scotha. C'est maintenant notre devoir de les libérer."
 deepwoods.8.a:0 "Libérons notre peuple !"
 deepwoods.8.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.9.t:0 "Libérer [I32.GetName]"
 deepwoods.9.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de la Rivière, Salla Ahain. C'est maintenant notre devoir de les libérer."
 deepwoods.9.a:0 "Libérons notre peuple !"
 deepwoods.9.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.10.t:0 "Libérer [I33.GetName]"
 deepwoods.10.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de la Flèche, Salla Ayeth. C'est maintenant notre devoir de les libérer."
 deepwoods.10.a:0 "Libérons notre peuple !"
 deepwoods.10.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.11.t:0 "Libérer [I34.GetName]"
 deepwoods.11.d:0 "Alors que notre reconquête des Bois-Profonds continue, nous avons récupéré le territoire appartenant précédemment au Clan de l'Ombre, Salla Ghúl. C'est maintenant notre devoir de les libérer."
 deepwoods.11.a:0 "Libérons notre peuple !"
 deepwoods.11.b:0 "Nous avons versé notre sang et sommes morts pour cette terre, elle est maintenant nôtre, que le Pacte aille au diable."
 deepwoods.12.t:0 "Conquête Verdoyante"
 deepwoods.12.d:0 "Nous avons conquis un territoire appartenant légitimement à notre allié du Pacte Verdoyant. Devrions-nous retourner le territoire ?"
 deepwoods.12.a:0 "Naturellement !"
 deepwoods.12.b:0 "Une telle ligne de conduite est hors de question !"
 deepwoods.13.t:0 "L'Union Verdoyante"
 deepwoods.13.d:0 "C'est peut-être le mariage le plus grand et le plus extravagant que le peuple des Bois-Profonds verra jamais. Aucune dépense n'a été épargnée pour les jeunes mariés et leur nuit pleine de danse et de boisson. Bien que ce mariage soit certain de changer l'équilibre du pouvoir, seul le temps dira quels seront les effets durables de cette union."
 deepwoods.13.a:0 "Lier leur dynastie à la nôtre"
 deepwoods.14.t:0 "Le Prince Noirci"
 deepwoods.14.d:0 "Le ciel miroitait dans une myriade de couleurs, brillant mais dépourvu du Soleil. Les arbres semblaient se courber et se plier, comme dansant sur une mélodie inouïe. L'air était vivant, épais d'une vibrante verdure. Telle était la scène dans laquelle [Root.Monarch.GetName] se trouva.\n\nComment ils se trouvèrent dans cet endroit d'un autre monde était un mystère. Tout ce dont ils pouvaient se souvenir était de s'être réveillés au milieu de la nuit, déterminés à trouver la source des murmures qui emplissaient leur esprit.\n\nDans cette détermination, un seul pas s'était transformé en dix mille. Et à la fin du voyage, longtemps après que la forêt familière eut cédé la place à cet endroit étrange et d'un autre monde, [Root.Monarch.GetName] se retrouva devant le Murmureur. Non, il avait un nom. Un que le vent lui-même osait à peine murmurer, le Prince Noirci.\n\nLe Prince était différent de toute créature que les [Root.Culture.GetName] avaient vue auparavant. Il était royal, élancé et posé. Beau ne capturait pas tout à fait son visage car il n'émouvait ni l'esprit ni les reins, mais plutôt le cœur. Il instilla dans le [Root.Monarch.GetTitle] un sentiment de crainte et le frisson de la peur. Peut-être était-ce naturel. La présence même du Prince rayonnait de pouvoir. Son regard pesait sur [Root.Monarch.GetName], l'étouffant.\n\n« Ah, ainsi l'un a finalement entendu mon appel\nAssez constant en esprit, assez puissant en corps\nPour s'aventurer devant moi-même.\nCurieux. »\n\nUn petit sourire se forma lentement sur le Prince Noirci. Pendant tout ce temps, [Root.Monarch.GetName] sentit un battement dans [Root.Monarch.GetHerHis] esprit.\n\n« Peut-être,\nEs-tu celui qui peut redresser\nUn tort s'étendant sur des millénaires ? »\n\nDes scènes défilèrent. Flammes. Cris. Haine. Vengeance. Le nez du [Root.Monarch.GetTitle] commença à saigner. Leur équilibre commença à faillir.\n\n« Oui, je le vois maintenant\nTu pourrais être celui-là.\nPrend ma main\nEmbrasse-moi. »"
 deepwoods.14.a:0 "Embrasser le Prince..."
 deepwoods.14.b:0 "Non..."
 emerald_orc_appearance:0 "Les Orques Émeraude s'élèveront."
 deepwoods.16.t:0 "Stabilisation spontanée de clairière"
 deepwoods.16.d:0 "Une clairière menant au monde extérieur s'est stabilisée de façon inattendue, et maintenant une connexion permanente vers les Bois-Profonds s'est ouverte, et nos éclaireurs ont déjà établi un avant-poste avancé. Nous devrions exploiter cette opportunité, afin que d'autres ne puissent l'utiliser contre nous."
 deepwoods.16.a:0 "Très bien."
 deepwoods.20.t:0 "Guerre des Arbres Noirs"
 deepwoods.20.de:0 "Comme un pilier d'obsidienne, la fumée transperce le ciel. À travers nos terres, ceux d'entre nous qui ont été éclairés par les fées crient d'agonie, car nous savons ce qui se produit.\n\nLe bois brûle.\n\nLe vil Foyer Noir, créé par nos frères, les soi-disant « Orques Purs », qui refusent d'accepter la Touche Émeraude, dégorge de la fumée noire dans l'air. Produit de l'esprit tordu de Bron Lune-Noire, il produit à la fois des armes impies et transforme nos arbres sacrés en simple cendre.\n\nLa forêt crie de douleur…"
 deepwoods.20.dg:0 "À travers nos terres, ceux autrefois considérés comme nos frères et sœurs sont tombés. Corrompus par ces fées néfastes, et menés par le vil Gotag Hache-du-Fléau, ces soi-disant « Orques Émeraude » cherchent à abandonner tout ce qui a fait de nous des Orques en premier lieu !\n\nIl est clair maintenant qu'une seule option demeure. Si la pourriture détruira notre peuple, et que la pourriture vient des arbres, les arbres doivent brûler. Chaque feuille doit se transformer en cendre, chaque clairière doit être nettoyée des fées. Alors seulement serons-nous capables de vraiment revendiquer cette terre pour les Orques."
 deepwoods.20.a:0 "Et nous aurons notre vengeance !"
 deepwoods.20.b:0 "Les bois doivent brûler !"
 deepwoods.21.t:0 "Les Orques Purs se soulèvent dans [Root.GetName]"
 deepwoods.21.d:0 "À travers les arbres sacrés de [Root.GetName], il semble que la lumière des fées ne se soit pas répandue assez loin. Nombre de nos frères cherchent à prendre les armes en tant que soi-disant « Orques Purs », et à détruire tout ce que nous avons cherché à construire."
 deepwoods.21.a:0 "Où est leur loyauté ?"
 deepwoods.22.t:0 "Détruire le Foyer"
 deepwoods.22.d:0 "Nous avons capturé le Foyer Noir lui-même ! Nos arbres ne brûlent plus, la fumée ne transperce plus les cieux, et la terre elle-même ne crie plus de douleur ! Dans une grande fureur, nos soldats ont déchiré la forge en morceaux, détruisant toute sorcellerie qu'elle fournissait à nos ennemis, et garantissant que son mal ne souillera plus ces bois.\n\nAvec le Foyer Noir détruit, il semble que la victoire soit presque à notre portée !"
 deepwoods.22.a:0 "Les fées ne crient plus"
 deepwoods.23.t:0 "La Chute Émeraude"
 deepwoods.23.d:0 "C'est terminé.\n\nNotre peuple pleure, la forêt brûle, et les fées sont presque annihilées. Là où autrefois l'herbe couvrait les champs et les arbres s'élevaient hauts, tout ce qui demeure est cendre et souches. Les lacs sont vidés, les rivières se tarissent, et les animaux crient de douleur. De ce feu, il semble que notre nation a été brûlée, mais la nation que nous étions autrefois, la Marée Verte, a été reforgée."
 deepwoods.23.a:0 "Notre peuple se consume"
 deepwoods.24.t:0 "L'Ascension Émeraude"
 deepwoods.24.d:0 "À travers les bois, de la plus haute colline à la plus basse vallée, du plus petit ruisseau au plus puissant fleuve, notre peuple danse et fait la fête. Ceux qui cherchaient à détruire tout ce pour quoi nous nous dressons, à brûler tout ce que nous avons appris à aimer, gisent enterrés dans la terre, pour être récupérés par le sol. Notre peuple s'élève en harmonie avec les fées, ensemble.\n\nLes Orques sont les Bois-Profonds…"
 deepwoods.24.a:0 "Et les Bois-Profonds sont les Orques !"
 deepwoods.25.t:0 "Construire le Foyer"
 deepwoods.25.d:0 "La corruption féerique s'est répandue à la plupart de nos semblables, et nous sommes presque en infériorité numérique. Si nous les Orques purs devons survivre, nous devons garantir notre propre avantage contre les corrompus. Heureusement, nous avons la solution parfaite.\n\nProposé par le grand chaman Bron Lune-Noire, il sera capable de prendre les magies maléfiques des bois et de les transférer à notre armement. En d'autres termes, en brûlant les arbres qui nous entourent, nous pouvons transférer leur magie dans le fer et l'acier de nos armes. Avec leurs propres magies retournées contre eux, les corrompus n'auront aucune chance contre nos puissants guerriers !"
 deepwoods.25.a:0 "Pour Dookan !"
 deepwoods.26.t:0 "Les Orques Émeraude se soulèvent dans [Root.GetName]"
 deepwoods.26.d:0 "À travers les arbres impies de [Root.GetName], il semble que la malédiction des fées se soit répandue loin et large. Nombre de nos frères cherchent à prendre les armes en tant que soi-disant « Orques Émeraude », et à détruire tout ce que nous avons cherché à construire."
 deepwoods.26.a:0 "Où est leur loyauté ?"
 deepwoods.27.t:0 "La Chute Verte"
 deepwoods.27.d:0 "C'est terminé.\n\nNotre peuple pleure, la forêt s'élève, et les fées rient de notre peuple mourant. Là où autrefois villages, champs couverts et forges s'élevaient hauts, tout ce qui demeure est cendre et décombres. Les fermes sont stériles, les récoltes sont détruites, et les animaux domestiques crient de douleur. De cette corruption, il semble que notre nation a été éteinte, mais la nation que nous pourrions être, celle de l'Émeraude, naît à sa place."
 deepwoods.27.a:0 "Notre peuple est étouffé"
 deepwoods.28.t:0 "L'Ascension Verte"
 deepwoods.28.d:0 "À travers les bois, de la plus haute tour au plus bas tunnel, du plus petit camp à la plus grande forteresse, notre peuple danse et fait la fête. Ceux qui cherchaient à détruire tout ce pour quoi nous nous dressons, à enterrer tout ce que nous avons construit, gisent enterrés dans la cendre, pour être récupérés écrasés sous nos pieds. Notre peuple s'élève malgré les fées, ensemble.\n\nLes Orques sont la cendre..."
 deepwoods.28.a:0 "Et la cendre est les Orques !"
 deepwoods.29.t:0 "L'ascension de [Root.GetName]"
 deepwoods.29.de:0 "Bien que notre peuple ait affronté de nombreuses luttes, la Guerre des Arbres Noirs est terminée, et avec les fées, nous sommes victorieux. Le Foyer n'est plus que ruines, et les bois sont maintenant vraiment nôtres. Avec notre peuple unifié, le vrai travail peut maintenant commencer."
 deepwoods.29.dg:0 "Bien que notre peuple ait affronté de nombreuses luttes, la Guerre des Arbres Noirs est terminée, et malgré les fées, nous sommes victorieux. Le Foyer se dresse haut et puissant, et la cendre est maintenant vraiment nôtre. Avec notre peuple unifié, le vrai travail peut maintenant commencer."
 deepwoods.29.a:0 "Nous nous élevons ensemble"
 deepwoods.29.b:0 "Nous nous élevons seuls"
 black_tree_5_years_tt:0 "Le désastre est actif depuis au moins §Y5§! ans"
 deepwoods.31.t:0 "Gotag Hache-du-Fléau"
 deepwoods.31.d:0 "Tout au long de la guerre des Arbres Noirs, Gotag Hache-du-Fléau s'est révélé être un Orque parmi les Orques, un champion des fées, et un héros de notre peuple. Abattant les soi-disant « Orques Purs » par douzaines, sans jamais un soupçon de peur dans ses yeux, seulement la fureur d'un Orque, et le pouvoir des fées. En plus de ses prouesses sur le champ de bataille, il s'est révélé être un bureaucrate habile, gérant nos ressources tout au long de la guerre, et agissant comme un excellent commandant parmi les troupes. La question se pose maintenant ; avec la guerre terminée, quel rôle Gotag remplira-t-il ?"
 deepwoods.31.a:0 "Déclarer Gotag notre nouveau roi !"
 deepwoods.31.b:0 "Gotag gérera notre nation !"
 deepwoods.31.c:0 "Gotag mènera nos armées !"
 deepwoods.32.t:0 "Bron Lune-Noire"
 deepwoods.32.d:0 "Tout au long de la guerre des Arbres Noirs, Bron Lune-Noire s'est révélé être un Orque parmi les Orques, un champion de Dookan, et un héros de notre peuple. Oblitérant magiquement les soi-disant « Orques Émeraude » par douzaines, sans jamais un soupçon de peur dans ses yeux, seulement la fureur d'un Orque, et le pouvoir de Dookan. En plus de ses prouesses sur le champ de bataille, il s'est révélé être un bureaucrate habile, gérant nos ressources tout au long de la guerre, et agissant comme un excellent commandant parmi les troupes. La question se pose maintenant ; avec la guerre terminée, quel rôle Bron remplira-t-il ?"
 deepwoods.32.a:0 "Déclarer Bron notre nouveau dirigeant !"
 deepwoods.32.b:0 "Bron gérera notre nation !"
 deepwoods.32.c:0 "Bron mènera nos armées !"
 cyranvar.1.t:0 "Élire un [Root.Country.Monarch.GetTitle]"
 cyranvar.1.d:0 "Le [Root.Country.Monarch.GetTitle] est mort ou a atteint l'âge maximum autorisé pour nos dirigeants. Nous devons maintenant en élire un nouveau parmi les clans nobles."
 cyranvar.1.a:0 "Clan Elyn"
 cyranvar.1.b:0 "Clan Cenág"
 cyranvar.1.c:0 "Clan Drennen"
 cyranvar.1.e:0 "Clan Myna"
 cyranvar.1.f:0 "Clan Fealgarn"
 cyranvar.1.g:0 "Clan Ayeth"
 cyranvar.1.h:0 "Clan Scotha"
 cyranvar.1.i:0 "Clan Ahain"
 cyranvar.1.j:0 "Clan Ghùl"
 cyranvar.2.t:0 "Les règles des gouvernants"
 cyranvar.2.d:0 "Quelle que soit l'éclat de la fleur : nul homme ne règne seul. Un roi ne peut construire de routes seul, ne peut faire respecter les lois seul, ne peut défendre la nation ou lui-même, seul. Le pouvoir d'un roi n'est pas d'agir, mais d'amener les autres à agir en son nom, utilisant le trésor dans ses coffres. Un roi a besoin d'une armée, et de quelqu'un pour la diriger. Un trésor et quelqu'un pour le collecter. Une loi et quelqu'un pour la faire respecter. Les individus nécessaires pour faire advenir les choses nécessaires sont les clés du pouvoir du roi. Tous les changements que vous souhaitez faire ne sont que pensées dans votre tête si les clés ne suivront pas vos commandements."
 cyranvar.2.a:0 "Décentraliser le pouvoir"
 cyranvar.2.b:0 "Centraliser le pouvoir"
 cyranvar.3.t:0 "Vers l'avenir"
 cyranvar.3.d:0 "Quelle voie choisirons-nous ?"
 cyranvar.3.a:0 "Voie isolationniste"
 cyranvar.3.b:0 "Voie des frontières ouvertes"
 cyranvar.4.t:0 "Se soumettre à Cyranvar"
 cyranvar.4.d:0 "Le Royaume Sylvestre de Cyranvar nous demande de nous soumettre à eux."
 cyranvar.4.a:0 "Accepter"
 cyranvar.4.b:0 "Jamais !"
 cyranvar.5.t:0 "[From.GetName] s'est soumis !"
 cyranvar.5.d:0 "Un clan a été ramené au bercail !"
 cyranvar.5.a:0 "Un grand jour pour les elfes sylvestres !"
 cyranvar.6.t:0 "[From.GetName] a refusé notre offre !"
 cyranvar.6.d:0 "S'ils ne sont pas avec nous, alors ils sont contre nous."
 cyranvar.6.a:0 "Que l'arc parle !"
 cyranvar.7.t:0 "Vers l'inconnu"
 cyranvar.7.d:0 "Notre peuple et le Royaume Féerique ont été irrévocablement liés depuis le jour où le Commandant Liandiel Lance-Dansante mena nos géniteurs dans ces bois il y a plus de mille ans. Pourtant pendant tout ce temps, nous avons travaillé à éviter de nous écarter trop loin des sentiers battus. Des histoires transmises de grand-parent à petit-enfant ont mis en garde contre le fait de faire un pas de trop.\n\nC'étaient des histoires bien racontées. Nous étions un peuple dispersé sans pratiquement aucune compréhension de ce qu'était même le Royaume Féerique. Nos relations avec ses habitants féeriques étaient... toujours en cours d'établissement. Simplement dit, nous n'étions pas prêts pour l'exploration extra-planaire. Mais, maintenant ? Nous sommes un seul peuple avec des générations d'expériences avec notre plan voisin. Ses habitants ne sont plus vus comme capricieux et impétueux, mais compris comme flexibles et empressés.\n\nEt maintenant l'un des nôtres a trouvé un nouveau chemin.\n\nL'aventureux Elfe Sylvestre connu sous le nom de Vucras Siubálrn (« Vucras le Voyageur »), a découvert un moyen fiable à travers le Royaume Féerique. Ce chemin semble mener à une autre forêt, dans notre propre plan ! Cela a causé un émoi considérable à la cour et a conduit les courtisans à nous presser de financer officiellement des expéditions avec Vucras à la tête."
 cyranvar.7.a:0 "En avant !"
 cyranvar.7.tt:0 "Vucras établira un camp aux entrées du portail. Avec lui à la barre, nous pouvons explorer plus loin et voir ce qui se trouve au-delà..."
 cyranvar.8.t:0 "Saisons séparées"
 cyranvar.8.d:0 "Depuis que l'expédition de Vucras a commencé, tout Cyranvar bourdonne d'excitation. Des histoires fantastiques de fées jamais vues auparavant et de terres riches en conflits saisonniers ont débordé de la cour vers le peuple commun. Pourtant, aujourd'hui cette excitation a été étouffée par l'anxiété. Car aujourd'hui porte une histoire non de découverte merveilleuse mais de querelles mortelles.\n\nLa mystérieuse forêt connectée au Royaume Féerique abrite des elfes tout comme les nôtres. Mais ils sont... différents. Avec leurs couleurs de peau exotiques, leurs langues étranges et leurs coutumes bizarres, il semble que nous ayons plus de choses qui nous séparent que nous unissent. En effet, peut-être pour cette raison, ces elfes sont intensément hostiles. Notre intrépide explorateur a rapporté que les escarmouches avec ces elfes égarés sont de plus en plus fréquentes."
 cyranvar.8.a:0 "Nous nous défendrons !"
 cyranvar.8.tt:0 "Les Gardiens de Clairière qui habitent la forêt deviendront hostiles envers nous..."
 cyranvar.9.t:0 "La Porte du Printemps"
 cyranvar.9.d:0 "Au sud-ouest, l'expédition a découvert une vue particulière, une sorte de portail hors de la forêt. Cela en soi n'est pas tout ce qui est étrange. Le printemps semble toujours présent dans le bosquet de la porte. Les environs sont luxuriants de vie fraîche. L'air est lourd du bavardage de la vie émergeante. Le temps lui-même semble presque pris dans une boucle sans fin de nouvelle vie."
 cyranvar.9.a:0 "Qu'est-ce qui nous accueille au-delà de ces terres de Printemps ?"
 cyranvar.10.t:0 "La Porte de l'Été"
 cyranvar.10.d:0 "Au sud, l'expédition a découvert une vue particulière, une sorte de portail hors de la forêt. Cela en soi n'est pas tout ce qui est étrange. Dans le bosquet de la porte, l'été bat son plein. L'air humide est gorgé de soleil et épais. L'odeur parfumée des fleurs en floraison et des fruits mûrissants est presque écrasante. C'est comme si le temps s'était retrouvé piégé sous le soleil d'été."
 cyranvar.10.a:0 "Qu'est-ce qui nous attend au-delà des terres d'Été ?"
 cyranvar.11.t:0 "La Porte de l'Automne"
 cyranvar.11.d:0 "Au nord-ouest, l'expédition a découvert une vue particulière, une sorte de portail hors de la forêt. Cela en soi n'est pas tout ce qui est étrange. La brise fraîche de l'automne semble avoir fait sa demeure dans le bosquet de la porte. À travers les champs, le feuillage brille dans une riche teinte de rouges, jaunes et oranges. Le sol crisse avec des feuilles tombées, pourtant aucune branche n'est nue..."
 cyranvar.11.a:0 "Qu'est-ce qui nous attend dans cette terre d'Automne ?"
 cyranvar.12.t:0 "La Porte de l'Hiver"
 cyranvar.12.d:0 "Au nord-est, l'expédition a découvert une vue particulière, une sorte de portail hors de la forêt. Cela en soi n'est pas tout ce qui est étrange. Le bosquet de la porte détient un silence serein, la vie tranquillement blottie loin du froid. Le sol brille de neige immaculée, quelque chose qui n'est pas vu dans nos propres bois en dehors de Ciranmyna, pourtant ici elle s'étend aussi loin que l'œil peut voir. Le soleil gît bas, apparemment gelé en place."
 cyranvar.12.a:0 "Qu'est-ce qui demeure au-delà de ces terres d'Hiver ?"
 cyranvar.13.t:0 "Opportunité sanglante"
 cyranvar.13.d:0 "Tandis que nous repoussons les elfes égarés hostiles de cette terre, nous nous retrouvons nominalement en contrôle de bosquets forestiers non réclamés par aucune des grandes salla de Cyranvar. Quelque chose qui n'a pas été vu depuis l'arrivée même de notre peuple dans les Bois-Profonds il y a des millénaires. Sentant une opportunité d'élever leur statut, un certain nombre de salla mineures ont commencé à affluer pour saisir leur propre enjeu. Même tandis que nous parlons, un flot constant d'Elfes Sylvestres s'est formé, débordant d'âmes empressées et de rêves fantastiques. S'ils doivent réussir, ils auront besoin de notre aide administrative cependant."
 cyranvar.13.a:0 "Pour le meilleur ou pour le pire, nous revendiquerons ces terres comme les nôtres."
 cyranvar.13.tt:0 "Nous avons maintenant une décision spéciale pour coloniser les provinces voisines vides dans les Bois Mystérieux."
 cyranvar.14.t:0 "L'avertissement des Gardiens de Clairière"
 cyranvar.14.d:0 "Pour la plupart au sein de [Root.GetName], les Gardiens de Clairière de Domandrod sont plus mythe que vérité. Une secte secrète d'elfes autorisés à vivre dans les forêts féeriques même lorsque les seigneurs féeriques avaient décidé qu'ils ne nous voulaient plus. C'est un honneur qui alimente leur désir zélé de garder tous et chacun hors des bois.\n\nAinsi, c'était plus que perturbant que des observations des Gardiens de Clairière aient été repérées à travers [Root.GetName], même tout Eordand. Et, aujourd'hui, ils se tiennent devant [Root.Monarch.GetTitle] avec un grave avertissement.\n\n« Des elfes comme nous ont violé le Domandrod. Ils ne montrent aucune compréhension des saisons ou respect pour la divinité de nos seigneurs. Et maintenant, ils nous repoussent. Si le [Root.Monarch.GetTitle] n'agit pas rapidement, la forêt peut être perdue ! »"
 cyranvar.14.a:0 "Cela ne peut advenir !"
 cyranvar.14.tt:0 "Les Portes Saisonnières s'ouvriront. Nous devrions nous attendre à des intrus au-delà d'elles..."
 cyranvar.101.t:0 "Les Portes Saisonnières s'ouvrent"
 cyranvar.101.d:0 "Message de débogage !"
 cyranvar.101.a:0 "Accepter"
 cyranvar_parliament_reform_desc:0 "Le Parlement de Cyranvar agit de manière similaire à un système de gouvernement fédéral. Sous ce système, les pouvoirs sont distribués entre notre monarque et les neuf Bosquets, chacun nominalement détenu par des membres des neuf Clans."
 war_of_the_black_trees:0 "Guerre des Arbres Noirs"
 emerald_orc_rebels_name:0 "Orques Émeraude"
 emerald_orc_rebels_title:0 "Orques Émeraude"
 emerald_orc_rebels_demand:0 "Embrasser les bénédictions des fées !"
 emerald_orc_rebels_army:0 "Armée Orque Émeraude"
 emerald_orc_rebels_desc:0 "Ils veulent que nous abandonnions notre liberté"
 pure_orc_rebels_name:0 "Orques Purs"
 pure_orc_rebels_title:0 "Orques Purs"
 pure_orc_rebels_demand:0 "Tuer toutes les fées !"
 pure_orc_rebel_demand_desc:0 "Tuer toutes les fées !"
 pure_orc_rebels_army:0 "Armée Orque Pure"
 pure_orc_rebels_desc:0 "Ils veulent nous empêcher d'accomplir notre destinée."
 emerald_orc_black_hearth:0 "Foyer Noir"
 green_orc_black_hearth:0 "Foyer Noir"
 deepwoods_burnt_forests:0 "Forêts brûlées"
 deepwoods_fey_corruption:0 "Corruption féerique"
 wt_cursed_land:0 "Terre maudite"
 desc_wt_cursed_land:0 "Le folklore dit qu'Oldhaven regorgeait autrefois de vie et de beauté et était un havre pour ceux des Bois-Profonds - mais un grand tort s'est produit ici, maudissant la province jusqu'à ce jour. Mais bien sûr, ce n'est que superstition, n'est-ce pas ?"
 orc_conversion_zeal:0 "Zèle de conversion"
 building_world_tree_lvl_1:0 "Pousse d'Arbre-Monde"
 building_world_tree_lvl_2:0 "Plantule d'Arbre-Monde"
 building_world_tree_lvl_3:0 "Jeune Arbre-Monde"
 building_world_tree_root:0 "Racine-Monde"
 building_world_tree_dead_root:0 "Racine-Monde morte"
 building_destroyed_world_tree:0 "Arbre-Monde calciné"
 building_destroying_root:0 "Retrait de la Racine morte"
 spread_world_tree_root_title:0 "Étendre les racines"
 spread_world_tree_root_desc:0 "Une autre conquête a laissé le sol de notre territoire nouvellement revendiqué riche du sang de nos ennemis, ouvrant la voie aux Racines de l'Arbre-Monde pour s'étendre. Alertons les fées, afin que leurs magies puissent être mises à la tâche de cultiver cette nouvelle croissance."
 remove_dead_roots_title:0 "Retirer les racines mortes"
 remove_dead_roots_desc:0 "Si nous voulons être à nouveau les maîtres de la terre, nous devons brûler les racines maudites et flétries qui l'ont laissée en jachère !"
 cleanse_cursed_land_title:0 "Purifier la terre"
 cleanse_cursed_land_desc:0 "Les terres d'Oldhaven sont connues pour être maudites en raison d'un grand tort que Castan Tueur-de-Bêtes a perpétré contre ses habitants féeriques. Seul quelqu'un en harmonie avec de telles natures, ou peut-être un maître des sorts de protection, pourrait possiblement retirer la malédiction."
 legendary_abjurator_cursed_tooltip:0 "Notre dirigeant doit être un Abjurateur Légendaire"
 worldtree.1.t:0 "Pousse d'Arbre-Monde"
 worldtree.1.d:0 "La petite pousse peut maintenant être vue pointant du sol et commence à s'étirer vers le ciel. Avec beaucoup plus d'eau et de lumière du soleil, elle grandira plus haut qu'on ne peut jamais l'imaginer."
 worldtree.1.a:0 "Grandis, grandis, petite pousse !"
 worldtree.2.t:0 "Arbre-Monde croissant"
 worldtree.2.d:0 "L'Arbre-Monde est plus grand qu'auparavant et continuera de grandir plus haut sous notre guidance."
 worldtree.2.a:0 "L'arbre grandit, youpi !"
 worldtree.3.t:0 "Arbre-Monde presque mature"
 worldtree.3.d:0 "L'Arbre-Monde domine la zone environnante et nous vivons tous dans son ombre. Même maintenant, il n'a toujours pas grandi à sa pleine hauteur."
 worldtree.3.a:0 "Merveilleux !"
 worldtree.4.t:0 "Sous les cendres d'un million de feuilles"
 worldtree.4.d:0 "Les cris de panique suffiraient à réveiller même le plus profond dormeur. Le feu brûlait si brillamment qu'on jurerait qu'il faisait jour, même s'il était presque minuit. Tandis que quelques pauvres âmes tentaient de jeter de l'eau sur le feu pour l'éteindre, la plupart se contentaient de regarder. Finalement, même les derniers de ceux qui souhaitaient sauver l'arbre acceptèrent son destin. L'Arbre-Monde a été brûlé par [Root.GetName] et le monde ne sera plus jamais le même."
 worldtree.4.a:0 "L'histoire se répète"
 NO_CAPITAL_MOVE_EMERALD:0 "Nous ne pouvons pas déplacer notre capitale hors de la province de l'Arbre-Monde."
 occupied_advisors:0 "Conseillers occupés"
 occupied_advisors_desc:0 "Tous nos conseillers sont actuellement occupés avec une autre tâche, augmentant le coût de l'administration de notre pays."
 girl_in_the_forest_adv_searching:0 "Recherche de la Fille dans la Forêt"
 girl_in_the_forest_adv_searching_desc:0 "Des aventuriers ont été engagés pour aider à trouver une héritière disparue."
 girl_in_the_forest.0.t:0 "Fille nouveau-née"
 girl_in_the_forest.0.d:0 "Le peuple se réjouit lorsqu'il apprit la nouvelle de la naissance d'une jeune princesse. Les festivités durèrent des jours et des nuits entières."
 girl_in_the_forest.0.a:0 "Je la déclare ma nouvelle héritière."
 girl_in_the_forest.1.t:0 "La Fille dans la Forêt : Disparition"
 girl_in_the_forest.1.d:0 "Les Bois-Profonds ont toujours été enveloppés de mystère et d'intrigues. Alors que notre pays continue de s'étendre dans ses profondeurs, nombre de nos citoyens ont rapporté d'étranges phénomènes. Notre héritière, [Root.girl_in_the_forest_name.GetName], a échappé à son précepteur ce matin et s'est aventurée dans la forêt sans jamais revenir."
 girl_in_the_forest.1.a:0 "Envoyez une patrouille de recherche ! Au diable le royaume !"
 girl_in_the_forest.1.b:0 "Engagez des Aventuriers !"
 girl_in_the_forest.2.t:0 "La Fille dans la Forêt : Les Recherches"
 girl_in_the_forest.2.d:0 "Après cent jours de recherches, vos conseillers viennent vous supplier de la déclarer morte. Ils prétendent que les dépenses supplémentaires qu'ils ont engagées ruineront le royaume !"
 girl_in_the_forest.2.a:0 "Continuez les recherches !"
 girl_in_the_forest.2.b:0 "Engagez des Aventuriers !"
 girl_in_the_forest.2.c:0 "Abandonnez les recherches."
 quest_for_new_heir:0 "Quête d'un nouvel héritier"
 quest_for_new_heir_desc:0 "La perte d'une héritière bien-aimée vous pousse à en chercher une nouvelle avec une ferveur exceptionnelle."
 girl_in_the_forest.3.t:0 "La Fille dans la Forêt : Quête d'un Nouvel Héritier"
 girl_in_the_forest.3.d:0 "Les recherches de la jeune fille disparue échouent. Votre cour vous supplie de donner naissance à un nouvel héritier afin d'assurer la stabilité du royaume."
 girl_in_the_forest.3.a:0 "Qu'y a-t-il de mal avec [Root.Heir.GetName] ?"
 girl_in_the_forest.3.b:0 "Ils ont raison. Mon cousin au second degré fera l'affaire."
 girl_in_the_forest.3.c:0 "Redoublons d'efforts pour concevoir un nouvel héritier."
 girl_in_the_forest.4.t:0 "La Fille dans la Forêt : La Fille Prodigue"
 girl_in_the_forest.4.d:0 "Dix années se sont écoulées depuis la disparition de l'héritière du trône, [Root.girl_in_the_forest_name.GetName], dans les Bois-Profonds. Aujourd'hui, une jeune femme a émergé de la forêt, prétendant être elle. Elle connaît des détails de son enfance à la cour que seule elle pourrait savoir ! Mais vos conseillers ne sont pas convaincus, suggérant qu'elle pourrait être une escroc ou une espionne."
 girl_in_the_forest.4.a:0 "Nous devons soutenir [Root.Heir.GetName]."
 girl_in_the_forest.4.b:0 "La fille prodigue est de retour !"
 girl_in_the_forest.4.c:0 "[Root.girl_in_the_forest_name.GetName] est une impostrice !"
 girl_in_the_forest.4.e:0 "[Root.girl_in_the_forest_name.GetName] est la souveraine légitime !"
 girl_in_the_forest.5.t:0 "La Fille dans la Forêt : Une Impostrice ?"
 girl_in_the_forest.5.d:0 "Votre maître-espion vous apporte des preuves solides que la jeune fille qui a émergé de la forêt est une impostrice, et qui plus est, une elfe déguisée !"
 girl_in_the_forest.5.a:0 "Chassez cette sotte ! Trouvez mon cousin..."
 girl_in_the_forest.5.b:0 "Non, je l'ai déjà perdue une fois !"
 girl_in_the_forest.6.t:0 "La Fille dans la Forêt : La Reine de la Forêt"
 girl_in_the_forest.6.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName] a jadis disparu dans la forêt pendant dix années. Les membres les plus suspicieux de votre cour ont suggéré qu'il s'agissait d'une machination visant à placer une espionne ou une impostrice sur le trône. Aujourd'hui, [Root.Monarch.GetTitle] [Root.Monarch.GetName] révèle la vérité à tous au sein du [Root.GovernmentName]. Elle est en réalité une elfe sylvestre qui rencontra [Root.Monarch.GetName] dans la forêt lorsqu'elle était jeune. [Root.Monarch.GetName] ne voulait pas être reine et proposa d'échanger leurs places."
 girl_in_the_forest.6.a:0 "Elle est Reine désormais !"
 girl_in_the_forest.7.t:0 "La Fille dans la Forêt : Rébellion"
 girl_in_the_forest.7.d:0 "Une fraction importante de la population s'est soulevée, refusant d'être gouvernée par une elfe sylvestre qui s'est emparée du trône par la ruse."
 girl_in_the_forest.7.a:0 "Ce n'est qu'un problème temporaire !"
 girl_in_the_forest.7.b:0 "Abdiquer."
 girl_in_the_forest.7.c:0 "Les elfes sylvestres sont des nôtres !"
 girl_in_the_forest.8.t:0 "La Fille dans la Forêt : Rapprochements"
 girl_in_the_forest.8.d:0 "Les avantages d'avoir une souveraine elfe sylvestre dans un pays majoritairement humain commencent à se manifester. Les rapprochements entre les deux races se multiplient, et davantage de demi-elfes naissent chaque année."
 girl_in_the_forest.8.a:0 "Certainement pas !"
 girl_in_the_forest.8.b:0 "Laissez-les se rapprocher !"
 deepwoods.33.t:0 "Le Papillon Bleu d'Alyana"
 deepwoods.33.d:0 "Les papillons comptent parmi les créatures les plus trompeuses que l'on puisse rencontrer dans les prairies empoisonnées de notre contrée. Malgré toute leur fragilité et leur beauté, leur présence annonce souvent la souffrance et la mort. Je me souviens encore de la première tragédie portée par les papillons. Elle vint sur les ailes du Bleu d'Alyana, qui émergent de leurs cocons tous les quatre-vingt-dix ans pour s'accoupler durant une semaine avant de retourner à leur long sommeil.\n\nIls s'abattirent sur les jeunes apprentis occupés à perfectionner leurs esquives latérales qui, dans leur jeunesse ignorante, ne s'enfuirent pas lorsque le nuage bleu se dirigea vers eux, mais s'approchèrent au contraire pour observer ce phénomène. Dès que les papillons se posèrent sur les apprentis, la clairière résonna des hurlements torturés d'âmes damnées. Là où les papillons se posaient, de multiples pustules éclataient en fontaines de sang. Instants plus tard, leurs dents commencèrent à pourrir tandis que leurs yeux... non, je ne profanerai pas davantage leurs corps en décrivant ces horreurs. En vérité, les papillons sont parmi les créations les plus cruelles du Héraut du Changement.\n\nDes semaines ont été nécessaires, mais j'ai comptabilisé les pertes de cette semaine à travers notre bosquet. Le cœur lourd et empli de tristesse profonde, j'inscris ce qui suit dans nos annales...\n\n-Extrait des Chroniques des Scotha"
 deepwoods.33.a:0 "Comment une telle beauté peut-elle être si cruelle ?"
 deepwoods.34.t:0 "Villages Disparus"
 deepwoods.34.d:0 "Les Elfes de Salla Drennen savent depuis longtemps que leur demeure, le Bosquet-des-Épines, est plus proche du Royaume-Fée que n'importe quel autre lieu des Bois-Profonds. En effet, durant l'ère du Voile Verdoyant, les fées semblaient s'y mouvoir plus librement qu'ailleurs, capables de passer de leur royaume démentiel au nôtre à volonté. Les voyageurs pouvaient également franchir le seuil dans l'autre sens, et nombreux sont les récits de voyageurs ayant accidentellement basculé dans le royaume des Fées. Dans les cas les plus extrêmes, des villages entiers disparaissaient sans laisser de trace, bâtiments et habitants confondus.\n\nAvec la disparition du Voile Verdoyant, certains espéraient que de tels événements cesseraient. Ces espoirs furent anéantis lorsque des rapports signalèrent que plusieurs établissements ont apparemment disparu dans [deepwoods_disappeared_villages_province.GetName]. Le choc de ces disparitions a durement frappé les proches des disparus, et des patrouilles de recherche furent envoyées pour trouver le moindre indice. Mais les hameaux évanouis n'ont laissé aucune trace : le sol où ils se dressaient autrefois n'est plus qu'une forêt sauvage ne portant aucun signe qu'on y ait jamais vécu."
 deepwoods.34.a:0 "Où sont-ils allés ?"
 deepwoods.35.t:0 "Villages Réapparus"
 deepwoods.35.d:0 "Au fil des années, l'espoir pour ceux qui vivaient dans les villages disparus de [deepwoods_reappeared_villages_province.GetName] s'était lentement amenuisé, et la plupart avaient renoncé à jamais les retrouver.\n\nPourtant, sans crier gare, les disparus ont été retrouvés aujourd'hui. Presque exactement là où ils avaient disparu, les villages sont revenus. Une fois encore, de petites chaumières se nichent au sommet des bois denses et les sons de la vie rurale résonnent à nouveau aux côtés de la douce mélodie de la faune sauvage.\n\nLa nouvelle joyeuse balaya la campagne environnante, et les gens affluèrent vers les villages perdus : certains pour observer, d'autres pour rechercher des proches disparus. Les célébrations tournèrent rapidement au silence, cependant, lorsque des différences commencèrent à être remarquées. Pour commencer, tous ne semblent pas être revenus, et ceux qui sont revenus ont été décrits par leurs anciens amis et proches comme... différents d'avant. Tous portent les marques d'un toucher féerique : certains plus maniaques, d'autres moroses, d'autres encore possédés par un humour étrange, et d'autres encore se mouvant comme dans une brume. Aucun ne semble conscient de sa longue absence, et tous semblent satisfaits de poursuivre leur vie comme si rien ne s'était passé."
 deepwoods.35.a:0 "Au moins sont-ils de retour chez eux."
 deepwoods.36.t:0 "Frapper l'Argent Féerique"
 deepwoods.36.d:0 "Tout comme le reste des Bois-Profonds, les mines d'Yfelorr partagent un lien indestructible avec le Royaume-Fée. Les profondeurs insondables de la mine brillent d'une lueur argentée, une réserve d'argent apparemment inépuisable. Les cavernes elles-mêmes ne sont jamais exactement les mêmes deux fois de suite, et de riches veines peuvent apparaître ou disparaître apparemment au hasard, garantissant qu'il y a toujours de l'argent en abondance à extraire chaque matin.\n\nMalgré la richesse illimitée d'Yfelorr, la mine ne livre pas sa fortune sans protester : bien que l'argent se reconstitue, la roche qui l'entoure aussi, et les cavernes sont souvent instables. Dans les profondeurs obscures sous la surface, les mineurs prétendent qu'il existe d'effrayantes créatures féeriques et des murmures qui tourmentent la mine, rendant impossible tout séjour prolongé sous terre.\n\nRécemment, plusieurs nouvelles cavernes sont apparues, porteuses de grandes promesses. Après une exploration prudente, nos gens sont revenus avec enthousiasme pour annoncer qu'elles regorgent de riches veines d'argent attendant d'être exploitées : il suffit d'apporter les outils et d'éclairer les sombres tunnels. Voilà assurément une grande opportunité pour la nation."
 deepwoods.36.a:0 "Trouvez tous les mineurs possibles ! Réquisitionnez tous les chariots ! Nous allons devenir riches !"
 deepwoods.36.b:0 "Prenons d'abord les filons faciles. Nous obtiendrons le reste avec le temps."
 deepwoods.36.c:0 "Ignorez le nouvel argent. Nous en avons déjà suffisamment."
 deepwoods.37.t:0 "Les Dupes de l'Argent Féerique"
 deepwoods.37.d:0 "« Un désastre complet... » se lamenta le ministre des finances.\n\n« Nous passons pour des imbéciles ! » s'écria le chef diplomate. « Il faudra des années pour que notre réputation s'en remette ! »\n\nEt ainsi clamèrent une douzaine d'autres fonctionnaires. Pendant ce temps, [Root.Monarch.GetName] se massait [Root.Monarch.GetHerHis] les tempes tout en réfléchissant à la manière dont ce désastre avait commencé...\n\nTout débuta il y a deux semaines, lorsqu'un marchand bulwari utilisa des pièces d'argent frappées par nos soins pour payer une commande. Cela aurait dû être la fin de l'histoire. Mais au lieu de cela, certaines de ces pièces se transmuèrent en un métal inférieur inconnu ! Le marchand fut alors arrêté pour fraude. Malheureusement, il ne serait pas le dernier.\n\nDes milliers d'autres pauvres bougres se retrouvèrent accusés de contrefaçon tandis que des pièces d'argent à travers Cannor commencèrent à se transformer. Il ne fallut pas longtemps pour que les gens découvrent que toutes ces pièces avaient un lien commun : nous. Chaque pièce affectée avait été forgée dans nos hôtels des monnaies qui s'approvisionnaient aux mines d'Yfelorr.\n\nNous ignorons ce qu'il advint du marchand ou des autres infortunés pris dans tout cela. Mais ce que nous savons, c'est qu'il existe désormais une crise de l'argent à cause de cet « Argent Féerique ». Et nous sommes à l'épicentre !"
 deepwoods.37.a:0 "Maudites soient les Fées ! Et maudit soit leur argent !"
 deepwoods.37.a.tooltip:0 "§TPour le bien de l'économie, de notre réputation et de notre santé mentale, nous cesserons d'exploiter les veines d'« argent » récemment découvertes...\n§!"
 deepwoods.38.t:0 "Argent Féerique"
 deepwoods.38.d:0 "« Cela aurait pu être pire... » murmura le ministre des finances.\n\n« Nous passons encore pour des imbéciles ! » s'écria le chef diplomate. « Avez-vous idée du nombre de plaintes étrangères que nous avons reçues ? »\n\nLes autres fonctionnaires murmurèrent. [Root.Monarch.GetName] soupira en repensant à la manière dont ce désastre avait commencé...\n\nTout débuta il y a deux semaines, lorsqu'un marchand bulwari utilisa des pièces d'argent frappées par nos soins pour payer une commande. Cela aurait dû être la fin de l'histoire. Mais au lieu de cela, certaines de ces pièces se transmuèrent en un métal inférieur inconnu ! Le marchand fut alors arrêté pour fraude. Malheureusement, il ne serait pas le dernier.\n\nAu moins une centaine d'autres pauvres bougres se retrouvèrent accusés de contrefaçon tandis que des pièces d'argent à travers Cannor commencèrent à se transformer. Il ne fallut pas longtemps pour que les gens découvrent que toutes ces pièces avaient un lien commun : nous. Chaque pièce avait été forgée dans nos hôtels des monnaies qui s'approvisionnaient aux mines d'Yfelorr.\n\nNous ignorons ce qu'il advint du marchand ou des autres infortunés pris dans tout cela. Mais ce que nous savons, c'est que cet « Argent Féerique » maudit nous cause des problèmes."
 deepwoods.38.a:0 "Quel gâchis..."
 deepwoods.39.t:0 "Verser le Sang de Castan"
 deepwoods.39.d:0 "Le Bosquet-des-Ombres, Salla Ghul, est un lieu enveloppé de ténèbres perpétuelles. L'épaisse canopée des grands arbres maintient le sol dans un crépuscule éternel, le terrain jonché d'aiguilles de pin craquantes où nulle plante ne peut pousser, tant la lumière du soleil est étouffée par les pins imposants. Cela seul a rendu le bosquet impopulaire et peu peuplé. Cependant, nos administrateurs ont des préoccupations bien plus sérieuses concernant les provinces de cette région.\n\nTapie sous la sombre canopée du Bosquet-des-Ombres se trouve un groupe de fées connu sous le nom de Pacte-du-Frêne-Cendré. Vindicatives et territoriales, elles furent jadis adoratrices et adeptes de l'Arbre-Monde qui se dressait autrefois à Oldhaven avant que les Castanoriens ne brûlent l'arbre il y a des millénaires. La destruction du grand arbre tourna les fées vers une vengeance sanglante, et en tant que groupe, le Pacte-du-Frêne-Cendré nourrit une obsession unique : punir l'humanité pour ses transgressions contre les bois. À cette fin, elles ont cherché à utiliser tous les moyens possibles, y compris les habitants mortels des Bois-Profonds, comme armes dans leur croisade.\n\nCela fait quelque temps que le Pacte-du-Frêne-Cendré ne nous a pas directement importunés, mais un petit groupe s'est récemment présenté au gouverneur de [Root.Province.GetName] avec un message pour notre gouvernement. Apparemment, elles exigent que nous fassions la guerre contre le sang de Castan en paiement pour habiter le bosquet qu'elles considèrent comme le leur. Elles nous demandent d'attaquer et de raser les établissements humains dans [TARGET], d'être leur outil de représailles."
 deepwoods.39.a:0 "L'ennemi de mon ennemi est mon ami..."
 deepwoods.39.b:0 "Nous ne recevons pas d'ordres de fées perfides !"
 deepwoods.40.t:0 "Les Harcelants Collecteurs-d'Os"
 deepwoods.40.d:0 "Le Bosquet-des-Os a gagné son nom en raison du nombre considérable d'os abandonnés qui jonchent son sol. Il y a tant d'os qu'ils constituent souvent davantage un obstacle que la boue ou le feuillage ! Cependant, à certaines occasions, des parties du bosquet peuvent être trouvées nettoyées de tout os. Si l'on était assez fou pour chercher où ces os sont allés, on découvrirait des Tours-d'Os, d'étranges structures imposantes constituées uniquement d'ossements. Après quoi, on apercevrait les créateurs de la tour, les Collecteurs-d'Os.\n\nIndescriptibles en forme ou en taille, les Collecteurs-d'Os sont des fées dont la simple présence peut briser la psyché. En effet, les mortels qui s'approchent trop près des Collecteurs-d'Os sont sujets à des pensées intrusives répétées d'automutilation et de mort. S'ils y sont exposés trop longtemps, les victimes agissent souvent selon ces pensées.\n\nC'est pour cette raison que le gouverneur de [deepwoods_bonehoarders_province.GetName] est inquiet de rapporter un rassemblement inhabituellement important de Collecteurs-d'Os. Il demande de l'aide pour chasser les créatures ou au moins aider à déplacer les citoyens avant qu'aucun mal ne leur arrive."
 deepwoods.40.a:0 "Dites aux petites gens et aux voyageurs d'éviter les Collecteurs-d'Os. Cela finira par passer."
 deepwoods.40.b:0 "Envoyez la milice. Nous chasserons ces abominations !"
 deepwoods.40.c:0 "Offrez de l'or pour aider ceux en danger à déménager."
 deepwoods.42.t:0 "L'Héritage de la Flotte Rescapée"
 deepwoods.42.d:0 "Des siècles se sont écoulés depuis que les elfes sont arrivés pour la première fois à Cannor sur la Flotte Rescapée. Pour les Elfes Sylvestres, cela fait plus d'un millénaire. Pourtant, même après tout ce temps, la mémoire de la Flotte n'a pas disparu de la culture elfique sylvestre. Aujourd'hui en est la preuve.\n\nCar aujourd'hui, sur les rives du Lac-Silencieux, des foules d'elfes de tous les Bois-Profonds se pressent et fourmillent. Oubliées sont les querelles de clans ou les rivalités. Au lieu de cela, l'air vibre d'excitation et d'énergie.\n\nEt sur le lac lui-même flotte un mélange éclectique de canots, de canoës et de yachts. Aucun de ces modestes vaisseaux ne peut se comparer à l'un des navires qui transportèrent leurs ancêtres par-delà les mers. Mais, étrangement, pris ensemble, ce ramassis forme une vague ressemblance miniaturisée avec la Flotte Rescapée.\n\nUn cor retentit. Quelques instants plus tard, les diverses embarcations prennent le départ. La course vers la rive lointaine du lac a commencé.\n\nPeut-être un pari peut-il être fait ici ?"
 deepwoods.42.a:0 "Le capitaine débraillé du canot est certain de gagner !"
 deepwoods.42.b:0 "Le canoë là-bas est bien construit. Un vainqueur certain !"
 deepwoods.42.c:0 "Quelle embarcation peut se comparer à ce beau yacht ? Une victoire facile."
 deepwoods.42.e:0 "Le seul elfe sur qui je parie, c'est moi-même !"
 deepwoods.42.f:0 "Les paris sont un jeu de dupes."
 deepwoods.43.t:0 "Le Chante-Lune de cette année est..."
 deepwoods.43.d:0 "La foule éclate en un tonnerre d'acclamations lorsque le capitaine de la première embarcation atteint la rive opposée du Lac-Silencieux. Dans les heures qui suivent, un flux régulier de bateaux se voit accueilli par la même foule enthousiaste.\n\nAlors que le jour cède la place à la nuit et que les festins s'apaisent, les elfes désormais ivres se rassemblent autour du capitaine victorieux. La foule éclate une dernière fois alors qu'un elfe âgé place une couronne de Lys-Lunaires sur la tête du capitaine. Le Chante-Lune de cette année a été couronné !"
 deepwoods.43.a:0 "Vraiment digne du titre de Chante-Lune !"
 deepwoods.44.t:0 "Le Chante-Lune de cette année est..."
 deepwoods.44.d:0 "La foule éclate en un tonnerre d'acclamations lorsque le capitaine de la première embarcation atteint la rive opposée du Lac-Silencieux. Dans les heures qui suivent, un flux régulier de bateaux se voit accueilli par la même foule enthousiaste.\n\nAlors que le jour cède la place à la nuit et que les festins s'apaisent, les elfes désormais ivres se rassemblent autour du capitaine victorieux. La foule éclate une dernière fois alors qu'un elfe âgé place une couronne de Lys-Lunaires sur la tête du capitaine. Le Chante-Lune de cette année a été couronné !"
 deepwoods.44.a:0 "Un excellent marin et vainqueur. Dommage que le pari ait été perdu."
 deepwoods.45.t:0 "Le Chante-Lune de cette année est..."
 deepwoods.45.d:0 "La foule éclate en un tonnerre d'acclamations lorsque la première embarcation atteint la rive opposée du Lac-Silencieux. À sa barre ne se trouve nul autre que [Root.Country.Monarch.GetName] ! Dans les heures qui suivent, un flux régulier de bateaux se voit accueilli par la même foule enthousiaste.\n\nAlors que le jour cède la place à la nuit et que les festins s'apaisent, les elfes désormais ivres se rassemblent autour du [Root.Country.Monarch.GetTitle] victorieux. La foule éclate une dernière fois alors qu'un elfe âgé place une couronne de Lys-Lunaires sur [Root.Country.Monarch.GetName]. Le Chante-Lune de cette année a été couronné !"
 deepwoods.45.a:0 "[Root.Country.Monarch.GetName] honore le Chante-Lune par cette victoire !"
 deepwoods.46.t:0 "La Citadelle Toujours-Croissante de Ciranmyna"
 deepwoods.46.d:0 "La formidable cité-citadelle de Ciranmyna n'a pas toujours eu cette apparence. À sa fondation, Ciranmyna n'était rien de plus que de misérables masures occupées par des Elfes Lunaires désespérés et perdus au sommet d'une montagne. Au cours des siècles qui suivirent, tant Ciranmyna que les elfes évoluèrent. Les Elfes Lunaires devinrent Elfes Sylvestres et Ciranmyna s'étendit pour répondre aux besoins de ces nouveaux peuples. Lorsque l'espace au sommet de la montagne vint à manquer, les elfes se mirent à tisser délicatement de nouveaux bâtiments dans la roche elle-même. Et à chaque nouvelle poussée de croissance, Ciranmyna fut tissée toujours plus loin à travers la montagne. L'effort fut toujours coûteux en temps et en ressources, mais il valait toujours la peine.\n\nDésormais, certains elfes locaux ont décidé qu'il est à nouveau temps d'étendre Ciranmyna. Les plans ont été tracés, les ouvriers et mages contractés, et maintenant il ne reste plus qu'à payer tout cela.\n\nNous pouvons être assurés que la cité est suffisamment riche pour que les habitants locaux puissent financer cela eux-mêmes. Mais la taxe supplémentaire ne réjouira personne. D'un autre côté, nous pourrions les aider dans cet effort. Les habitants ont promis avec zèle que les bénéfices vaudraient le coût."
 deepwoods.46.a:0 "Les efforts locaux devraient être financés par des fonds locaux."
 deepwoods.46.b:0 "Ciranmyna est certainement un bon investissement !"
 deepwoods.46.c:0 "Ciranmyna fut le premier foyer de nos ancêtres. Bien sûr que nous financerons sa croissance !"
 deepwoods.47.t:0 "Vies d'Antan"
 deepwoods.47.d:0 "Il existe des endroits dans le Bosquet-des-Os où le temps vacille. Où, ou plutôt quand, le passé devient le présent. En ces instants, d'antiques bêtes éteintes peuvent être observées parcourant les clairières. Derrière elles, en silence, de grands guerriers depuis longtemps oubliés traquent leur proie.\n\nDe tels événements sont habituellement éphémères, se déroulant sans témoin. Mais dans [Root.Province.GetName], les habitants rapportent voir de telles scènes quotidiennement. Nul ne sait combien de temps ces scènes perdureront, mais il semble que nous ayons une chance de tirer profit de cela.\n\nD'un côté, nos généraux pensent que nos recrues pourraient apprendre une chose ou deux de ces apparitions du passé. D'un autre côté, un ministre a suggéré d'envoyer quelqu'un de l'Ordre des Chroniqueurs pour enregistrer ces occurrences."
 deepwoods.47.a:0 "Apprendre du passé est la clé pour comprendre l'avenir. Envoyez les recrues."
 deepwoods.47.b:0 "Les Chroniqueurs vont adorer cela !"
 deepwoods.48.t:0 "Floraison Florale"
 deepwoods.48.d:0 "Dans le Bosquet-des-Fleurs, on peut trouver d'innombrables plantes et fleurs uniques au bosquet. La plupart de cette flore, aussi diverse en forme et en taille qu'éclatante en couleur, est fort mortelle lorsqu'elle est manipulée incorrectement. Mais, avec des mains prudentes, elles peuvent produire à la fois des teintures exquises et des poisons mortels.\n\nEn raison de la nature généralement éphémère de la flore, la plupart de ces teintures et poisons se trouvent en quantité limitée. Cependant, cette année a connu une floraison inhabituellement vibrante de vie végétale. La nouvelle de cette floraison n'a pas encore atteint les artisans et fabricants de potions à travers nos terres. Sans nul doute, ils sont impatients de voyager et de participer à la récolte abondante. La question est : qui devrions-nous favoriser avec cette nouvelle ?"
 deepwoods.48.a:0 "Les plus belles teintures rapporteront les plus merveilleux profits ! Informez les artisans !"
 deepwoods.48.b:0 "Les potions et poisons sont toujours nécessaires. Surtout pour nos espions..."
 deepwoods.49.t:0 "Une Escapade À Travers le Temps : Régiment perdu"
 deepwoods.49.d:0 "Nous avons reçu un rapport indiquant qu'un régiment entier a disparu lors d'une mission dans les Bois-Profonds. Bien qu'il ne soit pas rare que des soldats individuels se perdent dans ce terrain traître, que ce soit à cause de ruses féeriques ou de broussailles denses, il est fort inhabituel qu'un groupe aussi important disparaisse simultanément.\n\nEn réponse, nous avons déclaré l'état d'urgence et dépêché plusieurs patrouilles pour les localiser et les secourir, au cas où ils auraient été pris en embuscade. Des pisteurs expérimentés ont découvert leur piste dans une zone rarement foulée de [forward_send.GetName], mais leurs traces s'interrompent brusquement. Malgré des efforts exhaustifs, nos recherches ultérieures n'ont donné aucun résultat probant."
 deepwoods.49.a:0 "Les reverrons-nous un jour ?"
 deepwoods.50.t:0 "Une Escapade À Travers le Temps : Retour des soldats disparus"
 deepwoods.50.d:0 "[Root.Monarch.GetTitle], c'est un miracle ! Nos troupes, que l'on croyait perdues dans les profondeurs des Bois-Profonds, ont soudainement émergé près de [forward_receive.GetName] ! Elles ont été aperçues approchant un poste de garde, vêtues d'équipement et d'uniformes désuets. Leur connaissance d'anciens mots de passe a éveillé les soupçons des gardes, qui ont d'abord suspecté une machination. Cependant, après avoir sécurisé les soldats ordinaires et interrogé les officiers, il est devenu évident qu'il s'agissait bien de nos camarades depuis longtemps disparus, qui s'étaient évanouis sans laisser de trace lors d'une manœuvre de routine il y a de nombreuses années. Ils nous ont dit que pour eux, c'était comme si aucun temps ne s'était écoulé entre alors et maintenant.\n\nMaintenant, nous devons décider de leur sort. Ils ont été escortés jusqu'à [Root.Capital.GetCapitalName], et deux options s'offrent à nous : soit nous leur fournissons un entraînement actualisé et les réintégrons dans le service actif, soit nous les assignons aux réserves, leur offrant un repos bien mérité et du temps pour s'adapter à l'avenir."
 deepwoods.50.a:0 "Ils méritent du temps."
 deepwoods.50.b:0 "Ce sont des soldats et leur place est sur le champ de bataille."
 deepwoods.51.t:0 "Une Escapade À Travers le Temps : Renforts du futur"
 deepwoods.51.d:0 "[Root.Monarch.GetTitle] [Root.Monarch.GetName], quelque chose de très particulier s'est produit dans [backward_receive.GetName] : un régiment complet de soldats est soudainement apparu, arborant un équipement portant notre insigne, mais présentant des modifications notables comparé à notre matériel actuel. Ils affirment avec véhémence être des nôtres, pourtant leurs déclarations sont accompagnées de références à des officiers de haut rang qui, en réalité, sont bien trop jeunes pour occuper de telles positions dans l'armée. Notre enquête approfondie suggère qu'il s'agit bien de nos propres troupes, renvoyées du futur par une force inconnue.\n\nCertains officiers préconisent d'exploiter leurs connaissances pour former nos armées à des tactiques actualisées, tandis que d'autres proposent de les déployer comme guerriers en première ligne, accomplissant ainsi leur véritable dessein. La décision vous appartient, [Root.Monarch.GetTitle]."
 deepwoods.51.a:0 "Faites-les former nos autres troupes."
 deepwoods.51.b:0 "Envoyez-les en première ligne !"
 deepwoods.52.t:0 "Une Escapade À Travers le Temps : En arrière dans le temps"
 deepwoods.52.d:0 "Un événement longtemps anticipé s'est finalement déroulé devant nous, [Root.Monarch.GetTitle]. Le régiment composé des contreparties présentes des troupes qui nous ont jadis renforcés depuis le futur n'est pas revenu après un exercice de terrain dans [backward_send.GetName]. Nos patrouilles de recherche ont rapporté une découverte particulière : les traces du régiment s'interrompent brusquement dans une clairière forestière, comme emportées par quelque magie inconnue.\n\nIl a été porté à notre attention que tous les soldats qui sont apparus du futur ont progressivement convergé vers ce régiment même, presque comme s'ils étaient guidés par une influence extérieure. Dans une tentative d'éviter la situation actuelle, nous avons envisagé de disperser le régiment. Cependant, notre conseiller le plus érudit nous a mis en garde contre toute manipulation du délicat équilibre de la « causalité », et a souligné les périls de tenter de tromper le destin."
 deepwoods.52.a:0 "La « causalité » me donne mal à la tête."
 lost_in_time_forward_tt:0 "Peut-être trouveront-ils le chemin du retour..."
 lost_in_time_backward_tt:0 "D'où dans le temps sont-ils venus ?"
 lost_in_time_onemissing_tt:0 "Un régiment dans §Y[missing.GetName]§! a disparu."
 deepwoods_future_training:0 "Entraînement futur"
 deepwoods.53.t:0 "Au-Delà de la Lisière"
 deepwoods.53.d:0 "Trois douzaines d'elfes se tiennent devant [Root.Monarch.GetTitle]. Malgré leurs meilleurs efforts, ils s'agitent et se tortillent, incapables de contenir leur nervosité et leur excitation. C'est un sentiment que même [Root.Monarch.GetName] ne peut dissiper.\n\nLa vérité est que, malgré toutes ses horreurs et tribulations, les Bois-Profonds sont un foyer. On ne peut en dire autant des terres au-delà de ces canopées sombres et familières. Et maintenant, ces braves elfes s'aventurent vers ces contrées sur ordre de [Root.Monarch.GetTitle]. Il y a de fortes chances qu'ils ne reviennent jamais. Mais c'est un risque qu'ils étaient prêts à prendre. Tout ce qu'ils pouvaient faire était d'espérer que leur destination en vaille la peine..."
 deepwoods.53.a:0 "Ainsi partirent-ils vers le nord pour suivre les traces du guerrier nommé Corin."
 deepwoods.53.a.tooltip:0 "Ce voyage prendra environ un an."
 deepwoods.53.b:0 "Ils avancèrent vers l'ouest, dans de mornes marécages murmurés par les fées."
 deepwoods.53.b.tooltip:0 "Ce voyage prendra environ six mois."
 deepwoods.53.c:0 "Voyageant vers l'est, ils pénétrèrent dans la vallée entre les grandes montagnes."
 deepwoods.53.c.tooltip:0 "Ce voyage prendra environ un an."
 deepwoods.53.e:0 "Après de longs débats, l'expédition fut reportée."
 deepwoods.54.t:0 "Une Terre d'Orques, de Gobelins et d'Aventuriers"
 deepwoods.54.d:0 "Incroyablement, toute notre expédition vers le nord est revenue saine et sauve. Non seulement cela, mais ils ont réussi à revenir avec une demi-douzaine d'âmes supplémentaires : un couple d'aventuriers humains, un gnome prétendant venir de « l'Empire », et un trio d'Elfes Sylvestres qui suivirent Corin hors des bois il y a quelque temps !\n\nDe ce groupe hétéroclite et de nos propres expéditionnaires, nous avons appris que la terre au nord est connue sous le nom d'Escann, qui provient apparemment du terme « Cannor Oriental ». Escann est une contrée riche en terres fertiles et apparemment autrefois foyer de nombreux royaumes honorables et « chevaleresques » avant que les orques n'y déferlent il y a quelques décennies. Maintenant, cependant, c'est un lieu empli de conflits et de chaos. Car bien que les armées orques aient été défaites, diverses bandes d'aventuriers des lointaines contrées d'« Anbennar », de « Lorent » et d'ailleurs se battent encore pour repousser les clans orques restants et les clans d'esclaves gobelins affranchis qui y ont revendiqué leur territoire."
 deepwoods.54.a:0 "Il semblerait que leur lutte soit la même que la nôtre."
 deepwoods.55.t:0 "Six Visages Maussades"
 deepwoods.55.d:0 "Dans la salle du trône, [Root.Monarch.GetTitle] arbore une expression dure. Devant lui ne se tiennent qu'une demi-douzaine d'expéditionnaires débraillés, une fraction sobre des trente d'origine. Tout juste arrivés dans la capitale cet après-midi, ces elfes manifestement épuisés avaient insisté pour raconter leur histoire. Ainsi, [Root.Monarch.GetName] écouta.\n\nTout commença simplement, l'expédition naviguant sur l'Elyn près de Vyr Cors. En quittant les Bois-Profonds, les expéditionnaires se retrouvèrent au milieu d'un marécage sinistre à l'aura surnaturelle. Dès le deuxième jour, ils furent assaillis à répétition par de sauvages créatures bestiales et autres monstres contre-nature. Ainsi continua-t-il jusqu'au jour où le vaisseau sur lequel ils naviguaient fut perdu face aux créatures, dispersant les expéditionnaires.\n\nDu groupe arrivé, il y en avait initialement quatorze. Mais un à un, ils furent pris par le marécage. Enlevés par les bêtes canines dans la nuit. Perdus dans la terre traîtresse devenue épaisse et visqueuse. Ou, pire encore, déchiquetés et mutilés par les monstres ailés à queue courte du marécage.\n\nLes elfes baissent alors la voix jusqu'au murmure. Ils ne se sont jamais arrêtés pour aider leurs camarades enlevés. Ils ne se sont même jamais retournés. Tout ce qu'ils pouvaient faire était de courir et prier de revoir leur foyer."
 deepwoods.55.a:0 "Quelle folie a causé un lieu si maudit ?"
 deepwoods.56.t:0 "Le Royaume des Harpies"
 deepwoods.56.d:0 "Des expéditionnaires partis, tous sauf une poignée ont réussi à revenir du voyage vers le sud. Lorsqu'interrogés, les elfes restants sont d'abord plutôt embarrassés. Les réponses demeurèrent évasives jusqu'à ce qu'un elfe soit surpris en train de faire ce qui était clairement une sorte d'allusion suggestive à un autre elfe. À la demande de [Root.Monarch.GetTitle], une explication convenable fut finalement donnée.\n\nLe sud, selon les elfes de retour, abrite un terrain plutôt rude et montagneux. Non seulement cela, mais la contrée est aussi plutôt aride, avec la chaleur du soleil devenant particulièrement insupportable à midi. Non préparés à cela, l'expédition avait commencé à faiblir. Le désastre, cependant, fut évité grâce à l'intervention de créatures féminines ailées d'une, étant donné les détails gratuits, grande beauté. Bien qu'initialement prises pour des fées égarées, ces « harpies » étaient apparemment et curieusement ignorantes des Seelie ou Unseelie.\n\nAprès avoir été emmenés dans l'un de leurs « perchoirs » au sommet d'une montagne pour récupérer, les expéditionnaires furent surpris de trouver non seulement d'autres harpies mais aussi des non-harpies. Là, ils aperçurent des orques à peau sombre très différents des verts qui nous sont familiers, de robustes humains gardant des troupeaux, et même d'étranges elfes d'une contrée connue sous le nom de Bulwar ! Il s'avéra que cette collection de races constituait les « compagnons » des harpies.\n\nLes harpies se révélèrent être des « hôtesses gracieuses » pendant que l'expédition récupérait. Tant et si bien que lorsque vint le temps de rentrer, plusieurs expéditionnaires choisirent autrement pour « raisons personnelles »."
 deepwoods.56.a:0 "Quels voisins particuliers."
 deepwoods.59.t:0 "Une Vue Bienvenue"
 deepwoods.59.d:0 "Une vue étrange, bien que bienvenue, arriva à [Root.Capital.GetName] hier soir. Cette vue fut l'apparition d'une douzaine d'Elfes Sylvestres, vêtus de soieries étrangères colorées et portant des marchandises tout aussi bizarres. Ce n'étaient pas n'importe quels Elfes Sylvestres, c'étaient des survivants de l'expédition envoyée vers l'ouest il y a des années.\n\nSelon leur récit, ces expéditionnaires avaient trouvé refuge dans un château ancien à la lisière du marécage redouté, apparemment connu sous le nom de « Folie-de-Daravan ». Là, ils furent découverts par des marchands de passage qui eurent pitié d'eux. Ce qui s'ensuivit fut un voyage sans pareil.\n\nLeur périple les mena vers le sud jusqu'à la contrée d'Ourdia, où d'anciennes fortifications comme celle dans laquelle les expéditionnaires s'étaient réfugiés parsemaient la terre. En voyageant plus loin, ils rencontrèrent plusieurs races différentes. Les premiers furent les gobelins, tant ceux qui nous sont familiers que ceux « d'un exode ». Plus tard, ils rencontrèrent des communautés d'humains et d'« Elfes Solaires », des elfes qui sont apparemment de lointains cousins de nos propres ancêtres. Et bien qu'ils ne pussent la voir, on leur parla d'une cité nommée Ovdal Tûngr, creusée profondément dans les montagnes méridionales elles-mêmes où résident les « Nains de Cuivre ».\n\nMais rien de tout cela ne se comparait à la vue de « l'endroit où la terre finissait et l'eau commençait ». À l'émerveillement de chaque auditeur, les elfes de retour racontèrent comment l'infinie « mer » scintillait sous le soleil et où des vaisseaux plus grands que tout ce qui navigue sur le Lac-Silencieux traversaient l'horizon."
 deepwoods.59.a:0 "Incroyable !"
 deepwoods_decision_gather_expedition.tt:0 "\nRassemblez l'expédition et déterminez vers quelle direction elle partira."
 deepwoods_disappeared_villages:0 "Villages Disparus"
 desc_deepwoods_disappeared_villages:0 "Certains habitants de cette province ont mystérieusement disparu ne laissant que des forêts silencieuses. Peu voudront vivre ici tant que le mystère ne sera pas résolu ou que les gens n'auront pas eu le temps de passer à autre chose."
 deepwoods_fey_marked_villages:0 "Villages Marqués-par-les-Fées"
 desc_deepwoods_fey_marked_villages:0 "Plusieurs villages de cette province abritent des villageois marqués par les fées. D'une manière ou d'une autre, les Fées ont transformé ces villageois et les ont laissés en harmonie avec la forêt."
 deepwoods_new_dimension_of_silver:0 "Nouvelle Dimension d'Argent"
 desc_deepwoods_new_dimension_of_silver:0 "Au sein des légendaires mines d'argent touchées-par-les-fées d'Yfelorr se trouvent des veines d'argent récemment découvertes. Tous les efforts ont été déployés pour exploiter cette nouvelle source. Incroyablement, quoi que l'on extraie, il en reste toujours davantage."
 deepwoods_harrowing_bonehoarders:0 "Harcelants Collecteurs-d'Os"
 desc_deepwoods_harrowing_bonehoarders:0 "Les habitants de cette province sont contraints de se déplacer tandis que les mystérieux Collecteurs-d'Os errent en nombres inhabituellement importants."
 deepwoods_ciranmyna_expansion:0 "L'Expansion de Ciranmyna"
 desc_deepwoods_ciranmyna_expansion:0 "Ciranmyna, premier foyer des Elfes Sylvestres, se trouve une fois de plus dans le besoin d'une expansion concertée. Mages et tisserands œuvrent avec ardeur à « tisser » de nouveaux quartiers dans les flancs de la montagne. C'est le moment idéal pour investir dans les infrastructures de la cité."
 deepwoods_chroniclers_studying_bone_grove:0 "Chroniqueurs Étudiant le Bosquet-des-Os"
 desc_deepwoods_chroniclers_studying_bone_grove:0 "Des Chroniqueurs de l'Ordre des Chroniqueurs sont arrivés en masse pour étudier les échos du Bosquet-des-Os. Avec eux vient la diffusion de nouvelles idées du monde extérieur."
 deepwoods_recruits_training_in_bone_grove:0 "Recrues S'Entraînant dans le Bosquet-des-Os"
 desc_deepwoods_recruits_training_in_bone_grove:0 "Grâce aux échos du Bosquet-des-Os, les recrues acquièrent ici des expériences qu'elles ne pourraient trouver ailleurs. Le résultat : des soldats plus aguerris et un rythme plus rapide."
 deepwoods_vibrant_dyes:0 "Teintures Éclatantes"
 desc_deepwoods_vibrant_dyes:0 "Grâce à une floraison florale dans le Bosquet-des-Fleurs, nous avons accès à des teintures d'une couleur et d'une vivacité telles que les spectateurs en ont le souffle coupé. Nos marchands sont également à bout de souffle de leurs profits !"
 deepwoods_superior_potions_and_poisons:0 "Potions et Poisons Supérieurs"
 desc_deepwoods_superior_potions_and_poisons:0 "Grâce à une floraison florale dans le Bosquet-des-Fleurs, nous avons accès aux ingrédients nécessaires pour fabriquer des potions et des poisons particulièrement puissants. Nos espions apprécieront cet avantage."
 deepwoods_government_reform_isolation_mod:0 "Concentration Interne de Salla"
 desc_deepwoods_government_reform_isolation_mod:0 "En concentrant nos efforts vers l'intérieur, notre clan a réussi à obtenir une plus grande abondance au sein de nos clairières."
 merc_corintari:0 "Les Corintari des Bois-Profonds"
 merc_deepwoods_orc_rangers:0 "Rôdeurs Fléau-des-Ormes"
 deepwoods.60.t:0 "Chasser le Seigneur des Bêtes"
 deepwoods.60.d:0 "Les forêts mystérieuses des Bois-Profonds fourmillent à la fois de vie et de mort, une scène verdoyante sur laquelle le cycle de la nature se joue depuis l'aube des temps — si tant est qu'une telle chose puisse être dite d'un lieu si profondément sous l'influence des Fées. Il en est un plus que tout autre qui incarne ces lois, un grand et terrible archifée de la Cour Seelie. Les elfes sylvestres, premiers occupants des clairières, le connaissent sous le nom d'Arsydbadhál, le Vieux Loup. Les belliqueux orques verts apprirent rapidement à respecter son domaine, et le nommèrent Asgud-Domd, Maître de la Chasse, tandis que les rusés gobelins l'appelèrent simplement Prezmorzmept, Poigne-de-la-Mort. De telles appellations ne servent qu'à avertir de la maîtrise du Seigneur des Bêtes sur les bois, car encore et encore il traque les clairières, en quête de gibier toujours plus redoutable.\n\nLes équilibres de la nature exigent l'harmonie, cependant, et le Seigneur lui-même doit être à la fois prédateur et proie. Selon la légende, le Seigneur des Bêtes laisse des signes de sa présence, une invitation ouverte aux chasseurs les plus braves et les plus ingénieux. Au début, les rumeurs de l'apparition de sa marque furent rejetées comme des coïncidences, mais la vérité ne peut plus être niée : il vous a convoqué à [hunt_location.GetName]."
 deepwoods.60.a:0 "C'est mon destin."
 deepwoods.60.b:0 "Je n'ose défier le Seigneur dans son domaine."
 deepwoods.61.t:0 "Débuter le Voyage"
 deepwoods.61.d:0 "Vous vous tenez à la lisière d'une contrée sauvage extrêmement profonde d'une terre déjà sauvage, scrutant les bois impénétrables qui marquent la fin de la civilisation et le commencement du domaine de la nature. Courtisans et conseillers se regroupent à quelques pas, sceptiques et pourtant terrifiés. Un chêne imposant porte la marque, correspondant aux rapports de la garnison : quatre entailles, profondes et larges, fendent la face de l'arbre, chacune également terrible, mais clairement faite en un seul coup. L'air humide semble s'enrouler autour de vous, recouvrant votre peau d'une couverture perlée d'humidité... ou peut-être de sueur. Il attend."
 deepwoods.61.a:0 "Il ne peut m'échapper, comme je ne puis lui échapper."
 deepwoods.61.b:0 "Continuer serait folie."
 deepwoods.62.t:0 "La Fin du Voyage"
 deepwoods.62.d:0 "Malgré vos meilleurs efforts, une recherche méthodique ne porta aucun fruit et aucun autre signe du Seigneur des Bêtes ne put être trouvé. Était-ce simplement une ruse, ou avez-vous échoué ?"
 deepwoods.62.a:0 "Je ne le saurai jamais."
 deepwoods.63.t:0 "Franchir le Seuil"
 deepwoods.63.d:0 "Après une traversée périlleuse à travers des bois si sauvages que seuls les fées et les bêtes osent y pénétrer, vous vous tenez une fois de plus devant ce qui ne peut être que la marque du Seigneur des Bêtes. Vous rassemblez votre courage et approchez, et tandis que des arbres lointains se rapprochent, la faible lumière perçant l'épaisse canopée révèle une autre marque, et une autre au-delà. Vous savez qu'il ne peut y avoir de retour à partir de ce point. Continuer, c'est affronter le Seigneur des Bêtes."
 deepwoods.63.a:0 "Il ne peut plus y avoir de doute, je ne cesserai jamais cette chasse."
 deepwoods.63.b:0 "Seule la mort m'attend ici."
 deepwoods.64.t:0 "L'Approche"
 deepwoods.64.d:0 "Votre cœur bat la chamade tandis que vous vous glissez comme une ombre à travers le sol forestier, vous enfonçant toujours plus profondément dans l'inconnu. Vous ne pouvez détecter votre proie par des sens ordinaires ni magiques — et pourtant vous savez qu'il est proche. Dans cet état, le silence de la forêt est un tourment, chaque craquement et bruissement vous rapprochant de la folie. Si vous le prenez par surprise, tout cela pourrait se terminer en un seul instant."
 deepwoods.64.a:0 "Je dois y aller seul."
 deepwoods.65.t:0 "La Confrontation"
 deepwoods.65.d:0 "Nul conte d'aucun royaume n'aurait pu vous préparer à témoigner de la majesté macabre devant vous. Une masse imposante de muscles et de tendons se penche sur la ruine méconnaissable de sa dernière proie. Une cacophonie incompréhensible de crocs et de griffes, de fourrure et de plumes, de défenses et de cornes, se repaissant de la carcasse.\n\nVous n'osez même pas respirer tandis que votre main tremblante atteint une flèche, désespéré de mettre fin à cette rencontre avant qu'elle ne commence. Alors que vous levez votre arc, le monstre s'arrête — et son regard se fixe directement sur vous — avant qu'il ne rejette sa tête en arrière et pousse un rugissement assourdissant, un appel au combat qui ébranle votre âme même. Le Seigneur des Bêtes explose dans une charge furieuse, la gueule écumant de rage."
 deepwoods.65.a:0 "J'affronterai mon destin !"
 deepwoods.65.b:0 "FUYEZ !"
 deepwoods.66.t:0 "Contre Toute Attente"
 deepwoods.66.d:0 "Nul conte d'aucun royaume n'aurait pu vous préparer à témoigner de la majesté macabre devant vous. Une masse imposante de muscles et de tendons se penche sur la ruine méconnaissable de sa dernière proie. Une cacophonie incompréhensible de crocs et de griffes, de fourrure et de plumes, de défenses et de cornes, se repaissant de la carcasse.\n\nVous n'osez même pas respirer tandis que votre main tremblante atteint une flèche, désespéré de mettre fin à cette rencontre avant qu'elle ne commence.\n\nLe doux grincement de l'arc n'attire aucune attention du Seigneur des Bêtes festoyant, et vous laissez votre flèche voler, offrant une prière silencieuse."
 deepwoods.66.a:0 "Comme un voleur dans la nuit."
 deepwoods.67.t:0 "Un Seul Instant"
 deepwoods.67.d:0 "Les sages ont souvent noté que même le temps lui-même joue des tours dans les Bois-Profonds. Des années peuvent passer en secondes, et maintenant, un instant s'étire jusqu'à l'éternité. Votre flèche navigue paresseusement dans les airs tel un oiseau en vol, sifflant doucement — jusqu'à ce qu'elle s'enfonce dans le cœur du monstre avec un bruit sourd soudain.\nLe Seigneur des Bêtes pivote vers vous en poussant un cri déchirant, et trébuche en avant sur le sol, terrassé. Vous tombez à genoux, submergé de soulagement. L'épée du destin ne pèse plus au-dessus de votre nuque. Votre regard se tourne vers le monstre terrassé, et une vague de réalisation met fin à la transe. Vous avez chassé et terrassé le Seigneur des Bêtes comme un vulgaire cerf. Un exploit d'une telle ampleur inscrira votre nom dans les légendes pour toujours."
 deepwoods.67.a:0 "C'était mon destin."
 deepwoods.68.t:0 "La Confrontation"
 deepwoods.68.d:0 "Les sages ont souvent noté que même le temps lui-même joue des tours dans les Bois-Profonds. Des années peuvent passer en secondes, et maintenant, un instant s'étire jusqu'à l'éternité. Votre flèche navigue paresseusement dans les airs tel un oiseau en vol, sifflant doucement — jusqu'à ce qu'elle s'enfonce dans le flanc du monstre avec un bruit sourd soudain, le sang jaillissant de la blessure.\n\nLe regard du Seigneur des Bêtes pivote vers vous, avant qu'il ne rejette sa tête en arrière et pousse un rugissement assourdissant, un appel au combat qui ébranle votre âme même. Il ne peut y avoir ni fuite ni retard."
 deepwoods.68.a:0 "J'affronterai mon destin !"
 deepwoods.69.t:0 "La Bataille"
 deepwoods.69.d:0 "Nulle guerre ni conquête n'aurait pu vous préparer à l'intimité terrible de votre bataille contre le Seigneur des Bêtes. Ici, il n'y a ni murailles pour vous protéger, ni armées à vos ordres, ni diplomates pour négocier — et nulle paix. Vous tournez autour de la clairière face à votre ennemi, vous rapprochant lentement, votre arme jaillissant comme un serpent pour maintenir les griffes mortelles à distance.\n\nMême après avoir pris le Seigneur des Bêtes en embuscade et lui avoir infligé une grave blessure, il combat avec toute la férocité d'un glouton, vous poussant au-delà des limites de vos capacités martiales. Aucun de vous ne peut être parfaitement victorieux, et le sang s'écoule de vos formes lacérées tandis que lame et griffe trouvent leur marque peu à peu, cherchant sans cesse une chance de tuer enfin."
 deepwoods.69.a:0 "Je ne céderai jamais !"
 deepwoods.70.t:0 "La Bataille"
 deepwoods.70.d:0 "Nulle guerre ni conquête n'aurait pu vous préparer à l'intimité terrible de votre bataille contre le Seigneur des Bêtes. Ici, il n'y a ni murailles pour vous protéger, ni armées à vos ordres, ni diplomates pour négocier — et nulle paix. Vous tournez autour de la clairière face à votre ennemi, vous rapprochant lentement, votre arme jaillissant comme un serpent pour maintenir les griffes mortelles à distance.\n\nLe Seigneur des Bêtes combat avec la force d'un ours et la vitesse d'une mangouste, un égal naturel aux plus grands guerriers mortels de l'histoire, et seul votre désir brûlant de vivre empêche le désespoir de s'emparer de votre esprit. Le sang s'écoule de vos formes lacérées tandis que lame et griffe trouvent leur marque peu à peu, cherchant sans cesse une chance de tuer enfin."
 deepwoods.70.a:0 "Je ne céderai jamais !"
 deepwoods.71.t:0 "Silence"
 deepwoods.71.d:0 "Le Seigneur des Bêtes se dresse sur ses pattes arrière, et balance un bras imposant vers vous avec toute la puissance d'un animal sauvage désespéré de survivre. Tandis que votre corps supplie pitié, vous rassemblez toute la force restante dans vos muscles, et frappez avec une fureur sauvage. À votre surprise, le coup trouve sa marque, et vous enfoncez votre arme profondément dans le corps puissant du monstre. Il titube en arrière, abasourdi, et un dernier rugissement guttural ébranle les feuilles des arbres... puis cède la place au silence. Vous vous effondrez au sol, complètement épuisé. Après avoir rassemblé la force de vous relever, vous réalisez que vous n'êtes plus seul. Les nombreuses espèces des bois se sont rassemblées aux lisières de la clairière et dans les branches des arbres, observant silencieusement le carnage laissé par la rencontre de deux prédateurs au sommet."
 deepwoods.71.a:0 "D'une manière ou d'une autre, je suis encore en vie."
 deepwoods.72.t:0 "Fuite"
 deepwoods.72.escape:0 "Hurlant d'angoisse, le Seigneur des Bêtes bat en retraite avec une rapidité aveuglante dans la lisière de la forêt, disparaissant aussi soudainement que vous aviez posé les yeux sur lui, achevant la rencontre fatidique. Vous soupirez tandis que la montée d'adrénaline cède la place au soulagement du fardeau du destin."
 deepwoods.72.run:0 "Votre pouls bat comme les tambours de guerre tandis que vous déchirez les broussailles des bois profonds, fuyant le terrible avatar de la mort que vous avez si audacieusement poursuivi. Alors que vos membres commencent à faiblir, vous trébuchez et tombez, attendant impuissant une fin macabre qui ne vient jamais. Contre toute attente, vous avez échappé."
 deepwoods.72.a:0 "J'ai affronté la mort et suis revenu vivant."
 deepwoods.73.t:0 "Fuite : Blessure"
 deepwoods.73.escape:0 "Hurlant d'angoisse, le Seigneur des Bêtes bat en retraite avec une rapidité aveuglante dans la lisière de la forêt, disparaissant aussi soudainement que vous aviez posé les yeux sur lui, achevant la rencontre fatidique. Vous serrez les dents tandis que la montée d'adrénaline cède la place à la douleur de vos blessures. Les plaies guériront, mais les cicatrices demeureront."
 deepwoods.73.run:0 "Votre pouls bat comme les tambours de guerre tandis que vous déchirez les broussailles des bois profonds, fuyant le terrible avatar de la mort que vous avez si audacieusement poursuivi. À chaque pas, votre corps supplie pitié, et davantage de sang suinte des cruelles entailles laissées par les griffes du monstre. Vous ne pouvez qu'espérer que les blessures que vous lui avez infligées le ralentissent suffisamment pour vous permettre de fuir. Alors que vos membres commencent à faiblir, vous trébuchez et tombez, attendant impuissant une fin macabre qui ne vient jamais. Contre toute attente, vous avez échappé."
 deepwoods.73.a:0 "J'ai versé son sang."
 deepwoods.74.t:0 "Fuite : Blessure permanente"
 deepwoods.74.escape:0 "Hurlant d'angoisse, le Seigneur des Bêtes bat en retraite avec une rapidité aveuglante dans la lisière de la forêt, disparaissant aussi soudainement que vous aviez posé les yeux sur lui, achevant la rencontre fatidique. Vous serrez les dents tandis que la montée d'adrénaline cède la place à la douleur de vos blessures. Votre bras gauche pend à votre flanc dans un angle macabre, brisé et inutile. La bataille vous a coûté cher."
 deepwoods.74.run:0 "Votre pouls bat comme les tambours de guerre tandis que vous déchirez les broussailles des bois profonds, fuyant le terrible avatar de la mort que vous avez si audacieusement poursuivi. À chaque pas, la douleur explose de votre bras gauche tandis qu'il rebondit à votre flanc, mou et écrasé. Vous ne pouvez qu'espérer que les blessures que vous lui avez infligées le ralentissent suffisamment pour vous permettre de fuir. Alors que vos membres commencent à faiblir, vous trébuchez et tombez, attendant impuissant une fin macabre qui ne vient jamais. Contre toute attente, vous avez échappé."
 deepwoods.74.a:0 "J'ai payé un prix terrible..."
 deepwoods.75.t:0 "Vous êtes terrassé par le Seigneur des Bêtes"
 deepwoods.75.d:0 "Le combat sembla indécis au début, mais après que vous ayez trébuché, le Seigneur des Bêtes parvint à blesser votre bras armé, et ce fut le commencement de la fin. Votre corps ne fut jamais retrouvé, et les gens spéculent que vous avez rejoint le Seigneur des Bêtes dans la Chasse Sauvage pour l'éternité."
 deepwoods.75.a:0 "Je ne pouvais changer mon destin."
 deepwoods.76.t:0 "Compagnie Inattendue"
 deepwoods.76.d:0 "Bien qu'un certain temps se soit écoulé depuis votre retour triomphant, une partie de votre esprit traque encore les bois, retournant à la chasse chaque nuit, tandis que vos distractions et devoirs s'évanouissent avec le soleil. Par une telle nuit, déambulant silencieusement dans les ténèbres immobiles, votre esprit retourne à votre rencontre fatidique, lorsque vous prîtes véritablement conscience de la force de la vie en vous, et un frisson soudain parcourt votre échine. Vous jetez rapidement un regard par-dessus votre épaule, incertain de vos sens, et vous retrouvez une fois de plus face au monstre cauchemardesque... et alors la peur s'évanouit. Tandis que vous examinez ses muscles saillants, sa peau couverte de cicatrices et ses griffes tranchantes comme des rasoirs, vous voyez le cycle de la vie, s'étirant infiniment profond dans le passé et l'avenir, aussi éternel que dénué de malveillance. Il n'y a aucun mal ici, aucun monstre sinon ceux d'invention mortelle, juste un destin unique partagé par tous : vivre, puis mourir. Un léger sourire traverse votre visage, et le Seigneur des Bêtes parle :\n\n« Vous avez prouvé être le plus grand parmi votre peuple, pour m'avoir vaincu. Pour vos hauts faits, je vous accorderai une unique faveur, un outil avec lequel graver votre légende sur la pierre de l'histoire. Choisissez sagement, puissant chasseur. »"
 deepwoods.76.a:0 "Faites que mon peuple m'aime."
 deepwoods.76.b:0 "Aiguisez mon esprit."
 deepwoods.76.c:0 "Accordez-moi la beauté de la nature."
 deepwoods.76.e:0 "Permettez-moi de voir la vérité."
 deepwoods.76.f:0 "Montrez-moi ce que l'avenir réserve."
 deepwoods.77.t:0 "Étrangers dans la Nuit"
 deepwoods.77.escape:0 "En marchant de nuit, vous ressentez soudain un frisson, et une sensation familière d'être perdu vous envahit, et pendant un instant, vos sens sont inondés de l'explosion de vie que constituent les Bois-Profonds une fois de plus. Vous vous retournez, et voyez une bourse de tissu fin, rebondie de lourdes pièces. Alors que vous levez les yeux, vous apercevez juste une ombre disparaître dans la nuit."
 deepwoods.77.injury:0 "Vous ressentez quelque chose dans l'air en vous reposant dans votre jardin de nuit, et lorsque vous vous retournez, vous découvrez un sac de pièces d'or. Plus loin dans les ombres, vous voyez une silhouette sombre se retourner et disparaître dans les ténèbres."
 deepwoods.77.permanent:0 "Vous ressentez quelque chose dans l'air en tentant de faire une courte promenade claudicante dans votre jardin de nuit, et lorsque vous vous retournez, vous découvrez un sac de pièces d'or. Plus loin dans les ombres, vous voyez une silhouette sombre se retourner et disparaître dans les ténèbres."
 deepwoods.77.a:0 "Avoir chassé est en soi un honneur."
