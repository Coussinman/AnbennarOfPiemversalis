 hunt_lord_temp_mil_injury:0 "Blessure"
 desc_hunt_lord_temp_mil_injury:0 "Vous avez été blessé en chassant le Seigneur des Bêtes."
 hunt_lord_consolation:0 "A chassé le Seigneur des Bêtes"
 desc_hunt_lord_consolation:0 "Vous avez chassé le Seigneur des Bêtes, et même si vous n'êtes pas parvenu à le tuer, rares sont ceux qui oseraient même tenter un tel exploit."
 deepwoods_orc_tax_debuff:0 "Étrangers dans les Bois : Taxes"
 desc_deepwoods_orc_tax_debuff:0 "Ce clan ne s'est pas adapté à la vie dans les Bois-Profonds. Il faudra du temps et des efforts pour changer cela."
 deepwoods_orc_production_debuff:0 "Étrangers dans les Bois : Production"
 desc_deepwoods_orc_production_debuff:0 "Ce clan ne s'est pas adapté à la vie dans les Bois-Profonds. Il faudra du temps et des efforts pour changer cela."
 deepwoods_orc_military_debuff:0 "Étrangers dans les Bois : Militaire"
 desc_deepwoods_orc_military_debuff:0 "Ce clan ne s'est pas adapté à la vie dans les Bois-Profonds. Il faudra du temps et des efforts pour changer cela."
 deepwoods_orc_everything_in_its_place_reward_a:0 "Esclaves pour le Clan"
 desc_deepwoods_orc_everything_in_its_place_reward_a:0 "D'autrefois fiers Gobelins des Forêts servent désormais les membres de ce clan."
 deepwoods_orc_everything_in_its_place_reward_b:0 "Esclaves pour les Campements"
 desc_deepwoods_orc_everything_in_its_place_reward_b:0 "D'autrefois fiers Gobelins des Forêts peinent désormais au gré de ce clan."
 deepwoods_orc_everything_in_its_place_reward_c:0 "Esclaves pour la Guerre"
 desc_deepwoods_orc_everything_in_its_place_reward_c:0 "D'autrefois fiers Gobelins des Forêts combattent désormais comme chair à canon pour les guerres de ce clan."
 deepwoods_orc_ashenfey_tax_buff:0 "Guidance Cendrée : Taxes"
 desc_deepwoods_orc_ashenfey_tax_buff:0 "Ce clan a écouté de lointains murmures et a commencé à embrasser les bois."
 deepwoods_orc_ashenfey_production_buff:0 "Guidance Cendrée : Production"
 desc_deepwoods_orc_ashenfey_production_buff:0 "Les traditions de ce clan sont guidées par les fées de cendre."
 deepwoods_orc_ashenfey_military_buff:0 "Guidance Cendrée : Militaire"
 desc_deepwoods_orc_ashenfey_military_buff:0 "Les guerriers de ce clan rayonnent de la force de l'émeraude verdoyante."
 deepwoods_orc_investigation_title:0 "Enquêter sur les Murmures Sombres"
 deepwoods_orc_investigation_desc:0 "Si nous voulons découvrir la vérité, nous devons utiliser les Rôdeurs et les faire traquer la source de ces murmures qui nous hantent."
 deepwoods_orc_investigation_tt:0 "Envoyez les Rôdeurs Fléau-des-Ormes dans cette province pour trouver des indices sur les murmures sombres."
 deepwoods_orc_investigation_effect_tt:0 "Au travail, les gars."
 sapchopper_directing_the_host_title:0 "Diriger la Horde"
 sapchopper_directing_the_host_desc:0 "Notre clan n'est encore guère plus qu'une collection de guerriers et de pillards maintenus ensemble par la volonté de notre chef et ses dernières victoires. Ils acclament le nom Sapchopper maintenant, mais une seule défaite ou une mort inopportune suffirait pour que ces orques oublient leur nouveau clan. Tant que nous n'aurons pas prouvé la valeur de notre clan, des concessions devront être faites et la quête de gloire devra toujours être en ligne de mire."
 sapchopper_proof_of_strength_title:0 "Preuve de Force"
 sapchopper_proof_of_strength_desc:0 "De plus en plus, nous devenons un peuple, un clan. Lentement, les noms du passé s'effacent. Croc-Sanglant, Lame-Sanglante et autres deviennent secondaires face à Sapchopper. Et tandis que nous croissons en force et en gloire, le contrôle de notre chef sur le clan grandit également."
 sapchopper_hewn_from_dookan_title:0 "Taillé de Dookan"
 sapchopper_hewn_from_dookan_desc:0 "Nous avons abattu ennemi après ennemi, remporté victoire après victoire, et baigné dans une gloire sans fin. Ce qui n'était autrefois guère plus qu'une collection de guerriers et de pillards, le Clan Sapchopper se dresse désormais comme la puissance incontestée de ces bois. Et à la tête de tout cela se trouve notre chef, porteur d'une véritable Âme Orque, taillé de Dookan lui-même !"
 sapchopper_loyalty_in_loot_title:0 "Loyauté dans le Butin"
 sapchopper_loyalty_in_loot_desc:0 "La valeur d'un chef ne se mesure pas uniquement par ses prouesses ou sa gloire. Il doit également prouver sa valeur par le poids du butin de ses partisans. Bien que ces bois maudits puissent manquer de l'abondance que nous recherchons et méritons, leurs habitants ne manquent pas..."
 sapchopper_loyalty_in_loot_tt:0 "§YOccupez la capitale d'un rival§!, §Ypillez-la entièrement§! et §Yinfligez au moins 10 de dévastation§!."
 sapchopper_ogs_legacy_title:0 "L'Héritage d'Og"
 sapchopper_ogs_legacy_desc:0 "Bien que les orques de Blightseed n'aient pu résister à notre puissance, nous ne pouvions nous empêcher de remarquer la maîtrise de leurs chamans en des magies que nous n'avions jamais vues. Leurs sorts invoquaient la forêt elle-même, amenant vignes, branches et même arbres entiers à leur commandement.\n\nTout cela provenait du fondateur de leur clan, Og Blightseed, un orque manifestement né avec une véritable Âme Orque. Maintenant, avec son clan devenu partie du nôtre, il est temps de faire sienne sa force également."
 sapchopper_taming_the_wild_title:0 "Dompter le Sauvage"
 sapchopper_taming_the_wild_desc:0 "Les plus grands de notre clan chassent désormais régulièrement les fées du Bosquet-des-Chasseurs, savourant à la fois le frisson de la chasse et ses récompenses. Il est maintenant temps que notre jeunesse impatiente y prenne part, pour forger une volonté de guerrier et apprendre l'art du chasseur."
 sapchopper_cry_war_title:0 "Crier Guerre..."
 sapchopper_cry_war_desc:0 "La terre que nous possédons était autrefois détenue par les frêles elfes de Salla Cenág et Drennen. Et, depuis qu'elle a été légitimement prise, ces faibles ont amèrement tenté de la reprendre par des raids et embuscades sournois, ne nous affrontant jamais en bataille digne de ce nom. Pendant ce temps, les autres clans elfiques soutiennent lâchement ces vaines tentatives dans l'ombre.\n\nHah ! Pathétique ! Nous les méprisons ainsi que leurs méthodes déshonorantes."
 sapchopper_and_rend_havoc_title:0 "...et Semer le Chaos !"
 sapchopper_and_rend_havoc_desc:0 "Pendant des années, les raids elfiques sont apparus sans avertissement et se sont terminés tout aussi soudainement, ne nous laissant aucun moyen de nous défendre. Ce mystère prit fin lorsque nous apprîmes l'existence des soi-disant « voies-de-clairière ». Selon un elfe capturé, ces sentiers cachés permettent de franchir de grandes distances en peu de temps par quelque moyen étrange. Malheureusement, l'elfe ne survécut pas à sa captivité avant que nous puissions en apprendre davantage.\n\nPeu importe, nous découvrirons ces sentiers par nous-mêmes. Une fois que nous les aurons, nous donnerons aux elfes le goût d'un vrai combat."
 sapchopper_when_time_failed_title:0 "Quand le Temps Faillit"
 sapchopper_when_time_failed_desc:0 "Nos guerriers ont rapporté d'étranges murmures dernièrement. Ces murmures les ont avertis d'embuscades elfiques et les ont dirigés vers les campements ennemis. Parfois, ils peuvent même entendre une faible question. Une qui offre du pouvoir.\n\nC'est quelque chose qui devra être enquêté, plus tard. Pour l'instant, tout ce qui importe est que la défaite finale des clans Cenág et Drennen est à portée de main. Nous n'avons qu'à prendre le reste de leur territoire. Cette forêt maudite par Dookan semblera faire le reste."
 sapchopper_bloodying_some_tusks_title:0 "Ensanglanter Quelques Défenses"
 sapchopper_bloodying_some_tusks_desc:0 "À notre stupéfaction, c'est comme le disent les murmures. Le Clan Croc-Sanglant n'est plus et à sa place se trouve le soi-disant Clan Blightseed. Comment cela s'est produit, nul ne le sait. Mais, avec nos rivaux elfiques immédiats défaits, il y a une nouvelle clameur. Les orques qui autrefois appelaient Croc-Sanglant leur clan exigent que nous mettions ce clan nouveau-venu au pas.\n\nBien sûr, notre chef ne cède pas aux exigences. Cependant, il est indéniable que c'est une occasion parfaite de s'étendre et de satisfaire le clan dans le processus."
 sapchopper_the_hunters_hunted_title:0 "Les Chasseurs, Chassés"
 sapchopper_the_hunters_hunted_desc:0 "Tout comme les clans elfiques agaçants de Cenág et Drennen, les Elfes Sylvestres de Fealgarn ont obstinément refusé de plier devant la puissance orque. On dit qu'ils sont de puissants chasseurs, chevauchant leurs cerfs tandis qu'ils abattent proies et ennemis. Ce clan a maintes fois harcelé et entravé l'avancée orque, arrêtant les Croc-Sanglant, puis plus tard Blightseed. Malheureusement pour eux, c'est le Clan Sapchopper qui chasse maintenant."
 sapchopper_the_deadliest_game_title:0 "Le Gibier le Plus Mortel"
 sapchopper_the_deadliest_game_desc:0 "Avec la soumission des orques et la conquête des elfes, nous contrôlons maintenant ce que les deux appellent « le Bosquet-des-Chasseurs » ; un nom approprié pour cette contrée. Elle regorge de toutes sortes de créatures étranges et féroces. Certaines se dressent trois fois la hauteur d'un guerrier, revêtues d'écailles plus résistantes que le fer. D'autres fondent avec des vrilles barbelées à travers la canopée, saisissant des proies imprudentes. Et il y en a encore d'autres, dont la simple présence laisse les oreilles et le nez d'un chasseur saigner d'un seul hurlement. De tels ennemis glorieux ne peuvent rester sans défi !"
 sapchopper_into_the_shadows_title:0 "Dans les Ombres"
 sapchopper_into_the_shadows_desc:0 "De tous les clans orques, les orques de Lame-Silencieuse ont longtemps été les plus mystérieux. Bien qu'ils agissent apparemment comme les autres clans, rares sont ceux autorisés à entrer dans le « Bosquet-des-Ombres » sans soleil qu'ils appellent leur foyer. Bien qu'au début nous n'y pensions rien, il est maintenant clair que ce bosquet détient des indices sur la source de ces murmures sombres.\n\nNous devons y accéder, que ce soit par la parenté ou la hache."
 sapchopper_the_path_title:0 "Le Sentier"
 sapchopper_the_path_desc:0 "Il y a longtemps, nous avons découvert un moyen de voyager à travers les « voies-de-clairière ». Au début, nous les considérions simplement comme des commodités pour traverser la forêt. Ce n'est que bien plus tard que nous apprîmes que les voies-de-clairière étaient des connexions qui traversaient le royaume des Fées elles-mêmes !\n\nLa plupart de ces sentiers étaient découverts par les elfes. Cependant, il est maintenant clair qu'il existe un autre sentier ; un qui mène au cœur même de la forêt et à la source des murmures. Nous n'avons qu'à en découvrir un peu plus..."
 sapchopper_the_path_custom_trigger:0 "Le Sentier est découvert."
 sapchopper_the_path_reward_tt:0 "§TLa voie devient claire.§!"
 sapchopper_the_blackened_prince_title:0 "Le Prince Noirci"
 sapchopper_the_blackened_prince_desc:0 "Le Sentier est clair et le murmureur sombre de la forêt attend. Tout ce qui reste est que le Clan Sapchopper soulève la hache une fois de plus."
 sapchopper_whet_the_axe_title:0 "Aiguiser la Hache"
 sapchopper_whet_the_axe_desc:0 "Nous sommes entourés d'ennemis. Chiots gobelins à l'ouest ; lâches elfes au nord et au sud. Tous détalent dans les ombres et broussailles de la forêt, attendant en embuscade. Bah ! Pensent-ils que nous avons aussi peur de les affronter qu'eux de nous ? Risible.\n\nRassemblons le clan et balançons la hache. Nous débarrasserons à la fois le feuillage et les vermines qui se cachent dedans."
 sapchopper_bramble_smashing_title:0 "Écraser les Ronces"
 sapchopper_bramble_smashing_desc:0 "Le clan gobelin d'Écorche-Ronce a presque notre respect. Presque. Il est rare de voir un clan gobelin défier ouvertement les orques. Mais le rôle du gobelin et de l'orque ne peut être changé. L'un est fait pour servir l'autre. Il est temps de rappeler au Clan Écorche-Ronce leur place."
 sapchopper_breaking_ground_and_spirits_title:0 "Briser Sol et Esprits"
 sapchopper_breaking_ground_and_spirits_desc:0 "Même dans la défaite, les gobelins Écorche-Ronce continuent de nous résister. Les collectes de tributs ont été sabotées. Chaque taudis gobelin résonne de murmures de rébellion. Si nous devons étouffer cette résistance, nous devons broyer chaque gobelin jusqu'à la soumission."
 sapchopper_a_peculiar_walk_title:0 "Une Marche Particulière"
 sapchopper_a_peculiar_walk_desc:0 "Sur les ruines d'Elynaile se dresse Gudir'dar, notre cité sur le lac. Mais notre œuvre n'est pas achevée. Il est temps d'amener notre peuple à véritablement s'installer et faire de cette terre la nôtre, la sculptant comme Dookan l'aurait fait."
 sapchopper_dark_whispers_title:0 "Murmures Sombres"
 sapchopper_dark_whispers_desc:0 "Nous vivons dans ces bois depuis assez longtemps pour reconnaître leurs habitants féeriques et leurs manières capricieuses. Certains sont même devenus notre proie. Pourtant, même après tout ce temps, il y a eu quelque chose de plus en jeu. Alors que la plupart des fées sont de simples nuisances, il y a des rapports de fées qui nous observent. Les enfants chantent des comptines sur « le Prince » qui viendra les prendre. Et depuis leur étrange rencontre à Gudir'dar, notre chef souffre de cauchemars emplis de sombres promesses.\n\nAssez ! Il est temps d'agir. Rassemblons nos meilleurs et affrontons ce problème comme un orque se doit : de front."
 sapchopper_shatter_the_silence_title:0 "Briser le Silence"
 sapchopper_shatter_the_silence_desc:0 "Notre contrôle s'étend désormais dans un bosquet dominé par un lac massif. Et, sur la rive lointaine, nos espions les plus perspicaces aperçoivent une cité ; celle qui serait le cœur de la civilisation de ces elfes forestiers. Et cela signifie qu'elle regorge assurément de richesses. Des richesses qui seront nôtres."
 sapchopper_elynaile_no_more_title:0 "Elynáile N'Est Plus"
 sapchopper_elynaile_no_more_desc:0 "Le sac initial d'Elynáile fut glorieux, fournissant autant d'esclaves, d'argent et autres objets de valeur que nous en avions rêvé. Cependant, nous avons découvert que la cité et ses environs détiennent quelque chose d'encore plus grand : des terres fertiles.\n\nEt, contrairement au reste de la forêt, ici les orques peuvent vivre dans une relative normalité sans avoir à constamment se défendre contre les créatures « féeriques » surnaturelles d'ailleurs. Pour cette seule raison, nous devons reconstruire Elynáile en une cité digne des orques."
