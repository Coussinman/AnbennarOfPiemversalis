 sapchopper.1.t:0 "Clan Sapchopper"
 sapchopper.1.d:0 "D'une seule traction, Khagor Sapchopper libéra sa hache sanglante de l'elfe effondré devant lui. Un jour de plus, un raid de plus. Aujourd'hui, c'était Durzk'ungul et ses maudits elfes des terres jonchées d'os au sud. Demain ? Lui et ses guerriers marcheraient vers le nord et débusqueraient une fois de plus les troupes de la sorcière elfe harcelant les terres de son clan.\n\nL'orque marqua une pause, puis afficha un sourire froid. Ses guerriers. Son clan.\n\nIl n'y a pas si longtemps, il n'était que Khagor ; un pillard parmi les hordes de la Marée Verte, jusqu'à ce qu'il brise une armée elfique en abattant ses chefs. Son sourire mortel s'élargit. Ce jour avait été sanglant et glorieux ; le jour où le Clan Sapchopper fut déclaré avec lui comme chef.\n\nCependant, depuis lors, le temps avait commencé à se brouiller. Il avait souvent l'impression que des années s'étaient écoulées, même si lui ou ses orques ne le montraient pas. Sans doute quelque chose à voir avec cette forêt maudite et cette brume qui l'avait saisi.\n\nIl grogna.\n\nJadis, lui et ses orques avaient espéré échapper à ces bois, quitter cette terre maudite par Dookan et ne jamais revenir. Mais cet espoir s'était depuis longtemps aigri.\n\nIl n'y avait pas d'échappatoire. Il n'y avait pas de retour en arrière.\n\nUn faible gémissement interrompit les réflexions de l'orque. Il baissa les yeux pour trouver la source du son ténu. C'était l'elfe qu'il avait abattu. Le chef sentit son sourire revenir tandis qu'il observait l'elfe tenter de ramper, une traînée de sang suintant derrière lui. Après avoir savouré la vue un instant de plus, il abattit sa hache une fois encore.\n\nSi le Clan Sapchopper ne pouvait quitter cette forêt, alors il la briserait ainsi que ses habitants."
 sapchopper.1.a:0 "« Sapchoppers ! En marche ! »"
 sapchopper.1.a.tt:0 "Cet arbre de missions suit les épreuves et triomphes de Khagor Sapchopper. Il est fortement recommandé de recharger si Khagor meurt de manière inattendue pour la meilleure expérience narrative.\n\n"
 sapchopper.2.t:0 "Os Brisés et Épines Dispersées"
 sapchopper.2.d:0 "Khagor regardait les guerriers s'affairer. Ils étaient en train de piller les vestiges calcinés d'un village elfique, chaque hache de guerrier humide de pourpre. Les corps de guerriers et de villageois, vieillards et enfants, jonchaient le sol. La bataille, non, le massacre, s'était terminée, mais le chef sentait encore son sang bouillir.\n\n« Entendez-vous cela, mes guerriers ? » beugla-t-il.\n\nSon clan le regarda avec toute son attention.\n\n« Ce sont les cris de nos ennemis ! » continua-t-il. « Écoutez leurs bêlements paniqués. Écoutez comme ils détalent sachant que leurs sentiers secrets sont désormais nôtres ! »\n\nLes orques huèrent, riant tandis que certains faisaient des bruits d'animaux moqueurs. Khagor attendit que la clameur s'apaise avant de recommencer.\n\n« Entendez-vous cela, mes guerriers ? » cria-t-il à nouveau avant de hurler.\n\nUn chœur de hurlements rejoignit le sien.\n\n« C'est le son de la guerre ! De la victoire ! » hurla Khagor.\n\nLes hurlements se firent plus forts.\n\n« Plus de raids ! Plus de cachettes ! » Il hurla. « Seulement la vraie bataille ! »\n\nLe chef leva les bras, s'abreuvant des acclamations. Ce n'était que le commencement."
 sapchopper.2.a:0 "Sang pour Dookan ! Sang pour le Clan Sapchopper !"
 sapchopper.3.t:0 "Un Toast à l'Avenir"
 sapchopper.3.d:0 "Victoire. Victoire vraie et glorieuse une fois de plus. Khagor ferma les yeux, écoutant ses orques célébrer et acclamer, avant de boire profondément de son gobelet de vin elfique pillé. Il était faible, tout comme ses créateurs, mais savoir qu'il faisait partie du butin de guerre valait la peine de le descendre. Durzk'ungul et la sorcière elfe étaient mortes, leurs clans dispersés ou asservis.\n\nLe chef essuya sa bouche et ouvrit les yeux. Lorsqu'il ne vit que des brumes blanches, il laissa tomber le gobelet. Khagor n'entendit jamais son cliquetis. Le bruit ambiant de son clan victorieux avait disparu.\n\nC'était exactement comme la première fois que les brumes l'avaient saisi. Il était seul, aveuglé et assourdi par cette couverture blanche étouffante. Puis, il sentit quelque chose. Quelque chose... de plus.\n\n« Puissant Khagor, » murmura une essence. « Tu as bien fait de vaincre tes ennemis. Vraiment ta force est digne de la vision de ton créateur. »\n\nLes mots résonnèrent dans la tête de Khagor, consumant ses pensées. Un étourdissement le submergea.\n\n« Considère, puissant guerrier, qu'une chaîne te lie encore. Que toi et les tiens restez enchaînés, privés de votre vrai potentiel. Pourtant, tu peux encore être libéré. »\n\nKhagor ouvrit la bouche, mais aucun mot ne sortit. Le monde commença à tourner.\n\n« Regarde ta main. »\n\nMalgré sa vision défaillante, il se sentit contraint de regarder. Là, dans sa main, se trouvait à nouveau son gobelet.\n\n« Un cadeau. Un avant-goût de ce que tu pourrais posséder : une puissance sans entraves. Toi et les tiens n'avez qu'à boire. »\n\nLe chef s'évanouit. Lorsqu'il revint à lui, il se retrouva debout une fois de plus parmi son clan acclamant. Ils agirent comme s'ils ignoraient sa disparition. Pendant un instant, l'orque songea à blâmer son ivresse. C'est jusqu'à ce qu'il voie un liquide doré dans son gobelet. Il fixa..."
 sapchopper.3.a:0 "... puis but."
 sapchopper.3.b:0 "... puis jeta le gobelet au loin."
 sapchopper.4.t:0 "Chaque Chose à sa Place"
 sapchopper.4.d:0 "Dugz fut presqu'interloqué par le feu dans les yeux du gobelin. Malgré une douzaine de jours de marche depuis chez lui, lié par des chaînes, et à la merci du fouet de l'orque, il y avait encore un combat là-dedans.\n\nL'orque esclavagiste soutint le regard du gobelin un instant de plus, puis rit.\n\n« Hé, Dhoulza, » commença-t-il, poussant du coude sa compagne. « Regarde la rage sur celui-là ! »\n\n« D'accord, d'accord. Bien ! »\n\nIl suffit d'un regard à Dhoulza pour savoir quel esclave avait attiré l'attention de Dugz. Parmi la foule de gobelins, un seul osait lever les yeux et croiser son regard.\n\n« L'avorton, ouais ? »\n\n« C'est ça. »\n\nDhoulza donna un grognement d'approbation, « Fougueux celui-là. J'ai entendu dire qu'ils étaient tous comme ça avant. »\n\n« Ouais, j'ai entendu pareil. » Dugz acquiesça avant de continuer. « Tu crois que le chef me le laissera ? »\n\nSon compagnon esclavagiste haussa les épaules."
 sapchopper.4.a:0 "Y'a une chance. Le chef laisse le clan faire ses choix."
 sapchopper.4.b:0 "J'en doute. Ce lot est pour les nouveaux camps de guerre."
 sapchopper.4.c:0 "Hah ! Ce lot, c'est de la chair à canon pour la prochaine guerre !"
 sapchopper.5.t:0 "Au Vainqueur"
 sapchopper.5.d:0 "Pendant presque toute son existence millénaire, Elynáile fut le cœur de la société des Elfes Sylvestres. Ce fut dans les Halls-Luisants que les premiers pas vers l'unité elfique furent accomplis lorsque les clans elfiques formèrent le Pacte Verdoyant. Ce fut dans les Archives-Lumineuses que les chroniques de l'histoire et des connaissances des Elfes Sylvestres furent conservées. Et ce fut sur les rives silencieuses du Lac-Silencieux que les Elfes Sylvestres âgés passèrent leurs dernières années en contemplation.\n\nPlus jamais.\n\nLes rêves d'unité elfique ne sont plus que décombres brisés maintenant, tout comme les Halls-Luisants eux-mêmes. Des générations d'héritage elfique ne sont désormais que cendres comme les Archives-Lumineuses. Et la sérénité du Lac-Silencieux git brisée, aux côtés des corps de ceux dans leurs années crépusculaires.\n\nLa cité en ruines repose maintenant entre les mains du Clan Sapchopper."
 sapchopper.5.a:0 "Au vainqueur vont les butins !"
 sapchopper.5.a.tooltip:0 "§TLes rêves elfiques d'unité ont été brisés tout comme leur « Pacte Verdoyant »§!"
 sapchopper.6.t:0 "Les Croc-Sanglant"
 sapchopper.6.d:0 "Avant sa fondation, le Clan Sapchopper était composé de deux groupes : les pillards qui avaient trébuché dans les Bois-Profonds durant la Marée Verte, et les jeunes guerriers des Croc-Sanglant, un clan d'orques piégés dans les bois depuis près de trois générations. Ensemble, ils tentèrent de s'échapper des Bois-Profonds. Ce fut une tentative qui échoua finalement. Et dans le temps qui suivit, ceux qui n'avaient pas rejoint les Croc-Sanglant furent emportés par l'invasion de la Marée Verte.\n\nTout ceci était une histoire volontairement laissée oubliée, jusqu'à maintenant. Avec notre récente conquête des anciennes terres des Croc-Sanglant dans le Bosquet-des-Chasseurs, il y a des vétérans de notre clan qui ont commencé à se rappeler leurs racines. Bien qu'ils portent fièrement et loyalement le nom Sapchopper, ces guerriers aguerris sont allés jusqu'à pétitionner notre Chef pour le droit de gouverner leur ancien foyer.\n\nDe tels arrangements de clans mineurs gouvernant sous de plus grands ne sont pas rares. Accepter nous prêterait un flux précieux de guerriers et permettrait une meilleure utilisation de la terre, mais cela se ferait au prix d'une certaine perte de contrôle.\n\nQu'en dis-tu, Chef ?"
 sapchopper.6.a:0 "Très bien. Allez et portez l'honneur au nom Croc-Sanglant et Sapchopper."
 sapchopper.6.b:0 "Non. Le nom Croc-Sanglant est mort."
 sapchopper.7.t:0 "Embrasser le Foyer"
 sapchopper.7.d:0 "Khagor contemplait la cité, posée sur le lac scintillant, avec une fierté suffisante. Là où les cendres d'Elynáile se dressaient autrefois se trouvait la cité orque de Gudir'dar.\n\n« Des cendres, quelque chose de nouveau peut venir. »\n\nL'orque cligna des yeux tandis que les mots traversaient son esprit. Ils passèrent comme ses propres réflexions et pourtant... il y avait une familiarité. Il demeura incertain un instant avant de dissiper son malaise. Lentement, il reporta alors son regard sur sa cité. Sa glorieuse cité.\n\n« Mais il pourrait y avoir plus. »\n\nSa tête palpita, pourtant il ne put écarter la pensée. La cité n'était pas suffisante. Jusqu'à maintenant, lui et son clan s'étaient contentés de camps de guerre misérables, ne planifiant que leur prochaine bataille. Si ces bois étaient vraiment leur foyer, Sapchopper devrait en faire ainsi.\n\n« Le temps est venu d'embrasser ces bois. »\n\nKhagor marqua une pause."
 sapchopper.7.a:0 "« Oui, il est temps. »"
 sapchopper.7.b:0 "Et secoua la tête. Il devrait réfléchir davantage à cela."
 sapchopper.8.t:0 "Le Gibier le Plus Mortel"
 sapchopper.8.d:0 "Une bonne chasse est comme une bonne guerre : un test à la fois du corps et de l'esprit. Et il y a beaucoup de bonnes chasses dans le Bosquet-des-Chasseurs.\n\nAvec la conquête du bosquet loin derrière nous, et notre contrôle absolu, il est temps de récolter l'abondance de la terre. Bien sûr, le premier à le faire sera notre chef, flanqué des meilleurs guerriers de notre clan. Avec les armes aiguisées, les pièges placés et les provisions préparées, il ne reste qu'une tâche : décider de notre proie.\n\nAu sud errent les carapellars aux écailles de fer, facilement capables d'écraser un orque de leurs mâchoires. Vers l'est se trouvent les terrains de chasse des eyrpiercers, dont les cris peuvent rompre l'oreille d'un chasseur à plus de quarante pas. Pourtant, cela pâlit en comparaison de la Terreur-de-Bois-Sombre : un arbre ambulant qui a développé un goût pour la chair. Nombreux sont les chasseurs tombés face à sa ruse."
 sapchopper.8.a:0 "Les écailles formidables des Carapellars devraient constituer un défi."
 sapchopper.8.b:0 "Que nos hurlements égalent les cris des Eyrpiercers !"
 sapchopper.8.c:0 "Quoi de plus glorieux qu'abattre cette Terreur-de-Bois-Sombre ?"
 sapchopper.9.t:0 "D'Étrangers à Natifs"
 sapchopper.9.d:0 "Avec un cri sauvage, Khaara Sapchopper sauta de la branche. Avec un choc douloureux, elle atterrit sur le carapellar surpris en contrebas. Il se tordit et se cabra tentant de la projeter, mais c'était trop tard. Les mouvements sauvages ne firent qu'assurer sa perte.\n\nKhaara balança sa hache dès que la faille dans les écailles semblables à du fer de la fée se révéla. Elle fut récompensée par un jaillissement de sang et un cri strident de la créature féerique. Poussée par l'adrénaline, elle frappa encore et encore jusqu'à ce que finalement le carapellar soit immobile.\n\nElle s'assit sur la créature morte, incrédule, puis poussa un hurlement triomphant. La jeune orque n'était plus une simple fille mais avait prouvé qu'elle était une vraie fille du Clan Sapchopper. Maintenant tout ce qu'elle avait à faire était de prélever un trophée comme preuve.\n\nAprès que l'euphorie de la victoire se fut finalement calmée, Khaara roula hors de la créature et se mit à briser les précieuses écailles durcies de sa proie. En tout, il fallut une heure de travail diligent pour produire le beau tas d'écailles, mais cela valait la peine pour la célébration qu'elle recevrait.\n\nAlors qu'elle se retournait pour faire le long trajet de retour, Khaara se figea, réalisant qu'elle avait oublié d'honorer son succès. Elle ferma les yeux selon la tradition de son village et parla..."
 sapchopper.9.a:0 "« Louange à la forêt et à son abondance. Et louange aux fées de cendre. »"
 sapchopper.9.b:0 "« Je te remercie Dookan de m'avoir fait orque avec une âme digne. »"
 sapchopper.10.t:0 "Cendre à Cendre"
 sapchopper.10.d:0 "Khagor Sapchopper était incontestablement l'orque le plus puissant ayant jamais vécu dans les Bois-Profonds. Son clan revendiquait de vastes étendues de la forêt. Ses plus grands rivaux étaient soit morts soit dispersés. Sa position de chef était incontestée. Et malgré tout cela, cela ne signifiait rien.\n\nIl était affalé sur son trône, débraillé et épuisé. C'était le tribut que nuit après nuit de rêves sordides prenaient sur le chef de guerre. Ils étaient toujours les mêmes : un feu dévorant avalant tout ce qu'il avait construit dans un enfer cramoisi, mille figures misérables regardant tandis que seule une cendre amère le réclamait lui et son clan, puis une haine creuse s'infiltrant dans son cœur.\n\n« J'ai une idée ou deux là-dessus. »\n\nLe chef fixa le mercenaire devant lui. Son conseil avait fouillé au loin pour trouver des réponses à sa malédiction. Le plus près qu'ils étaient arrivés était Ruuk Fléau-des-Ormes, le chef d'un étrange groupe de mercenaires.\n\n« Une idée ? » répondit Khagor avec incrédulité. « J'attends des résultats. »\n\n« Et pour le bon prix, tu les auras. » grogna le mercenaire en retour, imperturbable.\n\nPendant un instant, Khagor sentit son ancienne énergie revenir, tandis que la fureur montait en lui face à une telle indolence. Puis, il donna un rire fatigué.\n\n« Enfin, un orque avec de l'épine dorsale ! » s'exclama le chef. « Bien, tu auras ton or. Et j'aurai mes réponses... ou ta tête. »\n\nRuuk répondit à sa menace par un sourire, « Bien. Je vais faire bouger les gars. »\n\nIl se retourna pour partir, entièrement indifférent à son audience, avant de s'arrêter. Croisant une fois de plus les yeux fatigués de Khagor, le mercenaire donna un dernier mot, « Ne fais pas confiance au Clan Lame-Silencieuse. »\n\nPuis il disparut."
 sapchopper.10.a:0 "Qu'est-ce que Lame-Silencieuse a à voir avec cela ?"
 sapchopper.10.tt:0 "§TLes Rôdeurs Fléau-des-Ormes§! deviendront disponibles à §Yla fin de ce mois§!. §YEngagez Ruuk et ses rôdeurs§! pour enquêter sur les mystères de la forêt via des §Tdécisions§!"
 sapchopper.11.t:0 "Le Murmureur"
 sapchopper.11.d:0 "« Ouais, patron, c'est celui-là. »\n\nRuuk hocha la tête, ses yeux suivant l'orque quittant le camp. Ça avait été un coup de chance. Il secoua la tête, non, c'était plus que de la chance. L'orque savait mieux que de douter de ses instincts. C'était quelque chose que son père ne le laissait jamais oublier.\n\nAlors que lui et ses compagnons mercenaires suivaient l'orque, Ruuk vida son esprit, se concentrant uniquement sur sa cible.\n\nL'orque était insignifiant, indescript même. Détournez les yeux d'eux, et vous oublieriez qu'ils aient jamais été là. C'était exactement comme le Murmureur, le faux orque dont les mots vils avaient scellé le destin de son clan.\n\nUne amertume jaillit en Ruuk en sachant que cette créature était à nouveau en chasse. Ses machinations avaient mis fin à la Marée Verte ; ruiné lui et bien d'autres. Maintenant, elle cherchait quelque chose du plus fort des clans orques.\n\n« Merde, on l'a perdu. »\n\nRuuk cligna des yeux aux mots de son compagnon. Bien sûr, la présence avait disparu. Même maintenant, il peinait à se rappeler ce qu'il avait même cherché.\n\n« Désolé patron. »\n\nIl secoua la tête avec un sourire, « Non. T'as bien fait. Avant c'était juste une intuition. Maintenant on sait. »"
 sapchopper.11.a:0 "« Nous aurons le Murmureur bientôt... »"
 sapchopper.12.t:0 "Un Sentier Différent"
 sapchopper.12.d:0 "Cela avait pris plus longtemps que Ruuk ne l'aurait aimé et certainement plus longtemps que le chef de plus en plus irrité de Sapchopper ne le voudrait. Mais ils avaient trouvé le Murmureur une fois de plus. Et ils avaient trouvé où il disparaissait.\n\n« Une entrée de voie-de-clairière ? Ici ? »\n\n« Il semblerait. » répondit Ruuk, examinant la terre marquée-par-les-fées.\n\n« C'est pas un sentier que j'ai vu. »\n\n« Hmm. »\n\n« Alors maintenant quoi, patron ? »\n\nPendant un instant, Ruuk songea à avancer. La poignée de rôdeurs avec lui regardèrent leur chef avec méfiance, sentant sa demi-pensée.\n\n« Tu comptes pas nous perdre dans le Royaume-Fée encore, hein ? »\n\nIl secoua la tête, « Une fois suffit. »\n\nIl y eut un soupir collectif silencieux de soulagement.\n\n« Alors quoi maintenant ? »\n\nRuuk fronça les sourcils, fouillant son esprit. Il n'y avait que deux façons de cartographier une voie-de-clairière inexplorée. La première était par essais et erreurs. Ça n'allait pas arriver. La seconde était d'acquérir une sorte de repère, un objet d'ancrage qui pourrait l'aider à naviguer dans le Royaume-Fée. Mais où trouverait-il cela ?\n\n« Patron ? » demanda un rôdeur, voyant le froncement croissant sur le visage de Ruuk."
 sapchopper.12.a:0 "« Je sais quoi faire. Et... je ne vais pas aimer ça. »"
 sapchopper.13.t:0 "Retour au Foyer"
 sapchopper.13.d:0 "Ruuk garda sa capuche relevée, prenant soin de ne permettre aucun regard sur son visage. Aucune âme ne lui prêta attention, mais la paranoïa plaça le poids de mille regards sur lui. Il était de retour. De retour dans le Bosquet-des-Ombres. De retour au Clan Lame-Silencieuse. De retour chez son peuple.\n\nMais... ce n'était plus son peuple. Plus maintenant. Ils portaient leurs visages, oui, mais ils étaient différents. Changés. Ils brillaient d'une lueur verte vibrante. Considéraient la forêt plus que leurs compagnons orques. Il les avait trahis.\n\nLe cœur lourd, il se retira dans les ombres. Sapchopper avait rendu possible son arrivée jusqu'ici, mais le reste dépendait de lui.\n\nIl escalada la palissade et sauta d'allée en allée. En arrivant à sa destination, Ruuk pouvait sentir son cœur battre la chamade. C'étaient les quartiers personnels de son père. Il y a une éternité, c'était d'ici qu'il avait fait sa honteuse fuite. Maintenant, c'était ici que sa rédemption commencerait enfin.\n\nLa pièce elle-même était en piètre état. Éparpillés à travers elle se trouvaient d'étranges babioles, des matériaux marqués-par-les-fées, et des pages de gribouillis incompréhensibles. Tous représentaient une figure, mince, pâle comme la cendre. Malgré la crudité du dessin, Ruuk pouvait sentir le regard de la figure. Écrit en dessous se trouvaient trois mots, « Le Prince Noirci ».\n\nIl frissonna avant de commencer une recherche frénétique. Après trop longtemps, il le trouva, une petite boîte sombre faite d'orme. Elle avait été longtemps convoitée par son père. Involontairement, il cracha sur le côté de colère. Le grand chef Troknar Lame-Silencieuse, désespéré pour une petite babiole."
 sapchopper.13.a:0 "« C'est la clé. Je le sais. »"
 sapchopper.13.a.tt:0 "§TLe Sentier vers la vérité a été découvert.§!"
 sapchopper.14.t:0 "Le Prince Noirci"
 sapchopper.14.d:0 "Ensemble, Khagor, Ruuk, et leurs meilleurs s'engagèrent sur le Sentier. Et comme Ruuk l'avait pensé, la boîte les avait guidés. Pourtant, lorsqu'ils en descendirent, Khagor et Ruuk se retrouvèrent seuls dans un lieu comme aucun autre.\n\nIci, le ciel sans soleil était un arc-en-ciel de couleurs, pris dans un crépuscule inconnaissable. Sous lui, le feuillage semblait danser devant eux, suivant la mélodie d'un chœur invisible de créatures. Même l'air lui-même semblait vivant, épais d'une énergie étrange et vibrante.\n\nC'était le cœur des Bois-Profonds : où le Royaume-Fée croisait le plan Matériel Primaire.\n\nPourtant, malgré une telle merveille, aucun orque ne put y prêter attention. Pas lorsque tous deux aperçurent une seule figure mince et cendrée qui les attendait. Ils étaient un avatar de la beauté de la nature, éveillant les instincts les plus primitifs.\n\n« Le Prince Noirci... » murmura Ruuk.\n\nJamais Khagor n'avait entendu un tel nom. Mais, d'une manière ou d'une autre, son cœur le connaissait. Le Prince lui sourit, comme s'il lisait son esprit, le laissant glacé. Comment une vue si douce pouvait-elle susciter une telle peur en lui ?\n\n« Oui, Merveilleux Voyageur, Chevaleresque Conquérant. » parla le Prince. « C'était ma propre voix. »\n\nLe chef fixa, abasourdi, tandis qu'il se rappelait les murmures sombres qui avaient empli son esprit toutes ces années."
 sapchopper.14.a:0 "Maintenant mon champion élu..."
 sapchopper.15.t:0 "Le Choix"
 sapchopper.15.d:0 "« J'ai sondé ton cœur, contemplé sa forme la plus pure.\n\nTu aspires au pouvoir de façonner le destin.\n\nÀ commander des légions d'un simple geste.\n\nÀ renverser des royaumes d'un seul mot. »\n\nTandis que le Prince Noirci parlait, Khagor sentit une palpitation familière. « N'écoute pas. » avertit Ruuk. Les mots semblaient si distants.\n\n« Ce que tu as est...\n\nQu'une ombre pâle du vrai pouvoir. »\n\n« Khagor ! » hurla Ruuk. « Ne les laisse pas te réclamer comme ils ont réclamé mon clan ! »\n\n« Tu as bien fait selon l'image de ton créateur.\n\nPourtant, leur temps est depuis longtemps révolu.\n\nC'est le moment de te libérer.\n\nEmbrasse-moi. »\n\nRuuk rugit de désespoir et chargea le Prince. Faiblement, Khagor l'entendit crier « Pour Lame-Silencieuse ! » Sa main de hache tressaillit. Sans y penser à deux fois, il..."
 sapchopper.15.a:0 "Abattit Ruuk."
 sapchopper.15.b:0 "Hurla, « Pour Sapchopper ! »"
 sapchopper.16.t:0 "L'Étreinte Émeraude"
 sapchopper.16.d:0 "Khagor ne pouvait expliquer pourquoi il s'agenouillait maintenant devant le Prince, prenant sa main offerte. Il ne pouvait expliquer la sensation qui le submergea tandis que quelque chose changeait en lui. Et il ne pouvait expliquer pourquoi rien de tout cela n'importait.\n\nMais, pendant un instant, il y eut le plus bref des doutes. La plus petite question qui résonna dans son esprit. Puis, Khagor leva les yeux vers son patron, son sauveur, son tout. Il lui sourit, et il sut, tout allait bien."
 sapchopper.16.a:0 "« Je suis tien, mon Prince. »"
 sapchopper.17.t:0 "Khagor du Clan Sapchopper"
 sapchopper.17.d:0 "D'une seule traction, le Prince Noirci libéra la hache du corps effondré de son ancien propriétaire. Un autre orque, un autre échec. Aujourd'hui c'était Khagor « Sapchopper ». Demain ? Le Prince regarda la hache avant de la jeter de côté. Il y en avait toujours un autre.\n\n« C'est une honte et un gaspillage. »\n\nEt avec ces mots acerbes, ils disparurent.\n\nLe temps passa. Pas comme dans le Matériel Primaire car l'air était trop chargé d'énergie féerique. Il serpentait et se tordait. Et quelque part dans ces instants, Khagor Sapchopper rassembla l'énergie de lever les yeux vers le ciel crépusculaire. Les lumières dansantes étaient aussi loin des cavernes de l'Échine-du-Serpent où il était né qu'il pouvait l'imaginer. Jamais il n'avait pensé à un tel endroit. Mais jamais il n'avait pensé qu'il deviendrait plus qu'un pillard. Jamais il n'avait pensé qu'il dirigerait un clan, son clan, de victoire en victoire. Et jamais il n'avait pensé qu'il mourrait ici, entre tous les lieux.\n\nIl sourit. Ça avait été une vie bonne et glorieuse. Et il savait, le Clan Sapchopper continuerait sans lui."
 sapchopper.17.a:0 "Gloire... au... Clan Sapchopper..."
 sapchopper.17.a.tt:0 "La lutte du Clan Sapchopper n'est pas terminée. Le Prince reviendra bientôt..."
 sapchopper.18.t:0 "SB Vassal"
 sapchopper.18.d:0 "La belle fée nous a dit d'abandonner."
 sapchopper.18.a:0 "Biiiien"
 sapchopper_ire_of_prince.tt:0 "Vous avez refusé le Prince Noirci"
 silentblade_a_home_in_the_shadows_title:0 "Un Foyer dans les Ombres"
 silentblade_a_home_in_the_shadows_desc:0 "L'ancienne Marée Verte est terminée et les clans se sont dispersés. Malgré cela, notre chef rusé a sécurisé de nouvelles terres pour nous. Il est temps d'en faire les nôtres."
 silentblade_the_first_pact_title:0 "Le Premier Pacte"
 silentblade_the_first_pact_desc:0 "Les gobelins : des créatures lâches à peine dignes d'être esclaves. Pourtant, nous ne pouvons nier qu'ils possèdent une certaine malice. Assez malins pour que les soi-disant « Gobelins des Forêts » aient appris à forger des pactes de pouvoir avec les Fées. Un fait qui a attiré l'attention de notre chef."
 silentblade_the_first_ashesworn_title:0 "Les Premiers Jure-Cendre"
 silentblade_the_first_ashesworn_desc:0 "Notre succès jusqu'à présent a été dû à la compréhension par notre chef de cette forêt infestée de fées. Pourtant, pour que Lame-Silencieuse prospère, davantage doivent apprendre à connaître ces terres étranges. Trouvons donc ceux qui sont prêts à apprendre."
 silentblade_binding_loyalty_title:0 "Lier la Loyauté"
 silentblade_binding_loyalty_desc:0 "Peut-être que les anciennes voies de l'Échine-du-Serpent nous ont bien servis. Peut-être. Mais l'Échine-du-Serpent est un souvenir lointain ; les bois sont maintenant notre foyer. Un nouvel ordre doit être construit et il est temps que notre chef et les Jure-Cendre le fassent comprendre."
 silentblade_an_emerald_glimmer_title:0 "Une Lueur Émeraude"
 silentblade_an_emerald_glimmer_desc:0 "Notre chef a une fois de plus prouvé sa force et sa perspicacité. Des victoires ont été remportées et la gloire gagnée. Il est temps de nous réjouir et de partager le butin !"
 silentblade_breaking_the_chains_of_the_past_title:0 "Briser les Chaînes"
 silentblade_breaking_the_chains_of_the_past_desc:0 "D'innombrables générations nous avons combattu pour Dookan. Nous avons trimé, asservis par la promesse de ce que sa libération apporterait. Plus jamais. Notre chef nous a montré une nouvelle voie, mais tous au sein du clan n'ont pas encore compris ce qu'est vraiment la liberté. Il est temps de le leur montrer."
 silentblade_the_path_title:0 "Le Sentier"
 silentblade_the_path_desc:0 "Avec notre harmonisation croissante à la forêt, vient l'intérêt croissant de notre chef pour ses pouvoirs. Dispersées à travers ces terres se trouvent des voies-de-clairière qui s'entrelacent avec le Royaume-Fée lui-même. Les lâches elfes les utilisaient autrefois pour traverser rapidement la terre et nous assaillir, mais il y a des murmures qu'il reste encore un sentier non découvert..."
 silentblade_the_path_reward_tt:0 "Le Cœur de la Forêt s'ouvrira pour nous..."
 silentblade_righting_wrongs_title:0 "Redresser les Torts"
 silentblade_righting_wrongs_desc:0 "Au cœur de la forêt, où la ligne entre les dimensions s'est complètement brouillée, se trouve le potentiel d'un pouvoir comme nul autre. Nous n'avons qu'à suivre notre chef et le prendre."
 silentblade_chosen_of_the_prince_title:0 "Élu du Prince"
 silentblade_chosen_of_the_prince_desc:0 "La fin du commencement..."
 silentblade_to_sow_friendship_title:0 "Semer l'Amitié..."
 silentblade_to_sow_friendship_desc:0 "Avec la fin de la Marée Verte en amère déception, les liens qui unissaient les clans se sont rompus. Il est temps de semer les graines d'une nouvelle alliance, libre des échecs du passé."
 silentblade_nurture_with_trust_title:0 "...Et Nourrir Par la Confiance"
 silentblade_nurture_with_trust_desc:0 "Les mots s'échangent facilement, mais la vraie confiance se construit sur l'action. Telle est la voie orque. Si nous voulons utiliser nos soi-disant alliés, nous devons agir et pas seulement parler."
 silentblade_bound_by_bark_and_branch_title:0 "Liés Par Écorce et Branche"
 silentblade_bound_by_bark_and_branch_desc:0 "Nos rivaux les plus proches ont été écrasés. Il est temps que ceux qui restent comprennent notre puissance et nos voies."
 silentblade_a_fools_honor_title:0 "L'Honneur d'un Imbécile"
 silentblade_a_fools_honor_desc:0 "Au nord lointain, se trouve le Clan Hurlement-Maudit, notre ancien allié et maintenant rival. Comme l'un des grands clans qui nous ont rejoints dans l'invasion des Bois-Profonds, leurs guerriers intrépides et leur puissant chef Gordak étaient parmi les meilleurs de l'avant-garde orque. Raison suffisante pour éviter toute confrontation frontale défavorable. Heureusement, Gordak est un orque lié par l'honneur, prêt à régler tout défi au pouvoir par un duel traditionnel. Avec un peu de poison et le bon prétendant, nous pouvons utiliser l'honneur de cet imbécile contre lui..."
 silentblade_last_howls_title:0 "Derniers Hurlements"
 silentblade_last_howls_desc:0 "Nous avons égalisé les chances autant que possible avec notre subterfuge, tout ce qui reste est de frapper pendant que notre ennemi est en difficulté. Il est temps de faire taire le Clan Hurlement-Maudit une fois pour toutes !"
 silentblade_shaping_the_tool_title:0 "Façonner l'Outil"
 silentblade_shaping_the_tool_desc:0 "Avec les trois grands clans fermement sous le contrôle de notre chef, c'est maintenant le décret de [Root.Monarch.GetName] que tous soient enseignés les voies de la forêt. Qui sommes-nous pour ne pas être d'accord ?"
 silentblade_failures_and_outsiders_title:0 "Échecs et Étrangers"
 silentblade_failures_and_outsiders_desc:0 "Les elfes de ces grands bois ont squatté et gaspillé pendant des siècles. Pourquoi sinon luttent-ils tandis que nous prospérons ? Et maintenant ils se rassemblent faiblement désespérés de s'accrocher au peu qu'ils ont. Il est temps de trouver une faille dans leur alliance pathétique."
 silentblade_the_second_conclave_of_elynaile_title:0 "Le Second Conclave"
 silentblade_the_second_conclave_of_elynaile_desc:0 "Il y a des années, les elfes se sont réunis dans un grand conclave pour tenter de survivre. Maintenant ce sera leur perte. Nous n'avons qu'à amener nos agents en place ou causer assez de détresse pour décapiter cette bête à plusieurs têtes."
 silentblade_petty_grudges_title:0 "Rancunes Mesquines"
 silentblade_petty_grudges_desc:0 "À notre ouest se trouve le Clan Lune-Noire, l'un des trois grands clans entrés dans les Bois-Profonds avec nous. Leurs chamans et leur chef Relgakk étaient jadis de puissants alliés, mais maintenant ils posent une grave menace puissante pour nous. Heureusement, ils furent les derniers à embrasser la vie dans la forêt et même maintenant escarmouchent amèrement avec des esclaves gobelins échappés de Rondin-Pointu. Avec un peu de subterfuge, nous pourrions créer une ouverture et mettre fin aux ambitions de nos anciens alliés avant qu'elles ne commencent."
 silentblade_verdant_eclipse_title:0 "Éclipse Verdoyante"
 silentblade_verdant_eclipse_desc:0 "Avec nos espions en place, le moment est venu d'écraser les orques de Lune-Noire avec notre ruse supérieure. Nous devons frapper vite et fort."
 silentblade.1.t:0 "Quelque Chose Remue"
 silentblade.1.d:0 "Il fut un temps où Ruuk, fils le plus fort de [Root.Monarch.GetName], n'était jamais loin de son père. C'était attendu ; en supposant que [Root.Monarch.GetName] reste chef, Ruuk lui succéderait après sa mort. Il était censé apprendre à gouverner en partageant et questionnant les décisions et jugements de son père.\n\nCes jours étaient révolus. Plus le clan Lame-Silencieuse était resté dans les Bois-Profonds, plus [Root.Monarch.GetName] avait recherché la solitude, passant souvent des heures seul dans les bois avant de revenir donner des ordres à son clan. Initialement, Ruuk pensa qu'il pleurait la mort de sa mère. Mais alors que les ordres devinrent plus erratiques et le comportement de [Root.Monarch.GetName] plus étrange, Ruuk commença à réaliser qu'il y avait quelque chose de plus. [Root.Monarch.GetName] n'avait aucune intention de lui enseigner le commandement, parce qu'il n'avait pas l'intention qu'il prenne jamais le commandement.\n\nParce que [Root.Monarch.GetName] n'avait pas l'intention de mourir.\n\nQuelque chose avait été mis en mouvement, et Ruuk savait qu'il était bien trop tard pour l'arrêter, s'il l'avait jamais pu. Quelque chose avait amené la Marée Verte dans cette forêt maudite, et quoi que ce soit, c'était sur le point de consumer le clan Lame-Silencieuse. Il devait le combattre, mais il ne pouvait pas, pas ici, pas seul. Il rassemblerait des alliés parmi les autres clans, s'était-il dit. Défier son père en Ozarm'Chadash avant de savoir à quoi il était confronté était insensé, s'était-il dit. Ce n'était pas suffisant pour se convaincre. Il savait ce qu'il avait fait."
 silentblade.1.a:0 "Lui, Ruuk Lame-Silencieuse, fils le plus fort de [Root.Monarch.GetName], avait fui de terreur."
 silentblade.2.t:0 "Lueurs d'Émeraude"
 silentblade.2.d:0 "Le Chef s'approcha du chaudron. Il n'avait pas l'air magique le moins du monde. Il ressemblait à de l'eau, et s'il avait une odeur, elle était noyée par la fumée des torches qui illuminaient la nuit. Les orques les tenant étaient silencieux, étaient distants d'une certaine manière. « Et cette boisson féerique nous donnera l'immortalité ? » Un sourire se forma sur le visage de [Root.Monarch.GetName], bien qu'il ne s'étende pas à ses yeux jaunes. « Ça ? Non, ça te liera aux fées, rien de plus. C'est le pacte qui apporte l'immortalité. Ça n'est que le carburant. »\n\n[Root.Monarch.GetName] plongea une coupe dans le chaudron, et l'offrit à lui, mais le Chef hésita. « Et que donnons-nous en retour ? » Le sourire de [Root.Monarch.GetName] se dissipa. « Tu connais la réponse à cette question. C'est nécessaire. Dookan est perdu, et Dookanson est mort. C'est le seul avenir pour notre espèce. Le seul avenir sans faiblesse, sans déshonneur. Ce n'est pas de la servitude, c'est un but. Tu sais que ça doit être fait. »\n\nSans un mot, le Chef prit la coupe, et but."
 silentblade.2.a:0 "Au but."
 silentblade.3.t:0 "Le Cœur de la Forêt"
 silentblade.3.d:0 "Peur. Incertitude. Doute. Ugol Assoiffé-de-Sang avait affronté ces ennemis d'innombrables fois sur le champ de bataille. Chaque fois, il les avait occis à chaque balancement de sa hache tandis qu'il abattait elfe, gobelin et orque. Pourtant, ici sous un ciel sans soleil embrasé d'arcs-en-ciel de verts, roses, oranges et plus, il n'y avait aucun ennemi à abattre. Il n'y avait aucun adversaire à vaincre. Il n'y avait rien à gagner ni gloire à obtenir.\n\nAu lieu de cela, il y avait le déchaînement du feuillage, animé d'une frénésie plus proche d'un berserker. Lointain mais toujours présent était le rugissement furieux de créatures invisibles, comme criant vengeance. Et, le plus pressant, était le bourdonnement de l'air lui-même. Il était épais, plus épais qu'Ugol ne l'avait jamais cru possible, même pour la Forêt. Et comme il s'accrochait à lui ! Comme s'il essayait de le réclamer comme sien.\n\nUgol grogna avec un tremblement agité.\n\nPeur. Incertitude. Doute. Ces ennemis s'étaient levés une fois de plus, et cette fois ils détenaient une force qui semblait insurmontable. À sa honte, Ugol déplaça ses yeux pour apercevoir les autres guerriers. Ils, comme lui, se balançaient avec malaise. Il croisa le regard d'un autre orque juste assez longtemps pour savoir qu'il le ressentait. Quoi que ce soit.\n\nUne pensée lointaine hurla de quitter cet endroit. C'était honteux. Pourtant, Ugol faillit se retourner. Faillit. Ce fut seulement la vue de [Root.Country.Monarch.GetName] qui le maintint enraciné. Deux fois plus grand que tout membre du clan, rayonnant de pouvoir émeraude, [Root.Monarch.GetSheHe] était un avatar de force. C'est jusqu'à ce qu'une seule flèche frappe juste."
 silentblade.3.a:0 "Et le chaos éclata."
 silentblade.4.t:0 "Fils Égaré"
 silentblade.4.d:0 "Ruuk baissa son arc sans satisfaction. Sans doute, c'était un tir dont son père aurait été fier. Mais son père était mort, remplacé par la chose misérable et déformée qui venait de s'effondrer. Il se retourna, abandonnant la pensée pour affronter sa troupe.\n\n« C'est ici ! » beugla Ruuk, levant son arc. « C'est ici que nous traçons la ligne ! C'est ici que nous montrons notre puissance ! »\n\nLes orques hétéroclites devant lui beuglèrent à l'unisson. Leur rage, leur colère, leur force le submergèrent. Ce n'était pas un mélange d'orques perdus et sans clan. C'était l'avant-garde contre la vilenie qui se tenait devant eux.\n\nLâchant son arc, Ruuk Fléau-des-Ormes, non, Ruuk Lame-Silencieuse souleva sa hache.\n\n« Ensemble ! Pour le Clan Lame-Silencieuse ! »\n\nIl se retourna pour affronter la foule chaotique d'orques qu'il appelait autrefois son clan. Ils étaient désorganisés. Faibles. Pourtant, au loin, il put apercevoir la créature qu'il pensait morte se relever une fois de plus. Il renifla, ignorant le creux dans son estomac. Ça n'allait jamais être si facile.\n\nAvec une dernière respiration, il lâcha le cri de guerre qui avait jadis guidé son peuple."
 silentblade.4.a:0 "Urak Dul !"
 silentblade.5.t:0 "Le Rituel"
 silentblade.5.d:0 "« Peut-il encore être fait ? », questionna le créateur du Spriggan.\n\n« Oui, mon Prince. Le rituel reste intact... pour ceux qui restent... », le Spriggan s'interrompit.\n\nAucun mot ne suivit son commentaire, au lieu de cela il n'y eut qu'un silence redoutable. Le Spriggan ne put s'empêcher de trembler, car bien qu'il gardât la tête baissée, la fureur froide du Prince pouvait être ressentie sinon vue.\n\n« Nous rassemblerons ce qui a été perdu après, » finalement parla le Prince, ses mots froids comme le givre. « Commence. »\n\nSans oser un regard en arrière, le Spriggan flotta vers l'avant vers le centre du cercle rituel. Haut au-dessus des survivants victorieux sans méfiance, il chanta les mots qui avaient pris mille vies à apprendre. Bientôt mille voix de plus crièrent à l'agonie, rejoignant le chant du Spriggan.\n\nOui, la douleur était comment cela commencerait. La chaleur des flammes lécherait les âmes mêmes des orques. Puis viendrait le chagrin. Une cendre étouffante qui menaçait de les engloutir entièrement. Mais, alors, il y aurait la colère. L'indignation légitime envers le destin qui leur a été jeté. Enfin, la vengeance. Car tout tort doit être rencontré par un tort.\n\nPourtant, pour l'instant, il y avait le silence.\n\nLe Spriggan baissa les yeux et vit une mer grouillante d'émeraude. N'était-ce si redoutable, peut-être, il aurait ressenti de la fierté. Mais quelle fierté pouvait-il y avoir dans le silence ?\n\n« Tu m'as bien servi, Tisserand Gris. »\n\nEn cet instant, le Tisserand Gris ressentit un frémissement. Une complétude qui lui avait échappé pour toute sa courte vie jusqu'à maintenant. Le Tisserand leva les yeux vers son créateur. Pourtant le Prince ne croisa pas son regard, fixant simplement l'horizon néon scintillant du Royaume-Fée."
 silentblade.5.a:0 "Mais ton travail ne fait que commencer."
 silentblade.6.t:0 "La Fin du Commencement"
 silentblade.6.d:0 "Pour ceux du Royaume-Fée, le temps n'avait jamais été une préoccupation. Ici, où la vie jaillissait librement, son passage n'était pas plus pressant que la brise légère qui traversait le visage brûlé du Prince Noirci.\n\nDe l'autre côté, cependant, le temps était un coup de vent rugissant. Le Prince pouvait sentir ses serviteurs prendre le contrôle des clans et créatures pas encore ralliés. Il y avait encore de la résistance, oui, mais le premier pas avait enfin été franchi.\n\n« Ce n'est point sage parcours, cher Prince, » résonna une voix fantasque.\n\n« En effet, » acquiesça une voix sage et bienveillante. « Cela ne portera que fruits amers ! » « Chaînes non croissance, » gazouilla quelque chose sombrement. « Stagnation non changement. »\n\nUne main verdoyante délicate effleura alors la joue du Prince, son propriétaire murmurant doucement à son oreille, « Une si pourrie expression. Qu'est-il donc advenu de mon cher Gardien de la Floraison ? »\n\nL'air craqua avec le claquement de bois tandis que le Prince Noirci arracha la main. Au plus profond, l'archifée sentit une fureur longtemps couvant menacer d'éclater en brasier violent. Pendant un instant intemporel, la flamme de haine faillit le consumer. Mais alors l'instant passa, car même dans le Royaume-Fée le temps continuait de s'écouler.\n\n« Le Gardien est mort, belle Dame, » répondit le Prince amèrement, se retournant pour affronter son audience rassemblée, « Rien que cendre comme tous les autres qui furent perdus. »\n\nLe Prince des Fous. Seigneur Floraison. Le Héraut du Changement. Même la Dame Émeraude. Le Prince savait que ses actions attireraient la colère et l'attention, mais que Seelie et Unseelie le questionnent ouvertement était plus qu'il n'avait anticipé. Pourtant, cela ne signifiait pas qu'il n'était pas préparé.\n\n« Mais je n'ai point oublié la charge du Gardien, » continua l'archifée avant de plonger dans son corps calciné. Le bois craqua et se fendit une fois de plus tandis que le Prince tirait le seul espoir qui demeurait encore en lui. Dépliant doucement son doigt, l'archifée produisit une seule graine non sans ressemblance avec un gland, tant en taille qu'en forme.\n\nÀ sa vue, les autres archifées ne dirent rien. Leurs doutes, leurs incertitudes, leurs questions persistaient encore. Mais ils ne parlèrent pas.\n\nSeul une fois de plus, le Prince Noirci laissa son regard reposer sur la graine innocente."
 silentblade.6.a:0 "Lentement, ses lèvres se courbèrent en quelque chose qu'on prit pour un sourire."
 silentblade.7.t:0 "Envie Émeraude"
 silentblade.7.d:0 "Ugol Assoiffé-de-Sang traversa la foule vers le chaudron, où [Root.Monarch.GetName] l'attendait. La foule était silencieuse, leurs défenses polies brillant à la lumière des torches. Jadis, Assoiffé-de-Sang avait été plus grand que [Root.Monarch.GetName] d'un pouce. Maintenant, le chef du Clan Lame-Silencieuse le dominait de près de deux têtes. L'effet de la magie féerique qu'il avait imprégnée en lui-même, disait-on. La magie féerique qui était maintenant aussi à la portée d'Ugol. Ruuk Fléau-des-Ormes pouvait lui parler toute la journée des coûts, cela ne changeait strictement rien."
 silentblade.7.a:0 "Pour le pouvoir, ils embrasseraient les Fées."
 silentblade.7.b:0 "Pour la victoire, ils embrasseraient la Forêt."
 silentblade.7.c:0 "Pour la gloire, ils céderaient à Lame-Silencieuse."
 silentblade.8.t:0 "Le Duel"
 silentblade.8.d:0 "Lazga pouvait sentir que cet Ozarm'Chadash était faux. Son frère Gordak, grand chef et seigneur de guerre du Clan Hurlement-Maudit, avait affronté des challengers auparavant, et les avait tous tués. Le challenger que Gordak affrontait aujourd'hui, Tûka, n'était pas différent... Ne devrait pas être différent. Gordak n'écouterait pas, mais Lazga savait mieux. Elle connaissait Tûka depuis qu'ils étaient enfants. Tûka avait la même apparence qu'il avait toujours eue. Sa défense ébréchée, sa posture voûtée, ses yeux étroits et inégaux. Mais il bougeait mal, souriait mal, *semblait* mal.\n\nGordak, maniant une hache et un petit bouclier de bronze, avait commencé par une posture défensive, comme d'habitude, déviant stoïquement les coups de hache sauvages de Tûka tandis que son adversaire s'épuisait. Les entailles de Tûka étaient brutales mais brèves, taillant le bouclier de Gordak, sauvages mais prévisibles. Finalement, Gordak anticipa une frappe et fracassa son bouclier dans la main de Tûka, brisant audiblement plusieurs doigts. Tûka recula en titubant, mais la peur qui brilla dans ses yeux fut immédiatement submergée par une lueur noire. Fée, réalisa Lazga. Sans hésitation, elle sauta par-dessus la barricade et occit la créature..."
 silentblade.8.a:0 "...mais c'était trop tard pour son frère."
 silentblade.8.b:0 "...et sauva son frère au prix de son honneur."
 silentblade.9.t:0 "Dernier Hurlement"
 silentblade.9.d:0 "Lazga pouvait sentir que cet Ozarm'Chadash était faux. Son frère Gordak, grand chef et seigneur de guerre du clan Hurlement-Maudit, avait affronté des challengers auparavant, et les avait tous tués. Le challenger que Gordak affrontait aujourd'hui, Tûka, n'était pas différent... Ne devrait pas être différent. Gordak n'écouterait pas, mais Lazga savait mieux. Elle connaissait Tûka depuis qu'ils étaient enfants. Tûka avait la même apparence qu'il avait toujours eue. Sa défense ébréchée, sa posture voûtée, ses yeux étroits et inégaux. Mais il bougeait mal, souriait mal, *semblait* mal.\n\nGordak, maniant une hache et un petit bouclier de bronze, avait commencé par une posture défensive, comme d'habitude, déviant stoïquement les coups de hache sauvages de Tûka tandis que son adversaire s'épuisait. Les entailles de Tûka étaient brutales mais brèves, taillant le bouclier de Gordak, sauvages mais prévisibles. Finalement, Gordak anticipa une frappe et fracassa son bouclier dans la main de Tûka, brisant audiblement plusieurs doigts. Tûka recula en titubant, mais la peur qui brilla dans ses yeux fut immédiatement submergée par une lueur noire. Fée, réalisa Lazga. Tandis que son frère tombait, son corps figé abattu par la hache de Tûka, elle sauta par-dessus la barricade et enfonça sa lance dans la gorge de la créature.\n\nAlors que la foule éclata en cris et chaos, un sourire se forma sur les lèvres de Tûka, sous une paire d'yeux noirs comme la nuit."
 silentblade.9.a:0 "Un pion pour une tour. Un sacrifice digne..."
 silentblade.9.a.tt:0 "Gordak Hurlement-Maudit est mort, laissant un clan affaibli sous Lazga Hurlement-Maudit."
 silentblade.10.t:0 "Le Prix de l'Honneur"
 silentblade.10.d:0 "Lazga pouvait sentir que cet Ozarm'Chadash était faux. Son frère Gordak, grand chef et seigneur de guerre du clan Hurlement-Maudit, avait affronté des challengers auparavant, et les avait tous tués. Le challenger que Gordak affrontait aujourd'hui, Tûka, n'était pas différent... Ne devrait pas être différent. Gordak n'écouterait pas, mais Lazga savait mieux. Elle connaissait Tûka depuis qu'ils étaient enfants. Tûka avait la même apparence qu'il avait toujours eue. Sa défense ébréchée, sa posture voûtée, ses yeux étroits et inégaux. Mais il bougeait mal, souriait mal, *semblait* mal.\n\nGordak, maniant une hache et un petit bouclier de bronze, avait commencé par une posture défensive, comme d'habitude, déviant stoïquement les coups de hache sauvages de Tûka tandis que son adversaire s'épuisait. Les entailles de Tûka étaient brutales mais brèves, taillant le bouclier de Gordak, sauvages mais prévisibles. Finalement, Gordak anticipa une frappe et fracassa son bouclier dans la main de Tûka, brisant audiblement plusieurs doigts. Tûka recula en titubant, mais la peur qui brilla dans ses yeux fut immédiatement submergée par une lueur noire. Fée, réalisa Lazga. Avant que la créature ne puisse abattre son frère, elle sauta par-dessus la barricade et enfonça sa lance dans sa gorge.\n\nAlors que la foule éclata en cris et chaos, Lazga baissa les yeux sur les yeux noirs comme la nuit de Tûka. Elle avait sauvé son frère... au prix de son honneur."
 silentblade.10.a:0 "Telle folie dans l'honneur..."
 silentblade.10.a.tt:0 "Notre opération a échoué à tuer Gordak Hurlement-Maudit, mais elle a causé une grande instabilité au sein de Hurlement-Maudit."
 silentblade.11.t:0 "Pratique Parfaite"
 silentblade.11.d:0 "« Je ne connais pas mon nom, » pensa-t-il. C'était un problème, il le savait instinctivement. Quelque chose devait être fait à ce sujet. Ses membres semblaient raides, comme s'ils se souvenaient d'avoir été du bois sans vie, inflexible jusqu'à quelques secondes auparavant. Il étira ses membres et se redressa maladroitement, puis ouvrit ses yeux.\n\nIl se tenait dans une forêt, entouré par les arbres dont son corps avait été créé. Il y avait plusieurs figures debout autour de lui, des créatures fortes, leur peau verte, leurs défenses longues, et leurs yeux voilés, trahissant un charme profond. Une figure était différente : une créature gracieuse de chair et de bois, sa beauté inaffectée par les marques de brûlure sur tout son corps. C'était son créateur, il le savait.\n\nLe créateur tendit sa main, et caressa son visage. « Bienvenue dans le monde, spriggan. Tu es ma plus belle œuvre encore. » Il recula d'un pas, et inspecta son œuvre avec satisfaction. « Tu m'adresseras en tant que Prince. Accomplis les tâches que je te fixe, et je t'accorderai ton nom. » Le Prince désigna les figures à défenses autour d'eux. « Ce sont des orques. Ils doivent être l'instrument de ma vengeance. Ils sont forts, intrépides, et impitoyables, mais plus important encore... Ils sont malléables. Et toi, spriggan, tu seras le moule. » À nouveau, le prince tendit la main vers lui, et effleura un doigt sur ses membres. « Tu es fait de branche et de feuille, mais lié ensemble par quelque chose de plus... Des fils du cocon du Héraut du Changement lui-même. Voici ta tâche : change-les. Rejette les échecs, et améliore ceux qui ont du potentiel. Crée le tueur parfait. Forge-moi mon arme. »\n\nLe Spriggan regarda autour de lui, et compta les figures à défenses. Seulement quatorze vies dans ses mains. Il en sacrifierait des milliers pour gagner son nom. « J'accepte ma tâche. Mais j'aurai besoin de plus. » Le Prince sourit. « Ne t'inquiète pas. Tu en auras autant que tu en as besoin. »\n\nLe Spriggan hocha la tête avant..."
 silentblade.11.a:0 "...de commencer délibérément son travail."
 silentblade.11.b:0 "...d'émuler avec empressement le Héraut du Changement."
 silentblade.11.c:0 "...de commencer prudemment sa première expérience."
 silentblade.12.t:0 "L'Émissaire"
 silentblade.12.d:0 "Les orques étaient de terribles partenaires de conversation. Ayant voyagé avec deux douzaines d'assassins Lame-Silencieuse pendant plus d'une semaine maintenant, Cœur-Noir n'avait entendu guère plus que plaintes, vantardises, disputes et blagues terribles. Ils avaient tous été informés de la gravité de leur mission, mais aucun d'eux ne semblait la saisir. Elle ne pensait pas qu'elle serait jamais en présence d'une race plus odieuse que les elfes, mais elle se trouvait maintenant presque nostalgique des disputes sans fin et de l'obséquiosité qu'elle avait endurées dans ses missions diplomatiques à Salla Elyn et Salla Cénag.\n\nPourtant, elle comprenait ce que le Prince voyait en eux. Leur chair était molle, leurs esprits étaient obtus, et leurs vies étaient courtes, mais ils compensaient plus que largement par leur force et leur violence. Ennuyeux comme ils l'étaient, ils serviraient, comme les elfes ne le feraient jamais. Elynáile attendait, et cette fois elle n'apporterait pas de mots."
 silentblade.12.a:0 "Elle apporterait la mort."
 silentblade.13.t:0 "Fureur de Lune-Noire"
 silentblade.13.d:0 "Les gobelins de Rondin-Pointu ont longtemps été une épine à notre flanc. Dernièrement, ils ont tenté leur chance. Le clan crie sang et guerre."
 silentblade.13.a:0 "Le seul bon gobelin est un gobelin mort."
 silentblade.13.b:0 "Nous ferons la guerre en temps voulu..."
 silentblade.14.t:0 "Fureur Aveugle"
 silentblade.14.d:0 "Il ne fallut que quelques simples tours et malheureuses victimes orques pour tromper le Clan Lune-Noire et le pousser à crier guerre contre les gobelins de Rondin-Pointu. Déjà, les orques de Lune-Noire marchent à la guerre, inconscients de notre implication."
 silentblade.14.a:0 "Hah, les imbéciles !"
 silentblade.15.t:0 "Fureur Retenue"
 silentblade.15.d:0 "À notre surprise, les orques de Lune-Noire ne sont pas tombés dans notre tentative de déclencher une guerre. Cependant, la sagesse de leur chef a mené à un mécontentement généralisé et à l'instabilité."
 silentblade.15.a:0 "C'est peut-être déjà une ouverture suffisante..."
 silentblade.16.t:0 "Le Conclave"
 silentblade.16.d:0 "Cœur-Noir observait depuis les ombres tandis que le dernier orque tombait avec un bruit humide. La plus infime pointe de respect remua en la dryade. Les créatures s'étaient battues avec une férocité sauvage et brutale. La vue avait laissé Cœur-Noir avec son sourire actuel ; le Prince avait bien choisi ses outils. Maintenant, sa curiosité était satisfaite. Sa soif de sang, cependant, ne l'était pas.\n\nElle tourna son attention vers les Elfes Sylvestres sans méfiance, laissant son sourire se transformer en expression maniaque. Ensanglantés et méfiants comme ils l'étaient, Cœur-Noir savait que les elfes se croyaient victorieux. Elle observa tandis qu'une Alara Cenág meurtrie s'affairait autour des blessures de Narawen Drennen. Elle nota comment le brutal Oberon Fealgarn boitilla et examina les orques pour des indices. Et elle se délecta des murmures frénétiques tandis que Bricena Myna et Cinithir Elyn s'agitaient pendant qu'un Irvah Ayeth fatigué soupirait à proximité. Ils étaient aussi béatement ignorants. Pensant sottement qu'ils étaient portés par l'espoir.\n\nAvec folie et gaieté, Cœur-Noir se glissa derrière Irvah Ayeth, lui arracha la gorge et rit."
 silentblade.16.a:0 "Et alors l'espoir devint désespoir."
 silentblade.16.a.tt:0 "Un par un, les chefs de clan furent abattus."
 silentblade.17.t:0 "Une Mort Perverse"
 silentblade.17.d:0 ""
 silentblade.17.a:0 "Splat fait [Root.Monarch.GetName]"
 silentblade.18.t:0 "Silence Béni"
 silentblade.18.d:0 "Cœur-Noir contempla son œuvre macabre avec satisfaction. La salle d'audience royale n'était rien de moins que brisée. Le sang était éclaboussé à travers les chaises renversées. La table de bois dur centrée au cœur de la chambre était violemment fendue en deux. Elfe et orque jonchaient le sol, tous délicieusement immobiles avec le sang encore en train de former des flaques."
 silentblade.18.a:0 "Cette scène, la volonté du Prince Noirci manifestée."
 silentblade.18.a.tt:0 "Sans dirigeants, les clans elfiques céderont d'autant plus facilement..."
 silentblade.19.t:0 "Fléau-des-Ormes"
 silentblade.19.d:0 "Ruuk regarda ses nouveaux compagnons. Une misérable quarantaine d'orques, et à peine un champion parmi eux. Pendant ce temps, [Root.Monarch.GetName] s'était gagné tout un nouveau clan, ivre d'eau-fée et de promesses d'immortalité. Il faudrait s'en contenter. Il devrait jouer ça intelligemment.\n\n« Orques ! » Leurs têtes se tournèrent vers lui, dans l'expectative. « Car c'est ce que vous êtes, non ? Les derniers orques d'un clan mort. Vous avez entendu ce que [Root.Monarch.GetName] a dit. L'eau a livré vos parents aux fées. Ils ne sont plus vos parents. Ils appartiennent maintenant à la forêt. »\n\nSon audience était silencieuse, mais Ruuk pouvait sentir le désespoir et la colère dans l'air. Ils étaient déjà siens.\n\n« Votre clan est mort, tout comme le mien. Il n'y a pas de victoire. » Il leva sa hache, et l'enfonça profondément dans le tronc de l'arbre à sa droite. Elle trancha le bois comme à travers du beurre, et l'orme tomba après seulement trois coups. « Mais vous aurez vengeance ! » hurla-t-il. « Sur vos anciens parents ! Sur la vermine fée ! Et sur cette *misérable* forêt ! »\n\n« Ruuk ! » éclata son audience. « Ruuk ! Fléau-des-Ormes ! Ruuk ! »"
 silentblade.19.a:0 "Je viens, père."
 silentblade.20.t:0 "Résolution"
 silentblade.20.d:0 "Ce n'était pas une défaite, se dit Ruuk. Il restait du temps. Il n'avait réussi à obtenir qu'une poignée de nouvelles recrues, mais ce qui lui manquait en nombre, il le compensait largement en information. Il connaissait le où, il connaissait le quand, et il connaissait le comment. La dague était là, tout ce qu'il devait faire était de la pousser dans la gorge.\n\nAlors qu'il regardait par-dessus son épaule, cependant, vers sa bande hétéroclite de survivants, il ne put s'empêcher de souhaiter une meilleure dague. Ils ne seraient pas suffisants pour affronter [Root.Monarch.GetName], pas avec toute la chance du monde. Ils ne seraient suffisants que pour faire une déclaration, pour rallier les orques au rituel.\n\nLes orques suivent le plus fort, se rappela-t-il. Il n'avait pas besoin de gagner franchement. Tout ce qu'il devait faire était de montrer la force, et le reste se mettrait en place."
 silentblade.20.a:0 "Il le fallait."
