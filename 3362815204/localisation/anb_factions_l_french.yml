l_french:
 adv_marchers:0 "Marcheurs"
 adv_marchers_influence:0 "Influence des Marcheurs"
 adv_marchers_FACTION_DESC:0 "Représentant les guerriers, les chevaliers preux, les mercenaires avides de pouvoir et les âmes vengeresses de notre compagnie d'aventuriers, les Marcheurs ont d'abord gagné leur nom après les Marcheurs de la Marée Verte, qui tenaient la défaite de toute la race orque comme leur plus haute priorité."
 adv_pioneers:0 "Pionniers"
 adv_pioneers_influence:0 "Influence des Pionniers"
 adv_pioneers_FACTION_DESC:0 "Représentant ceux qui sont devenus aventuriers en quête de nouvelles opportunités et de nouveaux foyers, ou ceux qui sont revenus pour reprendre leur patrie, les Pionniers cherchent à établir de nouvelles colonies et à reconstruire les anciennes afin de restaurer la civilisation dans les terres sauvages."
 adv_fortune_seekers:0 "Chercheurs de Fortune"
 adv_fortune_seekers_influence:0 "Influence des Chercheurs de Fortune"
 adv_fortune_seekers_FACTION_DESC:0 "Représentant les opportunistes et les marchands parmi les aventuriers, les Chercheurs de Fortune cherchent à profiter de la nature anarchique de l'aventure en reconstruisant une partie des infrastructures et en s'appropriant leurs bénéfices."
 aelnar_blaiddtar:0 "Blaiddtar"
 aelnar_blaiddtar_influence:0 "Influence des Blaiddtar"
 aelnar_blaiddtar_FACTION_DESC:0 "Représentant les différents corps de l'armée de terre d'Aelnar, les Blaiddtar ne perçoivent la grandeur d'Aelnar qu'à travers celle de ses armées."
 aelnar_cymscal:0 "Cym Scal"
 aelnar_cymscal_influence:0 "Influence du Cym Scal"
 aelnar_cymscal_FACTION_DESC:0 "Composée de quelques marchands, mais aussi, et surtout, d'amiraux influents, la faction Cym Scal considère que la flotte d'Aelnar est comme le sang d'un homme. Fondamentale."
 aelnar_suir:0 "Aelnar Sùir"
 aelnar_suir_influence:0 "Influence de l'Aelnar Sùir"
 aelnar_suir_FACTION_DESC:0 "Se désignant eux-mêmes comme les Enfants d'Aelnar, cette faction représente la volonté des nobles influents et des grandes figures de la nation de préserver la pureté du pays aux plus hautes sphères des domaines politique et militaire."
 vilaechi:0 "Vilaéchi"
 vilaechi_influence:0 "Influence des Vilaéchi"
 vilaechi_FACTION_DESC:0 "Les Vilaéchi sont le cercle le plus fier au sein de l'Ár Calléin, ne sélectionnant que les plus nobles et prestigieux de Marlliande pour les rejoindre. Ils prônent et financent la construction de grands monuments et de cités, ne serait-ce que pour améliorer leur image. Les Vilaéchi tiennent leurs liens de sang avec les maisons nobles cannoriennes en haute estime."
 rosrholych:0 "Rósrholych"
 rosrholych_influence:0 "Influence des Rósrholych"
 rosrholych_FACTION_DESC:0 "Les Rósrholych sont les dignitaires bien voyagés de Marlliande, recrutant de riches marchands et des diplomates expérimentés. Dirigeant les routes commerciales de la république et se mêlant aux seigneurs étrangers, ils sont les visages publics de l'Ár Calléin, et également les principaux pourvoyeurs du commerce d'esclaves orques."
 drominar:0 "Drominar"
 drominar_influence:0 "Influence des Drominar"
 drominar_FACTION_DESC:0 "Recrutés parmi les plus grands stratèges et aventuriers du pays, les Drominar sont les pionniers et commandants de l'Ár Calléin, et on les trouve fréquemment à la tête d'expéditions vers de nouvelles terres et à inculquer la discipline aux forces armées. De nombreux nouveaux venus ambitieux ayant prouvé leur valeur à Marlliande trouvent souvent gloire et fortune au sein de la faction Drominar."

 nl_cooperatists:0 "Coopératistes"
 nl_cooperatists_influence:0 "Influence des Coopératistes"
 nl_cooperatists_FACTION_DESC:0 "Les Coopératistes cherchent à imposer une vision unique à la Ligue du Nord, fondée sur l'efficacité et la coopération entre les peuples afin d'assurer le pouvoir et la force du gouvernement central qui, à son tour, représentera les intérêts des Magnats."
 nl_trade_barons:0 "Barons du Commerce"
 nl_trade_barons_influence:0 "Influence des Barons du Commerce"
 nl_trade_barons_FACTION_DESC:0 "Les Barons du Commerce cherchent à renforcer les communautés locales (et l'industrie en leur sein) afin d'assurer également stabilité et prospérité. Une marée montante soulève tous les bateaux (mais peut-être ceux des Barons plus que tous les autres)."
 nl_old_guard:0 "Vieille Garde"
 nl_old_guard_influence:0 "Influence de la Vieille Garde"
 nl_old_guard_FACTION_DESC:0 "Les Magnats les plus anciens et les mieux établis sont des conquérants dans l'âme ; ils croient qu'il n'y a pas de meilleur moyen d'assurer la prospérité de la Ligue que de subjuguer ses ennemis, renforçant notre gloire et enrichissant notre complexe militaro-industriel, dont ils constituent une grande partie. Ils croient également en la nécessité d'un leadership fort pour sécuriser la nation."

 inf_ildran_hedine:0 "Passionnés d'Agrados"
 inf_ildran_hedine_influence:0 "Influence des Passionnés"
 inf_ildran_hedine_FACTION_DESC:0 "Un culte religieux infernaliste identifiant Agrados comme le Père des Hommes et le Grand Amant, proclamant que Castellos et ses loyalistes sont des voleurs qui ont dérobé à l'humanité la domination légitime sur le monde ; ils sont les principaux propagandistes de Moredhal."
 inf_triad:0 "Dévots Triadiques"
 inf_triad_influence:0 "Influence Triadique"
 inf_triad_FACTION_DESC:0 "Un culte infernaliste qui vénère les vertus de l'avidité, du désir et de l'ambition par-dessus tout, et qui dirige une grande partie de l'économie de Moredhal."
 inf_kaz_mesner:0 "Les Chevaliers-Rancuniers"
 inf_kaz_mesner_influence:0 "Influence des Chevaliers-Rancuniers"
 inf_kaz_mesner_FACTION_DESC:0 "Un culte infernaliste originaire d'un ordre chevaleresque d'avant la Marée Verte dédié à Adean, ils se comportent comme la combinaison d'un ordre militaire et d'une inquisition, traquant les traîtres à la nation avant de les écraser totalement."

 oni_highest_fire:0 "Shinukhorchi"
 oni_highest_fire_influence:0 "Influence des Shinukhorchi"
 oni_highest_fire_FACTION_DESC:0 "La Citadelle du Feu Suprême est la plus grande et la plus ancienne des quatre grands Shirgrii, s'élevant loin dans les cieux et surplombant tout ce sur quoi règnent les Oni. Ceux du Feu Suprême comptent parmi les plus sages et les plus autoritaires, bien qu'ils soient notoirement obstinés à s'en tenir aux anciennes coutumes."
 oni_silent_mist:0 "Chumijemoya"
 oni_silent_mist_influence:0 "Influence des Chumijemoya"
 oni_silent_mist_FACTION_DESC:0 "L'Ordre de la Brume Silencieuse est le plus dissimulé des Shirgrii, niché au plus profond d'une jungle dense et brumeuse. Ceux qui proviennent de ses halls sont reconnus comme d'excellents maîtres-espions et pisteurs, possédant de nombreux réseaux d'espionnage à travers Haless. Leurs méthodes sournoises leur valent cependant peu d'amis."
 oni_bright_claw:0 "Ajgriijarul"
 oni_bright_claw_influence:0 "Influence des Ajgriijarul"
 oni_bright_claw_FACTION_DESC:0 "Le Temple de la Griffe Éclatante a affronté de nombreux aspirants conquérants et « héros » fanfarons, tous ont été brisés par ceux qui l'habitent. Produisant les plus forts, les plus fiers et les plus intimidants de tous les Oni, ils se soucient peu de travailler aux champs ou de produire de l'artisanat."
 oni_golden_gates:0 "Kabiurgarko"
 oni_golden_gates_influence:0 "Influence des Kabiurgarko"
 oni_golden_gates_FACTION_DESC:0 "Les Remparts aux Portes d'Or portent bien leur nom, leurs murs et toits plaqués d'or scintillant au soleil. D'innombrables villages humains se sont établis dans leur ombre, fournissant un tribut abondant. Bien que leurs coffres débordent d'or et de joyaux, ceux de Kabiurgarko sont tristement célèbres pour leur cupidité."
 oni_cursed_souls:0 "Khelorvalshi"
 oni_cursed_souls_influence:0 "Influence des Khelorvalshi"
 oni_cursed_souls_FACTION_DESC:0 "La Demeure des Âmes Maudites fut bâtie il y a longtemps par des oni exilés pour les extrémités auxquelles ils étaient prêts à aller pour apprendre les magies et savoirs les plus interdits. Le Shirgrii fut longtemps abandonné et habité par des humains, mais avec notre reconquête de son domaine, nous avons maintenant accès à la sombre sagesse contenue entre ses murs."

 bandit_kingdom_havoric_homesteaders:0 "Colons Havoriques"
 bandit_kingdom_havoric_homesteaders_influence:0 "Influence des Colons"
 bandit_kingdom_havoric_homesteaders_FACTION_DESC:0 "Notre petit joyeux royaume de marginaux n'est pas entièrement composé de bandits pillards enragés ; il y a de nombreux Havoriques, qu'il s'agisse de familles de bandits, de désespérés ou d'opportunistes qui ont trouvé leur chemin jusqu'à nos terres, colonisant la forêt et domptant ses étendues sauvages."
 bandit_kingdom_falah_poachers:0 "Braconniers de Falah"
 bandit_kingdom_falah_poachers_influence:0 "Influence des Braconniers"
 bandit_kingdom_falah_poachers_FACTION_DESC:0 "La forêt est un endroit dangereux, sombre et mortel. Horrible pour la personne moyenne, mais le bon type de folie y voit un paradis pratique de proies dignes, et précieuses, à chasser, traquer, capturer et vendre. Le plus souvent sous la forme de braconniers adorateurs de Falah chassés de Cannor pour leur... excès de zèle à la chasse."
 bandit_kingdom_bandit_captains:0 "Capitaines Bandits"
 bandit_kingdom_bandit_captains_influence:0 "Influence des Capitaines"
 bandit_kingdom_bandit_captains_FACTION_DESC:0 "Menteurs, brigands, voleurs et meurtriers composent le noyau dur du leadership du Nouveau Havoric, des individus à la volonté de fer et violents prêts à tout pour remplir leur bourse et assurer leur pouvoir. Tous ont cependant une chose en commun : ils veulent tous être le chef suprême."
 bandit_kingdom_ynnic_loyalists:0 "Loyalistes Ynniques"
 bandit_kingdom_ynnic_loyalists_influence:0 "Influence Ynnique"
 bandit_kingdom_ynnic_loyalists_FACTION_DESC:0 "Bien que les Capitaines d'antan aient bien fait leur travail, en cette ère plus moderne, les nobles que nous avons mis sous notre botte font à peu près la même chose qu'eux, mais fournissent également un vernis de légitimité."

 sh_crone:0 "Pacte de la Nuit"
 sh_crone_influence:0 "Influence du Pacte"
 sh_crone_FACTION_DESC:0 "Yoo lmao"
 sh_mother:0 "Pacte de la Sculpture"
 sh_mother_influence:0 "Influence du Pacte"
 sh_mother_FACTION_DESC:0 "Yoo lmao"
 sh_maiden:0 "Pacte de la Douceur"
 sh_maiden_influence:0 "Influence du Pacte"
 sh_maiden_FACTION_DESC:0 "Yoo lmao"

 four_families_kattyva:0 "Famille Kattyva"
 four_families_kattyva_influence:0 "Influence des Kattyva"
 four_families_kattyva_FACTION_DESC:0 "Les Kattyva sont la famille la plus ancienne et la plus grande de Royakottar. Ils descendent des fidèles de Kadradar l'Invocateur de Tempêtes et cherchent à émuler leur dieu héroïque, recherchant reliques et débris précurseurs en tous lieux. Ils sont les principaux excavateurs de la Citadelle Calcinée d'Acier."
 four_families_nymkorai:0 "Famille Nymkorai"
 four_families_nymkorai_influence:0 "Influence des Nymkorai"
 four_families_nymkorai_FACTION_DESC:0 "En tant que caravaniers experts, les Nymkorai se sont enrichis en commerçant avec des partenaires de tout le Taychend. Leur orgueil, et leur volonté de tout faire pour obtenir ce qu'ils veulent, en ont fait la famille la plus redoutée de Royakottar."
 four_families_ursibadur:0 "Famille Ursibadur"
 four_families_ursibadur_influence:0 "Influence des Ursibadur"
 four_families_ursibadur_FACTION_DESC:0 "Les Ursibadur sont experts pour apaiser les rancœurs avec quelques verres et une invitation au centre de leur pouvoir, leur infâme « Maison du Vice ». Ils fournissent aux citoyens de Royakottar tous leurs désirs, et se sont enrichis dans le processus."
 four_families_vustarin:0 "Famille Vustarin"
 four_families_vustarin_influence:0 "Influence des Vustarin"
 four_families_vustarin_FACTION_DESC:0 "Les Vustarin sont experts dans le travail des reliques. Depuis leurs laboratoires souterrains au cœur de la cité, ils mènent toutes sortes d'études et d'expériences, consumés par le désir de percer les secrets du passé et de les utiliser dans le présent."

 beso_caribhen:0 "Caríbhen"
 beso_caribhen_influence:0 "Influence des Caríbhen"
 beso_caribhen_FACTION_DESC:0 "Connus sous le nom de « Peuple du Papier » en langue commune, les Caríbhen sont la plus directe des factions, croyant que la meilleure façon de gouverner et de créer le progrès est de promouvoir et de se concentrer sur l'innovation technologique et l'exploration pures, et sur l'idée que plus quelque chose est nouveau, meilleur il est.\n\n§YGagne de l'influence grâce à l'Innovation et au Prestige.§!"
 beso_kheinbhen:0 "Kheinbhen"
 beso_kheinbhen_influence:0 "Influence des Kheinbhen"
 beso_kheinbhen_FACTION_DESC:0 "Connus sous le nom de « Peuple du Cœur » en langue commune, les Kheinbhen sont poussés par ce qui se rapproche le plus d'une religion chez les Kheionai et croient que le gouvernement devrait se concentrer sur leur capitale par-dessus tout car c'est le cœur de leur civilisation, et le foyer de leur peuple.\n\n§YGagne de l'influence grâce à la Prospérité et à l'Unité religieuse.§!"
 beso_nautabhen:0 "Náutabhen"
 beso_nautabhen_influence:0 "Influence des Náutabhen"
 beso_nautabhen_FACTION_DESC:0 "Connus sous le nom de « Peuple des Navires » en langue commune, les Náutabhen concentrent leurs efforts sur la promotion du commerce et de la diplomatie avec les autres nations, pensant que par la coopération ils peuvent gagner assez d'influence pour devenir intouchables, tout en exploitant le commerce pour devenir infiniment plus riches.\n\n§YGagne de l'influence grâce à la Limite de forces navales et au Mercantilisme.§!"
 beso_skighubhen:0 "Skighúbhen"
 beso_skighubhen_influence:0 "Influence des Skighúbhen"
 beso_skighubhen_FACTION_DESC:0 "Connus sous le nom de « Peuple des Ombres » en langue commune, les Skighúbhen prennent les politiques des Náutabhen et les tordent en une croyance plus sournoise. Que la diplomatie n'est pas pour la coopération, mais pour la manipulation, et que si cela est fait correctement, notre pays peut s'étendre pacifiquement, par la vassalisation.\n\n§YGagne de l'influence grâce aux Vassaux et à une Faible autonomie moyenne.§!"
 beso_dhorbhen:0 "Dhorbhen"
 beso_dhorbhen_influence:0 "Influence des Dhorbhen"
 beso_dhorbhen_FACTION_DESC:0 "Connus sous le nom de « Peuple de la Lance » en langue commune, les Dhorbhen sont parfois considérés comme encore plus directs que les Caríbhen, prônant l'idée de force et de puissance militaire ; ils croient que la meilleure façon de progresser est simplement d'attaquer et de conquérir.\n\n§YGagne de l'influence en étant en guerre.§!"

 whitespear_clan:0 "Clan Blanchelance"
 whitespear_clan_influence:0 "Influence du Clan Blanchelance"
 whitespear_clan_FACTION_DESC:0 "Navigateurs et guerriers, les Blanchelance sont les descendants de Maldorian lui-même. Le plus petit des trois clans mais de loin le plus renommé, ayant produit de nombreux soldats et héros de renom et de valeur.\n\n§YGagne de l'influence grâce à la Tradition navale, perd de l'influence à cause de la Déloyauté des aventuriers et d'une Faible projection de puissance§!"

 icewind_clan:0 "Clan Vent-de-Glace"
 icewind_clan_influence:0 "Influence du Clan Vent-de-Glace"
 icewind_clan_FACTION_DESC:0 "Diplomates et marchands les plus riches, les Vent-de-Glace sont le clan le plus fortuné. Opérant depuis l'immense Palais du Commerce de Celmaldor même, les négociateurs habiles de ce Clan maintiennent des affaires dans tout commerce qu'ils trouvent profitable.\n\n§YGagne de l'influence grâce au Prestige, perd de l'influence à cause de l'Épuisement de guerre et d'une Faible tradition républicaine§!"

 frozentide_clan:0 "Clan Marée-Gelée"
 frozentide_clan_influence:0 "Influence du Clan Marée-Gelée"
 frozentide_clan_FACTION_DESC:0 "Le regard froid et sombres, les Marée-Gelée sont des planificateurs impartiaux et calculateurs. La plupart de la législation de la république fut créée par des érudits Marée-Gelée ; le Clan est également largement investi dans la banque et les assurances.\n\n§YGagne de l'influence grâce au Mercantilisme, perd de l'influence à cause de l'Inflation et de la Corruption.§!"