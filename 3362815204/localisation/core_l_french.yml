 AND_MONTHLY_THE_FOLLOWING:1 "Et varie de $VAL|Y1$ chaque mois en raison de :\n$DESC$"
 PIETY_DESCRIPTION:1 "La Nitikamarja est la voie morale sur laquelle tout adepte de la haute philosophie doit cheminer. Le §YKartya§! de chacun, son existence mortelle propre, est équilibré entre deux pôles : le Discernement (§YDekhana§!) et l'Action (§YPichka§!) sur l'action juste.\n\nLe Kartya de votre pays est affecté par diverses actions que vous pouvez entreprendre. Les options d'événements déplaceront votre position sur l'échelle, tout comme déclarer une guerre (Diminution) ou convertir des provinces avec succès (Augmentation)."
 PIETY_DESCRIPTION_ESTATES:1 "\n\nLa position de votre pays sur l'équilibre entre Dekhana et Pichka influencera la loyauté de certains de vos États."
 KARMA_DESC2:0 "La Paragonat corinite représente l'alignement de votre dirigeant avec les idéaux et l'éthique de Corin. Un dirigeant trop obsédé par la guerre sera considéré comme (Aveuglé par le Zèle), voyant tous ceux qui s'opposent à vous comme des ennemis, qu'ils le méritent ou non. D'un autre côté, un dirigeant peut devenir complaisant et tomber dans la (Dormance protectrice), se contentant de gouverner et de simplement contenir le mal comme les Adéaniques décadents avant vous.\n\nLes pays avec la Paragonat corinite ne paient aucun coût en pouvoir diplomatique pour rendre des territoires légitimisés et libérer des pays et vassaux dans les traités de paix."
 KARMA_DESC:0 "La Paragonat corinite augmente grâce à :\n- §YConstruction de bâtiments :§! +0,3\n- §YDéveloppement de provinces :§! +0,1\n- §YPromulgation de réformes gouvernementales :§! +10\n\nLa Paragonat corinite diminue à cause de :\n- §YDéclarations de guerre :§! -15\n- §YConversion de provinces :§! -0,075/développement\n- §YExpulsion de races :§! -0,1/mois\n- §YPurge de races :§! -0,2/mois\n\n(Note : certaines influences comme les modificateurs donnant un déclin annuel de la Paragonat corinite peuvent ne pas être affichées ici)\n"
 PATRIARCH_DESCRIPTION:1 "Le Pouvoir démoniaque représente la quantité d'énergie et d'autorité démoniaques détenues par le dirigeant de la nation et ses lieutenants. Ils utilisent ce pouvoir démoniaque pour inspirer la peur et obtenir de grands avantages."
