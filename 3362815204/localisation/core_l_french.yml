 attitude_unknown_desc:0 "§Y$COUNTRY$§! n'a aucune connaissance de §Y$TARGET$§!."
 attitude_human_desc:0 "§Y$COUNTRY$§! est un joueur humain. Son attitude envers §Y$TARGET$§! lui appartient entièrement."
 attitude_hostile_desc:1 "§Y$COUNTRY$§! considère §Y$TARGET$§! avec une hostilité ouverte en raison de ses ambitions de conquérir une partie ou la totalité de ses provinces. La diplomatie avec une nation hostile est presque toujours vaine."
 attitude_rivalry_desc:0 "§Y$COUNTRY$§! a fait de §Y$TARGET$§! son rival et cherche à le surpasser en tout. Les pays tendent à choisir des nations voisines de force similaire comme rivaux. La diplomatie avec un pays rival est presque toujours vaine."
 attitude_defensive_desc:1 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme son allié dans une alliance défensive. Il est peu probable qu'il se joigne à une guerre d'agression initiée par celui-ci."
 attitude_outraged_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme un conquérant agressif et cherche à le remettre à sa place. Il peut former l'épine dorsale d'une coalition contre lui."
 attitude_friendly_desc:1 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme un allié naturel contre d'autres nations qui les menacent. Il cherchera probablement une alliance avec eux."
 attitude_protective_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme faisant partie de sa sphère d'influence et cherchera à le protéger des agresseurs en le garantissant ou en en faisant son vassal."
 attitude_overlord_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme sa nation sujette."
 attitude_loyal_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme son suzerain."
 attitude_disloyal_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme un suzerain oppressif. Il n'offrira probablement pas beaucoup d'aide en temps de guerre."
 attitude_rebellious_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme un tyran injuste. Il déclarera probablement une guerre d'indépendance."
 attitude_domineering_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme son futur sujet et n'hésitera pas à déclarer la guerre pour le forcer à la vassalité."
 attitude_threatened_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme une menace pour son indépendance. Il cherchera à s'allier avec lui pour sa propre sécurité, mais pourra rechercher des alliés puissants ailleurs si cela échoue."
 attitude_neutral_desc:1 "§Y$COUNTRY$§! n'a aucune opinion particulière de §Y$TARGET$§!, en raison de la distance ou de l'absence d'intérêts communs. La diplomatie avec une nation neutre est légèrement plus difficile."
 attitude_allied_desc:0 "§Y$COUNTRY$§! considère §Y$TARGET$§! comme un allié précieux."
