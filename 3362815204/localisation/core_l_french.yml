 MAPMODE_TERRAIN_DESC:0 "Affiche le terrain. C'est particulièrement important pour décider où vous souhaitez engager le combat. Les rayures indiquent les provinces dont le contrôleur n'est pas le propriétaire."
 MAPMODE_POLITICAL_DESC:0 "Chaque nation est colorée selon sa couleur spécifique. Les rayures indiquent les provinces dont le contrôleur n'est pas le propriétaire."
 MAPMODE_RELIGION_DESC:0 "Affiche les groupes religieux sur la carte. Les rayures indiquent les provinces dont la religion diffère de leur religion d'État."
 MAPMODE_EMPIRE_DESC:0 "Colore les provinces faisant partie de l'Empire d'Anbennar.\nLe violet appartient à l'Empereur, le marron à un Électeur, et le bleu à une Ville libre. Les provinces vertes font simplement partie de l'Empire.\nLes provinces rayées de jaune font partie de l'Empire, mais leur propriétaire n'en fait pas partie.\nLes provinces rayées d'orange font partie de l'Empire, mais sont sujettes d'un suzerain non membre de l'Empire.\n"
 MAPMODE_TRADE_DESC:0 "Colore les provinces selon le nœud commercial auquel elles appartiennent. Les damiers indiquent les provinces qui ne sont PAS à portée commerciale."
 MAPMODE_DIPLOMACY_DESC:0 "Colore les provinces selon les relations diplomatiques de leur propriétaire envers le pays sélectionné. Les rayures indiquent si le pays sélectionné possède une légitimisation sur celle-ci."
 MAPMODE_ECONOMY_DESC:0 "Colore les provinces selon leur développement."
 MAPMODE_MANPOWER_DESC:0 "Colore les provinces selon la quantité d'effectifs. Le rouge indique peu d'effectifs, le jaune des effectifs moyens, et le vert des effectifs importants."
 MAPMODE_FORTLEVEL_DESC:2 "Colore les provinces selon le statut diplomatique avec les propriétaires de forts. Les provinces vertes indiquent des forts alliés, les rouges des forts ennemis et les violettes des forts neutres. Les forts de niveau supérieur sont d'un bleu plus foncé."
 MAPMODE_TECH_COST_DESC:0 "Colore les provinces selon les niveaux technologiques. Les provinces vertes indiquent un niveau de technologie plus élevé, les provinces orange un niveau inférieur aux provinces jaunes. Les provinces rouges indiquent les niveaux de technologie les plus bas."
 MAPMODE_TRADE_VALUE_DESC:0 "Colore les provinces selon la valeur commerciale. La couleur bleue indique les provinces aurifères, le rouge clair une faible valeur commerciale, le rouge foncé une valeur légèrement supérieure, le jaune une valeur élevée et le vert une très haute valeur commerciale."
 MAPMODE_SUPPLY_LIMIT_DESC:0 "Colore les provinces selon la limite de ravitaillement. \nSi aucune armée n'est sélectionnée, le rouge indique une faible limite de ravitaillement, le jaune une limite moyenne et le vert une limite élevée. \nQuand une armée est sélectionnée, les provinces qui ne peuvent pas soutenir l'armée sélectionnée sont rouges, tandis que celles qui le peuvent sont vertes. Une province qui peut tout juste soutenir l'armée sélectionnée est colorée en jaune."
 MAPMODE_BUILDINGS_DESC:0 "Colore les provinces selon le nombre de bâtiments pouvant y être construits. Le vert clair indique que plus de bâtiments peuvent être construits, le vert foncé moins. Une province rayée de bleu possède un bâtiment unique."
 MAPMODE_MISSIONARY_DESC:0 "Colore les provinces selon qu'elles peuvent être converties à la religion d'État. Le vert indique une province d'une autre religion que la religion d'État, le bleu une province en cours de conversion et le gris que la province a déjà la religion d'État."
 MAPMODE_REGION_DESC:0 "Colore les provinces selon leur région d'appartenance. Survoler une province révèle la zone, la région et le continent auxquels elle appartient."
 MAPMODE_AREAS_DESC:0 "Colore les provinces selon leur zone d'appartenance. Survoler une province révèle la zone, la région et le continent auxquels elle appartient."
 MAPMODE_SUPER_REGION_DESC:0 "Colore les provinces selon leur sous-continent d'appartenance. Survoler une province révèle la zone, la région, le sous-continent et le continent auxquels elle appartient."
 MAPMODE_VICTORYCARDS_DESC:0 "Colore les provinces selon leur carte de victoire (le cas échéant). Survoler une province avec une carte révèle le score de cette carte."
 MAPMODE_CULTURE_DESC:0 "Colore les provinces selon les différentes cultures et affiche les noms de ces cultures."
 MAPMODE_OPINION_DESC:0 "Colore les provinces selon l'opinion de leur propriétaire envers le pays sélectionné."
 MAPMODE_COALITION_DESC:1 "Colore les provinces selon l'opinion de leur propriétaire concernant l'expansion agressive du pays sélectionné. Si leur opinion sur l'expansion agressive du pays sélectionné est inférieure à -50 et leur opinion générale inférieure à 0, ils peuvent rejoindre une coalition et leur échelle de couleurs est ambre-rouge. Si leur opinion sur l'expansion agressive est inférieure à -50 mais leur opinion générale supérieure à 0, leur échelle de couleurs est vert-ambre. Sinon, leur échelle de couleurs est gris-vert. Si le pays est rouge, il fait partie d'une coalition contre vous."
 MAPMODE_TRUCE_DESC:1 "Colore les provinces selon les trêves entre le propriétaire et le pays sélectionné. L'échelle va du rouge foncé au jaune. Si le pays est gris, il n'y a pas de trêve. Les rayures vertes indiquent que le pays sélectionné a un casus belli sur celui-ci."
 MAPMODE_UNREST_DESC:0 "Colore les provinces selon l'agitation. Le rouge indique les provinces avec une forte agitation, le jaune une agitation moyenne, et le vert une faible agitation ou aucune. Les rayures indiquent une province contrôlée par des rebelles."
 MAPMODE_COLONIAL_DESC:0 "Colore les provinces selon la portée coloniale et la disponibilité coloniale. Le vert indique les provinces non colonisées pouvant être colonisées, le rouge les provinces trop éloignées pour être colonisées, le bleu les provinces en cours de colonisation (plus le bleu est foncé, plus la progression est avancée). Le gris indique les provinces déjà colonisées ou les cités."
 MAPMODE_RIVALS_DESC:0 "Colore les provinces appartenant aux pays que vous avez désignés comme rivaux ou qui vous ont désigné comme rival."
 MAPMODE_REBELTYPES_DESC:0 "Colore les provinces selon le type de factions rebelles présentes dans votre pays."
 MAPMODE_GOVERNMENT_DESC:0 "Colore les provinces de manière à ce que les différents types de gouvernement apparaissent en couleurs distinctes."
 MAPMODE_OVERSEAS_DESC:0 "Colore les provinces considérées comme outre-mer en rouge, tandis que les provinces non outre-mer sont colorées en vert."
 MAPMODE_PLAYERS_DESC:0 "Colore les provinces selon les joueurs et affiche les noms des joueurs au-dessus de leurs pays."
 MAPMODE_CLIMATE_DESC:0 "Colore les provinces selon leur climat, représentant les provinces arides, arctiques et tropicales."
 MAPMODE_WEATHER_DESC:0 "Colore les provinces selon le type de temps qu'elles connaissent habituellement."
 MAPMODE_TRADE_GOODS_DESC:0 "Affiche quelles marchandises sont produites dans quelle province."
 MAPMODE_FEDERATIONS_DESC:0 "Affiche les fédérations existant dans le monde."
 MAPMODE_LOCAL_AUTONOMY_DESC:0 "Plus la province est verte, plus l'autonomie locale est proche de 0 %. Plus la province est rouge, plus l'autonomie locale est proche de 100 %."
 MAPMODE_ACCEPTEDCULTURES_DESC:0 "Colore les provinces selon les cultures acceptées et affiche les noms de ces cultures. La culture principale est en vert clair, les cultures acceptées en vert foncé, les cultures du même groupe que votre culture principale en jaune, et les cultures non acceptées en rouge. Si vous convertissez une culture non acceptée, elle apparaîtra en orange au lieu de rouge."
 MAPMODE_SIMPLE_TERRAIN_DESC:0 "Affiche le terrain. Chaque couleur représente un certain type de terrain. Une bordure bleue signifie que les armées traversant cette frontière subiront une pénalité de franchissement. Les rayures indiquent les provinces dont le contrôleur n'est pas le propriétaire."
 MAPMODE_PATRIARCHS_DESC:1 "Affiche les États possédant une organisation locale (comme les cultes locaux initiés). Les États jaunes ont un culte local initié, les États verts peuvent être initiés, et les États rouges ne peuvent pas l'être."
 MAPMODE_DEVASTATION_DESC:1 "Affiche le degré de dévastation des provinces. Plus le rouge est vif, plus la province est dévastée, tandis que le gris indique aucune dévastation."
 MAPMODE_DYNASTY:0 "Dynastique"
 MAPMODE_DYNASTY_DESC:0 "Colore les provinces selon les dynasties régnantes et affiche les noms de ces dynasties."
 MAPMODE_TRADE_LEAGUES:0 "Ligues commerciales"
 MAPMODE_TRADE_LEAGUES_DESC:0 "Colore les provinces selon la ligue commerciale à laquelle elles appartiennent. Si vous êtes vous-même chef d'une ligue commerciale, cela montre également quels pays peuvent rejoindre votre ligue et s'ils le souhaitent."
 MAPMODE_GREAT_POWERS:0 "Grandes puissances"
 MAPMODE_GREAT_POWERS_DESC:0 "Colore les provinces selon le statut de grande puissance qu'elles possèdent actuellement. Les grandes puissances sont colorées selon leurs propres couleurs nationales, tandis que tous les autres pays sont grisés. Les pays qui perdent leur statut de grande puissance sont rayés."
 MAPMODE_LOOT:0 "Butin"
 MAPMODE_LOOT_DESC:0 "Colore les provinces appartenant aux pays avec lesquels vous êtes en guerre, selon la quantité de butin restante."
 MAPMODE_STATES_TERRITORIES:0 "États et territoires"
 MAPMODE_STATES_TERRITORIES_DESC:0 "Colore en vert les provinces appartenant aux États et en jaune celles appartenant aux territoires. L'État de la capitale est coloré en vert vif."
 MAPMODE_STATES_EDICTS:0 "Édits d'État"
 MAPMODE_STATES_EDICTS_DESC:0 "Colore les provinces selon l'édit qu'elles appliquent actuellement."
