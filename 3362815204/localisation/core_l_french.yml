 ai_capitalist_desc:0 "Le dirigeant §Y$ADJ$§! est un administrateur. Il cherchera à améliorer son économie par tous les moyens disponibles, mais est moins enclin à la guerre, sauf si cela sert ses intérêts commerciaux."
 ai_diplomat_desc:0 "Le dirigeant §Y$ADJ$§! est un diplomate. Il recherchera des alliés puissants et tentera de s'étendre diplomatiquement, mais sera bien moins susceptible d'entrer en guerre, sauf pour récupérer des territoires perdus."
 ai_militarist_desc:0 "Le dirigeant §Y$ADJ$§! est un militariste. Il cherchera à s'étendre agressivement aux dépens de ses voisins et sera bien plus susceptible d'entrer en guerre."
 ai_balanced_desc:0 "Le dirigeant §Y$ADJ$§! a une personnalité équilibrée. Il tentera de trouver un équilibre entre guerre, diplomatie et commerce, et on ne peut pas prévoir son comportement."
 ai_colonialist_desc:0 "Le dirigeant §Y$ADJ$§! est un colonisateur. Ses intérêts résident dans l'expansion outre-mer et il préférera maintenir de bonnes relations avec ses voisins proches."
