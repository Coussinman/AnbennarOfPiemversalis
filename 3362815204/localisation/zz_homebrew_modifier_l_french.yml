 adjacent_fort_penalty:0 "Pénalité de Fort Adjacent"
 desc_adjacent_fort_penalty:0 "Cette province est adjacente à un autre fort, ce n'est pas votre fort de capitale ou elle n'est adjacente qu'à un fort de capitale, et elle n'est pas liée à un arbre de missions nécessitant des forts adjacents.\n§OTant que cela reste vrai, vous ne pouvez pas construire de Remparts ou de Tours de Mage dans cette province, et les Fortifications Avancées n'auront aucun effet.§W"
