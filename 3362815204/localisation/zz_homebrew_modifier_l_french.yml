 #country modifiers
 bionic_implants:0 "Implants Bioniques"
 desc_bionic_implants:0 "Des implants allant de l'ajout d'ailes supplémentaires à une harpie, au remplacement du foie d'un nain, jusqu'à l'harmonisation de quelqu'un à la magie, tous contribuent à une qualité accrue de l'armée."
 smart_armor:0 "Mithrilpeau"
 desc_smart_armor:0 "« Mithrilpeau, fiston. Elle se durcit en réponse aux traumatismes physiques. »\n§RAttention§W : Les effets secondaires peuvent inclure maux de tête, nausées, douleurs musculaires, mouvements intestinaux restreints, souffles cardiaques et perte temporaire de potentiel magique. Ne prenez pas Mithrilpeau (brevet en cours) plus d'une fois en 24 heures. Demandez à votre médecin si Mithrilpeau vous convient."
 evocation_drones:0 "Drones d'Évocation"
 desc_evocation_drones:0 "Des mages éloignés du champ de bataille peuvent canaliser leur magie de guerre dans un dispositif de transmutation et la faire sortir de la tourelle d'un drone à roues. Ce drone fonctionne avec un moteur et peut être contrôlé par un cristal de divination."
 emergency_exit:0 "Sortie d'Urgence"
 desc_emergency_exit:0 "La méthode exacte d'évacuation varie énormément. On peut s'échapper sur une plateforme à roues, se faufiler dans un espace réduit, s'attacher une fusée ou même se téléporter. Les taux de réussite varient."
 artifice_domination_potions:0 "Potions de Domination"
 desc_artifice_domination_potions:0 "En utilisant une drogue chargée de magie d'enchantement, nous pouvons briser l'esprit et la volonté de quiconque ose nous défier. \n§RAttention§W : Les effets secondaires peuvent inclure pertes de mémoire, sautes d'humeur, anxiété, dépression et diminution de la volonté de vivre."
 artifice_necrolyzer:0 "Nécrolyseur"
 desc_artifice_necrolyzer:0 "En utilisant des magies interdites et en franchissant plusieurs limites morales, nous avons un composé chimique capable de ramener un corps récemment décédé à la vie. \n§RAttention§W : Les effets secondaires peuvent inclure insomnie, perte de mémoire à court terme, plaintes aux ressources humaines et perte totale d'humanité. Les désodorisants sont fortement recommandés lors de l'utilisation du Nécrolyseur."
 artifice_bullet_worms:0 "Vers à Balles"
 desc_artifice_bullet_worms:0 "En utilisant un composé biologique découvert dans les champs de sangsues d'Aelantir, une balle peut s'enfouir dans sa cible avant de libérer ledit composé, qui au contact de la chair s'étendra en une sphère dure atteignant jusqu'à 10 cm de diamètre. \n§RAttention§W : Éviter tout contact cutané avec la substance. En cas de contact, tremper la peau dans l'eau chaude pendant plusieurs heures. La substance est létale en cas d'ingestion, quelle que soit la dose."
 artifice_runepress:0 "Presse Runique"
 desc_artifice_runepress:0 "En alimentant une presse avec de la Damestear, celle-ci est simultanément écrasée et imprimée sur la surface d'un objet, l'imprégnant de potentiel magique et multipliant notre capacité à produire de la magie runique."
 artifice_dwarf_eye_longlived:0 "Œil du Nain : Immortel/Longévif"
 desc_artifice_dwarf_eye_longlived:0 "Grâce à une utilisation complexe de la divination, de l'illusion et de la magie runique, des images et des informations peuvent être traitées et affichées à l'utilisateur, servant une variété d'objectifs."
 artifice_dwarf_eye_normal:0 "Œil du Nain : Durée de Vie Normale"
 desc_artifice_dwarf_eye_normal:0 "Grâce à une utilisation complexe de la divination, de l'illusion et de la magie runique, des images et des informations peuvent être traitées et affichées à l'utilisateur, servant une variété d'objectifs."
 artifice_serpentrot_gas:0 "Gaz de Pourriture-du-Serpent"
 desc_artifice_serpentrot_gas:0 "En utilisant des échantillons prélevés lors de la Grande Épidémie de Pourriture-du-Serpent, nous pouvons reproduire cette peste mortelle dans un environnement contrôlé et équiper des « porteurs de peste » spécialisés pour libérer son potentiel meurtrier à action rapide sur le champ de bataille. \n§RAttention§W : Extrêmement mortel, manipuler avec précaution. Tous les porteurs de peste doivent ajouter un colorant à leur gaz pour éviter toute infection inutile. Tous les porteurs de peste doivent consommer au moins une demi-livre de champignons par jour lorsqu'ils sont en service."
 artifice_khetgirl:0 "Implants Khetfille"
 desc_artifice_khetgirl:0 "En utilisant un artisanat magique de pointe, nous pouvons contraindre le corps à développer de nouveaux organes, un choix populaire donnant l'apparence d'un Harimari avec une peau humaine. C'est un stimulant moral inattendu parmi nos artificiers de guerre. \n§RAttention§W : Les effets secondaires peuvent inclure démangeaisons, éruptions cutanées, insomnie, immunodéficience et cancer."
 mil_ind_comp:0 "Complexe Militaro-Industriel"
 desc_mil_ind_comp:0 "Vous appelez ça « ingérence étrangère », j'appelle ça « bonne affaire »."
