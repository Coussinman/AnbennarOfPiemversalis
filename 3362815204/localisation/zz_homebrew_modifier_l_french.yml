 factory_town:0 "Ville Industrielle"
 desc_factory_town:0 "Les investissements de l'État dans l'industrie locale ont entraîné un afflux d'urbanisation."
 super_fort1:0 "Fortifications Avancées : Ingénierie Naine"
 desc_super_fort1:0 "Grâce à l'aide d'ingénieurs nains, ce fort est mieux conçu pour permettre aux défenseurs de tirer vers le bas et de harceler les assiégeants."
 super_fort2:0 "Fortifications Avancées : Terre des Morts"
 desc_super_fort2:0 "L'innovation de l'artillerie et des explosifs a nécessité l'excavation de grandes zones tampons dans nos fortifications, bordées d'obstacles qui entravent l'équipement de siège. Quiconque entre dans ces zones de mort est un homme condamné."
 super_fort3:0 "Fortifications Avancées : Boîtes à Pixies"
 desc_super_fort3:0 "Inventées par l'artificier kobold Pyxal, les Boîtes Pyx (plus tard appropriées sous le nom de Boîtes à Pixies) sont des explosifs façonnés pouvant être enterrés et déclenchés par un capteur de pression. En employant des équipes de sapeurs pour planter des « champs de boîtes », nous pouvons perturber les chaînes d'approvisionnement ennemies."
 super_fort4:0 "Fortifications Avancées : Abjurateurs Résidents"
 desc_super_fort4:0 "La noble école d'Abjuration a toujours joué un rôle dans la défense des châteaux, mais ses praticiens étaient souvent des contractuels sans loyauté envers nous. En invitant des abjurateurs dans des résidences permanentes près de nos défenses, ils seront à notre disposition immédiate."
 super_fort5:0 "Fortifications Avancées : Citadelle Légendaire"
 desc_super_fort5:0 "Avec cette dernière fortification, nous pouvons fièrement nous proclamer successeurs des ingénieurs castanoriens et elfiques d'antan, car cette citadelle est véritablement légendaire."
 super_fort6:0 "Fortifications Avancées : Bunker de l'Apocalypse"
 desc_super_fort6:0 "Certains disent que notre obsession pour la construction de défenses naît de la paranoïa. Mais nous savons mieux, car quand les Cieux Cendrés s'abattront à nouveau sur nous tous, nous serons prêts."
