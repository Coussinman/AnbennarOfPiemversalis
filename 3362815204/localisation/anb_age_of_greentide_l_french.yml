 opinion_fought_alongside_corin:0 "A combattu aux côtés de Corin"
 greentide_adventurer_boost:0 "Vainqueurs de la Marée Verte"
 greentide_deepwoods_reduced_zeal:0 "Zèle affaibli"

 greentide_colonist_boost:0 "Séquelles de la Marée Verte"

 greentide.0.t:0 "La Chute de Corin"
 greentide.0.d:0 "La Marée Verte a déferlé il y a vingt ans lorsque l'orque Korgus Dookanson, qui prétendait être le fils de leur dieu maléfique, envahit et dévasta les royaumes chevaleresques d'Escann. Seule Corin, une mortelle investie des pouvoirs d'Agrados, le dieu de la guerre déchu, pouvait les arrêter. Et elle les arrêta. Avec ses fidèles, elle unit les marcheurs et les aventuriers d'Escann en une seule force du bien, stoppant net l'invasion de l'ouest de Cannor.\n\nHier, le onzième jour du mois de Nerament, Korgus Dookanson fut terrassé par l'héroïne Corin dans la cité de Castonath… mais en retour, elle aussi perdit la vie.\n\nCorin est morte, mais Korgus l'est aussi. C'est désormais à nous autres de perpétuer son héritage et de mettre fin à la Marée Verte, une fois pour toutes."
 greentide.0.a:0 "Le combat continue."
 greentide.1.t:0 "La Chute de Dookanson"
 greentide.1.d:0 "La Marée Verte a déferlé il y a vingt ans lorsque Korgus Dookanson, le fils de notre dieu, le Grand Dookan, unit les orques et les gobelins sous sa bannière et envahit le monde de la surface pour venger les torts infligés à Dookan. Mais une adversaire redoutable du nom de Corin, elle-même choisie comme championne divine de leurs dieux, riposta.\n\nHier, le onzième jour du onzième mois, Corin fut terrassée au combat par le puissant Korgus à Castonath, mais en retour, Korgus lui-même tomba.\n\nSans figure unificatrice, les clans sont perdus et nombre d'entre eux se sont repliés vers leurs territoires. Certains y voient la preuve que Korgus était faible et indigne du nom de Dookan, tandis que d'autres accusent Corin de traîtrise. Quelques groupes marginaux murmurent même que le Grand Dookan n'était peut-être pas si grand, en fin de compte. Quelle que soit la vérité, c'est à nous de forger un nouveau destin dans le monde de la surface."
 greentide.2.t:0 "La Marée Grise"
 greentide.2.a:0 "Gloire au premier Roi Gris !"
 greentide.3.t:0 "Le Royaume Déchu"
 greentide.2.d:0 "La Marée Grise débuta en 1420 lorsque le seigneur de guerre orque Brasûr Gueule-Gelée envahit et conquit la capitale du Royaume de Vrorenmarch en une seule nuit. Privées de chef, les autres provinces du pays tombèrent bientôt aux mains des envahisseurs. Ceux qui résistèrent à la conquête furent massacrés, tandis que ceux qui se soumirent furent épargnés, mais contraints de s'incliner devant leur nouveau roi, qui prit pour épouse la dernière princesse légitime du royaume déchu.\n\nLa position de Brasûr est forte, mais loin d'être inébranlable. Les humains de Vrorenmarch sont vaincus, mais leur esprit n'est point brisé. Certains clans orques se sont affranchis au cœur du chaos et tentent de contester l'autorité de Brasûr en tant que souverain des Orques Gris. Son jeune fils Marosh, né de son épouse humaine, est robuste de corps, mais dépourvu de la force de volonté de son père et connu pour son tempérament doux. Ses enfants demi-orques détermineront l'avenir de son pays."
 greentide.3.a:0 "Nous espérerons et attendrons."
 greentide.3.d:0 "La Marée Grise débuta en 1420 lorsque le seigneur de guerre orque Brasûr Gueule-Gelée envahit et conquit la capitale du Royaume de Vrorenmarch en une seule nuit. Privées de chef, les autres provinces du pays tombèrent bientôt aux mains des envahisseurs. Ceux qui résistèrent à la conquête furent massacrés, tandis que ceux qui se soumirent furent épargnés, mais contraints de s'incliner devant leur nouveau roi, qui prit pour épouse la dernière princesse légitime du royaume déchu.\n\nLa position de Brasûr est forte, mais loin d'être inébranlable. Les humains de Vrorenmarch sont vaincus, mais leur esprit n'est point brisé. De fait, des rumeurs circulent déjà concernant un nouvel aventurier qui projette d'envahir les Orques Gris et de les chasser de la Gérudie. Qui sait, peut-être sera-ce enfin le moment où les Reachmen recouvreront leur liberté ?"
 greentide.4.t:0 "Une Épreuve de Plus"
 greentide.4.d:0 "Korgus Dookanson est mort. Le fils de Dookan, notre dieu, n'est plus. En toute logique, cette révélation aurait dû frapper de stupeur [Root.Monarch.GetName] et les chamans assemblés. Les laisser remettre en question leur foi et leur raison de suivre la Marée Verte, la grande croisade de Korgus contre le monde de la surface. Pourtant, nul ne broncha, car ces bois maudits avaient déjà ébranlé leur essence même.\n\nPour ceux hors des Bois-Profonds, cinq petites années seulement s'étaient écoulées. Mais, en raison des magies des Bois-Profonds, des décennies entières avaient passé pour les gens de [Root.GetName]. Des décennies à se défendre contre des elfes insoumis. Des décennies à composer avec des gobelins déloyaux. Et, pire que tout, des décennies de maudites facéties féeriques. Le temps de remettre en question ses croyances était venu et reparti depuis longtemps.\n\nPour [Root.GetName], la mort de Dookanson n'était qu'une épreuve de plus. Un défi de plus à surmonter. De fait, aux yeux de [Root.Monarch.GetName] et des chamans, cela ne changeait rien. Leur voie était tracée depuis bien longtemps…"
 greentide.4.a:0 "Les préceptes de Korgus Dookanson les avaient maintenus forts."
 greentide.4.a.tt:0 "Nous resterons disciples de Dookanson."
 greentide.4.b:0 "Les préceptes de Dookan lui-même les avaient maintenus forts."
 greentide.4.b.tt:0 "Cela pourrait annoncer de profonds changements dans notre foi…"
 greentide.5.t:0 "Chants des Sages"
 greentide.5.d:0 "Notre clan réside dans les Bois-Profonds depuis des générations désormais. La raison de notre venue ici, Korgus Dookanson et sa Marée Verte au funeste destin, s'est évanouie. Pourtant, les souvenirs de nos ancêtres et des cavernes du Dwarovar qu'ils appelaient leur foyer demeurent vivaces. Leurs luttes et leurs triomphes sont encore célébrés dans des chants communautaires lors des rassemblements réguliers comme des festivités solennelles.\n\nDe fait, leurs exploits héroïques et leur ténacité inspirent encore notre jeunesse. Les petits courent même en tous sens dans des jeux d'imitation, remplaçant les diaboliques nains par les capricieuses fées et les grottes rocailleuses par la canopée forestière. Parmi ces héros figurent non seulement des figures légendaires telles qu'Og le Brise-Barbe et Grima l'Ombre, mais aussi des personnages plus récents comme Gordak Hurlement-Maudit. Avec le temps, il est possible que ces grands orques éclipsent Dookan lui-même aux yeux de [Root.GetName]…"
 greentide.5.a:0 "Pourtant, nous n'oublions pas notre Créateur ni l'injustice qu'il endure."
 greentide.5.a.tt:0 "Nous resterons disciples de Dookan."
 greentide.5.b:0 "Chantons le passé et prouvons notre valeur pour l'avenir !"
 greentide.5.b.tt:0 "Chaque province possédée suivant la religion §YVieux Dookan§! se convertit au §YBulgu Orazan§!.\nLes provinces nouvellement converties reçoivent « §YZèle Religieux§! » pour §Y25 ans§!, donnant les effets suivants :\nForce missionnaire locale : §R-100,0 %§!"
 greentide.6.t:0 "Bris de Chaînes"
 greentide.6.d:0 "La Marée Verte a déferlé il y a vingt ans lorsque Korgus Dookanson, fils du dieu-orque Dookan, mena les clans de l'Échine-du-Serpent dans une grande invasion du monde de la surface, envoyant leurs esclaves gobelins en première ligne pour y être massacrés. Mais les habitants de la surface gagnèrent eux aussi une championne divine : Corin, l'avatar d'Agrados.\n\nHier, ces demi-dieux rivaux s'affrontèrent enfin au combat. L'affrontement qui s'ensuivit se solda par leur destruction mutuelle. Corin et Korgus, tous deux terrassés de la main l'un de l'autre.\n\nLe chaos qui en résulta fut précisément ce dont nous autres gobelins avions besoin pour nous échapper. Partout en Escann, nous brisâmes nos chaînes tandis que la Marée Verte se fracturait. Au même moment, les gobelins des forêts arrivèrent du sud, fuyant les infâmes Bois-Profonds pour rejoindre leurs frères dans cette liberté naissante. Et pourtant, les orques veulent nous réduire à nouveau en esclavage, et les humains nous voient comme des envahisseurs à éliminer. Il nous faudra toute notre force et toute notre ruse pour ne point laisser échapper cette unique occasion en or à jamais."