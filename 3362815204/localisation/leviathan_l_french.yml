 NATIVE_TRIBE_MIGRATORY_DEVELOPMENT_HEADER_TOOLTIP:1 "§YDéveloppement Tribal§!\nChaque mois, nous gagnons du développement tribal grâce aux pâturages avec moins de §Y100 %§! de dévastation. Nous gagnons du développement tribal supplémentaire en faisant paître sur des terres tribales appartenant à une autre nation.\nLa quantité de développement tribal gagnée sera divisée par le développement tribal actuel s'il est supérieur à 1."
