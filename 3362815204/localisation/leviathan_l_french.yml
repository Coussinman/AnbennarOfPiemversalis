 indigenous_ideas:0 "Idées Autochtones"
 indigenous_ideas_bonus:0 "Pleinement Autochtone"
 indigenous_bountiful_land:0 "Terre Généreuse"
 indigenous_bountiful_land_desc:0 "Notre peuple est entouré de vastes étendues de terre, intouchées par les humains depuis des générations et riches en flore et en faune."
 indigenous_irregular_warfare:0 "Guerre Irrégulière"
 indigenous_irregular_warfare_desc:0 "Par l'utilisation des caractéristiques naturelles et des barrières auxquelles nous sommes habitués, nous pouvons vaincre des ennemis plus nombreux par des raids et des embuscades."
 indigenous_constitution:0 "La Grande Loi"
 indigenous_constitution_desc:0 "En liant notre peuple par un ensemble de principes communs, une constitution, nous pouvons aspirer à l'amélioration de tous."
 indigenous_braves:0 "Les Braves"
 indigenous_braves_desc:0 "Notre culture a une longue tradition de rites de passage pour les jeunes hommes devenant guerriers. Un acte de bravoure pour achever le voyage vers l'âge adulte."
 indigenous_controlled_burns:0 "Brûlis Contrôlés"
 indigenous_controlled_burns_desc:0 "En brûlant les champs de manière contrôlée, nous pouvons obtenir de meilleurs rendements de nos récoltes, permettant une population bien plus importante."
 indigenous_trade_with_foreigners:0 "Commerce avec les Étrangers"
 indigenous_trade_with_foreigners_desc:0 "En commerçant avec des peuples d'autres cultures et de lieux lointains, nous serons exposés à de nouvelles idées."
 indigenous_treaties:0 "Traités Respectés"
 indigenous_treaties_desc:0 "Notre parole est notre lien, il serait impensable pour nous de rompre un traité que nous avons conclu. C'est pourquoi on nous fait confiance quand les hostilités cessent."
