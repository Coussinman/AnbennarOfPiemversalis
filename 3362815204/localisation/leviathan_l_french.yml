 extended_regency_events.1.t:0 "Sans Rancune"
 extended_regency_events.1.d:1 "La bonne éducation et le charme naturel de [Root.Heir.GetName] ont fait de lui une option plus qu'appropriée pour le trône. La mauvaise administration de [Root.Monarch.GetName], cependant, a fait que [Root.GetName] ressent son manque de stabilité. Gouverner une nation est aussi difficile et délicat que de cueillir des roses sans toucher une seule épine. Parfois on n'est tout simplement pas né avec cette compétence. Peut-être pourrions-nous utiliser l'une de ces épines..."
 extended_regency_events.1.a:0 "Nous devons assurer la stabilité de [Root.GetName]. Quoi qu'il en coûte."
 extended_regency_events.2.t:0 "Même comme une Ombre"
 extended_regency_events.2.d:0 "Après avoir survécu à la tentative de porter atteinte à son intégrité physique, [Root.Monarch.GetName] a commencé à se sentir consumé par ce qu'il peut appeler prudence, tandis que d'autres pourraient y faire référence en utilisant des mots moins agréables. Il a commencé à éviter les événements sociaux, laissant le reste du conseil seul pour gouverner toute la nation.\nSon flagrant manque de responsabilité a soulevé de nombreux soupçons parmi la cour. Cependant, ce qui a grandement détérioré l'opinion publique de [Root.Monarch.GetName] est le comportement étrange qu'il a exhibé dernièrement, ses yeux rouges et grands ouverts au milieu de la nuit, murmurant dans l'obscurité qu'il ne quittera jamais le trône, demandant à quelqu'un de venir à lui même comme une ombre, même comme un rêve."
 extended_regency_events.2.a:0 "Nous devons immédiatement mettre fin à cela."
 extended_regency_events.2.b:0 "Nous devons l'arrêter."
 extended_regency_events.2.c:0 "Ce n'est pas si grave."
 extended_regency_events.2.e:0 "Nous devons recourir à... une approche moins prosaïque."
 extended_regency_events.3.t:0 "Même comme un Rêve"
 extended_regency_events.3.d:0 "Après la tentative infructueuse d'empêcher [Root.Monarch.GetName] d'aggraver le destin de notre nation, la paranoïa qui l'avait entouré n'a fait que s'avérer vraie, causant ainsi un mal encore plus grand à sa santé mentale. Ayant déjà interrogé les membres les plus proches du conseil, [Root.Monarch.GetName] a commencé à entrer dans leurs chambres sans prévenir, accompagné de quelques gardes royaux et d'un ton sévère dans sa voix : « Cela doit être fait » est la seule réponse qu'on peut obtenir de lui tandis que leurs affaires sont fouillées."
 extended_regency_events.3.a:0 "C'est une perte de temps et d'efforts."
 extended_regency_events.3.b:0 "L'arrêter ne nous apporterait que plus de problèmes."
 extended_regency_events.4.t:0 "Esprits Pervers"
 extended_regency_events.4.d:0 "L'or est une chose dangereuse, son éclat tentant impossible à résister. Il se tapit dans les ombres, attirant les imbéciles inconscients vers sa lueur fatale, sa rondeur dorée comme deux yeux de démon. [Root.Monarch.GetName] n'est pas étranger à ce sentiment périlleux, son visage agacé cherchant désespérément un nouveau jouet avec lequel jouer, ses doigts inspectant chaque tiroir, chaque poche, essayant d'utiliser ses mains comme Midas.\nPendant ce temps, notre nation souffre, la population tombant lentement dans le désespoir, leurs bouches affamées ouvertes en prières."
 extended_regency_events.4.a:0 "Nous ne pouvons pas laisser [Root.Monarch.GetName] ruiner notre pays."
 extended_regency_events.4.b:0 "Nous tombons tous dans les mêmes péchés."
 extended_regency_events.4.c:0 "C'est trop tard maintenant !"
 extended_regency_events.5.t:0 "Chasse au Trésor"
 extended_regency_events.5.d:0 "Cela a commencé avec quelques rires innocents, quelques commentaires désinvoltes, quelques suggestions sans péché. Puis cela a commencé à se transformer en quelques sourires malicieux, quelques commentaires acérés, quelques commandements sinistres.\nTout le palais savait que [Root.Monarch.GetName] s'était trop habitué au pouvoir, mais peu auraient même envisagé qu'il irait aussi loin pour le préserver. Notre héritier légitime, [Root.Heir.GetName], a été emprisonné après avoir été invité à « aller trouver le trésor spécial » caché dans les donjons."
 extended_regency_events.5.a:0 "Des rumeurs se répandent dans notre pays."
 extended_regency_events.6.t:0 "Jours de Gloire"
 extended_regency_events.6.d:1 "Parfois l'espoir se trouve dans les endroits les plus inattendus. Depuis le début de sa régence, [Root.Monarch.GetName] s'est avéré être un excellent dirigeant, toujours conscient des nécessités de notre peuple. Certains vont même jusqu'à dire que notre nation connaîtrait plus de prospérité s'il restait dirigeant un peu plus longtemps...\nÉtant donné l'imminente majorité de [Root.Heir.GetName], cela ne devrait en aucun cas être possible, cependant, son ineptie a déjà exaspéré la plupart de ses tuteurs, beaucoup d'entre eux quittant notre cour après avoir échoué à le discipliner."
 extended_regency_events.6.a:0 "Je suis sûr que quelque chose peut être fait..."
 extended_regency_events.6.b:0 "Ce n'est pas le premier héritier incompétent."
 increase_force_limit_from_colony:0 "Augmenter la Conscription de la Colonie"
 enlarge_the_gold_fleet:0 "Agrandir la Flotte d'Or"
 increase_religious_control:0 "Augmenter le Contrôle Religieux"
 increase_integration_in_the_realm:0 "Augmenter l'Intégration"
 increase_trade_power_transfer_from_colony:0 "Augmenter le Transfert de Puissance Commerciale"
 encourage_cash_crops:0 "Encourager les Cultures de Rente"
 encourage_cash_crops_tt:0 "Les Biens Commerciaux de Cultures de Rente auront plus de chances d'apparaître dans leurs provinces."
 increase_naval_force_limit_from_colony:0 "Augmenter les Marines de la Colonie"
 increase_the_gold_tax:0 "Augmenter la Taxe sur l'Or"
 allow_autonomous_trade:0 "Permettre le Commerce Autonome"
 allow_autonomous_taxing:0 "Permettre la Taxation Autonome"
 allow_autonomous_militias:0 "Permettre les Milices Autonomes"
 allow_autonomous_navy:0 "Permettre la Marine Autonome"
 special_regency_events.1.t:0 "La Maladie de [Root.Monarch.GetName] !"
 special_regency_events.1.d:0 "C'est un jour fatidique pour notre nation. La maladie de [Root.Monarch.GetName] est impossible à ignorer désormais, l'empêchant de s'occuper de ses devoirs. Il avait exhibé des signes croissants d'instabilité mentale, insistant pour prendre des décisions clairement désavantageuses pour notre pays.\nCe matin, un conseil de dix-sept médecins s'est mis d'accord pour signer un document le déclarant incapable de gérer notre royaume, sans aucune perspective possible d'amélioration de son état. Après avoir communiqué leur résolution à notre héritier, [Root.Heir.GetName], il a exprimé son mécontentement face à leur suggestion qu'il prenne lui-même le trône, arguant qu'il ressent encore une forte responsabilité envers sa mère."
 special_regency_events.1.a:0 "Absurdité ! C'est son devoir."
 special_regency_events.1.b:0 "Nous devrions faire confiance à son bon jugement."
 special_regency_events.1.tt:0 "§Y[Root.Heir.GetName]§! montera sur le trône."
 chateau_de_chenonceau:0 "Château de Chenonceau"
 desc_chateau_de_chenonceau:0 "Nous avons enfin récupéré les dépendances de la Couronne."
 special_regency_events.2.t:0 "Château de Chenonceau"
 special_regency_events.2.d:0 "Les affaires de cœur ne devraient jamais être mêlées à la politique, surtout quand il s'agit du roi et de la reine d'une nation. Après l'influence croissante de Catherine à la cour de France, et l'intérêt croissant et évident que son mari avait exprimé pour Diane de Poitiers, il devint inévitable que quelque chose devait être fait.\nComme l'un de ses premiers actes dans sa nouvelle position, Catherine a demandé que Diane rende l'imposant Château de Chenonceau à la Couronne, ainsi que les bijoux nobles qui lui avaient été si mal offerts."
 special_regency_events.2.a:0 "Nous devons garantir l'honneur de Catherine."
 sten_sture_opinion:0 "Régence de Sten Sture"
 special_regency_events.3.t:0 "La Régence de Sten Sture"
 special_regency_events.3.d:0 "Ayant aidé nos armées à vaincre la domination danoise sur notre pays et étant un contributeur formidable au soulèvement suédois, Sten Gustavsson est devenu une pièce irremplaçable dans l'armée de notre nation, ainsi que dans sa politique. À tel point que même son oncle, le Roi Karl VIII, a décidé de le nommer régent durant ses multiples absences. Il ne fallut pas longtemps avant qu'une divergence d'opinions n'apparaisse parmi les différents états concernant cette résolution critique."
 special_regency_events.3.a:0 "Il n'y a personne de plus préparé que lui."
 special_regency_events.3.b:0 "C'est un peu trop dramatique."
 special_regency_events.4.t:0 "Un Moment de Splendeur"
 special_regency_events.4.d:0 "[Root.Monarch.GetName] a pris le pouvoir sur notre nation et son jugement avisé nous a conduits à une période de prospérité et de paix. Elle s'est entourée des meilleurs et plus compétents conseillers parmi le peuple de [Root.GetName]. Dans ces circonstances, nombreux sont ceux qui ont exprimé leur désir de lui voir donner le pouvoir officiel de notre nation."
 special_regency_events.4.a:0 "Elle devrait être maintenue comme conseillère."
 special_regency_events.4.b:0 "Elle sera reine de plein droit."
 special_regency_events.4.c:0 "Nous suivrons les règles de succession."
 special_regency_events.5.t:0 "L'Éducation de l'Héritier"
 special_regency_events.5.d:0 "Il y a peu de choses plus importantes dans la vie que les connaissances cruciales apprises dans l'enfance. Pour cette même raison, [Root.Monarch.GetName] a consacré une grande partie de ses efforts à assurer les meilleurs tuteurs possibles pour l'éducation de [Root.Heir.GetName], car il doit gouverner le pays dans quelques années.\nUn homme est venu à notre cour ce matin, ses mains tremblantes pouvaient à peine supporter le poids de tous les papiers qu'il transportait. Il a demandé le nom de notre héritier, et s'est présenté comme son nouveau précepteur."
 special_regency_events.5.a:0 "Il sera le bienvenu."
 special_regency_events.6.t:0 "La Chose la Plus Profonde"
 special_regency_events.6.d:0 "Quand on leur demandait quelle était la chose la plus profonde au monde, les gens de la cour répondaient « les grottes sous la montagne », « le fond de l'océan », « la gorge du tigre ». Quand on lui demanda son avis, la reine Jung Soon déclara simplement : « Le plus profond est le cœur humain. »\nSa sagesse est sans égale, et l'amour que les paysans lui portent est aussi sans précédent. Nombreuses sont les voix qui ont commencé à suggérer qu'elle pourrait avoir une tête mieux adaptée pour la couronne, maintenant que [Root.Monarch.GetTitle] [Root.Monarch.GetName] est dangereusement malade..."
 special_regency_events.6.a:0 "Elle devrait être notre nouvelle régente."
 special_regency_events.6.b:0 "Nous devrions lui donner le pouvoir de [Root.GetName]."
 special_regency_events.6.c:0 "L'héritier peut le faire par lui-même."
 special_regency_events.6.tt:0 "§Y[Root.Consort.GetName]§! deviendra reine régente."
 special_regency_events.6.tt2:1 "§Y[Root.Consort.GetName]§! montera sur le trône."
 special_regency_events.7.t:0 "La Persécution Sinyu"
 special_regency_events.7.d:0 "Les gens sont plus qu'une seule chose, et toutes ces choses ne sont pas bonnes. Outre sa nature avisée, [Root.Monarch.GetName] a décidé de commencer une persécution religieuse contre les chrétiens vivant dans [Root.GetName]. Cependant, ses raisons semblaient suivre des questions plus prosaïques, car la plupart de ses opposants politiques semblent très enclins à ces croyances étrangères. Il a suggéré qu'ils devraient tous être exécutés pour assurer la sécurité de notre nation."
 special_regency_events.7.a:0 "Nous devrons nous débarrasser d'eux."
 special_regency_events.7.b:0 "Cela ne nous fera pas bonne impression."
 crown_colony_government:0 "Colonie de la Couronne"
 crown_colony_government_desc:0 "Une Colonie de la Couronne est un type de colonie directement contrôlée par la métropole."
 private_enterprise_colony_government:0 "Colonie d'Entreprise Privée"
 private_enterprise_colony_government_desc:0 "Une colonie gérée comme une Entreprise Privée se concentre sur l'extraction des ressources d'une colonie et leur rapatriement."
 self_governing_colony_government:0 "Colonie Autonome"
 self_governing_colony_government_desc:0 "Un type de colonie qui est autonome, une Colonie Autonome agit comme un pays dans un pays."
 custom_idea_possible_disengagement_chance:0 "Chance de Désengagement Naval"
 custom_idea_possible_disengagement_chance_desc:0 "En entraînant nos navires, nous serons capables d'éviter des pertes inutiles en mer lors d'engagements avec d'autres marines."
 custom_idea_yearly_karma_decay:0 "Éviter la Décroissance du Karma"
 custom_idea_yearly_karma_decay_desc:0 "Nous pouvons éviter de perdre du karma avec quelques simples changements dans notre façon de faire les choses."
 flavor_byz.2.t:0 "Le Patriarcat de Constantinople Guérit le Schisme"
 flavor_byz.2.d:0 "Le Patriarche de Constantinople a déclaré le Grand Schisme terminé, une déclaration soutenue par ses nouvelles marionnettes ecclésiastiques dociles à Rome et Moscou. Bien que nous puissions continuer nos anciennes pratiques, les victoires du Patriarcat suggèrent que Dieu pourrait vraiment être de son côté."
 flavor_byz.2.a:0 "Nous embrasserons la foi orthodoxe."
 flavor_byz.2.b:0 "Tant qu'ils pratiqueront l'hésychasme, nous resterons catholiques !"
 millenarian_theocracy_reform:0 "Théocratie Millénariste"
 millenarian_theocracy_reform_desc:0 "Le monde est devenu un royaume pécheur qui ne peut être purifié que par le feu. Nous devons faire confiance au jugement de notre dirigeant pour y mettre fin. La République lui accordera le pouvoir absolu."
 native_federations_event.1.t:0 "Les Voies de la Fédération"
 native_federations_event.1.d:0 "Faire partie d'une Fédération a de grandes conséquences pour notre peuple, non seulement parce que nous lions notre destin à celui des autres, mais parce que nous devenons quelque chose comme une nouvelle tribu plus grande. Ces nouvelles manières de gouverner ont fait se demander à certains si les anciennes étaient les meilleures pour notre propre peuple. Bien sûr, des débats mais aussi des combats ont émergé parmi les membres de la tribu pour décider du destin de notre nation et presque tout le monde veut unanimement que [Root.Monarch.GetName] prenne une décision."
 native_federations_event.1.a:0 "Nous nous adapterons aux voies de la Fédération."
 native_federations_event.1.b:0 "Les anciennes voies ont fonctionné, fonctionnent et fonctionneront."
 native_federations_event.2.t:0 "Gouvernance par le Conseil"
 native_federations_event.2.d:0 "Comme nous ne sommes plus dans une Fédération, cela n'a plus de sens pour notre peuple de pratiquer ses règles de gouvernement. Les membres les plus âgés de notre communauté sont pleins de sagesse qui aidera notre tribu à prospérer, et ils nous conseilleront en tant que membres du conseil. Des voix divergentes s'élèveront, comme prévu, mais finalement la décision sera entre les mains de [Root.Monarch.GetName]."
 native_federations_event.2.a:0 "Cela n'a plus de sens."
 native_federations_event.2.b:0 "Nous resterons sur cette voie."
 native_federations_event.3.t:0 "Un pour Tous, Tous pour Un"
 native_federations_event.3.d:0 "Tout le monde sait que les loups sont les meilleurs chasseurs parce qu'ils sont une meute, pas des créatures solitaires qui errent seules. Nous devrions apprendre de la Nature et de sa sagesse. Tant que [Root.Monarch.GetName] sera au pouvoir à la tête de sa Tribu et de la Fédération, les gens se souviendront toujours qu'il a réussi à tous nous unir."
 native_federations_event.3.a:0 "Ensemble nous sommes plus forts."
 leadership_pays_off_mod:0 "Le Leadership Paie"
 desc_leadership_pays_off_mod:0 "Notre rôle de chef de la Fédération nous apporte de nouvelles opportunités."
 native_federations_event.4.t:0 "Plus Forts Ensemble"
 native_federations_event.4.d:0 "Notre Fédération existe depuis quelques années déjà, et nous avons parcouru un long chemin ensemble. Malgré tous les problèmes qui ont naturellement surgi, nous avons réussi à en sortir plus forts et plus unis que jamais. Avec toutes ces luttes, nous avons intégré nos tribus dans une toute nouvelle mentalité de groupe, et il est temps d'en récolter les bénéfices."
 native_federations_event.4.a:0 "Nous devrions tous en bénéficier."
 grow_in_harmony_mod:0 "Croître en Harmonie"
 desc_grow_in_harmony_mod:0 "La Fédération nous bénéficie à tous."
 native_federations_event.4.b:0 "Le Chef Obtient la Meilleure Part."
 primus_inter_pares_mod:0 "Primus Inter Pares"
 desc_primus_inter_pares_mod:0 "Comme nous sommes les chefs de la Fédération, nous sommes ceux qui obtiennent les plus grands bénéfices. Ce n'est que justice."
 guru_teaching:0 "Enseignements des Gurus"
 native_federations_event.5.t:0 "Problèmes pour la Fédération"
 native_federations_event.5.d:0 "Le chef de notre Fédération a affiché un comportement étrange dernièrement et des rumeurs inquiétantes se sont répandues à travers les tribus. Bien que personne n'ait élevé la voix, les dirigeants des autres membres de la Fédération sont inquiets et se sont rassemblés pour discuter du problème."
 native_federations_event.5.a:0 "C'est un problème."
 lost_respect_mod:0 "Respect Perdu"
 desc_lost_respect_mod:0 "Les autres membres ne nous respectent plus autant."
 native_federations_event.5.b:0 "Nous devrions résoudre cela."
 native_federations_event.6.t:0 "S'Unir Contre le Monde"
 native_federations_event.6.d:0 "Des nations puissantes sont nos nouveaux voisins et le besoin de s'unir s'élève comme le faucon dans le ciel. [Root.Monarch.GetName] s'inquiète de ces gens, avec leurs avancées technologiques qui deviendront sans doute un grand avantage de leur côté si un conflit éclatait entre notre peuple et le leur. C'est le temps de faire un choix difficile."
 native_federations_event.6.a:0 "Nous vivrons ou mourrons ensemble."
 live_or_die_together_tooltip:0 "Nous oublierons toutes les transgressions passées des autres membres de la Fédération et les considérerons comme nos vrais amis."
 native_federations_event.6.b:0 "Chacun devrait décider par lui-même."
 stand_the_ground_mod:0 "Tenir Bon"
 desc_stand_the_ground_mod:0 "Nous résisterons aux envahisseurs comme nous l'avons fait par le passé."
 hansa_incident.4.t:0 "Embargo de l'Empire"
 hansa_incident.4.d:0 "[Emperor.Monarch.GetName], dirigeant du Saint-Empire Romain, a déclaré un embargo contre nous. Nos marchands feront face à des restrictions commerciales sur leurs marchés."
 hansa_incident.4.a:0 "Maudit soit-il."
 flavor_lfa.1.t:0 "De l'Or à [lfa_gold_province.GetName] !"
 flavor_lfa.1.d:0 "Le fondement de notre fière nation est le travail laborieux qui accompagne l'extraction dans les gisements d'or. Il n'est que juste que, surtout maintenant que nos techniques se sont améliorées, ces biens restent ici, avec leurs propriétaires légitimes, au lieu d'être emportés par des hommes étrangers et avides.\nUne nouvelle mine d'or a été découverte à [lfa_gold_province.GetName], et tout ce qu'elle contient n'appartiendra qu'au peuple !"
 flavor_lfa.1.a:0 "C'est un jour en or !"
 colonial_nation.182.t:0 "Un Gouverneur Corrompu"
 colonial_nation.182.d:0 "Les difficultés de [Root.Monarch.GetName] avec l'administration de notre nation n'étaient pas un secret pour beaucoup, des rumeurs sur son ineptie devant être étouffées par nos diplomates plus habiles dans une tentative de maintenir la paix de la colonie. Cependant, l'augmentation récente de la corruption a révélé l'inévitable : l'un de nos anciens administrateurs a rendu public que l'aide monétaire reçue de la Couronne est allée directement dans la poche de [Root.Monarch.GetName].\nCe mauvais comportement en temps de besoin a conduit à un certain nombre de soulèvements parmi notre peuple qui doivent être maîtrisés."
 colonial_nation.182.a:0 "C'est scandaleux."
 colonial_corrupted_governor:0 "Gouverneur Corrompu"
 desc_colonial_corrupted_governor:0 "Notre Gouverneur était un corrompu."
 colonial_nation.183.t:0 "Un Nouveau Gouverneur"
 colonial_nation.183.d:0 "Les rumeurs de l'inefficacité du règne de [Root.Monarch.GetName] ont inévitablement atteint la Couronne, répandant des inquiétudes sur la façon dont cette situation malheureuse pourrait affecter leur réputation, et la nôtre. Sous la menace d'être assimilés par la Couronne, ils nous ont offert un accord palliatif : nommer un nouveau gouverneur qui peut prendre les rênes de notre colonie avant qu'il ne soit trop tard."
 colonial_nation.183.a:0 "Nous devrions suivre leur conseil."
 colonial_nation.183.b:0 "[Root.Monarch.GetName] peut encore gouverner."
 colonial_nation.184.t:0 "[Root.GetName] Est Endetté !"
 colonial_nation.184.d:0 "Les temps laborieux auxquels fait face notre colonie ne connaissent pas de fin apparente. La dette monétaire qui pèse maintenant sur nous a écrasé l'esprit de notre peuple qui, mené par la famine que leurs propres familles subissent, a exigé que [Root.Monarch.GetName] trouve une solution immédiate et efficace."
 colonial_nation.184.a:0 "Nous utiliserons notre influence pour régler cela."
 colonial_nation.184.b:0 "Ils n'ont pas à se plaindre."
 colonial_nation.185.t:0 "Charte Royale Révoquée"
 colonial_nation.185.d:0 "Menés par les difficultés auxquelles notre nation a fait face dernièrement et le mécontentement croissant exprimé par notre peuple, notre colonie est inévitablement vouée à la faillite. Malgré les supplications de [Root.Monarch.GetName] pour maintenir le privilège de la Compagnie de gouverner, la Couronne a décidé de révoquer la charte royale qu'elle nous avait accordée et d'assumer le contrôle de l'administration avant, comme ils l'ont eux-mêmes déclaré, qu'il ne soit trop tard."
 colonial_nation.185.a:0 "C'est sans précédent !"
 colonial_nation.186.t:0 "Incitations Coloniales"
 colonial_nation.186.d:0 "Les terres de notre colonie sont fertiles et excellentes pour l'agriculture, notre peuple est gentil et accueillant, notre administration est aussi efficace qu'elle peut l'être, et l'air sent le calme et la stabilité, loin des turbulences politiques de la métropole. Nous sommes en effet un paradis sur terre, mais déménager est toujours un processus désagréable, bien que parfois nécessaire, et notre population n'est pas aussi élevée que nous le voudrions.\n[Root.Adm_Advisor.GetName] a suggéré qu'une nouvelle politique soit promulguée dans laquelle la tolérance pour les différentes fois est augmentée, afin que plus de colons puissent être attirés vers notre terre prospère."
 colonial_nation.186.a:0 "Cela nous assurera certainement plus de colons."
 colonist_incentives:0 "Incitations Coloniales"
 desc_colonist_incentives:0 "Un nouvel ensemble de privilèges a été accordé à toutes les confessions."
 colonial_nation.187.t:1 "Apaiser les [Root.GetBurghersOrFallbackName]"
 colonial_nation.187.d:1 "Des inquiétudes ont été soulevées parmi les [Root.GetBurghersOrFallbackName] concernant le règne de notre colonie. Des indices sur leurs opinions avaient été furtivement répandus au cours des derniers mois, mais il est maintenant clair à bien des égards que leur mécontentement est distinct et inquiétant.\nL'un d'eux a approché [Root.Monarch.GetName] ce matin, avant même qu'il puisse assister au conseil, et a rendu leurs intentions assez explicites : « Nous sommes profondément préoccupés par l'oligarchie noble influençant le destin de [Root.GetName] avec leurs vices et leur cupidité du Vieux Monde. »"
 colonial_nation.187.a:1 "Nous devrions nous ranger du côté des [Root.GetBurghersOrFallbackName]."
 colonial_nation.187.b:1 "Nous devons protéger les [Root.GetNobilityOrFallbackName]."
 colonial_nation.188.t:0 "Une Préoccupation Noble"
 colonial_nation.188.d:1 "Les [Root.GetNobilityOrFallbackName] ne sont pas très doués pour cacher leurs positions politiques, et ils ne semblent pas s'en soucier autant. On les a entendus dans les fêtes et banquets, déclarant bruyamment que le destin de la colonie est voué à l'échec, étant donné le pouvoir que les [Root.GetBurghersOrFallbackName] détiennent si injustement.\nMais aujourd'hui leurs intentions ont conduit à une approche sans précédent : l'un d'eux est venu aux appartements de [Root.Monarch.GetName] avant les premières heures de l'aube : « Désolé d'interrompre votre repos, [Root.Monarch.GetTitle], cependant quelque chose doit être fait immédiatement. L'insolence et le manque de vertu des [Root.GetBurghersOrFallbackName] font de cette colonie un paradis des imbéciles. Cela doit être arrêté avant le conseil d'aujourd'hui. »"
 colonial_nation.188.a:1 "Nous devrions nous ranger du côté des [Root.GetNobilityOrFallbackName]."
 colonial_nation.188.b:1 "Nous devons protéger les [Root.GetBurghersOrFallbackName]."
 colonial_nation.189.t:0 "Concurrence Déloyale"
 colonial_nation.189.d:0 "Ce sont des temps difficiles. La plupart le sont, mais ceux-ci semblent particulièrement difficiles, du moins en ce qui concerne le destin de notre colonie. Alléguant le supposé manque de solvabilité de notre administration et l'agitation générale parmi notre peuple, une nouvelle Compagnie Commerciale est entrée en négociations avec la Couronne dans l'espoir d'acquérir eux-mêmes les privilèges pour posséder ces terres."
 colonial_nation.189.a:0 "[Root.Adm_Advisor.GetName] s'occupera de cela."
 colonial_nation.189.b:0 "Nous pouvons toujours demander la médiation de l'Église."
 colonial_nation.189.c:0 "Quelques rumeurs sur leur réputation pourraient retourner la situation..."
 colonial_nation.189.e:0 "Saisissez ces séditieux !"
 colonial_missionaries:0 "Missionnaires Coloniaux"
 desc_colonial_missionaries:0 "Des missionnaires religieux ont été envoyés pour maintenir la paix dans notre colonie."
 colonial_nation.190.t:1 "Un [Root.GetLowLevelOfficialForCountry] Absent"
 colonial_nation.190.d:1 "On dit, parmi ceux qui veulent bien écouter, que le [Root.GetLowLevelOfficialForCountry] que [Root.Monarch.GetTitle] [Root.Monarch.GetName] a si gentiment nommé pour s'occuper de notre colonie a été absent de ses devoirs pendant longtemps. On l'a vu participer aux plus grandes fêtes et bals, ici à [Root.GetName], assez... loin de ceux qu'il prétend gouverner.\nBien sûr, il est plus facile de se révolter contre le dirigeant si le dirigeant n'est pas là, donc des nouvelles d'un dangereux soulèvement à [absent_governor_province.GetName] ont finalement atteint notre cour. Confronté à ces faits, on l'a entendu dire : « Ces moustiques m'ont dévoré vivant ! »"
 colonial_nation.190.a:1 "Il n'aura certainement plus à s'inquiéter des moustiques..."
 colonial_nation.191.t:0 "Les Yeux ne Sont pas Ici"
 colonial_nation.191.d:0 "Il n'y a pas d'yeux ici. Dans cette vallée vide, les voix meurent plus vite que la tombée de la nuit, son obscurité impossible à fuir car il n'y a pas de désir de fuir. La succession des jours est impossible à compter, chaque jour est le suivant et le précédent, leur destin étroitement ajusté comme un diamant dans un pendentif.\nEt ainsi les chants d'oiseaux reviennent un jour. Et c'est un jour normal, sauf pour les oiseaux. Et leurs voix. Et le fait que ça ne ressemble à aucun autre jour. Et puis il y a un enfant. Un petit enfant, un enfant normal. Il a essayé de s'échapper du village avant, mais il revient toujours, peu importe combien de fois il part ou jusqu'où il va, il revient toujours, assis silencieusement sur le porche.\nEt aujourd'hui il part encore. Et donc il revient. Et quand il revient tous les oiseaux du village ont fait pousser des fleurs dans leurs bouches, leurs voix chantantes à jamais étouffées : le silence est restauré à nouveau. Et c'est un miracle, disent-ils, parce que les fleurs sont une chose si précieuse et le calme du village était si important que nous n'osons pas le perdre, certainement nous n'osons pas le perdre."
 colonial_nation.191.a:0 "Nous pourrions l'utiliser pour attirer quelques pèlerins..."
 colonial_nation.191.b:0 "Nous devons informer le Rectorat immédiatement !"
 miraculous_colony:0 "Colonie Miraculeuse"
 desc_miraculous_colony:0 "Un Miracle vient de se produire dans la colonie."
 colonial_nation.191.c:0 "C'est absurde."
 volcano_events.1.t:0 "Le Commencement du Feu"
 volcano_events.1.d:0 "Dans la noirceur qui enveloppait la nuit, des ruisseaux de feu illuminé coulaient abondamment le long de la colline comme une plaie ouverte, leur rougeur âpre impossible à ignorer. Une avalanche incandescente de cendres volcaniques les suivait comme un chasseur impatient, sa bouche ouverte avide de dévorer tout sur son passage jusqu'à ce que sa faim soit enfin rassasiée."
 volcano_events.1.d2:0 "Dans la noirceur qui enveloppait la nuit, un son tonitruant pouvait être entendu comme le premier battement de cœur de la montagne. De son cratère dormant, une colonne de cendres et de fumée s'éleva dans la crainte d'être vivante : l'explosion extatique de la naissance de la nature. Des pierres incandescentes furent projetées sur les villages voisins, suivies d'une avalanche incandescente de cendres volcaniques comme un chasseur impatient."
 volcano_events.1.a:0 "La nature nous a punis."
 monument_events.1.t:0 "Monument à [monument_province.GetName] !"
 monument_events.1.d:0 "La construction de notre monument à [monument_province.GetName] est enfin terminée ! Des gens de tout notre pays se rassemblent devant son imposante figure comme des enfants curieux. Émerveillés par sa splendeur, ils se réjouissent d'appartenir à [Root.GetName]."
 monument_events.1.a:0 "Aujourd'hui est un jour de fête."
 monument_events.2.t:0 "Une Main Secourable"
 monument_events.2.d:0 "L'un de nos maçons les plus célèbres et respectés a approché [Root.Monarch.GetName] ce matin, exprimant ses inquiétudes concernant l'état du monument à [monument_province_2.GetName]. « Mon cher [Root.Monarch.GetTitle], cela me brise le cœur de voir une si belle structure négligemment abandonnée, laissée à affronter seule les dangers du temps et des intempéries. Je vous en prie, permettez-moi d'aider à la restaurer. »"
 monument_events.2.a:0 "Nous devrions l'engager immédiatement."
 monument_events.2.b:0 "Nous n'avons pas le temps pour cela."
 monumental_pride:0 "Fierté Monumentale"
 desc_monumental_pride:0 "La construction de l'un des plus grands monuments de notre nation remplit les cœurs de notre peuple de fierté d'appartenir à notre royaume !"
 monument_boost:0 "Améliorations Monumentales"
 desc_monument_boost:0 "Engager les meilleurs maçons de notre nation a aidé à optimiser la construction de nos monuments."
 monument_church_of_the_people:0 "Église du Peuple"
 desc_monument_church_of_the_people:0 "Du plus humble paysan au plus haut des clercs, tout le monde de notre [Root.Government.GetName] est bienvenu à la Basilique Saint-Pierre."
 monument_events.3.t:0 "La Maison du Seigneur"
 monument_events.3.d:0 "Dieu a des yeux partout, mais Sa présence écrasante doit trouver un lieu de repos. La construction de la Basilique Saint-Pierre est terminée et la maison du Seigneur est maintenant prête à offrir un tel lieu de repos approprié. De là, [Root.Monarch.GetTitle] [Root.Monarch.GetName] peut tout surveiller comme s'il faisait partie des yeux de Dieu. Les membres les plus respectés de l'Église nous ont conseillé de tenir une grande messe afin de célébrer et honorer ce moment de joie."
 monument_events.3.a:0 "Nous devrions inviter nos alliés !"
 monument_events.3.b:0 "C'est l'église du peuple."
 opinion_st_peters:0 "Messe Inaugurale de la Basilique Saint-Pierre"
 monument_events.4.t:0 "Des Pèlerins Arrivent à [pagoda_province.GetName]"
 monument_events.4.d:0 "La beauté dorée de la Pagode Shwedagon n'est pas passée inaperçue. À l'achèvement de sa construction, des pèlerins de tout le monde bouddhiste ont commencé à arriver à [pagoda_province.GetName], afin d'offrir leurs prières."
 monument_events.4.a:0 "C'est le moment parfait pour taxer les pèlerins."
 monument_events.4.b:0 "Nous devrions faire don de fleurs et de bougies pour les offrandes."
 shwedagon_pilgrimage:0 "Pèlerinage Shwedagon"
 desc_shwedagon_pilgrimage:0 "L'afflux de pèlerins a contribué à la croissance de notre trésor."
 monument_events.5.t:0 "L'Achèvement de Borobudur"
 monument_events.5.d:0 "Il y a un certain nombre de choses qui sont infinies dans leur propre concept. La foi en est une. À la restauration de Borobudur, la puissance de notre nation est devenue visuellement évidente, un symbole de notre passé fier et de notre avenir brillant."
 monument_events.5.a:0 "Cela montrera notre supériorité sur [MAJ.GetName]."
 monument_events.5.b:0 "Cela montrera notre supériorité sur [SUN.GetName]."
 monument_events.5.c:0 "Nous devrions envoyer quelqu'un de notre conseil pour s'en occuper."
 monument_events.5.e:0 "Cela ferait une capitale puissante."
 opinion_trent:0 "Concile de Trente"
 coup_attempt_disaster:0 "Tentative de Coup d'État"
 coup_attempt_disaster_desc:0 "Il y a des gens qui se déplacent dans l'ombre tentant de renverser notre dirigeant."
 coup_attempt_disaster_resolved_tt:0 "Le coup d'État a pris fin"
 plot_has_succeeded_or_failed:0 "A résolu les Événements du §YCoup d'État§!"
 plot_failed_tooltip:0 "Le Complot a échoué"
 plot_succeeded_tooltip:0 "Le Complot a réussi"
 coup_in_palace_events.6.b:0 "La couronne est victorieuse !"
 tot_ceramics_discovered:0 "Céramiques Découvertes"
 desc_tot_ceramics_discovered:0 "La découverte de céramiques anciennes nous aidera à améliorer nos propres techniques de poterie."
 ancestor_just_personality_die_desc:0 "Notre peuple regrettera ses jugements justes et impartiaux."
 ancestor_righteous_personality_die_desc:0 "Notre peuple pleure le décès du plus vertueux [Root.Monarch.GetTitle] de notre vie."
 ancestor_tolerant_personality_die_desc:0 "Nos minorités religieuses pleureront le décès de quelqu'un d'une si grande nature tolérante."
 ancestor_kind_hearted_personality_die_desc:0 "Notre peuple se souvient de lui comme d'un [Root.Monarch.GetTitle] au grand cœur et aimant."
 ancestor_free_thinker_personality_die_desc:0 "Il n'a jamais eu peur de briser les anciennes traditions pour faire avancer nos objectifs."
 ancestor_well_connected_personality_die_desc:0 "Sans doute qu'il fait déjà des contacts précieux dans l'au-delà."
 ancestor_calm_personality_die_desc:0 "Il a apporté paix et ordre à notre peuple."
 ancestor_careful_personality_die_desc:0 "Ses décisions bien planifiées ont renforcé notre position dans le monde."
 ancestor_secretive_personality_die_desc:0 "Il a indubitablement emporté beaucoup de ses secrets dans sa tombe."
 ancestor_intricate_web_weaver_personality_die_desc:0 "Il est pleuré par une armée d'informateurs."
 ancestor_benevolent_personality_die_desc:0 "Nos sujets se lamentent du décès d'un suzerain si bienveillant."
 ancestor_zealot_personality_die_desc:0 "Son énergie et sa conviction ont amené beaucoup d'incroyants dans le giron."
 ancestor_pious_personality_die_desc:0 "Nous ne connaîtrons peut-être plus jamais un [Root.Monarch.GetTitle] d'une telle vertu et stature spirituelle."
 ancestor_lawgiver_personality_die_desc:0 "À la fin, nous serons tous jugés."
 ancestor_midas_touched_personality_die_desc:0 "Son talent pour trouver de l'argent partout a fait de nous un peuple plus riche."
 ancestor_incorruptible_personality_die_desc:0 "Son caractère fort a fait de nos terres un endroit plus honnête."
 ancestor_architectural_visionary_personality_die_desc:0 "Sa mémoire vivra à jamais dans les nombreux bâtiments qu'il a laissés derrière lui."
 ancestor_scholar_personality_die_desc:0 "Ses poursuites érudites ont apporté innovation et renommée à notre peuple."
 ancestor_entrepreneur_personality_die_desc:0 "Il a façonné la vie économique de son époque."
 ancestor_industrious_personality_die_desc:0 "Ses efforts infatigables pour améliorer notre économie nous manqueront cruellement."
 ancestor_expansionist_personality_die_desc:0 "Nos colons pleureront la perte de leur grand bienfaiteur."
 ancestor_charismatic_negotiator_personality_die_desc:0 "Les négociations avec les nations étrangères sembleront calmes et mornes sans lui."
 ancestor_silver_tongue_personality_die_desc:0 "Ses douces paroles ont tenu le monde à distance. Qui nous protégera maintenant ?"
 ancestor_conqueror_personality_die_desc:0 "Nos ennemis seront sûrement soulagés par son décès."
 ancestor_tactical_genius_personality_die_desc:0 "Ses manœuvres complexes ont laissé nos ennemis étourdis et confus."
 ancestor_bold_fighter_personality_die_desc:0 "Ses charges audacieuses dans les lignes ennemies ont laissé une impression durable sur chaque guerrier de sa génération."
 ancestor_strict_personality_die_desc:0 "Sa surveillance constante nous a toujours gardés sur nos gardes."
 ancestor_inspiring_leader_personality_die_desc:0 "Il a inspiré une génération à prendre les armes contre nos ennemis."
 ancestor_martial_educator_personality_die_desc:0 "Les règles qu'il a créées pour nos chefs militaires seront utilisées par les générations à venir."
 ancestor_navigator_personality_die_desc:0 "Son enthousiasme pour la mer nous a laissé une marine plus forte."
 ancestor_fierce_negotiator_personality_die_desc:0 "Ses négociations dures ont laissé les chefs mercenaires démunis à travers nos terres."
 pillaged_rival_capital_state:0 "État de Capitale Rival Pillé"
 requested_relative_on_throne:0 "Parent Demandé sur le Trône"
 custom_yearly_zeal:0 "Feu de la Révolution"
 custom_yearly_zeal_desc:0 "Le feu de la révolution brûle dans les cœurs de notre peuple ! Ils veulent changer le monde pour toujours !"
 custom_missionary_strength_heretics:0 "Inquisiteurs Dévoués"
 custom_missionary_strength_heretics_desc:0 "Contrairement aux païens, les hérétiques croient faire partie de notre groupe religieux. Bien que cela puisse être vrai, ils diffèrent encore beaucoup trop de la vraie foi. Heureusement, nos missionnaires sont des inquisiteurs dévoués et enseigneront à chaque hérétique que seule notre foi est la vraie !"
 custom_missionary_strength_heathens:0 "Missionnaires Intellectuels"
 custom_missionary_strength_heathens_desc:0 "Nos missionnaires ne sont pas des prédicateurs ordinaires mais des êtres intelligents, qui utilisent les faits et la logique en plus de leur ferveur pour convaincre les païens de notre cause."
 custom_missionary_maintenance:0 "Boîtes de Dons"
 custom_missionary_maintenance_desc:0 "Chaque missionnaire est équipé de sa propre boîte de dons. Chaque fois qu'ils prêchent la vraie foi, ils collectent passivement les dons des intéressés."
 custom_idea_slave_raiders_on_same_religion:0 "Société Pirate"
 custom_idea_slave_raiders_on_same_religion_desc:0 "Notre nation n'est peut-être pas de nom une Nation Pirate, mais nous avons définitivement la réputation d'en être une. Notre société est bâtie sur le pillage et les raids et notre gouvernement embrasse totalement la scélératesse."
 custom_tribal_development_growth:0 "Croissance Tribale Accélérée"
 custom_tribal_development_growth_desc:0 "La vie dans la nature n'est pas facile et peu de tribus peuvent croître assez vite pour surmonter les défis de Mère Nature. En nous concentrant sur la croissance de notre tribu, nous pouvons assurer que nous résisterons à la nature sauvage."
 custom_great_project_upgrade_cost:0 "Grands Ingénieurs"
 custom_great_project_upgrade_cost_desc:0 "Parfois, une seule grande personnalité peut tout changer. Dans ce cas, un seul ingénieur peut construire n'importe quelle grande merveille de notre nation en un instant."
 custom_all_power_cost:0 "Amplification de l'Intellect"
 custom_all_power_cost_desc:0 "Selon notre folklore, un étrange sorcier est venu à notre cour il y a longtemps et a donné à nos dirigeants une bénédiction, qui diminue les « coûts en mana de nos sorts ». À ce jour, personne parmi nous ne sait à quoi ce fou faisait référence..."
 custom_country_admin_power:0 "Secrétaires Personnels"
 custom_country_admin_power_desc:0 "Tous les dirigeants ne veulent pas vraiment faire toute la paperasse associée à leur travail. Heureusement pour eux, les secrétaires existent."
 custom_monthly_splendor:0 "Empire Splendide"
 custom_monthly_splendor_desc:0 "Notre nation est un pays de culture et de prestige. Tous autour de nous nous envieront pour notre splendeur !"
 custom_monthly_heir_claim_increase:0 "Sessions de Chasse"
 custom_monthly_heir_claim_increase_desc:0 "Un jeune héritier doit faire ses preuves devant les nobles et leur montrer qu'il est plus que valide pour le trône. En tant que tel, notre héritier va régulièrement à des sessions de chasse avec les nobles pour renforcer le lien entre eux.\nEspérons qu'il n'y aura pas d'accidents en chemin..."
 custom_monthly_support_heir_gain:0 "Soutien des Facultés"
 custom_monthly_support_heir_gain_desc:0 "Par une diplomatie interne intelligente, nous pouvons manipuler la prise de décision des Facultés et assurer leur soutien pour notre candidat au trône magistérial."
 custom_monthly_federation_favor_growth:0 "Calumet de la Paix"
 custom_monthly_federation_favor_growth_desc:0 "Les tribus peuvent avoir de nombreux sujets de conflits, mais personne ne peut dire non à un tour relaxant de fumage du calumet de la paix."
 custom_yearly_tribal_allegiance:0 "Loyauté des Tribus"
 custom_yearly_tribal_allegiance_desc:0 "Nos tribus ont une position élevée dans le gouvernement de notre nation et en tant que tel elles jouissent de privilèges plus élevés. En retour, elles ont juré allégeance et loyauté à notre cour."
 custom_imperial_mandate:0 "Légitimité du Ciel"
 custom_imperial_mandate_desc:0 "Il y a eu de nombreux clans et royaumes, qui ont essayé de revendiquer le Mandat du Ciel, mais seuls nous avons vraiment la légitimité pour le faire."
 custom_election_cycle:0 "Enthousiasme Électoral"
 custom_election_cycle_desc:0 "Notre peuple est un vrai défenseur de la démocratie. En conséquence, nos dirigeants doivent faire leurs preuves devant les électeurs plus fréquemment que dans d'autres républiques."
 custom_reelection_cost:0 "Prise du Sénat"
 custom_reelection_cost_desc:0 "Notre dirigeant élu est au-dessus de toute autre autorité et a même revendiqué le pouvoir de notre sénat national. Il unit à la fois la position de notre dirigeant et de notre sénat."
 custom_state_governing_cost:0 "Subvention des Hôtels de Ville"
 custom_state_governing_cost_desc:0 "Bien que notre royaume désire un pouvoir absolu sur les états, une division du pouvoir n'est pas évitable. En subventionnant les hôtels de ville locaux des états, nous pouvons assurer que le processus de gouvernance se déroule comme nous le voulons et que les administrateurs locaux restent loyaux à la couronne."
 custom_trade_company_governing_cost:0 "Compagnies Commerciales Autonomes"
 custom_trade_company_governing_cost_desc:0 "Gouverner des terres est toujours administrativement épuisant, surtout si ce sont des terres dans des régions étrangères sur d'autres continents. En donnant plus d'autonomie aux compagnies commerciales, elles peuvent gérer ces terres par elles-mêmes sans aide supplémentaire de la cour."
 custom_expand_administration_cost:0 "Heures Supplémentaires au Bureau"
 custom_expand_administration_cost_desc:0 "Un bon dirigeant doit être un bon exemple pour ses sujets dans chaque aspect du royaume, même si ces aspects sont de faire des heures supplémentaires au bureau pour étendre l'administration."
 custom_curia_powers_cost:0 "Parents au Rectorat"
 custom_curia_powers_cost_desc:0 "Certains membres de la famille de notre dirigeant sont d'importants ecclésiastiques du Rectorat Ravélien. Nous pouvons les utiliser pour nous en tirer plus facilement avec certaines des faveurs que nous prenons du Haut Recteur."
 custom_prestige_per_development_from_conversion:0 "Concours Missionnaire"
 custom_prestige_per_development_from_conversion_desc:0 "Nos missionnaires ont décidé de prouver leurs compétences dans un concours international de ferveur et de conversions. Avec chaque province convertie, notre royaume jouit de l'envie de nos frères et sœurs dans la foi !"
 custom_good_monthly_karma:0 "Karma Béni"
 custom_good_monthly_karma_desc:0 "Les vies passées de notre cour ont été des vies d'humilité et de piété. Il semble que leurs actes passés aient béni notre nation..."
 custom_bad_monthly_karma:0 "Karma Maudit"
 custom_bad_monthly_karma_desc:0 "Toute notre cour était composée de gens qui versaient de l'eau sur des chatons dans leurs vies passées. Le karma de ces actions maudit encore notre royaume..."
 custom_min_autonomy_in_territories:0 "Représentants Royaux"
 custom_min_autonomy_in_territories_desc:0 "Garder le contrôle sur de vastes quantités de territoires peut être fastidieux et les nombreuses personnes qui y vivent sont difficiles à suivre. Avec l'utilisation de représentants royaux, notre monarque peut s'assurer de maintenir l'autonomie de ces territoires à distance."
 custom_free_policy:0 "Règne Fiable"
 custom_free_policy_desc:0 "Notre dirigeant a promis d'établir et de maintenir une politique. C'est très inhabituel pour n'importe quel dirigeant de n'importe quelle période."
 custom_possible_policy:0 "Gouvernement Ouvert d'Esprit"
 custom_possible_policy_desc:0 "Être stoïque et rester seulement sur une voie de politiques mène à un gouvernement dépassé. Nous devons être ouverts aux nouvelles idées et politiques et les promulguer quand c'est nécessaire."
 custom_innovativeness_gain:0 "Innovations Innovantes"
 custom_innovativeness_gain_desc:0 "Notre science est la meilleure au monde ! Quiconque le nie est un parfait imbécile !"
 custom_trade_company_investment_cost:0 "Investisseurs Internationaux"
 custom_trade_company_investment_cost_desc:0 "Améliorer les compagnies commerciales coûte cher. Très cher. Mais avec l'argent d'investisseurs étrangers, nous pouvons financer cette entreprise sans aucun problème."
 custom_admiral_cost:0 "Officiers Navals Élargis"
 custom_admiral_cost_desc:0 "Bien que nos amiraux soient les meilleurs que le monde naval ait à offrir, ils sont très coûteux à remplacer quand l'un d'eux tombe au combat. En élargissant les officiers navals, nous avons un plus grand accès à des marins talentueux, qui pourraient être la nouvelle génération de grands amiraux."
 custom_global_naval_barrage_cost:0 "Attaques Navales Organisées"
 custom_global_naval_barrage_cost_desc:0 "Un bombardement naval stratégique nécessite beaucoup plus de planification qu'il n'y paraît. Avec une meilleure organisation de nos navires et canons, nous pouvons accélérer le processus de planification et économiser des ressources tout en déchiquetant les défenses de nos ennemis !"
 custom_accept_vassalization_reasons:0 "Charisme Surnaturel"
 custom_accept_vassalization_reasons_desc:0 "D'un seul geste de la main, notre dirigeant peut persuader même le roi le plus têtu de devenir notre sujet. Certains pensent que notre dirigeant a des pouvoirs surnaturels tandis que d'autres pensent que le dirigeant est juste très charismatique."
 custom_transfer_trade_power_reasons:0 "Accords Commerciaux Convaincants"
 custom_transfer_trade_power_reasons_desc:0 "L'accord est simple : Vous nous donnez votre puissance commerciale. Je fais plus d'argent. Et vous restez en vie. Marché conclu ?"
 custom_country_diplomatic_power:0 "Conseil Diplomatique"
 custom_country_diplomatic_power_desc:0 "Toutes les tâches n'appartiennent pas au dirigeant. De nombreux travaux importants concernant la diplomatie, le commerce et la marine sont gérés par un conseil de treize membres. L'un d'eux est juste légèrement sous notre dirigeant dans la chaîne de commandement et est la figure la plus secrète de notre royaume."
 custom_discovered_relations_impact:0 "Psychologie Inversée"
 custom_discovered_relations_impact_desc:0 "Parfois les espions se font attraper. Il n'y a rien que nous puissions faire pour l'empêcher. Cependant, en utilisant la psychologie inversée, nous pouvons convaincre les autres nations qu'elles voulaient en fait être espionnées soixante pour cent du temps."
 custom_center_of_trade_upgrade_cost:0 "Investissement Volontaire"
 custom_center_of_trade_upgrade_cost_desc:0 "En promettant de nouvelles maisons et du travail, nous pouvons motiver les Bourgeois à investir volontairement dans les centres de commerce. Nous devrions probablement nous assurer de tenir notre promesse cependant..."
 custom_ship_power_propagation:0 "Navires Marchands Peints"
 custom_ship_power_propagation_desc:0 "Comme nous le savons tous, les navires marchands avec des couleurs fantaisistes et agressives sont plus rapides et plus menaçants et donc font fuir la concurrence."
 custom_expel_minorities_cost:0 "Cadeaux d'Adieu"
 custom_expel_minorities_cost_desc:0 "Expulser les minorités est associé à beaucoup de choses horribles comme la persécution et la discrimination. Nous ne soutiendrons pas cela et irons plutôt d'une manière moralement plus correcte : en payant les minorités en Ducats et en terres du Nouveau Monde, nous pouvons les motiver à quitter notre pays sans que notre gouvernement ne les pourchasse réellement."
 custom_colonist_placement_chance:0 "Logements Confortables"
 custom_colonist_placement_chance_desc:0 "Nous fournissons à nos colons des maisons confortables et sûres dans le Nouveau Monde pour assurer leur survie et couvrir tous leurs besoins."
 custom_appoint_cardinal_cost:0 "Cardinaux pour le Monde"
 custom_appoint_cardinal_cost_desc:0 "Nous ne pouvons pas permettre à l'argent de devenir le goulet d'étranglement pour l'autorité du catholicisme dans le monde. En choisissant les cardinaux, qui sont plus dévoués à Dieu qu'au Ducat, tout le monde dans le monde peut profiter d'un cardinal ou deux."
 custom_enforce_religion_cost:0 "Grande Croisade"
 custom_enforce_religion_cost_desc:0 "Nos guerriers combattent avec une piété et une dévotion qu'aucun païen ou hérétique n'a vues auparavant. Chaque païen ou hérétique est plus ouvert à l'idée de rejoindre notre religion grâce à la démonstration de dominance militaire et religieuse de nos soldats."
 custom_promote_culture_cost:0 "Creuset Culturel"
 custom_promote_culture_cost_desc:0 "Notre pays est le creuset de nombreuses grandes cultures. Accepter une nouvelle culture est pour nous aussi naturel que respirer."
 custom_rival_change_cost:0 "L'Ennemi de mon Ennemi..."
 custom_rival_change_cost_desc:0 "La rivalité n'est pas un système stoïque, et il est souvent bénéfique d'abandonner une rivalité précédente pour se concentrer sur une menace beaucoup plus grande."
 custom_global_ship_repair:0 "Fournitures Navales Prévues"
 custom_global_ship_repair_desc:0 "Réparer un navire nécessite deux choses : la main-d'œuvre pour les réparer et les fournitures. Avec une meilleure organisation, nous pouvons assurer qu'une bonne partie des fournitures navales sont toujours prêtes quand un navire endommagé arrive dans l'un de nos ports."
 custom_global_ship_cost:0 "Traditions de Construction Navale"
 custom_global_ship_cost_desc:0 "Nous avons une longue histoire de construction de navires rentables mais de haute qualité et en tant que tel nous savons où nous pouvons rogner sur les coûts d'un nouveau navire."
 custom_yearly_army_professionalism:0 "Études Militaires"
 custom_yearly_army_professionalism_desc:0 "Chacun de nos soldats passera un certain temps à l'école militaire pour apprendre les bases de la guerre. De cette façon, nos armées seront construites sur des professionnels théoriques.\nTout ce dont ils ont besoin maintenant, c'est une vraie expérience de guerre pour en faire de vrais professionnels..."
 custom_drill_gain_modifier:0 "Simulations de Guerre"
 custom_drill_gain_modifier_desc:0 "Beaucoup de généraux entraînent leurs troupes juste aux bases de la guerre et comment se comporter. Ils utilisent des moyens modérés, sinon trop humains pour entraîner leurs troupes. Notre armée est différente à cet égard car ils sont entraînés par un major, qui aime rendre la vie des soldats aussi dure et réaliste que possible en utilisant nos propres canons contre eux pendant l'entraînement."
 custom_drill_decay_modifier:0 "Officiers Sévères"
 custom_drill_decay_modifier_desc:0 "Les soldats ont tendance à oublier leur entraînement pendant les temps de paix ou pendant les phases de récupération d'une bataille. Nos officiers plus que sévères empêcheront cela de se produire."
 custom_infantry_fire:0 "Pratique du Tir"
 custom_infantry_fire_desc:0 "L'infanterie de notre pays entraîne ses compétences de visée chaque jour sans aucune pause. Leur visée est à la fois précise et mortelle."
 custom_infantry_shock:0 "Expertise en Combat au Corps à Corps"
 custom_infantry_shock_desc:0 "Bien qu'avoir une arme à distance soit toujours mieux que n'avoir qu'une arme de mêlée, ce n'est pas garanti dans le chaos de la bataille. Afin d'éviter des morts inutiles, toutes nos troupes sont entraînées à manier des épées, des piques, et même au combat à mains nues."
 custom_cavalry_fire:0 "Chevaux Disciplinés"
 custom_cavalry_fire_desc:0 "La cavalerie a toujours eu du mal à utiliser des armes à distance de manière constante car leurs chevaux restaient rarement calmes pendant le feu de la bataille. Cela a cependant changé avec l'introduction de chevaux disciplinés, qui sont habitués aux sons des tirs de fusils et de canons."
 custom_cavalry_shock:0 "Chaaaaaaarge !"
 custom_cavalry_shock_desc:0 "L'ordre et la discipline sont pour les soldats avant et après le combat. Pendant le combat, cependant, il n'y a qu'une seule règle pour la cavalerie : Chaaaaaaarge !"
 custom_artillery_shock:0 "Canons de Front"
 custom_artillery_shock_desc:0 "Parfois, l'artillerie seule est vraiment la seule bonne option."
 custom_reserves_organisation:0 "Efficacité Froide"
 custom_reserves_organisation_desc:0 "Nos troupes ont traversé tant de douleur émotionnelle et physique pendant leur entraînement, la perte de leurs camarades est devenue sans importance pour eux."
 custom_global_supply_limit_modifier:0 "Cœurs de la Logistique"
 custom_global_supply_limit_modifier_desc:0 "Dans une chaîne d'événements inexplicable, notre état-major a réussi à obtenir des plans logistiques, qui sont bien au-dessus de tout ce qui est similaire pendant cette période. Bien que nous ne saurons jamais comment ils ont obtenu ces plans, ils seront toujours utiles pour organiser nos troupes dans notre propre pays."
 custom_general_cost:0 "Élargir les Rangs Militaires"
 custom_general_cost_desc:0 "En augmentant le nombre d'officiers dans l'armée, nous aurons un plus grand bassin de personnes compétentes, qui peuvent servir comme grands généraux pour notre pays."
 custom_raze_power_gain:0 "Raid et Pillage"
 custom_raze_power_gain_desc:0 "Soyons réalistes : y a-t-il quelque chose de plus satisfaisant que de raser des villes entières, piller leurs richesses et saccager leurs maisons ?\nAh, il y en a ? Eh bien, pas dans ce pays !"
 custom_manpower_in_true_faith_provinces:0 "Recrutement Religieux"
 custom_manpower_in_true_faith_provinces_desc:0 "Les institutions militaires et religieuses sont généralement séparées, mais dans un pays aux racines religieuses profondes comme le nôtre, il est seulement naturel que les gens de la vraie foi soient prêts à combattre dans notre armée."
 custom_country_military_power:0 "Gouvernement Militaire"
 custom_country_military_power_desc:0 "Chaque membre de notre gouvernement fait son devoir normal comme prévu. Cependant, en plus de cela, ils servent tous aussi comme hauts généraux dans notre armée et fournissent à notre dirigeant des idées et suggestions supplémentaires pour l'avenir militariste de notre pays."
 custom_cb_on_religious_enemies:0 "Deus Vult !"
 custom_cb_on_religious_enemies_desc:0 "Il y a bien trop de raisons pour lesquelles nous devrions déclarer la guerre aux infidèles religieux autour de nous. Mais une raison peut toujours être utilisée : Deus Vult !"
 custom_idea_claim_colonies:0 "Ambitions Coloniales"
 custom_idea_claim_colonies_desc:0 "Le monde est bien plus grand que beaucoup ne le pensent, et c'est notre destin de conquérir les vastes espaces vides de celui-ci !"
 custom_reduced_stab_impacts:0 "Propagande Interne"
 custom_reduced_stab_impacts_desc:0 "Les actions diplomatiques, qui sont vues comme radicales ou déraisonnables, ont toujours apporté l'instabilité à un pays. Nous pouvons réduire les tumultes en utilisant une propagande bien explicative et montrer à notre peuple, que nos décisions n'étaient que logiques."
 custom_extra_manpower_at_religious_war:0 "Guerriers Religieux"
 custom_extra_manpower_at_religious_war_desc:0 "Les hommes, qui sont dévoués à la seule vraie foi, ont tendance à être aussi dévoués à leur seul vrai pays. Ces guerriers sont plus qu'heureux de nous rejoindre dans notre cause contre les ennemis de notre foi !"
 custom_may_explore:0 "L'Appel de l'Aventure"
 custom_may_explore_desc:0 "Ce monde a tant à offrir : tant de merveilles à découvrir, tant d'opportunités à saisir et tant de trésors cachés qui nous attendent ! Ce serait insensé de ne pas suivre l'appel de l'aventure et de découvrir le grand monde !"
 commission_some_rock_art_title:0 "Commander de l'Art Rupestre"
 alcheringa_events.1.t:0 "Les Histoires de Moinee des Palawa"
 alcheringa_events.1.d:0 "Les Palawa sont isolés et insulaires du reste du continent et en tant que tels, ils ont leurs propres Histoires du Rêve totalement différentes de celles trouvées sur le continent. Après les avoir unis sous notre bannière et intégré leurs Histoires avec les nôtres, notre peuple a eu accès à une multitude de nouvelles Histoires du Rêve !"
 alcheringa_events.1.a:0 "Merveilleux"
 alcheringa_events.2.t:0 "Les Histoires d'Adnoartina de [Root.GetName]"
 alcheringa_events.2.d:0 "Beaucoup d'Histoires racontent de grandes batailles entre des titans s'affrontant les uns les autres. Tout comme les titans, nous nous sommes affrontés contre notre rival et les avons vaincus dans des batailles légendaires. Notre héroïsme est à la hauteur de ceux des Histoires du Rêve !"
 alcheringa_events.2.a:0 "Merveilleux"
 alcheringa_events.3.t:0 "Les Histoires de Lumaluma"
 alcheringa_events.3.d:0 "Pendant des années, les Makassariens ont été les seuls commerçants que l'Australie ait jamais connus, mais plus maintenant. Par l'unification de l'île de Sulawesi, nous sommes libres de contrôler le commerce makassarien et de transporter nos propres marchandises à travers les mers vers la Chine et l'Indonésie.\nPar pur hasard, l'une de ces marchandises contenait des écrits, qui dépeignent les Histoires du Rêve de Lumaluma ! Naturellement, nos chefs spirituels étaient très intéressés à les intégrer dans notre collection d'Histoires du Rêve."
 alcheringa_events.3.a:0 "Merveilleux"
 alcheringa_events.4.t:0 "Les Histoires des Sœurs Djunkgao"
 alcheringa_events.4.d:0 "Autrefois, notre peuple traversait l'étendue de la mer sur des navires capables de voyages intercontinentaux, mais les côtes luxuriantes de l'Australie nous ont rendus complaisants, jusqu'à maintenant. Par la construction d'une flotte, l'esprit voyageur de notre peuple s'est éveillé, et les a inspirés à recréer les Histoires du Rêve des Sœurs Djunkgao."
 alcheringa_events.4.a:0 "Merveilleux"
 alcheringa_events.5.t:0 "Les Histoires de Wagyl"
 alcheringa_events.5.d:0 "Par notre influence croissante sur la mer, notre peuple a pris contact avec l'Empereur des Dragons. Bien sûr, nous l'avons immédiatement reconnu comme un agent de Wagyl et avons créé les Histoires du Rêve racontant sa grandeur."
 alcheringa_events.5.a:0 "Merveilleux"
 alcheringa_events.6.t:0 "Rêve Islamique"
 alcheringa_events.6.d:0 "Peu d'étrangers savent naviguer vers l'Australie pour exploiter ses richesses, mais les Makassariens savent que nous sommes riches et dignes d'un voyage commercial. Ces Makassariens apportent avec eux d'étranges Histoires de dieux étrangers, et nous avons beaucoup à apprendre de leur vision du Rêve."
 alcheringa_events.6.a:0 "Merveilleux"
 alcheringa_events.7.t:0 "Le Dharma"
 alcheringa_events.7.d:0 "Les peuples des religions dharmiques suivent de nombreux dieux et prennent de nombreuses formes. En étudiant leurs voies plus profondément, nous avons gagné quelques visions uniques du Temps du Rêve."
 alcheringa_events.7.a:0 "Merveilleux"
 alcheringa_events.8.t:0 "Rêve de Baiame"
 alcheringa_events.8.d:0 "Des étrangers arrivent sur les côtes de l'Australie, prêchant la croix et un ancien martyr. Bien que nous n'embrassions pas entièrement cette nouvelle foi, le paysage des Histoires du Rêve sera indubitablement influencé par ces nouvelles révélations."
 alcheringa_events.8.a:0 "Merveilleux"
 alcheringa_events.9.t:0 "Les Esprits"
 alcheringa_events.9.d:0 "Il y a ceux dans notre nation qui ne croient pas aux Histoires du Rêve. Maintenant plus que jamais il est important d'exemplifier les Histoires de notre peuple et de les propager parmi cette population d'étrangers et de les faire prendre conscience du Rêve."
 alcheringa_events.9.a:0 "Merveilleux"
 alcheringa_events.10.t:0 "Le Serpent Arc-en-ciel"
 alcheringa_events.10.d:0 "Les Histoires du Rêve à travers l'Australie varient énormément mais une chose qui persiste est la croyance au Serpent Arc-en-ciel. Par l'étude de tous les aspects du Rêve nous avons véritablement compris la nature du Serpent Arc-en-ciel."
 alcheringa_events.10.a:0 "Merveilleux"
