 zoroastrian.1.t:0 "Sanctuaire Parsi à Sanjan"
 zoroastrian.1.d:0 "Depuis longtemps, nous comptons sur nos sujets parsis pour gérer les affaires de notre État, ayant servi comme conseillers loyaux de notre [Root.Monarch.GetTitle] depuis des générations. Récemment, la communauté de Sanjan nous a demandé de leur accorder protection contre les persécutions."
 zoroastrian.1.a:0 "Sanjan sera toujours parsie"
 zoroastrian.1.b:0 "Ils devraient connaître leur place"
 parsi:0 "Parsi"
 blessing_yasna:0 "Yasna"
 blessing_haoma:0 "Haoma"
 blessing_navjote:0 "Navjote"
 blessing_manthras:0 "Manthras"
 blessing_dakhma:0 "Dakhma"
 HOLY_SITE_421_DESC:1 "L'Ateshgah de Bakou est l'un des plus importants Temples du Feu du zoroastrisme. Bien que techniquement situé à Surakhani, il est lié à la ville de Bakou depuis l'antiquité, car on l'appelait aussi « Les Feux de Baguan » en référence à la ville de Bakou. Le feu émerge directement de la surface et ses flammes brûlent perpétuellement, avec une force féroce. On dit que certains « adorateurs du feu » vivent encore dans les environs."
 HOLY_SITE_441_DESC:1 "On dit que le prophète Zarathoustra est né au Khorezm et donc la région et, surtout, l'ancienne ville de Khiva, son centre, sont considérées comme sacrées en tant que terre mère du zoroastrisme. Les invasions islamiques ont gravement nui à notre religion dans la région, mais des poches de fidèles résistent et même parmi les musulmans de la région, plusieurs traditions zoroastriennes survivent."
 HOLY_SITE_2223_DESC:2 "L'Atash Bahram déclaré être le feu de la classe sacerdotale, appelé Adur Farnbag, brûle dans la région de Larestan, près de la ville de Karyan. C'est le plus vénéré des trois Feux de la Victoire, les deux autres étant nommés Adur Gushnasp dédié aux guerriers et Adur Burzen-Mihr dédié aux fermiers."
 HOLY_SITE_2235_DESC:1 "Sur le Mont Revand du Khorassan, près de la ville de Kashmar, l'Adur Burzen-Mihr, l'un des trois Atash Bahram ou Feux de la Victoire, brûle associé à la classe des fermiers. Centre majeur de pèlerinage durant les temps anciens, son importance pour les zoroastriens n'a pas diminué."
 HOLY_SITE_4430_DESC:1 "Quand le Khorezm tomba aux mains des forces musulmanes, certains adorateurs s'enfuirent en Inde et fondèrent une communauté à Sanjan, emportant un feu sacré avec eux. Une silsila, ou lien traditionnel, fut formée entre cette nouvelle communauté et celle d'origine en Perse d'où le nom Sanjan provenait. Depuis 1297, le feu s'est déplacé, d'abord vers les Grottes de Bahrot, puis vers le village de Bansda et finalement vers Navsari."
