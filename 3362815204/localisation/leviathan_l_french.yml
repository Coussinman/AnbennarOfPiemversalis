l_french:
 nw_native_ideas:0 "Idées Autochtones du Nord-Ouest"
 nw_native_ideas_start:0 "Amérique du Nord-Ouest"
 nw_native_ideas_bonus:0 "Ambition Autochtone du Nord-Ouest"
 raid_warfare_nw:0 "Guerre de Raids"
 raid_warfare_nw_desc:1 "Notre peuple vit dans un état permanent de guerre ou de préparation au combat. Nous pillons fréquemment nos voisins pour capturer des esclaves, et parfois nous remontons ou descendons la côte jusqu'à obtenir ce que nous désirons, même si cela implique de voyager vers des terres lointaines. Nous devons être prêts à chaque instant, c'est pourquoi nous savons nous adapter à toute situation."
 brother_salmon:0 "Frère Saumon"
 brother_salmon_desc:0 "Les saumons ne sont pas seulement une source abondante de nourriture autour de nous, ils sont aussi notre symbole spirituel. Même s'il n'est pas le seul, c'est le plus central et le plus important. Le saumon nous nourrit, le saumon nous guide et le saumon nous protège. Sans lui, notre peuple serait perdu, car il est notre lien avec l'autre monde."
 potlatch:0 "Potlatch"
 potlatch_desc:1 "Le potlatch est l'événement le plus important de la vie sociale de nos communautés. C'est une cérémonie hautement complexe où nous commémorons un événement particulier en nous rassemblant ; lors de ces festivités, le chef de la tribu prouve généralement sa richesse en offrant généreusement des cadeaux élaborés et coûteux aux visiteurs. Ces cérémonies sont l'occasion de grands festins et d'étalages de consommation ostentatoire, et y être invité est considéré comme un grand honneur."
 mother_and_father:0 "Mère et Père"
 mother_and_father_desc:1 "Même si toutes les tribus ne tracent pas leur lignée par la mère, comme les Chinooks, les femmes ont une grande importance dans notre vie sociale et y participent autant que les hommes."
 totem_poles_nw:0 "Mâts Totémiques"
 totem_poles_nw_desc:1 "Les mâts totémiques sont des sculptures monumentales représentant des symboles et des figures de notre culture. Finement sculptés dans de grands arbres, ces mâts symbolisent ou commémorent généralement nos ancêtres, nos croyances culturelles, nos lignées ou des événements notables ; mais ils peuvent aussi servir à ridiculiser ou humilier des personnes ou des tribus pour des comportements déshonorants, ou à contenir les restes de nos ancêtres défunts."
 canoe_people:0 "Peuple du Canoë"
 canoe_people_desc:1 "Nos tribus vivent sur la côte ou près de grands fleuves : notre alimentation dépend fortement du saumon, des anguilles, de nombreux autres poissons, des fruits de mer, des phoques et même des baleines ; nous utilisons l'eau comme route pour piller nos ennemis ou rendre visite à nos amis... Pour toutes ces raisons, le canoë fait partie intégrante de notre culture, bien plus qu'un simple outil. Grâce à lui, nous sommes aussi mobiles que l'eau."
 division_as_a_strength_nw:0 "La Division comme Force"
 division_as_a_strength_nw_desc:0 "Plusieurs tribus vivent dans cette région et toutes ne parlent pas la même langue, mais nous partageons tant de traits communs qu'une forme de fraternité a émergé entre nous. Nous coexistons même si notre mode de vie repose fortement sur des raids constants contre nos ennemis pour capturer des esclaves qui nous serviront."
 plains_native_ideas:0 "Idées Autochtones des Plaines"
 plains_native_ideas_start:0 "Grandes Plaines"
 plains_native_ideas_bonus:0 "Ambition Autochtone des Plaines"
 bison_hunters:0 "Chasseurs de Bisons"
 bison_hunters_desc:1 "Le bison est la vie pour notre peuple. Nous utilisons chaque partie de l'animal en hommage à son sacrifice. Nous nourrissons notre peuple de sa chair, nous utilisons ses os pour fabriquer des outils, nous utilisons sa fourrure contre le froid durant les longs hivers ou ses peaux pour nos vêtements ou pour couvrir nos tipis, nous utilisons son esprit comme animal totem. Telle est l'importance du bison pour notre culture que nous nous sentirions perdus sans lui."
 bow_archery:0 "Archerie"
 bow_archery_desc:0 "Parmi nos nombreux outils, l'arc est l'un des plus importants. Nous avons besoin de l'arc pour chasser et ainsi nourrir notre peuple, ou pour combattre nos ennemis le moment venu. Nos arcs sont robustes, puissants mais aussi flexibles comme notre peuple. Quand les visages pâles sont arrivés, notre peuple a adapté ses arcs pour tirer depuis les chevaux, mais c'est une autre histoire..."
 dwellers_of_tipis:0 "Habitants des Tipis"
 dwellers_of_tipis_desc:1 "Les tipis sont nos tentes traditionnelles faites de peaux d'animaux, généralement de bison, soutenues par de solides poteaux de bois, que nous utilisons comme habitations. Ils possèdent un volet à fumée au sommet, qui nous permet de faire du feu à l'intérieur pour lutter contre le froid en hiver. Ces tentes sont durables, offrent chaleur et confort en hiver, sont fraîches durant la chaleur de l'été et restent sèches sous les fortes pluies. Mais surtout, elles peuvent être démontées et emballées rapidement, ce qui les rend parfaites quand nous devons nous déplacer."
 peaceful_people:0 "Peuple Pacifique"
 peaceful_people_desc:1 "Les Plaines sont assez riches et vastes pour que les différentes tribus n'aient pas besoin de se disputer les ressources. Cette situation a maintenu la paix entre les groupes, et malgré nos différences et quelques rares guerres entre nous, chacun sait que notre parole sera respectée. Seule une menace étrangère peut perturber cette paix."
 sun_dance:0 "Danse du Soleil"
 sun_dance_desc:1 "La Danse du Soleil est l'une des cérémonies les plus importantes pour notre peuple. Elle implique généralement toute la communauté, chacun priant ensemble pour la guérison, et plusieurs individus faisant des sacrifices personnels au nom du groupe. Ces sacrifices impliquent des percements de la peau ou des épreuves d'endurance physique (généralement jeûner sous le ciel pendant de nombreux jours, quel que soit le temps)."
 plains_sign_language:0 "Langage des Signes des Plaines"
 plains_sign_language_desc:0 "Développé par les peuples des Plaines, le Langage des Signes des Plaines s'est répandu à travers toutes les terres comme lingua franca pour les transactions commerciales entre les tribus partout, d'une côte à l'autre. Être les créateurs de ce langage nous a apporté un certain prestige parmi les autres tribus. La renommée nous importe peu, mais nous sommes fiers de l'ingéniosité de notre peuple."
 horse_riders:0 "Cavaliers"
 horse_riders_desc:1 "Notre peuple a traditionnellement utilisé ses pieds robustes pour se déplacer dans les plaines et ses épaules capables ou des travois tirés par des chiens pour transporter nos affaires. Quand les premiers Visages Pâles sont apparus sur nos terres, ils ont amené des chevaux avec eux. Ces magnifiques animaux étaient un cadeau de nos ancêtres et nous avons fait ce qu'il fallait pour les obtenir. Le nombre de juments et d'étalons est devenu important parmi les tribus, et ils ne font désormais plus qu'un avec nous. Une partie de notre culture pour toujours."
 california_native_ideas:0 "Idées Autochtones de Californie"
 california_native_ideas_start:0 "Californie"
 california_native_ideas_bonus:0 "Ambition Autochtone de Californie"
 division_as_a_strength_cf:0 "La Division comme Force"
 division_as_a_strength_cf_desc:1 "Plusieurs tribus vivent dans cette région et toutes ne parlent pas la même langue, mais nous partageons tant de traits communs qu'une forme de fraternité a émergé entre nous. Nous coexistons en harmonie comme nous le faisons avec la nature, car cette terre regorge de ressources."
 basketweaving:0 "Vannerie"
 basketweaving_desc:1 "Les paniers sont parmi les articles les plus précieux pour notre peuple. Leur valeur réside dans leur utilité et leur place centrale dans notre vie quotidienne, pas nécessairement parce qu'ils seraient un luxe. Les paniers sont généralement tissés par nos femmes qui utilisent des plantes locales pour les créer. Leur taille et leur méthode de fabrication dépendent de l'usage auquel ils seront destinés."
 tribelets:0 "Tribules"
 tribelets_desc:1 "Malgré la forte densité de population dans notre région, particulièrement comparée à d'autres sur le continent, nos tribus sont plutôt petites, consistant à peine en quelques dizaines d'individus travaillant ensemble. Pour beaucoup, nos tribus sont mieux définies comme des tribules. Nous ne trouvons aucune honte dans ce nom. Plus les gens sont proches, plus le groupe est fort. Cela nous a aidés à prospérer."
 forest_gardening:0 "Jardinage Forestier"
 forest_gardening_desc:0 "Notre terre est si riche que notre peuple n'a jamais vraiment eu besoin de consacrer du temps à l'agriculture. Nous pouvons prendre ce dont nous avons besoin directement dans les forêts et les bois, et avec un peu de soin pour les plantes et quelques feux contrôlés tous les quelques ans, nous avons réussi à vivre en harmonie avec la nature."
 kuksu_cult:0 "Culte Kuksu"
 kuksu_cult_desc:0 "Les hommes, et parfois les femmes, de nos tribus dansent dans des sociétés secrètes pour apaiser les esprits et apporter des bénédictions à nos terres. Grâce à eux, les chênes nous donnent les nombreux glands qui servent de base à notre alimentation et permettent à notre peuple de croître en nombre. Tant que nous gardons les esprits heureux, nous ne souffrirons plus jamais de famine."
 rock_art:0 "Art Rupestre"
 rock_art_desc:0 "Le talent est un don de nos ancêtres dont ils ont béni certains membres de notre tribu. Grâce à cette inspiration, nos aires sacrées sont ornées de représentations de nos esprits, de nos ancêtres ou de nos traditions qui embellissent nos terres et rendent chacun plus heureux."
 medicine_men:1 "Gens du Cérémoniel"
 medicine_men_desc:1 "Bien que les prêtres totémiques soient répandus sur tout le continent, ils sont très importants pour nous en tant que groupe. Ce sont eux qui prennent soin de la santé de notre peuple et généralement ceux qui font fonctionner nos danses spirituelles de la manière que les esprits et nos ancêtres approuveraient."
 potlatch_held:0 "Potlatch Célébré"
 desc_potlatch_held:0 "Nous avons célébré un potlatch récemment."
 native_americans.25.t:0 "Le Potlatch"
 native_americans.25.d:1 "Un visiteur important nous a honorés de sa présence. [Root.Monarch.GetName] doit décider s'il faut célébrer un potlatch en l'honneur de notre invité ou non. D'un côté, le célébrer sera une bonne occasion de se vanter de notre richesse devant notre peuple et le leur ; de l'autre, c'est une dépense coûteuse qui pourrait nous causer beaucoup de tort pour les besoins futurs."
 native_americans.25.a:0 "Quoi qu'il arrive, un potlatch doit toujours être célébré !"
 native_americans.25.b:1 "Nous ne tiendrons pas de potlatch cette fois."
 native_americans.26.t:1 "Un Accueil Chaleureux"
 native_americans.26.d:1 "Alors que nous rendions visite à [From.Monarch.GetName] et à son peuple, un potlatch fut tenu en notre honneur. Lors de cette cérémonie, de grands cadeaux nous furent offerts pour honorer notre visite et prouver la richesse de [From.Monarch.GetName]. Comment devrions-nous répondre ?"
 native_americans.26.a:0 "Le potlatch était excellent, nous nous sentons honorés."
 native_americans.26.b:0 "Le potlatch était bien, merci."
 potlatch_good:0 "Nous avons adoré le potlatch"
 native_americans.26.c:1 "Le potlatch n'était pas si mal."
 potlatch_nice:0 "Nous avons apprécié le potlatch"
 native_americans.26.e:0 "Le potlatch était plutôt pauvre. Nous sommes déçus."
 potlatch_bad:0 "Nous n'avons pas aimé le potlatch"
 native_americans.27.t:1 "Un Accueil Glacial"
 native_americans.27.d:1 "Alors que nous rendions visite à [From.Monarch.GetName] et à son peuple, un potlatch aurait dû être tenu en notre honneur. Lors de cette cérémonie, de grands cadeaux auraient dû nous être offerts pour honorer notre visite et prouver la richesse de [From.Monarch.GetName]. Comment devrions-nous répondre ?"
 native_americans.27.a:0 "Nous comprenons, ce n'était pas le moment."
 native_americans.27.b:0 "C'est assez insultant, en fait."
 native_americans.28.t:0 "Le Jour de Chasse"
 native_americans.28.d:1 "Aujourd'hui est un bon jour pour chasser et [Root.Monarch.GetName] s'est réveillé avec cette idée en tête. [Root.Monarch.GetName] s'approche de ses hommes et leur fait part de son souhait de partir à la chasse. L'un de ses hommes les plus expérimentés s'approche et lui demande quelle proie il souhaite chasser."
 native_americans.28.a:0 "Cherchons du cerf."
 native_americans.28.b:1 "Le saumon sera la proie."
 native_americans.28.c:0 "Rien de tel qu'une chasse au phoque."
 native_americans.28.e:0 "Les antilocapres sont toujours un défi."
 native_americans.28.f:0 "Seul le bison est une proie digne."
 native_americans.29.t:0 "La Grande Proie"
 native_americans.29.d1:1 "Alors que [Root.Monarch.GetName] partait à la chasse avec quelques-uns de ses guerriers, tentant d'encercler un groupe de cerfs et de rapporter de la nourriture pour sa tribu, l'un de ses hommes s'approche de lui et dit qu'il a vu un très grand cerf au fond de la forêt. [Root.Monarch.GetName] n'hésite pas et suit l'homme à travers les bois jusqu'à trouver sa proie. Un grand cerf, le plus grand qu'il ait jamais vu, se tient majestueux au milieu d'une clairière. Il murmure un bref « merci » aux esprits de la forêt pour cette opportunité qu'il ne manquera pas. Il ordonne à ses hommes de rester silencieux et à leur poste tandis qu'il commence à se déplacer silencieusement vers la meilleure position pour tirer à l'arc. L'arc est prêt à libérer la flèche destinée à tuer l'animal. La respiration de [Root.Monarch.GetName] est calme. Ses doigts commencent à libérer la flèche."
 native_americans.29.d2:1 "Une femme de sa tribu s'approche de lui alors qu'il pêche comme sa tribu le fait habituellement pour nourrir son peuple. [Root.Monarch.GetName] lève la tête vers elle, leurs regards se croisent et [Root.Monarch.GetName] sait qu'elle a vu quelque chose d'inhabituel, mais de bon, néanmoins. Avec piété dans le regard, elle murmure qu'elle a vu le plus grand saumon jamais aperçu, une véritable incarnation de l'esprit de la rivière que nous vénérons si profondément. [Root.Monarch.GetName] la suit jusqu'à l'endroit où elle l'a vu et après quelques souffles, [Root.Monarch.GetName] le voit enfin. Il est vraiment énorme. [Root.Monarch.GetName] prépare ses outils pour le capturer."
 native_americans.29.d3:2 "Alors que [Root.Monarch.GetName] rentrait chez lui avec son canoë après une bonne journée de chasse au phoque, [Root.Monarch.GetName] vit non loin de sa position un énorme phoque, une véritable bénédiction des dieux, émerger des profondeurs de la mer. Il prépare son harpon et s'approche silencieusement. Il pose la rame sur son canoë, se lève et tient le harpon prêt à être lancé. Le phoque émerge, leurs regards se croisent alors que [Root.Monarch.GetName] libère l'arme."
 native_americans.29.d4:2 "Le groupe de chasseurs rentre chez lui quand, parmi le groupe d'antilocapres qu'ils croisent, [Root.Monarch.GetName] aperçoit la plus grande antilope qu'il ait jamais vue. Presque comme si c'était une divinité, il peut sentir une aura brillante spéciale autour d'elle et sait immédiatement qu'il doit la chasser. Il laisse le groupe derrière lui et se déplace silencieusement pour approcher l'animal. Quand il est prêt, il prépare son arme, espérant ne pas manquer cette chance."
 native_americans.29.d5:1 "La terre tremble alors que [Root.Monarch.GetName] s'approche du troupeau de bisons. Ces animaux peuvent tuer n'importe qui avec leurs attaques de cornes avec facilité, mais ils sont aussi la vie pour notre peuple. Soudain, parmi eux, [Root.Monarch.GetName] aperçoit un mâle massif qu'il sait devoir être sa proie. Il se prépare pour ce combat inégal devant ses ancêtres avec une rapide prière. L'opportunité se présente juste devant lui, et il tente sa chance."
 native_americans.29.a:1 "Que les esprits décident si [Root.Monarch.GetName] mérite ce prix."
 unsuccessful_hunt:1 "[Root.Monarch.GetName] manquera le tir."
 successful_hunt:1 "[Root.Monarch.GetName] tuera l'animal."
 native_americans.30.t:0 "Le Mât de la Honte"
 native_americans.30.d:1 "Un messager s'approche de [Root.Monarch.GetName] et lui dit qu'un mât de la honte a été érigé pour faire connaître à tous sa dette. C'est une situation assez embarrassante qui affaiblira la position de [Root.Monarch.GetName]. Que devons-nous faire ?"
 native_americans.30.a:1 "D'accord, [Root.Monarch.GetName] paiera et laissera cette rumeur mourir."
 native_americans.30.b:1 "Nous ne paierons pas."
 pay_debt_shame_pole_title:0 "La Dette du Mât de la Honte"
 pay_debt_shame_pole_desc:0 "Un mât de la honte a été érigé pour nous embarrasser. Si nous payons notre dette, le mât sera enlevé, et nous cesserons de perdre la face."
 shame_pole:0 "Mât de la Honte"
 desc_shame_pole:0 "Un mât de la honte nous fait perdre la face."
 native_americans.31.t:1 "Un Mât d'Honneur pour un Allié"
 native_americans.31.d:1 "Nos alliés ont prouvé leur valeur envers nous et notre peuple a demandé d'ériger un mât d'honneur pour eux afin de montrer notre gratitude. Devrions-nous en ériger un ?"
 native_americans.31.a:0 "Ils le méritent."
 native_americans.31.b:0 "Pas cette fois."
 erect_honour_pole_ally_title:1 "Un Mât d'Honneur pour un Allié"
 erect_honour_pole_ally_desc:1 "Nous avons la possibilité d'ériger un mât d'honneur pour un allié. Cela améliorera encore nos relations."
 erect_honour_pole_title:1 "Un Mât d'Honneur pour notre Tribu"
 erect_honour_pole_desc:1 "Nous voulons rappeler aux gens un événement important ou honorer nos ancêtres ou quelqu'un de méritant en érigeant un mât d'honneur."
 native_americans.32.t:1 "Le Mât d'Honneur"
 native_americans.32.d:1 "Ces derniers jours, vous avez réfléchi à ériger un mât d'honneur dans le village. Cela fait longtemps que le dernier a été créé, et c'est une bonne occasion de faire bonne impression aux yeux de tous, y compris de votre peuple. Vous devez décider s'il sera en votre honneur, en l'honneur de quelqu'un d'autre ou pour plaire aux ancêtres."
 native_americans.32.a:0 "C'est une bonne idée."
 native_americans.32.b:0 "Pas cette fois."
 honour_pole:1 "Mât d'Honneur"
 desc_honour_pole:1 "Un mât d'honneur a été érigé sur nos terres pour honorer un ancêtre, un événement ou l'amitié éternelle entre tribus."
 native_americans.33.t:0 "Animaux Perdus"
 native_americans.33.d1:1 "Quelqu'un n'a pas été prudent et nos chiens ont disparu de notre camp. Sans eux, nous ne pouvons pas déplacer nos tipis et nos affaires, nous sommes donc coincés sur cette terre jusqu'à ce que nous les retrouvions."
 native_americans.33.d2:1 "Quelqu'un n'a pas été prudent et certains de nos chevaux ont disparu de notre camp. Sans eux, nous ne pouvons pas déplacer nos tipis et nos affaires, nous sommes donc coincés sur cette terre jusqu'à ce que nous les retrouvions."
 native_americans.33.a:0 "Envoyez tous ceux qui sont disponibles pour les chercher."
 native_americans.33.b:0 "Cela coûtera trop cher, ils finiront par revenir."
 travois_no_dogs:1 "Pas de Chiens pour nos Travois"
 desc_travois_no_dogs:0 "Jusqu'à ce que nos chiens soient de retour, nos travois sont inutiles."
 travois_no_horses:1 "Pas de Chevaux pour nos Travois"
 desc_travois_no_horses:0 "Jusqu'à ce que nos chevaux soient de retour, nos travois sont inutiles."
 native_americans.34.t:0 "Le Vol de l'Aigle"
 native_americans.34.d:1 "Un aigle survole le camp. Personne n'y prête vraiment attention jusqu'à ce que notre prêtre commence à s'agiter. Les gens l'entourent. Même vous êtes attiré près de lui. Ses paroles sont mauvaises. Le vol de l'aigle est trop irrégulier, et notre prêtre pense que c'est un mauvais présage."
 native_americans.34.a:0 "Nous devrions faire quelques sacrifices pour apaiser les esprits."
 native_americans.34.b:0 "Ce n'est qu'un aigle."
 native_americans.35.t:1 "Les Bisons se Reproduisent"
 native_americans.35.d:1 "Les derniers mois ont été pluvieux avec le meilleur résultat possible. L'herbe a poussé plus verte et plus forte que jamais, la nourriture est si abondante que les bisons se sont reproduits en nombres incroyables. Les esprits nous ont vraiment bénis."
 native_americans.35.a:0 "Ce sera une bonne année de chasse."
 native_americans.36.t:0 "Peinture sur Peau"
 native_americans.36.d:1 "La dernière chasse a été très bonne, et nous avons réussi à rassembler beaucoup de peaux de bison. Bien que les peaux peintes soient courantes dans d'autres tribus, elles n'ont généralement pas accès au bison, ce qui fait de ces grandes peaux quelque chose qui peut se négocier à bon prix. Nos marchands viennent de revenir. Ils apportent des richesses avec eux."
 native_americans.36.a:0 "Cette richesse sera bonne pour la tribu."
 native_americans.37.t:0 "Paix dans les Plaines"
 native_americans.37.d:0 "Quelques chefs de tribus ont accepté notre invitation à se rassembler et à ramener la paix dans les Plaines. Bien que beaucoup pensent que cela ne fonctionnera pas, d'autres pensent que l'effort en vaut la peine."
 native_americans.37.a:0 "Quelques cadeaux faciliteront les choses."
 native_americans.37.b:1 "Nous ne pouvons tout simplement pas oublier les agressions passées."
 native_americans.38.t:1 "Les Glands sont Rares"
 native_americans.38.d:0 "Les glands sont la base de notre alimentation. Nous les utilisons pour plusieurs de nos plats et cette année, pour une raison quelconque, les glands sont rares."
 native_americans.38.a:0 "Nous devrons compter sur d'autres choses."
 native_americans.39.t:1 "La Vie Doit Renaître"
 native_americans.39.d:1 "Après les derniers incendies qui ont dévasté notre terre, les gens ont commencé à se demander comment nous pouvons effacer cette vilaine cicatrice de la terre qui nous nourrit si généreusement. Avec une grande ingéniosité, notre chef [Root.Monarch.GetName] s'est souvenu d'une vieille tradition où notre peuple, le plus souvent des femmes, utilisait des paniers de forme spéciale contenant des graines. En marchant, les graines déposées tombaient au sol et finissaient par coloniser la terre jadis dévastée, qui redevenait verte."
 native_americans.39.a:1 "Nous consacrerons nos ressources à créer beaucoup de ces paniers pour cette noble entreprise."
 native_americans.39.b:0 "Ce n'est pas le moment."
 native_americans.40.t:1 "Une Hutte de Sudation pour la Communauté"
 native_americans.40.d:1 "Notre communauté n'a pas eu de hutte de sudation depuis longtemps, car la précédente a brûlé. Comme nous avions beaucoup d'autres problèmes plus urgents à affronter, la communauté a vécu sans elle sans souci. Maintenant, cependant, la tribu vit une période plutôt calme et les gens commencent à regretter une vraie hutte de sudation, pour que nos hommes et nos enfants puissent y aller purifier leurs corps et leurs âmes. Ce serait une bonne idée de mettre quelques hommes au travail sur la construction de ce bâtiment pour que la communauté puisse en bénéficier."
 native_americans.40.a:1 "Nous en érigerons une."
 native_americans.40.b:1 "Nous utiliserons les ressources pour d'autres choses."
 native_americans.41.t:0 "Des Paniers sont Vendus"
 native_americans.41.d:1 "Un marchand d'une autre tribu s'est intéressé aux paniers que nos femmes tissaient et a demandé à en acheter. Cela pourrait ouvrir de nouvelles opportunités commerciales."
 native_americans.41.a:0 "Je vois une nouvelle façon de bénéficier à notre peuple."
 be_the_leader_title:0 "Être le Meneur"
 be_the_leader_desc:0 "Nous devons montrer à tous que nous sommes là pour diriger."
 honour_the_ancestors_title:1 "Honorer les Ancêtres"
 honour_the_ancestors_desc:0 "En érigeant un mât totémique pour honorer nos ancêtres et leurs exploits, nous montrons du respect."
 smells_like_teen_spirit_title:0 "L'Esprit de la Jeunesse"
 smells_like_teen_spirit_desc:0 "Montrer notre force aux autres nations est important, mais nous ne pouvons y parvenir sans que notre peuple fasse partie de ce projet. Nous avons besoin qu'il pense comme lorsqu'il était plus jeune, plein d'énergie pour dévorer le monde."
 celebrate_a_potlatch_title:0 "Célébrer un Potlatch"
 celebrate_a_potlatch_desc:0 "Que nos alliés viennent nous rendre visite et donnons-leur des cadeaux précieux, ils connaîtront notre richesse."
 show_military_strength_title:0 "Montrer sa Force Militaire"
 show_military_strength_desc:0 "Les autres tribus peuvent être nos alliées, mais nous montrerons notre puissance et leur ferons savoir qui fixe les règles."
 bond_to_the_land_title:0 "Lien avec la Terre"
 bond_to_the_land_desc:0 "Les terrains de chasse sont abondants, mais nous avons besoin d'un endroit pour entreposer nos biens."
 why_cant_we_be_friends_title:0 "Pourquoi ne Pas Être Amis ?"
 why_cant_we_be_friends_desc:0 "Les autochtones des Plaines ont toujours été assez pacifiques, montrons à tous que nous voulons que cela continue ainsi."
 teach_plains_sign_language_title:0 "Enseigner le Langage des Signes des Plaines"
 teach_plains_sign_language_desc:1 "Nos ancêtres ont créé un langage des signes qui sert maintenant de lingua franca pour le commerce, nous devons continuer à l'enseigner à nos enfants."
 plains_power_title:0 "Puissance des Plaines"
 plains_power_desc:0 "En nous vantant de notre développement, tous nous admireront."
 horse_culture_title:0 "Culture Équestre"
 horse_culture_desc:0 "Les chevaux ont révolutionné notre mode de vie. Nous devons nous adapter et embrasser notre nouvelle identité."
 such_a_lovely_place_title:0 "Un Si Bel Endroit"
 such_a_lovely_place_desc:0 "Notre terre est une terre riche, avec plein de ressources pour notre peuple, nous n'avons qu'à les collecter et voir notre peuple croître en nombre."
 lovely_place:0 "Un Si Bel Endroit"
 desc_lovely_place:0 "Bienvenue en Californie\nUn si bel endroit\nUn si beau visage\nPlein de place en Californie\nÀ tout moment de l'année\nVous pouvez le trouver ici."
 in_harmony_with_nature_title:0 "En Harmonie avec la Nature"
 in_harmony_with_nature_desc:1 "Notre peuple peut obtenir tout ce dont il a besoin simplement en cueillant la nourriture de la nature ; tout au plus, un peu de jardinage forestier est nécessaire pour aider la Nature à produire davantage."
 basketweaving_trade_title:1 "Commerce de Vannerie"
 basketweaving_trade_desc:1 "Il est traditionnel pour notre peuple, surtout nos femmes, de tisser des paniers qui sont très utilisés par nos communautés. Nous devrions en faire une partie centrale de notre économie et envisager de les échanger avec d'autres tribus contre des biens auxquels nous n'avons pas accès."
 commission_some_rock_art:0 "Commander de l'Art Rupestre"
 commission_some_rock_art_desc:0 "Pour honorer nos ancêtres, nous commanderons des peintures sur les rochers."
 rock_art_dec:0 "Art Rupestre"
 desc_rock_art_dec:1 "Nous avons commandé la création d'une nouvelle peinture rupestre sur nos terres pour honorer nos ancêtres."
 paint_the_land_title:0 "Peindre la Terre"
 paint_the_land_desc:0 "Peindre les rochers est un art cher à notre peuple. Notre connexion à la terre y est liée, donc pour renforcer ce lien, nous devrions peindre la terre une fois de plus."
 settle_our_tribe_title:0 "Sédentariser notre Tribu"
 settle_our_tribe_desc:0 "Pendant de nombreux hivers, notre peuple s'est déplacé, mais c'est terminé. Nous devons coloniser la terre pour la gloire de notre peuple."
 colonize_the_continent:0 "Coloniser le Continent"
 desc_colonize_the_continent:1 "Il y a plein de terres libres autour de nous qui doivent être revendiquées par notre peuple si nous voulons résister aux nouvelles vagues d'étrangers arrivant sur nos côtes."
 ne_native_ideas:0 "Idées des Bois du Nord-Est"
 ne_native_ideas_start:0 "Traditions du Nord-Est"
 ne_native_ideas_bonus:0 "Ambition du Nord-Est"
 ne_turtle_clan:0 "Clan de la Tortue"
 ne_turtle_clan_desc:0 "Une carapace aussi solide que la roche. Les tortues sont parmi les animaux les plus endurants et les plus longévifs, nous pouvons certainement apprendre d'elles comment nous protéger."
 ne_deer_clan:0 "Clan du Cerf"
 ne_deer_clan_desc:0 "Les poètes et les conteurs doivent être loués et respectés. Les cerfs sont parmi les animaux les plus importants jamais chassés, leur grande dignité et leur port ont fait d'eux une source d'inspiration pour nos artistes."
 ne_bear_clan:0 "Clan de l'Ours"
 ne_bear_clan_desc:1 "Les ours sont des gardiens. Ils savent comment protéger et guérir. Beaucoup de nos gens du cérémoniel ont adopté « ours » comme partie de leurs noms à cause de cela, et son esprit augmentera leurs capacités."
 ne_wolf_clan:0 "Clan du Loup"
 ne_wolf_clan_desc:1 "Les loups sont des sages, des meneurs intelligents et persévérants. Leur loyauté, cependant, est leur qualité la plus admirée, car, comme des chiens fidèles et féroces, ils n'abandonneraient jamais leurs familles."
 ne_marten_clan:0 "Clan de la Martre"
 ne_marten_clan_desc:0 "Les martres sont des chasseurs, des guerriers ; elles ont toujours le contrôle du combat, ce qui en fait des ennemis redoutables. Leur esprit belliqueux a inspiré notre peuple en temps de guerre."
 ne_eagle_clan:0 "Clan de l'Aigle"
 ne_eagle_clan_desc:0 "Les aigles sont des animaux nobles et respectés. Ils sont devenus un symbole de l'unité familiale et représentent un bon équilibre entre bonté et danger. Les membres d'autres tribus seront influencés par leur allure majestueuse."
 ne_crane_clan:0 "Clan de la Grue"
 ne_crane_clan_desc:0 "Les grues sont des meneuses naturelles. Quand une grue donne un enseignement, sa voix forte peut être entendue de loin, ce qui la rend impossible à ignorer."
 se_native_ideas:0 "Idées des Bois du Sud-Est"
 se_native_ideas_start:0 "Traditions du Sud-Est"
 se_native_ideas_bonus:0 "Ambitions du Sud-Est"
 se_mississippian_legacy:0 "Héritage Mississippien"
 se_mississippian_legacy_desc:0 "Un héritage se crée par les histoires. Les histoires des lieux que nous avons habités, des objets que nous avons utilisés, des vies que nous avons vécues. L'ancienne culture mississippienne s'étendait le long du fleuve comme un réseau religieux et commercial qui unissait différentes tribus."
 se_matrilineal_lineage:0 "Lignée Matrilinéaire"
 se_matrilineal_lineage_desc:0 "Les enfants naissent dans les clans de leurs parents, ils apprendront et grandiront avec eux. La plupart des tribus de notre région suivent une organisation matrilinéaire, la Mère du Clan étant une figure importante dans nos gouvernements."
 se_refined_ceramics:0 "Céramique Raffinée"
 se_refined_ceramics_desc:1 "Dans toutes les vies que nous vivons, la boue et la pierre nous accompagnent toujours. C'est de nos mains nues que nous les façonnons en quelque chose qui n'est plus simplement de la boue, ou de la pierre. Au fil des siècles, nous avons affiné nos techniques de céramique et leur avons insufflé la vie."
 se_cultivation_of_the_earth:0 "Culture de la Terre"
 se_cultivation_of_the_earth_desc:0 "La terre est à la fois le début et la fin de toute vie. Elle nous nourrit, elle nous affame, elle transforme nos corps en cadavres pourris et elle nous dévore. Nous nous nourrissons d'elle, elle se nourrit de nous. Nous avons maintenant optimisé notre agriculture pour nous assurer d'en tirer le meilleur parti pendant que nous le pouvons."
 se_mound_builders:0 "Bâtisseurs de Tumulus"
 se_mound_builders_desc:0 "Honorer les morts est quelque chose qui doit être fait non seulement en paroles, mais aussi en actes. Nos ancêtres étaient bien connus pour construire des tumulus comme sites funéraires en signe de respect pour les défunts."
 se_exogamous_marriages:0 "Mariages Exogames"
 se_exogamous_marriages_desc:0 "Se marier en dehors de nos clans nous assurera certaines alliances, et préviendra certaines maladies propres à nos familles."
 se_stomp_dancers:0 "Danseurs du Piétinement"
 se_stomp_dancers_desc:0 "Pour exécuter une Danse du Piétinement exceptionnelle, les participants doivent suivre certaines règles strictes pour que la cérémonie soit correctement tenue. Ces règles incluent le contrôle du corps et de l'esprit, donc le jeûne, rester éveillé et prendre certains remèdes qui les aideront dans cette tâche essentielle."
 sw_native_ideas:1 "Idées du Sud-Ouest Américain"
 sw_native_ideas_start:0 "Traditions du Sud-Ouest"
 sw_native_ideas_bonus:0 "Ambitions du Sud-Ouest"
 sw_the_old_tales:0 "Les Vieux Récits"
 sw_the_old_tales_desc:0 "En écoutant les récits et les histoires de notre passé, nous pouvons apprendre sur notre avenir. Il est nécessaire que nous ne négligions pas leurs enseignements."
 sw_four_clans:0 "Quatre Clans"
 sw_four_clans_desc:1 "Pour certaines tribus de notre région, chaque enfant naît avec quatre clans : celui de la mère, celui du père, celui de la grand-mère et celui du grand-père. Chacun d'eux remplira l'enfant de force et de sagesse, rendant nos guerriers particulièrement résilients."
 sw_raiding_nomads:0 "Nomades Pillards"
 sw_raiding_nomads_desc:0 "Certaines des tribus qui habitent le désert sont féroces et redoutables ; la simple mention de leur arrivée suffit à faire fuir les ennemis de peur."
 sw_prosperous_sedentarism:0 "Sédentarisme Prospère"
 sw_prosperous_sedentarism_desc:0 "Certaines tribus choisissent plutôt de s'installer dans des villages agricoles, investissant dans leur propre développement."
 sw_the_grand_canyon:0 "Le Grand Canyon"
 sw_the_grand_canyon_desc:0 "Une entaille profonde dans la chair de la Terre. Voilà ce qu'est le Grand Canyon. Une fissure dans sa peau de pierre. C'est un endroit dangereux, mais le connaître nous donnera toujours un avantage sur nos ennemis."
 sw_into_the_desert:0 "Dans le Désert"
 sw_into_the_desert_desc:0 "Le désert ne peut pas être arrêté. Il ne peut pas être surmonté, il ne peut pas être combattu. Le désert ne peut qu'être accepté, compris. Nous avons appris à y vivre, mais nos ennemis ne partagent pas ce savoir, heureusement."
 sw_far_west:0 "Far West"
 sw_far_west_desc:0 "Il y a un moment de pause quand on comprend qu'on ne peut pas aller plus loin. Il n'y a rien au-delà de la dernière frontière : l'eau, le calme, le néant. Cependant, un élan irrationnel nous pousse à avancer jusque-là."
