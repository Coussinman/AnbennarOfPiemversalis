 polynesian_tribe:0 "Tribu Polynésienne"
 polynesian_tribe_desc:1 "Une Tribu Polynésienne est la forme de gouvernement où un chef parvient à détenir l'autorité sur une tribu ou un groupe de tribus, mais la nation n'agit pas comme un ensemble unifié."
 polynesian_kingdom:0 "Royaume Polynésien"
 polynesian_kingdom_desc:1 "Un Royaume Polynésien est la forme de gouvernement où un monarque polynésien parvient à unir les tribus habituellement en compétition sous son règne et à agir comme une nation unie."
 polynesian_tech:0 "Polynésien"
 polynesian_tech_desc:1 "Avec le groupe technologique polynésien, les niveaux technologiques coûtent 100 % de plus (200 %)."
