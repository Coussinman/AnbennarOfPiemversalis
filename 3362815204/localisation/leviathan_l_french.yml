 kulin:0 "Kulin"
 aboriginal_tech:0 "Aborigène"
 aboriginal_tech_desc:0 "Avec le groupe technologique aborigène, les niveaux technologiques coûtent 250 % de plus (350 %)."
 aboriginal_boomerang:0 "Chasseur au Boomerang"
 aboriginal_boomerangDESCR:0 "Le boomerang est une arme traditionnelle utilisée par les chasseurs et les guerriers en Australie. Bien qu'il ne soit pas aussi mortel qu'une lance ou une flèche, le boomerang est un outil de chasse fiable et réutilisable, et une arme mortelle entre les mains d'un guerrier habile. Le taux de mortalité réduit du boomerang en fait l'outil idéal pour les batailles où le but est de faire des prisonniers, pas d'infliger des pertes."
 aboriginal_warrior:0 "Lancier Aborigène"
 aboriginal_warriorDESCR:0 "La lance est une arme mortelle et polyvalente utilisée dans toute l'Australie. Dès leur plus jeune âge, les garçons apprennent à manier la lance et quand ils deviennent des hommes, leur lance devient leur plus grand allié ; aussi mortelle à distance qu'au corps à corps."
 aboriginal_ambusher:0 "Embusqué Aborigène"
 aboriginal_ambusherDESCR:0 "Les tactiques d'embuscade sont vitales face à un ennemi supérieur, et les guerriers qui maîtrisent l'art de l'embuscade n'ont pas à craindre le simple nombre. Frappant souvent la nuit, les tactiques d'embuscade aborigènes se sont révélées mortelles pour disperser et semer la confusion chez leurs ennemis alors que leurs lances atteignaient leur cible."
 aboriginal_infantry:0 "Guerrier Rituel"
 aboriginal_infantryDESCR:0 "La guerre en Australie est rarement autre chose que formelle. Les bandes de guerriers partaient souvent pour des pratiques rituelles, et ces hardis guerriers religieux choquent et terrifient leurs adversaires avec la puissance mortelle des dieux et des ancêtres derrière leurs armes."
 aboriginal_reformed_boomerang:0 "Guerrier au Boomerang Réformé"
 aboriginal_reformed_boomerangDESCR:0 "L'évolution de nouvelles tactiques militaires a donné au boomerang un nouveau rôle sur le champ de bataille. En utilisant le boomerang depuis l'arrière avec des lanciers à l'avant, nous pourrions abattre nos ennemis avant même qu'ils ne nous voient arriver."
 aboriginal_outback_warriors:0 "Guerriers de l'Outback"
 aboriginal_outback_warriorsDESCR:0 "L'outback n'abrite guère que du sable et une faune mortelle, mais la pratique aborigène du walkabout nécessitait l'entraînement à la chasse et à la guerre dans les conditions les plus rudes."
 aboriginal_arquebusier:0 "Arquebusier d'Embuscade"
 aboriginal_arquebusierDESCR:0 "Les guerres entre colons et Aborigènes se sont déroulées sur un terrain inégal ; les colons possédant des armes à feu avancées et des effectifs supérieurs aux Aborigènes. Les rares victoires remportées par les guerriers aborigènes étaient souvent défensives et utilisaient des tactiques défensives avancées."
 aboriginal_tasmanian_arquebusier:0 "Arquebusier Offensif"
 aboriginal_tasmanian_arquebusierDESCR:0 "Les guerriers au boomerang et à la lance utilisaient souvent des tactiques offensives lourdes, et les compétences de chasse aborigènes permettaient aux guerriers de rivaliser avec les guerriers à poudre de l'Occident. En adoptant l'arrivée de la poudre, cependant, les guerriers aborigènes pourraient trouver un pied d'égalité avec les armées étrangères."
 aboriginal_riflemen:0 "Fusiliers de la Frontière"
 aboriginal_riflemenDESCR:0 "Les Guerres de la Frontière furent une série de conflits rudes et meurtriers entre les Aborigènes et les colons arrivants. Même si les Aborigènes faisaient face à un ennemi avec un avantage logistique et tactique, les techniques de chasse et de combat du guerrier aborigène en faisaient une force mortelle sur le champ de bataille, même dans un combat inégal."
 aboriginal_guerrillas:0 "Infanterie de la Guerre Noire"
 aboriginal_guerrillasDESCR:0 "Les Guerres Noires furent une série de conflits meurtriers sur l'île de Tasmanie entre les colons anglais et les Palawa natifs. Ce que nous avons appris de nos affrontements mortels avec l'Occident remodèlera sans doute la guerre aborigène pour toujours."
 aboriginal_horseman:0 "Cavalier Aborigène"
 aboriginal_horsemanDESCR:0 "Avec l'arrivée des cavaliers en Australie, la guerre aborigène sera changée pour toujours."
 aboriginal_cavalry:0 "Cavalerie Aborigène"
 aboriginal_cavalryDESCR:0 "En adoptant des tactiques de guerre montée plus avancées venues de l'étranger, la cavalerie aborigène est capable de soutenir l'infanterie plus efficacement sur le champ de bataille."
 aboriginal_hussar:0 "Hussard Aborigène"
 aboriginal_hussarDESCR:0 "Cavalerie légère spécialisée dans les raids et les tactiques de harcèlement."
 aboriginal_swarm_cav:0 "Cavalerie d'Essaim Aborigène"
 aboriginal_swarm_cavDESCR:0 "La cavalerie d'essaim était une cavalerie en ordre dispersé armée d'arcs ou de carabines qui utilisait des tactiques de tir de harcèlement pour désorganiser l'ennemi avant de charger. L'ordre dispersé de la cavalerie la rendait moins vulnérable au feu ennemi, mais si l'opposition pouvait résister à leurs attaques de harcèlement, elle tombait rapidement sous une charge."
 aboriginal_dragoon:0 "Dragon Aborigène"
 aboriginal_dragoonDESCR:0 "Cavaliers armés de mousquets qui mettaient pied à terre au combat pour se battre comme de l'infanterie."
 TIW_ideas:0 "Idées Tiwi"
 TIW_ideas_start:0 "Traditions Tiwi"
 TIW_ideas_bonus:0 "Ambition Tiwi"
 TIW_yiminga:0 "Yiminga"
 TIW_yiminga_desc:0 "Notre peau, ou « Yiminga », est matrilinéaire et se transmet de la mère à ses enfants. Ce sont les dynasties féminines qui déterminent le destin de nos enfants : leur groupe, leur vie, leur esprit, leur souffle et leur pouls. La femme donne vie et forme à l'enfant, et l'homme localise un esprit à amener pour l'enfant à naître. Alors que d'autres tribus mépriseraient les efforts des femmes, nous savons que c'est d'elles que notre classe sociale et notre famille sont déterminées, et il est juste qu'elles partagent une place au pouvoir avec leurs homologues masculins."
 TIW_dreaming_totem:0 "Le Totem du Rêve"
 TIW_dreaming_totem_desc:0 "Le totem du rêve d'un Tiwi est un animal sacré assigné à un Tiwi par son père. Un Tiwi avec un totem ne peut pas tuer ou consommer la chair de son animal spirituel ; le faire serait du cannibalisme spirituel. C'est une partie intégrante de l'identité individuelle d'un Tiwi et sert de marque d'identité lors des danses et des cérémonies."
 TIW_kulama:0 "Kulama"
 TIW_kulama_desc:0 "Durant le temps du rêve, un homme hibou boobook et sa femme Pintoma décidèrent d'exécuter la première cérémonie Kulama. La cérémonie impliquait la préparation de l'igname Kulama vénéneuse pour la nourriture, et une série complexe de danses et de performances. Tout le monde, depuis nous ici sur terre, jusqu'aux dieux et aux esprits tout autour de nous, exécute la cérémonie Kulama pour célébrer la vie qui nous a été donnée."
 TIW_purrukapali:0 "Purrukapali"
 TIW_purrukapali_desc:0 "La Légende de Purrukapali raconte la mort tragique du fils de Purrukapali qui se dessécha jusqu'à la mort sous les soins de sa mère négligente. Purrukapali, bouleversé par ce qui s'était passé, prit le cadavre desséché de son garçon et le porta au sage Japara qui promit de redonner vie au garçon avec le temps, mais Purrukapali, dans un accès de détresse et d'impatience, engagea Japara dans une grande bataille. Purrukapali prit le corps mort de son fils et le porta dans la mer, proclamant que la mort devrait venir à toute la création pour que tous éprouvent le chagrin qu'il ressent. L'endroit où il porta son fils devint un puissant tourbillon qui noierait quiconque s'en approcherait. Japara, qui mit fin à la folie de Purrukapali, fut réincarné en lune et devint prisonnier d'un cycle de mort et de réincarnation tous les trois jours."
 TIW_marriage:0 "Traditions Matrimoniales Tiwi"
 TIW_marriage_desc:0 "Le mariage est essentiel pour l'avantage économique, social et politique. Le mariage est aussi important pour notre subsistance que la pêche, l'agriculture et la cueillette, et une femme Tiwi non mariée est simplement oisive et belliqueuse. Le remariage est courant chez notre peuple, et souvent les membres inférieurs de la société comme les chasseurs de bas rang épousaient souvent les veuves d'hommes plus accomplis. Le remariage doit se faire rapidement, car chaque jour qu'une femme reste non mariée est un jour de grande honte."
 TIW_isolationism:0 "Isolationnisme Tiwi"
 TIW_isolationism_desc:0 "Notre société a une longue histoire d'isolationnisme rigoureux. Les étrangers n'ont cherché qu'à piller et exploiter nos terres abondantes et détruire notre culture, et cela ne doit pas être permis. Notre langue, nos terres et notre culture doivent être préservées et si cela signifie sacrifier nos liens avec les étrangers, alors c'est ainsi que cela doit être."
 TIW_one_people:0 "Un Seul Peuple"
 TIW_one_people_desc:0 "« Tiwi » dans notre langue signifie « Un Seul Peuple ». Nous avons une langue, une religion et un peuple. Il n'y a que les Tiwi, et quiconque fait partie de notre grande nation adoptera le mode de vie Tiwi, et l'identité Tiwi et tout ce que cela implique."
 generic_aboriginal_ideas:0 "Idées Aborigènes"
 generic_aboriginal_ideas_start:0 "Traditions Aborigènes"
 generic_aboriginal_ideas_bonus:0 "Ambition Aborigène"
 aborig_art:0 "Art Aborigène"
 aborig_art_desc:0 "Alors que d'autres s'expriment par la parole, nous préservons notre héritage et notre culture à travers nos arts visuels époustouflants. La préservation de notre culture dépend de notre capacité à continuer à maîtriser le langage de la couleur, de la forme et d'une interprétation artistique du monde spirituel."
 aborig_walkabout:0 "Walkabout"
 aborig_walkabout_desc:0 "Le Walkabout aborigène traditionnel est une cérémonie au cours de laquelle un garçon aborigène doit traverser les étendues sauvages australiennes jusqu'à un site sacré comme Uluru, et c'est au cours de ce voyage qu'il passe de garçon à homme. Le voyage peut durer jusqu'à six mois, et pendant ce temps, l'homme doit survivre dans la nature sauvage sans aucune aide extérieure. C'est un passage difficile, mais il garantit que seuls les plus forts d'entre nous survivent."
 aborig_outback:0 "Peuple de l'Outback"
 aborig_outback_desc:0 "L'Outback est un endroit rude et impitoyable. Encore aujourd'hui, de nombreuses zones de l'outback sont presque complètement inhabitées et s'y aventurer est considéré comme une condamnation à mort. Mais, néanmoins, les Aborigènes ont su survivre dans des conditions aussi rudes et même y faire leur vie."
 aborig_sacred:0 "Les Terres Sacrées"
 aborig_sacred_desc:0 "Les croyances religieuses aborigènes attribuent souvent une signification divine à tous les lieux d'Australie. Les points de repère et caractéristiques notables à travers le continent sont souvent décrits comme les lieux de repos des dieux, ou les reliques d'anciens conflits qui ont eu lieu durant le Temps du Rêve. Le Serpent Arc-en-ciel, souvent considéré comme un dieu créateur, est réputé apporter la pluie, et quand un arc-en-ciel apparaît dans le ciel, c'est le serpent arc-en-ciel qui se déplace d'un point d'eau à un autre."
 aborig_dreamtime:0 "Le Temps du Rêve"
 aborig_dreamtime_desc:0 "Le Temps du Rêve fait référence à l'époque précédant la création de l'univers ; quand tout ce qui existait était les esprits et les dieux. Différentes tribus ont des explications différentes pour ce qui a amené le monde à l'existence depuis le Temps du Rêve, mais presque toutes les tribus d'Australie croyaient en cette époque avant l'existence matérielle. Pratiquer la méditation ou le culte des dieux et des ancêtres est souvent décrit comme « Rêver », et puiser dans la connaissance du paysage du Temps du Rêve. C'est parce que dans le Temps du Rêve, toute sa lignée existe comme un, et la connaissance de vos ancêtres est facilement accessible dans le Temps du Rêve si l'on est capable d'y accéder."
 aborig_music:0 "Tradition Musicale"
 aborig_music_desc:0 "La musique aborigène est distinctement unique dans sa composition. Le didgeridoo est un instrument traditionnel utilisé dans la musique aborigène, et avant l'arrivée des colons, l'Australie était le seul endroit où l'on pouvait entendre les sons de cet instrument unique. Il existe des chansons et des compositions créées par les aborigènes qui ont jusqu'à 1 500 ans et sont encore jouées aujourd'hui."
 aborig_fire_stick_farming:0 "Agriculture au Bâton de Feu"
 aborig_fire_stick_farming_desc:0 "L'Australie est une terre rude et impitoyable, mais nous avons appris à exploiter le bush à son potentiel maximum. L'agriculture au bâton de feu est une technique maîtrisée par les Aborigènes australiens où nous brûlons les broussailles pour faire place aux cultures comestibles comme les pommes de terre de brousse et pour transformer les forêts mortes en terrains de chasse idéaux pour les kangourous."
 EOR_ideas:0 "Idées Eora"
 EOR_ideas_start:0 "Traditions Eora"
 EOR_ideas_bonus:0 "Ambition Eora"
 EOR_lifestyle:0 "Mode de Vie Eora"
 EOR_lifestyle_desc:0 "Nous sommes un peuple côtier, vivant principalement dans des villages au bord de la mer et survivant de la grande abondance de la mer. Nous n'avons pas besoin de faire pousser des cultures ou d'entretenir des plantations quand la mer nous accorde toute l'abondance dont nous avons besoin. Nous sommes experts dans la navigation des petites côtes et des ports naturels de notre patrie et continuerons à survivre avec ce mode de vie côtier."
 EOR_bands:0 "Vingt-Neuf Bandes"
 EOR_bands_desc:0 "Les Eora sont un ensemble de 29 bandes différentes de personnes. Les bandes sont unies par des ancêtres et des familles communs, et les mariages entre bandes sont courants et maintiennent notre peuple disparate fort et uni. Administrer ces bandes majeures et unir notre nation dans ce style de gouvernement lâche s'avérera utile à mesure que notre tribu continue de s'étendre et que plus de gens se réclament Eora."
 EOR_enduring:0 "Culture Perdurable"
 EOR_enduring_desc:0 "La culture Eora est ancienne au-delà de toute connaissance, et a perduré à travers la guerre, la conquête et les temps changeants. L'art et la culture Eora peuvent exister et prospérer dans les plus petits de nos villages comme dans les vastes cités expansives du futur. À mesure que les temps changent et que des personnes de plus en plus nombreuses viennent rejoindre notre nation, une chose perdurera toujours : l'esprit Eora."
 EOR_protect:0 "Protéger la Terre Ancestrale"
 EOR_protect_desc:0 "Les peuples aborigènes de Sydney étaient des défenseurs stoïques de leur patrie et résistaient aux offenses des envahisseurs étrangers contre leur terre, même contre leur propre intérêt. Dans de nombreuses guerres et conflits qui sont venus sur les côtes d'Australie, les hommes et femmes Eora se portaient volontaires avec empressement pour combattre et défendre leur terre ; même en des temps où ils étaient considérés comme des citoyens de seconde classe. C'est notre volonté de combattre et de défendre la terre sacrée qui rallie constamment de nouvelles générations à notre cause."
 EOR_sacred:0 "La Côte Sacrée"
 EOR_sacred_desc:0 "Nous sommes les gardiens traditionnels de cette terre sacrée. Alors que d'autres tribus abandonneraient leur foyer en un clin d'œil pour des terres plus fertiles, nous les Eora avons toujours été ici et serons toujours ici. Nos 29 nations vivent ensemble en harmonie autour du port de Sydney, et la coopération de notre peuple est ce qui fera des terres Eora l'envie du monde."
 EOR_pemulwuy:0 "Pemulwuy"
 EOR_pemulwuy_desc:0 "Quand les colons sont venus rendre visite aux Eora, ils ont rapidement commencé à piller nos côtes de poissons, à vider notre terre de sa faune et à polluer nos eaux avec des immondices. Le mode de vie Eora touchait à sa fin. Cependant, de braves guerriers comme Pemulwuy se sont dressés contre ces envahisseurs étrangers et ont mis fin à leur comportement perturbateur. La férocité et la bravoure déployées par Pemulwuy serviront d'exemple à tous, et le peuple Eora combattra même contre des chances impossibles."
 EOR_berewaldal:0 "Berewaldal"
 EOR_berewaldal_desc:0 "Il y a des gens venant d'au-delà de nos terres ; au-delà même de l'Australie elle-même. Nous savons qu'ils envient les produits lucratifs que les Eora ont à offrir, et nous savons que d'une manière ou d'une autre ils trouveront un moyen de nous les prendre. Peut-être que ce n'est pas avec la violence, mais avec des paroles habiles que nous pouvons négocier avec ces étrangers et trouver une solution qui sera bonne pour nos deux peuples."
 KAU_ideas:0 "Idées Kaurna"
 KAU_ideas_start:0 "Traditions Kaurna"
 KAU_ideas_bonus:0 "Ambition Kaurna"
 KAU_totemic_matriarchy:0 "Matriarcat Totémique"
 KAU_totemic_matriarchy_desc:0 "Le peuple Kaurna trace notre ascendance à travers nos mères, et toutes les lignes ancestrales peuvent être retracées jusqu'au Temps du Rêve. Chaque homme et chaque femme a une touche de divin dans son sang, et à travers nos mères nous nous rapprochons du Rêve."
 KAU_pangkarra:0 "Le Système Pangkarra"
 KAU_pangkarra_desc:0 "Notre société est divisée entre plusieurs bandes distinctes, chacune fonctionnant indépendamment mais unie par l'identité Kaurna. Administrer notre peuple est une tâche facile quand nous leur permettons de s'organiser librement."
 KAU_coastal_pangkarra:0 "Pangkarra Côtier"
 KAU_coastal_pangkarra_desc:0 "En plus d'être autonomes et peu gouvernés, tous les Pangkarra doivent avoir accès à la mer par droit de naissance. La pêche et le commerce maritime sont une partie vitale du mode de vie Kaurna et tout Pangkarra sans accès côtier n'est pas du tout un Pangkarra."
 KAU_redgum_shelters:0 "Abris de Gommier Rouge"
 KAU_redgum_shelters_desc:0 "Alors que d'autres sociétés sont sédentaires et molles, le peuple Kaurna se déplace avec le passage des saisons. En été, l'océan déborde de poissons, mais en hiver les pluies arrivent et l'entretien des feux dans nos Abris de Gommier Rouge devient vital pour notre survie."
 KAU_communal_ownership:0 "Propriété Communale"
 KAU_communal_ownership_desc:0 "Aucun individu n'a le droit de revendiquer la propriété de ce qui appartient au peuple Kaurna. La propriété n'appartient pas aux propriétaires terriens ou à la noblesse, mais à la tribu et aux gens qui l'habitent. Cette propriété communale garantit qu'aucun homme ou femme n'est laissé pour compte, et la tribu prospère ou souffre comme un seul."
 KAU_old_tjilbruke:0 "Le Vieux Tjilbruke"
 KAU_old_tjilbruke_desc:0 "Notre peuple partage l'histoire de Tjilbruke ; un grand héros de la tribu Kaurna du temps du Rêve. Tjilbruke apporta la paix au peuple Kaurna avec ses lois et ses proclamations qui gardaient notre peuple en sécurité. Si dévoué à la justice était Tjilbruke qu'il condamna même son propre neveu à mort pour avoir enfreint les lois sacrées des Kaurna."
 KAU_south_australia_act:0 "Acte d'Australie du Sud"
 KAU_south_australia_act_desc:0 "Contrairement aux autres peuples aborigènes, les puissances coloniales venues de l'étranger reconnaissent notre indépendance et notre droit à l'auto-gouvernance, à tel point que notre nom apparaît sur leurs cartes et leurs compagnies ont interdiction de coloniser nos territoires."
 PLW_ideas:0 "Idées Palawa"
 PLW_ideas_start:0 "Traditions Palawa"
 PLW_ideas_bonus:0 "Ambition Palawa"
 PLW_oyster:0 "Baie aux Huîtres"
 PLW_oyster_desc:0 "La Grande Baie aux Huîtres est une zone de notre île riche en huîtres, moules, coquilles Saint-Jacques, oursins et d'innombrables autres biens maritimes facilement récoltables. Même les baleines et les otaries à fourrure s'aventuraient parfois sur les côtes palawa et apportaient avec elles la grande abondance de leurs viandes, os et fourrures. Notre île est vraiment une terre bénie, et nous avons maîtrisé la récolte de sites comme la Baie aux Huîtres pour leur grande abondance et savons comment les échanger avec d'autres tribus pour un grand profit."
 PLW_dual_identity:0 "Double Identité"
 PLW_dual_identity_desc:0 "L'identité Palawa peut être divisée en deux hiérarchies : l'unité domestique des familles, et l'unité du clan qui serait un clan séparé de 40 à 50 personnes, et les deux identités existeraient sous la hiérarchie de la tribu."
 PLW_darwin:0 "Verre de Darwin"
 PLW_darwin_desc:0 "Il y a des siècles inconnus, notre île fut frappée par un grand monument des dieux qui atterrit en plein centre de notre île. Bien qu'il ait causé une grande destruction, il apporta aussi avec lui un puissant matériau de construction idéal pour façonner des lances et des bijoux. Notre île pourrait bien être le seul site au monde à contenir ce précieux matériau, et nous devons en tirer profit par le commerce et la guerre."
 PLW_parlevar:0 "Parlevar"
 PLW_parlevar_desc:0 "Au commencement des temps, les créateurs Moinee et Droemerdene se mirent au travail pour façonner le monde. Moinee était l'architecte du monde ; formant les terres et les rivières de notre île, et finalement prenant l'esprit errant de Parlevar et lui accordant le corps du premier homme. Ce qui suivit peu après fut le Kangourou, que Moinee fit à l'image de Parlevar, qui émergea alors du sol. Droemerdene prit la forme d'une étoile et servit de guide à l'humanité et transforma ces hommes-kangourous en êtres humains ; enlevant leurs queues et façonnant des genoux pour qu'ils puissent se reposer. Les premiers êtres humains étaient Palawa, et donc quiconque résiste à l'identité Palawa ne fait que nier ses ancêtres."
 PLW_writers:0 "Premiers Écrivains Aborigènes"
 PLW_writers_desc:0 "Bien que les cultures aborigènes aient souvent été définies par la tradition orale et les arts visuels, nous les Palawa fûmes parmi les premiers à adopter l'écrit comme moyen de préserver l'héritage des ancêtres et de partager la connaissance de notre peuple. Nos premières œuvres comprenaient des informations sur l'île elle-même, notre histoire et de grandes œuvres de poésie écrites en langues palawa. Notre maîtrise rapide de l'écrit est une démonstration claire que nous les Palawa sommes experts pour adopter de nouvelles idées et adapter nos vieilles traditions pour suivre les temps changeants."
 PLW_survivors:0 "Survivants de la Guerre Noire"
 PLW_survivors_desc:0 "Quand les colons sont venus sur notre île, ils ont cherché à éradiquer notre peuple et à prendre nos terres. Le conflit fut sanglant et faillit éliminer toute vie sur notre île. Nous avons combattu bravement contre un ennemi supérieur ; refusant de céder avec des canons de fusils pointés sur nos têtes."
 PLW_enduring:0 "Peuple Perdurable"
 PLW_enduring_desc:0 "Après les conflits sanglants avec les armées coloniales étrangères, seuls quatre cents Palawa restaient en vie pour poursuivre notre héritage. Au fil des années, nos nombres ont recommencé à se multiplier jusqu'à ce que nous regagnions notre population d'origine. Bien que les cicatrices de ce qui a été fait à notre peuple ne guérissent peut-être jamais, nous serons toujours capables de nous relever même des conflits les plus sanglants et de récupérer les effectifs perdus dans un conflit inégal."
 LAR_ideas:0 "Idées Larrakia"
 LAR_ideas_start:0 "Traditions Larrakia"
 LAR_ideas_bonus:0 "Ambition Larrakia"
 LAR_makassar_trade:0 "Le Commerce Makassarien"
 LAR_makassar_trade_desc:0 "Depuis des siècles, les Larrakia sont l'un des rares peuples à commercer avec ceux venant d'au-delà des côtes australiennes. Les marchands de Makassar viennent chercher les biens les plus convoités d'Australie : concombres de mer, vêtements et tabac. Alors que d'autres resteraient insulaires et ne commerceraient qu'avec les locaux, les marchandises larrakia sont transportées jusqu'aux côtes lointaines de la Chine."
 LAR_federation:0 "La Fédération Larrakia"
 LAR_federation_desc:0 "Les terres possédées par les seuls Larrakia ne suffisent pas à attirer les marchands étrangers, alors nous entretenons des relations amicales étroites avec nos voisins, à tel point que nos cultures se marient entre elles et partagent cérémonies, chansons et Histoires du Rêve."
 LAR_dreaming:0 "Le Rêve Larrakia"
 LAR_dreaming_desc:0 "Les Histoires du Rêve des Larrakia font de nos terres une partie de notre nation tout autant que notre peuple. Notre connexion à la terre et aux mers que nous habitons est tout autant spirituelle que physique, et tout le long des côtes du nord de l'Australie, nous racontons les Histoires du Rêve qui ont façonné le monde."
 LAR_dowed:0 "Dowed"
 LAR_dowed_desc:0 "Le premier homme Larrakia, Dowed fut élevé de la Terre par Nanganburra et éduqué sur comment procréer, créer la loi et parler. Quand il devint vieux, beaucoup refusèrent de lui obéir et aux lois qu'il avait créées, et ses punitions causèrent la mort de nombreuses personnes. À travers Dowed nous apprenons l'équilibre délicat entre légalisme et miséricorde."
 LAR_ceremonial_scarring:0 "Scarification Cérémonielle"
 LAR_ceremonial_scarring_desc:0 "La scarification dans la société Larrakia est un acte volontaire qu'on inflige à son propre corps. Le corps est coupé et scarifié pour célébrer le mariage, la naissance d'enfants ou la mort d'un membre de famille célébré. Être scarifié c'est avoir une vie de souvenirs, et être propre c'est être naïf et inexpérimenté, et plus la peau de quelqu'un est propre, moins il a le droit de participer aux cérémonies et aux célébrations."
 LAR_hospitality:0 "Hospitalité Larrakia"
 LAR_hospitality_desc:0 "Quand des étrangers apparaissent sur les côtes des Larrakia, qu'ils soient amis ou ennemis, ils sont traités avec hospitalité et respect, quelles que soient leurs origines ou intentions. Que ce soient des marchands makassariens ou des colonisateurs européens, les Larrakia offriront toujours des côtes sûres où vous pourrez être accueillis comme des amis."
 LAR_kenbi_land_claim:0 "La Revendication Territoriale de Kenbi"
 LAR_kenbi_land_claim_desc:0 "Quand les colonisateurs sont venus sur les côtes d'Australie et ont illégalement pillé et saccagé les terres des Larrakia, nous avons riposté dans le seul langage qu'ils comprenaient : le langage de la loi. Nous avons exposé, dans un document de trois mètres de long, les raisons précises pour lesquelles les compagnies coloniales violaient les lois internationales, et notre maîtrise de la loi fait de nous un adversaire redoutable pour tout colonisateur potentiel."
 GMI_ideas:0 "Idées Kamilaroi"
 GMI_ideas_start:0 "Traditions Kamilaroi"
 GMI_ideas_bonus:0 "Ambition Kamilaroi"
 GMI_sacred_caves:0 "Les Grottes Sacrées"
 GMI_sacred_caves_desc:0 "L'eau et le vent façonnent les rochers de notre foyer, et à partir d'eux nos ancêtres ont créé des outils pour cultiver et façonner la terre autour de nous. Nous vivons parmi la terre, et la terre nous fournit tout ce dont nous avons besoin."
 GMI_land_of_languages:0 "Terre de Langues"
 GMI_land_of_languages_desc:0 "L'environnement social Kamilaroi est caractérisé par une multitude de peuples différents parlant différentes langues et dialectes, se rencontrant parmi les Kamilaroi pour le commerce et les mariages entre nos peuples."
 GMI_fertile_soils:0 "Sols Fertiles des Kamilaroi"
 GMI_fertile_soils_desc:0 "Les Kamilaroi habitent certaines des plaines les plus fertiles d'Australie, rendues ainsi par une agriculture soignée par le feu de brousse."
 GMI_dhulu:0 "Dhulu"
 GMI_dhulu_desc:0 "L'Australie est pleine d'innombrables peuples et langues à travers tout le continent, et les Kamilaroi sont l'une des plus grandes confédérations tribales d'Australie. La communication entre sous-tribus est essentielle pour garder notre peuple uni, et nous avons inventé une pratique de livraison de messages sous forme de Dhulu pour communiquer avec nos frères à travers les plaines."
 GMI_matrilineal_lineage:0 "Lignée Matrilinéaire"
 GMI_matrilineal_lineage_desc:0 "C'est du ventre de nos mères que nous naissons, donc c'est par le sang de nos mères que nous traçons notre lignée. Alors que d'autres adopteraient le nom de famille de leur père, les pères sont peu fiables et on n'est jamais vraiment certain de qui est son vrai père. En traçant la lignée par la mère, nous savons toujours d'où vient notre sang."
 GMI_familial_law:0 "Loi Familiale"
 GMI_familial_law_desc:0 "Les normes de sa parenté dictent le comportement et les obligations qu'on doit à sa famille. Dans la société Kamilaroi, les lois existent au niveau national, tribal et familial et diffèrent pour chaque famille. Le chef de famille est autant le maître de quelqu'un que son chef."
 GMI_red_kangaroo:0 "Kangourou Rouge"
 GMI_red_kangaroo_desc:0 "Gambu Ganuuru était un grand et sage dirigeant de notre peuple qui tint bon face à un envahisseur étranger. Depuis sa mort, nous chantons ses triomphes et le célébrons comme le Kangourou Rouge des Kamilaroi."
 aboriginal_moluccan_trade_title:0 "S'engager dans le Commerce Makassarien"
 aboriginal_moluccan_trade_desc:0 "Peu d'étrangers savent naviguer jusqu'en Australie pour exploiter ses richesses, mais les Makassariens savent que nous sommes riches et dignes d'un voyage commercial. Ces Makassariens apportent avec eux d'étranges Histoires de dieux étrangers, et nous avons beaucoup à apprendre de leur vision du Rêve."
 dreamtime_conquer_tasmania_title:0 "Unifier les Palawa"
 dreamtime_conquer_tasmania_desc:0 "Les Palawa sont isolés et insulaires du reste du continent et en tant que tels, ils ont leurs propres Histoires du Rêve totalement différentes de celles trouvées sur le continent. Les unir sous notre bannière et intégrer leurs Histoires aux nôtres donnera à notre peuple accès à une multitude de nouvelles Histoires du Rêve !"
 dreamtime_humiliate_rival_title:0 "Humilier nos Ennemis"
 dreamtime_humiliate_rival_desc:0 "De nombreuses Histoires parlent de grandes batailles entre titans, mais nous sommes indignes de partager ces batailles légendaires dans le Temps du Rêve si nous n'exemplifions pas leur héroïsme en nous-mêmes !"
 dreamtime_spirits_title:0 "Les Esprits"
 dreamtime_spirits_desc:0 "Il y a dans notre nation ceux qui ne croient pas aux Histoires du Rêve. Maintenant plus que jamais il est important d'exemplifier les Histoires de notre peuple et de les prêcher parmi cette population d'étrangers pour leur faire connaître le Rêve."
 dreamtime_own_dharma_title:0 "Le Dharma"
 dreamtime_own_dharma_desc:0 "Les peuples des religions dharmiques suivent de nombreux dieux et prennent de nombreuses formes. Peut-être qu'en étudiant leurs voies plus profondément, nous pourrions obtenir des visions uniques du Temps du Rêve."
 dreamtime_christian_title:0 "Rêve de Baiame"
 dreamtime_christian_desc:1 "Des étrangers arrivent sur les côtes d'Australie, prêchant la croix et un ancien martyr. Bien que nous n'embrassions pas entièrement cette nouvelle foi, le paysage des Histoires du Rêve sera sans doute influencé par ces nouvelles révélations."
 dreamtime_sulawesi_title:0 "Dominer Sulawesi"
 dreamtime_sulawesi_desc:0 "Pendant des années, les Makassariens ont été les seuls marchands que l'Australie ait jamais connus, mais plus maintenant. En unifiant l'île de Sulawesi, nous serons libres de contrôler le commerce makassarien et de transporter nos propres marchandises à travers les mers jusqu'en Chine et en Indonésie."
 dreamtime_boats_title:0 "Rêve de Haute Mer"
 dreamtime_boats_desc:0 "Autrefois, notre peuple a traversé l'étendue de la mer sur des navires capables de voyages intercontinentaux, mais les côtes luxuriantes de l'Australie nous ont rendus complaisants. Nous devons raviver l'esprit voyageur de notre peuple pour un avenir nouveau et plus brillant."
 dreamtime_chinese_emperor_title:0 "Le Rêve des Dragons"
 dreamtime_chinese_emperor_desc:0 "Loin de nos côtes existe un Empereur des Dragons. Cet Empereur est clairement un agent de Wagyl, et nous devons faire prendre conscience de cette révélation au peuple chinois."
 dreamtime_rainbow_serpent_title:0 "Le Serpent Arc-en-ciel"
 dreamtime_rainbow_serpent_desc:0 "Les Histoires du Rêve à travers l'Australie varient énormément, mais une chose qui persiste est la croyance au Serpent Arc-en-ciel. Ce n'est qu'en étudiant tous les aspects du Rêve que nous pourrons commencer à véritablement comprendre la nature du Serpent Arc-en-ciel."
 ancestor_story:0 "Les Ancêtres"
 ancestor_story_desc:0 "Nous avons été portés ici sur le dos de nos Ancêtres, et les plus saints de tous les Ancêtres peuvent s'élever dans le Rêve et demeurer avec nous sur le plan spirituel."
 erathipa_story:0 "Erathipa"
 erathipa_story_desc:1 "Erathipa est une figure du Rêve qui prend la forme d'un rocher en forme de femme enceinte. Erathipa garde les âmes des enfants décédés dans son ventre, et toute femme qui s'approche d'Erathipa sera bénie de fertilité."
 crow_story:0 "Corbeau"
 crow_story_desc:0 "Le Corbeau est un champion de l'Humanité dans le Rêve qui apparaît dans les Histoires à travers toute l'Australie. C'est à Corbeau que nous pouvons rendre grâce pour la découverte du feu par l'Humanité, et ses enfants ici sur Terre doivent être vénérés comme des créatures sacrées."
 moinee_story:0 "Moinee"
 moinee_story_desc:0 "Les premiers Palawa étaient des kangourous, transformés en hommes par l'esprit créateur bienveillant Moinee. Il creusa le sol pour faire place aux rivières et aux îles, séparant la Tasmanie du reste du continent."
 military_story:0 "Adnoartina"
 military_story_desc:0 "Adnoartina était le rival de Marindi. Les batailles d'Adnoartina et de Marindi étaient légendaires, et au pied d'Uluru, leur bataille devint si sanglante qu'ils prirent la forme d'animaux ; Marindi un chien, et Adnoartina un lézard. Leur combat dura des jours tandis qu'ils grimpaient de plus en plus haut sur la surface d'Uluru. Une fois au sommet, Adnoartina mordit le cou de Marindi et le dévora, et c'est le sang divin de Marindi qui donna à Uluru sa couleur rouge."
 islam_story:0 "Rêve Islamique"
 islam_story_desc:0 "Les marchands makassariens ont apporté avec eux un ensemble d'histoires étranges et envoûtantes. Bien que l'islam ne remplacera jamais le Rêve, il est indéniable que la foi des Makassariens a influencé tous ceux qui l'ont entendue."
 dharma_story:0 "Rêve Dharmique"
 dharma_story_desc:0 "Nous suivons les voies anciennes des dieux hindous. D'eux, nous avons appris la réincarnation et comment organiser efficacement la société à travers les castes."
 baiame_story:0 "Baiame"
 baiame_story_desc:0 "Baiame est le Dieu créateur et le Père du Ciel. Il descendit des cieux et donna au monde l'océan, les rivières et les montagnes. Il retourna ensuite auprès de l'humanité pour lui donner les lois, les traditions, le langage et une voix avec laquelle chanter."
 spirits_story:0 "Les Esprits"
 spirits_story_desc:0 "De nombreux esprits habitent les sites sacrés à travers l'Australie, et leurs Histoires dans le Rêve influencent le monde autour de nous ; tant spirituellement que physiquement."
 conquest_story:0 "Lumaluma"
 conquest_story_desc:0 "Un Dieu malveillant de cupidité et de gloutonnerie, Lumaluma s'adonnait au cannibalisme ; dévorant les morts jusqu'à ce qu'il devienne une baleine."
 djunkgao_story:0 "Les Sœurs Djunkgao"
 djunkgao_story_desc:0 "Les Sœurs Djunkgao ont donné naissance de leurs ventres aux rivières et aux océans du monde avant d'embrasser la mortalité et de devenir les premières femmes du monde."
 wagyl_story:0 "Wagyl"
 wagyl_story_desc:0 "Wagyl est une manifestation du Serpent Arc-en-ciel vénérée par les Nyoongah. Il glisse à travers l'Australie occidentale dans le Rêve, formant des rivières sur son passage."
 rainbow_story:0 "Le Serpent Arc-en-ciel"
 rainbow_story_desc:0 "Le Serpent Arc-en-ciel est parmi les rares divinités à être vénérées dans tout le monde du Rêve. Les Histoires sur le but du Serpent Arc-en-ciel dans le Rêve varient énormément selon les croyances, mais Il est souvent associé à la pluie ou à l'eau et est une force bienveillante pour tous les peuples."
