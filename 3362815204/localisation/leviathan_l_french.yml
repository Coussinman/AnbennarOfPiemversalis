 dreamtime:0 "Alcheringa"
 dreamtime_religion_desc:0 "Le Temps du Rêve est la vision religieuse et culturelle du monde des Aborigènes australiens. Le Temps du Rêve décrit simultanément une époque précédant l'existence du monde matériel et aussi un plan d'existence parallèle au monde matériel. On dit que les chamans sont capables de contacter le Temps du Rêve, et les traces du Rêve se trouvent partout dans le monde."
 dreamtime_demand:0 "Convertir $COUNTRYNAME$"
 dreamtime_demand_desc:0 "Les rebelles religieux combattent pour la religion $RELIGION$. Ils exigent que nous reconnaissions sa suprématie ou au moins que nous cessions nos efforts pour les convertir et les laissions pratiquer leur culte en paix."
 dreamtime_rebels_title:0 "Religieux"
 dreamtime_rebels_name:0 "Zélotes $RELIGION$"
 dreamtime_rebels_desc:0 "Les fanatiques religieux ont tendance à se soulever dans les provinces contrôlées par des nations d'une foi différente. Ils cherchent à répandre leur foi et à frapper tous les mécréants."
 dreamtime_rebels_army:0 "Armée $RELIGION$"
