 pacific_swarm_cav:0 "Cavalerie d'Essaim Polynésienne"
 pacific_riflemen:0 "Fusiliers Polynésiens"
 pacific_dragoon:1 "Dragons Polynésiens"
 pacific_guerrillas:0 "Guérilleros Polynésiens"
 pacific_spearmanDESCR:0 "Guerriers tribaux utilisant des lances comme arme principale et des boucliers de bois pour la défense."
 pacific_reformed_spearmanDESCR:0 "Techniques avancées combinant la lance avec d'autres armes pour une approche plus mortelle."
 pacific_horsemanDESCR:0 "L'arrivée des chevaux suite à l'implication étrangère a également changé la guerre polynésienne. De nombreuses tribus et royaumes ont adopté le cheval comme partie importante de leur culture, et sont devenus d'excellents cavaliers."
 pacific_island_warriorsDESCR:0 "Habitués à vivre entourés d'eau partout, les guerriers du Pacifique ont développé des tactiques de frappe et fuite basées sur la mobilité aquatique."
 pacific_cavalryDESCR:0 "Cavaliers équipés d'arcs et d'armes à feu qui excellent dans les tactiques de raid et de harcèlement."
 pacific_arquebusierDESCR:0 "L'adoption des armes à feu fut plutôt lente dans certaines régions de Polynésie, mais progressivement l'arc a commencé à céder la place. L'arquebuse permettait aux unités d'infanterie une cadence de tir bien plus élevée, bien que moins précise."
 pacific_hussarDESCR:0 "Cavalerie légère spécialisée dans les raids et les tactiques de harcèlement."
 pacific_swarm_cavDESCR:0 "La cavalerie d'essaim était une cavalerie en ordre dispersé armée d'arcs ou de carabines qui utilisait des tactiques de tir de harcèlement pour désorganiser l'ennemi avant de charger. L'ordre dispersé de la cavalerie la rendait moins vulnérable au feu ennemi, mais si l'opposition pouvait résister à leurs attaques de harcèlement, elle tombait rapidement sous une charge."
 pacific_riflemenDESCR:0 "Une armée polynésienne utilisant de meilleures armes à feu avec une meilleure portée et précision."
 pacific_dragoonDESCR:0 "Le Dragon Polynésien était une unité de cavalerie armée de fusils et de lances. Bien qu'appelé dragon, il était en réalité beaucoup plus proche de la cavalerie de charge à la suédoise. Les braves guerriers chargeaient vers l'ennemi en tirant avec des carabines et des pistolets avant de s'engager au corps à corps."
 pacific_guerrillasDESCR:0 "En combinant les techniques de frappe et fuite de la guerre polynésienne traditionnelle et les armes à feu, l'expression ultime de la guerre est atteinte."
 maori_ideas:0 "Idées Iwi"
 maori_ideas_start:0 "Système Iwi"
 maori_ideas_bonus:0 "Ambition Maori"
 sons_of_kupe:0 "Fils de Kupe"
 sons_of_kupe_desc:1 "Estimé avoir eu lieu quelque part au XIe siècle, le Voyage de Kupe est une histoire légendaire partagée par tous les Maoris. Elle raconte un héros de Hawaiki qui partit en voyage avec sa femme Kuramarotini dans son grand canoë, Matawhourua. Durant leur voyage légendaire, ils rencontrèrent d'innombrables monstres marins, démons et intempéries avant de découvrir l'incroyable terre d'Aotearoa. À son retour à Hawaiki, il raconta à son peuple les choses incroyables qu'il avait vues, et qu'une nouvelle vie les attendait sur ces côtes lointaines. C'est de ces auditeurs captivés que nous descendons, et l'esprit voyageur est quelque chose qui existe au cœur même de notre peuple."
 kaitiakitanga:0 "Kaitiakitanga"
 kaitiakitanga_desc:1 "Le Kaitiakitanga est la tutelle sacrée que tous les Maoris doivent au ciel, à la mer et à la terre. Celui qui pratique cette tradition est Kaitiaki ou gardien et est un gardien sacré qui défend les forces inanimées du Mana qui nous entourent mais sont incapables de se défendre elles-mêmes. Profaner un site sacré est considéré comme équivalent au meurtre dans la société maorie, donc des actes nuisibles comme polluer une rivière, abattre une forêt ou piller excessivement les ressources naturelles sont considérés comme des péchés sans mesure. Ce n'est qu'en vivant en harmonie avec notre environnement et en nous limitant dans notre empiétement sur la nature que nous pouvons plaire aux Dieux et nous enrichir en Mana."
 kaumatua:0 "Kaumatua"
 kaumatua_desc:1 "Bien que nous ne soyons pas gouvernés par le conseil des anciens, ils ont une grande influence dans notre société. Un Kaumatua est élu par sa famille pour son intellect suprême, sa sagesse et sa renommée afin d'assurer que la famille et l'Iwi dans son ensemble continue de maintenir les traditions sacrées chères aux Maoris. Le Kaumatua détient l'âme d'un demi-dieu immortel qui possède le pouvoir de réincarnation, et a existé à travers d'innombrables vies, et peut revenir à tout moment pour guider la famille."
 kapa_haka:0 "Kapa Haka"
 kapa_haka_desc:1 "Le Kapa Haka est une série de piétinements et de chants, comparable à une danse de guerre. La danse est typiquement exécutée par les guerriers à l'approche d'une bataille, comme tentative de renforcer le moral allié tout en intimidant leurs ennemis. La danse démontre force et prouesse, tout en rabaissant la force et la prouesse de leur ennemi."
 pa_defence:0 "Défense du Pa"
 pa_defence_desc:0 "Un Pa est un village maori construit dans une position hautement défendable. Similaire aux châteaux européens, un Pa est construit pour assurer la survie continue du peuple local en temps de guerre. Les Pa sont solides et défensifs, mais peu coûteux et peuvent être construits et entretenus pour guère plus qu'un village standard, donc pendant que nos ennemis attendent et meurent de faim devant nos portes, nous pouvons continuer à prospérer à l'intérieur des murs de notre puissant village fortifié."
 te_moko:0 "Te Moko"
 te_moko_desc:0 "L'art du tatouage est une tradition largement pratiquée à travers nos terres. Un homme n'est guère un homme s'il n'a pas senti la marque de l'encre sur sa chair. Nous marquons ces tatouages dans notre peau avec des ciseaux, car nous sommes aussi durs et inébranlables que la pierre, et nous accueillons les cicatrices qu'ils laissent derrière eux. Être marqué de tatouages traditionnels est un signe de grande force et de prestige, et fait trembler les faibles étrangers quand nous chargeons vers eux ; nos visages bénis par les marques de nos dieux et ancêtres."
 maori_king:0 "Le Mouvement du Roi Maori"
 maori_king_desc:1 "En 1858, par demande populaire, un roi maori fut élu pour représenter, mais pas gouverner, tous les autres Iwi. Bien que certains aient rejeté l'autorité de ce Roi démocratiquement choisi, de nombreux Maoris ont afflué vers la cause du Roi comme moyen d'empêcher l'aliénation des terres maories par les colons britanniques. Tout comme Victoria régnait sur tous les Britanniques, ce roi régnerait sur tous les Maoris et permettrait des négociations égales avec les Européens d'une voix unifiée."
 fijian_ideas:0 "Idées Fidjiennes"
 fijian_ideas_start:0 "Canoë Fidjien"
 fijian_ideas_bonus:0 "Ambition Fidjienne"
 fijian_crossroad:0 "Carrefour des Cultures"
 fijian_crossroad_desc:0 "Depuis des siècles, Fidji est un point de repos pour d'innombrables migrants et voyageurs à travers le Pacifique. Nous existons entre de nombreuses civilisations et en tant que tels, nous les avons influencées autant qu'elles nous ont influencés. Nous devons apprendre à accepter ces peuples et à les intégrer dans notre culture, afin que le mode de vie fidjien puisse continuer à évoluer avec les temps changeants."
 fijian_degel:0 "Lutunasobasoba et Degel"
 fijian_degel_desc:0 "Kaunitoni était le navire légendaire qui transporta nos ancêtres Lutunasobasoba et Degel depuis des terres lointaines à l'Ouest, jusqu'aux côtes sacrées de Fidji. C'est quand ils atteignirent notre île qu'ils se séparèrent en deux tribus, Lutunasobasoba devenant chef de l'Ouest, et Degel chef de l'Est."
 fijian_conjoined:0 "Société Conjointe"
 fijian_conjoined_desc:0 "On a dit que la société et la religion fidjiennes sont conjointes, et que toute tentative de les séparer résulterait en des dommages irréparables aux deux. Bien que la séparation de l'église et de l'état puisse sembler progressiste en théorie, en réalité les lois mêmes qui gouvernent notre vie quotidienne viennent de la sagesse des grands prophètes et des Dieux. Bien que nous acceptions des cultures différentes de la nôtre, si ces gens veulent vivre ici, ils doivent comprendre nos Dieux et esprits s'ils veulent se dire Fidjiens."
 fijian_waqa:0 "Waqa Drua"
 fijian_waqa_desc:0 "Le Drua est un canoë conçu par nos ancêtres pour transporter notre peuple à travers l'océan et faire la guerre en mer. Le Waqa Drua est le plus grand et le plus fin navire de haute mer de tout le monde connu, et les autres royaumes tremblent en voyant approcher notre vaste navire. Notre maîtrise de la construction navale et de la guerre navale a gardé Fidji à l'abri des envahisseurs étrangers, et tant que nos puissantes armées océaniques maintiendront notre longue tradition navale, Fidji maintiendra sa souveraineté."
 fijian_warlords:0 "Seigneurs de Guerre Fidjiens"
 fijian_warlords_desc:0 "La nature montagneuse de nos îles a rendu difficile la consolidation des différents clans ensemble et à cause de cette fragmentation, les combats pour le territoire sont une chose constante. Cela signifie qu'une partie de notre société affronte constamment d'autres groupes, donc ils sont habitués à la guerre."
 fijian_kai:0 "Kai Colo"
 fijian_kai_desc:0 "Nous sommes un peuple robuste, nos guerriers s'entraînent dans les climats montagneux rudes de Fidji. Les Kai Colo sont le peuple montagnard de Fidji et produisent les guerriers les plus fins et les plus robustes que nos îles ont à offrir. Nous ne souffrons pas face aux climats défavorables, et nous nous adaptons à tous les terrains. Durant la guerre, les Kai Colo ont tenu bon dans leurs foyers montagneux contre un ennemi bien plus avancé qu'eux. C'était une bataille qui déterminait l'existence continue des Kai Colo, et sans surprise, nos guerriers supérieurs ont gagné à la fin."
 fijian_confederacy:0 "Confédération de Royaumes"
 fijian_confederacy_desc:0 "Quand nous Fidjiens formalisions nos gouvernements disparates, l'une des propositions était que tous les royaumes existants de Fidji soient unifiés en une Confédération de Rois, chacun conservant une certaine autonomie tout en étant uni sous un seul organe de gouvernement. Cette méthode d'accorder à notre peuple une autonomie locale favorise le commerce local et crée une société plus prospère pour tous."
 hawaiian_ideas:0 "Idées Hawaïennes"
 hawaiian_ideas_start:0 "L'Appel du Surf"
 hawaiian_ideas_bonus:0 "Ambition Hawaïenne"
 kapu_system:0 "Préserver le Système Kapu"
 kapu_system_desc:0 "Le système Kapu est l'ancien système hawaïen de lois qui régit le mode de vie, les rôles de genre, la religion et le gouvernement des îles. Le Kapu est une loi religieuse, et impose la volonté des Dieux au peuple. Il protège aussi les sites sacrés de Hawaï et empêche le déboisement et le pillage des précieuses ressources de notre nation pour un plaisir rapide. Personne n'est exempt du Kapu ; ni les roturiers, ni les marchands, ni les visiteurs étrangers, et même pas le Roi."
 alii_nui:0 "Réorganiser les Ali'i Nui"
 alii_nui_desc:0 "Les Ali'i sont la classe dirigeante de Hawaï, et les Ali'i Nui sont les individus qui gouvernent la classe dirigeante. Les Ali'i Nui ont longtemps été considérés comme les membres les plus élevés de la société, sans individus ou institutions les surpassant. Avec l'unification de Hawaï, nous ne pouvons pas simplement déposer les anciens dirigeants de ces régions, mais plutôt redéfinir le sens d'Ali'i Nui en une position séculière nommée par le Roi de Hawaï, solidifiant notre position sans contrarier les Ali'i."
 hula_idea:0 "Hula"
 hula_idea_desc:0 "Le Hula est une danse traditionnelle souvent accompagnée d'un Chant Oli ou d'une Chanson Mele. Le Hula est plus qu'une simple danse ou performance, cependant. C'est le médium par lequel nous préservons notre histoire, notre culture, et racontons des histoires de nos ancêtres et dieux. L'Oli ou Mele décrit les événements tels qu'ils se sont produits avec des mots, et le Hula traduit ces mots en mouvement physique. Le mouvement de nos corps et de nos mains représente les mots littéraux prononcés ou chantés par l'Oli et le Mele, mais peut aussi représenter les événements de l'histoire comme le flux des vagues ou les émotions intenses des héros légendaires d'autrefois."
 ohana:0 "Ohana"
 ohana_desc:0 "Ohana est le concept hawaïen de famille, et s'est longtemps étendu au-delà des simples liens du sang. Une famille prend de nombreuses formes, et la famille adoptive est d'égale importance à la famille de sang. Il était courant pour un grand dirigeant d'adopter des amis et alliés de confiance dans sa famille et de les traiter comme des parents, et notre concept malléable de famille fait de la société hawaïenne une société qui peut accueillir les étrangers et les inconnus à bras fraternels."
 kanawai_mamalahoe:0 "Kanawai Mamalahoe"
 kanawai_mamalahoe_desc:0 "« Ô peuple, honore ton dieu ; respecte également les gens, grands et humbles ; Que tous, des vieillards et des vieilles femmes aux enfants, soient libres d'aller et de s'étendre sur la route sans crainte de mal. Brise cette loi, et meurs. » C'est la Loi de la Pagaie Brisée établie par le Roi Kamehameha, et c'est l'épine dorsale de notre société. La loi est révolutionnaire et valorise le caractère sacré de toute vie humaine, même celle de nos ennemis, assurant que les faibles et les innocents sont protégés de la dévastation et des difficultés de la guerre."
 naha_prophecy:0 "Prophétie Naha"
 naha_prophecy_desc:0 "La Prophétie Naha dicte que l'homme ou la femme qui peut soulever la Pierre Naha est le dirigeant légitime de toute la Polynésie. Notre dirigeant a accompli cette prophétie, et bien que certains puissent nier notre droit de gouverner la Polynésie, ils sauront bientôt que le sang divin de notre lignée royale a depuis longtemps été destiné à unir notre peuple comme un seul, et à amener la Polynésie à la proéminence mondiale."
 legendary_voyagers:0 "Voyageurs Légendaires"
 legendary_voyagers_desc:0 "Le nombre d'ancêtres à travers la Polynésie qui prétendent être originaires de Hawaï est trop grand pour être compté. On ne peut nier que le voyage, l'exploration et la colonisation sont dans le sang même du peuple hawaïen. Nous entendons l'océan ouvert nous appeler, et nous obéissons. En utilisant les techniques de navigation ancestrales consistant à suivre la migration des oiseaux et les positions des étoiles dans le ciel, nous Hawaïens pouvons nous aventurer jusqu'au bout de la Terre et revenir, rapportant connaissance et richesses sur les côtes de notre magnifique patrie."
 tongan_ideas:0 "Idées Tongiennes"
 tongan_ideas_start:0 "Système Tributaire Tongien"
 tongan_ideas_bonus:0 "Ambition Tongienne"
 tonga_tangaloa:0 "Le Mythe de Tangaloa"
 tonga_tangaloa_desc:0 "Tangaloa est une famille de Dieux de grande importance pour notre peuple. Le premier membre de la dynastie Tangaloa était Eiki ; un cousin du Dieu créateur Havea Hikule'o et du champion de l'Humanité : Maui. Il existe de nombreuses histoires des exploits de la grande famille Tangaloa ; y compris le héros Eitumapu'a qui grimpa un grand arbre de fer dans les cieux et trouva l'amour de sa vie Ilaheva et dormit à ses côtés jusqu'à ce que les deux îles Tala-kite et Mata-aho soient forgées de leur amour."
 tonga_pulotu:0 "La Création de Pulotu"
 tonga_pulotu_desc:0 "Au commencement, Pulotu tira le grand rocher Touia'o Futuna du plan infini de l'océan. Sur cette nouvelle terre émergèrent quatre paires de jumeaux de sexes opposés, et chaque frère s'unit à sa sœur et leur sang divin produisit quatre filles sacrées. Nos ancêtres les plus anciens lient tous les peuples ensemble, et quelle meilleure nation pour garder vivants les descendants de ces gens que les Tonga ? Assurément, notre réseau de tributaires et de sujets comprendra que c'est notre amour fraternel et sororel l'un pour l'autre qui nous rapproche le plus des anciens dieux et ancêtres."
 tonga_maui:0 "Les Îles de Maui"
 tonga_maui_desc:0 "C'est de Manuka aux Samoa que Maui reçut son légendaire hameçon de nul autre que Tonga Fusifonua. Quand le grand héros Maui alla pêcher dans l'océan avec cet hameçon, il ne tira pas un poisson de l'océan, mais notre île natale de Tongatapu fut tirée du fond de la mer ! Alors que Maui continuait à pêcher avec cet hameçon magique, il donna naissance à 'Eua et aux nombreuses autres petites îles de notre grand royaume, et même à certaines îles de Fidji et des Samoa aussi. Mais c'est Tongatapu, l'île capitale de notre nation, qui fut la première des îles de Maui, et assurément la nature divine de la naissance de notre terre attirera encore plus de marchands, de colons et de nobles sur nos côtes."
 tonga_polynesian:0 "Véritables Prétendants à la Polynésie"
 tonga_polynesian_desc:0 "Alors que les autres insulaires du Pacifique embrassent les vents du changement quand les étrangers viennent sur nos côtes, ou que nous venons sur des côtes étrangères, nous ne cédons pas aux manières des autres. En tant que Tongiens, nous sommes fiers de notre héritage de voyageurs, et restons aussi têtus et résilients qu'un rocher face aux marées changeantes. Nous assurerons que notre peuple continue de garder vivante l'identité tongienne."
 tonga_tongatapu:0 "Les Cloches de Tongatapu"
 tonga_tongatapu_desc:0 "Nous nous vantons du plus haut ratio de personnes par temples dans tout le monde. Quand on navigue près des côtes de Tongatapu, parmi le murmure des vagues, on peut entendre le carillon des cloches et les douces prières des fidèles. Que nous choisissions de pratiquer notre ancienne religion, ou les croyances émergentes d'outre-mer, notre foi nous liera nous Tongiens ensemble, et chacun aura une place pour adorer correctement ses dieux."
 tonga_craftsman:0 "Artisanat Tongien Ancien"
 tonga_craftsman_desc:0 "Nous avons une tradition ancienne de sculpture sur os, de sculpture sur bois et de vannerie. Nos pratiques précèdent tout témoignage, et nos grands artisans ont transmis leur métier de génération en génération depuis si longtemps qu'on pourrait croire que c'est dans notre sang même."
 tonga_oceanic_empire:0 "L'Empire Océanique"
 tonga_oceanic_empire_desc:0 "Tonga abrite plus de 170 îles, avec un peuple tout entier connecté par nos traditions et coutumes anciennes. Au-delà de cela, l'Empire Tongien collecte ses tributs des Samoa et de Fidji, et de nombreuses nations au-delà de nos côtes. Avec le génie et l'ingéniosité que nous possédons pour garder un peuple unifié à travers un océan si infini, il n'y a pas de meilleure nation que l'Empire Tongien pour s'étendre à travers l'Océanie."
 samoan_ideas:0 "Idées Samoanes"
 samoan_ideas_start:0 "Esprits Brillants des Samoa"
 samoan_ideas_bonus:0 "Ambition Samoane"
 samoa_musical:0 "Culture Musicale Samoane"
 samoa_musical_desc:0 "La musique fait partie intégrante de ce que signifie être Samoan. Nous pratiquons rituellement nos traditions musicales anciennes, et notre île abrite d'innombrables chanteurs, danseurs et musiciens inspirés. La musique est un langage universel que tous les peuples comprennent, et c'est avec notre maîtrise du langage musical que nous trouverons l'unité."
 samoa_faa:0 "Fa'a Samoa"
 samoa_faa_desc:0 "Le Fa'a Samoa est le guide ancien pour tous les Samoans sur la façon de mener leur vie, et comment gouverner leur peuple. Les trois éléments structurels du Fa'a Samoa reposent sur le Matai ou noblesse, Aiga ou famille, et le clergé. Il y a plus de 18 000 familles nobles vivant sur nos diverses îles, et toutes suivent la simple philosophie du Fa'a Samoa. C'est en codifiant ce que signifie être Samoan que nous pouvons maintenir un royaume qui s'étend sur d'innombrables îles disparates à travers la mer."
 samoa_mauluulu:0 "Maulu'ulu"
 samoa_mauluulu_desc:0 "Le Maulu'ulu est une danse traditionnelle ancienne pratiquée principalement par les femmes samoanes, bien que de nombreux villages fassent danser les hommes et les femmes ensemble. La danse est une expression artistique de la vie quotidienne aux Samoa ; imitant les mouvements des tâches domestiques, de l'agriculture, de la pêche et des coutumes traditionnelles. C'est avec cela que nous lions les activités de la vie quotidienne à notre culture et les rendons transcendantes."
 samoa_foreign:0 "Acceptation des Missionnaires Étrangers"
 samoa_foreign_desc:0 "Bien que nous souhaitions préserver notre culture et notre héritage, il est irréfutable que ces missionnaires et prophètes qui viennent d'outre-mer portent avec eux une sagesse bien au-delà de ce que nous possédons déjà. Peut-être qu'en les laissant rester et pratiquer leurs manières, nous pourrions absorber une partie de cette sagesse dans notre propre société. Un peu d'influence occidentale ne pourrait pas faire de mal."
 samoa_tatau:0 "Tatau"
 samoa_tatau_desc:0 "L'art ancien du Tatau est largement pratiqué dans tout le Triangle Polynésien. Les maîtres artistes du Tatau pratiquent leur art avec des outils faits d'os, de défenses, de dents, de coquillages et de bois. Le processus est long, ardu et douloureux, mais nous le faisons pour décorer nos corps avec des vénérations envers nos ancêtres et dieux ; montrant la spiritualité d'un homme et son engagement envers le mode de vie samoan."
 samoa_faavae:0 "Fa'avae I Le Atua Samoa"
 samoa_faavae_desc:0 "Les pratiques religieuses de notre peuple varient énormément en doctrine et dénomination, mais toutes sont liées par la phrase « Samoa est fondée sur Dieu ». Peu importe quelle religion nous pratiquons, car c'est Samoa elle-même qui est sacrée parmi tous les dieux. Le dimanche est un jour de grand repos pour tous les Samoans, pour adorer leurs dieux respectifs de la manière qu'ils choisissent et passer du temps parmi leur famille. Peu importe quelle foi vous suivez, car toutes sont acceptées dans le Fa'a Samoa."
 samoa_trade:0 "Commerce du Triangle Polynésien"
 samoa_trade_desc:0 "Depuis des années, les marchands samoans ont été impliqués dans le commerce à travers le Triangle Polynésien ; principalement avec Fidji et Tonga, nos proches voisins. De nombreuses sociétés abandonneraient simplement la notion de commerce à travers un océan si vaste, mais nos voyageurs et marchands comprennent les voies des vagues mieux que quiconque. Peu importe la taille de notre nation, nous nous souviendrons des techniques de navigation qui ont apporté les richesses aux Samoa, et peut-être qu'un jour les Samoa récolteront les riches marchandises du monde entier…"
 estate_kahuna:1 "Kahuna"
 estate_tohunga:1 "Tohunga"
 estate_bete:1 "Bete"
 estate_taula_otua:1 "Taula 'Otua"
 estate_taula_aitu:1 "Taula Aitu"
 estate_alii:1 "Ali'i"
 estate_rangatira:0 "Rangatira"
 estate_eiki:1 "'Eiki"
 estate_ratu:1 "Ratu"
 iroquoian_federation_ideas:0 "Idées de la Fédération Iroquoise"
 iroquoian_federation_ideas_start:0 "Traditions Iroquoises"
 iroquoian_federation_ideas_bonus:0 "Ambitions Iroquoises"
 iro_great_law_of_peace:0 "Grande Loi de la Paix"
 iro_great_law_of_peace_desc:0 "La Grande Loi de la Paix, ou Grande Loi Contraignante, fait partie de notre tradition orale et prend sept ou huit jours à réciter entièrement. Sous ses enseignements, nous vivons en harmonie."
 iro_tree_of_peace:0 "Arbre de la Paix"
 iro_tree_of_peace_desc:0 "Le Grand Pacificateur, fondateur de cette Confédération, a planté un arbre aux feuilles longues et saines sous lequel toutes nos nations doivent trouver refuge."
 iro_great_white_roots:0 "Grandes Racines Blanches"
 iro_great_white_roots_desc:0 "Les racines du Grand Arbre de la Paix connectent les nations de notre Confédération, s'étendant au nord, au sud, à l'est et à l'ouest."
 iro_into_the_grave:0 "Jusque dans la Tombe"
 iro_into_the_grave_desc:0 "Chacune des nations qui forment notre Ligue avait un chef de guerre dont le titre le suit jusque dans la tombe. Leur gloire est telle que la terre est honorée d'être prise par eux."
 iro_the_good_word:0 "La Bonne Parole"
 iro_the_good_word_desc:0 "La Bonne Parole établit ce qui est la droiture en action, apportant la justice à toutes nos nations. La Parole est la loi."
 iro_sachems:0 "Sachems"
 iro_sachems_desc:0 "Les Sachems sont les seigneurs de nos tribus, gardiens de la paix. Ils participent au Conseil et s'assurent que nos nations restent harmonieuses."
 iro_the_grand_council:0 "Le Grand Conseil"
 iro_the_grand_council_desc:0 "Le Conseil représente la souveraineté parmi notre peuple. C'est là que nous nous réunissons pour poursuivre et atteindre nos ambitions. Nous étendrons notre domination sur la terre."
 siouan_federation_ideas:0 "Idées de la Fédération Sioux"
 siouan_federation_ideas_start:0 "Traditions Sioux"
 siouan_federation_ideas_bonus:0 "Ambitions Sioux"
 sio_great_spirit:0 "Grand Esprit"
 sio_great_spirit_desc:0 "Le Grand Esprit est le divin sacré qui réside en toute chose ; le grand pouvoir de sainteté qui crée, protège et termine tout."
 sio_tioshpayes:0 "Tioshpayes"
 sio_tioshpayes_desc:0 "Les Tioshpayes sont les familles élargies de notre peuple, en faire partie renforce les liens internes parmi nos tribus et nous fait nous sentir plus proches les uns des autres."
 sio_between_the_rivers:0 "Entre les Rivières"
 sio_between_the_rivers_desc:0 "Les rivières Minnesota et Missouri baignent notre terre. Leurs eaux apportent la prospérité au sol et la sérénité à notre nation, sachant qu'elles nous fournissent tout ce dont nous avons besoin."
 sio_trade_fairs:0 "Foires Commerciales"
 sio_trade_fairs_desc:0 "Nos marchands voyagent au loin pour assister et organiser des foires commerciales avec d'autres tribus. Les relations commerciales sont un moyen utile d'assurer nos besoins."
 sio_oyate:0 "Oyate"
 sio_oyate_desc:0 "Un homme ne peut pas vivre seul ou, si c'était le cas, cela ne serait pas appelé la vie. Un oyate est une tribu, un lieu d'appartenance. Parmi les oyates nous trouvons protection et conseil."
 sio_until_death_and_after:0 "Jusqu'à la Mort et Après"
 sio_until_death_and_after_desc:0 "Il y a un vieux proverbe parmi notre peuple qui dit « aujourd'hui est un bon jour pour mourir ». Ce que cela signifie, c'est que la mort viendra sans prévenir, et que nous devrions être prêts à la recevoir en défendant nos familles et nos foyers."
 sio_across_the_land:0 "À Travers la Terre"
 sio_across_the_land_desc:0 "Nous allons vers l'ouest en été, vers l'est en hiver. Chassons les bisons quand le soleil est au plus haut, retournons dans les bois pour trouver refuge contre le froid."
 eastern_algonquian_federation_ideas:0 "Idées Algonquines de l'Est"
 eastern_algonquian_federation_ideas_start:0 "Traditions Algonquines de l'Est"
 eastern_algonquian_federation_ideas_bonus:0 "Ambitions Algonquines de l'Est"
 ealg_corn_beans_and_squash:0 "Maïs, Haricots et Courge"
 ealg_corn_beans_and_squash_desc:0 "Maïs, haricots, courge. Ce sont les trois ingrédients principaux de notre alimentation quotidienne. Leur culture elle-même est une bénédiction sacrée pour notre nation."
 ealg_seasonal_economy:0 "Économie Saisonnière"
 ealg_seasonal_economy_desc:0 "En temps difficiles, nous devons apprendre à endurer la vie. Et la vie est synonyme de nature. Le changement des saisons implique aussi le changement de nos coutumes. Les villages doivent être aussi temporaires et mobiles que le temps."
 ealg_slash_and_burn:0 "Agriculture sur Brûlis"
 ealg_slash_and_burn_desc:0 "Il existe une technique agricole qui implique de brûler la végétation pour obtenir une couche de cendre riche en nutriments qui fertilise le sol. Nous avons appris que la terre devient plus forte après cette méthode. Elle est plus forte parce qu'elle sait ce que c'est que d'être brisée."
 ealg_fishing_habits:0 "Habitudes de Pêche"
 ealg_fishing_habits_desc:0 "Parfois il est difficile de croire que certains de notre peuple sont nés sur terre et non dans l'eau, car leurs corps nagent avec une telle agilité qu'il est presque impossible de les distinguer du courant de la rivière."
 ealg_whale_hunters:0 "Chasseurs de Baleines"
 ealg_whale_hunters_desc:0 "Baleines, marsouins, morses, phoques. Tout ce que la mer nous donne et qui est plus grand que nos voix, que notre sentiment imprudent de fierté. Tout ce que la mer nous donne, nous le chassons."
 ealg_white_tialed_deer:0 "Cerf à Queue Blanche"
 ealg_white_tialed_deer_desc:0 "Nous suivons leur piste, contemplons leur comportement prudent, envions leur nature gracieuse. Il n'y a pas une partie du cerf qui n'est pas précieuse. Nous les chassons pour leur viande, mais nous séchons aussi leurs peaux pour couvrir la nôtre."
 ealg_back_before_spring:0 "De Retour Avant le Printemps"
 ealg_back_before_spring_desc:0 "Au printemps, nous suivons l'éclosion des prairies vers la côte. Nous pêchons l'éperlan, l'esturgeon, le saumon. En été, nous cueillons des baies sous la chaude lumière du soleil. Durant l'automne, nous chassons. Et en hiver, quand la première neige tombe, nous cherchons refuge dans les feux confortables."
 central_algonquian_federation_ideas:0 "Idées Algonquines du Centre"
 central_algonquian_federation_ideas_start:0 "Traditions Algonquines du Centre"
 central_algonquian_federation_ideas_bonus:0 "Ambitions Algonquines du Centre"
 calg_fur_trade:0 "Commerce de Fourrure"
 calg_fur_trade_desc:0 "Le commerce de fourrure avec d'autres tribus et des étrangers est une partie essentielle de notre économie. Nous sommes très fiers de nos capacités de chasse, et sommes donc capables de fournir la meilleure qualité de fourrure animale."
 calg_midewiwin:0 "Midewiwin"
 calg_midewiwin_desc:0 "Le bon chemin est celui qui nous mènera vers le calme éternel. La voie du cœur est insondable et imprévisible, mais c'est le devoir de nos hommes les plus sages de nous aider à la prévoir."
 calg_medicinal_infusions:0 "Infusions Médicinales"
 calg_medicinal_infusions_desc:0 "Les propriétés curatives de certaines plantes ont aidé notre peuple à surmonter différentes maladies depuis des siècles. On dit que les infusions faites de certaines feuilles particulières allongent la vie de notre peuple."
 calg_seven_fires_prophecy:0 "Prophétie des Sept Feux"
 calg_seven_fires_prophecy_desc:0 "Chaque feu de la prophétie représente un enseignement spirituel significatif, le marquage d'une époque qui viendra et passera. En suivant leur guidance, nous empêcherons le monde de devenir amer par irrespect."
 calg_teaching_scrolls:0 "Rouleaux d'Enseignement"
 calg_teaching_scrolls_desc:0 "Il y a peu de choses plus puissantes que la connaissance. Nous la collectons et écrivons nos enseignements sur des rouleaux d'écorce de bouleau que nous gardons ensuite en lieu sûr, les utilisant principalement à des fins cérémonielles."
 calg_copper_weaponry:0 "Armement en Cuivre"
 calg_copper_weaponry_desc:0 "Le matériau est aussi important que l'outil. Nos armes sont efficaces non seulement grâce aux mains qui les manient, mais aussi grâce au cuivre de haute qualité que nous utilisons pour les forger."
 calg_land_of_the_dawn:0 "Terre de l'Aube"
 calg_land_of_the_dawn_desc:0 "Notre peuple commerce à travers le continent depuis des milliers d'années, a migré, voyagé, trouvé un foyer, quitté un foyer, trouvé un vrai foyer. Nous avons utilisé des routes de canoë pour nous déplacer au nord, au sud, d'ouest en est. Et nous continuerons à le faire."
 muskogean_federation_ideas:0 "Idées de la Fédération Muskogee"
 muskogean_federation_ideas_start:0 "Traditions Muskogee"
 muskogean_federation_ideas_bonus:0 "Ambitions Muskogee"
 mus_totem_animals:0 "Animaux Totems"
 mus_totem_animals_desc:0 "L'organisation traditionnelle de nos tribus est fondée sur des clans, chacun portant le nom de son animal totem. Ils sont des guides et des mentors, offrant la sagesse à notre nation."
 mus_embroidered_skin:0 "Peau Ornée"
 mus_embroidered_skin_desc:0 "L'image d'une créature encapsule une partie de son essence. En tatouant nos corps, nous imprégnons dans nos peaux les attributs de la nature."
 mus_green_corn_ceremony:0 "Cérémonie du Maïs Vert"
 mus_green_corn_ceremony_desc:0 "Au milieu de l'été, quand les premiers fruits ont déjà été récoltés, notre peuple se rassemble sur la place du village pour célébrer les nouveaux commencements. Durant ces jours, le renouveau n'est pas seulement appliqué à la nature, puisque chaque méfait ou grief est aussi pardonné."
 mus_valiant_in_war:0 "Vaillants à la Guerre"
 mus_valiant_in_war_desc:0 "La réputation légendaire de nos guerriers précède leur apparition sur le champ de bataille. Leur bravoure accompagne leur fierté de servir notre nation prestigieuse."
 mus_the_great_ball_game:0 "Le Grand Jeu de Balle"
 mus_the_great_ball_game_desc:0 "En temps de guerre, les préoccupations de notre peuple augmentent, s'inquiétant de la mort, du deuil, de la faim. Cependant, c'est notre devoir de célébrer les temps de paix avec un degré égal d'émotion. La musique, les jeux et les festivals aident à maintenir notre moral."
 mus_red_and_white_towns:0 "Villes Rouges et Blanches"
 mus_red_and_white_towns_desc:0 "Certaines de nos villes ont l'honneur d'être classées en deux catégories différentes : Villes Rouges ou Blanches. Les villes rouges tiennent les cérémonies de guerre, tandis que les blanches sont destinées aux rituels pacifiques."
 mus_meritocratic_leadership:0 "Direction Méritocratique"
 mus_meritocratic_leadership_desc:0 "Atteindre un objectif accorde une rétribution plus satisfaisante que de simplement le recevoir. Notre tribu croit fermement à récompenser les véritables efforts de chacun par de plus grandes responsabilités et autorité."
 generic_federation_ideas:0 "Idées de Fédération"
 generic_federation_ideas_start:0 "Traditions de Fédération"
 generic_federation_ideas_bonus:0 "Ambitions de Fédération"
 fed_council_of_elders:0 "Conseil des Anciens"
 fed_council_of_elders_desc:0 "Le gouvernement de notre Fédération existe pour s'assurer que toutes les nations en faisant partie ont une voix et un mot à dire dans toutes les décisions. Collaborer dans l'administration de notre terre nous aidera à considérer de nouvelles perspectives."
 fed_great_chief:0 "Grand Chef"
 fed_great_chief_desc:0 "En tant que dirigeants de notre union, c'est notre devoir de nous assurer que chacune des tribus sous notre direction est sûre et protégée. Nous pouvons nous reposer sans inquiétude, sachant que le Grand Chef veille sur nous."
 fed_petroglyphs:0 "Pétroglyphes"
 fed_petroglyphs_desc:0 "L'image d'un concept devient tangible quand cette image est gravée sur nous. La sculpture sur pierre les envisage, fournissant une représentation sacrée et observable de nos notions les plus profondes."
 fed_sign_language:0 "Langage des Signes Autochtone"
 fed_sign_language_desc:0 "Nous habitons une vaste terre, aussi vaste que le soleil voyage et que la lune suit. Les mots ne peuvent pas les suivre, surtout entre tribus distantes. Ainsi, nous avons développé un langage des signes comme lingua franca entre nos nations."
 fed_gender_parity:0 "Parité des Genres"
 fed_gender_parity_desc:0 "Que nos tribus suivent un système matrilinéaire ou patrilinéaire, les deux sexes participent dans une large mesure au gouvernement de notre tribu, détenant le pouvoir sur les décisions prises."
 fed_little_brother_of_war:0 "Petit Frère de la Guerre"
 fed_little_brother_of_war_desc:0 "La violence n'est pas toujours la solution. Une compétition saine dans les sports peut être une approche différente pour mesurer les capacités de nos tribus les unes contre les autres."
 fed_sunrise_invasion:0 "Invasion de l'Aurore"
 fed_sunrise_invasion_desc:0 "La naissance du soleil vient de l'est, son berceau lumineux reposant dans quelque terre lointaine au-delà de l'océan. Notre désir de le trouver nous mènera vers la lumière."
 aotearoa_nation_title:0 "Former Aotearoa"
 aotearoa_nation_desc:0 "Nous avons émergé comme l'Iwi qui les unira tous sous la même bannière. L'essor d'Aotearoa commence aujourd'hui !"
 unite_hawaii_title:0 "Unifier Hawaï"
 unite_hawaii_desc:0 "Les îles sont enfin unies sous un seul dirigeant. Un nouveau temps de prospérité est devant nous."
 unite_fiji_title:0 "Unifier Fidji"
 unite_fiji_desc:0 "Les clans ne font de nouveau qu'un, et nous pouvons revendiquer le titre de dirigeant de Fidji."
 polynesian_navy_build_title:0 "Peuple Océanique"
 polynesian_navy_build_desc:0 "Peu importe ce que les Polynésiens appellent leur foyer, une chose qu'ils ont tous en commun est une connexion spirituelle avec la mer. La voile est souvent vue comme une tradition sacrée, et dans certaines sociétés le canoë du marin est vu comme une extension de son propre corps, et dans des cas encore plus extrêmes le canoë est considéré comme ayant du Mana ou une âme propre et est souverain et sacré parmi toutes choses."
 polynesian_grand_navy_title:1 "Triangle Polynésien"
 polynesian_grand_navy_desc:0 "Le Triangle Polynésien désigne la zone de l'océan Pacifique habitée par les Polynésiens. Les pointes du triangle font référence à Hawaï, le coin ouest à Aotearoa, et le coin est à Rapa Nui. Les marchands et voyageurs polynésiens utilisaient le Triangle Polynésien pour le commerce, l'exploration et la colonisation. Les Polynésiens natifs appelaient en fait cette région une pieuvre, représentant les diverses voies invisibles que les navigateurs suivaient sur la mer. Cette pieuvre a divers noms dans les sociétés polynésiennes dont Taumata-Fe'e-Fa'atupu-Hau ou Grande Pieuvre de la Prospérité faisant référence aux grandes richesses que l'exploration et le commerce apporteraient à leur société."
 gain_mana_title:0 "Gagner du Mana"
 gain_mana_desc:0 "Le Mana est à peu près équivalent à l'expression occidentale d'une âme ou d'un esprit. Mais, le Mana est aussi la mesure du prestige et de la piété d'un homme, et un homme honorable est vu comme possédant beaucoup de Mana tandis qu'un membre inférieur de la société est vu comme étant pauvre en Mana. Dans certaines sociétés, quelqu'un qui se consacre à la prière et à l'accumulation de Mana peut gagner la faveur des dieux et leur demander d'accomplir des tâches comme changer le temps ou faire sortir des îles de l'océan. C'est de là que vient l'erreur de l'Occident d'assimiler le Mana à la Magie."
 centralize_the_realm_title:0 "Centraliser le Royaume"
 centralize_the_realm_desc:0 "Nous sommes respectés en tant que dirigeant, mais nous devons augmenter notre puissance en centralisant le pouvoir autour de nous et en modernisant les manières dont nous gouvernons notre peuple."
 shipbuilders_title:0 "Constructeurs de Navires"
 shipbuilders_desc:0 "Vivre sur des îles nous rend dépendants des navires. Bien que nos traditions tournent autour de la construction navale, nous devons créer une base solide pour une expansion future."
 expand_trade_routes_title:0 "Étendre les Routes Commerciales"
 expand_trade_routes_desc:0 "Afin d'augmenter notre richesse, nous devons devenir le centre du commerce de la région. Nos marchands ne se reposeront jamais."
 own_cot_title:0 "Posséder un Centre de Commerce"
 own_cot_desc:0 "Il y a quelques endroits bénis par les dieux comme lieux où le commerce se fait naturellement. Nous devons les saisir, quoi qu'il arrive, pour dominer le commerce."
 absolute_rule_title:0 "Pouvoir Absolu"
 absolute_rule_desc:0 "Notre pouvoir ne peut être inégalé tant que nous ne contrôlons pas au moins la moitié du pays efficacement."
 loyal_subjects_title:0 "Sujets Loyaux"
 loyal_subjects_desc:0 "Les états sont aussi utiles que dangereux s'ils sont laissés sans contrôle. « Garde tes amis proches, et tes ennemis plus proches encore » est un bon résumé de cette philosophie."
 island_hopping_title:0 "Sauts d'Îles"
 island_hopping_desc:0 "D'une île à l'autre, notre peuple continue de s'étendre à travers tout le Triangle Polynésien."
 fiji_drua_builders_title:0 "Constructeurs de Drua"
 fiji_drua_builders_desc:0 "Bien que les druas soient un design assez commun dans le Triangle Polynésien, leur origine est dans nos terres. Et en tant que constructeurs originaux, notre renommée de meilleurs artisans est encore bien connue. De nos îles nous exportons beaucoup de druas vers d'autres nations. Peut-être qu'une meilleure infrastructure peut nous aider à apporter plus de richesse à notre communauté."
 fiji_vunivalu_title:0 "Vunivalu Fidjien"
 fiji_vunivalu_desc:0 "Nos chefs militaires sont appelés Vunivalu ou seigneur de guerre dans notre tradition. Quand un homme prouve sa valeur en menant des hommes au combat et revient victorieux, la tribu le nomme Vunivalu. Nous devrions faire savoir à tous que n'importe quel homme dans nos rangs peut en devenir un."
 fiji_island_lords_title:0 "Seigneurs des Îles"
 fiji_island_lords_desc:0 "En montrant notre force et en leur faisant peur, nous pouvons revendiquer la seigneurie sur ces îles."
 fiji_one_nation_title:0 "Une Seule Nation"
 fiji_one_nation_desc:0 "Les îles de Viti ont été divisées entre les Clans pendant de nombreuses générations, dès le tout premier instant où nos ancêtres sont arrivés sur ces côtes. Nous avons accompli les rêves de nos aïeux et uni notre peuple sous un seul dirigeant."
 hawaii_ahupuaa_system_title:0 "Système Ahupua'a"
 hawaii_ahupuaa_system_desc:0 "Le système Ahupua'a était le système sociétal conçu par Umi-a-Liloa comme moyen de guider la société hawaïenne avec trois valeurs simples. La première valeur étant : aloha. L'aloha est la doctrine qui gouverne le respect de base requis de chaque Hawaïen, et les règles exactes de l'Aloha variaient selon le genre et la classe sociale. Laulima est la deuxième valeur du système Ahupua'a, et elle dicte la coopération. Laulima signifie littéralement plusieurs mains, et décrit la manière dont chaque Hawaïen contribue au succès du Royaume et qu'accomplir ses devoirs et coopérer avec les autres est dans l'intérêt de tous. Malama est la valeur finale du système Ahupua'a, et elle décrit l'intendance. Celui qui pratique Malama est attentif, bienveillant et observateur et prend soin de sa communauté et de sa famille. C'est en pratiquant les trois principes de l'Ahupua'a que l'on atteint le Pono, une vie parfaitement équilibrée."
 hawaii_please_the_kaha_title:0 "Plaire au Ka Ha"
 hawaii_please_the_kaha_desc:0 "Bien que notre société croie en plusieurs dieux et déesses, les plus éminents sont Kane, Ku, Lono et Kanaloa. Si nous voulons leur plaire, nos armées doivent être menées par un général compétent."
 hawaii_lift_naha_title:0 "Soulever la Pierre Naha"
 hawaii_lift_naha_desc:0 "La Pierre Naha est un symbole sacré du Clan Naha sur la Grande Île. On croit que la pierre peut distinguer si la lignée d'un nouveau-né du clan est légitime ou non. Son pouvoir, cependant, va bien au-delà. Celui qui est capable de soulever la pierre est destiné à être le dirigeant de l'archipel."
 hawaii_prove_prowess_title:0 "Prouver sa Valeur"
 hawaii_prove_prowess_desc:1 "Le dirigeant qui unit l'archipel en un seul royaume sera béni par les dieux. En tant que dirigeant de [Root.GetName], c'est mon devoir de tous les rassembler."
 maori_haka_title:0 "Exécuter un Haka"
 maori_haka_desc:0 "Le Haka est une danse cérémonielle dans notre culture, souvent utilisée comme moyen de défier nos rivaux. En exécutant le Haka, nous montrons à nos ennemis que nous ne les craignons pas le moins du monde. Qu'ils viennent et essaient de nous abattre. S'ils osent."
 maori_riri_title:0 "Guerres Riri"
 maori_riri_desc:0 "Riri est la colère, c'est le combat et la rage ; Riri est la violence, c'est l'agression ou la férocité. Riri est la façon dont nous montrons notre puissance et revendiquons notre place en tant que dirigeants sur les autres Iwis ou tribus."
 maori_ka_mate_title:0 "Ka Mate !"
 maori_ka_mate_desc:0 "Le Ka Mate est un haka composé comme une célébration de la vie sur la mort. Nous sommes allés à la guerre et beaucoup de nos enfants sont morts, mais finalement l'Iwi a revendiqué sa place sur un autre Iwi. C'est le temps de les pleurer et de célébrer les survivants."
 maori_colonize_southern_island_title:0 "Coloniser l'Île du Sud"
 maori_colonize_southern_island_desc:0 "L'Île du Sud est grande mais peu peuplée. Nous pouvons établir de nouvelles communautés qui la feront prospérer."
 samoa_tonga_title:0 "Retrouver notre Place"
 samoa_tonga_desc:0 "Les Samoa furent le premier centre du Triangle Polynésien avant que Tonga ne s'élève. Pratiquement chaque île de l'océan Pacifique a été colonisée depuis nos belles îles. Nous devons retrouver cette gloire."
 samoa_culture_title:0 "Culture Samoane"
 samoa_culture_desc:0 "Autrefois, chaque nation de notre région nous regardait avec émerveillement, si grandes étaient notre culture et nos traditions. Des années de luttes intestines nous ont fait perdre cette position de phare de la culture dans le Triangle Polynésien. Nous devons la reprendre !"
 samoa_army_title:0 "Armée Samoane"
 samoa_army_desc:0 "Les nations autour de nous reconnaissent notre position de leaders culturels dans le Triangle Polynésien. Mais nous avons des ambitions plus élevées. Nous devons créer une grande armée pour que notre leadership ne soit pas limité à la culture, mais devienne une véritable hégémonie."
 samoa_empire_title:0 "Empire Samoan"
 samoa_empire_desc:0 "Être le centre du Triangle Polynésien ne suffit pas pour ce que nous méritons. Nous sommes allés trop loin maintenant pour abandonner. Nous devons contrôler directement cette terre et régner sur elle."
 tonga_samoa_title:0 "Samoa Tongienne"
 tonga_samoa_desc:0 "Tonga est la nation la plus puissante du Triangle Pacifique, mais certaines îles semblent avoir oublié leur place dans la hiérarchie. Nous devons rappeler à ces nations que nous attendons un tribut de leur part. Les Samoa sont le premier endroit que nous devons contrôler, car c'est le centre culturel traditionnel du Pacifique."
 tonga_fijian_tributes_title:0 "Tributs Fidjiens"
 tonga_fijian_tributes_desc:0 "Maintenant que les Samoa nous obéissent, l'autre grande nation que nous devons soumettre est Viti. Ces îles sont le plus souvent divisées entre plusieurs chefs. Cela ne nous concerne pas. Qu'ils soient unis ou divisés, tous doivent nous obéir."
 tonga_tui_tonga_title:0 "Empire Tu'i Tonga"
 tonga_tui_tonga_desc:0 "Les îles les plus importantes du Triangle Polynésien sont nos sujets. C'est le temps de s'étendre et de faire obéir tout le monde."
 tonga_supremacy_title:0 "Suprématie Tongienne"
 tonga_supremacy_desc:0 "Le Triangle Polynésien ne connaît pas de plus grande puissance que la nôtre. À nous la gloire !"
 polynesian_supremacy:0 "Suprématie Polynésienne"
 desc_polynesian_supremacy:0 "Nous régnons sur le Triangle Polynésien d'une main de fer."
 colonization_efforts:0 "Efforts de Colonisation"
 desc_colonization_efforts:0 "À mesure que notre population croît, le manque d'espace et de terres arables peut être une bonne opportunité pour coloniser de nouvelles terres. En fondant une nouvelle colonie, nous pouvons encourager les gens à migrer."
 absolute_rule_mod:0 "Pouvoir Absolu"
 desc_absolute_rule_mod:0 "Nous régnons avec un pouvoir absolu sur notre royaume."
 loyal_subjects_mod:0 "Sujets Loyaux"
 desc_loyal_subjects_mod:0 "Nos sujets nous sont loyaux, et nous pouvons exercer plus de pouvoir."
 string_sacred_area_fijian:0 "Nananga"
 string_sacred_area_hawaiian:0 "Heiau"
 string_sacred_area_polynesian:0 "Marae"
 string_dance_fijian:0 "Meke"
 string_dance_hawaiian:0 "Hula"
 string_dance_maori:0 "Haka"
 string_dance_samoan:0 "Taualuga"
 string_dance_tongan:0 "Tau'olunga"
 #General Polynesian Events
 polynesian.1.t:0 "Une Aire Sacrée a Besoin d'un Défrichage"
 polynesian.1.d:0 "L'exubérance de notre terre nous apporte plusieurs bénédictions, mais cette fois, en partie à cause de notre négligence, la forêt a presque englouti notre [Root.GetPolynesianSacredArea]. Beaucoup dans notre communauté sentent que le lieu n'est plus tapu ou sacré et que [Root.Monarch.GetName] devrait faire quelque chose."
 polynesian.1.a:0 "Nous enverrons des hommes défricher la zone et la rendre tapu à nouveau."
 polynesian.1.b:0 "Pourquoi nous en soucierions-nous ? Ce n'est qu'un endroit avec moins d'arbres."
 polynesian.2.t:0 "Danses Qui Tournent Mal"
 polynesian.2.d:0 "Durant l'une de nos nombreuses célébrations, alors que les danseurs exécutaient le traditionnel [Root.GetPolynesianDance], une bagarre a éclaté. Des accusations de jalousie ont été lancées entre deux danseurs. Bien que l'affaire n'aurait dû être qu'une anecdote, elle a escaladé assez vite et les familles des danseurs ont commencé à s'affronter. Avant que le sang ne soit versé, [Root.Monarch.GetName] agit."
 polynesian.2.a:0 "Prendre le parti d'un des danseurs."
 polynesian.2.b:0 "Essayer de résoudre cela diplomatiquement."
 polynesian.3.t:0 "Le Chasse-Mouches Disparu"
 polynesian.3.d:0 "À travers tout le Triangle Polynésien, les chasse-mouches sont utilisés à des fins cérémonielles par nos chefs de haut rang. Aujourd'hui, notre dirigeant [Root.Monarch.GetName] sera au centre d'une cérémonie, mais son chasse-mouches a disparu et les serviteurs ne peuvent pas le trouver. Il n'y a pas le temps d'en faire un autre car la cérémonie est sur le point de commencer. Cela causera un grand émoi si ce n'est pas résolu."
 polynesian.3.a:0 "Chercher un remplacement, personne ne s'en rendra compte."
 polynesian.3.b:0 "Nous perdrons la face si nous traitons nos sujets comme des imbéciles."
 polynesian.4.t:0 "Culture du Kava"
 polynesian.4.d:0 "En arrosant les racines séchées de la plante kava, nous obtenons une boisson hallucinogène appelée Kava aussi. Le Kava est une partie centrale de la plupart des cérémonies à travers tout le Triangle Polynésien, et c'est un acte hautement ritualisé qui suit un ensemble strict de règles et d'ordre. Comme le processus de création de cette boisson n'est pas gravé dans la pierre, les résultats pouvaient varier beaucoup, menant à différents résultats. La dernière célébration que nous avons eue avec des membres importants de notre société et des sociétés voisines fut un succès total grâce au Kava de haute qualité que nous avons servi. Notre réputation d'hôtes s'est grandement améliorée."
 polynesian.4.a:0 "C'est une bonne occasion de se faire de nouveaux amis."
 good_kava_mod:0 "Une Grande Célébration"
 desc_good_kava_mod:0 "Notre réputation de grands hôtes a amélioré la façon dont les autres nous voient."
 polynesian.5.t:0 "Tissu Tapa de Haute Qualité"
 polynesian.5.d:0 "Le tissu tapa est une étoffe d'écorce fabriquée par la plupart des groupes de la région pacifique. Le tissu tapa peut être utilisé pour plusieurs choses, surtout les vêtements, mais aussi pour créer de beaux ornements qui peuvent être très demandés pour leur qualité. Le tapa peut être décoré et teint, et il est extrait du mûrier à papier. Dans chaque village ou hameau, le son de l'écorce battue pour créer le tapa est constant. Notre tapa est devenu très demandé dernièrement grâce à sa qualité."
 polynesian.5.a:0 "C'est une bonne occasion de faire fortune."
 quality_tapa_mod:0 "Tissu Tapa de Haute Qualité"
 desc_quality_tapa_mod:0 "Notre Tissu Tapa est célèbre dans le Triangle Polynésien et la demande a explosé."
 polynesian.6.t:0 "Tentative d'Assassinat"
 polynesian.6.d:0 "Le sennit est un type de cordage fait de fibres séchées, principalement de cosse de noix de coco, ou d'herbe qui est utilisé à travers toute la région pour fabriquer différents types de tissus, surtout des chapeaux, mais aussi comme élément important pour l'architecture traditionnelle, la construction de bateaux, la pêche ou l'ornementation. On ne penserait pas à cela comme un outil de mort, mais le cerveau humain est très créatif et utiliser un sennit pour étrangler notre dirigeant [Root.Monarch.GetName] était l'option choisie par l'attaquant."
 polynesian.6.a:0 "Le tuer."
 polynesian.7.t:0 "Les Observateurs d'Étoiles"
 polynesian.7.d1:0 "Le ciel est plein d'étoiles qui forment différentes formes ressemblant à des choses et ayant une utilité pour nos marins : le Manaiakalani ou la Ligne de Pêche du Chef ressemble à l'hameçon de Maui ; Heiheionakeiki est utilisé pour naviguer vers Tahiti ; et Ke Ka o Makali'i ou l'Écope du Canoë de Makali'i représente un bol se déversant sur l'horizon... Les gens qui les connaissent sont utiles à la communauté."
 polynesian.7.d2:0 "Le ciel est plein d'étoiles qui forment différentes formes ressemblant à des choses et ayant une utilité pour nos marins. Les gens qui les connaissent sont utiles à la communauté."
 polynesian.7.a:0 "La connaissance est toujours bienvenue."
 polynesian.8.t:0 "Les Guerres des Cochons"
 polynesian.8.d:0 "Quand nos ancêtres ont colonisé ces îles, ils ont amené deux animaux à manger : les poulets et les cochons. Les cochons sont traditionnellement valorisés car ils sont non seulement délicieux, mais aussi une grande source de viande et en posséder plusieurs est un moyen de montrer sa puissance. Deux groupes de personnes sont venus voir [Root.Monarch.GetName] pour accuser l'autre camp de leur voler des cochons. C'est un sujet brûlant pour plusieurs raisons, et notre dirigeant pourrait vouloir agir."
 polynesian.8.a:0 "Nous choisirons un camp."
 polynesian.8.b:0 "Ce ne sont que des cochons."
 pig_sides_mod:0 "Nous Avons Choisi un Camp dans les Guerres des Cochons"
 desc_pig_sides_mod:0 "Notre soutien à notre camp dans ce conflit a causé quelques troubles."
 pig_neutral_mod:0 "Nous Avons Choisi la Neutralité dans les Guerres des Cochons"
 desc_pig_neutral_mod:0 "Personne n'est content de notre décision, mais au moins personne ne fait la guerre."
 polynesian.9.t:0 "Souvenirs de Hawaiki"
 polynesian.9.d:0 "Selon nos légendes, avant que nous n'arrivions sur ces côtes, notre peuple était originaire d'un endroit appelé Hawaiki, d'où nous venons tous. Pour d'autres, c'est aussi le monde souterrain où nos morts vont et demeurent. Quoi qu'il en soit, ils étaient heureux et la nourriture était abondante, donc notre peuple regrette parfois cet endroit où il n'a jamais été. Il y a une attraction surnaturelle vers cette patrie perdue."
 polynesian.9.a:0 "Cet endroit ressemble au paradis."
 polynesian.10.t:0 "Une Douce Menace"
 polynesian.10.d:0 "La canne à sucre a été apportée par nos ancêtres dans nos wakas ou canoës et a été plantée et utilisée abondamment par nos communautés. Mais avec nous, un invité indésirable est aussi venu : les rats. Bien que nos chiens soient prêts à les combattre, en cette occasion, le nombre de rats semble être hors de contrôle, et nous avons subi de grandes pertes dans nos champs de sucre. La communauté est préoccupée et est venue implorer de l'aide. En tant que dirigeants, nous devons leur donner une réponse."
 polynesian.10.a:0 "Nous devons faire quelque chose, lâchez les chiens !"
 polynesian.10.b:0 "Je ne pense pas que nous puissions faire grand-chose."
 sugarcane_lost_mod:0 "Canne à Sucre Perdue aux Rats"
 desc_sugarcane_lost_mod:0 "Un essaim de rats a détruit nos champs de canne à sucre."
 polynesian.11.t:0 "Le Meilleur Ami"
 polynesian.11.d:0 "Depuis la colonisation des premières îles, les chiens ont été à nos côtés comme compagnons, mais aussi comme nourriture. Pratiquement chaque groupe insulaire a sa propre race de chien : le Poi à Hawaï, le Kuri en Aotearoa, ou ceux de Tahiti. Quand une source de nourriture est nécessaire, les chiens ne sont pas toujours les premiers à tomber, mais ils sont nourris de légumes ou de poisson pour être prêts."
 polynesian.11.a:0 "Les chiens sont une bonne source de nourriture."
 polynesian.12.t:0 "La Course de Waka"
 polynesian.12.d:0 "Notre peuple a utilisé des wakas ou canoës pour coloniser cette partie du monde et les wakas sont centraux dans notre culture d'une manière ou d'une autre. Les compétitions sont aussi un moyen facile de divertir notre peuple et aussi un bon moyen de garder notre communauté en forme. Un groupe de rameurs en a défié un autre pour une course et la nouvelle de l'événement s'est répandue rapidement dans la région. Même [Root.Monarch.GetName] s'est approché du rivage pour regarder la course. Des paris ont naturellement surgi."
 polynesian.12.a:0 "Un petit pari ne fera pas de mal."
 polynesian.12.b:0 "Nous ne perdrons pas de richesse de cette manière insensée."
 polynesian.13.t:0 "Pas de Noix de Bancoulier Décortiquée à Trouver"
 polynesian.13.d:0 "Les tatouages sont un moyen courant de couvrir nos corps et sont toujours dessinés par des maîtres tatoueurs qui ont un rôle important dans nos sociétés. L'encre, appelée kukui aux îles Hawaï ou tuitui aux Samoa, est faite en brûlant le noyau huileux de la noix de bancoulier décortiquée et la suie noire est collectée. Pour une raison quelconque, ces noix de bancoulier décortiquées sont devenues rares et personne n'arrive à en trouver nulle part."
 polynesian.13.a:0 "Sans elle, nos tatoueurs ne peuvent pas travailler. Faites-les venir d'autres îles si nécessaire."
 polynesian.13.b:0 "Nous pouvons vivre avec cela."
 no_tattoo_mod:0 "Pas de Noix de Bancoulier Décortiquée"
 desc_no_tattoo_mod:0 "Il n'y aura pas de tatouages cette année."
 polynesian.14.t:0 "Un Cadeau Flottant"
 polynesian.14.d:0 "Un nouveau navire a été offert à notre dirigeant. Les artisans qui l'ont construit ne sont pas riches mais voulaient faire un beau cadeau à [Root.Monarch.GetName] pour son règne. Des cadeaux leur seront donnés en retour, comme la tradition le commande."
 polynesian.14.a:0 "Notre flotte se renforce."
 polynesian.15.t:0 "La Jeune Armée"
 polynesian.15.d:0 "Durant les derniers jours, des guerriers se sont rassemblés dans l'une de nos provinces et ont juré fidélité à [Root.Monarch.GetName], désireux de servir dans l'armée. Que nous voulions protéger notre peuple ou étendre notre royaume, ces gens seront d'une grande aide."
 polynesian.15.a:0 "De nouvelles recrues sont toujours agréables."
 #Fijian Events
 polynesian.16.t:0 "L'Ai Lakovi"
 polynesian.16.d:0 "L'Ai Lakovi ou fiançailles formelles est un moment important dans la culture fidjienne. Traditionnellement, l'homme présente un Tabua ou dent de baleine en cadeau à sa future épouse, mais ce n'est pas une règle stricte. [Root.Monarch.GetName] est sur le point de se marier et insiste pour offrir à son nouveau conjoint un tabua particulièrement luxueux. Les coffres de l'État pourraient en souffrir."
 polynesian.16.a:0 "Notre conjoint mérite le meilleur."
 polynesian.16.b:0 "Nous avons juste besoin de présenter le tabua."
 polynesian.17.t:0 "Seigneur de Guerre"
 polynesian.17.d:0 "Après une guerre sanglante, notre nation est sortie victorieuse. Plusieurs guerriers sont retenus captifs dans notre patrie, et il est temps de décider quoi faire d'eux. Notre seigneur de guerre a le dernier mot. Quoi qu'il décide sera fait. Bien sûr, le prix n'est pas bon marché et d'autres personnes peuvent sentir qu'elles pourraient être les prochaines."
 polynesian.17.a:0 "Leur courage sera respecté."
 polynesian.17.b:0 "Ils se sont bien battus, et nous voulons garder la paix."
 warlord_mod:0 "Seigneur de Guerre"
 desc_warlord_mod:0 "En leur faisant peur, nous devenons plus forts."
 polynesian.18.t:0 "Émissaire de Kalou"
 polynesian.18.d:0 "La société fidjienne est étroitement liée à la religion et à l'adoration des Kalou ou dieux. Comme les tabous ou tabus sont si communs, affectant qui nous épousons, ce que nous mangeons, où nous nous allongeons... gouvernant chacune de nos actions du berceau à la tombe, [Root.Monarch.GetName] a décidé que nous avons besoin d'un homme saint à nos côtés."
 polynesian.18.a:0 "Cherchons parmi ces candidats."
 polynesian.19.t:0 "Accusations de Pratique de Sorcellerie"
 polynesian.19.d:0 "La sorcellerie ou Draunikau comme certains l'appellent est un moyen courant de communiquer avec les esprits et d'obtenir des faveurs en retour. Bien que beaucoup de gens la pratiquent, même parmi les Betes ou prêtres, elle est vue avec suspicion par la plupart et sa pratique se fait furtivement dans la plupart des cas. Des rumeurs selon lesquelles [Root.Monarch.GetName] la pratique ont circulé librement à travers tout le royaume."
 polynesian.19.a:0 "Cette rumeur doit cesser."
 polynesian.19.b:0 "Tout le monde le fait, peut-être devrions-nous la normaliser."
 polynesian.20.t:0 "Cible Vivante"
 polynesian.20.d:0 "Notre héritier doit être un grand guerrier s'il veut diriger notre peuple un jour. C'est une tradition parmi notre peuple de pratiquer les compétences de tir à l'arc contre une cible vivante, généralement un captif de guerre gravement blessé. En permettant à nos enfants de viser une cible vivante, nous assurons que leurs compétences sont bonnes pour les guerres futures. En cette occasion, notre héritier est parmi ces enfants. Cela fera de lui un guerrier."
 polynesian.20.a:0 "Notre héritier doit s'entraîner."
 #Hawaiian Events
 polynesian.21.t:0 "Le Peuple Menehune"
 polynesian.21.d:0 "Selon nos légendes, avant que notre peuple n'arrive sur ces côtes, les îles de cet archipel appartenaient à un peuple nain appelé Menehune. Ce peuple est décrit comme d'excellents artisans et les constructeurs de beaucoup de nos viviers, qui travaillent sans relâche durant les nuits. Seuls les enfants et ceux qui leur sont connectés d'une manière ou d'une autre sont capables de les voir. Aujourd'hui, un homme est venu au village prétendant les avoir vus."
 polynesian.21.a:0 "Peut-être qu'ils existent après tout."
 polynesian.21.b:0 "Laissez toutes ces sottises aux enfants et aux gens naïfs."
 polynesian.22.t:0 "Ku Exige un Sacrifice"
 polynesian.22.d:0 "Notre royaume traverse une période terrible et les choses ne font qu'empirer de jour en jour. Les prêtres ou kahunas sont catégoriques, Ku est en colère contre nous et exige un sacrifice. Les préparatifs sont en cours dans le Luakini, le temple ou heiau dédié à la guerre où les sacrifices sont faits, par les prêtres de Ku. Seuls les ali'i, la noblesse, et les kahuna servant Ku seront autorisés à la cérémonie."
 polynesian.22.a:0 "Nous ferons des sacrifices pour apaiser le dieu à plumes."
 polynesian.22.b:0 "Les sacrifices ne sont pas la réponse, et nous ne rassasierons pas la soif de sang de Ku."
 polynesian.23.t:0 "Un Festival Makahiki Spécial"
 polynesian.23.d:0 "Les prêtres ou Kahunas de Lono prétendent que le dieu lui-même a communiqué avec eux et que si nous faisons les préparatifs appropriés, une bénédiction directement du dieu couvrira notre royaume. En tant que dieu de l'agriculture et de la paix, nous pouvons être bénis avec de meilleures récoltes et une plus longue période de paix. Que devons-nous faire ?"
 polynesian.23.a:0 "Une offrande sera faite au Mapele, ou temple dédié à Lono."
 polynesian.23.b:0 "Nous nous sommes bien portés jusqu'ici, nous nous porterons bien."
 lonos_blessing_mod:0 "Bénédiction de Lono"
 desc_lonos_blessing_mod:0 "La main de Lono nous a bénis avec assez de pluie pour que nos plantes poussent fortes."
 polynesian.24.t:0 "Éruption Volcanique"
 polynesian.24.d:0 "Nos îles sont incroyablement fertiles et les plantes poussent avec facilité. Mais de temps en temps, les Dieux mettent notre foi à l'épreuve, la Terre se met en colère et les volcans qui forment nos îles crachent de la lave qui couvre nos champs. Normalement, la montagne nous prévient et peu de vies sont perdues, mais les plantes autour d'eux n'ont pas cette chance. Dans les prochains mois, nous devrons nous adapter aux pertes et attendre que les plantes repoussent plus fortes."
 polynesian.24.a:0 "Les dieux le veulent ainsi."
 polynesian.25.t:0 "Le Makahiki Est Là"
 polynesian.25.d:0 "Le Makahiki est l'une des périodes les plus importantes pour notre peuple, quand le Makali'i ou Pléiades se lève à l'horizon et que la prochaine lune croissante arrive, la saison du Nouvel An commence. Durant cette période, nous remercions Lono pour ses bénédictions et les Kanaka Maoli ou hawaïens le célèbrent. La guerre et le travail sont interdits durant ces quatre mois. Les gens jouent à des jeux, assistent à des cérémonies religieuses où des animaux sont sacrifiés et les dirigeants prouvent leur valeur. Toutes les classes sociales ont leurs épreuves d'une manière ou d'une autre et réussir apporte non seulement la gloire personnelle, mais aussi à leur lignée."
 polynesian.25.a:0 "Le Nouvel An commence."
 makahiki_mod:0 "Makahiki"
 desc_makahiki_mod:0 "Nous sommes dans la Saison du Nouvel An"
 #Maori Events
 polynesian.26.t:0 "Tangihanga Royal"
 polynesian.26.d:0 "Le corps, ou Tupapaku, de notre héritier sera pleuré par l'Iwi dans la maison communale, le Wharenui. Ce deuil se déroulera dans ce lieu sacré, ou Marae, pendant trois jours. Durant cette période, des gens de partout viendront visiter et montrer leur respect. En l'honneur du Tupapaku, nous tiendrons une danse de bienvenue, et après la nuit de fin ou Po Whakamatunga, nous enterrerons le corps et tiendrons un festin final Hakari."
 polynesian.26.a:0 "Nous garderons les choses simples. Ce n'est pas le moment de se vanter de notre richesse."
 polynesian.26.b:0 "Nous devrions avoir un Tangihanga élaboré."
 polynesian.27.t:0 "Kaitiakitanga"
 polynesian.27.d:0 "Nous ne faisons qu'un avec la nature, et nous devons vivre en harmonie avec elle. C'est le devoir de tous les Maoris de protéger tout ce qui est sous le ciel comme les dieux le commandent. Polluer une rivière, abattre une forêt entière ou piller un endroit de ses ressources va contre cette tutelle. Nos prêtres décident généralement de rendre certaines zones tapu ou sacrées afin de les garder protégées et à l'abri d'un usage excessif. Ces décisions, bien qu'indubitablement positives à long terme, peuvent être un problème à court terme."
 polynesian.27.a:0 "Nous ne pouvons pas arrêter le progrès et le bien-être de notre peuple."
 polynesian.27.b:0 "Nous sommes tous des Kaitiaki ou gardiens, c'est notre allégeance envers les dieux."
 kaitiakitanga_mod:0 "Kaitiakitanga"
 desc_kaitiakitanga_mod:0 "Nos prêtres ont imposé un tapu sur certains endroits de notre territoire."
 polynesian.28.t:0 "Whakapapa"
 polynesian.28.d:0 "Le Whakapapa représente les origines d'une personne, la lignée à laquelle cette personne appartient. Le Whakapapa est récité comme introduction ou Mihimihi, surtout dans les situations importantes. Un dirigeant voisin a mis en doute la véracité du Whakapapa de notre dirigeant. Beaucoup parmi notre peuple insistent que cette insulte ne peut pas être ignorée."
 polynesian.28.a:0 "Ils paieront dans le sang avec la puissance de nos guerriers."
 polynesian.28.b:0 "Leurs mots sont vides pour notre chef. Rien ne sera fait."
 polynesian.29.t:0 "Un Matariki Spécial"
 polynesian.29.d:0 "Le Nouvel An ou Matariki est arrivé, le groupe d'étoiles que nous appelons aussi Matariki et Puanga, ou Pléiades et Rigel comme les Pakeha ou européens les appellent, se sont levés à l'horizon et un nouveau cycle commence. C'est le moment de l'année où nous préparons les terrains ; faisons des offrandes aux dieux, surtout Rongo ; nous souvenons de nos êtres chers qui ne sont plus parmi nous et enseignons à nos jeunes la terre. Les prêtres ont annoncé que les présages sont vraiment bons et que cette année sera excellente."
 polynesian.29.a:0 "Louons les dieux !"
 matariki_mod:0 "Un Matariki Spécial"
 desc_matariki_mod:0 "Cette année sera excellente pour notre peuple."
 polynesian.30.t:0 "Le Koha"
 polynesian.30.d:0 "Notre dirigeant a reçu en cadeau d'un ami de nombreux biens ou Koha après l'avoir hébergé lui et sa famille pendant quelques jours. L'Utu, l'équilibre et l'harmonie qui gouvernent nos vies, nous oblige à rendre ce geste libre et spontané. Cet échange de cadeaux liera la famille de notre dirigeant et celle de son ami pour continuer à échanger des cadeaux à l'avenir mais renforcera aussi leur relation."
 polynesian.30.a:0 "Cela nous a pris au dépourvu, et nous ne pouvons pas rendre la pareille."
 polynesian.30.b:0 "Bien que la tradition dicte que notre cadeau doit être de plus grande valeur, s'en rendront-ils vraiment compte ?"
 polynesian.30.c:0 "Nous sommes liés par l'Utu. Leur Koha sera doublement rendu."
 #Samoan Events
 polynesian.31.t:0 "Siva Afi Qui Tourne Mal"
 polynesian.31.d:0 "Un émissaire de Tonga est venu à nous il y a quelques jours. Durant tout ce temps, nous l'avons traité avec grand honneur, car nous sommes de grands hôtes. Lors de sa dernière nuit parmi nous, [Root.Monarch.GetName] a invité des danseurs à exécuter la danse du feu ou Siva Afi. Cette danse consiste en des danseurs, généralement des guerriers, qui couvrent leurs Nifo Oti, nos massues de guerre traditionnelles à bord dentelé, de serviettes et les enflamment. C'est une partie très traditionnelle et emblématique de notre culture. À notre surprise, la danse a été accompagnée d'une sorte de représentation théâtrale. L'histoire parlait du temps où notre peuple s'est débarrassé de nos anciens suzerains tongiens après avoir attaqué leur gouverneur durant une danse Siva Afi. Tout le monde peut voir l'émissaire tongien devenir furieux. Cela va poser problème."
 polynesian.31.a:0 "Tonga ne sera pas content."
 polynesian.32.t:0 "Héritier Lâche"
 polynesian.32.d:0 "Un tatouage masculin ou Pe'a est une partie centrale de notre culture et est associé aux rites de passage pour les hommes. [Root.Heir.GetName] est en âge et il recevra un Pe'a pour qu'il puisse cesser d'être telefua ou nu. Durant les préparatifs, [Root.Heir.GetName] montre de la confiance bien que recevoir un Pe'a soit connu pour être très douloureux. Cette confiance s'évanouit rapidement quand le tufuga ta tatau ou maître tatoueur commence. Il ne peut pas endurer la douleur et s'enfuit. Il n'a qu'une petite marque, un Pe'a mutu, la marque de la honte. Même si le Pe'a est terminé un jour, certains ne le considéreront jamais comme un Soga'imiti et respecté pour son courage."
 polynesian.32.a:0 "Il a apporté la honte à notre famille."
 polynesian.33.t:0 "'Ava Historique"
 polynesian.33.d:0 "La cérémonie de l''Ava est l'une des coutumes les plus importantes de notre peuple. C'est un rituel solennel où la boisson kava, ou 'ava comme nous l'appelons, est partagée et comprend des discours et de l'art oratoire. En cette occasion, plusieurs chefs tribaux et d'autres notables de notre royaume ont été invités. L''Ava est fait à partir de racines séchées et mélangé avec de l'eau et partagé entre les célébrants. Nos invités apprécient clairement la célébration, et nous pourrions vouloir profiter de leur bonne humeur."
 polynesian.33.a:0 "Nous ne nous attendions pas à ce succès."
 historic_ava_mod:0 "'Ava Historique"
 desc_historic_ava_mod:0 "Cet 'Ava restera dans les mémoires pendant des années."
 polynesian.34.t:0 "Un Tufuga pour la Cour"
 polynesian.34.d:0 "Les Tufuga sont les artisans qui ont atteint le plus haut rang de compétence et de connaissance dans notre société. Comme la position est très prestigieuse, engager leurs services sera d'une grande aide pour notre nation. Quel type de Tufuga devrions-nous inviter ?"
 polynesian.34.a:0 "Nous chercherons un Tufuga fau fale ou maître constructeur de maisons."
 polynesian.34.b:0 "Un Tufuga fau va'a ou maître navigateur est ce que nous voulons."
 polynesian.34.c:0 "Le travail est pour un bon Tufuga ta tatau ou maître tatoueur."
 polynesian.35.t:0 "Le Système Fa'amatai"
 polynesian.35.d:0 "Le système des chefs ou Fa'amatai est une forme décentralisée de gouvernement traditionnelle aux Samoa. Il permet aux Tama-a-Aiga ou Fils des Familles, les quatre principaux détenteurs de titres des îles, de diriger les familles royales aux Samoa. Chaque dirigeant de ces îles a détenu l'un de ces titres. Ce système nous a accordé un grand degré de stabilité, mais c'est aussi un obstacle au pouvoir total."
 polynesian.35.a:0 "Nous respecterons les traditions."
 polynesian.35.b:0 "Ce système est démodé et va contre nos intérêts."
 respect_faamatai_mod:0 "Respect du Système Fa'amatai"
 desc_respect_faamatai_mod:0 "Le Système Fa'amatai est ce qui fait fonctionner notre société, donc le maintenir est indispensable."
 end_faamatai_mod:0 "Fin du Système Fa'amatai"
 desc_end_faamatai_mod:0 "Le Système Fa'amatai ne nous est d'aucune utilité, donc nous nous en sommes débarrassés."
 #Tongan Events
 polynesian.36.t:0 "Le Tatatau Royal"
 polynesian.36.d:0 "Bien que la plupart des hommes tongiens soient fortement tatoués, nos dirigeants ne le sont généralement pas. C'est dû au haut rang de notre dirigeant, ce qui signifie que personne ne peut le toucher. Pour éviter cette limitation, il est traditionnel d'aller aux Samoa pour se faire tatouer."
 polynesian.36.a:0 "Nous visiterons les Samoa pour être tatoués comme c'est la coutume."
 opinion_tattoo_done:0 "Le Roi Tongien a été Tatoué aux Samoa"
 polynesian.36.b:0 "Les Samoa n'ont rien à nous offrir."
 opinion_tattoo_not_done:0 "Le Roi Tongien a Refusé le Tatouage Samoan"
 polynesian.37.t:0 "Un Second Ha'amonga 'a Maui"
 polynesian.37.d:0 "Il y a quelques générations, Tu'itatui, le onzième Tu'i Tonga, a érigé le Ha'amonga 'a Maui ou le Fardeau de Maui, un calcaire corallien géant soutenu par deux autres non moins grands formant quelque chose de similaire à un portail, en l'honneur de ses deux fils. Notre dirigeant [Root.Monarch.GetName] souhaite faire construire une structure similaire pour honorer ses enfants, car il est assez ému par l'histoire, malgré son coût évident. Que devons-nous faire ?"
 polynesian.37.a:0 "Vive [Root.Monarch.GetName] !"
 polynesian.37.b:0 "Nous ne pouvons pas nous le permettre, même si [Root.Monarch.GetName] se fâche."
 polynesian.38.t:0 "Experts en Sculpture sur Bois"
 polynesian.38.d:0 "Nos artisans sont habiles dans l'art de la sculpture sur bois. Non seulement sont-ils experts dans la création d'outils communs comme les appuie-tête ou kali, les bols à nourriture, les images de culte ou les armes, mais ils sont aussi bien connus à travers tout le Pacifique pour leur habileté à incruster des coquillages de perles ou de l'ivoire dans le bois. Les Fidjiens aiment thésauriser nos massues de guerre. Nous devons profiter de cet amour pour nos artisanats."
 polynesian.38.a:0 "Cela nous bénéficiera grandement."
 tongan_fijian_trade_mod:0 "Commerce Tongien-Fidjien"
 desc_tongan_fijian_trade_mod:0 "Les Fidjiens aiment nos massues de guerre sculptées."
 polynesian.39.t:0 "Tumulus Royal Profané"
 polynesian.39.d:0 "Durant une célébration, le fils aîné d'un chef de clan influent a trop bu et a profané involontairement la tombe d'un de nos rois morts. C'est une grande insulte et le jeune homme le sait. Malgré ses supplications et ses promesses de réparer le mal fait, certaines voix conseillent à [Root.Monarch.GetName] de le tuer pour laver la honte de la dynastie. Bien sûr, d'autres craignent un possible soulèvement de son clan si nous tuons leur futur dirigeant."
 polynesian.39.a:0 "Malgré ses remords, il doit mourir."
 polynesian.39.b:0 "Nous ne sommes pas en position de risquer une guerre civile maintenant."
 polynesian.40.t:0 "Canoës de Guerre Fidjiens"
 polynesian.40.d:0 "Notre patrie est riche en nombreuses ressources, mais elle manque de la quantité nécessaire de grands arbres pour construire de grands canoës de guerre. Heureusement pour nous, les îles Fidji sont proches de nous et leurs compétences en construction de canoës sont légendaires. Nous devrions renforcer le commerce avec ces îles pour maintenir notre marine forte."
 polynesian.40.a:0 "Le prix est acceptable."
 polynesian.40.b:0 "Nous ne pouvons pas nous le permettre maintenant."
 fijian_canoes_good_mod:0 "Canoës de Guerre Fidjiens"
 desc_fijian_canoes_good_mod:0 "Nous importons des canoës de guerre de Fidji."
 fijian_canoes_bad_mod:0 "Canoës de Guerre Fidjiens"
 desc_fijian_canoes_bad_mod:0 "Nous avons besoin de grands arbres pour les canoës de guerre."
 #Easter Eggs
 polynesian.41.t:0 "Une Créature Étrange"
 polynesian.41.d:0 "Notre dirigeante Lilo est revenue de sa promenade quotidienne autour de notre belle île. À ses côtés, une petite créature bleuâtre marche maladroitement, lui tenant la main. Personne n'a jamais vu une créature comme celle-là, mais personne n'ose en parler non plus. La créature ne cesse de babiller comme si elle complotait quelque chose."
 polynesian.41.a:0 "Qu'est-ce que les Dieux veulent dire par cela ?"
 polynesian.42.t:0 "Bénédiction Menehune"
 polynesian.42.d:0 "Durant la nuit, notre dirigeant [Root.Monarch.GetName] a été vu entrant dans les bois. Quelques gardes ont essayé de l'arrêter, mais d'un geste de la main, il leur a dit de le laisser seul. Quelques heures plus tard, il est revenu avec un grand sourire sur le visage.\n« J'ai parlé à un Menehune cette nuit », a-t-il affirmé. Vrai ou faux, depuis ce jour tout va mieux dans le royaume."
 polynesian.42.a:0 "Ils existent."
 menehune_blessing_mod:0 "Bénédiction Menehune"
 desc_menehune_blessing_mod:0 "Un Menehune a béni notre royaume et nos dirigeants."
 polynesian.43.t:0 "Un Étrange Conseiller"
 polynesian.43.d:0 "Après un long voyage, notre reine Moana est revenue sur nos côtes accompagnée d'un homme grand et musclé, couvert de tatouages. Maintenant, on la voit toujours en compagnie de cet homme et apparemment elle écoute ses conseils. Peut-être est-il temps de l'inviter à la cour, malgré les rumeurs à son sujet."
 polynesian.43.a:0 "Est-ce Maui ?"
 estate_regency_events.1.t:0 "Le Leadership de l'État Contesté"
 estate_regency_events.1.d:0 "Durant les derniers mois, une faction dans notre royaume a gagné en force, et ils se voient comme les leaders qui devraient gouverner durant cette régence. Leurs demandes ont commencé comme des rumeurs ; quelqu'un murmure que telle ou telle personne n'est pas contente de la direction de la nation, un autre dit que la faction dirigeante n'est pas aussi forte que cette autre, ou qu'ils ne sont pas aussi représentés dans la régence qu'ils devraient l'être et ainsi de suite. Ces rumeurs ont continué pendant des semaines et leur présence à la cour est totalement évidente de nos jours, au point que la faction contestant le pouvoir de notre régent est absolument vocale à ce sujet. Le régent est inquiet, pour des raisons évidentes, et voit que le pouvoir de sa propre faction s'est affaibli au point de douter qu'elle puisse riposter. C'est le moment de prendre une décision qui changera notre nation."
 estate_regency_events.1.a:0 "Il n'y a pas d'autre option qu'accepter un changement de leadership."
 estate_change_tooltip:0 "L'état dirigeant cédera le pouvoir au challenger."
 estate_regency_events.1.b:0 "Ils doivent soutenir le régent pour le bien de la nation."
 estate_displeased_tooltip:0 "L'état dirigeant la régence sera mécontent."
 coup_attempt_starts_tooltip:0 "Un coup d'État aura lieu."
 estate_regency_events.2.t:0 "Les Abus de la Régence"
 estate_regency_events.2.d:0 "Pour beaucoup, être aux commandes n'est rien d'autre qu'une opportunité de faire avancer leurs propres intérêts personnels. Et c'est exactement ce que notre royaume subit. Sans opposition et ivres de pouvoir, la faction derrière notre régent, et probablement lui-même aussi, fait pression pour qu'on lui accorde certains privilèges. Comme nous sommes en position de faiblesse, refuser d'accepter leurs demandes peut être un mouvement dangereux, et nous pourrions choisir un chemin vers notre propre damnation. D'autre part, s'ils parvenaient à cimenter leur pouvoir, ils pourraient être difficiles à déloger, s'ils refusaient de se retirer de la direction une fois que nous aurons un dirigeant convenable."
 estate_regency_events.2.a:0 "Nous accepterons leurs demandes. Pour l'instant."
 estate_regency_events.2.b:0 "Peut-être pouvons-nous les soudoyer et espérer qu'ils oublient l'affaire."
 estate_regency_events.2.c:0 "Ils n'obtiennent rien. Ils doivent servir la nation, pas leurs intérêts."
 estate_regency_events.3.t:0 "Le Régent Tyran"
 estate_regency_events.3.d:1 "Les vendettas sont le genre de choses qui font s'effondrer les royaumes, mais elles sont aussi vieilles que l'être humain lui-même. Notre régent, [Root.Monarch.GetName], pense qu'être au pouvoir est une occasion en or de se débarrasser de certains ennemis politiques et adversaires. Il utilise son pouvoir de régent pour attaquer impitoyablement toute voix qui s'élève contre lui ou sa faction ou même quand elles ne le font pas, juste parce qu'il le peut. Bien sûr, les autres factions ne sont pas particulièrement heureuses de la façon dont les choses se passent et pourraient essayer de riposter. Nous sommes à un carrefour où nous devons décider quoi faire, devons-nous intervenir ?"
 estate_regency_events.3.a:0 "Nous devons faire confiance à [Root.Monarch.GetName], en espérant que tout cela finisse bien."
 estate_regency_events.3.b:0 "C'est de la tyrannie et cela nous explosera au visage si nous permettons que cela se produise."
 estate_regency_events.4.t:0 "Le Régent Offre la Couronne"
 estate_regency_events.4.d:0 "Quand quelques sujets loyaux nous ont approchés, nous ne pouvions pas croire les nouvelles. Le régent et sa faction sont très mécontents de l'héritier et de ses partisans, et ont fait le mouvement audacieux d'offrir la couronne de notre nation à un autre pays ! Nous ne pouvons pas faire grand-chose à part attendre et espérer que nos ennemis ne saisissent pas cette opportunité pour nous tomber dessus et prendre la couronne à notre héritier légitime."
 estate_regency_events.4.a:0 "Trahison !"
 estate_regency_events.5.t:0 "La Bourgeoisie Cause des Problèmes"
 estate_regency_events.5.d:0 "On dit que les bourgeois ne se soucient que de l'argent. Tant que l'argent est abondant, ils sont heureux et ne causeront pas beaucoup de problèmes. Du moins, c'est ce que nous pensions. [Root.Monarch.GetName] et sa faction ont utilisé leur pouvoir pour faire avancer certaines affaires louches pendant qu'ils sont au pouvoir. La contrebande n'est pas nouvelle pour nous, nous le savons et ce ne serait pas la première fois que nous fermons les yeux sur cela, mais cette fois ces manœuvres illicites ont irrité une autre nation, et ils pourraient utiliser cet incident comme excuse pour nous déclarer la guerre et obtenir des compensations. Malheureusement, ils ne sont pas disposés à négocier."
 estate_regency_events.5.a:0 "Nous ne pouvons qu'attendre."
 estate_regency_events.6.t:0 "L'Intolérance Monte"
 estate_regency_events.6.d:1 "Personne ne sera surpris si l'on dit que tout pouvoir religieux essaiera toujours de perpétuer son pouvoir ou d'affirmer sa domination sur le reste quand il gouverne. Et c'est exactement la situation à laquelle [Root.GetName] fait face. Le clergé au pouvoir utilise son pouvoir pour éliminer l'influence des autres religions dans notre royaume et leur pouvoir est trop grand pour refuser. Une timide protestation est tout ce que nous avons pu élever. Nous changerons cette politique à l'avenir, sans doute, mais pour l'instant nous devrons vivre avec."
 estate_regency_events.6.a:0 "Un problème à la fois."
 religious_intolerance_mod:0 "Intolérance Religieuse"
 desc_religious_intolerance_mod:0 "Une nouvelle vague d'intolérance contre ceux qui ne suivent pas la religion du pays a commencé."
 religious_intolerance_tooltip:1 "Jusqu'à ce que §Y[Root.Heir.GetName]§! monte sur le trône, les autres religions du royaume que §Y[Root.Religion.GetName]§! seront persécutées."
 estate_regency_events.7.t:0 "Notre Régent Est un Loyaliste"
 estate_regency_events.7.d:0 "Bien que nous attendions toujours de ceux mis en charge d'une régence qu'ils soient loyaux à la couronne et à la nation, nous sommes assez contents s'ils n'abusent pas de leur position ou ne sont pas directement déloyaux et n'essaient pas de s'emparer du pouvoir dès qu'ils sont dans cette position de leadership. [Root.Monarch.GetName] est une exception à la règle. Loyal et bien élevé, sa proposition par sa faction était la meilleure nouvelle depuis des mois car nous n'attendons que le meilleur de lui."
 estate_regency_events.7.a:0 "De bonnes nouvelles pour une fois !"
 loyalist_leader_mod:0 "Chef Loyaliste"
 desc_loyalist_leader_mod:0 "Le régent est loyal à la couronne."
 estate_regency_mod_desc_tt:0 "jusqu'à ce que notre §YHéritier§! monte sur le trône"
 loyalist_leader_tooltip:2 "Jusqu'à ce que §Y[Root.Heir.GetName]§! monte sur le trône, §Y[Root.Monarch.GetTitle]§! §Y[Root.Monarch.GetName]§! sera loyal à la couronne."
 estate_regency_events.8.t:0 "Des Ombres en Mouvement"
 estate_regency_events.8.d:0 "Malgré leur pouvoir, [Root.Monarch.GetName] et sa faction ne sont pas contents de l'héritier et de son entourage et il y a des voix affirmant qu'ils complotent quelque chose de terrible. Nous avons confronté [Root.Monarch.GetName], et il a ardemment nié les accusations. Il n'y a jamais de paix au palais et les intrigues sont derrière chaque coin."
 estate_regency_events.8.a:0 "Nous avons le pressentiment que quelque chose ne va pas."
 estate_regency_events.9.t:0 "Le Régent Est une Bonne Influence"
 estate_regency_events.9.d:1 "Quand de bons hommes et femmes sont plus dévoués au bien de la nation qu'à leurs propres intérêts, de grandes choses se produisent. Pendant des mois, le régent a pris beaucoup de temps pour partager sa sagesse avec [Root.Heir.GetName] et tous deux ont grandement apprécié ce temps. La préparation pour être un dirigeant n'est jamais facile, mais [Root.Monarch.GetName] a fait un excellent travail. Des leçons sur les sciences, l'étiquette, l'histoire, les tactiques militaires ont été données dans tout le palais, suivant le régent et l'héritier où qu'ils aillent."
 estate_regency_events.9.a:0 "[Root.Heir.GetName] a tant appris !"
 estate_regency_events.10.t:0 "Une Tentative de Coup contre le Consort"
 estate_regency_events.10.d:0 "Comme un secret qui crie, des voix se sont élevées partout sur le mécontentement d'une faction dans notre royaume. Ils ne sont pas contents du consort régent selon ces voix et planifient un coup d'État pour le détrôner et mettre l'un d'entre eux aux commandes. S'ils gagnent, la dynastie royale pourrait être assassinée donc jusqu'à ce que nous terminions ce complot et emprisonnions tous les intrigants, le consort et la famille royale dans son ensemble sont en grave danger."
 estate_regency_events.10.a:0 "Nous ne les laisserons pas gagner !"
 coup_in_palace_events.1.t:0 "Rumeurs de Coup d'État"
 coup_in_palace_events.1.d:0 "Les couloirs du palais sont plus animés que jamais, des gens de tout le pays s'y rassemblent et échangent des informations, célèbrent des réunions ou essaient simplement de forger des alliances ou de résoudre d'anciens différends. Cela ne serait pas étrange, si ce n'était pour la seule raison qu'à chaque fois que [Root.Monarch.GetName] traverse ces couloirs, le silence devient tangible. Ce n'est pas le silence commun dérivé du respect, mais un silence inconfortable qui met tout le monde mal à l'aise. Alors que notre intérêt grandit sur ce comportement étrange, des rumeurs qu'un coup d'État est en préparation sont arrivées à nos oreilles. Qui oserait nous attaquer ?"
 coup_in_palace_events.1.a:0 "Une enquête doit être menée pour faire la lumière sur cette affaire."
 coup_ended_tooltip:0 "Les conspirateurs seront trouvés et la tentative de coup d'État neutralisée."
 nothing_found_tooltip:0 "L'enquête n'apportera aucune information. Quelque chose va se passer."
 coup_in_palace_events.1.b:0 "Ce ne sont probablement que des rumeurs, mais nous devons être prêts au cas où."
 gossips_end_tooltip:0 "Les rumeurs cesseront. Ce n'était rien après tout."
 gossips_continue_tooltip:0 "Si quelque chose, les rumeurs sur le coup d'État deviendront plus courantes. Quelque chose va se passer."
 coup_in_palace_events.2.t:0 "Complot Découvert"
 coup_in_palace_events.2.d:0 "Après des jours d'enquête, de pots-de-vin et de menaces çà et là et d'innombrables nuits sans sommeil, les conspirateurs ont été découverts et la tentative de coup d'État neutralisée. Les coupables seront envoyés aux cachots et finalement exécutés, car les traîtres ne méritent rien d'autre. Comme dans tant de cas, les ennemis les moins évidents apparaissent au sommet d'une conspiration et des cœurs sont brisés de déception. « Tu quoque, Brute, fili mi ? »"
 coup_in_palace_events.2.a:0 "Il est temps de punir les traîtres et de mettre fin à cela."
 coup_in_palace_events.3.t:0 "Le Complot Continue"
 coup_in_palace_events.3.d:0 "Si les rumeurs étaient assez évidentes ces dernières semaines, elles sont assourdissantes ces derniers jours. Certaines personnes ne cachent même plus ce dont elles parlent et continuent simplement à en discuter même en notre présence. Quelque chose de grand est sur le point de se produire, et nous ne savons pas vraiment quel doit être notre prochain pas. Le pays est en suspens alors que le sentiment que de mauvaises choses arrivent se répand comme un feu de forêt."
 coup_in_palace_events.3.a:0 "Que va-t-il se passer ?"
 coup_in_palace_events.3.b:0 "Purgez-les. Purgez-les tous."
 recent_coup_modifier:0 "A eu une Tentative de Coup Récente"
 estate_regent_prevails_tt:0 "[Root.Monarch.GetName] réussit à faire valoir sa revendication sur notre trône"
 coup_fails_tooltip:0 "Nous parviendrons à neutraliser le complot et à trouver les conspirateurs."
 coup_succeeds_tooltip:0 "Le complot sera réussi et le sang sera versé."
 coup_in_palace_events.4.t:0 "Le Complot Échoue"
 coup_in_palace_events.4.d:0 "Si ce complot nous enseigne quelque chose, c'est qu'on ne doit jamais rien tenir pour acquis. Quand la nuit était la plus sombre et que tout semblait perdu, nos agents ont réussi, juste à la dernière minute, à attraper les conspirateurs « in flagrante » alors que les imbéciles célébraient ce qu'ils considéraient comme une victoire certaine et un changement sur le trône. Leurs gueules de bois seront aigries par leurs larmes et leurs supplications pour le pardon."
 coup_in_palace_events.4.a:0 "Notre royaume est sauf !"
 coup_in_palace_events.5.t:0 "Le Complot Réussit"
 coup_in_palace_events.5.d:0 "L'ennemi est à l'intérieur ! Tout est perdu ! Nos agents étaient près d'attraper les conspirateurs, mais ils ont réussi à éviter notre surveillance et à poursuivre leurs plans perfides. Nous devons mettre nos gens en sécurité ou ils seront tués s'ils sont perçus comme une menace pour le nouveau pouvoir derrière le trône. Nous devons agir vite !"
 coup_in_palace_events.5.a:0 "Non, l'espoir est perdu. À eux le trône et notre foi."
 coup_in_palace_events.6.t:0 "Les Conséquences"
 coup_in_palace_events.6.d:1 "Le complot a été mis en lumière et les événements récents ont dicté son issue. Pour le meilleur ou pour le pire, notre pays va maintenant avancer sous un nouveau jour, quel que soit le résultat. Telle est la nature de la politique et des tractations en coulisses..."
 coup_in_palace_events.6.a:0 "Et maintenant ?"
